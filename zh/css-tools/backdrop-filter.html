<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is backdrop-filter in CSS?", "acceptedAnswer": {"@type": "Answer", "text": "CSS backdrop-filter applies visual effects like blur or color shift to the area behind an element. It's commonly used for frosted glass and glassmorphism UI effects."}}, {"@type": "Question", "name": "Which browsers support backdrop-filter?", "acceptedAnswer": {"@type": "Answer", "text": "Backdrop-filter is supported in all modern browsers including Chrome, Firefox, Safari, and Edge. For older browsers, you may need the -webkit-backdrop-filter prefix."}}, {"@type": "Question", "name": "How is backdrop-filter different from filter?", "acceptedAnswer": {"@type": "Answer", "text": "The filter property applies effects to the element itself, while backdrop-filter applies effects to the area behind the element, creating a frosted glass look."}}, {"@type": "Question", "name": "Can I use multiple backdrop filters together?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, you can combine multiple filter functions like blur, brightness, contrast, saturate and grayscale in a single backdrop-filter declaration for complex effects."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Backdrop Filter Generator',
    toolDesc: 'Create frosted glass and backdrop-filter effects visually with live preview, presets and one-click copy.',

    step4: 'Copy the generated CSS code to your project',
  },
  zh: {
    toolTitle: 'CSS 背景滤镜生成器',
    toolDesc: '可视化创建毛玻璃和 backdrop-filter 效果，实时预览，一键复制代码。',
    blur: '模糊',
    brightness: '亮度',
    contrast: '对比度',
    saturate: '饱和度',
    grayscale: '灰度',
    bgColor: '背景颜色',
    bgOpacity: '背景透明度',
    borderRadius: '圆角',
    borderWidth: '边框宽度',
    borderColor: '边框颜色',
    copy: '复制',
    copied: '已复制！',
    presetFrost: '毛玻璃',
    presetHeavy: '强模糊',
    presetLight: '轻薄霜',
    presetDark: '暗色玻璃',
    presetColor: '彩色滤镜',
    presetMono: '黑白',
    step1: '选择预设效果或手动调整滤镜参数',
    step2: '实时预览毛玻璃效果',
    step3: '微调背景颜色、透明度和边框',
    step4: '复制生成的 CSS 代码到你的项目',
  }
});

const { $, copyText, t } = GZ;

const state = { blur: 12, brightness: 100, contrast: 100, saturate: 100, grayscale: 0, bgColor: '#ffffff', bgOpacity: 20, borderRadius: 16, borderWidth: 1, borderColor: '#ffffff' };

const presets = [
  { name: 'presetFrost', blur: 12, brightness: 100, contrast: 100, saturate: 100, grayscale: 0, bgColor: '#ffffff', bgOpacity: 20, borderRadius: 16, borderWidth: 1, borderColor: '#ffffff' },
  { name: 'presetHeavy', blur: 24, brightness: 110, contrast: 100, saturate: 120, grayscale: 0, bgColor: '#ffffff', bgOpacity: 25, borderRadius: 20, borderWidth: 1, borderColor: '#ffffff' },
  { name: 'presetLight', blur: 6, brightness: 105, contrast: 100, saturate: 100, grayscale: 0, bgColor: '#ffffff', bgOpacity: 10, borderRadius: 12, borderWidth: 0, borderColor: '#ffffff' },
  { name: 'presetDark', blur: 16, brightness: 90, contrast: 110, saturate: 80, grayscale: 0, bgColor: '#000000', bgOpacity: 30, borderRadius: 16, borderWidth: 1, borderColor: '#333333' },
  { name: 'presetColor', blur: 10, brightness: 100, contrast: 100, saturate: 150, grayscale: 0, bgColor: '#6c5ce7', bgOpacity: 25, borderRadius: 16, borderWidth: 1, borderColor: '#a29bfe' },
  { name: 'presetMono', blur: 8, brightness: 100, contrast: 120, saturate: 0, grayscale: 100, bgColor: '#888888', bgOpacity: 20, borderRadius: 16, borderWidth: 1, borderColor: '#cccccc' },
];

function renderPresets() {
  $('#presets').innerHTML = presets.map((p, i) => `<button onclick="applyPreset(${i})">${t(p.name)}</button>`).join('');
}

function applyPreset(i) {
  const p = presets[i];
  Object.keys(p).forEach(k => { if (k !== 'name') state[k] = p[k]; });
  renderControls();
  updatePreview();
}

function renderControls() {
  const sliders = [
    { key: 'blur', min: 0, max: 40, unit: 'px' },
    { key: 'brightness', min: 50, max: 200, unit: '%' },
    { key: 'contrast', min: 50, max: 200, unit: '%' },
    { key: 'saturate', min: 0, max: 300, unit: '%' },
    { key: 'grayscale', min: 0, max: 100, unit: '%' },
    { key: 'bgOpacity', min: 0, max: 100, unit: '%' },
    { key: 'borderRadius', min: 0, max: 50, unit: 'px' },
    { key: 'borderWidth', min: 0, max: 10, unit: 'px' },
  ];
  let html = '';
  sliders.forEach(s => {
    html += `<div class="ctrl-row"><label>${t(s.key)}</label><input type="range" min="${s.min}" max="${s.max}" value="${state[s.key]}" oninput="state.${s.key}=+this.value;updatePreview()"><span class="val">${state[s.key]}${s.unit}</span></div>`;
  });
  html += `<div class="ctrl-row"><label>${t('bgColor')}</label><input type="color" value="${state.bgColor}" oninput="state.bgColor=this.value;updatePreview()" style="width:100%;height:32px;border:none;border-radius:6px;cursor:pointer"><span class="val">${state.bgColor}</span></div>`;
  html += `<div class="ctrl-row"><label>${t('borderColor')}</label><input type="color" value="${state.borderColor}" oninput="state.borderColor=this.value;updatePreview()" style="width:100%;height:32px;border:none;border-radius:6px;cursor:pointer"><span class="val">${state.borderColor}</span></div>`;
  $('#controls').innerHTML = html;
}

function hexToRgba(hex, opacity) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${opacity/100})`;
}

function getFilterStr() {
  const parts = [];
  if (state.blur > 0) parts.push(`blur(${state.blur}px)`);
  if (state.brightness !== 100) parts.push(`brightness(${state.brightness}%)`);
  if (state.contrast !== 100) parts.push(`contrast(${state.contrast}%)`);
  if (state.saturate !== 100) parts.push(`saturate(${state.saturate}%)`);
  if (state.grayscale > 0) parts.push(`grayscale(${state.grayscale}%)`);
  return parts.length ? parts.join(' ') : 'none';
}

function updatePreview() {
  const card = $('#glassCard');
  const filter = getFilterStr();
  const bg = hexToRgba(state.bgColor, state.bgOpacity);
  card.style.backdropFilter = filter;
  card.style.webkitBackdropFilter = filter;
  card.style.background = bg;
  card.style.borderRadius = state.borderRadius + 'px';
  card.style.border = state.borderWidth > 0 ? `${state.borderWidth}px solid ${hexToRgba(state.borderColor, 40)}` : 'none';
  // Update val displays
  document.querySelectorAll('.ctrl-row').forEach(row => {
    const input = row.querySelector('input[type=range]');
    const val = row.querySelector('.val');
    if (input && val) val.textContent = input.value + (input.max > 50 && input.min >= 50 ? '%' : 'px');
  });
  // Generate code
  const code = `.glass-card {\n  backdrop-filter: ${filter};\n  -webkit-backdrop-filter: ${filter};\n  background: ${bg};\n  border-radius: ${state.borderRadius}px;${state.borderWidth > 0 ? `\n  border: ${state.borderWidth}px solid ${hexToRgba(state.borderColor, 40)};` : ''}\n}`;
  $('#codeBox').textContent = code;
}

function copyCode() {
  copyText($('#codeBox').textContent);
}

renderPresets();
renderControls();
updatePreview();

GZ.renderToolPage({
  category: 'css',

    {icon:'✏️', href:'/css-tools/text-shadow.html', name:'Text Shadow'},
  ]
});
</script>
