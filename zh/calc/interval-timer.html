<script>
GZI18n.register({
  en: {
    toolTitle: 'Interval Workout Timer',
    toolDesc: 'Build custom HIIT, circuit, EMOM and AMRAP workouts with work/rest intervals, rounds and audio cues. Free interval timer that runs in your browser — no app, no signup.',

    pCircuit: 'Circuit',
    pStretch: 'Stretch',

    step2: 'Choose how many rounds to repeat the whole set, plus optional prep and between-round rest',
    step3: 'Press Start and follow the visual ring and audio cues through every phase',
    step4: 'Your setup is saved automatically — reload anytime to continue',
  },
  zh: {
    toolTitle: '间歇训练计时器',
    toolDesc: '自定义 HIIT、循环训练、EMOM 和 AMRAP 训练计划，设置训练/休息时长、轮数和音频提示。浏览器本地运行，免费、无需安装应用、无需注册。',
    labelWork: '训练',
    labelRest: '休息',
    labelPrep: '准备开始',
    labelDone: '完成',
    start: '开始',
    pause: '暂停',
    resume: '继续',
    reset: '重置',
    builderTitle: '训练计划构建',
    addInterval: '添加间歇',
    namePh: '间歇名称',
    secLbl: '秒',
    typeLbl: '类型',
    rounds: '轮数（重复整套）',
    prep: '预备倒计时（秒）',
    restRound: '轮间休息（秒）',
    sound: '声音提示',
    on: '开启',
    off: '关闭',
    interval: '间歇',
    round: '轮',
    total: '总时长',
    pHiit: 'HIIT 40/20',
    pPyramid: '金字塔 30/30',
    pCircuit: '循环训练',
    pStretch: '拉伸',
    step1: '添加或编辑间歇 — 设置名称、时长及训练或休息类型',
    step2: '选择整套重复的轮数，可设置预备倒计时和轮间休息',
    step3: '点击「开始」，跟随圆环和音频提示完成每个阶段',
    step4: '设置会自动保存 — 随时刷新即可继续',
  }
});

const { $, t } = GZ;
const CIRCUM = 2 * Math.PI * 125;

let CFG = {
  intervals: [{ name: 'Push', dur: 40, type: 'work' }, { name: 'Rest', dur: 20, type: 'rest' }],
  rounds: 5,
  prep: 10,
  restRound: 0,
  sound: 1,
};
try { const s = localStorage.getItem('gz-interval'); if (s) { const p = JSON.parse(s); if (Array.isArray(p.intervals) && p.intervals.length) Object.assign(CFG, p); } } catch(e) {}

const PRESETS = {
  hiit: { intervals: [{name:'Work',dur:40,type:'work'},{name:'Rest',dur:20,type:'rest'}], rounds: 8, prep: 10, restRound: 0, sound: 1 },
  pyramid: { intervals: [{name:'Work',dur:30,type:'work'},{name:'Rest',dur:30,type:'rest'}], rounds: 10, prep: 10, restRound: 0, sound: 1 },
  circuit: { intervals: [
    {name:'Squats',dur:45,type:'work'},{name:'Rest',dur:15,type:'rest'},
    {name:'Push-ups',dur:45,type:'work'},{name:'Rest',dur:15,type:'rest'},
    {name:'Sit-ups',dur:45,type:'work'},{name:'Rest',dur:15,type:'rest'},
  ], rounds: 3, prep: 10, restRound: 60, sound: 1 },
  stretch: { intervals: [
    {name:'Hamstring',dur:30,type:'work'},{name:'Switch',dur:5,type:'rest'},
    {name:'Quad',dur:30,type:'work'},{name:'Switch',dur:5,type:'rest'},
    {name:'Hip',dur:30,type:'work'},{name:'Switch',dur:5,type:'rest'},
  ], rounds: 2, prep: 10, restRound: 0, sound: 1 },
};

let state = {
  phase: 'idle',   // idle | prep | work | rest | restRound | done
  idx: 0,          // current interval index
  round: 1,
  remaining: 0,
  total: 0,
  running: false,
  timer: null,
};

// Audio
let actx = null;
function beep(freq, dur, vol) {
  if (+CFG.sound === 0) return;
  try {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.frequency.value = freq || 880;
    o.type = 'sine';
    g.gain.value = vol || 0.18;
    o.connect(g); g.connect(actx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + (dur || 0.18));
    o.stop(actx.currentTime + (dur || 0.18));
  } catch(e) {}
}
const cueWork = () => beep(880, 0.25, 0.22);
const cueRest = () => beep(440, 0.25, 0.22);
const cueCount = () => beep(660, 0.07, 0.12);
const cueEnd = () => { beep(660, 0.12, 0.2); setTimeout(() => beep(880, 0.4, 0.25), 140); };

function fmt(sec) {
  sec = Math.max(0, Math.ceil(sec));
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function totalTime() {
  const per = CFG.intervals.reduce((a,i)=>a+(+i.dur||0), 0);
  const between = CFG.restRound * Math.max(0, CFG.rounds - 1);
  return CFG.prep + per * CFG.rounds + between;
}

function currentInterval() {
  return CFG.intervals[state.idx] || CFG.intervals[0];
}

function labelFor(phase) {
  if (phase === 'prep') return t('labelPrep');
  if (phase === 'restRound') return t('labelRest');
  if (phase === 'done') return t('labelDone');
  const it = currentInterval();
  return (it && it.name) ? it.name : (phase === 'rest' ? t('labelRest') : t('labelWork'));
}

function render() {
  const ph = state.phase;
  $('#label').textContent = labelFor(ph);
  $('#label').className = 'iv-label ' + (ph === 'rest' || ph === 'restRound' ? 'rest' : ph === 'prep' ? 'prep' : ph === 'done' ? 'done' : 'work');
  $('#time').textContent = fmt(state.remaining);
  $('#ring').className = 'iv-ring ' + (ph === 'rest' || ph === 'restRound' ? 'rest' : ph === 'prep' ? 'prep' : ph === 'done' ? 'done' : '');
  const offset = CIRCUM * (1 - (state.total > 0 ? state.remaining / state.total : 0));
  $('#arc').style.strokeDashoffset = offset;
  $('#statInt').textContent = (state.idx + 1) + '/' + CFG.intervals.length;
  $('#statRound').textContent = state.round + '/' + CFG.rounds;
  $('#statTotal').textContent = fmt(totalTime());
  document.title = (state.running ? fmt(state.remaining) + ' · ' : '') + labelFor(ph) + ' — Interval Timer';
  $('#btnStart').textContent = state.running ? t('pause') : (ph === 'idle' || ph === 'done' ? t('start') : t('resume'));
}

function buildIntList() {
  const parts = CFG.intervals.map(i => `${i.name} ${i.dur}s`);
  $('#intList').textContent = parts.join('  ·  ') + (CFG.rounds > 1 ? `  × ${CFG.rounds}` : '');
}

function setPhase(phase, total) {
  state.phase = phase;
  state.total = Math.max(1, total);
  state.remaining = state.total;
  render();
}

function tick() {
  if (!state.running) return;
  state.remaining--;
  if (state.remaining === 3 || state.remaining === 2 || state.remaining === 1) cueCount();
  if (state.remaining <= 0) advance();
  else render();
}

function advance() {
  const ph = state.phase;
  if (ph === 'prep') {
    enterInterval(0, 1);
    return;
  }
  if (ph === 'restRound') {
    enterInterval(0, state.round + 1);
    return;
  }
  // work or rest -> next interval
  if (state.idx < CFG.intervals.length - 1) {
    enterInterval(state.idx + 1, state.round);
    return;
  }
  // end of set
  if (state.round < CFG.rounds) {
    if (CFG.restRound > 0) {
      setPhase('restRound', CFG.restRound);
      cueRest();
      return;
    }
    enterInterval(0, state.round + 1);
    return;
  }
  finish();
}

function enterInterval(idx, round) {
  state.idx = idx;
  state.round = round;
  const it = CFG.intervals[idx];
  const phase = it.type === 'rest' ? 'rest' : 'work';
  setPhase(phase, Math.max(1, +it.dur || 10));
  if (phase === 'work') cueWork(); else cueRest();
}

function finish() {
  state.running = false;
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
  state.phase = 'done';
  state.remaining = 0;
  state.total = 0;
  cueEnd();
  render();
}

function start() {
  if (state.phase === 'done' || state.phase === 'idle') {
    state.idx = 0; state.round = 1;
    if (CFG.prep > 0) {
      setPhase('prep', CFG.prep);
    } else {
      enterInterval(0, 1);
    }
  }
  state.running = true;
  if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
  if (actx && actx.state === 'suspended') actx.resume();
  if (state.timer) clearInterval(state.timer);
  state.timer = setInterval(tick, 1000);
  render();
}

function pause() {
  state.running = false;
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
  render();
}

function reset() {
  state.running = false;
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
  state.phase = 'idle';
  state.idx = 0;
  state.round = 1;
  const first = CFG.intervals[0] || { dur: 30 };
  state.total = Math.max(1, +first.dur || 30);
  state.remaining = state.total;
  render();
  buildIntList();
}

// Builder
function renderRows() {
  const html = CFG.intervals.map((iv, i) => `
    <div class="iv-row" data-i="${i}">
      <input class="iv-name" type="text" placeholder="${t('namePh')}" value="${escapeAttr(iv.name)}">
      <input class="iv-dur" type="number" min="1" max="3600" value="${iv.dur}">
      <select class="iv-type">
        <option value="work"${iv.type==='work'?' selected':''}>${t('labelWork')}</option>
        <option value="rest"${iv.type==='rest'?' selected':''}>${t('labelRest')}</option>
      </select>
      <button class="iv-del" title="×">×</button>
    </div>`).join('');
  $('#rows').innerHTML = html;
  $('#rows').querySelectorAll('.iv-row').forEach(row => {
    const i = +row.dataset.i;
    row.querySelector('.iv-name').addEventListener('input', e => { CFG.intervals[i].name = e.target.value; saveCfg(); buildIntList(); });
    row.querySelector('.iv-dur').addEventListener('input', e => { CFG.intervals[i].dur = Math.max(1, +e.target.value || 1); saveCfg(); if(state.phase==='idle'||state.phase==='done') reset(); else buildIntList(); });
    row.querySelector('.iv-type').addEventListener('change', e => { CFG.intervals[i].type = e.target.value; saveCfg(); });
    row.querySelector('.iv-del').addEventListener('click', () => {
      if (CFG.intervals.length <= 1) return;
      CFG.intervals.splice(i, 1);
      saveCfg(); renderRows(); reset();
    });
  });
}

function escapeAttr(s){ return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function addInterval() {
  CFG.intervals.push({ name: 'Rest', dur: 20, type: 'rest' });
  saveCfg(); renderRows(); reset();
}

function saveCfg() { try { localStorage.setItem('gz-interval', JSON.stringify(CFG)); } catch(e) {} }

function applyPreset(key) {
  const p = PRESETS[key];
  if (!p) return;
  CFG = JSON.parse(JSON.stringify(p));
  saveCfg();
  syncOpts();
  renderRows();
  reset();
  document.querySelectorAll('.iv-chip').forEach(c => c.classList.toggle('active', c.dataset.preset === key));
}

function syncOpts() {
  $('#optRounds').value = CFG.rounds;
  $('#optPrep').value = CFG.prep;
  $('#optRestRound').value = CFG.restRound;
  $('#optSound').value = String(CFG.sound);
}

// Labels
$('#builderTitle').textContent = t('builderTitle');
$('#addLbl').textContent = t('addInterval');
$('#lblRounds').textContent = t('rounds');
$('#lblPrep').textContent = t('prep');
$('#lblRestRound').textContent = t('restRound');
$('#lblSound').textContent = t('sound');
$('#sndOn').textContent = t('on');
$('#sndOff').textContent = t('off');
$('#statIntLbl').textContent = t('interval');
$('#statRoundLbl').textContent = t('round');
$('#statTotalLbl').textContent = t('total');

// Presets
$('#presets').innerHTML = [
  ['hiit', t('pHiit')],
  ['pyramid', t('pPyramid')],
  ['circuit', t('pCircuit')],
  ['stretch', t('pStretch')],
].map(([k,n]) => `<button class="iv-chip" data-preset="${k}">${n}</button>`).join('');
document.querySelectorAll('.iv-chip').forEach(c => c.addEventListener('click', () => applyPreset(c.dataset.preset)));

// Wire
$('#btnStart').addEventListener('click', () => state.running ? pause() : start());
$('#btnReset').addEventListener('click', reset);
$('#btnAdd').addEventListener('click', addInterval);
$('#optRounds').addEventListener('change', e => { CFG.rounds = Math.max(1, +e.target.value || 1); saveCfg(); reset(); });
$('#optPrep').addEventListener('change', e => { CFG.prep = Math.max(0, +e.target.value || 0); saveCfg(); });
$('#optRestRound').addEventListener('change', e => { CFG.restRound = Math.max(0, +e.target.value || 0); saveCfg(); reset(); });
$('#optSound').addEventListener('change', e => { CFG.sound = +e.target.value; saveCfg(); });

syncOpts();
renderRows();
reset();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔥', href:'/calc/tabata-timer.html', name:'Tabata Timer'},
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro Timer'},
    {icon:'⏱️', href:'/calc/timer-stopwatch.html', name:'Timer & Stopwatch'},
    {icon:'❤️', href:'/calc/heart-rate-zones.html', name:'Heart Rate Zones'},
    {icon:'🏃', href:'/calc/race-time-predictor.html', name:'Race Time Predictor'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
