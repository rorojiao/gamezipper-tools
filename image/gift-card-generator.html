<script>
GZI18n.register({
  en: {
    toolTitle: 'Gift Card Generator',
    toolDesc: 'Create custom gift cards and vouchers with your brand, amount, recipient and message. Download as PNG or print. 100% in-browser.',
    brand: 'Brand / Store name',
    amount: 'Gift amount',
    recipient: 'Recipient name (optional)',
    message: 'Personal message (optional)',
    expiry: 'Expiry date (optional)',
    code: 'Card code (optional)',
    theme: 'Theme',
    preview: 'Preview',
    download: 'Download PNG', print: 'Print', clear: 'Reset',
    copied: 'Done!',
    step1: 'Enter your brand name and gift amount',
    step2: 'Add recipient name and personal message',
    step3: 'Choose a color theme',
    step4: 'Download as PNG or Print directly',
  },
  zh: {
    toolTitle: '礼品卡生成器',
    toolDesc: '创建自定义礼品卡和代金券，包含品牌、金额、收件人和留言。下载为 PNG 或打印。100% 浏览器本地运行。',
    brand: '品牌 / 商店名称',
    amount: '礼品金额',
    recipient: '收件人姓名（可选）',
    message: '个人留言（可选）',
    expiry: '有效期（可选）',
    code: '卡号（可选）',
    theme: '主题',
    preview: '预览',
    download: '下载 PNG', print: '打印', clear: '重置',
    copied: '完成！',
    step1: '输入品牌名称和礼品金额',
    step2: '添加收件人姓名和个人留言',
    step3: '选择颜色主题',
    step4: '下载为 PNG 或直接打印',
  }
});

const { $, t, showToast } = GZ;

const THEMES = [
  {name:'Royal Purple', bg:'linear-gradient(135deg,#667eea,#764ba2)'},
  {name:'Ocean Blue', bg:'linear-gradient(135deg,#0066ff,#00d4ff)'},
  {name:'Sunset Orange', bg:'linear-gradient(135deg,#ff6b6b,#ee5a24)'},
  {name:'Forest Green', bg:'linear-gradient(135deg,#11998e,#38ef7d)'},
  {name:'Rose Gold', bg:'linear-gradient(135deg,#f093fb,#f5576c)'},
  {name:'Midnight', bg:'linear-gradient(135deg,#0f0c29,#302b63)'},
  {name:'Cherry Red', bg:'linear-gradient(135deg,#eb3349,#f45c43)'},
  {name:'Teal', bg:'linear-gradient(135deg,#4ecdc4,#44a08d)'},
];

let currentTheme = 0;

function renderThemes(){
  $('#themeGrid').innerHTML = THEMES.map((th,i) =>
    `<div class="theme-btn ${i===currentTheme?'active':''}" style="background:${th.bg}" onclick="setTheme(${i})" title="${th.name}"></div>`
  ).join('');
}

function setTheme(i){
  currentTheme = i;
  renderThemes();
  updatePreview();
}

function updatePreview(){
  const brand = $('#brand').value || 'My Store';
  const amount = $('#amount').value || '$0.00';
  const recipient = $('#recipient').value;
  const message = $('#message').value;
  const expiry = $('#expiry').value;
  const code = $('#code').value;

  $('#cardPreview').style.background = THEMES[currentTheme].bg;
  $('#cardBrand').textContent = brand;
  $('#cardAmount').textContent = amount;
  $('#cardRecipient').textContent = recipient || '';
  $('#cardMessage').textContent = message || '';
  $('#cardExpiry').innerHTML = expiry ? `Valid until<br>${expiry}` : '';
  if(code){
    $('#cardExpiry').innerHTML = (expiry ? `Valid until ${expiry}<br>` : '') + `Code: ${code}`;
  }
}

['brand','amount','recipient','message','expiry','code'].forEach(id => {
  $('#'+id).addEventListener('input', updatePreview);
});

function downloadPNG(){
  const card = $('#cardPreview');
  // Use html2canvas-like approach with SVG foreignObject
  const w = 400, h = 250;
  const data = new XMLSerializer().serializeToString(card);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}">
    <foreignObject width="100%" height="100%">${data}</foreignObject></svg>`;
  const blob = new Blob([svg], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = w * 2;
    canvas.height = h * 2;
    const ctx = canvas.getContext('2d');
    ctx.scale(2, 2);
    ctx.drawImage(img, 0, 0);
    canvas.toBlob(blob => {
      const dl = document.createElement('a');
      dl.href = URL.createObjectURL(blob);
      dl.download = 'gift-card.png';
      dl.click();
      URL.revokeObjectURL(dl.href);
    });
    URL.revokeObjectURL(url);
  };
  img.src = url;
  showToast(t('copied'));
}

function doPrint(){ window.print(); }
function doReset(){
  $('#brand').value='My Store'; $('#amount').value='$50.00';
  $('#recipient').value=''; $('#message').value='';
  $('#expiry').value=''; $('#code').value='';
  updatePreview();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadPNG()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doPrint()">${t('print')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doReset()">${t('clear')}</button>`;

GZ.renderToolPage({
  category:'image',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'🎫',href:'/text/coupon-code-generator.html',name:'Coupon Generator'},
    {icon:'🏷️',href:'/image/barcode-label-maker.html',name:'Barcode Label Maker'},
    {icon:'🎨',href:'/image/logo-maker.html',name:'Logo Maker'},
    {icon:'🖼️',href:'/image/poster-maker.html',name:'Poster Maker'},
  ]
});

document.querySelector('label#lbl-brand').textContent = t('brand');
document.querySelector('label#lbl-amount').textContent = t('amount');
document.querySelector('label#lbl-recipient').textContent = t('recipient');
document.querySelector('label#lbl-message').textContent = t('message');
document.querySelector('label#lbl-expiry').textContent = t('expiry');
document.querySelector('label#lbl-code').textContent = t('code');
document.querySelector('label#lbl-theme').textContent = t('theme');
document.querySelector('label#lbl-preview').textContent = t('preview');
renderThemes();
updatePreview();
</script>
<script src="/tools-result-rec.js" defer></script>
