<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is the formula for force?","acceptedAnswer":{"@type":"Answer","text":"Force is calculated using Newton's second law: F = m × a, where F is force in Newtons (N), m is mass in kilograms (kg), and a is acceleration in meters per second squared (m/s²)."}},{"@type":"Question","name":"What is a Newton (N)?","acceptedAnswer":{"@type":"Answer","text":"One Newton is the force needed to accelerate 1 kilogram of mass at 1 meter per second squared. 1 N = 1 kg·m/s². For reference, 1 Newton ≈ 0.225 pounds of force."}},{"@type":"Question","name":"How do I calculate mass from force and acceleration?","acceptedAnswer":{"@type":"Answer","text":"Rearrange F = ma to solve for mass: m = F / a. For example, if a force of 50 N causes an acceleration of 10 m/s², the mass is 50/10 = 5 kg."}},{"@type":"Question","name":"What is the relationship between force, mass, and acceleration?","acceptedAnswer":{"@type":"Answer","text":"Force is directly proportional to both mass and acceleration. Doubling the mass doubles the force (at constant acceleration), and doubling the acceleration doubles the force (at constant mass)."}}]}</script>

<script>
GZI18n.register({
  en:{toolTitle:'Force Calculator (F = ma)',toolDesc:"Calculate force, mass, or acceleration using Newton's second law F = ma. Supports Newtons, kg, lbs, m/s², ft/s², and g-force units.",
    step1:'Choose what to solve for: Force, Mass, or Acceleration',step2:'Enter the two known values with their units',step3:'The calculator applies F = ma (or rearranged) instantly',step4:'View the result with unit conversions',
    solveForce:'Solve for Force',solveMass:'Solve for Mass',solveAcc:'Solve for Acceleration',
    lblForce:'Force (F)',lblMass:'Mass (m)',lblAcc:'Acceleration (a)',
    hResult:'📊 Result',
    force:'Force',mass:'Acceleration',acc:'Acceleration',
    gravityNote:'(Earth gravity = 9.80665 m/s² = 1 g)'},
  zh:{toolTitle:'力计算器 (F = ma)',toolDesc:'使用牛顿第二定律 F = ma 计算力、质量或加速度。支持牛顿、千克、磅、m/s²、ft/s² 和 g 力单位。',
    step1:'选择要计算的量：力、质量或加速度',step2:'输入两个已知值及其单位',step3:'计算器自动应用 F = ma（或变形公式）',step4:'查看结果及单位换算',
    solveForce:'计算力',solveMass:'计算质量',solveAcc:'计算加速度',
    lblForce:'力 (F)',lblMass:'质量 (m)',lblAcc:'加速度 (a)',
    hResult:'📊 计算结果',
    force:'力',mass:'加速度',acc:'加速度',
    gravityNote:'(地球重力 = 9.80665 m/s² = 1 g)'}
});
const{$,t}=GZ;
const round=(v,d=4)=>{if(!isFinite(v))return'—';const p=Math.pow(10,d);return(Math.round(v*p)/p).toString();};
// Mass units to kg
const MASS={kg:1,g:0.001,lb:0.453592,oz:0.0283495,ton:1000};
const MASS_LBL={kg:'kg',g:'g',lb:'lb',oz:'oz',ton:'t'};
// Acceleration units to m/s²
const ACC={mps2:1,g:9.80665,fps2:0.3048};
const ACC_LBL={mps2:'m/s²',g:'g',fps2:'ft/s²'};
// Force units to Newtons
const FORCE={N:1,kN:1000,lbf:4.44822,dyne:0.00001};
const FORCE_LBL={N:'N',kN:'kN',lbf:'lbf',dyne:'dyn'};
let solveFor='force';
function sel(opts,labels,def){return`<select>${Object.keys(opts).map(u=>`<option value="${u}"${u===def?' selected':''}>${labels[u]}</option>`).join('')}</select>`;}
function field(id,label,val,unitOpts,unitLbls,unitDef){return`<div class="fc-field"><label>${label}</label><div class="row"><input type="number" id="${id}" value="${val}" step="any">${sel(unitOpts,unitLbls,unitDef).replace('<select>',`<select id="${id}Unit">`)}</div></div>`;}
function renderInputs(){
  if(solveFor==='force'){
    $('#inputGrid').innerHTML=field('mass',t('lblMass'),'5',MASS,MASS_LBL,'kg')+field('acc',t('lblAcc'),'9.8',ACC,ACC_LBL,'mps2');
    $('#formulaBox').textContent='F = m × a';
  }else if(solveFor==='mass'){
    $('#inputGrid').innerHTML=field('force',t('lblForce'),'49',FORCE,FORCE_LBL,'N')+field('acc',t('lblAcc'),'9.8',ACC,ACC_LBL,'mps2');
    $('#formulaBox').textContent='m = F / a';
  }else{
    $('#inputGrid').innerHTML=field('force',t('lblForce'),'49',FORCE,FORCE_LBL,'N')+field('mass',t('lblMass'),'5',MASS,MASS_LBL,'kg');
    $('#formulaBox').textContent='a = F / m';
  }
  ['force','mass','acc'].forEach(id=>{const el=$('#'+id);if(el)el.addEventListener('input',compute);const eu=$('#'+id+'Unit');if(eu)eu.addEventListener('change',compute);});
  compute();
}
function compute(){
  if(solveFor==='force'){
    const m=(parseFloat($('#mass').value)||0)*MASS[$('#massUnit').value];
    const a=(parseFloat($('#acc').value)||0)*ACC[$('#accUnit').value];
    const fN=m*a;
    $('#resultOut').innerHTML=`
      <div class="row"><span class="k">${t('lblForce')}</span><span class="v">${round(fN,4)} N</span></div>
      <div class="row"><span class="k">=</span><span class="v">${round(fN/1000,4)} kN</span></div>
      <div class="row"><span class="k">=</span><span class="v">${round(fN/4.44822,4)} lbf</span></div>
      <div class="row"><span class="k">=</span><span class="v">${round(fN/0.00001,2)} dyn</span></div>
      <div class="row" style="margin-top:8px;font-size:.85em;color:var(--text2)">${t('gravityNote')}</div>
    `;
  }else if(solveFor==='mass'){
    const fN=(parseFloat($('#force').value)||0)*FORCE[$('#forceUnit').value];
    const a=(parseFloat($('#acc').value)||0)*ACC[$('#accUnit').value];
    const mKg=a!==0?fN/a:0;
    $('#resultOut').innerHTML=`
      <div class="row"><span class="k">${t('lblMass')}</span><span class="v">${round(mKg,4)} kg</span></div>
      <div class="row"><span class="k">=</span><span class="v">${round(mKg*1000,2)} g</span></div>
      <div class="row"><span class="k">=</span><span class="v">${round(mKg/0.453592,4)} lb</span></div>
      <div class="row"><span class="k">=</span><span class="v">${round(mKg/0.0283495,2)} oz</span></div>
    `;
  }else{
    const fN=(parseFloat($('#force').value)||0)*FORCE[$('#forceUnit').value];
    const m=(parseFloat($('#mass').value)||0)*MASS[$('#massUnit').value];
    const a=m!==0?fN/m:0;
    $('#resultOut').innerHTML=`
      <div class="row"><span class="k">${t('lblAcc')}</span><span class="v">${round(a,4)} m/s²</span></div>
      <div class="row"><span class="k">=</span><span class="v">${round(a/9.80665,4)} g</span></div>
      <div class="row"><span class="k">=</span><span class="v">${round(a/0.3048,4)} ft/s²</span></div>
    `;
  }
}
$('#solveTabs').innerHTML=['force','mass','acc'].map(s=>{const key=s==='force'?'solveForce':(s==='mass'?'solveMass':'solveAcc');return`<button data-solve="${s}" class="${s==='force'?'active':''}" id="tab_${s}">${t(key)}</button>`;}).join('');
['force','mass','acc'].forEach(s=>{$('#tab_'+s).addEventListener('click',()=>{solveFor=s;['force','mass','acc'].forEach(x=>$('#tab_'+x).classList.toggle('active',x===s));renderInputs();});});
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="compute()">${t('calculate')}</button><button class="gz-btn gz-btn-secondary" onclick="GZ.copyText($('#resultOut').innerText)">${t('copy')}</button>`;
renderInputs();
GZ.renderToolPage({
  category:'calc',titleKey:'toolTitle',descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'⚡',href:'/calc/kinetic-energy-calculator.html',name:'Kinetic Energy'},
    {icon:'🚀',href:'/calc/acceleration-calculator.html',name:'Acceleration'},
    {icon:'🧲',href:'/calc/newtons-second-law-calculator.html',name:"Newton's 2nd Law"},
    {icon:'🧮',href:'/calc/scientific-calculator.html',name:'Scientific Calculator'}
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
