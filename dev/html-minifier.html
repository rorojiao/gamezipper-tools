const { $, copyText, t } = GZ;

function minifyHTML(html) {
  let result = html;
  // Remove HTML comments (but keep conditional comments)
  result = result.replace(/<!--(?!\[if)[\s\S]*?-->/g, '');
  // Collapse whitespace between tags
  result = result.replace(/\s+/g, ' ');
  // Remove whitespace around tags
  result = result.replace(/>\s+</g, '><');
  // Remove whitespace at start/end
  result = result.trim();
  // Preserve whitespace in pre, textarea, script tags content
  return result;
}

function beautifyHTML(html) {
  let result = html;
  let indent = 0;
  const tab = '  ';
  // Remove existing formatting
  result = result.replace(/>\s+</g, '><').trim();
  // Add newlines around block tags
  const blockTags = ['div','p','section','article','header','footer','nav','main','aside','h1','h2','h3','h4','h5','h6','ul','ol','li','table','thead','tbody','tr','td','th','form','fieldset','head','body','html','style','script','link','meta','title'];
  let lines = [];
  let current = '';
  let inTag = false;
  let inContent = false;

  // Simple beautifier using regex
  result = result.replace(/></g, '>\n<');
  const rawLines = result.split('\n');
  result = rawLines.map(line => {
    line = line.trim();
    if (!line) return '';
    // Closing tag
    if (/^<\//.test(line)) indent = Math.max(0, indent - 1);
    const indented = tab.repeat(indent) + line;
    // Opening tag (not self-closing, not closing)
    if (/^<[a-zA-Z]/.test(line) && !/^<\//.test(line) && !/\/>$/.test(line) && !/^<(br|hr|img|input|meta|link|area|base|col|embed|source|track|wbr)/i.test(line)) {
      indent++;
    }
    return indented;
  }).join('\n');
  return result;
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  return (bytes / 1024).toFixed(1) + ' KB';
}

function doMinify() {
  const inp = $('#input').value;
  if (!inp.trim()) return;
  const minified = minifyHTML(inp);
  $('#output').textContent = minified;
  const origSize = new Blob([inp]).size;
  const minSize = new Blob([minified]).size;
  const saved = origSize > 0 ? ((1 - minSize / origSize) * 100).toFixed(1) : 0;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('original')}: ${formatBytes(origSize)} → ${t('minified')}: ${formatBytes(minSize)} (${saved}% ${t('saved')})</span>`;
}

function doBeautify() {
  const inp = $('#input').value;

}
