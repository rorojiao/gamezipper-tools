<script>

  en: {

    warn: '⚠️ <b>FOR TESTING ONLY.</b> These numbers are mathematically valid (pass Luhn) but are NOT real and cannot be used for any payment. They are for QA, development and educational use only.',

    step3: 'Toggle CVV and expiry to include them with each card',
    step4: 'Copy individual cards or use Copy All for a clean list',
  },
  zh: {
    toolTitle: '测试信用卡号生成器',
    toolDesc: '为 QA、测试和表单验证生成数学上有效的测试信用卡号。支持 Visa、Mastercard、Amex、Discover、JCB、Diners 和 UnionPay — 每个号码都通过 Luhn 校验。不能用于真实支付。',
    warn: '⚠️ <b>仅供测试。</b> 这些号码在数学上有效（通过 Luhn 校验），但并非真实卡号，不能用于任何支付。仅用于 QA、开发和教学用途。',
    count: '生成数量：',
    cvv: '含 CVV',
    exp: '含有效期',
    generate: '生成',
    copyAll: '复制全部（仅卡号）',
    clear: '清除',
    valid: 'Luhn ✓',
    invalid: 'Luhn ✗',
    brand: '品牌',
    expiry: '有效期',
    cvvLbl: 'CVV',
    step1: '选择一个或多个卡品牌（Visa、Mastercard、Amex 等）',
    step2: '选择生成数量（1–50）',
    step3: '勾选 CVV 和有效期以包含在每张卡上',
    step4: '单独复制某张卡或使用「复制全部」获取完整列表',
  }
});

const { $, copyText, t } = GZ;

const BRANDS = [
  { id: 'visa', label: 'Visa', prefixes: ['4'], length: 16, cvv: 3 },
  { id: 'mastercard', label: 'Mastercard', prefixes: ['51','52','53','54','55','2221','2222','2720'], length: 16, cvv: 3 },
  { id: 'amex', label: 'Amex', prefixes: ['34','37'], length: 15, cvv: 4 },
  { id: 'discover', label: 'Discover', prefixes: ['6011','644','645','646','647','648','649','65'], length: 16, cvv: 3 },
  { id: 'jcb', label: 'JCB', prefixes: ['3528','3589','3530','3560'], length: 16, cvv: 3 },
  { id: 'diners', label: 'Diners', prefixes: ['300','301','302','303','304','305','36','38','39'], length: 14, cvv: 3 },
  { id: 'unionpay', label: 'UnionPay', prefixes: ['62','88'], length: 16, cvv: 3 },
];

let selected = { visa: true, mastercard: true, amex: true, discover: false, jcb: false, diners: false, unionpay: false };

function renderBrands() {
  $('#brands').innerHTML = BRANDS.map(b =>
    `<label class="${selected[b.id] ? 'on' : ''}" data-id="${b.id}">
      <input type="checkbox" ${selected[b.id] ? 'checked' : ''}> ${b.label}
    </label>`).join('');
  $('#brands').querySelectorAll('label').forEach(l => {
    l.addEventListener('click', e => {
      e.preventDefault();
      const id = l.dataset.id;
      selected[id] = !selected[id];
      renderBrands();
    });
  });
}

function luhnChecksum(numStr) {
  let sum = 0, alt = false;
  for (let i = numStr.length - 1; i >= 0; i--) {
    let d = parseInt(numStr[i], 10);
    if (alt) { d *= 2; if (d > 9) d -= 9; }
    sum += d;
    alt = !alt;
  }
  return sum;
}

function isValidLuhn(numStr) {
  return luhnChecksum(numStr) % 10 === 0;
}

function genNumber(brand) {
  const prefix = brand.prefixes[Math.floor(Math.random() * brand.prefixes.length)];
  // Body length = total length - prefix length - 1 (last is check digit)
  const bodyLen = brand.length - prefix.length - 1;
  let partial = prefix;
  const arr = new Uint32Array(bodyLen);
  crypto.getRandomValues(arr);
  for (let i = 0; i < bodyLen; i++) partial += (arr[i] % 10).toString();
  // Compute Luhn check digit
  let sum = 0, alt = true; // check digit position is parity for partial+check
  for (let i = partial.length - 1; i >= 0; i--) {
    let d = parseInt(partial[i], 10);
    if (alt) { d *= 2; if (d > 9) d -= 9; }
    sum += d;
    alt = !alt;
  }
  const check = (10 - (sum % 10)) % 10;
  return partial + check.toString();
}

function formatNumber(numStr) {
  // Amex 4-6-5, others 4-4-4-4
  if (numStr.length === 15) {
    return numStr.slice(0,4) + ' ' + numStr.slice(4,10) + ' ' + numStr.slice(10);
  }
  return numStr.replace(/(.{4})/g, '$1 ').trim();
}

function genExpiry() {
  const month = 1 + Math.floor(Math.random() * 12);
  const year = 26 + Math.floor(Math.random() * 8); // 2026-2033
  return (month < 10 ? '0' : '') + month + '/' + year;
}

function genCvv(len) {
  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  let s = '';
  for (let i = 0; i < len; i++) s += (arr[i] % 10).toString();
  return s;
}

function generate() {
  const chosen = BRANDS.filter(b => selected[b.id]);
  if (!chosen.length) { $('#result').innerHTML = ''; return; }
  const count = parseInt($('#count').value, 10);
  const wantCvv = $('#chk-cvv').checked;
  const wantExp = $('#chk-exp').checked;
  let html = '';
  const allNumbers = [];
  for (let i = 0; i < count; i++) {
    const brand = chosen[i % chosen.length];
    const num = genNumber(brand);
    const valid = isValidLuhn(num);
    allNumbers.push(num);
    const meta = [];
    if (wantExp) meta.push(`${t('expiry')}: <b>${genExpiry()}</b>`);
    if (wantCvv) meta.push(`${t('cvvLbl')}: <b>${genCvv(brand.cvv)}</b>`);
    meta.push(`<span class="${valid ? 'luhn-ok' : 'luhn-bad'}">${valid ? t('valid') : t('invalid')}</span>`);
    html += `
      <div class="card">
        <div class="brand">${brand.label}</div>
        <div class="meta">${meta.join(' &nbsp;|&nbsp; ')}</div>
        <div class="num">${formatNumber(num)}</div>
        <div class="acts">
          <button onclick="copyText('${num}')">${t('copy')} #</button>
          <button onclick="copyText('${num}${wantCvv ? '|CVV:' + '' : ''}${wantExp ? '|EXP' : ''}')">${t('copy')} 📋</button>
        </div>
      </div>`;
  }
  $('#result').innerHTML = html;
  // Stash the full list for Copy All
  window._allNumbers = allNumbers;
}

function copyAll() {
  if (window._allNumbers && window._allNumbers.length) {
    copyText(window._allNumbers.join('\n'));
  }
}

function clearAll() { $('#result').innerHTML = ''; window._allNumbers = []; }

$('#warn').innerHTML = t('warn');
$('#lbl-count').textContent = t('count');
$('#lbl-cvv').textContent = t('cvv');
$('#lbl-exp').textContent = t('exp');
renderBrands();

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyAll()">${t('copyAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;

generate();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔑', href:'/dev/password-generator.html', name:'Password Gen'},
    {icon:'🆔', href:'/dev/uuid.html', name:'UUID Gen'},
    {icon:'#️⃣', href:'/dev/hash.html', name:'Hash Gen'},
    {icon:'🔐', href:'/dev/base64.html', name:'Base64'},
  ]
});
</script>
