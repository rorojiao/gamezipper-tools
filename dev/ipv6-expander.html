const { $, copyText, t } = GZ;

function parseIPv6(str) {
  str = String(str).trim();
  if (!str) return null;
  let ip = str;
  let zoneIdx = ip.indexOf('%');
  let zone = '';
  if (zoneIdx >= 0) { zone = ip.substring(zoneIdx); ip = ip.substring(0, zoneIdx); }

  if (ip === '::') ip = '::0';
  if (!/^([0-9a-fA-F]{1,4}|:)+$/i.test(ip.replace(/\./g, ':')) && ip.indexOf('.') < 0) return null;

  const doubleColon = ip.match(/::/g);
  if (doubleColon && doubleColon.length > 1) return null;

  let v4 = null;
  const v4Match = ip.match(/((?:\d{1,3}\.){3}\d{1,3})$/);
  if (v4Match) {
    const octs = v4Match[1].split('.').map(Number);
    if (octs.some(o => o > 255)) return null;
    v4 = v4Match[1];
    ip = ip.substring(0, ip.length - v4.length);
    const hi = (octs[0] << 8) | octs[1];
    const lo = (octs[2] << 8) | octs[3];
    ip += hi.toString(16) + ':' + lo.toString(16);
  }

  let groups;
  if (ip.includes('::')) {
    const parts = ip.split('::');
    const head = parts[0] ? parts[0].split(':') : [];
    const tail = parts[1] ? parts[1].split(':') : [];
    const need = 8 - head.length - tail.length;
    if (need < 0) return null;
    groups = head.concat(Array(need).fill('0'), tail);
  } else {
    groups = ip.split(':');
  }
  if (groups.length !== 8) return null;
  for (const g of groups) {
    if (!/^[0-9a-fA-F]{1,4}$/.test(g)) return null;
  }
  const full = groups.map(g => g.padStart(4, '0').toLowerCase());
  return { full, zone, v4 };
}

function compress(groups) {
  const g = groups.slice();
  let bestStart = -1, bestLen = 0, curStart = -1, curLen = 0;
  for (let i = 0; i < g.length; i++) {
    if (g[i] === '0000') {
      if (curStart < 0) curStart = i;
      curLen++;
      if (curLen > bestLen) { bestLen = curLen; bestStart = curStart; }
    } else { curStart = -1; curLen = 0; }
  }
  const trimmed = g.map(x => x.replace(/^0+/, '') || '0');
  let out;
  if (bestLen >= 2) {
    const before = trimmed.slice(0, bestStart);
    const after = trimmed.slice(bestStart + bestLen);
    out = before.join(':') + '::' + after.join(':');
  } else {
    out = trimmed.join(':');
  }
  return out.replace(/::+/g, '::').replace(/^:::/, '::').replace(/:$/, '');
}

function convert() {
  const raw = $('#input').value.trim();
  if (!raw) { $('#expanded').textContent = ''; $('#compressed').textContent = ''; $('#breakdown').innerHTML = ''; $('#status').innerHTML = ''; return; }
  const parsed = parseIPv6(raw);
  if (!parsed) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalid')}</span>`;
    $('#expanded').textContent = ''; $('#compressed').textContent = ''; $('#breakdown').innerHTML = '';
    return;
  }
  const fullStr = parsed.full.join(':') + parsed.zone;
  const compStr = compress(parsed.full) + parsed.zone;
  $('#expanded').textContent = fullStr;
  $('#compressed').textContent = compStr;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ Valid IPv6${parsed.v4 ? ' (embedded IPv4: ' + parsed.v4 + ')' : ''}</span>`;
  $('#breakdown').innerHTML = parsed.full.map((g, i) => `<span class="ip-group">${i+1}: ${g}</span>`).join(' ');
}

$('#input').addEventListener('input', convert);
$('#copy-full').onclick = () => copyText($('#expanded').textContent);
$('#copy-comp').onclick = () => copyText($('#compressed').textContent);

$('#toolbar').innerHTML = `
