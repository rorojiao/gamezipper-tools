<script>
GZI18n.register({
  en: {
    toolTitle: 'Image Blender',
    toolDesc: 'Blend two images together with 20+ blend modes. Upload, adjust opacity and download — all in your browser.',
    dropA: '📷 Drop or click to upload Image A',
    dropB: '📷 Drop or click to upload Image B',
    blendMode: 'Blend Mode',
    opacity: 'Top Layer Opacity',
    blend: 'Blend',
    download: 'Download PNG',
    downloadJPG: 'Download JPG',
    clear: 'Clear',
    step1: 'Upload two images (drag & drop or click)',
    step2: 'Choose a blend mode from the dropdown',
    step3: 'Adjust the top layer opacity',
    step4: 'Click Blend and download the result',
  },
  zh: {
    toolTitle: '图片混合工具',
    toolDesc: '使用 20+ 混合模式将两张图片混合在一起。上传、调整透明度并下载 — 完全浏览器本地处理。',
    dropA: '📷 拖拽或点击上传图片 A',
    dropB: '📷 拖拽或点击上传图片 B',
    blendMode: '混合模式',
    opacity: '上层透明度',
    blend: '混合',
    download: '下载 PNG',
    downloadJPG: '下载 JPG',
    clear: '清除',
    step1: '上传两张图片（拖拽或点击）',
    step2: '从下拉菜单选择混合模式',
    step3: '调整上层图片的透明度',
    step4: '点击混合并下载结果',
  }
});

const { $, copyText, t } = GZ;
let imgA = null, imgB = null;
const canvas = $('#result-canvas');
const ctx = canvas.getContext('2d');

const modes = ['source-over','multiply','screen','overlay','darken','lighten','color-dodge','color-burn','hard-light','soft-light','difference','exclusion','hue','saturation','color','luminosity','normal'];

$('#sel-mode').innerHTML = modes.map(m => `<option value="${m}">${m}</option>`).join('');

function setupDrop(id, labelId, setter) {
  const zone = $(id);
  const label = $(labelId);
  zone.addEventListener('click', () => {
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = 'image/*';
    inp.onchange = () => { if (inp.files[0]) loadImg(inp.files[0], zone, setter); };
    inp.click();
  });
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dragover'); if (e.dataTransfer.files[0]) loadImg(e.dataTransfer.files[0], zone, setter); });
}

function loadImg(file, zone, setter) {
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      setter(img);
      zone.innerHTML = '';
      const preview = document.createElement('img');
      preview.src = img.src;
      zone.appendChild(preview);
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

setupDrop('#drop1', '#lbl1', img => { imgA = img; });
setupDrop('#drop2', '#lbl2', img => { imgB = img; });

$('#inp-opacity').addEventListener('input', function() {
  $('#lbl-opacity-val').textContent = this.value + '%';
});

function doBlend() {
  if (!imgA || !imgB) { alert(t('dropA').replace('📷 ', '')); return; }
  const w = Math.max(imgA.width, imgB.width);
  const h = Math.max(imgA.height, imgB.height);
  canvas.width = w;
  canvas.height = h;
  canvas.style.display = 'block';
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;
  ctx.drawImage(imgA, 0, 0, w, h);
  ctx.globalCompositeOperation = $('#sel-mode').value;
  ctx.globalAlpha = $('#inp-opacity').value / 100;
  ctx.drawImage(imgB, 0, 0, w, h);
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;
}

function downloadPNG() {
  if (!canvas.width) return;
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = 'blended.png';
  a.click();
}

function downloadJPG() {
  if (!canvas.width) return;
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/jpeg', 0.92);
  a.download = 'blended.jpg';
  a.click();
}

function doClear() {
  imgA = null; imgB = null;
  canvas.style.display = 'none';
  $('#drop1').innerHTML = `<span>${t('dropA')}</span>`;
  $('#drop2').innerHTML = `<span>${t('dropB')}</span>`;
}

$('#lbl-mode').textContent = t('blendMode');
$('#lbl-opacity').textContent = t('opacity');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doBlend()">${t('blend')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadPNG()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadJPG()">${t('downloadJPG')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>
`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/image/filters.html', name:'Image Filters'},
    {icon:'🖼️', href:'/image/compressor.html', name:'Image Compressor'},
    {icon:'🪄', href:'/image/background-remover.html', name:'Background Remover'},
    {icon:'✂️', href:'/image/cropper.html', name:'Image Cropper'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
