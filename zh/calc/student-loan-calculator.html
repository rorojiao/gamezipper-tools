<script>
GZI18n.register({
  en: {
    toolTitle: 'Student Loan Calculator',
    toolDesc: 'Estimate your monthly student loan payment, total interest, total paid and payoff date. Supports any term and extra monthly payments. Free, private and browser-based.',
    balance: 'Loan Balance ($)',
    rate: 'Interest Rate (% APR)',
    term: 'Term (years)',
    extra: 'Extra Monthly Payment ($)',
    calculate: 'Calculate',
    clear: 'Clear',
    showAmort: 'Show Amortization',
    hideAmort: 'Hide Schedule',
    resMonthly: 'Monthly Payment',
    resTotalInterest: 'Total Interest',
    resTotalPaid: 'Total Paid',
    resPayoff: 'Payoff Date',
    thMonth: 'Month',
    thPayment: 'Payment',
    thPrincipal: 'Principal',
    thInterest: 'Interest',
    thBalance: 'Balance',
    step1: 'Enter your current loan balance',
    step2: 'Set the interest rate (APR) and term in years',
    step3: 'Optional: add an extra monthly payment to see savings',
    step4: 'Click Calculate to view your monthly payment and total cost',
  },
  zh: {
    toolTitle: '助学贷款计算器',
    toolDesc: '估算助学贷款的每月还款、总利息、总还款和还清日期。支持任意期限和额外每月还款。免费、私密、浏览器本地运行。',
    balance: '贷款余额（$）',
    rate: '年利率（% APR）',
    term: '期限（年）',
    extra: '额外每月还款（$）',
    calculate: '计算',
    clear: '清空',
    showAmort: '显示还款计划',
    hideAmort: '隐藏计划',
    resMonthly: '月供',
    resTotalInterest: '总利息',
    resTotalPaid: '总还款',
    resPayoff: '还清日期',
    thMonth: '月份',
    thPayment: '还款',
    thPrincipal: '本金',
    thInterest: '利息',
    thBalance: '余额',
    step1: '输入当前贷款余额',
    step2: '设置年利率（APR）和期限（年）',
    step3: '可选：添加额外每月还款查看节省',
    step4: '点击计算查看月供和总成本',
  }
});

const { $, t } = GZ;

$('#lbl-balance').textContent = t('balance');
$('#lbl-rate').textContent = t('rate');
$('#lbl-term').textContent = t('term');
$('#lbl-extra').textContent = t('extra');
$('#res-monthly-label').textContent = t('resMonthly');
$('#res-totalinterest-label').textContent = t('resTotalInterest');
$('#res-totalpaid-label').textContent = t('resTotalPaid');
$('#res-payoff-label').textContent = t('resPayoff');
$('#th-month').textContent = t('thMonth');
$('#th-payment').textContent = t('thPayment');
$('#th-principal').textContent = t('thPrincipal');
$('#th-interest').textContent = t('thInterest');
$('#th-balance').textContent = t('thBalance');

function fmt(n) { return n.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0}); }
function fmtMoney(n) { return '$' + n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}); }

let amortVisible = false;

function calc() {
  const P = Math.max(0, parseFloat($('#balance').value) || 0);
  const annualRate = Math.max(0, parseFloat($('#rate').value) || 0);
  const n = Math.max(1, parseInt($('#term').value) || 120);
  const extra = Math.max(0, parseFloat($('#extra').value) || 0);
  const r = annualRate / 100 / 12;

  let monthly;
  if (r === 0) {
    monthly = P / n;
  } else {
    const basePayment = P * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1);
    monthly = basePayment;
  }
  if (!isFinite(monthly) || monthly <= 0) monthly = 0;

  // Build amortization with extra payments
  let balance = P;
  let totalInterest = 0;
  let totalPaid = 0;
  let months = 0;
  const rows = [];
  const start = new Date();
  start.setMonth(start.getMonth() + 1);

  while (balance > 0.005 && months < 1200) {
    months++;
    const interest = balance * r;
    let principal = (monthly + extra) - interest;
    if (principal >= balance) {
      principal = balance;
    }
    balance -= principal;
    totalInterest += interest;
    totalPaid += principal + interest;

    if (months <= 12 || months % 12 === 0 || balance <= 0.005 || rows.length < 60) {
      const d = new Date(start);
      d.setMonth(start.getMonth() + months - 1);
      rows.push({ month: months, date: d, payment: principal + interest, principal, interest, balance: Math.max(0, balance) });
    }
  }

  const payoffDate = new Date(start);
  payoffDate.setMonth(start.getMonth() + months - 1);
  const payoffStr = payoffDate.toLocaleDateString(undefined, { year: 'numeric', month: 'short' });

  $('#res-monthly').textContent = fmtMoney(monthly);
  $('#res-totalinterest').textContent = fmtMoney(totalInterest);
  $('#res-totalpaid').textContent = fmtMoney(totalPaid);
  $('#res-payoff').textContent = payoffStr;
  $('#results').style.display = 'block';

  // Render amortization
  $('#amort-body').innerHTML = rows.map(row =>
    `<tr><td>${row.date.toLocaleDateString(undefined, { year: 'numeric', month: 'short' })}</td><td>${fmtMoney(row.payment)}</td><td>${fmtMoney(row.principal)}</td><td>${fmtMoney(row.interest)}</td><td>${fmtMoney(row.balance)}</td></tr>`
  ).join('');
}

function toggleAmort() {
  amortVisible = !amortVisible;
  $('#amort-wrap').style.display = amortVisible ? 'block' : 'none';
  $('#amort-btn').textContent = amortVisible ? t('hideAmort') : t('showAmort');
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" id="amort-btn" onclick="toggleAmort()">${t('showAmort')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('results').style.display='none'">${t('clear')}</button>`;

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'💸', href:'/calc/debt-payoff-calculator.html', name:'Debt Payoff'},
    {icon:'💳', href:'/calc/credit-card-payoff-calculator.html', name:'Credit Card Payoff'},
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
  ]
});
</script>
