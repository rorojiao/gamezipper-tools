<script>
GZI18n.register({
  en: {
    toolTitle: 'Instagram Hashtag Generator',
    toolDesc: 'Generate 30+ relevant, trending hashtags for Instagram, TikTok and Reels. Enter your topic and get copy-paste ready tags sorted by popularity.',
    placeholder: 'Enter your topic (e.g., travel, fitness, food)...',
    generate: 'Generate',
    clear: 'Clear',
    copy: 'Copy',
    copyAll: 'Copy All',
    outputLabel: 'Selected Hashtags',
    step1: 'Enter a keyword or topic related to your post',
    step2: 'Optionally select a category for more targeted hashtags',
    step3: 'Click hashtags to add/remove them from your selection',
    step4: 'Click Copy All to copy all selected hashtags to clipboard',
  },
  zh: {
    toolTitle: 'Instagram 标签生成器',
    toolDesc: '为 Instagram、TikTok 和 Reels 生成 30+ 相关热门标签。输入主题，获取按热度排序、可直接复制的标签。',
    placeholder: '输入主题关键词（如旅行、健身、美食）...',
    generate: '生成',
    clear: '清除',
    copy: '复制',
    copyAll: '全部复制',
    outputLabel: '已选标签',
    step1: '输入与帖子相关的关键词或主题',
    step2: '可选择分类以获取更有针对性的标签',
    step3: '点击标签将其添加到选择中或移除',
    step4: '点击「全部复制」将所有已选标签复制到剪贴板',
  }
});

const { $, copyText, t } = GZ;

const CATEGORIES = {
  general: { en: 'General', zh: '通用', tags: ['instagood','photooftheday','love','instadaily','follow','followme','like4like','picoftheday','beautiful','happy','instamood','summer','photography','art','nature','cute','fun','life','instalike','amazing','best','motivation','inspiration','viral','trending'] },
  travel: { en: 'Travel', zh: '旅行', tags: ['travel','travelgram','wanderlust','vacation','adventure','explore','nature','landscape','sunset','beach','mountains','cityscape','roadtrip','travelling','travelphotography','instatravel','trip','journey','destination','globetrotter','passportready','travelblogger','travelphoto','beautifuldestinations'] },
  fitness: { en: 'Fitness', zh: '健身', tags: ['fitness','gym','workout','training','fit','health','healthy','motivation','strong','cardio','bodybuilding','crossfit','yoga','running','weightloss','nutrition','muscle','exercise','gymmotivation','fitspo','personaltrainer','getfit','fitfam','sweat'] },
  food: { en: 'Food', zh: '美食', tags: ['food','foodie','instafood','foodporn','foodphotography','yummy','delicious','homemade','cooking','recipe','foodblogger','healthyfood','foodlover','tasty','dessert','breakfast','lunch','dinner','restaurant','foodgasm','chef','foodstagram','eat','hungry'] },
  fashion: { en: 'Fashion', zh: '时尚', tags: ['fashion','style','ootd','fashionista','outfit','look','fashionblogger','trendy','stylish','streetstyle','fashiongram','wiwt','whatiwore','lookbook','fashiondaily','chic','designer','shopping','clothes','accessories','model','vintage','luxury','aesthetic'] },
  business: { en: 'Business', zh: '商业', tags: ['business','entrepreneur','marketing','success','smallbusiness','startup','businessowner','hustle','motivation','leadership','digitalmarketing','branding','networking','growthmindset','businesstips','entrepreneurlife','workfromhome','sidehustle','ecommerce','socialmedia','contentmarketing','seo','mindset','productivity'] },
  photography: { en: 'Photography', zh: '摄影', tags: ['photography','photo','photographer','photooftheday','picoftheday','instaphoto','camera','canon','nikon','sony','portrait','landscape','streetphotography','naturephotography','blackandwhite','bnw','longexposure','macro','wildlife','sunset','goldenhour','composition','lightroom','shotoniphone'] },
  art: { en: 'Art', zh: '艺术', tags: ['art','artist','artwork','drawing','paintingillustration','digitalart','sketch','design','creative','handmade','artistsoninstagram','artoftheday','instaart','watercolor','acrylic','contemporaryart','fineart','gallery','artdaily','mural','characterdesign','conceptart','sketchbook','doodle'] },
  music: { en: 'Music', zh: '音乐', tags: ['music','musician','singer','songwriter','guitarist','producer','beatmaker','hiphop','rap','rock','popmusic','jazz','electronicmusic','dj','newmusic','musicvideo','livemusic','concert','studio','recording','unsignedartist','musiclife','vibes','soundcloud'] },
  tech: { en: 'Tech', zh: '科技', tags: ['tech','technology','programming','coding','developer','software','python','javascript','webdev','machinelearning','ai','artificialintelligence','datascience','startupinnovation','gadgets','techreview','cybersecurity','cloudcomputing','blockchain','techlife','code','computerscience','devops','programminglife'] },
};

let selected = new Set();

function populateCategory() {
  $('#category').innerHTML = Object.entries(CATEGORIES).map(([k,v]) =>
    `<option value="${k}">${GZI18n.getLang() === 'zh' ? v.zh : v.en}</option>`
  ).join('');
}

function slugify(text) {
  return text.toLowerCase().trim().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, '');
}

function generate() {
  const keyword = slugify($('#keyword').value);
  const cat = $('#category').value;
  const tags = [...CATEGORIES[cat].tags];

  // Add keyword-based tags
  if (keyword) {
    tags.unshift(keyword, keyword + 'lover', keyword + 'life', keyword + 'community', keyword + 'daily', keyword + 'gram', keyword + 'love', 'ilove' + keyword);
  }

  // Deduplicate
  const unique = [...new Set(tags)].slice(0, 40);

  $('#tagChips').innerHTML = unique.map((tag, i) => {
    const pop = i < 5 ? '🔥🔥🔥' : i < 15 ? '🔥🔥' : i < 25 ? '🔥' : '';
    return `<span class="tag-chip" data-tag="${tag}" onclick="toggleTag('${tag}', this)">#${tag}<span class="pop">${pop}</span></span>`;
  }).join('');

  selected.clear();
  updateOutput();
}

function toggleTag(tag, el) {
  if (selected.has(tag)) {
    selected.delete(tag);
    el.style.opacity = '0.5';
  } else {
    selected.add(tag);
    el.style.opacity = '1';
    el.style.borderColor = 'var(--gz-link,#5bf)';
  }
  updateOutput();
}

function updateOutput() {
  const tags = [...selected].map(t2 => '#' + t2).join(' ');
  $('#output').textContent = tags || '—';
}

function copyAll() {
  const text = [...selected].map(t2 => '#' + t2).join(' ');
  if (text) copyText(text);
}

function doClear() {
  $('#keyword').value = '';
  selected.clear();
  $('#tagChips').innerHTML = '';
  $('#output').textContent = '';
}

$('#keyword').setAttribute('placeholder', t('placeholder'));
$('#lbl-output').textContent = t('outputLabel');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn" onclick="copyAll()">${t('copyAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#keyword').addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });

populateCategory();
generate();

GZ.renderToolPage({
  category: 'social',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📱', href:'/social/instagram-post.html', name:'Instagram Post'},
    {icon:'💬', href:'/social/tiktok-caption-generator.html', name:'TikTok Caption'},
    {icon:'#️⃣', href:'/social/hashtag-generator.html', name:'Hashtag Generator'},
    {icon:'✨', href:'/text/blog-title-generator.html', name:'Blog Title Gen'},
  ]
});
</script>
