<script>
GZI18n.register({
  en: {
    toolTitle: 'Cryptogram Puzzle Generator',
    toolDesc: 'Create free printable cryptogram puzzles with substitution ciphers. Perfect for classrooms, puzzle lovers, brain training and vocabulary practice.',

    step1: 'Enter a message, or click Random Quote for a built-in one',

    enterText: '输入您的消息或引言：',
    difficulty: '难度：',
    easy: '简单（提示1个字母）',
    medium: '中等（无提示）',
    showKey: '显示答案密码表',
    generate: '生成谜题',
    print: '打印谜题',
    example: '随机名言',
    puzzleTitle: '密码谜题',
    decode: '请解码下方信息。每个字母都已被替换。',
    hintLabel: '提示：',
    answerKey: '密码对照表（答案）',
    step1: '输入消息或点击"随机名言"使用内置句子',
    step2: '选择难度级别',
    step3: '点击"生成谜题"创建唯一密码谜题',
    step4: '打印谜题供学生或谜题书使用',
  }
});

const { $, t } = GZ;
let cipherMap = {};

const quotes = [
  "The only way to do great work is to love what you do.",
  "Knowledge is power and learning is the key.",
  "A journey of a thousand miles begins with a single step.",
  "Believe you can and you are halfway there.",
  "The future belongs to those who believe in their dreams.",
  "Mistakes are proof that you are trying something new.",
  "Reading is to the mind what exercise is to the body.",
  "Creativity is intelligence having fun.",
  "The best time to plant a tree was twenty years ago.",
  "Every expert was once a beginner.",
];

$('#settings').innerHTML = `
  <div class="cg-row"><label>${t('enterText')}</label></div>
  <textarea class="cg-textarea" id="textInput" spellcheck="false" placeholder="Type your message or quote here..."></textarea>
  <div class="cg-row">
    <label>${t('difficulty')}</label>
    <select class="cg-select" id="diffSelect">
      <option value="easy" selected>${t('easy')}</option>
      <option value="medium">${t('medium')}</option>
    </select>
  </div>
  <div class="cg-row">
    <label><input type="checkbox" id="keyCheck"> ${t('showKey')}</label>
  </div>
`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generatePuzzle()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="window.print()">${t('print')}</button>`;

function shuffleAlpha() {
  const alpha = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const shuffled = [...alpha];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  // Ensure no letter maps to itself
  const map = {};
  for (let i = 0; i < 26; i++) {
    if (alpha[i] === shuffled[i]) {
      // Swap with next
      const next = (i + 1) % 26;
      [shuffled[i], shuffled[next]] = [shuffled[next], shuffled[i]];
    }
    map[alpha[i]] = shuffled[i];
  }
  return map;
}

function generatePuzzle() {
  let text = $('#textInput').value.trim();
  if (!text) { $('#status').innerHTML = '<span style="color:var(--accent)">⚠ Please enter some text.</span>'; return; }
  if (text.length > 500) text = text.substring(0, 500);
  const diff = $('#diffSelect').value;
  const showKey = $('#keyCheck').checked;
  cipherMap = shuffleAlpha();

  // Encode text
  const encoded = text.toUpperCase().split('').map(ch => {
    if (/[A-Z]/.test(ch)) return cipherMap[ch];
    return ch;
  }).join('');

  // Render with cells
  const cellHtml = encoded.split('').map(ch => {
    if (/[A-Z]/.test(ch)) {
      return `<span class="cg-letter"><span class="cg-top">${ch}</span><span class="cg-bottom">&nbsp;</span></span>`;
    } else if (ch === ' ') return '&nbsp;&nbsp;';
    else return ch;
  }).join('');

  // Hint: reveal one common letter
  let hintHtml = '';
  if (diff === 'easy') {
    const lettersInText = [...new Set(text.toUpperCase().match(/[A-Z]/g) || [])];
    if (lettersInText.length > 0) {
      const hintLetter = lettersInText[Math.floor(Math.random() * lettersInText.length)];
      hintHtml = `<div class="cg-hint"><h3>${t('hintLabel')} "${hintLetter}" = "${cipherMap[hintLetter]}"</h3></div>`;
    }
  }

  // Answer key table
  let keyHtml = '';
  if (showKey) {
    const alpha = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    keyHtml = `<div class="cg-hint"><h3>${t('answerKey')}</h3><div class="cg-key-table">${alpha.map(a => `<div>${a}→${cipherMap[a]}</div>`).join('')}</div></div>`;
  }

  $('#output').innerHTML = `<div class="cg-puzzle">
    <div class="cg-puzzle-title">${t('puzzleTitle')}</div>
    <div class="cg-puzzle-sub">${t('decode')}</div>
    <div class="cg-cipher">${cellHtml}</div>
  </div>${hintHtml}${keyHtml}`;
  $('#status').innerHTML = `<span style="color:var(--success)">✓ Puzzle generated.</span>`;
}

function loadExample() {
  $('#textInput').value = quotes[Math.floor(Math.random() * quotes.length)];
  generatePuzzle();
}

});
</script>
