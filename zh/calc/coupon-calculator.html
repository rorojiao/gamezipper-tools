<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I calculate a coupon discount?","acceptedAnswer":{"@type":"Answer","text":"For a percentage coupon, multiply the original price by the discount percentage to get the discount amount, then subtract it from the price. For a fixed-amount coupon, simply subtract the coupon value from the price. This calculator handles both and lets you stack multiple coupons."}},{"@type":"Question","name":"Can I stack multiple coupons?","acceptedAnswer":{"@type":"Answer","text":"Yes. Add as many coupons as you want using the +Add Coupon button. Percentage coupons are applied sequentially to the running total, while fixed-amount coupons are subtracted directly. Note that most real stores do not allow coupon stacking — check store policy."}},{"@type":"Question","name":"Does this calculator include tax?","acceptedAnswer":{"@type":"Answer","text":"Optionally. You can enter a sales tax percentage and choose whether tax is applied before or after coupons. By default, coupons are applied first and tax is calculated on the discounted price."}},{"@type":"Question","name":"How is the effective discount percentage calculated?","acceptedAnswer":{"@type":"Answer","text":"Effective discount = (total savings ÷ original price) × 100. This gives the true percentage you save after all coupons are applied, which is useful when stacking percentage and fixed-amount coupons together."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="field">
      <label id="lbl-price"></label>
      <input id="price" type="number" value="100" min="0" step="0.01">
    </div>
    <div class="field">
      <label id="lbl-qty"></label>
      <input id="qty" type="number" value="1" min="1" step="1">
    </div>
    <label id="lbl-coupons" style="display:block;font-size:.85em;margin-top:12px;opacity:.8"></label>
    <div id="coupons"></div>
    <div class="tax-opt">
      <label id="lbl-tax"></label>
      <input id="tax" type="number" value="0" min="0" step="0.01" style="width:80px;padding:6px;background:var(--gz-surface,#1a1a2e);border:1px solid var(--gz-border,#333);border-radius:6px;color:inherit">%
      <label style="font-size:.82em;opacity:.7"><input type="checkbox" id="taxAfter"> <span id="lbl-taxAfter"></span></label>
    </div>
    <div class="result-box" id="result"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Coupon Calculator',
    toolDesc: 'Calculate coupon discounts, stack multiple coupons (percentage and fixed), include tax, and see your final price and total savings. Free, instant, browser-based.',
    addCoupon: '+ Add Coupon',
    lblPrice: 'Original Price ($)',
    lblQty: 'Quantity',
    lblCoupons: 'Coupons & Discounts',
    lblTax: 'Sales Tax',
    lblTaxAfter: 'Apply tax before coupons',
    couponTypePct: '% Off',
    couponTypeFixed: '$ Off',
    finalPrice: 'Final Price',
    youSave: 'You Save',
    effective: 'Effective Discount',
    original: 'Original Total',
    step1: 'Enter the original item price and quantity',
    step2: 'Add one or more coupons — choose % or $ off',
    step3: 'Optionally enter sales tax rate',
    step4: 'See your final price, savings and effective discount instantly',
  },
  zh: {
    toolTitle: '优惠券计算器',
    toolDesc: '计算优惠券折扣，叠加多个优惠券（百分比和固定金额），包含税费，查看最终价格和总节省。免费、即时、浏览器本地运行。',
    addCoupon: '+ 添加优惠券',
    lblPrice: '原价（$）',
    lblQty: '数量',
    lblCoupons: '优惠券和折扣',
    lblTax: '消费税',
    lblTaxAfter: '在优惠券前应用税费',
    couponTypePct: '% 折扣',
    couponTypeFixed: '$ 折扣',
    finalPrice: '最终价格',
    youSave: '你节省了',
    effective: '实际折扣',
    original: '原价合计',
    step1: '输入商品原价和数量',
    step2: '添加一个或多个优惠券 — 选择百分比或固定金额',
    step3: '可选：输入消费税率',
    step4: '即时查看最终价格、节省金额和实际折扣率',
  }
});

const { $, t } = GZ;
let couponCount = 0;

function addCoupon(type = 'pct', value = 10) {
  couponCount++;
  const id = 'coupon-' + couponCount;
  const div = document.createElement('div');
  div.className = 'coupon-row';
  div.id = id;
  div.innerHTML = `
    <select onchange="calc()">
      <option value="pct" ${type==='pct'?'selected':''}>${t('couponTypePct')}</option>
      <option value="fixed" ${type==='fixed'?'selected':''}>${t('couponTypeFixed')}</option>
    </select>
    <input type="number" value="${value}" min="0" step="0.01" oninput="calc()">
    <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('${id}').remove();calc()">✕</button>`;
  $('#coupons').appendChild(div);
  calc();
}

function fmt(n) { return '$' + n.toFixed(2); }

function calc() {
  const price = parseFloat($('#price').value) || 0;
  const qty = parseInt($('#qty').value) || 1;
  const origTotal = price * qty;
  let discounted = origTotal;
  const rows = document.querySelectorAll('#coupons .coupon-row');
  rows.forEach(row => {
    const type = row.querySelector('select').value;
    const val = parseFloat(row.querySelector('input').value) || 0;
    if (type === 'pct') {
      discounted = discounted * (1 - val / 100);
    } else {
      discounted = Math.max(0, discounted - val * qty);
    }
  });
  discounted = Math.max(0, discounted);
  // Tax
  const taxRate = (parseFloat($('#tax').value) || 0) / 100;
  let finalPrice;
  if ($('#taxAfter').checked) {
    finalPrice = discounted * (1 + taxRate);
  } else {
    finalPrice = origTotal * (1 + taxRate) - (origTotal - discounted);
  }
  const savings = origTotal - discounted;
  const effPct = origTotal > 0 ? (savings / origTotal * 100) : 0;
  $('#result').innerHTML = `
    <div class="lbl">${t('finalPrice')}</div>
    <div class="big">${fmt(finalPrice)}</div>
    <div class="result-stats">
      <div><div class="num" style="color:#00d672">${fmt(savings)}</div><div class="cap">${t('youSave')}</div></div>
      <div><div class="num">${effPct.toFixed(1)}%</div><div class="cap">${t('effective')}</div></div>
      <div><div class="num" style="opacity:.6">${fmt(origTotal)}</div><div class="cap">${t('original')}</div></div>
    </div>`;
}

function loadExample() {
  $('#price').value = '79.99';
  $('#qty').value = '2';
  $('#coupons').innerHTML = '';
  couponCount = 0;
  addCoupon('pct', 20);
  addCoupon('fixed', 5);
  $('#tax').value = '8.25';
  calc();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="addCoupon()">${t('addCoupon')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>`;

['#price','#qty','#tax'].forEach(s => $(s).addEventListener('input', calc));
$('#taxAfter').addEventListener('change', calc);

// init with one coupon
addCoupon('pct', 10);

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏷️', href:'/calc/discount-calculator.html', name:'Discount Calculator'},
    {icon:'💰', href:'/calc/percent-off-calculator.html', name:'Percent Off'},
    {icon:'📊', href:'/calc/markup-calculator.html', name:'Markup Calculator'},
    {icon:'💵', href:'/calc/sales-tax-calculator.html', name:'Sales Tax'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
