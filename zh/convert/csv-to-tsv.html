const { $, copyText, t } = GZ;

// Parse CSV/TSV respecting RFC 4180
function parseDelimited(text, delimiter) {
  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;
  let i = 0;
  
  while (i < text.length) {
    const ch = text[i];
    
    if (inQuotes) {
      if (ch === '"') {
        if (i + 1 < text.length && text[i + 1] === '"') {
          field += '"';
          i += 2;
        } else {
          inQuotes = false;
          i++;
        }
      } else {
        field += ch;
        i++;
      }
    } else {
      if (ch === '"') {
        inQuotes = true;
        i++;
      } else if (text.substr(i, delimiter.length) === delimiter) {
        row.push(field);
        field = '';
        i += delimiter.length;
      } else if (ch === '\n' || (ch === '\r' && text[i + 1] === '\n')) {
        row.push(field);
        field = '';
        if (ch === '\r') i++;
        rows.push(row);
        row = [];
        i++;
      } else {
        field += ch;
        i++;
      }
    }
  }
  
  // Last field/row
  if (field || row.length > 0) {
    row.push(field);
    rows.push(row);
  }
  
  return rows;
}

function toDelimited(rows, delimiter) {
  return rows.map(row => {
    return row.map(field => {
      if (field.includes(delimiter) || field.includes('"') || field.includes('\n') || field.includes('\r')) {
        return '"' + field.replace(/"/g, '""') + '"';
      }
      return field;
    }).join(delimiter);
  }).join('\n');
}

function convertToTsv() {
  const inp = $('#input').value;
  if (!inp.trim()) return;
  
  // Detect if input is TSV (has tabs) or CSV
  const hasTabs = inp.includes('\t');
  const inputDelim = hasTabs ? '\t' : ',';
  
  const rows = parseDelimited(inp, inputDelim);
  const output = toDelimited(rows, '\t');
  
  $('#output').value = output;
  showStats(rows);
}

function convertToCsv() {
  const inp = $('#input').value;
  if (!inp.trim()) return;
  
  // Detect if input is TSV or CSV
  const hasTabs = inp.includes('\t');
  const inputDelim = hasTabs ? '\t' : ',';
  
  const rows = parseDelimited(inp, inputDelim);
  const output = toDelimited(rows, ',');
  
  $('#output').value = output;
  showStats(rows);
}

function showStats(rows) {
  const maxCols = rows.reduce((max, r) => Math.max(max, r.length), 0);
  $('#stats').innerHTML = `<span>${t('rows')}: ${rows.length}</span><span>${t('cols')}: ${maxCols}</span>`;
}

function loadExample() {
  $('#input').value = `name,age,city,email

Bob Smith,25,"San Francisco, CA",bob@example.com
"Carol, M.",28,"Los Angeles, CA",carol@example.com
David Lee,35,"Chicago, IL",david@example.com
"Eve ""Star"" Wang",22,"Seattle, WA",eve@example.com`;
  convertToTsv();
}
