    cells: '单元格总数',
    missing: '缺失值',
    unique: '唯一值',
    duplicateRows: '重复行',

    preview: '示例行',

    step3: '点击「分析」查看行/列/缺失值/类型统计',

const $ = s => document.querySelector(s);
const { t, getLang } = GZ;
let lastResult = null;

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function detectDelimiter(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim()).slice(0, 5);
  if (lines.length === 0) return ',';
  const candidates = [',', '\t', ';', '|'];
  let best = ',', bestScore = -1;
  for (const c of candidates) {
    const counts = lines.map(l => (l.match(new RegExp('\\' + c, 'g')) || []).length);
    if (counts[0] === 0) continue;
    const max = Math.max(...counts);
    const min = Math.min(...counts);
    const score = max * 10 - (max - min); // prefer high count + low variance
    if (score > bestScore) { bestScore = score; best = c; }
  }
  return best;
}

// Tiny CSV parser (no quoted commas handling of escaped quotes — good enough for stats)
function parseCSV(text, delim) {
  const rows = [];
  for (const line of text.split(/\r?\n/)) {
    if (line.length === 0) continue;
    // Naive split that handles double-quoted fields
    const cells = [];
    let i = 0, cur = '', inQ = false;
    while (i < line.length) {
      const ch = line[i];
      if (inQ) {
        if (ch === '"' && line[i+1] === '"') { cur += '"'; i += 2; continue; }
        if (ch === '"') { inQ = false; i++; continue; }
        cur += ch; i++;
      } else {
        if (ch === '"') { inQ = true; i++; continue; }
        if (ch === delim) { cells.push(cur); cur = ''; i++; continue; }
        cur += ch; i++;
      }
    }
    cells.push(cur);
    rows.push(cells);
  }
  return rows;
}

function inferType(values) {
  let allNum = true, allBool = true, allDate = true, anyNonEmpty = false;
  const dateRe = /^\d{4}-\d{2}-\d{2}/;
  for (const v of values) {
    if (v === null || v === undefined || v === '') continue;
    anyNonEmpty = true;
    if (allNum && (isNaN(Number(v)) || v.trim() === '')) allNum = false;
    if (allBool && !['true','false','TRUE','FALSE','yes','no','0','1'].includes(v)) allBool = false;
    if (allDate && !dateRe.test(v) && isNaN(Date.parse(v))) allDate = false;
  }
  if (!anyNonEmpty) return 'empty';
  if (allNum) return 'number';
  if (allBool) return 'bool';
  if (allDate) return 'date';
  return 'string';
}

function analyze() {
  const text = $('#input').value.trim();
  if (!text) return;
  let delim = $('#delim').value;
  if (delim === 'auto') delim = detectDelimiter(text);
  const hasHeader = $('#header').value === '1';
  const rows = parseCSV(text, delim);
  if (rows.length === 0) { $('#status').innerHTML = '<span style="color:var(--gz-accent)">No data</span>'; return; }

  const header = hasHeader ? rows[0] : null;
  const dataRows = hasHeader ? rows.slice(1) : rows;
  const ncols = Math.max(...rows.map(r => r.length));
  const headers = header ? header : Array.from({length: ncols}, (_, i) => `${getLang() === 'zh' ? '列' : 'Col'} ${i+1}`);

  // Pad rows
  for (const r of dataRows) while (r.length < ncols) r.push('');

  // Total cells
  const totalCells = dataRows.length * ncols;

  // Missing
  let missing = 0;
  for (const r of dataRows) for (const c of r) if (c === null || c === undefined || c === '') missing++;

  // Duplicate rows
  const seen = new Set();
  let dups = 0;
  for (const r of dataRows) {
    const k = r.join('\x1f');
    if (seen.has(k)) dups++;
    else seen.add(k);
  }

  // Per column analysis
  const colStats = [];
  for (let c = 0; c < ncols; c++) {
    const vals = dataRows.map(r => r[c] || '');
    const nonEmpty = vals.filter(v => v !== '').length;
    const unique = new Set(vals.filter(v => v !== '')).size;
    const type = inferType(vals);
    let min, max, mean, median;
    if (type === 'number') {
      const nums = vals.filter(v => v !== '').map(Number).filter(n => !isNaN(n)).sort((a,b) => a-b);
      if (nums.length) {
        min = nums[0];
        max = nums[nums.length-1];
        mean = Math.round((nums.reduce((a,b) => a+b, 0) / nums.length) * 100) / 100;
        median = nums[Math.floor(nums.length/2)];
      }
    } else if (type === 'date') {
      const dates = vals.filter(v => v !== '').map(v => Date.parse(v)).filter(d => !isNaN(d)).sort((a,b) => a-b);
      if (dates.length) {
        min = new Date(dates[0]).toISOString().slice(0,10);
        max = new Date(dates[dates.length-1]).toISOString().slice(0,10);
      }
    }
    colStats.push({ name: headers[c] || `Col ${c+1}`, type, nonEmpty, missing: vals.length - nonEmpty, unique, min, max, mean, median });
  }

  const result = { delim, hasHeader, rows: dataRows.length, cols: ncols, totalCells, missing, duplicateRows: dups, columns: colStats, sample: dataRows.slice(0, 5) };
  lastResult = result;
  render(result);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ Analyzed ${dataRows.length} × ${ncols} (delim: "${delim === '\t' ? 'TAB' : delim}", header: ${hasHeader ? 'yes' : 'no'})</span>`;
}

function render(r) {
  let html = `<div class="stats-grid">
    <div class="stat-card"><div class="num">${r.rows.toLocaleString()}</div><div class="lbl">${t('rows')}</div></div>
    <div class="stat-card"><div class="num">${r.cols.toLocaleString()}</div><div class="lbl">${t('cols')}</div></div>
    <div class="stat-card"><div class="num">${r.totalCells.toLocaleString()}</div><div class="lbl">${t('cells')}</div></div>
    <div class="stat-card"><div class="num" style="color:${r.missing > 0 ? '#ffd93d' : '#00d672'}">${r.missing.toLocaleString()}</div><div class="lbl">${t('missing')}</div></div>
    <div class="stat-card"><div class="num">${r.cols ? r.columns.reduce((s,c) => s + c.unique, 0).toLocaleString() : 0}</div><div class="lbl">${t('unique')}</div></div>
    <div class="stat-card"><div class="num" style="color:${r.duplicateRows > 0 ? '#e94560' : '#00d672'}">${r.duplicateRows.toLocaleString()}</div><div class="lbl">${t('duplicateRows')}</div></div>
  </div>`;

  // Per-column table
  html += `<div class="col-table"><h3>${t('types')}</h3><table>
    <thead><tr><th>${t('col')}</th><th>${t('type')}</th><th>${t('nonNull')}</th><th>${t('missing')}</th><th>${t('unique')}</th><th>${t('min')}</th><th>${t('max')}</th><th>${t('mean')}</th><th>${t('median')}</th></tr></thead>
    <tbody>`;
  for (const c of r.columns) {
    const typeLabel = ({number:'number',string:'string',bool:'bool',date:'date',empty:'empty'})[c.type] || 'mixed';
    html += `<tr>
      <td><strong>${escHtml(c.name)}</strong></td>
      <td><span class="badge badge-${typeLabel}">${typeLabel}</span></td>
      <td>${c.nonEmpty}</td>
      <td>${c.missing}</td>
      <td>${c.unique}</td>
      <td>${c.min !== undefined ? escHtml(String(c.min)) : '—'}</td>
      <td>${c.max !== undefined ? escHtml(String(c.max)) : '—'}</td>
      <td>${c.mean !== undefined ? c.mean : '—'}</td>
      <td>${c.median !== undefined ? c.median : '—'}</td>
    </tr>`;
  }
  html += '</tbody></table></div>';

  // Sample preview
  if (r.sample && r.sample.length) {
    html += `<div class="col-table"><h3>${t('preview')} (${r.sample.length} of ${r.rows})</h3><div style="overflow-x:auto"><table>
      <thead><tr>${r.columns.map(c => `<th>${escHtml(c.name)}</th>`).join('')}</tr></thead>
      <tbody>${r.sample.map(row => `<tr>${row.map(cell => `<td>${escHtml(String(cell).slice(0,80))}</td>`).join('')}</tr>`).join('')}</tbody>
    </table></div></div>`;
  }

  $('#output').innerHTML = html;
}

function exportJSONStats() {
  if (!lastResult) return;
  const data = JSON.stringify(lastResult, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'csv-stats.json'; a.click();
  URL.revokeObjectURL(url);
}

function loadExample() {
  $('#input').value = `name,age,city,signup_date,active,score
Alice,28,NYC,2023-01-15,true,87.5

Eve,29,Seattle,2024-01-01,true,98.1

Alice,28,NYC,2023-01-15,true,87.5
Ivy,26,Portland,2024-02-19,true,90.6`;
  analyze();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="analyze()">${t('analyze')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('loadExample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="exportJSONStats()">${t('exportJSON')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').innerHTML='';$('#status').innerHTML=''">${t('clear')}</button>`;

</script>
