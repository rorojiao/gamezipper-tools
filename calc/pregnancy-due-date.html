.pd-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}

.pd-card{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:18px}
.pd-card label{display:block;font-size:.8rem;margin-bottom:6px;color:var(--text2);font-weight:600}
.pd-card input,.pd-card select{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--glass2);color:var(--text);font-size:1rem;font-family:inherit}
.pd-card input[type=date]{color-scheme:dark light}
.pd-results{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-top:18px}
.pd-result{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center}
.pd-result .val{font-size:1.6rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pd-result .lbl{font-size:.78rem;color:var(--text2);margin-top:4px}
.pd-progress{margin-top:18px;background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:18px}
.pd-progress h3{font-size:1rem;margin-bottom:12px;color:var(--accent)}
.pd-bar{height:24px;background:var(--glass2);border-radius:12px;overflow:hidden;position:relative}
.pd-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:12px;transition:width .3s}
.pd-bar-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:.75rem;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4)}
.pd-trimesters{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}
.pd-trim{background:var(--glass2);padding:12px;border-radius:10px;text-align:center;font-size:.85rem}
.pd-trim.active{border:2px solid var(--accent);background:rgba(78,205,196,.1)}
.pd-trim strong{display:block;font-size:1.1rem;margin-bottom:4px;color:var(--accent)}
.pd-milestones{margin-top:18px;background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:18px}
.pd-milestones h3{font-size:1rem;margin-bottom:12px;color:var(--accent)}
.pd-milestones ul{list-style:none;padding:0;margin:0;font-size:.85rem}
.pd-milestones li{padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px}
.pd-milestones li:last-child{border-bottom:none}
.pd-milestones .ms-date{color:var(--text2);font-size:.78rem;white-space:nowrap}
.pd-milestones .ms-past{opacity:.5;text-decoration:line-through}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Pregnancy Due Date Calculator","description":"Calculate pregnancy due date, current week, trimester and milestones using last menstrual period (LMP) or conception date.","url":"https://tools.gamezipper.com/calc/pregnancy-due-date.html","applicationCategory":"HealthApplication","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is the pregnancy due date calculated?", "acceptedAnswer": {"@type": "Answer", "text": "The due date is calculated using Naegele's rule: due date = first day of last menstrual period + 280 days (40 weeks). If you know the conception date, the due date is conception + 266 days."}}, {"@type": "Question", "name": "What if I don't know my last menstrual period?", "acceptedAnswer": {"@type": "Answer", "text": "If you don't know your LMP, you can use the conception date instead. Switch the input method in the calculator and enter the date you believe you conceived (usually about 2 weeks after LMP)."}}, {"@type": "Question", "name": "How accurate are due dates?", "acceptedAnswer": {"@type": "Answer", "text": "Only about 4% of babies are born on their exact due date. Most babies are born within 2 weeks before or after. The due date is an estimate, not an exact prediction."}}, {"@type": "Question", "name": "What are trimesters?", "acceptedAnswer": {"@type": "Answer", "text": "Pregnancy is divided into three trimesters: First trimester (weeks 1-13), Second trimester (weeks 14-27), Third trimester (weeks 28-40). Each trimester brings different developmental milestones."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="pd-grid">
      <div class="pd-card">
        <label id="lbl-mode"></label>
        <select id="mode">
          <option value="lmp" data-i18n="lmp"></option>
          <option value="conception" data-i18n="conception"></option>
        </select>
      </div>
      <div class="pd-card">
        <label id="lbl-date"></label>
        <input type="date" id="startDate">
      </div>
    </div>
    <div class="pd-results" id="results"></div>
    <div class="pd-progress" id="progress"></div>
    <div class="pd-milestones" id="milestones"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Pregnancy Due Date Calculator',
    toolDesc: 'Calculate your pregnancy due date, current week, trimester and milestones using LMP or conception date.',
    step1: 'Choose input method — last menstrual period (LMP) or conception date',
    step2: 'Enter the date and view your estimated due date',
    step3: 'See your current pregnancy week, trimester and days remaining',
    step4: 'Browse key milestones from first heartbeat to full term',
    mode: 'Calculation Method', date: 'Date',
    lmp: 'Last Menstrual Period (LMP)', conception: 'Conception Date',
    dueDate: 'Estimated Due Date', currentWeek: 'Current Week',
    daysLeft: 'Days Remaining', daysPassed: 'Days Passed',
    trim1: '1st Trimester', trim2: '2nd Trimester', trim3: '3rd Trimester',
    trim1Range: 'Weeks 1-13', trim2Range: 'Weeks 14-27', trim3Range: 'Weeks 28-40',
    progress: 'Pregnancy Progress',
    milestones: 'Key Pregnancy Milestones',
    ms1Label: 'Missed period / positive test', ms1Label2: '~4-5 weeks pregnant',
    ms2Label: 'First heartbeat detectable', ms2Label2: '~6-7 weeks pregnant',
    ms3Label: 'End of first trimester', ms3Label2: '~13 weeks pregnant',
    ms4Label: 'Anatomy scan (20-week ultrasound)', ms4Label2: '~20 weeks pregnant',
    ms5Label: 'Viability milestone', ms5Label2: '~24 weeks pregnant',
    ms6Label: 'Third trimester begins', ms6Label2: '~28 weeks pregnant',
    ms7Label: 'Full term begins', ms7Label2: '~37 weeks pregnant',
    ms8Label: 'Estimated due date', ms8Label2: '~40 weeks pregnant',
  },
  zh: {
    toolTitle: '预产期计算器',
    toolDesc: '使用末次月经（LMP）或受孕日期计算预产期、当前孕周、孕期阶段和重要里程碑。',
    step1: '选择输入方式 — 末次月经（LMP）或受孕日期',
    step2: '输入日期并查看预计预产期',
    step3: '查看当前孕周、孕期阶段和剩余天数',
    step4: '浏览从第一次心跳到足月的重要里程碑',
    mode: '计算方式', date: '日期',
    lmp: '末次月经（LMP）', conception: '受孕日期',
    dueDate: '预计预产期', currentWeek: '当前孕周',
    daysLeft: '剩余天数', daysPassed: '已过天数',
    trim1: '第一孕期', trim2: '第二孕期', trim3: '第三孕期',
    trim1Range: '1-13 周', trim2Range: '14-27 周', trim3Range: '28-40 周',
    progress: '孕期进度',
    milestones: '重要孕期里程碑',
    ms1Label: '月经推迟 / 验孕阳性', ms1Label2: '约 4-5 周',
    ms2Label: '可检测到第一次心跳', ms2Label2: '约 6-7 周',
    ms3Label: '第一孕期结束', ms3Label2: '约 13 周',
    ms4Label: '大排畸检查（20 周 B 超）', ms4Label2: '约 20 周',
    ms5Label: '可存活里程碑', ms5Label2: '约 24 周',
    ms6Label: '进入第三孕期', ms6Label2: '约 28 周',
    ms7Label: '足月', ms7Label2: '约 37 周',
    ms8Label: '预计预产期', ms8Label2: '约 40 周',
  }
});

const { $, t } = GZ;
const _getLang = () => GZI18n.getLang();
const MS_PER_DAY = 1000 * 60 * 60 * 24;

function fmt(d) {
  if (!d) return '—';
  return d.toLocaleDateString(_getLang() === 'zh' ? 'zh-CN' : 'en-US', { year: 'numeric', month: 'long', day: 'numeric' });
}

function calculate() {
  const mode = $('#mode').value;
  const startStr = $('#startDate').value;
  if (!startStr) return;
  const start = new Date(startStr + 'T00:00:00');
  if (isNaN(start)) return;

  // due date: LMP + 280 days, conception + 266 days
  const dueDate = new Date(start);
  dueDate.setDate(dueDate.getDate() + (mode === 'lmp' ? 280 : 266));

  // conception date for reference
  const conceptionDate = new Date(start);
  if (mode === 'lmp') conceptionDate.setDate(conceptionDate.getDate() + 14);
  const lmpDate = mode === 'lmp' ? start : new Date(start.getTime() - 14 * MS_PER_DAY);

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  // gestational age in days / weeks
  const ageDays = Math.floor((today - lmpDate) / MS_PER_DAY);
  const totalDays = 280;
  const ageWeeks = Math.floor(ageDays / 7);
  const daysIntoWeek = ageDays % 7;
  const daysLeft = Math.max(0, Math.floor((dueDate - today) / MS_PER_DAY));
  const daysPassed = Math.max(0, ageDays);

  // trimester
  let trimName, trimRange, trimActive = [false, false, false];
  if (ageWeeks < 13) { trimName = t('trim1'); trimRange = t('trim1Range'); trimActive[0] = true; }
  else if (ageWeeks < 28) { trimName = t('trim2'); trimRange = t('trim2Range'); trimActive[1] = true; }
  else { trimName = t('trim3'); trimRange = t('trim3Range'); trimActive[2] = true; }

  $('#results').innerHTML = `
    <div class="pd-result">
      <div class="val">${fmt(dueDate)}</div>
      <div class="lbl">${t('dueDate')}</div>
    </div>
    <div class="pd-result">
      <div class="val">${ageWeeks}w ${daysIntoWeek}d</div>
      <div class="lbl">${t('currentWeek')} (${trimName})</div>
    </div>
    <div class="pd-result">
      <div class="val">${daysLeft}</div>
      <div class="lbl">${t('daysLeft')}</div>
    </div>
    <div class="pd-result">
      <div class="val">${daysPassed}</div>
      <div class="lbl">${t('daysPassed')}</div>
    </div>`;

  // Progress bar
  const progress = Math.min(100, Math.max(0, (ageDays / totalDays) * 100));
  $('#progress').innerHTML = `
    <h3>${t('progress')}</h3>
    <div class="pd-bar">
      <div class="pd-bar-fill" style="width:${progress.toFixed(1)}%"></div>
      <div class="pd-bar-text">${progress.toFixed(0)}% · ${ageWeeks}/40 weeks</div>
    </div>
    <div class="pd-trimesters">
      <div class="pd-trim ${trimActive[0] ? 'active' : ''}">
        <strong>${t('trim1')}</strong>
        ${t('trim1Range')}
      </div>
      <div class="pd-trim ${trimActive[1] ? 'active' : ''}">
        <strong>${t('trim2')}</strong>
        ${t('trim2Range')}
      </div>
      <div class="pd-trim ${trimActive[2] ? 'active' : ''}">
        <strong>${t('trim3')}</strong>
        ${t('trim3Range')}
      </div>
    </div>`;

  // Milestones (offset from LMP)
  const milestones = [
    { offset: 28, label: t('ms1Label'), sub: t('ms1Label2') },
    { offset: 42, label: t('ms2Label'), sub: t('ms2Label2') },
    { offset: 91, label: t('ms3Label'), sub: t('ms3Label2') },
    { offset: 140, label: t('ms4Label'), sub: t('ms4Label2') },
    { offset: 168, label: t('ms5Label'), sub: t('ms5Label2') },
    { offset: 196, label: t('ms6Label'), sub: t('ms6Label2') },
    { offset: 259, label: t('ms7Label'), sub: t('ms7Label2') },
    { offset: 280, label: t('ms8Label'), sub: t('ms8Label2') },
  ];
  let msHtml = '<h3>' + t('milestones') + '</h3><ul>';
  for (const m of milestones) {
    const msDate = new Date(lmpDate);
    msDate.setDate(msDate.getDate() + m.offset);
    const past = today > msDate;
    msHtml += `<li class="${past ? 'ms-past' : ''}">
      <span>${m.label} <span style="opacity:.6">(${m.sub})</span></span>
      <span class="ms-date">${fmt(msDate)}</span>
    </li>`;
  }
  msHtml += '</ul>';
  $('#milestones').innerHTML = msHtml;
}

function setDefault() {
  // default: 12 weeks ago as a sensible example
  const d = new Date();
  d.setDate(d.getDate() - 84);
  $('#startDate').value = d.toISOString().substring(0, 10);
  calculate();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="setDefault()">${t('example')}</button>`;

$('#mode').addEventListener('change', calculate);
$('#startDate').addEventListener('change', calculate);
$('#startDate').addEventListener('input', calculate);

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎂', href:'/calc/age-calculator.html', name:'Age Calculator'},
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
    {icon:'💪', href:'/calc/tdee-calculator.html', name:'TDEE Calculator'},
  ]
});

setDefault();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
