<script>
GZI18n.register({
  en: {
    toolTitle: 'Dockerfile Generator',
    toolDesc: 'Generate production-ready Dockerfiles for Node.js, Python, Go, Java, PHP, Ruby, Rust and more.',
    language: 'Language',
    appName: 'App Name',
    entrypoint: 'Entry Point',
    port: 'Port',
    workdir: 'Work Dir',
    runCmd: 'Run Command',
    envVars: 'Env Vars (KEY=VALUE, one per line)',
    copy: 'Copy',
    clear: 'Clear',
    generate: 'Generate',
    step1: 'Select your programming language',
    step2: 'Fill in app name, entry point and port',
    step3: 'Optionally add environment variables',
    step4: 'Click Generate and copy the Dockerfile',
  },
  zh: {
    toolTitle: 'Dockerfile 生成器',
    toolDesc: '为 Node.js、Python、Go、Java、PHP、Ruby、Rust 等生成生产级 Dockerfile。',
    language: '语言',
    appName: '应用名称',
    entrypoint: '入口文件',
    port: '端口',
    workdir: '工作目录',
    runCmd: '运行命令',
    envVars: '环境变量（KEY=VALUE，每行一个）',
    copy: '复制',
    clear: '清空',
    generate: '生成',
    step1: '选择编程语言',
    step2: '填写应用名称、入口文件和端口',
    step3: '可选添加环境变量',
    step4: '点击生成并复制 Dockerfile',
  }
});

const { $, copyText, t } = GZ;

const templates = {
  node: { base:'node:20-alpine', runner:'node:20-alpine', install:'npm ci --only=production', build:'npm run build', entry:'index.js', cmd:'node', workdir:'/app', pkg:'package.json package-lock.json' },
  python: { base:'python:3.12-slim', runner:'python:3.12-slim', install:'pip install --no-cache-dir -r requirements.txt', build:'', entry:'main.py', cmd:'python', workdir:'/app', pkg:'requirements.txt' },
  go: { base:'golang:1.22-alpine', runner:'alpine:latest', install:'go mod download', build:'go build -o /app/server .', entry:'main.go', cmd:'/app/server', workdir:'/app', pkg:'go.mod go.sum' },
  java: { base:'maven:3.9-eclipse-temurin-21', runner:'eclipse-temurin:21-jre-alpine', install:'mvn dependency:go-offline', build:'mvn package -DskipTests', entry:'pom.xml', cmd:'java -jar target/*.jar', workdir:'/app', pkg:'pom.xml' },
  php: { base:'php:8.3-fpm-alpine', runner:'php:8.3-fpm-alpine', install:'docker-php-ext-install pdo_mysql', build:'', entry:'index.php', cmd:'php-fpm', workdir:'/var/www/html', pkg:'composer.json' },
  ruby: { base:'ruby:3.3-alpine', runner:'ruby:3.3-alpine', install:'bundle install', build:'', entry:'app.rb', cmd:'ruby', workdir:'/app', pkg:'Gemfile Gemfile.lock' },
  rust: { base:'rust:1.77-alpine', runner:'alpine:latest', install:'cargo build --release', build:'cargo build --release', entry:'src/main.rs', cmd:'/app/server', workdir:'/app', pkg:'Cargo.toml Cargo.lock' },
  dotnet: { base:'mcr.microsoft.com/dotnet/sdk:8.0', runner:'mcr.microsoft.com/dotnet/aspnet:8.0-alpine', install:'dotnet restore', build:'dotnet publish -c Release -o /app/publish', entry:'Program.cs', cmd:'dotnet', workdir:'/app', pkg:'*.csproj' },
};

const langs = Object.keys(templates);

$('#form').innerHTML = `
  <label>${t('language')}<select id="lang">${langs.map(l=>`<option value="${l}">${l.charAt(0).toUpperCase()+l.slice(1)}</option>`).join('')}</select></label>
  <label>${t('appName')}<input id="appName" value="my-app" /></label>
  <label>${t('entrypoint')}<input id="entry" value="index.js" /></label>
  <label>${t('port')}<input id="port" type="number" value="3000" /></label>
  <label>${t('workdir')}<input id="workdir" value="/app" /></label>
  <label>${t('runCmd')}<input id="runCmd" value="" placeholder="auto" /></label>
  <label style="grid-column:1/-1">${t('envVars')}<textarea id="envVars" rows="3" placeholder="NODE_ENV=production&#10;API_KEY=xxx"></textarea></label>
`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

function generate() {
  const lang = $('#lang').value;
  const tpl = templates[lang];
  const appName = $('#appName').value || 'my-app';
  const entry = $('#entry').value || tpl.entry;
  const port = $('#port').value || '3000';
  const workdir = $('#workdir').value || tpl.workdir;
  const runCmdVal = $('#runCmd').value;
  const envText = $('#envVars').value.trim();

  const envLines = envText ? envText.split('\n').filter(l=>l.trim()).map(l => `ENV ${l}`).join('\n') : '';

  let df = `# --- Build Stage ---\nFROM ${tpl.base} AS builder\nWORKDIR ${workdir}\n`;
  if (tpl.pkg) df += `COPY ${tpl.pkg} ./\n`;
  if (tpl.install) df += `RUN ${tpl.install}\n`;
  df += `COPY . .\n`;
  if (tpl.build) df += `RUN ${tpl.build}\n\n`;

  df += `# --- Production Stage ---\nFROM ${tpl.runner} AS production\nWORKDIR ${workdir}\n`;
  if (envLines) df += `${envLines}\n`;
  df += `COPY --from=builder ${workdir} .\n`;
  df += `EXPOSE ${port}\n`;
  const cmd = runCmdVal || tpl.cmd;
  df += `CMD ["${cmd.split(' ').join('", "')}"]\n`;

  $('#output').textContent = df;
}

function doClear() { $('#output').textContent = ''; }

$('#lang').addEventListener('change', function() {
  const tpl = templates[this.value];
  $('#entry').value = tpl.entry;
  $('#workdir').value = tpl.workdir;
  generate();
});

generate();

  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',

    {icon:'📱', href:'/dev/webmanifest.html', name:'PWA Manifest'},
    {icon:'⚙️', href:'/dev/nginx-config.html', name:'Nginx Config'},
  ]
});
</script>
