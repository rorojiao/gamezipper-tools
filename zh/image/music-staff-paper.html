    pageSize: '纸张',

    portrait: '纵向',
    landscape: '横向',
    systems: '组数',
    stavesPerSystem: '每组谱表数',

    medium: '中',
    large: '大',
    generate: '更新',
    print: '打印 / PDF',
    step1: '选择纸张大小（A4 或 Letter）和方向',
    step2: '选择组数和每组的谱表数',
    step3: '选择谱表大小（小适合更多谱表，大适合初学者）',
    step4: '点击「打印 / PDF」打印或保存',
  }
});

const { $, t } = GZ;
const canvas=$('#paper-preview');
const ctx=canvas.getContext('2d');

function getOpts(){
  return {
    paper: document.getElementById('paper-size').value,
    orient: document.getElementById('orient').value,
    systems: +document.getElementById('systems').value,
    staves: +document.getElementById('staves').value,
    sizeKey: document.getElementById('staff-size').value,
  };
}

function drawPaper(){
  const o=getOpts();
  // dimensions at 96 DPI
  const isA4=o.paper==='a4';
  const pageWmm=isA4?210:(o.orient==='landscape'?279:216);
  const pageHmm=isA4?297:(o.orient==='landscape'?216:279);
  if(o.orient==='landscape'){ canvas.width=1100; canvas.height=850; }
  else { canvas.width=850; canvas.height=1100; }
  const W=canvas.width, H=canvas.height;
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
  // margins
  const mx=60, myTop=70, myBot=50;
  const usableW=W-mx*2;
  const usableH=H-myTop-myBot;
  const sysCount=o.systems;
  const stavesPerSys=o.staves;
  const totalStaves=sysCount*stavesPerSys;
  // staff size
  const staffH = o.sizeKey==='small'?14:(o.sizeKey==='large'?28:20); // px between top and bottom line
  const lineGap=staffH/4;
  // gap between staves in a system
  const inSysGap=lineGap*2.5;
  // gap between systems
  const sysGap=Math.max(40, lineGap*6);
  // compute layout
  const systemBlockH = stavesPerSys*staffH + (stavesPerSys-1)*inSysGap;
  const totalContentH = sysCount*systemBlockH + (sysCount-1)*sysGap;
  // if too tall, scale down
  let scale=1;
  if(totalContentH>usableH){ scale=usableH/totalContentH; }
  ctx.strokeStyle='#222'; ctx.lineWidth=1;
  let y=myTop;
  for(let s=0;s<sysCount;s++){
    const sysTop=y;
    for(let st=0;st<stavesPerSys;st++){
      const topY=y + (st===0?0:0);
      // 5 lines
      const baseLineGap=lineGap*scale;
      const baseStaffH=staffH*scale;
      const startY = y + st*(baseStaffH+inSysGap*scale);
      for(let l=0;l<5;l++){
        const ly=startY+l*baseLineGap;
        ctx.beginPath(); ctx.moveTo(mx,ly); ctx.lineTo(W-mx,ly); ctx.stroke();
      }
      // left vertical brace for multi-stave systems
      if(stavesPerSys>1 && st===0){
        ctx.beginPath(); ctx.moveTo(mx, startY); ctx.lineTo(mx, startY + (stavesPerSys-1)*(baseStaffH+inSysGap*scale) + baseStaffH); ctx.stroke();
      }
    }
    y += systemBlockH*scale + sysGap*scale;
  }
}

$('#toolbar').innerHTML = `

  <select class="gz-select" id="paper-size" onchange="drawPaper()">

  <label style="display:inline-flex;align-items:center;gap:6px">${t('stavesPerSystem')}
