  zh: {

    toolDesc: '即时压缩 CSS。移除注释、空白和冗余字符，减小文件体积、加快页面加载。',
    minify: '压缩',
    example: '示例',
    clear: '清空',
    copy: '复制',
    inputLabel: '输入 CSS',
    outputLabel: '压缩后 CSS',
    removeComments: '移除注释',
    removeWhitespace: '移除空白',
    shortHex: '缩短十六进制颜色',
    removeUnits: '移除前导零 (0.5 → .5)',
    collapseMargins: '合并重复属性',
    result: '原始：{a} 字节 → 压缩后：{b} 字节（减小 {p}%）',
    needInput: '请粘贴要压缩的 CSS。',
    step1: '在输入区粘贴或输入你的 CSS',
    step2: '勾选注释移除、十六进制缩短、零修剪等选项',
    step3: '点击「压缩」即时处理 — 结果显示在右侧',
    step4: '复制压缩后的 CSS 并粘贴到你的生产样式表中',
  }
});

const { $, copyText, t } = GZ;

const opts = { comments: true, whitespace: true, hex: true, zero: true, collapse: true };

$('#options').innerHTML = `
  <label><input type="checkbox" id="opt-comments" ${opts.comments?'checked':''}> ${t('removeComments')}</label>
  <label><input type="checkbox" id="opt-whitespace" ${opts.whitespace?'checked':''}> ${t('removeWhitespace')}</label>
  <label><input type="checkbox" id="opt-hex" ${opts.hex?'checked':''}> ${t('shortHex')}</label>
  <label><input type="checkbox" id="opt-zero" ${opts.zero?'checked':''}> ${t('removeUnits')}</label>
  <label><input type="checkbox" id="opt-collapse" ${opts.collapse?'checked':''}> ${t('collapseMargins')}</label>
`;

['comments','whitespace','hex','zero','collapse'].forEach(k => {
  document.getElementById('opt-'+k).addEventListener('change', e => { opts[k] = e.target.checked; doMinify(); });
});

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function doMinify() {
  const raw = $('#input').value;
  if (!raw.trim()) {
    $('#output').textContent = '';
    $('#status').innerHTML = `<span style="opacity:.6">${t('needInput')}</span>`;
    return;
  }
  let css = raw;
  const origLen = css.length;

  if (opts.comments) {
    // preserve IE hacks in comments? We strip all /* */ comments.
    css = css.replace(/\/\*[\s\S]*?\*\//g, '');
  }

  if (opts.whitespace) {
    // Collapse all whitespace runs into a single space (we'll trim further selectively)
    css = css.replace(/\s+/g, ' ');
    // remove space around combinators, braces, colons, semicolons, commas
    css = css.replace(/\s*([{}:;,>~+])\s*/g, '$1');
    // remove trailing semicolons before }
    css = css.replace(/;}/g, '}');
    // remove space after last selector before {
    css = css.replace(/\s*\{/g, '{');
    css = css.trim();
  }

  if (opts.hex) {
    // #aabbcc -> #abc (pairs must match), preserve case
    css = css.replace(/#([0-9a-fA-F])([0-9a-fA-F])([0-9a-fA-F])([0-9a-fA-F])([0-9a-fA-F])([0-9a-fA-F])(?![0-9a-fA-F])/g, (m, a, b, c, d, e, f) => {
      if (a.toLowerCase()===b.toLowerCase() && c.toLowerCase()===d.toLowerCase() && e.toLowerCase()===f.toLowerCase()) {
        return '#' + a + c + e;
      }
      return m;
    });
  }

  if (opts.zero) {
    // 0.5 -> .5  and  -0.5 -> -.5
    css = css.replace(/(^|[^0-9.])(?:-?)0+\.([0-9])/g, (m, pre, d) => {
      // handle sign
      const neg = /-/.test(m.slice(0, m.length - (d.length + 1)));
      return pre + (neg ? '-' : '') + '.' + d;
    });
    // remove units from zero values: 0px 0em 0% -> 0
    css = css.replace(/\b0(px|em|rem|ex|ch|vw|vh|vmin|vmax|%|pt|pc|in|cm|mm|fr|deg|rad|turn|s|ms)\b/g, '0');
  }

  if (opts.collapse) {
    // Collapse consecutive identical properties within the same rule block.
    // Tokenize by rules, then dedupe last-write-wins for same property.
    css = css.replace(/([^{}]+)\{([^{}]*)\}/g, (m, sel, body) => {
      const decls = body.split(';').map(s => s.trim()).filter(Boolean);
      const seen = {};
      const result = [];
      // last-wins: iterate forward, overwrite index so final value stays
      decls.forEach(d => {
        const colon = d.indexOf(':');
        if (colon === -1) { result.push(d); return; }
        const prop = d.slice(0, colon).trim().toLowerCase();
        if (!(prop in seen)) { seen[prop] = result.length; result.push(d); }
        else { result[seen[prop]] = d; }
      });
      return sel + '{' + result.join(';') + '}';
    });
  }

  const newLen = css.length;
  const pct = origLen > 0 ? Math.max(0, Math.round((1 - newLen / origLen) * 100)) : 0;
  $('#output').textContent = css;
  $('#status').innerHTML = `<span style="color:var(--gz-success,#00d672)">✓ ${t('result').replace('{a}', origLen).replace('{b}', newLen).replace('{p}', pct)}</span>`;
}

function loadExample() {
  $('#input').value = `/* Button styles */

  justify-content: center;
  padding: 12px 24px;

  border: 2px solid #4ECDC4;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s ease;
}
.btn:hover {
  background-color: #FFFFFF;
  color: #4ECDC4;
}`;
  doMinify();
}

function doClear() { $('#input').value=''; $('#output').textContent=''; $('#status').innerHTML=''; }

$('#input').addEventListener('input', doMinify);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doMinify()">${t('minify')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
