<script>

    toolDesc: '在 UTF-8、Base64、URL 编码、十六进制、二进制、ASCII 码和 ROT13 之间转换文本。支持 Unicode、Emoji 和多字节字符。',
    encode: '编码', decode: '解码',
    lblInput: '输入文本',
    lblEncoded: '已编码的输入',
    lblFrom: '输入格式',
    base64: 'Base64', urlEnc: 'URL 编码', hex: '十六进制', binary: '二进制', rot13: 'ROT13', asciiCodes: 'ASCII 码',
    step1: '在输入区输入或粘贴文本',
    step2: '下方的 6 种编码实时更新',
    step3: '切换到解码模式可还原任何编码',
    step4: '点击「复制」按钮获取结果',
    copy: '复制', errBase64: '无效的 Base64 字符串',
    errUrl: '无效的 URL 编码字符串',
    errHex: '无效的十六进制字符串（必须是成对的 0-9、a-f、A-F）',
    errBinary: '无效的二进制字符串（必须是由 0/1 组成的 8 位组）',
    errAscii: '无效的 ASCII 码（必须是 0-255 的数字，以空格分隔）',
  }
});

const { $, copyText, t } = GZ;

function utf8Bytes(str) {
  return new TextEncoder().encode(str);
}
function bytesFromUtf8(bytes) {
  return new TextDecoder('utf-8', { fatal: true }).decode(bytes);
}

function toBase64(str) {
  const bytes = utf8Bytes(str);
  let bin = '';
  for (const b of bytes) bin += String.fromCharCode(b);
  return btoa(bin);
}
function fromBase64(s) {
  const bin = atob(s);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytesFromUtf8(bytes);
}

function toUrlEnc(str) {
  return encodeURIComponent(str);
}
function fromUrlEnc(s) {
  return decodeURIComponent(s);
}

function toHex(str) {
  return Array.from(utf8Bytes(str)).map(b => b.toString(16).padStart(2, '0')).join(' ');
}
function fromHex(s) {
  const cleaned = s.replace(/0x/g, '').replace(/[^0-9a-fA-F]/g, '');
  if (cleaned.length % 2 !== 0) throw new Error('odd length');
  const bytes = new Uint8Array(cleaned.length / 2);
  for (let i = 0; i < bytes.length; i++) {
    bytes[i] = parseInt(cleaned.substr(i * 2, 2), 16);
  }
  return bytesFromUtf8(bytes);
}

function toBinary(str) {
  return Array.from(utf8Bytes(str)).map(b => b.toString(2).padStart(8, '0')).join(' ');
}
function fromBinary(s) {
  const cleaned = s.replace(/[^01]/g, '');
  if (cleaned.length % 8 !== 0) throw new Error('not multiple of 8');
  const bytes = new Uint8Array(cleaned.length / 8);
  for (let i = 0; i < bytes.length; i++) {
    bytes[i] = parseInt(cleaned.substr(i * 8, 8), 2);
  }
  return bytesFromUtf8(bytes);
}

function toAscii(str) {
  return Array.from(utf8Bytes(str)).map(b => b).join(' ');
}
function fromAscii(s) {
  const parts = s.trim().split(/[\s,]+/).filter(Boolean);
  const bytes = parts.map(p => {
    const n = parseInt(p, 10);
    if (isNaN(n) || n < 0 || n > 255) throw new Error('out of range');
    return n;
  });
  return bytesFromUtf8(new Uint8Array(bytes));
}

function toRot13(str) {
  return str.replace(/[a-zA-Z]/g, c => {
    const base = c <= 'Z' ? 65 : 97;
    return String.fromCharCode((c.charCodeAt(0) - base + 13) % 26 + base);
  });
}

const encoders = [
  { key: 'base64', label: 'base64', enc: toBase64, dec: fromBase64, err: 'errBase64' },
  { key: 'urlEnc', label: 'urlEnc', enc: toUrlEnc, dec: fromUrlEnc, err: 'errUrl' },
  { key: 'hex', label: 'hex', enc: toHex, dec: fromHex, err: 'errHex' },
  { key: 'binary', label: 'binary', enc: toBinary, dec: fromBinary, err: 'errBinary' },
  { key: 'rot13', label: 'rot13', enc: toRot13, dec: toRot13, err: null },
  { key: 'asciiCodes', label: 'asciiCodes', enc: toAscii, dec: fromAscii, err: 'errAscii' },
];

let currentMode = 'encode';

function renderResults() {
  const container = $('#results');
  const inEncodeMode = currentMode === 'encode';
  const inputVal = inEncodeMode ? $('#input').value : $('#inputDecode').value;
  const fromFmt = inEncodeMode ? null : $('#fromFormat').value;
  const fmtKey = inEncodeMode ? null : (fromFmt === 'url' ? 'urlEnc' : fromFmt);

  container.innerHTML = '';
  encoders.forEach(enc => {
    if (inEncodeMode) {
      // Show all 6 encodings of input
      const out = inputVal ? enc.enc(inputVal) : '';
      const card = document.createElement('div');
      card.className = 'enc-card';
      card.innerHTML = `
        <h3>${t(enc.label)}</h3>
        <div class="val" id="out-${enc.key}">${escapeHtml(out)}</div>
        <div class="err" id="err-${enc.key}"></div>
        <div class="row">
          <button onclick="copyText($('#out-${enc.key}').textContent)">${t('copy')}</button>
        </div>`;
      container.appendChild(card);
    } else {
      // Decode mode: show the plain text decoding + all other encodings of the plain text
      let plain = '';
      const errEl = document.createElement('div');
      errEl.className = 'err';
      if (inputVal) {
        if (enc.key === fmtKey) {
          try { plain = enc.dec(inputVal); }
          catch (e) { errEl.textContent = t(enc.err) || 'Decode error'; }
        } else {
          plain = '';
        }
      }
      const otherEnc = encoders.filter(e => e.key !== enc.key);
      const more = plain ? otherEnc.map(e => {
        const o = e.enc(plain);
        return `<div style="font-size:.78rem;margin-top:4px"><strong>${t(e.label)}:</strong> <code style="opacity:.8">${escapeHtml(o.length > 80 ? o.slice(0, 80) + '…' : o)}</code></div>`;
      }).join('') : '';
      const card = document.createElement('div');
      card.className = 'enc-card';
      card.innerHTML = `
        <h3>${t(enc.label)} → ${t('decode')}</h3>
        <div class="val" id="out-${enc.key}">${escapeHtml(plain)}</div>
        ${more}
        <div class="row">
          <button onclick="copyText($('#out-${enc.key}').textContent)">${t('copy')}</button>
        </div>`;
      container.appendChild(card);
      if (errEl.textContent) card.appendChild(errEl);
    }
  });
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tabs button').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  $('#mode-encode').style.display = mode === 'encode' ? 'block' : 'none';
  $('#mode-decode').style.display = mode === 'decode' ? 'block' : 'none';
  renderResults();
}

$('#tab-encode').textContent = t('encode');
$('#tab-decode').textContent = t('decode');
$('#lbl-in').textContent = t('lblInput');
$('#lbl-in2').textContent = t('lblEncoded');
$('#lbl-from').textContent = t('lblFrom');

document.querySelectorAll('.mode-tabs button').forEach(b => {
  b.addEventListener('click', () => setMode(b.dataset.mode));
});

$('#input').addEventListener('input', renderResults);
$('#inputDecode').addEventListener('input', renderResults);
$('#fromFormat').addEventListener('change', renderResults);

setMode('encode');
$('#input').value = 'Hello, 世界! 🌍';
renderResults();

GZ.renderToolPage({

  titleKey: 'toolTitle',
  descKey: 'toolDesc',

    {icon:'🔗', href:'/dev/url-encode.html', name:'URL Encoder'},
    {icon:'🪙', href:'/dev/base58.html', name:'Base58'},
    {icon:'🔢', href:'/convert/number-base.html', name:'Number Base'},
  ]
});
</script>
