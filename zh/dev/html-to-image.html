<script>
GZI18n.register({
  en: {
    toolTitle: 'HTML to Image Converter',
    toolDesc: 'Convert HTML to PNG image instantly. Paste your HTML, preview it, and download a high-quality screenshot — all in your browser.',
    lblHtml: 'HTML Code',
    lblPreview: 'Preview',
    lblOutput: 'Generated Image',
    generate: 'Generate Image',
    download: 'Download PNG',
    scale: 'Scale',
    step1: 'Paste or type HTML code in the input area',
    step2: 'Preview renders automatically on the right',
    step3: 'Click "Generate Image" to create a PNG',
    step4: 'Download the image or adjust scale for higher resolution',
  },
  zh: {
    toolTitle: 'HTML 转图片工具',
    toolDesc: '即时将 HTML 转换为 PNG 图片。粘贴 HTML 代码，预览并下载高质量截图 — 完全浏览器本地运行。',
    lblHtml: 'HTML 代码',
    lblPreview: '预览',
    lblOutput: '生成的图片',
    generate: '生成图片',
    download: '下载 PNG',
    scale: '缩放',
    step1: '在输入区粘贴或输入 HTML 代码',
    step2: '右侧自动渲染预览',
    step3: '点击「生成图片」创建 PNG',
    step4: '下载图片或调整缩放以获得更高分辨率',
  }
});

const { $, t } = GZ;
let scale = 2;

function updatePreview() {
  const html = $('#html-input').value;
  $('#preview-content').innerHTML = html;
}

async function generateImage() {
  const el = $('#preview-content');
  if (!el.innerHTML.trim()) return;
  try {
    const canvas = await html2canvas(el, {
      scale: scale,
      backgroundColor: '#ffffff',
      useCORS: true,
      logging: false,
    });
    const img = $('#output-img');
    img.src = canvas.toDataURL('image/png');
    $('#img-output').style.display = 'block';
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

function downloadImage() {
  const img = $('#output-img');
  if (!img.src) return;
  const a = document.createElement('a');
  a.href = img.src;
  a.download = 'html-to-image.png';
  a.click();
}

function loadExample() {
  $('#html-input').value = `<div style="font-family: Arial, sans-serif; padding: 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; color: white; text-align: center; max-width: 500px;">
  <h1 style="margin: 0 0 10px; font-size: 28px;">Hello World! 🎉</h1>
  <p style="margin: 0 0 16px; font-size: 16px; opacity: 0.9;">This HTML was converted to an image</p>
  <div style="display: inline-block; padding: 10px 24px; background: rgba(255,255,255,0.2); border-radius: 8px; font-weight: bold;">Click Me</div>
</div>`;
  updatePreview();
}

function doClear() {
  $('#html-input').value = '';
  $('#preview-content').innerHTML = '';
  $('#output-img').src = '';
  $('#img-output').style.display = 'none';
}

$('#html-input').addEventListener('input', updatePreview);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generateImage()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadImage()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <select class="gz-select" onchange="scale=+this.value">
    <option value="1">1x ${t('scale')}</option>
    <option value="2" selected>2x ${t('scale')}</option>
    <option value="3">3x ${t('scale')}</option>
  </select>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-html').textContent = t('lblHtml');
$('#lbl-preview').textContent = t('lblPreview');

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/image/image-to-base64.html', name:'Image to Base64'},
    
    {icon:'📝', href:'/dev/html-formatter.html', name:'HTML Formatter'},
    
  ]
});
</script>
