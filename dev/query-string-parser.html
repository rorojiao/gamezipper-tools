    paramCount: (n) => `已解析 ${n} 个参数`,
    step1: '粘贴完整 URL 或仅查询字符串（? 之后的部分）',
    step2: '在「键值对」「JSON」「表格」视图之间切换',
    step3: '点击每行的复制按钮可单独复制键或值',

const { $, copyText, t } = GZ;
let lastParsed = null;
let currentTab = 'pairs';

function extractQuery(input) {
  input = input.trim();
  if (!input) return '';
  // If full URL, extract after ?
  const qIdx = input.indexOf('?');
  if (qIdx !== -1) return input.slice(qIdx + 1).split('#')[0];
  // If starts with ? strip it
  if (input.startsWith('?')) return input.slice(1);
  // Assume it's already a query string if it contains = or &
  if (input.includes('=') || input.includes('&')) return input;
  return input;
}

function parseQuery(qs) {
  // Use URLSearchParams for robust decoding, then build structure
  const params = new URLSearchParams(qs);
  const result = {};
  for (const [rawKey, rawVal] of params) {
    // Handle bracket array notation: key[] or key[0]
    const arrMatch = rawKey.match(/^(.+?)\[(\d*)\]$/);
    if (arrMatch) {
      const base = arrMatch[1];
      if (!result[base]) result[base] = [];
      result[base].push(rawVal);
      continue;
    }
    // Handle nested dot/bracket: user.name or user[name]
    const nestedMatch = rawKey.match(/^([^.[\]]+)\.(.+)$/);
    if (nestedMatch) {
      const top = nestedMatch[1];
      if (!result[top] || typeof result[top] !== 'object') result[top] = {};
      result[top][nestedMatch[2]] = rawVal;
      continue;
    }
    const bracketNested = rawKey.match(/^([^.[\]]+)\[([^.\]]+)\]$/);
    if (bracketNested && bracketNested[2] !== '') {
      const top = bracketNested[1];
      if (!result[top] || typeof result[top] !== 'object' || Array.isArray(result[top])) result[top] = {};
      result[top][bracketNested[2]] = rawVal;
      continue;
    }
    // Repeated plain key -> array
    if (result[rawKey] !== undefined) {
      if (!Array.isArray(result[rawKey])) result[rawKey] = [result[rawKey]];
      result[rawKey].push(rawVal);
    } else {
      result[rawKey] = rawVal;
    }
  }
  return result;
}

function syntaxHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c = 'json-number';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-string';
      else if (/true|false/.test(m)) c = 'json-bool';
      else if (/null/.test(m)) c = 'json-null';
      return `<span class="${c}">${m}</span>`;
    });
}

function renderPairs(obj) {
  const rows = Object.entries(obj).map(([k, v]) => {
    const valStr = Array.isArray(v) ? JSON.stringify(v) : (typeof v === 'object' ? JSON.stringify(v) : String(v));
    const display = Array.isArray(v) ? v.join(', ') : valStr;
    return `<div class="qsp-row">
      <span class="qsp-key">${escapeHtml(k)}</span>
      <span class="qsp-val">${escapeHtml(display)}</span>
      <button class="qsp-copy" onclick="copyText('${escapeAttr(k)}')">${t('copyKey')}</button>
      <button class="qsp-copy" onclick="copyText('${escapeAttr(valStr)}')">${t('copyVal')}</button>
    </div>`;
  }).join('');
  return rows;
}

function renderTable(obj) {
  let html = '<table style="width:100%;border-collapse:collapse;font-size:.88em"><thead><tr><th style="text-align:left;padding:8px;border-bottom:2px solid var(--border)">Key</th><th style="text-align:left;padding:8px;border-bottom:2px solid var(--border)">Value</th></tr></thead><tbody>';
  for (const [k, v] of Object.entries(obj)) {
    const valStr = Array.isArray(v) ? v.join(', ') : (typeof v === 'object' ? JSON.stringify(v) : String(v));
    html += `<tr><td style="padding:6px 8px;border-bottom:1px solid var(--border);font-weight:600;color:var(--gz-accent)">${escapeHtml(k)}</td><td style="padding:6px 8px;border-bottom:1px solid var(--border);font-family:monospace;word-break:break-all">${escapeHtml(valStr)}</td></tr>`;
  }
  html += '</tbody></table>';
  return html;
}

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escapeAttr(s) { return String(s).replace(/'/g,"\\'").replace(/&/g,'&amp;'); }

function doParse() {
  const inp = $('#input').value;
  const qs = extractQuery(inp);
  if (!qs.trim()) {
    $('#result-area').style.display = 'none';
    $('#status').innerHTML = '';
    lastParsed = null;
    return;
  }
  lastParsed = parseQuery(qs);
  const count = Object.keys(lastParsed).length;
  if (count === 0) {
    $('#result-area').style.display = 'none';
    $('#status').innerHTML = `<span style="opacity:.7">${t('noParams')}</span>`;
    return;
  }
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${t('paramCount')(count)}</span>`;
  $('#result-area').style.display = 'block';
  renderResult();
}

function renderResult() {
  if (!lastParsed) return;
  $('#tabs').innerHTML = `
    <button class="result-tab ${currentTab==='pairs'?'active':''}" onclick="setTab('pairs')">${t('pairs')}</button>
    <button class="result-tab ${currentTab==='json'?'active':''}" onclick="setTab('json')">${t('json')}</button>
    <button class="result-tab ${currentTab==='table'?'active':''}" onclick="setTab('table')">${t('table')}</button>`;
  let html = '';
  if (currentTab === 'pairs') {
    html = renderPairs(lastParsed);
  } else if (currentTab === 'json') {
    const jsonStr = JSON.stringify(lastParsed, null, 2);
    html = `<div id="json-out">${syntaxHighlight(jsonStr)}</div>
      <div style="margin-top:8px"><button class="gz-btn" onclick="copyText(${JSON.stringify(jsonStr)})">${t('copy')}</button></div>`;
  } else {
    html = renderTable(lastParsed);
  }
  $('#output').innerHTML = html;
}

window.setTab = function(tab) { currentTab = tab; renderResult(); };

function loadExample() {
  $('#input').value = 'https://example.com/search?q=hello+world&page=3&sort=desc&lang=en&tags[]=javascript&tags[]=html&tags[]=css&user.name=Alice&user.role=admin';
  doParse();
}

function doClear() {
  $('#input').value = '';
  $('#result-area').style.display = 'none';
  $('#status').innerHTML = '';
  lastParsed = null;
}

$('#input').addEventListener('input', doParse);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

</script>
