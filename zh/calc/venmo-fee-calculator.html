<script>
GZI18n.register({
  en: {
    toolTitle: 'Venmo Fee Calculator',
    toolDesc: 'Estimate Venmo instant transfer fees (1.75%, $0.25-$25), business profile fees (1.9% + $0.10) and credit-card send fees (3%). Enter amount — instant breakdown.',
    instant: 'Instant Transfer',
    business: 'Business Profile',
    credit: 'Send via Credit Card',
    amount: 'Amount ($)',
    direction: 'Calculation Mode',
    gross: 'Gross Amount',
    net: 'Net Amount Received',
    fee: 'Fee',
    rate: 'Fee Rate',
    calculate: 'Recalculate',
    copy: 'Copy Breakdown',
    step1: 'Pick the fee type (instant transfer, business profile, or credit card send)',
    step2: 'Enter the amount',
    step3: 'Choose whether the amount is before or after fees',
    step4: 'Read the net amount and total fee breakdown',
    disclaimer: 'Approximate 2025-2026 Venmo pricing. Instant transfer: 1.75% ($0.25-$25). Business profile: 1.9% + $0.10. Credit card send: 3%. Confirm current rates on venmo.com.',
  },
  zh: {
    toolTitle: 'Venmo 费用计算器',
    toolDesc: '估算 Venmo 即时转账费（1.75%，$0.25-$25）、商家账户费（1.9% + $0.10）和信用卡付款费（3%）。输入金额即可获得即时明细。',
    instant: '即时转账',
    business: '商家账户',
    credit: '信用卡付款',
    amount: '金额 ($)',
    direction: '计算方式',
    gross: '毛金额',
    net: '到账净额',
    fee: '手续费',
    rate: '费率',
    calculate: '重新计算',
    copy: '复制明细',
    step1: '选择费用类型（即时转账、商家账户或信用卡付款）',
    step2: '输入金额',
    step3: '选择金额是扣费前还是扣费后',
    step4: '查看到账净额和费用明细',
    disclaimer: '使用 2025-2026 年近似 Venmo 费率。即时转账 1.75%（$0.25-$25）。商家账户 1.9% + $0.10。信用卡付款 3%。请在 venmo.com 核实当前费率。',
  }
});

const { $, copyText, t } = GZ;

function getMode() { return document.querySelector('input[name="mode"]:checked').value; }

// Returns { rate, fixed, min, max, label }
function feeSchedule(mode) {
  if (mode === 'instant') return { rate: 0.0175, fixed: 0, min: 0.25, max: 25, label: '1.75% ($0.25–$25)' };
  if (mode === 'business') return { rate: 0.019, fixed: 0.10, min: 0, max: Infinity, label: '1.9% + $0.10' };
  return { rate: 0.03, fixed: 0, min: 0, max: Infinity, label: '3%' }; // credit
}

function computeFee(amount, sch) {
  let fee = amount * sch.rate + sch.fixed;
  if (fee < sch.min) fee = sch.min;
  if (fee > sch.max) fee = sch.max;
  return fee;
}

function money(n) { return '$' + (isFinite(n) ? n.toFixed(2) : '0.00'); }

function calculate() {
  const amount = parseFloat($('#amount').value) || 0;
  const mode = getMode();
  const dir = $('#direction').value;
  const sch = feeSchedule(mode);

  let gross, fee, net;
  if (dir === 'fromFee') {
    // amount is gross (what sender/buyer pays)
    gross = amount;
    fee = computeFee(gross, sch);
    net = gross - fee;
  } else {
    // amount is net (what receiver wants to keep)
    net = amount;
    // Solve for gross such that gross - fee(gross) = net
    // For percentage-only fees: gross = net / (1 - rate) when no fixed; with fixed it's iterative
    gross = net / (1 - sch.rate) + sch.fixed;
    for (let i = 0; i < 8; i++) {
      fee = computeFee(gross, sch);
      const diff = gross - fee - net;
      if (Math.abs(diff) < 0.0001) break;
      gross -= diff / (1 - sch.rate);
    }
    fee = computeFee(gross, sch);
    net = gross - fee;
  }

  const fmt = (lbl, val, cls='') => `<div class="result-line ${cls}"><span class="lbl">${lbl}</span><span class="val">${val}</span></div>`;
  $('#result').innerHTML =
    fmt(t('gross'), money(gross)) +
    fmt(t('rate'), sch.label) +
    fmt(t('fee'), '−' + money(fee)) +
    fmt(t('net'), money(net), 'total');
}

function copyBreakdown() { copyText($('#result').innerText); }

['#amount','#direction'].forEach(s => $(s).addEventListener('input', calculate));
document.querySelectorAll('input[name="mode"]').forEach(r => r.addEventListener('change', calculate));
$('#direction').addEventListener('change', calculate);

$('#lbl-instant').textContent = t('instant');
$('#lbl-business').textContent = t('business');
$('#lbl-credit').textContent = t('credit');
$('#lbl-amount').textContent = t('amount');
$('#lbl-direction').textContent = t('direction');
$('#disclaimer').textContent = t('disclaimer');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculate()">🧮 ${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyBreakdown()">📑 ${t('copy')}</button>`;

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'💎', href:'/calc/stripe-fee-calculator.html', name:'Stripe Fee'},
  ]
});
</script>
