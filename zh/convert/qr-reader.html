<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="drop-zone" id="drop-zone">
      <p id="drop-text" style="font-size:1.1em;font-weight:600"></p>
      <p id="drop-sub" style="font-size:.85em"></p>
      <input type="file" id="file-input" accept="image/*" style="display:none">
    </div>
    <div id="preview-area"></div>
    <div id="result-box" style="display:none"></div>
    <div id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'QR Code Reader',
    toolDesc: 'Read and decode QR codes from images — upload any QR code and instantly extract URLs, text, or data.',
    dropText: '📁 Drop a QR code image here or click to select',
    dropSub: 'Supports JPG, PNG, WebP, GIF',
    step1: 'Upload or drag and drop an image containing a QR code',
    step2: 'The tool automatically detects and decodes the QR code',
    step3: 'View the decoded text, URL, or data',
    step4: 'Click Copy to copy the decoded content',
  },
  zh: {
    toolTitle: 'QR 码识别器',
    toolDesc: '从图片中读取和解码 QR 码 — 上传任意二维码，即时提取网址、文字或数据。',
    dropText: '📁 拖拽二维码图片到此处或点击选择',
    dropSub: '支持 JPG、PNG、WebP、GIF 格式',
    step1: '上传或拖拽包含二维码的图片',
    step2: '工具自动检测并解码 QR 码',
    step3: '查看解码后的文字、网址或数据',
    step4: '点击「复制」复制解码内容',
  }
});

const { $, copyText, t } = GZ;

$('#drop-text').textContent = t('dropText');
$('#drop-sub').textContent = t('dropSub');

const dz = $('#drop-zone');
const fi = $('#file-input');

dz.addEventListener('click', () => fi.click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('dragover');
  if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
});
fi.addEventListener('change', () => { if (fi.files.length) processFile(fi.files[0]); });

function processFile(file) {
  if (!file.type.startsWith('image/')) {
    $('#status').innerHTML = '<span style="color:var(--gz-accent)">Please upload an image file.</span>';
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    $('#preview-area').innerHTML = `<img src="${dataUrl}" alt="QR Code">`;
    decodeQR(dataUrl);
  };
  reader.readAsDataURL(file);
}

function decodeQR(dataUrl) {
  $('#status').innerHTML = '<span style="color:var(--accent)">⏳ Scanning...</span>';
  $('#result-box').style.display = 'none';

  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = img.width;
    canvas.height = img.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height);

    if (code) {
      const data = code.data;
      const isUrl = /^https?:\/\//i.test(data);
      const display = isUrl ? `<a href="${data}" target="_blank" rel="noopener">${data}</a>` : data.replace(/</g,'&lt;');
      $('#result-box').innerHTML = `<strong>Result:</strong><br>${display}`;
      $('#result-box').style.display = '';
      $('#status').innerHTML = '<span style="color:var(--gz-success)">✓ QR code decoded!</span>';
    } else {
      $('#status').innerHTML = '<span style="color:var(--gz-accent)">✗ No QR code found in this image. Try a clearer image.</span>';
      $('#result-box').style.display = 'none';
    }
  };
  img.src = dataUrl;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;

function clearAll() {
  $('#preview-area').innerHTML = '';
  $('#result-box').style.display = 'none';
  $('#result-box').innerHTML = '';
  $('#status').innerHTML = '';
  fi.value = '';
}

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📱', href:'/convert/qrcode.html', name:'QR Code Generator'},
    {icon:'📊', href:'/convert/barcode.html', name:'Barcode Generator'},
    {icon:'🔄', href:'/image/converter.html', name:'Image Converter'},
    {icon:'🖼️', href:'/convert/image-to-pdf.html', name:'Image to PDF'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
