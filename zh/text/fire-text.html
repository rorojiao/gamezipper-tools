<div class="gz-container">
  <div class="gz-tool-header">

  <div class="gz-tool-area">

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Fire Text Generator 🔥',
    toolDesc: 'Turn your words into blazing fire text with flame emojis, heat-wave effects and burning styles. Perfect for gaming names, social bios and posts — copy & paste anywhere.',
    step1: 'Type or paste your text in the input box',
    step2: 'Browse the fire styles generated automatically',
    step3: 'Click Copy next to the style you like',
    step4: 'Paste into Instagram, TikTok, Discord, Free Fire and more',
  },
  zh: {
    toolTitle: '火焰文字生成器 🔥',
    toolDesc: '将你的文字转换为炫酷火焰文字，附带火焰表情、热浪效果和燃烧风格。适合游戏名字、社交简介和帖子 — 复制粘贴到任何平台。',
    step1: '在输入框中输入或粘贴文字',
    step2: '查看自动生成的火焰风格',
    step3: '点击复制按钮复制喜欢的风格',
    step4: '粘贴到 Instagram、TikTok、Discord、Free Fire 等平台',
  }
});

const { $, $$, t } = GZ;

const STYLES = [
  { name: 'Fire Emoji 🔥', fn: s => [...s].map(c => c === ' ' ? ' ' : c + '🔥').join('') },
  { name: 'Flame Wrap', fn: s => `🔥 ${s} 🔥` },
  { name: 'Double Flame', fn: s => `🔥🔥 ${s} 🔥🔥` },
  { name: 'All Caps Blaze', fn: s => [...s.toUpperCase()].map(c => /[A-Z0-9]/.test(c) ? c + '̷' : c).join('') + ' 🔥' },
  { name: 'Spark Burn', fn: s => [...s].map(c => c === ' ' ? ' ' : c + '\u0307').join('') + ' 🔥' },
  { name: 'Heat Wave', fn: s => [...s].map(c => /[a-zA-Z]/.test(c) ? c + '\u033F' : c).join('') },
  { name: 'Explosion 💥', fn: s => [...s.toUpperCase()].map(c => c === ' ' ? ' ' : c + '💥').join('') },
  { name: 'Crown Fire 👑🔥', fn: s => `👑 ${[...s].map(c => c === ' ' ? ' ' : c + '\u0305').join('')} 👑 🔥` },
  { name: 'Bold Blazing', fn: s => toBold(s) + ' 🔥' },
  { name: 'Inferno Stacked', fn: s => [...s].map(c => /[a-zA-Z]/.test(c) ? c + '\u0301\u030D' : c).join('') + ' 🔥' },
  { name: 'Red Devil 😈🔥', fn: s => `😈 ${s} 😈 🔥` },
  { name: 'Skull Flame 💀🔥', fn: s => `💀🔥 ${s} 🔥💀` },
];

const BOLD = {start:0x1D400};
function toBold(s){
  let o='';
  for(const c of s){
    const cc=c.charCodeAt(0);
    if(cc>=0x41&&cc<=0x5A)o+=String.fromCodePoint(BOLD.start+(cc-0x41));
    else if(cc>=0x61&&cc<=0x7A)o+=String.fromCodePoint(BOLD.start+26+(cc-0x61));
    else o+=c;
  }
  return o;
}

function render() {
  const text = $('#input').value;
  $('#grid').innerHTML = STYLES.map((s,i) =>
    `<div class="ft-row"><div class="name">${s.name}</div><div class="out" data-i="${i}"></div><button class="cp" data-i="${i}">${t('copy')}</button></div>`
  ).join('');
  STYLES.forEach((s,i) => {
    try { const el = $$('.ft-row .out[data-i="'+i+'"]')[0]; el.textContent = s.fn(text); } catch(e) {}
  });
  $$('.ft-row .cp').forEach(btn => btn.addEventListener('click', () => {
    const out = $$('.ft-row .out[data-i="'+btn.dataset.i+'"]')[0].textContent;
    GZ.copyText(out);
  }));
}

$('#input').addEventListener('input', render);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='BLAZE';render()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';render()">${t('clear')}</button>`;

$('#input').value = 'Fire';
render();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✨', href:'/text/fancy-text.html', name:'Fancy Text'},
    {icon:'〰️', href:'/text/wavy-text.html', name:'Wavy Text'},
    {icon:'🌀', href:'/text/zalgo.html', name:'Zalgo Text'},
    {icon:'💀', href:'/text/scary-text.html', name:'Scary Text'},
  ]
});
</script>
