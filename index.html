let currentFilter = 'all';

function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.gz-filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderTools();
}

  renderTools();

function renderTools() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sections = document.getElementById('tool-sections');
  const filtered = TOOLS.filter(tool => {
    if (currentFilter !== 'all' && tool.cat !== currentFilter) return false;
    if (q) {
      const info = tool[lang] || tool.en;
      return info.name.toLowerCase().includes(q) || info.desc.toLowerCase().includes(q) || tool.id.includes(q);
    }
    return true;
  });

  // Group by category
  const groups = {};
  filtered.forEach(tool => {
    if (!groups[tool.cat]) groups[tool.cat] = [];
    groups[tool.cat].push(tool);
  });

  const catOrder = ['text','dev','color','image','css','convert','seo','social','calc','fun','fortune'];
  let html = '';
  for (const cat of catOrder) {
    if (!groups[cat]) continue;
    const catInfo = GZ.CATEGORIES.find(c => c.id === cat);
    html += `<h2 class="section-title"><span class="icon">${catInfo?.icon||''}</span> ${t(cat+'Tools')}</h2>`;
    html += '<div class="gz-cards">';
    for (const tool of groups[cat]) {
      const info = tool[lang] || tool.en;
      html += `<a class="gz-card" href="${tool.path}"><span class="icon">${tool.icon}</span><h3>${info.name}</h3><p>${info.desc}</p><span class="tag">${t(cat+'Tools')}</span></a>`;
    }
    html += '</div>';
  }
  sections.innerHTML = html;
}

<!-- Error Boundary — catches unhandled errors, only shows toast for our own code if tools not loaded -->
<script>
(function(){
  var _errCount=0;
  function reportErr(type,msg,src){
    _errCount++;
    if(_errCount>5)return;
    if(!msg||!msg.trim())return;
    if(src&&src.indexOf(location.origin)!==0&&src.indexOf('/shared/')===-1&&src.indexOf('/dev/')===-1&&src.indexOf('/text/')===-1)return;
    var sections=document.getElementById('tool-sections');
    if(sections&&sections.children.length>0)return;
    if(_errCount===1)showRecoveryToast();
  }
  function showRecoveryToast(){
    var existing=document.getElementById('gz-error-toast');
    if(existing)return;
    var t=document.createElement('div');
    t.id='gz-error-toast';
    t.setAttribute('role','alert');
    t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#2a1a1a;border:1px solid #ff6b6b;color:#ffd93d;padding:10px 20px;border-radius:12px;font-size:.85em;z-index:100001;max-width:90vw;text-align:center;box-shadow:0 4px 20px rgba(255,107,107,.3);font-family:system-ui,sans-serif';
    t.innerHTML='Something went wrong — <button onclick="location.reload()" style="background:#4ecdc4;color:#000;border:none;padding:4px 14px;border-radius:8px;font-weight:700;cursor:pointer;font-size:.9em">Refresh</button>';
    document.body.appendChild(t);
    setTimeout(function(){if(t.parentNode)t.remove()},15000);
  }
  window.onerror=function(msg,src,lineno,colno,err){reportErr('err',msg,src,lineno,colno,err)};
  window.addEventListener('unhandledrejection',function(e){reportErr('rej',String(e.reason),'promise',0,0,null)});
})();
</script>
