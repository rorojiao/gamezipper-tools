const { $, copyText, t } = GZ;
const na = t('na');

function val(v, cls){ return `<span class="v ${cls||''}">${(v===undefined||v===null||v==='')?na:v}</span>`; }
function yn(b){ return b?t('yes'):t('no'); }
function row(k, v, cls){ return `<div class="info-row"><span class="k">${k}</span>${val(v, cls)}</div>`; }

// Browser/engine detection from UA
function detectBrowser(){
  const ua=navigator.userAgent;
  let b='Unknown', e='Unknown';
  if(/Edg\//.test(ua)){ b='Microsoft Edge'; }
  else if(/OPR\/|Opera/.test(ua)){ b='Opera'; }
  else if(/SamsungBrowser/.test(ua)){ b='Samsung Internet'; }
  else if(/Firefox\//.test(ua)){ b='Firefox'; }
  else if(/Chrome\//.test(ua)){ b='Chrome'; }
  else if(/Safari\//.test(ua)){ b='Safari'; }
  const m=ua.match(/(Edg|OPR|Firefox|Chrome|Version|Safari)\/(\d+[\.\d]*)/);
  const ver = b==='Edge'? (ua.match(/Edg\/([\d.]+)/)||[])[1]
    : b==='Opera'? (ua.match(/OPR\/([\d.]+)/)||[])[1]
    : b==='Firefox'? (ua.match(/Firefox\/([\d.]+)/)||[])[1]
    : b==='Chrome'? (ua.match(/Chrome\/([\d.]+)/)||[])[1]
    : b==='Safari'? (ua.match(/Version\/([\d.]+)/)||ua.match(/Safari\/([\d.]+)/)||[])[1]
    : (m&&m[2])||'';
  if(/Gecko\/|Firefox/.test(ua) && !/like Gecko/.test(navigator.userAgent.toLowerCase().replace('like gecko','')) || /Firefox/.test(ua)) e='Gecko';
  if(/AppleWebKit/.test(ua)) e=/Chrome/.test(ua)?'Blink':'WebKit';
  return {name:b, version:ver, engine:e};
}

function detectOS(){
  const ua=navigator.userAgent, p=navigator.platform||'', uaData=navigator.userAgentData;
  let os='Unknown';
  if(/Windows NT 10/.test(ua)) os='Windows 10/11';
  else if(/Windows NT 6\.3/.test(ua)) os='Windows 8.1';
  else if(/Windows NT 6\.2/.test(ua)) os='Windows 8';
  else if(/Windows NT 6\.1/.test(ua)) os='Windows 7';
  else if(/Windows/.test(ua)) os='Windows';
  else if(/Android (\d+)/.test(ua)) os='Android '+((ua.match(/Android (\d+[\.\d]*)/)||[])[1]||'');
  else if(/iPhone|iPad|iPod/.test(ua)) os='iOS '+((ua.match(/OS (\d+[_\d]*)/)||[])[1]||'').replace(/_/g,'.');
  else if(/Mac OS X/.test(ua)) os='macOS '+((ua.match(/Mac OS X (\d+[_\d]*)/)||[])[1]||'').replace(/_/g,'.');
  else if(/Linux/.test(ua)) os='Linux';
  else if(/CrOS/.test(ua)) os='Chrome OS';
  const arch=(uaData&&uaData.architecture)||(/WOW64|Win64|x64/.test(ua)?'x86_64':(/arm|aarch/i.test(ua)?'arm':''));
  return {os, platform:p, arch};
}

function gpuInfo(){
  try{
    const c=document.createElement('canvas');
    const gl=c.getContext('webgl')||c.getContext('experimental-webgl');
    if(!gl) return {vendor:na, renderer:na};
    const ext=gl.getExtension('WEBGL_debug_renderer_info');
    return {
      vendor: ext?gl.getParameter(ext.UNMASKED_VENDOR_WEBGL):gl.getParameter(gl.VENDOR),
      renderer: ext?gl.getParameter(ext.UNMASKED_RENDERER_WEBGL):gl.getParameter(gl.RENDERER)
    };
  }catch(e){ return {vendor:na, renderer:na}; }
}

function gcd(a,b){return b?gcd(b,a%b):a;}

function card(title, icon, rows){
  return `<div class="info-card"><h3>${title}</h3>${rows.join('')}</div>`;
}

let batteryObj=null;
function fetchBattery(){
  if(navigator.getBattery){
    navigator.getBattery().then(b=>{
      batteryObj=b;
      render();
      b.addEventListener('levelchange', render);
      b.addEventListener('chargingchange', render);
    }).catch(()=>{});
  }
}

function render(){
  const scr=screen, w=window, nav=navigator;
  const br=detectBrowser(), osi=detectOS(), gpu=gpuInfo();
  const conn=nav.connection||nav.mozConnection||nav.webkitConnection||{};
  const dpr=window.devicePixelRatio||1;
  const physW=Math.round(scr.width*dpr), physH=Math.round(scr.height*dpr);
  const aw=scr.availWidth, ah=scr.availHeight;
  const cd=scr.colorDepth;
  const orient = (scr.orientation&&scr.orientation.type)|| (w.innerHeight>w.innerWidth?'portrait':'landscape');
  const g=gcd(scr.width,scr.height);
  let gamut = na;
  try {
    if (w.matchMedia('(color-gamut: rec2020)').matches) gamut = 'Rec. 2020';
    else if (w.matchMedia('(color-gamut: p3)').matches) gamut = 'Display P3';
    else if (w.matchMedia('(color-gamut: srgb)').matches) gamut = 'sRGB';
  } catch (e) { gamut = na; }
  const hdr = (w.matchMedia&&(w.matchMedia('(dynamic-range: high)').matches?'HDR':'SDR'))||na;
  let refresh=na;
  try{ refresh=(w.screen.isExtended!==undefined?'multi-monitor ':'')+refresh; }catch(e){}
  if(w.devicePixelRatio && scr.refreshRate) refresh=scr.refreshRate;

  const cards=[];
  cards.push(card(t('screen'),'🖥️',[
    row(t('screenRes'), `${scr.width} × ${scr.height} ${dpr!==1?`(${physW} × ${physH} @${dpr}x)`:''}`),
    row(t('viewport'), `${w.innerWidth} × ${w.innerHeight}`),
    row(t('innerWH'), `${document.documentElement.clientWidth} × ${document.documentElement.clientHeight} (doc)`),
    row(t('avail'), `${aw} × ${ah}`),
    row(t('dpr'), dpr),
    row(t('colorDepth'), cd+'-bit'),
    row(t('colorGamut'), gamut),
    row(t('hdr'), hdr),
    row(t('orient'), orient),
    row(t('aspect'), g?`${scr.width/g}:${scr.height/g}`:na),
  ]));

  cards.push(card(t('browser'),'🌐',[
    row(t('browser'), br.name+' '+(br.version||'')),
    row(t('engine'), br.engine),
    row(t('lang'), nav.language||na),
    row(t('langs'), nav.languages?(nav.languages.join(', ')):na),
    row(t('cookies'), yn(nav.cookieEnabled)),
    row(t('online'), yn(nav.onLine), nav.onLine?'val-good':'val-bad'),
    row(t('doNotTrack'), nav.doNotTrack==null?na:yn(nav.doNotTrack==='1')),
    row(t('pdfView'), yn(nav.pdfViewerEnabled!==undefined?nav.pdfViewerEnabled:true)),
    row(t('webdriver'), yn(!!nav.webdriver), nav.webdriver?'val-bad':'val-good'),
    row(t('ua'), nav.userAgent),
  ]));

  cards.push(card(t('os'),'💻',[
    row(t('osName'), osi.os),
    row(t('platform'), osi.platform),
    row(t('arch'), osi.arch||na),
    row(t('cpuArch'), nav.userAgentData?(nav.userAgentData.architecture||na):(na)),
    row(t('locale'), Intl.DateTimeFormat().resolvedOptions().locale),
  ]));

  cards.push(card(t('hw'),'⚙️',[
    row(t('cores'), nav.hardwareConcurrency||na),
    row(t('memory'), nav.deviceMemory!=null?nav.deviceMemory:na),
    row(t('gpuVendor'), gpu.vendor),
    row(t('gpu'), gpu.renderer),
  ]));

  cards.push(card(t('net'),'📡',[
    row(t('connType'), conn.effectiveType||conn.type||na),
    row(t('downlink'), conn.downlink!=null?conn.downlink:na),
    row(t('rtt'), conn.rtt!=null?conn.rtt:na),
    row(t('saveData'), conn.saveData!=null?yn(conn.saveData):na),
  ]));

  const off=-new Date().getTimezoneOffset();
  cards.push(card(t('locale'),'🌍',[
    row(t('tz'), Intl.DateTimeFormat().resolvedOptions().timeZone),
    row(t('tzOffset'), (off>=0?'+':'')+String(Math.floor(Math.abs(off)/60)).padStart(2,'0')+':'+String(Math.abs(off)%60).padStart(2,'0')),
    row(t('date'), new Date().toString()),
  ]));

  const maxTouch=nav.maxTouchPoints||0;
  cards.push(card(t('touch'),'👆',[
    row(t('touchSup'), yn(('ontouchstart' in window)||maxTouch>0)),
    row(t('touchPoints'), maxTouch),
    row(t('pointer'), nav.pointerCapabilities?JSON.stringify(nav.pointerCapabilities):na),
    row(t('stylus'), yn(w.matchMedia&&w.matchMedia('(any-pointer: fine)').matches?true:false)),
  ]));

  if(batteryObj){
    cards.push(card(t('power'),'🔋',[
      row(t('batLevel'), Math.round(batteryObj.level*100)+'%', batteryObj.level<0.2?'val-bad':'val-good'),
      row(t('charging'), yn(batteryObj.charging)),
      row(t('discharging'), batteryObj.dischargingTime!=null&&isFinite(batteryObj.dischargingTime)?Math.round(batteryObj.dischargingTime/60)+' min':na),
    ]));
  }

  $('#info').innerHTML = `<div class="info-grid">${cards.join('')}</div>`;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="render()">↻ ${t('refresh')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="GZ.copyText($('#info').innerText)">${t('copy')}</button>`;

window.addEventListener('resize', render);
window.addEventListener('orientationchange', render);

GZ.renderToolPage({
  category:'dev', titleKey:'devTitle', descKey:'devDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'🌐',href:'/dev/browser-info.html',name:'Browser Info'},
    {icon:'🖥️',href:'/dev/screen-resolution.html',name:'Screen Resolution'},
    {icon:'👆',href:'/dev/user-agent-parser.html',name:'User Agent Parser'},
    {icon:'#️⃣',href:'/dev/hash.html',name:'Hash Generator'},
  ]
});
fetchBattery();
render();
</script>
