<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is dimensional weight?", "acceptedAnswer": {"@type": "Answer", "text": "Dimensional (DIM) weight is a pricing technique used by carriers that considers package volume, not just actual weight. It is calculated as (Length × Width × Height) ÷ DIM divisor. Carriers charge based on whichever is greater: actual weight or dimensional weight."}}, {"@type": "Question", "name": "What DIM divisor should I use?", "acceptedAnswer": {"@type": "Answer", "text": "The standard DIM divisor is 139 for inches/pounds (US domestic) and 166 for some international shipments. The calculator defaults to 139 but you can change it to match your carrier's specific divisor."}}, {"@type": "Question", "name": "How is the shipping rate calculated?", "acceptedAnswer": {"@type": "Answer", "text": "The calculator uses a base rate plus per-pound rate model. Total = base rate + (billable weight × per-lb rate) + handling fee + optional markup percentage. You can adjust all parameters to match your carrier or fulfillment scenario."}}, {"@type": "Question", "name": "Can I add a handling fee or markup?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Enter a flat handling fee and/or a markup percentage. The markup is applied to the shipping cost before the handling fee is added, which is useful for e-commerce stores that charge customers a premium for shipping."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="sc-grid">
      <div class="sc-card">
        <label id="lbl-weight"></label>
        <div style="display:flex;gap:8px">
          <input type="number" id="weight" value="2" min="0" step="0.1" style="margin-bottom:12px">
          <select id="weightUnit" style="width:auto;margin-bottom:12px">
            <option value="lb">lb</option>
            <option value="kg">kg</option>
          </select>
        </div>
        <label id="lbl-dim"></label>
        <div class="sc-dim-row">
          <input type="number" id="length" value="12" min="0" placeholder="L">
          <input type="number" id="width" value="10" min="0" placeholder="W">
          <input type="number" id="height" value="6" min="0" placeholder="H">
        </div>
        <div style="font-size:.75rem;color:var(--text2);margin-top:6px" id="dim-unit-hint">inches</div>
      </div>
      <div class="sc-card">
        <label id="lbl-base"></label>
        <input type="number" id="baseRate" value="5.00" min="0" step="0.01">
        <label id="lbl-perlb"></label>
        <input type="number" id="perLb" value="1.50" min="0" step="0.01">
        <label id="lbl-handling"></label>
        <input type="number" id="handling" value="0" min="0" step="0.01">
        <label id="lbl-markup"></label>
        <input type="number" id="markup" value="0" min="0" step="0.1">
      </div>
    </div>
    <div id="output"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Shipping Cost Calculator',
    toolDesc: 'Estimate shipping rates by weight and dimensions. Compare dimensional vs actual weight, add handling fees and markup. Free, browser-only.',
    calculate: 'Calculate', reset: 'Reset',
    lblWeight: 'Actual Weight', lblDim: 'Package Dimensions (L × W × H)', lblBase: 'Base Rate ($)', lblPerLb: 'Rate per Pound ($/lb)',
    lblHandling: 'Handling Fee ($)', lblMarkup: 'Markup (%)',
    actualWeight: 'Actual Weight', dimWeight: 'Dimensional Weight', billableWeight: 'Billable Weight',
    baseCost: 'Base Rate', weightCost: 'Weight Cost', subtotal: 'Subtotal', handlingFee: 'Handling Fee', markupAmount: 'Markup',
    totalShipping: 'Total Shipping Cost', customerPays: 'Customer Pays (with markup)',
    tipDim: '💡 Tip: Large, lightweight packages are billed by dimensional weight. Compress packaging to save on shipping.',
    tipActual: '✓ Your package is billed by actual weight — dimensional weight is lower, so you are not penalized for size.',
    step1: 'Enter the package actual weight and dimensions',
    step2: 'Set the base rate and per-pound rate from your carrier',
    step3: 'Optionally add a handling fee and markup percentage',
    step4: 'Click Calculate to compare dimensional vs actual weight and see total cost',
  },
  zh: {
    toolTitle: '运费计算器',
    toolDesc: '按重量和尺寸估算运费。对比体积重和实重，添加处理费和加价比例。免费、浏览器本地运行。',
    calculate: '计算', reset: '重置',
    lblWeight: '实际重量', lblDim: '包裹尺寸（长 × 宽 × 高）', lblBase: '基础费（$）', lblPerLb: '每磅费率（$/lb）',
    lblHandling: '处理费（$）', lblMarkup: '加价比例（%）',
    actualWeight: '实际重量', dimWeight: '体积重', billableWeight: '计费重量',
    baseCost: '基础费', weightCost: '重量费', subtotal: '小计', handlingFee: '处理费', markupAmount: '加价',
    totalShipping: '总运费', customerPays: '客户支付（含加价）',
    tipDim: '💡 提示：大件轻量包裹按体积重计费。压缩包装可节省运费。',
    tipActual: '✓ 你的包裹按实际重量计费 — 体积重较低，不会因尺寸被加价。',
    step1: '输入包裹的实际重量和尺寸',
    step2: '设置承运商的基础费和每磅费率',
    step3: '可选添加处理费和加价比例',
    step4: '点击「计算」对比体积重和实际重量，查看总费用',
  }
});

const { $, t } = GZ;
const DIM_DIVISOR = 139;
const KG_TO_LB = 2.20462;

function num(id){ return parseFloat($(id).value) || 0; }

function calculate(){
  const wUnit = $('#weightUnit').value;
  let actualWeight = num('weight');
  if(wUnit === 'kg') actualWeight *= KG_TO_LB;

  const l = num('length'), w = num('width'), h = num('height');
  const dimWeight = (l * w * h) / DIM_DIVISOR;
  const billable = Math.max(actualWeight, dimWeight);
  const useDim = dimWeight > actualWeight;

  const baseRate = num('baseRate');
  const perLb = num('perLb');
  const handling = num('handling');
  const markupPct = num('markup');

  const weightCost = billable * perLb;
  const subtotal = baseRate + weightCost;
  const markupAmt = subtotal * (markupPct / 100);
  const customerTotal = subtotal + markupAmt + handling;

  const fmt2 = n => '$' + n.toFixed(2);

  $('#output').innerHTML = `
    <div class="sc-results">
      <h3>${t('billableWeight')} & ${t('totalShipping')}</h3>
      <div class="sc-compare">
        <div class="sc-compare-card ${useDim ? 'lose' : 'win'}">
          <div class="lbl" style="font-size:.8rem;color:var(--text2);margin-bottom:6px">${t('actualWeight')}</div>
          <div class="big">${actualWeight.toFixed(2)} lb</div>
        </div>
        <div class="sc-compare-card ${useDim ? 'win' : 'lose'}">
          <div class="lbl" style="font-size:.8rem;color:var(--text2);margin-bottom:6px">${t('dimWeight')} <span style="opacity:.6">(÷${DIM_DIVISOR})</span></div>
          <div class="big">${dimWeight.toFixed(2)} lb</div>
        </div>
      </div>
      <div style="margin-top:14px">
        <div class="sc-result-row"><span>${t('billableWeight')}</span><span class="val">${billable.toFixed(2)} lb</span></div>
        <div class="sc-result-row"><span>${t('baseCost')}</span><span>${fmt2(baseRate)}</span></div>
        <div class="sc-result-row"><span>${t('weightCost')} (${billable.toFixed(1)} × ${fmt2(perLb)})</span><span>${fmt2(weightCost)}</span></div>
        <div class="sc-result-row"><span>${t('subtotal')}</span><span>${fmt2(subtotal)}</span></div>
        ${markupPct > 0 ? `<div class="sc-result-row"><span>${t('markupAmount')} (${markupPct}%)</span><span>${fmt2(markupAmt)}</span></div>` : ''}
        ${handling > 0 ? `<div class="sc-result-row"><span>${t('handlingFee')}</span><span>${fmt2(handling)}</span></div>` : ''}
        <div class="sc-result-row total"><span>${customerPaysLabel()}</span><span class="val">${fmt2(customerTotal)}</span></div>
      </div>
      <div class="sc-tip">${useDim ? t('tipDim') : t('tipActual')}</div>
    </div>`;

  function customerPaysLabel(){
    return markupPct > 0 || handling > 0 ? t('customerPays') : t('totalShipping');
  }
}

function reset(){
  $('#weight').value = '2';
  $('#weightUnit').value = 'lb';
  $('#length').value = '12';
  $('#width').value = '10';
  $('#height').value = '6';
  $('#baseRate').value = '5.00';
  $('#perLb').value = '1.50';
  $('#handling').value = '0';
  $('#markup').value = '0';
  calculate();
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="calculate()">${t('calculate')}</button><button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/tip-calculator.html', name:'Tip Calculator'},
    {icon:'🧾', href:'/calc/bill-splitter.html', name:'Bill Splitter'},
    {icon:'📦', href:'/text/shipping-policy-generator.html', name:'Shipping Policy Generator'},
    {icon:'🧾', href:'/text/invoice-generator.html', name:'Invoice Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
