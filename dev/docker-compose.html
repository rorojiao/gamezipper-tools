<style>

.service-card h3{margin:0 0 10px;font-size:1em;display:flex;align-items:center;gap:8px}
.service-card h3 span{cursor:pointer;opacity:.6;font-size:.8em}
.service-card h3 span:hover{opacity:1;color:var(--gz-accent)}
.svc-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.svc-row label{font-size:.8em;opacity:.7;min-width:70px}
.svc-row input,.svc-row select{background:var(--glass);border:1px solid var(--border);color:var(--fg);border-radius:6px;padding:5px 8px;font-size:.85em;flex:1;min-width:100px}
.env-row{display:flex;gap:6px;margin:4px 0;align-items:center}
.env-row input{background:var(--glass);border:1px solid var(--border);color:var(--fg);border-radius:6px;padding:4px 8px;font-size:.82em;flex:1}
.env-row button{background:none;border:none;color:var(--gz-accent);cursor:pointer;font-size:1.1em;padding:2px 6px}
.port-row{display:flex;gap:6px;margin:4px 0;align-items:center}
.port-row input{background:var(--glass);border:1px solid var(--border);color:var(--fg);border-radius:6px;padding:4px 8px;font-size:.82em;width:90px}
.port-row button{background:none;border:none;color:var(--gz-accent);cursor:pointer;font-size:1.1em;padding:2px 6px}
#output{white-space:pre-wrap;word-break:break-all;font-family:monospace;font-size:.85em;line-height:1.6;background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:16px;max-height:500px;overflow:auto}
.add-btn{font-size:.85em;cursor:pointer;color:var(--accent);background:none;border:1px dashed var(--border);border-radius:8px;padding:6px 14px}
.add-btn:hover{background:var(--glass2)}
</style>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div id="services"></div>
    <button class="add-btn" onclick="addService()">+ Add Service</button>
    <h3 style="margin-top:20px" id="output-title"></h3>
    <div id="output"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Docker Compose Generator',
    toolDesc: 'Generate docker-compose.yml files visually — add services, ports, volumes, env vars and networks with one click.',
    outputTitle: '📄 docker-compose.yml',
    addEnv: '+ Env Var',
    addPort: '+ Port Mapping',
    addVolume: '+ Volume',
    svcName: 'Service Name',
    image: 'Image',
    restart: 'Restart Policy',
    step1: 'Click "+ Add Service" to define a container',
    step2: 'Set image, ports, volumes and environment variables',
    step3: 'Add multiple services for your stack',
    step4: 'Copy the generated YAML or download as docker-compose.yml',
  },
  zh: {
    toolTitle: 'Docker Compose 生成器',
    toolDesc: '可视化生成 docker-compose.yml 文件 — 一键添加服务、端口、卷、环境变量和网络。',
    outputTitle: '📄 docker-compose.yml',
    addEnv: '+ 环境变量',
    addPort: '+ 端口映射',
    addVolume: '+ 数据卷',
    svcName: '服务名称',
    image: '镜像',
    restart: '重启策略',
    step1: '点击「+ 添加服务」定义一个容器',
    step2: '设置镜像、端口、卷和环境变量',
    step3: '为你的技术栈添加多个服务',
    step4: '复制生成的 YAML 或下载为 docker-compose.yml',
  }
});

const { $, copyText, t } = GZ;
let svcCounter = 0;

function addService(preset) {
  const id = svcCounter++;
  const div = document.createElement('div');
  div.className = 'service-card';
  div.id = 'svc-' + id;
  div.innerHTML = `
    <h3>🐳 <input type="text" class="svc-name" placeholder="${t('svcName')}" value="${preset?.name||'web'}" style="background:transparent;border:none;color:var(--fg);font-size:1em;font-weight:bold;width:150px">
    <span onclick="this.closest('.service-card').remove();generate()" title="Remove">✕</span></h3>
    <div class="svc-row"><label>Image:</label><input type="text" class="svc-image" placeholder="${t('image')}" value="${preset?.image||'nginx:latest'}"></div>
    <div class="svc-row"><label>Container:</label><input type="text" class="svc-container" placeholder="container_name" value="${preset?.container||''}"></div>
    <div class="svc-row"><label>Restart:</label><select class="svc-restart"><option value="">none</option><option value="always" selected>always</option><option value="on-failure">on-failure</option><option value="unless-stopped">unless-stopped</option></select></div>
    <div class="svc-row"><label>Command:</label><input type="text" class="svc-command" placeholder="command" value="${preset?.command||''}"></div>
    <div><small>🔌 Ports:</small><div class="ports-list"></div><button class="add-btn" onclick="addPort(this)">${t('addPort')}</button></div>
    <div style="margin-top:8px"><small>📦 Volumes:</small><div class="volumes-list"></div><button class="add-btn" onclick="addVolume(this)">${t('addVolume')}</button></div>
    <div style="margin-top:8px"><small>🔑 Environment:</small><div class="envs-list"></div><button class="add-btn" onclick="addEnv(this)">${t('addEnv')}</button></div>
  `;
  $('#services').appendChild(div);
  div.querySelectorAll('input,select').forEach(el => el.addEventListener('input', generate));
  if (preset?.ports) preset.ports.forEach(p => { addPort(div.querySelector('.add-btn'), p.host, p.container); });
  if (preset?.volumes) preset.volumes.forEach(v => { addVolume(div.querySelector('.add-btn'), v.host, v.container); });
  if (preset?.envs) preset.envs.forEach(e => { addEnv(div.querySelector('.add-btn'), e.key, e.value); });
  generate();
}

function addPort(btn, host, container) {
  const row = document.createElement('div');
  row.className = 'port-row';
  row.innerHTML = `<input type="text" class="port-host" placeholder="Host port" value="${host||'80'}"><span>:</span><input type="text" class="port-container" placeholder="Container port" value="${container||'80'}"><button onclick="this.parentElement.remove();generate()">✕</button>`;
  btn.parentElement.insertBefore(row, btn);
  row.querySelectorAll('input').forEach(el => el.addEventListener('input', generate));
}

function addVolume(btn, host, container) {
  const row = document.createElement('div');
  row.className = 'port-row';
  row.innerHTML = `<input type="text" class="vol-host" placeholder="Host path" value="${host||''}"><span>:</span><input type="text" class="vol-container" placeholder="Container path" value="${container||''}"><button onclick="this.parentElement.remove();generate()">✕</button>`;
  btn.parentElement.insertBefore(row, btn);
  row.querySelectorAll('input').forEach(el => el.addEventListener('input', generate));
}

function addEnv(btn, key, value) {
  const row = document.createElement('div');
  row.className = 'env-row';
  row.innerHTML = `<input type="text" class="env-key" placeholder="KEY" value="${key||''}"><span>=</span><input type="text" class="env-value" placeholder="value" value="${value||''}"><button onclick="this.parentElement.remove();generate()">✕</button>`;
  btn.parentElement.insertBefore(row, btn);
  row.querySelectorAll('input').forEach(el => el.addEventListener('input', generate));
}

function generate() {
  const cards = document.querySelectorAll('.service-card');
  if (!cards.length) { $('#output').textContent = '# Add a service above to generate docker-compose.yml'; return; }
  let yaml = 'version: "3.8"\n\nservices:\n';
  cards.forEach(card => {
    const name = card.querySelector('.svc-name').value.trim() || 'service';
    const image = card.querySelector('.svc-image').value.trim();
    const container = card.querySelector('.svc-container').value.trim();
    const restart = card.querySelector('.svc-restart').value;
    const command = card.querySelector('.svc-command').value.trim();
    yaml += `  ${name}:\n`;
    if (image) yaml += `    image: ${image}\n`;
    if (container) yaml += `    container_name: ${container}\n`;
    if (restart) yaml += `    restart: ${restart}\n`;
    if (command) yaml += `    command: ${command}\n`;

    const ports = card.querySelectorAll('.port-row');
    if (ports.length) {
      yaml += '    ports:\n';
      ports.forEach(r => {
        const h = r.querySelector('.port-host').value.trim();
        const c = r.querySelector('.port-container').value.trim();
        if (h || c) yaml += `      - "${h}:${c}"\n`;
      });
    }

    const vols = card.querySelectorAll('.port-row');
    const volSection = card.querySelectorAll('.volumes-list .port-row');
    if (volSection.length) {
      yaml += '    volumes:\n';
      volSection.forEach(r => {
        const h = r.querySelector('.vol-host').value.trim();
        const c = r.querySelector('.vol-container').value.trim();
        if (h || c) yaml += `      - ${h}:${c}\n`;
      });
    }

    const envs = card.querySelectorAll('.env-row');
    if (envs.length) {
      yaml += '    environment:\n';
      envs.forEach(r => {
        const k = r.querySelector('.env-key').value.trim();
        const v = r.querySelector('.env-value').value.trim();
        if (k) yaml += `      ${k}: "${v}"\n`;
      });
    }
    yaml += '\n';
  });
  $('#output').textContent = yaml;
}

function downloadYaml() {
  const blob = new Blob([$('#output').textContent], {type: 'text/yaml'});
  const a = document.createElement('a');
  a.download = 'docker-compose.yml';
  a.href = URL.createObjectURL(blob);
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadPreset(name) {
  document.querySelectorAll('.service-card').forEach(c => c.remove());
  const presets = {
    nginx: [{name:'web',image:'nginx:alpine',ports:[{host:'80',container:'80'}],volumes:[{host:'./html',container:'/usr/share/nginx/html'}]}],
    wordpress: [
      {name:'wordpress',image:'wordpress:latest',ports:[{host:'8080',container:'80'}],envs:[{key:'WORDPRESS_DB_HOST',value:'db'},{key:'WORDPRESS_DB_USER',value:'wp'},{key:'WORDPRESS_DB_PASSWORD',value:'secret'},{key:'WORDPRESS_DB_NAME',value:'wordpress'}]},
      {name:'db',image:'mysql:8.0',envs:[{key:'MYSQL_DATABASE',value:'wordpress'},{key:'MYSQL_USER',value:'wp'},{key:'MYSQL_PASSWORD',value:'secret'},{key:'MYSQL_ROOT_PASSWORD',value:'rootsecret'}],volumes:[{host:'db_data',container:'/var/lib/mysql'}]}
    ],
    node: [{name:'app',image:'node:20-alpine',ports:[{host:'3000',container:'3000'}],volumes:[{host:'.',container:'/app'}],command:'node server.js'}],
    redis: [{name:'redis',image:'redis:alpine',ports:[{host:'6379',container:'6379'}]}],
    postgres: [{name:'db',image:'postgres:16',envs:[{key:'POSTGRES_DB',value:'mydb'},{key:'POSTGRES_USER',value:'admin'},{key:'POSTGRES_PASSWORD',value:'secret'}],volumes:[{host:'pg_data',container:'/var/lib/postgresql/data'}],ports:[{host:'5432',container:'5432'}]}],
  };
  const p = presets[name] || [];
  p.forEach(s => addService(s));
}

$('#output-title').textContent = t('outputTitle');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadYaml()">⬇ YAML</button>
  <select class="gz-select" onchange="loadPreset(this.value);this.selectedIndex=0">
    <option value="">${t('example')}...</option>
    <option value="nginx">Nginx</option>
    <option value="wordpress">WordPress + MySQL</option>
    <option value="node">Node.js</option>
    <option value="redis">Redis</option>
    <option value="postgres">PostgreSQL</option>
  </select>`;

addService({name:'web',image:'nginx:alpine',ports:[{host:'80',container:'80'}]});

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⚙️', href:'/dev/nginx-config.html', name:'Nginx Config'},
    {icon:'🚫', href:'/dev/gitignore-generator.html', name:'.gitignore'},
    {icon:'📱', href:'/dev/webmanifest.html', name:'PWA Manifest'},
    {icon:'📄', href:'/dev/yaml.html', name:'YAML Formatter'},
  ]
});
</script>

</body>
</html>
