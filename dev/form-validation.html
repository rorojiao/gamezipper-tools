<div class="gz-container">
  <div class="gz-tool-header">

  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Form Validation Generator',
    toolDesc: 'Generate JavaScript form validation code instantly. Add fields, set rules, customize error messages — copy production-ready JS.',
    fieldName: 'Field Name',
    type: 'Type',
    rules: 'Rules',
    errorMsg: 'Error Message',
    addField: '+ Add Field',
    generate: 'Generate Code',
    preview: 'Preview Form',
    copy: 'Copy',
    clear: 'Clear',
    required: 'Required',
    minLength: 'Min Length',
    maxLength: 'Max Length',
    step1: 'Add fields with names, types and validation rules',
    step2: 'Customize error messages for each rule',
    step3: 'Click "Generate Code" to produce JS',
    step4: 'Preview the form or copy the code to your project',
  },
  zh: {
    toolTitle: '表单验证代码生成器',
    toolDesc: '即时生成 JavaScript 表单验证代码。添加字段、设置规则、自定义错误信息 — 一键复制生产可用 JS。',
    fieldName: '字段名',
    type: '类型',
    rules: '规则',
    errorMsg: '错误信息',
    addField: '+ 添加字段',
    generate: '生成代码',
    preview: '预览表单',
    copy: '复制',
    clear: '清空',
    required: '必填',
    minLength: '最小长度',
    maxLength: '最大长度',
    step1: '添加字段，设置名称、类型和验证规则',
    step2: '自定义每条规则的错误信息',
    step3: '点击「生成代码」生成 JS',
    step4: '预览表单或复制代码到你的项目',
  }
});

const { $, copyText, t } = GZ;
let fields = [
  { name: 'username', type: 'text', rules: ['required', 'min:3', 'max:20'], msg: 'Username is required (3-20 chars)' },
  { name: 'email', type: 'email', rules: ['required', 'email'], msg: 'Please enter a valid email' },
  { name: 'password', type: 'password', rules: ['required', 'min:8'], msg: 'Password must be at least 8 characters' },
];

function renderFields() {
  const ruleOpts = ['required','email','url','number','min:3','min:5','min:8','max:20','max:50','max:100','pattern'];
  $('#fields').innerHTML = fields.map((f, i) => `<div class="field-row">
    <input value="${f.name}" placeholder="${t('fieldName')}" onchange="fields[${i}].name=this.value">
    <select onchange="fields[${i}].type=this.value;renderFields()">${['text','email','password','number','url','tel'].map(tp => `<option ${tp===f.type?'selected':''}>${tp}</option>`).join('')}</select>
    <select multiple onchange="fields[${i}].rules=Array.from(this.selectedOptions).map(o=>o.value)" style="height:60px">${ruleOpts.map(r => `<option value="${r}" ${f.rules.includes(r)?'selected':''}>${r}</option>`).join('')}</select>
    <input value="${f.msg}" placeholder="${t('errorMsg')}" onchange="fields[${i}].msg=this.value">
  </div>`).join('');
  $('#fields').innerHTML += `<button class="gz-btn gz-btn-secondary" onclick="addField()" style="margin-top:4px;font-size:.85em">${t('addField')}</button>`;
}

function addField() { fields.push({ name: '', type: 'text', rules: ['required'], msg: 'This field is required' }); renderFields(); }

function generateCode() {
  let code = `// Form Validation — Generated by GameZipper Tools\nfunction validateForm(form) {\n  const errors = {};\n`;
  fields.forEach(f => {
    if (!f.name) return;
    code += `\n  // ${f.name}\n`;
    code += `  const ${f.name} = form.${f.name}?.trim() || '';\n`;
    if (f.rules.includes('required')) {
      code += `  if (!${f.name}) errors.${f.name} = '${f.msg}';\n`;
    }
    if (f.rules.includes('email')) {
      code += `  else if (${f.name} && !/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(${f.name})) errors.${f.name} = 'Please enter a valid email';\n`;
    }
    if (f.rules.includes('url')) {
      code += `  else if (${f.name} && !/^https?:\\/\\/.+/.test(${f.name})) errors.${f.name} = 'Please enter a valid URL';\n`;
    }
    if (f.rules.includes('number')) {
      code += `  else if (${f.name} && isNaN(Number(${f.name}))) errors.${f.name} = 'Must be a number';\n`;
    }
    const minRule = f.rules.find(r => r.startsWith('min:'));
    if (minRule) {
      const n = minRule.split(':')[1];
      code += `  else if (${f.name} && ${f.name}.length < ${n}) errors.${f.name} = '${f.msg}';\n`;
    }
    const maxRule = f.rules.find(r => r.startsWith('max:'));
    if (maxRule) {
      const n = maxRule.split(':')[1];
      code += `  else if (${f.name} && ${f.name}.length > ${n}) errors.${f.name} = 'Maximum ${n} characters';\n`;
    }
  });
  code += `\n  return { valid: Object.keys(errors).length === 0, errors };\n}\n\n// Usage:\n// const result = validateForm({ username: 'john', email: 'test@example.com', password: '12345678' });\n// if (result.valid) { /* submit */ } else { /* show result.errors */ }\n`;
  $('#output').textContent = code;
}

function previewForm() {
  let html = '<h3 style="margin-bottom:8px">Form Preview</h3>';
  fields.forEach(f => {
    if (!f.name) return;
    html += `<label for="p-${f.name}">${f.name}</label><input type="${f.type}" id="p-${f.name}" name="${f.name}" placeholder="${f.name}"><div class="error-msg" id="err-${f.name}">${f.msg}</div>`;
  });
  html += `<button class="gz-btn" onclick="testPreview()" style="margin-top:12px">Submit</button><div class="success-msg" id="p-success">✓ All fields valid!</div>`;
  $('#preview-form').innerHTML = html;
}

function testPreview() {
  let allValid = true;
  fields.forEach(f => {
    if (!f.name) return;
    const val = document.getElementById(`p-${f.name}`)?.value || '';
    const errEl = document.getElementById(`err-${f.name}`);
    let valid = true;
    if (f.rules.includes('required') && !val.trim()) valid = false;
    if (f.rules.includes('email') && val && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) valid = false;
    const minRule = f.rules.find(r => r.startsWith('min:'));
    if (minRule && val && val.length < +minRule.split(':')[1]) valid = false;
    if (errEl) errEl.classList.toggle('show', !valid);
    if (!valid) allValid = false;
  });
  const succ = document.getElementById('p-success');
  if (succ) succ.classList.toggle('show', allValid);
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generateCode()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="previewForm()">${t('preview')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>`;

renderFields();
generateCode();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📋', href:'/dev/html-form-builder.html', name:'Form Builder'},
    {icon:'✅', href:'/dev/html-validator.html', name:'HTML Validator'},
    {icon:'🪄', href:'/dev/regex-generator.html', name:'Regex Generator'},
    {icon:'📝', href:'/dev/code-editor.html', name:'Code Editor'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
