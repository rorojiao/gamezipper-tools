// Western zodiac data: [name, emoji, startMMDD, endMMDD, element, ruler, modality, lucky, traits_en, traits_zh, name_zh]
const WEST = [
  ['Capricorn','♑',1222,119,'Earth','Saturn','Cardinal','4, 8, 13, 22','Disciplined, responsible, ambitious, practical, patient. Natural leaders who value structure and long-term goals.','自律、有责任感、有抱负、务实、耐心。天生的领导者，重视秩序和长期目标。','摩羯座'],
  ['Aquarius','♒',120,218,'Air','Uranus','Fixed','4, 7, 11, 22, 29','Independent, original, humanitarian, intellectual, visionary. Free thinkers who love big ideas.','独立、独创、博爱、理性、有远见。热爱大想法的自由思想者。','水瓶座'],
  ['Pisces','♓',219,320,'Water','Neptune','Mutable','3, 9, 12, 15, 18','Compassionate, artistic, intuitive, gentle, dreamy. Empaths with deep imagination.','富有同情心、艺术感、直觉、温柔、梦幻。想象力丰富的共情者。','双鱼座'],
  ['Aries','♈',321,419,'Fire','Mars','Cardinal','1, 9, 17','Courageous, energetic, confident, enthusiastic, pioneering. Bold starters who lead the charge.','勇敢、充满活力、自信、热情、开创。敢于冲锋的领头人。','白羊座'],
  ['Taurus','♉',420,520,'Earth','Venus','Fixed','2, 6, 9, 24','Reliable, patient, devoted, sensual, determined. Loyal anchors who love comfort and beauty.','可靠、耐心、忠诚、感性、坚定。热爱舒适与美的忠诚依靠。','金牛座'],
  ['Gemini','♊',521,620,'Air','Mercury','Mutable','5, 7, 14, 23','Curious, adaptable, witty, sociable, youthful. Quick-witted communicators who love variety.','好奇、适应力强、机智、善交际、年轻态。思维敏捷、热爱多样性的沟通者。','双子座'],
  ['Cancer','♋',621,722,'Water','Moon','Cardinal','2, 7, 9, 22','Emotional, loyal, sympathetic, protective, nurturing. Caring homebodies with strong intuition.','感性、忠诚、富有同情心、保护欲强、顾家。直觉敏锐的照顾者。','巨蟹座'],
  ['Leo','♌',723,822,'Fire','Sun','Fixed','1, 3, 10, 19','Generous, charismatic, creative, warm-hearted, confident. Born performers who light up a room.','慷慨、有魅力、富有创造力、热心、自信。天生的表演者。','狮子座'],
  ['Virgo','♍',823,922,'Earth','Mercury','Mutable','5, 14, 15, 23','Analytical, kind, hardworking, practical, meticulous. Detail-oriented perfectionists.','善于分析、善良、勤奋、务实、严谨。注重细节的完美主义者。','处女座'],
  ['Libra','♎',923,1022,'Air','Venus','Cardinal','4, 6, 13, 15, 24','Diplomatic, fair, sociable, gracious, cooperative. Harmony-seekers who love balance and beauty.','善于交际、公正、优雅、合作。追求和谐与美的平衡者。','天秤座'],
  ['Scorpio','♏',1023,1121,'Water','Pluto','Fixed','8, 11, 18, 22','Passionate, resourceful, brave, loyal, intense. Magnetic deep-thinkers who never do anything halfway.','热情、足智多谋、勇敢、忠诚、强烈。极具磁性的深度思考者。','天蝎座'],
  ['Sagittarius','♐',1122,1221,'Fire','Jupiter','Mutable','3, 9, 12, 21','Adventurous, optimistic, honest, philosophical, free. Wanderers chasing truth and new horizons.','爱冒险、乐观、诚实、富有哲理、向往自由。追寻真理与新视野的旅行者。','射手座'],
];

// Chinese zodiac: animal by year % 12 (4=Rat in standard cycle where 2020=Rat)
const CZ_ANIMAL = {0:'Monkey',1:'Rooster',2:'Dog',3:'Pig',4:'Rat',5:'Ox',6:'Tiger',7:'Rabbit',8:'Dragon',9:'Snake',10:'Horse',11:'Goat'};
const CZ_EMOJI = {Monkey:'🐒',Rooster:'🐓',Dog:'🐕',Pig:'🐖',Rat:'🐀',Ox:'🐂',Tiger:'🐅',Rabbit:'🐇',Dragon:'🐉',Snake:'🐍',Horse:'🐎',Goat:'🐐'};
const CZ_ZH = {Monkey:'猴',Rooster:'鸡',Dog:'狗',Pig:'猪',Rat:'鼠',Ox:'牛',Tiger:'虎',Rabbit:'兔',Dragon:'龙',Snake:'蛇',Horse:'马',Goat:'羊'};
const CZ_TRAITS_EN = {Monkey:'Clever, curious, mischievous, quick-witted, versatile.',Rooster:'Observant, hardworking, courageous, confident, honest.',Dog:'Loyal, honest, kind, faithful, protective.',Pig:'Generous, compassionate, diligent, easy-going, sincere.',Rat:'Quick-witted, resourceful, versatile, kind, smart.',Ox:'Diligent, dependable, strong, determined, honest.',Tiger:'Brave, confident, competitive, charismatic, bold.',Rabbit:'Gentle, quiet, elegant, alert, kind.',Dragon:'Confident, intelligent, enthusiastic, charismatic, lucky.',Snake:'Enigmatic, intelligent, wise, graceful, intuitive.',Horse:'Animated, active, energetic, warm-hearted, sociable.',Goat:'Calm, gentle, sympathetic, creative, persistent.'};
const CZ_TRAITS_ZH = {Monkey:'聪明、好奇、机灵、机智、多才。',Rooster:'观察力强、勤奋、勇敢、自信、诚实。',Dog:'忠诚、诚实、善良、忠心、有保护欲。',Pig:'慷慨、富有同情心、勤奋、随和、真诚。',Rat:'机智、足智多谋、多才、善良、聪明。',Ox:'勤奋、可靠、坚强、果断、诚实。',Tiger:'勇敢、自信、好胜、有魅力、大胆。',Rabbit:'温柔、安静、优雅、机警、善良。',Dragon:'自信、聪慧、热情、有魅力、幸运。',Snake:'神秘、聪慧、睿智、优雅、直觉敏锐。',Horse:'活跃、好动、精力充沛、热心、善交际。',Goat:'平静、温柔、富有同情心、有创造力、坚持。'};

const ELEMENTS_EN = {Wood:'Wood',Fire:'Fire',Earth:'Earth',Metal:'Metal',Water:'Water'};
const ELEMENTS_ZH = {Wood:'木',Fire:'火',Earth:'土',Metal:'金',Water:'水'};
function chineseElement(year) {
  // Element cycle every 2 years, period 10
  const last = year % 10;
  if (last === 0 || last === 1) return 'Metal';
  if (last === 2 || last === 3) return 'Water';
  if (last === 4 || last === 5) return 'Wood';
  if (last === 6 || last === 7) return 'Fire';
  return 'Earth';
}

function getWestern(month, day) {
  const mmdd = month * 100 + day;
  for (const z of WEST) {
    const start = z[2], end = z[3];
    if (start <= end) {
      if (mmdd >= start && mmdd <= end) return z;
    } else {
      if (mmdd >= start || mmdd <= end) return z;
    }
  }
  return WEST[0]; // Capricorn fallback
}

function calc() {
  const val = $('#bday').value;
  if (!val) return;
  const [y, m, d] = val.split('-').map(Number);
  const isZh = GZI18n.getLang() === 'zh';
  const w = getWestern(m, d);
  $('#wEmoji').textContent = w[1];
  $('#wName').textContent = isZh ? w[10] : w[0];
  $('#wDates').textContent = `${t('wBorn')}: ${m}/${d}`;
  $('#wTraits').textContent = isZh ? w[9] : w[8];
  const animal = CZ_ANIMAL[y % 12];
  $('#cEmoji').textContent = CZ_EMOJI[animal];
  $('#cName').textContent = isZh ? CZ_ZH[animal] + '年（' + animal + '）' : 'Year of the ' + animal;
  $('#cYears').textContent = isZh ? `${y} · 生肖` : `${y}`;
  $('#cTraits').textContent = isZh ? CZ_TRAITS_ZH[animal] : CZ_TRAITS_EN[animal];
  const el = chineseElement(y);
  $('#element').textContent = isZh ? ELEMENTS_ZH[el] : el;
  $('#ruler').textContent = isZh ? w[5] : w[5];
  $('#modality').textContent = isZh ? ({Cardinal:'基本宫',Fixed:'固定宫',Mutable:'变动宫'})[w[6]] : w[6];
  $('#lucky').textContent = w[7];
  // ruler bar
  $('#ruler-bar').innerHTML = WEST.map(z => {
    const me = z[0] === w[0] ? ' me' : '';
    return `<span class="z${me}">${z[1]} ${isZh ? z[10] : z[0]}</span>`;
  }).join('');
  $('#result').style.display = 'grid';
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="calc()">✨ ${GZI18n.getLang()==='zh'?'揭晓':'Reveal'}</button>`;
$('#bday').addEventListener('input', calc);
calc();

    {icon:'🌙',href:'/calc/moon-phase.html',name:'Moon Phase'},
