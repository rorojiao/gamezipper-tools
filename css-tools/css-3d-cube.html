<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS 3D Cube Generator',
    toolDesc: 'Generate an animated CSS 3D rotating cube with 6 customizable faces. Adjust size, speed, colors and perspective — copy clean CSS + HTML.',
    cubeSize: 'Cube Size (px)',
    speed: 'Rotation Speed (s)',
    perspective: 'Perspective (px)',
    faceFront: 'Front Face',
    faceBack: 'Back Face',
    faceRight: 'Right Face',
    faceLeft: 'Left Face',
    faceTop: 'Top Face',
    faceBottom: 'Bottom Face',
    step1: 'Set the cube size and rotation speed',
    step2: 'Choose a color for each of the 6 faces',
    step3: 'Adjust the 3D perspective value',
    step4: 'Copy the CSS and HTML to your project',
  },
  zh: {
    toolTitle: 'CSS 3D 立方体生成器',
    toolDesc: '生成动画 CSS 3D 旋转立方体，6 个面可自定义颜色。调整大小、速度、颜色和透视 — 复制干净的 CSS + HTML。',
    cubeSize: '立方体大小（px）',
    speed: '旋转速度（秒）',
    perspective: '透视（px）',
    faceFront: '前面',
    faceBack: '后面',
    faceRight: '右面',
    faceLeft: '左面',
    faceTop: '顶面',
    faceBottom: '底面',
    step1: '设置立方体大小和旋转速度',
    step2: '为 6 个面分别选择颜色',
    step3: '调整 3D 透视值',
    step4: '复制 CSS 和 HTML 到你的项目',
  }
});

const { $, copyText, t } = GZ;

function generate() {
  var size = parseInt($('#opt-size').value) || 120;
  var speed = parseInt($('#opt-speed').value) || 6;
  var perspective = parseInt($('#opt-perspective').value) || 600;
  var colors = {
    front: $('#opt-front').value || '#4ecdc4',
    back: $('#opt-back').value || '#ff6b6b',
    right: $('#opt-right').value || '#ffd93d',
    left: $('#opt-left').value || '#a78bfa',
    top: $('#opt-top').value || '#34d399',
    bottom: $('#opt-bottom').value || '#f472b6'
  };
  var half = size / 2;

  // Update preview
  var oldStyle = document.getElementById('gz-preview-style');
  if (oldStyle) oldStyle.remove();
  var styleEl = document.createElement('style');
  styleEl.id = 'gz-preview-style';
  styleEl.textContent = [
    '#preview-box { perspective: ' + perspective + 'px }',
    '.gz-cube-scene-dyn { width: ' + size + 'px; height: ' + size + 'px; perspective: ' + perspective + 'px; }',
    '.gz-cube-dyn { width: ' + size + 'px; height: ' + size + 'px; position: relative; transform-style: preserve-3d; animation: gz-spin-dyn ' + speed + 's infinite linear; }',
    '@keyframes gz-spin-dyn { from { transform: rotateX(-20deg) rotateY(0) } to { transform: rotateX(-20deg) rotateY(360deg) } }',
    '.gz-face-dyn { position: absolute; width: ' + size + 'px; height: ' + size + 'px; display: flex; align-items: center; justify-content: center; font-size: ' + (size/5) + 'px; opacity: 0.85; border: 1px solid rgba(255,255,255,0.2) }',
    '.gz-f-front { transform: translateZ(' + half + 'px); background: ' + colors.front + ' }',
    '.gz-f-back { transform: rotateY(180deg) translateZ(' + half + 'px); background: ' + colors.back + ' }',
    '.gz-f-right { transform: rotateY(90deg) translateZ(' + half + 'px); background: ' + colors.right + ' }',
    '.gz-f-left { transform: rotateY(-90deg) translateZ(' + half + 'px); background: ' + colors.left + ' }',
    '.gz-f-top { transform: rotateX(90deg) translateZ(' + half + 'px); background: ' + colors.top + ' }',
    '.gz-f-bottom { transform: rotateX(-90deg) translateZ(' + half + 'px); background: ' + colors.bottom + ' }'
  ].join('\n');
  document.head.appendChild(styleEl);
  
  $('#preview-box').innerHTML = '<div class="gz-cube-scene-dyn"><div class="gz-cube-dyn">' +
    '<div class="gz-face-dyn gz-f-front">1</div>' +
    '<div class="gz-face-dyn gz-f-back">2</div>' +
    '<div class="gz-face-dyn gz-f-right">3</div>' +
    '<div class="gz-face-dyn gz-f-left">4</div>' +
    '<div class="gz-face-dyn gz-f-top">5</div>' +
    '<div class="gz-face-dyn gz-f-bottom">6</div>' +
    '</div></div>';

  // Generate code
  var code = [
    '<!-- HTML -->',
    '<div class="cube-scene">',
    '  <div class="cube">',
    '    <div class="face front">1</div>',
    '    <div class="face back">2</div>',
    '    <div class="face right">3</div>',
    '    <div class="face left">4</div>',
    '    <div class="face top">5</div>',
    '    <div class="face bottom">6</div>',
    '  </div>',
    '</div>',
    '',
    '/* CSS */',
    '.cube-scene {',
    '  width: ' + size + 'px;',
    '  height: ' + size + 'px;',
    '  perspective: ' + perspective + 'px;',
    '}',
    '',
    '.cube {',
    '  width: ' + size + 'px;',
    '  height: ' + size + 'px;',
    '  position: relative;',
    '  transform-style: preserve-3d;',
    '  animation: spin ' + speed + 's infinite linear;',
    '}',
    '',
    '@keyframes spin {',
    '  from { transform: rotateX(-20deg) rotateY(0); }',
    '  to { transform: rotateX(-20deg) rotateY(360deg); }',
    '}',
    '',
    '.face {',
    '  position: absolute;',
    '  width: ' + size + 'px;',
    '  height: ' + size + 'px;',
    '  display: flex;',
    '  align-items: center;',
    '  justify-content: center;',
    '  font-size: ' + Math.round(size/5) + 'px;',
    '  opacity: 0.85;',
    '  border: 1px solid rgba(255,255,255,0.2);',
    '}',
    '',
    '.front  { transform: translateZ(' + half + 'px);             background: ' + colors.front + '; }',
    '.back   { transform: rotateY(180deg) translateZ(' + half + 'px); background: ' + colors.back + '; }',
    '.right  { transform: rotateY(90deg) translateZ(' + half + 'px);  background: ' + colors.right + '; }',
    '.left   { transform: rotateY(-90deg) translateZ(' + half + 'px); background: ' + colors.left + '; }',
    '.top    { transform: rotateX(90deg) translateZ(' + half + 'px);  background: ' + colors.top + '; }',
    '.bottom { transform: rotateX(-90deg) translateZ(' + half + 'px); background: ' + colors.bottom + '; }'
  ].join('\n');

  $('#output').textContent = code;
}

$('#options').innerHTML = [
  '<div class="gz-opt">',
    '<label>' + t('cubeSize') + '</label>',
    '<input type="number" id="opt-size" value="120" min="60" max="400">',
    '<label style="margin-top:8px">' + t('speed') + '</label>',
    '<input type="number" id="opt-speed" value="6" min="1" max="60">',
    '<label style="margin-top:8px">' + t('perspective') + '</label>',
    '<input type="number" id="opt-perspective" value="600" min="200" max="2000">',
  '</div>',
  '<div class="gz-opt">',
    '<label>' + t('faceFront') + '</label>',
    '<input type="color" id="opt-front" value="#4ecdc4">',
    '<label style="margin-top:8px">' + t('faceBack') + '</label>',
    '<input type="color" id="opt-back" value="#ff6b6b">',
    '<label style="margin-top:8px">' + t('faceRight') + '</label>',
    '<input type="color" id="opt-right" value="#ffd93d">',
  '</div>',
  '<div class="gz-opt">',
    '<label>' + t('faceLeft') + '</label>',
    '<input type="color" id="opt-left" value="#a78bfa">',
    '<label style="margin-top:8px">' + t('faceTop') + '</label>',
    '<input type="color" id="opt-top" value="#34d399">',
    '<label style="margin-top:8px">' + t('faceBottom') + '</label>',
    '<input type="color" id="opt-bottom" value="#f472b6">',
  '</div>'
].join('\n');

$('#toolbar').innerHTML = [
  '<button class="gz-btn" onclick="generate()">' + t('generate') + '</button>',
  '<button class="gz-btn" onclick="copyText($(\'#output\').textContent)">' + t('copy') + '</button>'
].join('');

document.querySelectorAll('#options input').forEach(function(el) {
  el.addEventListener('input', generate);
  el.addEventListener('change', generate);
});

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⌨️', href:'/css-tools/css-typewriter.html', name:'CSS Typewriter'},
    {icon:'✨', href:'/css-tools/animation.html', name:'CSS Animation'},
    {icon:'🎨', href:'/css-tools/glassmorphism.html', name:'Glassmorphism'},
    {icon:'💫', href:'/css-tools/neumorphism.html', name:'Neumorphism'},
  ]
});

generate();
</script>
