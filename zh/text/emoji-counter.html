<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <textarea id="input" spellcheck="false" placeholder="Paste your text with emojis here... 🎉😀❤️"></textarea>
    <div id="stats"></div>
    <div class="ec-list" id="emoji-list"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Emoji Counter & Stats',
    toolDesc: 'Count emojis in any text and see detailed frequency statistics. Perfect for social media analysis, content optimization, and emoji research.',
    totalEmojis: 'Total Emojis', uniqueEmojis: 'Unique', totalChars: 'Characters', textWithoutEmoji: 'Text Length',
    frequencyRank: 'Emoji Frequency Ranking',
    clear: 'Clear', example: 'Example', copyList: 'Copy List',
    step1: 'Paste or type text containing emojis into the input area',
    step2: 'View the total emoji count and unique emoji count instantly',
    step3: 'Scroll down to see each emoji ranked by frequency',
    step4: 'Click Copy List to copy the emoji frequency data',
    noEmojis: 'No emojis found in the text. Try adding some! 😀',
  },
  zh: {
    toolTitle: 'Emoji 计数器 & 统计',
    toolDesc: '统计文本中的 emoji 数量，查看详细的使用频率。适合社交媒体分析、内容优化和 emoji 研究。',
    totalEmojis: 'Emoji 总数', uniqueEmojis: '不重复', totalChars: '字符数', textWithoutEmoji: '文本长度',
    frequencyRank: 'Emoji 频率排行',
    clear: '清空', example: '示例', copyList: '复制列表',
    step1: '在输入区粘贴或输入包含 emoji 的文本',
    step2: '即时查看 emoji 总数和不重复 emoji 数量',
    step3: '向下滚动查看每个 emoji 的频率排名',
    step4: '点击「复制列表」复制 emoji 频率数据',
    noEmojis: '文本中未找到 emoji，试试添加一些！😀',
  }
});
const { $, copyText, t } = GZ;

// Emoji detection regex using Unicode property escapes
const emojiRegex = /\p{Extended_Pictographic}/gu;
// Also catch emoji with modifiers and ZWJ sequences
const emojiSeqRegex = /\p{Extended_Pictographic}[\u{1F3FB}-\u{1F3FF}]?(\u200D\p{Extended_Pictographic}[\u{1F3FB}-\u{1F3FF}]?)*(\uFE0F\u20E3|\uFE0F)?/gu;

function analyze() {
  const text = $('#input').value;
  const matches = text.match(emojiSeqRegex) || [];
  if (matches.length === 0) {
    $('#stats').innerHTML = `<p style="margin-top:14px;color:var(--text2)">${t('noEmojis')}</p>`;
    $('#emoji-list').innerHTML = '';
    return;
  }
  const total = matches.length;
  const freq = {};
  matches.forEach(e => { freq[e] = (freq[e] || 0) + 1; });
  const sorted = Object.entries(freq).sort((a, b) => b[1] - a[1]);
  const unique = sorted.length;
  const maxCount = sorted[0][1];

  $('#stats').innerHTML = `
    <div class="ec-stats">
      <div class="ec-stat"><div class="num">${total}</div><div class="lbl">${t('totalEmojis')}</div></div>
      <div class="ec-stat"><div class="num">${unique}</div><div class="lbl">${t('uniqueEmojis')}</div></div>
      <div class="ec-stat"><div class="num">${text.length}</div><div class="lbl">${t('totalChars')}</div></div>
    </div>`;

  let html = `<h3 style="margin-top:16px">${t('frequencyRank')}</h3>`;
  sorted.forEach(([emoji, count]) => {
    const pct = (count / maxCount * 100).toFixed(0);
    html += `<div class="ec-item">
      <span class="emoji">${emoji}</span>
      <span class="name">U+${[...emoji].map(c => c.codePointAt(0).toString(16).toUpperCase().padStart(4,'0')).join(' U+')}</span>
      <div class="ec-bar"><div class="ec-bar-fill" style="width:${pct}%"></div></div>
      <span class="count">${count}</span>
    </div>`;
  });
  $('#emoji-list').innerHTML = html;
}

function loadExample() {
  $('#input').value = 'Happy Friday everyone! 🎉🎉🎉 Just shipped a new feature 🚀💻 Feeling great about it 😊❤️ Big thanks to the team 👏👏 Let\'s keep building! 🔥💪✨ #FridayVibes 🎉🚀';
  analyze();
}

function copyList() {
  const text = $('#input').value;
  const matches = text.match(emojiSeqRegex) || [];
  if (matches.length === 0) return;
  const freq = {};
  matches.forEach(e => { freq[e] = (freq[e] || 0) + 1; });
  const sorted = Object.entries(freq).sort((a, b) => b[1] - a[1]);
  const output = sorted.map(([e, c]) => `${e}\t${c}`).join('\n');
  copyText(output);
}

$('#input').addEventListener('input', analyze);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyList()">${t('copyList')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value=\'\';analyze()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔍', href:'/text/emoji-search.html', name:'Emoji Search'},
    {icon:'🧮', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'📊', href:'/text/character-frequency.html', name:'Char Freq'},
    {icon:'🔤', href:'/text/letter-counter.html', name:'Letter Count'},
  ]
});
</script>
