  zh: {

    toolDesc: '将文字转换为 Leet 黑话（1337 / l33t），支持基础、中级和高级替换级别。免费、即时、纯浏览器运行 — 深受游戏玩家、黑客和表情包创作者喜爱。',
    convert: '转换',
    copy: '复制',
    example: '示例',
    clear: '清除',
    lblMode: '模式',
    lblLevel: '级别',
    lblUpper: '全大写',
    lblRand: '随机变体',
    lblIn: '输入文本',
    step1: '输入或粘贴要转换的文字',
    step2: '选择级别（基础 / 中级 / 高级）',
    step3: '点击「转换」生成 Leet 黑话',
    step4: '复制结果或切换到「反向」模式解码',

});

const { $, copyText, t } = GZ;

// Leet maps — multiple variants per letter for randomized output
const LEET = {
  basic: { a:['4'],e:['3'],i:['1'],l:['1'],o:['0'],s:['5'],t:['7'] },
  intermediate: { a:['4','@'],b:['8'],e:['3'],g:['6','9'],i:['1','!'],l:['1','|'],o:['0'],s:['5','$'],t:['7','+'],z:['2'],b:['8'],g:['6'] },
  advanced: {
    a:['4','@','/-\\','^'],b:['8','|3','I3'],c:['(','<','{'],d:['|)','[)'],e:['3','€'],
    f:['|=','ph'],g:['6','9','['],h:['#','|-|','/-/'],i:['1','!','|'],j:['_|','_/]'],
    k:['|<','|{'],l:['1','|_','|'],m:['/\\/\\','|V|'],n:['/\\/', '|\\|'],o:['0','()','[]'],
    p:['|D','|*'],q:['(,)','0,'],r:['|2','/2','12'],s:['5','$','z'],t:['7','+','7|'],
    u:['|_|','(_)'],v:['\\/','|/'],w:['\\/\\/','VV'],x:['><','}{'],y:['`/','j'],z:['2','7_']
  }
};

// Reverse decode map (longest-first for greedy matching)
let DECODE_MAP = null;
function buildDecode(){
  if(DECODE_MAP) return DECODE_MAP;
  const m = {};
  // merge all levels, advanced most expressive
  ['advanced','intermediate','basic'].forEach(lvl=>{
    for(const [letter,subs] of Object.entries(LEET[lvl])){
      subs.forEach(s=>{ if(!(s.toLowerCase() in m)) m[s.toLowerCase()] = letter; });
    }
  });
  // also map plain digits/letters
  const keys = Object.keys(m).sort((a,b)=>b.length-a.length);
  DECODE_MAP = { map:m, keys };
  return DECODE_MAP;
}

function rndInt(max){ return crypto.getRandomValues(new Uint32Array(1))[0] % max; }

function encode(text){
  const level = $('#level').value;
  const upper = $('#upper').checked;
  const rand = $('#randomize').checked;
  const map = LEET[level];
  let work = upper ? text.toUpperCase() : text;
  let out = '';
  for(const ch of work){
    const key = ch.toLowerCase();
    if(map[key]){
      const subs = map[key];
      out += rand && subs.length>1 ? subs[rndInt(subs.length)] : subs[0];
    } else {
      out += ch;
    }
  }
  return out;
}

function decode(text){
  const { map, keys } = buildDecode();
  let out = '';
  let i = 0;
  while(i < text.length){
    let matched = false;
    for(const k of keys){
      if(text.substring(i, i+k.length).toLowerCase() === k){
        out += map[k];
        i += k.length;
        matched = true;
        break;
      }
    }
    if(!matched){ out += text[i]; i++; }
  }
  return out;
}

function doConvert(){
  const inp = $('#input').value;
  if(!inp){ $('#output').textContent=''; return; }
  const mode = $('#mode').value;
  const res = mode==='decode' ? decode(inp) : encode(inp);
  $('#output').textContent = res;
}

function loadExample(){
  $('#mode').value = 'encode';
  $('#level').value = 'advanced';
  $('#input').value = 'Hello World! I am a leet speak hacker.';
  doConvert();
}

function doClear(){ $('#input').value=''; $('#output').textContent=''; }

$('#lbl-mode').textContent = t('lblMode');
$('#lbl-level').textContent = t('lblLevel');
$('#lbl-upper').textContent = t('lblUpper');
$('#lbl-rand').textContent = t('lblRand');
$('#lbl-in').textContent = t('lblIn');
['mode','level','upper','randomize'].forEach(id=>$('#'+id).addEventListener('change', doConvert));
$('#input').addEventListener('input', doConvert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
