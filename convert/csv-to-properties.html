const { $, copyText, t } = GZ;

function escapeProp(str) {
  return String(str)
    .replace(/\\/g, '\\\\')
    .replace(/[\r\n]+/g, '\\n')
    .replace(/=/g, '\\=')
    .replace(/:/g, '\\:');
}

function escapeUnicode(str) {
  let out = '';
  for (const ch of String(str)) {
    const c = ch.codePointAt(0);
    if (c > 127) {
      out += '\\u' + ('000' + c.toString(16)).slice(-4);
    } else {
      out += ch;
    }
  }
  return out;
}

function parseCSVLine(line, delim) {
  const rows = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQ) {
      if (ch === '"') {
        if (line[i + 1] === '"') { cur += '"'; i++; }
        else inQ = false;
      } else cur += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === delim) { rows.push(cur); cur = ''; }
      else cur += ch;
    }
  }
  rows.push(cur);
  return rows;
}

function doConvert() {
  const raw = $('#input').value;
  const delim = $('#delim').value || ',';
  const hasHeader = $('#header').checked;
  const escUni = $('#unicode').checked;
  const out = $('#output');
  const status = $('#status');

  if (!raw.trim()) { out.textContent = t('empty'); status.innerHTML = ''; return; }

  const lines = raw.split(/\r?\n/).filter(l => l.length);
  let startIdx = 0;
  if (hasHeader && lines.length) startIdx = 1;

  const props = [];
  for (let i = startIdx; i < lines.length; i++) {
    const cols = parseCSVLine(lines[i], delim);
    if (cols.length < 2) continue;
    const key = (cols[0] || '').trim();
    const val = (cols[1] || '').trim();
    if (!key) continue;
    let k = escapeProp(key);
    let v = escapeProp(val);
    if (escUni) { k = escapeUnicode(k); v = escapeUnicode(v); }
    props.push(`${k} = ${v}`);
  }

  out.textContent = props.join('\n');
  status.innerHTML = `<span style="color:var(--gz-success)">${t('status', props.length)}</span>`;
}

function loadExample() {
  $('#input').value = `key,value
app.name,GameZipper Tools
app.version,2.0
app.port,8080
app.url,https://tools.gamezipper.com
greeting,Hello World`;
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', doConvert);
$('#delim').addEventListener('input', doConvert);
$('#header').addEventListener('change', doConvert);
$('#unicode').addEventListener('change', doConvert);

$('#opts').innerHTML = `
  <label>${t('delimiter')}: <input type="text" id="delim" value="," maxlength="2"></label>
  <label><input type="checkbox" id="header"> ${t('headerRow')}</label>
  <label><input type="checkbox" id="unicode"> ${t('escapeUnicode')}</label>`;

$('#toolbar').innerHTML = `

  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
