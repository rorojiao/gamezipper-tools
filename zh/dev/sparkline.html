<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a sparkline?", "acceptedAnswer": {"@type": "Answer", "text": "A sparkline is a tiny, word-sized chart — usually a line, area or bar — embedded inline in text, tables or dashboards to show a trend at a glance. Unlike full charts, sparklines have no axis labels and are meant to fit in a small space."}}, {"@type": "Question", "name": "How do I create a sparkline from my data?", "acceptedAnswer": {"@type": "Answer", "text": "Paste your numbers separated by commas, spaces or new lines into the input box, pick a chart type (line, area or bar) and the generator outputs an SVG sparkline instantly. Copy the SVG markup or download it as an SVG or PNG file."}}, {"@type": "Question", "name": "Can I customize the sparkline colors and size?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Adjust width, height, stroke and fill colors, stroke width, and toggle end-dot and min/max markers. Every change updates the preview and the generated SVG code in real time."}}, {"@type": "Question", "name": "Are sparkline images generated in my browser?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. All parsing and SVG generation happen locally in your browser. Your data is never uploaded to a server, so this tool is safe for confidential or internal metrics."}}]}</script>

<script>
GZI18n.register({
  en:{toolTitle:'Sparkline Generator',toolDesc:'Turn any list of numbers into a tiny SVG sparkline — line, area or bar. Perfect for dashboards, tables and reports. Copy SVG or download as PNG.',
    lineType:'Line',areaType:'Area',barType:'Bar',stroke:'Stroke',fill:'Fill',width:'Width',height:'Height',strokeWidth:'Stroke w',
    showEnd:'End dot',showMinMax:'Min/max dots',
    step1:'Paste numbers separated by commas, spaces or new lines',step2:'Pick a chart type — line, area or bar',step3:'Adjust size, colors and optional markers',step4:'Copy the SVG code or download as PNG'},
  zh:{toolTitle:'迷你折线图（Sparkline）生成器',toolDesc:'将任意数字列表转为微型 SVG 迷你折线图 — 支持折线、面积和柱状。适合仪表盘、表格和报告。可复制 SVG 或下载 PNG。',
    lineType:'折线',areaType:'面积',barType:'柱状',stroke:'线条色',fill:'填充色',width:'宽度',height:'高度',strokeWidth:'线宽',
    showEnd:'终点圆点',showMinMax:'最大/最小点',
    step1:'粘贴数字（逗号、空格或换行分隔）',step2:'选择图表类型 — 折线、面积或柱状',step3:'调整尺寸、颜色和可选标记',step4:'复制 SVG 代码或下载 PNG'}
});
const {$,copyText,t}=GZ;
let type='line',W=200,H=40,stroke='#4ecdc4',fill='#4ecdc433',sw=2,showEnd=true,showMinMax=false;

function parseNumbers(){
  return $('#input').value.split(/[\s,;]+/).map(s=>parseFloat(s)).filter(n=>!isNaN(n));
}

function buildSVG(){
  const data=parseNumbers();
  const out=$('#preview'),code=$('#code');
  if(data.length<2){out.innerHTML=`<span style="color:var(--text3);font-size:.85rem">⚠</span>`;code.textContent='';return;}
  const min=Math.min(...data),max=Math.max(...data),range=(max-min)||1;
  const pad=Math.max(sw,2);
  const innerW=W-pad*2,innerH=H-pad*2;
  const x=i=>pad+(data.length===1?innerW/2:innerW*i/(data.length-1));
  const y=v=>pad+innerH-(v-min)/range*innerH;
  let svg;
  if(type==='bar'){
    const bw=Math.max(1,innerW/data.length*0.7);
    let rects='';
    data.forEach((v,i)=>{
      const bx=pad+innerW*i/data.length+(innerW/data.length-bw)/2;
      const by=y(v);const bh=pad+innerH-by;
      rects+=`<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" fill="${stroke}"/>`;
    });
    svg=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${rects}</svg>`;
  } else {
    const pts=data.map((v,i)=>`${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
    let extras='';
    if(type==='area'){
      const areaPts=`${pad},${(pad+innerH).toFixed(1)} ${pts} ${(pad+innerW).toFixed(1)},${(pad+innerH).toFixed(1)}`;
      extras+=`<polygon points="${areaPts}" fill="${fill}"/>`;
    }
    extras+=`<polyline points="${pts}" fill="none" stroke="${stroke}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"/>`;
    if(showMinMax){
      const minI=data.indexOf(min),maxI=data.indexOf(max);
      extras+=`<circle cx="${x(maxI).toFixed(1)}" cy="${y(max).toFixed(1)}" r="${(sw+1.5).toFixed(1)}" fill="#2ecc71"/>`;
      extras+=`<circle cx="${x(minI).toFixed(1)}" cy="${y(min).toFixed(1)}" r="${(sw+1.5).toFixed(1)}" fill="#e74c3c"/>`;
    }
    if(showEnd){
      const lx=x(data.length-1),ly=y(data[data.length-1]);
      extras+=`<circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="${(sw+1).toFixed(1)}" fill="${stroke}"/>`;
    }
    svg=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${extras}</svg>`;
  }
  out.innerHTML=svg;
  code.textContent=svg.replace(/></g,'>\n<');
}

function renderTypes(){
  $('#types').innerHTML=[['line','lineType'],['area','areaType'],['bar','barType']].map(s=>`<button class="${s[0]===type?'active':''}" onclick="type='${s[0]}';renderTypes();buildSVG()">${t(s[1])}</button>`).join('');
}

function loadExample(){
  $('#input').value='3,7,5,9,6,11,8,12,10,15,13,18';
  buildSVG();
}

function downloadPNG(){
  const data=parseNumbers();
  if(data.length<2)return;
  const svg=$('#preview').querySelector('svg');
  if(!svg)return;
  const xml=new XMLSerializer().serializeToString(svg);
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas');
    const scale=2;c.width=W*scale;c.height=H*scale;
    const ctx=c.getContext('2d');ctx.scale(scale,scale);
    ctx.drawImage(img,0,0);
    const a=document.createElement('a');a.download='sparkline.png';a.href=c.toDataURL('image/png');a.click();
  };
  img.src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(xml)));
}

function downloadSVG(){
  const code=$('#code').textContent;if(!code)return;
  const blob=new Blob([code],{type:'image/svg+xml'});
  const a=document.createElement('a');a.download='sparkline.svg';a.href=URL.createObjectURL(blob);a.click();
}

$('#lbl-in').textContent=t('input');$('#lbl-out').textContent=t('output');
$('#controls').innerHTML=`
  <label>${t('width')}: <input type="range" min="80" max="400" value="${W}" oninput="W=+this.value;$('#wv').textContent=this.value;buildSVG()"><span id="wv">${W}</span></label>
  <label>${t('height')}: <input type="range" min="20" max="120" value="${H}" oninput="H=+this.value;$('#hv').textContent=this.value;buildSVG()"><span id="hv">${H}</span></label>
  <label>${t('strokeWidth')}: <input type="range" min="1" max="6" value="${sw}" oninput="sw=+this.value;$('#swv').textContent=this.value;buildSVG()"><span id="swv">${sw}</span></label>
  <label>${t('stroke')}: <input type="color" value="${stroke}" oninput="stroke=this.value;buildSVG()"></label>
  <label>${t('fill')}: <input type="color" value="#4ecdc4" oninput="fill=this.value+'33';buildSVG()"></label>
  <label><input type="checkbox" ${showEnd?'checked':''} onchange="showEnd=this.checked;buildSVG()"> ${t('showEnd')}</label>
  <label><input type="checkbox" ${showMinMax?'checked':''} onchange="showMinMax=this.checked;buildSVG()"> ${t('showMinMax')}</label>`;
$('#toolbar').innerHTML=`<button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button><button class="gz-btn" onclick="copyText($('#code').textContent)">${t('copy')} SVG</button><button class="gz-btn gz-btn-secondary" onclick="downloadSVG()">${t('download')} SVG</button><button class="gz-btn gz-btn-secondary" onclick="downloadPNG()">${t('download')} PNG</button>`;
$('#input').addEventListener('input',buildSVG);
renderTypes();loadExample();
GZ.renderToolPage({category:'dev',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[
  {icon:'📋',href:'/dev/json.html',name:'JSON'},
  {icon:'📊',href:'/convert/csv-to-json.html',name:'CSV→JSON'},
  {icon:'🔢',href:'/text/number-sorter.html',name:'Number Sorter'},
]});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
