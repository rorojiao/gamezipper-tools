    lblHeight: '高度',
    lblShowText: '显示编号',
    downloadSvg: '下载 SVG',
    downloadPng: '下载 PNG',
    enterValid: '请输入 8 位 ISSN（可含连字符）。',
    validIssn: (full) => `已生成 ISSN-13 条形码：${full}`,
    addonOk: (a) => `已添加期号附加码：${a}`,
    addonBad: '附加码必须为 2 位数字（或留空）。',
    variantBad: '变体必须为 2 位数字。',
    step1: '输入 8 位 ISSN（连字符和空格会被自动去除）',
    step2: '可选设置变体（00-99）和 2 位期号附加码（EAN-2）',
    step3: '根据打印尺寸调整缩放和高度',
    step4: '下载为 SVG（矢量）或 PNG（位图），用于期刊封面',
  }
});

const { $, copyText, t } = GZ;

// EAN-13 tables
const L = ['0001101','0011001','0010011','0111101','0100011','0110001','0101111','0111011','0110111','0001011'];
const G = ['0100111','0110011','0011011','0100001','0011101','0111001','0000101','0010001','0001001','0010111'];
const R = ['1110010','1100110','1101100','1000010','1011100','1001110','1010000','1000100','1001000','1110100'];
const PARITY = [
  ['L','L','L','L','L','L'], ['L','L','G','L','G','G'], ['L','G','L','L','G','G'], ['L','G','G','L','L','L'],
  ['L','L','G','G','L','L'], ['L','G','L','G','L','L'], ['L','G','G','G','L','L'], ['L','L','L','G','G','L'],
  ['L','L','G','L','G','L'], ['L','G','L','L','L','G'],
];

function ean13Checksum(twelve) {
  let sum = 0;
  for (let i = 0; i < 12; i++) sum += parseInt(twelve[i]) * (i % 2 === 0 ? 1 : 3);
  return (10 - (sum % 10)) % 10;
}

function encodeEAN13(fullDigits) {
  const first = parseInt(fullDigits[0]);
  const left = fullDigits.substring(1, 7);
  const right = fullDigits.substring(7, 13);
  const parity = PARITY[first];
  let bits = '101';
  for (let i = 0; i < 6; i++) {
    const d = parseInt(left[i]);
    bits += (parity[i] === 'L' ? L[d] : G[d]);
  }
  bits += '01010';
  for (let i = 0; i < 6; i++) bits += R[parseInt(right[i])];
  bits += '101';
  return bits;
}

// EAN-2 add-on parity (mod 4)
function addon2Parity(two) {
  const sum = parseInt(two[0]) + parseInt(two[1]);
  const mod = sum % 4;
  return [
    ['L','L'], ['L','G'], ['G','L'], ['G','G'],
  ][mod];
}

function encodeAddon2(two) {
  const parity = addon2Parity(two);
  let bits = '1011';
  for (let i = 0; i < 2; i++) {
    const d = parseInt(two[i]);
    bits += (parity[i] === 'L' ? L[d] : G[d]);
    if (i < 1) bits += '01';
  }
  return bits;
}

function generate() {
  const raw = ($('#data').value || '').replace(/\D/g, '');
  const svg = $('#barcode-svg');
  const info = $('#info');

  if (raw.length !== 8 && raw.length !== 7) {
    svg.innerHTML = '';
    info.innerHTML = `<span style="color:var(--gz-accent)">${t('enterValid')}</span>`;
    return;
  }
  // ISSN-8: first 7 digits are data, 8th is ISSN check digit (ignored for EAN-13).
  const core = raw.substring(0, 7);

  // variant: must be 2 digits
  let variant = ($('#variant').value || '').replace(/\D/g, '');
  if (variant.length !== 2) {
    svg.innerHTML = '';
    info.innerHTML = `<span style="color:var(--gz-accent)">${t('variantBad')}</span>`;
    return;
  }

  // Build 12 digits: 977 + core(7) + variant(2) = 12
  const twelve = '977' + core + variant;
  const check = ean13Checksum(twelve);
  const full = twelve + check;

  // addon
  const addonRaw = ($('#addon').value || '').replace(/\D/g, '');
  let addonInfo = '';
  let addonBits = '';
  if (addonRaw) {
    if (addonRaw.length === 2) {
      addonBits = encodeAddon2(addonRaw);
      addonInfo = ` <span style="color:var(--gz-success)">+ ${t('addonOk')(addonRaw)}</span>`;
    } else {
      addonInfo = ` <span style="color:var(--gz-accent)">⚠ ${t('addonBad')}</span>`;
    }
  }

  const bits = encodeEAN13(full);
  const scale = parseInt($('#scale').value);
  const barH = parseInt($('#height').value);
  const unitW = scale;
  const quietZone = 10 * scale;
  const addonGap = addonBits ? 8 * scale : 0;
  const totalW = bits.length * unitW + quietZone * 2 + addonGap + (addonBits ? addonBits.length * unitW : 0);
  const textH = $('#showtext').checked ? 20 : 0;
  const totalH = barH + textH;
  const textY = barH + 16;

  let rects = '';
  for (let i = 0; i < bits.length; i++) {
    if (bits[i] === '1') {
      rects += `<rect x="${quietZone + i * unitW}" y="0" width="${unitW}" height="${barH}" fill="#000"/>`;
    }
  }
  let textEl = '';
  if ($('#showtext').checked) {
    textEl = `<text x="${quietZone + (bits.length * unitW)/2}" y="${textY}" font-family="monospace" font-size="14" fill="#000" text-anchor="middle" letter-spacing="2">${full}</text>`;
  }

  let addonRects = '';
  let addonText = '';
  if (addonBits) {
    const baseX = quietZone + bits.length * unitW + addonGap;
    for (let i = 0; i < addonBits.length; i++) {
      if (addonBits[i] === '1') {
        addonRects += `<rect x="${baseX + i * unitW}" y="${barH*0.15}" width="${unitW}" height="${barH*0.7}" fill="#000"/>`;
      }
    }
    if ($('#showtext').checked) {
      addonText = `<text x="${baseX + (addonBits.length * unitW)/2}" y="${textY}" font-family="monospace" font-size="12" fill="#000" text-anchor="middle">${addonRaw}</text>`;
    }
  }

  svg.setAttribute('width', totalW);
  svg.setAttribute('height', totalH);
  svg.setAttribute('viewBox', `0 0 ${totalW} ${totalH}`);
  svg.innerHTML = `<rect x="0" y="0" width="${totalW}" height="${totalH}" fill="#fff"/>${rects}${textEl}${addonRects}${addonText}`;

  info.innerHTML = `<span style="color:var(--gz-success)">✓ ${t('validIssn')(full)}</span>${addonInfo}`;
}

$('#data').addEventListener('input', generate);
$('#addon').addEventListener('input', generate);
$('#variant').addEventListener('input', generate);
$('#scale').addEventListener('input', e => { $('#scale-val').textContent = e.target.value + 'x'; generate(); });
$('#height').addEventListener('input', e => { $('#height-val').textContent = e.target.value + 'px'; generate(); });
$('#showtext').addEventListener('change', generate);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadSvg()">${t('downloadSvg')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadPng()">${t('downloadPng')}</button>`;

function downloadSvg() {
  const svg = $('#barcode-svg');
  const clone = svg.cloneNode(true);
  const data = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([data], {type: 'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `issn-${Date.now()}.svg`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function downloadPng() {
  const svg = $('#barcode-svg');
  const data = new XMLSerializer().serializeToString(svg);
  const img = new Image();
  const blob = new Blob([data], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = img.width * 2;
    canvas.height = img.height * 2;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    canvas.toBlob(function(b) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = `issn-${Date.now()}.png`;
      a.click();
      URL.revokeObjectURL(a.href);
    });
  };
  img.src = url;
}

$('#lbl-data').textContent = t('lblData');
$('#lbl-addon').textContent = t('lblAddon');
$('#lbl-variant').textContent = t('lblVariant');
$('#lbl-scale').textContent = t('lblScale');
$('#lbl-height').textContent = t('lblHeight');
$('#lbl-showtext').textContent = t('lblShowText');
$('#scale-val').textContent = '2x';
$('#height-val').textContent = '100px';

generate();
