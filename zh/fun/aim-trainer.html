<script>
GZI18n.register({
  en: {
    toolTitle: 'Aim Trainer', toolDesc: 'Test your clicking speed and accuracy. Hit targets as fast as you can in 30 seconds.',
    start: 'Click to start', ready: 'Get ready...', go: 'GO!', finished: 'Round complete!',
    targets: 'Targets', misses: 'Misses', accuracy: 'Accuracy', tps: 'Targets/sec',
    restart: 'Restart', difficulty: 'Difficulty', easy: 'Easy', normal: 'Normal', hard: 'Hard',
    timeLeft: 'Time left', tip: 'Click targets as fast as you can.',
    step1: 'Choose a difficulty and click the arena to start', step2: 'Click each red target as quickly as you can',
    step3: 'A new target appears instantly after each hit', step4: 'After 30 seconds, see your stats',
  },
  zh: {
    toolTitle: '瞄准训练器', toolDesc: '测试你的点击速度和精准度。30 秒内尽可能快地点击目标。适合 FPS 游戏玩家热身，也是有趣的反应挑战。',
    start: '点击开始', ready: '准备...', go: '开始！', finished: '回合结束！',
    targets: '命中', misses: '未命中', accuracy: '准确率', tps: '目标/秒',
    restart: '重新开始', difficulty: '难度', easy: '简单', normal: '普通', hard: '困难',
    timeLeft: '剩余时间', tip: '尽快点击目标。每回合 30 秒。',
    step1: '选择难度，点击区域开始', step2: '尽可能快地点击每个红色目标',
    step3: '每次命中后立即出现新目标', step4: '30 秒后查看你的命中数、准确率和速度',
  }
});
const { $, t } = GZ;
let playing = false, hits = 0, misses = 0, timeLeft = 30, timerInterval = null;
let diffSize = { easy: 70, normal: 54, hard: 38 }, currentDiff = 'normal';
function startGame(){ playing=true; hits=0; misses=0; timeLeft=30; const a=$('#arena'); a.className='arena'; a.innerHTML=''; $('#timerBar').style.display=''; spawnTarget(); timerInterval=setInterval(()=>{ timeLeft-=0.1; $('#timerFill').style.width=(timeLeft/30*100)+'%'; if(timeLeft<=0) endGame(); },100); }
function endGame(){ playing=false; clearInterval(timerInterval); const a=$('#arena'); a.className='arena idle'; a.innerHTML=`<span>${t('finished')}</span>`; renderStats(); }
function spawnTarget(){ const a=$('#arena'); const s=diffSize[currentDiff]; const w=a.clientWidth,h=a.clientHeight; const x=Math.random()*(w-s-10)+5,y=Math.random()*(h-s-10)+5; const el=document.createElement('div'); el.className='target'; el.style.cssText=`left:${x}px;top:${y}px;width:${s}px;height:${s}px`; el.onclick=(e)=>{e.stopPropagation();if(!playing)return;hits++;el.remove();spawnTarget();renderStats();}; a.appendChild(el); }
$('#arena').addEventListener('click',(e)=>{ if(!playing){startGame();return;} if(e.target.classList.contains('target'))return; misses++; renderStats(); });
function renderStats(){ const tot=hits+misses; const acc=tot>0?Math.round(hits/tot*100):0; const el=30-timeLeft; const tps=el>0?(hits/el).toFixed(2):'0.00'; $('#stats').innerHTML=`<div class="stat"><div class="num">${hits}</div><div class="lbl">${t('targets')}</div></div><div class="stat"><div class="num">${misses}</div><div class="lbl">${t('misses')}</div></div><div class="stat"><div class="num">${acc}%</div><div class="lbl">${t('accuracy')}</div></div><div class="stat"><div class="num">${tps}</div><div class="lbl">${t('tps')}</div></div>`; }
$('#toolbar').innerHTML=`<span style="font-size:.85em;color:var(--text2)">${t('difficulty')}:</span><button class="gz-btn diff-btn ${currentDiff==='easy'?'active':''}" data-d="easy">${t('easy')}</button><button class="gz-btn diff-btn ${currentDiff==='normal'?'active':''}" data-d="normal">${t('normal')}</button><button class="gz-btn diff-btn ${currentDiff==='hard'?'active':''}" data-d="hard">${t('hard')}</button><button class="gz-btn" onclick="if(playing)endGame()">🔄 ${t('restart')}</button>`;
document.querySelectorAll('.diff-btn').forEach(b=>b.onclick=()=>{currentDiff=b.dataset.d;document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');});
GZ.renderToolPage({category:'fun',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{icon:'⚡',href:'/zh/fun/reaction-time.html',name:'反应速度测试'},{icon:'🎯',href:'/zh/fun/cps-test.html',name:'CPS 点击测试'},{icon:'⌨️',href:'/zh/fun/typing-test.html',name:'打字速度测试'},{icon:'🎮',href:'/zh/fun/memory-game.html',name:'记忆翻牌'}]});
</script>
