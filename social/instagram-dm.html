.dm-msg .time{font-size:10px;opacity:.6;margin-top:4px}
.dm-input-bar{display:flex;gap:8px;padding:12px 16px;border-top:1px solid #262626}
.dm-input-bar input{flex:1;background:#262626;border:1px solid #363636;border-radius:20px;padding:8px 14px;color:#fff;font-size:14px;outline:none}

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="controls">
      <label><span id="lbl-user1"></span> <input type="text" id="user1" value="john_doe" maxlength="30"></label>
      <label><span id="lbl-user2"></span> <input type="text" id="user2" value="jane_smith" maxlength="30"></label>
      <label><span id="lbl-theme"></span>
        <select id="theme"><option value="dark">Dark</option><option value="light">Light</option></select>
      </label>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input type="text" id="msgInput" style="flex:1" placeholder="Type a message...">
      <select id="msgSide"><option value="sent">You</option><option value="received">Them</option></select>
      <button class="gz-btn" id="addMsgBtn">Add</button>
    </div>

  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Instagram DM Generator',
    toolDesc: 'Create realistic Instagram DM chat mockups for design, presentations and fun. Customize usernames, messages and download as PNG.',
    lblUser1: 'Your username:',
    lblUser2: 'Their username:',
    lblTheme: 'Theme:',
    addMsg: 'Add',
    downloadPng: 'Download PNG',
    clearAll: 'Clear All',
    step1: 'Set usernames for both sides of the conversation',
    step2: 'Type messages and click Add to build the DM thread',
    step3: 'Switch between sent/received to simulate both sides',
    step4: 'Click Download PNG to save the mockup as an image',
  },
  zh: {
    toolTitle: 'Instagram DM 私信生成器',
    toolDesc: '创建逼真的 Instagram 私信聊天截图，用于设计、演示和娱乐。自定义用户名、消息内容，下载为 PNG。',
    lblUser1: '你的用户名:',
    lblUser2: '对方用户名:',
    lblTheme: '主题:',
    addMsg: '添加',
    downloadPng: '下载 PNG',
    clearAll: '清除全部',
    step1: '设置对话双方的 Instagram 用户名',
    step2: '输入消息并点击添加来构建对话',
    step3: '切换发送方/接收方模拟双方对话',
    step4: '点击下载 PNG 将聊天截图保存为图片',
  }
});

const { $, copyText, t } = GZ;
let messages = [];

function getInitials(name) {
  return name.split(/[_\s]/).filter(Boolean).map(w=>w[0]).join('').toUpperCase().slice(0,2) || name[0]?.toUpperCase() || '?';
}

function renderPreview() {
  const isDark = $('#theme').value === 'dark';
  const user1 = $('#user1').value || 'user1';
  const user2 = $('#user2').value || 'user2';
  const bg = isDark ? '#000' : '#fff';
  const fg = isDark ? '#fff' : '#262626';
  const msgBgSent = '#3797f0';
  const msgBgRecv = isDark ? '#262626' : '#efefef';
  const border = isDark ? '#262626' : '#dbdbdb';

  let html = `<div id="preview" style="max-width:375px;margin:0 auto;background:${bg};border-radius:12px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:${fg}">`;
  html += `<div class="dm-header" style="border-color:${border}"><div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600">${getInitials(user2)}</div><div class="dm-header-info"><div class="name" style="color:${fg}">${user2}</div><div class="status" style="color:${isDark?'#a8a8a8':'#8e8e8e'}">Active now</div></div></div>`;
  html += `<div class="dm-body" style="min-height:300px;background:${bg}">`;
  for (const m of messages) {
    const isSent = m.side === 'sent';
    html += `<div class="dm-msg ${m.side}" style="background:${isSent?msgBgSent:msgBgRecv};color:${isSent||isDark?'#fff':fg};${isSent?'align-self:flex-end;border-bottom-right-radius:4px':'align-self:flex-start;border-bottom-left-radius:4px'}">${m.text}<div class="time" style="color:${isSent?'rgba(255,255,255,.6)':'rgba(0,0,0,.4)'}">${m.time}</div></div>`;
  }
  html += `</div></div>`;
  $('#preview').outerHTML = html;
}

function renderMsgList() {
  $('#msgList').innerHTML = messages.map((m,i) => `<div class="msg-item"><span style="font-size:.8em;opacity:.6">${m.side==='sent'?'→':'←'}</span><input value="${m.text.replace(/"/g,'&quot;')}" onchange="messages[${i}].text=this.value;renderPreview()"><span style="font-size:.75em;opacity:.5">${m.time}</span><button class="gz-btn gz-btn-secondary" style="padding:2px 8px;font-size:.75em" onclick="messages.splice(${i},1);renderMsgList();renderPreview()">✕</button></div>`).join('');
}

$('#addMsgBtn').textContent = t('addMsg');
$('#addMsgBtn').onclick = () => {
  const text = $('#msgInput').value.trim();
  if (!text) return;
  const side = $('#msgSide').value;
  const now = new Date();
  const h = now.getHours() % 12 || 12;
  const min = String(now.getMinutes()).padStart(2,'0');
  const ampm = now.getHours() >= 12 ? 'PM' : 'AM';
  messages.push({text, side, time: `${h}:${min} ${ampm}`});
  $('#msgInput').value = '';
  renderMsgList();
  renderPreview();
};
$('#msgInput').addEventListener('keydown', e => { if (e.key==='Enter') $('#addMsgBtn').click(); });

$('#user1').addEventListener('input', renderPreview);
$('#user2').addEventListener('input', renderPreview);
$('#theme').addEventListener('change', renderPreview);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadPng()">${t('downloadPng')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="messages=[];renderMsgList();renderPreview()">${t('clearAll')}</button>`;

function downloadPng() {
  const el = document.getElementById('preview');
  if (!el) return;
  import('/shared/html2canvas.min.js').then(() => {
    window.html2canvas(el,{backgroundColor:null,scale:2}).then(c=>{
      const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='instagram-dm.png';a.click();
    });
  }).catch(()=>{
    const c=document.createElement('canvas');const r=el.getBoundingClientRect();c.width=r.width*2;c.height=r.height*2;
    const ctx=c.getContext('2d');ctx.scale(2,2);
    import('/shared/html-to-image.js').then(m=>m.toPng(el)).then(url=>{const a=document.createElement('a');a.href=url;a.download='instagram-dm.png';a.click();}).catch(()=>alert('Download failed - please take a screenshot instead.'));
  });
}

GZ.renderToolPage({
  category: 'social',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💬', href:'/social/whatsapp-chat.html', name:'WhatsApp Chat'},
    {icon:'💬', href:'/social/imessage-chat.html', name:'iMessage'},
    {icon:'📷', href:'/social/instagram-post.html', name:'Instagram Post'},
    {icon:'🐦', href:'/social/tweet-generator.html', name:'Tweet Generator'},
  ]
});

messages = [
  {text:'Hey! How are you? 😊', side:'received', time:'2:30 PM'},
  {text:"I'm great! Just finished that project 🎉", side:'sent', time:'2:31 PM'},
  {text:'That looks amazing! Can you send me the details?', side:'received', time:'2:32 PM'},
];
renderMsgList();
renderPreview();
</script>
<script src="/tools-result-rec.js" defer></script>
