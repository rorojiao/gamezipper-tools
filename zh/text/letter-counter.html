<html lang="zh">
<head>
<title>字数统计 - 免费在线工具 | GameZipper 工具箱</title>

  <link rel="canonical" href="https://tools.gamezipper.com/zh/text/letter-counter.html">
  <meta property="og:title" content="字数统计">
  <meta property="og:description" content="统计字符数、单词数、句子数、段落数，并估算阅读时间。">
  <meta property="og:url" content="https://tools.gamezipper.com/zh/text/letter-counter.html">
  <meta property="og:image" content="https://tools.gamezipper.com/shared/og-image.png">
<meta property="og:type" content="website">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/shared/style.css">
<script src="/shared/i18n.js"></script>
<script src="/shared/common.js"></script>
<style>
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:1rem}
.stat-card{background:var(--glass);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;text-align:center}
.stat-card .num{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-card .lbl{color:var(--text2);font-size:.8rem;margin-top:4px}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Letter & Word Counter","description":"Count characters, words, sentences and paragraphs instantly. Free online letter and word counter tool — no login needed.","url": "https://tools.gamezipper.com/zh/text/letter-counter.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<link rel="alternate" hreflang="en" href="https://tools.gamezipper.com/text/letter-counter.html">
<link rel="alternate" hreflang="zh" href="https://tools.gamezipper.com/zh/text/letter-counter.html">
<link rel="alternate" hreflang="x-default" href="https://tools.gamezipper.com/text/letter-counter.html">
<script>localStorage.setItem('gz-lang','zh');</script>
</head>
<body>
<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="stats-grid" id="stats"></div>
    <textarea id="input" spellcheck="false" rows="12" style="width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;color:var(--text);font-size:.9rem;resize:vertical"></textarea>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{toolTitle:'Letter & Word Counter',toolDesc:'Count characters, words, sentences, paragraphs and estimate reading time.',
    chars:'Characters',charsNoSpace:'No Spaces',wordCount:'Words',sentences:'Sentences',paragraphs:'Paragraphs',readTime:'Read Time',min:'min',
    step1:'Type or paste your text in the area below',step2:'Statistics update in real-time as you type',step3:'Reading time is based on 200 words per minute'},
  zh:{toolTitle:'字数统计',toolDesc:'统计字符数、单词数、句子数、段落数，并估算阅读时间。',
    chars:'字符数',charsNoSpace:'不含空格',wordCount:'单词数',sentences:'句子数',paragraphs:'段落数',readTime:'阅读时间',min:'分钟',
    step1:'在下方输入或粘贴文本',step2:'统计数据会随输入实时更新',step3:'阅读时间按每分钟200词估算'}
});
const {$,t}=GZ;
const keys=['chars','charsNoSpace','wordCount','sentences','paragraphs','readTime'];
$('#stats').innerHTML=keys.map(k=>`<div class="stat-card"><div class="num" id="n-${k}">0</div><div class="lbl">${t(k)}</div></div>`).join('');
function count(){
  const v=$('#input').value;
  const c=v.length,cn=v.replace(/\s/g,'').length;
  const w=v.trim()?v.trim().split(/\s+/).length:0;
  const s=v.trim()?v.split(/[.!?。！？]+/).filter(x=>x.trim()).length:0;
  const p=v.trim()?v.split(/\n\s*\n/).filter(x=>x.trim()).length:0;
  const r=Math.max(1,Math.ceil(w/200));
  $('#n-chars').textContent=c;$('#n-charsNoSpace').textContent=cn;
  $('#n-wordCount').textContent=w;$('#n-sentences').textContent=s;
  $('#n-paragraphs').textContent=p;$('#n-readTime').textContent=w?`${r} ${t('min')}`:'0';
}
function loadExample(){$('#input').value='The quick brown fox jumps over the lazy dog. This is a sample paragraph for testing the letter counter tool.\n\nIt supports multiple paragraphs! And counts sentences too. How cool is that?';count();}
$('#toolbar').innerHTML=`<button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button><button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';count()">${t('clear')}</button>`;
$('#input').addEventListener('input',count);
GZ.renderToolPage({category:'text',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3'],related:[
  {icon:'🔠',href:'/text/case-converter.html',name:'Case Converter'},
  {icon:'📄',href:'/text/lorem-ipsum.html',name:'Lorem Ipsum'},
  {icon:'🔗',href:'/text/slug.html',name:'Slug Generator'},
]});
</script>
<script>new Image().src="https://site-analytics.cap.1ktower.com/hit?s=tools.gamezipper.com&p="+encodeURIComponent(location.pathname);</script>
</body>
</html>
