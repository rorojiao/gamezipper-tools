<script>

  },
  zh: {

    toolDesc: '将长 URL 缩短为易记的分享链接。完全在浏览器本地生成短码 — 无服务器、无注册、完全私密。支持自定义别名和二维码。',
    longUrl: '要缩短的长 URL',
    alias: '自定义别名（可选，4-30 字符）',
    shorten: '缩短 URL',
    clearAll: '清空全部',
    copy: '复制',
    open: '打开',
    qr: '二维码',
    download: '下载',
    downloadQR: '下载二维码',
    remove: '删除',
    tipText: '💡 提示：本工具完全在浏览器本地生成短码 — 无服务器往返。短码本地存储；要获得完整跳转功能，请使用短→长映射托管一个小型跳转脚本。下方历史记录仅存储在此设备的 localStorage 中。',
    enterUrl: '请输入有效的 URL，以 http:// 或 https:// 开头',
    invalidAlias: '别名必须为 4-30 个字符，仅含字母/数字/-/_',
    result: '已缩短的 URL',
    step1: '将长 URL 粘贴到第一个字段',
    step2: '可选地添加自定义别名（4-30 字符）',
    step3: '点击「缩短 URL」生成短码',
    step4: '复制短 URL、扫描二维码或下载用于分享',
  }

const {$, copyText, t} = GZ;

const ALPHABET = 'abcdefghijkmnpqrstuvwxyz23456789'; // skip 0/o/1/l for readability
const HISTORY_KEY = 'gz-url-shortener-history';

function hashCode(str) {
  let h1 = 0x811c9dc5, h2 = 0xc2b2ae35;
  for (let i=0; i<str.length; i++) {
    const c = str.charCodeAt(i);
    h1 = Math.imul(h1 ^ c, 0x01000193);
    h2 = Math.imul(h2 ^ c, 0x85ebca6b);
  }
  return (h1 >>> 0).toString(16).padStart(8,'0') + (h2 >>> 0).toString(16).padStart(8,'0');
}

function shortCode(longUrl, len=6) {
  const hex = hashCode(longUrl);
  const n = parseInt(hex.slice(0,12), 16);
  let out = '';
  let v = n;
  for (let i=0; i<len; i++) {
    out += ALPHABET[v % ALPHABET.length];
    v = Math.floor(v / ALPHABET.length);
    if (v === 0) v = parseInt(hex.slice(12), 16) || 1;
  }
  return out;
}

function isValidUrl(s) {
  try {
    const u = new URL(s);
    return u.protocol === 'http:' || u.protocol === 'https:';
  } catch (e) { return false; }
}

function isValidAlias(s) {
  return /^[a-zA-Z0-9_-]{4,30}$/.test(s);
}

let history = [];
try { history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch(e) { history = []; }

function saveHistory() {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(0, 50))); } catch(e) {}
}

function renderHistory() {
  if (history.length === 0) {
    $('#history').style.display = 'none';
    return;
  }
  $('#history').style.display = 'block';
  $('#historyList').innerHTML = history.map((h, i) => `
    <div class="us-row">
      <div>
        <div class="short">${h.short || h.code}</div>
        <div class="long" title="${h.long}">${h.long}</div>
        <div style="font-size:.7em;opacity:.6;margin-top:2px">${new Date(h.ts).toLocaleString()}</div>
      </div>
      <div class="us-actions">
        <button class="gz-btn us-btn-mini" onclick="copyHistory(${i})">${t('copy')}</button>
        <button class="gz-btn us-btn-mini gz-btn-secondary" onclick="openHistory(${i})">${t('open')}</button>
        <button class="gz-btn us-btn-mini gz-btn-secondary" onclick="qrHistory(${i})">${t('qr')}</button>
        <button class="gz-btn us-btn-mini gz-btn-secondary" onclick="removeHistory(${i})">${t('remove')}</button>
      </div>
    </div>
  `).join('');
}

function shorten() {
  const long = $('#longUrl').value.trim();
  const alias = $('#alias').value.trim();
  if (!isValidUrl(long)) { alert(t('enterUrl')); return; }
  if (alias && !isValidAlias(alias)) { alert(t('invalidAlias')); return; }
  const code = alias || shortCode(long);
  const displayShort = alias || `gz.to/${code}`;
  const item = {
    long,
    code,
    short: displayShort,
    ts: Date.now()
  };
  history.unshift(item);
  history = history.slice(0, 50);
  saveHistory();
  renderOutput(item);
  renderHistory();
}

function renderOutput(item) {
  const fullShort = item.short.startsWith('http') ? item.short : `https://${item.short}`;
  let qrHtml = '';
  try {
    if (typeof qrcode !== 'undefined') {
      const qr = qrcode(0, 'M');
      qr.addData(fullShort);
      qr.make();
      const qrSvg = qr.createSvgTag({cellSize: 4, margin: 2});
      qrHtml = `<div class="us-qr" id="qrImg">${qrSvg}</div>
        <div style="text-align:center;margin-top:8px"><button class="gz-btn gz-btn-secondary" onclick="downloadQR('${fullShort.replace(/'/g,"\\'")}')">⬇ ${t('downloadQR')}</button></div>`;
    }
  } catch(e) {}
  $('#output').innerHTML = `
    <div class="us-output">
      <h3 style="margin:0 0 10px">🔗 ${t('result')}</h3>
      <div class="us-short">${item.short}</div>
      <div style="text-align:center;margin-top:10px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button class="gz-btn" onclick="copyText('${fullShort.replace(/'/g,"\\'")}')">📋 ${t('copy')}</button>
        <button class="gz-btn gz-btn-secondary" onclick="window.open('${item.long.replace(/'/g,"\\'")}','_blank')">↗ ${t('open')}</button>
      </div>
      ${qrHtml}
    </div>
  `;
}

function downloadQR(data) {
  try {
    const qr = qrcode(0, 'M');
    qr.addData(data);
    qr.make();
    const svgEl = document.getElementById('qrImg').querySelector('svg');
    if (svgEl) {
      const blob = new Blob([svgEl.outerHTML], {type:'image/svg+xml'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'shorturl-qr.svg';
      a.click();
      URL.revokeObjectURL(a.href);
    }
  } catch(e) { alert('QR not available'); }
}

function copyHistory(i) { copyText(history[i].short.startsWith('http') ? history[i].short : `https://${history[i].short}`); }
function openHistory(i) { window.open(history[i].long, '_blank'); }
function qrHistory(i) { renderOutput(history[i]); }
function removeHistory(i) { history.splice(i, 1); saveHistory(); renderHistory(); }

$('#longUrl').addEventListener('keypress', e => { if (e.key === 'Enter') shorten(); });
$('#alias').addEventListener('keypress', e => { if (e.key === 'Enter') shorten(); });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="shorten()">✂️ ${t('shorten')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="history=[];saveHistory();renderHistory();$('#output').innerHTML=''">🗑️ ${t('clearAll')}</button>
`;

$('#tip').textContent = t('tipText');
renderHistory();

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [

    {icon:'🔍', href:'/dev/url-parser.html', name:'URL Parser'},
    {icon:'🌐', href:'/dev/url-encode.html', name:'URL Encode'},
    {icon:'📱', href:'/convert/qrcode.html', name:'QR Code Generator'},
  ]
});
</script>
