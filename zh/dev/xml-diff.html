const { $, t } = GZ;

function normalizeXml(xmlStr) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlStr, 'text/xml');
  const err = doc.querySelector('parsererror');
  if (err) throw new Error(err.textContent.split('\n')[0]);
  sortAttributes(doc.documentElement);
  const serializer = new XMLSerializer();
  let out = serializer.serializeToString(doc);
  // pretty print with indentation
  let formatted = '';
  let indent = 0;
  out = out.replace(/>\s*</g, '><').trim();
  out.split('><').forEach(part => {
    if (!part) return;
    if (part.startsWith('/') || part.startsWith('?')) {
      indent = Math.max(0, indent - 1);
    }
    formatted += '  '.repeat(indent) + '<' + part + '>\n';
    if (!part.startsWith('/') && !part.startsWith('?') && !part.endsWith('/') && !part.startsWith('!')) {
      indent++;
    }
    if (part.startsWith('/')) {
      // closing tag already decremented
    }
  });
  // Simplify: use the raw serialized normalized output, 2-space indented
  return vkbeautifyXml(serializer.serializeToString(doc));
}

function sortAttributes(el) {
  if (!el.attributes || el.attributes.length < 2) {
    [...el.children].forEach(sortAttributes);
    return;
  }
  const attrs = [...el.attributes].sort((a, b) => a.name.localeCompare(b.name));
  attrs.forEach(a => {
    el.removeAttribute(a.name);
  });
  attrs.forEach(a => {
    el.setAttribute(a.name, a.value);
  });
  [...el.children].forEach(sortAttributes);
}

function vkbeautifyXml(xml) {
  let formatted = '';
  let indent = 0;
  const reg = /(>)(<)(\/*)/g;
  xml = xml.replace(reg, '$1\n$2$3');
  xml.split('\n').forEach(line => {
    line = line.trim();
    if (!line) return;
    let pad;
    if (line.match(/^<\/\w/)) {
      indent = Math.max(0, indent - 1);
      pad = '  '.repeat(indent);
    } else if (line.match(/^<\w[^>]*[^/]>.*$/) && !line.match(/<\/\w/) && !line.endsWith('/>')) {
      pad = '  '.repeat(indent);
      indent++;
    } else {
      pad = '  '.repeat(indent);
    }
    formatted += pad + line + '\n';
  });
  return formatted.trim();
}

// LCS-based line diff
function lineDiff(a, b) {
  const n = a.length, m = b.length;
  const dp = Array.from({length: n + 1}, () => new Array(m + 1).fill(0));
  for (let i = n - 1; i >= 0; i--) {
    for (let j = m - 1; j >= 0; j--) {
      dp[i][j] = a[i] === b[j] ? dp[i+1][j+1] + 1 : Math.max(dp[i+1][j], dp[i][j+1]);
    }
  }
  const result = [];
  let i = 0, j = 0;
  while (i < n && j < m) {
    if (a[i] === b[j]) {
      result.push({type: 'same', text: a[i]});
      i++; j++;
    } else if (dp[i+1][j] >= dp[i][j+1]) {
      result.push({type: 'del', text: a[i]});
      i++;
    } else {
      result.push({type: 'add', text: b[j]});
      j++;
    }
  }
  while (i < n) { result.push({type: 'del', text: a[i]}); i++; }
  while (j < m) { result.push({type: 'add', text: b[j]}); j++; }
  return result;
}

function compare() {
  const leftRaw = $('#left').value.trim();
  const rightRaw = $('#right').value.trim();
  if (!leftRaw && !rightRaw) { $('#output').innerHTML = ''; $('#status').textContent = ''; return; }
  let leftNorm, rightNorm;
  try {
    leftNorm = leftRaw ? normalizeXml(leftRaw) : '';
    rightNorm = rightRaw ? normalizeXml(rightRaw) : '';
  } catch(e) {
    $('#output').innerHTML = `<span class="err">XML Error: ${e.message}</span>`;
    $('#status').textContent = '';
    return;
  }
  const leftLines = leftNorm.split('\n');
  const rightLines = rightNorm.split('\n');
  const diff = lineDiff(leftLines, rightLines);
  let html = '';
  let added = 0, removed = 0, same = 0;
  diff.forEach(d => {
    const escaped = d.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if (d.type === 'add') { html += `<span class="diff-add">+ ${escaped}</span>`; added++; }
    else if (d.type === 'del') { html += `<span class="diff-del">- ${escaped}</span>`; removed++; }
    else { html += `<span class="diff-same">  ${escaped}</span>`; same++; }
  });
  $('#output').innerHTML = html;
  $('#status').innerHTML = `<span class="diff-info">${added} ${t('added')}, ${removed} ${t('removed')}, ${same} ${t('unchanged')} (${diff.length} ${t('lines')})</span>`;
}

function swap() {
  const l = $('#left').value;
  $('#left').value = $('#right').value;
  $('#right').value = l;
  compare();
}

}
