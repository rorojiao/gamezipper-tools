<script>
GZI18n.register({
  en: {
    toolTitle: 'Normal Distribution Calculator',
    toolDesc: 'Compute z-scores and probabilities for the normal distribution with a live bell-curve plot.',
    mean: 'Mean (μ)',
    sd: 'Std Dev (σ)',
    x: 'Value (x)',
    lo: 'Lower (a)',
    hi: 'Upper (b)',
    calcBtn: 'Calculate',
    zscore: 'Z-score',
    lessThan: 'P(X < x)',
    greaterThan: 'P(X > x)',
    between: 'P(a < X < b)',
    percentile: 'Percentile',
    step1: 'Enter the mean (μ) and standard deviation (σ)',
    step2: 'Enter a value x to get its z-score and cumulative probability',
    step3: 'Optionally enter lower and upper bounds for an interval probability',
    step4: 'Read the results and inspect the shaded bell-curve plot',
  },
  zh: {
    toolTitle: '正态分布计算器',
    toolDesc: '计算正态分布的 z 分数与概率，附带实时钟形曲线图。',
    mean: '均值 (μ)',
    sd: '标准差 (σ)',
    x: '数值 (x)',
    lo: '下限 (a)',
    hi: '上限 (b)',
    calcBtn: '计算',
    zscore: 'Z 分数',
    lessThan: 'P(X < x)',
    greaterThan: 'P(X > x)',
    between: 'P(a < X < b)',
    percentile: '百分位数',
    step1: '输入均值 (μ) 和标准差 (σ)',
    step2: '输入数值 x 获取其 z 分数和累积概率',
    step3: '可选择输入上下限计算区间概率',
    step4: '查看结果并观察高亮区域的钟形曲线',
  }
});

const { $, t } = GZ;
['mean','sd','x','lo','hi'].forEach(k => $('#lbl-'+k).textContent = t(k));
$('#btn-calc').textContent = t('calcBtn');

// erf via Abramowitz-Stegun 7.1.26 (max error ~1.5e-7)
function erf(x) {
  const sign = x < 0 ? -1 : 1;
  x = Math.abs(x);
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const t = 1/(1+p*x);
  const y = 1 - (((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
  return sign*y;
}
function cdf(z){ return 0.5*(1+erf(z/Math.SQRT2)); }
function pdf(x){ return Math.exp(-x*x/2)/Math.sqrt(2*Math.PI); }

function calc() {
  const mu = parseFloat($('#mean').value);
  const sigma = parseFloat($('#sd').value);
  const x = parseFloat($('#x').value);
  const a = parseFloat($('#lo').value);
  const b = parseFloat($('#hi').value);
  if ([mu,sigma,x,a,b].some(isNaN) || sigma <= 0) return;
  const z = (x-mu)/sigma;
  const pLess = cdf(z);
  const pMore = 1-pLess;
  const pBetween = Math.max(0, cdf((b-mu)/sigma) - cdf((a-mu)/sigma));
  $('#results').innerHTML = `
    <div class="nd-card"><div class="value">${z.toFixed(4)}</div><div class="label">${t('zscore')}</div></div>
    <div class="nd-card"><div class="value">${(pLess*100).toFixed(2)}%</div><div class="label">${t('lessThan')}</div></div>
    <div class="nd-card"><div class="value">${(pMore*100).toFixed(2)}%</div><div class="label">${t('greaterThan')}</div></div>
    <div class="nd-card"><div class="value">${(pBetween*100).toFixed(2)}%</div><div class="label">${t('between')}</div></div>
    <div class="nd-card"><div class="value">${(pLess*100).toFixed(1)}</div><div class="label">${t('percentile')}</div></div>`;
  draw(mu, sigma, x, a, b);
}

function draw(mu, sigma, x, a, b) {
  const cv = $('#plot'), ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  ctx.clearRect(0,0,W,H);
  const padL=40, padR=20, padT=20, padB=30;
  const plotW = W-padL-padR, plotH = H-padT-padB;
  const xMin = mu-4*sigma, xMax = mu+4*sigma;
  const xToPx = v => padL + (v-xMin)/(xMax-xMin)*plotW;
  const yMax = pdf(0)/sigma;
  const yToPx = y => padT + plotH - (y/yMax)*plotH;

  // axes
  ctx.strokeStyle = getCss('--border') || '#444';
  ctx.fillStyle = getCss('--text2') || '#888';
  ctx.lineWidth = 1;
  ctx.font = '11px monospace';
  ctx.beginPath(); ctx.moveTo(padL, padT); ctx.lineTo(padL, padT+plotH); ctx.lineTo(padL+plotW, padT+plotH); ctx.stroke();
  for (let i=-4;i<=4;i++){
    const v = mu+i*sigma;
    const px = xToPx(v);
    ctx.beginPath(); ctx.moveTo(px, padT+plotH); ctx.lineTo(px, padT+plotH+4); ctx.stroke();
    ctx.textAlign='center'; ctx.fillText(v.toFixed(0), px, padT+plotH+16);
  }

  // shaded region a..b
  ctx.fillStyle = 'rgba(255,217,61,0.35)';
  ctx.beginPath();
  ctx.moveTo(xToPx(a), padT+plotH);
  for (let v=a; v<=b; v+= (b-a)/60) ctx.lineTo(xToPx(v), yToPx(pdf((v-mu)/sigma)/sigma));
  ctx.lineTo(xToPx(b), padT+plotH);
  ctx.closePath(); ctx.fill();

  // shaded P(X<x)
  ctx.fillStyle = 'rgba(0,214,114,0.18)';
  ctx.beginPath();
  ctx.moveTo(xToPx(xMin), padT+plotH);
  for (let v=xMin; v<=x; v+= sigma/40) ctx.lineTo(xToPx(v), yToPx(pdf((v-mu)/sigma)/sigma));
  ctx.lineTo(xToPx(x), padT+plotH);
  ctx.closePath(); ctx.fill();

  // curve
  ctx.strokeStyle = getCss('--accent') || '#ffd93d';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let px=0; px<=plotW; px++){
    const v = xMin + (px/plotW)*(xMax-xMin);
    const y = pdf((v-mu)/sigma)/sigma;
    const X = padL+px, Y = yToPx(y);
    if (px===0) ctx.moveTo(X,Y); else ctx.lineTo(X,Y);
  }
  ctx.stroke();

  // x marker
  ctx.strokeStyle = '#e94560';
  ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.moveTo(xToPx(x), padT); ctx.lineTo(xToPx(x), padT+plotH); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#e94560';
  ctx.textAlign='left';
  ctx.fillText('x='+x, xToPx(x)+4, padT+12);
}
function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

$('#toolbar').innerHTML = '';
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',

    {icon:'🎲', href:'/calc/permutation.html', name:'Permutations'},
  ]
});
</script>
