.test-area{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:1rem 0}

.test-box h3{margin:0 0 .5rem;font-size:1rem}
.test-box .result{font-size:2rem;font-weight:700;margin:.5rem 0}
.test-box .sub{font-size:.8rem;color:var(--text3)}
.click-zone{width:180px;height:120px;background:var(--input-bg);border:2px dashed var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;user-select:none;font-size:.85rem;color:var(--text3)}
.click-zone:hover{border-color:var(--accent)}
.click-zone.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;width:100%;max-width:300px;margin:.5rem 0}
.btn-cell{padding:8px;border-radius:8px;font-size:.7rem;text-align:center;background:var(--input-bg);border:1px solid var(--border);transition:all .15s}
.btn-cell.active{background:#10b981;color:#fff;border-color:#10b981}
.scroll-indicator{width:20px;height:80px;background:var(--border);border-radius:10px;position:relative;overflow:hidden}
.scroll-indicator .fill{position:absolute;bottom:0;width:100%;background:var(--accent);border-radius:10px;transition:height .1s}
.coord-display{font-family:monospace;font-size:1.1rem;letter-spacing:1px}
.log-area{background:var(--input-bg);border:1px solid var(--border);border-radius:10px;padding:.8rem;max-height:120px;overflow-y:auto;font-family:monospace;font-size:.75rem;line-height:1.6;margin-top:.5rem}
@media(max-width:640px){.test-area{grid-template-columns:1fr}}
</style>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Mouse Tester',
    toolDesc: 'Test mouse buttons, scroll wheel, double-click speed and cursor position — verify your mouse works correctly.',
    reset: 'Reset',
    btnTitle: 'Button Test',
    btnSub: 'Click each button to test (Left=0, Middle=1, Right=2, Back=3, Forward=4)',
    clickTitle: 'Double-Click Test',
    clickZone: 'Double-click here',
    clickSub: 'Double-click speed will appear here',
    scrollTitle: 'Scroll Test',
    scrollDir: 'Scroll over this area',
    coordTitle: 'Cursor Position',
    coordSub: 'Move mouse anywhere on page',
    logTitle: 'Event Log',
    step1: 'Click each mouse button in the Button Test area to verify they register',
    step2: 'Double-click the test zone to measure your double-click speed',
    step3: 'Scroll over the scroll area to test your scroll wheel',
    step4: 'Check the event log for detailed mouse event information',
  },
  zh: {
    toolTitle: '鼠标测试工具',
    toolDesc: '测试鼠标按键、滚轮、双击速度和光标位置 — 验证鼠标是否正常工作。',
    reset: '重置',
    btnTitle: '按键测试',
    btnSub: '点击各按键测试（左=0, 中=1, 右=2, 后退=3, 前进=4）',
    clickTitle: '双击测试',
    clickZone: '在此双击',
    clickSub: '双击速度将显示在此',
    scrollTitle: '滚轮测试',
    scrollDir: '在此区域滚动',
    coordTitle: '光标位置',
    coordSub: '在页面任意位置移动鼠标',
    logTitle: '事件日志',
    step1: '在按键测试区域点击每个鼠标按键验证是否注册',
    step2: '双击测试区域测量双击速度',
    step3: '在滚轮区域滚动测试滚轮功能',
    step4: '查看事件日志获取详细鼠标事件信息',
  }
});
const { $, t } = GZ;
let scrollCount = 0;
let clickTimes = [];
const btnNames = ['Left','Middle','Right','Back','Forward'];
const btnActive = [false,false,false,false,false];
$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="resetAll()" style="margin-left:auto">${t('reset')}</button>`;
$('#btn-title').textContent = t('btnTitle');
$('#btn-sub').textContent = t('btnSub');
$('#click-title').textContent = t('clickTitle');
$('#click-zone').textContent = t('clickZone');
$('#click-sub').textContent = t('clickSub');
$('#scroll-title').textContent = t('scrollTitle');
$('#scroll-dir').textContent = t('scrollDir');
$('#coord-title').textContent = t('coordTitle');
$('#coord-sub').textContent = t('coordSub');
$('#log-title').textContent = t('logTitle');
function renderBtnGrid() {
  let html = '';
  btnNames.forEach((name, i) => {
    html += `<div class="btn-cell${btnActive[i] ? ' active' : ''}" id="btn-${i}">${name}<br><small>Button ${i}</small></div>`;
  });
  $('#btn-grid').innerHTML = html;
}
renderBtnGrid();
document.addEventListener('mousedown', function(e) {
  const btn = e.button;
  if (btn >= 0 && btn < 5) {
    btnActive[btn] = true;
    renderBtnGrid();
  }
  addLog(`mousedown: button=${btn} (${btnNames[btn] || '?'}) at (${e.clientX}, ${e.clientY})`);
});
document.addEventListener('mouseup', function(e) {
  addLog(`mouseup: button=${e.button}`);
});
$('#click-zone').addEventListener('dblclick', function(e) {
  const now = performance.now();
  clickTimes.push(now);
  if (clickTimes.length >= 2) {
    const diff = clickTimes[clickTimes.length - 1] - clickTimes[clickTimes.length - 2];
    const msg = `${diff.toFixed(0)} ms`;
    $('#click-sub').textContent = msg;
    this.classList.add('active');
    setTimeout(() => this.classList.remove('active'), 300);
    addLog(`double-click detected: ${msg}`);
  }
});
$('#click-zone').addEventListener('click', function() {
  clickTimes.push(performance.now());
  if (clickTimes.length > 10) clickTimes = clickTimes.slice(-5);
});
$('#scroll-test').addEventListener('wheel', function(e) {
  e.preventDefault();
  scrollCount++;
  $('#scroll-count').textContent = scrollCount;
  const dir = e.deltaY < 0 ? '↑ Up' : '↓ Down';
  $('#scroll-dir').textContent = dir;
  const fill = Math.min(scrollCount * 2, 100);
  $('#scroll-fill').style.height = fill + '%';
  addLog(`scroll: ${dir} delta=${e.deltaY > 0 ? '+' : ''}${e.deltaY.toFixed(0)} total=${scrollCount}`);
}, { passive: false });
document.addEventListener('mousemove', function(e) {
  $('#coord-display').innerHTML = `X: ${e.clientX} &nbsp; Y: ${e.clientY}`;
});
document.addEventListener('contextmenu', e => {
  if (e.target.closest('#btn-test') || e.target.closest('#click-zone')) e.preventDefault();
});
function addLog(msg) {
  const log = $('#log');
  const time = new Date().toLocaleTimeString();
  log.innerHTML += `<div><span style="color:var(--text3)">[${time}]</span> ${msg}</div>`;
  log.scrollTop = log.scrollHeight;
}
function resetAll() {
  scrollCount = 0;
  clickTimes = [];
  btnActive.fill(false);
  renderBtnGrid();
  $('#scroll-count').textContent = '0';
  $('#scroll-fill').style.height = '0';
  $('#scroll-dir').textContent = t('scrollDir');
  $('#click-sub').textContent = t('clickSub');
  $('#log').innerHTML = '';
}
GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⌨️', href:'/fun/keyboard-tester.html', name:'Keyboard Tester'},
    
    
    {icon:'🖥️', href:'/dev/screen-resolution.html', name:'Screen Resolution'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
