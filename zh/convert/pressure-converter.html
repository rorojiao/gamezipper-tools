<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-converter-grid" id="converter"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Pressure Converter',
    toolDesc: 'Convert between Pascal, bar, PSI, atmosphere, mmHg, torr, kPa, MPa and more — instantly and free.',
    swap: 'Swap',
    clear: 'Clear',
    copy: 'Copy',
    step1: 'Enter a value in the input field',
    step2: 'Select the source unit',
    step3: 'Select the target unit',
    step4: 'The result updates instantly as you type',
  },
  zh: {
    toolTitle: '压力单位转换器',
    toolDesc: '在帕斯卡、巴、PSI、标准大气压、毫米汞柱、托、千帕、兆帕等单位之间即时免费转换。',
    swap: '交换',
    clear: '清除',
    copy: '复制',
    step1: '在输入框中输入数值',
    step2: '选择源单位',
    step3: '选择目标单位',
    step4: '输入时结果即时更新',
  }
});

const { $, copyText, t } = GZ;

// All factors relative to Pascal
const UNITS = [
  { id: 'pa', label: 'Pascal (Pa)', zh: '帕斯卡 (Pa)', factor: 1 },
  { id: 'hpa', label: 'Hectopascal (hPa)', zh: '百帕 (hPa)', factor: 100 },
  { id: 'kpa', label: 'Kilopascal (kPa)', zh: '千帕 (kPa)', factor: 1000 },
  { id: 'mpa', label: 'Megapascal (MPa)', zh: '兆帕 (MPa)', factor: 1000000 },
  { id: 'bar', label: 'Bar', zh: '巴 (bar)', factor: 100000 },
  { id: 'mbar', label: 'Millibar (mbar)', zh: '毫巴 (mbar)', factor: 100 },
  { id: 'psi', label: 'PSI (lb/in²)', zh: 'PSI (磅/英寸²)', factor: 6894.76 },
  { id: 'atm', label: 'Atmosphere (atm)', zh: '标准大气压 (atm)', factor: 101325 },
  { id: 'mmhg', label: 'mmHg (millimeter Hg)', zh: '毫米汞柱 (mmHg)', factor: 133.322 },
  { id: 'torr', label: 'Torr', zh: '托 (torr)', factor: 133.322 },
  { id: 'inhg', label: 'Inch of Mercury (inHg)', zh: '英寸汞柱 (inHg)', factor: 3386.39 },
  { id: 'psf', label: 'PSF (lb/ft²)', zh: 'PSF (磅/英尺²)', factor: 47.8803 },
];

const lang = GZI18n.getLang();
const opts = UNITS.map(u => `<option value="${u.id}">${lang === 'zh' ? u.zh : u.label}</option>`).join('');

$('#converter').innerHTML = `
  <div class="gz-converter-row">
    <input type="number" id="inputVal" placeholder="0" step="any" oninput="convert()">
    <select id="fromUnit" onchange="convert()">${opts}</select>
  </div>
  <div class="gz-converter-row" style="justify-content:center">
    <button class="gz-btn gz-btn-secondary" onclick="swapUnits()">⇅ ${t('swap')}</button>
  </div>
  <div class="gz-converter-row">
    <input type="text" id="outputVal" readonly>
    <select id="toUnit" onchange="convert()">${opts}</select>
  </div>
  <div id="formulaDisplay" style="margin-top:8px;font-size:.85em;opacity:.7"></div>
`;

$('#fromUnit').value = 'psi';
$('#toUnit').value = 'bar';

function convert() {
  const val = parseFloat($('#inputVal').value);
  if (isNaN(val)) { $('#outputVal').value = ''; $('#formulaDisplay').textContent = ''; return; }
  const from = UNITS.find(u => u.id === $('#fromUnit').value);
  const to = UNITS.find(u => u.id === $('#toUnit').value);
  const pa = val * from.factor;
  const result = pa / to.factor;
  $('#outputVal').value = parseFloat(result.toPrecision(12));
  const ratio = from.factor / to.factor;
  $('#formulaDisplay').textContent = `1 ${from.id} = ${parseFloat(ratio.toPrecision(10))} ${to.id}`;
}

function swapUnits() {
  const f = $('#fromUnit').value, t = $('#toUnit').value;
  $('#fromUnit').value = t; $('#toUnit').value = f; convert();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#outputVal').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#inputVal').value='';$('#outputVal').value='';$('#formulaDisplay').textContent=''">${t('clear')}</button>
`;

convert();

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📏', href:'/convert/unit.html', name:'Unit Converter'},
    {icon:'📏', href:'/convert/length-converter.html', name:'Length Converter'},
    {icon:'⚖️', href:'/convert/weight-converter.html', name:'Weight Converter'},
    {icon:'🌡️', href:'/convert/temperature.html', name:'Temperature'},
  ]
});
</script>
