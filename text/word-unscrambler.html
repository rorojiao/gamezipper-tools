<script>
GZI18n.register({
  en: {
    toolTitle: 'Word Unscrambler & Jumble Solver',
    toolDesc: 'Enter your letters and instantly find every valid English word for Scrabble, Words With Friends, crosswords and anagram games. Supports wildcards.',
    goBtn: 'Unscramble Letters',
    minLen: 'Min length',
    wildHint: 'Use ? for blank tiles / wildcards',
    fullOnly: 'Use all letters only',
    step1: 'Type your scrambled letters (use ? for blank tiles)',
    step2: 'Set a minimum word length if you want to filter short words',
    step3: 'Click Unscramble Letters to see every possible word',
    step4: 'Click any word to copy it to your clipboard',
    foundN: 'words found',
    noMatch: 'No words found. Try adding a wildcard (?) or more letters.',
    copyToast: 'Copied',
    resultsByLength: 'Results by length',
  },
  zh: {
    toolTitle: '单词重组器 / 字母拼词求解',
    toolDesc: '输入字母，即时找出所有可拼出的英文单词，适用于 Scrabble、Words With Friends、填字游戏和字谜。支持通配符。',
    goBtn: '开始拼词',
    minLen: '最短长度',
    wildHint: '用 ? 表示空白牌/通配符',
    fullOnly: '仅使用全部字母',
    step1: '输入打乱的字母（用 ? 表示空白牌）',
    step2: '按需设置最短单词长度以过滤短词',
    step3: '点击「开始拼词」查看所有可能的单词',
    step4: '点击任意单词即可复制到剪贴板',
    foundN: '个单词',
    noMatch: '未找到单词。试试加一个通配符 (?) 或更多字母。',
    copyToast: '已复制',
    resultsByLength: '按长度分组的结果',
  }
});

const { $, copyText, showToast, t } = GZ;
const WORDS = (window.GZ_WORDLIST || []);

function countLetters(s) {
  const c = {};
  for (const ch of s) c[ch] = (c[ch] || 0) + 1;
  return c;
}

function canMake(word, letters, blanks) {
  // letters: letter count map available, blanks: number of wildcards
  const need = {};
  for (const ch of word) need[ch] = (need[ch] || 0) + 1;
  let wildUsed = 0;
  for (const ch in need) {
    const have = letters[ch] || 0;
    const miss = need[ch] - have;
    if (miss > 0) {
      wildUsed += miss;
      if (wildUsed > blanks) return false;
    }
  }
  return wildUsed <= blanks;
}

function unscramble() {
  const raw = ($('#letters-input').value || '').toLowerCase().replace(/[^a-z?]/g, '');
  if (!raw) { $('#output').innerHTML = ''; $('#status').textContent = ''; return; }
  const blanks = (raw.match(/\?/g) || []).length;
  const letters = countLetters(raw.replace(/\?/g, ''));
  const minLen = Math.max(2, parseInt($('#min-len').value) || 2);
  const fullOnly = $('#full-only').checked;
  const totalLen = raw.length;
  const results = [];
  for (const w of WORDS) {
    if (w.length < minLen) continue;
    if (w.length > totalLen) continue;
    if (fullOnly && w.length !== totalLen) continue;
    if (canMake(w, letters, blanks)) results.push(w);
  }
  // group by length desc
  const groups = {};
  for (const w of results) {
    const L = w.length;
    (groups[L] = groups[L] || []).push(w);
  }
  const lens = Object.keys(groups).map(Number).sort((a, b) => b - a);
  let html = `<div class="stats"><b>${results.length}</b> ${t('foundN')}${lens.length ? ' · ' + t('resultsByLength') : ''}</div>`;
  if (!results.length) {
    html += `<div style="color:var(--accent)">${t('noMatch')}</div>`;
  }
  for (const L of lens) {
    const sorted = groups[L].sort();
    html += `<div class="result-group"><h3>${L} ${L === 1 ? 'letter' : 'letters'} (${sorted.length})</h3><div class="words">` +
      sorted.map(w => `<span class="word-chip" data-w="${w}">${w}</span>`).join('') + `</div></div>`;
  }
  $('#output').innerHTML = html;
}

$('#go-btn').addEventListener('click', unscramble);
$('#letters-input').addEventListener('keydown', e => { if (e.key === 'Enter') unscramble(); });
$('#output').addEventListener('click', e => {
  const chip = e.target.closest('.word-chip');
  if (chip) { copyText(chip.dataset.w); showToast(t('copyToast') + ': ' + chip.dataset.w); }
});

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example') || 'Example'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#letters-input').value='';$('#output').innerHTML='';$('#status').textContent='';$('#letters-input').focus()">${t('clear')}</button>`;

function loadExample() {
  $('#letters-input').value = 'catelpe';
  $('#min-len').value = 3;
  unscramble();
}

$('#go-btn').textContent = t('goBtn');
$('#lbl-minlen').textContent = t('minLen');
$('#lbl-wild').textContent = t('wildHint');
$('#lbl-full').textContent = t('fullOnly');

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'📝', href:'/text/word-scrambler.html', name:'Word Scrambler'},
    {icon:'📈', href:'/text/word-frequency.html', name:'Word Frequency'},
  ]
});
</script>
