const { $, copyText, t, getLang } = GZ;
const lang = getLang();
const isZh = lang === 'zh';

const QUALITIES = {
  en: ['leadership','reliability','creativity','communication','problem-solving','teamwork','work ethic','attention to detail','adaptability','initiative','technical skill','emotional intelligence'],
  zh: ['领导力','可靠性','创造力','沟通能力','解决问题','团队协作','职业操守','注重细节','适应力','主动性','专业技术','情商'],
};

const state = {
  recName: '', recTitle: '', recOrg: '', recEmail: '', recPhone: '',
  candName: '', pronoun: 'they', candRole: '', relationship: '', knownSince: '',
  recipient: 'toWhom', purpose: 'job', tone: 'formal', level: 'strongly',
  qualities: [], examples: '', date: new Date().toISOString().slice(0,10),
};

function esc(s){ return (s||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function input(id, ph) {
  return `<div class="field"><label>${t(id)}</label><input id="i-${id}" data-k="${id}" value="${esc(state[id]||'')}" placeholder="${ph||''}"></div>`;
}
function textarea(id, ph) {
  return `<div class="field"><label>${t(id)}</label><textarea id="i-${id}" data-k="${id}" placeholder="${ph||''}">${esc(state[id]||'')}</textarea></div>`;
}

function renderForm() {
  const opts = (obj, key) => Object.entries(obj).map(([k,v]) => `<option value="${k}" ${state[key]===k?'selected':''}>${v}</option>`).join('');
  const purposeOpts = { job: t('jobLetter'), academic: t('academicLetter'), rental: t('rentalLetter'), general: t('generalLetter') };
  const toneOpts = { formal: t('formal'), warm: t('warm'), enthusiastic: t('enthusiastic') };
  const levelOpts = { strongly: t('strongly'), recommend: t('recommend'), reserved: t('reserved') };
  const pronOpts = { they: t('they'), he: t('he'), she: t('she') };
  const recipOpts = { toWhom: t('dearTo'), hiring: isZh ? '尊敬的招聘经理' : 'Dear Hiring Manager', committee: isZh ? '尊敬的招生委员会' : 'Dear Admissions Committee', landlord: isZh ? '尊敬的房东' : 'Dear Property Manager' };
  const chipsHtml = QUALITIES[lang].map((q,i) => `<label class="${state.qualities.includes(q)?'on':''}" data-q="${q}"><input type="checkbox" ${state.qualities.includes(q)?'checked':''}> ${q}</label>`).join('');

  $('#form').innerHTML = `
    <h3>${t('secRec')}</h3>
    ${input('recName', isZh?'张伟':'Jane Doe')}
    ${input('recTitle', isZh?'市场总监':'Marketing Director')}
    ${input('recOrg', isZh?'星辰科技有限公司':'BrightPath Inc.')}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${input('recEmail','jane@brightpath.com')}
      ${input('recPhone','+1 (555) 123-4567')}
    </div>
    <h3>${t('secCand')}</h3>
    ${input('candName', isZh?'李明':'Alex Chen')}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field"><label>${t('candPronoun')}</label><select id="i-pronoun" data-k="pronoun">${opts(pronOpts,'pronoun')}</select></div>
      ${input('knownSince','2021')}
    </div>
    ${input('candRole', isZh?'高级产品经理':'Senior Product Manager')}
    ${input('relationship', isZh?'直接主管四年':'direct supervisor for four years')}
    <h3>${t('secBody')}</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field"><label>${t('recipient')}</label><select id="i-recipient" data-k="recipient">${opts(recipOpts,'recipient')}</select></div>
      <div class="field"><label>${t('purpose')}</label><select id="i-purpose" data-k="purpose">${opts(purposeOpts,'purpose')}</select></div>
      <div class="field"><label>${t('tone')}</label><select id="i-tone" data-k="tone">${opts(toneOpts,'tone')}</select></div>
      <div class="field"><label>${t('level')}</label><select id="i-level" data-k="level">${opts(levelOpts,'level')}</select></div>
    </div>
    <div class="field"><label>${t('qualities')}</label><div class="chips" id="chips">${chipsHtml}</div></div>
    ${textarea('examples', isZh?'例如：主导 XX 项目使收入增长 40%…' : 'e.g. Led the Q3 launch that grew revenue 40%…')}
    ${input('date','')}`;
  // Hide second recOrg (we wrote a no-op line). Patch listeners:
  $('#form').querySelectorAll('input[data-k], textarea[data-k], select[data-k]').forEach(el => {
    el.addEventListener('input', () => { state[el.dataset.k] = el.value; renderPreview(); });
    el.addEventListener('change', () => { state[el.dataset.k] = el.value; renderPreview(); });
  });
  $('#chips').querySelectorAll('label').forEach(l => {
    l.addEventListener('click', e => {
      e.preventDefault();
      const q = l.dataset.q;
      const idx = state.qualities.indexOf(q);
      if (idx >= 0) state.qualities.splice(idx, 1); else state.qualities.push(q);
      renderForm(); renderPreview();
    });
  });
}

function pronounSubject() {
  // English only affects pronoun usage; zh uses TA
  if (isZh) return { subj: 'TA', obj: 'TA', poss: 'TA的' };
  return state.pronoun === 'he' ? { subj:'he', obj:'him', poss:'his' }
       : state.pronoun === 'she' ? { subj:'she', obj:'her', poss:'her' }
       : { subj:'they', obj:'them', poss:'their' };
}

function buildLetter() {
  const p = pronounSubject();
  const cand = state.candName || (isZh ? '（候选人姓名）' : '[Candidate]');
  const recName = state.recName || (isZh ? '（你的姓名）' : '[Your Name]');
  const recTitle = state.recTitle;
  const recOrg = state.recOrg;
  const recipientLabel = ({
    toWhom: t('dearTo'),
    hiring: isZh ? '尊敬的招聘经理' : 'Dear Hiring Manager',
    committee: isZh ? '尊敬的招生委员会' : 'Dear Admissions Committee',
    landlord: isZh ? '尊敬的房东' : 'Dear Property Manager',
  })[state.recipient] || t('dearTo');
  const dateStr = state.date ? new Date(state.date + 'T00:00').toLocaleDateString(isZh ? 'zh-CN' : 'en-US', { year:'numeric', month:'long', day:'numeric' }) : '';

  const knownYears = state.knownSince ? (Math.max(1, new Date().getFullYear() - parseInt(state.knownSince,10))) : '';
  const qualitiesList = state.qualities.length ? state.qualities.join(', ') : (isZh ? '出色的专业能力' : 'excellent professional ability');

  let para2;
  if (isZh) {
    para2 = `${t('bodyKnown1')} ${esc(cand)} ${state.relationship ? '（'+esc(state.relationship)+'）' : ''} ${t('bodyKnown2')} ${knownYears} 年。`;
  } else {
    para2 = `${t('bodyKnown1')} ${esc(cand)}${state.relationship ? ' in my role as ' + esc(state.relationship) : ''} ${t('bodyKnown2')} ${knownYears || 'four'} ${t('bodyKnown3')} ${esc(recTitle)||'(manager)'}${recOrg ? ' ' + t('bodyKnown4') + ' ' + esc(recOrg) : ''}.`;
  }

  let para3;
  const qualIntro = isZh
    ? `${t('bodyQualitiesIntro')}${esc(cand)}${t('bodyQualitiesHas')}${esc(qualitiesList)}。`
    : `${t('bodyQualitiesIntro')} ${p.subj} ${t('bodyQualitiesHas')} ${esc(qualitiesList)}.`;
  if (state.examples.trim()) {
    para3 = qualIntro + '\n\n' + (isZh
      ? `${t('bodyExamples1')}${esc(state.examples)}`
      : `${t('bodyExamples1')} ${esc(state.examples)}`);
  } else {
    para3 = qualIntro;
  }

  const closingVerb = ({ strongly: t('strongly'), recommend: t('recommend'), reserved: t('reserved') })[state.level] || t('recommend');
  let para4;
  if (isZh) {
    const tail = state.purpose === 'academic' ? t('bodyClosingAcad')
              : state.purpose === 'rental' ? t('bodyClosingRental')
              : state.purpose === 'general' ? t('bodyClosingGeneral')
              : t('bodyClosingJob2');
    para4 = `${t('bodyClosingJob')}${esc(cand)}${tail}${closingVerb}。`;
  } else {
    const tail = state.purpose === 'academic' ? t('bodyClosingAcad')
              : state.purpose === 'rental' ? t('bodyClosingRental')
              : state.purpose === 'general' ? t('bodyClosingGeneral')
              : t('bodyClosingJob2');
    para4 = `${t('bodyClosingJob')} ${esc(cand)} ${tail} ${closingVerb.toLowerCase()} ${p.obj}.`;
  }

  let para5 = '';
  if (state.recEmail || state.recPhone) {
    const contact = [state.recEmail, state.recPhone].filter(Boolean).map(esc).join(isZh ? ' / ' : ' or ');
    para5 = isZh
      ? `${t('bodyClosingContact')}${contact}${t('bodyClosingContactEnd')}`
      : `${t('bodyClosingContact')} ${contact} ${t('bodyClosingContactEnd')}`;
  }

  const greeting = isZh ? `尊敬的${recipientLabel.replace(/^(尊敬的|Dear\s)/,'')}：` : `Dear ${recipientLabel.replace(/^Dear\s/,'')},`;
  const opening = isZh
    ? `${t('bodyOpening')}${closingVerb}${esc(cand)}${state.candRole ? '应聘'+esc(state.candRole) : ''}。`
    : `${t('bodyOpening')} ${esc(cand)} ${t('forJob')} ${state.candRole ? 'for the ' + esc(state.candRole) + ' position' : 'for this opportunity'}.`;

  return { dateStr, greeting, opening, para2, para3, para4, para5, recName, recTitle, recOrg };
}

function renderPreview() {
  const L = buildLetter();
  const orgLine = [L.recName, L.recTitle, L.recOrg].filter(Boolean).map(esc).join(isZh ? ' · ' : ' · ');
  const contactLine = [state.recEmail, state.recPhone].filter(Boolean).map(esc).join(isZh ? ' | ' : ' · ');
  $('#preview').innerHTML = `
    <div class="lh">${L.dateStr}</div>
    <div class="lg">${isZh ? '推荐信' : 'Letter of Recommendation'}</div>
    <p style="margin-bottom:18px;font-family:Helvetica,Arial,sans-serif">${L.greeting}</p>
    <p>${L.opening}</p>
    <p>${L.para2}</p>
    <p>${L.para3.replace(/\n\n/g,'</p><p>')}</p>
    <p>${L.para4}</p>
    ${L.para5 ? `<p>${L.para5}</p>` : ''}
    <div class="sig">
      <p style="margin-bottom:4px">${t('sincerely')}，</p>
      <b>${L.recName}</b>
      ${L.recTitle ? `<small>${esc(L.recTitle)}${L.recOrg ? ' · '+esc(L.recOrg) : ''}</small>`:''}
      ${contactLine ? `<small>${contactLine}</small>`:''}
    </div>`;
}

function loadExample() {
  if (isZh) {
    Object.assign(state, {
      recName:'张伟', recTitle:'市场总监', recOrg:'星辰科技有限公司', recEmail:'zhangwei@xingchen.com', recPhone:'+86 138-0000-1234',
      candName:'李明', pronoun:'he', candRole:'高级产品经理', relationship:'直接主管四年', knownSince:'2021',
