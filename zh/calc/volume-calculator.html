<script>
GZI18n.register({
  en: {
    toolTitle: 'Volume Calculator',
    toolDesc: 'Calculate the volume of 11+ 3D shapes — cube, box, sphere, cylinder, cone, pyramid, frustum, capsule, hemisphere, ellipsoid, torus. Visual diagram, formula and unit conversions for each.',
    resultLabel: 'Volume',
    step1: 'Pick a 3D shape from the left sidebar',
    step2: 'Enter the required measurements (use the same unit for all)',
    step3: 'Read the volume instantly with the formula and diagram',
    step4: 'Use Copy to copy the result, or read the value in another unit below',
  },
  zh: {
    toolTitle: '体积计算器',
    toolDesc: '计算 11+ 种三维图形的体积 — 立方体、长方体、球体、圆柱、圆锥、棱锥、圆台、胶囊体、半球、椭球体、圆环。每种形状均显示视觉图示、公式和单位换算。',
    resultLabel: '体积',
    step1: '从左侧边栏选择三维形状',
    step2: '输入所需尺寸（所有输入使用相同单位）',
    step3: '即时查看体积，并对照公式和图示',
    step4: '点击「复制」复制结果，或在下方查看其他单位的数值',
  }
});

const { $, copyText, t } = GZ;

// SVG helper - shared diagram styling
const STROKE = 'stroke="currentColor" stroke-width="2" fill="rgba(78,205,196,0.18)"';

const SHAPES = {
  cube: {
    name: 'Cube',
    formula: 'V = side³',
    svg: `<svg viewBox="0 0 100 100"><polygon points="25,30 65,30 75,20 35,20" ${STROKE}/><polygon points="25,30 25,75 65,75 65,30" ${STROKE}/><polygon points="65,30 75,20 75,65 65,75" ${STROKE}/><text x="40" y="55" font-size="11" fill="currentColor">s</text></svg>`,
    inputs: [{id:'s', label:'Side (s)', val:10}],
    calc: v => v.s ** 3
  },
  box: {
    name: 'Rectangular Prism (Box)',
    formula: 'V = length × width × height',
    svg: `<svg viewBox="0 0 100 100"><polygon points="20,35 65,35 75,25 30,25" ${STROKE}/><polygon points="20,35 20,80 65,80 65,35" ${STROKE}/><polygon points="65,35 75,25 75,70 65,80" ${STROKE}/><text x="38" y="60" font-size="9" fill="currentColor">l·w·h</text></svg>`,
    inputs: [{id:'l', label:'Length (l)', val:10},{id:'w', label:'Width (w)', val:6},{id:'h', label:'Height (h)', val:4}],
    calc: v => v.l * v.w * v.h
  },
  sphere: {
    name: 'Sphere',
    formula: 'V = (4/3) × π × r³',
    svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="55" r="28" ${STROKE}/><ellipse cx="50" cy="55" rx="28" ry="10" stroke="currentColor" stroke-width="1" fill="none" opacity=".5"/><line x1="50" y1="55" x2="78" y2="55" stroke="currentColor" stroke-width="1.5"/><text x="60" y="50" font-size="11" fill="currentColor">r</text></svg>`,
    inputs: [{id:'r', label:'Radius (r)', val:5}],
    calc: v => (4/3) * Math.PI * v.r ** 3
  },
  cylinder: {
    name: 'Cylinder',
    formula: 'V = π × r² × h',
    svg: `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="25" rx="22" ry="8" ${STROKE}/><path d="M28,25 L28,75 M72,25 L72,75" ${STROKE}/><path d="M28,75 A22,8 0 0 0 72,75" stroke="currentColor" stroke-width="2" fill="rgba(78,205,196,0.18)"/><line x1="50" y1="25" x2="72" y2="25" stroke="currentColor" stroke-width="1"/><text x="56" y="22" font-size="9" fill="currentColor">r</text><text x="75" y="55" font-size="10" fill="currentColor">h</text></svg>`,
    inputs: [{id:'r', label:'Radius (r)', val:5},{id:'h', label:'Height (h)', val:10}],
    calc: v => Math.PI * v.r ** 2 * v.h
  },
  cone: {
    name: 'Cone',
    formula: 'V = (1/3) × π × r² × h',
    svg: `<svg viewBox="0 0 100 100"><path d="M50,20 L75,75 L25,75 Z" ${STROKE}/><ellipse cx="50" cy="75" rx="25" ry="7" ${STROKE}/><text x="55" y="73" font-size="9" fill="currentColor">r</text><text x="44" y="50" font-size="10" fill="currentColor">h</text></svg>`,
    inputs: [{id:'r', label:'Radius (r)', val:5},{id:'h', label:'Height (h)', val:10}],
    calc: v => (1/3) * Math.PI * v.r ** 2 * v.h
  },
  sqPyramid: {
    name: 'Square Pyramid',
    formula: 'V = (1/3) × base² × h',
    svg: `<svg viewBox="0 0 100 100"><path d="M50,18 L78,72 L22,72 Z" ${STROKE}/><polygon points="22,72 78,72 70,80 30,80" ${STROKE}/><text x="46" y="50" font-size="10" fill="currentColor">h</text><text x="48" y="78" font-size="9" fill="currentColor">a</text></svg>`,
    inputs: [{id:'a', label:'Base side (a)', val:6},{id:'h', label:'Height (h)', val:10}],
    calc: v => (1/3) * v.a ** 2 * v.h
  },
  rectPyramid: {
    name: 'Rectangular Pyramid',
    formula: 'V = (1/3) × l × w × h',
    svg: `<svg viewBox="0 0 100 100"><path d="M50,18 L82,72 L18,72 Z" ${STROKE}/><polygon points="18,72 82,72 74,80 26,80" ${STROKE}/><text x="44" y="50" font-size="9" fill="currentColor">h</text></svg>`,
    inputs: [{id:'l', label:'Base length (l)', val:8},{id:'w', label:'Base width (w)', val:5},{id:'h', label:'Height (h)', val:10}],
    calc: v => (1/3) * v.l * v.w * v.h
  },
  frustum: {
    name: 'Frustum of Cone',
    formula: 'V = (1/3) × π × h × (R² + Rr + r²)',
    svg: `<svg viewBox="0 0 100 100"><path d="M35,25 L25,75 L75,75 L65,25 Z" ${STROKE}/><ellipse cx="50" cy="25" rx="15" ry="4" ${STROKE}/><ellipse cx="50" cy="75" rx="25" ry="7" ${STROKE}/><text x="40" y="22" font-size="8" fill="currentColor">r</text><text x="60" y="74" font-size="9" fill="currentColor">R</text></svg>`,
    inputs: [{id:'R', label:'Bottom radius (R)', val:6},{id:'r', label:'Top radius (r)', val:3},{id:'h', label:'Height (h)', val:8}],
    calc: v => (1/3) * Math.PI * v.h * (v.R**2 + v.R*v.r + v.r**2)
  },
  capsule: {
    name: 'Capsule (Pill)',
    formula: 'V = π × r² × h + (4/3) × π × r³',
    svg: `<svg viewBox="0 0 100 100"><rect x="28" y="35" width="44" height="30" ${STROKE}/><path d="M28,35 A15,15 0 0 0 28,65" ${STROKE}/><path d="M72,35 A15,15 0 0 0 72,65" ${STROKE}/><text x="50" y="54" font-size="9" fill="currentColor">h</text></svg>`,
    inputs: [{id:'r', label:'Radius (r)', val:5},{id:'h', label:'Cylinder height (h)', val:12}],
    calc: v => Math.PI * v.r**2 * v.h + (4/3) * Math.PI * v.r**3
  },
  hemisphere: {
    name: 'Hemisphere',
    formula: 'V = (2/3) × π × r³',
    svg: `<svg viewBox="0 0 100 100"><path d="M22,60 A28,28 0 0 1 78,60 Z" ${STROKE}/><line x1="22" y1="60" x2="78" y2="60" stroke="currentColor" stroke-width="2"/><line x1="50" y1="60" x2="50" y2="32" stroke="currentColor" stroke-width="1"/><text x="52" y="48" font-size="9" fill="currentColor">r</text></svg>`,
    inputs: [{id:'r', label:'Radius (r)', val:6}],
    calc: v => (2/3) * Math.PI * v.r**3
  },
  ellipsoid: {
    name: 'Ellipsoid',
    formula: 'V = (4/3) × π × a × b × c',
    svg: `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="55" rx="32" ry="22" ${STROKE}/><line x1="50" y1="55" x2="82" y2="55" stroke="currentColor" stroke-width="1"/><text x="60" y="50" font-size="9" fill="currentColor">a</text></svg>`,
    inputs: [{id:'a', label:'Axis a', val:5},{id:'b', label:'Axis b', val:4},{id:'c', label:'Axis c', val:3}],
    calc: v => (4/3) * Math.PI * v.a * v.b * v.c
  },
  torus: {
    name: 'Torus (Donut)',
    formula: 'V = 2 × π² × R × r²',
    svg: `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="55" rx="34" ry="14" ${STROKE}/><ellipse cx="50" cy="55" rx="14" ry="6" stroke="currentColor" stroke-width="2" fill="var(--bg)"/><text x="40" y="50" font-size="8" fill="currentColor">R</text><text x="68" y="46" font-size="8" fill="currentColor">r</text></svg>`,
    inputs: [{id:'R', label:'Major radius (R)', val:6},{id:'r', label:'Minor radius (r)', val:2}],
    calc: v => 2 * Math.PI**2 * v.R * v.r**2
  },
};

let activeShape = 'cube';
const shapeKeys = Object.keys(SHAPES);

// Render shape list
$('#shapes').innerHTML = shapeKeys.map(k => {
  const s = SHAPES[k];
  return `<div class="vc-shape${k === activeShape ? ' active' : ''}" data-shape="${k}" onclick="selectShape('${k}')">${s.svg.replace('<svg ','<svg width="22" height="22" ')}<span>${s.name}</span></div>`;
}).join('');

function selectShape(k) {
  activeShape = k;
  document.querySelectorAll('.vc-shape').forEach(el => el.classList.toggle('active', el.dataset.shape === k));
  render();
}

function getInputs() {
  const vals = {};
  SHAPES[activeShape].inputs.forEach(inp => {
    const el = document.getElementById('inp-' + inp.id);
    vals[inp.id] = parseFloat(el.value) || 0;
  });
  return vals;
}

function render() {
  const s = SHAPES[activeShape];
  $('#shape-name').textContent = s.name;
  $('#svg-box').innerHTML = s.svg.replace('<svg ', '<svg width="180" height="160" ');
  $('#formula').innerHTML = `<b>Formula:</b>  ${s.formula}`;
  $('#inputs').innerHTML = s.inputs.map(inp => `
    <div class="vc-input"><label for="inp-${inp.id}">${inp.label}</label>
    <input type="number" id="inp-${inp.id}" value="${inp.val}" step="any" oninput="render()"></div>`).join('');

  const vals = getInputs();
  const invalid = s.inputs.some(inp => !(vals[inp.id] > 0));
  if (invalid) {
    $('#result-value').textContent = '0';
    $('#status').textContent = '';
    $('#units').innerHTML = '';
    return;
  }
  const vol = s.calc(vals); // in cubic input-units
  $('#result-value').textContent = formatNum(vol);
  $('#status').textContent = `cubic ${unitLabel()}`;
  $('#units').innerHTML = buildConversions(vol).map(c => `<span class="vc-unit" title="${c.name}">${c.value} ${c.unit}</span>`).join('');
}

function unitLabel() {
  // Try to read selected unit
  const u = (document.getElementById('unit-select') || {}).value || 'cm';
  return u;
}

function buildConversions(volInInputUnitCubed) {
  // We treat the user input unit as 'cm' for display purposes since they pick a unit.
  const u = (document.getElementById('unit-select') || {}).value || 'cm';
  // cm³ based conversions
  const cm3 = volInInputUnitCubed; // assume input unit is the chosen base unit
  const conv = [
    { name: 'mm³ (' + u + '→mm)', value: cm3 * 1000, unit: 'mm³' },
    { name: u + '³', value: cm3, unit: u + '³' },
    { name: 'mL', value: cm3 / 1, unit: 'mL' },
    { name: 'L', value: cm3 / 1000, unit: 'L' },
    { name: 'm³', value: cm3 / 1e6, unit: 'm³' },
    { name: 'in³', value: cm3 / 16.3871, unit: 'in³' },
    { name: 'ft³', value: cm3 / 28316.8, unit: 'ft³' },
    { name: 'gal (US)', value: cm3 / 3785.41, unit: 'gal' },
  ];
  return conv.map(c => ({ ...c, value: formatNum(c.value) }));
}

function formatNum(n) {
  if (!isFinite(n)) return '0';
  if (n === 0) return '0';
  const abs = Math.abs(n);
  if (abs >= 1e9) return n.toExponential(4);
  if (abs >= 1) return n.toLocaleString('en-US', { maximumFractionDigits: 4 });
  if (abs >= 0.001) return n.toPrecision(4);
  return n.toExponential(3);
}

function doCopy() {
  copyText($('#result-value').textContent + ' ' + $('#status').textContent);
}

$('#toolbar').innerHTML = `
  <label style="font-size:.85em;color:var(--text2);display:flex;align-items:center;gap:6px">📏 Unit:
    <select id="unit-select" class="gz-select" onchange="render()">
      <option value="cm">cm</option><option value="m">m</option><option value="mm">mm</option>
      <option value="in">in</option><option value="ft">ft</option><option value="yd">yd</option>
    </select>
  </label>
  <button class="gz-btn gz-btn-secondary" onclick="doCopy()">📋 ${GZI18n.getLang() === 'zh' ? '复制' : 'Copy'}</button>`;

render();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/calc/area-calculator.html', name:'Area Calculator'},
    {icon:'⭕', href:'/calc/circle-calculator.html', name:'Circle Calculator'},
    {icon:'🧱', href:'/calc/concrete.html', name:'Concrete Calculator'},
    {icon:'🛢️', href:'/calc/water-intake.html', name:'Water Intake'},
  ]
});
</script>
