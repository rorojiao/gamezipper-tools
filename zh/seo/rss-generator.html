<body>
<div class="gz-container">

  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div style="margin-top:16px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div><label style="font-size:.85em;font-weight:600">Feed Title *</label><input id="feed-title" class="gz-input" placeholder="My Blog"></div>
        <div><label style="font-size:.85em;font-weight:600">Feed URL *</label><input id="feed-url" class="gz-input" placeholder="https://example.com"></div>
        <div><label style="font-size:.85em;font-weight:600">Description</label><input id="feed-desc" class="gz-input" placeholder="Latest posts from my blog"></div>
        <div><label style="font-size:.85em;font-weight:600">Language</label><input id="feed-lang" class="gz-input" value="en" placeholder="en"></div>
      </div>
      <h3 style="margin:20px 0 8px;font-size:1rem" id="items-heading">Feed Items</h3>

          <option value="rss">RSS 2.0</option>

    <div id="output" style="display:none"></div>

  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'RSS Feed Generator',
    toolDesc: 'Generate valid RSS 2.0 or Atom 1.0 XML feeds for your website or blog with custom items and settings.',
    generate: 'Generate Feed',
    addItem: '+ Add Item',
    removeItem: '✕',
    copy: 'Copy',
    download: 'Download',
    clear: 'Clear',
    copied: 'Copied!',
    generated: '✓ Feed generated successfully',
    feedTitle: 'Feed Title',
    feedUrl: 'Feed URL',
    itemTitle: 'Item Title',
    itemLink: 'Item Link',
    itemDesc: 'Description',
    itemDate: 'Date',
    step1: 'Enter your feed title, URL, and description',
    step2: 'Add items (blog posts, articles) with title, link, and description',
    step3: 'Choose RSS 2.0 or Atom 1.0 format',
    step4: 'Click Generate, then Copy or Download the XML file',
  },
  zh: {
    toolTitle: 'RSS 订阅源生成器',
    toolDesc: '为您的网站或博客生成符合标准的 RSS 2.0 或 Atom 1.0 XML 订阅源。',
    generate: '生成订阅源',
    addItem: '+ 添加条目',
    removeItem: '✕',
    copy: '复制',
    download: '下载',
    clear: '清除',
    copied: '已复制！',
    generated: '✓ 订阅源生成成功',
    feedTitle: '订阅源标题',
    feedUrl: '订阅源 URL',
    itemTitle: '条目标题',
    itemLink: '条目链接',
    itemDesc: '描述',
    itemDate: '日期',
    step1: '输入订阅源标题、URL 和描述',
    step2: '添加条目（文章、博客），填写标题、链接和描述',
    step3: '选择 RSS 2.0 或 Atom 1.0 格式',
    step4: '点击生成，然后复制或下载 XML 文件',
  }
});

const { $, copyText, t, showToast } = GZ;
let itemCount = 0;

function escapeXml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}

function addItem(title='', link='', desc='', date='') {
  itemCount++;
  const id = itemCount;
  const container = $('#items-container');
  const div = document.createElement('div');
  div.className = 'feed-item';
  div.id = `item-${id}`;
  div.innerHTML = `
    <div class="item-header"><span>${t('itemTitle')} #${id}</span><button class="gz-btn gz-btn-secondary" style="padding:2px 8px;font-size:.8em" onclick="this.closest('.feed-item').remove()">${t('removeItem')}</button></div>
    <div class="row"><input class="gz-input item-title" placeholder="${t('itemTitle')}" value="${escapeXml(title)}"></div>
    <div class="row"><input class="gz-input item-link" placeholder="${t('itemLink')}" value="${escapeXml(link)}"></div>
    <div class="row"><textarea class="gz-input item-desc" rows="2" placeholder="${t('itemDesc')}">${escapeXml(desc)}</textarea></div>
    <div class="row"><input class="gz-input item-date" type="date" value="${date}"></div>`;
  container.appendChild(div);
}

function generateFeed() {
  const fTitle = $('#feed-title').value.trim();
  const fUrl = $('#feed-url').value.trim();
  const fDesc = $('#feed-desc').value.trim();
  const fLang = $('#feed-lang').value.trim();
  const fType = $('#feed-type').value;

  if (!fTitle || !fUrl) {
    $('#status').innerHTML = '<span style="color:var(--gz-accent)">Feed title and URL are required.</span>';
    return;
  }

  const items = [...document.querySelectorAll('.feed-item')].map(el => ({
    title: el.querySelector('.item-title').value.trim(),
    link: el.querySelector('.item-link').value.trim(),
    desc: el.querySelector('.item-desc').value.trim(),
    date: el.querySelector('.item-date').value,
  }));

  const now = new Date().toUTCString();
  let xml;

  if (fType === 'rss') {
    xml = `<?xml version="1.0" encoding="UTF-8"?>\n<rss version="2.0" xmlns:atom="http://www.w3.org/2005/Atom">\n  <channel>\n    <title>${escapeXml(fTitle)}</title>\n    <link>${escapeXml(fUrl)}</link>\n    <description>${escapeXml(fDesc)}</description>\n    <language>${escapeXml(fLang)}</language>\n    <lastBuildDate>${now}</lastBuildDate>\n    <atom:link href="${escapeXml(fUrl)}/feed.xml" rel="self" type="application/rss+xml"/>\n${items.map(it => `    <item>\n      <title>${escapeXml(it.title)}</title>\n      <link>${escapeXml(it.link)}</link>\n      <description>${escapeXml(it.desc)}</description>\n${it.date ? `      <pubDate>${new Date(it.date).toUTCString()}</pubDate>\n` : ''}    </item>`).join('\n')}\n  </channel>\n</rss>`;
  } else {
    xml = `<?xml version="1.0" encoding="UTF-8"?>\n<feed xmlns="http://www.w3.org/2005/Atom">\n  <title>${escapeXml(fTitle)}</title>\n  <link href="${escapeXml(fUrl)}"/>\n  <link href="${escapeXml(fUrl)}/feed.xml" rel="self"/>\n  <id>${escapeXml(fUrl)}/</id>\n  <updated>${new Date().toISOString()}</updated>\n  <subtitle>${escapeXml(fDesc)}</subtitle>\n${items.map(it => `  <entry>\n    <title>${escapeXml(it.title)}</title>\n    <link href="${escapeXml(it.link)}"/>\n    <id>${escapeXml(it.link)}</id>\n${it.date ? `    <updated>${new Date(it.date).toISOString()}</updated>\n` : ''}    <summary>${escapeXml(it.desc)}</summary>\n  </entry>`).join('\n')}\n</feed>`;
  }

  $('#output').style.display = 'block';
  $('#output').textContent = xml;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('generated')}</span>`;
}

function downloadFeed() {
  const xml = $('#output').textContent;
  if (!xml) return;
  const ext = $('#feed-type').value === 'atom' ? 'atom.xml' : 'rss.xml';
  const blob = new Blob([xml], {type: 'application/xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = ext;
  a.click();
  URL.revokeObjectURL(a.href);
}

function doClear() {
  $('#feed-title').value = '';
  $('#feed-url').value = '';
  $('#feed-desc').value = '';
  $('#feed-lang').value = 'en';
  $('#items-container').innerHTML = '';
  $('#output').style.display = 'none';
  $('#output').textContent = '';
  $('#status').innerHTML = '';
  itemCount = 0;
  addItem();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generateFeed()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="addItem()">${t('addItem')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadFeed()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

// Start with one item
addItem('My First Blog Post', 'https://example.com/post-1', 'This is a sample blog post description.', new Date().toISOString().split('T')[0]);

GZ.renderToolPage({
  category: 'seo',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🗺️', href:'/seo/sitemap-generator.html', name:'Sitemap Generator'},
    {icon:'🤖', href:'/seo/robots-txt-generator.html', name:'Robots.txt Generator'},
    {icon:'🏷️', href:'/seo/meta-tag-generator.html', name:'Meta Tag Generator'},
    {icon:'📊', href:'/seo/schema-generator.html', name:'Schema Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
