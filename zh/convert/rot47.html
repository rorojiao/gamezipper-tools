<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is ROT47?", "acceptedAnswer": {"@type": "Answer", "text": "ROT47 is a derivative of ROT13 that operates on the full printable ASCII range (characters 33 to 126, 94 characters total). Each character is rotated by 47 positions, which makes it self-inverse: applying ROT47 twice returns the original text. Unlike ROT13 it transforms digits, punctuation and symbols, not just letters."}}, {"@type": "Question", "name": "What is ROT47 used for?", "acceptedAnswer": {"@type": "Answer", "text": "ROT47 is commonly used to obscure spoilers, jokes, answers to puzzles, and to lightly hide URLs or text in forums and Usenet. It is NOT a secure cipher — it is a Caesar-shift style obfuscation and can be trivially reversed."}}, {"@type": "Question", "name": "Why 47 specifically?", "acceptedAnswer": {"@type": "Answer", "text": "The printable ASCII range is 94 characters wide (from ! at position 33 to ~ at position 126). Rotating by half of 94 (i.e. 47) makes the cipher self-inverse, so the same operation both encodes and decodes. This is exactly analogous to ROT13's choice of 13 (half of 26 letters)."}}, {"@type": "Question", "name": "Does ROT47 work on non-ASCII characters?", "acceptedAnswer": {"@type": "Answer", "text": "No. ROT47 only affects printable ASCII characters in the range 33–126. Characters outside this range (such as accented letters, CJK characters, emoji, newlines and spaces) are left unchanged."}}]}</script>

const { $, copyText, t } = GZ;

$('#lbl-in').textContent = t('input');
$('#lbl-out').textContent = t('output');

// ROT47 implementation: rotate printable ASCII chars 33–126 by 47 positions
function rot47(str) {
  let out = '';
  for (let i = 0; i < str.length; i++) {
    const c = str.charCodeAt(i);
    if (c >= 33 && c <= 126) {
      // 94 chars total, rotate by 47
      out += String.fromCharCode(33 + ((c - 33 + 47) % 94));
    } else {
      out += str.charAt(i); // leave newlines, spaces, non-ASCII alone
    }
  }
  return out;
}

function convert() {
  const inp = $('#input').value;
  const result = rot47(inp);
  $('#output').textContent = result;
  const count = inp.length;
  $('#status').innerHTML = `<span style="opacity:.7;font-size:.85em">${count} ${t('charsLabel')} → ${result.length} ${t('charsLabel')}</span>`;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convert()">${t('convert')}</button>
  <button class="gz-btn" onclick="copyText(document.getElementById('output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('copy')==='Copy'?'Example':'示例'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('input').value='';convert()">${t('copy')==='Copy'?'Clear':'清空'}</button>`;
