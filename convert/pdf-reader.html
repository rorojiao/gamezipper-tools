<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.js"></script>
<script>
if (window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.js';

GZI18n.register({
  en: {
    toolTitle: 'PDF Reader & Viewer',
    toolDesc: 'Open and read any PDF file directly in your browser — no upload, no signup. Zoom, navigate pages, view thumbnails and full-screen mode. 100% private.',
    dropText: 'Click to choose a PDF or drag & drop here',
    dropHint: 'Your file stays in your browser — nothing is uploaded',
    step1: 'Click the drop zone or drag a PDF file onto it',
    step2: 'Use the toolbar to zoom, navigate pages, or go full-screen',
    step3: 'Click any thumbnail in the sidebar to jump to that page',
    step4: 'Click ✕ to close and open another PDF',
  },
  zh: {
    toolTitle: 'PDF 阅读器 / PDF 查看器',
    toolDesc: '直接在浏览器中打开和阅读任何 PDF 文件 — 无需上传、无需注册。支持缩放、翻页、缩略图导航和全屏模式。100% 隐私安全。',
    dropText: '点击选择 PDF 文件或拖放到此处',
    dropHint: '文件仅在你的浏览器中处理 — 不会上传到任何服务器',
    step1: '点击拖放区域或将 PDF 拖放到此处',
    step2: '使用工具栏缩放、翻页或进入全屏模式',
    step3: '点击缩略图栏中的任意页面跳转到该页',
    step4: '点击 ✕ 关闭当前 PDF 并打开另一个',
  }
});

const { $, t } = GZ;
let pdfDoc = null;
let currentPage = 1;
let scale = 1.2;
let rendering = false;
let pendingPage = null;

async function loadPDF(file) {
  if (!file || file.type !== 'application/pdf') return;
  const arrayBuffer = await file.arrayBuffer();
  try {
    pdfDoc = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
    currentPage = 1;
    scale = 1.2;
    $('#pdf-drop-zone').style.display = 'none';
    $('#pdf-viewer').style.display = 'block';
    $('#pdf-meta').textContent = `${file.name} • ${pdfDoc.numPages} page${pdfDoc.numPages > 1 ? 's' : ''} • ${(file.size/1024).toFixed(0)} KB`;
    await renderThumbs();
    await renderPage(1);
  } catch(e) {
    alert('Failed to load PDF: ' + e.message);
  }
}

async function renderPage(num) {
  if (rendering) { pendingPage = num; return; }
  rendering = true;
  currentPage = num;
  const page = await pdfDoc.getPage(num);
  const viewport = page.getViewport({scale: scale * (window.devicePixelRatio || 1)});
  const canvas = $('#pdf-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  canvas.style.width = (viewport.width / (window.devicePixelRatio || 1)) + 'px';
  canvas.style.height = 'auto';
  await page.render({canvasContext: ctx, viewport}).promise;
  $('#page-info').textContent = `${num} / ${pdfDoc.numPages}`;
  $('#zoom-info').textContent = Math.round(scale * 100) + '%';
  rendering = false;
  if (pendingPage !== null) { const p = pendingPage; pendingPage = null; renderPage(p); }
  document.querySelectorAll('.pdf-thumb').forEach((el, i) => {
    el.classList.toggle('active', i + 1 === num);
  });
}

async function renderThumbs() {
  const container = $('#thumbs');
  container.innerHTML = '';
  for (let i = 1; i <= pdfDoc.numPages; i++) {
    const page = await pdfDoc.getPage(i);
    const viewport = page.getViewport({scale: 0.2});
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
    const wrap = document.createElement('div');
    wrap.className = 'pdf-thumb' + (i === 1 ? ' active' : '');
    wrap.appendChild(canvas);
    wrap.onclick = () => renderPage(i);
    container.appendChild(wrap);
  }
}

function fitWidth() {
  const wrap = $('#canvas-wrap');
  pdfDoc.getPage(currentPage).then(page => {
    const baseViewport = page.getViewport({scale: 1});
    scale = (wrap.clientWidth - 20) / baseViewport.width;
    renderPage(currentPage);
  });
}

$('#drop-text').textContent = t('dropText');
$('#drop-hint').textContent = t('dropHint');
$('#pdf-drop-zone').onclick = () => $('#file-input').click();
$('#file-input').onchange = (e) => { if (e.target.files[0]) loadPDF(e.target.files[0]); };
$('#pdf-drop-zone').ondragover = (e) => { e.preventDefault(); e.currentTarget.style.borderColor = 'var(--gz-accent)'; };
$('#pdf-drop-zone').ondragleave = (e) => { e.currentTarget.style.borderColor = ''; };
$('#pdf-drop-zone').ondrop = (e) => { e.preventDefault(); if (e.dataTransfer.files[0]) loadPDF(e.dataTransfer.files[0]); };
$('#prev-page').onclick = () => currentPage > 1 && renderPage(currentPage - 1);
$('#next-page').onclick = () => pdfDoc && currentPage < pdfDoc.numPages && renderPage(currentPage + 1);
$('#zoom-in').onclick = () => { scale = Math.min(scale + 0.2, 5); renderPage(currentPage); };
$('#zoom-out').onclick = () => { scale = Math.max(scale - 0.2, 0.3); renderPage(currentPage); };
$('#fit-width').onclick = () => fitWidth();
$('#fullscreen').onclick = () => { const w = $('#canvas-wrap'); if (document.fullscreenElement) document.exitFullscreen(); else w.requestFullscreen(); };
$('#close-pdf').onclick = () => { pdfDoc = null; $('#pdf-viewer').style.display = 'none'; $('#pdf-drop-zone').style.display = 'block'; $('#file-input').value = ''; };

$('#toolbar').innerHTML = '';

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📄', href:'/convert/pdf-to-text.html', name:'PDF to Text'},
    {icon:'🖼️', href:'/convert/pdf-to-image.html', name:'PDF to Image'},
    {icon:'📦', href:'/convert/pdf-compressor.html', name:'PDF Compressor'},
    {icon:'📊', href:'/convert/pdf-viewer.html', name:'PDF Viewer'},
  ]
});
</script>
