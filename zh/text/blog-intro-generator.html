<script>
GZI18n.register({
  en: {
    toolTitle: 'Blog Intro Generator',
    toolDesc: 'Generate engaging blog post introductions in 7 styles — story, stat, question, contrarian, list, SEO keyword hook, and how-we-got-here. Built for SEO and reader retention.',
    lblTopic: 'Blog topic', lblAudience: 'Target audience', lblKeyword: 'Main SEO keyword (optional)', lblPoints: 'Key points (optional)',
    styles: {
      story: ['Story','Open with a mini anecdote'],
      stat: ['Stat','Lead with a striking number'],
      question: ['Question','Open with one (or several) questions'],
      contrarian: ['Contrarian','Challenge a common belief'],
      list: ['List','Tease what\'s coming'],
      seo: ['SEO Hook','Keyword in the first sentence'],
      journey: ['How-We-Got-Here','Build context with backstory'],
    },
    step1: 'Enter your blog topic and target audience',
    step2: 'Optionally add a main SEO keyword and key points',
    step3: 'Pick the intro style that fits your post',
    step4: 'Click Generate and edit the result to your voice',
    noInput: 'Add at least a topic to generate an intro.',
  },
  zh: {
    toolTitle: '博客开场段落生成器',
    toolDesc: '用 7 种风格为博客文章生成引人入胜的开场 — 故事、数据、问题、反驳、列表、SEO 关键词钩子和故事背景。专为 SEO 和读者留存设计。',
    lblTopic: '博客主题', lblAudience: '目标读者', lblKeyword: '主 SEO 关键词（可选）', lblPoints: '关键要点（可选）',
    styles: {
      story: ['故事','以小故事开场'],
      stat: ['数据','用惊人数字开场'],
      question: ['问题','以一个或几个问题开场'],
      contrarian: ['反驳','挑战常见观点'],
      list: ['列表','预告将要介绍的内容'],
      seo: ['SEO 钩子','在首句使用关键词'],
      journey: ['背景故事','用背景建立情境'],
    },
    step1: '输入博客主题和目标读者',
    step2: '可选择添加 SEO 关键词和要点',
    step3: '选择适合你文章的引言风格',
    step4: '点击「生成」并根据需要修改',
    noInput: '请至少输入主题以生成引言。',
  }
});

const { $, copyText, t } = GZ;
let style = 'seo';
let version = 0;

const STATS = [
  '93% of bloggers say a strong intro is the #1 factor in keeping readers on the page.',
  'Readers form an opinion about your post in the first 8 seconds.',
  'Posts with a clear intro get 2.3x more time on page than those without.',
  'Search engines weight the first 100 words of your post more heavily for ranking.',
  '70% of readers who read the headline will read the intro, but only 30% will read the body.',
];
const pick = (arr) => arr[version % arr.length];

function cap(s){ return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
function lc(s){ return s ? s.toLowerCase() : ''; }
function ucFirst(s){ return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

function generate(){
  const topic = $('#topic').value.trim();
  const audience = $('#audience').value.trim();
  const keyword = $('#keyword').value.trim();
  const pointsRaw = $('#points').value.trim();
  if (!topic){ $('#out').textContent = t('noInput'); $('#meta').innerHTML=''; return; }
  const points = pointsRaw ? pointsRaw.split(/\n+/).map(s => s.replace(/^\d+[\.\)]\s*/, '').trim()).filter(Boolean).slice(0, 5) : [];

  let p = [];
  const aud = audience ? ` ${audience}` : ' readers';
  const kw = keyword || topic;

  if (style === 'story'){
    p.push(`Six months ago, I was struggling with ${lc(topic)}. I had tried everything — the popular advice, the trendy tools, the well-meaning tips from friends. Nothing stuck.`);
    p.push(`Then, almost by accident, I discovered something that changed the way I think about ${lc(topic)} forever. What I learned wasn't just practical — it was a complete shift in perspective.`);
    p.push(`In this post, I'll walk you through exactly what worked, what didn't, and how you can apply the same insights in a fraction of the time it took me.`);
  } else if (style === 'stat'){
    p.push(`${pick(STATS)}`);
    p.push(`If that number surprised you, you're not alone. ${cap(topic)} is one of the most discussed — and most misunderstood — topics in our field today.`);
    p.push(`Over the next few minutes, I'll break down what the data actually says, what it doesn't, and the practical steps${aud} can take today to get a better result.`);
  } else if (style === 'question'){
    const q1 = `What if everything you've been told about ${lc(topic)} is wrong?`;
    const q2 = `Why do some${aud} get it effortlessly, while others struggle for years?`;
    const q3 = `And — most importantly — what would change for you if you finally cracked it?`;
    p.push(`${q1}`);
    p.push(`${q2} ${q3}`);
    p.push(`In this post, we'll answer all three. I'll share the framework I wish someone had handed me on day one — distilled from the latest research, real case studies, and patterns I've seen across hundreds of${aud}.`);
  } else if (style === 'contrarian'){
    p.push(`Most advice about ${lc(topic)} is wrong. Not "slightly off" — fundamentally, structurally wrong.`);
    p.push(`The internet is flooded with tips that feel intuitive but quietly sabotage your results. They keep you busy without moving the needle. They reward activity over outcomes. And — worst of all — they make you feel like the problem is you.`);
    p.push(`It's not. Below, I'll share the contrarian (but evidence-backed) approach to ${lc(topic)} that${aud} are quietly using to leap ahead while everyone else follows the same tired playbook.`);
  } else if (style === 'list'){
    p.push(`If you're looking for a single post that covers ${lc(topic)} end to end, you're in the right place.`);
    if (points.length){
      p.push(`In the next few minutes, you'll learn:`);
      p.push(points.map((p, i) => `  • ${p}`).join('\n'));
    } else {
      p.push(`In the next few minutes, you'll learn the 5 most important things every${aud} should know about ${lc(topic)} — including the one mistake that costs most people weeks of effort.`);
    }
    p.push(`Let's dive in.`);
  } else if (style === 'seo'){
    p.push(`${cap(kw)} is one of the most searched topics in its space — and for good reason. Whether you're just starting out or you've been at it for years, getting ${lc(kw)} right can transform your results.`);
    p.push(`In this complete guide to ${lc(kw)}, we'll walk through what it actually is, why it matters, and the exact steps${aud} can take to master it. By the end, you'll have a clear plan you can put into action today.`);
    p.push(`Let's start with the basics.`);
  } else if (style === 'journey'){
    p.push(`A few years ago, ${lc(topic)} was a niche topic that only specialists cared about. Then a few things happened at once — a wave of new research, a shift in how${aud} approach the problem, and a handful of breakthroughs that turned best practice on its head.`);
    p.push(`I remember reading about the first wave of changes and being skeptical. But the data kept piling up, and the early adopters were quietly producing results that put them years ahead.`);
    p.push(`This post is the guide I wish I'd had back then — a clear, modern look at ${lc(topic)} that respects what's changed and what's still true.`);
  }

  const result = p.join('\n\n');
  $('#out').textContent = result;
  const wc = result.split(/\s+/).filter(Boolean).length;
  const sc = result.split(/[.!?]+/).filter(s => s.trim()).length;
  $('#meta').innerHTML = `<span><b>${wc}</b> words</span><span><b>${sc}</b> sentences</span><span>style: <b>${style}</b></span>`;
  version++;
}

function renderStyles(){
  const html = Object.entries(t('styles')).map(([k, v]) =>
    `<button class="${k===style?'active':''}" data-k="${k}">${v[0]}<small>${v[1]}</small></button>`
  ).join('');
  $('#styles').innerHTML = html;
  $('#styles').querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      style = b.getAttribute('data-k');
      version = 0;
      renderStyles();
      generate();
    });
  });
}

$('#btnGenerate').addEventListener('click', () => { version = 0; generate(); });
$('#btnCopy').addEventListener('click', () => copyText($('#out').textContent));
$('#btnSwap').addEventListener('click', generate);
$('#btnClear').addEventListener('click', () => {
  $('#topic').value=''; $('#audience').value=''; $('#keyword').value=''; $('#points').value='';
  $('#out').textContent=''; $('#meta').innerHTML='';
});
$('#topic').addEventListener('input', () => { version = 0; generate(); });
$('#audience').addEventListener('input', () => { version = 0; generate(); });
$('#keyword').addEventListener('input', () => { version = 0; generate(); });
$('#points').addEventListener('input', () => { version = 0; generate(); });

renderStyles();
generate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏁', href:'/text/essay-conclusion-generator.html', name:'Essay Conclusion'},
    {icon:'📰', href:'/text/blog-title-generator.html', name:'Blog Title Generator'},
    {icon:'📝', href:'/text/outline-generator.html', name:'Outline Generator'},
    {icon:'✍️', href:'/text/markdown-editor.html', name:'Markdown Editor'},
  ]
});
</script>

</body>
