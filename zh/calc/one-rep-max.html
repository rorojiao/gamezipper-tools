<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a one-rep max (1RM)?", "acceptedAnswer": {"@type": "Answer", "text": "Your one-rep max is the maximum amount of weight you can lift for a single repetition of an exercise with proper form. It is the gold standard for measuring strength and is used to calculate training percentages for programs like 5/3/1, Starting Strength, and many others."}}, {"@type": "Question", "name": "Which 1RM formula is most accurate?", "acceptedAnswer": {"@type": "Answer", "text": "All four formulas (Epley, Brzycki, Lander, Lombardi) give similar results within 2-3% of each other for rep ranges of 1-10. The Epley formula is the most widely used. The average of all four is generally a good estimate when you are between formulas."}}, {"@type": "Question", "name": "How accurate is a calculated 1RM?", "acceptedAnswer": {"@type": "Answer", "text": "Formulas are most accurate in the 1-5 rep range. For 8+ reps the estimate becomes less reliable because endurance and form breakdown play a bigger role. For a true 1RM, you should test it directly with proper warm-up and a spotter."}}, {"@type": "Question", "name": "How do I use 1RM to plan my training?", "acceptedAnswer": {"@type": "Answer", "text": "Multiply your 1RM by a training percentage: 50-60% for hypertrophy/endurance, 70-80% for strength, 85-95% for power, and 95-100% for max effort singles. Most linear periodization programs work in the 70-85% range for the bulk of training."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="orm-layout">
      <div class="orm-input">
        <div class="orm-unit">
          <button class="active" data-u="kg">Kilograms (kg)</button>
          <button data-u="lb">Pounds (lb)</button>
        </div>
        <label>Weight Lifted</label>
        <input type="number" id="weight" value="100" min="0" step="0.5">
        <label>Reps Completed</label>
        <input type="number" id="reps" value="5" min="1" max="20">
        <label>RPE (Rate of Perceived Exertion, optional)</label>
        <input type="number" id="rpe" placeholder="e.g. 8 (1-10)" min="1" max="10" step="0.5">
        <p class="orm-info">Use a weight you can lift with good form for 1-10 reps. For higher rep sets the estimate becomes less accurate.</p>
      </div>
      <div>
        <div class="orm-max-card">
          <div class="big" id="big1rm">125 kg</div>
          <div class="sub">Estimated 1-Rep Max</div>
        </div>
        <div class="orm-formulas">
          <h3>📊 Formulas</h3>
          <div class="orm-formula-row"><span class="l">Epley</span><span class="v" id="f-epley">125</span></div>
          <div class="orm-formula-row"><span class="l">Brzycki</span><span class="v" id="f-brzycki">125</span></div>
          <div class="orm-formula-row"><span class="l">Lander</span><span class="v" id="f-lander">125</span></div>
          <div class="orm-formula-row"><span class="l">Lombardi</span><span class="v" id="f-lombardi">125</span></div>
          <div class="orm-formula-row avg"><span class="l">Average</span><span class="v" id="f-avg">125</span></div>
        </div>
      </div>
    </div>
    <div class="orm-zones">
      <h3>🎯 Training Zones</h3>
      <p class="orm-info" style="margin-top:0">Recommended working weights based on your 1RM, in <span id="unit-label">kg</span>.</p>
      <div class="orm-zones-grid" id="zones"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'One-Rep Max Calculator',
    toolDesc: 'Estimate your one-rep max (1RM) from any weight and rep count. Uses 4 proven formulas and shows training percentages for hypertrophy, strength and power programs.',
    step1: 'Enter the weight you lifted and how many reps you completed (1-10 reps is most accurate)',
    step2: 'Optionally enter your RPE (1-10) for a more precise estimate',
    step3: 'Read the average 1RM across Epley, Brzycki, Lander and Lombardi formulas',
    step4: 'Scroll to the Training Zones to see your working weights for each rep range',
  },
  zh: {
    toolTitle: '最大力量（1RM）计算器',
    toolDesc: '根据任意重量和次数估算你的最大力量（1RM）。使用 4 种经过验证的公式，并显示增肌、力量和爆发力训练的工作重量百分比。',
    step1: '输入你举起的重量和完成的次数（1-10 次最准确）',
    step2: '可选择输入 RPE（1-10）以获得更精确的估算',
    step3: '查看 Epley、Brzycki、Lander 和 Lombardi 公式的平均 1RM',
    step4: '向下滚动到训练分区，查看每个次数范围的工作重量',
  }
});

const { $, $$ } = GZ;
let unit = 'kg';

const ZONES = [
  { pct: 100, reps: 1, lbl: 'Max' },
  { pct: 95, reps: '1-2', lbl: 'Strength' },
  { pct: 90, reps: '2-4', lbl: 'Strength' },
  { pct: 85, reps: '4-6', lbl: 'Strength' },
  { pct: 80, reps: '6-8', lbl: 'Power' },
  { pct: 75, reps: '8-10', lbl: 'Power' },
  { pct: 70, reps: '10-12', lbl: 'Hypertrophy' },
  { pct: 65, reps: '12-15', lbl: 'Hypertrophy' },
  { pct: 60, reps: '15-20', lbl: 'Endurance' },
  { pct: 50, reps: '20+', lbl: 'Endurance' },
];

function calc() {
  const w = +$('#weight').value || 0;
  const r = Math.max(1, Math.min(20, +$('#reps').value || 1));
  const rpe = +$('#rpe').value;
  if (w === 0) return;

  // Standard formulas (for r=1, all formulas give w)
  const epley = r === 1 ? w : w * (1 + r / 30);
  const brzycki = r === 1 ? w : w * (36 / (37 - r));
  const lander = r === 1 ? w : w * (100 / (101.3 - 2.67123 * r));
  const lombardi = r === 1 ? w : w * Math.pow(r, 0.10);

  // RPE adjustment (if RPE < 10, account for "in reserve" reps)
  // Estimated reps in reserve: 10 - rpe
  const rir = rpe ? Math.max(0, 10 - rpe) : 0;
  const effectiveReps = r + rir;
  const epleyRpe = w * (1 + effectiveReps / 30);

  $('#f-epley').textContent = epley.toFixed(1) + ' ' + unit;
  $('#f-brzycki').textContent = brzycki.toFixed(1) + ' ' + unit;
  $('#f-lander').textContent = lander.toFixed(1) + ' ' + unit;
  $('#f-lombardi').textContent = lombardi.toFixed(1) + ' ' + unit;
  const avg = rpe ? epleyRpe : (epley + brzycki + lander + lombardi) / 4;
  $('#f-avg').textContent = avg.toFixed(1) + ' ' + unit;
  $('#big1rm').textContent = avg.toFixed(1) + ' ' + unit;

  $('#zones').innerHTML = ZONES.map(z => {
    const wt = (avg * z.pct / 100).toFixed(1);
    const rec = (z.pct === 80 || z.pct === 85) ? 'recommended' : '';
    return `<div class="orm-zone ${rec}">
      <div class="pct">${z.pct}%</div>
      <div class="wt">${wt} ${unit}</div>
      <div class="lbl">${z.reps} reps · ${z.lbl}</div>
    </div>`;
  }).join('');
  $('#unit-label').textContent = unit;
}

$('#weight').addEventListener('input', calc);
$('#reps').addEventListener('input', calc);
$('#rpe').addEventListener('input', calc);

document.querySelectorAll('.orm-unit button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.orm-unit button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    let w = +$('#weight').value;
    if (btn.dataset.u === 'kg' && unit === 'lb') w = w / 2.20462;
    else if (btn.dataset.u === 'lb' && unit === 'kg') w = w * 2.20462;
    unit = btn.dataset.u;
    $('#weight').value = w.toFixed(1);
    calc();
  });
});

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏃', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
    {icon:'💪', href:'/calc/body-fat.html', name:'Body Fat'},
    {icon:'🥗', href:'/calc/calorie-calculator.html', name:'Calorie Calculator'},
    {icon:'⏱️', href:'/calc/timer-stopwatch.html', name:'Timer & Stopwatch'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
