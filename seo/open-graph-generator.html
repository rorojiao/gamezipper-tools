<!DOCTYPE html>
<html lang="en">
<head>
<title>Open Graph Generator - Create OG & Twitter Card Tags | GameZipper Tools</title>
<meta name="description" content="Generate Open Graph and Twitter Card meta tags for landing pages, blog posts, product pages, and tools.">
<link rel="canonical" href="https://tools.gamezipper.com/seo/open-graph-generator.html">
<meta property="og:title" content="Open Graph Generator - Create OG & Twitter Card Tags | GameZipper Tools">
<meta property="og:description" content="Build clean social preview tags for Facebook, X, Discord, Slack, Telegram, and more.">
<meta property="og:url" content="https://tools.gamezipper.com/seo/open-graph-generator.html">
<meta property="og:type" content="website">
<meta property="og:image" content="https://tools.gamezipper.com/shared/og-image.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/shared/style.css">
<script src="/shared/i18n.js"></script>
<script src="/shared/common.js"></script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Open Graph Generator","description":"Generate Open Graph and Twitter Card tags for a URL.","url":"https://tools.gamezipper.com/seo/open-graph-generator.html","applicationCategory":"SEOApplication","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
</head>
<body>
<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:12px">
      <input id="titleInput" class="gz-input" placeholder="Preview title">
      <input id="urlInput" class="gz-input" placeholder="https://example.com/page">
      <input id="imageInput" class="gz-input" placeholder="https://example.com/preview.png">
      <input id="siteInput" class="gz-input" placeholder="Site name">
    </div>
    <textarea id="descInput" rows="4" style="width:100%;margin-bottom:12px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;color:var(--text)" placeholder="Social preview description"></textarea>
    <textarea id="output" readonly rows="14" style="width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;color:var(--text)"></textarea>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({en:{toolTitle:'Open Graph Generator',toolDesc:'Generate Open Graph and Twitter Card tags so your links look better on social media and chat apps.',step1:'Enter the title, URL, description, image URL, and site name.',step2:'Copy the generated tags into the head of your page.',step3:'Test the result with a social preview debugger after publishing.'},zh:{toolTitle:'Open Graph 生成器',toolDesc:'生成 Open Graph 和 Twitter Card 标签，让链接在社交平台和聊天工具里展示更好。',step1:'输入标题、URL、描述、图片地址和站点名。',step2:'复制生成代码到页面 head。',step3:'发布后再用预览调试工具验证。'}});
const {$,copyText,t}=GZ; const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function gen(){ const title=$('#titleInput').value.trim(), url=$('#urlInput').value.trim(), desc=$('#descInput').value.trim(), img=$('#imageInput').value.trim(), site=$('#siteInput').value.trim(); $('#output').value=[`<meta property="og:title" content="${esc(title)}">`,`<meta property="og:description" content="${esc(desc)}">`,`<meta property="og:url" content="${esc(url)}">`,`<meta property="og:type" content="website">`, img?`<meta property="og:image" content="${esc(img)}">`:'', site?`<meta property="og:site_name" content="${esc(site)}">`:'', `<meta name="twitter:card" content="summary_large_image">`,`<meta name="twitter:title" content="${esc(title)}">`,`<meta name="twitter:description" content="${esc(desc)}">`, img?`<meta name="twitter:image" content="${esc(img)}">`:'' ].filter(Boolean).join('\n'); }
function example(){ $('#titleInput').value='Best JSON Formatter Online'; $('#urlInput').value='https://tools.gamezipper.com/dev/json.html'; $('#descInput').value='Format, validate, and beautify JSON with syntax highlighting.'; $('#imageInput').value='https://tools.gamezipper.com/shared/og-image.png'; $('#siteInput').value='GameZipper Tools'; gen(); }
['titleInput','urlInput','descInput','imageInput','siteInput'].forEach(id=>$('#'+id).addEventListener('input',gen));
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="gen()">Generate</button><button class="gz-btn gz-btn-secondary" onclick="example()">${t('example')}</button><button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button><button class="gz-btn gz-btn-secondary" onclick="document.querySelectorAll('input,textarea').forEach(el=>el.value='');gen()">${t('clear')}</button>`;
GZ.renderToolPage({category:'seo',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3'],related:[{icon:'🏷️',href:'/seo/meta-tag-generator.html',name:'Meta Tag Generator'},{icon:'🤖',href:'/seo/robots-txt-generator.html',name:'Robots.txt Generator'},{icon:'📝',href:'/social/og-meta.html',name:'OG Meta Generator'}]});
example();
</script>
<script>new Image().src="https://site-analytics.cap.1ktower.com/hit?s=tools.gamezipper.com&p="+encodeURIComponent(location.pathname);</script>
</body>
</html>
