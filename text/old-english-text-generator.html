<script>
GZI18n.register({
  en: {
    toolTitle: 'Old English Text Generator',
    toolDesc: 'Convert plain text to 𝔒𝔩𝔡 𝔈𝔫𝔤𝔩𝔦𝔰𝔥 Fraktur blackletter or 𝕰𝕝𝕕 𝕰𝕟𝕘𝕝𝕚𝕤𝕙 bold gothic Unicode styles. Copy & paste medieval-looking text for Instagram, Twitter, Discord, tattoos and usernames.',
    inputLabel: 'Your Text',
    outputLabel: 'Old English Text',
    oldEnglish: 'Old English',
    boldOldEnglish: 'Bold Old English',
    step1: 'Type or paste the text you want to convert to Old English / blackletter',
    step2: 'Choose a style: regular Old English or Bold Old English',
    step3: 'Click Copy and paste it into your post, caption, username or tattoo design',
  },
  zh: {
    toolTitle: '古英语文字生成器',
    toolDesc: '将普通文字转换为 𝔒𝔩𝔡 𝔈𝔫𝔤𝔩𝔦𝔰𝔥 哥特体（Fraktur 黑体）或 𝕰𝕝𝕕 𝕰𝕟𝕘𝕝𝕚𝕤𝕙 粗哥特 Unicode 样式。复制粘贴到 Instagram、Twitter、Discord、纹身设计和用户名。',
    inputLabel: '输入文本',
    outputLabel: '古英语文字',
    oldEnglish: '古英语体',
    boldOldEnglish: '粗古英语体',
    step1: '输入或粘贴要变古英语体的文字',
    step2: '选择样式：常规古英语或粗古英语',
    step3: '点击复制，粘贴到帖子、文案、用户名或纹身设计',
  }
});

const { $, copyText, t } = GZ;

// Fraktur family — same as Fraktur generator but bundled here as "Old English"
const STYLES = {
  oldEnglish: {
    upper: 0x1D504, lower: 0x1D51E, digit: null,
    upperExc: { 0x43: 0x212D, 0x48: 0x210C, 0x49: 0x2111, 0x52: 0x211C, 0x5A: 0x2128 }
  },
  boldOldEnglish: { upper: 0x1D56C, lower: 0x1D586, digit: null },
};

function stylize(text, key) {
  const s = STYLES[key];
  if (!s) return text;
  let out = '';
  for (const ch of text) {
    const code = ch.codePointAt(0);
    if (code >= 0x41 && code <= 0x5A) {
      if (s.upperExc && s.upperExc[code]) out += String.fromCodePoint(s.upperExc[code]);
      else out += String.fromCodePoint(code - 0x41 + s.upper);
    } else if (code >= 0x61 && code <= 0x7A) {
      out += String.fromCodePoint(code - 0x61 + s.lower);
    } else {
      out += ch;
    }
  }
  return out;
}

let currentStyle = 'oldEnglish';

function processText() {
  const text = $('#input').value;
  if (!text) { $('#output').textContent = ''; return; }
  $('#output').textContent = stylize(text, currentStyle);
}

$('#input').addEventListener('input', processText);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="setStyle('oldEnglish',this)">${t('oldEnglish')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setStyle('boldOldEnglish',this)">${t('boldOldEnglish')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').textContent=''">${t('clear')}</button>`;

function setStyle(key, btn) {
  currentStyle = key;
  processText();
  btn.parentElement.querySelectorAll('.gz-btn').forEach(b => {
    b.classList.remove('gz-btn-active');
    b.classList.add('gz-btn-secondary');
  });
  btn.classList.add('gz-btn-active');
  btn.classList.remove('gz-btn-secondary');
}

$('#input').value = 'Old English';
processText();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',

    {icon:'✨', href:'/text/fancy-text.html', name:'Fancy Text'},
  ]
});
</script>
