const { $, copyText, t } = GZ;
let delimiter = 'newline';
let customDelim = '|';

function getDelimiter() {
  switch(delimiter) {
    case 'newline': return '\n';
    case 'comma': return ',';
    case 'semicolon': return ';';
    case 'tab': return '\t';
    case 'custom': return customDelim || '|';
    default: return '\n';
  }
}

// Cryptographically secure random in [0, max)
function secureRandom(max) {
  if (max <= 0) return 0;
  const maxUint32 = 0xFFFFFFFF;
  const limit = maxUint32 - (maxUint32 % max);
  const arr = new Uint32Array(1);
  let r;
  do {
    crypto.getRandomValues(arr);
    r = arr[0];
  } while (r >= limit);
  return r % max;
}

function fisherYates(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = secureRandom(i + 1);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function doShuffle() {
  const inp = $('#input').value;
  if (!inp.trim()) { $('#output').textContent = ''; $('#stat').textContent = ''; return; }
  const del = getDelimiter();
  let items = inp.split(del);
  const inCount = items.length;
  const removeDup = document.getElementById('opt-rd').checked;
  const trim = document.getElementById('opt-trim').checked;
  const dropEmpty = document.getElementById('opt-de').checked;
  if (trim) items = items.map(s => s.trim());
  if (dropEmpty) items = items.filter(s => s.length > 0);
  let dupRemoved = 0;
  if (removeDup) {
    const seen = new Set();
    const unique = [];
    items.forEach(s => { if (!seen.has(s)) { seen.add(s); unique.push(s); } else dupRemoved++; });
    items = unique;
  }
  if (items.length === 0) { $('#output').textContent = ''; $('#stat').textContent = ''; return; }
  fisherYates(items);
  $('#output').textContent = items.join(del);
  let statMsg = `${t('statIn')}: ${inCount} ${t('statItems')} → ${t('statOut')}: ${items.length} ${t('statItems')}`;
  if (dupRemoved > 0) statMsg += ` (${dupRemoved} ${t('statRemoved')})`;
  $('#stat').textContent = statMsg;
}

function loadExample() {
  $('#input').value = 'Alice\nBob\nCharlie\nDiana\nEve\nFrank\nGrace\nHenry\nIvy\nJack\nKevin\nLily';
  doShuffle();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#stat').textContent = ''; }

$('#toolbar').innerHTML = `

  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText(document.getElementById('output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

      <option value="tab">${t('optTab')}</option>
      <option value="custom">${t('optCustom')}</option>
    </select>
  </label>
  <input type="text" id="custom-delim" value="|" style="width:60px;padding:4px 6px;border:1px solid var(--gz-border);border-radius:4px;background:var(--gz-bg);color:inherit;display:none">
  <label><input type="checkbox" id="opt-rd" checked> ${t('optRemoveDup')}</label>
  <label><input type="checkbox" id="opt-trim" checked> ${t('optTrim')}</label>
  <label><input type="checkbox" id="opt-de" checked> ${t('optDropEmpty')}</label>`;

document.getElementById('delim-sel').addEventListener('change', e => {
  delimiter = e.target.value;
  document.getElementById('custom-delim').style.display = delimiter === 'custom' ? 'inline-block' : 'none';
  doShuffle();
});
document.getElementById('custom-delim').addEventListener('input', e => { customDelim = e.target.value; doShuffle(); });
['opt-rd','opt-trim','opt-de'].forEach(id => document.getElementById(id).addEventListener('change', doShuffle));
