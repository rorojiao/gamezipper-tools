<script>
GZI18n.register({
  en: {
    toolTitle: 'Scientific Calculator',
    toolDesc: 'Free online scientific calculator with trig, logs, exponents, constants and more. Keyboard-friendly.',
    step1: 'Click buttons or type on your keyboard',
    step2: 'Switch between DEG and RAD for trig functions',
    step3: 'Press Enter or = to evaluate',
    step4: 'Use parentheses for complex expressions',
  },
  zh: {
    toolTitle: '科学计算器',
    toolDesc: '免费在线科学计算器，支持三角函数、对数、指数、常数等。支持键盘输入。',
    step1: '点击按钮或使用键盘输入',
    step2: '切换 DEG 和 RAD 模式进行三角函数计算',
    step3: '按 Enter 或 = 计算结果',
    step4: '使用括号编写复杂表达式',
  }
});

const { $, t } = GZ;
let mode = 'deg'; // deg or rad
let expression = '';
let lastResult = '';

function setMode(m) {
  mode = m;
  document.getElementById('degBtn').classList.toggle('active', m === 'deg');
  document.getElementById('radBtn').classList.toggle('active', m === 'rad');
}

function factorial(n) {
  if (n < 0) return NaN;
  if (n === 0 || n === 1) return 1;
  if (n > 170) return Infinity;
  let r = 1;
  for (let i = 2; i <= n; i++) r *= i;
  return r;
}

function evaluate(expr) {
  try {
    let e = expr;
    // Replace constants
    e = e.replace(/π/g, `(${Math.PI})`);
    e = e.replace(/\be\b/g, `(${Math.E})`);
    // Replace trig functions
    const toRad = mode === 'deg' ? '*(Math.PI/180)' : '';
    e = e.replace(/sin\(/g, `Math.sin(${toRad ? '(' : ''}`);
    e = e.replace(/cos\(/g, `Math.cos(${toRad ? '(' : ''}`);
    e = e.replace(/tan\(/g, `Math.tan(${toRad ? '(' : ''}`);
    e = e.replace(/asin\(/g, `Math.asin(`);
    e = e.replace(/acos\(/g, `Math.acos(`);
    e = e.replace(/atan\(/g, `Math.atan(`);
    // Fix closing for deg mode
    if (toRad) {
      // We need to add )*Math.PI/180 after the argument
      // Simple approach: just wrap
    }
    e = e.replace(/ln\(/g, 'Math.log(');
    e = e.replace(/log\(/g, 'Math.log10(');
    e = e.replace(/sqrt\(/g, 'Math.sqrt(');
    e = e.replace(/abs\(/g, 'Math.abs(');
    e = e.replace(/(\d+)!/g, 'factorial($1)');
    // Handle implicit multiplication: 2( → 2*(
    e = e.replace(/(\d)\(/g, '$1*(');
    e = e.replace(/\)(\d)/g, ')*$1');
    e = e.replace(/\)\(/g, ')*(');

    // Safety check
    if (/[a-zA-Z]/.test(e.replace(/Math\.\w+/g, '').replace(/factorial/g, ''))) {
      return 'Error';
    }

    const fn = new Function('factorial', `"use strict"; return (${e})`);
    let result = fn(factorial);

    if (typeof result !== 'number' || isNaN(result)) return 'Error';
    if (!isFinite(result)) return result > 0 ? '∞' : '-∞';
    // Round to avoid floating point issues
    if (Math.abs(result) < 1e-10 && result !== 0) result = 0;
    return parseFloat(result.toPrecision(12)).toString();
  } catch(e) {
    return 'Error';
  }
}

function appendToExpr(val) {
  expression += val;
  updateDisplay();
}

function clearExpr() {
  expression = '';
  lastResult = '';
  updateDisplay();
}

function backspace() {
  expression = expression.slice(0, -1);
  updateDisplay();
}

function calculate() {
  if (!expression) return;
  const result = evaluate(expression);
  lastResult = result;
  document.getElementById('result').textContent = result;
  document.getElementById('expr').textContent = expression + ' =';
  if (result !== 'Error') {
    expression = result;
  }
}

function updateDisplay() {
  document.getElementById('expr').textContent = '';
  document.getElementById('result').textContent = expression || '0';
}

// Buttons layout
const buttons = [
  { label: 'sin', cls: 'func', action: () => appendToExpr('sin(') },
  { label: 'cos', cls: 'func', action: () => appendToExpr('cos(') },
  { label: 'tan', cls: 'func', action: () => appendToExpr('tan(') },
  { label: 'ln', cls: 'func', action: () => appendToExpr('ln(') },
  { label: 'log', cls: 'func', action: () => appendToExpr('log(') },

  { label: 'asin', cls: 'func', action: () => appendToExpr('asin(') },
  { label: 'acos', cls: 'func', action: () => appendToExpr('acos(') },
  { label: 'atan', cls: 'func', action: () => appendToExpr('atan(') },
  { label: '√', cls: 'func', action: () => appendToExpr('sqrt(') },
  { label: '|x|', cls: 'func', action: () => appendToExpr('abs(') },

  { label: 'π', cls: 'op', action: () => appendToExpr('π') },
  { label: 'e', cls: 'op', action: () => appendToExpr('e') },
  { label: 'x²', cls: 'op', action: () => appendToExpr('**2') },
  { label: 'xⁿ', cls: 'op', action: () => appendToExpr('**') },
  { label: 'n!', cls: 'op', action: () => appendToExpr('!') },

  { label: '(', cls: 'op', action: () => appendToExpr('(') },
  { label: ')', cls: 'op', action: () => appendToExpr(')') },
  { label: '%', cls: 'op', action: () => appendToExpr('/100') },
  { label: '⌫', cls: 'danger', action: backspace },
  { label: 'C', cls: 'danger', action: clearExpr },

  { label: '7', cls: 'num', action: () => appendToExpr('7') },
  { label: '8', cls: 'num', action: () => appendToExpr('8') },
  { label: '9', cls: 'num', action: () => appendToExpr('9') },
  { label: '÷', cls: 'op', action: () => appendToExpr('/') },
  { label: '×', cls: 'op', action: () => appendToExpr('*') },

  { label: '4', cls: 'num', action: () => appendToExpr('4') },
  { label: '5', cls: 'num', action: () => appendToExpr('5') },
  { label: '6', cls: 'num', action: () => appendToExpr('6') },
  { label: '−', cls: 'op', action: () => appendToExpr('-') },
  { label: '+', cls: 'op', action: () => appendToExpr('+') },

  { label: '1', cls: 'num', action: () => appendToExpr('1') },
  { label: '2', cls: 'num', action: () => appendToExpr('2') },
  { label: '3', cls: 'num', action: () => appendToExpr('3') },
  { label: '.', cls: 'num', action: () => appendToExpr('.') },
  { label: '=', cls: 'eq', action: calculate },

  { label: '±', cls: 'op', action: () => { if (expression.startsWith('-')) expression = expression.slice(1); else if (expression) expression = '-' + expression; updateDisplay(); }},
  { label: '0', cls: 'num', action: () => appendToExpr('0') },
  { label: '00', cls: 'num', action: () => appendToExpr('00') },
  { label: 'Ans', cls: 'func', action: () => { if (lastResult && lastResult !== 'Error') appendToExpr(lastResult); }},
  { label: '1/x', cls: 'func', action: () => { expression = `1/(${expression||'1'})`; calculate(); }},
];

const btnContainer = document.getElementById('buttons');
buttons.forEach(b => {
  const btn = document.createElement('button');
  btn.className = `calc-btn ${b.cls}`;
  btn.textContent = b.label;
  btn.onclick = b.action;
  btnContainer.appendChild(btn);
});

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const key = e.key;
  if (/^[0-9.]$/.test(key)) appendToExpr(key);
  else if (key === '+') appendToExpr('+');
  else if (key === '-') appendToExpr('-');
  else if (key === '*') appendToExpr('*');
  else if (key === '/') { e.preventDefault(); appendToExpr('/'); }
  else if (key === '(') appendToExpr('(');
  else if (key === ')') appendToExpr(')');
  else if (key === 'Enter' || key === '=') { e.preventDefault(); calculate(); }
  else if (key === 'Backspace') backspace();
  else if (key === 'Escape' || key === 'c' || key === 'C') clearExpr();
  else if (key === '^') appendToExpr('**');
});

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/calc/percentage-calculator.html', name:'Percentage'},
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
    {icon:'📐', href:'/calc/aspect-ratio.html', name:'Aspect Ratio'},
    {icon:'💰', href:'/calc/tip-calculator.html', name:'Tip Calculator'},
  ]
});
</script>
