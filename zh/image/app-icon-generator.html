<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div id="dropZone" class="drop-zone">
      <div style="font-size:3rem">📱</div>

    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"><\/script>
<script>
GZI18n.register({
  en: {
    toolTitle: 'App Icon Generator',
    toolDesc: 'Generate app icons for iOS, Android, PWA, favicon and macOS in all required sizes from one image. Free, private, runs in your browser.',
    dropLabel: 'Drag & drop an image here, or click to select',
    paddingLabel: 'Padding:',
    roundLabel: 'Round Corners:',
    downloadAllBtn: '📦 Download All as ZIP',
    downloadSingle: 'Click to download',
    iosTitle: '🍎 iOS Icons',
    androidTitle: '🤖 Android Icons',
    pwaTitle: '📱 PWA Manifest Icons',
    faviconTitle: '🌐 Favicon',
    macosTitle: '💻 macOS Icons',
    step1: 'Upload a square image (512×512 or larger recommended)',
    step2: 'Adjust padding and corner rounding',
    step3: 'Preview all generated icon sizes',
    step4: 'Download all as ZIP or individual PNGs',
  },
  zh: {
    toolTitle: 'App 图标生成器',
    toolDesc: '从一张图片生成 iOS、Android、PWA、Favicon 和 macOS 所需的所有尺寸图标。免费、私密，浏览器本地处理。',
    dropLabel: '拖拽图片到此处，或点击选择',
    paddingLabel: '内边距：',
    roundLabel: '圆角：',
    downloadAllBtn: '📦 下载全部 ZIP',
    downloadSingle: '点击下载',
    iosTitle: '🍎 iOS 图标',
    androidTitle: '🤖 Android 图标',
    pwaTitle: '📱 PWA 图标',
    faviconTitle: '🌐 Favicon',
    macosTitle: '💻 macOS 图标',
    step1: '上传一张正方形图片（建议 512×512 或更大）',
    step2: '调整内边距和圆角',
    step3: '预览所有生成的图标尺寸',
    step4: '下载全部为 ZIP 或单独 PNG',
  }
});

const { $, t } = GZ;
let sourceImg = null;
let padding = 0;
let rounding = 0;

const SIZES = {
  ios: [20, 29, 40, 58, 60, 76, 80, 87, 120, 152, 167, 180, 1024],
  android: [36, 48, 72, 96, 144, 192],
  pwa: [48, 72, 96, 144, 192, 256, 384, 512],
  favicon: [16, 32, 48, 64],
  macos: [16, 32, 64, 128, 256, 512, 1024]
};

$('#dropLabel').textContent = t('dropLabel');
$('#paddingLabel').textContent = t('paddingLabel');
$('#roundLabel').textContent = t('roundLabel');
$('#downloadAllBtn').textContent = t('downloadAllBtn');

const dropZone = $('#dropZone');
const fileInput = $('#fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); if(e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if(fileInput.files.length) handleFile(fileInput.files[0]); });

function handleFile(file) {
  const img = new Image();
  img.onload = () => {
    sourceImg = img;
    dropZone.style.display = 'none';
    $('#editorSection').style.display = 'block';
    $('#imageInfo').textContent = `${file.name} · ${img.width}×${img.height}`;
    renderPreview();
    renderAllSizes();
  };
  img.src = URL.createObjectURL(file);
}

function renderIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const c = canvas.getContext('2d');
  const pad = padding / 100 * size;
  const inner = size - pad * 2;
  const r = rounding / 100 * inner / 2;

  if(r > 0) {
    c.beginPath();
    c.moveTo(pad + r, pad);
    c.lineTo(pad + inner - r, pad);
    c.quadraticCurveTo(pad + inner, pad, pad + inner, pad + r);
    c.lineTo(pad + inner, pad + inner - r);
    c.quadraticCurveTo(pad + inner, pad + inner, pad + inner - r, pad + inner);
    c.lineTo(pad + r, pad + inner);
    c.quadraticCurveTo(pad, pad + inner, pad, pad + inner - r);
    c.lineTo(pad, pad + r);
    c.quadraticCurveTo(pad, pad, pad + r, pad);
    c.closePath();
    c.clip();
  }

  c.drawImage(sourceImg, pad, pad, inner, inner);
  return canvas;
}

function renderPreview() {
  if(!sourceImg) return;
  const preview = renderIcon(128);
  const pCtx = $('#previewCanvas').getContext('2d');
  pCtx.clearRect(0, 0, 128, 128);
  pCtx.drawImage(preview, 0, 0);
}

function renderAllSizes() {
  if(!sourceImg) return;
  const sections = $('#iconSections');
  sections.innerHTML = '';

  const platforms = [
    { key: 'ios', title: t('iosTitle') },
    { key: 'android', title: t('androidTitle') },
    { key: 'pwa', title: t('pwaTitle') },
    { key: 'favicon', title: t('faviconTitle') },
    { key: 'macos', title: t('macosTitle') },
  ];

  platforms.forEach(p => {
    const section = document.createElement('div');
    section.className = 'platform-section';
    section.innerHTML = `<div class="platform-title">${p.title}</div>`;
    const grid = document.createElement('div');
    grid.className = 'icon-grid';
    SIZES[p.key].forEach(size => {
      const iconCanvas = renderIcon(size);
      const card = document.createElement('div');
      card.className = 'icon-card';
      card.title = t('downloadSingle');
      // Create a small preview
      const preview = document.createElement('canvas');
      const displaySize = Math.min(64, size);
      preview.width = displaySize;
      preview.height = displaySize;
      preview.style.width = displaySize + 'px';
      preview.style.height = displaySize + 'px';
      preview.getContext('2d').drawImage(iconCanvas, 0, 0, displaySize, displaySize);
      card.appendChild(preview);
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = `${size}×${size}`;
      card.appendChild(label);
      card.onclick = () => {
        const a = document.createElement('a');
        a.href = iconCanvas.toDataURL('image/png');
        a.download = `icon_${size}x${size}.png`;
        a.click();
      };
      grid.appendChild(card);
    });
    section.appendChild(grid);
    sections.appendChild(section);
  });
}

function updatePadding() {
  padding = parseInt($('#paddingSlider').value);
  $('#paddingValue').textContent = padding + '%';
  renderPreview();
  renderAllSizes();
}

function updateRounding() {
  rounding = parseInt($('#roundSlider').value);
  $('#roundValue').textContent = rounding + '%';
  renderPreview();
  renderAllSizes();
}

async function downloadAll() {
  if(!sourceImg) return;
  const zip = new JSZip();
  const folders = {
    ios: zip.folder('iOS'),
    android: zip.folder('Android'),
    pwa: zip.folder('PWA'),
    favicon: zip.folder('Favicon'),
    macos: zip.folder('macOS'),
  };
  for(const [key, sizes] of Object.entries(SIZES)) {
    for(const size of sizes) {
      const canvas = renderIcon(size);
      const dataUrl = canvas.toDataURL('image/png');
      const base64 = dataUrl.split(',')[1];
      folders[key].file(`icon_${size}x${size}.png`, base64, { base64: true });
    }
  }
  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'app-icons.zip';
  a.click();
}

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="resetTool()">${t('clear')}</button>`;
function resetTool() {
  sourceImg = null; padding = 0; rounding = 0;
  $('#paddingSlider').value = 0;
  $('#roundSlider').value = 0;
  $('#paddingValue').textContent = '0%';
  $('#roundValue').textContent = '0%';
  dropZone.style.display = 'block';
  $('#editorSection').style.display = 'none';
  fileInput.value = '';
}

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⭐', href:'/image/favicon-generator.html', name:'Favicon Generator'},
    {icon:'👤', href:'/image/avatar-generator.html', name:'Avatar Generator'},
    {icon:'🖼️', href:'/image/resizer.html', name:'Image Resizer'},
    {icon:'📱', href:'/image/social-media-resizer.html', name:'Social Resizer'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
