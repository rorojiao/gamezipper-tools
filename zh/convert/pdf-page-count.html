<script>

  },

    toolDesc: '统计 PDF 页数并读取元数据 — 标题、作者、主题、关键词、页面大小、创建日期。纯浏览器本地运行，无需上传、无需注册。',
    chooseFile: '拖入或选择 PDF 文件以分析',

    meta: '文档元数据',

    lblAuthor: '作者',

    lblCreator: '创建程序',

    lblCreated: '创建时间',
    lblModified: '修改时间',
    lblUnique: '独立页面尺寸',
    lblMin: '最小页面',
    lblMax: '最大页面',
    lblAvg: '平均页面',
    lblOrient: '方向',
    empty: '(未设置)',
    portrait: '纵向', landscape: '横向', mixed: '混合',
    copyJson: '复制为 JSON',
    copied: '已复制为 JSON！',
    noFile: '请先选择 PDF 文件。',
    error: '错误：',
    encrypted: '⚠️ 此 PDF 受密码保护。请先使用「PDF 解锁」移除密码。',
    step1: '拖入或选择 PDF 文件',
    step2: '工具即时读取页数和元数据',
    step3: '查看页数、页面尺寸和文档信息',
    step4: '如有需要可复制结果为 JSON',
  }
});

const { $, t, copyText } = GZ;
let currentFile = null, currentJSON = null;

$('#dropLabel').textContent = t('chooseFile');
$('#dropInfo').textContent = t('info');
$('#encrypted').textContent = t('encrypted');

const drop = $('#drop');
drop.addEventListener('click', () => $('#file').click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('dragover'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
$('#file').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function fmtDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleString(); } catch (e) { return String(d); }
}
function fmtBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(2) + ' KB';
  return (n / 1024 / 1024).toFixed(2) + ' MB';
}
function ptToMm(pt) { return (pt * 25.4 / 72).toFixed(1); }
function ptToIn(pt) { return (pt / 72).toFixed(2); }
function isLandscape(w, h) { return w > h; }
function orientLabel(w, h, lang) { return isLandscape(w, h) ? t('landscape') : t('portrait'); }

async function handleFile(f) {
  if (!f || f.type !== 'application/pdf') { return; }
  currentFile = f;
  currentJSON = null;
  $('#encrypted').style.display = 'none';
  $('#results').style.display = 'none';
  drop.querySelector('.icon').textContent = '📄';
  $('#dropLabel').textContent = f.name;
  $('#dropInfo').textContent = (f.size / 1024).toFixed(1) + ' KB';
  try {
    const bytes = await f.arrayBuffer();
    let doc;
    try {
      doc = await PDFLib.PDFDocument.load(bytes);
    } catch (e) {
      // Likely encrypted
      $('#encrypted').style.display = 'block';
      return;
    }
    renderResults(doc, bytes.byteLength);
  } catch (e) {
    alert(t('error') + e.message);
  }
}

function renderResults(doc, fileSize) {
  const pageCount = doc.getPageCount();
  const pages = [];
  let totalW = 0, totalH = 0;
  const sizes = new Map();
  for (let i = 0; i < pageCount; i++) {
    const p = doc.getPage(i);
    const { width, height } = p.getSize();
    pages.push({ w: width, h: height });
    totalW += width; totalH += height;
    const key = width.toFixed(1) + 'x' + height.toFixed(1);
    sizes.set(key, (sizes.get(key) || 0) + 1);
  }
  const minW = Math.min(...pages.map(p => p.w));
  const minH = pages.find(p => p.w === minW).h;
  const maxW = Math.max(...pages.map(p => p.w));
  const maxH = pages.find(p => p.w === maxW).h;
  const avgW = totalW / pageCount;
  const avgH = totalH / pageCount;
  const isAllLandscape = pages.every(p => p.w > p.h);
  const isAllPortrait = pages.every(p => p.w <= p.h);
  const orient = isAllLandscape ? t('landscape') : (isAllPortrait ? t('portrait') : t('mixed'));
  const title = doc.getTitle() || '';
  const author = doc.getAuthor() || '';
  const subject = doc.getSubject() || '';
  const keywords = (doc.getKeywords && doc.getKeywords()) || '';
  const creator = doc.getCreator() || '';
  const producer = doc.getProducer() || '';
  const createdAt = doc.getCreationDate() || '';
  const modifiedAt = doc.getModificationDate() || '';

  $('#summary').innerHTML = `
    <div class="pc-stat"><div class="val">${pageCount}</div><div class="lbl">${t('lblPages')}</div></div>
    <div class="pc-stat"><div class="val">${fmtBytes(fileSize)}</div><div class="lbl">${t('lblSize')}</div></div>
    <div class="pc-stat"><div class="val">${sizes.size}</div><div class="lbl">${t('lblUnique')}</div></div>
    <div class="pc-stat"><div class="val">${orient}</div><div class="lbl">${t('lblOrient')}</div></div>
  `;

  function row(k, v) {
    if (!v) return `<div class="pc-row"><div class="k">${k}</div><div class="v empty">${t('empty')}</div></div>`;
    return `<div class="pc-row"><div class="k">${k}</div><div class="v">${esc(v)}</div></div>`;
  }
  $('#meta').innerHTML = `
    ${row(t('lblTitle'), title)}
    ${row(t('lblAuthor'), author)}
    ${row(t('lblSubject'), subject)}
    ${row(t('lblKeywords'), keywords)}
    ${row(t('lblCreator'), creator)}
    ${row(t('lblProducer'), producer)}
    ${row(t('lblCreated'), fmtDate(createdAt))}
    ${row(t('lblModified'), fmtDate(modifiedAt))}
  `;

  const sizesHtml = Array.from(sizes.entries()).map(([k, cnt]) => {
    const [w, h] = k.split('x').map(Number);
    return `<div class="pc-row"><div class="k">${w.toFixed(1)} × ${h.toFixed(1)} pt</div><div class="v">${ptToMm(w)} × ${ptToMm(h)} mm · ${ptToIn(w)} × ${ptToIn(h)} in · <b>${orientLabel(w, h)}</b> · <b>${cnt}</b> page${cnt>1?'s':''}</div></div>`;
  }).join('');
  $('#pages').innerHTML = sizesHtml || '<div class="v empty">' + t('empty') + '</div>';

  $('#stats').innerHTML = `
    <div><b>${t('lblMin')}:</b> ${minW.toFixed(1)} × ${minH.toFixed(1)} pt (${ptToMm(minW)} × ${ptToMm(minH)} mm)</div>
    <div><b>${t('lblMax')}:</b> ${maxW.toFixed(1)} × ${maxH.toFixed(1)} pt (${ptToMm(maxW)} × ${ptToMm(maxH)} mm)</div>
    <div><b>${t('lblAvg')}:</b> ${avgW.toFixed(1)} × ${avgH.toFixed(1)} pt (${ptToMm(avgW)} × ${ptToMm(avgH)} mm)</div>
    <div><b>${t('lblVersion')}:</b> 1.x</div>
  `;

  currentJSON = {
    file: currentFile.name,
    fileSize,
    pageCount,
    uniquePageSizes: Array.from(sizes.entries()).map(([k, cnt]) => {
      const [w, h] = k.split('x').map(Number);
      return { widthPt: w, heightPt: h, widthMm: +ptToMm(w), heightMm: +ptToMm(h), widthIn: +ptToIn(w), heightIn: +ptToIn(h), count: cnt };
    }),
    orientation: orient,
    metadata: { title, author, subject, keywords, creator, producer, createdAt, modifiedAt }
  };
  $('#results').style.display = 'block';
}

function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function copyJSON() {
  if (!currentJSON) return;
  copyText(JSON.stringify(currentJSON, null, 2));
}

function clearAll() {
  currentFile = null; currentJSON = null;
  $('#file').value = '';
  drop.querySelector('.icon').textContent = '🔍';
  $('#dropLabel').textContent = t('chooseFile');
  $('#dropInfo').textContent = t('info');
  $('#results').style.display = 'none';
  $('#encrypted').style.display = 'none';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyJSON()" id="copyBtn">${t('copyJson')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>
`;

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔒', href:'/convert/pdf-password-protect.html', name:'PDF Password Protector'},
    {icon:'🔓', href:'/convert/pdf-unlock.html', name:'PDF Unlock'},
    {icon:'🔗', href:'/convert/pdf-merger.html', name:'PDF Merger'},
    {icon:'✂️', href:'/convert/pdf-splitter.html', name:'PDF Splitter'},
  ]
});
</script>
