<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What are CSS container queries?", "acceptedAnswer": {"@type": "Answer", "text": "CSS container queries let you style elements based on the size of their parent container rather than the viewport. This enables truly responsive components that adapt to wherever they are placed."}}, {"@type": "Question", "name": "How do container queries differ from media queries?", "acceptedAnswer": {"@type": "Answer", "text": "Media queries respond to the viewport size, while container queries respond to the size of a parent container. This makes container queries ideal for reusable components that may appear in different layout contexts."}}, {"@type": "Question", "name": "What is container-type?", "acceptedAnswer": {"@type": "Answer", "text": "The container-type CSS property defines a containment context. Use inline-size for width-based queries, size for both width and height, or normal for no containment."}}, {"@type": "Question", "name": "Is browser support available for container queries?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. CSS container queries are supported in all modern browsers including Chrome 105+, Firefox 110+, Safari 16+, and Edge 105+."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="controls-row">
      <label id="lbl-ctype"></label>
      <select id="container-type">
        <option value="inline-size">inline-size</option>
        <option value="size">size</option>
        <option value="normal">normal</option>
      </select>
      <label id="lbl-cname"></label>
      <input id="container-name" value="card" style="width:120px">
      <label id="lbl-cols"></label>
      <input id="columns" type="number" value="3" min="1" max="6" style="width:60px">
    </div>
    <div class="breakpoints" id="breakpoints"></div>
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-split">
      <div><label id="lbl-out"></label><div class="gz-output" id="output"></div></div>
      <div><label id="lbl-prev"></label>
        <div class="preview-container" id="preview-box">
          <div class="preview-inner" id="preview-inner">
            <div class="preview-card">📦 Card 1</div>
            <div class="preview-card">📦 Card 2</div>
            <div class="preview-card">📦 Card 3</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Container Query Generator',
    toolDesc: 'Generate CSS container queries with live preview. Build responsive components that adapt to their container size.',
    containerType: 'Container Type:',
    containerName: 'Container Name:',
    columns: 'Columns:',
    breakpoints: 'Breakpoints',
    minWidth: 'Min Width (px)',
    styleLabel: 'CSS Rule',
    addBreakpoint: '+ Breakpoint',
    output: 'Generated CSS',
    preview: 'Live Preview (drag to resize)',
    step1: 'Set the container type and name',
    step2: 'Add breakpoints with min-width conditions and CSS rules',
    step3: 'Resize the preview container to see the layout change',
    step4: 'Copy the generated CSS code for your project',
  },
  zh: {
    toolTitle: 'CSS Container Query 生成器',
    toolDesc: '生成 CSS 容器查询并实时预览。构建根据容器尺寸自适应的响应式组件。',
    containerType: '容器类型：',
    containerName: '容器名称：',
    columns: '列数：',
    breakpoints: '断点',
    minWidth: '最小宽度 (px)',
    styleLabel: 'CSS 规则',
    addBreakpoint: '+ 断点',
    output: '生成的 CSS',
    preview: '实时预览（拖拽调整宽度）',
    step1: '设置容器类型和名称',
    step2: '添加断点，设置最小宽度条件和 CSS 规则',
    step3: '拖动预览区域调整大小，观察布局变化',
    step4: '复制生成的 CSS 代码到你的项目',
  }
});

const { $, copyText, t } = GZ;
let bps = [
  { min: 0, css: 'grid-template-columns: 1fr;' },
  { min: 400, css: 'grid-template-columns: 1fr 1fr;' },
  { min: 700, css: 'grid-template-columns: 1fr 1fr 1fr;' },
];

function renderBreakpoints() {
  $('#breakpoints').innerHTML = bps.map((bp, i) => `<div class="bp-row">
    <span style="font-size:.8rem;color:var(--accent);min-width:24px">${i+1}.</span>
    <input type="number" value="${bp.min}" data-i="${i}" data-f="min" min="0" style="width:90px" placeholder="${t('minWidth')}">
    <input type="text" value="${bp.css}" data-i="${i}" data-f="css" style="flex:1" placeholder="${t('styleLabel')}">
    <button onclick="removeBp(${i})">✕</button>
  </div>`).join('');
  generate();
}

$('#breakpoints').addEventListener('input', e => {
  const i = +e.target.dataset.i, f = e.target.dataset.f;
  if (f === 'min') bps[i].min = +e.target.value;
  else if (f === 'css') bps[i].css = e.target.value;
  generate();
});

window.removeBp = i => { if (bps.length > 1) { bps.splice(i, 1); renderBreakpoints(); } };

function generate() {
  const ctype = $('#container-type').value;
  const cname = $('#container-name').value;
  const cols = +$('#columns').value;
  let css = `.container {\n  container-type: ${ctype};`;
  if (cname) css += `\n  container-name: ${cname};`;
  css += `\n}\n\n`;

  const sorted = [...bps].sort((a, b) => a.min - b.min);
  sorted.forEach(bp => {
    if (bp.min > 0) {
      css += `@container ${cname ? cname + ' ' : ''}(min-width: ${bp.min}px) {\n`;
    } else {
      css += `/* Default — no container query needed */\n`;
    }
    css += `  .inner {\n    ${bp.css}\n  }\n`;
    if (bp.min > 0) css += `}\n\n`;
    else css += `\n`;
  });

  $('#output').textContent = css;

  // Update preview
  const inner = $('#preview-inner');
  inner.style.display = 'grid';
  inner.innerHTML = '';
  for (let i = 0; i < cols; i++) {
    inner.innerHTML += `<div class="preview-card">📦 Card ${i+1}</div>`;
  }
  applyPreviewStyles();
}

function applyPreviewStyles() {
  const box = $('#preview-box');
  const w = box.offsetWidth;
  const inner = $('#preview-inner');
  const sorted = [...bps].sort((a, b) => b.min - a.min);
  for (const bp of sorted) {
    if (w >= bp.min) {
      inner.style.cssText = `display:grid;gap:12px;transition:.3s;${bp.css}`;
      return;
    }
  }
  if (bps.length) {
    inner.style.cssText = `display:grid;gap:12px;transition:.3s;${bps[0].css}`;
  }
}

// Observe preview resize
if (window.ResizeObserver) {
  new ResizeObserver(applyPreviewStyles).observe($('#preview-box'));
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')} CSS</button>
  <button class="gz-btn gz-btn-secondary" onclick="addBp()">${t('addBreakpoint')}</button>`;

window.addBp = () => { bps.push({ min: 1000, css: 'grid-template-columns: 1fr 1fr 1fr 1fr;' }); renderBreakpoints(); };
window.copyText = copyText;

$('#lbl-ctype').textContent = t('containerType');
$('#lbl-cname').textContent = t('containerName');
$('#lbl-cols').textContent = t('columns');
$('#lbl-out').textContent = t('output');
$('#lbl-prev').textContent = t('preview');

$('#container-type').addEventListener('change', generate);
$('#container-name').addEventListener('input', generate);
$('#columns').addEventListener('input', generate);

renderBreakpoints();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/css-tools/clamp.html', name:'CSS Clamp'},
    {icon:'🔲', href:'/css-tools/flexbox.html', name:'Flexbox'},
    {icon:'🔲', href:'/css-tools/grid.html', name:'CSS Grid'},
    {icon:'📏', href:'/css-tools/clamp-generator.html', name:'Clamp Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
