<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the difference between markup and margin?", "acceptedAnswer": {"@type": "Answer", "text": "Markup is calculated as (Profit / Cost) × 100, while margin is (Profit / Selling Price) × 100. A 50% markup on a $100 cost = $150 selling price, which is a 33.3% margin."}}, {"@type": "Question", "name": "How do I calculate markup from cost and selling price?", "acceptedAnswer": {"@type": "Answer", "text": "Markup % = ((Selling Price - Cost) / Cost) × 100. For example, if cost is $80 and selling price is $120, markup = (($120-$80)/$80) × 100 = 50%."}}, {"@type": "Question", "name": "What is a good markup percentage?", "acceptedAnswer": {"@type": "Answer", "text": "It depends on the industry. Grocery stores use 10-15%, restaurants 60-70%, retail clothing 50-100%, software 200-500%. Research your industry standard for competitive pricing."}}]}</script>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Markup Calculator',
    toolDesc: 'Calculate markup percentage, selling price, gross profit and margin — free business pricing calculator for retail, wholesale and e-commerce.',
    mode1: 'From Cost + Markup %',
    mode2: 'From Cost + Selling Price',
    mode3: 'From Cost + Margin %',
    cost: 'Cost ($)',
    markupPct: 'Markup (%)',
    sellPrice: 'Selling Price ($)',
    marginPct: 'Margin (%)',
    sellingPrice: 'Selling Price',
    grossProfit: 'Gross Profit',
    markupPercent: 'Markup',
    marginPercent: 'Margin',
    costPrice: 'Cost Price',
    calculate: 'Calculate',
    clear: 'Clear',
    formulaTitle: 'Formulas',
    f1: 'Markup % = ((Selling Price - Cost) / Cost) × 100',
    f2: 'Margin % = ((Selling Price - Cost) / Selling Price) × 100',
    f3: 'Gross Profit = Selling Price - Cost',
    step1: 'Select a calculation mode (by markup %, selling price, or margin %)',
    step2: 'Enter your cost and the known value',
    step3: 'View selling price, gross profit, markup and margin instantly',
    step4: 'Use the results for retail, wholesale or e-commerce pricing',
  },
  zh: {
    toolTitle: '加价率计算器',
    toolDesc: '计算加价百分比、售价、毛利和利润率 — 免费商业定价计算器，适用于零售、批发和电商。',
    mode1: '从成本 + 加价率',
    mode2: '从成本 + 售价',
    mode3: '从成本 + 利润率',
    cost: '成本 ($)',
    markupPct: '加价率 (%)',
    sellPrice: '售价 ($)',
    marginPct: '利润率 (%)',
    sellingPrice: '售价',
    grossProfit: '毛利',
    markupPercent: '加价率',
    marginPercent: '利润率',
    costPrice: '成本价',
    calculate: '计算',
    clear: '清空',
    formulaTitle: '公式',
    f1: '加价率 = ((售价 - 成本) / 成本) × 100',
    f2: '利润率 = ((售价 - 成本) / 售价) × 100',
    f3: '毛利 = 售价 - 成本',
    step1: '选择计算模式（按加价率、售价或利润率）',
    step2: '输入成本和已知数值',
    step3: '即时查看售价、毛利、加价率和利润率',
    step4: '将结果用于零售、批发或电商定价',
  }
});

const { $, copyText, t } = GZ;
let mode = 1;

function fmt(v) { return isNaN(v) || !isFinite(v) ? '—' : '$' + v.toFixed(2); }
function fmtPct(v) { return isNaN(v) || !isFinite(v) ? '—' : v.toFixed(2) + '%'; }

function buildInputs() {
  const grid = $('#input-grid');
  if (mode === 1) {
    grid.innerHTML = `
      <div class="field"><label>${t('cost')}</label><input type="number" id="inp1" min="0" step="0.01" value="100"></div>
      <div class="field"><label>${t('markupPct')}</label><input type="number" id="inp2" min="0" step="0.01" value="50"></div>`;
  } else if (mode === 2) {
    grid.innerHTML = `
      <div class="field"><label>${t('cost')}</label><input type="number" id="inp1" min="0" step="0.01" value="100"></div>
      <div class="field"><label>${t('sellPrice')}</label><input type="number" id="inp2" min="0" step="0.01" value="150"></div>`;
  } else {
    grid.innerHTML = `
      <div class="field"><label>${t('cost')}</label><input type="number" id="inp1" min="0" step="0.01" value="100"></div>
      <div class="field"><label>${t('marginPct')}</label><input type="number" id="inp2" min="0" max="99.99" step="0.01" value="33.33"></div>`;
  }
  document.querySelectorAll('#input-grid input').forEach(inp => inp.addEventListener('input', calc));
  calc();
}

function calc() {
  const v1 = parseFloat($('#inp1')?.value) || 0;
  const v2 = parseFloat($('#inp2')?.value) || 0;
  let cost, sell, markup, margin, profit;

  if (mode === 1) {
    cost = v1; markup = v2;
    sell = cost * (1 + markup / 100);
    profit = sell - cost;
    margin = sell > 0 ? (profit / sell) * 100 : 0;
  } else if (mode === 2) {
    cost = v1; sell = v2;
    profit = sell - cost;
    markup = cost > 0 ? (profit / cost) * 100 : 0;
    margin = sell > 0 ? (profit / sell) * 100 : 0;
  } else {
    cost = v1; margin = v2;
    sell = margin > 0 ? cost / (1 - margin / 100) : cost;
    profit = sell - cost;
    markup = cost > 0 ? (profit / cost) * 100 : 0;
  }

  $('#result-grid').innerHTML = `
    <div class="result-card"><div class="label">${t('sellingPrice')}</div><div class="value">${fmt(sell)}</div></div>
    <div class="result-card"><div class="label">${t('grossProfit')}</div><div class="value">${fmt(profit)}</div></div>
    <div class="result-card"><div class="label">${t('markupPercent')}</div><div class="value">${fmtPct(markup)}</div></div>
    <div class="result-card"><div class="label">${t('marginPercent')}</div><div class="value">${fmtPct(margin)}</div></div>`;

  $('#formula-box').innerHTML = `<strong>${t('formulaTitle')}</strong><br><code>${t('f1')}</code><br><code>${t('f2')}</code><br><code>${t('f3')}</code>`;
}

// Mode tabs
const tabs = [
  { id: 1, key: 'mode1' },
  { id: 2, key: 'mode2' },
  { id: 3, key: 'mode3' },
];

$('#mode-tabs').innerHTML = tabs.map(tab =>
  `<button class="mode-tab${tab.id === mode ? ' active' : ''}" data-mode="${tab.id}">${t(tab.key)}</button>`
).join('');

document.querySelectorAll('.mode-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    mode = +btn.dataset.mode;
    document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    buildInputs();
  });
});

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="document.querySelectorAll('#input-grid input').forEach(i=>i.value='');calc()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💼', href:'/calc/profit-margin.html', name:'Profit Margin'},
    {icon:'🏷️', href:'/calc/discount-calculator.html', name:'Discount'},
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
    {icon:'💰', href:'/calc/roi.html', name:'ROI'},
  ]
});
buildInputs();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
