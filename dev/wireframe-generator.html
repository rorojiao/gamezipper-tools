<style>
.wf-layout{display:flex;gap:12px;min-height:600px}
.wf-sidebar{width:200px;flex-shrink:0;background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:12px;overflow-y:auto;max-height:700px}
.wf-sidebar h4{margin:0 0 8px;font-size:.9em;color:var(--gz-muted)}
.wf-comp{padding:8px 10px;margin:4px 0;background:var(--glass);border:1px solid var(--border);border-radius:8px;cursor:grab;font-size:.85em;text-align:center;transition:all .2s;user-select:none}
.wf-comp:hover{border-color:var(--gz-accent);background:var(--glass2)}
.wf-comp:active{cursor:grabbing}
.wf-canvas-wrap{flex:1;background:var(--glass2);border:1px solid var(--border);border-radius:12px;overflow:auto;position:relative}
.wf-canvas{background:#fff;width:100%;min-height:600px;position:relative}
.wf-canvas.dark{background:#1a1a2e}
.wf-el{position:absolute;border:2px solid #555;background:transparent;cursor:move;user-select:none;display:flex;align-items:center;justify-content:center;font-size:12px;color:#888;min-width:40px;min-height:24px}
.wf-el:hover{border-color:var(--gz-accent)}
.wf-el.selected{border-color:var(--gz-accent);box-shadow:0 0 0 2px rgba(0,120,255,.3)}
.wf-el .del-btn{position:absolute;top:-10px;right:-10px;width:20px;height:20px;background:var(--gz-accent);color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:12px;display:none;align-items:center;justify-content:center;line-height:1}
.wf-el:hover .del-btn{display:flex}
.wf-toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.wf-toolbar select,.wf-toolbar input{padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:var(--glass);color:var(--gz-text);font-size:.85em}
.wf-sep{width:1px;height:24px;background:var(--border);margin:0 4px}
.wf-prop{width:200px;flex-shrink:0;background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:12px}
.wf-prop h4{margin:0 0 8px;font-size:.9em;color:var(--gz-muted)}
.wf-prop label{display:block;font-size:.8em;color:var(--gz-muted);margin:6px 0 2px}
.wf-prop input,.wf-prop select{width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:var(--glass);color:var(--gz-text);font-size:.85em;box-sizing:border-box}

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a wireframe?", "acceptedAnswer": {"@type": "Answer", "text": "A wireframe is a low-fidelity visual representation of a web page or app layout. It shows the structure, content placement, and functionality without detailed design elements."}}, {"@type": "Question", "name": "How do I create a wireframe?", "acceptedAnswer": {"@type": "Answer", "text": "Drag components from the sidebar onto the canvas, then resize and reposition them. You can add headers, navigation, buttons, images, forms, and more."}}, {"@type": "Question", "name": "Can I export my wireframe?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Click the Export PNG or Export SVG button to download your wireframe. The export captures the full canvas content."}}, {"@type": "Question", "name": "Is this wireframe tool free?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, completely free with no signup required. All work is done in your browser — nothing is uploaded to any server."}}]}</script>

<body>
<div class="gz-container">

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Wireframe Generator',
    toolDesc: 'Create clean UI wireframes and mockups with drag-and-drop components. Export as PNG or SVG — free, no signup.',
    exportPNG: 'Export PNG',
    exportSVG: 'Export SVG',
    clearAll: 'Clear All',
    darkMode: 'Dark',
    lightMode: 'Light',
    layout: 'Layout',
    basic: 'Basic',
    form: 'Form',
    media: 'Media',
    text: 'Text',
    header: 'Header',
    navbar: 'Navbar',
    sidebar: 'Sidebar',
    footer: 'Footer',
    button: 'Button',
    card: 'Card',
    list: 'List',
    table: 'Table',
    inputField: 'Input',
    textarea: 'Textarea',
    checkbox: 'Checkbox',
    radio: 'Radio',
    selectBox: 'Select',
    image: 'Image',
    video: 'Video',
    icon: 'Icon',
    heading: 'Heading',
    paragraph: 'Paragraph',
    label: 'Label',
    properties: 'Properties',
    x: 'X',
    y: 'Y',
    width: 'Width',
    height: 'Height',
    content: 'Content',
    bgColor: 'Background',
    delete: 'Delete',
    step1: 'Drag a component from the left sidebar onto the canvas',
    step2: 'Click and drag elements to reposition them',
    step3: 'Resize elements by changing Width and Height in the properties panel',
    step4: 'Export your wireframe as PNG or SVG when finished',
  },
  zh: {
    toolTitle: '线框图生成器',
    toolDesc: '通过拖拽组件创建简洁的 UI 线框图和原型。导出为 PNG 或 SVG — 免费无需注册。',
    exportPNG: '导出 PNG',
    exportSVG: '导出 SVG',
    clearAll: '清空',
    darkMode: '深色',
    lightMode: '浅色',
    layout: '布局',
    basic: '基础',
    form: '表单',
    media: '媒体',
    text: '文字',
    header: '页头',
    navbar: '导航栏',
    sidebar: '侧边栏',
    footer: '页脚',
    button: '按钮',
    card: '卡片',
    list: '列表',
    table: '表格',
    inputField: '输入框',
    textarea: '文本域',
    checkbox: '复选框',
    radio: '单选框',
    selectBox: '下拉框',
    image: '图片',
    video: '视频',
    icon: '图标',
    heading: '标题',
    paragraph: '段落',
    label: '标签',
    properties: '属性',
    x: 'X',
    y: 'Y',
    width: '宽度',
    height: '高度',
    content: '内容',
    bgColor: '背景色',
    delete: '删除',
    step1: '从左侧边栏拖拽组件到画布',
    step2: '点击并拖动元素来重新定位',
    step3: '在属性面板中修改宽度和高度来调整大小',
    step4: '完成后导出为 PNG 或 SVG',
  }
});

const { $, t } = GZ;

const components = [
  { group: 'layout', items: ['header','navbar','sidebar','footer'] },
  { group: 'basic', items: ['button','card','list','table'] },
  { group: 'form', items: ['inputField','textarea','checkbox','radio','selectBox'] },
  { group: 'media', items: ['image','video','icon'] },
  { group: 'text', items: ['heading','paragraph','label'] },
];

const defaults = {
  header: { w:800, h:60, text:'Header', bg:'#e0e0e0' },
  navbar: { w:800, h:50, text:'Nav | Home | About | Contact', bg:'#d0d0d0' },
  sidebar: { w:200, h:400, text:'Sidebar', bg:'#e8e8e8' },
  footer: { w:800, h:60, text:'© 2026 Footer', bg:'#d0d0d0' },
  button: { w:120, h:40, text:'Button', bg:'#bbb' },
  card: { w:250, h:180, text:'Card Title\n\nCard content goes here', bg:'#f0f0f0' },
  list: { w:200, h:200, text:'• Item 1\n• Item 2\n• Item 3\n• Item 4', bg:'transparent' },
  table: { w:400, h:160, text:'Col 1 | Col 2 | Col 3\n─────|──────|─────\nRow 1 | Data | Data\nRow 2 | Data | Data', bg:'transparent' },
  inputField: { w:250, h:36, text:'[ Input Field ]', bg:'#f5f5f5' },
  textarea: { w:250, h:100, text:'[ Textarea ]', bg:'#f5f5f5' },
  checkbox: { w:150, h:30, text:'☑ Checkbox', bg:'transparent' },
  radio: { w:150, h:30, text:'◉ Radio Option', bg:'transparent' },
  selectBox: { w:200, h:36, text:'[ ▼ Select ]', bg:'#f5f5f5' },
  image: { w:200, h:150, text:'🖼️ Image', bg:'#ddd' },
  video: { w:320, h:180, text:'▶ Video Player', bg:'#333' },
  icon: { w:40, h:40, text:'⭐', bg:'transparent' },
  heading: { w:300, h:36, text:'Heading Text', bg:'transparent' },
  paragraph: { w:300, h:80, text:'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor.', bg:'transparent' },
  label: { w:100, h:24, text:'Label', bg:'transparent' },
};

let elements = [];
let selectedEl = null;
let nextId = 1;

// Build sidebar
function buildSidebar() {
  const sb = $('#sidebar');
  let html = '';
  components.forEach(g => {
    html += `<h4>${t(g.group)}</h4>`;
    g.items.forEach(item => {
      html += `<div class="wf-comp" draggable="true" data-type="${item}" ondragstart="dragStart(event,'${item}')">${t(item)}</div>`;
    });
  });
  sb.innerHTML = html;
}

function dragStart(e, type) { e.dataTransfer.setData('text/plain', type); }

// Canvas drop
const canvas = $('#canvas');
canvas.addEventListener('dragover', e => e.preventDefault());
canvas.addEventListener('drop', e => {
  e.preventDefault();
  const type = e.dataTransfer.getData('text/plain');
  if (!defaults[type]) return;
  const rect = canvas.getBoundingClientRect();
  const d = defaults[type];
  const el = {
    id: nextId++,
    type, x: Math.round(e.clientX - rect.left - d.w/2),
    y: Math.round(e.clientY - rect.top - d.h/2),
    w: d.w, h: d.h, text: d.text, bg: d.bg
  };
  elements.push(el);
  renderCanvas();
  selectElement(el);
});

function renderCanvas() {
  const c = $('#canvas');
  c.innerHTML = '';
  elements.forEach(el => {
    const div = document.createElement('div');
    div.className = 'wf-el' + (selectedEl && selectedEl.id === el.id ? ' selected' : '');
    div.style.cssText = `left:${el.x}px;top:${el.y}px;width:${el.w}px;height:${el.h}px;background:${el.bg}`;
    div.dataset.id = el.id;
    if (el.type === 'image') {
      div.innerHTML = `<span style="font-size:2em">🖼️</span><div class="del-btn" onclick="delEl(${el.id})">×</div>`;
    } else if (el.type === 'video') {
      div.innerHTML = `<span style="color:#ccc">▶</span><div class="del-btn" onclick="delEl(${el.id})">×</div>`;
    } else if (el.type === 'icon') {
      div.innerHTML = `<span style="font-size:1.5em">${el.text}</span><div class="del-btn" onclick="delEl(${el.id})">×</div>`;
    } else {
      div.innerHTML = `<span style="white-space:pre-wrap;font-size:${el.type==='heading'?16:el.type==='paragraph'?11:12}px;color:#666">${el.text}</span><div class="del-btn" onclick="delEl(${el.id})">×</div>`;
    }
    // Make draggable
    let isDragging = false, ox, oy;
    div.addEventListener('mousedown', e2 => {
      if (e2.target.classList.contains('del-btn')) return;
      selectElement(el);
      isDragging = true;
      ox = e2.clientX - el.x;
      oy = e2.clientY - el.y;
      const onMove = e3 => {
        if (!isDragging) return;
        el.x = Math.max(0, Math.round(e3.clientX - ox));
        el.y = Math.max(0, Math.round(e3.clientY - oy));
        div.style.left = el.x + 'px';
        div.style.top = el.y + 'px';
        updateProps();
      };
      const onUp = () => { isDragging = false; document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    c.appendChild(div);
  });
}

function selectElement(el) {
  selectedEl = el;
  renderCanvas();
  updateProps();
}

function delEl(id) {
  elements = elements.filter(e => e.id !== id);
  if (selectedEl && selectedEl.id === id) selectedEl = null;
  renderCanvas();
  updateProps();
}

function updateProps() {
  const pf = $('#propFields');
  const pt = $('#propTitle');
  if (!selectedEl) { pt.textContent = ''; pf.innerHTML = ''; return; }
  const el = selectedEl;
  pt.textContent = t(el.type);
  pf.innerHTML = `
    <label>${t('x')}</label><input type="number" value="${el.x}" onchange="updProp('x',+this.value)">
    <label>${t('y')}</label><input type="number" value="${el.y}" onchange="updProp('y',+this.value)">
    <label>${t('width')}</label><input type="number" value="${el.w}" onchange="updProp('w',+this.value)">
    <label>${t('height')}</label><input type="number" value="${el.h}" onchange="updProp('h',+this.value)">
    <label>${t('content')}</label><input type="text" value="${el.text.replace(/"/g,'&quot;')}" onchange="updProp('text',this.value)">
    <label>${t('bgColor')}</label><input type="color" value="${el.bg.startsWith('#')?el.bg:'#ffffff'}" onchange="updProp('bg',this.value)">
    <button class="gz-btn gz-btn-secondary" style="margin-top:12px;width:100%" onclick="delEl(${el.id})">${t('delete')}</button>`;
}

function updProp(key, val) {
  if (!selectedEl) return;
  selectedEl[key] = val;
  renderCanvas();
}

// Toolbar
$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="exportPNG()">${t('exportPNG')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="exportSVG()">${t('exportSVG')}</button>
  <div class="wf-sep"></div>
  <button class="gz-btn gz-btn-secondary" onclick="toggleDark()">${t('darkMode')}</button>
  <div class="wf-sep"></div>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clearAll')}</button>`;

let isDark = false;
function toggleDark() {
  isDark = !isDark;
  $('#canvas').classList.toggle('dark', isDark);
}
function clearAll() { elements = []; selectedEl = null; nextId = 1; renderCanvas(); updateProps(); }

function exportPNG() {
  const c = $('#canvas');
  const s = document.createElement('canvas');
  s.width = c.scrollWidth; s.height = c.scrollHeight;
  const ctx = s.getContext('2d');
  ctx.fillStyle = isDark ? '#1a1a2e' : '#ffffff';
  ctx.fillRect(0, 0, s.width, s.height);
  elements.forEach(el => {
    ctx.fillStyle = el.bg === 'transparent' ? 'rgba(0,0,0,0)' : el.bg;
    ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
    ctx.fillRect(el.x, el.y, el.w, el.h);
    ctx.strokeRect(el.x, el.y, el.w, el.h);
    ctx.fillStyle = '#666'; ctx.font = '12px sans-serif';
    const lines = el.text.split('\n');
    lines.forEach((line, i) => ctx.fillText(line, el.x + 8, el.y + 18 + i * 16));
  });
  const a = document.createElement('a');
  a.download = 'wireframe.png'; a.href = s.toDataURL('image/png'); a.click();
}

function exportSVG() {
  const c = $('#canvas');
  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${c.scrollWidth}" height="${c.scrollHeight}"><rect width="100%" height="100%" fill="${isDark?'#1a1a2e':'#fff'}"/>`;
  elements.forEach(el => {
    svg += `<rect x="${el.x}" y="${el.y}" width="${el.w}" height="${el.h}" fill="${el.bg==='transparent'?'none':el.bg}" stroke="#555" stroke-width="2"/>`;
    const lines = el.text.split('\n');
    lines.forEach((line, i) => { svg += `<text x="${el.x+8}" y="${el.y+18+i*16}" fill="#666" font-size="12">${line.replace(/</g,'&lt;')}</text>`; });
  });
  svg += '</svg>';
  const blob = new Blob([svg], {type:'image/svg+xml'});
  const a = document.createElement('a');
  a.download = 'wireframe.svg'; a.href = URL.createObjectURL(blob); a.click();
}

buildSidebar();
updateProps();

GZ.renderToolPage({
  related: [
    {icon:'🖼️', href:'/image/device-mockup.html', name:'Device Mockup'},
    {icon:'📐', href:'/css-tools/flexbox.html', name:'Flexbox Generator'},
    {icon:'🏗️', href:'/css-tools/grid.html', name:'CSS Grid Generator'},
  ]
});
</script>
