<script>
GZI18n.register({
  en: {
    toolTitle: 'Egg Timer & Boiled Egg Calculator',
    toolDesc: 'Get the perfect soft, medium or hard boiled egg every time. Pick a doneness level and start a countdown timer — free and browser-only.',
    soft: 'Soft Boiled',
    medium: 'Medium',
    hard: 'Hard Boiled',
    softDesc: 'Runny yolk, set white',
    medDesc: 'Jammy, gooey centre',
    hardDesc: 'Fully set, easy to peel',
    lblSize: 'Egg Size',
    lblTemp: 'Starting Temperature',
    lblAltitude: 'Altitude (meters above sea level)',
    resultLabel: 'Cooking Time (in boiling water)',
    btnStart: 'Start',
    btnPause: 'Pause',
    btnReset: 'Reset',
    timerNote: 'Start the timer AFTER lowering eggs into already-boiling water. An alarm will sound when done.',
    done: 'Done! 🥚✨',
    running: 'Counting down…',
    paused: 'Paused',
    step1: 'Choose soft, medium or hard boiled',
    step2: 'Set egg size, fridge/room temp and altitude',
    step3: 'Read the suggested cook time in minutes',
    step4: 'Press Start to run a countdown — an alarm pings when the eggs are ready',
  },
  zh: {
    toolTitle: '煮蛋计时器 / 完美水煮蛋计算器',
    toolDesc: '每次都能煮出完美的溏心、半熟或全熟蛋。选择熟度并启动倒计时 — 免费浏览器本地运行。',
    soft: '溏心蛋',
    medium: '半熟',
    hard: '全熟蛋',
    softDesc: '流心蛋黄，蛋白凝固',
    medDesc: '绵密软糯的蛋黄心',
    hardDesc: '完全凝固，易剥壳',
    lblSize: '鸡蛋大小',
    lblTemp: '起始温度',
    lblAltitude: '海拔（米）',
    resultLabel: '煮制时间（放入沸水后）',
    btnStart: '开始',
    btnPause: '暂停',
    btnReset: '重置',
    timerNote: '请先将鸡蛋放入已沸腾的水中，再开始计时。完成后会响铃提醒。',
    done: '完成！🥚✨',
    running: '倒计时中…',
    paused: '已暂停',
    step1: '选择溏心、半熟或全熟',
    step2: '设置鸡蛋大小、冷藏/室温及海拔',
    step3: '查看建议的煮制分钟数',
    step4: '点击「开始」启动倒计时 — 时间到会响铃',
  }
});

const { $, t } = GZ;

// Base minutes for a large fridge-cold egg at sea level
const BASE = { soft: 6, medium: 8, hard: 11 };
let doneness = 'medium';
let totalSec = 0, remainingSec = 0, tickId = null, state = 'idle';

function calcSeconds() {
  let mins = BASE[doneness];
  // size adjustment
  const sizeAdj = { small: -0.5, large: 0, xl: 0.5, jumbo: 1 };
  mins += sizeAdj[$('#size').value] || 0;
  // room temp eggs cook ~0.5 min faster
  if ($('#temp').value === 'room') mins -= 0.5;
  // altitude: water boils below 100°C, add ~4% per 300m above 300m
  const alt = Math.max(0, parseFloat($('#altitude').value) || 0);
  if (alt > 300) mins *= 1 + ((alt - 300) / 300) * 0.04;
  return Math.max(120, Math.round(mins * 60));
}

function fmt(sec) {
  const m = Math.floor(sec / 60), s = sec % 60;
  return m + ':' + (s < 10 ? '0' + s : s);
}

function renderPresets() {
  $('#presets').innerHTML = ['soft','medium','hard'].map(k => `
    <div class="egg-preset${k===doneness?' active':''}" data-k="${k}" onclick="setDoneness('${k}')">
      <span class="icon">${k==='soft'?'🥚':k==='medium'?'🍳':'🥚'}</span>
      <div class="name">${t(k)}</div>
      <div class="mins">${t(k+'Desc')}</div>
    </div>`).join('');
}

function setDoneness(k) { doneness = k; renderPresets(); update(); }

function update() {
  totalSec = calcSeconds();
  if (state === 'idle' || state === 'done') remainingSec = totalSec;
  $('#result-time').textContent = (totalSec/60).toFixed(1) + ' min';
  $('#result-label').textContent = t('resultLabel');
  $('#timer').textContent = fmt(remainingSec);
  $('#bar').style.width = (totalSec ? (1 - remainingSec/totalSec) * 100 : 0) + '%';
}

function startTimer() {
  if (state === 'running') return;
  if (remainingSec <= 0) remainingSec = totalSec;
  state = 'running';
  $('#btn-start').textContent = t('btnStart');
  $('#timer-note').textContent = t('running');
  tickId = setInterval(() => {
    remainingSec--;
    $('#timer').textContent = fmt(Math.max(0, remainingSec));
    $('#bar').style.width = (1 - remainingSec/totalSec) * 100 + '%';
    if (remainingSec <= 0) {
      clearInterval(tickId); tickId = null; state = 'done';
      $('#timer').textContent = t('done');
      $('#timer-note').textContent = t('done');
      try {
        const ctx = new (window.AudioContext||window.webkitAudioContext)();
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type='sine'; o.frequency.value=880;
        g.gain.setValueAtTime(0.3, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
        o.start(); o.stop(ctx.currentTime + 1.5);
      } catch(e) {}
    }
  }, 1000);
}

function pauseTimer() {
  if (state !== 'running') return;
  clearInterval(tickId); tickId = null; state = 'paused';
  $('#timer-note').textContent = t('paused');
}

function resetTimer() {
  clearInterval(tickId); tickId = null; state = 'idle';
  remainingSec = totalSec;
  $('#timer').textContent = fmt(remainingSec);
  $('#bar').style.width = '0%';
  $('#timer-note').textContent = t('timerNote');
}

$('#btn-start').textContent = t('btnStart');
$('#btn-pause').textContent = t('btnPause');
$('#btn-reset').textContent = t('btnReset');
$('#lbl-size').textContent = t('lblSize');
$('#lbl-temp').textContent = t('lblTemp');
$('#lbl-altitude').textContent = t('lblAltitude');
$('#timer-note').textContent = t('timerNote');
['size','temp','altitude'].forEach(id => $('#'+id).addEventListener('input', update));

renderPresets();
update();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏱️', href:'/calc/interval-timer.html', name:'Interval Timer'},
    {icon:'⏲️', href:'/calc/tabata-timer.html', name:'Tabata Timer'},
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro'},
    {icon:'🍳', href:'/convert/cooking-converter.html', name:'Cooking Converter'},
  ]
});
</script>
