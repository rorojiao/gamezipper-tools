<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the formula for the area of a circle?", "acceptedAnswer": {"@type": "Answer", "text": "The area of a circle is A = π × r², where r is the radius. For example, a circle with radius 5 has area π × 25 ≈ 78.54 square units."}}, {"@type": "Question", "name": "What is the formula for the circumference of a circle?", "acceptedAnswer": {"@type": "Answer", "text": "The circumference is C = 2π × r, or equivalently C = π × d where d is the diameter. A circle with radius 5 has circumference 10π ≈ 31.42 units."}}, {"@type": "Question", "name": "What is the difference between radius and diameter?", "acceptedAnswer": {"@type": "Answer", "text": "The radius is the distance from the center of the circle to its edge. The diameter is the distance across the circle through the center, equal to 2 × radius."}}, {"@type": "Question", "name": "What is a sector and segment of a circle?", "acceptedAnswer": {"@type": "Answer", "text": "A sector is the pie-slice region bounded by two radii and an arc. A segment is the region bounded by a chord and the arc it cuts off. Both are calculated using the central angle in radians or degrees."}}, {"@type": "Question", "name": "Can I use this calculator with different units?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Enter any unit (mm, cm, m, km, in, ft, yd, mi) and the calculator returns the same unit for length, and that unit squared for area. Results are also shown in alternative units for convenience."}}]}</script>

        <div class="row"><input type="number" id="diameter" value="10" step="any" min="0">
          <select id="unitD"><option value="mm">mm</option><option value="cm" selected>cm</option><option value="m">m</option><option value="in">in</option><option value="ft">ft</option><option value="yd">yd</option><option value="km">km</option><option value="mi">mi</option></select>

          <select id="unitC"><option value="mm">mm</option><option value="cm" selected>cm</option><option value="m">m</option><option value="in">in</option><option value="ft">ft</option><option value="yd">yd</option><option value="km">km</option><option value="mi">mi</option></select>
        </div>

          <select id="unitA"><option value="mm2">mm²</option><option value="cm2" selected>cm²</option><option value="m2">m²</option><option value="in2">in²</option><option value="ft2">ft²</option><option value="yd2">yd²</option><option value="km2">km²</option><option value="mi2">mi²</option></select>

<script>
GZI18n.register({
  en:{toolTitle:'Circle Calculator',toolDesc:'Compute radius, diameter, circumference, area, arc length, sector area and segment area — with visual diagram and unit conversion.',
    step1:'Type any one value (radius, diameter, circumference, or area) — the others update instantly',step2:'Pick a unit (mm, cm, m, in, ft, yd, km, mi) for length and m², in², ft² for area',step3:'Set the central angle for sector / arc / segment calculations',step4:'See the SVG diagram update with the same proportions for reference',
    lblR:'Radius (r)',lblD:'Diameter (d)',lblC:'Circumference (C)',lblA:'Area (A)',lblTheta:'Central angle θ',lblChord:'Chord (c)',lblDepth:'Segment height (h)',
    hBasic:'📐 Basic properties',hAdv:'🥧 Sector / Arc / Segment',
    arcLen:'Arc length',secArea:'Sector area',segArea:'Segment area',
    presets:['Coin (1cm)','Pizza (20cm)','Plate (25cm)','Pizza (30cm)','Tire (60cm)','Wheel (70cm)','Coin (1in)','Frisbee (25cm)']},
  zh:{toolTitle:'圆形计算器',toolDesc:'计算圆的半径、直径、周长、面积、弧长、扇形面积和弓形面积 — 含可视化图示和单位换算。',
    step1:'输入任意一个值（半径、直径、周长或面积），其他字段自动更新',step2:'选择单位（毫米、厘米、米、英寸、英尺、码、公里、英里），面积对应 m²、in²、ft²',step3:'设置圆心角以计算扇形、弧长和弓形',step4:'SVG 示意图按比例同步显示，便于直观理解',
    lblR:'半径 (r)',lblD:'直径 (d)',lblC:'周长 (C)',lblA:'面积 (A)',lblTheta:'圆心角 θ',lblChord:'弦 (c)',lblDepth:'弓形高 (h)',
    hBasic:'📐 基本属性',hAdv:'🥧 扇形 / 弧 / 弓形',
    arcLen:'弧长',secArea:'扇形面积',segArea:'弓形面积',
    presets:['硬币 (1cm)','披萨 (20cm)','盘子 (25cm)','披萨 (30cm)','轮胎 (60cm)','车轮 (70cm)','硬币 (1in)','飞盘 (25cm)']}
});

const {$,t}=GZ;
const round=(v,d=4)=>{ if(!isFinite(v))return '—'; const p=Math.pow(10,d); return (Math.round(v*p)/p).toString(); };
const PI=Math.PI;

const UNITS={
  length:{mm:0.001,cm:0.01,m:1,in:0.0254,ft:0.3048,yd:0.9144,km:1000,mi:1609.344},
  area:{}
};
Object.keys(UNITS.length).forEach(u=>{UNITS.area[u+'2']=Math.pow(UNITS.length[u],2);});

function toBase(value, unit, kind){
  return value * (UNITS[kind][unit]||1);
}
function fromBase(value, unit, kind){
  return value / (UNITS[kind][unit]||1);
}
function radiusFromAny(){
  const r=parseFloat($('#radius').value);
  if(r>0){ $('#unitR').value==='m'?null:null; return toBase(r,$('#unitR').value,'length'); }
  const d=parseFloat($('#diameter').value);
  if(d>0) return toBase(d/2,$('#unitD').value,'length');
  const c=parseFloat($('#circ').value);
  if(c>0) return toBase(c/(2*PI),$('#unitC').value,'length');
  const a=parseFloat($('#area').value);
  if(a>0) return Math.sqrt(toBase(a,$('#unitA').value,'area')/PI);
  return NaN;
}

function recompute(src){
  const R=radiusFromAny();
  if(!isFinite(R)||R<=0) return;
  const D=2*R, C=2*PI*R, A=PI*R*R;
  const uR=$('#unitR').value||'cm';
  if(src!=='r') $('#radius').value=round(fromBase(R,uR,'length'));
  if(src!=='d') $('#diameter').value=round(fromBase(D,uR,'length'));
  if(src!=='c') $('#circ').value=round(fromBase(C,uR,'length'));
  $('#unitD').value=uR; $('#unitC').value=uR; $('#unitA').value=uR+'2';
  if(src!=='a') $('#area').value=round(fromBase(A,uR+'2','area'));
  $('#lblChordUnit').textContent=uR; $('#lblDepthUnit').textContent=uR;

  // Basic output
  $('#basicOut').innerHTML=`
    <div class="row"><span class="k">${t('lblR')}</span><span class="v">${round(fromBase(R,uR,'length'),4)} ${uR}</span></div>
    <div class="row"><span class="k">${t('lblD')}</span><span class="v">${round(fromBase(D,uR,'length'),4)} ${uR}</span></div>
    <div class="row"><span class="k">${t('lblC')}</span><span class="v">${round(fromBase(C,uR,'length'),4)} ${uR}</span></div>
    <div class="row"><span class="k">${t('lblA')}</span><span class="v">${round(fromBase(A,uR+'2','area'),4)} ${uR}²</span></div>
    <div class="row"><span class="k">π ratio</span><span class="v">3.14159…</span></div>
  `;

  // Sector / arc / segment
  let th=parseFloat($('#theta').value);
  const tu=$('#thetaUnit').value;
  if(tu==='deg') th=th*PI/180;
  const arcLen=R*th;
  const secArea=0.5*R*R*th;
  const chord=2*R*Math.sin(th/2);
  const depth=R*(1-Math.cos(th/2));
  const segArea=0.5*R*R*(th-Math.sin(th));
  if(src!=='chord') $('#chord').value=round(fromBase(chord,uR,'length'));
  if(src!=='depth') $('#depth').value=round(fromBase(depth,uR,'length'));
  $('#advOut').innerHTML=`
    <div class="row"><span class="k">${t('lblTheta')}</span><span class="v">${round(th*180/PI,2)}° (${round(th,4)} rad)</span></div>
    <div class="row"><span class="k">${t('lblChord')}</span><span class="v">${round(chord)} ${uR}</span></div>
    <div class="row"><span class="k">${t('lblDepth')}</span><span class="v">${round(depth)} ${uR}</span></div>
    <div class="row"><span class="k">${t('arcLen')}</span><span class="v">${round(arcLen)} ${uR}</span></div>
    <div class="row"><span class="k">${t('secArea')}</span><span class="v">${round(secArea)} ${uR}²</span></div>
    <div class="row"><span class="k">${t('segArea')}</span><span class="v">${round(segArea)} ${uR}²</span></div>
  `;

  drawDiagram(R, th);
}

function drawDiagram(R, th){
  const sx=180,sy=120,cx=180,cy=120;
  const scale=Math.min(sx,sy-10)/Math.max(R*2.2,1);
  const rx=R*scale, ry=R*scale;
  const angle0=-PI/2-th/2;
  const x1=cx+rx*Math.cos(angle0), y1=cy+ry*Math.sin(angle0);
  const x2=cx+rx*Math.cos(angle0+th), y2=cy+ry*Math.sin(angle0+th);
  const large=th>PI?1:0;
  $('#diagram').innerHTML=`
  <svg viewBox="0 0 360 240" xmlns="http://www.w3.org/2000/svg">
    <defs><radialGradient id="g" cx="50%" cy="50%"><stop offset="0%" stop-color="#4ecdc4" stop-opacity=".25"/><stop offset="100%" stop-color="#4ecdc4" stop-opacity=".05"/></radialGradient></defs>
    <circle cx="${cx}" cy="${cy}" r="${rx}" fill="url(#g)" stroke="#4ecdc4" stroke-width="2"/>
    <line x1="${cx}" y1="${cy}" x2="${x1}" y2="${y1}" stroke="#e94560" stroke-width="2"/>
    <line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="#e94560" stroke-width="2"/>
    <path d="M ${x1} ${y1} A ${rx} ${ry} 0 ${large} 1 ${x2} ${y2}" fill="#ffd93d" fill-opacity=".3" stroke="#ffd93d" stroke-width="1"/>
    <line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#fff" stroke-dasharray="3 2" stroke-width="1"/>
    <circle cx="${cx}" cy="${cy}" r="3" fill="#fff"/>
    <text x="${cx}" y="${cy+ry+18}" text-anchor="middle" fill="#9ca3af" font-size="12">R = ${round(R,3)}</text>
    <text x="${cx+(x1+x2)/2/2}" y="${cy+(y1+y2)/2/2+4}" text-anchor="middle" fill="#ffd93d" font-size="11">θ = ${round(th*180/PI,1)}°</text>
  </svg>`;
}

$('#radius').addEventListener('input',()=>recompute('r'));
$('#diameter').addEventListener('input',()=>recompute('d'));
$('#circ').addEventListener('input',()=>recompute('c'));
$('#area').addEventListener('input',()=>recompute('a'));
$('#unitR').addEventListener('change',()=>recompute('r'));
$('#theta').addEventListener('input',()=>recompute('theta'));
$('#thetaUnit').addEventListener('change',()=>recompute('theta'));

const presets=[{r:1,u:'cm'},{r:10,u:'cm'},{r:12.5,u:'cm'},{r:15,u:'cm'},{r:30,u:'cm'},{r:35,u:'cm'},{r:1.27,u:'in'},{r:12.5,u:'cm'}];
$('#presets').innerHTML=presets.map((p,i)=>`<button onclick="$('#radius').value=${p.r};$('#unitR').value='${p.u}';$('#unitD').value='${p.u}';$('#unitC').value='${p.u}';$('#unitA').value='${p.u}2';recompute('r')">${t('presets')[i]||'r='+p.r+p.u}</button>`).join('');

$('#toolbar').innerHTML=`<button class="gz-btn" onclick="recompute('r')">${t('validate')}</button><button class="gz-btn gz-btn-secondary" onclick="$('#radius').value=5;$('#unitR').value='cm';recompute('r')">${t('example')}</button><button class="gz-btn gz-btn-secondary" onclick="GZ.copyText($('#basicOut').innerText+'\\n'+$('#advOut').innerText)">${t('copy')}</button>`;

GZ.renderToolPage({
  category:'calc',
  titleKey:'toolTitle',descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'📐',href:'/calc/area-calculator.html',name:'Area Calculator'},
    {icon:'🚗',href:'/calc/speed-distance-time.html',name:'Speed Distance Time'},
    {icon:'½',href:'/calc/fraction-calculator.html',name:'Fraction Calculator'},
    {icon:'🧮',href:'/calc/scientific-calculator.html',name:'Scientific Calculator'}
  ]
});
recompute('r');
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
