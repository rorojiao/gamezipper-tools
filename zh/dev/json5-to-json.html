const { $, copyText, t } = GZ;

let indentSize = 2;
let nanMode = 'null';

// ---- Minimal JSON5 parser -> returns native JS values ----
function parseJSON5(text){
  let i = 0, n = text.length;

  function err(msg){ const ln = text.slice(0,i).split('\n').length; return new Error(`Line ${ln}, col ${i - text.lastIndexOf('\n',i-1)}: ${msg}`); }

  function skipWS(){
    while(i < n){
      const c = text[i];
      if(c === ' ' || c === '\t' || c === '\n' || c === '\r'){ i++; }
      else if(c === '/' && text[i+1] === '/'){ i += 2; while(i < n && text[i] !== '\n') i++; }
      else if(c === '/' && text[i+1] === '*'){ i += 2; while(i < n && !(text[i] === '*' && text[i+1] === '/')) i++; i += 2; }
      else break;
    }
  }

  function parseValue(){
    skipWS();
    if(i >= n) throw err('Unexpected end of input');
    const c = text[i];
    if(c === '{') return parseObject();
    if(c === '[') return parseArray();
    if(c === '"' || c === "'") return parseString();
    if(c === '-' || c === '+' || c === '.' || (c >= '0' && c <= '9') || c === 'I' || c === 'N') return parseNumber();
    // keywords: true/false/null
    return parseKeyword();
  }

  function parseObject(){
    i++; // {
    const obj = {};
    skipWS();
    if(text[i] === '}'){ i++; return obj; }
    while(i < n){
      skipWS();
      if(text[i] === '}'){ i++; return obj; } // allow trailing handling
      const key = parseKey();
      skipWS();
      if(text[i] !== ':') throw err('Expected ":" after key');
      i++; // :
      const val = parseValue();
      obj[key] = val;
      skipWS();
      if(text[i] === ','){ i++; skipWS(); if(text[i] === '}'){ i++; return obj; } continue; }
      if(text[i] === '}'){ i++; return obj; }
      throw err('Expected "," or "}"');
    }
    throw err('Unterminated object');
  }

  function parseKey(){
    skipWS();
    const c = text[i];
    if(c === '"' || c === "'") return parseString();
    // IdentifierName: letter, _, $, or \uXXXX
    let start = i;
    if(c === '\\'){ return parseString(); }
    if(!/[A-Za-z_$]/.test(c)) throw err('Invalid object key');
    while(i < n && /[A-Za-z0-9_$]/.test(text[i])) i++;
    return text.slice(start, i);
  }

  function parseArray(){
    i++; // [
    const arr = [];
    skipWS();
    if(text[i] === ']'){ i++; return arr; }
    while(i < n){
      skipWS();
      if(text[i] === ']'){ i++; return arr; }
      arr.push(parseValue());
      skipWS();
      if(text[i] === ','){ i++; continue; }
      if(text[i] === ']'){ i++; return arr; }
      throw err('Expected "," or "]"');
    }
    throw err('Unterminated array');
  }

  function parseString(){
    const quote = text[i]; i++; // opening quote
    let out = '';
    while(i < n){
      const c = text[i];
      if(c === quote){ i++; return out; }
      if(c === '\\'){
        i++;
        const e = text[i];
        if(e === 'n') out += '\n';
        else if(e === 't') out += '\t';
        else if(e === 'r') out += '\r';
        else if(e === 'b') out += '\b';
        else if(e === 'f') out += '\f';
        else if(e === 'v') out += '\v';
        else if(e === '0') out += '\0';
        else if(e === '\\') out += '\\';
        else if(e === "'") out += "'";
        else if(e === '"') out += '"';
        else if(e === '/') out += '/';
        else if(e === '\n'){ /* line continuation */ }
        else if(e === 'u'){ const hex = text.slice(i+1, i+5); out += String.fromCharCode(parseInt(hex,16)); i += 4; }
        else if(e === 'x'){ const hex = text.slice(i+1, i+3); out += String.fromCharCode(parseInt(hex,16)); i += 2; }
        else out += e;
        i++;
      } else {
        out += c; i++;
      }
    }
    throw err('Unterminated string');
  }

  function parseNumber(){
    let start = i;
    if(text[i] === '-' || text[i] === '+') i++;
    // Infinity / NaN
    if(text.slice(i, i+8) === 'Infinity'){ i += 8; return Number(text.slice(start, i)); }
    if(text.slice(i, i+3) === 'NaN'){ i += 3; return NaN; }
    if(text.slice(i, i+4) === '-NaN'){ }
    // hex
    if(text[i] === '0' && (text[i+1] === 'x' || text[i+1] === 'X')){ i += 2; while(i < n && /[0-9a-fA-F]/.test(text[i])) i++; return parseInt(text.slice(start, i), 16); }
    // decimal
    while(i < n && /[0-9]/.test(text[i])) i++;
    if(text[i] === '.'){ i++; while(i < n && /[0-9]/.test(text[i])) i++; }
    if(text[i] === 'e' || text[i] === 'E'){ i++; if(text[i] === '+' || text[i] === '-') i++; while(i < n && /[0-9]/.test(text[i])) i++; }
    return Number(text.slice(start, i));
  }

  function parseKeyword(){
    const start = i;
    while(i < n && /[a-z]/.test(text[i])) i++;
    const kw = text.slice(start, i);
    if(kw === 'true') return true;
    if(kw === 'false') return false;
    if(kw === 'null') return null;
    if(kw === 'Infinity') return Infinity;
    if(kw === 'NaN') return NaN;
    throw err('Unexpected token "' + kw + '"');
  }

  const result = parseValue();
  skipWS();
  if(i < n) throw err('Unexpected trailing characters');
  return result;
}

function replacer(key, value){
  if(typeof value === 'number'){
    if(Number.isNaN(value)) return nanMode === 'string' ? 'NaN' : null;
    if(value === Infinity) return nanMode === 'string' ? 'Infinity' : null;
    if(value === -Infinity) return nanMode === 'string' ? '-Infinity' : null;
  }
  return value;
}

function highlightJSON(json){
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"\s*:)/g,'<span class="jk">$1</span>')
    .replace(/:\s*("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*")/g,': <span class="js">$1</span>')
    .replace(/:\s*(-?\d+(\.\d+)?([eE][+-]?\d+)?)/g,': <span class="jn">$1</span>')
    .replace(/:\s*(true|false)/g,': <span class="jb">$1</span>')
    .replace(/:\s*(null)/g,': <span class="jnu">$1</span>');
}

function doConvert(){
  const raw = $('#input').value.trim();
  if(!raw){ $('#status').innerHTML=''; $('#output').textContent=''; return; }
  try{
    const data = parseJSON5(raw);
    const json = JSON.stringify(data, replacer, indentSize);
    $('#output').innerHTML = highlightJSON(json);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done')} · ${json.length} bytes</span>`;
  }catch(e){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalid')}: ${e.message}</span>`;
    $('#output').textContent = '';
  }
}

  missing: NaN,

  nested: {

    tag: "ok",

}`;

}

function doDownload(){
  const code = $('#output').textContent;
  if(!code) return;
  const blob = new Blob([code], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'converted.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

$('#input').addEventListener('input', doConvert);
