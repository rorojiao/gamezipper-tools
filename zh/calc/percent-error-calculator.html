<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Percent Error Calculator","description":"Calculate percent error between an experimental value and a theoretical (accepted) value. Free online percent error calculator with formula and step-by-step explanation.","url": "https://tools.gamezipper.com/zh/calc/percent-error-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is the percent error formula?","acceptedAnswer":{"@type":"Answer","text":"Percent error = |experimental - theoretical| / |theoretical| × 100%. The absolute values ensure the result is always non-negative, showing how far off your measurement is from the accepted value."}},{"@type":"Question","name":"Can percent error be negative?","acceptedAnswer":{"@type":"Answer","text":"By standard convention percent error is reported as a positive number because of the absolute value bars in the formula. If you want the sign to indicate direction (over vs under the accepted value), drop the absolute value to get percent difference with sign."}},{"@type":"Question","name":"What is a good percent error?","acceptedAnswer":{"@type":"Answer","text":"It depends on the experiment. In many school labs under 5% is considered good, while precision engineering may require under 0.1%. Anything close to 0% means your experimental value matches the accepted value."}},{"@type":"Question","name":"Why is my percent error so high?","acceptedAnswer":{"@type":"Answer","text":"Common causes include measurement instrument limitations, human error reading instruments, uncontrolled environmental factors, calibration issues, or using an incorrect accepted (theoretical) value for comparison."}}]}</script>

      <input type="number" id="expVal" step="any" value="9.8">

      <input type="number" id="theoVal" step="any" value="9.81">
    </div>

    <div class="pe-result" id="result">
      <div class="pe-big" id="resultBig">—</div>

  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{
    toolTitle:'Percent Error Calculator',
    toolDesc:'Calculate the percent error between an experimental value and a theoretical (accepted) value. Shows the formula and a step-by-step breakdown.',
    lblExp:'Experimental (measured) value',
    lblTheo:'Theoretical (accepted) value',
    calculate:'⚡ Calculate',
    copy:'Copy',clear:'Clear',
    resultLabel:'Percent error',
    formulaText:'Formula: |experimental − theoretical| / |theoretical| × 100%',
    step:'Step',
    stepAbsDiff:'Absolute difference',
    stepDivide:'Divide by theoretical value',
    stepMultiply:'Multiply by 100',
    zeroTheo:'Theoretical value cannot be zero.',
    enterBoth:'Enter both values and press Calculate.',
    step1:'Enter your experimental (measured) value',
    step2:'Enter the theoretical (accepted, true) value',
    step3:'Press Calculate to get the percent error instantly',
    step4:'Read the formula breakdown to see each step',
  },
  zh:{
    toolTitle:'百分比误差计算器',
    toolDesc:'计算实验值与理论值（公认值）之间的百分比误差。显示公式和逐步计算过程。',
    lblExp:'实验值（测量值）',
    lblTheo:'理论值（公认值）',
    calculate:'⚡ 计算',
    copy:'复制',clear:'清空',
    resultLabel:'百分比误差',
    formulaText:'公式：|实验值 − 理论值| / |理论值| × 100%',
    step:'步骤',
    stepAbsDiff:'绝对差值',
    stepDivide:'除以理论值',
    stepMultiply:'乘以 100',
    zeroTheo:'理论值不能为零。',
    enterBoth:'请输入两个值后点击计算。',
    step1:'输入实验值（测量值）',
    step2:'输入理论值（公认值 / 真值）',
    step3:'点击「计算」立即得到百分比误差',
    step4:'查看公式分解，了解每一步的计算',
  }
});

const { $, copyText, t } = GZ;

function fmt(n){ if(!isFinite(n)) return String(n); const r = Math.round(n*1e6)/1e6; return r.toLocaleString('en-US',{maximumFractionDigits:6}); }

function calc(){
  const e = parseFloat($('#expVal').value);
  const th = parseFloat($('#theoVal').value);
  if(isNaN(e)||isNaN(th)){ $('#resultBig').textContent='—'; $('#resultMeta').textContent=t('enterBoth'); $('#formula').textContent=t('formulaText'); return; }
  if(th===0){ $('#resultBig').textContent='—'; $('#resultMeta').textContent=t('zeroTheo'); $('#formula').textContent=t('formulaText'); return; }
  const diff = Math.abs(e-th);
  const pct = diff/Math.abs(th)*100;
  $('#resultBig').textContent = fmt(pct)+'%';
  $('#resultMeta').textContent = t('resultLabel');
  $('#formula').innerHTML =
    `<div>${t('formulaText')}</div>`+
    `<div style="margin-top:8px">${t('step')} 1 — ${t('stepAbsDiff')}: |${fmt(e)} − ${fmt(th)}| = <b>${fmt(diff)}</b></div>`+
    `<div>${t('step')} 2 — ${t('stepDivide')}: ${fmt(diff)} / ${fmt(Math.abs(th))} = <b>${fmt(diff/Math.abs(th))}</b></div>`+
    `<div>${t('step')} 3 — ${t('stepMultiply')}: ${fmt(diff/Math.abs(th))} × 100 = <b>${fmt(pct)}%</b></div>`;
}

$('#calcBtn').addEventListener('click',calc);
$('#expVal').addEventListener('keydown',e=>{if(e.key==='Enter')calc();});
$('#theoVal').addEventListener('keydown',e=>{if(e.key==='Enter')calc();});
$('#expVal').addEventListener('input',calc);
$('#theoVal').addEventListener('input',calc);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#resultBig').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#expVal').value='';$('#theoVal').value='';calc()">${t('clear')}</button>`;

$('#lbl-exp') ? ($('#lbl-exp').textContent=t('lblExp'),$('#lbl-theo').textContent=t('lblTheo')) : null;

GZ.renderToolPage({
  category:'calc',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'%',href:'/calc/percentage-calculator.html',name:'Percentage Calculator'},
    {icon:'📐',href:'/calc/equation-solver.html',name:'Equation Solver'},
    {icon:'🔢',href:'/calc/prime-number.html',name:'Prime Number Checker'},
    {icon:'➗',href:'/calc/fraction-calculator.html',name:'Fraction Calculator'},
  ]
});
calc();
</script>
<script src="/tools-result-rec.js" defer></script>
