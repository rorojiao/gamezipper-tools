</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Percentage Calculator',
    toolDesc: 'Calculate percentages instantly — percentage of a number, percentage change, and more.',
    s1Title: '🔢 What is X% of Y?',
    s1Label: 'of',
    s1Result: '=',
    s2Title: '📊 X is what % of Y?',
    s2Label: 'is what % of',
    s3Title: '📈 Percentage Change',
    s3From: 'From',
    s3To: 'to',
    s3Change: 'Change',
    s4Title: '➕ Increase/Decrease by %',
    s4Label: 'by',
    s4Result: '=',
    clear: 'Clear All',
    step1: 'Choose a percentage calculation type above',
    step2: 'Enter your numbers in the input fields',
    step3: 'Results are calculated instantly as you type',
    step4: 'Use multiple modes for different calculations',
  },
  zh: {
    toolTitle: '百分比计算器',
    toolDesc: '即时计算百分比 — 求百分比值、百分比变化等。',
    s1Title: '🔢 X% 的 Y 是多少？',
    s1Label: '的',
    s1Result: '=',
    s2Title: '📊 X 是 Y 的百分之几？',
    s2Label: '是',
    s2Suffix: '的百分之几？',
    s3Title: '📈 百分比变化',
    s3From: '从',
    s3To: '到',
    s3Change: '变化',
    s4Title: '➕ 增加或减少百分比',
    s4Label: '后 =',
    s4Result: '=',
    clear: '全部清除',
    step1: '选择上方的百分比计算类型',
    step2: '在输入框中输入数字',
    step3: '输入时即时计算结果',
    step4: '使用不同模式进行多种计算',
  }
});

const { $, t } = GZ;

function calcSection(title, inputs, resultId, calcFn) {
  let html = `<div class="calc-section"><h3>${title}</h3><div class="calc-row">`;
  inputs.forEach((inp, i) => {
    html += `<input type="number" id="${inp.id}" placeholder="${inp.ph}" oninput="recalc()">`;
    if (inp.label) html += `<span>${inp.label}</span>`;
  });
  html += `<span class="calc-result" id="${resultId}">—</span></div></div>`;
  return html;
}

const area = $('#calc-area');
area.innerHTML = calcSection(t('s1Title'),
  [{id:'s1a',ph:'%'},{id:'s1b',ph:'',label:t('s1Label')}],
  's1r') +
  calcSection(t('s2Title'),
  [{id:'s2a',ph:''},{id:'s2b',ph:'',label:t('s2Label')}],
  's2r') +
  calcSection(t('s3Title'),
  [{id:'s3a',ph:t('s3From')},{id:'s3b',ph:t('s3To')}],
  's3r') +
  calcSection(t('s4Title'),
  [{id:'s4a',ph:''},{id:'s4b',ph:'%',label:t('s4Label')}],
  's4r');

function recalc() {
  const s1a = parseFloat($('#s1a').value);
  const s1b = parseFloat($('#s1b').value);
  if (!isNaN(s1a) && !isNaN(s1b)) {
    $('#s1r').textContent = (s1a / 100 * s1b).toFixed(4).replace(/\.?0+$/, '');
  } else { $('#s1r').textContent = '—'; }

  const s2a = parseFloat($('#s2a').value);
  const s2b = parseFloat($('#s2b').value);
  if (!isNaN(s2a) && !isNaN(s2b) && s2b !== 0) {
    $('#s2r').textContent = (s2a / s2b * 100).toFixed(4).replace(/\.?0+$/, '') + '%';
  } else { $('#s2r').textContent = '—'; }

  const s3a = parseFloat($('#s3a').value);
  const s3b = parseFloat($('#s3b').value);
  if (!isNaN(s3a) && !isNaN(s3b) && s3a !== 0) {
    const change = ((s3b - s3a) / Math.abs(s3a) * 100).toFixed(4).replace(/\.?0+$/, '');
    const sign = change > 0 ? '+' : '';
    $('#s3r').textContent = sign + change + '%';
  } else { $('#s3r').textContent = '—'; }

  const s4a = parseFloat($('#s4a').value);
  const s4b = parseFloat($('#s4b').value);
  if (!isNaN(s4a) && !isNaN(s4b)) {
    $('#s4r').textContent = (s4a * (1 + s4b / 100)).toFixed(4).replace(/\.?0+$/, '');
  } else { $('#s4r').textContent = '—'; }
}

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="document.querySelectorAll('input[type=number]').forEach(i=>i.value='');recalc()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [

    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
    {icon:'📐', href:'/calc/aspect-ratio.html', name:'Aspect Ratio'},
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
  ]
});
</script>
