const { $, copyText, t } = GZ;

function parseCSV(text, delim){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++){
    const ch = text[i], next = text[i+1];
    if (inQuotes){
      if (ch === '"' && next === '"'){ field += '"'; i++; }
      else if (ch === '"'){ inQuotes = false; }
      else field += ch;
    } else {
      if (ch === '"'){ inQuotes = true; }
      else if (ch === delim){ row.push(field); field = ''; }
      else if (ch === '\n'){ row.push(field); rows.push(row); row = []; field = ''; }
      else if (ch === '\r'){ /* ignore */ }
      else field += ch;
    }
  }
  if (field !== '' || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r => r.some(c => c.trim() !== ''));
}

function isNumber(v){ return v !== '' && !isNaN(Number(v)) && isFinite(Number(v)); }
function isInt(v){ return isNumber(v) && /^-?\d+$/.test(v.trim()); }
const BOOL_TRUE = /^(true|yes|y|t)$/i, BOOL_FALSE = /^(false|no|n|f)$/i;
function isBool(v){ return BOOL_TRUE.test(v) || BOOL_FALSE.test(v); }
function boolVal(v){ return BOOL_TRUE.test(v); }

function inferColumn(values){
  const nonEmpty = values.filter(v => v !== '');
  if (!nonEmpty.length) return { type: 'str' };
  let allInt = true, allNum = true, allBool = true;
  for (const v of nonEmpty){
    if (!isInt(v)) allInt = false;
    if (!isNumber(v)) allNum = false;
    if (!isBool(v)) allBool = false;
  }
  if (allInt) return { type: 'int' };
  if (allNum) return { type: 'float' };
  if (allBool) return { type: 'bool' };
  return { type: 'str' };
}

// Convert a raw cell value to its Python literal form based on column type
function cellLit(v, type){
  if (v === '') return 'None';
  if (type === 'int'){ const n = parseInt(v, 10); return Number.isFinite(n) ? String(n) : 'None'; }
  if (type === 'float'){ const n = parseFloat(v); return Number.isFinite(n) ? String(n) : 'None'; }
  if (type === 'bool') return BOOL_TRUE.test(v) ? 'True' : 'False';
  return JSON.stringify(v);
}

function pyTypeName(type){
  return ({ int: 'int', float: 'float', bool: 'bool', str: 'str' })[type] || 'str';
}

function safeIdent(name, fallback){
  let s = String(name).trim();
  s = s.replace(/[^a-zA-Z0-9_]+/g, '_').replace(/^_+|_+$/g, '');
  if (!s) s = fallback;
  if (/^[0-9]/.test(s)) s = '_' + s;
  return s;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function highlight(code){
  const tokenRe = /('(?:\\.|[^'\\])*'|(?:\\.|[^'\\])*"(?:\\.|[^"\\])*")|(#.*$)|(@?\w[\w.]*)|(\s+)|([^\s'"\w#@]+)/gm;
  let out = '', m;
  while ((m = tokenRe.exec(code)) !== null){
    const [full, str, com, word, ws, punct] = m;
    if (str) out += `<span class="py-str">${esc(str)}</span>`;
    else if (com) out += `<span class="py-com">${esc(com)}</span>`;
    else if (word){
      let cls = null;
      if (word === 'True' || word === 'False') cls = 'py-bool';
      else if (word === 'None') cls = 'py-none';
      else if (/^(class|from|import|def|return|as|with|print)$/.test(word) || word === '@dataclass') cls = 'py-kw';
      else if (/^-?\d/.test(word) && !isNaN(parseFloat(word))) cls = 'py-num';
      if (cls) out += `<span class="${cls}">${esc(word)}</span>`;
      else out += esc(word);
    } else out += esc(full);
  }
  return out;
}

function buildData(rows, headers, types){
  return rows.map(r => {
    const pairs = headers.map((h, i) => `${JSON.stringify(h)}: ${cellLit(r[i] ?? '', types[i].type)}`);
    return '    {' + pairs.join(', ') + '}';
  });
}

function convert(){
  const raw = $('#input').value;
  if (!raw.trim()){ $('#output').textContent=''; $('#status').innerHTML=''; return; }
  const delimStr = $('#delim').value;
  const delim = delimStr === '\\t' ? '\t' : delimStr;
  const rows = parseCSV(raw, delim);
  if (rows.length < 1){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('empty')}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${t('empty')}</span>`;
    return;
  }
  const headers = rows[0];
  if (!headers.some(h => h.trim() !== '')){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('needHeader')}</span>`;
    $('#output').textContent = '';
    return;
  }
  const dataRows = rows.slice(1);
  const types = headers.map((_, i) => inferColumn(dataRows.map(r => r[i] ?? '')));
  const style = $('#styleSel').value;
  const className = safeIdent($('#className').value || 'Row', 'Row');
  let code = '';

  if (style === 'dict'){
    const dicts = buildData(dataRows, headers, types);
    code = 'data = [\n' + dicts.join(',\n') + '\n]\n';
  } else if (style === 'dataclass'){
    const typeImports = new Set();
    types.forEach(ty => { if (pyTypeName(ty.type) === 'float') typeImports.add('float'); });
    code = 'from dataclasses import dataclass\n\n\n';
    code += `@dataclass\nclass ${className}:\n`;
    headers.forEach((h, i) => {
      code += `    ${safeIdent(h, 'field_' + (i+1))}: ${pyTypeName(types[i].type)}\n`;
    });
    code += '\n\n# instances\n';
    code += 'rows = [\n';
    dataRows.forEach(r => {
      const args = headers.map((h, i) => cellLit(r[i] ?? '', types[i].type));
      code += `    ${className}(${args.join(', ')}),\n`;
    });
    code += ']\n';
  } else if (style === 'namedtuple'){
    code = 'from typing import NamedTuple\n\n\n';
    const fields = headers.map((h, i) => `${safeIdent(h, 'field_' + (i+1))}: ${pyTypeName(types[i].type)}`);
    code += `class ${className}(NamedTuple):\n`;
    fields.forEach(f => { code += `    ${f}\n`; });
    code += '\n\n# instances\n';
    code += 'rows = [\n';
    dataRows.forEach(r => {
      const args = headers.map((h, i) => cellLit(r[i] ?? '', types[i].type));
      code += `    ${className}(${args.join(', ')}),\n`;
    });
    code += ']\n';
  } else if (style === 'pandas'){
    const dicts = buildData(dataRows, headers, types);
    code = 'import pandas as pd\n\n\n';
    code += 'data = [\n' + dicts.join(',\n') + '\n]\n\n';
    code += `df = pd.DataFrame(data)\n`;
    code += 'print(df.head())\n';
  }

  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('ok')(dataRows.length)}</span>`;
  $('#output').innerHTML = highlight(code);
}

function loadExample(){
  $('#input').value = 'id,name,email,age,active,joined\n' +

    '4,Dave,dave@example.com,41.5,true,2024-04-05';
  convert();
}
