/* ---------- Minimal JSON5 parser ---------- */
/* Parses JSON5 syntax into native JS values.
   Supports: comments (// and / *), trailing commas, unquoted keys,
   single-quoted strings, multi-line template strings, hex/infinity/nan numbers,
   escaped identifiers. Returns {value} on success, throws Error on failure. */
function parseJSON5(text){
  let pos = 0;
  const src = text;
  const len = src.length;

  function err(msg){
    /* compute line/col */
    let line=1,col=1;
    for(let i=0;i<pos&&i<len;i++){
      if(src[i]==='\n'){line++;col=1;}else col++;
    }
    return new Error(msg+' at line '+line+', column '+col);
  }

  function skipWS(){
    while(pos<len){
      const c=src[pos];
      if(c===' '||c==='\t'||c==='\n'||c==='\r'||c==='\f'||c==='\v'){pos++;continue;}
      if(c==='/'&&src[pos+1]==='/'){pos+=2;while(pos<len&&src[pos]!=='\n')pos++;continue;}
      if(c==='/'&&src[pos+1]==='*'){pos+=2;while(pos<len&&!(src[pos]==='*'&&src[pos+1]==='/'))pos++;pos+=2;continue;}
      break;
    }
  }

  function parseValue(){
    skipWS();
    if(pos>=len) throw err('Unexpected end of input');
    const c=src[pos];
    if(c==='{') return parseObject();
    if(c==='[') return parseArray();
    if(c==='"'||c==="'") return parseString(c);
    if(c==='`') return parseTpl();
    /* number or keyword */
    return parseNumberOrKeyword();
  }

  function parseObject(){
    pos++; /* { */
    const obj={};
    skipWS();
    if(src[pos]==='}'){pos++;return obj;}
    while(true){
      skipWS();
      if(pos>=len) throw err('Unterminated object');
      if(src[pos]==='}'){pos++;break;}
      /* key */
      let key;
      const c=src[pos];
      if(c==='"'||c==="'") key=parseString(c);
      else if(c==='['){
        /* computed key with string inside */
        pos++;
        skipWS();
        key=parseString(src[pos]);
        skipWS();
        if(src[pos]!==']') throw err('Expected ] in computed key');
        pos++;
      } else {
        /* identifier key */
        let id='';
        while(pos<len){
          const ch=src[pos];
          if(/[A-Za-z0-9_$\-]/.test(ch)){id+=ch;pos++;}
          else if(ch==='\\'){pos++;id+=src[pos];pos++;}
          else break;
        }
        if(!id) throw err('Expected property name');
        key=id;
      }
      skipWS();
      if(src[pos] !== ':') throw err("Expected ':' after key '"+key+"'");
      pos++;
      skipWS();
      obj[key]=parseValue();
      skipWS();
      if(src[pos]===','){pos++;skipWS();continue;}
      if(src[pos]==='}'){pos++;break;}
      /* trailing comma or end — if we reach here without comma or }, error */
      if(pos>=len) throw err('Unterminated object');
    }
    return obj;
  }

  function parseArray(){
    pos++; /* [ */
    const arr=[];
    skipWS();
    if(src[pos]===']'){pos++;return arr;}
    while(true){
      skipWS();
      if(pos>=len) throw err('Unterminated array');
      if(src[pos]===']'){pos++;break;}
      arr.push(parseValue());
      skipWS();
      if(src[pos]===','){pos++;skipWS();continue;}
      if(src[pos]===']'){pos++;break;}
      if(pos>=len) throw err('Unterminated array');
    }
    return arr;
  }

  function parseString(quote){
    pos++; /* skip quote */
    let out='';
    while(pos<len){
      const c=src[pos];
      if(c===quote){pos++;return out;}
      if(c==='\\'){
        pos++;
        const e=src[pos];
        if(e==='n'){out+='\n';pos++;}
        else if(e==='t'){out+='\t';pos++;}
        else if(e==='r'){out+='\r';pos++;}
        else if(e==='b'){out+='\b';pos++;}
        else if(e==='f'){out+='\f';pos++;}
        else if(e==='v'){out+='\v';pos++;}
        else if(e==='0'){out+='\0';pos++;}
        else if(e==='"'||e==="'"||e==='\\'||e==='/'){out+=e;pos++;}
        else if(e==='u'){pos++;const hex=src.substr(pos,4);out+=String.fromCharCode(parseInt(hex,16));pos+=4;}
        else if(e==='x'){pos++;const hex=src.substr(pos,2);out+=String.fromCharCode(parseInt(hex,16));pos+=2;}
        else if(e==='\n'){pos++;} /* line continuation */
        else {out+=e;pos++;}
      } else {
        out+=c;pos++;
      }
    }
    throw err('Unterminated string');
  }

  function parseTpl(){
    pos++; /* skip backtick */
    let out='';
    while(pos<len){
      const c=src[pos];
      if(c==='`'){pos++;return out;}
      if(c==='\\'){
        const e=src[pos+1];
        if(e==='n'){out+='\n';pos+=2;}
        else if(e==='t'){out+='\t';pos+=2;}
        else {out+=e;pos+=2;}
      } else {
        out+=c;pos++;
      }
    }
    throw err('Unterminated template string');
  }

  function parseNumberOrKeyword(){
    const start=pos;
    /* check for Infinity, NaN, -Infinity, -NaN */
    if(src[pos]==='-'||src[pos]==='+'){pos++;}
    const c2=src[pos];
    /* keyword */
    const kwMatch=src.substr(pos).match(/^(Infinity|NaN|true|false|null)\b/);
    if(kwMatch){
      pos+=kwMatch[0].length;
      const sign=src[start]==='-'?-1:1;
      const raw=src[start]==='-'||src[start]==='+'?kwMatch[0]:kwMatch[0];
      if(raw==='Infinity') return sign*Infinity;
      if(raw==='NaN') return NaN;
      if(raw==='true') return true;
      if(raw==='false') return false;
      if(raw==='null') return null;
    }
    /* hex */
    if(src[pos]==='0'&&(src[pos+1]==='x'||src[pos+1]==='X')){
      pos+=2;
      let hex='';
      while(pos<len&&/[0-9a-fA-F]/.test(src[pos])){hex+=src[pos];pos++;}
      return parseInt(hex,16);
    }
    /* regular number */
    let numStr='';
    while(pos<len){
      const ch=src[pos];
      if(/[0-9+\-.eE]/.test(ch)){numStr+=ch;pos++;}
      else break;
    }
    if(!numStr) throw err('Unexpected character: '+JSON.stringify(src[start]));
    const num=parseFloat(numStr);
    if(isNaN(num)) throw err('Invalid number: '+numStr);
    return num;
  }

  const result=parseValue();
  skipWS();
  if(pos<len) throw err('Unexpected trailing characters');
  return result;
}

/* ---------- JSON5 syntax highlight ---------- */
function syntaxHighlight(json){
  json = json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false)\b|\bnull\b|-?\d+(?:\.\d+)?(?:[eE][+\-]?\d+)?)/g, m => {
    let cls='json-number';
    if(/^"/.test(m)) cls=/:$/.test(m)?'json-key':'json-string';
    else if(/true|false/.test(m)) cls='json-bool';
    else if(/null/.test(m)) cls='json-null';
    return '<span class="'+cls+'">'+m+'</span>';
  });
}

let indent = 2;

function doFormat(){
  const inp=$('#input').value.trim();
  if(!inp){$('#output').innerHTML='';$('#status').innerHTML='';return;}
  const sel=$('#indentSel').value;
  indent = sel==='\t'?'\t':parseInt(sel);

  let value;
  try{
    value = parseJSON5(inp);
  }catch(e){
    $('#output').textContent='';
    $('#status').innerHTML='<span style="color:var(--gz-accent)">'+t('jsonInvalid')+e.message+'</span>';
    return;
  }

  /* replace Infinity/NaN with null for valid JSON output */
  const replacer = function(k,v){
    if(typeof v==='number'){
      if(!isFinite(v)) return null;
    }
    return v;
  };

  let out;
  if(indent===0){
    out = JSON.stringify(value, replacer);
  } else {
    out = JSON.stringify(value, replacer, indent);
  }

  if($('#optQuotes').checked){
    $('#output').innerHTML = syntaxHighlight(out);
  } else {
    $('#output').textContent = out;
  }
  $('#status').innerHTML='<span style="color:var(--gz-success)">'+t('jsonValid')+' ('+out.length+' chars)</span>';
}
window.doFormat=doFormat;

function doMinify(){
  $('#indentSel').value='0';
