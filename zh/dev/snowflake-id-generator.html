lblEpoch:'纪元（毫秒）',
hintEpoch:'Twitter 默认：1288834974657（2010-11-04）。Discord：1420070400000（2015-01-01）。',
lblWorker:'Worker / 机器 ID',
lblSeq:'序列号',

lblDecEpoch:'该 ID 使用的纪元',

}
});

const { $, copyText, t } = GZ;

// Snowflake layout (Twitter/Discord canonical):
//  1 bit sign (always 0) | 41 bits timestamp ms | 10 bits worker | 12 bits sequence
const SEQ_BITS   = 12;
const WORKER_BITS= 10;
const SEQ_MASK   = (1 << SEQ_BITS) - 1;          // 4095
const WORKER_MASK= (1 << WORKER_BITS) - 1;       // 1023
const MAX_ID     = BigInt(2) ** BigInt(63) - BigInt(1);   // signed 63-bit max

function buildSnowflake(epochMs, workerId, seq, tsMs){
  tsMs = tsMs || Date.now();
  const ts    = BigInt(tsMs) - BigInt(epochMs);
  const worker= BigInt(workerId) & BigInt(WORKER_MASK);
  const s     = BigInt(seq) & BigInt(SEQ_MASK);
  const id    = (ts << BigInt(WORKER_BITS + SEQ_BITS))
              | (worker << BigInt(SEQ_BITS))
              | s;
  return id;
}

function decodeSnowflake(idBig, epochMs){
  const seq    = Number(idBig & BigInt(SEQ_MASK));
  const worker = Number((idBig >> BigInt(SEQ_BITS)) & BigInt(WORKER_MASK));
  const ts     = idBig >> BigInt(WORKER_BITS + SEQ_BITS);
  const ms     = Number(ts) + Number(epochMs);
  return { seq, worker, ts: Number(ts), ms };
}

function fmtDate(ms){
  if(!isFinite(ms)) return '—';
  return new Date(ms).toISOString().replace('T',' ').replace(/\.\d+Z$/,' UTC');
}

// ---- Generate ----
function genOne(){
  const epoch  = parseInt($('#g-epoch').value) || 0;
  const worker = parseInt($('#g-worker').value) || 0;
  const seq    = parseInt($('#g-seq').value) || 0;
  const ts     = Date.now();
  const id     = buildSnowflake(epoch, worker, seq, ts);
  $('#g-out').textContent = id.toString();
  $('#g-when').value = fmtDate(ts);
  // bit breakdown (top 63 bits as string with separators)
  const bits = id.toString(2).padStart(63,'0');
  const sign = bits[0];
  const tBits= bits.substr(1,41);
  const wBits= bits.substr(42,10);
  const sBits= bits.substr(52,12);
  $('#g-bits').innerHTML =
    '<span style="color:var(--text3)">sign['+sign+']</span> | '+
    '<span style="color:var(--accent)">ts['+tBits+']</span> | '+
    '<span style="color:#00d672">worker['+wBits+']</span> | '+
    '<span style="color:#ffd93d">seq['+sBits+']</span>';
}

// ---- Decode ----
function decode(){
  const raw = ($('#d-id').value || '').trim();
  const errEl = $('#d-error');
  const grid = $('#d-grid');
  errEl.style.display = 'none';
  if(!raw){
    grid.innerHTML = '';
    return;
  }
  // accept decimal, 0x hex, 0b binary
  let idBig;
  try {
    if(/^0x[0-9a-f]+$/i.test(raw)) idBig = BigInt(raw);
    else if(/^\d+$/.test(raw))    idBig = BigInt(raw);
    else throw new Error('not a number');
  } catch(e){
    errEl.style.display = 'block';
    errEl.textContent = '✗ Not a valid Snowflake ID. Use decimal or 0x-hex.';
    grid.innerHTML = '';
    return;
  }
  if(idBig < 0n || idBig > MAX_ID){
    errEl.style.display = 'block';
    errEl.textContent = '✗ ID out of 63-bit range (max ' + MAX_ID.toString() + ').';
    grid.innerHTML = '';
    return;
  }
  const epoch = parseInt($('#d-epoch').value) || 0;
  const d = decodeSnowflake(idBig, epoch);
  grid.innerHTML = [
    ['Timestamp (ms since epoch)', d.ts.toLocaleString()],
    ['Created at (UTC)',           fmtDate(d.ms)],
    ['Worker / machine ID',        d.worker.toString()],
    ['Sequence',                   d.seq.toString()],
    ['Binary',                     idBig.toString(2).padStart(63,'0')],
    ['Hex',                        '0x' + idBig.toString(16).toUpperCase()],
  ].map(([k,v])=>'<div class="decode-cell"><div class="k">'+k+'</div><div class="v">'+v+'</div></div>').join('');
}

// ---- Batch ----
let batchIds = [];
function genBatch(){
  const n      = Math.min(1000, Math.max(1, parseInt($('#b-count').value) || 10));
  const epoch  = parseInt($('#b-epoch').value) || 0;
  const worker = parseInt($('#b-worker').value) || 0;
  // Simulate real Snowflake: same ms shares sequence counter, advance ms as needed
  const start = Date.now();
  batchIds = [];
  let curTs = start, seq = 0;
  for(let i=0;i<n;i++){
    if(seq > SEQ_MASK){ curTs++; seq = 0; }
    batchIds.push(buildSnowflake(epoch, worker, seq, curTs));
    seq++;
  }
  renderBatch();
}
function renderBatch(){
  const out = $('#b-out');
  if(!batchIds.length){ out.innerHTML = '<div style="color:var(--text3);font-size:.85em">No IDs yet — click Generate.</div>'; return; }
  out.innerHTML = batchIds.map((id,i)=>
    '<div class="row"><span>'+(i+1)+'. '+id.toString()+'</span>'+
    '<button class="gz-btn gz-btn-secondary" style="padding:3px 10px;font-size:.78em" onclick="copyText(\''+id.toString()+'\')">copy</button></div>'
  ).join('');
}

// ---- Tab switching ----
function switchTab(name){
  ['gen','dec','batch'].forEach(n=>{
    $('#tab-'+n).classList.toggle('active', n===name);
    $('#panel-'+n).classList.toggle('active', n===name);
  });
  if(name==='gen') genOne();
  if(name==='dec') decode();
  if(name==='batch' && !batchIds.length) genBatch();
}
