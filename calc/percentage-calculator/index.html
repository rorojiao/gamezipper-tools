.calc-section{background:var(--glass);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem}
.calc-section h3{font-size:1rem;margin-bottom:1rem;color:var(--accent2)}
.calc-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:0.5rem;font-size:0.95rem}
.calc-row input{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;color:var(--text);font-size:1rem;width:120px;text-align:center;touch-action:manipulation}

.result-highlight{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-top:8px;text-align:center;padding:0.5rem}

<body>
<div class="gz-container">
<div class="gz-tool-header">
<h1>📊 Percentage Calculator</h1>
<p class="desc">Three modes for all your percentage calculations</p>
</div>
<div class="calc-section">
<h3>1️⃣ What is X% of Y?</h3>
<div class="calc-row">
<span>What is</span>
<input type="number" id="p1x" oninput="calc1()" placeholder="X">
<span>% of</span>
<input type="number" id="p1y" oninput="calc1()" placeholder="Y">
<span>?</span>
</div>
<div class="result-highlight" id="r1">—</div>
</div>
<div class="calc-section">
<h3>2️⃣ X is what % of Y?</h3>
<div class="calc-row">
<input type="number" id="p2x" oninput="calc2()" placeholder="X">
<span>is what % of</span>
<input type="number" id="p2y" oninput="calc2()" placeholder="Y">
<span>?</span>
</div>
<div class="result-highlight" id="r2">—</div>
</div>
<div class="calc-section">
<h3>3️⃣ Percentage change from X to Y</h3>
<div class="calc-row">
<span>From</span>
<input type="number" id="p3x" oninput="calc3()" placeholder="X">
<span>to</span>
<input type="number" id="p3y" oninput="calc3()" placeholder="Y">
</div>
<div class="result-highlight" id="r3">—</div>
</div>
</div>
<script>
GZ.renderHeader('calc');GZ.renderFooter();
new Image().src="https://site-analytics.cap.1ktower.com/hit?s=tools.gamezipper.com&p="+encodeURIComponent(location.pathname);
function calc1(){const x=parseFloat(document.getElementById('p1x').value);const y=parseFloat(document.getElementById('p1y').value);if(isNaN(x)||isNaN(y)){document.getElementById('r1').textContent='—';return}document.getElementById('r1').textContent=(x/100*y).toFixed(4).replace(/\.?0+$/,'')}
function calc2(){const x=parseFloat(document.getElementById('p2x').value);const y=parseFloat(document.getElementById('p2y').value);if(isNaN(x)||isNaN(y)||y===0){document.getElementById('r2').textContent='—';return}document.getElementById('r2').textContent=(x/y*100).toFixed(4).replace(/\.?0+$/,'')+'%'}
function calc3(){const x=parseFloat(document.getElementById('p3x').value);const y=parseFloat(document.getElementById('p3y').value);if(isNaN(x)||isNaN(y)||x===0){document.getElementById('r3').textContent='—';return}const change=((y-x)/Math.abs(x)*100).toFixed(4).replace(/\.?0+$/,'');document.getElementById('r3').textContent=(change>0?'+':'')+change+'%'}
</script>
