<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I remove punctuation from text online?", "acceptedAnswer": {"@type": "Answer", "text": "Paste your text into the input box, choose which punctuation marks to remove (or remove all of them), and the cleaned text appears instantly in the output area. You can then copy or download the result."}}, {"@type": "Question", "name": "Will removing punctuation also remove numbers and spaces?", "acceptedAnswer": {"@type": "Answer", "text": "No. By default only punctuation marks are removed. Numbers, letters, spaces and line breaks stay intact. You can optionally choose to also remove extra spaces that appear where punctuation was deleted."}}, {"@type": "Question", "name": "What counts as punctuation?", "acceptedAnswer": {"@type": "Answer", "text": "Punctuation includes period, comma, semicolon, colon, exclamation mark, question mark, quotation marks, apostrophe, hyphen, dash, parentheses, brackets, braces, slash, backslash, ellipsis and asterisk. The tool recognizes the full Unicode punctuation range."}}, {"@type": "Question", "name": "Is my text uploaded to a server?", "acceptedAnswer": {"@type": "Answer", "text": "No. All processing happens locally in your browser. Your text never leaves your device, making this tool safe for confidential or sensitive content."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Remove Punctuation',
    toolDesc: 'Strip punctuation marks from any text — remove periods, commas, quotes, hyphens and more. Choose which marks to remove, keep numbers and spaces intact.',
    optAll: 'Remove all punctuation',
    optKeepApostrophe: 'Keep apostrophes (don\'t → dont stays don\'t)',
    optKeepHyphen: 'Keep hyphens (well-known stays)',
    optTrimSpace: 'Clean up extra spaces',
    optRemoveAll: 'Also remove numbers',
    removed: 'Marks removed',
    words: 'words',
    chars: 'characters',
    step1: 'Paste or type your text in the input area',
    step2: 'Tick the options — remove all punctuation, or keep apostrophes and hyphens',
    step3: 'Optionally clean up extra spaces left behind',
    step4: 'Click Copy to copy the cleaned text to clipboard',
  },
  zh: {
    toolTitle: '去除标点符号',
    toolDesc: '从任意文本中删除标点符号 — 移除句号、逗号、引号、连字符等。可选择要删除的符号，保留数字和空格。',
    optAll: '删除全部标点',
    optKeepApostrophe: '保留撇号',
    optKeepHyphen: '保留连字符',
    optTrimSpace: '清理多余空格',
    optRemoveAll: '同时删除数字',
    removed: '已删除符号',
    words: '词数',
    chars: '字符数',
    step1: '在输入区粘贴或输入文本',
    step2: '勾选选项 — 删除全部标点，或保留撇号和连字符',
    step3: '可选：清理删除后留下的多余空格',
    step4: '点击「复制」将结果复制到剪贴板',
  }
});

const {$, copyText, t} = GZ;

// Unicode punctuation ranges (covers most scripts)
const PUNCT_RE = /[\u0021-\u002F\u003A-\u0040\u005B-\u0060\u007B-\u007E\u00A1\u00A7\u00AB\u00B6-\u00B7\u00BB\u00BF\u037E\u0387\u055A-\u055F\u0589-\u0590\u05BE\u05C0\u05C3\u05C6\u05F3-\u05F4\u0609-\u060A\u060C\u060D\u061B\u061E-\u061F\u066A-\u066D\u06D4\u0700-\u070D\u07F7-\u07F9\u0830-\u083E\u085E\u0964-\u0965\u0970\u09FD\u0A76\u0AF0\u0C84\u0DF4\u0E4F\u0E5A-\u0E5B\u0F04-\u0F12\u0F14\u0F3A-\u0F3D\u0F85\u0FD0-\u0FD4\u0FD9-\u0FDA\u104A-\u104F\u10FB\u1360-\u1368\u1400\u166D-\u166E\u169B-\u169C\u16EB-\u16ED\u1735-\u1736\u17D4-\u17D6\u17D8-\u17DA\u1800-\u180A\u1944-\u1945\u1A1E-\u1A1F\u1AA0-\u1AA6\u1AA8-\u1AAD\u1B5A-\u1B60\u1BFC-\u1BFF\u1C3B-\u1C3F\u1C7E-\u1C7F\u1CC0-\u1CC7\u1CD3\u2010-\u2027\u2030-\u2043\u2045-\u2051\u2053-\u205E\u207D-\u207E\u208D-\u208E\u2308-\u230B\u2329-\u232A\u2768-\u2775\u27C5-\u27C6\u27E6-\u27EF\u2983-\u2998\u29D8-\u29DB\u29FC-\u29FD\u2CF9-\u2CFC\u2CFE-\u2CFF\u2D70\u2E00-\u2E2E\u2E30-\u2E4E\u3001-\u3003\u3008-\u3011\u3014-\u301F\u3030\u303D\u30A0\u30FB\uA4FE-\uA4FF\uA60D-\uA60F\uA673\uA67E\uA6F2-\uA6F7\uA874-\uA877\uA8CE-\uA8CF\uA8F8-\uA8FA\uA8FC\uA92E-\uA92F\uA95F\uA9C1-\uA9CD\uA9DE-\uA9DF\uAA5C-\uAA5F\uAADE-\uAADF\uAAF0-\uAAF1\uABEB\uFD3E-\uFD3F\uFE10-\uFE19\uFE30-\uFE52\uFE54-\uFE61\uFE63\uFE68\uFE6A-\uFE6B\uFF01-\uFF0F\uFF1A-\uFF20\uFF3B-\uFF40\uFF5B-\uFF65]/g;
const HYPHEN_RE = /[\u2010-\u2015\u002D]/;
const APOS_RE = /[\u2019\u2018\u201B\u2032\u0027\u0060\u00B4]/;

function process() {
  let text = $('#input').value;
  if (!text) { $('#output').value = ''; $('#stats').innerHTML = ''; return; }
  const opts = readOpts();
  let removed = 0;
  let result = text.replace(PUNCT_RE, ch => {
    if (opts.keepHyphen && HYPHEN_RE.test(ch)) return ch;
    if (opts.keepApostrophe && APOS_RE.test(ch)) return ch;
    removed++;
    return '';
  });
  if (opts.trimSpace) {
    result = result.replace(/[ \t]{2,}/g, ' ').replace(/ *\n */g, '\n').replace(/\n{3,}/g, '\n\n').replace(/^ | $/gm, '');
  }
  if (opts.removeNumbers) {
    result = result.replace(/[0-9\u0660-\u0669\u06F0-\u06F9\u07C0-\u07C9\u0966-\u096F]/g, '');
  }
  $('#output').value = result;
  const words = result.trim() ? result.trim().split(/\s+/).length : 0;
  $('#stats').innerHTML = `<span><b>${removed}</b> ${t('removed')}</span><span><b>${result.length}</b> ${t('chars')}</span><span><b>${words}</b> ${t('words')}</span>`;
}

const optKeys = ['optAll','optKeepApostrophe','optKeepHyphen','optTrimSpace','optRemoveAll'];
function readOpts() {
  const r = {};
  optKeys.forEach(k => r[k] = $('#chk-'+k).checked);
  return {
    keepHyphen: !r.optAll && r.optKeepHyphen,
    keepApostrophe: !r.optAll && r.optKeepApostrophe,
    trimSpace: r.optTrimSpace,
    removeNumbers: r.optRemoveAll,
  };
}

$('#options').innerHTML = optKeys.map(k =>
  `<label><input type="checkbox" id="chk-${k}" ${k==='optTrimSpace'?'checked':''}> ${t(k)}</label>`
).join('');
optKeys.forEach(k => $('#chk-'+k).addEventListener('change', process));

$('#input').addEventListener('input', process);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';process()">${t('clear')}</button>
  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" id="exBtn">${t('example')}</button>`;
$('#exBtn').addEventListener('click', () => {
  $('#input').value = "Hello, world! This is a test — isn't it great? (We'll see...)\n\n\"Quoted text,\" she said. Numbers: 1, 2.50 and 3,000.";
  process();
});

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧹', href:'/text/remove-duplicates.html', name:'Remove Duplicate Lines'},
    {icon:'↩️', href:'/text/remove-line-breaks.html', name:'Remove Line Breaks'},
    {icon:'🔤', href:'/text/whitespace-remover.html', name:'Whitespace Remover'},
    {icon:'🌐', href:'/text/remove-accents.html', name:'Remove Accents'},
  ]
});
</script>
