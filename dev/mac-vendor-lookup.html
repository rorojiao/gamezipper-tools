  return mac.replace(/[^0-9A-Fa-f]/g, '').toUpperCase();
}

  // Locally administered bit
  const secondChar = parseInt(hex[1], 16);
  if (secondChar & 0x2) return { oui, vendor: null, local: true };
  const vendor = OUI[oui];
  return { oui, vendor: vendor || null, local: false };
}

function lookupAll() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').innerHTML=''; $('#status').innerHTML=''; return; }
  const lines = inp.split(/[\n,;]+/).map(l => l.trim()).filter(Boolean);
  const html = lines.map(line => {
    const r = lookup(line);
    if (!r) return `<div class="result-row"><span class="mac">${escapeHtml(line)}</span><span class="not-found">${t('notFound')} (${t('tooShort')})</span></div>`;
    if (r.local) return `<div class="result-row"><span class="mac">${escapeHtml(line)}</span><span class="not-found">${t('localAdmin')}</span></div>`;
    if (!r.vendor) return `<div class="result-row"><span class="mac">${escapeHtml(line)}</span><span class="not-found">${t('notFound')} (OUI ${r.oui})</span></div>`;
    return `<div class="result-row"><span class="mac">${escapeHtml(line)}</span><span class="vendor">${escapeHtml(r.vendor)}</span></div>`;
  }).join('');
  $('#output').innerHTML = html;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('ok').replace('{n}', lines.length)}</span>`;
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function loadExample() {
  $('#input').value = '00:0C:29:11:22:33\n00:1B:44:11:3A:B7\nAC:DE:48:00:11:22\nB8:27:EB:12:34:56\n0C:30:21:AA:BB:CC\n94:DE:80:11:22:33';
  lookupAll();
}

$('#input').addEventListener('input', lookupAll);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="lookupAll()">Lookup</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
