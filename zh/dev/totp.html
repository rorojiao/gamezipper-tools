const { $, copyText, t } = GZ;
let interval = null;

function base32Decode(str) {
  const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
  str = str.toUpperCase().replace(/[=\s]/g, '');
  if (!/^[A-Z2-7]+$/.test(str)) return null;
  let bits = '', bytes = [];
  for (let i = 0; i < str.length; i++) bits += alphabet.indexOf(str[i]).toString(2).padStart(5, '0');
  for (let i = 0; i + 8 <= bits.length; i += 8) bytes.push(parseInt(bits.substr(i, 8), 2));
  return new Uint8Array(bytes);
}

async function hmac(key, msg, algo) {
  const c = { 'SHA-1': 'SHA-1', 'SHA-256': 'SHA-256', 'SHA-512': 'SHA-512' }[algo] || 'SHA-1';
  const cryptoKey = await crypto.subtle.importKey('raw', key, { name: 'HMAC', hash: c }, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', cryptoKey, msg);
  return new Uint8Array(sig);
}

async function generateTOTP() {
  const secret = $('#secret').value.trim().toUpperCase().replace(/\s/g, '');
  const digits = parseInt($('#digits').value);
  const period = parseInt($('#period').value);
  const algo = $('#algo').value;

  if (!secret) {
    $('#totpCode').textContent = '——';
    $('#totpCode').classList.remove('small');
    $('#progressBar').style.width = '0%';
    $('#timerText').textContent = '';
    $('#infoCards').innerHTML = '';
    return;
  }

  const key = base32Decode(secret);
  if (!key) {
    $('#totpCode').textContent = '✗';
    $('#timerText').textContent = t('invalidSecret');
    return;
  }

  const epoch = Math.floor(Date.now() / 1000);
  const timeStep = Math.floor(epoch / period);
  const remaining = period - (epoch % period);

  const buf = new ArrayBuffer(8);
  new DataView(buf).setBigUint64(0, BigInt(timeStep));
  const hmacResult = await hmac(key, new Uint8Array(buf), algo);

  const offset = hmacResult[hmacResult.length - 1] & 0x0f;
  const binary = ((hmacResult[offset] & 0x7f) << 24) | (hmacResult[offset+1] << 16) | (hmacResult[offset+2] << 8) | hmacResult[offset+3];
  const code = (binary % Math.pow(10, digits)).toString().padStart(digits, '0');

  $('#totpCode').textContent = code;
  $('#totpCode').classList.toggle('small', digits === 8);
  $('#progressBar').style.width = ((remaining / period) * 100) + '%';
  $('#timerText').textContent = remaining + ' ' + t('remaining');

  $('#infoCards').innerHTML = `
    <div class="totp-info-card"><div class="lbl">${t('epoch')}</div><div class="val">${epoch}</div></div>
    <div class="totp-info-card"><div class="lbl">${t('timeStep')}</div><div class="val">${timeStep}</div></div>
    <div class="totp-info-card"><div class="lbl">${t('lblAlgo')}</div><div class="val">${algo}</div></div>
  `;
}

function copyCode() {
  const code = $('#totpCode').textContent;
  if (code && code !== '——' && code !== '✗') copyText(code);
}

function startLoop() {
  if (interval) clearInterval(interval);
  generateTOTP();
  interval = setInterval(generateTOTP, 1000);
}

$('#secret').addEventListener('input', startLoop);
$('#digits').addEventListener('change', startLoop);
$('#period').addEventListener('change', startLoop);
$('#algo').addEventListener('change', startLoop);

$('#warnMsg').textContent = t('warnMsg');

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#secret').value='';startLoop()">${t('clear')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#secret').value='JBSWY3DPEHPK3PXP';startLoop()">${t('example')}</button>`;
