const {t,$} = GZ;

const COMMON_WORDS = new Set([
  'password','passwd','admin','welcome','login','user','guest','root','qwerty','letmein',
  'monkey','dragon','master','sunshine','princess','football','baseball','superman',
  'batman','trustno1','iloveyou','shadow','ashley','michael','jessica','jordan','hello',
  'freedom','whatever','nicole','jennifer','jordan23','hunter','buster','soccer',
  'harley','ranger','jordan','pepper','tigger','george','andrew','joshua','starwars',
  'matthew','taylor','matrix','william','ninja','summer','internet','service','canada',
  'hello1','ranger','jessica','michelle','diamond','sophie','flower','lovely','admin123',
  'test','test123','12345','123456','1234567','12345678','123456789','1234567890','00000','11111'
]);
const KEYBOARD_ROWS = ['qwertyuiop','asdfghjkl','zxcvbnm','1234567890'];

let visible = false;
function toggleVis(){visible=!visible;$('#pwd').type=visible?'text':'password';$('#toggleBtn').textContent=t(visible?'hide':'show');}
$('#toggleBtn').onclick = toggleVis;
$('#toggleBtn').textContent = t('show');
$('#info').textContent = t('infoEmpty');
$('#pwd').placeholder = t('pwdPh');

function calcCharsetSize(s){
  let n=0;
  if(/[a-z]/.test(s))n+=26;
  if(/[A-Z]/.test(s))n+=26;
  if(/[0-9]/.test(s))n+=10;
  if(/[^a-zA-Z0-9]/.test(s))n+=33;
  return n||1;
}
function entropyBits(s){
  if(!s)return 0;
  return s.length * Math.log2(calcCharsetSize(s));
}
function hasRepeat(s){return /(.)\1{2,}/.test(s);}
function hasSeq(s){
  for(let i=0;i<s.length-2;i++){
    const a=s.charCodeAt(i),b=s.charCodeAt(i+1),c=s.charCodeAt(i+2);
    if((b===a+1&&c===b+1)||(b===a-1&&c===b-1))return true;
  }
  return false;
}
function hasKeyboard(s){
  const low=s.toLowerCase();
  for(const row of KEYBOARD_ROWS){for(let i=0;i<row.length-3;i++){if(low.includes(row.substr(i,4)))return true;}}
  return false;
}
function hasDictWord(s){
  const low=s.toLowerCase();
  for(const w of COMMON_WORDS){if(low.includes(w))return true;}
  return false;
}
function scorePassword(s){
  const checks=[];
  checks.push({ok:s.length>=12,key:'c1'});
  checks.push({ok:s.length>=16,key:'c2'});
  checks.push({ok:/[A-Z]/.test(s),key:'c3'});
  checks.push({ok:/[a-z]/.test(s),key:'c4'});
  checks.push({ok:/[0-9]/.test(s),key:'c5'});
  checks.push({ok:/[^a-zA-Z0-9]/.test(s),key:'c6'});
  checks.push({ok:!hasDictWord(s),key:'c7'});
  checks.push({ok:!hasRepeat(s),key:'c8'});
  checks.push({ok:!hasSeq(s),key:'c9'});
  checks.push({ok:!hasKeyboard(s),key:'c10'});
  return checks;
}
function scoreLabel(score){
  if(score<20)return{key:'veryWeak',color:'#ff4757'};
  if(score<40)return{key:'weak',color:'#ff6b6b'};
  if(score<60)return{key:'fair',color:'#ffa502'};
  if(score<80)return{key:'good',color:'#7bed9f'};
  if(score<95)return{key:'strong',color:'#00d672'};
  return{key:'excellent',color:'#00d672'};
}
function fmtTime(seconds,label){
  if(seconds<1)return t('instant');
  if(seconds<60)return Math.round(seconds)+' '+t('seconds');
  if(seconds<3600)return Math.round(seconds/60)+' '+t('minutes');
  if(seconds<86400)return Math.round(seconds/3600)+' '+t('hours');
  if(seconds<2592000)return Math.round(seconds/86400)+' '+t('days');
  if(seconds<31536000)return Math.round(seconds/2592000)+' '+t('months');
  if(seconds<31536000*100)return Math.round(seconds/31536000)+' '+t('years');
  if(seconds<31536000*1e6)return Math.round(seconds/(31536000*100))+' '+t('centuries');
  return t('millennia');
}
function crackTimes(bits){
  const guesses=Math.pow(2,bits);
  return {
    onlineThrottled:guesses/10,
    onlineNoThrottle:guesses/1e4,
    offlineSlow:guesses/1e4,
    offlineFast:guesses/1e10,
    offlineGpu:guesses/1e11
  };
}
function calcScore(s,checks){
  if(!s)return 0;
  let s2=entropyBits(s)*1.5;
  let penalties=0;
  if(hasDictWord(s))penalties+=25;
  if(hasRepeat(s))penalties+=10;
  if(hasSeq(s))penalties+=10;
  if(hasKeyboard(s))penalties+=15;
  if(s.length<8)penalties+=20;
  return Math.max(0,Math.min(100,Math.round(s2-penalties)));
}

function render(){
  const pwd=$('#pwd').value;
  $('#info').textContent = pwd?t('infoEmpty'):t('infoEmpty');
  if(!pwd){
    $('#bar').style.width='0%';$('#bar').style.background='#666';
    $('#strengthLabel').textContent='—';$('#strengthLabel').className='pa-strength-label';
    $('#scoreGrid').innerHTML='';$('#checks').innerHTML='';$('#crackGrid').innerHTML='';$('#suggestions').innerHTML='';
    return;
  }
  const checks=scorePassword(pwd);
  const bits=entropyBits(pwd);
  const score=calcScore(pwd,checks);
  const sl=scoreLabel(score);

  $('#bar').style.width=score+'%';
  $('#bar').style.background=sl.color;
  $('#strengthLabel').textContent=t(sl.key)+' · '+score+'/100';
  $('#strengthLabel').className='pa-strength-label '+sl.key;

  const charsetSize=calcCharsetSize(pwd);
  $('#scoreGrid').innerHTML=`
    <div class="pa-stat"><div class="val">${score}</div><div class="lbl">${t('score')}</div></div>
    <div class="pa-stat"><div class="val">${bits.toFixed(1)}</div><div class="lbl">${t('bits')}</div></div>
    <div class="pa-stat"><div class="val">${pwd.length}</div><div class="lbl">${t('length')}</div></div>
    <div class="pa-stat"><div class="val">${charsetSize}</div><div class="lbl">${t('charset')}</div></div>
  `;

  $('#checks').innerHTML=checks.map(c=>`<li class="${c.ok?'pass':'fail'}">${c.ok?'✓':'✗'} ${t(c.key)}</li>`).join('');

  const ct=crackTimes(bits);
  $('#crackGrid').innerHTML=`
    <div class="pa-crack-cell"><span class="lbl">${t('onlineThrottled')}</span><span class="val">${fmtTime(ct.onlineThrottled)}</span></div>
    <div class="pa-crack-cell"><span class="lbl">${t('onlineNoThrottle')}</span><span class="val">${fmtTime(ct.onlineNoThrottle)}</span></div>
    <div class="pa-crack-cell"><span class="lbl">${t('offlineSlow')}</span><span class="val">${fmtTime(ct.offlineSlow)}</span></div>
    <div class="pa-crack-cell"><span class="lbl">${t('offlineFast')}</span><span class="val">${fmtTime(ct.offlineFast)}</span></div>
    <div class="pa-crack-cell"><span class="lbl">${t('offlineGpu')}</span><span class="val">${fmtTime(ct.offlineGpu)}</span></div>
  `;

  const sugg=[];
  if(pwd.length<16)sugg.push('s1');
  if(!/[A-Z]/.test(pwd)||!/[a-z]/.test(pwd)||!/[0-9]/.test(pwd)||!/[^a-zA-Z0-9]/.test(pwd))sugg.push('s2');
  if(hasDictWord(pwd))sugg.push('s3');
  sugg.push('s4');sugg.push('s5');
  if(score>=80)sugg.push('s6');
  $('#suggestions').innerHTML=sugg.map(k=>`<li>${t(k)}</li>`).join('');
}

$('#pwd').addEventListener('input', render);
render();

</script>
