<script>
GZI18n.register({
  en: {
    toolTitle: 'Stair Calculator',
    toolDesc: 'Enter total rise to get the ideal number of steps, riser height, tread depth, run length, angle and stringer layout — built to code for decks, porches and interior stairs.',

    lblRise: 'Total rise (height to climb)',
    lblTread: 'Tread depth',
    lblTarget: 'Target riser height',
    lblSteps: 'Risers (steps)',
    lblRiserH: 'Actual riser height',
    lblRun: 'Total run',
    lblAngle: 'Stair angle',
    lblCheck: 'Code & comfort check',
    lblStringers: 'Stringers',
    btnExample: 'Load Example (deck stairs)',
    btnClear: 'Clear',
    riserOk: '✓ Riser height is within the comfortable 6.5–7.75 in range.',
    riserWarn: '⚠ Riser height is outside the comfortable 6.5–7.75 in range. Adjust the target riser.',
    blondelOk: '✓ Blondel formula (2R + T ≈ 25 in) — comfortable stride.',
    blondelWarn: '⚠ Adjust tread depth so 2 × riser + tread ≈ 25 in (635 mm) for a comfortable stride.',
    stringers: (n) => `For a standard-width stair, use <strong>${n} stringers</strong> (2 outer + 1 middle).`,
    step1: 'Pick imperial (inches) or metric (cm) units',
    step2: 'Enter the total rise from lower to upper level',
    step3: 'Set the desired tread depth and target riser height',
    step4: 'Read the number of steps, riser, run, angle and stringer count',
  },
  zh: {

    toolDesc: '输入总高度，即时得到最佳踏步数、踏步高、踏面深、总长度、倾斜角和龙骨数量 — 符合建筑规范，适用于露台、门廊和室内楼梯。',
    lblUnit: '单位',
    lblRise: '总高度（需爬升）',
    lblTread: '踏面深度',
    lblTarget: '目标踏步高',
    lblSteps: '踏步数',
    lblRiserH: '实际踏步高',
    lblRun: '总长度',
    lblAngle: '倾斜角度',
    lblCheck: '规范与舒适度检查',
    lblStringers: '龙骨',
    riserOk: '✓ 踏步高在舒适的 16.5–19.7 厘米范围内。',
    riserWarn: '⚠ 踏步高超出舒适的 16.5–19.7 厘米范围，请调整目标踏步高。',
    blondelOk: '✓ 符合 Blondel 公式（2R + T ≈ 63.5 厘米）— 步幅舒适。',
    blondelWarn: '⚠ 请调整踏面深度，使 2 × 踏步高 + 踏面 ≈ 63.5 厘米，步幅更舒适。',
    stringers: (n) => `标准宽度楼梯建议使用 <strong>${n} 根龙骨</strong>（两侧 + 中间各一根）。`,
    step1: '选择英制（英寸）或公制（厘米）单位',
    step2: '输入从下层到上层的总高度',
    step3: '设置踏面深度和目标踏步高',
    step4: '查看踏步数、踏步高、总长度、角度和龙骨数量',
  }
});

const { $, t } = GZ;

function toInches(val, unit) {
  return unit === 'metric' ? val / 2.54 : val;
}
function fmtLen(inches, unit) {
  return unit === 'metric'
    ? (inches * 2.54).toFixed(1) + ' cm'
    : inches.toFixed(2) + ' in';
}

function calc() {
  const unit = $('#unit').value;
  const riseIn = toInches(parseFloat($('#rise').value) || 0, unit);
  const treadIn = toInches(parseFloat($('#tread').value) || 0, unit);
  const targetIn = toInches(parseFloat($('#target').value) || 7, unit);
  if (!riseIn) { $('#result').style.display = 'none'; $('#diagram').innerHTML = ''; return; }
  const numRisers = Math.max(1, Math.round(riseIn / targetIn));
  const riserH = riseIn / numRisers;
  const numTreads = numRisers - 1; // top floor is final step
  const totalRun = treadIn * numTreads;
  const angle = Math.atan(riserH / treadIn) * 180 / Math.PI;
  $('#steps').textContent = numRisers;
  $('#riserH').textContent = fmtLen(riserH, unit);
  $('#run').textContent = fmtLen(totalRun, unit);
  $('#angle').textContent = angle.toFixed(1) + '°';
  $('#result').style.display = 'grid';
  // checks
  const riserOK = riserH >= 6.5 && riserH <= 7.75;
  $('#checkRiser').innerHTML = (riserOK ? `<span class="sc-ok">${t('riserOk')}</span>` : `<span class="sc-warn">${t('riserWarn')}</span>`);
  const blondel = 2 * riserH + treadIn;
  const blondelOK = blondel >= 24 && blondel <= 26;
  $('#checkBlondel').innerHTML = (blondelOK ? `<span class="sc-ok">${t('blondelOk')}</span>` : `<span class="sc-warn">${t('blondelWarn')}</span>`);
  const stringers = numRisers > 5 ? 3 : 2;
  $('#lblStringers').innerHTML = t('stringers')(stringers);
  $('#lblStringers').insertAdjacentHTML('afterbegin', `<strong>${t('lblStringers')}:</strong> `);
  drawDiagram(numRisers, riserH, treadIn, angle);
}

function drawDiagram(n, rh, td, angle) {
  const w = Math.min(520, td * (n - 1) + 80);
  const h = rh * n + 40;
  const ox = 30, oy = 10;
  let path = `M ${ox} ${oy + h}`;
  for (let i = 0; i < n; i++) {
    const x = ox + i * td;
    const yTop = oy + h - (i + 1) * rh;
    const yStep = oy + h - i * rh;
    path += ` L ${x} ${yStep} L ${x + td} ${yTop}`;
  }
  path += ` L ${ox + (n - 1) * td + td} ${oy + h}`;
  const svg = `<svg viewBox="0 0 ${Math.max(w, 200)} ${Math.max(h, 100)}" width="${Math.max(w, 200)}" height="${Math.max(h, 100)}" xmlns="http://www.w3.org/2000/svg">
    <polyline points="${path.replace('M ','').replace(/L /g,'')}" fill="none" stroke="var(--accent)" stroke-width="2.5"/>
  </svg>`;
  $('#diagram').innerHTML = svg;
}

function loadExample() {
  $('#unit').value = 'imperial';
  $('#rise').value = 108; $('#tread').value = 10.5; $('#target').value = 7;
  calc();
}
function doClear() { $('#rise').value = ''; $('#result').style.display = 'none'; $('#diagram').innerHTML = ''; }

['#unit','#rise','#tread','#target'].forEach(s => $(s).addEventListener('input', calc));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('btnExample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('btnClear')}</button>`;

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧱',href:'/calc/concrete.html',name:'Concrete'},
    {icon:'📐',href:'/calc/aspect-ratio.html',name:'Aspect Ratio'},
    {icon:'🧊',href:'/calc/volume-calculator.html',name:'Volume'},
    {icon:'🏠',href:'/calc/roofing-calculator.html',name:'Roofing'},
  ]
});
</script>
