<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Recipe Scaler","description":"Scale any recipe up or down. Enter original and target servings, paste ingredients, and instantly get perfectly scaled amounts with fractions.","url":"https://tools.gamezipper.com/calc/recipe-scaler.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I scale a recipe up or down?", "acceptedAnswer": {"@type": "Answer", "text": "Enter the original number of servings from the recipe, the desired number of servings you want, and add ingredients. The tool multiplies every quantity by the same factor (target ÷ original) and outputs nicely formatted scaled amounts including fractions."}}, {"@type": "Question", "name": "Can I scale recipes with fractions like 1/2 or 1/4 cup?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The tool understands and preserves common cooking fractions (1/2, 1/3, 1/4, 3/4, 1/8) and shows results in the nearest readable fraction rather than long decimals."}}, {"@type": "Question", "name": "What about non-linear ingredients like salt, baking soda or yeast?", "acceptedAnswer": {"@type": "Answer", "text": "Always scale spices, leaveners (yeast, baking soda/powder), and salt linearly for small changes, but for very large jumps (2x or more) it's better to keep them at near original amounts and adjust to taste. The tool will scale them linearly by default."}}, {"@type": "Question", "name": "Can I paste an entire recipe at once?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Click the Paste Recipe button and paste a typical recipe ingredient list. The tool uses a simple parser that recognizes 'number + unit + name' lines, but you can also edit each row manually for full control."}}, {"@type": "Question", "name": "Is my recipe data sent to a server?", "acceptedAnswer": {"@type": "Answer", "text": "No. All recipe scaling happens entirely in your browser. Nothing is uploaded or stored."}}]}</script>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Recipe Scaler',
    toolDesc: 'Resize any recipe to your desired servings — paste ingredients and instantly get perfectly scaled amounts with fractions. Free, private and runs in your browser.',
    lblOrig: 'Original servings',
    lblTarget: 'Target servings',
    lblIngredients: 'Ingredients',
    thQty: 'Quantity',
    thUnit: 'Unit',
    thName: 'Ingredient',
    addRowText: 'Add ingredient',
    pasteRecipe: 'Paste recipe',
    loadExample: 'Load example',
    clear: 'Clear all',
    copy: 'Copy result',
    factor: 'Scale factor',
    step1: 'Enter the original and target number of servings',
    step2: 'Add or edit each ingredient row (quantity, unit, name)',
    step3: 'Click Paste Recipe to import a typical ingredient list at once',
    step4: 'Copy the scaled recipe with the Copy button',
    example1: '1 cup all-purpose flour',
    example2: '2 large eggs',
    example3: '1/2 cup granulated sugar',
    example4: '1 tsp vanilla extract',
    example5: '1/2 tsp salt',
    example6: '1/2 cup butter, softened',
    example7: '1 tsp baking powder',
  },
  zh: {
    toolTitle: '食谱份量调整器',
    toolDesc: '将任何食谱调整到你想要的份量 — 粘贴食材，立即获得带分数的完美缩放结果。免费、私密、完全浏览器本地运行。',
    lblOrig: '原始份数',
    lblTarget: '目标份数',
    lblIngredients: '食材',
    thQty: '数量',
    thUnit: '单位',
    thName: '食材',
    addRowText: '添加食材',
    pasteRecipe: '粘贴食谱',
    loadExample: '加载示例',
    clear: '全部清空',
    copy: '复制结果',
    factor: '缩放倍数',
    step1: '输入原始份数和目标份数',
    step2: '逐行添加或编辑食材（数量、单位、名称）',
    step3: '点击「粘贴食谱」可一次性导入典型食材列表',
    step4: '使用「复制」按钮复制缩放后的食谱',
    example1: '1 杯 中筋面粉',
    example2: '2 个 大鸡蛋',
    example3: '1/2 杯 白砂糖',
    example4: '1 茶匙 香草精',
    example5: '1/2 茶匙 盐',
    example6: '1/2 杯 黄油（软化）',
    example7: '1 茶匙 泡打粉',
  }
});

const { $, t } = GZ;

const UNITS = ['', 'cup', 'cups', 'tbsp', 'tsp', 'tablespoon', 'tablespoons', 'teaspoon', 'teaspoons', 'oz', 'ounce', 'ounces', 'fl oz', 'lb', 'lbs', 'pound', 'pounds', 'g', 'gram', 'grams', 'kg', 'ml', 'l', 'liter', 'liters', 'pinch', 'dash', 'clove', 'cloves', 'can', 'cans', 'piece', 'pieces', 'large', 'medium', 'small', '个', '杯', '汤匙', '茶匙', '克', '毫升', '升', '勺', '块', '片'];

function parseQty(str) {
  if (!str) return null;
  str = str.trim();
  if (!str) return null;
  if (/^\d+\/\d+$/.test(str)) {
    const [a, b] = str.split('/').map(Number);
    return a / b;
  }
  if (/^\d+\s+\d+\/\d+$/.test(str)) {
    const [whole, frac] = str.split(/\s+/);
    const [a, b] = frac.split('/').map(Number);
    return Number(whole) + a / b;
  }
  const n = parseFloat(str);
  return isNaN(n) ? null : n;
}

function formatQty(n) {
  if (n === 0) return '0';
  if (n < 0.0625) return n.toFixed(3);
  // Try to find the closest common cooking fraction
  const fractions = [
    [1/8, '1/8'], [1/4, '1/4'], [1/3, '1/3'], [1/2, '1/2'],
    [2/3, '2/3'], [3/4, '3/4']
  ];
  const whole = Math.floor(n);
  const remainder = n - whole;
  if (remainder < 0.02) return whole.toString();
  for (const [val, str] of fractions) {
    if (Math.abs(remainder - val) < 0.04) {
      return whole > 0 ? `${whole} ${str}` : str;
    }
  }
  // Round to 2 decimal places if small
  if (n < 1) return n.toFixed(2).replace(/\.?0+$/, '');
  if (n < 10) return n.toFixed(1).replace(/\.0$/, '');
  return n.toFixed(1).replace(/\.0$/, '');
}

function addRow(qty, unit, name) {
  const tbody = $('#ing-body');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="qty"><input type="text" class="r-qty" value="${qty||''}" placeholder="1"></td>
    <td class="unit"><input type="text" class="r-unit" value="${unit||''}" placeholder="cup" list="units-list"></td>
    <td class="name-col"><input type="text" class="r-name" value="${name||''}" placeholder="flour"></td>
    <td class="del"><button class="del-btn" title="Remove">×</button></td>
  `;
  tr.querySelector('.del-btn').onclick = () => { tr.remove(); update(); };
  tr.querySelectorAll('input').forEach(i => i.addEventListener('input', update));
  tbody.appendChild(tr);
  update();
}

function getRows() {
  return [...$('#ing-body').querySelectorAll('tr')].map(tr => ({
    qty: tr.querySelector('.r-qty').value,
    unit: tr.querySelector('.r-unit').value,
    name: tr.querySelector('.r-name').value
  }));
}

function loadExample() {
  $('#ing-body').innerHTML = '';
  const lang = GZI18n.getLang();
  const examples = lang === 'zh' ? [
    { q: '1', u: '杯', n: '中筋面粉' },
    { q: '2', u: '个', n: '大鸡蛋' },
    { q: '1/2', u: '杯', n: '白砂糖' },
    { q: '1', u: '茶匙', n: '香草精' },
    { q: '1/2', u: '茶匙', n: '盐' },
    { q: '1/2', u: '杯', n: '黄油（软化）' },
    { q: '1', u: '茶匙', n: '泡打粉' },
  ] : [
    { q: '1', u: 'cup', n: 'all-purpose flour' },
    { q: '2', u: 'large', n: 'eggs' },
    { q: '1/2', u: 'cup', n: 'granulated sugar' },
    { q: '1', u: 'tsp', n: 'vanilla extract' },
    { q: '1/2', u: 'tsp', n: 'salt' },
    { q: '1/2', u: 'cup', n: 'butter, softened' },
    { q: '1', u: 'tsp', n: 'baking powder' },
  ];
  for (const e of examples) addRow(e.q, e.u, e.n);
  $('#orig-servings').value = 4;
  $('#target-servings').value = 6;
  update();
}

function pasteRecipe() {
  const text = prompt('Paste recipe ingredient list (one per line, e.g. "2 cups flour"):');
  if (!text) return;
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  // Try to parse each line: optional quantity (number, fraction, mixed) + optional unit + name
  const unitPattern = UNITS.filter(Boolean).map(u => u.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');
  const lineRe = new RegExp(`^([\\d./\\s]+)?\\s*(${unitPattern})?\\s*(.*)$`, 'i');
  for (const line of lines) {
    const m = line.match(lineRe);
    if (m) {
      addRow((m[1] || '').trim(), (m[2] || '').trim(), (m[3] || line).trim());
    } else {
      addRow('', '', line);
    }
  }
  update();
}

function update() {
  const orig = parseFloat($('#orig-servings').value) || 1;
  const target = parseFloat($('#target-servings').value) || 1;
  const factor = target / orig;
  const rows = getRows();
  const lines = [];
  lines.push(`${t('factor')}: ${factor.toFixed(3)}× (${orig} → ${target} servings)`);
  lines.push('─'.repeat(40));
  for (const r of rows) {
    const q = parseQty(r.qty);
    if (q === null && !r.name) continue;
    let line = '';
    if (q !== null) {
      const scaled = q * factor;
      line = `${formatQty(scaled)} ${r.unit} ${r.name}`.trim().replace(/\s+/g, ' ');
    } else {
      line = `${r.qty} ${r.unit} ${r.name}`.trim().replace(/\s+/g, ' ');
    }
    if (line) lines.push('• ' + line);
  }
  if (lines.length === 1) {
    lines.push('(Add at least one ingredient)');
  }
  $('#output').textContent = lines.join('\n');
}

// Build datalist
const dl = document.createElement('datalist');
dl.id = 'units-list';
UNITS.filter(Boolean).forEach(u => {
  const o = document.createElement('option');
  o.value = u;
  dl.appendChild(o);
});
document.body.appendChild(dl);

$('#add-row').onclick = () => addRow('', '', '');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">🍪 ${t('loadExample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="pasteRecipe()">📋 ${t('pasteRecipe')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="GZ.copyText($('#output').textContent)">📑 ${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#ing-body').innerHTML='';update()">🗑 ${t('clear')}</button>`;

['#orig-servings', '#target-servings'].forEach(s => $(s).addEventListener('input', update));

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧑‍🍳', href:'/convert/cooking-converter.html', name:'Cooking Converter'},
    {icon:'🍎', href:'/calc/calorie-calculator.html', name:'Calorie Calculator'},
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro Timer'},
    {icon:'⏱️', href:'/calc/timer-stopwatch.html', name:'Timer'},
  ]
});

loadExample();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
