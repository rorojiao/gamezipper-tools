<script>
GZI18n.register({
  en: {
    toolTitle: 'WAV Converter',
    toolDesc: 'Convert any audio file (MP3, OGG, M4A, FLAC, AAC, WebM) to a high-quality WAV file — runs entirely in your browser, no upload.',
    dropText: 'Drop an audio file here or click to choose',

    step2: 'Choose sample rate, bit depth and channels',
    step3: 'Click Convert to WAV — encoding runs in your browser',
    step4: 'Preview the result, then Download the WAV file',
  },
  zh: {
    toolTitle: 'WAV 转换器',
    toolDesc: '将任意音频文件（MP3、OGG、M4A、FLAC、AAC、WebM）转换为高质量 WAV 文件 — 完全浏览器本地处理，无需上传。',
    dropText: '拖入音频文件或点击选择',
    lblRate: '采样率',
    lblDepth: '位深',
    lblChannels: '声道',
    btnConv: '转换为 WAV',
    btnDl: '下载 WAV',
    btnReset: '选择其他文件',
    duration: '时长',
    srcFormat: '源格式',
    wavSize: 'WAV 大小',
    step1: '拖入或选择音频文件（MP3、OGG、M4A、FLAC 等）',
    step2: '选择采样率、位深和声道数',
    step3: '点击「转换为 WAV」— 编码在浏览器中完成',
    step4: '预览结果后下载 WAV 文件',
  }
});

const { $, t } = GZ;
let audioBuf = null, wavBlob = null, srcFileName = 'audio';

$('#drop-text').textContent = t('dropText');
$('#lbl-rate').textContent = t('lblRate');
$('#lbl-depth').textContent = t('lblDepth');
$('#lbl-channels').textContent = t('lblChannels');
$('#btn-conv').textContent = t('btnConv');
$('#btn-dl').textContent = t('btnDl');
$('#btn-reset').textContent = t('btnReset');

$('#drop').addEventListener('click', () => $('#file').click());
$('#drop').addEventListener('dragover', e => { e.preventDefault(); $('#drop').classList.add('drag'); });
$('#drop').addEventListener('dragleave', () => $('#drop').classList.remove('drag'));
$('#drop').addEventListener('drop', e => {
  e.preventDefault(); $('#drop').classList.remove('drag');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
$('#file').addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

async function loadFile(file) {
  if (!file.type.startsWith('audio/') && !/\.(mp3|wav|ogg|aac|m4a|flac|opus|webm|wma)$/i.test(file.name)) {
    alert('Please select an audio file'); return;
  }
  srcFileName = file.name.replace(/\.[^.]+$/, '');
  $('#player').src = URL.createObjectURL(file);
  $('#stats').innerHTML = `<div class="stat"><div class="num">${(file.size/1024).toFixed(0)} KB</div><div class="lbl">${file.type||'audio'}</div></div>`;
  $('#pbar').style.width = '0%';
  try {
    const ab = await file.arrayBuffer();
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    audioBuf = await ctx.decodeAudioData(ab);
    ctx.close();
    $('#work').style.display = '';
    $('#stats').innerHTML = `
      <div class="stat"><div class="num">${audioBuf.duration.toFixed(1)}s</div><div class="lbl">${t('duration')}</div></div>
      <div class="stat"><div class="num">${audioBuf.sampleRate} Hz</div><div class="lbl">${t('srcFormat')}</div></div>
      <div class="stat"><div class="num">${audioBuf.numberOfChannels === 2 ? 'Stereo' : 'Mono'}</div><div class="lbl">${t('lblChannels')}</div></div>`;
    $('#btn-dl').style.display = 'none';
    wavBlob = null;
  } catch (e) {
    alert('Could not decode this audio file in your browser. Try Chrome or Firefox.');
  }
}

async function convert() {
  if (!audioBuf) return;
  $('#btn-conv').disabled = true;
  $('#pbar').style.width = '10%';
  const targetRate = +$('#rate').value;
  const targetDepth = +$('#depth').value;
  let targetCh = +$('#channels').value;
  if (targetCh === 0) targetCh = audioBuf.numberOfChannels;

  // Resample if needed via OfflineAudioContext
  let buf = audioBuf;
  if (audioBuf.sampleRate !== targetRate || audioBuf.numberOfChannels !== targetCh) {
    const dur = audioBuf.duration;
    const off = new OfflineAudioContext(Math.min(2, targetCh), Math.ceil(dur * targetRate), targetRate);
    const src = off.createBufferSource();
    src.buffer = audioBuf;
    src.connect(off.destination);
    src.start(0);
    $('#pbar').style.width = '40%';
    buf = await off.startRendering();
  }
  $('#pbar').style.width = '70%';

  // Encode WAV
  const numCh = Math.min(2, buf.numberOfChannels);
  const bytesPerSample = targetDepth / 8;
  const blockAlign = numCh * bytesPerSample;
  const dataSize = buf.length * blockAlign;
  const arrBuf = new ArrayBuffer(44 + dataSize);
  const view = new DataView(arrBuf);
  let off = 0;
  const ws = s => { for (let i=0;i<s.length;i++) view.setUint8(off++, s.charCodeAt(i)); };
  ws('RIFF'); view.setUint32(off, 36+dataSize, true); off+=4;
  ws('WAVE'); ws('fmt '); view.setUint32(off, 16, true); off+=4;
  view.setUint16(off, 1, true); off+=2;            // PCM
  view.setUint16(off, numCh, true); off+=2;
  view.setUint32(off, targetRate, true); off+=4;
  view.setUint32(off, targetRate*blockAlign, true); off+=4;
  view.setUint16(off, blockAlign, true); off+=2;
  view.setUint16(off, targetDepth, true); off+=2;
  ws('data'); view.setUint32(off, dataSize, true); off+=4;

  const chans = [];
  for (let c=0;c<numCh;c++) chans.push(buf.getChannelData(c));
  for (let i=0;i<buf.length;i++) {
    for (let c=0;c<numCh;c++) {
      let s = Math.max(-1, Math.min(1, chans[c][i]));
      if (targetDepth === 16) view.setInt16(off, s<0 ? s*0x8000 : s*0x7FFF, true), off+=2;
      else view.setInt32(off, s<0 ? s*0x80000000 : s*0x7FFFFFFF, true), off+=4;
    }
    if (i % 100000 === 0) $('#pbar').style.width = (70 + (i/buf.length)*25) + '%';
  }

  wavBlob = new Blob([arrBuf], { type:'audio/wav' });
  const url = URL.createObjectURL(wavBlob);
  $('#player').src = url;
  $('#btn-dl').style.display = '';
  $('#btn-conv').disabled = false;
  $('#pbar').style.width = '100%';
  $('#stats').innerHTML += `<div class="stat"><div class="num">${(wavBlob.size/1024).toFixed(0)} KB</div><div class="lbl">${t('wavSize')}</div></div>`;
}

function download() {
  if (!wavBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(wavBlob);
  a.download = srcFileName + '.wav';
  a.click();
}

function resetAll() {
  audioBuf = null; wavBlob = null;
  $('#work').style.display = 'none';
  $('#file').value = '';
  $('#player').removeAttribute('src');
  $('#pbar').style.width = '0%';
}

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'✂️', href:'/convert/audio-trimmer.html', name:'Audio Trimmer'},

    {icon:'🎚️', href:'/convert/audio-speed.html', name:'Audio Speed'},
  ]
});
</script>
