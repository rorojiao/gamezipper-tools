<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a vanity phone number?", "acceptedAnswer": {"@type": "Answer", "text": "A vanity phone number spells a word or phrase using the letters on a phone keypad, making it memorable. The classic example is 1-800-FLOWERS, which maps to 1-800-3569377. Businesses use vanity numbers because they are easier for customers to remember."}}, {"@type": "Question", "name": "How do phone keypad letters map to numbers?", "acceptedAnswer": {"@type": "Answer", "text": "The standard mapping is: 2=ABC, 3=DEF, 4=GHI, 5=JKL, 6=MNO, 7=PQRS, 8=TUV, 9=WXYZ. Digits 0 and 1 have no letters. This is the same mapping used by SMS/T9 texting on classic phones."}}, {"@type": "Question", "name": "How do I convert a word to a phone number?", "acceptedAnswer": {"@type": "Answer", "text": "Type your word or phrase and the converter replaces each letter with the corresponding keypad digit. For example, FLOWERS becomes 3569377. Non-letter characters (spaces, punctuation, existing digits) pass through unchanged."}}, {"@type": "Question", "name": "Can this tool find words hidden in my phone number?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. In Number → Letters mode the tool shows every possible letter combination for each digit, so you can spot memorable words your number could spell. You can then mix chosen letters with the remaining digits to create a vanity number."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Vanity Phone Number Converter',
    toolDesc: 'Convert words to phone numbers (FLOWERS → 3569377) or see what letters your number could spell. Standard T9 keypad mapping.',
    wordToNumber: 'Word → Number',
    numberToLetters: 'Number → Letters',
    digitBreakdown: 'Possible letters per digit',
    step1: 'Type a word/phrase (Word→Number) or a phone number (Number→Letters)',
    step2: 'The conversion appears instantly on the right',
    step3: 'Click Copy to copy the result',
    step4: 'In Number→Letters mode, scroll down to see letter options per digit',
  },
  zh: {
    toolTitle: '电话号码字母转换器',
    toolDesc: '将单词转为电话号码（FLOWERS → 3569377）或查看你的号码可能拼出的字母。标准 T9 键盘映射。',
    wordToNumber: '单词 → 号码',
    numberToLetters: '号码 → 字母',
    digitBreakdown: '每位数字对应的字母',
    step1: '输入单词/短语（单词→号码）或电话号码（号码→字母）',
    step2: '转换结果即时显示在右侧',
    step3: '点击复制按钮复制结果',
    step4: '在「号码→字母」模式下，向下滑动查看每位数字的字母选项',
  }
});

const { $, copyText, t } = GZ;
let mode = 'wordToNumber';

// T9 mapping
const KEY_MAP = {
  '2':'ABC','3':'DEF','4':'GHI','5':'JKL','6':'MNO','7':'PQRS','8':'TUV','9':'WXYZ'
};
const LETTER_TO_DIGIT = {};
for (const [d, letters] of Object.entries(KEY_MAP)) {
  for (const l of letters) LETTER_TO_DIGIT[l] = d;
}

function wordToNumber(text) {
  return [...text.toUpperCase()].map(ch => {
    if (LETTER_TO_DIGIT[ch]) return LETTER_TO_DIGIT[ch];
    return ch; // digits, spaces, punctuation pass through
  }).join('');
}

function numberToLetters(text) {
  // show each digit replaced by its letter group, for readability
  return [...text].map(ch => {
    if (KEY_MAP[ch]) return '[' + ch + '=' + KEY_MAP[ch] + ']';
    return ch;
  }).join('');
}

function showDigitBreakdown(text) {
  const digits = [...text].filter(c => KEY_MAP[c]);
  if (digits.length === 0) { $('#digit-letters').innerHTML = ''; return; }
  let html = `<h3 style="font-size:1rem;margin:12px 0 4px">${t('digitBreakdown')}</h3>`;
  for (const d of digits) {
    const letters = KEY_MAP[d];
    html += `<div class="digit-options"><b style="min-width:20px">${d}</b>`;
    for (const l of letters) html += `<span>${l}</span>`;
    html += `</div>`;
  }
  $('#digit-letters').innerHTML = html;
}

function update() {
  const txt = $('#input').value;
  if (mode === 'wordToNumber') {
    $('#output').textContent = wordToNumber(txt);
    $('#digit-letters').innerHTML = '';
  } else {
    $('#output').textContent = numberToLetters(txt);
    showDigitBreakdown(txt.replace(/[^2-9]/g, ''));
  }
}

function loadExample() {
  $('#input').value = mode === 'wordToNumber' ? '1-800-FLOWERS' : '18003569377';
  update();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#digit-letters').innerHTML = ''; }

$('#input').addEventListener('input', update);

$('#toolbar').innerHTML = `
  <select class="gz-select" onchange="mode=this.value;update()">
    <option value="wordToNumber">${t('wordToNumber')}</option>
    <option value="numberToLetters">${t('numberToLetters')}</option>
  </select>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🔄', href:'/text/morse-code-translator.html', name:'Morse Code'},
  ]
});
</script>
