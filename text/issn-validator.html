<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is an ISSN?", "acceptedAnswer": {"@type": "Answer", "text": "ISSN (International Standard Serial Number) is an 8-digit code used to identify serial publications such as journals, magazines and newspapers. The 8th character is a check digit computed with a modulus 11 algorithm and may be the letter X representing the value 10."}}, {"@type": "Question", "name": "How is the ISSN check digit calculated?", "acceptedAnswer": {"@type": "Answer", "text": "Using modulus 11 with weights 8, 7, 6, 5, 4, 3, 2 applied to the first 7 digits. The sum is divided by 11 and the remainder is subtracted from 11 to get the check digit. A result of 10 is written as X, and a result of 11 becomes 0."}}, {"@type": "Question", "name": "What is ISSN-13 and how do I convert to it?", "acceptedAnswer": {"@type": "Answer", "text": "ISSN-13 is the 13-digit EAN barcode used on serial publications. It is built by prefixing the first 7 ISSN digits with 977, adding a two-digit add-on (usually 00) and then computing a standard EAN-13 mod-10 check digit on the 12 leading digits."}}, {"@type": "Question", "name": "Why does my ISSN show as invalid?", "acceptedAnswer": {"@type": "Answer", "text": "An ISSN is invalid when the check digit does not match, when it contains illegal characters, or when the length is not exactly 8 digits. Hyphens and spaces are stripped automatically, so check for typos or missing digits."}}]}</script>

const { $, copyText, t } = GZ;

function strip(s){ return s.replace(/[^0-9Xx]/g,'').toUpperCase(); }

function checkDigit7(first7){
  const w = [8,7,6,5,4,3,2];
  let sum = 0;
  for(let i=0;i<7;i++) sum += (+first7[i])*w[i];
  const r = 11 - (sum % 11);
  if(r === 10) return 'X';
  if(r === 11) return '0';
  return String(r);
}
function isValid8(digits){
  if(!/^\d{7}[\dX]$/.test(digits)) return false;
  return digits[7] === checkDigit7(digits.slice(0,7));
}
function ean13Check(first12){
  let sum = 0;
  for(let i=0;i<12;i++) sum += (+first12[i])*(i%2===0?1:3);
  return String((10 - (sum%10))%10);
}
function toISSN13(issn8){
  // 977 + first 7 ISSN digits + 00 (add-on) = 12, then EAN-13 check
  const core = '977' + issn8.slice(0,7) + '00';
  return core + ean13Check(core);
}
function format8(digits){
  return digits.slice(0,4) + '-' + digits.slice(4);
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function analyze(raw){
  const digits = strip(raw);
  if(!digits) return {raw, valid:false, msg:t('badLen')};
  if(/[^0-9X]/.test(raw.replace(/[\s-]/g,''))) return {raw, valid:false, msg:t('badChar')};
  if(digits.length !== 8) return {raw, valid:false, msg:t('badLen')};
  const ok = isValid8(digits);
  const exp = checkDigit7(digits.slice(0,7));
  return {raw, digits, valid: ok, msg: ok?t('checkOk'):t('checkBad').replace('%1',exp), issn13: ok?toISSN13(digits):null};
}

function doValidate(){
  const lines = $('#input').value.split('\n').map(s=>s.trim()).filter(Boolean);
  if(!lines.length){ $('#output').innerHTML=''; $('#status').textContent=''; return; }
  const cards = lines.map(line=>{
    const r = analyze(line);
    const cls = r.valid ? 'ok' : 'bad';
    const icon = r.valid ? '✅' : '❌';
    let rows = `<div class="res-row"><span>${t('raw')}:</span><code>${esc(r.digits||r.raw)}</code></div>`;
    if(r.valid){
      rows += `<div class="res-row"><span>${t('hyphen')}:</span><code>${esc(format8(r.digits))}</code><button onclick="copyText('${format8(r.digits)}')">⧉</button></div>`;
      rows += `<div class="res-row"><span>${t('issn13')}:</span><code>${esc(r.issn13)}</code><button onclick="copyText('${r.issn13}')">⧉</button></div>`;
    }
    return `<div class="res-card ${cls}"><div class="res-head">${icon} ${r.valid?t('valid'):t('invalid')} · ${t('issn8')}</div><div class="res-row" style="color:var(--text2)">${esc(r.msg)}</div>${rows}</div>`;
  });
  $('#output').innerHTML = cards.join('');
  const valid = lines.map(analyze).filter(r=>r.valid).length;
  $('#status').innerHTML = `<span style="color:var(--text2)">✓ ${valid}/${lines.length} ${t('valid')}</span>`;
}

function doConvert(){
  const lines = $('#input').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const out = lines.map(line=>{
    const r = analyze(line);
    return r.valid ? r.issn13 : line;
  });
  $('#input').value = out.join('\n');
  doValidate();
}

function loadExample(){
  $('#input').value = '0028-0836\n1000-002X\n0317-8471\n0036-8075\n1234-5678';
  doValidate();
}
function doClear(){ $('#input').value=''; $('#output').innerHTML=''; $('#status').textContent=''; }

$('#lbl-in').textContent = t('lblIn');
$('#input').addEventListener('input', doValidate);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doValidate()">${t('validate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doConvert()">→ ${t('convert13')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
