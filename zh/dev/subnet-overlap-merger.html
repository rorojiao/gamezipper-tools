    step3: '查看高亮结果 — 红色为重叠，绿色为无重叠',

$('#overlapBtn').onclick = () => runOp('overlap');
$('#unionBtn').onclick = () => runOp('union');
$('#intersectBtn').onclick = () => runOp('intersect');
$('#containBtn').onclick = () => runOp('contain');
$('#exampleBtn').onclick = () => {
  $('#input').value = '192.168.1.0/24\n192.168.1.128/25\n192.168.2.0/23\n10.0.0.0/8';

};

// --- BigInt IP/CIDR helpers (shared with ip-cidr-converter) ---
function ipToBigInt(ip) {
  ip = ip.trim();
  if (ip.includes(':')) {
    let parts = ip.split(':');
    const dbl = parts.indexOf('');
    if (dbl !== -1) {
      if (parts[parts.length-1] === '') parts.pop();
      if (parts[0] === '') parts.shift();
      const left = parts.slice(0, dbl-1 < 0 ? 0 : dbl);
      const right = parts.slice(dbl);
      const missing = 8 - (left.length + right.length);
      parts = [...left, ...Array(missing > 0 ? missing : 0).fill('0'), ...right];
    }
    if (parts.length !== 8) return null;
    let n = 0n;
    for (const p of parts) {
      if (p === '') return null;
      const v = parseInt(p, 16);
      if (isNaN(v) || v < 0 || v > 0xffff) return null;
      n = (n << 16n) | BigInt(v);
    }
    return { n, bits: 128 };
  } else if (ip.includes('.')) {
    const parts = ip.split('.');
    if (parts.length !== 4) return null;
    let n = 0n;
    for (const p of parts) {
      const v = parseInt(p, 10);
      if (isNaN(v) || v < 0 || v > 255 || String(v) !== p) return null;
      n = (n << 8n) | BigInt(v);
    }
    return { n, bits: 32 };
  }
  return null;
}

function bigIntToIp(n, bits) {
  if (bits === 32) {
    const m = 0xffn;
    return [(n >> 24n) & m, (n >> 16n) & m, (n >> 8n) & m, n & m].join('.');
  }
  const parts = [];
  const mask = 0xffffn;
  for (let i = 7; i >= 0; i--) parts.push(((n >> BigInt(i*16)) & mask).toString(16));
  return parts.join(':');
}

function parseCidr(line) {
  line = line.trim();
  if (!line) return null;
  const m = line.split('/');
  if (m.length !== 2) return null;
  const ipObj = ipToBigInt(m[0]);
  const prefix = parseInt(m[1], 10);
  if (!ipObj || isNaN(prefix) || prefix < 0 || prefix > ipObj.bits) return null;
  const hostBits = BigInt(ipObj.bits - prefix);
  const netMask = ((1n << BigInt(prefix)) - 1n) << hostBits;
  const start = ipObj.n & netMask;
  const end = start | ((1n << hostBits) - 1n);
  return { start, end, bits: ipObj.bits, prefix, raw: line };
}

function parseInput() {
  const lines = $('#input').value.split('\n').map(s => s.trim()).filter(Boolean);
  if (lines.length < 2) return { error: t('need2') };
  const blocks = [];
  for (let i = 0; i < lines.length; i++) {
    const b = parseCidr(lines[i]);
    if (!b) return { error: `${t('invalid')} ${i+1}: ${lines[i]}` };
    blocks.push(b);
  }
  const bits = blocks[0].bits;
  if (blocks.some(b => b.bits !== bits)) return { error: t('mixedProto') };
  return { blocks, bits };
}

function rangeToCidr(start, end, bits) {
  const result = [];
  let s = start, e = end;
  while (s <= e) {
    let maxBits = bits;
    for (let b = 1; b <= bits; b++) {
      const blockMask = (1n << BigInt(b)) - 1n;
      if ((s & blockMask) !== 0n) { maxBits = b - 1; break; }
      maxBits = b;
    }
    let diff = e - s + 1n;
    let maxFromEnd = 0n;
    let tmp = diff;
    while ((tmp & 1n) === 0n) { maxFromEnd++; tmp >>= 1n; }
    const blockSize = BigInt(maxBits) < maxFromEnd ? BigInt(maxBits) : maxFromEnd;
    const prefixLen = BigInt(bits) - blockSize;
    result.push(`${bigIntToIp(s, bits)}/${Number(prefixLen)}`);
    s = s + (1n << blockSize);
    if (result.length > 5000) break;
  }
  return result;
}

function runOp(op) {
  const r = parseInput();
  if (r.error) {
    $('#status').innerHTML = `<div style="color:var(--gz-accent);padding:8px">⚠ ${r.error}</div>`;
    $('#result').innerHTML = '';
    $('#copyBtns').innerHTML = '';
    return;
  }
  const { blocks, bits } = r;

  if (op === 'overlap') {
    const pairs = [];
    for (let i = 0; i < blocks.length; i++) {
      for (let j = i+1; j < blocks.length; j++) {
        if (blocks[i].start <= blocks[j].end && blocks[j].start <= blocks[i].end) {
          pairs.push([blocks[i].raw, blocks[j].raw]);
        }
      }
    }
    if (pairs.length === 0) {
      $('#status').innerHTML = `<span class="overlap-no">${t('noOverlap')}</span>`;
      $('#result').innerHTML = `<div class="result-card"><span class="overlap-no">✓ ${t('noOverlap')}</span></div>`;
    } else {
      const rows = pairs.map(p => `<div class="cidr-line"><span class="overlap-yes">⚠</span> <b>${p[0]}</b> ↔ <b>${p[1]}</b></div>`).join('');
      $('#result').innerHTML = `
        <div class="result-card">
          <h3>${t('overlapsFound')} <span class="overlap-yes">${pairs.length} ${t('pairs')}</span></h3>
          ${rows}
        </div>`;
      $('#status').innerHTML = `<span class="overlap-yes">⚠ ${pairs.length} ${t('pairs')}</span>`;
    }
    $('#copyBtns').innerHTML = '';
    return;
  }

  if (op === 'union') {
    const sorted = [...blocks].sort((a, b) => (a.start < b.start ? -1 : a.start > b.start ? 1 : 0));
    // Merge overlapping/adjacent ranges
    const merged = [];
    for (const b of sorted) {
      const last = merged[merged.length - 1];
      if (last && b.start <= last.end + 1n) {
        if (b.end > last.end) last.end = b.end;
      } else {
        merged.push({ start: b.start, end: b.end });
      }
    }
    // Convert each merged range back to CIDR
    let allCidrs = [];
    for (const m of merged) {
      allCidrs = allCidrs.concat(rangeToCidr(m.start, m.end, bits));
    }
    const rows = allCidrs.map(c => `<div class="cidr-line">${c}</div>`).join('');
    $('#result').innerHTML = `
      <div class="result-card">
        <h3>${t('unionResult')} <b>${allCidrs.length}</b> ${t('blocks')}</h3>
        ${rows}
      </div>`;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${allCidrs.length} ${t('blocks')}</span>`;
    $('#copyBtns').innerHTML = `<button class="gz-btn" id="copyAll">${t('copyResult')}</button>`;
    $('#copyAll').onclick = () => copyText(allCidrs.join('\n'));
    return;
  }

  if (op === 'intersect') {
    // Intersection: max(starts) to min(ends). If maxStart > minEnd → empty.
    let maxStart = blocks[0].start, minEnd = blocks[0].end;
    for (const b of blocks) {
      if (b.start > maxStart) maxStart = b.start;
      if (b.end < minEnd) minEnd = b.end;
    }
    if (maxStart > minEnd) {
      $('#result').innerHTML = `<div class="result-card"><span style="color:var(--text2)">${t('intersectEmpty')}</span></div>`;
      $('#status').innerHTML = `<span style="color:var(--gz-accent)">∅</span>`;
      $('#copyBtns').innerHTML = '';
      return;
    }
    const cidrs = rangeToCidr(maxStart, minEnd, bits);
    const rows = cidrs.map(c => `<div class="cidr-line">${c}</div>`).join('');
    $('#result').innerHTML = `
      <div class="result-card">
        <h3>${t('intersectResult')} — ${cidrs.length} ${t('blocks')}</h3>
        <div class="kv"><span>Start</span><span style="font-family:monospace">${bigIntToIp(maxStart, bits)}</span></div>
        <div class="kv"><span>End</span><span style="font-family:monospace">${bigIntToIp(minEnd, bits)}</span></div>
        ${rows}
      </div>`;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${cidrs.length} ${t('blocks')}</span>`;
    $('#copyBtns').innerHTML = `<button class="gz-btn" id="copyAll">${t('copyResult')}</button>`;
    $('#copyAll').onclick = () => copyText(cidrs.join('\n'));
    return;
  }

  if (op === 'contain') {
    // For each consecutive pair, check if line[i] contains line[i+1]
    const rows = [];
    for (let i = 1; i < blocks.length; i++) {
      const a = blocks[i-1], b = blocks[i];
      const contains = (a.start <= b.start && b.end <= a.end);
      const reverse = (b.start <= a.start && a.end <= b.end);
      let icon, txt, cls;
      if (contains) { icon = '✓'; txt = `<b>${b.raw}</b> ${t('containYes')} <b>${a.raw}</b>`; cls = 'overlap-no'; }
      else if (reverse) { icon = '⇄'; txt = `<b>${a.raw}</b> ${t('containYes')} <b>${b.raw}</b> (reverse)`; cls = 'overlap-no'; }
      else { icon = '✗'; txt = `<b>${b.raw}</b> ${t('containNo')} <b>${a.raw}</b>`; cls = 'overlap-yes'; }
      rows.push(`<div class="cidr-line"><span class="${cls}">${icon}</span> ${txt}</div>`);
    }
    $('#result').innerHTML = `
      <div class="result-card">
        <h3>${t('containResult')}</h3>
        ${rows.join('')}
      </div>`;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${blocks.length-1} ${t('pairs')}</span>`;
    $('#copyBtns').innerHTML = '';
    return;
  }
}
