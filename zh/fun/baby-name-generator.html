  {n:'Sofia',g:'girl',o:'Spanish',m:'Wisdom'},
  {n:'Avery',g:'unisex',o:'English',m:'Ruler of elves'},
  {n:'Riley',g:'unisex',o:'Irish',m:'Courageous'},
  {n:'Quinn',g:'unisex',o:'Celtic',m:'Wisdom, chief'},

  {n:'Mira',g:'girl',o:'Indian',m:'Ocean, sea'},
  {n:'Nico',g:'unisex',o:'Greek',m:'Victory of the people'},
];
// Normalize the stray leading space in one entry
NAMES.forEach(x => x.n = x.n.trim());

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generate() {
  const gender = $('#gender').value;
  const origin = $('#origin').value;
  let pool = NAMES.filter(x =>
    (gender === 'any' || x.g === gender) &&
    (origin === 'any' || x.o === origin)
  );
  if (pool.length === 0) pool = NAMES.slice();
  const seen = new Set();
  const picks = [];
  let safety = 0;
  while (picks.length < 12 && safety < 400) {
    const c = pick(pool);
    if (!seen.has(c.n)) { seen.add(c.n); picks.push(c); }
    safety++;
  }
  $('#grid').innerHTML = picks.length ? picks.map(c => `
    <div class="bn-card">
      <div>
        <span class="nm">${c.n}</span>
        <span class="meta">${c.g === 'boy' ? '👦' : c.g === 'girl' ? '👧' : '🧒'} ${c.o}<br>${t('meaning')}: ${c.m}</span>
      </div>
      <div class="actions">
        <button class="fav-btn ${faves.has(c.n) ? 'faved' : ''}" data-fav="${c.n}" title="favorite">${faves.has(c.n) ? '❤️' : '🤍'}</button>
        <button class="cpy-btn" data-name="${c.n}" title="copy">📋</button>
      </div>
    </div>`).join('') : `<div class="bn-empty">${t('empty')}</div>`;

  document.querySelectorAll('#grid .fav-btn').forEach(b => b.addEventListener('click', () => {
    const v = b.dataset.fav;
    if (faves.has(v)) faves.delete(v); else faves.add(v);
    generate(); updateFaveBtn();
  }));
  document.querySelectorAll('#grid .cpy-btn').forEach(b => b.addEventListener('click', async () => {
    try { await navigator.clipboard.writeText(b.dataset.name); showToast(t('copied')); }
    catch (e) { showToast(t('copied')); }
  }));
}

function showFaves() {
  if (faves.size === 0) { showToast(t('empty')); return; }
  const list = NAMES.filter(x => faves.has(x.n));
  $('#grid').innerHTML = list.map(c => `
    <div class="bn-card">
      <div>
        <span class="nm">${c.n}</span>
        <span class="meta">${c.o}<br>${t('meaning')}: ${c.m}</span>
      </div>
      <div class="actions">
        <button class="fav-btn faved" data-fav="${c.n}" title="favorite">❤️</button>
        <button class="cpy-btn" data-name="${c.n}" title="copy">📋</button>
      </div>
    </div>`).join('');
  document.querySelectorAll('#grid .fav-btn').forEach(b => b.addEventListener('click', () => {
    faves.delete(b.dataset.fav); showFaves(); updateFaveBtn();
  }));
  document.querySelectorAll('#grid .cpy-btn').forEach(b => b.addEventListener('click', async () => {
    try { await navigator.clipboard.writeText(b.dataset.name); showToast(t('copied')); }
    catch (e) { showToast(t('copied')); }
  }));
}
function updateFaveBtn() { $('#btn-faves').textContent = `${t('btnFaves').replace(/\s*\(0\)|\s*\(\d+\)/,'')} (${faves.size})`; }

// Labels
$('#lbl-gender').textContent = t('lblGender');
$('#lbl-origin').textContent = t('lblOrigin');
$('#gender option[value="any"]').textContent = t('gAny');
$('#gender option[value="boy"]').textContent = t('gBoy');
$('#gender option[value="girl"]').textContent = t('gGirl');
$('#gender option[value="unisex"]').textContent = t('gUnisex');
$('#origin option[value="any"]').textContent = t('oAny');

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="btn-gen" onclick="generate()">${t('btnGen')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-faves" onclick="showFaves()">${t('btnFaves')}</button>`;
$('#gender').addEventListener('change', generate);
$('#origin').addEventListener('change', generate);

generate();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💕', href:'/fun/name-combiner.html', name:'Name Combiner'},
    {icon:'😎', href:'/fun/cool-nickname-generator.html', name:'Cool Nickname Generator'},
    
    {icon:'🥇', href:'/fun/random-name-picker.html', name:'Name Picker'},
  ]
});
</script>
