<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is Argon2?", "acceptedAnswer": {"@type": "Answer", "text": "Argon2 is the winner of the 2015 Password Hashing Competition and is the recommended password hashing algorithm by RFC 9106. It comes in three variants: Argon2id (recommended, hybrid), Argon2i (side-channel resistant) and Argon2d (GPU-resistant)."}}, {"@type": "Question", "name": "What parameters should I use for Argon2?", "acceptedAnswer": {"@type": "Answer", "text": "RFC 9106 recommends for production: memory 64 MiB (65536 KiB), iterations 3, parallelism 4, output length 32 bytes. The salt should be 16 random bytes. Higher values are more secure but slower."}}, {"@type": "Question", "name": "Is my password sent to a server?", "acceptedAnswer": {"@type": "Answer", "text": "No. All Argon2 hashing runs entirely in your browser using the hash-wasm WebAssembly library. Your password never leaves your device."}}, {"@type": "Question", "name": "What is the difference between Argon2id, Argon2i and Argon2d?", "acceptedAnswer": {"@type": "Answer", "text": "Argon2id is a hybrid of the other two and is the recommended default for most use cases. Argon2i uses data-independent memory access (resistant to side-channel attacks, good for password hashing). Argon2d uses data-dependent memory access (resistant to GPU cracking, good for cryptocurrency)."}}]}</script>

const { $, copyText, t } = GZ;

function randomBytes(n) {
  const a = new Uint8Array(n);
  crypto.getRandomValues(a);
  return a;
}

function toBase64(bytes) {
  let s = '';
  for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
  return btoa(s);
}
function fromBase64(b64) {
  const s = atob(b64);
  const out = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) out[i] = s.charCodeAt(i);
  return out;
}

// standard Argon2 PHC encoded format: $argon2id$v=19$m=65536,t=3,p=4$<salt>$<hash>
function encodeHash(type, m, t_, p, salt, hash) {
  return `$${type}$v=19$m=${m},t=${t_},p=${p}$${toBase64(salt).replace(/=/g,'')}$${toBase64(hash).replace(/=/g,'')}`;
}

function parseEncodedHash(str) {
  // $argon2id$v=19$m=65536,t=3,p=4$SALT$HASH
  const re = /^\$(argon2(?:id|i|d))\$v=(\d+)\$m=(\d+),t=(\d+),p=(\d+)\$([A-Za-z0-9+/=]+)\$([A-Za-z0-9+/=]+)$/;
  const m = str.trim().match(re);
  if (!m) return null;
  const [, type, version, mem, iter, par, saltB64, hashB64] = m;
  return {
    type, version: +version, memory: +mem, iterations: +iter, parallelism: +par,
    salt: fromBase64(saltB64), hash: fromBase64(hashB64),
    hashLen: fromBase64(hashB64).length,
  };
}

async function doGenerate() {
  const pw = $('#password').value;
  if (!pw) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('enterPw')}</span>`; return; }
  $('#status').innerHTML = `<span style="opacity:.7">${t('generating')}</span>`;
  $('#hash-output').textContent = '';
  try {
    const type = $('#argon-type').value;
    const memory = +$('#memory').value;
    const iterations = +$('#iterations').value;
    const parallelism = +$('#parallelism').value;
    const hashLen = +$('#hash-len').value;
    const salt = randomBytes(16);
    const saltB64 = toBase64(salt);
    if (!window.argon2) throw new Error('argon2 library not loaded');
    const res = await argon2.hash({
      password: pw,
      salt: saltB64,
      parallelism,
      memoryCost: memory,
      timeCost: iterations,
      hashLength: hashLen,
      type: type === 'argon2id' ? argon2.ArgonType.Argon2id : type === 'argon2i' ? argon2.ArgonType.Argon2i : argon2.ArgonType.Argon2d,
      hashType: argon2.HashType.Encoded,
    });
    // res.encoded is the standard PHC string; some versions return hash + rawSalt separately
    let encoded = res.encoded || encodeHash(type, memory, iterations, parallelism, salt, fromBase64(toBase64(res.hashRaw || res.hash)));
    // If encoded doesn't contain salt info, reconstruct
    if (encoded && !encoded.startsWith('$')) {
      encoded = encodeHash(type, memory, iterations, parallelism, salt, fromBase64(toBase64(res.hashRaw || res.hash)));
    }
    $('#hash-output').textContent = encoded;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${type} • ${memory} KiB • t=${iterations} • p=${parallelism} • ${hashLen}B</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ ${e.message}</span>`;
  }
}

async function doVerify() {
  const pw = $('#verify-password').value;
  const hashStr = $('#verify-hash').value.trim();
  if (!pw || !hashStr) { $('#verify-result').innerHTML = ''; return; }
  try {
    const parts = parseEncodedHash(hashStr);
    if (!parts) { $('#verify-result').innerHTML = `<div class="no-match">${t('invalid')}</div>`; return; }
    if (!window.argon2) throw new Error('argon2 library not loaded');
    const res = await argon2.hash({
      password: pw,
      salt: toBase64(parts.salt),
      parallelism: parts.parallelism,
      memoryCost: parts.memory,
      timeCost: parts.iterations,
      hashLength: parts.hashLen,
      type: parts.type === 'argon2id' ? argon2.ArgonType.Argon2id : parts.type === 'argon2i' ? argon2.ArgonType.Argon2i : argon2.ArgonType.Argon2d,
      hashType: argon2.HashType.Encoded,
    });
    const computedHashB64 = toBase64(fromBase64(toBase64(res.hashRaw || res.hash))).replace(/=/g,'');
    const expectedB64 = toBase64(parts.hash).replace(/=/g,'');
    const match = computedHashB64 === expectedB64;
    $('#verify-result').innerHTML = `<div class="${match?'match':'no-match'}">${match?t('match'):t('noMatch')}</div>`;
  } catch(e) {
    $('#verify-result').innerHTML = `<div class="no-match">${t('invalid')} (${e.message})</div>`;
  }
}
