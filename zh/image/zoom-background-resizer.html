<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Zoom Background Resizer',
    toolDesc: 'Resize any image to the perfect Zoom, Teams, Meet or Webex virtual background size (1920x1080 / 1280x720). Convert to JPG, PNG, or WebP. Free, browser-only.',
    dzText: 'Click or drag an image here',
    platform: 'Platform',
    quality: 'Quality',
    format: 'Format',
    fitMode: 'Fit Mode',
    fitCover: 'Cover (fill, may crop)',
    fitContain: 'Contain (letterbox)',
    fitStretch: 'Stretch',
    resize: 'Resize & Convert',
    download: 'Download',
    uploadFirst: 'Please upload an image first',
    done: (w,h,size)=>`✓ Resized to ${w}×${h} · ${(size/1024).toFixed(1)} KB`,
    pZoom: 'Zoom',
    pTeams: 'Teams',
    pMeet: 'Google Meet',
    pWebex: 'Webex',
    pCustom: 'Custom',
    step1: 'Choose your platform (Zoom, Teams, Meet, Webex) or custom size',
    step2: 'Set format (JPG/PNG/WebP), quality, and fit mode',
    step3: 'Upload your image — preview updates live',
    step4: 'Click Download to save the resized background',
  },
  zh: {
    toolTitle: 'Zoom 背景缩放器',
    toolDesc: '将任意图片调整为完美的 Zoom、Teams、Meet 或 Webex 虚拟背景尺寸（1920×1080 / 1280×720）。转换为 JPG、PNG 或 WebP。免费，浏览器本地运行。',
    dzText: '点击或拖拽图片到此处',
    platform: '平台',
    quality: '质量',
    format: '格式',
    fitMode: '适应模式',
    fitCover: '覆盖（填满，可能裁剪）',
    fitContain: '包含（留黑边）',
    fitStretch: '拉伸',
    resize: '调整并转换',
    download: '下载',
    uploadFirst: '请先上传图片',
    done: (w,h,size)=>`✓ 已调整至 ${w}×${h} · ${(size/1024).toFixed(1)} KB`,
    pZoom: 'Zoom',
    pTeams: 'Teams',
    pMeet: 'Google Meet',
    pWebex: 'Webex',
    pCustom: '自定义',
    step1: '选择平台（Zoom、Teams、Meet、Webex）或自定义尺寸',
    step2: '设置格式（JPG/PNG/WebP）、质量和适应模式',
    step3: '上传图片 — 预览实时更新',
    step4: '点击「下载」保存调整后的背景',
  }
});

const { $, t } = GZ;
const PLATFORMS = {
  zoom: { w:1920, h:1080, label:'pZoom' },
  teams: { w:1920, h:1080, label:'pTeams' },
  meet: { w:1920, h:1080, label:'pMeet' },
  webex: { w:1920, h:1080, label:'pWebex' },
  custom: { w:1920, h:1080, label:'pCustom' },
};
let state = { platform:'zoom', w:1920, h:1080, format:'image/jpeg', quality:0.9, fit:'cover', img:null, filename:'background' };

function buildPlatforms(){
  $('#platforms').innerHTML = Object.entries(PLATFORMS).map(([k,v])=>
    `<button class="platform-btn ${k===state.platform?'active':''}" data-k="${k}" onclick="selectPlatform('${k}')">${t(v.label)}</button>`
  ).join('');
}

function selectPlatform(k){
  state.platform = k;
  state.w = PLATFORMS[k].w;
  state.h = PLATFORMS[k].h;
  document.querySelectorAll('.platform-btn').forEach(b => b.classList.toggle('active', b.dataset.k===k));
  buildOptions();
  process();
}

function buildOptions(){
  const customDim = state.platform==='custom';
  $('#options').innerHTML = `
    <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:10px 0">
      ${customDim?`<label class="opt">${t('platform')} W <input type="number" id="o-w" value="${state.w}" style="width:70px" onchange="state.w=+this.value;process()"></label>
      <label class="opt">H <input type="number" id="o-h" value="${state.h}" style="width:70px" onchange="state.h=+this.value;process()"></label>`:`<span class="opt">${state.w} × ${state.h} px</span>`}
      <label class="opt">${t('format')} <select id="o-format" onchange="state.format=this.value;process()">
        <option value="image/jpeg" ${state.format==='image/jpeg'?'selected':''}>JPG</option>
        <option value="image/png" ${state.format==='image/png'?'selected':''}>PNG</option>
        <option value="image/webp" ${state.format==='image/webp'?'selected':''}>WebP</option>
      </select></label>
      <label class="opt" id="o-qual-wrap">${t('quality')} <input type="range" id="o-quality" min="0.3" max="1" step="0.05" value="${state.quality}" onchange="state.quality=+this.value;process()" style="width:100px"></label>
      <label class="opt">${t('fitMode')} <select id="o-fit" onchange="state.fit=this.value;process()">
        <option value="cover" ${state.fit==='cover'?'selected':''}>${t('fitCover')}</option>
        <option value="contain" ${state.fit==='contain'?'selected':''}>${t('fitContain')}</option>
        <option value="stretch" ${state.fit==='stretch'?'selected':''}>${t('fitStretch')}</option>
      </select></label>
    </div>`;
  // quality slider irrelevant for PNG
  $('#o-qual-wrap').style.display = state.format==='image/png' ? 'none' : 'inline-flex';
}

function setupDrop(){
  const dz = $('#dropzone');
  dz.addEventListener('click', () => $('#fileinput').click());
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('dragover');
    if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });
  $('#fileinput').addEventListener('change', e => {
    if(e.target.files[0]) handleFile(e.target.files[0]);
  });
}

function handleFile(file){
  if(!file.type.startsWith('image/')) return;
  state.filename = file.name.replace(/\.[^.]+$/, '');
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => { state.img = img; process(); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function process(){
  if(!state.img){
    $('#output').innerHTML='';
    $('#status').innerHTML='';
    return;
  }
  const canvas = document.createElement('canvas');
  canvas.width = state.w;
  canvas.height = state.h;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,state.w,state.h);

  const img = state.img;
  let dw, dh, dx, dy;
  const scaleW = state.w / img.width;
  const scaleH = state.h / img.height;
  if(state.fit==='stretch'){
    dw = state.w; dh = state.h; dx = 0; dy = 0;
  } else if(state.fit==='contain'){
    const s = Math.min(scaleW, scaleH);
    dw = img.width * s; dh = img.height * s;
    dx = (state.w - dw) / 2; dy = (state.h - dh) / 2;
  } else { // cover
    const s = Math.max(scaleW, scaleH);
    dw = img.width * s; dh = img.height * s;
    dx = (state.w - dw) / 2; dy = (state.h - dh) / 2;
  }
  ctx.drawImage(img, dx, dy, dw, dh);

  const dataUrl = canvas.toDataURL(state.format, state.quality);
  $('#output').innerHTML = `<img id="preview" src="${dataUrl}" alt="preview">
    <div style="margin-top:8px">
      <button class="gz-btn" onclick="downloadResult()">${t('download')}</button>
    </div>`;
  // estimate size
  fetch(dataUrl).then(r=>r.blob()).then(blob => {
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done',state.w,state.h,blob.size)}</span>`;
  });
}

function downloadResult(){
  const img = $('#preview');
  if(!img){ $('#status').innerHTML=t('uploadFirst'); return; }
  const a = document.createElement('a');
  a.href = img.src;
  const ext = state.format==='image/jpeg'?'jpg':state.format==='image/png'?'png':'webp';
  a.download = `${state.filename}-${state.w}x${state.h}.${ext}`;
  a.click();
}

buildPlatforms();
buildOptions();
setupDrop();

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="downloadResult()">${t('download')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/image/image-resizer.html', name:'Image Resizer'},
    {icon:'📱', href:'/image/social-media-resizer.html', name:'Social Media Resizer'},
    {icon:'📐', href:'/image/aspect-ratio-visualizer.html', name:'Aspect Ratio'},
    {icon:'🎨', href:'/image/image-converter.html', name:'Image Converter'},
  ]
});
</script>

</body>
