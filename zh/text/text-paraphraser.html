const { $, copyText, t } = GZ;

// Synonym groups — each array is interchangeable. Formal/casual bias handled by tag.
const SYN = [
  ['important','significant','crucial','vital','essential','key','major'],
  ['big','large','huge','massive','enormous','substantial','sizable'],
  ['small','tiny','little','minor','compact','modest','slight'],
  ['good','great','excellent','superb','outstanding','fine','quality'],
  ['bad','poor','terrible','awful','subpar','inferior','negative'],
  ['fast','quick','rapid','swift','speedy','prompt','brisk'],
  ['slow','sluggish','gradual','unhurried','leisurely','plodding'],
  ['happy','glad','pleased','delighted','content','joyful','cheerful'],
  ['sad','unhappy','sorrowful','dejected','downcast','melancholy','gloomy'],
  ['smart','intelligent','clever','bright','sharp','brilliant','wise'],
  ['beautiful','gorgeous','stunning','lovely','attractive','elegant','pretty'],
  ['ugly','unattractive','unsightly','hideous','plain','displeasing'],
  ['begin','start','commence','initiate','launch','kick off','open'],
  ['end','finish','conclude','complete','wrap up','terminate','stop'],
  ['help','assist','aid','support','facilitate','back','guide'],
  ['use','utilize','employ','apply','leverage','harness','operate'],
  ['make','create','produce','generate','build','construct','craft'],
  ['show','display','reveal','demonstrate','exhibit','present','illustrate'],
  ['get','obtain','acquire','gain','receive','secure','fetch'],
  ['change','alter','modify','adjust','transform','revise','shift'],
  ['think','believe','consider','suppose','reckon','assume','deem'],
  ['want','desire','wish','need','crave','require','long for'],
  ['try','attempt','endeavor','strive','aim','seek','undertake'],
  ['also','additionally','moreover','furthermore','as well','in addition'],
  ['but','however','yet','although','nevertheless','still','though'],
  ['because','since','as','due to','given that','owing to'],
  ['very','extremely','highly','remarkably','particularly','incredibly'],
  ['really','truly','genuinely','absolutely','quite','indeed'],
  ['easy','simple','straightforward','effortless','uncomplicated','smooth'],
  ['hard','difficult','challenging','tough','demanding','complex','arduous'],
  ['old','aged','ancient','vintage','elderly','antique','former'],
  ['new','fresh','novel','recent','modern','current','latest'],
  ['many','numerous','several','various','multiple','countless','plenty of'],
  ['showed','demonstrated','revealed','illustrated','displayed','indicated'],
  ['problem','issue','challenge','difficulty','concern','obstacle','hurdle'],
  ['solution','answer','resolution','remedy','fix','cure','way out'],
  ['idea','concept','notion','thought','proposition','suggestion','insight'],
  ['way','method','approach','technique','manner','process','strategy'],
];

// Tone-biased index hints (formal prefers later synonyms, casual earlier, simpler prefers shortest)
function pickSyn(group, mode, strength) {
  if (Math.random() * 100 > strength) return group[0]; // keep original sometimes
  let pool = group.slice(1); // exclude original
  if (mode === 'formal') pool = pool.filter(w => w.split(' ').length <= 2).sort((a,b) => b.length - a.length);
  else if (mode === 'casual') pool = pool.sort((a,b) => a.length - b.length);
  else if (mode === 'simpler') pool = pool.sort((a,b) => a.length - b.length);
  else if (mode === 'expand') pool = pool.filter(w => w.split(' ').length >= 1 || w.length > 6);
  if (!pool.length) pool = group.slice(1);
  return pool[Math.floor(Math.random() * pool.length)];
}

function buildSynMap() {
  const m = new Map();
  SYN.forEach(group => {
    group.forEach(w => {
      const k = w.toLowerCase();
      if (!m.has(k)) m.set(k, group);
    });
  });
  return m;
}
const SYN_MAP = buildSynMap();

function rephraseWord(word, mode, strength) {
  const lower = word.toLowerCase();
  const group = SYN_MAP.get(lower);
  if (!group) return word;
  const repl = pickSyn(group, mode, strength);
  // preserve capitalization
  if (word[0] === word[0].toUpperCase()) {
    return repl.charAt(0).toUpperCase() + repl.slice(1);
  }
  return repl;
}

// Light syntactic shuffles for English sentences
function shuffleSentence(sent, mode) {
  sent = sent.trim();
  // "Subject is X" -> "X is what Subject is" type mild variation is too risky; keep conservative.
  // Swap common connectors at start
  if (mode === 'casual' && /^However,/.test(sent)) return sent.replace(/^However,\s*/i, 'But ');
  if (mode === 'formal' && /^But\s/.test(sent)) return sent.replace(/^But\s/i, 'However, ');
  if (mode === 'formal' && /^And\s/.test(sent)) return sent.replace(/^And\s/i, 'Additionally, ');
  return sent;
}

function paraphrase() {
  const text = $('#input').value.trim();
  if (!text) { $('#output').textContent = t('empty'); $('#stats').textContent = ''; return; }
  const mode = currentMode;
  const strength = +$('#strength').value;
  const doShuffle = $('#shuffle').checked;

  const isCJK = /[\u4e00-\u9fff]/.test(text);
  let out;
  if (isCJK) {
    // Structural shuffle for Chinese: split on punctuation, occasionally reorder clauses split by ，
    out = text.split(/(?<=[。！？])/).map(sent => {
      if (doShuffle && sent.includes('，') && Math.random() < 0.3) {
        const parts = sent.split('，');
        if (parts.length === 2 && parts[0].length > 2 && parts[1].length > 2) {
          return parts[1].trimStart() + '，' + parts[0].trim();
        }
      }
      return sent;
    }).join('');
  } else {
    // English: tokenize words, swap synonyms, optionally shuffle sentence starts
    out = text.split(/(\s+)/).map(tok => {
      if (/^\s+$/.test(tok)) return tok;
      const m = tok.match(/^([A-Za-z']+)(.*)$/);
      if (!m) return tok;
      return rephraseWord(m[1], mode, strength) + m[2];
    }).join('');
    if (doShuffle) {
      out = out.split(/(?<=[.!?])\s+/).map(s => shuffleSentence(s, mode)).join(' ');
    }
    if (mode === 'expand') {
      out = out.replace(/\.\s+/g, '. In other words, ');
      out = out.replace(/,(?=\s)/g, (m, i) => (Math.random() < 0.15 ? ', essentially,' : m));
    }
    if (mode === 'simpler') {
      out = out.replace(/\b(in order to)\b/gi, 'to');
      out = out.replace(/\b(a number of)\b/gi, 'some');
      out = out.replace(/\b(due to the fact that)\b/gi, 'because');
    }
  }

  $('#output').textContent = out;

  const wIn = text.trim().split(/\s+/).length;
  const wOut = out.trim().split(/\s+/).length;
  // crude changed-word estimate
  let changed = 0;
  const a = text.toLowerCase().split(/\s+/), b = out.toLowerCase().split(/\s+/);
  const setB = new Set(b);
  a.forEach(w => { if (!setB.has(w)) changed++; });
  $('#stats').innerHTML = `<span><b>${wIn}</b> ${t('wordsIn')}</span><span><b>${wOut}</b> ${t('wordsOut')}</span><span><b>${changed}</b> ${t('changed')}</span>`;
}

let currentMode = 'standard';
const MODE_DEFS = [['standard','modeStandard'],['formal','modeFormal'],['casual','modeCasual'],['simpler','modeSimpler'],['expand','modeExpand']];
const modesEl = $('#modes');
MODE_DEFS.forEach(([id, key]) => {
  const b = document.createElement('button');
  b.textContent = t(key);
  if (id === 'standard') b.classList.add('on');
  b.onclick = () => {
    currentMode = id;
    [...modesEl.children].forEach(c => c.classList.remove('on'));
    b.classList.add('on');
  };
  modesEl.appendChild(b);
});

$('#strength').addEventListener('input', () => $('#strength-v').textContent = $('#strength').value + '%');

function loadExample() {
  $('#input').value = "The new feature is really important for our users because it makes the workflow much faster. However, the team needs to carefully test it before launch to avoid any big problems.";
  paraphrase();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#stats').textContent = ''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="paraphrase()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#output').textContent = t('empty');

    {icon:'✍️', href:'/text/handwriting.html', name:'Text to Handwriting'},
  ]
});
</script>
