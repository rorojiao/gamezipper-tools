const { $, copyText, t } = GZ;

function escapeKey(k) {
  // Escape chars that are special in .properties keys: space, :, =, #, !, backslash.
  // Dots are intentionally NOT escaped — they are the conventional hierarchy separator.
  return String(k).replace(/([ :=#!=\\])/g, '\\$1');
}

function escapeValue(v) {
  if (v === null) return '';
  if (typeof v === 'boolean') return v ? 'true' : 'false';
  if (typeof v === 'number') return String(v);
  let s = String(v);
  // Escape backslashes first, then leading spaces, then special chars, then unicode
  s = s.replace(/\\/g, '\\\\');
  s = s.replace(/^ /, '\\ ');
  s = s.replace(/(\r\n|\n|\r)/g, '\\n');
  s = s.replace(/([:=#])/g, '\\$1');
  s = s.replace(/[\u0000-\u001f\u007f-\uffff]/g, c => {
    const hex = c.charCodeAt(0).toString(16).toUpperCase();
    return '\\u' + '0'.repeat(4 - hex.length) + hex;
  });
  return s;
}

function flatten(obj, prefix, arrStyle, out) {
  if (Array.isArray(obj)) {
    obj.forEach((item, idx) => {
      const key = arrStyle === 'bracket' ? `${prefix}[${idx}]` : `${prefix}.${idx}`;
      flatten(item, key, arrStyle, out);
    });
  } else if (obj !== null && typeof obj === 'object') {
    const keys = Object.keys(obj);
    if (keys.length === 0) {
      out.push(`${escapeKey(prefix)}=`);
    } else {
      for (const k of keys) {
        const newPrefix = prefix ? `${prefix}.${k}` : k;
        flatten(obj[k], newPrefix, arrStyle, out);
      }
    }
  } else {
    out.push(`${escapeKey(prefix)}=${escapeValue(obj)}`);
  }
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').innerHTML = ''; $('#status').innerHTML = ''; return; }
  try {
    const obj = JSON.parse(inp);
    const prefix = $('#prefix').value.trim();
    const arrStyle = $('#arrStyle').value;
    const lines = [];
    if (Array.isArray(obj)) {
      obj.forEach((item, idx) => {
        const key = arrStyle === 'bracket' ? `${prefix || ''}[${idx}]` : `${prefix ? prefix + '.' : ''}${idx}`;
        flatten(item, key, arrStyle, lines);
      });
    } else if (obj !== null && typeof obj === 'object') {
      flatten(obj, prefix, arrStyle, lines);
    } else {
      throw new Error('Top-level JSON must be an object or array');
    }
    $('#output').textContent = lines.join('\n');
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')} (${lines.length} keys)</span>`;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ ${e.message}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
  }
}

function loadExample() {
  $('#input').value = JSON.stringify({

      name: "My Service",
      version: "2.1.0",
      "production:env": true
    },
    server: {
      host: "localhost",
      port: 8080,
      "max:connections": 100
    },
    database: {
      url: "jdbc:postgresql://db.example.com:5432/myapp",
      pool: { min: 5, max: 20 }
    },
    ports: [8080, 8443, 9000],
    features: ["auth", "cache", "logs"],
    notes: "Use \"caution\" = true\nLine two with émojis ✓"
  }, null, 2);
  convert();
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; $('#status').innerHTML = ''; }

$('#opts').innerHTML = `

    <label>${t('prefix')}: <input type="text" id="prefix" placeholder="(none)" oninput="convert()"></label>
    <label>${t('arrStyle')}:
      <select id="arrStyle" onchange="convert()">
        <option value="dot">dot (arr.0)</option>
        <option value="bracket">bracket (arr[0])</option>

    </label>

$('#toolbar').innerHTML = `
