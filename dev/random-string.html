<body>
<div class="gz-container">

      </div>
      <div class="opt-card"><label><input type="checkbox" id="upper" checked> <span data-i18n="upper"></span> (A-Z)</label></div>
      <div class="opt-card"><label><input type="checkbox" id="lower" checked> <span data-i18n="lower"></span> (a-z)</label></div>
      <div class="opt-card"><label><input type="checkbox" id="digits" checked> <span data-i18n="digits"></span> (0-9)</label></div>
      <div class="opt-card"><label><input type="checkbox" id="symbols"> <span data-i18n="symbols"></span> (!@#…)</label></div>
      <div class="opt-card"><label><input type="checkbox" id="hexOnly"> <span data-i18n="hex"></span> (0-9A-F)</label></div>

      <span id="strLbl">—</span>

  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Random String Generator',
    toolDesc: 'Generate cryptographically random strings with custom length, character set and bulk count — perfect for passwords, tokens, IDs and API keys.',
    length: 'Length',
    count: 'Count',
    upper: 'Uppercase',
    lower: 'Lowercase',
    digits: 'Digits',
    symbols: 'Symbols',
    hex: 'Hex only',
    excludeAmb: 'Exclude ambiguous (0OIl1)',
    customCharset: 'Custom character set (overrides above)',
    step1: 'Choose a string length (1 to 512 characters)',
    step2: 'Pick which character sets to include — at least one must be enabled',
    step3: 'Optionally set a custom character set to override the checkboxes',
    step4: 'Adjust Count to generate up to 1000 strings in bulk',
    step5: 'Click Generate to create cryptographically strong random strings',
    generate: 'Generate',
    copy: 'Copy All',
    copyOne: 'Copy',
    clear: 'Clear',
    entropy: 'Entropy',
    bits: 'bits',
    weak: 'weak',
    fair: 'fair',
    good: 'good',
    strong: 'strong',
    excellent: 'excellent',
  },
  zh: {
    toolTitle: '随机字符串生成器',
    toolDesc: '生成加密学强度的随机字符串，自定义长度、字符集和数量 — 适合密码、令牌、ID 和 API 密钥。',
    length: '长度',
    count: '数量',
    upper: '大写字母',
    lower: '小写字母',
    digits: '数字',
    symbols: '符号',
    hex: '仅十六进制',
    excludeAmb: '排除易混字符 (0OIl1)',
    customCharset: '自定义字符集（覆盖上方选项）',
    step1: '选择字符串长度（1 到 512 字符）',
    step2: '选择要包含的字符集 — 至少启用一个',
    step3: '可设置自定义字符集覆盖复选框',
    step4: '调整数量字段可批量生成最多 1000 条字符串',
    step5: '点击「生成」创建加密学强度的随机字符串',
    generate: '生成',
    copy: '复制全部',
    copyOne: '复制',
    clear: '清空',
    entropy: '熵',
    bits: '位',
    weak: '弱',
    fair: '一般',
    good: '良好',
    strong: '强',
    excellent: '极强',
  }
});

const { $, copyText, t } = GZ;

// i18n for opt-card labels with data-i18n
document.querySelectorAll('[data-i18n]').forEach(el => {
  el.textContent = t(el.dataset.i18n);
});

const AMBIGUOUS = new Set(['0','O','O','l','1','I','|','`']);

function getCharset() {
  const custom = $('#customCharset').value.trim();
  if (custom) return custom;
  if ($('#hexOnly').checked) return '0123456789ABCDEF';
  let cs = '';
  if ($('#upper').checked) cs += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if ($('#lower').checked) cs += 'abcdefghijklmnopqrstuvwxyz';
  if ($('#digits').checked) cs += '0123456789';
  if ($('#symbols').checked) cs += '!@#$%^&*()-_=+[]{};:,.<>?/~';
  if ($('#excludeAmbiguous').checked) cs = [...new Set(cs)].filter(c => !AMBIGUOUS.has(c)).join('');
  return cs;
}

function randomChar(cs) {
  // crypto-strong pick: rejection sampling for unbiasedness
  if (cs.length <= 256 && window.crypto && crypto.getRandomValues) {
    const arr = new Uint32Array(1);
    const max = Math.floor(0xFFFFFFFF / cs.length) * cs.length;
    let r;
    do { crypto.getRandomValues(arr); r = arr[0]; } while (r >= max);
    return cs[r % cs.length];
  }
  return cs[Math.floor(Math.random() * cs.length)];
}

function genOne(len, cs) {
  let out = '';
  for (let i = 0; i < len; i++) out += randomChar(cs);
  return out;
}

function strength(len, cs) {
  const bits = Math.floor(len * Math.log2(cs.length || 1));
  let label = 'weak', pct = Math.min(100, (bits / 128) * 100), color = '#ef4444';
  if (bits >= 128) { label = 'excellent'; color = '#10b981'; }
  else if (bits >= 80) { label = 'strong'; color = '#22c55e'; }
  else if (bits >= 60) { label = 'good'; color = '#84cc16'; }
  else if (bits >= 40) { label = 'fair'; color = '#eab308'; }
  return { bits, label, pct, color };
}

function generate() {
  const len = Math.max(1, Math.min(512, +$('#length').value || 16));
  const cnt = Math.max(1, Math.min(1000, +$('#count').value || 1));
  const cs = getCharset();
  if (!cs) { $('#out').value = '⚠ enable at least one character set'; $('#primaryStr').textContent = '—'; return; }
  const arr = [];
  for (let i = 0; i < cnt; i++) arr.push(genOne(len, cs));
  $('#out').value = arr.join('\n');
  $('#primaryStr').textContent = arr[0] || '—';
  const s = strength(len, cs);
  $('#entropy').textContent = `${t('entropy')}: ${s.bits} ${t('bits')}`;
  $('#strFill').style.width = s.pct + '%';
  $('#strFill').style.background = s.color;
  $('#strLbl').textContent = t(s.label);
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">⚡ ${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#out').value)">📋 ${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#out').value='';$('#primaryStr').textContent='—';$('#entropy').textContent='';$('#strFill').style.width='0';$('#strLbl').textContent='—'">🗑 ${t('clear')}</button>`;
$('#copyPrimary').onclick = () => copyText($('#primaryStr').textContent);
['#upper','#lower','#digits','#symbols','#hexOnly','#customCharset','#length','#count','#excludeAmbiguous'].forEach(s => $(s).addEventListener('input', generate));

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4','step5'],
  related: [
    {icon:'🔑', href:'/dev/password-generator.html', name:'Password Generator'},
    {icon:'🆔', href:'/dev/uuid.html', name:'UUID Generator'},
    {icon:'🔐', href:'/dev/hmac.html', name:'HMAC Generator'},
    {icon:'🎲', href:'/calc/random-number-generator.html', name:'Random Number'},
  ]
});

generate();
</script>
<script src="/tools-result-rec.js" defer></script>
