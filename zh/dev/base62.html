const { $, copyText, t } = GZ;

const ALPHABETS = {
  standard: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz',
  inverted: '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ',
};

function getAlphabet() { return ALPHABETS[$('#alphabet').value] || ALPHABETS.standard; }

// --- Big-integer Base62 (lossless for any byte length) ---
function bytesToB62(bytes, alpha) {
  if (bytes.length === 0) return '';
  // Handle leading zero bytes — each leading zero byte becomes a '0'
  let leadingZeros = 0;
  while (leadingZeros < bytes.length && bytes[leadingZeros] === 0) leadingZeros++;
  let num = 0n;
  for (let i = leadingZeros; i < bytes.length; i++) {
    num = (num << 8n) | BigInt(bytes[i]);
  }
  if (num === 0n) return alpha[0].repeat(Math.max(1, leadingZeros));
  let out = '';
  const base = BigInt(alpha.length);
  while (num > 0n) {
    const rem = num % base;
    out = alpha[Number(rem)] + out;
    num = num / base;
  }
  return alpha[0].repeat(leadingZeros) + out;
}

function b62ToBytes(str, alpha) {
  if (str === '') return new Uint8Array(0);
  // Count leading '0' chars (the zero marker)
  let leadingZeros = 0;
  const zeroChar = alpha[0];
  while (leadingZeros < str.length && str[leadingZeros] === zeroChar) leadingZeros++;
  let num = 0n;
  const base = BigInt(alpha.length);
  const map = {};
  for (let i = 0; i < alpha.length; i++) map[alpha[i]] = i;
  for (let i = leadingZeros; i < str.length; i++) {
    const v = map[str[i]];
    if (v === undefined) throw new Error('invalid Base62 character: ' + str[i]);
    num = num * base + BigInt(v);
  }
  // Convert big int to bytes
  const bytes = [];
  if (num === 0n) {
    // only leading zeros
  } else {
    while (num > 0n) {
      bytes.unshift(Number(num & 0xffn));
      num = num >> 8n;
    }
  }
  const result = new Uint8Array(leadingZeros + bytes.length);
  for (let i = 0; i < bytes.length; i++) result[leadingZeros + i] = bytes[i];
  return result;
}

function textToBytes(s) {
  return new TextEncoder().encode(s);
}
function bytesToText(bytes) {
  return new TextDecoder().decode(bytes);
}
function hexToBytes(hex) {
  hex = hex.replace(/^0x/i,'').replace(/\s+/g,'');
  if (!/^[0-9a-fA-F]*$/.test(hex) || hex.length % 2 !== 0) throw new Error('not valid hex');
  const out = new Uint8Array(hex.length / 2);
  for (let i = 0; i < out.length; i++) out[i] = parseInt(hex.substr(i*2, 2), 16);
  return out;
}
function bytesToHex(bytes) {
  return Array.from(bytes).map(b => b.toString(16).padStart(2,'0')).join('');
}

function encode() {
  const inp = $('#input').value;
  if (!inp) { $('#output').value=''; $('#status').textContent=''; return; }
  try {
    const alpha = getAlphabet();
    const bytes = $('#mode').value === 'hex' ? hexToBytes(inp) : textToBytes(inp);
    $('#output').value = bytesToB62(bytes, alpha);
    $('#status').className = 'b62-status ok';
    $('#status').textContent = t('encoded');
  } catch (e) {
    $('#status').className = 'b62-status err';
    $('#status').textContent = t('invalid') + e.message;
    $('#output').value = '';
  }
}

function decode() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').value=''; $('#status').textContent=''; return; }
  try {
    const alpha = getAlphabet();
    // Validate characters
    const valid = new Set(alpha);
    for (const ch of inp) {
      if (!valid.has(ch)) throw new Error(t('invalidB62'));
    }
    const bytes = b62ToBytes(inp, alpha);
    if ($('#mode').value === 'hex') {
      $('#output').value = bytesToHex(bytes);
    } else {
      $('#output').value = bytesToText(bytes);
    }
    $('#status').className = 'b62-status ok';
    $('#status').textContent = t('decoded');
  } catch (e) {
    $('#status').className = 'b62-status err';
    $('#status').textContent = t('invalid') + e.message;
    $('#output').value = '';
  }
}

function loadExample() {
  $('#input').value = $('#mode').value === 'hex' ? '48656c6c6f2c20576f726c6421' : 'Hello, World!';
  encode();
}

function doClear() { $('#input').value=''; $('#output').value=''; $('#status').textContent=''; }
