<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'CTR Calculator',
    toolDesc: 'Calculate click-through rate (CTR) for advertising, email, and SEO. Enter impressions and clicks to get your CTR instantly, or solve for clicks needed to hit a target CTR. Free and private.',
    modeCTR: 'Find CTR',
    modeClicks: 'Find Clicks',
    modeImpressions: 'Find Impressions',
    impressions: 'Impressions (views)',
    clicks: 'Clicks',
    ctr: 'Click-through rate (CTR)',
    resultCTR: 'Your CTR',
    resultClicks: 'Clicks',
    resultImpressions: 'Impressions',
    rating: 'Rating',
    step1: 'Choose what you want to solve (CTR, clicks, or impressions)',
    step2: 'Enter the two known values',
    step3: 'The third value is calculated instantly',
    step4: 'Compare your CTR to industry benchmarks',
  },
  zh: {
    toolTitle: 'CTR 点击率计算器',
    toolDesc: '计算广告、邮件和 SEO 的点击率 (CTR)。输入展示次数和点击次数即可获得 CTR，或根据目标 CTR 求解所需的点击次数。免费且私密。',
    modeCTR: '求 CTR',
    modeClicks: '求点击数',
    modeImpressions: '求展示次数',
    impressions: '展示次数（浏览）',
    clicks: '点击次数',
    ctr: '点击率 (CTR)',
    resultCTR: '你的 CTR',
    resultClicks: '点击次数',
    resultImpressions: '展示次数',
    rating: '评级',
    step1: '选择要计算的值（CTR、点击数或展示次数）',
    step2: '输入两个已知值',
    step3: '第三个值自动计算',
    step4: '将你的 CTR 与行业基准对比',
  }
});

const { $, t } = GZ;
let mode = 'ctr';

function buildInputCard() {
  const fields = mode === 'ctr'
    ? `<div class="ct-field"><label>${t('impressions')}</label><input type="number" id="impressions" value="50000" min="0" step="100"></div>
       <div class="ct-field"><label>${t('clicks')}</label><input type="number" id="clicks" value="750" min="0" step="1"></div>`
    : mode === 'clicks'
    ? `<div class="ct-field"><label>${t('impressions')}</label><input type="number" id="impressions" value="50000" min="0" step="100"></div>
       <div class="ct-field"><label>${t('ctr')}</label><input type="number" id="ctr" value="2" min="0" step="0.1"></div>`
    : `<div class="ct-field"><label>${t('clicks')}</label><input type="number" id="clicks" value="750" min="0" step="1"></div>
       <div class="ct-field"><label>${t('ctr')}</label><input type="number" id="ctr" value="2" min="0" step="0.1"></div>`;

  $('#input-card').innerHTML = `
    <div class="ct-mode-btns">
      <button class="ct-mode-btn ${mode==='ctr'?'active':''}" onclick="setMode('ctr')">${t('modeCTR')}</button>
      <button class="ct-mode-btn ${mode==='clicks'?'active':''}" onclick="setMode('clicks')">${t('modeClicks')}</button>
      <button class="ct-mode-btn ${mode==='impressions'?'active':''}" onclick="setMode('impressions')">${t('modeImpressions')}</button>
    </div>
    ${fields}
  `;
  $('#input-card').querySelectorAll('input').forEach(inp => inp.addEventListener('input', calculate));
}

function setMode(m) { mode = m; buildInputCard(); calculate(); }

$('#info-card').innerHTML = `
  <h3 style="margin:0 0 14px;font-size:1.05em">ℹ️ CTR formulas</h3>
  <div style="font-size:.9em;line-height:1.8;opacity:.85">
    <strong>CTR</strong> = (Clicks ÷ Impressions) × 100<br>
    <strong>Clicks</strong> = Impressions × (CTR ÷ 100)<br>
    <strong>Impressions</strong> = Clicks ÷ (CTR ÷ 100)
  </div>
  <div style="margin-top:14px;padding:12px 14px;background:var(--glass2);border-radius:10px;font-size:.85em;line-height:1.55;opacity:.85">
    <strong>📊 Industry benchmarks:</strong><br>
    • Google Search ads: 3 - 5%<br>
    • Google Display ads: 0.5 - 1%<br>
    • Facebook ads: 1 - 2%<br>
    • Email marketing: 2 - 5%<br>
    • Google organic #1: ~28 - 32%
  </div>
`;

function rateCTR(ctr) {
  if (ctr >= 5) return {label: '🌟 Excellent', color: '#22c55e'};
  if (ctr >= 3) return {label: '✅ Good', color: '#22c55e'};
  if (ctr >= 1) return {label: '⚠️ Average', color: '#f59e0b'};
  return {label: '📉 Below average', color: '#ef4444'};
}

function calculate() {
  const imp = parseFloat($('#impressions')?.value);
  const cl = parseFloat($('#clicks')?.value);
  const ctrVal = parseFloat($('#ctr')?.value);

  let rCTR, rClicks, rImp;
  if (mode === 'ctr' && imp > 0 && cl >= 0) {
    rCTR = (cl / imp) * 100; rClicks = cl; rImp = imp;
  } else if (mode === 'clicks' && imp > 0 && ctrVal >= 0) {
    rClicks = imp * (ctrVal / 100); rCTR = ctrVal; rImp = imp;
  } else if (mode === 'impressions' && cl > 0 && ctrVal > 0) {
    rImp = cl / (ctrVal / 100); rCTR = ctrVal; rClicks = cl;
  } else { $('#results').innerHTML = ''; return; }

  const rating = rateCTR(rCTR);
  const bigVal = mode === 'ctr' ? rCTR.toFixed(2) + '%' : mode === 'clicks' ? Math.round(rClicks).toLocaleString() : Math.round(rImp).toLocaleString();
  const bigLabel = mode === 'ctr' ? t('resultCTR') : mode === 'clicks' ? t('resultClicks') : t('resultImpressions');

  $('#results').innerHTML = `
    <div class="ct-section-title">${bigLabel}</div>
    <div class="ct-big">${bigVal}</div>
    ${mode === 'ctr' ? `<div class="ct-badge" style="background:${rating.color}22;color:${rating.color}">${rating.label}</div>` : ''}
    <div class="ct-breakdown">
      <div class="ct-row ${mode==='ctr'?'highlight':''}"><span class="lbl">${t('resultCTR')}</span><span class="val">${rCTR.toFixed(3)}%</span></div>
      <div class="ct-row ${mode==='clicks'?'highlight':''}"><span class="lbl">${t('resultClicks')}</span><span class="val">${Math.round(rClicks).toLocaleString()}</span></div>
      <div class="ct-row ${mode==='impressions'?'highlight':''}"><span class="lbl">${t('resultImpressions')}</span><span class="val">${Math.round(rImp).toLocaleString()}</span></div>
    </div>`;
}

buildInputCard();
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1', 'step2', 'step3', 'step4'],
  related: [
    {icon: '💰', href: '/calc/adsense-revenue-calculator.html', name: 'AdSense Revenue'},
    {icon: '📈', href: '/calc/cpm-calculator.html', name: 'CPM Calculator'},
    {icon: '📊', href: '/calc/conversion-rate-calculator.html', name: 'Conversion Rate'},
    {icon: '🧪', href: '/calc/ab-test-calculator.html', name: 'A/B Test'},
  ]
});
</script>
