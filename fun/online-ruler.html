.calibrate-bar::after{content:'⟵ Drag edges to calibrate ⟶';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:.7em;white-space:nowrap;pointer-events:none}
#measurement{font-size:2em;font-weight:700;text-align:center;color:var(--accent);margin:16px 0}

<script>
GZI18n.register({
  en: {
    toolTitle: 'Online Ruler — Actual Size cm/inch',
    toolDesc: 'Free online ruler that shows actual size. Calibrate to your screen, measure objects in cm or inches — works on any device.',
    lblCalibrate: 'Calibrate for Accuracy',
    calibrateDesc: 'Place a real object on the bar below and drag the edges until it matches.',
    lblRef: 'Reference object:',
    ppiInfo: 'Estimated PPI: {ppi}',
    screenWidthInfo: 'Screen: {w}px',
    step1: 'Select cm or inch unit using the toggle buttons',
    step2: 'For best accuracy, calibrate using a real object like a credit card',
    step3: 'Place your object on the screen ruler to measure',
    step4: 'Drag calibration bar edges to adjust if measurements seem off',
  },
  zh: {
    toolTitle: '在线尺子 — 实际尺寸厘米/英寸',
    toolDesc: '免费在线尺子，显示实际尺寸。校准屏幕后可测量物体，支持厘米和英寸 — 适用于任何设备。',
    lblCalibrate: '校准以提高精度',
    calibrateDesc: '将真实物品放在下方校准条上，拖动边缘直到匹配。',
    lblRef: '参考物：',
    ppiInfo: '估算 PPI：{ppi}',
    screenWidthInfo: '屏幕：{w}px',
    step1: '使用切换按钮选择厘米或英寸单位',
    step2: '为获得最佳精度，请使用信用卡等实物校准',
    step3: '将物品放在屏幕尺子上进行测量',
    step4: '如果测量不准，拖动校准条边缘进行调整',
  }
});

const { $, t } = GZ;
let unit = 'cm';
let ppi = 96; // default
const refSizes = {
  'credit-card': 85.6,
  'dollar': 156.1,
  'quarter': 24.26,
  'a4-width': 210
};

// Try to detect DPI
if (window.devicePixelRatio) {
  ppi = Math.round(96 * window.devicePixelRatio);
}

$('#ppi-info').textContent = t('ppiInfo').replace('{ppi}', ppi);
$('#screen-width-info').textContent = t('screenWidthInfo').replace('{w}', screen.width);

function mmToPx(mm) {
  return mm / 25.4 * ppi;
}
function pxToMm(px) {
  return px * 25.4 / ppi;
}

$('#lbl-calibrate').textContent = t('lblCalibrate');
$('#calibrate-desc').textContent = t('calibrateDesc');
$('#lbl-ref').textContent = t('lblRef');

function drawRuler() {
  const ruler = $('#ruler');
  const container = $('#ruler-container');
  const maxWidth = container.clientWidth - 40;
  ruler.style.width = maxWidth + 'px';
  ruler.innerHTML = '';
  
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark' || 
    (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
  if (isDark) ruler.classList.add('dark-mode');

  const mmPerUnit = unit === 'cm' ? 10 : 25.4;
  const totalMM = pxToMm(maxWidth);
  const totalUnits = Math.floor(totalMM / mmPerUnit);

  for (let i = 0; i <= totalUnits; i++) {
    const mm = i * mmPerUnit;
    const px = mmToPx(mm);
    if (px > maxWidth) break;
    
    const tick = document.createElement('div');
    tick.className = 'tick major';
    tick.style.left = px + 'px';
    ruler.appendChild(tick);

    const label = document.createElement('div');
    label.className = 'tick-label';
    label.style.left = px + 'px';
    label.textContent = i;
    ruler.appendChild(label);

    // Sub-ticks
    const subDiv = unit === 'cm' ? 10 : 8;
    for (let j = 1; j < subDiv; j++) {
      const subMM = mm + (mmPerUnit / subDiv) * j;
      const subPx = mmToPx(subMM);
      if (subPx > maxWidth) break;
      const subTick = document.createElement('div');
      subTick.className = j % (subDiv / 2) === 0 ? 'tick medium' : 'tick minor';
      subTick.style.left = subPx + 'px';
      ruler.appendChild(subTick);
    }
  }
}

// Mouse measurement
$('#ruler-container').addEventListener('mousemove', e => {
  const rect = $('#ruler').getBoundingClientRect();
  const px = e.clientX - rect.left;
  const mm = pxToMm(px);
  const val = unit === 'cm' ? (mm / 10).toFixed(2) : (mm / 25.4).toFixed(3);
  $('#measurement').textContent = `${val} ${unit}`;
});
$('#ruler-container').addEventListener('mouseleave', () => {
  $('#measurement').textContent = `— ${unit}`;
});

// Unit toggle
$('#btn-cm').onclick = () => {
  unit = 'cm';
  $('#btn-cm').className = 'gz-btn';
  $('#btn-inch').className = 'gz-btn gz-btn-secondary';
  drawRuler();
};
$('#btn-inch').onclick = () => {
  unit = 'inch';
  $('#btn-inch').className = 'gz-btn';
  $('#btn-cm').className = 'gz-btn gz-btn-secondary';
  drawRuler();
};

// Calibration bar drag
let isDragging = false;
const calibrateBar = $('#calibrate-bar');

function updateCalibration() {
  const widthPx = parseInt(calibrateBar.style.width);
  const refKey = $('#ref-object').value;
  const refMM = refSizes[refKey];
  ppi = Math.round(widthPx / (refMM / 25.4));
  if (ppi < 30) ppi = 30;
  if (ppi > 600) ppi = 600;
  $('#ppi-info').textContent = t('ppiInfo').replace('{ppi}', ppi);
  drawRuler();
}

calibrateBar.addEventListener('mousedown', e => { isDragging = true; e.preventDefault(); });
calibrateBar.addEventListener('touchstart', e => { isDragging = true; });

document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const rect = calibrateBar.getBoundingClientRect();
  const newWidth = Math.max(50, e.clientX - rect.left);
  calibrateBar.style.width = newWidth + 'px';
  updateCalibration();
});
document.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const rect = calibrateBar.getBoundingClientRect();
  const newWidth = Math.max(50, e.touches[0].clientX - rect.left);
  calibrateBar.style.width = newWidth + 'px';
  updateCalibration();
});
document.addEventListener('mouseup', () => { isDragging = false; });
document.addEventListener('touchend', () => { isDragging = false; });

$('#ref-object').onchange = () => {
  const refKey = $('#ref-object').value;
  const refMM = refSizes[refKey];
  calibrateBar.style.width = Math.round(mmToPx(refMM)) + 'px';
};

$('#btn-reset-calibrate').onclick = () => {
  ppi = Math.round(96 * (window.devicePixelRatio || 1));
  calibrateBar.style.width = Math.round(mmToPx(85.6)) + 'px';
  $('#ppi-info').textContent = t('ppiInfo').replace('{ppi}', ppi);
  drawRuler();
};

// Init calibration bar to credit card size
calibrateBar.style.width = Math.round(mmToPx(85.6)) + 'px';

drawRuler();
window.addEventListener('resize', drawRuler);

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖥️', href:'/dev/screen-resolution.html', name:'Screen Resolution'},
    {icon:'📏', href:'/calc/dpi-calculator.html', name:'DPI Calculator'},
    {icon:'📐', href:'/calc/area-calculator.html', name:'Area Calculator'},
    {icon:'⌨️', href:'/fun/keyboard-tester.html', name:'Keyboard Tester'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
