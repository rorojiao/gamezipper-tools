<script>
GZI18n.register({
  en:{
    toolTitle:'Unlock PDF — Remove Password from PDF',
    toolDesc:'Remove the password from a protected PDF and download an unencrypted copy. Just enter the current password — everything runs in your browser, nothing is uploaded.',
    dropText:'Drop a password-protected PDF here or click to browse',
    curPwd:'Current password',
    unlock:'Unlock & Download',

    wrongPwd:'Incorrect password — please check and try again',

    step1:'Drop or select your password-protected PDF',
    step2:'Enter the current password used to open the PDF',
    step3:'Click Unlock & Download to decrypt it locally',
    step4:'An unencrypted copy of the PDF downloads automatically',
  },
  zh:{
    toolTitle:'PDF 解密 — 移除 PDF 密码',
    toolDesc:'移除受保护 PDF 的密码并下载未加密副本。只需输入当前密码 — 全部在浏览器本地完成，不上传任何内容。',
    dropText:'拖拽受密码保护的 PDF 到此处或点击选择',
    curPwd:'当前密码',
    unlock:'解锁并下载',
    clear:'清除',
    noFile:'请先选择一个 PDF 文件',
    noPwd:'请输入当前密码',
    done:'已下载解锁后的 PDF！',
    wrongPwd:'密码不正确，请检查后重试',
    notEncrypted:'该 PDF 未受密码保护，无需解锁。',
    step1:'拖入或选择受密码保护的 PDF',
    step2:'输入打开该 PDF 所用的当前密码',
    step3:'点击「解锁并下载」在本地解密',
    step4:'未加密的 PDF 副本会自动下载',
  }
});
const {$,t}=GZ;
let pdfFile=null;

function formatSize(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB';}

function renderFile(){
  if(!pdfFile){$('#fileHolder').innerHTML='';$('#opts').style.display='none';return;}
  $('#fileHolder').innerHTML=`<div class="pdf-file"><span>📄</span><span class="fname">${pdfFile.name}</span><span class="gz-text-muted">${formatSize(pdfFile.size)}</span><button class="remove" onclick="pdfFile=null;renderFile()">✕</button></div>`;
  $('#opts').style.display='block';
}

$('#dropText').textContent=t('dropText');
const dz=$('#dropZone');
dz.addEventListener('click',()=>$('#fileInput').click());
$('#fileInput').addEventListener('change',e=>{if(e.target.files[0]){pdfFile=e.target.files[0];renderFile();}e.target.value='';});
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover');});
dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover');if(e.dataTransfer.files[0]&&/pdf/i.test(e.dataTransfer.files[0].type||e.dataTransfer.files[0].name)){pdfFile=e.dataTransfer.files[0];renderFile();}});

async function unlockPDF(){
  if(!pdfFile){alert(t('noFile'));return;}
  const pwd=$('#curPwd').value;
  if(!pwd){alert(t('noPwd'));return;}
  try{
    const {PDFDocument}=PDFLib;
    const bytes=await pdfFile.arrayBuffer();
    let doc;
    try{
      doc=await PDFDocument.load(bytes,{password:pwd});
    }catch(e){
      // some builds throw generic encryption error; try again with explicit flag
      try{doc=await PDFDocument.load(bytes,{password:pwd,ignoreEncryption:false});}
      catch(e2){alert(t('wrongPwd'));return;}
    }
    // Re-save without encryption (no password options)
    const out=await doc.save();
    const blob=new Blob([out],{type:'application/pdf'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=pdfFile.name.replace(/\.pdf$/i,'')+'-unlocked.pdf';a.click();
    URL.revokeObjectURL(url);
    GZ.showToast(t('done'));
  }catch(e){
    const m=String(e.message||'');
    if(/encrypt|password|decrypt/i.test(m))alert(t('wrongPwd'));
    else alert('Error: '+m);
  }
}

$('#toolbar').innerHTML=`<button class="gz-btn" onclick="unlockPDF()">🔓 ${t('unlock')}</button><button class="gz-btn gz-btn-secondary" onclick="pdfFile=null;renderFile();$('#curPwd').value='';">${t('clear')}</button>`;

GZ.renderToolPage({category:'convert',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[

  {icon:'🗜️',href:'/convert/pdf-compressor.html',name:'PDF Compressor'},
]});
</script>
