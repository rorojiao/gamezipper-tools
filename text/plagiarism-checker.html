<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How does this plagiarism checker work?", "acceptedAnswer": {"@type": "Answer", "text": "This tool compares two pieces of text using a shingle-based similarity algorithm. It breaks each text into overlapping word sequences (n-grams), counts how many sequences appear in both, and computes a similarity percentage. Matching sequences are highlighted in red for easy review."}}, {"@type": "Question", "name": "Does it check the internet for copied content?", "acceptedAnswer": {"@type": "Answer", "text": "No. This is a privacy-first local comparison tool — it only compares the two texts you provide. It does not crawl the web or query any database. For full web plagiarism scanning, use a paid service that indexes the internet. This tool is ideal for self-checking drafts against a source, comparing two versions, or verifying a rewrite."}}, {"@type": "Question", "name": "What does the similarity score mean?", "acceptedAnswer": {"@type": "Answer", "text": "The score is the percentage of word sequences (5-grams by default) in the second text that also appear in the first. 0-15% is generally considered unique, 15-30% suggests heavy paraphrasing, and 30%+ usually means substantial copying. Academic and editorial thresholds vary — always use judgment."}}, {"@type": "Question", "name": "Is my text private?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Everything happens in your browser. Your text is never sent to a server, never stored, and never logged. You can use this tool offline once the page has loaded."}}]}</script>

<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>

      <label class="pc-toggle" id="lblNgram"></label>
      <select id="ngram" style="padding:4px 8px;border-radius:6px;background:var(--bg);color:var(--text);border:1px solid var(--border)">
        <option value="3">3-gram</option>
        <option value="4">4-gram</option>

        <option value="6">6-gram</option>
        <option value="7">7-gram</option>
      </select>
      <label class="pc-toggle"><input type="checkbox" id="ignoreCase" checked> Case-insensitive</label>
      <label class="pc-toggle"><input type="checkbox" id="ignorePunct" checked> Strip punctuation</label>
    </div>
    <div class="gz-split">
      <div><label id="lblA"></label><textarea id="source" rows="12" spellcheck="false">The quick brown fox jumps over the lazy dog. This classic pangram contains every letter of the English alphabet. Writers and typists have used it for decades to test fonts, keyboards, and typing speed. The phrase is memorable, well-known, and frequently quoted in design and typography circles.</textarea></div>
      <div><label id="lblB"></label><textarea id="candidate" rows="12" spellcheck="false">The quick brown fox jumps over the lazy dog. This classic pangram contains every letter of the English alphabet. Designers and typists have used it for years to test fonts, keyboards, and typing speed. The phrase is memorable, well-known, and frequently quoted in design and typography circles.</textarea></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Plagiarism Checker & Similarity Detector',
    toolDesc: 'Compare two texts and find copied or reused phrases. Highlights matching passages and shows a similarity percentage — runs entirely in your browser.',
    lblNgram: 'N-gram size:', lblA: 'Source text', lblB: 'Your text (to check)',
    lblOutA: 'Source (matches highlighted)', lblOutB: 'Your text (matches highlighted)',
    step1: 'Paste the original text on the left and your draft on the right',
    step2: 'Choose an n-gram size (5-grams work best for prose)',
    step3: 'Read the similarity score and review highlighted matches',
    step4: 'Rewrite any red sections to lower the overlap and improve originality',
  },
  zh: {
    toolTitle: '抄袭检测 & 文本相似度工具',
    toolDesc: '比较两段文本，查找复制或重复的短语。高亮匹配片段并显示相似度百分比——完全在你的浏览器中运行。',
    lblNgram: 'N 元组大小:', lblA: '原文', lblB: '你的文本（待检测）',
    lblOutA: '原文（高亮匹配）', lblOutB: '你的文本（高亮匹配）',
    step1: '在左侧粘贴原文，右侧粘贴你的草稿',
    step2: '选择 N 元组大小（散文推荐 5-gram）',
    step3: '查看相似度评分并检查高亮的匹配片段',
    step4: '重写红色部分以降低重叠率并提高原创性',
  }
});

const { $, t } = GZ;

function tokenize(s, ignoreCase, ignorePunct) {
  if (ignoreCase) s = s.toLowerCase();
  if (ignorePunct) s = s.replace(/[^\w\s\u4e00-\u9fff]/g, ' ');
  return s.split(/\s+/).filter(Boolean);
}

function shingles(tokens, n) {
  const out = [];
  if (tokens.length < n) {
    return [tokens.join(' ')];
  }
  for (let i = 0; i <= tokens.length - n; i++) {
    out.push(tokens.slice(i, i + n).join(' '));
  }
  return out;
}

function renderHighlighted(text, matches, ignoreCase, ignorePunct) {
  if (!matches.length) return text;
  const tokens = tokenize(text, ignoreCase, ignorePunct);
  if (tokens.length < matches[0].split(' ').length) return text;
  const n = matches[0].split(' ').length;
  const matchSet = new Set(matches);
  let result = [];
  let i = 0;
  while (i < tokens.length) {
    let matched = null;
    if (i <= tokens.length - n) {
      const gram = tokens.slice(i, i + n).join(' ');
      if (matchSet.has(gram)) matched = n;
    }
    if (matched) {
      result.push({t: tokens.slice(i, i + n).join(' '), m: true});
      i += n;
    } else {
      result.push({t: tokens[i], m: false});
      i++;
    }
  }
  // Reconstruct with original spacing
  let html = '';
  let buf = '';
  let bufMatch = null;
  for (let k = 0; k < result.length; k++) {
    if (k === 0 || result[k].m !== bufMatch) {
      if (buf) {
        html += bufMatch ? `<span class="match">${escapeHtml(buf)}</span>` : escapeHtml(buf);
        buf = '';
      }
      bufMatch = result[k].m;
    }
    buf += (buf && k > 0 && !bufMatch ? ' ' : '') + (k > 0 && !bufMatch ? '' : (k > 0 ? ' ' : '')) + result[k].t;
    // fix spacing: just use simple concatenation with space
  }
  // Above is buggy, rebuild properly:
  let html2 = '';
  for (let k = 0; k < result.length; k++) {
    if (k > 0) html2 += ' ';
    if (result[k].m) {
      // start a match span if not in one
      if (k === 0 || !result[k-1].m) html2 += '<span class="match">';
    } else {
      if (k > 0 && result[k-1].m) html2 += '</span>';
    }
    html2 += escapeHtml(result[k].t);
    if (k === result.length - 1 && result[k].m) html2 += '</span>';
  }
  return html2;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function compute() {
  const A = $('#source').value, B = $('#candidate').value;
  const n = parseInt($('#ngram').value);
  const ignoreCase = $('#ignoreCase').checked;
  const ignorePunct = $('#ignorePunct').checked;
  const tA = tokenize(A, ignoreCase, ignorePunct);
  const tB = tokenize(B, ignoreCase, ignorePunct);
  const sA = shingles(tA, n);
  const sB = shingles(tB, n);
  const setA = new Set(sA);
  const matchedInB = sB.filter(x => setA.has(x));
  const matchedInA = sA.filter(x => new Set(sB).has(x));
  const overlap = sB.length ? (matchedInB.length / sB.length * 100) : 0;
  const pctA = sA.length ? (matchedInA.length / sA.length * 100) : 0;
  const matchSetA = new Set(matchedInA);
  const matchSetB = new Set(matchedInB);

  let level = 'good', label = '🟢 Unique', color = 'good';
  if (overlap > 30) { level = 'bad'; label = '🔴 Heavy Overlap'; color = 'bad'; }
  else if (overlap > 15) { level = 'warn'; label = '🟡 Some Similarity'; color = 'warn'; }
  else if (overlap > 5) { level = 'warn'; label = '🟢 Mostly Original'; color = 'good'; }

  $('#stats').innerHTML = `
    <div class="pc-stat ${color}"><div class="num">${overlap.toFixed(1)}%</div><div class="lbl">${t('lblB')} similarity</div></div>
    <div class="pc-stat"><div class="num">${matchedInB.length}</div><div class="lbl">Matching ${n}-grams (B)</div></div>
    <div class="pc-stat"><div class="num">${pctA.toFixed(1)}%</div><div class="lbl">${t('lblA')} covered</div></div>
    <div class="pc-stat ${color}"><div class="num">${label}</div><div class="lbl">Verdict</div></div>`;
  $('#outA').innerHTML = renderHighlighted(A, matchSetA, ignoreCase, ignorePunct);
  $('#outB').innerHTML = renderHighlighted(B, matchSetB, ignoreCase, ignorePunct);
}

['#source','#candidate','#ngram','#ignoreCase','#ignorePunct'].forEach(s => {
  $(s).addEventListener('input', compute);
  $(s).addEventListener('change', compute);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="compute()">🔄 Recheck</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('source').value='';document.getElementById('candidate').value='';compute()">🗑️ Clear All</button>
  <button class="gz-btn gz-btn-secondary" onclick="navigator.clipboard.readText().then(t=>{document.getElementById('candidate').value=t;compute();})">📋 Paste from Clipboard</button>`;

compute();
GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/text/diff.html', name:'Text Diff'},
    {icon:'🔄', href:'/text/word-frequency.html', name:'Word Frequency'},
    {icon:'📖', href:'/text/readability-checker.html', name:'Readability'},
    {icon:'📝', href:'/text/text-summarizer.html', name:'Text Summarizer'},
  ]
});
</script>
