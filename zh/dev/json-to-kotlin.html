const { $, copyText, t } = GZ;

function pascal(s) {
  return s.replace(/[^A-Za-z0-9]+/g, ' ').trim().split(/\s+/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('') || 'Item';
}
function singularize(w) {
  if (/ies$/i.test(w)) return w.replace(/ies$/i, 'y');
  if (/(.)s$/i.test(w) && !/(ss|us|is|os|x|ch|sh)$/i.test(w)) return w.replace(/s$/i, '');
  return w;
}
function kotlinType(value, hint) {
  if (value === null) return 'Any';
  if (Array.isArray(value)) {
    const inner = value.length ? kotlinType(value[0], hint) : 'Any';
    return `List<${inner}>`;
  }
  switch (typeof value) {
    case 'string':  return /^[+-]?\d{4}-\d{2}-\d{2}T/.test(value) ? 'String' : 'String';
    case 'number':  return Number.isInteger(value) ? 'Long' : 'Double';
    case 'boolean': return 'Boolean';
    case 'object':  return pascal(hint || 'Item');
    default:        return 'Any';
  }
}

function buildClasses(obj, rootName, serial, depth) {
  const classes = [];
  function walk(o, name) {
    const fields = [];
    for (const [key, val] of Object.entries(o)) {
      let type = kotlinType(val, key);
      if (Array.isArray(val) && val.length && typeof val[0] === 'object' && val[0] !== null) {
        type = `List<${pascal(singularize(key))}>`;
      }
      const prop = pascal(key).charAt(0).toLowerCase() + pascal(key).slice(1);
      const ann = (serial && prop !== key) ? `    @SerialName("${key}")\n` : '';
      fields.push(`${ann}    val ${prop}: ${type}? = null`);
    }
    const header = serial ? `@Serializable\n` : '';
    classes.push(`${header}data class ${name}(\n${fields.join(',\n')}\n)`);
    for (const [key, val] of Object.entries(o)) {
      if (val && typeof val === 'object' && !Array.isArray(val)) {
        walk(val, pascal(key));
      } else if (Array.isArray(val)) {
        const item = val.find(v => v && typeof v === 'object');
        if (item) walk(item, pascal(singularize(key)));
      }
    }
  }
  walk(obj, rootName);
  return classes.join('\n\n');
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  let obj;
  try { obj = JSON.parse(inp); }
  catch(e) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ Invalid JSON: ${e.message}</span>`; $('#output').textContent = ''; return; }
  const isArr = Array.isArray(obj);
  const sample = isArr ? (obj[0] || {}) : obj;
  if (typeof sample !== 'object' || sample === null) {
    $('#output').textContent = isArr ? `// List<${kotlinType(obj[0])}>` : `// ${kotlinType(obj)}`;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ Generated</span>`;
    return;
  }
  const rootName = pascal(($('#root-name').value.trim() || 'Root').replace(/[^A-Za-z0-9]/g, '')) || 'Root';
  const serial = $('#opt-serial').checked;
  let code = '';
  if (serial) code += 'import kotlinx.serialization.SerialName\nimport kotlinx.serialization.Serializable\n\n';
  if (isArr) {
    code += buildClasses(sample, rootName, serial) + '\n';
    code += `\n// Usage: val data = Json.decodeFromString<List<${rootName}>>(json)\n`;
  } else {
    code += buildClasses(obj, rootName, serial) + '\n';
    code += `\n// Usage: val data = Json.decodeFromString<${rootName}>(json)\n`;
  }
  $('#output').textContent = code;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${rootName} generated (${code.length} bytes)</span>`;
}

    achievements: [{ id: 1, title: "First Steps", unlocked: true }]
  }, null, 2);
  $('#root-name').value = 'Session';
  convert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', convert);
$('#root-name').addEventListener('input', convert);
$('#opt-serial').addEventListener('change', convert);
