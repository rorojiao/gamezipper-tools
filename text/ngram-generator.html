<div class="gz-container">
  <div class="gz-tool-header">

  <div class="gz-tool-area">

    <div class="ng-options">
      <label><span id="lblN"></span> <input type="number" id="nValue" value="2" min="1" max="10"></label>
      <label><input type="checkbox" id="optCase" checked> <span id="lblCase"></span></label>
      <label><input type="checkbox" id="optStop"> <span id="lblStop"></span></label>
      <label><input type="checkbox" id="optPunct" checked> <span id="lblPunct"></span></label>
      <label><span id="lblTop"></span> <input type="number" id="topN" value="50" min="5" max="500" step="5"></label>
    </div>

    <div id="output"></div>
  </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'N-Gram Generator & Analyzer',
    toolDesc: 'Extract word n-grams (unigrams, bigrams, trigrams and custom n) from any text. View frequency counts, filter stop words and export to CSV. Free online n-gram analyzer for SEO, NLP and linguistics.',
    placeholder: 'Paste or type your text here...',
    lblN: 'N (gram size):',
    lblCase: 'Case-insensitive',
    lblStop: 'Exclude stop words',
    lblPunct: 'Remove punctuation',
    lblTop: 'Show top:',
    example: 'Load Example',
    clear: 'Clear',
    exportCsv: 'Export CSV',
    rank: 'Rank',
    count: 'Count',
    phrase: 'Phrase / N-Gram',
    totalGrams: 'Total n-grams',
    uniqueGrams: 'Unique',
    maxCount: 'Top frequency',
    noResults: 'Type or paste some text above to generate n-grams.',
  },
  zh: {
    toolTitle: 'N-Gram 生成与分析工具',
    toolDesc: '从任意文本中提取词 n-gram（一元组、二元组、三元组及自定义 n）。查看频率统计、过滤停用词并导出 CSV。适用于 SEO、自然语言处理和语言学的免费在线 n-gram 分析器。',
    placeholder: '在此粘贴或输入文本...',
    lblN: 'N（元组大小）：',
    lblCase: '不区分大小写',
    lblStop: '排除停用词',
    lblPunct: '移除标点',
    lblTop: '显示前：',
    example: '加载示例',
    clear: '清空',
    exportCsv: '导出 CSV',
    rank: '排名',
    count: '次数',
    phrase: '短语 / N-Gram',
    totalGrams: 'N-Gram 总数',
    uniqueGrams: '去重数',
    maxCount: '最高频次',
    noResults: '请在上方输入或粘贴文本以生成 n-gram。',
  }
});

const { $, copyText, t } = GZ;

const STOP = new Set(['a','an','the','and','or','but','if','then','is','are','was','were','be','been','being','have','has','had','do','does','did','will','would','should','could','may','might','must','can','i','you','he','she','it','we','they','me','him','her','us','them','my','your','his','its','our','their','this','that','these','those','of','in','on','at','to','for','with','by','from','as','into','about','up','out','over','under','not','no','so','very','just','than','too','also','only','s','t','d','ll','m','o','re','ve','y','am']);

function tokenize(text){
  let s = text;
  if ($('#optPunct').checked) s = s.replace(/[^\w\s一-鿿']/g, ' ');
  if ($('#optCase').checked) s = s.toLowerCase();
  let tokens = s.split(/\s+/).filter(Boolean);
  if ($('#optStop').checked) tokens = tokens.filter(w => !STOP.has(w.toLowerCase()));
  return tokens;
}

function generate(){
  const raw = $('#input').value;
  if(!raw.trim()){
    $('#output').innerHTML = `<div style="opacity:.6;text-align:center;padding:20px">${t('noResults')}</div>`;
    $('#stats').innerHTML = '';
    return;
  }
  const n = Math.max(1, Math.min(10, parseInt($('#nValue').value)||2));
  const topN = Math.max(5, Math.min(500, parseInt($('#topN').value)||50));
  const tokens = tokenize(raw);
  const counts = new Map();
  for (let i=0; i<=tokens.length-n; i++){
    const gram = tokens.slice(i,i+n).join(' ');
    if (!gram.trim()) continue;
    counts.set(gram, (counts.get(gram)||0)+1);
  }
  const sorted = [...counts.entries()].sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0]));
  const total = sorted.reduce((s,[,v])=>s+v,0);
  const max = sorted[0]?sorted[0][1]:0;
  $('#stats').innerHTML = `
    <div class="ng-stat"><div class="num">${total}</div><div class="label">${t('totalGrams')}</div></div>
    <div class="ng-stat"><div class="num">${counts.size}</div><div class="label">${t('uniqueGrams')}</div></div>
    <div class="ng-stat"><div class="num">${max}</div><div class="label">${t('maxCount')}</div></div>`;
  const top = sorted.slice(0, topN);
  if (!top.length){
    $('#output').innerHTML = `<div style="opacity:.6;text-align:center;padding:20px">${t('noResults')}</div>`;
    return;
  }
  $('#output').innerHTML = `<table class="ng-table"><thead><tr><th>${t('rank')}</th><th>${t('phrase')}</th><th class="ng-num">${t('count')}</th><th></th></tr></thead><tbody>${
    top.map(([k,v],i)=>`<tr class="ng-row"><td>${i+1}</td><td class="ng-phrase">${escapeHtml(k)}</td><td class="ng-num">${v}</td><td><span class="ng-bar" style="width:${max?Math.round(v/max*140):0}px"></span></td></tr>`).join('')
  }</tbody></table>`;
  window._ngData = top;
}

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function exportCsv(){
  if(!window._ngData||!window._ngData.length) return;
  const csv = 'rank,phrase,count\n' + window._ngData.map(([k,v],i)=>`${i+1},"${k.replace(/"/g,'""')}",${v}`).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='ngrams.csv'; a.click();
  URL.revokeObjectURL(url);
}

function loadExample(){
  $('#input').value = "The quick brown fox jumps over the lazy dog. The quick fox is very quick. Machine learning is a subset of artificial intelligence. Machine learning models learn from data. Deep learning is a type of machine learning that uses neural networks.";
  generate();
}

function clearAll(){
  $('#input').value=''; generate();
}

['#input','#nValue','#topN','#optCase','#optStop','#optPunct'].forEach(sel=>{
  $(sel).addEventListener('input',generate);
  if(sel!=='#input') $(sel).addEventListener('change',generate);
});

$('#lblCase').textContent = t('lblCase');
$('#lblStop').textContent = t('lblStop');
$('#lblPunct').textContent = t('lblPunct');
$('#lblN').textContent = t('lblN');
$('#lblTop').textContent = t('lblTop');
$('#input').placeholder = t('placeholder');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="exportCsv()">${t('exportCsv')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;

generate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/text/word-frequency.html', name:'Word Frequency'},
    {icon:'🧹', href:'/text/stopword-remover.html', name:'Stopword Remover'},
    {icon:'📝', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'📚', href:'/text/readability-checker.html', name:'Readability'},
  ]
});
</script>
