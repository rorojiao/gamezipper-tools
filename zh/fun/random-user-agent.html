<script>
GZI18n.register({
  en: {
    toolTitle: 'Random User-Agent Generator',
    toolDesc: 'Generate realistic random User-Agent strings for browser testing. Filter by Chrome, Firefox, Safari, Edge, mobile, desktop — bulk up to 50 at once.',

    step3: 'Click Generate to create random UA strings',
    step4: 'Click any item to copy, or Copy All to copy everything',
  },
  zh: {
    toolTitle: '随机 User-Agent 生成器',
    toolDesc: '为浏览器测试生成真实的随机 User-Agent 字符串。可按 Chrome、Firefox、Safari、Edge、移动端、桌面端过滤 — 单次最多 50 条。',
    generate: '生成',
    copyAll: '复制全部',
    clear: '清空',
    browser: '浏览器',
    os: '操作系统',
    device: '设备类型',
    count: '数量',
    all: '全部',
    desktop: '桌面端',
    mobile: '移动端',
    step1: '选择过滤器：挑选一个或多个浏览器、操作系统和设备类型',
    step2: '设置要生成的 User-Agent 数量（1-50）',
    step3: '点击「生成」生成随机 UA 字符串',
    step4: '点击任意条目可复制，或点击「复制全部」复制所有',
  }
});

const { $, copyText, t } = GZ;

const BROWSERS = [
  {id:'chrome',name:'Chrome',icon:'🌐'},
  {id:'firefox',name:'Firefox',icon:'🦊'},
  {id:'safari',name:'Safari',icon:'🧭'},
  {id:'edge',name:'Edge',icon:'🔷'},
  {id:'opera',name:'Opera',icon:'🔴'},
  {id:'samsung',name:'Samsung',icon:'📱'},
];
const OSES = [
  {id:'windows',name:'Windows',icon:'🪟'},
  {id:'macos',name:'macOS',icon:'🍎'},
  {id:'linux',name:'Linux',icon:'🐧'},
  {id:'android',name:'Android',icon:'🤖'},
  {id:'ios',name:'iOS',icon:'📱'},
];
const DEVICES = [
  {id:'desktop',name:'Desktop',icon:'🖥️'},
  {id:'mobile',name:'Mobile',icon:'📱'},
  {id:'tablet',name:'Tablet',icon:'📟'},
];

const state = {
  browsers: new Set(['chrome','firefox','safari','edge','opera','samsung']),
  oses: new Set(['windows','macos','linux','android','ios']),
  devices: new Set(['desktop','mobile','tablet']),
};

function makeChips(container, items, set) {
  const html = items.map(it => {
    const on = set.has(it.id);
    return `<label class="ua-chk ${on?'on':''}"><input type="checkbox" ${on?'checked':''} data-id="${it.id}">${it.icon} ${it.name}</label>`;
  }).join('');
  container.innerHTML = html;
  container.querySelectorAll('input').forEach(cb => {
    cb.addEventListener('change', e => {
      const id = e.target.getAttribute('data-id');
      if (e.target.checked) set.add(id); else set.delete(id);
      e.target.parentElement.classList.toggle('on', e.target.checked);
    });
  });
}

makeChips($('#browsers'), BROWSERS, state.browsers);
makeChips($('#oses'), OSES, state.oses);
makeChips($('#devices'), DEVICES, state.devices);

function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function randVer(min, max) { return min + Math.random() * (max - min); }

function buildChrome(os, device) {
  const ver = Math.floor(randVer(118, 124));
  const webkit = '537.36';
  if (os === 'windows') {
    return `Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/${webkit} (KHTML, like Gecko) Chrome/${ver}.0.0.0 Safari/${webkit}`;
  }
  if (os === 'macos') {
    const mver = '14_' + rand(2,5) + '_' + rand(0,2);
    return `Mozilla/5.0 (Macintosh; Intel Mac OS X ${mver}) AppleWebKit/${webkit} (KHTML, like Gecko) Chrome/${ver}.0.0.0 Safari/${webkit}`;
  }
  if (os === 'linux') {
    return `Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/${webkit} (KHTML, like Gecko) Chrome/${ver}.0.0.0 Safari/${webkit}`;
  }
  if (os === 'android') {
    const av = Math.floor(randVer(10, 14));
    if (device === 'mobile') {
      const model = pick(['SM-S918B','Pixel 8','SM-G991B','Pixel 7','SM-A546B','HUAWEI P60']);
      return `Mozilla/5.0 (Linux; Android ${av}; ${model}) AppleWebKit/${webkit} (KHTML, like Gecko) Chrome/${ver}.0.0.0 Mobile Safari/${webkit}`;
    }
    return `Mozilla/5.0 (Linux; Android ${av}; ${pick(['SM-X810','SM-T970'])}) AppleWebKit/${webkit} (KHTML, like Gecko) Chrome/${ver}.0.0.0 Safari/${webkit}`;
  }
  if (os === 'ios') {
    return `Mozilla/5.0 (iPhone; CPU iPhone OS ${rand(16,17)}_${rand(0,5)} like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) CriOS/${ver}.0 Mobile/15E148 Safari/604.1`;
  }
  return `Mozilla/5.0 Chrome/${ver}`;
}

function buildFirefox(os, device) {
  const ver = Math.floor(randVer(118, 125));
  if (os === 'windows') return `Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:${ver}.0) Gecko/20100101 Firefox/${ver}.0`;
  if (os === 'macos') return `Mozilla/5.0 (Macintosh; Intel Mac OS X 14.${rand(0,5)}; rv:${ver}.0) Gecko/20100101 Firefox/${ver}.0`;
  if (os === 'linux') return `Mozilla/5.0 (X11; Ubuntu; Linux x86_64; rv:${ver}.0) Gecko/20100101 Firefox/${ver}.0`;
  if (os === 'android') {
    if (device === 'mobile') {
      const av = Math.floor(randVer(8, 14));
      return `Mozilla/5.0 (Android ${av}; Mobile; rv:${ver}.0) Gecko/${ver}.0 Firefox/${ver}.0`;
    }
    return `Mozilla/5.0 (Android ${Math.floor(randVer(8,14))}; Tablet; rv:${ver}.0) Gecko/${ver}.0 Firefox/${ver}.0`;
  }
  if (os === 'ios') return `Mozilla/5.0 (iPhone; CPU iPhone OS ${rand(16,17)}_${rand(0,5)} like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) FxiOS/${ver}.0 Mobile/15E148 Safari/605.1.15`;
  return `Mozilla/5.0 (rv:${ver}.0) Gecko/20100101 Firefox/${ver}.0`;
}

function buildSafari(os, device) {
  if (os === 'macos') {
    const mver = '14_' + rand(2,5) + '_' + rand(0,2);
    const sver = '17.' + rand(2,4);
    return `Mozilla/5.0 (Macintosh; Intel Mac OS X ${mver}) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/${sver} Safari/605.1.15`;
  }
  if (os === 'ios') {
    const iver = rand(16, 17);
    const mver = iver + '_' + rand(0,5);
    const sver = '17.' + rand(2,4);
    if (device === 'tablet') {
      return `Mozilla/5.0 (iPad; CPU OS ${mver} like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/${sver} Mobile/15E148 Safari/604.1`;
    }
    return `Mozilla/5.0 (iPhone; CPU iPhone OS ${mver} like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/${sver} Mobile/15E148 Safari/604.1`;
  }
  return `Mozilla/5.0 Safari`;
}

function buildEdge(os) {
  const ver = Math.floor(randVer(118, 124));
  const webkit = '537.36';
  if (os === 'windows') return `Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/${webkit} (KHTML, like Gecko) Chrome/${ver}.0.0.0 Safari/${webkit} Edg/${ver}.0.${rand(1000,2500)}.${rand(10,99)}`;
  if (os === 'macos') return `Mozilla/5.0 (Macintosh; Intel Mac OS X 14_${rand(2,5)}_${rand(0,2)}) AppleWebKit/${webkit} (KHTML, like Gecko) Chrome/${ver}.0.0.0 Safari/${webkit} Edg/${ver}.0.${rand(1000,2500)}.${rand(10,99)}`;
  if (os === 'android') return `Mozilla/5.0 (Linux; Android ${Math.floor(randVer(10,14))}; ${pick(['SM-S918B','Pixel 8'])}) AppleWebKit/${webkit} (KHTML, like Gecko) Chrome/${ver}.0.0.0 Mobile Safari/${webkit} EdgA/${ver}.0.${rand(1000,2500)}.${rand(10,99)}`;
  if (os === 'ios') return `Mozilla/5.0 (iPhone; CPU iPhone OS ${rand(16,17)}_${rand(0,5)} like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.${rand(2,4)} EdgiOS/${ver}.0 Mobile/15E148 Safari/605.1.15`;
  return `Mozilla/5.0 Edg/${ver}`;
}

function buildOpera(os) {
  const ver = Math.floor(randVer(105, 110));
  const cver = Math.floor(randVer(118, 124));
  if (os === 'windows') return `Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${cver}.0.0.0 Safari/537.36 OPR/${ver}.0.${rand(4000,5000)}.${rand(10,99)}`;
  if (os === 'macos') return `Mozilla/5.0 (Macintosh; Intel Mac OS X 14_${rand(2,5)}_${rand(0,2)}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${cver}.0.0.0 Safari/537.36 OPR/${ver}.0.${rand(4000,5000)}.${rand(10,99)}`;
  if (os === 'android') return `Mozilla/5.0 (Linux; Android ${Math.floor(randVer(8,14))}; ${pick(['SM-S918B','Pixel 7'])}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${cver}.0.0.0 Mobile Safari/537.36 OPR/${ver}.0.${rand(4000,5000)}.${rand(10,99)}`;
  return `Mozilla/5.0 OPR/${ver}`;
}

function buildSamsung(os) {
  const cver = Math.floor(randVer(20, 23));
  if (os === 'android') {
    const av = Math.floor(randVer(10, 14));
    const model = pick(['SM-S918B','SM-G991B','SM-A546B','SM-F946B']);
    return `Mozilla/5.0 (Linux; Android ${av}; ${model}) AppleWebKit/537.36 (KHTML, like Gecko) SamsungBrowser/${cver}.0 Chrome/${Math.floor(randVer(118,124)*10)/10}.0.0.0 Mobile Safari/537.36`;
  }
  return `Mozilla/5.0 SamsungBrowser/${cver}`;
}

const BUILDERS = {
  chrome: buildChrome,
  firefox: buildFirefox,
  safari: buildSafari,
  edge: buildEdge,
  opera: buildOpera,
  samsung: buildSamsung,
};

function detectIcon(ua) {
  if (/Edg\//.test(ua)) return '🔷';
  if (/OPR\//.test(ua)) return '🔴';
  if (/SamsungBrowser\//.test(ua)) return '📱';
  if (/Firefox|FxiOS/.test(ua)) return '🦊';
  if (/Chrome|CriOS/.test(ua)) return '🌐';
  if (/Safari/.test(ua)) return '🧭';
  return '💻';
}
function detectName(ua) {
  if (/EdgA\/|EdgiOS\//.test(ua)) return 'Edge';
  if (/Edg\//.test(ua)) return 'Edge';
  if (/OPR\//.test(ua)) return 'Opera';
  if (/SamsungBrowser\//.test(ua)) return 'Samsung';
  if (/Firefox|FxiOS/.test(ua)) return 'Firefox';
  if (/CriOS\//.test(ua)) return 'Chrome';
  if (/Chrome\//.test(ua)) return 'Chrome';
  if (/Version\/.*Safari\//.test(ua)) return 'Safari';
  if (/iPhone|iPad/.test(ua)) return 'Safari';
  return 'UA';
}
function detectOS(ua) {
  if (/Windows NT/.test(ua)) return 'Windows';
  if (/Mac OS X|Macintosh/.test(ua)) return 'macOS';
  if (/Android/.test(ua)) return 'Android';
  if (/iPhone|iPad|iPod/.test(ua)) return 'iOS';
  if (/Linux/.test(ua)) return 'Linux';
  return 'Unknown';
}
function detectDevice(ua) {
  if (/Mobile|iPhone/.test(ua) && !/iPad/.test(ua)) return 'Mobile';
  if (/iPad|Tablet/.test(ua)) return 'Tablet';
  return 'Desktop';
}

let lastResults = [];
function generate() {
  if (state.browsers.size === 0 || state.oses.size === 0 || state.devices.size === 0) {
    $('#list').innerHTML = `<div style="text-align:center;padding:20px;color:var(--text2)">Please select at least one browser, OS and device type.</div>`;
    return;
  }
  const brs = [...state.browsers];
  const oss = [...state.oses];
  const devs = [...state.devices];
  const count = Math.max(1, Math.min(50, parseInt($('#count').value) || 10));
  const results = [];
  for (let i = 0; i < count; i++) {
    const b = pick(brs);
    const o = pick(oss);
    // Validate compatibility
    let d = pick(devs);
    if (o === 'ios' && d === 'desktop') d = pick(['mobile','tablet']);
    if ((o === 'windows' || o === 'macos' || o === 'linux') && d === 'mobile') d = 'desktop';
    if (o === 'android' && d === 'desktop') d = 'mobile';
    const builder = BUILDERS[b] || buildChrome;
    results.push(builder(o, d));
  }
  lastResults = results;
  renderList(results);
}

function renderList(results) {
  if (results.length === 0) { $('#list').innerHTML = ''; return; }
  $('#list').innerHTML = results.map((ua, i) => {
    return `<div class="ua-item" data-i="${i}">
      <span class="icon">${detectIcon(ua)}</span>
      <span class="txt">${ua.replace(/</g,'&lt;')}</span>
      <span class="badge">${detectName(ua)} · ${detectOS(ua)} · ${detectDevice(ua)}</span>
    </div>`;
  }).join('');
  $$('.ua-item').forEach(el => {
    el.addEventListener('click', () => {
      const i = parseInt(el.getAttribute('data-i'));
      copyText(lastResults[i]);
    });
  });
}

function $$(s, p) { return [...((p || document).querySelectorAll(s))]; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(lastResults.join('\\n'))">${t('copyAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="lastResults=[];renderList([])">${t('clear')}</button>`;

generate();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌐', href:'/dev/user-agent-parser.html', name:'UA Parser'},
    {icon:'🌐', href:'/dev/browser-info.html', name:'Browser Info'},
    {icon:'📡', href:'/dev/http-headers.html', name:'HTTP Headers'},
    {icon:'🖥️', href:'/dev/screen-resolution.html', name:'Screen Resolution'},
  ]
});
</script>
