<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How does a biweekly mortgage payment work?", "acceptedAnswer": {"@type": "Answer", "text": "Instead of one monthly payment, you pay half your monthly payment every two weeks. Because there are 52 weeks in a year, you make 26 half-payments — equal to 13 full monthly payments instead of 12. That extra payment each year goes straight to principal and shortens your loan."}}, {"@type": "Question", "name": "How much time does paying biweekly save on a mortgage?", "acceptedAnswer": {"@type": "Answer", "text": "On a typical 30-year mortgage, switching to biweekly payments usually pays the loan off 4 to 6 years earlier, depending on the interest rate. Higher rates mean bigger savings because more of the extra principal payment avoids future interest."}}, {"@type": "Question", "name": "Does paying biweekly save money on interest?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The extra payment each year plus the fact that interest is calculated on a smaller balance more often can save tens of thousands of dollars over the life of a 30-year loan. The calculator shows the exact savings for your numbers."}}, {"@type": "Question", "name": "Is there a downside to biweekly mortgage payments?", "acceptedAnswer": {"@type": "Answer", "text": "Some servicers charge a setup fee or monthly fee for biweekly programs, which can eat into savings. You can often get the same result for free by simply making one extra principal payment per year or adding 1/12 of your payment to each monthly check. Check for prepayment penalties too."}}]}</script>

    toolDesc: '对比月供与双周供，精确查看每两周还半月供如何缩短贷款年限、大幅减少总利息。免费、私密，浏览器本地运行。',
    lblAmount: '贷款金额',
    lblRate: '年利率',
    lblTerm: '贷款年限（年）',
    savedLbl: '双周供节省的总利息',
    hMonthly: '标准月供方案',
    hBiweekly: '双周供（每两周）',
    rMpay: '月供',
    rMint: '总利息支出',
    rMpayoff: '还清时间',
    rBpay: '每两周还款额',
    rBint: '总利息支出',
    rBpayoff: '还清时间',
    rYearsaved: '双周供提前还清',
    step1: '输入贷款金额、年利率和年限。',
    step2: '查看标准月供和总利息。',
    step3: '对比双周供方案 — 每两周还半月供。',
    step4: '查看节省的利息和提前多少年还清贷款。',
  }
});

const { $, t } = GZ;
const money = n => '$' + Math.round(n).toLocaleString('en-US');
const lang = () => GZI18n.getLang();

function amortPayment(P, rM, n) {
  if (n <= 0) return P;
  if (rM === 0) return P / n;
  return P * rM / (1 - Math.pow(1 + rM, -n));
}

// Simulate payoff given a periodic payment; returns {months, totalInterest}
// Each step is one month; interest accrues monthly. extraAnnual applied once per 12 months.
function simulate(P, rM, monthlyPay, extraAnnual) {
  let bal = P, months = 0, totalInt = 0;
  const guard = 12 * 50;
  while (bal > 0.01 && months < guard) {
    months++;
    const isYearBoundary = (months % 12 === 0);
    const int = bal * rM;
    totalInt += int;
    let pay = monthlyPay;
    if (isYearBoundary) pay += extraAnnual; // extra full payment at end of each year
    bal = bal + int - pay;
    if (bal < 0) { totalInt += bal; bal = 0; } // overpayment refunds excess interest
  }
  return { months, totalInt };
}

function calc() {
  const P = +$('#amount').value || 0;
  const rate = +$('#rate').value || 0;
  const term = +$('#term').value || 1;
  const rM = rate / 100 / 12;
  const n = term * 12;
  const monthlyPay = amortPayment(P, rM, n);

  // Monthly plan
  const m = simulate(P, rM, monthlyPay, 0);
  const mInt = monthlyPay * n - P;

  // Biweekly: 26 half-payments/yr == 13 monthly payments/yr.
  // Equivalent: pay the normal monthly payment + one extra payment per year (extraAnnual = monthlyPay).
  const b = simulate(P, rM, monthlyPay, monthlyPay);
  // biweekly payment size shown = monthlyPay / 2
  const biPay = monthlyPay / 2;
  const saved = Math.max(0, mInt - b.totalInt);
  const yearsSaved = Math.max(0, (m.months - b.months) / 12);

  $('#v-mpay').textContent = money(monthlyPay);
  $('#v-mint').textContent = money(mInt);
  $('#v-mpayoff').textContent = (m.months / 12).toFixed(1) + ' yrs';
  $('#v-bpay').textContent = money(biPay);
  $('#v-bint').textContent = money(b.totalInt);
  $('#v-bpayoff').textContent = (b.months / 12).toFixed(1) + ' yrs';
  $('#v-yearsaved').textContent = (lang()==='zh' ? '提前 ' : '') + yearsSaved.toFixed(1) + (lang()==='zh' ? ' 年还清' : ' yrs earlier');
  $('#saved').textContent = money(saved);
}

['amount','rate','term'].forEach(id => $('#'+id).addEventListener('input', calc));
calc();

</script>
