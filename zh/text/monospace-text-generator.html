  en: {

    toolDesc: 'Convert plain text to 𝚖𝚘𝚗𝚘𝚜𝚙𝚊𝚌𝚎 or sans-serif Unicode styles. Each character has equal width for a clean code-style look — copy & paste for Instagram, Twitter, Discord and TikTok.',

    step3: 'Click Copy and paste it into your post, code snippet or username',
  },
  zh: {
    toolTitle: '等宽文字生成器',
    toolDesc: '将普通文字转换为 𝚖𝚘𝚗𝚘𝚜𝚙𝚊𝚌𝚎 等宽或无衬线 Unicode 样式。每个字符等宽，呈现代码风格 — 复制粘贴到 Instagram、Twitter、Discord 和抖音。',
    inputLabel: '输入文本',
    outputLabel: '等宽文字',
    mono: '等宽',
    sans: '无衬线',
    sansBold: '无衬线粗体',
    step1: '输入或粘贴需要变等宽的文字',
    step2: '选择样式：等宽、无衬线或无衬线粗体',
    step3: '点击复制，粘贴到帖子、代码片段或用户名',
  }
});

const { $, copyText, t } = GZ;

// Unicode Mathematical Alphanumeric Symbols — equal-width and proportional families.
const STYLES = {
  mono:     { upper: 0x1D670, lower: 0x1D68A, digit: 0x1D7F6 },
  sans:     { upper: 0x1D5A0, lower: 0x1D5BA, digit: 0x1D7E2 },
  sansBold: { upper: 0x1D5D4, lower: 0x1D5EE, digit: 0x1D7EC },
};

function stylize(text, key) {
  const s = STYLES[key];
  if (!s) return text;
  let out = '';
  for (const ch of text) {
    const code = ch.codePointAt(0);
    if (code >= 0x41 && code <= 0x5A) {
      out += String.fromCodePoint(code - 0x41 + s.upper);
    } else if (code >= 0x61 && code <= 0x7A) {
      out += String.fromCodePoint(code - 0x61 + s.lower);
    } else if (code >= 0x30 && code <= 0x39 && s.digit) {
      out += String.fromCodePoint(code - 0x30 + s.digit);
    } else {
      out += ch;
    }
  }
  return out;
}

let currentStyle = 'mono';

function processText() {
  const text = $('#input').value;
  if (!text) { $('#output').textContent = ''; return; }
  $('#output').textContent = stylize(text, currentStyle);
}

$('#input').addEventListener('input', processText);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="setStyle('mono',this)">${t('mono')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setStyle('sans',this)">${t('sans')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setStyle('sansBold',this)">${t('sansBold')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').textContent=''">${t('clear')}</button>`;

function setStyle(key, btn) {
  currentStyle = key;
  processText();
  btn.parentElement.querySelectorAll('.gz-btn').forEach(b => {
    b.classList.remove('gz-btn-active');
    b.classList.add('gz-btn-secondary');
  });
  btn.classList.add('gz-btn-active');
  btn.classList.remove('gz-btn-secondary');
}

$('#input').value = 'Monospace Text\n1234567890\nABCDEFG abcdefg';
processText();

});
