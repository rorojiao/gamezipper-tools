<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How much fertilizer should I apply?","acceptedAnswer":{"@type":"Answer","text":"The amount depends on three things: your fertilizer's NPK ratio (the nitrogen percentage), your target nitrogen rate per area (typically 0.5-1 lb N per 1000 sq ft for lawns), and your total area. This tool multiplies them together: fertilizer = target N ÷ %N × area."}},{"@type":"Question","name":"What does NPK mean on a fertilizer bag?","acceptedAnswer":{"@type":"Answer","text":"NPK stands for Nitrogen (N), Phosphorus (P2O5) and Potassium (K2O). A 10-10-10 fertilizer contains 10% of each by weight. The first number (nitrogen) drives leafy green growth, phosphorus supports roots and blooms, and potassium strengthens disease resistance."}},{"@type":"Question","name":"How often should I fertilize my lawn?","acceptedAnswer":{"@type":"Answer","text":"Most lawns need 2-4 feedings per year totaling 2-4 lb of nitrogen per 1000 sq ft annually. Apply in early spring, late spring, early fall and (cool-season grasses) late fall. Always water after applying and never exceed 1 lb N per 1000 sq ft in a single application to avoid burn."}},{"@type":"Question","name":"Can I use too much fertilizer?","acceptedAnswer":{"@type":"Answer","text":"Yes. Over-fertilizing burns roots and grass, pollutes runoff water and causes algae blooms in nearby ponds. Never apply more than 1 lb of nitrogen per 1000 sq ft in one feeding, and avoid fertilizing before heavy rain."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-fert-presets" id="presets"></div>
    <div class="gz-fert-form">
      <label id="lbl-n">Nitrogen N %
        <input type="number" id="n" min="0" max="100" step="0.1" placeholder="10" oninput="autoCalc()">
      </label>
      <label id="lbl-p">Phosphorus P %
        <input type="number" id="p" min="0" max="100" step="0.1" placeholder="10" oninput="autoCalc()">
      </label>
      <label id="lbl-k">Potassium K %
        <input type="number" id="k" min="0" max="100" step="0.1" placeholder="10" oninput="autoCalc()">
      </label>
      <label id="lbl-target">Target N per area
        <input type="number" id="target" min="0.1" max="5" step="0.1" placeholder="1" oninput="autoCalc()">
      </label>
      <label id="lbl-area">Area
        <input type="number" id="area" min="0" step="1" placeholder="1000" oninput="autoCalc()">
      </label>
      <label id="lbl-unit">Area Unit
        <select id="unit" onchange="autoCalc()">
          <option value="sqft" id="opt-sqft">sq ft</option>
          <option value="sqm" id="opt-sqm">sq m</option>
          <option value="acre" id="opt-acre">acres</option>
          <option value="ha" id="opt-ha">hectares</option>
        </select>
      </label>
      <label id="lbl-rateunit">N Rate Unit
        <select id="rateunit" onchange="autoCalc()">
          <option value="lb-1000" id="opt-lb1000">lb / 1000 sq ft</option>
          <option value="kg-100" id="opt-kg100">g / sq m</option>
        </select>
      </label>
    </div>
    <div class="gz-fert-result" id="result" style="display:none">
      <div style="font-size:2em">🌱</div>
      <div class="gz-fert-amount" id="amount">—</div>
      <div class="gz-fert-sub" id="amountSub"></div>
    </div>
    <div class="gz-fert-grid" id="fertInfo"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Fertilizer Calculator (NPK)',
    toolDesc: 'Calculate the exact amount of fertilizer to apply based on its NPK ratio, target nitrogen rate and area. Works for lawns, garden beds and fields — metric and imperial.',
    calculate: 'Calculate',
    clear: 'Clear',
    nLabel: 'Nitrogen N %',
    pLabel: 'Phosphorus P %',
    kLabel: 'Potassium K %',
    targetLabel: 'Target N per area',
    areaLabel: 'Area',
    areaUnit: 'Area Unit',
    rateUnit: 'N Rate Unit',
    sqft: 'sq ft', sqm: 'sq m', acre: 'acres', ha: 'hectares',
    lb1000: 'lb / 1000 sq ft', kg100: 'g / sq m',
    amountToApply: 'Fertilizer to Apply',
    nitrogenApplied: 'Nitrogen Applied',
    phosphorusApplied: 'Phosphorus Applied',
    potassiumApplied: 'Potassium Applied',
    perArea: 'per area',
    total: 'total',
    presetLawn: '🌱 Lawn (10-10-10)',
    presetFlower: '🌸 Flowers (10-20-10)',
    presetTomato: '🍅 Tomato (5-10-10)',
    presetAcid: '🌿 Acid-Loving (12-4-8)',
    presetLawnHigh: '🍀 Lawn High-N (32-0-4)',
    step1: 'Enter the NPK percentages from your fertilizer bag (e.g. 10-10-10)',
    step2: 'Set the target nitrogen rate (1 lb/1000 sq ft is typical for lawns)',
    step3: 'Enter the area you need to cover in sq ft, sq m, acres or hectares',
    step4: 'Read the exact amount of fertilizer and the N-P-K applied',
  },
  zh: {
    toolTitle: '肥料用量计算器（NPK）',
    toolDesc: '根据肥料的 NPK 比例、目标氮肥用量和面积，精确计算应施用的肥料量。适用于草坪、花坛和田地 — 支持公制和英制。',
    calculate: '计算',
    clear: '清除',
    nLabel: '氮 N %',
    pLabel: '磷 P %',
    kLabel: '钾 K %',
    targetLabel: '单位面积目标氮量',
    areaLabel: '面积',
    areaUnit: '面积单位',
    rateUnit: '氮量单位',
    sqft: '平方英尺', sqm: '平方米', acre: '英亩', ha: '公顷',
    lb1000: '磅 / 1000 平方英尺', kg100: '克 / 平方米',
    amountToApply: '应施肥料量',
    nitrogenApplied: '施入氮',
    phosphorusApplied: '施入磷',
    potassiumApplied: '施入钾',
    perArea: '每单位面积',
    total: '总计',
    presetLawn: '🌱 草坪（10-10-10）',
    presetFlower: '🌸 花卉（10-20-10）',
    presetTomato: '🍅 番茄（5-10-10）',
    presetAcid: '🌿 喜酸植物（12-4-8）',
    presetLawnHigh: '🍀 高氮草坪（32-0-4）',
    step1: '输入肥料包装上的 NPK 百分比（如 10-10-10）',
    step2: '设定目标氮量（草坪一般为 1 磅/1000 平方英尺）',
    step3: '输入需要施肥的面积（平方英尺、平方米、英亩或公顷）',
    step4: '查看应施肥料量及施入的氮磷钾',
  }
});

const { $, copyText, t } = GZ;

const PRESETS = [
  { id:'lawn',     npk:[10,10,10], target:1.0 },
  { id:'flower',   npk:[10,20,10], target:0.8 },
  { id:'tomato',   npk:[5,10,10],  target:1.0 },
  { id:'acid',     npk:[12,4,8],   target:1.0 },
  { id:'lawnHigh', npk:[32,0,4],   target:1.0 },
];

function applyPreset(p) {
  $('#n').value = p.npk[0];
  $('#p').value = p.npk[1];
  $('#k').value = p.npk[2];
  $('#target').value = p.target;
  autoCalc();
}

function renderPresets() {
  $('#presets').innerHTML = PRESETS.map(p =>
    `<button onclick="applyPreset({npk:[${p.npk.join(',')}],target:${p.target}})">${t('preset'+p.id.charAt(0).toUpperCase()+p.id.slice(1))}</button>`
  ).join('');
}

function autoCalc() {
  // i18n
  $('#opt-sqft').textContent = t('sqft');
  $('#opt-sqm').textContent = t('sqm');
  $('#opt-acre').textContent = t('acre');
  $('#opt-ha').textContent = t('ha');
  $('#opt-lb1000').textContent = t('lb1000');
  $('#opt-kg100').textContent = t('kg100');
  renderPresets();

  const n = parseFloat($('#n').value) || 0;
  const p = parseFloat($('#p').value) || 0;
  const k = parseFloat($('#k').value) || 0;
  const targetN = parseFloat($('#target').value) || 0;
  const area = parseFloat($('#area').value) || 0;
  const unit = $('#unit').value;
  const rateUnit = $('#rateunit').value;
  if (n <= 0 || targetN <= 0 || area <= 0) {
    $('#result').style.display = 'none';
    $('#fertInfo').innerHTML = '';
    return;
  }
  // Convert area to "1000 sq ft" or "sq m" unit chunks
  let areaInUnit; // area expressed in the rate unit's denominator
  let rateInLbPer1000; // normalized target in lb N / 1000 sq ft
  let rateLabel;
  if (rateUnit === 'lb-1000') {
    // target is lb N per 1000 sq ft
    const areaSqft = unit === 'sqft' ? area : unit === 'sqm' ? area * 10.7639 : unit === 'acre' ? area * 43560 : area * 107639;
    areaInUnit = areaSqft / 1000;
    rateInLbPer1000 = targetN;
    rateLabel = t('lb1000');
  } else {
    // target is grams N per sq m → convert to lb/1000sqft
    // 1 g/sqm = 0.02049 lb/1000sqft
    const areaSqm = unit === 'sqm' ? area : unit === 'sqft' ? area / 10.7639 : unit === 'acre' ? area * 4046.86 : area * 10000;
    areaInUnit = areaSqm;
    rateInLbPer1000 = targetN * 0.02049;
    rateLabel = t('kg100');
  }
  // Fertilizer amount (lb) = (target lb N per 1000 sqft × areaIn1000sqft) ÷ N%
  const fertLb = (rateInLbPer1000 * areaInUnit) / (n / 100);
  const fertKg = fertLb * 0.453592;
  const nAppliedLb = fertLb * (n/100);
  const pAppliedLb = fertLb * (p/100);
  const kAppliedLb = fertLb * (k/100);
  const nAppliedKg = nAppliedLb * 0.453592;

  const isMetric = rateUnit === 'kg-100';
  const amt = isMetric ? fertKg.toFixed(2) + ' kg' : fertLb.toFixed(2) + ' lb';
  $('#amount').textContent = amt;
  $('#amountSub').innerHTML = `${t('amountToApply')} · ${rateLabel} = ${targetN} · ${t('area')} = ${area} ${unit}`;
  $('#result').style.display = 'block';
  const nU = isMetric ? 'kg' : 'lb';
  $('#fertInfo').innerHTML = `
    <div class="gz-fert-card"><strong>${t('nitrogenApplied')}</strong>${(isMetric?nAppliedKg:nAppliedLb).toFixed(2)} ${nU}</div>
    <div class="gz-fert-card"><strong>${t('phosphorusApplied')}</strong>${(isMetric?pAppliedLb*0.453592:pAppliedLb).toFixed(2)} ${nU}</div>
    <div class="gz-fert-card"><strong>${t('potassiumApplied')}</strong>${(isMetric?kAppliedLb*0.453592:kAppliedLb).toFixed(2)} ${nU}</div>
    <div class="gz-fert-card"><strong>${t('total')}</strong>${amt}</div>
  `;
}

function doClear() {
  ['n','p','k','target','area'].forEach(id => $('#'+id).value = '');
  $('#result').style.display = 'none';
  $('#fertInfo').innerHTML = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="autoCalc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

autoCalc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌱', href:'/calc/plant-spacing.html', name:'Plant Spacing'},
    {icon:'🐕', href:'/calc/dog-age-calculator.html', name:'Dog Age'},
    {icon:'🐱', href:'/calc/cat-age-calculator.html', name:'Cat Age'},
    {icon:'📏', href:'/convert/unit.html', name:'Unit Converter'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
