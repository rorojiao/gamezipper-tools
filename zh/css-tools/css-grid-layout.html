<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gl-presets" id="presets"></div>
    <div class="gl-layout">
      <div class="gl-panel">
        <h3>⚙️ Grid Settings</h3>
        <div class="gl-row"><label>Columns:</label><input type="text" id="cols" value="1fr 1fr 1fr"></div>
        <div class="gl-row"><label>Rows:</label><input type="text" id="rows" value="auto"></div>
        <div class="gl-row"><label>Gap:</label><input type="text" id="gap" value="10px"></div>
        <div class="gl-row"><label>Justify items:</label>
          <select id="justifyItems">
            <option value="stretch" selected>stretch</option>
            <option value="start">start</option>
            <option value="end">end</option>
            <option value="center">center</option>
          </select>
        </div>
        <div class="gl-row"><label>Align items:</label>
          <select id="alignItems">
            <option value="stretch" selected>stretch</option>
            <option value="start">start</option>
            <option value="end">end</option>
            <option value="center">center</option>
            <option value="baseline">baseline</option>
          </select>
        </div>
        <div class="gl-row"><label>Justify content:</label>
          <select id="justifyContent">
            <option value="stretch">stretch</option>
            <option value="start">start</option>
            <option value="end">end</option>
            <option value="center">center</option>
            <option value="space-between">space-between</option>
            <option value="space-around">space-around</option>
            <option value="space-evenly" selected>space-evenly</option>
          </select>
        </div>
        <div class="gl-row"><label>Items count:</label><input type="number" id="items" value="6" min="1" max="20"></div>
      </div>
      <div class="gl-panel">
        <h3>👁️ Preview</h3>
        <div class="gl-preview" id="preview"></div>
      </div>
    </div>
    <div style="margin-top:14px">
      <h3 style="font-size:1rem;margin-bottom:8px;color:var(--accent)">📋 Generated CSS</h3>
      <div class="gl-output" id="cssOut"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Grid Layout Generator',
    toolDesc: 'Build CSS grid layouts visually with row, column, gap and area controls. Live preview and one-click CSS export. Free, browser-based.',
    copy: 'Copy CSS',
    step1: 'Set columns, rows and gap values',
    step2: 'Configure item alignment and content justification',
    step3: 'Watch the live preview update instantly',
    step4: 'Copy the generated CSS to use in your project',
  },
  zh: {
    toolTitle: 'CSS Grid 布局生成器',
    toolDesc: '可视化构建 CSS Grid 布局，配置行、列、间距和区域。实时预览，一键复制 CSS。免费，浏览器本地运行。',
    copy: '复制 CSS',
    step1: '设置列、行和间距值',
    step2: '配置项目对齐和内容对齐',
    step3: '实时预览自动更新',
    step4: '复制生成的 CSS 到你的项目',
  }
});

const { $, copyText, t } = GZ;

const PRESETS = [
  {name:'3 Columns', cols:'1fr 1fr 1fr', rows:'auto'},
  {name:'4 Columns', cols:'1fr 1fr 1fr 1fr', rows:'auto'},
  {name:'2x2 Square', cols:'1fr 1fr', rows:'1fr 1fr'},
  {name:'Holy Grail', cols:'200px 1fr 200px', rows:'auto 1fr auto'},
  {name:'Sidebar', cols:'250px 1fr', rows:'auto 1fr'},
  {name:'Magazine', cols:'repeat(3, 1fr)', rows:'repeat(3, 100px)'},
  {name:'Card Grid', cols:'repeat(auto-fit, minmax(200px, 1fr))', rows:'auto'},
  {name:'Wide Center', cols:'1fr 2fr 1fr', rows:'auto'},
  {name:'Equal Rows', cols:'1fr 1fr 1fr', rows:'1fr 1fr'},
  {name:'Hero + Grid', cols:'1fr 1fr', rows:'200px 1fr'},
];

function buildPresets() {
  $('#presets').innerHTML = PRESETS.map((p, i) => 
    `<span class="gl-preset" data-i="${i}">${p.name}</span>`
  ).join('');
  $$('.gl-preset').forEach(el => {
    el.addEventListener('click', () => {
      const p = PRESETS[parseInt(el.dataset.i)];
      $('#cols').value = p.cols;
      $('#rows').value = p.rows;
      update();
    });
  });
}

function $$(sel) { return Array.from(document.querySelectorAll(sel)); }

function update() {
  const cols = $('#cols').value.trim() || '1fr 1fr 1fr';
  const rows = $('#rows').value.trim() || 'auto';
  const gap = $('#gap').value.trim() || '10px';
  const ji = $('#justifyItems').value;
  const ai = $('#alignItems').value;
  const jc = $('#justifyContent').value;
  const count = Math.max(1, Math.min(20, parseInt($('#items').value) || 6));

  const preview = $('#preview');
  preview.style.gridTemplateColumns = cols;
  preview.style.gridTemplateRows = rows;
  preview.style.gap = gap;
  preview.style.justifyItems = ji;
  preview.style.alignItems = ai;
  preview.style.justifyContent = jc;

  preview.innerHTML = '';
  for (let i = 1; i <= count; i++) {
    const div = document.createElement('div');
    div.className = 'gl-item';
    div.textContent = i;
    preview.appendChild(div);
  }

  const css = `.grid-container {
  display: grid;
  grid-template-columns: ${cols};
  grid-template-rows: ${rows};
  gap: ${gap};
  justify-items: ${ji};
  align-items: ${ai};
  justify-content: ${jc};
}`;
  $('#cssOut').textContent = css;
}

['cols','rows','gap','justifyItems','alignItems','justifyContent','items'].forEach(id => {
  $('#'+id).addEventListener('input', update);
  $('#'+id).addEventListener('change', update);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#cssOut').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#cols').value='1fr 1fr 1fr';$('#rows').value='auto';$('#gap').value='10px';$('#items').value='6';update()">Reset</button>`;

buildPresets();
update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/css-tools/css-grid-generator.html', name:'CSS Grid Generator'},
    {icon:'🔲', href:'/css-tools/grid-areas-generator.html', name:'Grid Areas Generator'},
    {icon:'📦', href:'/css-tools/flexbox.html', name:'Flexbox Generator'},
    {icon:'🔲', href:'/css-tools/bento-grid.html', name:'Bento Grid'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
