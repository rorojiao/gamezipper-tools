    step1: '输入组 1 的原始数据（逗号/空格/换行分隔）',
    step2: '输入组 2 的原始数据',
    step3: '选择检验类型（双尾或单尾）和 α 水平',
    step4: '点击运行 T 检验获取结果和解释',

});

const { $, t } = GZ;

function parseNums(str) {
  return str.trim().split(/[\s,;\t\n]+/).map(Number).filter(n => !isNaN(n));
}

function mean(arr) { return arr.reduce((a,b)=>a+b,0) / arr.length; }
function stdDev(arr) {
  const m = mean(arr);
  return Math.sqrt(arr.reduce((a,b)=>a+(b-m)**2,0) / (arr.length-1));
}

// Student t CDF using incomplete beta function approximation
function logGamma(x) {
  const g = 7;
  const c = [0.99999999999980993, 676.5203681218851, -1259.1392167224028, 771.32342877765313, -176.61502916214059, 12.507343278686905, -0.13857109526572012, 9.9843695780195716e-6, 1.5056327351493116e-7];
  if (x < 0.5) return Math.log(Math.PI / Math.sin(Math.PI * x)) - logGamma(1 - x);
  x -= 1;
  let a = c[0];
  const t = x + g + 0.5;
  for (let i = 1; i < g + 2; i++) a += c[i] / (x + i);
  return 0.5 * Math.log(2 * Math.PI) + (x + 0.5) * Math.log(t) - t + Math.log(a);
}

function lowerIncGamma(s, x) {
  // Series expansion for regularized lower incomplete gamma
  if (x < 0) return 0;
  if (x === 0) return 0;
  const gamma_s = Math.exp(logGamma(s));
  let sum = 1 / s;
  let term = sum;
  for (let n = 1; n < 200; n++) {
    term *= x / (s + n);
    sum += term;
    if (Math.abs(term) < 1e-12) break;
  }
  return Math.exp(-x + s * Math.log(x) - Math.log(gamma_s) + Math.log(sum));
}

function betacf(a, b, x) {
  const maxit = 200;
  const eps = 3e-12;
  let qab = a + b, qap = a + 1, qam = a - 1;
  let c = 1, d = 1 - qab * x / qap;
  if (Math.abs(d) < 1e-30) d = 1e-30;
  d = 1 / d;
  let h = d;
  for (let m = 1; m <= maxit; m++) {
    const m2 = 2 * m;
    let aa = m * (b - m) * x / ((qam + m2) * (a + m2));
    d = 1 + aa * d;
    if (Math.abs(d) < 1e-30) d = 1e-30;
    c = 1 + aa / c;
    if (Math.abs(c) < 1e-30) c = 1e-30;
    d = 1 / d;
    h *= d * c;
    aa = -(a + m) * (qab + m) * x / ((a + m2) * (qap + m2));
    d = 1 + aa * d;
    if (Math.abs(d) < 1e-30) d = 1e-30;
    c = 1 + aa / c;
    if (Math.abs(c) < 1e-30) c = 1e-30;
    d = 1 / d;
    const del = d * c;
    h *= del;
    if (Math.abs(del - 1) < eps) break;
  }
  return h;
}

function betai(a, b, x) {
  if (x <= 0) return 0;
  if (x >= 1) return 1;
  const bt = Math.exp(logGamma(a + b) - logGamma(a) - logGamma(b) + a * Math.log(x) + b * Math.log(1 - x));
  if (x < (a + 1) / (a + b + 2)) return bt * betacf(a, b, x) / a;
  return 1 - bt * betacf(b, a, 1 - x) / b;
}

function tCDF(t, df) {
  const x = df / (df + t * t);
  const ib = betai(df / 2, 0.5, x);
  return t > 0 ? 1 - 0.5 * ib : 0.5 * ib;
}

function runTTest() {
  const d1 = parseNums($('#data1').value);
  const d2 = parseNums($('#data2').value);
  if (d1.length < 2 || d2.length < 2) {
    $('#result').innerHTML = `<div class="result-banner notsig">${d1.length === 0 && d2.length === 0 ? t('needBoth') : t('needMin')}</div>`;
    return;
  }
  const m1 = mean(d1), m2 = mean(d2);
  const s1 = stdDev(d1), s2 = stdDev(d2);
  const n1 = d1.length, n2 = d2.length;
  // Welch's t-test
  const se = Math.sqrt(s1*s1/n1 + s2*s2/n2);
  const tStat = (m1 - m2) / se;
  // Welch-Satterthwaite degrees of freedom
  const num = (s1*s1/n1 + s2*s2/n2) ** 2;
  const den = (s1*s1/n1)**2/(n1-1) + (s2*s2/n2)**2/(n2-1);
  const df = num / den;
  const tail = $('#tailType').value;
  let p;
  if (tail === 'two') p = 2 * (1 - tCDF(Math.abs(tStat), df));
  else if (tail === 'left') p = tCDF(tStat, df);
  else p = 1 - tCDF(tStat, df);
  p = Math.max(0, Math.min(1, p));
  const alpha = parseFloat($('#alphaLevel').value);
  const isSig = p <= alpha;
  const fmt = v => isNaN(v) ? '—' : (Math.abs(v) < 0.0001 ? v.toExponential(3) : v.toFixed(4));
  $('#result').innerHTML = `
    <div class="stat-row">
      <div class="stat-box"><div class="val">${fmt(m1)}</div><div class="lbl">${t('mean')} 1</div></div>
      <div class="stat-box"><div class="val">${fmt(s1)}</div><div class="lbl">${t('stdDev')} 1</div></div>
      <div class="stat-box"><div class="val">${n1}</div><div class="lbl">${t('n')} 1</div></div>
      <div class="stat-box"><div class="val">${fmt(m2)}</div><div class="lbl">${t('mean')} 2</div></div>
      <div class="stat-box"><div class="val">${fmt(s2)}</div><div class="lbl">${t('stdDev')} 2</div></div>
      <div class="stat-box"><div class="val">${n2}</div><div class="lbl">${t('n')} 2</div></div>
    </div>
    <div class="stat-row" style="margin-top:8px">
      <div class="stat-box"><div class="val">${fmt(tStat)}</div><div class="lbl">${t('tStat')}</div></div>
      <div class="stat-box"><div class="val">${fmt(df)}</div><div class="lbl">${t('df')}</div></div>
      <div class="stat-box"><div class="val">${p < 0.0001 ? '< 0.0001' : p.toFixed(4)}</div><div class="lbl">${t('pValue')}</div></div>
    </div>
    <div class="result-banner ${isSig ? 'sig' : 'notsig'}">${isSig ? t('significant') : t('notSignificant')} (α = ${alpha})</div>`;
}

$('#lbl-g1').textContent = t('g1Label');
$('#lbl-g2').textContent = t('g2Label');
$('#lbl-tail').textContent = t('tailLabel');
$('#calcBtn').textContent = t('calcBtn');
$('#calcBtn').addEventListener('click', runTTest);
