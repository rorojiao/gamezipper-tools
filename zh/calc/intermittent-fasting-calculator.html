<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is intermittent fasting?","acceptedAnswer":{"@type":"Answer","text":"Intermittent fasting (IF) is an eating pattern that cycles between periods of fasting and eating. Popular schedules include 16:8 (16 hours fasting, 8 hour eating window), 18:6, 20:4 and OMAD (one meal a day). It focuses on when to eat rather than what to eat."}},{"@type":"Question","name":"How do I calculate my eating window?","acceptedAnswer":{"@type":"Answer","text":"Choose a fasting protocol (like 16:8) and the time you want to start eating. Your eating window is the time between that start and the fasting duration. For 16:8 starting at 12:00 PM, you eat from 12:00 PM to 8:00 PM, then fast until noon the next day."}},{"@type":"Question","name":"Is intermittent fasting safe?","acceptedAnswer":{"@type":"Answer","text":"For most healthy adults, intermittent fasting is generally safe. However, pregnant or breastfeeding women, people with a history of eating disorders, diabetics on medication, and those under 18 should consult a healthcare professional before starting."}},{"@type":"Question","name":"Does this fasting calculator store my data?","acceptedAnswer":{"@type":"Answer","text":"No. All calculations run entirely in your browser. Nothing is uploaded or stored on a server. Your privacy is fully protected."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="if-wrap">
      <div class="if-card">
        <h3 id="hProtocol">⏱️ <span></span></h3>
        <div class="protocol-pills" id="pills"></div>
        <div class="if-grid" style="margin-top:14px">
          <div class="if-field">
            <label id="lblEatStart"></label>
            <input type="time" id="eatStart" value="12:00">
          </div>
          <div class="if-field">
            <label id="lblCustomFast"></label>
            <input type="number" id="customFast" min="12" max="23" value="16" step="1">
          </div>
        </div>
        <div style="margin-top:14px"><button class="btn" id="calcBtn" onclick="recalc()"></button></div>
      </div>

      <div class="if-card" id="resultCard" style="display:none">
        <h3 id="hSummary">📊 <span></span></h3>
        <div class="summary-box">
          <div class="item"><div class="lab" id="sLabEatStart"></div><div class="val" id="sEatStart">—</div></div>
          <div class="item"><div class="lab" id="sLabEatEnd"></div><div class="val" id="sEatEnd">—</div></div>
          <div class="item"><div class="lab" id="sLabFastEnd"></div><div class="val" id="sFastEnd">—</div></div>
          <div class="item"><div class="lab" id="sLabRatio"></div><div class="val" id="sRatio">—</div></div>
        </div>
        <div class="timeline" id="timeline"></div>
        <div class="legend">
          <span><i style="background:#27ae60"></i><span id="legEat"></span></span>
          <span><i style="background:#d35400"></i><span id="legFast"></span></span>
        </div>
        <p class="note" id="note"></p>
      </div>

      <div class="if-card" id="weekCard" style="display:none">
        <h3 id="hWeek">📅 <span></span></h3>
        <table class="week-table">
          <thead><tr id="weekHead"></tr></thead>
          <tbody><tr id="weekRow"></tr></tbody>
        </table>
      </div>
    </div>
  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Intermittent Fasting Calculator',
    toolDesc: 'Plan 16:8, 18:6, 20:4, OMAD or custom intermittent fasting schedules. Find your eating window, fasting start time and full weekly plan.',
    hProtocol: 'Choose Fasting Protocol',
    hSummary: 'Your Fasting Schedule',
    hWeek: 'Weekly Schedule (next 7 days)',
    lblEatStart: 'Eating window start time',
    lblCustomFast: 'Custom fasting hours',
    calcBtn: 'Calculate Schedule',
    sLabEatStart: 'Eating starts',
    sLabEatEnd: 'Eating ends',
    sLabFastEnd: 'Next meal',
    sLabRatio: 'Fasting ratio',
    legEat: 'Eating window',
    legFast: 'Fasting window',
    note: 'Tip: Most people find 16:8 the easiest to sustain. Start with a 12-hour fast and gradually increase. Always consult a doctor before starting any fasting regimen.',
    pills: ['16:8','18:6','20:4','14:10','OMAD','Custom'],
    step1: 'Pick a fasting protocol like 16:8 or OMAD, or enter a custom fasting duration',
    step2: 'Set the time you want your eating window to start (e.g. 12:00 PM)',
    step3: 'Click Calculate to see your eating window, fasting start and next-meal time',
    step4: 'Review the visual timeline and your 7-day weekly schedule',
  },
  zh: {
    toolTitle: '间歇性断食计算器',
    toolDesc: '规划 16:8、18:6、20:4、OMAD 或自定义间歇性断食方案。计算进食窗口、断食开始时间和完整的一周计划。',
    hProtocol: '选择断食方案',
    hSummary: '您的断食日程',
    hWeek: '未来 7 天日程',
    lblEatStart: '进食窗口开始时间',
    lblCustomFast: '自定义断食时长（小时）',
    calcBtn: '计算日程',
    sLabEatStart: '开始进食',
    sLabEatEnd: '结束进食',
    sLabFastEnd: '下一餐',
    sLabRatio: '断食比例',
    legEat: '进食窗口',
    legFast: '断食窗口',
    note: '提示：大多数人觉得 16:8 最容易坚持。可从 12 小时断食开始逐步增加。开始任何断食方案前请咨询医生。',
    pills: ['16:8','18:6','20:4','14:10','OMAD','自定义'],
    step1: '选择断食方案，如 16:8 或 OMAD，或输入自定义断食时长',
    step2: '设置进食窗口的开始时间（例如 12:00）',
    step3: '点击「计算日程」查看进食窗口、断食开始和下一餐时间',
    step4: '查看可视化时间轴和 7 天周计划表',
  }
});

const { $, t } = GZ;
let activePill = '16:8';

const FAST_MAP = {'16:8':16,'18:6':18,'20:4':20,'14:10':14,'OMAD':23,'Custom':16};

function buildPills(){
  const wrap = $('#pills');
  wrap.innerHTML = '';
  const labels = t('pills');
  const keys = ['16:8','18:6','20:4','14:10','OMAD','Custom'];
  labels.forEach((lab,i)=>{
    const key = keys[i];
    const b = document.createElement('button');
    b.textContent = lab;
    if(key === activePill) b.classList.add('active');
    b.onclick = ()=>{
      activePill = key;
      if(key !== 'Custom') $('#customFast').value = FAST_MAP[key];
      buildPills();
      recalc();
    };
    wrap.appendChild(b);
  });
}

function fmtTime(d){
  let h = d.getHours();
  const m = d.getMinutes();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + ':' + String(m).padStart(2,'0') + ' ' + ap;
}

function addHours(d, h){
  return new Date(d.getTime() + h*3600*1000);
}

function recalc(){
  const fastH = activePill === 'OMAD' ? 23 : (activePill === 'Custom' ? Math.min(23,Math.max(12,+$('#customFast').value||16)) : FAST_MAP[activePill]);
  const eatH = 24 - fastH;
  const [hh,mm] = $('#eatStart').value.split(':').map(Number);
  const base = new Date();
  base.setHours(hh||12, mm||0, 0, 0);
  const eatStart = new Date(base);
  const eatEnd = addHours(base, eatH);
  const fastEnd = addHours(base, 24);

  $('#sEatStart').textContent = fmtTime(eatStart);
  $('#sEatEnd').textContent = fmtTime(eatEnd);
  $('#sFastEnd').textContent = fmtTime(fastEnd);
  $('#sRatio').textContent = fastH + ':' + eatH;

  // Timeline: eating window then fasting window, scaled to 24h
  const tl = $('#timeline');
  tl.innerHTML = '';
  const eatSeg = document.createElement('div');
  eatSeg.className = 'seg eat';
  eatSeg.style.flex = eatH;
  eatSeg.textContent = t('legEat') + ' (' + eatH + 'h)';
  const fastSeg = document.createElement('div');
  fastSeg.className = 'seg fast';
  fastSeg.style.flex = fastH;
  fastSeg.textContent = t('legFast') + ' (' + fastH + 'h)';
  tl.appendChild(eatSeg);
  tl.appendChild(fastSeg);

  // Week table
  const head = $('#weekHead');
  const row = $('#weekRow');
  head.innerHTML = '';
  row.innerHTML = '';
  const days = GZ.lang === 'zh' ? ['今天','明天','第3天','第4天','第5天','第6天','第7天'] : ['Today','Day 2','Day 3','Day 4','Day 5','Day 6','Day 7'];
  days.forEach((d,i)=>{
    const th = document.createElement('th'); th.textContent = d; head.appendChild(th);
    const td = document.createElement('td');
    const dayStart = addHours(eatStart, i*24);
    const dayEnd = addHours(dayStart, eatH);
    td.innerHTML = '<b>'+fmtTime(dayStart)+'</b><br>—<br><b>'+fmtTime(dayEnd)+'</b>';
    row.appendChild(td);
  });

  $('#resultCard').style.display = '';
  $('#weekCard').style.display = '';
}

// Init labels
$('#hProtocol').querySelector('span').textContent = t('hProtocol');
$('#hSummary').querySelector('span').textContent = t('hSummary');
$('#hWeek').querySelector('span').textContent = t('hWeek');
$('#lblEatStart').textContent = t('lblEatStart');
$('#lblCustomFast').textContent = t('lblCustomFast');
$('#calcBtn').textContent = t('calcBtn');
$('#sLabEatStart').textContent = t('sLabEatStart');
$('#sLabEatEnd').textContent = t('sLabEatEnd');
$('#sLabFastEnd').textContent = t('sLabFastEnd');
$('#sLabRatio').textContent = t('sLabRatio');
$('#legEat').textContent = t('legEat');
$('#legFast').textContent = t('legFast');
$('#note').textContent = t('note');
buildPills();
recalc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💧', href:'/calc/water-intake.html', name:'Water Intake Calculator'},
    {icon:'🏋️', href:'/calc/macro-calculator.html', name:'Macro Calculator'},
    {icon:'⏱️', href:'/calc/fasting-timer.html', name:'Fasting Timer'},
    {icon:'🔥', href:'/calc/calorie-calculator.html', name:'Calorie Calculator'},
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
