<div class="gz-container">

  </div>
  <div class="gz-tool-area">

    <div class="gz-split">

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Bulk URL Status Checker',
    toolDesc: 'Check the HTTP status code of up to 50 URLs at once. Batch test response codes, redirects and response times — free and browser-based.',
    checkAll: 'Check All',
    clear: 'Clear',
    example: 'Example',
    inputLabel: 'Enter URLs (one per line, max 50)',
    outputLabel: 'Results',
    checking: 'Checking...',
    done: 'Done',
    corsError: 'CORS blocked',
    total: 'Total',
    success: '2xx',
    redirects: '3xx',
    errors: '4xx/5xx',
    failed: 'Failed',
    step1: 'Paste up to 50 URLs into the input area (one per line)',
    step2: 'Click "Check All" to start the batch status check',
    step3: 'View each URL\'s HTTP status code, color-coded by category',
    step4: 'Review the summary counts for quick overview',
  },
  zh: {
    toolTitle: '批量网址状态检测器',
    toolDesc: '一次检测最多 50 个网址的 HTTP 状态码。批量测试响应码、重定向和响应时间 — 免费浏览器本地运行。',
    checkAll: '批量检测',
    clear: '清空',
    example: '示例',
    inputLabel: '输入网址（每行一个，最多 50 个）',
    outputLabel: '结果',
    checking: '检测中...',
    done: '完成',
    corsError: 'CORS 限制',
    total: '总计',
    success: '2xx 成功',
    redirects: '3xx 重定向',
    errors: '4xx/5xx 错误',
    failed: '失败',
    step1: '在输入区粘贴最多 50 个网址（每行一个）',
    step2: '点击「批量检测」开始检测',
    step3: '查看每个网址的 HTTP 状态码，按类别颜色标识',
    step4: '查看汇总统计快速了解整体情况',
  }
});

const { $, t } = GZ;
let checking = false;

function parseUrls() {
  return $('#urls').value.split('\n').map(u => u.trim()).filter(u => u.length > 0).slice(0, 50);
}

function normalizeUrl(u) {
  if (!/^https?:\/\//i.test(u)) return 'https://' + u;
  return u;
}

function codeClass(code) {
  if (code >= 200 && code < 300) return 'bus-code-2xx';
  if (code >= 300 && code < 400) return 'bus-code-3xx';
  if (code >= 400 && code < 500) return 'bus-code-4xx';
  if (code >= 500) return 'bus-code-5xx';
  return 'bus-code-err';
}

async function checkUrl(url) {
  const start = performance.now();
  try {
    const resp = await fetch(url, { method: 'HEAD', mode: 'no-cors', redirect: 'follow', signal: AbortSignal.timeout(10000) });
    const ms = Math.round(performance.now() - start);
    // In no-cors mode, status is always 0 (opaque) — we can only detect reachability
    if (resp.type === 'opaque') {
      return { code: 0, label: 'OK*', ms, reachable: true };
    }
    return { code: resp.status, label: String(resp.status), ms, reachable: true };
  } catch (e) {
    const ms = Math.round(performance.now() - start);
    return { code: -1, label: t('corsError'), ms, reachable: false };
  }
}

async function doCheck() {
  if (checking) return;
  const urls = parseUrls();
  if (urls.length === 0) { $('#bus-results').innerHTML = '<p style="padding:14px;color:var(--text2)">—</p>'; return; }
  checking = true;
  $('#bus-results').innerHTML = '';
  $('#bus-summary').style.display = 'none';
  const progressDiv = $('#bus-progress');
  const bar = $('#bus-bar');
  progressDiv.style.display = 'block';
  bar.style.width = '0%';

  let counts = { success: 0, redirects: 0, errors: 0, failed: 0 };

  for (let i = 0; i < urls.length; i++) {
    const url = normalizeUrl(urls[i]);
    const result = await checkUrl(url);
    bar.style.width = ((i + 1) / urls.length * 100) + '%';

    if (result.code >= 200 && result.code < 300) counts.success++;
    else if (result.code >= 300 && result.code < 400) counts.redirects++;
    else if (result.code >= 400) counts.errors++;
    else counts.failed++;

    const cls = result.code === 0 ? 'bus-code-2xx' : codeClass(result.code);
    const displayUrl = url.length > 60 ? url.substring(0, 57) + '...' : url;

    $('#bus-results').insertAdjacentHTML('beforeend',
      `<div class="bus-result">
        <span class="bus-url" title="${url}">${displayUrl}</span>
        <span class="bus-code ${cls}">${result.label}</span>
        <span class="bus-time">${result.ms}ms</span>
      </div>`);
  }

  checking = false;
  progressDiv.style.display = 'none';
  const sum = $('#bus-summary');
  sum.style.display = 'flex';
  sum.innerHTML = `
    <span>${t('total')}: ${urls.length}</span>
    <span style="color:#00d672">${t('success')}: ${counts.success}</span>
    <span style="color:#61afef">${t('redirects')}: ${counts.redirects}</span>
    <span style="color:#ffc107">${t('errors')}: ${counts.errors}</span>
    <span style="color:#888">${t('failed')}: ${counts.failed}</span>
  `;
}

function loadExample() {
  $('#urls').value = 'https://tools.gamezipper.com\nhttps://gamezipper.com\nhttps://example.com\nhttps://httpbin.org/status/200\nhttps://httpbin.org/status/404\nhttps://httpbin.org/status/500';
  doCheck();
}

function doClear() {
  $('#urls').value = '';
  $('#bus-results').innerHTML = '';
  $('#bus-summary').style.display = 'none';
  $('#bus-progress').style.display = 'none';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doCheck()">${t('checkAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'network',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌐', href:'/network/website-status-checker.html', name:'Website Status'},
    {icon:'📋', href:'/network/http-headers-checker.html', name:'HTTP Headers'},
    {icon:'🔗', href:'/text/extract-contacts.html', name:'Extract URLs'},
    {icon:'📡', href:'/network/dns-lookup.html', name:'DNS Lookup'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
