const { $, copyText, t } = GZ;
let delimiter = ',';
let typeInfer = true;
let arrayTables = true;

// RFC 4180 CSV parser
function parseCSV(text, delim) {
  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;
  const d = delim;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === d) { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r') { /* skip, handle \n */ }
      else field += c;
    }
  }
  // last field
  if (field !== '' || row.length > 0) { row.push(field); rows.push(row); }
  // remove trailing empty rows
  while (rows.length && rows[rows.length - 1].length === 1 && rows[rows.length - 1][0] === '') rows.pop();
  return rows;
}

function inferType(val) {
  if (val === '') return null;
  if (!typeInfer) return val;
  const lower = val.toLowerCase();
  if (lower === 'true') return true;
  if (lower === 'false') return false;
  if (lower === 'null' || lower === 'none' || lower === 'nil') return null;
  // integer
  if (/^-?\d+$/.test(val)) {
    try { return String(BigInt(val)); } catch(e) { return val; }
  }
  // float
  if (/^-?\d+\.\d+([eE][+-]?\d+)?$/.test(val) || /^-?\d+[eE][+-]?\d+$/.test(val)) return parseFloat(val);
  // date-like (ISO) -> keep as string but quoted in TOML
  return val;
}

function formatTomlValue(val) {
  if (val === null || val === undefined) return '""';
  if (val === true) return 'true';
  if (val === false) return 'false';
  if (typeof val === 'number') return String(val);
  // string: escape backslash and quotes
  const escaped = String(val).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
  // bare key allowed for simple identifiers, otherwise quote
  return `"${escaped}"`;
}

function toTomlKey(name) {
  if (/^[A-Za-z0-9_-]+$/.test(name)) return name;
  const escaped = String(name).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
  return `"${escaped}"`;
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#status').innerHTML=''; return; }
  try {
    const rows = parseCSV(inp, delimiter);
    if (rows.length < 1) { $('#output').textContent = ''; $('#status').innerHTML=''; return; }
    const headers = rows[0];
    const dataRows = rows.slice(1);
    let out = '';
    if (arrayTables) {
      for (const r of dataRows) {
        out += '[[rows]]\n';
        for (let c = 0; c < headers.length; c++) {
          const key = headers[c] || `col${c}`;
          const raw = r[c] !== undefined ? r[c] : '';
          const val = inferType(raw);
          out += `${toTomlKey(key)} = ${formatTomlValue(val)}\n`;
        }
        out += '\n';
      }
    } else {
      // single table
      out += '[data]\n';
      for (const r of dataRows) {
        for (let c = 0; c < headers.length; c++) {
          const key = headers[c] || `col${c}`;
          const raw = r[c] !== undefined ? r[c] : '';
          const val = inferType(raw);
          out += `${toTomlKey(key)} = ${formatTomlValue(val)}\n`;
        }
        out += '\n';
      }
    }
    $('#output').textContent = out.trimEnd() + '\n';
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${t('rowsConverted')(dataRows.length)}</span>`;
  } catch(e) {
    $('#output').textContent = '';
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error: ${e.message}</span>`;
  }
}

function loadExample() {
  $('#input').value = 'name,version,stable,rating,downloads\nGameZipper Tools,2.5,true,4.8,1200000\nTiny Calculator,1.0,false,4.2,35000\nPDF Merger,3.2,true,4.9,890000';
  convert();
}

$('#input').addEventListener('input', convert);

  <label><input type="checkbox" checked onchange="arrayTables=this.checked;convert()"> ${t('arrayTables')}</label>`;

window.setDelim = function(v) { delimiter = v; convert(); };
