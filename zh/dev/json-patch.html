const { $, copyText, t } = GZ;

function deepEqual(a, b) {
  if (a === b) return true;
  if (typeof a !== typeof b) return false;
  if (a === null || b === null) return a === b;
  if (typeof a !== 'object') return a === b;
  if (Array.isArray(a) !== Array.isArray(b)) return false;
  if (Array.isArray(a)) {
    if (a.length !== b.length) return false;
    for (let i = 0; i < a.length; i++) if (!deepEqual(a[i], b[i])) return false;
    return true;
  }
  const ka = Object.keys(a), kb = Object.keys(b);
  if (ka.length !== kb.length) return false;
  for (const k of ka) if (!deepEqual(a[k], b[k])) return false;
  return true;
}

function escapePointer(seg) {
  return String(seg).replace(/~/g, '~0').replace(/\//g, '~1');
}

function diff(obj1, obj2, basePath, ops) {
  if (deepEqual(obj1, obj2)) return;

  if (Array.isArray(obj1) && Array.isArray(obj2)) {
    const maxLen = Math.max(obj1.length, obj2.length);
    let changed = false;
    for (let i = 0; i < maxLen; i++) {
      const path = basePath + '/' + i;
      if (i >= obj2.length) {
        ops.push({ op: 'remove', path });
        changed = true;
      } else if (i >= obj1.length) {
        ops.push({ op: 'add', path, value: obj2[i] });
        changed = true;
      } else if (!deepEqual(obj1[i], obj2[i])) {
        if (typeof obj1[i] === 'object' && obj1[i] !== null &&
            typeof obj2[i] === 'object' && obj2[i] !== null &&
            Array.isArray(obj1[i]) === Array.isArray(obj2[i])) {
          diff(obj1[i], obj2[i], path, ops);
        } else {
          ops.push({ op: 'replace', path, value: obj2[i] });
        }
        changed = true;
      }
    }
    return;
  }

  if (typeof obj1 === 'object' && obj1 !== null && typeof obj2 === 'object' && obj2 !== null) {
    for (const key of Object.keys(obj1)) {
      const path = basePath + '/' + escapePointer(key);
      if (!(key in obj2)) {
        ops.push({ op: 'remove', path });
      } else if (!deepEqual(obj1[key], obj2[key])) {
        if (typeof obj1[key] === 'object' && obj1[key] !== null &&
            typeof obj2[key] === 'object' && obj2[key] !== null &&
            Array.isArray(obj1[key]) === Array.isArray(obj2[key])) {
          diff(obj1[key], obj2[key], path, ops);
        } else {
          ops.push({ op: 'replace', path, value: obj2[key] });
        }
      }
    }
    for (const key of Object.keys(obj2)) {
      if (!(key in obj1)) {
        const path = basePath + '/' + escapePointer(key);
        ops.push({ op: 'add', path, value: obj2[key] });
      }
    }
    return;
  }

  ops.push({ op: 'replace', path: basePath || '', value: obj2 });
}

function doGenerate() {
  const orig = $('#original').value.trim();
  const mod = $('#modified').value.trim();
  if (!orig || !mod) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  try {
    const obj1 = JSON.parse(orig);
    const obj2 = JSON.parse(mod);
    const ops = [];
    diff(obj1, obj2, '', ops);
    if (ops.length === 0) {
      $('#output').textContent = '[]';
      $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ Documents are identical — no operations needed</span>`;
    } else {
      $('#output').textContent = JSON.stringify(ops, null, 2);
      $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${ops.length} patch operation${ops.length!==1?'s':''} generated</span>`;
    }
  } catch(e) {
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ Invalid JSON</span>`;
  }
}

function doDownload() {
  const text = $('#output').textContent;
  if (!text) return;
  const blob = new Blob([text], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'patch.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadExample() {
  $('#original').value = JSON.stringify({
    "name": "Alice", "age": 30, "city": "NYC",
    "hobbies": ["reading", "coding"],
    "address": { "street": "123 Main St", "zip": "10001" }
  }, null, 2);
  $('#modified').value = JSON.stringify({
    "name": "Alice", "age": 31, "city": "Boston",
    "hobbies": ["reading", "coding", "gaming"],
    "address": { "street": "456 Oak Ave", "zip": "10001", "state": "MA" }
  }, null, 2);
  doGenerate();
}

function doClear() {
  $('#original').value = ''; $('#modified').value = '';
  $('#output').textContent = ''; $('#status').innerHTML = '';
}

$('#lbl-orig').textContent = t('original');
$('#lbl-mod').textContent = t('modified');

  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDownload()">⬇ .json</button>
