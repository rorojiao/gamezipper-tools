<script>
GZI18n.register({
  en: {
    toolTitle: 'Blog Title Generator',
    toolDesc: 'Generate 20+ SEO-friendly, click-worthy blog headlines in seconds. Pick a topic, category, tone and style — copy the best ones and start writing.',
    lblTopic: 'Topic or keyword',
    phTopic: 'e.g. productivity, remote work, beginner yoga',
    lblCat: 'Category',
    lblTone: 'Tone',
    lblStyle: 'Style',
    btnGen: 'Generate Titles',
    btnExample: 'Load Example',
    tip: 'Tip: Try different style filters for varied results. Each click produces a fresh batch of templates combined with your topic.',
    step1: 'Enter a topic or keyword (1-3 words works best)',
    step2: 'Pick a category, tone and style',
    step3: 'Click Generate Titles for 20+ headline ideas',
    step4: 'Click a card to copy, or hit Generate again for more',
  },
  zh: {
    toolTitle: '博客标题生成器',
    toolDesc: '几秒钟内生成 20+ SEO 友好的、引人点击的博客标题。选择主题、类别、语气和风格 — 一键复制最好的标题。',
    lblTopic: '主题或关键词',
    phTopic: '例如：远程办公、Python入门、健身计划',
    lblCat: '类别',
    lblTone: '语气',
    lblStyle: '风格',
    btnGen: '生成标题',
    btnExample: '加载示例',
    tip: '提示：尝试不同风格过滤器。每次点击都会基于主题生成全新组合。',
    step1: '输入主题或关键词（建议 1-3 字）',
    step2: '选择类别、语气和风格',
    step3: '点击「生成标题」获得 20+ 标题创意',
    step4: '点击卡片复制，或再次点击生成更多',
  }
});

const { $, copyText, t, showToast } = GZ;

const TONE_HOOKS = {
  informative: ['The Complete Guide to','Understanding','What You Need to Know About','A Beginner\'s Guide to','The Science Behind','How to Master'],
  casual: ['Why I Love','The Lazy Guide to','My Honest Take on','You\'ll Love','Things Nobody Tells You About','A Simple Guide to'],
  professional: ['Strategic Insights on','Best Practices for','Key Considerations for','Professional Tips for','How Leaders Approach','Lessons from'],
  bold: ['The Brutal Truth About','Stop Doing This With','You\'re Doing Wrong','The Real Reason','Why Most People Fail at','This Will Change How You Think About'],
  curious: ['Why Do','What Happens When You','The Hidden Truth About','Surprising Facts About','What They Don\'t Tell You About','I Tried'],
};

const STYLE_FNS = {
  howto: (topic) => [
    `How to ${cap(topic)} (Step-by-Step Guide)`,
    `How to ${cap(topic)} Like a Pro`,
    `How to ${cap(topic)} in 30 Days`,
    `How to ${cap(topic)} From Scratch`,
    `How to ${cap(topic)} Without Burning Out`,
  ],
  list: (topic) => [
    `${rand(7,15)} Proven Ways to ${cap(topic)}`,
    `${rand(5,20)} ${cap(topic)} Tips That Actually Work`,
    `Top ${rand(7,12)} ${cap(topic)} Tools for 2026`,
    `${rand(5,10)} Common ${cap(topic)} Mistakes to Avoid`,
    `${rand(7,15)} ${cap(topic)} Hacks for Beginners`,
  ],
  question: (topic) => [
    `What Is ${cap(topic)} and Why Does It Matter?`,
    `Is ${cap(topic)} Really Worth It?`,
    `Why Is ${cap(topic)} So Hard?`,
    `How Does ${cap(topic)} Actually Work?`,
    `Who Should Care About ${cap(topic)}?`,
  ],
  guide: (topic) => [
    `The Ultimate Guide to ${cap(topic)} (2026 Edition)`,
    `A Beginner's Guide to ${cap(topic)}`,
    `${cap(topic)} 101: Everything You Need to Know`,
    `The Definitive Guide to ${cap(topic)}`,
    `Your Complete ${cap(topic)} Roadmap`,
  ],
  mistake: (topic) => [
    `${rand(5,10)} ${cap(topic)} Mistakes You're Probably Making`,
    `Avoid These ${rand(5,8)} ${cap(topic)} Pitfalls`,
    `Why Your ${cap(topic)} Strategy Is Failing`,
    `The Worst ${cap(topic)} Advice I've Ever Heard`,
    `${cap(topic)} Mistakes That Cost Me a Year`,
  ],
  secret: (topic) => [
    `${rand(5,10)} ${cap(topic)} Secrets Nobody Talks About`,
    `The Hidden Side of ${cap(topic)}`,
    `${cap(topic)}: What the Experts Won't Tell You`,
    `Insider ${cap(topic)} Tips from Industry Pros`,
    `Little-Known ${cap(topic)} Hacks That Work`,
  ],
  reason: (topic) => [
    `${rand(5,10)} Reasons Why ${cap(topic)} Matters in 2026`,
    `${rand(7,12)} Surprising Benefits of ${cap(topic)}`,
    `Why ${cap(topic)} Is More Important Than You Think`,
    `${rand(5,7)} Reasons to Start ${topic} Today`,
    `The Top ${rand(5,10)} Reasons People Love ${cap(topic)}`,
  ],
  future: (topic) => [
    `The Future of ${cap(topic)}: 2026 and Beyond`,
    `${cap(topic)} Trends to Watch in 2026`,
    `How ${cap(topic)} Will Change in the Next 5 Years`,
    `What's Next for ${cap(topic)}? Predictions for 2026`,
    `${cap(topic)} in 2030: Where Are We Headed?`,
  ],
  comparison: (topic) => [
    `${cap(topic)} vs the Alternatives: Which Is Better?`,
    `${cap(topic)}: A vs B Breakdown`,
    `Is ${cap(topic)} Better Than the Competition?`,
    `Comparing the Top ${rand(3,5)} ${cap(topic)} Options`,
    `${cap(topic)} Pros and Cons: An Honest Comparison`,
  ],
};

function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generateTitles() {
  let topic = $('#topic').value.trim();
  if (!topic) { showToast('Please enter a topic'); return; }
  if (topic.length > 60) topic = topic.slice(0, 60);
  const tone = $('#tone').value;
  const style = $('#style').value;
  const results = [];
  
  const toneHooks = TONE_HOOKS[tone] || TONE_HOOKS.informative;
  const styleKeys = style === 'all' ? Object.keys(STYLE_FNS) : [style];
  
  // Generate with tone hooks
  for (let i = 0; i < 5; i++) {
    const hook = pick(toneHooks);
    results.push({title: `${hook} ${topic}`, meta: tone, icon: '✨'});
  }
  
  // Generate with style templates
  styleKeys.forEach(s => {
    const fn = STYLE_FNS[s];
    if (fn) {
      const arr = fn(topic);
      const sample = arr.sort(() => Math.random() - 0.5).slice(0, 3);
      sample.forEach(t => {
        results.push({title: t, meta: s, icon: '📝'});
      });
    }
  });
  
  // Add a few power-word variations
  const POWER_PREFIX = ['Ultimate','Proven','Essential','The Best','Expert','Master','Quick'];
  const POWER_SUFFIX = ['in 2026','for Beginners','That Works','Like a Pro','on a Budget','Step by Step'];
  for (let i = 0; i < 3; i++) {
    results.push({title: `${pick(POWER_PREFIX)} ${cap(topic)} Guide: ${pick(POWER_SUFFIX)}`, meta: 'power', icon: '🔥'});
  }
  
  // Shuffle and dedupe
  const seen = new Set();
  const dedup = results.filter(r => {
    const key = r.title.toLowerCase();
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
  
  // Shuffle
  for (let i = dedup.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [dedup[i], dedup[j]] = [dedup[j], dedup[i]];
  }
  
  // Render
  const html = dedup.map((r, i) => `
    <div class="bg-card" onclick="copyTitle(${i})">
      <span class="icon">${r.icon}</span>
      <div class="body">
        <div class="title">${escapeHtml(r.title)}</div>
        <div class="meta">${r.meta}</div>
      </div>
      <button class="copy" id="bcopy${i}"></button>
    </div>
  `).join('');
  $('#results').innerHTML = html;
  $('#count').textContent = `${dedup.length} titles generated`;
  
  // Store titles for copy
  window._titles = dedup;
  // Set copy button labels
  dedup.forEach((_, i) => {
    const btn = document.getElementById('bcopy' + i);
    if (btn) { btn.textContent = t('copy'); btn.onclick = (e) => { e.stopPropagation(); copyText(window._titles[i].title); }; }
  });
}

function copyTitle(i) {
  copyText(window._titles[i].title);
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

$('#btn-gen').textContent = t('btnGen');
$('#btn-gen').addEventListener('click', generateTitles);
$('#btn-example').textContent = t('btnExample');
$('#btn-example').addEventListener('click', () => { $('#topic').value = 'productivity'; $('#cat').value='productivity'; $('#tone').value='casual'; $('#style').value='all'; generateTitles(); });
$('#lbl-topic').textContent = t('lblTopic');
$('#lbl-cat').textContent = t('lblCat');
$('#lbl-tone').textContent = t('lblTone');
$('#lbl-style').textContent = t('lblStyle');
$('#topic').placeholder = t('phTopic');
$('#tip').textContent = t('tip');

$('#topic').addEventListener('keydown', (e) => { if (e.key === 'Enter') generateTitles(); });

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/text/headline-analyzer.html', name:'Headline Analyzer'},
    {icon:'✍️', href:'/text/handwriting.html', name:'Handwriting'},
    {icon:'📝', href:'/text/sheets-formula-generator.html', name:'Sheets Formula'},
    {icon:'🔍', href:'/seo/keyword-density.html', name:'Keyword Density'},
  ]
});
</script>
