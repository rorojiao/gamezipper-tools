    toolDesc: '计算 Flesch-Kincaid 年级、Flesch 可读性、Gunning Fog、SMOG、Coleman-Liau 和 ARI 阅读难度评分。适合 SEO、写作者和教育工作者 — 免费、私密。',

    fleschEase: 'Flesch 可读性',
    fleschGrade: 'Flesch-Kincaid 年级',
    fog: 'Gunning Fog',
    smog: 'SMOG 指数',
    coleman: 'Coleman-Liau',
    ari: '自动可读性',

    sentences: '句子',

    difficult: '难 — 大学水平',
    veryDifficult: '非常难 — 研究生水平',

const { $, t } = GZ;

function countSyllables(word) {
  word = word.toLowerCase().replace(/[^a-z]/g, '');
  if (word.length <= 3) return 1;
  word = word.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, '');
  word = word.replace(/^y/, '');
  const m = word.match(/[aeiouy]{1,2}/g);
  return m ? m.length : 1;
}

function analyze() {
  const text = $('#input').value.trim();
  if (!text) { $('#scores').innerHTML = ''; $('#summary').innerHTML = ''; $('#easeBar').innerHTML = ''; return; }

  const words = text.match(/\b[a-zA-Z']+\b/g) || [];
  const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
  if (sentences.length < 2 || words.length < 5) {
    $('#scores').innerHTML = '';
    $('#summary').innerHTML = `<p style="color:var(--gz-accent)">${t('tooShort')}</p>`;
    $('#easeBar').innerHTML = '';
    return;
  }

  const wordCount = words.length;
  const sentCount = sentences.length;
  const charCount = text.replace(/\s/g, '').length;
  let syllableCount = 0, complexWords = 0;
  words.forEach(w => { const s = countSyllables(w); syllableCount += s; if (s >= 3) complexWords++; });

  const fleschEase = 206.835 - 1.015 * (wordCount / sentCount) - 84.6 * (syllableCount / wordCount);
  const fleschGrade = 0.39 * (wordCount / sentCount) + 11.8 * (syllableCount / wordCount) - 15.59;
  const fog = 0.4 * ((wordCount / sentCount) + 100 * (complexWords / wordCount));
  const smog = 1.0430 * Math.sqrt(complexWords * (30 / sentCount)) + 3.1291;
  const coleman = 0.0588 * (charCount / wordCount * 100) - 0.296 * (sentCount / wordCount * 100) - 15.8;
  const ari = 4.71 * (charCount / wordCount) + 0.5 * (wordCount / sentCount) - 21.43;
  const avgGrade = (fleschGrade + fog + smog + coleman + ari) / 5;

  const scores = [
    {lab: t('fleschEase'), val: fleschEase.toFixed(1), sub: getEaseLabel(fleschEase)},
    {lab: t('fleschGrade'), val: fleschGrade.toFixed(1), sub: t('gradeUnit')},
    {lab: t('fog'), val: fog.toFixed(1), sub: t('gradeUnit')},
    {lab: t('smog'), val: smog.toFixed(1), sub: t('gradeUnit')},
    {lab: t('coleman'), val: coleman.toFixed(1), sub: t('gradeUnit')},
    {lab: t('ari'), val: ari.toFixed(1), sub: t('gradeUnit')},
  ];

  $('#scores').innerHTML = scores.map(s =>
    `<div class="score-card"><div class="lab">${s.lab}</div><div class="num">${s.val}</div><div class="sub">${s.sub}</div></div>`
  ).join('');

  const easePct = Math.max(0, Math.min(100, fleschEase));
  $('#summary').innerHTML = `
    <div class="verdict">${t('easeVerdict')}: ${getEaseLabel(fleschEase)}</div>
    <div style="margin-top:8px"><strong>${t('avgGrade')}</strong>: ${avgGrade.toFixed(1)} ${t('gradeUnit')}</div>
    <div style="margin-top:8px;color:var(--text2)">
      <strong>${t('words')}</strong>: ${wordCount.toLocaleString()} ·
      <strong>${t('sentences')}</strong>: ${sentCount} ·
      <strong>${t('syllables')}</strong>: ${syllableCount.toLocaleString()} ·
      <strong>${t('complex')}</strong>: ${complexWords} ·
      <strong>${t('chars')}</strong>: ${charCount.toLocaleString()}
    </div>`;

  $('#easeBar').innerHTML = `
    <div class="bar-lab"><span>${t('veryEasy')} (90-100)</span><span>${t('veryDifficult')} (0-30)</span></div>
    <div class="bar-track"><div class="bar-fill" style="width:${easePct}%"></div></div>`;
}

function getEaseLabel(score) {
  if (score >= 90) return t('veryEasy');
  if (score >= 80) return t('easy');
  if (score >= 70) return t('fairlyEasy');
  if (score >= 60) return t('plain');
  if (score >= 50) return t('fairlyDifficult');
  if (score >= 30) return t('difficult');
  return t('veryDifficult');
}

$('#input').placeholder = t('ph');
$('#input').addEventListener('input', analyze);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';analyze()">${t('clear')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='The cat sat on the mat. It was a sunny day outside. The little cat was very happy. She decided to take a long nap in the warm sunshine. Birds were singing in the trees nearby. Everything was peaceful and quiet. Soon the cat fell asleep and dreamed of chasing butterflies.';analyze()">${t('example')}</button>`;
