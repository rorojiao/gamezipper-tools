const { $, t } = GZ;
let sourceImg = null;
let fileName = 'favicon';
const ALL_SIZES = [16, 24, 32, 48, 64, 128, 256];

$('#drop').addEventListener('click', () => $('#file').click());
$('#drop').addEventListener('dragover', e => { e.preventDefault(); $('#drop').classList.add('drag'); });
$('#drop').addEventListener('dragleave', () => $('#drop').classList.remove('drag'));
$('#drop').addEventListener('drop', e => {
  e.preventDefault();
  $('#drop').classList.remove('drag');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
$('#file').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  fileName = file.name.replace(/\.[^.]+$/, '');
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    sourceImg = img;
    $('#drop-text').textContent = `${file.name} (${img.naturalWidth}×${img.naturalHeight}) ✓`;
    renderPreviews();
  };
  img.onerror = () => { $('#status').innerHTML = `<span style="color:var(--gz-accent)">Cannot load image</span>`; };
  img.src = url;
}

function getSelectedSizes() {
  return ALL_SIZES.filter(s => $('#size-' + s).checked);
}

function renderSizes() {
  $('#sizes').innerHTML = ALL_SIZES.map((s, i) => {
    const checked = [16, 32, 48].includes(s) ? 'checked' : '';
    return `<label class="size-chip ${checked ? 'active' : ''}" data-size="${s}">
      <input type="checkbox" id="size-${s}" ${checked} onchange="toggleChip(${s})">${s}×${s}
    </label>`;
  }).join('');
}

function toggleChip(size) {
  const chip = document.querySelector(`.size-chip[data-size="${size}"]`);
  chip.classList.toggle('active', $('#size-' + size).checked);
  if (sourceImg) renderPreviews();
}

function renderPreviews() {
  const sizes = getSelectedSizes();
  if (!sourceImg || sizes.length === 0) { $('#previews').innerHTML = ''; return; }
  $('#previews').innerHTML = sizes.map(s => {
    return `<div class="pv"><img src="${sourceImg.src}" style="width:${s}px;height:${s}px"><div class="lbl">${s}×${s}</div></div>`;
  }).join('');
}

// Build ICO file from PNG-encoded image data at multiple sizes
function buildIco(pngBlobs) {
  // pngBlobs: array of {size, blob}
  const count = pngBlobs.length;
  const headerSize = 6;
  const dirEntrySize = 16;
  const dirSize = count * dirEntrySize;
  let offset = headerSize + dirSize;

  // Compute total size and gather raw data
  const entries = [];
  let totalDataSize = 0;
  for (const item of pngBlobs) {
    const data = new Uint8Array(item.blob.byteLength);
    data.set(new Uint8Array(item.blob));
    entries.push({ size: item.size, data, byteLength: item.blob.byteLength, offset });
    offset += item.byteLength;
    totalDataSize += item.byteLength;
  }

  const totalSize = headerSize + dirSize + totalDataSize;
  const buf = new ArrayBuffer(totalSize);
  const view = new DataView(buf);
  const u8 = new Uint8Array(buf);

  // ICONDIR header
  view.setUint16(0, 0, true);   // reserved
  view.setUint16(2, 1, true);   // type: 1 = icon
  view.setUint16(4, count, true);

  // ICONDIRENTRY for each
  let dirOffset = 6;
  for (const e of entries) {
    const s = e.size;
    u8[dirOffset] = s >= 256 ? 0 : s;       // width (0 = 256)
    u8[dirOffset + 1] = s >= 256 ? 0 : s;   // height
    u8[dirOffset + 2] = 0;                   // color palette
    u8[dirOffset + 3] = 0;                   // reserved
    view.setUint16(dirOffset + 4, 1, true);  // color planes
    view.setUint16(dirOffset + 6, 32, true); // bits per pixel
    view.setUint32(dirOffset + 8, e.byteLength, true); // size of image data
    view.setUint32(dirOffset + 12, e.offset, true);    // offset
    dirOffset += 16;
  }

  // Image data
  let dataOffset = headerSize + dirSize;
  for (const e of entries) {
    u8.set(e.data, dataOffset);
    dataOffset += e.byteLength;
  }

  return new Blob([buf], { type: 'image/x-icon' });
}

async function resizeToPng(img, size) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  // Fit (contain) the image into the square
  const ratio = Math.min(size / img.naturalWidth, size / img.naturalHeight);
  const w = Math.round(img.naturalWidth * ratio);
  const h = Math.round(img.naturalHeight * ratio);
  const x = Math.floor((size - w) / 2);
  const y = Math.floor((size - h) / 2);
  ctx.clearRect(0, 0, size, size);
  ctx.drawImage(img, x, y, w, h);
  return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
}

async function download() {
  if (!sourceImg) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noImage')}</span>`; return; }
  const sizes = getSelectedSizes();
  if (sizes.length === 0) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noSize')}</span>`; return; }
  $('#status').innerHTML = `<span style="color:var(--text2)">…</span>`;
  try {
    const pngBlobs = [];
    for (const s of sizes) {
      const blob = await resizeToPng(sourceImg, s);
      pngBlobs.push({ size: s, blob });
    }
    const icoBlob = buildIco(pngBlobs);
    const url = URL.createObjectURL(icoBlob);
    const a = document.createElement('a');
    a.href = url; a.download = fileName + '.ico';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 2000);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done')} (${(icoBlob.size / 1024).toFixed(1)} KB, ${pngBlobs.length} sizes)</span>`;
  } catch (err) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error: ${err.message}</span>`;
  }
}

function reset() {
  sourceImg = null;
  $('#file').value = '';
  $('#previews').innerHTML = '';
  $('#status').innerHTML = '';
  $('#drop-text').textContent = t('dropText');
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="download()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="reset()">${t('clear')}</button>`;

renderSizes();
$('#drop-text').textContent = t('dropText');
