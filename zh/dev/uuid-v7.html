<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is UUID v7?","acceptedAnswer":{"@type":"Answer","text":"UUID v7 is a time-ordered UUID defined in RFC 9562. It uses a 48-bit Unix timestamp (milliseconds) in the most significant bits, followed by random data. This makes UUIDs sortable by creation time, which improves database index performance compared to UUID v4."}},{"@type":"Question","name":"How is UUID v7 different from UUID v4?","acceptedAnswer":{"@type":"Answer","text":"UUID v4 is entirely random and not sortable. UUID v7 starts with a millisecond-precision timestamp, so newer UUIDs sort after older ones. This makes UUID v7 ideal for database primary keys where insertion order matters."}},{"@type":"Question","name":"What is the format of UUID v7?","acceptedAnswer":{"@type":"Answer","text":"A UUID v7 is 128 bits: 48 bits for the Unix timestamp in milliseconds, 4 bits for the version (0111 = 7), 2 bits for the variant (10), and 74 bits of randomness. Example: 01912c8a-7c3b-7d2e-8b4f-1a2b3c4d5e6f."}},{"@type":"Question","name":"Are UUID v7 IDs unique?","acceptedAnswer":{"@type":"Answer","text":"UUID v7 combines timestamp with 74 bits of randomness. The probability of collision is astronomically low — the same as UUID v4 within the same millisecond, and essentially zero across different milliseconds."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'UUID v7 Generator',
    toolDesc: 'Generate time-ordered UUID v7 identifiers (RFC 9562). Batch create, customize format, and export. Sortable by creation time.',
    lblCount: 'Number of UUIDs',
    lblFormat: 'Format',
    lblPrefix: 'Prefix (optional)',
    step1: 'Set the number of UUIDs to generate',
    step2: 'Choose the output format (lowercase, uppercase, no dashes, braces)',
    step3: 'Optionally add a prefix to each UUID',
    step4: 'Click any UUID to copy it, or export all at once',
    generated: 'Generated',
    exportJSON: 'Export JSON',
    exportCSV: 'Export CSV',
    timestamp: 'Timestamp',
  },
  zh: {
    toolTitle: 'UUID v7 生成器',
    toolDesc: '生成按时间排序的 UUID v7 标识符（RFC 9562）。批量生成、自定义格式和导出。按创建时间可排序。',
    lblCount: '生成数量',
    lblFormat: '格式',
    lblPrefix: '前缀（可选）',
    step1: '设置要生成的 UUID 数量',
    step2: '选择输出格式（小写、大写、无连字符、花括号）',
    step3: '可选地为每个 UUID 添加前缀',
    step4: '点击任意 UUID 即可复制，或一键导出全部',
    generated: '已生成',
    exportJSON: '导出 JSON',
    exportCSV: '导出 CSV',
    timestamp: '时间戳',
  }
});

const { $, copyText, t } = GZ;
let uuids = [];

function generateUUIDv7() {
  const now = Date.now();
  const ts = BigInt(now);
  const rand = new Uint8Array(10);
  crypto.getRandomValues(rand);
  const b = new Uint8Array(16);
  const dv = new DataView(b.buffer);
  dv.setBigUint64(0, (ts << 16n) | (BigInt(rand[0] & 0x0f) << 8n | BigInt(rand[1])) & 0xfffn, false);
  b[6] = (b[6] & 0x0f) | 0x70;
  b[8] = (b[8] & 0x3f) | 0x80;
  for (let i = 2; i < 10; i++) b[6 + i] = rand[i];
  const hex = Array.from(b).map(x => x.toString(16).padStart(2, '0')).join('');
  return {
    uuid: `${hex.slice(0,8)}-${hex.slice(8,12)}-${hex.slice(12,16)}-${hex.slice(16,20)}-${hex.slice(20,32)}`,
    ts: now
  };
}

function formatUUID(uuid) {
  const fmt = $('#format').value;
  const prefix = $('#prefix').value;
  let u = uuid;
  if (fmt === 'uppercase') u = u.toUpperCase();
  else if (fmt === 'no-dash') u = u.replace(/-/g, '');
  else if (fmt === 'braces') u = '{' + u + '}';
  return prefix + u;
}

function generate() {
  const count = Math.min(Math.max(parseInt($('#count').value) || 1, 1), 1000);
  uuids = [];
  for (let i = 0; i < count; i++) uuids.push(generateUUIDv7());
  render();
}

function render() {
  const list = $('#uuidList');
  list.innerHTML = uuids.map((u, i) => {
    const formatted = formatUUID(u.uuid);
    const date = new Date(u.ts);
    return `<div onclick="copyText('${formatted}')"><span class="idx">${i+1}.</span> ${formatted} <span class="ts">${date.toLocaleTimeString()}</span></div>`;
  }).join('');
  $('#stats').innerHTML = `
    <div class="card"><div class="lbl">${t('generated')}</div><div class="val">${uuids.length}</div></div>
    <div class="card"><div class="lbl">${t('timestamp')}</div><div class="val">${uuids[0]?.ts || '—'}</div></div>
  `;
}

function exportJSON() {
  const data = uuids.map(u => ({ uuid: formatUUID(u.uuid), timestamp: u.ts, date: new Date(u.ts).toISOString() }));
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'uuid-v7.json'; a.click();
}

function exportCSV() {
  const header = 'uuid,timestamp,date\n';
  const rows = uuids.map(u => `${formatUUID(u.uuid)},${u.ts},${new Date(u.ts).toISOString()}`).join('\n');
  const blob = new Blob([header + rows], { type: 'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'uuid-v7.csv'; a.click();
}

$('#count').addEventListener('change', generate);
$('#format').addEventListener('change', render);
$('#prefix').addEventListener('input', render);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')||'Generate'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(uuids.map(u=>formatUUID(u.uuid)).join('\\n'))">${t('copyAll')||'Copy All'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="exportJSON()">${t('exportJSON')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="exportCSV()">${t('exportCSV')}</button>`;

generate();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🆔', href:'/dev/uuid.html', name:'UUID v1/v4'},
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'#️⃣', href:'/dev/hash.html', name:'Hash Generator'},
    {icon:'🔐', href:'/dev/base64.html', name:'Base64'},
  ]
});
</script>
