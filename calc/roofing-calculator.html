<style>
.roof-form{display:grid;gap:14px;max-width:620px}
.roof-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.roof-form label{display:flex;flex-direction:column;gap:4px;font-size:.85em;color:var(--text2);font-weight:600}
.roof-form input,.roof-form select{padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:1em;box-sizing:border-box}
.roof-form input:focus{outline:none;border-color:var(--accent)}
.roof-results{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:20px}
.roof-card{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.roof-card .value{font-size:1.6rem;font-weight:800;color:var(--accent)}
.roof-card .label{font-size:.75em;color:var(--text2);margin-top:4px}
.roof-card.primary{background:var(--accent);border-color:var(--accent)}
.roof-card.primary .value,.roof-card.primary .label{color:#000}
.roof-section{background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:10px}
.roof-section h3{margin:0 0 8px;font-size:1em}
.roof-tabs{display:flex;gap:6px;margin-bottom:12px}
.roof-tabs button{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--glass);color:var(--text);cursor:pointer;font-size:.9em;transition:all .2s}
.roof-tabs button.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
.roof-info{background:var(--glass);border-left:3px solid var(--accent);padding:10px 14px;border-radius:6px;font-size:.85em;color:var(--text2);margin-top:8px}
@media(max-width:600px){.roof-row{grid-template-columns:1fr}}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Roofing Calculator","description":"Calculate roofing squares, shingle bundles, and total cost. Enter roof area or building dimensions with pitch for accurate estimates.","url":"https://tools.gamezipper.com/calc/roofing-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a roofing square?", "acceptedAnswer": {"@type": "Answer", "text": "A roofing square is a unit of measurement equal to 100 square feet (about 9.3 m²) of roof surface. Roofers and material suppliers price and sell by the square. Shingles typically come in bundles that cover 1/3 of a square, so 3 bundles = 1 square."}}, {"@type": "Question", "name": "How does roof pitch affect material needs?", "acceptedAnswer": {"@type": "Answer", "text": "Steeper roofs have more actual surface area than their footprint. The pitch multiplier (e.g., 1.12 for 6:12 pitch) is used to convert footprint area to roof area. A 6:12 pitch roof has 12% more area than its flat projection."}}, {"@type": "Question", "name": "How much waste should I add for roofing?", "acceptedAnswer": {"@type": "Answer", "text": "Add 10-15% for simple gable roofs, 15-20% for hip roofs with many valleys, and 20% or more for complex cut-up roofs. Starter strip and ridge cap shingles add to material needs. Always round up to the nearest bundle."}}, {"@type": "Question", "name": "What is a bundle of shingles?", "acceptedAnswer": {"@type": "Answer", "text": "A bundle of architectural or 3-tab shingles covers about 33.3 square feet (1/3 of a square). Most shingle bundles contain 21-29 shingles depending on type. Three bundles typically cover one roofing square, but high-definition or luxury shingles may have different coverage rates."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="roof-tabs" id="tabs">
      <button data-mode="area" class="active" id="tab-area">By Roof Area</button>
      <button data-mode="footprint" id="tab-foot">By Building Footprint</button>
    </div>
    <div class="roof-form">
      <div id="mode-area" class="roof-section">
        <h3 id="lbl-roofArea">Roof Area</h3>
        <div class="roof-row">
          <label><span id="lbl-rA"></span><input type="number" id="roofArea" min="0" step="10" value="2000" oninput="calc()"></label>
          <label><span id="lbl-pitchSel">Pitch</span>
            <select id="pitchSel" onchange="calc()">
              <option value="1.00">Flat (0:12)</option>
              <option value="1.03">Low (3:12)</option>
              <option value="1.08">6:12</option>
              <option value="1.12" selected>Standard (6:12 / 8:12)</option>
              <option value="1.20">Steep (9:12)</option>
              <option value="1.30">Very Steep (12:12)</option>
              <option value="1.42">Extreme (16:12)</option>
            </select>
          </label>
        </div>
      </div>
      <div id="mode-foot" class="roof-section" style="display:none">
        <h3 id="lbl-foot">Building Footprint</h3>
        <div class="roof-row">
          <label><span id="lbl-bL"></span><input type="number" id="buildL" min="0" step="1" value="40" oninput="calc()"></label>
          <label><span id="lbl-bW"></span><input type="number" id="buildW" min="0" step="1" value="25" oninput="calc()"></label>
        </div>
        <div class="roof-info" id="footInfo"></div>
      </div>
      <div class="roof-section">
        <h3 id="lbl-pricing">Pricing & Waste</h3>
        <div class="roof-row">
          <label><span id="lbl-waste"></span><input type="number" id="waste" min="0" max="50" step="1" value="10" oninput="calc()"></label>
          <label><span id="lbl-cost"></span><input type="number" id="cost" min="0" step="1" value="100" oninput="calc()"></label>
        </div>
        <div class="roof-info" id="coverageInfo"></div>
      </div>
    </div>
    <div class="roof-results" id="results"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Roofing Calculator',
    toolDesc: 'Estimate roofing squares, shingle bundles, and total cost. Enter the roof area or building footprint with pitch for instant material calculations.',
    lblRoofArea: 'Roof Area (ft²)',
    lblPitch: 'Roof Pitch',
    lblFoot: 'Building Footprint',
    lblBL: 'Building Length (ft)',
    lblBW: 'Building Width (ft)',
    lblPitchSel: 'Pitch Multiplier',
    lblPricing: 'Pricing & Waste',
    lblWaste: 'Waste % (cuts & overlaps)',
    lblCost: 'Cost per Square ($)',
    squaresNeeded: 'Squares Needed',
    bundles: 'Bundles',
    totalCost: 'Total Cost',
    actualArea: 'Actual Roof Area',
    withWaste: 'with waste',
    coverage: 'Coverage: 1 square = 100 ft² = 3 bundles of shingles',
    step1: 'Choose calculation mode — by roof area or building footprint',
    step2: 'Enter the area or dimensions, and select the roof pitch',
    step3: 'Adjust the waste percentage (10-20% is typical)',
    step4: 'Enter cost per square to see total material estimate',
  },
  zh: {
    toolTitle: '屋顶材料计算器',
    toolDesc: '估算屋面材料用量、瓦片数量和总费用。输入屋顶面积或建筑尺寸与坡度 — 即时获得材料清单和报价。',
    lblRoofArea: '屋顶面积 (ft²)',
    lblPitch: '屋顶坡度',
    lblFoot: '建筑占地',
    lblBL: '建筑长度 (ft)',
    lblBW: '建筑宽度 (ft)',
    lblPitchSel: '坡度系数',
    lblPricing: '费用与损耗',
    lblWaste: '损耗 %',
    lblCost: '每 Square 费用 ($)',
    squaresNeeded: '所需 Squares',
    bundles: '瓦片捆数',
    totalCost: '总费用',
    actualArea: '实际屋顶面积',
    withWaste: '含损耗',
    coverage: '1 square = 100 ft² = 3 捆瓦片',
    step1: '选择计算模式(按屋顶面积或建筑占地)',
    step2: '输入面积或尺寸,选择屋顶坡度',
    step3: '调整损耗率(10-20% 为常见值)',
    step4: '输入每 square 费用查看总报价',
  }
});

const { $, t } = GZ;
let mode = 'area';

function pitchForFootprint() {
  // Default to standard 6:12 if not changed in this mode
  return parseFloat($('#pitchSel').value) || 1.12;
}

function calc() {
  let actualArea;
  if (mode === 'area') {
    actualArea = parseFloat($('#roofArea').value) || 0;
  } else {
    const L = parseFloat($('#buildL').value) || 0;
    const W = parseFloat($('#buildW').value) || 0;
    const pitch = pitchForFootprint();
    actualArea = L * W * pitch;
    $('#roofArea').value = Math.round(actualArea);
  }
  const waste = parseFloat($('#waste').value) || 0;
  const cost = parseFloat($('#cost').value) || 0;
  const totalArea = actualArea * (1 + waste/100);
  const squares = totalArea / 100;
  const bundles = Math.ceil(squares * 3);
  const totalCost = squares * cost;

  $('#results').innerHTML = `
    <div class="roof-card primary"><div class="value">${squares.toFixed(1)}</div><div class="label">${t('squaresNeeded')} (${t('withWaste')})</div></div>
    <div class="roof-card"><div class="value">${bundles}</div><div class="label">${t('bundles')}</div></div>
    <div class="roof-card"><div class="value">${actualArea.toFixed(0)} ft²</div><div class="label">${t('actualArea')}</div></div>
    <div class="roof-card"><div class="value">$${totalCost.toFixed(0)}</div><div class="label">${t('totalCost')}</div></div>`;
  if (mode === 'footprint') {
    const L = parseFloat($('#buildL').value) || 0;
    const W = parseFloat($('#buildW').value) || 0;
    const pitch = pitchForFootprint();
    $('#footInfo').textContent = `${L}×${W} ft footprint × ${pitch} pitch = ${actualArea.toFixed(0)} ft² roof area`;
  }
}

function switchMode(m, btn) {
  mode = m;
  document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  $('#mode-area').style.display = m === 'area' ? '' : 'none';
  $('#mode-foot').style.display = m === 'footprint' ? '' : 'none';
  calc();
}

document.querySelectorAll('#tabs button').forEach(btn => {
  btn.addEventListener('click', () => switchMode(btn.dataset.mode, btn));
});

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#waste').value=10;calc()">10% Waste</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#waste').value=15;calc()">15% Waste</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#waste').value=20;calc()">20% Waste</button>`;

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧱', href:'/calc/concrete.html', name:'Concrete Calculator'},
    {icon:'📐', href:'/calc/square-footage.html', name:'Square Footage'},
    {icon:'🎨', href:'/calc/paint-calculator.html', name:'Paint Calculator'},
    {icon:'🏠', href:'/calc/area-calculator.html', name:'Area Calculator'},
  ]
});
</script>
<script>new Image().src="https://site-analytics.gamezipper.com/hit?s=tools.gamezipper.com&p="+encodeURIComponent(location.pathname);</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
