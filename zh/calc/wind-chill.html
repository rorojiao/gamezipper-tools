<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is wind chill?", "acceptedAnswer": {"@type": "Answer", "text": "Wind chill is the perceived decrease in air temperature felt by the body on exposed skin due to the flow of air. Strong winds remove heat from the body faster than calm air, making it feel colder than the actual air temperature."}}, {"@type": "Question", "name": "What formula does this calculator use?", "acceptedAnswer": {"@type": "Answer", "text": "This tool uses the official 2001 NWS (National Weather Service) wind chill index formula: WC = 35.74 + 0.6215T - 35.75(V^0.16) + 0.4275T(V^0.16), where T is air temperature in °F and V is wind speed in mph."}}, {"@type": "Question", "name": "When is the wind chill formula valid?", "acceptedAnswer": {"@type": "Answer", "text": "The NWS formula is valid for air temperatures at or below 50°F (10°C) and wind speeds above 3 mph (4.8 km/h). Outside this range, the calculator displays a notice that wind chill is not officially defined."}}, {"@type": "Question", "name": "How does wind chill affect frostbite risk?", "acceptedAnswer": {"@type": "Answer", "text": "Frostbite can occur in 30 minutes or less when wind chill is below -19°F (-28°C). At -40°F (-40°C) frostbite can happen in under 10 minutes. The calculator shows frostbite warning levels in the result."}}]}</script>

<body>
<div class="gz-container">

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Wind Chill Calculator',
    toolDesc: 'Calculate the real-feel temperature using the official NWS wind chill formula — works in °F/mph or °C/km/h.',
    lblUnit: 'Units',
    lblTemp: 'Air Temperature',
    lblWind: 'Wind Speed',
    lblFeels: 'Feels like',
    lblDiff: 'Temperature drop',
    lblRisk: 'Frostbite risk',
    lblFormula: 'About the formula',
    lblRef: 'Frostbite risk reference',
    thWc: 'Wind chill',
    thTime: 'Frostbite time',
    thRisk: 'Risk level',
    btnExample: 'Example: 20°F, 15 mph',
    btnClear: 'Clear',
    step1: 'Choose your units (°F/mph or °C/km/h)',
    step2: 'Enter the air temperature and wind speed',
    step3: 'Read the real-feel temperature and frostbite risk instantly',
    step4: 'Use the reference table to plan outdoor activities safely',
  },
  zh: {
    toolTitle: '风寒指数计算器',
    toolDesc: '使用美国国家气象局 (NWS) 官方风寒公式计算体感温度 — 支持 °F/mph 或 °C/km/h。',
    lblUnit: '单位',
    lblTemp: '空气温度',
    lblWind: '风速',
    lblFeels: '体感温度',
    lblDiff: '温度下降',
    lblRisk: '冻伤风险',
    lblFormula: '关于公式',
    lblRef: '冻伤风险参考',
    thWc: '风寒指数',
    thTime: '冻伤时间',
    thRisk: '风险等级',
    btnExample: '示例：20°F，15 mph',
    btnClear: '清空',
    step1: '选择单位（°F/mph 或 °C/km/h）',
    step2: '输入空气温度和风速',
    step3: '即时读取体感温度和冻伤风险',
    step4: '参考下表安全规划户外活动',
  }
});

const { $, t } = GZ;

// Reference table data
const FROST = [
  { f: -40, time: 'under 10 min', risk: 'Extreme' },
  { f: -28, time: '~10 min', risk: 'High' },
  { f: -19, time: '~30 min', risk: 'High' },
  { f: -10, time: '~60 min', risk: 'Moderate' },
  { f: 0,   time: 'low risk', risk: 'Low' },
  { f: 10,  time: 'very low', risk: 'Minimal' },
];

function buildRefTable() {
  const en = GZI18n.getLang() === 'en';
  const body = $('#ref-body');
  body.innerHTML = FROST.map(r => `<tr><td>${r.f}°F / ${Math.round((r.f-32)*5/9)}°C</td><td>${en?r.time:({under:'少于10分钟','~10':'约10分钟','~30':'约30分钟','~60':'约60分钟','low':'风险低','very':'极低'})[Object.keys({under:1,'~10':1,'~30':1,'~60':1,low:1,very:1}).find(k=>r.time.includes(k.replace('~','~')))||'low']}</td><td>${en?r.risk:({Extreme:'极高',High:'高',Moderate:'中',Low:'低',Minimal:'极低'})[r.risk]||r.risk}</td></tr>`).join('');
}
buildRefTable();

function calc() {
  const unit = $('#unit').value;
  const T = parseFloat($('#temp').value);
  const V = parseFloat($('#wind').value);
  if (isNaN(T) || isNaN(V)) { $('#result').style.display = 'none'; return; }

  let T_F, V_mph, wc_F;
  if (unit === 'F') { T_F = T; V_mph = V; }
  else { T_F = T * 9/5 + 32; V_mph = V * 0.621371; }

  const T_C = (T_F - 32) * 5/9;
  const warn = $('#warn');
  if (T_F > 50 || V_mph < 3) {
    warn.classList.add('show');
    warn.textContent = GZI18n.getLang() === 'en'
      ? 'Wind chill formula is only officially defined for T ≤ 50°F (10°C) and V ≥ 3 mph (4.8 km/h).'
      : '风寒公式仅在 T ≤ 50°F (10°C) 且 V ≥ 3 mph (4.8 km/h) 条件下官方定义有效。';
    $('#result').style.display = 'none';
    return;
  } else {
    warn.classList.remove('show');
  }

  // NWS 2001 formula
  const v16 = Math.pow(V_mph, 0.16);
  wc_F = 35.74 + 0.6215*T_F - 35.75*v16 + 0.4275*T_F*v16;
  const wc_C = (wc_F - 32) * 5/9;
  const diff = T_F - wc_F;

  // Frostbite risk
  let risk = 'Minimal', riskZh = '极低';
  if (wc_F <= -40) { risk = 'Extreme'; riskZh = '极高 (<10分钟)'; }
  else if (wc_F <= -19) { risk = 'High (in 30 min)'; riskZh = '高 (30分钟内)'; }
  else if (wc_F <= 0) { risk = 'Moderate'; riskZh = '中'; }
  else if (wc_F <= 10) { risk = 'Low'; riskZh = '低'; }

  const en = GZI18n.getLang() === 'en';
  const wcShow = en ? `${wc_F.toFixed(1)}°F` : `${wc_C.toFixed(1)}°C`;
  const diffShow = en ? `${diff.toFixed(1)}°F` : `${(diff*5/9).toFixed(1)}°C`;
  $('#wc-value').textContent = wcShow;
  $('#wc-diff').textContent = diffShow;
  $('#wc-risk').textContent = en ? risk : riskZh;
  $('#result').style.display = 'grid';
}

$('#unit').addEventListener('change', calc);
$('#temp').addEventListener('input', calc);
$('#wind').addEventListener('input', calc);

function loadExample() {
  $('#unit').value = 'F';
  $('#temp').value = 20;
  $('#wind').value = 15;
  calc();
}
function doClear() { $('#temp').value=''; $('#wind').value=''; $('#result').style.display='none'; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('btnExample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('btnClear')}</button>`;

$('#formula-text').textContent = 'WC = 35.74 + 0.6215·T − 35.75·V^0.16 + 0.4275·T·V^0.16  (T in °F, V in mph)';

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌡️',href:'/calc/tdee-calculator.html',name:'TDEE Calc'},
    {icon:'⛽',href:'/calc/fuel-cost-calculator.html',name:'Fuel Cost'},
    {icon:'📏',href:'/calc/dpi-calculator.html',name:'DPI Calculator'},
    {icon:'🏷️',href:'/calc/unit-price.html',name:'Unit Price'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
