const { $, copyText, t } = GZ;

function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

const KW = new Set(['abstract','assert','boolean','break','byte','case','catch','char','class','const','continue','default','do','double','else','enum','extends','final','finally','float','for','goto','if','implements','import','instanceof','int','interface','long','native','new','package','private','protected','public','return','short','static','strictfp','super','switch','synchronized','this','throw','throws','transient','try','void','volatile','while','true','false','null']);

function safeName(key){
  let n = String(key).replace(/[^a-zA-Z0-9_$]/g,'_');
  if(/^[0-9]/.test(n)) n = '_' + n;
  if(KW.has(n)) n = n + '_';
  return n;
}
function cap(s){ return s.charAt(0).toUpperCase() + s.slice(1); }
function lower(s){ return s.charAt(0).toLowerCase() + s.slice(1); }

// Infer the "shape" of a value. Returns a type descriptor.
function inferType(value, name, numMode){
  if(value === null) return {kind:'object', cls:'Object', nullable:true};
  if(typeof value === 'boolean') return {kind:'bool'};
  if(typeof value === 'number'){
    if(numMode === 'bigdecimal') return {kind:'bigdecimal'};
    if(numMode === 'object'){
      return Number.isInteger(value) ? (Math.abs(value) > 2147483647 ? {kind:'longobj'} : {kind:'intobj'}) : {kind:'doubleobj'};
    }
    if(Number.isInteger(value)) return Math.abs(value) > 2147483647 ? {kind:'long'} : {kind:'int'};
    return {kind:'double'};
  }
  if(typeof value === 'string') return {kind:'string'};
  if(Array.isArray(value)){
    // infer element type from non-null elements; merge object shapes
    const elems = value.filter(v => v !== null);
    if(elems.length === 0) return {kind:'list', elem:{kind:'object', cls:'Object'}};
    const firstObj = elems.find(e => typeof e === 'object' && !Array.isArray(e));
    if(firstObj){
      return {kind:'list', elem:{kind:'class', cls:cap(name)}};
    }
    const firstNonObj = elems.find(e => typeof e !== 'object');
    if(firstNonObj !== undefined){
      const et = inferType(firstNonObj, name, numMode);
      return {kind:'list', elem:et};
    }
    return {kind:'list', elem:{kind:'object', cls:'Object'}};
  }
  // plain object
  return {kind:'class', cls:cap(name)};
}

// Merge an array of homogeneous object values into one representative object (first wins, fill gaps from later)
function mergeObjects(arr){
  const out = {};
  arr.forEach(v => { if(v && typeof v==='object' && !Array.isArray(v)){ for(const k in v) if(!(k in out)) out[k]=v[k]; } });
  return out;
}

let _classes = [];
function genClass(obj, className, numMode, anno, useGetters, useInner, indentUnit, level){
  const fields = [];
  const innerClasses = [];
  const ind = indentUnit.repeat(level);
  const ind1 = indentUnit.repeat(level+1);

  const keys = Object.keys(obj);
  keys.forEach(key => {
    let value = obj[key];
    const fname = safeName(key);
    const td = inferType(value, fname, numMode);
    // list of objects -> generate inner class + merge shapes
    if(td.kind === 'list' && td.elem.kind === 'class'){
      const arr = value.filter(v => v && typeof v==='object' && !Array.isArray(v));
      const merged = mergeObjects(arr);
      const childCls = td.elem.cls;
      genClass(merged, childCls, numMode, anno, useGetters, useInner, indentUnit, level+1);
      fields.push({name:fname, type:'List<'+childCls+'>', rawType:childCls, jsonKey:key, isList:true});
    } else if(td.kind === 'list'){
      const javaElem = javaType(td.elem);
      fields.push({name:fname, type:'List<'+javaElem+'>', rawType:javaElem, jsonKey:key, isList:true});
    } else if(td.kind === 'class'){
      const childCls = td.cls;
      genClass(value, childCls, numMode, anno, useGetters, useInner, indentUnit, level+1);
      fields.push({name:fname, type:childCls, rawType:childCls, jsonKey:key, isList:false});
    } else {
      fields.push({name:fname, type:javaType(td), rawType:javaType(td), jsonKey:key, isList:false});
    }
  });

  // build class text lines (we store and later assemble)
  _classes.push({className, fields, level});
}

function javaType(td){
  switch(td.kind){
    case 'bool': return 'boolean';
    case 'int': return 'int';
    case 'long': return 'long';
    case 'double': return 'double';
    case 'intobj': return 'Integer';
    case 'longobj': return 'Long';
    case 'doubleobj': return 'Double';
    case 'bigdecimal': return 'BigDecimal';
    case 'string': return 'String';
    case 'object': return 'Object';
    default: return 'Object';
  }
}

function annotationLine(jsonKey, fieldName, anno, ind){
  if(anno === 'none') return null;
  if(jsonKey === fieldName) return null; // no annotation needed when identical
  if(anno === 'gson') return `${ind}<span class="tok-com">@SerializedName("${escapeHtml(jsonKey)}")</span>`;
  if(anno === 'jackson') return `${ind}<span class="tok-com">@JsonProperty("${escapeHtml(jsonKey)}")</span>`;
  return null;
}

function build(){
  _classes = [];
  const inp = $('#input').value.trim();
  if(!inp){ $('#output').innerHTML=''; $('#status').innerHTML=''; return; }
  let obj;
  try { obj = JSON.parse(inp); }
  catch(e){ $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('jsonInvalid')}: ${escapeHtml(e.message)}</span>`; $('#output').innerHTML = `<span style="color:var(--gz-accent)">${escapeHtml(e.message)}</span>`; return; }

  // If root is an array, wrap as { items: [...] }
  let rootObj, rootName;
  const rootInput = ($('#rootname').value.trim() || 'Root');
  rootName = cap(safeName(rootInput));
  if(Array.isArray(obj)){
    rootObj = { items: obj };
    rootName = cap(safeName(rootInput));
    // generate item class then root
    const anno = $('#annotation').value, numMode = $('#numbers').value;
    const useGetters = $('#getters').checked, useInner = $('#inner').checked;
    const indentUnit = '    ';
    genClass(rootObj, rootName, numMode, anno, useGetters, useInner, indentUnit, 0);
  } else {
    const anno = $('#annotation').value, numMode = $('#numbers').value;
    const useGetters = $('#getters').checked, useInner = $('#inner').checked;
    const indentUnit = '    ';
    genClass(obj, rootName, numMode, anno, useGetters, useInner, indentUnit, 0);
  }

  const anno = $('#annotation').value, numMode = $('#numbers').value, useGetters = $('#getters').checked, useInner = $('#inner').checked;
  const indentUnit = '    ';

  // assemble
  const needsBigDecimal = _classes.some(c => c.fields.some(f => f.rawType === 'BigDecimal'));
  const needsList = _classes.some(c => c.fields.some(f => f.isList));
  let headerImports = '';
  if(needsBigDecimal) headerImports += 'import java.math.BigDecimal;\n';
  if(needsList) headerImports += 'import java.util.List;\n';
  if(anno === 'gson') headerImports += 'import com.google.gson.annotations.SerializedName;\n';
  if(anno === 'jackson') headerImports += 'import com.fasterxml.jackson.annotation.JsonProperty;\n';
  if(headerImports) headerImports += '\n';

  const parts = [];
  for(let i=0;i<_classes.length;i++){
    const c = _classes[i];
    const ind = indentUnit.repeat(c.level);
    const ind1 = indentUnit.repeat(c.level+1);
    const kw = useInner && c.level>0 ? 'public static class ' : 'public class ';
    parts.push(`${ind}<span class="tok-kw">${kw}</span><span class="tok-type">${escapeHtml(c.className)}</span> {`);

    // fields
    c.fields.forEach(f => {
      const al = annotationLine(f.jsonKey, f.name, anno, ind1);
      if(al) parts.push(al);
      const mod = useGetters ? 'private ' : 'public ';
      parts.push(`${ind1}${mod}<span class="tok-type">${escapeHtml(f.type)}</span> <span class="tok-key">${escapeHtml(f.name)}</span>;`);
    });
    if(c.fields.length && useGetters) parts.push('');

    // getters & setters
    if(useGetters){
      c.fields.forEach(f => {
        const T = f.type;
        const FName = cap(f.name);
        parts.push(`${ind1}<span class="tok-kw">public</span> ${T} <span class="tok-key">get${FName}</span>() { <span class="tok-kw">return</span> ${f.name}; }`);
        const setT = T; // primitives ok
        parts.push(`${ind1}<span class="tok-kw">public</span> <span class="tok-kw">void</span> <span class="tok-key">set${FName}</span>(${setT} ${f.name}) { <span class="tok-kw">this</span>.${f.name} = ${f.name}; }`);
      });
    }
    parts.push(`${ind}}`);
    if(i < _classes.length-1) parts.push('');
  }

  $('#output').innerHTML = (headerImports ? `<span class="tok-com">${escapeHtml(headerImports.trim())}</span>\n\n` : '') + parts.join('\n');
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('jsonValid')} · ${_classes.length} class${_classes.length!==1?'es':''}</span>`;
}

function loadExample(){
  $('#input').value = JSON.stringify({
    id: 42,
    name: 'GameZipper',

    members: [
      { id: 10, name: 'Alice', role: 'dev' },
      { id: 11, name: 'Bob', role: 'qa' }
    ]
  }, null, 2);
  build();
}

['input','rootname','annotation','numbers','getters','inner'].forEach(id => {
