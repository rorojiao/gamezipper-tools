// Tokenize a curl command into argv-like tokens
function tokenize(s) {
  const tokens = [];
  let i = 0, cur = '', quote = null;
  while (i < s.length) {
    const c = s[i];
    if (quote) {
      if (c === quote) { quote = null; }
      else if (c === '\\' && i + 1 < s.length) { cur += s[++i]; }
      else cur += c;
    } else {
      if (c === '"' || c === "'") { quote = c; }
      else if (c === '\\' && i + 1 < s.length) { cur += s[++i]; }
      else if (/\s/.test(c)) { if (cur) { tokens.push(cur); cur = ''; } }
      else cur += c;
    }
    i++;
  }
  if (cur) tokens.push(cur);
  return tokens;
}

function parseCurl(input) {
  const raw = input.trim();
  if (!raw) return null;
  // Accept commands with or without leading "curl"
  let tokens = tokenize(raw);
  if (tokens[0] && tokens[0].toLowerCase() === 'curl') tokens = tokens.slice(1);

  const result = { method: 'GET', url: '', headers: {}, data: null, dataType: null, auth: null };
  let i = 0;
  while (i < tokens.length) {
    const tok = tokens[i];
    if (tok === '-X' || tok === '--request') { result.method = (tokens[++i] || 'GET').toUpperCase(); }
    else if (tok === '-H' || tok === '--header') {
      const h = tokens[++i] || '';
      const idx = h.indexOf(':');
      if (idx > 0) {
        const k = h.slice(0, idx).trim();
        const v = h.slice(idx + 1).trim();
        result.headers[k] = v;
      }
    }
    else if (tok === '-d' || tok === '--data' || tok === '--data-raw' || tok === '--data-binary') {
      result.data = tokens[++i] || '';
      result.dataType = 'raw';
      if (result.method === 'GET') result.method = 'POST';
    }
    else if (tok === '-u' || tok === '--user') { result.auth = tokens[++i] || ''; }
    else if (tok === '-A' || tok === '--user-agent') { result.headers['User-Agent'] = tokens[++i] || ''; }
    else if (tok === '-e' || tok === '--referer') { result.headers['Referer'] = tokens[++i] || ''; }
    else if (tok === '-F' || tok === '--form') {
      result.dataType = 'form';
      result.data = result.data ? result.data + '&' + (tokens[++i] || '') : (tokens[++i] || '');
      if (result.method === 'GET') result.method = 'POST';
    }
    else if (tok === '--compressed' || tok === '-k' || tok === '--insecure' || tok === '-s' || tok === '--silent' || tok === '-S' || tok === '--show-error' || tok === '-L' || tok === '--location' || tok === '-i' || tok === '--include' || tok === '-v' || tok === '--verbose') {
      // ignore flags that don't affect the request
    }
    else if (tok.startsWith('-')) {
      // unknown flag — skip next token if it's a value
      if (i + 1 < tokens.length && !tokens[i+1].startsWith('-')) i++;
    }
    else if (!result.url && /^https?:\/\//i.test(tok)) { result.url = tok; }
    else if (!result.url && !tok.startsWith('-')) { result.url = tok; }
    i++;
  }
  return result;
}

function escapeStr(s) { return JSON.stringify(s); }

function detectBodyType(parsed) {
  if (!parsed.data) return null;
  const ct = Object.keys(parsed.headers).find(k => k.toLowerCase() === 'content-type');
  const ctVal = ct ? parsed.headers[ct].toLowerCase() : '';
  if (ctVal.includes('application/json') || parsed.data.trim().startsWith('{') || parsed.data.trim().startsWith('[')) {
    try { JSON.parse(parsed.data); return 'json'; } catch(e) {}
  }
  if (ctVal.includes('application/x-www-form-urlencoded') || /=/.test(parsed.data)) return 'form';
  return 'text';
}

function generate(parsed) {
  const lines = [];
  lines.push('// Generated from curl — async/await fetch');
  lines.push('async function makeRequest() {');
  const opts = [];
  if (parsed.method !== 'GET') opts.push(`  method: ${escapeStr(parsed.method)}`);

  // Build headers object
  const headerKeys = Object.keys(parsed.headers);
  const authHeader = parsed.auth ? { 'Authorization': `Basic $\\{btoa(${escapeStr(parsed.auth)})\\}` } : null;
  const allHeaders = Object.assign({}, parsed.headers, authHeader || {});
  const allKeys = Object.keys(allHeaders);
  if (allKeys.length) {
    opts.push('  headers: {');
    allKeys.forEach((k, idx) => {
      const v = allHeaders[k];
      const comma = idx < allKeys.length - 1 ? ',' : '';
      opts.push(`    ${escapeStr(k)}: ${v.includes('${') ? '`' + v + '`' : escapeStr(v)}${comma}`);
    });
    opts.push('  },');
  }

  // Body
  const bt = detectBodyType(parsed);
  if (bt === 'json') {
    try {
      const obj = JSON.parse(parsed.data);
      opts.push(`  body: JSON.stringify(${JSON.stringify(obj, null, 2).split('\n').join('\n  ')}, null, 0),`);
    } catch(e) {
      opts.push(`  body: JSON.stringify(${parsed.data.replace(/'/g, "\\'")}),`);
    }
  } else if (bt === 'form') {
    opts.push(`  body: new URLSearchParams(${escapeStr(parsed.data)}),`);
  } else if (bt === 'text') {
    opts.push(`  body: ${escapeStr(parsed.data)},`);
  }

  // Fetch call
  lines.push(`  const res = await fetch(${escapeStr(parsed.url)}${opts.length ? ', {\n' + opts.join('\n') + '\n}' : ''});`);
  lines.push('  if (!res.ok) throw new Error(`HTTP ${res.status}`);');
  lines.push('  const data = await res.json();');
  lines.push('  return data;');
  lines.push('}');
  lines.push('');
  lines.push('makeRequest().then(console.log).catch(console.error);');
  return lines.join('\n');
}

function highlight(code) {
  return code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(\/\/.*$)/gm, '<span class="js-com">$1</span>')
    .replace(/('[^']*'|"[^"]*"|`[^`]*`)/g, '<span class="js-str">$1</span>')
    .replace(/\b(const|let|var|async|await|function|return|if|else|throw|new|true|false|null|undefined)\b/g, '<span class="js-key">$1</span>')
    .replace(/\b(fetch|console|URLSearchParams|JSON|btoa)\b/g, '<span class="js-fn">$1</span>');
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent=''; $('#status').innerHTML=''; return; }
  try {
    const parsed = parseCurl(inp);
    if (!parsed || !parsed.url) { throw new Error('no URL'); }
    const code = generate(parsed);
    $('#output').innerHTML = highlight(code);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('ok').replace('{h}', Object.keys(parsed.headers).length).replace('{m}', parsed.method)}</span>`;
  } catch(e) {
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${t('errParse')}: ${e.message}</span>`;
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('errParse')}</span>`;
  }
}
