.lic-layout{display:grid;grid-template-columns:260px 1fr;gap:16px}
@media(max-width:820px){.lic-layout{grid-template-columns:1fr}}
.lic-form{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:14px}
.lic-form label{display:block;font-size:.78em;color:var(--text3);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.5px}
.lic-form input,.lic-form select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--glass);color:var(--text);font-size:.9em;box-sizing:border-box}
.lic-list{display:flex;flex-direction:column;gap:4px;margin-top:6px;max-height:none}
.lic-item{display:flex;flex-direction:column;padding:8px 10px;border:1px solid var(--border);border-radius:8px;cursor:pointer;background:var(--glass);transition:all .15s}
.lic-item:hover{border-color:var(--accent)}
.lic-item.active{background:rgba(108,92,231,.15);border-color:var(--accent)}
.lic-item .ln-name{font-weight:700;font-size:.88em;color:var(--text)}
.lic-item .ln-spdx{font-size:.68em;color:var(--text3);margin-top:2px}
.lic-item.active .ln-name{color:var(--accent)}
.lic-out{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;min-height:420px}
.lic-out h3{margin:0 0 8px;font-size:1rem;color:var(--accent);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{display:inline-block;font-size:.65em;background:rgba(0,214,114,.15);color:var(--gz-success,#00d672);padding:2px 8px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.badge.copyleft{background:rgba(233,69,96,.15);color:#e94560}
#output{flex:1;width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:'SF Mono','Monaco',monospace;font-size:.8em;line-height:1.6;resize:vertical;box-sizing:border-box;white-space:pre-wrap;overflow:auto}
.hint{font-size:.75em;color:var(--text3);margin-top:8px;line-height:1.5}
.form-row{display:flex;gap:8px}
.form-row>div{flex:1}
</style>

const ORDER = ['mit','apache','gpl3','agpl3','lgpl3','mpl','bsd3','bsd2','isc','unlicense'];
let current = 'mit';

function currentYear() { return new Date().getFullYear(); }

function fill(tpl) {
  const author = $('#author').value.trim() || (GZI18n.getLang()==='zh' ? '你的名字' : 'Your Name');
  const project = $('#project').value.trim() || 'my-project';
  const year = $('#year').value.trim() || String(currentYear());
  return tpl.replace(/\{\{author\}\}/g, author).replace(/\{\{project\}\}/g, project).replace(/\{\{year\}\}/g, year);
}

function renderList() {
  $('#lic-list').innerHTML = ORDER.map(k => {
    const l = LICENSES[k];
    return `<div class="lic-item${k===current?' active':''}" data-k="${k}">
      <span class="ln-name">${l.name}</span><span class="ln-spdx">${l.spdx}</span></div>`;
  }).join('');
  GZ.$$('#lic-list .lic-item').forEach(el => el.onclick = () => { current = el.dataset.k; render(); });
}

function render() {
  const l = LICENSES[current];
  $('#lic-title').textContent = l.name;
  const badge = $('#lic-badge');
  badge.textContent = t(l.type === 'weak' ? 'permissive' : l.type);
  badge.className = 'badge' + (l.type === 'copyleft' ? ' copyleft' : '');
  $('#output').value = fill(l.text);
  const hintEN = l.type === 'copyleft'
    ? 'Copyleft license. Place the full text in a COPYING file and add the per-file header to every source file. Derivative works must use the same license.'
    : (l.type === 'weak' ? 'Weak copyleft: file-level copyleft. Code in new files can use any license. Place the full text in a LICENSE file.'
    : 'Permissive license — others can use, modify and distribute with few restrictions. Just keep the copyright notice.');
  const hintZH = l.type === 'copyleft'
    ? 'Copyleft 许可证。请将完整文本放入 COPYING 文件，并在每个源文件顶部添加版权头。衍生作品必须使用相同许可证。'
    : (l.type === 'weak' ? '弱 copyleft（文件级）：新文件可采用任意许可证。请将完整文本放入 LICENSE 文件。'
    : '宽松型许可证——他人可在极少限制下使用、修改和分发，只需保留版权声明即可。');
  $('#lic-hint').textContent = GZI18n.getLang()==='zh' ? hintZH : hintEN;
}

['author','project','year'].forEach(id => $('#' + id).addEventListener('input', render));

function doDownload() {
  const l = LICENSES[current];
  const blob = new Blob([$('#output').value], {type: 'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = current === 'unlicense' ? 'UNLICENSE' : 'LICENSE';
  a.click();
  URL.revokeObjectURL(a.href);
}

$('#year').value = currentYear();
$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDownload()">${t('download')} LICENSE</button>
  <button class="gz-btn gz-btn-secondary" onclick="render()">${t('generate')}</button>`;

renderList();
render();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📝', href:'/dev/gitignore-generator.html', name:'.gitignore Generator'},
    {icon:'🔐', href:'/dev/base64.html', name:'Base64'},
    {icon:'📊', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'🔑', href:'/dev/api-key-generator.html', name:'API Key Generator'},
  ]
});
</script>
