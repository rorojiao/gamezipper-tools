<script>
GZI18n.register({
  en: {
    toolTitle: 'CSV to SQL Converter',
    toolDesc: 'Convert CSV data to SQL INSERT statements with automatic type detection. Generate CREATE TABLE and INSERT queries instantly.',
    convert: 'Convert',
    tableName: 'Table name',
    createTable: 'Include CREATE TABLE',
    rowsGenerated: (n) => `${n} rows converted`,
    step1: 'Paste your CSV data (with headers) in the input area',
    step2: 'Set the table name and options',
    step3: 'Click Convert to generate SQL statements',
    step4: 'Copy the SQL and use it in your database',
  },
  zh: {
    toolTitle: 'CSV 转 SQL 工具',
    toolDesc: '将 CSV 数据转换为 SQL INSERT 语句，自动检测数据类型。即时生成 CREATE TABLE 和 INSERT 查询。',
    convert: '转换',
    tableName: '表名',
    createTable: '包含 CREATE TABLE',
    rowsGenerated: (n) => `已转换 ${n} 行`,
    step1: '在输入区粘贴 CSV 数据（含表头）',
    step2: '设置表名和选项',
    step3: '点击「转换」生成 SQL 语句',
    step4: '复制 SQL 并在数据库中使用',
  }
});

const { $, copyText, t } = GZ;

$('#options').innerHTML = `
  <label>${t('tableName')}: <input type="text" id="tbl-name" value="my_table"></label>
  <label><input type="checkbox" id="inc-create" checked> ${t('createTable')}</label>`;

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const result = [];
  for (const line of lines) {
    const row = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (inQuotes) {
        if (ch === '"' && line[i+1] === '"') { current += '"'; i++; }
        else if (ch === '"') inQuotes = false;
        else current += ch;
      } else {
        if (ch === '"') inQuotes = true;
        else if (ch === ',') { row.push(current.trim()); current = ''; }
        else current += ch;
      }
    }
    row.push(current.trim());
    result.push(row);
  }
  return result;
}

function detectType(values) {
  let isInt = true, isNum = true, isBool = true, isDate = true, maxLen = 0;
  for (const v of values) {
    if (v === '' || v === null) continue;
    maxLen = Math.max(maxLen, v.length);
    if (!/^-?\d+$/.test(v)) isInt = false;
    if (!/^-?\d+(\.\d+)?$/.test(v)) isNum = false;
    if (!/^(true|false|0|1)$/i.test(v)) isBool = false;
    if (!/^\d{4}[-/]\d{2}[-/]\d{2}/.test(v)) isDate = false;
  }
  if (isInt) return 'INT';
  if (isNum) return 'DECIMAL(10,2)';
  if (isBool) return 'BOOLEAN';
  if (isDate) return 'DATE';
  return maxLen > 255 ? 'TEXT' : `VARCHAR(${Math.max(maxLen, 50)})`;
}

function escSql(val) {
  if (val === '' || val === null || val === undefined) return 'NULL';
  return "'" + val.replace(/'/g, "''") + "'";
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const table = $('#tbl-name').value.replace(/[^a-zA-Z0-9_]/g, '_') || 'my_table';
    const rows = parseCSV(inp);
    if (rows.length < 2) { $('#status').innerHTML = '<span style="color:var(--gz-accent)">Need at least a header row and one data row</span>'; return; }
    const headers = rows[0];
    const dataRows = rows.slice(1).filter(r => r.length === headers.length && r.some(c => c !== ''));
    const colTypes = headers.map((_, i) => detectType(dataRows.map(r => r[i])));
    let sql = '';

    if ($('#inc-create').checked) {
      sql += `-- CREATE TABLE statement\nCREATE TABLE ${table} (\n`;
      sql += headers.map((h, i) => `  ${h.replace(/[^a-zA-Z0-9_]/g, '_')} ${colTypes[i]}`).join(',\n');
      sql += '\n);\n\n';
    }

    for (const row of dataRows) {
      const cols = headers.map(h => h.replace(/[^a-zA-Z0-9_]/g, '_')).join(', ');
      const vals = row.map((v, i) => {
        if (v === '' || v === null) return 'NULL';
        if (colTypes[i] === 'INT' || colTypes[i].startsWith('DECIMAL')) return v;
        if (colTypes[i] === 'BOOLEAN') return /^(true|1)$/i.test(v) ? 'TRUE' : 'FALSE';
        return escSql(v);
      }).join(', ');
      sql += `INSERT INTO ${table} (${cols}) VALUES (${vals});\n`;
    }

    const highlighted = sql
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/--(.*)/g, '<span class="sql-comment">--$1</span>')
      .replace(/\b(CREATE TABLE|INSERT INTO|VALUES|INT|VARCHAR|TEXT|BOOLEAN|DATE|DECIMAL|TRUE|FALSE|NULL)\b/gi, '<span class="sql-kw">$1</span>')
      .replace(/'([^']*)'/g, '<span class="sql-str">\'$1\'</span>');

    $('#output').innerHTML = highlighted;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('rowsGenerated')(dataRows.length)}</span>`;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error: ${e.message}</span>`;
  }
}

function loadExample() {
  $('#input').value = `id,name,email,age,salary,active\n1,Alice Johnson,alice@example.com,28,75000.50,true\n2,Bob Smith,bob@example.com,35,82000.00,true\n3,Charlie Brown,charlie@example.com,42,91000.75,false\n4,Diana Prince,diana@example.com,30,68000.00,true`;
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',

    {icon:'📊', href:'/convert/csv-viewer.html', name:'CSV Viewer'},
    {icon:'📊', href:'/convert/json-to-csv.html', name:'JSON to CSV'},
    {icon:'🗃️', href:'/dev/sql.html', name:'SQL Formatter'},
  ]
});
</script>
