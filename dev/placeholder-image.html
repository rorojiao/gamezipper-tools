<script>
GZI18n.register({
  en: {
    toolTitle: 'Placeholder Image Generator',
    toolDesc: 'Create free placeholder images with custom dimensions, colors, text and format. Download as PNG or SVG — perfect for mockups, wireframes and prototypes.',
    width: 'Width (px)',
    height: 'Height (px)',
    bgColor: 'Background Color',
    fgColor: 'Text Color',
    customText: 'Custom Text (optional, shows dimensions if empty)',
    generate: 'Generate',
    downloadPNG: 'Download PNG',
    downloadSVG: 'Download SVG',
    step1: 'Enter the image width and height in pixels',
    step2: 'Pick background and text colors',
    step3: 'Optionally enter custom text (defaults to dimensions)',
    step4: 'Click Generate, then download as PNG or SVG'
  },
  zh: {
    toolTitle: '占位图片生成器',
    toolDesc: '创建自定义尺寸、颜色、文字和格式的免费占位图片。可下载 PNG 或 SVG — 非常适合原型设计、线框图和演示。',
    width: '宽度 (px)',
    height: '高度 (px)',
    bgColor: '背景色',
    fgColor: '文字色',
    customText: '自定义文字（可选，留空显示尺寸）',
    generate: '生成',
    downloadPNG: '下载 PNG',
    downloadSVG: '下载 SVG',
    step1: '输入图片的宽度和高度（像素）',
    step2: '选择背景色和文字颜色',
    step3: '可选输入自定义文字（默认显示尺寸）',
    step4: '点击生成，然后下载 PNG 或 SVG'
  }
});
const { $, t } = GZ;
let currentDataUrl = '';
let currentSvg = '';

function gen() {
  const w = Math.max(1, Math.min(4096, parseInt($('#w').value) || 800));
  const h = Math.max(1, Math.min(4096, parseInt($('#h').value) || 600));
  const bg = $('#bg').value;
  const fg = $('#fg').value;
  const txt = ($('#custom-text').value || `${w}×${h}`).trim();
  // Build SVG
  const fontSize = Math.max(12, Math.min(w, h) / 8);
  currentSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><rect width="${w}" height="${h}" fill="${bg}"/><text x="50%" y="50%" font-family="sans-serif" font-size="${fontSize}" fill="${fg}" text-anchor="middle" dominant-baseline="middle" font-weight="bold">${escapeHtml(txt)}</text></svg>`;
  const svgBlob = new Blob([currentSvg], {type:'image/svg+xml'});
  const svgUrl = URL.createObjectURL(svgBlob);
  const img = $('#preview-img');
  img.onload = () => {
    // Render to canvas for PNG
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = fg;
    ctx.font = `bold ${fontSize}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(txt, w/2, h/2);
    currentDataUrl = canvas.toDataURL('image/png');
    img.style.display = 'block';
    img.src = currentDataUrl;
    $('#preview-empty').style.display = 'none';
    $('#dl-row').style.display = 'flex';
    URL.revokeObjectURL(svgUrl);
  };
  img.src = svgUrl;
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function dlPNG(){
  if(!currentDataUrl) return;
  const a = document.createElement('a');
  a.href = currentDataUrl;
  a.download = `placeholder-${$('#w').value}x${$('#h').value}.png`;
  a.click();
}
function dlSVG(){
  if(!currentSvg) return;
  const blob = new Blob([currentSvg], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `placeholder-${$('#w').value}x${$('#h').value}.svg`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="gen()">${t('generate')}</button>`;
$('#dl-row').innerHTML = `<button class="gz-btn" onclick="dlPNG()">${t('downloadPNG')}</button><button class="gz-btn gz-btn-secondary" onclick="dlSVG()">${t('downloadSVG')}</button>`;
$('#dl-row').style.display = 'none';

['w','h','bg','fg','custom-text'].forEach(id => $('#'+id).addEventListener('input', gen));
gen();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [

    {icon:'🖼️', href:'/image/svg-to-png.html', name:'SVG to PNG'},
    {icon:'📐', href:'/image/resizer.html', name:'Image Resizer'},
    {icon:'📏', href:'/calc/image-file-size.html', name:'Image File Size'},
  ]
});
</script>
