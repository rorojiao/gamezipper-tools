<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="ctrl" id="header-controls"></div>
    <div id="messages-area"></div>
    <div class="msg-input-row">
      <select id="msgType"><option value="sent">Sent</option><option value="recv">Received</option></select>
      <textarea id="msgInput" placeholder="Type a message..."></textarea>
      <button class="gz-btn" id="addBtn">Add</button>
    </div>
    <div class="wa-chat" id="chat-preview"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'WhatsApp Chat Generator',
    toolDesc: 'Create realistic WhatsApp chat mockups — customize names, messages, time and download as PNG image.',
    contactName: 'Contact Name',
    status: 'Status',
    online: 'online',
    offline: 'offline',
    time: 'Time',
    avatar: 'Avatar',
    addMsg: 'Add',
    download: 'Download PNG',
    clear: 'Clear All',
    step1: 'Set the contact name, status and avatar emoji',
    step2: 'Type messages and add them as sent or received',
    step3: 'Preview the chat in real time',
    step4: 'Click "Download PNG" to save the chat image',
  },
  zh: {
    toolTitle: 'WhatsApp 聊天生成器',
    toolDesc: '创建逼真的 WhatsApp 聊天截图 — 自定义姓名、消息、时间，下载为 PNG 图片。',
    contactName: '联系人名称',
    status: '状态',
    online: '在线',
    offline: '离线',
    time: '时间',
    avatar: '头像',
    addMsg: '添加',
    download: '下载 PNG',
    clear: '清除全部',
    step1: '设置联系人名称、状态和头像表情',
    step2: '输入消息并选择发送或接收',
    step3: '实时预览聊天效果',
    step4: '点击「下载 PNG」保存聊天截图',
  }
});

const { $, copyText, t } = GZ;

let contact = { name: 'John', status: 'online', time: '10:30 AM', avatar: '👤' };
let msgs = [
  { type: 'recv', text: 'Hey! How are you? 😊', time: '10:30 AM' },
  { type: 'sent', text: 'I\'m great, thanks! What about you?', time: '10:31 AM' },
  { type: 'recv', text: 'Doing well! Want to grab coffee later? ☕', time: '10:32 AM' },
];

function buildHeaderControls() {
  const c = $('#header-controls');
  c.innerHTML = `
    <label>${t('contactName')}<input type="text" id="hName" value="${contact.name}"></label>
    <label>${t('status')}<select id="hStatus"><option value="online"${contact.status==='online'?' selected':''}>${t('online')}</option><option value="offline"${contact.status==='offline'?' selected':''}>${t('offline')}</option></select></label>
    <label>${t('avatar')}<input type="text" id="hAvatar" value="${contact.avatar}" style="width:60px;text-align:center"></label>
  `;
  $('#hName').oninput = e => { contact.name = e.target.value; render(); };
  $('#hStatus').onchange = e => { contact.status = e.target.value; render(); };
  $('#hAvatar').oninput = e => { contact.avatar = e.target.value; render(); };
}

function render() {
  const chat = $('#chat-preview');
  const statusText = contact.status === 'online' ? t('online') : '';
  chat.innerHTML = `
    <div class="wa-header">
      <div class="avatar">${contact.avatar}</div>
      <div><div class="name">${contact.name || 'Contact'}</div><div class="info">${statusText}</div></div>
    </div>
    <div class="wa-body">
      ${msgs.map((m, i) => {
        if (m.type === 'sent') {
          return `<div class="wa-msg sent">${escHtml(m.text)}<div class="time">${m.time} ✓✓</div></div>`;
        } else {
          return `<div class="msg-row"><div class="ma">${contact.avatar}</div><div class="wa-msg recv">${escHtml(m.text)}<div class="time">${m.time}</div></div></div>`;
        }
      }).join('')}
    </div>
  `;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

$('#addBtn').textContent = t('addMsg');
$('#addBtn').onclick = () => {
  const text = $('#msgInput').value.trim();
  if (!text) return;
  const type = $('#msgType').value;
  const now = new Date();
  const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  msgs.push({ type, text, time });
  $('#msgInput').value = '';
  render();
};

$('#msgInput').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); $('#addBtn').click(); }});

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="dlBtn">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="msgs=[];render()">${t('clear')}</button>
`;

$('#dlBtn').onclick = async () => {
  // Use html2canvas approach via canvas
  const chatEl = $('#chat-preview');
  try {
    const canvas = await html2canvas(chatEl, { backgroundColor: null, scale: 2 });
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = 'whatsapp-chat.png';
    a.click();
  } catch(e) {
    // Fallback: serialize to SVG then canvas
    const rect = chatEl.getBoundingClientRect();
    const data = new XMLSerializer().serializeToString(chatEl);
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${rect.width}" height="${rect.height}"><foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml">${data}</div></foreignObject></svg>`;
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = rect.width * 2; c.height = rect.height * 2;
      const ctx = c.getContext('2d');
      ctx.scale(2,2);
      ctx.drawImage(img, 0, 0);
      const a = document.createElement('a');
      a.href = c.toDataURL('image/png');
      a.download = 'whatsapp-chat.png';
      a.click();
    };
    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  }
};

// Load html2canvas dynamically
const h2c = document.createElement('script');
h2c.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
document.head.appendChild(h2c);

buildHeaderControls();
render();

GZ.renderToolPage({
  category: 'social',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🐦', href:'/social/tweet-generator.html', name:'Tweet Generator'},
    {icon:'🖼️', href:'/social/youtube-thumb.html', name:'YouTube Thumbnail'},
    {icon:'🖼️', href:'/social/og-meta.html', name:'OG Meta'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
