<script>
GZI18n.register({
  en:{toolTitle:'Advanced Regex Tester & Replace',toolDesc:'Test JavaScript regex patterns with flags, match positions, capture groups and a live replacement preview. Free, private and browser-only.',pattern:'Regular expression',patternHint:'Use JavaScript regex syntax without surrounding slashes.',flags:'Flags',testText:'Test text',highlight:'Match highlight',replacement:'Replacement',replacementHint:'Use $1, $2 or $<name> to insert capture groups.',preview:'Replacement preview',test:'Test',example:'Example',copy:'Copy',clear:'Clear',matches:'matches found',noMatches:'No matches found.',index:'Index',match:'Match',groups:'Capture groups',invalid:'Invalid regular expression:',copied:'Copied',step1:'Enter a JavaScript regular expression pattern.',step2:'Choose the flags that should apply to matching.',step3:'Paste text and inspect each match, position and capture group.',step4:'Optionally enter a replacement using $1 or $<name> and copy the preview.'},
  zh:{toolTitle:'高级正则表达式测试与替换',toolDesc:'测试 JavaScript 正则表达式，查看标志、匹配位置、捕获组和实时替换预览。免费、私密、浏览器本地运行。',pattern:'正则表达式',patternHint:'使用 JavaScript 正则语法，无需输入两侧斜杠。',flags:'标志',testText:'测试文本',highlight:'匹配高亮',replacement:'替换内容',replacementHint:'使用 $1、$2 或 $<名称> 插入捕获组。',preview:'替换预览',test:'测试',example:'示例',copy:'复制',clear:'清空',matches:'个匹配',noMatches:'未找到匹配。',index:'位置',match:'匹配内容',groups:'捕获组',invalid:'无效的正则表达式：',copied:'已复制',step1:'输入 JavaScript 正则表达式模式。',step2:'选择需要用于匹配的标志。',step3:'粘贴文本并查看每个匹配、位置和捕获组。',step4:'可选地用 $1 或 $<名称> 输入替换内容，然后复制预览。'}
});
const { $, copyText, t } = GZ;
const flagChoices=[['g','g - global'],['i','i - ignore case'],['m','m - multiline'],['s','s - dotAll'],['u','u - Unicode'],['y','y - sticky']];
const enabledFlags={g:true,i:false,m:false,s:false,u:true,y:false};
function escapeHtml(value){return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function currentFlags(){return flagChoices.map(([flag])=>enabledFlags[flag]?flag:'').join('');}
function setStatus(id,message,kind){const el=$(id);el.textContent=message;el.className='rt-status'+(kind?' '+kind:'');}
function renderFlags(){ $('#flags').innerHTML=flagChoices.map(([flag,label])=>'<label class="rt-flag"><input type="checkbox" value="'+flag+'" '+(enabledFlags[flag]?'checked':'')+'> '+escapeHtml(label)+'</label>').join(''); $('#flags').querySelectorAll('input').forEach(input=>input.addEventListener('change',()=>{enabledFlags[input.value]=input.checked;run();})); }
function makeRegex(forceGlobal){let flags=currentFlags();if(forceGlobal&&!flags.includes('g'))flags+='g';return new RegExp($('#pattern').value,flags);}
function collectMatches(regex,text){const matches=[];let result;const global=regex.global||regex.sticky;while((result=regex.exec(text))!==null){matches.push(result);if(!global)break;if(result[0]==='')regex.lastIndex++;if(matches.length>=500)break;}return matches;}
function renderHighlighted(text,matches){let html='';let cursor=0;matches.forEach(match=>{if(match.index>cursor)html+=escapeHtml(text.slice(cursor,match.index));if(match[0])html+='<mark class="rt-match">'+escapeHtml(match[0])+'</mark>';else html+='<span class="rt-zero">|</span>';cursor=Math.max(cursor,match.index+match[0].length);});html+=escapeHtml(text.slice(cursor));$('#highlight').innerHTML=html||'<span class="rt-empty">-</span>';}
function groupText(match){const parts=[];for(let index=1;index<match.length;index++)parts.push('$'+index+'='+ (match[index]===undefined?'undefined':match[index]));if(match.groups)Object.keys(match.groups).forEach(name=>parts.push('$&lt;'+name+'&gt;='+ (match.groups[name]===undefined?'undefined':match.groups[name])));return parts.length?parts.map(escapeHtml).join('<br>'):'-';}
function renderMatches(matches){if(!matches.length){$('#match-list').innerHTML='';return;}let rows=matches.map((match,index)=>'<tr><td>'+ (index+1)+'</td><td>'+match.index+'</td><td><code>'+escapeHtml(match[0]||'(zero-width)')+'</code></td><td><code>'+groupText(match)+'</code></td></tr>').join('');$('#match-list').innerHTML='<table class="rt-table"><thead><tr><th>#</th><th>'+escapeHtml(t('index'))+'</th><th>'+escapeHtml(t('match'))+'</th><th>'+escapeHtml(t('groups'))+'</th></tr></thead><tbody>'+rows+'</tbody></table>';}
function run(){const text=$('#test-text').value;const pattern=$('#pattern').value;$('#pattern').classList.remove('error');if(!pattern){$('#highlight').textContent=text;$('#preview').textContent=text;$('#match-list').innerHTML='';setStatus('#regex-error','');setStatus('#match-status','');return;}try{const regex=makeRegex(false);const matches=collectMatches(makeRegex(false),text);renderHighlighted(text,matches);renderMatches(matches);setStatus('#regex-error','');setStatus('#match-status',matches.length+' '+t('matches'),matches.length?'ok':'');$('#preview').textContent=text.replace(regex,$('#replacement').value);}catch(error){$('#pattern').classList.add('error');$('#highlight').textContent=text;$('#preview').textContent='';$('#match-list').innerHTML='';setStatus('#regex-error',t('invalid')+' '+error.message,'error');setStatus('#match-status','');}}
function loadExample(){$('#pattern').value='(?<user>[\\w.+-]+)@(?<host>[\\w.-]+\\.[A-Za-z]{2,})';$('#replacement').value='$<host> :: $<user>';$('#test-text').value='Contact alice@example.com or Bob@work.test.\nBackup: dev+alerts@gamezipper.com';Object.assign(enabledFlags,{g:true,i:false,m:false,s:false,u:true,y:false});renderFlags();run();}
function clearAll(){$('#pattern').value='';$('#replacement').value='';$('#test-text').value='';run();}
$('#toolbar').innerHTML='<button class="gz-btn" id="test-btn">'+t('test')+'</button><button class="gz-btn gz-btn-secondary" id="copy-btn">'+t('copy')+'</button><button class="gz-btn gz-btn-secondary" id="example-btn">'+t('example')+'</button><button class="gz-btn gz-btn-secondary" id="clear-btn">'+t('clear')+'</button>';
$('#test-btn').addEventListener('click',run);$('#copy-btn').addEventListener('click',()=>copyText($('#preview').textContent));$('#example-btn').addEventListener('click',loadExample);$('#clear-btn').addEventListener('click',clearAll);['pattern','replacement','test-text'].forEach(id=>$('#'+id).addEventListener('input',run));
renderFlags();run();
GZ.renderToolPage({category:'dev',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{icon:'🔍',href:'/dev/regex-tester.html',name:'Regex Tester'},{icon:'🔁',href:'/dev/regex-replace.html',name:'Regex Replace'},{icon:'📖',href:'/dev/regex-explainer.html',name:'Regex Explainer'},{icon:'🧭',href:'/dev/regex-visualizer.html',name:'Regex Visualizer'}]});
</script>
