<script>
GZI18n.register({
  en: {
    toolTitle: 'System Prompt Builder',
    toolDesc: 'Assemble production-ready system prompts for ChatGPT, Claude, Gemini and any LLM. Set role, task, constraints, output format, tone and examples — copy or download instantly.',
    lblIn: 'Inputs', lblOut: 'Generated system prompt',
    lblRole: 'Role / Persona', lblTask: 'Core task', lblContext: 'Context & background',
    lblConstraints: 'Constraints (one per line)', lblFormat: 'Output format', lblTone: 'Tone', lblExamples: 'Few-shot examples (optional)',
    roleExpert: 'Senior expert', roleTeacher: 'Teacher', roleAssistant: 'Helpful assistant', roleCoder: 'Senior engineer', roleCritic: 'Critical reviewer',
    fmtMd: 'Markdown', fmtJson: 'JSON', fmtPlain: 'Plain text', fmtTable: 'Table', fmtBullet: 'Bullet list', fmtCode: 'Code block',
    tonePro: 'Professional', toneCasual: 'Casual', toneFriendly: 'Friendly', toneFormal: 'Formal', toneConcise: 'Concise', toneWitty: 'Witty',
    secRole: 'ROLE', secTask: 'TASK', secCtx: 'CONTEXT', secConst: 'CONSTRAINTS', secFmt: 'OUTPUT FORMAT', secTone: 'TONE', secEx: 'EXAMPLES',
    empty: 'Fill in the fields on the left — your structured system prompt appears here in real time.',
    approx: 'approx. %1 tokens (~%2 chars)',
    step1: 'Pick a role chip or type your own persona (e.g. "Senior data analyst")',
    step2: 'Describe the core task the model should perform',
    step3: 'Add context, constraints, output format and tone to lock down behavior',
    step4: 'Optionally paste a few-shot example, then Copy the assembled prompt',
  },
  zh: {
    toolTitle: '系统提示词构建器',
    toolDesc: '为 ChatGPT、Claude、Gemini 及任意大模型组装生产级系统提示词。设置角色、任务、约束、输出格式、语气和示例 — 一键复制或下载。',
    lblIn: '输入项', lblOut: '生成的系统提示词',
    lblRole: '角色 / 人设', lblTask: '核心任务', lblContext: '上下文与背景',
    lblConstraints: '约束条件（每行一条）', lblFormat: '输出格式', lblTone: '语气', lblExamples: '少样本示例（可选）',
    roleExpert: '资深专家', roleTeacher: '教师', roleAssistant: '智能助手', roleCoder: '资深工程师', roleCritic: '批判性审阅者',
    fmtMd: 'Markdown', fmtJson: 'JSON', fmtPlain: '纯文本', fmtTable: '表格', fmtBullet: '项目符号列表', fmtCode: '代码块',
    tonePro: '专业', toneCasual: '随意', toneFriendly: '友好', toneFormal: '正式', toneConcise: '简洁', toneWitty: '幽默',
    secRole: '角色', secTask: '任务', secCtx: '上下文', secConst: '约束', secFmt: '输出格式', secTone: '语气', secEx: '示例',
    empty: '在左侧填写字段 — 结构化的系统提示词将实时显示在此处。',
    approx: '约 %1 个 token（约 %2 字符）',
    step1: '选择角色标签或自行输入人设（例如「资深数据分析师」）',
    step2: '描述模型应执行的核心任务',
    step3: '添加上下文、约束、输出格式和语气以锁定行为',
    step4: '可选粘贴少样本示例，然后复制组装好的提示词',
  }
});

const { $, copyText, t } = GZ;
const lang = GZI18n.getLang();

const ROLE_DEFS = [
  ['roleExpert'], ['roleTeacher'], ['roleAssistant'], ['roleCoder'], ['roleCritic']
];
const FORMAT_DEFS = [
  ['fmtMd','Markdown'], ['fmtJson','JSON'], ['fmtPlain','Plain text'], ['fmtTable','Table'], ['fmtBullet','Bullet list'], ['fmtCode','Code block']
];
const TONE_DEFS = [
  ['tonePro'], ['toneCasual'], ['toneFriendly'], ['toneFormal'], ['toneConcise'], ['toneWitty']
];

let selectedFormat = 'Markdown';
let selectedTone = '';

function buildChips(container, defs, multi, onPick) {
  container.innerHTML = '';
  defs.forEach(([key, fallback]) => {
    const b = document.createElement('button');
    b.textContent = t(key) || fallback;
    b.dataset.val = t(key) || fallback;
    b.onclick = () => {
      if (!multi) [...container.children].forEach(c => c.classList.remove('on'));
      b.classList.toggle('on');
      onPick(b.classList.contains('on') ? b.dataset.val : '');
      render();
    };
    container.appendChild(b);
  });
}

buildChips($('#role-chips'), ROLE_DEFS, false, v => { if (v) $('#role').value = v; });
buildChips($('#format-chips'), FORMAT_DEFS, false, v => { if (v) selectedFormat = v; });
buildChips($('#tone-chips'), TONE_DEFS, false, v => { selectedTone = v; });

function block(title, body) {
  if (!body || !body.trim()) return '';
  return `## ${title}\n${body.trim()}\n\n`;
}

function render() {
  const role = $('#role').value.trim();
  const task = $('#task').value.trim();
  const ctx = $('#context').value.trim();
  const rawCons = $('#constraints').value.trim();
  const cons = rawCons ? rawCons.split('\n').map(l => '- ' + l.trim()).filter(l => l.length > 2).join('\n') : '';
  const ex = $('#examples').value.trim();
  let out = '';
  if (role)  out += block(t('secRole'), `You are ${role}.`);
  if (task)  out += block(t('secTask'), task);
  if (ctx)   out += block(t('secCtx'), ctx);
  if (cons)  out += block(t('secConst'), cons);
  if (selectedFormat) out += block(t('secFmt'), `Respond in ${selectedFormat}.`);
  if (selectedTone)   out += block(t('secTone'), `Adopt a ${selectedTone} tone.`);
  if (ex)    out += block(t('secEx'), ex);
  out = out.trim();
  if (!out) {
    $('#output').textContent = t('empty');
    $('#tok').textContent = '';
    return;
  }
  const framed = `You are an AI assistant operating under the following system instructions.\n\n${out}\n\nFollow these instructions for every message in this conversation. If a user request conflicts with them, politely decline and explain why.`;
  $('#output').textContent = framed;
  const chars = framed.length;
  const approxTok = Math.max(1, Math.round(chars / 4));
  $('#tok').textContent = t('approx').replace('%1', approxTok.toLocaleString()).replace('%2', chars.toLocaleString());
}

['role','task','context','constraints','examples'].forEach(id => {
  $('#' + id).addEventListener('input', render);
});

function loadExample() {
  $('#role').value = 'a senior technical writer at a developer-tools company';
  $('#task').value = 'Rewrite the user\'s raw draft as concise, scannable release notes for a software update.';
  $('#context').value = 'Audience: developers using our SDK. They skim, so lead with the change and its impact. Skip marketing fluff.';
  $('#constraints').value = 'Never invent features not present in the draft\nUse the active voice and present tense\nMaximum 150 words\nGroup changes as Added / Changed / Fixed / Deprecated';
  $('#examples').value = 'INPUT: "we made the auth thing faster and fixed a crash on logout"\nOUTPUT: **Changed** — Authentication is now ~40% faster.\n**Fixed** — Crash on logout is resolved.';
  selectedFormat = 'Markdown'; selectedTone = 'Professional';
  [...$('#format-chips').children].forEach(c => c.classList.toggle('on', c.dataset.val === 'Markdown'));
  [...$('#tone-chips').children].forEach(c => c.classList.toggle('on', c.dataset.val === 'Professional'));
  render();
}

function doClear() {
  ['role','task','context','constraints','examples'].forEach(id => $('#' + id).value = '');
  [...document.querySelectorAll('.chips button')].forEach(c => c.classList.remove('on'));
  selectedFormat = ''; selectedTone = '';
  render();
}

function doDownload() {
  const txt = $('#output').textContent;
  if (!txt || txt === t('empty')) return;
  const blob = new Blob([txt], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'system-prompt.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="render()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDownload()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

render();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🤖', href:'/zh/text/ai-prompt-generator.html', name:'AI Prompt Generator'},
    {icon:'🪙', href:'/zh/dev/token-cost-calculator.html', name:'Token Cost Calculator'},
    {icon:'🎨', href:'/zh/text/midjourney-prompt-builder.html', name:'Midjourney Prompt Builder'},
    {icon:'🖼️', href:'/zh/text/sd-prompt-builder.html', name:'Stable Diffusion Prompts'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
