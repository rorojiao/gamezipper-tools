<script>
GZI18n.register({
  en: {
    toolTitle: 'Email Subject Line Tester',
    toolDesc: 'Test, preview and score email subject lines across Gmail, Outlook, Apple Mail and mobile. Catch spam triggers, optimize length and boost open rates.',
    lblChar: 'Chars', lblWord: 'Words', lblScore: 'Score', lblEmoji: 'Emojis', lblSpam: 'Spam Words',

  },
  zh: {

    toolDesc: '跨 Gmail、Outlook、Apple Mail 和移动端测试、预览和评分邮件主题行。检测垃圾邮件触发词、优化长度、提高打开率。',
    lblChar: '字符', lblWord: '词数', lblScore: '评分', lblEmoji: 'Emoji', lblSpam: '垃圾词',
    tip: '提示：建议 30-50 字符、6-10 个词。营销邮件可使用 1 个相关 emoji，避免全大写和垃圾词。',
    step1: '输入邮件主题行和可选的预标题文本',
    step2: '查看实时字符/词数统计、评分和收件箱预览',
    step3: '检查垃圾词列表 — 删除或替换标记的词',
    step4: '使用客户端切换器查看主题在 Gmail、Outlook、Apple Mail 和移动端的显示效果',
  }
});

const { $, t, copyText } = GZ;

const SPAM_WORDS = ['free','win','winner','cash','$$$','$$','urgent','act now','limited time','click here','buy now','guaranteed','no risk','risk free','risk-free','100% free','100% off','discount','order now','meet singles','extra cash','make money','earn money','double your','lose weight','viagra','cialis','million dollars','satisfaction','best price','lowest price','cheap','credit card','congratulations','you have been selected','as seen on','no purchase','no investment','miracle','amazing','incredible deal','once in a lifetime','satisfaction guaranteed'];

function countEmoji(s){
  const ranges = '[\u{1F300}-\u{1F6FF}\u{1F900}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{1F1E0}-\u{1F1FF}\u{1F018}-\u{1F270}\u{238C}-\u{2454}\u{20A0}-\u{20CF}]';
  try { return (s.match(new RegExp(ranges,'gu'))||[]).length; } catch(e){ return 0; }
}
function detectAllCaps(s){
  if (s.length<3) return false;
  const letters = s.replace(/[^a-zA-Z]/g,'');
  if (letters.length<3) return false;
  return letters === letters.toUpperCase();
}
function detectExclamation(s){ return (s.match(/!/g)||[]).length; }
function detectQuestion(s){ return (s.match(/\?/g)||[]).length; }
function detectSpam(s){
  const lower = s.toLowerCase();
  return SPAM_WORDS.filter(w => lower.includes(w));
}
function personalized(s){
  return /\b(you|your|you're|you've|you'll)\b/i.test(s);
}
function hasNumber(s){
  return /\d/.test(s);
}
function urgentWords(s){
  return /\b(now|today|tonight|hurry|quick|fast|asap|immediately|expires|deadline|last chance|final|don't miss|don't wait|act)\b/i.test(s);
}

function score(s){
  if (!s.trim()) return { score:'—', cls:'' };
  let sc = 50;
  const c = s.length;
  if (c>=30 && c<=50) sc += 20;
  else if (c>=20 && c<30) sc += 10;
  else if (c>50 && c<=70) sc += 5;
  else if (c>70) sc -= 15;
  else if (c<20) sc -= 5;
  const w = (s.match(/\S+/g)||[]).length;
  if (w>=6 && w<=10) sc += 10;
  else if (w>=4 && w<6) sc += 5;
  else if (w>12) sc -= 5;
  if (countEmoji(s)===1) sc += 5;
  else if (countEmoji(s)>2) sc -= 10;
  if (personalized(s)) sc += 8;
  if (hasNumber(s)) sc += 5;
  if (urgentWords(s)) sc += 4;
  if (detectAllCaps(s)) sc -= 25;
  if (detectExclamation(s)>=2) sc -= 8;
  const sp = detectSpam(s).length;
  sc -= sp * 8;
  sc = Math.max(0, Math.min(100, sc));
  let cls = 'ok';
  if (sc<40) cls = 'danger';
  else if (sc<65) cls = 'warn';
  return { score: sc, cls };
}

function renderChecks(subject){
  const checks = [];
  if (!subject) return '';
  checks.push({ pass: subject.length>=30 && subject.length<=50, fail: subject.length<20 || subject.length>70, text: subject.length<20 ? `Subject is very short (${subject.length} chars) — may look empty` : subject.length>70 ? `Subject is long (${subject.length} chars) — may be cut off on mobile` : `Length is good (${subject.length} chars)` });
  checks.push({ pass: !detectAllCaps(subject), text: detectAllCaps(subject) ? 'Avoid ALL CAPS — looks like spam' : 'No ALL CAPS detected' });
  const e = countEmoji(subject);
  checks.push({ pass: e<=1, text: e===0 ? 'No emojis (clean & professional)' : e===1 ? '1 emoji — great for marketing' : `${e} emojis — too many, can hurt deliverability` });
  const sw = detectSpam(subject);
  checks.push({ pass: sw.length===0, text: sw.length===0 ? 'No spam-trigger words' : `Spam words: ${sw.join(', ')}` });
  checks.push({ pass: detectExclamation(subject)<2, text: detectExclamation(subject)<2 ? `Exclamation count: ${detectExclamation(subject)}` : 'Too many exclamation marks — feels spammy' });
  checks.push({ pass: personalized(subject), text: personalized(subject) ? 'Personalized (uses you/your)' : 'Add "you" or "your" for personalization' });
  checks.push({ pass: hasNumber(subject), text: hasNumber(subject) ? 'Contains a number (e.g. "5 tips") — can boost opens' : 'No numbers — try "5 ways" or "2026 guide"' });
  return checks.map(c => `<div class="es-check ${c.pass?'pass':(c.text.startsWith('Too')||c.text.startsWith('Subject is long')||c.text.startsWith('Avoid')||c.text.startsWith('Spam')?'fail':'warn')}"><span class="icon">${c.pass?'✓':'⚠'}</span><span>${c.text}</span></div>`).join('');
}

function truncate(s, n){
  // naive: count emoji as 2 chars; truncate by visual length
  let out = '';
  let len = 0;
  for (const ch of s){
    const isWide = /[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{1F000}-\u{1F2FF}]/u.test(ch);
    const w = isWide ? 2 : 1;
    if (len + w > n) { out += '…'; break; }
    out += ch;
    len += w;
  }
  return out;
}

function renderPreview(){
  const subject = $('#subject').value;
  const preheader = $('#preview').value;
  const client = $('#client').value;
  const sChar = subject.length;
  const sWord = (subject.match(/\S+/g)||[]).length;
  const sc = score(subject);
  const e = countEmoji(subject);
  const sw = detectSpam(subject).length;
  $('#sChar').textContent = sChar;
  $('#sWord').textContent = sWord;
  $('#sScore').textContent = sc.score;
  $('#sEmoji').textContent = e;
  $('#sSpam').textContent = sw;
  $('#bScoreWrap').className = 'es-stat ' + sc.cls;
  $('#bEmojiWrap').className = 'es-stat ' + (e===0?'ok':(e===1?'ok':(e===2?'warn':'danger')));
  $('#bSpamWrap').className = 'es-stat ' + (sw===0?'ok':(sw===1?'warn':'danger'));
  $('#checks').innerHTML = renderChecks(subject);
  // Render inbox preview
  const previewLimit = client==='mobile' ? 35 : (client==='gmail' ? 70 : 60);
  const subjectDisp = truncate(subject, previewLimit);
  const isMobile = client==='mobile';
  const fromName = 'Marketing Team';
  const initials = fromName.split(' ').map(x=>x[0]).join('').slice(0,2);
  const timeAgo = '10:42 AM';
  $('#previewArea').className = 'es-mail' + (isMobile?' es-mobile':'');
  $('#previewArea').innerHTML = `
    <div class="es-row">
      <div class="es-avatar">${initials}</div>
      <div style="flex:1;min-width:0">
        <div><span class="es-from">${fromName}</span><span class="es-time">${timeAgo}</span></div>
        <div class="es-subject">${escapeHtml(subjectDisp) || '<span style="opacity:.5">(no subject)</span>'}</div>
        ${preheader ? `<div class="es-preview-row">— ${escapeHtml(truncate(preheader, isMobile?50:90))}</div>` : ''}
      </div>
    </div>`;
  if (subject && subject.length > previewLimit) {
    $('#previewArea').innerHTML += `<div style="font-size:.75em;color:var(--text3);padding-top:6px">⏷ Truncated at ${previewLimit} chars in ${client}. Full length: ${subject.length}.</div>`;
  }
}
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

$('#subject').addEventListener('input', renderPreview);
$('#preview').addEventListener('input', renderPreview);
$('#client').addEventListener('change', renderPreview);
$('#btnCopy').onclick = () => copyText($('#subject').value);
$('#btnClear').onclick = () => { $('#subject').value=''; $('#preview').value=''; renderPreview(); };
$('#btnExample').onclick = () => {
  const examples = [
    ['5 ways to boost your email open rates 🚀', 'Quick wins inside for marketers'],
    ['Your weekly digest is ready', 'See what your team was working on this week'],
    ['Last chance: 24 hours to save 30%', 'Don\'t miss the biggest sale of the season'],
    ['[Action required] Please review by Friday', 'Quick approval needed from your team'],
    ['A new feature you\'ll love ❤️', 'We built this based on your feedback'],
  ];
  const pick = examples[Math.floor(Math.random()*examples.length)];
  $('#subject').value = pick[0];
  $('#preview').value = pick[1];
  renderPreview();
};

function init(){
  $('#lblChar').textContent = t('lblChar');
  $('#lblWord').textContent = t('lblWord');
  $('#lblScore').textContent = t('lblScore');
  $('#lblEmoji').textContent = t('lblEmoji');
  $('#lblSpam').textContent = t('lblSpam');
  $('#tip-text').textContent = t('tip');
  $('#subject').value = '5 ways to boost your email open rates 🚀';
  $('#preview').value = 'Quick wins for marketers — read in 3 min';
  renderPreview();
}

</script>
