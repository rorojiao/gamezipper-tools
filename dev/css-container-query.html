<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"CSS Container Query Generator","description":"Generate CSS container queries (@container) visually. Set breakpoints, styles, and preview responsive layouts.","url":"https://tools.gamezipper.com/dev/css-container-query.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a CSS container query?", "acceptedAnswer": {"@type": "Answer", "text": "A CSS container query (@container) lets you style elements based on the size of their parent container rather than the viewport. This is useful for creating truly reusable components that adapt to their container."}}, {"@type": "Question", "name": "How is it different from media queries?", "acceptedAnswer": {"@type": "Answer", "text": "Media queries respond to the viewport size, while container queries respond to the size of a parent element. This makes container queries better for component-based design where the same component might appear in different layout contexts."}}, {"@type": "Question", "name": "What browsers support container queries?", "acceptedAnswer": {"@type": "Answer", "text": "Container queries are supported in all modern browsers: Chrome 105+, Firefox 110+, Safari 16+, and Edge 105+."}}, {"@type": "Question", "name": "What is container-type?", "acceptedAnswer": {"@type": "Answer", "text": "The container-type CSS property defines the container. Use 'inline-size' to query the inline (width) axis, 'size' to query both axes, or 'normal' (default) to disable containment."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-split">
      <div>
        <label id="lbl-in"></label>
        <div class="form-row">
          <label>Container Name:</label>
          <input id="cName" value="card" placeholder="e.g. card, sidebar">
          <label>container-type:</label>
          <select id="cType"><option value="inline-size" selected>inline-size</option><option value="size">size</option><option value="normal">normal</option></select>
        </div>
        <div class="breakpoints" id="breakpoints"></div>
        <div class="preview-box" id="previewBox">
          <div class="preview-inner" id="previewInner">Preview</div>
        </div>
        <div class="slider-row">
          <span style="font-size:.85em">Container width:</span>
          <input type="range" id="widthSlider" min="100" max="1200" value="400">
          <span class="slider-val" id="widthVal">400px</span>
        </div>
      </div>
      <div>
        <label id="lbl-out"></label>
        <div class="gz-output" id="output"></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Container Query Generator',
    toolDesc: 'Generate CSS @container queries visually. Add breakpoints, set styles, and preview responsive component layouts.',
    step1: 'Set your container name and type',
    step2: 'Add breakpoints with min/max width and styles',
    step3: 'Use the slider to preview different container widths',
    step4: 'Copy the generated CSS code',
    addBP: '+ Breakpoint',
  },
  zh: {
    toolTitle: 'CSS Container Query 生成器',
    toolDesc: '可视化生成 CSS @container 查询。添加断点、设置样式并预览响应式组件布局。',
    step1: '设置容器名称和类型',
    step2: '添加断点，设置最小/最大宽度和样式',
    step3: '使用滑块预览不同容器宽度效果',
    step4: '复制生成的 CSS 代码',
    addBP: '+ 断点',
  }
});

const { $, copyText, t } = GZ;
let bpCount = 0;

function addBreakpoint(minW=0,maxW=0,styles='') {
  bpCount++;
  const id = bpCount;
  const div = document.createElement('div');
  div.className = 'bp-row';
  div.id = 'bp-' + id;
  div.innerHTML = `
    <span style="font-size:.8em;min-width:20px;color:var(--gz-text-secondary)">${id}</span>
    <label style="font-size:.8em">min:</label><input type="number" class="bp-min" value="${minW}" placeholder="px">
    <label style="font-size:.8em">max:</label><input type="number" class="bp-max" value="${maxW}" placeholder="px">
    <textarea class="bp-styles" placeholder="CSS styles...">${styles}</textarea>
    <button class="gz-btn gz-btn-secondary gz-btn-sm" onclick="document.getElementById('bp-${id}').remove();generate()">✕</button>`;
  div.querySelectorAll('input,textarea').forEach(el => el.addEventListener('input', generate));
  $('#breakpoints').appendChild(div);
  generate();
}

function generate() {
  const name = $('#cName').value.trim() || 'card';
  const cType = $('#cType').value;
  const bps = document.querySelectorAll('.bp-row');

  let css = `.parent {\n  container-name: ${name};\n  container-type: ${cType};\n}\n`;

  bps.forEach(row => {
    const min = row.querySelector('.bp-min').value;
    const max = row.querySelector('.bp-max').value;
    const styles = row.querySelector('.bp-styles').value.trim();
    if (!styles) return;

    let condition = '';
    if (min && max) condition = `(min-width: ${min}px) and (max-width: ${max}px)`;
    else if (min) condition = `(min-width: ${min}px)`;
    else if (max) condition = `(max-width: ${max}px)`;
    else return;

    css += `\n@container ${name} ${condition} {\n  .child {\n    ${styles.split('\n').map(l => '  ' + l).join('\n')}\n  }\n}\n`;
  });

  $('#output').textContent = css;
  updatePreview();
}

function updatePreview() {
  const w = parseInt($('#widthSlider').value);
  $('#widthVal').textContent = w + 'px';
  $('#previewBox').style.width = w + 'px';

  const cType = $('#cType').value;
  const bps = document.querySelectorAll('.bp-row');
  let matchedStyle = '';

  bps.forEach(row => {
    const min = parseInt(row.querySelector('.bp-min').value) || 0;
    const max = parseInt(row.querySelector('.bp-max').value) || Infinity;
    const styles = row.querySelector('.bp-styles').value.trim();
    if (styles && w >= min && w <= max) {
      matchedStyle = styles;
    }
  });

  const inner = $('#previewInner');
  inner.style.cssText = matchedStyle;
  inner.textContent = matchedStyle ? `@ ${w}px` : `No match @ ${w}px`;
}

$('#cName').addEventListener('input', generate);
$('#cType').addEventListener('change', generate);
$('#widthSlider').addEventListener('input', updatePreview);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="addBreakpoint()">${t('addBP')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="addBreakpoint(0,400,'flex-direction: column;\\nfont-size: 14px;');addBreakpoint(401,0,'flex-direction: row;\\nfont-size: 16px;');">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#breakpoints').innerHTML='';bpCount=0;generate()">${t('clear')}</button>`;

addBreakpoint(0, 400, 'flex-direction: column;\nfont-size: 14px;');
addBreakpoint(401, 0, 'flex-direction: row;\nfont-size: 16px;');

GZ.renderToolPage(
    
    
    
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
