<script>
GZI18n.register({
  en: {

    toolDesc: 'Build responsive, inbox-ready HTML email templates — Welcome, Newsletter, Transactional, Promo and Plain. Customize brand colors, fonts and copy, preview live, and copy inline-CSS HTML for any ESP. 100% browser-side.',

  zh: {

    toolDesc: '构建响应式、可直接发送的 HTML 邮件模板 — 欢迎、订阅、事务性、促销和简洁五种类型。自定义品牌色、字体和文案，实时预览，复制内联 CSS 的 HTML 到任意邮件平台。完全浏览器本地运行。',
    template: '模板',
    tplWelcome: '欢迎',
    tplNewsletter: '订阅',
    tplTransactional: '事务性',
    tplPromo: '促销',
    tplPlain: '简洁',
    brandName: '品牌名称',
    senderName: '发件人名称',
    subject: '邮件主题',
    preheader: '预览文本',
    heading: '标题',
    body: '正文内容',
    cta: '按钮文字',
    ctaUrl: '按钮链接',
    brandColor: '品牌色',
    btnColor: '按钮颜色',
    footer: '页脚文字',
    preview: '预览',
    code: 'HTML 源码',
    copyHtml: '复制 HTML',
    downloadHtml: '下载 .html',
    copied: '✓ HTML 已复制到剪贴板',
    step1: '选择符合邮件目的的模板类型',
    step2: '编辑品牌色、按钮颜色、发件人、主题、标题和正文',
    step3: '在实时预览和生成的 HTML 代码之间切换',
    step4: '点击「复制 HTML」并粘贴到 Mailchimp、SendGrid、Brevo、AWS SES 或任意邮件平台',
    defBody: '感谢加入我们！非常高兴您的到来。您的账户已准备就绪 — 立即探索全部功能，如需帮助请随时联系我们。',
    defFooter: '© 2026 您的品牌。您收到本邮件是因为在本站注册。',
  }
});

const { $, copyText, t } = GZ;
const state = { tpl: 'welcome', view: 'preview' };

const TPL = {
  welcome: { hero:true, showCta:true, sections:0 },
  newsletter: { hero:false, showCta:false, sections:3 },
  transactional: { hero:false, showCta:true, sections:1 },
  promo: { hero:true, showCta:true, sections:0, badge:true },
  plain: { hero:false, showCta:false, sections:0 },
};

function renderControls() {
  const c = $('#controls');
  c.innerHTML = `
    <label>${t('template')}</label>
    <div class="em-template-btns">
      ${['welcome','newsletter','transactional','promo','plain'].map(k =>
        `<button data-tpl="${k}" class="${state.tpl===k?'active':''}" onclick="setTpl('${k}')">${t('tpl'+k.charAt(0).toUpperCase()+k.slice(1))}</button>`).join('')}
    </div>
    <label>${t('brandName')}</label>
    <input type="text" id="f_brand" value="${val('brand','GameZipper')}">
    <label>${t('brandColor')}</label>
    <input type="color" id="f_brandColor" value="${val('brandColor','#6366f1')}">
    <label>${t('btnColor')}</label>
    <input type="color" id="f_btnColor" value="${val('btnColor','#10b981')}">
    <label>${t('subject')}</label>
    <input type="text" id="f_subject" value="${val('subject','Welcome to GameZipper 🎉')}">
    <label>${t('preheader')}</label>
    <input type="text" id="f_preheader" value="${val('preheader','Glad you are here — let us get you started.')}">
    <label>${t('heading')}</label>
    <input type="text" id="f_heading" value="${val('heading','Welcome aboard!')}">
    <label>${t('body')}</label>
    <textarea id="f_body">${val('body','')}</textarea>
    ${TPL[state.tpl].showCta!==false?`
    <label>${t('cta')}</label>
    <input type="text" id="f_cta" value="${val('cta','Get Started')}">
    <label>${t('ctaUrl')}</label>
    <input type="email" id="f_ctaUrl" value="${val('ctaUrl','https://example.com')}">`:''}
    <label>${t('footer')}</label>
    <textarea id="f_footer">${val('footer','')}</textarea>`;
  c.querySelectorAll('input,textarea').forEach(el => el.addEventListener('input', render));
}

function val(key, def) {
  if (state[key] !== undefined) return escAttr(state[key]);
  if (key === 'body') return escAttr(t('defBody'));
  if (key === 'footer') return escAttr(t('defFooter'));
  return escAttr(def);
}

function escAttr(s) { return String(s).replace(/"/g, '&quot;').replace(/</g,'&lt;'); }
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function readForm() {
  ['brand','brandColor','btnColor','subject','preheader','heading','body','cta','ctaUrl','footer'].forEach(k => {
    const el = $('#f_'+k);
    if (el) state[k] = el.value;
  });
}

function render() {
  readForm();
  const bc = state.brandColor || '#6366f1';
  const btn = state.btnColor || '#10b981';
  const brand = state.brand || 'GameZipper';
  const subject = state.subject || '';
  const preheader = state.preheader || '';
  const heading = state.heading || '';
  const body = (state.body || '').split('\n').map(p=>`<p style="margin:0 0 14px;color:#4b5563;font-size:15px;line-height:1.6">${esc(p)}</p>`).join('');
  const cta = state.cta || '';
  const ctaUrl = state.ctaUrl || '#';
  const footer = state.footer || '';
  const tpl = TPL[state.tpl];

  let inner = '';
  if (tpl.hero) {
    inner += `<div style="background:${bc};padding:30px 24px;text-align:center"><span style="color:#fff;font-size:22px;font-weight:bold;letter-spacing:.5px">${esc(brand)}</span>${tpl.badge?`<div style="display:inline-block;margin-top:8px;background:rgba(255,255,255,.2);color:#fff;font-size:11px;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:1px">Limited Time</div>`:''}</div>`;
  } else {
    inner += `<div style="padding:22px 24px;border-bottom:3px solid ${bc}"><span style="color:${bc};font-size:20px;font-weight:bold">${esc(brand)}</span></div>`;
  }
  inner += `<div style="padding:28px 24px">
    <h1 style="margin:0 0 12px;color:#111827;font-size:24px;line-height:1.3">${esc(heading)}</h1>
    ${body}`;
  if (tpl.showCta && cta) {
    inner += `<div style="text-align:center;margin:20px 0 8px"><a href="${escAttr(ctaUrl)}" style="display:inline-block;background:${btn};color:#fff;text-decoration:none;font-weight:bold;font-size:15px;padding:13px 30px;border-radius:6px">${esc(cta)}</a></div>`;
  }
  inner += `</div>`;
  if (tpl.sections) {
    inner += `<div style="padding:0 24px 20px">`;
    for (let i = 1; i <= tpl.sections; i++) {
      inner += `<div style="background:#f9fafb;border-left:3px solid ${bc};padding:14px 16px;margin-bottom:10px;border-radius:4px"><strong style="color:#111827;font-size:14px">${esc(['Story of the week','Quick tip','What is new'][i-1]||'Update')}</strong><p style="margin:5px 0 0;color:#6b7280;font-size:13px;line-height:1.5">${esc('A short paragraph of preview text. Replace this with your own copy.')}</p></div>`;
    }
    inner += `</div>`;
  }
  inner += `<div style="background:#f9fafb;padding:20px 24px;text-align:center;border-top:1px solid #e5e7eb"><p style="margin:0;color:#9ca3af;font-size:12px;line-height:1.5">${esc(footer)}</p><p style="margin:8px 0 0"><a href="#" style="color:#9ca3af;font-size:11px;text-decoration:underline">Unsubscribe</a> &nbsp;·&nbsp; <a href="#" style="color:#9ca3af;font-size:11px;text-decoration:underline">View in browser</a></p></div>`;

  const wrapper = `<div style="display:none;max-height:0;overflow:hidden;opacity:0;font-size:1px;line-height:1px">${esc(preheader)}</div>${inner}`;

  // Render preview as actual HTML
  $('#preview').innerHTML = wrapper;

  // Generate full email HTML document
  const fullHtml = `<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>${escAttr(subject)}</title>
</head>
<body style="margin:0;padding:0;background-color:#f0f2f5;font-family:Arial,Helvetica,sans-serif">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f0f2f5">
    <tr><td align="center" style="padding:20px">
      <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background-color:#ffffff">
        <tr><td>
          ${wrapper.replace(/<div/g, '<div').replace(/background:#fff/, 'background:#ffffff')}
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>`;
  $('#htmlOut').textContent = fullHtml;
  state._html = fullHtml;
}

function setTpl(k) { state.tpl = k; renderControls(); render(); }
function setView(v) {
  state.view = v;
  $('#viewPreview').style.display = v === 'preview' ? 'block' : 'none';
  $('#viewCode').style.display = v === 'code' ? 'block' : 'none';
  [...document.querySelectorAll('.em-tab')].forEach(t => t.classList.toggle('active', t.dataset.view === v));
}

function copyHtml() {
  copyText(state._html || '');
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('copied')}</span>`;
  setTimeout(() => $('#status').innerHTML = '', 1500);
}

function downloadHtml() {
  const blob = new Blob([state._html || ''], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${state.tpl}-email.html`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

$('#lblHtml').textContent = t('code');

$('#tabs').innerHTML = `
  <button class="em-tab active" data-view="preview" onclick="setView('preview')">${t('preview')}</button>
  <button class="em-tab" data-view="code" onclick="setView('code')">${t('code')}</button>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyHtml()">${t('copyHtml')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadHtml()">${t('downloadHtml')}</button>`;

renderControls();
render();
setView('preview');

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📧', href:'/text/email-template.html', name:'Email Template'},
    {icon:'✉️', href:'/text/email-signature.html', name:'Email Signature'},
    {icon:'📨', href:'/text/newsletter-generator.html', name:'Newsletter'},
    {icon:'📝', href:'/text/markdown-to-html.html', name:'Markdown to HTML'},
  ]
});
</script>
