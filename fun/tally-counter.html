.counter-tally{font-family:'Courier New',monospace;font-size:.95em;color:var(--text2);min-height:1.2em;margin-bottom:12px;letter-spacing:2px;word-break:break-all}

<body>
<div class="gz-container">
  <div class="gz-tool-header">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Tally Counter Online',
    toolDesc: 'Free online click counter with multiple tallies, +1/-10 buttons, keyboard shortcuts and auto-save. Perfect for inventory, attendance, knitting, reps and games.',
    addCounter: 'Add Counter',
    resetAll: 'Reset All',
    clearAll: 'Delete All',
    counterName: 'Counter name',
    active: 'Active',
    tipShortcut: 'Tip: Space = +1, Backspace = -1, Tab = next counter',
    confirmReset: 'Reset all counters to zero?',
    confirmDelete: 'Delete ALL counters? This cannot be undone.',
    step1: 'Click "Add Counter" to create a new tally',
    step2: 'Tap the big +1 button or the number to increment',
    step3: 'Use -1, +10, -10 to fine-tune the count',
    step4: 'Use Space/Backspace for keyboard counting — counts auto-save',
  },
  zh: {
    toolTitle: '在线计数器',
    toolDesc: '免费在线计数器，支持多个计数器、+1/-10 按钮、键盘快捷键和自动保存。适用于库存盘点、出勤、编织、运动次数和游戏。',
    addCounter: '添加计数器',
    resetAll: '全部归零',
    clearAll: '删除全部',
    counterName: '计数器名称',
    active: '已激活',
    tipShortcut: '提示：空格 = +1，退格 = -1，Tab = 下一个计数器',
    confirmReset: '将所有计数器归零？',
    confirmDelete: '删除所有计数器？此操作无法撤销。',
    step1: '点击「添加计数器」创建新计数',
    step2: '点击大号 +1 按钮或数字本身来递增',
    step3: '使用 -1、+10、-10 微调计数值',
    step4: '使用空格/退格键键盘计数 — 自动保存',
  }
});

const { $, t } = GZ;
const STORAGE_KEY = 'gz-tally-counters-v1';
let counters = [];
let activeIdx = 0;

function load() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    if (Array.isArray(saved) && saved.length) {
      counters = saved;
      return;
    }
  } catch (e) {}
  counters = [{ name: t('addCounter') + ' 1', value: 0 }];
  activeIdx = 0;
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(counters)); } catch (e) {}
}

function tallyMarks(n) {
  if (n <= 0) return '';
  const fives = Math.floor(n / 5);
  const ones = n % 5;
  // Universal tally: five-bar gate (///// ) for each group of 5, plus remaining strokes
  const group = '// '.repeat(fives);
  const strokes = ' |'.repeat(ones);
  return (group + strokes).trim();
}

function render() {
  const grid = $('#grid');
  grid.innerHTML = counters.map((c, i) => {
    const isActive = i === activeIdx;
    return `<div class="counter-card${isActive ? ' active' : ''}" data-idx="${i}" style="${isActive ? 'border-color:var(--accent);box-shadow:0 0 0 2px var(--accent) inset' : ''}">
      <input class="counter-name" value="${(c.name || '').replace(/"/g, '&quot;')}" placeholder="${t('counterName')}" data-action="rename">
      <div class="counter-display" data-action="inc" title="${t('active')}"> ${c.value} </div>
      <div class="counter-tally">${tallyMarks(c.value)}</div>
      <div class="counter-btns">
        <button class="big-plus" data-action="inc">+1</button>
        <button data-action="dec">-1</button>
        <button data-action="plus10">+10</button>
        <button data-action="minus10">-10</button>
        <button data-action="reset">↺</button>
        <button class="del" data-action="del">✕</button>
      </div>
    </div>`;
  }).join('');
}

function bump(idx) {
  const card = document.querySelector(`.counter-card[data-idx="${idx}"]`);
  if (card) {
    card.classList.add('bump');
    setTimeout(() => card.classList.remove('bump'), 150);
  }
}

function setActive(idx) {
  if (idx < 0) idx = counters.length - 1;
  if (idx >= counters.length) idx = 0;
  activeIdx = idx;
  render();
}

function updateValue(idx, delta) {
  if (!counters[idx]) return;
  counters[idx].value = Math.max(0, counters[idx].value + delta);
  save();
  render();
  bump(idx);
}

function reset(idx) {
  if (!counters[idx]) return;
  counters[idx].value = 0;
  save();
  render();
}

function del(idx) {
  counters.splice(idx, 1);
  if (activeIdx >= counters.length) activeIdx = counters.length - 1;
  if (activeIdx < 0) activeIdx = 0;
  save();
  render();
}

function add() {
  counters.push({ name: t('addCounter') + ' ' + (counters.length + 1), value: 0 });
  activeIdx = counters.length - 1;
  save();
  render();
}

$('#grid').addEventListener('click', e => {
  const card = e.target.closest('.counter-card');
  if (!card) return;
  const idx = +card.dataset.idx;
  const action = e.target.dataset.action;
  if (action === 'rename' || !action) return;
  activeIdx = idx;
  if (action === 'inc') updateValue(idx, 1);
  else if (action === 'dec') updateValue(idx, -1);
  else if (action === 'plus10') updateValue(idx, 10);
  else if (action === 'minus10') updateValue(idx, -10);
  else if (action === 'reset') reset(idx);
  else if (action === 'del') del(idx);
});

$('#grid').addEventListener('input', e => {
  if (e.target.dataset.action === 'rename') {
    const card = e.target.closest('.counter-card');
    const idx = +card.dataset.idx;
    counters[idx].name = e.target.value;
    save();
  }
});

$('#grid').addEventListener('focusin', e => {
  const card = e.target.closest('.counter-card');
  if (card) activeIdx = +card.dataset.idx;
});

$('#btn-add').onclick = add;
$('#btn-reset-all').onclick = () => {
  if (confirm(t('confirmReset'))) {
    counters.forEach(c => c.value = 0);
    save(); render();
  }
};
$('#btn-clear-all').onclick = () => {
  if (confirm(t('confirmDelete'))) {
    counters = [];
    add();
  }
};

document.addEventListener('keydown', e => {
  if (e.target.matches('input, textarea')) return;
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    updateValue(activeIdx, 1);
  } else if (e.code === 'Backspace') {
    e.preventDefault();
    updateValue(activeIdx, -1);
  } else if (e.code === 'Tab') {
    e.preventDefault();
    setActive(activeIdx + (e.shiftKey ? -1 : 1));
  }
});

$('#lbl-add').textContent = t('addCounter');
$('#lbl-reset').textContent = t('resetAll');
$('#lbl-clear').textContent = t('clearAll');

load();
render();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {href:'/calc/timer-stopwatch.html',icon:'⏱️',name:'Online Stopwatch'},
    {href:'/fun/dice-roller.html',icon:'🎲',name:'Dice Roller'},
    
    {href:'/calc/expense-tracker.html',icon:'📊',name:'Expense Tracker'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
