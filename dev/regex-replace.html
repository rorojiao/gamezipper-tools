<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <label class="gz-label" id="lbl-pattern"></label>
    <input class="gz-input" id="pattern" value="(\w+)@(\w+)\.(\w+)" spellcheck="false">
    <label class="gz-label" id="lbl-replace"></label>
    <input class="gz-input" id="replace" value="$1 [at] $2 [dot] $3" spellcheck="false">
    <div class="flags-row">
      <label><input type="checkbox" id="flagG" checked> g</label>
      <label><input type="checkbox" id="flagI"> i</label>
      <label><input type="checkbox" id="flagM"> m</label>
      <label><input type="checkbox" id="flagS"> s</label>
      <label><input type="checkbox" id="flagU"> u</label>
    </div>
    <div class="gz-split">
      <div><label id="lbl-in"></label><textarea id="input" spellcheck="false">Contact us at hello@example.com or support@test.org for help.</textarea></div>
      <div><label id="lbl-out"></label><div id="output"></div></div>
    </div>
    <div id="status" class="match-count"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Regex Replace Online',
    toolDesc: 'Find and replace text using regular expressions with capture groups, backreferences, flags and live preview.',
    pattern: 'Regex Pattern',
    replacement: 'Replacement String (use $1, $2... for groups)',
    input: 'Input Text',
    output: 'Result',
    replace: 'Replace',
    step1: 'Enter your regex pattern in the Pattern field',
    step2: 'Enter the replacement string (use $1, $2... for capture groups)',
    step3: 'Toggle flags: g=global, i=case-insensitive, m=multiline, s=dotAll',
    step4: 'The result updates live as you type — copy it when done',
  },
  zh: {
    toolTitle: '正则替换工具',
    toolDesc: '使用正则表达式在线查找和替换文本，支持捕获组、反向引用、标志位和实时预览。',
    pattern: '正则表达式',
    replacement: '替换字符串（使用 $1, $2... 引用捕获组）',
    input: '输入文本',
    output: '替换结果',
    replace: '替换',
    step1: '在「正则表达式」字段输入匹配模式',
    step2: '输入替换字符串（用 $1、$2... 引用捕获组）',
    step3: '切换标志位：g=全局、i=忽略大小写、m=多行、s=dotAll',
    step4: '结果随输入实时更新 — 完成后一键复制',
  }
});
const { $, copyText, t } = GZ;
function doReplace() {
  const pat = $('#pattern').value;
  const rep = $('#replace').value;
  const inp = $('#input').value;
  if (!pat) { $('#output').textContent = inp; $('#status').textContent = ''; return; }
  let flags = '';
  if ($('#flagG').checked) flags += 'g';
  if ($('#flagI').checked) flags += 'i';
  if ($('#flagM').checked) flags += 'm';
  if ($('#flagS').checked) flags += 's';
  if ($('#flagU').checked) flags += 'u';
  try {
    const regex = new RegExp(pat, flags);
    let count = 0;
    const result = inp.replace(regex, function() { count++; return rep; });
    $('#output').textContent = result;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${count} match${count !== 1 ? 'es' : ''} replaced</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ ${e.message}</span>`;
    $('#output').textContent = '';
  }
}
function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').textContent = ''; }
$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doReplace()">${t('replace')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy') || 'Copy'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear') || 'Clear'}</button>`;
$('#pattern').addEventListener('input', doReplace);
$('#replace').addEventListener('input', doReplace);
$('#input').addEventListener('input', doReplace);
$('#flagG').addEventListener('change', doReplace);
$('#flagI').addEventListener('change', doReplace);
$('#flagM').addEventListener('change', doReplace);
$('#flagS').addEventListener('change', doReplace);
$('#flagU').addEventListener('change', doReplace);
doReplace();
GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔍', href:'/dev/regex.html', name:'Regex Tester'},
    {icon:'📖', href:'/dev/regex-explainer.html', name:'Regex Explainer'},
    {icon:'🗺️', href:'/dev/regex-visualizer.html', name:'Regex Visualizer'},
    {icon:'📜', href:'/dev/regex-cheatsheet.html', name:'Regex Cheatsheet'},
  ]
});
</script>
