<script>
GZI18n.register({
  en: {
    toolTitle: '3D Text Generator',
    toolDesc: 'Create stunning 3D text effects with CSS — customize depth, color, angle and font, preview live and copy the code.',
    yourText: 'Your Text',
    depth: 'Depth',
    angle: 'Angle',
    textColor: 'Text Color',
    shadowColor: 'Shadow Color',
    fontSize: 'Font Size',
    fontFamily: 'Font Family',
    bgStyle: 'Background',
    dark: 'Dark',
    light: 'Light',
    gradient: 'Gradient',
    preset: 'Preset',
    presetClassic: 'Classic 3D',
    presetNeon: 'Neon Glow',
    presetRetro: 'Retro',
    presetFire: 'Fire',
    presetIce: 'Ice',
    presetGold: 'Gold',
    copyCode: 'Copy CSS Code',
    copied: 'Copied!',
    step1: 'Enter your text and choose a font',
    step2: 'Adjust depth, angle, colors and size',
    step3: 'Pick a preset or fine-tune manually',
    step4: 'Copy the generated CSS code for your project',
  },
  zh: {
    toolTitle: '3D 文字生成器',
    toolDesc: '使用 CSS 创建令人惊叹的 3D 文字效果 — 自定义深度、颜色、角度和字体，实时预览并复制代码。',
    yourText: '输入文字',
    depth: '深度',
    angle: '角度',
    textColor: '文字颜色',
    shadowColor: '阴影颜色',
    fontSize: '字号',
    fontFamily: '字体',
    bgStyle: '背景',
    dark: '深色',
    light: '浅色',
    gradient: '渐变',
    preset: '预设',
    presetClassic: '经典 3D',
    presetNeon: '霓虹灯',
    presetRetro: '复古',
    presetFire: '火焰',
    presetIce: '冰霜',
    presetGold: '金色',
    copyCode: '复制 CSS 代码',
    copied: '已复制！',
    step1: '输入文字并选择字体',
    step2: '调整深度、角度、颜色和大小',
    step3: '选择预设或手动微调',
    step4: '复制生成的 CSS 代码',
  }
});

const { $, copyText, t } = GZ;

const presets = {
  classic: { textColor: '#ffffff', shadowColor: '#666666', depth: 6, angle: 135, font: 'Arial Black', size: 48, bg: 'dark' },
  neon: { textColor: '#0ff', shadowColor: '#f0f', depth: 4, angle: 180, font: 'Arial Black', size: 48, bg: 'dark' },
  retro: { textColor: '#ff6b6b', shadowColor: '#4ecdc4', depth: 4, angle: 135, font: 'Impact', size: 52, bg: 'light' },
  fire: { textColor: '#ff0', shadowColor: '#f00', depth: 8, angle: 180, font: 'Impact', size: 52, bg: 'dark' },
  ice: { textColor: '#e0f0ff', shadowColor: '#0066cc', depth: 5, angle: 135, font: 'Trebuchet MS', size: 48, bg: 'dark' },
  gold: { textColor: '#ffd700', shadowColor: '#8b6914', depth: 6, angle: 135, font: 'Georgia', size: 50, bg: 'dark' },
};

function getVal(id) { return document.getElementById(id).value; }
function getNum(id) { return parseFloat(document.getElementById(id).value); }

function generateShadow(depth, angle, shadowColor) {
  const rad = (angle * Math.PI) / 180;
  const dx = Math.cos(rad);
  const dy = -Math.sin(rad);
  const shadows = [];
  for (let i = 1; i <= depth; i++) {
    const x = Math.round(dx * i);
    const y = Math.round(dy * i);
    shadows.push(`${x}px ${y}px 0 ${shadowColor}`);
  }
  // Add subtle blur for realism
  shadows.push(`${Math.round(dx * (depth + 2))}px ${Math.round(dy * (depth + 2))}px ${depth}px rgba(0,0,0,0.3)`);
  return shadows.join(', ');
}

function update() {
  const text = getVal('textInput') || 'GameZipper';
  const depth = getNum('depthSlider');
  const angle = getNum('angleSlider');
  const textColor = getVal('textColor');
  const shadowColor = getVal('shadowColor');
  const fontSize = getNum('fontSize');
  const fontFamily = getVal('fontFamily');
  const bg = getVal('bgStyle');

  const preview = $('#previewText');
  preview.textContent = text;
  preview.style.color = textColor;
  preview.style.fontSize = fontSize + 'px';
  preview.style.fontFamily = fontFamily;
  preview.style.textShadow = generateShadow(depth, angle, shadowColor);

  const previewBox = $('#preview');
  if (bg === 'dark') previewBox.style.background = '#1a1a2e';
  else if (bg === 'light') previewBox.style.background = '#f0f0f0';
  else previewBox.style.background = 'linear-gradient(135deg, #1a1a2e, #16213e)';

  // Generate code
  const cssShadow = generateShadow(depth, angle, shadowColor);
  const code = `.text-3d {\n  font-family: '${fontFamily}', sans-serif;\n  font-size: ${fontSize}px;\n  font-weight: 900;\n  color: ${textColor};\n  text-shadow: ${cssShadow};\n}`;
  const html = `<span class="text-3d">${text}</span>`;
  $('#codeBox').textContent = `/* CSS */\n${code}\n\n<!-- HTML -->\n${html}`;
}

function applyPreset(name) {
  const p = presets[name];
  if (!p) return;
  document.getElementById('textColor').value = p.textColor;
  document.getElementById('shadowColor').value = p.shadowColor;
  document.getElementById('depthSlider').value = p.depth;
  document.getElementById('angleSlider').value = p.angle;
  document.getElementById('fontFamily').value = p.font;
  document.getElementById('fontSize').value = p.size;
  document.getElementById('bgStyle').value = p.bg;
  document.getElementById('depthVal').textContent = p.depth;
  document.getElementById('angleVal').textContent = p.angle;
  document.getElementById('sizeVal').textContent = p.size;
  update();
}

$('#controls').innerHTML = `
  <label>${t('yourText')}<input type="text" id="textInput" value="GameZipper" oninput="update()"></label>
  <label>${t('fontFamily')}<input type="text" id="fontFamily" value="Arial Black" oninput="update()" list="fonts"><datalist id="fonts"><option value="Arial Black"><option value="Impact"><option value="Georgia"><option value="Trebuchet MS"><option value="Verdana"><option value="Courier New"><option value="Comic Sans MS"><option value="Times New Roman"></datalist></label>
  <label>${t('fontSize')}: <span id="sizeVal">48</span>px<input type="range" id="fontSize" min="16" max="120" value="48" oninput="document.getElementById('sizeVal').textContent=this.value;update()"></label>
  <label>${t('depth')}: <span id="depthVal">6</span><input type="range" id="depthSlider" min="1" max="20" value="6" oninput="document.getElementById('depthVal').textContent=this.value;update()"></label>
  <label>${t('angle')}: <span id="angleVal">135</span>°<input type="range" id="angleSlider" min="0" max="360" value="135" oninput="document.getElementById('angleVal').textContent=this.value;update()"></label>
  <label>${t('textColor')}<input type="color" id="textColor" value="#ffffff" oninput="update()"></label>
  <label>${t('shadowColor')}<input type="color" id="shadowColor" value="#666666" oninput="update()"></label>
  <label>${t('bgStyle')}<select id="bgStyle" onchange="update()"><option value="dark">${t('dark')}</option><option value="light">${t('light')}</option><option value="gradient">${t('gradient')}</option></select></label>
`;

$('#toolbar').innerHTML = `
  <select class="gz-select" onchange="applyPreset(this.value)">
    <option value="">${t('preset')}…</option>
    <option value="classic">${t('presetClassic')}</option>
    <option value="neon">${t('presetNeon')}</option>
    <option value="retro">${t('presetRetro')}</option>
    <option value="fire">${t('presetFire')}</option>
    <option value="ice">${t('presetIce')}</option>
    <option value="gold">${t('presetGold')}</option>
  </select>
  <button class="gz-btn" onclick="copyText($('#codeBox').textContent)">${t('copyCode')}</button>`;

update();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/css-tools/text-shadow.html', name:'Text Shadow'},
    {icon:'🌈', href:'/css-tools/gradient-text.html', name:'Gradient Text'},
    {icon:'✨', href:'/text/fancy-text.html', name:'Fancy Text'},
    {icon:'🕷️', href:'/text/zalgo.html', name:'Zalgo Text'},
  ]
});
</script>
