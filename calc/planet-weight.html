<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How does weight change on other planets?","acceptedAnswer":{"@type":"Answer","text":"Weight is the force of gravity pulling on your mass. Since each planet has a different mass and radius, the surface gravity differs. For example, Jupiter's gravity is 2.34× Earth's, so you would weigh 2.34 times more there. Your mass stays the same everywhere."}},{"@type":"Question","name":"Why would I weigh less on the Moon?","acceptedAnswer":{"@type":"Answer","text":"The Moon's surface gravity is only about 0.165 times Earth's because the Moon is much smaller and less massive. So a 100 kg person on Earth would weigh about 16.5 kg on the Moon."}},{"@type":"Question","name":"What's the difference between mass and weight?","acceptedAnswer":{"@type":"Answer","text":"Mass is the amount of matter in your body — it never changes. Weight is the gravitational force on that mass (W = m × g). This calculator shows how your weight (the force) changes by planet, while your mass remains constant."}},{"@type":"Question","name":"Would I actually be able to stand on Jupiter or the Sun?","acceptedAnswer":{"@type":"Answer","text":"No — Jupiter and Saturn are gas giants with no solid surface, and the Sun is a plasma star. The values shown are theoretical surface-gravity calculations, useful for physics learning and curiosity."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Weight on Other Planets Calculator',
    toolDesc: 'Enter your weight on Earth and instantly see what you would weigh on every planet, the Moon, Pluto and the Sun — fun and educational physics tool.',
    weightKg: 'Your Weight (kg)',
    weightLb: 'Your Weight (lb)',
    unit: 'Unit',
    calculate: 'Calculate',
    clear: 'Clear',
    ratio: '× Earth gravity',
    step1: 'Choose your unit — kilograms or pounds',
    step2: 'Type your Earth weight',
    step3: 'See your weight on every planet instantly',
    step4: 'Compare gravity ratios and fun planet facts',
    facts: {
      sun: 'The Sun holds 99.86% of the Solar System\'s mass.',
      mercury: 'Mercury has no atmosphere — scorching days, freezing nights.',
      venus: 'Venus rotates backwards and has crushing surface pressure.',
      earth: 'Earth is the only known planet with liquid water oceans.',
      moon: 'Apollo astronauts could jump 6× higher on the Moon.',
      mars: 'Mars is home to Olympus Mons, the tallest volcano in the Solar System.',
      jupiter: 'Jupiter\'s Great Red Spot is a storm wider than Earth.',
      saturn: 'Saturn is so light it would float in a giant bathtub.',
      uranus: 'Uranus rotates on its side — likely knocked over by an ancient impact.',
      neptune: 'Neptune has the fastest winds in the Solar System — up to 2,100 km/h.',
      pluto: 'Pluto was reclassified as a dwarf planet in 2006.',
    },
    names: { sun:'Sun', mercury:'Mercury', venus:'Venus', earth:'Earth', moon:'Moon', mars:'Mars', jupiter:'Jupiter', saturn:'Saturn', uranus:'Uranus', neptune:'Neptune', pluto:'Pluto' },
  },
  zh: {
    toolTitle: '其他星球体重计算器',
    toolDesc: '输入你在地球上的体重，即时查看在每颗行星、月球、冥王星和太阳上的体重 — 趣味物理工具。',
    weightKg: '你的体重（公斤）',
    weightLb: '你的体重（磅）',
    unit: '单位',
    calculate: '计算',
    clear: '清除',
    ratio: '× 地球重力',
    step1: '选择单位 — 公斤或磅',
    step2: '输入你在地球上的体重',
    step3: '即时查看你在每颗星球上的体重',
    step4: '对比重力比例和趣味星球知识',
    facts: {
      sun: '太阳占据了太阳系 99.86% 的质量。',
      mercury: '水星没有大气层 — 白天酷热，夜晚严寒。',
      venus: '金星反向自转，表面气压极大。',
      earth: '地球是目前已知唯一存在液态海洋的行星。',
      moon: '阿波罗宇航员在月球上能跳得比地球高 6 倍。',
      mars: '火星上的奥林帕斯山是太阳系最高的火山。',
      jupiter: '木星上的大红斑是一场比地球还宽的风暴。',
      saturn: '土星密度极低，理论上能浮在巨大的浴缸里。',
      uranus: '天王星躺着自转 — 可能被古老撞击撞倒。',
      neptune: '海王星风速最快 — 最高可达每小时 2100 公里。',
      pluto: '冥王星于 2006 年被重新归类为矮行星。',
    },
    names: { sun:'太阳', mercury:'水星', venus:'金星', earth:'地球', moon:'月球', mars:'火星', jupiter:'木星', saturn:'土星', uranus:'天王星', neptune:'海王星', pluto:'冥王星' },
  }
});

const { $, copyText, t } = GZ;

// Surface gravity ratios relative to Earth (g)
const BODIES = [
  { id:'sun',     icon:'☀️', g:27.95 },
  { id:'mercury', icon:'☿️', g:0.377 },
  { id:'venus',   icon:'♀️', g:0.904 },
  { id:'earth',   icon:'🌍', g:1.000 },
  { id:'moon',    icon:'🌙', g:0.1654 },
  { id:'mars',    icon:'🔴', g:0.378 },
  { id:'jupiter', icon:'🪐', g:2.34 },   // at cloud-top "1 bar" level
  { id:'saturn',  icon:'🪐', g:1.06 },
  { id:'uranus',  icon:'🔵', g:0.89 },
  { id:'neptune', icon:'🔷', g:1.14 },
  { id:'pluto',   icon:'⚪', g:0.063 },
];

function updateUnitLabel() {
  const u = $('#unit').value;
  $('#unit option[value="kg"]').textContent = 'Kilograms (kg)';
  $('#unit option[value="lb"]').textContent = 'Pounds (lb)';
  $('#lbl-weight').innerHTML = (u === 'kg' ? t('weightKg') : t('weightLb'))
    + '<input type="number" id="weight" min="1" max="2000" step="0.1" placeholder="' + (u === 'kg' ? '70' : '154') + '" oninput="autoCalc()">';
}

function autoCalc() {
  const w = parseFloat($('#weight')?.value);
  if (!w || w <= 0) return;
  const unit = $('#unit').value;
  const suffix = unit === 'kg' ? ' kg' : ' lb';
  $('#grid').innerHTML = BODIES.map(b => {
    const val = (w * b.g).toFixed(1).replace(/\.0$/, '');
    const ratioTxt = b.g.toFixed(3) + ' ' + t('ratio');
    return `
      <div class="gz-pw-card">
        <span class="gz-pw-icon">${b.icon}</span>
        <div class="gz-pw-name">${t('names')[b.id]}</div>
        <div class="gz-pw-weight">${val}${suffix}</div>
        <div class="gz-pw-ratio">${ratioTxt}</div>
        <div class="gz-pw-fact">${t('facts')[b.id]}</div>
      </div>`;
  }).join('');
}

function doClear() {
  $('#weight').value = '';
  $('#grid').innerHTML = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="autoCalc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

updateUnitLabel();
$('#unit').addEventListener('change', updateUnitLabel);

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
    {icon:'🧮', href:'/convert/unit.html', name:'Unit Converter'},
    {icon:'🔥', href:'/calc/tdee-calculator.html', name:'TDEE'},
    {icon:'💪', href:'/calc/body-fat.html', name:'Body Fat'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
