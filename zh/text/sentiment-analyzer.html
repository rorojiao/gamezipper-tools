<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How does the sentiment analyzer work?", "acceptedAnswer": {"@type": "Answer", "text": "The tool uses a lexicon-based approach. Each word in your text is looked up against a curated dictionary of positive and negative terms with intensity scores (an AFINN-style scale from -5 to +5). Negators (not, never, hardly) flip the polarity of nearby words, intensifiers (very, extremely) boost scores, and the final normalized polarity (-1 to +1) is classified as positive, negative or neutral."}}, {"@type": "Question", "name": "What languages are supported?", "acceptedAnswer": {"@type": "Answer", "text": "English gets the full lexicon with negation and intensifier handling. Chinese sentiment is detected via a separate positive/negative character and word dictionary. Other languages are analyzed after a best-effort English translation fallback is skipped — for best results paste English or Chinese text."}}, {"@type": "Question", "name": "Is sentiment analysis accurate?", "acceptedAnswer": {"@type": "Answer", "text": "Lexicon-based analysis is typically 70-80% accurate on general text. It struggles with sarcasm, irony, context-dependent meaning and idioms. For tweets, reviews and feedback it provides a useful quick signal; for mission-critical decisions combine it with human review."}}, {"@type": "Question", "name": "Is my text private?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. All analysis runs entirely in your browser with JavaScript. Your text never leaves your device and is not sent to any server."}}]}</script>

<script>

    highlightWords: '已识别的情感词',
    none: '—',
    noText: '请输入文本以分析情感倾向。',
    step1: '粘贴评论、推文、消息或任意文本',
    step2: '分析会在输入时自动运行',

const { $, copyText, t } = GZ;

// AFINN-style lexicon (curated subset, -5..+5)
const POS = { amazing:5, awesome:5, wonderful:5, fantastic:5, excellent:5, perfect:5, brilliant:5, superb:5, great:4, excellent:5, love:4, loved:4, loving:3, best:4, beautiful:4, gorgeous:4, stunning:4, magnificent:4, delightful:4, lovely:4, happy:4, glad:3, joyful:4, joy:4, pleased:3, enjoy:3, enjoyed:3, enjoying:3, good:3, nice:3, cool:3, fun:3, sweet:3, kind:3, helpful:3, recommend:3, recommended:3, thanks:3, thank:3, grateful:3, win:3, won:3, winning:3, success:3, successful:3, easy:2, fast:2, quick:2, smooth:2, clean:3, fresh:2, bright:2, warm:3, friendly:3, generous:3, generous:3, impressive:4, reliable:3, safe:2, secure:2, worth:2, valuable:3, positive:3, well:2, better:3, incredible:5, marvelous:5, pleasant:3, charming:3, elegant:3, flawless:5, outstanding:5, remarkable:4, terrific:5, blissful:4, ecstatic:5, thrilled:5, satisfied:3, satisfaction:3, admire:3, adore:4, cherish:4, treasure:3, welcome:3, beneficial:3, optimistic:3, hopeful:3, peaceful:3, calm:2, gentle:3 };
const NEG = { terrible:-5, awful:-5, horrible:-5, horrific:-5, atrocious:-5, dreadful:-5, disgusting:-5, hate:-5, hated:-5, hateful:-4, worst:-5, disaster:-5, nightmare:-5, abysmal:-5, pathetic:-4, useless:-4, worthless:-4, broken:-3, defective:-4, faulty:-3, fail:-3, failed:-3, failing:-3, failure:-4, poor:-3, bad:-3, sad:-3, saddest:-4, unhappy:-3, angry:-4, anger:-4, furious:-5, mad:-3, upset:-3, annoyed:-3, frustrating:-4, frustrated:-4, annoying:-3, boring:-3, dull:-2, slow:-2, confusing:-3, confused:-3, difficult:-2, hard:-1, painful:-3, pain:-3, hurt:-3, hurts:-3, sick:-3, ill:-2, tired:-2, exhausted:-4, weak:-2, ugly:-3, dirty:-2, messy:-2, rude:-3, mean:-3, stupid:-3, idiotic:-4, scam:-5, fraud:-5, fake:-3, lie:-3, lied:-3, liar:-4, wrong:-2, wronged:-3, wrong:-2, wrong:-2, loss:-3, lost:-3, losing:-3, denied:-3, rejected:-3, ignored:-3, disappointed:-4, disappointing:-4, disappointment:-4, regret:-3, regretful:-3, sorry:-2, worry:-2, worried:-2, afraid:-3, scared:-3, terrified:-5, anxious:-3, depressed:-4, lonely:-3, miserable:-4, hopeless:-4, hopeless:-4, dangerous:-3, unsafe:-3, harmful:-3, damage:-3, damaged:-3, broken:-3, crash:-3, crashed:-3, error:-3, bug:-2, glitch:-2 };
const NEGATORS = new Set(['not','no','never','none','nobody','nothing',"n't",'neither','nor','without','hardly','barely','scarcely']);
const INTENSIFIERS = { very:1.5, really:1.5, extremely:2, incredibly:1.8, absolutely:2, totally:1.7, so:1.4, super:1.5, too:1.2, quite:1.3, truly:1.5, highly:1.5, deeply:1.5, utterly:1.8 };

// Chinese sentiment lexicon
const ZH_POS = '棒 极好 优秀 完美 出色 喜欢 爱好 开心 快乐 幸福 满意 满足 高兴 兴奋 美好 美丽 漂亮 可爱 温柔 温暖 友好 热情 热心 帮助 感谢 感激 成功 胜利 赢 赚钱 顺利 容易 简单 干净 清新 明亮 聪明 智慧 勇敢 坚强 优秀 精彩 推荐 值得 信任 放心 安全 可靠 舒服 舒适 惊喜 惊艳 感动 温馨 甜蜜 浪漫 有趣 好玩 爽 酷 牛 厉害 强大 完美 优良 优质 棒 赞 赞 美 赞'.split(/[ ]/).filter((v,i,a)=>a.indexOf(v)===i);
const ZH_NEG = '糟 极差 差 烂 坏 坏了 讨厌 讨厌 讨厌 难过 难受 伤心 悲伤 痛苦 痛 苦 累 疲惫 疲倦 疲劳 生气 愤怒 怒 气 愁 烦 烦恼 烦躁 焦虑 紧张 害怕 恐惧 吓 惊恐 失望 失败 输 亏 损失 坏 慢 卡 难用 难吃 难看 难听 脏 乱 吵 假 骗 骗子 欺骗 错 错误 错 过期 过时 老旧 破 损坏 坏 有毒 危险 危害 伤害 受伤 病 病了 懒 弱 差劲 无用 没用 废物 垃圾 恶心 讨厌 抱歉 抱歉 遗憾 悲惨 可怜 凄惨 倒霉 晦气 烂'.split(/[ ]/).filter((v,i,a)=>a.indexOf(v)===i);
const ZH_POSSET = new Set(ZH_POS);
const ZH_NEGSET = new Set(ZH_NEG);

function isChinese(text){ return /[\u4e00-\u9fff]/.test(text); }

function analyzeEN(text){
  const tokens = text.toLowerCase().match(/[a-z']+|[.,!?;:]/gi) || [];
  let score = 0, posHits = 0, negHits = 0, n = 0;
  const hits = [];
  for(let i=0;i<tokens.length;i++){
    const w = tokens[i];
    let val = POS[w] !== undefined ? POS[w] : (NEG[w] !== undefined ? NEG[w] : 0);
    if(val === 0) continue;
    let mult = 1;
    // look back for intensifier then negator
    let j = i-1, negated = false, intens = 1;
    while(j>=0 && /^[.,!?;:]$/.test(tokens[j])) j--;
    if(INTENSIFIERS[tokens[j]]) { intens = INTENSIFIERS[tokens[j]]; j--; }
    while(j>=0 && /^[.,!?;:]$/.test(tokens[j])) j--;
    if(NEGATORS.has(tokens[j]) || (tokens[j] && tokens[j].endsWith("n't"))) { negated = true; }
    const final = (negated ? -val : val) * intens;
    score += final;
    n++;
    if(val > 0){ posHits++; } else { negHits++; }
    hits.push({ word:w, val: final, orig: val, negated, intens });
  }
  return { score, n, posHits, negHits, hits, tokens: tokens.length };
}

function analyzeZH(text){
  let score = 0, posHits = 0, negHits = 0, n = 0;
  const hits = [];
  // word-level scan for multi-char lexicon entries, then single-char fallback
  for(const w of ZH_POSSET){ const c = countOccurrences(text, w); if(c){ score += c*2; posHits += c; n += c; hits.push({word:w, val:c*2, orig:2, negated:false}); } }
  for(const w of ZH_NEGSET){ const c = countOccurrences(text, w); if(c){ score -= c*2; negHits += c; n += c; hits.push({word:w, val:-c*2, orig:-2, negated:false}); } }
  // negation char 不 / 没 / 无 right before
  return { score, n, posHits, negHits, hits, tokens: text.replace(/\s/g,'').length };
}
function countOccurrences(hay, needle){ if(!needle) return 0; let c=0, idx=0; while((idx = hay.indexOf(needle, idx)) !== -1){ c++; idx += needle.length; } return c; }

const EMOTIONS = {
  joy: { pos:['happy','joy','joyful','glad','delight','love','excited','great','wonderful','amazing','pleased','enjoy','beautiful','lovely'], neg:[], emoji:'😊' },
  trust: { pos:['trust','reliable','safe','secure','helpful','honest','faithful','loyal','supportive'], neg:[], emoji:'🤝' },
  surprise: { pos:['amazing','surprised','shocked','incredible','wow','unexpected','astonishing'], neg:['shocked','horrified'], emoji:'😮' },
  anger: { pos:[], neg:['angry','anger','furious','mad','annoyed','annoying','rage','hate','frustrated','irritated'], emoji:'😠' },
  sadness: { pos:[], neg:['sad','unhappy','depressed','miserable','lonely','grief','sorrow','heartbroken','crying','tears'], emoji:'😢' },
  fear: { pos:[], neg:['afraid','scared','terrified','fear','anxious','worried','nervous','panic','dread'], emoji:'😨' },
};

function emotionScores(text, hits){
  const lower = text.toLowerCase();
  const out = {};
  for(const e in EMOTIONS){
    let s = 0;
    for(const w of EMOTIONS[e].pos){ if(lower.includes(w)) s += hits.filter(h=>h.word===w).reduce((a,b)=>a+Math.abs(b.val),0) || (lower.includes(w)?1:0); }
    for(const w of EMOTIONS[e].neg){ if(lower.includes(w)) s += hits.filter(h=>h.word===w).reduce((a,b)=>a+Math.abs(b.val),0) || (lower.includes(w)?1:0); }
    out[e] = s;
  }
  return out;
}

function doAnalyze(){
  const text = $('#input').value.trim();
  if(!text){ $('#output').innerHTML = `<div style="padding:24px;text-align:center;color:var(--text2)">${t('noText')}</div>`; return; }
  const r = isChinese(text) ? analyzeZH(text) : analyzeEN(text);
  const lang = GZI18n.getLang();
  const norm = r.n > 0 ? Math.max(-1, Math.min(1, r.score / (r.n * 3))) : 0;
  let verdict, emoji, color;
  if(r.n === 0){ verdict = t('neutral'); emoji='😐'; color='var(--text2)'; }
  else if(norm > 0.15){ verdict = t('positive'); emoji='😊'; color='#4ade80'; }
  else if(norm < -0.15){ verdict = t('negative'); emoji='😟'; color='#f87171'; }
  else { verdict = t('neutral'); emoji='😐'; color='var(--text2)'; }

  const emo = emotionScores(text, r.hits);
  const emoTotal = Object.values(emo).reduce((a,b)=>a+b,0) || 1;
  const emoRows = Object.entries(emo).map(([k,v]) => {
    const pct = Math.round((v/emoTotal)*100);
    return `<div class="sa-emo-row"><span class="ico">${EMOTIONS[k].emoji}</span><span class="nm">${t(k)}</span><div class="sa-emo-track"><div class="sa-emo-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--accent),var(--accent2))"></div></div><span class="sa-emo-pct">${v>0?pct+'%':t('none')}</span></div>`;
  }).join('');

  const posPct = r.n ? Math.round(r.posHits/r.n*100) : 0;
  const negPct = r.n ? Math.round(r.negHits/r.n*100) : 0;
  const neuPct = Math.max(0, 100 - posPct - negPct);

  const wordsHtml = r.hits.length ? r.hits.map(h => {
    const cls = h.val > 0 ? 'sa-pos' : 'sa-neg';
    const negMark = h.negated ? `<span class="sa-negator">not</span> ` : '';
    const intMark = h.intens > 1 ? `×${h.intens.toFixed(1)} ` : '';
    return `<span class="${cls}" title="${h.orig>0?'+':''}${h.orig}${h.negated?' (negated)':''}">${negMark}${intMark}${h.word}</span>`;
  }).join(' · ') : `<span style="color:var(--text2)">${t('none')}</span>`;

  $('#output').innerHTML = `
    <div class="sa-verdict" style="background:linear-gradient(180deg,${color}15,transparent)">
      <div class="sa-emoji">${emoji}</div>
      <div class="sa-label" style="color:${color}">${verdict}</div>
      <div class="sa-score">${t('polarity')}: ${norm.toFixed(2)} (${r.score>0?'+':''}${r.score})</div>
    </div>
    <div class="sa-bars">
      <div class="sa-bar"><div class="ico">😊</div><div class="nm">${t('positive')}</div><div class="vl" style="color:#4ade80">${posPct}%</div></div>
      <div class="sa-bar"><div class="ico">😐</div><div class="nm">${t('neutral')}</div><div class="vl">${neuPct}%</div></div>
      <div class="sa-bar"><div class="ico">😟</div><div class="nm">${t('negative')}</div><div class="vl" style="color:#f87171">${negPct}%</div></div>
    </div>
    <div class="sa-emotions">
      <div style="font-size:.85rem;color:var(--text2);margin:14px 0 6px">${t('emotions')}</div>
      ${emoRows}
    </div>
    <div style="font-size:.85rem;color:var(--text2);margin:14px 0 6px">${t('highlightWords')}</div>
    <div class="sa-words">${wordsHtml}</div>
  `;
}

function loadExample(){
  $('#input').value = "I was a bit skeptical at first, but this product is absolutely amazing! The build quality is fantastic and it works flawlessly. The support team was super helpful and friendly. However, the shipping was slow and the packaging was a little disappointing. Overall I'm really happy and would definitely recommend it.";
  doAnalyze();
}
function doClear(){ $('#input').value=''; $('#output').innerHTML=''; }

$('#input').addEventListener('input', doAnalyze);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>

});
