function tokenize(text){
  return text.toLowerCase().match(/[a-zà-öø-ÿāăąćĉċčďđēĕėęěĝğġģĥħīĭįıĳĵķĸĺļľłńņňōŏőŕŗřśŝşšţťŧūŭůűųŵŷźżž]+(?:[-'][a-zà-öø-ÿ]+)*/gi) || [];
}

function detect(text){
  if(!text || text.trim().length < 2) return null;
  const scores = {};
  const trimmed = text.trim();

  // 1. Try non-Latin scripts first via Unicode ranges
  for(const s of SCRIPTS){
    const matches = (trimmed.match(new RegExp(s.re.source, 'g')) || []).length;
    if(matches >= 2){
      scores[s.code] = { lang:s, score: matches, method:'script' };
    }
  }

  // 2. Latin-script: stopword + marker scoring
  const latinChars = (trimmed.match(/[a-zà-ÿ]/gi) || []).length;
  if(latinChars >= trimmed.length * 0.3){
    const tokens = tokenize(trimmed);
    for(const code in LANGS){
      const L = LANGS[code];
      let hits = 0;
      for(const w of tokens){ if(L.words.has(w)) hits++; }
      let score = hits;
      // Add marker bonuses
      if(L.marks){ for(const re of L.marks){ score += (trimmed.match(re) || []).length * 2; } }
      if(score > 0) scores[code] = { lang:L, score, method:'latin', tokens:tokens.length };
    }

    // Cyrillic disambiguation: ru vs uk via markers
    if(scores['uk'] && scores['ru']){
      const ukrMarks = (trimmed.match(/[іїєґ]/gi) || []).length;
      if(ukrMarks >= 2){ scores['uk'].score += ukrMarks * 5; }
    }
  }

  // Rank
  const ranked = Object.entries(scores).map(([code, v]) => {
    let conf;
    if(v.method === 'script'){
      const totalScript = Object.values(scores).filter(x=>x.method==='script').reduce((a,b)=>a+b.score,0);
      conf = Math.min(99, Math.round((v.score / Math.max(1, totalScript)) * 100 * 0.7 + v.score));
    } else {
      const totalLatin = Object.values(scores).filter(x=>x.method==='latin').reduce((a,b)=>a+b.score,0);
      conf = Math.round((v.score / Math.max(1, totalLatin)) * 100);
    }
    return { code, lang:v.lang, score:v.score, conf: Math.max(1, conf), method:v.method };
  }).sort((a,b)=> b.score - a.score || b.conf - a.conf);

  if(ranked.length === 0) return null;

  // Normalize confidence so top = up to 99
  const top = ranked[0];
  const sum = ranked.reduce((a,b)=>a+b.score,0) || 1;
  ranked.forEach(r => { r.pct = Math.round((r.score/sum)*100); });
  top.conf = Math.min(99, Math.max(50, top.pct + 30));
  if(ranked.length === 1) top.conf = Math.max(85, top.conf);

  return ranked;
}

  if(!ranked){ $('#output').innerHTML = `<div style="padding:24px;text-align:center;color:var(--text2)">${t('noResult')}</div>`; return; }
  const top = ranked[0];
  const name = lang === 'zh' ? top.lang.zh : top.lang.en;
  const scriptLabel = SCRIPT_NAMES[top.lang.script] || top.lang.script;
  const conf = top.conf;

  let others = ranked.slice(1, 6).map(r => {
    const nm = lang === 'zh' ? r.lang.zh : r.lang.en;
    return `<div class="ld-other-row"><span class="ld-flag" style="font-size:1.3rem">${r.lang.flag}</span><span class="nm">${nm}</span><span class="cd">${r.code}</span><span class="pct">${r.pct}%</span></div>`;
  }).join('');

  $('#output').innerHTML = `
    <div class="ld-result">
      <div class="ld-flag">${top.lang.flag}</div>
      <div class="ld-lang-name">${name}</div>
      <div class="ld-lang-code">${top.code.toUpperCase()}</div>
      <div class="ld-script">${t('script')}: ${scriptLabel}</div>
      <div class="ld-conf-wrap">
        <div class="ld-conf-bar"><div class="ld-conf-fill" style="width:${conf}%"></div></div>
        <div class="ld-conf-label"><span>${t('confidence')}</span><span>${conf}%</span></div>
      </div>
    </div>
    ${others ? `<div class="ld-others"><div style="font-size:.85rem;color:var(--text2);margin-bottom:6px">${t('otherMatches')}</div>${others}</div>` : ''}
  `;
}

function doDetect(){
  const text = $('#input').value;
  render(detect(text));
}

function loadExample(){
  const samples = [
    'The quick brown fox jumps over the lazy dog. This is an English sentence used to demonstrate language detection in the browser.',
    'El rápido zorro marrón salta sobre el perro perezoso. Esta es una oración en español para demostrar la detección de idiomas.',
    'Le rapide renard brun saute par-dessus le chien paresseux. Ceci est une phrase en français pour démontrer la détection de la langue.',
    '快速的棕色狐狸跳过懒狗。这是一个用于演示浏览器内语言检测的中文句子。',
    '速い茶色の狐が怠け者の犬を飛び越えます。これは言語検出を示すための日本語の文章です。',
  ];
  $('#input').value = samples[Math.floor(Math.random()*samples.length)];
  doDetect();
}

function doClear(){ $('#input').value=''; $('#output').innerHTML=''; }

$('#input').addEventListener('input', doDetect);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

  ]
});
