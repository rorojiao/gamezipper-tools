<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is EV range calculated?", "acceptedAnswer": {"@type": "Answer", "text": "EV range is calculated by dividing the usable battery capacity (in kWh) by the vehicle's energy consumption rate (kWh per 100 km or miles per kWh), then multiplying by the appropriate unit. This tool does the math instantly for both metric and imperial units."}}, {"@type": "Question", "name": "What factors affect electric vehicle range?", "acceptedAnswer": {"@type": "Answer", "text": "Speed, temperature, climate control use, terrain, tire pressure, payload and driving style all affect EV range. Cold weather can reduce range by 10-40%. This calculator provides a baseline estimate you can adjust for real-world conditions."}}, {"@type": "Question", "name": "Does this tool support miles per kWh and kWh/100km?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. You can switch between metric (kWh per 100km) and imperial (miles per kWh) efficiency units. The calculator handles the conversion automatically and shows range in the matching distance unit."}}, {"@type": "Question", "name": "Is my data sent to any server?", "acceptedAnswer": {"@type": "Answer", "text": "No. All calculations happen entirely in your browser. No data is ever sent to any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-form" id="form">
      <div>
        <label id="lbl-unit"></label>
        <select id="unit">
          <option value="metric">kWh/100km</option>
          <option value="imperial">mi/kWh</option>
        </select>
      </div>
      <div>
        <label id="lbl-battery"></label>
        <input type="number" id="battery" value="75" min="0" step="0.1">
      </div>
      <div>
        <label id="lbl-consumption"></label>
        <input type="number" id="consumption" value="17" min="0" step="0.1">
      </div>
      <div>
        <label id="lbl-usable"></label>
        <input type="number" id="usable" value="90" min="0" max="100" step="1">
      </div>
      <button class="gz-btn" onclick="calculate()" id="btn-calc"></button>
    </div>
    <div class="result-card" id="result" style="display:none">
      <div class="big" id="result-range"></div>
      <div class="label" id="result-label"></div>
      <div class="result-grid">
        <div class="result-item"><div class="val" id="result-energy"></div><div class="lbl" id="result-energy-label"></div></div>
        <div class="result-item"><div class="val" id="result-cost"></div><div class="lbl" id="result-cost-label"></div></div>
        <div class="result-item"><div class="val" id="result-cost-per-unit"></div><div class="lbl" id="result-cpu-label"></div></div>
        <div class="result-item"><div class="val" id="result-charge-time"></div><div class="lbl" id="result-ct-label"></div></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'EV Range Calculator',
    toolDesc: 'Estimate your electric vehicle driving range from battery capacity and energy consumption. Supports kWh/100km and miles/kWh.',
    lblUnit: 'Efficiency Unit',
    lblBattery: 'Battery Capacity (kWh)',
    lblConsumption: 'Energy Consumption (kWh/100km)',
    lblConsumptionImp: 'Efficiency (miles/kWh)',
    lblUsable: 'Usable Battery %',
    btnCalc: 'Calculate EV Range',
    resultLabel: 'Estimated Driving Range',
    energyPer100: 'Energy per 100 km',
    chargeCost: 'Full Charge Cost',
    costPerDist: 'Cost per km',
    costPerDistImp: 'Cost per mile',
    chargeTime: 'Charge Time @7kW',
    step1: 'Select metric (kWh/100km) or imperial (mi/kWh) units',
    step2: 'Enter your EV battery capacity in kWh',
    step3: 'Enter the energy consumption or efficiency rating',
    step4: 'Optionally set usable battery % and electricity price, then click Calculate',
  },
  zh: {
    toolTitle: '电动车续航计算器',
    toolDesc: '根据电池容量和能耗估算电动车的续航里程。支持 kWh/100km 和 英里/kWh。',
    lblUnit: '能耗单位',
    lblBattery: '电池容量（kWh）',
    lblConsumption: '能耗（kWh/100km）',
    lblConsumptionImp: '能效（英里/kWh）',
    lblUsable: '可用电量百分比',
    btnCalc: '计算续航里程',
    resultLabel: '预计续航里程',
    energyPer100: '百公里能耗',
    chargeCost: '满电充电费用',
    costPerDist: '每公里电费',
    costPerDistImp: '每英里电费',
    chargeTime: '7kW 充电时间',
    step1: '选择公制（kWh/100km）或英制（英里/kWh）',
    step2: '输入电动车电池容量（kWh）',
    step3: '输入能耗或能效数值',
    step4: '可选设置可用电量百分比和电价，然后点击计算',
  }
});

const { $, copyText, t } = GZ;
const lang = GZI18n.getLang();

function updateLabels() {
  const u = $('#unit').value;
  const isImp = u === 'imperial';
  $('#lbl-consumption').textContent = isImp ? t('lblConsumptionImp') : t('lblConsumption');
}

function calculate() {
  const u = $('#unit').value;
  const isImp = u === 'imperial';
  const batteryTotal = parseFloat($('#battery').value) || 0;
  const cons = parseFloat($('#consumption').value) || 0;
  const usablePct = parseFloat($('#usable').value) || 100;
  const usableBattery = batteryTotal * usablePct / 100;

  let range;
  if (isImp) {
    // cons = miles per kWh
    range = cons > 0 ? usableBattery * cons : 0;
  } else {
    // cons = kWh per 100km
    range = cons > 0 ? (usableBattery / cons) * 100 : 0;
  }

  const electricityPrice = 0.15; // $/kWh default
  const chargeCost = usableBattery * electricityPrice;

  $('#result').style.display = '';
  const distUnit = isImp ? ' mi' : ' km';
  $('#result-range').textContent = Math.round(range).toLocaleString() + distUnit;
  $('#result-label').textContent = t('resultLabel');

  if (isImp) {
    $('#result-energy').textContent = cons.toFixed(1) + ' mi/kWh';
    $('#result-cost-per-unit').textContent = '$' + (range > 0 ? (chargeCost / range).toFixed(3) : '0') + '/mi';
  } else {
    $('#result-energy').textContent = cons.toFixed(1) + ' kWh/100km';
    $('#result-cost-per-unit').textContent = '$' + (range > 0 ? (chargeCost / range).toFixed(3) : '0') + '/km';
  }
  $('#result-energy-label').textContent = t('energyPer100');
  $('#result-cost').textContent = '$' + chargeCost.toFixed(2);
  $('#result-cost-label').textContent = t('chargeCost');
  $('#result-cpu-label').textContent = isImp ? t('costPerDistImp') : t('costPerDist');

  const chargeHours = usableBattery / 7; // 7kW home charger
  const h = Math.floor(chargeHours);
  const m = Math.round((chargeHours - h) * 60);
  $('#result-charge-time').textContent = h + 'h ' + m + 'm';
  $('#result-ct-label').textContent = t('chargeTime');
}

$('#btn-calc').textContent = t('btnCalc');
$('#unit').addEventListener('change', updateLabels);
updateLabels();
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⛽', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost'},
    {icon:'🚗', href:'/calc/car-payment-calculator.html', name:'Car Payment'},
    {icon:'🔋', href:'/calc/battery-charge-time.html', name:'Battery Charge Time'},
    {icon:'💡', href:'/calc/electricity-cost.html', name:'Electricity Cost'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
