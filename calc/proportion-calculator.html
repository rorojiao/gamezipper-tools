<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  </div>
  <div class="gz-tool-area">

    <div class="pc-wrap">

          <div class="pc-field"><input type="text" id="a" inputmode="decimal" placeholder="a"><div class="pc-bar"></div><input type="text" id="b" inputmode="decimal" placeholder="b"></div>
        </div>
        <div class="pc-equals">=</div>
        <div class="pc-eqrow">
          <div class="pc-field"><input type="text" id="c" inputmode="decimal" placeholder="c"><div class="pc-bar"></div><input type="text" id="d" inputmode="decimal" placeholder="d"></div>

      </div>

    </div>
  </div>

</div>
<script>
GZI18n.register({
  en:{
    toolTitle:'Proportion Calculator',
    toolDesc:'Solve any proportion a/b = c/d. Enter three values and leave the unknown blank — the tool cross-multiplies to find the missing number instantly, with step-by-step working. Free and 100% in your browser.',
    solve:'Solve',
    clear:'Clear',
    example:'Example',
    hint:'Enter any 3 values and leave the one you want to find blank',
    errCount:'Leave exactly ONE field empty (the unknown to solve for)',
    errNum:'Please enter valid numbers in the 3 known fields',
    errDivide:'Cannot solve — that would divide by zero',
    solved:'Solved',
    step:'Step',
    crossMult:'Cross-multiply:',
    step1:'Enter any three of the four values (a, b, c, d)',
    step2:'Leave the value you want to find completely blank',
    step3:'Click Solve — the missing value is found by cross-multiplying',
    step4:'Read the step-by-step working to see how the result was calculated',
  },
  zh:{
    toolTitle:'比例计算器',
    toolDesc:'求解任意比例 a/b = c/d。输入三个值并留空未知项 — 工具通过交叉相乘即时求出缺失的数字，并显示分步过程。免费、100% 浏览器本地运行。',
    solve:'求解',
    clear:'清除',
    example:'示例',
    hint:'输入任意 3 个值，留空你想求的那一个',
    errCount:'请只留空一个字段（要求解的未知项）',
    errNum:'请在 3 个已知字段中输入有效数字',
    errDivide:'无法求解 — 这将导致除以零',
    solved:'已求解',
    step:'步骤',
    crossMult:'交叉相乘：',
    step1:'输入四个值（a、b、c、d）中的任意三个',
    step2:'将你想求的值完全留空',
    step3:'点击「求解」— 通过交叉相乘求出缺失值',
    step4:'查看分步过程，了解结果是如何算出的',
  }
});
const {$,t}=GZ;
const fmt=n=>{if(!isFinite(n))return '—';const r=Math.round(n*1e10)/1e10;return String(r);};

function val(id){const v=$('#'+id).value.trim();return v===''?null:Number(v);}
function isNum(n){return n!==null&&!isNaN(n)&&isFinite(n);}

function solve(){
  $('#err').textContent='';$('#result').style.display='none';$('#steps').style.display='none';
  const a=val('a'),b=val('b'),c=val('c'),d=val('d');
  const fields={a,b,c,d};
  const empty=Object.keys(fields).filter(k=>fields[k]===null);
  if(empty.length!==1){$('#err').textContent=t('errCount');return;}
  const unknown=empty[0];
  const known=[a,b,c,d];
  if(known.some((v,i)=>Object.keys(fields)[i]!==unknown&&!isNum(v))){$('#err').textContent=t('errNum');return;}
  let result, workHtml='';
  const A=Number(a),B=Number(b),C=Number(c),D=Number(d);
  // a/b = c/d  => cross multiply: a*d = b*c
  try{
    if(unknown==='a'){ if(B===0)throw 0; result=C*B/D; if(!isFinite(result))throw 0; workHtml=`${fmt(C)} × ${fmt(B)} ÷ ${fmt(D)} = ${fmt(result)}`; }
    else if(unknown==='b'){ if(D===0)throw 0; result=A*D/C; if(!isFinite(result))throw 0; workHtml=`${fmt(A)} × ${fmt(D)} ÷ ${fmt(C)} = ${fmt(result)}`; }
    else if(unknown==='c'){ if(B===0)throw 0; result=A*D/B; if(!isFinite(result))throw 0; workHtml=`${fmt(A)} × ${fmt(D)} ÷ ${fmt(B)} = ${fmt(result)}`; }
    else if(unknown==='d'){ if(A===0)throw 0; result=B*C/A; if(!isFinite(result))throw 0; workHtml=`${fmt(B)} × ${fmt(C)} ÷ ${fmt(A)} = ${fmt(result)}`; }
  }catch(e){$('#err').textContent=t('errDivide');return;}
  $('#'+unknown).value=fmt(result);
  $('#'+unknown).classList.add('unknown');
  $('#reslbl').textContent=unknown+' =';
  $('#val').textContent=fmt(result);
  $('#result').style.display='block';
  const filled={a:isNum(a)?fmt(A):(unknown==='a'?fmt(result):'?'),b:isNum(b)?fmt(B):(unknown==='b'?fmt(result):'?'),c:isNum(c)?fmt(C):(unknown==='c'?fmt(result):'?'),d:isNum(d)?fmt(D):(unknown==='d'?fmt(result):'?')};
  $('#steps').innerHTML=`<div><span class="hl">${t('crossMult')}</span> ${filled.a} × ${filled.d} = ${filled.b} × ${filled.c}</div><div><span class="hl">${unknown} =</span> ${workHtml}</div>`;
  $('#steps').style.display='block';
}

function doClear(){['a','b','c','d'].forEach(id=>{$('#'+id).value='';$('#'+id).classList.remove('unknown');});$('#err').textContent='';$('#result').style.display='none';$('#steps').style.display='none';}
function loadExample(){doClear();$('#a').value='3';$('#b').value='4';$('#c').value='9';solve();}

$('#hint').textContent=t('hint');
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="solve()">⚖️ ${t('solve')}</button><button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button><button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
['a','b','c','d'].forEach(id=>{$('#'+id).addEventListener('input',()=>$('#'+id).classList.remove('unknown'));$('#'+id).addEventListener('keydown',e=>{if(e.key==='Enter')solve();});});

GZ.renderToolPage({category:'calc',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[
  {icon:'%',href:'/calc/percentage-calculator.html',name:'Percentage Calculator'},
  {icon:'📊',href:'/calc/average-calculator.html',name:'Average Calculator'},
  {icon:'⚖️',href:'/calc/ratio-calculator.html',name:'Ratio Calculator'},
  
]});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
