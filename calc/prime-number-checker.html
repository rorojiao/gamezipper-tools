    detailPrime: '✅ <b>%1</b> is divisible only by <b>1</b> and <b>itself</b>. It is the <b>#%2</b> prime number.',
    detailComposite: '❌ <b>%1</b> is composite. Its smallest divisor greater than 1 is <b>%2</b>, because %1 ÷ %2 = <b>%3</b>.',
    step1: 'Type any whole number (positive integer) into the box',

    step3: 'Read the verdict — prime or composite — and see why',

  },
  zh: {

    toolDesc: '检测任意数字（最大 10^15）是否为质数。即时显示下一个/上一个质数、最小因数和质数序号。',
    lblNum: '要检测的数字',
    btnCalc: '检测是否为质数',
    resultLabel: '检测结果',
    next: '下一个质数',
    prev: '上一个质数',
    smallestFactor: '最小因数（除 1 外）',
    index: '质数序号',
    isPrime: '是质数',
    notPrime: '不是质数',
    isOne: '1 既不是质数也不是合数',
    isZero: '0 不是质数',
    isNeg: '负数不是质数',
    detailPrime: '✅ <b>%1</b> 只能被 <b>1</b> 和 <b>它本身</b>整除。它是第 <b>#%2</b> 个质数。',
    detailComposite: '❌ <b>%1</b> 是合数。它大于 1 的最小因数是 <b>%2</b>，因为 %1 ÷ %2 = <b>%3</b>。',
    step1: '在输入框中输入任意正整数',
    step2: '点击「检测是否为质数」',
    step3: '查看结果 — 质数还是合数，以及原因',
    step4: '浏览下一个质数、上一个质数和最小因数',
  }
});

const { $, t } = GZ;

function isPrime(n) {
  if (n < 2n) return false;
  if (n < 4n) return true;
  if (n % 2n === 0n) return false;
  if (n % 3n === 0n) return n === 3n;
  // trial division 6k ± 1, up to sqrt(n)
  for (let i = 5n; i * i <= n; i += 6n) {
    if (n % i === 0n) return false;
    if (n % (i + 2n) === 0n) return false;
  }
  return true;
}

function smallestFactor(n) {
  if (n < 2n) return null;
  if (n % 2n === 0n) return 2n;
  if (n % 3n === 0n) return 3n;
  for (let i = 5n; i * i <= n; i += 6n) {
    if (n % i === 0n) return i;
    if (n % (i + 2n) === 0n) return i + 2n;
  }
  return n; // itself prime
}

function nextPrime(n) { let x = n + 1n; while (!isPrime(x)) x++; return x; }
function prevPrime(n) { if (n <= 2n) return null; let x = n - 1n; while (x >= 2n && !isPrime(x)) x--; return x >= 2n ? x : null; }

// approximate prime index using prime-counting approximation Li(n) - works well for display
function primeIndex(n) {
  // count primes up to n by direct enumeration (fine for n <= ~1e7; else estimate)
  if (n <= 10000000n) {
    let count = 0n;
    for (let i = 2n; i <= n; i++) if (isPrime(i)) count++;
    return Number(count);
  }
  // Li approximation
  const ln = Math.log(Number(n));
  const li = Number(n) / ln;
  return Math.round(li);
}

function check() {
  const raw = $('#num').value.trim();
  if (raw === '') return;
  let n;
  try { n = BigInt(raw); } catch (e) { return; }

  const verdictEl = $('#result-verdict');
  const labelEl = $('#result-label');
  const detailEl = $('#detail');

  $('#result').style.display = '';
  labelEl.textContent = t('resultLabel');

  if (n < 0n) {
    verdictEl.textContent = t('isNeg');
    verdictEl.className = 'big composite';
    $('#result-next').textContent = '—';
    $('#result-prev').textContent = '—';
    $('#result-smallestfactor').textContent = '—';
    $('#result-index').textContent = '—';
    detailEl.innerHTML = '❌ ' + raw + ' ' + t('isNeg') + '.';
    return;
  }
  if (n === 0n) {
    verdictEl.textContent = t('isZero');
    verdictEl.className = 'big composite';
    detailEl.innerHTML = '0 ' + t('isZero') + '.';
    return;
  }
  if (n === 1n) {
    verdictEl.textContent = t('isOne');
    verdictEl.className = 'big composite';
    detailEl.innerHTML = '1 ' + t('isOne') + '.';
    return;
  }

  const prime = isPrime(n);
  verdictEl.textContent = raw + ' ' + (prime ? t('isPrime') : t('notPrime'));
  verdictEl.className = 'big ' + (prime ? 'prime' : 'composite');

  $('#result-next').textContent = nextPrime(n).toString();
  $('#result-next-label').textContent = t('next');
  const p = prevPrime(n);
  $('#result-prev').textContent = p ? p.toString() : '—';
  $('#result-prev-label').textContent = t('prev');

  if (prime) {
    const idx = primeIndex(n);
    $('#result-smallestfactor').textContent = '—';
    $('#result-smallestfactor-label').textContent = t('smallestFactor');
    $('#result-index').textContent = '#' + idx;
    $('#result-index-label').textContent = t('index');
    detailEl.innerHTML = t('detailPrime').replace('%1', raw).replace('%2', idx);
  } else {
    const f = smallestFactor(n);
    const q = n / f;
    $('#result-smallestfactor').textContent = f.toString();
    $('#result-smallestfactor-label').textContent = t('smallestFactor');
    $('#result-index').textContent = '—';
    $('#result-index-label').textContent = t('index');
    detailEl.innerHTML = t('detailComposite').replace(/%1/g, raw).replace('%2', f.toString()).replace('%3', q.toString());
  }
}

$('#btn-calc').textContent = t('btnCalc');
check();

});
</script>
