<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="dns-input-row">
      <input type="text" id="domain" placeholder="example.com" spellcheck="false">
      <select id="rtype">
        <option value="A">A</option>
        <option value="AAAA">AAAA</option>
        <option value="MX">MX</option>
        <option value="CNAME">CNAME</option>
        <option value="TXT">TXT</option>
        <option value="NS">NS</option>
        <option value="SOA">SOA</option>
        <option value="SRV">SRV</option>
      </select>
      <button class="gz-btn" onclick="doLookup()" id="btn-lookup"></button>
    </div>
    <div id="output"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'DNS Lookup Tool',
    toolDesc: 'Look up DNS records for any domain — A, AAAA, MX, CNAME, TXT, NS, SOA and more.',
    btnLookup: 'Lookup',
    name: 'Name',
    ttl: 'TTL',
    type: 'Type',
    value: 'Value',
    priority: 'Priority',
    noRecords: 'No records found for this domain and record type.',
    fetchError: 'Failed to fetch DNS records. Please check the domain name and try again.',
    loading: 'Looking up DNS records...',
    recordsFound: 'records found',
    queryFor: 'DNS lookup for',
    step1: 'Enter a domain name (e.g. example.com)',
    step2: 'Select the DNS record type you want to check',
    step3: 'Click Lookup to query the DNS records',
    step4: 'Review the results including TTL, values and priorities',
  },
  zh: {
    toolTitle: 'DNS 查询工具',
    toolDesc: '查询任意域名的 DNS 记录 — A、AAAA、MX、CNAME、TXT、NS、SOA 等。',
    btnLookup: '查询',
    name: '名称',
    ttl: 'TTL',
    type: '类型',
    value: '值',
    priority: '优先级',
    noRecords: '未找到该域名和记录类型的相关记录。',
    fetchError: '获取 DNS 记录失败，请检查域名后重试。',
    loading: '正在查询 DNS 记录...',
    recordsFound: '条记录',
    queryFor: 'DNS 查询',
    step1: '输入域名（如 example.com）',
    step2: '选择要查询的 DNS 记录类型',
    step3: '点击「查询」获取 DNS 记录',
    step4: '查看结果，包括 TTL、值和优先级',
  }
});

const { $, copyText, t } = GZ;

async function doLookup() {
  let domain = $('#domain').value.trim();
  if (!domain) return;
  domain = domain.replace(/^https?:\/\//, '').replace(/\/.*$/, '').replace(/^www\./, '');
  const rtype = $('#rtype').value;
  const output = $('#output');
  output.innerHTML = `<div class="dns-loading">${t('loading')}</div>`;

  try {
    const res = await fetch(`https://cloudflare-dns.com/dns-query?name=${encodeURIComponent(domain)}&type=${rtype}`, {
      headers: { 'Accept': 'application/dns-json' }
    });
    const data = await res.json();

    if (!data.Answer || data.Answer.length === 0) {
      output.innerHTML = `<div class="dns-error">${t('noRecords')}</div>`;
      return;
    }

    let html = `<div class="dns-stats">
      <div class="dns-stat"><div class="num">${data.Answer.length}</div><div class="lbl">${t('recordsFound')}</div></div>
      <div class="dns-stat"><div class="num">${t('queryFor')}</div><div class="lbl">${domain} / ${rtype}</div></div>
    </div>`;
    html += '<table class="dns-table"><thead><tr><th>' + t('name') + '</th><th>' + t('type') + '</th><th>' + t('ttl') + '</th><th>' + t('value') + '</th></tr></thead><tbody>';
    for (const r of data.Answer) {
      html += `<tr><td>${r.name}</td><td><span class="dns-badge">${r.type === 1 ? 'A' : r.type === 28 ? 'AAAA' : r.type === 15 ? 'MX' : r.type === 5 ? 'CNAME' : r.type === 16 ? 'TXT' : r.type === 2 ? 'NS' : r.type === 6 ? 'SOA' : r.type === 33 ? 'SRV' : r.type}</span></td><td>${r.TTL}s</td><td>${r.data}</td></tr>`;
    }
    html += '</tbody></table>';
    output.innerHTML = html;
  } catch (e) {
    output.innerHTML = `<div class="dns-error">${t('fetchError')}<br><small>${e.message}</small></div>`;
  }
}

$('#domain').addEventListener('keydown', e => { if (e.key === 'Enter') doLookup(); });

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌐', href:'/dev/url-encode.html', name:'URL Encoder'},
    {icon:'🎫', href:'/dev/jwt.html', name:'JWT Decoder'},
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'🌐', href:'/dev/browser-info.html', name:'Browser Info'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
