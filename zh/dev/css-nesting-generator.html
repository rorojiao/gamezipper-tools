const { $, copyText, t } = GZ;

function nestCSS(css) {
  const rules = [];
  const regex = /([^{}]+)\{([^{}]*)\}/g;
  let m;
  while ((m = regex.exec(css)) !== null) {
    const sel = m[1].trim();
    const body = m[2].trim();
    if (sel && body !== undefined) rules.push({ sel, body });
  }

  // Group by common prefix
  const groups = {};
  const order = [];
  for (const r of rules) {
    const parts = r.sel.split(/\s+/);
    const parent = parts[0];
    const rest = parts.slice(1).join(' ');
    if (!groups[parent]) { groups[parent] = { parent, children: [] }; order.push(parent); }
    groups[parent].children.push({ rest, body: r.body, full: r.sel });
  }

  let result = '';
  for (const parent of order) {
    const g = groups[parent];
    const selfRule = g.children.find(c => !c.rest);
    const nestedRules = g.children.filter(c => c.rest);

    result += `${g.parent} {\n`;
    if (selfRule) {
      const props = selfRule.body.split(';').map(p => p.trim()).filter(Boolean);
      for (const p of props) result += `  ${p};\n`;
    }
    for (const child of nestedRules) {
      result += `  & ${child.rest} {\n`;
      const props = child.body.split(';').map(p => p.trim()).filter(Boolean);
      for (const p of props) result += `    ${p};\n`;
      result += `  }\n`;
    }
    result += `}\n`;
  }
  return result.trim();
}

function highlightCSS(css) {
  return css.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(\/\*[\s\S]*?\*\/)/g,'<span class="css-cmt">$1</span>')
    .replace(/([.#\w\-\[\]=~|^$*:"',>+~\s&()]+)\s*\{/g,'<span class="css-sel">$1</span>{')
    .replace(/([\w-]+)\s*:/g,'<span class="css-prop">$1</span>:')
    .replace(/:\s*([^;{}<]+)/g,': <span class="css-val">$1</span>');
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  const nested = nestCSS(inp);
  $('#output').innerHTML = highlightCSS(nested);
  $('#output').dataset.raw = nested;
}
