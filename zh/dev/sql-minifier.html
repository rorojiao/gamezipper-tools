<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is SQL minification?","acceptedAnswer":{"@type":"Answer","text":"SQL minification removes unnecessary whitespace, line breaks, indentation and comments from SQL queries, compressing them into a single compact line. This reduces query size for transmission or embedding in code."}},{"@type":"Question","name":"Does SQL minification remove comments?","acceptedAnswer":{"@type":"Answer","text":"Yes, by default the tool removes single-line (--) and multi-line (/* */) comments to achieve the smallest size. You can toggle this option if you want to keep comments."}},{"@type":"Question","name":"Will minification break my SQL?","acceptedAnswer":{"@type":"Answer","text":"No. The minifier preserves all SQL keywords, string literals, quoted identifiers and semicolons. Only unnecessary whitespace is removed. Semicolons are kept so statements remain separable."}},{"@type":"Question","name":"Is my SQL sent to a server?","acceptedAnswer":{"@type":"Answer","text":"No. All minification happens entirely in your browser. Your SQL queries never leave your device."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'SQL Minifier & Compressor',
    toolDesc: 'Compress SQL queries to one line by removing whitespace, comments and extra spaces. Get the size savings instantly.',
    lblIn: 'Input SQL',
    lblOut: 'Minified SQL',
    minify: 'Minify',
    removeComments: 'Remove Comments',
    saved: 'saved',
    bytes: 'bytes',
    step1: 'Paste your SQL query in the input area',
    step2: 'Choose whether to remove comments',
    step3: 'Click Minify and copy the compressed result',
  },
  zh: {
    toolTitle: 'SQL 压缩工具',
    toolDesc: '通过移除空白、注释和多余空格将 SQL 压缩为一行，即时显示节省的空间大小。',
    lblIn: '输入 SQL',
    lblOut: '压缩后的 SQL',
    minify: '压缩',
    removeComments: '移除注释',
    saved: '节省',
    bytes: '字节',
    step1: '在输入区粘贴 SQL 查询',
    step2: '选择是否移除注释',
    step3: '点击压缩并复制结果',
  }
});

const { $, copyText, t } = GZ;
let removeComments = true;

function formatBytes(n) { return n.toLocaleString() + ' ' + t('bytes'); }

function doMinify() {
  const inp = $('#input').value;
  if (!inp.trim()) return;
  let sql = inp;

  // Remove multi-line comments /* */
  sql = sql.replace(/\/\*[\s\S]*?\*\//g, removeComments ? '' : ' ');
  // Remove single-line comments -- (only when not inside a string)
  if (removeComments) {
    sql = sql.replace(/--[^\n]*/g, '');
  }
  // Protect strings by replacing them temporarily
  const strings = [];
  sql = sql.replace(/('(?:[^']|'')*'|"(?:[^"]|"")*"|`(?:[^`]|``)*`)/g, function(m){
    strings.push(m);
    return '\x00STR' + (strings.length - 1) + '\x00';
  });
  // Collapse whitespace
  sql = sql.replace(/\s+/g, ' ').trim();
  // Space before opening paren is fine to remove
  sql = sql.replace(/\s*\(\s*/g, '(').replace(/\s*\)/g, ')');
  // Restore strings
  sql = sql.replace(/\x00STR(\d+)\x00/g, function(_, i){ return strings[+i]; });
  // Ensure spacing around commas stays minimal
  sql = sql.replace(/\s*,\s*/g, ', ');
  // Tidy double spaces that may have appeared
  sql = sql.replace(/\s+/g, ' ').trim();

  const origSize = new Blob([inp]).size;
  const newSize = new Blob([sql]).size;
  const pct = origSize > 0 ? Math.round((1 - newSize / origSize) * 100) : 0;

  $('#output').value = sql;
  const color = pct > 0 ? 'var(--gz-success)' : 'var(--text2)';
  $('#status').innerHTML = `<span class="gz-stat">${formatBytes(origSize)} → <b>${formatBytes(newSize)}</b></span> <span class="gz-stat" style="color:${color}">${pct >= 0 ? '↓' : '↑'} ${Math.abs(pct)}% ${t('saved')}</span>`;
}

function loadExample() {
  $('#input').value = `-- Get top customers by total spending
SELECT
    u.id,
    u.name,
    u.email,
    COUNT(o.id)   AS order_count,
    SUM(o.total)  AS total_spent
FROM users u
/* Only active users */
INNER JOIN orders o ON u.id = o.user_id
WHERE u.status = 'active'
  AND o.created_at >= '2025-01-01'
GROUP BY u.id, u.name, u.email
HAVING SUM(o.total) > 1000
ORDER BY total_spent DESC
LIMIT 20;`;
  doMinify();
}

function doClear() { $('#input').value=''; $('#output').value=''; $('#status').innerHTML=''; }

$('#input').addEventListener('input', doMinify);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doMinify()">${t('minify')}</button>
  <label style="display:inline-flex;align-items:center;gap:4px;font-size:.85em;cursor:pointer">
    <input type="checkbox" id="opt-comments" checked onchange="removeComments=this.checked;doMinify()"> ${t('removeComments')}
  </label>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

  ]
});
</script>
