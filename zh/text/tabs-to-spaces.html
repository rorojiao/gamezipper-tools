<script>
GZI18n.register({
  en: {
    toolTitle: 'Tabs to Spaces Converter',
    toolDesc: 'Convert tabs to spaces or spaces to tabs with custom tab width. Fix indentation instantly.',
    tabSize: 'Tab Width',
    modeTabs: 'Tabs → Spaces',
    modeSpaces: 'Spaces → Tabs',
    trimLines: 'Trim trailing whitespace',
    converted: 'Converted',
    tabsFound: 'tabs found',
    spacesFound: 'leading spaces found',
    step1: 'Paste your code or text with tabs or spaces',
    step2: 'Choose conversion direction and tab width',
    step3: 'Click Convert to transform indentation',
    step4: 'Copy the result with properly formatted indentation',
  },
  zh: {
    toolTitle: 'Tab 转空格转换器',
    toolDesc: '将 Tab 转换为空格或将空格转换为 Tab，自定义缩进宽度，即时修复缩进问题。',
    tabSize: 'Tab 宽度',
    modeTabs: 'Tab → 空格',
    modeSpaces: '空格 → Tab',
    trimLines: '去除行尾空白',
    converted: '已转换',
    tabsFound: '个 Tab 已替换',
    spacesFound: '个行首空格已替换',
    step1: '粘贴包含 Tab 或空格的代码或文本',
    step2: '选择转换方向和 Tab 宽度',
    step3: '点击「转换」处理缩进',
    step4: '复制格式化后的结果',
  }
});

const { $, copyText, t } = GZ;
let mode = 'tabs2spaces';

function renderOptions() {
  $('#options').innerHTML = `
    <label><input type="radio" name="mode" value="tabs2spaces" ${mode==='tabs2spaces'?'checked':''} onchange="mode=this.value;doConvert()"> ${t('modeTabs')}</label>
    <label><input type="radio" name="mode" value="spaces2tabs" ${mode==='spaces2tabs'?'checked':''} onchange="mode=this.value;doConvert()"> ${t('modeSpaces')}</label>
    <label>${t('tabSize')}: <input type="number" id="tabsize" value="4" min="1" max="16" onchange="doConvert()"></label>
    <label><input type="checkbox" id="trim" checked onchange="doConvert()"> ${t('trimLines')}</label>`;
}

function doConvert() {
  const inp = $('#input').value;
  if (!inp) { $('#output').textContent = ''; $('#stat').textContent = ''; return; }
  const tabSize = parseInt($('#tabsize').value) || 4;
  const trim = $('#trim').checked;
  let result = inp;
  let count = 0;

  if (mode === 'tabs2spaces') {
    const lines = inp.split('\n');
    result = lines.map(line => {
      let converted = line;
      // Replace tabs with spaces
      while (converted.includes('\t')) {
        const idx = converted.indexOf('\t');
        const beforeTab = converted.substring(0, idx);
        const spacesNeeded = tabSize - (beforeTab.length % tabSize);
        converted = beforeTab + ' '.repeat(spacesNeeded) + converted.substring(idx + 1);
        count++;
      }
      return trim ? converted.trimEnd() : converted;
    }).join('\n');
    $('#stat').textContent = `${t('converted')}: ${count} ${t('tabsFound')}`;
  } else {
    const lines = inp.split('\n');
    result = lines.map(line => {
      let converted = line;
      // Replace leading spaces with tabs
      const leadingSpaces = converted.match(/^ +/);
      if (leadingSpaces) {
        const numSpaces = leadingSpaces[0].length;
        const numTabs = Math.floor(numSpaces / tabSize);
        const remaining = numSpaces % tabSize;
        converted = '\t'.repeat(numTabs) + ' '.repeat(remaining) + converted.trimStart();
        count += numTabs;
      }
      return trim ? converted.trimEnd() : converted;
    }).join('\n');
    $('#stat').textContent = `${t('converted')}: ${count} ${t('spacesFound')}`;
  }

  // Show result with visible whitespace
  const display = result.replace(/\t/g, '→   ').replace(/ /g, '·');
  $('#output').textContent = result;
  $('#output').textContent = result;
}

function loadExample() {
  $('#input').value = `function hello() {\n\tconst msg = "Hello World";\n\tif (msg) {\n\t\tconsole.log(msg);\n\t\treturn true;\n\t}\n\treturn false;\n}`;
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#stat').textContent = ''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')||'Convert'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

renderOptions();

  ]
});
