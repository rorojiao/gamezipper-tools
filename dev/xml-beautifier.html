const { $, copyText, t } = GZ;

function beautifyXML(src, opts){
  const indent = opts.indent;
  const out = [];
  let depth = 0;
  let i = 0, n = src.length;
  const pad = d => ' '.repeat(d * indent);

  while (i < n){
    const c = src[i];
    // Comment
    if (src.startsWith('<!--', i)){
      let end = src.indexOf('-->', i+4);
      if (end === -1) end = n; else end += 3;
      out.push(pad(depth) + src.slice(i, end));
      i = end;
      continue;
    }
    // CDATA
    if (src.startsWith('<![CDATA[', i)){
      let end = src.indexOf(']]>', i+9);
      if (end === -1) end = n; else end += 3;
      out.push(pad(depth) + src.slice(i, end));
      i = end;
      continue;
    }
    // Processing instruction <?xml ... ?>
    if (src.startsWith('<?', i)){
      let end = src.indexOf('?>', i+2);
      if (end === -1) end = n; else end += 2;
      out.push(src.slice(i, end));
      i = end;
      continue;
    }
    // DOCTYPE or other <!...>
    if (src.startsWith('<!', i)){
      let depth2 = 1, j = i + 2;
      while (j < n && depth2 > 0){
        if (src[j] === '<') depth2++;
        if (src[j] === '>') depth2--;
        if (depth2 === 0) { j++; break; }
        j++;
      }
      out.push(pad(depth) + src.slice(i, j).trim());
      i = j;
      continue;
    }
    // Closing tag
    if (src.startsWith('</', i)){
      let end = src.indexOf('>', i);
      if (end === -1) end = n; else end++;
      if (depth > 0) depth--;
      out.push(pad(depth) + src.slice(i, end));
      i = end;
      continue;
    }
    // Opening tag
    if (c === '<'){
      // find closing > that's not inside a string
      let j = i + 1, inStr = false;
      while (j < n){
        if (src[j] === '"' || src[j] === "'") inStr = !inStr;
        if (src[j] === '>' && !inStr){ j++; break; }
        j++;
      }
      const tag = src.slice(i, j);
      const isSelfClosing = tag.trim().endsWith('/>');
      out.push(pad(depth) + tag);
      if (!isSelfClosing) depth++;
      i = j;
      // Text content until next <
      let textEnd = src.indexOf('<', i);
      if (textEnd === -1) textEnd = n;
      const text = src.slice(i, textEnd).trim();
      if (text){
        out.push(pad(depth) + text);
      }
      i = textEnd;
      continue;
    }
    // stray text
    let textEnd = src.indexOf('<', i);
    if (textEnd === -1) textEnd = n;
    const text = src.slice(i, textEnd).trim();
    if (text) out.push(pad(depth) + text);
    i = textEnd;
  }
  return out.join('\n').replace(/\n{3,}/g, '\n\n').trim() + '\n';
}

function minifyXML(src){
  return src.replace(/>\s+</g, '><').replace(/\s{2,}/g, ' ').trim();
}

function highlight(xml){
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let out = '';
  const n = xml.length;
  let i = 0;
  while (i < n){
    if (xml.startsWith('<!--', i)){
      let e = xml.indexOf('-->', i+4); if (e === -1) e = n; else e += 3;
      out += '<span class="xml-com">'+esc(xml.slice(i, e))+'</span>'; i = e; continue;
    }
    if (xml.startsWith('<![CDATA[', i)){
      let e = xml.indexOf(']]>', i+9); if (e === -1) e = n; else e += 3;
      out += '<span class="xml-val">'+esc(xml.slice(i, e))+'</span>'; i = e; continue;
    }
    if (xml[i] === '<'){
      let e = xml.indexOf('>', i); if (e === -1) e = n; else e++;
      out += '<span class="xml-tag">'+esc(xml.slice(i, e))+'</span>'; i = e; continue;
    }
    let e = xml.indexOf('<', i); if (e === -1) e = n;
    out += '<span class="xml-text">'+esc(xml.slice(i, e))+'</span>'; i = e;
  }
  return out;
}

function getOpts(){
  return {
    indent: parseInt($('#ind').value, 10) || 2,
  };
}

function doBeautify(){
  const inp = $('#input').value;
  if (!inp.trim()){ $('#status').innerHTML = '<span style="color:var(--gz-accent)">'+t('empty')+'</span>'; $('#output').innerHTML=''; return; }
  const out = beautifyXML(inp, getOpts());
  $('#output').innerHTML = highlight(out);
  window._xmlOut = out;
  $('#status').innerHTML = '<span style="color:var(--gz-success)">'+t('done')+' · '+out.split('\n').length+' lines</span>';
}

function doMinify(){
  const inp = $('#input').value;
  if (!inp.trim()){ $('#status').innerHTML = '<span style="color:var(--gz-accent)">'+t('empty')+'</span>'; $('#output').innerHTML=''; return; }
  const out = minifyXML(inp);
  window._xmlOut = out;
  $('#output').innerHTML = highlight(out);
  $('#status').innerHTML = '<span style="color:var(--gz-success)">'+t('minified')+' · '+out.length+' chars</span>';
}

function doCopy(){ if (window._xmlOut != null) copyText(window._xmlOut); }

function doDownload(){
  if (window._xmlOut == null) return;
  const blob = new Blob([window._xmlOut], {type:'application/xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'document.xml';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}

function loadExample(){
  $('#input').value = '<?xml version="1.0" encoding="UTF-8"?><rss version="2.0"><channel><title>My Blog</title><link>https://example.com</link><description>Tech news</description><item><title>First Post</title><link>https://example.com/1</link><description>Hello world</description></item></channel></rss>';
  doBeautify();
}
