function autoprefix(css) {
  let count = 0;
  const lines = css.split('\n');
  const result = [];

  for (const line of lines) {
    const trimmed = line.trim();
    result.push(line);

    const propMatch = trimmed.match(/^([\w-]+)\s*:/);
    if (propMatch) {
      const prop = propMatch[1];
      const lookupKey = trimmed.includes('display:') ? trimmed.replace(/\s/g,'').substring(0, 30) : prop;
      let prefixes = prefixMap[prop] || [];

      // Special handling for display: flex/inline-flex/grid
      if (trimmed.match(/display\s*:\s*flex\s*(!important)?\s*;?\s*$/)) {
        prefixes = prefixMap['display:flex'] || [];
      } else if (trimmed.match(/display\s*:\s*inline-flex\s*(!important)?\s*;?\s*$/)) {
        prefixes = prefixMap['display:inline-flex'] || [];
      } else if (trimmed.match(/display\s*:\s*grid\s*(!important)?\s*;?\s*$/)) {
        prefixes = prefixMap['display:grid'] || [];
      }

      const indent = line.match(/^(\s*)/)[1];
      const importantMatch = trimmed.match(/!important/);
      const important = importantMatch ? ' !important' : '';

      const valuePart = trimmed.replace(/^[\w-]+\s*:\s*/, '').replace(/\s*!important/, '').replace(/;?\s*$/, '');

      for (const prefix of prefixes) {
        if (prefix.includes(':')) {
          const [pProp, pVal] = prefix.split(':');
          result.push(`${indent}${pProp}: ${pVal}${valuePart ? ' ' + valuePart : ''}${important};`);
        } else {
          result.push(`${indent}${prefix}: ${valuePart}${important};`);
        }
        count++;
      }
    }
  }

  return { css: result.join('\n'), count };
}

function doAutoprefix() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  const { css, count } = autoprefix(inp);
  $('#output').textContent = css;
  $('#stats').textContent = `✓ ${count} ${t('prefixesAdded')}`;
}
