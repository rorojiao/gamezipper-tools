    resultHead: '压缩结果',
    file: '文件',

    size: '大小',
    rateLbl: '采样率',
    chanLbl: '声道',
    saved: '节省',
    step1: '上传音频文件 (MP3, WAV, OGG, M4A, FLAC)',
    step2: '选择预设或自定义采样率、声道和格式',
    step3: '点击「压缩」— 降采样在浏览器本地完成',

const { $, t } = GZ;

let originalBuffer = null;
let originalFile = null;
let originalURL = null;
let processedBlob = null;

const fileInput = $('#fileInput');
const dropzone = $('#drop');
const preset = $('#preset');
const sampleRateSel = $('#sampleRate');
const channelsSel = $('#channels');
const formatSel = $('#format');
const controls = $('#controls');
const preview = $('#preview');
const processBtn = $('#processBtn');
const downloadBtn = $('#downloadBtn');
const dzText = $('#dz-text');
dzText.textContent = t('dzText');

['dragover','dragenter'].forEach(ev => dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.add('drag'); }));
['dragleave','drop'].forEach(ev => dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.remove('drag'); }));
dropzone.addEventListener('drop', e => { if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]); });
dropzone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files.length) loadFile(e.target.files[0]); });

function applyPreset() {
  const p = preset.value;
  if (p === 'high') { sampleRateSel.value = '44100'; channelsSel.value = '0'; formatSel.value = 'wav'; }
  else if (p === 'medium') { sampleRateSel.value = '22050'; channelsSel.value = '0'; formatSel.value = 'wav'; }
  else if (p === 'voice') { sampleRateSel.value = '16000'; channelsSel.value = '1'; formatSel.value = 'webm'; }
}
preset.addEventListener('change', () => { if (preset.value !== 'custom') applyPreset(); });
[sampleRateSel, channelsSel, formatSel].forEach(s => s.addEventListener('change', () => { preset.value = 'custom'; }));

async function loadFile(file) {
  if (!file.type.startsWith('audio/') && !/\.(mp3|wav|ogg|m4a|aac|flac|webm)$/i.test(file.name)) { alert('Please select an audio file'); return; }
  originalFile = file;
  if (originalURL) URL.revokeObjectURL(originalURL);
  originalURL = URL.createObjectURL(file);
  $('#audioOrig').src = originalURL;
  $('#fileName').textContent = file.name;
  dzText.textContent = file.name;
  controls.style.display = 'grid';
  preview.style.display = 'block';
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const buf = await file.arrayBuffer();
  originalBuffer = await ctx.decodeAudioData(buf);
  await ctx.close();
  renderOrigStats();
  $('#resultHead').style.display = 'none';
  $('#audioOut').style.display = 'none';
  $('#audioOut').src = '';
  $('#outStats').innerHTML = '';
  downloadBtn.disabled = true;
  applyPreset();
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(2) + ' MB';
}

function renderOrigStats() {
  const b = originalBuffer;
  $('#origStats').innerHTML = [
    sCard(originalFile.name, t('file')),
    sCard(b.duration.toFixed(1) + ' ' + t('sec'), t('duration')),
    sCard(fmtSize(originalFile.size), t('size')),
    sCard((b.sampleRate/1000).toFixed(1) + ' kHz', t('rateLbl')),
    sCard(b.numberOfChannels === 1 ? 'Mono' : 'Stereo', t('chanLbl')),
  ].join('');
}
function sCard(num, lbl, extra) { return `<div class="ac-stat ${extra||''}"><div class="num" style="${lbl===t('file')?'font-size:.8rem':''}">${num}</div><div class="lbl">${lbl}</div></div>`; }

async function renderOffline(srcBuffer, targetRate, targetChannels) {
  const outChannels = targetChannels === 0 ? srcBuffer.numberOfChannels : Math.min(targetChannels, srcBuffer.numberOfChannels);
  const length = Math.ceil(srcBuffer.length * targetRate / srcBuffer.sampleRate);
  const out = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(outChannels, length, targetRate);
  const node = out.createBufferSource();
  node.buffer = srcBuffer;
  node.connect(out.destination);
  node.start();
  return await out.startRendering();
}

function bufferToWav(audioBuffer) {
  const numCh = audioBuffer.numberOfChannels;
  const sampleRate = audioBuffer.sampleRate;
  const length = audioBuffer.length * numCh * 2 + 44;
  const buffer = new ArrayBuffer(length);
  const view = new DataView(buffer);
  const channels = [];
  for (let i = 0; i < numCh; i++) channels.push(audioBuffer.getChannelData(i));
  let offset = 0;
  const writeStr = s => { for (let i = 0; i < s.length; i++) view.setUint8(offset++, s.charCodeAt(i)); };
  writeStr('RIFF'); view.setUint32(offset, length - 8, true); offset += 4;
  writeStr('WAVE'); writeStr('fmt '); view.setUint32(offset, 16, true); offset += 4;
  view.setUint16(offset, 1, true); offset += 2;
  view.setUint16(offset, numCh, true); offset += 2;
  view.setUint32(offset, sampleRate, true); offset += 4;
  view.setUint32(offset, sampleRate * numCh * 2, true); offset += 4;
  view.setUint16(offset, numCh * 2, true); offset += 2;
  view.setUint16(offset, 16, true); offset += 2;
  writeStr('data'); view.setUint32(offset, length - 44, true); offset += 4;
  for (let i = 0; i < audioBuffer.length; i++) {
    for (let c = 0; c < numCh; c++) {
      let s = Math.max(-1, Math.min(1, channels[c][i]));
      view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      offset += 2;
    }
  }
  return new Blob([buffer], { type: 'audio/wav' });
}

async function encodeLossy(audioBuffer, mimeType, ext) {
  return new Promise((resolve, reject) => {
    const arr = [];
    const dest = new MediaStreamAudioDestinationNode(new (window.AudioContext || window.webkitAudioContext)({ sampleRate: audioBuffer.sampleRate }));
    const src = dest.context.createBufferSource();
    src.buffer = audioBuffer;
    src.connect(dest);
    let rec;
    try { rec = new MediaRecorder(dest.stream, { mimeType, audioBitsPerSecond: 64000 }); }
    catch (e) { return reject(new Error('unsupported')); }
    rec.ondataavailable = e => { if (e.data.size) arr.push(e.data); };
    rec.onstop = () => { dest.context.close(); resolve(new Blob(arr, { type: mimeType })); };
    rec.onerror = e => { dest.context.close(); reject(e); };
    src.start();
    rec.start();
    src.onended = () => setTimeout(() => rec.state !== 'inactive' && rec.stop(), 100);
  });
}

processBtn.addEventListener('click', async () => {
  if (!originalBuffer) { alert(t('noFile')); return; }
  processBtn.disabled = true;
  const targetRate = parseInt(sampleRateSel.value, 10);
  const targetChannels = parseInt(channelsSel.value, 10);
  const fmt = formatSel.value;
  try {
    const rendered = await renderOffline(originalBuffer, targetRate, targetChannels);
    let blob, outName, ext;
    if (fmt === 'wav') { blob = bufferToWav(rendered); ext = 'wav'; }
    else if (fmt === 'webm') {
      try { blob = await encodeLossy(rendered, 'audio/webm;codecs=opus', 'webm'); ext = 'webm'; }
      catch (e) { blob = bufferToWav(rendered); ext = 'wav'; }
    } else {
      try { blob = await encodeLossy(rendered, 'audio/ogg;codecs=vorbis', 'ogg'); ext = 'ogg'; }
      catch (e) {
        try { blob = await encodeLossy(rendered, 'audio/webm;codecs=opus', 'webm'); ext = 'webm'; }
        catch (e2) { blob = bufferToWav(rendered); ext = 'wav'; }
      }
    }
    processedBlob = blob;
    outName = originalFile.name.replace(/\.[^.]+$/, '') + '-' + (targetRate/1000) + 'kHz.' + ext;
    const url = URL.createObjectURL(blob);
    $('#audioOut').src = url;
    $('#audioOut').style.display = 'block';
    $('#resultHead').textContent = t('resultHead');
    $('#resultHead').style.display = 'block';
    const savedPct = originalFile.size > 0 ? Math.max(0, (1 - blob.size / originalFile.size) * 100) : 0;
    $('#outStats').innerHTML = [
      sCard(outName, t('file')),
      sCard(fmtSize(blob.size), t('size')),
      sCard((targetRate/1000).toFixed(1) + ' kHz', t('rateLbl')),
      sCard(rendered.numberOfChannels === 1 ? 'Mono' : 'Stereo', t('chanLbl')),
      sCard(savedPct.toFixed(0) + '%', t('saved'), 'ac-saved'),
    ].join('');
    downloadBtn.disabled = false;
    downloadBtn._name = outName;
  } catch (e) {
    alert('Error: ' + e.message);
  } finally {
    processBtn.disabled = false;
  }
});

downloadBtn.addEventListener('click', () => {
  if (!processedBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(processedBlob);
  a.download = downloadBtn._name || 'compressed.wav';
  a.click();
});

    {icon:'🎵', href:'/convert/audio-reverse.html', name:'Audio Reverser'},
  ]
});
</script>
