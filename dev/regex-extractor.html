<script>
GZI18n.register({
  en: {
    toolTitle: 'Regex Extractor — Find All Matches',
    toolDesc: 'Paste any text, enter a regular expression, and instantly extract every match with capture groups, line numbers and totals. Great for pulling emails, URLs, IPs, hex colors, hashtags and dates from large text — 100% in your browser.',
    pattern: 'Regex pattern',
    input: 'Input text',
    matches: 'Matches',
    extract: 'Extract ▶',
    copyCSV: 'Copy as CSV',
    copyList: 'Copy list',
    clear: 'Clear',
    example: 'Load Example',
    invalidRegex: '✗ Invalid regex',
    noMatches: 'No matches found',
    foundMatches: 'found',
    fullMatch: 'match',
    group: 'group',
    line: 'line',
    step1: 'Type a regex pattern in the box at the top (without / delimiters)',
    step2: 'Tick the flags you need — at minimum global (g) for multiple matches',
    step3: 'Paste or type the text to scan in the left box',
    step4: 'Click Extract — every match appears on the right with line numbers and capture groups',
  },
  zh: {
    toolTitle: '正则提取器 — 一次提取所有匹配',
    toolDesc: '粘贴任意文本，输入正则表达式，即时提取全部匹配项，含捕获组、行号和总数。适合从大段文本中提取邮箱、URL、IP、十六进制颜色、话题标签和日期 — 100% 浏览器本地运行。',
    pattern: '正则表达式',
    input: '输入文本',
    matches: '匹配结果',
    extract: '提取 ▶',
    copyCSV: '复制为 CSV',
    copyList: '复制列表',
    clear: '清空',
    example: '加载示例',
    invalidRegex: '✗ 正则表达式无效',
    noMatches: '未找到匹配',
    foundMatches: '个结果',
    fullMatch: '完整匹配',
    group: '组',
    line: '行',
    step1: '在顶部输入框输入正则表达式（无需 / 分隔符）',
    step2: '勾选需要的标志 — 多个匹配至少需要勾选 global (g)',
    step3: '在左侧框粘贴或输入要扫描的文本',
    step4: '点击「提取」— 所有匹配连同行号和捕获组将出现在右侧',
  }
});

document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = GZ.t(el.dataset.i18n));
const { $, copyText, t } = GZ;

const examples = [
  { name: 'Emails', pattern: '[\\w.+-]+@[\\w.-]+\\.\\w+', text: 'Contact us at support@example.com or sales@test.org.\nYou can also reach Jane (jane.doe+filter@sub.domain.co.uk).\nInvalid: not@@valid, @nodomain, plain@.com' },
  { name: 'URLs', pattern: 'https?://[\\w.-]+(?:/[^\\s]*)?', text: 'Visit https://tools.gamezipper.com/dev for dev tools.\nDocs at http://example.org/docs/v2?q=1\nAlso check https://github.com/nousresearch -- but not ftp://old.example' },
  { name: 'IPv4', pattern: '\\b(?:\\d{1,3}\\.){3}\\d{1,3}\\b', text: 'Server A: 192.168.1.1\nServer B: 10.0.0.42\nPublic: 8.8.8.8 and 1.1.1.1\nNot IP: 999.999.999.999 or 12.34' },
  { name: 'Hex colors', pattern: '#(?:[0-9a-fA-F]{3}|[0-9a-fA-F]{6})\\b', text: 'Background: #ffffff, text: #333\nBrand colors #1a73e8 and #f59e0b\nShorthand #abc works too. Skip #xyz and #12345' },
  { name: 'Prices', pattern: '(\\$|€|£)(\\d+(?:\\.\\d+)?)', text: 'Apples $2.50, milk €1.20\nCoffee £3.75 today only\nOn sale for $0.99 — was $1.49' },
  { name: 'Hashtags', pattern: '#(\\w+)', text: 'Loving #summer vibes! #travel #photography\nFollow us at @gamezipper and use #MadeWithGZ\n#2026 #AI #webdev' },
];

$('#examples').innerHTML = examples.map((e, i) => `<button onclick="loadExample(${i})">📦 ${e.name}</button>`).join('');
function loadExample(i) {
  $('#pattern').value = examples[i].pattern;
  $('#input').value = examples[i].text;
  extract();
}

let lastRows = [];

function extract() {
  const pat = $('#pattern').value;
  const text = $('#input').value;
  const out = $('#output');
  const status = $('#status');
  if (!pat) { status.className = 'status err'; status.textContent = t('invalidRegex') + ': (empty)'; out.innerHTML = ''; lastRows = []; return; }

  let flags = '';
  if ($('#f-g').checked) flags += 'g';
  if ($('#f-i').checked) flags += 'i';
  if ($('#f-m').checked) flags += 'm';
  if ($('#f-s').checked) flags += 's';
  if ($('#f-u').checked) flags += 'u';

  let re;
  try { re = new RegExp(pat, flags); }
  catch (e) { status.className = 'status err'; status.textContent = `${t('invalidRegex')}: ${e.message}`; out.innerHTML = ''; lastRows = []; $('#matchCount').textContent=''; return; }

  if (!flags.includes('g')) {
    // force global for extraction
    try { re = new RegExp(pat, flags + 'g'); } catch(e) {}
  }

  // Build line offsets so we can report line numbers cheaply
  const lines = text.split('\n');
  const lineOffsets = [0];
  for (const ln of lines) lineOffsets.push(lineOffsets[lineOffsets.length - 1] + ln.length + 1);

  const rows = [];
  let m, total = 0;
  let safety = 0;
  while ((m = re.exec(text)) !== null) {
    total++;
    if (++safety > 50000) break;
    // line number
    let lo = 0, hi = lineOffsets.length - 1, lineNo = 1;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      if (lineOffsets[mid] <= m.index) { lineNo = mid; lo = mid + 1; }
      else hi = mid - 1;
    }
    const groups = [];
    for (let i = 1; i < m.length; i++) groups.push(m[i] === undefined ? '' : m[i]);
    rows.push({ full: m[0], groups, line: lineNo });
    if (m.index === re.lastIndex) re.lastIndex++;
  }

  lastRows = rows;
  $('#matchCount').textContent = `${rows.length} ${t('foundMatches')}`;

  if (!rows.length) {
    status.className = 'status';
    status.style.color = '#f59e0b';
    status.textContent = '∅ ' + t('noMatches');
    out.innerHTML = `<div style="color:#888;padding:10px">∅ ${t('noMatches')}</div>`;
    return;
  }

  out.innerHTML = rows.map(r => {
    const grpHtml = r.groups.length
      ? r.groups.map((g, i) => `<span class="grp">[${t('group')} ${i+1}] ${g.replace(/</g,'&lt;')}</span>`).join('')
      : '';
    return `<div class="match-row"><span class="ln">${r.line}:</span><span class="val">${r.full.replace(/</g,'&lt;')}</span>${grpHtml}</div>`;
  }).join('');
  status.className = 'status ok';
  status.textContent = `✓ ${rows.length} ${t('foundMatches')}`;
}

function copyCSV() {
  if (!lastRows.length) return;
  const maxG = Math.max(...lastRows.map(r => r.groups.length));
  const header = ['line', 'match', ...Array.from({length: maxG}, (_, i) => 'group_' + (i + 1))];
  const lines = [header.join(',')];
  lastRows.forEach(r => {
    const cells = [r.line, '"' + r.full.replace(/"/g,'""') + '"', ...Array.from({length: maxG}, (_, i) => '"' + (r.groups[i] || '').replace(/"/g,'""') + '"')];
    lines.push(cells.join(','));
  });
  navigator.clipboard.writeText(lines.join('\n'));
}

function copyList() {
  if (!lastRows.length) return;
  navigator.clipboard.writeText(lastRows.map(r => r.full).join('\n'));
}

$('#pattern').addEventListener('input', extract);
$('#input').addEventListener('input', extract);
['f-g','f-i','f-m','f-s','f-u'].forEach(id => $('#' + id).addEventListener('change', extract));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="extract()">▶ ${t('extract')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyCSV()">📋 ${t('copyCSV')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyList()">📋 ${t('copyList')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample(0)">📥 ${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').innerHTML='';$('#matchCount').textContent='';$('#status').textContent=''">🗑 ${t('clear')}</button>`;

loadExample(0);

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔍', href:'/dev/regex.html', name:'Regex Tester'},
    {icon:'📖', href:'/dev/regex-explainer.html', name:'Regex Explainer'},
    {icon:'🪄', href:'/dev/regex-generator.html', name:'Regex Generator'},
    {icon:'🔄', href:'/dev/regex-replace.html', name:'Regex Replace'},
  ]
});
</script>
