<script>
GZI18n.register({
  en: {
    toolTitle: 'Random Color Palette Generator',
    toolDesc: 'Generate beautiful random color palettes instantly. 8 styles, adjustable count, one-click copy as CSS, JSON or HEX.',
    generate: 'Generate',

    earthy: 'Earthy',
    neon: 'Neon',
    rainbow: 'Rainbow',
    copied: 'Copied!',
    step1: 'Choose a palette style and color count',
    step2: 'Click Generate to create a palette',
    step3: 'Click any color swatch to copy its HEX code',
    step4: 'Use Copy CSS or Copy JSON for all colors',
  },
  zh: {
    toolTitle: '随机调色板生成器',
    toolDesc: '即时生成美观的随机调色板。8 种风格，可调数量，一键复制为 CSS、JSON 或 HEX。',
    generate: '生成',
    count: '颜色数',
    style: '风格',
    copyCSS: '复制 CSS',
    copyJSON: '复制 JSON',
    copyHEX: '复制 HEX',
    warm: '暖色',
    cool: '冷色',
    pastel: '柔和',
    vibrant: '鲜艳',
    mono: '单色',
    earthy: '大地',
    neon: '霓虹',
    rainbow: '彩虹',
    copied: '已复制！',
    step1: '选择调色板风格和颜色数量',
    step2: '点击生成创建调色板',
    step3: '点击任意色块复制 HEX 值',
    step4: '使用复制 CSS 或 JSON 获取全部颜色',
  }
});

const { $, copyText, t } = GZ;
let colors = [];

const styles = {
  warm:    { hueMin: 0,   hueMax: 60,  satMin: 50, satMax: 100, litMin: 30, litMax: 70 },
  cool:    { hueMin: 180, hueMax: 270, satMin: 40, satMax: 90,  litMin: 30, litMax: 65 },
  pastel:  { hueMin: 0,   hueMax: 360, satMin: 40, satMax: 70,  litMin: 70, litMax: 85 },
  vibrant: { hueMin: 0,   hueMax: 360, satMin: 70, satMax: 100, litMin: 40, litMax: 60 },
  mono:    { mono: true },
  earthy:  { hueMin: 20,  hueMax: 50,  satMin: 30, satMax: 70,  litMin: 25, litMax: 55 },
  neon:    { hueMin: 0,   hueMax: 360, satMin: 100,satMax: 100, litMin: 50, litMax: 60 },
  rainbow: { rainbow: true },
};

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => { const k = (n + h / 30) % 12; return l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1); };
  return '#' + [f(0), f(8), f(4)].map(x => Math.round(x * 255).toString(16).padStart(2, '0')).join('');
}

function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => { const k = (n + h / 30) % 12; return l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1); };
  return `rgb(${Math.round(f(0)*255)}, ${Math.round(f(8)*255)}, ${Math.round(f(4)*255)})`;
}

function contrastColor(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*0.299+g*0.587+b*0.114) > 150 ? '#1a1a2e' : '#ffffff';
}

function generate() {
  const styleKey = $('#style').value;
  const count = parseInt($('#count').value) || 5;
  const s = styles[styleKey] || styles.vibrant;
  colors = [];

  if (s.rainbow) {
    const step = 360 / count;
    for (let i = 0; i < count; i++) {
      const h = Math.round(i * step + rand(-10, 10));
      colors.push(hslToHex((h + 360) % 360, rand(65, 90), rand(45, 60)));
    }
  } else if (s.mono) {
    const baseHue = rand(0, 360);
    for (let i = 0; i < count; i++) {
      colors.push(hslToHex(baseHue, rand(20, 70), 20 + i * (60 / count)));
    }
  } else {
    for (let i = 0; i < count; i++) {
      const h = rand(s.hueMin, s.hueMax);
      const sat = rand(s.satMin, s.satMax);
      const lit = rand(s.litMin, s.litMax);
      colors.push(hslToHex(h, sat, lit));
    }
  }

  const pal = $('#palette');
  pal.innerHTML = colors.map(c => {
    const fg = contrastColor(c);
    const rgb = hslToRgb(0,0,0); // we'll compute from hex
    const rr = parseInt(c.slice(1,3),16), gg = parseInt(c.slice(3,5),16), bb = parseInt(c.slice(5,7),16);
    return `<div class="color-swatch" style="background:${c};color:${fg}" onclick="copyText('${c}');this.querySelector('.hex').textContent='${t('copied')}';setTimeout(()=>this.querySelector('.hex').textContent='${c.toUpperCase()}',1000)">
      <div class="hex">${c.toUpperCase()}</div>
      <div class="rgb">rgb(${rr}, ${gg}, ${bb})</div>
    </div>`;
  }).join('');
  $('#output').style.display = 'none';
}

function copyCSS() {
  const css = ':root {\n' + colors.map((c, i) => `  --color-${i+1}: ${c};`).join('\n') + '\n}';
  $('#output').textContent = css;
  $('#output').style.display = 'block';
  copyText(css);
}

function copyJSONExport() {
  const json = JSON.stringify(colors.map(c => ({ hex: c.toUpperCase(), rgb: `rgb(${parseInt(c.slice(1,3),16)}, ${parseInt(c.slice(3,5),16)}, ${parseInt(c.slice(5,7),16)})` })), null, 2);
  $('#output').textContent = json;
  $('#output').style.display = 'block';
  copyText(json);
}

function copyHEXExport() {
  const hex = colors.map(c => c.toUpperCase()).join('\n');
  $('#output').textContent = hex;
  $('#output').style.display = 'block';
  copyText(hex);
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyCSS()">${t('copyCSS')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyJSONExport()">${t('copyJSON')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyHEXExport()">${t('copyHEX')}</button>
  <select class="gz-select" id="style">
    <option value="vibrant">${t('vibrant')}</option>
    <option value="warm">${t('warm')}</option>
    <option value="cool">${t('cool')}</option>
    <option value="pastel">${t('pastel')}</option>
    <option value="mono">${t('mono')}</option>
    <option value="earthy">${t('earthy')}</option>
    <option value="neon">${t('neon')}</option>
    <option value="rainbow">${t('rainbow')}</option>
  </select>
  <select class="gz-select" id="count">
    ${[3,4,5,6,7,8,10].map(n=>`<option value="${n}"${n===5?' selected':''}>${n}</option>`).join('')}
  </select>`;

generate();

  category: 'color',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🌈', href:'/color/palette.html', name:'Palette Generator'},
    {icon:'🎲', href:'/color/random-color.html', name:'Random Color'},
    {icon:'🎨', href:'/color/harmony.html', name:'Color Harmony'},
  ]
});
</script>
