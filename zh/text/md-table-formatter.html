    step1: '在输入区粘贴 Markdown 表格',
    step2: '选择对齐方式和最小填充',

const { $, copyText, t } = GZ;

function parseRow(line) {
  // split on unescaped pipes
  const parts = line.replace(/^\s*\|/, '').replace(/\|\s*$/, '').split(/(?<!\\)\|/);
  return parts.map(p => p.trim());
}

function detectAlign(sepCells) {
  return sepCells.map(s => {
    s = s.trim();
    const left = /^:/.test(s);
    const right = /:$/.test(s);
    if (left && right) return 'center';
    if (right) return 'right';
    if (left) return 'left';
    return 'left'; // default
  });
}

function alignStr(align, width, pad) {
  const contentWidth = width - pad * 2;
  switch (align) {
    case 'center': return ':' + '-'.repeat(Math.max(contentWidth, 1)) + ':';
    case 'right': return '-'.repeat(Math.max(contentWidth, 1)) + ':';
    default: return ':' + '-'.repeat(Math.max(contentWidth, 1));
  }
}

function padCell(text, width, pad) {
  return ' '.repeat(pad) + text + ' '.repeat(Math.max(width - text.length - pad, pad));
}

function format() {
  const raw = $('#input').value.trim();
  if (!raw) { $('#output').innerHTML = ''; $('#status').innerHTML = ''; return; }
  const lines = raw.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) {
    $('#output').innerHTML = '';
    $('#status').innerHTML = `<span style="color:var(--gz-danger)">✗ Need at least a header row and a separator row</span>`;
    return;
  }
  const pad = parseInt($('#opt-pad').value) || 1;
  const header = parseRow(lines[0]);
  const sepRaw = parseRow(lines[1]);
  let aligns;
  const alignMode = $('#opt-align').value;
  if (alignMode === 'keep') {
    aligns = detectAlign(sepRaw);
  } else {
    aligns = header.map(() => alignMode);
  }
  const body = lines.slice(2).map(parseRow);
  const rows = [header, ...body];
  const numCols = header.length;
  let widths = Array(numCols).fill(0);
  rows.forEach(r => {
    for (let c = 0; c < numCols; c++) {
      widths[c] = Math.max(widths[c], (r[c] || '').length);
    }
  });
  const totalPad = pad * 2;
  widths = widths.map(w => Math.max(w, 3 - totalPad));

  const out = [];
  // header
  out.push('| ' + header.map((cell, c) => cell.padEnd(widths[c])).join(' | ') + ' |');
  // separator
  out.push('| ' + aligns.map((a, c) => {
    const inner = '-'.repeat(widths[c]);
    if (a === 'center') return ':' + inner.slice(1) + ':';
    if (a === 'right') return inner.slice(0, -1) + ':';
    if (a === 'left') return ':' + inner.slice(1);
    return inner;
  }).join(' | ') + ' |');
  // body
  body.forEach(r => {
    out.push('| ' + r.map((cell, c) => (cell || '').padEnd(widths[c])).join(' | ') + ' |');
  });

  const result = out.join('\n');
  $('#output').textContent = result;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${numCols} cols × ${body.length + 1} rows</span>`;
}

function loadExample() {
  $('#input').value = `Name|Age|City
---|---|---
Alice|30|New York
Bob|25|London
Charlie|35|Tokyo`;
  format();
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', format);
