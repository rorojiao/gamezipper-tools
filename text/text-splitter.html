<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Text Splitter',
    toolDesc: 'Split text by comma, space, newline, tab or any custom delimiter. Trim results, remove empties and pick an output separator — free, browser-only.',
    delimiter: 'Split by',
    delComma: 'Comma ( , )',
    delSpace: 'Space',
    delNewline: 'New line',
    delTab: 'Tab',
    delCustom: 'Custom',
    customDel: 'Custom delimiter',
    outputSep: 'Output separator',
    sepNewline: 'New line',
    sepComma: 'Comma',
    sepPipe: 'Pipe ( | )',
    trimItems: 'Trim items',
    removeEmpty: 'Remove empty items',
    itemCount: 'items',
    step1: 'Paste or type your text into the input area',
    step2: 'Choose a delimiter — comma, space, newline, tab or custom',
    step3: 'Optionally trim whitespace or remove empty items',
    step4: 'Copy the split results with one click',
  },
  zh: {
    toolTitle: '文本分割器',
    toolDesc: '按逗号、空格、换行、制表符或自定义分隔符分割文本。可去除空白、移除空项并选择输出分隔符 — 免费，浏览器本地运行。',
    delimiter: '分割方式',
    delComma: '逗号 ( , )',
    delSpace: '空格',
    delNewline: '换行',
    delTab: '制表符',
    delCustom: '自定义',
    customDel: '自定义分隔符',
    outputSep: '输出分隔符',
    sepNewline: '换行',
    sepComma: '逗号',
    sepPipe: '竖线 ( | )',
    trimItems: '去除首尾空白',
    removeEmpty: '移除空项',
    itemCount: '项',
    step1: '在输入区粘贴或输入文本',
    step2: '选择分隔符 — 逗号、空格、换行、制表符或自定义',
    step3: '可选去除空白或移除空项',
    step4: '一键复制分割结果',
  }
});

const { $, copyText, t } = GZ;
let delMode = 'comma', customDel = ',', outSep = '\n', trim = true, rmEmpty = true;

function getDelimiter() {
  switch(delMode) {
    case 'comma': return ',';
    case 'space': return /\s+/;
    case 'newline': return '\n';
    case 'tab': return '\t';
    case 'custom': return customDel || ',';
    default: return ',';
  }
}

function process() {
  const inp = $('#input').value;
  if (!inp) { $('#output').textContent = ''; $('#status').textContent = ''; return; }
  let parts;
  const del = getDelimiter();
  if (del instanceof RegExp) {
    parts = inp.split(del);
  } else {
    parts = inp.split(del);
  }
  if (trim) parts = parts.map(p => p.trim());
  if (rmEmpty) parts = parts.filter(p => p.length > 0);
  $('#output').textContent = parts.join(outSep);
  $('#status').innerHTML = `<span style="opacity:.7">${parts.length} ${t('itemCount')}</span>`;
}

$('#input').addEventListener('input', process);

$('#toolbar').innerHTML = `
  <select class="gz-select" id="del-sel">
    <option value="comma" selected>${t('delComma')}</option>
    <option value="space">${t('delSpace')}</option>
    <option value="newline">${t('delNewline')}</option>
    <option value="tab">${t('delTab')}</option>
    <option value="custom">${t('delCustom')}</option>
  </select>
  <input class="gz-input" id="custom-input" type="text" placeholder="${t('customDel')}" value=";" style="width:80px;display:none">
  <select class="gz-select" id="sep-sel">
    <option value="nl" selected>${t('sepNewline')}</option>
    <option value="comma">${t('sepComma')}</option>
    <option value="pipe">${t('sepPipe')}</option>
  </select>
  <label class="gz-check"><input type="checkbox" id="cb-trim" checked> ${t('trimItems')}</label>
  <label class="gz-check"><input type="checkbox" id="cb-empty" checked> ${t('removeEmpty')}</label>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';process()">${t('clear')}</button>`;

$('#del-sel').addEventListener('change', e => {
  delMode = e.target.value;
  $('#custom-input').style.display = delMode === 'custom' ? '' : 'none';
  process();
});
$('#custom-input').addEventListener('input', e => { customDel = e.target.value; process(); });
$('#sep-sel').addEventListener('change', e => {
  outSep = e.target.value === 'nl' ? '\n' : e.target.value === 'comma' ? ', ' : ' | ';
  process();
});
$('#cb-trim').addEventListener('change', e => { trim = e.target.checked; process(); });
$('#cb-empty').addEventListener('change', e => { rmEmpty = e.target.checked; process(); });

$('#input').value = 'apple, banana, cherry, date, elderberry, fig';
process();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'↩️', href:'/text/remove-line-breaks.html', name:'Remove Line Breaks'},
    {icon:'➕', href:'/text/add-prefix-suffix.html', name:'Add Prefix/Suffix'},
    {icon:'↕️', href:'/text/sort-lines.html', name:'Sort Lines'},
    {icon:'🧹', href:'/text/remove-duplicates.html', name:'Remove Duplicates'},
  ]
});
</script>
