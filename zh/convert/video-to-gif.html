const { $, t } = GZ;

// UI setup
$('#dropLabel').textContent = t('dropLabel');
$('#lblStart').textContent = t('start');
$('#lblDuration').textContent = t('duration');
$('#lblWidth').textContent = t('width');
$('#lblFps').textContent = t('fps');
$('#btnConvert').textContent = t('convert');

const drop = $('#drop');
const fileInput = $('#fileInput');
const video = $('#videoPreview');

drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag'); });
drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
drop.addEventListener('drop', e => {
  e.preventDefault(); drop.classList.remove('drag');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

$('#startTime').addEventListener('input', e => { $('#valStart').textContent = parseFloat(e.target.value).toFixed(1) + 's'; });
$('#duration').addEventListener('input', e => { $('#valDuration').textContent = parseFloat(e.target.value).toFixed(1) + 's'; });
$('#gifWidth').addEventListener('input', e => { $('#valWidth').textContent = e.target.value + 'px'; });
$('#fps').addEventListener('input', e => { $('#valFps').textContent = e.target.value; });

let videoDuration = 30;

function loadFile(file) {
  const url = URL.createObjectURL(file);
  video.src = url;
  video.onloadedmetadata = () => {
    videoDuration = video.duration;
    $('#startTime').max = videoDuration;
    $('#duration').max = Math.min(30, videoDuration);
    $('#videoInfo').textContent = `${file.name} · ${video.videoWidth}×${video.videoHeight} · ${videoDuration.toFixed(1)}s`;
  };
  $('#drop').style.display = 'none';
  $('#editor').style.display = 'block';
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(2) + ' MB';
}

async function doConvert() {
  const btn = $('#btnConvert');
  btn.disabled = true;
  btn.textContent = t('converting');
  $('#progress').style.display = 'block';
  $('#result').style.display = 'none';

  const startT = parseFloat($('#startTime').value);
  const dur = parseFloat($('#duration').value);
  const w = parseInt($('#gifWidth').value);
  const fpsVal = parseInt($('#fps').value);
  const totalFrames = Math.floor(dur * fpsVal);

  const canvas = document.createElement('canvas');
  canvas.width = w;
  const aspectRatio = video.videoHeight / video.videoWidth;
  canvas.height = Math.round(w * aspectRatio);
  const ctx = canvas.getContext('2d');

  // Collect frames
  const frames = [];
  const delay = 1000 / fpsVal; // ms between frames

  for (let i = 0; i < totalFrames; i++) {
    const time = startT + (i / fpsVal);
    video.currentTime = time;
    await new Promise(r => { video.onseeked = r; });
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    frames.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
    const pct = ((i + 1) / totalFrames * 80);
    $('#progressFill').style.width = pct + '%';
  }

  // Encode GIF
  $('#progressFill').style.width = '85%';
  const gifBytes = encodeGIF(frames, canvas.width, canvas.height, Math.round(delay / 10));

  $('#progressFill').style.width = '100%';

  const blob = new Blob([gifBytes], { type: 'image/gif' });
  const url = URL.createObjectURL(blob);
  $('#gifPreview').src = url;
  $('#gifInfo').textContent = `${canvas.width}×${canvas.height} · ${totalFrames} frames · ${formatSize(blob.size)}`;
  $('#downloadLink').href = url;
  $('#downloadLink').textContent = t('download');
  $('#downloadLink').download = 'video-to-gif.gif';
  $('#result').style.display = 'block';
  $('#progress').style.display = 'none';
  btn.disabled = false;
  btn.textContent = t('convert');
}

function encodeGIF(frames, width, height, delayCs) {
  const out = [];
  const w = b => out.push(b & 0xFF);
  const ws = s => { w(s & 0xFF); w((s >> 8) & 0xFF); };
  const wstr = s => { for (let i = 0; i < s.length; i++) w(s.charCodeAt(i)); };

  // Quantize colors to 256 palette
  const palette = [];
  const colorToIdx = new Map();
  const maxColors = 256;
  const step = Math.max(1, Math.floor(frames[0].data.length / 4 / maxColors));

  for (const frame of frames) {
    const d = frame.data;
    for (let i = 0; i < d.length; i += 4 * step) {
      const r = d[i] & 0xF8;
      const g = d[i + 1] & 0xF8;
      const b = d[i + 2] & 0xF8;
      const key = (r << 16) | (g << 8) | b;
      if (!colorToIdx.has(key)) {
        if (palette.length < maxColors) {
          colorToIdx.set(key, palette.length);
          palette.push([r, g, b]);
        }
      }
    }
    if (palette.length >= maxColors) break;
  }

  // Ensure palette is power of 2
  const palBits = Math.max(2, Math.ceil(Math.log2(Math.max(4, palette.length))));
  const palSize = 1 << palBits;
  while (palette.length < palSize) palette.push([0, 0, 0]);

  // Header
  wstr('GIF89a');
  ws(width); ws(height);
  w(0x80 | (palBits - 1)); // GCT flag
  w(0); w(0);

  // Global Color Table
  for (const c of palette) { w(c[0]); w(c[1]); w(c[2]); }

  // Netscape looping extension
  w(0x21); w(0xFF); w(11); wstr('NETSCAPE2.0');
  w(3); w(1); ws(0); w(0);

  // For each frame
  for (let f = 0; f < frames.length; f++) {
    const data = frames[f].data;
    const indexed = new Uint8Array(width * height);

    for (let i = 0; i < width * height; i++) {
      const pi = i * 4;
      const r = data[pi] & 0xF8;
      const g = data[pi + 1] & 0xF8;
      const b = data[pi + 2] & 0xF8;
      const key = (r << 16) | (g << 8) | b;
      if (colorToIdx.has(key)) {
        indexed[i] = colorToIdx.get(key);
      } else {
        // Find closest
        let best = 0, bestD = Infinity;
        for (let j = 0; j < palette.length; j++) {
          const dr = r - palette[j][0], dg = g - palette[j][1], db = b - palette[j][2];
          const d = dr * dr + dg * dg + db * db;
          if (d < bestD) { bestD = d; best = j; }
        }
        indexed[i] = best;
      }
    }

    // GCE
    w(0x21); w(0xF9); w(4);
    w(0x00); // disposal
    ws(Math.max(2, delayCs));
    w(0); w(0);

    // Image descriptor
    w(0x2C); ws(0); ws(0); ws(width); ws(height);
    w(0); // no LCT

    // LZW
    const minCode = Math.max(2, palBits);
    w(minCode);
    const lzw = lzwEncode(indexed, minCode);
    for (let i = 0; i < lzw.length; i += 255) {
      const chunk = lzw.slice(i, i + 255);
      w(chunk.length);
      for (const b of chunk) w(b);
    }
    w(0);
  }

  w(0x3B); // trailer
  return new Uint8Array(out);
}

function lzwEncode(pixels, minCodeSize) {
  const clearCode = 1 << minCodeSize;
  const eoiCode = clearCode + 1;
  let codeSize = minCodeSize + 1;
  let nextCode = eoiCode + 1;
  const table = new Map();
  const output = [];
  let buffer = 0, bits = 0;

  function writeBits(code, sz) {
    buffer |= (code << bits);
    bits += sz;
    while (bits >= 8) { output.push(buffer & 0xFF); buffer >>= 8; bits -= 8; }
  }

  for (let i = 0; i < clearCode; i++) table.set(String(i), i);
  writeBits(clearCode, codeSize);

  let current = String(pixels[0]);
  for (let i = 1; i < pixels.length; i++) {
    const next = String(pixels[i]);
    const combined = current + ',' + next;
    if (table.has(combined)) {
      current = combined;
    } else {
      writeBits(table.get(current), codeSize);
      if (nextCode < 4096) {
        table.set(combined, nextCode++);
        if (nextCode > (1 << codeSize) && codeSize < 12) codeSize++;
      } else {
        writeBits(clearCode, codeSize);
        table.clear();
        for (let j = 0; j < clearCode; j++) table.set(String(j), j);
        nextCode = eoiCode + 1;
        codeSize = minCodeSize + 1;
      }
      current = next;
    }
  }
  if (current.length) writeBits(table.get(current), codeSize);
  writeBits(eoiCode, codeSize);
  if (bits > 0) output.push(buffer & 0xFF);
  return output;
}
