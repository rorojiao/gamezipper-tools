<script>
GZI18n.register({

    styles: { apa: 'APA 7', mla: 'MLA 9', chicago: 'Chicago', harvard: 'Harvard' },
    sources: { book: '📚 书籍', website: '🌐 网站', journal: '📄 期刊文章', video: '🎬 视频' },
    bookAuthor: '作者 (姓, 名)',
    bookTitle: '书名',
    bookPublisher: '出版社',
    bookYear: '出版年份',
    bookEdition: '版次 (可选)',
    webAuthor: '作者 / 机构',
    webTitle: '页面 / 文章标题',

    jourTitle: '文章标题',
    jourJournal: '期刊名称',
    jourVolume: '卷 (期)',
    jourYear: '年份',
    jourPages: '页码范围',
    jourDoi: 'DOI / URL',
    vidCreator: '创作者 / 频道',
    vidTitle: '视频标题',
    vidPlatform: '平台 (YouTube, Vimeo...)',
    vidDate: '上传日期',
    vidUrl: '视频 URL',
    addToLibrary: '➕ 添加到引用列表',
    copyAll: '📋 复制全部',
    clearAll: '🗑️ 清空全部',
    noCitations: '还没有引文。填写上方信息添加第一条。',
    libraryEmpty: '您的引文列表为空。',
    step1: '选择引文格式 (APA、MLA、Chicago 或 Harvard)',
    step2: '选择来源类型并填写必填字段',
    step3: '点击「添加到引用列表」保存',
    step4: '一键复制单条或全部引文',
  }
});

const { $, $$, copyText, t, showToast } = GZ;
let currentStyle = 'apa';
let currentSource = 'book';
let lang = GZI18n.getLang();
const library = [];
const FIELDS = {
  book: ['bookAuthor','bookTitle','bookPublisher','bookYear','bookEdition'],
  website: ['webAuthor','webTitle','webSite','webDate','webUrl','webAccess'],
  journal: ['jourAuthors','jourTitle','jourJournal','jourVolume','jourYear','jourPages','jourDoi'],
  video: ['vidCreator','vidTitle','vidPlatform','vidDate','vidUrl'],
};

function renderStyleTabs() {
  const styles = t('styles');
  $('#styleTabs').innerHTML = Object.entries(styles).map(([k,v]) =>
    `<button class="cg-tab ${k===currentStyle?'active':''}" data-style="${k}">${v}</button>`
  ).join('');
  $$('#styleTabs .cg-tab').forEach(b => b.onclick = () => { currentStyle = b.dataset.style; renderStyleTabs(); renderForm(); renderLibrary(); });
}

function renderSourceTabs() {
  const sources = t('sources');
  $('#srcTabs').innerHTML = Object.entries(sources).map(([k,v]) =>
    `<button class="cg-tab ${k===currentSource?'active':''}" data-src="${k}">${v}</button>`
  ).join('');
  $$('#srcTabs .cg-tab').forEach(b => b.onclick = () => { currentSource = b.dataset.src; renderSourceTabs(); renderForm(); });
}

function renderForm() {
  const fields = FIELDS[currentSource];
  $('#form').innerHTML = fields.map(f =>
    `<div><label>${t(f)}</label><input type="text" data-field="${f}" placeholder="${t(f)}"></div>`
  ).join('');
}

function readFields() {
  const data = {};
  $$('#form input').forEach(i => data[i.dataset.field] = i.value.trim());
  return data;
}

function formatAuthors(authors, style) {
  if (!authors) return '';
  // Authors in "Last, First; Last, First" form
  const entries = authors.split(/;\s*/).map(s => s.trim()).filter(Boolean);
  if (entries.length === 1) {
    // Single "Last, First" or just "First Last"
    return authors;
  }
  // For each entry, abbreviate first names to initials in APA/Harvard
  function shortA(s, useInitials) {
    if (!useInitials) return s;
    const m = s.match(/^([^,]+),\s*(.+)$/);
    if (!m) return s;
    const last = m[1], first = m[2];
    const initials = first.split(/\s+/).map(n => n.charAt(0).toUpperCase() + '.').join(' ');
    return `${last}, ${initials}`;
  }
  const useInit = (style === 'apa' || style === 'harvard');
  const formatted = entries.map(s => shortA(s, useInit));
  if (formatted.length === 2) {
    if (style === 'mla') return `${formatted[0]}, and ${formatted[1]}`;
    return `${formatted[0]}, & ${formatted[1]}`;
  }
  return formatted.slice(0, -1).join(', ') + (style === 'mla' ? ', and ' : ', & ') + formatted[formatted.length-1];
}

function citeBook(d, s) {
  const author = formatAuthors(d.bookAuthor, s);
  const year = d.bookYear ? (s==='mla'?d.bookYear:`(${d.bookYear})`) : 'n.d.';
  const edition = d.bookEdition ? (s==='chicago'?`${d.bookEdition} ed.`:`${d.bookEdition} ed.`) : '';
  if (s==='apa') return `${author} ${year}. *${d.bookTitle}*${edition ? ' ('+edition+')' : ''}. ${d.bookPublisher}.`;
  if (s==='mla') return `${author}. *${d.bookTitle}*${edition ? ' '+edition : ''}. ${d.bookPublisher}, ${d.bookYear}.`;
  if (s==='chicago') return `${author}. ${year}. *${d.bookTitle}*${edition ? ', '+edition : ''}. ${d.bookPublisher}.`;
  if (s==='harvard') return `${author} (${d.bookYear}) *${d.bookTitle}*${edition ? ', '+edition : ''}. ${d.bookPublisher}.`;
}

function citeWebsite(d, s) {
  const author = formatAuthors(d.webAuthor, s);
  const title = d.webTitle;
  const site = d.webSite;
  const url = d.webUrl;
  const date = d.webDate || '';
  const access = d.webAccess || '';
  if (s==='apa') return `${author} (${d.webDate ? d.webDate.split(/[-\/]/)[0] : 'n.d.'}). *${title}*. ${site}. ${url}`;
  if (s==='mla') return `${author}. "${title}." *${site}*, ${date}, ${url}. Accessed ${access}.`;
  if (s==='chicago') return `${author}. "${title}." *${site}*. ${date}. ${url}.`;
  if (s==='harvard') return `${author} (${d.webDate ? d.webDate.split(/[-\/]/)[0] : 'n.d.'}) *${title}*. ${site}. Available at: ${url} (Accessed: ${access}).`;
}

function citeJournal(d, s) {
  const author = formatAuthors(d.jourAuthors, s);
  const year = d.jourYear || 'n.d.';
  if (s==='apa') return `${author} (${d.jourYear}). ${d.jourTitle}. *${d.jourJournal}*${d.jourVolume ? ', '+d.jourVolume : ''}${d.jourPages ? ', '+d.jourPages : ''}. ${d.jourDoi || ''}`;
  if (s==='mla') return `${author}. "${d.jourTitle}." *${d.jourJournal}*, vol. ${d.jourVolume || ''}, ${year}${d.jourPages ? ', pp. '+d.jourPages : ''}. ${d.jourDoi || ''}`;
  if (s==='chicago') return `${author}. ${year}. "${d.jourTitle}." *${d.jourJournal}* ${d.jourVolume || ''}${d.jourPages ? ': '+d.jourPages : ''}.`;
  if (s==='harvard') return `${author} (${d.jourYear}) '${d.jourTitle}', *${d.jourJournal}*, ${d.jourVolume || ''}${d.jourPages ? ', pp. '+d.jourPages : ''}.`;
}

function citeVideo(d, s) {
  const author = formatAuthors(d.vidCreator, s);
  const date = d.vidDate || '';
  if (s==='apa') return `${author} [${d.vidPlatform}] (${d.vidDate ? d.vidDate.split(/[-\/]/)[0] : 'n.d.'}). *${d.vidTitle}*. ${d.vidUrl}`;
  if (s==='mla') return `"${d.vidTitle}." *${d.vidPlatform}*, uploaded by ${author}, ${date}, ${d.vidUrl}.`;
  if (s==='chicago') return `${author}. "${d.vidTitle}." ${d.vidPlatform} video, ${date}. ${d.vidUrl}.`;
  if (s==='harvard') return `${author} (${d.vidDate ? d.vidDate.split(/[-\/]/)[0] : 'n.d.'}) *${d.vidTitle}*. ${d.vidPlatform} video. Available at: ${d.vidUrl}`;
}

function formatCitation(src, data, style) {
  if (src==='book') return citeBook(data, style);
  if (src==='website') return citeWebsite(data, style);
  if (src==='journal') return citeJournal(data, style);
  if (src==='video') return citeVideo(data, style);
  return '';
}

function renderMarkdown(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/_([^_]+)_/g, '<u>$1</u>');
}

function renderLibrary() {
  $('#libTitle').textContent = lang === 'zh' ? `📚 我的引文 (${library.length})` : `📚 My Bibliography (${library.length})`;
  if (!library.length) {
    $('#library').innerHTML = `<div class="cg-empty">${t('noCitations')}</div>`;
    return;
  }
  $('#library').innerHTML = library.map((c, i) =>
    `<div class="cg-result-card">
      <div>
        <div class="cg-result-text">${renderMarkdown(c.text)}</div>
        <div class="cg-result-meta">${t('styles')[c.style]} · ${t('sources')[c.src]}</div>
      </div>
      <div class="cg-actions">
        <button class="gz-btn" onclick="copyOne(${i})">${t('copy')}</button>
        <button class="gz-btn gz-btn-secondary" onclick="removeOne(${i})">✕</button>
      </div>
    </div>`
  ).join('');
}

function addToLibrary() {
  const data = readFields();
  // Validate at least title
  const titleKey = currentSource==='book'?'bookTitle':currentSource==='website'?'webTitle':currentSource==='journal'?'jourTitle':'vidTitle';
  if (!data[titleKey]) { showToast(lang==='zh'?'请填写标题':'Please enter a title'); return; }
  const text = formatCitation(currentSource, data, currentStyle);
  library.push({ text, style: currentStyle, src: currentSource });
  renderLibrary();
  showToast(lang==='zh'?'✓ 已添加':'✓ Added');
  $$('#form input').forEach(i => i.value = '');
}

function copyOne(i) { copyText(library[i].text); }
function removeOne(i) { library.splice(i,1); renderLibrary(); }

function copyAll() {
  if (!library.length) { showToast(lang==='zh'?'列表为空':'Library is empty'); return; }
  copyText(library.map(c => c.text).join('\n\n'));
}

function clearAll() {
  if (!library.length) return;
  if (confirm(lang==='zh'?'确定清空全部？':'Clear all citations?')) { library.length=0; renderLibrary(); }
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="addToLibrary()">${t('addToLibrary')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyAll()">${t('copyAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clearAll')}</button>`;

renderStyleTabs();
renderSourceTabs();
renderForm();
renderLibrary();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📝', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'📑', href:'/text/sentence-counter.html', name:'Sentence Counter'},
    {icon:'📖', href:'/text/readability-checker.html', name:'Readability Checker'},
    {icon:'📚', href:'/text/lorem-ipsum.html', name:'Lorem Ipsum'},
  ]
});
</script>
