<script>
GZI18n.register({

    toolDesc: '用麦克风录音并下载为 WebM 或 WAV。100% 浏览器本地运行 — 无需上传、无需注册、无时长限制。',
    ready: '就绪 — 点击红色按钮开始录音',
    recording: '🔴 录音中… 点击停止',
    processing: '正在处理音频…',
    permission: '麦克风权限被拒绝，请允许访问后重试。',
    unsupported: '您的浏览器不支持录音功能（MediaRecorder API）。',
    download: '下载',
    delete: '删除',
    empty: '录音将显示在这里。点击红色按钮开始录音。',
    recordingName: '录音',
    note: '音频通过 MediaRecorder API 在本地采集，不会上传。WAV 导出为 16 位 PCM，采样率与源一致。麦克风访问需要 HTTPS 环境。',
    step1: '选择格式（WebM 或 WAV）',
    step2: '点击红色录音按钮并允许麦克风权限',
    step3: '说话、唱歌或演奏 — 观察实时电平条',
    step4: '点击停止，然后播放、下载或删除录音',
  }
});

const { $, t, showToast } = GZ;
let mediaRecorder = null;
let chunks = [];
let stream = null;
let audioCtx = null;
let analyser = null;
let dataArr = null;
let rafId = null;
let startTime = 0;
let recordings = [];
let recCounter = 0;

const recBtn = $('#recBtn');
const timerEl = $('#timer');
const levelBar = $('#level');
const statusEl = $('#status');
const recordingsEl = $('#recordings');

statusEl.textContent = t('ready');
renderEmpty();

function renderEmpty() {
  if (!recordings.length) {
    recordingsEl.innerHTML = `<div class="ar-empty"><span class="icon">🎙️</span>${t('empty')}</div>`;
  }
}

async function toggleRecord() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !window.MediaRecorder) {
    showToast(t('unsupported'), 'error');
    return;
  }
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
  } catch (e) {
    showToast(t('permission'), 'error');
    return;
  }

  // Pick mime type
  const wantFmt = $('#format').value;
  let mimeType = '';
  if (wantFmt === 'wav' || !MediaRecorder.isTypeSupported('audio/webm')) {
    mimeType = ''; // default; we will decode to WAV post-record
  } else {
    mimeType = 'audio/webm';
  }
  try {
    mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
  } catch (e) {
    showToast(t('unsupported'), 'error');
    stream.getTracks().forEach(tr => tr.stop());
    return;
  }

  chunks = [];
  mediaRecorder.ondataavailable = e => { if (e.data && e.data.size) chunks.push(e.data); };
  mediaRecorder.onstop = () => {
    statusEl.textContent = t('processing');
    const blob = new Blob(chunks, { type: mediaRecorder.mimeType || 'audio/webm' });
    finalizeRecording(blob, wantFmt);
    cleanupStream();
  };

  // Level meter
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const src = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  dataArr = new Uint8Array(analyser.frequencyBinCount);
  src.connect(analyser);

  mediaRecorder.start();
  startTime = performance.now();
  recBtn.classList.add('recording');
  recBtn.textContent = '■';
  statusEl.textContent = t('recording');
  timerLoop();
}

function timerLoop() {
  if (!mediaRecorder || mediaRecorder.state !== 'recording') return;
  const elapsed = (performance.now() - startTime) / 1000;
  const mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const ss = String(Math.floor(elapsed % 60)).padStart(2, '0');
  timerEl.textContent = mm + ':' + ss;

  if (analyser) {
    analyser.getByteFrequencyData(dataArr);
    let sum = 0;
    for (let i = 0; i < dataArr.length; i++) sum += dataArr[i];
    const avg = sum / dataArr.length;
    levelBar.style.width = Math.min(100, (avg / 128) * 100) + '%';
  }
  rafId = requestAnimationFrame(timerLoop);
}

function cleanupStream() {
  if (rafId) cancelAnimationFrame(rafId);
  rafId = null;
  if (stream) { stream.getTracks().forEach(tr => tr.stop()); stream = null; }
  if (audioCtx) { audioCtx.close().catch(()=>{}); audioCtx = null; }
  analyser = null;
  recBtn.classList.remove('recording');
  recBtn.textContent = '●';
  levelBar.style.width = '0%';
}

async function finalizeRecording(blob, wantFmt) {
  recCounter++;
  let outBlob = blob;
  let outType = blob.type;

  if (wantFmt === 'wav') {
    try {
      const arrayBuf = await blob.arrayBuffer();
      const tmpCtx = new (window.AudioContext || window.webkitAudioContext)();
      const audioBuf = await tmpCtx.decodeAudioData(arrayBuf);
      outBlob = audioBufferToWav(audioBuf);
      outType = 'audio/wav';
      tmpCtx.close().catch(()=>{});
    } catch (e) {
      showToast('WAV conversion failed, keeping original format', 'error');
    }
  }

  const ext = outType.includes('wav') ? 'wav' : 'webm';
  const name = `${t('recordingName')} ${recCounter}.${ext}`;
  const url = URL.createObjectURL(outBlob);
  const dur = await getDuration(url);

  recordings.unshift({ id: recCounter, name, url, blob: outBlob, type: outType, dur, ts: new Date() });
  renderRecordings();
  statusEl.textContent = t('ready');
  timerEl.textContent = '00:00';
}

function getDuration(url) {
  return new Promise(resolve => {
    const a = document.createElement('audio');
    a.preload = 'metadata';
    a.onloadedmetadata = () => resolve(isFinite(a.duration) ? a.duration : 0);
    a.onerror = () => resolve(0);
    a.src = url;
  });
}

function fmtDur(s) {
  if (!s || !isFinite(s)) return '--:--';
  const mm = String(Math.floor(s / 60)).padStart(2, '0');
  const ss = String(Math.floor(s % 60)).padStart(2, '0');
  return mm + ':' + ss;
}

function renderRecordings() {
  if (!recordings.length) { renderEmpty(); return; }
  recordingsEl.innerHTML = recordings.map(r => `
    <div class="ar-recording-card">
      <div class="meta">
        <span class="name">🎵 ${escapeHtml(r.name)}</span>
        <span>${fmtDur(r.dur)} · ${(r.blob.size / 1024).toFixed(1)} KB · ${r.type}</span>
      </div>
      <audio controls src="${r.url}"></audio>
      <div>
        <a class="gz-btn" href="${r.url}" download="${escapeAttr(r.name)}">${t('download')}</a>
        <button class="gz-btn gz-btn-secondary" onclick="deleteRec(${r.id})">${t('delete')}</button>
      </div>
    </div>`).join('');
}

function deleteRec(id) {
  const r = recordings.find(x => x.id === id);
  if (r) URL.revokeObjectURL(r.url);
  recordings = recordings.filter(x => x.id !== id);
  renderRecordings();
}

// Encode AudioBuffer to 16-bit PCM WAV Blob
function audioBufferToWav(buffer) {
  const numCh = buffer.numberOfChannels;
  const sampleRate = buffer.sampleRate;
  const numSamples = buffer.length;
  const bytesPerSample = 2;
  const blockAlign = numCh * bytesPerSample;
  const dataSize = numSamples * blockAlign;
  const buf = new ArrayBuffer(44 + dataSize);
  const view = new DataView(buf);

  function writeStr(off, s) { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); }
  writeStr(0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);          // PCM
  view.setUint16(22, numCh, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * blockAlign, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, 16, true);
  writeStr(36, 'data');
  view.setUint32(40, dataSize, true);

  const channels = [];
  for (let c = 0; c < numCh; c++) channels.push(buffer.getChannelData(c));
  let off = 44;
  for (let i = 0; i < numSamples; i++) {
    for (let c = 0; c < numCh; c++) {
      let s = Math.max(-1, Math.min(1, channels[c][i]));
      view.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      off += 2;
    }
  }
  return new Blob([buf], { type: 'audio/wav' });
}

function escapeHtml(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escapeAttr(s) { return escapeHtml(s).replace(/"/g,'&quot;'); }

recBtn.addEventListener('click', toggleRecord);
window.deleteRec = deleteRec;
window.addEventListener('beforeunload', cleanupStream);

$('#note').textContent = t('note');

    {icon:'🎚️', href:'/dev/audio-tuner.html', name:'Audio Tuner'},

    {icon:'🎶', href:'/dev/bpm-detector.html', name:'BPM Detector'},
  ]
});
</script>
