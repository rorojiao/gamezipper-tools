<script>
GZI18n.register({
  en: {
    toolTitle: 'ULID Generator',
    toolDesc: 'Generate unique ULIDs (Universally Unique Lexicographically Sortable Identifiers). Batch generate, decode timestamps and copy instantly.',
    count: 'Count',
    generate: 'Generate',
    copyAll: 'Copy All',
    decode: 'Decode',
    decodeTitle: 'Decode a ULID',
    timestamp: 'Timestamp',
    random: 'Random Part',
    date: 'Date (ISO)',
    step1: 'Set how many ULIDs to generate',
    step2: 'Click Generate to create ULIDs',
    step3: 'Copy individual ULIDs or all at once',
    step4: 'Use the decoder to extract timestamp from any ULID',
  },
  zh: {
    toolTitle: 'ULID 生成器',
    toolDesc: '生成唯一的 ULID（通用唯一字典排序标识符）。支持批量生成、解码时间戳和即时复制。',
    count: '数量',
    generate: '生成',
    copyAll: '全部复制',
    decode: '解码',
    decodeTitle: '解码 ULID',
    timestamp: '时间戳',
    random: '随机部分',
    date: '日期 (ISO)',
    step1: '设置要生成的 ULID 数量',
    step2: '点击生成 ULID',
    step3: '复制单个 ULID 或全部复制',
    step4: '使用解码器从任意 ULID 提取时间戳',
  }
});

const { $, copyText, t } = GZ;
const ENCODING = '0123456789ABCDEFGHJKMNPQRSTVWXYZ';

function encodeTime(ts) {
  let str = '';
  for (let i = 9; i >= 0; i--) {
    const mod = ts % 32;
    str = ENCODING[mod] + str;
    ts = Math.floor(ts / 32);
  }
  return str;
}

function encodeRandom() {
  let str = '';
  const arr = new Uint8Array(10);
  crypto.getRandomValues(arr);
  for (let i = 0; i < 16; i++) {
    let val;
    if (i < 10) val = arr[i];
    else val = arr[10 + (i - 10)];
    if (i >= 10) {
      // Use modulo for simplicity
      val = arr[i - 6] % 32;
    }
    str += ENCODING[val % 32];
  }
  return str;
}

function generateULID() {
  return encodeTime(Date.now()) + encodeRandom();
}

function decodeULID(ulid) {
  if (!/^[0-9A-HJKMNPQRSTVWXYZ]{26}$/i.test(ulid)) return null;
  const timePart = ulid.substring(0, 10).toUpperCase();
  let ts = 0;
  for (let i = 0; i < 10; i++) {
    ts = ts * 32 + ENCODING.indexOf(timePart[i]);
  }
  const randomPart = ulid.substring(10).toUpperCase();
  return { timestamp: ts, date: new Date(ts).toISOString(), random: randomPart };
}

function buildToolbar() {
  $('#toolbar').innerHTML = `
    <label>${t('count')} <input type="number" id="inp-count" min="1" max="100" value="10" style="width:70px"></label>
    <button class="gz-btn" onclick="doGenerate()">${t('generate')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="copyAll()">${t('copyAll')}</button>`;
  $('#decode-title').textContent = t('decodeTitle');
  $('#decode-btn').textContent = t('decode');
  $('#decode-btn').onclick = doDecode;
}

let ulids = [];
function doGenerate() {
  const count = Math.min(100, Math.max(1, +$('#inp-count').value));
  ulids = [];
  for (let i = 0; i < count; i++) ulids.push(generateULID());
  render();
}

function render() {
  const out = $('#output');
  out.innerHTML = ulids.map((u, i) => {
    const d = decodeULID(u);
    return `<div class="ulid-row"><span class="ulid-val">${u}</span><span class="ulid-time">${d ? d.date.replace('T',' ').substring(0,19) : ''}</span><button class="gz-btn gz-btn-secondary" style="padding:2px 8px;font-size:.75em" onclick="copyText('${u}')">📋</button></div>`;
  }).join('');
}

function copyAll() {
  copyText(ulids.join('\n'));
}

function doDecode() {
  const ulid = $('#decode-input').value.trim().toUpperCase();
  const result = $('#decode-result');
  const decoded = decodeULID(ulid);
  if (!decoded) {
    result.style.display = 'block';
    result.innerHTML = '<span style="color:#e94560">Invalid ULID format. Must be 26 characters (Crockford Base32).</span>';
    return;
  }
  result.style.display = 'block';
  result.innerHTML = `<div><strong>${t('timestamp')}:</strong> ${decoded.timestamp}ms</div>
<div><strong>${t('date')}:</strong> ${decoded.date}</div>
<div><strong>${t('random')}:</strong> ${decoded.random}</div>`;
}

buildToolbar();
doGenerate();

GZ.renderToolPage({

    {icon:'🔐', href:'/dev/bcrypt-generator.html', name:'Bcrypt Generator'},
  ]
});
</script>
