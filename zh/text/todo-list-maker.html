<style>
.add-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.add-row input[type=text]{flex:1;min-width:200px;background:var(--glass2);border:1px solid var(--border2);color:var(--text);padding:8px 12px;border-radius:8px;font-size:.95em}
.add-row select,.add-row input[type=date]{background:var(--glass2);border:1px solid var(--border2);color:var(--text);padding:8px 10px;border-radius:8px;font-size:.9em}
.todo-item{display:flex;align-items:center;gap:10px;background:var(--glass);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;transition:border-color .15s,opacity .15s}
.todo-item:hover{border-color:var(--accent)}
.todo-item.done{opacity:.55}
.todo-item.done .todo-text{text-decoration:line-through}
.todo-item input[type=checkbox]{width:20px;height:20px;cursor:pointer;accent-color:var(--accent);flex-shrink:0}
.todo-text{flex:1;font-size:.95em;word-break:break-word}
.todo-pri{font-size:.65em;padding:2px 8px;border-radius:10px;white-space:nowrap;font-weight:600}
.todo-pri.high{background:rgba(255,80,80,.2);color:#ff6464}
.todo-pri.med{background:rgba(255,200,80,.2);color:#ffc850}
.todo-pri.low{background:rgba(80,200,120,.2);color:#50c878}
.todo-due{font-size:.75em;color:var(--text3);white-space:nowrap}
.todo-due.overdue{color:#ff6464}
.todo-del{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:1.1em;padding:2px 6px}
.todo-del:hover{color:var(--gz-accent)}
.todo-item.dragging{opacity:.4}
.stats{display:flex;gap:14px;margin-bottom:12px;font-size:.85em;color:var(--text2);flex-wrap:wrap}
.stats b{color:var(--accent)}
.filter-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}

.filter-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
.empty{text-align:center;color:var(--text3);padding:30px;font-size:.9em}

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="add-row">
      <input id="newTask" type="text" placeholder="">
      <select id="newPri"><option value="low"></option><option value="med" selected></option><option value="high"></option></select>
      <input id="newDue" type="date">
      <button class="gz-btn" id="addBtn"></button>
    </div>
    <div class="stats" id="stats"></div>
    <div class="filter-row" id="filters"></div>
    <div id="list"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'To-Do List Maker',
    toolDesc: 'A clean, fast online to-do list with priorities, due dates, filters and progress tracking. Auto-saves locally — no signup, 100% private.',
    addPlaceholder: 'Add a new task and press Enter…',
    add: '➕ Add',
    high: 'High', med: 'Medium', low: 'Low',
    all: 'All', active: 'Active', done: 'Completed',
    clearDone: '🗑 Clear Done',
    clearAll: '🗑 Clear All',
    statTotal: 'Total', statDone: 'Done', statLeft: 'Left',
    progress: 'Progress',
    empty: 'No tasks yet. Add one above to get started!',
    step1: 'Type a task and press Enter (or click Add)',
    step2: 'Set a priority and optional due date',
    step3: 'Click the checkbox to mark a task done',
    step4: 'Use filters to view All, Active or Completed tasks',
    dragHint: 'Tip: drag tasks to reorder',
  },
  zh: {
    toolTitle: '待办清单工具',
    toolDesc: '简洁快速的在线待办清单，支持优先级、截止日期、筛选和进度跟踪。本地自动保存 — 无需注册，100% 私密。',
    addPlaceholder: '输入新任务并按回车…',
    add: '➕ 添加',
    high: '高', med: '中', low: '低',
    all: '全部', active: '未完成', done: '已完成',
    clearDone: '🗑 清除已完成',
    clearAll: '🗑 全部清除',
    statTotal: '总计', statDone: '已完成', statLeft: '剩余',
    progress: '进度',
    empty: '还没有任务。在上方添加一个开始吧！',
    step1: '输入任务并按回车（或点击「添加」）',
    step2: '设置优先级和截止日期（可选）',
    step3: '点击复选框标记任务为已完成',
    step4: '使用筛选查看全部、未完成或已完成的任务',
    dragHint: '提示：拖动任务可重新排序',
  }
});

const { $, t } = GZ;
const LS_KEY = 'gz-todo-list';
let todos = [];
let filter = 'all';
let dragId = null;

function load() {
  try { todos = JSON.parse(localStorage.getItem(LS_KEY) || '[]'); } catch { todos = []; }
}

function save() {
  localStorage.setItem(LS_KEY, JSON.stringify(todos));
  render();
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function addTask() {
  const text = $('#newTask').value.trim();
  if (!text) return;
  todos.push({ id: uid(), text, pri: $('#newPri').value, due: $('#newDue').value, done: false });
  $('#newTask').value = '';
  $('#newDue').value = '';
  save();
}

function toggle(id) {
  const t = todos.find(x=>x.id===id); if (t) { t.done = !t.done; save(); }
}

function del(id) {
  todos = todos.filter(x=>x.id!==id);
  save();
}

function clearDone() { todos = todos.filter(x=>!x.done); save(); }
function clearAll() { if(confirm('Delete all tasks?')) { todos = []; save(); } }

function isOverdue(due, done) {
  if (!due || done) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  return new Date(due) < today;
}

function render() {
  const total = todos.length;
  const doneN = todos.filter(x=>x.done).length;
  const left = total - doneN;
  const pct = total ? Math.round(doneN/total*100) : 0;
  $('#stats').innerHTML = `<span>${t('statTotal')}: <b>${total}</b></span><span>${t('statDone')}: <b>${doneN}</b></span><span>${t('statLeft')}: <b>${left}</b></span><span>${t('progress')}: <b>${pct}%</b></span>`;

  const priLabel = { high: t('high'), med: t('med'), low: t('low') };
  let list = todos;
  if (filter==='active') list = todos.filter(x=>!x.done);
  else if (filter==='done') list = todos.filter(x=>x.done);

  if (!list.length) {
    $('#list').innerHTML = `<div class="empty">${t('empty')}</div>`;
    return;
  }
  $('#list').innerHTML = list.map(item => {
    const overdue = isOverdue(item.due, item.done);
    return `<div class="todo-item${item.done?' done':''}" draggable="true" data-id="${item.id}"
      ondragstart="dragStart('${item.id}')" ondragover="event.preventDefault()" ondrop="dropOn('${item.id}')">
      <input type="checkbox" ${item.done?'checked':''} onchange="toggle('${item.id}')">
      <span class="todo-text">${esc(item.text)}</span>
      <span class="todo-pri ${item.pri}">${priLabel[item.pri]}</span>
      ${item.due?`<span class="todo-due${overdue?' overdue':''}">📅 ${item.due}</span>`:''}
      <button class="todo-del" onclick="del('${item.id}')">✕</button>
    </div>`;
  }).join('');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function dragStart(id){ dragId = id; }
function dropOn(targetId) {
  if (!dragId || dragId === targetId) return;
  const from = todos.findIndex(x=>x.id===dragId);
  const to = todos.findIndex(x=>x.id===targetId);
  if (from<0||to<0) return;
  const [moved] = todos.splice(from,1);
  todos.splice(to,0,moved);
  dragId = null;
  save();
}

function renderFilters() {
  $('#filters').innerHTML = ['all','active','done'].map(f=>`<button class="filter-btn${filter===f?' active':''}" onclick="filter='${f}';renderFilters();render()">${t(f)}</button>`).join('');
}

// i18n for static elements
$('#newTask').placeholder = t('addPlaceholder');
$('#newPri').innerHTML = `<option value="low">${t('low')}</option><option value="med" selected>${t('med')}</option><option value="high">${t('high')}</option>`;
$('#addBtn').textContent = t('add');
$('#addBtn').onclick = addTask;
$('#newTask').addEventListener('keydown', e=>{ if(e.key==='Enter') addTask(); });

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="clearDone()">${t('clearDone')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clearAll')}</button>`;

load();
renderFilters();
render();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✅', href:'/text/checklist.html', name:'Checklist'},
    {icon:'✅', href:'/text/daily-planner.html', name:'Daily Planner'},
    {icon:'✅', href:'/fun/kanban-board.html', name:'Kanban'},
    {icon:'✅', href:'/text/pomodoro-timer.html', name:'Pomodoro'},
  ]
});
</script>

</body>
