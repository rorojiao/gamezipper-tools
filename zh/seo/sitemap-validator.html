    missingNamespace: '缺少站点地图命名空间声明',

    invalidUrl: 'URL 格式无效',

    invalidChangefreq: 'changefreq 值无效',
    urlTooLong: 'URL 超过 2048 个字符',
    step1: '将 XML 站点地图粘贴到输入区',
    step2: '点击「验证」检查站点地图',

const { $, t } = GZ;

const VALID_CHANGES = ['always','hourly','daily','weekly','monthly','yearly','never'];

function doValidate() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#status').innerHTML = `<span style="color:var(--text2)">${t('noInput')}</span>`; return; }

  let errorCount = 0, warnCount = 0, passCount = 0;
  const issues = [];

  // Parse XML
  const parser = new DOMParser();
  const doc = parser.parseFromString(inp, 'text/xml');
  const parseError = doc.querySelector('parsererror');

  if (parseError) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidXml')}</span>`;
    $('#output').innerHTML = `<div class="error-item error"><strong>${t('invalidXml')}</strong><br><pre style="font-size:.8em;white-space:pre-wrap">${parseError.textContent.substring(0,500)}</pre></div>`;
    return;
  }

  issues.push({type:'pass', msg: t('validXml')});
  passCount++;

  // Check namespace
  const urlset = doc.querySelector('urlset');
  if (!urlset) {
    issues.push({type:'error', msg: t('missingUrlset')});
    errorCount++;
  } else {
    const ns = urlset.getAttribute('xmlns') || urlset.getAttributeNS('http://www.w3.org/2000/xmlns/', 'xmlns') || '';
    if (!ns.includes('sitemaps.org')) {
      issues.push({type:'warn', msg: t('missingNamespace')});
      warnCount++;
    } else {
      issues.push({type:'pass', msg: '✓ Namespace declared'});
      passCount++;
    }
  }

  // Count URLs
  const urls = doc.querySelectorAll('url');
  const urlCount = urls.length;

  if (urlCount === 0) {
    issues.push({type:'error', msg: t('emptySitemap')});
    errorCount++;
  } else {
    issues.push({type:'pass', msg: `✓ ${urlCount} URL(s) found`});
    passCount++;
  }

  // Check each URL
  const seenUrls = new Set();
  urls.forEach((urlEl, idx) => {
    const loc = urlEl.querySelector('loc');
    if (!loc) {
      issues.push({type:'error', msg: `URL #${idx+1}: Missing <loc> element`});
      errorCount++;
      return;
    }
    const urlText = loc.textContent.trim();

    // Validate URL
    try {
      new URL(urlText);
      if (!/^https?:\/\//i.test(urlText)) throw new Error();
    } catch {
      issues.push({type:'error', msg: `URL #${idx+1}: ${t('invalidUrl')} — ${urlText.substring(0,80)}`});
      errorCount++;
    }

    // Duplicate check
    if (seenUrls.has(urlText)) {
      issues.push({type:'warn', msg: `URL #${idx+1}: ${t('duplicateUrl')} — ${urlText.substring(0,80)}`});
      warnCount++;
    }
    seenUrls.add(urlText);

    // URL length
    if (urlText.length > 2048) {
      issues.push({type:'warn', msg: `URL #${idx+1}: ${t('urlTooLong')} (${urlText.length} chars)`});
      warnCount++;
    }

    // Priority
    const priority = urlEl.querySelector('priority');
    if (priority) {
      const val = parseFloat(priority.textContent.trim());
      if (isNaN(val) || val < 0 || val > 1) {
        issues.push({type:'warn', msg: `URL #${idx+1}: ${t('invalidPriority')} — "${priority.textContent.trim()}"`});
        warnCount++;
      }
    }

    // Changefreq
    const cf = urlEl.querySelector('changefreq');
    if (cf) {
      const val = cf.textContent.trim().toLowerCase();
      if (!VALID_CHANGES.includes(val)) {
        issues.push({type:'warn', msg: `URL #${idx+1}: ${t('invalidChangefreq')} — "${val}"`});
        warnCount++;
      }
    }
  });

  // Render summary
  const statusColor = errorCount > 0 ? 'var(--gz-accent)' : (warnCount > 0 ? '#f0ad4e' : 'var(--gz-success)');
  const statusText = errorCount > 0 ? `✗ ${errorCount} error(s), ${warnCount} warning(s)` : (warnCount > 0 ? `⚠ Valid with ${warnCount} warning(s)` : '✓ All checks passed');
  $('#status').innerHTML = `<span style="color:${statusColor}">${statusText}</span>`;

  let html = `<div class="summary-grid">
    <div class="summary-card"><div class="num" style="color:var(--accent)">${urlCount}</div><div class="lbl">${t('totalUrls')}</div></div>
    <div class="summary-card"><div class="num" style="color:var(--gz-accent)">${errorCount}</div><div class="lbl">${t('errors')}</div></div>
    <div class="summary-card"><div class="num" style="color:#f0ad4e">${warnCount}</div><div class="lbl">${t('warnings')}</div></div>
    <div class="summary-card"><div class="num" style="color:var(--gz-success)">${passCount}</div><div class="lbl">${t('passed')}</div></div>
  </div>`;

  html += '<h3 style="margin:16px 0 8px;font-size:.95rem">' + t('results') + '</h3>';
  issues.forEach(i => {
    html += `<div class="error-item ${i.type}">${i.type === 'error' ? '❌' : (i.type === 'warn' ? '⚠️' : '✅')} ${i.msg}</div>`;
  });

  // URL list
  if (urlCount > 0 && urlCount <= 100) {
    html += '<h3 style="margin:16px 0 8px;font-size:.95rem">URLs</h3><div class="url-list">';
    urls.forEach((urlEl, idx) => {
      const loc = urlEl.querySelector('loc');
      const pri = urlEl.querySelector('priority');
      const mod = urlEl.querySelector('lastmod');
      html += `<div class="url-row"><span style="color:var(--text2);min-width:30px">#${idx+1}</span><span style="flex:1">${loc ? loc.textContent.trim() : '(no loc)'}</span>${pri ? `<span style="color:var(--accent);font-size:.8em">⭐${pri.textContent.trim()}</span>` : ''}${mod ? `<span style="color:var(--text2);font-size:.8em">📅${mod.textContent.trim()}</span>` : ''}</div>`;
    });
    html += '</div>';
  }

  $('#output').innerHTML = html;
}

</script>
