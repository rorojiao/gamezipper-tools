.m8-wrap{display:grid;gap:24px;place-items:center;padding:18px 0}
.m8-stage{perspective:1200px;width:260px;height:260px;margin:0 auto}
.m8-ball{width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 30% 30%,#1a1a1a,#000 70%);box-shadow:0 20px 60px rgba(0,0,0,0.55),inset 0 0 50px rgba(255,255,255,0.06);position:relative;transform-style:preserve-3d;transition:transform 0.3s;cursor:pointer}
.m8-ball:hover{transform:scale(1.02)}
.m8-ball.shaking{animation:m8shake 0.5s linear}
.m8-ball.revealing{animation:m8reveal 1s ease-out}
@keyframes m8shake{0%{transform:translate(0,0) rotate(0)}10%{transform:translate(-8px,-4px) rotate(-3deg)}20%{transform:translate(7px,3px) rotate(3deg)}30%{transform:translate(-6px,-3px) rotate(-2deg)}40%{transform:translate(5px,4px) rotate(2deg)}50%{transform:translate(-4px,-2px) rotate(-1deg)}60%{transform:translate(3px,2px) rotate(1deg)}70%{transform:translate(-2px,-1px) rotate(0)}100%{transform:translate(0,0) rotate(0)}}
@keyframes m8reveal{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
.m8-window{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:115px;height:115px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#fff,#cce5ff 60%,#88b3e0);box-shadow:inset 0 6px 20px rgba(0,0,0,0.35),0 2px 4px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;padding:8px;text-align:center}
.m8-number{position:absolute;top:14px;left:14px;width:34px;height:34px;background:radial-gradient(circle at 30% 30%,#fff,#bbb);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#222;font-size:.85em;box-shadow:0 2px 6px rgba(0,0,0,0.4)}
.m8-answer{font-weight:800;color:#000;font-size:.85em;line-height:1.2;letter-spacing:.02em}
.m8-answer.positive{color:#0a6d1d}
.m8-answer.neutral{color:#a35e00}
.m8-answer.negative{color:#a30000}
.m8-controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.m8-input{width:100%;max-width:480px;padding:12px 16px;border-radius:10px;border:1px solid var(--gz-border);background:var(--gz-glass);color:var(--gz-text);font-size:1em;font-family:inherit}
.m8-stats{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;font-size:.88em;color:var(--gz-text2)}
.m8-stats b{color:var(--gz-accent);font-size:1.1em}
.m8-history{width:100%;max-width:520px;display:grid;gap:8px}
.m8-h{background:var(--gz-glass2);border:1px solid var(--gz-border);border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.m8-h-q{font-size:.92em;color:var(--gz-text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.m8-h-a{font-weight:700;padding:4px 10px;border-radius:6px;font-size:.85em}
.m8-h-a.positive{background:rgba(10,109,29,0.15);color:#0a6d1d}
.m8-h-a.neutral{background:rgba(163,94,0,0.15);color:#a35e00}
.m8-h-a.negative{background:rgba(163,0,0,0.15);color:#a30000}
.m8-help{font-size:.85em;color:var(--gz-text2);text-align:center;margin-top:8px}
</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How does a Magic 8-Ball work?", "acceptedAnswer": {"@type": "Answer", "text": "A Magic 8-Ball is a fortune-telling toy invented in the 1940s. You ask a yes/no question, shake the ball, and one of 20 answers floats up to a window on the surface — the answers include positive, neutral and negative responses."}}, {"@type": "Question", "name": "Is this Magic 8-Ball free to use?", "acceptedAnswer": {"@type": "Answer", "text": "Yes — completely free, no signup required, no ads inside the experience, and the tool runs entirely in your browser. Nothing is sent to a server."}}, {"@type": "Question", "name": "What kinds of questions should I ask?", "acceptedAnswer": {"@type": "Answer", "text": "Ask yes/no questions for best results. Examples: 'Should I take this job?' 'Will it rain tomorrow?' 'Is this recipe good?' Avoid open-ended or multi-part questions."}}, {"@type": "Question", "name": "Can I use it for important decisions?", "acceptedAnswer": {"@type": "Answer", "text": "The Magic 8-Ball is for entertainment only. For real decisions, combine your judgment with input from people you trust and reliable data."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area m8-wrap">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Magic 8-Ball',
    toolDesc: 'Shake the Magic 8-Ball to get an instant answer to any yes/no question. Fun, fast, and totally private — runs entirely in your browser.',
    askQ: 'Ask a yes/no question...',
    tapHint: '👇 Tap the 8-ball or click the button to shake it',
    shakeBtn: '🔮 Shake the 8-Ball',
    clearBtn: 'Clear History',
    noQ: '(Type a question first)',
    asked: 'asked',
    positive: 'Positive',
    neutral: 'Neutral',
    negative: 'Negative',
    step1: 'Type a yes/no question in the input field',
    step2: 'Tap the 8-ball or click the "Shake" button',
    step3: 'Watch the ball shake and reveal an answer',
    step4: 'Your question history appears below — clear it anytime',
  },
  zh: {
    toolTitle: '魔法 8 号球',
    toolDesc: '摇一摇魔法 8 号球，瞬时回答你的所有是非问题。趣味、快速、完全私密 — 浏览器本地运行。',
    askQ: '问一个是非问题...',
    tapHint: '👇 点击 8 号球或按钮即可摇动',
    shakeBtn: '🔮 摇动 8 号球',
    clearBtn: '清空记录',
    noQ: '(请先输入问题)',
    asked: '提问',
    positive: '肯定',
    neutral: '中性',
    negative: '否定',
    step1: '在输入框中输入一个是非问题',
    step2: '点击 8 号球或「摇动」按钮',
    step3: '观看 8 号球摇动并显示答案',
    step4: '下方显示你的提问历史，可随时清空',
  }
});

const ANSWERS = [
  { text: 'It is certain', type: 'positive' },
  { text: 'It is decidedly so', type: 'positive' },
  { text: 'Without a doubt', type: 'positive' },
  { text: 'Yes — definitely', type: 'positive' },
  { text: 'You may rely on it', type: 'positive' },
  { text: 'As I see it, yes', type: 'positive' },
  { text: 'Most likely', type: 'positive' },
  { text: 'Outlook good', type: 'positive' },
  { text: 'Yes', type: 'positive' },
  { text: 'Signs point to yes', type: 'positive' },
  { text: 'Reply hazy, try again', type: 'neutral' },
  { text: 'Ask again later', type: 'neutral' },
  { text: 'Better not tell you now', type: 'neutral' },
  { text: 'Cannot predict now', type: 'neutral' },
  { text: 'Concentrate and ask again', type: 'neutral' },
  { text: 'Don\'t count on it', type: 'negative' },
  { text: 'My reply is no', type: 'negative' },
  { text: 'My sources say no', type: 'negative' },
  { text: 'Outlook not so good', type: 'negative' },
  { text: 'Very doubtful', type: 'negative' },
];

const { $, t } = GZ;
let history = [];
let counts = { positive: 0, neutral: 0, negative: 0 };
let isShaking = false;

function pickAnswer() {
  return ANSWERS[Math.floor(Math.random() * ANSWERS.length)];
}

function renderStats() {
  const total = counts.positive + counts.neutral + counts.negative;
  $('#stats').innerHTML = `
    <span><b>${total}</b> ${t('asked')}</span>
    <span style="color:#0a6d1d"><b>${counts.positive}</b> ${t('positive')}</span>
    <span style="color:#a35e00"><b>${counts.neutral}</b> ${t('neutral')}</span>
    <span style="color:#a30000"><b>${counts.negative}</b> ${t('negative')}</span>`;
}

function renderHistory() {
  $('#history').innerHTML = history.slice(0, 5).map(h => `
    <div class="m8-h">
      <span class="m8-h-q">${h.q || '(no question)'}</span>
      <span class="m8-h-a ${h.type}">${h.text}</span>
    </div>`).join('');
}

function shake() {
  if (isShaking) return;
  const ball = $('#ball');
  const ans = $('#answer');
  const q = $('#question').value.trim();
  isShaking = true;
  ball.classList.remove('shaking', 'revealing');
  ans.className = 'm8-answer';
  ans.textContent = '...';
  void ball.offsetWidth; // restart animation
  ball.classList.add('shaking');
  setTimeout(() => {
    const a = pickAnswer();
    ans.textContent = a.text;
    ans.classList.add(a.type);
    ball.classList.remove('shaking');
    ball.classList.add('revealing');
    history.unshift({ q, text: a.text, type: a.type });
    counts[a.type]++;
    renderStats();
    renderHistory();
    isShaking = false;
  }, 600);
}

$('#ball').addEventListener('click', shake);
$('#question').addEventListener('keydown', e => { if (e.key === 'Enter') shake(); });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="shake()">${t('shakeBtn')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="history=[];counts={positive:0,neutral:0,negative:0};renderHistory();renderStats();$('#answer').textContent='Ask me';$('#answer').className='m8-answer'">${t('clearBtn')}</button>`;

$('#question').placeholder = t('askQ');
$('#helpText').textContent = t('tapHint');
renderStats();
renderHistory();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🪙', href:'/fun/coin-flipper.html', name:'Coin Flipper'},
    {icon:'🎲', href:'/fun/dice-roller.html', name:'Dice Roller'},
    {icon:'🎯', href:'/fun/name-picker.html', name:'Name Picker'},
    {icon:'🎡', href:'/fun/decision-wheel.html', name:'Decision Wheel'},
  ]
});
</script>
