<style>
.builder-layout{display:grid;grid-template-columns:240px 1fr 1fr;gap:14px;margin-top:14px}
@media(max-width:1000px){.builder-layout{grid-template-columns:1fr}}
.palette{background:var(--gz-bg-alt);border:1px solid var(--gz-border);border-radius:12px;padding:12px;height:fit-content}
.palette h3{font-size:.85em;margin:0 0 10px;text-transform:uppercase;letter-spacing:.5px;opacity:.7}
.palette button{width:100%;text-align:left;padding:9px 12px;margin-bottom:5px;background:var(--gz-bg);border:1px solid var(--gz-border);border-radius:8px;cursor:pointer;color:var(--gz-text);font-size:.9em;display:flex;align-items:center;gap:8px}
.palette button:hover{border-color:var(--gz-accent);background:rgba(99,102,241,.06)}
.palette button .ic{font-size:1.1em}
.canvas{background:var(--gz-bg-alt);border:1px solid var(--gz-border);border-radius:12px;padding:18px;min-height:380px}
.canvas .empty{text-align:center;opacity:.5;padding:80px 20px;font-size:.95em}
.field-row{background:var(--gz-bg);border:1px solid var(--gz-border);border-radius:10px;padding:12px;margin-bottom:10px;position:relative;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field-row:hover{border-color:var(--gz-accent)}
.field-row label{display:flex;flex-direction:column;font-size:.82em;gap:3px;opacity:.9}
.field-row input,.field-row select,.field-row textarea{background:var(--gz-bg-alt);border:1px solid var(--gz-border);border-radius:6px;padding:5px 8px;color:var(--gz-text);font-size:.9em;font-family:inherit}
.field-row .field-name{grid-column:1/3;display:flex;align-items:center;gap:6px}
.field-row .field-name .type-tag{background:var(--gz-accent);color:#fff;padding:1px 8px;border-radius:8px;font-size:.7em;font-weight:600;text-transform:uppercase}
.field-row .field-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px}
.field-row .field-actions button{background:transparent;border:none;cursor:pointer;font-size:1.1em;padding:2px 4px;opacity:.6}
.field-row .field-actions button:hover{opacity:1}
.field-row .field-actions .del{color:#ef4444}
.preview{background:var(--gz-bg-alt);border:1px solid var(--gz-border);border-radius:12px;padding:18px;min-height:380px}
.preview h3{font-size:.85em;margin:0 0 10px;text-transform:uppercase;letter-spacing:.5px;opacity:.7}
.preview .live-form{background:#fff;color:#1a1a1a;border-radius:8px;padding:18px;font-size:.9em;max-height:480px;overflow-y:auto}
.live-form label{display:block;font-weight:600;font-size:.85em;margin-bottom:4px;margin-top:10px}
.live-form label:first-child{margin-top:0}
.live-form input,.live-form select,.live-form textarea{width:100%;padding:7px 10px;border:1px solid #ccc;border-radius:6px;font-size:.95em;font-family:inherit;background:#fff;color:#1a1a1a;box-sizing:border-box}
.live-form input[type=checkbox],.live-form input[type=radio]{width:auto;margin-right:6px}
.live-form button.submit-btn{background:#4f46e5;color:#fff;border:none;padding:9px 18px;border-radius:6px;font-weight:600;margin-top:14px;cursor:pointer}
.code-output{background:#0f172a;color:#e2e8f0;border-radius:8px;padding:14px;font-family:monospace;font-size:.82em;max-height:300px;overflow:auto;line-height:1.5;margin-top:8px;white-space:pre;tab-size:2}
.tabs{display:flex;gap:4px;margin-bottom:8px}
.tabs button{padding:6px 14px;border-radius:8px;background:var(--gz-bg);border:1px solid var(--gz-border);color:var(--gz-text);cursor:pointer;font-size:.85em}
.tabs button.active{background:var(--gz-accent);color:#fff;border-color:var(--gz-accent);font-weight:600}
</style>

<script>

  },

    toolDesc: '可视化构建精美的 HTML 表单。从面板添加字段、自定义标签和选项、查看实时预览并复制干净的 HTML+CSS — 无需注册，浏览器本地运行。',

    text: '文本输入', email: '邮箱', password: '密码', number: '数字', tel: '电话', url: '网址', date: '日期',
    textarea: '多行文本', select: '下拉选择', checkbox: '复选框', radio: '单选框', file: '文件上传',
    presetContact: '联系表单', presetSignup: '注册表单', presetSurvey: '调查问卷', presetFeedback: '反馈表单',
    fieldLabel: '标签', fieldName: 'Name (属性)', fieldPlaceholder: '占位符', fieldRequired: '必填',
    fieldOptions: '选项（每行一个）', fieldClass: 'CSS 类',
    copyHtml: '复制 HTML', copyCss: '复制 CSS', clearAll: '清空全部',
    step1: '点击左侧的字段类型添加字段',
    step2: '自定义标签、Name、占位符和必填状态',
    step3: '点击预设加载完整表单（联系、注册、调查、反馈）',
    step4: '切换到 HTML / CSS 标签并复制干净代码',
  }

const { $, t } = GZ;

let fields = [];
let uid = 0;

function addField(type) {
  const defaults = {
    text: { label: 'Full Name', name: 'name', placeholder: 'John Doe', type: 'text' },
    email: { label: 'Email', name: 'email', placeholder: 'you@example.com', type: 'email' },
    password: { label: 'Password', name: 'password', placeholder: '••••••', type: 'password' },
    number: { label: 'Age', name: 'age', placeholder: '18', type: 'number' },
    tel: { label: 'Phone', name: 'phone', placeholder: '+1 555 123 4567', type: 'tel' },
    url: { label: 'Website', name: 'website', placeholder: 'https://', type: 'url' },
    date: { label: 'Date', name: 'date', type: 'date' },
    textarea: { label: 'Message', name: 'message', placeholder: 'Type here...', type: 'textarea' },
    select: { label: 'Country', name: 'country', type: 'select', options: 'United States\nUnited Kingdom\nGermany\nChina\nJapan' },
    checkbox: { label: 'Interests', name: 'interests', type: 'checkbox', options: 'Sports\nMusic\nTech\nTravel' },
    radio: { label: 'Plan', name: 'plan', type: 'radio', options: 'Free\nPro\nEnterprise' },
    file: { label: 'Upload', name: 'file', type: 'file' },
  };
  const def = defaults[type] || defaults.text;
  fields.push({ id: ++uid, type, label: def.label, name: def.name, placeholder: def.placeholder || '', required: false, options: def.options || '', cssClass: '' });
  render();
}

function loadPreset(name) {
  fields = []; uid = 0;
  if (name === 'contact') {
    addField('text'); fields[0].label = 'Your Name'; fields[0].name = 'name'; fields[0].required = true;
    addField('email'); fields[1].label = 'Email'; fields[1].name = 'email'; fields[1].required = true;
    addField('textarea'); fields[2].label = 'Message'; fields[2].name = 'message'; fields[2].required = true;
  } else if (name === 'signup') {
    addField('text'); fields[0].label = 'Username'; fields[0].name = 'username'; fields[0].required = true;
    addField('email'); fields[1].label = 'Email'; fields[1].name = 'email'; fields[1].required = true;
    addField('password'); fields[2].label = 'Password'; fields[2].name = 'password'; fields[2].required = true;
    addField('checkbox'); fields[3].label = 'Agree to terms'; fields[3].name = 'terms'; fields[3].options = 'I accept the terms and conditions'; fields[3].required = true;
  } else if (name === 'survey') {
    addField('text'); fields[0].label = 'Your name (optional)'; fields[0].name = 'name';
    addField('radio'); fields[1].label = 'How satisfied are you?'; fields[1].name = 'satisfaction'; fields[1].options = 'Very satisfied\nSatisfied\nNeutral\nDissatisfied';
    addField('checkbox'); fields[2].label = 'Which features do you use?'; fields[2].name = 'features'; fields[2].options = 'Search\nSharing\nNotifications\nThemes';
    addField('textarea'); fields[3].label = 'What can we improve?'; fields[3].name = 'feedback';
  } else if (name === 'feedback') {
    addField('text'); fields[0].label = 'Name'; fields[0].name = 'name';
    addField('email'); fields[1].label = 'Email'; fields[1].name = 'email';
    addField('radio'); fields[2].label = 'Rating'; fields[2].name = 'rating'; fields[2].options = '⭐⭐⭐⭐⭐\n⭐⭐⭐⭐\n⭐⭐⭐\n⭐⭐\n⭐';
    addField('textarea'); fields[3].label = 'Comments'; fields[3].name = 'comments';
  }
  render();
}

function render() {
  const canvas = $('#canvas');
  if (fields.length === 0) {
    canvas.innerHTML = `<div class="empty">${t('empty')}</div>`;
  } else {
    canvas.innerHTML = fields.map((f, i) => {
      const opts = (f.options || '').split('\n').map(o => o.trim()).filter(Boolean);
      let extra = '';
      if (['select','checkbox','radio'].includes(f.type)) {
        extra = `<label style="grid-column:1/3">${t('fieldOptions')} <textarea data-i="${i}" data-k="options" rows="3">${f.options||''}</textarea></label>`;
      }
      return `<div class="field-row">
        <div class="field-name">
          <span class="type-tag">${f.type}</span>
          <input data-i="${i}" data-k="label" value="${(f.label||'').replace(/"/g,'&quot;')}" placeholder="Label" style="flex:1;background:transparent;border:none;color:var(--gz-text);font-size:1em;font-weight:600;padding:4px">
        </div>
        <div class="field-actions">
          <button class="dup" data-action="dup" data-i="${i}" title="${t('dup')}">⎘</button>
          <button class="del" data-action="del" data-i="${i}" title="${t('del')}">×</button>
        </div>
        <label>${t('fieldName')} <input data-i="${i}" data-k="name" value="${(f.name||'').replace(/"/g,'&quot;')}" placeholder="name"></label>
        <label>${t('fieldPlaceholder')} <input data-i="${i}" data-k="placeholder" value="${(f.placeholder||'').replace(/"/g,'&quot;')}" placeholder="placeholder"></label>
        <label style="grid-column:1/3;flex-direction:row;align-items:center;gap:6px"><input type="checkbox" data-i="${i}" data-k="required" ${f.required?'checked':''}> ${t('fieldRequired')}</label>
        <label style="grid-column:1/3">${t('fieldClass')} <input data-i="${i}" data-k="cssClass" value="${(f.cssClass||'').replace(/"/g,'&quot;')}" placeholder="my-input"></label>
        ${extra}
      </div>`;
    }).join('');
    canvas.querySelectorAll('input,textarea').forEach(el => {
      el.addEventListener('input', e => {
        const i = +el.dataset.i, k = el.dataset.k;
        if (k === 'required') fields[i][k] = el.checked;
        else fields[i][k] = el.value;
        renderPreview();
        renderCode();
      });
    });
    canvas.querySelectorAll('button[data-action]').forEach(b => {
      b.onclick = () => {
        const i = +b.dataset.i;
        if (b.dataset.action === 'del') fields.splice(i, 1);
        else if (b.dataset.action === 'dup') { const copy = {...fields[i], id: ++uid}; fields.splice(i+1, 0, copy); }
        render();
      };
    });
  }
  renderPreview();
  renderCode();
}

function renderPreview() {
  const live = $('#tab-live');
  let html = '';
  for (const f of fields) {
    const req = f.required ? ' <span style="color:#dc2626">*</span>' : '';
    html += `<label>${f.label || f.name}${req}</label>`;
    const cls = f.cssClass ? ` class="${f.cssClass}"` : '';
    const reqAttr = f.required ? ' required' : '';
    if (f.type === 'textarea') {
      html += `<textarea${cls} name="${f.name}" placeholder="${f.placeholder||''}"${reqAttr} rows="3"></textarea>`;
    } else if (f.type === 'select') {
      const opts = (f.options || '').split('\n').filter(Boolean);
      html += `<select${cls} name="${f.name}"${reqAttr}><option value="">-- select --</option>`;
      for (const o of opts) html += `<option value="${o}">${o}</option>`;
      html += `</select>`;
    } else if (f.type === 'checkbox') {
      const opts = (f.options || '').split('\n').filter(Boolean);
      for (const o of opts) html += `<label style="font-weight:normal;display:flex;align-items:center;margin:3px 0"><input type="checkbox" name="${f.name}" value="${o}"${reqAttr}> ${o}</label>`;
    } else if (f.type === 'radio') {
      const opts = (f.options || '').split('\n').filter(Boolean);
      for (const o of opts) html += `<label style="font-weight:normal;display:flex;align-items:center;margin:3px 0"><input type="radio" name="${f.name}" value="${o}"${reqAttr}> ${o}</label>`;
    } else {
      html += `<input${cls} type="${f.type}" name="${f.name}" placeholder="${f.placeholder||''}"${reqAttr}>`;
    }
  }
  const action = $('#form-action').value || '#';
  const method = $('#form-method').value;
  const submit = $('#submit-text').value || 'Submit';
  html = `<form action="${action}" method="${method}" onsubmit="event.preventDefault();alert('Form preview only — not actually submitted')">${html}<button type="submit" class="submit-btn">${submit}</button></form>`;
  live.innerHTML = html;
}

function renderCode() {
  const action = $('#form-action').value || '#';
  const method = $('#form-method').value;
  const submit = $('#submit-text').value || 'Submit';
  let html = `<form action="${action}" method="${method}">\n`;
  for (const f of fields) {
    const req = f.required ? ' required' : '';
    const cls = f.cssClass ? ` class="${f.cssClass}"` : '';
    const ph = f.placeholder ? ` placeholder="${f.placeholder}"` : '';
    if (f.type === 'textarea') {
      html += `  <p>\n    <label>${f.label}<textarea${cls} name="${f.name}"${ph}${req}></textarea></label>\n  </p>\n`;
    } else if (f.type === 'select') {
      const opts = (f.options || '').split('\n').filter(Boolean);
      html += `  <p>\n    <label>${f.label}<select${cls} name="${f.name}"${req}>\n`;
      html += `      <option value="">-- select --</option>\n`;
      for (const o of opts) html += `      <option value="${o}">${o}</option>\n`;
      html += `    </select></label>\n  </p>\n`;
    } else if (f.type === 'checkbox') {
      const opts = (f.options || '').split('\n').filter(Boolean);
      html += `  <fieldset>\n    <legend>${f.label}</legend>\n`;
      for (const o of opts) html += `    <label><input type="checkbox" name="${f.name}" value="${o}"${req}> ${o}</label><br>\n`;
      html += `  </fieldset>\n`;
    } else if (f.type === 'radio') {
      const opts = (f.options || '').split('\n').filter(Boolean);
      html += `  <fieldset>\n    <legend>${f.label}</legend>\n`;
      for (const o of opts) html += `    <label><input type="radio" name="${f.name}" value="${o}"${req}> ${o}</label><br>\n`;
      html += `  </fieldset>\n`;
    } else {
      html += `  <p>\n    <label>${f.label}<input${cls} type="${f.type}" name="${f.name}"${ph}${req}></label>\n  </p>\n`;
    }
  }
  html += `  <p><button type="submit">${submit}</button></p>\n</form>`;
  $('#tab-html').textContent = html;
  const css = `form { max-width: 480px; margin: 0 auto; font-family: system-ui, sans-serif; }\nform p, form fieldset { margin: 0 0 14px; padding: 0; border: none; }\nform label { display: block; font-weight: 600; font-size: .9em; margin-bottom: 4px; }\nform input[type=text],\nform input[type=email],\nform input[type=password],\nform input[type=number],\nform input[type=tel],\nform input[type=url],\nform input[type=date],\nform select,\nform textarea { width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font: inherit; box-sizing: border-box; }\nform fieldset label { font-weight: normal; display: flex; align-items: center; gap: 6px; margin: 4px 0; }\nform input[type=checkbox], form input[type=radio] { width: auto; }\nform button[type=submit] { background: #4f46e5; color: #fff; border: none; padding: 10px 22px; border-radius: 6px; font: inherit; font-weight: 600; cursor: pointer; }\nform button[type=submit]:hover { background: #4338ca; }`;
  $('#tab-css').textContent = css;
}
