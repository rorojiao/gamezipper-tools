.mt-stage{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:1rem}

.mt-card{background:linear-gradient(135deg,var(--glass),var(--glass2));border:1px solid var(--border);border-radius:16px;padding:18px}
.mt-title{font-size:.78rem;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);font-weight:700;margin-bottom:8px}
.mt-meter{height:24px;background:var(--glass2);border-radius:12px;overflow:hidden;position:relative;border:1px solid var(--border)}
.mt-fill{height:100%;width:0;background:linear-gradient(90deg,#10b981 0%,#84cc16 50%,#f59e0b 75%,#ef4444 95%);transition:width 60ms linear}
.mt-meter-labels{display:flex;justify-content:space-between;font-size:.7rem;color:var(--text2);margin-top:4px;font-family:monospace}
.mt-canvas{width:100%;height:140px;background:#0a0a1a;border-radius:10px;display:block;margin-top:8px}

<body>
<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Microphone Test',
    toolDesc: 'Check if your microphone is working. View real-time volume, frequency spectrum, sample rate, and record audio to download — fully in your browser.',
    volume: 'Live Volume',
    spectrum: 'Frequency Spectrum',
    recording: 'Recording',
    start: 'Start Microphone',
    stop: 'Stop',
    record: 'Record',
    stopRec: 'Stop Recording',
    discard: 'Discard',
    download: 'Download Recording',
    peak: 'Peak',
    current: 'Current',
    sampleRate: 'Sample rate',
    channelCount: 'Channels',
    latency: 'Latency',
    browser: 'Browser',
    track: 'Track settings',
    echo: 'Echo cancellation',
    noise: 'Noise suppression',
    autoGain: 'Auto gain',
    tipsTitle: 'Troubleshooting tips',
    tip1: 'If the meter stays at 0, your mic is muted, blocked, or not selected. Check the OS sound settings.',
    tip2: 'On Windows, set your mic as the default recording device in Settings → System → Sound.',
    tip3: 'On macOS, check System Settings → Sound → Input and adjust the input volume slider.',
    tip4: 'Make sure no other application (Zoom, Discord, browser tab) is holding exclusive access to the mic.',
    statusReady: 'Click Start to begin',
    statusStreaming: 'Microphone active — speak now',
    statusRec: 'Recording in progress…',
    statusError: 'Microphone access was blocked or no device was found',
    recSaved: 'Recording saved — play back or download below',
    step1: 'Click Start Microphone and allow browser permission',
    step2: 'Speak normally and watch the live volume meter',
    step3: 'Inspect the frequency spectrum to verify your mic captures all ranges',
    step4: 'Click Record to capture a sample, then play back or download',
  },
  zh: {
    toolTitle: '麦克风测试',
    toolDesc: '检查麦克风是否正常工作。实时查看音量、频谱、采样率，并可录音下载 — 完全在浏览器中运行。',
    volume: '实时音量',
    spectrum: '频谱分析',
    recording: '录音',
    start: '启动麦克风',
    stop: '停止',
    record: '录音',
    stopRec: '停止录音',
    discard: '丢弃',
    download: '下载录音',
    peak: '峰值',
    current: '当前',
    sampleRate: '采样率',
    channelCount: '声道数',
    latency: '延迟',
    browser: '浏览器',
    track: '音轨设置',
    echo: '回声消除',
    noise: '降噪',
    autoGain: '自动增益',
    tipsTitle: '故障排查提示',
    tip1: '如果音量条一直为 0，可能是麦克风被静音、被屏蔽或未选中。请检查系统声音设置。',
    tip2: 'Windows 用户请在「设置 → 系统 → 声音」中将麦克风设为默认录音设备。',
    tip3: 'macOS 用户请在「系统设置 → 声音 → 输入」中检查并调整输入音量。',
    tip4: '确保没有其他应用（Zoom、Discord、其他浏览器标签）独占占用麦克风。',
    statusReady: '点击「启动麦克风」开始',
    statusStreaming: '麦克风已启用 — 请说话',
    statusRec: '正在录音…',
    statusError: '麦克风被拒绝或未找到设备',
    recSaved: '录音已保存 — 可在下方播放或下载',
    step1: '点击「启动麦克风」并允许浏览器权限',
    step2: '正常说话，观察实时音量条',
    step3: '查看频谱图确认麦克风覆盖各频段',
    step4: '点击「录音」录制样本，播放或下载',
  }
});

const { $, t } = GZ;
let stream = null, audioCtx = null, analyser = null, source = null;
let recorder = null, recChunks = [], recMime = '';
let rafId = null, peak = 0, recStart = 0, recTimer = null;

const volFill = $('#volFill');
const meterInfo = $('#meterInfo');
const specCanvas = $('#spectrum');
const specCtx = specCanvas.getContext('2d');
const statusEl = $('#status');
const statusTextEl = $('#statusText');
const pulseEl = $('#pulse');
const startBtn = $('#startBtn');
const stopBtn = $('#stopBtn');
const recBtn = $('#recBtn');
const deviceInfo = $('#deviceInfo');
const playWrap = $('#playWrap');
const playback = $('#playback');
const downloadLink = $('#downloadLink');
const deviceSelect = $('#deviceSelect');

startBtn.textContent = t('start');
stopBtn.textContent = t('stop');
recBtn.textContent = t('record');
downloadLink.textContent = '⬇ ' + t('download');
$('#discardBtn').textContent = t('discard');
$('#lblVolume').textContent = t('volume');
$('#lblSpectrum').textContent = t('spectrum');
$('#lblRecording').textContent = t('recording');
$('#tips').innerHTML = '<strong>' + t('tipsTitle') + ':</strong><br>' +
  [t('tip1'), t('tip2'), t('tip3'), t('tip4')].map(x => '• ' + x).join('<br>');

setStatus('statusReady', 'mt-warn');

function setStatus(key, cls) {
  statusEl.className = 'mt-status ' + cls;
  statusEl.textContent = t(key);
  statusTextEl.textContent = t(key);
}

function resizeSpec() {
  const dpr = window.devicePixelRatio || 1;
  const r = specCanvas.getBoundingClientRect();
  specCanvas.width = r.width * dpr;
  specCanvas.height = r.height * dpr;
  specCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resizeSpec);

async function listDevices() {
  try {
    const list = await navigator.mediaDevices.enumerateDevices();
    const mics = list.filter(d => d.kind === 'audioinput');
    deviceSelect.innerHTML = mics.map((d, i) => `<option value="${d.deviceId}">${d.label || ('Mic ' + (i + 1))}</option>`).join('');
  } catch (e) {}
}

async function start() {
  try {
    const constraints = {
      audio: {
        deviceId: deviceSelect.value ? { exact: deviceSelect.value } : undefined,
        echoCancellation: true, noiseSuppression: true, autoGainControl: true
      }
    };
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    source.connect(analyser);

    resizeSpec();
    startBtn.disabled = true;
    stopBtn.disabled = false;
    recBtn.disabled = false;
    setStatus('statusStreaming', 'mt-ok');
    pulseEl.classList.add('active');

    const settings = stream.getAudioTracks()[0].getSettings();
    deviceInfo.innerHTML =
      '<b>' + t('sampleRate') + ':</b> ' + (settings.sampleRate || '—') + ' Hz &nbsp; ' +
      '<b>' + t('channelCount') + ':</b> ' + (settings.channelCount || '—') + ' &nbsp; ' +
      '<b>' + t('latency') + ':</b> ' + (settings.latency ? (settings.latency * 1000).toFixed(0) + ' ms' : '—') + ' &nbsp; ' +
      '<b>' + t('track') + ':</b> ' + (stream.getAudioTracks()[0].label || '—') + '<br>' +
      '<b>' + t('echo') + ':</b> ' + (settings.echoCancellation ? 'ON' : 'off') + ' &nbsp; ' +
      '<b>' + t('noise') + ':</b> ' + (settings.noiseSuppression ? 'ON' : 'off') + ' &nbsp; ' +
      '<b>' + t('autoGain') + ':</b> ' + (settings.autoGainControl ? 'ON' : 'off');

    listDevices();
    draw();
  } catch (e) {
    setStatus('statusError', 'mt-err');
    deviceInfo.innerHTML = '<span style="color:#ef4444">' + e.message + '</span>';
  }
}

function draw() {
  if (!analyser) return;
  const buf = new Uint8Array(analyser.fftSize);
  const freq = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(buf);
  analyser.getByteFrequencyData(freq);

  let sum = 0;
  for (let i = 0; i < buf.length; i++) {
    const v = (buf[i] - 128) / 128;
    sum += v * v;
  }
  const rms = Math.sqrt(sum / buf.length);
  const db = 20 * Math.log10(rms || 1e-7);
  const norm = Math.max(0, Math.min(100, (db + 60) * 100 / 60));
  volFill.style.width = norm + '%';
  if (norm > peak) peak = norm;
  meterInfo.innerHTML =
    '<b>' + t('current') + ':</b> ' + db.toFixed(1) + ' dB &nbsp; ' +
    '<b>' + t('peak') + ':</b> ' + ((peak / 100) * 60 - 60).toFixed(1) + ' dB';

  const w = specCanvas.width / (window.devicePixelRatio || 1);
  const h = specCanvas.height / (window.devicePixelRatio || 1);
  specCtx.fillStyle = '#0a0a1a';
  specCtx.fillRect(0, 0, w, h);
  const barW = w / freq.length;
  for (let i = 0; i < freq.length; i++) {
    const v = freq[i] / 255;
    const bh = v * (h - 4);
    const hue = 200 - v * 200;
    specCtx.fillStyle = `hsl(${hue}, 80%, ${30 + v * 30}%)`;
    specCtx.fillRect(i * barW, h - bh, Math.max(1, barW - 1), bh);
  }
  let maxIdx = 0, maxV = 0;
  for (let i = 1; i < freq.length; i++) if (freq[i] > maxV) { maxV = freq[i]; maxIdx = i; }
  const peakHz = maxIdx * (audioCtx.sampleRate / 2) / freq.length;
  $('#spectrumInfo').innerHTML = 'Peak: ' + (peakHz < 1000 ? peakHz.toFixed(0) + ' Hz' : (peakHz/1000).toFixed(2) + ' kHz');

  rafId = requestAnimationFrame(draw);
}

function stop() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null;
  if (recorder && recorder.state === 'recording') recorder.stop();
  if (rafId) cancelAnimationFrame(rafId);
  volFill.style.width = '0%';
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  startBtn.disabled = false;
  stopBtn.disabled = true;
  recBtn.disabled = true;
  pulseEl.classList.remove('active');
  setStatus('statusReady', 'mt-warn');
}

recBtn.addEventListener('click', () => {
  if (!stream) return;
  if (!recorder || recorder.state === 'inactive') {
    recChunks = [];
    const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4'];
    recMime = types.find(t => MediaRecorder.isTypeSupported(t)) || '';
    recorder = new MediaRecorder(stream, recMime ? { mimeType: recMime } : {});
    recorder.ondataavailable = e => { if (e.data && e.data.size) recChunks.push(e.data); };
    recorder.onstop = () => {
      const blob = new Blob(recChunks, { type: recMime || 'audio/webm' });
      const url = URL.createObjectURL(blob);
      playback.src = url;
      downloadLink.href = url;
      downloadLink.download = 'recording-' + Date.now() + '.webm';
      playWrap.classList.add('show');
      setStatus('recSaved', 'mt-ok');
    };
    recorder.start();
    recStart = Date.now();
    recBtn.textContent = t('stopRec');
    setStatus('statusRec', 'mt-rec');
    if (recTimer) clearInterval(recTimer);
    recTimer = setInterval(() => {
      const s = ((Date.now() - recStart) / 1000) | 0;
      recBtn.textContent = t('stopRec') + ' ' + Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
    }, 200);
  } else {
    recorder.stop();
    if (recTimer) clearInterval(recTimer);
    recBtn.textContent = t('record');
  }
});

startBtn.addEventListener('click', start);
stopBtn.addEventListener('click', stop);
$('#discardBtn').addEventListener('click', () => {
  playWrap.classList.remove('show');
  playback.removeAttribute('src');
  downloadLink.removeAttribute('href');
});
deviceSelect.addEventListener('change', () => { if (stream) { stop(); start(); } });

if (navigator.mediaDevices) listDevices();
GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📷', href:'/dev/webcam-test.html', name:'Webcam Test'},
    {icon:'🔊', href:'/convert/audio-volume.html', name:'Audio Volume Normalizer'},
    {icon:'🎤', href:'/text/speech-to-text.html', name:'Speech to Text'},
    {icon:'🖥️', href:'/dev/screen-resolution.html', name:'Screen Resolution'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
