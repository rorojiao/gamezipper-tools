const { $, t } = GZ;
let lang = GZI18n.getLang();
const STATE_KEY = 'gz-nc-data-v1';
let state = {
  effDate: new Date().toISOString().slice(0,10),
  employer: '', employerAddr: '', employee: '', employeeAddr: '', role: '',
  bizField: '', duration: 12, geoArea: '',
  nonSolicit: 'yes', solicitMonths: 12, confidentiality: 'yes', gardenLeave: 'no',
  jurisdiction: '',
};

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function nl2br(s){return esc(s).replace(/\n/g,'<br>');}
function loadState(){ try{const r=localStorage.getItem(STATE_KEY); if(r) state=Object.assign(state, JSON.parse(r));}catch(e){} }
function saveState(){ try{localStorage.setItem(STATE_KEY, JSON.stringify(state));}catch(e){} }
function bind(name){ return e => { state[name]=e.target.value; saveState(); renderPreview(); }; }

function renderPreview() {
  const clauses = [];
  clauses.push(`<h2>${t('partiesHead')}</h2><p>${t('considerTxt')}</p>`);
  clauses.push(`<h2>${t('compHead')}</h2><p>${t('compTxt')} <b>${esc(state.duration)||'12'}</b> ${t('compTxt2')} <b>${esc(state.geoArea)||'____________'}</b> ${t('compTxt3')} <b>${esc(state.bizField)||'____________'}</b>${t('compTxt4')}</p>`);
  if (state.nonSolicit === 'yes') {
    clauses.push(`<h2>${t('solicitHead')}</h2><p>${t('solicitTxt')} <b>${esc(state.solicitMonths)||'12'}</b> ${t('solicitTxt2')}</p>`);
  }
  if (state.confidentiality === 'yes') {
    clauses.push(`<h2>${t('confHead')}</h2><p>${t('confTxt')}</p>`);
  }
  if (state.gardenLeave === 'yes') {
    clauses.push(`<h2>${t('gardenHead')}</h2><p>${t('gardenTxt')}</p>`);
  }
  clauses.push(`<h2>${t('scopeHead')}</h2><p>${t('scopeTxt')}</p>`);
  clauses.push(`<h2>${t('lawHead')}</h2><p>${t('lawTxt')} <b>${esc(state.jurisdiction)||'____________'}</b>. ${t('lawEnd')}</p>`);

    <h1>${t('headTitle')}</h1>
    <div class="leg-sub">${t('sub')}</div>
    <p>${t('thisAgree')} <b>${esc(state.effDate)||'__________'}</b> ${t('byAnd')}</p>

    <p style="text-align:center;margin:6px 0">${t('and1')}</p>
    <p><b>${esc(state.employee)||'________________'}</b>${state.role?` <span style="color:#666">(${esc(state.role)})</span>`:''}${state.employeeAddr?`<br>${nl2br(state.employeeAddr)}`:''} <span style="color:#666">${t('employeeLab')}</span></p>
    ${clauses.join('')}
    <h2>${t('sigHead')}</h2>
    <div class="leg-sig">
      <div><div style="font-weight:700">${t('employerShort')}: ${esc(state.employer)||''}</div><div class="line">${t('signature')}<br>${t('date')}: ____________</div></div>
      <div><div style="font-weight:700">${t('employeeShort')}: ${esc(state.employee)||''}</div><div class="line">${t('signature')}<br>${t('date')}: ____________</div></div>
