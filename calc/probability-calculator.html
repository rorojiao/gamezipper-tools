<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Probability Calculator","description":"Calculate probability of events: P(A), P(B), union, intersection, conditional probability, and combinatorial probability for combinations and lotteries. Free online probability calculator.","url":"https://tools.gamezipper.com/calc/probability-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is the probability formula?","acceptedAnswer":{"@type":"Answer","text":"Basic probability is P(event) = favorable outcomes / total outcomes. For two events the union is P(A or B) = P(A) + P(B) − P(A and B), and conditional probability is P(A|B) = P(A and B) / P(B)."}},{"@type":"Question","name":"How do I calculate lottery probability?","acceptedAnswer":{"@type":"Answer","text":"Use the combinatorial mode: set total items n to the pool size, successes k to how many you pick, and desired to how many you want to match. The probability is C(k,desired) × C(n−k, k−desired) / C(n, k), all computed instantly in your browser."}},{"@type":"Question","name":"What is the difference between independent and dependent events?","acceptedAnswer":{"@type":"Answer","text":"Independent events do not affect each other, so P(A and B) = P(A) × P(B). Dependent events do affect each other, and you must use the conditional probability P(A and B) = P(A) × P(B|A)."}},{"@type":"Question","name":"Can probability be greater than 1?","acceptedAnswer":{"@type":"Answer","text":"No. A valid probability is always between 0 (impossible) and 1 (certain), or 0% to 100%. If your inputs produce a value outside this range, check that the intersection is not larger than the individual event probabilities."}}]}</script>

<script>
GZI18n.register({
  en:{
    toolTitle:'Probability Calculator',
    toolDesc:'Calculate probability for two events (union, intersection, conditional) or combinatorial probability for lotteries and combinations. Instant, free, and runs entirely in your browser.',
    modeTwo:'Two Events (A & B)',modeCombo:'Combinatorial (Lottery)',
    lblPa:'P(A) — probability of event A',lblPb:'P(B) — probability of event B',lblPab:'P(A∩B) — probability of both',
    lblN:'Total items n (pool size)',lblK:'Items drawn k',lblM:'Desired matches m',
    calculate:'⚡ Calculate',copy:'Copy',clear:'Clear',
    invalidRange:'Probabilities must be between 0 and 1, and the intersection cannot exceed either single probability.',
    enterValues:'Enter values above and press Calculate.',
    union:'P(A ∪ B) — either A or B',
    intersect:'P(A ∩ B) — both A and B',
    neither:'P(neither A nor B)',
    onlyA:'P(A only)',
    onlyB:'P(B only)',
    condA:'P(A | B) — A given B',
    condB:'P(B | A) — B given A',
    independent:'A and B independent?',
    yes:'Yes',no:'No',
    comboTotal:'Total combinations C(n,k)',
    comboFavor:'Favorable combinations',
    comboProb:'Probability of exactly m matches',
    odds:'Odds (1 in)',
    asPercent:'as percentage',
    invalidCombo:'Make sure n ≥ k ≥ m ≥ 0 and all values are non-negative integers.',
    step1:'Pick a mode: two events or combinatorial (lottery)',
    step2:'Enter the probabilities or the n / k / m counts',
    step3:'Press Calculate to get union, intersection, conditional, or lottery odds',
    step4:'Copy any result you need',
  },
  zh:{
    toolTitle:'概率计算器',
    toolDesc:'计算两个事件的概率（并集、交集、条件概率），或彩票 / 组合的组合概率。即时、免费，完全在浏览器本地运行。',
    modeTwo:'两个事件 (A & B)',modeCombo:'组合（彩票）',
    lblPa:'P(A) — 事件 A 的概率',lblPb:'P(B) — 事件 B 的概率',lblPab:'P(A∩B) — 同时发生的概率',
    lblN:'总数 n（可选总数）',lblK:'抽取数 k',lblM:'期望命中数 m',
    calculate:'⚡ 计算',copy:'复制',clear:'清空',
    invalidRange:'概率必须在 0 到 1 之间，且交集不能超过任一单独事件的概率。',
    enterValues:'在上方输入数值后点击计算。',
    union:'P(A ∪ B) — A 或 B 至少发生',
    intersect:'P(A ∩ B) — A 和 B 同时发生',
    neither:'P(A 和 B 都不发生)',
    onlyA:'P(只有 A)',
    onlyB:'P(只有 B)',
    condA:'P(A | B) — 在 B 发生下 A 的概率',
    condB:'P(B | A) — 在 A 发生下 B 的概率',
    independent:'A 和 B 是否独立？',
    yes:'是',no:'否',
    comboTotal:'总组合数 C(n,k)',
    comboFavor:'有利组合数',
    comboProb:'恰好命中 m 个的概率',
    odds:'赔率（分之一）',
    asPercent:'换算为百分比',
    invalidCombo:'请确保 n ≥ k ≥ m ≥ 0，且均为非负整数。',
    step1:'选择模式：两个事件 或 组合（彩票）',
    step2:'输入概率，或 n / k / m 的数值',
    step3:'点击「计算」得到并集、交集、条件概率或彩票赔率',
    step4:'复制所需的结果',
  }
});

const { $, copyText, t } = GZ;
let mode='two';

function pct(p){ return (p*100).toFixed(p<0.001?6:4)+'%'; }
function fmtNum(n){ if(!isFinite(n)) return String(n); return Number(n.toPrecision(12)).toLocaleString('en-US',{maximumFractionDigits:6}); }

// binomial coefficient via BigInt for accuracy
function C(n,k){
  if(k<0||k>n) return 0n;
  k=Math.min(k,n-k);
  let num=1n,den=1n;
  for(let i=0n;i<k;i++){ num*=BigInt(n)-i; den*=(i+1n); }
  return num/den;
}

function calcTwo(){
  const a=parseFloat($('#pA').value),b=parseFloat($('#pB').value),ab=parseFloat($('#pAB').value);
  const el=$('#result');
  if(isNaN(a)||isNaN(b)||isNaN(ab)){ el.innerHTML=`<div style="color:var(--text2);text-align:center;padding:1rem">${t('enterValues')}</div>`; return; }
  if(a<0||a>1||b<0||b>1||ab<0||ab>1||ab>a||ab>b){ el.innerHTML=`<div style="color:var(--gz-accent);text-align:center;padding:1rem">${t('invalidRange')}</div>`; return; }
  const union=a+b-ab;
  const neither=1-union;
  const onlyA=a-ab, onlyB=b-ab;
  const condA = b>0 ? ab/b : 0;
  const condB = a>0 ? ab/a : 0;
  const indep = Math.abs(ab-(a*b))<1e-9;
  const line=(lbl,val,hi)=>`<div class="pr-line"><span class="lbl">${lbl}</span><span class="val${hi?' hi':''}">${fmtNum(val)} <span style="opacity:.6">(${pct(val)})</span></span></div>`;
  el.innerHTML=
    line(t('union'),union,true)+
    line(t('intersect'),ab)+
    line(t('neither'),neither)+
    line(t('onlyA'),onlyA)+
    line(t('onlyB'),onlyB)+
    line(t('condA'),condA)+
    line(t('condB'),condB)+
    `<div class="pr-line"><span class="lbl">${t('independent')}</span><span class="val">${indep?t('yes'):t('no')}</span></div>`;
}

function calcCombo(){
  const n=parseInt($('#cN').value),k=parseInt($('#cK').value),m=parseInt($('#cM').value);
  const el=$('#result');
  if(isNaN(n)||isNaN(k)||isNaN(m)||n<1||k<0||m<0||k>n||m>k||m>n){ el.innerHTML=`<div style="color:var(--gz-accent);text-align:center;padding:1rem">${t('invalidCombo')}</div>`; return; }
  const total=C(n,k);
  const favor=C(k,m)*C(n-k,k-m);
  const prob = total>0n ? Number(favor)/Number(total) : 0;
  const oneIn = prob>0 ? Math.round(1/prob) : Infinity;
  const line=(lbl,val,hi)=>`<div class="pr-line"><span class="lbl">${lbl}</span><span class="val${hi?' hi':''}">${val}</span></div>`;
  el.innerHTML=
    line(t('comboTotal'),fmtNum(total.toString()))+
    line(t('comboFavor'),fmtNum(favor.toString()))+
    line(t('comboProb'),`${fmtNum(prob)} <span style="opacity:.6">(${pct(prob)})</span>`,true)+
    line(t('odds'),isFinite(oneIn)?`1 in ${fmtNum(oneIn)}`:'—');
}

function run(){ mode==='two'?calcTwo():calcCombo(); }

document.querySelectorAll('.pr-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.pr-tab').forEach(x=>x.classList.remove('active'));
    tab.classList.add('active');
    mode=tab.dataset.mode;
    $('#panel-two').style.display = mode==='two'?'block':'none';
    $('#panel-combo').style.display = mode==='combo'?'block':'none';
    run();
  });
});

['pA','pB','pAB'].forEach(id=>$('#'+id).addEventListener('input',()=>{if(mode==='two')calcTwo();}));
['cN','cK','cM'].forEach(id=>$('#'+id).addEventListener('input',()=>{if(mode==='combo')calcCombo();}));
$('#calcTwo').addEventListener('click',calcTwo);
$('#calcCombo').addEventListener('click',calcCombo);

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="run()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#result').innerText)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#pA').value='';$('#pB').value='';$('#pAB').value='';run()">${t('clear')}</button>`;
$('#lblPa').textContent=t('lblPa');$('#lblPb').textContent=t('lblPb');$('#lblPab').textContent=t('lblPab');
$('#lblN').textContent=t('lblN');$('#lblK').textContent=t('lblK');$('#lblM').textContent=t('lblM');

GZ.renderToolPage({
  category:'calc',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'🔢',href:'/calc/permutation.html',name:'Permutation & Combination'},
    {icon:'🎲',href:'/fun/dice-roller.html',name:'Dice Roller'},
    {icon:'🔢',href:'/calc/random-number-generator.html',name:'Random Number Generator'},
    {icon:'📊',href:'/calc/statistics-calculator.html',name:'Statistics Calculator'},
  ]
});
run();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
