<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Robots.txt Generator","description":"Generate a robots.txt file with sitemap and crawler directives.","url":"https://tools.gamezipper.com/seo/robots-txt-generator.html","applicationCategory":"SEOApplication","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>

<link rel="alternate" hreflang="x-default" href="https://tools.gamezipper.com/seo/robots-txt-generator.html">
</head>
<body>
<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:14px">
      <input id="sitemap" class="gz-input" placeholder="https://example.com/sitemap.xml">
      <input id="userAgent" class="gz-input" placeholder="*">
      <textarea id="allow" rows="5" style="width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;color:var(--text)" placeholder="Allow rules, one per line"></textarea>
      <textarea id="disallow" rows="5" style="width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;color:var(--text)" placeholder="Disallow rules, one per line"></textarea>
    </div>
    <textarea id="output" spellcheck="false" readonly rows="14" style="width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;color:var(--text)"></textarea>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({en:{toolTitle:'Robots.txt Generator',toolDesc:'Generate a robots.txt file for your site with allow, disallow, and sitemap rules.',step1:'Enter your sitemap URL and crawler rules.',step2:'Add one path per line under Allow or Disallow.',step3:'Copy the generated robots.txt file into your site root.'},zh:{toolTitle:'Robots.txt 生成器',toolDesc:'为网站生成包含 Allow、Disallow 和 Sitemap 规则的 robots.txt 文件。',step1:'输入 sitemap 地址和爬虫规则。',step2:'Allow / Disallow 每行写一个路径。',step3:'复制生成结果，放到站点根目录。'}});
const {$,copyText,t}=GZ;
function lines(v,prefix){return v.split(/\n+/).map(x=>x.trim()).filter(Boolean).map(x=>`${prefix}: ${x}`)}
function gen(){
 const ua=$('#userAgent').value.trim()||'*';
 const sitemap=$('#sitemap').value.trim();
 const out=[`User-agent: ${ua}`,...lines($('#allow').value,'Allow'),...lines($('#disallow').value,'Disallow'), sitemap?`\nSitemap: ${sitemap}`:''].filter(Boolean).join('\n');
 $('#output').value=out;
}
function example(){ $('#sitemap').value='https://tools.gamezipper.com/sitemap.xml'; $('#userAgent').value='*'; $('#allow').value='/\n/text/\n/dev/'; $('#disallow').value='/admin/\n/tmp/'; gen(); }
['sitemap','userAgent','allow','disallow'].forEach(id=>$('#'+id).addEventListener('input',gen));
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="gen()">Generate</button><button class="gz-btn gz-btn-secondary" onclick="example()">${t('example')}</button><button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button><button class="gz-btn gz-btn-secondary" onclick="document.querySelectorAll('input,textarea').forEach(el=>el.value='');gen()">${t('clear')}</button>`;
GZ.renderToolPage({category:'seo',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3'],related:[{icon:'🏷️',href:'/seo/meta-tag-generator.html',name:'Meta Tag Generator'},{icon:'❓',href:'/seo/faq-schema-generator.html',name:'FAQ Schema Generator'},{icon:'📝',href:'/social/og-meta.html',name:'OG Meta Generator'}]});
example();
</script>
<script>new Image().src="https://site-analytics.cap.1ktower.com/hit?s=tools.gamezipper.com&p="+encodeURIComponent(location.pathname);</script>
</body>
</html>
