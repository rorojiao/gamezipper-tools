<script>
GZI18n.register({
  en: {
    toolTitle: 'Lorem Ipsum Generator',
    toolDesc: 'Generate placeholder text instantly — paragraphs, sentences, or words. Custom length, start with Lorem Ipsum, copy & paste ready.',
    generate: '🔄 Generate',
    copy: '📋 Copy',
    clear: '🗑️ Clear',
    lblType: 'Unit type',
    lblCount: 'Count',
    lblStart: 'Start with "Lorem ipsum…"',
    lblHtml: 'Wrap in <p> tags',
    paras: 'Paragraphs',
    sents: 'Sentences',
    words: 'Words',
    step1: 'Choose the unit type: paragraphs, sentences, or words',
    step2: 'Set the count and options',
    step3: 'Click "Generate" to create text',
    step4: 'Click "Copy" to copy to clipboard',
  },
  zh: {
    toolTitle: 'Lorem Ipsum 占位文本生成器',
    toolDesc: '即时生成占位文本 — 支持段落、句子或单词模式，自定义长度，一键复制。',
    generate: '🔄 生成',
    copy: '📋 复制',
    clear: '🗑️ 清空',
    lblType: '类型',
    lblCount: '数量',
    lblStart: '以 "Lorem ipsum…" 开头',
    lblHtml: '包裹 <p> 标签',
    paras: '段落',
    sents: '句子',
    words: '单词',
    step1: '选择类型：段落、句子或单词',
    step2: '设置数量和选项',
    step3: '点击「生成」创建文本',
    step4: '点击「复制」复制到剪贴板',
  }
});

const { $, copyText, t } = GZ;
let genType = 'paragraphs';

$('#toolbar').innerHTML = `<button class="gz-btn" id="btn-gen">${t('generate')}</button><button class="gz-btn secondary" id="btn-copy">${t('copy')}</button><button class="gz-btn secondary" id="btn-clear">${t('clear')}</button>`;
$('#lbl-type').textContent = t('lblType');
$('#lbl-count').textContent = t('lblCount');
$('#lbl-start').textContent = t('lblStart');
$('#lbl-html').textContent = t('lblHtml');
$('#btn-paras').textContent = t('paras');
$('#btn-sents').textContent = t('sents');
$('#btn-words').textContent = t('words');

// Type buttons
document.querySelectorAll('.type-btns button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.type-btns button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    genType = btn.dataset.type;
    if (genType === 'paragraphs') { $('#count').value = 5; $('#count').max = 50; }
    else if (genType === 'sentences') { $('#count').value = 10; $('#count').max = 200; }
    else { $('#count').value = 50; $('#count').max = 5000; }
  };
});

// Latin word bank
const WORDS = [
  'lorem','ipsum','dolor','sit','amet','consectetur','adipiscing','elit','sed','do',
  'eiusmod','tempor','incididunt','ut','labore','et','dolore','magna','aliqua','enim',
  'ad','minim','veniam','quis','nostrud','exercitation','ullamco','laboris','nisi',
  'aliquip','ex','ea','commodo','consequat','duis','aute','irure','in','reprehenderit',
  'voluptate','velit','esse','cillum','fugiat','nulla','pariatur','excepteur','sint',
  'occaecat','cupidatat','non','proident','sunt','culpa','qui','officia','deserunt',
  'mollit','anim','id','est','laborum','porta','nibh','venenatis','cras','ornare',
  'arcu','dui','vivamus','at','augue','eget','sapien','faucibus','morbi','tincidunt',
  'lectus','mauris','ultrices','eros','blandit','turpis','cursus','vitae','congue',
  'eu','pellentesque','habitant','senectus','netus','malesuada','fames','ac','pharetra',
  'massa','placerat','diam','vulputate','dignissim','suspendisse','interdum','posuere',
  'semper','risus','pretium','quam','nunc','lobortis','mattis','aliquam','fringilla',
  'purus','lacinia','integer','feugiat','scelerisque','varius','vel','facilisis',
  'gravida','neque','convallis','tellus','elementum','sagittis','tortor','condimentum',
  'lacus','vestibulum','rhoncus','imperdiet','proin','fermentum','leo','sollicitudin',
  'accumsan','odio','facilisi','maecenas','bibendum','urna','nec','tincidunt','praesent',
  'sodales','egestas','pulvinar','fusce','tristique','felis','donec','orci','phasellus',
];

const FIRST_SENTENCE = 'Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.';

function randWord() { return WORDS[Math.floor(Math.random() * WORDS.length)]; }
function randSentence(minW=5, maxW=15) {
  const len = minW + Math.floor(Math.random() * (maxW - minW));
  const words = [];
  for (let i = 0; i < len; i++) words.push(randWord());
  words[0] = words[0].charAt(0).toUpperCase() + words[0].slice(1);
  return words.join(' ') + '.';
}
function randParagraph() {
  const count = 3 + Math.floor(Math.random() * 5);
  const sents = [];
  for (let i = 0; i < count; i++) sents.push(randSentence());
  return sents.join(' ');
}

function generate() {
  const n = parseInt($('#count').value) || 5;
  const startLorem = $('#start-lorem').checked;
  const wrapHtml = $('#include-html').checked;
  let result = [];

  if (genType === 'paragraphs') {
    for (let i = 0; i < n; i++) {
      if (i === 0 && startLorem) {
        result.push(FIRST_SENTENCE + ' ' + randSentence() + ' ' + randSentence());
      } else {
        result.push(randParagraph());
      }
    }
  } else if (genType === 'sentences') {
    const sents = [];
    if (startLorem) {
      sents.push(FIRST_SENTENCE);
      for (let i = 1; i < n; i++) sents.push(randSentence());
    } else {
      for (let i = 0; i < n; i++) sents.push(randSentence());
    }
    result = sents;
  } else {
    const words = [];
    if (startLorem) {
      words.push('Lorem', 'ipsum', 'dolor', 'sit', 'amet');
      for (let i = 5; i < n; i++) words.push(randWord());
    } else {
      for (let i = 0; i < n; i++) words.push(randWord());
    }
    result = words;
  }

  const sep = genType === 'paragraphs' ? '\n\n' : (genType === 'sentences' ? ' ' : ' ');
  const text = result.join(sep);

  if (wrapHtml && genType === 'paragraphs') {
    $('#output').innerHTML = result.map(p => `<p>${p}</p>`).join('');
  } else {
    $('#output').textContent = text;
  }

  // Store raw text for copy
  $('#output').dataset.raw = text;
}

$('#btn-gen').onclick = generate;
$('#btn-copy').onclick = () => { copyText($('#output').dataset.raw || $('#output').textContent); };
$('#btn-clear').onclick = () => { $('#output').textContent = ''; delete $('#output').dataset.raw; };

// Generate on load
generate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {href:'/text/word-counter.html',icon:'📝',name:'Word Counter'},
    {href:'/text/text-encryptor.html',icon:'🔐',name:'Text Encrypt & Decrypt'},
    {href:'/text/proofreading-tool.html',icon:'✏️',name:'Proofreading Tool'},
    {href:'/text/case-converter.html',icon:'🔤',name:'Case Converter'},
  ]
});
</script>
