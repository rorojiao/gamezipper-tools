<script>
GZI18n.register({
  en: {
    toolTitle: 'Placeholder Image Generator',
    toolDesc: 'Create custom placeholder images with any dimensions, colors and text. Download as PNG for your design mockups.',
    width: 'Width (px)',
    height: 'Height (px)',
    bgColor: 'Background Color',
    textColor: 'Text Color',
    text: 'Text',
    fontSize: 'Font Size (px)',
    format: 'Format',
    download: 'Download PNG',
    copyImg: 'Copy Image',
    step1: 'Set the width and height for your placeholder image',
    step2: 'Choose background and text colors',
    step3: 'Customize the display text and font size',
    step4: 'Click Download PNG to save the image',
  },
  zh: {
    toolTitle: '占位图片生成器',
    toolDesc: '创建自定义占位图片，支持任意尺寸、颜色和文字。下载 PNG 用于设计原型。',
    width: '宽度 (px)',
    height: '高度 (px)',
    bgColor: '背景色',
    textColor: '文字颜色',
    text: '文字',
    fontSize: '字体大小 (px)',
    format: '格式',
    download: '下载 PNG',
    copyImg: '复制图片',
    step1: '设置占位图的宽度和高度',
    step2: '选择背景色和文字颜色',
    step3: '自定义显示文字和字体大小',
    step4: '点击「下载 PNG」保存图片',
  }
});

const { $, copyText, t } = GZ;

function drawPlaceholder() {
  const canvas = $('#canvas');
  const w = Math.max(1, parseInt($('#inp-w').value) || 400);
  const h = Math.max(1, parseInt($('#inp-h').value) || 300);
  const bg = $('#inp-bg').value || '#cccccc';
  const tc = $('#inp-tc').value || '#666666';
  const txt = $('#inp-text').value || (w + ' × ' + h);
  const fs = Math.max(8, parseInt($('#inp-fs').value) || Math.min(32, Math.floor(Math.min(w, h) / 8)));

  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  // Draw cross lines
  ctx.strokeStyle = tc;
  ctx.globalAlpha = 0.3;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, 0); ctx.lineTo(w, h);
  ctx.moveTo(w, 0); ctx.lineTo(0, h);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Draw text
  ctx.fillStyle = tc;
  ctx.font = fs + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(txt, w / 2, h / 2);
}

function downloadImage() {
  const canvas = $('#canvas');
  const link = document.createElement('a');
  link.download = 'placeholder-' + canvas.width + 'x' + canvas.height + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function copyImage() {
  const canvas = $('#canvas');
  canvas.toBlob(function(blob) {
    if (blob && navigator.clipboard && navigator.clipboard.write) {
      navigator.clipboard.write([new ClipboardItem({'image/png': blob})]).then(function() {
        GZ.showToast(t('copied'));
      });
    } else {
      copyText(canvas.toDataURL('image/png'));
    }
  }, 'image/png');
}

// Build controls
$('#controls').innerHTML = `
  <div><label>${t('width')}</label><input id="inp-w" type="number" value="400" min="1" max="4096"></div>
  <div><label>${t('height')}</label><input id="inp-h" type="number" value="300" min="1" max="4096"></div>
  <div><label>${t('bgColor')}</label><input id="inp-bg" type="color" value="#cccccc"></div>
  <div><label>${t('textColor')}</label><input id="inp-tc" type="color" value="#666666"></div>
  <div><label>${t('text')}</label><input id="inp-text" type="text" value="" placeholder="400 × 300"></div>
  <div><label>${t('fontSize')}</label><input id="inp-fs" type="number" value="32" min="8" max="200"></div>
`;

// Bind live updates
document.querySelectorAll('#controls input').forEach(function(inp) {
  inp.addEventListener('input', drawPlaceholder);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadImage()">📥 ${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyImage()">📋 ${t('copyImg')}</button>`;

drawPlaceholder();

GZ.renderToolPage({
  category: 'image',

  descKey: 'toolDesc',

    {icon:'🔄', href:'/image/converter.html', name:'Image Converter'},
  ]
});
</script>
