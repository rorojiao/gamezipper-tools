<script>
GZI18n.register({
  en: {
    toolTitle: 'Hangman Solver',
    toolDesc: 'Enter the word pattern (use _ for unknown letters) and any letters you have already guessed wrong. The solver instantly recommends the best next letter to guess and lists every matching word from a 7,500+ offline dictionary.',
    pattern: 'Word Pattern (use _ ? or space for blanks)',
    wrong: 'Wrong Letters Already Guessed',
    matches: 'Matching Words',
    bestLetter: 'Best next letter',
    rankLetter: 'Letter frequency',
    emptyWords: 'No matching words yet. Enter a pattern above.',
    noMatch: 'No words match. Check your pattern or wrong letters.',
    guess: 'Guess letter',
    addWrong: 'Add to wrong',
    clear: 'Clear',
    example: 'Example',
    step1: 'Type your word pattern using _ for unknown letters (e.g. h_ngm_n)',
    step2: 'Enter letters you have already guessed wrong, separated by anything',
    step3: 'See the recommended best next letter based on letter frequency',
    step4: 'Browse the matching words list and copy any candidate',
  },
  zh: {
    toolTitle: 'Hangman 求解器',
    toolDesc: '输入单词模式（用 _ 表示未知字母）和已经猜错的字母，求解器会即时推荐最佳下一个字母，并列出 7500+ 离线词典中所有匹配的单词。',
    pattern: '单词模式（用 _ ? 或空格表示空白）',
    wrong: '已猜错的字母',
    matches: '匹配的单词',
    bestLetter: '推荐下一个字母',
    rankLetter: '字母频率',
    emptyWords: '尚无匹配单词，请在上方输入模式。',
    noMatch: '没有匹配的单词，请检查模式或错猜字母。',
    guess: '猜字母',
    addWrong: '加入错猜',
    clear: '清空',
    example: '示例',
    step1: '使用 _ 表示未知字母输入单词模式（如 h_ngm_n）',
    step2: '输入已经猜错的字母，可用任意分隔符',
    step3: '查看基于字母频率推荐的最佳下一个字母',
    step4: '浏览匹配单词列表，点击任意候选词复制',
  }
});

const { $, copyText, t } = GZ;
const WORDS = window.GZ_WORDS || [];

function patternToRegex(p, wrongSet) {
  // p contains lowercase letters and blanks (_ ? . space). Build regex; reject words containing any wrong letter at blank positions.
  let re = '^';
  for (const ch of p) {
    if (/[a-z]/i.test(ch)) re += ch.toLowerCase();
    else re += '[a-z]'; // blank matches any letter
  }
  re += '$';
  return new RegExp(re, 'i');
}

function solve() {
  const pattern = ($('#pattern').value.toLowerCase().replace(/\s+/g, '_').replace(/\?|\./g, '_') || '').replace(/[^a-z_]/g, '_');
  const wrongRaw = ($('#wrong').value.toLowerCase().replace(/[^a-z]/g, ''));
  const wrongSet = new Set(wrongRaw.split(''));
  const known = new Set(pattern.replace(/[^a-z]/g, '').split(''));

  $('#words').innerHTML = '';
  $('#bestCard').innerHTML = '';

  if (!pattern.length || !pattern.includes('_')) {
    $('#words').innerHTML = `<div class="hg-empty">${t('emptyWords')}</div>`;
    return;
  }

  const re = patternToRegex(pattern, wrongSet);
  const candidates = WORDS.filter(w =>
    w.length === pattern.length &&
    re.test(w) &&
    ![...wrongSet].some(l => w.includes(l)) &&
    // known letters must be at all their positions; also exclude letters that appear in pattern at other positions
    [...pattern].every((ch, i) => ch === '_' || w[i] === ch)
  );

  if (!candidates.length) {
    $('#bestCard').innerHTML = `<div class="hg-empty">${t('noMatch')}</div>`;
    return;
  }

  // Letter frequency in remaining candidates, excluding known & wrong letters
  const freq = {};
  for (const w of candidates) {
    const seen = new Set();
    for (const c of w) {
      if (known.has(c) || wrongSet.has(c)) continue;
      seen.add(c);
    }
    seen.forEach(c => freq[c] = (freq[c] || 0) + 1);
  }
  const ranked = Object.entries(freq).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));

  const best = ranked[0];
  const bestPct = Math.round(best[1] / candidates.length * 100);

  $('#bestCard').innerHTML = `
    <div class="hg-best">
      <div class="letter">${best[0].toUpperCase()}</div>
      <small>${t('bestLetter')} — appears in ${best[1]} of ${candidates.length} words (${bestPct}%)</small>
      <div class="hg-ranks">
        ${ranked.slice(0, 10).map(([l, n]) =>
          `<span class="hg-rank" onclick="copyText('${l}')" title="${t('guess')}"><b>${l.toUpperCase()}</b> <small>${n}</small></span>`).join('')}
      </div>
    </div>`;

  $('#words').innerHTML = candidates.length > 200
    ? `<div style="margin-bottom:8px;opacity:.7">Showing first 200 of ${candidates.length} matches</div>` + candidates.slice(0, 200).map(w => `<span onclick="copyText('${w}')">${w}</span>`).join('')
    : candidates.map(w => `<span onclick="copyText('${w}')">${w}</span>`).join('');
}

function buildKeyboard() {
  const wrong = new Set($('#wrong').value.toLowerCase().replace(/[^a-z]/g, '').split(''));
  const known = new Set($('#pattern').value.toLowerCase().replace(/[^a-z]/g, '').split(''));
  $('#keyboard').innerHTML = '<div class="hg-keys">' + 'abcdefghijklmnopqrstuvwxyz'.split('').map(l => {
    const cls = wrong.has(l) ? 'wrong' : known.has(l) ? 'known' : '';
    return `<div class="hg-key ${cls}" onclick="addLetter('${l}')">${l}</div>`;
  }).join('') + '</div>';
}

function addLetter(l) {
  // toggle: if already known, move to wrong; else add to pattern cursor position (simpler: append to pattern)
  // Behavior: clicking a key adds it to the wrong-letters box (most common need)
  const w = $('#wrong');
  if (!new Set(w.value.toLowerCase().replace(/[^a-z]/g,'').split('')).has(l)) {
    w.value += l;
    run();
  }
}

function run() { buildKeyboard(); solve(); }
function loadExample() {
  $('#pattern').value = 'h__g___';
  $('#wrong').value = 'xyz';
  run();
}
function doClear() { $('#pattern').value=''; $('#wrong').value=''; $('#words').innerHTML=''; $('#bestCard').innerHTML=''; buildKeyboard(); }

$('#pattern').addEventListener('input', run);
$('#wrong').addEventListener('input', run);

$('#lblPattern').textContent = t('pattern');
$('#lblWrong').textContent = t('wrong');
$('#lblMatches').textContent = t('matches');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="run()">${t('guess')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#words').innerHTML = `<div class="hg-empty">${t('emptyWords')}</div>`;
buildKeyboard();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🟩', href:'/fun/wordle-solver.html', name:'Wordle Solver'},
    {icon:'🔤', href:'/text/anagram-solver.html', name:'Anagram Solver'},
    {icon:'📖', href:'/text/word-frequency.html', name:'Word Frequency'},
    {icon:'🧩', href:'/text/crossword-solver.html', name:'Crossword Solver'},
  ]
});
</script>
