<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is CSS box-shadow?","acceptedAnswer":{"@type":"Answer","text":"CSS box-shadow adds shadow effects around an element's frame. Each shadow is defined by horizontal and vertical offsets, blur radius, spread radius, color and an optional inset keyword."}},{"@type":"Question","name":"Can I stack multiple box shadows?","acceptedAnswer":{"@type":"Answer","text":"Yes. Click 'Add Layer' to stack multiple shadows separated by commas. The first layer renders on top, with each subsequent layer drawn behind the previous one. Layering is great for realistic depth and glow effects."}},{"@type":"Question","name":"What is the spread radius?","acceptedAnswer":{"@type":"Answer","text":"Spread radius grows or shrinks the shadow's size. A positive value makes the shadow larger than the element; a negative value makes it smaller. Use it to turn a soft glow into a solid shadow or vice versa."}},{"@type":"Question","name":"What does inset mean?","acceptedAnswer":{"@type":"Answer","text":"The inset keyword draws the shadow inside the element instead of outside, creating an embossed or pressed-in look that is perfect for inputs, buttons and inset panels."}}]}</script>

<div class="gz-container">

    <div class="gz-bs-bg-toggle" id="bgToggle"></div>

      <div class="gz-bs-box" id="box"></div>
    </div>
    <div class="gz-bs-controls" id="controls"></div>
    <div class="gz-bs-layers" id="layers"></div>
    <div class="gz-bs-code" id="codeOutput"></div>
  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Box Shadow Generator',
    toolDesc: 'Create beautiful box shadow effects visually. Adjust offset, blur, spread, color and inset with live preview and one-click CSS copy.',
    addLayer: '+ Add Layer',
    copyCode: 'Copy CSS',
    reset: 'Reset',
    presets: 'Presets',
    bgLight: 'Light BG',
    bgDark: 'Dark BG',
    bgCheck: 'Checker',
    hOffset: 'Horizontal Offset (X)',
    vOffset: 'Vertical Offset (Y)',
    blur: 'Blur Radius',
    spread: 'Spread Radius',
    color: 'Shadow Color',
    opacity: 'Opacity',
    inset: 'Inset',
    outside: 'Outside',
    remove: 'Remove',
    layer: 'Layer',
    copied: 'Copied!',
    step1: 'Drag the X, Y, blur, spread and opacity sliders to shape the shadow',
    step2: 'Pick a shadow color and toggle inset for an inner shadow',
    step3: 'Click "Add Layer" to stack multiple shadows for depth, glows or 3D effects',
    step4: 'Hit "Copy CSS" and paste the box-shadow rule into your stylesheet',
  },
  zh: {
    toolTitle: 'CSS 阴影生成器',
    toolDesc: '可视化创建精美的盒子阴影效果。调整偏移、模糊、扩展、颜色和内阴影，实时预览并一键复制 CSS。',
    addLayer: '+ 添加图层',
    copyCode: '复制 CSS',
    reset: '重置',
    presets: '预设',
    bgLight: '浅色背景',
    bgDark: '深色背景',
    bgCheck: '棋盘格',
    hOffset: '水平偏移 (X)',
    vOffset: '垂直偏移 (Y)',
    blur: '模糊半径',
    spread: '扩展半径',
    color: '阴影颜色',
    opacity: '透明度',
    inset: '内阴影',
    outside: '外阴影',
    remove: '移除',
    layer: '图层',
    copied: '已复制！',
    step1: '拖动 X、Y、模糊、扩展和透明度滑块塑造阴影',
    step2: '选择阴影颜色并切换内阴影（inset）选项',
    step3: '点击「添加图层」叠加多个阴影，实现深度、辉光或 3D 效果',
    step4: '点击「复制 CSS」并将 box-shadow 规则粘贴到你的样式表',
  }
});

const { $, copyText, t } = GZ;

let layers = [{ x: 0, y: 8, blur: 24, spread: -4, color: '#000000', opacity: 0.35, inset: false }];
let bgColor = 'check';

const PRESETS = [
  { name: 'Subtle', layers: [{x:0,y:2,b:4,s:-1,c:'#000000',o:0.15,i:false}] },
  { name: 'Soft', layers: [{x:0,y:4,b:12,s:-2,c:'#000000',o:0.25,i:false}] },
  { name: 'Floating', layers: [{x:0,y:12,b:32,s:-8,c:'#000000',o:0.4,i:false}] },
  { name: 'Sharp', layers: [{x:6,y:6,b:0,s:0,c:'#000000',o:0.5,i:false}] },
  { name: 'Neon', layers: [{x:0,y:0,b:20,s:0,c:'#4ecdc4',o:0.8,i:false},{x:0,y:0,b:40,s:4,c:'#4ecdc4',o:0.4,i:false}] },
  { name: 'Glow', layers: [{x:0,y:0,b:30,s:0,c:'#ff6b6b',o:0.7,i:false}] },
  { name: 'Inset', layers: [{x:0,y:4,b:8,s:0,c:'#000000',o:0.4,i:true}] },
  { name: '3D', layers: [{x:0,y:1,b:0,s:0,c:'#cccccc',o:0.5,i:false},{x:0,y:2,b:0,s:0,c:'#bbbbbb',o:0.5,i:false},{x:0,y:3,b:0,s:0,c:'#aaaaaa',o:0.5,i:false},{x:0,y:4,b:0,s:0,c:'#999999',o:0.5,i:false}] },
];

function hexToRgba(hex, opacity) {
  const r = parseInt(hex.slice(1,3),16) || 0;
  const g = parseInt(hex.slice(3,5),16) || 0;
  const b = parseInt(hex.slice(5,7),16) || 0;
  return `rgba(${r},${g},${b},${opacity})`;
}

function getShadowCSS() {
  return layers.map(l => `${l.inset?'inset ':''}${l.x}px ${l.y}px ${l.blur}px ${l.spread}px ${hexToRgba(l.color, l.opacity)}`).join(',\n    ');
}

function update(skipRenderControls) {
  const shadow = getShadowCSS();
  $('#box').style.boxShadow = shadow;
  const css = `box-shadow:\n    ${shadow};`;
  $('#codeOutput').textContent = css;
  if (!skipRenderControls) renderControls();
  renderLayers();
}

function renderControls() {
  const c = $('#controls');
  const l = layers[0];
  if (!l) {
    c.innerHTML = '<p style="opacity:.6;grid-column:1/-1;text-align:center">No layers. Click "+ Add Layer" to add one.</p>';
    return;
  }
  c.innerHTML = `
    <label>${t('hOffset')}<input type="range" min="-80" max="80" value="${l.x}" oninput="layers[0].x=+this.value;update(true)"><span id="xVal">${l.x}px</span></label>
    <label>${t('vOffset')}<input type="range" min="-80" max="80" value="${l.y}" oninput="layers[0].y=+this.value;update(true)"><span id="yVal">${l.y}px</span></label>
    <label>${t('blur')}<input type="range" min="0" max="120" value="${l.blur}" oninput="layers[0].blur=+this.value;update(true)"><span id="bVal">${l.blur}px</span></label>
    <label>${t('spread')}<input type="range" min="-50" max="50" value="${l.spread}" oninput="layers[0].spread=+this.value;update(true)"><span id="sVal">${l.spread}px</span></label>
    <label>${t('color')}<input type="color" value="${l.color}" oninput="layers[0].color=this.value;update(true)"></label>
    <label>${t('opacity')}<input type="range" min="0" max="100" value="${Math.round(l.opacity*100)}" oninput="layers[0].opacity=+this.value/100;update(true)"><span id="oVal">${Math.round(l.opacity*100)}%</span></label>
    <label>${t('inset')}<select onchange="layers[0].inset=this.value==='1';update(true)">
      <option value="0" ${l.inset?'':'selected'}>${t('outside')}</option>
      <option value="1" ${l.inset?'selected':''}>${t('inset')}</option>
    </select></label>
  `;
  // sync value labels for layer 0
  const xV=document.getElementById('xVal'),yV=document.getElementById('yVal'),bV=document.getElementById('bVal'),sV=document.getElementById('sVal'),oV=document.getElementById('oVal');
  if(xV)xV.textContent=l.x+'px'; if(yV)yV.textContent=l.y+'px';
  if(bV)bV.textContent=l.blur+'px'; if(sV)sV.textContent=l.spread+'px'; if(oV)oV.textContent=Math.round(l.opacity*100)+'%';
}

function renderLayers() {
  const el = $('#layers');
  el.innerHTML = layers.map((l, i) => {
    if (i === 0) return '';
    return `<div class="gz-bs-layer">
      <span>${t('layer')} ${i + 1}</span>
      <input type="color" value="${l.color}" oninput="layers[${i}].color=this.value;update(true)">
      <span>X:${l.x} Y:${l.y} B:${l.blur} S:${l.spread} ${Math.round(l.opacity*100)}%${l.inset?' inset':''}</span>
      <button onclick="layers.splice(${i},1);update()">${t('remove')}</button>
    </div>`;
  }).join('');
}

function applyPreset(p) {
  layers = p.layers.map(l => ({ x:l.x, y:l.y, blur:l.b, spread:l.s, color:l.c, opacity:l.o, inset:l.i }));
  update();
}

function setBg(mode) {
  bgColor = mode;
  const pv = $('#preview');
  if (mode === 'light') pv.style.background = '#f5f5f5';
  else if (mode === 'dark') pv.style.background = '#1e1e2e';
  else pv.style.background = 'repeating-conic-gradient(#2a2a3a 0% 25%,#1e1e2e 0% 50%) 50%/24px 24px';
  document.querySelectorAll('#bgToggle button').forEach(b => b.classList.toggle('active', b.dataset.bg === mode));
}

$('#presets').innerHTML = `<span style="font-size:.85em;color:var(--text2);align-self:center;margin-right:4px">${t('presets')}:</span>` +
  PRESETS.map((p, i) => `<button class="gz-bs-preset" onclick="applyPreset(PRESETS[${i}])">${p.name}</button>`).join('');

$('#bgToggle').innerHTML = ['light','dark','check'].map(m => {
  const label = m === 'light' ? t('bgLight') : m === 'dark' ? t('bgDark') : t('bgCheck');
  return `<button data-bg="${m}" onclick="setBg('${m}')">${label}</button>`;
}).join('');
setBg('check');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="layers.push({x:0,y:8,blur:24,spread:-4,color:'#000000',opacity:0.3,inset:false});update()">${t('addLayer')}</button>
  <button class="gz-btn" onclick="copyText($('#codeOutput').textContent)">${t('copyCode')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="layers=[{x:0,y:8,blur:24,spread:-4,color:'#000000',opacity:0.35,inset:false}];update()">${t('reset')}</button>`;

update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📝', href:'/css-tools/text-shadow.html', name:'Text Shadow'},
    {icon:'🌈', href:'/css-tools/gradient.html', name:'Gradient'},
    {icon:'📐', href:'/css-tools/flexbox.html', name:'Flexbox'},
    {icon:'✂️', href:'/css-tools/clip-path.html', name:'Clip-Path'},
    {icon:'🎀', href:'/css-tools/ribbon.html', name:'Ribbon'},
    {icon:'🟣', href:'/css-tools/gradient-mesh.html', name:'Gradient Mesh'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
