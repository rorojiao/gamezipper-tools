const { $, copyText, t } = GZ;

function update() {
  const txt = $('#txt').value || 'NEON';
  const font = $('#font').value;
  const color = $('#color').value;
  const size = +$('#size').value;
  const blur = +$('#blur').value;
  const layers = +$('#intensity').value;
  const animated = $('#animate').checked;
  const speed = +$('#speed').value;

  const el = $('#preview');
  el.textContent = txt;
  el.style.fontFamily = font;
  el.style.fontSize = size + 'px';

  let shadows = [];
  for (let i = 1; i <= layers; i++) {
    const b = blur * i;
    shadows.push(`0 0 ${b}px ${color}`);
    shadows.push(`0 0 ${b * 2}px ${color}`);
  }
  const shadowCSS = shadows.join(', ');
  el.style.textShadow = shadowCSS;
  el.style.color = '#fff';

  let animName = 'neonPulse';
  let dur = (3 - speed * 0.4) + 's';
  if (animated) {
    if (!document.getElementById('neon-keyframes')) {
      const style = document.createElement('style');
      style.id = 'neon-keyframes';
      document.head.appendChild(style);
    }
    document.getElementById('neon-keyframes').textContent = `@keyframes ${animName}{0%,100%{text-shadow:${shadowCSS};opacity:1}50%{text-shadow:none;opacity:.8}}`;
    el.style.animation = `${animName} ${dur} ease-in-out infinite`;
  } else {
    el.style.animation = 'none';
  }

  let css = `.neon-text {\n  font-family: ${font};\n  font-size: ${size}px;\n  color: #fff;\n  text-shadow: ${shadowCSS};`;
  if (animated) {
    css += `\n  animation: ${animName} ${dur} ease-in-out infinite;`;
  }
  css += '\n}';
  if (animated) {
    css += `\n\n@keyframes ${animName} {\n  0%, 100% {\n    text-shadow: ${shadowCSS};\n    opacity: 1;\n  }\n  50% {\n    text-shadow: none;\n    opacity: 0.8;\n  }\n}`;
  }
  $('#code').textContent = css;
}

function copyCode() {
  copyText($('#code').textContent);
  const btn = $('#btn-copy');
  btn.textContent = t('copied');
  setTimeout(() => btn.textContent = t('btnCopy'), 1500);
}

['txt','font','color','size','blur','intensity','animate','speed'].forEach(id => {
  $('#' + id).addEventListener('input', update);
  $('#' + id).addEventListener('change', update);
});

// Set labels
$('#lbl-text').textContent = t('lblText');
$('#lbl-font').textContent = t('lblFont');
$('#lbl-color').textContent = t('lblColor');
$('#lbl-size').textContent = t('lblSize') + ': ' + $('#size').value + 'px';
$('#lbl-blur').textContent = t('lblBlur') + ': ' + $('#blur').value + 'px';
$('#lbl-intensity').textContent = t('lblIntensity') + ': ' + $('#intensity').value;
$('#lbl-animate').textContent = t('lblAnimate');
$('#lbl-speed').textContent = t('lblSpeed');
$('#lbl-css').textContent = t('lblCss');
$('#btn-copy').textContent = t('btnCopy');

// Update range labels dynamically
$('#size').addEventListener('input', () => $('#lbl-size').textContent = t('lblSize') + ': ' + $('#size').value + 'px');
$('#blur').addEventListener('input', () => $('#lbl-blur').textContent = t('lblBlur') + ': ' + $('#blur').value + 'px');
$('#intensity').addEventListener('input', () => $('#lbl-intensity').textContent = t('lblIntensity') + ': ' + $('#intensity').value);

update();
