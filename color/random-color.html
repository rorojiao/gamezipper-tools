<script>
GZI18n.register({
  en: {
    toolTitle: 'Random Color Generator',
    toolDesc: 'Generate random colors with HEX, RGB and HSL values. One-click design inspiration — copy code, see shades, and save your favorites.',
    generate: 'Generate', lock: 'Lock', unlock: 'Unlock', favorite: 'Favorite', copy: 'Copy',
    clickHint: 'Press space, click, or tap to generate',

    toolDesc: '生成随机颜色，输出 HEX、RGB 和 HSL 值。一键获取设计灵感 — 复制代码、查看深浅色、保存收藏。',
    generate: '生成', lock: '锁定', unlock: '解锁', favorite: '收藏', copy: '复制',
    clickHint: '按空格、点击或轻触生成',
    lockedHint: '🔒 已锁定 — 空格键生成新的非锁定颜色',
    contrastInfo: '与白色对比度：',
    passAA: '通过 AA', failAA: '未通过 AA', passAAA: '通过 AAA',
    tints: '深浅色阶', favorites: '收藏夹', clear: '清空',
    step1: '点击大色块或按空格键生成新的随机颜色',
    step2: '点击 🔒 锁定当前颜色，再生成新颜色',
    step3: '点击 ⭐ 收藏按钮将颜色保存到收藏夹',
    step4: '使用 HEX、RGB 和 HSL 旁边的复制按钮',
  }
});

const { $, copyText, t } = GZ;
let currentColor = { r: 108, g: 92, b: 231 };
let locked = false;

function rgbToHex(r, g, b) { return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase(); }
function hexToRgb(hex) { hex = hex.replace('#', ''); return { r: parseInt(hex.slice(0, 2), 16), g: parseInt(hex.slice(2, 4), 16), b: parseInt(hex.slice(4, 6), 16) }; }
function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = (g - b) / d + (g < b ? 6 : 0); break;
      case g: h = (b - r) / d + 2; break;
      case b: h = (r - g) / d + 4; break;
    }
    h /= 6;
  }
  return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
}
function luminance(r, g, b) {
  const a = [r, g, b].map(v => { v /= 255; return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4); });
  return 0.2126 * a[0] + 0.7152 * a[1] + 0.0722 * a[2];
}
function contrastRatio(rgb) {
  const L1 = luminance(rgb.r, rgb.g, rgb.b);
  const L2 = 1; // white
  return (Math.max(L1, L2) + 0.05) / (Math.min(L1, L2) + 0.05);
}

function render() {
  const { r, g, b } = currentColor;
  const hex = rgbToHex(r, g, b);
  const hsl = rgbToHsl(r, g, b);
  const cr = contrastRatio(currentColor);

  $('#hero').style.background = hex;
  $('#bigHex').textContent = hex;
  $('#bigHex').style.color = cr > 4.5 ? '#fff' : '#000';
  $('#subInfo').style.color = cr > 4.5 ? '#fff' : '#000';
  $('#subInfo').textContent = locked ? t('lockedHint') : t('clickHint');
  const text = cr >= 7 ? t('passAAA') : cr >= 4.5 ? t('passAA') : t('failAA');
  $('#contrastInfo').textContent = `${t('contrastInfo')} ${cr.toFixed(2)}:1 — ${text}`;

  $('#formats').innerHTML = `
    <div class="fmt"><div><div class="lbl">HEX</div><div class="val">${hex}</div></div><button onclick="copyText('${hex}')">${t('copy')}</button></div>
    <div class="fmt"><div><div class="lbl">RGB</div><div class="val">rgb(${r}, ${g}, ${b})</div></div><button onclick="copyText('rgb(${r}, ${g}, ${b})')">${t('copy')}</button></div>
    <div class="fmt"><div><div class="lbl">HSL</div><div class="val">hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)</div></div><button onclick="copyText('hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)')">${t('copy')}</button></div>
    <div class="fmt"><div><div class="lbl">CSS</div><div class="val">background: ${hex};</div></div><button onclick="copyText('background: ${hex};')">${t('copy')}</button></div>
  `;

  // Render 11 shades (5 tints + base + 5 shades)
  const shadesEl = $('#shades');
  shadesEl.innerHTML = '';
  for (let i = -5; i <= 5; i++) {
    const factor = i / 5; // -1 to 1
    const nr = Math.round(r + (factor < 0 ? (255 - r) * (-factor) : -r * factor));
    const ng = Math.round(g + (factor < 0 ? (255 - g) * (-factor) : -g * factor));
    const nb = Math.round(b + (factor < 0 ? (255 - b) * (-factor) : -b * factor));
    const shHex = rgbToHex(nr, ng, nb);
    const div = document.createElement('div');
    div.className = 'shade';
    div.style.background = shHex;
    div.title = shHex;
    div.onclick = () => { currentColor = { r: nr, g: ng, b: nb }; render(); };
    if (i === 0) { div.style.border = '2px solid #ffd93d'; div.textContent = '★'; }
    shadesEl.appendChild(div);
  }
}

function generate() {
  if (locked) return;
  currentColor = { r: Math.floor(Math.random() * 256), g: Math.floor(Math.random() * 256), b: Math.floor(Math.random() * 256) };
  render();
}

function loadFavs() {
  const favs = JSON.parse(localStorage.getItem('gz-color-favs') || '[]');
  $('#favs').innerHTML = favs.map(h => `<div class="fav" style="background:${h}" title="${h}" onclick="currentColor=hexToRgb('${h}');render()"><span class="rm" onclick="event.stopPropagation();removeFav('${h}')">✕</span></div>`).join('');
  $('#clearFavs').style.display = favs.length ? '' : 'none';
}

function addFav() {
  const hex = rgbToHex(currentColor.r, currentColor.g, currentColor.b);
  const favs = JSON.parse(localStorage.getItem('gz-color-favs') || '[]');
  if (!favs.includes(hex)) { favs.unshift(hex); localStorage.setItem('gz-color-favs', JSON.stringify(favs.slice(0, 24))); loadFavs(); }
}

function removeFav(h) {
  const favs = JSON.parse(localStorage.getItem('gz-color-favs') || '[]').filter(x => x !== h);
  localStorage.setItem('gz-color-favs', JSON.stringify(favs));
  loadFavs();
}

document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); generate(); } });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="locked=!locked;render()">${locked ? t('unlock') : t('lock')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="addFav()">⭐ ${t('favorite')}</button>`;

$('#clearFavs').onclick = () => { localStorage.removeItem('gz-color-favs'); loadFavs(); };

render();
loadFavs();

GZ.renderToolPage({
  category: 'color',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌈', href:'/color/palette.html', name:'Palette Generator'},
    {icon:'🎨', href:'/color/picker.html', name:'Color Picker'},
    {icon:'🔄', href:'/color/hex-rgb.html', name:'HEX ↔ RGB'},
    {icon:'🎚️', href:'/color/shades.html', name:'Shades'},
  ]
});
</script>
