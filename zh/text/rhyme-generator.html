const RHYME_DB = {

  way:['day','say','pay','may','lay','stay','gray','bay','clay','hay','ray','stray','sway','they','obey','convey','decay','delay','display','essay','survey','betray','away','today'],
  heart:['art','part','start','smart','chart','dart','apart','cart','tart','depart','impart','restart','counterpart','torn apart'],

  fly:['sky','high','why','try','cry','dry','shy','sigh','tie','lie','die','vie','bye','dye','guy','comply','supply','imply','reply','apply','multiply','classify','justify','notify','simplify','identify','modify','qualify','verify','clarify'],
};

const COMMON_SUFFIXES = ['ation','ition','ation','tion','sion','ation','ment','ness','able','ible','ation','ful','less','ous','ious','al','ial','ion','ance','ence','ancy','ency','ant','ent','ate','ize','ise','ify','ate','age','dom','hood','ship','ist','ism','ity','ty','ward','wise','like','teen','ty','th','st','nd','rd','ing','ed','er','est','ly','le','el','en','es','s'];

function getSuffix(word) {
  const w = word.toLowerCase().replace(/[^a-z]/g,'');
  for (let len = Math.min(6, w.length); len >= 2; len--) {
    const s = w.slice(-len);
    if (s.length >= 2) return s;
  }
  return w.slice(-2);
}

function findRhymes(word) {
  word = word.toLowerCase().trim().replace(/[^a-z]/g,'');
  if (!word) return [];
  if (RHYME_DB[word]) return [...new Set(RHYME_DB[word])];
  const suffix = getSuffix(word);
  const basePool = Object.values(RHYME_DB).flat();
  const rhymes = new Set();
  basePool.forEach(w => {
    if (w.endsWith(suffix) && w !== word) rhymes.add(w);
  });
  const extra = ['tion','ation','ment','ness','able','less','ous','ful','ing','ed','er','est','ly']
    .map(s => { const base = word.slice(0, -suffix.length); return base + s; });
  extra.forEach(w => { if (w.length > 3 && w !== word) rhymes.add(w); });
  return [...rhymes].sort();
}

function render() {
  const word = $('#wordInput').value.trim();
  const tabs = [{id:'all',label:t('all')},{id:'exact',label:t('exact')},{id:'slant',label:t('slant')},{id:'multi',label:t('multi')}];
  $('#tabs').innerHTML = tabs.map(tb =>
    `<div class="rg-tab ${tb.id===activeTab?'active':''}" onclick="activeTab='${tb.id}';render()">${tb.label}</div>`
  ).join('');

  if (!word) {
    $('#results').innerHTML = `<p style="opacity:.6;text-align:center;padding:20px">${t('enterWord')}</p>`;
    return;
  }
  let rhymes = findRhymes(word);
  if (rhymes.length === 0) {
    $('#results').innerHTML = `<p style="opacity:.6;text-align:center;padding:20px">${t('noResults')}</p>`;
    return;
  }
  if (activeTab === 'exact') rhymes = rhymes.filter(w => getSuffix(w) === getSuffix(word));
  if (activeTab === 'multi') rhymes = rhymes.filter(w => w.length > word.length);
  if (activeTab === 'slant') rhymes = rhymes.filter(w => getSuffix(w) !== getSuffix(word));

  $('#results').innerHTML = `<div class="rg-grid">${rhymes.map(w =>
    `<div class="rg-word" onclick="copyText('${w}');this.style.background='var(--gz-success)';setTimeout(()=>this.style.background='',500)">${w}</div>`
  ).join('')}</div>`;
}

$('#toolbar').innerHTML = '';
$('#findBtn').textContent = t('findBtn');
$('#findBtn').onclick = render;
$('#wordInput').placeholder = t('placeholder');
$('#wordInput').onkeypress = (e) => { if(e.key==='Enter') render(); };
