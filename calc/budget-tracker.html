<style>
.bt-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
@media (max-width:760px){.bt-summary{grid-template-columns:repeat(2,1fr)}}
.bt-stat{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.bt-stat .v{font-size:1.4rem;font-weight:800;font-family:monospace}
.bt-stat .l{font-size:.72rem;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.bt-stat.inc .v{color:#00d672}
.bt-stat.exp .v{color:#ef4444}
.bt-stat.bal .v{color:var(--accent)}
.bt-section{background:var(--glass2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
.bt-section h3{margin:0 0 12px;font-size:.95rem;color:var(--accent);display:flex;justify-content:space-between;align-items:center}
.bt-add{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.bt-add input,.bt-add select{padding:8px 10px;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.85rem}
.bt-add input[type=text]{flex:1;min-width:120px}
.bt-add input[type=number]{width:100px}
.bt-add button{padding:8px 16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:#fff;font-weight:600;cursor:pointer;font-size:.85rem}
.bt-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-bottom:1px solid var(--border);font-size:.88rem}
.bt-item:last-child{border-bottom:none}
.bt-item .cat{font-size:.72rem;color:var(--text2);background:var(--glass);padding:2px 8px;border-radius:4px}
.bt-item .amt{font-weight:600;font-family:monospace}
.bt-item .amt.neg{color:#ef4444}
.bt-item .amt.pos{color:#00d672}
.bt-item .del{cursor:pointer;color:#ef4444;opacity:.5;font-size:1rem;padding:0 4px}
.bt-item .del:hover{opacity:1}
</style>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="bt-summary">
      <div class="bt-stat inc"><div class="v" id="totalInc">$0</div><div class="l" id="lbl-income">Income</div></div>
      <div class="bt-stat exp"><div class="v" id="totalExp">$0</div><div class="l" id="lbl-expenses">Expenses</div></div>
      <div class="bt-stat bal"><div class="v" id="balance">$0</div><div class="l" id="lbl-balance">Balance</div></div>
      <div class="bt-stat"><div class="v" id="saveRate">0%</div><div class="l" id="lbl-save-rate">Save Rate</div></div>
    </div>
    <div class="bt-section">
      <h3><span id="hdr-income">💵 Income</span></h3>
      <div class="bt-add">
        <input type="text" id="incDesc" placeholder="Description">
        <input type="number" id="incAmt" placeholder="Amount" step="0.01">
        <button id="addInc" onclick="addIncome()">+ Add</button>
      </div>
      <div id="incList"></div>
    </div>
    <div class="bt-section">
      <h3><span id="hdr-expenses">💸 Expenses</span></h3>
      <div class="bt-add">
        <input type="text" id="expDesc" placeholder="Description">
        <select id="expCat">
          <option value="Housing">Housing</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Utilities">Utilities</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Health">Health</option>
          <option value="Shopping">Shopping</option>
          <option value="Other">Other</option>
        </select>
        <input type="number" id="expAmt" placeholder="Amount" step="0.01">
        <button id="addExp" onclick="addExpense()">+ Add</button>
      </div>
      <div id="expList"></div>
    </div>
    <button class="gz-btn gz-btn-secondary" onclick="resetAll()" id="resetBtn">🗑️ Reset All</button>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Budget Tracker',
    toolDesc: 'Track your monthly income and expenses for free. Add categories, see your balance and savings rate live. Data saved in your browser — no signup.',
    income: 'Income', expenses: 'Expenses', balance: 'Balance', saveRate: 'Save Rate',
    step1: 'Add your income sources (salary, freelance, side hustle) with descriptions',
    step2: 'Add expenses with categories like Housing, Food, Transport, Entertainment',
    step3: 'Watch your balance and savings rate update live as you add items',
    step4: 'Your data saves automatically — come back anytime. Click Reset to start fresh',
  },
  zh: {
    toolTitle: '预算跟踪器',
    toolDesc: '免费跟踪你的月收入和支出。添加分类，实时查看余额和储蓄率。数据自动保存在浏览器中 — 无需注册。',
    income: '收入', expenses: '支出', balance: '余额', saveRate: '储蓄率',
    step1: '添加你的收入来源（工资、自由职业、副业），可填写描述',
    step2: '添加支出，选择分类如住房、餐饮、交通、娱乐',
    step3: '添加项目时余额和储蓄率实时更新',
    step4: '数据自动保存 — 随时可回来查看。点击重置可重新开始',
  }
});

const { $, t } = GZ;
const STORAGE_KEY = 'gz_budget_tracker';

function load(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY))||{income:[],expenses:[]}; }catch(e){ return {income:[],expenses:[]}; } }
function save(d){ localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
let data = load();

function fmt(n){ return '$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function render(){
  const incTotal = data.income.reduce((s,i)=>s+i.amt,0);
  const expTotal = data.expenses.reduce((s,e)=>s+e.amt,0);
  const bal = incTotal-expTotal;
  const sr = incTotal>0 ? Math.round((bal/incTotal)*100) : 0;
  $('#totalInc').textContent = fmt(incTotal);
  $('#totalExp').textContent = fmt(expTotal);
  $('#balance').textContent = (bal<0?'-':'')+fmt(bal);
  $('#balance').style.color = bal<0?'#ef4444':'var(--accent)';
  $('#saveRate').textContent = sr+'%';
  $('#saveRate').style.color = sr>=20?'#00d672':(sr>=0?'var(--accent)':'#ef4444');

  $('#incList').innerHTML = data.income.map((i,idx)=>`
    <div class="bt-item"><span>${i.desc}</span><span><span class="amt pos">${fmt(i.amt)}</span> <span class="del" onclick="delItem('income',${idx})">✕</span></span></div>
  `).join('') || '<div style="color:var(--text3);font-size:.82rem;padding:8px">No income added</div>';

  $('#expList').innerHTML = data.expenses.map((e,idx)=>`
    <div class="bt-item"><span>${e.desc} <span class="cat">${e.cat}</span></span><span><span class="amt neg">-${fmt(e.amt)}</span> <span class="del" onclick="delItem('expenses',${idx})">✕</span></span></div>
  `).join('') || '<div style="color:var(--text3);font-size:.82rem;padding:8px">No expenses added</div>';

  save(data);
}

window.addIncome = function(){
  const desc=$('#incDesc').value.trim()||'Income';
  const amt=parseFloat($('#incAmt').value)||0;
  if(amt<=0) return;
  data.income.push({desc,amt});
  $('#incDesc').value=''; $('#incAmt').value='';
  render();
};
window.addExpense = function(){
  const desc=$('#expDesc').value.trim()||'Expense';
  const cat=$('#expCat').value;
  const amt=parseFloat($('#expAmt').value)||0;
  if(amt<=0) return;
  data.expenses.push({desc,cat,amt});
  $('#expDesc').value=''; $('#expAmt').value='';
  render();
};
window.delItem = function(type,idx){ data[type].splice(idx,1); render(); };
window.resetAll = function(){
  if(confirm('Reset all budget data?')){ data={income:[],expenses:[]}; save(data); render(); }
};

$('#incDesc').addEventListener('keydown',e=>{if(e.key==='Enter')addIncome();});
$('#incAmt').addEventListener('keydown',e=>{if(e.key==='Enter')addIncome();});
$('#expDesc').addEventListener('keydown',e=>{if(e.key==='Enter')addExpense();});
$('#expAmt').addEventListener('keydown',e=>{if(e.key==='Enter')addExpense();});

render();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/budget-calculator.html', name:'Budget Calculator'},
    {icon:'🎯', href:'/calc/savings-goal-calculator.html', name:'Savings Goal'},
    {icon:'📊', href:'/calc/expense-tracker.html', name:'Expense Tracker'},
    {icon:'🏦', href:'/calc/compound-interest-calculator.html', name:'Compound Interest'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
