<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="tc-grid">
      <div class="tc-card">
        <label id="lbl-bill"></label>
        <input type="number" id="bill" value="50.00" min="0" step="0.01">
        <label id="lbl-tip"></label>
        <div class="tc-presets" id="presets"></div>
        <input type="number" id="tipPct" value="18" min="0" step="0.5" style="margin-bottom:12px">
        <label id="lbl-people"></label>
        <input type="number" id="people" value="1" min="1" step="1">
      </div>
      <div class="tc-card">
        <label id="lbl-tax"></label>
        <input type="number" id="taxPct" value="0" min="0" step="0.1">
        <label id="lbl-round"></label>
        <select id="roundMode">
          <option value="none" id="opt-none"></option>
          <option value="up" id="opt-up"></option>
          <option value="down" id="opt-down"></option>
          <option value="each" id="opt-each"></option>
        </select>
        <label id="lbl-currency"></label>
        <select id="currency">
          <option value="$">$ USD</option>
          <option value="€">€ EUR</option>
          <option value="£">£ GBP</option>
          <option value="¥">¥ CNY/JPY</option>
          <option value="₹">₹ INR</option>
          <option value="A$">A$ AUD</option>
          <option value="C$">C$ CAD</option>
        </select>
      </div>
    </div>
    <div id="output"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Tip Calculator',
    toolDesc: 'Calculate tip amount, split the bill among friends, round up or down, and include tax. Supports 15%, 18%, 20% and custom rates — free and browser-only.',
    calculate: 'Calculate', reset: 'Reset',
    lblBill: 'Bill Amount', lblTip: 'Tip Percentage', lblPeople: 'Number of People',
    lblTax: 'Tax Rate (%) — optional', lblRound: 'Rounding', lblCurrency: 'Currency Symbol',
    tipAmount: 'Tip Amount', taxAmount: 'Tax', billSubtotal: 'Bill Subtotal',
    grandTotal: 'Grand Total', perPerson: 'Per Person',
    optNone: 'No rounding', optUp: 'Round total up', optDown: 'Round total down', optEach: 'Round per person up',
    step1: 'Enter your bill amount',
    step2: 'Pick a tip preset (15%, 18%, 20%) or type a custom percentage',
    step3: 'Optionally enter tax rate and number of people to split',
    step4: 'See the tip, grand total, and amount per person instantly',
  },
  zh: {
    toolTitle: '小费计算器',
    toolDesc: '计算小费金额、在朋友间分摊账单、向上或向下取整、并包含税金。支持 15%、18%、20% 及自定义比例 — 免费且浏览器本地运行。',
    calculate: '计算', reset: '重置',
    lblBill: '账单金额', lblTip: '小费比例', lblPeople: '人数',
    lblTax: '税率（%）— 可选', lblRound: '取整方式', lblCurrency: '货币符号',
    tipAmount: '小费', taxAmount: '税', billSubtotal: '账单小计',
    grandTotal: '总计', perPerson: '每人',
    optNone: '不取整', optUp: '总计向上取整', optDown: '总计向下取整', optEach: '每人向上取整',
    step1: '输入账单金额',
    step2: '选择小费预设（15%、18%、20%）或输入自定义比例',
    step3: '可选输入税率和分摊人数',
    step4: '即时查看小费、总计和每人金额',
  }
});

const { $, t } = GZ;
const PRESETS = [10, 15, 18, 20, 25];

function num(id){ return parseFloat($(id).value) || 0; }

function buildPresets(){
  $('#presets').innerHTML = PRESETS.map(p =>
    `<span class="tc-preset" data-pct="${p}" onclick="setTip(${p})">${p}%</span>`
  ).join('');
}

function setTip(pct){
  $('#tipPct').value = pct;
  document.querySelectorAll('.tc-preset').forEach(el => {
    el.classList.toggle('active', +el.dataset.pct === pct);
  });
  calculate();
}

function calculate(){
  const bill = num('bill');
  const tipPct = num('tipPct');
  const taxPct = num('taxPct');
  const people = Math.max(1, Math.round(num('people')));
  const cur = $('#currency').value;
  const roundMode = $('#roundMode').value;

  const tip = bill * (tipPct / 100);
  const tax = bill * (taxPct / 100);
  let total = bill + tip + tax;
  let perPerson = total / people;

  if(roundMode === 'up') total = Math.ceil(total);
  if(roundMode === 'down') total = Math.floor(total);
  if(roundMode === 'each') perPerson = Math.ceil(perPerson);

  const fmt = n => cur + (Math.round(n * 100) / 100).toFixed(2);
  const fmtTotal = roundMode === 'up' || roundMode === 'down' ? cur + total.toFixed(0) : fmt(total);

  $('#output').innerHTML = `
    <div class="tc-results">
      <h3>${t('grandTotal')}</h3>
      <div class="tc-result-row"><span>${t('billSubtotal')}</span><span>${fmt(bill)}</span></div>
      ${taxPct > 0 ? `<div class="tc-result-row"><span>${t('taxAmount')} (${taxPct}%)</span><span>${fmt(tax)}</span></div>` : ''}
      <div class="tc-result-row"><span>${t('tipAmount')} (${tipPct}%)</span><span class="val">${fmt(tip)}</span></div>
      <div class="tc-result-row total"><span>${t('grandTotal')}</span><span class="val">${fmtTotal}</span></div>
      ${people > 1 ? `
        <div class="tc-per-person">
          <div class="big">${cur}${perPerson.toFixed(2)}</div>
          <div class="lbl">${t('perPerson')} (${people})</div>
        </div>
      ` : ''}
    </div>`;
}

function reset(){
  $('#bill').value = '50.00';
  $('#tipPct').value = '18';
  $('#taxPct').value = '0';
  $('#people').value = '1';
  $('#roundMode').value = 'none';
  setTip(18);
}

$('#tipPct').addEventListener('input', () => {
  const v = num('tipPct');
  document.querySelectorAll('.tc-preset').forEach(el => {
    el.classList.toggle('active', +el.dataset.pct === v);
  });
  calculate();
});
['bill','taxPct','people','roundMode','currency'].forEach(id => {
  $('#'+id).addEventListener('input', calculate);
  $('#'+id).addEventListener('change', calculate);
});

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="calculate()">${t('calculate')}</button><button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;

buildPresets();
setTip(18);

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧾', href:'/calc/bill-splitter.html', name:'Bill Splitter'},
    {icon:'📦', href:'/calc/shipping-calculator.html', name:'Shipping Calculator'},
    {icon:'💰', href:'/calc/sales-tax-calculator.html', name:'Sales Tax Calculator'},
    {icon:'💵', href:'/text/invoice-generator.html', name:'Invoice Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
