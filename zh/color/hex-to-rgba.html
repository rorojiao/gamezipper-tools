<script>
GZI18n.register({
  en: {
    toolTitle: 'HEX to RGBA Converter',
    toolDesc: 'Convert HEX colors to RGBA and back. Adjust RGB channels and alpha transparency with sliders, preview the color, and copy CSS code instantly.',
    lblHex: 'HEX Color',
    lblRgba: 'RGBA Value',
    copy: 'Copy',
    copied: 'Copied!',
    step1: 'Enter a HEX value or use the color picker',
    step2: 'Adjust RGBA channels with the sliders',
    step3: 'Set alpha (A) for transparency',
    step4: 'Click any format button to copy the CSS code',
  },
  zh: {
    toolTitle: 'HEX 转 RGBA 转换器',
    toolDesc: 'HEX 与 RGBA 颜色互转，滑块调整 RGB 通道和透明度，即时预览和复制 CSS 代码。',
    lblHex: 'HEX 颜色',
    lblRgba: 'RGBA 值',
    copy: '复制',
    copied: '已复制！',
    step1: '输入 HEX 值或使用取色器',
    step2: '通过滑块调整 RGBA 通道',
    step3: '设置 Alpha (A) 透明度',
    step4: '点击格式按钮复制 CSS 代码',
  }
});

const { $, copyText, t } = GZ;

$('#lbl-hex').textContent = t('lblHex');
$('#lbl-rgba').textContent = t('lblRgba');
$('#copy-btn').textContent = t('copy');

let r = 233, g = 69, b = 96, a = 1;

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function updateFromRGBA() {
  const hex = '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
  const hexFull = a < 1 ? hex + Math.round(a * 255).toString(16).padStart(2, '0') : hex;
  $('#hex-input').value = hexFull;
  $('#rgba-input').value = `rgba(${r}, ${g}, ${b}, ${a})`;
  $('#r-slider').value = r; $('#r-val').textContent = r;
  $('#g-slider').value = g; $('#g-val').textContent = g;
  $('#b-slider').value = b; $('#b-val').textContent = b;
  $('#a-slider').value = a; $('#a-val').textContent = a.toFixed(2);
  $('#preview').style.background = `rgba(${r},${g},${b},${a})`;
  $('#native-picker').value = hex;
  updateCSSCode();
}

function updateCSSCode() {
  const hsl = rgbToHsl(r, g, b);
  let text = `/* HEX */ ${$('#hex-input').value}\n/* RGBA */ rgba(${r}, ${g}, ${b}, ${a})\n/* HSLA */ hsla(${hsl.h}, ${hsl.s}%, ${hsl.l}%, ${a})`;
  $('#css-code').textContent = text;
}

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      case b: h = ((r - g) / d + 4) / 6; break;
    }
  }
  return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
}

// HEX input
$('#hex-input').oninput = function() {
  let hex = this.value.replace(/^#/, '').trim();
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  if (hex.length === 4) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2]+hex[3]+hex[3];
  if (hex.length === 8) {
    a = clamp(parseInt(hex.substr(6, 2), 16) / 255, 0, 1);
    hex = hex.substr(0, 6);
  }
  if (/^[0-9a-fA-F]{6}$/.test(hex)) {
    r = parseInt(hex.substr(0, 2), 16);
    g = parseInt(hex.substr(2, 2), 16);
    b = parseInt(hex.substr(4, 2), 16);
    updateFromRGBA();
  }
};

// RGBA input
$('#rgba-input').oninput = function() {
  const m = this.value.match(/rgba?\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*(?:,\s*([\d.]+))?\s*\)/i);
  if (m) {
    r = clamp(parseInt(m[1]), 0, 255);
    g = clamp(parseInt(m[2]), 0, 255);
    b = clamp(parseInt(m[3]), 0, 255);
    a = m[4] !== undefined ? clamp(parseFloat(m[4]), 0, 1) : 1;
    updateFromRGBA();
  }
};

// Sliders
['r', 'g', 'b'].forEach(ch => {
  $(`#${ch}-slider`).oninput = function() {
    const val = clamp(parseInt(this.value), 0, 255);
    if (ch === 'r') r = val; else if (ch === 'g') g = val; else b = val;
    updateFromRGBA();
  };
});

$('#a-slider').oninput = function() {
  a = clamp(parseFloat(this.value), 0, 1);
  updateFromRGBA();
};

// Native color picker
$('#native-picker').oninput = function() {
  const hex = this.value.replace('#', '');
  r = parseInt(hex.substr(0, 2), 16);
  g = parseInt(hex.substr(2, 2), 16);
  b = parseInt(hex.substr(4, 2), 16);
  updateFromRGBA();
};

// Copy CSS
function copyCSS(fmt) {
  let val;
  switch(fmt) {
    case 'hex': val = $('#hex-input').value; break;
    case 'rgba': val = `rgba(${r}, ${g}, ${b}, ${a})`; break;
    case 'rgb': val = `rgb(${r}, ${g}, ${b})`; break;
    case 'hsl': { const h = rgbToHsl(r,g,b); val = `hsl(${h.h}, ${h.s}%, ${h.l}%)`; break; }
    case 'hsla': { const h = rgbToHsl(r,g,b); val = `hsla(${h.h}, ${h.s}%, ${h.l}%, ${a})`; break; }
  }
  copyText(val);
  const btn = $('#copy-btn');
  btn.textContent = t('copied');
  setTimeout(() => btn.textContent = t('copy'), 1500);
}

$('#copy-btn').onclick = () => copyCSS('rgba');

updateFromRGBA();

    {icon:'👁️', href:'/color/contrast.html', name:'Contrast Checker'},
  ]
});
</script>
