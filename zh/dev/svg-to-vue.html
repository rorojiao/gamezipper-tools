    lblIn: '输入 SVG',
    codeTab: 'Vue 代码',
    previewTab: 'SVG 预览',
    componentName: '组件名称',
    typescript: 'TypeScript',
    scriptSetup: 'script setup',
    kebabName: '短横线文件名',
    step1: '在输入区粘贴 SVG 代码',
    step2: '自定义组件名称和选项',
    step3: 'Vue SFC 代码即时生成',
    step4: '点击「复制」将组件保存到项目中',
  }
});

const { $, copyText, t } = GZ;

function toKebab(name) {
  return name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').replace(/[\s_]+/g, '-').toLowerCase().replace(/[^a-z0-9-]/g, '').replace(/^-+|-+$/g, '') || 'svg-icon';
}

function buildSfc(svg, name, isTs, isSetup, kebab) {
  // Strip XML comments and the default xmlns (Vue adds it automatically)
  let tpl = svg.replace(/<!--[\s\S]*?-->/g, '').replace(/\s+xmlns="[^"]*"/g, '').trim();
  // Bind width/height via props when present, otherwise leave as-is
  tpl = tpl.replace(/<svg\b([^>]*)>/, (m, attrs) => {
    let a = attrs.replace(/\bwidth="[^"]*"/, ':width="width"').replace(/\bheight="[^"]*"/, ':height="height"');
    if (!/v-bind="\$attrs"| inheritAttrs/.test(a)) a += ' v-bind="$attrs"';
    return '<svg' + a + '>';
  });
  const indented = tpl.split('\n').map((ln, i) => i === 0 ? ln : '  ' + ln.trim()).join('\n');
  const lang = isTs ? ' lang="ts"' : '';
  let code = '';
  if (isSetup) {
    code += `<script setup${lang}>\n`;
    if (isTs) {
      code += `defineProps<{\n  width?: number | string\n  height?: number | string\n}>()\n`;
    } else {
      code += `defineProps({\n  width: { type: [Number, String], default: 24 },\n  height: { type: [Number, String], default: 24 },\n})\n`;
    }
    code += `<\/script>\n\n`;
    code += `<template>\n  ${indented}\n</template>\n`;
  } else {
    code += `<script${lang}>\n`;
    code += `export default {\n  name: '${name}',\n  props: {\n    width: { type: [Number, String], default: 24 },\n    height: { type: [Number, String], default: 24 },\n  },\n  inheritAttrs: false,\n}\n`;
    code += `<\/script>\n\n`;
    code += `<template>\n  ${indented}\n</template>\n`;
  }
  if (kebab) code = `<!-- ${toKebab(name)}.vue -->\n` + code;
  return code;
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#preview').innerHTML = ''; $('#status').innerHTML = ''; return; }
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(inp, 'image/svg+xml');
    const svgEl = doc.querySelector('svg');
    if (svgEl) {
      svgEl.removeAttribute('xmlns');
      $('#preview').innerHTML = inp;
    } else {
      $('#preview').innerHTML = '<span style="color:var(--gz-accent)">No valid SVG found</span>';
    }
  } catch(e) {
    $('#preview').innerHTML = '<span style="color:var(--gz-accent)">Invalid SVG</span>';
  }
  const name = ($('#comp-name').value.trim() || 'SvgIcon').replace(/[^A-Za-z0-9_]/g, '');
  const isTs = $('#opt-ts').checked;
  const isSetup = $('#opt-setup').checked;
  const kebab = $('#opt-kebab').checked;
  const code = buildSfc(inp, name || 'SvgIcon', isTs, isSetup, kebab);
  $('#output').textContent = code;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${name}.vue generated (${code.length} bytes)</span>`;
}

function switchTab(tab) {
  $('#tab-code').classList.toggle('active', tab === 'code');
  $('#tab-preview').classList.toggle('active', tab === 'preview');
  $('#code-wrap').style.display = tab === 'code' ? '' : 'none';
  $('#preview-wrap').style.display = tab === 'preview' ? '' : 'none';
}

function loadExample() {
  $('#input').value = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M9 18l6-6-6-6"></path>
</svg>`;
  $('#comp-name').value = 'ChevronRight';
  convert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#preview').innerHTML = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', convert);
$('#comp-name').addEventListener('input', convert);
$('#opt-ts').addEventListener('change', convert);
$('#opt-setup').addEventListener('change', convert);
$('#opt-kebab').addEventListener('change', convert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#opts').innerHTML = `
  <label>${t('componentName')}: <input type="text" id="comp-name" value="SvgIcon"></label>
  <label><input type="checkbox" id="opt-setup" checked> ${t('scriptSetup')}</label>
  <label><input type="checkbox" id="opt-ts"> ${t('typescript')}</label>
  <label><input type="checkbox" id="opt-kebab" checked> ${t('kebabName')}</label>`;

$('#lbl-in').textContent = t('lblIn');
$('#tab-code').textContent = t('codeTab');
