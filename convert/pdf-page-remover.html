<script>
GZI18n.register({
  en: {
    toolTitle: 'Delete PDF Pages',
    toolDesc: 'Remove unwanted pages from a PDF — click thumbnails or type page ranges. Keep only the pages you need. Free, private, runs in your browser — no upload.',
    dropText: 'Click or drop a PDF file here',
    pages: 'pages',
    download: 'Download Clean PDF',
    reset: 'Reset',
    loading: 'Loading PDF…',
    noFile: 'Please select a PDF file first.',

    deleteRange: 'Delete Range',
    deleteOdd: 'Delete Odd',
    deleteEven: 'Delete Even',
    deleteAll: 'Mark All',
    rangePlaceholder: 'e.g. 2-5,8,11',
    marked: 'marked',
    remaining: 'remaining',
    step1: 'Click the drop zone or drag a PDF file onto it',
    step2: 'Click page thumbnails to mark them for deletion, or enter a range like 2-5',
    step3: 'Use batch buttons for odd/even/all page removal',
    step4: 'Click Download to save the cleaned PDF with marked pages removed',
  },
  zh: {
    toolTitle: 'PDF 删除页面',
    toolDesc: '从 PDF 中删除不需要的页面 — 点击缩略图或输入页码范围。只保留你需要的页面。免费、私密、浏览器本地运行 — 无需上传。',
    dropText: '点击或拖拽 PDF 文件到此处',
    pages: '页',
    download: '下载清理后的 PDF',
    reset: '重置',
    loading: '正在加载 PDF…',
    noFile: '请先选择一个 PDF 文件。',
    noneMarked: '请先标记要删除的页面。',
    done: '完成！下载已开始。',
    deleteRange: '删除范围',
    deleteOdd: '删奇数页',
    deleteEven: '删偶数页',
    deleteAll: '全选删除',
    rangePlaceholder: '如 2-5,8,11',
    marked: '已标记',
    remaining: '保留',
    step1: '点击拖放区或将 PDF 文件拖入',
    step2: '点击页面缩略图标记删除，或输入范围如 2-5',
    step3: '使用批量按钮删除奇数页/偶数页/全部',
    step4: '点击下载保存删除标记页面后的 PDF',
  }
});

const { $, $$, t } = GZ;
let pdfBytes = null;
let marked = []; // boolean per page

const dz = $('#dropzone');
dz.addEventListener('click', () => $('#file-input').click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', async e => {
  e.preventDefault(); dz.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) loadPDF(file);
});
$('#file-input').addEventListener('change', e => {
  if (e.target.files[0]) loadPDF(e.target.files[0]);
});

async function loadPDF(file) {
  $('#status').textContent = t('loading');
  try {
    pdfBytes = new Uint8Array(await file.arrayBuffer());
    const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
    const pageCount = pdfDoc.getPageCount();
    marked = new Array(pageCount).fill(false);
    $('#pdf-info').innerHTML = `<strong>${file.name}</strong> — ${pageCount} ${t('pages')} — ${(file.size/1024).toFixed(0)} KB`;
    $('#upload-area').style.display = 'none';
    $('#editor-area').style.display = 'block';
    renderGlobalActions();
    await renderThumbnails(pdfDoc);
    $('#status').textContent = '';
  } catch(err) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error: ${err.message}</span>`;
  }
}

function renderGlobalActions() {
  $('#global-actions').innerHTML = `
    <div class="range-input">
      <input type="text" id="range-val" placeholder="${t('rangePlaceholder')}">
      <button class="gz-btn gz-btn-secondary" onclick="deleteRange()">${t('deleteRange')}</button>
    </div>
    <button class="gz-btn gz-btn-secondary" onclick="markOdd()">${t('deleteOdd')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="markEven()">${t('deleteEven')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="markAll()">${t('deleteAll')}</button>
    <button class="gz-btn gz-btn-accent" onclick="downloadPDF()">${t('download')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="resetMarks()">${t('reset')}</button>`;
}

function toggleMark(idx) {
  marked[idx] = !marked[idx];
  refreshGrid();
}

function markAll() { marked = marked.map(() => true); refreshGrid(); }
function resetMarks() { marked = marked.map(() => false); refreshGrid(); }
function markOdd() { marked = marked.map((_, i) => i % 2 === 0); refreshGrid(); }
function markEven() { marked = marked.map((_, i) => i % 2 === 1); refreshGrid(); }

function deleteRange() {
  const val = $('#range-val').value.trim();
  if (!val) return;
  const parts = val.split(',').map(s => s.trim()).filter(Boolean);
  for (const p of parts) {
    if (p.includes('-')) {
      const [a, b] = p.split('-').map(n => parseInt(n.trim()));
      if (a && b) for (let i = a; i <= b; i++) if (i >= 1 && i <= marked.length) marked[i - 1] = true;
    } else {
      const n = parseInt(p);
      if (n >= 1 && n <= marked.length) marked[n - 1] = true;
    }
  }
  refreshGrid();
}

function refreshGrid() {
  $$('.page-thumb').forEach((el, i) => {
    el.classList.toggle('marked', marked[i]);
    const btn = el.querySelector('.del-btn');
    if (btn) { btn.textContent = marked[i] ? '✕ Remove' : 'Mark'; btn.classList.toggle('active', marked[i]); }
  });
  const mc = marked.filter(Boolean).length;
  const rc = marked.length - mc;
  $('#pdf-info').innerHTML = $('#pdf-info').innerHTML.replace(/— \d+ .*,.*$/,'') + ` — <span style="color:var(--gz-accent)">${mc} ${t('marked')}</span>, <span style="color:var(--gz-success)">${rc} ${t('remaining')}</span>`;
}

async function renderThumbnails(pdfDoc) {
  const grid = $('#page-grid');
  grid.innerHTML = '';
  const pageCount = pdfDoc.getPageCount();
  for (let i = 0; i < pageCount; i++) {
    const div = document.createElement('div');
    div.className = 'page-thumb';
    div.onclick = () => toggleMark(i);
    div.innerHTML = `
      <canvas width="120" height="160" style="background:#fff"></canvas>
      <div class="page-num">Page ${i + 1}</div>
      <div class="delete-badge">✕</div>
      <div class="del-controls"><button class="del-btn" onclick="event.stopPropagation();toggleMark(${i})">Mark</button></div>`;
    const canvas = div.querySelector('canvas');
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, 120, 160);
    ctx.fillStyle = '#ccc'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(`Page ${i + 1}`, 60, 80);
    grid.appendChild(div);
  }
}

async function downloadPDF() {
  if (!pdfBytes) { $('#status').textContent = t('noFile'); return; }
  const mc = marked.filter(Boolean).length;
  if (mc === 0) { $('#status').textContent = t('noneMarked'); return; }
  const srcDoc = await PDFLib.PDFDocument.load(pdfBytes);
  const outDoc = await PDFLib.PDFDocument.create();
  const keep = [];
  for (let i = 0; i < marked.length; i++) if (!marked[i]) keep.push(i);
  if (keep.length > 0) {
    const copied = await outDoc.copyPages(srcDoc, keep);
    copied.forEach(p => outDoc.addPage(p));
  }
  const out = await outDoc.save();
  const blob = new Blob([out], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'cleaned.pdf'; a.click();
  URL.revokeObjectURL(url);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${t('done')}</span>`;
}

$('#toolbar').innerHTML = '';

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📄', href:'/convert/pdf-merger.html', name:'PDF Merger'},
    {icon:'🔄', href:'/convert/pdf-rotator.html', name:'PDF Rotator'},
    {icon:'📄', href:'/convert/pdf-splitter.html', name:'PDF Splitter'},
    {icon:'🖼️', href:'/convert/image-to-pdf.html', name:'Image to PDF'},
  ]
});
</script>
