const { $, t } = GZ;

/* ---------- Math expression engine (tokenizer + parser + evaluator) ---------- */
const MFNS = { sin:Math.sin, cos:Math.cos, tan:Math.tan, asin:Math.asin, acos:Math.acos, atan:Math.atan,
  sinh:Math.sinh, cosh:Math.cosh, tanh:Math.tanh, exp:Math.exp, ln:Math.log, log:Math.log,
  log2:Math.log2, log10:(x)=>Math.log(x)/Math.LN10, sqrt:Math.sqrt, cbrt:Math.cbrt, abs:Math.abs,
  sign:Math.sign, floor:Math.floor, ceil:Math.ceil, round:Math.round,
  sec:x=>1/Math.cos(x), csc:x=>1/Math.sin(x), cot:x=>1/Math.tan(x) };
const MCONST = { pi:Math.PI, e:Math.E, tau:Math.PI*2 };

function tokenize(s){
  s = s.replace(/\s+/g,'');
  const toks=[]; let i=0;
  while(i<s.length){
    const ch=s[i];
    if((ch>='0'&&ch<='9')||ch==='.'){
      let j=i+1; while(j<s.length && /[0-9.]/.test(s[j])) j++;
      if(j<s.length && (s[j]=='e'||s[j]=='E') && j+1<s.length && /[0-9+\-]/.test(s[j+1])){
        let k=j+1; if(s[k]=='+'||s[k]=='-') k++;
        if(k<s.length && /[0-9]/.test(s[k])){ while(k<s.length && /[0-9]/.test(s[k])) k++; j=k; }
      }
      toks.push({t:'num', v:parseFloat(s.slice(i,j))}); i=j; continue;
    }
    if(/[a-zA-Z_]/.test(ch)){
      let j=i+1; while(j<s.length && /[a-zA-Z0-9_]/.test(s[j])) j++;
      const name=s.slice(i,j).toLowerCase();
      if(MFNS[name]) toks.push({t:'fn', v:name});
      else if(name==='x') toks.push({t:'var'});
      else if(MCONST[name]!==undefined) toks.push({t:'num', v:MCONST[name]});
      else throw new Error('Unknown name: '+name);
      i=j; continue;
    }
    if(ch=='π'){ toks.push({t:'num', v:Math.PI}); i++; continue; }
    if('+-*/^()'.indexOf(ch)>=0){ toks.push({t:ch}); i++; continue; }
    if(ch=='×'||ch=='·'||ch=='*'){ toks.push({t:'*'}); i++; continue; }
    if(ch=='÷'){ toks.push({t:'/'}); i++; continue; }
    if(ch=='−'||ch=='–'){ toks.push({t:'-'}); i++; continue; }
    throw new Error('Unexpected character: '+ch);
  }
  // implicit multiplication
  const out=[];
  for(let k=0;k<toks.length;k++){
    const a=toks[k], b=toks[k+1]; out.push(a);
    if(!b) continue;
    const aEnd=(a.t==='num'||a.t==='var'||a.t===')');
    const bStart=(b.t==='num'||b.t==='var'||b.t==='fn'||b.t==='(');
    if(aEnd && bStart && !(a.t==='num'&&b.t==='num')) out.push({t:'*'});
  }
  return out;
}
function parseExpr(s){
  const toks=tokenize(s); let p=0;
  const peek=()=>toks[p], next=()=>toks[p++];
  function E(){ let n=T(); while(peek()&&(peek().t==='+'||peek().t==='-')){ const c=next().t; n={op:'bop',c,l:n,r:T()}; } return n; }
  function T(){ let n=U(); while(peek()&&(peek().t==='*'||peek().t==='/')){ const c=next().t; n={op:'bop',c,l:n,r:U()}; } return n; }
  function U(){ if(peek()&&peek().t==='-'){ next(); return {op:'neg',a:U()}; } if(peek()&&peek().t==='+'){ next(); return U(); } return P(); }
  function P(){ const b=A(); if(peek()&&peek().t==='^'){ next(); return {op:'bop',c:'^',l:b,r:U()}; } return b; }
  function A(){ const tk=peek(); if(!tk) throw new Error('Unexpected end');
    if(tk.t==='num'){ next(); return {op:'num',v:tk.v}; }
    if(tk.t==='var'){ next(); return {op:'var'}; }
    if(tk.t==='('){ next(); const e=E(); if(!peek()||peek().t!==')') throw new Error('Missing )'); next(); return e; }
    if(tk.t==='fn'){ next(); if(!peek()||peek().t!=='(') throw new Error('Function needs ('); next(); const a=E(); if(!peek()||peek().t!==')') throw new Error('Missing )'); next(); return {op:'call',fn:tk.v,a}; }
    throw new Error('Unexpected token'); }
  const ast=E(); if(p<toks.length) throw new Error('Unexpected trailing input');
  return ast;
}
function evalNode(n,x){
  switch(n.op){
    case 'num': return n.v;
    case 'var': return x;
    case 'neg': return -evalNode(n.a,x);
    case 'call': { const v=evalNode(n.a,x); const f=MFNS[n.fn]; return f?f(v):NaN; }
    case 'bop': { const l=evalNode(n.l,x), r=evalNode(n.r,x);
      switch(n.c){ case '+':return l+r; case '-':return l-r; case '*':return l*r; case '/':return l/r; case '^':return Math.pow(l,r);} }
  }
}

/* ---------- Graph state ---------- */
let fns = []; // {expr, ast, color}
let view = { xmin:-10, xmax:10, ymin:-6, ymax:6 };
let compiled = [];
let mouse = null;
const COLORS = ['#4ecdc4','#ff6b6b','#ffd93d','#a78bfa','#60a5fa','#34d399','#f472b6','#fb923c'];

function compileAll(){
  compiled = [];
  let firstErr = '';
  for(const f of fns){
    try { const ast = parseExpr(f.expr); compiled.push({ ast, color: f.color }); }
    catch(e){ if(!firstErr) firstErr = `“${f.expr}”: ${e.message}`; }
  }
  return firstErr;
}

function renderList(){
  $('#fnlist').innerHTML = fns.map((f,idx)=>`
    <div class="frow">
      <input type="color" class="fcolor" value="${f.color}" data-i="${idx}" data-k="color">
      <input type="text" class="fexpr" value="${f.expr.replace(/"/g,'&quot;')}" placeholder="${t('exprPlaceholder')}" data-i="${idx}" data-k="expr" spellcheck="false">
      <button class="del" data-del="${idx}" title="✕">✕</button>
    </div>`).join('');
  $('#fnlist').querySelectorAll('input').forEach(inp=>{
    inp.addEventListener('change', ()=>{
      const i=+inp.dataset.i;
      if(inp.dataset.k==='expr') fns[i].expr = inp.value;
      else if(inp.dataset.k==='color') fns[i].color = inp.value;
      compileAndDraw();
    });
  });
  $('#fnlist').querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ fns.splice(+btn.dataset.del,1); renderList(); compileAndDraw(); });
  });
}

function compileAndDraw(){
  const err = compileAll();
  $('#status').innerHTML = err ? `<span style="color:var(--gz-accent)">${t('errExpr')}<br><code>${err}</code></span>` : '';
  draw();
}

const canvas = $('#plot');
const ctx = canvas.getContext('2d');

function pxFromX(x){ return (x - view.xmin)/(view.xmax-view.xmin)*canvas.width; }
function pxFromY(y){ return canvas.height - (y - view.ymin)/(view.ymax-view.ymin)*canvas.height; }
function xFromPx(px){ return view.xmin + (px/canvas.width)*(view.xmax-view.xmin); }

function niceStep(range, target){
  const raw = range/target;
  const mag = Math.pow(10, Math.floor(Math.log10(raw)));
  const norm = raw/mag;
  let step;
  if(norm<1.5) step=1; else if(norm<3) step=2; else if(norm<7) step=5; else step=10;
  return step*mag;
}

function draw(){
  // Hi-DPI sizing
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth, cssH = canvas.clientHeight;
  if(canvas.width !== cssW*dpr || canvas.height !== cssH*dpr){
    canvas.width = cssW*dpr; canvas.height = cssH*dpr;
  }
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const W = cssW, H = cssH;
  ctx.clearRect(0,0,W,H);

  const x0 = pxFromY ? 0 : 0;
  // grid
  const xstep = niceStep(view.xmax-view.xmin, 10);
  const ystep = niceStep(view.ymax-view.ymin, 8);
  ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.beginPath();
  for(let gx=Math.ceil(view.xmin/xstep)*xstep; gx<=view.xmax; gx+=xstep){
    const px = (gx-view.xmin)/(view.xmax-view.xmin)*W; ctx.moveTo(px,0); ctx.lineTo(px,H);
  }
  for(let gy=Math.ceil(view.ymin/ystep)*ystep; gy<=view.ymax; gy+=ystep){
    const py = H - (gy-view.ymin)/(view.ymax-view.ymin)*H; ctx.moveTo(0,py); ctx.lineTo(W,py);
  }
  ctx.stroke();

  // axes
  ctx.strokeStyle = 'rgba(255,255,255,0.45)'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  if(view.ymin<=0 && view.ymax>=0){ const py=H-(0-view.ymin)/(view.ymax-view.ymin)*H; ctx.moveTo(0,py); ctx.lineTo(W,py); }
  if(view.xmin<=0 && view.xmax>=0){ const px=(0-view.xmin)/(view.xmax-view.xmin)*W; ctx.moveTo(px,0); ctx.lineTo(px,H); }
  ctx.stroke();

  // axis labels
  ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.font = '11px monospace';
  for(let gx=Math.ceil(view.xmin/xstep)*xstep; gx<=view.xmax; gx+=xstep){
    if(Math.abs(gx)<1e-9) continue;
    const px=(gx-view.xmin)/(view.xmax-view.xmin)*W;
    const ly = view.ymin<=0&&view.ymax>=0 ? Math.min(H-4, H-(0-view.ymin)/(view.ymax-view.ymin)*H+12) : H-4;
    ctx.fillText(fmt(gx), px+2, ly);
  }
  for(let gy=Math.ceil(view.ymin/ystep)*ystep; gy<=view.ymax; gy+=ystep){
    if(Math.abs(gy)<1e-9) continue;
    const py=H-(gy-view.ymin)/(view.ymax-view.ymin)*H;
    const lx = view.xmin<=0&&view.xmax>=0 ? Math.min(W-24,(0-view.xmin)/(view.xmax-view.xmin)*W+4) : 4;
    ctx.fillText(fmt(gy), lx, py-2);
  }
  // origin label
  if(view.xmin<=0&&view.xmax>=0&&view.ymin<=0&&view.ymax>=0){
    ctx.fillText('0', (0-view.xmin)/(view.xmax-view.xmin)*W+3, H-(0-view.ymin)/(view.ymax-view.ymin)*H-3);
  }

  // plot each function
  const N = Math.max(400, W);
  for(const c of compiled){
    ctx.strokeStyle = c.color; ctx.lineWidth = 2.2; ctx.beginPath();
    let pen=false;
    for(let i=0;i<=N;i++){
      const x = view.xmin + (i/N)*(view.xmax-view.xmin);
      let y;
      try { y = evalNode(c.ast, x); } catch(e){ y = NaN; }
      if(!isFinite(y)){ pen=false; continue; }
      const px=(x-view.xmin)/(view.xmax-view.xmin)*W;
      const py=H-(y-view.ymin)/(view.ymax-view.ymin)*H;
      if(py<-1e5||py>1e5){ pen=false; continue; }
      if(!pen){ ctx.moveTo(px,py); pen=true; } else ctx.lineTo(px,py);
    }
    ctx.stroke();
  }

  // legend
  if(compiled.length){
    ctx.font = '12px monospace';
    let ly = 14;
    compiled.forEach((c,i)=>{
      const expr = fns[i]?fns[i].expr:'';
      ctx.fillStyle = c.color;
      ctx.fillRect(8, ly-9, 14, 3);
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillText('y = '+expr, 28, ly);
      ly += 16;
    });
  }

  // mouse trace marker + crosshair
  if(mouse){
    const mx = mouse.x;
    ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.setLineDash([4,4]); ctx.beginPath();
    ctx.moveTo(mx,0); ctx.lineTo(mx,H); ctx.stroke(); ctx.setLineDash([]);
  }
}

function fmt(v){
  if(Math.abs(v)>=1000||Math.abs(v)<0.01) return v.toExponential(1);
  return (Math.round(v*100)/100).toString();
}

/* interaction: zoom (wheel), pan (drag) */
let drag=null;
canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)/rect.width, my=(e.clientY-rect.top)/rect.height;
  const wx=view.xmin+mx*(view.xmax-view.xmin), wy=view.ymin+(1-my)*(view.ymax-view.ymin);
  const f = e.deltaY<0?0.8:1.25;
  view.xmin = wx+(view.xmin-wx)*f; view.xmax = wx+(view.xmax-wx)*f;
  view.ymin = wy+(view.ymin-wy)*f; view.ymax = wy+(view.ymax-wy)*f;
  syncCtrl(); draw();
}, {passive:false});
canvas.addEventListener('pointerdown', e=>{ canvas.setPointerCapture(e.pointerId); drag={x:e.clientX,y:e.clientY}; });
canvas.addEventListener('pointerup', ()=>{ drag=null; });
canvas.addEventListener('pointermove', e=>{
  const rect=canvas.getBoundingClientRect();
  mouse={ x:(e.clientX-rect.left)/rect.width*canvas.clientWidth, y:(e.clientY-rect.top)/rect.height*canvas.clientHeight };
  if(drag){
    const dx=(e.clientX-drag.x)/rect.width*(view.xmax-view.xmin);
    const dy=(e.clientY-drag.y)/rect.height*(view.ymax-view.ymin);
    view.xmin-=dx; view.xmax-=dx; view.ymin+=dy; view.ymax+=dy;
    drag={x:e.clientX,y:e.clientY};
    syncCtrl();
  }
  draw(); updateTrace();
});
canvas.addEventListener('pointerleave', ()=>{ mouse=null; draw(); updateTrace(); });

function updateTrace(){
  if(!mouse){ $('#trace').innerHTML=''; return; }
  const rect=canvas.getBoundingClientRect();
  const xv = view.xmin + (mouse.x/canvas.clientWidth)*(view.xmax-view.xmin);
  let html = `<b>${t('traceAt')} ${fmt(xv)}</b>`;
  for(let i=0;i<compiled.length;i++){
    let y; try{ y=evalNode(compiled[i].ast, xv); }catch(e){ y=NaN; }
    const expr=fns[i]?fns[i].expr:'';
    html += ` &nbsp;<span style="color:${compiled[i].color}">●</span> <code>${expr}</code> = ${isFinite(y)?fmt(y):'—'}`;
  }
  $('#trace').innerHTML = html;
}

function syncCtrl(){
  document.getElementById('cmin').value=Math.round(view.xmin*100)/100;
  document.getElementById('cmax').value=Math.round(view.xmax*100)/100;
  document.getElementById('cymin').value=Math.round(view.ymin*100)/100;
  document.getElementById('cymax').value=Math.round(view.ymax*100)/100;
}
function readCtrl(){
  const a=parseFloat(document.getElementById('cmin').value);
  const b=parseFloat(document.getElementById('cmax').value);
  const c=parseFloat(document.getElementById('cymin').value);
  const d=parseFloat(document.getElementById('cymax').value);
  if(isFinite(a)&&isFinite(b)&&b>a&&isFinite(c)&&isFinite(d)&&d>c){
    view={xmin:a,xmax:b,ymin:c,ymax:d}; draw();
  }
}

$('#examples').innerHTML = ['sin(x)','x^2','x^3-3*x','exp(-x^2)','abs(x)-2','1/x','sqrt(x)','2*cos(x)+sin(2*x)']
  .map(ex=>`<button data-ex="${ex}">${ex}</button>`).join('');
$('#examples').querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>addFn(b.dataset.ex)));

function addFn(expr){
  if(fns.length>=8) return;
  const used = fns.map(f=>f.color);
  const color = COLORS.find(c=>!used.includes(c)) || COLORS[fns.length%COLORS.length];
  fns.push({ expr: expr||'sin(x)', color });
  renderList(); compileAndDraw();
}

$('#ctrls').innerHTML = `
  <span style="font-size:.85em">${t('xmin')}<input id="cmin"></span>
  <span style="font-size:.85em">${t('xmax')}<input id="cmax"></span>
  <span style="font-size:.85em">${t('ymin')}<input id="cymin"></span>
  <span style="font-size:.85em">${t('ymax')}<input id="cymax"></span>
  <button class="gz-btn gz-btn-secondary" onclick="readCtrl()">OK</button>`;
syncCtrl();
['cmin','cmax','cymin','cymax'].forEach(id=>document.getElementById(id).addEventListener('change',readCtrl));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="addFn()">${t('addFn')}</button>
  <button class="gz-btn" onclick="compileAndDraw()">${t('graph')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="zoomBy(0.8)">${t('zoomIn')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="zoomBy(1.25)">${t('zoomOut')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="resetView()">${t('reset')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;
function zoomBy(f){ const cx=(view.xmin+view.xmax)/2, cy=(view.ymin+view.ymax)/2;
  view.xmin=cx+(view.xmin-cx)*f; view.xmax=cx+(view.xmax-cx)*f;
  view.ymin=cy+(view.ymin-cy)*f; view.ymax=cy+(view.ymax-cy)*f; syncCtrl(); draw(); }
function resetView(){ view={xmin:-10,xmax:10,ymin:-6,ymax:6}; syncCtrl(); draw(); }
function clearAll(){ fns=[]; compiled=[]; renderList(); draw(); $('#trace').innerHTML=''; $('#status').innerHTML=''; }

$('#syntaxHint').innerHTML = `<b>${t('syntaxTitle')}:</b> ${t('syntaxBody')}`;

// initial
addFn('sin(x)');
addFn('x^2/4 - 3');

window.addEventListener('resize', draw);

    {icon:'📐', href:'/calc/triangle-calculator.html', name:'Triangle'},
    {icon:'🧮', href:'/calc/scientific-calculator.html', name:'Scientific'},
  ]
});
