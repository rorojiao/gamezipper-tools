<script>
GZI18n.register({
  en: {
    toolTitle: 'Crossed Out Text Generator',
    toolDesc: 'Generate crossed out and strikethrough text instantly. Multiple styles — single line, double line, and slash through. Copy and paste anywhere.',
    input: 'Type or paste your text',
    singleLine: 'Single Strikethrough',
    doubleLine: 'Double Strikethrough',
    slashThrough: 'Slash Through',
    clickToCopy: 'Click to copy',
    step1: 'Type or paste the text you want to cross out',
    step2: 'Choose from three strikethrough styles',
    step3: 'Click on any result to copy it to clipboard',
    step4: 'Paste the crossed out text on social media or messages',
  },
  zh: {
    toolTitle: '删除线文字生成器',
    toolDesc: '即时生成删除线和划线文字。多种样式 — 单线、双线和斜线。复制粘贴到任何地方。',
    input: '输入或粘贴您的文字',
    singleLine: '单删除线',
    doubleLine: '双删除线',
    slashThrough: '斜线划线',
    clickToCopy: '点击复制',
    step1: '输入或粘贴要添加删除线的文字',
    step2: '从三种划线样式中选择',
    step3: '点击任意结果复制到剪贴板',
    step4: '将删除线文字粘贴到社交媒体或消息中',
  }
});

const { $, copyText, t } = GZ;

$('#input').placeholder = t('input');
$('#lblSingle').textContent = t('singleLine');
$('#lblDouble').textContent = t('doubleLine');
$('#lblSlash').textContent = t('slashThrough');
$('#hint1').textContent = t('clickToCopy');
$('#hint2').textContent = t('clickToCopy');
$('#hint3').textContent = t('clickToCopy');

function addCombining(text, char) {
  return [...text].join(char) + char;
}

function updateOutput() {
  const text = $('#input').value;
  // Single strikethrough: U+0336 combining long stroke overlay
  $('#singleText').textContent = addCombining(text, '\u0336');
  // Double strikethrough: two combining strokes
  $('#doubleText').textContent = addCombining(text, '\u0336\u0335');
  // Slash through: U+0337 combining short stroke overlay
  $('#slashText').textContent = addCombining(text, '\u0337');
}

$('#input').addEventListener('input', updateOutput);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='This text is crossed out! Amazing ✨';updateOutput()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';updateOutput()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'➖', href:'/text/strikethrough.html', name:'Strikethrough'},

    {icon:'🔤', href:'/text/case-converter.html', name:'Case Converter'},

</script>
