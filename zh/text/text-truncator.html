.trunc-opt input,.trunc-opt select{width:100%;padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--glass2);color:var(--text);font-size:.9em}
.trunc-opt input:focus,.trunc-opt select:focus{outline:none;border-color:var(--accent)}
.trunc-result{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:18px;margin-top:1rem}

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is text truncation?", "acceptedAnswer": {"@type": "Answer", "text": "Text truncation means shortening text to a specific length and adding an indicator like ... (ellipsis) to show that content was cut off."}}, {"@type": "Question", "name": "What length should a meta description be?", "acceptedAnswer": {"@type": "Answer", "text": "Google typically shows up to 155-160 characters for meta descriptions. This tool has a preset for 155 characters so you can preview how your description will appear."}}, {"@type": "Question", "name": "Can I choose where to break text?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. You can choose to break at the exact character limit, at the last word boundary before the limit, or at the last sentence before the limit."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div><label id="lbl-in"></label><textarea id="input" spellcheck="false" rows="4"></textarea></div>
    <div class="presets-row" id="presets"></div>
    <div class="trunc-options">
      <div class="trunc-opt"><label id="lbl-maxlen"></label><input type="number" id="maxLen" value="155" min="1" max="10000" oninput="doTruncate()"></div>
      <div class="trunc-opt"><label id="lbl-suffix"></label><input type="text" id="suffix" value="..." oninput="doTruncate()"></div>
      <div class="trunc-opt"><label id="lbl-break"></label><select id="breakMode" onchange="doTruncate()">
        <option value="char"></option>
        <option value="word"></option>
        <option value="sentence"></option>
      </select></div>
    </div>
    <div class="trunc-result">
      <div class="label" id="lbl-result"></div>
      <div class="output" id="output"></div>
    </div>
    <div class="trunc-stats" id="stats"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Text Truncator & Ellipsis',
    toolDesc: 'Truncate text to any length and add ellipsis. Perfect for SEO meta descriptions, titles, tweets and UI text.',
    maxLength: 'Max Length (chars)',
    suffix: 'Ending / Suffix',
    breakMode: 'Break At',
    breakChar: 'Exact character',
    breakWord: 'Word boundary',
    breakSentence: 'Sentence end',
    result: 'Truncated Result',
    original: 'Original',
    truncated: 'Truncated',
    charsSaved: 'chars saved',
    seoPresets: 'SEO Presets',
    googleTitle: 'Google Title (60)',
    googleDesc: 'Meta Description (155)',
    twitterPost: 'Twitter Post (280)',
    ogTitle: 'OG Title (95)',
    ogDesc: 'OG Description (200)',
    step1: 'Paste your text in the input area',
    step2: 'Set the max character length and suffix',
    step3: 'Choose where to break — character, word or sentence',
    step4: 'Copy the truncated result for your meta tags or UI',
  },
  zh: {
    toolTitle: '文本截断工具',
    toolDesc: '将文本截断到指定长度并添加省略号。适用于 SEO 元描述、标题、推文和 UI 文本预览。',
    maxLength: '最大长度（字符数）',
    suffix: '结尾 / 后缀',
    breakMode: '截断方式',
    breakChar: '精确字符',
    breakWord: '单词边界',
    breakSentence: '句子末尾',
    result: '截断结果',
    original: '原文',
    truncated: '截断后',
    charsSaved: '字符已省略',
    seoPresets: 'SEO 预设',
    googleTitle: 'Google 标题 (60)',
    googleDesc: '元描述 (155)',
    twitterPost: 'Twitter 帖子 (280)',
    ogTitle: 'OG 标题 (95)',
    ogDesc: 'OG 描述 (200)',
    step1: '在输入区粘贴文本',
    step2: '设置最大字符长度和后缀',
    step3: '选择截断方式 — 精确字符、单词边界或句子末尾',
    step4: '复制截断结果用于 meta 标签或 UI',
  }
});

const { $, copyText, t } = GZ;

// Set labels
$('#lbl-maxlen').textContent = t('maxLength');
$('#lbl-suffix').textContent = t('suffix');
$('#lbl-break').textContent = t('breakMode');
$('#lbl-result').textContent = t('result');

// Break mode options text
$('#breakMode').options[0].textContent = t('breakChar');
$('#breakMode').options[1].textContent = t('breakWord');
$('#breakMode').options[2].textContent = t('breakSentence');

// SEO presets
const seoPresets = [
  { label: t('googleTitle'), len: 60 },
  { label: t('googleDesc'), len: 155 },
  { label: t('twitterPost'), len: 280 },
  { label: t('ogTitle'), len: 95 },
  { label: t('ogDesc'), len: 200 },
];
let presetHtml = `<span style="color:var(--text2);font-size:.85rem;line-height:2.4">${t('seoPresets')}:</span>`;
seoPresets.forEach(p => {
  presetHtml += `<button onclick="$('#maxLen').value=${p.len};doTruncate()">${p.label}</button>`;
});
$('#presets').innerHTML = presetHtml;

function doTruncate() {
  const text = $('#input').value;
  const maxLen = parseInt($('#maxLen').value) || 155;
  const suffix = $('#suffix').value;
  const breakMode = $('#breakMode').value;

  if (!text) { $('#output').textContent = ''; $('#stats').innerHTML = ''; return; }

  let result;
  if (text.length <= maxLen) {
    result = text;
  } else {
    const targetLen = maxLen - suffix.length;
    if (targetLen <= 0) { result = suffix.substring(0, maxLen); }
    else if (breakMode === 'word') {
      let truncated = text.substring(0, targetLen);
      const lastSpace = truncated.lastIndexOf(' ');
      if (lastSpace > targetLen * 0.5) truncated = truncated.substring(0, lastSpace);
      result = truncated + suffix;
    } else if (breakMode === 'sentence') {
      let truncated = text.substring(0, targetLen);
      const lastDot = Math.max(truncated.lastIndexOf('.'), truncated.lastIndexOf('!'), truncated.lastIndexOf('?'));
      const lastNewline = truncated.lastIndexOf('\n');
      const bestBreak = Math.max(lastDot, lastNewline);
      if (bestBreak > targetLen * 0.3) truncated = truncated.substring(0, bestBreak + 1);
      result = truncated + suffix;
    } else {
      result = text.substring(0, targetLen) + suffix;
    }
  }

  $('#output').textContent = result;
  const saved = text.length - result.length;
  $('#stats').innerHTML = `
    <div class="trunc-stat">${t('original')}: <span class="num">${text.length}</span></div>
    <div class="trunc-stat">${t('truncated')}: <span class="num">${result.length}</span></div>
    <div class="trunc-stat"><span class="num">${saved > 0 ? saved : 0}</span> ${t('charsSaved')}</div>`;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';doTruncate()">${t('clear')}</button>`;

$('#input').addEventListener('input', doTruncate);

// Default text
$('#input').value = 'GameZipper Tools offers 150+ free online utilities for developers, designers, and creators. Browse text tools, developer utilities, color tools, image processing, CSS generators, SEO helpers, and practical browser utilities in one searchable hub. No signup required — all tools run entirely in your browser.';
doTruncate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📏', href:'/seo/title-meta-length-checker.html', name:'Title & Meta Checker'},
    {icon:'👁️', href:'/seo/serp-preview.html', name:'SERP Preview'},
    {icon:'🏷️', href:'/seo/meta-tag-generator.html', name:'Meta Tag Generator'},
    {icon:'🧹', href:'/text/whitespace-remover.html', name:'Whitespace Remover'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
