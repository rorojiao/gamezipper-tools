<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="grid2">
      <div class="field"><label id="lbl-tuition"></label><input id="tuition" type="number" value="10940" min="0" step="100"></div>
      <div class="field"><label id="lbl-room"></label><input id="room" type="number" value="11950" min="0" step="100"></div>
      <div class="field"><label id="lbl-books"></label><input id="books" type="number" value="1240" min="0" step="50"></div>
      <div class="field"><label id="lbl-personal"></label><input id="personal" type="number" value="2700" min="0" step="50"></div>
      <div class="field"><label id="lbl-years"></label><input id="years" type="number" value="4" min="1" max="8" step="1"></div>
      <div class="field"><label id="lbl-inflate"></label><input id="inflate" type="number" value="4" min="0" max="20" step="0.1"></div>
    </div>
    <div class="result-box" id="result"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'College Cost Calculator',
    toolDesc: 'Project the total cost of a college degree including tuition, room and board, books and personal expenses — with annual cost inflation. Plan your education budget in seconds.',
    lblTuition: 'Annual Tuition & Fees ($)',
    lblRoom: 'Room & Board / Housing ($)',
    lblBooks: 'Books & Supplies ($)',
    lblPersonal: 'Personal & Transport ($)',
    lblYears: 'Years of Study',
    lblInflate: 'Annual Cost Increase (%)',
    totalCost: 'Total 4-Year Cost',
    perYear: 'Avg / Year',
    yearBreakdown: 'Year-by-Year Breakdown',
    year: 'Year',
    step1: 'Enter annual tuition, room & board, books and personal costs',
    step2: 'Set the number of years (typically 4 for a bachelor\'s degree)',
    step3: 'Adjust the annual cost increase (college inflation ~4%)',
    step4: 'See your projected total cost and year-by-year breakdown',
  },
  zh: {
    toolTitle: '大学费用计算器',
    toolDesc: '预估完成大学学位的总费用，包括学费、食宿、书本和个人开支 — 含年度费用增长。几秒内规划你的教育预算。',
    lblTuition: '年学费和杂费（$）',
    lblRoom: '食宿 / 住宿费（$）',
    lblBooks: '书本和用品（$）',
    lblPersonal: '个人和交通（$）',
    lblYears: '就读年数',
    lblInflate: '年费用增长率（%）',
    totalCost: '四年总费用',
    perYear: '年均费用',
    yearBreakdown: '逐年明细',
    year: '年份',
    step1: '输入年学费、食宿、书本和个人开支',
    step2: '设置就读年数（学士学位通常为 4 年）',
    step3: '调整年费用增长率（大学通胀约 4%）',
    step4: '查看预估总费用和逐年明细',
  }
});

const { $, copyText, t } = GZ;

function fmt(n) { return '$' + n.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0}); }

function calc() {
  const baseTuition = parseFloat($('#tuition').value) || 0;
  const baseRoom = parseFloat($('#room').value) || 0;
  const baseBooks = parseFloat($('#books').value) || 0;
  const basePersonal = parseFloat($('#personal').value) || 0;
  const years = Math.max(1, parseInt($('#years').value) || 4);
  const inflate = (parseFloat($('#inflate').value) || 0) / 100;
  const baseTotal = baseTuition + baseRoom + baseBooks + basePersonal;

  let rows = '';
  let grandTotal = 0;
  for (let y = 1; y <= years; y++) {
    const factor = Math.pow(1 + inflate, y - 1);
    const tuition = baseTuition * factor;
    const room = baseRoom * factor;
    const books = baseBooks * factor;
    const personal = basePersonal * factor;
    const yrTotal = tuition + room + books + personal;
    grandTotal += yrTotal;
    rows += `<tr>
      <td>${t('year')} ${y}</td>
      <td>${fmt(tuition)}</td>
      <td>${fmt(room)}</td>
      <td>${fmt(books)}</td>
      <td>${fmt(personal)}</td>
      <td>${fmt(yrTotal)}</td>
    </tr>`;
  }
  const avgYear = grandTotal / years;
  $('#result').innerHTML = `
    <div class="lbl">${years}-Year ${GZ.lang === 'zh' ? '总费用' : 'Total Cost'}</div>
    <div class="big">${fmt(grandTotal)}</div>
    <div style="text-align:center;font-size:.85em;opacity:.7;margin-top:4px">${t('perYear')}: ${fmt(avgYear)}</div>
    <div class="breakdown">
      <table>
        <thead><tr>
          <th>${t('year')}</th>
          <th>${GZ.lang==='zh'?'学费':'Tuition'}</th>
          <th>${GZ.lang==='zh'?'食宿':'Room'}</th>
          <th>${GZ.lang==='zh'?'书本':'Books'}</th>
          <th>${GZ.lang==='zh'?'个人':'Personal'}</th>
          <th>${GZ.lang==='zh'?'合计':'Total'}</th>
        </tr></thead>
        <tbody>${rows}
        <tr class="total-row"><td colspan="5">${GZ.lang==='zh'?'总计':'Grand Total'}</td><td>${fmt(grandTotal)}</td></tr>
        </tbody>
      </table>
    </div>`;
}

function preset(type) {
  const presets = {
    inState: { tuition: 10940, room: 11950, books: 1240, personal: 2700 },
    outState: { tuition: 28240, room: 11950, books: 1240, personal: 2700 },
    private: { tuition: 39400, room: 13800, books: 1240, personal: 3000 },
    cc: { tuition: 3860, room: 8000, books: 1400, personal: 2500 },
  };
  const p = presets[type] || presets.inState;
  $('#tuition').value = p.tuition;
  $('#room').value = p.room;
  $('#books').value = p.books;
  $('#personal').value = p.personal;
  calc();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="preset('inState')">${GZ.lang==='zh'?'本州公立':'In-State'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="preset('outState')">${GZ.lang==='zh'?'外州公立':'Out-State'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="preset('private')">${GZ.lang==='zh'?'私立':'Private'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="preset('cc')">${GZ.lang==='zh'?'社区大学':'Community'}</button>`;

['#tuition','#room','#books','#personal','#years','#inflate'].forEach(s => $(s).addEventListener('input', calc));

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎓', href:'/calc/student-loan-calculator.html', name:'Student Loan'},
    {icon:'💰', href:'/calc/savings-goal-calculator.html', name:'Savings Goal'},
    {icon:'📈', href:'/calc/compound-interest-calculator.html', name:'Compound Interest'},
    {icon:'💵', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
