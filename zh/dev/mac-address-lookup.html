const SAMPLES = [
  {mac:'00:0C:29:11:22:33', name:'VMware'},
  {mac:'F4:5E:AB:1A:2B:3C', name:'Apple'},
  {mac:'DC:A6:32:42:11:99', name:'Raspberry Pi'},
  {mac:'00:1B:21:55:66:77', name:'Intel'},
  {mac:'08:00:27:AB:CD:EF', name:'VirtualBox'},
  {mac:'00:90:27:99:88:77', name:'Cisco'},
];

function normalizeMac(input){
  return (input||'').toUpperCase().replace(/[^0-9A-F]/g,'');
}

function formatMac(hex){
  if(hex.length!==12) return hex;
  return hex.match(/.{2}/g).join(':');
}

function doLookup(){
  const raw = $('#mac').value.trim();
  const hex = normalizeMac(raw);
  const out = $('#result');
  if(hex.length!==12 || !/^[0-9A-F]{12}$/.test(hex)){
    out.innerHTML = `<div class="mac-err">${t('invalid')}</div>`;
    return;
  }
  const oui = hex.substring(0,6);
  // Clean the vendor name — strip trailing "?" uncertainty marker.
  const vendor = (OUI[oui] || '').replace(/\s*\?\s*$/,'').trim();
  const firstByte = parseInt(hex.substring(0,2),16);
  const isLocal = (firstByte & 0x02) !== 0;          // U/L bit
  const isMulticast = (firstByte & 0x01) !== 0;       // I/G bit
  const assignType = isLocal ? t('localAdmin') : t('globallyUnique');
  const castType = isMulticast ? t('multicast') : t('unicast');

  const ouiDisplay = oui.match(/.{2}/g).join(':');
  const grid = `
      <div class="mac-grid">
        <div class="mac-card"><div class="lbl">${t('oui')}</div><div class="val">${ouiDisplay}</div></div>
        <div class="mac-card"><div class="lbl">${t('address')}</div><div class="val" style="font-size:1rem">${formatMac(hex)}</div></div>
        <div class="mac-card"><div class="lbl">${t('type')}</div><div class="mac-detail">${assignType}<br>${castType}</div></div>
      </div>`;

  if(vendor){
    out.innerHTML = `
      <div class="mac-card">
        <div class="lbl">${t('vendor')}</div>
        <div class="val">${vendor}</div>
      </div>
      ${grid}`;
  } else {
    out.innerHTML = grid + `<div class="mac-err">${t('notFound')}</div>`;
  }
}

function doRandom(){
  const s = SAMPLES[Math.floor(Math.random()*SAMPLES.length)];
  $('#mac').value = s.mac;
  doLookup();
}

$('#mac').addEventListener('keydown', e => { if(e.key==='Enter') doLookup(); });

  SAMPLES.map(s => `<button onclick="document.getElementById('mac').value='${s.mac}';doLookup()" title="${s.name}">${s.mac}</button>`).join('');
