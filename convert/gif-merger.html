    merging: '正在合并 GIF…',

const { $, t } = GZ;
let gifs = []; // {url, frames:[{data(delay)], w, h}

$('#drop').addEventListener('click', () => $('#file').click());
$('#drop').addEventListener('dragover', e => { e.preventDefault(); $('#drop').classList.add('drag'); });
$('#drop').addEventListener('dragleave', () => $('#drop').classList.remove('drag'));
$('#drop').addEventListener('drop', e => {
  e.preventDefault();
  $('#drop').classList.remove('drag');
  Array.from(e.dataTransfer.files).forEach(f => addFile(f));
});
$('#file').addEventListener('change', e => { Array.from(e.target.files).forEach(f => addFile(f)); $('#file').value = ''; });

function addFile(file) {
  if (!file.type.includes('gif') && !file.name.toLowerCase().endsWith('.gif')) return;
  const url = URL.createObjectURL(file);
  gifs.push({ url, name: file.name });
  renderList();
}

function removeGif(i) {
  URL.revokeObjectURL(gifs[i].url);
  gifs.splice(i, 1);
  renderList();
}

function renderList() {
  $('#list').innerHTML = gifs.map((g, i) =>
    `<div class="gif-item"><img src="${g.url}"><span>${i + 1}. ${g.name}</span><button onclick="removeGif(${i})" title="Remove">✕</button></div>`
  ).join('');
  $('#drop-text').textContent = gifs.length === 0 ? t('dropText') : `${gifs.length} GIF(s) selected`;
}

async function decodeGif(url) {
  // Use a simple approach: load the GIF as an Image and capture frames via canvas.
  // For true frame extraction we'd need an omnigif lib; here we approximate by loading the GIF
  // and rendering at fixed intervals. A better approach uses gifuct-js.
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve({ img, w: img.naturalWidth, h: img.naturalHeight });
    img.onerror = reject;
    img.src = url;
  });
}

async function merge() {
  if (gifs.length < 2) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('needTwo')}</span>`; return; }
  $('#status').innerHTML = `<span style="color:var(--text2)">${t('merging')}</span>`;
  $('#progress').style.display = 'block';
  $('#progress').value = 0.1;

  try {
    const layout = $('#layout').value;
    const gap = +$('#spacing').value;
    const bg = $('#bg-color').value;
    const delay = +$('#speed').value;
    const frames = +$('#frame-count').value;

    const decoded = await Promise.all(gifs.map(g => decodeGif(g.url)));
    const maxW = Math.max(...decoded.map(d => d.w));
    const maxH = Math.max(...decoded.map(d => d.h));

    let totalW, totalH;
    if (layout === 'h') {
      totalW = decoded.reduce((s, d) => s + d.w, 0) + gap * (decoded.length - 1);
      totalH = maxH;
    } else {
      totalW = maxW;
      totalH = decoded.reduce((s, d) => s + d.h, 0) + gap * (decoded.length - 1);
    }

    const canvas = document.createElement('canvas');
    canvas.width = totalW;
    canvas.height = totalH;
    const ctx = canvas.getContext('2d');

    const encoder = new GIF({
      workers: 2,
      quality: 10,
      width: totalW,
      height: totalH,
      workerURL: 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js'
    });

    encoder.on('progress', p => { $('#progress').value = p; });

    encoder.on('finished', blob => {
      const url = URL.createObjectURL(blob);
      $('#preview').src = url;
      $('#preview').style.display = 'block';
      const a = document.createElement('a');
      a.href = url; a.download = 'merged.gif';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 5000);
      $('#progress').style.display = 'none';
      $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done')} (${(blob.size / 1024).toFixed(0)} KB)</span>`;
    });

    // Render N frames by drawing each GIF's current animated frame
    for (let f = 0; f < frames; f++) {
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, totalW, totalH);
      let pos = 0;
      decoded.forEach((d, idx) => {
        let x, y;
        if (layout === 'h') { x = pos; y = Math.floor((maxH - d.h) / 2); pos += d.w + gap; }
        else { x = Math.floor((maxW - d.w) / 2); y = pos; pos += d.h + gap; }
        ctx.drawImage(d.img, x, y, d.w, d.h);
      });
      encoder.addFrame(ctx, { copy: true, delay });
      // Advance each GIF's animation by waiting
      await new Promise(r => setTimeout(r, delay));
    }
    $('#progress').value = 0.5;
    encoder.render();
  } catch (err) {
    $('#progress').style.display = 'none';
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error: ${err.message}</span>`;
  }
}

function clearAll() {
  gifs.forEach(g => URL.revokeObjectURL(g.url));
  gifs = [];
  renderList();
  $('#preview').style.display = 'none';
  $('#status').innerHTML = '';
  $('#progress').style.display = 'none';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="merge()">${t('merge')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;
