<style>
.coupon-preview{
  width:380px;max-width:100%;min-height:180px;border-radius:12px;
  display:flex;overflow:hidden;margin:0 auto;position:relative;
  box-shadow:0 6px 24px rgba(0,0,0,.2);
  background:#fff;
}
.coupon-left{
  flex:0 0 60%;padding:20px;display:flex;flex-direction:column;justify-content:space-between;
  position:relative;
}
.coupon-right{
  flex:0 0 40%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px;position:relative;color:#fff;text-align:center;
}
.coupon-notch{position:absolute;width:20px;height:20px;background:transparent;border-radius:50%}
.coupon-notch-left{right:-10px;top:50%;transform:translateY(-50%);border:10px solid #fff;border-radius:50%}
.coupon-notch-right{left:-10px;top:50%;transform:translateY(-50%);border:10px solid transparent}
.coupon-dashline{position:absolute;right:-1px;top:10%;bottom:10%;width:2px;border-left:2px dashed rgba(0,0,0,.2)}
.coupon-brand{font-size:1.1em;font-weight:bold;color:#333;text-transform:uppercase;letter-spacing:1px}
.coupon-discount{font-size:2.2em;font-weight:900;color:#333;line-height:1;margin:8px 0}
.coupon-desc{font-size:.8em;color:#666}
.coupon-promo-label{font-size:.65em;text-transform:uppercase;letter-spacing:1px;opacity:.8}
.coupon-promo-code{font-size:1.1em;font-weight:bold;letter-spacing:2px;margin:4px 0;border:2px dashed rgba(255,255,255,.5);padding:4px 12px;border-radius:4px}
.coupon-expiry{font-size:.65em;margin-top:6px;opacity:.8}
.coupon-terms{font-size:.55em;opacity:.6;margin-top:4px}
.form-row{margin:8px 0}
.form-row label{display:block;font-size:.85em;margin-bottom:4px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:6px 8px;border-radius:4px;border:1px solid var(--gz-border,#444);background:var(--gz-surface,#f5f5f5);color:inherit;font-size:.85em;font-family:inherit}
.theme-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:4px}
.theme-btn{height:28px;border-radius:6px;cursor:pointer;border:2px solid transparent}
.theme-btn.active{border-color:var(--gz-accent,#4ecdc4)}
@media print{ body *{visibility:hidden} #print-area,#print-area *{visibility:visible} #print-area{position:absolute;left:0;top:0;width:100%} }
</style>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-split">
      <div>
        <div class="form-row">
          <label id="lbl-brand"></label>
          <input id="brand" type="text" value="My Shop" maxlength="25">
        </div>
        <div class="form-row">
          <label id="lbl-discount"></label>
          <input id="discount" type="text" value="20% OFF" maxlength="15">
        </div>
        <div class="form-row">
          <label id="lbl-desc"></label>
          <input id="desc-input" type="text" value="On your entire order" maxlength="50">
        </div>
        <div class="form-row">
          <label id="lbl-promo"></label>
          <div style="display:flex;gap:4px">
            <input id="promo" type="text" value="SAVE20" maxlength="20" style="flex:1">
            <button class="gz-btn gz-btn-sm" onclick="genPromo()" style="white-space:nowrap">🎲</button>
          </div>
        </div>
        <div class="form-row">
          <label id="lbl-expiry"></label>
          <input id="expiry" type="text" value="Dec 31, 2026" maxlength="25">
        </div>
        <div class="form-row">
          <label id="lbl-terms"></label>
          <input id="terms" type="text" value="Min order $50. One per customer." maxlength="60">
        </div>
        <div class="form-row">
          <label id="lbl-theme"></label>
          <div class="theme-grid" id="themeGrid"></div>
        </div>
      </div>
      <div>
        <label id="lbl-preview"></label>
        <div id="print-area">
          <div class="coupon-preview" id="couponCard">
            <div class="coupon-left">
              <div>
                <div class="coupon-brand" id="cBrand">My Shop</div>
                <div class="coupon-discount" id="cDiscount">20% OFF</div>
                <div class="coupon-desc" id="cDesc">On your entire order</div>
              </div>
              <div class="coupon-terms" id="cTerms">Min order $50. One per customer.</div>
              <div class="coupon-dashline"></div>
            </div>
            <div class="coupon-right" id="cRight">
              <div class="coupon-promo-label">PROMO CODE</div>
              <div class="coupon-promo-code" id="cPromo">SAVE20</div>
              <div class="coupon-expiry" id="cExpiry">Expires<br>Dec 31, 2026</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Coupon Designer',
    toolDesc: 'Create custom discount coupons with brand, promo code, expiry and colors. Download as PNG or print. 100% in-browser.',
    brand: 'Brand / Store name',
    discount: 'Discount (e.g. 20% OFF, $10 OFF)',
    descField: 'Description / conditions',
    promo: 'Promo code',
    expiry: 'Expiry date',
    terms: 'Terms & conditions (small print)',
    theme: 'Color theme',
    preview: 'Preview',
    download: 'Download PNG', print: 'Print', clear: 'Reset',
    done: 'Done!',
    step1: 'Enter your brand name and discount amount',
    step2: 'Add a promo code (click 🎲 to generate random)',
    step3: 'Set expiry date and terms',
    step4: 'Choose a theme, then Download or Print',
  },
  zh: {
    toolTitle: '优惠券设计器',
    toolDesc: '创建自定义折扣优惠券，包含品牌、促销码、有效期和颜色。下载为 PNG 或打印。100% 浏览器本地运行。',
    brand: '品牌 / 商店名称',
    discount: '折扣（如 20% OFF, 减$10）',
    descField: '描述 / 条件',
    promo: '促销码',
    expiry: '有效期',
    terms: '条款与条件（小字）',
    theme: '颜色主题',
    preview: '预览',
    download: '下载 PNG', print: '打印', clear: '重置',
    done: '完成！',
    step1: '输入品牌名称和折扣金额',
    step2: '添加促销码（点击 🎲 随机生成）',
    step3: '设置有效期和条款',
    step4: '选择主题，然后下载或打印',
  }
});

const { $, t, showToast } = GZ;

const THEMES = [
  {name:'Red', rightBg:'#e74c3c'},
  {name:'Orange', rightBg:'#e67e22'},
  {name:'Blue', rightBg:'#3498db'},
  {name:'Green', rightBg:'#27ae60'},
  {name:'Purple', rightBg:'#9b59b6'},
  {name:'Pink', rightBg:'#e84393'},
  {name:'Dark', rightBg:'#2d3436'},
  {name:'Teal', rightBg:'#00b894'},
];

let currentTheme = 0;

function renderThemes(){
  $('#themeGrid').innerHTML = THEMES.map((th,i) =>
    `<div class="theme-btn ${i===currentTheme?'active':''}" style="background:${th.rightBg}" onclick="setTheme(${i})" title="${th.name}"></div>`
  ).join('');
}

function setTheme(i){ currentTheme = i; renderThemes(); updatePreview(); }

function updatePreview(){
  $('#cBrand').textContent = $('#brand').value || 'My Shop';
  $('#cDiscount').textContent = $('#discount').value || 'DISCOUNT';
  $('#cDesc').textContent = $('#desc-input').value || '';
  $('#cPromo').textContent = $('#promo').value || 'PROMO';
  $('#cExpiry').innerHTML = $('#expiry').value ? `Expires<br>${$('#expiry').value}` : '';
  $('#cTerms').textContent = $('#terms').value || '';
  $('#cRight').style.background = THEMES[currentTheme].rightBg;
}

['brand','discount','desc-input','promo','expiry','terms'].forEach(id => {
  $('#'+id).addEventListener('input', updatePreview);
});

function genPromo(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for(let i = 0; i < 8; i++) code += chars[Math.floor(Math.random() * chars.length)];
  $('#promo').value = code;
  updatePreview();
}

function downloadPNG(){
  const card = $('#couponCard');
  const w = 380, h = card.offsetHeight;
  const data = new XMLSerializer().serializeToString(card);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}">
    <foreignObject width="100%" height="100%">${data}</foreignObject></svg>`;
  const blob = new Blob([svg], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = w * 2;
    canvas.height = h * 2;
    const ctx = canvas.getContext('2d');
    ctx.scale(2, 2);
    ctx.drawImage(img, 0, 0);
    canvas.toBlob(blob => {
      const dl = document.createElement('a');
      dl.href = URL.createObjectURL(blob);
      dl.download = 'coupon.png';
      dl.click();
      URL.revokeObjectURL(dl.href);
    });
    URL.revokeObjectURL(url);
  };
  img.src = url;
  showToast(t('done'));
}

function doPrint(){ window.print(); }
function doReset(){
  $('#brand').value='My Shop'; $('#discount').value='20% OFF';
  $('#desc-input').value='On your entire order'; $('#promo').value='SAVE20';
  $('#expiry').value='Dec 31, 2026'; $('#terms').value='Min order $50. One per customer.';
  updatePreview();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadPNG()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doPrint()">${t('print')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doReset()">${t('clear')}</button>`;

GZ.renderToolPage({
  category:'image',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'🎁',href:'/image/gift-card-generator.html',name:'Gift Card Generator'},
    {icon:'🏷️',href:'/image/barcode-label-maker.html',name:'Barcode Label Maker'},
    {icon:'🎫',href:'/text/coupon-code-generator.html',name:'Coupon Code Generator'},
    {icon:'🎨',href:'/image/poster-maker.html',name:'Poster Maker'},
  ]
});

document.querySelector('label#lbl-brand').textContent = t('brand');
document.querySelector('label#lbl-discount').textContent = t('discount');
document.querySelector('label#lbl-desc').textContent = t('descField');
document.querySelector('label#lbl-promo').textContent = t('promo');
document.querySelector('label#lbl-expiry').textContent = t('expiry');
document.querySelector('label#lbl-terms').textContent = t('terms');
document.querySelector('label#lbl-theme').textContent = t('theme');
document.querySelector('label#lbl-preview').textContent = t('preview');
renderThemes();
updatePreview();
</script>

</body>
