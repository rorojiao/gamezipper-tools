function hexToRgb(hex) {
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  return [parseInt(hex.slice(0,2),16), parseInt(hex.slice(2,4),16), parseInt(hex.slice(4,6),16)];
}

function rgbToHex(r,g,b) {
  return '#' + [r,g,b].map(c => c.toString(16).padStart(2,'0')).join('');
}

function rgbToHsl(r,g,b) {
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min;
  let h,s,l=(max+min)/2;
  if(d===0){h=s=0}else{
    s=l>.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break}
  }
  return [Math.round(h*360),Math.round(s*100),Math.round(l*100)];
}

function colorDistance(a,b) {
  return Math.sqrt((a[0]-b[0])**2 + (a[1]-b[1])**2 + (a[2]-b[2])**2);
}

function findClosestColor(rgb) {
  let closest = 'black';
  let minDist = Infinity;
  const entries = Object.entries(NAMED_COLORS);
  for (const [name, cRgb] of entries) {
    const d = colorDistance(rgb, cRgb);
    if (d < minDist) { minDist = d; closest = name; }
  }
  return closest;
}

function getContrastColor(r,g,b) {
  const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
  return lum > 0.5 ? '#000' : '#fff';
}

function findColor() {
  let input = $('#hex-input').value.trim().toLowerCase();
  let rgb;

  // Check if it's a color name
  if (NAMED_COLORS[input]) {
    rgb = NAMED_COLORS[input];
  } else if (input.match(/^#?[0-9a-f]{3,6}$/i)) {
    if (!input.startsWith('#')) input = '#' + input;
    rgb = hexToRgb(input);
  } else if (input.match(/^\d{1,3},\s*\d{1,3},\s*\d{1,3}$/)) {
    rgb = input.split(',').map(Number);
  } else {
    // Try closest name search
    const names = Object.keys(NAMED_COLORS);
    const match = names.find(n => n.includes(input.replace(/\s/g,'')));
    if (match) {
      rgb = NAMED_COLORS[match];
    } else {
      rgb = hexToRgb($('#picker').value);
    }
  }

  const [r,g,b] = rgb;
  const hex = rgbToHex(r,g,b);
  const hsl = rgbToHsl(r,g,b);
  const name = findClosestColor(rgb);

  $('#picker').value = hex;
  $('#hex-input').value = hex;
  $('#preview').style.background = hex;
  $('#preview').style.color = getContrastColor(r,g,b);
  $('#preview').textContent = name;
  $('#color-name').textContent = name;
  $('#hex-val').textContent = hex.toUpperCase();
  $('#rgb-val').textContent = `rgb(${r}, ${g}, ${b})`;
  $('#hsl-val').textContent = `hsl(${hsl[0]}, ${hsl[1]}%, ${hsl[2]}%)`;
  $('#css-val').textContent = name;

  // Similar colors
  const dists = Object.entries(NAMED_COLORS).map(([n,c]) => ({name:n, rgb:c, d:colorDistance(rgb,c)}));
  dists.sort((a,b) => a.d - b.d);
  const similar = dists.slice(0,12);
  $('#similar').innerHTML = similar.map(s =>
    `<div style="background:${s.name}" data-name="${s.name}" title="${s.name}" onclick="document.getElementById('hex-input').value='${s.name}';findColor()"></div>`
  ).join('');
}

$('#picker').addEventListener('input', () => {
  $('#hex-input').value = $('#picker').value;
  findColor();
});

$('#hex-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') findColor();
});

findColor();
