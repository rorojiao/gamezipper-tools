const OCCUPATIONS_EN = ['Software Engineer','Teacher','Nurse','Accountant','Designer','Sales Manager','Mechanic','Chef','Electrician','Journalist','Pharmacist','Architect','Lawyer','Photographer','Pilot','Dentist','Graphic Designer','Marketing Analyst','Civil Engineer','Veterinarian'];

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}

function buildIdentity(){
  const locale = $('#selLocale').value;
  const p = POOLS[locale] || POOLS.en_US;
  const isZh = locale === 'zh_CN';
  let genderChoice = $('#selGender').value;
  if(genderChoice==='any') genderChoice = Math.random()<0.5?'male':'female';
  const first = pick(genderChoice==='male'?p.maleFirst:p.femaleFirst);
  const last = pick(p.last);
  const fullName = isZh ? (last+first) : (first+' '+last);
  const year = rnd(1955,2006);
  const month = String(rnd(1,12)).padStart(2,'0');
  const day = String(rnd(1,28)).padStart(2,'0');
  const dob = `${year}-${month}-${day}`;
  const age = new Date().getFullYear()-year;
  const userBase = (first+last).toLowerCase().replace(/[^a-z]/g,'') + rnd(1,999);
  const email = userBase + '@' + p.domain;
  const city = pick(p.cities);
  const streetNo = rnd(1,9999);
  const addr = `${streetNo} ${pick(p.streets)}`;
  const occupations = isZh ? OCCUPATIONS_ZH : OCCUPATIONS_EN;
  const ccType = p.cc[Math.floor(Math.random() * (p.cc.length / 2)) * 2];
  const ccNum = p.cc[Math.floor(Math.random() * (p.cc.length / 2)) * 2 + 1];
  const avColors = ['#e94560','#00d672','#61afef','#bb86fc','#ffb86c','#ff79c6','#4ecdc4'];
  return {
    fullName, gender: genderChoice, dob, age, email, phone: p.phoneFmt(),
    username: userBase, password: genPwd(),
    address: addr, city: city[0], state: city[1]||city[0], zip: city[2],
    country: locale, occupation: pick(occupations), company: pick(COMPANIES),
    website: (last).toLowerCase().replace(/[^a-z]/g,'') + '.example.com',
    ssn: locale==='en_US' ? `${rnd(100,899)}-${String(rnd(10,99)).padStart(2,'0')}-${String(rnd(1000,9999)).padStart(4,'0')}` : '—',
    cardType: ccType, cardNum: ccNum,
    avatarColor: pick(avColors), initials: (first[0]+(last[0]||'')).toUpperCase(),
  };
}
function genPwd(){const s='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789!@#$%';let p='';for(let i=0;i<14;i++)p+=s[Math.floor(Math.random()*s.length)];return p;}

}

function genBatch(){
  const n = Math.min(500, Math.max(1, +$('#batchCount').value || 10));
  const fmt = $('#batchFmt').value;
  const rows = [];
  for(let i=0;i<n;i++){ rows.push(buildIdentity()); }
  let out='';
  const cols = ['fullName','gender','email','phone','dob','age','username','password','address','city','state','zip','occupation','company'];
  if(fmt==='json'){ out = JSON.stringify(rows.map(r=>{const o={};cols.forEach(c=>o[c]=r[c]);return o;}),null,2); }
  else if(fmt==='csv'){ out = cols.join(',')+'\n'+rows.map(r=>cols.map(c=>{const v=String(r[c]);return v.includes(',')?'"'+v+'"':v;}).join(',')).join('\n'); }
  else { out = cols.join('\t')+'\n'+rows.map(r=>cols.map(c=>r[c]).join('\t')).join('\n'); }
  $('#batchOut').value = out;
}
