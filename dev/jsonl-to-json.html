    tab1: 'JSONL → JSON',

    outLabel: '输出',
    convert: '转换',
    sample: '示例',
    copy: '复制',
    clear: '清空',
    pretty: '美化（2 空格）',
    minify: '压缩',
    valid: '✓ 已转换 {n} 条记录',
    invalid: '✗ 第 {line} 行错误：{msg}',
    linesLabel: '行数',
    sizeLabel: '大小',
    step1: '选择转换方向：JSONL → JSON 或 JSON → JSONL',
    step2: '将数据粘贴到输入框',
    step3: '选择美化或压缩输出',
    step4: '点击「转换」，再「复制」结果'

let mode = 'jsonl2json';
let pretty = true;
const { $, copyText, t } = GZ;

function setMode(m) {
  mode = m;
  $('#tab-jsonl2json').classList.toggle('active', m === 'jsonl2json');
  $('#tab-json2jsonl').classList.toggle('active', m === 'json2jsonl');
  convert();
}

function convert() {
  const raw = $('#input').value;
  $('#output').textContent = '';
  $('#stats').innerHTML = '';
  if (!raw.trim()) return;
  const bytes = new Blob([raw]).size;
  const fmtSize = bytes < 1024 ? bytes + ' B' : (bytes / 1024).toFixed(1) + ' KB';

  try {
    if (mode === 'jsonl2json') {
      const lines = raw.split(/\r?\n/);
      const arr = [];
      let i = 0;
      for (const line of lines) {
        i++;
        const s = line.trim();
        if (!s) continue;
        try {
          arr.push(JSON.parse(s));
        } catch (e) {
          return showErr(i, e.message);
        }
      }
      const out = pretty ? JSON.stringify(arr, null, 2) : JSON.stringify(arr);
      $('#output').textContent = out;
      showStats(arr.length, fmtSize, t('valid').replace('{n}', arr.length));
    } else {
      const data = JSON.parse(raw);
      if (!Array.isArray(data)) {
        throw new Error('JSON → JSONL requires a JSON array at the top level.');
      }
      const out = data.map(o => JSON.stringify(o)).join('\n');
      $('#output').textContent = out;
      showStats(data.length, fmtSize, t('valid').replace('{n}', data.length));
    }
  } catch (e) {
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
  }
}

function showStats(n, size, msg) {
  $('#stats').innerHTML = `<span>${t('linesLabel')}: ${n}</span><span>${t('sizeLabel')}: ${size}</span><span style="color:var(--gz-success)">${msg}</span>`;
}

function showErr(line, msg) {
  $('#output').innerHTML = `<span style="color:var(--gz-accent)">${t('invalid').replace('{line}', line).replace('{msg}', msg)}</span>`;
  $('#stats').innerHTML = `<span style="color:var(--gz-accent)">✗ Line ${line}</span>`;
}

function loadSample() {
  if (mode === 'jsonl2json') {
    $('#input').value = '{"id":1,"name":"Alice","role":"admin"}\n{"id":2,"name":"Bob","role":"user"}\n{"id":3,"name":"Carol","role":"user"}';
  } else {
    $('#input').value = JSON.stringify([
      {id:1, name:'Alice', role:'admin'},
      {id:2, name:'Bob', role:'user'},
      {id:3, name:'Carol', role:'user'}
    ], null, 2);
  }
  convert();
}

function clearAll() {
  $('#input').value = '';
  $('#output').textContent = '';
  $('#stats').innerHTML = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadSample()">${t('sample')}</button>
  <span class="mode-row" style="margin-left:8px">
    <label><input type="radio" name="fmt" checked onchange="pretty=true;convert()"> ${t('pretty')}</label>
    <label><input type="radio" name="fmt" onchange="pretty=false;convert()"> ${t('minify')}</label>
  </span>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()" style="margin-left:auto">${t('clear')}</button>`;

$('#input').addEventListener('input', convert);

});
