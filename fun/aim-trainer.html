<style>
.arena{width:100%;height:420px;background:var(--glass2);border:1px solid var(--border);border-radius:16px;position:relative;overflow:hidden;cursor:crosshair;user-select:none}
.arena.idle{display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;font-size:1.4em;font-weight:700;color:var(--text2)}
.target{position:absolute;width:54px;height:54px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ff6b6b,#c92a2a);border:2px solid #fff;box-shadow:0 0 0 3px rgba(255,255,255,.25),0 4px 12px rgba(0,0,0,.4);cursor:pointer;transition:transform .05s;animation:pop .12s ease}
.target:hover{transform:scale(1.05)}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.target.miss{background:radial-gradient(circle at 35% 30%,#868e96,#343a40)}
.timer-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:8px}
.timer-fill{height:100%;background:var(--accent);transition:width .1s linear}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:16px 0}
.stat{background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat .num{font-size:1.6em;font-weight:700;color:var(--gz-accent)}
.stat .lbl{font-size:.78em;color:var(--text2);margin-top:4px}
.tip{background:rgba(78,205,196,.08);border-left:3px solid var(--accent);padding:10px 14px;border-radius:6px;font-size:.88em;margin-top:14px}
.diff-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Aim Trainer","description":"Free online Aim Trainer. Click targets as fast and accurately as you can. Measures reaction speed, click accuracy and targets-per-second.","url":"https://tools.gamezipper.com/fun/aim-trainer.html","applicationCategory":"Game","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a good aim trainer score?","acceptedAnswer":{"@type":"Answer","text":"Hitting 30+ targets in 30 seconds with over 90% accuracy is considered good. Pro gamers often exceed 40 targets per 30 seconds. Focus on accuracy first, speed comes with practice."}},{"@type":"Question","name":"How does the aim trainer work?","acceptedAnswer":{"@type":"Answer","text":"Targets appear one at a time at random positions. Click each target as fast as possible. A new target appears immediately after you hit one. Misses are counted but do not end the round."}},{"@type":"Question","name":"Does the aim trainer improve my gaming?","acceptedAnswer":{"@type":"Answer","text":"Yes. Regular practice with aim trainers improves hand-eye coordination, mouse precision and reaction time — useful for FPS games, MOBAs and any click-based gameplay."}},{"@type":"Question","name":"Can I use the aim trainer on mobile?","acceptedAnswer":{"@type":"Answer","text":"Yes. The trainer is fully touch-friendly — tap targets with your finger. It works on phones, tablets and desktops equally well."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="timer-bar" id="timerBar" style="display:none"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
    <div class="arena idle" id="arena"><span id="startText">Click to start</span></div>
    <div class="stats" id="stats"></div>
    <div class="tip">💡 <span id="tipText">Click targets as fast as you can. 30-second rounds.</span></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Aim Trainer',
    toolDesc: 'Test your clicking speed and accuracy. Hit targets as fast as you can in 30 seconds. Great warm-up for FPS gamers and a fun reflex challenge.',
    start: 'Click to start', ready: 'Get ready...', go: 'GO!', finished: 'Round complete!',
    targets: 'Targets', misses: 'Misses', accuracy: 'Accuracy', tps: 'Targets/sec',
    restart: 'Restart', difficulty: 'Difficulty', easy: 'Easy', normal: 'Normal', hard: 'Hard',
    timeLeft: 'Time left', seconds: 'seconds',
    tip: 'Click targets as fast as you can. 30-second rounds.',
    step1: 'Choose a difficulty and click the arena to start',
    step2: 'Click each red target as quickly as you can',
    step3: 'A new target appears instantly after each hit',
    step4: 'After 30 seconds, see your targets, accuracy and speed',
  },
  zh: {
    toolTitle: '瞄准训练器',
    toolDesc: '测试你的点击速度和精准度。30 秒内尽可能快地点击目标。适合 FPS 游戏玩家热身，也是有趣的反应挑战。',
    start: '点击开始', ready: '准备...', go: '开始！', finished: '回合结束！',
    targets: '命中', misses: '未命中', accuracy: '准确率', tps: '目标/秒',
    restart: '重新开始', difficulty: '难度', easy: '简单', normal: '普通', hard: '困难',
    timeLeft: '剩余时间', seconds: '秒',
    tip: '尽快点击目标。每回合 30 秒。',
    step1: '选择难度，点击区域开始',
    step2: '尽可能快地点击每个红色目标',
    step3: '每次命中后立即出现新目标',
    step4: '30 秒后查看你的命中数、准确率和速度',
  }
});

const { $, t } = GZ;
let playing = false;
let hits = 0, misses = 0;
let timeLeft = 30;
let timerInterval = null;
let diffSize = { easy: 70, normal: 54, hard: 38 };
let currentDiff = 'normal';

function startGame() {
  playing = true;
  hits = 0; misses = 0; timeLeft = 30;
  const arena = $('#arena');
  arena.className = 'arena';
  arena.innerHTML = '';
  $('#timerBar').style.display = '';
  $('#startText') && ($('#startText').textContent = '');
  spawnTarget();
  timerInterval = setInterval(() => {
    timeLeft -= 0.1;
    $('#timerFill').style.width = (timeLeft / 30 * 100) + '%';
    if (timeLeft <= 0) endGame();
  }, 100);
}

function endGame() {
  playing = false;
  clearInterval(timerInterval);
  const arena = $('#arena');
  arena.className = 'arena idle';
  arena.innerHTML = `<span>${t('finished')}</span>`;
  renderStats();
}

function spawnTarget() {
  const arena = $('#arena');
  const size = diffSize[currentDiff];
  const w = arena.clientWidth, h = arena.clientHeight;
  const x = Math.random() * (w - size - 10) + 5;
  const y = Math.random() * (h - size - 10) + 5;
  const el = document.createElement('div');
  el.className = 'target';
  el.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px`;
  el.onclick = (e) => { e.stopPropagation(); if(!playing)return; hits++; el.remove(); spawnTarget(); renderStats(); };
  arena.appendChild(el);
}

$('#arena').addEventListener('click', (e) => {
  if (!playing) { startGame(); return; }
  if (e.target.classList.contains('target')) return;
  misses++;
  renderStats();
});

function renderStats() {
  const total = hits + misses;
  const acc = total > 0 ? Math.round(hits / total * 100) : 0;
  const elapsed = 30 - timeLeft;
  const tps = elapsed > 0 ? (hits / elapsed).toFixed(2) : '0.00';
  $('#stats').innerHTML = `
    <div class="stat"><div class="num">${hits}</div><div class="lbl">${t('targets')}</div></div>
    <div class="stat"><div class="num">${misses}</div><div class="lbl">${t('misses')}</div></div>
    <div class="stat"><div class="num">${acc}%</div><div class="lbl">${t('accuracy')}</div></div>
    <div class="stat"><div class="num">${tps}</div><div class="lbl">${t('tps')}</div></div>
  `;
}

$('#toolbar').innerHTML = `
  <span style="font-size:.85em;color:var(--text2)">${t('difficulty')}:</span>
  <button class="gz-btn diff-btn ${currentDiff==='easy'?'active':''}" data-d="easy">${t('easy')}</button>
  <button class="gz-btn diff-btn ${currentDiff==='normal'?'active':''}" data-d="normal">${t('normal')}</button>
  <button class="gz-btn diff-btn ${currentDiff==='hard'?'active':''}" data-d="hard">${t('hard')}</button>
  <button class="gz-btn" onclick="endGameIfNeeded()">🔄 ${t('restart')}</button>
`;
document.querySelectorAll('.diff-btn').forEach(b => b.onclick = () => {
  currentDiff = b.dataset.d;
  document.querySelectorAll('.diff-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
});
function endGameIfNeeded(){ if(playing) endGame(); else { hits=0;misses=0;renderStats(); } }

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⚡', href:'/fun/reaction-time.html', name:'Reaction Time Test'},
    {icon:'🎯', href:'/fun/cps-test.html', name:'CPS Click Test'},
    {icon:'⌨️', href:'/fun/typing-test.html', name:'Typing Speed Test'},
    {icon:'🎮', href:'/fun/memory-game.html', name:'Memory Game'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
