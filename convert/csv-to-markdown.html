const { $, copyText, t } = GZ;

function detectDelimiter(text) {
  const firstLine = text.split('\n')[0];
  const counts = { ',': 0, '\t': 0, ';': 0, '|': 0 };
  for (const ch of firstLine) {
    if (counts.hasOwnProperty(ch)) counts[ch]++;
  }
  let best = ',', bestCount = 0;
  for (const [d, c] of Object.entries(counts)) {
    if (c > bestCount) { best = d; bestCount = c; }
  }
  return best;
}

function parseCSV(text, delim) {
  const lines = text.trim().split('\n');
  return lines.map(line => {
    const row = [];
    let cell = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuotes && line[i+1] === '"') { cell += '"'; i++; }
        else inQuotes = !inQuotes;
      } else if (ch === delim && !inQuotes) {
        row.push(cell.trim());
        cell = '';
      } else {
        cell += ch;
      }
    }
    row.push(cell.trim());
    return row;
  }).filter(row => row.some(c => c !== ''));
}

function toMarkdown(table) {
  if (!table.length) return '';
  const cols = Math.max(...table.map(r => r.length));
  const normalized = table.map(r => {
    while (r.length < cols) r.push('');
    return r;
  });

  const header = normalized[0];
  const separator = header.map(() => '---');
  const rows = normalized.slice(1);

  const widths = [];
  for (let c = 0; c < cols; c++) {
    let max = 3; // min width for ---
    for (const row of normalized) {
      max = Math.max(max, row[c].length);
    }
    widths.push(max);
  }

  function padRow(row) {
    return '| ' + row.map((cell, i) => cell.padEnd(widths[i])).join(' | ') + ' |';
  }

  const lines = [padRow(header), padRow(separator), ...rows.map(padRow)];
  return lines.join('\n');
}

function renderPreview(table) {
  if (!table.length) { $('#preview').innerHTML = ''; return; }
  let html = '<table><thead><tr>';
  const header = table[0];
  header.forEach(h => html += `<th>${escapeHtml(h)}</th>`);
  html += '</tr></thead><tbody>';
  for (let i = 1; i < table.length; i++) {
    html += '<tr>';
    table[i].forEach(c => html += `<td>${escapeHtml(c)}</td>`);
    html += '</tr>';
  }
  html += '</tbody></table>';
  $('#preview').innerHTML = html;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function doConvert() {
  const text = $('#input').value.trim();
  if (!text) { $('#output').textContent = ''; $('#preview').innerHTML = ''; return; }
  const delimSetting = $('#delimiter').value;
  const delim = delimSetting === 'auto' ? detectDelimiter(text) : delimSetting;
  const table = parseCSV(text, delim);
  const md = toMarkdown(table);
  $('#output').textContent = md;
  renderPreview(table);
}

$('#input').addEventListener('input', doConvert);
$('#delimiter').addEventListener('change', doConvert);

function loadExample() {
  $('#input').value = `Name,Age,City,Occupation

  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#preview').innerHTML = ''; }
