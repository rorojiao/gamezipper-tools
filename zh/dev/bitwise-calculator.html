<script>

  zh: {

    toolDesc: '对二进制、十进制和十六进制数字执行 AND、OR、XOR、NOT 和位移运算 — 实时显示所有进制结果和 32 位网格。',
    opA: '操作数 A',

    decimal: '十进制',
    hex: '十六进制',
    binary: '二进制',
    octal: '八进制',
    bits: '位（32 位）',
    result: '结果',
    reset: '重置',
    step1: '在十进制、十六进制或二进制输入操作数 A 和操作数 B',
    step2: '选择运算：AND、OR、XOR、NOT 或位移',
    step3: '同时查看十进制、十六进制、八进制和二进制结果',
    step4: '通过位网格看清每一位的翻转情况',
    invalidNum: '无效数字',
  }
});

const { $, t } = GZ;

// Parse a value in a given base; allow negative; return null if invalid.
function parseVal(str, base) {
  if (str == null) return null;
  let s = String(str).trim();
  if (s === '') return null;
  let neg = false;
  if (s[0] === '-') { neg = true; s = s.slice(1); }
  if (s === '') return null;
  // strip common prefixes
  if (base === 16) s = s.replace(/^0x/i, '');
  if (base === 2) s = s.replace(/^0b/i, '');
  if (s === '') return null;
  const re = base === 2 ? /^[01]+$/ : base === 8 ? /^[0-7]+$/ : base === 16 ? /^[0-9a-fA-F]+$/ : /^\d+$/;
  if (!re.test(s)) return null;
  const n = parseInt(s, base);
  if (isNaN(n)) return null;
  return neg ? -n : n;
}

function toUnsigned32(n) { return n >>> 0; }

function fmt(n, base, pad) {
  const u = toUnsigned32(n);
  let s = u.toString(base).toUpperCase();
  if (pad) s = s.padStart(pad, '0');
  return s;
}

function renderBits(container, n) {
  const u = toUnsigned32(n);
  let html = '';
  for (let i = 31; i >= 0; i--) {
    const bit = (u >>> i) & 1;
    const label = i % 4 === 0 ? String(i) : '';
    html += `<div class="bw-bit ${bit ? 'one' : 'zero'}" title="bit ${i}">${bit}</div>`;
  }
  container.innerHTML = html;
}

function syncOperand(op) {
  // Read whichever field changed is handled by listeners; this rebuilds the other fields + bits.
  const decEl = $('#dec-' + op), hexEl = $('#hex-' + op), binEl = $('#bin-' + op);
  // Determine source of truth: prefer decimal, then hex, then bin
  let n = parseVal(decEl.value, 10);
  let source = 10;
  if (n === null) { n = parseVal(hexEl.value, 16); source = 16; }
  if (n === null) { n = parseVal(binEl.value, 2); source = 2; }
  if (n === null) {
    $('#bits-' + op).innerHTML = '';
    return null;
  }
  // Sync the other fields
  if (source !== 10) decEl.value = n;
  if (source !== 16) hexEl.value = fmt(n, 16);
  if (source !== 2) binEl.value = fmt(n, 2);
  renderBits($('#bits-' + op), n);
  return n;
}

function compute() {
  const a = syncOperand('a');
  const b = syncOperand('b');
  const op = $('#operation').value;
  let r = null;
  if (a !== null) {
    if (op === 'not') r = ~a;
    else if (b !== null) {
      const sh = ((b % 32) + 32) % 32;
      switch (op) {
        case 'and': r = a & b; break;
        case 'or':  r = a | b; break;
        case 'xor': r = a ^ b; break;
        case 'shl': r = a << sh; break;
        case 'shr': r = a >> sh; break;
        case 'ushr': r = a >>> sh; break;
        case 'notb': r = ~b; break;
      }
    }
  }
  if (r === null) {
    ['#dec-r', '#hex-r', '#oct-r', '#bin-r'].forEach(s => $(s).textContent = '—');
    $('#bits-r').innerHTML = '';
    return;
  }
  $('#dec-r').textContent = toUnsigned32(r);
  $('#hex-r').textContent = '0x' + fmt(r, 16);
  $('#oct-r').textContent = '0' + fmt(r, 8);
  $('#bin-r').textContent = '0b' + fmt(r, 2);
  renderBits($('#bits-r'), r);
}

// Wire up inputs
['dec-a','hex-a','bin-a','dec-b','hex-b','bin-b'].forEach(id => {
  const el = $('#' + id);
  el.addEventListener('input', () => {
    const base = +el.dataset.base;
    const op = el.dataset.op;
    const n = parseVal(el.value, base);
    if (n !== null) {
      if (base !== 10) $('#dec-' + op).value = n;
      if (base !== 16) $('#hex-' + op).value = fmt(n, 16);
      if (base !== 2) $('#bin-' + op).value = fmt(n, 2);
      renderBits($('#bits-' + op), n);
    }
    compute();
  });
});
$('#operation').addEventListener('change', compute);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="resetBW()">↺ ${t('reset')}</button>`;

function resetBW() {
  $('#dec-a').value='12'; $('#hex-a').value='C'; $('#bin-a').value='1100';
  $('#dec-b').value='10'; $('#hex-b').value='A'; $('#bin-b').value='1010';
  $('#operation').value='and';
  compute();
}

compute();
