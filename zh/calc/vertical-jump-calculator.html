<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I measure my vertical jump at home?", "acceptedAnswer": {"@type": "Answer", "text": "Stand flat-footed and note the highest point you can reach (standing reach). Then jump as high as you can and mark the highest point you touch (jump reach). Your vertical jump is simply jump reach minus standing reach."}}, {"@type": "Question", "name": "What is a good vertical jump?", "acceptedAnswer": {"@type": "Answer", "text": "For men, 20–24 inches is average, 25–30 is good, 31–35 is excellent, and 36+ is elite (college/pro athlete territory). For women, averages run about 4–6 inches lower across the same tiers."}}, {"@type": "Question", "name": "How tall do you need to be to dunk?", "acceptedAnswer": {"@type": "Answer", "text": "A standard rim is 10 feet (120 inches) high. You typically need a jump reach of about 120–126 inches (6–12 inches above the rim to control the ball). This calculator shows your estimated dunk reach so you can see how close you are."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  <div class="gz-tool-area">

      <button id="unit-in" class="active" onclick="setUnit('in')">in</button>
      <button id="unit-cm" onclick="setUnit('cm')">cm</button>

    <div class="vj-inputs" id="inputs"></div>
    <div class="vj-result" id="result"></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Vertical Jump Calculator',
    toolDesc: 'Calculate your vertical jump height from standing reach and jump reach. See how you rank vs athletes, estimate dunk reach and rim clearance. Free, no signup.',
    standingReach: 'Standing reach (flat-footed)',
    jumpReach: 'Highest jump reach',
    gender: 'Gender',
    calculate: 'Calculate',
    clear: 'Clear',
    vertical: 'Vertical Jump',
    jumpReachOut: 'Jump Reach',
    dunkReach: 'Rim Clearance',
    aboveRim: 'above rim',
    belowRim: 'below rim',
    example: 'Example',
    elite: '🏆 Elite — pro/college athlete',
    excellent: '⭐ Excellent — well above average',
    good: '👍 Good — solid athlete',
    average: '🙂 Average',
    belowAvg: '💪 Below average — room to grow',
    step1: 'Set the unit to inches or centimeters',
    step2: 'Enter your standing reach (highest point you touch flat-footed)',
    step3: 'Enter your highest jump reach (highest point you touch when jumping)',
    step4: 'See your vertical jump, rating and rim clearance for dunking',
  },
  zh: {
    toolTitle: '纵跳高度计算器',
    toolDesc: '通过站立摸高和起跳摸高计算你的纵跳高度。对比运动员平均水平，估算扣篮摸高和距篮筐的差距。免费、无需注册。',
    standingReach: '站立摸高（平足）',
    jumpReach: '最高起跳摸高',
    gender: '性别',
    calculate: '计算',
    clear: '清空',
    vertical: '纵跳高度',
    jumpReachOut: '起跳摸高',
    dunkReach: '距篮筐',
    aboveRim: '高于篮筐',
    belowRim: '低于篮筐',
    example: '示例',
    elite: '🏆 精英 — 职业/大学运动员',
    excellent: '⭐ 优秀 — 远超平均水平',
    good: '👍 良好 — 实力不俗',
    average: '🙂 平均水平',
    belowAvg: '💪 低于平均 — 还有进步空间',
    step1: '选择英寸或厘米单位',
    step2: '输入站立摸高（平足时能摸到的最高点）',
    step3: '输入起跳摸高（跳起后能摸到的最高点）',
    step4: '查看纵跳高度、评级以及扣篮所需差距',
  }
});

const { $, copyText, t } = GZ;
let unit = 'in';
const RIM_IN = 120; // 10 feet

function setUnit(u) {
  unit = u;
  $('#unit-in').classList.toggle('active', u==='in');
  $('#unit-cm').classList.toggle('active', u==='cm');
  calc();
}

function buildInputs() {
  $('#inputs').innerHTML = `
    <label>${t('standingReach')}
      <input type="number" id="reach-standing" placeholder="${unit==='in'?'84':'213'}" oninput="calc()">
    </label>
    <label>${t('jumpReach')}
      <input type="number" id="reach-jump" placeholder="${unit==='in'?'108':'274'}" oninput="calc()">
    </label>
    <label>${t('gender')}
      <select id="gender" onchange="calc()">
        <option value="m">${unit==='in'?'Male':'男'}</option>
        <option value="f">${unit==='in'?'Female':'女'}</option>
      </select>
    </label>
    <label>&nbsp;
      <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
    </label>`;
}

function getThresholds(gender) {
  // returns [elite, excellent, good, average] in inches
  if (gender === 'f') return [30, 24, 20, 16];
  return [36, 31, 25, 20];
}

function rateJump(inches, gender) {
  const [elite, exc, good, avg] = getThresholds(gender);
  if (inches >= elite) return {cls:'vj-excellent', txt:t('elite')};
  if (inches >= exc)   return {cls:'vj-excellent', txt:t('excellent')};
  if (inches >= good)  return {cls:'vj-good', txt:t('good')};
  if (inches >= avg)   return {cls:'vj-average', txt:t('average')};
  return {cls:'vj-below', txt:t('belowAvg')};
}

function calc() {
  const s = parseFloat($('#reach-standing').value);
  const j = parseFloat($('#reach-jump').value);
  const gender = $('#gender').value;
  if (!s || !j || j <= s) { $('#result').innerHTML=''; $('#rating').textContent=''; return; }
  let jump = j - s; // in current unit
  const jumpIn = unit==='cm' ? jump/2.54 : jump;
  const {cls, txt} = rateJump(jumpIn, gender);
  const rimVal = unit==='cm' ? RIM_IN*2.54 : RIM_IN;
  const clearance = j - rimVal;
  const absC = Math.abs(clearance).toFixed(unit==='cm'?0:1);
  const dir = clearance >= 0 ? t('aboveRim') : t('belowRim');
  const jumpDisp = unit==='cm' ? jump.toFixed(0)+' cm' : jump.toFixed(1)+' in';
  const jreachDisp = unit==='cm' ? j.toFixed(0)+' cm' : j.toFixed(1)+' in';
  $('#result').innerHTML = `
    <div class="vj-card"><b>${jumpDisp}</b><span>${t('vertical')}</span></div>
    <div class="vj-card"><b>${jreachDisp}</b><span>${t('jumpReachOut')}</span></div>
    <div class="vj-card"><b>${absC} ${unit}</b><span>${t('dunkReach')} (${dir})</span></div>`;
  const r = $('#rating');
  r.className = 'vj-rating ' + cls;
  r.textContent = txt;
}

function loadExample() {
  const standing = unit==='in' ? 84 : 213;
  const jump = unit==='in' ? 108 : 274;
  $('#reach-standing').value = standing;
  $('#reach-jump').value = jump;
  calc();
}

buildInputs();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏃', href:'/calc/walking-pace-calculator.html', name:'Walking Pace'},
    {icon:'💪', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
    {icon:'⚖️', href:'/calc/ideal-weight.html', name:'Ideal Weight'},
    {icon:'🔥', href:'/calc/steps-to-calories.html', name:'Steps to Calories'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
