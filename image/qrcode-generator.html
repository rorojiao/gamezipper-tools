var TYPE_LABELS={url:'URL',text:'Text',wifi:'WiFi',email:'Email',phone:'Phone',sms:'SMS'};
var currentType='url';
var currentMatrix=null;

function buildTabs(){
  $('#typeTabs').innerHTML=['url','text','wifi','email','phone','sms'].map(function(ty){
    return '<button data-type="'+ty+'"'+(ty===currentType?' class="active"':'')+'>'+TYPE_LABELS[ty]+'</button>';
  }).join('');
  $('#typeTabs').querySelectorAll('button').forEach(function(b){
    b.onclick=function(){currentType=b.dataset.type;$('#typeTabs').querySelectorAll('button').forEach(function(x){x.classList.remove('active')});b.classList.add('active');renderFields();regenerate()};
  });
}

function escSvg(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function renderFields(){
  var f=$('#fields');var encOpts='<option value="WPA">WPA/WPA2</option><option value="WEP">WEP</option><option value="nopass">No Password</option>';
  if(currentType==='url'||currentType==='text'){
    f.innerHTML='<label id="lbl-input">'+(currentType==='url'?t('text')+' / URL':t('text'))+'</label><textarea id="qrText" rows="3" spellcheck="false">'+escDefault(currentType==='url'?'https://tools.gamezipper.com':'Hello World')+'</textarea>';
  }else if(currentType==='wifi'){
    f.innerHTML='<label>'+t('wifiSsid')+'</label><input type="text" id="wSsid" value="MyWiFi"><label style="margin-top:8px">'+t('wifiPass')+'</label><input type="text" id="wPass" value="password"><label style="margin-top:8px">'+t('wifiEnc')+'</label><select id="wEnc">'+encOpts+'</select>';
  }else if(currentType==='email'){
    f.innerHTML='<label>'+t('emailTo')+'</label><input type="text" id="eTo" value="hi@example.com"><label style="margin-top:8px">'+t('emailSub')+'</label><input type="text" id="eSub" value="Hello"><label style="margin-top:8px">'+t('emailBody')+'</label><textarea id="eBody" rows="2"></textarea>';
  }else if(currentType==='phone'){
    f.innerHTML='<label>'+t('phoneNum')+'</label><input type="text" id="pNum" value="+15551234567">';
  }else if(currentType==='sms'){
    f.innerHTML='<label>'+t('smsNum')+'</label><input type="text" id="sNum" value="+15551234567"><label style="margin-top:8px">'+t('smsMsg')+'</label><textarea id="sMsg" rows="2">Hi there</textarea>';
  }
  f.querySelectorAll('input,textarea,select').forEach(function(el){el.addEventListener('input',regenerate)});
}
function escDefault(s){return s.replace(/"/g,'&quot;')}

function buildPayload(){
  var val=$('#qrText');var v=val?val.value:'';
  if(currentType==='url'||currentType==='text'){return v}
  if(currentType==='wifi'){
    var ss=$('#wSsid').value;var pw=$('#wPass').value;var en=$('#wEnc').value;
    return'WIFI:T:'+en+';S:'+escapeWifi(ss)+';P:'+escapeWifi(pw)+';;';
  }
  if(currentType==='email'){
    var to=$('#eTo').value;var sub=encodeURIComponent($('#eSub').value);var body=encodeURIComponent($('#eBody').value);
    return'mailto:'+to+'?subject='+sub+'&body='+body;
  }
  if(currentType==='phone'){return'tel:'+$('#pNum').value.replace(/[^\+\d]/g,'')}
  if(currentType==='sms'){return'smsto:'+$('#sNum').value.replace(/[^\+\d]/g,'')+':'+$('#sMsg').value}
  return v;
}
function escapeWifi(s){return s.replace(/([\\;,:"])/g,'\\$1')}

            H:[7,14,24,34,44,60,66,86,98,119,137,155,177,194,220,250,280,310,338,382,403,439,461,511,545,596,628,661,701,745,793,845,901,961,986,1054,1096,1142,1222,1276]};

function regenerate(){
  var payload=buildPayload();
  if(!payload){$('#status').innerHTML='<span style="color:var(--accent)">'+(GZ.lang==='zh'?'请输入内容':'Please enter content')+'</span>';return}
  var bytes=utf8Bytes(payload);
  var ecLevel=$('#ec').value;
  var ecEnum=QR.QRErrorCorrectionLevel[ecLevel];
  var typeNum=pickTypeNumber(bytes.length,ecLevel);
  try{
    var qr=QR.QRCode(typeNum,ecEnum);qr.addData(bytes.map(function(b){return String.fromCharCode(b)}).join(''));qr.make();
    drawQr(qr);
    $('#status').innerHTML='<span style="color:var(--gz-success)">✓ '+(GZ.lang==='zh'?'二维码版本 '+typeNum+' · 数据 '+bytes.length+' 字节':'QR version '+typeNum+' · '+bytes.length+' bytes')+'</span>';
  }catch(e){$('#status').innerHTML='<span style="color:var(--accent)">'+e.message+'</span>'}
}

function drawQr(qr){
  var canvas=$('#canvas');var size=parseInt($('#size').value);canvas.width=size;canvas.height=size;
  var ctx=canvas.getContext('2d');var fg=$('#fgColor').value;var bg=$('#bgColor').value;
  ctx.fillStyle=bg;ctx.fillRect(0,0,size,size);ctx.fillStyle=fg;
  var count=qr.getModuleCount();var cell=size/count;
  for(var r=0;r<count;r++){for(var c=0;c<count;c++){if(qr.isDark(r,c)){ctx.fillRect(Math.floor(c*cell),Math.floor(r*cell),Math.ceil(cell),Math.ceil(cell))}}}
  currentMatrix=qr;
}

function downloadPng(){var canvas=$('#canvas');var link=document.createElement('a');link.download='qrcode.png';link.href=canvas.toDataURL('image/png');link.click()}
function downloadSvg(){
  if(!currentMatrix)return;var qr=currentMatrix;var count=qr.getModuleCount();var cell=10;var dim=count*cell;
  var fg=$('#fgColor').value;var bg=$('#bgColor').value;
  var rects='';
  for(var r=0;r<count;r++){for(var c=0;c<count;c++){if(qr.isDark(r,c)){rects+='<rect x="'+(c*cell)+'" y="'+(r*cell)+'" width="'+cell+'" height="'+cell+'"/>'}}}
  var svg='<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="'+dim+'" height="'+dim+'" viewBox="0 0 '+dim+' '+dim+'"><rect width="'+dim+'" height="'+dim+'" fill="'+bg+'"/><g fill="'+fg+'">'+rects+'</g></svg>';
  var blob=new Blob([svg],{type:'image/svg+xml'});var url=URL.createObjectURL(blob);var link=document.createElement('a');link.download='qrcode.svg';link.href=url;link.click();setTimeout(function(){URL.revokeObjectURL(url)},1000);
}

$('#btn-png').textContent=t('downloadPng');$('#btn-svg').textContent=t('downloadSvg');
$('#btn-png').onclick=downloadPng;$('#btn-svg').onclick=downloadSvg;

$('#lbl-type').textContent=t('type');
$('#lbl-fg').textContent=t('fgColor');$('#lbl-bg').textContent=t('bgColor');
$('#lbl-size').textContent=t('size');$('#lbl-ec').textContent=t('ec');

['fgColor','bgColor','size','ec'].forEach(function(id){$('#'+id).addEventListener('input',regenerate);$('#'+id).addEventListener('change',regenerate)});
