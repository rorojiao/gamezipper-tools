    okEnc: '✓ 编码成功', okDec: '✓ 解码成功',
    errEnc: '✗ 编码错误：', errDec: '✗ 无效的 Base64URL 输入',
    errUtf8: '✗ 解码后的字节不是有效的 UTF-8 文本',
    step1: '选择「编码」（文本 → Base64URL）或「解码」（Base64URL → 文本）',
    step2: '将输入粘贴到左侧文本框',
    step3: '结果立即出现：Base64URL、标准 Base64 和十六进制',

const { $, copyText, t } = GZ;
let mode = 'encode';

function bytesToB64(bytes) {
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}
function b64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}
function toB64Url(b64, pad) {
  let u = b64.replace(/\+/g, '-').replace(/\//g, '_');
  if (!pad) u = u.replace(/=+$/, '');
  return u;
}
function fromB64Url(u) {
  let s = u.replace(/-/g, '+').replace(/_/g, '/').replace(/\s+/g, '');
  while (s.length % 4) s += '=';
  return s;
}
function bytesToHex(bytes) {
  let h = '';
  for (let i = 0; i < bytes.length; i++) h += bytes[i].toString(16).padStart(2, '0');
  return h;
}

function setField(id, value) {
  const el = $('#' + id);
  if (!el) return;
  if (value === '' || value == null) { el.textContent = '—'; el.classList.add('empty'); }
  else { el.textContent = value; el.classList.remove('empty'); }
}

function run() {
  const input = $('#input').value;
  const pad = $('#pad').checked;
  const status = $('#status');
  if (input.trim() === '') {
    setField('b64url', ''); setField('b64std', ''); setField('hex', '');
    status.textContent = ''; status.className = 'bu-status';
    return;
  }
  if (mode === 'encode') {
    try {
      const bytes = Array.from(new TextEncoder().encode(input));
      const b64 = bytesToB64(bytes);
      setField('b64url', toB64Url(b64, pad));
      setField('b64std', b64);
      setField('hex', bytesToHex(bytes));
      status.textContent = t('okEnc'); status.className = 'bu-status ok';
    } catch (e) {
      setField('b64url', ''); setField('b64std', ''); setField('hex', '');
      status.textContent = t('errEnc') + e.message; status.className = 'bu-status err';
    }
  } else {
    try {
      const std = fromB64Url(input.trim());
      if (!/^[A-Za-z0-9+\/]*=*$/.test(std)) throw new Error('bad chars');
      const bytes = b64ToBytes(std);
      const hex = bytesToHex(bytes);
      let text;
      try { text = new TextDecoder('utf-8', { fatal: true }).decode(new Uint8Array(bytes)); }
      catch (e) { text = null; }
      setField('b64url', toB64Url(std, pad));
      setField('b64std', std);
      setField('hex', hex);
      status.textContent = text === null ? t('errUtf8') : (t('okDec') + (input.length > 40 ? '' : ''));
      status.className = 'bu-status ' + (text === null ? 'err' : 'ok');
    } catch (e) {
      setField('b64url', ''); setField('b64std', ''); setField('hex', '');
      status.textContent = t('errDec'); status.className = 'bu-status err';
    }
  }
}

function copyField(id) {
  const el = $('#' + id);
  if (el && !el.classList.contains('empty')) copyText(el.textContent);
}

function setMode(m) {
  mode = m;
  $('#btn-encode').classList.toggle('active', m === 'encode');
  $('#btn-decode').classList.toggle('active', m === 'decode');
  $('#lbl-input').textContent = m === 'encode' ? t('lblInputEnc') : t('lblInputDec');
  run();
}

function loadExample() {
  if (mode === 'encode') {
    $('#input').value = 'Hello, GameZipper! 🚀 — JWTs use Base64URL.';
  } else {
    $('#input').value = 'SGVsbG8sIEdhbWVaaXBwZXIhIPCfmoAg4oCUIEpXVHMgdXNlIEJhc2U2NFVSTC4';
  }
  run();
}

function doClear() { $('#input').value = ''; run(); }

// localise buttons
$('#btn-encode').textContent = t('encode');
$('#btn-decode').textContent = t('decode');
$('#lbl-pad').textContent = t('lblPad');
$('#lbl-live').textContent = t('lblLive');
$('#lbl-input').textContent = t('lblInputEnc');

$('#input').addEventListener('input', () => { if ($('#live').checked) run(); });
$('#pad').addEventListener('change', run);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="run()">${t('encode')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyField('b64url')">${t('copy')}</button>
