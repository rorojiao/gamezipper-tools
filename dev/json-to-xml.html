const { $, copyText, t } = GZ;

// Sanitize a key into a valid XML element name
function sanitizeName(key, isItem) {
  if (isItem) return 'item';
  let n = String(key);
  // Replace illegal chars with underscore
  n = n.replace(/[^a-zA-Z0-9_\-.]/g, '_');
  // Must start with letter or underscore
  if (!/^[a-zA-Z_]/.test(n)) n = '_' + n;
  return n;
}

function singularize(name) {
  if (name.endsWith('ies')) return name.slice(0, -3) + 'y';
  if (name.endsWith('ses') || name.endsWith('xes') || name.endsWith('zes')) return name.slice(0, -2);
  if (name.endsWith('s') && !name.endsWith('ss')) return name.slice(0, -1);
  return name;
}

function escapeXml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}

function toXml(value, key, indent, mode, depth) {
  const pad = '  '.repeat(depth);
  const tag = sanitizeName(key, false);

  if (value === null || value === undefined) {
    return `${pad}<${tag} null="true"/>`;
  }
  if (Array.isArray(value)) {
    if (mode === 'inline' || value.length === 0) {
      // Repeat the tag for each item
      return value.map(v => toXml(v, key, indent, mode, depth)).join('\n');
    }
    // Wrapper mode: <key><item>...</item></key>
    const child = singularize(tag);
    const inner = value.map(v => {
      if (v === null || v === undefined) return `${pad}  <${child} null="true"/>`;
      if (typeof v === 'object') {
        // For object items, render their fields inside the child element
        const body = renderObjectBody(v, indent, mode, depth + 1);
        return `${pad}  <${child}>\n${body}\n${pad}  </${child}>`;
      }
      return `${pad}  <${child}>${escapeXml(v)}</${child}>`;
    }).join('\n');
    return `${pad}<${tag}>\n${inner}\n${pad}</${tag}>`;
  }
  if (typeof value === 'object') {
    const body = renderObjectBody(value, indent, mode, depth + 1);
    return `${pad}<${tag}>\n${body}\n${pad}</${tag}>`;
  }
  // primitive
  return `${pad}<${tag}>${escapeXml(value)}</${tag}>`;
}

function renderObjectBody(obj, indent, mode, depth) {
  const pad = '  '.repeat(depth);
  const parts = [];
  for (const k of Object.keys(obj)) {
    parts.push(toXml(obj[k], k, indent, mode, depth));
  }
  return parts.join('\n');
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').value=''; $('#status').textContent=''; return; }
  let obj;
  try {
    obj = JSON.parse(inp);
  } catch (e) {
    $('#status').className = 'jx-status err';
    $('#status').textContent = t('invalid') + e.message;
    $('#output').value = '';
    return;
  }
  const root = $('#rootName').value.trim() || 'root';
  const mode = $('#arrayMode').value;
  const pretty = $('#prettyCheck').checked;
  const decl = $('#declaration').checked;

  let body;
  if (Array.isArray(obj)) {
    // Wrap a top-level array in the root element
    const child = singularize(sanitizeName(root));
    const inner = obj.map(v => {
      if (typeof v === 'object' && v !== null) {
        const b = renderObjectBody(v, pretty ? '  ' : '', mode, 2);
        return `  <${child}>\n${b}\n  </${child}>`;
      }
      return `  <${child}>${escapeXml(v)}</${child}>`;
    }).join('\n');
    body = `<${sanitizeName(root)}>\n${inner}\n</${sanitizeName(root)}>`;
  } else if (typeof obj === 'object' && obj !== null) {
    const inner = renderObjectBody(obj, pretty ? '  ' : '', mode, 1);
    body = `<${sanitizeName(root)}>\n${inner}\n</${sanitizeName(root)}>`;
  } else {
    body = `<${sanitizeName(root)}>${escapeXml(obj)}</${sanitizeName(root)}>`;
  }

  const out = (decl ? '<?xml version="1.0" encoding="UTF-8"?>\n' : '') + body;
  $('#output').value = out;
  $('#status').className = 'jx-status ok';
  $('#status').textContent = t('valid');
}

      tags: []
    }
  }, null, 2);
  convert();
}
