<script>
GZI18n.register({
  en: {
    toolTitle: 'Days Since Calculator',
    toolDesc: 'Count the exact days, weeks, months and years since any date. Track milestones, habits, anniversaries, and project duration. Free, instant, private.',
    dateLabel: 'Start date (past)',
    bigDays: 'days',
    weeks: 'weeks',
    months: 'months',
    years: 'years',
    hours: 'hours',
    minutes: 'minutes',
    businessDays: 'business days (approx)',
    nextMilestone: 'Next round milestone',
    dayOfWeek: 'Start date was a',
    today: 'Today',
    step1: 'Pick the start date using the date picker above',
    step2: 'Use a preset for common intervals (1 week, 30 days, etc.)',
    step3: 'See the total days, plus weeks, months, years, hours, minutes',
    step4: 'Track habits, anniversaries, project duration, and milestones',
  },
  zh: {
    toolTitle: '天数计算器（距今天数）',
    toolDesc: '计算距离任意日期的精确天数、周数、月数和年数。追踪里程碑、习惯、纪念日和项目时长。免费、即时、隐私安全。',
    dateLabel: '起始日期（过去）',
    bigDays: '天',
    weeks: '周',
    months: '月',
    years: '年',
    hours: '小时',
    minutes: '分钟',
    businessDays: '工作日（约）',
    nextMilestone: '下一个整数里程碑',
    dayOfWeek: '起始日期是星期',
    today: '今天',
    step1: '使用上方日期选择器选择起始日期',
    step2: '使用预设按钮快速选择常见间隔（1 周、30 天等）',
    step3: '查看总天数，以及周数、月数、年数、小时、分钟',
    step4: '追踪习惯、纪念日、项目时长和里程碑',
  }
});

const { $, t } = GZ;
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAYS_ZH = ['日','一','二','三','四','五','六'];

function fmt(n) { return n.toLocaleString(); }

function calc() {
  const v = $('#startDate').value;
  if (!v) { $('#result').style.display = 'none'; return; }
  const start = new Date(v + 'T00:00:00');
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const startMid = new Date(start.getFullYear(), start.getMonth(), start.getDate());
  const ms = today - startMid;
  if (ms < 0) { $('#result').style.display = 'none'; return; }
  const totalDays = Math.floor(ms / 86400000);
  const totalHours = Math.floor(ms / 3600000);
  const totalMins = Math.floor(ms / 60000);
  const weeks = Math.floor(totalDays / 7);
  const businessDays = Math.floor(totalDays * 5 / 7);
  // years/months
  let y = today.getFullYear() - start.getFullYear();
  let m = today.getMonth() - start.getMonth();
  let d = today.getDate() - start.getDate();
  if (d < 0) { m--; const prev = new Date(today.getFullYear(), today.getMonth(), 0); d += prev.getDate(); }
  if (m < 0) { y--; m += 12; }
  const months = y * 12 + m;
  const lang = GZI18n.get ? (GZI18n.get() || 'en') : 'en';
  const dayName = lang === 'zh' ? '星期' + DAYS_ZH[start.getDay()] : DAYS[start.getDay()];

  // next milestone
  const milestones = [100, 365, 500, 1000, 2000, 3650];
  const nextMs = milestones.find(n => n > totalDays);
  const msInfo = nextMs ? `${nextMs - totalDays} ${t('bigDays')} → ${nextMs}` : '—';

  $('#bigResult').textContent = fmt(totalDays);
  $('#subResult').textContent = t('bigDays') + ' ' + t('today').toLowerCase();
  $('#grid').innerHTML = [
    {num: fmt(weeks), lbl: t('weeks')},
    {num: fmt(months), lbl: t('months')},
    {num: y, lbl: t('years')},
    {num: fmt(totalHours), lbl: t('hours')},
    {num: fmt(totalMins), lbl: t('minutes')},
    {num: fmt(businessDays), lbl: t('businessDays')},
  ].map(c => `<div class="ds-tile"><div class="num">${c.num}</div><div class="lbl">${c.lbl}</div></div>`).join('');
  $('#extra').innerHTML = `
    <div class="ds-row"><span class="lbl">${t('dayOfWeek')}</span><span class="val">${dayName}</span></div>
    <div class="ds-row"><span class="lbl">${t('nextMilestone')}</span><span class="val">${msInfo}</span></div>`;
  $('#result').style.display = 'block';
}

const presets = [
  {label: '7 days ago', days: 7},
  {label: '30 days ago', days: 30},
  {label: '90 days ago', days: 90},
  {label: '180 days ago', days: 180},
  {label: '1 year ago', days: 365},
  {label: 'New Year', special: 'ny'},
];
$('#presets').innerHTML = presets.map((p, i) => `<button class="ds-preset" data-i="${i}">${p.label}</button>`).join('');
$('#presets').addEventListener('click', e => {
  const btn = e.target.closest('.ds-preset'); if (!btn) return;
  const p = presets[+btn.dataset.i];
  const d = new Date();
  if (p.special === 'ny') {
    d.setFullYear(d.getFullYear(), 0, 1);
  } else {
    d.setDate(d.getDate() - p.days);
  }
  $('#startDate').value = d.toISOString().slice(0, 10);
  calc();
});

$('#lbl-date').textContent = t('dateLabel');
$('#startDate').addEventListener('change', calc);
// default to 30 days ago
const def = new Date(); def.setDate(def.getDate() - 30);
$('#startDate').value = def.toISOString().slice(0, 10);
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'🎂', href:'/calc/age-calculator.html', name:'Age Calculator'},
    {icon:'⏰', href:'/calc/countdown.html', name:'Countdown'},
    {icon:'⏳', href:'/calc/days-until.html', name:'Days Until'},
  ]
});
</script>
