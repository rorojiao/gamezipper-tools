<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate watts?", "acceptedAnswer": {"@type": "Answer", "text": "Watts = Volts × Amps (P = V × I). You can also calculate from resistance: P = V²/R or P = I²×R. For AC circuits, multiply by the power factor."}}, {"@type": "Question", "name": "What is the difference between watts and watt-hours?", "acceptedAnswer": {"@type": "Answer", "text": "Watts measure power (rate of energy use). Watt-hours (Wh) measure energy consumed over time. A 100W device running for 5 hours uses 500 Wh (0.5 kWh)."}}, {"@type": "Question", "name": "What is power factor?", "acceptedAnswer": {"@type": "Answer", "text": "Power factor is the ratio of real power to apparent power in AC circuits. It ranges from 0 to 1. Purely resistive loads (heaters) have PF=1. Motors and electronics typically have PF=0.6-0.9."}}, {"@type": "Question", "name": "How do I estimate electricity cost?", "acceptedAnswer": {"@type": "Answer", "text": "Cost = (Watts × Hours used per day × Days) / 1000 × Rate per kWh. For example, a 100W bulb running 8 hours/day at $0.12/kWh costs about $2.88/month."}}]}</script>

GZI18n.register({

    toolDesc:'从电压和电流计算瓦特数，或使用欧姆定律和功率公式查找任意缺失值。包含电费估算。',
    voltage:'电压 (V)',
    current:'电流 (A)',
    resistance:'电阻 (Ω)',
    power:'功率 (W)',
    circuitType:'电路类型',
    dc:'直流电（DC）',
    ac:'交流电（AC）',
    powerFactor:'功率因数 (0-1)',
    pfHint:'纯电阻负载（加热器、白炽灯）使用 1.0',
    calculate:'计算',
    clear:'清除',
    results:'计算结果',
    voltageVal:'电压',
    currentValue:'电流',
    resistanceVal:'电阻',
    powerVal:'功率',
    energyCost:'电费估算',
    hoursPerDay:'每天小时数',
    daysPerMonth:'每月天数',
    ratePerKwh:'电价（$/kWh）',
    monthlyCost:'月费用',
    yearlyCost:'年费用',
    dailyEnergy:'日能耗',
    formulas:'使用公式',
    formulaHint:'输入电压、电流、电阻或功率中的任意两个已知值来计算其余值。',
    step1:'输入任意两个已知值（V、I、R 或 P）',
    step2:'选择直流或交流电路类型',
    step3:'点击计算得出所有值',
    step4:'可选：估算电费成本',
  }
});

const { $, t } = GZ;

$('#form').innerHTML = `
  <div class="row">
    <div><label>${t('voltage')}</label><input type="number" id="voltage" min="0" step="0.01" placeholder="e.g. 120"></div>
    <div><label>${t('current')}</label><input type="number" id="current" min="0" step="0.01" placeholder="e.g. 5"></div>
  </div>
  <div class="row">
    <div><label>${t('resistance')}</label><input type="number" id="resistance" min="0" step="0.01" placeholder="e.g. 24"></div>
    <div><label>${t('power')}</label><input type="number" id="power" min="0" step="0.01" placeholder="e.g. 600"></div>
  </div>
  <div class="row">
    <div><label>${t('circuitType')}</label><select id="circuitType" onchange="togglePF()"><option value="dc">${t('dc')}</option><option value="ac">${t('ac')}</option></select></div>
    <div id="pfGroup" style="display:none"><label>${t('powerFactor')}</label><input type="number" id="pf" value="0.85" min="0.1" max="1" step="0.01"><div class="hint">${t('pfHint')}</div></div>
  </div>
  <div class="row">
    <button class="gz-btn" onclick="calculate()">${t('calculate')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>
  </div>
  <div style="font-size:.82em;color:var(--text2);text-align:center">${t('formulaHint')}</div>
`;

function togglePF() {
  $('#pfGroup').style.display = $('#circuitType').value === 'ac' ? '' : 'none';
}

function clearAll() {
  $('#voltage').value = '';
  $('#current').value = '';
  $('#resistance').value = '';
  $('#power').value = '';
  $('#results').innerHTML = '';
}

function val(id) { const v = parseFloat(document.getElementById(id).value); return isNaN(v) || v <= 0 ? null : v; }

function calculate() {
  let V = val('voltage');
  let I = val('current');
  let R = val('resistance');
  let P = val('power');
  const isAC = $('#circuitType').value === 'ac';
  const pf = isAC ? (parseFloat($('#pf').value) || 0.85) : 1;

  let known = [V !== null, I !== null, R !== null, P !== null].filter(Boolean).length;
  if (known < 2) { alert('Please enter at least 2 values.'); return; }

  // Calculate missing values using Ohm's Law: V=IR, P=VI, P=V²/R, P=I²R
  // With power factor for AC: P_real = V * I * PF
  const solve = () => {
    // If we have V and I
    if (V !== null && I !== null) {
      R = V / I;
      P = V * I * pf;
    }
    // If we have V and R
    else if (V !== null && R !== null) {
      I = V / R;
      P = V * I * pf;
    }
    // If we have V and P
    else if (V !== null && P !== null) {
      I = P / (V * pf);
      R = V / I;
    }
    // If we have I and R
    else if (I !== null && R !== null) {
      V = I * R;
      P = V * I * pf;
    }
    // If we have I and P
    else if (I !== null && P !== null) {
      V = P / (I * pf);
      R = V / I;
    }
    // If we have R and P
    else if (R !== null && P !== null) {
      // P = V²*pf/R → V = sqrt(P*R/pf)
      V = Math.sqrt(P * R / pf);
      I = V / R;
    }
  };
  solve();

  // Also compute apparent power for AC
  const apparentPower = isAC ? V * I : null;

  const fmt = (n, d=4) => {
    if (n >= 1000000) return (n/1000000).toFixed(2) + ' M';
    if (n >= 1000) return (n/1000).toFixed(2) + ' k';
    return n.toFixed(d > 2 ? 2 : d);
  };

  let formulaHTML = `<div class="formula-box"><h3>${t('formulas')}</h3>`;
  formulaHTML += `P = V × I${isAC ? ' × PF' : ''} = ${V.toFixed(2)} × ${I.toFixed(4)}${isAC ? ' × ' + pf : ''} = <strong>${P.toFixed(2)} W</strong><br>`;
  formulaHTML += `V = I × R = ${I.toFixed(4)} × ${R.toFixed(4)} = <strong>${V.toFixed(2)} V</strong><br>`;
  formulaHTML += `I = V / R = ${V.toFixed(2)} / ${R.toFixed(4)} = <strong>${I.toFixed(4)} A</strong><br>`;
  formulaHTML += `R = V / I = ${V.toFixed(2)} / ${I.toFixed(4)} = <strong>${R.toFixed(4)} Ω</strong>`;
  if (isAC && apparentPower) {
    formulaHTML += `<br>S (apparent) = V × I = <strong>${apparentPower.toFixed(2)} VA</strong>`;
  }
  formulaHTML += '</div>';

  let costHTML = `<div class="cost-section"><h3>${t('energyCost')}</h3>
    <div class="row">
      <div><label>${t('hoursPerDay')}</label><input type="number" id="costHours" value="8" min="0" max="24" step="0.5"></div>
      <div><label>${t('daysPerMonth')}</label><input type="number" id="costDays" value="30" min="1" max="31"></div>
    </div>
    <div><label>${t('ratePerKwh')}</label><input type="number" id="costRate" value="0.12" min="0" step="0.01"></div>
    <div class="row" style="margin-top:10px">
      <div class="res-card"><div class="val" id="monthlyCostVal">-</div><div class="lbl">${t('monthlyCost')}</div></div>
      <div class="res-card"><div class="val" id="yearlyCostVal">-</div><div class="lbl">${t('yearlyCost')}</div></div>
    </div>
    <div style="text-align:center;margin-top:8px;font-size:.85em;color:var(--text2)">${t('dailyEnergy')}: <span id="dailyEnergyVal">-</span></div>
  </div>`;

  $('#results').innerHTML = `
    <div class="results-grid">
      <div class="res-card"><div class="val">${fmt(V)} V</div><div class="lbl">${t('voltageVal')}</div></div>
      <div class="res-card"><div class="val">${fmt(I)} A</div><div class="lbl">${t('currentValue')}</div></div>
      <div class="res-card"><div class="val">${fmt(R)} Ω</div><div class="lbl">${t('resistanceVal')}</div></div>
      <div class="res-card"><div class="val">${fmt(P)} W</div><div class="lbl">${t('powerVal')}</div></div>
    </div>
    ${formulaHTML}
    ${costHTML}
  `;

  // Cost calculator
  const updateCost = () => {
    const hrs = parseFloat($('#costHours').value) || 0;
    const days = parseFloat($('#costDays').value) || 30;
    const rate = parseFloat($('#costRate').value) || 0;
    const dailyWh = P * hrs;
    const monthlyKwh = dailyWh * days / 1000;
    const yearlyKwh = dailyWh * 365 / 1000;
    $('#monthlyCostVal').textContent = '$' + (monthlyKwh * rate).toFixed(2);
    $('#yearlyCostVal').textContent = '$' + (yearlyKwh * rate).toFixed(2);
    $('#dailyEnergyVal').textContent = (dailyWh / 1000).toFixed(3) + ' kWh';
  };
  updateCost();
  ['costHours','costDays','costRate'].forEach(id => {
    document.getElementById(id).addEventListener('input', updateCost);
  });
}

GZ.renderToolPage({

  titleKey: 'toolTitle',

    {icon:'💡', href:'/calc/led-resistor.html', name:'LED Resistor Calculator'},
    {icon:'🔋', href:'/calc/battery-calculator.html', name:'Battery Calculator'},
  ]
});
</script>
