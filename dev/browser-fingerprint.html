    navigator: '🖥️ 导航器',
    screen: '📱 屏幕与显示',
    hardware: '🔧 硬件',
    network: '🌐 网络',
    webgl: '🎮 WebGL',
    audio: '🔊 音频',

const { $, t } = GZ;

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function row(label, value) {
  return `<div class="fp-row"><span class="fp-label">${label}</span><span class="fp-value">${value ?? 'N/A'}</span></div>`;
}

function getWebGL() {
  try {
    const c = document.createElement('canvas');
    const gl = c.getContext('webgl') || c.getContext('experimental-webgl');
    if (!gl) return {};
    const dbg = gl.getExtension('WEBGL_debug_renderer_info');
    return {
      vendor: dbg ? gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL) : gl.getParameter(gl.VENDOR),
      renderer: dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER),
      version: gl.getParameter(gl.VERSION),
      shadingLang: gl.getParameter(gl.SHADING_LANGUAGE_VERSION),
      maxTexSize: gl.getParameter(gl.MAX_TEXTURE_SIZE),
      maxViewport: gl.getParameter(gl.MAX_VIEWPORT_DIMS).join(' × '),
    };
  } catch(e) { return {}; }
}

function getCanvasHash() {
  try {
    const c = document.createElement('canvas'); c.width=200; c.height=50;
    const ctx = c.getContext('2d');
    ctx.textBaseline='top'; ctx.font='14px Arial'; ctx.fillStyle='#f60';
    ctx.fillRect(0,0,200,50); ctx.fillStyle='#069';
    ctx.fillText('BrowserFP🧬',2,15); ctx.fillStyle='rgba(102,204,0,0.7)';
    ctx.fillText('Test 🔍',4,30);
    return c.toDataURL().slice(-40);
  } catch(e) { return 'N/A'; }
}

async function getAudioHash() {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ac.createOscillator(); const ana = ac.createAnalyser();
    const comp = ac.createDynamicsCompressor();
    osc.type='triangle'; osc.frequency.value=10000;
    osc.connect(comp); comp.connect(ana); ana.connect(ac.destination);
    osc.start(0);
    const data = new Float32Array(ana.frequencyBinCount);
    ana.getFloatFrequencyData(data);
    osc.stop(); ac.close();
    return data.slice(0,10).map(d=>d.toFixed(2)).join(',');
  } catch(e) { return 'N/A'; }
}

async function scan() {
  const fpData = [];
  $('#fingerprint-hash').innerHTML = `<span style="opacity:.7">${t('scanning')}</span>`;

  const n = navigator;
  const s = screen;
  const gl = getWebGL();

  // Navigator card
  let navRows = row('User-Agent', n.userAgent) + row('Platform', n.platform) + row('Language', n.language) +
    row('Languages', n.languages?.join(', ')) + row('Cookie Enabled', n.cookieEnabled) +
    row('Do Not Track', n.doNotTrack) + row('PDF Viewer', n.pdfViewerEnabled) +
    row('Max Touch Points', n.maxTouchPoints) + row('Vendor', n.vendor);
  fpData.push('navigator' + navRows);

  // Screen card
  let scrRows = row('Resolution', `${s.width} × ${s.height}`) + row('Available', `${s.availWidth} × ${s.availHeight}`) +
    row('Color Depth', s.colorDepth + ' bit') + row('Pixel Depth', s.pixelDepth + ' bit') +
    row('Device Pixel Ratio', window.devicePixelRatio) + row('Orientation', screen.orientation?.type) +
    row('HDR', matchMedia('(dynamic-range: high)').matches ? 'Yes' : 'No') +
    row('Dark Mode', matchMedia('(prefers-color-scheme: dark)').matches ? 'Yes' : 'No') +
    row('Reduced Motion', matchMedia('(prefers-reduced-motion: reduce)').matches ? 'Yes' : 'No');
  fpData.push('screen' + scrRows);

  // Hardware card
  let hwRows = row('CPU Cores', n.hardwareConcurrency) + row('Device Memory', n.deviceMemory ? n.deviceMemory + ' GB' : 'N/A') +
    row('GPU Vendor', gl.vendor || 'N/A') + row('GPU Renderer', gl.renderer || 'N/A') +
    row('WebGL Version', gl.version || 'N/A') + row('Max Texture Size', gl.maxTexSize || 'N/A') +
    row('Max Viewport', gl.maxViewport || 'N/A');
  fpData.push('hardware' + hwRows);

  // Network card
  let netRows = row('Online', n.onLine ? 'Yes' : 'No') + row('Connection', n.connection?.effectiveType || 'N/A') +
    row('Downlink', n.connection?.downlink ? n.connection.downlink + ' Mbps' : 'N/A') +
    row('RTT', n.connection?.rtt ? n.connection.rtt + ' ms' : 'N/A') +
    row('Save Data', n.connection?.saveData ? 'Yes' : 'No');
  fpData.push('network' + netRows);

  // WebGL card
  let glRows = row('Vendor', gl.vendor || 'N/A') + row('Renderer', gl.renderer || 'N/A') +
    row('Version', gl.version || 'N/A') + row('Shading Language', gl.shadingLang || 'N/A') +
    row('Canvas Hash', getCanvasHash());
  fpData.push('webgl' + glRows);

  // Audio card
  let audioHash = await getAudioHash();
  let audRows = row('AudioContext', typeof AudioContext !== 'undefined' ? 'Supported' : 'N/A') +
    row('Audio Fingerprint', audioHash);
  fpData.push('audio' + audRows);

  // Timezone card
  let tzRows = row('Timezone', Intl.DateTimeFormat().resolvedOptions().timeZone) +
    row('UTC Offset', `UTC${new Date().getTimezoneOffset() > 0 ? '-' : '+'}${Math.abs(new Date().getTimezoneOffset()/60)}`) +
    row('Locale', Intl.DateTimeFormat().resolvedOptions().locale) +
    row('Calendar', Intl.DateTimeFormat().resolvedOptions().calendar) +
    row('Numbering System', Intl.DateTimeFormat().resolvedOptions().numberingSystem) +
    row('Date Format', new Intl.DateTimeFormat(n.language, {dateStyle:'full'}).format(new Date()));
  fpData.push('timezone' + tzRows);

  // Storage card
  let stRows = row('LocalStorage', (() => { try { localStorage.setItem('_fp','1'); localStorage.removeItem('_fp'); return 'Yes'; } catch(e) { return 'No'; }})()) +
    row('SessionStorage', (() => { try { sessionStorage.setItem('_fp','1'); sessionStorage.removeItem('_fp'); return 'Yes'; } catch(e) { return 'No'; }})()) +
    row('IndexedDB', typeof indexedDB !== 'undefined' ? 'Yes' : 'No') +
    row('Web Workers', typeof Worker !== 'undefined' ? 'Yes' : 'No') +
    row('Service Workers', 'serviceWorker' in navigator ? 'Yes' : 'No') +
    row('WebRTC', typeof RTCPeerConnection !== 'undefined' ? 'Yes' : 'No') +
    row('WebSocket', typeof WebSocket !== 'undefined' ? 'Yes' : 'No') +
    row('WebAssembly', typeof WebAssembly !== 'undefined' ? 'Yes' : 'No') +
    row('SharedArrayBuffer', typeof SharedArrayBuffer !== 'undefined' ? 'Yes' : 'No');
  fpData.push('storage' + stRows);

  // Canvas card
  let canRows = row('2D Context', document.createElement('canvas').getContext('2d') ? 'Yes' : 'No') +
    row('WebGL', document.createElement('canvas').getContext('webgl') ? 'Yes' : 'No') +
    row('WebGL2', document.createElement('canvas').getContext('webgl2') ? 'Yes' : 'No') +
    row('BitmapRenderer', typeof createImageBitmap !== 'undefined' ? 'Yes' : 'No');
  fpData.push('canvas' + canRows);

  // Render
  $('#result').innerHTML = fpData.map(d => {
    const key = d.match(/^[a-z]+/)[0];
    const body = d.replace(/^[a-z]+/, '');
    return `<div class="fp-card"><h3>${t(key)}</h3>${body}</div>`;
  }).join('');

  // Hash
  const hash = await sha256(fpData.join('|'));
  $('#fingerprint-hash').innerHTML = `<div style="opacity:.7;margin-bottom:6px">${t('fpHash')}</div>${hash}`;
}

scan();

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="scan()">🔄 ${t('convert') || 'Rescan'}</button>`;

  ]
});
</script>
