}

const { $, t } = GZ;

const STOP = new Set('a an the and or but if while for of in on at to from with by is are was were be been being have has had do does did this that these those it its i you we they he she my our your their as not no so very much many some any all can could will would should may might about into over after before between up down out off'.split(' '));

const PREFIXES_EN = {
general: ['how to', 'best', 'top', 'guide to', 'tips for', 'review of'],
tutorial: ['how to', 'tutorial', 'learn', 'beginner guide', 'step by step', 'crash course'],
review: ['review', 'honest review', 'is it worth', 'compared', 'pros and cons'],
vlog: ['vlog', 'day in the life', 'daily vlog', 'behind the scenes'],
gaming: ['gameplay', 'walkthrough', 'let\'s play', 'speedrun', 'no commentary', 'guide'],
tech: ['tutorial', 'code', 'programming', 'developer', 'open source', 'github'],
cooking: ['recipe', 'easy recipe', 'homemade', 'how to cook', 'best recipe'],
fitness: ['workout', 'exercise', 'training', 'fitness tips', 'home workout'],
travel: ['travel vlog', 'travel guide', 'things to do', 'best places', 'tour'],
beauty: ['makeup tutorial', 'tutorial', 'routine', 'review', 'tips'],
business: ['business tips', 'how to start', 'strategy', 'entrepreneur', 'money'],
music: ['music video', 'official video', 'lyrics', 'cover', 'remix', 'live performance'],
};

const PREFIXES_ZH = {
general: ['怎么', '如何', '最好的', '推荐', '教程'],
tutorial: ['教程', '入门', '怎么用', '学习', '零基础'],
review: ['评测', '测评', '对比', '怎么样', '值得买吗'],
vlog: ['vlog', '日常', '记录'],
gaming: ['攻略', '通关', '实况', '解说', '教程'],
tech: ['教程', '代码', '开发', '程序员', '开源'],
cooking: ['食谱', '做法', '家常', '简单', '教程'],
fitness: ['训练', '健身', '动作', '教程', '计划'],
travel: ['旅游', '攻略', '景点', '推荐', 'vlog'],
beauty: ['教程', '化妆', '护肤', '推荐', '分享'],
business: ['创业', '教程', '经验', '分享', '方法'],
music: ['MV', '歌词', '翻唱', '现场', '版'],
};

function getPrefixes(niche) {
  const lang = (typeof GZ !== 'undefined' && GZ.t ? (document.documentElement.lang || 'en') : 'en');
  const map = lang === 'zh' ? PREFIXES_ZH : PREFIXES_EN;
  return map[niche] || map.general;
}

function isCJK(s) { return /[\u3400-\u9FFF]/.test(s); }
function tokenize(text) {
  if (isCJK(text)) {
    // For CJK, return 2-3 char n-grams as "words"
    const cleaned = text.replace(/[^\u3400-\u9FFF\w\s]/g, ' ').replace(/\s+/g, ' ').trim();
    const tokens = [];
    // unigrams + bigrams
    const chars = cleaned.replace(/ /g, '').split('');
    for (let i = 0; i < chars.length; i++) tokens.push(chars[i]);
    for (let i = 0; i < chars.length - 1; i++) tokens.push(chars[i] + chars[i + 1]);
    return tokens.filter(t => t.length >= 1 && t.length <= 8);
  }
  return text.toLowerCase().replace(/[^\w\s]/g, ' ').split(/\s+/).filter(t => t.length >= 3 && !STOP.has(t));
}

function genTags() {
  const title = $('#videoTitle').value.trim();
  const desc = $('#input').value.trim();
  const niche = $('#niche').value;
  const max = Math.min(30, Math.max(1, +$('#maxTags').value || 15));
  const year = $('#yearMode').value === '2026' ? '2026' : null;
  const prefixes = getPrefixes(niche);

  const combined = (title + ' ' + desc).trim();
  if (!combined) { renderTags([]); return; }

  // Extract keywords
  const tokens = tokenize(combined);
  const freq = {};
  for (const t of tokens) freq[t] = (freq[t] || 0) + 1;
  const topKw = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 6).map(([w]) => w);

  const tags = new Set();
  // Raw tokens
  for (const k of topKw) tags.add(k);
  // Title variations
  if (title) {
    tags.add(title.toLowerCase());
    // Short title (first 4 words)
    const shortTitle = title.split(/\s+/).slice(0, 4).join(' ').toLowerCase();
    if (shortTitle !== title.toLowerCase()) tags.add(shortTitle);
  }
  // Prefix combos
  for (const p of prefixes.slice(0, 3)) {
    for (const k of topKw.slice(0, 3)) {
      const tag = `${p} ${k}`.trim();
      if (tag.length <= 50) tags.add(tag);
    }
  }
  // Year + top keyword
  if (year) {
    for (const k of topKw.slice(0, 2)) tags.add(`${k} ${year}`);
  }
  // Trending suffixes
  const suffixes = ['tutorial', 'guide', 'tips', 'how to', 'free', 'online', 'best'];
  for (const k of topKw.slice(0, 2)) {
    for (const s of suffixes.slice(0, 2)) {
      const tag = `${k} ${s}`;
      if (tag.length <= 50) tags.add(tag);
    }
  }
  // Niche generic
  if (niche !== 'general') {
    tags.add(niche);
    tags.add(`${niche} 2026`);
  }

  // Cap to 500 chars
  const out = [];
  let total = 0;
  for (const t of tags) {
    if (out.length >= max) break;
    const addition = (out.length ? ', ' : '') + t;
    if (total + addition.length > 500) break;
    out.push(t);
    total += addition.length;
  }
  renderTags(out);
}

function renderTags(list) {
  $('#output').textContent = list.join(', ');
  const len = list.join(', ').length;
  const cc = $('#charCount');
  cc.textContent = `${len} / 500`;
  cc.classList.toggle('over', len > 500);
  const chips = $('#chips');
  chips.innerHTML = list.map((t, i) => `<span class="chip">${t.replace(/</g,'&lt;')} <button data-i="${i}" title="Remove">×</button></span>`).join('');
  chips.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = +btn.dataset.i;
      const cur = $('#output').textContent.split(', ').filter(Boolean);
      cur.splice(i, 1);
      renderTags(cur);
    });
  });
}

['videoTitle','input','niche','maxTags','yearMode'].forEach(id => {
  $('#' + id).addEventListener('input', genTags);
  $('#' + id).addEventListener('change', genTags);
});

function doCopy() { GZ.copyText($('#output').textContent); }
function doClear() { $('#videoTitle').value = ''; $('#input').value = ''; renderTags([]); $('#charCount').textContent = '0 / 500'; }
function loadExample() { $('#niche').value = 'tutorial'; $('#videoTitle').value = 'How to learn React in 30 days'; $('#input').value = 'In this React tutorial for beginners, I will show you a complete 30 day roadmap to learn React from zero. We will cover JSX, components, hooks, state management and build a real project. Perfect for web developers who want to learn modern frontend.'; genTags(); }
