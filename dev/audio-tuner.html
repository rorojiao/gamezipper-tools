<script>
GZI18n.register({
  en: {

    toolDesc: 'Detect the pitch of any sound with your microphone and tune guitar, bass, ukulele, violin, voice and more. Real-time note, frequency and cents offset — 100% in your browser.',

    reference: 'Reference notes (click to highlight)',

    inTune: 'In tune',

    sharp: 'Too high (sharp) — loosen the string',

  },
  zh: {

    toolDesc: '用麦克风检测任意声音的音高，可为吉他、贝斯、尤克里里、小提琴、人声等调音。实时显示音符、频率和音分偏差 — 100% 浏览器本地运行。',
    note: '检测到的音符',
    reference: '参考音符（点击高亮）',
    start: '启动调音器',
    stop: '停止',
    statusReady: '点击「启动调音器」并演奏一个音符',
    statusListening: '监听中… 请演奏清晰、持续的音符',
    statusError: '麦克风被拒绝或不可用',
    inTune: '音准',
    flat: '偏低 — 请拧紧琴弦',
    sharp: '偏高 — 请放松琴弦',
    step1: '点击「启动调音器」并允许麦克风权限',
    step2: '靠近麦克风演奏一个清晰、持续的音符',
    step3: '读取音符名称、频率和音分偏差',
    step4: '调整乐器，直到指针居中显示 0（绿色）',
  }
});

const { $, t } = GZ;
let stream = null, audioCtx = null, analyser = null, source = null, rafId = null;

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
// Common instrument reference notes (open strings / frets)
const REFS = [
  { label: 'Guitar E2 (low E)', freq: 82.41 },
  { label: 'Guitar A2', freq: 110.00 },
  { label: 'Guitar D3', freq: 146.83 },
  { label: 'Guitar G3', freq: 196.00 },
  { label: 'Guitar B3', freq: 246.94 },
  { label: 'Guitar E4 (high E)', freq: 329.63 },
  { label: 'Bass E1', freq: 41.20 },
  { label: 'Bass A1', freq: 55.00 },
  { label: 'Bass D2', freq: 73.42 },
  { label: 'Bass G2', freq: 98.00 },
  { label: 'Ukulele G4', freq: 392.00 },
  { label: 'Ukulele C4', freq: 261.63 },
  { label: 'Ukulele E4', freq: 329.63 },
  { label: 'Ukulele A4', freq: 440.00 },
  { label: 'Violin G3', freq: 196.00 },
  { label: 'Violin D4', freq: 293.66 },
  { label: 'Violin A4', freq: 440.00 },
  { label: 'Violin E5', freq: 659.25 },
];

function freqToNote(freq) {
  // A4 = 440 Hz is MIDI 69
  const midi = Math.round(69 + 12 * Math.log2(freq / 440));
  const cents = Math.round((69 + 12 * Math.log2(freq / 440) - midi) * 100);
  const name = NOTE_NAMES[((midi % 12) + 12) % 12];
  const oct = Math.floor(midi / 12) - 1;
  const ideal = 440 * Math.pow(2, (midi - 69) / 12);
  return { name, oct, cents, ideal };
}

const startBtn = $('#startBtn');
const stopBtn = $('#stopBtn');
const statusEl = $('#status');
const statusTextEl = $('#statusText');
const pulseEl = $('#pulse');
const deviceSelect = $('#deviceSelect');
const meter = $('#meter');

startBtn.textContent = t('start');
stopBtn.textContent = t('stop');
$('#lblNote').textContent = t('note');
$('#lblRef').textContent = t('reference');

// Reference list
$('#refList').innerHTML = REFS.map((r, i) =>
  `<li onclick="highlightRef(${i})" data-idx="${i}"><b>${r.label}</b> — ${r.freq.toFixed(2)} Hz</li>`
).join('');

window.highlightRef = function(idx) {
  document.querySelectorAll('#refList li').forEach((li, i) => {
    li.style.color = i === idx ? 'var(--accent)' : '';
    li.style.fontWeight = i === idx ? '700' : '';
  });
};

setStatus('statusReady', 'at-warn');

function setStatus(key, cls) {
  statusEl.className = 'at-status show ' + cls;
  statusEl.textContent = t(key);
  statusTextEl.textContent = t(key);
}

async function listDevices() {
  try {
    const list = await navigator.mediaDevices.enumerateDevices();
    const mics = list.filter(d => d.kind === 'audioinput');
    deviceSelect.innerHTML = mics.map((d, i) => `<option value="${d.deviceId}">${d.label || ('Mic ' + (i + 1))}</option>`).join('');
  } catch (e) {}
}

async function start() {
  try {
    const constraints = {
      audio: {
        deviceId: deviceSelect.value ? { exact: deviceSelect.value } : undefined,
        echoCancellation: false, noiseSuppression: false, autoGainControl: false
      }
    };
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    source.connect(analyser);

    startBtn.disabled = true;
    stopBtn.disabled = false;
    setStatus('statusListening', 'at-ok');
    pulseEl.classList.add('active');
    listDevices();
    detectLoop();
  } catch (e) {
    setStatus('statusError', 'at-err');
  }
}

// Autocorrelation pitch detection (ACF2+ — biased ACF with parabolic interpolation)
function autoCorrelate(buf, sampleRate) {
  const SIZE = buf.length;
  let rms = 0;
  for (let i = 0; i < SIZE; i++) { const v = (buf[i] - 128) / 128; rms += v * v; }
  rms = Math.sqrt(rms / SIZE);
  if (rms < 0.01) return -1; // too quiet

  // Trim silence at the edges
  let r1 = 0, r2 = SIZE - 1;
  const thres = 0.2;
  for (let i = 0; i < SIZE / 2; i++) {
    if (Math.abs((buf[i] - 128) / 128) < thres) { r1 = i; break; }
  }
  for (let i = 1; i < SIZE / 2; i++) {
    if (Math.abs((buf[SIZE - i] - 128) / 128) < thres) { r2 = SIZE - i; break; }
  }
  const buf2 = buf.slice(r1, r2);
  const N = buf2.length;
  if (N < 4) return -1;

  const c = new Array(N).fill(0);
  for (let lag = 0; lag < N; lag++) {
    for (let i = 0; i < N - lag; i++) {
      c[lag] += ((buf2[i] - 128) / 128) * ((buf2[i + lag] - 128) / 128);
    }
  }
  // Walk back from the start to find the first valley, then the next peak
  let d = 0;
  while (d < N - 1 && c[d] > c[d + 1]) d++;
  let maxval = -1, maxpos = -1;
  for (let i = d; i < N; i++) {
    if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
  }
  let T0 = maxpos;
  if (T0 <= 0) return -1;

  // Parabolic interpolation for sub-sample accuracy
  const x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1] !== undefined ? c[T0 + 1] : c[T0];
  const a = (x1 + x3 - 2 * x2) / 2;
  const b = (x3 - x1) / 2;
  if (a) T0 = T0 - b / (2 * a);

  return sampleRate / T0;
}

function detectLoop() {
  if (!analyser) return;
  const buf = new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(buf);
  const freq = autoCorrelate(buf, audioCtx.sampleRate);

  if (freq > 30 && freq < 2000) {
    const info = freqToNote(freq);
    $('#noteName').textContent = info.name;
    $('#noteOct').textContent = info.oct;
    $('#freq').textContent = freq.toFixed(2);
    const c = Math.max(-50, Math.min(50, info.cents));
    $('#centsNum').textContent = (c >= 0 ? '+' : '') + c + '¢';
    // meter: bar grows from center; negative extends left, positive extends right
    const halfPct = Math.abs(c) / 50 * 50; // 0..50%
    if (c < 0) {
      meter.style.transform = `translateX(-${halfPct}%)`;
      meter.style.width = halfPct + '%';
      meter.classList.remove('at-in-tune');
      meter.style.color = '#3b82f6';
    } else if (c > 0) {
      meter.style.transform = 'translateX(0)';
      meter.style.width = halfPct + '%';
      meter.style.color = '#ef4444';
    } else {
      meter.style.transform = 'translateX(0)';
      meter.style.width = '2%';
      meter.style.color = '#10b981';
    }
    const color = Math.abs(c) < 5 ? 'at-in-tune' : (c < 0 ? 'at-flat' : 'at-sharp');
    $('#centsNum').className = 'at-cents-num ' + color;
  }
  rafId = requestAnimationFrame(detectLoop);
}

function stop() {
  if (stream) stream.getTracks().forEach(tr => tr.stop());
  stream = null;
  if (rafId) cancelAnimationFrame(rafId);
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  startBtn.disabled = false;
  stopBtn.disabled = true;
  pulseEl.classList.remove('active');
  meter.style.width = '0%';
  setStatus('statusReady', 'at-warn');
}

startBtn.addEventListener('click', start);
stopBtn.addEventListener('click', stop);
deviceSelect.addEventListener('change', () => { if (stream) { stop(); start(); } });
if (navigator.mediaDevices) listDevices();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎚️', href:'/dev/decibel-meter.html', name:'Decibel Meter'},
    {icon:'📊', href:'/dev/spectrogram.html', name:'Spectrogram'},
    {icon:'🎶', href:'/dev/bpm-detector.html', name:'BPM Detector'},
    {icon:'🎸', href:'/fun/guitar-tuner.html', name:'Guitar Tuner'},
  ]
});
</script>
