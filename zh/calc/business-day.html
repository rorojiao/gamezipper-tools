</style>

<script type="application/ld+json">{"@context":"https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do you count business days between two dates?", "acceptedAnswer": {"@type": "Answer", "text": "Enter a start date and an end date, then click Calculate. The tool counts all weekdays (Monday-Friday) in that range and subtracts any holidays you have configured. The result shows business days, calendar days, weeks, weekends, and holidays in the range."}}, {"@type": "Question", "name": "What is considered a business day?", "acceptedAnswer": {"@type": "Answer", "text": "A business day (or working day) is a Monday through Friday that is not a public holiday. Different countries and organizations have different holidays, so this tool lets you customize the holiday list per use case."}}, {"@type": "Question", "name": "How do you add N business days to a date?", "acceptedAnswer": {"@type": "Answer", "text": "Open the Add Business Days tab, enter a starting date and a number of business days, then click Calculate. The tool will skip weekends and any holidays you have configured to land on the correct business day."}}, {"@type": "Question", "name": "Is Saturday a business day?", "acceptedAnswer": {"@type": "Answer", "text": "By default, no. Most countries treat Saturday and Sunday as non-working days. If you work in a region where Saturday is a working day (for example, parts of the Middle East), you can use the weekend selector to change the weekend days to Friday-Saturday."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="tabs">
      <button class="tab active" data-tab="between">⇄ <span data-tab-label="between"></span></button>
      <button class="tab" data-tab="add">+ <span data-tab-label="add"></span></button>
      <button class="tab" data-tab="holidays">📅 <span data-tab-label="holidays"></span></button>
    </div>

    <div class="panel" id="panel-between">
      <div class="row">
        <div class="field"><label data-i18n="from"></label><input type="date" id="fromDate"></div>
        <div class="field"><label data-i18n="to"></label><input type="date" id="toDate"></div>
        <div class="field"><label data-i18n="weekend"></label>
          <select id="weekend">
            <option value="0,6" selected>Sat-Sun (Western)</option>
            <option value="5,6">Fri-Sat (Middle East)</option>
            <option value="0,5">Fri-Sun (weekend 2 days)</option>
            <option value="4,5">Thu-Fri (some regions)</option>
            <option value="">No weekend (all 7 days)</option>
          </select>
        </div>
      </div>
      <div class="result" id="res-between"></div>
    </div>

    <div class="panel" id="panel-add" style="display:none">
      <div class="row">
        <div class="field"><label data-i18n="startDate"></label><input type="date" id="addStart"></div>
        <div class="field"><label data-i18n="addDays"></label><input type="number" id="addDays" value="10" step="1"></div>
      </div>
      <div class="result" id="res-add"></div>
    </div>

    <div class="panel" id="panel-holidays" style="display:none">
      <div class="row">
        <div class="field"><label data-i18n="addHoliday"></label><input type="date" id="holDate"></div>
        <div class="field"><label data-i18n="holidayName"></label><input type="text" id="holName" data-i18n-ph="namePlaceholder"></div>
        <div class="field" style="justify-content:flex-end"><button class="gz-btn" id="addHolBtn">+ <span data-i18n="addHoliday"></span></button></div>
      </div>
      <div class="preset-btns">
        <button class="preset-btn" data-preset="us">🇺🇸 US 2026</button>
        <button class="preset-btn" data-preset="cn">🇨🇳 CN 2026</button>
        <button class="preset-btn" data-preset="uk">🇬🇧 UK 2026</button>
        <button class="preset-btn" data-preset="clear">🗑 <span data-i18n="clear"></span></button>
      </div>
      <div class="holiday-list" id="holidayList"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Business Day Calculator',
    toolDesc: 'Count working days between two dates, add or subtract business days, and configure public holidays. Excludes weekends automatically.',
    between: 'Between Dates',
    add: 'Add / Subtract',
    holidays: 'Holidays',
    from: 'From date',
    to: 'To date',
    weekend: 'Weekend days',
    startDate: 'Start date',
    addDays: 'Business days',
    addHoliday: 'Add holiday',
    holidayName: 'Holiday name',
    clear: 'Clear',
    step1: 'Choose a tab — Between Dates, Add/Subtract, or Holidays',
    step2: 'For counting, enter a start and end date, optionally set weekend days',
    step3: 'For adding, enter a start date and a positive or negative number of business days',
    step4: 'Optionally add public holidays on the Holidays tab so they are excluded',
    businessDays: 'Business days',
    calendarDays: 'Calendar days',
    weeks: 'Weeks',
    weekends: 'Weekend days',
    holidaysIn: 'Holidays in range',
    resultDate: 'Resulting date',
    workDaysForward: 'business days later',
    workDaysBack: 'business days earlier',
    namePlaceholder: 'e.g. New Year',
  },
  zh: {
    toolTitle: '工作日计算器',
    toolDesc: '计算两个日期之间的工作日，加减工作日，并配置公共假期。自动排除周末。',
    between: '日期之间',
    add: '加减',
    holidays: '假期',
    from: '起始日期',
    to: '结束日期',
    weekend: '周末',
    startDate: '起始日期',
    addDays: '工作日数',
    addHoliday: '添加假期',
    holidayName: '假期名称',
    clear: '清空',
    step1: '选择标签页 — 日期之间 / 加减 / 假期',
    step2: '计算时输入起止日期，可设置周末日',
    step3: '加时输入起始日期和正负工作日数',
    step4: '可在「假期」页添加公共假期并自动排除',
    businessDays: '工作日',
    calendarDays: '日历日',
    weeks: '周数',
    weekends: '周末日',
    holidaysIn: '区间内假期',
    resultDate: '结果日期',
    workDaysForward: '个工作日后',
    workDaysBack: '个工作日前',
    namePlaceholder: '例如：元旦',
  }
});

document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = GZ.t(el.dataset.i18n));
document.querySelectorAll('[data-i18n-ph]').forEach(el => el.placeholder = GZ.t(el.dataset.i18nPh));
Object.entries({between:'between', add:'add', holidays:'holidays'}).forEach(([k,v]) => {
  const el = document.querySelector(`[data-tab-label="${k}"]`);
  if (el) el.textContent = GZ.t(v);
});
const { $, t } = GZ;

let holidays = []; // [{date: 'YYYY-MM-DD', name: '...'}]

// Pre-fill today's date
const today = new Date();
const todayStr = today.toISOString().slice(0,10);
$('#fromDate').value = todayStr;
$('#toDate').value = (() => { const d = new Date(today); d.setDate(d.getDate() + 30); return d.toISOString().slice(0,10); })();
$('#addStart').value = todayStr;

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
    document.getElementById('panel-' + btn.dataset.tab).style.display = 'block';
  });
});

['#fromDate','#toDate','#weekend','#addStart','#addDays'].forEach(s => $(s).addEventListener('input', () => { calcBetween(); calcAdd(); }));
$('#addHolBtn').onclick = () => {
  const d = $('#holDate').value, n = $('#holName').value || 'Holiday';
  if (!d) return;
  if (!holidays.find(h => h.date === d)) {
    holidays.push({date: d, name: n});
    holidays.sort((a,b) => a.date.localeCompare(b.date));
    renderHolidays();
  }
  $('#holDate').value = ''; $('#holName').value = '';
};
document.querySelectorAll('[data-preset]').forEach(btn => {
  btn.addEventListener('click', () => {
    const k = btn.dataset.preset;
    if (k === 'clear') { holidays = []; renderHolidays(); return; }
    const map = {
      us: [{d:'2026-01-01',n:'New Year'},{d:'2026-01-19',n:'MLK Day'},{d:'2026-02-16',n:'Presidents Day'},{d:'2026-05-25',n:'Memorial Day'},{d:'2026-07-04',n:'Independence Day'},{d:'2026-09-07',n:'Labor Day'},{d:'2026-10-12',n:'Columbus Day'},{d:'2026-11-11',n:'Veterans Day'},{d:'2026-11-26',n:'Thanksgiving'},{d:'2026-12-25',n:'Christmas'}],
      cn: [{d:'2026-01-01',n:'元旦'},{d:'2026-02-17',n:'春节'},{d:'2026-04-05',n:'清明节'},{d:'2026-05-01',n:'劳动节'},{d:'2026-06-19',n:'端午节'},{d:'2026-09-25',n:'中秋节'},{d:'2026-10-01',n:'国庆节'}],
      uk: [{d:'2026-01-01',n:'New Year'},{d:'2026-04-03',n:'Good Friday'},{d:'2026-04-06',n:'Easter Monday'},{d:'2026-05-04',n:'Early May Bank Holiday'},{d:'2026-05-25',n:'Spring Bank Holiday'},{d:'2026-08-31',n:'Summer Bank Holiday'},{d:'2026-12-25',n:'Christmas'},{d:'2026-12-28',n:'Boxing Day'}]
    };
    holidays = map[k].map(x => ({date: x.d, name: x.n}));
    renderHolidays();
  });
});

function renderHolidays() {
  const html = holidays.length ? holidays.map((h,i) => `<div class="holiday-row"><span>${h.date}</span><span>${h.name}</span><button class="gz-btn gz-btn-secondary" style="padding:2px 8px;font-size:.75em" data-i="${i}">×</button></div>`).join('') : '<div style="opacity:.6;text-align:center;padding:1rem">— no holidays —</div>';
  $('#holidayList').innerHTML = html;
  $('#holidayList').querySelectorAll('button[data-i]').forEach(b => b.onclick = () => { holidays.splice(+b.dataset.i, 1); renderHolidays(); });
  calcBetween(); calcAdd();
}

function isWeekend(d, weekend) {
  const day = d.getDay();
  return weekend.split(',').map(Number).includes(day);
}

function businessBetween(start, end, weekend) {
  if (end < start) return businessBetween(end, start, weekend);
  let biz = 0, cal = 0, we = 0, hC = 0;
  const holidaySet = new Set(holidays.map(h => h.date));
  for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
    cal++;
    if (isWeekend(d, weekend)) we++;
    else if (holidaySet.has(d.toISOString().slice(0,10))) hC++;
    else biz++;
  }
  return {biz, cal, we, hC};
}

function calcBetween() {
  const a = new Date($('#fromDate').value);
  const b = new Date($('#toDate').value);
  if (isNaN(a) || isNaN(b)) return;
  const weekend = $('#weekend').value;
  const r = businessBetween(a, b, weekend);
  const weeks = (r.cal / 7).toFixed(2);
  $('#res-between').innerHTML = `
    <div class="result-line"><span>${t('businessDays')}</span><b>${r.biz}</b></div>
    <div class="result-line"><span>${t('calendarDays')}</span><b>${r.cal}</b></div>
    <div class="result-line"><span>${t('weeks')}</span><b>${weeks}</b></div>
    <div class="result-line"><span>${t('weekends')}</span><b>${r.we}</b></div>
    <div class="result-line"><span>${t('holidaysIn')}</span><b>${r.hC}</b></div>
  `;
}

function addBusinessDays(start, n, weekend) {
  const d = new Date(start);
  const dir = n >= 0 ? 1 : -1;
  let remaining = Math.abs(n);
  const holidaySet = new Set(holidays.map(h => h.date));
  while (remaining > 0) {
    d.setDate(d.getDate() + dir);
    if (!isWeekend(d, weekend) && !holidaySet.has(d.toISOString().slice(0,10))) remaining--;
  }
  return d;
}

function calcAdd() {
  const start = new Date($('#addStart').value);
  const n = +$('#addDays').value || 0;
  if (isNaN(start)) return;
  const weekend = $('#weekend').value;
  const res = addBusinessDays(start, n, weekend);
  const label = n >= 0 ? t('workDaysForward') : t('workDaysBack');
  $('#res-add').innerHTML = `
    <div class="result-line"><span>${t('startDate')}</span><b>${start.toISOString().slice(0,10)} (${start.toDateString().split(' ').slice(0,3).join(' ')})</b></div>
    <div class="result-line"><span>${Math.abs(n)} ${label}</span></div>
    <div class="result-line"><span>${t('resultDate')}</span><b>${res.toISOString().slice(0,10)} (${res.toDateString().split(' ').slice(0,3).join(' ')})</b></div>
  `;
}

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'⏰', href:'/calc/hours-calculator.html', name:'Hours Calculator'},
    {icon:'⏱️', href:'/calc/time-calculator.html', name:'Time Calculator'},
    {icon:'🌍', href:'/convert/timezone.html', name:'Time Zone'},
  ]
});
calcBetween(); calcAdd();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
