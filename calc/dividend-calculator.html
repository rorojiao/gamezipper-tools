<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-input-group">
      <div class="gz-field"><label id="lbl-price"></label><input type="number" id="stock-price" value="150" min="0" step="0.01"></div>
      <div class="gz-field"><label id="lbl-dps"></label><input type="number" id="dps" value="4.50" min="0" step="0.01"></div>
      <div class="gz-field"><label id="lbl-shares"></label><input type="number" id="shares" value="100" min="0" step="1"></div>
      <div class="gz-field"><label id="lbl-freq"></label><select id="freq"><option value="4">Quarterly (4x/year)</option><option value="12">Monthly (12x/year)</option><option value="2">Semi-Annual (2x/year)</option><option value="1">Annual (1x/year)</option></select></div>
      <div class="gz-field"><label id="lbl-years"></label><input type="number" id="years" value="10" min="1" max="50" step="1"></div>
      <div class="gz-field"><label id="lbl-growth"></label><input type="number" id="growth" value="5" min="0" step="0.1"></div>
    </div>

    <button class="gz-btn gz-btn-secondary" onclick="resetForm()"></button>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Dividend Calculator',
    toolDesc: 'Calculate dividend yield, annual income, and DRIP compounding returns. Project your passive income over time.',
    lblPrice: 'Stock Price ($)',
    lblDps: 'Annual Dividend / Share ($)',
    lblShares: 'Number of Shares',
    lblFreq: 'Dividend Frequency',
    lblYears: 'Projection Period (years)',
    lblGrowth: 'Annual Dividend Growth (%)',
    lblDrip: 'Enable DRIP (reinvest dividends)',
    btnCalc: 'Calculate',
    btnReset: 'Reset',
    yieldPct: 'Dividend Yield',
    annualIncome: 'Annual Income',
    monthlyIncome: 'Monthly Income',
    totalDividends: 'Total Dividends',
    endShares: 'End Shares',
    endValue: 'Portfolio Value',
    year: 'Year',
    dividend: 'Dividend',
    cumDiv: 'Cumulative',
    sharesHeld: 'Shares',
    step1: 'Enter the stock price and annual dividend per share',
    step2: 'Enter how many shares you own',
    step3: 'Set dividend growth rate and enable DRIP if desired',
    step4: 'Click Calculate to see your income projection',
  },
  zh: {
    toolTitle: '股息计算器',
    toolDesc: '计算股息收益率、年度收入和 DRIP 复利回报，预测你的被动收入。',
    lblPrice: '股票价格（美元）',
    lblDps: '每股年度股息（美元）',
    lblShares: '持有股数',
    lblFreq: '派息频率',
    lblYears: '预测年数',
    lblGrowth: '年度股息增长率（%）',
    lblDrip: '启用 DRIP（股息再投资）',
    btnCalc: '计算',
    btnReset: '重置',
    yieldPct: '股息收益率',
    annualIncome: '年度收入',
    monthlyIncome: '月均收入',
    totalDividends: '总股息收入',
    endShares: '期末股数',
    endValue: '投资组合价值',
    year: '年份',
    dividend: '股息',
    cumDiv: '累计',
    sharesHeld: '持有股数',
    step1: '输入股票价格和每股年度股息',
    step2: '输入你持有的股数',
    step3: '设置股息增长率和是否启用 DRIP',
    step4: '点击计算查看收入预测',
  }
});

const { $, t } = GZ;

$('#lbl-price').textContent = t('lblPrice');
$('#lbl-dps').textContent = t('lblDps');
$('#lbl-shares').textContent = t('lblShares');
$('#lbl-freq').textContent = t('lblFreq');
$('#lbl-years').textContent = t('lblYears');
$('#lbl-growth').textContent = t('lblGrowth');
$('#lbl-drip').textContent = t('lblDrip');

function fmt(n) { return '$' + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function pct(n) { return n.toFixed(2) + '%'; }

function calc() {
  const price = parseFloat($('#stock-price').value) || 0;
  const dps = parseFloat($('#dps').value) || 0;
  const shares = parseFloat($('#shares').value) || 0;
  const years = parseInt($('#years').value) || 10;
  const growth = parseFloat($('#growth').value) || 0;
  const useDRIP = $('#drip').checked;

  if (price <= 0 || dps <= 0 || shares <= 0) return;

  const yieldPct = dps / price * 100;
  const initialAnnual = dps * shares;

  // Simulate year by year
  const data = [];
  let s = shares, cumDiv = 0, currentDps = dps;

  for (let y = 1; y <= years; y++) {
    const annualDiv = s * currentDps;
    cumDiv += annualDiv;
    if (useDRIP) {
      const newShares = annualDiv / price;
      s += newShares;
    }
    data.push({year: y, dividend: annualDiv, cumDiv, shares: s});
    currentDps *= (1 + growth / 100);
  }

  const endShares = s;
  const endValue = endShares * price;

  $('#summary').innerHTML = `
    <div class="s-card"><div class="val">${pct(yieldPct)}</div><div class="lbl">${t('yieldPct')}</div></div>
    <div class="s-card"><div class="val">${fmt(initialAnnual)}</div><div class="lbl">${t('annualIncome')}</div></div>
    <div class="s-card"><div class="val">${fmt(initialAnnual/12)}</div><div class="lbl">${t('monthlyIncome')}</div></div>
    <div class="s-card"><div class="val">${fmt(cumDiv)}</div><div class="lbl">${t('totalDividends')}</div></div>
    ${useDRIP ? `<div class="s-card"><div class="val">${Math.floor(endShares).toLocaleString()}</div><div class="lbl">${t('endShares')}</div></div>` : ''}
    ${useDRIP ? `<div class="s-card"><div class="val">${fmt(endValue)}</div><div class="lbl">${t('endValue')}</div></div>` : ''}
  `;

  // Draw chart
  const canvas = $('#chart');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const pad = {top:30,right:20,bottom:30,left:70};
  ctx.clearRect(0,0,W,H);

  const style = getComputedStyle(document.body);
  const fg = style.getPropertyValue('--gz-fg').trim()||'#e0e0e0';
  const acc = style.getPropertyValue('--gz-accent').trim()||'#4ecdc4';
  const bg = style.getPropertyValue('--gz-bg').trim()||'#0a0a1a';
  const border = style.getPropertyValue('--gz-border').trim()||'#333';

  const maxCum = cumDiv;
  const maxY = useDRIP ? Math.max(endValue, maxCum) : maxCum;

  function px(v) { return pad.left + (v / years) * (W - pad.left - pad.right); }
  function py2(v) { return pad.top + (1 - v / maxY) * (H - pad.top - pad.bottom); }

  // Grid
  ctx.strokeStyle = border; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + i * (H - pad.top - pad.bottom) / 4;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.fillStyle = fg; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(fmt(maxY * (4-i)/4), pad.left - 6, y + 4);
  }

  // Cumulative dividends line
  ctx.strokeStyle = '#00d672'; ctx.lineWidth = 2.5; ctx.beginPath();
  ctx.moveTo(px(0), py2(0));
  data.forEach(d => ctx.lineTo(px(d.year), py2(d.cumDiv)));
  ctx.stroke();

  // Portfolio value line (if DRIP)
  if (useDRIP) {
    ctx.strokeStyle = acc; ctx.lineWidth = 2.5; ctx.beginPath();
    ctx.moveTo(px(0), py2(shares * price));
    data.forEach(d => ctx.lineTo(px(d.year), py2(d.shares * price)));
    ctx.stroke();
  }

  ctx.fillStyle = '#00d672'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('Cumulative Dividends', pad.left + 10, pad.top + 14);
  if (useDRIP) {
    ctx.fillStyle = acc;
    ctx.fillText('Portfolio Value', pad.left + 10, pad.top + 28);
  }

  // Table
  let tbl = '<table><thead><tr><th>' + t('year') + '</th><th>' + t('dividend') + '</th><th>' + t('cumDiv') + '</th><th>' + t('sharesHeld') + '</th></tr></thead><tbody>';
  data.forEach(d => {
    tbl += `<tr><td>${d.year}</td><td>${fmt(d.dividend)}</td><td>${fmt(d.cumDiv)}</td><td>${d.shares.toFixed(2)}</td></tr>`;
  });
  tbl += '</tbody></table>';
  $('#table-area').innerHTML = tbl;
}

function resetForm() {
  $('#stock-price').value = 150;
  $('#dps').value = 4.50;
  $('#shares').value = 100;
  $('#years').value = 10;
  $('#growth').value = 5;
  $('#freq').value = '4';
  $('#drip').checked = true;
  calc();
}

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/calc/stock-return.html', name:'Stock Return Calculator'},
    {icon:'📊', href:'/calc/stock-average-calculator.html', name:'Stock Average Calculator'},
    {icon:'📈', href:'/calc/investment-calculator.html', name:'Investment Calculator'},
    {icon:'💰', href:'/calc/compound-interest.html', name:'Compound Interest'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
