s, foreign charities (with limited exceptions), and most private foundations are NOT deductible."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Charitable Donation Tax Deduction Calculator',
    toolDesc: 'Calculate how much you can deduct from your taxes based on charitable donations, AGI limits, and donation type. Includes cash, non-cash, appreciated stock and household items.',
    agi: 'Adjusted Gross Income (AGI)',
    marginal: 'Marginal tax bracket',
    filing: 'Filing status',
    donations: 'Your Donations This Year',
    hType: 'Donation type',
    hAmt: 'Amount / FMV',
    hCost: 'Your cost basis (optional)',
    hFmv: 'Deduction value',
    addRow: 'Add donation',
    totalDeduct: 'Total deduction',
    taxSavings: 'Tax savings',
    agiLimit: 'AGI limit (60%)',
    overLimit: 'Over AGI limit (carry forward)',
    step1: 'Enter your Adjusted Gross Income (AGI) and tax bracket',
    step2: 'Add each donation — type, amount, and (for stock) your cost basis',
    step3: 'See total deduction, AGI limit, and tax savings estimate',
    step4: 'Anything over the AGI limit can be carried forward for 5 years',
  },
  zh: {
    toolTitle: '慈善捐赠税务抵扣计算器',
    toolDesc: '根据捐赠金额、AGI 上限和捐赠类型计算可抵扣的税额。支持现金、非现金、增值股票和家居物品。',
    agi: '调整后总收入 (AGI)',
    marginal: '边际税率',
    filing: '申报身份',
    donations: '本年度捐赠记录',
    hType: '捐赠类型',
    hAmt: '金额 / 公允价值',
    hCost: '原始成本 (可选)',
    hFmv: '可抵扣金额',
    addRow: '添加捐赠',
    totalDeduct: '总抵扣额',
    taxSavings: '节税额',
    agiLimit: 'AGI 上限 (60%)',
    overLimit: '超出 AGI (可结转)',
    step1: '输入调整后总收入 (AGI) 和边际税率',
    step2: '逐笔添加捐赠 — 类型、金额、（股票可填）原始成本',
    step3: '查看总抵扣额、AGI 上限和预计节税金额',
    step4: '超过 AGI 上限部分可结转未来 5 年使用',
  }
});

const { t } = GZ;

const TYPES = [
  { id: 'cash', label: 'Cash', labelZh: '现金捐赠', limit: 0.60, fmvFn: amt => amt },
  { id: 'check', label: 'Check / Card', labelZh: '支票 / 银行卡', limit: 0.60, fmvFn: amt => amt },
  { id: 'noncash', label: 'Non-cash items', labelZh: '非现金物品', limit: 0.50, fmvFn: amt => amt },
  { id: 'household', label: 'Household items', labelZh: '家居物品', limit: 0.50, fmvFn: amt => amt * 0.5 },
  { id: 'vehicle', label: 'Vehicle', labelZh: '车辆', limit: 0.50, fmvFn: amt => amt },
  { id: 'publicstock', label: 'Long-term stock (60% limit)', labelZh: '长期持有股票 (60%上限)', limit: 0.60, fmvFn: (amt, cost) => amt, specialStock: '60' },
  { id: 'stock30', label: 'Long-term stock to public charity (30% limit)', labelZh: '长期股票 - 公共慈善 (30%上限)', limit: 0.30, fmvFn: (amt, cost) => amt, specialStock: '30' },
  { id: 'privatefoundation', label: 'Cash to private foundation', labelZh: '向私人基金会现金捐赠', limit: 0.30, fmvFn: amt => amt },
  { id: 'ira', label: 'IRA Qualified Charitable Distribution', labelZh: 'IRA 合资格慈善分配 (QCD)', limit: 0, fmvFn: amt => amt, excludeFromAGI: true },
];

let rows = [
  { type: 'cash', amount: 500, cost: 0 },
  { type: 'noncash', amount: 200, cost: 0 },
];

function typeOptions(selectedId) {
  const lang = GZI18n.getLang();
  return TYPES.map(t => `<option value="${t.id}" ${t.id===selectedId?'selected':''}>${lang==='zh'?t.labelZh:t.label}</option>`).join('');
}

function renderRows() {
  document.getElementById('rows').innerHTML = rows.map((r, i) => {
    const t = TYPES.find(x => x.id === r.type);
    const fmv = t.fmvFn(r.amount, r.cost);
    const showCost = t.specialStock || t.id === 'publicstock' || t.id === 'stock30';
    return `<div class="dt-row">
      <select onchange="upd(${i},'type',this.value)">${typeOptions(r.type)}</select>
      <input type="number" min="0" step="any" value="${r.amount}" onchange="upd(${i},'amount',this.value)" placeholder="$">
      <input type="number" min="0" step="any" value="${r.cost||0}" onchange="upd(${i},'cost',this.value)" placeholder="$" style="${showCost?'':'opacity:.4'}">
      <span style="font-weight:600;color:var(--accent)">$${fmv.toFixed(2)}</span>
      <button class="dt-del" onclick="del(${i})">✕</button>
    </div>`;
  }).join('');
  calc();
}

function upd(i, k, v) {
  if (k === 'type') rows[i].type = v;
  else if (k === 'amount') rows[i].amount = +v;
  else if (k === 'cost') rows[i].cost = +v;
  renderRows();
}

function addRow() { rows.push({ type: 'cash', amount: 100, cost: 0 }); renderRows(); }
function del(i) { rows.splice(i, 1); renderRows(); }

function calc() {
  const agi = +document.getElementById('agi').value;
  const marginal = +document.getElementById('marginal').value;
  const lang = GZI18n.getLang();

  let totalDeduct = 0;
  let countAgainst60 = 0, countAgainst50 = 0, countAgainst30 = 0;
  let iraTotal = 0;
  rows.forEach(r => {
    const t = TYPES.find(x => x.id === r.type);
    const fmv = t.fmvFn(r.amount, r.cost);
    if (t.excludeFromAGI) { iraTotal += fmv; return; }
    totalDeduct += fmv;
    if (t.limit === 0.60) countAgainst60 += fmv;
    else if (t.limit === 0.50) countAgainst50 += fmv;
    else if (t.limit === 0.30) countAgainst30 += fmv;
  });

  // IRA QCD: separate, doesn't count against AGI
  const cap60 = agi * 0.60;
  const cap50 = agi * 0.50;
  const cap30 = agi * 0.30;

  // Apply 60% bucket first, then 50%, then 30% — but each is independently limited
  const allowed60 = Math.min(countAgainst60, cap60);
  const allowed50 = Math.min(countAgainst50, cap50);
  const allowed30 = Math.min(countAgainst30, cap30);
  const totalAllowed = allowed60 + allowed50 + allowed30 + iraTotal;
  const carryForward = Math.max(0, totalDeduct - totalAllowed);
  const taxSavings = totalAllowed * marginal;
  
  document.getElementById('summary').innerHTML = `
    <div class="dt-card"><div class="lbl">${t('totalDeduct')}</div><div class="val">$${totalDeduct.toFixed(2)}</div><div class="sub">${rows.length} donations</div></div>
    <div class="dt-card"><div class="lbl">${t('agiLimit')}</div><div class="val">$${cap60.toFixed(0)}</div><div class="sub">${lang==='zh'?'现金/股票':'Cash / stock'}</div></div>
    <div class="dt-card"><div class="lbl">${lang==='zh'?'当年可抵扣':'Allowed this year'}</div><div class="val">$${totalAllowed.toFixed(2)}</div><div class="sub">${lang==='zh'?'含 IRA QCD':'incl. QCD'}</div></div>
    <div class="dt-card"><div class="lbl">${t('taxSavings')}</div><div class="val" style="color:#10b981">$${taxSavings.toFixed(2)}</div><div class="sub">${(marginal*100).toFixed(0)}% bracket</div></div>
  `;
  const pct = Math.min(100, (totalAllowed / cap60) * 100);
  document.getElementById('bar').style.width = pct + '%';
  
  document.getElementById('detail').innerHTML = `
    <div class="row"><span class="k">${lang==='zh'?'AGI 收入':'AGI'}</span><span class="v">$${agi.toFixed(2)}</span></div>
    <div class="row"><span class="k">60% limit (${lang==='zh'?'现金/股票':'cash/stock'})</span><span class="v">$${cap60.toFixed(2)}</span></div>
    <div class="row"><span class="k">50% limit (${lang==='zh'?'非现金':'non-cash'})</span><span class="v">$${cap50.toFixed(2)}</span></div>
    <div class="row"><span class="k">30% limit (${lang==='zh'?'股票':'stock'})</span><span class="v">$${cap30.toFixed(2)}</span></div>
    <div class="row"><span class="k">${lang==='zh'?'IRA QCD (不计 AGI)':'IRA QCD (excl. AGI)'}</span><span class="v">$${iraTotal.toFixed(2)}</span></div>
    <div class="row"><span class="k">${t('overLimit')}</span><span class="v">$${carryForward.toFixed(2)}</span></div>
  `;
  
  const tip = document.getElementById('tip');
  if (carryForward > 0) {
    tip.innerHTML = `📌 ${lang==='zh'?`超出 AGI 上限 $${carryForward.toFixed(0)}，可结转未来 5 年使用`:`$${carryForward.toFixed(0)} exceeds AGI limits and can be carried forward up to 5 years`}`;
  } else if (totalDeduct > 0) {
    tip.innerHTML = `✓ ${lang==='zh'?`所有捐赠都在当年可全额抵扣，预计节税 $${taxSavings.toFixed(0)}`:`All donations are fully deductible this year. Estimated tax savings: $${taxSavings.toFixed(0)}`}`;
  }
}

['agi','marginal','filing'].forEach(id => {
  document.getElementById(id).addEventListener('change', calc);
  document.getElementById(id).addEventListener('input', calc);
});

renderRows();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧾', href:'/calc/tax-calculator.html', name:'Tax Calculator'},
    {icon:'💰', href:'/calc/roi.html', name:'ROI Calculator'},
    {icon:'🛍️', href:'/calc/etsy-fee-calculator.html', name:'Etsy Fee Calculator'},
    {icon:'📊', href:'/calc/sales-tax-calculator.html', name:'Sales Tax Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
