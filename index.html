  {id:'image-to-svg',cat:'image',icon:'🪄',path:'/image/image-to-svg.html',en:{name:'Image to SVG Converter',desc:'Convert PNG, JPG or WebP images into scalable SVG vectors with color quantization and contour tracing — download clean SVG files'},zh:{name:'图片转 SVG 转换器',desc:'使用颜色量化和轮廓追踪将 PNG、JPG 或 WebP 图片转换为可缩放的 SVG 矢量 — 下载干净的 SVG 文件'}},
  {id:'image-rotate',cat:'image',icon:'🔄',path:'/image/image-rotator.html',en:{name:'Image Rotator',desc:'Rotate images by 90, 180 or 270 degrees, or any custom angle. Crop-to-fit, background color and PNG/JPG export — runs in your browser.'},zh:{name:'图片旋转工具',desc:'将图片旋转 90°、180°、270° 或任意自定义角度。支持裁剪去角、背景色，导出 PNG/JPG — 浏览器本地运行。'}},
  {id:'image-flipper',cat:'image',icon:'🔀',path:'/image/image-flipper.html',en:{name:'Image Flipper',desc:'Flip or mirror images horizontally, vertically or both at once. Live side-by-side compare and PNG/JPG export — free and browser-based.'},zh:{name:'图片翻转工具',desc:'水平、垂直或同时翻转/镜像图片。支持原图对比和 PNG/JPG 导出 — 免费浏览器本地处理。'}},
  {id:'image-filter',cat:'image',icon:'🎨',path:'/image/image-filter.html',en:{name:'Image Filter',desc:'Apply free photo filters online — grayscale, sepia, invert, vintage, warm, cool, vivid, plus brightness, contrast, saturation, blur and hue sliders.'},zh:{name:'图片滤镜',desc:'在线为图片应用滤镜 — 黑白、复古棕、反相、暖色、冷色、鲜艳等预设，并可调整亮度、对比度、饱和度、模糊和色相。'}},
  {id:'add-text-to-image',cat:'image',icon:'🔠',path:'/image/add-text-to-image.html',en:{name:'Add Text to Image',desc:'Write text on photos online — captions, quotes, titles or watermarks. Custom font, size, color, rotation, shadow and opacity. Drag to place. PNG/JPG export, all in your browser.'},zh:{name:'图片添加文字',desc:'在线为图片添加文字 — 标题、引言、说明或水印。可自定义字体、字号、颜色、旋转、阴影和透明度，拖拽放置。导出 PNG/JPG，浏览器本地处理。'}},
  {id:'round-corners',cat:'image',icon:'🔘',path:'/image/round-corners.html',en:{name:'Round Corners Image',desc:'Round the corners of any image online. Adjustable radius, one-click circle, transparent PNG or filled background. Free and browser-based, no upload.'},zh:{name:'图片圆角工具',desc:'在线为图片添加圆角。可调整圆角半径、一键转圆形，支持透明 PNG 或填充背景。免费，浏览器本地处理，无需上传。'}},
  {id:'add-border',cat:'image',icon:'🖼️',path:'/image/add-border.html',en:{name:'Add Border to Image',desc:'Add a border or frame to any image online. Adjustable width, color, padding and corner radius. Polaroid-style frames and badges — free and browser-based.'},zh:{name:'图片加边框工具',desc:'在线为图片添加边框或相框。可调整宽度、颜色、内边距和圆角半径。支持拍立得风格相框和徽章 — 免费，浏览器本地处理。'}},
  {id:'drop-shadow',cat:'image',icon:'🌑',path:'/image/drop-shadow.html',en:{name:'Add Drop Shadow to Image',desc:'Add a drop shadow to any image online. The shadow follows the real shape of your subject. Adjustable color, blur, angle, distance, opacity and padding. Free and browser-based.'},zh:{name:'图片添加投影工具',desc:'在线为图片添加投影（阴影）。阴影跟随主体真实形状，可调整颜色、模糊、角度、距离、透明度和留白。免费，浏览器本地处理。'}},
  {id:'vignette',cat:'image',icon:'🌚',path:'/image/vignette.html',en:{name:'Vignette Image',desc:'Add a vignette effect to any photo online. Dark or light, adjustable size, feather and intensity. Great for portraits and moody photos. Free and browser-based, no upload.'},zh:{name:'图片暗角工具',desc:'在线为照片添加暗角（晕影）效果。支持暗角或亮角，可调整大小、羽化和强度。适合人像和氛围照片。免费，浏览器本地处理，无需上传。'}},
  {id:'image-sharpener',cat:'image',icon:'🔪',path:'/image/image-sharpener.html',en:{name:'Image Sharpener',desc:'Sharpen blurry photos and enhance detail with adjustable unsharp mask. Fix soft images, recover crisp edges — free, private and browser-based, no upload.'},zh:{name:'图片锐化工具',desc:'使用可调节的锐化掩膜 (Unsharp Mask) 锐化模糊照片、增强细节。修复模糊图片、恢复清晰边缘 — 免费、私密、浏览器本地处理，无需上传。'}},

  {id:'menstrual-cycle-tracker',cat:'calc',icon:'🌸',path:'/calc/menstrual-cycle-tracker.html',en:{name:'Menstrual Cycle Tracker',desc:'Track your cycle and predict your next period, fertile window and ovulation date. Free, private — data never leaves your browser.'},zh:{name:'月经周期追踪器',desc:'追踪月经周期，预测下次月经、排卵日和易孕期。免费、私密 — 数据仅保存在浏览器中。'}},
  {id:'pregnancy-week',cat:'calc',icon:'🤱',path:'/calc/pregnancy-week.html',en:{name:'Pregnancy Week Calculator',desc:'Find out exactly how many weeks pregnant you are. See current week, day, trimester and baby size. Free, private, browser-only.'},zh:{name:'孕周计算器',desc:'精确计算怀孕几周了。查看当前孕周、天数、孕期阶段和宝宝大小。免费、私密、浏览器本地运行。'}},
  {id:'shipping-calculator',cat:'calc',icon:'📦',path:'/calc/shipping-calculator.html',en:{name:'Shipping Cost Calculator',desc:'Estimate shipping rates by weight and dimensions. Compare dimensional vs actual weight, add handling fees and markup. Free, browser-only.'},zh:{name:'运费计算器',desc:'按重量和尺寸估算运费。对比体积重和实重，添加处理费和加价比例。免费、浏览器本地运行。'}},
  {id:'water-bill-calculator',cat:'calc',icon:'💧',path:'/calc/water-bill-calculator.html',en:{name:'Water Bill Calculator',desc:'Estimate your monthly and annual water cost. Enter usage and local rate, compare to average household consumption. Free, browser-only.'},zh:{name:'水费计算器',desc:'估算每月和每年的水费。输入用水量和当地费率，对比家庭平均用水量。免费、浏览器本地运行。'}},
  {id:'youtube-cpm-calculator',cat:'calc',icon:'📺',path:'/calc/youtube-cpm-calculator.html',en:{name:'YouTube CPM & Revenue Calculator',desc:'Estimate YouTube ad revenue based on views, CPM, niche and engagement. Calculate CPM, RPM and monthly earnings'},zh:{name:'YouTube CPM 收入计算器',desc:'根据播放量、CPM 和内容领域估算 YouTube 广告收入，计算 RPM 和月收入'}},
  {id:'instagram-engagement-calculator',cat:'calc',icon:'📸',path:'/calc/instagram-engagement-calculator.html',en:{name:'Instagram Engagement Rate Calculator',desc:'Calculate Instagram engagement rate with likes, comments, saves and shares. Compare with industry benchmarks'},zh:{name:'Instagram 互动率计算器',desc:'计算 Instagram 互动率，包含点赞、评论、收藏和分享，与行业基准对比'}},
  {id:'early-mortgage-payoff',cat:'calc',icon:'🏦',path:'/calc/early-mortgage-payoff.html',en:{name:'Early Mortgage Payoff Calculator',desc:'Calculate how extra mortgage payments save thousands in interest and years off your loan. Free amortization schedule with chart.'},zh:{name:'提前还贷计算器',desc:'计算额外还款能节省多少利息、缩短多少年限。免费摊销表和图表。'}},
  {id:'roth-ira-calculator',cat:'calc',icon:'🪙',path:'/calc/roth-ira-calculator.html',en:{name:'Roth IRA Calculator',desc:'Project your tax-free Roth IRA balance from annual contributions, expected return and years to retirement. Free yearly chart and breakdown.'},zh:{name:'Roth IRA 计算器',desc:'根据每年缴款、预期收益率和到退休年数，预测免税 Roth IRA 余额。免费年度图表和明细。'}},
  {id:'ev-savings-calculator',cat:'calc',icon:'⚡',path:'/calc/ev-savings-calculator.html',en:{name:'EV Savings Calculator',desc:'Compare electric vs gas car cost over time — annual fuel savings, CO2 reduction and EV payback period. Free and browser-based.'},zh:{name:'电动车省钱计算器',desc:'对比电动车与燃油车的长期成本 — 年油费节省、CO2 减排和电动车回本周期。免费，浏览器本地运行。'}},
  {id:'cost-per-use',cat:'calc',icon:'🛍️',path:'/calc/cost-per-use.html',en:{name:'Cost Per Use Calculator',desc:'Find the true value of any product by dividing its price by expected uses. Compare items side by side, factor in maintenance and lifespan, and shop smarter. Free, browser-only.'},zh:{name:'单次使用成本计算器',desc:'通过价格除以预期使用次数，揭示产品的真实价值。并排比较多个商品，计入维护和寿命成本，做出更明智的消费决策。免费，浏览器本地运行。'}},
  {id:'image-file-size',cat:'calc',icon:'🖼️',path:'/calc/image-file-size.html',en:{name:'Image File Size Calculator',desc:'Compute the raw uncompressed size of an image and estimate compressed PNG, JPEG, WebP, GIF and AVIF file sizes from dimensions and color depth. Free, browser-only.'},zh:{name:'图片文件大小计算器',desc:'根据图片的尺寸和颜色深度，计算未压缩原始大小，并估算 PNG、JPEG、WebP、GIF 和 AVIF 压缩后的文件大小。免费，浏览器本地运行。'}},
  {id:'pizza-cost',cat:'calc',icon:'🍕',path:'/calc/pizza-cost.html',en:{name:'Pizza Value Calculator',desc:'Compare pizza deals by cost per square inch — enter diameter and price for each option and instantly see which size is the best value. Free, browser-only.'},zh:{name:'披萨性价比计算器',desc:'按每平方英寸价格比较不同披萨 — 输入每个选项的直径和价格，即时找出最划算的尺寸。免费，浏览器本地运行。'}},
  {id:'plant-spacing',cat:'calc',icon:'🌱',path:'/calc/plant-spacing.html',en:{name:'Plant Spacing Calculator',desc:'Find exactly how many plants you need for a garden bed or field using square or triangular (offset) spacing. Supports inches, feet, cm and meters. Free, browser-only.'},zh:{name:'植物间距计算器',desc:'使用方形或三角形（交错）排列，精确计算花园花坛或田地所需的植物数量。支持英寸、英尺、厘米和米。免费，浏览器本地运行。'}},
  {id:'battery-charge-time',cat:'calc',icon:'🔋',path:'/calc/battery-charge-time.html',en:{name:'Battery Charge Time Calculator',desc:'Estimate how long it takes to fully charge any battery from capacity (mAh/Ah/Wh) and charger current or power, with chemistry-aware efficiency for Li-ion, LiPo, NiMH, lead-acid and LiFePO4. Free, browser-only.'},zh:{name:'电池充电时间计算器',desc:'根据容量（mAh/Ah/Wh）和充电电流或功率，结合锂离子、锂聚合物、镍氢、铅酸和磷酸铁锂的效率损耗，估算充满电所需时间。免费，浏览器本地运行。'}},
  {id:'percent-off-calculator',cat:'calc',icon:'🏷️',path:'/calc/percent-off-calculator.html',en:{name:'Percent Off Calculator',desc:'Find the sale price and your savings from any discount. Supports stacked coupons and sales tax, plus a reverse mode to find the discount percentage from the original and sale price. Free, browser-only.'},zh:{name:'打折计算器（百分比折扣）',desc:'根据折扣百分比计算折后价和节省金额。支持叠加优惠券和消费税，并提供反向模式：根据原价和成交价反推折扣百分比。免费，浏览器本地运行。'}},
  {id:'exponent-calculator',cat:'calc',icon:'🔢',path:'/calc/exponent-calculator.html',en:{name:'Exponent Calculator',desc:'Compute any base raised to a power, including negative, fractional and decimal exponents. See the exact value, scientific notation and a step-by-step breakdown of the math. Free, browser-only.'},zh:{name:'指数（幂）计算器',desc:'计算任意底数的幂，支持负指数、分数指数和小数指数。显示精确值、科学计数法和逐步计算过程。免费，浏览器本地运行。'}},
  {id:'standard-deviation-calculator',cat:'calc',icon:'📊',path:'/calc/standard-deviation-calculator.html',en:{name:'Standard Deviation Calculator',desc:'Calculate the standard deviation of any list of numbers. Get both sample (s) and population (σ) standard deviation, variance, mean and range, with a step-by-step breakdown of the formula. Free, browser-only.'},zh:{name:'标准差计算器',desc:'计算任意数字列表的标准差。同时给出样本标准差（s）和总体标准差（σ）、方差、平均值和极差，并提供逐步公式分解。免费，浏览器本地运行。'}},
  {id:'antilog-calculator',cat:'calc',icon:'↩️',path:'/calc/antilog-calculator.html',en:{name:'Antilog Calculator',desc:'Find the inverse of any logarithm. Enter the log value and pick base 10 (common log), e (natural log / ln) or 2 — get the antilog instantly with the formula and steps. Free, browser-only.'},zh:{name:'反对数计算器',desc:'求任意对数的逆运算。输入对数值并选择底数 10（常用对数）、e（自然对数 ln）或 2 — 即时得到反对数，并显示公式与步骤。免费，浏览器本地运行。'}},
  {id:'correlation-coefficient-calculator',cat:'calc',icon:'📈',path:'/calc/correlation-coefficient-calculator.html',en:{name:'Correlation Coefficient Calculator',desc:'Calculate the Pearson correlation coefficient (r) between two variables. Enter paired X and Y lists to get r, r², the strength and direction of the relationship, and a step-by-step breakdown. Free, browser-only.'},zh:{name:'相关系数计算器（皮尔逊 r）',desc:'计算两个变量之间的皮尔逊相关系数（r）。输入成对的 X 和 Y 数据，得到 r、r²、相关强度和方向，并提供逐步分解。免费，浏览器本地运行。'}},
  {id:'ingredient-substitute-finder',cat:'calc',icon:'🍳',path:'/calc/ingredient-substitute-finder.html',en:{name:'Ingredient Substitute Finder',desc:'Find the best substitutes for 200+ cooking and baking ingredients. Search eggs, butter, milk, flour, sugar, buttermilk and more — get exact swap ratios and vegan, dairy-free and gluten-free alternatives. Free, browser-only.'},zh:{name:'食材替代品查找器',desc:'为 200+ 种烹饪和烘焙食材查找最佳替代品。搜索鸡蛋、黄油、牛奶、面粉、糖、酪乳等 — 获取精确的替换比例和纯素、无乳、无麸质替代方案。免费，浏览器本地运行。'}},
  {id:'shift-schedule-generator',cat:'calc',icon:'🗓️',path:'/calc/shift-schedule-generator.html',en:{name:'Shift Schedule Generator',desc:'Generate fair rotating shift schedules for your team. Enter staff names, pick a shift pattern (day, day/night, 2-2-3) and days — get a printable rota with even coverage and rest days. Free, browser-only.'},zh:{name:'排班表生成器',desc:'为团队生成公平的轮班排班表。输入员工姓名，选择班次模式（白班、白/夜轮换、2-2-3 固定轮班）和天数 — 获取可打印的排班表，班次分配均匀，含休息日。免费，浏览器本地运行。'}},
  {id:'cgpa-calculator',cat:'calc',icon:'🎓',path:'/calc/cgpa-calculator.html',en:{name:'CGPA Calculator',desc:'Calculate your Cumulative Grade Point Average across multiple semesters. Supports 4.0, 10.0 and 5.0 scales with credit-weighted courses and classification. Free, browser-based.'},zh:{name:'CGPA 累计绩点计算器',desc:'计算多个学期的累计平均绩点（CGPA）。支持 4.0、10.0 和 5.0 制，按学分加权，含等级评定。免费、浏览器本地运行。'}},
  {id:'percentage-difference-calculator',cat:'calc',icon:'📊',path:'/calc/percentage-difference-calculator.html',en:{name:'Percentage Difference Calculator',desc:'Calculate the percentage difference between two numbers, percentage change (increase or decrease), and percentage of a number. Step-by-step formulas — free, private and browser-based.'},zh:{name:'百分比差异计算器',desc:'计算两个数字之间的百分比差异、百分比变化（增加或减少）以及某数的百分比。提供逐步公式 — 免费、私密、浏览器本地运行。'}},
  {id:'mean-median-mode-calculator',cat:'calc',icon:'📈',path:'/calc/mean-median-mode-calculator.html',en:{name:'Mean, Median, Mode Calculator',desc:'Calculate mean, median, mode, range, sum, min, max and count from any set of numbers. Step-by-step breakdown — free, private and browser-based.'},zh:{name:'平均数、中位数、众数计算器',desc:'从任意数字集合中计算平均数、中位数、众数、极差、总和、最小值、最大值和个数。提供逐步分解 — 免费、私密、浏览器本地运行。'}},
  {id:'standard-deviation-calculator',cat:'calc',icon:'📐',path:'/calc/standard-deviation-calculator.html',en:{name:'Standard Deviation Calculator',desc:'Calculate population and sample standard deviation, variance, mean and more from any set of numbers. Step-by-step breakdown — free, private and browser-based.'},zh:{name:'标准差计算器',desc:'从任意数字集合中计算总体标准差和样本标准差、方差、平均值等。提供逐步分解 — 免费、私密、浏览器本地运行。'}},
  {id:'square-root-calculator',cat:'calc',icon:'√',path:'/calc/square-root-calculator.html',en:{name:'Square Root Calculator',desc:'Calculate the square root, cube root or any nth root of a number instantly. Handles negative numbers, decimals and large numbers. Step-by-step — free, private and browser-based.'},zh:{name:'平方根计算器',desc:'即时计算数字的平方根、立方根或任意 n 次方根。支持负数、小数和大数。提供逐步分解 — 免费、私密、浏览器本地运行。'}},
  {id:'range-calculator',cat:'calc',icon:'📏',path:'/calc/range-calculator.html',en:{name:'Range Calculator',desc:'Calculate the range, midrange, minimum, maximum, count and sum of any set of numbers. Sorted output and step-by-step breakdown — free, private and browser-based.'},zh:{name:'极差计算器',desc:'计算任意数字集合的极差、中程数、最小值、最大值、个数和总和。排序输出和逐步分解 — 免费、私密、浏览器本地运行。'}},

  {id:'online-mirror',cat:'dev',icon:'🪞',path:'/dev/online-mirror.html',en:{name:'Online Mirror',desc:'Turn your webcam into a free online mirror. See yourself live, adjust brightness, zoom and color, flip, freeze or take a snapshot — all in your browser, no upload, 100% private.'},zh:{name:'在线镜子',desc:'把你的摄像头变成免费在线镜子。实时查看自己，调整亮度、缩放和颜色，翻转、定格或截图保存 — 完全在浏览器中运行，不上传任何数据。'}},
  {id:'bubble-level',cat:'dev',icon:'📐',path:'/dev/bubble-level.html',en:{name:'Bubble Level (Spirit Level)',desc:'Turn your phone into a free bubble level. Use the built-in tilt sensors to check if any surface is flat — horizontal, vertical or full 2D level. Live degree readout, no app install.'},zh:{name:'在线水平仪（气泡水平尺）',desc:'把手机变成免费水平仪。利用内置倾斜传感器检测任意表面是否水平 — 支持平放、竖直和 2D 平面模式。实时角度读数，无需安装应用。'}},
  {id:'online-compass',cat:'dev',icon:'🧭',path:'/dev/online-compass.html',en:{name:'Online Compass',desc:'Turn your phone into a free digital compass. Live magnetic heading in degrees, 16-point cardinal direction and a smooth rotating needle. Find north instantly, no app install.'},zh:{name:'在线指南针',desc:'把手机变成免费数字指南针。实时显示磁方位角度、16 方位方向和流畅旋转的指针。无需安装应用。'}},
  {id:'my-geolocation',cat:'dev',icon:'📍',path:'/dev/my-geolocation.html',en:{name:'My Geolocation & GPS Coordinates',desc:'Find your exact location and GPS coordinates (latitude, longitude), accuracy, altitude, speed and heading. Copy in decimal, DMS, Plus Code or map URL formats and view your spot on a map — all in your browser.'},zh:{name:'我的位置 & GPS 坐标',desc:'查看你的精确位置和 GPS 坐标（纬度、经度）、精度、海拔、速度和方向。支持十进制、度/分/秒、Plus Code 和地图 URL 等多种格式复制，并在地图上显示 — 完全在浏览器中运行。'}},

  {id:'name-combiner',cat:'fun',icon:'💕',path:'/fun/name-combiner.html',en:{name:'Name Combiner — Couple & Ship Name Generator',desc:'Blend two names into a cute couple name or ship name portmanteau (like Brangelina). Mix your names 12+ ways instantly — perfect for weddings, anniversaries and fandoms. Free, private, no signup.'},zh:{name:'情侣名字合成器 — CP 名 / 组合名生成器',desc:'将两个名字合成为一个情侣名 / CP 名 / 组合名（如 Brangelina）。即时用 12+ 种方式合成你的名字 — 适合婚礼、纪念日和粉丝圈。免费、私密、无需注册。'}},
  {id:'baby-name-generator',cat:'fun',icon:'👶',path:'/fun/baby-name-generator.html',en:{name:'Baby Name Generator',desc:'Find the perfect baby name. Browse and generate names by gender (boy, girl, unisex) and origin (English, Spanish, French, Arabic, Japanese and more) — each with its meaning. Save favorites. Free, private, no signup.'},zh:{name:'宝宝名字生成器',desc:'为宝宝找到完美的名字。按性别和来源浏览生成名字 — 每个都附带含义。可收藏喜爱的名字。免费、私密、无需注册。'}},
  {id:'fantasy-name-generator',cat:'fun',icon:'🧙',path:'/fun/fantasy-name-generator.html',en:{name:'Fantasy Name Generator',desc:'Create names for elves, dwarves, dragons, wizards, orcs, halflings and more — perfect for D&D, RPGs, novels and games. Get 20 unique fantasy names every click. Free, private, no signup.'},zh:{name:'奇幻名字生成器',desc:'为精灵、矮人、龙、巫师、兽人、半身人等生成名字 — 适合 D&D、RPG、小说和游戏。每次点击获得 20 个独特的奇幻名字。免费、私密、无需注册。'}},
  {id:'gamertag-generator',cat:'fun',icon:'🎮',path:'/fun/gamertag-generator.html',en:{name:'Gamertag Generator',desc:'Create unique gaming usernames for Xbox, PlayStation, Steam, Roblox, Discord and more. Pick a style — sweaty, tryhard, cool, cute, OG — add your word, get 20 fresh gamertags every click. Free, private, no signup.'},zh:{name:'游戏 ID 生成器',desc:'为 Xbox、PlayStation、Steam、Roblox、Discord 等平台创建独特游戏 ID。选择风格 — 激进、硬核、酷炫、可爱、元老 — 可添加关键词，每次点击获得 20 个全新 ID。免费、私密、无需注册。'}},
  {id:'band-name-generator',cat:'fun',icon:'🎸',path:'/fun/band-name-generator.html',en:{name:'Band Name Generator',desc:'Create cool band, music group and DJ names by genre — rock, metal, pop, hip-hop, EDM, indie, punk and country. Add an optional keyword and get 20 fresh band name ideas every click. Free, private, no signup.'},zh:{name:'乐队名字生成器',desc:'按音乐风格生成乐队、音乐组合和 DJ 名字 — 摇滚、金属、流行、嘻哈、电音、独立、朋克和乡村。可添加关键词，每次点击获得 20 个全新乐队名创意。免费、私密、无需注册。'}},

  // Batch 175 — NLP text analysis tools (language detection, sentiment, keyword extraction, tone, emoji dictionary)
  {id:'language-detector',cat:'text',icon:'🌐',path:'/text/language-detector.html',en:{name:'Language Detector',desc:'Identify the language of any text instantly. Detects 30+ languages using Unicode scripts, stopword matching and n-gram profiles with a confidence score. 100% browser-based, no upload.'},zh:{name:'语言检测器',desc:'即时识别任意文本的语言。通过 Unicode 脚本、停用词匹配和 n-gram 特征识别 30+ 种语言，附带置信度评分。100% 浏览器本地运行，无需上传。'}},
  {id:'sentiment-analyzer',cat:'text',icon:'😊',path:'/text/sentiment-analyzer.html',en:{name:'Sentiment Analyzer',desc:'Analyze the emotional tone of any text. Get a positive, negative or neutral verdict, polarity score, emotion breakdown (joy, anger, fear, surprise) and highlighted sentiment words. 100% browser-based, no upload.'},zh:{name:'情感分析器',desc:'分析任意文本的情感倾向。即时获得正面、负面或中性结论、极性分数、情绪分解（喜悦、愤怒、恐惧、惊讶）和高亮的情感词。100% 浏览器本地运行。'}},
  {id:'keyword-extractor',cat:'text',icon:'🔑',path:'/text/keyword-extractor.html',en:{name:'Keyword Extractor (YAKE)',desc:'Extract the most important keywords and keyphrases from any text using the YAKE algorithm. Ranked by relevance, click to copy, with a word cloud — perfect for SEO. 100% browser-based, no signup.'},zh:{name:'关键词提取器（YAKE）',desc:'使用 YAKE 算法从任意文本中提取最重要的关键词和关键短语。按相关性排序，点击即可复制，附带词云 — SEO 必备。100% 浏览器本地运行。'}},
  {id:'tone-analyzer',cat:'text',icon:'🎭',path:'/text/tone-analyzer.html',en:{name:'Text Tone Analyzer',desc:'Detect the tone of your writing — formal, casual, academic, persuasive, technical or emotional. See formality, emotion, persuasiveness, objectivity and complexity scores plus tailored tips. 100% browser-based.'},zh:{name:'文本语气分析器',desc:'检测你的写作语气 — 正式、休闲、学术、说服、技术或感性。查看正式度、情感、说服力、客观性和复杂度评分及定制化建议。100% 浏览器本地运行。'}},
  {id:'emoji-dictionary',cat:'text',icon:'📖',path:'/text/emoji-dictionary.html',en:{name:'Emoji Dictionary & Meaning',desc:'Look up any emoji to see its official name, Unicode codepoint and keywords. Search by keyword or browse 8 categories — hundreds of emojis with one-click copy. 100% browser-based, no signup.'},zh:{name:'Emoji 字典与含义',desc:'查询任意 Emoji 的官方名称、Unicode 码点和关键词。按关键词搜索或按 8 个分类浏览 — 数百个 Emoji，一键复制。100% 浏览器本地运行。'}},

  {id:'pdf-splitter',cat:'convert',icon:'✂️',path:'/convert/pdf-splitter.html',en:{name:'PDF Splitter',desc:'Split any PDF online for free — extract page ranges like 1-3, 5, split every page into separate PDFs, or divide into N equal parts. 100% client-side with pdf-lib, no upload, no signup.'},zh:{name:'PDF 拆分工具',desc:'免费在线拆分 PDF — 提取页码范围（如 1-3, 5）、按单页拆分或平均分成 N 份。基于 pdf-lib 100% 浏览器本地处理，无需上传。'}},
  {id:'csv-diff',cat:'convert',icon:'⚖️',path:'/convert/csv-diff.html',en:{name:'CSV Diff — Compare Two CSV Files',desc:'Compare two CSV files side-by-side and instantly see added, removed and changed rows. Pick a key column, ignore row order and hide unchanged rows. 100% browser-based, no upload.'},zh:{name:'CSV 对比工具 — 比较两个 CSV',desc:'并排对比两个 CSV 文件，即时查看新增、删除和变更的行。可选关键列、忽略行顺序、隐藏未变行。100% 浏览器本地处理，无需上传。'}},
  {id:'ics-generator',cat:'text',icon:'📅',path:'/ics-generator.html',en:{name:'ICS Calendar Event Generator',desc:'Create .ics calendar event files for Outlook, Apple Calendar and Google Calendar. Title, dates, location, description, attendees, time zones and recurrence — 100% browser-based, no signup.'},zh:{name:'ICS 日历事件生成器',desc:'为 Outlook、Apple 日历和 Google 日历创建 .ics 日历事件文件。支持标题、时间、地点、描述、时区和重复规则 — 100% 浏览器本地运行。'}},

  {id:'word-to-pages',cat:'text',icon:'📄',path:'/text/word-to-pages.html',en:{name:'Word to Pages Calculator',desc:'Find out how many pages your essay, paper or document will be from a word count or pasted text. Adjust font size, font type and spacing — 250 words/page double spaced, 500 single. Free, browser-only.'},zh:{name:'字数转页数计算器',desc:'根据字数或粘贴文本估算论文、报告会有多少页。可调字号、字体和行距 — 双倍行距约 250 词/页，单倍约 500 词/页。免费、浏览器本地运行。'}},
  {id:'markdown-linter',cat:'text',icon:'🧹',path:'/text/markdown-linter.html',en:{name:'Markdown Linter & Checker',desc:'Lint your Markdown for heading hierarchy skips, missing blank lines, trailing whitespace, long lines, duplicate headings, unclosed code fences and more — 20+ checks, all in your browser.'},zh:{name:'Markdown 检查器 (Linter)',desc:'检查 Markdown 的标题层级跳跃、缺少空行、行尾空格、超长行、重复标题、未闭合代码块等问题 — 20+ 项检查，完全浏览器本地运行。'}},
  {id:'frontmatter-generator',cat:'text',icon:'📋',path:'/text/frontmatter-generator.html',en:{name:'YAML Front Matter Generator',desc:'Generate clean YAML front matter for Markdown blog posts. Works with Jekyll, Hugo, Eleventy (11ty), Astro, Gatsby, Hexo. Title, date, tags, categories, draft, layout and custom fields — free, browser-only.'},zh:{name:'YAML Front Matter 生成器',desc:'为 Markdown 博客文章生成干净的 YAML front matter。兼容 Jekyll、Hugo、Eleventy（11ty）、Astro、Gatsby、Hexo。支持 title、date、tags、categories、draft、layout 和自定义字段 — 免费，浏览器本地运行。'}},
  {id:'qrcode-batch',cat:'convert',icon:'📇',path:'/convert/qrcode-batch.html',en:{name:'Bulk QR Code Generator',desc:'Generate multiple QR codes at once from a list of URLs or text — one per line. Download each as PNG or grab them all in a single ZIP. Custom size, colors and quiet zone. 100% browser-only, no upload.'},zh:{name:'批量二维码生成器',desc:'从一组网址或文本（每行一条）一次批量生成多个二维码。可逐个下载 PNG，也可一键打包 ZIP。支持自定义尺寸、颜色和留白。100% 浏览器本地运行，无需上传。'}},
  {id:'json-to-java',cat:'dev',icon:'☕',path:'/dev/json-to-java.html',en:{name:'JSON to Java Class Generator',desc:'Convert any JSON to clean Java POJO classes. Automatic type inference, nested inner classes, List fields, getters and setters, and optional Gson or Jackson annotations — jsonschema2pojo online alternative, browser-only.'},zh:{name:'JSON 转 Java 类生成器',desc:'将任意 JSON 转换为干净的 Java POJO 类。自动类型推断、嵌套内部类、List 字段、getter/setter，可选 Gson 或 Jackson 注解 — jsonschema2pojo 在线替代，浏览器本地运行。'}},
  {id:'monitor-test',cat:'dev',icon:'🖥️',path:'/dev/monitor-test.html',en:{name:'Monitor Test & Dead Pixel Checker',desc:'Test your screen for dead or stuck pixels, backlight bleed and color uniformity. Fullscreen solid colors, grayscale gradient and RGB color bars — 100% in your browser, no install.'},zh:{name:'显示器测试 / 坏点检测工具',desc:'检测屏幕坏点、亮点、漏光和色彩均匀性。全屏纯色、灰阶渐变和 RGB 色条 — 100% 浏览器本地运行，无需安装。'}},

  {id:'commit-message-generator',cat:'dev',icon:'💬',path:'/dev/commit-message-generator.html',en:{name:'Commit Message Generator',desc:'Write clean Conventional Commits in seconds. Pick a type (feat, fix, docs, chore), add scope, subject, body and footer, mark breaking changes and copy a ready-to-paste git commit message. Free, private, browser-only.'},zh:{name:'提交信息生成器',desc:'几秒钟写出规范的 Conventional Commits 提交信息。选择类型（feat、fix、docs、chore）、填写范围、主题、正文和页脚，标记破坏性变更，复制即可粘贴的 git 提交信息。免费、私密、浏览器本地运行。'}},
  {id:'open-source-license',cat:'dev',icon:'📜',path:'/dev/open-source-license.html',en:{name:'Open Source License Chooser',desc:'Choose the right open source license in 60 seconds. Answer a few questions and get a recommendation — MIT, Apache-2.0, GPL-3.0, AGPL-3.0, BSD-3, MPL-2.0 or Unlicense — with a badge, TL;DR rules, summary and a ready-to-copy LICENSE file. Free, browser-only.'},zh:{name:'开源许可证选择器',desc:'60 秒选出合适的开源许可证。回答几个问题即可获得推荐 — MIT、Apache-2.0、GPL-3.0、AGPL-3.0、BSD-3、MPL-2.0 或 Unlicense — 附带徽章、权限速览、简介和可直接复制的 LICENSE 文件。免费、浏览器本地运行。'}},
  {id:'markdown-badge',cat:'text',icon:'🏷️',path:'/text/markdown-badge.html',en:{name:'Markdown Badge Generator',desc:'Create custom shields.io-style badges for your README. Set label, message, color, style and logo with a live preview, then copy Markdown, HTML or the raw badge URL. Free, private, browser-only.'},zh:{name:'Markdown 徽章生成器',desc:'为 README 制作自定义 shields.io 风格徽章。设置标签、信息、颜色、样式和图标，实时预览，可复制 Markdown、HTML 或原始徽章链接。免费、私密、浏览器本地运行。'}},
  {id:'duotone-generator',cat:'image',icon:'🎨',path:'/image/duotone-generator.html',en:{name:'Image Duotone Generator',desc:'Turn any photo into a stylish two-color duotone. Pick shadow and highlight colors, tune contrast, and download as PNG — 100% in your browser, no upload, no signup.'},zh:{name:'双色调图片生成器',desc:'将任意照片转为时尚的双色调效果。选择暗部和亮部颜色，调整对比度，下载 PNG — 100% 浏览器本地运行，无需上传。'}},
  {id:'text-banner',cat:'text',icon:'🅰️',path:'/text/text-banner.html',en:{name:'ASCII Text Banner Generator',desc:'Turn any text into a big ASCII art banner for terminals, READMEs and code comments. Built-in block font with multiple fill characters (solid and shaded), adjustable spacing, instant copy. Free, private, browser-only.'},zh:{name:'ASCII 文字横幅生成器',desc:'将任意文字转为大号 ASCII 艺术横幅，适合终端、README 和代码注释。内置方块字体，支持实心/阴影多种填充、可调字间距、即时复制。免费、私密、浏览器本地运行。'}},

  {id:'random-quote',cat:'text',icon:'💬',path:'/text/random-quote.html',en:{name:'Random Quote Generator',desc:'Get a random inspirational, motivational or famous quote with one click. Filter by category (inspire, motivate, wisdom, funny, success, love), copy or share on X/Twitter. Hundreds of curated quotes — free, private, browser-only.'},zh:{name:'随机名言生成器',desc:'一键获取随机的励志、激励或名人名言。可按分类筛选（励志、激励、智慧、趣味、成功、爱情），复制或分享到 X/Twitter。数百条精选名言 — 免费、私密、浏览器本地运行。'}},
  {id:'country-flag-emoji',cat:'text',icon:'🚩',path:'/text/country-flag-emoji.html',en:{name:'Country Flag Emoji List',desc:'Browse, search and copy every world flag emoji (ISO 3166-1). Click any flag to copy it — perfect for social media, bios and messages. Search by country name or ISO code. Free online flag emoji lookup.'},zh:{name:'国旗 Emoji 列表',desc:'浏览、搜索并复制全球所有国旗 Emoji（ISO 3166-1）。一键复制，适合社交媒体、个人简介和消息。按国家名或 ISO 代码搜索。免费在线国旗 Emoji 查询。'}},
  {id:'currency-symbols',cat:'dev',icon:'💱',path:'/dev/currency-symbols.html',en:{name:'Currency Symbols and ISO 4217 Codes',desc:'Lookup every world currency symbol and ISO 4217 code. Search by country or currency name, click to copy the symbol or code. Free online currency code reference for developers, travelers and finance work.'},zh:{name:'货币符号与 ISO 4217 代码表',desc:'查询全球所有货币符号和 ISO 4217 代码。按国家或货币名搜索，点击复制符号或代码。免费在线货币代码参考，适合开发人员、旅行者和金融工作。'}},
  {id:'phone-country-codes',cat:'dev',icon:'📞',path:'/dev/phone-country-codes.html',en:{name:'Phone Country and Calling Codes',desc:'Lookup every international phone country calling code (ITU-T E.164). Search by country, ISO code or dial code, click to copy. Free online dial code reference for developers, sales teams and travelers.'},zh:{name:'电话国家区号列表',desc:'查询全球所有国际电话国家区号（ITU-T E.164）。按国家、ISO 代码或区号搜索，点击复制。免费在线区号参考，适合开发人员、销售团队和旅行者。'}},
  {id:'system-prompt-builder',cat:'dev',icon:'🧠',path:'/dev/system-prompt-builder.html',en:{name:'System Prompt Builder',desc:'Assemble production-ready system prompts for ChatGPT, Claude, Gemini and any LLM. Set role, task, constraints, output format, tone and few-shot examples — copy or download instantly. Free, no signup.'},zh:{name:'系统提示词构建器',desc:'为 ChatGPT、Claude、Gemini 及任意大模型组装生产级系统提示词。设置角色、任务、约束、输出格式、语气和少样本示例 — 一键复制或下载。免费，无需注册。'}},

  {id:'math-formulas',cat:'calc',icon:'📐',path:'/calc/math-formulas.html',en:{name:'Math Formulas Cheat Sheet',desc:'A free printable one-page math formulas reference — algebra, geometry, trigonometry, calculus, statistics, finance and physics. Click any formula to copy it as plain text. Browser-only, no signup.'},zh:{name:'数学公式速查表',desc:'免费可打印的一页数学公式速查 — 代数、几何、三角、微积分、统计、金融和物理。点击任意公式即可复制为纯文本。浏览器本地运行，无需注册。'}},

  {id:'book-cover',cat:'image',icon:'📚',path:'/image/book-cover.html',en:{name:'Free Book Cover Maker',desc:'Design a professional book cover online for free. Add your title, subtitle and author name, pick from six elegant genre themes (mystery, romance, sci-fi, classic, modern, children) or upload your own artwork. Export a print-ready KDP-friendly 6×9 PNG in one click — perfect for self-publishing, KDP, IngramSpark, Apple Books and eBooks. No signup, no watermark, runs entirely in your browser.'},zh:{name:'书籍封面制作工具',desc:'免费在线设计专业的书籍封面。添加书名、副标题和作者名，从 6 种优雅的体裁主题（悬疑、言情、科幻、经典、现代、儿童）中选择，或上传你自己的插画。一键导出可打印的 KDP 6×9 PNG — 适用于自助出版、KDP、IngramSpark、Apple Books 和电子书。无注册、无水印，完全浏览器本地运行。'}},

  {id:'css-breadcrumb',cat:'css',icon:'🧭',path:'/css-tools/breadcrumb.html',en:{name:'CSS Breadcrumb Generator',desc:'Build responsive CSS breadcrumb navigation with live preview. Six separators (chevron, slash, arrow, bullet, pipe or custom), custom link, hover and current-page colors. Semantic <ol> markup, aria-current and flex-wrap — copy production-ready HTML + CSS. Free, browser-only.'},zh:{name:'CSS 面包屑导航生成器',desc:'可视化生成响应式 CSS 面包屑导航。6 种分隔符（箭头、斜杠、右尖、圆点、竖线或自定义），自定义链接、悬停和当前页颜色。语义化 <ol> 标记、aria-current 和 flex-wrap — 复制生产可用 HTML + CSS。免费浏览器本地运行。'}},

function setFilter(cat, btn) {

function renderTools() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sections = document.getElementById('tool-sections');
  const filtered = TOOLS.filter(tool => {
    if (currentFilter !== 'all' && tool.cat !== currentFilter) return false;
    if (q) {
      const info = tool[lang] || tool.en;
      return info.name.toLowerCase().includes(q) || info.desc.toLowerCase().includes(q) || tool.id.includes(q);
    }
    return true;
  });

  // Group by category
  const groups = {};
  filtered.forEach(tool => {
    if (!groups[tool.cat]) groups[tool.cat] = [];
    groups[tool.cat].push(tool);
  });

  const catOrder = ['text','dev','color','image','css','convert','seo','social','calc','fun','fortune'];
  let html = '';
  for (const cat of catOrder) {
    if (!groups[cat]) continue;
    const catInfo = GZ.CATEGORIES.find(c => c.id === cat);
    html += `<h2 class="section-title"><span class="icon">${catInfo?.icon||''}</span> ${t(cat+'Tools')}</h2>`;
    html += '<div class="gz-cards">';
    for (const tool of groups[cat]) {
      const info = tool[lang] || tool.en;
      html += `<a class="gz-card" href="${tool.path}"><span class="icon">${tool.icon}</span><h3>${info.name}</h3><p>${info.desc}</p><span class="tag">${t(cat+'Tools')}</span></a>`;
    }
    html += '</div>';
  }
  sections.innerHTML = html;
}

<!-- Error Boundary — catches unhandled errors, only shows toast for our own code if tools not loaded -->
<script>
(function(){
  var _errCount=0;
  function reportErr(type,msg,src){
    _errCount++;
    if(_errCount>5)return;
    if(!msg||!msg.trim())return;
    if(src&&src.indexOf(location.origin)!==0&&src.indexOf('/shared/')===-1&&src.indexOf('/dev/')===-1&&src.indexOf('/text/')===-1)return;
    var sections=document.getElementById('tool-sections');
    if(sections&&sections.children.length>0)return;
    if(_errCount===1)showRecoveryToast();
  }
  function showRecoveryToast(){
    var existing=document.getElementById('gz-error-toast');
    if(existing)return;
    var t=document.createElement('div');
    t.id='gz-error-toast';
    t.setAttribute('role','alert');
    t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#2a1a1a;border:1px solid #ff6b6b;color:#ffd93d;padding:10px 20px;border-radius:12px;font-size:.85em;z-index:100001;max-width:90vw;text-align:center;box-shadow:0 4px 20px rgba(255,107,107,.3);font-family:system-ui,sans-serif';
    t.innerHTML='Something went wrong — <button onclick="location.reload()" style="background:#4ecdc4;color:#000;border:none;padding:4px 14px;border-radius:8px;font-weight:700;cursor:pointer;font-size:.9em">Refresh</button>';
    document.body.appendChild(t);
    setTimeout(function(){if(t.parentNode)t.remove()},15000);
  }
  window.onerror=function(msg,src,lineno,colno,err){reportErr('err',msg,src,lineno,colno,err)};
  window.addEventListener('unhandledrejection',function(e){reportErr('rej',String(e.reason),'promise',0,0,null)});
})();
</script>
