.fasting-presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.fasting-presets button{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--glass2);color:var(--text1);cursor:pointer;font-size:.9em;transition:all .2s}
.fasting-presets button:hover,.fasting-presets button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.timer-display{text-align:center;padding:24px 0}
.timer-ring{position:relative;width:220px;height:220px;margin:0 auto 16px}
.timer-ring svg{transform:rotate(-90deg)}
.timer-ring circle{fill:none;stroke-width:8}
.timer-ring .bg{stroke:var(--border)}
.timer-ring .progress{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset .5s}
.timer-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.timer-inner .time{font-size:2.2rem;font-weight:700;font-variant-numeric:tabular-nums}
.timer-inner .label{font-size:.85em;color:var(--text2)}
.status-bar{display:flex;gap:12px;justify-content:center;margin:12px 0;flex-wrap:wrap}
.status-bar .item{background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:8px 14px;text-align:center;min-width:100px}
.status-bar .item .val{font-size:1.1rem;font-weight:600}
.status-bar .item .lbl{font-size:.75em;color:var(--text2)}
.controls{display:flex;gap:10px;justify-content:center;margin:16px 0}
.milestones{margin:16px 0}
.milestones h3{margin-bottom:8px}
.milestone{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:.9em;opacity:.5}
.milestone.reached{opacity:1}
.milestone .dot{width:10px;height:10px;border-radius:50%;background:var(--border)}
.milestone.reached .dot{background:var(--accent)}
</style>

<script>
GZI18n.register({
  en: {
    toolTitle:'Intermittent Fasting Timer',
    toolDesc:'Track your intermittent fast with 16:8, 18:6, 20:4 and OMAD presets. See elapsed time, ketosis status and milestones.',
    startFast:'Start Fast',
    stopFast:'End Fast',
    resetFast:'Reset',
    elapsed:'Elapsed',
    remaining:'Remaining',
    target:'Target',
    fasting:'Fasting',
    eating:'Eating Window',
    notStarted:'Not started',
    preset16:'16:8',
    preset18:'18:6',
    preset20:'20:4',
    presetOMAD:'OMAD (23:1)',
    custom:'Custom',
    hours:'hours',
    stateGlycolysis:'Glycolysis (burning glucose)',
    stateFatBurning:'Fat burning begins',
    stateKetosis:'Ketosis (burning fat)',
    stateDeepKetosis:'Deep ketosis',
    step1:'Choose a fasting preset or enter a custom duration',
    step2:'Click "Start Fast" to begin your fasting timer',
    step3:'Monitor your progress, milestones and metabolic state',
    step4:'Get notified when your fasting window is complete',
    milestoneTitle:'Fasting Milestones',
    m4h:'4h — Glycogen depleting',
    m8h:'8h — Glycogen low',
    m12h:'12h — Fat burning begins',
    m16h:'16h — Ketosis starts',
    m18h:'18h — Autophagy begins',
    m20h:'20h — Deep ketosis',
    m24h:'24h — Full day fast!',
    customHours:'Fasting hours',
  },
  zh: {
    toolTitle:'间歇性断食计时器',
    toolDesc:'追踪间歇性断食进度，支持 16:8、18:6、20:4 和 OMAD 预设，查看经过时间、酮症状态和里程碑。',
    startFast:'开始断食',
    stopFast:'结束断食',
    resetFast:'重置',
    elapsed:'已过时间',
    remaining:'剩余时间',
    target:'目标',
    fasting:'断食中',
    eating:'进食窗口',
    notStarted:'未开始',
    preset16:'16:8',
    preset18:'18:6',
    preset20:'20:4',
    presetOMAD:'OMAD (23:1)',
    custom:'自定义',
    hours:'小时',
    stateGlycolysis:'糖酵解（消耗葡萄糖）',
    stateFatBurning:'脂肪燃烧开始',
    stateKetosis:'酮症（燃烧脂肪）',
    stateDeepKetosis:'深度酮症',
    step1:'选择断食预设或输入自定义时长',
    step2:'点击「开始断食」启动计时器',
    step3:'监控进度、里程碑和代谢状态',
    step4:'断食窗口完成时收到通知',
    milestoneTitle:'断食里程碑',
    m4h:'4小时 — 糖原消耗中',
    m8h:'8小时 — 糖原偏低',
    m12h:'12小时 — 脂肪燃烧开始',
    m16h:'16小时 — 酮症启动',
    m18h:'18小时 — 自噬开始',
    m20h:'20小时 — 深度酮症',
    m24h:'24小时 — 全天断食！',
    customHours:'断食小时数',
  }
});

const { $, t } = GZ;
const CIRC = 2 * Math.PI * 100;
let targetHours = 16;
let startTime = null;
let timerInterval = null;

const presets = [
  { hours: 16, label: 'preset16' },
  { hours: 18, label: 'preset18' },
  { hours: 20, label: 'preset20' },
  { hours: 23, label: 'presetOMAD' },
];

// Load saved state
const saved = localStorage.getItem('gz-fasting-state');
if (saved) {
  try {
    const s = JSON.parse(saved);
    if (s.startTime && s.targetHours) {
      startTime = new Date(s.startTime);
      targetHours = s.targetHours;
    }
  } catch(e) {}
}

function saveState() {
  if (startTime) {
    localStorage.setItem('gz-fasting-state', JSON.stringify({ startTime: startTime.toISOString(), targetHours }));
  } else {
    localStorage.removeItem('gz-fasting-state');
  }
}

function formatDuration(ms) {
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function getMetabolicState(elapsedHours) {
  if (elapsedHours < 12) return { text: t('stateGlycolysis'), color: '#61afef' };
  if (elapsedHours < 16) return { text: t('stateFatBurning'), color: '#e5c07b' };
  if (elapsedHours < 20) return { text: t('stateKetosis'), color: '#98c379' };
  return { text: t('stateDeepKetosis'), color: '#00d672' };
}

function updateTimer() {
  if (!startTime) {
    $('#timerTime').textContent = '00:00:00';
    $('#timerLabel').textContent = t('notStarted');
    $('#ring').style.strokeDashoffset = CIRC;
    $('#statusBar').innerHTML = '';
    return;
  }
  const now = Date.now();
  const elapsed = now - startTime.getTime();
  const elapsedH = elapsed / 3600000;
  const targetMs = targetHours * 3600000;

  // Timer display
  if (elapsed < targetMs) {
    $('#timerTime').textContent = formatDuration(elapsed);
    $('#timerLabel').textContent = t('fasting');
    const progress = Math.min(elapsed / targetMs, 1);
    $('#ring').style.strokeDashoffset = CIRC * (1 - progress);
    $('#ring').style.stroke = getMetabolicState(elapsedH).color;
  } else {
    $('#timerTime').textContent = formatDuration(elapsed);
    $('#timerLabel').textContent = '✅ ' + t('eating');
    $('#ring').style.strokeDashoffset = 0;
    $('#ring').style.stroke = '#00d672';
  }

  const remaining = Math.max(0, targetMs - elapsed);
  const state = getMetabolicState(elapsedH);
  $('#statusBar').innerHTML = `
    <div class="item"><div class="val">${formatDuration(elapsed)}</div><div class="lbl">${t('elapsed')}</div></div>
    <div class="item"><div class="val">${remaining > 0 ? formatDuration(remaining) : '—'}</div><div class="lbl">${t('remaining')}</div></div>
    <div class="item"><div class="val" style="color:${state.color}">${state.text}</div><div class="lbl">${t('target')}: ${targetHours}h</div></div>
  `;

  // Update milestones
  renderMilestones(elapsedH);

  // Notification
  if (elapsed >= targetMs && elapsed < targetMs + 1000) {
    if (Notification.permission === 'granted') {
      new Notification(t('toolTitle'), { body: t('eating') });
    }
  }
}

function renderMilestones(elapsedH) {
  const milestones = [
    { h: 4, key: 'm4h' },
    { h: 8, key: 'm8h' },
    { h: 12, key: 'm12h' },
    { h: 16, key: 'm16h' },
    { h: 18, key: 'm18h' },
    { h: 20, key: 'm20h' },
    { h: 24, key: 'm24h' },
  ];
  $('#milestones').innerHTML = `<h3>${t('milestoneTitle')}</h3>` +
    milestones.map(m => `<div class="milestone ${elapsedH >= m.h ? 'reached' : ''}"><span class="dot"></span> ${t(m.key)}</div>`).join('');
}

function startFast() {
  startTime = new Date();
  saveState();
  if (Notification.permission === 'default') Notification.requestPermission();
  if (!timerInterval) timerInterval = setInterval(updateTimer, 1000);
  updateTimer();
  renderControls(true);
}

function stopFast() {
  startTime = null;
  saveState();
  renderControls(false);
  updateTimer();
}

function resetFast() {
  startTime = null;
  saveState();
  renderControls(false);
  updateTimer();
}

function renderControls(running) {
  if (running) {
    $('#controls').innerHTML = `<button class="gz-btn" onclick="stopFast()">${t('stopFast')}</button><button class="gz-btn gz-btn-secondary" onclick="resetFast()">${t('resetFast')}</button>`;
  } else {
    $('#controls').innerHTML = `<button class="gz-btn" onclick="startFast()">${t('startFast')}</button>`;
  }
}

// Render presets
$('#presets').innerHTML = presets.map(p =>
  `<button class="${targetHours === p.hours && !startTime ? 'active' : ''}" onclick="setPreset(${p.hours},this)">${t(p.label)} (${p.hours}h)</button>`
).join('') + `<button class="${!presets.find(p=>p.hours===targetHours) && !startTime ? 'active' : ''}" onclick="showCustom()">${t('custom')}</button>`;

function setPreset(h, btn) {
  if (startTime) return;
  targetHours = h;
  document.querySelectorAll('.fasting-presets button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateTimer();
}

function showCustom() {
  if (startTime) return;
  const h = prompt(t('customHours'), targetHours);
  if (h && !isNaN(h) && +h > 0 && +h <= 168) {
    targetHours = +h;
    document.querySelectorAll('.fasting-presets button').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    updateTimer();
  }
}

// Init
const isRunning = !!startTime;
renderControls(isRunning);
renderMilestones(0);
updateTimer();
if (isRunning) timerInterval = setInterval(updateTimer, 1000);

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔥', href:'/calc/calorie-calculator.html', name:'Calorie Calculator'},
    {icon:'💪', href:'/calc/macro-calculator.html', name:'Macro Calculator'},
    {icon:'💧', href:'/calc/water-intake.html', name:'Water Intake'},
    {icon:'😴', href:'/calc/sleep-calculator.html', name:'Sleep Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
