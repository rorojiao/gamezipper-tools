<script>
GZI18n.register({
  en: {
    toolTitle: 'WiFi Password Generator',
    toolDesc: 'Generate secure, random WiFi passwords instantly. Customize length and character types for WPA2/WPA3 networks.',
    generate: 'Generate Password',
    copy: 'Copy',
    clear: 'Clear',
    length: 'Password Length',
    uppercase: 'Uppercase (A-Z)',
    lowercase: 'Lowercase (a-z)',
    numbers: 'Numbers (0-9)',
    symbols: 'Symbols (!@#$%...)',
    excludeAmbiguous: 'Exclude ambiguous (0OoIl1)',
    strength: 'Strength',
    weak: 'Weak',
    fair: 'Fair',
    good: 'Good',
    strong: 'Strong',
    veryStrong: 'Very Strong',
    history: 'Recent Passwords',
    copied: 'Copied!',
    step1: 'Set your desired password length (8-64 characters)',
    step2: 'Choose which character types to include',
    step3: 'Click Generate to create a secure WiFi password',
    step4: 'Copy the password and update your router settings',
  },
  zh: {
    toolTitle: 'WiFi 密码生成器',
    toolDesc: '即时生成安全的随机 WiFi 密码。自定义长度和字符类型，适用于 WPA2/WPA3 网络。',
    generate: '生成密码',
    copy: '复制',
    clear: '清除',
    length: '密码长度',
    uppercase: '大写字母 (A-Z)',
    lowercase: '小写字母 (a-z)',
    numbers: '数字 (0-9)',
    symbols: '符号 (!@#$%...)',
    excludeAmbiguous: '排除易混淆字符 (0OoIl1)',
    strength: '强度',
    weak: '弱',
    fair: '一般',
    good: '良好',
    strong: '强',
    veryStrong: '非常强',
    history: '最近生成的密码',
    copied: '已复制！',
    step1: '设置所需的密码长度（8-64个字符）',
    step2: '选择要包含的字符类型',
    step3: '点击生成按钮创建安全的 WiFi 密码',
    step4: '复制密码并更新路由器设置',
  }
});

const { $, copyText, t } = GZ;
let currentPassword = '';
const historyList = [];

const UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const LOWER = 'abcdefghijklmnopqrstuvwxyz';
const DIGITS = '0123456789';
const SYMBOLS = '!@#$%^&*()_+-=[]{}|;:,.<>?';
const AMBIGUOUS = '0OoIl1';

function getCharPool() {
  let pool = '';
  if ($('#chk-upper').checked) pool += UPPER;
  if ($('#chk-lower').checked) pool += LOWER;
  if ($('#chk-numbers').checked) pool += DIGITS;
  if ($('#chk-symbols').checked) pool += SYMBOLS;
  if ($('#chk-ambiguous').checked) {
    pool = pool.split('').filter(c => !AMBIGUOUS.includes(c)).join('');
  }
  return pool;
}

function generatePassword() {
  const pool = getCharPool();
  if (!pool) return;
  const len = parseInt($('#pwd-length').value) || 16;
  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  currentPassword = Array.from(arr, x => pool[x % pool.length]).join('');
  $('#output').textContent = currentPassword;
  updateStrength();
  if (currentPassword && !historyList.includes(currentPassword)) {
    historyList.unshift(currentPassword);
    if (historyList.length > 5) historyList.pop();
    renderHistory();
  }
}

function calcStrength(pwd) {
  if (!pwd) return { score: 0, label: '', color: '' };
  let score = 0;
  if (pwd.length >= 8) score++;
  if (pwd.length >= 12) score++;
  if (pwd.length >= 16) score++;
  if (/[A-Z]/.test(pwd)) score++;
  if (/[a-z]/.test(pwd)) score++;
  if (/[0-9]/.test(pwd)) score++;
  if (/[^A-Za-z0-9]/.test(pwd)) score++;
  if (/[^A-Za-z0-9]{2,}/.test(pwd)) score++;
  const levels = [
    { min: 0, label: t('weak'), color: '#e94560' },
    { min: 3, label: t('fair'), color: '#ff6b35' },
    { min: 5, label: t('good'), color: '#ffc107' },
    { min: 7, label: t('strong'), color: '#4ecdc4' },
    { min: 8, label: t('veryStrong'), color: '#00d672' },
  ];
  let level = levels[0];
  for (const l of levels) { if (score >= l.min) level = l; }
  return { score, pct: Math.min(100, score * 12.5), ...level };
}

function updateStrength() {
  const s = calcStrength(currentPassword);
  $('#strength-fill').style.width = s.pct + '%';
  $('#strength-fill').style.background = s.color;
  $('#strength-label').textContent = currentPassword ? t('strength') + ': ' + s.label : '';
}

function renderHistory() {
  if (!historyList.length) { $('#history').innerHTML = ''; return; }
  $('#history').innerHTML = '<h3 style="font-size:.95rem;margin-bottom:8px">' + t('history') + '</h3>' +
    historyList.map(p => `<div class="gz-history-item"><span>${p}</span><button class="gz-btn gz-btn-secondary" style="padding:4px 10px;font-size:.75rem" onclick="copyText('${p.replace(/'/g,"\\'")}');this.textContent='${t('copied')}'">${t('copy')}</button></div>`).join('');
}

$('#options').innerHTML = `
  <div style="grid-column:1/-1;display:flex;align-items:center;gap:10px">
    <label>${t('length')}: <input type="number" id="pwd-length" value="16" min="8" max="64"></label>
  </div>
  <label><input type="checkbox" id="chk-upper" checked> ${t('uppercase')}</label>
  <label><input type="checkbox" id="chk-lower" checked> ${t('lowercase')}</label>
  <label><input type="checkbox" id="chk-numbers" checked> ${t('numbers')}</label>
  <label><input type="checkbox" id="chk-symbols" checked> ${t('symbols')}</label>
  <label><input type="checkbox" id="chk-ambiguous"> ${t('excludeAmbiguous')}</label>
`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generatePassword()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(currentPassword);this.textContent='${t('copied')}'">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="currentPassword='';$('#output').textContent='';updateStrength();historyList.length=0;renderHistory()">${t('clear')}</button>
`;

generatePassword();

GZ.renderToolPage(
    {icon:'🔐', href:'/dev/hash.html', name:'Hash Generator'},
    {icon:'📶', href:'/convert/wifi-qrcode.html', name:'WiFi QR Code'},
    {icon:'🛡️', href:'/text/password-strength-checker.html', name:'Password Strength'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
