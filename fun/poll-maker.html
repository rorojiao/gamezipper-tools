<style>
#poll-question{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:1.1em;margin-bottom:12px}
.option-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.option-row input{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:.95em}
.remove-btn{background:none;border:none;color:var(--gz-accent);cursor:pointer;font-size:1.2em;padding:4px 8px}
#poll-display{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:16px}
.poll-option{display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer;padding:8px;border:1px solid var(--border);border-radius:8px;transition:background .2s}
.poll-option:hover{background:var(--glass)}
.poll-option.voted{border-color:var(--gz-success)}
.poll-option input[type=radio]{accent-color:var(--gz-success)}
.result-bar-wrap{margin-bottom:10px}
.result-bar-label{display:flex;justify-content:space-between;font-size:.85em;margin-bottom:2px}
.result-bar-track{height:28px;background:var(--glass);border-radius:8px;overflow:hidden;position:relative}
.result-bar-fill{height:100%;border-radius:8px;transition:width .5s ease;display:flex;align-items:center;padding-left:8px;font-size:.8em;color:#fff;white-space:nowrap}
#chart-area{margin-top:16px;text-align:center}
#chart-area canvas{max-width:300px;max-height:300px}

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div id="editor"></div>
    <div id="poll-display" style="display:none"></div>
    <div id="chart-area"><canvas id="pie-chart" width="300" height="300"></canvas></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Online Poll Maker',
    toolDesc: 'Create free online polls instantly. Add questions and options, vote interactively, and see live results with bar charts and pie charts.',
    question: 'Your question',
    addOption: '+ Add Option',
    createPoll: 'Create Poll',
    vote: 'Vote',
    results: 'Results',
    resetPoll: 'Reset',
    backEdit: '← Edit Poll',
    votes: 'votes',
    totalVotes: 'Total votes',
    step1: 'Enter your poll question',
    step2: 'Add at least 2 answer options',
    step3: 'Click "Create Poll" to activate',
    step4: 'Vote and see live results with charts',
  },
  zh: {
    toolTitle: '在线投票生成器',
    toolDesc: '即时创建免费在线投票。添加问题和选项，交互式投票，实时查看柱状图和饼图结果。',
    question: '你的问题',
    addOption: '+ 添加选项',
    createPoll: '创建投票',
    vote: '投票',
    results: '结果',
    resetPoll: '重置',
    backEdit: '← 编辑投票',
    votes: '票',
    totalVotes: '总票数',
    step1: '输入投票问题',
    step2: '添加至少 2 个选项',
    step3: '点击「创建投票」激活',
    step4: '投票并查看实时图表结果',
  }
});

const { $, t } = GZ;
let options = ['', '', ''];
let votes = {};
let active = false;

function renderEditor() {
  $('#editor').style.display = active ? 'none' : 'block';
  if (active) return;
  const html = `<input id="poll-question" placeholder="${t('question')}" value="What's your favorite programming language?">
    <div id="options-list">${options.map((o, i) => `<div class="option-row"><input value="${o}" placeholder="Option ${i+1}" oninput="options[${i}]=this.value">${i >= 2 ? `<button class="remove-btn" onclick="removeOption(${i})">✕</button>` : ''}</div>`).join('')}</div>
    <button class="gz-btn gz-btn-secondary" onclick="addOption()" style="margin-top:4px">${t('addOption')}</button>`;
  $('#editor').innerHTML = html;
}

function addOption() { options.push(''); renderEditor(); }
function removeOption(i) { options.splice(i, 1); renderEditor(); }

function createPoll() {
  const q = $('#poll-question').value.trim();
  const valid = options.map(o => o.trim()).filter(o => o);
  if (!q || valid.length < 2) return;
  votes = {};
  valid.forEach(o => votes[o] = 0);
  active = true;
  renderEditor();
  renderPoll(q);
}

function renderPoll(q) {
  const total = Object.values(votes).reduce((a, b) => a + b, 0);
  const colors = ['#4ecdc4','#ff6b6b','#ffd93d','#6bcb77','#a855f7','#f97316','#06b6d4','#ec4899','#84cc16','#f43f5e'];
  let html = `<h3 style="margin-bottom:16px">${q}</h3>`;
  if (total === 0) {
    html += Object.keys(votes).map((o, i) => `<div class="poll-option" onclick="castVote('${o.replace(/'/g,"\\'")}')"><span style="width:12px;height:12px;border-radius:50%;background:${colors[i%colors.length]};display:inline-block;flex-shrink:0"></span> ${o}</div>`).join('');
  } else {
    html += Object.entries(votes).map(([o, v], i) => {
      const pct = total > 0 ? Math.round(v / total * 100) : 0;
      return `<div class="result-bar-wrap"><div class="result-bar-label"><span>${o}</span><span>${v} ${t('votes')} (${pct}%)</span></div><div class="result-bar-track"><div class="result-bar-fill" style="width:${pct}%;background:${colors[i%colors.length]}">${pct > 10 ? pct + '%' : ''}</div></div></div>`;
    }).join('');
    html += `<p style="text-align:center;opacity:.7;font-size:.85em;margin-top:12px">${t('totalVotes')}: ${total}</p>`;
    html += `<button class="gz-btn gz-btn-secondary" onclick="castVote('')" style="margin-top:8px;font-size:.85em">${t('vote')} (click to add)</button>`;
  }
  html += `<div style="margin-top:16px;display:flex;gap:8px"><button class="gz-btn" onclick="resetPoll()" style="font-size:.85em">${t('resetPoll')}</button><button class="gz-btn gz-btn-secondary" onclick="backToEdit()" style="font-size:.85em">${t('backEdit')}</button></div>`;
  $('#poll-display').style.display = 'block';
  $('#poll-display').innerHTML = html;
  drawPie(total, colors);
}

function castVote(option) {
  if (option) { votes[option] = (votes[option] || 0) + 1; }
  const q = $('#poll-question')?.value || 'Poll';
  const keys = Object.keys(votes);
  if (keys.length > 0) {
    const pick = option || keys[Math.floor(Math.random() * keys.length)];
    votes[pick] = (votes[pick] || 0) + 1;
  }
  renderPoll(q);
}

function drawPie(total, colors) {
  const canvas = $('#pie-chart');
  const ctx = canvas.getContext('2d');
  const cx = 150, cy = 150, r = 120;
  ctx.clearRect(0, 0, 300, 300);
  if (total === 0) {
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = '#444'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#888'; ctx.font = '14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('No votes yet', cx, cy + 5);
    return;
  }
  let start = -Math.PI / 2;
  Object.values(votes).forEach((v, i) => {
    const slice = (v / total) * Math.PI * 2;
    ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, start + slice);
    ctx.fillStyle = colors[i % colors.length]; ctx.fill();
    start += slice;
  });
  ctx.beginPath(); ctx.arc(cx, cy, 40, 0, Math.PI * 2);
  ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--bg').trim() || '#0a0a1a';
  ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(total, cx, cy);
}

function resetPoll() { Object.keys(votes).forEach(k => votes[k] = 0); renderPoll($('#poll-question')?.value || 'Poll'); }
function backToEdit() { active = false; renderEditor(); $('#poll-display').style.display = 'none'; drawPie(0, []); }

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="createPoll()">${t('createPoll')}</button>`;

renderEditor();
drawPie(0, []);

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎡', href:'/fun/decision-wheel.html', name:'Decision Wheel'},
    {icon:'🎯', href:'/fun/name-picker.html', name:'Name Picker'},
    {icon:'📊', href:'/image/chart-maker.html', name:'Chart Maker'},
    {icon:'🏆', href:'/fun/tournament-bracket.html', name:'Tournament'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
