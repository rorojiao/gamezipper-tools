const { $, copyText, t } = GZ;

function escapeXml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}

function isObj(v) { return v !== null && typeof v === 'object' && !Array.isArray(v); }

function buildXml(tag, value, indent) {
  const pad = '  '.repeat(indent);
  // Separate attributes (@-prefixed) and #text from real children
  const attrs = [];
  let textNode = null;
  const children = {};
  if (isObj(value)) {
    for (const [k, v] of Object.entries(value)) {
      if (k.startsWith('@')) attrs.push(`${k.slice(1)}="${escapeXml(v)}"`);
      else if (k === '#text') textNode = v;
      else children[k] = v;
    }
  }
  const attrStr = attrs.length ? ' ' + attrs.join(' ') : '';
  const childKeys = Object.keys(children);

  // Leaf: scalar value or no object children
  if (!isObj(value)) {
    if (Array.isArray(value)) {
      return value.map(item => buildXml(tag, item, indent)).join('\n');
    }
    // scalar
    if (value === null || value === undefined || value === '') return `${pad}<${tag}${attrStr} />`;
    return `${pad}<${tag}${attrStr}>${escapeXml(value)}</${tag}>`;
  }

  if (childKeys.length === 0) {
    if (textNode !== null) return `${pad}<${tag}${attrStr}>${escapeXml(textNode)}</${tag}>`;
    return `${pad}<${tag}${attrStr} />`;
  }

  // Has children
  const inner = Object.entries(children).map(([k, v]) => buildXml(k, v, indent + 1)).join('\n');
  if (textNode !== null) {
    return `${pad}<${tag}${attrStr}>${escapeXml(textNode)}\n${inner}\n${pad}</${tag}>`;
  }
  return `${pad}<${tag}${attrStr}>\n${inner}\n${pad}</${tag}>`;
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').innerHTML = ''; $('#status').innerHTML = ''; return; }
  try {
    const obj = jsyaml.load(inp);
    if (obj === null || obj === undefined) throw new Error('Empty YAML');
    if (!isObj(obj) || Object.keys(obj).length !== 1) {
      throw new Error('Top-level YAML must have exactly one root key');
    }
    const rootTag = Object.keys(obj)[0];
    let xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
    xml += buildXml(rootTag, obj[rootTag], 0);
    $('#output').textContent = xml;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')}</span>`;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ ${e.message}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
  }
}

  convert();
}
