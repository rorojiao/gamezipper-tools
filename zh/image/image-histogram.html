<script>
GZI18n.register({
  en: {
    toolTitle: 'Image Histogram Analyzer',
    toolDesc: 'Analyze image color histograms — view RGB channel distribution, luminance, brightness and contrast stats. Drag and drop, no upload.',
    drop: '📷 Drag & drop an image or click to browse',
    meanR: 'Mean R', meanG: 'Mean G', meanB: 'Mean B',
    meanLuma: 'Mean Luma', contrast: 'Contrast', brightness: 'Brightness',
    totalPixels: 'Total Pixels', dominant: 'Dominant',
    step1: 'Drop or select an image file',
    step2: 'View the RGB and luminance histograms',
    step3: 'Check brightness, contrast and channel statistics',
    step4: 'Toggle channels on/off to compare distributions',
  },
  zh: {
    toolTitle: '图片直方图分析器',
    toolDesc: '分析图片色彩直方图 — 查看 RGB 通道分布、亮度、对比度统计。拖拽上传，无需上传到服务器。',
    drop: '📷 拖拽图片到此处或点击选择文件',
    meanR: '均值 R', meanG: '均值 G', meanB: '均值 B',
    meanLuma: '均值亮度', contrast: '对比度', brightness: '亮度',
    totalPixels: '总像素', dominant: '主导通道',
    step1: '拖拽或选择图片文件',
    step2: '查看 RGB 和亮度直方图',
    step3: '检查亮度、对比度和通道统计',
    step4: '切换通道开关来比较分布',
  }
});

const { $, t } = GZ;
let histData = null;
const channels = {r:true,g:true,b:true,l:true};

function toggleCh(btn, ch) {
  channels[ch] = !channels[ch];
  btn.classList.toggle('active');
  if (histData) drawHist();
}

function analyze(img) {
  const canvas = document.createElement('canvas');
  const w = Math.min(img.naturalWidth, 800);
  const h = Math.round(img.naturalHeight * w / img.naturalWidth);
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, w, h);
  const data = ctx.getImageData(0, 0, w, h).data;
  const rH = new Uint32Array(256), gH = new Uint32Array(256), bH = new Uint32Array(256), lH = new Uint32Array(256);
  let sumR=0,sumG=0,sumB=0,sumL=0,n=w*h;
  for (let i=0;i<data.length;i+=4){
    const r=data[i],g=data[i+1],b=data[i+2];
    rH[r]++; gH[g]++; bH[b]++;
    const l=Math.round(0.299*r+0.587*g+0.114*b);
    lH[l]++;
    sumR+=r; sumG+=g; sumB+=b; sumL+=l;
  }
  const meanR=sumR/n, meanG=sumG/n, meanB=sumB/n, meanL=sumL/n;
  let contrastSum=0;
  for (let i=0;i<data.length;i+=4){
    const l=0.299*data[i]+0.587*data[i+1]+0.114*data[i+2];
    contrastSum+=(l-meanL)*(l-meanL);
  }
  const contrast = Math.sqrt(contrastSum/n);
  histData = {rH,gH,bH,lH,meanR,meanG,meanB,meanL,contrast,n};
  drawHist();
  const dom = meanR>=meanG&&meanR>=meanB?'Red':meanG>=meanB?'Green':'Blue';
  $('#stats').innerHTML = `
    <div class="stat-card"><div class="val" style="color:#e94560">${meanR.toFixed(1)}</div><div class="lbl">${t('meanR')}</div></div>
    <div class="stat-card"><div class="val" style="color:#00d672">${meanG.toFixed(1)}</div><div class="lbl">${t('meanG')}</div></div>
    <div class="stat-card"><div class="val" style="color:#61afef">${meanB.toFixed(1)}</div><div class="lbl">${t('meanB')}</div></div>
    <div class="stat-card"><div class="val">${meanL.toFixed(1)}</div><div class="lbl">${t('meanLuma')}</div></div>
    <div class="stat-card"><div class="val">${contrast.toFixed(1)}</div><div class="lbl">${t('contrast')}</div></div>
    <div class="stat-card"><div class="val">${(meanL/255*100).toFixed(0)}%</div><div class="lbl">${t('brightness')}</div></div>
    <div class="stat-card"><div class="val">${(n/1000000).toFixed(2)}M</div><div class="lbl">${t('totalPixels')}</div></div>
    <div class="stat-card"><div class="val">${dom}</div><div class="lbl">${t('dominant')}</div></div>`;
}

function drawHist() {
  if (!histData) return;
  const canvas=$('#histCanvas'), ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const maxVal = Math.max(
    ...(channels.r?histData.rH:[]),
    ...(channels.g?histData.gH:[]),
    ...(channels.b?histData.bH:[]),
    ...(channels.l?histData.lH:[])
  ) || 1;
  const w=canvas.width, h=canvas.height;
  function drawCurve(hist, color) {
    ctx.beginPath();
    ctx.moveTo(0, h);
    for (let i=0;i<256;i++){
      const x = i/255*w;
      const y = h - (hist[i]/maxVal)*h*0.95;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(w, h);
    ctx.closePath();
    ctx.fillStyle = color + '33';
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let i=0;i<256;i++){
      const x = i/255*w;
      const y = h - (hist[i]/maxVal)*h*0.95;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
  if(channels.r) drawCurve(histData.rH, '#e94560');
  if(channels.g) drawCurve(histData.gH, '#00d672');
  if(channels.b) drawCurve(histData.bH, '#61afef');
  if(channels.l) drawCurve(histData.lH, '#888888');
}

const drop=$('#drop'), file=$('#file');
drop.addEventListener('click',()=>file.click());
drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('dragover')});
drop.addEventListener('dragleave',()=>drop.classList.remove('dragover'));
drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('dragover');loadFile(e.dataTransfer.files[0])});
file.addEventListener('change',e=>loadFile(e.target.files[0]));

function loadFile(f) {
  if(!f||!f.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = $('#preview');
    img.src = e.target.result;
    img.style.display = 'block';
    img.onload = () => analyze(img);
  };
  reader.readAsDataURL(f);
}

  ]
});
</script>
