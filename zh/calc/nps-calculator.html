<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is NPS (Net Promoter Score)?", "acceptedAnswer": {"@type": "Answer", "text": "NPS stands for Net Promoter Score, a customer loyalty metric introduced by Fred Reichheld in 2003. It measures how likely customers are to recommend your product or service on a 0–10 scale. The score ranges from -100 to +100 and is calculated as %Promoters minus %Detractors."}}, {"@type": "Question", "name": "How is NPS calculated?", "acceptedAnswer": {"@type": "Answer", "text": "NPS = % of Promoters (score 9–10) − % of Detractors (score 0–6). Passives (score 7–8) are not counted. For example, if 60% of respondents are Promoters and 20% are Detractors, NPS = 60 − 20 = 40."}}, {"@type": "Question", "name": "What is a good NPS score?", "acceptedAnswer": {"@type": "Answer", "text": "An NPS above 0 is good, above 20 is favorable, above 50 is excellent, and above 80 is world-class. The global average is around 32. SaaS and tech companies typically score higher (40+) while airlines and telecoms tend to score lower (10-30)."}}, {"@type": "Question", "name": "Is my customer data sent to any server?", "acceptedAnswer": {"@type": "Answer", "text": "No. This NPS calculator runs entirely in your browser. The promoter, passive and detractor counts you enter never leave your device, making it safe for confidential customer data."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'NPS Calculator',
    toolDesc: 'Calculate your Net Promoter Score (NPS) instantly. Enter promoter, passive and detractor counts to get the score, distribution, interpretation and industry benchmarks.',
    promoters: 'Promoters (9–10)',
    passives: 'Passives (7–8)',
    detractors: 'Detractors (0–6)',
    total: 'Total Responses',
    promoterPct: '% Promoters',
    passivePct: '% Passives',
    detractorPct: '% Detractors',
    benchmarksTitle: 'NPS Benchmarks by Industry',
    industryCol: 'Industry',
    avgScore: 'Avg NPS',
    excellent: '🌟 Excellent — World-class customer loyalty',
    great: '😊 Great — Strong customer advocacy',
    good: '👍 Good — Above average performance',
    okay: '🙂 Okay — Room for improvement',
    poor: '😟 Poor — Action recommended',
    critical: '🚨 Critical — Urgent attention needed',
    industryLabel: 'Compare to industry: ',
    step1: 'Enter the number of Promoters (customers who answered 9 or 10)',
    step2: 'Enter the number of Passives (answered 7 or 8)',
    step3: 'Enter the number of Detractors (answered 0 through 6)',
    step4: 'Read your NPS score, segment breakdown and industry benchmark',
    calculate: 'Recalculate',
    copy: 'Copy Score'
  },
  zh: {
    toolTitle: 'NPS 净推荐值计算器',
    toolDesc: '即时计算净推荐值（NPS）。输入推荐者、被动者和贬损者数量，得到分数、分布解读和行业基准对比。',
    promoters: '推荐者（9–10 分）',
    passives: '被动者（7–8 分）',
    detractors: '贬损者（0–6 分）',
    total: '总回复数',
    promoterPct: '推荐者占比',
    passivePct: '被动者占比',
    detractorPct: '贬损者占比',
    benchmarksTitle: 'NPS 行业基准',
    industryCol: '行业',
    avgScore: '平均 NPS',
    excellent: '🌟 卓越 — 世界级客户忠诚度',
    great: '😊 优秀 — 强大的客户口碑',
    good: '👍 良好 — 高于平均水平',
    okay: '🙂 一般 — 有改进空间',
    poor: '😟 较差 — 建议立即改进',
    critical: '🚨 严重 — 需紧急关注',
    industryLabel: '对比行业：',
    step1: '输入推荐者数量（打 9 或 10 分的客户）',
    step2: '输入被动者数量（打 7 或 8 分）',
    step3: '输入贬损者数量（打 0–6 分）',
    step4: '查看 NPS 分数、分布和行业基准',
    calculate: '重新计算',
    copy: '复制分数'
  }
});

const { $, t, copyText } = GZ;

const BENCHMARKS = [
  { industry: 'SaaS / Software',         score: 40, en: 'SaaS / Software',         zh: 'SaaS / 软件' },
  { industry: 'E-commerce / Retail',     score: 45, en: 'E-commerce / Retail',     zh: '电商 / 零售' },
  { industry: 'Financial Services',      score: 30, en: 'Financial Services',      zh: '金融服务' },
  { industry: 'Healthcare',              score: 33, en: 'Healthcare',              zh: '医疗健康' },
  { industry: 'Telecommunications',      score: 20, en: 'Telecommunications',      zh: '电信' },
  { industry: 'Airlines',                score: 18, en: 'Airlines',                zh: '航空' },
  { industry: 'Insurance',               score: 25, en: 'Insurance',               zh: '保险' },
  { industry: 'Restaurants / Food',      score: 35, en: 'Restaurants / Food',      zh: '餐饮' },
  { industry: 'Banking',                 score: 28, en: 'Banking',                 zh: '银行' },
  { industry: 'Education / EdTech',      score: 43, en: 'Education / EdTech',      zh: '教育 / EdTech' },
  { industry: 'Travel & Hospitality',    score: 24, en: 'Travel & Hospitality',    zh: '旅游酒店' },
  { industry: 'Streaming / Media',       score: 32, en: 'Streaming / Media',       zh: '流媒体' },
  { industry: 'Gaming',                  score: 44, en: 'Gaming',                  zh: '游戏' },
  { industry: 'Consumer Electronics',     score: 41, en: 'Consumer Electronics',     zh: '消费电子' },
  { industry: 'Automotive',              score: 38, en: 'Automotive',              zh: '汽车' },
  { industry: 'Global Average',          score: 32, en: 'Global Average',          zh: '全球平均' }
];

function interpret(score) {
  if (score >= 80) return { en: 'excellent', zh: 'excellent' };
  if (score >= 50) return { en: 'great',     zh: 'great' };
  if (score >= 20) return { en: 'good',      zh: 'good' };
  if (score >= 0)  return { en: 'okay',      zh: 'okay' };
  if (score >= -30) return { en: 'poor',     zh: 'poor' };
  return { en: 'critical', zh: 'critical' };
}

function recalc() {
  const p = Math.max(0, parseInt($('#promoters').value) || 0);
  const pa = Math.max(0, parseInt($('#passives').value) || 0);
  const d = Math.max(0, parseInt($('#detractors').value) || 0);
  const total = p + pa + d;
  if (total === 0) {
    $('#score-num').textContent = '—';
    $('#score-interpret').textContent = '—';
    $('#bar-promoter').style.width = '0%'; $('#bar-promoter').textContent = '';
    $('#bar-passive').style.width = '0%'; $('#bar-passive').textContent = '';
    $('#bar-detractor').style.width = '0%'; $('#bar-detractor').textContent = '';
    $('#stat-total').textContent = '0';
    $('#stat-prom').textContent = '0%';
    $('#stat-pass').textContent = '0%';
    $('#stat-detr').textContent = '0%';
    return null;
  }
  const pPct = (p / total) * 100;
  const paPct = (pa / total) * 100;
  const dPct = (d / total) * 100;
  const nps = Math.round(pPct - dPct);
  $('#score-num').textContent = nps;
  const inter = interpret(nps);
  const lang = GZI18n.getLang();
  $('#score-interpret').textContent = t(inter[lang] || inter.en);
  $('#bar-promoter').style.width = pPct + '%';
  $('#bar-passive').style.width = paPct + '%';
  $('#bar-detractor').style.width = dPct + '%';
  $('#bar-promoter').textContent = pPct >= 8 ? Math.round(pPct) + '%' : '';
  $('#bar-passive').textContent = paPct >= 8 ? Math.round(paPct) + '%' : '';
  $('#bar-detractor').textContent = dPct >= 8 ? Math.round(dPct) + '%' : '';
  $('#stat-total').textContent = total;
  $('#stat-prom').textContent = pPct.toFixed(1) + '%';
  $('#stat-pass').textContent = paPct.toFixed(1) + '%';
  $('#stat-detr').textContent = dPct.toFixed(1) + '%';
  return nps;
}

function renderBenchmarks() {
  const lang = GZI18n.getLang();
  const tbody = $('#bench-table tbody');
  tbody.innerHTML = BENCHMARKS.slice().sort((a, b) => b.score - a.score).map(b =>
    `<tr><td>${b[lang] || b.en}</td><td class="bench-score">${b.score > 0 ? '+' : ''}${b.score}</td></tr>`
  ).join('');
}

function populateIndustry() {
  const lang = GZI18n.getLang();
  const sel = $('#industry');
  const opts = ['<option value="">— ' + (lang === 'zh' ? '选择行业对比' : 'Choose an industry to compare') + ' —</option>'];
  BENCHMARKS.forEach(b => {
    const label = (b[lang] || b.en) + ' (avg ' + (b.score > 0 ? '+' : '') + b.score + ')';
    opts.push('<option value="' + b.score + '">' + label + '</option>');
  });
  sel.innerHTML = opts.join('');
}

$('#industry').addEventListener('change', () => {
  const benchmark = parseFloat($('#industry').value);
  if (isNaN(benchmark)) return;
  const cur = recalc();
  if (cur === null) return;
  const lang = GZI18n.getLang();
  const diff = cur - benchmark;
  const sign = diff > 0 ? '+' : '';
  const cmp = lang === 'zh'
    ? `对比所选行业平均 (${benchmark})：${sign}${diff}`
    : `vs selected industry average (${benchmark}): ${sign}${diff}`;
  alert(cmp);
});

$('#toolbar').innerHTML =
  '<button class="gz-btn" onclick="recalc()">' + t('calculate') + '</button>' +
  '<button class="gz-btn gz-btn-secondary" onclick="copyNps()">' + t('copy') + '</button>';

function copyNps() {
  const n = $('#score-num').textContent;
  const i = $('#score-interpret').textContent;
  if (n === '—') return;
  copyText(`NPS: ${n} — ${i}`);
}

['promoters','passives','detractors'].forEach(id => $('#'+id).addEventListener('input', recalc));

populateIndustry();
recalc();
renderBenchmarks();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/calc/ab-test-calculator.html', name:'A/B Test Calculator'},
    {icon:'📈', href:'/calc/sample-size-calculator.html', name:'Sample Size Calculator'},
    {icon:'🎯', href:'/calc/confidence-interval-calculator.html', name:'Confidence Interval'},
    {icon:'📉', href:'/calc/z-score-calculator.html', name:'Z-Score Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
