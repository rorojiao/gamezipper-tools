<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="sp-grid">
      <div class="sp-card left">
        <div class="label" id="lbl-left">🔊 LEFT</div>
        <div class="sub" id="lbl-left-sub">Play tone on the left channel only</div>
        <button class="sp-btn" id="btn-left" onclick="toggleChannel('left')">▶ <span data-i18n="playLeft">Play Left</span></button>
      </div>
      <div class="sp-card right">
        <div class="label" id="lbl-right">RIGHT 🔊</div>
        <div class="sub" id="lbl-right-sub">Play tone on the right channel only</div>
        <button class="sp-btn" id="btn-right" onclick="toggleChannel('right')">▶ <span data-i18n="playRight">Play Right</span></button>
      </div>
      <div class="sp-card both" style="grid-column:1 / -1">
        <div class="label" id="lbl-both">🔊🔊 STEREO</div>
        <div class="sub" id="lbl-both-sub">Play both channels at once to test balance</div>
        <button class="sp-btn" id="btn-both" onclick="toggleChannel('both')">▶ <span data-i18n="playBoth">Play Stereo</span></button>
      </div>
    </div>
    <div class="sp-vis"><div class="bar" id="vis-l"></div><div class="bar r" id="vis-r"></div></div>
    <div class="sp-controls">
      <label><span id="lbl-freq">Frequency (Hz)</span>
        <input type="range" id="freq" min="20" max="20000" value="440" step="1" oninput="updateFreq()">
        <span id="freq-val" style="font-family:monospace;font-size:.85em">440 Hz</span>
      </label>
      <label><span id="lbl-vol">Volume</span>
        <input type="range" id="vol" min="0" max="100" value="30" oninput="updateVol()">
        <span id="vol-val" style="font-family:monospace;font-size:.85em">30%</span>
      </label>
      <label><span id="lbl-wave">Waveform</span>
        <select id="wave" onchange="updateWave()">
          <option value="sine">Sine</option>
          <option value="square">Square</option>
          <option value="triangle">Triangle</option>
          <option value="sawtooth">Sawtooth</option>
        </select>
      </label>
      <label><span id="lbl-sweep">Sweep test</span>
        <button class="sp-btn sec" onclick="runSweep()" id="btn-sweep">🌀 <span data-i18n="sweep">Frequency Sweep</span></button>
      </label>
    </div>
    <div class="sp-tip" id="tip"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Speaker & Headphone Test',
    toolDesc: 'Play left-only, right-only and stereo test tones to verify your speakers, earbuds or surround setup. Pure browser Web Audio — no install, no uploads.',
    playLeft: 'Play Left', playRight: 'Play Right', playBoth: 'Play Stereo',
    sweep: 'Frequency Sweep', stop: '■ Stop',
    step1: 'Put on your headphones or sit centered between your speakers',
    step2: 'Click "Play Left" — you should only hear sound from the left side',
    step3: 'Click "Play Right" — the sound should now come from the right side only',
    step4: 'Adjust frequency and volume; run a sweep to test the full range',
    tipText: '💡 If the Left button plays from the right side, your channels are reversed — swap your headphone orientation or speaker cables. To enable true stereo testing, disable "Mono Audio" in your operating system accessibility settings.',
  },
  zh: {
    toolTitle: '音箱 / 耳机左右声道测试',
    toolDesc: '播放仅左声道、仅右声道和立体声测试音，验证你的音箱、耳机或环绕声系统。纯浏览器 Web Audio 实现，无需安装，不上传任何数据。',
    playLeft: '播放左声道', playRight: '播放右声道', playBoth: '播放立体声',
    sweep: '频率扫描', stop: '■ 停止',
    step1: '戴上耳机，或在两个音箱正中坐下',
    step2: '点击「播放左声道」— 应该只在左侧听到声音',
    step3: '点击「播放右声道」— 声音应只从右侧发出',
    step4: '调节频率和音量；运行频率扫描测试全频段',
    tipText: '💡 如果「左声道」按钮的声音从右侧发出，说明左右接反了 — 调换耳机方向或音箱接线。要进行真正的立体声测试，请在操作系统辅助功能中关闭「单声道音频」。',
  }
});

const { $, copyText, t } = GZ;
let actx = null, oscL = null, oscR = null, gainL = null, gainR = null, merger = null;
let analyser = null, dataArray = null, rafId = null;
let activeMode = null, sweepTimer = null;

function ensureCtx() {
  if (!actx) {
    actx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = actx.createAnalyser();
    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    analyser.connect(actx.destination);
  }
  if (actx.state === 'suspended') actx.resume();
}

function getFreq() { return Math.max(20, Math.min(20000, +$('#freq').value)); }
function getVol() { return (+$('#vol').value) / 100 * 0.4; } // safety cap
function getWave() { return $('#wave').value; }

function buildGraph(mode) {
  teardownGraph();
  ensureCtx();
  merger = actx.createChannelMerger(2);
  gainL = actx.createGain(); gainR = actx.createGain();
  gainL.gain.value = 0; gainR.gain.value = 0;
  gainL.connect(merger, 0, 0);
  gainR.connect(merger, 0, 1);
  merger.connect(analyser);
  oscL = actx.createOscillator(); oscL.type = getWave(); oscL.frequency.value = getFreq();
  oscR = actx.createOscillator(); oscR.type = getWave(); oscR.frequency.value = getFreq();
  oscL.connect(gainL); oscR.connect(gainR);
  oscL.start(); oscR.start();
  const v = getVol();
  if (mode === 'left') gainL.gain.value = v;
  else if (mode === 'right') gainR.gain.value = v;
  else { gainL.gain.value = v; gainR.gain.value = v; }
  activeMode = mode;
  startVis();
}

function teardownGraph() {
  try { if (oscL) oscL.stop(); } catch(e){}
  try { if (oscR) oscR.stop(); } catch(e){}
  oscL = null; oscR = null; gainL = null; gainR = null; merger = null;
}

function stopAll() {
  teardownGraph();
  if (sweepTimer) { clearInterval(sweepTimer); sweepTimer = null; }
  activeMode = null;
  ['btn-left','btn-right','btn-both','btn-sweep'].forEach(id => {
    const b = $('#'+id); if (!b) return;
    b.classList.remove('playing');
    const span = b.querySelector('span');
    const map = { 'btn-left':'playLeft', 'btn-right':'playRight', 'btn-both':'playBoth', 'btn-sweep':'sweep' };
    if (span && map[id]) { b.innerHTML = (id==='btn-sweep'?'🌀 ':'▶ ') + '<span data-i18n="'+map[id]+'">'+t(map[id])+'</span>'; }
  });
  stopVis();
  $('#vis-l').style.height = '4px'; $('#vis-r').style.height = '4px';
}

function toggleChannel(mode) {
  if (activeMode === mode) { stopAll(); return; }
  stopAll();
  buildGraph(mode);
  const btnMap = { left:'btn-left', right:'btn-right', both:'btn-both' };
  const btn = $('#'+btnMap[mode]);
  btn.classList.add('playing');
  btn.innerHTML = '■ <span>'+t('stop')+'</span>';
}

function updateFreq() {
  const f = getFreq();
  $('#freq-val').textContent = f + ' Hz';
  if (oscL) oscL.frequency.setValueAtTime(f, actx.currentTime);
  if (oscR) oscR.frequency.setValueAtTime(f, actx.currentTime);
}
function updateVol() {
  const v = getVol();
  $('#vol-val').textContent = $('#vol').value + '%';
  if (gainL && (activeMode==='left'||activeMode==='both')) gainL.gain.setValueAtTime(v, actx.currentTime);
  if (gainR && (activeMode==='right'||activeMode==='both')) gainR.gain.setValueAtTime(v, actx.currentTime);
}
function updateWave() {
  if (oscL) oscL.type = getWave();
  if (oscR) oscR.type = getWave();
}

function runSweep() {
  if (sweepTimer) { stopAll(); return; }
  stopAll();
  buildGraph('both');
  const btn = $('#btn-sweep');
  btn.classList.add('playing');
  btn.innerHTML = '■ <span>'+t('stop')+'</span>';
  let f = 20;
  $('#freq').value = 20; updateFreq();
  sweepTimer = setInterval(() => {
    f = f * 1.05;
    if (f > 20000) { stopAll(); return; }
    $('#freq').value = Math.min(20000, Math.round(f));
    updateFreq();
  }, 60);
}

function startVis() {
  function loop() {
    if (!analyser) return;
    analyser.getByteFrequencyData(dataArray);
    // crude stereo estimate: split bins
    let lsum = 0, rsum = 0;
    const half = dataArray.length >> 1;
    for (let i=0;i<half;i++) lsum += dataArray[i];
    for (let i=half;i<dataArray.length;i++) rsum += dataArray[i];
    const lh = Math.min(90, (lsum/half)/2.5 + (activeMode==='left'||activeMode==='both'?10:0));
    const rh = Math.min(90, (rsum/half)/2.5 + (activeMode==='right'||activeMode==='both'?10:0));
    $('#vis-l').style.height = Math.max(4, lh) + 'px';
    $('#vis-r').style.height = Math.max(4, rh) + 'px';
    rafId = requestAnimationFrame(loop);
  }
  loop();
}
function stopVis() { if (rafId) cancelAnimationFrame(rafId); rafId = null; }

window.addEventListener('beforeunload', stopAll);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="stopAll()">${t('clear')}</button>
  <span style="margin-left:auto;font-size:.8rem;color:var(--text2)" id="status-text"></span>`;
$('#tip').textContent = t('tipText');

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎤', href:'/dev/microphone-test.html', name:'Microphone Test'},
    {icon:'📷', href:'/dev/webcam-test.html', name:'Webcam Test'},
    {icon:'🎚️', href:'/fun/tone-generator.html', name:'Tone Generator'},
    {icon:'⚡', href:'/dev/speed-test.html', name:'Speed Test'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
