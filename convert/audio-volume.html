<body>
<div class="gz-container">
  <div class="gz-tool-header">

  </div>
  <div class="gz-tool-area">

      <input type="file" id="fileInput" accept="audio/*">
    </label>
    <div class="av-controls">
      <div class="av-control">

          <option value="normalize-lufs" id="opt-lufs">Normalize to LUFS</option>

        <select id="target">
          <option value="-14">-14 LUFS (Spotify, YouTube)</option>
          <option value="-16">-16 LUFS (Podcasts)</option>
          <option value="-23">-23 LUFS (Broadcast)</option>
          <option value="-1">-1 dB (Peak)</option>
          <option value="-3">-3 dB (Peak)</option>
        </select>
      </div>
      <div class="av-control">
        <label id="lbl-gain">Manual Gain: <span id="gainVal">0</span> dB</label>
        <input type="range" id="gainSlider" min="-24" max="24" step="0.5" value="0" disabled>
      </div>
    </div>
    <div class="av-preview" id="preview" style="display:none">
      <div style="font-weight:600" id="fileName"></div>

      <div style="margin-top:18px;font-weight:600;color:var(--accent)" id="lbl-result">Processed Output</div>
      <audio id="audioOut" controls></audio>
      <div class="av-meter"><div class="av-meter-fill" id="outMeter"></div></div>
      <div class="av-stats" id="outStats"></div>
      <div class="gz-toolbar" style="margin-top:14px">
        <button class="gz-btn" id="processBtn">⚙️ <span id="lbl-process">Process</span></button>
        <button class="gz-btn gz-btn-secondary" id="downloadBtn">💾 <span id="lbl-download">Download WAV</span></button>

  </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Audio Volume Normalizer & Booster',
    toolDesc: 'Normalize loudness to LUFS or peak dB, or apply manual gain. Boost quiet audio, level podcasts — 100% in your browser.',
    dzText: 'Click or drag an audio file (MP3, WAV, OGG, M4A)',
    mode: 'Mode',
    target: 'Target Level',
    gain: 'Manual Gain',
    optLufs: 'Normalize to LUFS',
    optPeak: 'Normalize to Peak dB',
    optManual: 'Manual Gain',
    process: 'Process',
    download: 'Download WAV',
    noFile: 'Please select an audio file',

    result: 'Processed Output',
    file: 'File',

    rms: 'RMS',
    estLufs: 'Est. LUFS',
    applyGain: 'Apply gain',
    peakLimit: 'Peak limited to',
    gainApplied: 'Gain applied',
    step1: 'Upload an audio file (MP3, WAV, OGG, M4A)',
    step2: 'Pick a mode: LUFS normalization, peak dB target, or manual gain',
    step3: 'Click Process — analysis and re-encoding run in your browser',
    step4: 'Listen to the preview, then download the normalized WAV file',
    dB: 'dB',
    sec: 's',
  },
  zh: {
    toolTitle: '音频音量标准化 & 增强器',
    toolDesc: '按 LUFS 或峰值 dB 标准化响度，或应用手动增益。增强静音音频、统一播客音量 — 100% 浏览器本地运行。',
    dzText: '点击或拖拽音频文件 (MP3, WAV, OGG, M4A)',
    mode: '模式',
    target: '目标响度',
    gain: '手动增益',
    optLufs: 'LUFS 标准化',
    optPeak: '峰值 dB 标准化',
    optManual: '手动增益',
    process: '处理',
    download: '下载 WAV',
    noFile: '请先选择音频文件',
    orig: '原始',
    result: '处理结果',
    file: '文件',
    duration: '时长',
    peak: '峰值',
    rms: 'RMS',
    estLufs: '预估 LUFS',
    applyGain: '应用增益',
    peakLimit: '峰值限制',
    gainApplied: '已应用增益',
    step1: '上传音频文件 (MP3, WAV, OGG, M4A)',
    step2: '选择模式：LUFS 标准化、峰值 dB 目标或手动增益',
    step3: '点击「处理」— 分析与重编码完全在浏览器中完成',
    step4: '试听预览，然后下载标准化后的 WAV 文件',
    dB: 'dB',
    sec: '秒',
  }
});

const { $, t } = GZ;

let originalBuffer = null;
let originalURL = null;
let processedURL = null;
let processedGain = 0;

const fileInput = $('#fileInput');
const dropzone = $('#dropzone');
const mode = $('#mode');
const target = $('#target');
const gainSlider = $('#gainSlider');
const gainVal = $('#gainVal');
const preview = $('#preview');
const processBtn = $('#processBtn');
const downloadBtn = $('#downloadBtn');
const dzText = $('#dz-text');

['dragover','dragenter'].forEach(ev => dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.add('dragover'); }));
['dragleave','drop'].forEach(ev => dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.remove('dragover'); }));
dropzone.addEventListener('drop', e => { if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if (e.target.files.length) loadFile(e.target.files[0]); });

mode.addEventListener('change', () => {
  gainSlider.disabled = mode.value !== 'manual';
  target.disabled = mode.value === 'manual';
});
gainSlider.addEventListener('input', () => { gainVal.textContent = gainSlider.value; });

async function loadFile(file) {
  if (!file.type.startsWith('audio/') && !/\.(mp3|wav|ogg|m4a|aac|flac)$/i.test(file.name)) { alert('Please select an audio file'); return; }
  if (originalURL) URL.revokeObjectURL(originalURL);
  originalURL = URL.createObjectURL(file);
  $('#audioOrig').src = originalURL;
  $('#fileName').textContent = file.name + ' (' + (file.size/1024/1024).toFixed(2) + ' MB)';
  preview.style.display = 'block';
  dzText.textContent = file.name;
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const buf = await file.arrayBuffer();
  originalBuffer = await ctx.decodeAudioData(buf);
  await ctx.close();
  renderStats('#origStats', originalBuffer, 0, 0, file.name);
  setMeter('#origMeter', originalBuffer);
  if (processedURL) URL.revokeObjectURL(processedURL);
  processedURL = null; $('#audioOut').src = '';
  renderStats('#outStats', null, 0, 0, '');
  setMeter('#outMeter', 0);
  downloadBtn.disabled = true;
}

function setMeter(sel, buf) {
  let peak = 0;
  if (typeof buf === 'object' && buf) {
    for (let ch = 0; ch < buf.numberOfChannels; ch++) {
      const data = buf.getChannelData(ch);
      for (let i = 0; i < data.length; i++) {
        const abs = Math.abs(data[i]); if (abs > peak) peak = abs;
      }
    }
  }
  const db = peak > 0 ? 20 * Math.log10(peak) : -Infinity;
  const pct = Math.max(0, Math.min(100, ((db + 60) / 60) * 100));
  $(sel).style.width = pct + '%';
}

function analyze(buf) {
  let peak = 0, sumSq = 0, count = 0;
  for (let ch = 0; ch < buf.numberOfChannels; ch++) {
    const data = buf.getChannelData(ch);
    for (let i = 0; i < data.length; i++) {
      const abs = Math.abs(data[i]);
      if (abs > peak) peak = abs;
      sumSq += data[i] * data[i]; count++;
    }
  }
  const rms = Math.sqrt(sumSq / count);
  const peakDb = peak > 0 ? 20 * Math.log10(peak) : -Infinity;
  const rmsDb = rms > 0 ? 20 * Math.log10(rms) : -Infinity;
  const estLufs = rmsDb - 0.691;
  return { peakDb, rmsDb, estLufs, duration: buf.duration };
}

function renderStats(sel, buf, gain, peakLim, fileName) {
  if (!buf) { $(sel).innerHTML = ''; return; }
  const a = analyze(buf);
  const finalPeak = a.peakDb + gain;
  const cards = [
    { num: fileName || '—', lbl: t('file') },
    { num: a.duration.toFixed(1) + ' ' + t('sec'), lbl: t('duration') },
    { num: a.peakDb.toFixed(1) + ' ' + t('dB'), lbl: t('peak') },
    { num: a.rmsDb.toFixed(1) + ' ' + t('dB'), lbl: t('rms') },
    { num: a.estLufs.toFixed(1) + ' LUFS', lbl: t('estLufs') },
  ];
  if (gain !== 0) cards.push({ num: (gain > 0 ? '+' : '') + gain.toFixed(1) + ' ' + t('dB'), lbl: t('gainApplied') });
  if (peakLim !== 0) cards.push({ num: (peakLim > 0 ? '+' : '') + peakLim.toFixed(1) + ' ' + t('dB'), lbl: t('peakLimit') });
  $(sel).innerHTML = cards.map(c => `<div class="av-stat"><div class="num" style="${c.lbl===t('file')?'font-size:.85rem':''}">${c.num}</div><div class="lbl">${c.lbl}</div></div>`).join('');
}

processBtn.addEventListener('click', () => {
  if (!originalBuffer) { alert(t('noFile')); return; }
  const m = mode.value;
  const tgt = parseFloat(target.value);
  let gain = 0, peakLim = 0;
  if (m === 'manual') {
    gain = parseFloat(gainSlider.value);
  } else {
    const a = analyze(originalBuffer);
    if (m === 'normalize-lufs') gain = tgt - a.estLufs;
    else if (m === 'normalize-peak') gain = tgt - a.peakDb;
  }
  if (gain > 0) {
    const a = analyze(originalBuffer);
    const maxGain = -0.1 - a.peakDb;
    if (gain > maxGain) { peakLim = maxGain; gain = maxGain; }
  }
  const out = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(originalBuffer.numberOfChannels, originalBuffer.length, originalBuffer.sampleRate);
  const src = out.createBufferSource();
  src.buffer = originalBuffer;
  const gainNode = out.createGain();
  gainNode.gain.value = Math.pow(10, gain / 20);
  src.connect(gainNode).connect(out.destination);
  src.start();
  out.startRendering().then(rendered => {
    renderStats('#outStats', rendered, gain, peakLim, '');
    setMeter('#outMeter', rendered);
    if (processedURL) URL.revokeObjectURL(processedURL);
    processedURL = bufferToWavURL(rendered);
    $('#audioOut').src = processedURL;
    processedGain = gain;
    downloadBtn.disabled = false;
  });
});

function bufferToWavURL(audioBuffer) {
  const numCh = audioBuffer.numberOfChannels;
  const sampleRate = audioBuffer.sampleRate;
  const length = audioBuffer.length * numCh * 2 + 44;
  const buffer = new ArrayBuffer(length);
  const view = new DataView(buffer);
  const channels = [];
  for (let i = 0; i < numCh; i++) channels.push(audioBuffer.getChannelData(i));
  let offset = 0;
  const writeStr = s => { for (let i = 0; i < s.length; i++) view.setUint8(offset++, s.charCodeAt(i)); };
  writeStr('RIFF'); view.setUint32(offset, length - 8, true); offset += 4;
  writeStr('WAVE'); writeStr('fmt '); view.setUint32(offset, 16, true); offset += 4;
  view.setUint16(offset, 1, true); offset += 2;
  view.setUint16(offset, numCh, true); offset += 2;
  view.setUint32(offset, sampleRate, true); offset += 4;
  view.setUint32(offset, sampleRate * numCh * 2, true); offset += 4;
  view.setUint16(offset, numCh * 2, true); offset += 2;
  view.setUint16(offset, 16, true); offset += 2;
  writeStr('data'); view.setUint32(offset, length - 44, true); offset += 4;
  for (let i = 0; i < audioBuffer.length; i++) {
    for (let c = 0; c < numCh; c++) {
      let s = Math.max(-1, Math.min(1, channels[c][i]));
      view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      offset += 2;
    }
  }
  const blob = new Blob([buffer], { type: 'audio/wav' });
  return URL.createObjectURL(blob);
}

downloadBtn.addEventListener('click', () => {
  if (!processedURL) return;
  const a = document.createElement('a');
  a.href = processedURL;
  a.download = 'normalized-' + (processedGain > 0 ? '+' : '') + processedGain.toFixed(1) + 'dB.wav';
  a.click();
});

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔊', href:'/text/text-to-speech.html', name:'Text to Speech'},
    {icon:'🎤', href:'/text/speech-to-text.html', name:'Speech to Text'},
    {icon:'🔄', href:'/convert/text-binary-hex.html', name:'Text/Binary/Hex'},
    {icon:'📱', href:'/convert/qrcode.html', name:'QR Generator'},
  ]
});
</script>
