GZI18n.register({en:{toolTitle:'Gamepad Tester Online',toolDesc:'Test every controller button, trigger and analog stick in real time. Diagnose drift, dead zones and vibration — all locally in your browser.',waiting:'No controller detected. Connect by USB or Bluetooth, then press any controller button.',connected:'Controller connected',buttons:'Buttons & Triggers',sticks:'Analog Sticks',details:'Controller Details',index:'Index',mapping:'Mapping',axes:'Axes',btnCount:'Buttons',timestamp:'Timestamp',vibrate:'Test Vibration',stopVibration:'Stop Vibration',unsupported:'The Gamepad API is not supported in this browser.',noVibration:'Vibration is unavailable on this controller/browser.',faqTitle:'Gamepad Tester FAQ',q1:'How do I start the controller test?',a1:'Connect your controller, focus this tab and press any button. The tester will begin updating automatically.',q2:'How can I check stick drift?',a2:'Release both sticks and watch the X/Y numbers. They should settle near 0.000. A persistent offset may indicate drift.',q3:'Is my controller input private?',a3:'Yes. Gamepad input stays on this device and is never uploaded.',step1:'Connect your controller with USB or Bluetooth.',step2:'Press a button so the browser activates the controller.',step3:'Press buttons and move sticks to inspect every live input.',step4:'Release the sticks and check whether axis values return close to zero.'},zh:{toolTitle:'在线手柄测试器',toolDesc:'实时测试每个手柄按键、扳机键和摇杆，诊断漂移、死区和振动 — 全部在浏览器本地完成。',waiting:'未检测到手柄。请通过 USB 或蓝牙连接，然后按下任意手柄按键。',connected:'已连接手柄',buttons:'按键与扳机键',sticks:'模拟摇杆',details:'手柄详情',index:'索引',mapping:'映射',axes:'轴数量',btnCount:'按键数量',timestamp:'时间戳',vibrate:'测试振动',stopVibration:'停止振动',unsupported:'此浏览器不支持 Gamepad API。',noVibration:'此手柄或浏览器不支持振动。',faqTitle:'手柄测试常见问题',q1:'如何开始测试手柄？',a1:'连接手柄，让此标签页获得焦点，然后按任意按键，测试器会自动开始更新。',q2:'如何检测摇杆漂移？',a2:'松开两个摇杆并查看 X/Y 数字，它们应稳定在 0.000 附近。持续偏移可能表示漂移。',q3:'手柄输入是否私密？',a3:'是。手柄输入只在本设备读取，绝不会上传。',step1:'通过 USB 或蓝牙连接手柄。',step2:'按下任意手柄按键，让浏览器激活设备。',step3:'按键并移动摇杆，检查每个实时输入。',step4:'松开摇杆，检查轴值是否回到接近零。'}});
const{$,t}=GZ;let current=null,raf=0;
function shell(){return `<div class="gp-status" id="gp-status">${t('waiting')}</div><div class="gp-grid" id="gp-grid" hidden><section class="gp-panel"><h3>${t('buttons')}</h3><div class="gp-buttons" id="gp-buttons"></div></section><section class="gp-panel"><h3>${t('sticks')}</h3><div class="gp-sticks"><div class="gp-stick-wrap"><div class="gp-stick"><i class="gp-dot" id="left-dot"></i></div><div class="gp-axis" id="left-axis">X 0.000 · Y 0.000</div></div><div class="gp-stick-wrap"><div class="gp-stick"><i class="gp-dot" id="right-dot"></i></div><div class="gp-axis" id="right-axis">X 0.000 · Y 0.000</div></div></div><div id="extra-axes"></div></section><section class="gp-panel"><h3>${t('details')}</h3><div class="gp-meta" id="gp-meta"></div></section></div><section class="gp-faq"><h3>${t('faqTitle')}</h3>${[1,2,3].map(n=>`<details><summary>${t('q'+n)}</summary><p>${t('a'+n)}</p></details>`).join('')}</section>`}
$('#app').innerHTML=shell();$('#toolbar').innerHTML=`<button class="gz-btn" onclick="vibrate()">${t('vibrate')}</button><button class="gz-btn gz-btn-secondary" onclick="stopVibration()">${t('stopVibration')}</button>`;
function activePad(){const pads=navigator.getGamepads?navigator.getGamepads():[];return [...pads].find(Boolean)||null}
function buttonName(i){return ['A / Cross','B / Circle','X / Square','Y / Triangle','LB / L1','RB / R1','LT / L2','RT / R2','View / Share','Menu / Options','L3','R3','D-pad Up','D-pad Down','D-pad Left','D-pad Right','Home'][i]||`B${i}`}
function drawStick(id,x,y){const d=$(id);d.style.left=(50+x*42)+'%';d.style.top=(50+y*42)+'%'}
function update(){const p=activePad();if(!p){current=null;$('#gp-grid').hidden=true;$('#gp-status').textContent=t('waiting');raf=requestAnimationFrame(update);return}current=p;$('#gp-grid').hidden=false;$('#gp-status').innerHTML=`<span class="gp-live">● ${t('connected')}</span> — ${escapeHtml(p.id)}`;const box=$('#gp-buttons');if(box.children.length!==p.buttons.length)box.innerHTML=p.buttons.map((_,i)=>`<div class="gp-btn" id="gb${i}">${buttonName(i)}</div>`).join('');p.buttons.forEach((b,i)=>{const e=$('#gb'+i);e.classList.toggle('on',b.pressed||b.value>.5);e.textContent=`${buttonName(i)} ${b.value.toFixed(2)}`});const a=p.axes;drawStick('#left-dot',a[0]||0,a[1]||0);drawStick('#right-dot',a[2]||0,a[3]||0);$('#left-axis').textContent=`X ${(a[0]||0).toFixed(3)} · Y ${(a[1]||0).toFixed(3)}`;$('#right-axis').textContent=`X ${(a[2]||0).toFixed(3)} · Y ${(a[3]||0).toFixed(3)}`;$('#extra-axes').innerHTML=a.slice(4).map((v,i)=>`<div class="gp-axis">Axis ${i+4}: ${v.toFixed(4)}<div class="gp-meter"><i style="width:${Math.abs(v)*100}%"></i></div></div>`).join('');$('#gp-meta').innerHTML=`${t('index')}: ${p.index}<br>${t('mapping')}: ${escapeHtml(p.mapping||'standard')}<br>${t('axes')}: ${p.axes.length}<br>${t('btnCount')}: ${p.buttons.length}<br>${t('timestamp')}: ${Math.round(p.timestamp)}`;raf=requestAnimationFrame(update)}
function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
async function vibrate(){const p=activePad(),v=p&&(p.vibrationActuator||p.hapticActuators&&p.hapticActuators[0]);if(!v){$('#gp-status').textContent=t('noVibration');return}try{if(v.playEffect)await v.playEffect('dual-rumble',{duration:700,strongMagnitude:1,weakMagnitude:.6});else if(v.pulse)await v.pulse(1,700)}catch(e){$('#gp-status').textContent=t('noVibration')}}
function stopVibration(){const p=activePad(),v=p&&(p.vibrationActuator||p.hapticActuators&&p.hapticActuators[0]);if(v&&v.reset)v.reset()}
if(!('getGamepads'in navigator))$('#gp-status').textContent=t('unsupported');else update();
GZ.renderToolPage({category:'dev',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{icon:'⌨️',href:'/fun/keyboard-tester.html',name:'Keyboard Tester'},{icon:'🖱️',href:'/fun/mouse-test.html',name:'Mouse Test'},{icon:'🖥️',href:'/dev/monitor-test.html',name:'Monitor Test'},{icon:'🎤',href:'/dev/microphone-test.html',name:'Microphone Test'}]});
