<div class="gz-container">

  </div>

      <label><span id="lbl-speed"></span>
        <select id="speed">
          <option value="130">130 — Slow / Read Aloud</option>
          <option value="180">180 — Casual</option>
          <option value="200" selected>200 — Average Blog</option>
          <option value="250">250 — Fast Reader</option>

        </select>

    </div>
    <textarea id="input" rows="10" placeholder="" spellcheck="false" oninput="calcReading()"></textarea>
    <div class="rtc-grid">
      <div class="rtc-card"><div class="val" id="r-read">0s</div><div class="lbl" id="r-read-lbl"></div></div>

      <div class="rtc-card"><div class="val" id="r-words">0</div><div class="lbl" id="r-words-lbl"></div></div>
      <div class="rtc-card"><div class="val" id="r-chars">0</div><div class="lbl" id="r-chars-lbl"></div></div>

  </div>

  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Reading Time Calculator',
    toolDesc: 'Estimate how long it takes to read any text. Paste an article or blog post and get instant reading time, speaking time, word count and character count.',
    speed: 'Reading Speed (WPM)',
    readTime: 'Reading Time',
    speakTime: 'Speaking Time',
    words: 'Words',
    chars: 'Characters',
    sentences: 'Sentences',
    paragraphs: 'Paragraphs',
    step1: 'Paste or type your text into the input area',
    step2: 'Choose a reading speed that matches your audience',
    step3: 'See instant reading time, speaking time and word count',
    step4: 'Use the estimate for blog posts, scripts or presentations',
    detailAbout: 'Based on <span>{wpm}</span> words per minute, this text has <span>{words}</span> words, <span>{sentences}</span> sentences and <span>{paragraphs}</span> paragraphs. Estimated reading time is <span>{readMin}</span> min <span>{readSec}</span> sec. Speaking aloud at 150 WPM would take <span>{speakMin}</span> min <span>{speakSec}</span> sec.',
    placeholder: 'Paste your article, blog post, essay or any text here…',
  },
  zh: {
    toolTitle: '阅读时间计算器',
    toolDesc: '估算任意文本的阅读时间。粘贴文章或博客，即时获取阅读时间、朗读时间、字数和字符数。',
    speed: '阅读速度（字/分钟）',
    readTime: '阅读时间',
    speakTime: '朗读时间',
    words: '字数',
    chars: '字符数',
    sentences: '句子数',
    paragraphs: '段落数',
    step1: '将文本粘贴或输入到输入区',
    step2: '选择适合你受众的阅读速度',
    step3: '即时查看阅读时间、朗读时间和字数',
    step4: '将估算用于博客文章、脚本或演示文稿',
    detailAbout: '基于每分钟 <span>{wpm}</span> 字的阅读速度，本文共有 <span>{words}</span> 个词、<span>{sentences}</span> 个句子和 <span>{paragraphs}</span> 个段落。预计阅读时间为 <span>{readMin}</span> 分 <span>{readSec}</span> 秒。以每分钟 150 字朗读约需 <span>{speakMin}</span> 分 <span>{speakSec}</span> 秒。',
    placeholder: '在此粘贴文章、博客、论文或任何文本…',
  }
});

const { $, t } = GZ;

function fmtTime(seconds) {
  if (seconds < 60) return Math.round(seconds) + 's';
  const m = Math.floor(seconds / 60);
  const s = Math.round(seconds % 60);
  return `${m}m ${s}s`;
}

function calcReading() {
  const text = $('#input').value;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const chars = text.length;
  const charsNoSpace = text.replace(/\s/g, '').length;
  const sentences = (text.match(/[^.!?]+[.!?]+/g) || []).length || (text.trim() ? 1 : 0);
  const paragraphs = text.trim() ? text.trim().split(/\n\s*\n/).filter(p => p.trim()).length : 0;

  const wpm = parseInt($('#speed').value);
  const readSec = words > 0 ? (words / wpm) * 60 : 0;
  const speakSec = words > 0 ? (words / 150) * 60 : 0;

  $('#r-read').textContent = fmtTime(readSec);
  $('#r-speak').textContent = fmtTime(speakSec);
  $('#r-words').textContent = words.toLocaleString();
  $('#r-chars').textContent = chars.toLocaleString();

  if (words > 0) {
    const readMin = Math.floor(readSec / 60);
    const readS = Math.round(readSec % 60);
    const speakMin = Math.floor(speakSec / 60);
    const speakS = Math.round(speakSec % 60);
    $('#detail').innerHTML = t('detailAbout')
      .replace('{wpm}', wpm).replace('{words}', words.toLocaleString())
      .replace('{sentences}', sentences).replace('{paragraphs}', paragraphs)
      .replace('{readMin}', readMin).replace('{readSec}', readS)
      .replace('{speakMin}', speakMin).replace(/{speakSec}/g, speakS);
  } else {
    $('#detail').innerHTML = '';
  }
}

$('#speed').addEventListener('change', calcReading);
$('#input').setAttribute('placeholder', t('placeholder'));
$('#r-read-lbl').textContent = t('readTime');
$('#r-speak-lbl').textContent = t('speakTime');
$('#r-words-lbl').textContent = t('words');
$('#r-chars-lbl').textContent = t('chars');

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📝', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'📄', href:'/text/words-to-pages.html', name:'Words to Pages'},
    {icon:'📊', href:'/text/reading-speed-test.html', name:'Reading Speed Test'},
    {icon:'⌨️', href:'/text/typing-speed-test.html', name:'Typing Speed Test'},
  ]
});
</script>
