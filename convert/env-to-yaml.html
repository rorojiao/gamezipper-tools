    nestedKeys: '嵌套键名（__ → 对象）',

    step1: '在左侧面板粘贴 .env 内容',
    step2: '根据需要切换嵌套键名和类型推断',

const { $, copyText, t } = GZ;

function escapeYaml(val) {
  // If value contains special chars, wrap in quotes
  if (val === '') return '""';
  if (/[:#\[\]{}&'*!|>%@`,]/.test(val) || val.startsWith(' ') || val.endsWith(' ')) {
    return '"' + val.replace(/\\/g,'\\\\').replace(/"/g,'\\"') + '"';
  }
  return val;
}

function detectType(rawVal, typeDetect) {
  if (!typeDetect) return { value: escapeYaml(rawVal), typed: false };
  const v = rawVal.trim();
  // Boolean
  if (/^(true|false)$/i.test(v)) return { value: v.toLowerCase(), typed: true };
  // Null
  if (/^(null|~)$/i.test(v)) return { value: 'null', typed: true };
  // Number
  if (/^-?\d+$/.test(v)) return { value: v, typed: true };
  if (/^-?\d+\.\d+$/.test(v)) return { value: v, typed: true };
  // Array
  if (v.startsWith('[') && v.endsWith(']')) {
    // Try to parse as JSON array
    try {
      const arr = JSON.parse(v);
      if (Array.isArray(arr)) return { value: JSON.stringify(arr), typed: true };
    } catch(e) {}
  }
  // String — keep as-is
  return { value: escapeYaml(rawVal), typed: false };
}

function parseEnv(text) {
  const lines = text.split('\n');
  const entries = [];
  for (let line of lines) {
    // Skip comments and empty lines
    const trimmed = line.trim();
    if (!trimmed || trimmed.startsWith('#')) continue;
    // Handle export prefix
    line = line.replace(/^export\s+/, '');
    const eqIdx = line.indexOf('=');
    if (eqIdx === -1) continue;
    let key = line.substring(0, eqIdx).trim();
    let val = line.substring(eqIdx + 1).trim();
    // Remove surrounding quotes
    if ((val.startsWith('"') && val.endsWith('"')) || (val.startsWith("'") && val.endsWith("'"))) {
      val = val.slice(1, -1);
    }
    // Unescape common sequences in double-quoted
    entries.push({ key, val });
  }
  return entries;
}

function setNested(obj, keyParts, value) {
  let current = obj;
  for (let i = 0; i < keyParts.length - 1; i++) {
    const part = keyParts[i].toLowerCase();
    if (!current[part] || typeof current[part] !== 'object') current[part] = {};
    current = current[part];
  }
  current[keyParts[keyParts.length - 1].toLowerCase()] = value;
}

function yamlIndent(level) {
  return '  '.repeat(level);
}

function objToYaml(obj, indent) {
  let lines = [];
  const keys = Object.keys(obj);
  for (const key of keys) {
    const v = obj[key];
    if (v && typeof v === 'object' && !Array.isArray(v)) {
      lines.push(`${yamlIndent(indent)}${key}:`);
      lines.push(objToYaml(v, indent + 1));
    } else {
      lines.push(`${yamlIndent(indent)}${key}: ${v}`);
    }
  }
  return lines.join('\n');
}

function doConvert() {
  const text = $('#input').value;
  if (!text.trim()) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }

  const opts = {
    nested: document.getElementById('opt-nested').checked,
    typeDetect: document.getElementById('opt-type').checked,
    sort: document.getElementById('opt-sort').checked,
  };

  let entries = parseEnv(text);
  if (opts.sort) entries.sort((a, b) => a.key.localeCompare(b.key));

  let yaml;
  if (opts.nested) {
    const tree = {};
    for (const { key, val } of entries) {
      const parts = key.split(/__|\./).filter(p => p);
      const { value } = detectType(val, opts.typeDetect);
      if (parts.length > 1) {
        setNested(tree, parts, value);
      } else {
        tree[key.toLowerCase()] = value;
      }
    }
    yaml = objToYaml(tree, 0);
  } else {
    const lines = entries.map(({ key, val }) => {
      const { value } = detectType(val, opts.typeDetect);
      const yamlKey = key.toLowerCase();
      return `${yamlKey}: ${value}`;
    });
    yaml = lines.join('\n');
  }

  $('#output').textContent = yaml;
  const count = entries.length;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${count} variable${count !== 1 ? 's' : ''} converted</span>`;
}

  doConvert();
}

document.getElementById('opt-nested').addEventListener('change', doConvert);
document.getElementById('opt-type').addEventListener('change', doConvert);
