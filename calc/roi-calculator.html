<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is ROI calculated?", "acceptedAnswer": {"@type": "Answer", "text": "ROI (Return on Investment) is calculated as (Final Value − Initial Investment) ÷ Initial Investment × 100. The result is expressed as a percentage."}}, {"@type": "Question", "name": "What is annualized ROI or CAGR?", "acceptedAnswer": {"@type": "Answer", "text": "Annualized ROI, also called CAGR (Compound Annual Growth Rate), normalizes the total return over the holding period into an average yearly rate. It is calculated as (Final Value ÷ Initial Value)^(1 ÷ Years) − 1."}}, {"@type": "Question", "name": "Can I include additional contributions?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Enter any additional contributions made during the holding period. The calculator factors them into the cost basis for a more accurate ROI."}}, {"@type": "Question", "name": "Does this calculator handle partial years?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. You can enter the holding period in years, months or days. The annualized ROI is computed using fractional years so partial-year investments work correctly."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">

      <div class="row">
        <div><label id="lbl-contrib"></label><input type="number" id="contrib" value="0" min="0" step="100"></div>
        <div><label id="lbl-final"></label><input type="number" id="final" value="15000" min="0" step="100"></div>
      </div>
      <div class="row">
        <div><label id="lbl-period"></label><input type="number" id="period" value="3" min="0" step="0.1"></div>
        <div><label id="lbl-unit"></label>
          <select id="unit">
            <option value="years">Years</option>
            <option value="months">Months</option>
            <option value="days">Days</option>
          </select>
        </div>
      </div>
      <button class="gz-btn" onclick="calculate()" id="btn-calc"></button>

        <div class="result-item"><div class="val" id="r-annual"></div><div class="lbl" id="lbl-annual"></div></div>

  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'ROI Calculator',
    toolDesc: 'Calculate Return on Investment (ROI) and annualized ROI instantly. Enter initial amount, contributions and final value — see total gain, percentage return, multiplier and CAGR. Free and private.',
    lblInitial: 'Initial Investment ($)',
    lblContrib: 'Additional Contributions ($)',
    lblFinal: 'Final Value ($)',
    lblPeriod: 'Holding Period',
    lblUnit: 'Period Unit',
    btnCalc: 'Calculate ROI',
    resultLabel: 'Total ROI',
    lblGain: 'Net Gain / Loss',
    lblAnnual: 'Annualized ROI (CAGR)',
    lblMult: 'Value Multiplier',
    lblCost: 'Total Cost Basis',
    formula: 'ROI = (Final Value − Cost Basis) ÷ Cost Basis × 100',
    step1: 'Enter your initial investment amount',
    step2: 'Add any extra contributions and the final value you received',
    step3: 'Specify how long you held the investment (years, months or days)',
    step4: 'Click Calculate to see total ROI, gain, multiplier and annualized return',
  },
  zh: {
    toolTitle: '投资回报率 (ROI) 计算器',
    toolDesc: '即时计算投资回报率 (ROI) 和年化 ROI。输入初始投资、追加投入和最终价值 — 查看总收益、百分比回报、倍数和复合年增长率。免费、本地运行。',
    lblInitial: '初始投资金额（美元）',
    lblContrib: '追加投入（美元）',
    lblFinal: '最终价值（美元）',
    lblPeriod: '持有期限',
    lblUnit: '期限单位',
    btnCalc: '计算 ROI',
    resultLabel: '总投资回报率',
    lblGain: '净盈亏',
    lblAnnual: '年化回报率 (CAGR)',
    lblMult: '价值倍数',
    lblCost: '总成本基础',
    formula: 'ROI = (最终价值 − 成本基础) ÷ 成本基础 × 100',
    step1: '输入初始投资金额',
    step2: '填写追加投入和最终收回的价值',
    step3: '设置持有时间（年、月或日）',
    step4: '点击「计算」查看总 ROI、盈亏、倍数和年化回报',
  }
});

const { $, t } = GZ;

function fmtMoney(n) { return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 2 }); }
function fmtPct(n) { return (n >= 0 ? '+' : '') + n.toFixed(2) + '%'; }

function calculate() {
  const initial = parseFloat($('#initial').value) || 0;
  const contrib = parseFloat($('#contrib').value) || 0;
  const finalV = parseFloat($('#final').value) || 0;
  let period = parseFloat($('#period').value) || 0;
  const unit = $('#unit').value;
  if (unit === 'months') period = period / 12;
  else if (unit === 'days') period = period / 365;

  const cost = initial + contrib;
  const gain = finalV - cost;
  const roi = cost > 0 ? (gain / cost) * 100 : 0;
  const mult = cost > 0 ? finalV / cost : 0;
  const annual = (period > 0 && cost > 0 && finalV > 0) ? (Math.pow(finalV / cost, 1 / period) - 1) * 100 : 0;

  $('#result').style.display = '';
  $('#r-roi').textContent = fmtPct(roi);
  $('#r-gain').textContent = fmtMoney(gain);
  $('#r-gain').style.color = gain >= 0 ? 'var(--accent)' : '#e94560';
  $('#r-annual').textContent = fmtPct(annual);
  $('#r-mult').textContent = mult.toFixed(2) + '×';
  $('#r-cost').textContent = fmtMoney(cost);
}

$('#lbl-initial').textContent = t('lblInitial');
$('#lbl-contrib').textContent = t('lblContrib');
$('#lbl-final').textContent = t('lblFinal');
$('#lbl-period').textContent = t('lblPeriod');
$('#lbl-unit').textContent = t('lblUnit');
$('#btn-calc').textContent = t('btnCalc');
$('#result-label').textContent = t('resultLabel');
$('#lbl-gain').textContent = t('lblGain');
$('#lbl-annual').textContent = t('lblAnnual');
$('#lbl-mult').textContent = t('lblMult');
$('#lbl-cost').textContent = t('lblCost');
$('#formula').textContent = t('formula');
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/calc/compound-interest-calculator.html', name:'Compound Interest'},
    {icon:'💰', href:'/calc/dividend-calculator.html', name:'Dividend Calculator'},
    {icon:'💵', href:'/calc/crypto-profit-calculator.html', name:'Crypto Profit'},
    {icon:'📊', href:'/calc/cagr-calculator.html', name:'CAGR Calculator'},
  ]
});
</script>
