const CAT_LABEL = {
  alkali: 'Alkali metal', alkaline: 'Alkaline earth metal', transition: 'Transition metal',
  post: 'Post-transition metal', metalloid: 'Metalloid', nonmetal: 'Nonmetal',
  halogen: 'Halogen', noble: 'Noble gas', lanthanide: 'Lanthanide', actinide: 'Actinide',
};
const CAT_LABEL_ZH = {
  alkali: '碱金属', alkaline: '碱土金属', transition: '过渡金属',
  post: '后过渡金属', metalloid: '类金属', nonmetal: '非金属',
  halogen: '卤素', noble: '稀有气体', lanthanide: '镧系元素', actinide: '锕系元素',
};

const { $, t } = GZ;

function renderTable() {
  const t = $('#table');
  t.innerHTML = '';
  // 7 periods × 18 groups
  for (let p = 1; p <= 7; p++) {
    for (let g = 1; g <= 18; g++) {
      const el = ELEMENTS.find(e => e.p === p && e.g === g);
      const cell = document.createElement('div');
      if (el) {
        cell.className = `pt-cell pt-${el.cat}`;
        cell.dataset.n = el.n;
        cell.innerHTML = `<div class="n">${el.n}</div><div class="s">${el.s}</div><div class="m">${el.m}</div>`;
        cell.addEventListener('click', () => showDetail(el));
      } else {
        cell.className = 'pt-cell empty';
      }
      t.appendChild(cell);
    }
  }
  // Add labels for lanthanides/actinides rows
  for (let i = 0; i < 18; i++) {
    const cell = document.createElement('div');
    cell.className = 'pt-cell empty';
    t.appendChild(cell);
  }
  // Lanthanide row
  for (let n = 57; n <= 71; n++) {
    const el = ELEMENTS.find(e => e.n === n);
    const cell = document.createElement('div');
    cell.className = `pt-cell pt-${el.cat}`;
    cell.dataset.n = el.n;
    cell.innerHTML = `<div class="n">${el.n}</div><div class="s">${el.s}</div><div class="m">${el.m}</div>`;
    cell.addEventListener('click', () => showDetail(el));
    t.appendChild(cell);
  }
  for (let i = 0; i < 5; i++) {
    const cell = document.createElement('div');
    cell.className = 'pt-cell empty';
    t.appendChild(cell);
  }
  // Actinide row
  for (let n = 89; n <= 103; n++) {
    const el = ELEMENTS.find(e => e.n === n);
    const cell = document.createElement('div');
    cell.className = `pt-cell pt-${el.cat}`;
    cell.dataset.n = el.n;
    cell.innerHTML = `<div class="n">${el.n}</div><div class="s">${el.s}</div><div class="m">${el.m}</div>`;
    cell.addEventListener('click', () => showDetail(el));
    t.appendChild(cell);
  }
}

function renderLegend() {
  const cats = [
    ['alkali', 'Alkali'], ['alkaline', 'Alkaline'], ['transition', 'Transition'],
    ['post', 'Post-trans.'], ['metalloid', 'Metalloid'], ['nonmetal', 'Nonmetal'],
    ['halogen', 'Halogen'], ['noble', 'Noble'], ['lanthanide', 'Lanthanide'], ['actinide', 'Actinide']
  ];
  const lang = GZI18n.getLang();
  $('#legend').innerHTML = cats.map(([c, en]) => {
    const lbl = lang === 'zh' ? (CAT_LABEL_ZH[c] || en) : en;
    return `<div class="pt-leg"><div class="sw pt-${c}"></div>${lbl}</div>`;
  }).join('');
}

function showDetail(el) {
  const lang = GZI18n.getLang();
  const name = lang === 'zh' ? (el.zn || el.en) : el.en;
  const catLabel = lang === 'zh' ? (CAT_LABEL_ZH[el.cat] || CAT_LABEL[el.cat]) : CAT_LABEL[el.cat];
  $('#detail').innerHTML = `
    <div class="pt-d-header">
      <div class="pt-d-symbol pt-${el.cat}">${el.s}</div>
      <div class="pt-d-title">
        <h2>${name}</h2>
        <div class="sub">${catLabel} · ${lang === 'zh' ? '第' : 'Group '}${el.g}${lang === 'zh' ? '族 · 第' : ' · Period '}${el.p}${lang === 'zh' ? '周期' : ''}</div>
      </div>
    </div>
    <div class="pt-d-grid">
      <div class="pt-d-stat"><div class="l">${lang === 'zh' ? '原子序数' : 'Atomic Number'}</div><div class="v">${el.n}</div></div>
      <div class="pt-d-stat"><div class="l">${lang === 'zh' ? '原子量' : 'Atomic Mass'}</div><div class="v">${el.m} u</div></div>
      <div class="pt-d-stat"><div class="l">${lang === 'zh' ? '元素符号' : 'Symbol'}</div><div class="v">${el.s}</div></div>
      <div class="pt-d-stat"><div class="l">${lang === 'zh' ? '类别' : 'Category'}</div><div class="v">${catLabel}</div></div>
      <div class="pt-d-stat"><div class="l">${lang === 'zh' ? '所属周期' : 'Period'}</div><div class="v">${el.p}</div></div>
      <div class="pt-d-stat"><div class="l">${lang === 'zh' ? '所属族' : 'Group'}</div><div class="v">${el.g}</div></div>
    </div>
    <div class="pt-d-stat" style="margin-bottom:10px"><div class="l">${lang === 'zh' ? '电子排布' : 'Electron Configuration'}</div><div class="v" style="font-family:monospace">${el.config}</div></div>
  `;
  // Highlight selected
  document.querySelectorAll('.pt-cell').forEach(c => c.style.outline = '');
  const sel = document.querySelector(`.pt-cell[data-n="${el.n}"]`);
  if (sel) sel.style.outline = '3px solid #ffd93d';
}

function search(q) {
  if (!q) return;
  const term = q.toLowerCase();
  const el = ELEMENTS.find(e => e.n == term || e.s.toLowerCase() === term || e.en.toLowerCase().includes(term) || (e.zn && e.zn.toLowerCase().includes(term)));
  if (el) showDetail(el);
}

$('#searchInput').addEventListener('input', e => {
  if (e.target.value.length >= 1) search(e.target.value);
});
$('#catFilter').addEventListener('change', e => {
  const cat = e.target.value;
  document.querySelectorAll('.pt-cell').forEach(c => {
    if (cat === 'all' || c.classList.contains('pt-' + cat)) {
      c.style.opacity = '1';
    } else {
      c.style.opacity = '0.15';
    }
  });
});

renderTable();
renderLegend();
