<style>
.thread-wrap{max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
.tweet{background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:14px;display:flex;gap:10px;position:relative}
.tweet-avatar{width:40px;height:40px;background:linear-gradient(135deg,#1d9bf0,#0c7abf);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.85rem}
.tweet-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px}
.tweet-header{display:flex;align-items:center;gap:6px;font-size:.9rem}
.tweet-name{color:var(--text);font-weight:700}
.tweet-handle,.tweet-time{color:var(--text2);font-weight:400}
.tweet-text{color:var(--text);font-size:.95rem;line-height:1.4;white-space:pre-wrap;word-break:break-word;min-height:50px;padding:6px 0;outline:none}
.tweet-text:empty::before{content:attr(data-placeholder);color:var(--text2);opacity:.5}
.tweet-toolbar{display:flex;align-items:center;justify-content:space-between;gap:8px;padding-top:8px;border-top:1px solid var(--border);flex-wrap:wrap}
.tweet-actions{display:flex;gap:14px;color:var(--text2);font-size:.85rem}
.tweet-actions span{cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.tweet-actions span:hover{color:var(--accent)}
.counter-circle{width:24px;height:24px;position:relative}
.counter-circle svg{width:100%;height:100%;transform:rotate(-90deg)}
.counter-circle circle{fill:none;stroke-width:2}
.counter-circle .bg{stroke:rgba(83,100,113,.4)}
.counter-circle .fg{stroke:#1d9bf0;stroke-linecap:round;transition:stroke-dashoffset .2s, stroke .2s}
.counter-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:600;color:var(--text2);font-variant-numeric:tabular-nums}
.add-tweet-btn{background:transparent;border:1px dashed var(--border);color:var(--text2);padding:14px;border-radius:16px;cursor:pointer;font-size:.9rem;font-weight:600;transition:all .15s;text-align:center}
.add-tweet-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(29,155,240,.05)}
.tweet-counter{font-size:.7rem;color:var(--text2);font-weight:600;font-variant-numeric:tabular-nums;margin-left:auto}
.tweet-counter.over{color:#f4212e}
.tweet-counter.warn{color:#ffd400}
.tweet-counter.good{color:var(--success)}
.tweet-num{position:absolute;top:-6px;left:-6px;background:#1d9bf0;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700}
.toolbar-top{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.btn-remove{background:transparent;border:1px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:8px;cursor:pointer;font-size:.75rem}
.btn-remove:hover{color:#f4212e;border-color:#f4212e}
</style>

<body>
<div class="gz-container">
<div class="gz-tool-header">
<h1 id="title"></h1>
<p class="desc" id="desc"></p>
</div>
<div class="gz-tool-area">
<div class="toolbar-top">
<label style="margin:0"><input type="radio" name="mode" value="free" checked id="modeFree"> <span id="lbl-free"></span> (280)</label>
<label style="margin:0"><input type="radio" name="mode" value="premium" id="modePremium"> <span id="lbl-prem"></span> (25,000)</label>
<button class="gz-btn gz-btn-secondary" id="clearAll" style="margin-left:auto">🗑️ <span id="lbl-clear"></span></button>
<button class="gz-btn" id="copyAll">📋 <span id="lbl-copyall"></span></button>
</div>
<script>
$('#lbl-free').textContent = t('lblFree');
$('#lbl-prem').textContent = t('lblPrem');
$('#lbl-clear').textContent = t('lblClear');
$('#lbl-copyall').textContent = t('lblCopyAll');
$('#lbl-add').textContent = t('lblAdd');
</script>
<div class="thread-wrap" id="thread"></div>
<button class="add-tweet-btn" id="addTweet" style="width:100%;max-width:600px;margin:14px auto 0;display:block">➕ <span id="lbl-add"></span></button>
</div>
<div class="gz-howto"><h2></h2><ol></ol></div>
<div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
en:{
toolTitle:'Twitter / X Post Counter & Thread Composer',
toolDesc:'Count characters in real time, compose multi-post threads, and preview how each tweet renders. Supports Free (280) and Premium (25,000) limits.',
lblFree:'Free', lblPrem:'Premium', lblClear:'Clear All', lblCopyAll:'Copy Thread', lblAdd:'Add Post',
lblPlaceholder:"What's happening?!",
step1:'Click any tweet body and start typing — counter updates live',
step2:'Click "Add Post" to extend into a thread',
step3:'Switch to Premium mode for long-form posts (25k chars)',
step4:'Use Copy Thread to grab the full thread as one block',
},
zh:{
toolTitle:'Twitter / X 字符计数器 & 推文串编辑器',
toolDesc:'实时统计字符、编辑多推文串并预览渲染效果，支持免费（280字符）和 Premium（25,000 字符）模式。',
lblFree:'免费', lblPrem:'Premium', lblClear:'清空', lblCopyAll:'复制推文串', lblAdd:'添加推文',
lblPlaceholder:'有什么新鲜事？',
step1:'点击推文正文开始输入 — 计数器实时更新',
step2:'点击「添加推文」扩展为推文串',
step3:'切换 Premium 模式以发长文（25,000 字符）',
step4:'使用「复制推文串」将整串复制为一段文本',
}
});

const { $, copyText, t } = GZ;
let posts = [''];
let mode = 'free';
const LIMIT_FREE = 280, LIMIT_PREMIUM = 25000;

function countChars(text) {
// X counts URLs as 23 chars
const urlRegex = /https?:\/\/[^\s]+/g;
let count = 0;
let lastIndex = 0;
let m;
while ((m = urlRegex.exec(text)) !== null) {
count += m[0].length;
for (let i = lastIndex; i < m.index; i++) count += [...text[i]].length;
lastIndex = m.index + m[0].length;
}
for (let i = lastIndex; i < text.length; i++) count += [...text[i]].length;
return count;
}

function renderThread() {
const limit = mode === 'premium' ? LIMIT_PREMIUM : LIMIT_FREE;
const wrap = $('#thread');
wrap.innerHTML = posts.map((text, i) => {
const len = countChars(text);
const pct = Math.min(100, (len / limit) * 100);
const circumference = 2 * Math.PI * 10;
const offset = circumference * (1 - pct / 100);
const counterClass = len > limit ? 'over' : len > limit * 0.9 ? 'warn' : 'good';
const strokeColor = len > limit ? '#f4212e' : len > limit * 0.9 ? '#ffd400' : '#1d9bf0';
return `<div class="tweet" data-idx="${i}">
<div class="tweet-num">${i + 1}</div>
<div class="tweet-avatar">GZ</div>
<div class="tweet-body">
<div class="tweet-header">
<span class="tweet-name">You</span>
<span class="tweet-handle">@you</span>
<span class="tweet-time">· now</span>
</div>
<div class="tweet-text" contenteditable="true" data-placeholder="${t('lblPlaceholder')}" data-idx="${i}">${escapeHtml(text)}</div>
<div class="tweet-toolbar">
<div class="tweet-actions">
<span>💬 0</span>
<span>🔁 0</span>
<span>❤️ 0</span>
<span>📊</span>
</div>
<div style="display:flex;align-items:center;gap:8px">
<span class="tweet-counter ${counterClass}">${len} / ${limit}</span>
<div class="counter-circle">
<svg viewBox="0 0 24 24"><circle class="bg" cx="12" cy="12" r="10"/><circle class="fg" cx="12" cy="12" r="10" stroke="${strokeColor}" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/></svg>
</div>
${i > 0 ? `<button class="btn-remove" data-rm="${i}">✕</button>` : ''}
</div>
</div>
</div>
</div>`;
}).join('');

// Attach listeners
wrap.querySelectorAll('.tweet-text').forEach(el => {
el.addEventListener('input', e => {
const idx = +el.dataset.idx;
posts[idx] = el.innerText;
const len = countChars(posts[idx]);
const limit = mode === 'premium' ? LIMIT_PREMIUM : LIMIT_FREE;
const counter = el.closest('.tweet').querySelector('.tweet-counter');
const circle = el.closest('.tweet').querySelector('.fg');
const circumference = 2 * Math.PI * 10;
const pct = Math.min(100, (len / limit) * 100);
const offset = circumference * (1 - pct / 100);
const counterClass = len > limit ? 'over' : len > limit * 0.9 ? 'warn' : 'good';
const strokeColor = len > limit ? '#f4212e' : len > limit * 0.9 ? '#ffd400' : '#1d9bf0';
counter.textContent = `${len} / ${limit}`;
counter.className = 'tweet-counter ' + counterClass;
circle.setAttribute('stroke', strokeColor);
circle.setAttribute('stroke-dashoffset', offset);
});
});
wrap.querySelectorAll('[data-rm]').forEach(btn => {
btn.addEventListener('click', () => {
const idx = +btn.dataset.rm;
posts.splice(idx, 1);
renderThread();
});
});
}

function escapeHtml(s) {
return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

$('#addTweet').addEventListener('click', () => { posts.push(''); renderThread(); });
$('#clearAll').addEventListener('click', () => { posts = ['']; renderThread(); });
$('#copyAll').addEventListener('click', () => {
const text = posts.map((p, i) => `${i + 1}/ ${p}`).join('\n\n');
copyText(text);
});
document.querySelectorAll('input[name=mode]').forEach(r => {
r.addEventListener('change', e => { mode = e.target.value; renderThread(); });
});

renderThread();

GZ.renderToolPage({
category: 'text',
titleKey: 'toolTitle',
descKey: 'toolDesc',
howToSteps: ['step1','step2','step3','step4'],
related: [
{icon:'📝', href:'/text/word-counter.html', name:'Word Counter'},
{icon:'📏', href:'/text/text-truncator.html', name:'Text Truncator'},
{icon:'🐦', href:'/social/tweet-generator.html', name:'Tweet Generator'},
{icon:'📜', href:'/text/fancy-text.html', name:'Fancy Text'},
]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
