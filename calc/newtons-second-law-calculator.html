<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is Newton's Second Law?", "acceptedAnswer": {"@type": "Answer", "text": "Newton's Second Law states that force equals mass times acceleration: F = m × a. The acceleration of an object is directly proportional to the net force acting on it and inversely proportional to its mass."}}, {"@type": "Question", "name": "What are the units of force?", "acceptedAnswer": {"@type": "Answer", "text": "The SI unit of force is the newton (N), where 1 N = 1 kg·m/s². In imperial units force is measured in pounds-force (lbf), where 1 lbf ≈ 4.448 N."}}, {"@type": "Question", "name": "How do I calculate weight from mass?", "acceptedAnswer": {"@type": "Answer", "text": "Weight is the force of gravity on a mass: W = m × g, where g = 9.81 m/s² on Earth. A 10 kg object weighs about 98.1 N. Weight changes with gravity; mass does not."}}, {"@type": "Question", "name": "What is the difference between mass and weight?", "acceptedAnswer": {"@type": "Answer", "text": "Mass (kg) measures the amount of matter and is constant everywhere. Weight (N or lbf) is the gravitational force on that mass, so it changes with local gravity — you weigh about 1/6 as much on the Moon."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: "Newton's Second Law Calculator",
    toolDesc: "Solve Newton's Second Law F = ma for force, mass or acceleration. Enter any two values and instantly get the third, plus weight (W = mg). Built for physics homework, dynamics and engineering — free and browser-based.",
    lblF: 'Force (F)',
    lblM: 'Mass (m)',
    lblA: 'Acceleration (a)',
    lblG: 'Gravity (g)',
    rF: 'Force (F)',
    rM: 'Mass (m)',
    rA: 'Acceleration (a)',
    rW: 'Weight (W = mg)',
    example: 'Example',
    clear: 'Clear',
    formulas: 'Formulas: F = m × a · m = F ÷ a · a = F ÷ m · W = m × g',
    errInputs: 'Enter any two of force, mass and acceleration.',
    step1: 'Enter any two of force (N), mass (kg), acceleration (m/s²)',
    step2: 'Set gravity to compute weight (Earth = 9.81)',
    step3: 'Leave the unknown field blank',
    step4: 'Read the solved value plus weight',
  },
  zh: {
    toolTitle: '牛顿第二定律计算器',
    toolDesc: '用 F = ma 求解力、质量或加速度。输入任意两项，即时算出第三项，并附带重量 (W = mg)。适合物理作业、动力学和工程计算 — 免费、浏览器本地运行。',
    lblF: '力 (F)',
    lblM: '质量 (m)',
    lblA: '加速度 (a)',
    lblG: '重力加速度 (g)',
    rF: '力 (F)',
    rM: '质量 (m)',
    rA: '加速度 (a)',
    rW: '重量 (W = mg)',
    example: '示例',
    clear: '清空',
    formulas: '公式：F = m × a · m = F ÷ a · a = F ÷ m · W = m × g',
    errInputs: '请输入力、质量、加速度中的任意两项。',
    step1: '输入力 (N)、质量 (kg)、加速度 (m/s²) 中的任意两项',
    step2: '设置重力以计算重量（地球=9.81）',
    step3: '未知项留空',
    step4: '查看求解结果及重量',
  }
});

const { $, t } = GZ;

$('#lbl-f span:first-child').textContent = t('lblF');
$('#lbl-m span:first-child').textContent = t('lblM');
$('#lbl-a span:first-child').textContent = t('lblA');
$('#lbl-g span:first-child').textContent = t('lblG');
$('#r-f').textContent = t('rF');
$('#r-m').textContent = t('rM');
$('#r-a').textContent = t('rA');
$('#r-w').textContent = t('rW');
$('#formulas').textContent = t('formulas');

function num(id) { const v = $('#' + id).value; return v === '' ? null : parseFloat(v); }
function fmt(n) {
  if (!isFinite(n)) return '—';
  const abs = Math.abs(n);
  if (abs !== 0 && (abs < 0.001 || abs >= 1e6)) return n.toExponential(3);
  return n.toLocaleString(undefined, { maximumFractionDigits: 4 });
}

function calc() {
  let F = num('F'), m = num('m'), a = num('a');
  const g = num('g');
  const filled = [F, m, a].filter(x => x !== null).length;
  if (filled < 2) { $('#results').style.display = 'none'; return; }
  if (F === null && m !== null && a !== null) F = m * a;
  if (m === null && F !== null && a !== null && a !== 0) m = F / a;
  if (a === null && F !== null && m !== null && m !== 0) a = F / m;
  let W = (m !== null && g !== null) ? m * g : null;
  $('#out-f').textContent = F !== null && isFinite(F) ? fmt(F) + ' N' : '—';
  $('#out-m').textContent = m !== null && isFinite(m) ? fmt(m) + ' kg' : '—';
  $('#out-a').textContent = a !== null && isFinite(a) ? fmt(a) + ' m/s²' : '—';
  $('#out-w').textContent = W !== null && isFinite(W) ? fmt(W) + ' N' : '—';
  $('#results').style.display = 'block';
}

['F', 'm', 'a', 'g'].forEach(id => $('#' + id).addEventListener('input', calc));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="$('#g').value='9.81';$('#m').value='5';$('#a').value='2';$('#F').value='';calc()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="['F','m','a'].forEach(id=>document.getElementById(id).value='');calc()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1', 'step2', 'step3', 'step4'],
  related: [
    { icon: '🎯', href: '/calc/projectile-motion-calculator.html', name: 'Projectile Motion' },
    { icon: '🪂', href: '/calc/free-fall-calculator.html', name: 'Free Fall' },
    { icon: '🪨', href: '/calc/density-calculator.html', name: 'Density' },
    { icon: '⏱️', href: '/calc/pendulum-calculator.html', name: 'Pendulum' },
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
