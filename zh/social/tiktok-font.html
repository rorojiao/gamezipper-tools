  {key:'smallCaps', name:'Small Caps', fn: s => conv(SMALL_CAPS, s)},
  {key:'fullwidth', name:'Fullwidth', fn: s => conv(FULLWIDTH, s)},
  {key:'circled', name:'Circled', fn: s => conv(CIRCLED, s)},
];

function render(){
  const text = $('#input').value || '';
  const list = $('#styles');
  list.innerHTML = '';
  STYLES.forEach(st => {
    const out = st.fn(text);
    const row = document.createElement('div');
    row.className = 'style-row';
    row.innerHTML = `<span class="sample">${out.replace(/</g,'&lt;')}</span><span class="label">${st.name}</span><span class="cp">📋 copy</span>`;
    row.onclick = () => { copyText(out); };
    list.appendChild(row);
  });
}

$('#input').addEventListener('input', render);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#input').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='TikTok';render()">${t('clear')}</button>`;

render();

GZ.renderToolPage({
  category: 'social',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📸', href:'/social/instagram-bio.html', name:'Instagram Bio'},
    {icon:'🎵', href:'/text/tiktok-username-generator.html', name:'TikTok Username'},
    {icon:'🎵', href:'/text/tiktok-caption-generator.html', name:'TikTok Caption'},
    {icon:'✨', href:'/text/fancy-text.html', name:'Fancy Text'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
