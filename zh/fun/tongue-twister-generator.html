const { $, copyText, t } = GZ;

const TW = {
  en: {
    classic: [
      "She sells seashells by the seashore.",
      "Peter Piper picked a peck of pickled peppers.",
      "How much wood would a woodchuck chuck if a woodchuck could chuck wood?",

    hard: [
      "The sixth sick sheikh's sixth sheep's sick.",
      "I slit the sheet, the sheet I slit, and on the slitted sheet I sit.",
      "A skunk sat on a stump and thunk the stump stunk, but the stump thunk the skunk stunk.",
      "Pad kid poured curd pulled cod.",
      "The Leith police dismisseth us.",
      "Irish wristwatch, Swiss wristwatch.",
      "Six slippery snails slid slowly seaward.",
      "Crisp crusts crackle and crunch.",
      "A proper cup of coffee from a proper copper coffee pot.",
      "Eleven benevolent elephants.",
    ],
    short: [
      "Red leather, yellow leather.",
      "Rubber baby buggy bumpers.",
      "Three free throws.",
      "Greek grapes.",
      "Black bug's blood.",
      "Mixed biscuits.",
      "Fresh fried fish.",

      "Lovely lemon liniment.",
      "Six slick slim sycamore saplings.",

  },
  zh: {
    classic: [
      "四是四，十是十，十四是十四，四十是四十。",
      "吃葡萄不吐葡萄皮，不吃葡萄倒吐葡萄皮。",
      "八百标兵奔北坡，炮兵并排北边跑。",
      "红凤凰，粉凤凰，红粉凤凰花凤凰。",
      "扁担长，板凳宽，扁担没有板凳宽，板凳没有扁担长。",
      "哥哥弟弟坡前坐，坡上卧着一只鹅。",

      "打南边来了个喇嘛，手里提拉着五斤鳎目。",

      "司小四和史小世，四月十四日十四时四十上集市。",
      "嘴说腿，腿说嘴，嘴说腿爱跑腿，腿说嘴爱卖嘴。",
      "老龙恼怒闹老农，老农恼怒闹老龙。",

      "弟弟堤上滴。",
      "牛郎念刘娘。",
      "四个玻璃杯。",
    ],
  }
};

const CATS = [{id:'all',icon:'✨'},{id:'classic',icon:'🏆'},{id:'hard',icon:'🔥'},{id:'short',icon:'⚡'}];
const EMOJI = {classic:'🏆', hard:'🔥', short:'⚡', all:'👅'};
let cat = 'all', lastIdx = -1, shown = 0;

function pool() {
  const lang = GZI18n.getLang() === 'zh' ? 'zh' : 'en';
  const src = TW[lang];
  if (cat === 'all') { const all=[]; for (const k in src) src[k].forEach(x => all.push({x,tag:k})); return all; }
  return (src[cat]||[]).map(x => ({x, tag:cat}));
}

function pick() {
  const p = pool(); if (!p.length) return null;
  let idx; do { idx = Math.floor(Math.random()*p.length); } while (p.length>1 && idx===lastIdx);
  lastIdx = idx; return p[idx];
}

function render() {
  const item = pick(); if (!item) return;
  $('#emoji').textContent = EMOJI[item.tag]||'👅';
  $('#tag').textContent = t(item.tag);
  $('#tw').textContent = item.x;
  shown++;
  $('#counter').textContent = (GZI18n.getLang()==='zh' ? `已为你送上 ${shown} 条绕口令 🎉` : `${shown} twisters served 🎉`);
}

function buildCats() {
  $('#cats').innerHTML = CATS.map(c =>
    `<button class="cat-btn${c.id===cat?' active':''}" data-c="${c.id}">${c.icon} ${t(c.id)}</button>`).join('');
  GZ.$$('#cats .cat-btn').forEach(b => b.onclick = () => { cat=b.dataset.c; lastIdx=-1; buildCats(); render(); });
}

function shareTw() {
  const txt = $('#tw').textContent;
  if (navigator.share) navigator.share({title:'GameZipper Tongue Twister', text:txt}).catch(()=>{});
  else copyText(txt);
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="render()">🎲 ${t('classic')==='经典'?'生成':'Generate'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#tw').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="shareTw()">↗ ${t('classic')==='经典'?'分享':'Share'}</button>`;

buildCats();
render();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',

});
