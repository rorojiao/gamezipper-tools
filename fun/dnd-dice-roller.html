<script>
GZI18n.register({
  en: {
    toolTitle: 'DnD Dice Roller',
    toolDesc: 'Roll dice for Dungeons & Dragons, Pathfinder, and tabletop RPGs. Full set: d4, d6, d8, d10, d12, d20, d100 — with modifiers, advantage/disadvantage, and roll history.',
    rollLabel: 'Roll',
    modifier: 'Modifier:',
    none: 'None',
    advantage: 'Advantage',
    disadvantage: 'Disadvantage',
    total: 'Total',
    rolls: 'Rolls',
    history: 'History',
    clear: 'Clear',
    empty: 'No rolls yet. Click a die to roll!',
    crit: 'Natural 20! 🎉',
    fumble: 'Natural 1! 💀',
    step1: 'Click any die button (d4–d100) to roll it',
    step2: 'Enter a modifier and choose advantage/disadvantage for d20',
    step3: 'Click Roll xN to roll multiple dice at once',
    step4: 'Review your roll history at the bottom',
  },
  zh: {
    toolTitle: 'DnD 骰子 roller',
    toolDesc: '为龙与地下城、探路者和桌面 RPG 掷骰子。全套骰子：d4、d6、d8、d10、d12、d20、d100 — 支持修正值、优势/劣势和投掷历史。',
    rollLabel: '投掷',
    modifier: '修正值：',
    none: '无',
    advantage: '优势',
    disadvantage: '劣势',
    total: '总计',
    rolls: '投掷结果',
    history: '历史记录',
    clear: '清除',
    empty: '还没有投掷记录。点击骰子开始！',
    crit: '自然 20！🎉',
    fumble: '自然 1！💀',
    step1: '点击任意骰子按钮（d4–d100）投掷',
    step2: '输入修正值并为 d20 选择优势/劣势',
    step3: '点击「投掷 xN」一次投掷多个骰子',
    step4: '在底部查看投掷历史',
  }
});

const { $, copyText, t } = GZ;
let advMode = 'none';
let history = [];

const DICE = [
  {sides:4, icon:'🔺', label:'d4'},
  {sides:6, icon:'🎲', label:'d6'},
  {sides:8, icon:'🛑', label:'d8'},
  {sides:10, icon:'🔟', label:'d10'},
  {sides:12, icon:'⏰', label:'d12'},
  {sides:20, icon:'🎯', label:'d20'},
  {sides:100, icon:'💯', label:'d100'},
];

function secureRandom(max) {
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return (arr[0] % max) + 1;
}

function rollDice(sides, count = 1) {
  const mod = parseInt($('#modifier').value) || 0;
  let rolls = [];
  let displayRolls = [];
  for (let i = 0; i < count; i++) {
    if (sides === 20 && advMode !== 'none') {
      const r1 = secureRandom(20), r2 = secureRandom(20);
      if (advMode === 'advantage') {
        rolls.push(Math.max(r1, r2));
        displayRolls.push({vals:[r1,r2], kept: Math.max(r1,r2), dropped: Math.min(r1,r2)});
      } else {
        rolls.push(Math.min(r1, r2));
        displayRolls.push({vals:[r1,r2], kept: Math.min(r1,r2), dropped: Math.max(r1,r2)});
      }
    } else {
      const r = secureRandom(sides);
      rolls.push(r);
      displayRolls.push({vals:[r], kept: r});
    }
  }
  const total = rolls.reduce((a,b) => a+b, 0) + mod;
  return { sides, count, rolls, displayRolls, mod, total };
}

function renderResult(res) {
  let html = '<div class="result-card"><div class="roll-line">';
  res.displayRolls.forEach(dr => {
    if (dr.vals.length > 1) {
      dr.vals.forEach(v => {
        const isKept = v === dr.kept;
        html += `<span class="die-result" style="${isKept?'':'opacity:.3;text-decoration:line-through'}">${v}</span>`;
      });
    } else {
      let style = '';
      if (res.sides === 20 && dr.kept === 20) style = 'border-color:var(--gz-success);color:var(--gz-success)';
      if (res.sides === 20 && dr.kept === 1) style = 'border-color:var(--gz-accent);color:var(--gz-accent)';
      html += `<span class="die-result" style="${style}">${dr.kept}</span>`;
    }
  });
  if (res.mod !== 0) {
    html += `<span style="font-weight:600">${res.mod > 0 ? '+' : ''}${res.mod}</span>`;
  }
  html += `<span style="font-weight:700;font-size:1.3em;margin-left:auto">${t('total')}: ${res.total}</span>`;
  html += '</div>';
  if (res.sides === 20 && res.rolls.includes(20)) html += `<div style="color:var(--gz-success);font-weight:700">${t('crit')}</div>`;
  if (res.sides === 20 && res.rolls.includes(1)) html += `<div style="color:var(--gz-accent);font-weight:700">${t('fumble')}</div>`;
  html += '</div>';
  return html;
}

function doRoll(sides, count = 1) {
  const res = rollDice(sides, count);
  const prev = $('#result').innerHTML;
  $('#result').innerHTML = renderResult(res);
  const diceLabel = `d${sides}` + (count > 1 ? `×${count}` : '');
  history.unshift({dice: diceLabel, total: res.total, mod: res.mod, rolls: res.rolls.join(',')});
  if (history.length > 50) history.pop();
  renderHistory();
}

function renderHistory() {
  if (history.length === 0) {
    $('#history').innerHTML = `<p style="opacity:.5;padding:12px;text-align:center">${t('empty')}</p>`;
    return;
  }
  $('#history').innerHTML = history.map(h =>
    `<div class="history-item"><strong>${h.dice}</strong>: ${h.rolls}${h.mod !== 0 ? (h.mod > 0 ? ` +${h.mod}` : ` ${h.mod}`) : ''} = <strong>${h.total}</strong></div>`
  ).join('');
}

function renderDiceGrid() {
  $('#diceGrid').innerHTML = DICE.map(d => {
    let inner = `<span class="die-icon">${d.icon}</span><span class="die-label">${d.label}</span>`;
    return `<div class="dice-btn" onclick="doRoll(${d.sides})">${inner}<div class="die-count">${t('rollLabel')} ×1</div></div>`;
  }).join('') +
  `<div class="dice-btn" onclick="doRoll(20,2)"><span class="die-icon">🎯🎯</span><span class="die-label">2d20</span><div class="die-count">${t('rollLabel')} ×2</div></div>` +
  `<div class="dice-btn" onclick="doRoll(6,4)"><span class="die-icon">🎲🎲🎲🎲</span><span class="die-label">4d6</span><div class="die-count">${t('rollLabel')} ×4</div></div>`;
}

$('#toolbar').innerHTML = '';
$('#modLabel').textContent = t('modifier');
$('#advToggle').innerHTML = `
  <button id="advNone" class="${advMode==='none'?'active':''}" onclick="advMode='none';updateAdv()">${t('none')}</button>
  <button id="advAdv" class="${advMode==='advantage'?'active':''}" onclick="advMode='advantage';updateAdv()">${t('advantage')}</button>
  <button id="advDis" class="${advMode==='disadvantage'?'active':''}" onclick="advMode='disadvantage';updateAdv()">${t('disadvantage')}</button>`;
function updateAdv() {
  ['None','Adv','Dis'].forEach(m => $('#adv'+m).className = advMode === m.toLowerCase() ? 'active' : '');
}
$('#historyTitle').innerHTML = `${t('history')} <button class="clear-btn" onclick="history=[];renderHistory()">🗑 ${t('clear')}</button>`;
renderDiceGrid();
renderHistory();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎲', href:'/fun/dice-roller.html', name:'Dice Roller'},
    {icon:'🪙', href:'/fun/coin-flip.html', name:'Coin Flip'},
    {icon:'🎯', href:'/fun/random-name-picker.html', name:'Name Picker'},
    {icon:'🎱', href:'/fun/magic-8-ball.html', name:'Magic 8-Ball'},
  ]
});
</script>
