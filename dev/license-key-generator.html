<script>
GZI18n.register({
  en: {
    toolTitle: 'License Key Generator',
    toolDesc: 'Generate random license keys and serial numbers in custom formats (XXXX-XXXX-XXXX). Batch mode, multiple character sets. For testing and QA — 100% browser-only.',
    lblGroups: 'Number of groups',
    lblChars: 'Characters per group',
    lblSep: 'Separator',
    lblCharset: 'Character set',
    lblCustom: 'Custom characters',
    lblCount: 'How many keys',
    lblUnique: 'Ensure all keys are unique',
    lblOut: 'Generated keys',
    generate: 'Generate',
    step1: 'Set the format: groups, chars per group, separator',
    step2: 'Choose a character set or define your own',
    step3: 'Set how many keys to generate (1-1000)',
    step4: 'Click Generate, then Copy to copy all keys',
    note: 'Keys are random and for testing only — they do not activate any real software.',
  },
  zh: {
    toolTitle: '许可证密钥生成器',
    toolDesc: '生成随机许可证密钥和序列号，自定义格式（XXXX-XXXX-XXXX）。支持批量生成和多种字符集。用于测试和 QA — 100% 浏览器本地运行。',
    lblGroups: '分组数量',
    lblChars: '每组字符数',
    lblSep: '分隔符',
    lblCharset: '字符集',
    lblCustom: '自定义字符',
    lblCount: '生成数量',
    lblUnique: '确保所有密钥唯一',
    lblOut: '生成的密钥',
    generate: '生成',
    step1: '设置格式：分组数、每组字符数、分隔符',
    step2: '选择字符集或自定义字符',
    step3: '设置生成数量（1-1000）',
    step4: '点击「生成」，再点「复制」复制全部密钥',
    note: '密钥为随机生成，仅供测试 — 不会激活任何真实软件。',
  }
});

const { $, copyText, t } = GZ;

const CHARSETS = {
  'alnum-upper': 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789',
  'upper': 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
  'alnum': 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789',
  'hex': '0123456789ABCDEF',
  'numeric': '0123456789',
};

function randomChar(charset) {
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return charset[arr[0] % charset.length];
}

function generateKey(groups, chars, sep, charset) {
  const parts = [];
  for (let g = 0; g < groups; g++) {
    let part = '';
    for (let c = 0; c < chars; c++) {
      part += randomChar(charset);
    }
    parts.push(part);
  }
  return parts.join(sep);
}

function generate() {
  const groups = Math.max(1, Math.min(10, parseInt($('#groups').value) || 4));
  const chars = Math.max(1, Math.min(12, parseInt($('#chars').value) || 4));
  const sep = $('#sep').value || '-';
  const charsetKey = $('#charset').value;
  const charset = charsetKey === 'custom' ? ($('#custom-chars').value || 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789') : (CHARSETS[charsetKey] || CHARSETS['alnum-upper']);
  const count = Math.max(1, Math.min(1000, parseInt($('#count').value) || 10));
  const wantUnique = $('#unique').checked;

  if (charset.length === 0) {
    $('#output').innerHTML = '<span style="color:var(--gz-accent)">Character set cannot be empty.</span>';
    return;
  }

  const keys = new Set();
  let attempts = 0;
  const maxAttempts = count * 10;

  while (keys.size < count && attempts < maxAttempts) {
    const key = generateKey(groups, chars, sep, charset);
    if (wantUnique) {
      keys.add(key);
    } else {
      keys.add(key);
      if (keys.size === count) break;
    }
    attempts++;
  }

  // If not requiring uniqueness, just fill the array
  let result;
  if (wantUnique) {
    result = Array.from(keys);
  } else {
    result = [];
    for (let i = 0; i < count; i++) {
      result.push(generateKey(groups, chars, sep, charset));
    }
  }

  $('#output').textContent = result.join('\n');
}

$('#charset').addEventListener('change', e => {
  $('#custom-field').style.display = e.target.value === 'custom' ? 'flex' : 'none';
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#output').textContent='';">${t('clear')}</button>`;

// Set labels
$('#lbl-groups').textContent = t('lblGroups');
$('#lbl-chars').textContent = t('lblChars');
$('#lbl-sep').textContent = t('lblSep');
$('#lbl-charset').textContent = t('lblCharset');
$('#lbl-custom').textContent = t('lblCustom');
$('#lbl-count').textContent = t('lblCount');
$('#lbl-unique').textContent = t('lblUnique');
$('#lbl-out').textContent = t('lblOut');

generate();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🆔', href:'/dev/uuid.html', name:'UUID Generator'},
    {icon:'🔐', href:'/dev/api-key-generator.html', name:'API Key Generator'},
    {icon:'#️⃣', href:'/dev/hash.html', name:'Hash Generator'},
  ]
});
</script>
