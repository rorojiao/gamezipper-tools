<script type="application/ld+json">{"@context":"https://***@type":"WebApplication","name":"Kinetic Energy Calculator","description":"Free online kinetic energy calculator. Compute kinetic energy using KE = ½mv². Enter mass and velocity to get results in Joules, kilojoules, calories, and foot-pounds instantly.","url": "https://tools.gamezipper.com/zh/calc/kinetic-energy-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is the formula for kinetic energy?","acceptedAnswer":{"@type":"Answer","text":"Kinetic energy is KE = ½ × m × v², where m is mass in kilograms and v is velocity in meters per second. The result is in Joules (J). For example, a 2 kg object moving at 10 m/s has KE = ½ × 2 × 100 = 100 J."}},{"@type":"Question","name":"What is a Joule?","acceptedAnswer":{"@type":"Answer","text":"One Joule is the kinetic energy of a 2 kg object moving at 1 m/s. 1 J = 1 kg·m²/s². Common conversions: 1 kJ = 1000 J, 1 calorie = 4.184 J, 1 foot-pound = 1.356 J."}},{"@type":"Question","name":"What is the difference between kinetic and potential energy?","acceptedAnswer":{"@type":"Answer","text":"Kinetic energy is the energy of motion (KE = ½mv²). Potential energy is stored energy due to position or state (e.g., gravitational PE = mgh). The total mechanical energy is the sum of both."}},{"@type":"Question","name":"Why does velocity have a bigger effect than mass on kinetic energy?","acceptedAnswer":{"@type":"Answer","text":"In the formula KE = ½mv², velocity is squared while mass is linear. Doubling the mass doubles the kinetic energy, but doubling the velocity quadruples it (2² = 4). This is why high-speed impacts are so destructive."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="formula">KE = ½ × m × v²</div>
    <div class="preset-row" id="presets"></div>
    <div class="ke-grid">
      <div class="ke-field">
        <label id="lblMass">Mass (m)</label>
        <div class="row"><input type="number" id="mass" value="2" step="any" min="0">
          <select id="massUnit"><option value="kg" selected>kg</option><option value="g">g</option><option value="lb">lb</option><option value="oz">oz</option><option value="ton">t</option></select>
        </div>
      </div>
      <div class="ke-field">
        <label id="lblVel">Velocity (v)</label>
        <div class="row"><input type="number" id="velocity" value="10" step="any" min="0">
          <select id="velUnit"><option value="mps" selected>m/s</option><option value="kmh">km/h</option><option value="mph">mph</option><option value="fps">ft/s</option><option value="knot">knot</option></select>
        </div>
      </div>
    </div>
    <div class="result-card">
      <h3 id="hResult">⚡ Kinetic Energy</h3>
      <div id="resultOut"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{toolTitle:'Kinetic Energy Calculator',toolDesc:'Calculate kinetic energy using KE = ½mv². Enter mass and velocity to get results in Joules, kilojoules, calories, watt-hours, and foot-pounds.',
    step1:'Enter the mass of the object and select its unit',step2:'Enter the velocity (speed) and select its unit',step3:'The kinetic energy updates automatically as you type',step4:'View energy in Joules, kJ, calories, Wh, and ft·lbf',
    lblMass:'Mass (m)',lblVel:'Velocity (v)',hResult:'⚡ Kinetic Energy',
    energyJ:'Energy (Joules)',comparisons:'Real-world comparison',presets:['Baseball (145g, 40 m/s)','Car (1500kg, 13.9 m/s)','Runner (70kg, 3 m/s)','Bullet (8g, 400 m/s)','Bicycle (90kg, 5.5 m/s)']},
  zh:{toolTitle:'动能计算器',toolDesc:'使用 KE = ½mv² 计算动能。输入质量和速度，获得焦耳、千焦、卡路里、瓦时和英尺·磅力的结果。',
    step1:'输入物体的质量并选择单位',step2:'输入速度并选择单位',step3:'动能会随输入自动更新',step4:'查看焦耳、千焦、卡路里、瓦时和英尺·磅力',
    lblMass:'质量 (m)',lblVel:'速度 (v)',hResult:'⚡ 动能',
    energyJ:'能量（焦耳）',comparisons:'现实参照',presets:['棒球 (145g, 40 m/s)','汽车 (1500kg, 13.9 m/s)','跑步者 (70kg, 3 m/s)','子弹 (8g, 400 m/s)','自行车 (90kg, 5.5 m/s)']}
});
const{$,t}=GZ;
const round=(v,d=4)=>{if(!isFinite(v))return'—';const p=Math.pow(10,d);return(Math.round(v*p)/p).toString();};
const MASS={kg:1,g:0.001,lb:0.453592,oz:0.0283495,ton:1000};
const VEL={mps:1,kmh:0.277778,mph:0.44704,fps:0.3048,knot:0.514444};
function compute(){
  const m=(parseFloat($('#mass').value)||0)*MASS[$('#massUnit').value];
  const v=(parseFloat($('#velocity').value)||0)*VEL[$('#velUnit').value];
  const ke=0.5*m*v*v; // Joules
  const kJ=ke/1000;
  const cal=ke/4.184;
  const kcal=cal/1000;
  const wh=ke/3600;
  const ftlbf=ke/1.355818;
  let comp='';
  if(ke<1)comp='≈ a falling raindrop';
  else if(ke<10)comp='≈ a thrown tennis ball';
  else if(ke<100)comp='≈ a person jogging';
  else if(ke<1000)comp='≈ a car at city speed';
  else if(ke<100000)comp='≈ a car on the highway';
  else if(ke<1000000)comp='≈ a small explosion';
  else comp='≈ a large amount of energy!';
  $('#resultOut').innerHTML=`
    <div class="row"><span class="k">${t('energyJ')}</span><span class="v">${round(ke,4)} J</span></div>
    <div class="row"><span class="k">=</span><span class="v">${round(kJ,4)} kJ</span></div>
    <div class="row"><span class="k">=</span><span class="v">${round(cal,2)} cal</span></div>
    <div class="row"><span class="k">=</span><span class="v">${round(kcal,4)} kcal</span></div>
    <div class="row"><span class="k">=</span><span class="v">${round(wh,6)} Wh</span></div>
    <div class="row"><span class="k">=</span><span class="v">${round(ftlbf,4)} ft·lbf</span></div>
    <div class="row" style="margin-top:8px;font-size:.85em;color:var(--text2)">${t('comparisons')}: ${comp}</div>
  `;
}
$('#mass').addEventListener('input',compute);$('#velocity').addEventListener('input',compute);
$('#massUnit').addEventListener('change',compute);$('#velUnit').addEventListener('change',compute);
const presetData=[{m:0.145,mu:'kg',v:40,vu:'mps'},{m:1500,mu:'kg',v:13.9,vu:'mps'},{m:70,mu:'kg',v:3,vu:'mps'},{m:0.008,mu:'kg',v:400,vu:'mps'},{m:90,mu:'kg',v:5.5,vu:'mps'}];
$('#presets').innerHTML=presetData.map((p,i)=>`<button onclick="$('#mass').value=${p.m};$('#massUnit').value='${p.mu}';$('#velocity').value=${p.v};$('#velUnit').value='${p.vu}';compute()">${t('presets')[i]}</button>`).join('');
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="compute()">${t('calculate')}</button><button class="gz-btn gz-btn-secondary" onclick="GZ.copyText($('#resultOut').innerText)">${t('copy')}</button>`;
compute();
GZ.renderToolPage({
  category:'calc',titleKey:'toolTitle',descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'💪',href:'/calc/force-calculator.html',name:'Force Calculator'},
    {icon:'🏔️',href:'/calc/potential-energy-calculator.html',name:'Potential Energy'},
    {icon:'🚀',href:'/calc/acceleration-calculator.html',name:'Acceleration'},
    {icon:'🧮',href:'/calc/scientific-calculator.html',name:'Scientific Calculator'}
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
