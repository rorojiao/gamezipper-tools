const { $, copyText, t } = GZ;
const promptHistory = [];

const pick = arr => arr[Math.floor(Math.random() * arr.length)];

const qualityBoosters = [
  'masterpiece', 'best quality', 'highly detailed', 'ultra HD', '8k resolution',
  'sharp focus', 'professional', 'award-winning', 'trending on ArtStation',
  'intricate details', 'photorealistic rendering', 'volumetric lighting'
];

const detailAdds = [
  'with intricate textures and rich details',
  'featuring dramatic composition',
  'with stunning depth of field',
  'captured in exquisite detail',
  'with breathtaking atmosphere',
  'featuring rich color harmonies',
  'with cinematic composition',
  'showing remarkable attention to detail'
];

function generatePrompt() {
  const subject = $('#inp-subject').value.trim();
  if (!subject) return;
  const platform = $('#inp-platform').value;
  const artStyle = $('#inp-style').value;
  const mood = $('#inp-mood').value;
  const light = $('#inp-light').value;
  const color = $('#inp-color').value;
  const angle = $('#inp-angle').value;
  const aspect = $('#inp-aspect').value;
  const negative = $('#inp-negative').value.trim();

  let parts = [subject];
  if (artStyle) parts.push(artStyle);
  if (mood) parts.push(mood + ' mood');
  if (light) parts.push(light + ' lighting');
  if (color) parts.push(color + ' color palette');
  if (angle) parts.push(angle + ' view');
  parts.push(pick(detailAdds));
  parts.push(pick(qualityBoosters));
  parts.push(pick(qualityBoosters));

  let prompt = parts.join(', ');

  if (platform === 'midjourney') {
    if (aspect) {
      const arMap = {'16:9':'--ar 16:9','9:16':'--ar 9:16','1:1':'--ar 1:1','4:3':'--ar 4:3','3:2':'--ar 3:2','21:9':'--ar 21:9'};
      prompt += '\n\n' + (arMap[aspect] || '--ar 1:1') + ' --v 6 --q 2';
    }
  } else if (platform === 'stable') {
    if (negative) {
      prompt += '\n\nNegative prompt: ' + negative;
    } else {
      prompt += '\n\nNegative prompt: blurry, low quality, watermark, text, deformed';
    }
    prompt += '\nSteps: 30, Sampler: DPM++ 2M Karras, CFG: 7';
  } else if (platform === 'dalle') {
    // DALL-E likes natural language
    prompt = 'Create an image of ' + subject + '. ';
    if (artStyle) prompt += `The style should be ${artStyle}. `;
    if (mood) prompt += `The mood is ${mood}. `;
    if (light) prompt += `Use ${light} lighting. `;
    if (color) prompt += `Use a ${color} color palette. `;
    if (angle) prompt += `The camera angle is ${angle}. `;
    prompt += 'Make it highly detailed and professional.';
  }

  $('#output').textContent = prompt;

  promptHistory.unshift(prompt);
  if (promptHistory.length > 5) promptHistory.pop();
  renderHistory();
}

function renderHistory() {
  if (!promptHistory.length) { $('#history').innerHTML = ''; return; }
  $('#history').innerHTML = '<h3 style="font-size:.95rem;margin-bottom:8px">' + t('history') + '</h3>' +
    promptHistory.map((p, i) => `<div class="gz-prompt-history-item" onclick="$('#output').textContent=promptHistory[${i}]">${p.substring(0, 120)}${p.length > 120 ? '...' : ''}</div>`).join('');
}

const styleOpts = ['stylePhotorealistic','styleDigitalArt','styleOilPainting','styleWatercolor','styleAnime','style3DRender','stylePixelArt','styleCyberpunk','styleMinimalist'];
const moodOpts = ['moodEpic','moodSerene','moodDark','moodWhimsical','moodMysterious','moodVibrant','moodDramatic'];
const lightOpts = ['lightGolden','lightNeon','lightStudio','lightCinematic','lightNatural','lightMoody'];
const colorOpts = ['colorWarm','colorCool','colorMonochrome','colorPastel','colorVibrant','colorEarth'];
const angleOpts = ['angleCloseUp','angleWide','angleBirdsEye','angleLowAngle','angleSideView'];

function optSelect(options, id) {
  return `<div class="gz-chip-group" id="${id}">${options.map(k => `<div class="gz-chip" onclick="chipToggle(this)" data-val="${t(k)}">${t(k)}</div>`).join('')}</div>`;
}

function chipToggle(el) {
  const parent = el.parentElement;
  parent.querySelectorAll('.gz-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

function getChipVal(id) {
  const active = document.querySelector(`#${id} .gz-chip.active`);
  return active ? active.dataset.val : '';
}

  </div>
  <div>

  </div>

    </div>

  </div>
  <div>
    <label>${t('negativePrompt')}</label>
    <input type="text" id="inp-negative" placeholder="${t('negPlaceholder')}">
  </div>
`;

// Store chip selections in hidden inputs
const origGenerate = generatePrompt;
generatePrompt = function() {
  $('#inp-style').value = getChipVal('style-chips');
  $('#inp-mood').value = getChipVal('mood-chips');
  $('#inp-light').value = getChipVal('light-chips');
  $('#inp-color').value = getChipVal('color-chips');
  $('#inp-angle').value = getChipVal('angle-chips');
  origGenerate();
};

// Add hidden inputs for chip values
['style','mood','light','color','angle'].forEach(name => {
  const inp = document.createElement('input');
  inp.type = 'hidden'; inp.id = `inp-${name}`;
  document.body.appendChild(inp);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generatePrompt()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#output').textContent=''">${t('clear')}</button>
`;

$('#inp-subject').addEventListener('keydown', e => { if (e.key === 'Enter') generatePrompt(); });
