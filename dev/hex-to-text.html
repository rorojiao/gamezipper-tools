const { $, copyText, t } = GZ;

function hexToText(hex) {
  let cleaned = hex.trim();
  if (!cleaned) return '';
  // remove 0x prefixes
  cleaned = cleaned.replace(/0x/gi, '');
  // if has separators, split; else treat as continuous
  if (/[\s,;]+/.test(cleaned)) {
    cleaned = cleaned.split(/[\s,;]+/).filter(Boolean).join('');
  }
  // pad to even length
  if (cleaned.length % 2 !== 0) cleaned = '0' + cleaned;
  if (!/^[0-9a-fA-F]*$/.test(cleaned)) {
    throw new Error('hex string contains non-hex characters');
  }
  const bytes = new Uint8Array(cleaned.length / 2);
  for (let i = 0; i < cleaned.length; i += 2) {
    bytes[i / 2] = parseInt(cleaned.substr(i, 2), 16);
  }
  return new TextDecoder().decode(bytes);
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').value = ''; $('#status').innerHTML = ''; return; }
  try {
    const text = hexToText(inp);
    $('#output').value = text;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')} (${text.length} chars)</span>`;
  } catch(e) {
    $('#output').value = '';
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalid')}${e.message}</span>`;
  }
}

function loadExample() {
  $('#input').value = '48 65 6C 6C 6F 2C 20 47 61 6D 65 5A 69 70 70 65 72 21 20 F0 9F 8E AE';
  convert();
}

function doClear() { $('#input').value = ''; $('#output').value = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', convert);

$('#toolbar').innerHTML = `

  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
