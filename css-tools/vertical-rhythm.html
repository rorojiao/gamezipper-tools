<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is vertical rhythm in CSS?", "acceptedAnswer": {"@type": "Answer", "text": "Vertical rhythm is the consistent vertical spacing between elements on a page. It's achieved by using a base unit (usually the line height of body text) and making all margins, paddings, and spacing multiples of that unit, creating visual harmony."}}, {"@type": "Question", "name": "How is the baseline unit calculated?", "acceptedAnswer": {"@type": "Answer", "text": "The baseline unit = base font size × line height ratio. For example, 16px font with 1.5 line height = 24px baseline. All spacing values should be multiples of 24px (24, 48, 72, etc.) for consistent rhythm."}}, {"@type": "Question", "name": "What is a good line height ratio?", "acceptedAnswer": {"@type": "Answer", "text": "For body text, 1.4 to 1.6 is generally recommended. 1.5 is the most common choice for readability. For headings, tighter ratios (1.1-1.3) work better since larger text needs less line spacing."}}, {"@type": "Question", "name": "How do I use the generated CSS?", "acceptedAnswer": {"@type": "Answer", "text": "Copy the generated CSS custom properties (variables) into your :root selector, then use var(--space-1), var(--space-2), etc. for margins and padding throughout your stylesheets for consistent spacing."}}]}</script>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Vertical Rhythm Calculator',
    toolDesc: 'Generate a consistent CSS baseline grid. Set base font size, line height, and type scale to get spacing variables and heading sizes for harmonious vertical rhythm.',
    lblBase: 'Base Font Size (px)',
    lblRatio: 'Line Height Ratio',
    lblScale: 'Type Scale Ratio',
    copy: 'Copy CSS Variables',
    step1: 'Set your base font size (typically 16px)',
    step2: 'Choose a line height ratio (1.5 is most common)',
    step3: 'Pick a modular type scale for heading sizes',
    step4: 'Copy the generated CSS variables into your project',
    element: 'Element',
    fontSize: 'Font Size',
    lineHeight: 'Line Height',
    margin: 'Margin',
    em: 'em',
    body: 'Body',
    h1: 'H1 Heading',
    h2: 'H2 Heading',
    h3: 'H3 Heading',
    h4: 'H4 Heading',
    h5: 'H5 Heading',
    h6: 'H6 Heading',
  },
  zh: {
    toolTitle: '垂直节奏计算器',
    toolDesc: '生成一致的 CSS 基线网格。设置基础字号、行高和字阶比例，获取间距变量和标题尺寸，实现和谐的垂直节奏。',
    lblBase: '基础字号',
    lblRatio: '行高比例',
    lblScale: '字阶比例',
    copy: '复制 CSS 变量',
    step1: '设置基础字号（通常为 16px）',
    step2: '选择行高比例（1.5 最常用）',
    step3: '选择模块化字阶用于标题尺寸',
    step4: '将生成的 CSS 变量复制到项目中',
    element: '元素',
    fontSize: '字号',
    lineHeight: '行高',
    margin: '外边距',
    em: 'em',
    body: '正文',
    h1: 'H1 标题',
    h2: 'H2 标题',
    h3: 'H3 标题',
    h4: 'H4 标题',
    h5: 'H5 标题',
    h6: 'H6 标题',
  }
});

const { $, copyText, t } = GZ;

function getBase() { return parseInt($('#baseSize').value); }
function getRatio() { return parseFloat($('#lineRatio').value); }
function getScale() { return parseFloat($('#scaleRatio').value); }

function update() {
  const base = getBase();
  const ratio = getRatio();
  const scale = getScale();
  const baseline = Math.round(base * ratio);

  $('#baseVal').textContent = base + 'px';
  $('#ratioVal').textContent = ratio.toFixed(2);
  const baselineStr = baseline + 'px';

  // Heading sizes (H1 = scale^3, H2 = scale^2, etc.)
  const sizes = [
    { label: t('body'), tag: 'p', power: 0 },
    { label: t('h6'), tag: 'h6', power: 1 },
    { label: t('h5'), tag: 'h5', power: 2 },
    { label: t('h4'), tag: 'h4', power: 3 },
    { label: t('h3'), tag: 'h3', power: 4 },
    { label: t('h2'), tag: 'h2', power: 5 },
    { label: t('h1'), tag: 'h1', power: 6 },
  ];

  // Render preview
  const lineH = ratio;
  let previewHtml = '';
  sizes.slice().reverse().forEach(s => {
    const fontSize = base * Math.pow(scale, s.power);
    const lh = s.power === 0 ? lineH : Math.max(1, lineH * 0.85);
    const margin = baseline + 'px';
    previewHtml += `<${s.tag} style="font-size:${fontSize.toFixed(1)}px;line-height:${lh};margin:0 0 ${margin} 0;color:#222">${s.label} — ${fontSize.toFixed(1)}px</${s.tag}>`;
  });
  previewHtml += `<p style="font-size:${base}px;line-height:${lineH};margin:0;color:#555">This is body text at ${base}px with ${ratio} line height. The baseline grid unit is ${baselineStr}. All spacing aligns to this rhythm for visual harmony in your layout.</p>`;
  $('#rhContent').innerHTML = previewHtml;

  // Render grid overlay
  let gridHtml = '';
  for (let y = 0; y < 600; y += baseline) {
    gridHtml += `<div class="line" style="position:absolute;top:${y}px;left:0;right:0;height:0"></div>`;
  }
  $('#rhythmGrid').innerHTML = gridHtml;

  // Scale table
  let tableHtml = `<thead><tr><th>${t('element')}</th><th>${t('fontSize')}</th><th>${t('lineHeight')}</th><th>${t('margin')}</th></tr></thead><tbody>`;
  sizes.forEach(s => {
    const fontSize = base * Math.pow(scale, s.power);
    const lh = s.power === 0 ? lineH : Math.max(1, lineH * 0.85);
    tableHtml += `<tr>
      <td class="preview-cell" style="font-size:${Math.min(fontSize, 18).toFixed(0)}px">${s.label}</td>
      <td class="num">${fontSize.toFixed(1)}px (${(fontSize/base).toFixed(2)}${t('em')})</td>
      <td class="num">${lh.toFixed(2)}</td>
      <td class="num">${baselineStr}</td>
    </tr>`;
  });
  tableHtml += '</tbody>';
  $('#scaleTable').innerHTML = tableHtml;

  // CSS variables output
  let spacingVars = '';
  for (let i = 1; i <= 8; i++) {
    spacingVars += `  --space-${i}: ${baseline * i}px;\n`;
  }
  $('#codeOutput').textContent =
`:root {
  /* Base typography */
  --base-font-size: ${base}px;
  --base-line-height: ${ratio};
  --baseline: ${baselineStr};

  /* Spacing scale (multiples of baseline) */
${spacingVars}
  /* Type scale (ratio: ${scale}) */
${sizes.map(s => `  --font-${s.tag === 'p' ? 'body' : s.tag}: ${(base * Math.pow(scale, s.power)).toFixed(1)}px;`).join('\n')}
}

/* Usage example */
body {
  font-size: var(--base-font-size);
  line-height: var(--base-line-height);
}
h1 { font-size: var(--font-h1); margin: 0 0 var(--baseline); }
p { margin: 0 0 var(--baseline); }`;
}

['baseSize','lineRatio','scaleRatio'].forEach(id => {
  $('#' + id).addEventListener('input', update);
  $('#' + id).addEventListener('change', update);
});

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="copyText(document.getElementById('codeOutput').textContent)">📋 ${t('copy')}</button>`;

GZ.renderToolPage({
  category: 'css-tools',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📏', href:'/css-tools/line-height.html', name:'Line Height'},
    {icon:'🔤', href:'/text/typographic-scale.html', name:'Typographic Scale'},
    {icon:'📐', href:'/css-tools/em-px.html', name:'EM to PX'},
    {icon:'🎨', href:'/css-tools/font-pair.html', name:'Font Pairs'},
  ]
});

update();
</script>
