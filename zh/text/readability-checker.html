<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a readability score?", "acceptedAnswer": {"@type": "Answer", "text": "A readability score measures how easy or difficult a text is to read. It uses formulas based on sentence length, word length, and syllable count to estimate the education level needed to understand the text."}}, {"@type": "Question", "name": "What is the Flesch-Kincaid score?", "acceptedAnswer": {"@type": "Answer", "text": "The Flesch-Kincaid readability test includes two scores: Reading Ease (0-100, higher is easier) and Grade Level (estimates US school grade needed to understand the text)."}}, {"@type": "Question", "name": "What readability score should I aim for?", "acceptedAnswer": {"@type": "Answer", "text": "For general web content, aim for a Flesch Reading Ease of 60-70 (8th-9th grade level). For technical writing, 50-60 is acceptable. Lower scores indicate more complex text."}}, {"@type": "Question", "name": "How accurate are these readability formulas?", "acceptedAnswer": {"@type": "Answer", "text": "Readability formulas provide estimates based on statistical measures. They are most accurate for English text and work best with longer passages (100+ words). They measure text complexity, not content quality."}}]}</script>

    <div><textarea id="input" rows="10" spellcheck="false"></textarea></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Readability Score Checker',
    toolDesc: 'Analyze text readability with Flesch-Kincaid, Gunning Fog, Coleman-Liau, ARI, and SMOG scores. Get detailed writing statistics.',
    step1: 'Paste or type your text in the input area',
    step2: 'Click Analyze to calculate readability scores',
    step3: 'Review the overall readability grade and score',
    step4: 'Check individual indices and writing statistics for improvement areas',
  },
  zh: {
    toolTitle: '可读性评分检测器',
    toolDesc: '通过 Flesch-Kincaid、Gunning Fog、Coleman-Liau、ARI 和 SMOG 等指标分析文本可读性，获取详细写作统计。',
    step1: '在输入区粘贴或输入文本',
    step2: '点击「分析」计算可读性评分',
    step3: '查看整体可读性等级和分数',
    step4: '检查各项指标和写作统计，找到改进方向',
  }
});

const { $, t } = GZ;

function syllableCount(word) {
  word = word.toLowerCase().replace(/[^a-z]/g, '');
  if (word.length <= 3) return 1;
  word = word.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, '');
  word = word.replace(/^y/, '');
  const m = word.match(/[aeiouy]{1,2}/g);
  return m ? m.length : 1;
}

function countSyllables(text) {
  const words = text.split(/\s+/).filter(w => /[a-z]/i.test(w));
  return words.reduce((sum, w) => sum + syllableCount(w), 0);
}

function analyze() {
  const text = $('#input').value.trim();
  if (!text) { $('#results').innerHTML = ''; return; }

  const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
  const words = text.split(/\s+/).filter(w => w.length > 0);
  const chars = text.replace(/\s/g, '').length;
  const syllables = countSyllables(text);
  const complexWords = words.filter(w => syllableCount(w) >= 3);
  const avgSentenceLen = words.length / Math.max(sentences.length, 1);
  const avgWordLen = chars / Math.max(words.length, 1);

  // Flesch Reading Ease
  const fleschRE = 206.835 - 1.015 * avgSentenceLen - 84.6 * (syllables / Math.max(words.length, 1));
  const fleschClamped = Math.max(0, Math.min(100, fleschRE));

  // Flesch-Kincaid Grade Level
  const fkGrade = 0.39 * avgSentenceLen + 11.8 * (syllables / Math.max(words.length, 1)) - 15.59;

  // Gunning Fog
  const fog = 0.4 * (avgSentenceLen + 100 * (complexWords.length / Math.max(words.length, 1)));

  // Coleman-Liau
  const L = (chars / Math.max(words.length, 1)) * 100;
  const S = (sentences.length / Math.max(words.length, 1)) * 100;
  const colemanLiau = 0.0588 * L - 0.296 * S - 15.8;

  // ARI (Automated Readability Index)
  const ari = 4.71 * (chars / Math.max(words.length, 1)) + 0.5 * avgSentenceLen - 21.43;

  // SMOG
  const polysyllables = words.filter(w => syllableCount(w) >= 3).length;
  const smog = 1.043 * Math.sqrt(polysyllables * (30 / Math.max(sentences.length, 1))) + 3.1291;

  // Average grade
  const avgGrade = (fkGrade + fog + colemanLiau + ari + smog) / 5;

  // Grade to color
  function gradeColor(g) {
    if (g <= 6) return '#00d672';
    if (g <= 9) return '#48dbfb';
    if (g <= 12) return '#feca57';
    return '#e94560';
  }
  function gradeLabel(g) {
    if (g <= 5) return 'Very Easy';
    if (g <= 7) return 'Easy';
    if (g <= 9) return 'Moderate';
    if (g <= 12) return 'Difficult';
    return 'Very Difficult';
  }

  const gc = gradeColor(avgGrade);

  let html = '';

  // Main score card
  html += `<div class="gz-score-card">
    <div class="gz-score-label">Average Grade Level</div>
    <div class="gz-score-number" style="color:${gc}">${avgGrade.toFixed(1)}</div>
    <div class="gz-score-grade" style="background:${gc}22;color:${gc}">${gradeLabel(avgGrade)}</div>
    <div class="gz-bar" style="margin-top:16px"><div class="gz-bar-fill" style="width:${Math.min(100, fleschClamped)}%;background:${gc}"></div></div>
    <div class="gz-score-label" style="margin-top:6px">Flesch Reading Ease: ${fleschClamped.toFixed(1)}</div>
  </div>`;

  // Metrics
  html += '<div class="gz-metrics">';
  const metrics = [
    [words.length, 'Words', '#48dbfb'],
    [sentences.length, 'Sentences', '#feca57'],
    [syllables, 'Syllables', '#00d672'],
    [chars, 'Characters', '#ff6b6b'],
    [complexWords.length, 'Complex Words', '#e94560'],
    [avgSentenceLen.toFixed(1), 'Avg Sentence Length', '#a29bfe'],
  ];
  for (const [val, label, color] of metrics) {
    html += `<div class="gz-metric"><div class="gz-metric-val" style="color:${color}">${val}</div><div class="gz-metric-label">${label}</div></div>`;
  }
  html += '</div>';

  // Individual indices
  html += '<div style="background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px">';
  html += '<h3 style="margin:0 0 12px;font-size:1em">📊 Readability Indices</h3>';

  const indices = [
    ['Flesch-Kincaid Grade', fkGrade, 'Estimates US school grade level needed to understand the text'],
    ['Gunning Fog', fog, 'Estimates years of formal education needed to understand the text on first reading'],
    ['Coleman-Liau', colemanLiau, 'Based on characters per word rather than syllables'],
    ['ARI (Auto Readability)', ari, 'Automated Readability Index based on characters and sentences'],
    ['SMOG', smog, 'Simple Measure of Gobbledygook — estimates years of education needed'],
  ];

  for (const [name, score, desc] of indices) {
    const c = gradeColor(score);
    html += `<div class="gz-index-row">
      <div>
        <div class="gz-index-name">${name}</div>
        <div class="gz-index-desc">${desc}</div>
      </div>
      <div class="gz-index-score" style="color:${c}">${score.toFixed(1)}</div>
    </div>`;
  }
  html += '</div>';

  $('#results').innerHTML = html;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ Analyzed ${words.length} words across ${sentences.length} sentences</span>`;
}

function loadExample() {
  $('#input').value = `The quick brown fox jumps over the lazy dog. This simple sentence contains every letter of the English alphabet. It has been used for centuries to test typewriters, fonts, and keyboards. In modern web development, readability is an important factor for user experience. Content that is easy to read keeps visitors engaged and improves SEO rankings. Short sentences help. They make text clearer. Complex words should be replaced with simpler alternatives when possible. Technical jargon should be explained or avoided for general audiences. The goal is to communicate clearly and effectively without sacrificing accuracy or depth.`;
  analyze();
}

function doClear() { $('#input').value = ''; $('#results').innerHTML = ''; $('#status').innerHTML = ''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="analyze()">${t('analyze') || 'Analyze'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📝', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'📊', href:'/text/text-statistics.html', name:'Text Statistics'},
    {icon:'📖', href:'/text/reading-time.html', name:'Reading Time'},
    {icon:'🔤', href:'/text/grammar-checker.html', name:'Grammar Checker'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
