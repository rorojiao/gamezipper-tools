<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is PMI and who needs it?", "acceptedAnswer": {"@type": "Answer", "text": "Private Mortgage Insurance (PMI) protects the lender, not you, when you put less than 20% down on a conventional loan. It typically costs 0.3% to 1.5% of the original loan per year, added to your monthly payment. FHA, VA, and USDA loans use different mortgage-insurance structures."}}, {"@type": "Question", "name": "When does PMI automatically cancel?", "acceptedAnswer": {"@type": "Answer", "text": "By law (the Homeowners Protection Act), your lender must automatically cancel PMI when your loan balance reaches 78% of the original home value, provided you're current on payments. You can also request cancellation once you reach 80% LTV based on the current home value via a new appraisal."}}, {"@type": "Question", "name": "How does my credit score affect PMI?", "acceptedAnswer": {"@type": "Answer", "text": "Credit score is the single biggest factor after LTV. A 760+ score with 5% down might pay 0.3% PMI, while a 660 score with the same LTV could pay 1.0-1.5% — five times more. Improving your score before buying can save thousands over the life of PMI."}}, {"@type": "Question", "name": "Does this calculator store my information?", "acceptedAnswer": {"@type": "Answer", "text": "No. All calculations run entirely in your browser. No data is uploaded, saved, or shared with any server."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'PMI Calculator (Private Mortgage Insurance)',
    toolDesc: 'Estimate your monthly and lifetime PMI cost from loan amount, down payment, home-price appreciation and credit score. See exactly when your PMI can be cancelled and how much you\'d save by removing it early. 100% private, browser-only.',
    lblPrice: 'Home Price ($)',
    lblDown: 'Down Payment ($)',
    lblAppreciation: 'Home Appreciation (%/yr)',
    lblCredit: 'Credit Score',
    tileMonthly: 'Monthly PMI',
    tileAnnual: 'Annual PMI',
    tileLifetime: 'Lifetime PMI Cost',
    tileLtv: 'Starting LTV',
    tileCancel: 'PMI Cancels',
    tip: 'Tip: PMI rates depend mostly on credit score and LTV. A 740+ score can cut your PMI to a third of what a 660 score pays at the same LTV. If you can\'t reach 20% down, boosting your credit score before buying is the cheapest way to slash PMI.',
    step1: 'Enter the home price and your down payment',
    step2: 'Set expected annual appreciation and pick your credit tier',
    step3: 'See your monthly, annual and total PMI cost',
    step4: 'Check the cancellation year and plan to remove PMI early',
  },
  zh: {
    toolTitle: 'PMI 计算器（私人房贷保险）',
    toolDesc: '根据贷款金额、首付、房价升值率和信用评分估算月度及总 PMI 费用。查看 PMI 可取消的确切时间，以及提前取消能省多少钱。100% 私密，浏览器本地运行。',
    lblPrice: '房屋价格 ($)',
    lblDown: '首付 ($)',
    lblAppreciation: '房屋年升值率 (%)',
    lblCredit: '信用评分',
    tileMonthly: '月度 PMI',
    tileAnnual: '年度 PMI',
    tileLifetime: 'PMI 总成本',
    tileLtv: '初始 LTV',
    tileCancel: 'PMI 取消时间',
    tip: '提示：PMI 费率主要取决于信用评分和 LTV。740+ 评分在相同 LTV 下的 PMI 仅为 660 评分的三分之一。若首付不足 20%，买房前提升信用评分是削减 PMI 最省钱的方法。',
    step1: '输入房屋价格和首付金额',
    step2: '设置预期年升值率并选择信用等级',
    step3: '查看月度、年度和总 PMI 费用',
    step4: '查看取消年份，提前规划取消 PMI',
  }
});

const { $, $$, t } = GZ;
$$('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });

// PMI annual rate matrix (% of loan) by credit tier × LTV band — industry MGIC-style ranges
function pmiRate(ltv, credit) {
  // credit tier buckets
  let tier;
  if (credit >= 780) tier = 0;
  else if (credit >= 740) tier = 1;
  else if (credit >= 700) tier = 2;
  else if (credit >= 680) tier = 3;
  else if (credit >= 660) tier = 4;
  else tier = 5;
  // annual rate matrix [tier][ltvBand] 0:<80, 1:80-85, 2:85-90, 3:90-95, 4:95-97
  const M = [
    [0.00, 0.19, 0.28, 0.41, 0.54], // 780+
    [0.00, 0.22, 0.32, 0.46, 0.62], // 740-779
    [0.00, 0.28, 0.41, 0.57, 0.78], // 700-739
    [0.00, 0.36, 0.50, 0.69, 0.90], // 680-699
    [0.00, 0.46, 0.64, 0.89, 1.15], // 660-679
    [0.00, 0.62, 0.85, 1.10, 1.45], // 620-659
  ];
  let band;
  if (ltv < 80) band = 0;
  else if (ltv < 85) band = 1;
  else if (ltv < 90) band = 2;
  else if (ltv < 95) band = 3;
  else band = 4;
  return M[tier][band] / 100;
}

function calc() {
  const price = Math.max(0, +$('#price').value || 0);
  const down = Math.max(0, +$('#down').value || 0);
  const appreciation = Math.max(0, +$('#appreciation').value || 0) / 100;
  const credit = +$('#credit').value || 740;
  const loan = Math.max(0, price - down);
  const startLtv = price > 0 ? loan / price : 0;
  const annualRate = pmiRate(startLtv * 100, credit);

  const annualPmi = loan * annualRate;
  const monthlyPmi = annualPmi / 12;

  // Find cancellation year: when LTV reaches 78% of ORIGINAL value OR appreciation drives current value's LTV to 80% for early removal
  // Auto-cancel at 78% of original value (amortization-based balance reach)
  // Approximate with average amortization: balance declines ~2-3%/yr early on a 30yr
  // We model: balance(yr) and required balance for 78% = 0.78*price (auto) or 0.80*currentValue (early, via appraisal)
  let cancelYear = 0;
  let earlyCancelYear = 0;
  for (let yr = 1; yr <= 30; yr++) {
    // rough remaining balance after yr on a 6.8% 30yr loan
    const monthlyRate = 0.068 / 12;
    const months = 360;
    const f = Math.pow(1 + monthlyRate, months);
    const monthly = loan * (monthlyRate * f) / (f - 1);
    const remainingMonths = months - yr * 12;
    const balance = remainingMonths > 0 ? monthly * (Math.pow(1+monthlyRate, remainingMonths) - 1) / (monthlyRate * Math.pow(1+monthlyRate, remainingMonths)) : 0;
    const currentValue = price * Math.pow(1 + appreciation, yr);
    // Auto cancel: balance <= 0.78 * original price
    if (cancelYear === 0 && balance <= 0.78 * price) cancelYear = yr;
    // Early cancel: balance <= 0.80 * current value (requires appraisal)
    if (earlyCancelYear === 0 && balance <= 0.80 * currentValue) earlyCancelYear = yr;
    if (cancelYear && earlyCancelYear) break;
  }
  if (!cancelYear) cancelYear = 30;
  if (!earlyCancelYear) earlyCancelYear = cancelYear;

  const lifetimePmi = monthlyPmi * 12 * earlyCancelYear;

  const cfmt = v => '$' + v.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  $('#tiles').innerHTML = `
    <div class="pm-tile"><div class="num">$${monthlyPmi.toFixed(2)}</div><div class="lbl">${t('tileMonthly')}</div></div>
    <div class="pm-tile"><div class="num">${cfmt(annualPmi)}</div><div class="lbl">${t('tileAnnual')}</div></div>
    <div class="pm-tile"><div class="num">${cfmt(lifetimePmi)}</div><div class="lbl">${t('tileLifetime')}</div></div>
    <div class="pm-tile"><div class="num">${(startLtv*100).toFixed(0)}%</div><div class="lbl">${t('tileLtv')}</div></div>
    <div class="pm-tile"><div class="num">~${earlyCancelYear} yr</div><div class="lbl">${t('tileCancel')}</div></div>`;

  const lang = (document.documentElement.lang === 'zh' || (window.GZI18n && GZI18n.lang === 'zh')) ? 'zh' : 'en';
  const rows = lang === 'zh' ? [
    ['年费率', (annualRate*100).toFixed(3) + '%'],
    ['起始 LTV', (startLtv*100).toFixed(1) + '%'],
    ['年 PMI', cfmt(annualPmi)],
    ['月 PMI', '$' + monthlyPmi.toFixed(2)],
    ['自动取消（78% 原值）', `第 ${cancelYear} 年`],
    ['提前取消（80% 现值）', `第 ${earlyCancelYear} 年`],
    ['PMI 总成本（至提前取消）', cfmt(lifetimePmi)],
  ] : [
    ['Annual PMI Rate', (annualRate*100).toFixed(3) + '%'],
    ['Starting LTV', (startLtv*100).toFixed(1) + '%'],
    ['Annual PMI', cfmt(annualPmi)],
    ['Monthly PMI', '$' + monthlyPmi.toFixed(2)],
    ['Auto-Cancel (78% of original)', `Year ${cancelYear}`],
    ['Early Cancel (80% of current value)', `Year ${earlyCancelYear}`],
    ['Total PMI Cost (until early cancel)', cfmt(lifetimePmi)],
  ];
  let html = '<table class="pm-table"><tbody>';
  rows.forEach(r => { html += `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`; });
  html += '</tbody></table>';
  $('#results').innerHTML = html;
  $('#tip').textContent = t('tip');
}

$('#toolbar').innerHTML = '';
['price','down','appreciation','credit'].forEach(id => {
  $('#' + id).addEventListener('input', calc);
  $('#' + id).addEventListener('change', calc);
});

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💵', href:'/calc/down-payment-calculator.html', name:'Down Payment'},
    {icon:'🏠', href:'/calc/mortgage-calculator.html', name:'Mortgage Calculator'},
    {icon:'💰', href:'/calc/closing-cost-calculator.html', name:'Closing Cost'},
    {icon:'⚖️', href:'/calc/debt-to-income-calculator.html', name:'DTI Calculator'},
  ]
});
</script>
