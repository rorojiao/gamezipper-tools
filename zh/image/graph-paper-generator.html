<script>
GZI18n.register({
  en: {
    toolTitle: 'Graph Paper Generator',
    toolDesc: 'Create free printable graph paper — square grid, isometric, dotted, polar and lined. Customize size, color and spacing, then download PNG or print. No signup.',
    lblType: 'Paper Type', lblPage: 'Page Size', lblSpacing: 'Grid Spacing',
    lblLineW: 'Line Weight (px)', lblColor: 'Line Color', lblMajor: 'Bold Lines',
    download: 'Download PNG', print: 'Print / Save PDF',
    step1: 'Pick a paper type: square, isometric, dotted, polar or lined',
    step2: 'Choose page size (Letter, A4, A3, Legal) and grid spacing',
    step3: 'Adjust line weight, color and bold-line frequency',
    step4: 'Click Download PNG or Print to save as PDF',
  },
  zh: {
    toolTitle: '坐标纸生成器',
    toolDesc: '免费生成可打印的坐标纸 — 方格、等距、点阵、极坐标和横线纸。自定义尺寸、颜色和间距，可下载 PNG 或直接打印。无需注册。',
    lblType: '纸张类型', lblPage: '页面尺寸', lblSpacing: '网格间距',
    lblLineW: '线宽 (px)', lblColor: '线条颜色', lblMajor: '加粗主线',
    download: '下载 PNG', print: '打印 / 存为 PDF',
    step1: '选择纸张类型：方格、等距、点阵、极坐标或横线',
    step2: '选择页面尺寸（Letter、A4、A3、Legal）和间距',
    step3: '调整线宽、颜色和加粗主线频率',
    step4: '点击「下载 PNG」或「打印」保存为 PDF',
  }
});

const { $, t } = GZ;
const DPI = 150; // rendering DPI — high enough for clean print, small enough canvas

const PAGE_DIM = {
  letter: { w: 8.5, h: 11, unit: 'in' },
  a4:     { w: 210, h: 297, unit: 'mm' },
  a3:     { w: 297, h: 420, unit: 'mm' },
  legal:  { w: 8.5, h: 14, unit: 'in' },
};

function mmToPx(mm) { return mm / 25.4 * DPI; }
function inToPx(inch) { return inch * DPI; }

function render() {
  const page = PAGE_DIM[$('#pageSize').value];
  const wPx = page.unit === 'mm' ? mmToPx(page.w) : inToPx(page.w);
  const hPx = page.unit === 'mm' ? mmToPx(page.h) : inToPx(page.h);
  const canvas = $('#canvas');
  canvas.width = Math.round(wPx);
  canvas.height = Math.round(hPx);
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height);

  const type = $('#gridType').value;
  const spacingPx = $('#spacing').value === '20' ? mmToPx(20) : ($('#spacing').value === '8' ? mmToPx(8) : ($('#spacing').value === '5' ? mmToPx(5) : ($('#spacing').value === '6.35' ? inToPx(0.25) : ($('#spacing').value === '12.7' ? inToPx(0.5) : mmToPx(10)))));
  const lw = +$('#lineWidth').value;
  const color = $('#lineColor').value;
  const major = +$('#majorEvery').value;
  const margin = mmToPx(10);

  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = lw;
  ctx.lineCap = 'round';

  const drawW = canvas.width - margin * 2;
  const drawH = canvas.height - margin * 2;

  if (type === 'lined') {
    for (let y = margin; y <= canvas.height - margin; y += spacingPx) {
      ctx.beginPath(); ctx.moveTo(margin, y); ctx.lineTo(canvas.width - margin, y); ctx.stroke();
    }
    // red margin line
    ctx.strokeStyle = '#ef4444'; ctx.lineWidth = lw * 1.2;
    ctx.beginPath(); ctx.moveTo(margin + mmToPx(20), margin); ctx.lineTo(margin + mmToPx(20), canvas.height - margin); ctx.stroke();
    return;
  }

  if (type === 'polar') {
    const cx = canvas.width / 2, cy = canvas.height / 2;
    const maxR = Math.hypot(drawW, drawH) / 2;
    for (let r = spacingPx; r < maxR; r += spacingPx) {
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
      if (major && Math.round(r / spacingPx) % major === 0) { ctx.save(); ctx.lineWidth = lw * 2; ctx.stroke(); ctx.restore(); }
      else ctx.stroke();
    }
    for (let a = 0; a < 360; a += 15) {
      const rad = a * Math.PI / 180;
      ctx.beginPath(); ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(rad) * maxR, cy + Math.sin(rad) * maxR);
      if (a % 45 === 0) { ctx.save(); ctx.lineWidth = lw * 2; ctx.stroke(); ctx.restore(); }
      else ctx.stroke();
    }
    return;
  }

  if (type === 'dotted') {
    for (let y = margin; y <= canvas.height - margin + 1; y += spacingPx) {
      for (let x = margin; x <= canvas.width - margin + 1; x += spacingPx) {
        ctx.beginPath(); ctx.arc(x, y, Math.max(0.5, lw * 0.9), 0, Math.PI * 2); ctx.fill();
      }
    }
    return;
  }

  if (type === 'isometric') {
    // triangular isometric grid: 3 sets of lines 60° apart
    const h = spacingPx * Math.sqrt(3) / 2;
    for (let y = margin; y < canvas.height - margin; y += h) {
      const row = Math.round((y - margin) / h);
      ctx.beginPath();
      ctx.moveTo(margin, y); ctx.lineTo(canvas.width - margin, y); ctx.stroke();
    }
    // diagonals
    const slope = Math.tan(Math.PI / 3); // 60°
    for (let x0 = margin - drawH / 2; x0 < canvas.width - margin + drawH / 2; x0 += spacingPx) {
      ctx.beginPath();
      ctx.moveTo(x0 - drawH / (2 * slope), margin);
      ctx.lineTo(x0 + drawH / (2 * slope), canvas.height - margin);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x0 + drawH / (2 * slope), margin);
      ctx.lineTo(x0 - drawH / (2 * slope), canvas.height - margin);
      ctx.stroke();
    }
    return;
  }

  // square grid (default)
  let col = 0, row = 0;
  for (let x = margin; x <= canvas.width - margin + 0.5; x += spacingPx, col++) {
    const isMajor = major && col % major === 0;
    ctx.save(); ctx.lineWidth = isMajor ? lw * 2 : lw;
    ctx.beginPath(); ctx.moveTo(x, margin); ctx.lineTo(x, canvas.height - margin); ctx.stroke();
    ctx.restore();
  }
  for (let y = margin; y <= canvas.height - margin + 0.5; y += spacingPx, row++) {
    const isMajor = major && row % major === 0;
    ctx.save(); ctx.lineWidth = isMajor ? lw * 2 : lw;
    ctx.beginPath(); ctx.moveTo(margin, y); ctx.lineTo(canvas.width - margin, y); ctx.stroke();
    ctx.restore();
  }
}

function downloadPNG() {
  const a = document.createElement('a');
  a.href = $('#canvas').toDataURL('image/png');
  a.download = `graph-paper-${$('#gridType').value}-${$('#pageSize').value}.png`;
  a.click();
}
function printPage() { window.print(); }

['#gridType','#pageSize','#spacing','#lineWidth','#lineColor','#majorEvery'].forEach(s =>
  $(s).addEventListener('input', render));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadPNG()">⬇️ ${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="printPage()">🖨️ ${t('print')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/image/placeholder-image.html', name:'Placeholder Image'},
    {icon:'📐', href:'/calc/square-footage.html', name:'Square Footage'},
    {icon:'🎨', href:'/image/placeholder-image-generator.html', name:'Placeholder Generator'},
    {icon:'📏', href:'/calc/dpi-calculator.html', name:'DPI Calculator'},
  ]
});
render();
</script>
