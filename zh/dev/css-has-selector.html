<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS :has() Selector Generator',
    toolDesc: 'Build CSS :has() parent selectors visually with live preview and copy production-ready code.',
    lblBuilder: 'Selector Builder',
    lblParent: 'Parent',
    lblHas: ':has()',
    lblState: 'State',
    lblProp: 'Property',
    lblPresets: 'Quick Presets',
    lblPreview: 'Live Preview',
    lblOutput: 'Generated CSS',
    copy: 'Copy CSS',
    copied: 'Copied!',
    presetCardImg: 'Card with image',
    presetCardChecked: 'Checked checkbox',
    presetEmptyHide: 'Hide empty',
    presetHoverScale: 'Hover scale',
    step1: 'Choose a parent element and its :has() target',
    step2: 'Add optional pseudo-class states like :hover',
    step3: 'Pick a CSS property to apply when matched',
    step4: 'Copy the generated CSS code to your project',
  },
  zh: {
    toolTitle: 'CSS :has() 选择器生成器',
    toolDesc: '可视化构建 CSS :has() 父级选择器，实时预览并复制生产可用的代码。',
    lblBuilder: '选择器构建器',
    lblParent: '父元素',
    lblHas: ':has()',
    lblState: '状态',
    lblProp: '属性',
    lblPresets: '快速预设',
    lblPreview: '实时预览',
    lblOutput: '生成的 CSS',
    copy: '复制 CSS',
    copied: '已复制！',
    presetCardImg: '含图片的卡片',
    presetCardChecked: '已选中复选框',
    presetEmptyHide: '隐藏空元素',
    presetHoverScale: '悬停缩放',
    step1: '选择父元素和 :has() 目标',
    step2: '添加可选的伪类状态，如 :hover',
    step3: '选择匹配时应用的 CSS 属性',
    step4: '复制生成的 CSS 代码到项目中',
  }
});

const { $, copyText, t } = GZ;

const presets = [
  { label: 'presetCardImg', parent: '.card', has: 'img', state: '', prop: 'box-shadow: 0 4px 12px rgba(78,205,196,.3)' },
  { label: 'presetCardChecked', parent: 'label', has: '[type=checkbox]:checked', state: '', prop: 'background: #1a2a3a' },
  { label: 'presetEmptyHide', parent: 'div', has: '', state: ':not(:has(*))', prop: 'display: none' },
  { label: 'presetHoverScale', parent: '.card', has: 'img', state: ':hover', prop: 'transform: scale(1.05)' },
];

function buildPresets() {
  const c = $('#presets');
  c.innerHTML = presets.map((p, i) => `<span class="tag-chip" data-i="${i}">${t(p.label)}</span>`).join('');
  c.querySelectorAll('.tag-chip').forEach(chip => {
    chip.onclick = () => {
      const p = presets[+chip.dataset.i];
      $('#parentSel').value = p.parent;
      if (!$('#parentSel').querySelector(`option[value="${CSS.escape(p.parent)}"]`)) {
        $('#parentSel').value = 'div';
        $('#parentClass').value = p.parent;
      } else {
        $('#parentClass').value = '';
      }
      $('#hasSel').value = p.has || 'img';
      $('#stateSel').value = p.state;
      $('#propSel').value = p.prop;
      generate();
    };
  });
}

function generate() {
  let parent = $('#parentClass').value.trim() || $('#parentSel').value;
  const has = $('#hasSel').value;
  const state = $('#stateSel').value;
  const prop = $('#propSel').value;

  let selector = parent;
  if (has) selector += `:has(${has})`;
  if (state) selector += state;

  const css = `${selector} {\n  ${prop};\n}`;

  const highlighted = `<span class="sel">${esc(selector)}</span> {\n  <span class="val">${esc(prop)}</span>;\n}`;
  $('#output').innerHTML = highlighted;
  $('#output').dataset.raw = css;

  // Update preview
  const styleId = 'gz-has-preview-style';
  let s = document.getElementById(styleId);
  if (!s) { s = document.createElement('style'); s.id = styleId; document.head.appendChild(s); }
  s.textContent = `#preview ${selector} { ${prop}; transition: all .3s; }`;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function doCopy() {
  const raw = $('#output').dataset.raw || '';
  copyText(raw);
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="doCopy()">${t('copy')}</button>`;

buildPresets();
$('#parentSel').onchange = $('#hasSel').onchange = $('#stateSel').onchange = $('#propSel').onchange = generate;
$('#parentClass').oninput = generate;
generate();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎯', href:'/css-tools/specificity.html', name:'Specificity'},
    {icon:'📐', href:'/css-tools/container-query.html', name:'Container Query'},
    {icon:'🔧', href:'/dev/css-units.html', name:'CSS Units'},
    {icon:'🎨', href:'/css-tools/gradient.html', name:'Gradient'},
  ]
});
</script>
