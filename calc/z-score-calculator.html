<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a z-score?","acceptedAnswer":{"@type":"Answer","text":"A z-score (standard score) measures how many standard deviations a value is from the mean of its distribution. A z-score of 0 means the value equals the mean; +1.5 means 1.5 standard deviations above the mean."}},{"@type":"Question","name":"How do I calculate a z-score?","acceptedAnswer":{"@type":"Answer","text":"The formula is z = (x − μ) / σ, where x is the raw score, μ is the population mean and σ is the standard deviation. Subtract the mean, then divide by the standard deviation."}},{"@type":"Question","name":"What does the probability (p-value) mean?","acceptedAnswer":{"@type":"Answer","text":"It is the area under the standard normal curve for the chosen region. For example, P(Z < z) is the probability that a random value is below your score; the percentile is that probability expressed as a percentage."}},{"@type":"Question","name":"What is a good z-score?","acceptedAnswer":{"@type":"Answer","text":"There is no universal good or bad z-score. In testing, z-scores above 1.96 or below −1.96 are statistically significant at the 0.05 level. In education, a z-score above 1 places you in roughly the top 16%."}}]}</script>

const { $, t } = GZ;

// Standard normal CDF (Abramowitz & Stegun 7.1.26 approximation)
function normCdf(z) {
  const t = 1 / (1 + 0.2316419 * Math.abs(z));
  const d = 0.3989422804014327 * Math.exp(-z * z / 2);
  const p = d * t * (0.319381530 + t * (-0.356563782 + t * (1.781477937 + t * (-1.821255978 + t * 1.330274429))));
  return z > 0 ? 1 - p : p;
}
function normPdf(z){ return 0.3989422804014327 * Math.exp(-z*z/2); }

let region = 'below';

function fmt(n, dp=4) {
  if (!isFinite(n)) return '∞';
  const f = parseFloat(n.toFixed(dp));
  return String(f);
}
function pct(n){ return fmt(n*100, 2) + '%'; }

function solve() {
  const x = parseFloat($('#inX').value);
  const mu = parseFloat($('#inMu').value);
  const sigma = parseFloat($('#inSigma').value);
  const out = $('#output');
  document.getElementById('lbl-raw').textContent = t('rawScore');
  document.getElementById('lbl-mean').textContent = t('mean');
  document.getElementById('lbl-sd').textContent = t('sd');
  if (isNaN(x) || isNaN(mu) || isNaN(sigma)) { out.innerHTML = `<p style="opacity:.6">${t('needInput')}</p>`; drawPlot(0,'below'); return; }
  if (sigma <= 0) { out.innerHTML = `<div class="zs-result"><p style="color:var(--gz-accent,#e94560)">${t('needSigma')}</p></div>`; drawPlot(0,'below'); return; }

  const z = (x - mu) / sigma;
  const pBelow = normCdf(z);
  const pAbove = 1 - pBelow;
  const pTwoTail = 2 * (z >= 0 ? pAbove : pBelow);
  const pBetween = Math.abs(pBelow - 0.5);

  out.innerHTML = `
    <div class="zs-result">
      <div class="zs-big">
        <div class="caption">${t('zScore')}</div>
        <div class="z">z = ${fmt(z)}</div>
      </div>
      <div class="zs-probs">
        <div class="zs-prob"><span>${t('probBelow')}</span><b>${fmt(pBelow)}</b></div>
        <div class="zs-prob"><span>${t('probAbove')}</span><b>${fmt(pAbove)}</b></div>
        <div class="zs-prob"><span>${t('percentile')}</span><b>${pct(pBelow)}</b></div>
        <div class="zs-prob"><span>${t('probTwoTail')}</span><b>${fmt(pTwoTail)}</b></div>
        <div class="zs-prob"><span>${t('probBetween')}</span><b>${fmt(pBetween)}</b></div>
      </div>
    </div>
    <div class="zs-steps">
      <span><b>1.</b> ${t('stepFormula')}:</span>
      <span style="padding-left:18px">z = (${fmt(x)} − ${fmt(mu)}) / ${fmt(sigma)}</span>
      <span style="padding-left:18px">z = ${fmt(x - mu)} / ${fmt(sigma)}</span>
      <span style="padding-left:18px"><b>z = ${fmt(z)}</b>　— ${t('stepResult')}</span>
    </div>`;

  drawPlot(z, region);
}

function drawPlot(z, mode) {
  const canvas = $('#plot');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.clientWidth, H = canvas.clientHeight;
  canvas.width = W*dpr; canvas.height = H*dpr;
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);

  const padL=24, padR=24, padT=14, padB=24;
  const xMin=-3.9, xMax=3.9;
  const px = zz => padL + (zz-xMin)/(xMax-xMin)*(W-padL-padR);
  const maxPdf = normPdf(0);
  const py = (y) => padT + (1 - y/maxPdf) * (H-padT-padB);

  // baseline
  const baseY = H - padB;

  // fill region
  ctx.fillStyle = 'rgba(78,205,196,0.28)';
  ctx.beginPath();
  const step = 0.02;
  if (mode === 'below') {
    ctx.moveTo(px(xMin), baseY);
    for (let zz=xMin; zz<=Math.min(z,xMax); zz+=step){ ctx.lineTo(px(zz), py(normPdf(zz))); }
    ctx.lineTo(px(Math.min(z,xMax)), baseY);
  } else if (mode === 'above') {
    ctx.moveTo(px(Math.max(z,xMin)), baseY);
    for (let zz=Math.max(z,xMin); zz<=xMax; zz+=step){ ctx.lineTo(px(zz), py(normPdf(zz))); }
    ctx.lineTo(px(xMax), baseY);
  } else if (mode === 'twoTail') {
    const za = Math.abs(z);
    ctx.moveTo(px(xMin), baseY);
    for (let zz=xMin; zz<=Math.min(-za,xMax); zz+=step){ ctx.lineTo(px(zz), py(normPdf(zz))); }
    ctx.lineTo(px(Math.min(-za,xMax)), baseY); ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(px(Math.max(za,xMin)), baseY);
    for (let zz=Math.max(za,xMin); zz<=xMax; zz+=step){ ctx.lineTo(px(zz), py(normPdf(zz))); }
    ctx.lineTo(px(xMax), baseY);
  } else { // between
    const lo = Math.min(0, z), hi = Math.max(0, z);
    ctx.moveTo(px(lo), baseY);
    for (let zz=lo; zz<=hi; zz+=step){ ctx.lineTo(px(zz), py(normPdf(zz))); }
    ctx.lineTo(px(hi), baseY);
  }
  ctx.closePath();
  ctx.fill();

  // curve
  ctx.strokeStyle = '#4ecdc4';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (let zz=xMin; zz<=xMax; zz+=step){
    const X=px(zz), Y=py(normPdf(zz));
    if (zz===xMin) ctx.moveTo(X,Y); else ctx.lineTo(X,Y);
  }
  ctx.stroke();

  // x-axis
  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(padL, baseY); ctx.lineTo(W-padR, baseY); ctx.stroke();

  // z markers
  ctx.fillStyle='#fff'; ctx.font='11px system-ui,sans-serif'; ctx.textAlign='center';
  [-3,-2,-1,0,1,2,3].forEach(zz=>{
    ctx.fillText(zz, px(zz), baseY+15);
    ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.beginPath(); ctx.moveTo(px(zz),padT); ctx.lineTo(px(zz),baseY); ctx.stroke();
  });
  // current z line
  if (z>=xMin && z<=xMax){
    ctx.strokeStyle='#ff6b6b'; ctx.lineWidth=2; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(px(z),padT); ctx.lineTo(px(z),baseY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#ff6b6b'; ctx.font='bold 12px system-ui,sans-serif';
    ctx.fillText('z='+fmt(z,2), px(z), padT+2);
  }
}

function buildRadio() {
  const opts = [['below','below'],['above','above'],['twoTail','twoTail'],['between','between']];
  $('#regionRadio').innerHTML = `<span style="align-self:center;font-size:.85em;color:var(--text2)">${t('region')}:</span>` +
    opts.map(([v,k])=>`<label><input type="radio" name="zsreg" value="${v}" ${region===v?'checked':''} onchange="region=this.value;solve()"> ${t(k)}</label>`).join('');
}
function loadExample(){
  const ex=[[75,70,5],[110,100,15],[55,60,8],[640,500,100]];
  const e=ex[Math.floor(Math.random()*ex.length)];
  $('#inX').value=e[0]; $('#inMu').value=e[1]; $('#inSigma').value=e[2]; solve();
}
function doClear(){ $('#inX').value=''; $('#inMu').value=''; $('#inSigma').value=''; $('#output').innerHTML=''; drawPlot(0,'below'); }

['inX','inMu','inSigma'].forEach(id=>document.getElementById(id).addEventListener('input', solve));
window.addEventListener('resize', solve);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="solve()">${t('solve')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

buildRadio();
solve();

  ]
});
</script>
