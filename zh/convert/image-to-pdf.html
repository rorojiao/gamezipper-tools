<div class="gz-container">

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Image to PDF Converter',
    toolDesc: 'Convert images to PDF for free in your browser — drag and drop JPG, PNG, WebP or SVG and download as a single PDF.',
    dropText: '📁 Drop images here or click to select',
    dropSub: 'Supports JPG, PNG, WebP, SVG',
    convert: 'Convert to PDF',
    step1: 'Drag and drop images or click to browse',
    step2: 'Arrange images by dragging thumbnails',
    step3: 'Click Convert to PDF to generate the document',
    step4: 'The PDF downloads automatically to your device',
  },
  zh: {
    toolTitle: '图片转 PDF 工具',
    toolDesc: '免费在浏览器中将图片转为 PDF — 拖拽 JPG、PNG、WebP 或 SVG 图片，下载为单个 PDF 文件。',
    dropText: '📁 拖拽图片到此处或点击选择',
    dropSub: '支持 JPG、PNG、WebP、SVG 格式',
    convert: '转换为 PDF',
    step1: '拖拽图片到页面或点击浏览选择',
    step2: '拖动缩略图调整图片顺序',
    step3: '点击「转换为 PDF」生成文档',
    step4: 'PDF 文件将自动下载到你的设备',
  }
});

const { $, copyText, t } = GZ;
const images = [];

$('#drop-text').textContent = t('dropText');
$('#drop-sub').textContent = t('dropSub');

const dz = $('#drop-zone');
const fi = $('#file-input');

dz.addEventListener('click', () => fi.click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});
fi.addEventListener('change', () => handleFiles(fi.files));

function handleFiles(files) {
  for (const f of files) {
    if (!f.type.startsWith('image/')) continue;
    const reader = new FileReader();
    reader.onload = e => {
      images.push({ name: f.name, data: e.target.result });
      renderList();
    };
    reader.readAsDataURL(f);
  }
}

function renderList() {
  const list = $('#img-list');
  list.innerHTML = images.map((img, i) =>
    `<div class="img-thumb"><img src="${img.data}" alt="${img.name}"><button class="remove" onclick="removeImg(${i})">✕</button><span class="order">#${i+1}</span></div>`
  ).join('');
  updateToolbar();
}

function removeImg(i) {
  images.splice(i, 1);
  renderList();
}

function updateToolbar() {
  const hasImages = images.length > 0;
  $('#toolbar').innerHTML = `
    <button class="gz-btn" onclick="convertToPDF()" ${hasImages ? '' : 'disabled'}>${t('convert')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="clearAll()" ${hasImages ? '' : 'disabled'}>${t('clear')}</button>
    <span style="font-size:.85em;color:var(--text2)">${images.length} image(s)</span>`;
}

async function convertToPDF() {
  if (!images.length) return;
  $('#status').innerHTML = '<span style="color:var(--accent)">⏳ Converting...</span>';

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  for (let i = 0; i < images.length; i++) {
    if (i > 0) pdf.addPage();
    const img = new Image();
    img.src = images[i].data;
    await new Promise(r => { img.onload = r; });

    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const ratio = Math.min(pageW / img.width, pageH / img.height) * 0.9;
    const w = img.width * ratio;
    const h = img.height * ratio;
    const x = (pageW - w) / 2;
    const y = (pageH - h) / 2;

    pdf.addImage(images[i].data, 'JPEG', x, y, w, h);
  }

  pdf.save('images.pdf');
  $('#status').innerHTML = '<span style="color:var(--gz-success)">✓ PDF downloaded!</span>';
}

function clearAll() {
  images.length = 0;
  renderList();
  $('#status').innerHTML = '';
}

updateToolbar();

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔄', href:'/image/converter.html', name:'Image Converter'},
    {icon:'📦', href:'/image/compressor.html', name:'Image Compressor'},
    {icon:'📄', href:'/convert/pdf-merger.html', name:'PDF Merger'},
    {icon:'🖼️', href:'/image/resizer.html', name:'Image Resizer'},
  ]
});
</script>
