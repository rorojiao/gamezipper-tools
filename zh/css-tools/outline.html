<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the difference between CSS outline and border?", "acceptedAnswer": {"@type": "Answer", "text": "A border takes up layout space and affects the element's size, while an outline is drawn outside the border and does NOT affect layout or the box model. Outlines are commonly used for accessibility focus rings and :focus-visible states."}}, {"@type": "Question", "name": "What is the CSS outline-offset property?", "acceptedAnswer": {"@type": "Answer", "text": "outline-offset sets the distance between the outline and the border edge. A positive value pushes the outline outward (e.g. 4px), a negative value draws it inside the border, and 0 places it directly on the border edge."}}, {"@type": "Question", "name": "What outline styles are available in CSS?", "acceptedAnswer": {"@type": "Answer", "text": "CSS outline-style supports none, solid, dotted, dashed, double, groove, ridge, inset, outset and auto. The 'auto' value lets the browser draw a platform-native focus ring, ideal for accessibility."}}, {"@type": "Question", "name": "How do I write the CSS outline shorthand?", "acceptedAnswer": {"@type": "Answer", "text": "The shorthand combines width, style and color: outline: 2px solid #007bff; You can also add outline-offset separately since it is not part of the shorthand. Use outline-offset: 4px; to add space around the outline."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Outline Generator',
    toolDesc: 'Design CSS outlines visually — set width, style, color and offset with a live preview, then copy production-ready CSS (shorthand or longhand) instantly.',
    width: 'Outline width',
    style: 'Outline style',
    color: 'Outline color',
    offset: 'Outline offset',
    radius: 'Border radius',
    bg: 'Background',
    step1: 'Pick an outline style — solid, dashed, dotted, double and more',
    step2: 'Drag the width, offset and radius sliders to fine-tune the look',
    step3: 'Choose the outline color and the preview background',
    step4: 'Click Copy CSS and paste the shorthand or longhand into your project',
  },
  zh: {
    toolTitle: 'CSS Outline 轮廓生成器',
    toolDesc: '可视化设计 CSS outline — 设置宽度、样式、颜色和偏移，实时预览并一键复制生产可用的 CSS（简写或分写）。',
    width: '轮廓宽度',
    style: '轮廓样式',
    color: '轮廓颜色',
    offset: '轮廓偏移',
    radius: '圆角',
    bg: '背景色',
    step1: '选择轮廓样式 — 实线、虚线、点线、双线等',
    step2: '拖动宽度、偏移和圆角滑块微调外观',
    step3: '选择轮廓颜色和预览背景',
    step4: '点击「复制 CSS」并将简写或分写粘贴到项目中',
  }
});

const { $, copyText, t } = GZ;

const state = {
  width: 3,
  style: 'solid',
  color: '#007bff',
  offset: 2,
  radius: 8,
  bg: '#ffffff'
};

const STYLES = ['solid','dashed','dotted','double','groove','ridge','inset','outset','auto'];

function renderControls(){
  $('#controls').innerHTML = `
    <div class="ctrl">
      <label>${t('style')}</label>
      <div class="style-chips" id="styleChips">
        ${STYLES.map(s => `<span class="style-chip${s===state.style?' active':''}" onclick="setStyle('${s}')">${s}</span>`).join('')}
      </div>
    </div>
    <div class="ctrl">
      <label>${t('width')} <span class="val" id="wVal">${state.width}px</span></label>
      <input type="range" id="wRange" min="0" max="30" step="1" value="${state.width}" oninput="state.width=+this.value;update()">
    </div>
    <div class="ctrl">
      <label>${t('offset')} <span class="val" id="oVal">${state.offset}px</span></label>
      <input type="range" id="oRange" min="-10" max="30" step="1" value="${state.offset}" oninput="state.offset=+this.value;update()">
    </div>
    <div class="ctrl">
      <label>${t('radius')} <span class="val" id="rVal">${state.radius}px</span></label>
      <input type="range" id="rRange" min="0" max="40" step="1" value="${state.radius}" oninput="state.radius=+this.value;update()">
    </div>
    <div class="ctrl" style="display:flex;gap:12px;align-items:flex-end">
      <div style="flex:1">
        <label>${t('color')}</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="color" id="cInput" value="${state.color}" oninput="state.color=this.value;update()">
          <input type="text" id="cText" value="${state.color}" style="width:110px" oninput="state.color=this.value;document.getElementById('cInput').value=this.value;update()">
        </div>
      </div>
      <div style="flex:1">
        <label>${t('bg')}</label>
        <input type="color" id="bgInput" value="${state.bg}" oninput="state.bg=this.value;update()">
      </div>
    </div>
  `;
}

function setStyle(s){
  state.style = s;
  document.querySelectorAll('.style-chip').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  update();
}

function cssText(){
  const longhand = [];
  if(state.width !== 0 || state.style !== 'none'){
    longhand.push(`outline-width: ${state.width}px;`);
    longhand.push(`outline-style: ${state.style};`);
    longhand.push(`outline-color: ${state.color};`);
  } else {
    longhand.push(`outline: none;`);
  }
  longhand.push(`outline-offset: ${state.offset}px;`);
  longhand.push(`border-radius: ${state.radius}px;`);
  return longhand.join('\n');
}

function shorthandText(){
  let line;
  if(state.width !== 0 && state.style !== 'none'){
    line = `outline: ${state.width}px ${state.style} ${state.color};`;
  } else {
    line = `outline: none;`;
  }
  return `${line}\noutline-offset: ${state.offset}px;\nborder-radius: ${state.radius}px;`;
}

function hl(code){
  return escHtml(code)
    .replace(/(outline(?:-width|-style|-color|-offset)?|border-radius|outline)(\s*:)/g, '<span class="prop">$1</span>$2')
    .replace(/(:\s*)([^;]+)(;)/g, (m, a, v, b) => `${a}<span class="val">${v}</span>${b}`);
}
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let showLonghand = false;

function update(){
  // sliders
  const wV = $('#wVal'); if(wV) wV.textContent = state.width + 'px';
  const oV = $('#oVal'); if(oV) oV.textContent = state.offset + 'px';
  const rV = $('#rVal'); if(rV) rV.textContent = state.radius + 'px';

  // preview
  const p = $('#preview');
  p.style.outlineWidth = state.width + 'px';
  p.style.outlineStyle = state.style;
  p.style.outlineColor = state.color;
  p.style.outlineOffset = state.offset + 'px';
  p.style.borderRadius = state.radius + 'px';
  p.style.background = state.bg;

  // code
  const code = showLonghand ? cssText() : shorthandText();
  $('#code').innerHTML = '<span class="sel">.box</span> {\n  ' + hl(code).replace(/\n/g, '\n  ') + '\n}';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="toggleMode()" id="modeBtn">Shorthand</button>
  <button class="gz-btn" onclick="copyText(getCssOnly())">${t('copy')}</button>
`;

function toggleMode(){
  showLonghand = !showLonghand;
  $('#modeBtn').textContent = showLonghand ? 'Longhand' : 'Shorthand';
  update();
}

function getCssOnly(){
  return showLonghand ? cssText() : shorthandText();
}

renderControls();
update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
    {icon:'🔘', href:'/css-tools/border-radius.html', name:'Border Radius'},
    {icon:'✏️', href:'/css-tools/text-shadow.html', name:'Text Shadow'},
    {icon:'🎨', href:'/css-tools/gradient.html', name:'CSS Gradient'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
