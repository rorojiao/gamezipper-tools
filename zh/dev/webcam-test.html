<style>
.cam-wrap{display:grid;grid-template-columns:1fr;gap:14px;max-width:880px;margin:0 auto}
.cam-stage{position:relative;background:#000;border-radius:12px;overflow:hidden;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center}
.cam-stage video{width:100%;height:100%;object-fit:cover;display:block}
.cam-stage .placeholder{color:#aaa;font-size:1em;text-align:center;padding:20px}
.cam-stage .snap-overlay{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;animation:flash .35s ease-out}
.cam-stage .snap-overlay.flash{opacity:.85}
@keyframes flash{0%{opacity:0}30%{opacity:.85}100%{opacity:0}}
.cam-stage .timer{position:absolute;top:10px;right:14px;background:rgba(0,0,0,.55);color:#fff;padding:4px 10px;border-radius:8px;font-family:monospace;font-size:1.3em;font-weight:600;display:none}
.cam-stage .timer.on{display:block}
.cam-stage .rec{position:absolute;top:10px;left:14px;background:rgba(255,0,0,.85);color:#fff;padding:3px 10px;border-radius:8px;font-size:.8em;display:none;align-items:center;gap:6px}
.cam-stage .rec.on{display:flex}
.cam-stage .rec::before{content:'';width:8px;height:8px;border-radius:50%;background:#fff;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.cam-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.cam-controls select,.cam-controls button{font-size:.9em}
.cam-info{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;padding:14px;background:var(--glass2);border:1px solid var(--border);border-radius:12px}
.cam-info .item{display:flex;flex-direction:column;gap:2px}
.cam-info .item .k{font-size:.75em;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.cam-info .item .v{font-size:1em;font-family:monospace;word-break:break-all}
.cam-info .item .v.ok{color:var(--gz-success)}
.cam-info .item .v.fail{color:var(--gz-accent)}
.snap-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.snap-strip img{width:120px;height:90px;object-fit:cover;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:transform .15s}
.snap-strip img:hover{transform:scale(1.05)}
.cam-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.cam-row label{color:var(--text2);font-size:.85em}
.cam-row select{background:var(--input-bg);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:6px;font-size:.85em}
</style>

<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity": [{"@type":"Question","name":"How do I test my webcam online?","acceptedAnswer":{"@type":"Answer","text":"Click 'Start Camera' and grant browser permission. Your live video feed will appear in a few seconds. The tool also reports the camera name, resolution, frame rate, supported features and lets you capture snapshots — all in your browser, no upload."}},{"@type":"Question","name":"Is my webcam feed uploaded anywhere?","acceptedAnswer":{"@type":"Answer","text":"No. Everything happens locally in your browser via the getUserMedia API. No video or photo ever leaves your device. When you stop the camera, the stream is closed immediately."}},{"@type":"Question","name":"Why is my camera not working?","acceptedAnswer":{"@type":"Answer","text":"Most webcam issues come from: (1) browser permission denied — check the camera icon in the address bar; (2) another app is using the camera (Zoom, Skype, OBS) — close it; (3) an outdated or missing driver; (4) the camera is disabled in OS settings. This tool reports permission state and any error so you can pinpoint the cause."}},{"@type":"Question","name":"Can I record video with this tool?","acceptedAnswer":{"@type":"Answer","text":"The tool focuses on testing and snapshot capture. For continuous recording you'd need a screen recorder or video chat app, but you can save individual photos here with the Snap button, which uses canvas to download a PNG of the current frame."}}]}</script>

<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="cam-wrap">
      <div class="cam-stage" id="stage">
        <div class="placeholder" id="placeholder">📷 Click "Start Camera" to test your webcam</div>
        <video id="video" autoplay playsinline muted style="display:none"></video>
        <div class="snap-overlay" id="flash"></div>
        <div class="timer" id="timer">00:00</div>
        <div class="rec" id="rec">REC</div>
      </div>
      <div class="cam-row">
        <select id="deviceSel"><option value="">Default camera</option></select>
        <select id="resSel">
          <option value="">Default resolution</option>
          <option value="640x480">640×480 (VGA)</option>
          <option value="1280x720">1280×720 (HD)</option>
          <option value="1920x1080">1920×1080 (FHD)</option>
          <option value="3840x2160">3840×2160 (4K)</option>
        </select>
        <span class="gz-toolbar" id="toolbar"></span>
      </div>
      <div class="cam-info" id="info">
        <div class="item"><span class="k">Camera</span><span class="v" id="iLabel">—</span></div>
        <div class="item"><span class="k">Resolution</span><span class="v" id="iRes">—</span></div>
        <div class="item"><span class="k">Frame Rate</span><span class="v" id="iFps">—</span></div>
        <div class="item"><span class="k">Permission</span><span class="v" id="iPerm">—</span></div>
        <div class="item"><span class="k">Status</span><span class="v" id="iStatus">—</span></div>
        <div class="item"><span class="k">Auto-focus</span><span class="v" id="iFocus">—</span></div>
        <div class="item"><span class="k">Exposure</span><span class="v" id="iExp">—</span></div>
        <div class="item"><span class="k">Browser</span><span class="v" id="iUA">—</span></div>
      </div>
      <div>
        <div class="cam-row" style="margin-bottom:6px"><strong id="lbl-snaps"></strong></div>
        <div class="snap-strip" id="snaps"></div>
      </div>
    </div>
  </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Webcam Test',
    toolDesc: 'Test your webcam online — preview live video, check resolution, frame rate, supported features and capture snapshots. 100% in your browser, nothing is uploaded.',
    start: 'Start Camera',
    stop: 'Stop',
    snap: 'Snap Photo',
    snapshot: 'Snapshots',
    noSnaps: 'No snapshots yet — click "Snap Photo" to capture the current frame.',
    startFirst: 'Start the camera first',
    step1: 'Click "Start Camera" and grant browser permission to use your webcam',
    step2: 'Switch device or resolution from the dropdowns if needed',
    step3: 'Click "Snap Photo" to capture and download the current frame as PNG',
    step4: 'Click "Stop" to release the camera when done',
  },
  zh: {
    toolTitle: '摄像头测试工具',
    toolDesc: '在线测试你的摄像头 — 实时预览、查看分辨率、帧率、支持的功能并拍照。100% 浏览器本地运行，不上传任何数据。',
    start: '启动摄像头',
    stop: '停止',
    snap: '拍照',
    snapshot: '已拍照片',
    noSnaps: '还没有照片 — 点击「拍照」捕获当前画面。',
    startFirst: '请先启动摄像头',
    step1: '点击「启动摄像头」并在浏览器中授权使用摄像头',
    step2: '如需切换设备或分辨率，使用下拉菜单',
    step3: '点击「拍照」将当前画面下载为 PNG',
    step4: '完成后点击「停止」释放摄像头',
  }
});

const { $, t } = GZ;
let stream = null, devices = [], fpsStart = 0, fpsFrames = 0, fpsTimer = null, snapCount = 0;

async function listDevices() {
  try {
    devices = (await navigator.mediaDevices.enumerateDevices()).filter(d => d.kind === 'videoinput');
    const sel = $('#deviceSel');
    sel.innerHTML = '<option value="">Default camera</option>' + devices.map((d,i) => `<option value="${d.deviceId}">${d.label || 'Camera '+(i+1)}</option>`).join('');
  } catch(e) { /* permission not granted yet */ }
}

async function start() {
  try {
    const devId = $('#deviceSel').value;
    const res = $('#resSel').value;
    const constraints = { video: devId ? { deviceId: { exact: devId } } : true, audio: false };
    if (res) {
      const [w,h] = res.split('x').map(Number);
      constraints.video = Object.assign({}, constraints.video, { width: { ideal: w }, height: { ideal: h } });
    }
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    const v = $('#video');
    v.srcObject = stream;
    v.style.display = 'block';
    $('#placeholder').style.display = 'none';
    $('#iPerm').textContent = 'granted';
    $('#iPerm').className = 'v ok';
    $('#iStatus').textContent = 'live';
    $('#iStatus').className = 'v ok';
    const track = stream.getVideoTracks()[0];
    const settings = track.getSettings();
    $('#iLabel').textContent = track.label || 'Camera';
    $('#iRes').textContent = settings.width + ' × ' + settings.height;
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    $('#iFocus').textContent = caps.focusMode ? caps.focusMode.join(', ') : 'unsupported';
    $('#iExp').textContent = caps.exposureMode ? caps.exposureMode.join(', ') : 'unsupported';
    // FPS measurement
    fpsStart = performance.now(); fpsFrames = 0;
    if (fpsTimer) clearInterval(fpsTimer);
    fpsTimer = setInterval(() => {
      const elapsed = (performance.now() - fpsStart) / 1000;
      const fps = (fpsFrames / elapsed).toFixed(1);
      $('#iFps').textContent = fps;
    }, 500);
    v.addEventListener('timeupdate', () => { fpsFrames++; });
    // Re-enumerate to get labels (now allowed)
    await listDevices();
    $('#toolbar').innerHTML = `
      <button class="gz-btn" onclick="stop()">⏹ ${t('stop')}</button>
      <button class="gz-btn gz-btn-secondary" onclick="snap()">📸 ${t('snap')}</button>`;
  } catch(e) {
    $('#iPerm').textContent = 'denied / error';
    $('#iPerm').className = 'v fail';
    $('#iStatus').textContent = e.name || 'Error';
    $('#iStatus').className = 'v fail';
    $('#placeholder').textContent = '❌ ' + (e.message || e.name || 'Cannot access camera');
  }
}

function stop() {
  if (stream) { stream.getTracks().forEach(tr => tr.stop()); stream = null; }
  if (fpsTimer) { clearInterval(fpsTimer); fpsTimer = null; }
  const v = $('#video');
  v.srcObject = null;
  v.style.display = 'none';
  $('#placeholder').style.display = 'flex';
  $('#placeholder').textContent = '📷 Camera stopped — click Start to resume';
  $('#iStatus').textContent = 'stopped';
  $('#iStatus').className = 'v';
  $('#toolbar').innerHTML = `<button class="gz-btn" onclick="start()">▶ ${t('start')}</button>`;
}

function snap() {
  if (!stream) { alert(t('startFirst')); return; }
  const v = $('#video');
  const cvs = document.createElement('canvas');
  cvs.width = v.videoWidth; cvs.height = v.videoHeight;
  cvs.getContext('2d').drawImage(v, 0, 0);
  cvs.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `webcam-snap-${++snapCount}.png`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }, 'image/png');
  // add preview
  const img = new Image();
  img.src = cvs.toDataURL('image/png');
  img.title = 'Snapshot ' + snapCount;
  $('#snaps').prepend(img);
  // flash
  const f = $('#flash');
  f.classList.add('flash');
  setTimeout(() => f.classList.remove('flash'), 350);
}

$('#iUA').textContent = (navigator.userAgent.match(/(Chrome|Firefox|Safari|Edge)\/[\d.]+/) || ['unknown'])[0];

if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
  $('#placeholder').textContent = '❌ getUserMedia not supported in this browser';
  $('#iPerm').textContent = 'unsupported';
  $('#iPerm').className = 'v fail';
} else {
  $('#toolbar').innerHTML = `<button class="gz-btn" onclick="start()">▶ ${t('start')}</button>`;
  $('#lbl-snaps').textContent = t('snapshot');
  if ($('#snaps').children.length === 0) {
    $('#snaps').innerHTML = `<div style="opacity:.6;font-size:.85em;padding:8px">${t('noSnaps')}</div>`;
  }
  listDevices();
}

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎤', href:'/dev/microphone-test.html', name:'Microphone Test'},
    {icon:'🔊', href:'/dev/audio-recorder.html', name:'Audio Recorder'},
    {icon:'📺', href:'/dev/screen-resolution-tester.html', name:'Screen Resolution'},
    {icon:'🎮', href:'/dev/gamepad-tester.html', name:'Gamepad Tester'},
  ]
});
</script>

</body>
