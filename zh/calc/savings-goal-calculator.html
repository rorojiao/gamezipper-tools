<body>
<div class="gz-container">
  <div class="gz-tool-header">

  </div>
  <div class="gz-tool-area">
    <div class="sg-form">
      <div class="sg-field">
        <label id="lbl-goal"></label>
        <input type="number" id="goal" value="10000" min="1" step="any">
      </div>
      <div class="sg-field">
        <label id="lbl-current"></label>
        <input type="number" id="current" value="1000" min="0" step="any">
      </div>
      <div class="sg-field">
        <label id="lbl-monthly"></label>
        <input type="number" id="monthly" value="200" min="0" step="any">
      </div>
      <div class="sg-field">
        <label id="lbl-rate"></label>
        <input type="number" id="rate" value="4" min="0" max="100" step="0.1">
      </div>
    </div>
    <div class="sg-result" id="result"></div>
    <div class="sg-breakdown" id="breakdown"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Savings Goal Calculator',
    toolDesc: 'Find out how long it takes to reach your savings goal. Enter your target, current savings, monthly contribution and interest rate.',
    lblGoal: 'Savings Goal ($)',
    lblCurrent: 'Current Savings ($)',
    lblMonthly: 'Monthly Contribution ($)',
    lblRate: 'Annual Interest Rate (%)',
    months: 'months',
    years: 'years',
    year: 'year',
    toReach: 'to reach your goal of',
    goalReached: '🎉 You have already reached your goal!',
    neverReach: '⚠ You need a monthly contribution to reach your goal.',
    totalContributions: 'Your Contributions',
    totalInterest: 'Interest Earned',
    totalSaved: 'Total Savings',
    step1: 'Enter your savings goal amount',
    step2: 'Add your current savings balance',
    step3: 'Set your monthly contribution and interest rate',
    step4: 'See how many months or years until you reach your goal',
  },
  zh: {
    toolTitle: '储蓄目标计算器',
    toolDesc: '计算需要多长时间才能达到储蓄目标。输入目标金额、当前存款、每月存入和利率。',
    lblGoal: '储蓄目标 ($)',
    lblCurrent: '当前存款 ($)',
    lblMonthly: '每月存入 ($)',
    lblRate: '年利率 (%)',
    months: '个月',
    years: '年',
    year: '年',
    toReach: '达到目标',
    goalReached: '🎉 您已经达到目标！',
    neverReach: '⚠ 您需要每月存入才能达到目标。',
    totalContributions: '您的存入',
    totalInterest: '利息收益',
    totalSaved: '总存款',
    step1: '输入您的储蓄目标金额',
    step2: '填入当前存款余额',
    step3: '设置每月存入金额和利率',
    step4: '查看需要多少月或年才能达到目标',
  }
});

const { $, t } = GZ;

function calc() {
  const goal = parseFloat($('#goal').value) || 0;
  const current = parseFloat($('#current').value) || 0;
  const monthly = parseFloat($('#monthly').value) || 0;
  const rate = parseFloat($('#rate').value) || 0;

  if (goal <= 0) { $('#result').innerHTML = ''; $('#breakdown').innerHTML = ''; return; }

  if (current >= goal) {
    $('#result').innerHTML = '<div class="big">✓</div><div class="sub">' + t('goalReached') + '</div>';
    $('#breakdown').innerHTML = '';
    return;
  }

  const monthlyRate = rate / 100 / 12;
  let balance = current;
  let months = 0;
  const maxMonths = 6000; // 500 years cap

  if (monthly <= 0 && monthlyRate <= 0) {
    $('#result').innerHTML = '<div class="big">∞</div><div class="sub">' + t('neverReach') + '</div>';
    $('#breakdown').innerHTML = '';
    return;
  }

  while (balance < goal && months < maxMonths) {
    balance = balance * (1 + monthlyRate) + monthly;
    months++;
  }

  if (months >= maxMonths) {
    $('#result').innerHTML = '<div class="big">∞</div><div class="sub">' + t('neverReach') + '</div>';
    $('#breakdown').innerHTML = '';
    return;
  }

  const years = Math.floor(months / 12);
  const remMonths = months % 12;
  let timeStr;
  if (years > 0 && remMonths > 0) {
    timeStr = years + ' ' + (years === 1 ? t('year') : t('years')) + ' ' + remMonths + ' ' + t('months');
  } else if (years > 0) {
    timeStr = years + ' ' + (years === 1 ? t('year') : t('years'));
  } else {
    timeStr = months + ' ' + t('months');
  }

  const totalContributions = current + monthly * months;
  const totalInterest = balance - totalContributions;

  $('#result').innerHTML = '<div class="big">' + timeStr + '</div><div class="sub">' + t('toReach') + ' $' + goal.toLocaleString(undefined,{maximumFractionDigits:2}) + '</div>';

  $('#breakdown').innerHTML =
    '<div class="row"><span>' + t('totalContributions') + '</span><span class="val">$' + totalContributions.toLocaleString(undefined,{maximumFractionDigits:2}) + '</span></div>' +
    '<div class="row"><span>' + t('totalInterest') + '</span><span class="val">$' + totalInterest.toLocaleString(undefined,{maximumFractionDigits:2}) + '</span></div>' +
    '<div class="row"><span>' + t('totalSaved') + '</span><span class="val">$' + balance.toLocaleString(undefined,{maximumFractionDigits:2}) + '</span></div>';
}

['goal','current','monthly','rate'].forEach(id => {
  $('#' + id).addEventListener('input', calc);
});

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏦', href:'/calc/compound-interest-calculator.html', name:'Compound Interest'},
    {icon:'🎯', href:'/calc/savings-goal.html', name:'Savings Goal'},
    {icon:'💰', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'🏠', href:'/calc/mortgage-calculator.html', name:'Mortgage Calculator'},
  ]
});
</script>
