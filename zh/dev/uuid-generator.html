</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'UUID Generator',
    toolDesc: 'Generate UUID v4 (random), v1 (time-based) and NIL UUIDs instantly. Bulk generate up to 100 — free, browser-based, no data sent to servers.',
    generate: '🔄 Generate',
    copyAll: '📋 Copy All',
    clear: '🗑️ Clear',
    lblVersion: 'UUID Version',
    lblCount: 'Count',
    lblUpper: 'Uppercase',
    lblNoDashes: 'No dashes',
    copy: 'Copy',
    step1: 'Select the UUID version (v4, v1, or NIL)',
    step2: 'Set how many UUIDs to generate (1-100)',
    step3: 'Click "Generate" to create UUIDs',
    step4: 'Copy individual or all UUIDs to clipboard',
  },
  zh: {
    toolTitle: 'UUID 生成器',
    toolDesc: '即时生成 UUID v4（随机）、v1（基于时间）和 NIL UUID。批量生成最多 100 个 — 免费、浏览器本地运行。',
    generate: '🔄 生成',
    copyAll: '📋 全部复制',
    clear: '🗑️ 清空',
    lblVersion: 'UUID 版本',
    lblCount: '数量',
    lblUpper: '大写',
    lblNoDashes: '无连字符',
    copy: '复制',
    step1: '选择 UUID 版本（v4、v1 或 NIL）',
    step2: '设置生成数量（1-100）',
    step3: '点击「生成」创建 UUID',
    step4: '复制单个或全部 UUID 到剪贴板',
  }
});

const { $, copyText, t, showToast } = GZ;

$('#toolbar').innerHTML = `<button class="gz-btn" id="btn-gen">${t('generate')}</button><button class="gz-btn secondary" id="btn-copy-all">${t('copyAll')}</button><button class="gz-btn secondary" id="btn-clear">${t('clear')}</button>`;
$('#lbl-version').textContent = t('lblVersion');
$('#lbl-count').textContent = t('lblCount');
$('#lbl-upper').textContent = t('lblUpper');
$('#lbl-nodashes').textContent = t('lblNoDashes');

// UUID generation
function uuidv4() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function uuidv1() {
  const now = Date.now();
  const time = now - 12219292800000; // UUID epoch: Oct 15, 1582
  const timeHex = (time * 10000 + Math.random() * 10000).toString(16).padStart(16, '0').slice(-16);
  // Fake clock_seq and node
  const clock = Math.floor(Math.random() * 0x3fff | 0x8000).toString(16).padStart(4, '0');
  const node = Array.from({length: 6}, () => Math.floor(Math.random() * 256).toString(16).padStart(2, '0')).join('');
  return `${timeHex.slice(0, 8)}-${timeHex.slice(8, 12)}-1${timeHex.slice(13, 16)}-${clock}-${node}`;
}

function nilUUID() { return '00000000-0000-0000-0000-000000000000'; }

function generate() {
  const ver = $('#version').value;
  const n = Math.min(100, Math.max(1, parseInt($('#count').value) || 1));
  const upper = $('#uppercase').checked;
  const noDashes = $('#no-dashes').checked;

  let uuids = [];
  for (let i = 0; i < n; i++) {
    let uuid;
    if (ver === 'v4') uuid = uuidv4();
    else if (ver === 'v1') uuid = uuidv1();
    else uuid = nilUUID();

    if (noDashes) uuid = uuid.replace(/-/g, '');
    if (upper) uuid = uuid.toUpperCase();
    uuids.push(uuid);
  }

  $('#output').innerHTML = uuids.map((u, i) => `
    <div class="uuid-item">
      <span class="val">${u}</span>
      <button class="copy-single" data-uuid="${u}">${t('copy')}</button>
    </div>
  `).join('');

  // Store for copy all
  $('#output').dataset.all = uuids.join('\n');

  // Wire copy buttons
  document.querySelectorAll('.copy-single').forEach(btn => {
    btn.onclick = () => { copyText(btn.dataset.uuid); };
  });
}

$('#btn-gen').onclick = generate;
$('#btn-copy-all').onclick = () => { const all = $('#output').dataset.all; if (all) copyText(all); };
$('#btn-clear').onclick = () => { $('#output').innerHTML = ''; delete $('#output').dataset.all; };

// Generate one on load
generate();

GZ.renderToolPage({
  related: [
    {href:'/dev/password-generator.html',icon:'🔑',name:'Password Generator'},
    {href:'/text/text-encryptor.html',icon:'🔐',name:'Text Encrypt & Decrypt'},
    {href:'/dev/base64.html',icon:'🔄',name:'Base64 Encoder/Decoder'},
  ]
});
</script>
