    optYes: '是',
    optNo: '否',
    split: '拆分 CSV',
    example: '示例',
    clear: '清空',
    downloadAll: '下载全部（.zip）',
    download: '下载',
    noData: '请先粘贴 CSV 数据。',
    result: (n, r) => `✓ 拆分为 ${n} 个文件，共 ${r} 行数据`,
    step1: '将 CSV 数据粘贴到输入区',
    step2: '选择拆分模式：每个文件的行数、文件数量，或按列的值',
    step3: '点击拆分 — 每个分片都会保留表头',
    step4: '预览后，可单独下载文件或一次性下载全部',
  }
});

let mode = 'rows';
let lastChunks = [];
const { $, copyText, t } = GZ;

function detectDelim(text) {
  if (text.includes('\t')) return '\t';
  const firstLine = text.split('\n')[0] || '';
  const semi = (firstLine.match(/;/g) || []).length;
  const pipe = (firstLine.match(/\|/g) || []).length;
  const comma = (firstLine.match(/,/g) || []).length;
  if (semi > comma && semi > pipe) return ';';
  if (pipe > comma && pipe > semi) return '|';
  return ',';
}

function parseCSV(text, delim) {
  const rows = [];
  let row = [], cur = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') { if (inQ && text[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (c === delim && !inQ) { row.push(cur); cur = ''; }
    else if (c === '\n' && !inQ) { row.push(cur); rows.push(row); row = []; cur = ''; }
    else if (c === '\r') { /* skip */ }
    else cur += c;
  }
  if (cur || row.length) { row.push(cur); rows.push(row); }
  return rows.filter(r => r.length > 1 || (r.length === 1 && r[0] !== ''));
}

function toCSV(rows, delim) {
  return rows.map(r => r.map(v => {
    const s = String(v == null ? '' : v);
    return (s.includes(delim) || s.includes('"') || s.includes('\n') || s.includes('\r')) ? '"' + s.replace(/"/g, '""') + '"' : s;
  }).join(delim)).join('\n');
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function updateColOptions(header) {
  const sel = $('#splitCol');
  sel.innerHTML = header.map((h, i) => `<option value="${i}">${escapeHtml(h) || 'Col ' + i}</option>`).join('');
}

function doSplit() {
  const raw = $('#input').value;
  if (!raw.trim()) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noData')}</span>`; return; }
  const delimSel = $('#delim').value;
  const delim = delimSel === 'auto' ? detectDelim(raw) : (delimSel === 'tab' ? '\t' : delimSel);
  const hasHeader = $('#hasHeader').value === '1';
  const rows = parseCSV(raw, delim);
  if (!rows.length) { $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noData')}</span>`; return; }

  const header = hasHeader ? rows[0] : null;
  const data = hasHeader ? rows.slice(1) : rows;

  if (mode === 'column') {
    const colIdx = parseInt($('#splitCol').value) || 0;
    const groups = {};
    const order = [];
    data.forEach(r => {
      const key = r[colIdx] != null ? r[colIdx] : '';
      if (!groups[key]) { groups[key] = []; order.push(key); }
      groups[key].push(r);
    });
    lastChunks = order.map(key => {
      const safe = String(key).replace(/[^a-zA-Z0-9_-]/g, '_').slice(0, 40) || 'empty';
      return { name: `chunk_${safe}.csv`, rows: header ? [header, ...groups[key]] : groups[key] };
    });
  } else {
    const val = Math.max(1, parseInt($('#splitValue').value) || 1);
    let perFile, numFiles;
    if (mode === 'rows') { perFile = val; numFiles = Math.ceil(data.length / perFile); }
    else { numFiles = val; perFile = Math.ceil(data.length / numFiles); }
    lastChunks = [];
    for (let i = 0; i < numFiles; i++) {
      const slice = data.slice(i * perFile, (i + 1) * perFile);
      if (!slice.length) break;
      lastChunks.push({ name: `chunk_${i + 1}_of_${numFiles}.csv`, rows: header ? [header, ...slice] : slice });
    }
  }

  // Preview first chunk
  if (lastChunks.length) {
    const preview = toCSV(lastChunks[0].rows.slice(0, 50), delim);
    $('#output').textContent = preview + (lastChunks[0].rows.length > 50 ? '\n... (' + lastChunks[0].rows.length + ' rows)' : '');
  }
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('result', lastChunks.length, data.length)}</span>`;
  renderFiles(delim);
}

function renderFiles(delim) {
  const wrap = $('#filesList');
  if (!lastChunks.length) { wrap.innerHTML = ''; return; }
  let html = '';
  lastChunks.forEach((chunk, i) => {
    const dataRows = chunk.rows.length - ($('#hasHeader').value === '1' ? 1 : 0);
    const sizeKB = (new Blob([toCSV(chunk.rows, delim)]).size / 1024).toFixed(1);
    html += `<div class="file-card">
      <div class="info">
        <div class="fname">${escapeHtml(chunk.name)}</div>
        <div class="fmeta">${chunk.rows.length} rows · ${dataRows} data · ${sizeKB} KB</div>
      </div>
      <button class="gz-btn gz-btn-secondary" onclick="downloadChunk(${i})">${t('download')}</button>
    </div>`;
  });
  wrap.innerHTML = html;
}

function downloadChunk(i) {
  const delimSel = $('#delim').value;
  const delim = delimSel === 'auto' ? detectDelim($('#input').value) : (delimSel === 'tab' ? '\t' : delimSel);
  const chunk = lastChunks[i];
  if (!chunk) return;
  const blob = new Blob([toCSV(chunk.rows, delim)], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = chunk.name;
  a.click();
  URL.revokeObjectURL(a.href);
}

function downloadAllZip() {
  if (!lastChunks.length) return;
  const delimSel = $('#delim').value;
  const delim = delimSel === 'auto' ? detectDelim($('#input').value) : (delimSel === 'tab' ? '\t' : delimSel);
  // Minimal client-side zip via JSZip if available, else download sequentially
  if (window.JSZip) {
    const zip = new JSZip();
    lastChunks.forEach(c => zip.file(c.name, toCSV(c.rows, delim)));
    zip.generateAsync({ type: 'blob' }).then(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'csv_chunks.zip';
      a.click();
      URL.revokeObjectURL(a.href);
    });
  } else {
    // Fallback: download each with small delay
    lastChunks.forEach((_, i) => setTimeout(() => downloadChunk(i), i * 300));
  }
}

function loadExample() {
  $('#input').value = 'id,name,email,country,score\n1,Alice,alice@mail.com,US,95\n2,Bob,bob@mail.com,UK,88\n3,Carol,carol@mail.com,US,72\n4,Dave,dave@mail.com,DE,91\n5,Eve,eve@mail.com,US,85\n6,Frank,frank@mail.com,UK,79\n7,Grace,grace@mail.com,DE,93\n8,Heidi,heidi@mail.com,US,87';
  // Update column options
  const d = detectDelim($('#input').value);
  const rows = parseCSV($('#input').value, d);
  updateColOptions(rows[0]);
  doSplit();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; $('#filesList').innerHTML = ''; lastChunks = []; }

function setMode(m) {
  mode = m;
  document.querySelectorAll('#modeTabs button').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  $('#colWrap').style.display = m === 'column' ? '' : 'none';
  const v = $('#splitValue');
  if (m === 'rows') { v.value = v.value || 100; }
  else if (m === 'files') { v.value = v.value || 3; }
}

// Init labels and tabs
$('#btn-rows').textContent = t('modeRows');
$('#btn-files').textContent = t('modeFiles');
$('#btn-column').textContent = t('modeColumn');
$('#lbl-value').textContent = t('lblValue');
$('#lbl-col').textContent = t('lblCol');
$('#lbl-delim').textContent = t('lblDelim');
$('#lbl-header').textContent = t('lblHeader');
$('#opt-yes').textContent = t('optYes');
$('#opt-no').textContent = t('optNo');
$('#lbl-in').textContent = t('lblIn');
$('#lbl-out').textContent = t('lblOut');

document.querySelectorAll('#modeTabs button').forEach(b => {
  b.addEventListener('click', () => { setMode(b.dataset.mode); doSplit(); });
});

// Update col options on input change
$('#input').addEventListener('input', () => {
  const d = $('#delim').value === 'auto' ? detectDelim($('#input').value) : ($('#delim').value === 'tab' ? '\t' : $('#delim').value);
  const rows = parseCSV($('#input').value, d);
  if (rows.length) updateColOptions(rows[0]);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doSplit()">${t('split')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="downloadAllZip()">${t('downloadAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

// Load JSZip dynamically for the "Download All" feature
if (!window.JSZip) {
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
  s.defer = true;
  document.head.appendChild(s);
}

</script>
