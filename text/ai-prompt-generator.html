let currentCat = 'all';
let currentPrompt = null;
const history = [];

function renderCategories() {
  const lang = GZI18n.getLang();
  $('#cat-grid').innerHTML = CATEGORIES.map(c =>
    `<div class="cat-btn${c.id === currentCat ? ' active' : ''}" data-cat="${c.id}">${c.icon} ${c[lang] || c.en}</div>`
  ).join('');
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = btn.dataset.cat;
      generate();
    });
  });
}

function pickFromCategory(cat) {
  if (cat === 'all') {
    const cats = Object.keys(PROMPTS);
    const rand = cats[Math.floor(Math.random() * cats.length)];
    return PROMPTS[rand][Math.floor(Math.random() * PROMPTS[rand].length)];
  }
  const list = PROMPTS[cat] || [];
  return list[Math.floor(Math.random() * list.length)];
}

function generate() {
  const p = pickFromCategory(currentCat);
  currentPrompt = p;
  $('#prompt-text').textContent = p.text;
  $('#platform-tags').innerHTML = p.platforms.map(pl => `<span class="platform-tag">${pl}</span>`).join('');
  history.unshift(p);
  if (history.length > 10) history.pop();
  renderHistory();
}

function renderHistory() {
  if (history.length === 0) return;
  $('#history-list').innerHTML = history.map((p, i) =>
    `<div class="history-item" onclick="loadFromHistory(${i})">${escapeHtml(p.text.slice(0, 100))}${p.text.length > 100 ? '…' : ''}</div>`
  ).join('');
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function loadFromHistory(i) {
  const p = history[i];
  currentPrompt = p;
  $('#prompt-text').textContent = p.text;
  $('#platform-tags').innerHTML = p.platforms.map(pl => `<span class="platform-tag">${pl}</span>`).join('');
}

function copyCurrent() {
  if (currentPrompt) copyText(currentPrompt.text);
}

function favorite() {
  if (currentPrompt) {
    copyText(currentPrompt.text);
  }
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="generate()">🎲 ${t('generate')}</button>`;
