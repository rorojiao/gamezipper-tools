@media(max-width:720px){.ppi-grid{grid-template-columns:1fr}}
.ppi-card{background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:20px}
.ppi-field{margin-bottom:14px}
.ppi-field label{display:block;font-size:.85em;margin-bottom:5px;opacity:.85;font-weight:600}
.ppi-field input,.ppi-field select{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:1em;box-sizing:border-box}

.ppi-class{margin-top:14px;padding:10px 14px;border-radius:10px;font-size:.9em;text-align:center;font-weight:600}
.ppi-class.retina{background:rgba(34,197,94,.15);color:#22c55e}
.ppi-class.high{background:rgba(59,130,246,.15);color:#3b82f6}
.ppi-class.standard{background:rgba(168,162,158,.15);color:#a8a29e}
.ppi-class.low{background:rgba(239,68,68,.15);color:#ef4444}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"PPI Calculator","description":"Free PPI calculator. Calculate pixels per inch, dots per inch and pixel density from screen resolution and diagonal size.","url":"https://tools.gamezipper.com/calc/ppi-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is PPI (pixels per inch)?","acceptedAnswer":{"@type":"Answer","text":"PPI stands for pixels per inch — it measures the pixel density of a display. A higher PPI means sharper text and images. PPI is calculated by dividing the diagonal resolution in pixels by the diagonal screen size in inches."}},{"@type":"Question","name":"How do I calculate PPI?","acceptedAnswer":{"@type":"Answer","text":"Use the formula: PPI = diagonal_pixels / diagonal_inches. Where diagonal_pixels = sqrt(width² + height²). For example, a 1920×1080 screen that is 24 inches diagonal has sqrt(1920²+1080²)=2203 pixels diagonally, divided by 24 inches = ~91.8 PPI."}},{"@type":"Question","name":"What is the difference between PPI and DPI?","acceptedAnswer":{"@type":"Answer","text":"PPI refers to the pixel density of a digital display (screen). DPI (dots per inch) technically refers to printer resolution (physical ink dots). In practice the terms are used interchangeably for screens, but PPI is more accurate for digital displays."}},{"@type":"Question","name":"What is a good PPI for a display?","acceptedAnswer":{"@type":"Answer","text":"For desktop monitors 90-110 PPI is standard; 140+ is sharp. For phones 300+ PPI is considered 'retina' quality (individual pixels invisible at normal viewing distance). For 4K TVs, PPI depends on screen size — a 55-inch 4K TV is about 80 PPI."}}]}</script>

<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'PPI Calculator (Pixels Per Inch)',
    toolDesc: 'Calculate pixels per inch (PPI), DPI and pixel density from screen resolution and diagonal size. Includes device presets and a retina classification — free and private.',
    width: 'Horizontal resolution (px)',
    height: 'Vertical resolution (px)',
    diagonal: 'Diagonal screen size',
    presets: 'Common device presets',
    calculate: 'Calculate',
    resultPPI: 'Pixels per inch',
    resultDPI: 'Dots per inch (equiv.)',
    diagPixels: 'Diagonal resolution (px)',
    aspectRatio: 'Aspect ratio',
    totalPixels: 'Total pixels (megapixels)',
    widthInch: 'Width (inches)',
    heightInch: 'Height (inches)',
    classification: 'Classification',
    retinaDisplay: '🍎 Retina-class — pixels invisible to the eye',
    highDensity: '✓ High density — sharp text and images',
    standardDensity: '○ Standard density — typical desktop monitor',
    lowDensity: '⚠ Low density — pixels may be visible',
    step1: 'Enter the horizontal and vertical resolution in pixels',
    step2: 'Enter the diagonal screen size in inches',
    step3: 'Or click a preset for common devices',
    step4: 'Read the PPI, pixel density and classification',
  },
  zh: {
    toolTitle: 'PPI 计算器（每英寸像素数）',
    toolDesc: '根据屏幕分辨率和对角线尺寸计算每英寸像素数（PPI）、DPI 和像素密度。包含设备预设和视网膜分级 — 免费且私密。',
    width: '水平分辨率（像素）',
    height: '垂直分辨率（像素）',
    diagonal: '对角线屏幕尺寸',
    presets: '常见设备预设',
    calculate: '计算',
    resultPPI: '每英寸像素数',
    resultDPI: '每英寸点数（等效）',
    diagPixels: '对角线分辨率（像素）',
    aspectRatio: '宽高比',
    totalPixels: '总像素数（百万像素）',
    widthInch: '宽度（英寸）',
    heightInch: '高度（英寸）',
    classification: '分级',
    retinaDisplay: '🍎 视网膜级 — 肉眼无法分辨像素',
    highDensity: '✓ 高密度 — 文字和图像清晰',
    standardDensity: '○ 标准密度 — 典型桌面显示器',
    lowDensity: '⚠ 低密度 — 可能可见像素',
    step1: '输入水平和垂直分辨率（像素）',
    step2: '输入对角线屏幕尺寸（英寸）',
    step3: '或点击常见设备的预设',
    step4: '查看 PPI、像素密度和分级',
  }
});

const { $, t } = GZ;

const PRESETS = [
  {label:'iPhone 15 Pro', w:1179, h:2556, d:6.1},
  {label:'iPhone 15', w:1179, h:2556, d:6.1},
  {label:'iPad Pro 12.9', w:2048, h:2732, d:12.9},
  {label:'Galaxy S24', w:1080, h:2340, d:6.2},
  {label:'MacBook Pro 14', w:3024, h:1964, d:14.2},
  {label:'MacBook Air 13', w:2560, h:1664, d:13.6},
  {label:'Dell 24" 1080p', w:1920, h:1080, d:24},
  {label:'4K Monitor 27"', w:3840, h:2160, d:27},
  {label:'4K TV 55"', w:3840, h:2160, d:55},
  {label:'Pixel 8', w:1080, h:2400, d:6.2},
];

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

$('#input-card').innerHTML = `
  <div class="ppi-field">
    <label>${t('width')}</label>
    <input type="number" id="width" value="1920" min="1" step="1">
  </div>
  <div class="ppi-field">
    <label>${t('height')}</label>
    <input type="number" id="height" value="1080" min="1" step="1">
  </div>
  <div class="ppi-field">
    <label>${t('diagonal')}</label>
    <div style="display:flex;gap:8px">
      <input type="number" id="diagonal" value="24" min="0.1" step="0.1" style="flex:1">
      <select id="diagUnit" style="width:80px">
        <option value="in" selected>in</option>
        <option value="cm">cm</option>
        <option value="mm">mm</option>
      </select>
    </div>
  </div>
  <div class="ppi-field">
    <label>${t('presets')}</label>
    <div class="ppi-preset-row">
      ${PRESETS.map((p,i) => `<span class="ppi-preset" onclick="loadPreset(${i})">${p.label}</span>`).join('')}
    </div>
  </div>
  <button class="gz-btn" style="width:100%;padding:12px" onclick="calculate()">${t('calculate')}</button>
`;

$('#info-card').innerHTML = `
  <h3 style="margin:0 0 14px;font-size:1.05em">ℹ️ PPI Formula</h3>
  <div style="padding:14px;background:var(--glass2);border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:.9em;text-align:center;line-height:1.8">
    PPI = √(width² + height²) ÷ diagonal"<br>
    <span style="font-size:.85em;opacity:.8">diagonal_px = √(W² + H²)</span>
  </div>
  <p style="font-size:.88em;line-height:1.6;opacity:.85;margin-top:14px">
    <strong>PPI</strong> measures how densely pixels are packed on a display.
    Higher PPI = sharper image. Apple's "Retina" threshold is roughly
    <strong>300 PPI</strong> for phones (held ~10 inches away) and
    <strong>220 PPI</strong> for laptops.
  </p>
  <div style="margin-top:12px;font-size:.82em;line-height:1.5;opacity:.75">
    <strong>Classification:</strong><br>
    • 300+ PPI: Retina-class (phones)<br>
    • 200-299: High density<br>
    • 100-199: Standard desktop<br>
    • Below 100: Low density
  </div>
`;

function loadPreset(i) {
  const p = PRESETS[i];
  $('#width').value = p.w;
  $('#height').value = p.h;
  $('#diagonal').value = p.d;
  $('#diagUnit').value = 'in';
  calculate();
}

function calculate() {
  const w = parseInt($('#width').value) || 0;
  const h = parseInt($('#height').value) || 0;
  let diag = parseFloat($('#diagonal').value) || 0;
  const unit = $('#diagUnit').value;
  if (w <= 0 || h <= 0 || diag <= 0) {
    $('#results').innerHTML = '<div style="text-align:center;opacity:.5;padding:20px">Enter valid values</div>';
    return;
  }
  // Convert diagonal to inches
  if (unit === 'cm') diag = diag / 2.54;
  else if (unit === 'mm') diag = diag / 25.4;
  const diagPx = Math.sqrt(w*w + h*h);
  const ppi = diagPx / diag;
  const totalMpx = (w * h / 1000000).toFixed(2);
  const widthInch = w / ppi;
  const heightInch = h / ppi;
  const g = gcd(w, h);
  let ar = (w/g) + ':' + (h/g);
  if (w/g > 30 || h/g > 30) {
    // Simplify further
    ar = (w/h).toFixed(2) + ':1';
  }
  let cls, clsClass;
  if (ppi >= 300) { cls = t('retinaDisplay'); clsClass = 'retina'; }
  else if (ppi >= 200) { cls = t('highDensity'); clsClass = 'high'; }
  else if (ppi >= 100) { cls = t('standardDensity'); clsClass = 'standard'; }
  else { cls = t('lowDensity'); clsClass = 'low'; }

  $('#results').innerHTML = `
    <div style="text-align:center">
      <div style="font-size:.85em;opacity:.7;text-transform:uppercase;letter-spacing:.05em">${t('resultPPI')}</div>
      <div class="ppi-big">${ppi.toFixed(1)}<span class="unit"> PPI</span></div>
    </div>
    <div class="ppi-class ${clsClass}">${cls}</div>
    <div class="ppi-stats">
      <div class="ppi-stat"><div class="lbl">${t('resultDPI')}</div><div class="val">${ppi.toFixed(1)}</div></div>
      <div class="ppi-stat"><div class="lbl">${t('diagPixels')}</div><div class="val">${diagPx.toFixed(0)} px</div></div>
      <div class="ppi-stat"><div class="lbl">${t('totalPixels')}</div><div class="val">${totalMpx} MP</div></div>
      <div class="ppi-stat"><div class="lbl">${t('aspectRatio')}</div><div class="val">${ar}</div></div>
      <div class="ppi-stat"><div class="lbl">${t('widthInch')}</div><div class="val">${widthInch.toFixed(2)}"</div></div>
      <div class="ppi-stat"><div class="lbl">${t('heightInch')}</div><div class="val">${heightInch.toFixed(2)}"</div></div>
    </div>`;
}

calculate();
$('#width').addEventListener('input', calculate);
$('#height').addEventListener('input', calculate);
$('#diagonal').addEventListener('input', calculate);
$('#diagUnit').addEventListener('change', calculate);

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1', 'step2', 'step3', 'step4'],
  related: [
    {icon: '📐', href: '/calc/aspect-ratio.html', name: 'Aspect Ratio Calculator'},
    {icon: '🖥️', href: '/dev/screen-resolution-tester.html', name: 'Screen Resolution Tester'},
    {icon: '🖼️', href: '/calc/image-file-size.html', name: 'Image File Size Calculator'},
    {icon: '📐', href: '/css-tools/aspect-ratio.html', name: 'CSS Aspect Ratio'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body></html>
