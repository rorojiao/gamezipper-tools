<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Pizza Value Calculator","description":"Free Pizza Value Calculator — compare pizza deals by cost per square inch. Enter diameter and price for each option and instantly see which size is the best value. 100% in-browser, no signup.","url":"https://tools.gamezipper.com/calc/pizza-cost.html","applicationCategory":"Calculator","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do you calculate pizza value?", "acceptedAnswer": {"@type": "Answer", "text": "For a round pizza, area = π × (diameter ÷ 2)². Then cost per square inch = price ÷ area. The pizza with the lowest cost per square inch is the best value. For square pizzas use side × side."}}, {"@type": "Question", "name": "Is a larger pizza always a better deal?", "acceptedAnswer": {"@type": "Answer", "text": "Usually yes, because area grows with the square of the diameter. An 18-inch pizza has about 82% more area than a 14-inch one, so unless the price jumps dramatically, bigger is cheaper per bite."}}, {"@type": "Question", "name": "What unit should I use?", "acceptedAnswer": {"@type": "Answer", "text": "Use any length unit for the diameter or side (inches or cm) and any currency for the price — the unit cancels out, so the lowest cost per square unit still identifies the best deal."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="pz-grid" id="rows"></div>
    <div class="pz-summary" id="summary"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Pizza Value Calculator',
    toolDesc: 'Compare pizza deals by cost per square inch and instantly find which size gives you the most pizza for your money.',
    opt: 'Pizza', shape: 'Shape', round: 'Round', square: 'Square', size: 'Size', price: 'Price', unit: 'Unit', currency: 'Currency',
    addRow: '➕ Add Pizza', example: 'Load Example', reset: 'Reset',
    perArea: 'per sq in', area: 'Area', bestDeal: '🏆 Best deal',
    winner: 'is the best value at', noData: 'Add at least one pizza with size and price to compare.',
    step1: 'Pick the pizza shape — round or square',
    step2: 'Enter its size (diameter for round, side for square) and price',
    step3: 'Add more options to compare side by side',
    step4: 'The lowest cost per square inch is the best deal',
  },
  zh: {
    toolTitle: '披萨性价比计算器',
    toolDesc: '按每平方英寸的价格比较不同披萨，即时找出哪种尺寸最划算、吃到最多披萨。',
    opt: '披萨', shape: '形状', round: '圆形', square: '方形', size: '尺寸', price: '价格', unit: '单位', currency: '货币',
    addRow: '➕ 添加披萨', example: '加载示例', reset: '重置',
    perArea: '/ 平方英寸', area: '面积', bestDeal: '🏆 最划算',
    winner: '性价比最高，单价为', noData: '至少添加一个披萨（含尺寸和价格）才能比较。',
    step1: '选择披萨形状 — 圆形或方形',
    step2: '输入尺寸（圆形为直径，方形为边长）和价格',
    step3: '添加更多选项进行并排比较',
    step4: '每平方英寸价格最低者最划算',
  }
});
const { $, t } = GZ;
let rows = [];
const CURRENCIES = ['USD $','EUR €','GBP £','CNY ¥','JPY ¥','INR ₹'];
const UNITS = ['in','cm'];

function newRow(d={}){ rows.push(Object.assign({shape:'round',size:'',price:'',unit:'in',cur:'USD $'},d)); render(); }
function delRow(i){ rows.splice(i,1); if(!rows.length) newRow(); render(); }
function esc(s){return String(s).replace(/"/g,'&quot;');}

function render(){
  const box=$('#rows'); box.innerHTML='';
  rows.forEach((r,i)=>{
    const div=document.createElement('div'); div.className='pz-row';
    div.innerHTML=`
      <h3>${t('opt')} #${i+1}<button class="rm" onclick="delRow(${i})">✕</button></h3>
      <div class="pz-fields">
        <div><label>${t('shape')}</label><select onchange="rows[${i}].shape=this.value;calc()">
          <option value="round" ${r.shape==='round'?'selected':''}>${t('round')}</option>
          <option value="square" ${r.shape==='square'?'selected':''}>${t('square')}</option></select></div>
        <div><label>${t('size')}</label><input type="number" min="0" step="any" value="${esc(r.size)}" oninput="rows[${i}].size=this.value;calc()"></div>
        <div><label>${t('price')}</label><input type="number" min="0" step="any" value="${esc(r.price)}" oninput="rows[${i}].price=this.value;calc()"></div>
        <div><label>${t('currency')}</label><select onchange="rows[${i}].cur=this.value;calc()">${CURRENCIES.map(c=>`<option ${c===r.cur?'selected':''}>${c}</option>`).join('')}</select></div>
        <div><label>${t('unit')}</label><select onchange="rows[${i}].unit=this.value;calc()">${UNITS.map(u=>`<option ${u===r.unit?'selected':''}>${u}</option>`).join('')}</select></div>
      </div>
      <div class="pz-result" id="res-${i}"></div>`;
    box.appendChild(div);
  });
  calc();
}

function calc(){
  const vals = rows.map(r=>{
    const s = parseFloat(r.size)||0, p = parseFloat(r.price)||0;
    const area = r.shape==='round' ? Math.PI*(s/2)**2 : s*s;
    const cpa = area>0 && p>0 ? p/area : Infinity;
    return {area,cpa,r};
  });
  const valid = vals.filter(v=>v.cpa<Infinity);
  const min = valid.length ? Math.min(...valid.map(v=>v.cpa)) : Infinity;
  rows.forEach((r,i)=>{
    const el=$(`#res-${i}`); if(!el) return;
    const v=vals[i]; const sym=(r.cur.split(' ')[1]||'');
    if(v.cpa===Infinity){ el.innerHTML=`<span style="color:var(--text2)">—</span>`; el.parentElement.classList.remove('best'); return; }
    el.innerHTML=`<span>${sym}${(v.cpa*100).toFixed(2)}¢ ${t('perArea')}</span><span>${t('area')}: ${v.area.toFixed(1)} sq ${r.unit}</span>`;
    el.parentElement.classList.toggle('best', v.cpa===min);
  });
  const s=$('#summary');
  if(!valid.length){ s.textContent=t('noData'); return; }
  const w = valid.find(v=>v.cpa===min);
  const sym=(w.r.cur.split(' ')[1]||'');
  s.innerHTML = `${t('bestDeal')}: ${w.r.shape==='round'?'Ø '+w.r.size:w.r.size}${w.r.unit} ${t('round'==='round'?'':'')} ${t('winner')} <b>${sym}${(w.cpa*100).toFixed(2)}¢ ${t('perArea')}</b>`;
}

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="newRow()">${t('addRow')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadEx()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="resetAll()">${t('reset')}</button>`;

function loadEx(){
  rows=[];
  newRow({shape:'round',size:'12',price:'10',unit:'in',cur:'USD $'});
  newRow({shape:'round',size:'14',price:'13',unit:'in',cur:'USD $'});
  newRow({shape:'round',size:'16',price:'16',unit:'in',cur:'USD $'});
}
function resetAll(){ rows=[]; newRow({}); }

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏷️', href:'/calc/discount-calculator.html', name:'Discount Calculator'},
    {icon:'💰', href:'/calc/unit-price.html', name:'Unit Price'},
    {icon:'🍕', href:'/calc/recipe-scaler.html', name:'Recipe Scaler'},
    {icon:'📊', href:'/calc/percentage-calculator.html', name:'Percentage'},
  ]
});

newRow({});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
