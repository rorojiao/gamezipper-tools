<div class="gz-container">

San Francisco, CA 94103</textarea>
        <div class="rm-totals">
          <div><label id="lbl-date"></label><input type="text" id="date"></div>
          <div><label id="lbl-no"></label><input type="text" id="recno"></div>
          <div><label id="lbl-cashier"></label><input type="text" id="cashier" value="Alex"></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Receipt Maker & Generator',
    toolDesc: 'Create custom receipts online for free. Add store info, line items, tax and total — download a realistic printable receipt as PNG. No signup, no watermark.',
    store: 'Store / business name',
    addr: 'Address (one line each)',
    date: 'Date',
    no: 'Receipt #',
    cashier: 'Cashier',
    pay: 'Payment method',
    items: 'Line items (description, qty, unit price)',
    tax: 'Tax rate (%)',
    disc: 'Discount ($)',
    download: 'Download PNG',
    cash: 'Cash', card: 'Credit Card', debit: 'Debit', mobile: 'Mobile Pay', gift: 'Gift Card',
    itemPlaceholder: 'Item',
    subtotal: 'Subtotal',
    taxLbl: 'Tax',
    discLbl: 'Discount',
    total: 'TOTAL',
    thanks: 'Thank you for shopping!',
    warn: '⚠️ For novelty, mockups and templates only. Do not submit fabricated receipts for reimbursement or tax claims.',
    step1: 'Enter the store name, address and receipt details',
    step2: 'Add line items with quantity and unit price',
    step3: 'Set the tax rate and any discount — totals update live',
    step4: 'Click Download PNG to save your receipt',
  },
  zh: {
    toolTitle: '收据生成器 / 小票制作工具',
    toolDesc: '免费在线制作自定义收据。填写商家信息、商品明细、税率和折扣 — 下载逼真的可打印收据 PNG。无需注册、无水印。',
    store: '商家 / 店铺名称',
    addr: '地址（每行一条）',
    date: '日期',
    no: '收据编号',
    cashier: '收银员',
    pay: '支付方式',
    items: '商品明细（名称、数量、单价）',
    tax: '税率 (%)',
    disc: '折扣 ($)',
    download: '下载 PNG',
    cash: '现金', card: '信用卡', debit: '借记卡', mobile: '移动支付', gift: '礼品卡',
    itemPlaceholder: '商品',
    subtotal: '小计',
    taxLbl: '税',
    discLbl: '折扣',
    total: '合计',
    thanks: '感谢惠顾！',
    warn: '⚠️ 仅用于样品、原型和模板。请勿使用伪造收据进行报销或报税。',
    step1: '填写店铺名称、地址和收据信息',
    step2: '添加商品明细（数量和单价）',
    step3: '设置税率和折扣，合计实时更新',
    step4: '点击下载 PNG 保存收据',
  }
});
const { $, t } = GZ;
const items = [
  { d: 'T-Shirt', q: 2, p: 19.99 },
  { d: 'Coffee Mug', q: 1, p: 12.50 },
  { d: 'Sticker Pack', q: 3, p: 4.00 },
];

function fmt(n){ return '$'+(Math.round(n*100)/100).toFixed(2); }

function renderItems(){
  const box=$('#items');
  box.innerHTML = items.map((it,i)=>`
    <div class="rm-item">
      <input type="text" data-i="${i}" data-k="d" value="${escapeAttr(it.d)}" placeholder="${t('itemPlaceholder')}">
      <input type="number" data-i="${i}" data-k="q" value="${it.q}" min="0" step="1">
      <input type="number" data-i="${i}" data-k="p" value="${it.p}" min="0" step="0.01">
      <button data-del="${i}" title="✕">✕</button>
    </div>`).join('');
  box.querySelectorAll('input').forEach(inp=>inp.addEventListener('input',e=>{
    const i=+e.target.dataset.i, k=e.target.dataset.k;
    items[i][k] = k==='d' ? e.target.value : (parseFloat(e.target.value)||0);
    renderReceipt();
  }));
  box.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{ items.splice(+b.dataset.del,1); renderItems(); renderReceipt(); });
}
function escapeAttr(s){return String(s).replace(/"/g,'&quot;');}

function renderReceipt(){
  const subtotal = items.reduce((s,it)=>s + (it.q*it.p), 0);
  const tax = subtotal * (parseFloat($('#tax').value)||0)/100;
  const disc = parseFloat($('#disc').value)||0;
  const total = Math.max(0, subtotal + tax - disc);
  const rows = items.map(it=>`<tr><td>${escapeHtml(it.d||'·')} ×${it.q}</td><td class="r">${fmt(it.q*it.p)}</td></tr>`).join('');
  const payOpts = ['cash','card','debit','mobile','gift'];
  $('#receipt').innerHTML = `
    <div class="store">${escapeHtml($('#store').value||'')}</div>
    <div class="addr">${escapeHtml($('#addr').value||'')}</div>
    <hr>
    <div class="meta">Date: ${escapeHtml($('#date').value)} &nbsp; Reg: ${escapeHtml($('#recno').value)}<br>Cashier: ${escapeHtml($('#cashier').value)} &nbsp; Pay: ${t(payOpts[$('#pay').selectedIndex]||'cash')}</div>
    <hr>
    <table>${rows}</table>
    <hr>
    <table>
      <tr><td>${t('subtotal')}</td><td class="r">${fmt(subtotal)}</td></tr>
      <tr><td>${t('taxLbl')} (${parseFloat($('#tax').value)||0}%)</td><td class="r">${fmt(tax)}</td></tr>
      ${disc>0?`<tr><td>${t('discLbl')}</td><td class="r">-${fmt(disc)}</td></tr>`:''}
      <tr class="grand"><td>${t('total')}</td><td class="r">${fmt(total)}</td></tr>
    </table>
    <div class="bar">*${$('#recno').value || '0000'}*</div>
    <div class="foot">${t('thanks')}</div>`;
}
function escapeHtml(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

// init labels
$('#lbl-store').textContent=t('store');
$('#lbl-addr').textContent=t('addr');
$('#lbl-date').textContent=t('date');
$('#lbl-no').textContent=t('no');
$('#lbl-cashier').textContent=t('cashier');
$('#lbl-pay').textContent=t('pay');
$('#lbl-items').textContent=t('items');
$('#lbl-tax').textContent=t('tax');
$('#lbl-disc').textContent=t('disc');
const today=new Date();
$('#date').value = today.toLocaleDateString('en-US');
$('#recno').value = String(Math.floor(1000+Math.random()*9000));
$('#pay').innerHTML = [t('cash'),t('card'),t('debit'),t('mobile'),t('gift')].map(x=>`<option>${x}</option>`).join('');
$('#btnAddItem').textContent = '+ '+t('itemPlaceholder');
$('#btnAddItem').onclick=()=>{ items.push({d:'',q:1,p:0}); renderItems(); renderReceipt(); };
['store','addr','date','recno','cashier','pay','tax','disc'].forEach(id=>$('#'+id).addEventListener('input',renderReceipt));

$('#toolbar').innerHTML = `<button class="gz-btn" id="dl">${t('download')}</button>
  <span style="margin-left:10px;font-size:.78rem;color:var(--gz-text-muted);align-self:center">${t('warn')}</span>`;
$('#dl').onclick = ()=>{
  const node=$('#receipt');
  // rasterize via foreignObject SVG
  const w=node.offsetWidth, h=node.offsetHeight;
  const clone=node.cloneNode(true);
  const data=node.outerHTML;
  const svgStr=`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml" style="width:${w}px">${data}</div></foreignObject></svg>`;
  const blob=new Blob([svgStr],{type:'image/svg+xml;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const img=new Image();
  img.onload=()=>{
    const scale=2; const c=document.createElement('canvas'); c.width=w*scale; c.height=h*scale;
    const ctx=c.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,c.width,c.height);
    ctx.scale(scale,scale); ctx.drawImage(img,0,0);
    URL.revokeObjectURL(url);
    const a=document.createElement('a'); a.download='receipt.png'; a.href=c.toDataURL('image/png'); a.click();
  };
  img.onerror=()=>URL.revokeObjectURL(url);
  img.src=url;
};

renderItems(); renderReceipt();
GZ.renderToolPage({
  category:'image',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'🧾',href:'/text/invoice-generator.html',name:'Invoice'},
    {icon:'💵',href:'/text/payslip-generator.html',name:'Payslip'},
    {icon:'💲',href:'/text/estimate-generator.html',name:'Estimate'},
    {icon:'🏷️',href:'/calc/discount-calculator.html',name:'Discount'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
