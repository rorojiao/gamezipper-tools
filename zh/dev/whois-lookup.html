.wh-input{display:flex;gap:8px;flex-wrap:wrap}

.wh-input input:focus{outline:none;border-color:var(--accent)}
.wh-domain{text-align:center;padding:.8rem 0 0;font-family:monospace;font-size:1.2rem;color:var(--accent);word-break:break-all}
.wh-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-top:1rem}
.wh-card{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:16px}
.wh-card .label{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600}
.wh-card .value{font-size:.95rem;font-weight:500;word-break:break-all;line-height:1.5}
.wh-status{display:inline-block;padding:3px 9px;border-radius:7px;font-size:.75rem;font-weight:600;margin:2px 4px 2px 0;display:inline-block}
.wh-ok{background:rgba(16,185,129,0.15);color:#10b981;border:1px solid rgba(16,185,129,0.3)}
.wh-warn{background:rgba(245,158,11,0.15);color:#f59e0b;border:1px solid rgba(245,158,11,0.3)}
.wh-err{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3)}
.wh-info{background:rgba(78,205,196,0.1);color:var(--accent);border:1px solid rgba(78,205,196,0.3);padding:6px 12px;border-radius:10px;font-size:.85rem;margin-bottom:1rem;line-height:1.6}
.wh-events{margin-top:.4rem;display:flex;flex-direction:column;gap:6px}
.wh-event{display:flex;justify-content:space-between;padding:6px 10px;background:var(--glass2);border-radius:6px;font-size:.82rem}
.wh-event .ev{color:var(--text2)}
.wh-event .dt{font-weight:600;font-family:monospace}
.wh-error{padding:18px;text-align:center;color:#ef4444;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:12px;margin-top:1rem}
.wh-loading{padding:30px;text-align:center;color:var(--text2)}
.wh-loading::before{content:'';display:inline-block;width:22px;height:22px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:whs 1s linear infinite;margin-right:10px;vertical-align:middle}
@keyframes whs{to{transform:rotate(360deg)}}
.wh-presets{margin-top:1rem;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.wh-preset{background:var(--glass2);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:.8rem;cursor:pointer;color:var(--text2);text-decoration:none;transition:all .15s;font-family:monospace}
.wh-preset:hover{background:var(--glass);color:var(--text);border-color:var(--accent)}
.copy-btn{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:2px 8px;font-size:.7rem;cursor:pointer;margin-left:6px}
.copy-btn:hover{color:var(--accent);border-color:var(--accent)}
</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is WHOIS?", "acceptedAnswer": {"@type": "Answer", "text": "WHOIS is a public database that records who owns a domain name, when it was registered, when it expires, the registrar handling it, and which name servers it uses. The classic WHOIS protocol runs on port 43 in plain text, while RDAP is its modern, structured, HTTPS-based successor."}}, {"@type": "Question", "name": "Is this a real WHOIS lookup?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The tool queries the public RDAP (Registration Data Access Protocol) endpoint of the appropriate registry directly from your browser, which is the modern equivalent of a traditional WHOIS query. RDAP returns the same ownership, registration and nameserver data as WHOIS, with the bonus of structured JSON."}}, {"@type": "Question", "name": "Does it work for all TLDs?", "acceptedAnswer": {"@type": "Answer", "text": "RDAP is supported by most major registries including .com, .net, .org, .io, .dev, .app, .ai and many country codes. A few smaller TLDs still publish only legacy WHOIS. If RDAP data is not available for the queried TLD, the tool will tell you."}}, {"@type": "Question", "name": "Are my queries private?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The tool sends the query directly from your browser to the public RDAP endpoint of the registry. No data is sent to any GameZipper server, and we never see what you look up."}}]}</script>

      <button class="gz-btn" id="lookupBtn">🔍 <span id="lbl-check">WHOIS Lookup</span></button>
    </div>
    <div class="wh-presets" id="presets"></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'WHOIS Lookup',
    toolDesc: 'Look up WHOIS information for any domain — registrar, registration & expiration dates, status codes, name servers and DNSSEC. Powered by RDAP, runs entirely in your browser.',
    check: 'WHOIS Lookup',
    placeholder: 'example.com',
    registrant: 'Registrant',
    registrar: 'Registrar',
    reseller: 'Reseller',
    createdOn: 'Created On',
    expiresOn: 'Expires On',
    updatedOn: 'Last Updated',
    transferred: 'Last Transferred',
    status: 'Domain Status',
    dnssec: 'DNSSEC',
    nameServers: 'Name Servers',
    ipAddresses: 'Resolved IPs',
    events: 'Lifecycle Events',
    rdapEndpoint: 'RDAP endpoint',
    copyJson: 'Copy JSON',
    copied: 'Copied!',
    invalid: 'Please enter a valid domain name',
    notFound: 'Domain not found or RDAP data not available for this TLD',
    networkError: 'Network error — RDAP may be blocked by CORS for this TLD',
    tryPreset: 'Try a popular domain:',
    empty: '—',
    step1: 'Type a domain name (e.g. github.com) and press WHOIS Lookup',
    step2: 'View registrar, registrant organization, creation & expiration dates',
    step3: 'Inspect domain status codes, DNSSEC status and name servers',
    step4: 'Copy the full RDAP JSON response for further analysis',
  },
  zh: {
    toolTitle: 'WHOIS 查询工具',
    toolDesc: '查询任意域名的 WHOIS 信息 — 注册商、注册和到期日期、状态码、域名服务器和 DNSSEC。基于 RDAP 协议，完全浏览器本地运行。',
    check: 'WHOIS 查询',
    placeholder: 'example.com',
    registrant: '注册人',
    registrar: '注册商',
    reseller: '经销商',
    createdOn: '创建日期',
    expiresOn: '到期日期',
    updatedOn: '最后更新',
    transferred: '最近转移',
    status: '域名状态',
    dnssec: 'DNSSEC',
    nameServers: '域名服务器',
    ipAddresses: '解析 IP',
    events: '生命周期事件',
    rdapEndpoint: 'RDAP 端点',
    copyJson: '复制 JSON',
    copied: '已复制！',
    invalid: '请输入有效的域名',
    notFound: '未找到该域名或该 TLD 不支持 RDAP',
    networkError: '网络错误 — 当前 TLD 的 RDAP 可能被 CORS 屏蔽',
    tryPreset: '试试热门域名：',
    empty: '—',
    step1: '输入域名（如 github.com）并点击 WHOIS 查询',
    step2: '查看注册商、注册组织、创建和到期日期',
    step3: '检查域名状态码、DNSSEC 状态和域名服务器',
    step4: '复制完整 RDAP JSON 响应进行进一步分析',
  }
});

const { $, t } = GZ;
const result = $('#result');
const input = $('#domainInput');
const presets = $('#presets');
const rdapInfo = $('#rdapInfo');
let lastJson = null;

const PRESETS = ['github.com','google.com','wikipedia.org','cloudflare.com','openai.com','vercel.com','anthropic.com','example.com'];
presets.innerHTML = '<span style="color:var(--text2);font-size:.8rem;margin-right:6px">' + t('tryPreset') + '</span>' +
  PRESETS.map(d => `<a class="wh-preset" data-d="${d}">${d}</a>`).join('');
presets.querySelectorAll('.wh-preset').forEach(a => a.addEventListener('click', () => { input.value = a.dataset.d; lookup(); }));

input.addEventListener('keydown', e => { if (e.key === 'Enter') lookup(); });
$('#lookupBtn').addEventListener('click', lookup);

function cleanDomain(d) {
  d = d.trim().toLowerCase();
  d = d.replace(/^https?:\/\//, '').replace(/^www\./, '').split('/')[0].split('?')[0].split('#')[0];
  return d;
}

function isValidDomain(d) {
  return /^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?(\.[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?)+$/.test(d);
}

function formatDate(s) {
  if (!s) return t('empty');
  try {
    const d = new Date(s);
    if (isNaN(d.getTime())) return s;
    return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
  } catch (e) { return s; }
}

function vcardField(vcard, field) {
  if (!vcard || !Array.isArray(vcard) || !Array.isArray(vcard[1])) return null;
  const entry = vcard[1].find(c => Array.isArray(c) && c[0] === field);
  return entry ? entry[3] : null;
}

function statusClass(s) {
  if (/active|ok|client.*transfer.*prohibited|server.*transfer.*prohibited|server.*deleteprohibited|server.*updateprohibited/i.test(s)) return 'wh-ok';
  if (/pending|hold|redemption|inactive/i.test(s)) return 'wh-warn';
  return 'wh-err';
}

async function lookup() {
  const raw = input.value;
  const domain = cleanDomain(raw);
  if (!isValidDomain(domain)) { result.innerHTML = '<div class="wh-error">' + t('invalid') + '</div>'; rdapInfo.style.display='none'; return; }
  result.innerHTML = '<div class="wh-loading">' + t('check') + ': ' + domain + '…</div>';
  rdapInfo.style.display = 'none';
  lastJson = null;
  try {
    const res = await fetch('https://rdap.org/domain/' + domain, { headers: { 'Accept': 'application/rdap+json' } });
    if (res.status === 404) { result.innerHTML = '<div class="wh-error">' + t('notFound') + ' (' + domain + ')</div>'; return; }
    if (!res.ok) { result.innerHTML = '<div class="wh-error">HTTP ' + res.status + ' — ' + t('notFound') + '</div>'; return; }
    const data = await res.json();
    lastJson = data;
    if (data.port43) {
      rdapInfo.innerHTML = t('rdapEndpoint') + ': <code>' + data.port43 + '</code>';
      rdapInfo.style.display = 'block';
    } else {
      rdapInfo.style.display = 'none';
    }
    renderResult(domain, data);
  } catch (e) {
    result.innerHTML = '<div class="wh-error">' + t('networkError') + '<br><small>' + e.message + '</small></div>';
  }
}

function renderResult(domain, d) {
  const events = {};
  (d.events || []).forEach(ev => { if (ev.eventDate) events[ev.eventAction] = ev.eventDate; });
  const created = events.registration || null;
  const expires = events.expiration || null;
  const updated = events['last changed'] || events.lastUpdate || null;
  const transferred = events.transfer || null;

  const entities = d.entities || [];
  const findEntity = (roles) => entities.find(e => (e.roles || []).some(r => roles.includes(r)));
  const registrantEntity = findEntity(['registrant']);
  const registrarEntity = findEntity(['registrar']);
  const resellerEntity = findEntity(['reseller']);

  const org = (ent) => {
    if (!ent) return null;
    const va = ent.vcardArray;
    return (va && vcardField(va, 'fn')) || ent.handle || null;
  };
  const registrantOrg = org(registrantEntity);
  const registrarOrg = org(registrarEntity);
  const resellerOrg = org(resellerEntity);

  const statuses = d.status || [];
  const statusHTML = statuses.length
    ? statuses.map(s => `<span class="wh-status ${statusClass(s)}">${s}</span>`).join('')
    : t('empty');

  const nameservers = (d.nameservers || []).map(n => n.ldhName).filter(Boolean);
  const nsHTML = nameservers.length
    ? nameservers.slice(0, 8).map(n => `<div style="font-family:monospace;font-size:.78rem;color:var(--text2);padding:2px 0">${n}</div>`).join('') +
      (nameservers.length > 8 ? `<div style="font-size:.72rem;color:var(--text2)">+${nameservers.length - 8} more…</div>` : '')
    : t('empty');

  const dnssec = d.secureDNS
    ? (d.secureDNS.delegationSigned ? '✓ signed' : 'unsigned')
    : t('empty');

  const eventRows = Object.entries(events).map(([k, v]) =>
    `<div class="wh-event"><span class="ev">${k}</span><span class="dt">${formatDate(v)}</span></div>`
  ).join('');

  result.innerHTML = `
    <div class="wh-domain">${domain}</div>
    <div class="wh-grid">
      <div class="wh-card"><div class="label">${t('registrar')}</div><div class="value">${registrarOrg || t('empty')}</div></div>
      <div class="wh-card"><div class="label">${t('reseller')}</div><div class="value">${resellerOrg || t('empty')}</div></div>
      <div class="wh-card"><div class="label">${t('registrant')}</div><div class="value">${registrantOrg || t('empty')}</div></div>
      <div class="wh-card"><div class="label">${t('createdOn')}</div><div class="value">${formatDate(created)}</div></div>
      <div class="wh-card"><div class="label">${t('expiresOn')}</div><div class="value">${formatDate(expires)}</div></div>
      <div class="wh-card"><div class="label">${t('updatedOn')}</div><div class="value">${formatDate(updated)}</div></div>
      <div class="wh-card"><div class="label">${t('transferred')}</div><div class="value">${formatDate(transferred)}</div></div>
      <div class="wh-card"><div class="label">${t('dnssec')}</div><div class="value">${dnssec}</div></div>
    </div>
    <div class="wh-card" style="margin-top:1rem">
      <div class="label" style="margin-bottom:8px">${t('status')} <button class="copy-btn" onclick="copyJson()">${t('copyJson')}</button></div>
      <div>${statusHTML}</div>
    </div>
    <div class="wh-card" style="margin-top:1rem">
      <div class="label" style="margin-bottom:8px">${t('nameServers')}</div>
      ${nsHTML}
    </div>
    <div class="wh-card" style="margin-top:1rem">
      <div class="label" style="margin-bottom:8px">${t('events')}</div>
      <div class="wh-events">${eventRows || t('empty')}</div>
    </div>
  `;
}

function copyJson() {
  if (!lastJson) return;
  GZ.copyText(JSON.stringify(lastJson, null, 2));
  GZ.showToast(t('copied'));
}
window.copyJson = copyJson;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📅', href:'/dev/domain-age.html', name:'Domain Age'},
    {icon:'🌐', href:'/dev/dns-lookup.html', name:'DNS Lookup'},
    {icon:'🖥️', href:'/dev/ip-lookup.html', name:'IP Lookup'},
    {icon:'🔗', href:'/dev/url-parser.html', name:'URL Parser'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
