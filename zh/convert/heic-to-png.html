<script>
GZI18n.register({
  en: {
    toolTitle: 'HEIC to PNG Converter',
    toolDesc: 'Convert iPhone HEIC and HEIF photos to PNG in your browser. Drag, drop, and download — no upload, no signup.',
    chooseFile: 'Drop or browse one or more .heic / .heif files',
    info: 'Supports .heic, .heif • Multiple files OK • Decoded locally with heic2any',
    opts: 'Conversion Options',
    quality: 'PNG compression quality (0–1, only used for output blob type)',
    qualityHint: '0.92 = high quality, balanced file size',
    formatNote: '📌 Output format is always PNG. PNG is lossless — quality slider affects the intermediate JPEG passed to heic2any (set 1.0 to skip).',
    convert: '🔄 Convert All',
    clear: 'Clear All',
    dlAll: '⬇ Download All',
    done: '✓ Ready',
    converting: 'Converting…',
    failed: '✗ Failed',
    noFiles: 'No files added.',
    error: 'Error: ',
    step1: 'Drop or browse one or more HEIC files',
    step2: 'Optionally tweak the quality slider (default 0.92)',
    step3: 'Click "Convert All" to decode each file into a PNG',
    step4: 'Click each download link to save the PNG (or "Download All")',
  },
  zh: {
    toolTitle: 'HEIC 转 PNG 转换器',
    toolDesc: '在浏览器中把 iPhone 的 HEIC 和 HEIF 照片转换为 PNG。拖入、点击、下载 — 无需上传、无需注册。',
    chooseFile: '拖入或选择一个或多个 .heic / .heif 文件',
    info: '支持 .heic、.heif • 可批量处理 • 浏览器本地解码',
    opts: '转换选项',
    quality: 'PNG 压缩质量（0–1，仅影响中间 JPEG 块）',
    qualityHint: '0.92 = 高质量，文件大小均衡',
    formatNote: '📌 输出格式始终是 PNG。PNG 为无损格式 — 质量滑块仅影响 heic2any 内部使用的 JPEG 块（设 1.0 跳过压缩）。',
    convert: '🔄 全部转换',
    clear: '清空全部',
    dlAll: '⬇ 全部下载',
    done: '✓ 已就绪',
    converting: '转换中…',
    failed: '✗ 失败',
    noFiles: '没有文件。',
    error: '错误：',
    step1: '拖入或选择一个或多个 HEIC 文件',
    step2: '可调节质量滑块（默认 0.92）',
    step3: '点击「全部转换」将每个文件解码为 PNG',
    step4: '点击下载链接保存 PNG（或「全部下载」）',
  }
});

const { $, t, copyText } = GZ;
let files = [];

$('#dropLabel').textContent = t('chooseFile');
$('#dropInfo').textContent = t('info');
$('#lblOpts').textContent = t('opts');
$('#lblQuality').textContent = t('quality');
$('#qualityHint').textContent = t('qualityHint');
$('#formatNote').textContent = t('formatNote');

const drop = $('#drop');
drop.addEventListener('click', () => $('#file').click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('dragover'); const fs = [...e.dataTransfer.files]; if (fs.length) addFiles(fs); });
$('#file').addEventListener('change', e => { const fs = [...e.target.files]; if (fs.length) addFiles(fs); });

function addFiles(list) {
  for (const f of list) {
    const isHeic = /\.heic$|\.heif$/i.test(f.name) || f.type === 'image/heic' || f.type === 'image/heif';
    if (!isHeic) continue;
    const item = { id: Date.now() + '-' + Math.random().toString(36).slice(2, 8), file: f, status: 'pending', pngUrl: null, pngName: '', error: '' };
    files.push(item);
  }
  render();
}

function render() {
  if (!files.length) { $('#files').innerHTML = ''; drop.querySelector('.icon').textContent = '📱➡️🖼️'; $('#dropLabel').textContent = t('chooseFile'); $('#dropInfo').textContent = t('info'); return; }
  drop.querySelector('.icon').textContent = '🖼️';
  $('#dropLabel').textContent = files.length + ' 个文件就绪';
  const totalSize = files.reduce((s, f) => s + f.file.size, 0);
  $('#dropInfo').textContent = (totalSize / 1024).toFixed(1) + ' KB • ' + t('chooseFile');
  $('#files').innerHTML = files.map(f => {
    const status = f.status === 'pending' ? t('converting') : f.status === 'done' ? t('done') : t('failed');
    const color = f.status === 'done' ? 'color:var(--gz-success)' : (f.status === 'failed' ? 'color:#ff8a80' : 'opacity:.7');
    const dl = f.status === 'done'
      ? `<a class="gz-btn" style="padding:4px 10px;font-size:.78em" href="${f.pngUrl}" download="${f.pngName}">⬇</a>`
      : '';
    return `<div class="h2p-file">
      <div class="name" title="${esc(f.file.name)}">${esc(f.file.name)}</div>
      <div class="actions">
        <div class="status" style="${color}">${status}${f.error ? ' ('+esc(f.error)+')' : ''}</div>
        ${dl}
        <button class="gz-btn gz-btn-secondary" style="padding:4px 10px;font-size:.78em" onclick="removeFile('${f.id}')">✗</button>
      </div>
    </div>`;
  }).join('');
}

function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function removeFile(id) {
  const idx = files.findIndex(f => f.id === id);
  if (idx >= 0) {
    const f = files[idx];
    if (f.pngUrl) URL.revokeObjectURL(f.pngUrl);
    files.splice(idx, 1);
    render();
  }
}

async function convertAll() {
  if (!files.length) return;
  const quality = parseFloat($('#quality').value) || 0.92;
  for (const f of files) {
    if (f.status === 'done') continue;
    f.status = 'pending'; f.error = ''; render();
    try {
      const outBlob = await heic2any({ blob: f.file, toType: 'image/png', quality });
      const out = Array.isArray(outBlob) ? outBlob[0] : outBlob;
      f.pngUrl = URL.createObjectURL(out);
      f.pngName = f.file.name.replace(/\.heic$|\.heif$/i, '') + '.png';
      f.status = 'done';
    } catch (e) {
      f.status = 'failed';
      f.error = (e && e.message) || 'decode failed';
    }
    render();
  }
}

function downloadAll() {
  for (const f of files) {
    if (f.status === 'done' && f.pngUrl) {
      const a = document.createElement('a');
      a.href = f.pngUrl;
      a.download = f.pngName;
      document.body.appendChild(a);
      a.click();
      a.remove();
    }
  }
}

function clearAll() {
  for (const f of files) { if (f.pngUrl) URL.revokeObjectURL(f.pngUrl); }
  files = [];
  $('#file').value = '';
  render();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convertAll()">${t('convert')}</button>
  <button class="gz-btn" onclick="downloadAll()">${t('dlAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>
`;

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📱', href:'/zh/convert/heic-to-jpg.html', name:'HEIC 转 JPG'},
    {icon:'🖼️', href:'/zh/convert/image-to-png.html', name:'图片转 PNG'},
    {icon:'📦', href:'/zh/convert/image-converter.html', name:'图片格式转换'},
    {icon:'🗜️', href:'/zh/image/compressor.html', name:'图片压缩'},
  ]
});
</script>
