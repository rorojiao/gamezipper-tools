<script>

  en: {
    toolTitle: 'Crypto Profit Calculator',
    toolDesc: 'Calculate profit, loss, ROI and break-even price for any crypto trade. Supports BTC, ETH, SOL and any coin with custom buy/sell prices and fees.',
    lblPresets: '⚡ Quick Start — Popular Coins',
    lblTrade: '📊 Trade Details',

    lblBuy: 'Buy Price (per coin)',
    lblSell: 'Sell Price (per coin)',
    lblQty: 'Quantity (coins)',
    lblBuyfee: 'Buy Fee (%)',

    lblCurrency: 'Currency',

  },
  zh: {

    toolDesc: '计算任何加密交易的盈亏、ROI 和盈亏平衡价。支持 BTC、ETH、SOL 及任意币种，自定义买卖价格和手续费。',
    lblPresets: '⚡ 快速开始 — 热门币种',
    lblTrade: '📊 交易详情',
    lblCoin: '币种 / 代码',
    lblBuy: '买入价（每币）',
    lblSell: '卖出价（每币）',
    lblQty: '数量（币）',
    lblBuyfee: '买入手续费 (%)',
    lblSellfee: '卖出手续费 (%)',
    lblCurrency: '货币',
    lblProfit: '净盈亏',
    lblRoi: '投资回报率',
    lblCost: '总成本',
    lblRevenue: '总收入',
    lblBreakeven: '盈亏平衡价',
    lblMulti: '倍数',
    lblBreakevenSub: '保本价格',
    lblMultiSub: '相对成本的倍数',
    lblScenarios: '🎯 价格情景',
    lblScenPrice: '卖出价',
    lblScenProfit: '盈亏',
    lblScenRoi: '回报率',
    lblScenChange: '变化 %',
    note: '💡 <b>说明：</b>计算基于简单的买入和卖出。高级策略（DCA、合约、杠杆、质押）请使用专门的交易所工具。可能涉及税务义务 — 请咨询税务专业人士。',
    step1: '输入买入价和购买的数量',
    step2: '设置卖出价（已卖出或计划卖出）',
    step3: '添加交易所买卖手续费（通常 0.1%-0.5%）',
    step4: '查看即时盈亏、ROI、盈亏平衡价和价格情景',
  }
});

const { $, t } = GZ;

const PRESETS = [
  { coin: 'BTC', buy: 40000, sell: 70000, qty: 0.5, emoji: '₿' },
  { coin: 'ETH', buy: 2000, sell: 4000, qty: 2, emoji: 'Ξ' },
  { coin: 'SOL', buy: 100, sell: 200, qty: 50, emoji: '◎' },
  { coin: 'BNB', buy: 300, sell: 600, qty: 5, emoji: '🟡' },
  { coin: 'XRP', buy: 0.5, sell: 2, qty: 10000, emoji: '🟣' },
  { coin: 'ADA', buy: 0.4, sell: 1.2, qty: 5000, emoji: '🔵' },
  { coin: 'DOGE', buy: 0.08, sell: 0.25, qty: 100000, emoji: '🐕' },
  { coin: 'AVAX', buy: 30, sell: 80, qty: 50, emoji: '🔺' },
];

const CURRENCY_SYM = {USD:'$',EUR:'€',GBP:'£',JPY:'¥',CNY:'¥',KRW:'₩',BTC:'₿',ETH:'Ξ'};

function fmt(n, currency) {
  const sym = CURRENCY_SYM[currency] || '$';
  if (currency === 'BTC' || currency === 'ETH') return n.toFixed(8) + ' ' + sym;
  if (n >= 1e9) return sym + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return sym + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return sym + n.toLocaleString('en-US', {maximumFractionDigits: 2});
  if (n >= 1) return sym + n.toFixed(2);
  if (n > 0) return sym + n.toFixed(4);
  return sym + '0.00';
}

function calc() {
  const buy = +$('#buyPrice').value || 0;
  const sell = +$('#sellPrice').value || 0;
  const qty = +$('#quantity').value || 0;
  const buyFeePct = +$('#buyFee').value || 0;
  const sellFeePct = +$('#sellFee').value || 0;
  const currency = $('#currency').value;
  const sym = CURRENCY_SYM[currency];

  const costBeforeFee = buy * qty;
  const buyFee = costBeforeFee * (buyFeePct / 100);
  const totalCost = costBeforeFee + buyFee;
  const grossRevenue = sell * qty;
  const sellFee = grossRevenue * (sellFeePct / 100);
  const totalRevenue = grossRevenue - sellFee;
  const profit = totalRevenue - totalCost;
  const roi = totalCost > 0 ? (profit / totalCost) * 100 : 0;
  const multiplier = totalCost > 0 ? totalRevenue / totalCost : 0;
  // Break even: (buy + buyFee) = (sell - sellFee) => sell = (buy*(1+bf)) / (1-sf)
  const breakEven = buyFeePct < 100 && sellFeePct < 100 ? buy * (1 + buyFeePct/100) / (1 - sellFeePct/100) : 0;

  // Update cards
  const profitCard = $('#profitCard');
  profitCard.classList.remove('profit','loss');
  if (profit > 0) profitCard.classList.add('profit');
  else if (profit < 0) profitCard.classList.add('loss');
  $('#profitVal').textContent = (profit >= 0 ? '+' : '') + fmt(profit, currency);
  $('#profitSub').textContent = (profit >= 0 ? '🎉 Profit' : '📉 Loss');

  $('#roiVal').textContent = (roi >= 0 ? '+' : '') + roi.toFixed(2) + '%';
  $('#roiSub').textContent = (roi >= 0 ? 'You gained' : 'You lost') + ' ' + Math.abs(roi).toFixed(2) + '%';

  $('#costVal').textContent = fmt(totalCost, currency);
  $('#costSub').textContent = qty + ' × ' + sym + buy.toLocaleString() + ' + fees';

  $('#revenueVal').textContent = fmt(totalRevenue, currency);
  $('#revenueSub').textContent = qty + ' × ' + sym + sell.toLocaleString() + ' − fees';

  $('#breakevenVal').textContent = fmt(breakEven, currency);
  $('#breakevenVal').style.color = breakEven > 0 ? 'var(--text)' : 'var(--text2)';

  $('#multiVal').textContent = multiplier.toFixed(3) + '×';
  $('#multiVal').style.color = multiplier >= 1 ? '#10b981' : '#ef4444';

  // Scenarios
  const scenarios = [-50, -25, -10, 0, 10, 25, 50, 100, 200];
  const tbody = $('#scenarioBody');
  tbody.innerHTML = scenarios.map(pct => {
    const scenSell = buy * (1 + pct/100);
    const scenRev = scenSell * qty;
    const scenFee = scenRev * (sellFeePct/100);
    const scenNet = scenRev - scenFee;
    const scenProfit = scenNet - totalCost;
    const scenRoi = totalCost > 0 ? (scenProfit/totalCost)*100 : 0;
    const color = scenProfit > 0 ? '#10b981' : (scenProfit < 0 ? '#ef4444' : 'var(--text2)');
    return `<tr>
      <td>${sym}${scenSell.toLocaleString('en-US', {maximumFractionDigits: 4})}</td>
      <td style="color:${color}">${(scenProfit>=0?'+':'')}${fmt(scenProfit, currency)}</td>
      <td style="color:${color}">${(scenRoi>=0?'+':'')}${scenRoi.toFixed(2)}%</td>
      <td style="color:${color}">${(pct>=0?'+':'')}${pct}%</td>
    </tr>`;
  }).join('');
}

function loadPreset(p) {
  $('#coin').value = p.coin;
  $('#buyPrice').value = p.buy;
  $('#sellPrice').value = p.sell;
  $('#quantity').value = p.qty;
  calc();
}

$('#lbl-presets').textContent = t('lblPresets');
$('#lbl-trade').textContent = t('lblTrade');
$('#lbl-coin').textContent = t('lblCoin');
$('#lbl-buy').textContent = t('lblBuy');
$('#lbl-sell').textContent = t('lblSell');
$('#lbl-qty').textContent = t('lblQty');
$('#lbl-buyfee').textContent = t('lblBuyfee');
$('#lbl-sellfee').textContent = t('lblSellfee');
$('#lbl-currency').textContent = t('lblCurrency');
$('#lbl-profit').textContent = t('lblProfit');
$('#lbl-roi').textContent = t('lblRoi');
$('#lbl-cost').textContent = t('lblCost');
$('#lbl-revenue').textContent = t('lblRevenue');
$('#lbl-breakeven').textContent = t('lblBreakeven');
$('#lbl-multi').textContent = t('lblMulti');
$('#lbl-multiSub').textContent = t('lblMultiSub');
$('#lbl-breakevenSub').textContent = t('lblBreakevenSub');
$('#lbl-scenarios').textContent = t('lblScenarios');
$('#lbl-scenPrice').textContent = t('lblScenPrice');
$('#lbl-scenProfit').textContent = t('lblScenProfit');
$('#lbl-scenRoi').textContent = t('lblScenRoi');
$('#lbl-scenChange').textContent = t('lblScenChange');
$('#note').innerHTML = t('note');

$('#presets').innerHTML = PRESETS.map(p => `<div class="cp-preset" onclick='loadPreset(${JSON.stringify(p)})'><span class="emoji">${p.emoji}</span><b>${p.coin}</b></div>`).join('');

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#buyPrice').value=0;$('#sellPrice').value=0;$('#quantity').value=0;calc()">${t('clear')}</button>
  <button class="gz-btn" onclick="calc()">${t('generate') || 'Calculate'}</button>`;

['buyPrice','sellPrice','quantity','buyFee','sellFee','coin','currency'].forEach(id => {
  $('#'+id).addEventListener('input', calc);
  $('#'+id).addEventListener('change', calc);
});

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',

  related: [
    {icon:'💰', href:'/calc/roi.html', name:'ROI Calculator'},
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
    {icon:'💱', href:'/convert/currency-converter.html', name:'Currency Converter'},
    {icon:'💸', href:'/calc/inflation-calculator.html', name:'Inflation Calc'},
  ]
});
</script>
