<div class="gz-container">

  </div>
  <div class="gz-tool-area">
    <div><label id="lbl-in"></label><textarea id="input" spellcheck="false" placeholder="Type or paste your text here..."></textarea></div>
    <div class="z-controls">
      <div class="z-control">

        <input type="range" id="intensity" min="1" max="20" value="5">

        <input type="range" id="bot" min="0" max="10" value="1">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Zalgo Text Generator',
    toolDesc: 'Convert any text into Zalgo / glitched Unicode by stacking combining marks above, below and through each letter. Create cursed horror text for social media.',
    preset1: 'Subtle', preset2: 'Mild', preset3: 'Crazy', preset4: 'Insane', preset5: 'He Comes',
    step1: 'Type or paste your text in the input area',
    step2: 'Adjust the intensity sliders or pick a preset',
    step3: 'See the Zalgo version in the output area',
    step4: 'Click Copy to use it in social media, usernames or messages',
  },
  zh: {
    toolTitle: 'Zalgo 鬼畜文字生成器',
    toolDesc: '将任意文字转换为 Zalgo 鬼畜 Unicode 字符，通过叠加变音符号在字母的上下和中间产生故障效果。适用于社交媒体和恐怖风格创作。',
    preset1: '微弱', preset2: '轻度', preset3: '疯狂', preset4: '爆裂', preset5: '他来了',
    step1: '在输入框中输入或粘贴文字',
    step2: '调整强度滑块或选择预设',
    step3: '在输出区域查看 Zalgo 效果',
    step4: '点击复制到剪贴板',
  }
});

// Unicode combining diacritical marks
const UP = ['\u0300','\u0301','\u0302','\u0303','\u0304','\u0305','\u0306','\u0307','\u0308','\u0309','\u030A','\u030B','\u030C','\u030D','\u030E','\u030F','\u0310','\u0311','\u0312','\u0313','\u0314','\u0315','\u031A','\u031B','\u033D','\u033E','\u033F','\u0340','\u0341','\u0342','\u0343','\u0344','\u0346','\u034A','\u034B','\u034C','\u0350','\u0351','\u0352','\u0357','\u0358','\u035B','\u035C','\u035D','\u035E','\u035F','\u0360','\u0361'];
const MID = ['\u0316','\u0317','\u0318','\u0319','\u031C','\u031D','\u031E','\u031F','\u0320','\u0321','\u0322','\u0323','\u0324','\u0325','\u0326','\u0327','\u0328','\u0329','\u032A','\u032B','\u032C','\u032D','\u032E','\u032F','\u0330','\u0331','\u0332','\u0333','\u0334','\u0335','\u0336','\u0337','\u0338','\u0339','\u033A','\u033B','\u033C','\u0345','\u0347','\u0348','\u0349','\u034D','\u034E','\u0353','\u0354','\u0355','\u0356','\u0359','\u035A','\u0363','\u0364','\u0365','\u0366','\u0367','\u0368','\u0369','\u036A','\u036B','\u036C','\u036D','\u036E','\u036F'];
const DOWN = ['\u0316','\u0317','\u0318','\u0319','\u031A','\u031B','\u031C','\u031D','\u031E','\u031F','\u0320','\u0321','\u0322','\u0323','\u0324','\u0325','\u0326','\u0327','\u0328','\u0329','\u032A','\u032B','\u032C','\u032D','\u032E','\u032F','\u0330','\u0331','\u0332','\u0333','\u0334','\u0335','\u0336','\u0337','\u0338','\u0339','\u033A','\u033B','\u033C','\u0345','\u0347','\u0348','\u0349','\u034D','\u034E','\u0353','\u0354','\u0355','\u0356','\u0359','\u035A','\u0362','\u0363','\u0364','\u0365','\u0366','\u0367','\u0368','\u0369','\u036A','\u036B','\u036C','\u036D','\u036E','\u036F'];

const PRESETS = [
  { nameKey: 'preset1', top: 1, mid: 0, bot: 0, int: 1 },
  { nameKey: 'preset2', top: 3, mid: 1, bot: 2, int: 4 },
  { nameKey: 'preset3', top: 8, mid: 2, bot: 5, int: 8 },
  { nameKey: 'preset4', top: 12, mid: 3, bot: 8, int: 12 },
  { nameKey: 'preset5', top: 16, mid: 5, bot: 12, int: 18 },
];

const { $, $$, t } = GZ;

function randItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function zalgoify(text, intensity, top, mid, bot) {
  let out = '';
  for (const ch of text) {
    out += ch;
    if (ch.trim() === '' || /\s/.test(ch)) continue;
    for (let i = 0; i < top; i++) out += randItem(UP);
    for (let i = 0; i < mid; i++) out += randItem(MID);
    for (let i = 0; i < bot; i++) out += randItem(DOWN);
  }
  return out;
}

function update() {
  const text = $('#input').value;
  const intensity = +$('#intensity').value;
  const top = +$('#top').value;
  const mid = +$('#mid').value;
  const bot = +$('#bot').value;
  $('#intVal').textContent = intensity;
  $('#topVal').textContent = top;
  $('#midVal').textContent = mid;
  $('#botVal').textContent = bot;
  const out = zalgoify(text, intensity, top, mid, bot);
  $('#output').textContent = out;
  const marks = out.length - text.length;
  $('#stats').innerHTML = `<span><b>${text.length}</b> characters in</span><span><b>${marks}</b> combining marks added</span><span><b>${out.length}</b> characters out</span>`;
}

function renderPresets() {
  $('#presets').innerHTML = PRESETS.map((p, i) =>
    `<button class="z-preset${i===1?' active':''}" data-i="${i}">${t(p.nameKey)}</button>`
  ).join('');
  $$('#presets .z-preset').forEach(b => b.addEventListener('click', () => {
    $$('#presets .z-preset').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    const p = PRESETS[+b.dataset.i];
    $('#top').value = p.top;
    $('#mid').value = p.mid;
    $('#bot').value = p.bot;
    $('#intensity').value = p.int;
    update();
  }));
}

$('#input').addEventListener('input', update);
['intensity','top','mid','bot'].forEach(id => $('#' + id).addEventListener('input', update));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="GZ.copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';update()">${t('clear')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='He comes';update()">Load Example</button>`;

$('#input').value = 'Zalgo';
renderPresets();
update();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✨', href:'/text/fancy-text.html', name:'Fancy Text'},
    {icon:'🔄', href:'/text/flip-text.html', name:'Flip Text'},
    {icon:'🆔', href:'/text/username-generator.html', name:'Username Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
