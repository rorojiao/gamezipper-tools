function toXML(obj, root) {
  const esc = s => String(s).replace(/[<>&'"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','\'':'&apos;','"':'&quot;'}[c]));
  const walk = (o) => {
    if (o === null) return '';
    if (Array.isArray(o)) return o.map(v => `<item>${walk(v)}</item>`).join('');
    if (typeof o === 'object') {
      return Object.entries(o).map(([k,v]) => {
        if (v === null) return `<${k} xsi:nil="true"/>`;
        return `<${k}>${walk(v)}</${k}>`;
      }).join('');
    }
    return esc(o);
  };
  return `<?xml version="1.0" encoding="UTF-8"?>\n<${root}>\n${walk(obj)}\n</${root}>`;
}

function toYAML(obj, indent=0) {
  const pad = ' '.repeat(indent);
  if (obj === null) return 'null';
  if (typeof obj === 'string') {
    if (/[:#\n]|^\s|\s$/.test(obj) || obj === '') return JSON.stringify(obj);
    return obj;
  }
  if (typeof obj === 'number' || typeof obj === 'boolean') return String(obj);
  if (Array.isArray(obj)) {
    if (obj.length === 0) return '[]';
    return obj.map(v => `${pad}- ${toYAML(v, indent+2).replace(/\n/g,'\n'+pad+'  ')}`).join('\n');
  }
  const keys = Object.keys(obj);
  if (keys.length === 0) return '{}';
  return keys.map(k => {
    const v = obj[k];
    if (typeof v === 'object' && v !== null) {
      return `${pad}${k}:\n${toYAML(v, indent+2)}`;
    }
    return `${pad}${k}: ${toYAML(v, 0)}`;
  }).join('\n');
}

function toCSV(rows) {
  if (!rows.length) return '';
  const keys = Object.keys(rows[0]);
  const esc = v => {
    if (v === null || v === undefined) return '';
    const s = typeof v === 'object' ? JSON.stringify(v) : String(v);
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
  };
  return [keys.join(','), ...rows.map(r => keys.map(k => esc(r[k])).join(','))].join('\n');
}

function generate() {
  const res = document.getElementById('resource').value;
  const fmt = document.getElementById('fmt').value;
  const count = +document.getElementById('count').value;
  const isList = res.endsWith('s') || ['posts','comments','orders','products','users'].includes(res);
  const root = res.replace(/s$/,'');
  const items = Array.from({length: count}, () => GEN[res]());
  if (isList && count > 1) {
    return fmt === 'json' ? JSON.stringify({ data: items, total: items.length, page: 1, perPage: items.length }, null, 2) :
           fmt === 'xml' ? toXML({ data: { item: items } }, root) :
           fmt === 'yaml' ? toYAML({ data: items, total: items.length }) :
           toCSV(items);
  }
  return fmt === 'json' ? JSON.stringify(items[0], null, 2) :
         fmt === 'xml' ? toXML(items[0], root) :
         fmt === 'yaml' ? toYAML(items[0]) :
         toCSV(items);
}

function generateHeaders() {
  const status = +document.getElementById('status').value;
  const latency = +document.getElementById('latency').value;
  return [
    `HTTP/1.1 ${status} ${pick(['OK','Created','Accepted','No Content','Bad Request','Unauthorized','Not Found','Server Error'])}`,
    `Content-Type: ${document.getElementById('fmt').value === 'json' ? 'application/json' : document.getElementById('fmt').value === 'xml' ? 'application/xml' : 'text/yaml'}`,
    `X-Request-ID: ${uuid()}`,
    `X-Response-Time: ${latency || rand(10,200)}ms`,
    `Cache-Control: ${pick(['no-cache','no-store','public, max-age=3600','private, max-age=300'])}`,
    `Access-Control-Allow-Origin: *`,
    `Access-Control-Allow-Methods: GET, POST, PUT, DELETE, OPTIONS`,
    `X-RateLimit-Limit: 1000`,
    `X-RateLimit-Remaining: ${rand(100,1000)}`,
    `X-RateLimit-Reset: ${Math.floor(Date.now()/1000) + 3600}`,
    `Date: ${new Date().toUTCString()}`,
    `Server: nginx/1.24.0`,
    `X-Powered-By: GameZipper-MockAPI/1.0`
  ].join('\n');
}

function generateFetch() {
  const status = document.getElementById('status').value;
  return `// Sample fetch() code with response handling
async function getMockData() {
  try {
    const response = await fetch('https://your-api.example.com/v1/resource', {
      method: 'GET',
      headers: {
        'Authorization': 'Bearer YOUR_API_KEY',
        'Content-Type': 'application/json',
        'X-Request-ID': '${uuid()}'
      }
    });
    
    if (!response.ok) {
      throw new Error('HTTP ' + response.status);
    }
    
    const data = await response.json();
    console.log('Success:', data);
    return data;
  } catch (error) {
    console.error('Failed:', error);
    throw error;
  }
}`;
}

let activeTab = 'body';

function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.mk-tab').forEach(b => b.classList.remove('active'));
  document.querySelector(`.mk-tab[data-tab="${tab}"]`).classList.add('active');
  render();
}

function render() {
  let content = '';
  if (activeTab === 'body') content = generate();
  else if (activeTab === 'headers') content = generateHeaders();
  else content = generateFetch();
