<script>
GZI18n.register({
  en: {
    toolTitle: 'Wavy Text Generator',
    toolDesc: 'Convert text to wavy, squiggly, bubble, fancy and aesthetic Unicode styles for social media, bios, captions, usernames and nicknames. 30+ styles — pick, copy, paste.',

  },
  zh: {
    toolTitle: '波浪文字生成器',
    toolDesc: '将文字转换为波浪、弯曲、泡沫、炫酷和美式风格的 Unicode 字符，适用社交媒体、个人简介、用户名和昵称。30+ 风格 — 选、复制、粘贴。',
    step1: '在输入框中输入或粘贴文字',
    step2: '自动生成 30+ 种 Unicode 风格',
    step3: '点击复制按钮复制喜欢的风格',
    step4: '粘贴到 Instagram、TikTok、Twitter、Discord 等平台',
  }
});

// Style maps
const STYLES = [
  { name: 'Wavy Underline', fn: t => [...t].map(c => /[a-zA-Z]/.test(c) ? c + '\u0332' : c).join('') },
  { name: 'Wavy Double', fn: t => [...t].map(c => /[a-zA-Z]/.test(c) ? c + '\u0333' : c).join('') },
  { name: 'Strikethrough', fn: t => [...t].map(c => /[a-zA-Z]/.test(c) ? c + '\u0336' : c).join('') },
  { name: 'Double Underline', fn: t => [...t].map(c => /[a-zA-Z]/.test(c) ? c + '\u0333' : c).join('') },
  { name: 'Dotted Above', fn: t => [...t].map(c => /[a-zA-Z]/.test(c) ? c + '\u0307' : c).join('') },
  { name: 'Slash Through', fn: t => [...t].map(c => /[a-zA-Z]/.test(c) ? c + '\u0338' : c).join('') },
  { name: 'Hearts ♥', fn: t => [...t.toUpperCase()].map(c => '♥'+c).join('') },
  { name: 'Stars ★', fn: t => [...t.toUpperCase()].map(c => '★'+c).join('') },
  { name: 'Arrows ➳', fn: t => [...t].map(c => c + '➳').join('') },
  { name: 'Sparkles ✨', fn: t => [...t].map(c => c + '✨').join('') },
  { name: 'Fire 🔥', fn: t => [...t.toUpperCase()].map(c => c + '🔥').join('') },
  { name: 'Small Caps', fn: t => smallCaps(t) },
  { name: 'Bold Serif 𝗕', fn: t => toStyle(t, 'BOLD_SERIF') },
  { name: 'Bold Sans 𝘽', fn: t => toStyle(t, 'BOLD_SANS') },
  { name: 'Italic Serif 𝘉', fn: t => toStyle(t, 'ITALIC_SERIF') },
  { name: 'Italic Sans 𝘉', fn: t => toStyle(t, 'ITALIC_SANS') },
  { name: 'Bold Italic 𝙗', fn: t => toStyle(t, 'BOLD_ITALIC_SERIF') },
  { name: 'Script ℬ', fn: t => toStyle(t, 'SCRIPT') },
  { name: 'Bold Script 𝓑', fn: t => toStyle(t, 'BOLD_SCRIPT') },
  { name: 'Fraktur 𝔅', fn: t => toStyle(t, 'FRAKTUR') },
  { name: 'Bold Fraktur 𝕭', fn: t => toStyle(t, 'BOLD_FRAKTUR') },
  { name: 'Double-Struck 𝔹', fn: t => toStyle(t, 'DOUBLE_STRUCK') },
  { name: 'Monospace 𝙼', fn: t => toStyle(t, 'MONOSPACE') },
  { name: 'Circled Ⓒ', fn: t => toStyle(t, 'CIRCLED') },
  { name: 'Squared 🅂', fn: t => toStyle(t, 'SQUARED') },
  { name: 'Negative Squared 🅽', fn: t => toStyle(t, 'NEG_SQUARED') },
  { name: 'Inverted ɐ', fn: t => invert(t) },
  { name: 'Reversed', fn: t => [...t].reverse().join('') },
  { name: 'Upside Down', fn: t => upsideDown(t) },
  { name: 'Mirror', fn: t => mirror(t) },
  { name: 'Spacing Wide', fn: t => [...t].join(' ') },
  { name: 'Slash /w/', fn: t => [...t].join('/') },
  { name: 'Dot .w.', fn: t => [...t].join('.') },
];

function smallCaps(t) {
  const m = {a:'ᴀ',b:'ʙ',c:'ᴄ',d:'ᴅ',e:'ᴇ',f:'ꜰ',g:'ɢ',h:'ʜ',i:'ɪ',j:'ᴊ',k:'ᴋ',l:'ʟ',m:'ᴍ',n:'ɴ',o:'ᴏ',p:'ᴘ',q:'ǫ',r:'ʀ',s:'ꜱ',t:'ᴛ',u:'ᴜ',v:'ᴠ',w:'ᴡ',x:'x',y:'ʏ',z:'ᴢ'};
  return [...t].map(c => m[c.toLowerCase()] || c).join('');
}

function invert(t) {
  const m = {'a':'ɐ','b':'q','c':'ɔ','d':'p','e':'ǝ','f':'ɟ','g':'ƃ','h':'ɥ','i':'ᴉ','j':'ɾ','k':'ʞ','l':'ʃ','m':'ɯ','n':'u','o':'o','p':'d','q':'b','r':'ɹ','s':'s','t':'ʇ','u':'n','v':'ʌ','w':'ʍ','x':'x','y':'ʎ','z':'z'};
  return [...t].map(c => m[c.toLowerCase()] || m[c] || c).join('');
}

function upsideDown(t) {
  const m = {'a':'ɐ','b':'q','c':'ɔ','d':'p','e':'ǝ','f':'ɟ','g':'ƃ','h':'ɥ','i':'ᴉ','j':'ɾ','k':'ʞ','l':'ʃ','m':'ɯ','n':'u','o':'o','p':'d','q':'b','r':'ɹ','s':'s','t':'ʇ','u':'n','v':'ʌ','w':'ʍ','x':'x','y':'ʎ','z':'z',',':'\'','.':'\u02D9','?':'¿','!':'¡','(':'⁽',')':'₎'};
  return [...t].toReversed().map(c => m[c.toLowerCase()] || m[c] || c).join('');
}

function mirror(t) {
  const m = {'a':'ɒ','b':'d','c':'Ↄ','d':'b','e':'ɘ','f':'Ꮈ','g':'ϱ','h':'ʜ','i':'i','j':'Ꭵ','k':'ʞ','l':'l','m':'m','n':'n','o':'ο','p':'q','q':'p','r':'ɿ','s':'ƨ','t':'ƚ','u':'u','v':'v','w':'w','x':'x','y':'ʏ','z':'ƹ'};
  return [...t].toReversed().map(c => m[c.toLowerCase()] || m[c] || c).join('');
}

// Mathematical alphanumeric symbols
const STYLED_RANGES = {
  BOLD_SERIF:         { start: 0x1D400, lower: false },
  BOLD_SANS:          { start: 0x1D5D4, lower: false },
  ITALIC_SERIF:       { start: 0x1D434, lower: false },
  ITALIC_SANS:        { start: 0x1D608, lower: false },
  BOLD_ITALIC_SERIF:  { start: 0x1D468, lower: false },
  SCRIPT:             { start: 0x1D49C, lower: false },
  BOLD_SCRIPT:        { start: 0x1D4D0, lower: false },
  FRAKTUR:            { start: 0x1D504, lower: false },
  BOLD_FRAKTUR:       { start: 0x1D56C, lower: false },
  DOUBLE_STRUCK:      { start: 0x1D538, lower: false },
};

function toStyle(t, style) {
  const cfg = STYLED_RANGES[style];
  if (!cfg) return t;
  let out = '';
  for (const c of t) {
    const cc = c.charCodeAt(0);
    if (cc >= 0x41 && cc <= 0x5A) out += String.fromCodePoint(cfg.start + (cc - 0x41));
    else if (cc >= 0x61 && cc <= 0x7A) out += String.fromCodePoint(cfg.start + 26 + (cc - 0x61));
    else if (cc >= 0x30 && cc <= 0x39) out += String.fromCodePoint(cfg.start + (cc - 0x30) + (style==='DOUBLE_STRUCK'? 0 : (style==='SCRIPT'||style==='BOLD_SCRIPT'? - 0 : 0)));
    else out += c;
  }
  return out;
}

const { $, t } = GZ;

function render() {
  const text = $('#input').value;
  $('#grid').innerHTML = STYLES.map((s, i) =>
    `<div class="wv-row"><div class="name">${s.name}</div><div class="out" data-i="${i}"></div><button class="cp" data-i="${i}">${t('copy')}</button></div>`
  ).join('');
  STYLES.forEach((s, i) => {
    try { $$('.wv-row .out[data-i="'+i+'"]')[0].textContent = s.fn(text); } catch(e) {}
  });
  $$('.wv-row .cp').forEach(btn => btn.addEventListener('click', () => {
    const out = $$('.wv-row .out[data-i="'+btn.dataset.i+'"]')[0].textContent;
    GZ.copyText(out);
  }));
}

$('#input').addEventListener('input', render);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='Hello';render()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';render()">${t('clear')}</button>`;

$('#input').value = 'Hello World';
render();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✨', href:'/text/fancy-text.html', name:'Fancy Text'},
    {icon:'🆔', href:'/text/username-generator.html', name:'Username Generator'},
    {icon:'🔁', href:'/text/flip-text.html', name:'Flip Text'},
  ]
});
</script>
