<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is future value (FV)?", "acceptedAnswer": {"@type": "Answer", "text": "Future value is what a present sum of money (or a series of contributions) will be worth at a specific date in the future, given an assumed interest or growth rate and compounding frequency. The formula is FV = PV × (1 + r/n)^(n·t) for a lump sum."}}, {"@type": "Question", "name": "How does compounding frequency affect FV?", "acceptedAnswer": {"@type": "Answer", "text": "The more often interest is compounded, the faster your money grows. Monthly compounding produces more interest than annual compounding at the same nominal rate, because interest is earned on interest more frequently."}}, {"@type": "Question", "name": "Does this calculator include inflation?", "acceptedAnswer": {"@type": "Answer", "text": "Optional. Toggle inflation on to see both the nominal future value and the real (inflation-adjusted) value in today's purchasing power. The default rate is 3% per year, which is a long-term average for many economies."}}, {"@type": "Question", "name": "Can I model regular monthly contributions?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Enter a recurring contribution (PMT) and choose whether you contribute at the beginning or end of each period. The calculator combines the lump-sum growth with the future value of the annuity."}}]}</script>

        <div class="fv-field">

        </div>
        <div class="fv-field">

            <option value="12" id="opt-comp-month"></option>

        <div class="fv-result-row"><span class="lbl" id="lbl-contrib-total"></span><span class="val" id="r-contrib">$0</span></div>
        <div class="fv-result-row"><span class="lbl" id="lbl-invested"></span><span class="val" id="r-invested">$0</span></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Future Value Calculator',
    toolDesc: 'Calculate the future value of an investment or savings with regular contributions and compound interest. Supports monthly, quarterly and annual compounding, plus optional inflation adjustment. Free, private, runs in your browser.',
    lblPv: 'Starting amount (present value)',
    lblPmt: 'Regular contribution',
    lblPmtFreq: 'Contribution frequency',
    lblRate: 'Annual interest rate (%)',
    lblYears: 'Number of years',
    lblCompound: 'Compounding frequency',
    optMonth: 'Monthly (12×/year)',
    optQuarter: 'Quarterly (4×/year)',
    optYear: 'Annually (1×/year)',
    optCompMonth: 'Monthly',
    optCompQuarter: 'Quarterly',
    optCompYear: 'Annually',
    optCompDay: 'Daily',
    lblInflationToggle: 'Adjust for inflation',
    lblPmtWhen: 'Contribute at start of period',
    lblInflationRate: 'Expected inflation rate (%)',
    btnCalc: 'Calculate',
    btnReset: 'Reset',
    lblFvHero: 'Future value',
    fvRealSub: 'real value (today\'s dollars): $0',
    lblStart: 'Starting principal',
    lblContribTotal: 'Total contributions',
    lblInvested: 'Total amount invested',
    lblInterest: 'Total interest earned',
    lblReal: 'Inflation-adjusted value',
    step1: 'Enter your starting amount (or 0 if none)',
    step2: 'Add a regular contribution and pick how often you contribute',
    step3: 'Set the annual interest/growth rate and number of years',
    step4: 'Optionally toggle inflation to see real purchasing power',
    errNeg: 'Please enter non-negative numbers only.',
  },
  zh: {
    toolTitle: '未来价值计算器（复利）',
    toolDesc: '计算投资或储蓄的未来价值，支持定期供款和复利计息。支持按月、按季、按年复利，可选通胀调整。免费、私密、浏览器本地运行。',
    lblPv: '初始金额（现值）',
    lblPmt: '定期供款',
    lblPmtFreq: '供款频率',
    lblRate: '年利率（%）',
    lblYears: '年数',
    lblCompound: '复利频率',
    optMonth: '按月（每年 12 次）',
    optQuarter: '按季（每年 4 次）',
    optYear: '按年（每年 1 次）',
    optCompMonth: '按月',
    optCompQuarter: '按季',
    optCompYear: '按年',
    optCompDay: '按日',
    lblInflationToggle: '调整通胀',
    lblPmtWhen: '期初供款',
    lblInflationRate: '预期通胀率（%）',
    btnCalc: '计算',
    btnReset: '重置',
    lblFvHero: '未来价值',
    fvRealSub: '实际价值（今日购买力）：$0',
    lblStart: '初始本金',
    lblContribTotal: '累计供款',
    lblInvested: '累计投入总额',
    lblInterest: '累计利息收入',
    lblReal: '通胀调整后价值',
    step1: '输入初始金额（无则填 0）',
    step2: '添加定期供款并选择供款频率',
    step3: '设置年利率/增长率和年数',
    step4: '可选启用通胀调整查看实际购买力',
    errNeg: '请仅输入非负数。',
  }
});

const { $, t } = GZ;

function money(n) {
  if (!isFinite(n)) n = 0;
  return '$' + n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
}

$('#lbl-pv').textContent = t('lblPv');
$('#lbl-pmt').textContent = t('lblPmt');
$('#lbl-pmt-freq').textContent = t('lblPmtFreq');
$('#lbl-rate').textContent = t('lblRate');
$('#lbl-years').textContent = t('lblYears');
$('#lbl-compound').textContent = t('lblCompound');
$('#opt-month').textContent = t('optMonth');
$('#opt-quarter').textContent = t('optQuarter');
$('#opt-year').textContent = t('optYear');
$('#opt-comp-month').textContent = t('optCompMonth');
$('#opt-comp-quarter').textContent = t('optCompQuarter');
$('#opt-comp-year').textContent = t('optCompYear');
$('#opt-comp-day').textContent = t('optCompDay');
$('#lbl-inflation-toggle').textContent = t('lblInflationToggle');
$('#lbl-pmt-when').textContent = t('lblPmtWhen');
$('#lbl-inflation-rate').textContent = t('lblInflationRate');
$('#btn-calc').textContent = t('btnCalc');
$('#btn-reset').textContent = t('btnReset');
$('#lbl-fv-hero').textContent = t('lblFvHero');
$('#lbl-start').textContent = t('lblStart');
$('#lbl-contrib-total').textContent = t('lblContribTotal');
$('#lbl-invested').textContent = t('lblInvested');
$('#lbl-interest').textContent = t('lblInterest');
$('#lbl-real').textContent = t('lblReal');

$('#inflation-on').addEventListener('change', () => {
  $('#inflation-field').style.display = $('#inflation-on').checked ? '' : 'none';
});

function calculate() {
  const pv = parseFloat($('#pv').value) || 0;
  const pmt = parseFloat($('#pmt').value) || 0;
  const pmtFreq = parseInt($('#pmt-freq').value) || 12;
  const ratePct = parseFloat($('#rate').value) || 0;
  const years = parseFloat($('#years').value) || 0;
  const compN = parseInt($('#compound').value) || 12;
  const inflPct = parseFloat($('#inflation').value) || 0;
  const useInfl = $('#inflation-on').checked;
  const pmtBegin = $('#pmt-begin').checked;

  $('#err').textContent = '';
  if (pv < 0 || pmt < 0 || ratePct < 0 || years < 0 || inflPct < 0) {
    $('#err').textContent = t('errNeg');
    return;
  }

  // Periodic interest rate aligned to compounding
  const i = ratePct / 100 / compN;
  const nPeriods = compN * years;

  // Future value of present lump sum: PV * (1+i)^n
  const fvPV = pv * Math.pow(1 + i, nPeriods);

  // Future value of annuity (regular contributions)
  // First convert pmt to the compounding period frequency:
  //   if pmt is per month and comp is monthly, pmtPerPeriod = pmt
  //   if pmt is per year and comp is monthly, pmtPerPeriod = pmt/12
  const pmtPerPeriod = pmt * (pmtFreq / compN);

  let fvPMT = 0;
  if (i === 0) {
    fvPMT = pmtPerPeriod * nPeriods * (pmtBegin ? 1 : 1);
  } else {
    const annuity = ((Math.pow(1 + i, nPeriods) - 1) / i);
    fvPMT = pmtPerPeriod * annuity * (pmtBegin ? (1 + i) : 1);
  }

  const fvNominal = fvPV + fvPMT;
  const totalContrib = pmt * pmtFreq * years;
  const totalInvested = pv + totalContrib;
  const interest = fvNominal - totalInvested;

  // Real value adjusted for inflation
  const inflRate = inflPct / 100;
  const fvReal = useInfl ? fvNominal / Math.pow(1 + inflRate, years) : fvNominal;

  $('#fv-nominal').textContent = money(fvNominal);
  $('#fv-real-sub').textContent = useInfl
    ? t('fvRealSub').replace('$0', money(fvReal))
    : '';
  $('#r-start').textContent = money(pv);
  $('#r-contrib').textContent = money(totalContrib);
  $('#r-invested').textContent = money(totalInvested);
  $('#r-interest').textContent = money(interest);
  $('#r-real').textContent = useInfl ? money(fvReal) : '—';
}

function reset() {
  $('#pv').value = '10000';
  $('#pmt').value = '200';
  $('#rate').value = '7';
  $('#years').value = '20';
  $('#inflation').value = '3';
  $('#pmt-freq').value = '12';
  $('#compound').value = '12';
  $('#inflation-on').checked = true;
  $('#pmt-begin').checked = false;
  $('#inflation-field').style.display = '';
  calculate();
}

$('#btn-calc').addEventListener('click', calculate);
$('#btn-reset').addEventListener('click', reset);
['pv','pmt','pmt-freq','rate','years','compound','inflation'].forEach(id => {
  $('#' + id).addEventListener('input', calculate);
  $('#' + id).addEventListener('change', calculate);
});
$('#inflation-on').addEventListener('change', calculate);
$('#pmt-begin').addEventListener('change', calculate);

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/compound-interest-calculator.html', name:'Compound Interest'},
    {icon:'🏡', href:'/calc/mortgage-calculator.html', name:'Mortgage'},
    {icon:'💵', href:'/calc/salary-calculator.html', name:'Salary Calculator'},
    
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
