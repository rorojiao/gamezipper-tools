const { $, t, copyText } = GZ;
let currentFile = null, outBlob = null;

function scorePassword(pwd) {
  if (!pwd) return 0;
  let s = 0;
  if (pwd.length >= 6) s += 1;
  if (pwd.length >= 10) s += 1;
  if (/[A-Z]/.test(pwd)) s += 1;
  if (/[0-9]/.test(pwd)) s += 1;
  if (/[^A-Za-z0-9]/.test(pwd)) s += 1;
  return s; // 0..5
}
function renderMeter(elId, pwd) {
  const s = scorePassword(pwd);
  const w = Math.min(100, s * 20);
  const colors = ['#e94560','#ff7043','#fdd835','#66bb6a','#4ecdc4'];
  const labels = [t('pwdWeak'), t('pwdFair'), t('pwdGood'), t('pwdStrong'), t('pwdStrong')];
  const el = $('#' + elId);
  el.style.width = w + '%';
  el.style.background = colors[Math.min(colors.length - 1, s - 1)] || colors[0];
  if (pwd && s > 0) {
    el.title = labels[Math.min(labels.length - 1, s - 1)] + ' (' + s + '/5)';
  } else { el.title = ''; }
}

$('#dropLabel').textContent = t('chooseFile');
$('#dropInfo').textContent = t('info');
$('#lblUser').textContent = t('userPwd').split(' (')[0];
$('#lblOwner').textContent = t('ownerPwd').split(' (')[0];
$('#userPwd').placeholder = '••••••••';
$('#ownerPwd').placeholder = '••••••••';
$('#lblPerms').textContent = t('perms');
$('#lblPrinting').textContent = t('printing');
$('#lblModifying').textContent = t('modifying');
$('#lblCopying').textContent = t('copying');
$('#lblAnnotating').textContent = t('annotating');
$('#userHint').textContent = t('userHint');
$('#ownerHint').textContent = t('ownerHint');

$('#userPwd').addEventListener('input', e => renderMeter('userMeter', e.target.value));
$('#ownerPwd').addEventListener('input', e => renderMeter('ownerMeter', e.target.value));

const drop = $('#drop');
drop.addEventListener('click', () => $('#file').click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('dragover'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
$('#file').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(f) {
  if (!f || f.type !== 'application/pdf') { $('#status').innerHTML = `<span style="color:var(--accent)">${t('noFile')}</span>`; return; }
  currentFile = f;
  outBlob = null;
  drop.querySelector('.icon').textContent = '📄';
  $('#dropLabel').textContent = f.name;
  $('#dropInfo').textContent = (f.size / 1024).toFixed(1) + ' KB · ' + t('chooseFile');
  $('#status').innerHTML = '';
}

async function protectPDF() {
  if (!currentFile) { $('#status').innerHTML = `<span style="color:var(--accent)">${t('noFile')}</span>`; return; }
  const userPwd = $('#userPwd').value;
  const ownerPwd = $('#ownerPwd').value || userPwd;
  if (!userPwd) { $('#status').innerHTML = `<span style="color:var(--accent)">${t('noPwd')}</span>`; return; }
  if (userPwd.length < 6) { $('#status').innerHTML = `<span style="color:var(--accent)">${t('shortPwd')}</span>`; return; }

  $('#status').innerHTML = `<span style="opacity:.7">${t('downloading')}</span>`;
  try {
    const bytes = await currentFile.arrayBuffer();
    const doc = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption: true }).catch(async () => PDFLib.PDFDocument.load(bytes));
    // Permissions: in pdf-lib, ownerPermissions object controls what is allowed.
    // We need to mark which are blocked — by default all allowed. Set flag for blocked ones.
    const perms = {};
    if (!$('#permPrinting').checked) perms.printing = false;
    if (!$('#permModifying').checked) perms.modifying = false;
    if (!$('#permCopying').checked) perms.copying = false;
    if (!$('#permAnnotating').checked) perms.annotating = false;
    const out = await doc.save({
      userPassword: userPwd,
      ownerPassword: ownerPwd,
      permissions: perms
    });
    outBlob = new Blob([out], { type: 'application/pdf' });
    const fname = currentFile.name.replace(/\.pdf$/i, '') + '-protected.pdf';
    const a = document.createElement('a');
    a.href = URL.createObjectURL(outBlob);
    a.download = fname;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('success')}</span> <button class="gz-btn gz-btn-secondary" style="margin-left:8px" onclick="document.getElementById('status').querySelector('a')?.click()">${t('download')}</button>`;
    // Also re-offer a direct download link in status
    const dl = document.createElement('a');
    dl.href = URL.createObjectURL(outBlob);
    dl.download = fname;
    dl.textContent = fname;
    dl.style.marginLeft = '8px';
    dl.style.color = 'var(--accent)';
    dl.style.textDecoration = 'underline';
    $('#status').appendChild(dl);
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--accent)">${t('error')}${e.message}</span>`;
  }
}

function clearAll() {
  currentFile = null; outBlob = null;
  $('#file').value = '';
  drop.querySelector('.icon').textContent = '🔒';
  $('#dropLabel').textContent = t('chooseFile');
  $('#dropInfo').textContent = t('info');
  $('#userPwd').value = ''; $('#ownerPwd').value = '';
  renderMeter('userMeter', ''); renderMeter('ownerMeter', '');
  $('#status').innerHTML = '';
  $('#permPrinting').checked = true; $('#permModifying').checked = false;
  $('#permCopying').checked = false; $('#permAnnotating').checked = true;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="protectPDF()">${t('protect')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>
`;
