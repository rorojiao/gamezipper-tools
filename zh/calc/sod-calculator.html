<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How much sod do I need for my lawn?", "acceptedAnswer": {"@type": "Answer", "text": "Measure the lawn area in square feet and add 5–10% for waste and trimming. One pallet of sod typically covers 450 square feet (50 square yards) and contains about 165 slabs or 60 mini-rolls. Use the calculator to convert your area into rolls, slabs and pallets automatically."}}, {"@type": "Question", "name": "How many square feet is a pallet of sod?", "acceptedAnswer": {"@type": "Answer", "text": "A standard US pallet of sod covers 450 sq ft (50 sq yd) and holds about 165 pieces (slabs) or 60 mini-rolls. Big rolls cover 360–500 sq ft each. UK pallets usually cover about 60 m² (around 650 sq ft)."}}, {"@type": "Question", "name": "What size is a single piece of sod?", "acceptedAnswer": {"@type": "Answer", "text": "A standard US slab measures 16 x 24 in (2.67 sq ft). Mini-rolls are typically 12 x 60 in (5 sq ft) or 18 x 72 in (9 sq ft). The default in this calculator is the 16 x 24 in slab — change it to match what your supplier delivers."}}, {"@type": "Question", "name": "How much extra sod should I order?", "acceptedAnswer": {"@type": "Answer", "text": "Order 5% extra for simple rectangular lawns and 10–15% extra for irregular shapes, slopes, curves and around trees or beds. The default wastage in this tool is 10%, which is a safe choice for most lawns."}}]}</script>

        <div><label id="lbl-unit2"></label>
          <select id="unit2"><option value="ft">ft</option><option value="m">m</option></select>
        </div>

    </div>
    <div class="sc-form" style="grid-template-columns:1fr 1fr 1fr 1fr;max-width:640px">
      <div><label id="lbl-slab"></label><input type="number" id="slabArea" value="2.67" min="0" step="0.01"></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Sod Calculator',
    toolDesc: 'Find out exactly how many sod rolls, slabs and pallets your lawn needs. Supports rectangular lawns, multi-shape lawns (rectangle, circle, triangle) and price-per-pallet cost estimates.',
    modeSingle: 'Single Rectangle',
    modeMulti: 'Multi-Shape Lawn',
    lblLen: 'Length',
    lblWid: 'Width',
    lblUnit: 'Unit',
    lblWaste: 'Wastage',
    lblWaste2: 'Wastage',
    lblUnit2: 'Unit',
    lblSlab: 'Slab area (ft²)',
    lblPallet: 'Pallet coverage (ft²)',
    lblPpsf: 'Price per ft²',
    lblPpallet: 'Price per pallet',
    bigResult: 'ft² lawn',
    tileBaseArea: 'Lawn area',
    tileWithWaste: 'With waste',
    tileSlabs: 'Slabs / pieces',
    tileRolls: 'Mini-rolls (5 ft²)',
    tilePallets: 'Pallets',
    tileCost: 'Total cost',
    costLbl: 'Estimated cost',
    rect: 'Rectangle (L × W)',
    circle: 'Circle (radius)',
    triangle: 'Triangle (b × h ÷ 2)',
    step1: 'Pick Single Rectangle for one lawn area, or Multi-Shape for a lawn made up of several shapes.',
    step2: 'Enter the dimensions of each area in feet or meters.',
    step3: 'Adjust the wastage — 5% for simple lawns, 10–15% for curves and irregular edges.',
    step4: 'Set the slab/pallet coverage and prices to match your supplier for an instant cost estimate.',
  },
  zh: {
    toolTitle: '草坪（草皮）计算器',
    toolDesc: '精确计算你的草坪需要多少卷/块草皮和托盘。支持矩形草坪、多形状组合草坪（矩形、圆形、三角形）以及每托盘价格估算。',
    modeSingle: '单块矩形',
    modeMulti: '多形状组合',
    lblLen: '长度',
    lblWid: '宽度',
    lblUnit: '单位',
    lblWaste: '损耗率',
    lblWaste2: '损耗率',
    lblUnit2: '单位',
    lblSlab: '单块面积（ft²）',
    lblPallet: '每托盘覆盖（ft²）',
    lblPpsf: '每 ft² 单价',
    lblPpallet: '每托盘单价',
    bigResult: 'ft² 草坪',
    tileBaseArea: '草坪面积',
    tileWithWaste: '含损耗',
    tileSlabs: '草皮块数',
    tileRolls: '小卷（5 ft²）',
    tilePallets: '托盘数',
    tileCost: '总成本',
    costLbl: '估算成本',
    rect: '矩形（长 × 宽）',
    circle: '圆形（半径）',
    triangle: '三角形（底 × 高 ÷ 2）',
    step1: '单块矩形适合单一草坪区域；多形状组合适合由多个区域组成的草坪。',
    step2: '输入每个区域的尺寸（英尺或米）。',
    step3: '调整损耗率 — 简单草坪 5%，曲线或不规则边缘建议 10–15%。',
    step4: '设置单块/托盘覆盖面积和单价，匹配供应商即可获得即时成本估算。',
  }
});

const { $, t } = GZ;

const LEN_TO_FT = { ft: 1, m: 3.28084 };

let currentMode = 'single';

// Multi-shape lawn: array of {type, a, b}
let shapes = [
  { type: 'rect', a: 40, b: 30 },
  { type: 'circle', a: 8, b: 0 },
  { type: 'triangle', a: 10, b: 6 },
];

function renderShapes(){
  const labels = { rect: t('rect'), circle: t('circle'), triangle: t('triangle') };
  $('#shapes').innerHTML = shapes.map((s,i) => {
    const types = ['rect','circle','triangle'];
    return `<div class="sc-shape">
      <h4>${t('rect').split(' ')[0]} ${i+1} — <select onchange="setType(${i}, this.value)">
        ${types.map(tp => `<option value="${tp}" ${s.type===tp?'selected':''}>${labels[tp]}</option>`).join('')}
      </select></h4>
      <div class="shp">${s.type==='rect'?'⬛':s.type==='circle'?'⭕':'🔺'}</div>
      <input type="number" value="${s.a}" step="0.1" oninput="setVal(${i},'a',this.value)" placeholder="${s.type==='circle'?'radius':'a / base'}">
      ${s.type!=='circle' ? `<input type="number" value="${s.b}" step="0.1" oninput="setVal(${i},'b',this.value)" placeholder="b / height">` : ''}
      <button class="gz-btn gz-btn-secondary" style="font-size:.78em;padding:4px 8px" onclick="removeShape(${i})">×</button>
    </div>`;
  }).join('') + `<div class="sc-shape" style="justify-content:center;align-items:center;cursor:pointer;border-style:dashed" onclick="addShape()"><div style="font-size:2em;color:var(--accent)">＋</div><div style="font-size:.8em;color:var(--text2)">Add shape</div></div>`;
}
window.setType = function(i, v){ shapes[i].type = v; if (v==='circle') shapes[i].b = 0; renderShapes(); calc(); };
window.setVal = function(i, k, v){ shapes[i][k] = parseFloat(v) || 0; calc(); };
window.removeShape = function(i){ shapes.splice(i,1); renderShapes(); calc(); };
window.addShape = function(){ shapes.push({ type:'rect', a:20, b:15 }); renderShapes(); calc(); };

function shapeArea(s, unit){
  const ft = LEN_TO_FT[unit];
  const a = s.a * ft, b = s.b * ft;
  if (s.type === 'rect') return a * b;
  if (s.type === 'circle') return Math.PI * a * a;
  if (s.type === 'triangle') return (a * b) / 2;
  return 0;
}

function calc(){
  let baseArea = 0;
  let unit;
  let wastePct;
  if (currentMode === 'single') {
    const len = parseFloat($('#len').value) || 0;
    const wid = parseFloat($('#wid').value) || 0;
    unit = $('#unit').value;
    wastePct = parseFloat($('#waste').value) || 0;
    baseArea = len * wid * Math.pow(LEN_TO_FT[unit], 2);
  } else {
    unit = $('#unit2').value;
    wastePct = parseFloat($('#waste2').value) || 0;
    baseArea = shapes.reduce((sum, s) => sum + shapeArea(s, unit), 0);
  }

  const slabArea = parseFloat($('#slabArea').value) || 0;
  const palletArea = parseFloat($('#palletArea').value) || 0;
  const ppsf = parseFloat($('#ppsf').value) || 0;
  const ppallet = parseFloat($('#ppallet').value) || 0;

  if (baseArea <= 0) {
    $('#bigResult').textContent = '—';
    $('#subResult').textContent = '';
    $('#grid').innerHTML = '';
    $('#costOut').textContent = '';
    return;
  }

  const withWaste = baseArea * (1 + wastePct / 100);
  const slabs = slabArea > 0 ? Math.ceil(withWaste / slabArea) : 0;
  const rolls = Math.ceil(withWaste / 5); // mini-rolls are ~5 ft²
  const pallets = palletArea > 0 ? Math.ceil(withWaste / palletArea) : 0;
  const costBySf = withWaste * ppsf;
  const costByPallet = pallets * ppallet;
  const cost = Math.max(costBySf, costByPallet);

  $('#bigResult').textContent = Math.round(withWaste).toLocaleString();
  $('#subResult').textContent = t('bigResult');

  const tiles = [
    { num: Math.round(baseArea).toLocaleString() + ' ft²', lbl: t('tileBaseArea') },
    { num: Math.round(withWaste).toLocaleString() + ' ft²', lbl: t('tileWithWaste') },
    { num: slabs.toLocaleString(), lbl: t('tileSlabs') },
    { num: rolls.toLocaleString(), lbl: t('tileRolls') },
    { num: pallets.toLocaleString(), lbl: t('tilePallets') },
    { num: '$' + cost.toLocaleString(undefined,{maximumFractionDigits:0}), lbl: t('tileCost') },
  ];
  $('#grid').innerHTML = tiles.map(x => `<div class="sc-tile"><div class="num">${x.num}</div><div class="lbl">${x.lbl}</div></div>`).join('');
  $('#costOut').textContent = '$' + cost.toLocaleString(undefined,{maximumFractionDigits:0});
}

function setMode(m){
  currentMode = m;
  $('#modeSingle').classList.toggle('active', m === 'single');
  $('#modeMulti').classList.toggle('active', m === 'multi');
  $('#singleArea').style.display = m === 'single' ? '' : 'none';
  $('#multiArea').style.display = m === 'multi' ? '' : 'none';
  if (m === 'multi') renderShapes();
  calc();
}
$('#modeSingle').addEventListener('click', () => setMode('single'));
$('#modeMulti').addEventListener('click', () => setMode('multi'));

['len','wid','unit','waste','waste2','unit2','slabArea','palletArea','ppsf','ppallet'].forEach(id => {
  $('#'+id).addEventListener('input', calc);
  $('#'+id).addEventListener('change', calc);
});

function init(){
  $('#modeSingle').textContent = t('modeSingle');
  $('#modeMulti').textContent = t('modeMulti');
  $('#lbl-len').textContent = t('lblLen');
  $('#lbl-wid').textContent = t('lblWid');
  $('#lbl-unit').textContent = t('lblUnit');
  $('#lbl-waste').textContent = t('lblWaste');
  $('#lbl-waste2').textContent = t('lblWaste2');
  $('#lbl-unit2').textContent = t('lblUnit2');
  $('#lbl-slab').textContent = t('lblSlab');
  $('#lbl-pallet').textContent = t('lblPallet');
  $('#lbl-ppsf').textContent = t('lblPpsf');
  $('#lbl-ppallet').textContent = t('lblPpallet');
  $('#costLbl').textContent = t('costLbl');
  calc();
}

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌿', href:'/calc/mulch-calculator.html', name:'Mulch Calc'},
    {icon:'🪴', href:'/calc/plant-watering.html', name:'Plant Watering'},
    {icon:'📐', href:'/calc/square-footage.html', name:'Square Footage'},
    {icon:'💧', href:'/calc/water-intake.html', name:'Water Intake'},
  ]
});
init();
</script>
