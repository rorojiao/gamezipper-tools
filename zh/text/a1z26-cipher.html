const { $, copyText, t } = GZ;
let mode = 'encode', sep = '-';

function encodeA1Z26(text, sep) {
  return [...text].map(ch => {
    const c = ch.toUpperCase();
    const code = c.charCodeAt(0);
    if (code >= 65 && code <= 90) return String(code - 64);
    return ch;
  }).join(sep);
}

function decodeA1Z26(text) {
  return text.replace(/\d+/g, m => {
    const n = parseInt(m, 10);
    if (n >= 1 && n <= 26) return String.fromCharCode(64 + n);
    return m; // pass through out-of-range
  }).replace(/[\s,;|]+/g, m => {
    // collapse separators to spaces for readability
    return m.includes('\n') ? '\n' : ' ';
  }).replace(/-+/g, ' ');
}

function update() {
  const txt = $('#input').value;
  $('#output').textContent = mode === 'encode' ? encodeA1Z26(txt, sep) : decodeA1Z26(txt);
}

function loadExample() {
  $('#input').value = mode === 'encode' ? 'HELLO WORLD' : '8-5-12-12-15 23-15-18-12-4';
  update();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; }

$('#input').addEventListener('input', update);

$('#toolbar').innerHTML = `
