<script>
GZI18n.register({
  en: {
    toolTitle: 'Random MAC Address Generator',
    toolDesc: 'Generate random MAC addresses for testing and network simulation. Locally-administered, universal, custom OUI and bulk export.',
    gen: 'Generate',
    copy: 'Copy All',
    clear: 'Clear',
    uppercase: 'Uppercase',
    locally: 'Locally administered (safe)',
    ouiLabel: 'Custom OUI (first 3 octets):',
    ouiPlaceholder: 'e.g. 00:1A:2B',
    count: 'Count:',
    sepLabel: 'Separator:',
    generated: 'Generated',
    none: 'Click Generate to create MAC addresses',
    step1: 'Pick the format: locally administered or universal',
    step2: 'Optionally set a custom OUI and choose a separator',
    step3: 'Enter how many addresses you need and click Generate',
    step4: 'Use Copy All to grab every MAC as plain text',
  },
  zh: {
    toolTitle: '随机 MAC 地址生成器',
    toolDesc: '为测试和网络模拟生成随机 MAC 地址。支持本地管理、通用、自定义 OUI 和批量导出。',
    gen: '生成',
    copy: '全部复制',
    clear: '清空',
    uppercase: '大写',
    locally: '本地管理（安全）',
    ouiLabel: '自定义 OUI（前 3 段）：',
    ouiPlaceholder: '如 00:1A:2B',
    count: '数量：',
    sepLabel: '分隔符：',
    generated: '已生成',
    none: '点击「生成」创建 MAC 地址',
    step1: '选择格式：本地管理或通用',
    step2: '可选设置自定义 OUI 和分隔符',
    step3: '输入需要的数量并点击「生成」',
    step4: '使用「全部复制」将所有 MAC 作为纯文本复制',
  }
});

const { $, copyText, t } = GZ;
let sep = ':';

function rndOctet(){ return Math.floor(Math.random()*256); }

function genOne(local, ouiArr){
  let octs;
  if(ouiArr && ouiArr.length===3){
    octs = ouiArr.slice();
    while(octs.length<6) octs.push(rndOctet());
  } else {
    octs = [];
    for(let i=0;i<6;i++) octs.push(rndOctet());
    if(local) octs[0] = (octs[0] & 0xFE) | 0x02;  // set locally-administered bit, clear multicast
  }
  return octs;
}

function parseOUI(str){
  if(!str) return null;
  const parts = str.split(/[:\- ]|([0-9a-fA-F]{2})/).filter(x=>x && /^[0-9a-fA-F]{2}$/.test(x));
  if(parts.length<3) return null;
  return parts.slice(0,3).map(p=>parseInt(p,16));
}

function formatMac(octs, sep, upper){
  let s = octs.map(o=>o.toString(16).padStart(2,'0')).join(sep);
  return upper ? s.toUpperCase() : s;
}

function generate(){
  const local = $('#opt-local').checked;
  const upper = $('#opt-upper').checked;
  sep = $('#sep').value || ':';
  let count = parseInt($('#count').value)||1;
  if(count>1000) count=1000;
  if(count<1) count=1;
  const oui = parseOUI($('#oui').value.trim());
  if($('#oui').value.trim() && !oui){ $('#output').innerHTML = `<span style="color:var(--gz-accent)">${t('ouiPlaceholder')}</span>`; return; }
  const results = [];
  for(let i=0;i<count;i++) results.push(formatMac(genOne(local,oui),sep,upper));
  $('#output').innerHTML = `<div style="opacity:.7;font-size:.82em;margin-bottom:6px">${t('generated')}: ${results.length}</div>` + results.map(m=>`<div class="gz-row"><code>${m}</code><button class="gz-btn gz-btn-secondary" onclick="copyText('${m}')">${t('copy')}</button></div>`).join('');
  $('#output').dataset.text = results.join('\n');
}

function doClear(){ $('#output').innerHTML = `<div style="opacity:.6;text-align:center;padding:18px">${t('none')}</div>`; $('#output').dataset.text=''; }

function copyAll(){ const tx = $('#output').dataset.text; if(tx) copyText(tx); }

$('#opts').innerHTML = `
  <label><input type="checkbox" id="opt-local" checked> ${t('locally')}</label>
  <label><input type="checkbox" id="opt-upper"> ${t('uppercase')}</label>
  <label>${t('ouiLabel')}<input type="text" id="oui" placeholder="${t('ouiPlaceholder')}"></label>
  <label>${t('sepLabel')}<select id="sep" class="gz-select"><option value=":">:</option><option value="-">-</option><option value=".">.</option><option value="">none</option></select></label>
  <label>${t('count')}<input type="number" id="count" value="10" min="1" max="1000" style="width:80px"></label>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('gen')}</button>
  <button class="gz-btn" onclick="copyAll()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

doClear();

  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',

    {icon:'🔐', href:'/dev/base64.html', name:'Base64'},
  ]
});
</script>
