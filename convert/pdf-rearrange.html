<script>
GZI18n.register({
  en: {
    toolTitle: 'Reorder PDF Pages',
    toolDesc: 'Rearrange PDF page order by dragging thumbnails or using arrow buttons. Reverse the whole document in one click. Free, private, lossless — runs in your browser.',
    dropText: 'Click or drop a PDF file here',
    pages: 'pages',
    download: 'Download Reordered PDF',
    reset: 'Reset Order',
    reverse: '↺ Reverse All',
    loading: 'Loading PDF…',
    noFile: 'Please select a PDF file first.',
    done: 'Done! Download started.',
    dragHint: 'Tip: drag thumbnails to reorder',
    step1: 'Click the drop zone or drag a PDF file onto it',
    step2: 'Drag page thumbnails to rearrange, or use the ◀ ▶ arrows',
    step3: 'Click Reverse to flip the entire page order',
    step4: 'Click Download to save the reordered PDF',
  },
  zh: {
    toolTitle: 'PDF 页面重排',
    toolDesc: '拖拽缩略图或使用箭头按钮重新排列 PDF 页面顺序。一键反转整篇文档。免费、私密、无损 — 浏览器本地运行。',
    dropText: '点击或拖拽 PDF 文件到此处',
    pages: '页',
    download: '下载重排后的 PDF',
    reset: '恢复原序',
    reverse: '↺ 全部反转',
    loading: '正在加载 PDF…',
    noFile: '请先选择一个 PDF 文件。',
    done: '完成！下载已开始。',
    dragHint: '提示：拖拽缩略图可重新排序',
    step1: '点击拖放区或将 PDF 文件拖入',
    step2: '拖拽页面缩略图重排，或使用 ◀ ▶ 箭头按钮',
    step3: '点击反转按钮翻转全部页面顺序',
    step4: '点击下载保存重排后的 PDF',
  }
});

const { $, $$, t } = GZ;
let pdfBytes = null;
let order = []; // current page index order
let originalCount = 0;

const dz = $('#dropzone');
dz.addEventListener('click', () => $('#file-input').click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', async e => {
  e.preventDefault(); dz.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) loadPDF(file);
});
$('#file-input').addEventListener('change', e => {
  if (e.target.files[0]) loadPDF(e.target.files[0]);
});

async function loadPDF(file) {
  $('#status').textContent = t('loading');
  try {
    pdfBytes = new Uint8Array(await file.arrayBuffer());
    const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
    originalCount = pdfDoc.getPageCount();
    order = Array.from({length: originalCount}, (_, i) => i);
    $('#pdf-info').innerHTML = `<strong>${file.name}</strong> — ${originalCount} ${t('pages')} — ${(file.size/1024).toFixed(0)} KB &nbsp; <span style="color:var(--text2)">(${t('dragHint')})</span>`;
    $('#upload-area').style.display = 'none';
    $('#editor-area').style.display = 'block';
    renderGlobalActions();
    renderGrid();
    $('#status').textContent = '';
  } catch(err) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error: ${err.message}</span>`;
  }
}

function renderGlobalActions() {
  $('#global-actions').innerHTML = `
    <button class="gz-btn gz-btn-secondary" onclick="reverseAll()">${t('reverse')}</button>
    <button class="gz-btn gz-btn-accent" onclick="downloadPDF()">${t('download')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="resetOrder()">${t('reset')}</button>`;
}

function resetOrder() {
  order = Array.from({length: originalCount}, (_, i) => i);
  renderGrid();
}

function reverseAll() {
  order.reverse();
  renderGrid();
}

function moveLeft(pos) {
  if (pos <= 0) return;
  [order[pos - 1], order[pos]] = [order[pos], order[pos - 1]];
  renderGrid();
}
function moveRight(pos) {
  if (pos >= order.length - 1) return;
  [order[pos + 1], order[pos]] = [order[pos], order[pos + 1]];
  renderGrid();
}

function renderGrid() {
  const grid = $('#page-grid');
  grid.innerHTML = '';
  order.forEach((origIdx, pos) => {
    const div = document.createElement('div');
    div.className = 'page-thumb';
    div.dataset.pos = pos;
    div.draggable = true;
    div.innerHTML = `
      <div class="pos-badge">${pos + 1}</div>
      <canvas width="120" height="160" style="background:#fff"></canvas>
      <div class="page-num">Page ${origIdx + 1}</div>
      <div class="move-controls">
        <button class="move-btn" onclick="event.stopPropagation();moveLeft(${pos})">◀</button>
        <button class="move-btn" onclick="event.stopPropagation();moveRight(${pos})">▶</button>
      </div>`;
    const canvas = div.querySelector('canvas');
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, 120, 160);
    ctx.fillStyle = '#ccc'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(`Page ${origIdx + 1}`, 60, 80);
    // drag events
    div.addEventListener('dragstart', e => { div.classList.add('dragging'); e.dataTransfer.setData('text/plain', String(pos)); });
    div.addEventListener('dragend', () => div.classList.remove('dragging'));
    div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('drag-over'); });
    div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
    div.addEventListener('drop', e => {
      e.preventDefault(); div.classList.remove('drag-over');
      const fromPos = parseInt(e.dataTransfer.getData('text/plain'));
      const toPos = parseInt(div.dataset.pos);
      if (fromPos === toPos || isNaN(fromPos)) return;
      const [moved] = order.splice(fromPos, 1);
      order.splice(toPos, 0, moved);
      renderGrid();
    });
    grid.appendChild(div);
  });
}

async function downloadPDF() {
  if (!pdfBytes) { $('#status').textContent = t('noFile'); return; }
  const srcDoc = await PDFLib.PDFDocument.load(pdfBytes);
  const outDoc = await PDFLib.PDFDocument.create();
  const copied = await outDoc.copyPages(srcDoc, order);
  copied.forEach(p => outDoc.addPage(p));
  const out = await outDoc.save();
  const blob = new Blob([out], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'reordered.pdf'; a.click();
  URL.revokeObjectURL(url);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${t('done')}</span>`;
}

$('#toolbar').innerHTML = '';

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',

    {icon:'📄', href:'/convert/pdf-splitter.html', name:'PDF Splitter'},
  ]
});
</script>
