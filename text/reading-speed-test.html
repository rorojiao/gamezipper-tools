<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a good reading speed?", "acceptedAnswer": {"@type": "Answer", "text": "The average adult reads at 200-300 WPM with good comprehension. Strong readers hit 300-500 WPM, while trained speed readers can reach 700+ WPM. Children in grade school typically read 100-200 WPM."}}, {"@type": "Question", "name": "How is reading speed calculated?", "acceptedAnswer": {"@type": "Answer", "text": "Reading speed is measured in words per minute (WPM). We count the total words in the passage and divide by the time from when you click Start to when you click Finished, then round to the nearest whole number."}}, {"@type": "Question", "name": "Why measure comprehension?", "acceptedAnswer": {"@type": "Answer", "text": "Speed without comprehension is useless. After the timed read we ask 3 short questions about the passage to verify you actually understood it. The combined score gives a more honest measure of effective reading speed."}}, {"@type": "Question", "name": "Is this reading test free and private?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The test is completely free, requires no signup, and runs entirely in your browser. No data is sent to any server — your results stay on your device."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px">
      <label id="lbl-level" style="font-size:.85rem;color:var(--text2);font-weight:600"></label>
      <select class="gz-select" id="level-select" style="width:auto">
        <option value="0">Easy</option>
        <option value="1" selected>Medium</option>
        <option value="2">Hard</option>
        <option value="3">Expert</option>
      </select>
      <span style="flex:1"></span>
      <button class="gz-btn" id="start-btn">▶ Start</button>
      <button class="gz-btn gz-btn-secondary" id="finish-btn" disabled>✓ Finished</button>
      <button class="gz-btn gz-btn-secondary" id="reset-btn">↺</button>
    </div>
    <div class="live-stats">
      <div><strong id="live-timer">0.0s</strong> <span id="lbl-time"></span></div>
      <div><strong id="live-wpm">—</strong> <span id="lbl-wpm2"></span></div>
      <div><strong id="live-words">0</strong> <span id="lbl-words2"></span></div>
    </div>
    <div id="reading-passage"></div>
    <div id="result-section" style="display:none">
      <div class="result-card">
        <div class="result-wpm" id="r-wpm">—</div>
        <div class="result-label" id="r-wpm-label">words / minute</div>
        <div class="result-meta">
          <div><strong id="r-time">—</strong><span id="lbl-r-time"></span></div>
          <div><strong id="r-comp">—</strong><span id="lbl-r-comp"></span></div>
          <div><strong id="r-level">—</strong><span id="lbl-r-level"></span></div>
        </div>
        <div style="margin-top:14px"><span class="rating" id="r-rating"></span></div>
      </div>
      <div id="comprehension-section" style="margin-top:14px">
        <h3 id="comp-title" style="margin-bottom:10px"></h3>
        <div id="comp-questions"></div>
        <button class="gz-btn" id="check-btn" style="margin-top:10px">Check Answers</button>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Reading Speed Test',
    toolDesc: 'Measure your reading speed in words per minute (WPM) with a built-in comprehension check.',
    level: 'Difficulty:',
    time: 'elapsed',
    wpm: 'WPM',
    words: 'words',
    compTitle: 'Comprehension Check',
    check: 'Check Answers',
    start: '▶ Start',
    finished: '✓ Finished',
    step1: 'Choose a difficulty level (Easy to Expert)',
    step2: 'Click Start — read the passage at your normal pace',
    step3: 'Click Finished the moment you reach the end',
    step4: 'Answer 3 quick questions to verify comprehension',
    rTime: 'read time',
    rComp: 'comprehension',
    rLevel: 'reading level',
    intro: 'Press Start to begin — the timer starts when you click and stops when you click Finished.',
    intro2: 'Reading…',
    intro3: 'Click Finished when you reach the end of the text.',
  },
  zh: {
    toolTitle: '阅读速度测试',
    toolDesc: '测量你的阅读速度（字/分钟 WPM），并附带理解测试验证。',
    level: '难度：',
    time: '已用时间',
    wpm: '字/分',
    words: '词数',
    compTitle: '理解测试',
    check: '检查答案',
    start: '▶ 开始',
    finished: '✓ 读完',
    step1: '选择难度等级（简单到专家）',
    step2: '点击「开始」，按你平时的速度阅读文章',
    step3: '读到末尾时立即点击「读完」',
    step4: '回答 3 道小题验证理解',
    rTime: '阅读用时',
    rComp: '理解率',
    rLevel: '阅读等级',
    intro: '按「开始」启动 — 计时器在你点击时启动，点击「读完」时停止。',
    intro2: '阅读中…',
    intro3: '读到文章末尾时请点击「读完」。',
  }
});

const { $, t } = GZ;

const PASSAGES = [
  {
    level: 'Easy',
    wordCount: 0, // computed
    text: "The little cat sat on the windowsill and watched the birds outside. The sun was warm and bright. She closed her eyes slowly and dreamed of chasing butterflies through a green meadow. Sometimes she heard the soft sound of cars passing by. Her owner walked into the room carrying a fresh bowl of food. The cat opened her eyes, jumped down, and ran to the kitchen happily.",
    questions: [
      { q: 'Where was the cat sitting?', a: ['On the windowsill','On the bed','On the floor','On the table'], correct: 0 },
      { q: 'What did the cat dream about?', a: ['Eating fish','Chasing butterflies','Sleeping','Playing with yarn'], correct: 1 },
      { q: 'What did the owner bring?', a: ['A toy','A blanket','A bowl of food','A book'], correct: 2 },
    ]
  },
  {
    level: 'Medium',
    wordCount: 0,
    text: "The coffee shop on the corner opens early in the morning before the rest of the city wakes up. The barista, an older woman named Marta, knows every regular customer by name and remembers exactly how each one takes their drink. She believes that a good cup of coffee is more than caffeine — it is a small ritual that starts the day with intention. Students come here to study, freelancers set up laptops in the corner booth, and elderly neighbors chat about politics and weather. The smell of fresh beans drifts into the street, drawing in curious passersby who eventually become regulars themselves.",
    questions: [
      { q: 'Who is Marta?', a: ['A customer','The barista','A student','The owner'], correct: 1 },
      { q: 'What does Marta believe about coffee?', a: ['It is just caffeine','It is a daily ritual','It should be cheap','It must be black'], correct: 1 },
      { q: 'Who studies at the coffee shop?', a: ['Tourists','Elderly neighbors','Students','Marta'], correct: 2 },
    ]
  },
  {
    level: 'Hard',
    wordCount: 0,
    text: "Photosynthesis is the biochemical process by which green plants, algae, and certain bacteria convert light energy into chemical energy stored in the bonds of glucose. The process occurs in two stages: the light-dependent reactions, which take place in the thylakoid membranes, and the Calvin cycle, which occurs in the stroma. During the light-dependent reactions, chlorophyll absorbs photons and uses that energy to split water molecules, releasing oxygen as a byproduct. The electrons travel through an electron transport chain, ultimately generating ATP and NADPH. These energy carriers then power the Calvin cycle, where carbon dioxide is fixed and reduced to form three-carbon sugars that the plant uses for growth.",
    questions: [
      { q: 'Where do the light-dependent reactions occur?', a: ['In the stroma','In the thylakoid membranes','In the nucleus','In the roots'], correct: 1 },
      { q: 'What is released as a byproduct when water is split?', a: ['Carbon dioxide','Nitrogen','Oxygen','Hydrogen peroxide'], correct: 2 },
      { q: 'What do ATP and NADPH power?', a: ['Cell division','The Calvin cycle','Water absorption','Photon emission'], correct: 1 },
    ]
  },
  {
    level: 'Expert',
    wordCount: 0,
    text: "Bayesian inference provides a principled framework for updating beliefs in the presence of new evidence. At its core sits Bayes' theorem, which relates the posterior probability of a hypothesis to its prior probability and the likelihood of observed data. The central philosophical shift from frequentist statistics is the treatment of probability as a measure of uncertainty about a parameter, rather than as a long-run frequency of events. This allows practitioners to incorporate prior knowledge — encoded as a probability distribution — directly into the analysis. Computational advances, particularly Markov chain Monte Carlo methods and variational inference, have made Bayesian approaches tractable for high-dimensional models that were previously infeasible. Critics argue that the choice of prior introduces subjectivity, but proponents counter that all statistical methods embed assumptions, and Bayesian methods simply make them explicit.",
    questions: [
      { q: 'How is probability treated in Bayesian inference?', a: ['As long-run frequency','As a measure of uncertainty','As a deterministic value','As a sample mean'], correct: 1 },
      { q: 'What computational method made high-dimensional Bayesian models tractable?', a: ['Linear regression','Markov chain Monte Carlo','Gradient descent','Fast Fourier Transform'], correct: 1 },
      { q: 'What do critics say about Bayesian priors?', a: ['They are too simple','They introduce subjectivity','They violate probability theory','They are unnecessary'], correct: 1 },
    ]
  },
];

let activeIdx = 1;
let startTime = null;
let timerInt = null;

function pickPassage() {
  activeIdx = parseInt($('#level-select').value, 10);
  const p = PASSAGES[activeIdx];
  if (!p.wordCount) p.wordCount = p.text.split(/\s+/).filter(w => w).length;
  return p;
}

function setupIntro() {
  $('#reading-passage').classList.remove('reading');
  $('#reading-passage').innerHTML = `<p style="text-align:center;color:var(--text2);font-style:italic">${t('intro')}</p>`;
  $('#live-timer').textContent = '0.0s';
  $('#live-wpm').textContent = '—';
  $('#live-words').textContent = '0';
  $('#result-section').style.display = 'none';
  $('#start-btn').disabled = false;
  $('#finish-btn').disabled = true;
  if (timerInt) { clearInterval(timerInt); timerInt = null; }
  startTime = null;
}

function start() {
  const p = pickPassage();
  $('#reading-passage').textContent = p.text;
  $('#reading-passage').classList.add('reading');
  $('#live-words').textContent = p.wordCount;
  startTime = performance.now();
  $('#start-btn').disabled = true;
  $('#finish-btn').disabled = false;
  $('#result-section').style.display = 'none';
  timerInt = setInterval(updateLive, 100);
}

function updateLive() {
  if (!startTime) return;
  const elapsed = (performance.now() - startTime) / 1000;
  $('#live-timer').textContent = elapsed.toFixed(1) + 's';
  const w = PASSAGES[activeIdx].wordCount;
  if (elapsed > 0.1) {
    const wpm = Math.round((w / elapsed) * 60);
    $('#live-wpm').textContent = wpm;
  }
}

function finish() {
  if (!startTime) return;
  if (timerInt) { clearInterval(timerInt); timerInt = null; }
  const elapsed = (performance.now() - startTime) / 1000;
  const p = PASSAGES[activeIdx];
  const wpm = Math.round((p.wordCount / elapsed) * 60);
  $('#live-wpm').textContent = wpm;
  $('#reading-passage').classList.remove('reading');
  $('#finish-btn').disabled = true;
  $('#start-btn').disabled = false;
  showComprehension(elapsed, wpm);
}

function showComprehension(elapsed, wpm) {
  const p = PASSAGES[activeIdx];
  const sec = $('#result-section');
  sec.style.display = 'block';
  $('#r-wpm').textContent = wpm;
  $('#r-time').textContent = elapsed.toFixed(1) + 's';
  $('#r-level').textContent = p.level;
  $('#comp-title').textContent = t('compTitle');
  $('#check-btn').textContent = t('check');

  // Render questions
  const html = p.questions.map((q, qi) => `
    <div class="comprehension-q">
      <label>${qi + 1}. ${q.q}</label>
      ${q.a.map((opt, oi) => `<label class="opt"><input type="radio" name="q${qi}" value="${oi}">${opt}</label>`).join('')}
    </div>`).join('');
  $('#comp-questions').innerHTML = html;
  $('#r-comp').textContent = '—';
  $('#r-rating').textContent = '';
  $('#check-btn').onclick = () => checkAnswers(elapsed, wpm);
}

function checkAnswers(elapsed, wpm) {
  const p = PASSAGES[activeIdx];
  let correct = 0;
  p.questions.forEach((q, qi) => {
    const sel = document.querySelector(`input[name="q${qi}"]:checked`);
    if (sel && parseInt(sel.value, 10) === q.correct) correct++;
  });
  const pct = Math.round((correct / p.questions.length) * 100);
  $('#r-comp').textContent = pct + '%';
  // Effective WPM = WPM * comprehension
  const eff = Math.round(wpm * (pct / 100));
  $('#r-wpm').textContent = wpm;
  // Rating
  let rating = '', color = '';
  if (eff < 150) { rating = '🐌 Below Average'; color = 'var(--text3)'; }
  else if (eff < 250) { rating = '🙂 Average Reader'; color = 'var(--warn)'; }
  else if (eff < 400) { rating = '😎 Strong Reader'; color = 'var(--success)'; }
  else if (eff < 600) { rating = '⚡ Fast Reader'; color = 'var(--accent)'; }
  else { rating = '🚀 Speed Reader'; color = 'var(--accent2)'; }
  const r = $('#r-rating');
  r.textContent = rating + ` (${eff} effective WPM)`;
  r.style.background = color + '22';
  r.style.color = color;
}

$('#start-btn').addEventListener('click', start);
$('#finish-btn').addEventListener('click', finish);
$('#reset-btn').addEventListener('click', setupIntro);
$('#level-select').addEventListener('change', setupIntro);

$('#lbl-level').textContent = t('level');
$('#lbl-time').textContent = t('time');
$('#lbl-wpm2').textContent = t('wpm');
$('#lbl-words2').textContent = t('words');
$('#lbl-r-time').textContent = t('rTime');
$('#lbl-r-comp').textContent = t('rComp');
$('#lbl-r-level').textContent = t('rLevel');
$('#start-btn').textContent = t('start');
$('#finish-btn').textContent = t('finished');
setupIntro();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📖', href:'/text/reading-time.html', name:'Reading Time'},
    {icon:'⚡', href:'/text/speed-reader.html', name:'Speed Reader'},
    {icon:'📝', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'🧠', href:'/text/bionic.html', name:'Bionic Reading'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
