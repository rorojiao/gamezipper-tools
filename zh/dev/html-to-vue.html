const { $, copyText, t } = GZ;

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function rewriteEvents(html){
  return html
    .replace(/\sonclick\s*=\s*"([^"]*)"/gi, (m,h) => ` @click="${h.replace(/this\./g,'').replace(/\(\)/g,'()')}"`)
    .replace(/\sonmouseover\s*=\s*"([^"]*)"/gi, ' @mouseover="$1"')
    .replace(/\sonmouseout\s*=\s*"([^"]*)"/gi, ' @mouseout="$1"')
    .replace(/\soninput\s*=\s*"([^"]*)"/gi, ' @input="$1"')
    .replace(/\sonchange\s*=\s*"([^"]*)"/gi, ' @change="$1"')
    .replace(/\sonsubmit\s*=\s*"([^"]*)"/gi, ' @submit.prevent="$1"')
    .replace(/\sonkeydown\s*=\s*"([^"]*)"/gi, ' @keydown="$1"')
    .replace(/\sonkeyup\s*=\s*"([^"]*)"/gi, ' @keyup="$1"')
    .replace(/\sonfocus\s*=\s*"([^"]*)"/gi, ' @focus="$1"')
    .replace(/\sonblur\s*=\s*"([^"]*)"/gi, ' @blur="$1"');
}

function rewriteClass(html){
  return html.replace(/\bclass\s*=\s*"([^"]*)"/gi, (m,cls) => {
    const parts = cls.trim().split(/\s+/);
    if(parts.length === 1) return m; // keep simple classes
    // multi-class -> :class binding with array
    return ` :class="${JSON.stringify(parts).replace(/"/g,'\'')}"`;
  });
}

function wrapVFor(html){
  // Detect sequences of identical siblings (same tag with class) and wrap in v-for
  const tagRegex = /<(\w+)([^>]*class\s*=\s*"([^"]+)")/g;
  const seen = {};
  let m;
  while ((m = tagRegex.exec(html)) !== null) {
    seen[m[3]] = (seen[m[3]] || 0) + 1;
  }
  // Find duplicates
  const dupes = Object.keys(seen).filter(k => seen[k] >= 3);
  if(dupes.length === 0) return html;
  let out = html;
  for(const cls of dupes){
    const re = new RegExp(`<(${dupes.length? '\\w+' : ''})([^>]*class\\s*=\\s*"${cls.replace(/[.*+?^${}()|[\\]\\\\]/g, '\\\\$&')}"[^>]*)>`, 'g');
    let firstMatch;
    out = out.replace(re, (full, tag, attrs, offset) => {
      if(firstMatch === undefined){ firstMatch = full; return full.replace(`class="${cls}"`, `class="${cls}" v-for="(item, i) in items" :key="i"`); }
      return ''; // remove duplicates after first
    });
  }
  return out;
}

function convert(){
  let html = $('#input').value.trim();
  if(!html){ $('#output').textContent = ''; $('#status').textContent = ''; return; }
  try {
    const compName = ($('#comp-name').value.trim() || 'MyComponent').replace(/[^A-Za-z0-9_]/g,'');
    if($('#opt-events').checked) html = rewriteEvents(html);
    if($('#opt-class').checked) html = rewriteClass(html);
    if($('#opt-vfor').checked) html = wrapVFor(html);

    const scoped = $('#opt-scoped').checked ? ' scoped' : '';
    const script = `<script setup>\n// ${compName}.vue\nimport { ref } from 'vue'\n\n// Add your reactive state here\nconst count = ref(0)\n<\/script>`;

    const vue = `<template>\n  ${html.replace(/\n/g,'\n  ')}\n</template>\n\n${script}\n\n<style${scoped}>\n/* Add component styles here */\n</style>\n`;
    $('#output').textContent = vue;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('status').replace('{comp}', compName)}</span>`;
  } catch(e){
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${escapeHtml(e.message)}</span>`;
    $('#status').textContent = '';
  }
}

</div>`;
  convert();
}
