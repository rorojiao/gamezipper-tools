<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is BMI?","acceptedAnswer":{"@type":"Answer","text":"BMI (Body Mass Index) is a numerical value calculated from your weight and height. It provides a simple screening method to categorize individuals as underweight, normal weight, overweight, or obese."}},{"@type":"Question","name":"How is BMI calculated?","acceptedAnswer":{"@type":"Answer","text":"BMI is calculated by dividing your weight in kilograms by the square of your height in meters: BMI = weight (kg) / height (m)². For imperial units: BMI = (weight in lbs × 703) / (height in inches)²."}},{"@type":"Question","name":"What is a healthy BMI range?","acceptedAnswer":{"@type":"Answer","text":"A BMI between 18.5 and 24.9 is considered normal weight. Below 18.5 is underweight, 25-29.9 is overweight, and 30 or above is classified as obese according to WHO guidelines."}},{"@type":"Question","name":"Is BMI accurate for everyone?","acceptedAnswer":{"@type":"Answer","text":"BMI is a general indicator and may not be accurate for athletes, pregnant women, elderly individuals, or those with high muscle mass. It should be used as a screening tool alongside other health assessments."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-bmi-form" id="form">
      <label id="lbl-unit">Unit System
        <select id="unitSystem" onchange="updateLabels()">
          <option value="metric">Metric (kg, cm)</option>
          <option value="imperial">Imperial (lbs, ft/in)</option>
        </select>
      </label>
      <label id="lbl-weight"></label>
      <label id="lbl-height"></label>
      <label id="lbl-height2"></label>
    </div>
    <div class="gz-bmi-result" id="result" style="display:none">
      <div class="gz-bmi-value" id="bmiValue">—</div>
      <div class="gz-bmi-category" id="bmiCategory"></div>
      <div class="gz-bmi-bar"><div class="gz-bmi-marker" id="bmiMarker"></div></div>
      <div class="gz-bmi-ranges"><span>15</span><span>18.5</span><span>25</span><span>30</span><span>40</span></div>
    </div>
    <div class="gz-bmi-info" id="bmiInfo"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'BMI Calculator',
    toolDesc: 'Calculate your Body Mass Index instantly. Check if your weight is in a healthy range based on your height.',
    calculate: 'Calculate BMI',
    clear: 'Clear',
    unitSystem: 'Unit System',
    metric: 'Metric (kg, cm)',
    imperial: 'Imperial (lbs, ft/in)',
    weightKg: 'Weight (kg)',
    weightLbs: 'Weight (lbs)',
    heightCm: 'Height (cm)',
    heightFt: 'Height (feet)',
    heightIn: 'Height (inches)',
    underweight: 'Underweight',
    normal: 'Normal Weight',
    overweight: 'Overweight',
    obese1: 'Obesity (Class I)',
    obese2: 'Obesity (Class II)',
    obese3: 'Obesity (Class III)',
    idealWeight: 'Ideal Weight Range',
    healthyBMI: 'Healthy BMI',
    yourBMI: 'Your BMI',
    step1: 'Select metric (kg/cm) or imperial (lbs/ft) units',
    step2: 'Enter your weight and height',
    step3: 'Click Calculate to see your BMI result',
    step4: 'Review the BMI categories and healthy weight range',
  },
  zh: {
    toolTitle: 'BMI 计算器',
    toolDesc: '即时计算身体质量指数（BMI）。根据身高检查体重是否在健康范围内。',
    calculate: '计算 BMI',
    clear: '清除',
    unitSystem: '单位制',
    metric: '公制（公斤、厘米）',
    imperial: '英制（磅、英尺）',
    weightKg: '体重（公斤）',
    weightLbs: '体重（磅）',
    heightCm: '身高（厘米）',
    heightFt: '身高（英尺）',
    heightIn: '身高（英寸）',
    underweight: '偏瘦',
    normal: '正常',
    overweight: '偏重',
    obese1: '肥胖（I 级）',
    obese2: '肥胖（II 级）',
    obese3: '肥胖（III 级）',
    idealWeight: '理想体重范围',
    healthyBMI: '健康 BMI 范围',
    yourBMI: '你的 BMI',
    step1: '选择公制（公斤/厘米）或英制（磅/英尺）单位',
    step2: '输入你的体重和身高',
    step3: '点击计算查看 BMI 结果',
    step4: '查看 BMI 分类和健康体重范围',
  }
});

const { $, copyText, t } = GZ;

function updateLabels() {
  const sys = $('#unitSystem').value;
  // Update option labels for i18n
  $('#unitSystem option[value="metric"]').textContent = t('metric');
  $('#unitSystem option[value="imperial"]').textContent = t('imperial');
  if (sys === 'metric') {
    $('#lbl-weight').innerHTML = `${t('weightKg')}<input type="number" id="weight" min="1" max="500" step="0.1" placeholder="70" oninput="autoCalc()">`;
    $('#lbl-height').innerHTML = `${t('heightCm')}<input type="number" id="height" min="50" max="300" step="0.1" placeholder="170" oninput="autoCalc()">`;
    $('#lbl-height2').innerHTML = '';
  } else {
    $('#lbl-weight').innerHTML = `${t('weightLbs')}<input type="number" id="weight" min="1" max="1000" step="0.1" placeholder="154" oninput="autoCalc()">`;
    $('#lbl-height').innerHTML = `${t('heightFt')}<input type="number" id="heightFt" min="1" max="8" step="1" placeholder="5" oninput="autoCalc()">`;
    $('#lbl-height2').innerHTML = `${t('heightIn')}<input type="number" id="heightIn" min="0" max="11" step="1" placeholder="7" oninput="autoCalc()">`;
  }
}

function autoCalc() {
  const w = parseFloat($('#weight')?.value);
  if (!w) return;
  const sys = $('#unitSystem').value;
  let bmi;
  if (sys === 'metric') {
    const h = parseFloat($('#height')?.value);
    if (!h) return;
    const hm = h / 100;
    bmi = w / (hm * hm);
  } else {
    const ft = parseFloat($('#heightFt')?.value) || 0;
    const inc = parseFloat($('#heightIn')?.value) || 0;
    const totalIn = ft * 12 + inc;
    if (totalIn <= 0) return;
    bmi = (w * 703) / (totalIn * totalIn);
  }
  showResult(bmi);
}

function getCategory(bmi) {
  if (bmi < 18.5) return { cat: t('underweight'), color: '#4fc3f7' };
  if (bmi < 25) return { cat: t('normal'), color: '#66bb6a' };
  if (bmi < 30) return { cat: t('overweight'), color: '#fdd835' };
  if (bmi < 35) return { cat: t('obese1'), color: '#ff7043' };
  if (bmi < 40) return { cat: t('obese2'), color: '#e53935' };
  return { cat: t('obese3'), color: '#b71c1c' };
}

function showResult(bmi) {
  bmi = Math.round(bmi * 10) / 10;
  const info = getCategory(bmi);
  $('#result').style.display = 'block';
  $('#bmiValue').textContent = bmi;
  $('#bmiValue').style.color = info.color;
  $('#bmiCategory').textContent = info.cat;
  $('#bmiCategory').style.color = info.color;
  // Position marker on bar (15-40 range)
  const pct = Math.max(0, Math.min(100, ((bmi - 15) / 25) * 100));
  $('#bmiMarker').style.left = pct + '%';
  // Ideal weight range
  const sys = $('#unitSystem').value;
  const unit = sys === 'metric' ? 'kg' : 'lbs';
  let hMeters;
  if (sys === 'metric') {
    hMeters = parseFloat($('#height').value) / 100;
  } else {
    const ft = parseFloat($('#heightFt')?.value) || 0;
    const inc = parseFloat($('#heightIn')?.value) || 0;
    hMeters = (ft * 12 + inc) * 0.0254;
  }
  const minW = Math.round(18.5 * hMeters * hMeters * 10) / 10;
  const maxW = Math.round(24.9 * hMeters * hMeters * 10) / 10;
  const displayMin = sys === 'metric' ? minW : Math.round(minW * 2.20462 * 10) / 10;
  const displayMax = sys === 'metric' ? maxW : Math.round(maxW * 2.20462 * 10) / 10;
  $('#bmiInfo').innerHTML = `
    <div class="gz-bmi-info-item"><strong>${t('healthyBMI')}</strong>18.5 – 24.9</div>
    <div class="gz-bmi-info-item"><strong>${t('idealWeight')}</strong>${displayMin} – ${displayMax} ${unit}</div>
  `;
}

function doClear() {
  $('#result').style.display = 'none';
  updateLabels();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="autoCalc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

updateLabels();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'⛽', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost'},
    {icon:'📐', href:'/calc/aspect-ratio.html', name:'Aspect Ratio'},
    {icon:'🧮', href:'/convert/unit.html', name:'Unit Converter'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
