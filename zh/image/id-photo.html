<script>
GZI18n.register({
  en: {
    toolTitle: 'ID Photo Maker',
    toolDesc: 'Create passport, visa and ID photos online — crop to exact official sizes (US, UK, EU, India, China), set background color, adjust zoom. Free, runs in your browser — no upload.',
    dropText: 'Click or drop a photo here',
    preset: 'Photo Size Preset',
    bg: 'Background Color',
    zoom: 'Zoom',
    offsetx: 'Horizontal Position',
    offsety: 'Vertical Position',
    dpi: 'Resolution (DPI)',
    download: 'Download Photo',
    reset: 'Reset',
    loading: 'Processing…',
    noFile: 'Please select a photo first.',
    done: 'Done! Download started.',
    step1: 'Upload a clear, front-facing photo',
    step2: 'Select your country\'s ID photo size preset',
    step3: 'Adjust zoom and position to fit the head-size guide',
    step4: 'Choose background color and click Download',
  },
  zh: {
    toolTitle: '证件照制作工具',
    toolDesc: '在线制作护照、签证和证件照 — 裁剪到各国官方尺寸（美/英/欧/印/中），设置背景色，调整缩放。免费、浏览器本地运行 — 无需上传。',
    dropText: '点击或拖拽照片到此处',
    preset: '证件照尺寸',
    bg: '背景颜色',
    zoom: '缩放',
    offsetx: '水平位置',
    offsety: '垂直位置',
    dpi: '分辨率（DPI）',
    download: '下载证件照',
    reset: '重置',
    loading: '处理中…',
    noFile: '请先选择一张照片。',
    done: '完成！下载已开始。',
    step1: '上传一张清晰的正面照片',
    step2: '选择对应国家的证件照尺寸',
    step3: '调整缩放和位置使头部对齐参考线',
    step4: '选择背景颜色并点击下载',
  }
});

const { $, t } = GZ;
let img = null;
let currentPreset = { name: 'US Passport', wMM: 51, hMM: 51 };

const PRESETS = [
  { name: 'US Passport 2×2', wMM: 51, hMM: 51 },
  { name: 'US Visa 2×2', wMM: 51, hMM: 51 },
  { name: 'UK Passport', wMM: 35, hMM: 45 },
  { name: 'EU Passport 35×45', wMM: 35, hMM: 45 },
  { name: 'Schengen Visa', wMM: 35, hMM: 45 },
  { name: 'India Passport', wMM: 35, hMM: 45 },
  { name: 'China 一寸 25×35', wMM: 25, hMM: 35 },
  { name: 'China 二寸 35×49', wMM: 35, hMM: 49 },
  { name: 'China 小一寸 22×32', wMM: 22, hMM: 32 },
  { name: 'China 小二寸 26×32', wMM: 26, hMM: 32 },
  { name: 'Japan Visa 45×45', wMM: 45, hMM: 45 },
  { name: 'Canada Passport 50×70', wMM: 50, hMM: 70 },
];

const dz = $('#dropzone');
dz.addEventListener('click', () => $('#file-input').click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) loadImage(file);
});
$('#file-input').addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]); });

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    img = new Image();
    img.onload = () => {
      $('#upload-area').style.display = 'none';
      $('#editor-area').style.display = 'block';
      renderPreview();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function renderPresets() {
  $('#preset-grid').innerHTML = PRESETS.map((p, i) =>
    `<button class="preset-btn ${p.name === currentPreset.name ? 'active' : ''}" data-idx="${i}">${p.name}</button>`
  ).join('');
  $$('.preset-btn').forEach(btn => {
    btn.onclick = () => {
      currentPreset = PRESETS[+btn.dataset.idx];
      renderPresets();
      renderPreview();
    };
  });
}

function renderPreview() {
  if (!img) return;
  const canvas = $('#preview-canvas');
  const ctx = canvas.getContext('2d');
  const dpi = +$('#dpi').value;
  const wPx = Math.round(currentPreset.wMM / 25.4 * dpi);
  const hPx = Math.round(currentPreset.hMM / 25.4 * dpi);
  // preview scaled to fit 300px max
  const scale = Math.min(300 / wPx, 400 / hPx);
  const dispW = Math.round(wPx * scale);
  const dispH = Math.round(hPx * scale);
  canvas.width = dispW;
  canvas.height = dispH;
  // background
  ctx.fillStyle = $('#bg-color').value;
  ctx.fillRect(0, 0, dispW, dispH);
  // draw image cover with zoom & offset
  const zoom = +$('#zoom').value / 100;
  const offX = +$('#offset-x').value / 100 * dispW * 0.3;
  const offY = +$('#offset-y').value / 100 * dispH * 0.3;
  const imgRatio = img.width / img.height;
  const boxRatio = dispW / dispH;
  let dw, dh;
  if (imgRatio > boxRatio) {
    dh = dispH * zoom; dw = dh * imgRatio;
  } else {
    dw = dispW * zoom; dh = dw / imgRatio;
  }
  const dx = (dispW - dw) / 2 + offX;
  const dy = (dispH - dh) / 2 + offY;
  ctx.drawImage(img, dx, dy, dw, dh);
  // head-size guide oval (approx 50-70% of height)
  ctx.strokeStyle = 'rgba(78,205,196,0.6)';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  const ovalW = dispW * 0.55;
  const ovalH = dispH * 0.6;
  ctx.beginPath();
  ctx.ellipse(dispW / 2, dispH * 0.42, ovalW / 2, ovalH / 2, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);
  $('#size-info').textContent = `${currentPreset.name} — ${currentPreset.wMM}×${currentPreset.hMM}mm @ ${dpi}DPI = ${wPx}×${hPx}px`;
}

['zoom', 'offset-x', 'offset-y', 'bg-color', 'dpi'].forEach(id => {
  $('#' + id).addEventListener('input', () => {
    $('#zoom-val').textContent = $('#zoom').value + '%';
    $('#offx-val').textContent = $('#offset-x').value;
    $('#offy-val').textContent = $('#offset-y').value;
    renderPreview();
  });
});

$('#btn-download').onclick = () => {
  if (!img) { $('#status').textContent = t('noFile'); return; }
  const dpi = +$('#dpi').value;
  const wPx = Math.round(currentPreset.wMM / 25.4 * dpi);
  const hPx = Math.round(currentPreset.hMM / 25.4 * dpi);
  const fullCanvas = document.createElement('canvas');
  fullCanvas.width = wPx; fullCanvas.height = hPx;
  const ctx = fullCanvas.getContext('2d');
  ctx.fillStyle = $('#bg-color').value;
  ctx.fillRect(0, 0, wPx, hPx);
  const zoom = +$('#zoom').value / 100;
  const offX = +$('#offset-x').value / 100 * wPx * 0.3;
  const offY = +$('#offset-y').value / 100 * hPx * 0.3;
  const imgRatio = img.width / img.height;
  const boxRatio = wPx / hPx;
  let dw, dh;
  if (imgRatio > boxRatio) { dh = hPx * zoom; dw = dh * imgRatio; }
  else { dw = wPx * zoom; dh = dw / imgRatio; }
  ctx.drawImage(img, (wPx - dw) / 2 + offX, (hPx - dh) / 2 + offY, dw, dh);
  fullCanvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'id-photo.png'; a.click();
    URL.revokeObjectURL(url);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${t('done')}</span>`;
  }, 'image/png');
};

$('#btn-reset').onclick = () => {
  $('#zoom').value = 100; $('#offset-x').value = 0; $('#offset-y').value = 0;
  $('#zoom-val').textContent = '100%'; $('#offx-val').textContent = '0'; $('#offy-val').textContent = '0';
  $('#bg-color').value = '#ffffff';
  renderPreview();
};

// labels
$('#dropzone-text').textContent = t('dropText');
$('#lbl-preset').textContent = t('preset');
$('#lbl-bg').textContent = t('bg');
$('#lbl-zoom').textContent = t('zoom');
$('#lbl-offsetx').textContent = t('offsetx');
$('#lbl-offsety').textContent = t('offsety');
$('#lbl-dpi').textContent = t('dpi');
$('#btn-download').textContent = t('download');
$('#btn-reset').textContent = t('reset');
renderPresets();

$('#toolbar').innerHTML = '';

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✂️', href:'/image/cropper.html', name:'Image Cropper'},
    {icon:'📐', href:'/image/resizer.html', name:'Image Resizer'},
    {icon:'🔄', href:'/image/converter.html', name:'Image Converter'},
    {icon:'🖼️', href:'/image/compressor.html', name:'Image Compressor'},
  ]
});
</script>
