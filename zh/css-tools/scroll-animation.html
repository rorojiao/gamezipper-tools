<script>
GZI18n.register({
  en: {
    toolTitle: 'Scroll Progress Bar Generator',
    toolDesc: 'Generate customizable scroll progress bars for websites. Pick color, height and style — copy HTML, CSS and JavaScript.',
    color: 'Color',
    height: 'Height',
    position: 'Position',
    generate: 'Generate',
    copyAll: 'Copy All Code',
    top: 'Top',
    bottom: 'Bottom',
    step1: 'Choose your progress bar color and height',
    step2: 'Select position (top or bottom of page)',
    step3: 'Click Generate to see live preview',
    step4: 'Copy the HTML, CSS and JavaScript code',
  },
  zh: {
    toolTitle: '滚动进度条生成器',
    toolDesc: '生成可定制的网页滚动进度条，支持自定义颜色、高度和位置，一键复制 HTML、CSS 和 JavaScript。',
    color: '颜色',
    height: '高度',
    position: '位置',
    generate: '生成',
    copyAll: '复制全部代码',
    top: '顶部',
    bottom: '底部',
    step1: '选择进度条颜色和高度',
    step2: '选择位置（页面顶部或底部）',
    step3: '点击生成查看实时预览',
    step4: '复制 HTML、CSS 和 JavaScript 代码',
  }
});

const { $, copyText, t } = GZ;
let barColor = '#4ecdc4', barHeight = 4, barPos = 'top';
const fillerText = `Scroll down to see the progress bar in action.\n\nLorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris.\n\nDuis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.\n\nSed ut perspiciatis unde omnis iste natus error sit voluptatem accusantium doloremque laudantium, totam rem aperiam, eaque ipsa quae ab illo inventore veritatis et quasi architecto beatae vitae dicta sunt explicabo.\n\nNemo enim ipsam voluptatem quia voluptas sit aspernatur aut odit aut fugit, sed quia consequuntur magni dolores eos qui ratione voluptatem sequi nesciunt.\n\nNeque porro quisquam est, qui dolorem ipsum quia dolor sit amet, consectetur, adipisci velit, sed quia non numquam eius modi tempora incidunt ut labore et dolore magnam aliquam quaerat voluptatem.`;

function buildToolbar() {
  $('#toolbar').innerHTML = `
    <label>${t('color')} <input type="color" id="inp-color" value="${barColor}"></label>
    <label>${t('height')} <input type="range" id="inp-height" min="2" max="12" value="${barHeight}"> <span id="height-val">${barHeight}px</span></label>
    <label>${t('position')} <select id="inp-pos"><option value="top">${t('top')}</option><option value="bottom">${t('bottom')}</option></select></label>
    <button class="gz-btn" onclick="generate()">${t('generate')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="copyAllCode()">${t('copyAll')}</button>`;
  $('#inp-color').addEventListener('input', e => { barColor = e.target.value; generate(); });
  $('#inp-height').addEventListener('input', e => { barHeight = +e.target.value; $('#height-val').textContent = barHeight+'px'; generate(); });
  $('#inp-pos').addEventListener('change', e => { barPos = e.target.value; generate(); });
}

function generate() {
  const preview = $('#preview');
  const bar = $('#progress-bar');
  bar.style.background = barColor;
  bar.style.height = barHeight + 'px';
  if (barPos === 'bottom') {
    bar.style.position = 'sticky';
    bar.style.top = 'auto';
    bar.style.bottom = '0';
    bar.style.order = '1';
    preview.style.display = 'flex';
    preview.style.flexDirection = 'column-reverse';
  } else {
    bar.style.position = 'sticky';
    bar.style.top = '0';
    bar.style.bottom = 'auto';
    bar.style.order = '0';
    preview.style.display = 'block';
    preview.style.flexDirection = '';
  }
  preview.addEventListener('scroll', function onScroll() {
    const el = this;
    const pct = el.scrollTop / (el.scrollHeight - el.clientHeight) * 100;
    bar.style.width = Math.min(100, Math.max(0, pct)) + '%';
  });
  $('#preview-content').innerHTML = fillerText.split('\n\n').map(p => `<p>${p}</p>`).join('');
}

function copyAllCode() {
  const code = `<!-- Scroll Progress Bar -->
<style>
#scroll-progress {
  position: fixed;
  ${barPos}: 0;
  left: 0;
  height: ${barHeight}px;
  background: ${barColor};
  width: 0%;
  z-index: 99999;
  transition: width 0.1s linear;
}
</style>
<div id="scroll-progress"></div>
<script>
window.addEventListener('scroll', function() {
  var h = document.documentElement;
  var pct = (h.scrollTop || document.body.scrollTop) / (h.scrollHeight - h.clientHeight) * 100;
  document.getElementById('scroll-progress').style.width = pct + '%';
});
<\/script>`;
  copyText(code);
}

buildToolbar();
generate();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏳', href:'/css-tools/loader.html', name:'Loader Generator'},
    {icon:'🎬', href:'/css-tools/animation.html', name:'Animation Generator'},
    {icon:'🌊', href:'/css-tools/wave-divider.html', name:'Wave Divider'},
    {icon:'↕️', href:'/css-tools/scrollbar.html', name:'Scrollbar Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
