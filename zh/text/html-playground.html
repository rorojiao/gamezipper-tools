<style>
#editor-area{display:grid;grid-template-columns:1fr 1fr;gap:0;height:65vh;min-height:400px;border:1px solid var(--border);border-radius:12px;overflow:hidden}
#editor-tabs{display:flex;background:var(--glass);border-bottom:1px solid var(--border)}
#editor-tabs button{padding:8px 16px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:.85em;font-weight:600;border-bottom:2px solid transparent;transition:.2s}

#editor-pane{display:flex;flex-direction:column;overflow:hidden}
#editor-pane textarea{flex:1;width:100%;border:none;resize:none;padding:12px;font-family:'Courier New',monospace;font-size:.85em;background:var(--glass2);color:var(--text);line-height:1.6;tab-size:2}

#preview-frame{border:none;background:#fff;width:100%;height:100%}
#preview-pane{position:relative;background:#fff}
#preview-label{position:absolute;top:6px;right:10px;font-size:.7em;color:#999;background:rgba(255,255,255,.8);padding:2px 8px;border-radius:4px;z-index:2}

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div id="editor-area">
      <div id="editor-pane">
        <div id="editor-tabs">
          <button class="active" onclick="switchTab('html',this)">HTML</button>
          <button onclick="switchTab('css',this)">CSS</button>
          <button onclick="switchTab('js',this)">JS</button>
        </div>
        <textarea id="html-editor" spellcheck="false" placeholder="Type HTML here..."></textarea>
        <textarea id="css-editor" spellcheck="false" style="display:none" placeholder="Type CSS here..."></textarea>
        <textarea id="js-editor" spellcheck="false" style="display:none" placeholder="Type JavaScript here..."></textarea>
      </div>

        <span id="preview-label">Preview</span>
        <iframe id="preview-frame" sandbox="allow-scripts allow-modals"></iframe>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'HTML Playground — Live Editor',
    toolDesc: 'Write HTML, CSS and JavaScript with instant live preview. Prototype and experiment right in your browser.',
    htmlTab: 'HTML',
    cssTab: 'CSS',
    jsTab: 'JS',
    run: '▶ Run',
    download: '⬇ Download',
    copyCode: '📋 Copy',
    clear: '🗑 Clear',
    example: 'Example',
    step1: 'Write or paste HTML in the editor',
    step2: 'Switch to CSS or JS tabs to add styles and scripts',
    step3: 'Preview updates automatically as you type',
    step4: 'Download or copy your finished code',
    step5: 'Use the Example button to load a starter template',
  },
  zh: {
    toolTitle: 'HTML 在线编辑器',
    toolDesc: '在线编写 HTML、CSS 和 JavaScript，即时预览效果。在浏览器中快速原型设计和实验。',
    htmlTab: 'HTML',
    cssTab: 'CSS',
    jsTab: 'JS',
    run: '▶ 运行',
    download: '⬇ 下载',
    copyCode: '📋 复制',
    clear: '🗑 清空',
    example: '示例',
    step1: '在编辑器中编写或粘贴 HTML',
    step2: '切换到 CSS 或 JS 标签页添加样式和脚本',
    step3: '输入时预览区域自动更新',
    step4: '下载或复制完成的代码',
    step5: '点击「示例」按钮加载模板',
  }
});

const { $, copyText, t } = GZ;

const exampleCode = {
  html: `<div class="card">\n  <h2>Hello, World! 👋</h2>\n  <p>This is a live HTML preview.</p>\n  <button id="btn">Click Me</button>\n  <p id="output"></p>\n</div>`,
  css: `.card {\n  max-width: 400px;\n  margin: 40px auto;\n  padding: 24px;\n  border-radius: 12px;\n  background: #f8f9fa;\n  box-shadow: 0 2px 12px rgba(0,0,0,.1);\n  font-family: system-ui, sans-serif;\n  text-align: center;\n}\nh2 { color: #4ecdc4; margin-top: 0; }\nbutton {\n  background: #4ecdc4;\n  color: #fff;\n  border: none;\n  padding: 10px 24px;\n  border-radius: 8px;\n  font-size: 1em;\n  cursor: pointer;\n  margin-top: 12px;\n}\nbutton:hover { background: #3ab8b0; }\n#output { color: #666; margin-top: 12px; }`,
  js: `let count = 0;\ndocument.getElementById('btn').addEventListener('click', () => {\n  count++;\n  document.getElementById('output').textContent = 'Clicked ' + count + ' time' + (count > 1 ? 's' : '');\n});`
};

function switchTab(tab, btn) {
  document.querySelectorAll('#editor-tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  $('#html-editor').style.display = tab === 'html' ? '' : 'none';
  $('#css-editor').style.display = tab === 'css' ? '' : 'none';
  $('#js-editor').style.display = tab === 'js' ? '' : 'none';
}

function buildPage() {
  const html = $('#html-editor').value;
  const css = $('#css-editor').value;
  const js = $('#js-editor').value;
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${css}</style><link rel="alternate" hreflang="en" href="https://tools.gamezipper.com/text/html-playground.html">
<link rel="alternate" hreflang="zh" href="https://tools.gamezipper.com/zh/text/html-playground.html">
<link rel="alternate" hreflang="x-default" href="https://tools.gamezipper.com/text/html-playground.html">
<script>localStorage.setItem('gz-lang','zh');</script>
</head><body>${html}<script>${js}<\/script></body></html>
`;
}
$('#input').addEventListener('input', updatePreview);
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="updatePreview()">${t("updatePreview")}</button><button class="gz-btn" onclick="copyText($('#output').value||$('#output').innerText)">${t("copy")}</button><button class="gz-btn gz-btn-secondary" onclick="$('#input').value=''">${t("clear")}</button><button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t("example")}</button>`;
GZ.renderToolPage({category:'convert',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1', 'step2', 'step3', 'step4', 'step5', 'step1', 'step2', 'step3', 'step4', 'step5'],related:[]});
loadExample();
</script>
