<script>
GZI18n.register({
  en: {
    toolTitle: 'Free Logo Maker',
    toolDesc: 'Create a professional logo online for free. Pick an icon, type your brand name, choose colors and fonts — download a high-res PNG instantly. No signup, no watermark.',
    download: 'Download PNG', randomize: 'Surprise Me',
    lblText: 'Logo Text', lblSlogan: 'Slogan (optional)', lblShape: 'Icon Shape',
    lblFont: 'Font Style', lblBg: 'Background Color', lblTextColor: 'Text Color',
    lblIcon: 'Icon', lblPresets: 'Color Presets',
    step1: 'Type your brand or business name in the Logo Text field',
    step2: 'Pick an icon and choose a shape (circle, rounded, hexagon)',
    step3: 'Select colors and a font style that matches your brand',
    step4: 'Click Download PNG to save your logo — no watermark!',
  },
  zh: {
    toolTitle: '免费 Logo 制作工具',
    toolDesc: '免费在线制作专业 Logo。选择图标、输入品牌名称、自定义颜色和字体 — 即时下载高清 PNG，无水印、无需注册。',
    download: '下载 PNG', randomize: '随机生成',
    lblText: 'Logo 文字', lblSlogan: '口号（可选）', lblShape: '图标形状',
    lblFont: '字体风格', lblBg: '背景颜色', lblTextColor: '文字颜色',
    lblIcon: '图标', lblPresets: '配色预设',
    step1: '在 Logo 文字栏输入你的品牌或公司名称',
    step2: '选择一个图标和形状（圆形、圆角、六边形）',
    step3: '选择与品牌相符的颜色和字体风格',
    step4: '点击「下载 PNG」保存你的 Logo — 无水印！',
  }
});

const { $, copyText, t } = GZ;
let currentIcon = '🎮';

const icons = ['🎮','🚀','⚡','🔥','💎','🌟','🎯','🛠️','☕','🍕','🌸','🦁','🐝','🌐','📊','💡','🎨','📷','🎵','🏋️','🌳','🐾','✈️','🏠','📚','🧠','👑','🌈'];

const presets = [
  {bg:'#4ecdc4',fg:'#ffffff'},
  {bg:'#e94560',fg:'#ffffff'},
  {bg:'#0f3460',fg:'#f5f5f5'},
  {bg:'#f59e0b',fg:'#1a1a2e'},
  {bg:'#7c3aed',fg:'#ffffff'},
  {bg:'#10b981',fg:'#ffffff'},
  {bg:'#1a1a2e',fg:'#4ecdc4'},
  {bg:'#ec4899',fg:'#ffffff'},
  {bg:'#3b82f6',fg:'#ffffff'},
  {bg:'#fbbf24',fg:'#7c2d12'},
];

function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}

function drawHexagon(ctx,cx,cy,r){
  ctx.beginPath();
  for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/2;const px=cx+r*Math.cos(a);const py=cy+r*Math.sin(a);i===0?ctx.moveTo(px,py):ctx.lineTo(px,py)}
  ctx.closePath();
}

function wrapText(ctx,text,x,y,maxW,lh){
  const words=text.split(' ');let line='';const lines=[];
  for(const w of words){const test=line?line+' '+w:w;if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=w}else line=test}
  if(line)lines.push(line);
  lines.forEach((ln,i)=>ctx.fillText(ln,x,y+i*lh));
  return lines.length;
}

function render(){
  const c=$('#canvas'),ctx=c.getContext('2d');
  const W=c.width,H=c.height;
  ctx.clearRect(0,0,W,H);
  const text=$('#logoText').value||'Brand';
  const slogan=$('#slogan').value;
  const shape=$('#shape').value;
  const font=$('#font').value;
  const bg=$('#bgColor').value;
  const fg=$('#textColor').value;
  const cx=W/2;

  if(shape!=='none'){
    ctx.fillStyle=bg;
    const r=180;
    if(shape==='circle'){ctx.beginPath();ctx.arc(cx,H/2-40,r,0,Math.PI*2);ctx.fill()}
    else if(shape==='rounded'){roundRect(ctx,cx-r,H/2-40-r,r*2,r*2,40);ctx.fill()}
    else if(shape==='square'){ctx.fillRect(cx-r,H/2-40-r,r*2,r*2)}
    else if(shape==='hex'){drawHexagon(ctx,cx,H/2-40,r);ctx.fill()}
  }

  // Icon
  ctx.font='110px sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(currentIcon,cx,H/2-180);

  // Logo text
  ctx.fillStyle=fg;
  let fs=72;
  ctx.font=`bold ${fs}px ${font}`;
  while(ctx.measureText(text).width>520&&fs>24){fs-=2;ctx.font=`bold ${fs}px ${font}`}
  ctx.fillText(text,cx,H/2+10);

  // Slogan
  if(slogan){
    ctx.font=`300 24px ${font}`;
    ctx.fillStyle=fg;
    ctx.globalAlpha=0.8;
    ctx.fillText(slogan,cx,H/2+60);
    ctx.globalAlpha=1;
  }
}

function downloadPNG(){
  const link=document.createElement('a');
  const name=($('#logoText').value||'logo').replace(/[^a-zA-Z0-9]/g,'_').toLowerCase()||'logo';
  link.download=name+'-logo.png';
  link.href=$('#canvas').toDataURL('image/png');
  link.click();
}

function randomize(){
  const ic=icons[Math.floor(Math.random()*icons.length)];
  const p=presets[Math.floor(Math.random()*presets.length)];
  const shapes=['circle','rounded','square','hex'];
  const fonts=['Arial Black, sans-serif','Georgia, serif','Impact, sans-serif','Verdana, sans-serif'];
  currentIcon=ic;
  $('#bgColor').value=p.bg;$('#textColor').value=p.fg;
  $('#shape').value=shapes[Math.floor(Math.random()*shapes.length)];
  $('#font').value=fonts[Math.floor(Math.random()*fonts.length)];
  buildIconRow();buildPresetRow();render();
}

function buildIconRow(){
  $('#iconRow').innerHTML=icons.map(ic=>
    `<button class="${ic===currentIcon?'active':''}" onclick="currentIcon='${ic}';buildIconRow();render()">${ic}</button>`
  ).join('');
}

function buildPresetRow(){
  $('#presetRow').innerHTML=presets.map((p,i)=>
    `<button class="${$('#bgColor').value===p.bg?'active':''}" style="background:${p.bg}" onclick="document.getElementById('bgColor').value='${p.bg}';document.getElementById('textColor').value='${p.fg}';buildPresetRow();render()" title="Preset ${i+1}"></button>`
  ).join('');
}

// Labels
$('#lbl-text').textContent=t('lblText');
$('#lbl-slogan').textContent=t('lblSlogan');
$('#lbl-shape').textContent=t('lblShape');
$('#lbl-font').textContent=t('lblFont');
$('#lbl-bg').textContent=t('lblBg');
$('#lbl-text-color').textContent=t('lblTextColor');
$('#lbl-icon').textContent=t('lblIcon');
$('#lbl-presets').textContent=t('lblPresets');

['logoText','slogan','bgColor','textColor'].forEach(id=>$('#'+id).addEventListener('input',render));
$('#shape').addEventListener('change',render);
$('#font').addEventListener('change',render);

buildIconRow();buildPresetRow();render();

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="downloadPNG()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="randomize()">🎲 ${t('randomize')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💳', href:'/image/business-card-maker.html', name:'Business Card Maker'},
    {icon:'🖼️', href:'/image/poster-maker.html', name:'Poster Maker'},
    {icon:'🎫', href:'/image/flyer-maker.html', name:'Flyer Maker'},
    {icon:'🏆', href:'/image/certificate-generator.html', name:'Certificate Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
