let delimiter = ',';
const { $, copyText, t } = GZ;

function flattenXml(node, prefix, obj) {
  if (!obj) obj = {};
  if (node.nodeType === 1) {
    const tag = node.tagName;
    const key = prefix ? prefix + '.' + tag : tag;
    let textOnly = true;
    for (let i = 0; i < node.childNodes.length; i++) {
      if (node.childNodes[i].nodeType === 1) { textOnly = false; break; }
    }
    if (textOnly) {
      const val = node.textContent.trim();
      if (val) obj[key] = val;
    } else {
      let hasMixed = false, childCount = 0, lastTag = '';
      const children = [];
      for (let i = 0; i < node.childNodes.length; i++) {
        if (node.childNodes[i].nodeType === 1) {
          childCount++;
          if (lastTag && node.childNodes[i].tagName === lastTag) hasMixed = false;
          else if (childCount > 1 && node.childNodes[i].tagName !== lastTag) hasMixed = true;
          lastTag = node.childNodes[i].tagName;
          children.push(node.childNodes[i]);
        }
      }
      if (childCount === 0) {
        const val = node.textContent.trim();
        if (val) obj[key] = val;
      } else {
        for (const child of children) {
          flattenXml(child, key, obj);
        }
      }
    }
  }
  return obj;
}

function escapeCsv(val, d) {
  const s = String(val == null ? '' : val);
  if (s.includes(d) || s.includes('"') || s.includes('\n') || s.includes('\r')) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(inp, 'text/xml');
    const errNode = doc.querySelector('parsererror');
    if (errNode) {
      $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('error')}: ${errNode.textContent.substring(0, 200)}</span>`;
      $('#output').value = '';
      return;
    }
    const root = doc.documentElement;
    const rows = [];
    const headers = new Set();

    // Find repeating elements (array-like children)
    let childTags = {};
    for (let i = 0; i < root.childNodes.length; i++) {
      if (root.childNodes[i].nodeType === 1) {
        const tag = root.childNodes[i].tagName;
        childTags[tag] = (childTags[tag] || 0) + 1;
      }
    }

    // If root itself looks like a single row, treat it as one row
    let itemNodes = [];
    let isArray = false;
    for (const tag in childTags) {
      if (childTags[tag] > 1) isArray = true;
    }

    if (isArray) {
      // Find the repeating tag
      let repTag = '';
      for (const tag in childTags) {
        if (childTags[tag] > 1) { repTag = tag; break; }
      }
      itemNodes = Array.from(root.childNodes).filter(n => n.nodeType === 1 && n.tagName === repTag);
    } else {
      itemNodes = [root];
    }

    for (const node of itemNodes) {
      const flat = {};
      flattenXml(node, '', flat);
      // strip first-level tag name prefix if all have same prefix
      const prefix = node.tagName;
      const cleaned = {};
      for (const k in flat) {
        let key = k;
        if (k.startsWith(prefix + '.')) key = k.substring(prefix.length + 1);
        else if (k === prefix) key = '_value';
        else key = k;
        headers.add(key);
        cleaned[key] = flat[k];
      }
      rows.push(cleaned);
    }

    if (rows.length === 0) {
      $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noData')}</span>`;
      $('#output').value = '';
      return;
    }

    const headerArr = Array.from(headers);
    const lines = [headerArr.map(h => escapeCsv(h, delimiter)).join(delimiter)];
    for (const row of rows) {
      lines.push(headerArr.map(h => escapeCsv(row[h], delimiter)).join(delimiter));
    }
    $('#output').value = lines.join('\n');
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('converted')} (${rows.length} rows, ${headerArr.length} cols)</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('error')}: ${e.message}</span>`;
    $('#output').value = '';
  }
}

function doDownload() {
  const text = $('#output').value;
  if (!text) return;
  const blob = new Blob([text], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'data.csv'; a.click();
  URL.revokeObjectURL(url);
}

    <category>Accessories</category>
    <price>45.50</price>
    <stock>200</stock>
  </product>
</products>`;
  doConvert();
}

$('#toolbar').innerHTML = `
