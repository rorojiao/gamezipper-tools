// Tiny CSS rule parser — supports simple selectors and declarations,
// ignores @media / @keyframes / @font-face / @supports.
function parseCSS(cssText) {
  const rules = [];
  // Strip comments
  const stripped = cssText.replace(/\/\*[\s\S]*?\*\//g, '');
  // Remove @keyframes, @font-face, @import, @charset blocks entirely
  const noAtBlocks = stripped.replace(/@(-(webkit|moz)-)?keyframes[^{]*\{[^{}]*((\{[^{}]*\}[^{}]*)*)\}/g, '')
    .replace(/@font-face\s*\{[^{}]*\}/g, '')
    .replace(/@import[^;]+;/g, '')
    .replace(/@charset[^;]+;/g, '');
  // Extract @media blocks separately (kept as preserved style)
  const mediaBlocks = [];
  const mediaRe = /@media[^{]*\{([\s\S]*?)\}\s*\}/g;
  let m;
  while ((m = mediaRe.exec(noAtBlocks)) !== null) {
    mediaBlocks.push('@media ' + (m[0].match(/@media[^{]*/)[0].trim().replace(/^@media/, '').trim()) + ' { ' + m[1] + ' }');
  }
  // Remove media blocks from the main css
  const flat = noAtBlocks.replace(/@media[^{]*\{[\s\S]*?\}\s*\}/g, '');
  // Now parse top-level rule blocks
  const ruleRe = /([^{}]+)\{([^{}]*)\}/g;
  let rm;
  while ((rm = ruleRe.exec(flat)) !== null) {
    const selectorsRaw = rm[1].trim();
    const declRaw = rm[2].trim();
    if (!selectorsRaw || !declRaw) continue;
    if (selectorsRaw.startsWith('@')) continue;
    const selectors = selectorsRaw.split(',').map(s => s.trim()).filter(Boolean);
    const decls = declRaw.split(';').map(d => d.trim()).filter(Boolean).join('; ');
    if (!decls) continue;
    for (const sel of selectors) {
      // skip pseudo-only selectors that can't apply inline
      rules.push({ selector: sel, decls });
    }
  }
  return { rules, mediaBlocks };
}

function specificity(sel) {
  // very small: count ids, classes, attributes, pseudo-classes, type selectors
  let ids = 0, cls = 0, types = 0;
  const parts = sel.match(/(#\w+)|(\.[\w-]+)|(\[[^\]]+\])|(::?[\w-]+)|(\w+|\*)/g) || [];
  for (const p of parts) {
    if (p[0] === '#') ids++;
    else if (p[0] === '.') cls++;
    else if (p[0] === '[') cls++;
    else if (p[0] === ':') cls++;
    else if (p !== '*') types++;
  }
  return ids * 100 + cls * 10 + types;
}

function doInline() {
  const html = $('#input').value.trim();
  const out = $('#output');
  const stats = $('#stats');
  if (!html) { out.textContent = ''; stats.innerHTML = ''; return; }
  const keepStyle = $('#optKeepStyle').checked;
  const keepInline = $('#optKeepInline').checked;
  const stripComments = $('#optStripComments').checked;

  // Parse HTML
  const doc = new DOMParser().parseFromString(html, 'text/html');
  // Collect all <style> contents
  let cssText = '';
  const styleEls = Array.from(doc.querySelectorAll('style'));
  styleEls.forEach(s => { cssText += '\n' + s.textContent; });
  const { rules, mediaBlocks } = parseCSS(stripComments ? cssText : cssText.replace(/\/\*[\s\S]*?\*\//g, ''));

  // Apply rules to elements
  let inlinedCount = 0;
  let elementCount = 0;
  // Sort by specificity so later (higher specificity) wins when merged
  const sortedRules = rules.slice().sort((a, b) => specificity(a.selector) - specificity(b.selector));
  sortedRules.forEach(rule => {
    let matched;
    try { matched = doc.querySelectorAll(rule.selector); } catch (e) { matched = []; }
    matched.forEach(el => {
      elementCount++;
      const existing = keepInline ? (el.getAttribute('style') || '') : '';
      const merged = mergeDeclarations(existing, rule.decls);
      el.setAttribute('style', merged);
      inlinedCount++;
    });
  });

  // Remove <style> blocks (or keep the media ones)
  styleEls.forEach(s => s.remove());
  if (keepStyle && mediaBlocks.length) {
    const head = doc.head || doc.createElement('head');
    const styleTag = doc.createElement('style');
    styleTag.setAttribute('type', 'text/css');
    styleTag.textContent = '\n' + mediaBlocks.join('\n\n') + '\n';
    head.appendChild(styleTag);
  }

  // Serialize
  let result = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
  if (stripComments) result = result.replace(/<!--[\s\S]*?-->/g, '');
  // Pretty print slightly
  out.textContent = result;
  stats.innerHTML = `<span><b>${inlinedCount}</b> ${t('inlined')}</span>` +
    (keepStyle ? `<span><b>${mediaBlocks.length}</b> ${t('kept')}</span>` : '') +
    `<span><b>${elementCount}</b> ${t('elements')}</span>`;
}

// Merge two declaration strings. Later values override earlier on the same property.
function mergeDeclarations(a, b) {
  const map = new Map();
  const push = (str) => {
    if (!str) return;
    str.split(';').forEach(pair => {
      const idx = pair.indexOf(':');
      if (idx === -1) return;
      const prop = pair.slice(0, idx).trim().toLowerCase();
      const val = pair.slice(idx + 1).trim();
      if (prop) map.set(prop, val);
    });
  };
  push(a); push(b);
  return Array.from(map.entries()).map(([k, v]) => `${k}: ${v}`).join('; ');
}
