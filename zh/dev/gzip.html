<script>
GZI18n.register({
  en: {

    toolDesc: '使用浏览器原生 CompressionStream API 以 GZIP、Brotli、Deflate 或 Deflate-raw 压缩和解压文本。免费、即时、不上传到服务器。',
    modeLabel: '模式', modeCompress: '压缩', modeDecompress: '解压',
    formatLabel: '算法', encodingLabel: '输出编码',
    autoLabel: '实时更新',
    inputLabel: '输入（文本或 Base64/Hex）', outputLabel: '输出',
    btnCompress: '压缩', btnDecompress: '解压', btnSwap: '互换 ⇄', btnExample: '示例', btnCopy: '复制', btnClear: '清空',
    errUnsupported: '当前浏览器不支持 CompressionStream。请使用现代浏览器（Chrome 80+、Firefox 113+、Safari 16.4+）。',
    errInput: '请先输入内容。',
    errDecode: '输入解码失败。请检查编码是否与输入匹配。',
    errGeneric: '错误：',
    origSize: '原始', newSize: '压缩后', ratio: '压缩率',
    step1: '选择模式 — 压缩可缩小文本，解压可还原。',
    step2: '选择算法（GZIP 最常见，Brotli 压缩率更高）和输出编码。',
    step3: '在输入框粘贴文本，结果即时显示在右侧。',
    step4: '复制结果，或点击互换进行往返解压验证。',
  }
});

const { $, copyText, t } = GZ;
let running = false;

// Pre-populate mode options text via i18n
function refreshLabels() {
  $('#lbl-mode').textContent = t('modeLabel');
  $('#lbl-format').textContent = t('formatLabel');
  $('#lbl-encoding').textContent = t('encodingLabel');
  $('#lbl-auto').textContent = t('autoLabel');
  $('#lbl-in').textContent = t('inputLabel');
  $('#lbl-out').textContent = t('outputLabel');
  const modeSel = $('#mode');
  modeSel.options[0].textContent = t('modeCompress');
  modeSel.options[1].textContent = t('modeDecompress');
}

function setStatus(html) { $('#status').innerHTML = html; }

// ---- Helpers ----
function strToBytes(s) {
  return new TextEncoder().encode(s);
}
function bytesToStr(b) {
  return new TextDecoder().decode(b);
}
function bytesToBase64(bytes) {
  let bin = '';
  const chunk = 0x8000;
  for (let i = 0; i < bytes.length; i += chunk) {
    bin += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
  }
  return btoa(bin);
}
function base64ToBytes(b64) {
  const bin = atob(b64.replace(/\s+/g, ''));
  const len = bin.length;
  const bytes = new Uint8Array(len);
  for (let i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}
function bytesToHex(bytes) {
  let s = '';
  for (let i = 0; i < bytes.length; i++) s += bytes[i].toString(16).padStart(2, '0');
  return s;
}
function hexToBytes(hex) {
  const clean = hex.replace(/\s+/g, '');
  const len = clean.length / 2;
  const out = new Uint8Array(len);
  for (let i = 0; i < len; i++) out[i] = parseInt(clean.substr(i * 2, 2), 16);
  return out;
}

function encodeBytes(bytes, encoding) {
  if (encoding === 'base64') return bytesToBase64(bytes);
  if (encoding === 'hex') return bytesToHex(bytes);
  // utf8
  return bytesToStr(bytes);
}
function decodeToBytes(text, encoding) {
  if (encoding === 'base64') return base64ToBytes(text);
  if (encoding === 'hex') return hexToBytes(text);
  return strToBytes(text);
}

async function compress(bytes, format) {
  const cs = new CompressionStream(format);
  const w = cs.writable.getWriter();
  w.write(bytes);
  w.close();
  const out = await new Response(cs.readable).arrayBuffer();
  return new Uint8Array(out);
}
async function decompress(bytes, format) {
  const ds = new DecompressionStream(format);
  const w = ds.writable.getWriter();
  w.write(bytes);
  w.close();
  const out = await new Response(ds.readable).arrayBuffer();
  return new Uint8Array(out);
}

function isSupported() {
  return typeof CompressionStream !== 'undefined' && typeof DecompressionStream !== 'undefined';
}

function fmtSize(n) {
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(2) + ' KB';
  return (n / (1024 * 1024)).toFixed(2) + ' MB';
}

async function run() {
  if (running) return;
  if (!isSupported()) { setStatus(`<span style="color:var(--gz-accent)">${t('errUnsupported')}</span>`); return; }
  const inp = $('#input').value;
  if (!inp.trim()) { $('#output').textContent = ''; setStatus(''); return; }
  running = true;
  const mode = $('#mode').value;
  const format = $('#format').value;
  const encoding = $('#encoding').value;
  try {
    const inBytes = decodeToBytes(inp, mode === 'compress' ? 'utf8' : encoding);
    let outBytes;
    if (mode === 'compress') outBytes = await compress(inBytes, format);
    else outBytes = await decompress(inBytes, format);
    const outText = encodeBytes(outBytes, mode === 'compress' ? encoding : 'utf8');
    $('#output').textContent = outText;
    const inSize = inBytes.length, outSize = outBytes.length;
    const ratio = inSize ? (100 * (1 - outSize / inSize)).toFixed(1) : '0';
    const arrow = mode === 'compress' ? '→' : '←';
    setStatus(`<div class="gz-stats">
      <span class="pill">${t('origSize')}: <b>${fmtSize(inSize)}</b></span>
      <span class="pill">${t('newSize')}: <b>${fmtSize(outSize)}</b></span>
      <span class="pill">${t('ratio')}: <b>${ratio}%</b></span>
    </div>`);
  } catch (e) {
    setStatus(`<span style="color:var(--gz-accent)">${t('errGeneric')}${e.message}</span>`);
  } finally {
    running = false;
  }
}

function swap() {
  const out = $('#output').textContent;
  if (!out) return;
  $('#input').value = out;
  $('#mode').value = $('#mode').value === 'compress' ? 'decompress' : 'compress';
  run();
}

function loadExample() {
  $('#mode').value = 'compress';
  $('#format').value = 'gzip';
  $('#encoding').value = 'base64';
  $('#input').value = 'GZIP is a file format and software application used for file compression and decompression.\n\nIt uses the DEFLATE algorithm which combines LZ77 and Huffman coding. GZIP is widely used for HTTP content-encoding and can compress text files to about 20-30% of their original size.\n\nThis paragraph repeats itself intentionally so the compressor has something to work with. This paragraph repeats itself intentionally so the compressor has something to work with. This paragraph repeats itself intentionally so the compressor has something to work with.';
  run();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; setStatus(''); }

['input', 'mode', 'format', 'encoding'].forEach(id => {
  $('#' + id).addEventListener('input', () => { if ($('#autoUpdate').checked) run(); });
  $('#' + id).addEventListener('change', () => { if ($('#autoUpdate').checked) run(); });
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="run()">${t('btnCompress')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="swap()">${t('btnSwap')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('btnExample')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('btnCopy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('btnClear')}</button>`;

refreshLabels();
if (!isSupported()) setStatus(`<span style="color:var(--gz-accent)">${t('errUnsupported')}</span>`);

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'🔐', href:'/dev/base64.html', name:'Base64'},
    {icon:'📄', href:'/dev/xml-formatter.html', name:'XML Formatter'},
    {icon:'#️⃣', href:'/dev/hash.html', name:'Hash Generator'},
  ]
});
</script>
