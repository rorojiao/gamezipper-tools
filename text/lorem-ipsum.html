<style>
.opts{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:1rem}
.opts label{color:var(--text2);font-size:.85rem}
.opts select,.opts input[type=number]{background:var(--glass2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:var(--radius-sm);font-size:.85rem}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Lorem Ipsum Generator","description":"Generate Lorem Ipsum placeholder text for designs and mockups. Customize paragraph length and count. Free online lorem ipsum generator.","url":"https://tools.gamezipper.com/text/lorem-ipsum.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
</head>
<body>
<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="opts" id="opts"></div>
    <div class="gz-toolbar" id="toolbar"></div>
    <textarea id="output" readonly rows="14" style="width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;color:var(--text);font-size:.9rem;resize:vertical"></textarea>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{toolTitle:'Lorem Ipsum Generator',toolDesc:'Generate placeholder text in paragraphs, sentences, or words.',
    typePara:'Paragraphs',typeSent:'Sentences',typeWord:'Words',amount:'Amount',startLorem:'Start with "Lorem ipsum..."',
    step1:'Select the type: paragraphs, sentences, or words',step2:'Set the amount you need',step3:'Click Generate and copy the result'},
  zh:{toolTitle:'Lorem Ipsum 生成器',toolDesc:'按段落、句子或单词数量生成占位文本。',
    typePara:'段落',typeSent:'句子',typeWord:'单词',amount:'数量',startLorem:'以 "Lorem ipsum..." 开头',
    step1:'选择类型：段落、句子或单词',step2:'设置需要的数量',step3:'点击生成并复制结果'}
});
const {$,copyText,t}=GZ;
const WORDS='lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua enim ad minim veniam quis nostrud exercitation ullamco laboris nisi aliquip ex ea commodo consequat duis aute irure in reprehenderit voluptate velit esse cillum fugiat nulla pariatur excepteur sint occaecat cupidatat non proident sunt culpa qui officia deserunt mollit anim id est laborum'.split(' ');
function rw(){return WORDS[Math.random()*WORDS.length|0]}
function sent(n){let w=[];for(let i=0;i<(n||8+Math.random()*10|0);i++)w.push(rw());w[0]=w[0][0].toUpperCase()+w[0].slice(1);return w.join(' ')+'.';}
function para(){return Array.from({length:4+Math.random()*4|0},()=>sent()).join(' ');}
function gen(){
  const type=$('#type').value,n=+$('#amount').value||3,start=$('#startLorem').checked;
  let result='';
  if(type==='para')result=Array.from({length:n},()=>para()).join('\n\n');
  else if(type==='sent')result=Array.from({length:n},()=>sent()).join(' ');
  else result=Array.from({length:n},()=>rw()).join(' ');
  if(start&&result.length>11)result='Lorem ipsum dolor sit amet, '+result.slice(result.indexOf(' ',5)+1);
  $('#output').value=result;
}
$('#opts').innerHTML=`<label>${t('typePara')}:</label><select id="type"><option value="para">${t('typePara')}</option><option value="sent">${t('typeSent')}</option><option value="word">${t('typeWord')}</option></select><label>${t('amount')}:</label><input type="number" id="amount" value="3" min="1" max="100"><label><input type="checkbox" id="startLorem" checked> ${t('startLorem')}</label>`;
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="gen()">${t('generate')}</button><button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button><button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>`;
function loadExample(){$('#type').value='para';$('#amount').value=3;gen();}
GZ.renderToolPage({category:'text',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3'],related:[
  {icon:'🔢',href:'/text/letter-counter.html',name:'Letter Counter'},
  {icon:'🔠',href:'/text/case-converter.html',name:'Case Converter'},
  {icon:'📝',href:'/text/markdown.html',name:'Markdown Preview'},
]});
gen();
</script>
<script>new Image().src="https://site-analytics.cap.1ktower.com/hit?s=tools.gamezipper.com&p="+encodeURIComponent(location.pathname);</script>
</body>
</html>
