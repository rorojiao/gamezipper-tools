<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is loan amortization?", "acceptedAnswer": {"@type": "Answer", "text": "Loan amortization is the process of spreading a loan into a series of fixed payments over time. Each payment covers both the interest accrued that period and a portion of the principal. Early payments are mostly interest; later payments are mostly principal. The schedule shows this breakdown for every payment."}}, {"@type": "Question", "name": "How is the monthly payment calculated?", "acceptedAnswer": {"@type": "Answer", "text": "The monthly payment (EMI) is calculated using the standard amortization formula: M = P * (r(1+r)^n) / ((1+r)^n - 1), where P is the principal, r is the monthly interest rate (annual rate / 12 / 100), and n is the total number of payments (years × 12). This tool shows the formula, the result, and the full schedule."}}, {"@type": "Question", "name": "Can I export the schedule?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Click 'Export CSV' to download the full payment-by-payment schedule as a CSV file you can open in Excel, Google Sheets, or any spreadsheet app. You can also print the page directly from the browser (Ctrl+P / Cmd+P)."}}, {"@type": "Question", "name": "Does this include extra payments or prepayments?", "acceptedAnswer": {"@type": "Answer", "text": "This tool generates the standard equal-payment amortization schedule. For extra payments and prepay scenarios, use the regular Loan & EMI Calculator which supports those options."}}]}</script>

<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Loan Amortization Schedule',
    toolDesc: 'Generate a full loan amortization schedule with payment-by-payment principal, interest, and balance. Export to CSV or print.',
    lblAmount: 'Loan amount ($)', lblRate: 'Annual interest rate (%)', lblYears: 'Loan term (years)', lblFreq: 'Payment frequency',
    tip: 'Tip: Early in the loan, most of your payment goes to interest. Over time, the principal portion grows and the interest shrinks — the schedule shows this transition clearly.',
    step1: 'Enter the loan amount, interest rate, term in years and payment frequency',
    step2: 'Review the summary tiles showing monthly payment, total interest, and payoff date',
    step3: 'Scroll through the full schedule to see principal, interest and balance for every payment',
    step4: 'Export the schedule to CSV, copy the table, or print for your records',
  },
  zh: {
    toolTitle: '贷款摊销表生成器',
    toolDesc: '生成完整的贷款摊销表，逐期展示本金、利息和余额。支持 CSV 导出或打印。',
    lblAmount: '贷款金额 ($)', lblRate: '年利率 (%)', lblYears: '贷款期限 (年)', lblFreq: '还款频率',
    tip: '提示：贷款初期，大部分还款用于支付利息。随着时间推移，本金部分逐渐增加，利息部分减少 — 摊销表清晰展示这一变化。',
    step1: '输入贷款金额、年利率、贷款年限和还款频率',
    step2: '查看汇总信息：月供、总利息和还清日期',
    step3: '滚动查看完整摊销表，了解每期本金、利息和余额',
    step4: '将摊销表导出为 CSV、复制或打印保存',
  }
});

const { $, t, copyText } = GZ;

function fmt(n){
  return '$' + n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtInt(n){ return Math.round(n).toLocaleString(); }

function calc(){
  const P = +$('#amount').value;
  const annualRate = +$('#rate').value;
  const years = +$('#years').value;
  const freq = +$('#freq').value;
  if (!P || !annualRate || !years || !freq) {
    $('#summary').innerHTML = '';
    $('#schedule').innerHTML = '';
    return;
  }
  const n = years * freq;
  const r = (annualRate / 100) / freq;
  let M;
  if (r === 0) M = P / n;
  else M = P * (r * Math.pow(1+r, n)) / (Math.pow(1+r, n) - 1);
  const totalPaid = M * n;
  const totalInterest = totalPaid - P;
  // Payoff date
  const now = new Date();
  const monthsToAdd = Math.round((n/freq) * 12);
  const payoff = new Date(now.getFullYear(), now.getMonth() + monthsToAdd, now.getDate());
  const summary = [
    { num: fmt(M), lbl: 'Payment per period', highlight: true },
    { num: freq, lbl: 'Payments per year' },
    { num: n, lbl: 'Total payments' },
    { num: fmt(P), lbl: 'Loan amount' },
    { num: fmt(totalInterest), lbl: 'Total interest' },
    { num: fmt(totalPaid), lbl: 'Total paid' },
    { num: (totalInterest/P*100).toFixed(1) + '%', lbl: 'Interest ratio' },
    { num: payoff.toLocaleDateString(), lbl: 'Payoff date' },
  ];
  $('#summary').innerHTML = summary.map(s => `<div class="la-tile ${s.highlight?'highlight':''}"><div class="num">${s.num}</div><div class="lbl">${s.lbl}</div></div>`).join('');
  // Build schedule
  let balance = P;
  let rows = '';
  rows += '<thead><tr><th>#</th><th>Date</th><th>Payment</th><th>Principal</th><th>Interest</th><th>Balance</th></tr></thead><tbody>';
  for (let i=1; i<=n; i++){
    const interest = balance * r;
    let principal = M - interest;
    if (i === n) principal = balance; // last payment
    balance -= principal;
    if (balance < 0.01) balance = 0;
    const periodMonths = Math.round((i/freq) * 12);
    const d = new Date(now.getFullYear(), now.getMonth() + periodMonths, now.getDate());
    const dateStr = d.toLocaleDateString();
    rows += `<tr><td>${i}</td><td>${dateStr}</td><td>${fmt(M)}</td><td class="principal">${fmt(principal)}</td><td class="interest">${fmt(interest)}</td><td class="balance">${fmt(balance)}</td></tr>`;
  }
  rows += '</tbody>';
  $('#schedule').innerHTML = rows;
  window._lastSchedule = summary.concat([{ num: 'Full schedule', lbl: 'see table below' }]);
  window._lastCSV = generateCSV(P, r, n, M, freq);
}

function generateCSV(P, r, n, M, freq){
  let csv = '#,Date,Payment,Principal,Interest,Balance\n';
  let balance = P;
  const now = new Date();
  for (let i=1; i<=n; i++){
    const interest = balance * r;
    let principal = M - interest;
    if (i === n) principal = balance;
    balance -= principal;
    if (balance < 0.01) balance = 0;
    const periodMonths = Math.round((i/freq) * 12);
    const d = new Date(now.getFullYear(), now.getMonth() + periodMonths, now.getDate());
    csv += `${i},${d.toISOString().slice(0,10)},${M.toFixed(2)},${principal.toFixed(2)},${interest.toFixed(2)},${balance.toFixed(2)}\n`;
  }
  return csv;
}

$('#amount').addEventListener('input', calc);
$('#rate').addEventListener('input', calc);
$('#years').addEventListener('input', calc);
$('#freq').addEventListener('change', calc);

$('#btnExport').onclick = () => {
  const csv = window._lastCSV;
  if (!csv) return;
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'loan-amortization-schedule.csv';
  a.click();
  URL.revokeObjectURL(a.href);
};
$('#btnCopy').onclick = () => {
  const tbl = $('#schedule');
  let txt = '';
  tbl.querySelectorAll('tr').forEach(tr => {
    txt += [...tr.querySelectorAll('th,td')].map(td => td.textContent.trim()).join('\t') + '\n';
  });
  copyText(txt);
};

function init(){
  $('#lbl-amount').textContent = t('lblAmount');
  $('#lbl-rate').textContent = t('lblRate');
  $('#lbl-years').textContent = t('lblYears');
  $('#lbl-freq').textContent = t('lblFreq');
  $('#tip-text').textContent = t('tip');
  calc();
}

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan & EMI Calculator'},
    {icon:'🏠', href:'/calc/mortgage-calculator.html', name:'Mortgage Calculator'},
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
    {icon:'💰', href:'/calc/roi.html', name:'ROI Calculator'},
  ]
});
init();
</script>
