<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What are breadcrumbs in web design?", "acceptedAnswer": {"@type": "Answer", "text": "Breadcrumbs are a navigational trail, usually shown near the top of a page, that shows the user's location in the site hierarchy (for example Home > Products > Shoes). They help users understand where they are and navigate back up."}}, {"@type": "Question", "name": "Which breadcrumb separators can I use?", "acceptedAnswer": {"@type": "Answer", "text": "This generator supports six separators: chevron (›), slash (/), arrow (→), bullet (•), pipe (|) and a custom character. Each is inserted with CSS via the ::before pseudo-element so the HTML stays clean and semantic."}}, {"@type": "Question", "name": "Are the breadcrumbs accessible and responsive?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The generated markup uses a semantic ordered list <ol>, the last item is marked aria-current=\"page\", and the layout wraps on small screens thanks to flex-wrap. You can also embed BreadcrumbList JSON-LD schema for richer Google results."}}, {"@type": "Question", "name": "Is the CSS Breadcrumb Generator free?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The tool is completely free, runs entirely in your browser and never uploads your data. Copy the generated HTML and CSS into any project, commercial or personal."}}]}</script>

<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <p style="color:var(--text2);font-size:.85rem;margin-bottom:6px" id="sepLabel"></p>
    <div class="sep-grid" id="separators"></div>
    <div class="controls" id="controls"></div>
    <p style="color:var(--text2);font-size:.82rem;margin:0 0 4px" id="itemsLabel"></p>
    <textarea id="items" spellcheck="false"></textarea>
    <div class="preview-area"><div id="preview"></div></div>
    <div class="code-out" id="code"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{toolTitle:'CSS Breadcrumb Generator',toolDesc:'Build responsive CSS breadcrumb navigation with live preview. Six separators, custom colors, hover and active state — copy production-ready HTML + CSS, optional JSON-LD schema.',
    separator:'Separator',linkColor:'Link color',hoverColor:'Hover color',activeColor:'Current page',fontSize:'Font size',items:'Items (one per line)',
    step1:'Pick a separator (chevron, slash, arrow, bullet, pipe or custom)',step2:'Set link, hover and current-page colors',step3:'List your breadcrumb items, one per line',step4:'Copy the HTML + CSS into your project'},
  zh:{toolTitle:'CSS 面包屑导航生成器',toolDesc:'可视化生成响应式 CSS 面包屑导航。6 种分隔符、自定义颜色、悬停和当前页状态 — 复制生产可用 HTML + CSS，可选 JSON-LD 结构化数据。',
    separator:'分隔符',linkColor:'链接颜色',hoverColor:'悬停颜色',activeColor:'当前页颜色',fontSize:'字号',items:'导航项（每行一个）',
    step1:'选择分隔符（箭头、斜杠、右尖、圆点、竖线或自定义）',step2:'设置链接、悬停和当前页颜色',step3:'列出面包屑项，每行一个',step4:'复制 HTML + CSS 到你的项目'}
});
const {$,copyText,t}=GZ;
let sep='chevron',linkColor='#4ecdc4',hoverColor='#ffd93d',activeColor='#cccccc',fontSize=15;
const sepMap={chevron:'›',slash:'/',arrow:'→',bullet:'•',pipe:'|'};

function renderSeparators(){
  $('#separators').innerHTML=[
    ['chevron','›'],['slash','/'],['arrow','→'],['bullet','•'],['pipe','|'],['custom','✎']
  ].map(s=>`<button class="${s[0]===sep?'active':''}" onclick="sep='${s[0]}';renderSeparators();update()">${s[1]}</button>`).join('');
}

function getSepChar(){
  if(sep==='custom'){
    return $('#customSep')?($('#customSep').value||'›'):'›';
  }
  return sepMap[sep]||'›';
}

function getItems(){
  return $('#items').value.split('\n').map(s=>s.trim()).filter(Boolean);
}

function buildPreview(){
  const items=getItems();
  const sepC=getSepChar();
  if(items.length===0){$('#preview').innerHTML='<span style="color:var(--text3)">—</span>';return;}
  let html=`<ol class="gz-breadcrumb" style="font-size:${fontSize}px">`;
  items.forEach((it,i)=>{
    const isLast=i===items.length-1;
    if(i>0)html+=`<li><span style="color:var(--text3);padding:0 8px">${sepC}</span></li>`;
    if(isLast){
      html+=`<li class="gz-current" style="color:${activeColor};font-weight:600">${escapeHtml(it)}</li>`;
    } else {
      html+=`<li><a href="#" style="color:${linkColor}" onmouseover="this.style.color='${hoverColor}'" onmouseout="this.style.color='${linkColor}'">${escapeHtml(it)}</a></li>`;
    }
  });
  html+=`</ol>`;
  $('#preview').innerHTML=html;
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function buildCode(){
  const items=getItems();
  const sepC=getSepChar();
  let html=`<ol class="breadcrumb">\n`;
  items.forEach((it,i)=>{
    const isLast=i===items.length-1;
    if(isLast){
      html+=`  <li class="breadcrumb-current" aria-current="page">${escapeHtml(it)}</li>\n`;
    } else {
      html+=`  <li><a href="#">${escapeHtml(it)}</a></li>\n`;
    }
  });
  html+=`</ol>`;
  const css=`.breadcrumb {\n  display: flex;\n  flex-wrap: wrap;\n  align-items: center;\n  gap: 0;\n  list-style: none;\n  padding: 0;\n  margin: 0;\n  font-size: ${fontSize}px;\n}\n.breadcrumb li {\n  display: flex;\n  align-items: center;\n}\n.breadcrumb li + li::before {\n  content: "${sepC}";\n  padding: 0 10px;\n  color: #888;\n}\n.breadcrumb a {\n  color: ${linkColor};\n  text-decoration: none;\n}\n.breadcrumb a:hover {\n  color: ${hoverColor};\n}\n.breadcrumb-current {\n  color: ${activeColor};\n  font-weight: 600;\n}`;
  $('#code').textContent=`<!-- HTML -->\n${html}\n\n<!-- CSS -->\n${css}`;
}

function update(){buildPreview();buildCode();}

function rebuildControls(){
  $('#controls').innerHTML=`
    <label>${t('linkColor')}: <input type="color" value="${linkColor}" oninput="linkColor=this.value;update()"></label>
    <label>${t('hoverColor')}: <input type="color" value="${hoverColor}" oninput="hoverColor=this.value;update()"></label>
    <label>${t('activeColor')}: <input type="color" value="${activeColor}" oninput="activeColor=this.value;update()"></label>
    <label>${t('fontSize')}: <input type="range" min="11" max="24" value="${fontSize}" oninput="fontSize=+this.value;$('#fv').textContent=this.value;update()"><span id="fv">${fontSize}</span>px</label>
    ${sep==='custom'?`<label>✎: <input type="text" id="customSep" value="›" maxlength="2" style="width:50px;text-align:center" oninput="update()"></label>`:''}`;
}

$('#sepLabel').textContent=t('separator')+':';
$('#itemsLabel').textContent=t('items');
$('#items').value='Home\nProducts\nShoes\nRunning Sneakers';
$('#items').addEventListener('input',update);
$('#toolbar').innerHTML=`<button class="gz-btn gz-btn-secondary" onclick="sep='chevron';linkColor='#4ecdc4';hoverColor='#ffd93d';activeColor='#cccccc';fontSize=15;\$('#items').value='Home\\nProducts\\nShoes\\nRunning Sneakers';renderSeparators();rebuildControls();update()">${t('example')}</button><button class="gz-btn" onclick="copyText($('#code').textContent)">${t('copy')}</button>`;
// re-render controls when sep changes (for custom field)
const origRender=renderSeparators;
renderSeparators=function(){
  origRender();
  rebuildControls();
};
renderSeparators();update();
GZ.renderToolPage({category:'css',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[
  {icon:'🧭',href:'/css-tools/nav-generator.html',name:'Navbar'},
  {icon:'📋',href:'/css-tools/accordion.html',name:'Accordion'},
  {icon:'🃏',href:'/css-tools/card.html',name:'Card'},
]});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
