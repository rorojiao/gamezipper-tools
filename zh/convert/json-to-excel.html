const { $, copyText, t } = GZ;

function flatten(obj, prefix, out) {
  for (const [k, v] of Object.entries(obj)) {
    const key = prefix ? prefix + '.' + k : k;
    if (v !== null && typeof v === 'object' && !Array.isArray(v)) {
      flatten(v, key, out);
    } else {
      out[key] = Array.isArray(v) ? JSON.stringify(v) : v;
    }
  }
  return out;
}

function parseJSON(text) {
  let data = JSON.parse(text);
  if (!Array.isArray(data)) {
    // wrap single object
    if (typeof data === 'object' && data !== null) data = [data];
    else throw new Error('Expected JSON array of objects');
  }
  return data;
}

function collectColumns(rows) {
  const cols = [];
  const seen = new Set();
  for (const row of rows) {
    if (row && typeof row === 'object') {
      const flat = flatten(row, '', {});
      for (const k of Object.keys(flat)) {
        if (!seen.has(k)) { seen.add(k); cols.push(k); }
      }
    }
  }
  return cols;
}

function escapeCSV(v, delim) {
  if (v === null || v === undefined) return '';
  let s = typeof v === 'object' ? JSON.stringify(v) : String(v);
  if (/[",\n\r]/.test(s) || s.includes(delim)) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function buildCSV(rows, cols, delim) {
  const lines = [cols.map(c => escapeCSV(c, delim)).join(delim)];
  for (const row of rows) {
    const flat = (row && typeof row === 'object') ? flatten(row, '', {}) : { value: row };
    lines.push(cols.map(c => escapeCSV(flat[c] ?? '', delim)).join(delim));
  }
  return lines.join('\n');
}

function xmlEscape(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildXLS(rows, cols) {
  let xml = '<?xml version="1.0"?>\n';
  xml += '<?mso-application progid="Excel.Sheet"?>\n';
  xml += '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">\n';
  xml += '<Worksheet ss:Name="Sheet1"><Table>\n';
  // Header
  xml += '<Row>' + cols.map(c => '<Cell><Data ss:Type="String">' + xmlEscape(c) + '</Data></Cell>').join('') + '</Row>\n';
  for (const row of rows) {
    const flat = (row && typeof row === 'object') ? flatten(row, '', {}) : { value: row };
    const cells = cols.map(c => {
      const v = flat[c];
      if (v === null || v === undefined || v === '') return '<Cell><Data ss:Type="String"></Data></Cell>';
      const num = Number(v);
      if (typeof v === 'number' || (!isNaN(num) && v !== '' && typeof v !== 'boolean' && !/^0\d+/.test(v))) {
        return '<Cell><Data ss:Type="Number">' + xmlEscape(num) + '</Data></Cell>';
      }
      return '<Cell><Data ss:Type="String">' + xmlEscape(v) + '</Data></Cell>';
    });
    xml += '<Row>' + cells.join('') + '</Row>\n';
  }
  xml += '</Table></Worksheet></Workbook>';
  return xml;
}

function renderPreview(rows, cols) {
  if (!cols.length) { $('#preview').innerHTML = ''; return; }
  let html = '<table><thead><tr>' + cols.map(c => '<th>' + escapeHtml(c) + '</th>').join('') + '</tr></thead><tbody>';
  const max = Math.min(rows.length, 100);
  for (let i = 0; i < max; i++) {
    const flat = (rows[i] && typeof rows[i] === 'object') ? flatten(rows[i], '', {}) : { value: rows[i] };
    html += '<tr>' + cols.map(c => '<td title="' + escapeHtml(flat[c] ?? '') + '">' + escapeHtml(flat[c] ?? '') + '</td>').join('') + '</tr>';
  }
  html += '</tbody></table>';
  if (rows.length > 100) html += '<p style="margin-top:8px;color:var(--text2);font-size:.85em">Showing first 100 of ' + rows.length + ' rows.</p>';
  $('#preview').innerHTML = html;
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let lastRows = [], lastCols = [];

function doConvert() {
  const text = $('#input').value.trim();
  $('#output').textContent = '';
  $('#preview').innerHTML = '';
  if (!text) { $('#status').textContent = ''; return; }
  try {
    const rows = parseJSON(text);
    lastRows = rows;
    lastCols = collectColumns(rows);
    $('#status').innerHTML = '<span style="color:var(--gz-success)">' + t('valid').replace('%1', rows.length).replace('%2', lastCols.length) + '</span>';
    renderPreview(rows, lastCols);
    updateOutputPreview();
  } catch (e) {
    $('#status').innerHTML = '<span style="color:var(--gz-error)">' + t('invalid').replace('%1', e.message) + '</span>';
    lastRows = []; lastCols = [];
  }
}

function updateOutputPreview() {
  if (!lastRows.length) { $('#output').textContent = ''; return; }
  const fmt = $('#format').value;
  const delim = $('#delimiter').value;
  if (fmt === 'csv' || fmt === 'tsv') {
    $('#output').textContent = buildCSV(lastRows, lastCols, delim);
  } else {
    $('#output').textContent = buildXLS(lastRows, lastCols);
  }
}

function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

function doDownload() {
  if (!lastRows.length) { doConvert(); if (!lastRows.length) return; }
  const fmt = $('#format').value;
  const delim = $('#delimiter').value;
  const ts = new Date().toISOString().slice(0,10);
  if (fmt === 'csv') {
    downloadFile('data-' + ts + '.csv', buildCSV(lastRows, lastCols, delim), 'text/csv;charset=utf-8');
  } else if (fmt === 'tsv') {
    downloadFile('data-' + ts + '.tsv', buildCSV(lastRows, lastCols, '\t'), 'text/tab-separated-values;charset=utf-8');
  } else {
    downloadFile('data-' + ts + '.xls', buildXLS(lastRows, lastCols), 'application/vnd.ms-excel;charset=utf-8');
  }
}

function loadExample() {
  $('#input').value = `[
  {"id": 1, "name": "Alice Johnson", "email": "alice@example.com", "age": 30, "city": "Tokyo", "address": {"street": "1-2-3 Shibuya", "zip": "150-0002"}, "tags": ["vip", "early-adopter"]},
  {"id": 2, "name": "Bob Smith", "email": "bob@example.com", "age": 25, "city": "London", "address": {"street": "10 Downing Rd", "zip": "SW1A 2AA"}, "tags": ["new"]},
  {"id": 3, "name": "Carol Williams", "email": "carol@example.com", "age": 35, "city": "New York", "address": {"street": "500 Park Ave", "zip": "10022"}, "tags": ["vip", "enterprise"]}
]`;
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#preview').innerHTML = ''; $('#status').textContent = ''; lastRows = []; lastCols = []; }

$('#input').addEventListener('input', doConvert);
$('#format').addEventListener('change', updateOutputPreview);
$('#delimiter').addEventListener('change', updateOutputPreview);

$('#lbl-format').textContent = t('format');
