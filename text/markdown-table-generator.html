<script>
GZI18n.register({
  en: {
    toolTitle: 'Markdown Table Generator',
    toolDesc: 'Create clean, aligned GitHub-flavored Markdown tables from CSV, TSV or typed grid data. Set per-column alignment and copy instantly — free and private.',
    rows: 'Rows', cols: 'Cols',
    addRow: '+ Row', addCol: '+ Col', delRow: '− Row', delCol: '− Col',
    align: 'Alignment', left: 'Left', center: 'Center', right: 'Right',
    parse: 'Parse Data', generate: 'Generate Table',
    step1: 'Set the number of rows and columns, or paste CSV/TSV data and click Parse',
    step2: 'Fill in the grid cells with your table data',
    step3: 'Choose alignment (left/center/right) for each column',
    step4: 'Click Generate, then Copy the Markdown table',
  },
  zh: {
    toolTitle: 'Markdown 表格生成器',
    toolDesc: '从 CSV、TSV 或手动输入的网格数据创建整洁对齐的 GitHub 风格 Markdown 表格。可设置每列对齐方式并即时复制 — 免费且私密。',
    rows: '行', cols: '列',
    addRow: '+ 行', addCol: '+ 列', delRow: '− 行', delCol: '− 列',
    align: '对齐', left: '左', center: '中', right: '右',
    parse: '解析数据', generate: '生成表格',
    step1: '设置行列数，或粘贴 CSV/TSV 数据后点击「解析数据」',
    step2: '在网格单元格中填入表格数据',
    step3: '为每列选择对齐方式（左/中/右）',
    step4: '点击「生成表格」，然后复制 Markdown 表格',
  }
});

const { $, copyText, t } = GZ;
let rows = 3, cols = 3;
let aligns = []; // per column: 'L','C','R'
let data = []; // 2D array

function initData() {
  data = [];
  for (let r = 0; r < rows; r++) {
    const row = [];
    for (let c = 0; c < cols; c++) row.push(data[r] && data[r][c] !== undefined ? data[r][c] : '');
    data.push(row);
  }
  while (aligns.length < cols) aligns.push('L');
  aligns.length = cols;
}

function renderGrid() {
  const g = $('#grid');
  g.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  g.innerHTML = '';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const inp = document.createElement('input');
      inp.className = 'cell';
      inp.type = 'text';
      inp.value = data[r] ? (data[r][c] || '') : '';
      inp.dataset.r = r; inp.dataset.c = c;
      inp.addEventListener('input', e => {
        const rr = +e.target.dataset.r, cc = +e.target.dataset.c;
        if (!data[rr]) data[rr] = [];
        data[rr][cc] = e.target.value;
      });
      g.appendChild(inp);
    }
  }
}

function escCell(s) {
  return String(s == null ? '' : s).replace(/\|/g, '\\|').replace(/\n/g, ' ').trim();
}

function generate() {
  // sync data from grid (in case)
  $$('.cell').forEach(el => {
    const r = +el.dataset.r, c = +el.dataset.c;
    if (!data[r]) data[r] = [];
    data[r][c] = el.value;
  });
  const maxLen = [];
  for (let c = 0; c < cols; c++) {
    let ml = 3;
    for (let r = 0; r < rows; r++) {
      const v = escCell(data[r] ? data[r][c] : '');
      if (v.length > ml) ml = v.length;
    }
    maxLen[c] = ml;
  }
  const pad = (s, c) => {
    const v = escCell(s);
    const target = maxLen[c];
    const a = aligns[c] || 'L';
    if (a === 'C') { const extra = target - v.length, l = Math.floor(extra / 2), rr = extra - l; return ' '.repeat(l) + v + ' '.repeat(rr); }
    if (a === 'R') return v.padStart(target) + ' ';
    return ' ' + v.padEnd(target);
  };
  const lines = [];
  // header row
  let header = '|';
  for (let c = 0; c < cols; c++) header += pad(data[0] ? data[0][c] : '', c) + '|';
  lines.push(header);
  // separator
  let sep = '|';
  for (let c = 0; c < cols; c++) {
    const w = maxLen[c];
    const a = aligns[c] || 'L';
    if (a === 'C') sep += ':' + '-'.repeat(Math.max(w, 3)) + ':|';
    else if (a === 'R') sep += '-'.repeat(Math.max(w, 3)) + ':|';
    else sep += ':' + '-'.repeat(Math.max(w, 3)) + '|';
  }
  lines.push(sep);
  // body
  for (let r = 1; r < rows; r++) {
    let line = '|';
    for (let c = 0; c < cols; c++) line += pad(data[r] ? data[r][c] : '', c) + '|';
    lines.push(line);
  }
  $('#output').textContent = lines.join('\n');
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${lines.length} ${t('rows').toLowerCase()}</span>`;
}

function parseInput() {
  const raw = $('#input').value.trim();
  if (!raw) return;
  let sep = '\t';
  if (raw.indexOf('\t') === -1) {
    if (raw.indexOf(',') !== -1) sep = ',';
    else if (raw.indexOf('|') !== -1) sep = '|';
    else sep = '\n';
  }
  const lines = raw.split(/\r?\n/).filter(l => l.trim() !== '');
  data = lines.map(l => l.split(sep).map(c => c.trim().replace(/^"|"$/g, '')));
  rows = data.length;
  cols = Math.max(...data.map(r => r.length));
  // pad
  data.forEach(r => { while (r.length < cols) r.push(''); });
  while (aligns.length < cols) aligns.push('L');
  aligns.length = cols;
  renderGrid();
  generate();
}

function setAlign(c, a) { aligns[c] = a; generate(); }

function rebuildAlignControls() {
  const ga = $('#grid-actions');
  let html = '';
  for (let c = 0; c < cols; c++) {
    html += `<span style="display:inline-flex;align-items:center;gap:2px;font-size:.8em">C${c+1}:`;
    html += `<select class="gz-select" style="font-size:.8em;padding:2px 4px" onchange="setAlign(${c},this.value)">`;
    html += `<option value="L"${aligns[c]==='L'?' selected':''}>${t('left')}</option>`;
    html += `<option value="C"${aligns[c]==='C'?' selected':''}>${t('center')}</option>`;
    html += `<option value="R"${aligns[c]==='R'?' selected':''}>${t('right')}</option>`;
    html += `</select></span>`;
  }
  ga.innerHTML = html;
}

function loadExample() {
  $('#input').value = 'Name,Role,Country\nAlice,Engineer,USA\nBob,Designer,UK\nCarol,Manager,Japan';
  parseInput();
}

window.addRow = () => { rows++; initData(); renderGrid(); rebuildAlignControls(); };
window.addCol = () => { cols++; initData(); renderGrid(); rebuildAlignControls(); };
window.delRow = () => { if (rows > 2) { rows--; data.pop(); renderGrid(); } };
window.delCol = () => { if (cols > 1) { cols--; aligns.pop(); data.forEach(r => r.pop()); renderGrid(); rebuildAlignControls(); } };
window.setAlign = setAlign;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="parseInput()">${t('parse')}</button>
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <span style="flex:1"></span>
  <button class="gz-btn gz-btn-secondary" onclick="addRow()">${t('addRow')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="delRow()">${t('delRow')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="addCol()">${t('addCol')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="delCol()">${t('delCol')}</button>`;

initData();
renderGrid();
rebuildAlignControls();
generate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📄', href:'/text/markdown-to-html.html', name:'Markdown to HTML'},
    {icon:'📊', href:'/convert/csv-to-markdown.html', name:'CSV to Markdown'},
    {icon:'📑', href:'/text/html-to-markdown.html', name:'HTML to Markdown'},
    {icon:'📊', href:'/convert/html-table-to-markdown.html', name:'HTML Table to MD'},
  ]
});
</script>
