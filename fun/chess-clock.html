<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I use this chess clock?","acceptedAnswer":{"@type":"Answer","text":"Set the time control (minutes and increment type), press Start, then tap your side — or press the Spacebar — when your move is done. The clock switches to your opponent and their timer starts counting down."}},{"@type":"Question","name":"What is the difference between Fischer, Bronstein and delay increments?","acceptedAnswer":{"@type":"Answer","text":"Fischer (increment) adds a fixed number of seconds to your clock after every move. Bronstein adds the same seconds but only up to the time you actually used on that move. Delay waits a set number of seconds before your clock starts ticking each move."}},{"@type":"Question","name":"Can I use this for board games other than chess?","acceptedAnswer":{"@type":"Answer","text":"Yes. Set any base time and increment (or none). It works for Go, shogi, Scrabble, speed quizzes and any two-player or turn-based game that needs a countdown timer."}},{"@type":"Question","name":"Does this chess clock need the internet?","acceptedAnswer":{"@type":"Answer","text":"No. The clock runs entirely in your browser. Once the page is loaded it keeps perfect time even offline — no server, no account, no tracking."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Chess Clock & Game Timer',
    toolDesc: 'Free two-player chess clock with Fischer, Bronstein and delay increments. Tap your side or press Spacebar to switch turns — perfect for chess, blitz, board games and speed quizzes. Runs offline in your browser.',
    lblWhite: 'White', lblBlack: 'Black',
    lblMin: 'Minutes', lblSec: 'Seconds', lblIncType: 'Increment', lblInc: 'Inc. seconds',
    optNone: 'None', optFischer: 'Fischer (+)', optBronstein: 'Bronstein', optDelay: 'Delay (–)',
    startBtn: 'Start', pauseBtn: 'Pause', swapBtn: 'Swap Turn', resetBtn: 'Reset',
    movesLbl: 'moves',
    hint: 'Tip: tap the bottom clock or press Spacebar (the side about to move).',
    flag: 'Time out!',
    step1: 'Set the base time (minutes and seconds) and pick an increment type and amount',
    step2: 'Press Start — the bottom side (White) is the first to move',
    step3: 'When your move is done, tap your side or press Spacebar to pass the clock',
    step4: 'Press Pause to take a break, Swap to correct a mistake, and Reset to begin a new game',
  },
  zh: {
    toolTitle: '国际象棋钟 / 对弈计时器',
    toolDesc: '免费的双人对弈计时钟，支持费舍尔、布朗斯坦和延迟加秒。点击自己的时钟或按空格键切换回合 — 适合国际象棋、闪电战、桌游和抢答。浏览器离线可用。',
    lblWhite: '白方', lblBlack: '黑方',
    lblMin: '分钟', lblSec: '秒', lblIncType: '加秒方式', lblInc: '加秒数',
    optNone: '无', optFischer: '费舍尔 (+)', optBronstein: '布朗斯坦', optDelay: '延迟 (–)',
    startBtn: '开始', pauseBtn: '暂停', swapBtn: '交换回合', resetBtn: '重置',
    movesLbl: '手',
    hint: '提示：点击底部时钟或按空格键（轮到走子的一方）。',
    flag: '时间用尽！',
    step1: '设置基础时间（分钟和秒），并选择加秒方式和秒数',
    step2: '点击「开始」— 底部一方（白方）先走',
    step3: '走完一手后，点击自己的时钟或按空格键交还计时',
    step4: '点击「暂停」休息、「交换回合」纠正失误、「重置」开始新对局',
  }
});

const { $, t } = GZ;
const sideW = $('#sideW'), sideB = $('#sideB');
let state = null;

function initLabels(){
  $('#lblWhite').textContent = t('lblWhite');
  $('#lblBlack').textContent = t('lblBlack');
  $('#lblMin').textContent = t('lblMin');
  $('#lblSec').textContent = t('lblSec');
  $('#lblIncType').textContent = t('lblIncType');
  $('#lblInc').textContent = t('lblInc');
  $('#optNone').textContent = t('optNone');
  $('#optFischer').textContent = t('optFischer');
  $('#optBronstein').textContent = t('optBronstein');
  $('#optDelay').textContent = t('optDelay');
  $('#swapBtn').textContent = t('swapBtn');
  $('#hint').textContent = t('hint');
  // presets
  const presets = [
    {m:1,s:0,inc:0,label:'Bullet 1+0'},{m:3,s:0,inc:0,label:'Blitz 3+0'},
    {m:3,s:0,inc:2,label:'Blitz 3+2'},{m:5,s:0,inc:0,label:'Blitz 5+0'},
    {m:5,s:0,inc:3,label:'Blitz 5+3'},{m:10,s:0,inc:0,label:'Rapid 10+0'},
    {m:10,s:0,inc:5,label:'Rapid 10+5'},{m:15,s:10,inc:0,label:'Rapid 15+10'},
    {m:30,s:0,inc:0,label:'Classical 30'},
  ];
  $('#presets').innerHTML = presets.map(p => `<button onclick="preset(${p.m},${p.s},${p.inc})">${p.label}</button>`).join('');
}

function preset(m,s,inc){
  $('#minutes').value = m; $('#seconds').value = s; $('#inc').value = inc;
  reset();
}

function buildState(){
  const base = ($('#minutes').value||0)*60000 + ($('#seconds').value||0)*1000;
  const inc = ($('#inc').value||0)*1000;
  return {
    running:false, turn:'w', // whose clock is ticking / who is about to move
    w:{ms:base, moves:0, bronstein:inc, delayLeft:inc},
    b:{ms:base, moves:0, bronstein:inc, delayLeft:inc},
    inc, type:$('#incType').value, base, last:null,
  };
}

function reset(){
  state = buildState();
  $('#startBtn').textContent = t('startBtn');
  $('#startBtn').classList.remove('gz-btn-secondary');
  sideW.classList.remove('active','flagged'); sideB.classList.remove('active','flagged');
  render();
}

function startStop(){
  if(!state) state = buildState();
  if(state.flagged) { reset(); return; }
  state.running = !state.running;
  if(state.running){
    state.last = performance.now();
    $('#startBtn').textContent = t('pauseBtn');
    $('#startBtn').classList.add('gz-btn-secondary');
    if(state.turn === 'w') sideW.classList.add('active'); else sideB.classList.add('active');
  } else {
    $('#startBtn').textContent = t('startBtn');
    $('#startBtn').classList.remove('gz-btn-secondary');
    sideW.classList.remove('active'); sideB.classList.remove('active');
    // flush elapsed
    tick(true);
  }
}

// turn = the side that is currently MOVING (clock about to count down).
// On "press", that side ends its move and we switch.
function press(pressedBy){
  if(!state || !state.running) return;
  const s = state[state.turn];
  if(state.flagged) return;
  applyIncOnMove(s);
  s.moves++;
  state.turn = (state.turn === 'w') ? 'b' : 'w';
  // reset per-move delay/bronstein budget for new mover
  const ns = state[state.turn];
  ns.delayLeft = state.inc; ns.bronstein = state.inc;
  sideW.classList.toggle('active', state.turn==='w');
  sideB.classList.toggle('active', state.turn==='b');
}

function applyIncOnMove(s){
  if(state.type === 'fischer'){ s.ms += state.inc; }
  else if(state.type === 'bronstein'){
    // add inc but not more than used this move; tracked by delayLeft carry
    s.ms += Math.min(state.inc, s.bronstein);
  }
  // delay: no time added; handled in tick
}

function tick(forceFlush){
  if(!state) return;
  const now = performance.now();
  const dt = state.last ? now - state.last : 0;
  state.last = now;
  if(state.running && !state.flagged){
    const s = state[state.turn];
    if(state.type === 'delay'){
      s.delayLeft -= dt;
      if(s.delayLeft < 0){ s.ms += s.delayLeft; s.delayLeft = 0; }
    } else if(state.type === 'bronstein'){
      // consume from bronstein budget first
      s.bronstein -= dt;
      if(s.bronstein < 0){ s.ms += s.bronstein; s.bronstein = 0; }
    } else {
      s.ms -= dt;
    }
    if(s.ms <= 0){ s.ms = 0; state.flagged = true; state.running = false;
      (state.turn==='w'?sideW:sideB).classList.add('flagged');
      beep();
    }
  }
  render();
}

function render(){
  if(!state) return;
  $('#timeW').textContent = fmt(state.w.ms);
  $('#timeB').textContent = fmt(state.b.ms);
  $('#timeW').classList.toggle('low', state.w.ms <= 20000 && state.w.ms > 0);
  $('#timeB').classList.toggle('low', state.b.ms <= 20000 && state.b.ms > 0);
  $('#movesW').textContent = state.w.moves + ' ' + t('movesLbl');
  $('#movesB').textContent = state.b.moves + ' ' + t('movesLbl');
  const incTxt = state.inc ? '+'+(state.inc/1000)+'s · '+({none:'–',fischer:'Fischer',bronstein:'Bronstein',delay:'Delay'}[state.type]) : (t('optNone'));
  $('#incW').textContent = incTxt; $('#incB').textContent = incTxt;
  if(state.flagged) $('#status'); // no-op
}

function fmt(ms){
  ms = Math.max(0, ms);
  const total = Math.floor(ms/1000);
  const h = Math.floor(total/3600), m = Math.floor((total%3600)/60), s = total%60;
  const tenths = Math.floor((ms%1000)/100);
  const mm = h>0 ? String(m).padStart(2,'0') : String(m);
  const ss = String(s).padStart(2,'0');
  let str = (h>0 ? h+':'+mm+':'+ss : mm+':'+ss);
  if(ms < 10000) str = str + '.' + tenths; // show tenths under 10s
  return str;
}

function swap(){
  if(!state) return;
  const tw = state.w, tb = state.b;
  state.w = tb; state.b = tw;
  state.turn = state.turn==='w'?'b':'w';
  sideW.classList.toggle('active', state.running && state.turn==='w');
  sideB.classList.toggle('active', state.running && state.turn==='b');
  render();
}

function beep(){
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    const ac = new AC();
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type='square'; o.frequency.value=440;
    g.gain.setValueAtTime(0.15, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.6);
    o.start(); o.stop(ac.currentTime+0.6);
  }catch(e){}
}

// interactions
sideW.addEventListener('click', () => { if(state && state.running && state.turn==='w') press('w'); });
sideB.addEventListener('click', () => { if(state && state.running && state.turn==='b') press('b'); });
document.addEventListener('keydown', e => {
  if(e.code === 'Space' && state && state.running && !state.flagged){ e.preventDefault(); press(state.turn); }
});

window.startStop = startStop; window.swap = swap; window.reset = reset; window.preset = preset;

function loop(now){ if(state) tick(); requestAnimationFrame(loop); }

initLabels();
reset();
requestAnimationFrame(loop);

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro Timer'},
    {icon:'⏱️', href:'/fun/stopwatch.html', name:'Stopwatch'},
    {icon:'⏲️', href:'/calc/interval-timer.html', name:'Interval Timer'},
    {icon:'🎲', href:'/fun/dice-roller.html', name:'Dice Roller'},
  ]
});
</script>
