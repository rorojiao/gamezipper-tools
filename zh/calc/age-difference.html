<script>
GZI18n.register({
  en: {
    toolTitle: 'Age Difference Calculator',
    toolDesc: 'Calculate the exact difference between two dates — years, months, days, hours, minutes. Perfect for age gaps, anniversaries, relationship duration, project timelines.',
    lblD1: 'First date', lblD2: 'Second date',
    step1: 'Pick the mode — Age Difference or Event Duration',
    step2: 'Enter both dates (and optional names for clarity)',
    step3: 'View the result with detailed breakdown by year, month, day, hour, minute',
    step4: 'Use the presets to instantly compare common scenarios',
  },
  zh: {
    toolTitle: '年龄差 / 日期差计算器',
    toolDesc: '精确计算两个日期之间的差异 — 年、月、日、小时、分钟。适用于年龄差、周年纪念、关系时长、项目周期。',
    lblD1: '第一个日期', lblD2: '第二个日期',
    step1: '选择模式 — 年龄差或事件时长',
    step2: '输入两个日期（可选填写名称）',
    step3: '查看结果和按年、月、日、小时、分钟的详细分解',
    step4: '使用预设快速对比常见场景',
  }
});

const { $, t } = GZ;

let currentMode = 'age';
function setMode(m){
  currentMode = m;
  document.querySelectorAll('.ad-mode button').forEach(b => b.classList.remove('active'));
  (m==='age' ? $('#modeAge') : $('#modeDur')).classList.add('active');
  $('#n1').placeholder = m==='age' ? 'Person 1 (e.g. Mom)' : 'Event start (e.g. Job)';
  $('#n2').placeholder = m==='age' ? 'Person 2 (e.g. Dad)' : 'Event end (e.g. Now)';
  calc();
}
$('#modeAge').onclick = () => setMode('age');
$('#modeDur').onclick = () => setMode('dur');

function parseDate(s){
  if (!s) return null;
  const d = new Date(s + 'T00:00:00');
  if (isNaN(d.getTime())) return null;
  return d;
}

function diffYMD(d1, d2){
  let y = d2.getFullYear() - d1.getFullYear();
  let m = d2.getMonth() - d1.getMonth();
  let day = d2.getDate() - d1.getDate();
  if (day < 0) {
    m--;
    const prev = new Date(d2.getFullYear(), d2.getMonth(), 0);
    day += prev.getDate();
  }
  if (m < 0) { y--; m += 12; }
  return { y, m, d: day };
}

function calc(){
  const d1 = parseDate($('#d1').value);
  const d2 = parseDate($('#d2').value);
  if (!d1 || !d2) {
    $('#bigResult').textContent = '—';
    $('#subResult').textContent = '';
    $('#grid').innerHTML = '';
    $('#extra').innerHTML = '';
    return;
  }
  const n1 = $('#n1').value || (currentMode==='age'?'Person 1':'Start');
  const n2 = $('#n2').value || (currentMode==='age'?'Person 2':'End');
  let a = d1, b = d2;
  let swap = false;
  if (d2 < d1) { a = d2; b = d1; swap = true; }
  const ymd = diffYMD(a, b);
  const ms = b.getTime() - a.getTime();
  const totalDays = Math.floor(ms / 86400000);
  const totalHours = Math.floor(ms / 3600000);
  const totalMinutes = Math.floor(ms / 60000);
  const totalWeeks = Math.floor(totalDays / 7);
  const totalMonths = ymd.y*12 + ymd.m;
  const newBig = currentMode==='age'
    ? `${Math.abs(ymd.y)} year${Math.abs(ymd.y)!==1?'s':''}, ${Math.abs(ymd.m)} month${Math.abs(ymd.m)!==1?'s':''}`
    : `${totalDays.toLocaleString()} days`;
  $('#bigResult').textContent = newBig;
  const sub = swap ? `${n2} is older than ${n1}` : `${n1} is older than ${n2}`;
  const sub2 = currentMode==='age' ? sub : `${n1} → ${n2}`;
  $('#subResult').textContent = sub2;
  const tiles = [
    { num: Math.abs(ymd.y), lbl: 'Years' },
    { num: Math.abs(ymd.m), lbl: 'Months' },
    { num: Math.abs(ymd.d), lbl: 'Days' },
    { num: totalDays.toLocaleString(), lbl: 'Total days' },
    { num: totalWeeks.toLocaleString(), lbl: 'Weeks' },
    { num: totalHours.toLocaleString(), lbl: 'Hours' },
    { num: totalMinutes.toLocaleString(), lbl: 'Minutes' },
    { num: totalMonths, lbl: 'Months total' },
  ];
  $('#grid').innerHTML = tiles.map(t => `<div class="ad-tile"><div class="num">${t.num}</div><div class="lbl">${t.lbl}</div></div>`).join('');
  // Extras
  const dayOfWeek = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const extras = [
    { lbl: `${n1} born/dated on`, val: dayOfWeek[a.getDay()] + ', ' + a.toLocaleDateString() },
    { lbl: `${n2} born/dated on`, val: dayOfWeek[b.getDay()] + ', ' + b.toLocaleDateString() },
    { lbl: 'Total seconds', val: Math.floor(ms/1000).toLocaleString() },
  ];
  if (currentMode==='age') {
    const a1 = new Date(b.getFullYear(), a.getMonth(), a.getDate());
    let nextBday = a1;
    if (a1 < b) nextBday = new Date(b.getFullYear()+1, a.getMonth(), a.getDate());
    const daysTo = Math.ceil((nextBday - b)/86400000);
    extras.push({ lbl: `${n2}'s next birthday in`, val: `${daysTo} days` });
  }
  $('#extra').innerHTML = extras.map(e => `<div class="ad-row"><span class="lbl">${e.lbl}</span><span class="val">${e.val}</span></div>`).join('');
}

const presets = [
  { lbl: '👫 You & Partner', d1: '2000-01-15', d2: '2002-06-22' },
  { lbl: '👨‍👩‍👧 Parent → Child', d1: '1985-03-10', d2: '2015-09-01' },
  { lbl: '💍 5 Year Anniversary', d1: '2021-06-15', d2: '2026-06-15' },
  { lbl: '📅 Today & Today', d1: '2026-06-05', d2: '2026-06-05' },
  { lbl: '🌍 1 Year Together', d1: '2025-06-05', d2: '2026-06-05' },
];
function renderPresets(){
  $('#presets').innerHTML = presets.map((p,i) => `<div class="ad-preset" onclick="applyPreset(${i})">${p.lbl}</div>`).join('');
}
window.applyPreset = function(i){
  const p = presets[i];
  $('#d1').value = p.d1;
  $('#d2').value = p.d2;
  calc();
};

$('#d1').addEventListener('change', calc);
$('#d2').addEventListener('change', calc);
$('#n1').addEventListener('input', calc);
$('#n2').addEventListener('input', calc);

function init(){
  $('#lbl-d1').textContent = t('lblD1');
  $('#lbl-d2').textContent = t('lblD2');
  $('#n1').placeholder = 'Person 1 (e.g. Mom)';
  $('#n2').placeholder = 'Person 2 (e.g. Dad)';
  // Default: parent and child
  const now = new Date();
  const yyyy = now.getFullYear();
  const mm = String(now.getMonth()+1).padStart(2,'0');
  const dd = String(now.getDate()).padStart(2,'0');
  $('#d1').value = `${yyyy-30}-${mm}-${dd}`;
  $('#d2').value = `${yyyy-2}-${mm}-${dd}`;
  $('#n1').value = 'Older';
  $('#n2').value = 'Younger';
  renderPresets();
  calc();
}

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎂', href:'/calc/age-calculator.html', name:'Age Calculator'},
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'⏰', href:'/calc/time-calculator.html', name:'Time Calculator'},
    {icon:'📆', href:'/calc/business-day.html', name:'Business Day'},
  ]
});
init();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
