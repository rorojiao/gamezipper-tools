<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="drop-zone" id="dropZone">
      <div class="icon">✂️</div>
      <p id="dropText"></p>
      <input type="file" id="fileInput" accept="image/*" style="display:none">
    </div>
    <div class="control-row" id="controls" style="display:none">
      <label data-i18n="rows">Rows: <input id="rows" type="number" min="1" max="20" value="3" class="gz-select" style="width:60px"></label>
      <label data-i18n="columns">Columns: <input id="cols" type="number" min="1" max="20" value="3" class="gz-select" style="width:60px"></label>
      <button class="gz-btn" onclick="splitImage()" data-i18n="split">Split Image</button>
      <button class="gz-btn gz-btn-secondary" onclick="downloadAll()" data-i18n="downloadAll">Download All Tiles</button>
    </div>
    <div id="previewInfo" style="text-align:center;font-size:.85rem;color:var(--text2);margin:8px 0"></div>
    <div id="gridPreview" class="grid-preview"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Image Splitter',
    toolDesc: 'Split any image into a grid of equal tiles — perfect for Instagram carousels, puzzles and print.',
    dropHere: 'Drop an image here or click to upload',
    rows: 'Rows',
    columns: 'Columns',
    split: 'Split Image',
    downloadAll: 'Download All Tiles',
    tile: 'Tile',
    originalSize: 'Original size',
    tileSize: 'Tile size',
    totalTiles: 'Total tiles',
    step1: 'Upload an image by dragging it or clicking the drop zone',
    step2: 'Set the number of rows and columns for the grid',
    step3: 'Click Split to divide the image into equal tiles',
    step4: 'Click any tile to download it, or download all at once',
  },
  zh: {
    toolTitle: '图片分割工具',
    toolDesc: '将图片分割为等分的网格 — 完美适用于 Instagram 轮播图、拼图和打印。',
    dropHere: '将图片拖拽到此处或点击上传',
    rows: '行数',
    columns: '列数',
    split: '分割图片',
    downloadAll: '下载所有切片',
    tile: '切片',
    originalSize: '原始尺寸',
    tileSize: '切片尺寸',
    totalTiles: '总切片数',
    step1: '拖拽或点击上传图片',
    step2: '设置网格的行数和列数',
    step3: '点击「分割」将图片切分为等分切片',
    step4: '点击任意切片下载，或一键下载全部',
  }
});

const { $, t } = GZ;

let loadedImg = null;
let tiles = [];

const dz = $('#dropZone');
const fi = $('#fileInput');
dz.addEventListener('click', () => fi.click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); if(e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]); });
fi.addEventListener('change', () => { if(fi.files[0]) loadImage(fi.files[0]); });
$('#dropText').textContent = t('dropHere');

// Replace template literals in already-rendered HTML
document.getElementById('controls').innerHTML = `
  <label>${t('rows')}: <input id="rows" type="number" min="1" max="20" value="3" class="gz-select" style="width:60px"></label>
  <label>${t('columns')}: <input id="cols" type="number" min="1" max="20" value="3" class="gz-select" style="width:60px"></label>
  <button class="gz-btn" onclick="splitImage()">${t('split')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadAll()">${t('downloadAll')}</button>
`;

function loadImage(file) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = function() {
    loadedImg = img;
    $('#controls').style.display = 'flex';
    $('#previewInfo').textContent = `${t('originalSize')}: ${img.width} × ${img.height} px`;
    splitImage();
  };
  img.src = url;
}

function splitImage() {
  if (!loadedImg) return;
  const r = Math.max(1, parseInt($('#rows').value) || 3);
  const c = Math.max(1, parseInt($('#cols').value) || 3);
  const tw = Math.floor(loadedImg.width / c);
  const th = Math.floor(loadedImg.height / r);

  tiles = [];
  const grid = $('#gridPreview');
  grid.innerHTML = '';
  grid.style.gridTemplateColumns = `repeat(${c}, 1fr)`;

  for (let row = 0; row < r; row++) {
    for (let col = 0; col < c; col++) {
      const canvas = document.createElement('canvas');
      canvas.width = tw;
      canvas.height = th;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(loadedImg, col * tw, row * th, tw, th, 0, 0, tw, th);

      const idx = row * c + col;
      tiles.push({ canvas, row, col });

      canvas.title = `${t('tile')} ${idx + 1} (${row+1},${col+1})`;
      canvas.addEventListener('click', () => downloadTile(idx));
      grid.appendChild(canvas);
    }
  }

  $('#previewInfo').textContent = `${t('originalSize')}: ${loadedImg.width}×${loadedImg.height} | ${t('tileSize')}: ${tw}×${th} | ${t('totalTiles')}: ${tiles.length}`;
}

function downloadTile(idx) {
  const tile = tiles[idx];
  const a = document.createElement('a');
  a.href = tile.canvas.toDataURL('image/png');
  a.download = `tile-${tile.row+1}-${tile.col+1}.png`;
  a.click();
}

function downloadAll() {
  tiles.forEach((tile, i) => {
    setTimeout(() => downloadTile(i), i * 200);
  });
}

// Auto-split on input change
$('#rows').addEventListener('change', splitImage);
$('#cols').addEventListener('change', splitImage);

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✂️', href:'/image/cropper.html', name:'Image Cropper'},
    {icon:'📐', href:'/image/resizer.html', name:'Image Resizer'},
    {icon:'🔄', href:'/image/converter.html', name:'Image Converter'},
    {icon:'🖼️', href:'/image/placeholder.html', name:'Placeholder Image'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
