    step2: '选择线条颜色和线宽',

    step4: '点击「下载 PNG」或「打印 / PDF」',
  }

const { $, t, copyText } = GZ;
const canvas=$('#paper-preview');
const ctx=canvas.getContext('2d');

function getOpts(){
  return {
    r: +document.getElementById('hex-r').value,
    color: document.getElementById('line-color').value,
    lw: +document.getElementById('line-w').value,
    paper: document.getElementById('paper-size').value,
  };
}

function drawPaper(){
  const o=getOpts();
  // page dims (px at ~96dpi)
  const isA4=o.paper==='a4';
  canvas.width = isA4?850:850;
  canvas.height = isA4?1100:1100;
  const W=canvas.width, H=canvas.height;
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
  const r=o.r;
  const w = Math.sqrt(3)*r; // hex width (flat-top vs pointy-top) — use pointy-top
  // pointy-top hex: width = sqrt(3)*r, height = 2*r
  const hexW=w, hexH=2*r;
  const colStep=hexW; // horizontal distance between hex centers in same row
  const rowStep=hexH*0.75; // vertical distance between rows
  ctx.strokeStyle=o.color; ctx.lineWidth=o.lw; ctx.lineJoin='round';
  let row=0;
  for(let y=-r;y<H+r;y+=rowStep){
    const offset=(row%2)*colStep/2;
    for(let x=-hexW;x<W+hexW;x+=colStep){
      drawHex(x+offset, y, r);
    }
    row++;
  }
}

function drawHex(cx,cy,r){
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const angle=Math.PI/3*i - Math.PI/2; // pointy-top
    const px=cx+r*Math.cos(angle), py=cy+r*Math.sin(angle);
    if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.closePath();
  ctx.stroke();
}

function doDownload(){
  const link=document.createElement('a');
  link.download='hexagonal-graph-paper.png';
  link.href=canvas.toDataURL('image/png');
  link.click();
}

$('#toolbar').innerHTML = `
  <label style="display:inline-flex;align-items:center;gap:6px">${t('hexSize')}
  <input type="range" id="hex-r" min="8" max="40" value="20" oninput="document.getElementById('hex-r-val').textContent=this.value;drawPaper()" style="width:120px">
  <span id="hex-r-val" style="min-width:28px">20</span>px</label>
  <label style="display:inline-flex;align-items:center;gap:6px">${t('lineColor')}
  <input type="color" id="line-color" value="#888888" onchange="drawPaper()"></label>
  <label style="display:inline-flex;align-items:center;gap:6px">${t('lineWidth')}
  <input type="range" id="line-w" min="1" max="3" value="1" step="0.5" oninput="drawPaper()" style="width:80px"></label>
  <label style="display:inline-flex;align-items:center;gap:6px">${t('paperSize')}
  <select class="gz-select" id="paper-size" onchange="drawPaper()">
    <option value="a4" selected>${t('a4')}</option>
    <option value="letter">${t('letter')}</option>
  </select></label>
  <button class="gz-btn" onclick="drawPaper()">${t('update')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDownload()">⬇️ ${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="window.print()">🖨️ ${t('print')}</button>`;

drawPaper();
