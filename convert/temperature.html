<script>
GZI18n.register({
  en:{
    toolTitle:'Temperature Converter',
    toolDesc:'Convert between Celsius, Fahrenheit, Kelvin, Rankine, Réaumur and Delisle with instant live updates as you type.',
    reset:'Reset',copyAll:'Copy All',example:'Load Example',
    celsius:'Celsius (°C)',fahrenheit:'Fahrenheit (°F)',kelvin:'Kelvin (K)',rankine:'Rankine (°R)',reaumur:'Réaumur (°Ré)',delisle:'Delisle (°De)',
    refTitle:'📚 Scale Reference Points',
    colScale:'Scale',colFreeze:'Water Freezes',colBoil:'Water Boils',colAbsZero:'Absolute Zero',
    step1:'Type a value in any of the six scale fields',
    step2:'All other scales update instantly as you type',
    step3:'Use Copy All to copy the entire conversion table',
    step4:'Use Reset to clear all fields and start over',
  },
  zh:{
    toolTitle:'温度单位转换器',
    toolDesc:'实时在摄氏、华氏、开尔文、兰金、列氏和德利尔六种温标之间换算，输入即转换。',
    reset:'重置',copyAll:'复制全部',example:'加载示例',
    celsius:'摄氏度 (°C)',fahrenheit:'华氏度 (°F)',kelvin:'开尔文 (K)',rankine:'兰金 (°R)',reaumur:'列氏度 (°Ré)',delisle:'德利尔 (°De)',
    refTitle:'📚 温标参考点',
    colScale:'温标',colFreeze:'水凝固点',colBoil:'水沸点',colAbsZero:'绝对零度',
    step1:'在任意温标输入数值',
    step2:'其他温标会自动即时更新',
    step3:'点击「复制全部」可复制整张换算表',
    step4:'点击「重置」可清空所有输入',
  }
});

const scales = ['celsius','fahrenheit','kelvin','rankine','reaumur','delisle'];

// Convert any scale → Celsius
const toCelsius = {
  celsius:  c => c,
  fahrenheit: f => (f - 32) * 5 / 9,
  kelvin:    k => k - 273.15,
  rankine:   r => (r - 491.67) * 5 / 9,
  reaumur:   re => re * 1.25,
  delisle:   de => 100 - de * 2 / 3,
};

// Celsius → any scale
const fromCelsius = {
  celsius:    c => c,
  fahrenheit: c => c * 9 / 5 + 32,
  kelvin:     c => c + 273.15,
  rankine:    c => (c + 273.15) * 9 / 5,
  reaumur:    c => c * 0.8,
  delisle:    c => (100 - c) * 1.5,
};

const { $, copyText, t } = GZ;

function fmt(n) {
  if (!isFinite(n)) return '—';
  if (Math.abs(n) >= 1e6 || (Math.abs(n) < 0.001 && n !== 0)) return n.toExponential(4);
  // Limit to 6 significant digits, but show 2 decimals for normal values
  return Number(n.toFixed(4)).toString();
}

function buildGrid() {
  const grid = $('#tempGrid');
  grid.innerHTML = scales.map(s => `
    <div class="temp-card">
      <label for="in-${s}">${t(s)}</label>
      <input type="number" id="in-${s}" step="any" placeholder="0" inputmode="decimal">
    </div>`).join('');
  scales.forEach(s => {
    $('#in-'+s).addEventListener('input', () => convert(s));
  });
}

let converting = false;
function convert(source) {
  if (converting) return;
  const v = parseFloat($('#in-'+source).value);
  if (isNaN(v)) {
    scales.forEach(s => { if (s !== source) $('#in-'+s).value = ''; });
    return;
  }
  converting = true;
  const c = toCelsius[source](v);
  scales.forEach(s => {
    if (s !== source) $('#in-'+s).value = fmt(fromCelsius[s](c));
  });
  converting = false;
}

function loadExample() {
  $('#in-celsius').value = 25;
  convert('celsius');
}
function doReset() {
  scales.forEach(s => $('#in-'+s).value = '');
}
function copyAll() {
  const lines = scales.map(s => `${t(s)}: ${$('#in-'+s).value || '—'}`).join('\n');
  copyText(lines);
}

function buildRefTable() {
  const refs = [
    { name: t('celsius'),    freeze: '0',         boil: '100',      zero: '-273.15' },
    { name: t('fahrenheit'), freeze: '32',        boil: '212',      zero: '-459.67' },
    { name: t('kelvin'),     freeze: '273.15',    boil: '373.15',   zero: '0' },
    { name: t('rankine'),    freeze: '491.67',    boil: '671.67',   zero: '0' },
    { name: t('reaumur'),    freeze: '0',         boil: '80',       zero: '-218.52' },
    { name: t('delisle'),    freeze: '150',       boil: '0',        zero: '559.725' },
  ];
  $('#refTable').innerHTML = `
    <thead><tr><th>${t('colScale')}</th><th>${t('colFreeze')}</th><th>${t('colBoil')}</th><th>${t('colAbsZero')}</th></tr></thead>
    <tbody>${refs.map(r => `<tr><td>${r.name}</td><td>${r.freeze}</td><td>${r.boil}</td><td>${r.zero}</td></tr>`).join('')}</tbody>`;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyAll()">${t('copyAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doReset()">${t('reset')}</button>`;

buildGrid();
loadExample();
buildRefTable();

GZ.renderToolPage({
  category:'convert',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[

    {icon:'💱', href:'/convert/currency-converter.html', name:'Currency Converter'},
    {icon:'📅', href:'/convert/date-format.html', name:'Date Format'},
  ]
});
</script>
