const {$, copyText, t} = GZ;

const superMap = {
  'a':'ᵃ','b':'ᵇ','c':'ᶜ','d':'ᵈ','e':'ᵉ','f':'ᶠ','g':'ᵍ','h':'ʰ','i':'ⁱ','j':'ʲ',
  'k':'ᵏ','l':'ˡ','m':'ᵐ','n':'ⁿ','o':'ᵒ','p':'ᵖ','q':'q','r':'ʳ','s':'ˢ','t':'ᵗ',
  'u':'ᵘ','v':'ᵛ','w':'ʷ','x':'ˣ','y':'ʸ','z':'ᶻ',
  'A':'ᴬ','B':'ᴮ','C':'ᶜ','D':'ᴰ','E':'ᴱ','F':'ᶠ','G':'ᴳ','H':'ᴴ','I':'ᴵ','J':'ᴶ',
  'K':'ᴷ','L':'ᴸ','M':'ᴹ','N':'ᴺ','O':'ᴼ','P':'ᴾ','Q':'Q','R':'ᴿ','S':'ˢ','T':'ᵀ',
  'U':'ᵁ','V':'ⱽ','W':'ᵂ','X':'ˣ','Y':'ʸ','Z':'ᶻ',
  '0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹',
  '+':'⁺','-':'⁻','=':'⁼','(':'⁽',')':'⁾'
};

const subMap = {
  'a':'ₐ','b':'b','c':'c','d':'d','e':'ₑ','f':'f','g':'g','h':'ₕ','i':'ᵢ','j':'ⱼ',
  'k':'ₖ','l':'ₗ','m':'ₘ','n':'ₙ','o':'ₒ','p':'ₚ','q':'q','r':'ᵣ','s':'ₛ','t':'ₜ',
  'u':'ᵤ','v':'ᵥ','w':'w','x':'ₓ','y':'y','z':'z',
  '0':'₀','1':'₁','2':'₂','3':'₃','4':'₄','5':'₅','6':'₆','7':'₇','8':'₈','9':'₉',
  '+':'₊','-':'₋','=':'₌','(':'₍',')':'₎'
};

const smallCapsMap = {
  'a':'ᴀ','b':'ʙ','c':'ᴄ','d':'ᴅ','e':'ᴇ','f':'ꜰ','g':'ɢ','h':'ʜ','i':'ɪ','j':'ᴊ',
  'k':'ᴋ','l':'ʟ','m':'ᴍ','n':'ɴ','o':'ᴏ','p':'ᴘ','q':'ǫ','r':'ʀ','s':'ꜱ','t':'ᴛ',
  'u':'ᴜ','v':'ᴠ','w':'ᴡ','x':'x','y':'ʏ','z':'ᴢ'
};

function convert(text, map) {
  return [...text].map(ch => map[ch] || ch).join('');
}

function doGenerate() {
  const text = $('#input').value;
  if (!text.trim()) { $('#output').innerHTML = ''; return; }
  const styles = [
    {label: t('superscript'), fn: t => convert(t, superMap)},
    {label: t('subscript'), fn: t => convert(t, subMap)},
    {label: t('smallCaps'), fn: t => convert(t, smallCapsMap)},
  ];
  $('#output').innerHTML = styles.map(s => {
    const result = s.fn(text);
    return `<div class="style-box">
      <span class="style-label">${s.label}</span>
      <span class="style-result">${result.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>
      <button class="gz-btn" onclick="copyText('${result.replace(/'/g,"\\'").replace(/\n/g,'\\n')}')">${t('copy')}</button>
    </div>`;
  }).join('');
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; }

function loadExample() {
  $('#input').value = 'Hello World! Small text is cool. 12345';
  doGenerate();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doGenerate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#input').addEventListener('input', doGenerate);

  ]
