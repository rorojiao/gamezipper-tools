<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What are small caps?", "acceptedAnswer": {"@type": "Answer", "text": "Small caps are uppercase letters drawn at the height of lowercase letters. This tool uses Unicode small capital letters (U+1D00 Phonetic Extensions block) so the result pastes as plain text into any app without installing fonts, producing Sᴍᴀʟʟ Cᴀᴘs."}}, {"@type": "Question", "name": "Why are some letters missing from small caps?", "acceptedAnswer": {"@type": "Answer", "text": "The Unicode small caps block is incomplete — there is no official small capital for several letters such as X (X is left unchanged) and a few others fall back to regular letters. This tool uses every available small cap and leaves unmatched letters as-is so the text stays readable."}}, {"@type": "Question", "name": "Does small caps text work on social media?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Small caps are standard Unicode characters, so they render on Instagram bios, Twitter, Discord, TikTok, YouTube and most messengers. A few rare system fonts may show a box for one or two letters; switching to a mainstream font fixes it."}}, {"@type": "Question", "name": "What is the difference between small caps and superscript?", "acceptedAnswer": {"@type": "Answer", "text": "Small caps (Sᴍᴀʟʟ Cᴀᴘs) keep normal lowercase height and look like tiny capitals. Superscript (ˢᵘᵖᵉʳ) lifts the letters above the baseline and uses a different Unicode block (U+1D2C Modifier Tone Letters). Both look tiny but are styled differently."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Small Caps Text Generator',
    toolDesc: 'Convert text to Sᴍᴀʟʟ Cᴀᴘs, ˢᵘᵖᵉʳˢᶜʳⁱᵖᵗ superscript or ꜱᴍᴀʟʟ lowercase Unicode letters. Copy & paste tiny text for Instagram, Twitter, Discord, usernames and bios.',
    inputLabel: 'Your Text',
    outputLabel: 'Small Caps Text',
    smallCaps: 'Small Caps',
    superscript: 'Superscript',
    smallLower: 'Small (lower)',
    step1: 'Type or paste the text you want to miniaturise',
    step2: 'Pick a style: Small Caps, Superscript or Small lowercase',
    step3: 'Click Copy and paste it into your post, caption or username',
  },
  zh: {
    toolTitle: '小型大写字母生成器',
    toolDesc: '将文字转换为 Sᴍᴀʟʟ Cᴀᴘs 小型大写、ˢᵘᵖᵉʳˢᶜʳⁱᵖᵗ 上标或 ꜱᴍᴀʟʟ 小写 Unicode 字母。复制粘贴到 Instagram、Twitter、Discord、用户名和简介。',
    inputLabel: '输入文本',
    outputLabel: '小型大写文字',
    smallCaps: '小型大写',
    superscript: '上标',
    smallLower: '小写小字',
    step1: '输入或粘贴要变小的文字',
    step2: '选择样式：小型大写、上标或小写小字',
    step3: '点击复制，粘贴到帖子、文案或用户名',
  }
});

const { $, copyText, t } = GZ;

// Small caps (Phonetic Extensions U+1D00)
const SC_UPPER = {'A':'ᴀ','B':'ʙ','C':'ᴄ','D':'ᴅ','E':'ᴇ','F':'ꜰ','G':'ɢ','H':'ʜ','I':'ɪ','J':'ᴊ','K':'ᴋ','L':'ʟ','M':'ᴍ','N':'ɴ','O':'ᴏ','P':'ᴘ','Q':'ǫ','R':'ʀ','S':'ꜱ','T':'ᴛ','U':'ᴜ','V':'ᴠ','W':'ᴡ','X':'x','Y':'ʏ','Z':'ᴢ'};
// Small lowercase (Phonetic Extensions)
const SC_LOWER = {'a':'ᴀ','b':'ʙ','c':'ᴄ','d':'ᴅ','e':'ᴇ','f':'ꜰ','g':'ɢ','h':'ʜ','i':'ɪ','j':'ᴊ','k':'ᴋ','l':'ʟ','m':'ᴍ','n':'ɴ','o':'ᴏ','p':'ᴘ','q':'ǫ','r':'ʀ','s':'ꜱ','t':'ᴛ','u':'ᴜ','v':'ᴠ','w':'ᴡ','x':'x','y':'ʏ','z':'ᴢ'};
// Superscript (Modifier Tone Letters U+1D2C and 0x02B0-0x02FF)
const SUPER = {'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹','A':'ᴬ','B':'ᴮ','C':'ᶜ','D':'ᴰ','E':'ᴱ','F':'ᶠ','G':'ᴳ','H':'ᴴ','I':'ᴵ','J':'ᴶ','K':'ᴷ','L':'ᴸ','M':'ᴹ','N':'ᴺ','O':'ᴼ','P':'ᴾ','Q':'Q','R':'ᴿ','S':'ˢ','T':'ᵀ','U':'ᵁ','V':'ⱽ','W':'ᵂ','X':'X','Y':'ʸ','Z':'ᶻ','a':'ᵃ','b':'ᵇ','c':'ᶜ','d':'ᵈ','e':'ᵉ','f':'ᶠ','g':'ᵍ','h':'ʰ','i':'ⁱ','j':'ʲ','k':'ᵏ','l':'ˡ','m':'ᵐ','n':'ⁿ','o':'ᵒ','p':'ᵖ','q':'q','r':'ʳ','s':'ˢ','t':'ᵗ','u':'ᵘ','v':'ᵛ','w':'ʷ','x':'ˣ','y':'ʸ','z':'ᶻ'};

function toSmallCaps(s) { return [...s].map(c => SC_UPPER[c.toUpperCase()] ? SC_UPPER[c.toUpperCase()] : SC_LOWER[c] || SC_UPPER[c] || c).join(''); }
function toSuperscript(s) { return [...s].map(c => SUPER[c] || c).join(''); }
function toSmallLower(s) { return [...s].map(c => SC_LOWER[c] || SC_UPPER[c] || c).join(''); }

const FNS = { smallCaps: toSmallCaps, superscript: toSuperscript, smallLower: toSmallLower };
let currentStyle = 'smallCaps';

function processText() {
  const text = $('#input').value;
  if (!text) { $('#output').textContent = ''; return; }
  $('#output').textContent = FNS[currentStyle](text);
}

$('#input').addEventListener('input', processText);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="setStyle('smallCaps',this)">${t('smallCaps')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setStyle('superscript',this)">${t('superscript')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setStyle('smallLower',this)">${t('smallLower')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').textContent=''">${t('clear')}</button>`;

function setStyle(key, btn) {
  currentStyle = key;
  processText();
  btn.parentElement.querySelectorAll('.gz-btn').forEach(b => {
    b.classList.remove('gz-btn-active');
    b.classList.add('gz-btn-secondary');
  });
  btn.classList.add('gz-btn-active');
  btn.classList.remove('gz-btn-secondary');
}

$('#input').value = 'Small Caps';
processText();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3'],
  related: [
    {icon:'ᴛ', href:'/text/tiny-text.html', name:'Tiny Text'},
    {icon:'𝐛', href:'/text/bold-text-generator.html', name:'Bold Text'},
    {icon:'⁺', href:'/text/superscript-generator.html', name:'Superscript'},
    {icon:'✨', href:'/text/fancy-text.html', name:'Fancy Text'},
  ]
});
</script>
