const fileIn = $('#fileIn');
const SIZES = [
  { s: 16, label: '16×16', purpose: 'Browser tab' },
  { s: 32, label: '32×32', purpose: 'Tab HiDPI' },
  { s: 48, label: '48×48', purpose: 'Windows taskbar' },

  { s: 192, label: '192×192', purpose: 'Android Chrome' },
  { s: 512, label: '512×512', purpose: 'PWA splash' },

const ICO_SIZES = [16, 32, 48, 64];

let sourceImg = null;

dropZone.addEventListener('click', () => fileIn.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => { sourceImg = img; renderAll(); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function renderAll() {
  if (!sourceImg) return;
  $('#results').style.display = 'block';

  // Generate canvases for all sizes
  const canvases = {};
  SIZES.forEach(({ s }) => {
    const c = document.createElement('canvas');
    c.width = s; c.height = s;
    const ctx = c.getContext('2d');
    ctx.imageSmoothingEnabled = s > 32;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(sourceImg, 0, 0, s, s);
    canvases[s] = c;
  });

  // Render preview grid
  $('#previewGrid').innerHTML = SIZES.map(({ s, label, purpose }) => {
    const c = canvases[s];
    const displaySize = Math.min(s, 64);
    return `<div class="preview-card"><canvas width="${s}" height="${s}" style="width:${displaySize}px;height:${displaySize}px"></canvas><div class="size">${label}<br>${purpose}</div></div>`;
  }).join('');

  // Set canvas content
  document.querySelectorAll('.preview-card canvas').forEach((c, i) => {
    c.getContext('2d').drawImage(canvases[SIZES[i].s], 0, 0);
  });

  // Download buttons
  const icoBlob = buildICO(canvases);
  const dlGrid = $('#dlGrid');
  let dlHtml = `<a class="dl-btn" id="dlIco" href="#" download="favicon.ico"><span class="fmt">📦 favicon.ico</span><span class="desc">Multi-size ICO (${ICO_SIZES.join(', ')}px)</span></a>`;
  [16, 32, 180, 192, 512].forEach(s => {
    dlHtml += `<a class="dl-btn" id="dlPng${s}" href="#" download="favicon-${s}x${s}.png"><span class="fmt">🖼️ ${s}×${s} PNG</span><span class="desc">Favicon ${s}px</span></a>`;
  });
  dlGrid.innerHTML = dlHtml;

  // Set download links
  $('#dlIco').href = URL.createObjectURL(icoBlob);
  [16, 32, 180, 192, 512].forEach(s => {
    const blob = new Promise(resolve => canvases[s].toBlob(resolve, 'image/png'));
    canvases[s].toBlob(b => {
      document.getElementById('dlPng' + s).href = URL.createObjectURL(b);
    }, 'image/png');
  });

  // Generate HTML code
  const html = `<link rel="icon" type="image/x-icon" href="/favicon.ico">\n<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">\n<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">\n<link rel="apple-touch-icon" sizes="180x180" href="/favicon-180x180.png">\n<link rel="manifest" href="/site.webmanifest">`;
  $('#htmlCode').textContent = html;
}

// Build ICO binary format
function buildICO(canvases) {
  const images = ICO_SIZES.map(s => {
    const ctx = canvases[s].getContext('2d');
    const data = ctx.getImageData(0, s, s);
    return { width: s, height: s, data: data.data };
  });

  // ICO header: 6 bytes
  // Each entry: 16 bytes
  // Then PNG data for each image
  const blobs = [];
  images.forEach(img => {
    // Create BMP-style data (uncompressed BGRA)
    const w = img.width, h = img.height;
    const bmpHeaderSize = 40;
    const pixelDataSize = w * h * 4;
    const maskSize = Math.ceil(w / 8) * h;

    // We'll use PNG instead for better quality
    const c = canvases[img.width];
    // Get PNG blob synchronously via dataURL
    const dataUrl = c.toDataURL('image/png');
    const binary = atob(dataUrl.split(',')[1]);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    blobs.push(bytes);
  });

  const headerSize = 6;
  const dirEntrySize = 16;
  const dirSize = dirEntrySize * blobs.length;
  let offset = headerSize + dirSize;

  const totalSize = offset + blobs.reduce((s, b) => s + b.length, 0);
  const buf = new ArrayBuffer(totalSize);
  const view = new DataView(buf);
  const arr = new Uint8Array(buf);

  // ICO header
  view.setUint16(0, 0, true);      // Reserved
  view.setUint16(2, 1, true);      // Type: 1 = ICO
  view.setUint16(4, blobs.length, true); // Number of images

  // Directory entries
  blobs.forEach((blob, i) => {
    const pos = 6 + i * 16;
    const w = ICO_SIZES[i];
    arr[pos] = w >= 256 ? 0 : w;     // Width (0 = 256)
    arr[pos + 1] = w >= 256 ? 0 : w; // Height
    arr[pos + 2] = 0;               // Color palette
    arr[pos + 3] = 0;               // Reserved
    view.setUint16(pos + 4, 1, true);  // Color planes
    view.setUint16(pos + 6, 32, true); // Bits per pixel
    view.setUint32(pos + 8, blob.length, true); // Size
    view.setUint32(pos + 12, offset, true);     // Offset
    offset += blob.length;
  });

  // Image data
  let dataOffset = headerSize + dirSize;
  blobs.forEach(blob => {
    arr.set(blob, dataOffset);
    dataOffset += blob.length;
  });

  return new Blob([buf], { type: 'image/x-icon' });
}
