<script>
GZI18n.register({
  en: {
    toolTitle: 'SVG to JPG Converter',
    toolDesc: 'Convert SVG vector images to JPG raster format. Upload or paste SVG, set size, background and quality — download instantly. Free, private, browser-only.',
    convert: 'Convert to JPG',
    download: 'Download JPG',
    clear: 'Clear',
    dropText: '📎 Drop SVG file here or click to upload',
    pasteSvg: 'Or paste SVG code below:',
    width: 'Width (px)',
    height: 'Height (px)',
    bgColor: 'Background',
    quality: 'Quality',
    step1: 'Upload an SVG file or paste SVG code',
    step2: 'Set the output width, height and background color',
    step3: 'Click Convert to render to JPG',
    step4: 'Download the JPG file to your device',
    noSvg: 'Please provide an SVG first',
    convErr: 'Conversion failed: ',
  },
  zh: {
    toolTitle: 'SVG 转 JPG 转换器',
    toolDesc: '将 SVG 矢量图转换为 JPG 光栅格式。上传或粘贴 SVG，设置尺寸、背景色和质量 — 即时下载。免费、私密、浏览器本地运行。',
    convert: '转换为 JPG',
    download: '下载 JPG',
    clear: '清除',
    dropText: '📎 拖放 SVG 文件到此处或点击上传',
    pasteSvg: '或在下方粘贴 SVG 代码：',
    width: '宽度（像素）',
    height: '高度（像素）',
    bgColor: '背景色',
    quality: '质量',
    step1: '上传 SVG 文件或粘贴 SVG 代码',
    step2: '设置输出宽度、高度和背景色',
    step3: '点击「转换」渲染为 JPG',
    step4: '将 JPG 文件下载到本地',
    noSvg: '请先提供 SVG',
    convErr: '转换失败：',
  }
});

const { $, t } = GZ;
let svgDataUrl = null;

document.querySelector('#drop-text').textContent = t('dropText');
document.querySelector('#lbl-svg').textContent = t('pasteSvg');
document.querySelector('#lbl-width').textContent = t('width');
document.querySelector('#lbl-height').textContent = t('height');
document.querySelector('#lbl-bg').textContent = t('bgColor');
document.querySelector('#lbl-quality').textContent = t('quality');

const dropZone = $('#drop-zone');
const fileInput = document.createElement('input');
fileInput.type = 'file';
fileInput.accept = '.svg,image/svg+xml';
fileInput.style.display = 'none';
document.body.appendChild(fileInput);

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    $('#svg-input').value = e.target.result;
    setSvgDataUrl(e.target.result);
  };
  reader.readAsText(file);
}

function setSvgDataUrl(svgText) {
  if (!svgText || !svgText.trim()) { svgDataUrl = null; return; }
  try {
    const blob = new Blob([svgText], {type:'image/svg+xml'});
    svgDataUrl = URL.createObjectURL(blob);
  } catch(e) { svgDataUrl = null; }
}

$('#svg-input').addEventListener('input', e => setSvgDataUrl(e.target.value));

function convert() {
  if (!svgDataUrl && !$('#svg-input').value.trim()) { alert(t('noSvg')); return; }
  if (!svgDataUrl) setSvgDataUrl($('#svg-input').value);
  if (!svgDataUrl) { alert(t('noSvg')); return; }

  const w = parseInt($('#out-width').value) || 800;
  const h = parseInt($('#out-height').value) || 600;
  const bg = $('#bg-color').value;
  const q = parseFloat($('#quality').value);

  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);
    try {
      ctx.drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        $('#preview').innerHTML = `<img src="${url}" alt="JPG preview"><br><button class="gz-btn" style="margin-top:8px" onclick="downloadJpg('${url}')">${t('download')}</button>`;
      }, 'image/jpeg', q);
    } catch(e) {
      alert(t('convErr') + e.message);
    }
  };
  img.onerror = () => alert(t('convErr') + 'invalid SVG');
  img.src = svgDataUrl;
}

function downloadJpg(url) {
  const a = document.createElement('a');
  a.href = url;
  a.download = 'converted.jpg';
  a.click();
}

function doClear() {
  $('#svg-input').value = '';
  $('#preview').innerHTML = '';
  svgDataUrl = null;
  fileInput.value = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/image/svg-to-png.html', name:'SVG to PNG'},
    {icon:'🎨', href:'/dev/svg-minifier.html', name:'SVG Minifier'},
    {icon:'✏️', href:'/dev/svg-path-editor.html', name:'SVG Path Editor'},
    {icon:'🌐', href:'/image/svg-viewer.html', name:'SVG Viewer'},
  ]
});
</script>
