<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Glassmorphism Generator',
    toolDesc: 'Create beautiful frosted glass effect CSS cards. Adjust blur, opacity, borders, shadows and gradients with live preview — copy the CSS code instantly.',
    blur: 'Blur',
    opacity: 'Background Opacity',
    borderWidth: 'Border Width',
    borderColor: 'Border Color',
    bgColor: 'Background Color',
    radius: 'Border Radius',
    shadow: 'Box Shadow',
    width: 'Card Width',
    padding: 'Padding',
    copyCSS: 'Copy CSS',
    reset: 'Reset',
    step1: 'Adjust the sliders and color pickers to customize your glass card',
    step2: 'See the live preview update in real time',
    step3: 'Click Copy CSS to get the generated code',
    step4: 'Paste the CSS into your project stylesheet',
  },
  zh: {
    toolTitle: 'CSS 毛玻璃效果生成器',
    toolDesc: '创建精美的毛玻璃效果 CSS 卡片。调整模糊、透明度、边框、阴影和渐变，实时预览并复制 CSS 代码。',
    blur: '模糊度',
    opacity: '背景透明度',
    borderWidth: '边框宽度',
    borderColor: '边框颜色',
    bgColor: '背景颜色',
    radius: '圆角半径',
    shadow: '盒阴影',
    width: '卡片宽度',
    padding: '内边距',
    copyCSS: '复制 CSS',
    reset: '重置',
    step1: '调整滑块和颜色选择器来自定义毛玻璃卡片',
    step2: '实时预览会同步更新效果',
    step3: '点击复制 CSS 获取生成的代码',
    step4: '将 CSS 粘贴到你的项目样式表中',
  }
});

const { $, copyText, t } = GZ;

const defaults = {blur:16, opacity:0.15, borderWidth:1, borderColor:'rgba(255,255,255,0.2)', bgColor:'#ffffff', radius:16, shadow:20, width:280, padding:32};
let vals = {...defaults};

const sliders = [
  {key:'blur', min:0, max:40, step:1, unit:'px'},
  {key:'opacity', min:0, max:1, step:0.01, unit:''},
  {key:'borderWidth', min:0, max:5, step:0.5, unit:'px'},
  {key:'radius', min:0, max:50, step:1, unit:'px'},
  {key:'shadow', min:0, max:60, step:1, unit:'px'},
  {key:'width', min:150, max:600, step:10, unit:'px'},
  {key:'padding', min:8, max:64, step:4, unit:'px'},
];

function renderControls() {
  const c = $('#controls');
  let html = '';
  sliders.forEach(s => {
    html += `<label>${t(s.key)}: <span id="val-${s.key}">${vals[s.key]}</span>${s.unit}
      <input type="range" min="${s.min}" max="${s.max}" step="${s.step}" value="${vals[s.key]}" data-key="${s.key}" oninput="updateVal(this)"></label>`;
  });
  html += `<label>${t('borderColor')}: <input type="color" value="${rgbaToHex(vals.borderColor)}" data-key="borderColor" oninput="updateColor(this)"></label>`;
  html += `<label>${t('bgColor')}: <input type="color" value="${vals.bgColor}" data-key="bgColor" oninput="updateColor(this)"></label>`;
  c.innerHTML = html;
}

function rgbaToHex(rgba) {
  if (rgba.startsWith('#')) return rgba.slice(0,7);
  const m = rgba.match(/[\d.]+/g);
  if (!m) return '#ffffff';
  return '#' + m.slice(0,3).map(x => Math.round(parseFloat(x)).toString(16).padStart(2,'0')).join('');
}

window.updateVal = function(el) {
  const key = el.dataset.key;
  vals[key] = parseFloat(el.value);
  $(`#val-${key}`).textContent = vals[key];
  renderCard();
};

window.updateColor = function(el) {
  vals[el.dataset.key] = el.value;
  renderCard();
};

function renderCard() {
  const card = $('#glassCard');
  const v = vals;
  card.style.width = v.width + 'px';
  card.style.padding = v.padding + 'px';
  card.style.borderRadius = v.radius + 'px';
  card.style.background = `rgba(${hexToRgb(v.bgColor)},${v.opacity})`;
  card.style.backdropFilter = `blur(${v.blur}px)`;
  card.style.webkitBackdropFilter = `blur(${v.blur}px)`;
  card.style.border = `${v.borderWidth}px solid ${v.borderColor}`;
  card.style.boxShadow = `0 ${v.shadow/2}px ${v.shadow}px rgba(0,0,0,0.1)`;

  const css = `.glass-card {
  width: ${v.width}px;
  padding: ${v.padding}px;
  border-radius: ${v.radius}px;
  background: rgba(${hexToRgb(v.bgColor)}, ${v.opacity});
  backdrop-filter: blur(${v.blur}px);
  -webkit-backdrop-filter: blur(${v.blur}px);
  border: ${v.borderWidth}px solid ${v.borderColor};
  box-shadow: 0 ${Math.round(v.shadow/2)}px ${v.shadow}px rgba(0, 0, 0, 0.1);
}`;
  $('#codeOutput').textContent = css;
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r}, ${g}, ${b}`;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#codeOutput').textContent)">${t('copyCSS')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="vals={...defaults};renderControls();renderCard()">${t('reset')}</button>`;

GZ.renderToolPage({
  category: 'css-tools',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/css-tools/box-shadow.html', name:'Box Shadow'},
    {icon:'🎨', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'🎨', href:'/css-tools/border-radius.html', name:'Border Radius'},
    {icon:'🎨', href:'/css-tools/buttons.html', name:'Button Generator'},
  ]
});

renderControls();
renderCard();
</script>
<script src="/tools-result-rec.js" defer></script>
