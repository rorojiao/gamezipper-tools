const { $, copyText, t } = GZ;

// EAN-13 encoding tables
const L = ['0001101','0011001','0010011','0111101','0100011','0110001','0101111','0111011','0110111','0001011'];
const G = ['0100111','0110011','0011011','0100001','0011101','0111001','0000101','0010001','0001001','0010111'];
const R = ['1110010','1100110','1101100','1000010','1011100','1001110','1010000','1000100','1001000','1110100'];
const PARITY = [
  ['L','L','L','L','L','L'], ['L','L','G','L','G','G'], ['L','G','L','L','G','G'], ['L','G','G','L','L','L'],
  ['L','L','G','G','L','L'], ['L','G','L','G','L','L'], ['L','G','G','G','L','L'], ['L','L','L','G','G','L'],
  ['L','L','G','L','G','L'], ['L','G','L','L','L','G'],
];

function ean13Checksum(twelve) {
  let sum = 0;
  for (let i = 0; i < 12; i++) sum += parseInt(twelve[i]) * (i % 2 === 0 ? 1 : 3);
  return (10 - (sum % 10)) % 10;
}

function isbn10CheckDigit(first9) {
  let sum = 0;
  for (let i = 0; i < 9; i++) sum += parseInt(first9[i]) * (10 - i);
  let r = (11 - (sum % 11)) % 11;
  return r === 10 ? 'X' : String(r);
}

function isbn10To13(isbn10) {
  const core = isbn10.substring(0, 9);
  const thirteen = '978' + core;
  return thirteen + ean13Checksum(thirteen);
}

function encodeEAN13(fullDigits) {
  const first = parseInt(fullDigits[0]);
  const left = fullDigits.substring(1, 7);
  const right = fullDigits.substring(7, 13);
  const parity = PARITY[first];
  let bits = '101';
  for (let i = 0; i < 6; i++) {
    const d = parseInt(left[i]);
    bits += (parity[i] === 'L' ? L[d] : G[d]);
  }
  bits += '01010';
  for (let i = 0; i < 6; i++) bits += R[parseInt(right[i])];
  bits += '101';
  return bits;
}

// EAN-5 add-on encoding (checksum parity pattern)
const ADDON_PARITY = [
  ['G','G','L','L','L'], ['L','G','G','L','L'], ['L','L','G','G','L'], ['L','L','L','G','G'],
  ['G','L','G','L','L'], ['L','G','L','G','L'], ['L','L','G','L','G'], ['G','G','L','G','L'],
  ['L','G','G','L','G'], ['G','L','L','G','G'],
];

function addonChecksum(five) {
  let sum = 0;
  for (let i = 0; i < 5; i++) sum += parseInt(five[i]) * (i % 2 === 0 ? 3 : 9);
  return sum % 10;
}

function encodeAddon(five) {
  const parity = ADDON_PARITY[addonChecksum(five)];
  let bits = '1011'; // left guard
  for (let i = 0; i < 5; i++) {
    const d = parseInt(five[i]);
    bits += (parity[i] === 'L' ? L[d] : G[d]);
    if (i < 4) bits += '01'; // internal separator
  }
  return bits;
}

function generate() {
  const raw = ($('#data').value || '').replace(/[^\dXx]/g, '').toUpperCase();
  const svg = $('#barcode-svg');
  const info = $('#info');

  let normalized = '';
  let converted = false;
  if (/^\d{13}$/.test(raw)) {
    normalized = raw;
  } else if (/^\d{12}$/.test(raw)) {
    normalized = raw + ean13Checksum(raw);
  } else if (/^\d{9}[\dX]$/.test(raw) || /^\d{10}$/.test(raw)) {
    normalized = isbn10To13(raw);
    converted = true;
  } else {
    svg.innerHTML = '';
    info.innerHTML = `<span style="color:var(--gz-accent)">${t('enterValid')}</span>`;
    return;
  }

  // addon
  const addonRaw = ($('#addon').value || '').replace(/\D/g, '');
  let addonInfo = '';
  let addonBits = '';
  if (addonRaw) {
    if (addonRaw.length === 5) {
      addonBits = encodeAddon(addonRaw);
      addonInfo = ` <span style="color:var(--gz-success)">+ ${t('addonOk')(addonRaw)}</span>`;
    } else {
      addonInfo = ` <span style="color:var(--gz-accent)">⚠ ${t('addonBad')}</span>`;
    }
  }

  const bits = encodeEAN13(normalized);
  const scale = parseInt($('#scale').value);
  const barH = parseInt($('#height').value);
  const unitW = scale;
  const quietZone = 10 * scale;
  const addonGap = addonBits ? 8 * scale : 0;
  const addonTextH = $('#showtext').checked ? 20 : 0;
  const totalW = bits.length * unitW + quietZone * 2 + addonGap + (addonBits ? addonBits.length * unitW : 0);
  const textH = addonTextH;
  const totalH = barH + textH;
  const textY = barH + 16;

  let rects = '';
  for (let i = 0; i < bits.length; i++) {
    if (bits[i] === '1') {
      rects += `<rect x="${quietZone + i * unitW}" y="0" width="${unitW}" height="${barH}" fill="#000"/>`;
    }
  }
  let textEl = '';
  if ($('#showtext').checked) {
    const display = normalized;
    textEl = `<text x="${quietZone + (bits.length * unitW)/2}" y="${textY}" font-family="monospace" font-size="14" fill="#000" text-anchor="middle" letter-spacing="2">${display}</text>`;
  }

  // addon
  let addonRects = '';
  let addonText = '';
  if (addonBits) {
    const baseX = quietZone + bits.length * unitW + addonGap;
    for (let i = 0; i < addonBits.length; i++) {
      if (addonBits[i] === '1') {
        // addon bars are shorter (typically 70% of main)
        addonRects += `<rect x="${baseX + i * unitW}" y="${barH*0.15}" width="${unitW}" height="${barH*0.7}" fill="#000"/>`;
      }
    }
    if ($('#showtext').checked) {
      addonText = `<text x="${baseX + (addonBits.length * unitW)/2}" y="${textY}" font-family="monospace" font-size="12" fill="#000" text-anchor="middle" letter-spacing="1">${addonRaw}</text>`;
    }
  }

  svg.setAttribute('width', totalW);
  svg.setAttribute('height', totalH);
  svg.setAttribute('viewBox', `0 0 ${totalW} ${totalH}`);
  svg.innerHTML = `<rect x="0" y="0" width="${totalW}" height="${totalH}" fill="#fff"/>${rects}${textEl}${addonRects}${addonText}`;

  let infoHtml = '<span style="color:var(--gz-success)">✓ ';
  if (converted) infoHtml += t('chkFrom10')(normalized);
  else infoHtml += t('valid13')(normalized);
  infoHtml += '</span>';
  infoHtml += addonInfo;
  info.innerHTML = infoHtml;
}

function downloadSvg() {
  const svg = $('#barcode-svg');
  const clone = svg.cloneNode(true);
  const data = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([data], {type: 'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `isbn-${Date.now()}.svg`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function downloadPng() {
  const svg = $('#barcode-svg');
  const data = new XMLSerializer().serializeToString(svg);
  const img = new Image();
  const blob = new Blob([data], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = img.width * 2;
    canvas.height = img.height * 2;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    canvas.toBlob(function(b) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = `isbn-${Date.now()}.png`;
      a.click();
      URL.revokeObjectURL(a.href);
    });
  };
  img.src = url;
}

$('#lbl-data').textContent = t('lblData');
$('#lbl-addon').textContent = t('lblAddon');
