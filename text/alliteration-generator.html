<script>
GZI18n.register({
  en: {
    toolTitle: 'Alliteration Generator',
    toolDesc: 'Pick a letter and instantly create fun alliterative phrases and sentences. Great for writing, branding, poetry and word games — 100% browser-based.',
    gen: 'Generate',
    lblLen: 'Words:',
    lblCap: 'Capitalize each',
    step1: 'Click a letter to choose your starting sound',
    step2: 'Pick how many words the phrase should have',
    step3: 'Click Generate to build a fresh alliterative phrase',
    step4: 'Copy or Share your favorite phrase',
  },
  zh: {
    toolTitle: '头韵生成器',
    toolDesc: '选择一个字母，即时创建有趣的双声（头韵）短语和句子。适合写作、品牌命名、诗歌和文字游戏——纯浏览器运行。',
    gen: '生成',
    lblLen: '词数：',
    lblCap: '每个单词首字母大写',
    step1: '点击一个字母选择起始发音',
    step2: '选择短语包含几个词',
    step3: '点击「生成」构建新的头韵短语',
    step4: '复制或分享你喜欢的短语',
  }
});

const { $, copyText, t } = GZ;

const WORDS = {
  B:['big','brave','bright','bouncing','bubbly','bold','baby','bear','basket','banana','book','butterfly','bridge','bubble','beach','baker','bottle','bee','bread','brother'],
  C:['clever','curious','crazy','cute','clumsy','cool','cat','cookie','castle','cloud','captain','cake','candle','car','cousin','carpet','camel','clock','candy','cabin'],
  D:['dancing','daring','delightful','dreamy','dizzy','dear','dog','dragon','door','diamond','daisy','drum','doctor','dolphin','dessert','duck','dollar','desk','dancer','doughnut'],
  F:['funny','fast','fluffy','fancy','fearless','friendly','fox','frog','flower','forest','feather','firefly','farmer','fountain','flag','fairy','fish','flute','flamingo','folder'],
  G:['great','giant','gentle','giggling','golden','grumpy','goat','garden','ghost','gift','guitar','globe','grape','goblin','galaxy','gazelle','gate','ginger','guppy','glass'],
  H:['happy','hopping','hungry','hairy','handsome','humble','horse','hat','house','honey','hamster','hill','harbor','helicopter','harp','hero','hibiscus','hook','hedgehog','hurricane'],
  J:['jolly','jumpy','jovial','joyful','jolly','jolly','jaguar','jelly','jacket','jungle','jester','jewel','javelin','jet','jam','joker','juniper','jar','jig','jackal'],
  K:['kind','keen','kooky','knightly','kingly','koala','kite','kitten','kangaroo','kingdom','kelp','kettle','kernel','kayak','kiwi','king','knight','kaleidoscope','koi','karate'],
  L:['little','lazy','loud','lovely','lucky','lively','lion','ladder','lake','lemon','lighthouse','lizard','lantern','leaf','lamb','lute','ladder','lotus','lobster','library'],
  M:['merry','mighty','magical','mysterious','muddy','monkey','moon','mountain','mango','meadow','muffin','marble','maple','magnet','marble','mole','melody','moth','mushroom','minnow'],
  P:['playful','proud','plump','polite','peaceful','panda','penguin','pencil','pumpkin','pirate','piano','puzzle','parrot','pebble','plum','pond','puppy','pillow','pepper','pocket'],
  R:['running','rosy','royal','rugged','restless','rabbit','river','rainbow','robot','rocket','ring','robin','raccoon','rug','radish','ribbon','rattle','reef','ranger','rugby'],
  S:['silly','sleepy','swift','sparkling','sweet','sunny','snake','star','sandwich','squirrel','sunflower','sailboat','spoon','storm','swan','strawberry','slipper','sled','sapphire','scarf'],
  T:['tiny','tall','ticklish','timid','trusty','tiger','turtle','tree','tower','tulip','trumpet','tomato','thunder','towel','trophy','tractor','tent','tulip','toucan','tractor']
};

const LETTERS = Object.keys(WORDS);
let letter = 'S', shown = 0;

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function generate() {
  const bank = WORDS[letter];
  const len = parseInt($('#len').value);
  const used = new Set();
  const parts = [];
  while (parts.length < len && used.size < bank.length) {
    const w = pick(bank);
    if (!used.has(w)) { used.add(w); parts.push(w); }
  }
  let out = parts.join(' ');
  if ($('#capital').checked) out = out.split(' ').map(w => w[0].toUpperCase()+w.slice(1)).join(' ');
  else out = out[0].toUpperCase()+out.slice(1);
  $('#big').textContent = letter.toUpperCase();
  $('#out').textContent = out + '.';
  shown++;
  $('#counter').textContent = (GZI18n.getLang()==='zh' ? `已生成 ${shown} 条头韵短语 ✨` : `${shown} phrases generated ✨`);
}

function buildLetters() {
  $('#letters').innerHTML = LETTERS.map(l =>
    `<button class="letter-btn${l===letter?' active':''}" data-l="${l}">${l}</button>`).join('');
  GZ.$$('#letters .letter-btn').forEach(b => b.onclick = () => { letter=b.dataset.l; buildLetters(); generate(); });
}

function shareAll() {
  const txt = $('#out').textContent;
  if (navigator.share) navigator.share({title:'GameZipper Alliteration', text:txt}).catch(()=>{});
  else copyText(txt);
}

$('#lbl-len').textContent = t('lblLen');
$('#lbl-cap').textContent = t('lblCap');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">🎲 ${t('gen')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#out').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="shareAll()">↗ ${t('gen')==='生成'?'分享':'Share'}</button>`;

buildLetters();
generate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'👅', href:'/fun/tongue-twister-generator.html', name:'Tongue Twister'},
    {icon:'🔤', href:'/text/acrostic-generator.html', name:'Acrostic Generator'},
    {icon:'🎨', href:'/text/ascii-art.html', name:'ASCII Art'},
    {icon:'🌀', href:'/text/spintax-generator.html', name:'Spintax Generator'},
  ]
});
</script>
