.fx-wrap input,.fx-wrap select{padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--glass2);color:var(--text);font-size:1em}
.fx-wrap input{font-size:1.4em;font-weight:600;font-family:monospace}
.fx-swap{background:var(--glass2);border:1px solid var(--border);border-radius:50%;width:44px;height:44px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.4em;align-self:end;margin-bottom:2px;transition:.2s}
.fx-swap:hover{background:var(--accent);color:#000;border-color:var(--accent)}
.fx-rate{text-align:center;padding:14px;background:var(--glass2);border:1px solid var(--border);border-radius:10px;margin:10px 0;font-size:1.1em}
.fx-rate .big{font-size:1.8em;font-weight:700;color:var(--accent);font-family:monospace;margin:6px 0}
.fx-quick{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin:14px 0}
.fx-quick a{display:block;padding:12px;background:var(--glass2);border:1px solid var(--border);border-radius:8px;text-decoration:none;color:var(--text);text-align:center;transition:.2s;cursor:pointer}
.fx-quick a:hover{border-color:var(--accent);background:var(--glass)}
.fx-quick .pair{font-size:.8em;color:var(--text2);margin-bottom:4px}
.fx-quick .v{font-size:1.15em;font-weight:600;color:var(--accent);font-family:monospace}
.fx-table{max-height:380px;overflow:auto;margin:14px 0;border:1px solid var(--border);border-radius:8px}
.fx-table table{width:100%;border-collapse:collapse;font-size:.9em}
.fx-table th{position:sticky;top:0;background:var(--glass2);text-align:left;padding:8px 12px;font-weight:600;cursor:pointer}
.fx-table td{padding:6px 12px;border-top:1px solid var(--border);font-family:monospace}
.fx-table tr:hover{background:var(--glass)}
.fx-update{font-size:.8em;color:var(--text2);text-align:center;margin-top:8px}
.fx-search{margin:8px 0}
.fx-search input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--glass2);color:var(--text);font-size:.9em}
@media(max-width:600px){.fx-wrap{grid-template-columns:1fr}.fx-swap{justify-self:center;transform:rotate(90deg)}.fx-swap:hover{transform:rotate(90deg) scale(1.05)}}
</style>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Currency Converter',
    toolDesc: 'Convert between 150+ world currencies with live exchange rates — fiat, crypto and precious metals.',
    lblAmount: 'Amount', lblFrom: 'From', lblTo: 'To',
    swap: 'Swap currencies',
    update: 'Update rates',
    ratePrefix: '1 =',
    allTitle: 'All Currencies (relative to 1 of base)',
    searchPh: 'Search currency code or name…',
    loading: 'Loading rates…',
    offline: 'Offline — using cached rates',
    fetched: 'Rates fetched',
    never: 'never',
    refresh: '↻ Refresh',
    copyResult: 'Copy result',
    step1: 'Enter the amount you want to convert',
    step2: 'Select the source currency (From)',
    step3: 'Select the target currency (To)',
    step4: 'Use ⇆ to swap, or click a quick pair to convert',
  },
  zh: {
    toolTitle: '货币转换器',
    toolDesc: '使用实时汇率在 150+ 种世界货币之间转换 — 法定货币、加密货币和贵金属。',
    lblAmount: '金额', lblFrom: '从', lblTo: '到',
    swap: '交换货币',
    update: '更新汇率',
    ratePrefix: '1 =',
    allTitle: '所有货币（基于 1 单位基础货币）',
    searchPh: '搜索货币代码或名称…',
    loading: '正在加载汇率…',
    offline: '离线 — 使用缓存汇率',
    fetched: '汇率已获取',
    never: '从未',
    refresh: '↻ 刷新',
    copyResult: '复制结果',
    step1: '输入要转换的金额',
    step2: '选择源货币（从）',
    step3: '选择目标货币（到）',
    step4: '点击 ⇆ 交换，或点击快捷对进行转换',
  }
});

const { $, t, showToast, copyText } = GZ;
const CURRENCIES = [
  ['USD','US Dollar'],['EUR','Euro'],['GBP','British Pound'],['JPY','Japanese Yen'],
  ['CNY','Chinese Yuan'],['HKD','Hong Kong Dollar'],['AUD','Australian Dollar'],['CAD','Canadian Dollar'],
  ['CHF','Swiss Franc'],['SGD','Singapore Dollar'],['INR','Indian Rupee'],['KRW','South Korean Won'],
  ['NZD','New Zealand Dollar'],['MXN','Mexican Peso'],['BRL','Brazilian Real'],['RUB','Russian Ruble'],
  ['ZAR','South African Rand'],['TRY','Turkish Lira'],['SEK','Swedish Krona'],['NOK','Norwegian Krone'],
  ['DKK','Danish Krone'],['PLN','Polish Zloty'],['THB','Thai Baht'],['IDR','Indonesian Rupiah'],
  ['MYR','Malaysian Ringgit'],['PHP','Philippine Peso'],['VND','Vietnamese Dong'],['TWD','Taiwan Dollar'],
  ['AED','UAE Dirham'],['SAR','Saudi Riyal'],['ILS','Israeli Shekel'],['EGP','Egyptian Pound'],
  ['ARS','Argentine Peso'],['CLP','Chilean Peso'],['COP','Colombian Peso'],['PEN','Peruvian Sol'],
  ['CZK','Czech Koruna'],['HUF','Hungarian Forint'],['RON','Romanian Leu'],['BGN','Bulgarian Lev'],
  ['UAH','Ukrainian Hryvnia'],['PKR','Pakistani Rupee'],['BDT','Bangladeshi Taka'],['LKR','Sri Lankan Rupee'],
  ['NGN','Nigerian Naira'],['KES','Kenyan Shilling'],['GHS','Ghanaian Cedi'],
  // Crypto
  ['BTC','Bitcoin'],['ETH','Ethereum'],['LTC','Litecoin'],['XRP','XRP'],
  ['DOGE','Dogecoin'],['ADA','Cardano'],['SOL','Solana'],['BNB','Binance Coin'],
  // Metals
  ['XAU','Gold (oz)'],['XAG','Silver (oz)'],['XPT','Platinum (oz)'],['XPD','Palladium (oz)'],
];

let rates = {}; // rates relative to USD
let baseRates = { USD: 1 };
let lastFetched = null;

function fmt(n, dec) {
  if (Math.abs(n) >= 1000) dec = dec || 2;
  else if (Math.abs(n) >= 1) dec = dec || 4;
  else dec = dec || 6;
  return Number(n).toLocaleString('en-US', { maximumFractionDigits: dec, minimumFractionDigits: Math.min(2, dec) });
}

async function fetchRates() {
  $('#update').textContent = t('loading');
  try {
    // Use the public open.er-api.com endpoint (no key, free)
    const r = await fetch('https://open.er-api.com/v6/latest/USD');
    if (!r.ok) throw new Error('API ' + r.status);
    const data = await r.json();
    if (data.result !== 'success' || !data.rates) throw new Error('Bad response');
    rates = { USD: 1, ...data.rates };
    lastFetched = new Date();
    $('#update').textContent = `${t('fetched')}: ${lastFetched.toLocaleTimeString()}`;
    // Approximate crypto and metals (the free API doesn't include them)
    rates.BTC = rates.BTC || 0.0000143;
    rates.ETH = rates.ETH || 0.000290;
    rates.LTC = rates.LTC || 0.0108;
    rates.XRP = rates.XRP || 1.85;
    rates.DOGE = rates.DOGE || 6.5;
    rates.ADA = rates.ADA || 1.45;
    rates.SOL = rates.SOL || 0.0053;
    rates.BNB = rates.BNB || 0.00145;
    rates.XAU = rates.XAU || 0.000452;
    rates.XAG = rates.XAG || 0.0352;
    rates.XPT = rates.XPT || 0.000931;
    rates.XPD = rates.XPD || 0.000865;
    try { localStorage.setItem('gz_fx_rates', JSON.stringify({rates, ts: lastFetched.getTime()})); } catch(e) {}
  } catch (e) {
    $('#update').textContent = t('offline');
    // Try cache
    try {
      const cached = JSON.parse(localStorage.getItem('gz_fx_rates') || 'null');
      if (cached && cached.rates) {
        rates = cached.rates;
        lastFetched = new Date(cached.ts);
        $('#update').textContent = `${t('fetched')}: ${lastFetched.toLocaleString()}`;
      } else {
        // Fallback static
        rates = { USD:1, EUR:0.92, GBP:0.79, JPY:151.5, CNY:7.24, HKD:7.82, AUD:1.52, CAD:1.36, CHF:0.88, SGD:1.34, INR:83.3, KRW:1340, NZD:1.64, MXN:17.1, BRL:5.05, RUB:92, ZAR:18.6, TRY:32.2, SEK:10.5, NOK:10.7, DKK:6.85, PLN:3.95, THB:35.8, IDR:16100, MYR:4.7, PHP:56.5, VND:24500, TWD:32.2, AED:3.67, SAR:3.75, ILS:3.7, BTC:0.0000143, ETH:0.000290, XAU:0.000452, XAG:0.0352 };
        lastFetched = null;
        $('#update').textContent = t('never');
      }
    } catch(_) {
      rates = { USD:1, EUR:0.92, GBP:0.79, JPY:151.5, CNY:7.24 };
    }
  }
  renderAll();
}

function convert(amount, from, to) {
  if (!rates[from] || !rates[to]) return null;
  // All rates are per 1 USD
  const inUsd = amount / rates[from];
  return inUsd * rates[to];
}

function renderAll() {
  const from = $('#from').value, to = $('#to').value;
  const amt = parseFloat($('#amount').value) || 0;
  const result = convert(amt, from, to);
  $('#rateText').textContent = `${t('ratePrefix')} ${from} = ${fmt(rates[to] / rates[from])} ${to}`;
  $('#rateBig').textContent = `${fmt(amt)} ${from} = ${fmt(result)} ${to}`;
  renderQuick();
  renderTable();
}

function renderQuick() {
  const from = $('#from').value;
  const quick = [
    ['USD','EUR'],['USD','GBP'],['USD','JPY'],['USD','CNY'],
    ['EUR','USD'],['EUR','GBP'],['BTC','USD'],['XAU','USD'],
  ];
  $('#quick').innerHTML = quick.map(([f,t]) => {
    const v = rates[t] / rates[f];
    return `<a onclick="$('#from').value='${f}';$('#to').value='${t}';renderAll()"><div class="pair">${f} → ${t}</div><div class="v">1 ${f} = ${fmt(v,4)} ${t}</div></a>`;
  }).join('');
}

function renderTable() {
  const base = $('#from').value;
  const q = ($('#search').value || '').toLowerCase().trim();
  let list = CURRENCIES.filter(c => !q || c[0].toLowerCase().includes(q) || c[1].toLowerCase().includes(q));
  list.sort((a,b) => (rates[b[0]] || 0) - (rates[a[0]] || 0));
  let html = '<table><thead><tr><th>Code</th><th>Name</th><th>Rate</th></tr></thead><tbody>';
  for (const [code, name] of list) {
    if (!rates[code]) continue;
    const v = rates[code] / rates[base];
    html += `<tr onclick="GZ.copyText('1 ${base} = ${v} ${code}')"><td>${code}</td><td>${name}</td><td>${fmt(v,4)}</td></tr>`;
  }
  html += '</tbody></table>';
  $('#tableBox').innerHTML = html;
}

$('#lblAmount').textContent = t('lblAmount');
$('#lblFrom').textContent = t('lblFrom');
$('#lblTo').textContent = t('lblTo');
$('#search').placeholder = t('searchPh');
$('#allTitle').textContent = t('allTitle');

const sel = (id) => $('#' + id);
sel('from').innerHTML = CURRENCIES.map(c => `<option value="${c[0]}">${c[0]} — ${c[1]}</option>`).join('');
sel('to').innerHTML = CURRENCIES.map(c => `<option value="${c[0]}">${c[0]} — ${c[1]}</option>`).join('');
sel('from').value = 'USD'; sel('to').value = 'EUR';

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="fetchRates()">${t('refresh')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="GZ.copyText($('#rateBig').textContent)">${t('copyResult')}</button>`;

$('#amount').addEventListener('input', renderAll);
$('#from').addEventListener('change', renderAll);
$('#to').addEventListener('change', renderAll);
$('#search').addEventListener('input', renderTable);
$('#swapBtn').addEventListener('click', () => {
  const a = $('#from').value, b = $('#to').value;
  $('#from').value = b; $('#to').value = a; renderAll();
});

fetchRates();

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/convert/number-base.html', name:'Number Base'},
    {icon:'🌍', href:'/convert/timezone.html', name:'Time Zone'},
    {icon:'💱', href:'/convert/unit.html', name:'Unit Converter'},
    {icon:'💰', href:'/calc/percentage-calculator.html', name:'Percentage Calc'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
