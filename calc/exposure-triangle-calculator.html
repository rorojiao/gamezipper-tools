<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the exposure triangle?", "acceptedAnswer": {"@type": "Answer", "text": "The exposure triangle describes the relationship between three camera settings that control exposure: aperture (f-number), shutter speed, and ISO. Changing any one setting affects the total amount of light reaching the sensor."}}, {"@type": "Question", "name": "What is a stop of light?", "acceptedAnswer": {"@type": "Answer", "text": "A stop (or EV stop) is a doubling or halving of the amount of light. Opening the aperture from f/4 to f/2.8 lets in twice as much light (+1 stop). Doubling ISO from 100 to 200 also adds one stop."}}, {"@type": "Question", "name": "How do I find equivalent exposures?", "acceptedAnswer": {"@type": "Answer", "text": "If you change one setting by N stops, you must compensate by changing one or both other settings by a total of N stops in the opposite direction. This calculator handles the math automatically so your exposure stays the same."}}, {"@type": "Question", "name": "What is EV (exposure value)?", "acceptedAnswer": {"@type": "Answer", "text": "Exposure value (EV) is a single number that represents a combination of aperture and shutter speed at ISO 100. EV 0 is f/1 at 1 second. Higher EV values mean less light (brighter scenes), lower values mean more light (darker scenes)."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Exposure Triangle Calculator',
    toolDesc: 'Find equivalent camera exposures by trading stops between aperture, shutter speed and ISO. Maintain the same exposure while changing depth of field or motion blur.',
    baseSettings: 'Base Settings',
    targetSettings: 'Target Settings',
    aperture: 'Aperture (f-number)',
    shutter: 'Shutter Speed',
    iso: 'ISO',
    evLabel: 'Exposure Difference',
    autoShutter: 'Auto-Calculate Shutter',
    evEqual: '✓ Equal exposure — settings match',
    evDiff: 'stops difference — adjust to match',
    evStop: 'stop',
    evStops: 'stops',
    step1: 'Set your base exposure (aperture, shutter, ISO)',
    step2: 'Change the aperture or ISO you want to use',
    step3: 'Click Auto-Calculate Shutter to find the matching shutter speed',
    step4: 'The green checkmark confirms equal exposure',
  },
  zh: {
    toolTitle: '曝光三角计算器',
    toolDesc: '通过在光圈、快门速度和 ISO 之间交换档位来找到等效的相机曝光。在改变景深或动态模糊的同时保持相同曝光量。',
    baseSettings: '基准设置',
    targetSettings: '目标设置',
    aperture: '光圈 (f 数值)',
    shutter: '快门速度',
    iso: 'ISO',
    evLabel: '曝光差异',
    autoShutter: '自动计算快门',
    evEqual: '✓ 曝光相等 — 设置匹配',
    evDiff: '档差异 — 请调整以匹配',
    evStop: '档',
    evStops: '档',
    step1: '设置基准曝光（光圈、快门、ISO）',
    step2: '更改你想使用的光圈或 ISO',
    step3: '点击「自动计算快门」找到匹配的快门速度',
    step4: '绿色对勾确认曝光相等',
  }
});

const { $, t } = GZ;

// Standard stop sequences (1/3 stop increments)
const apertures = ['f/1.0','f/1.1','f/1.2','f/1.4','f/1.6','f/1.8','f/2.0','f/2.2','f/2.5','f/2.8','f/3.2','f/3.5','f/4.0','f/4.5','f/5.0','f/5.6','f/6.3','f/7.1','f/8.0','f/9.0','f/10','f/11','f/13','f/14','f/16','f/18','f/20','f/22','f/25','f/28','f/32'];
const shutters = ['1/8000','1/6400','1/5000','1/4000','1/3200','1/2500','1/2000','1/1600','1/1250','1/1000','1/800','1/640','1/500','1/400','1/320','1/250','1/200','1/160','1/125','1/100','1/80','1/60','1/50','1/40','1/30','1/25','1/20','1/15','1/13','1/10','1/8','1/6','1/5','1/4','0.3','1/2','0.6','1','1.3','2','3','4','6','8','13','15','30'];
const isos = ['50','64','80','100','125','160','200','250','320','400','500','640','800','1000','1250','1600','2000','2500','3200','4000','5000','6400','8000','10000','12800','16000','20000','25600','32000','40000','51200','102400'];

function fillSelect(sel, arr, defaultIdx) {
  sel.innerHTML = arr.map((v, i) => `<option value="${i}"${i === defaultIdx ? ' selected' : ''}>${v}</option>`).join('');
}

fillSelect($('#aperture1'), apertures, 9);  // f/2.8
fillSelect($('#shutter1'), shutters, 12);   // 1/500
fillSelect($('#iso1'), isos, 3);            // 100
fillSelect($('#aperture2'), apertures, 9);
fillSelect($('#shutter2'), shutters, 12);
fillSelect($('#iso2'), isos, 3);

function calc() {
  const a1 = +$('#aperture1').value, a2 = +$('#aperture2').value;
  const s1 = +$('#shutter1').value, s2 = +$('#shutter2').value;
  const i1 = +$('#iso1').value, i2 = +$('#iso2').value;
  // Each index step = 1/3 stop. Positive = more light.
  // Aperture: higher index = smaller aperture = LESS light
  // Shutter: higher index = slower = MORE light
  // ISO: higher index = higher ISO = MORE light
  const stops = ((a1 - a2) + (s2 - s1) + (i2 - i1)) / 3;
  const absStops = Math.abs(stops);
  const stopLabel = absStops === 1 ? t('evStop') : t('evStops');
  if (absStops < 0.01) {
    $('#ev-value').textContent = '✓';
    $('#et-note').textContent = t('evEqual');
    $('#et-note').style.color = 'var(--gz-success, #00d672)';
  } else {
    $('#ev-value').textContent = (stops > 0 ? '+' : '') + stops.toFixed(1);
    $('#et-note').textContent = absStops.toFixed(1) + ' ' + stopLabel + ' ' + t('evDiff');
    $('#et-note').style.color = stops > 0 ? '#00d672' : '#ff6b6b';
  }
}

$('#btn-shutter').addEventListener('click', () => {
  const a1 = +$('#aperture1').value, a2 = +$('#aperture2').value;
  const s1 = +$('#shutter1').value;
  const i1 = +$('#iso1').value, i2 = +$('#iso2').value;
  // Need: (a1-a2) + (s2-s1) + (i2-i1) = 0
  // s2 = s1 - (a1-a2) - (i2-i1)
  let s2 = Math.round(s1 - (a1 - a2) - (i2 - i1));
  s2 = Math.max(0, Math.min(shutters.length - 1, s2));
  $('#shutter2').value = s2;
  calc();
});

['aperture1','shutter1','iso1','aperture2','shutter2','iso2'].forEach(id => $('#' + id).addEventListener('change', calc));

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📸', href:'/calc/depth-of-field-calculator.html', name:'Depth of Field'},
    {icon:'🌅', href:'/calc/golden-hour-calculator.html', name:'Golden Hour'},
    {icon:'📐', href:'/calc/aspect-ratio-calculator.html', name:'Aspect Ratio'},
    {icon:'📏', href:'/calc/screen-size-calculator.html', name:'Screen Size'},
  ]
});
calc();
</script>
