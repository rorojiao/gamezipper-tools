<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is wavy underline text?","acceptedAnswer":{"@type":"Answer","text":"Wavy underline text adds a squiggly tilde beneath every character using the Unicode combining mark U+0330 (combining tilde below). The result looks like S̰q̰ṵḭg̰g̰l̰ḛ — a distinctive wavy line under your text."}},{"@type":"Question","name":"How is wavy underline different from strikethrough?","acceptedAnswer":{"@type":"Answer","text":"Strikethrough draws a horizontal line THROUGH the middle of each character (T̶e̶x̶t̶). Wavy underline draws a squiggly line UNDER each character (T̰ḛx̰t̰). Both use real Unicode combining marks and work anywhere."}},{"@type":"Question","name":"Where can I use wavy underline text?","acceptedAnswer":{"@type":"Answer","text":"Wavy underline works on Facebook, Twitter (X), Discord, Reddit, Instagram captions, YouTube comments and most modern chat apps. Some older systems may render the tilde slightly offset, but the text stays readable."}},{"@type":"Question","name":"Does this tool upload my text?","acceptedAnswer":{"@type":"Answer","text":"No. All processing happens locally in your browser using standard Unicode. Your text never leaves your device."}}]}</script>

  en: {
    toolTitle: 'Wavy Underline Text Generator',
    toolDesc: 'Add a squiggly tilde beneath every character for a unique S̰q̰ṵḭg̰g̰l̰ḛ effect. Copy & paste to Facebook, Twitter, Discord and Reddit — works everywhere.',

  },
  zh: {
    toolTitle: '波浪下划线文字生成器',
    toolDesc: '为每个字符下方添加波浪线，打造独特的 S̰q̰ṵḭg̰g̰l̰ḛ 效果。一键复制粘贴到 Facebook、Twitter、Discord 和 Reddit。',
    lblIn: '输入或粘贴你的文字',
    lblOut: '波浪样式（点击复制）',
    clear: '清空',
    copy: '复制',
    copied: '✓ 已复制！',
    sampleText: '波浪文字',
    singleLabel: '下方波浪',
    doubleLabel: '双重波浪',
    topLabel: '上方波浪',
    mixedLabel: '波浪 + 下划线',
    step1: '在输入框中输入或粘贴文字',
    step2: '浏览各种波浪下划线样式',
    step3: '点击所需样式旁的「复制」按钮',
    step4: '粘贴到 Facebook、Twitter、Discord 或 Reddit',
  }
});

const { $, copyText, t } = GZ;

// Combining marks
const TILDE_BELOW = '\u0330';     // combining tilde below (wavy underline)
const TILDE_ABOVE = '\u0334';     // combining tilde above
const LOW_LINE = '\u0332';        // combining low line (underline)

function applyMark(str, mark){
  let out='';
  for(const ch of str){ out += ch + mark; }
  return out;
}

function render(){
  const input = $('#input').value || t('sampleText');
  const styles = [
    {label: t('singleLabel'), result: applyMark(input, TILDE_BELOW)},
    {label: t('doubleLabel'), result: applyMark(applyMark(input, TILDE_BELOW), TILDE_BELOW)},
    {label: t('topLabel'),    result: applyMark(input, TILDE_ABOVE)},
    {label: t('mixedLabel'),  result: applyMark(applyMark(input, LOW_LINE), TILDE_BELOW)},
  ];
  let html='';
  for(const s of styles){
    html += `<div class="result-row"><span class="label">${escapeHtml(s.label)}</span><span class="out">${escapeHtml(s.result)}</span><button class="gz-btn gz-btn-tool copy-btn" data-text="${escapeAttr(s.result)}">${t('copy')}</button></div>`;
  }
  $('#output').innerHTML = html;
  $('#output').querySelectorAll('.copy-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      copyText(btn.dataset.text);
      const orig = btn.textContent;
      btn.textContent = t('copied');
      setTimeout(()=>{btn.textContent = orig;}, 1200);
    });
  });
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escapeAttr(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

$('#input').addEventListener('input', render);

$('#toolbar').innerHTML = `<button class="gz-btn" id="btn-clear">${t('clear')}</button>`;
$('#btn-clear').addEventListener('click', ()=>{$('#input').value='';render();$('#input').focus();});

render();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

  ]
});
