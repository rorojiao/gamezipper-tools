.g2048-cell[data-v="512"]{background:#edc850;color:#fff;font-size:1.3em}
.g2048-cell[data-v="1024"]{background:#edc53f;color:#fff;font-size:1.1em}
.g2048-cell[data-v="2048"]{background:#edc22e;color:#fff;font-size:1.1em;box-shadow:0 0 20px #edc22e}
.g2048-cell[data-v="4096"],.g2048-cell[data-v="8192"]{background:#3c3a32;color:#f9f6f2;font-size:1em}
.g2048-cell.new{animation:g2048Pop .2s ease}

@keyframes g2048Pop{0%{transform:scale(0)}100%{transform:scale(1)}}
@keyframes g2048Merge{0%{transform:scale(1.2)}100%{transform:scale(1)}}
.g2048-overlay{position:absolute;inset:0;background:rgba(238,228,218,.85);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:10;color:#776e65;font-weight:700}
.g2048-overlay button{background:#8f7a66;color:#fff;border:none;padding:10px 24px;border-radius:6px;font-size:1em;cursor:pointer;font-weight:700}

<script>
GZI18n.register({
  en: {
    g2048Title: '2048 — Online Puzzle Game',
    g2048Desc: 'Join the tiles, get to 2048! Classic sliding number puzzle. Free, no signup, works with keyboard arrows or touch swipes.',
    score: 'Score', best: 'Best', youWin: 'You win! 🎉', gameOver: 'Game over!',
    tryAgain: 'Try again', newGame: 'New Game', undo: '↶ Undo', auto: '▶ Auto-play', stop: '⏸ Stop',
    tip: 'Use arrow keys or swipe to move tiles. Merge matching numbers to reach 2048!',
    g2048Step1: 'Use arrow keys (or swipe) to slide all tiles in a direction',
    g2048Step2: 'Tiles with the same number merge into one with double the value',
    g2048Step3: 'A new 2 or 4 tile spawns after every move',
    g2048Step4: 'Keep your highest tile in a corner and build a chain — reach 2048 to win!',
  },
  zh: {
    g2048Title: '2048 — 经典数字合并游戏',
    g2048Desc: '合并数字方块，挑战 2048！经典滑块数字游戏。免费、无需注册，支持键盘方向键和触屏滑动。',
    score: '分数', best: '最高', youWin: '你赢了！🎉', gameOver: '游戏结束！',
    tryAgain: '再来一局', newGame: '新游戏', undo: '↶ 撤销', auto: '▶ 自动玩', stop: '⏸ 停止',
    tip: '使用方向键或滑动移动方块，合并相同数字以达到 2048！',
    g2048Step1: '使用方向键（或滑动）将所有方块向一个方向滑动',
    g2048Step2: '相同数字的方块相撞时会合并成双倍数字的方块',
    g2048Step3: '每次移动后会随机出现一个 2 或 4 的新方块',
    g2048Step4: '把最大的方块固定在角落，搭建链式合并 —— 达到 2048 即获胜！',
  }
});

const {t,$} = GZ;
const SIZE = 4;
let grid = [], prevGrid = null, prevScore = 0, score = 0, best = +(localStorage.getItem('g2048-best')||0), won = false, over = false, auto = false, autoTimer = null;

$('#lblScore').textContent = t('score');
$('#lblBest').textContent = t('best');
$('#newBtn').textContent = t('newGame');
$('#undoBtn').textContent = t('undo');
$('#autoBtn').textContent = t('auto');
$('#tip').textContent = t('tip');

function emptyGrid(){return Array.from({length:SIZE},()=>Array(SIZE).fill(0));}
function cloneGrid(g){return g.map(r=>r.slice());}
function emptyCells(g){const c=[];for(let r=0;r<SIZE;r++)for(let c2=0;c2<SIZE;c2++)if(!g[r][c2])c.push([r,c2]);return c;}
function addRandom(g){const c=emptyCells(g);if(!c.length)return;[r,c]=c[Math.floor(Math.random()*c.length)];g[r][c]=Math.random()<.9?2:4;}
function gridsEqual(a,b){for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(a[r][c]!==b[r][c])return false;return true;}

function render(){
  $('#grid').innerHTML = '';
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    const v = grid[r][c];
    const cell = document.createElement('div');
    cell.className = 'g2048-cell';
    if(v)cell.setAttribute('data-v', v);
    cell.textContent = v||'';
    cell.style.left = `calc(${c} * 25% + 4px)`;
    cell.style.top = `calc(${r} * 25% + 4px)`;
    cell.style.width = 'calc(25% - 8px)';
    cell.style.height = 'calc(25% - 8px)';
    $('#grid').appendChild(cell);
  }
  $('#score').textContent = score;
  $('#best').textContent = best;
}

function rotate(g){
  const n = g.length;
  const r = emptyGrid();
  for(let i=0;i<n;i++)for(let j=0;j<n;j++)r[j][n-1-i]=g[i][j];
  return r;
}
function moveLeft(g){
  let sc=0,moved=false;
  const out=emptyGrid();
  for(let r=0;r<SIZE;r++){
    let row = g[r].filter(v=>v);
    for(let i=0;i<row.length-1;i++){if(row[i]===row[i+1]){row[i]*=2;sc+=row[i];row.splice(i+1,1);}}
    for(let c=0;c<SIZE;c++){if(out[r][c]!==row[c]){if(out[r][c]!==row[c]||(out[r][c]||g[r][c])!==(row[c]||g[r][c])){}} if(out[r][c]!==row[c])moved=true;out[r][c]=row[c]||0;}
  }
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(out[r][c]!==g[r][c])moved=true;
  return {g:out,sc,moved};
}
function move(dir){
  if(over)return;
  prevGrid = cloneGrid(grid); prevScore = score;
  let g = cloneGrid(grid);
  if(dir==='L'){const m=moveLeft(g);g=m.g;score+=m.sc;}
  else if(dir==='R'){g=rotate(rotate(g));const m=moveLeft(g);g=m.g;score+=m.sc;g=rotate(rotate(g));}
  else if(dir==='U'){g=rotate(rotate(rotate(g)));const m=moveLeft(g);g=m.g;score+=m.sc;g=rotate(g);}
  else if(dir==='D'){g=rotate(g);const m=moveLeft(g);g=m.g;score+=m.sc;g=rotate(rotate(rotate(g)));}
  if(gridsEqual(grid,g))return;
  grid=g; addRandom(grid); render();
  if(score>best){best=score;localStorage.setItem('g2048-best',best);}
  if(!won){for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(grid[r][c]===2048){won=true;showOverlay('youWin');return;}}
  if(checkGameOver()){over=true;showOverlay('gameOver');}
}
function checkGameOver(){
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(!grid[r][c])return false;
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE-1;c++)if(grid[r][c]===grid[r][c+1])return false;
  for(let c=0;c<SIZE;c++)for(let r=0;r<SIZE-1;r++)if(grid[r][c]===grid[r+1][c])return false;
  return true;
}
function showOverlay(key){
  $('#overlayText').textContent = t(key);
  $('#overlayBtn').textContent = t('tryAgain');
  $('#overlay').classList.remove('hidden');
}
function newGame(){
  grid = emptyGrid(); score=0; won=false; over=false; prevGrid=null; prevScore=0;
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;auto=false;$('#autoBtn').textContent=t('auto');}
  addRandom(grid); addRandom(grid); render(); $('#overlay').classList.add('hidden');
}
function undo(){
  if(!prevGrid)return;
  grid=prevGrid;score=prevScore;over=false;prevGrid=null;
  $('#overlay').classList.add('hidden');
  render();
}
function toggleAuto(){
  auto=!auto;
  $('#autoBtn').textContent = t(auto?'stop':'auto');
  if(auto){
    autoTimer = setInterval(()=>{
      if(over){toggleAuto();return;}
      // Greedy: try each direction, pick the one that doesn't move or has the best corner heuristic
      const best=findBestMove();
      if(best)move(best);
    }, 100);
  } else {
    clearInterval(autoTimer);autoTimer=null;
  }
}
function findBestMove(){
  let best=null,bestScore=-Infinity;
  for(const d of ['L','R','U','D']){
    const g=cloneGrid(grid);
    let sc=0;
    if(d==='L'){const m=moveLeft(g);g=m.g;sc=m.sc;}
    else if(d==='R'){g=rotate(rotate(g));const m=moveLeft(g);g=m.g;sc=m.sc;g=rotate(rotate(g));}
    else if(d==='U'){g=rotate(rotate(rotate(g)));const m=moveLeft(g);g=m.g;sc=m.sc;g=rotate(g);}
    else if(d==='D'){g=rotate(g);const m=moveLeft(g);g=m.g;sc=m.sc;g=rotate(rotate(rotate(g)));}
    if(gridsEqual(grid,g))continue;
    // Heuristic: prefer keeping high values in bottom-left corner
    let h=0;
    for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){const w=(SIZE-r)+(SIZE-c);h+=g[r][c]*w;}
    h+=sc*2;
    // Bonus for empty cells
    h+=emptyCells(g).length*5;
    if(h>bestScore){bestScore=h;best=d;}
  }
  return best;
}
window.newGame = newGame; window.undo = undo; window.toggleAuto = toggleAuto;

document.addEventListener('keydown',e=>{
  const k = e.key;
  if(k==='ArrowLeft'||k==='a'){e.preventDefault();move('L');}
  else if(k==='ArrowRight'||k==='d'){e.preventDefault();move('R');}
  else if(k==='ArrowUp'||k==='w'){e.preventDefault();move('U');}
  else if(k==='ArrowDown'||k==='s'){e.preventDefault();move('D');}
  else if(k==='z'||k==='Z'){e.preventDefault();undo();}
});

let touchStartX, touchStartY;
const board = $('#board');
board.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;},{passive:true});
board.addEventListener('touchend',e=>{
  if(touchStartX==null)return;
  const dx = e.changedTouches[0].clientX-touchStartX;
  const dy = e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>Math.abs(dy)){
    if(Math.abs(dx)>20)move(dx>0?'R':'L');
  } else {
    if(Math.abs(dy)>20)move(dy>0?'D':'U');
  }
  touchStartX=touchStartY=null;
},{passive:true});

newGame();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'g2048Title',
  descKey: 'g2048Desc',
  howToSteps: ['g2048Step1','g2048Step2','g2048Step3','g2048Step4'],
  related: [
    {icon:'⭕', href:'/fun/tic-tac-toe.html', name:'Tic Tac Toe'},
    {icon:'⌨️', href:'/fun/typing-test.html', name:'Typing Test'},
    {icon:'🧩', href:'/fun/word-search.html', name:'Word Search'},
    {icon:'⏱️', href:'/fun/reaction-time.html', name:'Reaction Time'},
  ]
});
</script>
