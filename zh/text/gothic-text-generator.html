GZI18n.register({
  en: {
    toolTitle: 'Gothic Text Generator',
    toolDesc: 'Convert plain text to 𝔤𝔬𝔱𝔥𝔦𝔠 Fraktur blackletter or 𝖌𝖔𝖙𝖍𝖎𝖈 bold gothic Unicode styles. Copy & paste dark ornate medieval-looking text for Instagram, Twitter, Discord, tattoos, usernames and bios.',

    step3: 'Click Copy and paste it into your post, caption, username or tattoo design',
  },
  zh: {
    toolTitle: '哥特体文字生成器',
    toolDesc: '将普通文字转换为 𝔤𝔬𝔱𝔥𝔦𝔠 哥特体（Fraktur 黑体）或 𝖌𝖔𝖙𝖍𝖎𝖈 粗哥特 Unicode 样式。复制粘贴暗色、华丽的哥特风格文字到 Instagram、Twitter、Discord、纹身设计、用户名和简介。',
    inputLabel: '输入文本',
    outputLabel: '哥特体文字',
    gothic: '哥特体',
    boldGothic: '粗哥特体',
    step1: '输入或粘贴要变哥特体的文字',
    step2: '选择样式：常规哥特体或粗哥特体',
    step3: '点击复制，粘贴到帖子、文案、用户名或纹身设计',
  }
});

const { $, copyText, t } = GZ;

// Fraktur family — marketed here as "Gothic" (alias keyword)
const STYLES = {
  gothic: {
    upper: 0x1D504, lower: 0x1D51E, digit: null,
    upperExc: { 0x43: 0x212D, 0x48: 0x210C, 0x49: 0x2111, 0x52: 0x211C, 0x5A: 0x2128 }
  },
  boldGothic: { upper: 0x1D56C, lower: 0x1D586, digit: null },
};

function stylize(text, key) {
  const s = STYLES[key];
  if (!s) return text;
  let out = '';
  for (const ch of text) {
    const code = ch.codePointAt(0);
    if (code >= 0x41 && code <= 0x5A) {
      if (s.upperExc && s.upperExc[code]) out += String.fromCodePoint(s.upperExc[code]);
      else out += String.fromCodePoint(code - 0x41 + s.upper);
    } else if (code >= 0x61 && code <= 0x7A) {
      out += String.fromCodePoint(code - 0x61 + s.lower);
    } else {
      out += ch;
    }
  }
  return out;
}

let currentStyle = 'gothic';

function processText() {
  const text = $('#input').value;
  if (!text) { $('#output').textContent = ''; return; }
  $('#output').textContent = stylize(text, currentStyle);
}

$('#input').addEventListener('input', processText);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="setStyle('gothic',this)">${t('gothic')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setStyle('boldGothic',this)">${t('boldGothic')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').textContent=''">${t('clear')}</button>`;

function setStyle(key, btn) {
  currentStyle = key;
  processText();
  btn.parentElement.querySelectorAll('.gz-btn').forEach(b => {
    b.classList.remove('gz-btn-active');
    b.classList.add('gz-btn-secondary');
  });
  btn.classList.add('gz-btn-active');
  btn.classList.remove('gz-btn-secondary');
}

$('#input').value = 'Gothic';
processText();

GZ.renderToolPage({

  ]
});
