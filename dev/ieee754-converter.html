<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is IEEE 754?","acceptedAnswer":{"@type":"Answer","text":"IEEE 754 is the standard for floating-point arithmetic used by virtually all modern CPUs and programming languages. A number is stored as three fields: a sign bit, an exponent (biased), and a mantissa/significand. Single precision uses 32 bits; double precision uses 64 bits."}},{"@type":"Question","name":"What is the bias for single and double precision?","acceptedAnswer":{"@type":"Answer","text":"The exponent bias is 127 for single precision (32-bit) and 1023 for double precision (64-bit). The stored exponent value equals the true exponent plus the bias."}},{"@type":"Question","name":"How are special values like zero and infinity represented?","acceptedAnswer":{"@type":"Answer","text":"Zero has exponent 0 and mantissa 0. Infinity has the max exponent (all ones) and mantissa 0. NaN (Not a Number) has the max exponent and a non-zero mantissa. Subnormal numbers use exponent 0 with a non-zero mantissa."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'IEEE 754 Floating Point Converter',
    toolDesc: 'Convert decimal numbers to IEEE 754 single/double precision binary and hex, and back. See sign, exponent, and mantissa breakdown.',
    step1: 'Enter a decimal number (e.g. 3.14, -0.5, 0)',
    step2: 'Choose single (32-bit) or double (64-bit) precision',
    step3: 'View the binary breakdown: sign | exponent | mantissa',
    step4: 'Or paste a hex value to convert back to decimal',
    decimal: 'Decimal number',
    hexInput: 'Hex value (reverse conversion)',
    example: 'Example',
    clear: 'Clear',
    copy: 'Copy',
    sign: 'Sign',
    exponent: 'Exponent',
    mantissa: 'Mantissa',
    binary: 'Binary',
    hexVal: 'Hex',
    precision: 'Precision',
    invalid: 'Please enter a valid number',
  },
  zh: {
    toolTitle: 'IEEE 754 浮点数转换器',
    toolDesc: '将十进制数转换为 IEEE 754 单/双精度二进制和十六进制，并可反向转换。显示符号位、指数和尾数分解。',
    step1: '输入十进制数（如 3.14、-0.5、0）',
    step2: '选择单精度（32位）或双精度（64位）',
    step3: '查看二进制分解：符号 | 指数 | 尾数',
    step4: '或粘贴十六进制值反向转换为十进制',
    decimal: '十进制数',
    hexInput: '十六进制值（反向转换）',
    example: '示例',
    clear: '清除',
    copy: '复制',
    sign: '符号',
    exponent: '指数',
    mantissa: '尾数',
    binary: '二进制',
    hexVal: '十六进制',
    precision: '精度',
    invalid: '请输入有效数字',
  }
});
const { $, copyText, t } = GZ;
let prec = 32;
const bits = {32:{exp:8,man:23,bias:127},64:{exp:11,man:52,bias:1023}};

function decimalToIEEE(val){
  const cfg=bits[prec];
  const buf=new ArrayBuffer(prec/8);
  if(prec===32){new Float32Array(buf)[0]=val;}
  else{new Float64Array(buf)[0]=val;}
  const uint=new BigUint64Array(buf);
  let bin=uint[0].toString(2).padStart(prec,'0');
  if(prec===32)bin=bin.padStart(32,'0');
  return bin;
}

function ieeeToDecimal(bin){
  const cfg=bits[prec];
  const buf=new ArrayBuffer(prec/8);
  const uint=new BigUint64Array(buf);
  uint[0]=BigInt('0b'+bin);
  if(prec===32)return new Float32Array(buf)[0];
  return new Float64Array(buf)[0];
}

function formatBin(bin){
  const cfg=bits[prec];
  const sign=bin[0];
  const exp=bin.substr(1,cfg.exp);
  const man=bin.substr(1+cfg.exp,cfg.man);
  const html=[
    ...sign.split('').map(b=>`<span class="bit bit-${b}">${b}</span>`),
    `<div class="bit-sep"></div>`,
    ...exp.split('').map(b=>`<span class="bit bit-${b}">${b}</span>`),
    `<div class="bit-sep"></div>`,
    ...man.split('').map(b=>`<span class="bit bit-${b}">${b}</span>`),
  ].join('');
  return {
    html,
    sign,exp,man,
    full:bin
  };
}

function convert(){
  const val=parseFloat($('#decimalInput').value);
  if(isNaN(val)){
    $('#output').innerHTML=`<span style="color:var(--gz-accent)">${t('invalid')}</span>`;
    return;
  }
  const bin=decimalToIEEE(val);
  const f=formatBin(bin);
  const cfg=bits[prec];
  const hex=BigInt('0b'+bin).toString(16).toUpperCase().padStart(prec/4,'0');
  const expDec=parseInt(f.exp,2)-cfg.bias;
  let expLabel=expDec;
  if(parseInt(f.exp,2)===0)expLabel='0 (subnormal)';
  else if(parseInt(f.exp,2)===(1<<cfg.exp)-1)expLabel='reserved (inf/nan)';
  else expLabel=`${expDec} (stored: ${parseInt(f.exp,2)})`;

  $('#output').innerHTML=`
    <div class="bits-row">${f.html}</div>
    <div class="gz-split" style="margin-top:10px">
      <div>
        <div class="field-label" style="color:var(--gz-accent)">${t('sign')}: ${f.sign}</div>
        <div class="field-label" style="color:#61afef">${t('exponent')}: ${expLabel}</div>
        <div class="field-label" style="color:#00d672">${t('mantissa')}: ${f.man}</div>
      </div>
      <div>
        <div class="lbl">${t('binary')} (${prec}-bit)</div>
        <div class="hex-out" style="font-size:.85rem">${f.full}</div>
        <div class="lbl" style="margin-top:6px">${t('hexVal')}</div>
        <div class="hex-out">0x${hex}</div>
      </div>
    </div>`;
  $('#hexInput').value=hex;
}

function convertFromHex(){
  let h=$('#hexInput').value.trim().replace(/^0x/i,'');
  if(!h)return;
  const expected=prec/4;
  if(h.length!==expected)return;
  if(!/^[0-9a-fA-F]+$/.test(h))return;
  const bin=BigInt('0x'+h).toString(2).padStart(prec,'0');
  const dec=ieeeToDecimal(bin);
  $('#decimalInput').value=dec;
  convert();
}

$('#precToggle').addEventListener('click',e=>{
  if(e.target.tagName!=='BUTTON')return;
  document.querySelectorAll('#precToggle button').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  prec=+e.target.dataset.prec;
  convert();
});

$('#lbl-decimal').textContent=t('decimal');
$('#lbl-hex').textContent=t('hexInput');

GZ.renderToolPage({
  category:'dev',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'🔢',href:'/convert/number-base.html',name:'Number Base Converter'},
    {icon:'🔤',href:'/dev/ascii-table.html',name:'ASCII Table'},
    {icon:'🔄',href:'/dev/ascii-binary-hex-converter.html',name:'ASCII/Binary/Hex'},
    {icon:'📊',href:'/dev/hex-viewer.html',name:'Hex Viewer'},
  ]
});
convert();
</script>
