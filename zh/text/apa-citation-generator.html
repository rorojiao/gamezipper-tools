const { $, copyText, t } = GZ;
let currentType = 'book';

const FIELDS = {
  book:    ['authors','year','title','edition','publisher'],
  website: ['authors','year','monthDay','title','siteName','url','accessDate'],
  journal: ['authors','year','title','journal','volume','issue','pages','doi'],
  news:    ['authors','year','monthDay','title','siteName','url'],
};

// Parse "Last, First; Last, First" -> APA author string (initials already end with ".", caller adds final ".")
function formatAuthors(raw) {
  if (!raw || !raw.trim()) return '';
  const parts = raw.split(';').map(s => s.trim()).filter(Boolean);
  const list = parts.map(p => {
    const m = p.match(/^([^,]+),\s*(.+)$/);
    if (m) {
      const last = m[1].trim();
      const firsts = m[2].trim();
      const initials = firsts.split(/[\s.]+/).filter(Boolean).map(x => x[0].toUpperCase() + '.').join(' ');
      return `${last}, ${initials}`; // e.g. "Tartt, D."
    }
    return p; // already an org or single name
  });
  if (list.length === 1) return list[0];
  if (list.length === 2) return `${list[0]}, & ${list[1]}`;
  return list.slice(0, -1).join(', ') + ', & ' + list[list.length - 1];
}

function val(id) { const el = document.getElementById('f-' + id); return el ? el.value.trim() : ''; }

function italic(s) { return s; } // we'll wrap with markers; render as <i>

function authorClause(authors) {
  // authors already has trailing "." from initials (e.g. "Tartt, D.") — only add "." for org names without one
  if (!authors) return '';
  return authors.endsWith('.') ? authors : authors + '.';
}

function buildCitation() {
  const fields = FIELDS[currentType];
  const vals = {};
  fields.forEach(f => vals[f] = val(f));

  if (!vals.title) {
    $('#citation-out').innerHTML = `<span class="empty">${t('emptyHint')}</span>`;
    $('#status').innerHTML = `<span style="opacity:.6">${t('needAuthor')}</span>`;
    return;
  }

  const authors = formatAuthors(vals.authors);
  const authorStr = authorClause(authors);
  const year = vals.year || 'n.d.';
  const title = vals.title;
  let body = '';

  if (currentType === 'book') {
    let t2 = title;
    if (vals.edition) t2 += ` (${vals.edition} ed.)`;
    t2 = `«I»${t2}«/I»`;
    body = [authorStr, `(${year}).`, t2 + '.', vals.publisher && vals.publisher + '.'].filter(Boolean).join(' ');
  } else if (currentType === 'website') {
    const date = vals.monthDay ? `${year}, ${vals.monthDay}` : year;
    let t2 = `«I»${title}«/I»`;
    const site = vals.siteName;
    let parts = [authorStr, `(${date}).`, t2 + '.', site && site + '.', vals.url && vals.url];
    if (!authors && site) parts = [`(${date}).`, t2 + '.', site + '.', vals.url && vals.url];
    if (!authors && !site) parts = [`(${date}).`, t2 + '.', vals.url && vals.url];
    body = parts.filter(Boolean).join(' ');
    if (vals.accessDate && vals.url) body += ` [Retrieved ${vals.accessDate}]`;
  } else if (currentType === 'journal') {
    const t2 = `«I»${title}«/I»`;
    let j = vals.journal ? `«I»${vals.journal}«/I»` : '';
    let loc = '';
    if (vals.volume) loc += `, «B»${vals.volume}«/B»`;
    if (vals.issue) loc += `(${vals.issue})`;
    if (vals.pages) loc += `, ${vals.pages}`;
    if (j) j += loc;
    const doi = vals.doi ? ` https://doi.org/${vals.doi.replace(/^https?:\/\/doi\.org\//i, '')}` : '';
    body = [authorStr, `(${year}).`, t2 + '.', j && j + '.', doi && doi.trim()].filter(Boolean).join(' ');
  } else if (currentType === 'news') {
    const date = vals.monthDay ? `${year}, ${vals.monthDay}` : year;
    const t2 = `«I»${title}«/I»`;
    body = [authorStr, `(${date}).`, t2 + '.', vals.siteName && vals.siteName + '.', vals.url && vals.url].filter(Boolean).join(' ');
  }

  // Render with italics + bold
  let html = body
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/«I»/g, '<i>').replace(/«\/I»/g, '</i>')
    .replace(/«B»/g, '<b>').replace(/«\/B»/g, '</b>')
    .replace(/&lt;i&gt;/g,'<i>').replace(/&lt;\/i&gt;/g,'</i>')
    .replace(/&lt;b&gt;/g,'<b>').replace(/&lt;\/b&gt;/g,'</b>');
  $('#citation-out').innerHTML = html;
  // store plain text for copy
  $('#citation-out').dataset.plain = body.replace(/«\/?[IB]»/g, '');
  $('#status').innerHTML = `<span style="color:var(--gz-success,#00d672)">${t('generated')}</span>`;
}

function renderForm() {
  const fields = FIELDS[currentType];
  const grid = $('#form-grid');
  grid.innerHTML = fields.map(f => {
    const full = (f === 'authors' || f === 'title') ? ' full' : '';
    const label = t(f);
    const el = f === 'title' ? 'textarea' : 'input';
    if (el === 'textarea') {
      return `<div class="${full.trim()}"><label>${label}</label><textarea id="f-${f}" rows="2"></textarea></div>`;
    }
    return `<div class="${full.trim()}"><label>${label}</label><input id="f-${f}" type="text"></div>`;
  }).join('');
  // live update
  fields.forEach(f => {
    const el = document.getElementById('f-' + f);
    if (el) el.addEventListener('input', buildCitation);
  });
  buildCitation();
}

function renderTabs() {
  const tabs = [
    ['book', 'typeBook'],
    ['website', 'typeWebsite'],
    ['journal', 'typeJournal'],
    ['news', 'typeNews'],
  ];
  $('#type-tabs').innerHTML = tabs.map(([id, key]) =>
    `<div class="gz-tab ${id === currentType ? 'active' : ''}" data-type="${id}">${t(key)}</div>`
  ).join('');
  $('#type-tabs').querySelectorAll('.gz-tab').forEach(el => {
    el.addEventListener('click', () => {
      currentType = el.dataset.type;
      $('#type-tabs').querySelectorAll('.gz-tab').forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      renderForm();
    });
  });
}

function loadExample() {
  const examples = {
    book: { authors: 'Tartt, Donna', year: '2013', title: 'The goldfinch', edition: '', publisher: 'Little, Brown and Company' },
    website: { authors: 'Smith, John', year: '2024', monthDay: 'January 12', title: 'How AI is changing research', siteName: 'Tech Daily', url: 'https://example.com/ai-research', accessDate: '2025-02-10' },
    journal: { authors: 'Garcia, Maria; Lee, Tom', year: '2023', title: 'Effects of sleep on memory consolidation', journal: 'Journal of Sleep Research', volume: '32', issue: '4', pages: 'e13982', doi: '10.1111/jsr.13982' },
    news: { authors: 'Williams, Pat', year: '2025', monthDay: 'June 3', title: 'City unveils new transit plan', siteName: 'The Daily Herald', url: 'https://example.com/transit-plan' },
  };
  const ex = examples[currentType];
  Object.entries(ex).forEach(([k, v]) => {
    const el = document.getElementById('f-' + k);
    if (el) el.value = v;
  });
  buildCitation();
}

function doClear() {
  FIELDS[currentType].forEach(f => { const el = document.getElementById('f-' + f); if (el) el.value = ''; });
  buildCitation();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText(document.getElementById('citation-out').dataset.plain || document.getElementById('citation-out').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

renderTabs();
renderForm();

</script>
