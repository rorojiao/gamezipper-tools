<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a cron expression?", "acceptedAnswer": {"@type": "Answer", "text": "A cron expression is a string of 5 fields (minute, hour, day of month, month, day of week) that defines a schedule for recurring tasks. For example, '0 9 * * 1-5' means 9:00 AM Monday through Friday. Cron is used by Linux/Unix crontab, Kubernetes CronJobs, and many scheduling systems."}}, {"@type": "Question", "name": "What does */5 mean in cron?", "acceptedAnswer": {"@type": "Answer", "text": "The */5 syntax means 'every 5 units'. In the minute field, */5 means every 5 minutes (0, 5, 10, 15...). In the hour field, */2 means every 2 hours. The step value syntax is: range/step, where * represents the full range (0-59 for minutes)."}}, {"@type": "Question", "name": "How do I run a cron job every day at midnight?", "acceptedAnswer": {"@type": "Answer", "text": "Use the cron expression '0 0 * * *'. This means minute=0, hour=0, every day of month, every month, every day of week — which is midnight (00:00) every day. You can also click the 'Daily at midnight' preset in this tool to generate it instantly."}}, {"@type": "Question", "name": "Does this tool support 6-field cron with seconds?", "acceptedAnswer": {"@type": "Answer", "text": "This tool focuses on standard 5-field cron (minute hour day-of-month month day-of-week), which covers crontab, Kubernetes, AWS EventBridge, and most use cases. Quartz-style 6/7-field cron (with seconds and years) is not supported in this version."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Cron Expression Generator & Explainer',
    toolDesc: 'Build cron schedules visually with presets, or paste any cron expression for a human-readable explanation. Shows next run times. Free, instant, private.',
    tabBuild: 'Build', tabExplain: 'Explain',
    lfMin: 'Minute', lfHour: 'Hour', lfDom: 'Day of month', lfMon: 'Month', lfDow: 'Day of week',
    step1: 'Use the Build tab with presets, or switch to Explain to decode any cron',
    step2: 'In Build mode, edit the 5 fields: minute, hour, day-of-month, month, day-of-week',
    step3: 'See the generated cron expression and human-readable explanation instantly',
    step4: 'Use presets like "every 5 min", "daily midnight", or "weekdays 9am" for quick starts',
  },
  zh: {
    toolTitle: 'Cron 表达式生成器与解释器',
    toolDesc: '使用预设可视化构建 cron 定时任务，或粘贴任意 cron 表达式获取人类可读的解释。显示下次运行时间。免费、即时、隐私安全。',
    tabBuild: '构建', tabExplain: '解释',
    lfMin: '分钟', lfHour: '小时', lfDom: '日期', lfMon: '月份', lfDow: '星期',
    step1: '使用「构建」标签和预设，或切换到「解释」解码任意 cron',
    step2: '在构建模式下，编辑 5 个字段：分钟、小时、日期、月份、星期',
    step3: '立即查看生成的 cron 表达式和人类可读的解释',
    step4: '使用预设如「每 5 分钟」「每天午夜」「工作日 9 点」快速开始',
  }
});

const { $, t } = GZ;

const PRESETS = [
  {name:'Every minute', expr:'* * * * *'},
  {name:'Every 5 min', expr:'*/5 * * * *'},
  {name:'Every 15 min', expr:'*/15 * * * *'},
  {name:'Every 30 min', expr:'*/30 * * * *'},
  {name:'Hourly', expr:'0 * * * *'},
  {name:'Every 6 hours', expr:'0 */6 * * *'},
  {name:'Daily midnight', expr:'0 0 * * *'},
  {name:'Daily 9am', expr:'0 9 * * *'},
  {name:'Weekdays 9am', expr:'0 9 * * 1-5'},
  {name:'Weekly (Mon)', expr:'0 0 * * 1'},
  {name:'Monthly (1st)', expr:'0 0 1 * *'},
  {name:'Yearly (Jan 1)', expr:'0 0 1 1 *'},
];

const DOW_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON_NAMES = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function explainCron(expr) {
  const parts = expr.trim().split(/\s+/);
  if (parts.length !== 5) return null;
  const [min, hour, dom, mon, dow] = parts;
  const bits = [];

  function fieldDesc(val, unit, names) {
    if (val === '*') return `every ${unit}`;
    if (val.startsWith('*/')) return `every ${val.slice(2)} ${unit}s`;
    if (val.includes(',')) return `at ${unit} ${val}`;
    if (val.includes('-')) {
      if (names) {
        const [a,b] = val.split('-');
        return `${unit} ${names[+a]||a} through ${names[+b]||b}`;
      }
      return `${unit} ${val}`;
    }
    if (names && /^\d+$/.test(val)) return `${unit} ${names[+val]||val}`;
    return `${unit} ${val}`;
  }

  let timePart = '';
  if (min === '0' && /^\d+$/.test(hour)) {
    timePart = `at ${hour.padStart(2,'0')}:00`;
  } else if (min === '*' && hour === '*') {
    timePart = 'every minute';
  } else if (min.startsWith('*/')) {
    timePart = `every ${min.slice(2)} minutes`;
  } else {
    timePart = `${fieldDesc(min,'minute')}, ${fieldDesc(hour,'hour')}`;
  }

  let dayPart = '';
  if (dow !== '*' && dom === '*') {
    dayPart = ` on ${fieldDesc(dow,'',DOW_NAMES)}`;
    // Handle ranges and lists
    if (/^\d+-\d+$/.test(dow)) {
      const [a,b] = dow.split('-');
      dayPart = ` ${DOW_NAMES[+a]} through ${DOW_NAMES[+b]}`;
    } else if (/^(\d+,?)+$/.test(dow) && dow.includes(',')) {
      dayPart = ' ' + dow.split(',').map(n => DOW_NAMES[+n]||n).join(', ');
    } else if (/^\d+$/.test(dow)) {
      dayPart = ' ' + DOW_NAMES[+dow];
    }
    dayPart = ' on' + dayPart;
  } else if (dom !== '*' && dow === '*') {
    dayPart = ` on day ${dom} of the month`;
  } else if (dom !== '*' && dow !== '*') {
    dayPart = ` on day ${dom} and ${fieldDesc(dow,'',DOW_NAMES)}`;
  }

  let monPart = mon !== '*' ? ` in ${fieldDesc(mon,'',MON_NAMES)}` : '';

  const freq = (min === '*' && hour === '*') ? 'Runs' : 'At';
  return `${freq} ${timePart.replace('every minute','every minute')}${dayPart}${monPart}.`;
}

function nextRuns(expr, count = 3) {
  const parts = expr.trim().split(/\s+/);
  if (parts.length !== 5) return [];
  const [minF, hourF, domF, monF, dowF] = parts;
  const now = new Date();
  now.setSeconds(0, 0);
  now.setMinutes(now.getMinutes() + 1);
  const results = [];
  let iterations = 0;

  function matchField(val, field, max) {
    if (field === '*') return true;
    if (field.startsWith('*/')) {
      const step = +field.slice(2);
      return val % step === 0;
    }
    return field.split(',').some(p => {
      if (p.includes('-')) {
        const [a,b] = p.split('-').map(Number);
        return val >= a && val <= b;
      }
      return +p === val;
    });
  }

  while (results.length < count && iterations < 500000) {
    iterations++;
    const m = now.getMinutes();
    const h = now.getHours();
    const dom = now.getDate();
    const mon = now.getMonth() + 1;
    const dow = now.getDay();

    if (matchField(m, minF, 59) && matchField(h, hourF, 23) &&
        matchField(dom, domF, 31) && matchField(mon, monF, 12) && matchField(dow, dowF, 7)) {
      results.push(new Date(now));
    }
    now.setMinutes(now.getMinutes() + 1);
  }
  return results;
}

function fmtDateTime(d) {
  return d.toLocaleString(undefined, {weekday:'short', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
}

// Build panel
function updateBuild() {
  const expr = ['f-min','f-hour','f-dom','f-mon','f-dow'].map(id => $('#'+id).value.trim() || '*').join(' ');
  $('#expr').textContent = expr;
  const exp = explainCron(expr);
  $('#explain').textContent = exp || 'Invalid expression — use 5 fields: min hour dom mon dow';
  if (exp) {
    const runs = nextRuns(expr, 3);
    $('#nextRuns').innerHTML = '<b>Next runs:</b> ' + runs.map(fmtDateTime).join(' · ');
  } else {
    $('#nextRuns').textContent = '';
  }
}

// Explain panel
function updateExplain() {
  const expr = $('#inputExpr').value.trim();
  const exp = explainCron(expr);
  if (exp) {
    $('#explain2').textContent = '✓ ' + exp;
    $('#explain2').style.color = 'var(--success)';
    const runs = nextRuns(expr, 3);
    $('#nextRuns2').innerHTML = '<b>Next runs:</b> ' + runs.map(fmtDateTime).join(' · ');
  } else {
    $('#explain2').textContent = '✗ Invalid cron expression — must be 5 space-separated fields';
    $('#explain2').style.color = 'var(--accent)';
    $('#nextRuns2').textContent = '';
  }
}

// Labels
$('#tab-build').textContent = t('tabBuild');
$('#tab-explain').textContent = t('tabExplain');
$('#lf-min').textContent = t('lfMin');
$('#lf-hour').textContent = t('lfHour');
$('#lf-dom').textContent = t('lfDom');
$('#lf-mon').textContent = t('lfMon');
$('#lf-dow').textContent = t('lfDow');

// Presets
$('#presets').innerHTML = PRESETS.map((p,i) => `<div class="cr-preset" data-idx="${i}"><b>${p.name}</b><small>${p.expr}</small></div>`).join('');
$('#presets').querySelectorAll('.cr-preset').forEach(el => {
  el.onclick = () => {
    const p = PRESETS[+el.dataset.idx];
    const fields = p.expr.split(' ');
    ['f-min','f-hour','f-dom','f-mon','f-dow'].forEach((id,i) => $('#'+id).value = fields[i]);
    updateBuild();
  };
});

// Tab switching
$('#tab-build').onclick = () => {
  $('#tab-build').classList.add('active'); $('#tab-explain').classList.remove('active');
  $('#panel-build').classList.add('active'); $('#panel-explain').classList.remove('active');
};
$('#tab-explain').onclick = () => {
  $('#tab-explain').classList.add('active'); $('#tab-build').classList.remove('active');
  $('#panel-explain').classList.add('active'); $('#panel-build').classList.remove('active');
  updateExplain();
};

['f-min','f-hour','f-dom','f-mon','f-dow'].forEach(id => $('#'+id).addEventListener('input', updateBuild));
$('#inputExpr').addEventListener('input', updateExplain);

updateBuild();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🐳', href:'/dev/docker-compose-generator.html', name:'Docker Compose'},
    {icon:'⚙️', href:'/dev/editorconfig-generator.html', name:'EditorConfig'},
    {icon:'📝', href:'/dev/changelog-generator.html', name:'Changelog'},
    {icon:'🔑', href:'/dev/api-key-generator.html', name:'API Key Gen'},
  ]
});
</script>
