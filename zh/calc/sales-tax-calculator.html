<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate sales tax?", "acceptedAnswer": {"@type": "Answer", "text": "Multiply the pre-tax price by the tax rate (as a decimal). For example, a $50 item with 7% tax: 50 × 0.07 = $3.50 tax, for a total of $53.50. The reverse — finding the pre-tax price from a total — is the total divided by (1 + rate)."}}, {"@type": "Question", "name": "What is the US state sales tax rate?", "acceptedAnswer": {"@type": "Answer", "text": "US state sales tax ranges from 0% (Alaska, Delaware, Montana, New Hampshire, Oregon) to 7.25% (California, with local add-ons up to ~10%). The list in this tool shows the 2026 combined state + average local rate for the most common states. Always check your specific zip code for the exact local rate."}}, {"@type": "Question", "name": "What is the difference between sales tax and VAT?", "acceptedAnswer": {"@type": "Answer", "text": "Sales tax is added at the register only on the final sale to a consumer (US model). VAT / GST is added at every stage of production and is included in the displayed shelf price (most of the world). The math is the same, but the consumer experience differs."}}, {"@type": "Question", "name": "Does this tool handle reverse calculation?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Switch to the Reverse tab, enter the total you paid and the tax rate, and the tool will show the pre-tax price and the tax amount."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="st-tabs" id="tabs">
      <button class="st-tab active" data-mode="add">➕ Add Sales Tax</button>
      <button class="st-tab" data-mode="remove">➖ Remove Sales Tax</button>
      <button class="st-tab" data-mode="state">🇺🇸 US State Rate</button>
    </div>

    <div class="st-form">
      <div class="st-field">
        <label id="lblPrice"></label>
        <input type="number" id="price" value="100" step="0.01" min="0">
      </div>
      <div class="st-field">
        <label id="lblRate"></label>
        <input type="number" id="rate" value="7" step="0.01" min="0" max="100">
      </div>
      <div class="st-field" id="stateField" style="display:none;grid-column:1/-1">
        <label id="lblState"></label>
        <select id="stateSelect"></select>
      </div>
      <div class="st-field" style="grid-column:1/-1;flex-direction:row;gap:10px;align-items:center;flex-wrap:wrap">
        <label style="font-size:.78rem;color:var(--text2);font-weight:600">Round to:</label>
        <select id="round" style="padding:6px 10px;background:var(--glass2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.85em">
          <option value="0.01">2 decimals ($0.01)</option>
          <option value="0.05">5 cents ($0.05)</option>
          <option value="0.10">10 cents ($0.10)</option>
          <option value="0.25">Quarter ($0.25)</option>
          <option value="1">Whole dollar</option>
        </select>
      </div>
    </div>

    <div class="st-tiles" id="tiles"></div>
    <div class="st-table" id="breakdown" style="display:none"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Sales Tax Calculator',
    toolDesc: 'Calculate sales tax on any price, or reverse a total to find the pre-tax amount. Includes 2026 US state sales tax rates — instant, free and private.',
    modeAdd: 'Add Sales Tax',
    modeRemove: 'Remove Sales Tax',
    modeState: 'US State Rate',
    price: 'Price (before tax)',
    total: 'Total paid (incl. tax)',
    rate: 'Tax rate (%)',
    state: 'Pick a US state (auto-fills rate)',
    taxAmount: 'Tax amount',
    grandTotal: 'Grand total',
    preTax: 'Pre-tax price',
    pctOfTotal: '% of total',
    multiplier: 'Multiplier',
    breakdown: 'Itemized breakdown',
    basePrice: 'Base price',
    tip: 'Tip: state + local sales tax can exceed the state rate. Use the US State tab to see combined rates, or check your zip code for the exact local add-on.',
    step1: 'Enter a price and tax rate (or pick a US state to auto-fill)',
    step2: 'See tax amount, grand total and the tax multiplier (1 + rate)',
    step3: 'Toggle Remove Tax to reverse-engineer a total back to pre-tax',
    step4: 'Round to cents, nickels, dimes, quarters or whole dollars',
  },
  zh: {
    toolTitle: '销售税计算器',
    toolDesc: '计算任意价格的销售税，或从含税总额反推税前价格。内置 2026 年美国各州税率 — 即时、免费、私密。',
    modeAdd: '添加销售税',
    modeRemove: '去除销售税',
    modeState: '美国州税率',
    price: '价格（税前）',
    total: '已付总额（含税）',
    rate: '税率 (%)',
    state: '选择美国州（自动填充税率）',
    taxAmount: '税额',
    grandTotal: '含税总额',
    preTax: '税前价格',
    pctOfTotal: '占总额比例',
    multiplier: '乘数',
    breakdown: '明细',
    basePrice: '原价',
    tip: '提示：州 + 地方销售税可能超过基础州税率。切换到「美国州税率」查看合并税率，或查询邮编获取准确地方附加税。',
    step1: '输入价格和税率（或选择美国州自动填充）',
    step2: '查看税额、含税总额和乘数 (1 + 税率)',
    step3: '切换「去除销售税」从总额反推税前价格',
    step4: '可按分、5 美分、10 美分、25 美分或整美元四舍五入',
  }
});

const { $, t } = GZ;
let mode = 'add';

const STATES = [
  {n:'Alabama', r:9.24}, {n:'Alaska', r:1.76}, {n:'Arizona', r:8.4}, {n:'Arkansas', r:9.45},
  {n:'California', r:8.85}, {n:'Colorado', r:7.86}, {n:'Connecticut', r:6.35}, {n:'Delaware', r:0},
  {n:'Florida', r:7.02}, {n:'Georgia', r:7.39}, {n:'Hawaii', r:4.71}, {n:'Idaho', r:6.03},
  {n:'Illinois', r:8.86}, {n:'Indiana', r:7.05}, {n:'Iowa', r:6.94}, {n:'Kansas', r:8.68},
  {n:'Kentucky', r:6.0}, {n:'Louisiana', r:9.56}, {n:'Maine', r:5.5}, {n:'Maryland', r:6.0},
  {n:'Massachusetts', r:6.25}, {n:'Michigan', r:6.0}, {n:'Minnesota', r:7.49}, {n:'Mississippi', r:7.07},
  {n:'Missouri', r:8.29}, {n:'Montana', r:0}, {n:'Nebraska', r:6.94}, {n:'Nevada', r:8.23},
  {n:'New Hampshire', r:0}, {n:'New Jersey', r:6.6}, {n:'New Mexico', r:8.21}, {n:'New York', r:8.52},
  {n:'North Carolina', r:6.99}, {n:'North Dakota', r:6.96}, {n:'Ohio', r:7.24}, {n:'Oklahoma', r:8.99},
  {n:'Oregon', r:0}, {n:'Pennsylvania', r:6.34}, {n:'Rhode Island', r:7.0}, {n:'South Carolina', r:7.49},
  {n:'South Dakota', r:6.4}, {n:'Tennessee', r:9.55}, {n:'Texas', r:8.20}, {n:'Utah', r:7.25},
  {n:'Vermont', r:6.86}, {n:'Virginia', r:5.77}, {n:'Washington', r:10.25}, {n:'West Virginia', r:6.65},
  {n:'Wisconsin', r:5.89}, {n:'Wyoming', r:5.4}, {n:'D.C.', r:6.0}
];

document.getElementById('stateSelect').innerHTML = STATES.map(s => `<option value="${s.r}">${s.n} (${s.r}%)</option>`).join('');

document.getElementById('lblPrice').textContent = t('price');
document.getElementById('lblRate').textContent = t('rate');
document.getElementById('lblState').textContent = t('state');

document.querySelectorAll('.st-tab').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.st-tab').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  mode = b.dataset.mode;
  document.getElementById('stateField').style.display = mode === 'state' ? 'flex' : 'none';
  document.getElementById('lblPrice').textContent = mode === 'remove' ? t('total') : t('price');
  calc();
}));

document.getElementById('stateSelect').addEventListener('change', e => {
  document.getElementById('rate').value = e.target.value;
  calc();
});
['price','rate','round'].forEach(id => document.getElementById(id).addEventListener('input', calc));

function round2(n, step) { return Math.round(n / step) * step; }
function fmt(n) { return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

function calc() {
  const price = parseFloat(document.getElementById('price').value) || 0;
  const rate = parseFloat(document.getElementById('rate').value) || 0;
  const round = parseFloat(document.getElementById('round').value) || 0.01;
  const tiles = document.getElementById('tiles');
  const breakdown = document.getElementById('breakdown');

  if (mode === 'add') {
    const taxRaw = price * rate / 100;
    const tax = round2(taxRaw, round);
    const total = price + tax;
    const pct = total > 0 ? ((tax / total) * 100).toFixed(2) : 0;
    tiles.innerHTML = `
      <div class="st-tile"><div class="num">${fmt(price)}</div><div class="lbl">${t('price')}</div></div>
      <div class="st-tile highlight"><div class="num">${fmt(tax)}</div><div class="lbl">${t('taxAmount')}</div></div>
      <div class="st-tile highlight"><div class="num">${fmt(total)}</div><div class="lbl">${t('grandTotal')}</div></div>
      <div class="st-tile"><div class="num">${pct}%</div><div class="lbl">${t('pctOfTotal')}</div></div>
    `;
    breakdown.style.display = 'block';
    breakdown.innerHTML = `
      <h3>📋 ${t('breakdown')}</h3>
      <div class="row"><span>${t('basePrice')}</span><span>${fmt(price)}</span></div>
      <div class="row"><span>${t('rate')}</span><span>${rate}%</span></div>
      <div class="row"><span>${t('taxAmount')}</span><span>${fmt(tax)}</span></div>
      <div class="row"><span>${t('grandTotal')}</span><span>${fmt(total)}</span></div>
      <div class="st-tip">${t('tip')}</div>
    `;
  } else if (mode === 'remove') {
    const preTaxRaw = price / (1 + rate / 100);
    const preTax = round2(preTaxRaw, round);
    const tax = price - preTax;
    const pct = price > 0 ? ((tax / price) * 100).toFixed(2) : 0;
    tiles.innerHTML = `
      <div class="st-tile highlight"><div class="num">${fmt(preTax)}</div><div class="lbl">${t('preTax')}</div></div>
      <div class="st-tile"><div class="num">${fmt(tax)}</div><div class="lbl">${t('taxAmount')}</div></div>
      <div class="st-tile"><div class="num">${fmt(price)}</div><div class="lbl">${t('total')}</div></div>
      <div class="st-tile"><div class="num">${pct}%</div><div class="lbl">${t('pctOfTotal')}</div></div>
    `;
    breakdown.style.display = 'block';
    breakdown.innerHTML = `
      <h3>📋 ${t('breakdown')}</h3>
      <div class="row"><span>${t('total')}</span><span>${fmt(price)}</span></div>
      <div class="row"><span>${t('rate')}</span><span>${rate}%</span></div>
      <div class="row"><span>${t('preTax')}</span><span>${fmt(preTax)}</span></div>
      <div class="row"><span>${t('taxAmount')}</span><span>${fmt(tax)}</span></div>
      <div class="st-tip">${t('tip')}</div>
    `;
  } else if (mode === 'state') {
    const taxRaw = price * rate / 100;
    const tax = round2(taxRaw, round);
    const total = price + tax;
    tiles.innerHTML = `
      <div class="st-tile"><div class="num">${fmt(price)}</div><div class="lbl">${t('basePrice')}</div></div>
      <div class="st-tile highlight"><div class="num">${fmt(tax)}</div><div class="lbl">${t('taxAmount')}</div></div>
      <div class="st-tile highlight"><div class="num">${fmt(total)}</div><div class="lbl">${t('grandTotal')}</div></div>
      <div class="st-tile"><div class="num">${rate}%</div><div class="lbl">${t('rate')}</div></div>
    `;
    breakdown.style.display = 'block';
    breakdown.innerHTML = `
      <h3>📋 ${t('breakdown')} — ${STATES.find(s => s.r === rate)?.n || ''}</h3>
      <div class="row"><span>${t('basePrice')}</span><span>${fmt(price)}</span></div>
      <div class="row"><span>${t('rate')}</span><span>${rate}%</span></div>
      <div class="row"><span>${t('taxAmount')}</span><span>${fmt(tax)}</span></div>
      <div class="row"><span>${t('grandTotal')}</span><span>${fmt(total)}</span></div>
      <div class="st-tip">${t('tip')}</div>
    `;
  }
}

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏷️', href:'/calc/discount-calculator.html', name:'Discount Calculator'},
    {icon:'💰', href:'/calc/tip-calculator.html', name:'Tip Calculator'},
    {icon:'🏷️', href:'/calc/unit-price.html', name:'Unit Price'},
    {icon:'💸', href:'/calc/tax-calculator.html', name:'US Tax'},
  ]
});
</script>
<script>new Image().src="https://site-analytics.gamezipper.com/hit?s=tools.gamezipper.com&p="+encodeURIComponent(location.pathname);</script>

</body>
