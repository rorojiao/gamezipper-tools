  diy: {en:['#diy','#crafts','#handmade','#diyprojects','#howto'],zh:['#жүӢе·Ҙ','#DIY','#еҲӣж„Ҹ','#иҮӘеҲ¶','#ж•ҷзЁӢ']},
};

function generate() {
  const topic = $('#topic').value.trim() || 'something amazing';
  const toneIdx = parseInt($('#tone').value);
  const toneNamesEn = ['funny','inspiring','informative','casual','dramatic','cute','savage','storytelling'];
  const toneName = toneNamesEn[toneIdx];
  const count = parseInt($('#count').value);
  const templates = captionTemplates[lang]?.[toneName] || captionTemplates.en[toneName];
  const results = $('#results');

  let html = '';
  const used = new Set();
  for (let i = 0; i < count; i++) {
    let tpl = templates[i % templates.length];
    const n = Math.floor(Math.random()*90+10);
    const year = new Date().getFullYear();
    const caption = tpl.replace(/{topic}/g, topic).replace(/{n}/g, n).replace(/{year}/g, year);

    // Build hashtags
    let tags = [];
    selectedCats.forEach(cat => {
      const set = hashtagSets[cat]?.[lang] || hashtagSets[cat]?.en || [];
      tags.push(...set.slice(0,2));
    });
    // Add some generic trending tags
    if (lang === 'zh') tags.push('#зғӯй—Ё', '#жҺЁиҚҗ');
    else tags.push('#fyp', '#viral');
    tags = [...new Set(tags)].slice(0,8);

    const fullCaption = caption + '\n' + tags.join(' ');
    html += `<div class="caption-card">
      <div class="caption-text">${caption}</div>
      <div class="caption-hashtags">${tags.join(' ')}</div>
      <div class="actions"><button class="gz-btn" onclick="copyCaption(this)" data-text="${fullCaption.replace(/"/g,'&quot;').replace(/\n/g,'\\n')}">${t('copy')}</button></div>
    </div>`;
  }
  results.innerHTML = html;
}

window.copyCaption = function(btn) {
  const text = btn.dataset.text.replace(/\\n/g, '\n');
  copyText(text);
  btn.textContent = t('copied');
  setTimeout(() => btn.textContent = t('copy'), 1500);
};

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="generate()">${t('generate')}</button>`;

  ]
});
