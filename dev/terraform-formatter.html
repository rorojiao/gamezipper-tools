const { $, copyText, t } = GZ;

// HCL formatter: tokenize into structural tokens and re-emit with normalized indent.
// This is a pragmatic formatter good enough for typical .tf files.

const TOP_BLOCKS = ['resource','data','variable','output','locals','module','provider','terraform','backend','required_providers','dynamic','lifecycle','provisioner','connection','check','moved','import','removed','for_each','count'];

function formatHCL(input, align){
  // 1. Normalize line endings, strip trailing whitespace per line.
  // 2. Walk char by char tracking strings, comments, brace depth and heredocs.
  const lines = [];
  let cur = '';
  let i = 0;
  let depth = 0;
  let inStrD = false, inStrS = false, inComment = false;
  let heredocTag = null, heredocEnd = null;
  const out = [];
  function pushLine(text){ out.push({ text, depth }); }

  while(i < input.length){
    const ch = input[i];
    const two = input.slice(i, i+2);

    // Heredoc handling
    if(heredocTag !== null){
      // collect until end of line, check marker
      let endOfLine = input.indexOf('\n', i);
      if(endOfLine < 0) endOfLine = input.length;
      const lineContent = input.slice(i, endOfLine);
      // accumulate
      heredocEnd += lineContent + (endOfLine < input.length ? '\n' : '');
      pushLineRaw(lineContent);
      if(endOfLine < input.length){ pushNewlineRaw(); }
      // check end marker
      if(lineContent.trim() === heredocTag || lineContent.trim() === heredocTag.replace(/-$/,'')){
        heredocTag = null;
      }
      i = endOfLine + 1;
      continue;
    }

    // Line comment # or //
    if(!inStrD && !inStrS && (ch === '#' || two === '//')){
      let eol = input.indexOf('\n', i);
      if(eol < 0) eol = input.length;
      cur += input.slice(i, eol);
      i = eol;
      continue;
    }
    // Block comment /* */
    if(!inStrD && !inStrS && two === '/*'){
      let end = input.indexOf('*/', i+2);
      if(end < 0) end = input.length; else end += 2;
      const block = input.slice(i, end);
      // inline if single line, else push across lines
      if(block.includes('\n')){
        // flush current
        if(cur.trim()){ pushLine(cur.trim()); cur=''; }
        const parts = block.split('\n');
        parts.forEach((p, idx) => {
          if(idx === 0){ pushLine(p.trim()); }
          else if(idx === parts.length - 1){ cur = p.trimStart(); }
          else { pushLine(p.trim()); }
        });
      } else {
        cur += block;
      }
      i = end;
      continue;
    }
    // String double
    if(ch === '"' && !inStrS){
      inStrD = !inStrD;
      cur += ch; i++; continue;
    }
    if(ch === '\'' && !inStrD){
      inStrS = !inStrS;
      cur += ch; i++; continue;
    }
    if(inStrD || inStrS){
      cur += ch; i++; continue;
    }
    // Heredoc start: <<TAG or <<-TAG
    if(two === '<<' || input.slice(i,i+3) === '<<-'){
      let tagStart = i + (input.slice(i,i+3) === '<<-' ? 3 : 2);
      let tagEnd = input.indexOf('\n', tagStart);
      if(tagEnd < 0) tagEnd = input.length;
      let tag = input.slice(tagStart, tagEnd).trim();
      cur += input.slice(i, tagEnd);
      pushLine(cur.trim()); cur = '';
      heredocTag = tag;
      i = tagEnd + 1;
      continue;
    }
    // Brace open
    if(ch === '{'){
      cur += ch;
      // flush everything on this line up to {
      pushLine(cur.trim()); cur = '';
      depth++;
      i++; continue;
    }
    if(ch === '}'){
      depth = Math.max(0, depth - 1);
      if(cur.trim()){ pushLine(cur.trim()); cur=''; }
      cur = '}';
      // look ahead — if next non-space is comma/paren or newline, flush
      pushLine(cur.trim()); cur = '';
      i++; continue;
    }
    // Array/paren open — track but keep inline usually
    if(ch === '[' || ch === '('){
      cur += ch; i++; continue;
    }
    if(ch === ']' || ch === ')'){
      cur += ch; i++; continue;
    }
    if(ch === '\n'){
      if(cur.trim()){ pushLine(cur.trim()); }
      cur = '';
      i++; continue;
    }
    cur += ch; i++;
  }
  if(cur.trim()) pushLine(cur.trim());

  // Now `out` has {text, depth} where depth is brace depth BEFORE pushing line.
  // Re-indent based on brace depth transitions.
  let indent = 0;
  const formatted = out.map(item => {
    const line = item.text;
    let display = indent;
    if(line.trim() === '}' || line.startsWith('}')){
      display = Math.max(0, indent - 1);
    }
    const indented = '  '.repeat(display) + line.trim();
    // adjust indent for next line
    const opens = (line.match(/{/g) || []).length;
    const closes = (line.match(/}/g) || []).length;
    indent += opens - closes;
    if(indent < 0) indent = 0;
    return indented;
  });

  // 3. Align consecutive attribute = signs within blocks
  let result = formatted.join('\n');
  if(align){
    result = alignEquals(result);
  }

  // 4. Collapse blank lines
  result = result.split('\n').reduce((acc, line, idx, arr) => {
    const isBlank = line.trim() === '';
    const prevBlank = acc.length && acc[acc.length-1].trim() === '';
    if(isBlank && prevBlank) return acc;
    if(isBlank && idx === arr.length - 1) return acc;
    acc.push(line);
    return acc;
  }, []).join('\n');

  return result.trimEnd() + '\n';

  function pushLineRaw(text){ /* placeholder for heredoc passthrough */ }
  function pushNewlineRaw(){}
}

function alignEquals(text){
  // group consecutive lines of form  ident = value  at the same indent; align their =
  const lines = text.split('\n');
  const result = [];
  let group = [];
  let groupIndent = null;
  function flushGroup(){
    if(group.length < 2){ result.push(...group); group = []; groupIndent = null; return; }
    let maxKey = 0;
    const parsed = group.map(line => {
      const m = line.match(/^(\s*)([A-Za-z_][\w-]*)(\s*)=(\s*)(.*)$/);
      if(!m) return { line, ok:false };
      maxKey = Math.max(maxKey, m[2].length);
      return { indent: m[1], key: m[2], val: m[5], ok:true };
    });
    parsed.forEach(p => {
      if(p.ok){
        result.push(p.indent + p.key + ' '.repeat(maxKey - p.key.length + 1) + '= ' + p.val);
      } else {
        result.push(p.line);
      }
    });
    group = []; groupIndent = null;
  }
  for(const line of lines){
    const indent = line.match(/^\s*/)[0].length;
    const isAttr = /^[ \t]*[A-Za-z_][\w-]*[ \t]*=/.test(line);
    if(isAttr && (groupIndent === null || indent === groupIndent)){
      groupIndent = indent;
      group.push(line);
    } else {
      flushGroup();
      result.push(line);
    }
  }
  flushGroup();
  return result.join('\n');
}

function highlightHCL(code){
  // Single-pass tokenizer so inserted span tags are never re-matched.
  const escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const tokenRe = /(\/\*[\s\S]*?\*\/|#[^\n]*|\/\/[^\n]*)|("(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*'|`(?:\\.|[^`\\])*`)|\b(true|false|null)\b|\b(\d+(?:\.\d+)?)\b|\b(resource|data|variable|output|locals|module|provider|terraform|backend|dynamic|lifecycle|provisioner|connection|check|moved|import|removed|for_each|count)\b|\b(self|each|var|local|module|data|count|terraform)\b/g;
  return escaped.replace(tokenRe, (m, com, str, bool, num, kw, ref) => {
    if(com)  return '<span class="kw-com">'+com+'</span>';
    if(str)  return '<span class="kw-str">'+str+'</span>';
    if(bool) return '<span class="kw-bool">'+bool+'</span>';
    if(num)  return '<span class="kw-num">'+num+'</span>';
    if(kw)   return '<span class="kw-kw">'+kw+'</span>';
    if(ref)  return '<span class="kw-ref">'+ref+'</span>';
    return m;
  });
}

function lintHCL(input){
  const issues = [];
  // balance braces/brackets/parens, string closure
  let inStrD=false, inStrS=false, line=1, col=1;
  let brace=0, brack=0, paren=0;
  let heredoc=null;
  for(let i=0;i<input.length;i++){
    const c=input[i];
    if(c==='\n'){line++;col=1;continue;}
    col++;
    if(heredoc!==null){
      if(c==='\n'){
        // check previous line end
      }
      continue;
    }
    if(inStrD){ if(c==='\\'){i++;col++;continue;} if(c==='"') inStrD=false; continue; }
    if(inStrS){ if(c==='"') inStrS=false; continue; }
    if(c==='"'){inStrD=true;continue;}
    if(c==='`'){ /* template; skip */ inStrS=true; continue;}
    if(input.slice(i,i+2)==='/*'){
      const end=input.indexOf('*/',i+2);
      const nl=(input.slice(i,end<0?input.length:end).match(/\n/g)||[]).length;
      line+=nl; if(end<0){i=input.length;} else {i=end+1;} continue;
    }
    if(c==='#'||input.slice(i,i+2)==='//'){
      const eol=input.indexOf('\n',i); if(eol<0)i=input.length; else i=eol-1; continue;
    }
    if(c==='{')brace++;
    if(c==='}'){brace--;if(brace<0)issues.push({line,msg:'Extra } closing brace'});}
    if(c==='[')brack++;
    if(c===']'){brack--;if(brack<0)issues.push({line,msg:'Extra ] bracket'});}
    if(c==='(')paren++;
    if(c===')'){paren--;if(paren<0)issues.push({line,msg:'Extra ) paren'});}
  }
  if(inStrD) issues.push({line,msg:'Unclosed double-quoted string'});
  if(brace>0) issues.push({line,msg:`${brace} unclosed { brace(s)`});
  if(brack>0) issues.push({line,msg:`${brack} unclosed [ bracket(s)`});
  if(paren>0) issues.push({line,msg:`${paren} unclosed ( paren(s)`});
  // check top-level block headers
  const blockRe=/^\s*(resource|data|variable|output|module|provider|terraform|locals|check|moved|import|removed)\b/gm;
  let m;
  while((m=blockRe.exec(input))){
    // ensure block header has { on same or following lines; we already brace-checked
    const rest=input.slice(m.index,m.index+200);
    if(!/^[^{]*\{[\s\S]*?"/m.test(rest) && m[1]!=='locals'){
      // soft: resource/data should have labels
    }
  }
  return issues;
}

function doFormat(){
  const raw = $('#tf-in').value;
  if(!raw.trim()){ $('#tf-out').innerHTML=''; $('#tf-status').innerHTML=''; return; }
  const align = $('#tg-align input').checked;
  try {
    const formatted = formatHCL(raw, align);
    $('#tf-out').innerHTML = highlightHCL(escapeForPre(formatted));
    $('#tf-status').innerHTML = `<span style="color:var(--gz-success,#1ec97b)">${t('okValid')}</span>`;
  } catch(e){
    $('#tf-status').innerHTML = `<span style="color:#e5454a">${t('invalid')}: ${escapeHtml(e.message)}</span>`;
  }
}

function escapeForPre(s){
  return s; // highlightHCL already escapes
}

function doValidate(){
  const raw = $('#tf-in').value;
  if(!raw.trim()){ $('#tf-status').innerHTML=''; return; }
  const issues = lintHCL(raw);
  if(issues.length === 0){
    $('#tf-status').innerHTML = `<span style="color:var(--gz-success,#1ec97b)">${t('okValid')}</span>`;
  } else {
    const lang = GZI18n.getLang();
    const list = issues.map(is => `<div style="font-size:.8rem;color:#e5454a;margin-top:4px">${lang==='zh'?'第 '+is.line+' 行':'Line '+is.line}: ${is.msg}</div>`).join('');
    $('#tf-status').innerHTML = `<span style="color:#e5454a">${t('invalid')}</span>${list}`;
  }
  doFormat();
}

function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    else if(el.tagName === 'BUTTON') el.textContent = txt;
    else if(el.tagName === 'LABEL') el.textContent = txt;

  const alignLbl = document.querySelector('#tg-align span');
  if(alignLbl) alignLbl.textContent = t('lbAlign');
  document.getElementById('tg-align').classList.toggle('on', $('#tg-align input').checked);
}
