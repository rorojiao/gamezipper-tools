.m-get{background:#57d68d}.m-post{background:#6ea8fe}.m-put{background:#ffd166;color:#333}.m-delete{background:#ef6f6f}.m-patch{background:#c792ea}.m-head{background:#888}.m-options{background:#888}
.sw-ep-body{padding:12px 14px;display:none}
.sw-ep.open .sw-ep-body{display:block}

.sw-table th,.sw-table td{padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);vertical-align:top}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"OpenAPI / Swagger Spec Viewer","description":"Free OpenAPI 3 and Swagger spec viewer — paste a JSON spec and browse endpoints, parameters, request bodies, responses and schemas in clean readable docs. 100% in-browser, no upload, no signup.","url": "https://tools.gamezipper.com/zh/dev/swagger-viewer.html","applicationCategory":"DeveloperApplication","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is an OpenAPI / Swagger spec?", "acceptedAnswer": {"@type": "Answer", "text": "An OpenAPI Specification (formerly Swagger Specification) is a standard, machine-readable description of a REST API: its base URL, endpoints, HTTP methods, parameters, request bodies, responses and data schemas. This viewer turns that JSON into clean, browsable documentation."}}, {"@type": "Question", "name": "Does it support both JSON and YAML specs?", "acceptedAnswer": {"@type": "Answer", "text": "Paste a JSON spec directly. For YAML, first convert it with our YAML to JSON tool, then paste the result here. All rendering happens locally in your browser."}}, {"@type": "Question", "name": "Is my API spec uploaded to a server?", "acceptedAnswer": {"@type": "Answer", "text": "No. The entire spec is parsed and rendered in your browser. Nothing is sent anywhere, so it is safe to use with private or internal API definitions."}}, {"@type": "Question", "name": "Which OpenAPI versions are supported?", "acceptedAnswer": {"@type": "Answer", "text": "It renders OpenAPI 3.0 and 3.1 (servers, paths, parameters, requestBody, responses, components/schemas) and also handles Swagger 2.0 specs (host/basePath, definitions) for backward compatibility."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-split">
      <div><label id="lbl-in"></label><textarea id="input" spellcheck="false"></textarea></div>
      <div><label id="lbl-out"></label><div class="sw-doc" id="output"></div></div>

  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'OpenAPI / Swagger Spec Viewer',
    toolDesc: 'Paste an OpenAPI 3 or Swagger 2.0 JSON spec and get clean, browsable API documentation: endpoints, parameters, request bodies, responses and schemas. 100% in-browser, no upload.',
    lblIn: 'OpenAPI / Swagger JSON',
    lblOut: 'Rendered documentation',
    invalidSpec: '✗ Invalid JSON — paste a valid OpenAPI/Swagger spec',
    validOk: '✓ Rendered',
    emptyHint: 'Paste an OpenAPI 3 / Swagger JSON spec on the left to render the docs.',
    expandAll: 'Expand all',
    collapseAll: 'Collapse all',
    params: 'Parameters',
    reqBody: 'Request Body',
    responses: 'Responses',
    required: 'required',
    name: 'Name', desc: 'Description', in: 'Located in', schemaCol: 'Schema',
    schemas: 'Schemas',
    step1: 'Paste a valid OpenAPI 3 / Swagger 2.0 JSON spec into the input',
    step2: 'Browse rendered endpoints, parameters, request bodies and responses',
    step3: 'Click any endpoint to expand or collapse its details',
    step4: 'Use Expand all / Collapse all for an overview, then copy what you need',
  },
  zh: {
    toolTitle: 'OpenAPI / Swagger 规范查看器',
    toolDesc: '粘贴 OpenAPI 3 或 Swagger 2.0 的 JSON 规范，即时生成清晰可浏览的 API 文档：端点、参数、请求体、响应和数据模型。完全在浏览器本地运行，不上传。',
    lblIn: 'OpenAPI / Swagger JSON',
    lblOut: '渲染后的文档',
    invalidSpec: '✗ JSON 无效 — 请粘贴有效的 OpenAPI/Swagger 规范',
    validOk: '✓ 已渲染',
    emptyHint: '在左侧粘贴 OpenAPI 3 / Swagger JSON 规范即可渲染文档。',
    expandAll: '全部展开',
    collapseAll: '全部折叠',
    params: '参数',
    reqBody: '请求体',
    responses: '响应',
    required: '必填',
    name: '名称', desc: '说明', in: '位置', schemaCol: '类型',
    schemas: '数据模型',
    step1: '在输入区粘贴有效的 OpenAPI 3 / Swagger 2.0 JSON 规范',
    step2: '浏览渲染后的端点、参数、请求体和响应',
    step3: '点击任意端点可展开或折叠其详情',
    step4: '用「全部展开/折叠」总览，然后复制所需内容',
  }
});
const { $, copyText, t } = GZ;
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function refName(ref){ return String(ref||'').replace(/^#\/(components\/)?schemas\//,'').replace(/^#\/definitions\//,''); }
function schemaType(s){
  if(!s)return 'any';
  if(s.$ref)return refName(s.$ref);
  if(s.type)return s.format?(s.type+' ('+s.format+')'):s.type;
  if(Array.isArray(s.type))return s.type.join(' | ');
  if(s.properties)return 'object';
  if(s.enum)return 'enum';
  return 'any';
}
function paramRows(params){
  if(!params||!params.length)return '';
  return `<table class="sw-table"><thead><tr><th>${esc(t('name'))}</th><th>${esc(t('in'))}</th><th>${esc(t('schemaCol'))}</th><th>${esc(t('desc'))}</th></tr></thead><tbody>`+
    params.map(p=>`<tr><td><span class="sw-code">${esc(p.name)}</span>${p.required?'<span class="sw-required"> '+esc(t('required'))+'</span>':''}</td><td>${esc(p.in)}</td><td>${esc(schemaType(p.schema||{type:p.type}))}</td><td>${esc(p.description||'')}</td></tr>`).join('')+
    `</tbody></table>`;
}
function reqBodyBlock(rb){
  if(!rb)return '';
  let ct='<div class="sw-section"><h4>'+esc(t('reqBody'))+'</h4>';
  if(rb.description)ct+='<div style="font-size:.86em;color:var(--text2);margin-bottom:6px">'+esc(rb.description)+'</div>';
  const content=rb.content||{};
  const types=Object.keys(content);
  if(types.length){
    types.forEach(mt=>{
      const sch=(content[mt]&&content[mt].schema)||{};
      ct+='<div style="margin:4px 0"><span class="sw-code">'+esc(mt)+'</span> → '+esc(schemaType(sch))+'</div>';
    });
  }
  if(rb.required)ct+='<div style="font-size:.8em;color:var(--gz-accent);margin-top:4px">'+esc(t('required'))+'</div>';
  ct+='</div>';
  return ct;
}
function respBlock(responses){
  if(!responses)return '';
  let ct='<div class="sw-section"><h4>'+esc(t('responses'))+'</h4>';
  Object.keys(responses).forEach(code=>{
    const r=responses[code]||{};
    ct+='<div class="sw-resp"><span class="code">'+esc(code)+'</span><span>'+esc(r.description||'')+'</span></div>';
  });
  ct+='</div>';
  return ct;
}

function render(){
  const inp=$('#input').value.trim();
  const out=$('#output');
  if(!inp){out.innerHTML='<div class="sw-empty">'+esc(t('emptyHint'))+'</div>';$('#status').innerHTML='';return;}
  let spec;
  try{ spec=JSON.parse(inp); }
  catch(e){ out.innerHTML='<div class="sw-empty">'+esc(t('invalidSpec')+': '+e.message)+'</div>'; $('#status').innerHTML='<span style="color:var(--gz-accent)">'+esc(t('invalidSpec'))+'</span>'; return; }
  const v=spec.openapi||spec.swagger||'?';
  let html='';
  // Info
  const info=spec.info||{};
  html+='<div class="sw-info"><div class="sw-title">'+esc(info.title||'Untitled API')+'<span class="sw-ver">v'+esc(info.version||'')+' · OpenAPI '+esc(v)+'</span></div>';
  if(info.description)html+='<div class="sw-desc">'+esc(info.description).replace(/\n/g,'<br>')+'</div>';
  // Servers / host
  const servers=spec.servers||[];
  if(servers.length){html+='<div>';servers.forEach(s=>html+='<span class="sw-server">'+esc(s.url)+'</span>');html+='</div>';}
  if(spec.host){html+='<div><span class="sw-server">'+esc((spec.schemes&&spec.schemes[0]||'https')+'://'+spec.host+(spec.basePath||''))+'</span></div>';}
  html+='</div>';
  // Paths
  const paths=spec.paths||{};
  const pkeys=Object.keys(paths);
  let epCount=0;
  pkeys.forEach(path=>{
    const ops=paths[path]||{};
    ['get','post','put','delete','patch','head','options'].forEach(method=>{
      const op=ops[method]; if(!op)return; epCount++;
      const summary=op.summary||op.operationId||'';
      html+=`<div class="sw-ep" onclick="this.classList.toggle('open')">
        <div class="sw-ep-head">
          <span class="sw-method m-${method}">${method.toUpperCase()}</span>
          <span class="sw-ep-path">${esc(path)}</span>
          <span class="sw-ep-summary">${esc(summary)}</span>
        </div>
        <div class="sw-ep-body" onclick="event.stopPropagation()">
          ${op.description?'<div style="font-size:.88em;color:var(--text2);margin-bottom:8px">'+esc(op.description)+'</div>':''}
          <div class="sw-section"><h4>${esc(t('params'))}</h4>${paramRows([...(op.parameters||[]),...(ops.parameters||[])])||'<span style="font-size:.85em;color:var(--text2)">—</span>'}</div>
          ${reqBodyBlock(op.requestBody)}
          ${respBlock(op.responses)}
        </div>
      </div>`;
    });
  });
  if(!pkeys.length)html+='<div class="sw-empty">No paths found.</div>';
  // Schemas
  const schemas=Object.assign({}, (spec.components&&spec.components.schemas)||{}, spec.definitions||{});
  const skeys=Object.keys(schemas);
  if(skeys.length){
    html+='<div class="sw-schemas"><h3 style="margin:14px 0 8px">📦 '+esc(t('schemas'))+' ('+skeys.length+')</h3>';
    skeys.forEach(name=>{
      const sc=schemas[name];
      const props=sc.properties||{};
      const req=new Set(sc.required||[]);
      const rows=Object.keys(props).map(pn=>{
        const r=req.has(pn)?'<span class="sw-required"> '+esc(t('required'))+'</span>':'';
        return `<tr><td><span class="sw-code">${esc(pn)}</span>${r}</td><td>${esc(schemaType(props[pn]))}</td><td>${esc(props[pn].description||'')}</td></tr>`;
      }).join('');
      const table = rows
        ? `<table class="sw-table"><thead><tr><th>${esc(t('name'))}</th><th>${esc(t('schemaCol'))}</th><th>${esc(t('desc'))}</th></tr></thead><tbody>${rows}</tbody></table>`
        : '<span style="font-size:.85em;color:var(--text2)">—</span>';
      html+=`<div class="sw-schema"><h4>${esc(name)}</h4>${table}</div>`;
    });
    html+='</div>';
  }
  out.innerHTML=html;
  $('#status').innerHTML='<span style="color:var(--gz-success)">'+esc(t('validOk')+' — '+epCount+' endpoint(s), '+skeys.length+' schema(s)')+'</span>';
}
window.render=render;

function loadExample(){
$('#input').value=JSON.stringify({
  "openapi":"3.0.3",
  "info":{"title":"Pet Store API","version":"1.0.0","description":"A sample API to manage pets."},
  "servers":[{"url":"https://api.petstore.example.com/v1"}],
  "paths":{
    "/pets":{
      "get":{"summary":"List all pets","parameters":[{"name":"limit","in":"query","description":"Max number of results","required":false,"schema":{"type":"integer","format":"int32"}}],"responses":{"200":{"description":"A list of pets"},"400":{"description":"Bad request"}}},
      "post":{"summary":"Create a pet","requestBody":{"description":"Pet to create","required":true,"content":{"application/json":{"schema":{"$ref":"#/components/schemas/Pet"}}}},"responses":{"201":{"description":"Created"},"400":{"description":"Invalid input"}}}
    },
    "/pets/{petId}":{
      "get":{"summary":"Get a pet by ID","parameters":[{"name":"petId","in":"path","description":"ID of the pet","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"A pet"},"404":{"description":"Not found"}}},
      "delete":{"summary":"Delete a pet","parameters":[{"name":"petId","in":"path","required":true,"schema":{"type":"string"}}],"responses":{"204":{"description":"Deleted"}}}
    }
  },
  "components":{"schemas":{
    "Pet":{"type":"object","required":["id","name"],"properties":{"id":{"type":"integer","format":"int64","description":"Unique id"},"name":{"type":"string","description":"Pet name"},"tag":{"type":"string"}}}
  }}
},null,2);
  render();
}
function doClear(){ $('#input').value=''; render(); }
function expandAll(){ document.querySelectorAll('.sw-ep').forEach(e=>e.classList.add('open')); }
function collapseAll(){ document.querySelectorAll('.sw-ep').forEach(e=>e.classList.remove('open')); }
window.doClear=doClear;window.expandAll=expandAll;window.collapseAll=collapseAll;

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="render()">${t('convert')||'Render'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="expandAll()">${t('expandAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="collapseAll()">${t('collapseAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
$('#lbl-in').textContent=t('lblIn');
$('#lbl-out').textContent=t('lblOut');
$('#input').addEventListener('input',render);
loadExample();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🗂️', href:'/convert/yaml-json.html', name:'YAML to JSON'},
    {icon:'🌐', href:'/dev/api-tester.html', name:'API Tester'},
    {icon:'🧩', href:'/dev/jsonld-generator.html', name:'JSON-LD Generator'},
    {icon:'📡', href:'/dev/graphql-explorer.html', name:'GraphQL Explorer'},
  ]
});
</script>
