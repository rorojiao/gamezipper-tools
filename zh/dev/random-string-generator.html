<script>
GZI18n.register({
  en: {
    toolTitle: 'Random String Generator',
    toolDesc: 'Generate cryptographically secure random strings for passwords, tokens, IDs and test data. Customize length, character set and quantity.',
    lblLen: 'Length per string',
    lblQty: 'Quantity',
    lblPreset: 'Preset',

    digits: 'Digits 0–9',
    symbols: 'Symbols !@#…',
    exclude: 'Exclude look-alikes (0/O, 1/l/I)',
    generate: '🎲 Generate',
    clear: 'Clear',
    copyAll: 'Copy all',
    download: 'Download',
    step1: 'Pick a preset or mix character sets (uppercase, lowercase, digits, symbols)',
    step2: 'Set length (1–4096) and quantity (1–1000)',
    step3: 'Click Generate — strings are produced locally with crypto.getRandomValues',
    step4: 'Copy or download the result as plain text, CSV, JSON, SQL or space-separated',
    statCount: 'strings',

    statBits: 'entropy per string',

  },
  zh: {
    toolTitle: '随机字符串生成器',
    toolDesc: '使用密码学安全的随机数生成密码、令牌、ID 和测试数据。可自定义长度、字符集和数量。',
    lblLen: '每个字符串长度',
    lblQty: '生成数量',
    lblPreset: '预设',
    lblFormat: '输出格式',
    lblCustom: '自定义字符集（可选）',
    charset: '字符集',
    upper: '大写 A–Z',
    lower: '小写 a–z',
    digits: '数字 0–9',
    symbols: '符号 !@#…',
    exclude: '排除易混字符 (0/O, 1/l/I)',
    generate: '🎲 生成',
    clear: '清空',
    copyAll: '复制全部',
    download: '下载',
    step1: '选择预设或自定义字符集（大写、小写、数字、符号）',
    step2: '设置长度（1–4096）和数量（1–1000）',
    step3: '点击生成 — 字符串使用 crypto.getRandomValues 本地生成',
    step4: '复制或下载为纯文本、CSV、JSON、SQL 或空格分隔',
    statCount: '字符串数',
    statTotal: '总字符数',
    statBits: '每串熵',
    statUnique: '去重字符串数',
  }
});

const { $, copyText, t } = GZ;

const PRESETS = {
  alnum:   'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789',
  letters: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz',
  digits:  '0123456789',
  hex:     '0123456789abcdef',
  base64:  'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/',
  uuid:    '0123456789abcdef',
  password:'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()-_=+[]{};:,.<>/?',
  ascii:   (() => { let s = ''; for (let i = 33; i < 127; i++) s += String.fromCharCode(i); return s; })(),
};
const SYMBOLS = '!@#$%^&*()-_=+[]{};:,.<>/?';
const LOOK_ALIKES = new Set(['0','O','o','1','l','I','|']);

function buildAlphabet() {
  const custom = $('#customAlpha').value.trim();
  if (custom) return Array.from(new Set(custom.split(''))).join('');
  let set = '';
  if ($('#c-upper').checked) set += PRESETS.letters.slice(0,26);
  if ($('#c-lower').checked) set += PRESETS.letters.slice(26);
  if ($('#c-digits').checked) set += PRESETS.digits;
  if ($('#c-symbols').checked) set += SYMBOLS;
  if ($('#c-exclude').checked) set = Array.from(set).filter(c => !LOOK_ALIKES.has(c)).join('');
  return set;
}

function secureRandom(max) {
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0] % max;
}

function generateOne(alphabet, len) {
  if (!alphabet) return '';
  let out = '';
  for (let i = 0; i < len; i++) out += alphabet[secureRandom(alphabet.length)];
  return out;
}

function generateUUID() {
  const hex = '0123456789abcdef';
  const b = new Uint8Array(16);
  crypto.getRandomValues(b);
  b[6] = (b[6] & 0x0f) | 0x40;
  b[8] = (b[8] & 0x3f) | 0x80;
  let s = '';
  for (let i = 0; i < 16; i++) {
    s += hex[b[i] >> 4] + hex[b[i] & 0xf];
    if (i === 3 || i === 5 || i === 7 || i === 9) s += '-';
  }
  return s;
}

function entropy(alphabet, len) {
  if (!alphabet || len === 0) return 0;
  return Math.floor(len * Math.log2(alphabet.length) * 10) / 10;
}

function doGenerate() {
  const preset = $('#preset').value;
  const len = Math.max(1, Math.min(4096, parseInt($('#length').value, 10) || 1));
  const qty = Math.max(1, Math.min(1000, parseInt($('#qty').value, 10) || 1));
  let alphabet;
  if (preset === 'uuid') {
    alphabet = 'uuid';
  } else if (preset === 'custom') {
    alphabet = buildAlphabet();
  } else {
    alphabet = PRESETS[preset];
  }
  if (preset !== 'uuid' && !alphabet) {
    $('#output').textContent = '';
    $('#stats').innerHTML = '';
    $('#copyBtn').style.display = $('#downloadBtn').style.display = 'none';
    GZ.showToast('Pick at least one character set');
    return;
  }
  const arr = [];
  for (let i = 0; i < qty; i++) {
    arr.push(preset === 'uuid' ? generateUUID() : generateOne(alphabet, len));
  }
  const format = $('#format').value;
  let text;
  if (format === 'json') text = JSON.stringify(arr, null, 2);
  else if (format === 'csv') text = arr.map(s => `"${s.replace(/"/g,'""')}"`).join(',');
  else if (format === 'sql') text = arr.map(s => `('${s.replace(/'/g,"''")}')`).join(',\n');
  else if (format === 'space') text = arr.join(' ');
  else text = arr.join('\n');

  $('#output').textContent = text;
  const unique = new Set(arr).size;
  const bits = preset === 'uuid' ? 122 : entropy(alphabet, len);
  $('#stats').innerHTML =
    `<div class="rsg-stat"><div class="v">${qty}</div><div class="l">${t('statCount')}</div></div>` +
    `<div class="rsg-stat"><div class="v">${arr.reduce((s,x)=>s+x.length,0).toLocaleString()}</div><div class="l">${t('statTotal')}</div></div>` +
    `<div class="rsg-stat"><div class="v">${bits}<span class="rsg-bits">bits</span></div><div class="l">${t('statBits')}</div></div>` +
    `<div class="rsg-stat"><div class="v">${unique}</div><div class="l">${t('statUnique')}</div></div>`;
  $('#copyBtn').style.display = $('#downloadBtn').style.display = '';
}

function doClear() {
  $('#output').textContent = '';
  $('#stats').innerHTML = '';
  $('#copyBtn').style.display = $('#downloadBtn').style.display = 'none';
}

function doCopy() {
  copyText($('#output').textContent);
}
function doDownload() {
  const text = $('#output').textContent;
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `random-strings-${Date.now()}.txt`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function renderCharset() {
  $('#charset').innerHTML = `
    <label><input type="checkbox" id="c-upper" checked> ${t('upper')}</label>
    <label><input type="checkbox" id="c-lower" checked> ${t('lower')}</label>
    <label><input type="checkbox" id="c-digits" checked> ${t('digits')}</label>
    <label><input type="checkbox" id="c-symbols"> ${t('symbols')}</label>
    <label><input type="checkbox" id="c-exclude"> ${t('exclude')}</label>
    <span style="margin-left:auto;color:var(--text3);font-size:.8em">${t('charset')}</span>`;
}

$('#preset').addEventListener('change', () => {
  const v = $('#preset').value;
  const isCustom = (v === 'custom');
  $('#charset').style.opacity = isCustom ? '1' : '0.45';
  $('#charset').style.pointerEvents = isCustom ? 'auto' : 'none';
  $('#customAlpha').disabled = !isCustom;
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doGenerate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
$('#copyBtn').onclick = doCopy;
$('#downloadBtn').onclick = doDownload;

renderCharset();
$('#preset').dispatchEvent(new Event('change'));

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔐', href:'/dev/password-generator.html', name:'Password Generator'},
    {icon:'🔑', href:'/dev/uuid-generator.html', name:'UUID Generator'},
    {icon:'🆔', href:'/dev/nanoid-generator.html', name:'NanoID Generator'},
    {icon:'❄️', href:'/dev/snowflake-id-generator.html', name:'Snowflake ID'},
  ]
});
</script>
