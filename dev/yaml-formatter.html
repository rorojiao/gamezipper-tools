let indentSize = 2;

// Minimal YAML parser & serializer (handles common structures)
function yamlDump(obj, indent) {
  return dumpValue(obj, 0, indent);
}

function dumpValue(val, level, indent) {
  const pad = ' '.repeat(level * indent);
  if (val === null || val === undefined) return 'null';
  if (typeof val === 'boolean') return String(val);
  if (typeof val === 'number') return String(val);
  if (typeof val === 'string') {
    // Quote if needed
    if (val === '' || /[:\{\}\[\],&\*#\?\|<>=!%@`"\n]/.test(val) || /^\s|\s$/.test(val) || /^[-?\[\]{}]/.test(val)) {
      return '"' + val.replace(/\\/g,'\\\\').replace(/"/g,'\\"') + '"';
    }
    return val;
  }
  if (Array.isArray(val)) {
    if (!val.length) return '[]';
    return val.map(item => {
      if (item !== null && typeof item === 'object') {
        const inner = dumpValue(item, level + 1, indent);
        const firstLine = inner.split('\n')[0];
        const rest = inner.split('\n').slice(1).join('\n');
        return `${pad}- ${firstLine}${rest ? '\n' + rest : ''}`;
      }
      return `${pad}- ${dumpValue(item, 0, indent)}`;
    }).join('\n');
  }
  if (typeof val === 'object') {
    const keys = $('#sortKeyChk')?.checked ? Object.keys(val).sort() : Object.keys(val);
    if (!keys.length) return '{}';
    return keys.map(key => {
      const v = val[key];
      if (v !== null && typeof v === 'object') {
        const inner = dumpValue(v, level + 1, indent);
        if (!inner) return `${pad}${key}:`;
        if (Array.isArray(v)) {
          return `${pad}${key}:\n${inner}`;
        }
        return `${pad}${key}:\n${inner}`;
      }
      return `${pad}${key}: ${dumpValue(v, 0, indent)}`;
    }).join('\n');
  }
  return String(val);
}

function doFormat() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const obj = parseYAML(inp);
    const formatted = yamlDump(obj, indentSize);
    $('#output').innerHTML = highlightYAML(formatted);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('validYaml')}</span>`;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidYaml')}: ${e.message}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${escHtml(e.message)}</span>`;
  }
}

// Simple YAML parser supporting maps, sequences, scalars, strings, nested
function parseYAML(text) {
  const lines = text.split('\n');
  let i = 0;

  function parseValue(str) {
    str = str.trim();
    if (str === '' ) return null;
    if (str === 'null' || str === '~') return null;
    if (str === 'true' || str === 'yes' || str === 'on') return true;
    if (str === 'false' || str === 'no' || str === 'off') return false;
    if (/^-?\d+$/.test(str)) return parseInt(str, 10);
    if (/^-?\d*\.\d+$/.test(str)) return parseFloat(str);
    if (/^-?\d+(\.\d+)?[eE][+-]?\d+$/.test(str)) return parseFloat(str);
    // Quoted strings
    if ((str.startsWith('"') && str.endsWith('"')) || (str.startsWith("'") && str.endsWith("'"))) {
      return str.slice(1, -1).replace(/\\"/g,'"').replace(/\\'/g,"'");
    }
    // Flow collections
    if (str.startsWith('[') && str.endsWith(']')) {
      const inner = str.slice(1,-1).trim();
      if (!inner) return [];
      return inner.split(',').map(s => parseValue(s.trim()));
    }
    if (str.startsWith('{') && str.endsWith('}')) {
      const inner = str.slice(1,-1).trim();
      if (!inner) return {};
      const obj = {};
      inner.split(',').forEach(pair => {
        const [k,v] = pair.split(':');
        obj[k.trim()] = parseValue((v||'').trim());
      });
      return obj;
    }
    return str;
  }

  function getIndent(line) {
    const m = line.match(/^(\s*)/);
    return m[1].length;
  }

  function parseBlock(minIndent) {
    let result = null;
    while (i < lines.length) {
      let line = lines[i];
      // Skip comments and blanks
      const trimmed = line.replace(/#.*$/, '').trim();  // strip inline comments
      if (!trimmed) { i++; continue; }
      const indent = getIndent(line);
      if (indent < minIndent) break;

      // Sequence item
      if (/^\s*-\s/.test(line) || /^\s*-$/.test(line)) {
        if (!Array.isArray(result)) result = [];
        const itemContent = line.replace(/^\s*-\s?/, '');
        if (!itemContent || itemContent.trim() === '') {
          i++;
          const nested = parseBlock(indent + 1);
          result.push(nested);
        } else if (itemContent.includes(':') && !itemContent.match(/^["'].*["']$/)) {
          // inline mapping item like "- key: value"
          const obj = {};
          const [k, ...rest] = itemContent.split(':');
          const v = rest.join(':').trim();
          if (v === '') {
            i++;
            obj[k.trim()] = parseBlock(indent + 2);
          } else {
            obj[k.trim()] = parseValue(v);
            i++;
          }
          // Check for more keys at indent+2
          while (i < lines.length) {
            const nl = lines[i];
            const nt = nl.replace(/#.*$/,'').trim();
            if (!nt) { i++; continue; }
            if (getIndent(nl) < indent + 2) break;
            const [nk, ...nr] = nt.split(':');
            const nv = nr.join(':').trim();
            if (nv === '') { i++; obj[nk.trim()] = parseBlock(getIndent(nl)+1); }
            else { obj[nk.trim()] = parseValue(nv); i++; }
          }
          result.push(obj);
        } else {
          result.push(parseValue(itemContent));
          i++;
        }
        continue;
      }

      // Key-value
      const kvMatch = trimmed.match(/^([^:]+):(.*)$/);
      if (kvMatch) {
        if (!result || Array.isArray(result)) result = {};
        const key = kvMatch[1].trim();
        const valStr = kvMatch[2].trim();
        if (valStr === '') {
          i++;
          const childIndent = (i < lines.length && /^\s*$/.test(lines[i].replace(/#.*$/,'')) ) ? indent : (i < lines.length ? getIndent(lines[i]) : indent);
          if (i < lines.length && childIndent > indent) {
            result[key] = parseBlock(childIndent);
          } else {
            result[key] = null;
          }
        } else {
          result[key] = parseValue(valStr);
          i++;
        }
        continue;
      }

      // Unknown line
      i++;
    }
    return result;
  }

  // Skip leading document markers and comments
  while (i < lines.length) {
    const l = lines[i].trim();
    if (!l || l.startsWith('#') || l === '---' || l === '...') { i++; continue; }
    break;
  }
  const result = parseBlock(0);
  if (result === null) throw new Error('Empty or invalid YAML');
  return result;
}

function highlightYAML(text) {
  return escHtml(text).split('\n').map(line => {
    // Comments
    if (/^\s*#/.test(line)) return `<span class="yaml-comment">${line}</span>`;
    // Document markers
    if (/^(---|\.\.\.)/.test(line)) return `<span class="yaml-doc">${line}</span>`;
    // Key-value
    return line.replace(/^(\s*-?\s*)([^:]+)(:)(.*)$/, (m, prefix, key, colon, rest) => {
      let valSpan = '';
      const v = rest.trim();
      if (!v) valSpan = '';
      else if (v === 'null' || v === '~') valSpan = `<span class="yaml-null">${rest}</span>`;
      else if (v === 'true' || v === 'false') valSpan = `<span class="yaml-bool">${rest}</span>`;
      else if (/^-?\d/.test(v)) valSpan = `<span class="yaml-number">${rest}</span>`;
      else valSpan = `<span class="yaml-string">${rest}</span>`;
      return `${prefix}<span class="yaml-key">${key}</span>${colon}${valSpan}`;
    });
  }).join('\n');
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
