.gz-amortization th:first-child,.gz-amortization td:first-child{text-align:center}
.gz-chart-area{display:flex;align-items:center;justify-content:center;margin-top:24px;gap:24px;flex-wrap:wrap}

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is EMI?", "acceptedAnswer": {"@type": "Answer", "text": "EMI (Equated Monthly Installment) is a fixed payment amount made by a borrower to a lender at a specified date each month. EMIs cover both principal and interest on a loan."}}, {"@type": "Question", "name": "How is EMI calculated?", "acceptedAnswer": {"@type": "Answer", "text": "EMI is calculated using the formula: EMI = P × r × (1+r)^n / ((1+r)^n - 1), where P is the principal loan amount, r is the monthly interest rate, and n is the total number of monthly installments."}}, {"@type": "Question", "name": "Can I use this for home loans?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. This calculator works for home loans, car loans, personal loans, education loans and any other type of amortized loan."}}, {"@type": "Question", "name": "What is an amortization schedule?", "acceptedAnswer": {"@type": "Answer", "text": "An amortization schedule is a complete table showing each monthly payment broken down into the principal and interest portions, along with the remaining loan balance after each payment."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-form">
      <div class="gz-form-group">
        <label id="lbl-amount"></label>
        <div class="gz-range-row">
          <input type="range" id="loanAmount" min="1000" max="10000000" value="200000" step="1000">
          <span id="amountDisplay">200,000</span>
        </div>
      </div>
      <div class="gz-form-group">
        <label id="lbl-rate"></label>
        <div class="gz-range-row">
          <input type="range" id="interestRate" min="0.5" max="30" value="8" step="0.1">
          <span id="rateDisplay">8.0%</span>
        </div>
      </div>
      <div class="gz-form-group">
        <label id="lbl-term"></label>
        <div class="gz-range-row">
          <input type="range" id="loanTerm" min="1" max="30" value="5">
          <span id="termDisplay">5 years</span>
        </div>
      </div>
      <div class="gz-form-group">
        <label id="lbl-type"></label>
        <select id="loanType">
          <option value="home" id="opt-home"></option>
          <option value="car" id="opt-car"></option>
          <option value="personal" id="opt-personal"></option>
          <option value="education" id="opt-education"></option>
        </select>
      </div>
      <div class="gz-full-width" style="text-align:center;margin-top:8px">
        <button class="gz-btn" id="calcBtn" style="font-size:1.1em;padding:12px 32px"></button>
      </div>
    </div>
    <div id="results" style="display:none">
      <div class="gz-result-grid" id="resultGrid"></div>
      <div class="gz-chart-area" id="chartArea"></div>
      <div class="gz-amortization" id="amortTable"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Loan & EMI Calculator',
    toolDesc: 'Calculate monthly EMI, total interest and view the full amortization schedule for any loan type.',
    lblAmount: 'Loan Amount',
    lblRate: 'Annual Interest Rate (%)',
    lblTerm: 'Loan Term',
    lblType: 'Loan Type',
    optHome: '🏠 Home Loan',
    optCar: '🚗 Car Loan',
    optPersonal: '👤 Personal Loan',
    optEducation: '🎓 Education Loan',
    calculate: 'Calculate EMI',
    monthlyEMI: 'Monthly EMI',
    totalInterest: 'Total Interest',
    totalPayment: 'Total Payment',
    principalLabel: 'Principal',
    interestLabel: 'Interest',
    month: 'Month',
    payment: 'Payment',
    principalCol: 'Principal',
    interestCol: 'Interest',
    balance: 'Balance',
    years: 'years',
    step1: 'Set the loan amount using the slider',
    step2: 'Adjust the interest rate and loan term',
    step3: 'Select the loan type',
    step4: 'Click Calculate to see EMI and amortization schedule',
  },
  zh: {
    toolTitle: '贷款 & EMI 计算器',
    toolDesc: '计算月供、总利息并查看完整的还款计划表，适用于各类贷款。',
    lblAmount: '贷款金额',
    lblRate: '年利率 (%)',
    lblTerm: '贷款期限',
    lblType: '贷款类型',
    optHome: '🏠 房贷',
    optCar: '🚗 车贷',
    optPersonal: '👤 个人贷款',
    optEducation: '🎓 教育贷款',
    calculate: '计算月供',
    monthlyEMI: '月供 EMI',
    totalInterest: '总利息',
    totalPayment: '总还款额',
    principalLabel: '本金',
    interestLabel: '利息',
    month: '期数',
    payment: '月供',
    principalCol: '本金',
    interestCol: '利息',
    balance: '余额',
    years: '年',
    step1: '使用滑块设置贷款金额',
    step2: '调整利率和贷款期限',
    step3: '选择贷款类型',
    step4: '点击计算查看月供和还款计划',
  }
});

const { $, t } = GZ;

// Set labels
$('#lbl-amount').textContent = t('lblAmount');
$('#lbl-rate').textContent = t('lblRate');
$('#lbl-term').textContent = t('lblTerm');
$('#lbl-type').textContent = t('lblType');
$('#opt-home').textContent = t('optHome');
$('#opt-car').textContent = t('optCar');
$('#opt-personal').textContent = t('optPersonal');
$('#opt-education').textContent = t('optEducation');
$('#calcBtn').textContent = t('calculate');

function formatNum(n) {
  return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// Slider updates
$('#loanAmount').addEventListener('input', function() {
  $('#amountDisplay').textContent = parseInt(this.value).toLocaleString();
});
$('#interestRate').addEventListener('input', function() {
  $('#rateDisplay').textContent = parseFloat(this.value).toFixed(1) + '%';
});
$('#loanTerm').addEventListener('input', function() {
  $('#termDisplay').textContent = this.value + ' ' + t('years');
});

function calculate() {
  const P = parseFloat($('#loanAmount').value);
  const annualRate = parseFloat($('#interestRate').value);
  const years = parseInt($('#loanTerm').value);
  const n = years * 12;
  const r = annualRate / 100 / 12;

  let emi;
  if (r === 0) {
    emi = P / n;
  } else {
    emi = P * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1);
  }

  const totalPayment = emi * n;
  const totalInterest = totalPayment - P;

  // Result cards
  $('#resultGrid').innerHTML = `
    <div class="gz-result-card">
      <div class="label">${t('monthlyEMI')}</div>
      <div class="value">${formatNum(emi)}</div>
    </div>
    <div class="gz-result-card">
      <div class="label">${t('totalInterest')}</div>
      <div class="value" style="color:#e94560">${formatNum(totalInterest)}</div>
      <div class="sub">${((totalInterest / P) * 100).toFixed(1)}% ${t('interestLabel').toLowerCase()}</div>
    </div>
    <div class="gz-result-card">
      <div class="label">${t('totalPayment')}</div>
      <div class="value">${formatNum(totalPayment)}</div>
    </div>`;

  // Pie chart (simple SVG)
  const principalAngle = (P / totalPayment) * 360;
  const interestAngle = 360 - principalAngle;
  const principalLarge = principalAngle > 180 ? 1 : 0;
  const interestLarge = interestAngle > 180 ? 1 : 0;
  const toRad = d => (d - 90) * Math.PI / 180;
  const cos = d => Math.cos(toRad(d));
  const sin = d => Math.sin(toRad(d));
  const r2 = 80;
  const cx2 = 100, cy2 = 100;

  const pEnd = principalAngle;
  const iEnd = 360;
  const principalPath = `M ${cx2} ${cy2} L ${cx2 + r2 * cos(0)} ${cy2 + r2 * sin(0)} A ${r2} ${r2} 0 ${principalLarge} 1 ${cx2 + r2 * cos(pEnd)} ${cy2 + r2 * sin(pEnd)} Z`;
  const interestPath = `M ${cx2} ${cy2} L ${cx2 + r2 * cos(pEnd)} ${cy2 + r2 * sin(pEnd)} A ${r2} ${r2} 0 ${interestLarge} 1 ${cx2 + r2 * cos(iEnd)} ${cy2 + r2 * sin(iEnd)} Z`;

  $('#chartArea').innerHTML = `
    <svg width="200" height="200" viewBox="0 0 200 200">
      <path d="${principalPath}" fill="#4ecdc4"/>
      <path d="${interestPath}" fill="#e94560"/>
    </svg>
    <div class="gz-chart-legend">
      <div class="gz-chart-legend-item"><div class="dot" style="background:#4ecdc4"></div>${t('principalLabel')}: ${formatNum(P)}</div>
      <div class="gz-chart-legend-item"><div class="dot" style="background:#e94560"></div>${t('interestLabel')}: ${formatNum(totalInterest)}</div>
    </div>`;

  // Amortization table
  let balance = P;
  let rows = '';
  for (let m = 1; m <= n; m++) {
    const intPart = balance * r;
    const prinPart = emi - intPart;
    balance -= prinPart;
    if (balance < 0) balance = 0;
    rows += `<tr><td>${m}</td><td>${formatNum(emi)}</td><td>${formatNum(prinPart)}</td><td>${formatNum(intPart)}</td><td>${formatNum(balance)}</td></tr>`;
  }

  $('#amortTable').innerHTML = `
    <table>
      <thead><tr><th>${t('month')}</th><th>${t('payment')}</th><th>${t('principalCol')}</th><th>${t('interestCol')}</th><th>${t('balance')}</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;

  $('#results').style.display = 'block';
}

$('#calcBtn').addEventListener('click', calculate);

// Auto-calculate on slider change
['loanAmount', 'interestRate', 'loanTerm'].forEach(id => {
  document.getElementById(id).addEventListener('change', calculate);
});

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
    {icon:'⛽', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost'},
    {icon:'📐', href:'/calc/aspect-ratio.html', name:'Aspect Ratio'},
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
