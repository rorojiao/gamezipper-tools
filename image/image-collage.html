<script>
GZI18n.register({
  en: {
    toolTitle: 'Photo Collage Maker',
    toolDesc: 'Combine 2-12 photos into a grid, masonry or row layout. Adjust gaps, background, rounded corners and fit, then export as PNG — 100% in your browser.',
    dzText: 'Click or drag multiple images (PNG, JPG, WebP)',
    layout: 'Layout',
    cols: 'Columns',
    gap: 'Gap (px)',
    pad: 'Padding (px)',
    radius: 'Corner Radius (px)',
    bg: 'Background',
    fit: 'Image Fit',
    optGrid: 'Grid (uniform)',
    optMasonry: 'Masonry (Pinterest)',
    optRows: 'Rows (side by side)',
    optCover: 'Cover (crop)',
    optContain: 'Contain (no crop)',
    render: 'Render Collage',
    download: 'Download PNG',
    empty: 'Add at least 2 images to make a collage',
    step1: 'Upload 2 to 12 images',
    step2: 'Pick a layout: grid, masonry or rows',
    step3: 'Adjust columns, gap, background, radius and fit',
    step4: 'Click Render Collage, then download the PNG',
  },
  zh: {
    toolTitle: '照片拼图 / 拼贴制作器',
    toolDesc: '将 2-12 张照片拼成网格、瀑布流或横排布局。可调间距、背景、圆角和裁剪方式，导出 PNG — 100% 浏览器本地运行。',
    dzText: '点击或拖拽多张图片 (PNG, JPG, WebP)',
    layout: '布局',
    cols: '列数',
    gap: '间距 (px)',
    pad: '外边距 (px)',
    radius: '圆角 (px)',
    bg: '背景色',
    fit: '图片填充',
    optGrid: '网格 (统一)',
    optMasonry: '瀑布流 (Pinterest)',
    optRows: '横排 (并排)',
    optCover: '覆盖 (裁剪)',
    optContain: '包含 (不裁剪)',
    render: '生成拼图',
    download: '下载 PNG',
    empty: '至少添加 2 张图片才能拼图',
    step1: '上传 2-12 张图片',
    step2: '选择布局：网格、瀑布流或横排',
    step3: '调整列数、间距、背景、圆角和填充方式',
    step4: '点击「生成拼图」，然后下载 PNG',
  }
});

const { $, t } = GZ;

let images = []; // {img, w, h}
const dropzone = $('#drop');
const fileInput = $('#fileInput');
const thumbs = $('#thumbs');
const controls = $('#controls');
const canvas = $('#collageCanvas');
const ctx = canvas.getContext('2d');
const renderBtn = $('#renderBtn');
const downloadBtn = $('#downloadBtn');
const dzText = $('#dz-text');
dzText.textContent = t('dzText');

['dragover','dragenter'].forEach(ev => dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.add('drag'); }));
['dragleave','drop'].forEach(ev => dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.remove('drag'); }));
dropzone.addEventListener('drop', e => { if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files); });
dropzone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files.length) addFiles(e.target.files); });

async function addFiles(files) {
  for (const f of files) {
    if (images.length >= 12) break;
    if (!f.type.startsWith('image/')) continue;
    const url = URL.createObjectURL(f);
    const img = await loadImg(url);
    images.push({ img, w: img.naturalWidth, h: img.naturalHeight, url });
  }
  renderThumbs();
  controls.style.display = 'grid';
  $('#actions').style.display = 'flex';
}

function loadImg(url) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = url;
  });
}

function renderThumbs() {
  thumbs.innerHTML = images.map((im, i) =>
    `<div class="ic-thumb"><img src="${im.url}"><button class="rm" data-i="${i}">×</button></div>`
  ).join('');
  thumbs.querySelectorAll('.rm').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation();
    const i = +b.dataset.i;
    URL.revokeObjectURL(images[i].url);
    images.splice(i, 1);
    renderThumbs();
  }));
}

function drawImageFitted(img, x, y, w, h, mode) {
  const iw = img.naturalWidth, ih = img.naturalHeight;
  const ir = iw / ih, r = w / h;
  let dw, dh, dx, dy;
  if (mode === 'cover') {
    if (ir > r) { dh = h; dw = h * ir; } else { dw = w; dh = w / ir; }
    dx = x + (w - dw) / 2; dy = y + (h - dh) / 2;
    ctx.save();
    ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();
    if ($('#radius').value > 0) { roundRectPath(ctx, x, y, w, h, +$('#radius').value); ctx.clip(); }
    ctx.drawImage(img, dx, dy, dw, dh);
    ctx.restore();
  } else {
    if (ir > r) { dw = w; dh = w / ir; } else { dh = h; dw = h * ir; }
    dx = x + (w - dw) / 2; dy = y + (h - dh) / 2;
    ctx.save();
    if ($('#radius').value > 0) { roundRectPath(ctx, x, y, w, h, +$('#radius').value); ctx.clip(); }
    ctx.drawImage(img, dx, dy, dw, dh);
    ctx.restore();
  }
}

function roundRectPath(ctx, x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function renderGrid() {
  const cols = +$('#cols').value;
  const gap = +$('#gap').value;
  const pad = +$('#pad').value;
  const bg = $('#bg').value;
  const fit = $('#fit').value;
  const radius = +$('#radius').value;
  const n = images.length;
  const rows = Math.ceil(n / cols);
  const cell = 360;
  const W = pad * 2 + cols * cell + (cols - 1) * gap;
  const H = pad * 2 + rows * cell + (rows - 1) * gap;
  canvas.width = W; canvas.height = H;
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
  images.forEach((im, i) => {
    const r = Math.floor(i / cols), c = i % cols;
    const x = pad + c * (cell + gap), y = pad + r * (cell + gap);
    drawImageFitted(im.img, x, y, cell, cell, fit);
  });
}

function renderRows() {
  const gap = +$('#gap').value;
  const pad = +$('#pad').value;
  const bg = $('#bg').value;
  const fit = $('#fit').value;
  const n = images.length;
  const targetH = 360;
  let totalW = 0;
  const widths = images.map(im => {
    const w = targetH * (im.w / im.h);
    totalW += w;
    return w;
  });
  const W = pad * 2 + totalW + (n - 1) * gap;
  const H = pad * 2 + targetH;
  canvas.width = W; canvas.height = H;
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
  let x = pad;
  images.forEach((im, i) => {
    drawImageFitted(im.img, x, pad, widths[i], targetH, fit);
    x += widths[i] + gap;
  });
}

function renderMasonry() {
  const cols = +$('#cols').value;
  const gap = +$('#gap').value;
  const pad = +$('#pad').value;
  const bg = $('#bg').value;
  const fit = $('#fit').value;
  const colW = 360;
  const W = pad * 2 + cols * colW + (cols - 1) * gap;
  const colH = new Array(cols).fill(0);
  const placements = [];
  // Greedy shortest column
  images.forEach(im => {
    let best = 0;
    for (let c = 1; c < cols; c++) if (colH[c] < colH[best]) best = c;
    const ratio = im.h / im.w;
    const cellH = colW * ratio;
    const x = pad + best * (colW + gap);
    const y = pad + colH[best];
    placements.push({ im, x, y, w: colW, h: cellH });
    colH[best] += cellH + gap;
  });
  const H = pad * 2 + Math.max(...colH);
  canvas.width = W; canvas.height = H;
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
  placements.forEach(p => drawImageFitted(p.im.img, p.x, p.y, p.w, p.h, fit));
}

renderBtn.addEventListener('click', () => {
  if (images.length < 2) { alert(t('empty')); return; }
  const layout = $('#layout').value;
  if (layout === 'grid') renderGrid();
  else if (layout === 'masonry') renderMasonry();
  else renderRows();
  canvas.style.display = 'block';
  downloadBtn.disabled = false;
});

downloadBtn.addEventListener('click', () => {
  if (downloadBtn.disabled) return;
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = 'collage-' + Date.now() + '.png';
  a.click();
});

// Live re-render on control change
['layout','cols','gap','pad','bg','fit','radius'].forEach(id => {
  const el = $('#' + id);
  el.addEventListener('input', () => { if (images.length >= 2 && canvas.style.display !== 'none') renderBtn.click(); });
});

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/image/photo-collage.html', name:'Photo Collage'},
    {icon:'🧩', href:'/image/image-stitcher.html', name:'Image Stitcher'},
    {icon:'📐', href:'/image/resizer.html', name:'Image Resizer'},
    {icon:'🎞️', href:'/image/gif-maker.html', name:'GIF Maker'},
  ]
});
</script>

</body>
