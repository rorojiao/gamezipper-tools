<script>
GZI18n.register({
  en: {
    toolTitle: 'Screen Recorder',
    toolDesc: 'Record your screen, window or browser tab for free — with optional microphone audio. No install, no upload, runs in your browser.',
    statusIdle: 'Ready',
    statusRecording: 'Recording',
    statusPaused: 'Paused',

    step2: 'Click "Start Recording" and choose what to share',
    step3: 'Click "Stop" when finished',
    step4: 'Preview and download the recorded video',
  },
  zh: {
    toolTitle: '屏幕录制工具',
    toolDesc: '免费录制屏幕、窗口或浏览器标签页 — 支持麦克风录音。无需安装、无需上传，浏览器本地运行。',
    statusIdle: '就绪',
    statusRecording: '录制中',
    statusPaused: '已暂停',
    statusDone: '完成',
    mic: '包含麦克风',
    systemAudio: '系统音频',
    start: '开始录制',
    pause: '暂停',
    resume: '继续',
    stop: '停止',
    download: '下载视频',
    step1: '如需麦克风音频，勾选「包含麦克风」',
    step2: '点击「开始录制」并选择要共享的内容',
    step3: '录制完成后点击「停止」',
    step4: '预览并下载录制的视频',
  }
});

const { $, t } = GZ;

// UI setup
$('#statusText').textContent = t('statusIdle');
$('#lblMic').textContent = t('mic');
$('#lblSystem').textContent = t('systemAudio');
$('#lblStart').textContent = t('start');
$('#lblPause').textContent = t('pause');
$('#lblStop').textContent = t('stop');
$('#lblDownload').textContent = t('download');

let mediaRecorder = null;
let chunks = [];
let recordedBlob = null;
let timerInterval = null;
let seconds = 0;
let isPaused = false;

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}

function startTimer() {
  seconds = 0;
  $('#timer').textContent = '00:00';
  timerInterval = setInterval(() => {
    if (!isPaused) {
      seconds++;
      $('#timer').textContent = formatTime(seconds);
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
}

async function startRecording() {
  try {
    const includeMic = $('#micCheck').checked;
    const includeSystem = $('#systemAudio').checked;

    const displayStream = await navigator.mediaDevices.getDisplayMedia({
      video: { cursor: 'always' },
      audio: includeSystem
    });

    let combinedStream = displayStream;

    if (includeMic) {
      try {
        const micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        combinedStream = new MediaStream([
          ...displayStream.getVideoTracks(),
          ...displayStream.getAudioTracks(),
          ...micStream.getAudioTracks()
        ]);
      } catch (e) {
        console.warn('Microphone access denied:', e);
      }
    }

    chunks = [];
    const options = { mimeType: 'video/webm;codecs=vp9' };
    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
      options.mimeType = 'video/webm';
    }
    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
      options.mimeType = '';
    }

    mediaRecorder = new MediaRecorder(combinedStream, options);
    mediaRecorder.ondataavailable = e => {
      if (e.data.size > 0) chunks.push(e.data);
    };
    mediaRecorder.onstop = () => {
      recordedBlob = new Blob(chunks, { type: 'video/webm' });
      const url = URL.createObjectURL(recordedBlob);
      $('#preview').src = url;
      $('#previewArea').style.display = 'block';
      $('#fileInfo').textContent = `WebM · ${formatSize(recordedBlob.size)} · ${formatTime(seconds)}`;
      $('#btnDownload').style.display = 'inline-block';
      setStatus('done');
    };

    // Detect user stopping share via browser UI
    displayStream.getVideoTracks()[0].onended = () => {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        stopRecording();
      }
    };

    mediaRecorder.start(1000);
    setStatus('recording');
    startTimer();

    $('#btnStart').disabled = true;
    $('#btnPause').disabled = false;
    $('#btnStop').disabled = false;
    $('#previewArea').style.display = 'none';
    $('#btnDownload').style.display = 'none';
  } catch (err) {
    if (err.name !== 'NotAllowedError') {
      alert('Error: ' + err.message);
    }
  }
}

function pauseRecording() {
  if (!mediaRecorder) return;
  if (isPaused) {
    mediaRecorder.resume();
    isPaused = false;
    setStatus('recording');
    $('#lblPause').textContent = t('pause');
  } else {
    mediaRecorder.pause();
    isPaused = true;
    setStatus('paused');
    $('#lblPause').textContent = t('resume');
  }
}

function stopRecording() {
  if (!mediaRecorder) return;
  mediaRecorder.stop();
  stopTimer();
  $('#btnStart').disabled = false;
  $('#btnPause').disabled = true;
  $('#btnStop').disabled = true;
}

function setStatus(state) {
  const el = $('#status');
  el.className = 'rec-status ' + (state === 'recording' ? 'recording' : state === 'paused' ? 'paused' : state === 'done' ? 'done' : 'idle');
  if (state === 'recording') {
    el.innerHTML = '<span class="dot"></span> ' + t('statusRecording');
  } else if (state === 'paused') {
    el.innerHTML = '⏸ ' + t('statusPaused');
  } else if (state === 'done') {
    el.innerHTML = '✓ ' + t('statusDone');
  } else {
    el.innerHTML = t('statusIdle');
  }
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(2) + ' MB';
}

function downloadRecording() {
  if (!recordedBlob) return;
  const url = URL.createObjectURL(recordedBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `screen-recording-${Date.now()}.webm`;
  a.click();
  URL.revokeObjectURL(url);
}

});
