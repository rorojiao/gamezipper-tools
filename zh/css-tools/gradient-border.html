<script>

  },
  zh: {
    toolTitle: 'CSS 渐变边框生成器',
    toolDesc: '生成精美的 CSS 渐变边框效果，实时预览，自定义颜色、角度、圆角和宽度，一键复制代码。',
    color1: '颜色 1',
    color2: '颜色 2',
    color3: '颜色 3',
    angle: '角度',
    borderWidth: '边框宽度',
    borderRadius: '圆角',
    padding: '内边距',
    method: '方法',
    methodClip: 'Background Clip（圆角）',
    methodImage: 'Border Image（直角）',
    animate: '动画',
    preset: '预设',
    presetSunset: '日落',
    presetOcean: '海洋',
    presetNeon: '霓虹',
    presetForest: '森林',
    presetPurple: '紫雨',
    presetGold: '金色',
    copyCode: '复制 CSS 代码',
    copied: '已复制！',
    step1: '选择预设或自定义渐变颜色',
    step2: '调整边框宽度、圆角和角度',
    step3: '选择边框方法（background-clip 或 border-image）',
    step4: '复制生成的 CSS 代码',
  }
});

const { $, copyText, t } = GZ;

const presets = {
  sunset: { c1: '#ff6b6b', c2: '#ffd93d', c3: '#ff8e53', angle: 135, border: 3, radius: 16, pad: 32, animate: false },
  ocean: { c1: '#667eea', c2: '#764ba2', c3: '#00d2ff', angle: 90, border: 3, radius: 16, pad: 32, animate: false },
  neon: { c1: '#00ff87', c2: '#60efff', c3: '#0061ff', angle: 45, border: 2, radius: 12, pad: 24, animate: true },
  forest: { c1: '#11998e', c2: '#38ef7d', c3: '#0cebeb', angle: 135, border: 3, radius: 20, pad: 28, animate: false },
  purple: { c1: '#8e2de2', c2: '#ff6a88', c3: '#4f46e5', angle: 180, border: 3, radius: 16, pad: 32, animate: true },
  gold: { c1: '#f7971e', c2: '#ffd200', c3: '#f7971e', angle: 90, border: 2, radius: 12, pad: 28, animate: false },
};

function getVal(id) { return document.getElementById(id).value; }
function getNum(id) { return parseFloat(document.getElementById(id).value); }

function update() {
  const c1 = getVal('color1');
  const c2 = getVal('color2');
  const c3 = getVal('color3');
  const angle = getNum('angleSlider');
  const borderW = getNum('borderSlider');
  const radius = getNum('radiusSlider');
  const pad = getNum('padSlider');
  const method = getVal('methodSelect');
  const animate = document.getElementById('animCheck').checked;

  const gradient = `linear-gradient(${angle}deg, ${c1}, ${c2}, ${c3})`;
  const card = $('#previewCard');
  card.style.padding = pad + 'px';
  card.style.borderRadius = radius + 'px';

  if (method === 'clip') {
    card.style.border = 'none';
    card.style.borderImage = '';
    card.style.background = `${gradient} padding-box, rgba(255,255,255,0.08) border-box`;
    card.style.border = `${borderW}px solid transparent`;
    card.style.borderRadius = radius + 'px';
    card.style.WebkitBackgroundClip = 'padding-box';
    card.style.backgroundClip = 'padding-box';
    // Corrected approach: use a wrapper technique
    card.style.background = gradient;
    card.style.WebkitBackgroundClip = 'text';
    card.style.backgroundClip = 'text';
    // Actually let's use the standard technique properly
    card.style.background = `${gradient}, rgba(255,255,255,0.08)`;
    card.style.backgroundOrigin = 'border-box';
    card.style.backgroundClip = 'padding-box, border-box';
  } else {
    card.style.border = `${borderW}px solid`;
    card.style.borderImage = `${gradient} 1`;
    card.style.background = 'rgba(255,255,255,0.08)';
    card.style.backgroundClip = '';
    card.style.backgroundOrigin = '';
  }

  if (animate) {
    card.style.animation = 'gradientBorderRotate 3s linear infinite';
    if (!document.getElementById('gradientBorderAnim')) {
      const style = document.createElement('style');
      style.id = 'gradientBorderAnim';
      style.textContent = `@keyframes gradientBorderRotate { 0% { filter: hue-rotate(0deg) } 100% { filter: hue-rotate(360deg) } }`;
      document.head.appendChild(style);
    }
  } else {
    card.style.animation = 'none';
  }

  // Generate code
  let css, html;
  if (method === 'clip') {
    css = `.gradient-border {\n  position: relative;\n  padding: ${pad}px;\n  border-radius: ${radius}px;\n  border: ${borderW}px solid transparent;\n  background:\n    ${gradient} border-box,\n    rgba(255, 255, 255, 0.08) padding-box;\n  background-origin: border-box;\n  background-clip: padding-box, border-box;${animate ? '\n  animation: gradientBorderRotate 3s linear infinite;' : ''}\n}`;
    if (animate) {
      css += `\n\n@keyframes gradientBorderRotate {\n  0% { filter: hue-rotate(0deg); }\n  100% { filter: hue-rotate(360deg); }\n}`;
    }
  } else {
    css = `.gradient-border {\n  padding: ${pad}px;\n  border: ${borderW}px solid;\n  border-image: ${gradient} 1;${animate ? '\n  animation: gradientBorderRotate 3s linear infinite;' : ''}\n}`;
    if (animate) {
      css += `\n\n@keyframes gradientBorderRotate {\n  0% { filter: hue-rotate(0deg); }\n  100% { filter: hue-rotate(360deg); }\n}`;
    }
  }
  html = `<div class="gradient-border">\n  Your content here\n</div>`;
  $('#codeBox').textContent = `/* CSS */\n${css}\n\n<!-- HTML -->\n${html}`;
}

function applyPreset(name) {
  const p = presets[name];
  if (!p) return;
  document.getElementById('color1').value = p.c1;
  document.getElementById('color2').value = p.c2;
  document.getElementById('color3').value = p.c3;
  document.getElementById('angleSlider').value = p.angle;
  document.getElementById('borderSlider').value = p.border;
  document.getElementById('radiusSlider').value = p.radius;
  document.getElementById('padSlider').value = p.pad;
  document.getElementById('animCheck').checked = p.animate;
  document.getElementById('angleVal').textContent = p.angle + '°';
  document.getElementById('borderVal').textContent = p.border + 'px';
  document.getElementById('radiusVal').textContent = p.radius + 'px';
  document.getElementById('padVal').textContent = p.pad + 'px';
  update();
}

$('#controls').innerHTML = `
  <label>${t('color1')}<input type="color" id="color1" value="#ff6b6b" oninput="update()"></label>
  <label>${t('color2')}<input type="color" id="color2" value="#ffd93d" oninput="update()"></label>
  <label>${t('color3')}<input type="color" id="color3" value="#ff8e53" oninput="update()"></label>
  <label>${t('angle')}: <span id="angleVal">135°</span><input type="range" id="angleSlider" min="0" max="360" value="135" oninput="document.getElementById('angleVal').textContent=this.value+'°';update()"></label>
  <label>${t('borderWidth')}: <span id="borderVal">3px</span><input type="range" id="borderSlider" min="1" max="12" value="3" oninput="document.getElementById('borderVal').textContent=this.value+'px';update()"></label>
  <label>${t('borderRadius')}: <span id="radiusVal">16px</span><input type="range" id="radiusSlider" min="0" max="50" value="16" oninput="document.getElementById('radiusVal').textContent=this.value+'px';update()"></label>
  <label>${t('padding')}: <span id="padVal">32px</span><input type="range" id="padSlider" min="8" max="64" value="32" oninput="document.getElementById('padVal').textContent=this.value+'px';update()"></label>
  <label>${t('method')}<select id="methodSelect" onchange="update()"><option value="clip">${t('methodClip')}</option><option value="image">${t('methodImage')}</option></select></label>
  <label><input type="checkbox" id="animCheck" onchange="update()"> ${t('animate')}</label>`;

$('#toolbar').innerHTML = `
  <select class="gz-select" onchange="applyPreset(this.value)">
    <option value="">${t('preset')}…</option>
    <option value="sunset">${t('presetSunset')}</option>
    <option value="ocean">${t('presetOcean')}</option>
    <option value="neon">${t('presetNeon')}</option>
    <option value="forest">${t('presetForest')}</option>
    <option value="purple">${t('presetPurple')}</option>
    <option value="gold">${t('presetGold')}</option>
  </select>
  <button class="gz-btn" onclick="copyText($('#codeBox').textContent)">${t('copyCode')}</button>`;

update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌈', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
    {icon:'🔘', href:'/css-tools/border-radius.html', name:'Border Radius'},
    {icon:'🎨', href:'/css-tools/gradient-text.html', name:'Gradient Text'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
