const { $, copyText, t } = GZ;

function parseINI(text) {
  const issues = [];
  const data = {};
  let currentSection = '_global_';
  data[currentSection] = {};
  const sectionKeyMap = {}; // track keys per section for duplicate detection

  const lines = text.split('\n');
  lines.forEach((rawLine, idx) => {
    const lineNo = idx + 1;
    const line = rawLine.trim();
    if (!line) return;
    if (line.startsWith(';') || line.startsWith('#')) return; // comment

    // Section header
    const secMatch = line.match(/^\[(.+)\]$/);
    if (secMatch) {
      const secName = secMatch[1].trim();
      if (secName === '') { issues.push({type:'err', line:lineNo, msg:'Empty section name "[]"'}); return; }
      if (/[\r\n\[\]]/.test(secName)) { issues.push({type:'err', line:lineNo, msg:`Invalid characters in section [${secName}]`}); }
      currentSection = secName;
      if (!data[currentSection]) { data[currentSection] = {}; sectionKeyMap[currentSection] = {}; }
      return;
    }

    // Key=value
    const eqIdx = line.indexOf('=');
    if (eqIdx === -1) {
      issues.push({type:'err', line:lineNo, msg:`Line is not a section, comment, or key=value: "${line.substring(0,40)}"`});
      return;
    }
    const key = line.substring(0, eqIdx).trim();
    let value = line.substring(eqIdx + 1).trim();

    if (!key) { issues.push({type:'err', line:lineNo, msg:'Empty key before "="'}); return; }
    if (/[\s=\[\]]/.test(key)) issues.push({type:'warn', line:lineNo, msg:`Key "${key}" contains whitespace or special characters`});

    // Check quotes
    if ((value.startsWith('"') && !value.endsWith('"')) || (value.startsWith("'") && !value.endsWith("''))) {
      issues.push({type:'err', line:lineNo, msg:`Unterminated quote in value: ${value}`});
    }
    // Strip quotes
    if ((value.startsWith('"') && value.endsWith('"')) || (value.startsWith("'") && value.endsWith("'"))) {
      value = value.substring(1, value.length - 1);
    }

    // Duplicate key check
    sectionKeyMap[currentSection] = sectionKeyMap[currentSection] || {};
    if (sectionKeyMap[currentSection][key]) {
      issues.push({type:'warn', line:lineNo, msg:`Duplicate key "${key}" in section [${currentSection}] — will be overwritten`});
    }
    sectionKeyMap[currentSection][key] = true;
    data[currentSection][key] = value;
  });

  // Count
  let keyCount = 0;
  const sectionNames = Object.keys(data).filter(s => s !== '_global_');
  Object.values(data).forEach(sec => keyCount += Object.keys(sec).length);

  return { data, issues, stats: { sections: sectionNames.length, keys: keyCount } };
}

function showResult(text, type='text') {
  $('#output').textContent = text;
  $('#status').innerHTML = `<span class="ie-ok">✓ ${type}</span>`;
}

function doValidate() {
  const text = $('#input').value;
  if (!text.trim()) {
    $('#output').innerHTML = `<span style="opacity:.5">${t('noInput')}</span>`;
    $('#status').innerHTML = '';
    return;
  }
  const result = parseINI(text);
  const errors = result.issues.filter(i => i.type === 'err');
  const warns = result.issues.filter(i => i.type === 'warn');

  let html = '';
  html += `<div style="margin-bottom:10px">`;
  html += `<span class="ie-stat">${t('sections')}: <b>${result.stats.sections}</b></span>`;
  html += `<span class="ie-stat">${t('keys')}: <b>${result.stats.keys}</b></span>`;
  html += `</div>`;

  if (errors.length === 0) {
    html += `<div class="ie-issue ok"><span class="ie-ok">${t('valid')}</span>${warns.length ? ` &middot; ${warns.length} warning(s)` : ''}</div>`;
  } else {
    html += `<div class="ie-issue"><span class="ie-err">✗ ${errors.length} error(s)${warns.length ? `, ${warns.length} warning(s)` : ''}</span></div>`;
  }
  result.issues.forEach(issue => {
    const cls = issue.type === 'err' ? '' : ' warn';
    const icon = issue.type === 'err' ? '✗' : '⚠';
    html += `<div class="ie-issue${cls}"><b>${icon} ${t('line')} ${issue.line}:</b> ${escapeHtml(issue.msg)}</div>`;
  });

  // Also show parsed structure preview
  html += `<div style="margin-top:14px;padding:10px;background:rgba(0,0,0,.2);border-radius:8px;font-size:.85em"><b style="color:var(--accent)">Parsed preview:</b>\n${escapeHtml(JSON.stringify(result.data, null, 2)).substring(0, 1500)}${JSON.stringify(result.data).length > 1500 ? '\n…' : ''}</div>`;

  $('#output').innerHTML = html;
  $('#status').innerHTML = errors.length
    ? `<span class="ie-err">✗ ${errors.length} error(s)</span>`
    : `<span class="ie-ok">✓ ${t('valid')}</span>`;
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toJSON() {
  const r = parseINI($('#input').value);
  if (r.issues.some(i => i.type==='err')) { $('#status').innerHTML = `<span class="ie-err">✗ Fix errors first</span>`; return; }
  // Drop _global_ if empty
  const out = {...r.data};
  if (out._global_ && Object.keys(out._global_).length === 0) delete out._global_;
  showResult(JSON.stringify(out, null, 2), t('toJson'));
}

function toProperties() {
  const r = parseINI($('#input').value);
  if (r.issues.some(i => i.type==='err')) { $('#status').innerHTML = `<span class="ie-err">✗ Fix errors first</span>`; return; }
  const lines = [];
  Object.entries(r.data).forEach(([sec, kv]) => {
    if (sec === '_global_' && Object.keys(kv).length === 0) return;
    Object.entries(kv).forEach(([k, v]) => {
      lines.push(sec === '_global_' ? `${k} = ${v}` : `${sec}.${k} = ${v}`);
    });
  });
  showResult(lines.join('\n'), t('toProps'));
}

function toYAML() {
  const r = parseINI($('#input').value);
  if (r.issues.some(i => i.type==='err')) { $('#status').innerHTML = `<span class="ie-err">✗ Fix errors first</span>`; return; }
  const out = {...r.data};
  if (out._global_ && Object.keys(out._global_).length === 0) delete out._global_;
  function yamlify(obj, indent) {
    let s = '';
    Object.entries(obj).forEach(([k, v]) => {
      if (typeof v === 'object' && v !== null && !Array.isArray(v)) {
        s += `${indent}${k}:\n`;
        s += yamlify(v, indent + '  ');
      } else {
        const needsQuote = /[:#\[\]{}&,*?|-<>=!%@`"'\n]/.test(String(v)) || v === '';
        s += `${indent}${k}: ${needsQuote ? `"${String(v).replace(/"/g,'\\"')}"` : v}\n`;
      }
    });
    return s;
  }
  showResult(yamlify(out, ''), t('toYaml'));
}
