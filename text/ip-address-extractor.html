<script>

  en: {

    extract: '提取',
    clear: '清空',
    example: '示例',
    copy: '复制全部',
    copyCsv: '复制 CSV',
    noIp: '输入中未找到 IP 地址。',
    totalFound: '共找到',
    unique: '唯一',
    ipv4: 'IPv4',
    ipv6: 'IPv6',
    private: '私有',
    public: '公网',
    occurrences: '次出现',
    step1: '粘贴包含 IP 地址的文本、服务器日志或任意内容',
    step2: '按需切换 IPv4/IPv6、去重和过滤选项',
    step3: '点击「提取」扫描并列出所有找到的 IP 地址',
    step4: '以纯列表或 CSV（IP、次数、类型）格式复制结果',
    note: '本工具使用正则查找类 IP 模式。IPv6 匹配为近似结果 — 关键场景请严格校验。',
  }
});

const { $, copyText, t } = GZ;

const RE_V4 = /\b(?:(?:25[0-5]|2[0-4]\d|1?\d?\d)\.){3}(?:25[0-5]|2[0-4]\d|1?\d?\d)\b/g;
const RE_V6 = /\b(?:(?:[0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}|(?:[0-9a-fA-F]{1,4}:){1,7}:|(?:[0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4}|(?:[0-9a-fA-F]{1,4}:){1,5}(?::[0-9a-fA-F]{1,4}){1,2}|(?:[0-9a-fA-F]{1,4}:){1,4}(?::[0-9a-fA-F]{1,4}){1,3}|(?:[0-9a-fA-F]{1,4}:){1,3}(?::[0-9a-fA-F]{1,4}){1,4}|(?:[0-9a-fA-F]{1,4}:){1,2}(?::[0-9a-fA-F]{1,4}){1,5}|[0-9a-fA-F]{1,4}:(?::[0-9a-fA-F]{1,4}){1,6}|:(?::[0-9a-fA-F]{1,4}){1,7}|::|fe80:(?::[0-9a-fA-F]{0,4}){0,4}%[0-9a-zA-Z]+|::(?:ffff(?::0{1,4})?:)?(?:(?:25[0-5]|2[0-4]\d|1?\d?\d)\.){3}(?:25[0-5]|2[0-4]\d|1?\d?\d)|(?:[0-9a-fA-F]{1,4}:){6}(?:(?:25[0-5]|2[0-4]\d|1?\d?\d)\.){3}(?:25[0-5]|2[0-4]\d|1?\d?\d))\b/g;

function isPrivateV4(ip){
  const p = ip.split('.').map(Number);
  if(p[0] === 10) return true;
  if(p[0] === 172 && p[1] >= 16 && p[1] <= 31) return true;
  if(p[0] === 192 && p[1] === 168) return true;
  if(p[0] === 127) return true;
  if(p[0] === 169 && p[1] === 254) return true;
  if(p[0] === 100 && p[1] >= 64 && p[1] <= 127) return true;
  return false;
}

function isPrivateV6(ip){
  const l = ip.toLowerCase();
  if(l === '::1') return true;
  if(l.startsWith('fc') || l.startsWith('fd')) return true;
  if(l.startsWith('fe80')) return true;
  return false;
}

let lastResults = [];

function extract(){
  const text = $('#input').value;
  if(!text.trim()){ $('#output').innerHTML=''; $('#stats').style.display='none'; return; }
  const wantV4 = $('#opt-v4').checked;
  const wantV6 = $('#opt-v6').checked;
  const dedup = $('#opt-dedup').checked;
  const hidePriv = $('#opt-hidepriv').checked;
  const showCount = $('#opt-count').checked;

  const found = [];
  if(wantV4){
    const m = text.match(RE_V4) || [];
    m.forEach(ip => {
      if(hidePriv && isPrivateV4(ip)) return;
      found.push({ip, ver: 4, priv: isPrivateV4(ip)});
    });
  }
  if(wantV6){
    const m = text.match(RE_V6) || [];
    m.forEach(ip => {
      if(hidePriv && isPrivateV6(ip)) return;
      found.push({ip, ver: 6, priv: isPrivateV6(ip)});
    });
  }

  const counts = {};
  found.forEach(r => { counts[r.ip] = (counts[r.ip] || 0) + 1; });

  let rows;
  if(dedup){
    const seen = new Set();
    rows = [];
    found.forEach(r => {
      if(!seen.has(r.ip)){ seen.add(r.ip); rows.push({...r, count: counts[r.ip]}); }
    });
  } else {
    rows = found.map(r => ({...r, count: 1}));
  }

  lastResults = rows;

  if(!rows.length){
    $('#stats').style.display = 'none';
    $('#output').innerHTML = `<div style="padding:14px;color:var(--text2);text-align:center">${t('noIp')}</div>`;
    return;
  }

  const v4Count = rows.filter(r=>r.ver===4).length;
  const v6Count = rows.filter(r=>r.ver===6).length;
  $('#stats').style.display = '';
  $('#stats').innerHTML = `
    <div class="stat"><div class="v">${found.length}</div><div class="k">${t('totalFound')}</div></div>
    <div class="stat"><div class="v">${dedup ? rows.length : found.length}</div><div class="k">${t('unique')}</div></div>
    <div class="stat"><div class="v" style="color:#61afef">${v4Count}</div><div class="k">${t('ipv4')}</div></div>
    <div class="stat"><div class="v" style="color:#c084fc">${v6Count}</div><div class="k">${t('ipv6')}</div></div>`;

  $('#output').innerHTML = rows.map(r => `
    <div class="ip-row">
      <span class="ip">${r.ip}</span>
      <span>
        <span class="ip-tag ${r.ver===4?'tag-v4':'tag-v6'}">IPv${r.ver}</span>
        ${r.priv ? `<span class="ip-tag tag-private">${t('private')}</span>` : `<span class="ip-tag" style="background:#00d67222;color:#00d672">${t('public')}</span>`}
        ${showCount && r.count > 1 ? `<span class="count-badge">${r.count} ${t('occurrences')}</span>` : ''}
      </span>
    </div>`).join('');
}

function loadExample(){
  $('#input').value = `Server access log sample:
192.168.1.10 - - [10/Jul/2026:12:00:00] "GET / HTTP/1.1" 200
203.0.113.45 - - [10/Jul/2026:12:00:01] "GET /about HTTP/1.1" 200
2001:db8::1 - - [10/Jul/2026:12:00:02] "POST /api HTTP/1.1" 201
8.8.8.8 - - [10/Jul/2026:12:00:03] "GET / HTTP/1.1" 200
fe80::1ff:fe23:4567:890a - - [10/Jul/2026:12:00:04] "GET / HTTP/1.1" 200
172.16.5.4 - - [10/Jul/2026:12:00:05] "GET /login HTTP/1.1" 200
2606:4700:4700::1111 - - [10/Jul/2026:12:00:06] "GET / HTTP/1.1" 200
192.168.1.10 - - [10/Jul/2026:12:00:07] "GET /assets/app.js HTTP/1.1" 200`;
  extract();
}

function doClear(){ $('#input').value=''; $('#output').innerHTML=''; $('#stats').style.display='none'; lastResults = []; }

function copyAll(){
  if(!lastResults.length) return;
  copyText(lastResults.map(r=>r.ip).join('\n'));
}

function copyCsv(){
  if(!lastResults.length) return;
  const csv = 'ip,version,type,count\n' + lastResults.map(r => `${r.ip},${r.ver},${r.priv?'private':'public'},${r.count}`).join('\n');
  copyText(csv);
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="extract()">${t('extract')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyAll()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyCsv()">${t('copyCsv')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

['opt-v4','opt-v6','opt-dedup','opt-hidepriv','opt-count'].forEach(id => {
  $('#'+id).addEventListener('change', extract);
});

$('#input').addEventListener('input', extract);

$('#note').textContent = t('note');

    {icon:'✉️', href:'/text/email-extractor.html', name:'Email Extractor'},
  ]
});
</script>
