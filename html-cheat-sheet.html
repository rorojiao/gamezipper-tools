const { t } = GZ;

  {id:'semantic', label:'Semantic'},
  {id:'form', label:'Forms'},
  {id:'media', label:'Media'},
  {id:'table', label:'Tables'},
  {id:'list', label:'Lists'},

const TAGS = [
  // Structure
  {tag:'<!DOCTYPE>', sec:'structure', badge:'html5', desc:'Declares the document type and HTML version.', ex:'<!DOCTYPE html>'},
  {tag:'<html>', sec:'structure', desc:'Root element of an HTML document.', ex:'<html lang="en">\n  ...\n</html>'},
  {tag:'<head>', sec:'structure', desc:'Contains metadata, links to scripts and styles.', ex:'<head>\n  <meta charset="UTF-8">\n  <title>Page</title>\n</head>'},
  {tag:'<body>', sec:'structure', desc:'Contains all visible page content.', ex:'<body>\n  <h1>Hello</h1>\n</body>'},
  {tag:'<div>', sec:'structure', desc:'Generic block-level container.', ex:'<div class="box">Content</div>'},
  {tag:'<span>', sec:'structure', desc:'Generic inline container for styling.', ex:'<span style="color:red">text</span>'},
  // Text
  {tag:'<h1>–<h6>', sec:'text', desc:'Headings from most (h1) to least (h6) important.', ex:'<h1>Main Title</h1>\n<h2>Subtitle</h2>'},
  {tag:'<p>', sec:'text', desc:'Paragraph of text.', ex:'<p>This is a paragraph.</p>'},
  {tag:'<br>', sec:'text', desc:'Line break (self-closing).', ex:'Line one<br>Line two'},
  {tag:'<hr>', sec:'text', desc:'Horizontal rule / thematic break.', ex:'<hr>'},
  {tag:'<strong>', sec:'text', desc:'Important text, rendered bold by default.', ex:'<strong>Important</strong>'},
  {tag:'<em>', sec:'text', desc:'Emphasized text, rendered italic by default.', ex:'<em>Emphasis</em>'},
  {tag:'<mark>', sec:'text', badge:'new', desc:'Highlighted/marked text.', ex:'<mark>highlighted</mark>'},
  {tag:'<small>', sec:'text', desc:'Side comment, smaller font.', ex:'<small>fine print</small>'},
  {tag:'<code>', sec:'text', desc:'Inline code snippet.', ex:'<code>console.log()</code>'},
  {tag:'<pre>', sec:'text', desc:'Preformatted text, preserves whitespace.', ex:'<pre>line1\n   line2</pre>'},
  {tag:'<blockquote>', sec:'text', desc:'Block quotation.', ex:'<blockquote>To be or not to be</blockquote>'},
  {tag:'<abbr>', sec:'text', desc:'Abbreviation with tooltip.', ex:'<abbr title="HyperText">HTML</abbr>'},
  // Semantic
  {tag:'<header>', sec:'semantic', badge:'html5', desc:'Intro section, logo, nav.', ex:'<header>\n  <nav>...</nav>\n</header>'},
  {tag:'<nav>', sec:'semantic', badge:'html5', desc:'Navigation links section.', ex:'<nav>\n  <a href="/">Home</a>\n</nav>'},
  {tag:'<main>', sec:'semantic', badge:'html5', desc:'Main content, one per page.', ex:'<main>\n  <article>...</article>\n</main>'},
  {tag:'<article>', sec:'semantic', badge:'html5', desc:'Self-contained content (post, card).', ex:'<article>\n  <h2>Title</h2>\n  <p>Body</p>\n</article>'},
  {tag:'<section>', sec:'semantic', badge:'html5', desc:'Thematic grouping with a heading.', ex:'<section>\n  <h2>Section</h2>\n</section>'},
  {tag:'<aside>', sec:'semantic', badge:'html5', desc:'Sidebar, related content.', ex:'<aside>\n  Related links\n</aside>'},
  {tag:'<footer>', sec:'semantic', badge:'html5', desc:'Footer: copyright, links.', ex:'<footer>\n  © 2026\n</footer>'},
  {tag:'<figure>', sec:'semantic', badge:'html5', desc:'Image, diagram with caption.', ex:'<figure>\n  <img src="x.jpg">\n  <figcaption>Caption</figcaption>\n</figure>'},
  {tag:'<time>', sec:'semantic', badge:'html5', desc:'Machine-readable date/time.', ex:'<time datetime="2026-01-01">Jan 1</time>'},
  // Form
  {tag:'<form>', sec:'form', desc:'Form container for user input.', ex:'<form action="/submit" method="POST">\n  ...\n</form>'},
  {tag:'<input>', sec:'form', desc:'Input control (text, email, etc.).', ex:'<input type="email" name="email" required>'},
  {tag:'<textarea>', sec:'form', desc:'Multi-line text input.', ex:'<textarea name="msg" rows="4"></textarea>'},
  {tag:'<select>', sec:'form', desc:'Dropdown selection.', ex:'<select name="color">\n  <option>Red</option>\n</select>'},
  {tag:'<button>', sec:'form', desc:'Clickable button.', ex:'<button type="submit">Send</button>'},
  {tag:'<label>', sec:'form', desc:'Caption for form control.', ex:'<label for="email">Email</label>'},
  {tag:'<fieldset>', sec:'form', desc:'Groups related form fields.', ex:'<fieldset>\n  <legend>Info</legend>\n</fieldset>'},
  // Media
  {tag:'<img>', sec:'media', desc:'Embeds an image.', ex:'<img src="photo.jpg" alt="cat" width="200">'},
  {tag:'<video>', sec:'media', badge:'html5', desc:'Embeds video with controls.', ex:'<video src="clip.mp4" controls></video>'},
  {tag:'<audio>', sec:'media', badge:'html5', desc:'Embeds audio.', ex:'<audio src="song.mp3" controls></audio>'},
  {tag:'<picture>', sec:'media', badge:'html5', desc:'Responsive image container.', ex:'<picture>\n  <source srcset="hi.jpg" media="(min-width:800px)">\n  <img src="lo.jpg">\n</picture>'},
  {tag:'<iframe>', sec:'media', desc:'Embeds another page.', ex:'<iframe src="embed.html"></iframe>'},

  {tag:'<svg>', sec:'media', desc:'Inline scalable vector graphic.', ex:'<svg width="50" height="50">\n  <circle cx="25" cy="25" r="20"/>\n</svg>'},

  {tag:'<table>', sec:'table', desc:'Tabular data container.', ex:'<table>\n  <tr><td>Cell</td></tr>\n</table>'},
  {tag:'<thead>', sec:'table', desc:'Table header rows.', ex:'<thead>\n  <tr><th>Name</th></tr>\n</thead>'},
  {tag:'<tbody>', sec:'table', desc:'Table body rows.', ex:'<tbody>\n  <tr><td>Bob</td></tr>\n</tbody>'},
  {tag:'<tr>', sec:'table', desc:'Table row.', ex:'<tr>\n  <td>A</td><td>B</td>\n</tr>'},
  {tag:'<th>', sec:'table', desc:'Table header cell.', ex:'<th scope="col">Price</th>'},
  {tag:'<td>', sec:'table', desc:'Table data cell.', ex:'<td>$9.99</td>'},
  // List
  {tag:'<ul>', sec:'list', desc:'Unordered (bulleted) list.', ex:'<ul>\n  <li>Apple</li>\n  <li>Banana</li>\n</ul>'},
  {tag:'<ol>', sec:'list', desc:'Ordered (numbered) list.', ex:'<ol>\n  <li>First</li>\n  <li>Second</li>\n</ol>'},
  {tag:'<li>', sec:'list', desc:'List item.', ex:'<li>Item text</li>'},
  {tag:'<dl>', sec:'list', desc:'Description list.', ex:'<dl>\n  <dt>Term</dt>\n  <dd>Definition</dd>\n</dl>'},
  // Meta & links
  {tag:'<meta>', sec:'meta', desc:'Metadata: charset, viewport, etc.', ex:'<meta name="viewport" content="width=device-width, initial-scale=1">'},
  {tag:'<link>', sec:'meta', desc:'Links external resources (CSS).', ex:'<link rel="stylesheet" href="style.css">'},
  {tag:'<a>', sec:'meta', desc:'Hyperlink.', ex:'<a href="https://example.com">Click</a>'},
  {tag:'<script>', sec:'meta', desc:'Embeds or links JavaScript.', ex:'<script src="app.js" defer><\/script>'},
  {tag:'<style>', sec:'meta', desc:'Inline CSS.', ex:'<style>\n  body { margin: 0; }\n</style>'},
  {tag:'<title>', sec:'meta', desc:'Document title (in head).', ex:'<title>My Page</title>'},
];

let currentSection = 'all';
let searchQuery = '';

function renderTabs() {
  document.getElementById('tabs').innerHTML = SECTIONS.map(s =>
    `<button class="${s.id === currentSection ? 'active' : ''}" onclick="setSection('${s.id}')">${s.label}</button>`
  ).join('');
}

function setSection(id) {
  currentSection = id;
  renderTabs();
  renderCards();
}

function renderCards() {
  const filtered = TAGS.filter(tag => {
    const secOk = currentSection === 'all' || tag.sec === currentSection;
    const q = searchQuery.toLowerCase();
    const qOk = !q || tag.tag.toLowerCase().includes(q) || tag.desc.toLowerCase().includes(q);
    return secOk && qOk;
  });
  if (filtered.length === 0) {
    document.getElementById('card-list').innerHTML = '<p style="text-align:center;color:var(--text2);padding:40px">No tags found</p>';
    return;
  }
  document.getElementById('card-list').innerHTML = filtered.map((tag, i) => {
    let badgeHtml = '';
    if (tag.badge === 'new') badgeHtml = ' <span class="badge badge-new">NEW</span>';
    if (tag.badge === 'html5') badgeHtml = ' <span class="badge badge-html5">HTML5</span>';
    const escaped = tag.ex.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<div class="tag-card">
      <div class="tag-name">${tag.tag}${badgeHtml}</div>
      <div class="tag-desc">${tag.desc}</div>
      <div class="tag-example"><button class="copy-btn" onclick="copyExample(this, ${i})">Copy</button><code>${escaped}</code></div>
    </div>`;
  }).join('');
  window._tagData = filtered;
}

function copyExample(btn, i) {
  const ex = window._tagData[i].ex;
  navigator.clipboard.writeText(ex).then(() => {
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderCards();
});
document.getElementById('search').placeholder = t('search');

renderTabs();
renderCards();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🔮', href:'/dev/regex-tester.html', name:'Regex Tester'},
  ]
});
