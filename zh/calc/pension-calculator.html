<div class="gz-container">

      <div class="gz-pe-field"><label id="lbl-years"></label><input type="number" id="years" min="0" step="any" value="30"></div>
      <div class="gz-pe-field"><label id="lbl-salary"></label><input type="number" id="salary" min="0" step="any" value="60000"></div>
      <div class="gz-pe-field"><label id="lbl-mult"></label><input type="number" id="mult" min="0" step="any" value="2"></div>
      <div class="gz-pe-field"><label id="lbl-normal"></label><input type="number" id="normal" min="0" step="any" value="65"></div>
      <div class="gz-pe-field"><label id="lbl-retire"></label><input type="number" id="retire" min="0" step="any" value="65"></div>
      <div class="gz-pe-field"><label id="lbl-reduction"></label><input type="number" id="reduction" min="0" step="any" value="5"></div>

      <div class="row"><span class="name" id="n-lifetime"></span><span class="val" id="out-lifetime"></span></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Pension Calculator',
    toolDesc: 'Estimate your annual and monthly retirement pension using the defined-benefit formula. Enter years of service, final (or career-average) salary, accrual multiplier, and normal vs. actual retirement age to see the early-retirement reduction, replacement rate, and lifetime payout. Free, browser-based, no signup.',
    lblYears: 'Years of service',
    lblSalary: 'Final / average salary (annual)',
    lblMult: 'Accrual multiplier (% per year)',
    lblNormal: 'Normal retirement age',
    lblRetire: 'Your retirement age',
    lblReduction: 'Reduction per year early (%)',
    calc: 'Calculate',
    clear: 'Clear',
    nAnnual: 'Estimated annual pension',
    nMonthly: 'Monthly pension',
    nBase: 'Base pension (before reduction)',
    nEarly: 'Early-retirement factor',
    nReplrate: 'Salary replacement rate',
    nLifetime: 'Lifetime payout (20-year estimate)',
    note: 'Formula: Pension = Years × Multiplier × Salary. Retiring early applies a reduction of (reduction% × years early). For example, retiring 5 years early at 5%/year reduces the pension by 25%. This is a simplified defined-benefit estimate — actual plans may cap the multiplier, apply inflation indexation, offer lump-sum commutation, or use different salary definitions. Always confirm with your scheme administrator.',
    step1: 'Enter your years of credited service and final/average salary',
    step2: 'Set the accrual multiplier (typical 1.5%-2.5%)',
    step3: 'Compare normal retirement age with your planned age',
    step4: 'Read the annual and monthly pension plus early-retirement impact',
  },
  zh: {
    toolTitle: '养老金计算器',
    toolDesc: '使用确定给付型公式估算退休后的年/月养老金。输入工龄、最终（或平均）工资、累积系数以及正常/实际退休年龄，查看提前退休扣减比例、替代率和终身给付。免费、浏览器本地运行，无需注册。',
    lblYears: '工龄（服务年限）',
    lblSalary: '最终 / 平均年薪',
    lblMult: '累积系数（每年 %）',
    lblNormal: '正常退休年龄',
    lblRetire: '你的退休年龄',
    lblReduction: '每提前一年扣减（%）',
    calc: '计算',
    clear: '清空',
    nAnnual: '估算年养老金',
    nMonthly: '月养老金',
    nBase: '基础养老金（扣减前）',
    nEarly: '提前退休系数',
    nReplrate: '工资替代率',
    nLifetime: '终身给付（20 年估算）',
    note: '公式：养老金 = 工龄 × 系数 × 工资。提前退休按（每年扣减% × 提前年数）扣减。例如提前 5 年、每年 5% 则扣减 25%。这是简化的确定给付估算 — 实际方案可能对系数设上限、进行通胀调整、提供一次性折算或采用不同工资定义。请以你的方案管理方为准。',
    step1: '输入工龄和最终/平均工资',
    step2: '设置累积系数（典型 1.5%-2.5%）',
    step3: '比较正常退休年龄和计划退休年龄',
    step4: '查看年/月养老金及提前退休影响',
  }
});

const { $, t } = GZ;

function fmt(n, prefix) {
  if (!isFinite(n)) return '—';
  const s = n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return (prefix || '') + s;
}

function calc() {
  const years = parseFloat($('#years').value);
  const salary = parseFloat($('#salary').value);
  const multPct = parseFloat($('#mult').value);
  const normalAge = parseFloat($('#normal').value);
  const retireAge = parseFloat($('#retire').value);
  const reductionPct = parseFloat($('#reduction').value);

  if (!isFinite(years) || !isFinite(salary) || !isFinite(multPct) || !isFinite(normalAge) || !isFinite(retireAge)) {
    $('#results').style.display = 'none';
    return;
  }

  const basePension = years * (multPct / 100) * salary;

  // Early/late retirement factor
  const yearsEarly = Math.max(0, normalAge - retireAge);
  const yearsLate = Math.max(0, retireAge - normalAge);
  // Simple model: early reduces by reduction% per year; late increases by ~7%/year (illustrative)
  let factor;
  let earlyText;
  if (yearsEarly > 0) {
    factor = Math.max(0, 1 - (reductionPct / 100) * yearsEarly);
    earlyText = `−${fmt(reductionPct * yearsEarly)}% (${yearsEarly}y early)`;
  } else if (yearsLate > 0) {
    factor = 1 + 0.07 * yearsLate;
    earlyText = `+${fmt(7 * yearsLate)}% (${yearsLate}y late, illustrative)`;
  } else {
    factor = 1;
    earlyText = 'On time (100%)';
  }

  const annual = basePension * factor;
  const monthly = annual / 12;
  const replRate = salary > 0 ? (annual / salary) * 100 : 0;
  const lifetime = annual * 20;

  $('#out-annual').textContent = fmt(annual, '$');
  $('#out-monthly').textContent = fmt(monthly, '$');
  $('#out-base').textContent = fmt(basePension, '$');
  $('#out-early').textContent = earlyText;
  $('#out-replrate').textContent = fmt(replRate) + '%';
  $('#out-lifetime').textContent = fmt(lifetime, '$');
  $('#n-annual').textContent = t('nAnnual');
  $('#n-monthly').textContent = t('nMonthly');
  $('#n-base').textContent = t('nBase');
  $('#n-early').textContent = t('nEarly');
  $('#n-replrate').textContent = t('nReplrate');
  $('#n-lifetime').textContent = t('nLifetime');

  $('#results').style.display = 'block';
}

['years','salary','mult','normal','retire','reduction'].forEach(id => $('#' + id).addEventListener('input', calc));

['lbl-years','lbl-salary','lbl-mult','lbl-normal','lbl-retire','lbl-reduction'].forEach((id, i) => {
  $('#' + id).textContent = t(['lblYears','lblSalary','lblMult','lblNormal','lblRetire','lblReduction'][i]);
});
$('#note').textContent = t('note');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calc')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="['years','salary','mult'].forEach(id=>document.getElementById(id).value='0');calc()">${t('clear')}</button>`;

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💎', href:'/calc/retirement-calculator.html', name:'Retirement'},
    {icon:'🏦', href:'/calc/401k-calculator.html', name:'401(k)'},
    {icon:'📈', href:'/calc/compound-interest-calculator.html', name:'Compound Interest'},
    {icon:'💵', href:'/calc/salary-calculator.html', name:'Salary'},
  ]
});
</script>
