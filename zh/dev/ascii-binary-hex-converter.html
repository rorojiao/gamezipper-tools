<script>
GZI18n.register({
  en: {
    toolTitle: 'ASCII / Binary / Hex Converter',
    toolDesc: 'Convert between ASCII text, binary, hexadecimal, octal and decimal representations instantly.',
    separator: 'Separator:',
    example: 'Example',
    clear: 'Clear',
    copy: 'Copy',
    step1: 'Type or paste text in any field (ASCII, Binary, Hex, Octal, or Decimal)',
    step2: 'All other fields update automatically with converted values',
    step3: 'Choose a separator format (space, comma, or none)',
    step4: 'Click Copy on any field to copy the result',
  },
  zh: {
    toolTitle: 'ASCII / 二进制 / 十六进制转换器',
    toolDesc: '在 ASCII 文本、二进制、十六进制、八进制和十进制之间即时转换。',
    separator: '分隔符：',
    example: '示例',
    clear: '清空',
    copy: '复制',
    step1: '在任意字段中输入或粘贴文本（ASCII、二进制、十六进制、八进制或十进制）',
    step2: '所有其他字段自动更新为转换后的值',
    step3: '选择分隔符格式（空格、逗号或无）',
    step4: '点击任意字段的「复制」按钮复制结果',
  }
});

const { $, copyText, t } = GZ;
let activeField = null;

function getSep() { return $('#sep-select').value; }

function asciiToArrays(text) {
  const chars = [...text];
  return {
    binary: chars.map(c => c.charCodeAt(0).toString(2).padStart(8, '0')),
    hex: chars.map(c => c.charCodeAt(0).toString(16).toUpperCase().padStart(2, '0')),
    octal: chars.map(c => c.charCodeAt(0).toString(8).padStart(3, '0')),
    decimal: chars.map(c => c.charCodeAt(0).toString(10)),
  };
}

function arraysToAscii(arr, base) {
  return arr.map(v => String.fromCharCode(parseInt(v, base))).join('');
}

function parseDelimited(text, base) {
  if (!text.trim()) return [];
  const sep = getSep();
  if (sep) return text.split(sep).map(s => s.trim()).filter(Boolean);
  // no separator: fixed-width chunks
  const width = base === 2 ? 8 : base === 16 ? 2 : base === 8 ? 3 : 0;
  if (width > 0) { const r = []; for (let i = 0; i < text.length; i += width) r.push(text.slice(i, i + width)); return r.filter(Boolean); }
  return text.split(/\s+/).filter(Boolean);
}

function convertFrom(field) {
  activeField = field;
  const sep = getSep();
  let ascii = '';
  try {
    if (field === 'ascii') {
      ascii = $('#ascii-in').value;
    } else if (field === 'binary') {
      const arr = parseDelimited($('#binary-in').value, 2);
      ascii = arraysToAscii(arr, 2);
    } else if (field === 'hex') {
      const arr = parseDelimited($('#hex-in').value, 16);
      ascii = arraysToAscii(arr, 16);
    } else if (field === 'octal') {
      const arr = parseDelimited($('#octal-in').value, 8);
      ascii = arraysToAscii(arr, 8);
    } else if (field === 'decimal') {
      const arr = parseDelimited($('#decimal-in').value, 10);
      ascii = arraysToAscii(arr, 10);
    }
  } catch(e) { return; }
  if (!ascii && field !== 'ascii') return;
  const conv = asciiToArrays(ascii);
  if (field !== 'ascii') $('#ascii-in').value = ascii;
  if (field !== 'binary') $('#binary-in').value = conv.binary.join(sep || '');
  if (field !== 'hex') $('#hex-in').value = conv.hex.join(sep || '');
  if (field !== 'octal') $('#octal-in').value = conv.octal.join(sep || '');
  if (field !== 'decimal') $('#decimal-in').value = conv.decimal.join(sep || '');
}

['ascii-in','binary-in','hex-in','octal-in','decimal-in'].forEach(id => {
  const field = id.replace('-in','');
  $('#' + id).addEventListener('input', () => convertFrom(field));
});
$('#sep-select').addEventListener('change', () => { if (activeField) convertFrom(activeField); });

function loadExample() {
  $('#ascii-in').value = 'GameZipper';
  convertFrom('ascii');
}

function doClear() {
  ['ascii-in','binary-in','hex-in','octal-in','decimal-in'].forEach(id => $('#' + id).value = '');
  activeField = null;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

  ]
});
</script>
