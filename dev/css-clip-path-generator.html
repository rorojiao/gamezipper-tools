<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Clip Path Generator',
    toolDesc: 'Visually crop elements into triangles, stars, hexagons, rhombuses, arrows and more. Drag polygon handles on the canvas, then copy the clip-path CSS in one click.',
    shapes: 'Shapes', polygonPoints: 'Polygon points', addPoint: '+ Add point', removePoint: '✕',
    step1: 'Pick a preset shape — triangle, hexagon, star, arrow, message and more.',
    step2: 'Drag the white handles on the canvas to fine-tune each polygon vertex.',
    step3: 'Add or remove points to make a fully custom polygon.',
    step4: 'Click Copy to grab the ready-to-paste CSS clip-path property.',
  },
  zh: {
    toolTitle: 'CSS 裁剪路径生成器',
    toolDesc: '可视化裁剪元素 — 三角形、星形、六边形、菱形、箭头等。拖动画布上的白色锚点，一键复制 clip-path CSS 代码。',
    shapes: '形状', polygonPoints: '多边形顶点', addPoint: '+ 添加顶点', removePoint: '✕',
    step1: '选择预设形状 — 三角形、六边形、星形、箭头、对话框等。',
    step2: '在画布上拖动白色锚点，精细调整每个多边形顶点。',
    step3: '添加或删除顶点，制作完全自定义的多边形。',
    step4: '点击「复制」即可获取可直接粘贴的 CSS clip-path 属性。',
  }
});

const { $, copyText, t } = GZ;

// Each preset: name + array of [x%, y%]
const PRESETS = {
  rectangle: { label: { en:'Rectangle', zh:'矩形' }, pts: [[0,0],[100,0],[100,100],[0,100]] },
  triangle: { label: { en:'Triangle', zh:'三角形' }, pts: [[50,0],[100,100],[0,100]] },
  trapezoid: { label: { en:'Trapezoid', zh:'梯形' }, pts: [[25,0],[75,0],[100,100],[0,100]] },
  parallelogram: { label: { en:'Parallelogram', zh:'平行四边形' }, pts: [[25,0],[100,0],[75,100],[0,100]] },
  rhombus: { label: { en:'Rhombus', zh:'菱形' }, pts: [[50,0],[100,50],[50,100],[0,50]] },
  pentagon: { label: { en:'Pentagon', zh:'五边形' }, pts: [[50,0],[100,38],[82,100],[18,100],[0,38]] },
  hexagon: { label: { en:'Hexagon', zh:'六边形' }, pts: [[25,0],[75,0],[100,50],[75,100],[25,100],[0,50]] },
  heptagon: { label: { en:'Heptagon', zh:'七边形' }, pts: [[50,0],[90,25],[100,68],[75,100],[25,100],[0,68],[10,25]] },
  octagon: { label: { en:'Octagon', zh:'八边形' }, pts: [[30,0],[70,0],[100,30],[100,70],[70,100],[30,100],[0,70],[0,30]] },
  star: { label: { en:'Star', zh:'星形' }, pts: [[50,0],[61,35],[98,35],[68,57],[79,91],[50,70],[21,91],[32,57],[2,35],[39,35]] },
  arrow: { label: { en:'Arrow', zh:'箭头' }, pts: [[0,30],[60,30],[60,0],[100,50],[60,100],[60,70],[0,70]] },
  message: { label: { en:'Message', zh:'对话框' }, pts: [[0,0],[100,0],[100,70],[70,70],[55,100],[50,70],[0,70]] },
  cross: { label: { en:'Cross', zh:'十字' }, pts: [[35,0],[65,0],[65,35],[100,35],[100,65],[65,65],[65,100],[35,100],[35,65],[0,65],[0,35],[35,35]] },
  close: { label: { en:'Close (X)', zh:'关闭' }, pts: [[20,0],[50,30],[80,0],[100,20],[70,50],[100,80],[80,100],[50,70],[20,100],[0,80],[30,50],[0,20]] },
  chevron: { label: { en:'Chevron', zh:'V 形' }, pts: [[0,0],[75,0],[100,50],[75,100],[0,100],[25,50]] },
  rtriangle: { label: { en:'Right Tri', zh:'直角三角形' }, pts: [[0,0],[100,0],[0,100]] },
};

let points = JSON.parse(JSON.stringify(PRESETS.hexagon.pts));
let activePreset = 'hexagon';
const lang = GZI18n.getLang();

function svgShape(pts, size=34) {
  const d = pts.map(p => `${(p[0]/100*size).toFixed(1)},${(p[1]/100*size).toFixed(1)}`).join(' ');
  return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg"><polygon points="${d}" fill="#4ecdc4"/></svg>`;
}

function buildCSS() {
  const poly = points.map(p => `${p[0]}% ${p[1]}%`).join(', ');
  return `clip-path: polygon(${poly});`;
}

function render() {
  $('#shape').style.clipPath = `polygon(${points.map(p => `${p[0]}% ${p[1]}%`).join(', ')})`;
  $('#code').textContent = buildCSS();
  renderHandles();
  renderPoints();
}

function renderHandles() {
  // remove old
  document.querySelectorAll('.cp-handle').forEach(h => h.remove());
  const wrap = $('#canvasWrap');
  const size = 280;
  points.forEach((p, i) => {
    const h = document.createElement('div');
    h.className = 'cp-handle';
    h.style.left = (p[0]/100*size) + 'px';
    h.style.top = (p[1]/100*size) + 'px';
    h.title = `Point ${i+1}`;
    h.addEventListener('pointerdown', e => startDrag(e, i));
    wrap.appendChild(h);
  });
}

function renderPoints() {
  $('#points').innerHTML = points.map((p, i) => `
    <div class="cp-point-row">
      <span style="font-weight:700;color:var(--accent)">${i+1}</span>
      <input type="number" value="${p[0]}" min="0" max="100" step="0.5" oninput="updatePt(${i},0,this.value)">
      <input type="number" value="${p[1]}" min="0" max="100" step="0.5" oninput="updatePt(${i},1,this.value)">
    </div>`).join('');
}

function updatePt(i, axis, val) {
  points[i][axis] = Math.max(0, Math.min(100, parseFloat(val) || 0));
  render();
}

function addPoint() {
  const n = points.length;
  if (n >= 30) return;
  // add midpoint between last and first
  const last = points[n-1], first = points[0];
  points.push([(last[0]+first[0])/2, (last[1]+first[1])/2]);
  activePreset = null;
  document.querySelectorAll('.cp-presets button').forEach(b => b.classList.remove('active'));
  render();
}

function removePoint(i) {
  if (points.length <= 3) return;
  points.splice(i, 1);
  activePreset = null;
  document.querySelectorAll('.cp-presets button').forEach(b => b.classList.remove('active'));
  render();
}

function applyPreset(name) {
  points = JSON.parse(JSON.stringify(PRESETS[name].pts));
  activePreset = name;
  document.querySelectorAll('.cp-presets button').forEach((b, idx) => {
    b.classList.toggle('active', b.dataset.preset === name);
  });
  render();
}

// Drag handling
let dragIdx = -1;
function startDrag(e, idx) {
  e.preventDefault();
  dragIdx = idx;
  e.target.classList.add('dragging');
  e.target.setPointerCapture(e.pointerId);
  e.target.addEventListener('pointermove', onDrag);
  e.target.addEventListener('pointerup', endDrag);
}
function onDrag(e) {
  if (dragIdx < 0) return;
  const wrap = $('#canvasWrap');
  const rect = wrap.getBoundingClientRect();
  const x = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
  const y = Math.max(0, Math.min(100, ((e.clientY - rect.top) / rect.height) * 100));
  points[dragIdx] = [+x.toFixed(2), +y.toFixed(2)];
  activePreset = null;
  document.querySelectorAll('.cp-presets button').forEach(b => b.classList.remove('active'));
  render();
}
function endDrag(e) {
  e.target.classList.remove('dragging');
  e.target.removeEventListener('pointermove', onDrag);
  e.target.removeEventListener('pointerup', endDrag);
  dragIdx = -1;
}

// Build preset buttons
$('#presets').innerHTML = Object.keys(PRESETS).map(name => `
  <button data-preset="${name}" onclick="applyPreset('${name}')" class="${name===activePreset?'active':''}">
    ${svgShape(PRESETS[name].pts)}
    <span>${PRESETS[name].label[lang]}</span>
  </button>`).join('');

$('#presetsTitle').textContent = t('shapes');
$('#pointsTitle').textContent = t('polygonPoints');
$('#addPointBtn').textContent = t('addPoint');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#code').textContent)">${t('copy')}</button>`;

render();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌫️', href:'/dev/css-filter-generator.html', name:'CSS Filter'},
    {icon:'📐', href:'/dev/css-units.html', name:'CSS Units'},
    {icon:'✨', href:'/dev/css-minifier.html', name:'CSS Minifier'},
    {icon:'🎨', href:'/color/palette.html', name:'Palette'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
