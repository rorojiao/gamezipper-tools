<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="tw-section">
      <h3>🎨 Custom Colors</h3>
      <div id="colorRows"></div>
      <button class="gz-btn gz-btn-secondary" style="font-size:.78rem;padding:4px 10px;margin-top:4px" onclick="addColor()">+ Add Color</button>
    </div>
    <div class="tw-config">
      <div class="tw-section">
        <h3>📐 Breakpoints</h3>
        <label>sm</label><input type="text" id="bp-sm" value="640px">
        <label>md</label><input type="text" id="bp-md" value="768px">
        <label>lg</label><input type="text" id="bp-lg" value="1024px">
        <label>xl</label><input type="text" id="bp-xl" value="1280px">
        <label>2xl</label><input type="text" id="bp-2xl" value="1536px">
      </div>
      <div class="tw-section">
        <h3>🔧 Options</h3>
        <div class="tw-check"><input type="checkbox" id="opt-dark" checked> <label for="opt-dark" style="margin:0">darkMode: 'class'</label></div>
        <div class="tw-check"><input type="checkbox" id="opt-preflight" checked> <label for="opt-preflight" style="margin:0">Enable Preflight (CSS reset)</label></div>
        <div class="tw-check"><input type="checkbox" id="opt-container" checked> <label for="opt-container" style="margin:0">Custom Container</label></div>
        <label>Container Center</label><input type="text" id="con-padding" value="1rem">
      </div>
    </div>
    <div class="tw-config">
      <div class="tw-section">
        <h3>🔤 Custom Fonts</h3>
        <label>sans</label><input type="text" id="f-sans" value="Inter, system-ui, sans-serif">
        <label>serif</label><input type="text" id="f-serif" value="Georgia, serif">
        <label>mono</label><input type="text" id="f-mono" value="'Fira Code', monospace">
      </div>
      <div class="tw-section">
        <h3>📏 Content Paths</h3>
        <label>Glob patterns (one per line)</label>
        <textarea id="contentPaths" spellcheck="false" style="min-height:90px;font-size:.8rem">./src/**/*.{html,js,jsx,ts,tsx,vue}
./pages/**/*.{html,js,jsx}</textarea>
      </div>
    </div>
    <div><label style="font-size:.85rem;color:var(--text3)">Generated tailwind.config.js</label></div>
    <div><textarea id="codeArea" spellcheck="false" readonly></textarea></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Tailwind Config Generator',
    toolDesc: 'Generate tailwind.config.js files visually. Set custom colors, fonts, breakpoints, dark mode and content paths. Copy production-ready config.',
    copy: 'Copy Config',
    step1: 'Add custom named colors (primary, secondary, brand...)',
    step2: 'Set breakpoints, fonts and container options',
    step3: 'Toggle dark mode, preflight and content paths',
    step4: 'Copy the generated tailwind.config.js into your project',
  },
  zh: {
    toolTitle: 'Tailwind 配置生成器',
    toolDesc: '可视化生成 tailwind.config.js 文件。设置自定义颜色、字体、断点、暗黑模式和内容路径。复制即可使用。',
    copy: '复制配置',
    step1: '添加自定义命名颜色（primary、secondary、brand...）',
    step2: '设置断点、字体和容器选项',
    step3: '切换暗黑模式、Preflight 重置和内容路径',
    step4: '将生成的 tailwind.config.js 复制到你的项目',
  }
});

const { $, copyText, t } = GZ;
let colors = [
  { name: 'primary', value: '#3b82f6' },
  { name: 'secondary', value: '#8b5cf6' },
  { name: 'accent', value: '#ec4899' },
];

function renderColors() {
  $('#colorRows').innerHTML = colors.map((c, i) =>
    `<div class="tw-color-row">
      <input type="color" value="${c.value}" oninput="colors[${i}].value=this.value;gen()">
      <input type="text" value="${c.name}" oninput="colors[${i}].name=this.value.replace(/[^a-z0-9-]/gi,'');gen()">
      <input type="text" value="${c.value}" oninput="colors[${i}].value=this.value;gen()">
      <button onclick="colors.splice(${i},1);renderColors();gen()">✕</button>
    </div>`
  ).join('');
}

function addColor() {
  colors.push({ name: 'color' + colors.length, value: '#6b7280' });
  renderColors();
  gen();
}

function gen() {
  const colorObj = {};
  colors.forEach(c => { if (c.name) colorObj[c.name] = c.value; });

  const bps = {};
  ['sm','md','lg','xl','2xl'].forEach(bp => { const v = $('#bp-'+bp).value.trim(); if (v) bps[bp] = v; });

  const fonts = {};
  const fsans = $('#f-sans').value.trim(), fserif = $('#f-serif').value.trim(), fmono = $('#f-mono').value.trim();
  if (fsans) fonts.sans = fsans.split(',').map(s => s.trim());
  if (fserif) fonts.serif = fserif.split(',').map(s => s.trim());
  if (fmono) fonts.mono = fmono.split(',').map(s => s.trim());

  const paths = $('#contentPaths').value.trim().split('\n').map(s => s.trim()).filter(Boolean);
  const dark = $('#opt-dark').checked ? "'class'" : "'media'";
  const preflight = $('#opt-preflight').checked;
  const useContainer = $('#opt-container').checked;
  const conPad = $('#con-padding').value.trim();

  let config = `/** @type {import('tailwindcss').Config} */
module.exports = {
  content: [`;
  config += paths.map(p => `\n    '${p}'`).join(',');
  config += `\n  ],
  darkMode: ${dark},`;

  if (Object.keys(colorObj).length || Object.keys(bps).length || Object.keys(fonts).length || useContainer) {
    config += `\n  theme: {`;
    if (Object.keys(colorObj).length) {
      config += `\n    extend: {\n      colors: ${JSON.stringify(colorObj, null, 8).replace(/\n/g, '\n      ')}`;
      if (Object.keys(fonts).length) config += `,\n      fontFamily: ${JSON.stringify(fonts, null, 8).replace(/\n/g, '\n      ')}`;
      config += `\n    },`;
    }
    if (Object.keys(bps).length) config += `\n    screens: ${JSON.stringify(bps, null, 6).replace(/\n/g, '\n    ')},`;
    if (useContainer && conPad) config += `\n    container: {\n      center: true,\n      padding: '${conPad}',\n    },`;
    config += `\n  },`;
  }

  config += `\n  corePlugins: {
    preflight: ${preflight},
  },
  plugins: [],
}`;
  $('#codeArea').value = config;
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="copyText($('#codeArea').value)">${t('copy')}</button>`;

['bp-sm','bp-md','bp-lg','bp-xl','bp-2xl','f-sans','f-serif','f-mono','contentPaths','con-padding'].forEach(id => {
  const el = $('#' + id);
  if (el) el.oninput = gen;
});
['opt-dark','opt-preflight','opt-container'].forEach(id => {
  $('#' + id).onchange = gen;
});

renderColors();
gen();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/css-tools/tailwind-playground.html', name:'Tailwind Playground'},
    {icon:'🌈', href:'/css-tools/tailwind-color-generator.html', name:'Tailwind Colors'},
    {icon:'📐', href:'/css-tools/flexbox.html', name:'Flexbox Gen'},
    {icon:'🔄', href:'/css-tools/css-to-tailwind.html', name:'CSS to Tailwind'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
