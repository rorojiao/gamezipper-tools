<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is screen resolution?", "acceptedAnswer": {"@type": "Answer", "text": "Screen resolution is the number of pixels displayed on your screen horizontally and vertically. For example, 1920x1080 means 1920 pixels wide and 1080 pixels tall."}}, {"@type": "Question", "name": "What is device pixel ratio (DPR)?", "acceptedAnswer": {"@type": "Answer", "text": "DPR is the ratio between physical pixels and CSS pixels. A DPR of 2 means one CSS pixel uses a 2x2 grid of physical pixels, common on Retina and high-DPI displays."}}, {"@type": "Question", "name": "What is the difference between screen and viewport?", "acceptedAnswer": {"@type": "Answer", "text": "Screen resolution is the total display size in pixels. Viewport is the visible area of the web page inside the browser window, which is smaller due to browser chrome, toolbars, and scrollbars."}}, {"@type": "Question", "name": "Can I test responsive breakpoints with this tool?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The tool shows your current viewport size and common breakpoint ranges so you can see which responsive layout tier your screen falls into."}}]}</script>

  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Screen Resolution Tester',
    toolDesc: 'Check your screen resolution, viewport size, device pixel ratio, color depth and responsive breakpoints instantly.',
    screenRes: 'Screen Resolution',
    viewport: 'Viewport Size',
    dpr: 'Device Pixel Ratio',
    physicalRes: 'Physical Pixels',
    breakpoints: 'Responsive Breakpoints',
    details: 'Display Details',
    colorDepth: 'Color Depth',
    pixelDepth: 'Pixel Depth',
    orientation: 'Orientation',
    touchSupport: 'Touch Support',
    cookies: 'Cookies Enabled',
    online: 'Online Status',
    yes: 'Yes',
    no: 'No',
    active: '← active',
    step1: 'Open the tool — it automatically detects your screen info',
    step2: 'Review screen resolution, viewport and DPR at a glance',
    step3: 'Check which responsive breakpoint tier is active',
    step4: 'Resize your browser window to see values update live',
  },
  zh: {
    toolTitle: '屏幕分辨率测试',
    toolDesc: '即时检查屏幕分辨率、视口大小、设备像素比、色深和响应式断点。',
    screenRes: '屏幕分辨率',
    viewport: '视口大小',
    dpr: '设备像素比',
    physicalRes: '物理像素',
    breakpoints: '响应式断点',
    details: '显示详情',
    colorDepth: '色深',
    pixelDepth: '像素深度',
    orientation: '屏幕方向',
    touchSupport: '触控支持',
    cookies: 'Cookie 支持',
    online: '网络状态',
    yes: '是',
    no: '否',
    active: '← 当前',
    step1: '打开工具——自动检测屏幕信息',
    step2: '一目了然查看屏幕分辨率、视口和像素比',
    step3: '查看当前激活的响应式断点层级',
    step4: '调整浏览器窗口大小，数值实时更新',
  }
});

const { $, t } = GZ;

function update() {
  const sw = screen.width, sh = screen.height;
  const vw = window.innerWidth, vh = window.innerHeight;
  const dpr = window.devicePixelRatio || 1;
  const pw = Math.round(sw * dpr), ph = Math.round(sh * dpr);

  document.getElementById('main-stats').innerHTML = [
    { val: `${sw} × ${sh}`, lbl: t('screenRes') },
    { val: `${vw} × ${vh}`, lbl: t('viewport') },
    { val: dpr.toFixed(2) + 'x', lbl: t('dpr') },
    { val: `${pw} × ${ph}`, lbl: t('physicalRes') },
  ].map(c => `<div class="sr-card"><div class="val">${c.val}</div><div class="lbl">${c.lbl}</div></div>`).join('');

  // Breakpoints
  document.getElementById('breakpoints-title').textContent = t('breakpoints');
  const bps = [
    { name: 'xs', min: 0, max: 575 },
    { name: 'sm', min: 576, max: 767 },
    { name: 'md', min: 768, max: 991 },
    { name: 'lg', min: 992, max: 1199 },
    { name: 'xl', min: 1200, max: 1399 },
    { name: '2xl', min: 1400, max: 99999 },
  ];
  let bpHtml = '<div style="display:flex;gap:6px;flex-wrap:wrap">';
  for (const bp of bps) {
    const isActive = vw >= bp.min && vw <= bp.max;
    const bg = isActive ? 'var(--accent)' : 'var(--glass2)';
    const color = isActive ? '#000' : 'var(--text2)';
    bpHtml += `<span style="padding:6px 14px;border-radius:8px;background:${bg};color:${color};font-size:.8rem;font-weight:600">${bp.name} (${bp.min}${bp.max < 99999 ? '-' + bp.max : '+'}) ${isActive ? t('active') : ''}</span>`;
  }
  bpHtml += '</div>';
  document.getElementById('breakpoints').innerHTML = bpHtml;

  // Details table
  document.getElementById('details-title').textContent = t('details');
  const rows = [
    [t('colorDepth'), screen.colorDepth + ' bit'],
    [t('pixelDepth'), screen.pixelDepth + ' bit'],
    [t('orientation'), screen.orientation ? screen.orientation.type : 'N/A'],
    [t('touchSupport'), 'ontouchstart' in window ? t('yes') : t('no')],
    [t('cookies'), navigator.cookieEnabled ? t('yes') : t('no')],
    [t('online'), navigator.onLine ? t('yes') : t('no')],
  ];
  document.getElementById('details-table').innerHTML = rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('');

  // Visual
  const box = document.getElementById('visual-box');
  const inner = document.getElementById('visual-inner');
  const boxW = box.clientWidth, boxH = box.clientHeight;
  const scaleX = boxW / sw, scaleY = boxH / sh;
  const scale = Math.min(scaleX, scaleY) * 0.9;
  inner.style.width = Math.round(sw * scale) + 'px';
  inner.style.height = Math.round(sh * scale) + 'px';
  inner.textContent = `${sw}×${sh}`;
}

update();
window.addEventListener('resize', update);

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌐', href:'/dev/browser-info.html', name:'Browser Info'},
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'🌐', href:'/dev/dns-lookup.html', name:'DNS Lookup'},
    {icon:'🔧', href:'/dev/http-headers.html', name:'HTTP Headers'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
