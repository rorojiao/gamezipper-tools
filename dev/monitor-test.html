<style>
.mt-stage{position:relative;width:100%;aspect-ratio:16/9;border-radius:12px;overflow:hidden;border:1px solid var(--border);background:#000;cursor:pointer}
.mt-stage canvas{width:100%;height:100%;display:block}
.mt-hint{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.55);color:#fff;padding:5px 12px;border-radius:20px;font-size:.78rem;pointer-events:none;opacity:0;transition:opacity .3s}
.mt-stage:hover .mt-hint{opacity:1}
.mt-thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:8px;margin-top:12px}
.mt-thumb{aspect-ratio:16/9;border-radius:8px;border:2px solid transparent;cursor:pointer;overflow:hidden;position:relative;background:#000}
.mt-thumb.active{border-color:var(--accent)}
.mt-thumb canvas{width:100%;height:100%;display:block}
.mt-thumb span{position:absolute;bottom:3px;left:0;right:0;text-align:center;font-size:.62rem;color:#fff;text-shadow:0 1px 3px #000;font-weight:600}
.mt-info{margin-top:14px;padding:14px;background:var(--glass);border:1px solid var(--border);border-radius:12px;font-size:.84rem;line-height:1.6;color:var(--text2)}
.mt-info b{color:var(--text)}
.mt-fs:fullscreen{padding:0;margin:0}
.mt-fs:fullscreen .mt-stage{width:100vw;height:100vh;aspect-ratio:unset;border-radius:0;border:none}
.mt-fs:fullscreen .mt-hint{opacity:0!important}
.mt-fs:fullscreen .mt-exit{display:flex}
.mt-exit{display:none;position:fixed;top:14px;right:14px;z-index:9999;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:.85rem}
</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I test my monitor for dead pixels?", "acceptedAnswer": {"@type": "Answer", "text": "Open the tool, click Fullscreen, then step through each solid color (red, green, blue, white, black). A dead pixel shows as a permanent black dot on every color; a stuck pixel stays a fixed color (often red, green or blue) no matter the background. A bright always-on sub-pixel is stuck, not dead."}}, {"@type": "Question", "name": "What is the difference between a dead pixel and a stuck pixel?", "acceptedAnswer": {"@type": "Answer", "text": "A dead pixel is permanently off (black) because it receives no power — it usually cannot be fixed. A stuck pixel is lit in one color and can sometimes be recovered by flashing rapidly changing colors (there are dedicated stuck-pixel fixer videos). This tool helps you spot both."}}, {"@type": "Question", "name": "Why test with multiple solid colors?", "acceptedAnswer": {"@type": "Answer", "text": "Each sub-pixel (red, green, blue) is tested against its own pure color. A stuck blue sub-pixel is invisible on a blue screen but glows on red or green. White reveals any dark (dead) pixels, while black reveals stuck-on pixels and backlight bleed."}}, {"@type": "Question", "name": "Does this tool work on phones and tablets?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. It runs in any modern browser with Fullscreen API support. On mobile, tap a color to go fullscreen and swipe or tap to switch. Everything is processed locally — no images are downloaded and nothing is uploaded."}}]}</script>

<body>
<div class="gz-container mt-fs">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="mt-stage" id="stage">
      <canvas id="main-canvas"></canvas>
      <div class="mt-hint" id="hint"></div>
    </div>
    <div class="mt-thumbs" id="thumbs"></div>
    <div class="mt-info" id="info"></div>
    <div id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<button class="mt-exit" id="exit-fs" onclick="document.exitFullscreen()">✕ <span id="exit-lbl">Exit</span></button>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Monitor Test & Dead Pixel Checker',
    toolDesc: 'Test your screen for dead or stuck pixels, backlight bleed and color uniformity. Cycle through pure solid colors, a grayscale gradient and RGB color bars in fullscreen — 100% in your browser, no install.',
    btnFullscreen: 'Fullscreen', btnPrev: '◀ Prev', btnNext: 'Next ▶',
    hint: 'Click or press → / Space for next  ·  Esc to exit',
    info: '<b>How to use:</b> Click <b>Fullscreen</b>, dim the room lights, then step through each color. A dot that stays black on every color is a <b>dead pixel</b>; a pixel that stays one color is <b>stuck</b>. Pure white reveals dark pixels; pure black reveals stuck-on pixels and backlight bleed. Use the grayscale gradient to check banding and uniformity.',
    step1: 'Click Fullscreen (or tap a thumbnail) to fill the screen with the selected test.',
    step2: 'Click anywhere, press Space or the → arrow to cycle to the next color.',
    step3: 'Look closely for dots that do not match the background.',
    step4: 'Press Esc to exit fullscreen at any time.',
  },
  zh: {
    toolTitle: '显示器测试 / 坏点检测工具',
    toolDesc: '检测屏幕的坏点、亮点、漏光和色彩均匀性。在全屏下循环切换纯色、灰阶渐变和 RGB 色条 — 100% 浏览器本地运行，无需安装。',
    btnFullscreen: '全屏', btnPrev: '◀ 上一个', btnNext: '下一个 ▶',
    hint: '点击或按 → / 空格 切换下一个  ·  Esc 退出',
    info: '<b>使用方法：</b>点击「全屏」（或点缩略图），调暗室内灯光，逐一查看每种颜色。始终为黑色的点是<b>坏点</b>；始终为某色的点是<b>亮点</b>。纯白可暴露暗点；纯黑可暴露亮点和漏光。灰阶渐变用于检查色阶断层和均匀度。',
    step1: '点击「全屏」（或点缩略图）让所选测试铺满屏幕。',
    step2: '点击任意位置、按空格或 → 方向键切换下一个颜色。',
    step3: '仔细查看与背景色不一致的异常点。',
    step4: '按 Esc 可随时退出全屏。',
  }
});

const { $, t } = GZ;

// Define the test patterns
const PATTERNS = [
  {id:'white', label:'White', draw:(c,w,h)=>{const x=c.getContext('2d');x.fillStyle='#ffffff';x.fillRect(0,0,w,h);}},
  {id:'black', label:'Black', draw:(c,w,h)=>{const x=c.getContext('2d');x.fillStyle='#000000';x.fillRect(0,0,w,h);}},
  {id:'red', label:'Red', draw:(c,w,h)=>{const x=c.getContext('2d');x.fillStyle='#ff0000';x.fillRect(0,0,w,h);}},
  {id:'green', label:'Green', draw:(c,w,h)=>{const x=c.getContext('2d');x.fillStyle='#00ff00';x.fillRect(0,0,w,h);}},
  {id:'blue', label:'Blue', draw:(c,w,h)=>{const x=c.getContext('2d');x.fillStyle='#0000ff';x.fillRect(0,0,w,h);}},
  {id:'cyan', label:'Cyan', draw:(c,w,h)=>{const x=c.getContext('2d');x.fillStyle='#00ffff';x.fillRect(0,0,w,h);}},
  {id:'magenta', label:'Magenta', draw:(c,w,h)=>{const x=c.getContext('2d');x.fillStyle='#ff00ff';x.fillRect(0,0,w,h);}},
  {id:'yellow', label:'Yellow', draw:(c,w,h)=>{const x=c.getContext('2d');x.fillStyle='#ffff00';x.fillRect(0,0,w,h);}},
  {id:'gray50', label:'Gray 50%', draw:(c,w,h)=>{const x=c.getContext('2d');x.fillStyle='#808080';x.fillRect(0,0,w,h);}},
  {id:'gradient', label:'Grayscale', draw:(c,w,h)=>{const x=c.getContext('2d');const g=x.createLinearGradient(0,0,w,0);g.addColorStop(0,'#000');g.addColorStop(1,'#fff');x.fillStyle=g;x.fillRect(0,0,w,h);}},
  {id:'colorbars', label:'Color bars', draw:(c,w,h)=>{const x=c.getContext('2d');const cols=['#ffffff','#ffff00','#00ffff','#00ff00','#ff00ff','#ff0000','#0000ff','#000000'];const bw=w/cols.length;cols.forEach((col,i)=>{x.fillStyle=col;x.fillRect(i*bw,0,bw,h);});}},
];

let current = 0;

function sizeCanvas(canvas){
  const r = canvas.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  canvas.width = Math.max(1, Math.round(r.width * dpr));
  canvas.height = Math.max(1, Math.round(r.height * dpr));
  return {w:canvas.width, h:canvas.height};
}

function drawPattern(idx){
  current = (idx + PATTERNS.length) % PATTERNS.length;
  const p = PATTERNS[current];
  const main = $('#main-canvas');
  const {w,h} = sizeCanvas(main);
  p.draw(main, w, h);
  // highlight thumb
  document.querySelectorAll('.mt-thumb').forEach((th,i)=> th.classList.toggle('active', i===current));
}

function buildThumbs(){
  $('#thumbs').innerHTML = PATTERNS.map((p,i)=>`<div class="mt-thumb${i===0?' active':''}" data-i="${i}"><canvas></canvas><span>${p.label}</span></div>`).join('');
  document.querySelectorAll('.mt-thumb').forEach(th=>{
    const i = +th.dataset.i;
    const cv = th.querySelector('canvas');
    // size thumb canvas
    const r = th.getBoundingClientRect();
    cv.width = Math.max(80, Math.round(r.width||90));
    cv.height = Math.max(45, Math.round(r.height||50));
    PATTERNS[i].draw(cv, cv.width, cv.height);
    th.addEventListener('click', ()=>{ drawPattern(i); });
  });
}

function goFullscreen(){
  const el = $('#stage');
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
  if(req){ req.call(el).then(()=>drawPattern(current)).catch(()=>{}); }
}

// click stage to advance
$('#stage').addEventListener('click', ()=> drawPattern(current+1));

// keyboard
window.addEventListener('keydown', (e)=>{
  if(e.key === 'ArrowRight' || e.key === ' '){ e.preventDefault(); drawPattern(current+1); }
  else if(e.key === 'ArrowLeft'){ e.preventDefault(); drawPattern(current-1); }
});

window.addEventListener('resize', ()=> drawPattern(current));

$('#hint').textContent = t('hint');
$('#info').innerHTML = t('info');
$('#exit-lbl').textContent = 'Exit';

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="goFullscreen()">${t('btnFullscreen')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="drawPattern(current-1)">${t('btnPrev')}</button>
  <button class="gz-btn" onclick="drawPattern(current+1)">${t('btnNext')}</button>`;

buildThumbs();
// wait a tick for layout
requestAnimationFrame(()=> drawPattern(0));

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖥️', href:'/dev/screen-resolution.html', name:'Screen Resolution Detector'},
    {icon:'🌐', href:'/dev/browser-info.html', name:'Browser Info Tool'},
    {icon:'⌨️', href:'/fun/keyboard-tester.html', name:'Keyboard Tester'},
    {icon:'⚡', href:'/dev/web-vitals.html', name:'Core Web Vitals'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
