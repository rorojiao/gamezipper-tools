<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Skeleton Loader Generator',
    toolDesc: 'Generate beautiful CSS skeleton loaders for cards, lists, profiles and pages. Customize colors, animation and shape, then copy HTML + CSS instantly.',

    baseColorLabel: 'Base Color', highlightColorLabel: 'Highlight', radiusLabel: 'Radius', durationLabel: 'Duration (s)', effectLabel: 'Effect',

    tmpls: { card: '🃏 卡片', list: '📋 列表', profile: '👤 个人资料', page: '📄 页面' },
    baseColorLabel: '基础色', highlightColorLabel: '高光色', radiusLabel: '圆角', durationLabel: '动画时长 (秒)', effectLabel: '效果',
    copyHtml: '📋 复制 HTML', copyCss: '📋 复制 CSS', copyAll: '📋 全部复制',
    step1: '选择模板（卡片、列表、个人资料或页面）',
    step2: '自定义颜色、圆角、动画时长和效果',
    step3: '实时查看预览',
    step4: '一键复制 HTML 和 CSS 到你的项目',
  }
});

const { $, $$, copyText, showToast, t } = GZ;
let currentTmpl = 'card';

const HTMLS = {
  card: `<div class="sk-card">
  <div class="sk-block sk-thumb sk-anim"></div>
  <div class="sk-block sk-line sk-anim"></div>
  <div class="sk-block sk-line sk-anim"></div>
  <div class="sk-block sk-line sk-anim"></div>
</div>`,
  list: `<div class="sk-list">
  <div class="sk-row">
    <div class="sk-block sk-avatar sk-anim"></div>
    <div class="sk-content">
      <div class="sk-block sk-line sk-anim"></div>
      <div class="sk-block sk-line sk-anim"></div>
    </div>
  </div>
  <div class="sk-row">
    <div class="sk-block sk-avatar sk-anim"></div>
    <div class="sk-content">
      <div class="sk-block sk-line sk-anim"></div>
      <div class="sk-block sk-line sk-anim"></div>
    </div>
  </div>
  <div class="sk-row">
    <div class="sk-block sk-avatar sk-anim"></div>
    <div class="sk-content">
      <div class="sk-block sk-line sk-anim"></div>
      <div class="sk-block sk-line sk-anim"></div>
    </div>
  </div>
</div>`,
  profile: `<div class="sk-profile">
  <div class="sk-block sk-bigavatar sk-anim"></div>
  <div class="sk-block sk-line sk-anim"></div>
  <div class="sk-block sk-line short sk-anim"></div>
  <div class="sk-block sk-line short sk-anim"></div>
</div>`,
  page: `<div class="sk-page">
  <div class="sk-block sk-hero sk-anim"></div>
  <div class="sk-block sk-line w90 sk-anim"></div>
  <div class="sk-block sk-line w80 sk-anim"></div>
  <div class="sk-block sk-line w60 sk-anim"></div>
  <div class="sk-block sk-line w90 sk-anim"></div>
  <div class="sk-block sk-line w60 sk-anim"></div>
</div>`,
};

function buildCss() {
  const base = $('#baseColor').value;
  const hi = $('#hiColor').value;
  const r = $('#radius').value;
  const d = $('#duration').value;
  const e = $('#effect').value;
  const animName = e === 'shimmer' ? 'sk-shimmer' : 'sk-pulse';
  const anim = e === 'shimmer'
    ? `@keyframes sk-shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}\n.sk-anim{background:linear-gradient(90deg, ${base} 25%, ${hi} 50%, ${base} 75%);background-size:200% 100%;animation:${animName} ${d}s infinite}`
    : `@keyframes sk-pulse{0%,100%{opacity:1}50%{opacity:.5}}\n.sk-anim{animation:${animName} ${d}s ease-in-out infinite;background:${base}}`;
  return `.sk-card,.sk-list,.sk-profile,.sk-page{padding:14px}\n.sk-block{background:${base};border-radius:${r}px;position:relative;overflow:hidden}\n${anim}\n/* Card */\n.sk-card .sk-thumb{height:140px;border-radius:10px;margin-bottom:10px}\n.sk-card .sk-line{height:10px;margin-bottom:8px}\n.sk-card .sk-line:last-child{width:60%}\n/* List */\n.sk-list .sk-row{display:flex;gap:10px;align-items:center;padding:8px 0}\n.sk-list .sk-avatar{width:42px;height:42px;border-radius:50%;flex-shrink:0}\n.sk-list .sk-content{flex:1}\n.sk-list .sk-line{height:10px;margin-bottom:6px}\n.sk-list .sk-line:last-child{width:50%}\n/* Profile */\n.sk-profile{text-align:center}\n.sk-profile .sk-bigavatar{width:90px;height:90px;border-radius:50%;margin:0 auto 12px}\n.sk-profile .sk-line{height:12px;margin:6px auto;width:60%}\n.sk-profile .sk-line.short{width:40%}\n/* Page */\n.sk-page{width:100%;max-width:500px}\n.sk-page .sk-hero{height:120px;border-radius:10px;margin-bottom:10px}\n.sk-page .sk-line{height:10px;margin-bottom:6px}\n.sk-page .sk-line.w90{width:90%}\n.sk-page .sk-line.w80{width:80%}\n.sk-page .sk-line.w60{width:60%}`;
}

function update() {
  // Preview
  $('#preview').innerHTML = HTMLS[currentTmpl];
  // Update preview to use current base color
  const base = $('#baseColor').value;
  const hi = $('#hiColor').value;
  const r = $('#radius').value;
  const d = $('#duration').value;
  const e = $('#effect').value;
  let styleEl = document.getElementById('skLiveStyle');
  if (!styleEl) { styleEl = document.createElement('style'); styleEl.id = 'skLiveStyle'; document.head.appendChild(styleEl); }
  styleEl.textContent = `.sk-block{background:${base};border-radius:${r}px;overflow:hidden}` +
    (e==='shimmer' ? `.sk-block{background:linear-gradient(90deg,${base} 25%,${hi} 50%,${base} 75%);background-size:200% 100%;animation:sk-shimmer ${d}s infinite}` : `.sk-block{animation:sk-pulse ${d}s ease-in-out infinite;background:${base}}`);
  // Code
  $('#htmlOut').textContent = HTMLS[currentTmpl];
  $('#cssOut').textContent = buildCss();
}

function renderTabs() {
  const tmpls = t('tmpls');
  $('#tmplTabs').innerHTML = Object.entries(tmpls).map(([k,v]) =>
    `<button class="sk-tab ${k===currentTmpl?'active':''}" data-t="${k}">${v}</button>`
  ).join('');
  $$('.sk-tab').forEach(b => b.onclick = () => { currentTmpl = b.dataset.t; renderTabs(); update(); });
}

['baseColor','hiColor','radius','duration','effect'].forEach(id => $('#'+id).addEventListener('input', update));
$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#htmlOut').textContent)">${t('copyHtml')}</button>
  <button class="gz-btn" onclick="copyText($('#cssOut').textContent)">${t('copyCss')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#htmlOut').textContent+'\\n\\n'+$('#cssOut').textContent)">${t('copyAll')}</button>`;

renderTabs();
update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏳', href:'/css-tools/loader.html', name:'CSS Spinner'},
    {icon:'🔲', href:'/css-tools/box-model.html', name:'Box Model'},
    {icon:'✏️', href:'/css-tools/text-stroke.html', name:'Text Stroke'},
    {icon:'🎨', href:'/css-tools/css-filter.html', name:'CSS Filter'},
  ]
});
</script>
