<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-controls">
      <div><label id="lbl-plan"></label><select id="plan">
        <option value="thrifty" id="opt-thrifty"></option>
        <option value="low" id="opt-low"></option>
        <option value="moderate" selected id="opt-moderate"></option>
        <option value="liberal" id="opt-liberal"></option>
      </select></div>
      <div><label id="lbl-region"></label><select id="region">
        <option value="1.0" selected id="opt-us"></option>
        <option value="1.15" id="opt-expensive"></option>
        <option value="0.85" id="opt-cheap"></option>
      </select></div>
    </div>

    <div class="gz-toolbar" id="toolbar"></div>

    <div class="gz-family" id="family"></div>
    <button class="gz-add-btn" id="add-btn" onclick="addRow()"></button>

    <div class="gz-result-box" id="results" style="display:none">
      <div class="gz-result-grid">
        <div class="gz-result-item"><div class="value hero" id="res-monthly"></div><div class="label" id="res-monthly-label"></div></div>
        <div class="gz-result-item"><div class="value" id="res-weekly"></div><div class="label" id="res-weekly-label"></div></div>
        <div class="gz-result-item"><div class="value" id="res-annual"></div><div class="label" id="res-annual-label"></div></div>
        <div class="gz-result-item"><div class="value" id="res-perperson"></div><div class="label" id="res-perperson-label"></div></div>
      </div>
      <div class="gz-tip" id="tip"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Grocery Budget Calculator',
    toolDesc: 'Estimate your monthly grocery budget using USDA food-cost plans. Add each family member by age, pick a spending tier and region — see weekly, monthly and annual totals instantly.',
    plan: 'USDA Plan',
    region: 'Region Cost Factor',
    optThrifty: 'Thrifty (lowest)',
    optLow: 'Low-Cost',
    optModerate: 'Moderate-Cost',
    optLiberal: 'Liberal (highest)',
    optUS: 'Average (US baseline)',
    optExpensive: 'High-cost area (+15%)',
    optCheap: 'Low-cost area (−15%)',
    addMember: '+ Add family member',
    age: 'Age',
    role: 'Group',
    resMonthly: 'Monthly Grocery Cost',
    resWeekly: 'Weekly Cost',
    resAnnual: 'Annual Cost',
    resPerPerson: 'Per Person / Month',
    remove: '✕',
    tip: '💡 Tip: Eating out adds 30-50% to your total food spending. Cooking at home, meal planning, buying in bulk and seasonal produce can cut grocery bills 20-40%.',
    step1: 'Choose a USDA plan (Thrifty to Liberal)',
    step2: 'Adjust the region cost factor for your area',
    step3: 'Add each family member by age — kids and adults differ',
    step4: 'See weekly, monthly and annual grocery estimates instantly',
  },
  zh: {
    toolTitle: '买菜预算计算器',
    toolDesc: '使用美国农业部食品成本计划估算每月买菜预算。按年龄添加家庭成员，选择消费等级和地区 — 即时查看每周、每月和每年预算。',
    plan: 'USDA 计划',
    region: '地区成本系数',
    optThrifty: '经济型（最低）',
    optLow: '低成本型',
    optModerate: '中档型',
    optLiberal: '宽裕型（最高）',
    optUS: '平均（美国基准）',
    optExpensive: '高消费地区（+15%）',
    optCheap: '低消费地区（−15%）',
    addMember: '+ 添加家庭成员',
    age: '年龄',
    role: '分组',
    resMonthly: '每月买菜费用',
    resWeekly: '每周费用',
    resAnnual: '每年费用',
    resPerPerson: '人均/月',
    remove: '✕',
    tip: '💡 提示：外出就餐会让总食品开销增加 30-50%。在家做饭、做好用餐计划、批量采购和应季食材可降低 20-40% 的买菜费用。',
    step1: '选择 USDA 计划（经济到宽裕）',
    step2: '根据你所在的地区调整地区成本系数',
    step3: '按年龄添加每位家庭成员 — 儿童和成人不同',
    step4: '即时查看每周、每月和每年的买菜预算',
  }
});

const { $, t } = GZ;

$('#lbl-plan').textContent = t('plan');
$('#lbl-region').textContent = t('region');
$('#opt-thrifty').textContent = t('optThrifty');
$('#opt-low').textContent = t('optLow');
$('#opt-moderate').textContent = t('optModerate');
$('#opt-liberal').textContent = t('optLiberal');
$('#opt-us').textContent = t('optUS');
$('#opt-expensive').textContent = t('optExpensive');
$('#opt-cheap').textContent = t('optCheap');
$('#add-btn').textContent = t('addMember');
$('#res-monthly-label').textContent = t('resMonthly');
$('#res-weekly-label').textContent = t('resWeekly');
$('#res-annual-label').textContent = t('resAnnual');
$('#res-perperson-label').textContent = t('resPerPerson');

// USDA weekly food cost per person, by age band and plan (approx 2024 figures, USD/week)
// [thrifty, low, moderate, liberal]
const USDA = {
  // Children
  '1': [24.0, 29.0, 35.0, 41.0],
  '2': [25.0, 30.0, 36.0, 43.0],
  '3': [27.0, 32.0, 38.0, 46.0],
  '4': [28.0, 33.0, 40.0, 48.0],
  '5': [29.0, 34.0, 41.0, 50.0],
  '6': [31.0, 36.0, 44.0, 53.0],
  '7': [33.0, 39.0, 47.0, 57.0],
  '8': [35.0, 42.0, 50.0, 61.0],
  '9': [37.0, 44.0, 53.0, 65.0],
  '10': [40.0, 48.0, 57.0, 70.0],
  '11': [44.0, 52.0, 62.0, 76.0],
  // Teens
  '12': [48.0, 56.0, 67.0, 81.0],
  '13': [51.0, 59.0, 71.0, 85.0],
  '14': [54.0, 62.0, 74.0, 89.0],
  '15': [56.0, 64.0, 76.0, 91.0],
  '16': [57.0, 64.0, 77.0, 92.0],
  '17': [57.0, 64.0, 76.0, 91.0],
  '18': [57.0, 64.0, 76.0, 91.0],
  // Adults (default 19-50)
  'adult': [60.0, 70.0, 84.0, 102.0],
  'senior': [56.0, 64.0, 76.0, 91.0],  // 51-70
};

function weeklyCostFor(age, planIdx) {
  if (age <= 0) return USDA['1'][planIdx];
  if (age <= 18) {
    const row = USDA[String(age)];
    if (row) return row[planIdx];
    return USDA['18'][planIdx];
  }
  if (age >= 71) return USDA['senior'][planIdx];
  if (age >= 51) return USDA['senior'][planIdx];
  return USDA['adult'][planIdx];
}

let members = [
  { age: 35 },
  { age: 33 },
  { age: 8 },
];

function renderFamily() {
  $('#family').innerHTML = members.map((m, i) =>
    `<div class="gz-fam-row">
      <input type="number" data-i="${i}" class="age-input" value="${m.age}" min="0" max="120" step="1" placeholder="${t('age')}">
      <span class="role-label" id="role-${i}"></span>
      <button onclick="removeRow(${i})" title="${t('remove')}">${t('remove')}</button>
    </div>`
  ).join('');
  document.querySelectorAll('.age-input').forEach(el => el.addEventListener('input', e => {
    members[+e.target.dataset.i].age = Math.max(0, Math.min(120, parseInt(e.target.value) || 0));
    updateLabels();
    calc();
  }));
  updateLabels();
}

function updateLabels() {
  members.forEach((m, i) => {
    const el = $('#role-' + i);
    if (!el) return;
    let role;
    if (m.age <= 12) role = '🧒 Child';
    else if (m.age <= 18) role = '🧑 Teen';
    else if (m.age >= 65) role = '👴 Senior';
    else role = '🧑 Adult';
    el.textContent = role;
    el.style.opacity = '0.7';
    el.style.fontSize = '0.85em';
  });
}

function addRow() {
  members.push({ age: 30 });
  renderFamily();
  calc();
}

function removeRow(i) {
  if (members.length > 1) {
    members.splice(i, 1);
    renderFamily();
    calc();
  }
}

function money(n) { return '$' + n.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:2}); }

function calc() {
  const planIdx = { thrifty: 0, low: 1, moderate: 2, liberal: 3 }[$('#plan').value];
  const region = parseFloat($('#region').value);

  let weeklyTotal = 0;
  members.forEach(m => {
    weeklyTotal += weeklyCostFor(m.age, planIdx);
  });
  weeklyTotal *= region;

  // USDA weekly × 4.333 to approximate monthly
  const monthly = weeklyTotal * 4.333;
  const annual = monthly * 12;
  const perPerson = members.length ? monthly / members.length : 0;

  $('#res-monthly').textContent = money(monthly);
  $('#res-weekly').textContent = money(weeklyTotal);
  $('#res-annual').textContent = money(annual);
  $('#res-perperson').textContent = money(perPerson);
  $('#tip').textContent = t('tip');
  $('#results').style.display = 'block';
}

$('#plan').addEventListener('change', calc);
$('#region').addEventListener('change', calc);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('plan').includes('Plan') ? 'Calculate' : '计算'}</button>`;

renderFamily();
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🍽️', href:'/calc/meal-planner.html', name:'Meal Planner'},
    {icon:'💰', href:'/calc/budget-planner.html', name:'Budget Planner'},
    {icon:'🏷️', href:'/calc/unit-price.html', name:'Unit Price'},
    {icon:'🧾', href:'/calc/recipe-cost-calculator.html', name:'Recipe Cost'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
