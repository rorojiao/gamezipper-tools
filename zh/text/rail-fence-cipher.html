<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the rail fence cipher?", "acceptedAnswer": {"@type": "Answer", "text": "The rail fence cipher is a classical transposition cipher that writes the message in a zigzag pattern across multiple horizontal 'rails', then reads off each rail in sequence to produce the ciphertext. Unlike substitution ciphers, the letters themselves are unchanged — only their order is scrambled."}}, {"@type": "Question", "name": "How does the rail fence cipher work?", "acceptedAnswer": {"@type": "Answer", "text": "With 3 rails, the letters of HELLO WORLD are placed diagonally up-and-down across 3 rows (rails). The cipher then concatenates the rows. More rails create a more complex zigzag. Decryption reverses the process by reconstructing the zigzag pattern."}}, {"@type": "Question", "name": "How many rails should I use?", "acceptedAnswer": {"@type": "Answer", "text": "The number of rails is the key. 2 rails is the simplest and weakest. 3-5 rails are common in puzzles. More rails (6-10) create a more complex scramble but the message length limits how many rails are meaningful. Both sender and receiver must agree on the rail count."}}, {"@type": "Question", "name": "Is the rail fence cipher secure?", "acceptedAnswer": {"@type": "Answer", "text": "No. The rail fence cipher provides no real security by modern standards. It is easily broken by trying every possible rail count (brute force). It is used today only in education, puzzle games, escape rooms and CTF challenges to teach transposition concepts."}}]}</script>

const { $, copyText, t } = GZ;
let rails = 3, mode = 'encode', strip = true;

function railFenceEncrypt(text, numRails) {
  if (numRails < 2) return text;
  const rails = Array.from({length: numRails}, () => []);
  let r = 0, dir = 1;
  for (const ch of text) {
    rails[r].push(ch);
    if (r === 0) dir = 1;
    else if (r === numRails - 1) dir = -1;
    r += dir;
  }
  return rails.map(rail => rail.join('')).join('');
}

function railFenceDecrypt(text, numRails) {
  if (numRails < 2 || text.length === 0) return text;
  const len = text.length;
  // figure out how many chars per rail
  const counts = new Array(numRails).fill(0);
  let r = 0, dir = 1;
  for (let i = 0; i < len; i++) {
    counts[r]++;
    if (r === 0) dir = 1;
    else if (r === numRails - 1) dir = -1;
    r += dir;
  }
  // slice ciphertext into rail segments
  const segments = [];
  let idx = 0;
  for (let i = 0; i < numRails; i++) {
    segments.push(text.slice(idx, idx + counts[i]));
    idx += counts[i];
  }
  // read back in zigzag order
  const ptrs = new Array(numRails).fill(0);
  let result = '';
  r = 0, dir = 1;
  for (let i = 0; i < len; i++) {
    result += segments[r][ptrs[r]++];
    if (r === 0) dir = 1;
    else if (r === numRails - 1) dir = -1;
    r += dir;
  }
  return result;
}

function update() {
  let txt = $('#input').value;
  if (strip) txt = txt.replace(/\s+/g, '');
  const result = mode === 'encode'
    ? railFenceEncrypt(txt, rails)
    : railFenceDecrypt(txt, rails);
  $('#output').textContent = result;
}

function loadExample() {
  $('#input').value = 'MEET ME AT MIDNIGHT';
  update();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; }

$('#input').addEventListener('input', update);
