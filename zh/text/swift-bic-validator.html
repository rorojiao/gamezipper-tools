<script>
GZI18n.register({
  en: {
    toolTitle: 'SWIFT / BIC Code Validator',
    toolDesc: 'Check any SWIFT or BIC bank code for valid format and structure. Verifies length, the BANKCC[LL][bbb] pattern and ISO 3166 country code — 100% in your browser.',
    validate: 'Validate',

    branch: 'Branch',
    primaryOffice: 'Primary office (no branch)',
    errLen: 'Must be 8 or 11 characters',
    errBank: 'Bank code (first 4 chars) must be letters only',
    errCountry: 'Country code (chars 5-6) is not a valid ISO 3166-1 code',
    errLoc: 'Location code (chars 7-8) must be alphanumeric',
    errBranch: 'Branch code (chars 9-11) must be alphanumeric',
    enterCode: 'Enter a SWIFT / BIC code above',
    step1: 'Type or paste your SWIFT or BIC code',
    step2: 'Use 8 characters for the primary office or 11 for a specific branch',
    step3: 'Click Validate to check format and structure',
    step4: 'Inspect the parsed bank, country, location and branch sections',
  },
  zh: {
    toolTitle: 'SWIFT / BIC 银行代码校验器',
    toolDesc: '校验任意 SWIFT 或 BIC 银行代码的格式和结构。检查长度、BANKCC[LL][bbb] 模式和 ISO 3166 国家代码 — 100% 浏览器本地运行。',
    validate: '校验',
    clear: '清空',
    example: '示例',
    inputLbl: 'SWIFT / BIC 代码',
    valid: '有效',
    invalid: '无效',
    bank: '银行代码',
    country: '国家',
    location: '地区',
    branch: '分行',
    primaryOffice: '总行（无分行）',
    errLen: '长度必须为 8 或 11 个字符',
    errBank: '银行代码（前 4 位）必须全为字母',
    errCountry: '国家代码（第 5-6 位）不是有效的 ISO 3166-1 代码',
    errLoc: '地区代码（第 7-8 位）必须为字母或数字',
    errBranch: '分行代码（第 9-11 位）必须为字母或数字',
    enterCode: '请在上方输入 SWIFT / BIC 代码',
    step1: '输入或粘贴 SWIFT 或 BIC 代码',
    step2: '8 位表示总行，11 位表示具体分行',
    step3: '点击「校验」检查格式和结构',
    step4: '查看解析出的银行、国家、地区和分行部分',
  }
});

const { $, copyText, t } = GZ;

// Compact set of assigned ISO 3166-1 alpha-2 country codes (sufficient for SWIFT country field check).
const ISO_COUNTRIES = new Set(['AD','AE','AF','AG','AI','AL','AM','AO','AQ','AR','AS','AT','AU','AW','AX','AZ','BA','BB','BD','BE','BF','BG','BH','BI','BJ','BL','BM','BN','BO','BQ','BR','BS','BT','BV','BW','BY','BZ','CA','CC','CD','CF','CG','CH','CI','CK','CL','CM','CN','CO','CR','CU','CV','CW','CX','CY','CZ','DE','DJ','DK','DM','DO','DZ','EC','EE','EG','EH','ER','ES','ET','FI','FJ','FK','FM','FO','FR','GA','GB','GD','GE','GF','GG','GH','GI','GL','GM','GN','GP','GQ','GR','GS','GT','GU','GW','GY','HK','HM','HN','HR','HT','HU','ID','IE','IL','IM','IN','IO','IQ','IR','IS','IT','JE','JM','JO','JP','KE','KG','KH','KI','KM','KN','KP','KR','KW','KY','KZ','LA','LB','LC','LI','LK','LR','LS','LT','LU','LV','LY','MA','MC','MD','ME','MF','MG','MH','MK','ML','MM','MN','MO','MP','MQ','MR','MS','MT','MU','MV','MW','MX','MY','MZ','NA','NC','NE','NF','NG','NI','NL','NO','NP','NR','NU','NZ','OM','PA','PE','PF','PG','PH','PK','PL','PM','PN','PR','PS','PT','PW','PY','QA','RE','RO','RS','RU','RW','SA','SB','SC','SD','SE','SG','SH','SI','SJ','SK','SL','SM','SN','SO','SR','SS','ST','SV','SX','SY','SZ','TC','TD','TF','TG','TH','TJ','TK','TL','TM','TN','TO','TR','TT','TV','TW','TZ','UA','UG','UM','US','UY','UZ','VA','VC','VE','VG','VI','VN','VU','WF','WS','YE','YT','ZA','ZM','ZW']);

function validate(){
  const raw = $('#input').value.trim().toUpperCase();
  $('#result').innerHTML = '';
  if(!raw){ $('#status').innerHTML = `<span style="opacity:.6">${t('enterCode')}</span>`; return; }
  const errs = [];
  if(raw.length !== 8 && raw.length !== 11) errs.push(t('errLen'));
  else {
    const bank = raw.slice(0,4), country = raw.slice(4,6), loc = raw.slice(6,8), branch = raw.slice(8,11);
    if(!/^[A-Z]{4}$/.test(bank)) errs.push(t('errBank'));
    if(!ISO_COUNTRIES.has(country)) errs.push(t('errCountry'));
    if(!/^[A-Z0-9]{2}$/.test(loc)) errs.push(t('errLoc'));
    if(raw.length===11 && !/^[A-Z0-9]{3}$/.test(branch)) errs.push(t('errBranch'));
  }
  const ok = errs.length === 0;
  const cls = ok ? 'ok' : 'bad';
  const badge = ok ? t('valid') : t('invalid');
  const bank = raw.slice(0,4), country = raw.slice(4,6), loc = raw.slice(6,8), branch = raw.length===11 ? raw.slice(8,11) : '';
  $('#result').innerHTML = ok
    ? `<div class="gz-result ${cls}"><b>${raw}</b> <span class="gz-badge">${badge}</span>
         <div class="gz-break">
           <div class="seg"><div class="v">${bank}</div><div class="k">${t('bank')}</div></div>
           <div class="seg"><div class="v">${country}</div><div class="k">${t('country')}</div></div>
           <div class="seg"><div class="v">${loc}</div><div class="k">${t('location')}</div></div>
           <div class="seg"><div class="v">${branch || '—'}</div><div class="k">${branch ? t('branch') : t('primaryOffice')}</div></div>
         </div>
       </div>`
    : `<div class="gz-result ${cls}"><b>${raw || '—'}</b> <span class="gz-badge">${badge}</span>
         <ul style="margin:8px 0 0;padding-left:20px">${errs.map(e=>`<li>${e}</li>`).join('')}</ul>
       </div>`;
  $('#status').innerHTML = ok
    ? `<span style="color:var(--gz-success,#00d672)">✓ ${raw} ${t('valid').toLowerCase()}</span>`
    : `<span style="color:var(--gz-accent2,#ff6b6b)">✗ ${t('invalid')}</span>`;
}

function loadExample(){
  // DEUTDEFF500 = Deutsche Bank AG, Frankfurt, main branch — well-known valid 11-char BIC
  $('#input').value = 'DEUTDEFF500';
  validate();
}
function doClear(){ $('#input').value=''; $('#result').innerHTML=''; $('#status').innerHTML=''; }

$('#lbl-in').textContent = t('inputLbl');
$('#input').addEventListener('keydown', e=>{ if(e.key==='Enter') validate(); });

$('#toolbar').innerHTML =
  `<button class="gz-btn" onclick="validate()">${t('validate')}</button>`+
  `<button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>`+
  `<button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📮', href:'/text/iban-validator.html', name:'IBAN Validator'},
    {icon:'💳', href:'/dev/credit-card-validator.html', name:'Credit Card Validator'},
    {icon:'🏷️', href:'/text/routing-number-validator.html', name:'Routing Number'},
    {icon:'📚', href:'/dev/isbn-validator.html', name:'ISBN Validator'},
  ]
});
</script>
