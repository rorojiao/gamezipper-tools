const lang = GZI18n.getLang();

// Plant presets. baseMlPerCm = ml per cm of pot diameter per watering at medium light / spring-fall.
// intervalBase = days between waterings (medium light, spring/fall).
// moisture pref: 'dry' (let dry fully), 'moist' (top 2-3cm dry), 'wet' (keep moist).
const PLANTS = [

  { en:'ZZ Plant',                        zh:'金钱树',       perCm:1.6, interval:18, pref:'dry' },

  { en:'Spider Plant',                    zh:'吊兰',         perCm:3.4, interval:6,  pref:'moist' },

  { en:'Jade Plant',                      zh:'玉树',         perCm:1.8, interval:14, pref:'dry' },
  { en:'Echeveria (succulent)',           zh:'石莲花',       perCm:1.5, interval:14, pref:'dry' },
  { en:'Cactus',                          zh:'仙人掌',       perCm:1.2, interval:21, pref:'dry' },
  { en:'Fiddle Leaf Fig',                 zh:'琴叶榕',       perCm:3.4, interval:8,  pref:'moist' },
  { en:'Rubber Plant',                    zh:'橡皮树',       perCm:3.4, interval:8,  pref:'moist' },
  { en:'Dracaena',                        zh:'龙血树',       perCm:2.8, interval:10, pref:'moist' },
  { en:'Calathea',                        zh:'竹芋',         perCm:4.0, interval:5,  pref:'wet' },
  { en:'Boston Fern',                     zh:'波士顿蕨',     perCm:5.0, interval:3,  pref:'wet' },
  { en:'English Ivy',                     zh:'常春藤',       perCm:3.5, interval:6,  pref:'moist' },
  { en:'Bromeliad',                       zh:'凤梨',         perCm:3.0, interval:9,  pref:'moist' },
  { en:'African Violet',                  zh:'非洲堇',       perCm:3.5, interval:7,  pref:'moist' },
  { en:'Anthurium',                       zh:'红掌',         perCm:4.0, interval:6,  pref:'wet' },
  { en:'Ficus Elastica / Burgundy',       zh:'黑叶橡胶榕',   perCm:3.4, interval:8,  pref:'moist' },
  { en:'Croton',                          zh:'变叶木',       perCm:3.5, interval:6,  pref:'moist' },
  { en:'Dieffenbachia',                   zh:'花叶万年青',   perCm:3.4, interval:7,  pref:'moist' },
  { en:'Yucca',                           zh:'丝兰',         perCm:1.9, interval:12, pref:'dry' },
  { en:'Aglaonema (Chinese Evergreen)',   zh:'广东万年青',   perCm:3.2, interval:8,  pref:'moist' },
  { en:'Begonia',                         zh:'秋海棠',       perCm:3.6, interval:5,  pref:'moist' },
  { en:'Wandering Dude (Tradescantia)',   zh:'紫露草',       perCm:3.6, interval:6,  pref:'moist' },
  { en:'String of Pearls',                zh:'珍珠吊兰',     perCm:1.6, interval:14, pref:'dry' },
  { en:'String of Hearts',                zh:'百万心',       perCm:1.7, interval:12, pref:'dry' },
  { en:'Hoya',                            zh:'球兰',         perCm:2.0, interval:10, pref:'dry' },
  { en:'Maranta (Prayer Plant)',          zh:'祈祷草',       perCm:4.2, interval:5,  pref:'wet' },
  { en:'Polka Dot Plant',                 zh:'嫣红蔓',       perCm:3.4, interval:5,  pref:'wet' },
  { en:'Pilea Peperomioides',             zh:'镜面草',       perCm:3.4, interval:7,  pref:'moist' },
  { en:'Nerve Plant (Fittonia)',          zh:'网纹草',       perCm:3.8, interval:4,  pref:'wet' },
  { en:'Staghorn Fern',                   zh:'鹿角蕨',       perCm:3.6, interval:6,  pref:'moist' },
  { en:'Bird of Paradise',                zh:'天堂鸟',       perCm:4.0, interval:7,  pref:'moist' },
  { en:'Schefflera (Umbrella)',           zh:'鹅掌柴',       perCm:3.4, interval:8,  pref:'moist' },
  { en:'Chinese Money Plant',             zh:'铜钱草',       perCm:3.6, interval:6,  pref:'moist' },
  { en:'Air Plant (Tillandsia)',          zh:'空气凤梨',     perCm:1.5, interval:7,  pref:'moist' },
  { en:'Lucky Bamboo',                    zh:'富贵竹',       perCm:4.0, interval:5,  pref:'wet' },
  { en:'Palm (Parlor / Areca)',           zh:'棕榈',         perCm:3.6, interval:7,  pref:'moist' },
  { en:'Orchid (Phalaenopsis)',           zh:'蝴蝶兰',       perCm:2.4, interval:10, pref:'dry' },
  { en:'Herbs (Basil / Mint)',            zh:'香草 (罗勒)',  perCm:4.4, interval:3,  pref:'wet' },
  { en:'Tomato (in pot)',                 zh:'盆栽番茄',     perCm:5.0, interval:2,  pref:'wet' },
  { en:'Citrus (lemon in pot)',           zh:'盆栽柑橘',     perCm:4.4, interval:4,  pref:'moist' },
  { en:'Bonsai (general)',                zh:'盆景',         perCm:3.4, interval:4,  pref:'moist' },
  { en:'Dumb Cane',                       zh:'万年青',       perCm:3.4, interval:7,  pref:'moist' },
  { en:'Cast-Iron Plant',                 zh:'蜘蛛抱蛋',     perCm:2.6, interval:12, pref:'moist' },
  { en:'Kalanchoe',                       zh:'长寿花',       perCm:1.8, interval:13, pref:'dry' },
  { en:'Peperomia',                       zh:'草胡椒',       perCm:2.6, interval:9,  pref:'dry' },
  { en:'Moth Orchid',                     zh:'文心兰',       perCm:2.6, interval:9,  pref:'dry' },
];

const LIGHT_FACTOR = { low:0.85, med:1.0, high:1.18 };
const SEASON_FACTOR = { summer:0.75, shoulder:1.0, winter:1.4 }; // multiplier on interval (winter = wait longer)
const SEASON_ML = { summer:1.15, shoulder:1.0, winter:0.85 };

function fillPlants() {
  document.getElementById('plant').innerHTML = PLANTS.map((p,i) => `<option value="${i}">${lang==='zh'?p.zh:p.en}</option>`).join('');
}

function fmtMl(ml) {
  if (ml >= 1000) return (ml/1000).toFixed(2) + ' L';
  return Math.round(ml) + ' ml';
}

function render() {
  const p = PLANTS[+document.getElementById('plant').value];
  const potIn = +document.getElementById('pot').value;
  const potCm = potIn * 2.54;
  const light = document.querySelector('[data-light].active').dataset.light;
  const season = document.querySelector('[data-season].active').dataset.season;
  // base amount
  let ml = p.perCm * potCm * LIGHT_FACTOR[light] * SEASON_ML[season];
  ml = Math.max(30, ml);
  // interval
  let interval = Math.round(p.interval * SEASON_FACTOR[season] / LIGHT_FACTOR[light]);
  interval = Math.max(2, interval);

  const perWeek = 7 / interval;
  const weeklyTotal = ml * perWeek;

  // Build a 14-day schedule preview
  const today = new Date();
  let sched = '';
  const daysEn = ['S','M','T','W','T','F','S'];
  const daysZh = ['日','一','二','三','四','五','六'];
  const days = lang==='zh'?daysZh:daysEn;
  for (let i = 0; i < 14; i++) {
    const water = (i % interval) === 0;
    const d = new Date(today); d.setDate(today.getDate() + i);
    sched += `<div class="day${water?' water':''}"><div>${days[d.getDay()]}</div><span>${d.getMonth()+1}/${d.getDate()}</span></div>`;
  }

  const prefEn = p.pref==='dry' ? 'Let the soil dry out fully between waterings' : p.pref==='moist' ? 'Allow the top 2–3 cm of soil to dry, then water' : 'Keep the soil lightly moist at all times';
  const prefZh = p.pref==='dry' ? '让土壤完全干透后再浇' : p.pref==='moist' ? '土壤上层 2-3cm 干了再浇' : '保持土壤始终微湿';

  const tipEn = `<b>${p.en}:</b> ${prefEn}. Water slowly until a little drains from the bottom — empty the saucer after 15 minutes so the roots don't sit in water. Always use room-temperature water and check the soil with your finger before each watering, since pot material, humidity and airflow all change the actual rate.`;
  const tipZh = `<b>${p.zh}：</b> ${prefZh}。缓慢浇水直到盆底有少量水流出 — 15 分钟后倒掉托盘里的积水，避免根部泡水。建议使用室温的水，每次浇水前用手指检查土壤，因为花盆材质、湿度和通风都会影响实际需水量。`;

  const html = `
  <div class="pw-big">
    <div class="amt">${fmtMl(ml)}</div>
    <div class="cap">${lang==='zh'?'每次浇水量':'Water per watering'}</div>
  </div>
  <div class="pw-grid">
    <div class="pw-card"><div class="lbl">${lang==='zh'?'浇水间隔':'Water every'}</div><div class="val">${interval} ${lang==='zh'?'天':'days'}</div><div class="sub">${lang==='zh'?'约':''}${perWeek.toFixed(1)} ${lang==='zh'?'次/周':'×/week'}</div></div>
    <div class="pw-card"><div class="lbl">${lang==='zh'?'每周总水量':'Weekly total'}</div><div class="val">${fmtMl(weeklyTotal)}</div><div class="sub">${lang==='zh'?'两周':'2 weeks'} = ${fmtMl(weeklyTotal*2)}</div></div>
  </div>
  <div style="margin-top:14px;font-size:.85rem;color:var(--text2);font-weight:600">${lang==='zh'?'未来 14 天浇水日历':'Next 14-day watering schedule'} (${lang==='zh'?'绿色=浇水':'green=water'}):</div>
  <div class="pw-sched">${sched}</div>
  <div class="pw-tip">${lang==='zh'?tipZh:tipEn}</div>
  `;
  document.getElementById('result').innerHTML = html;
}

function setupLabels() {
  document.getElementById('lbl-plant').textContent = t('lblPlant');
  document.getElementById('lbl-pot').textContent = t('lblPot');
  document.getElementById('lbl-light').textContent = t('lblLight');
  document.getElementById('lbl-season').textContent = t('lblSeason');
  document.getElementById('btn-low').textContent = t('lightLow');
  document.getElementById('btn-med').textContent = t('lightMed');
  document.getElementById('btn-high').textContent = t('lightHigh');
  document.getElementById('btn-sum').textContent = t('seasonSum');
  document.getElementById('btn-sho').textContent = t('seasonSho');
  document.getElementById('btn-win').textContent = t('seasonWin');
}

fillPlants();
setupLabels();

document.getElementById('plant').addEventListener('change', render);
document.getElementById('pot').addEventListener('change', render);

document.querySelectorAll('[data-light]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-light]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});
document.querySelectorAll('[data-season]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-season]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

render();

GZ.renderToolPage({
  category: 'calc',

  descKey: 'toolDesc',
