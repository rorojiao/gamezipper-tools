.face.f4{background:rgba(97,175,239,.55);transform:rotateY(-90deg) translateZ(80px)}
.face.f5{background:rgba(209,154,102,.55);transform:rotateX(90deg) translateZ(80px)}
.face.f6{background:rgba(180,120,220,.55);transform:rotateX(-90deg) translateZ(80px)}
.code-out{background:#0d0d1a;border:1px solid var(--border);border-radius:10px;padding:14px;font-family:monospace;font-size:.82em;color:#a5d6ff;white-space:pre-wrap;word-break:break-all;min-height:120px;line-height:1.5}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a CSS 3D transform?","acceptedAnswer":{"@type":"Answer","text":"A CSS 3D transform uses the transform property with functions like rotateX, rotateY, rotateZ, translateZ and perspective to position and rotate elements in 3D space inside the browser using the GPU."}},{"@type":"Question","name":"Why is perspective important?","acceptedAnswer":{"@type":"Answer","text":"Perspective sets the distance of the viewer from the z=0 plane and controls how strongly 3D depth is foreshortened. A smaller perspective value makes objects look more dramatic; a larger value looks flatter. It must be set on the parent of the transformed element."}},{"@type":"Question","name":"Why do I need transform-style: preserve-3d?","acceptedAnswer":{"@type":"Answer","text":"transform-style: preserve-3d tells the browser to render children of an element in the same 3D space rather than flattening them. Without it, the six faces of a cube would not sit in a shared 3D scene."}},{"@type":"Question","name":"Can I copy the generated CSS?","acceptedAnswer":{"@type":"Answer","text":"Yes. Click Copy to put the full transform, transform-style and perspective rules on your clipboard, ready to paste into your stylesheet. Adjust any slider and the code updates instantly."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS 3D Transform Generator',
    toolDesc: 'Generate CSS 3D transforms visually with rotateX, rotateY, rotateZ, perspective, translateZ and scale, plus a live rotating cube preview.',
    rotateX: 'Rotate X',
    rotateY: 'Rotate Y',
    rotateZ: 'Rotate Z',
    perspective: 'Perspective',
    translateZ: 'Translate Z',
    scale: 'Scale',
    copy: 'Copy CSS',
    reset: 'Reset',
    spin: 'Auto-spin',
    stop: 'Stop spin',
    preserve3d: 'preserve-3d',
    backface: 'Show backface',
    copied: '✓ Copied',
    step1: 'Drag the sliders to rotate and position the cube',
    step2: 'Adjust perspective to control depth foreshortening',
    step3: 'Toggle preserve-3d and backface visibility',
    step4: 'Click Copy to grab the generated CSS for your project',
  },
  zh: {
    toolTitle: 'CSS 3D 变换生成器',
    toolDesc: '可视化生成 CSS 3D 变换 — 旋转 X/Y/Z、透视、Z 轴位移和缩放，带实时旋转立方体预览。',
    rotateX: 'X 轴旋转',
    rotateY: 'Y 轴旋转',
    rotateZ: 'Z 轴旋转',
    perspective: '透视距离',
    translateZ: 'Z 轴位移',
    scale: '缩放',
    copy: '复制 CSS',
    reset: '重置',
    spin: '自动旋转',
    stop: '停止旋转',
    preserve3d: 'preserve-3d',
    backface: '显示背面',
    copied: '✓ 已复制',
    step1: '拖动滑块旋转和定位立方体',
    step2: '调整透视距离控制深度透视',
    step3: '切换 preserve-3d 和背面可见性',
    step4: '点击「复制」获取生成的 CSS 代码',
  }
});

const { $, copyText, t } = GZ;

const state = { rx: -20, ry: 30, rz: 0, persp: 800, tz: 0, scale: 1, preserve: true, backface: true, spin: false };

const sliders = [
  { key: 'rx', labelKey: 'rotateX', min: -180, max: 180, step: 1, suffix: '°' },
  { key: 'ry', labelKey: 'rotateY', min: -180, max: 180, step: 1, suffix: '°' },
  { key: 'rz', labelKey: 'rotateZ', min: -180, max: 180, step: 1, suffix: '°' },
  { key: 'persp', labelKey: 'perspective', min: 200, max: 2000, step: 10, suffix: 'px' },
  { key: 'tz', labelKey: 'translateZ', min: -200, max: 200, step: 1, suffix: 'px' },
  { key: 'scale', labelKey: 'scale', min: 0.3, max: 2, step: 0.05, suffix: 'x' },
];

const presets = {
  isometric: { rx: -30, ry: 45, rz: 0, persp: 1000, tz: 0, scale: 1 },
  hero: { rx: 15, ry: -25, rz: 0, persp: 600, tz: 0, scale: 1.1 },
  card: { rx: 10, ry: -15, rz: 0, persp: 800, tz: 30, scale: 1 },
  flat: { rx: 0, ry: 0, rz: 0, persp: 800, tz: 0, scale: 1 },
  dramatic: { rx: -45, ry: 60, rz: 15, persp: 400, tz: 0, scale: 1.2 },
};

function fmtVal(key) {
  const v = state[key];
  const s = sliders.find(x => x.key === key);
  if (!s) return v;
  if (s.suffix === 'x') return v.toFixed(2) + s.suffix;
  if (s.suffix === 'px') return v + s.suffix;
  return v + s.suffix;
}

function applyPreset(name) {
  Object.assign(state, presets[name]);
  buildControls();
  render();
}

function buildControls() {
  $('#controls').innerHTML = sliders.map(s => `
    <div class="ctrl">
      <label>${t(s.labelKey)}</label>
      <input type="range" id="r-${s.key}" min="${s.min}" max="${s.max}" step="${s.step}" value="${state[s.key]}" oninput="state['${s.key}']=+this.value;render();this.nextElementSibling.textContent=fmtVal('${s.key}')">
      <span class="val" id="v-${s.key}">${fmtVal(s.key)}</span>
    </div>`).join('');
  $('#opts').innerHTML = `
    <label><input type="checkbox" ${state.preserve?'checked':''} onchange="state.preserve=this.checked;render()"> ${t('preserve3d')}</label>
    <label><input type="checkbox" ${state.backface?'checked':''} onchange="state.backface=this.checked;render()"> ${t('backface')}</label>`;
}

function render() {
  const cube = $('#cube');
  const scene = $('.scene');
  if (scene) scene.style.perspective = state.persp + 'px';
  const transform = `rotateX(${state.rx}deg) rotateY(${state.ry}deg) rotateZ(${state.rz}deg) translateZ(${state.tz}px) scale(${state.scale})`;
  cube.style.transform = transform;
  cube.style.transformStyle = state.preserve ? 'preserve-3d' : 'flat';
  document.querySelectorAll('.face').forEach(f => f.style.backfaceVisibility = state.backface ? 'visible' : 'hidden');

  $('#code').textContent = `.scene {\n  perspective: ${state.persp}px;\n  perspective-origin: center;\n}\n\n.cube {\n  transform-style: ${state.preserve ? 'preserve-3d' : 'flat'};\n  backface-visibility: ${state.backface ? 'visible' : 'hidden'};\n  transform: ${transform};\n}`;
}

window.state = state;
window.fmtVal = fmtVal;

let spinRAF = null, spinAng = 0;
function spin() {
  state.spin = !state.spin;
  if (state.spin) {
    const btn = $('#spin-btn');
    if (btn) btn.textContent = t('stop');
    const loop = () => {
      if (!state.spin) return;
      spinAng = (spinAng + 0.6) % 360;
      state.ry = Math.round(spinAng);
      const ryEl = $('#r-ry'); if (ryEl) { ryEl.value = state.ry; $('#v-ry').textContent = fmtVal('ry'); }
      render();
      spinRAF = requestAnimationFrame(loop);
    };
    loop();
  } else {
    if (spinRAF) cancelAnimationFrame(spinRAF);
    const btn = $('#spin-btn');
    if (btn) btn.textContent = t('spin');
  }
}

window.spin = spin;
window.applyPreset = applyPreset;

$('#presets').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="applyPreset('isometric')">📐 Isometric</button>
  <button class="gz-btn gz-btn-secondary" onclick="applyPreset('hero')">🎬 Hero</button>
  <button class="gz-btn gz-btn-secondary" onclick="applyPreset('card')">💳 Card</button>
  <button class="gz-btn gz-btn-secondary" onclick="applyPreset('dramatic')">⚡ Dramatic</button>
  <button class="gz-btn gz-btn-secondary" onclick="applyPreset('flat')">⬜ Flat</button>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="copy-btn" onclick="copyText($('#code').textContent);this.textContent='${t('copied')}';setTimeout(()=>this.textContent='${t('copy')}',1200)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" id="spin-btn" onclick="spin()">${t('spin')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="applyPreset('flat')">${t('reset')}</button>`;

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎭', href:'/css-tools/transform.html', name:'2D Transform'},
    {icon:'🌈', href:'/css-tools/gradient.html', name:'Gradient'},
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
    
  ]
});

buildControls();
render();
</script>
