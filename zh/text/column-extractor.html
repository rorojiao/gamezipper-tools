    extract: '提取',

    columns: '列',
    outputDelim: '输出分隔符',
    hasHeader: '首行为表头',
    comma: '逗号 (,)',
    tab: '制表符',
    pipe: '管道符 (|)',
    semicolon: '分号 (;)',
    space: '空格',
    custom: '自定义',
    colPlaceholder: '例如 1,3,5 或 姓名,邮箱',
    rowsExtracted: '行已提取',
    step1: '将分隔文本粘贴到输入区',
    step2: '设置输入分隔符和列序号或列名',
    step3: '点击「提取」提取选中的列',
    step4: '复制或下载结果，可选输出分隔符',
  }
});

const { $, copyText, t } = GZ;

let inputDelim = ',';
let outputDelim = ',';

function getDelimValue(selectId) {
  const sel = $(sel => sel.querySelector ? document.querySelector(`#${selectId}`) : null);
  const el = document.getElementById(selectId);
  if (!el) return ',';
  if (el.value === 'tab') return '\t';
  if (el.value === 'custom') {
    const c = document.getElementById(selectId + '-custom');
    return c ? c.value || ',' : ',';
  }
  return el.value;
}

function parseLine(line, delim) {
  if (delim === '\t') return line.split('\t');
  if (delim === ',' ) {
    // Simple CSV parser respecting quotes
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (inQuotes) {
        if (ch === '"' && line[i+1] === '"') { current += '"'; i++; }
        else if (ch === '"') { inQuotes = false; }
        else { current += ch; }
      } else {
        if (ch === '"') { inQuotes = true; }
        else if (ch === delim) { result.push(current.trim()); current = ''; }
        else { current += ch; }
      }
    }
    result.push(current.trim());
    return result;
  }
  return line.split(delim);
}

function doExtract() {
  const inp = $('#input').value;
  if (!inp.trim()) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }

  const inputDelimEl = document.getElementById('input-delim');
  let inDelim = ',';
  if (inputDelimEl) {
    if (inputDelimEl.value === 'tab') inDelim = '\t';
    else if (inputDelimEl.value === 'custom') {
      const c = document.getElementById('input-delim-custom');
      inDelim = c ? c.value || ',' : ',';
    } else inDelim = inputDelimEl.value;
  }

  const outDelimEl = document.getElementById('output-delim');
  let outDelim = inDelim;
  if (outDelimEl) {
    if (outDelimEl.value === 'tab') outDelim = '\t';
    else if (outDelimEl.value === 'custom') {
      const c = document.getElementById('output-delim-custom');
      outDelim = c ? c.value || inDelim : inDelim;
    } else if (outDelimEl.value === 'same') outDelim = inDelim;
    else outDelim = outDelimEl.value;
  }

  const colSpec = document.getElementById('col-spec').value.trim();
  const hasHeader = document.getElementById('has-header').checked;
  const lines = inp.split('\n').filter(l => l.trim());
  if (!lines.length) return;

  const header = parseLine(lines[0], inDelim);
  let colIndices = [];

  if (hasHeader && colSpec && isNaN(parseInt(colSpec.split(',')[0].trim()))) {
    // By name
    const names = colSpec.split(',').map(s => s.trim().toLowerCase());
    for (const name of names) {
      const idx = header.findIndex(h => h.toLowerCase() === name);
      if (idx >= 0) colIndices.push(idx);
    }
  } else {
    // By number (1-indexed)
    colIndices = colSpec.split(',').map(s => parseInt(s.trim()) - 1).filter(n => !isNaN(n) && n >= 0);
  }

  if (!colIndices.length) { $('#output').textContent = 'No valid columns specified'; return; }

  const result = lines.map((line, lineIdx) => {
    const cols = parseLine(line, inDelim);
    const extracted = colIndices.map(i => cols[i] !== undefined ? cols[i] : '');
    return extracted.join(outDelim);
  });

  const output = result.join('\n');
  $('#output').textContent = output;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${result.length} ${t('rowsExtracted')}</span> &nbsp;|&nbsp; ${colIndices.length}/${header.length} columns`;
}

function loadExample() {
  $('#input').value = `Name,Email,Department,Salary,City
Alice Johnson,alice@example.com,Engineering,95000,New York
Bob Smith,bob@example.com,Marketing,72000,Los Angeles
Carol White,carol@example.com,Engineering,88000,Chicago
David Brown,david@example.com,Sales,68000,Boston
Eve Davis,eve@example.com,Marketing,76000,Seattle`;
  document.getElementById('input-delim').value = ',';
  document.getElementById('output-delim').value = 'same';
  document.getElementById('col-spec').value = 'Name,Department';
  document.getElementById('has-header').checked = true;
  doExtract();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

// Build options
$('#options').innerHTML = `
  <label style="display:inline-flex;align-items:center;gap:4px">${t('delimiter')}:
    <select id="input-delim" class="gz-input-sm" style="width:auto;padding:2px 6px" onchange="doExtract()">
      <option value=",">${t('comma')}</option>
      <option value="tab">${t('tab')}</option>
      <option value="|">${t('pipe')}</option>
      <option value=";">${t('semicolon')}</option>
      <option value=" ">${t('space')}</option>
    </select>
  </label>
  <label style="display:inline-flex;align-items:center;gap:4px">${t('outputDelim')}:
    <select id="output-delim" class="gz-input-sm" style="width:auto;padding:2px 6px" onchange="doExtract()">
      <option value="same">Same</option>
      <option value=",">${t('comma')}</option>
      <option value="tab">${t('tab')}</option>
      <option value="|">${t('pipe')}</option>
      <option value=";">${t('semicolon')}</option>
    </select>
  </label>
  <label style="display:inline-flex;align-items:center;gap:4px">${t('columns')}:
    <input type="text" id="col-spec" class="gz-input-sm" style="width:180px" placeholder="${t('colPlaceholder')}" oninput="doExtract()">
  </label>
  <label style="display:inline-flex;align-items:center;gap:4px;cursor:pointer">
    <input type="checkbox" id="has-header" checked onchange="doExtract()"> ${t('hasHeader')}
  </label>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doExtract()">${t('extract')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
