<script>
GZI18n.register({
  en: {
    toolTitle: 'Dependabot Config Generator',
    toolDesc: 'Generate a .github/dependabot.yml file for automated dependency updates. Multiple ecosystems (npm, pip, bundler, docker, github-actions), schedule, reviewers, labels, open PR limit, commit prefix — copy or download. Free, browser-only.',
    addEco: '+ Add Ecosystem',
    remove: 'Remove',
    eco: 'Ecosystem', dir: 'Directory / path', sched: 'Schedule', day: 'Day', interval: 'Interval', revs: 'Reviewers', labels: 'Labels', limit: 'Open PR limit', prefix: 'Commit prefix', allow: 'Allow', ignore: 'Ignore',
    daily: 'daily', weekly: 'weekly', monthly: 'monthly',
    monday: 'monday', tuesday: 'tuesday', wednesday: 'wednesday', thursday: 'thursday', friday: 'friday', saturday: 'saturday', sunday: 'sunday',
    outLabel: 'Generated .github/dependabot.yml',
    copy: 'Copy YAML', download: 'Download .yml',
    note: '💡 Save as .github/dependabot.yml in your repo root. Dependabot will read it on push and start opening PRs. Add multiple ecosystems for monorepos — one update block per manifest.',
    s1: 'Click + Add Ecosystem to add npm, pip, docker, github-actions, etc.',
    s2: 'Set the directory where the manifest lives (default /)',
    s3: 'Choose interval (daily/weekly/monthly) and optionally a specific day',
    s4: 'Add reviewers, labels, open PR limit and copy the YAML',
    rGitignore: '.gitignore', rGhActions: 'GitHub Actions', rDocker: 'Dockerfile', rK8s: 'Kubernetes YAML', rEnv: '.env Generator', rChangelog: 'Changelog'
  },
  zh: {
    toolTitle: 'Dependabot 配置生成器',
    toolDesc: '生成 .github/dependabot.yml 文件，用于自动依赖更新。支持多个生态系统（npm、pip、bundler、docker、github-actions）、计划、审阅者、标签、PR 上限、commit 前缀 — 一键复制或下载。免费，浏览器本地运行。',
    addEco: '+ 添加生态系统',
    remove: '移除',
    eco: '生态系统', dir: '目录 / 路径', sched: '计划', day: '星期', interval: '间隔', revs: '审阅者', labels: '标签', limit: 'PR 上限', prefix: 'Commit 前缀', allow: '允许', ignore: '忽略',
    daily: '每天', weekly: '每周', monthly: '每月',
    monday: '周一', tuesday: '周二', wednesday: '周三', thursday: '周四', friday: '周五', saturday: '周六', sunday: '周日',
    outLabel: '生成的 .github/dependabot.yml',
    copy: '复制 YAML', download: '下载 .yml',
    note: '💡 保存为 .github/dependabot.yml 放在仓库根目录。Dependabot 会在 push 时读取并开始创建 PR。monorepo 可添加多个生态系统 — 每个 manifest 一个 update 块。',
    s1: '点击「+ 添加生态系统」添加 npm、pip、docker、github-actions 等',
    s2: '设置 manifest 所在目录（默认 /）',
    s3: '选择间隔（每天/每周/每月）并可选具体星期',
    s4: '添加审阅者、标签、PR 上限，然后复制 YAML',
    rGitignore: '.gitignore', rGhActions: 'GitHub Actions', rDocker: 'Dockerfile', rK8s: 'Kubernetes YAML', rEnv: '.env 生成器', rChangelog: 'Changelog'
  }
});

const { $, copyText, t } = GZ;

const ECO_OPTIONS=['npm','pip','bundler','composer','cargo','maven','gradle','go-modules','nuget','docker','github-actions','terraform','mix','pub','swift','gitsubmodule'];
const DAYS=['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];

let ecosystems=[
  {eco:'npm',dir:'/',interval:'weekly',day:'monday',revs:['my-org/team-frontend'],labels:['dependencies','npm'],limit:10,prefix:'deps:'}
];

function esc(s){return(s||'').replace(/</g,'&lt;');}

function renderEcos(){
  $('#ecos').innerHTML=ecosystems.map((e,i)=>`
    <div class="eco-block">
      <h3>Ecosystem ${i+1} ${ecosystems.length>1?`<button class="rm" onclick="removeEco(${i})">${t('remove')}</button>`:''}</h3>
      <div class="fld"><label>${t('eco')}</label>
        <select data-i="${i}" data-f="eco">${ECO_OPTIONS.map(o=>`<option value="${o}" ${e.eco===o?'selected':''}>${o}</option>`).join('')}</select>
      </div>
      <div class="fld"><label>${t('dir')}</label><input type="text" data-i="${i}" data-f="dir" value="${esc(e.dir)}"></div>
      <div class="fld"><label>${t('interval')}</label>
        <select data-i="${i}" data-f="interval">
          <option value="daily" ${e.interval==='daily'?'selected':''}>${t('daily')}</option>
          <option value="weekly" ${e.interval==='weekly'?'selected':''}>${t('weekly')}</option>
          <option value="monthly" ${e.interval==='monthly'?'selected':''}>${t('monthly')}</option>
        </select>
      </div>
      <div class="fld"><label>${t('day')}</label>
        <select data-i="${i}" data-f="day">
          ${DAYS.map(d=>`<option value="${d}" ${e.day===d?'selected':''}>${t(d)}</option>`).join('')}
        </select>
      </div>
      <div class="fld"><label>${t('revs')}</label>
        <div class="chips" id="revs-${i}"></div>
      </div>
      <div class="fld"><label>${t('labels')}</label>
        <div class="chips" id="labels-${i}"></div>
      </div>
      <div class="fld"><label>${t('limit')}</label><input type="number" data-i="${i}" data-f="limit" value="${e.limit}" min="0" max="100"></div>
      <div class="fld"><label>${t('prefix')}</label><input type="text" data-i="${i}" data-f="prefix" value="${esc(e.prefix)}"></div>
    </div>`).join('');

  // bind inputs
  document.querySelectorAll('#ecos [data-f]').forEach(el=>{
    const handler=()=>{
      const i=+el.dataset.i,f=el.dataset.f;
      ecosystems[i][f]=el.value;
      generate();
    };
    el.oninput=handler;el.onchange=handler;
  });
  // render chips
  ecosystems.forEach((e,i)=>{
    renderChipList('revs-'+i,e.revs,i,'revs');
    renderChipList('labels-'+i,e.labels,i,'labels');
  });

  // add-eco footer button
  let f=$('#ecos').querySelector('.add-footer');
  if(!f){f=document.createElement('div');f.className='add-footer';f.style.marginTop='.4rem';$('#ecos').appendChild(f);}
  f.innerHTML=`<button class="gz-btn" style="font-size:.85rem" onclick="addEco()">${t('addEco')}</button>`;
}

function renderChipList(id,arr,ei,field){
  const c=$('#'+id);
  c.innerHTML=arr.map((v,j)=>`<span class="chip">${esc(v)}<span class="x" onclick="removeChip(${ei},'${field}',${j})">✕</span></span>`).join('')+
    `<input type="text" class="chip-input" placeholder="${field==='revs'?'reviewer/team…':'label…'}" onkeydown="chipKey(event,${ei},'${field}')">`;
  const inp=c.querySelector('.chip-input');
  inp.onblur=()=>{if(inp.value.trim()){ecosystems[ei][field].push(inp.value.trim());renderEcos();generate();}};
}
function removeChip(ei,field,j){ecosystems[ei][field].splice(j,1);renderEcos();generate();}
function chipKey(e,ei,field){
  if(e.key==='Enter'||e.key===','){
    e.preventDefault();
    const v=e.target.value.trim().replace(/,$/,'');
    if(v){ecosystems[ei][field].push(v);renderEcos();generate();}
  }
}
function addEco(){ecosystems.push({eco:'pip',dir:'/',interval:'weekly',day:'monday',revs:[],labels:['dependencies'],limit:5,prefix:'deps:'});renderEcos();generate();}
function removeEco(i){ecosystems.splice(i,1);renderEcos();generate();}

function yArr(arr){return arr.map(v=>'      - '+JSON.stringify(v)).join('\n');}

function generate(){
  const out=['version: 2','updates:'];
  ecosystems.forEach(e=>{
    out.push('- package-ecosystem: '+JSON.stringify(e.eco));
    out.push('  directory: '+JSON.stringify(e.dir));
    out.push('  schedule:');
    out.push('    interval: '+e.interval+(e.interval==='weekly'?'':''));
    if(e.interval==='weekly'&&e.day)out.push('    day: '+e.day);
    if(e.revs.length){out.push('  reviewers:');out.push(yArr(e.revs));}
    if(e.labels.length){out.push('  labels:');out.push(yArr(e.labels));}
    if(e.limit){out.push('  open-pull-requests-limit: '+e.limit);}
    if(e.prefix)out.push('  commit-message:\n    prefix: '+JSON.stringify(e.prefix));
  });
  $('#output').textContent=out.join('\n');
}

function downloadYml(){
  const blob=new Blob([$('#output').textContent],{type:'text/yaml'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='dependabot.yml';
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
}

$('#outLabel').textContent=t('outLabel');
$('#note').textContent=t('note');
$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadYml()">${t('download')}</button>`;

renderEcos();
generate();

GZ.renderToolPage({
  category:'dev',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['s1','s2','s3','s4'],
  related:[
    {icon:'🚫',href:'/dev/gitignore-generator.html',nameKey:'rGitignore'},
    {icon:'⚙️',href:'/dev/github-actions-generator.html',nameKey:'rGhActions'},
    {icon:'🐳',href:'/dev/dockerfile-generator.html',nameKey:'rDocker'},
    {icon:'☸️',href:'/dev/kubernetes-yaml.html',nameKey:'rK8s'},
    {icon:'🔐',href:'/dev/env-generator.html',nameKey:'rEnv'},
    {icon:'📋',href:'/dev/changelog-generator.html',nameKey:'rChangelog'}
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
