// Mulberry32 seeded RNG
function makeRng(seedStr) {
  let s = 0;
  if (seedStr) for (let i = 0; i < seedStr.length; i++) s = (s * 31 + seedStr.charCodeAt(i)) >>> 0;
  return function() {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

let rng = makeRng('');
function pick(arr) { return arr[Math.floor(rng() * arr.length)]; }
function int(min, max) { return Math.floor(rng() * (max - min + 1)) + min; }
function uuid() {
  const hex = '0123456789abcdef';
  let s = '';
  for (let i = 0; i < 36; i++) {
    if (i===8||i===13||i===18||i===23) s += '-';
    else if (i===14) s += '4';
    else if (i===19) s += hex[(Math.floor(rng()*4)+8)];
    else s += hex[Math.floor(rng()*16)];
  }
  return s;
}
function loremWord() {
  const w = ['lorem','ipsum','dolor','sit','amet','consectetur','adipiscing','elit','sed','do','eiusmod','tempor','incididunt','ut','labore','et','dolore','magna','aliqua','enim','ad','minim','veniam','quis','nostrud','exercitation','ullamco','laboris','nisi','aliquip','ex','ea','commodo','consequat','duis','aute','irure','reprehenderit','voluptate','velit','esse','cillum','fugiat','nulla','pariatur','excepteur','sint','occaecat','cupidatat','non','proident','sunt','culpa','officia','deserunt','mollit','anim','id','est','laborum'];
  return pick(w);
}
function loremSentence() {
  const len = int(6, 14);
  const words = [];
  for (let i = 0; i < len; i++) words.push(loremWord());
  words[0] = words[0][0].toUpperCase() + words[0].slice(1);
  return words.join(' ') + '.';
}
function loremParagraph() {
  const sents = [];
  for (let i = 0; i < int(3, 6); i++) sents.push(loremSentence());
  return sents.join(' ');
}

function genValue(type, locale, idx) {
  const loc = locale || 'en';
  switch(type) {
    case 'firstName': return loc==='zh' ? pick(NAMES_ZH.first) : pick(NAMES_EN.first);
    case 'lastName': return loc==='zh' ? '' : pick(NAMES_EN.last);
    case 'fullName': return loc==='zh' ? pick(NAMES_ZH.first) + (rng() > 0.5 ? ' ' + pick(NAMES_EN.first) : '') : `${pick(NAMES_EN.first)} ${pick(NAMES_EN.last)}`;
    case 'email': return (pick(NAMES_EN.first) + '.' + pick(NAMES_EN.last) + int(1, 99) + '@' + pick(['gmail.com','outlook.com','yahoo.com','example.com','protonmail.com'])).toLowerCase();
    case 'username': return (pick(NAMES_EN.first) + pick(NAMES_EN.last) + int(1, 999)).toLowerCase();
    case 'phone': return loc==='zh' ? `+86 1${int(3,9)}${String(int(1000,9999))} ${String(int(1000,9999))}` : `+1 (${int(200,999)}) ${int(100,999)}-${String(int(0,9999)).padStart(4,'0')}`;
    case 'address': return `${int(1, 9999)} ${pick(STREETS)} ${loc==='zh' ? '路' : 'St'}, ${loc==='zh' ? '第' : 'Apt '}${int(1,200)}${loc==='zh' ? '号' : ''}`;
    case 'city': return loc==='zh' ? pick(CITIES_ZH) : pick(CITIES_EN);
    case 'country': return pick(COUNTRIES[loc] || COUNTRIES.en);
    case 'zip': return loc==='zh' ? String(int(100000, 999999)) : String(int(10000, 99999));
    case 'company': return pick(COMPANIES);
    case 'job': return pick(JOBS);
    case 'age': return int(18, 80);
    case 'birthdate': {
      const d = new Date(1950 + int(0, 60), int(0,11), int(1,28));
      return d.toISOString().slice(0,10);
    }
    case 'uuid': return uuid();
    case 'id': return idx + 1;
    case 'boolean': return rng() > 0.5 ? 'true' : 'false';
    case 'integer': return int(1, 1000);
    case 'price': return (rng() * 999 + 1).toFixed(2);
    case 'url': return `https://${pick(['example.com','demo.org','test.io','sample.net'])}/${loremWord()}/${int(1, 999)}`;
    case 'ip': return `${int(1,255)}.${int(0,255)}.${int(0,255)}.${int(0,255)}`;
    case 'color': return '#' + Math.floor(rng()*0xFFFFFF).toString(16).padStart(6,'0');
    case 'sentence': return loremSentence();
    case 'paragraph': return loremParagraph();
    case 'avatar': return `https://i.pravatar.cc/200?img=${int(1, 70)}`;
    case 'gender': return pick(['Female','Male','Non-binary','Other']);
    case 'locale2': return pick(['en-US','en-GB','zh-CN','zh-TW','es-ES','de-DE','fr-FR','ja-JP','ko-KR','pt-BR']);
    default: return '';
  }
}

function renderFields() {
  document.getElementById('fieldList').innerHTML = fields.map((f, i) => {
    return `<div class="field-row">
      <input type="text" value="${f.name}" onchange="fields[${i}].name=this.value;generate()">
      <select onchange="fields[${i}].type=this.value;generate()">
        ${FIELD_TYPES.map(t => `<option value="${t.id}"${f.type===t.id?' selected':''}>${t.name}</option>`).join('')}
      </select>
      <button onclick="removeField(${i})" title="Remove">✕</button>
    </div>`;
  }).join('');
}

window.removeField = function(i) { fields.splice(i, 1); renderFields(); generate(); };

window.generate = function() {
  rng = makeRng($('#seed').value.trim() || String(Date.now()));
  const count = Math.min(1000, Math.max(1, parseInt($('#rowCount').value) || 10));
  const locale = $('#locale').value;
  const fmt = $('#format').value;
  const data = [];
  for (let i = 0; i < count; i++) {
    const row = {};
    for (const f of fields) row[f.name] = genValue(f.type, locale, i);
    data.push(row);
  }
  let out = '';
  if (fmt === 'json') out = JSON.stringify(data, null, 2);
  else if (fmt === 'csv') {
    const headers = fields.map(f => f.name);
    out = headers.join(',') + '\n' + data.map(r => headers.map(h => {
      const v = String(r[h] ?? '');
      return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
    }).join(',')).join('\n');
  } else if (fmt === 'sql') {
    const table = 'mock_data';
    const headers = fields.map(f => f.name);
    out = `INSERT INTO ${table} (${headers.join(', ')}) VALUES\n` + data.map(r => {
      const vals = headers.map(h => {
        const v = r[h];
        if (typeof v === 'number') return v;
        if (typeof v === 'boolean') return v ? 'TRUE' : 'FALSE';
        return `'${String(v).replace(/'/g, "''")}'`;
      });
      return '  (' + vals.join(', ') + ')';
    }).join(',\n') + ';';
  } else if (fmt === 'table') {
    const headers = fields.map(f => f.name);
    out = headers.join(' | ') + '\n' + headers.map(() => '---').join(' | ') + '\n' + data.map(r => headers.map(h => String(r[h] ?? '')).join(' | ')).join('\n');
  }
  document.getElementById('mockOut').textContent = out;
};

document.getElementById('addFieldBtn').onclick = function() {
  fields.push({type:'firstName', name:'field' + (fields.length + 1)});
  renderFields();
  generate();
};

['rowCount','seed','locale','format'].forEach(id => {
  document.getElementById(id).addEventListener('change', generate);
  document.getElementById(id).addEventListener('input', generate);
});
