<div class="gz-container">

      <input type="text" id="name" placeholder="Maths Final, GCSE, SATs, Bar Exam…">

      <div class="ec-cell"><div class="num" id="n-m">0</div><div class="lbl" id="l-m"></div></div>
      <div class="ec-cell"><div class="num" id="n-s">0</div><div class="lbl" id="l-s"></div></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Exam Countdown Calculator',
    toolDesc: 'Live countdown to your exam or test — days, hours, minutes and seconds. Add study-plan milestones and see exactly how many weeks you have left. Free, private, browser-only.',
    name: 'Exam name',
    date: 'Exam date & time',
    plan: 'Study plan milestones',
    addMilestone: 'Add',
    mName: 'Milestone e.g. Finish notes',
    days: 'days', hours: 'hours', minutes: 'minutes', seconds: 'seconds',
    remaining: 'until your exam', ago: 'since your exam', arrived: '🎉 It\u2019s exam time — good luck!',
    weeks: 'weeks',
    remove: 'Remove',
    clear: 'Reset',
    step1: 'Enter your exam name and the exact date and time',
    step2: 'Watch the live countdown tick down every second',
    step3: 'Add study milestones like \u201cFinish revision\u201d with their own dates',
    step4: 'Your exam and milestones are saved locally so you can come back any time',
    tip: '<b>Study tip:</b> Most students need about 1 hour of revision per day for every 7 days until the exam. With <b id="tip-d">—</b> days left, aim for roughly <b id="tip-h">—</b> hours of study per day.',
  },
  zh: {
    toolTitle: '考试倒计时计算器',
    toolDesc: '考试或测验的实时倒计时 — 天、时、分、秒。添加复习里程碑，查看还剩多少周。免费、私密、浏览器本地运行。',
    name: '考试名称',
    date: '考试日期和时间',
    plan: '复习计划里程碑',
    addMilestone: '添加',
    mName: '里程碑，如：完成笔记',
    days: '天', hours: '时', minutes: '分', seconds: '秒',
    remaining: '距离考试还有', ago: '考试已过去', arrived: '🎉 考试时间到 — 祝你好运！',
    weeks: '周',
    remove: '移除',
    clear: '重置',
    step1: '输入考试名称以及准确的日期和时间',
    step2: '查看每秒更新的实时倒计时',
    step3: '添加复习里程碑（如「完成笔记」）及其日期',
    step4: '考试和里程碑会保存在本地，随时可以回来查看',
    tip: '<b>复习建议：</b>大多数学生每距离考试 7 天需要每天复习约 1 小时。距离考试还有 <b id="tip-d">—</b> 天，建议每天学习约 <b id="tip-h">—</b> 小时。',
  }
});

const { $, t } = GZ;
const LS_KEY = 'gz-exam-countdown-v1';
let state = { name: '', date: '', milestones: [] };

function load(){ try{ const s = JSON.parse(localStorage.getItem(LS_KEY)); if(s){ state = Object.assign(state, s); } }catch(e){} }
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){} }

function toLocalInputValue(d){
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function renderMilestones(){
  const wrap = $('#plan');
  if(!state.milestones.length){ wrap.innerHTML = `<div style="color:var(--text2);font-size:.85rem;padding:6px 0">—</div>`; return; }
  const now = new Date();
  wrap.innerHTML = state.milestones.map((m,i)=>{
    const d = new Date(m.date);
    const past = d < now;
    const days = Math.floor(Math.abs(d-now)/86400000);
    return `<div class="ec-mile ${past?'done':''}">
      <span>${m.name} <span style="color:var(--text2);font-size:.78rem">· ${days} ${past?'d ago':'d left'}</span></span>
      <span><span class="when">${m.date}</span> <button class="gz-btn gz-btn-secondary" style="padding:4px 8px;font-size:.72rem;margin-left:6px" onclick="rmM(${i})">${t('remove')}</button></span>
    </div>`;
  }).join('');
}

function update(){
  const val = $('#date').value;
  if(!val){ $('#big').textContent='—'; $('#sub').textContent=''; $('#weeks').textContent=''; ['d','h','m','s'].forEach(k=> $('#n-'+k).textContent='0'); return; }
  const target = new Date(val);
  const now = new Date();
  const past = target < now;
  const diff = Math.abs(target - now);
  const totalSec = Math.floor(diff/1000);
  const days = Math.floor(totalSec/86400);
  const hours = Math.floor((totalSec%86400)/3600);
  const mins = Math.floor((totalSec%3600)/60);
  const secs = totalSec%60;
  $('#n-d').textContent = days; $('#n-h').textContent = hours;
  $('#n-m').textContent = mins; $('#n-s').textContent = secs;
  const weeks = Math.floor(days/7);
  const name = $('#name').value.trim();
  if(diff < 1500){ $('#big').textContent='🎉'; $('#sub').textContent = t('arrived'); }
  else { $('#big').textContent = days; $('#sub').textContent = `${t('remaining')}${name?' · '+name:''}`; }
  $('#weeks').textContent = weeks > 0 ? `${weeks} ${t('weeks')}` : (past ? `${t('ago')}` : '< 1 ' + t('weeks'));
  // tip
  const tipD = document.getElementById('tip-d');
  const tipH = document.getElementById('tip-h');
  if(tipD && tipH){ tipD.textContent = days; tipH.textContent = Math.max(1, Math.round(days/7)); }
}

// labels
$('#lbl-name').textContent = t('name');
$('#lbl-date').textContent = t('date');
$('#lbl-plan').textContent = t('plan');
$('#l-d').textContent = t('days'); $('#l-h').textContent = t('hours');
$('#l-m').textContent = t('minutes'); $('#l-s').textContent = t('seconds');
$('#m-name').placeholder = t('mName');
$('#m-add').textContent = t('addMilestone');
$('#tip').innerHTML = t('tip');

load();
$('#name').value = state.name || '';
$('#date').value = state.date || '';
renderMilestones();

$('#name').addEventListener('input', e=>{ state.name = e.target.value; save(); });
$('#date').addEventListener('input', e=>{ state.date = e.target.value; save(); update(); });
$('#m-add').addEventListener('click', ()=>{
  const n = $('#m-name').value.trim(); const d = $('#m-date').value;
  if(!n || !d) return;
  state.milestones.push({ name: n, date: d });
  $('#m-name').value=''; $('#m-date').value='';
  save(); renderMilestones();
});
window.rmM = function(i){ state.milestones.splice(i,1); save(); renderMilestones(); };

function reset(){ state = { name:'', date:'', milestones:[] }; save(); $('#name').value=''; $('#date').value=''; renderMilestones(); update(); }

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="reset()">${t('clear')}</button>`;

clearInterval(window._ecT);
window._ecT = setInterval(update, 1000);
update();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏳', href:'/calc/countdown-calculator.html', name:'Countdown Calculator'},
    {icon:'🤰', href:'/calc/due-date.html', name:'Due Date'},
    {icon:'⏱️', href:'/calc/timer-stopwatch.html', name:'Timer'},
    {icon:'🎂', href:'/calc/age-calculator.html', name:'Age Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
