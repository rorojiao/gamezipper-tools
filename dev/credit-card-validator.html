    toolDesc: '使用 Luhn 算法验证信用卡号。自动检测卡类型、校验格式和校验和 — 完全浏览器本地运行。',
    valid: '✓ 卡号有效',
    invalid: '✗ 卡号无效',
    cardType: '卡类型',
    luhn: 'Luhn 校验',
    length: '长度检查',
    iin: '发卡行 (IIN)',
    unknown: '未知',
    passed: '通过',
    failed: '未通过',
    yes: '是',
    no: '否',
    step1: '输入信用卡号（仅限测试号码）',
    step2: '工具自动格式化并实时验证',
    step3: '检查 Luhn 校验和和卡类型检测',
    step4: '请勿在在线工具中输入真实卡号',
  }
});

const { $, t } = GZ;

function luhnCheck(num) {
  let sum = 0;
  let alternate = false;
  for (let i = num.length - 1; i >= 0; i--) {
    let n = parseInt(num[i], 10);
    if (alternate) {
      n *= 2;
      if (n > 9) n -= 9;
    }
    sum += n;
    alternate = !alternate;
  }
  return sum % 10 === 0;
}

function detectCardType(num) {
  const types = [
    { name: 'Visa', re: /^4/ },
    { name: 'Mastercard', re: /^5[1-5]/ },
    { name: 'American Express', re: /^3[47]/ },
    { name: 'Discover', re: /^6(?:011|5)/ },
    { name: 'Diners Club', re: /^3(?:0[0-5]|[68])/ },
    { name: 'JCB', re: /^35/ },
    { name: 'UnionPay', re: /^62/ },
  ];
  for (const type of types) {
    if (type.re.test(num)) return type.name;
  }
  return null;
}

function validLength(num) {
  const len = num.length;
  return len >= 13 && len <= 19;
}

function validate() {
  const raw = $('#card-input').value.replace(/\D/g, '');
  const result = $('#result');
  if (!raw) { result.innerHTML = ''; return; }

  const luhn = luhnCheck(raw);
  const type = detectCardType(raw);
  const lengthOk = validLength(raw);

  const allValid = luhn && lengthOk;

  result.innerHTML = `
    <div class="result-card">
      <div class="card-type">${type || t('unknown')} ${type ? {'Visa':'💳','Mastercard':'💳','American Express':'💳','Discover':'💳','Diners Club':'💳','JCB':'💳','UnionPay':'💳'}[type] || '' : '❓'}</div>
      <div class="card-number">${raw.replace(/(.{4})/g, '$1 ').trim()}</div>
      <div style="font-size:1.1em;font-weight:700;margin:10px 0" class="${allValid ? 'valid' : 'invalid'}">${allValid ? t('valid') : t('invalid')}</div>
      <div class="result-row"><span>${t('luhn')}</span><span class="${luhn?'valid':'invalid'}">${luhn ? t('passed') : t('failed')}</span></div>
      <div class="result-row"><span>${t('length')}</span><span class="${lengthOk?'valid':'invalid'}">${lengthOk ? t('passed') : t('failed')} (${raw.length})</span></div>
      <div class="result-row"><span>${t('iin')}</span><span>${raw.substring(0, 6)}</span></div>
    </div>`;
}

$('#card-input').addEventListener('input', function() {
  let val = this.value.replace(/\D/g, '');
  if (val.length > 16) val = val.substring(0, 16);
  // Format with spaces
  this.value = val.replace(/(.{4})/g, '$1 ').trim();
  validate();
});

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#card-input').value='';$('#result').innerHTML='';">${t('clear')}</button>`;
