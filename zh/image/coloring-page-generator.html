<div class="gz-container">

      <p id="dropText">📷</p>
    </div>
    <input type="file" id="fileInput" accept="image/*" hidden>
    <div class="gz-controls" id="controls" style="display:none">
      <label id="lbl-threshold"></label><input type="range" id="threshold" min="10" max="200" value="60">
      <label id="lbl-blur"></label><input type="range" id="blur" min="0" max="10" value="1">
      <label id="lbl-contrast"></label><input type="range" id="contrast" min="1" max="5" value="2" step="0.5">
      <button class="gz-btn" id="btnInvert" onclick="toggleInvert()">⬛</button>
    </div>
    <div class="gz-split" id="splitArea" style="display:none">
      <div><label id="lbl-original"></label><canvas id="original-canvas"></canvas></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Coloring Page Generator',
    toolDesc: 'Turn any photo into a printable coloring page. Adjust edges, lines and contrast for the perfect coloring sheet.',
    dropHint: 'Drop an image here or click to upload',
    threshold: 'Threshold',
    blur: 'Blur',
    contrast: 'Contrast',
    original: 'Original',
    result: 'Coloring Page',
    download: 'Download PNG',
    reset: 'Reset',
    step1: 'Upload a photo by dragging or clicking the drop zone',
    step2: 'Adjust the Threshold slider to control edge detection sensitivity',
    step3: 'Use Blur to smooth out noise and Contrast to bolden lines',
    step4: 'Click Download PNG to save your printable coloring page',
  },
  zh: {
    toolTitle: '涂色页生成器',
    toolDesc: '将任意照片转换为可打印的涂色页。调整边缘检测、线条粗细和对比度。',
    dropHint: '拖拽图片到此处或点击上传',
    threshold: '阈值',
    blur: '模糊',
    contrast: '对比度',
    original: '原图',
    result: '涂色页',
    download: '下载 PNG',
    reset: '重置',
    step1: '拖拽或点击上传一张照片',
    step2: '调整阈值滑块控制边缘检测灵敏度',
    step3: '使用模糊滑块平滑噪点，对比度加粗线条',
    step4: '点击下载 PNG 保存可打印的涂色页',
  }
});

const { $, t } = GZ;
let invertMode = false;
let img = null;

const dz = $('#dropZone');
const fi = $('#fileInput');

dz.onclick = () => fi.click();
dz.ondragover = e => { e.preventDefault(); dz.classList.add('dragover'); };
dz.ondragleave = () => dz.classList.remove('dragover');
dz.ondrop = e => { e.preventDefault(); dz.classList.remove('dragover'); loadFile(e.dataTransfer.files[0]); };
fi.onchange = () => { if (fi.files[0]) loadFile(fi.files[0]); };

$('#dropText').textContent = t('dropHint');

['threshold','blur','contrast'].forEach(id => {
  $('#'+id).oninput = () => { if (img) processImage(); };
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    img = new Image();
    img.onload = () => {
      dz.style.display = 'none';
      $('#controls').style.display = 'flex';
      $('#splitArea').style.display = 'grid';
      drawOriginal();
      processImage();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function drawOriginal() {
  const c = $('#original-canvas');
  const maxW = 600, maxH = 600;
  let w = img.width, h = img.height;
  if (w > maxW) { h *= maxW/w; w = maxW; }
  if (h > maxH) { w *= maxH/h; h = maxH; }
  c.width = w; c.height = h;
  c.style.display = 'block';
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, w, h);
}

function processImage() {
  const c = $('#preview-canvas');
  const w = $('#original-canvas').width;
  const h = $('#original-canvas').height;
  c.width = w; c.height = h;
  c.style.display = 'block';
  const ctx = c.getContext('2d');
  const blurVal = +$('#blur').value;
  const threshVal = +$('#threshold').value;
  const contrastVal = +$('#contrast').value;

  ctx.filter = `blur(${blurVal}px) contrast(${contrastVal})`;
  ctx.drawImage(img, 0, 0, w, h);
  ctx.filter = 'none';

  const imageData = ctx.getImageData(0, 0, w, h);
  const d = imageData.data;

  // Convert to grayscale
  for (let i = 0; i < d.length; i += 4) {
    const gray = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
    d[i] = d[i+1] = d[i+2] = gray;
  }

  // Sobel edge detection
  const src = new Uint8ClampedArray(d);
  for (let y = 1; y < h-1; y++) {
    for (let x = 1; x < w-1; x++) {
      const idx = (y*w + x) * 4;
      const tl = src[((y-1)*w+(x-1))*4];
      const tc = src[((y-1)*w+x)*4];
      const tr = src[((y-1)*w+(x+1))*4];
      const ml = src[(y*w+(x-1))*4];
      const mr = src[(y*w+(x+1))*4];
      const bl = src[((y+1)*w+(x-1))*4];
      const bc = src[((y+1)*w+x)*4];
      const br = src[((y+1)*w+(x+1))*4];
      const gx = -tl - 2*ml - bl + tr + 2*mr + br;
      const gy = -tl - 2*tc - tr + bl + 2*bc + br;
      let edge = Math.sqrt(gx*gx + gy*gy);
      if (invertMode) {
        const val = edge > threshVal ? 0 : 255;
        d[idx] = d[idx+1] = d[idx+2] = val;
      } else {
        const val = edge > threshVal ? 0 : 255;
        d[idx] = d[idx+1] = d[idx+2] = val;
      }
      d[idx+3] = 255;
    }
  }

  ctx.putImageData(imageData, 0, 0);
}

function toggleInvert() {
  invertMode = !invertMode;
  $('#btnInvert').textContent = invertMode ? '⬜' : '⬛';
  if (img) processImage();
}

function downloadPNG() {
  const c = $('#preview-canvas');
  const a = document.createElement('a');
  a.download = 'coloring-page.png';
  a.href = c.toDataURL('image/png');
  a.click();
}

function doReset() {
  img = null;
  dz.style.display = '';
  $('#controls').style.display = 'none';
  $('#splitArea').style.display = 'none';
  $('#original-canvas').style.display = 'none';
  $('#preview-canvas').style.display = 'none';
  fi.value = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadPNG()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doReset()">${t('reset')}</button>`;

$('#lbl-threshold').textContent = t('threshold');
$('#lbl-blur').textContent = t('blur');
$('#lbl-contrast').textContent = t('contrast');
$('#lbl-original').textContent = t('original');
$('#lbl-result').textContent = t('result');

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/image/image-filters.html', name:'Image Filters'},
    {icon:'✏️', href:'/image/image-to-ascii.html', name:'Image to ASCII'},
    {icon:'🎨', href:'/image/pencil-sketch.html', name:'Pencil Sketch'},
    {icon:'📄', href:'/image/image-to-pdf.html', name:'Image to PDF'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
