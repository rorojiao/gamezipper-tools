<script>
GZI18n.register({
  en: {
    toolTitle: 'Text to Handwriting Converter',
    toolDesc: 'Transform typed text into realistic handwriting on ruled paper. Choose fonts, ink colors, and download as PNG.',
    input: 'Text Input',
    output: 'Handwriting Preview',
    fontLabel: 'Handwriting Font',
    sizeLabel: 'Font Size',

    download: 'Download PNG',
    example: 'Example',
    clear: 'Clear',
    step1: 'Paste or type your text in the input area',
    step2: 'Choose a handwriting font from the dropdown',
    step3: 'Adjust font size and ink color to your preference',
    step4: 'Click Download PNG to save the handwriting image',
  },
  zh: {
    toolTitle: '文字转手写工具',
    toolDesc: '将输入的文字转换为逼真的手写风格，显示在横线纸上。选择字体、墨水颜色，下载为 PNG 图片。',
    input: '文本输入',
    output: '手写预览',
    fontLabel: '手写字体',
    sizeLabel: '字体大小',
    colorLabel: '墨水颜色',
    download: '下载 PNG',
    example: '示例',
    clear: '清空',
    step1: '在输入区域粘贴或输入文字',
    step2: '从下拉菜单中选择手写字体',
    step3: '调整字体大小和墨水颜色',
    step4: '点击「下载 PNG」保存手写图片',
  }
});

const { $, t } = GZ;
const preview = $('#preview-inner');

function renderPreview() {
  const text = $('#input').value;
  if (!text.trim()) { preview.innerHTML = '<span style="color:#aaa;font-style:italic">Your handwriting will appear here...</span>'; return; }
  const font = $('#font-select').value;
  const size = $('#font-size').value;
  const color = $('#ink-color').value;
  preview.style.fontFamily = font;
  preview.style.fontSize = size + 'px';
  preview.style.color = color;
  preview.style.whiteSpace = 'pre-wrap';
  preview.style.wordBreak = 'break-word';
  preview.textContent = text;
}

$('#input').addEventListener('input', renderPreview);
$('#font-select').addEventListener('change', renderPreview);
$('#font-size').addEventListener('input', () => { $('#size-val').textContent = $('#font-size').value + 'px'; renderPreview(); });
$('#ink-color').addEventListener('input', renderPreview);

function loadExample() {
  $('#input').value = "Hello!\n\nThis is a sample text converted to handwriting.\nYou can use this tool to create realistic\nhandwritten notes for projects, presentations,\nor just for fun.\n\nTry changing the font, size, and color!";
  renderPreview();
}

function doClear() { $('#input').value = ''; preview.innerHTML = ''; }

function downloadPNG() {
  const c = document.createElement('canvas');
  const font = $('#font-select').value.split(',')[0].replace(/'/g,'');
  const size = parseInt($('#font-size').value);
  const color = $('#ink-color').value;
  const text = $('#input').value;
  const lines = text.split('\n');
  const lineH = size * 2;
  const pad = 40;
  c.width = 800;
  c.height = Math.max(400, lines.length * lineH + pad * 2);
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, c.width, c.height);
  // ruled lines
  ctx.strokeStyle = '#e0e6f0';
  ctx.lineWidth = 1;
  for (let y = pad + lineH; y < c.height - pad; y += lineH) {
    ctx.beginPath(); ctx.moveTo(20, y); ctx.lineTo(c.width - 20, y); ctx.stroke();
  }
  // text
  ctx.fillStyle = color;
  ctx.font = `${size}px ${font}`;
  ctx.textBaseline = 'alphabetic';
  lines.forEach((line, i) => { ctx.fillText(line, pad, pad + lineH * (i + 1) - lineH * 0.3); });
  const a = document.createElement('a');
  a.download = 'handwriting.png';
  a.href = c.toDataURL('image/png');
  a.click();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadPNG()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

  ]
});
