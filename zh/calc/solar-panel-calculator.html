<script>
GZI18n.register({
  en: {
    toolTitle: 'Solar Panel Calculator',
    toolDesc: 'Calculate how many solar panels you need, system size, annual output, savings and payback period. Free, browser-only, no signup.',
    lblDaily: 'Daily Energy Use (kWh)',
    lblSun: 'Peak Sun Hours / day',
    lblWatt: 'Panel Wattage (W)',
    lblRoof: 'Available Roof Area (m²)',
    lblRate: 'Electricity Rate ($/kWh)',
    lblCost: 'System Cost ($/W)',
    btnCalc: 'Calculate Solar System',
    resultLabel: 'Panels Needed',
    systemSize: 'System Size',
    annualOutput: 'Annual Output',
    annualSavings: 'Annual Savings',
    payback: 'Payback Period',
    step1: 'Enter your daily electricity consumption in kWh',
    step2: 'Set the peak sun hours for your location (3-6 typical)',
    step3: 'Adjust panel wattage, roof area, electricity rate and cost per watt',
    step4: 'Click Calculate to see panel count, system size, savings and payback',
  },
  zh: {
    toolTitle: '太阳能板计算器',
    toolDesc: '计算需要多少块太阳能板、系统容量、年发电量、节省费用和回本周期。免费、浏览器本地运行、无需注册。',
    lblDaily: '每日用电量（kWh）',
    lblSun: '每日峰值日照小时数',
    lblWatt: '单板功率（W）',
    lblRoof: '可用屋顶面积（m²）',
    lblRate: '电价（$/kWh）',
    lblCost: '系统成本（$/W）',
    btnCalc: '计算太阳能系统',
    resultLabel: '所需太阳能板数量',
    systemSize: '系统容量',
    annualOutput: '年发电量',
    annualSavings: '年节省费用',
    payback: '回本周期',
    step1: '输入每日用电量（kWh）',
    step2: '设置所在地区的峰值日照时数（通常 3-6）',
    step3: '调整单板功率、屋顶面积、电价和每瓦成本',
    step4: '点击计算查看所需板数、系统容量、节省费用和回本周期',
  }
});

const { $, copyText, t } = GZ;
const lang = GZI18n.getLang();

function calculate() {
  const daily = parseFloat($('#daily').value) || 0;
  const sun = parseFloat($('#sun').value) || 0;
  const watt = parseFloat($('#watt').value) || 0;
  const roof = parseFloat($('#roof').value) || 0;
  const rate = parseFloat($('#rate').value) || 0;
  const costPerW = parseFloat($('#cost').value) || 0;

  // Energy needed per day from panels (kWh)
  const dailyEnergy = daily / sun; // kW needed during sun hours
  // Panels needed by energy
  const panelKW = watt / 1000;
  const panelsByEnergy = panelKW > 0 ? dailyEnergy / panelKW : 0;
  // Panels that fit on roof (approx 2 m² per 400W panel)
  const panelArea = panelKW > 0 ? (watt / 400) * 2 : 2;
  const panelsByRoof = roof / panelArea;
  // Use the smaller of the two (can't exceed roof, need at least energy)
  const panels = Math.floor(Math.min(panelsByEnergy, panelsByRoof));

  const systemSizeKW = panels * panelKW;
  const annualOutput = systemSizeKW * sun * 365 * 0.8; // 80% efficiency factor
  const annualSavings = annualOutput * rate;
  const totalCost = systemSizeKW * 1000 * costPerW;
  const payback = annualSavings > 0 ? totalCost / annualSavings : 0;

  $('#result').style.display = '';
  $('#result-panels').textContent = panels;
  $('#result-label').textContent = t('resultLabel');
  $('#result-size').textContent = systemSizeKW.toFixed(1) + ' kW';
  $('#result-size-label').textContent = t('systemSize');
  $('#result-output').textContent = Math.round(annualOutput).toLocaleString() + ' kWh';
  $('#result-output-label').textContent = t('annualOutput');
  $('#result-savings').textContent = '$' + Math.round(annualSavings).toLocaleString();
  $('#result-savings-label').textContent = t('annualSavings');
  $('#result-payback').textContent = payback > 0 ? payback.toFixed(1) + ' yrs' : '—';
  $('#result-payback-label').textContent = t('payback');
}

$('#btn-calc').textContent = t('btnCalc');
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔋', href:'/calc/ev-range-calculator.html', name:'EV Range'},
    {icon:'💡', href:'/calc/electricity-cost.html', name:'Electricity Cost'},
    {icon:'⚡', href:'/calc/wattage-calculator.html', name:'Wattage Calculator'},
    {icon:'💰', href:'/calc/roi-calculator.html', name:'ROI Calculator'},
  ]
});
</script>
