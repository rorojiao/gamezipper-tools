<script>

    all: 'All', easy: 'Easy', logic: 'Logic', tricky: 'Tricky',
    reveal: 'Reveal Answer',
    hideA: 'Think first! Answer hidden.',
    step1: 'Pick a difficulty, or leave it on All',
    step2: 'Read the riddle and try to solve it',
    step3: 'Click Reveal Answer to check yourself',
    step4: 'Click Generate for the next riddle',
  },
  zh: {
    toolTitle: '谜语生成器',
    toolDesc: '每次点击都是一条巧妙的谜语——简单、逻辑或烧脑。先动脑，再揭晓答案。适合儿童、课堂和脑筋锻炼。',
    all: '全部', easy: '简单', logic: '逻辑', tricky: '烧脑',
    reveal: '揭晓答案',
    hideA: '先想一想！答案已隐藏。',
    step1: '选择难度，或保留「全部」',
    step2: '读谜面，试着猜出答案',
    step3: '点击「揭晓答案」核对',
    step4: '点击「生成」获取下一条谜语',
  }
});

const { $, copyText, t } = GZ;

const RI = {
  en: {
    easy: [
      {q:"I have hands but cannot clap. What am I?", a:"A clock."},
      {q:"What has to be broken before you can use it?", a:"An egg."},
      {q:"I'm tall when I'm young, and short when I'm old. What am I?", a:"A candle (or a pencil)."},
      {q:"What month of the year has 28 days?", a:"All of them."},
      {q:"What has many keys but can't open a single lock?", a:"A piano."},
      {q:"What has a head and a tail but no body?", a:"A coin."},
      {q:"What gets wetter the more it dries?", a:"A towel."},
      {q:"What has legs but cannot walk?", a:"A table."},
      {q:"I follow you all day long, but when night comes I'm gone. What am I?", a:"Your shadow."},
      {q:"What can you catch but not throw?", a:"A cold."},
    ],
    logic: [
      {q:"A man pushes his car to a hotel and tells the owner he's bankrupt. Why?", a:"He's playing Monopoly."},
      {q:"What comes once in a minute, twice in a moment, but never in a thousand years?", a:"The letter M."},
      {q:"The more you take, the more you leave behind. What are they?", a:"Footsteps."},
      {q:"I speak without a mouth and hear without ears. I have no body, but I come alive with wind. What am I?", a:"An echo."},
      {q:"Forward I am heavy, but backward I am not. What am I?", a:"The word 'ton' (backward: 'not')."},
      {q:"What has cities but no houses, forests but no trees, and water but no fish?", a:"A map."},
      {q:"Two fathers and two sons go fishing. They catch three fish and each takes one. How?", a:"They are a grandfather, father and son — three people."},
      {q:"What can travel around the world while staying in a corner?", a:"A stamp."},
      {q:"The person who makes it has no need of it; the buyer has no use for it. What is it?", a:"A coffin."},
      {q:"What has many rings but no fingers?", a:"A telephone (or a tree)."},
    ],
    tricky: [
      {q:"What can you hold in your right hand, but never in your left hand?", a:"Your left hand (or left elbow)."},
      {q:"I have branches, but no fruit, trunk or leaves. What am I?", a:"A bank."},
      {q:"What is so fragile that saying its name breaks it?", a:"Silence."},
      {q:"The more of me you take, the more you leave behind. What am I?", a:"Footsteps."},
      {q:"What has words, but never speaks?", a:"A book."},
      {q:"I have no doors but I have keys. I have no rooms but I have space. What am I?", a:"A keyboard."},
      {q:"What disappears as soon as you say its name?", a:"Silence."},
      {q:"What goes up but never comes down?", a:"Your age."},
      {q:"I shave every day, but my beard stays the same. Who am I?", a:"A barber."},
      {q:"What can fill a room but takes up no space?", a:"Light."},
    ],
  },
  zh: {
    easy: [
      {q:"我有手却不会拍手。我是什么？", a:"钟。"},
      {q:"什么东西必须先打破才能用？", a:"鸡蛋。"},
      {q:"我年轻的时候很高，老的时候很矮。我是什么？", a:"蜡烛（或铅笔）。"},
      {q:"一年里哪个月有28天？", a:"每个月都有。"},
      {q:"什么东西有很多键，却打不开一把锁？", a:"钢琴。"},
      {q:"什么东西有头有尾却没有身体？", a:"硬币。"},
      {q:"什么东西越擦越湿？", a:"毛巾。"},
      {q:"什么东西有腿却不会走路？", a:"桌子。"},
      {q:"白天一直跟着你，天黑就不见了。我是什么？", a:"影子。"},
      {q:"什么东西你能抓住却扔不掉？", a:"感冒。"},
    ],
    logic: [
      {q:"一个人把车推到旅馆，对老板说自己破产了。为什么？", a:"他在玩大富翁游戏。"},
      {q:"什么东西一分钟出现一次，一刹那出现两次，千年里一次也没有？", a:"字母 M。"},
      {q:"你拿得越多，留下的也越多。它们是什么？", a:"脚印。"},
      {q:"我说无口，听无耳，无身却能随风而生。我是什么？", a:"回声。"},
      {q:"向前我很重，向后我就不重了。我是什么？", a:"单词 ton（反读是 not）。"},
      {q:"什么有城市却没有房屋，有森林却没有树木，有水却没有鱼？", a:"地图。"},
      {q:"两个父亲和两个儿子去钓鱼，共钓到三条鱼，每人各得一条，为什么？", a:"他们是祖孙三代三人。"},
      {q:"什么东西能环游世界却始终待在角落？", a:"邮票。"},
      {q:"制造它的人用不着，买它的人用不上。它是什么？", a:"棺材。"},
      {q:"什么东西有很多环却没有手指？", a:"电话（或树）。"},
    ],
    tricky: [
      {q:"什么你能用右手拿，却永远不能用左手拿？", a:"你的左手（或左肘）。"},
      {q:"我有分支却没有果实、树干或树叶。我是什么？", a:"银行。"},
      {q:"什么东西一说出它的名字就被打破了？", a:"沉默。"},
      {q:"什么东西你拿得越多，留下的也越多？", a:"脚印。"},
      {q:"什么有文字却从不说话？", a:"书。"},
      {q:"我没有门却有钥匙，没有房间却有空间。我是什么？", a:"键盘。"},
      {q:"什么东西一叫出名字就消失了？", a:"沉默。"},
      {q:"什么东西只升不降？", a:"你的年龄。"},
      {q:"我每天刮脸，胡子却不变。我是谁？", a:"理发师。"},
      {q:"什么能装满整个房间却不占空间？", a:"光。"},
    ],
  }
};

const CATS = [{id:'all',icon:'✨'},{id:'easy',icon:'🟢'},{id:'logic',icon:'🧠'},{id:'tricky',icon:'🔥'}];
const EMOJI = {easy:'🟢', logic:'🧠', tricky:'🔥', all:'🤔'};
let cat = 'all', lastIdx = -1, shown = 0;

function pool() {
  const lang = GZI18n.getLang() === 'zh' ? 'zh' : 'en';
  const src = RI[lang];
  if (cat === 'all') { const all=[]; for (const k in src) src[k].forEach(x => all.push({x,tag:k})); return all; }
  return (src[cat]||[]).map(x => ({x, tag:cat}));
}

function pick() {
  const p = pool(); if (!p.length) return null;
  let idx; do { idx = Math.floor(Math.random()*p.length); } while (p.length>1 && idx===lastIdx);
  lastIdx = idx; return p[idx];
}

let revealed = false;
function render() {
  const item = pick(); if (!item) return;
  $('#emoji').textContent = EMOJI[item.tag]||'🤔';
  $('#tag').textContent = t(item.tag);
  $('#rq').textContent = item.x.q;
  $('#ra').textContent = t('hideA');
  $('#ra').classList.add('hidden');
  revealed = false;
  shown++;
  $('#counter').textContent = (GZI18n.getLang()==='zh' ? `已为你送上 ${shown} 条谜语 🧩` : `${shown} riddles served 🧩`);
}

function reveal() {
  const r = $('#ra');
  if (revealed) { r.classList.add('hidden'); r.textContent = t('hideA'); revealed = false; }
  else {
    const p = pool();
    const it = p[lastIdx];
    if (it) { r.textContent = '💡 ' + it.x.a; r.classList.remove('hidden'); revealed = true; }
  }
}

function buildCats() {
  $('#cats').innerHTML = CATS.map(c =>
    `<button class="cat-btn${c.id===cat?' active':''}" data-c="${c.id}">${c.icon} ${t(c.id)}</button>`).join('');
  GZ.$$('#cats .cat-btn').forEach(b => b.onclick = () => { cat=b.dataset.c; lastIdx=-1; buildCats(); render(); });
}

function shareRi() {
  const r = $('#ra');
  const txt = r.classList.contains('hidden') ? $('#rq').textContent : ($('#rq').textContent + '\n💡 ' + r.textContent.replace(/^💡\s*/,''));
  if (navigator.share) navigator.share({title:'GameZipper Riddle', text:txt}).catch(()=>{});
  else copyText(txt);
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="render()">🎲 ${t('easy')==='简单'?'生成':'Generate'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="reveal()">💡 ${t('reveal')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#rq').textContent+($('#ra').classList.contains('hidden')?'':'\\n'+$('#ra').textContent))">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="shareRi()">↗ ${t('easy')==='简单'?'分享':'Share'}</button>`;

buildCats();
render();

GZ.renderToolPage({
  related: [
    {icon:'🔤', href:'/fun/hangman.html', name:'Hangman'},
    {icon:'🎯', href:'/fun/trivia-quiz.html', name:'Trivia Quiz'},
    {icon:'🤔', href:'/fun/would-you-rather.html', name:'Would You Rather'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
