<script>
GZI18n.register({
  en: {
    toolTitle: 'Upside Down Text Generator',
    toolDesc: 'Flip text upside down and reverse it instantly. Copy and paste upside down text for social media, messages, and fun.',
    input: 'Type or paste your text',
    output: 'Result',
    upsideDown: 'Upside Down',
    reversed: 'Reversed',
    clickToCopy: 'Click to copy',
    step1: 'Type or paste the text you want to flip',
    step2: 'See the upside down and reversed versions instantly',
    step3: 'Click on any result to copy it to your clipboard',
    step4: 'Paste the flipped text on social media or messages',
  },
  zh: {
    toolTitle: '倒置文字生成器',
    toolDesc: '即时将文字翻转倒置。复制粘贴倒置文字，用于社交媒体、消息和娱乐。',
    input: '输入或粘贴您的文字',
    output: '输出',
    upsideDown: '倒置文字',
    reversed: '反转文字',
    clickToCopy: '点击复制',
    step1: '输入或粘贴要翻转的文字',
    step2: '即时查看倒置和反转版本',
    step3: '点击任意结果复制到剪贴板',
    step4: '将翻转后的文字粘贴到社交媒体或消息中',
  }
});

const { $, copyText, t } = GZ;

$('#input').placeholder = t('input');
$('#lblUD').textContent = t('upsideDown');
$('#lblRev').textContent = t('reversed');
$('#clickHint').textContent = t('clickToCopy');
$('#clickHint2').textContent = t('clickToCopy');

const flipMap = {
  'a':'ɐ','b':'q','c':'ɔ','d':'p','e':'ǝ','f':'ɟ','g':'ƃ','h':'ɥ','i':'ᴉ','j':'ɾ',
  'k':'ʞ','l':'l','m':'ɯ','n':'u','o':'o','p':'d','q':'b','r':'ɹ','s':'s','t':'ʇ',
  'u':'n','v':'ʌ','w':'ʍ','x':'x','y':'ʎ','z':'z',
  'A':'∀','B':'ꓭ','C':'Ɔ','D':'ᗡ','E':'Ǝ','F':'Ⅎ','G':'⅁','H':'H','I':'I','J':'ſ',
  'K':'ꓘ','L':'˥','M':'W','N':'N','O':'O','P':'Ԁ','Q':'Ό','R':'ꓤ','S':'S','T':'⊥',
  'U':'∩','V':'Λ','W':'M','X':'X','Y':'⅄','Z':'Z',
  '1':'Ɩ','2':'ᄅ','3':'Ɛ','4':'ㄣ','5':'ϛ','6':'9','7':'ㄥ','8':'8','9':'6','0':'0',
  '.':'˙',',':'\'','!':'¡','?':'¿','(':')',')':'(','[':']',']':'[','{':'}','}':'{',
  '<':'>','>':'<','&':'⅋','"':'„','\'':',',';':'','_':'‾',
};

function flipText(text) {
  return [...text].map(ch => flipMap[ch] || ch).reverse().join('');
}

function reverseText(text) {
  return [...text].reverse().join('');
}

function updateOutput() {
  const text = $('#input').value;
  $('#udText').textContent = flipText(text);
  $('#revText').textContent = reverseText(text);
}

$('#input').addEventListener('input', updateOutput);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='Hello World! This is upside down text ✨';updateOutput()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';updateOutput()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔁', href:'/text/flip-text.html', name:'Flip Text'},
    {icon:'🔤', href:'/text/case-converter.html', name:'Case Converter'},
    {icon:'✨', href:'/text/fancy-text.html', name:'Fancy Text'},
    {icon:'🎨', href:'/text/3d-text.html', name:'3D Text'},
  ]
});
</script>
