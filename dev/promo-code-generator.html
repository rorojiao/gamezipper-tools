<script>
GZI18n.register({
  en: {
    toolTitle: 'Promo Code Generator',
    toolDesc: 'Generate custom promo codes, referral codes, coupon codes and discount codes. Set prefix, length, format and quantity. Free, browser-only, no signup.',

    step2: 'Choose code length and character set',
    step3: 'Set how many unique codes to generate (1-500)',
    step4: 'Click Generate, then Copy All to clipboard',
  },
  zh: {
    toolTitle: '促销码生成器',
    toolDesc: '生成自定义促销码、推荐码、优惠券码和折扣码。设置前缀、长度、格式和数量。免费、浏览器本地运行、无需注册。',
    prefix: '前缀',
    length: '长度',
    charset: '字符集',
    quantity: '数量',
    uppercase: '大写（A-Z 0-9）',
    lowercase: '小写（a-z 0-9）',
    readable: '易读（去除 0/O/1/I）',
    generate: '生成',
    copyAll: '全部复制',
    clear: '清除',
    step1: '可选：输入前缀如 SUMMER 或 SAVE',
    step2: '选择代码长度和字符集',
    step3: '设置要生成多少个唯一码（1-500）',
    step4: '点击「生成」，然后「全部复制」到剪贴板',
  }
});

const { $, copyText, t } = GZ;

const CHARSET = {
  uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789',
  lowercase: 'abcdefghijklmnopqrstuvwxyz0123456789',
  readable:  'ABCDEFGHJKMNPQRSTUVWXYZ23456789'
};

function randInt(min, max) {
  const a = new Uint32Array(1);
  (crypto || window.crypto).getRandomValues(a);
  return min + (a[0] % (max - min + 1));
}

function genCode(len, charset) {
  let s = '';
  for (let i = 0; i < len; i++) s += charset[randInt(0, charset.length - 1)];
  return s;
}

function generate() {
  const prefix = ($('#prefix').value || '').toUpperCase().trim();
  const len = Math.max(3, Math.min(20, +$('#length').value || 8));
  const cs = $('#charset').value;
  const qty = Math.max(1, Math.min(500, +$('#quantity').value || 10));
  const charset = CHARSET[cs] || CHARSET.uppercase;
  const codes = new Set();
  let attempts = 0;
  while (codes.size < qty && attempts < qty * 50) {
    codes.add(prefix + genCode(len, charset));
    attempts++;
  }
  const arr = [...codes];
  let html = '';
  arr.forEach((c, i) => {
    html += `<div class="code-row"><code>${c}</code><button class="mini-copy" onclick="copyText('${c}')">${t('copyAll').split(' ')[0]}</button></div>`;
  });
  html = `<div style="font-size:.85em;opacity:.7;margin:8px 0">${arr.length} codes</div>` + html;
  $('#results').innerHTML = html;
  $('#results').dataset.all = arr.join('\n');
}

function copyAll() {
  const data = $('#results').dataset.all;
  if (!data) return;
  copyText(data);
}

function doClear() { $('#results').innerHTML = ''; $('#results').dataset.all = ''; }

$('#opts').innerHTML = `
  <label>${t('prefix')}</label><input id="prefix" type="text" placeholder="SUMMER" style="width:90px">
  <label>${t('length')}</label><input id="length" type="number" value="8" min="3" max="20" style="width:60px">
  <label>${t('charset')}</label><select id="charset">
    <option value="uppercase">${t('uppercase')}</option>
    <option value="lowercase">${t('lowercase')}</option>
    <option value="readable">${t('readable')}</option>
  </select>
  <label>${t('quantity')}</label><input id="quantity" type="number" value="10" min="1" max="500" style="width:70px">`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyAll()">${t('copyAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
