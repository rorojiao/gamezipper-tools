function getSuggestions(word) {
  const lower = word.toLowerCase();
  const sugs = new Set();
  if (MISSPELL[lower]) sugs.add(MISSPELL[lower]);
  // Simple edit distance: remove one char
  for (let i = 0; i < lower.length; i++) {
    const w = lower.slice(0, i) + lower.slice(i + 1);
    if (DICT.has(w)) sugs.add(w);
  }
  // Swap adjacent
  for (let i = 0; i < lower.length - 1; i++) {
    const w = lower.slice(0, i) + lower[i+1] + lower[i] + lower.slice(i+2);
    if (DICT.has(w)) sugs.add(w);
  }
  // Replace char
  const alpha = 'abcdefghijklmnopqrstuvwxyz';
  for (let i = 0; i < lower.length; i++) {
    for (const c of alpha) {
      const w = lower.slice(0, i) + c + lower.slice(i + 1);
      if (DICT.has(w)) sugs.add(w);
    }
  }
  // Insert char
  for (let i = 0; i <= lower.length; i++) {
    for (const c of alpha) {
      const w = lower.slice(0, i) + c + lower.slice(i);
      if (DICT.has(w)) sugs.add(w);
    }
  }
  return [...sugs].slice(0, 8);
}

function isWord(s) { return /^[a-zA-Z]+([''][a-zA-Z]+)?$/.test(s); }
function cleanWord(s) { return s.replace(/[^a-zA-Z'']/g, ''); }

let fixedText = '';
function checkSpelling() {
  const text = $('#input').value;
  if (!text.trim()) { $('#output').innerHTML = ''; $('#stats').innerHTML = ''; return; }
  let errCount = 0, corrected = 0, wordCount = 0;
  const words = new Set();
  // Tokenize keeping positions
  const tokens = [];
  const re = /[a-zA-Z']+|[^a-zA-Z']+/g;
  let m;
  while ((m = re.exec(text)) !== null) tokens.push({ text: m[0], isWord: /[a-zA-Z]/.test(m[0]), index: m.index });
  let html = '';
  fixedText = '';
  for (const tok of tokens) {
    if (!tok.isWord) { html += escHtml(tok.text); fixedText += tok.text; continue; }
    wordCount++;
    const w = tok.text;
    const clean = cleanWord(w);
    const lower = clean.toLowerCase();
    words.add(lower);
    if (clean.length < 2 || DICT.has(lower) || isRomanNumeral(clean)) {
      html += escHtml(w);
      fixedText += w;
      continue;
    }
    const sugs = getSuggestions(clean);
    errCount++;
    const sugHtml = sugs.map(s => `<div class="sug" data-fix="${escHtml(s)}">${escHtml(s)}</div>`).join('');
    html += `<span class="err" data-original="${escHtml(w)}">${escHtml(w)}<div class="tip"><b>${t('suggestionFor')} "${escHtml(clean)}":</b>${sugHtml ? sugHtml : '<div style="opacity:.6;font-size:.85em">No suggestions</div>'}</div></span>`;
    fixedText += sugs.length ? sugs[0] : w;
  }
  if (errCount === 0) {
    html = `<div style="color:var(--gz-success);padding:12px">${t('noErrors')}</div>` + html;
    $('#output').textContent = '';
    $('#output').innerHTML = html;
  } else {
    $('#output').innerHTML = html;
  }
  $('#stats').innerHTML = `
    <div class="stat"><b>${errCount}</b> ${t('errors')}</div>
    <div class="stat"><b>${wordCount}</b> ${t('words')}</div>
    <div class="stat"><b>${words.size}</b> ${t('unique')}</div>
  `;
  // Attach click handlers for suggestions
  document.querySelectorAll('.sug[data-fix]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const fix = el.dataset.fix;
      const err = el.closest('.err');
      const orig = err.dataset.original;
      // Update textarea
      const textarea = $('#input');
      const idx = textarea.value.indexOf(orig);
      if (idx !== -1) {
        textarea.value = textarea.value.substring(0, idx) + fix + textarea.value.substring(idx + orig.length);
      }
      err.outerHTML = escHtml(fix);
      checkSpelling();
    });
  });
}

function isRomanNumeral(s) { return /^[IVXLCDM]+$/.test(s) && s.length <= 15; }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
