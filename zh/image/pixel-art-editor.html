<script>
GZI18n.register({
  en: {
    toolTitle: 'Pixel Art Editor',
    toolDesc: 'Create pixel art in your browser — draw, erase, pick colors and export as PNG with grid support.',
    gridSize: 'Grid Size', color: 'Color', draw: 'Draw', erase: 'Erase', fill: 'Fill', clear: 'Clear', download: 'Download PNG', showGrid: 'Grid',
    step1: 'Select a canvas size (8x8 to 128x128)',
    step2: 'Pick a color from the palette or use the color picker',
    step3: 'Click or drag on the grid to draw pixels',
    step4: 'Click Download PNG to save your artwork',
  },
  zh: {
    toolTitle: '像素画编辑器',
    toolDesc: '在浏览器中创建像素画——绘制、擦除、选色并导出为 PNG，支持网格显示。',
    gridSize: '画布大小', color: '颜色', draw: '绘制', erase: '擦除', fill: '填充', clear: '清空', download: '下载 PNG', showGrid: '网格',
    step1: '选择画布尺寸（8x8 到 128x128）',
    step2: '从调色板选择颜色或使用取色器',
    step3: '点击或拖拽网格来绘制像素',
    step4: '点击「下载 PNG」保存你的作品',
  }
});

const { $, t } = GZ;

const PALETTE = [
  '#000000','#ffffff','#ff0000','#00ff00','#0000ff','#ffff00','#ff00ff','#00ffff',
  '#ff6600','#6600ff','#00ff66','#ff0066','#333333','#666666','#999999','#cccccc',
  '#8b0000','#006400','#00008b','#8b8b00','#8b008b','#008b8b','#ff9999','#99ff99',
];

let gridSize = 32;
let currentColor = '#000000';
let tool = 'draw';
let showGridLines = true;
let pixels = [];
let isDrawing = false;
const canvas = document.getElementById('pixelCanvas');
const ctx = canvas.getContext('2d');
let cellSize = 12;

function initPixels() {
  pixels = Array.from({length: gridSize}, () => Array(gridSize).fill(null));
}

function render() {
  const size = Math.min(500, window.innerWidth - 40);
  cellSize = Math.max(2, Math.floor(size / gridSize));
  const totalSize = cellSize * gridSize;
  canvas.width = totalSize;
  canvas.height = totalSize;
  for (let y = 0; y < gridSize; y++) {
    for (let x = 0; x < gridSize; x++) {
      if (pixels[y][x]) {
        ctx.fillStyle = pixels[y][x];
      } else {
        ctx.fillStyle = (x + y) % 2 === 0 ? '#f0f0f0' : '#e0e0e0';
      }
      ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
    }
  }
  if (showGridLines && cellSize >= 4) {
    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= gridSize; i++) {
      ctx.beginPath(); ctx.moveTo(i * cellSize, 0); ctx.lineTo(i * cellSize, totalSize); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i * cellSize); ctx.lineTo(totalSize, i * cellSize); ctx.stroke();
    }
  }
}

function getCellFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width) / cellSize);
  const y = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height) / cellSize);
  return { x, y };
}

function paint(x, y) {
  if (x < 0 || x >= gridSize || y < 0 || y >= gridSize) return;
  if (tool === 'draw') pixels[y][x] = currentColor;
  else if (tool === 'erase') pixels[y][x] = null;
  else if (tool === 'fill') floodFill(x, y, pixels[y][x], currentColor);
  render();
}

function floodFill(x, y, targetColor, fillColor) {
  if (targetColor === fillColor) return;
  const stack = [[x, y]];
  const visited = new Set();
  while (stack.length) {
    const [cx, cy] = stack.pop();
    const key = cx + ',' + cy;
    if (visited.has(key)) continue;
    if (cx < 0 || cx >= gridSize || cy < 0 || cy >= gridSize) continue;
    if (pixels[cy][cx] !== targetColor) continue;
    visited.add(key);
    pixels[cy][cx] = fillColor;
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
}

canvas.addEventListener('mousedown', e => { isDrawing = true; const {x,y} = getCellFromEvent(e); paint(x,y); });
canvas.addEventListener('mousemove', e => { if (isDrawing && tool !== 'fill') { const {x,y} = getCellFromEvent(e); paint(x,y); } });
canvas.addEventListener('mouseup', () => isDrawing = false);
canvas.addEventListener('mouseleave', () => isDrawing = false);
canvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing = true; const {x,y} = getCellFromEvent(e.touches[0]); paint(x,y); }, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); if (isDrawing && tool !== 'fill') { const {x,y} = getCellFromEvent(e.touches[0]); paint(x,y); } }, {passive:false});
canvas.addEventListener('touchend', () => isDrawing = false);

function downloadPNG() {
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = gridSize; tmpCanvas.height = gridSize;
  const tmpCtx = tmpCanvas.getContext('2d');
  for (let y = 0; y < gridSize; y++) for (let x = 0; x < gridSize; x++) { if (pixels[y][x]) { tmpCtx.fillStyle = pixels[y][x]; tmpCtx.fillRect(x, y, 1, 1); } }
  const a = document.createElement('a');
  a.download = 'pixel-art-' + gridSize + 'x' + gridSize + '.png';
  a.href = tmpCanvas.toDataURL('image/png');
  a.click();
}

document.getElementById('controls').innerHTML = `
  <label>${t('gridSize')}</label>
  <select id="sel-size">
    <option value="8">8×8</option><option value="16">16×16</option>
    <option value="32" selected>32×32</option><option value="64">64×64</option><option value="128">128×128</option>
  </select>
  <input type="color" id="colorPicker" value="#000000" title="${t('color')}">
  <button class="gz-btn" style="padding:6px 12px;font-size:.8rem" onclick="tool='draw';updateToolBtns()" id="btn-draw">${t('draw')}</button>
  <button class="gz-btn gz-btn-secondary" style="padding:6px 12px;font-size:.8rem" onclick="tool='erase';updateToolBtns()" id="btn-erase">${t('erase')}</button>
  <button class="gz-btn gz-btn-secondary" style="padding:6px 12px;font-size:.8rem" onclick="tool='fill';updateToolBtns()" id="btn-fill">${t('fill')}</button>
  <button class="gz-btn gz-btn-secondary" style="padding:6px 12px;font-size:.8rem" onclick="initPixels();render()">${t('clear')}</button>
  <button class="gz-btn" style="padding:6px 12px;font-size:.8rem" onclick="downloadPNG()">${t('download')}</button>
`;

function updateToolBtns() {
  ['draw','erase','fill'].forEach(tName => {
    const btn = document.getElementById('btn-' + tName);
    if (btn) btn.className = tool === tName ? 'gz-btn' : 'gz-btn gz-btn-secondary';
  });
}

let palHtml = '';
PALETTE.forEach(c => { palHtml += `<div class="swatch${c === currentColor ? ' active' : ''}" style="background:${c}" data-color="${c}"></div>`; });
document.getElementById('palette').innerHTML = palHtml;
document.querySelectorAll('.swatch').forEach(s => {
  s.addEventListener('click', () => {
    currentColor = s.dataset.color;
    document.getElementById('colorPicker').value = currentColor;
    document.querySelectorAll('.swatch').forEach(sw => sw.classList.remove('active'));
    s.classList.add('active');
    tool = 'draw'; updateToolBtns();
  });
});
document.getElementById('colorPicker').addEventListener('input', e => {
  currentColor = e.target.value;
  document.querySelectorAll('.swatch').forEach(sw => sw.classList.remove('active'));
});
document.getElementById('sel-size').addEventListener('change', e => {
  gridSize = parseInt(e.target.value); initPixels(); render();
});

initPixels(); render();
window.addEventListener('resize', render);
updateToolBtns();

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/color/picker.html', name:'Color Picker'},
    {icon:'🌈', href:'/color/palette.html', name:'Palette Generator'},
    {icon:'🖼️', href:'/image/placeholder.html', name:'Placeholder Image'},
    {icon:'⭐', href:'/image/favicon-generator.html', name:'Favicon Generator'},
  ]
});
</script>

</body>
