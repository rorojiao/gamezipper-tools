const { $, copyText, t } = GZ;
let hasHeader = true;
let delimiter = 'auto';
let styleType = 'styled';

function detectDelimiter(text) {
  const first = text.split('\n')[0] || '';
  const counts = { ',': 0, '\t': 0, ';': 0, '|': 0 };
  for (const ch of first) { if (counts[ch] !== undefined) counts[ch]++; }
  let best = ',', max = 0;
  for (const [d, c] of Object.entries(counts)) { if (c > max) { max = c; best = d; } }
  return best;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function parseCSV(text, delim) {
  const rows = [];
  let current = '', inQuotes = false;
  const row = [];

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"') {
        if (i + 1 < text.length && text[i + 1] === '"') { current += '"'; i++; }
        else { inQuotes = false; }
      } else { current += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === delim) { row.push(current.trim()); current = ''; }
      else if (ch === '\n' || (ch === '\r' && text[i + 1] === '\n')) {
        if (ch === '\r') i++;
        row.push(current.trim());
        if (row.some(c => c !== '')) rows.push(row.slice());
        row.length = 0; current = '';
      } else { current += ch; }
    }
  }
  row.push(current.trim());
  if (row.some(c => c !== '')) rows.push(row.slice());
  return rows;
}

function generateHTML(rows) {
  if (!rows.length) return '';
  const maxCols = Math.max(...rows.map(r => r.length));
  const normalized = rows.map(r => { while (r.length < maxCols) r.push(''); return r; });

  let styleAttr = '';
  let tableClass = 'csv-table';
  if (styleType === 'striped') styleAttr = `\n<style>.csv-table{border-collapse:collapse;width:100%}.csv-table th,.csv-table td{padding:8px 12px;text-align:left;border-bottom:1px solid #ddd}.csv-table th{background:#4ecdc4;color:#000}.csv-table tr:nth-child(even){background:#f8f8f8}</style>`;
  else if (styleType === 'bordered') styleAttr = `\n<style>.csv-table{border-collapse:collapse;width:100%}.csv-table th,.csv-table td{padding:8px 12px;text-align:left;border:1px solid #ccc}.csv-table th{background:#eee}</style>`;
  else if (styleType === 'styled') styleAttr = `\n<style>.csv-table{border-collapse:collapse;width:100%;font-family:system-ui,sans-serif;box-shadow:0 2px 8px rgba(0,0,0,.1);border-radius:8px;overflow:hidden}.csv-table th{background:linear-gradient(135deg,#4ecdc4,#44b0a8);color:#000;padding:10px 14px;text-align:left;font-weight:600}.csv-table td{padding:8px 14px;border-bottom:1px solid #eee}.csv-table tr:last-child td{border-bottom:none}.csv-table tr:hover{background:#f0fafa}</style>`;

  let html = styleAttr ? styleAttr + '\n' : '';
  html += `<table class="${tableClass}">\n`;
  let startIdx = 0;
  if (hasHeader && normalized.length > 1) {
    html += '  <thead>\n    <tr>\n';
    normalized[0].forEach(cell => { html += `      <th>${escapeHtml(cell)}</th>\n`; });
    html += '    </tr>\n  </thead>\n';
    startIdx = 1;
  }
  html += '  <tbody>\n';
  for (let i = startIdx; i < normalized.length; i++) {
    html += '    <tr>\n';
    normalized[i].forEach(cell => { html += `      <td>${escapeHtml(cell)}</td>\n`; });
    html += '    </tr>\n';
  }
  html += '  </tbody>\n</table>';
  return html;
}

function doConvert() {
  const text = $('#input').value.trim();
  if (!text) return;
  const d = delimiter === 'auto' ? detectDelimiter(text) : delimiter;
  const rows = parseCSV(text, d);
  const html = generateHTML(rows);
  $('#output').textContent = html;
  $('#preview').innerHTML = html;
  $('#preview-label').textContent = t('previewLabel');
}

function loadExample() {
  $('#input').value = `Name,Age,City,Occupation
Alice Johnson,30,New York,Software Engineer
Bob Smith,25,Los Angeles,Designer
Carol White,35,Chicago,Product Manager
David Brown,28,San Francisco,Data Scientist
Eve Davis,32,Boston,Marketing Lead`;
  doConvert();
}

function doClear() {
  $('#input').value = '';
  $('#output').textContent = '';
  $('#preview').innerHTML = '';
  $('#preview-label').textContent = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <select class="gz-select" onchange="delimiter=this.value;doConvert()">
    <option value="auto">${t('auto')}</option>
    <option value=",">${t('comma')}</option>
    <option value="\t">${t('tab')}</option>
    <option value=";">${t('semicolon')}</option>
    <option value="|">${t('pipe')}</option>
  </select>
  <select class="gz-select" onchange="styleType=this.value;doConvert()">
    <option value="plain">${t('plain')}</option>
    <option value="striped">${t('striped')}</option>
    <option value="bordered">${t('bordered')}</option>
    <option value="styled" selected>${t('styled')}</option>
  </select>
  <label class="gz-check"><input type="checkbox" checked onchange="hasHeader=this.checked;doConvert()"> ${t('header')}</label>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
