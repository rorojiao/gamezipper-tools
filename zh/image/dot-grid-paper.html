<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar no-print" id="toolbar"></div>
    <div class="opt-row no-print" id="options"></div>
    <div id="paper-preview"><canvas id="canvas"></canvas></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{toolTitle:'Dot Grid Paper Generator',toolDesc:'Create free printable dot grid paper for bullet journals. Customize dot spacing, size and color. Download PNG or print as PDF — perfect for BuJo and sketching.',spacing:'Dot Spacing',dotSize:'Dot Size',dotColor:'Dot Color',paperSize:'Paper',bgColor:'Background',generate:'Generate',download:'⬇️ PNG',print:'🖨️ Print',step1:'Choose your paper size (A4, A3, Letter or Legal)',step2:'Set the dot spacing — 5mm (15px) is standard for bullet journals',step3:'Adjust dot size and colors to your preference',step4:'Click Download PNG or Print to save your dot grid paper'},
  zh:{toolTitle:'点阵纸生成器',toolDesc:'创建免费可打印的点阵纸，适合子弹笔记。自定义点间距、大小和颜色。下载 PNG 或打印为 PDF — 非常适合子弹笔记和素描。',spacing:'点间距',dotSize:'点大小',dotColor:'点颜色',paperSize:'纸张',bgColor:'背景色',generate:'生成',download:'⬇️ PNG',print:'🖨️ 打印',step1:'选择纸张大小（A4、A3、Letter 或 Legal）',step2:'设置点间距 — 5mm（约15px）是子弹笔记的标准',step3:'调整点大小和颜色',step4:'点击下载 PNG 或打印保存点阵纸'}
});
const{$,t}=GZ;
const SIZES={a4:{w:595,h:842},a3:{w:842,h:1190},letter:{w:612,h:792},legal:{w:612,h:1008}};

function draw(){
  const size=SIZES[$('#paper-sel').value];
  const spacing=Math.max(5,+$('#spacing').value);
  const dotR=Math.max(0.3,+$('#dot-size').value);
  const dotColor=$('#dot-color').value;
  const bgColor=$('#bg-color').value;
  const c=$('#canvas');
  c.width=size.w;c.height=size.h;
  const ctx=c.getContext('2d');
  ctx.fillStyle=bgColor;ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle=dotColor;
  const margin=spacing;
  for(let y=margin;y<c.height-margin;y+=spacing){
    for(let x=margin;x<c.width-margin;x+=spacing){
      ctx.beginPath();ctx.arc(x,y,dotR,0,Math.PI*2);ctx.fill();
    }
  }
}

function downloadPNG(){
  const link=document.createElement('a');
  link.download='dot-grid-paper.png';
  link.href=$('#canvas').toDataURL('image/png');
  link.click();
}

$('#options').innerHTML=`
  <label>${t('paperSize')}: <select id="paper-sel" class="gz-select" onchange="draw()"><option value="a4">A4</option><option value="a3">A3</option><option value="letter" selected>Letter</option><option value="legal">Legal</option></select></label>
  <label>${t('spacing')}: <input type="number" id="spacing" value="15" min="5" max="40" style="width:60px" onchange="draw()"></label>
  <label>${t('dotSize')}: <input type="number" id="dot-size" value="0.8" min="0.3" max="3" step="0.1" style="width:60px" onchange="draw()"></label>
  <label>${t('dotColor')}: <input type="color" id="dot-color" value="#999999" onchange="draw()"></label>
  <label>${t('bgColor')}: <input type="color" id="bg-color" value="#ffffff" onchange="draw()"></label>`;

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="draw()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadPNG()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="window.print()">${t('print')}</button>`;

draw();
GZ.renderToolPage({
  category:'image',titleKey:'toolTitle',descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'📐',href:'/image/isometric-paper.html',name:'Isometric Paper'},
    {icon:'🎨',href:'/image/pixel-art-editor.html',name:'Pixel Art Editor'},
    {icon:'🖼️',href:'/image/placeholder-image.html',name:'Placeholder Image'},
  ]
});
</script>
