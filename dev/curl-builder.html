.cb-add-btn:hover{border-color:var(--gz-accent);color:var(--gz-accent)}

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="cb-form">
      <div class="cb-row">
        <label>HTTP Method</label>
        <div class="cb-method-row" id="methods"></div>
      </div>
      <div class="cb-row">
        <label>URL <span class="hint">include https://</span></label>
        <input type="text" id="url" class="cb-input" placeholder="https://api.example.com/users">
      </div>
      <div class="cb-row">
        <label>Headers <span class="hint">key: value, one per row</span></label>
        <div id="hdrs"></div>
        <button class="cb-add-btn" onclick="addHdr()">+ Add header</button>
      </div>
      <div class="cb-row">
        <label>Body <span class="hint">JSON, form data, or raw text</span></label>
        <textarea id="body" class="cb-input" rows="6" placeholder='{"name": "John", "email": "john@example.com"}'></textarea>
      </div>
      <div class="cb-row">
        <label>Options</label>
        <div style="display:flex;flex-wrap:wrap;gap:14px;font-size:.85em">
          <label style="font-weight:400"><input type="checkbox" id="optFollow"> Follow redirects (-L)</label>
          <label style="font-weight:400"><input type="checkbox" id="optInsecure" checked> Insecure / skip SSL (-k)</label>
          <label style="font-weight:400"><input type="checkbox" id="optVerbose"> Verbose (-v)</label>
          <label style="font-weight:400">Timeout (s): <input type="number" id="optTimeout" value="30" style="width:70px;padding:4px;border-radius:4px;border:1px solid var(--gz-border);background:var(--gz-bg);color:var(--gz-text)"></label>
        </div>
      </div>
    </div>
    <div>
      <label style="display:block;font-size:.85em;font-weight:600;margin-bottom:6px;color:var(--gz-text)">Generated cURL command</label>
      <pre id="output">curl</pre>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'cURL Command Builder',
    toolDesc: 'Generate cURL commands visually with a point-and-click form. Pick method, add headers, set body and authentication, then copy the ready-to-paste command.',
    step1: 'Select the HTTP method (GET, POST, PUT, DELETE...)',
    step2: 'Enter the full URL you want to call',
    step3: 'Add headers like Content-Type and Authorization',
    step4: 'Click Copy to paste the cURL command into your terminal',
    copy: 'Copy',
    clear: 'Clear',
    example: 'Load Example',
  },
  zh: {
    toolTitle: 'cURL 命令生成器',
    toolDesc: '通过可视化表单生成 cURL 命令。选择 HTTP 方法、添加请求头、设置请求体和认证，然后复制可直接粘贴的命令。',
    step1: '选择 HTTP 方法（GET、POST、PUT、DELETE 等）',
    step2: '输入要调用的完整 URL',
    step3: '添加 Content-Type 和 Authorization 等请求头',
    step4: '点击「复制」将 cURL 命令粘贴到终端',
    copy: '复制',
    clear: '清空',
    example: '加载示例',
  }
});

const { $, copyText, t } = GZ;
let method = 'GET';
let headerCount = 0;

const METHODS = ['GET','POST','PUT','PATCH','DELETE','HEAD','OPTIONS'];

function renderMethods() {
  $('#methods').innerHTML = METHODS.map(m =>
    `<button class="${method === m ? 'active' : ''}" data-m="${m}">${m}</button>`
  ).join('');
}

$('#methods').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (btn) { method = btn.dataset.m; renderMethods(); update(); }
});

function addHdr(k = '', v = '') {
  headerCount++;
  const row = document.createElement('div');
  row.className = 'cb-hdr';
  row.dataset.idx = headerCount;
  row.innerHTML = `
    <input type="text" class="cb-input hdr-k" placeholder="Header name" value="${k}">
    <input type="text" class="cb-input hdr-v" placeholder="Value" value="${v}">
    <button onclick="this.parentElement.remove();update()" title="Remove">✕</button>`;
  $('#hdrs').appendChild(row);
  row.querySelectorAll('input').forEach(i => i.addEventListener('input', update));
}

function shellQuote(s) {
  if (!s) return "''";
  return "'" + s.replace(/'/g, "'\\''") + "'";
}

function update() {
  const url = $('#url').value.trim();
  const parts = ['curl'];
  if (method !== 'GET') parts.push('-X', method);
  if ($('#optFollow').checked) parts.push('-L');
  if ($('#optInsecure').checked) parts.push('-k');
  if ($('#optVerbose').checked) parts.push('-v');
  const timeout = +$('#optTimeout').value;
  if (timeout && timeout !== 30) parts.push('--max-time', String(timeout));

  document.querySelectorAll('#hdrs .cb-hdr').forEach(row => {
    const k = row.querySelector('.hdr-k').value.trim();
    const v = row.querySelector('.hdr-v').value.trim();
    if (k) parts.push('-H', shellQuote(`${k}: ${v}`));
  });

  const body = $('#body').value;
  if (body && method !== 'GET' && method !== 'HEAD') parts.push('-d', shellQuote(body));

  if (url) parts.push(shellQuote(url));
  $('#output').textContent = parts.join(' \\\n  ');
}

['#url','#body','#optFollow','#optInsecure','#optVerbose','#optTimeout'].forEach(sel => {
  $(sel).addEventListener('input', update);
  $(sel).addEventListener('change', update);
});

function loadExample() {
  method = 'POST';
  $('#url').value = 'https://api.github.com/user/repos';
  $('#hdrs').innerHTML = '';
  addHdr('Accept', 'application/vnd.github+json');
  addHdr('Authorization', 'Bearer YOUR_GITHUB_TOKEN');
  addHdr('X-GitHub-Api-Version', '2022-11-28');
  addHdr('User-Agent', 'curl-builder');
  $('#body').value = JSON.stringify({name: 'my-new-repo', description: 'Created with cURL Builder', private: false}, null, 2);
  renderMethods();
  update();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#url').value='';$('#body').value='';$('#hdrs').innerHTML='';update()">${t('clear')}</button>`;

renderMethods();
addHdr('Content-Type', 'application/json');
update();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧪', href:'/dev/api-tester.html', name:'API Tester'},
    {icon:'🔗', href:'/dev/url-encode.html', name:'URL Encode'},
    {icon:'🪙', href:'/dev/jwt.html', name:'JWT Decoder'},
    {icon:'🔐', href:'/dev/base64.html', name:'Base64'},
  ]
});
</script>
