<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-drop" id="dropzone">
      <p>📁 <span id="dropText"></span></p>

      <input type="file" id="fileInput" accept="image/*" style="display:none">

  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Image Rotator & Flipper',
    toolDesc: 'Rotate and flip images online. Rotate by any angle, flip horizontal or vertical. Free and private — all processing in your browser.',
    dropText: 'Drop an image here or click to upload',
    formats: 'PNG, JPG, WebP, BMP, GIF supported',
    rotate90: '↻ 90°', rotate180: '↻ 180°', rotate270: '↻ 270°',
    flipH: '↔ Flip H', flipV: '↕ Flip V',
    angle: 'Angle', download: 'Download',
    downloadPNG: 'PNG', downloadJPG: 'JPG',
    reset: 'Reset', angleText: 'Angle: ',
    step1: 'Upload or drag and drop an image',
    step2: 'Click rotation buttons or drag the angle slider',
    step3: 'Use flip buttons to mirror the image',
    step4: 'Download the result as PNG or JPG',
  },
  zh: {
    toolTitle: '图片旋转翻转工具',
    toolDesc: '在线旋转和翻转图片。支持任意角度旋转、水平/垂直翻转。完全浏览器本地处理。',
    dropText: '拖拽图片到此处或点击上传',
    formats: '支持 PNG、JPG、WebP、BMP、GIF',
    rotate90: '↻ 90°', rotate180: '↻ 180°', rotate270: '↻ 270°',
    flipH: '↔ 水平翻转', flipV: '↕ 垂直翻转',
    angle: '角度', download: '下载',
    downloadPNG: 'PNG', downloadJPG: 'JPG',
    reset: '重置', angleText: '角度：',
    step1: '上传或拖拽图片',
    step2: '点击旋转按钮或拖动角度滑块',
    step3: '使用翻转按钮镜像图片',
    step4: '下载结果为 PNG 或 JPG',
  }
});

const { $, copyText, t } = GZ;
let img = null, rotation = 0, flipX = false, flipY = false;

$('#dropText').textContent = t('dropText');
$('#dropFormats').textContent = t('formats');

const dropzone = $('#dropzone');
const fileInput = $('#fileInput');
dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('dragover'); loadImage(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadImage(fileInput.files[0]); });

function loadImage(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    img = new Image();
    img.onload = () => {
      rotation = 0; flipX = false; flipY = false;
      dropzone.style.display = 'none';
      $('#preview-canvas').style.display = 'block';
      $('#angleDisplay').style.display = 'block';
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function render() {
  if (!img) return;
  const canvas = $('#preview-canvas');
  const ctx = canvas.getContext('2d');
  const rad = rotation * Math.PI / 180;
  const absSin = Math.abs(Math.sin(rad));
  const absCos = Math.abs(Math.cos(rad));
  const w = Math.ceil(img.width * absCos + img.height * absSin);
  const h = Math.ceil(img.width * absSin + img.height * absCos);
  canvas.width = w;
  canvas.height = h;
  ctx.save();
  ctx.translate(w / 2, h / 2);
  ctx.rotate(rad);
  ctx.scale(flipX ? -1 : 1, flipY ? -1 : 1);
  ctx.drawImage(img, -img.width / 2, -img.height / 2);
  ctx.restore();
  $('#angleDisplay').textContent = t('angleText') + rotation + '°' + (flipX ? ' ↔' : '') + (flipY ? ' ↕' : '');
}

function setRotation(deg) { rotation = ((rotation + deg) % 360 + 360) % 360; render(); }
function setFlipX() { flipX = !flipX; render(); }
function setFlipY() { flipY = !flipY; render(); }
function resetAll() { rotation = 0; flipX = false; flipY = false; render(); }

function download(format) {
  const canvas = $('#preview-canvas');
  const a = document.createElement('a');
  a.download = `rotated-image.${format === 'png' ? 'png' : 'jpg'}`;
  a.href = canvas.toDataURL(format === 'png' ? 'image/png' : 'image/jpeg', 0.92);
  a.click();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="setRotation(90)">${t('rotate90')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setRotation(180)">${t('rotate180')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setRotation(270)">${t('rotate270')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setFlipX()">${t('flipH')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setFlipY()">${t('flipV')}</button>
  <input type="range" min="0" max="359" value="0" style="width:120px" oninput="rotation=+this.value;render()">
  <button class="gz-btn gz-btn-secondary" onclick="resetAll()">${t('reset')}</button>
  <button class="gz-btn" onclick="download('png')">📥 ${t('downloadPNG')}</button>
  <button class="gz-btn" onclick="download('jpg')">📥 ${t('downloadJPG')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✂️', href:'/image/cropper.html', name:'Image Cropper'},
    {icon:'📐', href:'/image/resizer.html', name:'Image Resizer'},
    {icon:'🔄', href:'/image/converter.html', name:'Image Converter'},
    {icon:'📦', href:'/image/compressor.html', name:'Image Compressor'},
  ]
});
</script>
