<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a conventional commit?", "acceptedAnswer": {"@type": "Answer", "text": "A conventional commit follows the format type(scope): subject. The type (feat, fix, docs, refactor, etc.) tells reviewers what kind of change it is, the scope names the affected module, and the subject is a short imperative description. This structure enables auto-generated changelogs and semantic versioning."}}, {"@type": "Question", "name": "How do I write a good commit message subject?", "acceptedAnswer": {"@type": "Answer", "text": "Keep it under 50 characters, use the imperative mood (Add login button, not Added), do not end with a period, and capitalize the first letter. The subject should complete the sentence If applied, this commit will ___."}}, {"@type": "Question", "name": "How do I indicate a breaking change?", "acceptedAnswer": {"@type": "Answer", "text": "Add a ! after the type/scope (feat!: drop support for Node 14) or include a BREAKING CHANGE: footer describing what changed and the migration path. Both are part of the Conventional Commits specification."}}, {"@type": "Question", "name": "Is my commit message data sent anywhere?", "acceptedAnswer": {"@type": "Answer", "text": "No. This tool runs entirely in your browser. Nothing you type is uploaded to any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-form" id="form"></div>
    <div class="gz-output-code" id="output"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Commit Message Generator',
    toolDesc: 'Write clean Conventional Commits in seconds. Pick a type, add a scope and subject, then copy a ready-to-paste git commit message.',
    lblType: 'Type',
    lblScope: 'Scope (optional)',
    lblSubject: 'Subject',
    lblBody: 'Body (optional)',
    lblFooter: 'Footer (optional)',
    scopePh: 'auth, api, ui ...',
    subjectPh: 'add login with Google OAuth',
    bodyPh: 'Explain what and why (wrap at ~72 chars)...',
    footerPh: 'Closes #123, Co-authored-by: ...',
    breaking: 'Breaking change',
    useEmoji: 'Add gitmoji prefix',
    wrapBody: 'Wrap body at 72 chars',
    copy: 'Copy', clear: 'Clear', example: 'Load Example',
    step1: 'Choose a commit type (feat, fix, docs, refactor, ...)',
    step2: 'Add an optional scope and a short imperative subject',
    step3: 'Optionally add a body, footer, or mark a breaking change',
    step4: 'Click Copy and paste it straight into git commit',
    out_ph: 'Your commit message will appear here...',
  },
  zh: {
    toolTitle: '提交信息生成器',
    toolDesc: '几秒钟写出规范的 Conventional Commits 提交信息。选择类型、填写范围和主题，即可复制可直接粘贴的 git 提交信息。',
    lblType: '类型',
    lblScope: '范围（可选）',
    lblSubject: '主题',
    lblBody: '正文（可选）',
    lblFooter: '页脚（可选）',
    scopePh: 'auth, api, ui ...',
    subjectPh: '添加 Google OAuth 登录',
    bodyPh: '说明做了什么以及为什么（建议每行约 72 字符）...',
    footerPh: 'Closes #123, Co-authored-by: ...',
    breaking: '破坏性变更',
    useEmoji: '添加 gitmoji 前缀',
    wrapBody: '正文按 72 字符换行',
    copy: '复制', clear: '清空', example: '加载示例',
    step1: '选择提交类型（feat、fix、docs、refactor 等）',
    step2: '填写可选的范围和简短的主题（祈使句）',
    step3: '可选：添加正文、页脚，或标记破坏性变更',
    step4: '点击复制，直接粘贴到 git commit',
    out_ph: '提交信息将显示在这里...',
  }
});

const { $, copyText, t } = GZ;

const TYPES = [
  { key: 'feat',  emo: '✨', zh: '新功能',  en: 'A new feature' },
  { key: 'fix',   emo: '🐛', zh: '修复',    en: 'A bug fix' },
  { key: 'docs',  emo: '📝', zh: '文档',    en: 'Documentation only' },
  { key: 'style', emo: '💄', zh: '格式',    en: 'Formatting, no code change' },
  { key: 'refactor', emo: '♻️', zh: '重构', en: 'Code change that neither fixes a bug nor adds a feature' },
  { key: 'perf',  emo: '⚡', zh: '性能',    en: 'A code change that improves performance' },
  { key: 'test',  emo: '✅', zh: '测试',    en: 'Adding or correcting tests' },
  { key: 'build', emo: '📦', zh: '构建',    en: 'Build system or external dependencies' },
  { key: 'ci',    emo: '👷', zh: 'CI',      en: 'CI configuration files and scripts' },
  { key: 'chore', emo: '🔧', zh: '杂务',    en: 'Other changes that don\'t modify src or test' },
  { key: 'revert',emo: '⏪', zh: '回退',    en: 'Reverts a previous commit' },
  { key: 'wip',   emo: '🚧', zh: '进行中',  en: 'Work in progress' },
];

let state = { type: 'feat', scope: '', subject: '', body: '', footer: '', breaking: false, emoji: false, wrap: true };

function renderTypeGrid() {
  const lang = (GZI18n.getLang ? GZI18n.getLang() : 'en');
  $('#type-grid').innerHTML = TYPES.map(ty => `
    <button type="button" class="gz-type-card${ty.key===state.type?' active':''}" onclick="setType('${ty.key}')">
      <span class="emo">${ty.emo}</span>
      <span class="nm">${ty.key}</span>
      <span class="dc">${lang==='zh'?ty.zh:ty.en}</span>
    </button>`).join('');
}

function setType(k){ state.type=k; renderTypeGrid(); build(); }

$('#form').innerHTML = `
  <div><label>${t('lblType')}</label><div class="gz-type-grid" id="type-grid"></div></div>
  <div class="gz-row">
    <div><label>${t('lblScope')}</label><input type="text" id="inp-scope" placeholder="${t('scopePh')}" oninput="state.scope=this.value;build()"></div>
    <div><label>${t('lblSubject')}</label><input type="text" id="inp-subject" placeholder="${t('subjectPh')}" oninput="state.subject=this.value;build()"></div>
  </div>
  <div><label>${t('lblBody')}</label><textarea id="inp-body" placeholder="${t('bodyPh')}" oninput="state.body=this.value;build()"></textarea></div>
  <div><label>${t('lblFooter')}</label><textarea id="inp-footer" placeholder="${t('footerPh')}" oninput="state.footer=this.value;build()"></textarea></div>
  <div class="gz-row">
    <label class="gz-checkbox"><input type="checkbox" id="inp-breaking" onchange="state.breaking=this.checked;build()"> ${t('breaking')}</label>
    <label class="gz-checkbox"><input type="checkbox" id="inp-emoji" onchange="state.emoji=this.checked;build()"> ${t('useEmoji')}</label>
  </div>
  <label class="gz-checkbox"><input type="checkbox" id="inp-wrap" checked onchange="state.wrap=this.checked;build()"> ${t('wrapBody')}</label>
`;

function wrapText(text, width){
  return text.split('\n').map(line=>{
    if(line.length<=width) return line;
    const out=[]; let cur='';
    line.split(' ').forEach(w=>{
      if((cur+' '+w).trim().length>width){ if(cur)out.push(cur); cur=w; }
      else cur=(cur+' '+w).trim();
    });
    if(cur)out.push(cur);
    return out.join('\n');
  }).join('\n');
}

function build(){
  const ty = TYPES.find(x=>x.key===state.type) || TYPES[0];
  const scope = state.scope.trim();
  const subject = state.subject.trim();
  const prefix = state.emoji ? ty.emo + ' ' : '';
  const head = `${state.type}${scope?'('+scope+')':''}${state.breaking?'!':''}:${subject?(' '+subject):''}`;
  let out = prefix + head;
  if(state.body.trim()){
    const body = state.wrap ? wrapText(state.body.trim(),72) : state.body.trim();
    out += '\n\n' + body;
  }
  if(state.footer.trim()){
    const foot = state.wrap ? wrapText(state.footer.trim(),72) : state.footer.trim();
    out += '\n\n' + foot;
  }
  if(state.breaking && !/BREAKING CHANGE/i.test(state.footer)){
    // keep as-is; the ! marker already signals it
  }
  $('#output').textContent = out.trim() || t('out_ph');
}

function loadExample(){
  state = { type:'feat', scope:'auth', subject:'add Google OAuth login flow', body:'Users can now sign in with their Google account.\nToken refresh and silent re-auth are handled automatically.\nFalls back to email/password if OAuth is unavailable.', footer:'Closes #142', breaking:false, emoji:true, wrap:true };
  $('#inp-scope').value='auth'; $('#inp-subject').value='add Google OAuth login flow';
  $('#inp-body').value='Users can now sign in with their Google account.\nToken refresh and silent re-auth are handled automatically.\nFalls back to email/password if OAuth is unavailable.';
  $('#inp-footer').value='Closes #142'; $('#inp-breaking').checked=false; $('#inp-emoji').checked=true; $('#inp-wrap').checked=true;
  renderTypeGrid(); build();
}

function doClear(){
  state = { type:'feat', scope:'', subject:'', body:'', footer:'', breaking:false, emoji:false, wrap:true };
  ['inp-scope','inp-subject','inp-body','inp-footer'].forEach(id=>$('#'+id).value='');
  $('#inp-breaking').checked=false; $('#inp-emoji').checked=false; $('#inp-wrap').checked=true;
  renderTypeGrid(); build();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

renderTypeGrid();
build();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📋', href:'/dev/changelog-generator.html', name:'Changelog Generator'},
    {icon:'🚫', href:'/dev/gitignore-generator.html', name:'.gitignore Generator'},
    {icon:'🔀', href:'/dev/git-branch-generator.html', name:'Git Branch Generator'},
    {icon:'📜', href:'/dev/git-commands.html', name:'Git Commands'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
