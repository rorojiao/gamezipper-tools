<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Unit Converter',
    toolDesc: 'Convert px to rem, rem to px, em, pt, vw, vh and more. Instant CSS unit conversion for responsive web design.',
    value: 'Value',
    fromUnit: 'From Unit',
    rootSize: 'Root Font Size (px)',
    viewportW: 'Viewport Width (px)',
    quickTable: 'Quick Reference Table (root = 16px)',
    step1: 'Enter a value and select the source unit (px, rem, em, pt, vw, vh, %)',
    step2: 'Set the root font size (default 16px) for accurate rem/em conversion',
    step3: 'Set the viewport width for vw/vh calculations',
    step4: 'Click any result value to copy it to clipboard',
  },
  zh: {
    toolTitle: 'CSS 单位转换器',
    toolDesc: '在 px、rem、em、pt、vw、vh 等单位之间即时转换。响应式网页设计必备工具。',
    value: '数值',
    fromUnit: '源单位',
    rootSize: '根字体大小 (px)',
    viewportW: '视口宽度 (px)',
    quickTable: '快速参考表（根 = 16px）',
    step1: '输入数值并选择源单位（px、rem、em、pt、vw、vh、%）',
    step2: '设置根字体大小（默认 16px）以获得准确的 rem/em 转换',
    step3: '设置视口宽度用于 vw/vh 计算',
    step4: '点击任意结果值即可复制到剪贴板',
  }
});

const { $, copyText, t } = GZ;

const PT_PER_PX = 0.75; // 1px = 0.75pt, 1pt = 1.333px

function toPx(val, unit, rootSize, vpW) {
  switch(unit) {
    case 'px': return val;
    case 'rem': return val * rootSize;
    case 'em': return val * rootSize; // approximate: same as rem for root context
    case 'pt': return val / PT_PER_PX;
    case 'vw': return val / 100 * vpW;
    case 'vh': return val / 100 * vpW; // approximate viewport
    case '%': return val / 100 * rootSize;
    default: return val;
  }
}

function fromPx(px, unit, rootSize, vpW) {
  switch(unit) {
    case 'px': return px;
    case 'rem': return px / rootSize;
    case 'em': return px / rootSize;
    case 'pt': return px * PT_PER_PX;
    case 'vw': return px / vpW * 100;
    case 'vh': return px / vpW * 100;
    case '%': return px / rootSize * 100;
    default: return px;
  }
}

function fmt(n) {
  if (!isFinite(n) || isNaN(n)) return '—';
  return Math.abs(n) < 0.0001 ? n.toExponential(2) :
         Math.abs(n) >= 1000 ? n.toFixed(0) :
         Math.abs(n) >= 1 ? (Math.round(n * 10000) / 10000).toString() :
         (Math.round(n * 1000000) / 1000000).toString();
}

function convert() {
  const val = parseFloat($('#inputValue').value) || 0;
  const from = $('#fromUnit').value;
  const rootSize = parseFloat($('#rootSize').value) || 16;
  const vpW = parseFloat($('#viewportW').value) || 1920;

  const px = toPx(val, from, rootSize, vpW);
  const units = ['px','rem','em','pt','vw','vh','%'];

  $('#results').innerHTML = units.filter(u => u !== from).map(u => {
    const converted = fromPx(px, u, rootSize, vpW);
    return `<div class="unit-row">
      <span class="unit-name">${u}</span>
      <span class="unit-val">${fmt(converted)}${u}</span>
      <button class="gz-btn gz-btn-secondary" onclick="copyText('${fmt(converted)}${u}')">${t('copy')}</button>
    </div>`;
  }).join('');

  // Quick reference table
  const quickVals = [8, 10, 12, 14, 16, 18, 20, 24, 28, 32, 40, 48, 56, 64, 72, 96, 128];
  $('#quickTable').innerHTML = `<table style="width:100%;font-size:.8em;margin-top:8px;border-collapse:collapse">
    <thead><tr style="text-align:left;border-bottom:1px solid var(--gz-border,rgba(255,255,255,.15))">
      <th style="padding:6px">px</th><th>rem</th><th>em</th><th>pt</th><th>%</th>
    </tr></thead>
    <tbody>${quickVals.map(v => {
      const rem = v / rootSize;
      return `<tr style="border-bottom:1px solid var(--gz-border,rgba(255,255,255,.05))">
        <td style="padding:5px 6px;font-family:monospace">${v}px</td>
        <td style="font-family:monospace;cursor:pointer;color:var(--gz-link,#5bf)" onclick="copyText('${fmt(rem)}rem')">${fmt(rem)}rem</td>
        <td style="font-family:monospace;cursor:pointer;color:var(--gz-link,#5bf)" onclick="copyText('${fmt(rem)}em')">${fmt(rem)}em</td>
        <td style="font-family:monospace;cursor:pointer;color:var(--gz-link,#5bf)" onclick="copyText('${fmt(v*PT_PER_PX)}pt')">${fmt(v*PT_PER_PX)}pt</td>
        <td style="font-family:monospace;cursor:pointer;color:var(--gz-link,#5bf)" onclick="copyText('${fmt(v/rootSize*100)}%')">${fmt(v/rootSize*100)}%</td>
      </tr>`;
    }).join('')}
    </tbody>
  </table>`;
}

['inputValue','fromUnit','rootSize','viewportW'].forEach(id => {
  $('#'+id).addEventListener('input', convert);
  $('#'+id).addEventListener('change', convert);
});

$('#lbl-value').textContent = t('value');
$('#lbl-fromunit').textContent = t('fromUnit');
$('#lbl-rootsize').textContent = t('rootSize');
$('#lbl-viewportw').textContent = t('viewportW');
$('#lbl-quicktable').textContent = t('quickTable');

convert();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/css-tools/border-radius.html', name:'Border Radius'},
    {icon:'🎨', href:'/css-tools/css-gradient.html', name:'CSS Gradient'},
    {icon:'🔳', href:'/dev/px-rem.html', name:'px ↔ rem'},
    {icon:'📐', href:'/calc/dpi-calculator.html', name:'DPI Calculator'},
  ]
});
</script>
