<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is battery charge time calculated?", "acceptedAnswer": {"@type": "Answer", "text": "Charge time = battery capacity ÷ charge current × efficiency factor. A 2000 mAh battery charged at 1000 mA needs about 2 hours ideally; multiply by 1.2-1.5 for Li-ion and 1.4-1.65 for NiMH to account for charging losses."}}, {"@type": "Question", "name": "Why does charging take longer than the raw math?", "acceptedAnswer": {"@type": "Answer", "text": "No charging process is 100% efficient. Li-ion uses a constant-current/constant-voltage curve where the final 20% slows down. NiMH warms up and loses energy as heat. Lead-acid and LiFePO4 also have absorption stages. The efficiency factor models these losses."}}, {"@type": "Question", "name": "Should I use mAh, Ah or Wh?", "acceptedAnswer": {"@type": "Answer", "text": "mAh and Ah both work as long as your charger current uses the matching unit (mA with mAh, A with Ah). For Wh (watt-hours), enter it and a charger power in watts — the calculator converts automatically. Use one system consistently."}}, {"@type": "Question", "name": "What if the battery is partially charged?", "acceptedAnswer": {"@type": "Answer", "text": "Set the current charge percentage and the tool scales the remaining capacity accordingly — a 3000 mAh battery at 40% only needs about 60% of its capacity topped up, shortening the charge time proportionally."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="bc-form">
      <div><label id="lbl-cap"></label><input type="number" id="cap" min="0" step="any" value="3000"></div>
      <div><label id="lbl-capu"></label><select id="capu">
        <option value="mAh">mAh</option>
        <option value="Ah">Ah</option>
        <option value="Wh">Wh</option>
      </select></div>
      <div><label id="lbl-cur"></label><input type="number" id="cur" min="0" step="any" value="1000"></div>
      <div><label id="lbl-curu"></label><select id="curu">
        <option value="mA">mA</option>
        <option value="A">A</option>
        <option value="W">W (power)</option>
      </select></div>
      <div><label id="lbl-v"></label><input type="number" id="volt" min="0" step="any" value="3.7"></div>
      <div><label id="lbl-chem"></label><select id="chem">
        <option value="1.4">Li-ion / LiPo</option>
        <option value="1.6">NiMH / NiCd</option>
        <option value="1.25">Lead-acid (SLA)</option>
        <option value="1.2">LiFePO4</option>
        <option value="1.0">Ideal (100%)</option>
      </select></div>
      <div><label id="lbl-now"></label><input type="number" id="now" min="0" max="100" step="1" value="0"></div>
    </div>
    <div class="bc-out">
      <div class="bc-card"><div class="bc-big" id="hours">—</div><div class="bc-lbl" id="hours-lbl"></div></div>
      <div class="bc-card"><div class="bc-big" id="hms">—</div><div class="bc-lbl" id="hms-lbl"></div></div>
      <div class="bc-card"><div class="bc-big" id="rate">—</div><div class="bc-lbl" id="rate-lbl"></div></div>
    </div>
    <p class="note" id="note"></p>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Battery Charge Time Calculator',
    toolDesc: 'Estimate how long it takes to fully charge any battery from its capacity and charger current or power, with chemistry-aware efficiency.',
    capacity: 'Capacity', capUnit: 'Cap. unit', current: 'Charger current', curUnit: 'Current unit',
    voltage: 'Nominal voltage (V)', chemistry: 'Battery type', now: 'Current charge %',
    example: 'Load Example', clear: 'Clear',
    hoursOut: 'hours to full', hmsOut: 'hours : min', rateOut: 'C-rate',
    note: 'Estimates include charging losses: Li-ion ~1.4×, LiFePO4 ~1.2×, NiMH ~1.6×, lead-acid ~1.25×. Real time varies with temperature, age, charger quality and BMS limits. Never exceed the manufacturer\'s max charge rate.',
    step1: 'Enter the battery capacity in mAh, Ah or Wh',
    step2: 'Enter the charger current (mA/A) or power (W)',
    step3: 'Pick the battery type and set the current charge level',
    step4: 'Read the estimated time to full charge',
  },
  zh: {
    toolTitle: '电池充电时间计算器',
    toolDesc: '根据电池容量和充电电流或功率，结合不同化学体系的效率损耗，估算将任意电池充满所需的时间。',
    capacity: '容量', capUnit: '容量单位', current: '充电电流', curUnit: '电流单位',
    voltage: '标称电压（V）', chemistry: '电池类型', now: '当前电量 %',
    example: '加载示例', clear: '清空',
    hoursOut: '小时充满', hmsOut: '时 : 分', rateOut: '充电倍率 C',
    note: '估算已含充电损耗：锂离子约 1.4×、磷酸铁锂约 1.2×、镍氢约 1.6×、铅酸约 1.25×。实际时间受温度、老化、充电器品质和 BMS 限制影响。请勿超过厂商标称的最大充电倍率。',
    step1: '输入电池容量（mAh、Ah 或 Wh）',
    step2: '输入充电电流（mA/A）或功率（W）',
    step3: '选择电池类型并设置当前电量',
    step4: '查看充满电所需的估算时间',
  }
});
const { $, t } = GZ;

function calc(){
  const cap = +$('#cap').value || 0;
  const capU = $('#capu').value;
  const cur = +$('#cur').value || 0;
  const curU = $('#curu').value;
  const volt = +$('#volt').value || 3.7;
  const factor = +$('#chem').value;
  const nowPct = Math.min(100, Math.max(0, +$('#now').value || 0));

  // Normalize everything to mAh and mA (or Wh and W) consistently
  let cap_mAh, cur_mA;
  // Capacity → mAh
  if (capU==='mAh') cap_mAh = cap;
  else if (capU==='Ah') cap_mAh = cap*1000;
  else /* Wh → mAh using voltage */ cap_mAh = volt>0 ? (cap/volt)*1000 : 0;
  // Current → mA
  if (curU==='mA') cur_mA = cur;
  else if (curU==='A') cur_mA = cur*1000;
  else /* W → mA using voltage */ cur_mA = volt>0 ? (cur/volt)*1000 : 0;

  if (cap_mAh<=0 || cur_mA<=0){
    $('#hours').textContent='—'; $('#hms').textContent='—'; $('#rate').textContent='—'; return;
  }

  const remaining = cap_mAh * (1 - nowPct/100);
  const hours = (remaining / cur_mA) * factor;
  const cRate = cur_mA / cap_mAh; // per-hour fraction

  $('#hours').textContent = hours.toFixed(2);
  const h = Math.floor(hours);
  const m = Math.round((hours-h)*60);
  $('#hms').textContent = `${h}h ${m}m`;
  $('#rate').textContent = cRate.toFixed(2) + ' C';
}

function setLabels(){
  $('#lbl-cap').textContent=t('capacity'); $('#lbl-capu').textContent=t('capUnit');
  $('#lbl-cur').textContent=t('current'); $('#lbl-curu').textContent=t('curUnit');
  $('#lbl-v').textContent=t('voltage'); $('#lbl-chem').textContent=t('chemistry');
  $('#lbl-now').textContent=t('now');
  $('#hours-lbl').textContent=t('hoursOut'); $('#hms-lbl').textContent=t('hmsOut'); $('#rate-lbl').textContent=t('rateOut');
  $('#note').textContent=t('note');
}
setLabels();
$('#toolbar').innerHTML=`
  <button class="gz-btn gz-btn-secondary" onclick="loadEx()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;
['cap','capu','cur','curu','volt','chem','now'].forEach(id=>$('#'+id).addEventListener('input',calc));

function loadEx(){ $('#cap').value=5000; $('#capu').value='mAh'; $('#cur').value='2000'; $('#curu').value='mA'; $('#volt').value='3.7'; $('#chem').value='1.4'; $('#now').value='20'; calc(); }
function clearAll(){ $('#cap').value=''; $('#cur').value=''; calc(); }

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔋', href:'/calc/battery-life-calculator.html', name:'Battery Life'},
    {icon:'⚡', href:'/calc/ohms-law-calculator.html', name:'Ohm\'s Law'},
    {icon:'🔌', href:'/calc/wattage-calculator.html', name:'Wattage Calculator'},
    {icon:'⏱️', href:'/calc/time-calculator.html', name:'Time Calculator'},
  ]
});

calc();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
