<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Flip Card Generator',
    toolDesc: 'Design interactive CSS flip card effects with live preview — customize content, colors, direction and perspective, then copy production-ready code.',
    frontText: 'Front text',
    backText: 'Back text',
    frontBg: 'Front BG',
    backBg: 'Back BG',
    textColor: 'Text color',
    direction: 'Direction',
    borderRadius: 'Radius',
    cardWidth: 'Width (px)',
    cardHeight: 'Height (px)',
    preview: '👆 Hover or click to preview flip',
    generate: 'Generate Code',
    copy: 'Copy Code',
    step1: 'Set front and back text, colors and dimensions',
    step2: 'Choose flip direction (horizontal or vertical)',
    step3: 'Hover or click the preview card to see the effect',
    step4: 'Click Generate Code and copy the result',
  },
  zh: {
    toolTitle: 'CSS 翻转卡片生成器',
    toolDesc: '设计交互式 CSS 翻转卡片效果，实时预览 — 自定义内容、颜色、方向和透视，复制即用代码。',
    frontText: '正面文字',
    backText: '背面文字',
    frontBg: '正面背景',
    backBg: '背面背景',
    textColor: '文字颜色',
    direction: '翻转方向',
    borderRadius: '圆角',
    cardWidth: '宽度 (px)',
    cardHeight: '高度 (px)',
    preview: '👆 悬停或点击预览翻转效果',
    generate: '生成代码',
    copy: '复制代码',
    step1: '设置正面和背面的文字、颜色和尺寸',
    step2: '选择翻转方向（水平或垂直）',
    step3: '悬停或点击预览卡片查看效果',
    step4: '点击生成代码并复制结果',
  }
});

const { $, copyText, t } = GZ;
const card = $('#flip-card');

function update() {
  const ft = $('#front-text').value, bt = $('#back-text').value;
  const fbg = $('#front-bg').value, bbg = $('#back-bg').value, tc = $('#text-color').value;
  const dir = $('#direction').value, r = $('#radius').value;
  const w = $('#card-w').value || 280, h = $('#card-h').value || 360;
  $('#radius-val').textContent = r + 'px';
  const stage = $('#stage');
  stage.style.width = w + 'px'; stage.style.height = h + 'px';
  stage.style.perspective = '800px';
  const ff = $('#front-face'), bf = $('#back-face');
  ff.textContent = ft; ff.style.background = fbg; ff.style.color = tc; ff.style.borderRadius = r + 'px';
  bf.textContent = bt; bf.style.background = bbg; bf.style.color = tc; bf.style.borderRadius = r + 'px';
  card.classList.remove('flipped');
  if (dir === 'X') {
    card.style.transform = ''; bf.style.transform = 'rotateX(180deg)';
  } else {
    card.style.transform = ''; bf.style.transform = 'rotateY(180deg)';
  }
}

function generateCode() {
  const ft = $('#front-text').value, bt = $('#back-text').value;
  const fbg = $('#front-bg').value, bbg = $('#back-bg').value, tc = $('#text-color').value;
  const dir = $('#direction').value, r = $('#radius').value;
  const w = $('#card-w').value || 280, h = $('#card-h').value || 360;
  const rot = dir === 'X' ? 'X' : 'Y';
  const code = `<!-- CSS Flip Card -->
<style>
.flip-card-container {
  perspective: 800px;
  width: ${w}px;
  height: ${h}px;
}
.flip-card {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s ease;
}
.flip-card:hover {
  transform: rotate${rot}(180deg);
}
.flip-card .front,
.flip-card .back {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: ${r}px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
  box-sizing: border-box;
  color: ${tc};
  font-size: 1.1em;
}
.flip-card .front { background: ${fbg}; }
.flip-card .back { background: ${bbg}; transform: rotate${rot}(180deg); }
</style>

<div class="flip-card-container">
  <div class="flip-card">
    <div class="front">${ft}</div>
    <div class="back">${bt}</div>
  </div>
</div>`;
  $('#output').textContent = code;
}

document.querySelectorAll('#front-text,#back-text,#direction').forEach(el => el.addEventListener('input', update));
document.querySelectorAll('#front-bg,#back-bg,#text-color').forEach(el => el.addEventListener('input', update));
$('#radius').addEventListener('input', update);
$('#card-w').addEventListener('input', update);
$('#card-h').addEventListener('input', update);

card.addEventListener('click', () => card.classList.toggle('flipped'));
card.addEventListener('mouseenter', () => card.classList.add('flipped'));
card.addEventListener('mouseleave', () => card.classList.remove('flipped'));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generateCode()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>`;

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔲', href:'/css-tools/box-model.html', name:'Box Model'},
    {icon:'🔘', href:'/css-tools/border-radius.html', name:'Border Radius'},
    {icon:'🎬', href:'/css-tools/animation.html', name:'Animation'},
    {icon:'🔄', href:'/css-tools/transform.html', name:'Transform'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
