<select id="activity">
<option value="1.2">Sedentary (desk job, no exercise)</option>
<option value="1.375">Light (light exercise 1-3 days/wk)</option>
<option value="1.55" selected>Moderate (exercise 3-5 days/wk)</option>
<option value="1.725">Active (intense exercise 6-7 days/wk)</option>
<option value="1.9">Very Active (physical job + training)</option>
</select>
</div>
</div>

<div class="kcal-big"><span id="tdee">2460</span><small id="tdee-lbl">Daily calories (TDEE)</small></div>
<div class="kcal-row"><span id="r-bmr-lbl">Basal Metabolic Rate (BMR)</span><b><span id="bmr">1680</span> kcal</b></div>
<div class="kcal-row"><span id="r-loss-lbl">Fat loss (mild, -10%)</span><b><span id="loss-mild">2215</span> kcal</b></div>

<script>
GZI18n.register({
en:{
toolTitle:'Calorie Calculator',
toolDesc:'Calculate your daily calorie needs (TDEE) and macro breakdown using the Mifflin-St Jeor formula — supports metric and imperial units, and 5 activity levels.',
lblSex:'Sex',lblAge:'Age (years)',lblWeight:'Weight (kg)',lblHeight:'Height (cm)',lblActivity:'Activity Level',
sexM:'Male',sexF:'Female',
a0:'Sedentary (desk job, no exercise)',a1:'Light (light exercise 1-3 days/wk)',a2:'Moderate (exercise 3-5 days/wk)',a3:'Active (intense exercise 6-7 days/wk)',a4:'Very Active (physical job + training)',
metricBtn:'Metric (kg/cm)',imperialBtn:'Imperial (lb/in)',
tdeeLbl:'Daily calories (TDEE)',
rBmr:'Basal Metabolic Rate (BMR)',
rLossMild:'Fat loss (mild, -10%)',rLossStd:'Fat loss (standard, -20%)',rLossAggr:'Fat loss (aggressive, -30%)',rGain:'Muscle gain (+15%)',
mPro:'Protein',mCarb:'Carbs',mFat:'Fat',
step1:'Enter your age, sex, weight, height and activity level',
step2:'See your BMR and TDEE update instantly',
step3:'Review calorie targets for fat loss, maintenance and muscle gain',
step4:'Check the macro breakdown (protein, carbs, fat) for your goal',
},
zh:{
toolTitle:'卡路里计算器',
toolDesc:'使用 Mifflin-St Jeor 公式计算每日卡路里需求（TDEE）和宏量营养素分配 — 支持公制和英制单位，5 种活动水平。',
lblSex:'性别',lblAge:'年龄（岁）',lblWeight:'体重 (kg)',lblHeight:'身高 (cm)',lblActivity:'活动水平',
sexM:'男',sexF:'女',
a0:'久坐（办公室工作，无运动）',a1:'轻度（每周 1-3 天轻度运动）',a2:'中度（每周 3-5 天运动）',a3:'活跃（每周 6-7 天高强度运动）',a4:'非常活跃（体力工作+训练）',
metricBtn:'公制 (kg/cm)',imperialBtn:'英制 (lb/in)',
tdeeLbl:'每日卡路里（TDEE）',
rBmr:'基础代谢率（BMR）',
rLossMild:'减脂（轻度，-10%）',rLossStd:'减脂（标准，-20%）',rLossAggr:'减脂（激进，-30%）',rGain:'增肌（+15%）',
mPro:'蛋白质',mCarb:'碳水',mFat:'脂肪',
step1:'输入您的年龄、性别、体重、身高和活动水平',
step2:'即时查看 BMR 和 TDEE',
step3:'查看减脂、维持和增肌的卡路里目标',
step4:'查看目标对应的宏量营养素（蛋白质、碳水、脂肪）',
}
});

const {$,t}=GZ;
let unit='metric';
const activityKeys=['a0','a1','a2','a3','a4'];

function setUnit(u){
  unit=u;
  const isMetric=u==='metric';
  $('#w-wrap label').textContent=isMetric?t('lblWeight'):'Weight (lb)';
  $('#h-wrap label').textContent=isMetric?t('lblHeight'):'Height (in)';
  $('#unitTabs button').forEach(b=>b.classList.toggle('gz-btn-secondary',b.dataset.u!==u));
  calc();
}

function populateActivity(){
  const sel=$('#activity');
  const keys=activityKeys;
  sel.innerHTML='';
  for(let i=0;i<keys.length;i++){
    const o=document.createElement('option');
    o.value=(1.2+i*0.175).toFixed(3);
    o.textContent=t(keys[i]);
    sel.appendChild(o);
  }
  sel.value='1.55';
}

function calc(){
  let w=+($('#weight').value)||0;
  let h=+($('#height').value)||0;
  const age=+($('#age').value)||0;
  const sex=$('#sex').value;
  const act=+($('#activity').value);
  if(unit==='imperial'){w=w*0.453592;h=h*2.54;}
  if(!w||!h||!age)return;
  // Mifflin-St Jeor
  let bmr=10*w+6.25*h-5*age+(sex==='male'?5:-161);
  const tdee=bmr*act;
  $('#bmr').textContent=Math.round(bmr);
  $('#tdee').textContent=Math.round(tdee);
  $('#loss-mild').textContent=Math.round(tdee*0.9);
  $('#loss-std').textContent=Math.round(tdee*0.8);
  $('#loss-aggr').textContent=Math.round(tdee*0.7);
  $('#gain').textContent=Math.round(tdee*1.15);
  // Macros for maintenance: 1.6g pro, 0.8g fat per kg, rest carbs
  const pro=Math.round(w*1.6);
  const fat=Math.round(w*0.8);
  const proK=pro*4,fatK=fat*9;
  const carbK=Math.max(0,tdee-proK-fatK);
  const carb=Math.round(carbK/4);
  $('#pro-g').textContent=pro;
  $('#fat-g').textContent=fat;
  $('#carb-g').textContent=carb;
  $('#pro-kc').textContent=proK+' kcal';
  $('#fat-kc').textContent=fatK+' kcal';
  $('#carb-kc').textContent=carbK+' kcal';
  // Update labels
  $('#tdee-lbl').textContent=t('tdeeLbl');
  $('#r-bmr-lbl').textContent=t('rBmr');
  $('#r-loss-lbl').textContent=t('rLossMild');
  $('#r-loss2-lbl').textContent=t('rLossStd');
  $('#r-loss3-lbl').textContent=t('rLossAggr');
  $('#r-gain-lbl').textContent=t('rGain');
  $('#m-pro').textContent=t('mPro');
  $('#m-carb').textContent=t('mCarb');
  $('#m-fat').textContent=t('mFat');
  $('#lbl-sex').textContent=t('lblSex');
  $('#lbl-age').textContent=t('lblAge');
  $('#lbl-activity').textContent=t('lblActivity');
  $('#unitTabs button').forEach(b=>{
    if(b.dataset.u==='metric')b.textContent=t('metricBtn');
    if(b.dataset.u==='imperial')b.textContent=t('imperialBtn');
  });
  // Update sex options
  const sm=document.querySelector('#sex option[value="male"]');
  const sf=document.querySelector('#sex option[value="female"]');
  if(sm)sm.textContent=t('sexM');
  if(sf)sf.textContent=t('sexF');
}

// Update weight/height ranges on unit change
function updateRanges(){
  if(unit==='metric'){
    $('#weight').min=20;$('#weight').max=400;
    $('#height').min=100;$('#height').max=250;
  }else{
    $('#weight').min=44;$('#weight').max=880;
    $('#height').min=39;$('#height').max=98;
  }
}

['sex','age','weight','height','activity'].forEach(id=>$('#'+id).addEventListener('input',calc));
$('#weight').addEventListener('input',()=>{updateRanges();calc();});
$('#unitTabs button').forEach(b=>{
  b.addEventListener('click',()=>{updateRanges();});
});

$('#toolbar').innerHTML=`<button class="gz-btn gz-btn-secondary" onclick="$('#age').value=30;$('#weight').value=70;$('#height').value=175;setUnit('metric');calc()">${t('example')}</button><button class="gz-btn" onclick="GZ.copyText('TDEE: '+document.getElementById('tdee').textContent+' kcal | BMR: '+document.getElementById('bmr').textContent+' kcal')">${t('copy')}</button>`;

GZ.renderToolPage({category:'calc',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[
  {icon:'⚖️',href:'/calc/bmi-calculator.html',name:'BMI Calculator'},
  {icon:'🔥',href:'/calc/tdee-calculator.html',name:'TDEE Calculator'},
  {icon:'🎂',href:'/calc/age-calculator.html',name:'Age Calculator'},
  {icon:'💪',href:'/calc/percentage-calculator.html',name:'Body Fat %'},
]});
populateActivity();updateRanges();calc();
</script>
<script>new Image().src="https://site-analytics.gamezipper.com/hit?s=tools.gamezipper.com&p="+encodeURIComponent(location.pathname);</script>
<script src="/tools-result-rec.js" defer></script>
</body></html>
