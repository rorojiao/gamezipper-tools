<div class="gz-container">

    <div class="field"><label id="lbl-lunch"></label><input type="number" id="lunch" value="60" min="0" max="240" style="width:80px"> <span style="opacity:.7;font-size:.85em" id="lbl-mins"></span></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Business Hours Calculator',
    toolDesc: 'Calculate working time between two date-times, skipping nights, weekends, and lunch breaks. Customizable schedule and holidays — perfect for billing, SLAs and timesheets.',
    lblStart: 'Start Date & Time',
    lblEnd: 'End Date & Time',
    lblWorkstart: 'Work Hours',
    lblLunch: 'Lunch Break',
    lblMins: 'minutes',
    lblDays: 'Workdays',
    lblHolidays: 'Holidays (YYYY-MM-DD, comma-separated)',
    calculate: 'Calculate',
    result: 'Total Business Time',
    hoursMins: 'hours',
    decimalHours: 'Decimal hours',
    fullDays: 'Working days (8h)',
    minutes: 'Minutes',
    invalidRange: 'End must be after start.',
    step1: 'Set the start and end date-time for your task or interval',
    step2: 'Adjust work hours, lunch break, and toggle which weekdays count',
    step3: 'Optionally add public holidays in YYYY-MM-DD format',
    step4: 'Click Calculate to see total hours, decimal hours and equivalent days',
  },
  zh: {
    toolTitle: '工作时间计算器',
    toolDesc: '计算两个日期时间之间的工作时间，自动跳过夜间、周末和午休。可自定义工作时段和节假日 — 适用于计费、SLA 和工时表。',
    lblStart: '开始日期与时间',
    lblEnd: '结束日期与时间',
    lblWorkstart: '工作时段',
    lblLunch: '午休时长',
    lblMins: '分钟',
    lblDays: '工作日',
    lblHolidays: '节假日 (YYYY-MM-DD，逗号分隔)',
    calculate: '计算',
    result: '总工作时间',
    hoursMins: '小时',
    decimalHours: '十进制小时',
    fullDays: '工作日 (8小时)',
    minutes: '分钟',
    invalidRange: '结束时间必须晚于开始时间。',
    step1: '设置任务或时间段的开始和结束日期时间',
    step2: '调整工作时段、午休时长，并选择哪些天算工作日',
    step3: '可选地添加节假日（YYYY-MM-DD 格式）',
    step4: '点击「计算」查看总小时数、十进制小时和等效工作日',
  }
});

const { $, t } = GZ;
const DAY_LABELS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
// Default workdays Mon-Fri (1-5)
let workdayMap = {0:false, 1:true, 2:true, 3:true, 4:true, 5:true, 6:false};

function init() {
  // default start = today 09:00, end = today+2 days 17:00
  const now = new Date();
  const startDef = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 9, 0);
  const endDef = new Date(startDef.getTime() + 2*24*60*60*1000 + 8*60*60*1000);
  $('#start').value = toLocalDT(startDef);
  $('#end').value = toLocalDT(endDef);

  $('#lbl-start').textContent = t('lblStart');
  $('#lbl-end').textContent = t('lblEnd');
  $('#lbl-workstart').textContent = t('lblWorkstart');
  $('#lbl-lunch').textContent = t('lblLunch');
  $('#lbl-mins').textContent = t('lblMins');
  $('#lbl-days').textContent = t('lblDays');
  $('#lbl-holidays').textContent = t('lblHolidays');
  $('#calc-btn').textContent = t('calculate');

  // workday chips
  const wd = $('#workdays');
  wd.innerHTML = DAY_LABELS.map((d, i) => `<span class="workday${workdayMap[i]?' on':''}" data-d="${i}">${d}</span>`).join('');
  wd.querySelectorAll('.workday').forEach(el => el.addEventListener('click', e => {
    const i = +e.target.dataset.d;
    workdayMap[i] = !workdayMap[i];
    e.target.classList.toggle('on', workdayMap[i]);
  }));

  $('#calc-btn').addEventListener('click', calculate);
  calculate();
}

function toLocalDT(d) {
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function parseLocalDT(s) {
  // datetime-local gives local time
  return new Date(s);
}

function overlapMinutes(aStart, aEnd, bStart, bEnd) {
  const start = Math.max(aStart, bStart);
  const end = Math.min(aEnd, bEnd);
  return Math.max(0, end - start);
}

function calculate() {
  const start = parseLocalDT($('#start').value);
  const end = parseLocalDT($('#end').value);
  if (!(start && end) || isNaN(start) || isNaN(end)) { $('#result').innerHTML = ''; return; }
  if (end <= start) { $('#result').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidRange')}</span>`; return; }

  const workStartStr = $('#workstart').value || '09:00';
  const workEndStr = $('#workend').value || '18:00';
  const [wsH, wsM] = workStartStr.split(':').map(Number);
  const [weH, weM] = workEndStr.split(':').map(Number);
  const lunchMin = parseInt($('#lunch').value) || 0;

  // parse holidays
  const holidays = new Set(($('#holidays').value || '').split(',').map(s => s.trim()).filter(Boolean));

  // iterate day-by-day
  let totalMs = 0;
  const cursor = new Date(start.getFullYear(), start.getMonth(), start.getDate());
  const endDay = new Date(end.getFullYear(), end.getMonth(), end.getDate());
  let safety = 0;
  while (cursor <= endDay && safety < 100000) {
    safety++;
    const dow = cursor.getDay();
    const ymd = `${cursor.getFullYear()}-${String(cursor.getMonth()+1).padStart(2,'0')}-${String(cursor.getDate()).padStart(2,'0')}`;
    if (workdayMap[dow] && !holidays.has(ymd)) {
      const dayWorkStart = new Date(cursor.getFullYear(), cursor.getMonth(), cursor.getDate(), wsH, wsM);
      const dayWorkEnd = new Date(cursor.getFullYear(), cursor.getMonth(), cursor.getDate(), weH, weM);
      // compute overlap with [start, end]
      const ovStart = new Date(Math.max(dayWorkStart.getTime(), start.getTime()));
      const ovEnd = new Date(Math.min(dayWorkEnd.getTime(), end.getTime()));
      if (ovEnd > ovStart) {
        let dayMs = ovEnd - ovStart;
        // subtract lunch if both endpoints of the lunch window are inside the overlap
        const lunchMid = new Date((dayWorkStart.getTime() + dayWorkEnd.getTime()) / 2);
        const lunchStart = new Date(lunchMid.getTime() - (lunchMin * 60000) / 2);
        const lunchEnd = new Date(lunchMid.getTime() + (lunchMin * 60000) / 2);
        const lunchOverlap = Math.max(0, Math.min(lunchEnd, ovEnd) - Math.max(lunchStart, ovStart));
        dayMs -= lunchOverlap;
        if (dayMs > 0) totalMs += dayMs;
      }
    }
    cursor.setDate(cursor.getDate() + 1);
  }

  const totalMin = Math.round(totalMs / 60000);
  const hours = Math.floor(totalMin / 60);
  const mins = totalMin % 60;
  const decimal = (totalMin / 60).toFixed(2);
  const fullDays = (totalMin / (8*60)).toFixed(2);

  $('#result').innerHTML = `
    <div class="result">
      <div class="big">${hours}<span style="font-size:.5em;opacity:.7">h</span> ${mins}<span style="font-size:.5em;opacity:.7">m</span></div>
      <div class="sub">${t('result')}</div>
      <div class="result-grid">
        <div class="result-card"><div class="k">${t('decimalHours')}</div><div class="v">${decimal} h</div></div>
        <div class="result-card"><div class="k">${t('minutes')}</div><div class="v">${totalMin.toLocaleString()}</div></div>
        <div class="result-card"><div class="k">${t('fullDays')}</div><div class="v">${fullDays}</div></div>
      </div>
    </div>`;
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="calculate()">${GZ.t('calculate')}</button>`;

init();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏱️', href:'/calc/hours-calculator.html', name:'Hours Calculator'},
    {icon:'💼', href:'/calc/work-hours-calculator.html', name:'Work Hours'},
    {icon:'📅', href:'/calc/date-difference.html', name:'Date Difference'},
    {icon:'⏰', href:'/calc/timesheet-calculator.html', name:'Timesheet'},
  ]
});
</script>

</body>
