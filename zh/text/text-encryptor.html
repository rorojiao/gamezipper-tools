    toolDesc: '使用 AES-256-GCM 加密算法加密和解密文本 — 完全在浏览器本地运行，数据不离开你的设备。',
    encrypt: '加密', decrypt: '解密',

    inputLabelDec: '密文：', outputLabelDec: '明文：',
    copy: '复制', clear: '清除',
    enterPassword: '请输入密码', enterText: '请输入要加密的文本', enterCipher: '请粘贴密文',
    invalidCipher: '无效的密文格式', wrongPassword: '解密失败 — 密码错误？',
    step1: '输入一个密码作为加密密钥',
    step2: '输入或粘贴要加密的文本',

    step4: '分享密文 — 接收者需要相同密码才能解密',
  }
});

const { $, t } = GZ;
let mode = 'encrypt';

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}

function arrayToBase64(arr) {
  return btoa(String.fromCharCode(...new Uint8Array(arr)));
}

function base64ToArray(b64) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr.buffer;
}

async function doAction() {
  const pw = $('#keyInput').value;
  const text = $('#input').value;
  if (!pw) { $('#output').textContent = t('enterPassword'); return; }
  if (!text) { $('#output').textContent = mode === 'encrypt' ? t('enterText') : t('enterCipher'); return; }

  try {
    if (mode === 'encrypt') {
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const key = await deriveKey(pw, salt);
      const enc = new TextEncoder();
      const cipherBuf = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(text));
      const result = JSON.stringify({
        s: arrayToBase64(salt),
        i: arrayToBase64(iv),
        c: arrayToBase64(cipherBuf)
      });
      $('#output').textContent = result;
    } else {
      let data;
      try { data = JSON.parse(text); } catch(e) { $('#output').textContent = t('invalidCipher'); return; }
      const salt = base64ToArray(data.s);
      const iv = base64ToArray(data.i);
      const cipher = base64ToArray(data.c);
      const key = await deriveKey(pw, salt);
      const decBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, cipher);
      $('#output').textContent = new TextDecoder().decode(decBuf);
    }
  } catch(e) {
    $('#output').textContent = t('wrongPassword');
  }
}

function switchMode(m) {
  mode = m;
  $$('#modeToggle button').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  $('#actionBtn').textContent = m === 'encrypt' ? t('encrypt') : t('decrypt');
  $('#lbl-in').textContent = m === 'encrypt' ? t('inputLabel') : t('inputLabelDec');
  $('#lbl-out').textContent = m === 'encrypt' ? t('outputLabel') : t('outputLabelDec');
}

$('#modeToggle').innerHTML = `<button data-mode="encrypt" class="active" onclick="switchMode('encrypt')">${t('encrypt')}</button><button data-mode="decrypt" onclick="switchMode('decrypt')">${t('decrypt')}</button>`;

$('#keyLabel').textContent = t('password');
$('#lbl-in').textContent = t('inputLabel');
$('#lbl-out').textContent = t('outputLabel');
$('#actionBtn').textContent = t('encrypt');
$('#copyBtn').textContent = t('copy');
$('#toolbar').innerHTML = '';

switchMode('encrypt');

    {icon:'🔐', href:'/dev/aes.html', name:'AES Encrypt'},
  ]
});
