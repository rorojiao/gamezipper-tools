// Build the letter
function buildLetter(occ, tone, len, name, mem, sign) {
  const opener = OPENERS[occ][tone][Math.floor(Math.random() * OPENERS[occ][tone].length)];
  const pool = BODIES[occ][tone];
  const closings = CLOSINGS[tone];

  let body = '';
  if (len === 'short') {
    body = pool[Math.floor(Math.random() * pool.length)];
  } else if (len === 'medium') {
    body = pool.slice(0, 2).join(' ');
  } else {
    body = pool.join(' ');
  }

  if (mem) {
    body += '\n\n' + (tone === 'romantic'
      ? `I keep coming back to the memory of ${mem} — the way it made me realize, all over again, how deeply I love you.`
      : tone === 'poetic'
        ? `And then there is the memory of ${mem} — a small star in the constellation of us.`
        : `And honestly? ${mem} is one of my favorite memories. Mostly because you were there.`);
  }

  const closing = closings[Math.floor(Math.random() * closings.length)];
  const greetName = name ? ` ${name}` : '';
  const signName = sign || 'Yours';

  return `${opener}${greetName},\n\n${body}\n\n${closing},\n${signName}`;
}

  const letter = buildLetter(occ, tone, len, name, mem, sign);
  const salutation = name ? `My dearest ${name},\n` : '';
  $('#output').textContent = salutation + letter;
}

function downloadPDF() {
  const txt = $('#output').textContent;

  const w = window.open('', '_blank', 'width=820,height=900');

  w.document.close();
  setTimeout(() => w.print(), 300);
}
