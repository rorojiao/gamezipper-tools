// Minimal YAML parser (block + flow scalars + lists). Handles the common subset.
function parseYAML(text){
  const lines = text.replace(/\t/g, '  ').split('\n');
  // Strip comments outside quotes and blank lines, but keep indentation info
  const cleaned = [];
  for (const raw of lines){
    let line = raw;
    // strip trailing comment only if not inside quotes
    let inQ = null, out = '';
    for (let i = 0; i < line.length; i++){
      const ch = line[i];
      if (inQ){
        out += ch;
        if (ch === inQ && line[i-1] !== '\\') inQ = null;
      } else {
        if (ch === '#' && (i === 0 || /\s/.test(line[i-1]))){ break; }
        if (ch === '"' || ch === "'"){ inQ = ch; }
        out += ch;
      }
    }
    line = out.replace(/\s+$/, '');
    if (line.trim() === '' || /^---\s*$/.test(line.trim()) || /^\.\.\.\s*$/.test(line.trim())) continue;
    if (/^%YAML|^%TAG/.test(line.trim())) continue;
    const indent = line.match(/^ */)[0].length;
    cleaned.push({ indent, text: line.trim() });
  }
  let idx = 0;
  function parseBlock(parentIndent){
    const result = [];
    let lastMap = null;
    while (idx < cleaned.length){
      const node = cleaned[idx];
      if (node.indent < parentIndent) break;
      if (node.indent > parentIndent){
        // belongs to previous key — handled inline; skip defensively
        idx++;
        continue;
      }
      // list item?
      if (/^- +/.test(node.text) || /^-$/.test(node.text)){
        lastMap = null;
        const rest = node.text.replace(/^- +/, '').replace(/^-$/, '');
        if (rest === ''){
          // nested block under this dash
          idx++;
          const child = parseBlock(node.indent + 2);
          result.push(child.length === 1 ? child[0] : child);
        } else if (/^[\[{]/.test(rest)){
          result.push(parseFlow(rest));
          idx++;
        } else if (rest.includes(':') && !/^'.*:.*'$/.test(rest) && !/^".*:.*"$/.test(rest)){
          // inline mapping on a dash
          const obj = {};
          const kv = splitKV(rest);
          if (kv){ obj[kv.key] = parseScalar(kv.val); idx++; const child = parseBlock(node.indent + 2); if (child.length) Object.assign(obj, child[0] && typeof child[0] === 'object' && !Array.isArray(child[0]) ? child[0] : {}); result.push(obj); }
          else { result.push(parseScalar(rest)); idx++; }
        } else {
          result.push(parseScalar(rest));
          idx++;
        }
        continue;
      }
      // key: value
      const kv = splitKV(node.text);
      if (kv){
        if (!lastMap){
          lastMap = {};
          result.push(lastMap);
        }
        if (kv.val === ''){
          idx++;
          const child = parseBlock(node.indent + 2);
          // child is array of nodes; if all objects -> merge into one? YAML block mapping under key
          if (child.length && typeof child[0] === 'object' && !Array.isArray(child[0])){
            // if multiple sibling objects, they are a list
            lastMap[kv.key] = child.length === 1 ? child[0] : child;
          } else if (child.length){
            lastMap[kv.key] = child.length === 1 ? child[0] : child;
          } else {
            lastMap[kv.key] = null;
          }
        } else if (/^[\[{]/.test(kv.val)){
          lastMap[kv.key] = parseFlow(kv.val);
          idx++;
        } else {
          lastMap[kv.key] = parseScalar(kv.val);
          idx++;
        }
      } else {
        idx++;
      }
    }
    // If the block is a single mapping, unwrap to object; if list of scalars, keep array
    if (result.length && typeof result[0] === 'object' && !Array.isArray(result[0])){
      // merge sibling maps (shouldn't usually happen in valid yaml) into one
      const merged = {};
      let allMaps = true;
      for (const r of result){
        if (typeof r !== 'object' || Array.isArray(r)){ allMaps = false; break; }
        Object.assign(merged, r);
      }
      if (allMaps) return [merged];
    }
    return result;
  }
  const out = parseBlock(0);
  return out.length === 1 ? out[0] : out;
}

function splitKV(s){
  // find first ': ' or trailing ':' that is not inside quotes
  let inQ = null;
  for (let i = 0; i < s.length; i++){
    const ch = s[i];
    if (inQ){
      if (ch === inQ && s[i-1] !== '\\') inQ = null;
    } else {
      if (ch === '"' || ch === "'") inQ = ch;
      else if (ch === ':' && (i === s.length - 1 || s[i+1] === ' ')){
        return { key: unquoteKey(s.slice(0, i)), val: s.slice(i+1).trim() };
      }
    }
  }
  return null;
}

function unquoteKey(s){
  s = s.trim();
  if ((s.startsWith('"') && s.endsWith('"')) || (s.startsWith("'") && s.endsWith("'"))){
    return s.slice(1, -1);
  }
  return s;
}

function parseScalar(raw){
  const v = String(raw).trim();
  if (v === '' || v === '~' || v === 'null' || v === 'Null' || v === 'NULL') return null;
  if (v === 'true' || v === 'True' || v === 'TRUE' || v === 'yes' || v === 'Yes' || v === 'YES' || v === 'on' || v === 'On' || v === 'ON') return true;
  if (v === 'false' || v === 'False' || v === 'FALSE' || v === 'no' || v === 'No' || v === 'NO' || v === 'off' || v === 'Off' || v === 'OFF') return false;
  if (/^-?\d+$/.test(v)) return parseInt(v, 10);
  if (/^-?\d+\.\d+(?:[eE][+-]?\d+)?$/.test(v)) return parseFloat(v);
  if ((v.startsWith('"') && v.endsWith('"')) || (v.startsWith("'") && v.endsWith("'"))){
    return v.slice(1, -1).replace(/\\"/g, '"').replace(/\\'/g, "'");
  }
  // flow inline
  if (/^[\[{]/.test(v)) return parseFlow(v);
  return v;
}

function parseFlow(s){
  s = s.trim();
  try {
    // naive: turn into JSON-ish
    const singleToDouble = s.replace(/'/g, '"');
    return JSON.parse(singleToDouble);
  } catch (e){
    return s;
  }
}

// Python literal output
function pyLit(v){
  if (v === null) return 'None';
  if (v === true) return 'True';
  if (v === false) return 'False';
  if (typeof v === 'number') return Number.isFinite(v) ? String(v) : 'None';
  if (typeof v === 'string') return JSON.stringify(v);
  if (Array.isArray(v)){
    if (!v.length) return '[]';
    const items = v.map(pyLit);
    if (items.every(x => !x.startsWith('{') && !x.startsWith('[')) && items.join(', ').length <= 60) return '[' + items.join(', ') + ']';
    return '[\n' + items.map(x => '    ' + x).join(',\n') + '\n]';
  }
  if (typeof v === 'object'){
    const keys = Object.keys(v);
    if (!keys.length) return '{}';
    const entries = keys.map(k => `${JSON.stringify(k)}: ${pyLit(v[k])}`);
    if (entries.join(', ').length <= 60) return '{' + entries.join(', ') + '}';
    return '{\n' + entries.map(x => '    ' + x).join(',\n') + '\n}';
  }
  return 'None';
}

function typeName(v){
  if (v === null || v === undefined) return 'Optional[Any]';
  if (typeof v === 'boolean') return 'bool';
  if (typeof v === 'number') return Number.isInteger(v) ? 'int' : 'float';
  if (typeof v === 'string') return 'str';
  if (Array.isArray(v)) return v.length ? 'List[' + typeName(v[0]) + ']' : 'List[Any]';
  if (typeof v === 'object') return 'dict';
  return 'Any';
}

function pascalCase(s){
  return String(s).replace(/[^a-zA-Z0-9]+/g, ' ').trim()
    .split(/\s+/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('')
    .replace(/^([0-9])/, '_$1') || 'Model';
}

function safeIdent(name, fallback){
  let s = String(name).replace(/[^a-zA-Z0-9_]+/g, '_').replace(/^_+|_+$/g, '');
  if (!s) s = fallback;
  if (/^[0-9]/.test(s)) s = '_' + s;
  if (['False','None','True','and','as','assert','async','await','break','class','continue','def','del','elif','else','except','finally','for','from','global','if','import','in','is','lambda','nonlocal','not','or','pass','raise','return','try','while','with','yield'].includes(s)) s += '_';
  return s;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function highlight(code){
  const tokenRe = /('(?:\\.|[^'\\])*')|(#.*$)|(@?\w[\w.]*)|(\s+)|([^\s'"\w#@]+)/gm;
  let out = '', m;
  while ((m = tokenRe.exec(code)) !== null){
    const [full, str, com, word, ws, punct] = m;
    if (str) out += `<span class="py-str">${esc(str)}</span>`;
    else if (com) out += `<span class="py-com">${esc(com)}</span>`;
    else if (word){
      let cls = null;
      if (word === 'True' || word === 'False') cls = 'py-bool';
      else if (word === 'None') cls = 'py-none';
      else if (/^(class|from|import|def|return)$/.test(word) || word === '@dataclass') cls = 'py-kw';
      else if (/^-?\d/.test(word) && !isNaN(parseFloat(word))) cls = 'py-num';
      if (cls) out += `<span class="${cls}">${esc(word)}</span>`;
      else out += esc(word);
    } else out += esc(full);
  }
  return out;
}

function modelCode(obj, name, decorator){
  const imports = [];
  if (decorator === 'dataclass') imports.push('from dataclasses import dataclass');
  if (decorator === 'pydantic') imports.push('from pydantic import BaseModel');
  const typeSet = new Set();
  Object.values(obj).forEach(v => {
    const tn = typeName(v);
    if (tn.includes('Optional')) typeSet.add('Optional');
    if (tn.includes('List')) typeSet.add('List');
    if (tn.includes('Any')) typeSet.add('Any');
  });
  const typingImports = [];
  if (typeSet.has('Optional')) typingImports.push('Optional');
  if (typeSet.has('List')) typingImports.push('List');
  if (typeSet.has('Any')) typingImports.push('Any');
  if (typingImports.length) imports.push('from typing import ' + typingImports.join(', '));

  let out = imports.join('\n');
  if (out) out += '\n\n\n';
  if (decorator === 'dataclass') out += '@dataclass\n';
  out += `class ${name}${decorator === 'pydantic' ? '(BaseModel)' : ''}:\n`;
  const keys = Object.keys(obj);
  if (!keys.length) return out + '    pass';
  out += keys.map(k => `    ${safeIdent(k, 'field')}: ${typeName(obj[k])}`).join('\n');
  out += `\n\n\n# data = ${pyLit(obj)}`;
  return out;
}

function convert(){
  const raw = $('#input').value;
  if (!raw.trim()){ $('#output').textContent=''; $('#status').innerHTML=''; return; }
  let parsed;
  try {
    parsed = parseYAML(raw);
    if (parsed === undefined) throw new Error('empty');
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('ok')}</span>`;
  } catch (e){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalid')}: ${esc(e.message)}</span>`;
    $('#output').innerHTML = '';
    return;
  }
  const style = $('#styleSel').value;
  const className = pascalCase($('#className').value || 'Config');
  let code = '';
  const rootIsArray = Array.isArray(parsed);
  const root = rootIsArray ? (parsed[0] || {}) : parsed;
  if (style === 'dataclass' && root && typeof root === 'object' && !Array.isArray(root)){
    code = modelCode(root, className, 'dataclass');
  } else if (style === 'pydantic' && root && typeof root === 'object' && !Array.isArray(root)){
    code = modelCode(root, className, 'pydantic');
  } else {
    code = 'data = ' + pyLit(parsed);
  }
  if (rootIsArray && (style === 'dataclass' || style === 'pydantic')){
    code = '# Converted from a YAML sequence — using the first element as the model.\n\n' + code;
  }
  $('#output').innerHTML = highlight(code);
}

}
