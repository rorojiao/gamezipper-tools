const { $, copyText, t } = GZ;
let currentSchema = 'article';

document.querySelectorAll('.schema-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.schema-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentSchema = this.dataset.type;
    renderForm();
  });
});

function renderForm() {
  const ff = $('#form-fields');
  const schemas = {
    article: () => `
      ${f('pageTitle','text','My Article Title')}
      ${f('pageDesc','text','A description of the article')}
      ${f('pageUrl','text','https://example.com/article')}
      ${f('image','text','https://example.com/image.jpg')}
      ${f('datePublished','date','')}
      ${f('dateModified','date','')}
      ${f('authorName','text','John Doe')}
      ${f('publisherName','text','Example Publisher')}`,
    faq: () => `
      <div id="faq-items">
        ${faqItem(1)}${faqItem(2)}${faqItem(3)}
      </div>
      <button class="add-btn" onclick="addFaqItem()">${t('addFaq')}</button>`,
    product: () => `
      ${f('productName','text','Product Name')}
      ${f('pageDesc','text','Product description')}
      ${f('image','text','https://example.com/product.jpg')}
      ${f('price','text','29.99')}
      ${f('currency','text','USD')}
      ${f('availability','select','InStock|In Stock,OutOfStock|Out of Stock,PreOrder|Pre-Order')}
      ${f('rating','text','4.5')}
      ${f('reviewCount','text','128')}`,
    localbusiness: () => `
      ${f('businessName','text','My Business')}
      ${f('pageDesc','text','Business description')}
      ${f('address','text','123 Main St, City, State 12345')}
      ${f('phone','text','+1-555-123-4567')}
      ${f('businessUrl','text','https://example.com')}
      ${f('image','text','https://example.com/photo.jpg')}
      ${f('openingHours','text','Mo-Fr 09:00-17:00')}`,
    breadcrumb: () => `
      <div id="breadcrumb-items">
        <div class="faq-item">
          ${f('itemName','text','Home','bc-name-0')}
          ${f('itemUrl','text','https://example.com','bc-url-0')}
        </div>
        <div class="faq-item">
          ${f('itemName','text','Category','bc-name-1')}
          ${f('itemUrl','text','https://example.com/category','bc-url-1')}
        </div>
        <div class="faq-item">
          ${f('itemName','text','Current Page','bc-name-2')}
          ${f('itemUrl','text','https://example.com/category/page','bc-url-2')}
        </div>
      </div>
      <button class="add-btn" onclick="addBreadcrumb()">${t('addBreadcrumb')}</button>`,
    howto: () => `
      ${f('howtoName','text','How to Do Something')}
      ${f('pageDesc','text','Step by step instructions')}
      ${f('image','text','https://example.com/howto.jpg')}
      <div id="howto-items">
        ${howtoItem(1)}${howtoItem(2)}${howtoItem(3)}
      </div>
      <button class="add-btn" onclick="addHowtoItem()">${t('addStep')}</button>`,
    organization: () => `
      ${f('orgName','text','My Organization')}
      ${f('orgUrl','text','https://example.com')}
      ${f('orgLogo','text','https://example.com/logo.png')}
      ${f('sameAs','textarea','https://twitter.com/example\nhttps://facebook.com/example')}`,
    website: () => `
      ${f('siteName','text','My Website')}
      ${f('siteUrl','text','https://example.com')}
      ${f('searchUrl','text','https://example.com/search?q={search_term_string}')}`,
  };
  ff.innerHTML = (schemas[currentSchema] || schemas.article)();
}

function f(label, type, value, idOverride) {
  const id = idOverride || label;
  const labelText = t(label) || label;
  if (type === 'textarea') {
    return `<div class="gz-field"><label for="${id}">${labelText}</label><textarea id="${id}" rows="3">${value}</textarea></div>`;
  }
  if (type === 'select') {
    const opts = value.split(',').map(o => { const [v,l] = o.split('|'); return `<option value="${v}">${l||v}</option>`; }).join('');
    return `<div class="gz-field"><label for="${id}">${labelText}</label><select id="${id}">${opts}</select></div>`;
  }
  return `<div class="gz-field"><label for="${id}">${labelText}</label><input type="${type}" id="${id}" value="${value}"></div>`;
}

let faqCount = 3;
function faqItem(n) {
  return `<div class="faq-item" id="faq-${n}">
    <div class="gz-field"><label>${t('faqQuestion')} #${n}</label><input type="text" id="faq-q-${n}" placeholder="Question ${n}"></div>
    <div class="gz-field"><label>${t('faqAnswer')} #${n}</label><textarea id="faq-a-${n}" rows="2" placeholder="Answer ${n}"></textarea></div>
  </div>`;
}
function addFaqItem() {
  faqCount++;
  const container = document.getElementById('faq-items');
  container.insertAdjacentHTML('beforeend', faqItem(faqCount));
}

let bcCount = 3;
function addBreadcrumb() {
  bcCount++;
  const container = document.getElementById('breadcrumb-items');
  container.insertAdjacentHTML('beforeend', `<div class="faq-item">
    ${f('itemName','text','',`bc-name-${bcCount}`)}
    ${f('itemUrl','text','',`bc-url-${bcCount}`)}
  </div>`);
}

let howtoCount = 3;
function howtoItem(n) {
  return `<div class="faq-item" id="howto-${n}">
    <div class="gz-field"><label>${t('step')} ${n}</label><textarea id="howto-s-${n}" rows="2" placeholder="Describe step ${n}"></textarea></div>
  </div>`;
}
function addHowtoItem() {
  howtoCount++;
  const container = document.getElementById('howto-items');
  container.insertAdjacentHTML('beforeend', howtoItem(howtoCount));
}

function val(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }

function doGenerate() {
  let schema;
  switch (currentSchema) {
    case 'article':
      schema = {
        "@context": "https://schema.org", "@type": "Article",
        headline: val('pageTitle'), description: val('pageDesc'),
        url: val('pageUrl'), image: val('image'),
        datePublished: val('datePublished') || undefined, dateModified: val('dateModified') || undefined,
        author: {"@type":"Person", name: val('authorName')},
        publisher: {"@type":"Organization", name: val('publisherName')}
      }; break;
    case 'faq':
      const faqs = [];
      for (let i=1; i<=faqCount; i++) {
        const q = val(`faq-q-${i}`), a = val(`faq-a-${i}`);
        if (q && a) faqs.push({"@type":"Question", name:q, acceptedAnswer:{"@type":"Answer",text:a}});
      }
      schema = {"@context":"https://schema.org","@type":"FAQPage",mainEntity:faqs}; break;
    case 'product':
      schema = {
        "@context":"https://schema.org","@type":"Product",name:val('productName'),description:val('pageDesc'),
        image:val('image'),offers:{"@type":"Offer",price:val('price'),priceCurrency:val('currency'),availability:`https://schema.org/${val('availability')}`},
        aggregateRating:{"@type":"AggregateRating",ratingValue:val('rating'),reviewCount:val('reviewCount')}
      }; break;
    case 'localbusiness':
      schema = {
        "@context":"https://schema.org","@type":"LocalBusiness",name:val('businessName'),description:val('pageDesc'),
        address:{"@type":"PostalAddress",streetAddress:val('address')},telephone:val('phone'),
        url:val('businessUrl'),image:val('image'),openingHours:val('openingHours')
      }; break;
    case 'breadcrumb':
      const bcItems = [];
      for (let i=0; i<=bcCount; i++) {
        const name = val(`bc-name-${i}`), url2 = val(`bc-url-${i}`);
        if (name) bcItems.push({"@type":"ListItem",position:i+1,name:name,item:url2||undefined});
      }
      schema = {"@context":"https://schema.org","@type":"BreadcrumbList",itemListElement:bcItems}; break;
    case 'howto':
      const steps = [];
      for (let i=1; i<=howtoCount; i++) {
        const s = val(`howto-s-${i}`);
        if (s) steps.push({"@type":"HowToStep",position:i,name:`${t('step')} ${i}`,text:s});
      }
      schema = {"@context":"https://schema.org","@type":"HowTo",name:val('howtoName'),description:val('pageDesc'),image:val('image'),step:steps}; break;
    case 'organization':
      const socials = val('sameAs').split('\n').map(s=>s.trim()).filter(Boolean);
      schema = {"@context":"https://schema.org","@type":"Organization",name:val('orgName'),url:val('orgUrl'),logo:val('orgLogo'),sameAs:socials}; break;
    case 'website':
      schema = {"@context":"https://schema.org","@type":"WebSite",name:val('siteName'),url:val('siteUrl')};
      if (val('searchUrl')) schema.potentialAction = {"@type":"SearchAction",target:val('searchUrl'),"query-input":"required name=search_term_string"};
      break;
  }
  // Remove undefined values
  const clean = JSON.parse(JSON.stringify(schema));
  $('#output').textContent = JSON.stringify(clean, null, 2);
}

function doCopy() {
  const text = $('#output').textContent;
  if (text) copyText(text);
}

function doCopyScript() {
  const text = $('#output').textContent;
  if (text) copyText('<script type="application/ld+json">\n' + text + '\n<\/script>');
}

function doClear() {
  $('#output').textContent = '';
  renderForm();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doGenerate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doCopy()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doCopyScript()">${t('copyScript')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-schema-type').textContent = t('schemaType');
$('#lbl-out').textContent = t('lblOut');

renderForm();

GZ.renderToolPage({

  titleKey: 'toolTitle',
  descKey: 'toolDesc',

    {icon:'🔍', href:'/seo/meta-tag-generator.html', name:'Meta Tag Generator'},
    {icon:'📊', href:'/seo/faq-schema-generator.html', name:'FAQ Schema'},
    {icon:'🏷️', href:'/dev/open-graph-preview.html', name:'OG Preview'},
  ]
});
</script>
