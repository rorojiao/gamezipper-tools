<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is percent difference?", "acceptedAnswer": {"@type": "Answer", "text": "Percent difference measures the relative difference between two values when neither is clearly the original. The formula is |V1 - V2| / ((V1 + V2) / 2) × 100. It uses the average of the two values as the base, making it symmetric."}}, {"@type": "Question", "name": "What is the difference between percent change and percent difference?", "acceptedAnswer": {"@type": "Answer", "text": "Percent change has a clear original and new value — it measures how much something grew or shrank. Percent difference compares two values with no direction, using their average as the base. Use percent change for before/after, percent difference for A vs B."}}, {"@type": "Question", "name": "How do I calculate percent increase?", "acceptedAnswer": {"@type": "Answer", "text": "Percent increase = ((New - Old) / Old) × 100. For example, going from 80 to 100 is ((100-80)/80) × 100 = 25% increase. This tool computes it automatically along with decrease, change and difference."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Percent Difference Calculator',
    toolDesc: 'Compare two values and instantly see the percent difference, percent change, increase, decrease and ratio. Free, browser-only.',
    value1: 'Value 1',
    value2: 'Value 2',
    step1: 'Enter the first value in the Value 1 box',
    step2: 'Enter the second value in the Value 2 box',
    step3: 'Read the percent difference at the top',
    step4: 'See percent change, increase, decrease and ratio below',
    resDiff: 'Percent difference',
    pctDiff: 'Percent Difference',
    pctChange: 'Percent Change (V2 vs V1)',
    pctIncrease: 'Percent Increase',
    pctDecrease: 'Percent Decrease',
    ratio: 'Ratio (V1 : V2)',
    formula: 'Percent Difference Formula',
    formulaText: '% Difference = |V₁ − V₂| ÷ ((V₁ + V₂) ÷ 2) × 100',
    changeFormula: '% Change = (V₂ − V₁) ÷ |V₁| × 100',
    na: '—',
    increase: 'increase',
    decrease: 'decrease',
    same: 'same value',
  },
  zh: {
    toolTitle: '百分比差异计算器',
    toolDesc: '比较两个数值，即时查看百分比差异、变化、增长、减少和比例。免费、浏览器本地运行。',
    value1: '数值 1',
    value2: '数值 2',
    step1: '在「数值 1」中输入第一个值',
    step2: '在「数值 2」中输入第二个值',
    step3: '顶部即时显示百分比差异',
    step4: '下方查看百分比变化、增长、减少和比例',
    resDiff: '百分比差异',
    pctDiff: '百分比差异',
    pctChange: '百分比变化（V2 对 V1）',
    pctIncrease: '百分比增长',
    pctDecrease: '百分比减少',
    ratio: '比例（V1 : V2）',
    formula: '百分比差异公式',
    formulaText: '百分比差异 = |V₁ − V₂| ÷ ((V₁ + V₂) ÷ 2) × 100',
    changeFormula: '百分比变化 = (V₂ − V₁) ÷ |V₁| × 100',
    na: '—',
    increase: '增长',
    decrease: '减少',
    same: '相同值',
  }
});

const { $, t } = GZ;

function fmt(n) {
  if (!isFinite(n)) return t('na');
  return n.toLocaleString(undefined, { maximumFractionDigits: 4 });
}

function gcd(a, b) {
  a = Math.abs(Math.round(a)); b = Math.abs(Math.round(b));
  while (b) { [a, b] = [b, a % b]; }
  return a || 1;
}

function calc() {
  const v1 = parseFloat($('#val1').value);
  const v2 = parseFloat($('#val2').value);
  if (isNaN(v1) || isNaN(v2)) {
    $('#result').innerHTML = `<div class="big">${t('na')}</div><div class="sub">${t('resDiff')}</div>`;
    $('#alt-grid').innerHTML = '';
    $('#formula').innerHTML = '';
    return;
  }
  const avg = (v1 + v2) / 2;
  const diff = Math.abs(v1 - v2);
  const pctDiff = avg !== 0 ? (diff / Math.abs(avg)) * 100 : (diff === 0 ? 0 : Infinity);
  const change = v1 !== 0 ? ((v2 - v1) / Math.abs(v1)) * 100 : (v2 === 0 ? 0 : Infinity);
  const increase = change > 0 ? change : 0;
  const decrease = change < 0 ? Math.abs(change) : 0;

  const direction = change > 0 ? t('increase') : change < 0 ? t('decrease') : t('same');
  $('#result').innerHTML = `<div class="big">${fmt(pctDiff)}%</div><div class="sub">${t('resDiff')} · ${fmt(v1)} vs ${fmt(v2)} · ${direction} ${change !== 0 ? fmt(Math.abs(change)) + '%' : ''}</div>`;

  // simple integer ratio
  const g = gcd(v1, v2);
  const r1 = v1 !== 0 ? Math.round(v1) / g : 0;
  const r2 = v2 !== 0 ? Math.round(v2) / g : 0;
  const ratioStr = (Number.isInteger(r1) && Number.isInteger(r2) && r1 > 0 && r2 > 0 && r1 < 1000 && r2 < 1000) ? `${r1} : ${r2}` : `${fmt(v1 / (v2 || 1))} : 1`;

  $('#alt-grid').innerHTML = `
    <div class="alt-cell"><div class="label">${t('pctChange')}</div><div class="val">${fmt(change)}%</div></div>
    <div class="alt-cell"><div class="label">${t('pctIncrease')}</div><div class="val" style="color:#27ae60">${fmt(increase)}%</div></div>
    <div class="alt-cell"><div class="label">${t('pctDecrease')}</div><div class="val" style="color:#e94560">${fmt(decrease)}%</div></div>
    <div class="alt-cell"><div class="label">${t('ratio')}</div><div class="val">${ratioStr}</div></div>`;

  $('#formula').innerHTML = `<strong>${t('formula')}:</strong><br>${t('formulaText')}<br>${t('changeFormula')}`;
}

['val1','val2'].forEach(id => $('#' + id).addEventListener('input', calc));

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/calc/percentage-calculator.html', name:'Percentage'},
    {icon:'🏷️', href:'/calc/percent-off-calculator.html', name:'Percent Off'},
    {icon:'📈', href:'/calc/percent-change-calculator.html', name:'Percent Change'},
    {icon:'📊', href:'/calc/standard-deviation-calculator.html', name:'Std Deviation'},
  ]
});

calc();
</script>
