    toolDesc: '将任意图片（PNG、JPG、SVG、ICO）转换为完整的 favicon 包 — ICO 文件、PNG 集合（16/32/64/180/192/512）和 HTML 标签。',
    step1: '上传方形 PNG、JPG 或 SVG 图片',
    step2: '预览每个尺寸的自动生成的 favicon',
    step3: '下载各尺寸或使用一体化 .ico 文件',
    step4: '将 HTML 代码片段复制到页面 <head>',

});

const { t, $, copyText } = GZ;

let sourceImage = null;
const SIZES = [16, 32, 64, 180, 192, 512];

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      sourceImage = img;
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function renderToCanvas(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.clearRect(0, 0, size, size);
  // Center & fit
  const ratio = Math.min(sourceImage.width, sourceImage.height);
  const sx = (sourceImage.width - ratio) / 2;
  const sy = (sourceImage.height - ratio) / 2;
  ctx.drawImage(sourceImage, sx, sy, ratio, ratio, 0, 0, size, size);
  return canvas;
}

function canvasToBlob(canvas, type, quality) {
  return new Promise(res => canvas.toBlob(b => res(b), type, quality));
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function render() {
  if (!sourceImage) return;
  const out = $('#fc-output');
  let html = '<div class="fc-preview">';
  for (const size of SIZES) {
    const canvas = renderToCanvas(size);
    const dataUrl = canvas.toDataURL('image/png');
    html += `<div class="fc-tile">
      <div class="frame"><img src="${dataUrl}" alt="${size}x${size}"></div>
      <small>${size}×${size}</small>
      <button class="gz-btn gz-btn-secondary" data-size="${size}">Download</button>
    </div>`;
  }
  html += '</div>';
  html += `<div class="fc-meta">
    <p style="margin:0 0 8px"><strong>HTML to paste into &lt;head&gt;:</strong></p>
    <pre id="fc-html">&lt;link rel="icon" type="image/x-icon" href="/favicon.ico"&gt;
&lt;link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png"&gt;
&lt;link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png"&gt;
&lt;link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"&gt;
&lt;link rel="manifest" href="/site.webmanifest"&gt;</pre>
    <button class="gz-btn" id="fc-copy-html" style="margin-top:6px">Copy HTML</button>
  </div>`;
  out.innerHTML = html;

  // Wire up download buttons
  document.querySelectorAll('.fc-tile button').forEach(btn => {
    btn.addEventListener('click', async () => {
      const size = +btn.getAttribute('data-size');
      const canvas = renderToCanvas(size);
      const blob = await canvasToBlob(canvas, 'image/png');
      downloadBlob(blob, `favicon-${size}x${size}.png`);
    });
  });

  $('#fc-copy-html').addEventListener('click', () => {
    copyText($('#fc-html').textContent);
  });
}

async function downloadAll() {
  if (!sourceImage) return;
  // Download each size
  for (const size of SIZES) {
    const canvas = renderToCanvas(size);
    const blob = await canvasToBlob(canvas, 'image/png');
    downloadBlob(blob, `favicon-${size}x${size}.png`);
  }
}

async function downloadIco() {
  if (!sourceImage) return;
  // Build a multi-size ICO file
  const icoSizes = [16, 32, 48];
  const pngBlobs = [];
  for (const size of icoSizes) {
    const canvas = renderToCanvas(size);
    const blob = await canvasToBlob(canvas, 'image/png');
    pngBlobs.push({ size, blob });
  }
  // ICO header: 6 bytes + 16 bytes per entry + PNG data
  const numImages = pngBlobs.length;
  const headerSize = 6 + 16 * numImages;
  const pngBuffers = await Promise.all(pngBlobs.map(async p => ({
    size: p.size,
    buffer: await p.blob.arrayBuffer()
  })));
  const totalSize = headerSize + pngBuffers.reduce((s, p) => s + p.buffer.byteLength, 0);
  const ico = new Uint8Array(totalSize);
  const view = new DataView(ico.buffer);
  view.setUint16(0, 0, true); // reserved
  view.setUint16(2, 1, true); // type ICO
  view.setUint16(4, numImages, true); // count

  let offset = headerSize;
  for (let i = 0; i < pngBuffers.length; i++) {
    const entry = pngBuffers[i];
    const size = entry.size >= 256 ? 0 : entry.size;
    view.setUint8(6 + i*16 + 0, size); // width
    view.setUint8(6 + i*16 + 1, size); // height
    view.setUint8(6 + i*16 + 2, 0); // colors
    view.setUint8(6 + i*16 + 3, 0); // reserved
    view.setUint16(6 + i*16 + 4, 1, true); // planes
    view.setUint16(6 + i*16 + 6, 32, true); // bpp
    view.setUint32(6 + i*16 + 8, entry.buffer.byteLength, true); // size
    view.setUint32(6 + i*16 + 12, offset, true); // offset
    ico.set(new Uint8Array(entry.buffer), offset);
    offset += entry.buffer.byteLength;
  }

  const blob = new Blob([ico], { type: 'image/x-icon' });
  downloadBlob(blob, 'favicon.ico');
}

const dropZone = $('#drop-zone');
const fileInput = $('#file-input');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) loadImage(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => {
  if (e.target.files.length) loadImage(e.target.files[0]);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadAll()">Download All PNGs</button>
  <button class="gz-btn" onclick="downloadIco()">Download .ico</button>
  <button class="gz-btn gz-btn-secondary" onclick="fileInput.click()">Upload Image</button>
