const { $, copyText, t } = GZ;

function toSentenceCase(text) {
  // First lowercase everything
  let result = text.toLowerCase();
  // Capitalize first character
  result = result.charAt(0).toUpperCase() + result.slice(1);
  // Capitalize after sentence-ending punctuation
  result = result.replace(/([.!?]\s+)([a-z])/g, (m, p, c) => p + c.toUpperCase());
  // Capitalize after newline
  result = result.replace(/(\n\s*)([a-z])/g, (m, p, c) => p + c.toUpperCase());
  // Fix standalone "i" to "I"
  result = result.replace(/\bi\b/g, 'I');
  // Fix "i'" contractions
  result = result.replace(/\bi'/g, "I'");
  // Fix common abbreviations - keep their case
  const abbrevs = ['Mr.','Mrs.','Ms.','Dr.','Prof.','Sr.','Jr.','vs.','etc.','e.g.','i.e.'];
  abbrevs.forEach(ab => {
    const regex = new RegExp(ab.charAt(0).toUpperCase() + ab.slice(1), 'g');
    // Don't do anything special, just ensure abbreviations don't break sentence detection
  });
  return result;
}

function toTitleCase(text) {
  const minor = ['a','an','the','and','but','or','nor','for','so','yet','at','by','in','of','on','to','up','as','is','it','its','was','be','been','am','are','has','had','have','do','did','from','into','with','upon','but','for','or','not','the','a','an'];
  return text.toLowerCase().replace(/\b\w+/g, (word, offset) => {
    if (offset > 0 && minor.includes(word)) return word;
    return word.charAt(0).toUpperCase() + word.slice(1);
  });
}

function toCapitalize(text) {
  return text.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

function convert(mode) {
  const inp = $('#input').value;
  if (!inp) return;
  let result;
  switch(mode) {
    case 'sentence': result = toSentenceCase(inp); break;
    case 'title': result = toTitleCase(inp); break;
    case 'capitalize': result = toCapitalize(inp); break;
    case 'lower': result = inp.toLowerCase(); break;
    case 'upper': result = inp.toUpperCase(); break;
    default: result = inp;
  }
  $('#output').textContent = result;
}

$('#toolbar').innerHTML = `

  <button class="gz-btn gz-btn-secondary" onclick="convert('title')">${t('titleCase')}</button>
