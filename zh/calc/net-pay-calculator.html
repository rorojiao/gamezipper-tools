<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How is take-home pay calculated?","acceptedAnswer":{"@type":"Answer","text":"Take-home pay (net pay) is your gross salary minus all deductions: federal income tax, state income tax, Social Security (6.2%), Medicare (1.45%), and any additional Medicare tax. This tool estimates each deduction using 2024 US tax brackets."}},{"@type":"Question","name":"What is the Social Security tax rate?","acceptedAnswer":{"@type":"Answer","text":"The Social Security tax rate is 6.2% on wages up to an annual wage cap ($168,600 in 2024). Medicare is an additional 1.45% on all wages, with an extra 0.9% on earnings over $200,000 (single) or $250,000 (married)."}},{"@type":"Question","name":"Is this calculator accurate for my state?","acceptedAnswer":{"@type":"Answer","text":"The state tax is a flat percentage you enter. Real state taxes use brackets, deductions and credits that vary. For a precise figure, use your state's official tax tables or a payroll provider. This tool gives a close estimate for budgeting."}},{"@type":"Question","name":"Does this include 401(k) or benefits?","acceptedAnswer":{"@type":"Answer","text":"You can enter a 401(k) contribution percentage and it is deducted pre-tax from your gross pay before income tax is calculated. Health premiums and other benefits are not included — subtract them yourself for an exact net."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Take-Home Paycheck Calculator',
    toolDesc: 'Estimate your net pay after federal tax, state tax, FICA and 401(k). Uses 2024 US tax brackets.',
    lblGross: 'Gross pay amount',
    lblFreq: 'Pay frequency',
    lblStatus: 'Filing status',
    lblState: 'State income tax rate (%)',
    lbl401k: '401(k) contribution (%)',
    lblPretax: 'Other pre-tax deductions ($/yr)',
    grossAnnual: 'Gross annual salary',
    federalTax: 'Federal income tax',
    stateTax: 'State income tax',
    ssTax: 'Social Security (6.2%)',
    medicareTax: 'Medicare (1.45%)',
    k401Contrib: '401(k) contribution',
    totalDeductions: 'Total deductions',
    netAnnual: 'Net annual take-home',
    perHour: 'Hourly',
    perWeek: 'Weekly',
    perMonth: 'Monthly',
    perYear: 'Annual',
    disclaimer: 'Estimate only. Actual payroll uses precise withholding tables, credits and benefit elections.',
    clear: 'Clear',
    step1: 'Enter your gross pay and choose the pay frequency',
    step2: 'Pick your filing status (affects federal brackets)',
    step3: 'Optionally add state tax rate, 401(k) % and pre-tax deductions',
    step4: 'See net pay broken down by hour, week, month and year',
  },
  zh: {
    toolTitle: '税后实发工资计算器',
    toolDesc: '估算扣除联邦税、州税、社保和 401(k) 后的到手工资。使用 2024 年美国税率表。',
    lblGross: '税前工资金额',
    lblFreq: '发薪周期',
    lblStatus: '报税身份',
    lblState: '州所得税率 (%)',
    lbl401k: '401(k) 缴存比例 (%)',
    lblPretax: '其他税前扣除（美元/年）',
    grossAnnual: '税前年薪',
    federalTax: '联邦所得税',
    stateTax: '州所得税',
    ssTax: '社保（6.2%）',
    medicareTax: '医疗保险（1.45%）',
    k401Contrib: '401(k) 缴存',
    totalDeductions: '总扣除',
    netAnnual: '税后年实发',
    perHour: '每小时',
    perWeek: '每周',
    perMonth: '每月',
    perYear: '每年',
    disclaimer: '仅为估算。实际工资单使用精确的预扣表、抵扣和福利选择。',
    clear: '清除',
    step1: '输入税前工资并选择发薪周期',
    step2: '选择报税身份（影响联邦税率表）',
    step3: '可选填州税率、401(k) 比例和税前扣除',
    step4: '查看按小时、周、月、年计算的实发工资',
  }
});

const { $, t } = GZ;
const SS_RATE = 0.062, SS_WAGE_CAP_2024 = 168600, MED_RATE = 0.0145, MED_EXTRA_RATE = 0.009;

// 2024 federal brackets — taxable income
const BRACKETS = {
  single: [[0,0.10],[11600,0.12],[47150,0.22],[100525,0.24],[191950,0.32],[243725,0.35],[609350,0.37]],
  married: [[0,0.10],[23200,0.12],[94300,0.22],[201050,0.24],[383900,0.32],[487450,0.35],[731200,0.37]],
  head:    [[0,0.10],[16550,0.12],[63100,0.22],[100500,0.24],[191950,0.32],[243700,0.35],[609350,0.37]],
};
const STD_DEDUCTION = { single: 14600, married: 29200, head: 21900 };

function calcFederalTax(taxable, status) {
  if (taxable <= 0) return 0;
  const brackets = BRACKETS[status] || BRACKETS.single;
  let tax = 0, prev = 0;
  for (let i = 0; i < brackets.length; i++) {
    const [lo, rate] = brackets[i];
    const hi = (i+1 < brackets.length) ? brackets[i+1][0] : Infinity;
    if (taxable > lo) {
      tax += (Math.min(taxable, hi) - lo) * rate;
    } else break;
  }
  return tax;
}

function fmt(n) { return '$' + (isFinite(n) ? n.toLocaleString('en-US', {maximumFractionDigits:0}) : '0'); }
function fmt2(n) { return '$' + (isFinite(n) ? n.toLocaleString('en-US', {maximumFractionDigits:2}) : '0.00'); }

function recalc() {
  const grossPerPeriod = parseFloat($('#gross').value);
  const periods = parseInt($('#freq').value);
  const status = $('#status').value;
  const stateRate = (parseFloat($('#stateRate').value) || 0) / 100;
  const k401Pct = (parseFloat($('#k401').value) || 0) / 100;
  const otherPretax = parseFloat($('#pretax').value) || 0;

  const out = $('#result');
  if (isNaN(grossPerPeriod) || grossPerPeriod <= 0) { out.innerHTML = ''; return; }

  const grossAnnual = grossPerPeriod * periods;
  const k401 = grossAnnual * k401Pct;
  const ssWages = Math.min(grossAnnual, SS_WAGE_CAP_2024);
  const ssTax = ssWages * SS_RATE;
  const medicareTax = grossAnnual * MED_RATE + (grossAnnual > 200000 ? (grossAnnual - 200000) * MED_EXTRA_RATE : 0);
  const taxableFed = Math.max(0, grossAnnual - k401 - otherPretax - (STD_DEDUCTION[status] || 14600));
  const fedTax = calcFederalTax(taxableFed, status);
  const stateTax = Math.max(0, grossAnnual - k401) * stateRate;
  const totalDeductions = fedTax + stateTax + ssTax + medicareTax + k401;
  const netAnnual = grossAnnual - totalDeductions;

  out.innerHTML = `
    <div class="result-card">
      <div class="pay-row"><span>${t('grossAnnual')}</span><span>${fmt(grossAnnual)}</span></div>
      <div class="pay-row deduct"><span>${t('federalTax')}</span><span>− ${fmt(fedTax)}</span></div>
      <div class="pay-row deduct"><span>${t('stateTax')}</span><span>− ${fmt(stateTax)}</span></div>
      <div class="pay-row deduct"><span>${t('ssTax')}</span><span>− ${fmt(ssTax)}</span></div>
      <div class="pay-row deduct"><span>${t('medicareTax')}</span><span>− ${fmt(medicareTax)}</span></div>
      ${k401 > 0 ? `<div class="pay-row deduct"><span>${t('k401Contrib')}</span><span>− ${fmt(k401)}</span></div>` : ''}
      <div class="pay-row deduct" style="border-bottom:2px solid var(--border)"><span><b>${t('totalDeductions')}</b></span><span><b>− ${fmt(totalDeductions)}</b></span></div>
      <div style="margin:14px 0 4px;color:var(--text2);font-size:.9em">${t('netAnnual')}</div>
      <div class="pay-big">${fmt(netAnnual)}</div>
      <div class="freq-grid">
        <div class="freq-box"><div class="lbl">${t('perHour')}</div><div class="val">${fmt2(netAnnual/2080)}</div></div>
        <div class="freq-box"><div class="lbl">${t('perWeek')}</div><div class="val">${fmt(netAnnual/52)}</div></div>
        <div class="freq-box"><div class="lbl">${t('perMonth')}</div><div class="val">${fmt(netAnnual/12)}</div></div>
        <div class="freq-box"><div class="lbl">${t('perYear')}</div><div class="val">${fmt(netAnnual)}</div></div>
      </div>
      <div style="margin-top:14px;font-size:.78em;color:var(--text3)">⚠ ${t('disclaimer')}</div>
    </div>`;
}

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="$('#gross').value='';recalc()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏰', href:'/calc/hourly-to-salary-calculator.html', name:'Hourly to Salary'},
    {icon:'💸', href:'/calc/income-tax-calculator.html', name:'Income Tax'},
    {icon:'🏖️', href:'/calc/retirement-calculator.html', name:'Retirement'},
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
