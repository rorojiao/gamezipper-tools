<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="convert-dir">
      <button class="dir-btn active" onclick="setDir('webp2png',this)">WebP → PNG</button>
      <button class="dir-btn" onclick="setDir('webp2jpg',this)">WebP → JPG</button>
      <button class="dir-btn" onclick="setDir('png2webp',this)">PNG/JPG → WebP</button>
    </div>
    <div class="quality-row" id="qualityRow">
      <span style="font-size:.85em;white-space:nowrap" id="lbl-quality"></span>
      <input type="range" id="quality" min="10" max="100" value="90">
      <span id="qualityVal" style="font-size:.85em;min-width:36px">90%</span>
    </div>
    <div class="drop-zone" id="dropzone">
      <div style="font-size:2.5rem">🖼️</div>
      <p id="lbl-drop"></p>
      <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
    </div>
    <div class="file-list" id="fileList"></div>
  </div>

  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'WebP ↔ PNG/JPG Converter',
    toolDesc: 'Convert WebP images to PNG or JPG, or convert PNG/JPG to WebP. Batch support, quality control, instant download. All in your browser.',
    lblDrop: 'Drop images here or click to upload (batch supported)',
    lblQuality: 'Quality',
    downloadAll: 'Download All',
    clear: 'Clear',
    step1: 'Choose conversion direction (WebP→PNG, WebP→JPG, or PNG/JPG→WebP)',
    step2: 'Adjust quality if needed (for JPG/WebP output)',
    step3: 'Drag and drop or select images to convert',
    step4: 'Download converted images individually or all at once',
  },
  zh: {
    toolTitle: 'WebP ↔ PNG/JPG 转换器',
    toolDesc: '将 WebP 图片转换为 PNG 或 JPG，或将 PNG/JPG 转换为 WebP。支持批量处理、质量控制、即时下载。完全浏览器本地处理。',
    lblDrop: '拖拽图片到此处或点击上传（支持批量）',
    lblQuality: '质量',
    downloadAll: '全部下载',
    clear: '清空',
    step1: '选择转换方向（WebP→PNG、WebP→JPG 或 PNG/JPG→WebP）',
    step2: '如需要可调整输出质量（适用于 JPG/WebP）',
    step3: '拖拽或选择图片进行转换',
    step4: '逐个下载或批量下载转换后的图片',
  }
});

const { $, t } = GZ;

let direction = 'webp2png';
let files = [];
let quality = 90;

window.setDir = function(dir, btn) {
  direction = dir;
  document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  $('#qualityRow').style.display = dir === 'webp2png' ? 'none' : '';
};

$('#quality').addEventListener('input', function() {
  quality = parseInt(this.value);
  $('#qualityVal').textContent = quality + '%';
});

$('#lbl-quality').textContent = t('lblQuality');

$('#dropzone').onclick = () => $('#fileInput').click();
$('#dropzone').addEventListener('dragover', e => { e.preventDefault(); $('#dropzone').classList.add('dragover'); });
$('#dropzone').addEventListener('dragleave', () => $('#dropzone').classList.remove('dragover'));
$('#dropzone').addEventListener('drop', e => {
  e.preventDefault();
  $('#dropzone').classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});
$('#fileInput').addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(fileList) {
  for (const file of fileList) {
    if (!file.type.startsWith('image/')) continue;
    const id = 'f' + Date.now() + Math.random().toString(36).slice(2,6);
    files.push({id, file, converted: null});
    convertFile(files[files.length - 1]);
  }
  renderList();
}

function getOutputMime() {
  if (direction === 'webp2png') return 'image/png';
  if (direction === 'webp2jpg') return 'image/jpeg';
  return 'image/webp';
}

function getExt() {
  if (direction === 'webp2png') return '.png';
  if (direction === 'webp2jpg') return '.jpg';
  return '.webp';
}

function convertFile(entry) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      if (direction === 'webp2jpg') {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
      ctx.drawImage(img, 0, 0);
      const mime = getOutputMime();
      entry.converted = canvas.toDataURL(mime, quality / 100);
      entry.width = img.width;
      entry.height = img.height;
      renderList();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(entry.file);
}

function renderList() {
  $('#fileList').innerHTML = files.map(f => {
    const origName = f.file.name;
    const newName = origName.replace(/\.[^.]+$/, '') + getExt();
    const sizeOrig = (f.file.size / 1024).toFixed(1);
    const sizeNew = f.converted ? ((f.converted.length * 3 / 4) / 1024).toFixed(1) : '...';
    const thumb = f.converted || '';
    return `<div class="file-item">
      ${thumb ? `<img src="${thumb}" alt="">` : '<div style="width:48px;height:48px;background:var(--glass2);border-radius:6px"></div>'}
      <div class="info"><div class="name">${origName} → ${newName}</div>
        <div class="meta">${f.width||'...'}×${f.height||'...'} | ${sizeOrig} KB → ${sizeNew} KB</div></div>
      <span class="status ${f.converted?'done':'pending'}">${f.converted?'✓ Done':'...'}</span>
      ${f.converted ? `<button onclick="downloadOne('${f.id}')">📥</button>` : ''}
    </div>`;
  }).join('');
}

window.downloadOne = function(id) {
  const f = files.find(x => x.id === id);
  if (!f || !f.converted) return;
  const a = document.createElement('a');
  a.href = f.converted;
  a.download = f.file.name.replace(/\.[^.]+$/, '') + getExt();
  a.click();
};

function downloadAll() {
  files.forEach(f => {
    if (f.converted) {
      setTimeout(() => downloadOne(f.id), 100);
    }
  });
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadAll()">📥 ${t('downloadAll')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="files=[];$('#fileList').innerHTML=''">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔄', href:'/image/converter.html', name:'Image Converter'},
    {icon:'📦', href:'/image/compressor.html', name:'Image Compressor'},
    {icon:'🖼️', href:'/image/svg-to-png.html', name:'SVG to PNG'},
    {icon:'📄', href:'/convert/pdf-to-image.html', name:'PDF to Image'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
