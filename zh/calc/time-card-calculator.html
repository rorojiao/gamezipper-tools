<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Time Card Calculator","description":"Free time card calculator. Enter clock in / out times for each workday, subtract lunch breaks, and instantly see total hours, regular vs overtime and gross pay.","url": "https://tools.gamezipper.com/zh/calc/time-card-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How does the time card calculator work?", "acceptedAnswer": {"@type": "Answer", "text": "Enter your clock-in and clock-out time for each day, plus an unpaid lunch break in minutes. The tool computes the worked hours per day, sums them for the week, and splits them into regular and overtime based on the daily or weekly threshold you set."}}, {"@type": "Question", "name": "How is overtime calculated?", "acceptedAnswer": {"@type": "Answer", "text": "By default, hours over 8 in a day or over 40 in a week are counted as overtime at 1.5x pay. You can change the regular-hour threshold, the overtime multiplier, and even set a daily rate or weekly salary in the settings above the table."}}, {"@type": "Question", "name": "Does this time card calculator support 12-hour AM/PM time?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The time format dropdown switches between 12-hour (AM/PM) and 24-hour input. Times that span midnight (e.g. a 10 PM to 6 AM shift) are handled automatically by rolling the end time to the next day."}}, {"@type": "Question", "name": "Is my timesheet data private?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. All calculations run locally in your browser. No names, pay rates, or hours are ever uploaded to a server. Nothing is stored after you close the tab."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="tc-top">
      <label><span id="lblRate"></span><input type="number" id="rate" value="20" min="0" step="0.01"></label>
      <label><span id="lblOtMult"></span><input type="number" id="otMult" value="1.5" min="1" step="0.1"></label>
      <label><span id="lblReg"></span><input type="number" id="regHours" value="8" min="1" max="24" step="0.5"></label>
      <label><span id="lblFmt"></span>
        <select id="fmt"><option value="12">12-hour AM/PM</option><option value="24">24-hour</option></select>
      </label>
      <label><span id="lblStartDay"></span>
        <select id="startDay"><option value="0">Sunday</option><option value="1" selected>Monday</option><option value="6">Saturday</option></select>
      </label>
    </div>
    <table class="tc-table">
      <thead><tr>
        <th id="thDay"></th><th id="thIn"></th><th id="thOut"></th><th id="thBreak"></th><th id="thHours"></th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="tc-result" id="result">
      <div class="tc-card main"><div class="v" id="gross">—</div><div class="l" id="lblGross"></div></div>
      <div class="tc-card"><div class="v" id="regHrs">0</div><div class="l" id="lblRegHrs"></div></div>
      <div class="tc-card"><div class="v" id="otHrs">0</div><div class="l" id="lblOtHrs"></div></div>
      <div class="tc-card"><div class="v" id="totalHrs">0</div><div class="l" id="lblTotalHrs"></div></div>
    </div>

  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Time Card Calculator',
    toolDesc: 'Enter clock in / out times for each workday, subtract unpaid breaks, and instantly see total hours, regular vs overtime and gross pay.',
    lblRate: 'Hourly rate ($)',
    lblOtMult: 'Overtime multiplier',
    lblReg: 'Regular hours/day',
    lblFmt: 'Time format',
    lblStartDay: 'Week starts on',
    thDay: 'Day', thIn: 'Clock In', thOut: 'Clock Out', thBreak: 'Break (min)', thHours: 'Hours',
    lblGross: 'Gross pay (week)',
    lblRegHrs: 'Regular hours',
    lblOtHrs: 'Overtime hours',
    lblTotalHrs: 'Total hours',
    note: 'All calculations run in your browser. Overtime applies to daily hours over the regular threshold. Times that cross midnight are handled automatically.',
    btnExample: 'Load Example Week',
    btnClear: 'Clear',
    btnExport: '⬇ Export CSV',
    step1: 'Set your hourly rate, overtime multiplier and regular hours per day',
    step2: 'Pick the week start day and 12- or 24-hour time format',
    step3: 'Type clock in / out and break minutes for each day you worked',
    step4: 'Read the total hours, regular vs overtime and gross weekly pay',
  },
  zh: {
    toolTitle: '考勤卡计算器',
    toolDesc: '输入每天上下班时间，扣除无薪休息，即时查看总工时、正常/加班工时和周毛收入。',
    lblRate: '时薪（$）',
    lblOtMult: '加班倍数',
    lblReg: '每天正常工时',
    lblFmt: '时间格式',
    lblStartDay: '一周起始日',
    thDay: '日期', thIn: '上班', thOut: '下班', thBreak: '休息(分)', thHours: '工时',
    lblGross: '周毛收入',
    lblRegHrs: '正常工时',
    lblOtHrs: '加班工时',
    lblTotalHrs: '总工时',
    note: '所有计算在浏览器本地完成。超过每日正常工时阈值的部分计入加班。跨午夜的班次会自动处理。',
    btnExample: '加载示例周',
    btnClear: '清空',
    btnExport: '⬇ 导出 CSV',
    step1: '设置时薪、加班倍数和每天正常工时',
    step2: '选择一周起始日和 12/24 小时时间格式',
    step3: '输入每天的上下班时间和休息分钟数',
    step4: '查看总工时、正常/加班工时和周毛收入',
  }
});

const { $, t } = GZ;
const DAYS_EN = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAYS_ZH = ['周日','周一','周二','周三','周四','周五','周六'];

function buildRows() {
  const start = parseInt($('#startDay').value, 10);
  const isZh = GZI18n.getLang() === 'zh';
  const names = isZh ? DAYS_ZH : DAYS_EN;
  const order = [];
  for (let i = 0; i < 7; i++) order.push((start + i) % 7);
  const oldVals = {};
  document.querySelectorAll('#rows tr').forEach(tr => {
    oldVals[tr.dataset.idx] = [tr.querySelector('.in').value, tr.querySelector('.out').value, tr.querySelector('.brk').value];
  });
  let html = '';
  for (const idx of order) {
    const v = oldVals[idx] || ['', '', '30'];
    const hCell = `<td class="hrs" id="h-${idx}"></td>`;
    html += `<tr data-idx="${idx}"><td class="day">${names[idx]}</td>
      <td><input class="in" type="time" value="${v[0]}"></td>
      <td><input class="out" type="time" value="${v[1]}"></td>
      <td><input class="brk" type="number" min="0" step="5" value="${v[2]}"></td>${hCell}</tr>`;
  }
  $('#rows').innerHTML = html;
  $('#rows').querySelectorAll('input').forEach(i => i.addEventListener('input', calc));
  calc();
}

function dayHours(inT, outT, brk) {
  if (!inT || !outT) return 0;
  const [ih, im] = inT.split(':').map(Number);
  const [oh, om] = outT.split(':').map(Number);
  let mins = (oh * 60 + om) - (ih * 60 + im);
  if (mins < 0) mins += 24 * 60; // overnight
  mins -= brk || 0;
  return Math.max(0, mins / 60);
}

function fmtMoney(n) {
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtHrs(n) { return n.toFixed(2) + 'h'; }

function calc() {
  const rate = parseFloat($('#rate').value) || 0;
  const otMult = parseFloat($('#otMult').value) || 1.5;
  const reg = parseFloat($('#regHours').value) || 8;
  let regTotal = 0, otTotal = 0;
  document.querySelectorAll('#rows tr').forEach(tr => {
    const inT = tr.querySelector('.in').value;
    const outT = tr.querySelector('.out').value;
    const brk = parseFloat(tr.querySelector('.brk').value) || 0;
    const h = dayHours(inT, outT, brk);
    const cell = $('#h-' + tr.dataset.idx);
    cell.textContent = h > 0 ? fmtHrs(h) : '';
    const r = Math.min(h, reg);
    const o = Math.max(0, h - reg);
    regTotal += r; otTotal += o;
  });
  const total = regTotal + otTotal;
  const gross = regTotal * rate + otTotal * rate * otMult;
  $('#regHrs').textContent = fmtHrs(regTotal);
  $('#otHrs').textContent = fmtHrs(otTotal);
  $('#totalHrs').textContent = fmtHrs(total);
  $('#gross').textContent = fmtMoney(gross);
}

function loadExample() {
  $('#rate').value = 22; $('#otMult').value = 1.5; $('#regHours').value = 8;
  const start = parseInt($('#startDay').value, 10);
  const isZh = GZI18n.getLang() === 'zh';
  const names = isZh ? DAYS_ZH : DAYS_EN;
  const order = [];
  for (let i = 0; i < 7; i++) order.push((start + i) % 7);
  // Mon..Fri worked hours; Sat/Sun off
  const byDay = { 0:['','' ,'0'], 1:['09:00','17:30','45'], 2:['09:00','18:15','45'], 3:['08:45','17:00','30'], 4:['09:00','17:00','30'], 5:['09:00','16:30','30'], 6:['','' ,'0'] };
  let html = '';
  for (const idx of order) {
    const v = byDay[idx];
    const hCell = `<td class="hrs" id="h-${idx}"></td>`;
    html += `<tr data-idx="${idx}"><td class="day">${names[idx]}</td>
      <td><input class="in" type="time" value="${v[0]}"></td>
      <td><input class="out" type="time" value="${v[1]}"></td>
      <td><input class="brk" type="number" min="0" step="5" value="${v[2]}"></td>${hCell}</tr>`;
  }
  $('#rows').innerHTML = html;
  $('#rows').querySelectorAll('input').forEach(i => i.addEventListener('input', calc));
  calc();
}

function doClear() {
  document.querySelectorAll('#rows input').forEach(i => {
    if (i.classList.contains('brk')) i.value = '30'; else i.value = '';
  });
  calc();
}

function exportCSV() {
  const isZh = GZI18n.getLang() === 'zh';
  const names = isZh ? DAYS_ZH : DAYS_EN;
  let csv = 'Day,Clock In,Clock Out,Break (min),Hours\n';
  document.querySelectorAll('#rows tr').forEach(tr => {
    const idx = tr.dataset.idx;
    const inT = tr.querySelector('.in').value || '';
    const outT = tr.querySelector('.out').value || '';
    const brk = tr.querySelector('.brk').value || '0';
    const h = dayHours(inT, outT, parseFloat(brk) || 0);
    csv += `${names[idx]},${inT},${outT},${brk},${h.toFixed(2)}\n`;
  });
  const rate = parseFloat($('#rate').value) || 0;
  const otMult = parseFloat($('#otMult').value) || 1.5;
  csv += `,,,,\nHourly rate,,${rate},Overtime multiplier,${otMult}\n`;
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'time-card.csv';
  a.click();
}

['#rate','#otMult','#regHours','#fmt','#startDay'].forEach(s => $(s).addEventListener('input', buildRows));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('btnExample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="exportCSV()">${t('btnExport')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('btnClear')}</button>`;
$('#note').textContent = t('note');

buildRows();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏰',href:'/calc/hours-calculator.html',name:'Hours Calculator'},
    {icon:'⏱️',href:'/calc/overtime-calculator.html',name:'Overtime'},
    {icon:'📋',href:'/calc/loan-amortization.html',name:'Amortization'},
    {icon:'💼',href:'/calc/salary-calculator.html',name:'Salary Calc'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
