<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I calculate my aquarium's volume?","acceptedAnswer":{"@type":"Answer","text":"For a rectangular tank, multiply length × width × height (in inches) and divide by 231 to get US gallons, or in cm divide by 1000 for liters. This tool does it automatically and also subtracts the typical 10-15% displaced by substrate and decorations."}},{"@type":"Question","name":"How accurate is the calculated aquarium volume?","acceptedAnswer":{"@type":"Answer","text":"The geometric calculation is exact for the tank's interior dimensions. Actual water volume is usually 10-20% less because of substrate (gravel/sand), rocks, driftwood, filters and the fact that tanks are rarely filled to the very top. This tool shows both the raw and realistic water volumes."}},{"@type":"Question","name":"How many fish can I put in my aquarium?","acceptedAnswer":{"@type":"Answer","text":"A common guideline is 1 inch of adult fish per gallon of water (or 1 cm per 2 liters) for small community fish. Reduce stocking for larger or territorial species, and always account for the adult size of the fish, filtration capacity and water change routine."}},{"@type":"Question","name":"How much does aquarium water weigh?","acceptedAnswer":{"@type":"Answer","text":"Water weighs about 8.34 lb per US gallon (1 kg per liter). A filled 55-gallon tank holds about 459 lb of water alone — plus the weight of glass, substrate and decorations. Always check that your floor or stand can support the total weight."}}]}</script>

      </label>

    <div class="gz-aq-form shape-fields active" id="fields-rect">
      <label id="lbl-len">Length<input type="number" id="rect-l" min="1" step="0.1" placeholder="36" oninput="autoCalc()"></label>
      <label id="lbl-wid">Width<input type="number" id="rect-w" min="1" step="0.1" placeholder="18" oninput="autoCalc()"></label>
      <label id="lbl-hei">Height<input type="number" id="rect-h" min="1" step="0.1" placeholder="16" oninput="autoCalc()"></label>

    <div class="gz-aq-form shape-fields" id="fields-bow">
      <label>Length<input type="number" id="bow-l" min="1" step="0.1" placeholder="36" oninput="autoCalc()"></label>
      <label>Side Width<input type="number" id="bow-w" min="1" step="0.1" placeholder="13" oninput="autoCalc()"></label>
      <label>Bow Depth<input type="number" id="bow-d" min="1" step="0.1" placeholder="6" oninput="autoCalc()"></label>
      <label>Height<input type="number" id="bow-h" min="1" step="0.1" placeholder="16" oninput="autoCalc()"></label>
    </div>
    <div class="gz-aq-form shape-fields" id="fields-cyl">
      <label>Diameter<input type="number" id="cyl-d" min="1" step="0.1" placeholder="20" oninput="autoCalc()"></label>

    <div class="gz-aq-form shape-fields" id="fields-hex">

      <label>Height<input type="number" id="hex-h" min="1" step="0.1" placeholder="20" oninput="autoCalc()"></label>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Aquarium Volume Calculator',
    toolDesc: 'Calculate your fish tank volume in gallons and liters from its dimensions. Supports rectangular, bow-front, cylinder, hexagon and corner tanks. Get water weight, substrate amount and stocking guidance.',
    calculate: 'Calculate',
    clear: 'Clear',
    shape: 'Tank Shape',
    rect: 'Rectangular', bow: 'Bow Front', cyl: 'Cylinder', hex: 'Hexagon', corner: 'Corner (Pentagon)',
    inches: 'Inches', centimeters: 'Centimeters',
    length: 'Length', width: 'Width', height: 'Height',
    rawVolume: 'Raw Volume',
    waterVolume: 'Actual Water (85%)',
    waterWeight: 'Water Weight',
    substrate: 'Substrate (2 in depth)',
    stockingIn: 'Stocking (1 in/gal)',
    stockingCm: 'Stocking (1 cm/2 L)',
    gal: 'gal', liter: 'L', lb: 'lb', kg: 'kg', inch: 'in', cm: 'cm',
    stockNote: 'Stocking is a rough guideline only. Always research the adult size, temperament and filtration needs of each species. Overstocking causes poor water quality and disease.',
    step1: 'Choose your tank shape and measurement units',
    step2: 'Enter the interior dimensions (not the outer glass)',
    step3: 'See volume in US gallons, imperial gallons and liters',
    step4: 'Review water weight, substrate and stocking suggestions',
  },
  zh: {
    toolTitle: '鱼缸水量计算器',
    toolDesc: '根据鱼缸尺寸计算水量（加仑和升）。支持矩形、弓形、圆柱、六边形和角缸。附带水重、底砂用量和养殖密度建议。',
    calculate: '计算',
    clear: '清除',
    shape: '鱼缸形状',
    rect: '矩形', bow: '弓形（前凸）', cyl: '圆柱', hex: '六边形', corner: '角缸（五边形）',
    inches: '英寸', centimeters: '厘米',
    length: '长', width: '宽', height: '高',
    rawVolume: '原始容积',
    waterVolume: '实际水量（85%）',
    waterWeight: '水重',
    substrate: '底砂（2 英寸厚）',
    stockingIn: '养殖密度（1 英寸/加仑）',
    stockingCm: '养殖密度（1 厘米/2 升）',
    gal: '加仑', liter: '升', lb: '磅', kg: '公斤', inch: '英寸', cm: '厘米',
    stockNote: '养殖密度仅供参考。请务必查阅每种鱼的成体尺寸、性格和过滤需求。过度养殖会导致水质恶化与疾病。',
    step1: '选择鱼缸形状和度量单位',
    step2: '输入内部尺寸（不含玻璃厚度）',
    step3: '查看美制加仑、英制加仑和升的容积',
    step4: '查看水重、底砂和养殖密度建议',
  }
});

const { $, copyText, t } = GZ;

const SHAPE_FIELDS = { rect:'fields-rect', bow:'fields-bow', cyl:'fields-cyl', hex:'fields-hex', corner:'fields-corner' };

function onShape() {
  const shape = $('#shape').value;
  Object.values(SHAPE_FIELDS).forEach(id => $('#'+id).classList.remove('active'));
  $('#' + SHAPE_FIELDS[shape]).classList.add('active');
  // i18n labels
  $('#opt-rect').textContent = t('rect');
  $('#opt-bow').textContent = t('bow');
  $('#opt-cyl').textContent = t('cyl');
  $('#opt-hex').textContent = t('hex');
  $('#opt-corner').textContent = t('corner');
  $('#opt-in').textContent = t('inches');
  $('#opt-cm').textContent = t('centimeters');
  autoCalc();
}

function num(id){ return parseFloat($('#'+id)?.value) || 0; }

function calcVolumeCm3(shape) {
  const u = $('#unit').value;
  const toCm = u === 'in' ? 2.54 : 1;
  let v = 0; // cm^3
  if (shape === 'rect') {
    v = num('rect-l') * num('rect-w') * num('rect-h');
  } else if (shape === 'bow') {
    const l = num('bow-l'), w = num('bow-w'), d = num('bow-d'), h = num('bow-h');
    // approx: rectangle + half-ellipse bow bulge
    v = (l * w) + (l * d * Math.PI / 4);
    v *= h;
  } else if (shape === 'cyl') {
    const d = num('cyl-d'), h = num('cyl-h');
    v = Math.PI * (d/2)*(d/2) * h;
  } else if (shape === 'hex') {
    // regular hexagon side s
    const s = num('hex-s'), h = num('hex-h');
    v = (3 * Math.sqrt(3) / 2) * s * s * h;
  } else if (shape === 'corner') {
    // pentagon: 2 sides of equal length along the corner + bow
    const s = num('corner-s'), h = num('corner-h');
    v = (3 * Math.sqrt(3) / 2) * s * s * h * 0.83; // pentagonal approximation
  }
  return v * (toCm ** 3);
}

function autoCalc() {
  const shape = $('#shape').value;
  const vCm3 = calcVolumeCm3(shape);
  if (vCm3 <= 0) { $('#result').style.display = 'none'; $('#aqInfo').innerHTML = ''; $('#stockNote').textContent = ''; return; }
  const liters = vCm3 / 1000;
  const usGal = liters / 3.78541;
  const impGal = liters / 4.54609;
  const waterLiters = liters * 0.85;
  const waterGal = usGal * 0.85;
  const weightKg = waterLiters; // 1 L = 1 kg
  const weightLb = weightKg * 2.20462;
  // substrate: 2-inch layer = rectangular footprint * 5.08 cm
  const u = $('#unit').value;
  const volUnit = u === 'in' ? 'in' : 'cm';
  $('#volume').textContent = usGal.toFixed(1) + ' ' + t('gal') + '  /  ' + liters.toFixed(1) + ' ' + t('liter');
  $('#volumeSub').textContent = impGal.toFixed(1) + ' imp gal  ·  actual water ≈ ' + waterGal.toFixed(1) + ' ' + t('gal') + ' (' + waterLiters.toFixed(1) + ' ' + t('liter') + ')';
  $('#result').style.display = 'block';
  $('#aqInfo').innerHTML = `
    <div class="gz-aq-card"><strong>${t('rawVolume')}</strong>${usGal.toFixed(1)} ${t('gal')} / ${liters.toFixed(1)} ${t('liter')}</div>
    <div class="gz-aq-card"><strong>${t('waterVolume')}</strong>${waterGal.toFixed(1)} ${t('gal')} / ${waterLiters.toFixed(1)} ${t('liter')}</div>
    <div class="gz-aq-card"><strong>${t('waterWeight')}</strong>${weightLb.toFixed(0)} ${t('lb')} / ${weightKg.toFixed(0)} ${t('kg')}</div>
    <div class="gz-aq-card"><strong>${t('stockingIn')}</strong>${(usGal*0.85).toFixed(0)} ${t('inch')} of fish</div>
  `;
  $('#stockNote').textContent = t('stockNote');
}

function doClear() {
  ['rect-l','rect-w','rect-h','bow-l','bow-w','bow-d','bow-h','cyl-d','cyl-h','hex-s','hex-h','corner-s','corner-h'].forEach(id => { const el=$('#'+id); if(el) el.value=''; });
  $('#result').style.display = 'none';
  $('#aqInfo').innerHTML = '';
  $('#stockNote').textContent = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="autoCalc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

onShape();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🐕', href:'/calc/dog-age-calculator.html', name:'Dog Age'},
    {icon:'🐱', href:'/calc/cat-age-calculator.html', name:'Cat Age'},
    {icon:'📐', href:'/calc/aspect-ratio.html', name:'Aspect Ratio'},
    {icon:'📏', href:'/convert/unit.html', name:'Unit Converter'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
