const { $, copyText, t } = GZ;

// Compute specificity (a, b, c) for a selector
function specificity(selector) {
  // Use a synthetic test: count IDs, classes/attrs/pseudo-classes, elements/pseudo-elements
  let a = 0, b = 0, c = 0;
  // Tokenize naively — replace pseudo-elements with element counts
  const cleaned = selector.replace(/::?[a-zA-Z-]+(\([^)]*\))?/g, m => {
    if (m.startsWith('::')) c++;
    else b++;
    return '';
  });
  // IDs: #id
  a += (cleaned.match(/#[\w-]+/g) || []).length;
  // classes, attributes, pseudo-classes already counted in cleaned
  b += (cleaned.match(/\.[\w-]+/g) || []).length;
  b += (cleaned.match(/\[[^\]]+\]/g) || []).length;
  // elements (tag names not preceded by . # or : )
  const tags = cleaned.replace(/[#.][\w-]+/g, '').replace(/\[[^\]]+\]/g, '').match(/\b[a-zA-Z][\w-]*/g) || [];
  // exclude combinators and pseudo keywords
  const reserved = new Set(['is','where','not','has','nth','child','of','type','only','first','last','even','odd','n','root','empty','link','visited','hover','active','focus','checked','disabled','enabled','lang','dir','scope','any','matches','global','host','part','slotted','defined','required','optional','placeholder','read','valid','invalid','in','out','default','indeterminate','blank','current','past','future','playing','paused','muted','volume','seeking','buffering','stalled','loaded','connecting','open','closed','local','link2']);
  for (const tag of tags) {
    if (reserved.has(tag.toLowerCase())) continue;
    c++;
  }
  return { a, b, c, score: (a, b, c) };
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function serializeNode(node) {
  return node.outerHTML || node.textContent || '';
}

function doTest() {
  const html = $('#htmlInput').value;
  const selector = $('#selector').value.trim();
  const preview = $('#preview');
  const result = $('#result');
  if (!selector) { result.textContent = ''; preview.innerHTML = ''; return; }

  // Build a sandbox
  const parser = new DOMParser();
  const doc = parser.parseFromString('<div id="root">' + html + '</div>', 'text/html');
  const root = doc.getElementById('root');

  let matches = [];
  try {
    matches = [...root.querySelectorAll(selector)];
  } catch (e) {
    result.innerHTML = '<span style="color:var(--gz-error)">' + t('invalidSelector').replace('%1', escapeHtml(e.message)) + '</span>';
    // Still render preview without highlight
    preview.innerHTML = renderHtmlPreview(root, new Set());
    return;
  }

  // Compute specificity
  const spec = specificity(selector);

  // Mark matched nodes
  const matchedSet = new Set(matches);
  preview.innerHTML = renderHtmlPreview(root, matchedSet);

  // Result text
  const cnt = matches.length;
  const countLabel = cnt === 0 ? '<span class="match-count zero">' + t('noMatch') + '</span>' : '<span class="match-count">' + t('matched').replace('%1', cnt) + '</span>';
  const specLabel = '<span class="specificity">' + t('specificity') + ': (' + spec.a + ', ' + spec.b + ', ' + spec.c + ')</span>';
  let html2 = countLabel + ' ' + specLabel;
  if (cnt > 0) {
    html2 += '<div class="matched-html"><strong>' + t('matchedHtml') + ':</strong>\n' + escapeHtml(matches.map(m => serializeNode(m)).join('\n')) + '</div>';
    html2 += '<div style="margin-top:8px"><button class="gz-btn" onclick="copyMatched()">' + t('copy') + '</button></div>';
  }
  result.innerHTML = html2;
}

window.copyMatched = function() {
  const html = $('#htmlInput').value;
  const selector = $('#selector').value.trim();
  if (!selector) return;
  const parser = new DOMParser();
  const doc = parser.parseFromString('<div id="root">' + html + '</div>', 'text/html');
  const root = doc.getElementById('root');
  try {
    const matches = [...root.querySelectorAll(selector)];
    copyText(matches.map(m => serializeNode(m)).join('\n'));
  } catch (e) {}
};

function renderHtmlPreview(root, matchedSet) {
  // Walk children recursively
  function walk(node, depth) {
    let html = '';
    for (const child of node.childNodes) {
      if (child.nodeType === 1) {
        const isMatch = matchedSet.has(child);
        const tag = child.tagName.toLowerCase();
        let attrs = '';
        for (const attr of child.attributes) {
          attrs += ' <span class="preview-attr">' + attr.name + '="' + escapeHtml(attr.value) + '"</span>';
        }
        const opener = '<span class="preview-tag' + (isMatch ? ' gz-hl' : '') + '">&lt;<span class="preview-tag-name">' + tag + '</span>' + attrs + '&gt;</span>';
        const inner = walk(child, depth + 1);
        const closer = '<span class="preview-tag">&lt;/<span class="preview-tag-name">' + tag + '</span>&gt;</span>';
        html += '\n' + '  '.repeat(depth) + opener + inner + closer;
      } else if (child.nodeType === 3) {
        const txt = child.textContent.replace(/\s+/g, ' ').trim();
        if (txt) html += '<span class="preview-text"> ' + escapeHtml(txt) + ' </span>';
      }
    }
    return html;
  }
  return walk(root, 0);
}
