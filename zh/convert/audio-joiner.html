<script>
GZI18n.register({
  en: {
    toolTitle: 'Audio Joiner',
    toolDesc: 'Merge multiple audio files into one. Combine MP3, WAV, OGG files online — free, no upload, all in your browser.',
    dropFiles: 'Drag & drop audio files or click to upload',
    merge: 'Merge All',
    clear: 'Clear All',
    noFiles: 'No audio files added yet',
    step1: 'Drag and drop audio files or click to upload',
    step2: 'Reorder files using up/down arrows',
    step3: 'Click Merge to combine all audio into one file',
    step4: 'Download the merged audio as WAV',
    processing: 'Processing...',
    merged: '✓ Merged successfully!',
    sec: 's',
  },
  zh: {
    toolTitle: '音频合并工具',
    toolDesc: '将多个音频文件合并为一个。支持 MP3、WAV、OGG 格式 — 免费、无需上传，完全浏览器本地处理。',
    dropFiles: '拖拽音频文件到此处或点击上传',
    merge: '合并全部',
    clear: '清空全部',
    noFiles: '尚未添加音频文件',
    step1: '拖拽音频文件或点击上传',
    step2: '使用上下箭头调整顺序',
    step3: '点击「合并全部」将音频合并为一个文件',
    step4: '下载合并后的 WAV 音频',
    processing: '处理中...',
    merged: '✓ 合并成功！',
    sec: '秒',
  }
});

const { $, t } = GZ;
let audioFiles = [];
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const dropZone = $('#drop-zone');
const fileInput = $('#file-input');
$('#drop-label').textContent = t('dropFiles');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); addFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', e => addFiles(e.target.files));

async function addFiles(files) {
  for (const f of files) {
    if (!f.type.startsWith('audio/')) continue;
    const buf = await f.arrayBuffer();
    const audioBuf = await audioCtx.decodeAudioData(buf);
    audioFiles.push({ name: f.name, buffer: audioBuf, duration: audioBuf.duration });
  }
  renderList();
}

function renderList() {
  const list = $('#file-list');
  list.innerHTML = audioFiles.map((f, i) => `
    <li>
      <span class="name">🎵 ${f.name}</span>
      <span class="dur">${f.duration.toFixed(1)}${t('sec')}</span>
      <button onclick="moveUp(${i})" title="↑">⬆</button>
      <button onclick="moveDown(${i})" title="↓">⬇</button>
      <button onclick="removeFile(${i})" title="✕">✕</button>
    </li>`).join('');
}

window.moveUp = i => { if (i > 0) { [audioFiles[i-1], audioFiles[i]] = [audioFiles[i], audioFiles[i-1]]; renderList(); } };
window.moveDown = i => { if (i < audioFiles.length-1) { [audioFiles[i], audioFiles[i+1]] = [audioFiles[i+1], audioFiles[i]]; renderList(); } };
window.removeFile = i => { audioFiles.splice(i, 1); renderList(); };

async function mergeAudio() {
  if (audioFiles.length < 2) return;
  const bar = $('#progress-bar');
  bar.style.width = '10%';

  const totalLen = audioFiles.reduce((s, f) => s + f.buffer.length, 0);
  const sampleRate = audioFiles[0].buffer.sampleRate;
  const channels = audioFiles[0].buffer.numberOfChannels;
  const offline = new OfflineAudioContext(channels, totalLen, sampleRate);
  let offset = 0;

  for (let i = 0; i < audioFiles.length; i++) {
    const src = offline.createBufferSource();
    src.buffer = audioFiles[i].buffer;
    src.connect(offline.destination);
    src.start(offset / sampleRate);
    offset += audioFiles[i].buffer.length;
    bar.style.width = (10 + (80 * (i + 1) / audioFiles.length)) + '%';
  }

  const rendered = await offline.startRendering();
  bar.style.width = '100%';

  const wav = audioBufferToWav(rendered);
  const blob = new Blob([wav], { type: 'audio/wav' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'merged-audio.wav'; a.click();
  URL.revokeObjectURL(url);
}

function audioBufferToWav(buffer) {
  const numCh = buffer.numberOfChannels;
  const sr = buffer.sampleRate;
  const len = buffer.length;
  const bytesPerSample = 2;
  const blockAlign = numCh * bytesPerSample;
  const dataSize = len * blockAlign;
  const ab = new ArrayBuffer(44 + dataSize);
  const v = new DataView(ab);
  function writeStr(offset, str) { for(let i=0;i<str.length;i++) v.setUint8(offset+i, str.charCodeAt(i)); }
  writeStr(0, 'RIFF'); v.setUint32(4, 36+dataSize, true); writeStr(8, 'WAVE');
  writeStr(12, 'fmt '); v.setUint32(16, 16, true); v.setUint16(20, 1, true);
  v.setUint16(22, numCh, true); v.setUint32(24, sr, true);
  v.setUint32(28, sr*blockAlign, true); v.setUint16(32, blockAlign, true);
  v.setUint16(34, 16, true); writeStr(36, 'data'); v.setUint32(40, dataSize, true);
  const channels = [];
  for (let c = 0; c < numCh; c++) channels.push(buffer.getChannelData(c));
  let off = 44;
  for (let i = 0; i < len; i++) {
    for (let c = 0; c < numCh; c++) {
      let s = Math.max(-1, Math.min(1, channels[c][i]));
      s = s < 0 ? s * 0x8000 : s * 0x7FFF;
      v.setInt16(off, s, true); off += 2;
    }
  }
  return ab;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="mergeAudio()">${t('merge')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="audioFiles=[];renderList()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'✂️', href:'/convert/audio-trimmer.html', name:'Audio Trimmer'},
    {icon:'🔊', href:'/convert/audio-volume.html', name:'Audio Volume'},
    {icon:'⚡', href:'/convert/audio-speed.html', name:'Audio Speed'},
    {icon:'🔄', href:'/convert/audio-converter.html', name:'Audio Converter'},
  ]
});
</script>
