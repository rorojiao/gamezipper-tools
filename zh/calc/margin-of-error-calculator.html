<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Margin of Error Calculator","description":"Free margin of error calculator for surveys and polls. Enter sample size, population size and confidence level to get MOE instantly.","url": "https://tools.gamezipper.com/zh/calc/margin-of-error-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is margin of error?", "acceptedAnswer": {"@type": "Answer", "text": "The margin of error (MOE) is a statistic expressing the amount of random sampling error in a survey's results. It represents the range within which the true population value is likely to fall, given a certain confidence level."}}, {"@type": "Question", "name": "How is margin of error calculated?", "acceptedAnswer": {"@type": "Answer", "text": "For a simple random sample: MOE = z × √(p(1-p)/n), where z is the critical value (1.96 for 95%), p is the sample proportion (0.5 for max MOE), and n is the sample size. For finite populations, a correction factor is applied."}}, {"@type": "Question", "name": "What sample size do I need for a 5% margin of error?", "acceptedAnswer": {"@type": "Answer", "text": "For a 95% confidence level with maximum variability (p=0.5), you need a sample of about 384 for large populations. Use the sample size calculator to get exact numbers for your situation."}}, {"@type": "Question", "name": "Is this margin of error calculator free?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, completely free with no signup required. All calculations run locally in your browser for full privacy."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="input-group">
      <div>
        <label id="lbl-n"></label>
        <input type="number" id="sampleSize" class="gz-input" step="1" min="1" value="384">
      </div>
      <div>
        <label id="lbl-pop"></label>
        <input type="number" id="popSize" class="gz-input" step="1" min="0" value="100000" placeholder="0 = infinite">
      </div>
      <div>
        <label id="lbl-cl"></label>
        <select id="confLevel" class="gz-select">
          <option value="0.90">90%</option>
          <option value="0.95" selected>95%</option>
          <option value="0.99">99%</option>
          <option value="0.80">80%</option>
        </select>
      </div>
      <div>
        <label id="lbl-p"></label>
        <input type="number" id="proportion" class="gz-input" step="0.01" min="0" max="1" value="0.5">
      </div>
    </div>
    <div style="text-align:center;margin-top:14px">
      <button class="gz-btn" id="calcBtn" style="padding:12px 32px;font-size:1.1em"></button>
    </div>
    <div id="result" style="margin-top:16px"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Margin of Error Calculator',
    toolDesc: 'Calculate the margin of error for surveys and polls. Enter sample size, population and confidence level to get instant results.',
    nLabel: 'Sample Size (n)',
    popLabel: 'Population Size (0 = ∞)',
    clLabel: 'Confidence Level',
    pLabel: 'Sample Proportion (p)',
    calcBtn: 'Calculate MOE',
    moeResult: 'Margin of Error',
    ciRange: 'Confidence Interval Range',
    criticalVal: 'Critical Value (z)',
    finitePop: 'Finite Population Correction',
    needValid: 'Please enter valid values',
    interpText: (pct, lower, upper) => `At ${pct}% confidence, your results are within ±${((upper-lower)/2*100).toFixed(2)}% of the true population value.`,
    step1: 'Enter your sample size',
    step2: 'Enter the population size (0 or leave for infinite/large population)',
    step3: 'Choose your confidence level (usually 95%)',
    step4: 'Click Calculate to get your margin of error',
  },
  zh: {
    toolTitle: '误差范围计算器',
    toolDesc: '计算调查和民调的误差范围。输入样本量、总体大小和置信水平，即时获取结果。',
    nLabel: '样本量 (n)',
    popLabel: '总体大小 (0 = ∞)',
    clLabel: '置信水平',
    pLabel: '样本比例 (p)',
    calcBtn: '计算误差范围',
    moeResult: '误差范围',
    ciRange: '置信区间范围',
    criticalVal: '临界值 (z)',
    finitePop: '有限总体校正',
    needValid: '请输入有效值',
    interpText: (pct, lower, upper) => `在 ${pct}% 置信度下，你的结果在真实总体值的 ±${((upper-lower)/2*100).toFixed(2)}% 范围内。`,
    step1: '输入你的样本量',
    step2: '输入总体大小（0 或留空表示无限/大总体）',
    step3: '选择置信水平（通常为 95%）',
    step4: '点击计算获取误差范围',
  }
});

const { $, t } = GZ;

const zCrit = { 0.80: 1.2816, 0.90: 1.6449, 0.95: 1.9600, 0.99: 2.5758 };

function calculate() {
  const n = parseInt($('#sampleSize').value);
  const N = parseInt($('#popSize').value) || 0;
  const cl = parseFloat($('#confLevel').value);
  let p = parseFloat($('#proportion').value);
  if (isNaN(n) || n < 1 || isNaN(p)) {
    $('#result').innerHTML = `<div style="text-align:center;color:var(--gz-accent,#e94560)">${t('needValid')}</div>`;
    return;
  }
  p = Math.max(0, Math.min(1, p));
  const z = zCrit[cl] || 1.96;
  // MOE = z * sqrt(p(1-p)/n) * FPC
  let moe = z * Math.sqrt(p * (1 - p) / n);
  let fpcApplied = false;
  if (N > 0 && N > n) {
    const fpc = Math.sqrt((N - n) / (N - 1));
    moe *= fpc;
    fpcApplied = true;
  }
  const moePct = moe * 100;
  const lower = p - moe;
  const upper = p + moe;
  const pct = Math.round(cl * 100);
  const fmt = v => (v * 100).toFixed(2) + '%';
  $('#result').innerHTML = `
    <div class="result-box">
      <div class="label">${t('moeResult')}</div>
      <div class="moe-val">±${moePct.toFixed(2)}%</div>
      <div class="detail-row">
        <div class="detail-item"><div class="val">z = ${z.toFixed(4)}</div><div class="lbl">${t('criticalVal')}</div></div>
        <div class="detail-item"><div class="val">${fmt(lower)} – ${fmt(upper)}</div><div class="lbl">${t('ciRange')}</div></div>
        <div class="detail-item"><div class="val">${fpcApplied ? '✓ Applied' : 'Not needed'}</div><div class="lbl">${t('finitePop')}</div></div>
      </div>
      <div style="margin-top:14px;font-size:0.9em;opacity:0.8">${t('interpText')(pct, lower, upper)}</div>
    </div>`;
}

$('#lbl-n').textContent = t('nLabel');
$('#lbl-pop').textContent = t('popLabel');
$('#lbl-cl').textContent = t('clLabel');
$('#lbl-p').textContent = t('pLabel');
$('#calcBtn').textContent = t('calcBtn');
$('#calcBtn').addEventListener('click', calculate);
$('#confLevel').addEventListener('change', calculate);

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/calc/confidence-interval-calculator.html', name:'Confidence Interval'},
    {icon:'🔬', href:'/calc/sample-size-calculator.html', name:'Sample Size'},
    {icon:'📊', href:'/calc/p-value-calculator.html', name:'P-Value'},
    {icon:'📐', href:'/calc/z-score-calculator.html', name:'Z-Score'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
