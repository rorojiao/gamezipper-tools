<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-split">
      <div>
        <label class="field-label" data-i18n="senderNameLabel"></label>
        <input id="senderName" placeholder="Your Company Name">
        <label class="field-label" data-i18n="subjectLabel"></label>
        <input id="subject" placeholder="Newsletter Subject Line">
        <label class="field-label" data-i18n="previewTextLabel"></label>
        <input id="previewText" placeholder="Short preview text shown in inbox">
        <div class="color-row">
          <div><label class="field-label" data-i18n="headerBg" style="margin-top:0"></label><input type="color" id="headerBg" value="#4F46E5"></div>
          <div><label class="field-label" data-i18n="accentColor" style="margin-top:0"></label><input type="color" id="accentColor" value="#7C3AED"></div>
          <div><label class="field-label" data-i18n="bgColor" style="margin-top:0"></label><input type="color" id="bgColor" value="#F9FAFB"></div>
        </div>
        <div id="sections-container"></div>
        <button class="gz-btn gz-btn-secondary" onclick="addSection()" style="margin-top:12px" id="add-section-btn"></button>
        <label class="field-label" data-i18n="footerLabel"></label>
        <textarea id="footer" rows="2" placeholder="© 2026 Your Company. You received this because you signed up at..."></textarea>
        <label class="field-label" data-i18n="unsubscribeLabel"></label>
        <input id="unsubscribe" placeholder="https://yoursite.com/unsubscribe">
      </div>
      <div>
        <iframe id="preview-frame" sandbox="allow-same-origin"></iframe>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Newsletter Generator',
    toolDesc: 'Create professional email newsletters visually. Add sections, customize colors and export table-based HTML for any email platform.',
    senderNameLabel: 'Sender / Company Name',
    subjectLabel: 'Email Subject',
    previewTextLabel: 'Preview Text',
    headerBg: 'Header BG',
    accentColor: 'Accent',
    bgColor: 'Body BG',
    footerLabel: 'Footer Text',
    unsubscribeLabel: 'Unsubscribe URL',
    addSection: '+ Add Section',
    step1: 'Enter your company name, subject line and preview text',
    step2: 'Add content sections with titles and body text',
    step3: 'Customize colors to match your brand',
    step4: 'Preview live and copy or download the HTML',
  },
  zh: {
    toolTitle: '邮件通讯生成器',
    toolDesc: '可视化创建专业邮件通讯。添加内容区块，自定义配色，导出兼容所有邮件平台的 HTML。',
    senderNameLabel: '发送者 / 公司名称',
    subjectLabel: '邮件主题',
    previewTextLabel: '预览文本',
    headerBg: '头部背景',
    accentColor: '强调色',
    bgColor: '正文背景',
    footerLabel: '页脚文字',
    unsubscribeLabel: '退订链接',
    addSection: '+ 添加内容区块',
    step1: '输入公司名称、邮件主题和预览文本',
    step2: '添加内容区块，填写标题和正文',
    step3: '自定义配色以匹配你的品牌',
    step4: '实时预览并复制或下载 HTML',
  }
});

const { $, copyText, t } = GZ;
let sections = [];

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function addSection(title, body) {
  const idx = sections.length;
  sections.push({ title: title || '', body: body || '' });
  renderSections();
  renderPreview();
}

function removeSection(idx) {
  sections.splice(idx, 1);
  renderSections();
  renderPreview();
}

function renderSections() {
  const container = $('#sections-container');
  container.innerHTML = sections.map((s, i) => `
    <div class="section-block">
      <button class="remove-section" onclick="removeSection(${i})">✕</button>
      <h4>Section ${i + 1}</h4>
      <input id="sec-title-${i}" value="${esc(s.title)}" placeholder="Section Title" oninput="sections[${i}].title=this.value;renderPreview()">
      <textarea id="sec-body-${i}" placeholder="Section content — supports line breaks" oninput="sections[${i}].body=this.value;renderPreview()" style="margin-top:6px">${esc(s.body)}</textarea>
    </div>`).join('');
  $('#add-section-btn').textContent = t('addSection');
}

function generateHtml() {
  const name = $('#senderName').value || 'Your Company';
  const subject = $('#subject').value || 'Newsletter';
  const preview = $('#previewText').value || '';
  const hBg = $('#headerBg').value;
  const accent = $('#accentColor').value;
  const bg = $('#bgColor').value;
  const footer = $('#footer').value || '';
  const unsub = $('#unsubscribe').value || '#';

  let bodyHtml = '';
  sections.forEach(s => {
    if (!s.title && !s.body) return;
    bodyHtml += `
    <tr><td style="padding:24px 32px 8px;font-size:20px;font-weight:bold;color:#111">${esc(s.title)}</td></tr>
    <tr><td style="padding:0 32px 24px;font-size:15px;line-height:1.7;color:#444">${esc(s.body).replace(/\n/g,'<br>')}</td></tr>
    <tr><td style="padding:0 32px"><hr style="border:none;border-top:1px solid #e5e7eb"></td></tr>`;
  });

  return `<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>${esc(subject)}</title></head>
<body style="margin:0;padding:0;background:${bg};font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
<div style="display:none;font-size:1px;color:#fefefe">${esc(preview)}</div>
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:${bg}">
<tr><td align="center">
<table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:8px;overflow:hidden;margin:24px 0">
<tr><td style="background:${hBg};padding:32px;text-align:center">
<h1 style="margin:0;color:#fff;font-size:24px;letter-spacing:.5px">${esc(name)}</h1>
<p style="margin:8px 0 0;color:rgba(255,255,255,.85);font-size:14px">${esc(subject)}</p>
</td></tr>
${bodyHtml}
<tr><td style="padding:24px 32px;font-size:13px;color:#999;text-align:center;line-height:1.6">
${esc(footer).replace(/\n/g,'<br>')}
<br><a href="${esc(unsub)}" style="color:${accent}">Unsubscribe</a>
</td></tr>
</table>
</td></tr>
</table>
</body></html>`;
}

function renderPreview() {
  const html = generateHtml();
  const frame = $('#preview-frame');
  const doc = frame.contentDocument || frame.contentWindow.document;
  doc.open();
  doc.write(html);
  doc.close();
}

function downloadHtml() {
  const html = generateHtml();
  const blob = new Blob([html], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'newsletter.html';
  a.click();
}

function loadExample() {
  $('#senderName').value = 'GameZipper Updates';
  $('#subject').value = 'June 2026 — New Tools & Features';
  $('#previewText').value = 'Check out 5 new tools we just launched this month!';
  $('#footer').value = '© 2026 GameZipper. 123 Tool Street, San Francisco, CA 94102';
  $('#unsubscribe').value = 'https://tools.gamezipper.com/unsubscribe';
  sections = [
    { title: '🚀 5 New Tools This Month', body: 'We\'ve added 5 powerful new tools to our toolbox:\n\n• CSS Hover Effect Generator — design interactive hover states\n• Press Release Generator — create professional press releases\n• Newsletter Generator (this template!)\n• Emoji Combiner — mix and match emojis\n• Scroll Animation Generator — add smooth animations' },
    { title: '💡 Pro Tip: Keyboard Shortcuts', body: 'Did you know most of our tools support keyboard shortcuts? Press Ctrl+Enter to submit, Ctrl+Shift+C to copy output, and Escape to clear.' },
    { title: '📊 Community Stats', body: 'We now have 695+ free tools used by over 2 million people every month. Thank you for being part of our community!' }
  ];
  renderSections();
  renderPreview();
}

function doClear() {
  $('#senderName').value = '';
  $('#subject').value = '';
  $('#previewText').value = '';
  $('#footer').value = '';
  $('#unsubscribe').value = '';
  sections = [];
  renderSections();
  renderPreview();
}

// Event listeners
['#senderName','#subject','#previewText','#headerBg','#accentColor','#bgColor','#footer','#unsubscribe'].forEach(sel => {
  $(sel).addEventListener('input', renderPreview);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadHtml()">${t('download')||'Download'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(generateHtml())">${t('copy')||'Copy'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')||'Example'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')||'Clear'}</button>`;

renderPreview();
GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📧', href:'/text/email-template.html', name:'Email Template'},
    {icon:'📄', href:'/text/press-release-generator.html', name:'Press Release'},
    {icon:'✉️', href:'/text/cover-letter-generator.html', name:'Cover Letter'},
    {icon:'📋', href:'/text/invoice-generator.html', name:'Invoice Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
