    validate: '验证',
    example: '示例',
    clear: '清除',
    inputLabel: '在此粘贴你的 JSON-LD',
    outputLabel: '验证报告',
    syntaxOk: '✓ JSON 语法正确',
    syntaxErr: '✗ JSON 语法错误',
    contextOk: '✓ @context 已设置为 schema.org',
    contextWarn: '⚠ @context 缺失或未设置为 "https://schema.org"',
    typeOk: '✓ 检测到 @type：',
    typeWarn: '⚠ 未找到 @type — 每个 JSON-LD 块都需要 @type',
    richEligible: '符合',
    richReview: '需检查',
    step1: '将 JSON-LD 结构化数据粘贴到输入区',
    step2: '点击「验证」运行所有检查',
    step3: '查看报告中的语法错误和缺失属性',
    step4: '修复问题并重新验证，直到所有检查通过',
  }
});

const { $, copyText, t } = GZ;

const REQUIRED_PROPS = {
  Product: ['name'],
  Article: ['headline','author','datePublished'],
  NewsArticle: ['headline','author','datePublished'],
  BlogPosting: ['headline','author','datePublished'],
  Event: ['name','startDate'],
  Organization: ['name'],
  LocalBusiness: ['name','address'],
  FAQPage: [],
  BreadcrumbList: ['itemListElement'],
  Recipe: ['name','recipeIngredient','recipeInstructions'],
  Review: ['itemReviewed','reviewRating','author'],
  VideoObject: ['name','uploadDate'],
  HowTo: ['name','step'],
  Person: ['name'],
  Place: ['name'],
  Question: ['name','acceptedAnswer'],
};

const RICH_TYPES = ['Product','Article','NewsArticle','BlogPosting','Event','FAQPage','Recipe','Review','VideoObject','HowTo','BreadcrumbList','LocalBusiness'];

function syntaxHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c = 'json-number';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-string';
      else if (/true|false/.test(m)) c = 'json-bool';
      else if (/null/.test(m)) c = 'json-null';
      return `<span class="${c}">${m}</span>`;
    });
}

function validate() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').innerHTML = '<span style="opacity:.5">—</span>'; return; }

  // Strip <script> wrapper if present
  let jsonStr = inp;
  const scriptMatch = inp.match(/<script[^>]*type=["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/i);
  if (scriptMatch) jsonStr = scriptMatch[1].trim();

  let obj;
  const checks = [];

  try {
    obj = JSON.parse(jsonStr);
    checks.push({type:'ok', msg: t('syntaxOk')});
  } catch(e) {
    checks.push({type:'err', msg: `${t('syntaxErr')}: ${e.message}`});
    $('#output').innerHTML = checks.map(c => `<div class="check-item"><span class="check-${c.type}">${c.msg}</span></div>`).join('');
    return;
  }

  // Check @context
  const ctx = obj['@context'];
  if (ctx && /schema\.org/.test(String(ctx))) {
    checks.push({type:'ok', msg: t('contextOk')});
  } else {
    checks.push({type:'warn', msg: t('contextWarn')});
  }

  // Check @type
  let typeVal = obj['@type'];
  if (Array.isArray(typeVal)) typeVal = typeVal[0];
  if (typeVal) {
    const isRich = RICH_TYPES.includes(typeVal);
    const badge = isRich ? `<span class="rich-badge" style="background:var(--accent);color:#fff">${t('richEligible')}</span>` : `<span class="rich-badge" style="background:#f0a040;color:#fff">${t('richReview')}</span>`;
    checks.push({type:'ok', msg: `${t('typeOk')} <strong>${typeVal}</strong> ${badge}`});
  } else {
    checks.push({type:'warn', msg: t('typeWarn')});
  }

  // Check required props
  const req = REQUIRED_PROPS[typeVal];
  if (req) {
    req.forEach(prop => {
      if (obj[prop] !== undefined && obj[prop] !== '') {
        checks.push({type:'ok', msg: `✓ <strong>${prop}</strong> is present`});
      } else {
        checks.push({type:'err', msg: `✗ Missing required property: <strong>${prop}</strong>`});
      }
    });
  }

  // Type-specific warnings
  if (typeVal === 'Product' && obj.aggregateRating) {
    const ar = obj.aggregateRating;
    if (ar.ratingValue === undefined) checks.push({type:'warn', msg: '⚠ aggregateRating missing ratingValue'});
    if (ar.reviewCount === undefined && ar.ratingCount === undefined) checks.push({type:'warn', msg: '⚠ aggregateRating needs reviewCount or ratingCount'});
  }
  if (typeVal === 'Article' || typeVal === 'NewsArticle' || typeVal === 'BlogPosting') {
    if (!obj.image) checks.push({type:'warn', msg: '⚠ image is recommended for Article rich results'});
  }
  if ((typeVal === 'Product' || typeVal === 'Event') && !obj.offers) {
    checks.push({type:'warn', msg: `⚠ offers is recommended for ${typeVal}`});
  }

  // Pretty print
  const pretty = JSON.stringify(obj, null, 2);
  const highlighted = syntaxHighlight(pretty);

  $('#output').innerHTML = checks.map(c => `<div class="check-item"><span class="check-${c.type}">${c.msg}</span></div>`).join('')
    + `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)"><strong style="font-size:.8rem;opacity:.7">Formatted JSON-LD:</strong><pre style="margin-top:8px;white-space:pre-wrap;word-break:break-all">${highlighted}</pre></div>`;
}

function loadExample() {
  $('#input').value = JSON.stringify({
    "@context":"https://schema.org",
    "@type":"Product",
    "name":"Blue Widget Pro",
    "image":"https://example.com/widget.jpg",
    "description":"A high-quality blue widget for everyday use.",
    "sku":"WIDGET-001",
    "brand":{"@type":"Brand","name":"AcmeCorp"},
    "offers":{"@type":"Offer","price":"29.99","priceCurrency":"USD","availability":"https://schema.org/InStock"},
    "aggregateRating":{"@type":"AggregateRating","ratingValue":4.5,"reviewCount":127}
  }, null, 2);
  validate();
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = '<span style="opacity:.5">—</span>'; }

$('#input').addEventListener('input', validate);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="validate()">${t('validate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

document.querySelector('#lbl-in').textContent = t('inputLabel');
document.querySelector('#lbl-out').textContent = t('outputLabel');
$('#output').innerHTML = '<span style="opacity:.5">—</span>';
