function mod97(numStr){ // big-number mod 97, processed in chunks
  let rem = 0;
  for(let i=0;i<numStr.length;i++){
    rem = (rem*10 + (numStr.charCodeAt(i)-48)) % 97;
  }
  return rem;
}

function validateIban(raw){
  const iban = raw.replace(/\s+/g,'').toUpperCase();
  if(!iban) return {ok:false,reason:'enterIban'};
  if(!/^[A-Z0-9]+$/.test(iban)) return {ok:false,reason:'invalidFormat'};
  if(iban.length<15) return {ok:false,reason:'tooShort'};
  if(iban.length>34) return {ok:false,reason:'tooLong'};
  const cc = iban.substring(0,2);
  if(!COUNTRIES[cc]) return {ok:false,reason:'badCountry'};
  if(iban.length!==COUNTRIES[cc][0]) return {ok:false,reason:'badLength'};
  // rearrange: move first 4 chars to end
  const rearranged = iban.substring(4) + iban.substring(0,4);
  // convert letters
  let numStr='';
  for(const ch of rearranged){
    const code = ch.charCodeAt(0);
    if(code>=48 && code<=57) numStr += ch;
    else if(code>=65 && code<=90) numStr += (code-55).toString(); // A=10
    else return {ok:false,reason:'invalidFormat'};
  }
  if(mod97(numStr)!==1) return {ok:false,reason:'badChecksum'};
  return {ok:true, cc, len: iban.length, check: iban.substring(2,4), bban: iban.substring(4)};
}

function doValidate(){
  const raw = $('#iban-input').value.trim();
  const r = validateIban(raw);
  if(r.ok){
    const lang = (localStorage.getItem('gz-lang')||'en');
    const countryName = lang==='zh' ? COUNTRIES[r.cc][2] : COUNTRIES[r.cc][1];
    $('#result').innerHTML = `<div class="iban-result iban-ok">
      <div style="font-size:1.1em;font-weight:700;margin-bottom:8px">${t('valid')}</div>
      <div class="iban-row"><span>${t('country')}</span><span>${r.cc} — ${countryName}</span></div>
      <div class="iban-row"><span>${t('checkDigits')}</span><span>${r.check}</span></div>
      <div class="iban-row"><span>${t('bban')}</span><span>${r.bban}</span></div>
      <div class="iban-row"><span>${t('length')}</span><span>${r.len}</span></div>
      <div class="iban-row" style="border:none"><span>${t('checksumOk')}</span><span>✓</span></div>
    </div>`;
  } else if(r.reason==='enterIban'){
    $('#result').innerHTML='';
  } else {
    $('#result').innerHTML = `<div class="iban-result iban-bad"><div style="font-weight:700">${t('invalid')}</div><div style="opacity:.8;margin-top:4px">${t(r.reason)}</div></div>`;
  }
}

function doClear(){ $('#iban-input').value=''; $('#result').innerHTML=''; }
function loadExample(){ $('#iban-input').value='DE89 3704 0044 0532 0130 00'; doValidate(); }

function doBulk(){
  const lines = $('#bulk-input').value.split('\n').map(s=>s.trim()).filter(Boolean);
  if(!lines.length){ $('#bulk-result').innerHTML=''; return; }
  let validCount=0;
  let html = lines.map((line,i)=>{
    const r = validateIban(line);
    if(r.ok) validCount++;
    const cls = r.ok ? 'iban-ok' : 'iban-bad';
    const label = r.ok ? t('valid') : t('invalid');
    const note = r.ok ? (r.cc+' · '+r.len) : t(r.reason);
    return `<div class="bulk-row ${cls}"><span style="word-break:break-all">${i+1}. ${line.replace(/\s+/g,' ').substring(0,42)}</span><span style="white-space:nowrap;font-weight:600">${label} <span style="opacity:.7">(${note})</span></span></div>`;
  }).join('');
  html = `<div style="margin-bottom:8px;font-weight:600">${validCount} / ${lines.length} ${t('valid2')}</div>` + html;
  $('#bulk-result').innerHTML = html;
}
function bulkClear(){ $('#bulk-input').value=''; $('#bulk-result').innerHTML=''; }

let mode='single';
function setMode(m){
  mode=m;
  $('#single-pane').style.display = m==='single'?'block':'none';

}
