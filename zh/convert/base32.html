<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is Base32 encoding?","acceptedAnswer":{"@type":"Answer","text":"Base32 is a binary-to-text encoding that represents data using 32 printable characters: A-Z and 2-7. It is case-insensitive and avoids visually ambiguous characters, making it ideal for human-readable codes like TOTP secrets."}},{"@type":"Question","name":"What is the difference between Base32 and Base64?","acceptedAnswer":{"@type":"Answer","text":"Base64 uses 64 characters (A-Z, a-z, 0-9, +, /) and produces shorter output. Base32 uses only 32 characters (A-Z, 2-7) and produces about 20% longer output, but is case-insensitive and safer for URLs and human entry."}},{"@type":"Question","name":"What is Base32hex?","acceptedAnswer":{"@type":"Answer","text":"Base32hex uses 0-9 and A-V instead of A-Z and 2-7. It is defined in RFC 4648 and maintains sort order — encoded strings sort the same as the original binary values."}},{"@type":"Question","name":"Where is Base32 used?","acceptedAnswer":{"@type":"Answer","text":"Base32 is commonly used in TOTP/HOTP secret keys, DNSSEC (NSEC3 hashes), BitTorrent info hashes, and any context where case-insensitive encoding is needed."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Base32 Encoder / Decoder',
    toolDesc: 'Encode text to Base32 or decode Base32 back to text. Supports standard Base32 and Base32hex alphabets.',
    encode: 'Encode',
    decode: 'Decode',
    inputLabel: 'Input (plain text or Base32)',
    outputLabel: 'Output',
    step1: 'Paste text to encode, or Base32 to decode',
    step2: 'Select the alphabet: Base32 (A-Z,2-7) or Base32hex (0-9,A-V)',
    step3: 'Click Encode or Decode',
    step4: 'Copy the result to clipboard',
    inputChars: 'Input chars',
    outputChars: 'Output chars',
    alphabet: 'Alphabet',
    invalidInput: 'Invalid Base32 input. Check for characters outside the allowed alphabet.',
  },
  zh: {
    toolTitle: 'Base32 编码 / 解码',
    toolDesc: '将文本编码为 Base32 或将 Base32 解码为文本。支持标准 Base32 和 Base32hex 字母表。',
    encode: '编码',
    decode: '解码',
    inputLabel: '输入（纯文本或 Base32）',
    outputLabel: '输出',
    step1: '粘贴要编码的文本，或要解码的 Base32',
    step2: '选择字母表：Base32 (A-Z,2-7) 或 Base32hex (0-9,A-V)',
    step3: '点击「编码」或「解码」按钮',
    step4: '复制结果到剪贴板',
    inputChars: '输入字符数',
    outputChars: '输出字符数',
    alphabet: '字母表',
    invalidInput: '无效的 Base32 输入。请检查是否包含不支持的字符。',
  }
});

const { $, copyText, t } = GZ;
const B32 = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
const B32HEX = '0123456789ABCDEFGHIJKLMNOPQRSTUV';
let mode = 'encode';
let alpha = 'base32';

function getAlphabet() { return alpha === 'base32hex' ? B32HEX : B32; }

function base32Encode(str) {
  const bytes = new TextEncoder().encode(str);
  let bits = '';
  for (const b of bytes) bits += b.toString(2).padStart(8, '0');
  while (bits.length % 5 !== 0) bits += '0';
  const a = getAlphabet();
  let result = '';
  for (let i = 0; i < bits.length; i += 5) result += a[parseInt(bits.substr(i, 5), 2)];
  return result;
}

function base32Decode(str) {
  const a = getAlphabet();
  str = str.toUpperCase().replace(/[=\s]/g, '');
  let bits = '';
  for (const c of str) {
    const idx = a.indexOf(c);
    if (idx === -1) return null;
    bits += idx.toString(2).padStart(5, '0');
  }
  const bytes = [];
  for (let i = 0; i + 8 <= bits.length; i += 8) bytes.push(parseInt(bits.substr(i, 8), 2));
  return new TextDecoder().decode(new Uint8Array(bytes));
}

function convert() {
  const input = $('#input').value;
  let result = '';
  if (mode === 'encode') {
    result = base32Encode(input);
  } else {
    const decoded = base32Decode(input);
    if (decoded === null) {
      result = t('invalidInput');
    } else {
      result = decoded;
    }
  }
  $('#output').value = result;
  $('#info').innerHTML = `
    <div><div class="lbl">${t('inputChars')}</div><div class="val">${input.length}</div></div>
    <div><div class="lbl">${t('outputChars')}</div><div class="val">${result.length}</div></div>
    <div><div class="lbl">${t('alphabet')}</div><div class="val">${alpha === 'base32hex' ? 'Base32hex (0-9, A-V)' : 'Base32 (A-Z, 2-7)'}</div></div>
    <div><div class="lbl">${t('mode')}</div><div class="val">${mode === 'encode' ? 'Encode' : 'Decode'}</div></div>
  `;
}

$('#input').addEventListener('input', convert);

$('#options').innerHTML = `
  <label><input type="radio" name="mode" value="encode" checked onchange="mode=this.value;convert()"> ${t('encode')}</label>
  <label><input type="radio" name="mode" value="decode" onchange="mode=this.value;convert()"> ${t('decode')}</label>
  <span style="width:16px"></span>
  <label><input type="radio" name="alpha" value="base32" checked onchange="alpha=this.value;convert()"> Base32</label>
  <label><input type="radio" name="alpha" value="base32hex" onchange="alpha=this.value;convert()"> Base32hex</label>
`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='Hello World';convert()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').value='';$('#info').innerHTML=''">${t('clear')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="const tmp=$('#input').value;$('#input').value=$('#output').value;$('#output').value=tmp;mode=mode==='encode'?'decode':'encode';document.querySelector('input[name=mode][value='+mode+']').checked=true;convert()">${t('swap')||'Swap'}</button>`;

$('#lbl-in').textContent = t('inputLabel');
$('#lbl-out').textContent = t('outputLabel');

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔐', href:'/dev/base64.html', name:'Base64'},
    {icon:'🔢', href:'/convert/number-base.html', name:'Number Base'},
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'#️⃣', href:'/dev/hash.html', name:'Hash Generator'},
  ]
});
</script>
