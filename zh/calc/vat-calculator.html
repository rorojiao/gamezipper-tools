<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'VAT Calculator',
    toolDesc: 'Add VAT to a net price or extract VAT from a gross price. Supports UK 20%, EU standard rates and custom rates — free and browser-only.',
    calculate: 'Calculate', reset: 'Reset',
    modeAdd: 'Add VAT (Net → Gross)', modeRemove: 'Remove VAT (Gross → Net)',
    lblAmount: 'Amount', lblRate: 'VAT Rate (%)', lblCountry: 'Quick Country Rate', lblCurrency: 'Currency Symbol',
    netAmount: 'Net Amount (ex VAT)', vatAmount: 'VAT', grossAmount: 'Gross Amount (inc VAT)',
    step1: 'Choose Add VAT (net to gross) or Remove VAT (gross to net)',
    step2: 'Enter the amount and VAT rate, or pick a country preset',
    step3: 'Select your currency symbol',
    step4: 'See net, VAT, and gross amounts calculated instantly',
  },
  zh: {
    toolTitle: '增值税计算器',
    toolDesc: '向净价添加增值税或从总价中扣除增值税。支持英国 20%、欧盟标准税率和自定义税率 — 免费且浏览器本地运行。',
    calculate: '计算', reset: '重置',
    modeAdd: '添加增值税（净价→含税）', modeRemove: '扣除增值税（含税→净价）',
    lblAmount: '金额', lblRate: '增值税率（%）', lblCountry: '国家税率预设', lblCurrency: '货币符号',
    netAmount: '净额（不含税）', vatAmount: '增值税', grossAmount: '含税总额',
    step1: '选择「添加增值税」（净→含税）或「扣除增值税」（含税→净）',
    step2: '输入金额和增值税率，或选择国家预设',
    step3: '选择货币符号',
    step4: '即时查看净额、增值税和含税总额',
  }
});

const { $, t } = GZ;
const COUNTRIES = [
  {name:'— Custom —', rate:0},
  {name:'United Kingdom', rate:20},
  {name:'Ireland', rate:23},
  {name:'Germany', rate:19},
  {name:'France', rate:20},
  {name:'Italy', rate:22},
  {name:'Spain', rate:21},
  {name:'Netherlands', rate:21},
  {name:'Belgium', rate:21},
  {name:'Austria', rate:20},
  {name:'Portugal', rate:23},
  {name:'Greece', rate:24},
  {name:'Poland', rate:23},
  {name:'Sweden', rate:25},
  {name:'Denmark', rate:25},
  {name:'Norway', rate:25},
  {name:'Finland', rate:25.5},
  {name:'Hungary', rate:27},
  {name:'Czech Republic', rate:21},
  {name:'Romania', rate:19},
  {name:'Bulgaria', rate:20},
  {name:'Luxembourg', rate:17},
  {name:'Malta', rate:18},
  {name:'Cyprus', rate:19},
  {name:'Croatia', rate:25},
  {name:'Slovakia', rate:23},
  {name:'Slovenia', rate:22},
  {name:'Estonia', rate:22},
  {name:'Latvia', rate:21},
  {name:'Lithuania', rate:21},
  {name:'Switzerland', rate:8.1},
  {name:'Australia (GST)', rate:10},
  {name:'New Zealand (GST)', rate:15},
  {name:'India (GST)', rate:18},
  {name:'Singapore (GST)', rate:9},
];
let mode = 'add';

function num(id){ return parseFloat($(id).value) || 0; }

function buildCountries(){
  $('#country').innerHTML = COUNTRIES.map(c =>
    `<option value="${c.rate}">${c.name}${c.rate > 0 ? ' (' + c.rate + '%)' : ''}</option>`
  ).join('');
}

function setCountry(){
  const r = $('#country').value;
  if(r > 0){ $('#rate').value = r; calculate(); }
}

function setMode(m){
  mode = m;
  $('#mode-add').classList.toggle('active', m === 'add');
  $('#mode-remove').classList.toggle('active', m === 'remove');
  calculate();
}

function calculate(){
  const amt = num('amount');
  const rate = num('rate');
  const cur = $('#currency').value;
  const fmt = n => cur + (Math.round(n * 100) / 100).toFixed(2);

  let net, vat, gross;
  if(mode === 'add'){
    net = amt;
    vat = amt * (rate / 100);
    gross = net + vat;
  } else {
    gross = amt;
    net = amt / (1 + rate / 100);
    vat = gross - net;
  }

  $('#output').innerHTML = `
    <div class="vc-results">
      <h3>${t('grossAmount')}</h3>
      <div class="vc-result-row"><span>${t('netAmount')}</span><span>${fmt(net)}</span></div>
      <div class="vc-result-row"><span>${t('vatAmount')} (${rate}%)</span><span class="val">${fmt(vat)}</span></div>
      <div class="vc-result-row total"><span>${t('grossAmount')}</span><span class="val">${fmt(gross)}</span></div>
    </div>`;
}

function reset(){
  $('#amount').value = '100.00';
  $('#rate').value = '20';
  $('#country').value = '20';
  $('#currency').value = '£';
  setMode('add');
}

['amount','rate','currency'].forEach(id => {
  $('#'+id).addEventListener('input', calculate);
  $('#'+id).addEventListener('change', calculate);
});

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="calculate()">${t('calculate')}</button><button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;

buildCountries();
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/sales-tax-calculator.html', name:'Sales Tax Calculator'},
    {icon:' diner', href:'/calc/tip-calculator.html', name:'Tip Calculator'},
    {icon:'💵', href:'/calc/profit-margin-calculator.html', name:'Profit Margin'},
    {icon:'🧮', href:'/calc/markup-calculator.html', name:'Markup Calculator'},
  ]
});
</script>
