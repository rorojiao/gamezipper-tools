  "accept": {syn:["agree","approve","welcome","embrace","acknowledge","receive"],ant:["reject","refuse","decline","deny","dismiss"],rel:["agree","yes","allow","admit"]},
  "reject": {syn:["refuse","decline","deny","dismiss","rebuff","veto"],ant:["accept","approve","agree","welcome"],rel:["no","deny","refuse","block"]},
  "laugh": {syn:["chuckle","giggle","snicker","roar","cackle","howl"],ant:["cry","weep","frown","sob"],rel:["smile","joke","funny","humor"]},
  "cry": {syn:["weep","sob","wail","bawl","shed tears","mourn"],ant:["laugh","smile","rejoice","cheer"],rel:["tears","sad","emotion","pain"]},
  "peace": {syn:["tranquility","harmony","calm","serenity","quiet","stillness"],ant:["war","conflict","chaos","violence","turmoil"],rel:["calm","quiet","rest","meditate"]},
  "war": {syn:["conflict","battle","combat","fight","struggle","warfare"],ant:["peace","harmony","truce","ceasefire"],rel:["army","soldier","fight","battle"]},
};

const { $, copyText, t } = GZ;
const history = [];

function lookup(word) {
  if (!word) word = $('#word').value.trim().toLowerCase();
  if (!word) return;
  $('#word').value = word;

  const data = THESAURUS[word];
  if (!data) {
    $('#results').innerHTML = `<div class="th-empty"><p>${t('notFound')} "<strong>${word}</strong>"</p><p style="font-size:.85rem;margin-top:4px">${t('notFoundHint')}</p></div>`;
    return;
  }

  if (!history.includes(word)) {
    history.unshift(word);
    if (history.length > 20) history.pop();
    renderHistory();
  }

  let html = '';
  if (data.syn && data.syn.length) {
    html += `<div class="th-section"><div class="th-section-title">${t('synonyms')}</div><div class="th-tags">`;
    html += data.syn.map(s => `<span class="th-tag syn" onclick="lookup('${s}')">${s}</span>`).join('');
    html += '</div></div>';
  }
  if (data.ant && data.ant.length) {
    html += `<div class="th-section"><div class="th-section-title">${t('antonyms')}</div><div class="th-tags">`;
    html += data.ant.map(s => `<span class="th-tag ant" onclick="lookup('${s}')">${s}</span>`).join('');
    html += '</div></div>';
  }
  if (data.rel && data.rel.length) {
    html += `<div class="th-section"><div class="th-section-title">${t('related')}</div><div class="th-tags">`;
    html += data.rel.map(s => `<span class="th-tag rel" onclick="lookup('${s}')">${s}</span>`).join('');
    html += '</div></div>';
  }
  $('#results').innerHTML = html;
}

function renderHistory() {
  if (history.length === 0) { $('#history').style.display = 'none'; return; }
  $('#history').style.display = 'block';
  $('#history-title').textContent = t('history');
  $('#history-tags').innerHTML = history.map(w =>
    `<span class="th-tag" onclick="lookup('${w}')">${w}</span>`
  ).join('');
}

$('#word').addEventListener('keydown', e => { if (e.key === 'Enter') lookup(); });

$('#btn-lookup').textContent = t('lookup');

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📝', href:'/text/spelling.html', name:'Spelling Checker'},
    {icon:'✏️', href:'/text/grammar.html', name:'Grammar Checker'},
    {icon:'📚', href:'/text/readability-checker.html', name:'Readability'},
    {icon:'🔤', href:'/text/word-counter.html', name:'Word Counter'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
