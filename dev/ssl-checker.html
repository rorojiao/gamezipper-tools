<script>
GZI18n.register({
  en: {
    toolTitle: 'SSL/TLS Certificate Checker',
    toolDesc: 'Check SSL certificate details for any website — issuer, validity, chain of trust and security info.',
    check: 'Check SSL',
    checking: 'Checking…',
    chainTitle: 'Certificate Chain',
    valid: '✓ Valid SSL Certificate',
    expiring: '⚠ Certificate Expiring Soon',
    expired: '✗ Certificate Expired',
    errorTitle: 'Could not check certificate',
    errorCors: 'The browser blocked the request (CORS). Try a different browser or check the domain manually.',
    step1: 'Enter a domain name (e.g. example.com)',
    step2: 'Click "Check SSL" to fetch certificate info',
    step3: 'Review the certificate details, issuer and chain',
    step4: 'Check the expiry date and validity status',
  },
  zh: {
    toolTitle: 'SSL/TLS 证书检查器',
    toolDesc: '检查任意网站的 SSL 证书详情 — 颁发者、有效期、信任链和安全信息。',
    check: '检查 SSL',
    checking: '检查中…',
    chainTitle: '证书链',
    valid: '✓ SSL 证书有效',
    expiring: '⚠ 证书即将过期',
    expired: '✗ 证书已过期',
    errorTitle: '无法检查证书',
    errorCors: '浏览器阻止了请求（CORS）。请尝试其他浏览器或手动检查域名。',
    step1: '输入域名（例如 example.com）',
    step2: '点击「检查 SSL」获取证书信息',
    step3: '查看证书详情、颁发者和证书链',
    step4: '检查过期日期和有效期状态',
  }
});

const { $, t } = GZ;
const input = $('#url-input');

function normalizeUrl(url) {
  url = url.trim().replace(/^https?:\/\//, '').replace(/\/.*$/, '');
  return url;
}

async function checkSSL() {
  const raw = input.value.trim();
  if (!raw) return;
  const domain = normalizeUrl(raw);
  input.value = domain;
  
  $('#result').style.display = 'none';
  $('#error-box').style.display = 'none';
  
  const btn = $('#check-btn');
  btn.textContent = t('checking');
  btn.disabled = true;
  
  try {
    // Use certificate-transparency.dev API (free, no key needed)
    const resp = await fetch(`https://certitude-proxy.p.rapidapi.com/cert?domain=${encodeURIComponent(domain)}`, {
      headers: { 'Accept': 'application/json' }
    }).catch(() => null);
    
    // Fallback: try direct connection info
    let certData = null;
    
    // Use a public API for certificate info
    const apiResp = await fetch(`https://api.certspotter.com/v1/issuances?domain=${encodeURIComponent(domain)}&expand=dns_names&expand=issuer`, {
      headers: { 'Accept': 'application/json' }
    }).catch(() => null);
    
    // Alternative: use browser's built-in fetch to test HTTPS
    const startTime = Date.now();
    let httpsOk = false;
    let httpsStatus = 0;
    try {
      const testResp = await fetch(`https://${domain}/`, { mode: 'no-cors', cache: 'no-store' });
      httpsOk = true;
      httpsStatus = testResp.status || 200;
    } catch(e) {
      httpsOk = false;
    }
    const latency = Date.now() - startTime;
    
    // Use SSL Labs-like public endpoint
    let sslInfo = null;
    try {
      const sslResp = await fetch(`https://api.ssllabs.com/api/v3/analyze?host=${encodeURIComponent(domain)}&publish=off&startNew=on`);
      if (sslResp.ok) sslInfo = await sslResp.json();
    } catch(e) {}
    
    // Build display from available data
    renderResult({
      domain,
      httpsOk,
      latency,
      sslInfo,
    });
  } catch(e) {
    $('#error-box').style.display = 'block';
    $('#error-box').textContent = e.message || String(e);
  }
  
  btn.textContent = t('check');
  btn.disabled = false;
}

function renderResult(data) {
  $('#result').style.display = 'block';
  
  const now = new Date();
  const isSecure = data.httpsOk;
  
  // Status bar
  const bar = $('#status-bar');
  if (isSecure) {
    bar.style.background = 'rgba(0,214,114,.15)';
    bar.style.color = '#00d672';
    bar.textContent = t('valid');
  } else {
    bar.style.background = 'rgba(233,69,96,.15)';
    bar.style.color = '#e94560';
    bar.textContent = t('errorTitle');
  }
  
  // Details
  const details = [
    [t('domain') || 'Domain', data.domain],
    [t('https') || 'HTTPS', isSecure ? '✓ Enabled' : '✗ Not Available'],
    [t('responseTime') || 'Response Time', `${data.latency}ms`],
    [t('checkedAt') || 'Checked At', now.toISOString()],
  ];
  
  // Add SSL Labs data if available
  if (data.sslInfo && data.sslInfo.status === 'READY' && data.sslInfo.endpoints && data.sslInfo.endpoints.length > 0) {
    const ep = data.sslInfo.endpoints[0];
    if (ep.details) {
      const d = ep.details;
      if (d.cert) {
        details.push(['Issuer', d.cert.issuerLabel || 'N/A']);
        details.push(['Valid From', d.cert.notBefore ? new Date(d.cert.notBefore * 1000).toISOString() : 'N/A']);
        details.push(['Valid Until', d.cert.notAfter ? new Date(d.cert.notAfter * 1000).toISOString() : 'N/A']);
        const daysLeft = d.cert.notAfter ? Math.ceil((d.cert.notAfter * 1000 - now) / 86400000) : 0;
        details.push(['Days Remaining', daysLeft > 0 ? `${daysLeft} days` : 'Expired']);
      }
      if (d.protocols && d.protocols.length) {
        details.push(['Protocol', d.protocols.map(p => p.name + ' ' + p.version).join(', ')]);
      }
      if (d.suites && d.suites.list && d.suites.list.length) {
        details.push(['Cipher Suite', d.suites.list[0].name]);
      }
      details.push(['Grade', ep.grade || 'N/A']);
    }
  }
  
  let html = '';
  details.forEach(([label, value]) => {
    html += `<div class="cert-row"><span class="cert-label">${label}</span><span class="cert-value">${value}</span></div>`;
  });
  $('#cert-details').innerHTML = html;
  
  // Chain
  $('#chain-title').textContent = t('chainTitle');
  if (data.sslInfo && data.sslInfo.certs) {
    let chainHtml = '';
    data.sslInfo.certs.forEach((c, i) => {
      chainHtml += `<div class="chain-item"><span class="chain-num">#${i+1}</span> ${c.commonName || 'Unknown'} <span style="opacity:.6">(${c.issuerLabel || 'Self-signed'})</span></div>`;
    });
    $('#cert-chain').innerHTML = chainHtml || '<div style="opacity:.6;text-align:center">No chain data available</div>';
  } else {
    $('#cert-chain').innerHTML = '<div style="opacity:.6;text-align:center">Certificate chain data requires SSL Labs analysis (may take a few minutes)</div>';
  }
}

$('#toolbar').innerHTML = `<button class="gz-btn" id="check-btn" onclick="checkSSL()">${t('check')}</button>`;

input.addEventListener('keydown', e => { if (e.key === 'Enter') checkSSL(); });

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌐', href:'/dev/http-headers.html', name:'HTTP Headers'},
    {icon:'📡', href:'/dev/dns-lookup.html', name:'DNS Lookup'},
    {icon:'🔗', href:'/dev/redirect-checker.html', name:'Redirect Checker'},
    {icon:'🔍', href:'/dev/whois-lookup.html', name:'WHOIS Lookup'},
  ]
});
</script>
