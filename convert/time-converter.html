</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Time Unit Converter',
    toolDesc: 'Convert between nanoseconds, microseconds, milliseconds, seconds, minutes, hours, days, weeks, months and years — instantly and free.',
    swap: 'Swap',
    clear: 'Clear',
    copy: 'Copy',
    step1: 'Enter a value in the input field',
    step2: 'Select the source time unit',
    step3: 'Select the target time unit',
    step4: 'The result updates instantly as you type',
  },
  zh: {
    toolTitle: '时间单位转换器',
    toolDesc: '在纳秒、微秒、毫秒、秒、分钟、小时、天、周、月、年等单位之间即时免费转换。',
    swap: '交换',
    clear: '清除',
    copy: '复制',
    step1: '在输入框中输入数值',
    step2: '选择源时间单位',
    step3: '选择目标时间单位',
    step4: '输入时结果即时更新',
  }
});

const { $, copyText, t } = GZ;

// Base unit: seconds
const UNITS = [
  { id: 'ns', label: 'Nanosecond (ns)',   zh: '纳秒 (ns)',    factor: 1e-9 },
  { id: 'us', label: 'Microsecond (µs)',  zh: '微秒 (µs)',    factor: 1e-6 },
  { id: 'ms', label: 'Millisecond (ms)',  zh: '毫秒 (ms)',    factor: 1e-3 },
  { id: 's',  label: 'Second (s)',        zh: '秒 (s)',       factor: 1 },
  { id: 'min',label: 'Minute (min)',      zh: '分钟 (min)',   factor: 60 },
  { id: 'h',  label: 'Hour (h)',          zh: '小时 (h)',     factor: 3600 },
  { id: 'd',  label: 'Day (d)',           zh: '天 (d)',       factor: 86400 },
  { id: 'wk', label: 'Week (wk)',         zh: '周 (wk)',      factor: 604800 },
  { id: 'mo', label: 'Month (avg)',       zh: '月（平均）',   factor: 2629800 },   // 365.25/12 days
  { id: 'yr', label: 'Year (365.25 d)',   zh: '年（365.25 天）', factor: 31557600 },
  { id: 'dec',label: 'Decade',            zh: '十年',          factor: 315576000 },
  { id: 'cen',label: 'Century',           zh: '世纪',          factor: 3155760000 },
];

const lang = GZI18n.getLang();
const opts = UNITS.map(u => `<option value="${u.id}">${lang === 'zh' ? u.zh : u.label}</option>`).join('');

$('#converter').innerHTML = `
  <div class="gz-converter-row">
    <input type="number" id="inputVal" placeholder="0" step="any" oninput="convert()">
    <select id="fromUnit" onchange="convert()">${opts}</select>
  </div>
  <div class="gz-converter-row" style="justify-content:center">
    <button class="gz-btn gz-btn-secondary" onclick="swapUnits()">⇅ ${t('swap')}</button>
  </div>
  <div class="gz-converter-row">
    <input type="text" id="outputVal" readonly>
    <select id="toUnit" onchange="convert()">${opts}</select>
  </div>
  <div id="formulaDisplay" style="margin-top:8px;font-size:.85em;opacity:.7"></div>
`;

$('#fromUnit').value = 'h';
$('#toUnit').value = 'min';

function convert() {
  const val = parseFloat($('#inputVal').value);
  if (isNaN(val)) { $('#outputVal').value = ''; $('#formulaDisplay').textContent = ''; return; }
  const from = UNITS.find(u => u.id === $('#fromUnit').value);
  const to = UNITS.find(u => u.id === $('#toUnit').value);
  const sec = val * from.factor;
  const result = sec / to.factor;
  $('#outputVal').value = Math.abs(result) < 1 ? result.toPrecision(8) : parseFloat(result.toPrecision(12));
  const ratio = from.factor / to.factor;
  $('#formulaDisplay').textContent = `1 ${from.id} = ${parseFloat(ratio.toPrecision(10))} ${to.id}`;
}

function swapUnits() {
  const f = $('#fromUnit').value, tv = $('#toUnit').value;
  $('#fromUnit').value = tv; $('#toUnit').value = f; convert();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#outputVal').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#inputVal').value='';$('#outputVal').value='';$('#formulaDisplay').textContent=''">${t('clear')}</button>
`;

convert();

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏰', href:'/dev/timestamp.html', name:'Timestamp Converter'},
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'⏲️', href:'/dev/cron.html', name:'Cron Tool'},
    {icon:'📏', href:'/convert/all-unit-converter.html', name:'Unit Converter'},
  ]
});
</script>
