<script>
GZI18n.register({
  en: {

    toolDesc: 'Parse any HTML into a clean nested JSON tree — tags, attributes, text and children. Free, private, browser-only.',

  },
  zh: {

    toolDesc: '将任意 HTML 解析为整洁的嵌套 JSON 树 — 包含标签、属性、文本和子元素。免费、私密、浏览器本地运行。',
    step1: '在输入区粘贴或输入 HTML',
    step2: '选择输出模式：嵌套树或扁平列表',
    step3: '点击「转换」生成 JSON 结构',
    step4: '将 JSON 结果复制到剪贴板',
  }
});

const { $, copyText, t } = GZ;
let mode = 'nested';
let includeEmptyText = false;

function syntaxHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c = 'json-number';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-string';
      else if (/true|false/.test(m)) c = 'json-bool';
      else if (/null/.test(m)) c = 'json-null';
      return `<span class="${c}">${m}</span>`;
    });
}

function nodeToJSON(node) {
  // Text node
  if (node.nodeType === 3) {
    const txt = node.textContent.trim();
    return txt ? { tag: '#text', text: txt } : null;
  }
  // Comment node
  if (node.nodeType === 8) {
    const txt = node.textContent.trim();
    return txt ? { tag: '#comment', text: txt } : null;
  }
  if (node.nodeType !== 1) return null;

  const obj = { tag: node.tagName.toLowerCase() };
  const attrs = {};
  for (let i = 0; i < node.attributes.length; i++) {
    attrs[node.attributes[i].name] = node.attributes[i].value;
  }
  if (Object.keys(attrs).length) obj.attrs = attrs;

  // Direct text
  let directText = '';
  const children = [];
  node.childNodes.forEach(child => {
    if (child.nodeType === 3) {
      directText += child.textContent;
    } else {
      const cj = nodeToJSON(child);
      if (cj) children.push(cj);
    }
  });
  directText = directText.replace(/\s+/g, ' ').trim();
  if (directText && (includeEmptyText || directText)) obj.text = directText;
  if (children.length) obj.children = children;
  return obj;
}

function flattenNode(node, result, parentPath) {
  if (!node || typeof node !== 'object') return;
  const path = parentPath ? `${parentPath} > ${node.tag}` : node.tag;
  const entry = { path, tag: node.tag };
  if (node.attrs) entry.attrs = node.attrs;
  if (node.text) entry.text = node.text;
  result.push(entry);
  if (node.children) node.children.forEach(c => flattenNode(c, result, path));
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; return; }
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(inp, 'text/html');
    const root = doc.body;

    if (mode === 'nested') {
      const result = [];
      root.childNodes.forEach(child => {
        const j = nodeToJSON(child);
        if (j) result.push(j);
      });
      const json = result.length === 1 ? result[0] : result;
      $('#output').innerHTML = syntaxHighlight(JSON.stringify(json, null, 2));
    } else {
      const flat = [];
      root.childNodes.forEach(child => {
        const j = nodeToJSON(child);
        if (j) flattenNode(j, flat, '');
      });
      $('#output').innerHTML = syntaxHighlight(JSON.stringify(flat, null, 2));
    }
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${t('converted')||'Converted'}</span>`;
  } catch(e) {
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error: ${e.message}</span>`;
  }
}

function loadExample() {
  $('#input').value = `<div class="card" id="main">
  <h2>Welcome</h2>
  <p class="desc">Hello <strong>World</strong>!</p>
  <ul>
    <li>Item 1</li>
    <li>Item 2</li>
  </ul>
  <a href="https://example.com" target="_blank">Link</a>
</div>`;
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')||'Convert'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <select class="gz-select" onchange="mode=this.value;doConvert()">
    <option value="nested">Nested Tree</option>
    <option value="flat">Flat List</option>
  </select>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
