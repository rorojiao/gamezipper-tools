    match: '✓ 匹配 — 签名有效',

    badSig: '签名不是有效的 hex/base64。',

    step2: '输入用于签名的共享密钥',

const { $, t } = GZ;
let algo = 'SHA-256';

const ALG_LABEL = { 'SHA-256':'HMAC-SHA256', 'SHA-384':'HMAC-SHA384', 'SHA-512':'HMAC-SHA512' };
const HEX_LEN = { 'SHA-256':64, 'SHA-384':96, 'SHA-512':128 };

function strToBytes(s){
  return new TextEncoder().encode(s);
}
function bytesToHex(buf){
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
function hexToBytes(hex){
  if(hex.length % 2) throw new Error('odd hex length');
  const out = new Uint8Array(hex.length/2);
  for(let i=0;i<out.length;i++) out[i] = parseInt(hex.substr(i*2,2),16);
  return out;
}
function b64ToBytes(b64){
  // normalize base64url → base64, add padding
  b64 = b64.replace(/-/g,'+').replace(/_/g,'/');
  while(b64.length % 4) b64 += '=';
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) out[i] = bin.charCodeAt(i);
  return out;
}
function b64ToHex(b64){
  return bytesToHex(b64ToBytes(b64));
}
function parseSignatureToHex(sig, expectedLen){
  sig = sig.trim();
  // hex?
  if(/^[0-9a-fA-F]+$/.test(sig) && sig.length % 2 === 0){
    return sig.toLowerCase();
  }
  // base64?
  if(/^[A-Za-z0-9+/_=-]+$/.test(sig)){
    try{ return b64ToHex(sig); }catch(e){}
  }
  throw new Error('bad sig');
}

async function computeHmac(message, secret){
  const key = await crypto.subtle.importKey(
    'raw', strToBytes(secret),
    { name:'HMAC', hash:{ name: algo } },
    false, ['sign']
  );
  const sig = await crypto.subtle.sign('HMAC', key, strToBytes(message));
  return new Uint8Array(sig);
}

function ctEqual(a, b){
  if(a.length !== b.length) return false;
  let diff = 0;
  for(let i=0;i<a.length;i++) diff |= a[i] ^ b[i];
  return diff === 0;
}

async function doVerify(){
  const msg = $('#message').value;
  const secret = $('#secret').value;
  const sig = $('#signature').value;
  if(!msg || !secret || !sig){
    $('#status').innerHTML = `<span style="color:var(--text3)">${t('needAll')}</span>`;
    $('#output').textContent = '';
    return;
  }
  let providedBytes;
  try{
    const hex = parseSignatureToHex(sig, HEX_LEN[algo]);
    providedBytes = hexToBytes(hex);
  }catch(e){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('badSig')}</span>`;
    $('#output').textContent = '';
    return;
  }
  try{
    const computed = await computeHmac(msg, secret);
    const hexDigest = bytesToHex(computed);
    $('#output').textContent = hexDigest + '\n\n' + b64FromBytes(computed);
    const ok = ctEqual(computed, providedBytes);
    $('#status').innerHTML = `<div class="verdict ${ok?'ok':'bad'}">${t(ok?'match':'nomatch')}</div>`;
  }catch(e){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
  }
}

function b64FromBytes(bytes){
  let bin = '';
  for(let i=0;i<bytes.length;i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

function loadExample(){
  $('#message').value = 'amount=4200&currency=usd&order_1234';
  $('#secret').value = 'whsec_topsecret_demo_key';
  // pre-compute the right signature for the example so users see a MATCH
  (async()=>{
    const sig = await computeHmac($('#message').value, $('#secret').value);
    $('#signature').value = bytesToHex(sig);
    doVerify();
  })();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doVerify()">${t('verify')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#message').value='';$('#secret').value='';$('#signature').value='';$('#output').textContent='';$('#status').innerHTML=''">${t('clear')}</button>`;

$('#opts').innerHTML = `

    <select onchange="algo=this.value;doVerify()">
      <option value="SHA-256">HMAC-SHA256</option>

      <option value="SHA-512">HMAC-SHA512</option>
