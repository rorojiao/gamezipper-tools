<script>
GZI18n.register({
  en: {
    toolTitle: 'Salary to Hourly Calculator',
    toolDesc: 'Convert your annual or monthly salary to hourly, daily, weekly wage. Perfect for comparing job offers.',
    mode: 'Input Mode',
    optAnnual: 'Annual Salary',
    optMonthly: 'Monthly Salary',
    salary: 'Salary Amount ($)',
    hours: 'Hours per Week',
    hourly: 'Hourly Rate',
    daily: 'Daily Rate',
    weekly: 'Weekly Rate',
    monthly: 'Monthly Rate',
    annual: 'Annual Salary',
    step1: 'Choose whether you enter annual or monthly salary',
    step2: 'Enter your salary amount',
    step3: 'Set your weekly working hours (default 40)',
    step4: 'See your equivalent hourly, daily, weekly rates',
  },
  zh: {
    toolTitle: '年薪转时薪计算器',
    toolDesc: '将年薪或月薪转换为时薪、日薪和周薪，方便比较工作机会。',
    mode: '输入模式',
    optAnnual: '年薪',
    optMonthly: '月薪',
    salary: '工资金额（$）',
    hours: '每周工时',
    hourly: '时薪',
    daily: '日薪',
    weekly: '周薪',
    monthly: '月薪',
    annual: '年薪',
    step1: '选择输入年薪或月薪',
    step2: '输入工资金额',
    step3: '设置每周工时（默认 40）',
    step4: '查看对应的时薪、日薪、周薪',
  }
});

const { $, t } = GZ;

function fmt(n) {
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function updateLabels() {
  $('#opt-annual').textContent = t('optAnnual');
  $('#opt-monthly').textContent = t('optMonthly');
  $('#lbl-salary').textContent = t('salary').replace('Salary', $('#mode').value === 'monthly' ? t('monthly') : t('annual'));
}

function calculate() {
  const mode = $('#mode').value;
  let salary = parseFloat($('#salary').value) || 0;
  const hours = parseFloat($('#hours').value) || 40;

  const annual = mode === 'monthly' ? salary * 12 : salary;
  const monthly = annual / 12;
  const weekly = annual / 52;
  const hourly = weekly / hours;
  const daily = weekly / 5;

  $('#results').innerHTML = `
    <div class="result-card"><div class="label">${t('hourly')}</div><div class="value">${fmt(hourly)}</div></div>
    <div class="result-card"><div class="label">${t('daily')}</div><div class="value">${fmt(daily)}</div></div>
    <div class="result-card"><div class="label">${t('weekly')}</div><div class="value">${fmt(weekly)}</div></div>
    <div class="result-card"><div class="label">${t('monthly')}</div><div class="value">${fmt(monthly)}</div></div>
    <div class="result-card"><div class="label">${t('annual')}</div><div class="value">${fmt(annual)}</div></div>
  `;
}

['salary','hours','mode'].forEach(id => $('#'+id).addEventListener('input', () => { updateLabels(); calculate(); }));

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="calculate()">${t('calculate')||'Calculate'}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/hourly-to-salary.html', name:'Hourly to Salary'},
    {icon:'🏦', href:'/calc/paycheck-calculator.html', name:'Paycheck Calculator'},
    {icon:'⏰', href:'/calc/overtime-calculator.html', name:'Overtime Calc'},
    {icon:'📊', href:'/calc/salary-calculator.html', name:'Salary Calculator'},
  ]
});

updateLabels();
calculate();
</script>
