<script>

    inputLabel: '要检测的 URL（每行一个）',
    check: '全部检测',
    example: '示例',
    clear: '清空',
    timeout: '超时（秒）',
    slowAfter: '慢速阈值（秒）',
    step1: '每行粘贴一个 URL（带 https://）',
    step2: '按需调整超时和慢速阈值',
    step3: '点击「全部检测」 — 所有 URL 并行测试',
    step4: '查看状态标签、延迟条和汇总信息',
    corsNote: 'ℹ️ 提示：浏览器 CORS 可能隐藏跨域网站的精确 HTTP 状态码。本工具仍可检测主机是否响应并测量延迟 — 足以判断基本可用性。',
    colUrl: 'URL',
    colStatus: '状态',
    colLatency: '延迟',
    colResult: '结果',
    up: '正常',
    down: '故障',
    slow: '缓慢',
    checking: '检测中…',
    responded: '已响应',
    noResponse: '无响应（超时或 DNS 失败）',
    netError: '网络错误',
    sumTotal: '总数',
    sumUp: '正常',
    sumSlow: '缓慢',

const { $, t } = GZ;
let timeoutS = 8;
let slowAfterS = 2;

$('#urls').placeholder = 'https://example.com\nhttps://google.com\nhttps://github.com';
$('#cors-note').textContent = t('corsNote');

$('#opts').innerHTML = `
  <label>${t('timeout')} <input type="number" id="opt-timeout" value="8" min="2" max="30"></label>
  <label>${t('slowAfter')} <input type="number" id="opt-slow" value="2" min="0" max="30"></label>`;
document.getElementById('opt-timeout').addEventListener('input', e => timeoutS = Math.max(2, +e.target.value || 8));
document.getElementById('opt-slow').addEventListener('input', e => slowAfterS = Math.max(0, +e.target.value || 2));

function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function checkOne(url, rowId) {
  const row = document.getElementById(rowId);
  if (!row) return;
  row.querySelector('.status-cell').innerHTML = `<span class="status-pill status-pending">${t('checking')}</span>`;
  row.querySelector('.latency-cell').textContent = '—';
  row.querySelector('.result-cell').textContent = '—';

  // Normalize URL
  let u = url.trim();
  if (!u) return;
  if (!/^https?:\/\//i.test(u)) u = 'https://' + u;

  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutS * 1000);
  const start = performance.now();
  try {
    // no-cors lets us at least detect a response even when CORS blocks reading the status
    const resp = await fetch(u, { method: 'HEAD', mode: 'no-cors', signal: controller.signal, cache: 'no-store', redirect: 'follow' });
    const ms = Math.round(performance.now() - start);
    clearTimeout(timer);
    // In no-cors mode resp.status is always 0 (opaque); treat any non-throw as "responded"
    let cls = 'up', label = t('up');
    if (ms > slowAfterS * 1000) { cls = 'slow'; label = t('slow'); }
    row.querySelector('.status-cell').innerHTML = `<span class="status-pill status-${cls}">${label}</span>`;
    const pct = Math.min(100, Math.round(ms / (timeoutS * 1000) * 100));
    const color = cls === 'slow' ? '#ffc107' : '#00d672';
    row.querySelector('.latency-cell').innerHTML = `<span class="latency-bar"><span class="latency-fill" style="width:${pct}%;background:${color}"></span></span>${ms} ms`;
    row.querySelector('.result-cell').textContent = t('responded');
    return { status: cls, ms };
  } catch (e) {
    clearTimeout(timer);
    const ms = Math.round(performance.now() - start);
    // HEAD may be blocked (405). Retry with GET no-cors as a fallback.
    if (e.name !== 'AbortError') {
      try {
        const c2 = new AbortController();
        const timer2 = setTimeout(() => c2.abort(), timeoutS * 1000);
        const s2 = performance.now();
        const r2 = await fetch(u, { method: 'GET', mode: 'no-cors', signal: c2.signal, cache: 'no-store', redirect: 'follow' });
        const ms2 = Math.round(performance.now() - s2);
        clearTimeout(timer2);
        let cls = 'up', label = t('up');
        if (ms2 > slowAfterS * 1000) { cls = 'slow'; label = t('slow'); }
        row.querySelector('.status-cell').innerHTML = `<span class="status-pill status-${cls}">${label}</span>`;
        const pct = Math.min(100, Math.round(ms2 / (timeoutS * 1000) * 100));
        const color = cls === 'slow' ? '#ffc107' : '#00d672';
        row.querySelector('.latency-cell').innerHTML = `<span class="latency-bar"><span class="latency-fill" style="width:${pct}%;background:${color}"></span></span>${ms2} ms`;
        row.querySelector('.result-cell').textContent = t('responded');
        return { status: cls, ms: ms2 };
      } catch (e2) {
        // inner GET also failed → fall through to mark down
      }
    }
    row.querySelector('.status-cell').innerHTML = `<span class="status-pill status-down">${t('down')}</span>`;
    row.querySelector('.latency-cell').innerHTML = `<span class="latency-bar"><span class="latency-fill" style="width:100%;background:#e94560"></span></span>${ms} ms`;
    row.querySelector('.result-cell').textContent = e.name === 'AbortError' ? t('noResponse') : t('netError');
    return { status: 'down', ms };
  }
}

async function doCheck() {
  const raw = $('#urls').value.trim();
  if (!raw) { $('#status').innerHTML = `<span style="opacity:.6">${t('needUrls')}</span>`; return; }
  const urls = raw.split('\n').map(s => s.trim()).filter(Boolean);
  if (urls.length === 0) { $('#status').innerHTML = `<span style="opacity:.6">${t('needUrls')}</span>`; return; }

  // Build table
  $('#results').innerHTML = `
    <table class="results-table">
      <thead><tr><th>${t('colUrl')}</th><th>${t('colStatus')}</th><th>${t('colLatency')}</th><th>${t('colResult')}</th></tr></thead>
      <tbody>
        ${urls.map((u, i) => `<tr id="row-${i}"><td style="word-break:break-all">${escapeHtml(u)}</td><td class="status-cell"><span class="status-pill status-pending">${t('checking')}</span></td><td class="latency-cell">—</td><td class="result-cell">—</td></tr>`).join('')}
      </tbody>
    </table>`;
  $('#summary').style.display = 'none';
  $('#status').innerHTML = '';

  // Run in parallel
  const results = await Promise.all(urls.map((u, i) => checkOne(u, 'row-' + i)));

  // Summary
  const total = results.length;
  const up = results.filter(r => r && r.status === 'up').length;
  const slow = results.filter(r => r && r.status === 'slow').length;
  const down = results.filter(r => r && r.status === 'down').length;
  const latencies = results.filter(r => r && typeof r.ms === 'number').map(r => r.ms);
  const avg = latencies.length ? Math.round(latencies.reduce((a,b)=>a+b,0) / latencies.length) : 0;
  $('#summary').style.display = 'flex';
  $('#summary').innerHTML = `
    <div>${t('sumTotal')}<b>${total}</b></div>
    <div>${t('sumUp')}<b style="color:#00d672">${up}</b></div>
    <div>${t('sumSlow')}<b style="color:#ffc107">${slow}</b></div>
    <div>${t('sumDown')}<b style="color:#e94560">${down}</b></div>
    <div>${t('sumAvg')}<b>${avg} ms</b></div>`;
}

function loadExample() {
  $('#urls').value = 'https://google.com\nhttps://github.com\nhttps://cloudflare.com\nhttps://wikipedia.org';
  doCheck();
}

function doClear() { $('#urls').value=''; $('#results').innerHTML=''; $('#summary').style.display='none'; $('#status').innerHTML=''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doCheck()">${t('check')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

});
</script>
