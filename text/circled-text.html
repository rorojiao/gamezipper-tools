<script>

  en: {
    toolTitle: 'Circled Text Generator Ⓐ',
    toolDesc: 'Convert text into circled letters ⒶⒷⒸ, lowercase bubbles ⓐⓑⓒ, circled numbers ①②③, negative circles 🅐🅑 and squared ⒜⒝. Copy & paste anywhere — Instagram, TikTok, Discord, usernames.',

  },
  zh: {
    toolTitle: '圆圈文字生成器 Ⓐ',
    toolDesc: '将文字转换为圆圈字母 ⒶⒷⒸ、小写气泡 ⓐⓑⓒ、圆圈数字 ①②③、反色圆圈 🅐🅑 和方框 ⒜⒝。复制粘贴到任何平台 — Instagram、TikTok、Discord、用户名。',
    step1: '在输入框中输入或粘贴文字',
    step2: '浏览自动生成的圆圈风格',
    step3: '点击复制按钮复制喜欢的风格',
    step4: '粘贴到 Instagram、TikTok、Discord、WhatsApp 等平台',
  }
});

const { $, $$, t } = GZ;

// Unicode maps
const circledUpper = c => { const cc = c.charCodeAt(0); return (cc >= 65 && cc <= 90) ? String.fromCodePoint(0x24B6 + cc - 65) : c; };
const circledLower = c => { const cc = c.charCodeAt(0); return (cc >= 97 && cc <= 122) ? String.fromCodePoint(0x24D0 + cc - 97) : c; };
const circledNum = c => { const cc = c.charCodeAt(0); return (cc >= 49 && cc <= 57) ? String.fromCodePoint(0x2460 + cc - 49) : (c === '0' ? '⓪' : c); };
const negCircledUpper = c => { const cc = c.charCodeAt(0); return (cc >= 65 && cc <= 90) ? String.fromCodePoint(0x1F150 + cc - 65) : c; };
const negCircledLower = c => { const cc = c.charCodeAt(0); return (cc >= 97 && cc <= 122) ? String.fromCodePoint(0x24EB + cc - 97) : c; };
const parenLower = c => { const cc = c.charCodeAt(0); return (cc >= 97 && cc <= 122) ? String.fromCodePoint(0x249C + cc - 97) : c; };
const parenUpper = c => { const cc = c.charCodeAt(0); return (cc >= 65 && cc <= 90) ? String.fromCodePoint(0x1F110 + cc - 65) : c; };
const squaredUpper = c => { const cc = c.charCodeAt(0); return (cc >= 65 && cc <= 90) ? String.fromCodePoint(0x1F130 + cc - 65) : c; };
const negSquaredUpper = c => { const cc = c.charCodeAt(0); return (cc >= 65 && cc <= 90) ? String.fromCodePoint(0x1F170 + cc - 65) : c; };

// Apply letter+number map to a string
function mapLetters(s, letterFn, numFn) {
  return [...s].map(c => {
    if (numFn && /[0-9]/.test(c)) return numFn(c);
    return letterFn(c);
  }).join('');
}

const STYLES = [
  { name: 'Circled Upper ⒶⒷⒸ', fn: s => [...s].map(circledUpper).join('') },
  { name: 'Circled Lower ⓐⓑⓒ', fn: s => [...s].map(c => circledLower(circledUpper(c))).join('') },
  { name: 'Circled + Numbers Ⓐ①', fn: s => mapLetters(s, c => circledLower(circledUpper(c)), circledNum) },
  { name: 'Negative Circle 🅐🅑', fn: s => [...s].map(c => negCircledLower(negCircledUpper(c))).join('') },
  { name: 'Parenthesized ⒜⒝', fn: s => [...s].map(c => parenLower(parenUpper(c))).join('') },
  { name: 'Squared 🄰🄱', fn: s => [...s].map(c => squaredUpper(c.toUpperCase())).join('') },
  { name: 'Negative Squared 🅰🅱', fn: s => [...s].map(c => negSquaredUpper(c.toUpperCase())).join('') },
  { name: 'Numbered List ①②③', fn: s => [...s].map(circledNum).join('') },
  { name: 'Mixed Circle', fn: s => [...s].map((c, i) => {
      if (/[A-Z]/.test(c)) return circledUpper(c);
      if (/[a-z]/.test(c)) return circledLower(c);
      if (/[0-9]/.test(c)) return circledNum(c);
      return c;
    }).join('') },
  { name: 'Circle Bullet', fn: s => [...s].map(c => c === ' ' ? ' ◦ ' : circledLower(circledUpper(c))).join('') },
];

function render() {
  const text = $('#input').value;
  $('#grid').innerHTML = STYLES.map((s, i) =>
    `<div class="ct-row"><div class="name">${s.name}</div><div class="out" data-i="${i}"></div><button class="cp" data-i="${i}">${t('copy')}</button></div>`
  ).join('');
  STYLES.forEach((s, i) => {
    try { const el = $$('.ct-row .out[data-i="' + i + '"]')[0]; el.textContent = s.fn(text); } catch (e) {}
  });
  $$('.ct-row .cp').forEach(btn => btn.addEventListener('click', () => {
    const out = $$('.ct-row .out[data-i="' + btn.dataset.i + '"]')[0].textContent;
    GZ.copyText(out);
  }));
}

$('#input').addEventListener('input', render);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='Hello World 123';render()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';render()">${t('clear')}</button>`;

$('#input').value = 'Hello World 123';
render();

  ]
});
</script>
