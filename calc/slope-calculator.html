<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate the slope between two points?", "acceptedAnswer": {"@type": "Answer", "text": "Use the slope formula m = (y2 - y1) / (x2 - x1). Enter the coordinates of both points and the calculator computes the slope, distance, midpoint and the full line equation instantly."}}, {"@type": "Question", "name": "What does a slope of 0 or undefined mean?", "acceptedAnswer": {"@type": "Answer", "text": "A slope of 0 means the line is horizontal (both points have the same y-value). An undefined slope means the line is vertical (both points have the same x-value), since division by zero is impossible."}}, {"@type": "Question", "name": "What is slope intercept form?", "acceptedAnswer": {"@type": "Answer", "text": "Slope intercept form is y = mx + b, where m is the slope and b is the y-intercept. The calculator converts your two points into this standard form automatically."}}, {"@type": "Question", "name": "Can this calculator find distance and midpoint too?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Along with the slope, the calculator computes the distance between the two points using the distance formula and finds the midpoint coordinates."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Slope Calculator',
    toolDesc: 'Find slope, distance, midpoint, and the full line equation (y = mx + b) between any two points. With step-by-step solutions and a visual plot.',
    point1: 'Point 1', point2: 'Point 2',
    calculate: 'Calculate', clear: 'Clear',
    slope: 'Slope (m)', distance: 'Distance', midpoint: 'Midpoint',
    lineEq: 'Line Equation', yIntercept: 'Y-intercept (b)',
    angle: 'Angle of Inclination',
    undefined: 'undefined', horizontal: 'Horizontal line', vertical: 'Vertical line',
    positive: 'Positive slope (line goes up)', negative: 'Negative slope (line goes down)',
    step1: 'Enter the x and y coordinates of two points',
    step2: 'Click Calculate to find slope, distance and midpoint',
    step3: 'Review the line equation in slope-intercept form (y = mx + b)',
    step4: 'Check the step-by-step solution and visual plot',
  },
  zh: {
    toolTitle: '斜率计算器',
    toolDesc: '计算两点之间的斜率、距离、中点和直线方程 (y = mx + b)，附带分步解答和可视化图形。',
    point1: '点 1', point2: '点 2',
    calculate: '计算', clear: '清除',
    slope: '斜率 (m)', distance: '距离', midpoint: '中点',
    lineEq: '直线方程', yIntercept: 'Y 轴截距 (b)',
    angle: '倾斜角',
    undefined: '未定义', horizontal: '水平线', vertical: '垂直线',
    positive: '正斜率（上升）', negative: '负斜率（下降）',
    step1: '输入两个点的 x 和 y 坐标',
    step2: '点击「计算」求斜率、距离和中点',
    step3: '查看斜截式直线方程 (y = mx + b)',
    step4: '查看分步解答和可视化图形',
  }
});

const { $, t } = GZ;
function num(id) { return parseFloat(document.getElementById(id).value); }
function r(n) { return Math.round(n * 100000) / 100000; }
function fmt(n) { return Number.isInteger(n) ? n.toString() : r(n).toString(); }

function calc() {
  const x1 = num('x1'), y1 = num('y1'), x2 = num('x2'), y2 = num('y2');
  const dx = x2 - x1, dy = y2 - y1;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const midX = (x1 + x2) / 2, midY = (y1 + y2) / 2;

  let slope, b, eq, angle, type;
  if (dx === 0) {
    slope = t('undefined'); eq = `x = ${fmt(x1)}`; angle = 90; type = t('vertical');
    b = '—';
  } else {
    slope = fmt(dy / dx);
    b = fmt(y1 - (dy/dx) * x1);
    eq = `y = ${fmt(dy/dx)}x ${b >= 0 ? '+' : '-'} ${fmt(Math.abs(b))}`;
    angle = Math.atan(dy / dx) * 180 / Math.PI;
    if (dy === 0) type = t('horizontal');
    else type = (dy/dx) > 0 ? t('positive') : t('negative');
  }

  $('#result').innerHTML = `<h3>${t('slope')}</h3>` +
    row(t('slope'), slope) +
    row(t('yIntercept'), b) +
    row(t('lineEq'), eq) +
    row(t('distance'), fmt(dist)) +
    row(t('midpoint'), `(${fmt(midX)}, ${fmt(midY)})`) +
    row(t('angle'), dx === 0 ? '90°' : fmt(angle) + '°') +
    `<div style="padding:9px 14px;font-size:.85em;color:var(--text2)">${type}</div>`;

  $('#steps').innerHTML = `
    <strong>${t('slope')}:</strong><br>
    <span class="formula">m = (y₂ − y₁) / (x₂ − x₁)</span><br>
    <span class="formula">m = (${fmt(y2)} − ${fmt(y1)}) / (${fmt(x2)} − ${fmt(x1)})</span><br>
    <span class="formula">m = ${fmt(dy)} / ${fmt(dx)}${dx !== 0 ? ' = ' + slope : ''}</span><br><br>
    <strong>${t('distance')}:</strong><br>
    <span class="formula">d = √((x₂−x₁)² + (y₂−y₁)²) = √(${fmt(dx)}² + ${fmt(dy)}²) = ${fmt(dist)}</span><br><br>
    <strong>${t('midpoint')}:</strong><br>
    <span class="formula">M = ((x₁+x₂)/2, (y₁+y₂)/2) = (${fmt(midX)}, ${fmt(midY)})</span>`;

  drawPlot(x1, y1, x2, y2);
}

function row(label, val) { return `<div class="row"><span>${label}</span><span>${val}</span></div>`; }

function drawPlot(x1, y1, x2, y2) {
  const W = 340, H = 300, pad = 30;
  const allX = [x1, x2, 0], allY = [y1, y2, 0];
  const minX = Math.min(...allX), maxX = Math.max(...allX);
  const minY = Math.min(...allY), maxY = Math.max(...allY);
  const rangeX = Math.max(maxX - minX, 4), rangeY = Math.max(maxY - minY, 4);
  const xToPx = x => pad + ((x - minX) / rangeX) * (W - 2*pad);
  const yToPx = y => H - pad - ((y - minY) / rangeY) * (H - 2*pad);

  let grid = '';
  for (let gx = Math.ceil(minX); gx <= maxX; gx++) grid += `<line x1="${xToPx(gx)}" y1="${pad}" x2="${xToPx(gx)}" y2="${H-pad}" stroke="rgba(128,128,128,0.15)"/>`;
  for (let gy = Math.ceil(minY); gy <= maxY; gy++) grid += `<line x1="${pad}" y1="${yToPx(gy)}" x2="${W-pad}" y2="${yToPx(gy)}" stroke="rgba(128,128,128,0.15)"/>`;

  const ox = xToPx(0), oy = yToPx(0);
  $('#plot').innerHTML = grid +
    `<line x1="${pad}" y1="${oy}" x2="${W-pad}" y2="${oy}" stroke="#666" stroke-width="1.5"/>` +
    `<line x1="${ox}" y1="${pad}" x2="${ox}" y2="${H-pad}" stroke="#666" stroke-width="1.5"/>` +
    `<line x1="${xToPx(x1)}" y1="${yToPx(y1)}" x2="${xToPx(x2)}" y2="${yToPx(y2)}" stroke="#4ecdc4" stroke-width="2.5"/>` +
    `<circle cx="${xToPx(x1)}" cy="${yToPx(y1)}" r="5" fill="#ff6b6b"/>` +
    `<circle cx="${xToPx(x2)}" cy="${yToPx(y2)}" r="5" fill="#ffd93d"/>` +
    `<text x="${xToPx(x1)}" y="${yToPx(y1)-10}" fill="#ff6b6b" font-size="11" text-anchor="middle">(${fmt(x1)},${fmt(y1)})</text>` +
    `<text x="${xToPx(x2)}" y="${yToPx(y2)-10}" fill="#ffd93d" font-size="11" text-anchor="middle">(${fmt(x2)},${fmt(y2)})</text>`;
}

function doClear() {
  ['x1','y1','x2','y2'].forEach(id => document.getElementById(id).value = '');
  $('#result').innerHTML = ''; $('#steps').innerHTML = ''; $('#plot').innerHTML = '';
}

document.getElementById('pt1Label').textContent = t('point1');
document.getElementById('pt2Label').textContent = t('point2');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

['x1','y1','x2','y2'].forEach(id => document.getElementById(id).addEventListener('input', calc));
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/calc/triangle-calculator.html', name:'Triangle Solver'},
    {icon:'📊', href:'/calc/statistics-calculator.html', name:'Statistics'},
    {icon:'🧮', href:'/calc/equation-solver.html', name:'Equation Solver'},
    {icon:'½', href:'/calc/fraction-calculator.html', name:'Fraction Calc'},
  ]
});
</script>
