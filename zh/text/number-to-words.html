<script>

  en: {

  },
  zh: {
    toolTitle: '数字转英文单词转换器',
    toolDesc: '将任意数字即时转换为英文单词 — 支持万亿级、货币、支票书写格式和小写。',
    ph: '输入数字，例如 1234.56',
    modePlain: '普通',
    modeCurrency: '货币',
    modeCheck: '支票写法',
    andWord: '使用 "and"',
    titleCase: '首字母大写',
    step1: '在输入框输入整数或小数',
    step2: '选择模式 — 普通、货币或支票写法',
    step3: '按需切换 "and"、首字母大写或货币',
    step4: '点击「复制」复制转换结果',
    copyUpper: '复制大写',
    copyTitle: '复制首字母大写',
    copyLower: '复制小写',
    tooLarge: '数字过大，请输入不超过 999 万亿。',
    invalid: '请输入有效数字（数字、可选小数点和负号）。',
    example: '加载示例',
  }
});

const { $, copyText, t } = GZ;

const ONES = ['','one','two','three','four','five','six','seven','eight','nine','ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen'];
const TENS = ['','','twenty','thirty','forty','fifty','sixty','seventy','eighty','ninety'];
const SCALES = ['','thousand','million','billion','trillion'];

let mode = 'plain', useAnd = false, titleCase = false;

function threeDigitsToWords(n) {
  let str = '';
  const hundreds = Math.floor(n / 100);
  const rest = n % 100;
  if (hundreds) str += ONES[hundreds] + ' hundred';
  if (rest) {
    if (str) str += (useAnd ? ' and ' : ' ');
    if (rest < 20) str += ONES[rest];
    else {
      str += TENS[Math.floor(rest / 10)];
      if (rest % 10) str += '-' + ONES[rest % 10];
    }
  }
  return str;
}

function intToWords(num) {
  if (num === 0) return 'zero';
  let parts = [];
  let scaleIdx = 0;
  while (num > 0) {
    const chunk = num % 1000;
    if (chunk) {
      let chunkWords = threeDigitsToWords(chunk);
      if (SCALES[scaleIdx]) chunkWords += ' ' + SCALES[scaleIdx];
      parts.unshift(chunkWords);
    }
    num = Math.floor(num / 1000);
    scaleIdx++;
    if (scaleIdx >= SCALES.length && num > 0) return null;
  }
  // Insert "and" before the last chunk's tens/ones if requested and there is a hundreds group
  return parts.join(' ').replace(/\s+/g, ' ').trim();
}

function spellNumber(raw) {
  raw = raw.trim();
  if (!raw) return '';
  if (!/^-?\d+(\.\d+)?$/.test(raw)) throw new Error('invalid');
  const neg = raw.startsWith('-');
  let [intPart, decPart = ''] = raw.replace(/^-/, '').split('.');
  intPart = intPart.replace(/^0+/, '') || '0';
  const intNum = parseInt(intPart, 10);
  if (intNum > 999999999999999) throw new Error('tooLarge');

  let intWords = intToWords(intNum);
  if (intWords === null) throw new Error('tooLarge');

  let result = '';
  const cents = (decPart + '00').slice(0, 2);

  if (mode === 'currency') {
    result = intWords + (intNum === 1 ? ' dollar' : ' dollars');
    if (decPart) result += ' and ' + parseInt(cents, 10) + (parseInt(cents, 10) === 1 ? ' cent' : ' cents');
  } else if (mode === 'check') {
    result = intWords + ' and ' + cents + '/100 dollars';
  } else {
    result = intWords;
    if (decPart) {
      const decDigits = decPart.split('').map(d => ONES[+d]).join(' ');
      result += ' point ' + decDigits;
    }
  }
  if (neg) result = 'negative ' + result;
  if (titleCase) result = result.replace(/\b\w/g, c => c.toUpperCase());
  return result;
}

function recalc() {
  const raw = $('#input').value;
  const out = $('#output');
  const st = $('#status');
  if (!raw.trim()) { out.textContent = ''; st.textContent = ''; return; }
  try {
    out.textContent = spellNumber(raw);
    st.textContent = '';
    renderCopyRow(out.textContent);
  } catch (e) {
    out.textContent = '';
    st.innerHTML = `<span class="err">${t(e.message === 'tooLarge' ? 'tooLarge' : 'invalid')}</span>`;
    $('#copyrow').innerHTML = '';
  }
}

function renderCopyRow(text) {
  if (!text) { $('#copyrow').innerHTML = ''; return; }
  $('#copyrow').innerHTML = [
    `<button class="gz-btn" onclick="doCopy('upper')">${t('copyUpper')}</button>`,
    `<button class="gz-btn gz-btn-secondary" onclick="doCopy('title')">${t('copyTitle')}</button>`,
    `<button class="gz-btn gz-btn-secondary" onclick="doCopy('lower')">${t('copyLower')}</button>`,
  ].join('');
}

function doCopy(style) {
  let text = $('#output').textContent;
  if (style === 'upper') text = text.toUpperCase();
  else if (style === 'lower') text = text.toLowerCase();
  else text = text.replace(/\b\w/g, c => c.toUpperCase());
  copyText(text);
}

function loadExample() {
  $('#input').value = '1234.56';
  mode = 'currency';
  syncOpts();
  recalc();
}

function syncOpts() {
  document.querySelectorAll('[data-mode]').forEach(b => {
    b.className = 'gz-btn' + (b.dataset.mode === mode ? '' : ' gz-btn-secondary');
  });
  document.querySelector('[data-and]').checked = useAnd;
  document.querySelector('[data-tc]').checked = titleCase;
}

$('#input').value = '1234';
$('#input').placeholder = t('ph');
$('#input').addEventListener('input', recalc);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';recalc()">${t('clear')}</button>`;

$('#opts').innerHTML = `
  <button class="gz-btn" data-mode="plain" onclick="mode='plain';syncOpts();recalc()">${t('modePlain')}</button>
  <button class="gz-btn gz-btn-secondary" data-mode="currency" onclick="mode='currency';syncOpts();recalc()">${t('modeCurrency')}</button>
  <button class="gz-btn gz-btn-secondary" data-mode="check" onclick="mode='check';syncOpts();recalc()">${t('modeCheck')}</button>
  <label><input type="checkbox" data-and onchange="useAnd=this.checked;recalc()"> ${t('andWord')}</label>
  <label><input type="checkbox" data-tc onchange="titleCase=this.checked;recalc()"> ${t('titleCase')}</label>`;

$('#lbl-out').textContent = t('output');

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/text/words-to-numbers.html', name:'Words to Numbers'},
    {icon:'🔢', href:'/text/letter-counter.html', name:'Letter Counter'},
    {icon:'#️⃣', href:'/convert/number-base.html', name:'Number Base'},
    {icon:'🔢', href:'/convert/number-to-words.html', name:'Number to Words'},
  ]
});
recalc();
</script>
