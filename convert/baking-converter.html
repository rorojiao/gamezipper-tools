<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How many grams are in a cup of flour?","acceptedAnswer":{"@type":"Answer","text":"One US cup of all-purpose flour weighs about 120 grams (4.25 oz). Bread flour is slightly heavier at ~127 g per cup, while cake flour is lighter at ~115 g."}},{"@type":"Question","name":"What is the difference between a US cup and a metric cup?","acceptedAnswer":{"@type":"Answer","text":"A US legal cup is 240 ml, a US customary cup is 236.6 ml, and a metric cup (used in Australia, NZ, Canada) is 250 ml. Always pick the system the recipe was written in."}},{"@type":"Question","name":"Can I convert butter from cups to sticks?","acceptedAnswer":{"@type":"Answer","text":"Yes. In the US, 1 cup of butter equals 2 sticks (226 g or 8 oz). This tool lists grams, ounces, tablespoons and sticks for butter."}},{"@type":"Question","name":"Are these conversions exact?","acceptedAnswer":{"@type":"Answer","text":"They are standard reference densities used in most cookbooks. Real density varies with how tightly you pack the cup (especially flour), so for baking weigh with a scale when possible."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-form" id="form">
      <div>
        <label id="lbl-ingredient"></label>
        <select id="ingredient"></select>
      </div>
      <div class="conv-pair">
        <div>
          <label id="lbl-from-val"></label>
          <input type="number" id="from-val" value="1" min="0" step="0.01">
        </div>
        <div>
          <label id="lbl-from-unit"></label>
          <select id="from-unit"></select>
        </div>
        <div class="conv-arrow" id="swap" title="Swap" onclick="swapUnits()">⇄</div>
        <div>
          <label id="lbl-to-unit"></label>
          <select id="to-unit"></select>
        </div>
      </div>
      <button class="gz-btn" id="btn-calc" onclick="calculate()"></button>
    </div>
    <div class="result-card" id="result">
      <div class="big" id="result-val"></div>
      <div class="label" id="result-label"></div>
      <div class="all-units" id="all-units"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Baking Ingredient Converter',
    toolDesc: 'Convert cups to grams, ounces, milliliters, tablespoons and more for common baking ingredients. Accurate kitchen weights — runs in your browser.',
    lblIngredient: 'Ingredient',
    lblFromVal: 'Amount',
    lblFromUnit: 'From',
    lblToUnit: 'To',
    btnCalc: 'Convert',
    resultLabel: 'Converted amount',
    cup: 'cup',
    step1: 'Pick the baking ingredient from the list',
    step2: 'Enter the amount and choose the source unit',
    step3: 'Choose the unit you want to convert to',
    step4: 'Click Convert to see the result and a full breakdown of every unit',
  },
  zh: {
    toolTitle: '烘焙食材单位换算器',
    toolDesc: '将杯、克、盎司、毫升、汤匙等常用烘焙计量单位互转。适合面粉、糖、黄油、牛奶等 — 准确的厨房称重换算，浏览器本地运行。',
    lblIngredient: '食材',
    lblFromVal: '数量',
    lblFromUnit: '从',
    lblToUnit: '到',
    btnCalc: '换算',
    resultLabel: '换算结果',
    cup: '杯',
    step1: '从列表中选择烘焙食材',
    step2: '输入数量并选择原始单位',
    step3: '选择要换算成的目标单位',
    step4: '点击「换算」查看结果和所有单位的完整对照',
  }
});

const { $, t } = GZ;

// g per ml (density) for common baking ingredients — King Arthur / USDA references
const INGREDIENTS = {
  flour_ap:        { name_en:'All-Purpose Flour',  name_zh:'中筋面粉',  density:0.533 },
  flour_bread:     { name_en:'Bread Flour',        name_zh:'高筋面粉',  density:0.563 },
  flour_cake:      { name_en:'Cake Flour',         name_zh:'低筋面粉',  density:0.511 },
  sugar_gran:      { name_en:'Granulated Sugar',   name_zh:'白砂糖',    density:0.845 },
  sugar_brown:     { name_en:'Brown Sugar (packed)',name_zh:'红糖（压实）',density:0.826 },
  sugar_powder:    { name_en:'Powdered Sugar',     name_zh:'糖粉',      density:0.601 },
  butter:          { name_en:'Butter',             name_zh:'黄油',      density:0.959 },
  milk:            { name_en:'Milk',               name_zh:'牛奶',      density:1.035 },
  water:           { name_en:'Water',              name_zh:'水',        density:1.000 },
  cream_heavy:     { name_en:'Heavy Cream',        name_zh:'淡奶油',    density:1.012 },
  oil_veg:         { name_en:'Vegetable Oil',      name_zh:'植物油',    density:0.921 },
  honey:           { name_en:'Honey',              name_zh:'蜂蜜',      density:1.420 },
  syrup_maple:     { name_en:'Maple Syrup',        name_zh:'枫糖浆',    density:1.329 },
  cocoa:           { name_en:'Cocoa Powder',       name_zh:'可可粉',    density:0.529 },
  salt:            { name_en:'Salt (table)',       name_zh:'食盐',      density:1.218 },
  yeast_active:    { name_en:'Active Dry Yeast',   name_zh:'活性干酵母',density:0.578 },
  rice:            { name_en:'Rice (raw)',         name_zh:'生米',      density:0.882 },
  oats:            { name_en:'Rolled Oats',        name_zh:'燕麦片',    density:0.428 },
  chocolate_chips:{ name_en:'Chocolate Chips',    name_zh:'巧克力豆',  density:0.669 },
  almond_flour:    { name_en:'Almond Flour',       name_zh:'杏仁粉',    density:0.440 },
};

// Units — stored as ml per unit (volume)
const UNITS = {
  cup_us:    { name_en:'US cup',          name_zh:'美制杯',     ml: 236.588 },
  cup_metric:{ name_en:'Metric cup',      name_zh:'公制杯',     ml: 250 },
  tbsp:      { name_en:'Tablespoon',      name_zh:'汤匙',       ml: 14.787 },
  tsp:       { name_en:'Teaspoon',        name_zh:'茶匙',       ml: 4.929 },
  ml:        { name_en:'Milliliter',      name_zh:'毫升',       ml: 1 },
  g:         { name_en:'Gram',            name_zh:'克',         mass: true },
  kg:        { name_en:'Kilogram',        name_zh:'千克',       mass: true },
  oz:        { name_en:'Ounce',           name_zh:'盎司',       mass: true },
  lb:        { name_en:'Pound',           name_zh:'磅',         mass: true },
  stick:     { name_en:'Butter stick',    name_zh:'黄油条',     ml: 118.294 }, // 1/2 cup = 1 stick
};

function buildOptions(sel, opts) {
  const lang = GZI18n.getLang();
  sel.innerHTML = Object.entries(opts).map(([k,v]) =>
    `<option value="${k}">${lang==='zh' ? v.name_zh : v.name_en}</option>`).join('');
}

buildOptions($('#ingredient'), INGREDIENTS);
buildOptions($('#from-unit'), UNITS);
buildOptions($('#to-unit'), UNITS);
$('#to-unit').value = 'g';

$('#lbl-ingredient').textContent = t('lblIngredient');
$('#lbl-from-val').textContent = t('lblFromVal');
$('#lbl-from-unit').textContent = t('lblFromUnit');
$('#lbl-to-unit').textContent = t('lblToUnit');
$('#btn-calc').textContent = t('btnCalc');

function toGrams(val, unitKey, density) {
  const u = UNITS[unitKey];
  if (u.mass) {
    const factors = { g:1, kg:1000, oz:28.3495, lb:453.592 };
    return val * factors[unitKey];
  }
  return val * u.ml * density;
}

function fromGrams(grams, unitKey, density) {
  const u = UNITS[unitKey];
  if (u.mass) {
    const factors = { g:1, kg:0.001, oz:0.035274, lb:0.00220462 };
    return grams * factors[unitKey];
  }
  return grams / density / u.ml;
}

function swapUnits() {
  const a = $('#from-unit').value, b = $('#to-unit').value;
  $('#from-unit').value = b; $('#to-unit').value = a;
  calculate();
}

function calculate() {
  const ing = INGREDIENTS[$('#ingredient').value];
  const val = parseFloat($('#from-val').value) || 0;
  const fromU = $('#from-unit').value;
  const toU = $('#to-unit').value;
  const grams = toGrams(val, fromU, ing.density);
  const result = fromGrams(grams, toU, ing.density);
  const lang = GZI18n.getLang();
  $('#result-val').textContent = (Math.abs(result) >= 100 ? result.toFixed(0) : result.toFixed(2));
  $('#result-label').textContent = (lang==='zh' ? ing.name_zh : ing.name_en) + ' · ' + val + ' ' + (lang==='zh' ? UNITS[fromU].name_zh : UNITS[fromU].name_en) + ' =';
  $('#all-units').innerHTML = Object.entries(UNITS).map(([k,u]) => {
    const v = fromGrams(grams, k, ing.density);
    const display = Math.abs(v) >= 100 ? v.toFixed(0) : v.toFixed(2);
    return `<div class="u"><div class="v">${display}</div><div class="n">${lang==='zh' ? u.name_zh : u.name_en}</div></div>`;
  }).join('');
}

calculate();

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🍳', href:'/convert/cooking-converter.html', name:'Cooking Converter'},
    {icon:'🥚', href:'/calc/egg-timer.html', name:'Egg Timer'},
    {icon:'📏', href:'/convert/unit.html', name:'Unit Converter'},
    {icon:'🌡️', href:'/convert/temperature-converter.html', name:'Temperature'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
