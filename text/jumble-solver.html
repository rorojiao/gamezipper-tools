const DICT = (() => {
  const m = new Map(); // signature -> Set of words
  RAW.split(/\s+/).forEach(w => {
    w = w.toLowerCase();
    if (w.length < 2 || w.length > 12) return;
    const sig = w.split('').sort().join('');
    if (!m.has(sig)) m.set(sig, new Set());
    m.get(sig).add(w);
  });
  return m;
})();

// For partial matches (subsets), we need a quick scan of all dict words
const ALL_WORDS = (() => {
  const arr = [];
  DICT.forEach(set => set.forEach(w => arr.push(w)));
  return arr.sort();
})();

function sig(s) { return s.split('').sort().join(''); }

function solve() {
  const raw = ($('#letters').value || '').toLowerCase().replace(/[^a-z]/g, '');
  const minLen = parseInt($('#minlen').value, 10) || 3;
  const sortMode = $('#sort').value;
  if (!raw) { $('#stat').innerHTML = ''; $('#results').innerHTML = `<div class="js-empty">${t('emptyHint')}</div>`; return; }

  // Count letters in input (allow limited repetitions)
  const letterCount = {};
  for (const c of raw) letterCount[c] = (letterCount[c]||0) + 1;

  // Find all dict words whose letter multiset ⊆ input multiset
  const found = new Set();
  for (const w of ALL_WORDS) {
    if (w.length < minLen || w.length > raw.length) continue;
    if (w.length > 12) continue;
    // Quick reject via signature comparison isn't enough — we need multiset subset
    let ok = true;
    const wc = {};
    for (const c of w) wc[c] = (wc[c]||0) + 1;
    for (const c in wc) {
      if ((letterCount[c]||0) < wc[c]) { ok = false; break; }
    }
    if (ok) found.add(w);
  }

  let list = [...found];
  if (sortMode === 'len') {
    list.sort((a,b) => b.length - a.length || a.localeCompare(b));
  } else if (sortMode === 'pts') {
    list.sort((a,b) => score(b) - score(a) || b.length - a.length);
  } else {
    list.sort((a,b) => a.localeCompare(b));
  }

  $('#stat').innerHTML = `<p>${t('found')} <b>${list.length}</b> ${t('words')}</p>`;

  if (!list.length) {
    $('#results').innerHTML = `<div class="js-empty">${t('noWords')}</div>`;
    return;
  }
  $('#results').innerHTML = `<div class="js-words">${list.map(w =>
    `<div class="js-word" onclick="copyText('${w}')" title="click to copy">${w}<span class="pts">${score(w)} ${t('pts')}</span></div>`
  ).join('')}</div>`;
}

function doClear() {
  $('#letters').value = '';
  $('#stat').innerHTML = '';
  $('#results').innerHTML = `<div class="js-empty">${t('emptyHint')}</div>`;
}

function loadExample() {
  $('#letters').value = 'EHLLO';
  solve();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="solve()">${t('found')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
