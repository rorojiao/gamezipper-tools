<style>
.race-track{background:var(--glass2);border:1px solid var(--border);border-radius:16px;padding:24px;margin:16px 0;position:relative;overflow:hidden}
.race-car{font-size:2em;position:absolute;top:8px;transition:left .3s}
.race-finish{position:absolute;right:16px;top:0;bottom:0;width:4px;background:linear-gradient(to bottom,#ff0,#f00 50%,#ff0);border-radius:2px}
.passage-box{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:20px;font-size:1.15em;line-height:1.8;font-family:'Courier New',monospace;margin:16px 0;min-height:120px}
.passage-box .correct{color:var(--gz-success)}
.passage-box .wrong{color:var(--gz-accent);text-decoration:underline;background:rgba(255,0,0,.1);border-radius:2px}
.passage-box .current{background:var(--gz-accent);color:#fff;border-radius:2px;animation:blink 1s infinite}
.passage-box .pending{color:var(--gz-muted)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}
.typing-input{width:100%;padding:14px;font-size:1.1em;border:2px solid var(--border);border-radius:12px;background:var(--glass);color:var(--gz-text);font-family:'Courier New',monospace;outline:none;transition:border-color .2s}
.typing-input:focus{border-color:var(--gz-accent)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:16px 0}
.stat-card{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.stat-card .value{font-size:2em;font-weight:700;color:var(--gz-accent)}
.stat-card .label{font-size:.85em;color:var(--gz-muted);margin-top:4px}
.countdown-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:100;font-size:6em;font-weight:900;color:#fff}
.result-box{background:var(--glass2);border:2px solid var(--gz-success);border-radius:16px;padding:32px;text-align:center;margin:16px 0}
.result-box h3{color:var(--gz-success);font-size:1.5em;margin-bottom:12px}
.mode-selector{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.mode-btn{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--glass);cursor:pointer;transition:all .2s;color:var(--gz-text)}
.mode-btn:hover,.mode-btn.active{background:var(--gz-accent);color:#fff;border-color:var(--gz-accent)}
.leaderboard{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:16px;margin:16px 0}
.lb-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-weight:700;width:30px;color:var(--gz-accent)}
.lb-wpm{font-weight:700;color:var(--gz-success)}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Typing Race","description":"Race against the clock in this fun typing speed game. Type passages as fast as you can, track WPM, accuracy and compete for the best time.","url":"https://tools.gamezipper.com/fun/typing-race.html","applicationCategory":"Game","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How does Typing Race work?", "acceptedAnswer": {"@type": "Answer", "text": "Type the displayed passage as fast as you can. Your speed (WPM), accuracy, and time are tracked in real-time. Race against your own best scores."}}, {"@type": "Question", "name": "What is a good typing speed?", "acceptedAnswer": {"@type": "Answer", "text": "Average typing speed is around 40 WPM. Professional typists often reach 65-75 WPM. Speeds above 80 WPM are considered excellent."}}, {"@type": "Question", "name": "Is my data sent anywhere?", "acceptedAnswer": {"@type": "Answer", "text": "No. All typing and scoring happens entirely in your browser. No data is uploaded to any server."}}, {"@type": "Question", "name": "Can I change the difficulty?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Choose between Easy (common words), Medium (sentences), and Hard (complex paragraphs with punctuation) modes."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="mode-selector" id="modeSelector"></div>
    <div class="race-track" id="raceTrack">
      <div class="race-car" id="car">🏎️</div>
      <div class="race-finish"></div>
    </div>
    <div class="passage-box" id="passageBox"></div>
    <textarea class="typing-input" id="typingInput" rows="2" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="value" id="wpmValue">0</div><div class="label" id="wpmLabel"></div></div>
      <div class="stat-card"><div class="value" id="accValue">100%</div><div class="label" id="accLabel"></div></div>
      <div class="stat-card"><div class="value" id="timeValue">0s</div><div class="label" id="timeLabel"></div></div>
      <div class="stat-card"><div class="value" id="charValue">0</div><div class="label" id="charLabel"></div></div>
    </div>
    <div id="resultArea"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Typing Race ⚡',
    toolDesc: 'Race against the clock! Type passages as fast as you can and track your WPM, accuracy, and time.',
    easy: 'Easy',
    medium: 'Medium',
    hard: 'Hard',
    newRace: 'New Race',
    reset: 'Reset',
    wpm: 'WPM',
    accuracy: 'Accuracy',
    time: 'Time',
    chars: 'Characters',
    raceComplete: '🏁 Race Complete!',
    yourResult: 'Your result',
    bestScores: 'Best Scores',
    startTyping: 'Start typing to begin the race...',
    step1: 'Choose a difficulty mode (Easy, Medium, or Hard)',
    step2: 'Click the input box and start typing the displayed passage',
    step3: 'Your WPM, accuracy, and time are tracked in real-time',
    step4: 'Complete the passage to see your final score and best times',
  },
  zh: {
    toolTitle: '打字竞速 ⚡',
    toolDesc: '与时间赛跑！尽可能快地输入段落，实时追踪你的 WPM、准确率和用时。',
    easy: '简单',
    medium: '中等',
    hard: '困难',
    newRace: '新比赛',
    reset: '重置',
    wpm: 'WPM',
    accuracy: '准确率',
    time: '用时',
    chars: '字符数',
    raceComplete: '🏁 比赛完成！',
    yourResult: '你的成绩',
    bestScores: '最佳成绩',
    startTyping: '开始输入以启动比赛...',
    step1: '选择难度模式（简单、中等或困难）',
    step2: '点击输入框，开始输入显示的段落',
    step3: '实时追踪你的 WPM、准确率和用时',
    step4: '完成段落查看最终成绩和最佳记录',
  }
});

const { $, t } = GZ;

const passages = {
  easy: [
    'the quick brown fox jumps over the lazy dog near the river bank on a sunny day while birds sing in the tall green trees above',
    'she went to the store to buy some milk and bread for breakfast but forgot her wallet at home on the kitchen counter',
    'the old man sat on the park bench feeding small birds with bits of bread he had saved from his lunch earlier today',
    'we love to play games in the garden when the sun is warm and the sky is clear with just a few white clouds floating by',
    'my cat likes to sleep on the soft rug in front of the warm fire place all day long without moving at all',
  ],
  medium: [
    'Programming is the art of telling a computer what to do. It involves writing instructions in a specific language that the machine can understand and execute. The process requires logical thinking and attention to detail.',
    'The Internet has revolutionized the way we communicate, work, and learn. From email to social media, online shopping to remote work, digital technology has transformed nearly every aspect of modern life in just a few decades.',
    'Time management is a crucial skill for success in both personal and professional life. Setting priorities, creating schedules, and avoiding distractions can significantly improve productivity and reduce stress levels.',
    'Reading books regularly improves vocabulary, enhances critical thinking, and reduces stress. Whether fiction or nonfiction, books open doors to new worlds, ideas, and perspectives that enrich our understanding of life.',
    'Good design is not just about aesthetics; it is about solving problems. The best products combine beauty with functionality, creating experiences that are both enjoyable and practical for everyday use.',
  ],
  hard: [
    'In computer science, algorithmic complexity is expressed using Big-O notation: O(1) for constant time, O(log n) for logarithmic, O(n) for linear, O(n log n) for "linearithmic," and O(n^2) for quadratic time. Understanding these complexities helps developers choose the most efficient solution.',
    'The DNS (Domain Name System) hierarchy consists of root servers, top-level domain servers, and authoritative name servers. When you type "www.example.com" into your browser, a recursive resolver queries each level — starting from the root (.) → .com → example.com — to find the IP address. Typical record types include A (IPv4), AAAA (IPv6), CNAME (alias), MX (mail), and TXT (text).',
    'Quantum computing leverages quantum-mechanical phenomena — superposition and entanglement — to process information. Unlike classical bits (0 or 1), qubits can represent both states simultaneously. This enables quantum computers to solve certain problems (e.g., factoring large numbers, optimizing complex systems) exponentially faster than classical machines.',
  ]
};

let currentMode = 'medium';
let currentPassage = '';
let startTime = null;
let timerInterval = null;
let isRacing = false;
let bestScores = JSON.parse(localStorage.getItem('gz-typing-race-best') || '[]');

function selectPassage() {
  const list = passages[currentMode];
  currentPassage = list[Math.floor(Math.random() * list.length)];
  renderPassage(0);
}

function renderPassage(typedLen) {
  const box = $('#passageBox');
  let html = '';
  const input = $('#typingInput').value;
  for (let i = 0; i < currentPassage.length; i++) {
    if (i < typedLen) {
      if (input[i] === currentPassage[i]) {
        html += `<span class="correct">${esc(currentPassage[i])}</span>`;
      } else {
        html += `<span class="wrong">${esc(currentPassage[i])}</span>`;
      }
    } else if (i === typedLen) {
      html += `<span class="current">${esc(currentPassage[i])}</span>`;
    } else {
      html += `<span class="pending">${esc(currentPassage[i])}</span>`;
    }
  }
  box.innerHTML = html;
}

function esc(c) { return c === ' ' ? '&nbsp;' : c === '<' ? '&lt;' : c === '>' ? '&gt;' : c === '&' ? '&amp;' : c; }

function startRace() {
  if (isRacing) return;
  isRacing = true;
  startTime = Date.now();
  timerInterval = setInterval(updateStats, 100);
}

function updateStats() {
  if (!startTime) return;
  const elapsed = (Date.now() - startTime) / 1000;
  const input = $('#typingInput').value;
  const minutes = elapsed / 60;
  const wordsTyped = input.trim().split(/\s+/).filter(Boolean).length;
  const wpm = minutes > 0 ? Math.round(wordsTyped / minutes) : 0;
  const correctChars = [...input].filter((c, i) => c === currentPassage[i]).length;
  const accuracy = input.length > 0 ? Math.round((correctChars / input.length) * 100) : 100;

  $('#wpmValue').textContent = wpm;
  $('#accValue').textContent = accuracy + '%';
  $('#timeValue').textContent = elapsed.toFixed(1) + 's';
  $('#charValue').textContent = input.length;

  // Update car position
  const progress = input.length / currentPassage.length;
  const track = $('#raceTrack');
  const carEl = $('#car');
  const maxLeft = track.offsetWidth - 60;
  carEl.style.left = (progress * maxLeft) + 'px';
}

function finishRace() {
  isRacing = false;
  clearInterval(timerInterval);
  const elapsed = (Date.now() - startTime) / 1000;
  const input = $('#typingInput').value;
  const minutes = elapsed / 60;
  const wordsTyped = input.trim().split(/\s+/).filter(Boolean).length;
  const wpm = minutes > 0 ? Math.round(wordsTyped / minutes) : 0;
  const correctChars = [...input].filter((c, i) => c === currentPassage[i]).length;
  const accuracy = input.length > 0 ? Math.round((correctChars / input.length) * 100) : 100;

  // Save best score
  bestScores.push({ wpm, accuracy, time: elapsed.toFixed(1), mode: currentMode, date: new Date().toLocaleDateString() });
  bestScores.sort((a, b) => b.wpm - a.wpm);
  bestScores = bestScores.slice(0, 5);
  localStorage.setItem('gz-typing-race-best', JSON.stringify(bestScores));

  $('#resultArea').innerHTML = `
    <div class="result-box">
      <h3>${t('raceComplete')}</h3>
      <div class="stats-grid">
        <div class="stat-card"><div class="value" style="color:var(--gz-accent)">${wpm}</div><div class="label">${t('wpm')}</div></div>
        <div class="stat-card"><div class="value" style="color:var(--gz-success)">${accuracy}%</div><div class="label">${t('accuracy')}</div></div>
        <div class="stat-card"><div class="value">${elapsed.toFixed(1)}s</div><div class="label">${t('time')}</div></div>
      </div>
      ${renderLeaderboard()}
      <div style="margin-top:16px"><button class="gz-btn" onclick="newRace()">${t('newRace')}</button></div>
    </div>`;
}

function renderLeaderboard() {
  if (!bestScores.length) return '';
  let rows = bestScores.map((s, i) => `<div class="lb-row"><span class="lb-rank">#${i + 1}</span><span>${s.mode} — ${s.date}</span><span class="lb-wpm">${s.wpm} WPM</span><span>${s.accuracy}%</span></div>`).join('');
  return `<div class="leaderboard"><h4>${t('bestScores')}</h4>${rows}</div>`;
}

function newRace() {
  clearInterval(timerInterval);
  startTime = null;
  isRacing = false;
  $('#typingInput').value = '';
  $('#typingInput').disabled = false;
  $('#resultArea').innerHTML = '';
  $('#wpmValue').textContent = '0';
  $('#accValue').textContent = '100%';
  $('#timeValue').textContent = '0s';
  $('#charValue').textContent = '0';
  $('#car').style.left = '0px';
  selectPassage();
  $('#typingInput').focus();
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  newRace();
}

// Init
$('#modeSelector').innerHTML = `
  <button class="mode-btn ${currentMode==='easy'?'active':''}" data-mode="easy" onclick="setMode('easy')">${t('easy')}</button>
  <button class="mode-btn ${currentMode==='medium'?'active':''}" data-mode="medium" onclick="setMode('medium')">${t('medium')}</button>
  <button class="mode-btn ${currentMode==='hard'?'active':''}" data-mode="hard" onclick="setMode('hard')">${t('hard')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="newRace()" style="margin-left:auto">${t('newRace')}</button>`;

$('#wpmLabel').textContent = t('wpm');
$('#accLabel').textContent = t('accuracy');
$('#timeLabel').textContent = t('time');
$('#charLabel').textContent = t('chars');
$('#typingInput').placeholder = t('startTyping');

$('#typingInput').addEventListener('input', function() {
  const val = this.value;
  if (!isRacing && val.length > 0) startRace();
  renderPassage(val.length);
  updateStats();
  if (val.length >= currentPassage.length) {
    this.disabled = true;
    finishRace();
  }
});

selectPassage();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⌨️', href:'/fun/typing-test.html', name:'Typing Speed Test'},
    {icon:'⚡', href:'/fun/reaction-time.html', name:'Reaction Time'},
    {icon:'🎯', href:'/fun/wordle.html', name:'Wordle'},
    {icon:'🧠', href:'/fun/trivia-quiz.html', name:'Trivia Quiz'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
