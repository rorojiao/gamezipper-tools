const CATEGORIES = ['email','web','network','phone','date','number','security','color','code','social','postal','text','misc'];
let activeCat = '';
let searchTerm = '';

function renderCats() {
  const c = $('#cats');
  const all = `<div class="rl-cat ${!activeCat ? 'active' : ''}" data-cat="">${t('all')}</div>`;
  const cats = CATEGORIES.map(cat => `<div class="rl-cat ${activeCat===cat?'active':''}" data-cat="${cat}">${cat}</div>`).join('');
  c.innerHTML = all + cats;
  c.querySelectorAll('.rl-cat').forEach(el => {
    el.addEventListener('click', () => { activeCat = el.dataset.cat; renderCats(); renderGrid(); });
  });
}

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderGrid() {
  const filtered = PATTERNS.filter(p => {
    if (activeCat && p.cat !== activeCat) return false;
    if (searchTerm) {
      const q = searchTerm.toLowerCase();
      return p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q) || p.cat.includes(q);
    }
    return true;
  });
  $('#count').textContent = `${filtered.length} ${t('results')}`;
  $('#grid').innerHTML = filtered.map((p, idx) => `
    <div class="rl-card">
      <div class="rl-card-title">${p.icon} ${escapeHtml(p.name)} <span class="rl-card-cat">${p.cat}</span></div>
      <div class="rl-desc">${escapeHtml(p.desc)}</div>
      <div class="rl-regex">${escapeHtml(p.regex.source)}</div>
      <div class="rl-actions">
        <button class="rl-btn primary" data-copy="${idx}">📋 ${t('copy')}</button>
        <button class="rl-btn" data-test="${idx}">🧪 ${t('test')}</button>
      </div>
      <div class="rl-test" id="test-${idx}">
        <label>${t('testInput')}:</label>
        <input type="text" data-testinput="${idx}" value="${escapeHtml(p.test||'')}" />
        <div class="rl-test-result" id="result-${idx}"></div>
      </div>
    </div>
  `).join('');

  // Bind
  $('#grid').querySelectorAll('[data-copy]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = +btn.dataset.copy;
      copyText(PATTERNS[idx].regex.source);
      const orig = btn.textContent;
      btn.textContent = `✓ ${t('copied')}`;
      setTimeout(() => btn.textContent = orig, 1500);
    });
  });
  $('#grid').querySelectorAll('[data-test]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = +btn.dataset.test;
      const panel = $(`#test-${idx}`);
      panel.classList.toggle('show');
      if (panel.classList.contains('show')) runTest(idx);
    });
  });
  $('#grid').querySelectorAll('[data-testinput]').forEach(inp => {
    inp.addEventListener('input', () => runTest(+inp.dataset.testinput));
  });
}

function runTest(idx) {
  const p = PATTERNS[idx];
  const val = $(`[data-testinput="${idx}"]`).value;
  const r = $(`#result-${idx}`);
  try {
    const re = new RegExp('^(?:' + p.regex.source + ')$');
    const ok = re.test(val);
    r.innerHTML = ok
      ? `<span style="color:var(--gz-success)">${t('matchYes')}</span>`
      : `<span style="color:var(--gz-accent)">${t('matchNo')}</span>`;
  } catch(e) {
    r.innerHTML = `<span style="color:var(--gz-accent)">⚠ ${escapeHtml(e.message)}</span>`;
  }
}

$('#search').addEventListener('input', e => { searchTerm = e.target.value; renderGrid(); });
