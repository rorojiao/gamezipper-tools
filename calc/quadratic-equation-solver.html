<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I solve a quadratic equation ax²+bx+c=0?","acceptedAnswer":{"@type":"Answer","text":"Use the quadratic formula x = (-b ± √(b²-4ac)) / (2a). First compute the discriminant D = b²-4ac. If D>0 there are two distinct real roots; if D=0 one repeated real root; if D<0 two complex conjugate roots."}},{"@type":"Question","name":"What is the discriminant of a quadratic?","acceptedAnswer":{"@type":"Answer","text":"The discriminant is D = b²-4ac. Its sign tells you the type of roots: D>0 means two distinct real roots, D=0 means exactly one real root (a repeated root), and D<0 means two complex conjugate roots."}},{"@type":"Question","name":"How do I find the vertex of a parabola?","acceptedAnswer":{"@type":"Answer","text":"For y = ax²+bx+c the vertex is at x = -b/(2a). Substitute back to get y = c - b²/(4a). The axis of symmetry is the vertical line x = -b/(2a). When a>0 the parabola opens upward and the vertex is the minimum; when a<0 it opens downward and the vertex is the maximum."}},{"@type":"Question","name":"Can this solver handle complex (imaginary) roots?","acceptedAnswer":{"@type":"Answer","text":"Yes. When the discriminant is negative the solver reports the two complex conjugate roots in the form p ± qi, where i is the imaginary unit."}}]}</script>

<script>

  en: {

    roots: '根',
    discriminant: '判别式 (D = b²−4ac)',
    vertex: '顶点',
    axisSym: '对称轴',
    factored: '因式分解',
    direction: '开口',
    up: '向上（最小值）', down: '向下（最大值）',
    stepsTitle: '详细步骤',
    realRoots: '两个不相等的实根',
    oneRoot: '一个重根',
    complexRoots: '两个共轭复根',
    notQuadratic: 'a = 0 — 这不是二次方程',
    linearRoot: '一次方程解: x =',
    step1: '输入 x² 项的系数 a',
    step2: '输入 x 项系数 b 和常数项 c',
    step3: '查看根、判别式、顶点和对称轴',
    step4: '下滑查看完整推导步骤',
  }
});

const { $, t } = GZ;

function fmtNum(n){
  if(Math.abs(n)<1e-12) return '0';
  if(Math.abs(n-Math.round(n))<1e-10) return Math.round(n).toString();
  return (+n.toFixed(6)).toString();
}

function formatTerm(coef, vars, isFirst){
  // vars: array of {power: 2|1|0}; coef: number
  if(Math.abs(coef)<1e-12) return '';
  let s='';
  const sign = coef<0?'−':(isFirst?'':'+');
  let mag = Math.abs(coef);
  let body = '';
  // x²
  if(vars.includes('x2')){ body += 'x²'; }
  if(vars.includes('x')){ body += 'x'; }
  if(vars==='const' || (!vars)){ /* number only */ }
  if(vars==='const'){
    body = '';
  }
  // Build
  if(Math.abs(mag-1)<1e-10 && vars!=='const') s += sign;
  else s += sign+fmtNum(mag);
  return s+body;
}

function equationStr(a,b,c){
  let parts=[];
  if(Math.abs(a)>1e-12) parts.push((a<0?'−':'')+((Math.abs(a)===1?'':fmtNum(Math.abs(a)))+'x²'));
  if(Math.abs(b)>1e-12) parts.push((b<0?' − ':' + ')+((Math.abs(b)===1?'':fmtNum(Math.abs(b)))+'x'));
  if(Math.abs(c)>1e-12) parts.push((c<0?' − ':' + ')+fmtNum(Math.abs(c)));
  if(parts.length===0) return '0 = 0';
  let s=parts.join('');
  // clean leading +
  s=s.replace(/^\s*\+\s*/,'');
  return s+' = 0';
}

function solve(){
  const a=parseFloat($('#a').value), b=parseFloat($('#b').value), c=parseFloat($('#c').value);
  $('#equation').textContent = equationStr(a,b,c);
  if(Math.abs(a)<1e-12){
    // Linear or none
    if(Math.abs(b)<1e-12){
      const msg = Math.abs(c)<1e-12 ? '0 = 0 (∞ solutions)' : `${fmtNum(c)} = 0 (no solution)`;
      $('#result').innerHTML = `<div class="qe-roots">${msg}</div>`;
    } else {
      const x=-c/b;
      $('#result').innerHTML = `<div class="qe-section"><div class="qe-roots">${t('notQuadratic')}<br>${t('linearRoot')} ${fmtNum(x)}</div></div>`;
    }
    return;
  }
  const D=b*b-4*a*c;
  const discInfo = D>1e-12?t('realRoots'): (Math.abs(D)<1e-12?t('oneRoot'):t('complexRoots'));
  let rootsHTML, roots, factorHTML, stepsHTML;
  if(D>1e-12){
    const sq=Math.sqrt(D);
    const x1=(-b+sq)/(2*a), x2=(-b-sq)/(2*a);
    roots=[x1,x2];
    rootsHTML = `x₁ = ${fmtNum(x1)}<br>x₂ = ${fmtNum(x2)}`;
    factorHTML = `a(x − ${fmtNum(x1)})(x − ${fmtNum(x2)})`;
  } else if(Math.abs(D)<1e-12){
    const x=-b/(2*a);
    roots=[x];
    rootsHTML = `x = ${fmtNum(x)} (double root)`;
    factorHTML = `a(x − ${fmtNum(x)})²`;
  } else {
    const sq=Math.sqrt(-D);
    const re=-b/(2*a), im=Math.abs(sq/(2*a));
    const reS=fmtNum(re), imS=fmtNum(im);
    rootsHTML = `x₁ = ${reS} + ${imS}i<br>x₂ = ${reS} − ${imS}i`;
    factorHTML = `${t('complexRoots')} (no real factoring)`;
  }
  // Vertex
  const vx=-b/(2*a), vy=c-b*b/(4*a);
  const direction = a>0?t('up'):t('down');
  stepsHTML =
`1)  Identify coefficients:  a = ${fmtNum(a)},  b = ${fmtNum(b)},  c = ${fmtNum(c)}

2)  Discriminant:
    D = b² − 4ac = (${fmtNum(b)})² − 4·(${fmtNum(a)})·(${fmtNum(c)})
    D = ${fmtNum(b*b)} − ${fmtNum(4*a*c)} = ${fmtNum(D)}
    → ${discInfo}

3)  Roots (quadratic formula):
    x = (−b ± √D) / (2a)
    x = (−(${fmtNum(b)}) ± √(${fmtNum(D)})) / (2·${fmtNum(a)})
    x = ${fmtNum(-b)} / ${fmtNum(2*a)}  ±  √(${fmtNum(D)}) / ${fmtNum(2*a)}`;

  if(D>=-1e-12){
    const sq=Math.sqrt(Math.max(0,D));
    const x1=(-b+sq)/(2*a), x2=(-b-sq)/(2*a);
    stepsHTML += `
    x₁ = ${fmtNum((-b+sq))}/${fmtNum(2*a)} = ${fmtNum(x1)}
    x₂ = ${fmtNum((-b-sq))}/${fmtNum(2*a)} = ${fmtNum(x2)}`;
  } else {
    stepsHTML += `
    D < 0  →  no real roots, two complex conjugate roots:
    x = ${fmtNum(-b/(2*a))} ± ${(Math.abs(Math.sqrt(-D)/(2*a)))}i`;
  }
  stepsHTML += `

4)  Vertex:
    x_v = −b / (2a) = ${fmtNum(-b)} / ${fmtNum(2*a)} = ${fmtNum(vx)}
    y_v = c − b² / (4a) = ${fmtNum(c)} − ${fmtNum(b*b)} / ${fmtNum(4*a)} = ${fmtNum(vy)}
    vertex = (${fmtNum(vx)}, ${fmtNum(vy)})

5)  Parabola opens ${direction}.`;

  $('#result').innerHTML = `
    <div class="qe-section"><h3>${t('roots')}</h3>
      <div class="qe-roots">${rootsHTML}</div>
    </div>
    <div class="qe-section"><h3>${t('discriminant')}</h3>
      <div class="qe-row"><span class="k">D</span><span class="v">${fmtNum(D)} — ${discInfo}</span></div>
    </div>
    <div class="qe-section"><h3>${t('vertex')}</h3>
      <div class="qe-row"><span class="k">(x, y)</span><span class="v">(${fmtNum(vx)}, ${fmtNum(vy)})</span></div>
    </div>
    <div class="qe-section"><h3>${t('axisSym')}</h3>
      <div class="qe-row"><span class="k">x =</span><span class="v">${fmtNum(vx)}</span></div>
    </div>
    <div class="qe-section"><h3>${t('direction')}</h3>
      <div class="qe-row"><span class="k">a ${a>0?'> 0':'< 0'}</span><span class="v">${direction}</span></div>
    </div>
    <div class="qe-section"><h3>${t('factored')}</h3>
      <div class="qe-row"><span class="k">f(x)</span><span class="v">${factorHTML}</span></div>
    </div>
    <div class="qe-section"><h3>${t('stepsTitle')}</h3>
      <pre class="qe-steps">${stepsHTML}</pre>
    </div>
  `;
}

['a','b','c'].forEach(id=>$('#'+id).addEventListener('input',solve));
solve();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',

    {icon:'📈', href:'/calc/statistics-calculator.html', name:'Statistics Calculator'},
    {icon:'√', href:'/calc/scientific-calculator.html', name:'Scientific Calculator'},
  ]
});
</script>
