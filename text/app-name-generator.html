<script>
GZI18n.register({
  en: {
    toolTitle: 'App Name Generator',
    toolDesc: 'Generate 30+ unique app name ideas for iOS, Android and web apps. Pick a style and category — modern, catchy, made-up, portmanteau and more.',
    lblKeyword: 'Keyword (optional)',
    phKeyword: 'e.g. task, pay, learn, snap',
    lblStyle: 'Style',
    lblCat: 'Category',
    btnGen: 'Generate App Names',
    btnExample: 'Load Example',
    tip: 'Tip: short, brandable names (2-3 syllables) win in app stores. Always check domain + trademark before committing.',
    step1: 'Enter an optional keyword (or leave blank for fully abstract names)',
    step2: 'Pick a naming style and app category',
    step3: 'Click Generate for 30+ app name ideas',
    step4: 'Click a card to copy the name you like',
  },
  zh: {
    toolTitle: 'App 名称生成器',
    toolDesc: '为 iOS、Android 和 Web 应用生成 30+ 独特名称创意。选择风格和分类 — 现代、朗朗上口、自创词、合成词等。',
    lblKeyword: '关键词（可选）',
    phKeyword: '例如：task、pay、learn、snap',
    lblStyle: '风格',
    lblCat: '类别',
    btnGen: '生成 App 名称',
    btnExample: '加载示例',
    tip: '提示：应用商店中简短、可品牌化的名称（2-3 音节）更易胜出。使用前请检查域名和商标。',
    step1: '输入可选关键词（或留空生成完全抽象的名称）',
    step2: '选择命名风格和应用类别',
    step3: '点击「生成」获得 30+ 名称创意',
    step4: '点击卡片复制你喜欢的名称',
  }
});

const { $, copyText, t, showToast } = GZ;

// Word banks
const MODERN_PREFIX = ['Neo','Lumi','Nova','Zen','Vibe','Pulse','Flow','Sync','Echo','Aero','Flux','Lyra','Onyx','Quill','Halo','Velo','Nexa','Aria','Zest','Mira'];
const MODERN_SUFFIX = ['ly','ify','io','hub','loop','flow','wave','beam','pulse','space','base','nest','lab','kit','box','verse','zone','link','core','sync'];
const CATCHY = ['Snap','Blink','Zip','Dash','Pop','Fizz','Buzz','Hop','Skip','Quirk','Spark','Glint','Ting','Wink','Pip','Boop','Yap','Vibe','Zap','Sway'];
const DESCRIPTIVE = ['Task','Time','Note','Pay','Mail','Chat','Plan','Track','Save','Share','Book','Flow','Daily','Quick','Smart','Easy','Pure','Clear','Bright','Step'];
const ROOT_FOREIGN = ['Kai','Mira','Noma','Sora','Luna','Kuro','Aki','Bao','Cira','Dova','Elio','Faro','Goro','Hana','Ino','Juno','Kano','Lera','Moko','Nori'];
const COMPOUND_A = ['Cloud','Bright','Quick','Smart','Pure','Deep','Wild','Bold','Fresh','Gold','Sky','Moon','Sun','Star','Pulse','Prime','Peak','Snap','Swift','True'];
const COMPOUND_B = ['mind','work','flow','pulse','space','base','book','mark','note','plan','track','sync','step','beat','wave','beam','core','loop','hub','lab'];
const CAT_WORDS = {
  productivity:['Task','Note','Plan','Focus','Done','Sync','Track','Daily','Flow','List'],
  social:['Chat','Vibe','Circle','Crowd','Tribes','Link','Bond','Hub','Bevy','Flock'],
  finance:['Pay','Spend','Save','Vault','Coin','Ledger','Wallet','Tally','Sum','Stash'],
  health:['Fit','Pulse','Move','Calm','Well','Vital','Strong','Step','Breath','Zen'],
  game:['Play','Tap','Quest','Arena','Forge','Pixel','Arcade','Boss','Combo','Loot'],
  ai:['Mind','Brain','Spark','Cortex','Neuro','Logic','Sense','Think','Genix','Cogni'],
  education:['Learn','Study','Tutor','Skill','Brain','Quiz','Class','Cram','Skill','Coach'],
};

function pick(a){return a[Math.floor(Math.random()*a.length)];}
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

function makePortmanteau(a, b){
  // take first half of a + last half of b
  const ah = a.slice(0, Math.ceil(a.length/2));
  const bl = b.slice(Math.floor(b.length/2));
  return cap(ah + bl);
}

function gen(keyword, style, cat){
  const results = [];
  const kw = (keyword || '').toLowerCase().trim();
  const styles = style === 'all' ? ['modern','catchy','descriptive','madeup','compound','portmanteau'] : [style];

  styles.forEach(s => {
    for (let i=0; i<6; i++){
      let name, meta = s;
      if (s === 'modern') {
        name = pick(MODERN_PREFIX) + pick(MODERN_SUFFIX);
        if (kw && Math.random()<0.5) name = cap(kw) + pick(MODERN_SUFFIX);
      } else if (s === 'catchy') {
        name = pick(CATCHY) + pick(['ly','io','er','it','sy','ie','go','pop','box','lab']);
        if (kw && Math.random()<0.4) name = cap(kw) + pick(['sy','io','ly','go']);
      } else if (s === 'descriptive') {
        const base = cat !== 'general' && CAT_WORDS[cat] ? pick(CAT_WORDS[cat]) : pick(DESCRIPTIVE);
        name = base + pick(['Box','Hub','Pro','Now','App','Desk','Daily','Wave','Mate','Genie']);
        if (kw && Math.random()<0.5) name = cap(kw) + pick(['Mate','Pro','Hub','Desk','Daily','Wave']);
      } else if (s === 'madeup') {
        const root = pick(ROOT_FOREIGN);
        const suf = pick(['a','io','is','on','us','ix','ova','ella','ari','os']);
        name = root + suf;
      } else if (s === 'compound') {
        name = pick(COMPOUND_A) + pick(COMPOUND_B);
        if (kw && Math.random()<0.4) name = cap(kw) + pick(COMPOUND_B);
      } else if (s === 'portmanteau') {
        const a = kw || pick(CATCHY);
        const b = pick([...CATCHY, ...DESCRIPTIVE]);
        name = makePortmanteau(a, b);
      }
      if (name) results.push({name, meta});
    }
  });

  // Dedupe (case-insensitive)
  const seen = new Set(); const out = [];
  for (const r of results) {
    const k = r.name.toLowerCase();
    if (seen.has(k) || r.name.length < 3 || r.name.length > 14) continue;
    seen.add(k); out.push(r);
  }
  // Shuffle
  for (let i=out.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[out[i],out[j]]=[out[j],out[i]];}
  return out;
}

function run(){
  const kw = $('#keyword').value.trim();
  const list = gen(kw, $('#style').value, $('#cat').value);
  if (!list.length){showToast(GZI18n.getLang()==='zh'?'没有生成结果，请重试':'No results, try again');return;}
  window._list = list;
  $('#results').innerHTML = list.map((r,i)=>`
    <div class="an-card" onclick="copyAt(${i})">
      <div style="flex:1;min-width:0">
        <div class="name">${esc(r.name)}</div>
        <div class="an-meta-row">${r.meta}</div>
      </div>
      <button class="copy" id="bcopy${i}" onclick="event.stopPropagation();copyAt(${i})">${GZ.t('copy')}</button>
    </div>`).join('');
  $('#count').textContent = GZI18n.getLang()==='zh' ? `已生成 ${list.length} 个名称` : `${list.length} names generated`;
}
function copyAt(i){copyText(window._list[i].name);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

$('#btn-gen').textContent=t('btnGen');$('#btn-gen').addEventListener('click',run);
$('#btn-example').textContent=t('btnExample');
$('#btn-example').addEventListener('click',()=>{$('#keyword').value='task';$('#style').value='all';$('#cat').value='productivity';run();});
$('#keyword').placeholder=t('phKeyword');
$('#lbl-keyword').textContent=t('lblKeyword');
$('#lbl-style').textContent=t('lblStyle');
$('#lbl-cat').textContent=t('lblCat');
$('#tip').textContent=t('tip');
$('#keyword').addEventListener('keydown',e=>{if(e.key==='Enter')run();});

GZ.renderToolPage({
  category:'text',
  titleKey:'toolTitle',
  descKey:'toolDesc',

  related:[

    {icon:'🎯',href:'/text/tagline-generator.html',name:'Tagline Gen'},
    {icon:'👤',href:'/text/username-generator.html',name:'Username Gen'},
    {icon:'🌐',href:'/dev/domain-name-generator.html',name:'Domain Name'},
  ]
});
</script>
