<div class="gz-container">

    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div id="preview"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Pricing Table Generator',
    toolDesc: 'Generate beautiful CSS pricing tables with live preview. Customize plans, prices, features and colors.',
    planCount: 'Plans',
    featuredPlan: 'Featured',
    accentColor: 'Accent',
    bgColor: 'Background',
    generate: 'Generate',
    copyHTML: 'Copy HTML',
    copyCSS: 'Copy CSS',
    planName: 'Plan',
    price: '$9',
    feature: 'Feature',
    addFeature: '+ Feature',
    step1: 'Set the number of plans (2-5)',
    step2: 'Customize plan names, prices and features',
    step3: 'Choose a featured plan and accent color',
    step4: 'Click Generate to preview, then copy HTML or CSS',
  },
  zh: {
    toolTitle: 'CSS 定价表生成器',
    toolDesc: '可视化生成精美的 CSS 定价表，支持自定义方案、价格、功能和颜色。',
    planCount: '方案数',
    featuredPlan: '推荐方案',
    accentColor: '强调色',
    bgColor: '背景色',
    generate: '生成',
    copyHTML: '复制 HTML',
    copyCSS: '复制 CSS',
    planName: '方案',
    price: '¥59',
    feature: '功能',
    addFeature: '+ 功能',
    step1: '设置方案数量（2-5）',
    step2: '自定义方案名称、价格和功能列表',
    step3: '选择推荐方案和强调色',
    step4: '点击生成预览，然后复制 HTML 或 CSS',
  }
});

const { $, copyText, t } = GZ;
let planCount = 3, featured = 1, accent = '#4ecdc4', bgCard = '#1a1a2e';

function buildToolbar() {
  $('#toolbar').innerHTML = `
    <label>${t('planCount')} <input type="number" id="inp-count" min="2" max="5" value="${planCount}" style="width:60px"></label>
    <label>${t('featuredPlan')} <select id="inp-featured">${Array.from({length:5},(_,i)=>`<option value="${i}" ${i===featured?'selected':''}>${i<1?'None':'#'+i}</option>`).join('')}</select></label>
    <label>${t('accentColor')} <input type="color" id="inp-accent" value="${accent}"></label>
    <label>${t('bgColor')} <input type="color" id="inp-bg" value="${bgCard}"></label>
    <button class="gz-btn" onclick="generate()">${t('generate')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="copyHTML()">${t('copyHTML')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="copyCSS()">${t('copyCSS')}</button>`;
  $('#inp-count').addEventListener('input', e => { planCount = Math.min(5, Math.max(2, +e.target.value)); generate(); });
  $('#inp-featured').addEventListener('change', e => { featured = +e.target.value; generate(); });
  $('#inp-accent').addEventListener('input', e => { accent = e.target.value; generate(); });
  $('#inp-bg').addEventListener('input', e => { bgCard = e.target.value; generate(); });
}

const defaultPlans = [
  { name: 'Basic', price: '$9', features: ['5 Projects','1GB Storage','Email Support'] },
  { name: 'Pro', price: '$29', features: ['25 Projects','10GB Storage','Priority Support','Custom Domain'] },
  { name: 'Enterprise', price: '$99', features: ['Unlimited Projects','100GB Storage','24/7 Support','Custom Domain','API Access','SLA'] },
  { name: 'Starter', price: '$19', features: ['10 Projects','5GB Storage','Email Support'] },
  { name: 'Premium', price: '$49', features: ['50 Projects','50GB Storage','Priority Support','Custom Domain','API Access'] },
];

function generate() {
  const preview = $('#preview');
  preview.innerHTML = '';
  for (let i = 0; i < planCount; i++) {
    const p = defaultPlans[i] || { name: t('planName')+' '+(i+1), price: '$'+(i+1)*10, features: [t('feature')+' 1',t('feature')+' 2'] };
    const isFeatured = i === featured;
    const card = document.createElement('div');
    card.className = 'plan-card' + (isFeatured ? ' featured' : '');
    card.style.background = bgCard;
    card.innerHTML = `
      <h3>${p.name}</h3>
      <div class="plan-price"><span>$</span>${p.price.replace(/[^0-9]/g,'')}</div>
      <ul class="plan-features">${p.features.map(f=>`<li>${f}</li>`).join('')}</ul>
      <a class="plan-cta" style="background:${accent}">${isFeatured?'Get Started':'Choose'}</a>`;
    preview.appendChild(card);
  }
}

function copyHTML() {
  let html = '<div class="pricing-table">\n';
  for (let i = 0; i < planCount; i++) {
    const p = defaultPlans[i] || { name: t('planName')+' '+(i+1), price: '$'+(i+1)*10, features: [t('feature')+' 1'] };
    const isFeatured = i === featured;
    html += `  <div class="plan-card${isFeatured?' featured':''}">\n    <h3>${p.name}</h3>\n    <div class="plan-price">${p.price}</div>\n    <ul class="plan-features">\n${p.features.map(f=>`      <li>${f}</li>`).join('\n')}\n    </ul>\n    <a href="#" class="plan-cta">${isFeatured?'Get Started':'Choose'}</a>\n  </div>\n`;
  }
  html += '</div>';
  copyText(html);
}

function copyCSS() {
  const css = `.pricing-table { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
.plan-card { background: ${bgCard}; border: 1px solid #333; border-radius: 12px; padding: 28px 24px; width: 220px; text-align: center; }
.plan-card.featured { border-color: ${accent}; box-shadow: 0 0 20px ${accent}33; transform: scale(1.05); }
.plan-card h3 { margin: 0 0 8px; font-size: 1.1em; }
.plan-price { font-size: 2.2em; font-weight: 700; margin: 12px 0; }
.plan-features { list-style: none; padding: 0; margin: 16px 0; text-align: left; font-size: 0.85em; line-height: 2; }
.plan-cta { display: inline-block; padding: 10px 24px; border-radius: 8px; font-weight: 600; background: ${accent}; color: #000; text-decoration: none; }`;
  copyText(css);
}

buildToolbar();
generate();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔘', href:'/css-tools/button.html', name:'Button Generator'},
    {icon:'🃏', href:'/css-tools/card.html', name:'Card Generator'},
    {icon:'🪟', href:'/css-tools/glassmorphism.html', name:'Glassmorphism'},
    {icon:'🔲', href:'/css-tools/neumorphism.html', name:'Neumorphism'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
