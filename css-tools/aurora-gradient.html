<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is an aurora gradient?", "acceptedAnswer": {"@type": "Answer", "text": "An aurora gradient simulates the Northern Lights effect on a webpage — multiple colored blobs that float and blend together using CSS blur and blend modes. It is a trendy background style for hero sections and landing pages."}}, {"@type": "Question", "name": "Does the animation work on all browsers?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The aurora uses standard CSS keyframe animations, blur filters and blend modes supported by all modern browsers (Chrome, Firefox, Safari, Edge). No JavaScript libraries required."}}, {"@type": "Question", "name": "Can I change the colors?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Use the three color pickers to set each aurora blob's color. You can also pick from preset palettes like Northern Lights, Sunset, Neon, Ocean and more."}}, {"@type": "Question", "name": "Is this tool free?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, 100% free with no signup. The generated CSS is yours to use in any project — personal or commercial."}}]}</script>

  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Aurora Gradient Generator',
    toolDesc: 'Create mesmerizing animated aurora gradient backgrounds. Layer flowing color blobs, control speed, blur and intensity, then copy production-ready CSS.',
    copy: 'Copy CSS',
    step1: 'Pick a preset palette or set your own three colors',
    step2: 'Adjust blur, speed and intensity sliders',
    step3: 'Preview the animated aurora effect live',
    step4: 'Click Copy CSS and paste into your project',
  },
  zh: {
    toolTitle: '极光渐变背景生成器',
    toolDesc: '创建迷人的动态极光渐变背景。叠加流动的色块，控制速度、模糊和强度，然后复制生产级 CSS 代码。',
    copy: '复制 CSS',
    step1: '选择预设配色或自定义三种颜色',
    step2: '调整模糊、速度和强度滑块',
    step3: '实时预览动态极光效果',
    step4: '点击复制 CSS 并粘贴到你的项目',
  }
});

const { $, copyText, t } = GZ;
const presets = {
  'Northern Lights': ['#00ff87','#0ea5e9','#8b5cf6'],
  'Sunset': ['#f0932b','#ee5253','#c44569'],
  'Ocean': ['#00d672','#4ecdc4','#3742fa'],
  'Neon': ['#ff006e','#8338ec','#3a86ff'],
  'Cotton Candy': ['#fd79a8','#fab1a0','#a29bfe'],
  'Emerald': ['#00b894','#55efc4','#0984e3'],
  'Fire': ['#eb4d4b','#f0932b','#ff6b6b'],
  'Galaxy': ['#6c5ce7','#a29bfe','#fd79a8'],
};

let state = { c1: '#00ff87', c2: '#0ea5e9', c3: '#8b5cf6', blur: 60, speed: 12, opacity: 0.7 };

function renderPreview() {
  const p = $('#preview');
  p.style.background = '#0a0a0f';
  p.innerHTML = `
    <div class="blob" style="background:${state.c1};width:60%;height:80%;top:-15%;left:-10%;filter:blur(${state.blur}px);opacity:${state.opacity};animation-duration:${state.speed}s"></div>
    <div class="blob" style="background:${state.c2};width:55%;height:70%;top:10%;right:-10%;filter:blur(${state.blur}px);opacity:${state.opacity};animation-duration:${state.speed*1.3}s;animation-delay:-${state.speed/3}s"></div>
    <div class="blob" style="background:${state.c3};width:50%;height:60%;bottom:-15%;left:30%;filter:blur(${state.blur}px);opacity:${state.opacity};animation-duration:${state.speed*1.5}s;animation-delay:-${state.speed/2}s"></div>`;
  renderCode();
}

function renderCode() {
  const css = `.aurora-bg {
  position: relative;
  background: #0a0a0f;
  overflow: hidden;
}

.aurora-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(${state.blur}px);
  opacity: ${state.opacity};
  mix-blend-mode: screen;
  animation: aurora-float ${state.speed}s ease-in-out infinite;
}

.aurora-blob:nth-child(1) { background: ${state.c1}; width: 60%; height: 80%; top: -15%; left: -10%; animation-duration: ${state.speed}s; }
.aurora-blob:nth-child(2) { background: ${state.c2}; width: 55%; height: 70%; top: 10%; right: -10%; animation-duration: ${(state.speed*1.3).toFixed(1)}s; animation-delay: -${(state.speed/3).toFixed(1)}s; }
.aurora-blob:nth-child(3) { background: ${state.c3}; width: 50%; height: 60%; bottom: -15%; left: 30%; animation-duration: ${(state.speed*1.5).toFixed(1)}s; animation-delay: -${(state.speed/2).toFixed(1)}s; }

@keyframes aurora-float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(40px, -30px) scale(1.1); }
  66% { transform: translate(-30px, 30px) scale(0.9); }
}`;
  const html = `<div class="aurora-bg">
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
</div>`;
  $('#codeArea').value = `<!-- HTML -->\n${html}\n\n/* CSS */\n${css}`;
}

function buildControls() {
  const lbls = { c1: 'Color 1', c2: 'Color 2', c3: 'Color 3', blur: 'Blur', speed: 'Speed', opacity: 'Opacity' };
  $('#controls').innerHTML = `
    <div><label>${lbls.c1}</label><input type="color" value="${state.c1}" oninput="state.c1=this.value;renderPreview()"></div>
    <div><label>${lbls.c2}</label><input type="color" value="${state.c2}" oninput="state.c2=this.value;renderPreview()"></div>
    <div><label>${lbls.c3}</label><input type="color" value="${state.c3}" oninput="state.c3=this.value;renderPreview()"></div>
    <div><label>${lbls.blur} (${state.blur}px)</label><input type="range" min="20" max="120" value="${state.blur}" oninput="state.blur=+this.value;renderPreview();this.previousElementSibling.textContent='${lbls.blur} ('+this.value+'px)'"></div>
    <div><label>${lbls.speed} (${state.speed}s)</label><input type="range" min="4" max="30" value="${state.speed}" oninput="state.speed=+this.value;renderPreview();this.previousElementSibling.textContent='${lbls.speed} ('+this.value+'s)'"></div>
    <div><label>${lbls.opacity} (${Math.round(state.opacity*100)}%)</label><input type="range" min="30" max="100" value="${state.opacity*100}" oninput="state.opacity=+this.value/100;renderPreview();this.previousElementSibling.textContent='${lbls.opacity} ('+Math.round(this.value)+'%)'"></div>
  `;
}

$('#presets').innerHTML = Object.entries(presets).map(([name, colors]) =>
  `<button class="preset-btn" style="background:linear-gradient(135deg,${colors[0]},${colors[1]},${colors[2]})" onclick="loadPreset('${name}')">${name}</button>`
).join('');

function loadPreset(name) {
  const p = presets[name];
  state.c1 = p[0]; state.c2 = p[1]; state.c3 = p[2];
  buildControls();
  renderPreview();
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="copyText($('#codeArea').value)">${t('copy')}</button>`;

buildControls();
renderPreview();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/css-tools/mesh-gradient.html', name:'Mesh Gradient'},
    {icon:'🌈', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'✨', href:'/css-tools/glassmorphism.html', name:'Glassmorphism'},
    {icon:'🔘', href:'/css-tools/neumorphism.html', name:'Neumorphism'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
