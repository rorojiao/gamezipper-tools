<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How many words are on a single page?", "acceptedAnswer": {"@type": "Answer", "text": "A standard double-spaced page with 12pt Times New Roman and 1-inch margins holds about 250 words. Single-spaced, the same page holds about 500 words. The exact number depends on font, font size, line spacing and margin settings."}}, {"@type": "Question", "name": "How accurate is the words to pages calculator?", "acceptedAnswer": {"@type": "Answer", "text": "The calculator uses widely accepted averages (about 250 words per double-spaced page, 500 words single-spaced) adjusted for your chosen font family, font size and spacing. It gives a reliable estimate; actual layout in Word or Google Docs may vary by a few percent."}}, {"@type": "Question", "name": "Is my text stored or uploaded?", "acceptedAnswer": {"@type": "Answer", "text": "No. All counting and conversion happens entirely in your browser. Your text is never sent to any server or stored anywhere."}}, {"@type": "Question", "name": "How many pages is 1000 words?", "acceptedAnswer": {"@type": "Answer", "text": "1000 words is about 4 pages double-spaced (12pt, 1-inch margins) or about 2 pages single-spaced. Use the calculator above with your exact formatting for a precise estimate."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="mode-toggle">
      <button class="gz-btn" id="mode-text" onclick="setMode('text')"></button>
      <button class="gz-btn gz-btn-secondary" id="mode-count" onclick="setMode('count')"></button>
    </div>
    <div id="input-area">
      <textarea id="input" rows="10" spellcheck="false" style="width:100%" placeholder=""></textarea>
    </div>
    <div id="count-area" style="display:none">
      <label id="lbl-count" style="font-size:.8rem;color:var(--text2)"></label>
      <input id="wordInput" type="number" min="0" value="500" style="width:100%;margin-bottom:10px">
    </div>
    <div class="controls">
      <div>
        <label id="lbl-font"></label>
        <select id="font" class="gz-select" onchange="recalc()" style="width:100%">
          <option value="times">Times New Roman</option>
          <option value="arial">Arial</option>
          <option value="calibri">Calibri</option>
          <option value="georgia">Georgia</option>
          <option value="courier">Courier New</option>
        </select>
      </div>
      <div>
        <label id="lbl-size"></label>
        <select id="size" class="gz-select" onchange="recalc()" style="width:100%">
          <option value="10">10 pt</option>
          <option value="11">11 pt</option>
          <option value="12" selected>12 pt</option>
          <option value="14">14 pt</option>
          <option value="16">16 pt</option>
        </select>
      </div>
      <div>
        <label id="lbl-spacing"></label>
        <select id="spacing" class="gz-select" onchange="recalc()" style="width:100%">
          <option value="2" id="opt-double"></option>
          <option value="1.5" id="opt-onehalf"></option>
          <option value="1" id="opt-single"></option>
        </select>
      </div>
      <div>
        <label id="lbl-margin"></label>
        <select id="margin" class="gz-select" onchange="recalc()" style="width:100%">
          <option value="narrow" id="opt-narrow"></option>
          <option value="normal" selected id="opt-normal"></option>
          <option value="wide" id="opt-wide"></option>
        </select>
      </div>
    </div>
    <div id="w2p-result"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Words to Pages Calculator',
    toolDesc: 'Convert words to pages and estimate how long your essay, paper or speech will be. Adjust font, size, spacing and margins for an accurate page count.',
    modeText: 'Paste text',
    modeCount: 'Enter word count',
    lblFont: 'Font',
    lblSize: 'Font size',
    lblSpacing: 'Spacing',
    lblMargin: 'Margins',
    lblCount: 'Number of words',
    double: 'Double (2.0)',
    onehalf: '1.5 lines',
    single: 'Single (1.0)',
    narrow: 'Narrow (0.75")',
    normal: 'Normal (1")',
    wide: 'Wide (1.25")',
    phText: 'Paste or type your text here to estimate the page count…',
    pages: 'pages',
    words: 'words',
    chars: 'characters',
    charsNoSpace: 'chars (no spaces)',
    sentences: 'sentences',
    paragraphs: 'paragraphs',
    readingTime: 'reading time',
    minutes: 'min',
    charsPerPage: 'chars / page',
    estimate: 'Estimated result',
    note: 'Estimates based on standard academic formatting (~250 words per double-spaced page, ~500 single-spaced). Actual layout may vary slightly depending on paragraph breaks, headings and images.',
    step1: 'Choose a mode — paste your full text, or enter a word count directly',
    step2: 'Pick your font family, font size, line spacing and margin width',
    step3: 'Read the estimated page count and detailed text statistics',
    step4: 'Adjust the settings to match your assignment requirements',
  },
  zh: {
    toolTitle: '字数转页数计算器',
    toolDesc: '将字数转换为页数，估算论文、作文或演讲稿的篇幅。可调整字体、字号、行距和页边距，获得准确的页数估算。',
    modeText: '粘贴文本',
    modeCount: '输入字数',
    lblFont: '字体',
    lblSize: '字号',
    lblSpacing: '行距',
    lblMargin: '页边距',
    lblCount: '单词数 / 字数',
    double: '双倍 (2.0)',
    onehalf: '1.5 倍',
    single: '单倍 (1.0)',
    narrow: '窄 (0.75英寸)',
    normal: '标准 (1英寸)',
    wide: '宽 (1.25英寸)',
    phText: '在此粘贴或输入文本，估算页数…',
    pages: '页',
    words: '词数',
    chars: '字符数',
    charsNoSpace: '字符（不含空格）',
    sentences: '句子数',
    paragraphs: '段落数',
    readingTime: '阅读时间',
    minutes: '分钟',
    charsPerPage: '字符/页',
    estimate: '估算结果',
    note: '估算基于标准学术排版（双倍行距约 250 词/页，单倍约 500 词/页）。实际排版可能因段落、标题和图片略有差异。',
    step1: '选择模式 — 粘贴完整文本，或直接输入字数',
    step2: '选择字体、字号、行距和页边距',
    step3: '查看估算页数和详细文本统计',
    step4: '调整设置以匹配你的作业格式要求',
  }
});

const { $, t } = GZ;
let mode = 'text';

// Font family relative width factor (1.0 = baseline Times New Roman 12pt)
const FONT_FACTOR = { times: 1.0, arial: 0.92, calibri: 1.06, georgia: 0.96, courier: 0.74 };

function setMode(m){
  mode = m;
  $('#mode-text').className = m === 'text' ? 'gz-btn' : 'gz-btn gz-btn-secondary';
  $('#mode-count').className = m === 'count' ? 'gz-btn' : 'gz-btn gz-btn-secondary';
  $('#input-area').style.display = m === 'text' ? 'block' : 'none';
  $('#count-area').style.display = m === 'count' ? 'block' : 'none';
  recalc();
}

function recalc(){
  // Base words-per-page at Times New Roman 12pt double-spaced 1" margins = 250
  const fontFactor = FONT_FACTOR[$('#font').value];
  const sizeFactor = 12 / +$('#size').value;
  const spacingFactor = 2 / +$('#spacing').value;
  const marginFactor = { narrow: 1.18, normal: 1.0, wide: 0.90 }[$('#margin').value];

  const wppBase = 250;
  const wpp = wppBase * fontFactor * sizeFactor * spacingFactor * marginFactor;

  let wordCount, charCount, charNoSpace, sentenceCount, paraCount;
  if (mode === 'count'){
    wordCount = Math.max(0, parseInt($('#wordInput').value) || 0);
    // rough averages
    charCount = Math.round(wordCount * 6.2);
    charNoSpace = Math.round(wordCount * 5.2);
    sentenceCount = Math.max(1, Math.round(wordCount / 18));
    paraCount = Math.max(1, Math.round(wordCount / 90));
  } else {
    const text = $('#input').value;
    wordCount = (text.trim().match(/\S+/g) || []).length;
    charCount = text.length;
    charNoSpace = text.replace(/\s/g,'').length;
    sentenceCount = (text.match(/[^.!?。！？]+[.!?。！？]+/g) || []).length;
    paraCount = text.split(/\n\s*\n/).filter(p => p.trim()).length;
    if (paraCount === 0 && text.trim()) paraCount = 1;
  }
  const pages = wpp > 0 ? wordCount / wpp : 0;
  const readMin = wordCount / 200; // 200 wpm average
  const cpp = wpp * 6.2;

  $('#w2p-result').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="num">${pages.toFixed(2)}</div><div class="lab">${t('pages')}</div></div>
      <div class="stat-card"><div class="num">${wordCount.toLocaleString()}</div><div class="lab">${t('words')}</div></div>
      <div class="stat-card"><div class="num">${charCount.toLocaleString()}</div><div class="lab">${t('chars')}</div></div>
      <div class="stat-card"><div class="num">${charNoSpace.toLocaleString()}</div><div class="lab">${t('charsNoSpace')}</div></div>
      <div class="stat-card"><div class="num">${sentenceCount.toLocaleString()}</div><div class="lab">${t('sentences')}</div></div>
      <div class="stat-card"><div class="num">${paraCount.toLocaleString()}</div><div class="lab">${t('paragraphs')}</div></div>
      <div class="stat-card"><div class="num">${readMin.toFixed(1)} ${t('minutes')}</div><div class="lab">${t('readingTime')}</div></div>
      <div class="stat-card"><div class="num">${Math.round(wpp)}</div><div class="lab">${t('words')}/${t('pages')}</div></div>
    </div>
    <p class="note">💡 ${t('note')}</p>`;
}

// Wire labels
$('#mode-text').textContent = t('modeText');
$('#mode-count').textContent = t('modeCount');
$('#lbl-font').textContent = t('lblFont');
$('#lbl-size').textContent = t('lblSize');
$('#lbl-spacing').textContent = t('lblSpacing');
$('#lbl-margin').textContent = t('lblMargin');
$('#lbl-count').textContent = t('lblCount');
$('#opt-double').textContent = t('double');
$('#opt-onehalf').textContent = t('onehalf');
$('#opt-single').textContent = t('single');
$('#opt-narrow').textContent = t('narrow');
$('#opt-normal').textContent = t('normal');
$('#opt-wide').textContent = t('wide');
$('#input').placeholder = t('phText');

$('#input').addEventListener('input', recalc);
$('#wordInput').addEventListener('input', recalc);

setMode('text');

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'⏱️', href:'/text/reading-time.html', name:'Reading Time'},
    {icon:'📜', href:'/text/lorem-ipsum.html', name:'Lorem Ipsum'},
    {icon:'📖', href:'/text/readability-checker.html', name:'Readability Checker'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
