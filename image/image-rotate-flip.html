<body>
<div class="gz-container">
  <div class="gz-tool-header">

  <div class="gz-tool-area">

      <div class="irf-card">
        <h3 id="lbl-src"></h3>
        <div class="irf-drop" id="drop">
          <input type="file" id="file" accept="image/*">
          <div style="font-size:2.5rem">📁</div>
          <div id="lbl-drop"></div>
          <div class="irf-empty" id="lbl-or"></div>
        </div>
        <img class="irf-prev hidden" id="prev">
        <div class="irf-info" id="info"></div>

          <button class="irf-btn" id="b-rot-r"><span class="icon">↻</span><span id="lbl-rr"></span></button>
          <button class="irf-btn" id="b-flip-h"><span class="icon">⇋</span><span id="lbl-fh"></span></button>
          <button class="irf-btn" id="b-flip-v"><span class="icon">⥯</span><span id="lbl-fv"></span></button>

            <option value="image/png">PNG (lossless)</option>

        </div>

        <div class="irf-actions">
          <button class="gz-btn" id="b-download"><span id="lbl-dl"></span></button>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Image Rotate & Flip',
    toolDesc: 'Rotate images by 90°, 180°, 270° or flip horizontally / vertically. Free, in-browser, no upload. Works with JPG, PNG, WebP, GIF.',
    lblSrc: 'Source Image',
    lblDrop: 'Click to choose an image or drag & drop here',
    lblOr: 'JPG, PNG, WebP, GIF, BMP — max 20MB',
    lblControls: 'Transform Controls',
    lblRl: 'Rotate Left', lblRr: 'Rotate Right', lblFh: 'Flip Horizontal', lblFv: 'Flip Vertical',
    lblFormat: 'Output format:',
    lblQuality: 'Quality:',
    lblDl: 'Download',
    lblReset: 'Reset',
    step1: 'Click the box or drag-and-drop an image',
    step2: 'Click Rotate Left, Rotate Right, Flip Horizontal, or Flip Vertical',
    step3: 'Chain multiple transforms as needed',
    step4: 'Choose output format and quality, then download',
  },
  zh: {
    toolTitle: '图片旋转与翻转',
    toolDesc: '将图片旋转 90°、180°、270° 或水平/垂直翻转。免费，浏览器本地处理，无需上传。支持 JPG、PNG、WebP、GIF。',
    lblSrc: '源图片',
    lblDrop: '点击选择图片或拖放到此处',
    lblOr: 'JPG, PNG, WebP, GIF, BMP — 最大 20MB',
    lblControls: '变换控制',
    lblRl: '向左旋转', lblRr: '向右旋转', lblFh: '水平翻转', lblFv: '垂直翻转',
    lblFormat: '输出格式：',
    lblQuality: '质量：',
    lblDl: '下载',
    lblReset: '重置',
    step1: '点击框或拖放图片',
    step2: '点击向左旋转、向右旋转、水平翻转或垂直翻转',
    step3: '可根据需要组合多次变换',
    step4: '选择输出格式和质量，然后下载',
  }
});

const { $, t } = GZ;
let sourceImg = null;
let rotation = 0; // multiple of 90
let flipH = false, flipV = false;
let currentBlobURL = null;

function loadImage(file) {
  if (!file || !file.type.startsWith('image/')) {
    alert('Please select an image file');
    return;
  }
  if (file.size > 20 * 1024 * 1024) {
    alert('File too large (max 20MB)');
    return;
  }
  if (currentBlobURL) URL.revokeObjectURL(currentBlobURL);
  currentBlobURL = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    sourceImg = img;
    rotation = 0; flipH = false; flipV = false;
    render();
  };
  img.src = currentBlobURL;
}

function render() {
  if (!sourceImg) return;
  const w0 = sourceImg.naturalWidth;
  const h0 = sourceImg.naturalHeight;
  // 90/270 swap dimensions
  const swap = (rotation % 180 !== 0);
  const w = swap ? h0 : w0;
  const h = swap ? w0 : h0;
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  // Apply flips first
  ctx.translate(w / 2, h / 2);
  ctx.rotate(rotation * Math.PI / 180);
  if (flipH) ctx.scale(-1, 1);
  if (flipV) ctx.scale(1, -1);
  ctx.drawImage(sourceImg, -w0 / 2, -h0 / 2);
  const dataUrl = canvas.toDataURL($('#format').value, +$('#quality').value / 100);
  $('#prev').src = dataUrl;
  $('#prev').classList.remove('hidden');
  $('#info').innerHTML = `<b>${w0} × ${h0}</b> → <b>${w} × ${h}</b>`;
}

function download() {
  if (!sourceImg) return;
  const w0 = sourceImg.naturalWidth;
  const h0 = sourceImg.naturalHeight;
  const swap = (rotation % 180 !== 0);
  const w = swap ? h0 : w0;
  const h = swap ? w0 : h0;
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.translate(w / 2, h / 2);
  ctx.rotate(rotation * Math.PI / 180);
  if (flipH) ctx.scale(-1, 1);
  if (flipV) ctx.scale(1, -1);
  ctx.drawImage(sourceImg, -w0 / 2, -h0 / 2);
  canvas.toBlob(blob => {
    if (!blob) return;
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const ext = $('#format').value.split('/')[1].replace('jpeg', 'jpg');
    a.download = `image-transformed-${Date.now()}.${ext}`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }, $('#format').value, +$('#quality').value / 100);
}

function reset() {
  sourceImg = null;
  rotation = 0; flipH = false; flipV = false;
  $('#prev').classList.add('hidden');
  $('#info').innerHTML = '';
  if (currentBlobURL) { URL.revokeObjectURL(currentBlobURL); currentBlobURL = null; }
  $('#file').value = '';
}

// Wire up
$('#lbl-src').textContent = t('lblSrc');
$('#lbl-drop').textContent = t('lblDrop');
$('#lbl-or').textContent = t('lblOr');
$('#lbl-controls').textContent = t('lblControls');
$('#lbl-rl').textContent = t('lblRl');
$('#lbl-rr').textContent = t('lblRr');
$('#lbl-fh').textContent = t('lblFh');
$('#lbl-fv').textContent = t('lblFv');
$('#lbl-format').textContent = t('lblFormat');
$('#lbl-quality').textContent = t('lblQuality');
$('#lbl-dl').textContent = t('lblDl');
$('#lbl-reset').textContent = t('lblReset');

$('#file').addEventListener('change', e => loadImage(e.target.files[0]));
$('#drop').addEventListener('click', () => $('#file').click());
$('#b-rot-l').addEventListener('click', () => { rotation = (rotation - 90) % 360; render(); });
$('#b-rot-r').addEventListener('click', () => { rotation = (rotation + 90) % 360; render(); });
$('#b-flip-h').addEventListener('click', () => { flipH = !flipH; render(); });
$('#b-flip-v').addEventListener('click', () => { flipV = !flipV; render(); });
$('#format').addEventListener('change', render);
$('#quality').addEventListener('input', e => { $('#qv').textContent = e.target.value + '%'; render(); });
$('#b-download').addEventListener('click', download);
$('#b-reset').addEventListener('click', reset);

const dropEl = $('#drop');
['dragenter','dragover'].forEach(ev => dropEl.addEventListener(ev, e => { e.preventDefault(); dropEl.classList.add('over'); }));
['dragleave','drop'].forEach(ev => dropEl.addEventListener(ev, e => { e.preventDefault(); dropEl.classList.remove('over'); }));
dropEl.addEventListener('drop', e => { if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]); });

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔄', href:'/image/rotator.html', name:'Image Rotator'},
    {icon:'✂️', href:'/image/cropper.html', name:'Image Cropper'},
    {icon:'📏', href:'/image/resizer.html', name:'Image Resizer'},
    {icon:'🔍', href:'/image/filters.html', name:'Image Filters'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
