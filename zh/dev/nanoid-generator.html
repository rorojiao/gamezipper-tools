<script>
GZI18n.register({
  en: {
    toolTitle: 'NanoID Generator',
    toolDesc: 'Generate fast, compact, URL-safe unique string IDs using the NanoID algorithm. Customize length, alphabet and quantity — all in your browser.',
    generate: 'Generate',
    copy: 'Copy All',
    length: 'Length',
    quantity: 'Quantity',
    alphabet: 'Alphabet',
    collisionProb: 'Collision Prob',
    entropy: 'Entropy',
    perId: 'per ID',
    step1: 'Set the desired ID length (default 21)',
    step2: 'Choose an alphabet or type a custom one',
    step3: 'Click Generate to create NanoIDs',
    step4: 'Copy individual IDs or all at once',
  },
  zh: {
    toolTitle: 'NanoID 生成器',
    toolDesc: '使用 NanoID 算法生成快速、紧凑、URL 安全的唯一字符串 ID。自定义长度、字母表和数量 — 全部在浏览器中完成。',
    generate: '生成',
    copy: '全部复制',
    length: '长度',
    quantity: '数量',
    alphabet: '字母表',
    collisionProb: '碰撞概率',
    entropy: '熵值',
    perId: '每个 ID',
    step1: '设置所需的 ID 长度（默认 21）',
    step2: '选择字母表或输入自定义字母表',
    step3: '点击「生成」创建 NanoID',
    step4: '复制单个 ID 或全部复制',
  }
});

const { $, copyText, t } = GZ;

const ALPHABETS = {
  'url-safe': 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789_-',
  'alphanumeric': 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789',
  'lowercase': 'abcdefghijklmnopqrstuvwxyz0123456789',
  'numbers': '0123456789',
  'hex': '0123456789abcdef',
  'no-doppelganger': 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789',
};

function setAlphabet(key) {
  $('#alphabet').value = ALPHABETS[key];
  generate();
}

function generate() {
  const alphabet = $('#alphabet').value;
  const size = +$('#size').value;
  const count = Math.min(+$('#count').value || 1, 1000);
  if (!alphabet) return;

  const mask = (2 << Math.log(alphabet.length - 1) / Math.LN2) - 1;
  const step = Math.ceil(1.6 * mask * size / alphabet.length);

  const ids = [];
  for (let n = 0; n < count; n++) {
    let id = '';
    const bytes = crypto.getRandomValues(new Uint8Array(step));
    let i = 0;
    while (id.length < size) {
      const idx = bytes[i] & mask;
      if (idx < alphabet.length) id += alphabet[idx];
      i++;
      if (i >= bytes.length) break;
    }
    // If we ran out of bytes, get more
    while (id.length < size) {
      const extra = crypto.getRandomValues(new Uint8Array(1))[0] & mask;
      if (extra < alphabet.length) id += alphabet[extra];
    }
    ids.push(id);
  }

  $('#output').textContent = ids.join('\n');

  // Stats
  const ent = Math.log2(alphabet.length) * size;
  const totalBits = ent;
  // Collision probability approximation: p ≈ n² / (2 * 2^bits) for n ids
  const collisionP = count > 1 ? (count * count) / (2 * Math.pow(2, totalBits)) : 0;
  let cpStr;
  if (collisionP === 0) cpStr = '~0';
  else if (collisionP < 1e-15) cpStr = '< 10⁻¹⁵';
  else cpStr = collisionP.toExponential(2);

  $('#stats').innerHTML = `
    <div class="stat">${t('entropy')}: <b>${totalBits.toFixed(1)} bits</b> ${t('perId')}</div>
    <div class="stat">${t('collisionProb')}: <b>${cpStr}</b> (${count} IDs)</div>
    <div class="stat">Alphabet: <b>${alphabet.length} chars</b></div>`;
}

$('#size').addEventListener('input', e => { $('#size-val').textContent = e.target.value; generate(); });
$('#count').addEventListener('input', generate);
$('#alphabet').addEventListener('input', generate);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>`;

generate();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🔑', href:'/dev/password-strength-meter.html', name:'Password Strength'},
    {icon:'🔏', href:'/dev/hmac.html', name:'HMAC Generator'},
  ]
});
</script>
