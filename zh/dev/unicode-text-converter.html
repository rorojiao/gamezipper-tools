function convert(text, map) {
  return [...text].map(c => map[c] || c).join('');
}

function update() {
  const text = $('#input').value || '';
  const grid = $('#styleGrid');
  grid.innerHTML = '';
  STYLES.forEach(s => {
    const result = convert(text, MAPS[s.key]);
    const card = document.createElement('div');
    card.className = 'style-card';
    card.innerHTML = `<span class="style-label">${s.name}</span><span class="style-output">${result || '—'}</span><button class="gz-btn gz-btn-sm" data-copy="${encodeURIComponent(result)}">${t('copy')}</button>`;
    card.querySelector('button').addEventListener('click', function() {
      copyText(decodeURIComponent(this.dataset.copy));
    });
    grid.appendChild(card);
  });
}

$('#input').addEventListener('input', update);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='Hello World!';update()">${t('example')}</button>
