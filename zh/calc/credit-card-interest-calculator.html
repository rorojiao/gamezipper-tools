<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-cc-form" id="form">
      <label id="lbl-balance">Credit Card Balance ($)
        <input type="number" id="balance" min="0" step="100" placeholder="5000">
      </label>
      <label id="lbl-apr">Annual Percentage Rate (APR %)
        <input type="number" id="apr" min="0" max="100" step="0.1" placeholder="18.9">
      </label>
      <label id="lbl-payment">Monthly Payment ($)
        <input type="number" id="payment" min="0" step="10" placeholder="200">
      </label>
    </div>
    <div class="gz-cc-presets" id="presets"></div>
    <div class="gz-cc-result" id="result" style="display:none">
      <div class="gz-cc-monthly" id="monthsToPayoff">—</div>
      <div id="payoffMessage"></div>
      <div class="gz-cc-breakdown">
        <div class="gz-cc-bar" id="paymentBar" style="--principal-pct:70%"></div>
        <div class="gz-cc-bar-labels">
          <span id="principalLabel">Principal: —</span>
          <span id="interestLabel">Interest: —</span>
        </div>
      </div>
      <div class="gz-cc-summary" id="summary"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Credit Card Interest Calculator',
    toolDesc: "Calculate how much interest you'll pay and how long to pay off your credit card. See the impact of different monthly payments.",
    calculate: 'Calculate',
    clear: 'Clear',
    balance: 'Credit Card Balance ($)',
    apr: 'Annual Percentage Rate (APR %)',
    payment: 'Monthly Payment ($)',
    monthsToPayoff: 'Months to Pay Off',
    totalInterest: 'Total Interest',
    totalPaid: 'Total Amount Paid',
    payoffInYears: 'Payoff in',
    payoffInMonths: 'months',
    neverPayoff: '⚠️ Never pays off - increase payment',
    principal: 'Principal',
    interest: 'Interest',
    minimumPayment: 'Minimum Payment',
    recommendedPayment: 'Recommended Payment',
    aggressivePayment: 'Aggressive Payment',
    step1: 'Enter your credit card balance',
    step2: 'Enter your APR (found on your statement)',
    step3: 'Enter your monthly payment amount',
    step4: 'See total interest and payoff time - adjust payment to save',
  },
  zh: {
    toolTitle: '信用卡利息计算器',
    toolDesc: '计算信用卡还款利息和还清时间。查看不同月供的影响，了解如何节省利息。',
    calculate: '计算',
    clear: '清除',
    balance: '信用卡余额 ($)',
    apr: '年利率 (APR %)',
    payment: '月供金额 ($)',
    monthsToPayoff: '还清月数',
    totalInterest: '总利息',
    totalPaid: '总还款额',
    payoffInYears: '还清需',
    payoffInMonths: '个月',
    neverPayoff: '⚠️ 无法还清 - 需增加月供',
    principal: '本金',
    interest: '利息',
    minimumPayment: '最低还款',
    recommendedPayment: '推荐还款',
    aggressivePayment: '积极还款',
    step1: '输入信用卡余额',
    step2: '输入年利率(在账单上找到)',
    step3: '输入月供金额',
    step4: '查看总利息和还清时间 - 调整月供以节省',
  }
});

const { $, t } = GZ;

function calculateCreditCard() {
  const balance = parseFloat($('#balance').value);
  const apr = parseFloat($('#apr').value);
  const payment = parseFloat($('#payment').value);
  
  if (!balance || balance <= 0) {
    $('#result').style.display = 'none';
    return;
  }
  
  const monthlyRate = (apr || 0) / 100 / 12;
  const monthlyPayment = payment || 0;
  
  if (monthlyPayment <= 0) {
    $('#result').style.display = 'none';
    return;
  }
  
  // Check if payment covers monthly interest
  const monthlyInterest = balance * monthlyRate;
  if (monthlyPayment <= monthlyInterest && balance > 0) {
    $('#monthsToPayoff').textContent = '∞';
    $('#payoffMessage').innerHTML = `<div class="gz-cc-warning">${t('neverPayoff')}</div>`;
    $('#principalLabel').textContent = `${t('principal')}: $${balance.toLocaleString()}`;
    $('#interestLabel').textContent = `${t('interest')}: Never ends`;
    $('#paymentBar').style.setProperty('--principal-pct', '50%');
    $('#summary').innerHTML = '';
    $('#result').style.display = 'block';
    return;
  }
  
  // Calculate payoff time and total interest
  let remainingBalance = balance;
  let totalInterest = 0;
  let months = 0;
  const maxMonths = 600; // 50 years cap
  
  while (remainingBalance > 0.01 && months < maxMonths) {
    const interestPayment = remainingBalance * monthlyRate;
    const principalPayment = monthlyPayment - interestPayment;
    
    totalInterest += interestPayment;
    remainingBalance -= principalPayment;
    
    if (remainingBalance < 0) {
      totalInterest += remainingBalance * monthlyRate; // Adjust final month
      remainingBalance = 0;
    }
    
    months++;
  }
  
  const totalPaid = balance + totalInterest;
  const years = Math.floor(months / 12);
  const remainingMonths = months % 12;
  
  $('#monthsToPayoff').textContent = months + ' ' + t('payoffInMonths');
  
  let payoffTimeStr = '';
  if (years > 0) {
    payoffTimeStr = `${t('payoffInYears')} ${years} year${years > 1 ? 's' : ''}`;
    if (remainingMonths > 0) payoffTimeStr += ` ${remainingMonths} month${remainingMonths > 1 ? 's' : ''}`;
  } else {
    payoffTimeStr = `${months} month${months > 1 ? 's' : ''}`;
  }
  
  const isGoodPayoff = months <= 24;
  $('#payoffMessage').innerHTML = `
    <div class="${isGoodPayoff ? 'gz-cc-success' : 'gz-cc-warning'}">
      ${payoffTimeStr} • ${totalInterest > balance ? 'Interest > Principal!' : ' manageable'}
    </div>
  `;
  
  const principalPct = (balance / totalPaid) * 100;
  $('#principalLabel').textContent = `${t('principal')}: $${balance.toLocaleString()} (${principalPct.toFixed(1)}%)`;
  $('#interestLabel').textContent = `${t('interest')}: $${totalInterest.toLocaleString()} (${(100 - principalPct).toFixed(1)}%)`;
  $('#paymentBar').style.setProperty('--principal-pct', principalPct + '%');
  
  $('#summary').innerHTML = `
    <div class="gz-cc-summary-item">
      <strong>${months}</strong>
      <span>${t('monthsToPayoff')}</span>
    </div>
    <div class="gz-cc-summary-item">
      <strong>$${totalInterest.toLocaleString()}</strong>
      <span>${t('totalInterest')}</span>
    </div>
    <div class="gz-cc-summary-item">
      <strong>$${totalPaid.toLocaleString()}</strong>
      <span>${t('totalPaid')}</span>
    </div>
  `;
  
  $('#result').style.display = 'block';
}

function setPreset(type) {
  const balance = parseFloat($('#balance').value) || 5000;
  const apr = parseFloat($('#apr').value) || 18.9;
  
  let payment;
  switch(type) {
    case 'minimum':
      payment = Math.max(balance * 0.02, 25); // Typical minimum: 2% or $25
      break;
    case 'recommended':
      payment = balance * 0.05; // 5% of balance
      break;
    case 'aggressive':
      payment = balance * 0.10; // 10% of balance
      break;
  }
  
  $('#payment').value = Math.round(payment);
  calculateCreditCard();
}

function doClear() {
  $('#balance').value = '';
  $('#apr').value = '';
  $('#payment').value = '';
  $('#result').style.display = 'none';
}

$('#balance').addEventListener('input', calculateCreditCard);
$('#apr').addEventListener('input', calculateCreditCard);
$('#payment').addEventListener('input', calculateCreditCard);

const presets = [
  { type: 'minimum', label: t('minimumPayment') },
  { type: 'recommended', label: t('recommendedPayment') },
  { type: 'aggressive', label: t('aggressivePayment') },
];

$('#presets').innerHTML = presets.map(p => `
  <button class="gz-cc-preset-btn" onclick="setPreset('${p.type}')">${p.label}</button>
`).join('');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculateCreditCard()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💳', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'📊', href:'/calc/debt-payoff-calculator.html', name:'Debt Payoff'},
    {icon:'💰', href:'/calc/minimum-payment-calculator.html', name:'Minimum Payment'},
    {icon:'🎯', href:'/calc/interest-calculator.html', name:'Interest Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
