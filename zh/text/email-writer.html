  <div class="gz-tool-area">

    <div class="gz-split">

<script>
GZI18n.register({
  en: {
    toolTitle: 'AI Email Writer',
    toolDesc: 'Generate professional email drafts instantly from templates. Choose a type, fill in details, and copy — free, private, runs in your browser.',
    formal: 'Formal', friendly: 'Friendly', casual: 'Casual', professional: 'Professional', direct: 'Direct',
    genEmail: 'Generate Email',
    copy: 'Copy',
    clear: 'Clear',
    lblOut: 'Generated Email',
    step1: 'Select an email template type',
    step2: 'Fill in the recipient, subject and key details',
    step3: 'Choose a tone and click Generate',
    step4: 'Copy the draft and personalize as needed',
    templates: {business:'Business',followup:'Follow-up',thankyou:'Thank You',apology:'Apology',invitation:'Invitation',meeting:'Meeting Request',cold:'Cold Outreach',resignation:'Resignation',complaint:'Complaint',congrats:'Congratulations',introduction:'Introduction',request:'Request'},
    labels: {recipient:'Recipient name',sender:'Your name',subject:'Subject / Topic',details:'Key details or talking points',company:'Company (optional)',position:'Position (optional)'},
    placeholder: {recipient:'e.g. John',sender:'e.g. Sarah',subject:'e.g. Project Update Q2',details:'What do you want to say? List key points...',company:'e.g. Acme Corp',position:'e.g. Marketing Manager'},
  },
  zh: {
    toolTitle: 'AI 邮件撰写器',
    toolDesc: '从模板即时生成专业邮件草稿。选择类型、填写详情、复制使用 — 免费、私密、浏览器本地运行。',
    formal: '正式', friendly: '友好', casual: '随意', professional: '专业', direct: '直接',
    genEmail: '生成邮件',
    copy: '复制',
    clear: '清空',
    lblOut: '生成的邮件',
    step1: '选择邮件模板类型',
    step2: '填写收件人、主题和关键信息',
    step3: '选择语气并点击生成',
    step4: '复制草稿并根据需要个性化修改',
    templates: {business:'商务邮件',followup:'跟进邮件',thankyou:'感谢信',apology:'道歉信',invitation:'邀请函',meeting:'会议邀请',cold:'陌生开发',resignation:'辞职信',complaint:'投诉信',congrats:'祝贺信',introduction:'自我介绍',request:'请求信'},
    labels: {recipient:'收件人姓名',sender:'您的姓名',subject:'主题/话题',details:'关键要点或要说的内容',company:'公司名（可选）',position:'职位（可选）'},
    placeholder: {recipient:'例如：小明',sender:'例如：小红',subject:'例如：第二季度项目更新',details:'您想说什么？列出要点...',company:'例如：某某公司',position:'例如：市场经理'},
  }
});

const { $, copyText, t } = GZ;
let currentTmpl = 'business';
let currentTone = 'professional';

const tones = ['formal','friendly','casual','professional','direct'];

// Tone row
const toneRow = $('#tone-row');
tones.forEach(tone => {
  const chip = document.createElement('span');
  chip.className = 'tone-chip' + (tone === currentTone ? ' active' : '');
  chip.textContent = t(tone);
  chip.onclick = () => {
    toneRow.querySelectorAll('.tone-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentTone = tone;
  };
  toneRow.appendChild(chip);
});

// Template grid
const tmplGrid = document.createElement('div');
tmplGrid.className = 'tmpl-grid';
Object.keys(t('templates')).forEach(key => {
  const btn = document.createElement('div');
  btn.className = 'tmpl-btn' + (key === currentTmpl ? ' active' : '');
  btn.textContent = t('templates')[key];
  btn.onclick = () => {
    tmplGrid.querySelectorAll('.tmpl-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTmpl = key;
  };
  tmplGrid.appendChild(btn);
});
$('#tmpl-area').appendChild(tmplGrid);

// Form fields
const fields = ['recipient','sender','subject','details','company','position'];
const formArea = $('#form-area');
fields.forEach(f => {
  const div = document.createElement('div');
  div.className = 'form-group';
  const label = document.createElement('label');
  label.textContent = t('labels')[f];
  const el = f === 'details' ? document.createElement('textarea') : document.createElement('input');
  el.id = 'field-' + f;
  el.placeholder = t('placeholder')[f] || '';
  div.appendChild(label);
  div.appendChild(el);
  formArea.appendChild(div);
});

function val(id) { return document.getElementById(id)?.value?.trim() || ''; }

// Email generation templates
const greetings = {
  formal: r => `Dear ${r},`,
  friendly: r => `Hi ${r}!`,
  casual: r => `Hey ${r},`,
  professional: r => `Dear ${r},`,
  direct: r => `${r},`
};

const closings = {
  formal: 'Sincerely',
  friendly: 'Best wishes',
  casual: 'Cheers',
  professional: 'Best regards',
  direct: 'Regards'
};

function generateEmail() {
  const recipient = val('field-recipient') || 'Recipient';
  const sender = val('field-sender') || 'Sender';
  const subject = val('field-subject') || 'General Inquiry';
  const details = val('field-details') || '';
  const company = val('field-company');
  const position = val('field-position');

  const greeting = greetings[currentTone](recipient);
  const closing = closings[currentTone];

  const bodies = {
    business: () => {
      let body = `I hope this message finds you well.\n\n`;
      body += `I am writing to discuss ${subject.toLowerCase()}.`;
      if (details) body += ` Specifically, I would like to address the following:\n\n${details.split('\n').map(l => '• ' + l).join('\n')}`;
      body += `\n\nI would appreciate the opportunity to discuss this further at your convenience. Please let me know a suitable time to connect.`;
      if (company) body += `\n\nPlease don't hesitate to reach out if you need any additional information from ${company}.`;
      return body;
    },
    followup: () => {
      let body = `I hope you're doing well.\n\n`;
      body += `I wanted to follow up on our previous conversation regarding ${subject.toLowerCase()}.`;
      if (details) body += ` Here's a quick update:\n\n${details.split('\n').map(l => '• ' + l).join('\n')}`;
      body += `\n\nI'd love to hear your thoughts on the next steps. Would you be available for a brief call this week?`;
      return body;
    },
    thankyou: () => {
      let body = `Thank you so much for ${subject.toLowerCase()}.`;
      if (details) body += ` I truly appreciate ${details}.`;
      body += `\n\nYour support and generosity mean a great deal to me${company ? ' and the team at ' + company : ''}. I look forward to staying in touch.`;
      return body;
    },
    apology: () => {
      let body = `I sincerely apologize for ${subject.toLowerCase()}.`;
      if (details) body += ` I understand the inconvenience caused by ${details}.`;
      body += `\n\nI take full responsibility and want to assure you that I am taking steps to prevent this from happening again. Please let me know how I can make this right.`;
      return body;
    },
    invitation: () => {
      let body = `I would like to cordially invite you to ${subject.toLowerCase()}.`;
      if (details) body += `\n\nEvent details:\n${details.split('\n').map(l => '• ' + l).join('\n')}`;
      body += `\n\nPlease let me know if you can attend. I look forward to seeing you there!`;
      return body;
    },
    meeting: () => {
      let body = `I would like to request a meeting regarding ${subject.toLowerCase()}.`;
      if (details) body += `\n\nAgenda items:\n${details.split('\n').map(l => '• ' + l).join('\n')}`;
      body += `\n\nCould you please let me know your availability this week? I'm flexible on timing and can accommodate your schedule.`;
      return body;
    },
    cold: () => {
      let body = `My name is ${sender}${position ? ', ' + position : ''}${company ? ' at ' + company : ''}. I came across your work and was impressed by what you're doing.\n\n`;
      body += `I'd love to discuss ${subject.toLowerCase()} with you.`;
      if (details) body += ` Here's why I think this could be valuable:\n\n${details.split('\n').map(l => '• ' + l).join('\n')}`;
      body += `\n\nWould you be open to a brief 15-minute call? I'm happy to work around your schedule.`;
      return body;
    },
    resignation: () => {
      let body = `Please accept this letter as formal notice of my resignation from my position${position ? ' as ' + position : ''}${company ? ' at ' + company : ''}, effective two weeks from today.\n\n`;
      body += `I am grateful for the opportunities and experiences I've gained during my time here.`;
      if (details) body += ` ${details}`;
      body += `\n\nI am committed to ensuring a smooth transition and will do everything I can to hand over my responsibilities effectively.`;
      return body;
    },
    complaint: () => {
      let body = `I am writing to express my dissatisfaction regarding ${subject.toLowerCase()}.`;
      if (details) body += `\n\nThe specific issues I encountered:\n\n${details.split('\n').map(l => '• ' + l).join('\n')}`;
      body += `\n\nI expect a prompt resolution to this matter. Please respond within 7 business days with your proposed solution.`;
      return body;
    },
    congrats: () => {
      let body = `Congratulations on ${subject.toLowerCase()}! This is a remarkable achievement.`;
      if (details) body += ` ${details}`;
      body += `\n\nYour hard work and dedication have truly paid off. Wishing you continued success in all your future endeavors!`;
      return body;
    },
    introduction: () => {
      let body = `My name is ${sender}${position ? ', ' + position : ''}${company ? ' at ' + company : ''}. I wanted to reach out and introduce myself.\n\n`;
      body += `I'm currently focused on ${subject.toLowerCase()}.`;
      if (details) body += ` A bit more about me and my interests:\n\n${details.split('\n').map(l => '• ' + l).join('\n')}`;
      body += `\n\nI'd love to connect and learn more about your work as well. Feel free to reach out anytime!`;
      return body;
    },
    request: () => {
      let body = `I am writing to request ${subject.toLowerCase()}.`;
      if (details) body += ` Here are the details:\n\n${details.split('\n').map(l => '• ' + l).join('\n')}`;
      body += `\n\nI would greatly appreciate your assistance with this matter. Please let me know if you need any further information from my side.`;
      return body;
    }
  };

  const bodyFn = bodies[currentTmpl] || bodies.business;
  const body = bodyFn();

  let email = `Subject: ${subject}\n\n`;
  email += `${greeting}\n\n`;
  email += `${body}\n\n`;
  email += `${closing},\n${sender}`;
  if (company) email += `\n${company}`;
  if (position) email += `\n${position}`;

  $('#output').textContent = email;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generateEmail()">${t('genEmail')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#output').textContent=''">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📧', href:'/text/email-signature.html', name:'Email Signature'},
    {icon:'✉️', href:'/text/cover-letter-generator.html', name:'Cover Letter'},
    {icon:'📝', href:'/text/email-template.html', name:'Email Template'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
