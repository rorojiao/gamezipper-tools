const { $, copyText, t } = GZ;

// Hex helpers
const enc = new TextEncoder();
const dec8 = new TextDecoder();
function bytesToHex(b) { return [...new Uint8Array(b)].map(x => x.toString(16).padStart(2,'0')).join(''); }
function hexToBytes(h) {
  if (h.length % 2) throw new Error('odd length');
  const u = new Uint8Array(h.length / 2);
  for (let i = 0; i < u.length; i++) u[i] = parseInt(h.substr(i*2,2), 16);
  return u;
}

async function deriveKey(pw, bits) {
  const salt = enc.encode('gamezipper-aes-salt-v1');
  const baseKey = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    {name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256'},
    baseKey,
    {name: 'AES-CBC', length: bits}, // length must match target, but CBC requires 16-byte block; deriveKey will succeed for any AES length
    false,
    ['encrypt','decrypt']
  );
}

async function getKey() {
  const bits = +$('#keySize').value;
  const src = $('#keySource').value;
  if (src === 'hex') {
    const exp = bits / 4; // hex chars
    const hex = $('#keyHex').value.trim();
    if (hex.length !== exp) { throw new Error(`${t('keySizeErr')} ${exp} ${t('charsLong')}`); }
    return crypto.subtle.importKey('raw', hexToBytes(hex), {name: 'AES-CBC', length: bits}, false, ['encrypt','decrypt']);
  }
  const pw = $('#password').value;
  if (!pw) throw new Error('password required');
  return deriveKey(pw, bits);
}

async function encrypt() {
  try {
    const bits = +$('#keySize').value;
    const mode = $('#mode').value;
    const key = await getKey();
    const iv = crypto.getRandomValues(new Uint8Array(16));
    const algo = {name: mode === 'ECB' ? 'AES-ECB' : `AES-${mode}`, iv: mode === 'ECB' ? undefined : iv, length: bits};
    // re-import key with correct algo (deriveKey imported for CBC; for others we re-derive)
    let realKey = key;
    if (mode !== 'CBC') {
      // re-derive / re-import with proper algorithm metadata
      const src = $('#keySource').value;
      if (src === 'hex') {
        realKey = await crypto.subtle.importKey('raw', hexToBytes($('#keyHex').value.trim()), {name: `AES-${mode}`, length: bits}, false, ['encrypt','decrypt']);
      } else {
        realKey = await deriveKey($('#password').value, bits);
        // need to re-import as AES-<mode>
        // simpler: derive with a generic AES and re-import
        const raw = await crypto.subtle.exportKey('raw', key).catch(() => null);
        if (!raw) {
          // can't export; re-derive via PBKDF2
          const salt = enc.encode('gamezipper-aes-salt-v1');
          const base = await crypto.subtle.importKey('raw', enc.encode($('#password').value), 'PBKDF2', false, ['deriveBits']);
          const bitsRaw = await crypto.subtle.deriveBits({name:'PBKDF2', salt, iterations:100000, hash:'SHA-256'}, base, bits);
          realKey = await crypto.subtle.importKey('raw', bitsRaw, {name: `AES-${mode}`, length: bits}, false, ['encrypt','decrypt']);
        } else {
          realKey = await crypto.subtle.importKey('raw', raw, {name: `AES-${mode}`, length: bits}, false, ['encrypt','decrypt']);
        }
      }
    }
    const ct = await crypto.subtle.encrypt(algo, realKey, enc.encode($('#plaintext').value));
    $('#ciphertext').value = bytesToHex(ct);
    $('#ivOut').textContent = bytesToHex(iv);
    $('#encStatus').textContent = t('ok');
    $('#encStatus').className = 'status ok';
  } catch(e) { $('#encStatus').textContent = `${t('err')}: ${e.message}`; $('#encStatus').className = 'status err'; }
}

async function decrypt() {
  try {
    const bits = +$('#keySize').value;
    const mode = $('#mode').value;
    const ctHex = $('#ciphertextIn').value.trim();
    const ivHex = $('#ivHex').value.trim();
    if (!ctHex) throw new Error('ciphertext required');
    if (mode !== 'ECB' && (!ivHex || ivHex.length !== 32)) throw new Error('IV must be 32 hex chars (16 bytes)');
    const src = $('#keySource').value;
    let realKey;
    if (src === 'hex') {
      const exp = bits / 4;
      const hex = $('#keyHex').value.trim();
      if (hex.length !== exp) throw new Error(`${t('keySizeErr')} ${exp} ${t('charsLong')}`);
      realKey = await crypto.subtle.importKey('raw', hexToBytes(hex), {name: `AES-${mode}`, length: bits}, false, ['decrypt']);
    } else {
      const pw = $('#password').value;
      if (!pw) throw new Error('password required');
      const salt = enc.encode('gamezipper-aes-salt-v1');
      const base = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveBits']);
      const bitsRaw = await crypto.subtle.deriveBits({name:'PBKDF2', salt, iterations:100000, hash:'SHA-256'}, base, bits);
      realKey = await crypto.subtle.importKey('raw', bitsRaw, {name: `AES-${mode}`, length: bits}, false, ['decrypt']);
    }
    const algo = {name: `AES-${mode}`, iv: mode === 'ECB' ? undefined : hexToBytes(ivHex)};
    const pt = await crypto.subtle.decrypt(algo, realKey, hexToBytes(ctHex));
    $('#plaintextOut').value = dec8.decode(pt);
    $('#decStatus').textContent = t('ok');
    $('#decStatus').className = 'status ok';
  } catch(e) { $('#decStatus').textContent = `${t('err')}: ${e.message}`; $('#decStatus').className = 'status err'; }
}
