.emi-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:14px}
@media(max-width:820px){.emi-grid{grid-template-columns:1fr}}
.emi-card{background:var(--glass2);border:1px solid var(--border);border-radius:14px;padding:18px}
.emi-card h3{font-size:1rem;color:var(--accent);margin-bottom:14px}
.emi-field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.emi-field label{font-size:.82rem;font-weight:600;color:var(--text2);display:flex;justify-content:space-between}
.emi-field label .val{color:var(--accent);font-family:monospace}
.emi-field input[type=range]{width:100%;accent-color:var(--accent)}
.emi-field input[type=number]{padding:9px 11px;border-radius:9px;border:1px solid var(--border);background:var(--glass);color:var(--text);font-size:.95em}
.emi-result{background:linear-gradient(135deg,rgba(0,214,114,.16),rgba(97,175,239,.12));border:1px solid var(--border);border-radius:14px;padding:22px;text-align:center;margin-bottom:14px}
.emi-result .big{font-size:2.3rem;font-weight:700;color:#00d672;font-family:'SF Mono',Consolas,monospace}
.emi-result .sub{font-size:.85rem;color:var(--text2);margin-top:4px}
.emi-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:14px}
.emi-stats .stat{background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.emi-stats .stat .num{font-size:1.15rem;font-weight:700;color:var(--text);font-family:monospace}
.emi-stats .stat .lbl{font-size:.74rem;color:var(--text3);margin-top:4px}
.emi-toggle{display:flex;gap:8px;margin-bottom:12px}
.emi-toggle button{flex:1;padding:8px;border:1px solid var(--border);border-radius:9px;background:var(--glass);color:var(--text2);cursor:pointer;font-size:.85em;font-weight:600;font-family:inherit}
.emi-toggle button.active{background:var(--accent);color:#fff;border-color:transparent}
.emi-table{width:100%;border-collapse:collapse;font-size:.83em;margin-top:12px}
.emi-table th{text-align:left;padding:7px 9px;border-bottom:1px solid var(--border);color:var(--text2);font-size:.78em;text-transform:uppercase}
.emi-table td{padding:7px 9px;border-bottom:1px solid var(--border);font-family:monospace}
.emi-table-wrap{max-height:340px;overflow:auto;border:1px solid var(--border);border-radius:10px}
</style>

<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is an EMI?","acceptedAnswer":{"@type":"Answer","text":"EMI stands for Equated Monthly Installment — the fixed amount you pay every month to repay a loan. Each EMI covers part of the principal and part of the interest, so the loan is fully paid off by the end of the tenure."}},{"@type":"Question","name":"How is EMI calculated?","acceptedAnswer":{"@type":"Answer","text":"EMI = P × r × (1+r)^n / ((1+r)^n − 1), where P is the loan amount, r is the monthly interest rate (annual rate divided by 12 and by 100), and n is the loan tenure in months."}},{"@type":"Question","name":"What happens if the interest rate is 0%?","acceptedAnswer":{"@type":"Answer","text":"Some car and appliance loans offer 0% interest. In that case the EMI is simply the loan amount divided by the number of months — there is no interest component."}},{"@type":"Question","name":"Can I see the amortization schedule?","acceptedAnswer":{"@type":"Answer","text":"Yes. Toggle the schedule on to see a month-by-month breakdown of principal paid, interest paid and remaining balance for the entire loan tenure."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="emi-result">
      <div class="big" id="emi-big">$0</div>
      <div class="sub" id="emi-sub"></div>
    </div>
    <div class="emi-stats">
      <div class="stat"><div class="num" id="st-principal">$0</div><div class="lbl" id="st-lbl-p"></div></div>
      <div class="stat"><div class="num" id="st-interest">$0</div><div class="lbl" id="st-lbl-i"></div></div>
      <div class="stat"><div class="num" id="st-total">$0</div><div class="lbl" id="st-lbl-t"></div></div>
    </div>
    <div class="emi-grid">
      <div class="emi-card">
        <h3 id="card-loan"></h3>
        <div class="emi-field">
          <label><span id="lb-amount"></span><span class="val" id="val-amount"></span></label>
          <input type="range" id="amount" min="1000" max="2000000" step="1000" value="250000">
          <input type="number" id="amount-num" min="0" step="1000" value="250000">
        </div>
        <div class="emi-field">
          <label><span id="lb-rate"></span><span class="val" id="val-rate"></span></label>
          <input type="range" id="rate" min="0" max="36" step="0.05" value="8.5">
          <input type="number" id="rate-num" min="0" step="0.05" value="8.5">
        </div>
      </div>
      <div class="emi-card">
        <h3 id="card-term"></h3>
        <div class="emi-field">
          <label><span id="lb-tenure"></span><span class="val" id="val-tenure"></span></label>
          <input type="range" id="tenure" min="1" max="360" step="1" value="60">
        </div>
        <div class="emi-field">
          <label><span id="lb-currency"></span></label>
          <input type="text" id="currency" value="$" maxlength="3">
        </div>
        <div class="emi-toggle">
          <button id="unit-month" class="active"></button>
          <button id="unit-year"></button>
        </div>
      </div>
    </div>
    <div class="emi-toggle" style="margin-top:14px">
      <button id="show-schedule"></button>
    </div>
    <div class="emi-table-wrap" id="schedule-wrap" style="display:none">
      <table class="emi-table">
        <thead><tr><th id="th-month"></th><th id="th-emi"></th><th id="th-prin"></th><th id="th-int"></th><th id="th-bal"></th></tr></thead>
        <tbody id="schedule-body"></tbody>
      </table>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'EMI Calculator',
    toolDesc: 'Calculate your monthly loan EMI, total interest and full amortization schedule. Enter amount, interest rate and tenure for home, car or personal loans. Free, private, browser-only.',
    emiSub: 'Monthly installment',
    cardLoan: 'Loan',
    cardTerm: 'Term & Currency',
    lbAmount: 'Loan amount',
    lbRate: 'Interest rate (annual %)',
    lbTenure: 'Tenure',
    lbCurrency: 'Currency symbol',
    unitMonth: 'Months', unitYear: 'Years',
    showSchedule: 'Show amortization schedule',
    hideSchedule: 'Hide schedule',
    stLblP: 'Principal', stLblI: 'Total interest', stLblT: 'Total payment',
    thMonth: 'Month', thEmi: 'EMI', thPrin: 'Principal', thInt: 'Interest', thBal: 'Balance',
    months: 'months', years: 'years',
    step1: 'Enter your loan amount and annual interest rate',
    step2: 'Set the loan tenure in months or years',
    step3: 'Read your monthly EMI, total interest and total payment',
    step4: 'Open the amortization schedule to see month-by-month breakdown',
  },
  zh: {
    toolTitle: '等额本息（EMI）贷款计算器',
    toolDesc: '计算每月还款额（EMI）、总利息和完整还款计划。输入金额、利率和期限，适用于房贷、车贷和个人贷款。免费、私密、浏览器本地运行。',
    emiSub: '每月还款额',
    cardLoan: '贷款',
    cardTerm: '期限与货币',
    lbAmount: '贷款金额',
    lbRate: '年利率 (%)',
    lbTenure: '期限',
    lbCurrency: '货币符号',
    unitMonth: '月', unitYear: '年',
    showSchedule: '显示还款计划',
    hideSchedule: '隐藏还款计划',
    stLblP: '本金', stLblI: '总利息', stLblT: '总还款',
    thMonth: '期数', thEmi: '月供', thPrin: '本金', thInt: '利息', thBal: '余额',
    months: '个月', years: '年',
    step1: '输入贷款金额和年利率',
    step2: '设置贷款期限（月或年）',
    step3: '查看每月月供、总利息和总还款',
    step4: '打开还款计划查看每月明细',
  }
});

const { $, t } = GZ;
let tenureUnit = 'month'; // month | year

function fmtMoney(n, cur) {
  if (!isFinite(n)) return cur + '0';
  return cur + n.toLocaleString(undefined, { maximumFractionDigits: 0 });
}

function calc() {
  const cur = $('#currency').value.slice(0, 3) || '$';
  const P = Math.max(0, parseFloat($('#amount').value) || 0);
  const annualRate = Math.max(0, parseFloat($('#rate').value) || 0);
  const rawTenure = Math.max(1, parseInt($('#tenure').value) || 1);
  const n = tenureUnit === 'year' ? rawTenure * 12 : rawTenure;
  const r = annualRate / 12 / 100;

  // sync display
  $('#val-amount').textContent = fmtMoney(P, cur);
  $('#val-rate').textContent = annualRate.toFixed(2) + '%';
  $('#val-tenure').textContent = rawTenure + ' ' + (tenureUnit === 'year' ? t('years') : t('months'));

  let emi;
  if (r === 0) emi = P / n;
  else emi = P * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1);

  const totalPayment = emi * n;
  const totalInterest = totalPayment - P;

  $('#emi-big').textContent = fmtMoney(emi, cur);
  $('#emi-sub').textContent = t('emiSub');
  $('#st-principal').textContent = fmtMoney(P, cur);
  $('#st-interest').textContent = fmtMoney(totalInterest, cur);
  $('#st-total').textContent = fmtMoney(totalPayment, cur);

  buildSchedule(P, r, emi, n, cur);
}

function buildSchedule(P, r, emi, n, cur) {
  const body = $('#schedule-body');
  body.innerHTML = '';
  let bal = P;
  for (let m = 1; m <= n; m++) {
    const interest = bal * r;
    let principal = emi - interest;
    if (principal > bal) principal = bal;
    bal -= principal;
    if (bal < 0.005) bal = 0;
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${m}</td><td>${fmtMoney(emi, cur)}</td><td>${fmtMoney(principal, cur)}</td><td>${fmtMoney(interest, cur)}</td><td>${fmtMoney(bal, cur)}</td>`;
    body.appendChild(tr);
    if (bal <= 0) break;
  }
}

// sync sliders and number inputs
function bind(rangeId, numId) {
  const r = $('#' + rangeId), n = $('#' + numId);
  r.addEventListener('input', () => { n.value = r.value; calc(); });
  n.addEventListener('input', () => { r.value = n.value; calc(); });
}
bind('amount', 'amount-num');
bind('rate', 'rate-num');
$('#tenure').addEventListener('input', calc);
$('#currency').addEventListener('input', calc);

$('#unit-month').addEventListener('click', () => {
  tenureUnit = 'month';
  $('#unit-month').classList.add('active');
  $('#unit-year').classList.remove('active');
  // adapt slider range
  $('#tenure').min = 1; $('#tenure').max = 360;
  calc();
});
$('#unit-year').addEventListener('click', () => {
  tenureUnit = 'year';
  $('#unit-year').classList.add('active');
  $('#unit-month').classList.remove('active');
  $('#tenure').min = 1; $('#tenure').max = 30;
  calc();
});

$('#show-schedule').addEventListener('click', () => {
  const wrap = $('#schedule-wrap');
  const btn = $('#show-schedule');
  if (wrap.style.display === 'none') {
    wrap.style.display = '';
    btn.textContent = t('hideSchedule');
    btn.classList.add('active');
  } else {
    wrap.style.display = 'none';
    btn.textContent = t('showSchedule');
    btn.classList.remove('active');
  }
});

// Labels
$('#card-loan').textContent = t('cardLoan');
$('#card-term').textContent = t('cardTerm');
$('#lb-amount').textContent = t('lbAmount');
$('#lb-rate').textContent = t('lbRate');
$('#lb-tenure').textContent = t('lbTenure');
$('#lb-currency').textContent = t('lbCurrency');
$('#unit-month').textContent = t('unitMonth');
$('#unit-year').textContent = t('unitYear');
$('#show-schedule').textContent = t('showSchedule');
$('#st-lbl-p').textContent = t('stLblP');
$('#st-lbl-i').textContent = t('stLblI');
$('#st-lbl-t').textContent = t('stLblT');
$('#th-month').textContent = t('thMonth');
$('#th-emi').textContent = t('thEmi');
$('#th-prin').textContent = t('thPrin');
$('#th-int').textContent = t('thInt');
$('#th-bal').textContent = t('thBal');

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏠', href:'/calc/mortgage-calculator.html', name:'Mortgage Calculator'},
    {icon:'🚗', href:'/calc/car-loan-calculator.html', name:'Car Loan'},
    {icon:'📈', href:'/calc/compound-interest-calculator.html', name:'Compound Interest'},
    {icon:'💳', href:'/calc/credit-card-payoff-calculator.html', name:'Credit Card Payoff'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
