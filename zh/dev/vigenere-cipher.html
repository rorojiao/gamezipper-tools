const { $, copyText, t } = GZ;
let mode = 'enc';

function setMode(m){
  mode = m;
  $('#mode-enc').className = m === 'enc' ? 'gz-btn' : 'gz-btn gz-btn-secondary';
  $('#mode-dec').className = m === 'dec' ? 'gz-btn' : 'gz-btn gz-btn-secondary';
  $('#mode-enc').textContent = t('encrypt');
  $('#mode-dec').textContent = t('decrypt');
  doProcess();
}

// Vigenère core: shift by key, preserving case and passing through non-letters
function vigenere(text, key, decrypt){
  // Expand key into shift stream of letters only (preserve order, skip non-letters in key)
  const shifts = [];
  for (const ch of key.toUpperCase()){
    const c = ch.charCodeAt(0);
    if (c >= 65 && c <= 90) shifts.push(c - 65);
  }
  if (shifts.length === 0) return null;
  let ki = 0;
  let out = '';
  for (const ch of text){
    const cc = ch.charCodeAt(0);
    let base = -1;
    if (cc >= 65 && cc <= 90) base = 65;       // A-Z
    else if (cc >= 97 && cc <= 122) base = 97;  // a-z
    if (base < 0){ out += ch; continue; }
    let shift = shifts[ki % shifts.length];
    if (decrypt) shift = -shift;
    let v = (cc - base + shift) % 26;
    if (v < 0) v += 26;
    out += String.fromCharCode(base + v);
    ki++;
  }
  return out;
}

function doProcess(){
  const key = $('#keyInput').value;
  const text = $('#input').value;
  if (!/[A-Za-z]/.test(key)){
    $('#output').textContent = '';
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noKey')}</span>`;
    return;
  }
  if (!text){ $('#output').textContent=''; $('#status').innerHTML=''; return; }
  const res = vigenere(text, key, mode === 'dec');
  if (res === null){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('noKey')}</span>`;
    return;
  }
  $('#output').textContent = res;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('result')}</span>`;
}

}

function doClear(){ $('#input').value=''; $('#output').textContent=''; $('#status').innerHTML=''; }
