GZI18n.register({
  en:{toolTitle:'JSON to CSV Converter',toolDesc:'Convert JSON data to clean CSV instantly. Supports arrays or objects, nested-key flattening, delimiter choices and download. Free, private and browser-only.',delimiter:'Delimiter',includeHeader:'Include header row',input:'JSON input',output:'CSV output',convert:'Convert',download:'Download CSV',copy:'Copy',example:'Example',clear:'Clear',converted:'Converted',rows:'rows',columns:'columns',invalid:'Invalid JSON:',nothingToDownload:'Convert JSON before downloading.',step1:'Paste a JSON object or array into the input.',step2:'Choose the CSV delimiter and whether to include a header row.',step3:'Convert the data; nested object keys are flattened with dot notation.',step4:'Copy the result or download it as a CSV file.'},
  zh:{toolTitle:'JSON 转 CSV 转换器',toolDesc:'即时将 JSON 数据转换为干净的 CSV。支持对象或数组、嵌套键展开、分隔符选择和下载。免费、私密、浏览器本地运行。',delimiter:'分隔符',includeHeader:'包含表头行',input:'JSON 输入',output:'CSV 输出',convert:'转换',download:'下载 CSV',copy:'复制',example:'示例',clear:'清空',converted:'转换完成',rows:'行',columns:'列',invalid:'无效的 JSON：',nothingToDownload:'请先转换 JSON 再下载。',step1:'在输入框中粘贴 JSON 对象或数组。',step2:'选择 CSV 分隔符以及是否包含表头行。',step3:'转换数据；嵌套对象键会用点号展开。',step4:'复制结果或将其下载为 CSV 文件。'}

const { $, copyText, t } = GZ;
let csvResult='';
function scalar(value){if(value===null)return '';if(typeof value==='string')return value;if(typeof value==='object')return JSON.stringify(value);return String(value);}
function flatten(value,prefix,row){if(value!==null&&typeof value==='object'&&!Array.isArray(value)){const keys=Object.keys(value);if(!keys.length&&prefix)row[prefix]='';keys.forEach(key=>flatten(value[key],prefix?prefix+'.'+key:key,row));return row;}row[prefix||'value']=scalar(value);return row;}
function escapeField(value,delimiter){const text=String(value);return text.includes(delimiter)||/["\r\n]/.test(text)?'"'+text.replace(/"/g,'""')+'"':text;}
function selectedDelimiter(){return $('#delimiter').value==='\\t'?'\t':$('#delimiter').value;}
function setStatus(message,kind){const el=$('#status');el.textContent=message;el.className='jc-status'+(kind?' '+kind:'');}
function convert(){const source=$('#input').value.trim();if(!source){csvResult='';$('#output').value='';setStatus('');return;}let parsed;try{parsed=JSON.parse(source);}catch(error){csvResult='';$('#output').value='';setStatus(t('invalid')+' '+error.message,'error');return;}const sourceRows=Array.isArray(parsed)?parsed:[parsed];const rows=sourceRows.map(value=>flatten(value,'',{}));const columns=[...new Set(rows.flatMap(row=>Object.keys(row)))];const delimiter=selectedDelimiter();const lines=[];if($('#include-header').checked&&columns.length)lines.push(columns.map(column=>escapeField(column,delimiter)).join(delimiter));rows.forEach(row=>lines.push(columns.map(column=>escapeField(row[column]===undefined?'':row[column],delimiter)).join(delimiter)));csvResult=lines.join('\r\n');$('#output').value=csvResult;setStatus(t('converted')+': '+rows.length+' '+t('rows')+', '+columns.length+' '+t('columns'),'ok');}
function download(){if(!csvResult){setStatus(t('nothingToDownload'),'error');return;}const blob=new Blob(['\uFEFF'+csvResult],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const link=document.createElement('a');link.href=url;link.download='data.csv';document.body.appendChild(link);link.click();link.remove();setTimeout(()=>URL.revokeObjectURL(url),0);}
function loadExample(){$('#input').value='[\n  {"id": 1, "name": "Alice", "active": true, "address": {"city": "New York", "zip": "10001"}},\n  {"id": 2, "name": "Bob", "active": false, "address": {"city": "Los Angeles", "zip": "90001"}}\n]';convert();}
function clearAll(){$('#input').value='';csvResult='';$('#output').value='';setStatus('');}
$('#toolbar').innerHTML='<button class="gz-btn" id="convert-btn">'+t('convert')+'</button><button class="gz-btn gz-btn-secondary" id="download-btn">'+t('download')+'</button><button class="gz-btn gz-btn-secondary" id="copy-btn">'+t('copy')+'</button><button class="gz-btn gz-btn-secondary" id="example-btn">'+t('example')+'</button><button class="gz-btn gz-btn-secondary" id="clear-btn">'+t('clear')+'</button>';
$('#delimiter-label').textContent=t('delimiter');$('#header-label').textContent=t('includeHeader');$('#input-label').textContent=t('input');$('#output-label').textContent=t('output');$('#convert-btn').addEventListener('click',convert);$('#download-btn').addEventListener('click',download);$('#copy-btn').addEventListener('click',()=>copyText(csvResult));$('#example-btn').addEventListener('click',loadExample);$('#clear-btn').addEventListener('click',clearAll);$('#input').addEventListener('input',convert);$('#delimiter').addEventListener('change',convert);$('#include-header').addEventListener('change',convert);convert();

</script>
