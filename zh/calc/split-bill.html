<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">

      <div class="mode-tab active" id="tab-even" onclick="switchMode('even')"></div>

    <div id="evenMode">

        <label id="lbl-bill"></label>
        <input type="number" id="billAmount" value="100" min="0" step="0.01">
      </div>
      <div class="field-row">
        <label id="lbl-tip"></label>
        <div class="tip-btns" id="tipBtns"></div>
      </div>
      <div class="field-row">
        <label id="lbl-custom-tip"></label>
        <input type="number" id="customTip" value="0" min="0" step="0.1" style="max-width:100px">
        <span>%</span>
      </div>
      <div class="field-row">
        <label id="lbl-tax"></label>
        <input type="number" id="taxPct" value="0" min="0" step="0.1" style="max-width:100px">
        <span>%</span>
      </div>
      <div class="field-row">
        <label id="lbl-people"></label>
        <input type="number" id="people" value="2" min="1" step="1" style="max-width:100px">
      </div>
    </div>
    <div id="customMode" style="display:none">
      <div class="field-row">
        <label id="lbl-subtotal"></label>
        <input type="number" id="subtotal" value="100" min="0" step="0.01">
      </div>
      <div class="field-row">
        <label id="lbl-tax2"></label>
        <input type="number" id="taxPct2" value="0" min="0" step="0.1" style="max-width:100px">
        <span>%</span>
      </div>
      <div class="field-row">
        <label id="lbl-tip2"></label>
        <input type="number" id="tipPct2" value="15" min="0" step="1" style="max-width:100px">
        <span>%</span>
      </div>
      <div id="personList" style="margin-top:12px"></div>
      <button class="gz-btn gz-btn-secondary" onclick="addPerson()" id="btn-add-person" style="margin-top:8px"></button>
    </div>
    <div id="results" style="margin-top:16px"></div>
    <div id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Bill Splitter & Tip Calculator',
    toolDesc: 'Split a bill evenly or by custom shares. Calculate tip, tax, and per-person amounts instantly — free and browser-only.',
    evenMode: 'Even Split',
    customMode: 'Custom Split',
    billLabel: 'Bill Amount',
    tipLabel: 'Tip',
    customTipLabel: 'Custom Tip',
    taxLabel: 'Tax',
    peopleLabel: 'People',
    subtotalLabel: 'Subtotal',
    tipPctLabel: 'Tip %',
    addPerson: '+ Add Person',
    perPerson: 'Per Person',
    totalTip: 'Total Tip',
    totalTax: 'Total Tax',
    grandTotal: 'Grand Total',
    billPlusTip: 'Bill + Tip',
    person: 'Person',
    amount: 'Amount',
    step1: 'Choose Even Split or Custom Split mode',
    step2: 'Enter the bill amount, tip percentage, and tax',
    step3: 'Set the number of people (or add named persons in Custom mode)',
    step4: 'See the per-person amount calculated instantly',
  },
  zh: {
    toolTitle: 'AA 制账单分割 / 小费计算器',
    toolDesc: '均分或按自定义份额分割账单。即时计算小费、税费和每人应付金额 — 免费、浏览器本地运行。',
    evenMode: '均分',
    customMode: '自定义',
    billLabel: '账单金额',
    tipLabel: '小费',
    customTipLabel: '自定义小费',
    taxLabel: '税费',
    peopleLabel: '人数',
    subtotalLabel: '小计',
    tipPctLabel: '小费 %',
    addPerson: '+ 添加人员',
    perPerson: '每人应付',
    totalTip: '总小费',
    totalTax: '总税费',
    grandTotal: '总计',
    billPlusTip: '账单+小费',
    person: '人员',
    amount: '金额',
    step1: '选择「均分」或「自定义」模式',
    step2: '输入账单金额、小费比例和税费',
    step3: '设置人数（或在自定义模式中添加人员）',
    step4: '即时查看每人应付金额',
  }
});

const { $, t } = GZ;
let mode = 'even';
let tipPct = 15;
let persons = [{name:'Alice', amount:40}, {name:'Bob', amount:60}];

const TIP_PRESETS = [0, 10, 15, 18, 20];

function switchMode(m) {
  mode = m;
  $('#tab-even').classList.toggle('active', m === 'even');
  $('#tab-custom').classList.toggle('active', m === 'custom');
  $('#evenMode').style.display = m === 'even' ? '' : 'none';
  $('#customMode').style.display = m === 'custom' ? '' : 'none';
  calculate();
}

function setTip(pct) {
  tipPct = pct;
  $('#customTip').value = pct;
  document.querySelectorAll('.tip-btn').forEach(b => b.classList.toggle('active', +b.dataset.tip === pct));
  calculate();
}

function renderTipBtns() {
  const container = $('#tipBtns');
  container.innerHTML = '';
  TIP_PRESETS.forEach(pct => {
    const btn = document.createElement('button');
    btn.className = 'tip-btn' + (pct === tipPct ? ' active' : '');
    btn.dataset.tip = pct;
    btn.textContent = pct + '%';
    btn.onclick = () => setTip(pct);
    container.appendChild(btn);
  });
}

function addPerson() {
  persons.push({name: 'Person ' + (persons.length + 1), amount: 0});
  renderPersons();
  calculate();
}

function removePerson(idx) {
  persons.splice(idx, 1);
  renderPersons();
  calculate();
}

function renderPersons() {
  const container = $('#personList');
  container.innerHTML = '';
  persons.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'person-row';
    row.innerHTML = `
      <input type="text" value="${p.name}" onchange="persons[${i}].name=this.value" style="max-width:120px">
      <span>${t('amount')} $</span>
      <input type="number" value="${p.amount}" min="0" step="0.01" onchange="persons[${i}].amount=+this.value;calculate()" style="max-width:100px">
      <button class="gz-btn gz-btn-secondary" onclick="removePerson(${i})" style="padding:4px 8px;font-size:.8em">✕</button>`;
    container.appendChild(row);
  });
}

function fmt(n) {
  return '$' + (Math.round(n * 100) / 100).toFixed(2);
}

function calculate() {
  const results = $('#results');
  if (mode === 'even') {
    const bill = +$('#billAmount').value || 0;
    const tip = +$('#customTip').value || 0;
    const tax = +$('#taxPct').value || 0;
    const people = Math.max(1, +$('#people').value || 1);
    const tipAmt = bill * tip / 100;
    const taxAmt = bill * tax / 100;
    const grand = bill + tipAmt + taxAmt;
    const perPerson = grand / people;
    results.innerHTML = `
      <div class="result-card">
        <div class="result-label">${t('perPerson')}</div>
        <div class="result-big">${fmt(perPerson)}</div>
        <div class="result-grid">
          <div class="result-item"><div class="val">${fmt(bill)}</div><div class="lbl">${t('billLabel')}</div></div>
          <div class="result-item"><div class="val">${fmt(tipAmt)}</div><div class="lbl">${t('totalTip')} (${tip}%)</div></div>
          <div class="result-item"><div class="val">${fmt(taxAmt)}</div><div class="lbl">${t('totalTax')} (${tax}%)</div></div>
          <div class="result-item"><div class="val">${fmt(grand)}</div><div class="lbl">${t('grandTotal')}</div></div>
        </div>
      </div>`;
  } else {
    const subtotal = +$('#subtotal').value || 0;
    const taxPct = +$('#taxPct2').value || 0;
    const tipPctVal = +$('#tipPct2').value || 0;
    const taxAmt = subtotal * taxPct / 100;
    const tipAmt = subtotal * tipPctVal / 100;
    const grand = subtotal + taxAmt + tipAmt;
    const totalShare = persons.reduce((s, p) => s + (p.amount || 0), 0) || 1;
    let html = `<div class="result-card">
      <div class="result-grid">
        <div class="result-item"><div class="val">${fmt(subtotal)}</div><div class="lbl">${t('subtotalLabel')}</div></div>
        <div class="result-item"><div class="val">${fmt(tipAmt)}</div><div class="lbl">${t('totalTip')} (${tipPctVal}%)</div></div>
        <div class="result-item"><div class="val">${fmt(taxAmt)}</div><div class="lbl">${t('totalTax')} (${taxPct}%)</div></div>
        <div class="result-item"><div class="val">${fmt(grand)}</div><div class="lbl">${t('grandTotal')}</div></div>
      </div>
    </div>`;
    html += '<div class="result-card"><h3 style="margin:0 0 10px;font-size:.9em">' + t('perPerson') + '</h3>';
    persons.forEach(p => {
      const share = (p.amount || 0) / totalShare;
      const personTotal = p.amount + (tipAmt + taxAmt) * share;
      html += `<div class="person-row"><span style="flex:1;font-weight:600">${p.name}</span><span class="amt">${fmt(personTotal)}</span></div>`;
    });
    html += '</div>';
    results.innerHTML = html;
  }
}

// Setup labels
$('#tab-even').textContent = t('evenMode');
$('#tab-custom').textContent = t('customMode');
$('#lbl-bill').textContent = t('billLabel');
$('#lbl-tip').textContent = t('tipLabel');
$('#lbl-custom-tip').textContent = t('customTipLabel');
$('#lbl-tax').textContent = t('taxLabel');
$('#lbl-people').textContent = t('peopleLabel');
$('#lbl-subtotal').textContent = t('subtotalLabel');
$('#lbl-tax2').textContent = t('taxLabel');
$('#lbl-tip2').textContent = t('tipPctLabel');
$('#btn-add-person').textContent = t('addPerson');

renderTipBtns();
renderPersons();

['billAmount','customTip','taxPct','people','subtotal','taxPct2','tipPct2'].forEach(id => {
  $('#' + id).addEventListener('input', calculate);
});

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/tip-calculator.html', name:'Tip Calc'},
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calc'},
    {icon:'💵', href:'/calc/percentage-calculator.html', name:'Percentage'},
    {icon:'🧮', href:'/calc/index.html', name:'All Calculators'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
