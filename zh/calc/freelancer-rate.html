<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I calculate my freelance hourly rate?","acceptedAnswer":{"@type":"Answer","text":"Start with the annual salary you want to earn. Add your business expenses (software, insurance, gear, taxes). Divide the total by the number of billable hours per year (typically half of total working hours after admin, marketing, and unpaid time). The result is the minimum hourly rate you must charge to sustain your business."}},{"@type":"Question","name":"What is a billable hour?","acceptedAnswer":{"@type":"Answer","text":"A billable hour is any hour you can charge a client for. Most freelancers can only bill 50-65% of their total working hours because the rest goes to admin, marketing, accounting, learning and time off. A common default is 1,000-1,200 billable hours per year for a 40-hour work week."}},{"@type":"Question","name":"What is a reasonable freelance markup?","acceptedAnswer":{"@type":"Answer","text":"A 20-30% profit margin above costs is typical. This gives you a buffer for slow months, sick days, training, and business growth. Anything below 10% margin puts you at risk during lean periods."}},{"@type":"Question","name":"Should I charge the same rate to all clients?","acceptedAnswer":{"@type":"Answer","text":"No. Most freelancers have a minimum rate, a standard rate, and a premium rate. Premium clients (agencies, large companies, urgent work) often pay 1.5-2x your standard rate, while smaller clients or retainer work may stay closer to the minimum."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  </div>
  <div class="gz-tool-area">

        <div class="preset-bar" id="presetBar"></div>
        <div class="field"><label id="lbl-salary"></label>
          <div class="row"><span class="prefix">$</span><input type="number" id="salary" value="75000" min="0"></div>
        </div>
        <div class="field"><label id="lbl-expenses"></label>
          <div class="row"><span class="prefix">$</span><input type="number" id="expenses" value="8000" min="0"></div>
          <div class="help" id="lbl-expenses-help"></div>
        </div>
        <div class="field"><label id="lbl-billable"></label>
          <div class="row"><input type="number" id="billable" value="1100" min="1"><span class="suffix">hrs/yr</span></div>
          <div class="help" id="lbl-billable-help"></div>
        </div>
        <div class="field"><label id="lbl-tax"></label>
          <div class="row"><input type="number" id="tax" value="25" min="0" max="60"><span class="suffix">%</span></div>
        </div>
        <div class="field"><label id="lbl-profit"></label>
          <div class="row"><input type="number" id="profit" value="20" min="0" max="100"><span class="suffix">%</span></div>
        </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Freelancer Hourly Rate Calculator',
    toolDesc: 'Figure out exactly what to charge as a freelancer. Enter your desired salary, expenses, billable hours, and tax rate to get a minimum, target, and premium hourly rate with a full cost breakdown.',
    inputs: 'Your Numbers',
    salary: 'Desired Annual Salary (after tax)',
    expenses: 'Annual Business Expenses',
    expensesHelp: 'Software, gear, insurance, accounting, marketing, coworking',
    billable: 'Billable Hours per Year',
    billableHelp: 'Typical: 1000-1200 hours (about 50-60% of work time)',
    tax: 'Tax & Self-Employment Rate',
    profit: 'Profit Margin',
    minRate: 'Minimum Rate',
    targetRate: 'Target Rate',
    premiumRate: 'Premium Rate',
    minRateDesc: 'Break-even — covers salary, expenses, taxes',
    targetRateDesc: 'Recommended — adds 20% profit margin',
    premiumRateDesc: 'Charges top-tier clients (agencies, urgent work)',
    annualRevenue: 'Required annual revenue',
    ofWhich: 'Breakdown',
    profit: 'Profit',
    taxes: 'Taxes',
    expenses: 'Expenses',
    salary: 'Take-home salary',
    tip: '💡 Tip: 1100 billable hours = about 22 hrs/week of client work. Track your hours carefully — most freelancers underestimate non-billable admin time.',
    presets: 'Quick Presets',
    pLow: 'Min $50k',
    pMid: 'Target $75k',
    pHigh: 'Premium $120k',
    step1: 'Enter your desired annual take-home salary',
    step2: 'Add your annual business expenses and tax rate',
    step3: 'Estimate realistic billable hours (most freelancers bill 50-60% of work time)',
    step4: 'Review the minimum, target, and premium rates — and the annual revenue you need to support them',
  },
  zh: {
    toolTitle: '自由职业者时薪计算器',
    toolDesc: '计算作为自由职业者应该收取的合理时薪。输入期望薪资、开支、可计费小时数和税率,得到最低、目标和溢价时薪以及完整的成本分解。',
    inputs: '你的数字',
    salary: '期望年税后收入',
    expenses: '年度业务开支',
    expensesHelp: '软件、设备、保险、会计、营销、共享办公等',
    billable: '年度可计费小时数',
    billableHelp: '常见范围: 1000-1200 小时 (工作时间的 50-60%)',
    tax: '税费与自雇税率',
    profit: '利润率',
    minRate: '最低时薪',
    targetRate: '目标时薪',
    premiumRate: '溢价时薪',
    minRateDesc: '保本线 — 覆盖薪资、开支、税费',
    targetRateDesc: '推荐报价 — 额外加 20% 利润',
    premiumRateDesc: '高端客户 (代理、紧急项目) 报价',
    annualRevenue: '所需年营收',
    ofWhich: '费用构成',
    profit: '利润',
    taxes: '税费',
    expenses: '开支',
    salary: '税后薪资',
    tip: '💡 提示: 1100 可计费小时 ≈ 每周 22 小时客户工作。务必精确记录工时,大多数自由职业者都低估了非计费的行政时间。',
    presets: '快速预设',
    pLow: '基础 $50k',
    pMid: '目标 $75k',
    pHigh: '高端 $120k',
    step1: '输入你期望的年税后收入',
    step2: '添加年度业务开支和税率',
    step3: '估算实际可计费小时数 (大多数自由职业者可计费 50-60% 的工作时间)',
    step4: '查看最低、目标和溢价时薪,以及所需的年营收',
  }
});

const { t } = GZ;
const $ = s => document.querySelector(s);

function fmt(n) { return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 2, minimumFractionDigits: 2 }); }

function calc() {
  const salary = +$('#salary').value || 0;
  const expenses = +$('#expenses').value || 0;
  const billable = +$('#billable').value || 1;
  const tax = (+$('#tax').value || 0) / 100;
  const profit = (+$('#profit').value || 0) / 100;
  const gross = salary / Math.max(0.01, 1 - tax);
  const totalCost = gross + expenses;
  const minRate = totalCost / billable;
  const targetRate = (totalCost * (1 + profit)) / billable;
  const premiumRate = targetRate * 1.5;
  const annual = targetRate * billable;
  const out = $('#results');
  out.innerHTML = `
    <div class="rate-card target">
      <h3>${t('targetRate')}</h3>
      <div class="rate">${fmt(targetRate)}<span style="font-size:.45em;opacity:.85">/hr</span></div>
      <div class="annual">${t('targetRateDesc')}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="rate-card min">
        <h3>${t('minRate')}</h3>
        <div class="rate" style="font-size:1.7rem">${fmt(minRate)}</div>
        <div class="annual">${t('minRateDesc')}</div>
      </div>
      <div class="rate-card premium">
        <h3>${t('premiumRate')}</h3>
        <div class="rate" style="font-size:1.7rem">${fmt(premiumRate)}</div>
        <div class="annual">${t('premiumRateDesc')}</div>
      </div>
    </div>
    <div class="breakdown">
      <h4>📊 ${t('annualRevenue')}: ${fmt(annual)}</h4>
      <div class="row"><span class="k">${t('salary')}</span><span class="v">${fmt(salary)}</span></div>
      <div class="row"><span class="k">${t('taxes')} (${Math.round(tax*100)}%)</span><span class="v">${fmt(gross - salary)}</span></div>
      <div class="row"><span class="k">${t('expenses')}</span><span class="v">${fmt(expenses)}</span></div>
      <div class="row"><span class="k">${t('profit')} (${Math.round(profit*100)}%)</span><span class="v">${fmt(totalCost * profit)}</span></div>
      <div class="row"><span class="k">${t('annualRevenue')}</span><span class="v">${fmt(annual)}</span></div>
    </div>
    <div class="tip">${t('tip')}</div>`;
}

['salary','expenses','billable','tax','profit'].forEach(id => {
  document.getElementById(id).addEventListener('input', calc);
});

document.getElementById('inputsHeader').textContent = '📝 ' + t('inputs');
document.getElementById('presetBar').innerHTML = `
  <button onclick="$('#salary').value=50000;calc()">${t('pLow')}</button>
  <button onclick="$('#salary').value=75000;calc()">${t('pMid')}</button>
  <button onclick="$('#salary').value=120000;calc()">${t('pHigh')}</button>`;

document.getElementById('lbl-salary').textContent = t('salary');
document.getElementById('lbl-expenses').textContent = t('expenses');
document.getElementById('lbl-expenses-help').textContent = t('expensesHelp');
document.getElementById('lbl-billable').textContent = t('billable');
document.getElementById('lbl-billable-help').textContent = t('billableHelp');
document.getElementById('lbl-tax').textContent = t('tax');
document.getElementById('lbl-profit').textContent = t('profit');

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/salary-calculator.html', name:'Salary Calculator'},
    {icon:'💸', href:'/calc/roi.html', name:'ROI Calculator'},
    {icon:'💼', href:'/calc/profit-margin.html', name:'Profit Margin'},
    
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
