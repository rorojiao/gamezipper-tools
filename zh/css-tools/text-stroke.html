<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"CSS Text Outline Generator","description":"Generate CSS text-stroke and text-outline effects visually. Customize stroke width, color and fill for outlined, hollow and gradient text effects.","url": "https://tools.gamezipper.com/zh/css-tools/text-stroke.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is CSS text-stroke?","acceptedAnswer":{"@type":"Answer","text":"CSS text-stroke (using -webkit-text-stroke) is a CSS property that adds an outline or stroke around text characters. It can create hollow text, outlined text, or double-colored text effects."}},{"@type":"Question","name":"Is text-stroke supported in all browsers?","acceptedAnswer":{"@type":"Answer","text":"The -webkit-text-stroke property works in Chrome, Safari, Firefox, Edge and all modern browsers. It has over 95% global browser support."}},{"@type":"Question","name":"How do I create hollow outlined text?","acceptedAnswer":{"@type":"Answer","text":"Set a text-stroke color and width, then set the text color (or -webkit-text-fill-color) to transparent. This creates hollow text with only the outline visible."}},{"@type":"Question","name":"Can I add multiple text outlines?","acceptedAnswer":{"@type":"Answer","text":"For multiple outlines, you can use the text-shadow property with multiple comma-separated shadow values at different offsets to simulate a thicker or multi-colored outline."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="stroke-preview">
      <div class="preview-text" id="previewText">OUTLINE</div>
    </div>
    <div class="presets" id="presets"></div>
    <div class="stroke-controls" id="controls"></div>
    <div class="gz-code-block" id="codeBlock"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Text Outline Generator',
    toolDesc: 'Generate CSS text-stroke and text-outline effects — hollow text, outlined text, gradient stroke and more.',
    strokeWidth: 'Stroke Width',
    strokeColor: 'Stroke Color',
    fillColor: 'Fill Color',
    fontFamily: 'Font Family',
    fontSize: 'Font Size',
    letterSpacing: 'Letter Spacing',
    textShadow: 'Text Shadow (multi-outline)',
    labelText: 'Preview Text',
    copy: 'Copy',
    reset: 'Reset',
    copied: 'Copied!',
    presetHollow: 'Hollow',
    presetNeon: 'Neon Glow',
    presetRetro: 'Retro Outline',
    presetBold: 'Bold Outline',
    presetGradient: 'Dual Color',
    step1: 'Enter your preview text and adjust stroke settings',
    step2: 'Try presets for quick styled effects',
    step3: 'Fine-tune stroke width, colors and font',
    step4: 'Copy the generated CSS code',
  },
  zh: {
    toolTitle: 'CSS 文字描边生成器',
    toolDesc: '生成 CSS 文字描边效果 — 空心字、描边字、渐变描边等。',
    strokeWidth: '描边宽度',
    strokeColor: '描边颜色',
    fillColor: '填充颜色',
    fontFamily: '字体',
    fontSize: '字号',
    letterSpacing: '字间距',
    textShadow: '文字阴影（多层描边）',
    labelText: '预览文本',
    copy: '复制',
    reset: '重置',
    copied: '已复制！',
    presetHollow: '空心',
    presetNeon: '霓虹灯',
    presetRetro: '复古描边',
    presetBold: '粗描边',
    presetGradient: '双色',
    step1: '输入预览文本并调整描边设置',
    step2: '尝试预设快速生成样式',
    step3: '微调描边宽度、颜色和字体',
    step4: '复制生成的 CSS 代码',
  }
});

const { $, copyText, t } = GZ;

let config = {
  text: 'OUTLINE',
  strokeWidth: 2,
  strokeColor: '#ff6b6b',
  fillColor: 'transparent',
  fontFamily: 'Arial, sans-serif',
  fontSize: 48,
  letterSpacing: 4,
  textShadow: '',
};

function buildControls() {
  $('#controls').innerHTML = `
    <div class="stroke-control">
      <label>${t('labelText')}</label>
      <input type="text" id="ctrlText" value="${config.text}" placeholder="Type here...">
    </div>
    <div class="stroke-control">
      <label>${t('strokeWidth')} <span id="valWidth">${config.strokeWidth}px</span></label>
      <input type="range" id="ctrlWidth" min="0" max="10" step="0.5" value="${config.strokeWidth}">
    </div>
    <div class="stroke-control">
      <label>${t('strokeColor')}</label>
      <input type="color" id="ctrlStrokeColor" value="${config.strokeColor}">
    </div>
    <div class="stroke-control">
      <label>${t('fillColor')}</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="color" id="ctrlFillColor" value="${config.fillColor === 'transparent' ? '#000000' : config.fillColor}">
        <label style="font-size:.8em;display:flex;gap:4px;align-items:center;cursor:pointer">
          <input type="checkbox" id="ctrlTransparent" ${config.fillColor === 'transparent' ? 'checked' : ''}> Transparent
        </label>
      </div>
    </div>
    <div class="stroke-control">
      <label>${t('fontFamily')}</label>
      <select id="ctrlFont">
        <option value="Arial, sans-serif">Arial</option>
        <option value="Georgia, serif">Georgia</option>
        <option value="'Courier New', monospace">Courier New</option>
        <option value="Impact, sans-serif">Impact</option>
        <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
        <option value="Verdana, sans-serif">Verdana</option>
        <option value="system-ui, sans-serif">System UI</option>
      </select>
    </div>
    <div class="stroke-control">
      <label>${t('fontSize')} <span id="valSize">${config.fontSize}px</span></label>
      <input type="range" id="ctrlSize" min="20" max="120" step="2" value="${config.fontSize}">
    </div>
    <div class="stroke-control">
      <label>${t('letterSpacing')} <span id="valSpacing">${config.letterSpacing}px</span></label>
      <input type="range" id="ctrlSpacing" min="-5" max="30" step="1" value="${config.letterSpacing}">
    </div>
    <div class="stroke-control">
      <label>${t('textShadow')}</label>
      <input type="text" id="ctrlShadow" value="" placeholder="e.g. 2px 2px 0 #000">
    </div>`;

  // Event listeners
  const bind = (id, prop, parse) => {
    $(`#${id}`).addEventListener('input', e => {
      config[prop] = parse ? parse(e.target.value) : e.target.value;
      update();
    });
  };
  bind('ctrlText', 'text');
  bind('ctrlWidth', 'strokeWidth', Number);
  bind('ctrlStrokeColor', 'strokeColor');
  bind('ctrlFillColor', 'fillColor');
  bind('ctrlFont', 'fontFamily');
  bind('ctrlSize', 'fontSize', Number);
  bind('ctrlSpacing', 'letterSpacing', Number);
  bind('ctrlShadow', 'textShadow');

  $('#ctrlTransparent').addEventListener('change', e => {
    config.fillColor = e.target.checked ? 'transparent' : $('#ctrlFillColor').value;
    update();
  });
}

function buildPresets() {
  const presets = [
    { name: 'presetHollow', cfg: { strokeWidth: 2, strokeColor: '#ffffff', fillColor: 'transparent', textShadow: '' }},
    { name: 'presetNeon', cfg: { strokeWidth: 1, strokeColor: '#00ff88', fillColor: '#00ff88', textShadow: '0 0 10px #00ff88, 0 0 20px #00ff88, 0 0 40px #00ff88' }},
    { name: 'presetRetro', cfg: { strokeWidth: 3, strokeColor: '#ffd700', fillColor: '#000000', textShadow: '3px 3px 0 #ff6b6b' }},
    { name: 'presetBold', cfg: { strokeWidth: 4, strokeColor: '#333333', fillColor: 'transparent', textShadow: '' }},
    { name: 'presetGradient', cfg: { strokeWidth: 3, strokeColor: '#667eea', fillColor: '#764ba2', textShadow: '' }},
  ];
  $('#presets').innerHTML = presets.map((p, i) =>
    `<button class="gz-btn gz-btn-secondary" data-preset="${i}">${t(p.name)}</button>`
  ).join('');
  $('#presets').querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      const p = presets[+btn.dataset.preset];
      Object.assign(config, p.cfg);
      syncControls();
      update();
    });
  });
}

function syncControls() {
  const el = (id, val) => { const e = $(`#${id}`); if (e) e.value = val; };
  el('ctrlText', config.text);
  el('ctrlWidth', config.strokeWidth);
  el('ctrlStrokeColor', config.strokeColor);
  el('ctrlFillColor', config.fillColor === 'transparent' ? '#000000' : config.fillColor);
  el('ctrlFont', config.fontFamily);
  el('ctrlSize', config.fontSize);
  el('ctrlSpacing', config.letterSpacing);
  el('ctrlShadow', config.textShadow);
  const chk = $('#ctrlTransparent');
  if (chk) chk.checked = config.fillColor === 'transparent';
  const vw = $('#valWidth'); if (vw) vw.textContent = config.strokeWidth + 'px';
  const vs = $('#valSize'); if (vs) vs.textContent = config.fontSize + 'px';
  const vsp = $('#valSpacing'); if (vsp) vsp.textContent = config.letterSpacing + 'px';
}

function update() {
  const pt = $('#previewText');
  pt.textContent = config.text || 'OUTLINE';
  pt.style.fontFamily = config.fontFamily;
  pt.style.fontSize = config.fontSize + 'px';
  pt.style.letterSpacing = config.letterSpacing + 'px';
  pt.style.webkitTextStroke = config.strokeWidth + 'px ' + config.strokeColor;
  pt.style.webkitTextFillColor = config.fillColor;
  pt.style.color = config.fillColor;
  pt.style.textShadow = config.textShadow;

  // Update value displays
  const vw = $('#valWidth'); if (vw) vw.textContent = config.strokeWidth + 'px';
  const vs = $('#valSize'); if (vs) vs.textContent = config.fontSize + 'px';
  const vsp = $('#valSpacing'); if (vsp) vsp.textContent = config.letterSpacing + 'px';

  // Generate CSS code
  let css = `.outlined-text {\n`;
  css += `  font-family: ${config.fontFamily};\n`;
  css += `  font-size: ${config.fontSize}px;\n`;
  css += `  font-weight: 900;\n`;
  css += `  letter-spacing: ${config.letterSpacing}px;\n`;
  if (config.strokeWidth > 0) css += `  -webkit-text-stroke: ${config.strokeWidth}px ${config.strokeColor};\n`;
  if (config.fillColor === 'transparent') {
    css += `  -webkit-text-fill-color: transparent;\n`;
  } else {
    css += `  color: ${config.fillColor};\n`;
  }
  if (config.textShadow) css += `  text-shadow: ${config.textShadow};\n`;
  css += `}`;

  $('#codeBlock').innerHTML = `<button class="gz-btn copy-btn" onclick="doCopy()">${t('copy')}</button>${css}`;
}

window.doCopy = () => {
  const code = $('#codeBlock').textContent.replace(t('copy'), '').trim();
  copyText(code);
  const btn = $('#codeBlock .copy-btn');
  btn.textContent = t('copied');
  setTimeout(() => btn.textContent = t('copy'), 1500);
};

window.doReset = () => {
  config = { text: 'OUTLINE', strokeWidth: 2, strokeColor: '#ff6b6b', fillColor: 'transparent', fontFamily: 'Arial, sans-serif', fontSize: 48, letterSpacing: 4, textShadow: '' };
  syncControls();
  update();
};

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="doReset()">${t('reset')}</button>`;

buildControls();
buildPresets();
update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✏️', href:'/css-tools/text-shadow.html', name:'Text Shadow'},
    {icon:'🎨', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'✨', href:'/css-tools/glitch.html', name:'Glitch Effect'},
    {icon:'🪟', href:'/css-tools/glassmorphism.html', name:'Glassmorphism'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
