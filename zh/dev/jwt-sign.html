const { $, t, copyText, showToast } = GZ;

function b64url(input) {
  const bytes = typeof input === 'string' ? new TextEncoder().encode(input) : new Uint8Array(input);
  let bin = '';
  for (const b of bytes) bin += String.fromCharCode(b);
  return btoa(bin).replace(/=+$/,'').replace(/\+/g,'-').replace(/\//g,'_');
}

async function hmacSign(algo, data, key) {
  const keyData = new TextEncoder().encode(key);
  const cryptoKey = await crypto.subtle.importKey('raw', keyData, {name:'HMAC',hash:algo}, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', cryptoKey, new TextEncoder().encode(data));
  return b64url(sig);
}

async function signJwt() {
  const hdrRaw = $('#header').value.trim();
  const plRaw = $('#payload').value.trim();
  const secret = $('#secret').value;
  const selAlg = $('#alg').value;
  const res = $('#result');
  const status = $('#status');
  status.innerHTML = '';
  res.classList.add('empty');
  try {
    const hdr = JSON.parse(hdrRaw);
    if (!hdr.alg || typeof hdr !== 'object') throw new Error(t('errHdr'));
    const pl = JSON.parse(plRaw);
    if (typeof pl !== 'object' || pl === null) throw new Error(t('errPl'));
    if (!secret) throw new Error(t('errEmpty'));
    if (hdr.alg !== selAlg) {
      hdr.alg = selAlg;
      $('#header').value = JSON.stringify(hdr, null, 2);
    }
    // Auto add iss/aud/exp
    if ($('#cl-iss').checked && !pl.iss) pl.iss = t('issDemo');
    if ($('#cl-aud').checked && !pl.aud) pl.aud = t('audDemo');
    if ($('#cl-exp').checked && !pl.exp) pl.exp = Math.floor(Date.now()/1000) + 3600;
    $('#payload').value = JSON.stringify(pl, null, 2);
    const hashMap = { HS256:'SHA-256', HS384:'SHA-384', HS512:'SHA-512' };
    const headerB64 = b64url(JSON.stringify(hdr));
    const payloadB64 = b64url(JSON.stringify(pl));
    const sigB64 = await hmacSign(hashMap[selAlg], headerB64 + '.' + payloadB64, secret);
    const token = headerB64 + '.' + payloadB64 + '.' + sigB64;
    res.textContent = token;
    res.classList.remove('empty');
    const byteSize = new TextEncoder().encode(token).length;
    const expInfo = pl.exp ? `${t('exp')}: ${new Date(pl.exp*1000).toLocaleString()}` : '';
    $('#meta').innerHTML = `<span>${t('bytes')}: <b>${byteSize}</b></span>${expInfo?`<span>${expInfo}</span>`:''}`;
    status.innerHTML = `<span style="color:var(--success)">${t('signed')}</span>`;
  } catch (e) {
    status.innerHTML = `<div class="jwt-error">${e.message || (t('errSign') + e)}</div>`;
  }
}

$('#header').value = '{"alg":"HS256","typ":"JWT"}';
$('#payload').value = '{"sub":"user123","name":"GameZipper"}';
