<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div id="toolbar"></div>
    <textarea id="text" placeholder=""></textarea>
    <div class="ctrl-grid">
      <div><label data-i18n="voice"></label><select id="voice"></select></div>
      <div><label data-i18n="rate"></label><input type="range" id="rate" min="0.5" max="2" step="0.1" value="1"><span class="rate-val" id="rate-val">1.0x</span></div>
      <div><label data-i18n="pitch"></label><input type="range" id="pitch" min="0" max="2" step="0.1" value="1"><span class="rate-val" id="pitch-val">1.0</span></div>
      <div><label data-i18n="volume"></label><input type="range" id="vol" min="0" max="1" step="0.1" value="1"><span class="rate-val" id="vol-val">100%</span></div>
    </div>
    <div class="btn-row">
      <button class="gz-btn" id="play-btn" onclick="speak()"></button>
      <button class="gz-btn gz-btn-secondary" onclick="pauseSpeech()"></button>
      <button class="gz-btn gz-btn-secondary" onclick="resumeSpeech()"></button>
      <button class="gz-btn gz-btn-secondary" onclick="stopSpeech()"></button>
    </div>
    <div class="status" id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Text to Speech Reader',
    toolDesc: 'Convert any text into natural-sounding speech using your browser built-in voices. Adjust speed, pitch and volume — free, private, no upload.',
    voice: 'Voice',
    rate: 'Speed',
    pitch: 'Pitch',
    volume: 'Volume',
    play: '▶ Speak',
    stop: '■ Stop',
    pause: '⏸ Pause',
    resume: '▶ Resume',
    placeholder: 'Type or paste text here to read aloud...',
    noVoice: 'No voices found. Try Chrome or Edge.',
    speaking: 'Speaking...',
    paused: 'Paused',
    step1: 'Type or paste the text you want to hear',
    step2: 'Select a voice from the dropdown',
    step3: 'Adjust speed, pitch and volume to taste',
    step4: 'Click Speak to start listening'
  },
  zh: {
    toolTitle: '文字转语音朗读器',
    toolDesc: '使用浏览器内置语音将任意文字转换为自然语音。可调节语速、音调和音量 — 免费、私密、无需上传。',
    voice: '语音',
    rate: '语速',
    pitch: '音调',
    volume: '音量',
    play: '▶ 朗读',
    stop: '■ 停止',
    pause: '⏸ 暂停',
    resume: '▶ 继续',
    placeholder: '在此输入或粘贴要朗读的文字...',
    noVoice: '未找到语音。请尝试 Chrome 或 Edge 浏览器。',
    speaking: '正在朗读...',
    paused: '已暂停',
    step1: '输入或粘贴要朗读的文字',
    step2: '从下拉菜单选择语音',
    step3: '根据需要调节语速、音调和音量',
    step4: '点击朗读开始收听'
  }
});
const { $, t } = GZ;
let voices = [];
let utter = null;

function loadVoices(){
  voices = speechSynthesis.getVoices();
  const sel = $('#voice');
  sel.innerHTML = '';
  if(!voices.length){
    sel.innerHTML = `<option>${t('noVoice')}</option>`;
    return;
  }
  voices.forEach((v,i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${v.name} (${v.lang})${v.default ? ' ★' : ''}`;
    if(v.default) opt.selected = true;
    sel.appendChild(opt);
  });
}

function speak(){
  const text = $('#text').value.trim();
  if(!text) return;
  speechSynthesis.cancel();
  utter = new SpeechSynthesisUtterance(text);
  const vi = parseInt($('#voice').value);
  if(!isNaN(vi) && voices[vi]) utter.voice = voices[vi];
  utter.rate = parseFloat($('#rate').value);
  utter.pitch = parseFloat($('#pitch').value);
  utter.volume = parseFloat($('#vol').value);
  utter.onstart = () => $('#status').textContent = t('speaking');
  utter.onend = () => $('#status').textContent = '';
  speechSynthesis.speak(utter);
}

function pauseSpeech(){ speechSynthesis.pause(); $('#status').textContent = t('paused'); }
function resumeSpeech(){ speechSynthesis.resume(); $('#status').textContent = t('speaking'); }
function stopSpeech(){ speechSynthesis.cancel(); $('#status').textContent = ''; }

$('#rate').oninput = e => $('#rate-val').textContent = parseFloat(e.target.value).toFixed(1) + 'x';
$('#pitch').oninput = e => $('#pitch-val').textContent = parseFloat(e.target.value).toFixed(1);
$('#vol').oninput = e => $('#vol-val').textContent = Math.round(parseFloat(e.target.value)*100) + '%';

$('#play-btn').textContent = t('play');

if('speechSynthesis' in window){
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
} else {
  $('#voice').innerHTML = `<option>${t('noVoice')}</option>`;
}

$('#text').placeholder = t('placeholder');

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⚡', href:'/text/speed-reader.html', name:'Speed Reader'},
    {icon:'📖', href:'/text/bionic.html', name:'Bionic Reading'},
    {icon:'📊', href:'/text/reading-speed-test.html', name:'Reading Speed Test'},
    {icon:'🔊', href:'/dev/decibel-meter.html', name:'Decibel Meter'},
  ]
});
</script>
