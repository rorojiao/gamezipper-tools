<style>
.clamp-controls{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin:16px 0}
@media(max-width:700px){.clamp-controls{grid-template-columns:1fr 1fr}}
.clamp-field{display:flex;flex-direction:column;gap:4px}
.clamp-field label{font-size:.8em;font-weight:600;display:flex;justify-content:space-between}
.clamp-field label span{color:var(--gz-accent);font-family:monospace}
.clamp-field input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--glass);color:var(--text);font-size:.9em;box-sizing:border-box}
.clamp-field input:focus{outline:none;border-color:var(--gz-accent)}
.clamp-output{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:20px;margin:16px 0;text-align:center}
.clamp-output .code{font-family:monospace;font-size:1.1em;color:var(--gz-accent);word-break:break-all;cursor:pointer;padding:8px}
.clamp-output .copy-hint{font-size:.75em;color:var(--text2);margin-top:6px}
.clamp-preview{margin:16px 0;padding:20px;background:var(--glass);border:1px solid var(--border);border-radius:12px}
.clamp-preview-bar{height:40px;background:var(--gz-accent);border-radius:8px;transition:width .3s;min-width:20px}
.clamp-preview-text{margin-top:12px;line-height:1.3;transition:font-size .3s;text-align:center}
.clamp-calc{font-size:.85em;color:var(--text2);margin-top:12px;line-height:1.8;font-family:monospace}
.clamp-calc b{color:var(--gz-accent)}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"CSS Clamp() Generator","description":"Generate CSS clamp() functions for responsive typography and sizing. Preview fluid scaling between min and max values.","url":"https://tools.gamezipper.com/css-tools/clamp.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is CSS clamp()?","acceptedAnswer":{"@type":"Answer","text":"CSS clamp() takes three values: clamp(min, preferred, max). It returns the preferred value, but never smaller than min or larger than max. It is commonly used for responsive font sizes and element dimensions."}},{"@type":"Question","name":"How do I make font size responsive with clamp()?","acceptedAnswer":{"@type":"Answer","text":"Use clamp(1rem, 2.5vw, 2rem). The font will be at least 1rem, at most 2rem, and scale fluidly at 2.5vw between those bounds. This creates smooth typography scaling without media queries."}},{"@type":"Question","name":"What units can I use with clamp()?","acceptedAnswer":{"@type":"Answer","text":"You can mix units in clamp(). Common combinations: px for min/max with vw for the preferred value, or rem for min/max with vw for preferred. The browser resolves them relative to viewport and root font size."}},{"@type":"Question","name":"Does clamp() work in all browsers?","acceptedAnswer":{"@type":"Answer","text":"Yes. CSS clamp() is supported in all modern browsers: Chrome 79+, Firefox 75+, Safari 13.1+, Edge 79+. It has over 97% global support."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="clamp-controls" id="controls"></div>
    <div class="clamp-output" id="output"></div>
    <div class="clamp-preview" id="preview"></div>
    <div class="clamp-calc" id="calcInfo"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Clamp() Generator',
    toolDesc: 'Generate CSS clamp() functions for responsive typography and fluid sizing. Preview how values scale between breakpoints.',
    minVal: 'Minimum',
    maxVal: 'Maximum',
    vwVal: 'Preferred (vw)',
    unit: 'Unit',
    step1: 'Set the minimum value (e.g., 16px)',
    step2: 'Set the preferred viewport-based value (e.g., 2.5vw)',
    step3: 'Set the maximum value (e.g., 32px)',
    step4: 'Copy the generated clamp() function into your CSS',
    clickCopy: 'Click to copy',
    previewText: 'The quick brown fox jumps over the lazy dog',
    fluidRange: 'Fluid range',
    atMin: 'At minimum viewport',
    atMax: 'At maximum viewport',
  },
  zh: {
    toolTitle: 'CSS Clamp() 生成器',
    toolDesc: '生成 CSS clamp() 函数，实现响应式排版和流式尺寸。预览值在断点间如何缩放。',
    minVal: '最小值',
    maxVal: '最大值',
    vwVal: '首选值 (vw)',
    unit: '单位',
    step1: '设置最小值（例如 16px）',
    step2: '设置基于视口的首选值（例如 2.5vw）',
    step3: '设置最大值（例如 32px）',
    step4: '将生成的 clamp() 函数复制到 CSS 中',
    clickCopy: '点击复制',
    previewText: '敏捷的棕色狐狸跳过了懒狗',
    fluidRange: '流式范围',
    atMin: '最小视口时',
    atMax: '最大视口时',
  }
});

const { $, copyText, t } = GZ;

function update() {
  const min = parseFloat($('#min').value) || 0;
  const max = parseFloat($('#max').value) || 100;
  const vw = parseFloat($('#vw').value) || 2;
  const unit = $('#unit').value;
  const clampStr = `clamp(${min}${unit}, ${vw}vw, ${max}${unit})`;

  $('#output').innerHTML = `
    <div class="code" onclick="copyText('${clampStr}')">${clampStr}</div>
    <div class="copy-hint">${t('clickCopy')}</div>
  `;

  const fontSize = Math.max(min, Math.min(max, window.innerWidth * vw / 100));
  $('#preview').innerHTML = `
    <div class="clamp-preview-bar" style="width:${((fontSize - min) / (max - min || 1)) * 100}%;max-width:100%"></div>
    <div class="clamp-preview-text" style="font-size:${clampStr}">${t('previewText')}</div>
  `;

  $('#calcInfo').innerHTML = `
    <b>${t('fluidRange')}:</b> ${min}${unit} → ${max}${unit}<br>
    <b>${t('atMin')}:</b> ${min}${unit}<br>
    <b>${t('atMax')}:</b> ${max}${unit}<br>
    <b>CSS:</b> font-size: ${clampStr};
  `;
}

['min','max','vw','unit'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('input', update);
});

$('#controls').innerHTML = `
  <div class="clamp-field"><label>${t('minVal')} <span id="min-val">16</span></label><input type="number" id="min" value="16" step="0.5"></div>
  <div class="clamp-field"><label>${t('vwVal')} <span id="vw-val">2.5</span></label><input type="number" id="vw" value="2.5" step="0.1"></div>
  <div class="clamp-field"><label>${t('maxVal')} <span id="max-val">32</span></label><input type="number" id="max" value="32" step="0.5"></div>
  <div class="clamp-field"><label>${t('unit')}</label>
    <select id="unit" style="padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--glass);color:var(--text);font-size:.9em">
      <option value="px">px</option>
      <option value="rem">rem</option>
      <option value="em">em</option>
      <option value="vh">vh</option>
    </select>
  </div>
`;

// Re-bind after innerHTML
document.getElementById('min').addEventListener('input', function(){ document.getElementById('min-val').textContent = this.value; });
document.getElementById('vw').addEventListener('input', function(){ document.getElementById('vw-val').textContent = this.value; });
document.getElementById('max').addEventListener('input', function(){ document.getElementById('max-val').textContent = this.value; });
document.getElementById('unit').addEventListener('change', update);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText(document.querySelector('.code')?.textContent||'')">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#min').value=16;$('#vw').value=2.5;$('#max').value=32;$('#unit').value='px';update()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#min').value=14;$('#vw').value=1.5;$('#max').value=24;$('#unit').value='px';update()">14→24px</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#min').value=1;$('#vw').value=2.5;$('#max').value=2;$('#unit').value='rem';update()">1→2rem</button>
`;

update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📏', href:'/css-tools/line-height.html', name:'Line Height'},
    {icon:'📐', href:'/dev/rem-px.html', name:'REM ↔ PX'},
    {icon:'✨', href:'/css-tools/animation.html', name:'CSS Animation'},
    {icon:'🎨', href:'/css-tools/gradient.html', name:'CSS Gradient'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
