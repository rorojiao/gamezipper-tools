.cr-section{margin-bottom:24px}
.cr-section h3{font-size:1rem;color:var(--accent);margin-bottom:10px}
.cr-fields{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.cr-field{background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.cr-field .num{font-family:monospace;font-size:1.3em;font-weight:800;color:var(--accent)}
.cr-field .lbl{font-size:.75em;opacity:.7;margin-top:2px}
.cr-field .rng{font-size:.7em;opacity:.5;margin-top:2px;font-family:monospace}
@media(max-width:600px){.cr-fields{grid-template-columns:repeat(5,1fr);font-size:.8em}}
.cr-syntax-table{width:100%;border-collapse:collapse;font-size:.85em}
.cr-syntax-table th,.cr-syntax-table td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:left}
.cr-syntax-table th{color:var(--accent);font-weight:700;font-size:.8em}
.cr-syntax-table td:first-child{font-family:monospace;color:var(--accent);font-weight:600;white-space:nowrap}
.cr-card{background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:6px;display:grid;grid-template-columns:minmax(180px,260px) 1fr auto;gap:12px;align-items:center;transition:.2s}
.cr-card:hover{background:var(--glass2)}
.cr-expr{font-family:monospace;font-size:.85em;font-weight:700;color:var(--accent);word-break:break-all}
.cr-info .cr-name{font-weight:600;font-size:.88em}
.cr-info .cr-desc{font-size:.78em;opacity:.7;margin-top:2px}
.cr-copy{background:var(--glass2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:.8em;white-space:nowrap}
@media(max-width:600px){.cr-card{grid-template-columns:1fr auto}}
.cr-special{background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:8px 14px;margin-bottom:4px;display:grid;grid-template-columns:minmax(120px,160px) 1fr auto;gap:12px;align-items:center}
.cr-special .sp-name{font-family:monospace;font-weight:700;color:#ffd93d;font-size:.85em}
.cr-special .sp-equiv{font-family:monospace;font-size:.78em;opacity:.6}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a cron expression?","acceptedAnswer":{"@type":"Answer","text":"A cron expression is a string of 5 fields that defines a schedule for running tasks automatically. The fields represent minute, hour, day-of-month, month and day-of-week. For example, '0 9 * * 1-5' means 9:00 AM on weekdays."}},{"@type":"Question","name":"How do I run a cron job every 5 minutes?","acceptedAnswer":{"@type":"Answer","text":"Use the expression '*/5 * * * *'. The */5 in the minute field means every 5 minutes. The asterisks in the other fields mean every hour, every day, every month, and every day of the week."}},{"@type":"Question","name":"What does * mean in cron?","acceptedAnswer":{"@type":"Answer","text":"An asterisk (*) means every possible value for that field. In the hour field it means every hour; in the day-of-month field it means every day of the month. Combined as '* * * * *' it runs every minute."}},{"@type":"Question","name":"What is the @daily special string?","acceptedAnswer":{"@type":"Answer","text":"@daily is a shorthand for '0 0 * * *' — it runs the task once a day at midnight (00:00). Similarly @hourly runs at the top of every hour, @weekly runs at midnight on Sunday, and @yearly/@annually runs once a year on January 1st."}}]}</script>

  },
  zh: {

    fieldsTitle: '5 个字段',
    syntaxTitle: '操作符 / 语法',
    commonTitle: '常用计划',
    specialTitle: '特殊字符串（@简写）',
    fieldMinute: '分钟',
    fieldHour: '小时',
    fieldDom: '日（月中）',
    fieldMonth: '月',
    fieldDow: '周（周中）',
    copy: '复制',
    field: '字段',
    meaning: '含义',
    example: '示例',
    opAny: '任意值',
    opList: '值列表',
    opRange: '范围',
    opStep: '步进值',
    sch1Name: '每分钟',
    sch1Desc: '每分钟运行一次',

    spWeekly2: '每周一次 (0 0 * * 0)',
    spDaily2: '每天一次 (0 0 * * *)',
    spHourly2: '每小时一次 (0 * * * *)',
    step1: '查看顶部的 5 字段结构',
    step2: '在语法表中查找操作符',
    step3: '浏览常用计划并复制所需表达式',
    step4: '使用特殊 @简写如 @daily 作为快捷方式',
  }
});

const { copyText, t } = GZ;

const FIELDS = [
  {num:'1',lblKey:'fieldMinute',rng:'0-59'},
  {num:'2',lblKey:'fieldHour',rng:'0-23'},
  {num:'3',lblKey:'fieldDom',rng:'1-31'},
  {num:'4',lblKey:'fieldMonth',rng:'1-12 / JAN-DEC'},
  {num:'5',lblKey:'fieldDow',rng:'0-6 / SUN-SAT'},
];

const SYNTAX = [
  {s:'*',mKey:'opAny',ex:'* * * * *'},
  {s:'5',mKey:'opAny',ex:'5 0 * * * (minute 5)'},
  {s:','  ,mKey:'opList',ex:'0,15,30,45 * * * *'},
  {s:'-',mKey:'opRange',ex:'0 9-17 * * * (9am–5pm)'},
  {s:'/',mKey:'opStep',ex:'*/15 * * * * (every 15 min)'},
];

const SCHEDULES = [
  {expr:'* * * * *',nameKey:'sch1Name',descKey:'sch1Desc'},
  {expr:'*/5 * * * *',nameKey:'sch5Name',descKey:'sch5Desc'},
  {expr:'*/15 * * * *',nameKey:'sch15Name',descKey:'sch15Desc'},
  {expr:'*/30 * * * *',nameKey:'sch30Name',descKey:'sch30Desc'},
  {expr:'0 * * * *',nameKey:'schHourName',descKey:'schHourDesc'},
  {expr:'0 */6 * * *',nameKey:'sch6hName',descKey:'sch6hDesc'},
  {expr:'0 0 * * *',nameKey:'schDailyName',descKey:'schDailyDesc'},
  {expr:'0 9 * * 1-5',nameKey:'sch9amName',descKey:'sch9amDesc'},
  {expr:'0 0 * * 0',nameKey:'schWeeklyName',descKey:'schWeeklyDesc'},
  {expr:'0 0 1 * *',nameKey:'schMonthlyName',descKey:'schMonthlyDesc'},
  {expr:'0 0 1 1 *',nameKey:'schYearlyName',descKey:'schYearlyDesc'},
];

const SPECIALS = [
  {name:'@reboot',descKey:'spReboot',equiv:'(at startup)'},
  {name:'@yearly',descKey:'spYearly2',equiv:'0 0 1 1 *'},
  {name:'@annually',descKey:'spAnnually',equiv:'0 0 1 1 *'},
  {name:'@monthly',descKey:'spMonthly2',equiv:'0 0 1 * *'},
  {name:'@weekly',descKey:'spWeekly2',equiv:'0 0 * * 0'},
  {name:'@daily',descKey:'spDaily2',equiv:'0 0 * * *'},
  {name:'@hourly',descKey:'spHourly2',equiv:'0 * * * *'},
];

let html = '';

// Fields
html += `<div class="cr-section"><h3>${t('fieldsTitle')}</h3><div class="cr-fields">`;
for (const f of FIELDS) {
  html += `<div class="cr-field"><div class="num">${f.num}</div><div class="lbl">${t(f.lblKey)}</div><div class="rng">${f.rng}</div></div>`;
}
html += `</div></div>`;

// Syntax
html += `<div class="cr-section"><h3>${t('syntaxTitle')}</h3>`;
html += `<table class="cr-syntax-table"><thead><tr><th>${t('field')}</th><th>${t('meaning')}</th><th>${t('example')}</th></tr></thead><tbody>`;
for (const s of SYNTAX) {
  html += `<tr><td>${s.s==='*'?s.s:(s.s===','||s.s==='-'||s.s==='/'?s.s:s.s)}</td><td>${t(s.mKey)}</td><td><code style="font-family:monospace;font-size:.85em">${s.ex}</code></td></tr>`;
}
html += `</tbody></table></div>`;

// Common schedules
html += `<div class="cr-section"><h3>${t('commonTitle')}</h3>`;
for (const s of SCHEDULES) {
  const esc = s.expr.replace(/'/g,"\\'");
  html += `<div class="cr-card">
    <div class="cr-expr">${s.expr}</div>
    <div class="cr-info"><div class="cr-name">${t(s.nameKey)}</div><div class="cr-desc">${t(s.descKey)}</div></div>
    <button class="cr-copy" onclick="copyText('${esc}')">${t('copy')}</button>
  </div>`;
}
html += `</div>`;

// Special strings
html += `<div class="cr-section"><h3>${t('specialTitle')}</h3>`;
for (const s of SPECIALS) {
  const esc = s.name;
  html += `<div class="cr-special">
    <div class="sp-name">${s.name}</div>
    <div class="sp-equiv">${t(s.descKey)} → <code style="font-family:monospace">${s.equiv}</code></div>
    <button class="cr-copy" onclick="copyText('${esc}')">${t('copy')}</button>
  </div>`;
}
html += `</div>`;

document.getElementById('content').innerHTML = html;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

});
