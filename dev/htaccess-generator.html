const {$,t,copyText}=GZ;
function generate(){const out=['# .htaccess generated by tools.gamezipper.com'];const domain=$('#domain').value.trim().replace(/^https?:\/\//,'').replace(/\/$/,'');if($('#https').checked||$('#host').value!=='none'){out.push('','<IfModule mod_rewrite.c>','  RewriteEngine On');if($('#https').checked)out.push('  RewriteCond %{HTTPS} !=on','  RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]');if(domain&&$('#host').value==='www')out.push(`  RewriteCond %{HTTP_HOST} !^www\\. [NC]`,`  RewriteRule ^ https://www.${domain}%{REQUEST_URI} [L,R=301]`);if(domain&&$('#host').value==='nonwww')out.push(`  RewriteCond %{HTTP_HOST} ^www\\. [NC]`,`  RewriteRule ^ https://${domain}%{REQUEST_URI} [L,R=301]`);out.push('</IfModule>')}
const reds=$('#redirects').value.split('\n').map(x=>x.trim()).filter(Boolean);if(reds.length){out.push('','# Custom 301 redirects');reds.forEach(line=>{const p=line.split(/\s+/);if(p.length>1)out.push(`Redirect 301 ${safePath(p[0])} ${p.slice(1).join(' ')}`)})}if($('#compression').checked)out.push('','<IfModule mod_deflate.c>','  AddOutputFilterByType DEFLATE text/html text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml','</IfModule>');if($('#cache').checked)out.push('','<IfModule mod_expires.c>','  ExpiresActive On','  ExpiresByType text/css "access plus 1 month"','  ExpiresByType application/javascript "access plus 1 month"','  ExpiresByType image/jpeg "access plus 1 year"','  ExpiresByType image/png "access plus 1 year"','  ExpiresByType image/webp "access plus 1 year"','  ExpiresByType image/svg+xml "access plus 1 year"','  ExpiresByType font/woff2 "access plus 1 year"','</IfModule>');if($('#indexing').checked)out.push('','# Prevent directory listing','Options -Indexes');if($('#headers').checked)out.push('','<IfModule mod_headers.c>','  Header always set X-Content-Type-Options "nosniff"','  Header always set X-Frame-Options "SAMEORIGIN"','  Header always set Referrer-Policy "strict-origin-when-cross-origin"','  Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"','</IfModule>');if($('#protect').checked)out.push('','# Protect sensitive files','<FilesMatch "^(\\.htaccess|\\.htpasswd|\\.env|composer\\.(json|lock)|package(-lock)?\\.json)$">','  Require all denied','</FilesMatch>');if($('#hotlink').checked&&domain)out.push('','<IfModule mod_rewrite.c>','  RewriteEngine On','  RewriteCond %{HTTP_REFERER} !^$','  RewriteCond %{HTTP_REFERER} !^https?://(www\\.)?'+domain.replace(/\./g,'\\.')+'/ [NC]','  RewriteRule \\.(jpe?g|png|gif|webp|svg)$ - [F,L]','</IfModule>');if($('#e404').value.trim())out.push('',`ErrorDocument 404 ${safePath($('#e404').value.trim())}`);if($('#e403').value.trim())out.push(`ErrorDocument 403 ${safePath($('#e403').value.trim())}`);$('#output').textContent=out.join('\n').trim()+'\n'}
function safePath(s){return s.replace(/[\r\n]/g,'')}

document.querySelectorAll('input,select,textarea').forEach(x=>x.addEventListener('input',generate));$('#copy').onclick=()=>copyText($('#output').textContent);$('#download').onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([$('#output').textContent],{type:'text/plain'}));a.download='.htaccess';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)};$('#example').onclick=()=>{$('#https').checked=true;$('#host').value='nonwww';$('#domain').value='example.com';$('#redirects').value='/old-page /new-page\n/old-guide.pdf https://example.com/guides/new.pdf';$('#hotlink').checked=true;$('#e404').value='/404.html';generate()};labels();generate();
