<script>
GZI18n.register({
  en: {

    step4: '复制有效邮箱或下载报告',
    valid: '有效',
    invalid: '无效',
    total: '总计',
    reasonTypo: '域名可能有拼写错误',
    reasonNoTld: '缺少顶级域名',
    reasonEmptyLocal: '本地部分为空',
    reasonBadChars: '包含无效字符',
    reasonBadFormat: '格式无效',
    reasonDisposable: '一次性邮箱域名',
    copyValid: '复制有效邮箱',
  }
});

const { $, copyText, t } = GZ;

const DISPOSABLE_DOMAINS = new Set(['mailinator.com','guerrillamail.com','guerrillamailblock.com','sharklasers.com','grr.la','guerrillamail.biz','guerrillamail.de','guerrillamail.info','guerrillamail.net','guerrillamail.org','spam4.me','yopmail.com','yopmail.fr','yopmail.net','jetable.org','jetable.fr','jetable.net','mailforspam.com','safetymail.info','filzmail.com','nabuma.com','mailnesia.com']);

const DOMAIN_TYPOS = {'gamil.com':'gmail.com','gmali.com':'gmail.com','gmal.com':'gmail.com','gmai.com':'gmail.com','gmail.con':'gmail.com','gmail.cmo':'gmail.com','gmail.co':'gmail.com','gmaill.com':'gmail.com','hotmal.com':'hotmail.com','hotmai.com':'hotmail.com','hotmail.con':'hotmail.com','hotmial.com':'hotmail.com','yaho.com':'yahoo.com','yahooo.com':'yahoo.com','yahoo.con':'yahoo.com','outlok.com':'outlook.com','outlook.con':'outlook.com'};

const EMAIL_RE = /^[a-zA-Z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*\.[a-zA-Z]{2,}$/;

function validateEmail(email) {
  email = email.trim();
  if (!email) return { valid: false, reason: '' };

  // Basic structure check
  const atIndex = email.indexOf('@');
  if (atIndex < 1) return { valid: false, email, reason: t('reasonBadFormat') };
  if (atIndex === email.length - 1) return { valid: false, email, reason: t('reasonNoTld') };

  const local = email.substring(0, atIndex);
  const domain = email.substring(atIndex + 1);

  if (!local) return { valid: false, email, reason: t('reasonEmptyLocal') };
  if (/[<>"\s]/.test(email)) return { valid: false, email, reason: t('reasonBadChars') };

  // Domain TLD check
  if (!/\.[a-zA-Z]{2,}$/.test(domain)) return { valid: false, email, reason: t('reasonNoTld') };

  // Typo check
  const lowerDomain = domain.toLowerCase();
  if (DOMAIN_TYPOS[lowerDomain]) return { valid: false, email, reason: `${t('reasonTypo')} → ${DOMAIN_TYPOS[lowerDomain]}` };

  // Disposable check
  if (DISPOSABLE_DOMAINS.has(lowerDomain)) return { valid: false, email, reason: t('reasonDisposable') };

  // Full regex check
  if (!EMAIL_RE.test(email)) return { valid: false, email, reason: t('reasonBadFormat') };

  return { valid: true, email };
}

function validateAll() {
  const text = $('#input').value.trim();
  if (!text) { $('#results').innerHTML = ''; $('#stats').innerHTML = ''; return; }

  const emails = text.split(/[\n,;]+/).map(e => e.trim()).filter(Boolean);
  const results = emails.map(validateEmail);
  const validCount = results.filter(r => r.valid).length;
  const invalidCount = results.length - validCount;

  $('#stats').innerHTML = `
    <span style="color:var(--gz-success)">✓ ${validCount} ${t('valid')}</span>
    <span style="color:var(--gz-accent)">✗ ${invalidCount} ${t('invalid')}</span>
    <span>${results.length} ${t('total')}</span>`;

  let html = '';
  for (const r of results) {
    const cls = r.valid ? 'val-valid' : 'val-invalid';
    const icon = r.valid ? '✅' : '❌';
    html += `<div class="val-row ${cls}">
      <span class="val-icon">${icon}</span>
      <span class="val-email">${escHtml(r.email)}</span>
      ${r.reason ? `<span class="val-reason">${escHtml(r.reason)}</span>` : ''}
    </div>`;
  }
  $('#results').innerHTML = html;
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function copyValid() {
  const text = $('#input').value.trim();
  if (!text) return;
  const emails = text.split(/[\n,;]+/).map(e => e.trim()).filter(Boolean);
  const valid = emails.filter(e => validateEmail(e).valid);
  copyText(valid.join('\n'));
}

function loadExample() {
  $('#input').value = 'alice@gmail.com\nbob@gamil.com\ncarol@example\nnot-an-email\ndave.smith@company.co.uk\neve@yopmail.com\nfrank@outlook.com\ninvalid@\ntest@domain.con\nhello@world.org';
  validateAll();
}

function doClear() { $('#input').value=''; $('#results').innerHTML=''; $('#stats').innerHTML=''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="validateAll()">${t('validate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyValid()">${t('copyValid')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

    {icon:'🔗', href:'/dev/url-encode.html', name:'URL Encoder'},
  ]
});
</script>
