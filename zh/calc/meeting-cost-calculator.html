<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Meeting Cost Calculator","description":"Free meeting cost calculator. See the real price of every meeting — attendees x hourly rate x duration. Calculate one-time, weekly, monthly and annual meeting costs instantly. No signup.","url": "https://tools.gamezipper.com/zh/calc/meeting-cost-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is the cost of a meeting calculated?", "acceptedAnswer": {"@type": "Answer", "text": "Meeting cost = number of attendees x average hourly cost x meeting duration in hours. For example, 6 people earning an average of $40/hour in a 1-hour meeting costs $240. This calculator also rolls that up into weekly, monthly and annual totals based on how often the meeting recurs."}}, {"@type": "Question", "name": "Why should I use a fully-loaded hourly rate?", "acceptedAnswer": {"@type": "Answer", "text": "Salary alone understates the true cost. Benefits, taxes, office space, equipment and management overhead typically add 20-40% on top of base pay. Using a fully-loaded rate (often 1.25x to 1.4x salary) gives a more realistic picture of what a meeting actually costs the business."}}, {"@type": "Question", "name": "How do I convert an annual salary to an hourly rate?", "acceptedAnswer": {"@type": "Answer", "text": "Divide the annual salary by the number of working hours in a year. The standard US assumption is 2,080 hours (52 weeks x 40 hours). So an $80,000 salary equals about $38.46 per hour. This calculator can do the conversion for you automatically."}}, {"@type": "Question", "name": "Is my data private?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. All calculations happen entirely in your browser. No salary data, attendee counts or any other input is ever sent to a server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="mc-grid">
      <div class="mc-card">
        <h3>💬 <span id="lblInput"></span></h3>
        <div class="mc-mode-toggle">
          <button id="modeHourly" class="active" onclick="setMode('hourly')"></button>
          <button id="modeSalary" onclick="setMode('salary')"></button>
        </div>
        <div class="mc-field">
          <label id="lblAttendees"></label>
          <input type="number" id="attendees" value="6" min="1" max="1000" step="1">
        </div>
        <div class="mc-field" id="fieldHourly">
          <label id="lblRate"></label>
          <input type="number" id="rate" value="45" min="0" step="0.5">
          <div class="hint" id="hintRate"></div>
        </div>
        <div class="mc-field" id="fieldSalary" style="display:none">
          <label id="lblSalary"></label>
          <input type="number" id="salary" value="90000" min="0" step="1000">
          <div class="hint" id="hintSalary"></div>
        </div>
        <div class="mc-field">
          <label id="lblLoad"></label>
          <input type="number" id="load" value="1.3" min="1" max="3" step="0.05">
          <div class="hint" id="hintLoad"></div>
        </div>
        <div class="mc-field">
          <label id="lblDuration"></label>
          <div style="display:flex;gap:8px">
            <input type="number" id="durH" value="1" min="0" max="24" step="1" style="flex:1">
            <input type="number" id="durM" value="0" min="0" max="59" step="5" style="flex:1">
          </div>
          <div class="hint" id="hintDur"></div>
        </div>
        <div class="mc-field">
          <label id="lblFreq"></label>
          <select id="freq">
            <option value="1" id="optOnce"></option>
            <option value="5" id="optDaily"></option>
            <option value="1" id="optWeekly"></option>
            <option value="4.345" id="optMonthly"></option>
          </select>
          <div class="hint" id="hintFreq"></div>
        </div>
        <div class="mc-field">
          <label id="lblCurrency"></label>
          <input type="text" id="currency" value="$" maxlength="3" style="width:80px">
        </div>
      </div>
      <div class="mc-card">
        <h3>📊 <span id="lblResults"></span></h3>
        <div class="mc-result" id="results"></div>
        <div class="mc-note" id="note"></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Meeting Cost Calculator',
    toolDesc: 'See the real price of every meeting. Enter attendees, hourly rate and duration to calculate one-time, weekly, monthly and annual meeting costs.',
    input: 'Meeting Details', results: 'Cost Breakdown',
    modeHourly: 'Hourly rate', modeSalary: 'Annual salary',
    attendees: 'Number of attendees', rate: 'Average hourly rate ($)', salary: 'Average annual salary ($)',
    load: 'Loaded cost multiplier', duration: 'Duration', hours: 'h', minutes: 'min',
    frequency: 'How often', currency: 'Currency',
    optOnce: 'One-time', optDaily: 'Daily (5x/week)', optWeekly: 'Weekly', optMonthly: 'Monthly',
    perMeeting: 'Cost per meeting', perMinute: 'Cost per minute', perAttendee: 'Cost per attendee',
    perWeek: 'Weekly cost', perMonth: 'Monthly cost', perYear: 'Annual cost',
    example: '🧪 Example', reset: '🔄 Reset', copy: '📋 Copy',
    hintRate: 'Use a fully-loaded rate (salary ÷ 2,080h) to include benefits and overhead.',
    hintSalary: 'Divided by 2,080 working hours/year to get an hourly rate.',
    hintLoad: '1.0 = raw salary. 1.3 = typical US loaded cost (benefits, taxes, overhead).',
    hintDur: 'Enter hours and minutes for the meeting length.',
    hintFreq: 'How many times this meeting happens in a week or month.',
    step1: 'Enter the number of people attending the meeting',
    step2: 'Set the average hourly rate or annual salary (loaded cost multiplies it for benefits and overhead)',
    step3: 'Enter the meeting duration in hours and minutes',
    step4: 'Choose how often the meeting recurs and read the per-meeting, monthly and annual cost',
  },
  zh: {
    toolTitle: '会议成本计算器',
    toolDesc: '查看每场会议的真实花费。输入参会人数、时薪和时长，计算一次性、每周、每月和每年的会议成本。',
    input: '会议详情', results: '成本明细',
    modeHourly: '按时薪', modeSalary: '按年薪',
    attendees: '参会人数', rate: '平均时薪 ($)', salary: '平均年薪 ($)',
    load: '综合成本系数', duration: '时长', hours: '小时', minutes: '分钟',
    frequency: '会议频率', currency: '货币符号',
    optOnce: '一次性', optDaily: '每天（每周 5 次）', optWeekly: '每周', optMonthly: '每月',
    perMeeting: '单次会议成本', perMinute: '每分钟成本', perAttendee: '人均成本',
    perWeek: '每周成本', perMonth: '每月成本', perYear: '每年成本',
    example: '🧪 示例', reset: '🔄 重置', copy: '📋 复制',
    hintRate: '请使用综合时薪（年薪 ÷ 2080 小时）以包含福利和管理开销。',
    hintSalary: '将年薪除以每年 2080 工作小时得到时薪。',
    hintLoad: '1.0 = 纯工资。1.3 = 美国典型综合成本（含福利、税费、管理开销）。',
    hintDur: '输入会议的小时和分钟数。',
    hintFreq: '该会议在每周或每月内召开多少次。',
    step1: '输入参会人数',
    step2: '设置平均时薪或年薪（综合成本系数会乘以薪资以包含福利和管理开销）',
    step3: '输入会议的小时和分钟时长',
    step4: '选择会议频率，查看单次、每月和每年成本',
  }
});

const { $, copyText, t } = GZ;

// Bind labels
$('#lblInput').textContent = t('input');
$('#lblResults').textContent = t('results');
$('#modeHourly').textContent = t('modeHourly');
$('#modeSalary').textContent = t('modeSalary');
$('#lblAttendees').textContent = t('attendees');
$('#lblRate').textContent = t('rate');
$('#lblSalary').textContent = t('salary');
$('#lblLoad').textContent = t('load');
$('#lblDuration').textContent = t('duration');
$('#lblFreq').textContent = t('frequency');
$('#lblCurrency').textContent = t('currency');
$('#hintRate').textContent = t('hintRate');
$('#hintSalary').textContent = t('hintSalary');
$('#hintLoad').textContent = t('hintLoad');
$('#hintDur').textContent = t('hintDur');
$('#hintFreq').textContent = t('hintFreq');
$('#optOnce').textContent = t('optOnce');
$('#optDaily').textContent = t('optDaily');
$('#optWeekly').textContent = t('optWeekly');
$('#optMonthly').textContent = t('optMonthly');

let mode = 'hourly';

function setMode(m) {
  mode = m;
  $('#modeHourly').classList.toggle('active', m === 'hourly');
  $('#modeSalary').classList.toggle('active', m === 'salary');
  $('#fieldHourly').style.display = m === 'hourly' ? '' : 'none';
  $('#fieldSalary').style.display = m === 'salary' ? '' : 'none';
  calc();
}
window.setMode = setMode;

function hourlyRate() {
  if (mode === 'salary') {
    const salary = +$('#salary').value || 0;
    return salary / 2080;
  }
  return +$('#rate').value || 0;
}

function fmt(n) {
  const cur = $('#currency').value || '$';
  return cur + (n || 0).toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function calc() {
  const attendees = +$('#attendees').value || 0;
  const rate = hourlyRate();
  const load = +$('#load').value || 1;
  const durH = +$('#durH').value || 0;
  const durM = +$('#durM').value || 0;
  const duration = durH + durM / 60;
  const freqSel = $('#freq');
  const freqText = freqSel.options[freqSel.selectedIndex].id;

  const loadedRate = rate * load;
  const perMeeting = attendees * loadedRate * duration;
  const perMinute = duration > 0 ? perMeeting / (duration * 60) : 0;
  const perAttendee = loadedRate * duration;

  let perWeek = 0, perMonth = 0, perYear = 0;
  if (freqText === 'optOnce') { perWeek = perMeeting; perMonth = perMeeting; perYear = perMeeting; }
  else if (freqText === 'optDaily') { const w = +freqSel.value; perWeek = perMeeting * w; perMonth = perWeek * 4.345; perYear = perWeek * 52; }
  else if (freqText === 'optWeekly') { perWeek = perMeeting; perMonth = perWeek * 4.345; perYear = perWeek * 52; }
  else if (freqText === 'optMonthly') { perMonth = perMeeting; perWeek = perMonth / 4.345; perYear = perMonth * 12; }

  const maxAnnual = Math.max(perYear, perMonth * 12, perMeeting * 52, 1);
  const barPct = perYear > 0 ? Math.min(100, (perYear / maxAnnual) * 100) : 0;

  $('#results').innerHTML = `
    <div class="cell hero"><div class="l">${t('perMeeting')}</div><div class="v">${fmt(perMeeting)}</div></div>
    <div class="cell"><div class="l">${t('perMinute')}</div><div class="v">${fmt(perMinute)}</div></div>
    <div class="cell"><div class="l">${t('perAttendee')}</div><div class="v">${fmt(perAttendee)}</div></div>
    <div class="cell"><div class="l">${t('perWeek')}</div><div class="v">${fmt(perWeek)}</div></div>
    <div class="cell annual"><div class="l">${t('perYear')}</div><div class="v">${fmt(perYear)}</div></div>
    <div class="mc-bar" style="grid-column:1/-1"><div style="width:${barPct}%"></div></div>
    <div class="cell" style="grid-column:1/-1"><div class="l">${t('perMonth')}</div><div class="v">${fmt(perMonth)}</div></div>
  `;
  $('#note').textContent = `${loadedRate.toFixed(2)}/h × ${attendees} × ${duration.toFixed(2)}h = ${fmt(perMeeting)}`;
  window._summary = `${t('perMeeting')}: ${fmt(perMeeting)} | ${t('perMonth')}: ${fmt(perMonth)} | ${t('perYear')}: ${fmt(perYear)}`;
}

function loadExample() {
  setMode('salary');
  $('#attendees').value = 8;
  $('#salary').value = 110000;
  $('#load').value = 1.3;
  $('#durH').value = 0;
  $('#durM').value = 30;
  $('#freq').selectedIndex = 2;
  calc();
}

function doReset() {
  setMode('hourly');
  $('#attendees').value = 6;
  $('#rate').value = 45;
  $('#load').value = 1.3;
  $('#durH').value = 1;
  $('#durM').value = 0;
  $('#freq').selectedIndex = 0;
  calc();
}

['attendees','rate','salary','load','durH','durM','freq','currency'].forEach(id => {
  $('#' + id).addEventListener('input', calc);
  $('#' + id).addEventListener('change', calc);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doReset()">${t('reset')}</button>
  <button class="gz-btn" onclick="copyText(window._summary)">${t('copy')}</button>`;

window.loadExample = loadExample;
window.doReset = doReset;
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🕒', href:'/calc/timesheet-calculator.html', name:'Timesheet'},
    {icon:'💰', href:'/calc/freelancer-rate.html', name:'Freelancer Rate'},
    {icon:'💵', href:'/calc/paycheck-calculator.html', name:'Paycheck'},
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro Timer'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
