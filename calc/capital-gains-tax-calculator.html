<script>
GZI18n.register({
  en: {
    toolTitle: 'Capital Gains Tax Calculator',
    toolDesc: 'Estimate US federal capital gains tax for 2025. Enter cost basis, sale price, holding period, income and filing status to see whether your gain is long-term or short-term, the applicable rate, tax owed and net proceeds.',
    inputs: 'Investment Details', stats: 'Tax Estimate',
    cost: 'Purchase price (cost basis)', sale: 'Sale price', months: 'Holding period (months)', income: 'Other taxable income', status: 'Filing status',
    heroLbl: 'Estimated Federal Tax', heroSub: 'On the capital gain only',
    gain: 'Capital Gain', type: 'Gain Type', rate: 'Effective Rate', net: 'Net After-Tax Proceeds',
    copy: '📋 Copy Results', reset: '🔄 Reset', example: '🧪 Load Example',
    lt: 'Long-Term', st: 'Short-Term',
    step1: 'Enter what you originally paid for the asset',
    step2: 'Enter the sale price and how many months you held it',
    step3: 'Enter your other taxable income and filing status',
    step4: 'See your gain type, tax rate, tax owed and net proceeds',
  },
  zh: {
    toolTitle: '资本利得税计算器',
    toolDesc: '估算 2025 年美国联邦资本利得税。输入买入价、卖出价、持有期限、其他应税收入和申报身份，即可判断长期或短期利得、适用税率、应缴税款和税后净收益。',
    inputs: '投资详情', stats: '税款估算',
    cost: '买入价（成本基础）', sale: '卖出价', months: '持有期限（月）', income: '其他应税收入', status: '申报身份',
    heroLbl: '预估联邦税', heroSub: '仅针对资本利得',
    gain: '资本利得', type: '利得类型', rate: '实际税率', net: '税后净收益',
    copy: '📋 复制结果', reset: '🔄 重置', example: '🧪 加载示例',
    lt: '长期', st: '短期',
    step1: '输入你购买该资产时支付的价格',
    step2: '输入卖出价以及持有月数',
    step3: '输入其他应税收入和申报身份',
    step4: '查看利得类型、税率、应缴税款和税后净收益',
  }
});

const { $, copyText, t } = GZ;
const isZh = GZI18n.getLang() === 'zh';

$('#lblInputs').textContent = t('inputs');
$('#lblStats').textContent = t('stats');
$('#lblCost').textContent = t('cost');
$('#lblSale').textContent = t('sale');
$('#lblMonths').textContent = t('months');
$('#lblIncome').textContent = t('income');
$('#lblStatus').textContent = t('status');
$('#heroLbl').textContent = t('heroLbl');
$('#heroSub').textContent = t('heroSub');
$('#lGain').textContent = t('gain');
$('#lType').textContent = t('type');
$('#lRate').textContent = t('rate');
$('#lNet').textContent = t('net');

function fmt(n) { return '$' + Math.round(n||0).toLocaleString(); }

// 2025 US long-term capital gains brackets: [0% cap, 15% cap, 20% above] based on taxable income
const LT_2025 = {
  single: [48350, 533400],
  mfj:    [96700, 600050],
  hoh:    [64750, 566700],
  mfs:    [48350, 300000],
};
// 2025 ordinary income tax brackets (top marginal rate lookup), simplified 7-bracket
const ORD_2025 = {
  single: [[11925,0.10],[48475,0.12],[103350,0.22],[197300,0.24],[250525,0.32],[626350,0.35],[Infinity,0.37]],
  mfj:    [[23850,0.10],[96950,0.12],[206700,0.22],[394600,0.24],[501050,0.32],[751600,0.35],[Infinity,0.37]],
  hoh:    [[17000,0.10],[64850,0.12],[103350,0.22],[197300,0.24],[250500,0.32],[626350,0.35],[Infinity,0.37]],
  mfs:    [[11925,0.10],[48475,0.12],[103350,0.22],[197300,0.24],[250525,0.32],[375800,0.35],[Infinity,0.37]],
};
// NIIT thresholds
const NIIT = { single: 200000, mfj: 250000, hoh: 200000, mfs: 125000 };

function ordinaryTaxOn(amount, brackets) {
  // approximate progressive tax on `amount` of income using bracket caps
  let tax = 0, prev = 0;
  for (const [cap, rate] of brackets) {
    if (amount > cap) { tax += (cap - prev) * rate; prev = cap; }
    else { tax += (amount - prev) * rate; prev = amount; break; }
  }
  return tax;
}

function calc() {
  const cost = +$('#cost').value || 0;
  const sale = +$('#sale').value || 0;
  const months = +$('#months').value || 0;
  const income = Math.max(0, +$('#income').value || 0);
  const status = $('#status').value;
  const gain = sale - cost;

  if (sale <= 0 || gain <= 0) {
    $('#taxVal').textContent = '$0';
    $('#heroSub').textContent = isZh ? '没有可纳税的资本利得' : 'No taxable capital gain';
    ['gain','type','rate','net'].forEach(id => { const el=$('#'+id); el.textContent = '—'; el.className = id==='gain'?'v':'v'; });
    $('#net').textContent = fmt(sale);
    $('#net').className = 'v';
    $('#note').textContent = isZh ? '卖出价需高于买入价才会产生应税资本利得。' : 'The sale price must exceed the cost basis to create a taxable capital gain.';
    return;
  }

  const isLT = months > 12;
  const totalTaxable = income + gain;
  let tax = 0, rateUsed = 0;

  if (isLT) {
    // long-term: apply 0/15/20% on the portion of totalTaxable within each bracket above `income`
    const [cap0, cap15] = LT_2025[status];
    const rate = (top) => top <= cap0 ? 0 : top <= cap15 ? 0.15 : 0.20;
    // incremental tax from income to totalTaxable
    function ltTax(from, to) {
      if (to <= from) return 0;
      const rFrom = rate(from), rTo = rate(to);
      if (rFrom === rTo) return (to - from) * rFrom;
      // bracket boundary between from and to
      const boundary = (rTo === 0.15) ? cap0 : cap15;
      return (boundary - from) * rFrom + (to - boundary) * rTo;
    }
    tax = ltTax(Math.min(income, cap15 + 1), totalTaxable);
    // avoid negative when income already in 0% band
    if (income >= cap0) tax = ltTax(income, totalTaxable);
    else tax = ltTax(0, totalTaxable) - ltTax(0, income);
    rateUsed = gain > 0 ? tax / gain : 0;
  } else {
    // short-term: ordinary income — tax difference of (income+gain) minus tax on income alone
    const brackets = ORD_2025[status];
    tax = ordinaryTaxOn(totalTaxable, brackets) - ordinaryTaxOn(income, brackets);
    rateUsed = gain > 0 ? tax / gain : 0;
  }

  // NIIT 3.8% on the gain if MAGI crosses threshold
  let niit = 0;
  const before = totalTaxable - gain;
  const thr = NIIT[status];
  if (totalTaxable > thr) {
    const exposedGain = Math.min(gain, totalTaxable - Math.max(before, thr));
    if (exposedGain > 0) { niit = exposedGain * 0.038; tax += niit; }
  }
  rateUsed = gain > 0 ? tax / gain : 0;

  const net = sale - tax;

  $('#taxVal').textContent = fmt(tax);
  $('#heroSub').textContent = (isLT ? t('lt') : t('st')) + (niit > 0 ? ' + 3.8% NIIT' : '');
  $('#gain').textContent = fmt(gain);
  $('#gain').className = 'v';

  const typeEl = $('#type');
  if (isLT) { typeEl.innerHTML = `<span class="cg-tag lt">${t('lt')}</span>`; }
  else { typeEl.innerHTML = `<span class="cg-tag st">${t('st')}</span>`; }
  typeEl.style.fontSize = '0.8em';

  $('#rate').textContent = (rateUsed * 100).toFixed(1) + '%';
  $('#net').textContent = fmt(net);
  $('#net').className = 'v';

  $('#note').innerHTML = isZh
    ? `资本利得 = <code>卖出价 − 买入价 = ${fmt(sale)} − ${fmt(cost)} = ${fmt(gain)}</code><br>
       持有 <code>${months}</code> 个月 → <b>${isLT ? '长期（优惠税率 0/15/20%）' : '短期（普通所得税率）'}</b>。${niit > 0 ? `<br>包含 <code>3.8%</code> 净投资收入税（NIIT）。` : ''}<br><br>
       仅估算美国联邦税，未含州税。实际税款以当地税务机关为准。`
    : `Gain = <code>Sale − Cost = ${fmt(sale)} − ${fmt(cost)} = ${fmt(gain)}</code><br>
       Held <code>${months}</code> months → <b>${isLT ? 'long-term (0/15/20% preferential)' : 'short-term (ordinary income)'}</b>.${niit > 0 ? `<br>Includes <code>3.8%</code> Net Investment Income Tax (NIIT).` : ''}<br><br>
       US federal estimate only — excludes state tax. Consult a tax professional for your exact situation.`;
}

['cost','sale','months','income','status'].forEach(id => $('#' + id).addEventListener('input', calc));
$('#status').addEventListener('change', calc);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" id="btnCopy">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnExample">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnReset">${t('reset')}</button>`;

$('#btnCopy').onclick = () => copyText(`${t('toolTitle')}\n${t('gain')}: ${$('#gain').textContent}\n${t('type')}: ${$('#type').textContent}\n${t('rate')}: ${$('#rate').textContent}\n${t('heroLbl')}: ${$('#taxVal').textContent}\n${t('net')}: ${$('#net').textContent}`);
$('#btnExample').onclick = () => { $('#cost').value = 10000; $('#sale').value = 18000; $('#months').value = 18; $('#income').value = 75000; $('#status').value = 'single'; calc(); };
$('#btnReset').onclick = () => { $('#cost').value = 0; $('#sale').value = 0; $('#months').value = 12; $('#income').value = 0; $('#status').value = 'single'; calc(); };

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/calc/investment-calculator.html', name:'Investment Calculator'},
    {icon:'💹', href:'/calc/stock-return.html', name:'Stock Return'},
    {icon:'💵', href:'/calc/tax-calculator.html', name:'Income Tax'},
    {icon:'📊', href:'/calc/roi.html', name:'ROI Calculator'},
  ]
});
</script>
