<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a subnet mask?", "acceptedAnswer": {"@type": "Answer", "text": "A subnet mask is a 32-bit number that divides an IP address into the network portion and the host portion. Bits set to 1 identify the network, bits set to 0 identify the host. For example, /24 (255.255.255.0) means the first 24 bits are network and the last 8 bits are host."}}, {"@type": "Question", "name": "What is CIDR notation?", "acceptedAnswer": {"@type": "Answer", "text": "CIDR (Classless Inter-Domain Routing) notation writes the IP address followed by a slash and a number 0-32 indicating how many bits form the network prefix. For example, 192.168.1.0/24 means a 24-bit network prefix with up to 256 addresses."}}, {"@type": "Question", "name": "What is the difference between network address, broadcast address and host range?", "acceptedAnswer": {"@type": "Answer", "text": "The network address is the first address of the subnet (host bits all zero). The broadcast address is the last address (host bits all one). The host range is the addresses in between, available for devices. The first and last are reserved."}}, {"@type": "Question", "name": "Does this calculator work for IPv6?", "acceptedAnswer": {"@type": "Answer", "text": "No, this is an IPv4-only subnet calculator. IPv6 has a 128-bit address space and uses similar but separate math. Use a dedicated IPv6 calculator for those addresses."}}]}</script>

<script>

    calculate: 'Calculate',
    errIp: 'Invalid IP address. Use format A.B.C.D with octets 0-255.',
    errCidr: 'CIDR must be between 0 and 32.',
    network: 'Network Address',
    broadcast: 'Broadcast Address',
    subnetMask: 'Subnet Mask',
    wildcard: 'Wildcard Mask',
    firstHost: 'First Usable Host',
    lastHost: 'Last Usable Host',
    totalHosts: 'Total Usable Hosts',
    ipBinary: 'IP Binary',
    maskBinary: 'Mask Binary',
    classType: 'Address Class',
    ipType: 'IP Type',
    private: 'Private (RFC 1918)',
    public: 'Public',
    step1: 'Enter an IPv4 address (e.g. 192.168.1.10)',
    step2: 'Set the CIDR prefix (0-32)',
    step3: 'Click Calculate to see network, mask, host range',
    step4: 'Use the quick presets for common ranges',
  },
  zh: {
    toolTitle: '子网计算器',
    toolDesc: '从任意 IP 和 CIDR 前缀计算 IPv4 子网详情 — 网络、广播、掩码、可用主机范围等。',
    lblIp: 'IP 地址', lblCidr: 'CIDR 前缀 (0-32)',
    calculate: '计算',
    errIp: '无效的 IP 地址。请使用 A.B.C.D 格式，每段 0-255。',
    errCidr: 'CIDR 必须在 0-32 之间。',
    network: '网络地址',
    broadcast: '广播地址',
    subnetMask: '子网掩码',
    wildcard: '反掩码',
    firstHost: '第一个可用主机',
    lastHost: '最后一个可用主机',
    totalHosts: '可用主机总数',
    ipBinary: 'IP 二进制',
    maskBinary: '掩码二进制',
    classType: '地址类别',
    ipType: 'IP 类型',
    private: '内网（RFC 1918）',
    public: '公网',
    step1: '输入一个 IPv4 地址（例如 192.168.1.10）',
    step2: '设置 CIDR 前缀（0-32）',
    step3: '点击「计算」查看网络、掩码、主机范围',
    step4: '使用快捷预设查看常见网段',
  }
});

const { $, t } = GZ;

function ipToInt(ip) {
  const parts = ip.split('.');
  if (parts.length !== 4) return null;
  let n = 0;
  for (const p of parts) {
    const v = parseInt(p, 10);
    if (isNaN(v) || v < 0 || v > 255 || p === '' || !/^\d+$/.test(p)) return null;
    n = (n << 8) | v;
  }
  return n >>> 0;
}

function intToIp(n) {
  return [(n>>>24)&255, (n>>>16)&255, (n>>>8)&255, n&255].join('.');
}

function intToBinary(n, bits) {
  return n.toString(2).padStart(bits, '0').match(/.{1,8}/g).join('.');
}

function getClass(firstOctet) {
  if (firstOctet < 128) return 'A';
  if (firstOctet < 192) return 'B';
  if (firstOctet < 224) return 'C';
  if (firstOctet < 240) return 'D (Multicast)';
  return 'E (Reserved)';
}

function isPrivate(n) {
  const a = (n>>>24)&255, b = (n>>>16)&255;
  if (a === 10) return true;
  if (a === 172 && b >= 16 && b <= 31) return true;
  if (a === 192 && b === 168) return true;
  if (a === 127) return true;
  return false;
}

function calculate() {
  const ipStr = $('#ip').value.trim();
  const cidr = parseInt($('#cidr').value, 10);
  if (isNaN(cidr) || cidr < 0 || cidr > 32) {
    $('#output').innerHTML = `<div class="sub-error">${t('errCidr')}</div>`; return;
  }
  const ipInt = ipToInt(ipStr);
  if (ipInt === null) {
    $('#output').innerHTML = `<div class="sub-error">${t('errIp')}</div>`; return;
  }
  const mask = cidr === 0 ? 0 : (0xFFFFFFFF << (32 - cidr)) >>> 0;
  const wildcard = (~mask) >>> 0;
  const network = (ipInt & mask) >>> 0;
  const broadcast = (network | wildcard) >>> 0;
  const total = cidr === 32 ? 1 : cidr === 31 ? 2 : (broadcast - network - 1);
  const firstHost = cidr >= 31 ? network : (network + 1) >>> 0;
  const lastHost = cidr >= 31 ? broadcast : (broadcast - 1) >>> 0;
  const className = getClass((ipInt >>> 24) & 255);
  const ipType = isPrivate(ipInt) ? t('private') : t('public');
  $('#output').innerHTML = `
    <div class="sub-results">
      <div class="sub-card"><div class="lbl">${t('network')}</div><div class="val">${intToIp(network)}/${cidr}</div></div>
      <div class="sub-card"><div class="lbl">${t('broadcast')}</div><div class="val">${intToIp(broadcast)}</div></div>
      <div class="sub-card"><div class="lbl">${t('subnetMask')}</div><div class="val">${intToIp(mask)}</div><div class="sub-binary">${intToBinary(mask, 32)}</div></div>
      <div class="sub-card"><div class="lbl">${t('wildcard')}</div><div class="val">${intToIp(wildcard)}</div></div>
      <div class="sub-card"><div class="lbl">${t('firstHost')}</div><div class="val">${intToIp(firstHost)}</div></div>
      <div class="sub-card"><div class="lbl">${t('lastHost')}</div><div class="val">${intToIp(lastHost)}</div></div>
      <div class="sub-card"><div class="lbl">${t('totalHosts')}</div><div class="val">${total.toLocaleString()}</div></div>
      <div class="sub-card"><div class="lbl">${t('classType')} / ${t('ipType')}</div><div class="val">${className} · ${ipType}</div></div>
      <div class="sub-card full"><div class="lbl">${t('ipBinary')}</div><div class="val">${intToIp(ipInt)}</div><div class="sub-binary">${intToBinary(ipInt, 32)}</div></div>
    </div>`;
}

function loadPreset(ip, cidr) {
  $('#ip').value = ip; $('#cidr').value = cidr; calculate();
}

$('#lblIp').textContent = t('lblIp');
$('#lblCidr').textContent = t('lblCidr');
$('#calcBtn').textContent = t('calculate');

$('#calcBtn').addEventListener('click', calculate);
$('#ip').addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
$('#cidr').addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
$('#ip').addEventListener('input', calculate);
$('#cidr').addEventListener('input', calculate);

calculate();

    {icon:'🔗', href:'/dev/url-parser.html', name:'URL Parser'},
    {icon:'⏰', href:'/dev/timestamp.html', name:'Timestamp'},
  ]
});
</script>
