<script>
GZI18n.register({
  en: {
    toolTitle: 'White Noise Generator',
    toolDesc: 'Generate white, pink and brown noise for sleep, focus and relaxation. Adjustable volume with sleep timer.',
    volume: 'Volume',
    timer: 'Sleep Timer',
    white: '☁️ White Noise',
    pink: '🌸 Pink Noise',
    brown: '🌊 Brown Noise',
    playing: 'Playing...',
    step1: 'Choose a noise type: white, pink, or brown',
    step2: 'Adjust the volume to your comfort level',
    step3: 'Click the play button to start the noise',
    step4: 'Optionally set a sleep timer to auto-stop',
  },
  zh: {
    toolTitle: '白噪声生成器',
    toolDesc: '在线生成白噪声、粉噪声和褐噪声，助眠、专注和放松。支持音量调节和定时关闭。',
    volume: '音量',
    timer: '睡眠定时',
    white: '☁️ 白噪声',
    pink: '🌸 粉噪声',
    brown: '🌊 褐噪声',
    playing: '播放中…',
    step1: '选择噪声类型：白噪声、粉噪声或褐噪声',
    step2: '调节音量至舒适水平',
    step3: '点击播放按钮开始播放',
    step4: '可选设置定时器自动停止',
  }
});

const { $, t } = GZ;
let audioCtx, source, gainNode, analyser, animId, timerInterval, timerRemaining = 0;
let playing = false;
let noiseType = 'white';

const types = ['white','pink','brown'];
const typeBtnContainer = $('#typeBtns');
types.forEach(tp => {
  const btn = document.createElement('button');
  btn.textContent = t(tp);
  btn.className = tp === noiseType ? 'active' : '';
  btn.onclick = () => {
    noiseType = tp;
    typeBtnContainer.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (playing) { stopNoise(); startNoise(); }
  };
  typeBtnContainer.appendChild(btn);
});

$('#volSlider').addEventListener('input', e => {
  if (gainNode) gainNode.gain.value = +e.target.value / 100;
});

function createNoiseBuffer(type) {
  const sr = audioCtx.sampleRate;
  const len = 2 * sr;
  const buf = audioCtx.createBuffer(1, len, sr);
  const data = buf.getChannelData(0);
  if (type === 'white') {
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  } else if (type === 'pink') {
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for (let i = 0; i < len; i++) {
      const w = Math.random() * 2 - 1;
      b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
      b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
      b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
      data[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;
      b6=w*0.115926;
    }
  } else {
    let last = 0;
    for (let i = 0; i < len; i++) {
      const w = Math.random() * 2 - 1;
      data[i] = (last + 0.02 * w) / 1.02;
      last = data[i];
      data[i] *= 3.5;
    }
  }
  return buf;
}

function toggleNoise() { playing ? stopNoise() : startNoise(); }

function startNoise() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const buf = createNoiseBuffer(noiseType);
  source = audioCtx.createBufferSource();
  source.buffer = buf;
  source.loop = true;
  gainNode = audioCtx.createGain();
  gainNode.gain.value = +$('#volSlider').value / 100;
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  source.connect(gainNode);
  gainNode.connect(analyser);
  analyser.connect(audioCtx.destination);
  source.start();
  playing = true;
  $('#playBtn').innerHTML = '&#9632;';
  $('#playBtn').classList.add('playing');
  drawVis();
  startTimer();
}

function stopNoise() {
  if (source) { source.stop(); source = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  playing = false;
  $('#playBtn').innerHTML = '&#9654;';
  $('#playBtn').classList.remove('playing');
  if (animId) cancelAnimationFrame(animId);
  if (timerInterval) clearInterval(timerInterval);
  $('#timerDisplay').textContent = '';
}

function startTimer() {
  const dur = +$('#timerSel').value;
  if (!dur) { $('#timerDisplay').textContent = t('playing'); return; }
  timerRemaining = dur;
  updateTimerDisplay();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerRemaining--;
    if (timerRemaining <= 0) { clearInterval(timerInterval); stopNoise(); return; }
    updateTimerDisplay();
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timerRemaining / 60);
  const s = timerRemaining % 60;
  $('#timerDisplay').textContent = `${m}:${s.toString().padStart(2,'0')}`;
}

function drawVis() {
  if (!analyser) return;
  const canvas = $('#visualizer');
  const ctx = canvas.getContext('2d');
  const bufLen = analyser.frequencyBinCount;
  const data = new Uint8Array(bufLen);
  canvas.width = canvas.offsetWidth * (window.devicePixelRatio || 1);
  canvas.height = 100 * (window.devicePixelRatio || 1);

  function draw() {
    animId = requestAnimationFrame(draw);
    analyser.getByteTimeDomainData(data);
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--gz-bg-alt') || '#1a1a2e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.lineWidth = 2;
    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--gz-accent') || '#e94560';
    ctx.beginPath();
    const sliceW = canvas.width / bufLen;
    let x = 0;
    for (let i = 0; i < bufLen; i++) {
      const v = data[i] / 128.0;
      const y = v * canvas.height / 2;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      x += sliceW;
    }
    ctx.lineTo(canvas.width, canvas.height / 2);
    ctx.stroke();
  }
  draw();
}

$('#lbl-vol').textContent = t('volume');
$('#lbl-timer').textContent = t('timer');

GZ.renderToolPage({

    {icon:'🎸', href:'/fun/guitar-tuner.html', name:'Guitar Tuner'},
  ]
});
</script>
