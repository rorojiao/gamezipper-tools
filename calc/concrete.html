<style>
.cc-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cc-tab{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--glass);color:var(--text);cursor:pointer;font-size:.9em}
.cc-tab.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
.cc-form{display:grid;gap:14px;background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:18px;max-width:560px}
.cc-form .dim-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:600px){.cc-form .dim-row{grid-template-columns:1fr}}
.cc-form label{display:flex;flex-direction:column;gap:4px;font-size:.85em;color:var(--text2)}
.cc-form input,.cc-form select{padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:1em}
.cc-result{margin-top:18px;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.cc-card{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center}
.cc-card.main{background:var(--accent);border-color:var(--accent);grid-column:1 / -1}
.cc-card.main .value{color:#000;font-size:2.2rem}
.cc-card .value{font-size:1.6rem;font-weight:800;color:var(--accent);font-family:monospace}
.cc-card .label{font-size:.8em;color:var(--text2);margin-top:4px}
.cc-card.main .label{color:rgba(0,0,0,.7);font-weight:700}
.bag-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;max-width:560px}
@media(max-width:600px){.bag-row{grid-template-columns:1fr}}
.bag-card{background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.bag-card .n{font-size:1.6rem;font-weight:800;color:var(--accent);font-family:monospace}
.bag-card .l{font-size:.75em;color:var(--text2);margin-top:2px}
.cc-info{background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:18px;font-size:.85em;line-height:1.6;max-width:560px}
.cc-info h3{margin:0 0 8px;font-size:1em;color:var(--accent)}
.cc-info p{margin:6px 0}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Concrete Calculator","description":"Calculate how much concrete you need for slabs, footings, columns, walls and tubes. Get cubic yards / meters plus bag count for 40lb, 60lb and 80lb bags.","url":"https://tools.gamezipper.com/calc/concrete.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate concrete for a slab?", "acceptedAnswer": {"@type": "Answer", "text": "For a rectangular slab, multiply length × width × thickness (in the same unit) to get volume, then convert to cubic yards (divide ft³ by 27) or cubic meters. The calculator adds a 10% safety margin to account for spillage, uneven subgrade and over-excavation."}}, {"@type": "Question", "name": "How many 80 lb bags of concrete make a yard?", "acceptedAnswer": {"@type": "Answer", "text": "A standard 80 lb bag yields about 0.6 cubic feet of cured concrete. There are 27 cubic feet in a cubic yard, so you need 45 bags to make one full yard. 60 lb bags need 60 per yard, and 40 lb bags need 90 per yard."}}, {"@type": "Question", "name": "Should I order ready-mix or use bags?", "acceptedAnswer": {"@type": "Answer", "text": "For projects under 1 cubic yard, bagged concrete is usually cheaper and easier. For projects over 1 yard, ready-mix delivery is more cost-effective and saves significant labor. Most DIY patios (10x10x4 inch slab = ~1.24 yards) sit right at the threshold."}}, {"@type": "Question", "name": "What is the safety margin included?", "acceptedAnswer": {"@type": "Answer", "text": "The calculator automatically adds 10% extra to the volume to account for real-world conditions: subgrade settling, spillage, slight over-excavation, and the fact that concrete is ordered by the full yard — you cannot buy half a yard from most suppliers."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="cc-tabs" id="tabs">
      <div class="cc-tab active" data-shape="slab">📏 Slab</div>
      <div class="cc-tab" data-shape="footing">🔲 Footing</div>
      <div class="cc-tab" data-shape="column">🏛️ Column</div>
      <div class="cc-tab" data-shape="tube">⭕ Tube / Cylinder</div>
    </div>
    <div class="cc-form">
      <label><span id="lbl-unit"></span>
        <select id="unit">
          <option value="imperial">Feet / inches</option>
          <option value="metric">Meters / cm</option>
        </select>
      </label>
      <div class="dim-row" id="dimRow">
        <label><span id="lbl-d1"></span><input type="number" id="d1" step="any" min="0"></label>
        <label><span id="lbl-d2"></span><input type="number" id="d2" step="any" min="0"></label>
        <label><span id="lbl-d3"></span><input type="number" id="d3" step="any" min="0"></label>
      </div>
    </div>
    <div class="cc-result" id="result" style="display:none">
      <div class="cc-card main">
        <div class="value" id="volume">—</div>
        <div class="label" id="lbl-volume">Volume (with 10% safety margin)</div>
      </div>
      <div class="cc-card">
        <div class="value" id="alt-volume">—</div>
        <div class="label" id="lbl-alt">Equivalent</div>
      </div>
      <div class="cc-card">
        <div class="value" id="raw-volume">—</div>
        <div class="label" id="lbl-raw">Raw volume (no margin)</div>
      </div>
    </div>
    <div id="bagSection" style="display:none">
      <h3 id="lbl-bags" style="margin-top:18px;font-size:1em"></h3>
      <div class="bag-row">
        <div class="bag-card"><div class="n" id="bag40">—</div><div class="l" id="lbl-bag40"></div></div>
        <div class="bag-card"><div class="n" id="bag60">—</div><div class="l" id="lbl-bag60"></div></div>
        <div class="bag-card"><div class="n" id="bag80">—</div><div class="l" id="lbl-bag80"></div></div>
      </div>
    </div>
    <div class="cc-info">
      <h3 id="lbl-tip">Pro tip</h3>
      <p id="tip-text"></p>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Concrete Calculator',
    toolDesc: 'Calculate concrete volume for slabs, footings, columns, walls and tubes. Get cubic yards/meters and bag count for 40, 60 and 80 lb bags.',
    lblUnit: 'Units',
    lblVolume: 'Volume (with 10% safety margin)',
    lblAlt: 'Equivalent',
    lblRaw: 'Raw volume (no margin)',
    lblBags: 'How many bags to buy?',
    lblBag40: '40 lb bags',
    lblBag60: '60 lb bags',
    lblBag80: '80 lb bags',
    lblTip: 'Pro tip',
    lblD1: 'Length',
    lblD2: 'Width',
    lblD3: 'Thickness',
    tipText: 'Order slightly more than you need — concrete is sold by the full yard and you cannot return leftovers. The 10% safety margin accounts for spillage, uneven subgrade, and over-excavation.',
    btnExample: 'Load Example (10×10 ft patio, 4 in thick)',
    btnClear: 'Clear',
    step1: 'Choose the shape that matches your project (slab, footing, column, tube)',
    step2: 'Enter the dimensions in your preferred unit system',
    step3: 'See the volume in cubic yards / meters and the bag count',
    step4: 'Order ready-mix for jobs over 1 yard, otherwise buy bags',
  },
  zh: {
    toolTitle: '混凝土计算器',
    toolDesc: '计算板、独立基础、柱、墙和圆管的混凝土用量。输出立方码/立方米和 40/60/80 磅袋数。',
    lblUnit: '单位',
    lblVolume: '体积（含 10% 安全余量）',
    lblAlt: '换算',
    lblRaw: '原始体积（不含余量）',
    lblBags: '需要多少袋？',
    lblBag40: '40 磅袋',
    lblBag60: '60 磅袋',
    lblBag80: '80 磅袋',
    lblTip: '专业建议',
    lblD1: '长',
    lblD2: '宽',
    lblD3: '厚度/深度',
    tipText: '建议多订一些 — 混凝土按整立方码销售，多余部分无法退回。10% 安全余量考虑了溢出、地基不平整和超挖等情况。',
    btnExample: '加载示例（10×10 英尺露台，4 英寸厚）',
    btnClear: '清空',
    step1: '选择与项目匹配的几何形状（板、基础、柱、圆管）',
    step2: '以你常用的单位输入尺寸',
    step3: '查看以立方码/立方米计的体积和所需袋数',
    step4: '超过 1 立方码建议订现拌混凝土，少量则购买袋装',
  }
});

let currentShape = 'slab';
const { $, t } = GZ;

const DIM_LABELS = {
  en: {
    slab: ['Length','Width','Thickness'],
    footing: ['Length','Width','Depth'],
    column: ['Diameter / Side','— (n/a)','Height'],
    tube: ['Outer diameter','— (n/a)','Height (depth)']
  },
  zh: {
    slab: ['长','宽','厚度'],
    footing: ['长','宽','深度'],
    column: ['直径/边长','— (不适用)','高'],
    tube: ['外径','— (不适用)','高（深）']
  }
};

document.querySelectorAll('.cc-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.cc-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentShape = tab.dataset.shape;
    updateLabels();
    calc();
  });
});

function updateLabels() {
  const isZh = GZI18n.getLang() === 'zh';
  const arr = (isZh ? DIM_LABELS.zh : DIM_LABELS.en)[currentShape];
  $('#lbl-d1').textContent = arr[0];
  $('#lbl-d2').textContent = arr[1];
  $('#lbl-d3').textContent = arr[2];
  $('#d2').style.display = currentShape === 'column' || currentShape === 'tube' ? 'none' : '';
  if (currentShape === 'column' || currentShape === 'tube') $('#d2').parentElement.style.display='none';
  else $('#d2').parentElement.style.display='';
}

function calc() {
  const u = $('#unit').value;
  const a = parseFloat($('#d1').value);
  const b = parseFloat($('#d2').value);
  const c = parseFloat($('#d3').value);
  if (isNaN(a) || isNaN(c) || (currentShape !== 'column' && currentShape !== 'tube' && isNaN(b))) {
    $('#result').style.display = 'none'; $('#bagSection').style.display = 'none'; return;
  }
  let ft3 = 0;
  if (currentShape === 'slab' || currentShape === 'footing') {
    if (u === 'imperial') ft3 = a * b * (c/12);
    else ft3 = (a * 3.28084) * (b * 3.28084) * (c * 3.28084); // all m→ft
  } else if (currentShape === 'column') {
    // Square column if second dim supplied, else circular
    if (u === 'imperial') {
      if (!isNaN(b)) ft3 = a * b * c;
      else ft3 = Math.PI * Math.pow(a/2, 2) * c;
    } else {
      if (!isNaN(b)) ft3 = a * b * c * 35.3147;
      else ft3 = Math.PI * Math.pow(a/2, 2) * c * 35.3147;
    }
  } else if (currentShape === 'tube') {
    // Outer cylinder. For simplicity assume hollow; user can input depth from inside
    if (u === 'imperial') ft3 = Math.PI * Math.pow(a/2, 2) * c;
    else ft3 = Math.PI * Math.pow(a/2, 2) * c * 35.3147;
  }
  const raw = ft3;
  const total = ft3 * 1.10; // 10% safety
  const yd3 = total / 27;
  const m3 = total / 35.3147;
  const isZh = GZI18n.getLang() === 'zh';
  const alt = isZh ? `${m3.toFixed(3)} 立方米` : `${m3.toFixed(3)} m³`;
  const main = u === 'imperial' ? `${yd3.toFixed(3)} 立方码` : `${m3.toFixed(3)} 立方米`;
  $('#volume').textContent = main;
  $('#alt-volume').textContent = alt;
  $('#raw-volume').textContent = u === 'imperial' ? `${(raw/27).toFixed(3)} 立方码` : `${(raw/35.3147).toFixed(3)} 立方米`;
  $('#result').style.display = 'grid';
  $('#bagSection').style.display = 'block';
  $('#bag40').textContent = Math.ceil(yd3 * 90);
  $('#bag60').textContent = Math.ceil(yd3 * 60);
  $('#bag80').textContent = Math.ceil(yd3 * 45);
  $('#tip-text').textContent = t('tipText');
  $('#lbl-bags').textContent = t('lblBags');
  updateLabels();
}

['#d1','#d2','#d3','#unit'].forEach(s => $(s).addEventListener('input', calc));

function loadExample() {
  $('#unit').value = 'imperial';
  document.querySelector('.cc-tab[data-shape=slab]').click();
  $('#d1').value = 10; $('#d2').value = 10; $('#d3').value = 4;
  calc();
}
function doClear() { $('#d1').value=''; $('#d2').value=''; $('#d3').value=''; $('#result').style.display='none'; $('#bagSection').style.display='none'; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('btnExample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('btnClear')}</button>`;

updateLabels();
$('#tip-text').textContent = t('tipText');

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏠',href:'/calc/mortgage.html',name:'Mortgage'},
    {icon:'🏷️',href:'/calc/unit-price.html',name:'Unit Price'},
    {icon:'🏠',href:'/calc/rent-vs-buy.html',name:'Rent vs Buy'},
    {icon:'📏',href:'/calc/dpi-calculator.html',name:'DPI / PPI'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
