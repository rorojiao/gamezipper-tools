    lblExport: '导出接口',

    jsonInvalid: '✗ JSON 无效：',
    jsonValid: '✓ TypeScript 已生成',
    step1: '在输入区粘贴 JSON',

const { $, copyText, t } = GZ;

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function safeName(s) { return String(s).replace(/[^A-Za-z0-9_]/g, '_').replace(/^(\d)/, '_$1'); }

function inferType(value, key, ctx) {
  if (value === null) return 'null';
  if (typeof value === 'string') return 'string';
  if (typeof value === 'number') return 'number';
  if (typeof value === 'boolean') return 'boolean';
  if (Array.isArray(value)) {
    if (value.length === 0) return 'unknown[]';
    const types = new Set();
    for (const item of value) {
      if (item === null) { types.add('null'); continue; }
      if (typeof item === 'object' && !Array.isArray(item)) {
        const subName = capitalize(safeName(Array.isArray(key) ? `Item${key[0]}` : key)) + 'Item';
        ctx.interfaces.push({ name: subName, obj: item });
        types.add(subName);
      } else if (Array.isArray(item)) {
        types.add(inferType(item, key, ctx));
      } else {
        types.add(typeof item);
      }
    }
    return Array.from(types).join(' | ') + '[]';
  }
  if (typeof value === 'object') {
    const subName = capitalize(safeName(key)) + (ctx.interfaces.some(i => i.name === subName) ? '_' + ctx.interfaces.length : '');
    ctx.interfaces.push({ name: subName, obj: value });
    return subName;
  }
  return 'unknown';
}

function buildInterface(name, obj, ctx) {
  const optional = document.getElementById('optOptional').checked;
  const useInterface = document.getElementById('optInterface').checked;
  const doExport = document.getElementById('optExport').checked;
  const strict = document.getElementById('optStrict').checked;
  const lines = [];
  const prefix = doExport ? 'export ' : '';
  const keyword = useInterface ? 'interface' : 'type';
  const opener = useInterface ? `${prefix}interface ${name} {` : `${prefix}type ${name} = {`;
  lines.push(opener);

  const entries = Object.entries(obj);
  if (entries.length === 0) {
    lines.push(useInterface ? '}' : '};');
    return lines.join('\n');
  }
  for (const [k, v] of entries) {
    let type;
    if (v === null) {
      type = strict ? 'null | undefined' : 'null';
    } else {
      type = inferType(v, k, ctx);
    }
    const opt = optional && v === null ? '?' : '';
    lines.push(`  ${k}${opt}: ${type};`);
  }
  lines.push(useInterface ? '}' : '};');
  return lines.join('\n');
}

function convert() {
  const inp = $('#input').value.trim();
  const out = $('#output');
  if (!inp) { out.innerHTML = ''; return; }
  let parsed;
  try { parsed = JSON.parse(inp); }
  catch (e) {
    out.innerHTML = `<span style="color:var(--gz-accent)">${t('jsonInvalid')}${e.message}</span>`;
    return;
  }
  const ctx = { interfaces: [] };
  const rootName = document.getElementById('rootName').value.trim() || 'RootObject';
  const main = buildInterface(rootName, parsed, ctx);
  const subs = ctx.interfaces.map(i => '\n\n' + buildInterface(i.name, i.obj, ctx)).join('');
  const result = main + subs;
  out.textContent = result;
}

$('#input').addEventListener('input', convert);

function loadExample() {
  $('#input').value = JSON.stringify({
    "id": 42,
    "name": "GameZipper",
    "active": true,
    "tags": ["tools", "games", "free"],

      { "id": 1, "text": "Great tool!", "votes": 12 },
      { "id": 2, "text": "Loved it", "votes": 7 }
    ]
  }, null, 2);
  convert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; }

document.getElementById('toolbar').innerHTML = `
