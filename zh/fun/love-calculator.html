const { $, copyText, t } = GZ;

// Deterministic hash from two names
function loveHash(a, b) {
  const combined = [a.toLowerCase().trim(), b.toLowerCase().trim()].sort().join('♥');
  let hash = 0;
  for (let i = 0; i < combined.length; i++) {
    const ch = combined.charCodeAt(i);
    hash = ((hash << 5) - hash) + ch;
    hash |= 0;
  }
  // Map to 0-100 with slight bias towards middle
  const raw = Math.abs(hash) % 1000;
  return Math.min(99, Math.max(5, Math.round((raw / 1000) * 100)));
}

function calculate() {
  const n1 = $('#name1').value.trim();
  const n2 = $('#name2').value.trim();
  if (!n1 || !n2) return;
  
  const score = loveHash(n1, n2);
  const result = $('#result');
  result.style.display = 'block';
  
  // Animate score
  const scoreEl = $('#score');
  const barEl = $('#love-bar');
  let current = 0;
  const step = () => {
    if (current < score) {
      current += Math.ceil((score - current) / 8);
      if (current > score) current = score;
      scoreEl.textContent = current + '%';
      barEl.style.width = current + '%';
      requestAnimationFrame(step);
    }
  };
  requestAnimationFrame(step);
  
  // Verdict & quote
  const keys = [95, 80, 60, 40, 20, 0];
  let verdict = '', quote = '';
  for (const k of keys) {
    if (score >= k) {
      verdict = t('v' + k);
      quote = t('q' + k);
      break;
    }
  }
  $('#verdict').textContent = verdict;
  $('#quote').textContent = quote;
}

$('#lbl-name1').textContent = t('name1');
$('#lbl-name2').textContent = t('name2');
$('#btn-calc').textContent = t('calculate');
$('#btn-calc').onclick = calculate;

// Allow Enter key
$('#name2').addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
