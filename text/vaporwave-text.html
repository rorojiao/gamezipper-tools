const { $, copyText, t } = GZ;

$('#input').placeholder = t('input');

function toFullwidth(text) {
  return [...text].map(ch => {
    const code = ch.charCodeAt(0);
    if (code === 0x20) return '\u3000';
    if (code >= 0x21 && code <= 0x7E) return String.fromCodePoint(code + 0xFEE0);
    return ch;
  }).join('');
}

function toParenthesized(text) {
  const map = {
    'A':'в’ң','B':'в’қ','C':'в’һ','D':'в’ҹ','E':'в’ ','F':'в’Ў','G':'в’ў','H':'в’Ј','I':'в’Ө',
    'J':'в’Ҙ','K':'в’Ұ','L':'в’§','M':'в’Ё','N':'в’©','O':'в’Ә','P':'в’«','Q':'в’¬','R':'в’ӯ',
    'S':'в’®','T':'в’Ҝ','U':'в’°','V':'в’ұ','W':'в’І','X':'в’і','Y':'в’ҙ','Z':'в’ө',
    'a':'в“җ','b':'в“‘','c':'в“’','d':'в““','e':'в“”','f':'в“•','g':'в“–','h':'в“—','i':'в“ҳ',
    'j':'в“ҷ','k':'в“ҡ','l':'в“ӣ','m':'в“ң','n':'в“қ','o':'в“һ','p':'в“ҹ','q':'в“ ','r':'в“Ў',
    's':'в“ў','t':'в“Ј','u':'в“Ө','v':'в“Ҙ','w':'в“Ұ','x':'в“§','y':'в“Ё','z':'в“©',
  };
  return [...text].map(ch => map[ch] || ch).join('');
}

function toSquared(text) {
  const upper = 0x1F130, lower = 0x1F150;
  return [...text].map(ch => {
    const code = ch.charCodeAt(0);
    if (code >= 65 && code <= 90) return String.fromCodePoint(upper + (code - 65));
    if (code >= 97 && code <= 122) return String.fromCodePoint(lower + (code - 97));
    return ch;
  }).join('');
}

function toNegSquared(text) {
  const base = 0x1F170;
  return [...text].map(ch => {
    const code = ch.charCodeAt(0);
    if (code >= 65 && code <= 90) return String.fromCodePoint(base + (code - 65));
    return ch;
  }).join('');
}

function toStrikethroughFull(text) {
  const full = toFullwidth(text);
  return [...full].map(ch => ch + '\u0336').join('');
}

function toVaporwaveDecor(text) {
  const full = toFullwidth(text);
  return 'вң§пҪҘпҫҹ: *вң§пҪҘпҫҹ:*  ' + full + '  *:пҪҘпҫҹвң§*:пҪҘпҫҹвң§';
}

const converters = {
  fullwidth: toFullwidth,
  vaporwaveDecor: toVaporwaveDecor,
  parenthesized: toParenthesized,
  squared: toSquared,
  negSquared: toNegSquared,
  strikeFull: toStrikethroughFull,
};

function updateResults() {
  const text = $('#input').value;
  const results = $('#results');
  if (!text) { results.innerHTML = ''; return; }
  const styles = t('styles');
  results.innerHTML = styles.map(s => {
    const converted = converters[s.id] ? converters[s.id](text) : text;
    return `<div class="result-box" onclick="copyText(this.querySelector('.style-text').textContent)">
      <div class="style-name">${s.name}</div>
      <div class="style-text">${converted.replace(/</g,'&lt;')}</div>
      <div class="copy-hint">${t('clickToCopy')}</div>
    </div>`;
  }).join('');
}

$('#input').addEventListener('input', updateResults);
