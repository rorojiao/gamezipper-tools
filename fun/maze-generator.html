<script>
GZI18n.register({
  en: {
    toolTitle: 'Maze Generator & Solver',
    toolDesc: 'Generate custom printable mazes with adjustable size. Solve automatically or download as PNG for kids activities and puzzles.',
    width: 'Width',
    height: 'Height',
    cellSize: 'Cell px',
    generate: 'Generate',
    solve: 'Solve',
    download: 'Download PNG',
    step1: 'Set maze width, height and cell size in the controls above',
    step2: 'Click Generate to create a new random maze',
    step3: 'Click Solve to see the solution path from start to end',
    step4: 'Click Download PNG to save and print the maze',
  },
  zh: {
    toolTitle: '迷宫生成器 & 求解器',
    toolDesc: '生成自定义可打印迷宫，可调整大小。自动求解或下载为 PNG，适合儿童活动和益智游戏。',
    width: '宽度',
    height: '高度',
    cellSize: '像素',
    generate: '生成',
    solve: '求解',
    download: '下载 PNG',
    step1: '在上方控件中设置迷宫宽度、高度和单元格大小',
    step2: '点击「生成」创建新的随机迷宫',
    step3: '点击「求解」查看从起点到终点的路径',
    step4: '点击「下载 PNG」保存并打印迷宫',
  }
});

const { $, t } = GZ;

$('#lbl-width').textContent = t('width');
$('#lbl-height').textContent = t('height');
$('#lbl-size').textContent = t('cellSize');

let grid = [];
let cols = 20, rows = 20;
const canvas = $('#maze-canvas');
const ctx = canvas.getContext('2d');

function initGrid() {
  cols = Math.max(3, Math.min(80, +$('#mazeW').value || 20));
  rows = Math.max(3, Math.min(80, +$('#mazeH').value || 20));
  grid = [];
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      grid.push({ x, y, walls: [true,true,true,true], visited: false });
      // walls: [top, right, bottom, left]
    }
  }
}

function getCell(x, y) {
  if (x < 0 || y < 0 || x >= cols || y >= rows) return null;
  return grid[y * cols + x];
}

function generate() {
  initGrid();
  const stack = [];
  const start = getCell(0, 0);
  start.visited = true;
  stack.push(start);

  while (stack.length) {
    const current = stack[stack.length - 1];
    const neighbors = [];
    const dirs = [[0,-1],[1,0],[0,1],[-1,0]];
    for (const [dx,dy] of dirs) {
      const n = getCell(current.x+dx, current.y+dy);
      if (n && !n.visited) neighbors.push(n);
    }
    if (neighbors.length === 0) {
      stack.pop();
    } else {
      const next = neighbors[Math.floor(Math.random()*neighbors.length)];
      // Remove walls
      const dx = next.x - current.x;
      const dy = next.y - current.y;
      if (dy === -1) { current.walls[0] = false; next.walls[2] = false; }
      if (dx === 1)  { current.walls[1] = false; next.walls[3] = false; }
      if (dy === 1)  { current.walls[2] = false; next.walls[0] = false; }
      if (dx === -1) { current.walls[3] = false; next.walls[1] = false; }
      next.visited = true;
      stack.push(next);
    }
  }

  drawMaze();
}

function drawMaze(solution) {
  const cs = Math.max(5, +$('#cellSize').value || 20);
  canvas.width = cols * cs;
  canvas.height = rows * cs;
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw solution if provided
  if (solution && solution.length > 1) {
    ctx.strokeStyle = 'rgba(78, 205, 196, 0.6)';
    ctx.lineWidth = Math.max(2, cs * 0.3);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(solution[0].x * cs + cs/2, solution[0].y * cs + cs/2);
    for (let i = 1; i < solution.length; i++) {
      ctx.lineTo(solution[i].x * cs + cs/2, solution[i].y * cs + cs/2);
    }
    ctx.stroke();
  }

  // Draw start/end markers
  ctx.fillStyle = '#4ecdc4';
  ctx.fillRect(0, 0, cs, cs);
  ctx.fillStyle = '#ff6b6b';
  ctx.fillRect((cols-1)*cs, (rows-1)*cs, cs, cs);

  // Draw walls
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 2;
  for (const cell of grid) {
    const x = cell.x * cs;
    const y = cell.y * cs;
    if (cell.walls[0]) { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x+cs, y); ctx.stroke(); }
    if (cell.walls[1]) { ctx.beginPath(); ctx.moveTo(x+cs, y); ctx.lineTo(x+cs, y+cs); ctx.stroke(); }
    if (cell.walls[2]) { ctx.beginPath(); ctx.moveTo(x, y+cs); ctx.lineTo(x+cs, y+cs); ctx.stroke(); }
    if (cell.walls[3]) { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y+cs); ctx.stroke(); }
  }
}

function solve() {
  if (!grid.length) return;
  const visited = new Set();
  const queue = [[getCell(0,0)]];
  visited.add('0,0');

  while (queue.length) {
    const path = queue.shift();
    const cell = path[path.length - 1];

    if (cell.x === cols-1 && cell.y === rows-1) {
      drawMaze(path);
      return;
    }

    const dirs = [[0,-1,0],[1,0,1],[0,1,2],[-1,0,3]];
    for (const [dx,dy,wallIdx] of dirs) {
      if (cell.walls[wallIdx]) continue;
      const nx = cell.x+dx, ny = cell.y+dy;
      const key = `${nx},${ny}`;
      if (visited.has(key)) continue;
      visited.add(key);
      const next = getCell(nx, ny);
      if (next) queue.push([...path, next]);
    }
  }
}

function downloadPNG() {
  const a = document.createElement('a');
  a.download = 'maze.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="solve()">${t('solve')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadPNG()">${t('download')}</button>`;

// Generate initial maze
generate();

    {icon:'🎲', href:'/fun/quiz-maker.html', name:'Quiz Maker'},
  ]
});
</script>
