const { $, copyText, t } = GZ;

let dir = 'encode'; // encode = Unicode->Punycode

// ---- RFC 3492 Punycode (pure JS) ----
const BASE = 36, TMIN = 1, TMAX = 26, SKEW = 38, DAMP = 700, INITIAL_BIAS = 72, INITIAL_N = 0x80, DELIMITER = '-';

function adapt(delta, numpoints, firsttime){
  delta = firsttime ? Math.floor(delta/DAMP) : delta >> 1;
  delta += Math.floor(delta/numpoints);
  let k = 0;
  while(delta > ((BASE - TMIN) * TMAX) >> 1){ delta = Math.floor(delta/(BASE - TMIN)); k += BASE; }
  return k + Math.floor((BASE - TMIN + 1) * delta / (delta + SKEW));
}

function digitToBasic(d){ return d < 26 ? d + 97 : d - 26 + 48; } // a-z 0-9
function basicToDigit(c){
  if(c >= 97 && c <= 122) return c - 97;       // a-z
  if(c >= 48 && c <= 57) return c - 48 + 26;   // 0-9
  throw new Error('Invalid Punycode digit');
}

function punycodeEncode(input){
  // input: array of UTF-32 code points
  const output = [];
  let n = INITIAL_N, delta = 0, bias = INITIAL_BIAS;
  // output basic code points first
  const basic = input.filter(cp => cp < 0x80);
  for(const b of basic) output.push(String.fromCharCode(b));
  let h = basic.length, b = basic.length;
  if(b > 0) output.push(DELIMITER);
  while(h < input.length){
    let m = Infinity;
    for(const cp of input) if(cp >= n && cp < m) m = cp;
    delta += (m - n) * (h + 1);
    n = m;
    for(const cp of input){
      if(cp < n){ delta++; if(delta === 0) throw new Error('Punycode overflow (delta)'); }
      if(cp === n){
        let q = delta;
        for(let k = BASE; ; k += BASE){
          const t = k <= bias ? TMIN : (k >= bias + TMAX ? TMAX : k - bias);
          if(q < t) break;
          output.push(String.fromCharCode(digitToBasic(t + (q - t) % (BASE - t))));
          q = Math.floor((q - t) / (BASE - t));
        }
        output.push(String.fromCharCode(digitToBasic(q)));
        bias = adapt(delta, h + 1, h === b);
        delta = 0; h++;
      }
    }
    delta++; n++;
  }
  return output.join('');
}

function punycodeDecode(input){
  const output = [];
  let n = INITIAL_N, i = 0, bias = INITIAL_BIAS;
  // find last delimiter
  let basicEnd = input.lastIndexOf(DELIMITER);
  if(basicEnd < 0) basicEnd = 0;
  for(let j = 0; j < basicEnd; j++){
    const c = input.charCodeAt(j);
    if(c >= 0x80) throw new Error('Non-ASCII in Punycode input');
    output.push(c);
  }
  let idx = basicEnd > 0 ? basicEnd + 1 : 0;
  if(basicEnd === 0 && input.charAt(0) === DELIMITER) idx = 1;
  while(idx < input.length){
    const oldi = i;
    let w = 1;
    for(let k = BASE; ; k += BASE){
      if(idx >= input.length) throw new Error('Malformed Punycode (truncated)');
      const digit = basicToDigit(input.charCodeAt(idx++));
      i += digit * w;
      const t = k <= bias ? TMIN : (k >= bias + TMAX ? TMAX : k - bias);
      if(digit < t) break;
      w *= (BASE - t);
    }
    const out = output.length + 1;
    bias = adapt(i - oldi, out, oldi === 0);
    n += Math.floor(i / out);
    i %= out;
    output.splice(i, 0, n);
    i++;
  }
  return output;
}

// Convert a JS string into an array of UTF-32 code points
function toCodePoints(str){
  const cps = [];
  for(const ch of str) cps.push(ch.codePointAt(0));
  return cps;
}
function fromCodePoints(cps){ return cps.map(cp => String.fromCodePoint(cp)).join(''); }

function isPureAscii(s){ return /^[\x00-\x7F]*$/.test(s); }
function isAceLabel(s){ return /^xn--/i.test(s); }

function encodeLabel(label){
  if(isPureAscii(label)) return label;
  return 'xn--' + punycodeEncode(toCodePoints(label));
}
function decodeLabel(label){
  if(!isAceLabel(label)) return label;
  try{
    return fromCodePoints(punycodeDecode(label.slice(4)));
  }catch(e){
    throw new Error(`Cannot decode "${label}": ${e.message}`);
  }
}

function doConvert(){
  const raw = $('#input').value;
  if(!raw.trim()){ $('#status').innerHTML=''; $('#output').textContent=''; return; }
  const lines = raw.split('\n');
  const out = [];
  const errors = [];
  for(const line of lines){
    const trimmed = line.trim();
    if(!trimmed){ out.push(''); continue; }
    // strip scheme/path, keep host
    let host = trimmed;
    try{
      if(/^[a-zA-Z][a-zA-Z0-9+.-]*:\/\//.test(host) || host.includes('/')){
        const u = new URL(host.indexOf('://')>=0 ? host : 'http://' + host);
        host = u.hostname;
      }
    }catch(e){ /* treat as plain domain */ }
    try{
      const labels = host.split('.');
      const newLabels = labels.map(lbl => dir === 'encode' ? encodeLabel(lbl) : decodeLabel(lbl));
      out.push(newLabels.join('.'));
    }catch(e){
      errors.push(e.message);
      out.push('⚠ ' + e.message);
    }
  }
  const result = out.join('\n');
  $('#output').innerHTML = highlightHost(result);
  if(errors.length){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalid')}: ${errors[0]}</span>`;
  } else {
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done')}</span>`;
  }
}

function highlightHost(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(xn--[A-Za-z0-9-]+)/g,'<span class="punycode">$1</span>');
}

function loadExample(){
  if(dir === 'encode'){
    $('#input').value = 'münchen.de\n中国.cn\n日本.jp\ngamezipper.com\nrésumé.online';

  }
  doConvert();
}

function setDir(d){
  dir = d;

  const lblIn = $('#lbl-in-out-wrap');

}
