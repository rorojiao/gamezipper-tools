<script>
GZI18n.register({
  en: {
    toolTitle: 'Emoji Mixer',
    toolDesc: 'Mix and combine two emojis into fun new mashups. Pick from categories, create combos and copy to share anywhere.',
    copy: 'Copy',
    clear: 'Clear',
    random: 'Random',
    step1: 'Browse emoji categories or click Random',
    step2: 'Click two emojis to fill the mixer slots',
    step3: 'See your emoji combo in the result area',
    step4: 'Click Copy to share your creation',

  zh: {
    toolTitle: 'Emoji 混合器',

    copy: '复制',
    clear: '清空',
    random: '随机',
    step1: '浏览 Emoji 分类或点击随机',
    step2: '点击两个 Emoji 填充混合槽',
    step3: '在结果区域查看你的 Emoji 组合',
    step4: '点击复制分享你的创作',
  }
});

const { $, copyText, t } = GZ;

const categories = {
  '😀 Faces': ['😀','😃','😄','😁','😆','😅','🤣','😂','🙂','😉','😊','😇','🥰','😍','🤩','😘','😗','😚','😙','🥲','😋','😛','😜','🤪','😝','🤑','🤗','🤭','🫢','🫣','🤫','🤔','🫡','🤐','🤨','😐','😑','😶','🫥','😏','😒','🙄','😬','🤥','😌','😔','😪','🤤','😴'],
  '🐱 Animals': ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐻‍❄️','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🙈','🙉','🙊','🐒','🐔','🐧','🐦','🐤','🐣','🐥','🦆','🦅','🦉','🦇','🐺','🐗','🐴','🦄','🐝','🪱','🐛','🦋','🐌','🐞','🐜','🪰','🪲','🪳','🦟','🦗','🕷️'],
  '🍔 Food': ['🍏','🍎','🍐','🍊','🍋','🍌','🍉','🍇','🍓','🫐','🍈','🍒','🍑','🥭','🍍','🥥','🥝','🍅','🍆','🥑','🥦','🥬','🥒','🌶️','🫑','🌽','🥕','🫒','🧄','🧅','🥔','🍠','🫘','🥐','🥖','🍞','🫓','🥨','🥯','🧀','🥚','🍳'],
  '⚽ Sports': ['⚽','🏀','🏈','⚾','🥎','🎾','🏐','🏉','🥏','🎱','🪀','🏓','🏸','🏒','🏑','🥍','🏏','🪃','🥅','⛳','🪁','🏹','🎣','🤿','🥊','🥋','🎽','🛹','🛼','🛷','⛸️','🥌','🎿','⛷️','🏂'],
  '✨ Objects': ['💡','🔦','🕯️','🪔','🧯','🛢️','💸','💵','💴','💶','💷','🪙','💰','💳','💎','⚖️','🪜','🧰','🪛','🔧','🔨','⚒️','🛠️','⛏️','🪚','🔩','⚙️','🪤','🧲','🔫','💣','🧨','🪓','🔪','🗡️','⚔️','🛡️','🚬','⚰️','🪦','⚱️','🏺','🔮','📿','🧿'],
  '❤️ Hearts': ['❤️','🧡','💛','💚','💙','💜','🖤','🤍','🤎','💔','❤️‍🔥','❤️‍🩹','❣️','💕','💞','💓','💗','💖','💘','💝','💟'],
  '🔥 Symbols': ['✅','❌','❓','❗','‼️','⭕','💯','🔥','⭐','🌟','💫','✨','⚡','💥','💢','💦','💨','🕳️','💬','💭','🗯️','♠️','♣️','♥️','♦️','🃏','🎴','🀄','🕐','🕑','🕒','🕓','🕔','🕕','🌈','☀️','🌤️','⛅','🌥️','☁️','🌦️'],
};

let slot1 = '', slot2 = '', activeSlot = 1;

function buildToolbar() {
  $('#toolbar').innerHTML = `
    <button class="gz-btn" onclick="randomPick()">${t('random')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="doCopy()">${t('copy')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="clearSlots()">${t('clear')}</button>`;
}

function buildCategories() {
  const cats = $('#cats');
  cats.innerHTML = Object.keys(categories).map((k, i) =>
    `<button class="${i === 0 ? 'active' : ''}" onclick="showCat(this,'${k}')">${k}</button>`
  ).join('');
  showCatByIndex(0);
}

function showCat(btn, cat) {
  document.querySelectorAll('.cat-tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const emojis = categories[cat];
  $('#grid').innerHTML = emojis.map(e =>
    `<button onclick="pickEmoji('${e}')">${e}</button>`
  ).join('');
}

function showCatByIndex(i) {
  const keys = Object.keys(categories);
  showCat(document.querySelectorAll('.cat-tabs button')[i], keys[i]);
}

function pickEmoji(emoji) {
  if (activeSlot === 1) {
    slot1 = emoji;
    $('#slot1').textContent = emoji;
    $('#slot1').classList.add('filled');
    activeSlot = 2;
  } else {
    slot2 = emoji;
    $('#slot2').textContent = emoji;
    $('#slot2').classList.add('filled');
    activeSlot = 1;
  }
  showResult();
}

function showResult() {
  if (slot1 && slot2) {
    $('#result').innerHTML = `<span>${slot1}${slot2}</span>`;
  } else if (slot1) {
    $('#result').innerHTML = `<span>${slot1}</span>`;
  } else {
    $('#result').innerHTML = '';
  }
}

function clearSlots() {
  slot1 = ''; slot2 = ''; activeSlot = 1;
  $('#slot1').textContent = ''; $('#slot1').classList.remove('filled');
  $('#slot2').textContent = ''; $('#slot2').classList.remove('filled');
  $('#result').innerHTML = '';
}

function randomPick() {
  const keys = Object.keys(categories);
  const cat = categories[keys[Math.floor(Math.random() * keys.length)]];
  const e1 = cat[Math.floor(Math.random() * cat.length)];
  const e2 = cat[Math.floor(Math.random() * cat.length)];
  slot1 = e1; slot2 = e2;
  $('#slot1').textContent = e1; $('#slot1').classList.add('filled');
  $('#slot2').textContent = e2; $('#slot2').classList.add('filled');
  activeSlot = 1;
  showResult();
}

function doCopy() {
  if (slot1 && slot2) copyText(slot1 + slot2);
  else if (slot1) copyText(slot1);
}

buildToolbar();
buildCategories();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'😊', href:'/text/emoji-picker.html', name:'Emoji Picker'},
    {icon:'🎲', href:'/fun/dice-roller.html', name:'Dice Roller'},
    {icon:'🎰', href:'/fun/wheel-of-names.html', name:'Spin Wheel'},
    {icon:'🎨', href:'/text/ascii-art.html', name:'ASCII Art'},
  ]
});
</script>
