<script>
GZI18n.register({
  en: {
    toolTitle: 'Color Harmony Generator',
    toolDesc: 'Generate beautiful color harmonies from any base color — complementary, analogous, triadic, tetradic, split-complementary and more.',
    baseColor: 'Base Color',
    complementary: 'Complementary',
    analogous: 'Analogous',
    triadic: 'Triadic',
    tetradic: 'Tetradic (Square)',
    splitComp: 'Split-Complementary',
    monochromatic: 'Monochromatic',
    step1: 'Pick a base color using the color picker or enter a HEX value',
    step2: 'Choose a harmony type from the buttons above',
    step3: 'Click any color swatch to copy its HEX code',
    step4: 'Use the Copy buttons to export the full palette',
  },
  zh: {
    toolTitle: '配色和谐生成器',
    toolDesc: '从任意基色生成美丽的配色方案 — 互补色、类似色、三色、四色、分裂互补等。',
    baseColor: '基色',
    complementary: '互补色',
    analogous: '类似色',
    triadic: '三色',
    tetradic: '四色（方形）',
    splitComp: '分裂互补色',
    monochromatic: '单色',
    step1: '使用取色器选择基色，或输入 HEX 值',
    step2: '从上方按钮中选择配色类型',
    step3: '点击任意色块复制其 HEX 代码',
    step4: '使用复制按钮导出完整配色方案',
  }
});

const { $, copyText, t } = GZ;
const types = ['complementary','analogous','triadic','tetradic','splitComp','monochromatic'];
let currentType = 'complementary';

function hexToHsl(hex) {
  let r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
  let h = 0, s = 0, l = (max+min)/2;
  if (d !== 0) {
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    if (max === r) h = ((g-b)/d+(g<b?6:0))/6;
    else if (max === g) h = ((b-r)/d+2)/6;
    else h = ((r-g)/d+4)/6;
  }
  return [h*360, s*100, l*100];
}

function hslToHex(h,s,l) {
  h = ((h%360)+360)%360; s = Math.max(0,Math.min(100,s)); l = Math.max(0,Math.min(100,l));
  const s2=s/100, l2=l/100, c=(1-Math.abs(2*l2-1))*s2, x=c*(1-Math.abs((h/60)%2-1)), m=l2-c/2;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x}else if(h<120){r=x;g=c}else if(h<180){g=c;b=x}else if(h<240){g=x;b=c}else if(h<300){r=x;b=c}else{r=c;b=x}
  const toH=v=>Math.round((v+m)*255).toString(16).padStart(2,'0');
  return `#${toH(r)}${toH(g)}${toH(b)}`;
}

function getHarmony(h, s, l, type) {
  switch(type) {
    case 'complementary': return [[h,s,l],[h+180,s,l]];
    case 'analogous': return [[h-30,s,l],[h,s,l],[h+30,s,l]];
    case 'triadic': return [[h,s,l],[h+120,s,l],[h+240,s,l]];
    case 'tetradic': return [[h,s,l],[h+90,s,l],[h+180,s,l],[h+270,s,l]];
    case 'splitComp': return [[h,s,l],[h+150,s,l],[h+210,s,l]];
    case 'monochromatic': return [[h,s,l+20],[h,s,l+10],[h,s,l],[h,s,l-10],[h,s,l-20]];
    default: return [[h,s,l]];
  }
}

function renderColors() {
  const hex = $('#base-color-input').value;
  const [h,s,l] = hexToHsl(hex);
  const colors = getHarmony(h, s, l, currentType);
  const container = $('#colors');
  container.innerHTML = colors.map(([ch,cs,cl]) => {
    const c = hslToHex(ch,cs,cl);
    return `<div class="color-swatch" onclick="copyText('${c}')" title="${t('copy')} ${c}">
      <div class="preview" style="background:${c}"></div>
      <div class="info"><div class="hex">${c}</div><div>${ch.toFixed(0)}° ${cs.toFixed(0)}% ${cl.toFixed(0)}%</div></div>
    </div>`;
  }).join('');
  drawWheel(h, s, l, colors);
}

function drawWheel(bh, bs, bl, colors) {
  const canvas = $('#wheel'), ctx = canvas.getContext('2d');
  const cx = 160, cy = 160, r = 140;
  ctx.clearRect(0,0,320,320);
  for (let a = 0; a < 360; a++) {
    const rad1 = (a-90)*Math.PI/180, rad2 = (a+1-90)*Math.PI/180;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,rad1,rad2); ctx.closePath();
    ctx.fillStyle = `hsl(${a},80%,55%)`; ctx.fill();
  }
  ctx.beginPath(); ctx.arc(cx,cy,60,0,Math.PI*2);
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#0a0a1a';
  ctx.fill();
  colors.forEach(([ch,cs,cl], i) => {
    const rad = (ch-90)*Math.PI/180;
    const dist = 60 + (r-60) * (cl/100 > 1 ? 1 : 0.7);
    const x = cx + Math.cos(rad)*dist, y = cy + Math.sin(rad)*dist;
    ctx.beginPath(); ctx.arc(x,y,i===0?12:10,0,Math.PI*2);
    ctx.fillStyle = hslToHex(ch,cs,cl); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5; ctx.stroke();
  });
}

// Build type buttons
$('#harmony-types').innerHTML = types.map(tp =>
  `<button class="${tp===currentType?'active':''}" data-type="${tp}">${t(tp)}</button>`
).join('');
$('#harmony-types').addEventListener('click', e => {
  if (!e.target.dataset.type) return;
  currentType = e.target.dataset.type;
  document.querySelectorAll('.harmony-types button').forEach(b => b.classList.toggle('active', b.dataset.type === currentType));
  renderColors();
});

// Sync inputs
$('#base-color-input').addEventListener('input', e => { $('#base-hex').value = e.target.value; renderColors(); });
$('#base-hex').addEventListener('input', e => {
  const v = e.target.value;
  if (/^#[0-9a-fA-F]{6}$/.test(v)) { $('#base-color-input').value = v; renderColors(); }
});

// Toolbar
$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyAsCSS()">${t('copy')} CSS</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyAsJSON()">${t('copy')} JSON</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyAsCSV()">${t('copy')} CSV</button>`;

function getPaletteHex() {
  const hex = $('#base-color-input').value;
  const [h,s,l] = hexToHsl(hex);
  return getHarmony(h,s,l,currentType).map(([ch,cs,cl]) => hslToHex(ch,cs,cl));
}
window.copyAsCSS = () => {
  const vars = getPaletteHex().map((c,i) => `  --color-${i+1}: ${c};`).join('\n');
  copyText(`:root {\n${vars}\n}`);
};
window.copyAsJSON = () => copyText(JSON.stringify(getPaletteHex()));
window.copyAsCSV = () => copyText(getPaletteHex().join(', '));

renderColors();

GZ.renderToolPage({
  category: 'color',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',

    {icon:'🌈', href:'/color/palette.html', name:'Palette Generator'},

    {icon:'🔄', href:'/color/hex-rgb.html', name:'HEX ↔ RGB'},
  ]
});
</script>
