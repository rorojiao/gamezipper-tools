<script>
GZI18n.register({
  en:{toolTitle:'JPG to AVIF Converter',toolDesc:'Convert JPG/JPEG images to AVIF format online. Batch convert with adjustable quality for up to 50% smaller files. Free, no upload, no signup.',
    s1:'Select or drag JPG/JPEG images',s2:'Adjust the AVIF quality slider',
    s3:'Click Convert All to AVIF',s4:'Download each converted AVIF file',
    dropHint:'Drop JPG/JPEG images here or click to upload',qLabel:'Quality:',
    files:'files',original:'Original:',converted:'Converted:',
    reset:'↩️ Reset',download:'⬇ Download AVIF',
    note:'Note: AVIF encoding requires a modern browser (Chrome 85+, Firefox 93+, Safari 16+).',
    rPngAvif:'PNG to AVIF',rAvifJpg:'AVIF to JPG',rAvifPng:'AVIF to PNG',rAvifConv:'AVIF Converter'},
  zh:{toolTitle:'JPG 转 AVIF 转换器',toolDesc:'将 JPG/JPEG 图片在线转换为 AVIF 格式。批量转换、可调质量、文件体积减小高达 50%。免费，无需上传、无需注册。',
    s1:'选择或拖放 JPG/JPEG 图片',s2:'调整 AVIF 质量滑块',
    s3:'点击「全部转换为 AVIF」',s4:'下载每张转换后的 AVIF 文件',
    dropHint:'拖放 JPG/JPEG 图片到此处或点击上传',qLabel:'质量：',
    files:'个文件',original:'原始：',converted:'转换后：',
    reset:'↩️ 重置',download:'⬇ 下载 AVIF',
    note:'提示：AVIF 编码需要现代浏览器（Chrome 85+、Firefox 93+、Safari 16+）。',
    rPngAvif:'PNG 转 AVIF',rAvifJpg:'AVIF 转 JPG',rAvifPng:'AVIF 转 PNG',rAvifConv:'AVIF 转换器'}
});
const {t}=GZI18n;
let files=[];let convertedBlobs={};
document.getElementById('dropText').textContent=t('dropHint');
document.getElementById('qLabel').textContent=t('qLabel');
document.getElementById('compatNote').textContent=t('note');
const dz=document.getElementById('dropzone'),fi=document.getElementById('fileIn');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');handleFiles(e.dataTransfer.files)});
fi.addEventListener('change',e=>{handleFiles(e.target.files)});
const qSlider=document.getElementById('qSlider'),qVal=document.getElementById('qVal');
qSlider.addEventListener('input',()=>{qVal.textContent=qSlider.value+'%'});
function handleFiles(fl){files=Array.from(fl).filter(f=>/\.jpe?g$/i.test(f.name)||f.type==='image/jpeg');if(!files.length)return;document.getElementById('controls').style.display='block';dz.style.display='none';renderList();updateSummary()}
function fmt(b){return b>1048576?(b/1048576).toFixed(1)+' MB':(b/1024).toFixed(1)+' KB'}
function renderList(){const r=document.getElementById('results');r.innerHTML='';files.forEach((f,i)=>{const card=document.createElement('div');card.className='result-card';const url=URL.createObjectURL(f);card.innerHTML=`<img src="${url}"><div class="meta"><div class="name">${f.name}</div><div class="size">${t('original')} ${fmt(f.size)} · JPG</div></div><div id="result-info-${i}"></div>`;r.appendChild(card)})}
function updateSummary(){document.getElementById('summary').innerHTML=`<span class="num">${files.length}</span> ${t('files')}`}
function convertAll(){const q=+qSlider.value/100;files.forEach((f,i)=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');c.width=img.width;c.height=img.height;const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);ctx.drawImage(img,0,0);c.toBlob(b=>{const el=document.getElementById('result-info-'+i);if(!b){el.innerHTML=`<span style="color:var(--gz-accent)">⚠ AVIF encoding not supported in this browser</span>`;return}const save=f.size-b.size;const pct2=((save/f.size)*100);const saveTxt=save>0?`↓${pct2.toFixed(0)}%`:'↑'+Math.abs(pct2).toFixed(0)+'%';el.innerHTML=`<div class="size">${t('converted')} <span class="num">${fmt(b.size)}</span> <span class="save" style="color:${save>0?'var(--gz-success)':'var(--gz-accent)'}">${saveTxt}</span></div><button class="gz-btn" style="margin-top:.3rem;font-size:.8rem;padding:.3rem .8rem" onclick="downloadBlob(${i})">${t('download')}</button>`;convertedBlobs[i]=b},'image/avif',q)};img.onerror=()=>{const el=document.getElementById('result-info-'+i);if(el)el.innerHTML=`<span style="color:var(--gz-accent)">⚠ Cannot decode this JPG</span>`};img.src=URL.createObjectURL(f)})}
function downloadBlob(i){const b=convertedBlobs[i];if(!b)return;const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=files[i].name.replace(/\.[^.]+$/,'')+'.avif';a.click()}
function resetTool(){files=[];convertedBlobs={};document.getElementById('controls').style.display='none';dz.style.display='block';fi.value=''}
GZ.renderToolPage({category:'image',titleKey:'toolTitle',descKey:'toolDesc',
  howToSteps:['s1','s2','s3','s4'],
  related:[
    {href:'/image/png-to-avif.html',icon:'🖼️',nameKey:'rPngAvif'},
    {href:'/image/avif-to-jpg.html',icon:'🖼️',nameKey:'rAvifJpg'},
    {href:'/image/avif-to-png.html',icon:'🖼️',nameKey:'rAvifPng'},
    {href:'/image/avif-converter.html',icon:'🔄',nameKey:'rAvifConv'}
  ]
});
</script>
