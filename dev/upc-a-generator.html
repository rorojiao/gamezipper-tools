<script>
GZI18n.register({
  en: {
    toolTitle: 'UPC-A Barcode Generator',
    toolDesc: 'Generate UPC-A barcodes with automatic checksum calculation. Enter 11 digits and get the 12th check digit. Download as SVG or PNG — 100% browser-only.',

    lblScale: 'Scale',

    downloadPng: 'Download PNG',
    step1: 'Enter 11 or 12 numeric digits in the data field',
    step2: 'The 12th check digit is calculated automatically',
    step3: 'Adjust scale and height for your needs',
    step4: 'Download as SVG (vector) or PNG (raster)',
  },
  zh: {
    toolTitle: 'UPC-A 条形码生成器',
    toolDesc: '生成 UPC-A 条形码，自动计算校验码。输入 11 位数字自动获得第 12 位校验位。可下载 SVG 或 PNG — 100% 浏览器本地运行。',
    lblData: '数据（11-12 位数字）',
    lblScale: '缩放',
    lblHeight: '高度',
    lblShowText: '显示文字',
    checksum: '校验位（第 12 位）：',
    enterValid: '请输入 11 或 12 位数字（0-9）',
    downloadSvg: '下载 SVG',
    downloadPng: '下载 PNG',
    step1: '在数据栏输入 11 或 12 位数字',
    step2: '第 12 位校验码将自动计算',
    step3: '根据需要调整缩放和高度',
    step4: '下载为 SVG（矢量）或 PNG（位图）',
  }
});

const { $, copyText, t } = GZ;

// UPC-A uses the same encoding as EAN-13 left half (L-code for all) and right half (R-code)
const L = ['0001101','0011001','0010011','0111101','0100011','0110001','0101111','0111011','0110111','0001011'];
const R = ['1110010','1100110','1101100','1000010','1011100','1001110','1010000','1000100','1001000','1110100'];

function upcChecksum(eleven) {
  // UPC-A: odd positions (1,3,5,7,9,11) *3 + even positions (2,4,6,8,10)
  // In 0-indexed: positions 0,2,4,6,8,10 are "odd" (1st,3rd,...)
  let sum = 0;
  for (let i = 0; i < 11; i++) {
    const d = parseInt(eleven[i]);
    sum += d * (i % 2 === 0 ? 3 : 1);
  }
  return (10 - (sum % 10)) % 10;
}

function encodeUPC(fullDigits) {
  const left = fullDigits.substring(0, 6);
  const right = fullDigits.substring(6, 12);
  let bits = '101'; // start guard
  for (let i = 0; i < 6; i++) {
    bits += L[parseInt(left[i])];
  }
  bits += '01010'; // center guard
  for (let i = 0; i < 6; i++) {
    bits += R[parseInt(right[i])];
  }
  bits += '101'; // end guard
  return bits;
}

function generate() {
  const raw = $('#data').value.replace(/\D/g, '');
  const svg = $('#barcode-svg');
  const info = $('#checksum-info');

  if (raw.length < 11 || raw.length > 12 || !/^\d+$/.test(raw)) {
    svg.innerHTML = '';
    info.innerHTML = `<span style="color:var(--gz-accent)">${t('enterValid')}</span>`;
    return;
  }

  let digits = raw;
  let checkDigit;
  if (raw.length === 11) {
    checkDigit = upcChecksum(raw);
    digits = raw + checkDigit;
    info.innerHTML = `<span style="color:var(--gz-success)">✓ ${t('checksum')}<strong>${checkDigit}</strong> — ${digits}</span>`;
  } else {
    const calc = upcChecksum(raw.substring(0, 11));
    checkDigit = parseInt(raw[11]);
    if (calc === checkDigit) {
      info.innerHTML = `<span style="color:var(--gz-success)">✓ ${t('checksum')}<strong>${checkDigit}</strong> — ${digits} (valid)</span>`;
    } else {
      info.innerHTML = `<span style="color:var(--gz-accent)">⚠ Checksum mismatch: expected ${calc}, got ${checkDigit}. <a href="#" onclick="$('#data').value='${raw.substring(0,11)}';generate();return false" style="color:var(--accent)">Fix</a></span>`;
    }
  }

  const bits = encodeUPC(digits);
  const scale = parseInt($('#scale').value);
  const barH = parseInt($('#height').value);
  const unitW = scale;
  const quietZone = 9 * scale;
  const totalW = bits.length * unitW + quietZone * 2;
  const textH = $('#showtext').checked ? 18 : 0;
  const totalH = barH + textH;
  const textY = barH + 14;

  let rects = '';
  for (let i = 0; i < bits.length; i++) {
    if (bits[i] === '1') {
      rects += `<rect x="${quietZone + i * unitW}" y="0" width="${unitW}" height="${barH}" fill="#000"/>`;
    }
  }

  let textEl = '';
  if ($('#showtext').checked) {
    textEl = `<text x="${totalW/2}" y="${textY}" font-family="monospace" font-size="14" fill="#000" text-anchor="middle" letter-spacing="2">${digits}</text>`;
  }

  svg.setAttribute('width', totalW);
  svg.setAttribute('height', totalH);
  svg.setAttribute('viewBox', `0 0 ${totalW} ${totalH}`);
  svg.innerHTML = `<rect x="0" y="0" width="${totalW}" height="${totalH}" fill="#fff"/>${rects}${textEl}`;
}

$('#data').addEventListener('input', generate);
$('#scale').addEventListener('input', e => { $('#scale-val').textContent = e.target.value + 'x'; generate(); });
$('#height').addEventListener('input', e => { $('#height-val').textContent = e.target.value + 'px'; generate(); });
$('#showtext').addEventListener('change', generate);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadSvg()">${t('downloadSvg')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadPng()">${t('downloadPng')}</button>`;

function downloadSvg() {
  const svg = $('#barcode-svg');
  const clone = svg.cloneNode(true);
  const data = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([data], {type: 'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `upc-a-${$('#data').value.replace(/\D/g,'')}.svg`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function downloadPng() {
  const svg = $('#barcode-svg');
  const data = new XMLSerializer().serializeToString(svg);
  const img = new Image();
  const blob = new Blob([data], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = img.width * 2;
    canvas.height = img.height * 2;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    canvas.toBlob(function(b) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = `upc-a-${$('#data').value.replace(/\D/g,'')}.png`;
      a.click();
      URL.revokeObjectURL(a.href);
    });
  };
  img.src = url;
}

$('#lbl-data').textContent = t('lblData');
$('#lbl-scale').textContent = t('lblScale');
$('#lbl-height').textContent = t('lblHeight');
$('#lbl-showtext').textContent = t('lblShowText');
$('#scale-val').textContent = '2x';
$('#height-val').textContent = '100px';

generate();

  ]
});
</script>
