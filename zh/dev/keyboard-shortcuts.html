      {cat:'Tab',action:'Previous tab',win:'Ctrl+PageUp',mac:'Cmd+Shift+['},
      {cat:'Copy',action:'Copy (select to copy)',win:'Ctrl+Shift+C',mac:'Cmd+C'},
      {cat:'Copy',action:'Paste',win:'Ctrl+Shift+V',mac:'Cmd+V'},
      {cat:'Tmux',action:'Prefix',win:'Ctrl+B',mac:'Ctrl+B'},
      {cat:'Tmux',action:'New window',win:'Ctrl+B C',mac:'Ctrl+B C'},
      {cat:'Tmux',action:'Split horizontal',win:'Ctrl+B "',mac:'Ctrl+B "'},
      {cat:'Tmux',action:'Split vertical',win:'Ctrl+B %',mac:'Ctrl+B %'},
    ]
  },
};

function setPlatform(p) {
  platform = p;
  $('#plat-win').classList.toggle('active', p === 'win');
  $('#plat-mac').classList.toggle('active', p === 'mac');
  renderTable();
}

function setApp(app) {
  currentApp = app;
  document.querySelectorAll('.ks-app').forEach(el => {
    el.classList.toggle('active', el.dataset.app === app);
  });
  renderTable();
}

function renderApps() {
  let html = '';
  for (const [key, data] of Object.entries(SHORTCUTS)) {
    html += `<div class="ks-app ${key === currentApp ? 'active' : ''}" data-app="${key}" onclick="setApp('${key}')">${data.label}</div>`;
  }
  $('#apps').innerHTML = html;
}

function renderTable() {
  const query = $('#search').value.toLowerCase().trim();
  const items = SHORTCUTS[currentApp].items;
  const filtered = query
    ? items.filter(i => i.action.toLowerCase().includes(query) || i.cat.toLowerCase().includes(query) || i.win.toLowerCase().includes(query) || i.mac.toLowerCase().includes(query))
    : items;

  let html = `<table class="ks-table"><thead><tr>
    <th>${t('actionCol')}</th>
    <th>${t('shortcutCol')}</th>
    <th>${t('categoryCol')}</th>
  </tr></thead><tbody>`;

  for (const item of filtered) {
    const combo = platform === 'win' ? item.win : item.mac;
    const kbdHtml = combo.split(' / ').map(c => `<span class="kbd" onclick="copyText('${c.replace(/'/g,"\\'")}')" style="cursor:pointer">${c}</span>`).join(' <span style="opacity:.5">or</span> ');
    html += `<tr>
      <td>${item.action}</td>
      <td>${kbdHtml}</td>
      <td><span class="ks-cat">${item.cat}</span></td>
    </tr>`;
  }
  html += '</tbody></table>';
  if (filtered.length === 0) {
    html = '<div style="padding:20px;color:var(--text2)">No shortcuts found.</div>';
  }
  html += `<div style="margin-top:8px;font-size:.8rem;color:var(--text2)">${filtered.length} shortcuts<span class="ks-count">· Click any key combo to copy</span></div>`;
  $('#table-container').innerHTML = html;
}

renderApps();
renderTable();
