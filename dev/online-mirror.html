const { $, t, showToast } = GZ;
let stream = null, frozen = false, flipV = false, gray = false, invert = false;

function toast(msg){ showToast(msg); }

function showError(key){
  const e = $('#error');
  e.textContent = t(key);
  e.classList.add('show');
}
function hideError(){ $('#error').classList.remove('show'); }

function updateFilter(){
  const v = $('#video');
  const bright = +$('#bright').value, zoom = +$('#zoom').value, contrast = +$('#contrast').value, saturate = +$('#saturate').value;
  $('#v-bright').textContent = bright + '%';
  $('#v-zoom').textContent = (zoom/100).toFixed(1) + 'x';
  $('#v-contrast').textContent = contrast + '%';
  $('#v-saturate').textContent = saturate + '%';
  const fx = flipV ? '-1' : '1';
  v.style.filter = `brightness(${bright}%) contrast(${contrast}%) saturate(${saturate}%)${gray?' grayscale(100%)':''}${invert?' invert(100%)':''}`;
  v.style.transform = `scaleX(-1) scaleY(${fx}) scale(${zoom/100})`;
}

async function start(){
  hideError();
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    showError('errGeneric'); return;
  }
  try{
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
    const v = $('#video');
    v.srcObject = stream;
    v.style.display = 'block';
    $('#empty').style.display = 'none';
    $('#badge').style.display = 'flex';
    $('#dot').classList.add('live');
    $('#badge-text').textContent = t('live');
    $('#controls').style.display = 'grid';
    $('#start-btn').textContent = t('stop');
    updateFilter();
  }catch(err){
    if(err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') showError('errDenied');
    else if(err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') showError('errNotFound');
    else if(err.name === 'NotReadableError' || err.name === 'TrackStartError') showError('errInUse');
    else showError('errGeneric');
  }
}

function stop(){
  if(stream){
    stream.getTracks().forEach(tr => tr.stop());
    stream = null;
  }
  $('#video').srcObject = null;
  $('#video').style.display = 'none';
  $('#empty').style.display = 'flex';
  $('#badge').style.display = 'none';
  $('#dot').classList.remove('live');
  $('#controls').style.display = 'none';
  $('#start-btn').textContent = t('start');
}

function snapshot(){
  if(!stream){ toast(t('needStart')); return; }
  const v = $('#video');
  const c = document.createElement('canvas');
  c.width = v.videoWidth || 640;
  c.height = v.videoHeight || 480;
  const ctx = c.getContext('2d');
  // apply same filter & flip
  const bright = +$('#bright').value, zoom = +$('#zoom').value, contrast = +$('#contrast').value, saturate = +$('#saturate').value;
  ctx.filter = `brightness(${bright}%) contrast(${contrast}%) saturate(${saturate}%)${gray?' grayscale(100%)':''}${invert?' invert(100%)':''}`;
  ctx.translate(c.width, 0);
  ctx.scale(-1, 1);
  if(flipV){ ctx.translate(0, c.height); ctx.scale(1, -1); }
  const z = zoom/100;
  const sw = c.width / z, sh = c.height / z, sx = (c.width - sw)/2, sy = (c.height - sh)/2;
  ctx.drawImage(v, sx, sy, sw, sh, 0, 0, c.width, c.height);
  c.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'mirror-snapshot.png'; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    toast(t('snapshotSaved'));
  });
}

function toggleFreeze(){
  const v = $('#video');
  frozen = !frozen;
  if(frozen){ v.pause(); $('#freeze-btn').textContent = t('unfreeze'); }
  else { v.play(); $('#freeze-btn').textContent = t('freeze'); }
}

function toggleFlipV(){ flipV = !flipV; $('#tog-flipv').classList.toggle('active', flipV); updateFilter(); }
function toggleGray(){ gray = !gray; $('#tog-gray').classList.toggle('active', gray); updateFilter(); }
function toggleInvert(){ invert = !invert; $('#tog-invert').classList.toggle('active', invert); updateFilter(); }

// toolbar buttons
$('#toolbar').innerHTML = `
  <button class="gz-btn" id="start-btn" onclick="start()">${t('start')}</button>
  <button class="gz-btn gz-btn-secondary" id="snap-btn" onclick="snapshot()">${t('snapshot')}</button>
  <button class="gz-btn gz-btn-secondary" id="freeze-btn" onclick="toggleFreeze()">${t('freeze')}</button>`;

// toggles row
$('#toggles').innerHTML = `
  <button class="mirror-tog" id="tog-flipv" onclick="toggleFlipV()">${t('flipV')}</button>
  <button class="mirror-tog" id="tog-gray" onclick="toggleGray()">${t('grayscale')}</button>
  <button class="mirror-tog" id="tog-invert" onclick="toggleInvert()">${t('invert')}</button>`;

$('#empty-text').textContent = t('emptyText');
$('#lbl-bright').textContent = t('lblBright');
$('#lbl-zoom').textContent = t('lblZoom');
$('#lbl-contrast').textContent = t('lblContrast');
$('#lbl-saturate').textContent = t('lblSaturate');
$('#tip').innerHTML = t('tipText');

['bright','zoom','contrast','saturate'].forEach(id => $('#'+id).addEventListener('input', updateFilter));

window.addEventListener('beforeunload', () => { if(stream) stream.getTracks().forEach(tr => tr.stop()); });

    {icon:'📡', href:'/dev/my-ip-address.html', name:'My IP Address'},
  ]
});
</script>
