const { $, copyText, t } = GZ;

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function evaluateXPath() {
  const xmlStr = $('#xml-input').value.trim();
  const xpathStr = $('#xpath-input').value.trim();
  const resultEl = $('#result');
  const countEl = $('#match-count');

  if (!xmlStr || !xpathStr) {
    resultEl.innerHTML = '';
    countEl.textContent = '';
    return;
  }

  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlStr, 'application/xml');
    const parseError = doc.querySelector('parsererror');
    if (parseError) {
      // Try as HTML
      const htmlDoc = parser.parseFromString(xmlStr, 'text/html');
      try {
        const resolver = htmlDoc.createNSResolver(htmlDoc.documentElement);
        const result = htmlDoc.evaluate(xpathStr, htmlDoc, resolver, XPathResult.ORDERED_NODE_SNAPSHOT_TYPE, null);
        const matches = [];
        for (let i = 0; i < result.snapshotLength; i++) {
          const node = result.snapshotItem(i);
          if (node.nodeType === 2) {
            matches.push(node.name + '="' + node.value + '"');
          } else if (node.nodeType === 1) {
            matches.push(node.outerHTML ? node.outerHTML.substring(0, 200) : node.textContent);
          } else {
            matches.push(node.textContent || String(node.nodeValue));
          }
        }
        if (matches.length === 0) {
          resultEl.innerHTML = '<span style="color:var(--text3)">' + t('noMatch') + '</span>';
          countEl.textContent = '0 ' + t('matches');
        } else {
          resultEl.innerHTML = matches.map(m => '<div style="padding:4px 0;border-bottom:1px solid var(--border)">' + escapeHtml(m) + '</div>').join('');
          countEl.textContent = matches.length + ' ' + t('matches');
        }
        return;
      } catch(e) {
        resultEl.innerHTML = '<span class="error-msg">' + t('invalidXPath') + ': ' + escapeHtml(e.message) + '</span>';
        countEl.textContent = '';
        return;
      }
    }

    const resolver = doc.createNSResolver(doc.documentElement);
    const result = doc.evaluate(xpathStr, doc, resolver, XPathResult.ORDERED_NODE_SNAPSHOT_TYPE, null);
    const matches = [];
    for (let i = 0; i < result.snapshotLength; i++) {
      const node = result.snapshotItem(i);
      if (node.nodeType === 2) {
        matches.push(node.name + '="' + node.value + '"');
      } else if (node.nodeType === 1) {
        const s = new XMLSerializer();
        const str = s.serializeToString(node);
        matches.push(str.substring(0, 300));
      } else {
        matches.push(node.textContent || String(node.nodeValue));
      }
    }
    if (matches.length === 0) {
      resultEl.innerHTML = '<span style="color:var(--text3)">' + t('noMatch') + '</span>';
      countEl.textContent = '0 ' + t('matches');
    } else {
      resultEl.innerHTML = matches.map(m => '<div style="padding:4px 0;border-bottom:1px solid var(--border)">' + escapeHtml(m) + '</div>').join('');
      countEl.textContent = matches.length + ' ' + t('matches');
    }
  } catch(e) {
    resultEl.innerHTML = '<span class="error-msg">' + escapeHtml(e.message) + '</span>';
    countEl.textContent = '';
  }
}

}

function doClear() {
