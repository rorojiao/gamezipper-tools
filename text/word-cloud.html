const { $, copyText, t, showToast } = GZ;

const STOP_WORDS = new Set(['the','be','to','of','and','a','in','that','have','i','it','for','not','on','with','he','as','you','do','at','this','but','his','by','from','they','we','say','her','she','or','an','will','my','one','all','would','there','their','what','so','up','out','if','about','who','get','which','go','me','when','make','can','like','time','no','just','him','know','take','people','into','year','your','good','some','could','them','see','other','than','then','now','look','only','come','its','over','think','also','back','after','use','two','how','our','work','first','well','way','even','new','want','because','any','these','give','day','most','us','is','are','was','were','been','has','had','did','got','am','s','t','m','d','re','ve','ll','im','dont','doesnt','didnt','wont','shouldnt','couldnt','isnt','arent','wasnt','werent','hasnt','havent','hadnt','doesnt','im','youre','hes','shes','its','were','theyre','ive','youve','weve','theyve','id','youd','hed','shed','wed','theyd','ill','youll','hell','shell','well','theyll']);

const THEMES = {
  vibrant: ['#e94560','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f43f5e','#a855f7'],
  ocean: ['#0c4a6e','#075985','#0369a1','#0284c7','#0ea5e9','#38bdf8','#7dd3fc','#bae6fd','#22d3ee','#67e8f9'],
  sunset: ['#7c2d12','#9a3412','#c2410c','#ea580c','#f97316','#fb923c','#fdba74','#fed7aa','#fbbf24','#fcd34d'],
  forest: ['#14532d','#166534','#15803d','#16a34a','#22c55e','#4ade80','#86efac','#bef264','#a3e635','#84cc16'],
  pastel: ['#fda4af','#fcd34d','#bef264','#a5f3fc','#c4b5fd','#fbcfe8','#fed7aa','#bae6fd','#d9f99d','#f9a8d4'],
  monochrome: ['#1f2937','#374151','#4b5563','#6b7280','#9ca3af','#d1d5db','#111827','#52525b','#71717a','#a1a1aa']
};

const FONTS = {
  serif: 'Georgia, "Times New Roman", serif',
  sans: '"Helvetica Neue", Arial, sans-serif',
  mono: '"Courier New", monospace',
  display: '"Impact", "Arial Black", sans-serif'
};

function tokenize(text) {
  return text.toLowerCase()
    .replace(/[^\p{L}\p{N}\s']/gu, ' ')
    .split(/\s+/)
    .filter(w => w.length > 2 && !STOP_WORDS.has(w) && !/^\d+$/.test(w));
}

function countWords(text) {
  const words = tokenize(text);
  const counts = {};
  for (const w of words) counts[w] = (counts[w] || 0) + 1;
  return Object.entries(counts).sort((a,b) => b[1]-a[1]);
}

let lastRendered = null;
let currentText = '';

function generate() {
  const text = $('#input').value.trim();
  currentText = text;
  if (!text) {
    $('#canvasWrap').innerHTML = `<div style="text-align:center;color:var(--text2);padding:40px"><div style="font-size:3em;opacity:.3;margin-bottom:10px">☁️</div><div style="font-size:.9em">${t('lblPlaceholder')}</div></div>`;
    $('#stats').style.display = 'none';
    lastRendered = null;
    return;
  }
  const allWords = countWords(text);
  const totalWords = tokenize(text).length;
  const uniqueWords = allWords.length;

  const maxWords = Math.min(+$('#maxWords').value || 60, uniqueWords);
  const width = +$('#width').value || 800;
  const height = +$('#height').value || 500;
  const theme = $('#theme').value;
  const fontKey = $('#font').value;
  const colors = THEMES[theme];
  const fontFamily = FONTS[fontKey];

  const words = allWords.slice(0, maxWords);
  const maxCount = words[0] ? words[0][1] : 1;

  // Spiral placement
  const placed = [];
  const minFont = 14, maxFont = Math.min(80, height / 6);

  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('xmlns', svgNS);
  svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
  svg.setAttribute('width', width);
  svg.setAttribute('height', height);
  svg.setAttribute('style', 'background:#fff;border-radius:8px;display:block');

  // White background
  const bg = document.createElementNS(svgNS, 'rect');
  bg.setAttribute('width', width);
  bg.setAttribute('height', height);
  bg.setAttribute('fill', '#ffffff');
  svg.appendChild(bg);

  // Try to place each word
  for (let i = 0; i < words.length; i++) {
    const [word, count] = words[i];
    const fontSize = minFont + (count / maxCount) * (maxFont - minFont);
    const color = colors[i % colors.length];

    // Estimate text dimensions
    const charWidth = fontSize * 0.55;
    const w = word.length * charWidth;
    const h = fontSize * 1.1;

    let placed_ok = false;
    // Spiral search
    for (let attempt = 0; attempt < 800; attempt++) {
      const angle = attempt * 0.4;
      const radius = attempt * 0.6;
      const x = width / 2 + radius * Math.cos(angle) - w / 2;
      const y = height / 2 + radius * Math.sin(angle);

      if (x < 5 || y < 5 || x + w > width - 5 || y + h > height - 5) continue;

      // Check overlap
      const newBox = { x, y, w, h };
      let overlap = false;
      for (const p of placed) {
        if (!(newBox.x + newBox.w < p.x || newBox.x > p.x + p.w ||
              newBox.y + newBox.h < p.y || newBox.y > p.y + p.h)) {
          overlap = true;
          break;
        }
      }
      if (!overlap) {
        const text = document.createElementNS(svgNS, 'text');
        text.setAttribute('x', x + w / 2);
        text.setAttribute('y', y + fontSize);
        text.setAttribute('font-size', fontSize);
        text.setAttribute('font-family', fontFamily);
        text.setAttribute('font-weight', i < 5 ? '700' : (i < 15 ? '600' : '500'));
        text.setAttribute('fill', color);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('transform', `rotate(${(Math.random() - 0.5) * 30} ${x + w / 2} ${y + fontSize / 2})`);
        text.textContent = word;
        svg.appendChild(text);
        placed.push(newBox);
        placed_ok = true;
        break;
      }
    }
  }

  $('#canvasWrap').innerHTML = '';
  $('#canvasWrap').appendChild(svg);
  lastRendered = svg;

  // Update stats
  $('#stats').style.display = 'flex';
  $('#statTotal').textContent = totalWords;
  $('#statUnique').textContent = uniqueWords;
  $('#statShown').textContent = placed.length;
}

function downloadPNG() {
  if (!lastRendered) return;
  const svgData = new XMLSerializer().serializeToString(lastRendered);
  const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(svgBlob);
  const img = new Image();
  const width = +$('#width').value || 800;
  const height = +$('#height').value || 500;
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = width * 2;
    canvas.height = height * 2;
    const ctx = canvas.getContext('2d');
    ctx.scale(2, 2);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, width, height);
    ctx.drawImage(img, 0, 0);
    canvas.toBlob(function(blob) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'wordcloud.png';
      a.click();
      showToast('Downloaded!');
    }, 'image/png');
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

function downloadSVG() {
  if (!lastRendered) return;
  const svgData = new XMLSerializer().serializeToString(lastRendered);
  const blob = new Blob([svgData], {type: 'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'wordcloud.svg';
  a.click();
  showToast('Downloaded!');
}

function loadSample() {
  $('#input').value = 'The quick brown fox jumps over the lazy dog. The dog barks loudly at the fox. Quick foxes are smart animals, and quick dogs are loyal companions. Brown animals are common in the forest. The forest is full of life and natural beauty. Natural beauty inspires artists, writers, and creative thinkers everywhere. Creative work requires patience, practice, and persistence. Practice makes perfect, but perfect practice makes champions. Champions train hard, train smart, and train consistently. Smart training produces strong results and strong minds. Strong minds build successful careers and successful relationships. Successful relationships are the foundation of a happy life. Happy life is a beautiful journey, not a destination.';
  generate();
}

</script>
