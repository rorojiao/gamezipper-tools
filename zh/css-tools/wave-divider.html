const { $, copyText, t } = GZ;
const state = { type: 'smooth', height: 80, width: 1200, amplitude: 30, layers: 1, topColor: '#4ecdc4', bottomColor: '#16213e', flip: false };

function buildPath(type, w, h, amp, seed) {
  const s = seed || 0;
  const mid = h / 2;
  if (type === 'smooth') {
    let d = `M 0 ${mid} `;
    const segs = 4;
    for (let i = 0; i <= segs; i++) {
      const x = (w / segs) * i;
      const y = mid + (i % 2 === 0 ? -amp : amp) * (0.6 + 0.4 * Math.sin((i + s) * 1.3));
      d += `Q ${x - (w/segs)/2} ${y + (i%2===0?amp:-amp) * 0.4} ${x} ${y} `;
    }
    d += `L ${w} ${h} L 0 ${h} Z`;
    return d;
  }
  if (type === 'sharp') {
    let d = `M 0 ${mid} `;
    const segs = 6;
    for (let i = 1; i <= segs; i++) {
      const x = (w / segs) * i;
      const y = mid + (i % 2 === 0 ? -amp : amp);
      d += `L ${x} ${y} `;
    }
    d += `L ${w} ${h} L 0 ${h} Z`;
    return d;
  }
  if (type === 'double') {
    let d = `M 0 ${mid} `;
    const segs = 6;
    for (let i = 1; i <= segs; i++) {
      const x = (w / segs) * i;
      const y = mid + Math.sin((i + s) * Math.PI) * amp;
      d += `Q ${x - (w/segs)/2} ${mid} ${x} ${y} `;
    }
    d += `L ${w} ${h} L 0 ${h} Z`;
    return d;
  }
  if (type === 'asymmetric') {
    let d = `M 0 ${mid} `;
    const segs = 5;
    for (let i = 1; i <= segs; i++) {
      const x = (w / segs) * i;
      const y = mid + (i % 2 === 0 ? -amp * 0.6 : amp * 1.2) + Math.cos((i + s) * 0.9) * amp * 0.2;
      d += `C ${x - (w/segs)*0.6} ${y + amp*0.5} ${x - (w/segs)*0.4} ${y - amp*0.5} ${x} ${y} `;
    }
    d += `L ${w} ${h} L 0 ${h} Z`;
    return d;
  }
  return '';
}

function buildSVG() {
  const { type, height, width, amplitude, layers, topColor, bottomColor, flip } = state;
  const h = height;
  const w = width;
  const flipAttr = flip ? ` transform="scale(1,-1) translate(0,-${h*2})"` : '';
  let paths = '';
  for (let l = 0; l < layers; l++) {
    const seed = l * 1.7;
    const amp = amplitude * (1 - l * 0.3);
    const off = l * 4;
    const d = buildPath(type, w, h + off, amp, seed);
    const fill = l === 0 ? topColor : (l === 1 ? mixColors(topColor, bottomColor, 0.5) : bottomColor);
    const opacity = l === 0 ? 1 : (1 - l * 0.3);
    paths += `<path d="${d}" fill="${fill}" opacity="${opacity}"${l === 0 ? flipAttr : ''}/>`;
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" width="100%" height="${h}">${paths}</svg>`;
}

function mixColors(a, b, t) {
  const pa = parseInt(a.slice(1), 16), pb = parseInt(b.slice(1), 16);
  const r = Math.round(((pa >> 16) & 255) * (1 - t) + ((pb >> 16) & 255) * t);
  const g = Math.round(((pa >> 8) & 255) * (1 - t) + ((pb >> 8) & 255) * t);
  const bl = Math.round((pa & 255) * (1 - t) + (pb & 255) * t);
  return `#${[r, g, bl].map(c => c.toString(16).padStart(2, '0')).join('')}`;
}

function update() {
  const preview = $('#preview');
  const w = preview.offsetWidth;
  const svg = buildSVG();
  const oldPath = preview.querySelector('.preview-svg');
  if (oldPath) oldPath.remove();
  const wrap = document.createElement('div');
  wrap.className = 'preview-svg';
  wrap.innerHTML = svg;
  wrap.style.position = 'absolute';
  wrap.style.bottom = '40%';
  wrap.style.left = '0';
  wrap.style.right = '0';
  wrap.style.transform = state.flip ? 'scaleY(-1)' : 'none';
  preview.appendChild(wrap);
  $('#codeBlock').textContent = svg;
}

function downloadPNG() {
  const w = 1200, h = 200;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  const svg = buildSVG().replace('viewBox="0 0 1200 80"', `viewBox="0 0 ${w} ${h}"`);
  const img = new Image();
  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  img.onload = () => {
    ctx.drawImage(img, 0, 0, w, h);
    URL.revokeObjectURL(url);
    c.toBlob(b => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = 'wave-divider.png';
      a.click();
      URL.revokeObjectURL(a.href);
    });
  };
  img.src = url;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#codeBlock').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadPNG()">${t('download')}</button>`;

const ctrl = $('#controls');
ctrl.innerHTML = `
  <div class="ctrl"><label>${t('waveType')}</label>
    <select id="waveType">
      <option value="smooth">${t('smooth')}</option>
      <option value="sharp">${t('sharp')}</option>
      <option value="double">${t('double')}</option>
      <option value="asymmetric">${t('asymmetric')}</option>
    </select>
  </div>
  <div class="ctrl"><label>${t('height')}<span class="val" id="hVal">80</span></label>
    <input type="range" id="hRange" min="20" max="240" value="80">
  </div>
  <div class="ctrl"><label>${t('amplitude')}<span class="val" id="aVal">30</span></label>
    <input type="range" id="aRange" min="5" max="100" value="30">
  </div>
  <div class="ctrl"><label>${t('layers')}<span class="val" id="lVal">1</span></label>
    <input type="range" id="lRange" min="1" max="3" value="1">
  </div>
  <div class="ctrl"><label>${t('topColor')}</label>
    <input type="color" id="tc" value="#4ecdc4">
  </div>
  <div class="ctrl"><label>${t('bottomColor')}</label>
    <input type="color" id="bc" value="#16213e">
  </div>
  <div class="ctrl"><label>${t('flip')}</label>
    <input type="checkbox" id="flip" style="width:18px;height:18px">
  </div>`;

$('#waveType').onchange = e => { state.type = e.target.value; update(); };
$('#hRange').oninput = e => { state.height = +e.target.value; $('#hVal').textContent = state.height; update(); };
$('#aRange').oninput = e => { state.amplitude = +e.target.value; $('#aVal').textContent = state.amplitude; update(); };
$('#lRange').oninput = e => { state.layers = +e.target.value; $('#lVal').textContent = state.layers; update(); };
$('#tc').oninput = e => { state.topColor = e.target.value; update(); };
$('#bc').oninput = e => { state.bottomColor = e.target.value; update(); };
$('#flip').onchange = e => { state.flip = e.target.checked; update(); };

</script>
