  { id:'all', label_en:'All', label_zh:'全部', icon:'✨' },
  { id:'smileys', label_en:'Smileys', label_zh:'表情', icon:'😀' },
  { id:'animals', label_en:'Animals', label_zh:'动物', icon:'🐶' },
  { id:'food', label_en:'Food & Drink', label_zh:'食物', icon:'🍔' },
  { id:'activities', label_en:'Activities', label_zh:'活动', icon:'⚽' },
  { id:'travel', label_en:'Travel', label_zh:'旅行', icon:'✈️' },
  { id:'objects', label_en:'Objects', label_zh:'物品', icon:'💡' },
  { id:'symbols', label_en:'Symbols', label_zh:'符号', icon:'❤️' },
  { id:'flags', label_en:'Flags', label_zh:'旗帜', icon:'🇺🇸' },
];

let activeCat = 'all';
let lastQuery = '';

function toCodepoint(emoji){
  return [...emoji].map(c => 'U+' + c.codePointAt(0).toString(16).toUpperCase().padStart(4,'0')).join(' ');
}

function renderCats(){
  const lang = GZI18n.getLang();
  $('#cats').innerHTML = CATS.map(c => {
    const label = lang === 'zh' ? c.label_zh : c.label_en;
    const active = c.id === activeCat ? ' active' : '';
    return `<div class="ed-cat${active}" onclick="setCat('${c.id}')">${c.icon} ${label}</div>`;
  }).join('');
}

function setCat(id){ activeCat = id; renderCats(); renderGrid(); }

function renderGrid(){
  const lang = GZI18n.getLang();
  const q = $('#search').value.trim().toLowerCase();
  const filtered = DATA.filter(d => {
    if(d[3] !== activeCat && activeCat !== 'all') return false;
    if(!q) return true;
    if(d[0].includes(q)) return true;
    if(d[1].toLowerCase().includes(q)) return true;
    return d[2].some(k => k.includes(q));
  });
  if(filtered.length === 0){
    $('#grid').innerHTML = `<div style="grid-column:1/-1;padding:30px;text-align:center;color:var(--text2)">${t('noResults')}</div>`;
    return;
  }
  $('#grid').innerHTML = filtered.slice(0, 300).map((d,i) => {
    const idx = DATA.indexOf(d);
    return `<div class="ed-cell" onclick="showDetail(${idx})"><div class="e">${d[0]}</div><div class="n">${d[1]}</div></div>`;
  }).join('');
  $('#status').innerHTML = `<span style="font-size:.8rem;color:var(--text2)">${filtered.length} ${t('results')}</span>`;
}

function showDetail(idx){
  const d = DATA[idx];
  const lang = GZI18n.getLang();
  const code = toCodepoint(d[0]);
  const kw = d[2].map(k => `<span>${k}</span>`).join('');
  $('#detail').innerHTML = `
    <div class="ed-detail-head">
      <div class="ed-detail-big">${d[0]}</div>
      <div>
        <div class="ed-detail-name">${d[1]}</div>
        <div class="ed-detail-code">${t('codepoint')}: ${code}</div>
      </div>
    </div>
    <div class="ed-detail-kw">${kw}</div>
    <button class="gz-btn ed-copy-btn" onclick="copyEmoji(${idx})">${d[0]} ${t('copyEmoji')}</button>
  `;
  $('#detail').classList.add('show');
  $('#detail').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function copyEmoji(idx){
  copyText(DATA[idx][0]);
  showToast(t('copyEmoji') + ': ' + DATA[idx][0]);
}

$('#search').setAttribute('placeholder', t('searchPh'));
$('#search').addEventListener('input', renderGrid);

renderCats();
renderGrid();
