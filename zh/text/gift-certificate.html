<body>
<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar no-print" id="toolbar"></div>
    <div class="gc-form no-print" id="form"></div>
    <div class="gc-preview"><div class="gc-card classic" id="gc-card"></div></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{toolTitle:'Gift Certificate Maker',toolDesc:'Create custom printable gift certificates. Add business name, recipient, amount and message. Choose elegant templates — print or save as PDF. Free, no signup.',bizName:'Business Name',recipient:'Recipient (To)',from:'From',amount:'Amount / Value',message:'Personal Message',code:'Certificate Code',date:'Expiry Date',template:'Template',print:'🖨️ Print',randomCode:'🎲 Random Code',classic:'Classic Red',modern:'Modern Blue',elegant:'Elegant Gold',step1:'Enter your business name and the recipient name',step2:'Set the gift amount and add a personal message',step3:'Choose a template style and add an expiry date',step4:'Click Print to print or save as PDF'},
  zh:{toolTitle:'礼品券生成器',toolDesc:'创建可打印的自定义礼品券。添加商家名称、收件人、金额和留言。选择精美模板 — 打印或保存为 PDF。免费，无需注册。',bizName:'商家名称',recipient:'收件人（致）',from:'来自',amount:'金额 / 面值',message:'个人留言',code:'券码',date:'过期日期',template:'模板',print:'🖨️ 打印',randomCode:'🎲 随机码',classic:'经典红',modern:'现代蓝',elegant:'优雅金',step1:'输入商家名称和收件人姓名',step2:'设置礼品金额并添加个人留言',step3:'选择模板风格并添加过期日期',step4:'点击打印或保存为 PDF'}
});
const{$,t}=GZ;

function randCode(){return'GC-'+Math.random().toString(36).substr(2,6).toUpperCase()+Math.floor(Math.random()*100);}

function render(){
  const biz=$('#f-biz').value||'Your Business';
  const to=$('#f-to').value||'___________';
  const from=$('#f-from').value||'___________';
  const amt=$('#f-amt').value||'$0.00';
  const msg=$('#f-msg').value;
  const code=$('#f-code').value||randCode();
  const exp=$('#f-date').value;
  const tpl=$('#f-tpl').value;
  const card=$('#gc-card');
  card.className='gc-card '+tpl;
  card.innerHTML=`
    <div class="gc-title">${t('toolTitle').replace(' Maker','').replace('生成器','')}</div>
    <div class="gc-subtitle">${biz}</div>
    <div class="gc-body">
      <div class="gc-row"><span class="gc-label">${t('amount')}</span><span class="gc-value">${amt}</span></div>
      <div class="gc-row"><span class="gc-label">${t('recipient')}</span><span class="gc-value">${to}</span></div>
      <div class="gc-row"><span class="gc-label">${t('from')}</span><span class="gc-value">${from}</span></div>
      ${msg?`<div class="gc-message">"${msg}"</div>`:''}
    </div>
    <div class="gc-footer">
      <span><b>${t('code')}:</b> <span class="gc-code">${code}</span></span>
      ${exp?`<span>${t('date')}: ${exp}</span>`:''}
    </div>`;
}

$('#form').innerHTML=`
  <div><label>${t('bizName')}</label><input id="f-biz" oninput="render()" placeholder="Spa Serenity"></div>
  <div><label>${t('recipient')}</label><input id="f-to" oninput="render()" placeholder="Jane Smith"></div>
  <div><label>${t('from')}</label><input id="f-from" oninput="render()" placeholder="John"></div>
  <div><label>${t('amount')}</label><input id="f-amt" oninput="render()" placeholder="$50.00"></div>
  <div><label>${t('code')}</label><input id="f-code" oninput="render()" placeholder="Auto-generated"></div>
  <div><label>${t('date')}</label><input id="f-date" type="date" oninput="render()"></div>
  <div style="grid-column:1/-1"><label>${t('message')}</label><input id="f-msg" oninput="render()" placeholder="Wishing you a wonderful experience!"></div>
  <div><label>${t('template')}</label><select id="f-tpl" onchange="render()"><option value="classic">${t('classic')}</option><option value="modern">${t('modern')}</option><option value="elegant">${t('elegant')}</option></select></div>`;

$('#toolbar').innerHTML=`
  <button class="gz-btn gz-btn-secondary" onclick="$('#f-code').value=randCode();render()">${t('randomCode')}</button>
  <button class="gz-btn" onclick="window.print()">${t('print')}</button>`;

render();
GZ.renderToolPage({
  category:'text',titleKey:'toolTitle',descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'📜',href:'/text/award-certificate.html',name:'Award Certificate'},
    {icon:'🧾',href:'/text/fake-receipt-generator.html',name:'Receipt Maker'},
    {icon:'✉️',href:'/text/reference-letter-generator.html',name:'Reference Letter'},
  ]
});
</script>
