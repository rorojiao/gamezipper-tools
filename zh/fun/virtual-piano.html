    lblWave: '音色：',
    lblOct: '八度：',
    recOn: '● 录制中',
    playOn: '▶ 播放中',
    sustainOn: '延音：开',
    sustainOff: '延音：关',
    lblNow: '正在演奏：',
    lblRec: '',
    lblHint: '提示：Z/X 切换八度，Shift 长按延音',
    songsLabel: '试试这些：',
    step1: '使用键盘（A 到 ; 弹白键，W 到 M 弹黑键）',
    step2: '也可用鼠标点击屏幕琴键 — 触屏同样支持',
    step3: '切换延音让音符延绵，或切换音色获得不同质感',
    step4: '点击录制，演奏一小段旋律，再点击播放即可回放',
  }
});

const { $ } = GZ;
const t = (k) => (GZI18n.t ? GZI18n.t(k) : (GZI18n.data && GZI18n.data['en'][k]) || k);

const WHITE_KEYS = [
  ['a','C'], ['s','D'], ['d','E'], ['f','F'], ['g','G'], ['h','A'], ['j','B'], ['k','C5'], ['l','D5'], [';','E5'],
];
const BLACK_KEYS = [
  ['w','C#'], ['e','D#'], ['t','F#'], ['y','G#'], ['u','A#'],
  ['o','C#5'], ['p','D#5'],
];

let baseOct = 4; // starts at C4
let currentWave = 'triangle';
let sustainOn = false;
let heldKeys = new Set();
let audioCtx = null;
let sustainTail = 0;
let recording = [];
let recordStart = 0;
let isRecording = false;
let isPlaying = false;
let playbackEvents = [];

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

const NOTE_FREQ = (n) => {
  // n is integer offset from A4 (MIDI-style). A4=440Hz. We give semitone offset.
  return 440 * Math.pow(2, (n - 69) / 12);
};

function noteToFreq(note, octave) {
  // Convert note name + octave to MIDI number then freq
  const map = {C:0, 'C#':1, D:2, 'D#':3, E:4, F:5, 'F#':6, G:7, 'G#':8, A:9, 'A#':10, B:11};
  const semi = map[note];
  const midi = (octave + 1) * 12 + semi; // C4 = 60
  return NOTE_FREQ(midi);
}

function playNote(note, octave, dur) {
  if (!note) return;
  const ctx = getCtx();
  const startTime = ctx.currentTime;
  const freq = noteToFreq(note, octave);
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(0.32, startTime + 0.015);
  const release = sustainOn ? 1.5 : 0.35;
  gain.gain.exponentialRampToValueAtTime(0.0001, startTime + (dur || 0.6) + release);
  gain.connect(ctx.destination);

  const osc1 = ctx.createOscillator();
  const osc2 = ctx.createOscillator();
  const osc3 = ctx.createOscillator();
  let type1 = currentWave, type2 = 'sine', type3 = 'sine';
  let level1 = 1, level2 = 0.3, level3 = 0.15;
  if (currentWave === 'piano') {
    type1 = 'sine'; type2 = 'triangle'; type3 = 'sine';
    level1 = 0.65; level2 = 0.22; level3 = 0.1;
    osc2.frequency.value = freq * 2;
    osc3.frequency.value = freq * 3;
  } else if (currentWave === 'sine') {
    osc2.frequency.value = freq * 2;
    osc3.frequency.value = freq * 3;
  } else if (currentWave === 'triangle') {
    osc2.frequency.value = freq * 2;
  } else if (currentWave === 'square') {
    osc2.frequency.value = freq * 2;
  } else if (currentWave === 'sawtooth') {
    osc2.frequency.value = freq * 0.5;
  }
  osc1.type = type1;
  osc1.frequency.value = freq;
  if (type2 !== 'sine' || currentWave === 'piano') {
    osc2.type = type2;
  }
  if (osc3.frequency.value) {
    osc3.type = type3;
  }
  const g1 = ctx.createGain(); g1.gain.value = level1;
  const g2 = ctx.createGain(); g2.gain.value = level2;
  const g3 = ctx.createGain(); g3.gain.value = level3;
  osc1.connect(g1).connect(gain);
  if (osc2.frequency.value && currentWave !== 'sine') osc2.connect(g2).connect(gain);
  if (osc3.frequency.value && currentWave === 'piano') osc3.connect(g3).connect(gain);
  osc1.start(startTime);
  osc2.start(startTime);
  osc3.start(startTime);
  const stopAt = startTime + (dur || 0.6) + release + 0.1;
  osc1.stop(stopAt);
  osc2.stop(stopAt);
  if (osc3.frequency.value && currentWave === 'piano') osc3.stop(stopAt);
}

function buildBoard() {
  const board = $('#board');
  board.innerHTML = '';
  const totalWhite = WHITE_KEYS.length; // 10
  for (let i = 0; i < totalWhite; i++) {
    const k = document.createElement('div');
    k.className = 'key white';
    const [kb, noteName] = WHITE_KEYS[i];
    k.dataset.key = kb;
    k.dataset.note = noteName;
    k.dataset.octave = noteName === 'C5' || noteName === 'D5' || noteName === 'E5' ? 5 : 4;
    k.innerHTML = '<span class="keybind">' + kb.toUpperCase() + '</span>';
    k.addEventListener('mousedown', () => press(k));
    k.addEventListener('mouseup', () => release(k));
    k.addEventListener('mouseleave', () => release(k));
    k.addEventListener('touchstart', (e) => { e.preventDefault(); press(k); }, {passive:false});
    k.addEventListener('touchend', (e) => { e.preventDefault(); release(k); }, {passive:false});
    board.appendChild(k);
  }
  // add black keys positioned absolutely
  for (let i = 0; i < BLACK_KEYS.length; i++) {
    const [kb, noteName] = BLACK_KEYS[i];
    // figure out which white-key index this black key sits between
    const whiteIdx = noteName.startsWith('C#') ? 0 :
                     noteName.startsWith('D#') ? 1 :
                     noteName.startsWith('F#') ? 3 :
                     noteName.startsWith('G#') ? 4 :
                     noteName.startsWith('A#') ? 5 :
                     noteName.startsWith('C#5') ? 7 :
                     noteName.startsWith('D#5') ? 8 : 0;
    const oct5 = noteName.endsWith('5') ? 5 : 4;
    const k = document.createElement('div');
    k.className = 'key black';
    k.dataset.key = kb;
    k.dataset.note = noteName.replace('5','');
    k.dataset.octave = oct5;
    k.style.left = 'calc(' + ((whiteIdx + 1) / totalWhite * 100) + '% - ' + (4 / totalWhite) + '%)';
    k.style.width = (8 / totalWhite) + '%';
    k.innerHTML = '<span class="keybind">' + kb.toUpperCase() + '</span>';
    k.addEventListener('mousedown', () => press(k));
    k.addEventListener('mouseup', () => release(k));
    k.addEventListener('mouseleave', () => release(k));
    k.addEventListener('touchstart', (e) => { e.preventDefault(); press(k); }, {passive:false});
    k.addEventListener('touchend', (e) => { e.preventDefault(); release(k); }, {passive:false});
    board.appendChild(k);
  }
}

function findKeyEl(keyNote, keyOctave) {
  return document.querySelectorAll('.key').forEach ? null : null;
}
function press(el) {
  if (el.classList.contains('active')) return;
  el.classList.add('active');
  heldKeys.add(el.dataset.key);
  playNote(el.dataset.note, parseInt(el.dataset.octave));
  $('#noteBox').innerHTML = t('lblNow') + ' <span class="note">' + el.dataset.note + el.dataset.octave + '</span>';
  if (isRecording) {
    recording.push({type:'on', note:el.dataset.note, octave:el.dataset.octave, t:Date.now() - recordStart});
  }
}
function release(el) {
  if (!el.classList.contains('active')) return;
  el.classList.remove('active');
  heldKeys.delete(el.dataset.key);
  if (isRecording) {
    recording.push({type:'off', note:el.dataset.note, octave:el.dataset.octave, t:Date.now() - recordStart});
  }
}

// Listen for computer keyboard
document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  const target = e.target;
  if (target && (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.tagName === 'SELECT')) return;
  const key = e.key.toLowerCase();
  let el = [...document.querySelectorAll('.key')].find(k => k.dataset.key === key);
  if (el) {
    if (e.shiftKey) sustainOn = true;
    e.preventDefault();
    press(el);
    return;
  }
  if (key === 'z') { shiftOct(-1); e.preventDefault(); }
  if (key === 'x') { shiftOct(1); e.preventDefault(); }
});
document.addEventListener('keyup', (e) => {
  const key = e.key.toLowerCase();
  let el = [...document.querySelectorAll('.key')].find(k => k.dataset.key === key);
  if (el) { e.preventDefault(); release(el); return; }
  // release shift sustain
  if (key === 'shift' && sustainTail) {
    // already on
  }
});

function shiftOct(delta) {
  baseOct = Math.max(2, Math.min(6, baseOct + delta));
  $('#octLabel').textContent = 'C' + baseOct + '–B' + (baseOct + 1);
  // rebuild board
  buildBoard();
}

$('#octDown').onclick = () => shiftOct(-1);
$('#octUp').onclick = () => shiftOct(1);

$('#sustain').onclick = () => {
  sustainOn = !sustainOn;
  const btn = $('#sustain');
  btn.dataset.on = sustainOn ? '1' : '0';
  btn.textContent = t(sustainOn ? 'sustainOn' : 'sustainOff');
  btn.classList.toggle('active', sustainOn);
};

$('#rec').onclick = () => {
  if (isPlaying) return;
  isRecording = !isRecording;
  recording = [];
  recordStart = Date.now();
  $('#rec').classList.toggle('active', isRecording);
  $('#recBox').innerHTML = isRecording ? '<span class="recording"><span class="dot"></span> ' + t('recOn') + '</span>' : '';
  if (!isRecording && recording.length) {
    playbackEvents = recording;
  }
};

$('#play').onclick = () => {
  if (!playbackEvents.length) return;
  if (isRecording) return;
  isPlaying = true;
  $('#play').classList.add('active');
  $('#recBox').innerHTML = '<span class="recording" style="color:#4ecdc4"><span class="dot"></span> ' + t('playOn') + '</span>';
  playbackEvents.forEach(ev => {
    setTimeout(() => {
      if (ev.type === 'on') {
        playNote(ev.note, ev.octave);
        const el = [...document.querySelectorAll('.key')].find(k => k.dataset.note === ev.note && parseInt(k.dataset.octave) === ev.octave);
        if (el) el.classList.add('active');
      } else {
        const el = [...document.querySelectorAll('.key')].find(k => k.dataset.note === ev.note && parseInt(k.dataset.octave) === ev.octave);
        if (el) el.classList.remove('active');
      }
    }, ev.t);
  });
  setTimeout(() => {
    isPlaying = false;
    $('#play').classList.remove('active');
    $('#recBox').innerHTML = '';
    document.querySelectorAll('.key.active').forEach(k => k.classList.remove('active'));
  }, playbackEvents[playbackEvents.length-1].t + 600);
};

$('#stop').onclick = () => {
  isRecording = false; isPlaying = false;
  recording = []; playbackEvents = [];
  $('#rec').classList.remove('active');
  $('#play').classList.remove('active');
  $('#recBox').innerHTML = '';
  document.querySelectorAll('.key.active').forEach(k => k.classList.remove('active'));
};

$('#wave').onchange = (e) => { currentWave = e.target.value; };

// Demo songs (simple melodies)

function playSong(song) {
  if (isRecording || isPlaying) return;
  isPlaying = true;
  $('#play').classList.add('active');
  $('#recBox').innerHTML = '<span class="recording" style="color:#4ecdc4"><span class="dot"></span> ' + song.label + '</span>';
  let t0 = Date.now();
  song.notes.forEach(([n, oct, dur]) => {
    setTimeout(() => {
      playNote(n, oct);
      const el = [...document.querySelectorAll('.key')].find(k => k.dataset.note === n && parseInt(k.dataset.octave) === oct);
      if (el) { el.classList.add('active'); setTimeout(()=>el.classList.remove('active'), dur * 1000 * 0.95); }
    }, t0 - Date.now() + song.notes.slice(0, song.notes.indexOf([n,oct,dur])).reduce((acc,[,,d])=>acc + d*1000, 0));
  });
  const total = song.notes.reduce((acc,[,,d])=>acc + d, 0);
  setTimeout(() => {
    isPlaying = false;
    $('#play').classList.remove('active');
    $('#recBox').innerHTML = '';
  }, total * 1000 + 400);
}

const strip = $('#songStrip');
SONGS.forEach(s => {
  const b = document.createElement('button');
  b.textContent = s.label;
  b.onclick = () => playSong(s);
