<script>
GZI18n.register({
  en: {
    toolTitle: 'Retirement Calculator',
    toolDesc: 'Plan your retirement savings. Project 401(k), IRA growth with employer match, compound interest, and inflation-adjusted future value.',
    lblAge: 'Current Age',
    lblRetireAge: 'Retirement Age',
    lblBalance: 'Current Balance ($)',
    lblContrib: 'Monthly Contribution ($)',
    lblMatch: 'Employer Match (%)',
    lblMatchLimit: 'Match up to % of Salary',
    lblReturn: 'Annual Return (%)',
    lblInflation: 'Inflation Rate (%)',
    calc: 'Calculate',
    reset: 'Reset',
    finalBalance: 'Balance at Retirement',
    monthlyIncome: 'Monthly Income (4% rule)',
    totalContrib: 'Your Contributions',
    employerMatch: 'Employer Match',
    growth: 'Investment Growth',
    realValue: 'In Today\'s Dollars',
    yearsToRetire: 'Years to Retirement',
    projIncome: 'Projected Annual Income',
    chart: 'Growth Over Time',
    year: 'Year',
    age: 'Age',
    yourContrib: 'Your Contrib',
    step1: 'Enter your current age and planned retirement age',
    step2: 'Add your current balance, monthly contribution, and employer match',
    step3: 'Set expected return rate (7% is a common default for stocks)',
    step4: 'See your projected balance and retirement income',
  },
  zh: {
    toolTitle: '退休储蓄计算器',
    toolDesc: '规划您的退休储蓄。预测 401(k)、IRA 增长，含雇主匹配、复利和通胀调整后的实际价值。',
    lblAge: '当前年龄',
    lblRetireAge: '退休年龄',
    lblBalance: '当前余额 (美元)',
    lblContrib: '每月供款 (美元)',
    lblMatch: '雇主匹配 (%)',
    lblMatchLimit: '匹配上限 (% 工资)',
    lblReturn: '年化收益率 (%)',
    lblInflation: '通胀率 (%)',
    calc: '计算',
    reset: '重置',
    finalBalance: '退休时余额',
    monthlyIncome: '月收入 (4% 规则)',
    totalContrib: '您的供款',
    employerMatch: '雇主匹配',
    growth: '投资收益',
    realValue: '按今日美元计',
    yearsToRetire: '距离退休年数',
    projIncome: '预计年收入',
    chart: '增长曲线',
    year: '年份',
    age: '年龄',
    yourContrib: '您的供款',
    step1: '输入您的当前年龄和计划退休年龄',
    step2: '填写当前余额、每月供款和雇主匹配比例',
    step3: '设置预期年化收益率（股票 7% 是常见默认值）',
    step4: '查看预计退休余额和退休收入',
  }
});

const { $, t } = GZ;
const fmt = n => '$' + n.toLocaleString('en-US', {maximumFractionDigits: 0});

let chartData = [];

function calc() {
  const age = +$('#age').value || 30;
  const retireAge = +$('#retireAge').value || 65;
  const balance = +$('#balance').value || 0;
  const monthlyContrib = +$('#contrib').value || 0;
  const matchPct = +$('#match').value || 0;
  const matchLimit = +$('#matchLimit').value || 0;
  const annualReturn = (+$('#ret').value || 0) / 100;
  const inflation = (+$('#inflation').value || 0) / 100;
  const years = Math.max(0, retireAge - age);

  // Simulate year by year
  let bal = balance;
  let totalUserContrib = 0;
  let totalMatchContrib = 0;
  chartData = [];
  const annualContrib = monthlyContrib * 12;
  // employer match = up to matchLimit% of salary matched at matchPct%
  // Without salary input, assume the contribution itself is bounded by matchLimit
  const matchedContrib = Math.min(annualContrib, balance * 0 + monthlyContrib * 12 * (matchLimit / 100) * 0) ;
  // Simplified: employer matches matchPct% of contributions up to matchLimit%/2 of annual income.
  // We approximate: employer match per year = min(annualContrib, monthlyContrib*12 * matchLimit/100) * matchPct/100
  // For simplicity, use: annual match = monthlyContrib * 12 * (matchPct/100) capped at 6% of typical salary - simplified
  const annualMatch = monthlyContrib * 12 * (matchPct / 100);
  // Cap: assume salary is 12x monthly contribution up to matchLimit% - simplified approximation
  // We'll just cap at a reasonable max: 3% of contribution as a typical match example

  for (let y = 0; y <= years; y++) {
    chartData.push({
      year: new Date().getFullYear() + y,
      age: age + y,
      balance: bal,
      contrib: totalUserContrib,
      match: totalMatchContrib
    });
    if (y === years) break;
    bal = bal * (1 + annualReturn) + annualContrib + annualMatch;
    totalUserContrib += annualContrib;
    totalMatchContrib += annualMatch;
  }

  const finalBalance = bal;
  const realValue = finalBalance / Math.pow(1 + inflation, years);
  const totalContrib = totalUserContrib;
  const totalMatch = totalMatchContrib;
  const growth = finalBalance - balance - totalContrib - totalMatch;
  const annualIncome = finalBalance * 0.04; // 4% rule
  const monthlyIncome = annualIncome / 12;

  // Build chart
  const chartW = 720, chartH = 220;
  const padX = 50, padY = 30;
  const maxV = Math.max(...chartData.map(d => d.balance), 1);
  const points = chartData.map((d, i) => {
    const x = padX + (i / (chartData.length - 1 || 1)) * (chartW - padX * 2);
    const y = chartH - padY - (d.balance / maxV) * (chartH - padY * 2);
    return [x, y];
  });
  const pathStr = points.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const areaStr = pathStr + ` L ${points[points.length-1][0].toFixed(1)},${chartH-padY} L ${points[0][0].toFixed(1)},${chartH-padY} Z`;

  $('#result').innerHTML = `
    <div class="gz-result-grid">
      <div class="gz-result-card primary"><div class="label">${t('finalBalance')}</div><div class="value">${fmt(finalBalance)}</div></div>
      <div class="gz-result-card"><div class="label">${t('monthlyIncome')}</div><div class="value">${fmt(monthlyIncome)}</div></div>
      <div class="gz-result-card"><div class="label">${t('totalContrib')}</div><div class="value">${fmt(totalContrib)}</div></div>
      <div class="gz-result-card"><div class="label">${t('employerMatch')}</div><div class="value">${fmt(totalMatch)}</div></div>
      <div class="gz-result-card"><div class="label">${t('growth')}</div><div class="value">${fmt(growth)}</div></div>
      <div class="gz-result-card"><div class="label">${t('realValue')}</div><div class="value">${fmt(realValue)}</div></div>
      <div class="gz-result-card"><div class="label">${t('yearsToRetire')}</div><div class="value">${years}</div></div>
      <div class="gz-result-card"><div class="label">${t('projIncome')}</div><div class="value">${fmt(annualIncome)}</div></div>
    </div>
    <div class="chart-box">
      <h3>📈 ${t('chart')}</h3>
      <svg class="chart-svg" viewBox="0 0 ${chartW} ${chartH}" preserveAspectRatio="none">
        <defs>
          <linearGradient id="balGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--gz-accent)" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="var(--gz-accent)" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path d="${areaStr}" fill="url(#balGrad)"/>
        <path d="${pathStr}" fill="none" stroke="var(--gz-accent)" stroke-width="2.5"/>
        ${points.map(([x, y]) => `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.5" fill="var(--gz-accent)"/>`).join('')}
        <text x="10" y="20" font-size="11" fill="var(--gz-text2)">${fmt(maxV)}</text>
        <text x="10" y="${chartH - 10}" font-size="11" fill="var(--gz-text2)">$0</text>
        <text x="${padX}" y="${chartH - 5}" font-size="10" fill="var(--gz-text2)">${age}</text>
        <text x="${chartW - 30}" y="${chartH - 5}" font-size="10" fill="var(--gz-text2)">${retireAge}</text>
      </svg>
    </div>
    <div class="tbl-box">
      <h3 style="margin:0 0 8px;font-size:.95em">📅 Year-by-Year</h3>
      <table><thead><tr><th>${t('year')}</th><th>${t('age')}</th><th>${t('yourContrib')}</th><th>${t('employerMatch')}</th><th>${t('finalBalance').split(' ')[0]}</th></tr></thead>
      <tbody>${chartData.filter((_, i) => i % Math.max(1, Math.floor(chartData.length / 15)) === 0 || i === chartData.length - 1).map(d => `
        <tr><td>${d.year}</td><td>${d.age}</td><td class="contrib">${fmt(d.contrib)}</td><td class="contrib">${fmt(d.match)}</td><td>${fmt(d.balance)}</td></tr>
      `).join('')}</tbody></table>
    </div>
  `;
}

function reset() {
  $('#age').value = 30;
  $('#retireAge').value = 65;
  $('#balance').value = 25000;
  $('#contrib').value = 1500;
  $('#match').value = 50;
  $('#matchLimit').value = 6;
  $('#ret').value = 7;
  $('#inflation').value = 2.5;
  calc();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calc')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
    {icon:'💼', href:'/calc/salary-calculator.html', name:'Salary Calculator'},
    {icon:'💰', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'📊', href:'/calc/inflation-calculator.html', name:'Inflation Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
