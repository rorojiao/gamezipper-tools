<script>
GZI18n.register({
  en: {
    toolTitle: 'Sepia Image Effect',
    toolDesc: 'Apply a classic sepia tone to any photo. Adjust intensity, warmth, contrast, brightness, grain and vignette — preview side-by-side, then download as PNG or JPG.',

    dropSub: 'PNG, JPG, WebP, GIF up to 20 MB',

    step3: 'Compare the original and processed side-by-side',
    step4: 'Download as PNG (lossless) or JPG (smaller)',
  },
  zh: {
    toolTitle: '棕褐色（怀旧）图片滤镜',
    toolDesc: '为任意照片添加经典棕褐色调。可调整强度、色温、对比度、亮度、颗粒和暗角 — 并排预览后下载为 PNG 或 JPG。',
    dropHint: '将图片拖到此处，或点击选择',
    dropSub: 'PNG、JPG、WebP、GIF，最大 20 MB',
    intensity: '棕褐色强度',
    warmth: '暖度',
    contrast: '对比度',
    brightness: '亮度',
    grain: '胶片颗粒',
    vignette: '暗角',
    origLabel: '原图',
    procLabel: '棕褐结果',
    downloadPng: '⬇ 下载 PNG',
    downloadJpg: '⬇ 下载 JPG',
    reset: '重置',
    presetMild: '轻微',
    presetClassic: '经典',
    presetDeep: '深色',
    presetWarm: '暖色',
    presetVintage: '复古',
    step1: '拖入或上传一张图片开始',
    step2: '选择预设或微调滑块',
    step3: '并排对比原图和处理后效果',
    step4: '下载为 PNG（无损）或 JPG（更小）',
  }
});

const { $, t } = GZ;

let originalImg = null;
let currentBlob = null;
const PRESETS = {
  mild:    {intensity: 40, warmth: 100, contrast: 100, brightness: 100, grain: 0,  vignette: 0},
  classic: {intensity: 80, warmth: 100, contrast: 105, brightness: 100, grain: 10, vignette: 15},
  deep:    {intensity: 100,warmth: 100, contrast: 115, brightness: 95,  grain: 25, vignette: 30},
  warm:    {intensity: 80, warmth: 130, contrast: 105, brightness: 105, grain: 5,  vignette: 10},
  vintage: {intensity: 90, warmth: 110, contrast: 110, brightness: 95,  grain: 30, vignette: 40},
};

function setLabels() {
  $('#dropHint').textContent = t('dropHint');
  $('#dropSub').textContent = t('dropSub');
  $('#lblOrig').textContent = t('origLabel');
  $('#lblProc').textContent = t('procLabel');
  $('#lblIntensity').textContent = t('intensity');
  $('#lblWarmth').textContent = t('warmth');
  $('#lblContrast').textContent = t('contrast');
  $('#lblBrightness').textContent = t('brightness');
  $('#lblGrain').textContent = t('grain');
  $('#lblVignette').textContent = t('vignette');
}

function applyPreset(name) {
  const p = PRESETS[name]; if (!p) return;
  for (const k of Object.keys(p)) {
    const el = $('#' + k); if (el) el.value = p[k];
  }
  process();
}

function process() {
  if (!originalImg) return;
  const intensity = +$('#intensity').value;
  const warmth = +$('#warmth').value;
  const contrast = +$('#contrast').value;
  const brightness = +$('#brightness').value;
  const grain = +$('#grain').value;
  const vignette = +$('#vignette').value;

  $('#vIntensity').textContent = intensity + '%';
  $('#vWarmth').textContent = warmth + '%';
  $('#vContrast').textContent = contrast + '%';
  $('#vBrightness').textContent = brightness + '%';
  $('#vGrain').textContent = grain + '%';
  $('#vVignette').textContent = vignette + '%';

  const canvas = $('#canvas');
  const ctx = canvas.getContext('2d');
  const maxW = 1200;
  const ratio = Math.min(1, maxW / originalImg.naturalWidth);
  canvas.width = Math.round(originalImg.naturalWidth * ratio);
  canvas.height = Math.round(originalImg.naturalHeight * ratio);
  ctx.drawImage(originalImg, 0, 0, canvas.width, canvas.height);

  const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imgData.data;
  const cFactor = (contrast - 100) * 2.55; // -127 to 127
  const bFactor = (brightness - 100) * 2.55;
  const wFactor = (warmth - 100) / 100; // -0.5 to 0.5

  for (let i = 0; i < data.length; i += 4) {
    let r = data[i], g = data[i+1], b = data[i+2];

    // Brightness
    r += bFactor; g += bFactor; b += bFactor;
    // Contrast
    r = (r - 128) * (contrast/100) + 128;
    g = (g - 128) * (contrast/100) + 128;
    b = (b - 128) * (contrast/100) + 128;

    // Sepia
    const sr = 0.393 * r + 0.769 * g + 0.189 * b;
    const sg = 0.349 * r + 0.686 * g + 0.168 * b;
    const sb = 0.272 * r + 0.534 * g + 0.131 * b;
    r = r + (sr - r) * (intensity / 100);
    g = g + (sg - g) * (intensity / 100);
    b = b + (sb - b) * (intensity / 100);

    // Warmth
    r += 255 * wFactor * 0.1;
    b -= 255 * wFactor * 0.1;

    data[i]   = Math.max(0, Math.min(255, r));
    data[i+1] = Math.max(0, Math.min(255, g));
    data[i+2] = Math.max(0, Math.min(255, b));
  }

  // Grain
  if (grain > 0) {
    const gAmt = grain * 1.5;
    for (let i = 0; i < data.length; i += 4) {
      const n = (Math.random() - 0.5) * gAmt;
      data[i]   = Math.max(0, Math.min(255, data[i] + n));
      data[i+1] = Math.max(0, Math.min(255, data[i+1] + n));
      data[i+2] = Math.max(0, Math.min(255, data[i+2] + n));
    }
  }

  ctx.putImageData(imgData, 0, 0);

  // Vignette
  if (vignette > 0) {
    const vAmt = vignette / 100;
    const w = canvas.width, h = canvas.height;
    const cx = w/2, cy = h/2;
    const maxD = Math.hypot(cx, cy);
    const imgData2 = ctx.getImageData(0,0,w,h);
    const d2 = imgData2.data;
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const d = Math.hypot(x-cx, y-cy) / maxD;
        const f = 1 - d * d * vAmt;
        const i = (y*w + x) * 4;
        d2[i]   *= f;
        d2[i+1] *= f;
        d2[i+2] *= f;
      }
    }
    ctx.putImageData(imgData2, 0, 0);
  }

  currentBlob = canvas.toDataURL('image/png');
}

function downloadImg(format) {
  if (!currentBlob) return;
  const a = document.createElement('a');
  a.href = format === 'jpg' ? $('#canvas').toDataURL('image/jpeg', 0.92) : currentBlob;
  a.download = 'sepia-' + Date.now() + '.' + format;
  a.click();
}

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) {
    alert('Please drop an image file.');
    return;
  }
  if (file.size > 20 * 1024 * 1024) {
    alert('Image too large (max 20 MB).');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      originalImg = img;
      $('#origImg').src = e.target.result;
      $('#compareWrap').style.display = 'flex';
      $('#controls').style.display = 'block';
      applyPreset('classic');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function resetControls() {
  for (const k of ['intensity','warmth','contrast','brightness','grain','vignette']) {
    const el = $('#' + k);
    if (k === 'intensity') el.value = 80;
    else if (k === 'warmth' || k === 'contrast' || k === 'brightness') el.value = 100;
    else el.value = 0;
  }
  process();
}

document.querySelectorAll('#intensity,#warmth,#contrast,#brightness,#grain,#vignette').forEach(el => {
  el.addEventListener('input', process);
});

$('#presetRow').innerHTML = ['mild','classic','deep','warm','vintage'].map(p =>
  `<button class="gz-btn gz-btn-secondary" onclick="applyPreset('${p}')">${t('preset' + p[0].toUpperCase() + p.slice(1))}</button>`
).join('');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadImg('png')">${t('downloadPng')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadImg('jpg')">${t('downloadJpg')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="resetControls()">${t('reset')}</button>`;

const dropZone = $('#dropZone');
dropZone.addEventListener('click', () => $('#fileInput').click());
$('#fileInput').addEventListener('change', e => handleFile(e.target.files[0]));
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });

setLabels();

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/image/image-filter.html', name:'Image Filter'},
    {icon:'🖼️', href:'/image/grayscale.html', name:'Grayscale'},
    {icon:'📜', href:'/image/vintage-filter.html', name:'Vintage Filter'},
    {icon:'🖊️', href:'/image/pencil-sketch.html', name:'Pencil Sketch'},
  ]
});
</script>
