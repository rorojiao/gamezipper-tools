    depth: '最大深度',

    step2: '工具会在输入时自动验证格式正确性',

const { $, copyText, t } = GZ;

function validate() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#status').textContent = ''; return; }
  const parser = new DOMParser();
  const doc = parser.parseFromString(inp, 'text/xml');
  const parseError = doc.querySelector('parsererror');
  if (parseError) {
    const errText = parseError.textContent;
    const lineMatch = errText.match(/line\s*(\d+)/i);
    const colMatch = errText.match(/column\s*(\d+)/i) || errText.match(/char\s*(\d+)/i);
    let msg = errText.split('\n').filter(l => l.trim()).slice(0, 3).join(' ');
    if (msg.length > 200) msg = msg.substring(0, 200) + '…';
    let info = `<span class="invalid">${t('invalid')}</span><br><span style="opacity:.8">${msg}</span>`;
    if (lineMatch || colMatch) {
      info += `<br><span style="opacity:.7">`;
      if (lineMatch) info += `Line: ${lineMatch[1]}`;
      if (lineMatch && colMatch) info += ', ';
      if (colMatch) info += `Column: ${colMatch[1]}`;
      info += `</span>`;
    }
    $('#status').innerHTML = info;
    $('#output').innerHTML = `<span class="invalid">${msg}</span>`;
    return;
  }
  // Valid — compute stats
  const root = doc.documentElement;
  let elementCount = 0, attrCount = 0, textCount = 0, commentCount = 0, maxDepth = 0;
  function walk(node, depth) {
    if (node.nodeType === 1) {
      elementCount++;
      if (node.attributes) attrCount += node.attributes.length;
      maxDepth = Math.max(maxDepth, depth);
      [...node.childNodes].forEach(c => walk(c, depth + 1));
    } else if (node.nodeType === 3) {
      if (node.textContent.trim()) textCount++;
    } else if (node.nodeType === 8) {
      commentCount++;
    }
  }
  walk(root, 1);
  $('#status').innerHTML = `<span class="valid">${t('valid')}</span>`;
  $('#output').innerHTML = `
    <div style="font-size:.9rem;margin-bottom:8px;font-weight:bold">${t('stats')}</div>
    <div class="stat-box">
      <div class="stat-item"><div class="stat-num">${elementCount}</div>${t('elements')}</div>
      <div class="stat-item"><div class="stat-num">${attrCount}</div>${t('attributes')}</div>
      <div class="stat-item"><div class="stat-num">${textCount}</div>${t('textNodes')}</div>
      <div class="stat-item"><div class="stat-num">${commentCount}</div>${t('comments')}</div>
      <div class="stat-item"><div class="stat-num">${maxDepth}</div>${t('depth')}</div>
    </div>`;
}

$('#input').addEventListener('input', validate);

function loadExample() {
  $('#input').value = `<?xml version="1.0" encoding="UTF-8"?>
<note priority="high">
  <to>Tove</to>
  <from>Jani</from>
  <heading>Reminder</heading>
  <body>Don't forget me this weekend!</body>
  <!-- important -->
</note>`;
  validate();
}

function loadInvalid() {
  $('#input').value = `<?xml version="1.0"?>
<note>
  <to>Tove</to>
  <from>Jani
</note>`;
  validate();
}

  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';validate()">${t('clear')}</button>`;

loadExample();
