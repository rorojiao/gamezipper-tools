    dragHint: '⭐ 拖拽到书签栏：',
    charsInput: '输入字符',

    minified: '已压缩',
    warning: '⚠️ 代码为空',

const { $, copyText, t } = GZ;

function minifyJS(code) {
  return code
    .replace(/\/\/.*$/gm, '')
    .replace(/\/\*[\s\S]*?\*\//g, '')
    .replace(/\n/g, ' ')
    .replace(/\s+/g, ' ')
    .replace(/\s*([=+\-*/{}();,<>!&|?:])\s*/g, '$1')
    .trim();
}

function generateBookmarklet() {
  const inp = $('#input').value.trim();
  if (!inp) {
    $('#output').textContent = t('warning');
    $('#bookmarklet-area').innerHTML = '';
    $('#stats').innerHTML = '';
    return;
  }
  const minified = minifyJS(inp);
  const encoded = encodeURIComponent(minified);
  const bookmarklet = 'javascript:' + encoded;
  $('#output').textContent = bookmarklet;
  $('#bookmarklet-area').innerHTML = `<p style="font-size:.82rem;color:var(--text3)">${t('dragHint')}</p><a class="bookmarklet-link" href="${bookmarklet.replace(/"/g,'&quot;')}">📌 Bookmarklet</a>`;
  const saved = ((inp.length - minified.length) / inp.length * 100).toFixed(1);
  $('#stats').innerHTML = `
    <div class="stat-item">${t('charsInput')}: <span>${inp.length}</span></div>
    <div class="stat-item">${t('charsOutput')}: <span>${bookmarklet.length}</span></div>
    <div class="stat-item">${t('minified')}: <span>${minified.length} chars</span></div>
    <div class="stat-item">Saved: <span>${saved}%</span></div>`;
}

function loadExample() {
  $('#input').value = `// Highlight all links on the page in yellow
const links = document.querySelectorAll('a');
links.forEach(link => {
  link.style.background = 'yellow';
  link.style.color = 'black';
});
alert('Highlighted ' + links.length + ' links!');`;
  generateBookmarklet();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#bookmarklet-area').innerHTML = ''; $('#stats').innerHTML = ''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generateBookmarklet()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#input').addEventListener('input', generateBookmarklet);
