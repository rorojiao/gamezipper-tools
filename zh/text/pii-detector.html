const { $, copyText, t } = GZ;

// Luhn check for credit card numbers
function luhnOk(digits){
  let sum = 0, alt = false;
  for(let i = digits.length - 1; i >= 0; i--){
    let n = +digits[i];
    if(alt){ n *= 2; if(n > 9) n -= 9; }
    sum += n; alt = !alt;
  }
  return sum > 0 && sum % 10 === 0;
}

const RAW = {
  email: {
    icon:'✉️', en:'Email', zh:'邮箱',
    re: /[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,24}/g
  },
  ssn: {
    icon:'🪪', en:'US SSN', zh:'美国 SSN',
    // Match 9-digit SSN-like patterns with or without dashes; avoid pure Luhn-valid cards handled separately
    re: /\b(?!000|666|9\d{2})\d{3}[- ]?(?!00)\d{2}[- ]?(?!0000)\d{4}\b/g,
    post: m => true
  },
  card: {
    icon:'💳', en:'Credit Card', zh:'信用卡',
    // 13-19 digit runs with optional spaces/dashes
    re: /\b(?:\d[ -]*?){13,19}\b/g,
    post: m => luhnOk(m.replace(/[^\d]/g,''))
  },
  iban: {
    icon:'🏦', en:'IBAN', zh:'IBAN',
    re: /\b[A-Z]{2}\d{2}[A-Z0-9]{10,30}\b/g
  },
  phone: {
    icon:'📞', en:'Phone', zh:'电话',
    re: /(?:(?:\+?\d{1,3}[\s.-]?)?(?:\(?\d{2,4}\)?[\s.-]?)?\d{3,4}[\s.-]?\d{3,4})\b/g,
    post: m => { const d = m.replace(/[^\d]/g,''); return d.length >= 7 && d.length <= 15; }
  },
  ip: {
    icon:'🌐', en:'IP Address', zh:'IP 地址',
    re: /\b(?:(?:25[0-5]|2[0-4]\d|1?\d?\d)\.){3}(?:25[0-5]|2[0-4]\d|1?\d?\d)\b/g
  },
  apikey: {
    icon:'🔑', en:'API Key', zh:'API 密钥',
    re: /(?:sk-[A-Za-z0-9]{20,}|AKIA[0-9A-Z]{16}|gh[pousr]_[A-Za-z0-9]{36}|xox[baprs]-[A-Za-z0-9-]{10,}|AIza[0-9A-Za-z_\-]{35}|[A-Fa-f0-9]{32,64})/g
  },
};

const enabled = {};
Object.keys(RAW).forEach(k => enabled[k] = true);

async function sha256(s){
  try {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
    return 'sha256:' + [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('').slice(0,16);
  } catch(e){ return 'sha256:' + s.length; }
}

function maskValue(s){
  const d = s.replace(/[^\w]/g,'');
  if(d.length <= 4) return '****';
  return '****' + d.slice(-4);
}

function buildToggles(){
  const lang = GZI18n.getLang();
  $('#pii-toggles').innerHTML = Object.keys(RAW).map(k => {
    const lbl = lang === 'zh' ? RAW[k].zh : RAW[k].en;
    return `<label data-k="${k}" id="tg-${k}"><input type="checkbox" ${enabled[k]?'checked':''} onchange="enabled['${k}']=this.checked;refreshToggles()">${RAW[k].icon} ${lbl}</label>`;
  }).join('');
  refreshToggles();
}
function refreshToggles(){
  Object.keys(enabled).forEach(k => {
    const el = $('#tg-'+k);
    if(el) el.classList.toggle('on', enabled[k]);
  });
}

function setLangAttrs(){
  document.querySelectorAll('[id-lang]').forEach(el => {
    const key = el.getAttribute('id-lang');
    if(el.tagName === 'INPUT' && el.type === 'checkbox') return;
    if(el.tagName === 'TEXTAREA'){ el.placeholder = t(key); }
    else if(el.tagName === 'OPTION'){ /* leave value */ }
    else if(el.tagName === 'BUTTON' || el.tagName === 'SELECT'){ /* keep labels */ }
    const txt = t(key);
    if(txt && (el.tagName === 'BUTTON' || el.tagName === 'SELECT' || el.tagName === 'LABEL' || el.tagName === 'SPAN')){
      // For buttons we want text; for select we set nothing special
      if(el.tagName === 'BUTTON') el.textContent = txt;
      else if(el.tagName === 'LABEL') el.textContent = txt;
    }
  });
  // Explicit
  $('#pii-in').placeholder = t('ph');
  const styleSel = $('#pii-style');
  const styleLbl = $('[id-lang="lbStyle"]');
  if(styleLbl) styleLbl.textContent = t('lbStyle');
  const inLbl = $('[id-lang="lbIn"]'); if(inLbl) inLbl.textContent = t('lbIn');
  const outLbl = $('[id-lang="lbOut"]'); if(outLbl) outLbl.textContent = t('lbOut');
  const btnD = $('[id-lang="btnDetect"]'); if(btnD) btnD.textContent = t('btnDetect');
  const btnC = $('[id-lang="btnClear"]'); if(btnC) btnC.textContent = t('btnClear');
  const hintEl = $('[id-lang="hint"]'); if(hintEl) hintEl.textContent = t('hint');
}

function findMatches(text){
  const matches = [];
  for(const key of Object.keys(RAW)){
    if(!enabled[key]) continue;
    const { re, post } = RAW[key];
    re.lastIndex = 0;
    let m;
    while((m = re.exec(text)) !== null){
      const val = m[0];
      if(post && !post(val)) continue;
      // Avoid duplicate of email inside apikey etc.
      matches.push({ start: m.index, end: m.index + val.length, type: key, value: val });
    }
  }
  // Resolve overlaps: keep the longest match
  matches.sort((a,b) => a.start - b.start || (b.end - b.start) - (a.end - a.start));
  const out = [];
  let lastEnd = -1;
  for(const mt of matches){
    if(mt.start < lastEnd) continue;
    out.push(mt);
    lastEnd = mt.end;
  }
  return out;
}

async function runPII(){
  const text = $('#pii-in').value;
  if(!text.trim()){
    $('#pii-out').textContent = '';
    $('#pii-stats').innerHTML = '';
    return;
  }
  const matches = findMatches(text);
  const style = $('#pii-style').value;
  const counts = {};
  const typeCounters = {};

  // Build replacement map first (for hash/tokens which need await)
  const replacements = await Promise.all(matches.map(async mt => {
    counts[mt.type] = (counts[mt.type] || 0) + 1;
    typeCounters[mt.type] = (typeCounters[mt.type] || 0) + 1;
    let replacement;
    if(style === 'redact') replacement = '[REDACTED]';
    else if(style === 'mask') replacement = maskValue(mt.value);
    else if(style === 'hash') replacement = await sha256(mt.value);
    else if(style === 'token'){
      const tag = mt.type.toUpperCase();
      replacement = `[${tag}_${typeCounters[mt.type]}]`;
    }
    return { ...mt, replacement };
  }));

  // Rebuild text with replacements, and a highlighted version
  let result = '';
  let html = '';
  let cursor = 0;
  for(const mt of replacements){
    result += text.slice(cursor, mt.start) + mt.replacement;
    html += escapeHtml(text.slice(cursor, mt.start))
      + `<span class="pii-mark">${escapeHtml(mt.value)}</span>`;
    cursor = mt.end;
  }
  result += text.slice(cursor);
  html += escapeHtml(text.slice(cursor));

  $('#pii-out').textContent = result;
  $('#pii-out').dataset.html = html;

  const lang = GZI18n.getLang();
  const total = replacements.length;
  const chips = [`<span class="pii-chip">${lang==='zh'?'共发现':'Total found'} <b>${total}</b></span>`];
  for(const k of Object.keys(RAW)){
    if(counts[k]){
      const lbl = lang === 'zh' ? RAW[k].zh : RAW[k].en;
      chips.push(`<span class="pii-chip">${RAW[k].icon} ${lbl} <b>${counts[k]}</b></span>`);
    }
  }
  $('#pii-stats').innerHTML = chips.join('');
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function clearAll(){
  $('#pii-in').value = ''; $('#pii-out').textContent = ''; $('#pii-stats').innerHTML = '';
}

buildToggles();
setLangAttrs();

// Re-localize on lang change
GZI18n.onChange && GZI18n.onChange(setLangAttrs);

});
</script>
