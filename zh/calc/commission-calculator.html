<script>
GZI18n.register({
  en: {
    toolTitle: 'Commission Calculator',
    toolDesc: 'Calculate sales commission earnings. Supports flat-rate, base salary + commission, and tiered structures. Free, browser-based, no signup.',
    modeFlat: 'Flat Rate',
    modeBase: 'Base + Commission',
    modeTiered: 'Tiered',
    salesAmount: 'Sales Amount',
    commissionRate: 'Commission Rate (%)',
    baseSalary: 'Base Salary',
    addTier: '+ Add Tier',
    calculate: 'Calculate',
    clear: 'Clear',
    commissionEarned: 'Commission Earned',
    totalEarnings: 'Total Earnings',
    effectiveRate: 'Effective Rate',
    upTo: 'Up to $',
    rateCol: 'Rate (%)',
    step1: 'Choose a commission structure: flat rate, base + commission, or tiered',
    step2: 'Enter the total sales amount',
    step3: 'Enter the commission rate (or tier rates for tiered mode)',
    step4: 'See your commission and total earnings instantly',
  },
  zh: {
    toolTitle: '提成 / 佣金计算器',
    toolDesc: '计算销售提成收入。支持固定比例、底薪 + 提成和阶梯提成三种模式。免费、浏览器本地运行、无需注册。',
    modeFlat: '固定比例',
    modeBase: '底薪 + 提成',
    modeTiered: '阶梯提成',
    salesAmount: '销售金额',
    commissionRate: '提成比例 (%)',
    baseSalary: '底薪',
    addTier: '+ 添加阶梯',
    calculate: '计算',
    clear: '清除',
    commissionEarned: '提成金额',
    totalEarnings: '总收入',
    effectiveRate: '实际提成率',
    upTo: '上限 $',
    rateCol: '比例 (%)',
    step1: '选择提成模式：固定比例、底薪 + 提成或阶梯提成',
    step2: '输入总销售金额',
    step3: '输入提成比例（阶梯模式输入各阶梯比例）',
    step4: '即时查看提成金额和总收入',
  }
});

const { $, t } = GZ;
let mode = 'flat';
let tiers = [
  { upto: 10000, rate: 5 },
  { upto: 25000, rate: 7 },
  { upto: 999999999, rate: 10 },
];

function buildTabs() {
  $('#mode-tabs').innerHTML = `
    <div class="cm-tab ${mode==='flat'?'active':''}" onclick="setMode('flat')">${t('modeFlat')}</div>
    <div class="cm-tab ${mode==='base'?'active':''}" onclick="setMode('base')">${t('modeBase')}</div>
    <div class="cm-tab ${mode==='tiered'?'active':''}" onclick="setMode('tiered')">${t('modeTiered')}</div>`;
}

function setMode(m) {
  mode = m;
  buildTabs();
  buildInputs();
  calc();
}

function buildInputs() {
  let html = `<div class="cm-row"><span class="cm-label">${t('salesAmount')}</span>
    <input type="number" id="sales" class="gz-input" value="20000" step="any" oninput="calc()"></div>`;

  if (mode === 'flat' || mode === 'base') {
    html += `<div class="cm-row"><span class="cm-label">${t('commissionRate')}</span>
      <input type="number" id="rate" class="gz-input" value="5" step="0.1" oninput="calc()"></div>`;
  }
  if (mode === 'base') {
    html += `<div class="cm-row"><span class="cm-label">${t('baseSalary')}</span>
      <input type="number" id="base" class="gz-input" value="3000" step="any" oninput="calc()"></div>`;
  }
  if (mode === 'tiered') {
    html += `<div style="margin:10px 0 6px;font-size:.85em;opacity:.8">${t('rateCol')}: ${t('upTo')}...</div>`;
    html += `<div id="tier-list"></div>`;
    html += `<button class="gz-btn gz-btn-secondary" style="margin-top:6px" onclick="addTier()">${t('addTier')}</button>`;
  }
  $('#inputs').innerHTML = html;
  if (mode === 'tiered') renderTiers();
}

function renderTiers() {
  const list = $('#tier-list');
  if (!list) return;
  list.innerHTML = tiers.map((tr, i) => `
    <div class="cm-tier">
      <span>${t('upTo')}</span>
      <input type="number" class="gz-input tier-up" data-i="${i}" value="${tr.upto >= 999999999 ? '' : tr.upto}" step="any" placeholder="∞" oninput="updateTier(${i},'upto',this.value)">
      <span>${t('rateCol')}:</span>
      <input type="number" class="gz-input tier-rt" data-i="${i}" value="${tr.rate}" step="0.1" oninput="updateTier(${i},'rate',this.value)">
      ${tiers.length > 1 ? `<button class="gz-btn gz-btn-secondary cm-del" onclick="delTier(${i})">✕</button>` : ''}
    </div>`).join('');
}

function updateTier(i, field, val) {
  if (field === 'upto') {
    tiers[i].upto = val === '' ? 999999999 : (parseFloat(val) || 0);
  } else {
    tiers[i].rate = parseFloat(val) || 0;
  }
  calc();
}

function addTier() {
  tiers.splice(tiers.length - 1, 0, { upto: 50000, rate: 8 });
  renderTiers();
  calc();
}

function delTier(i) {
  if (tiers.length > 1) {
    tiers.splice(i, 1);
    renderTiers();
    calc();
  }
}

function calc() {
  const sales = parseFloat($('#sales')?.value) || 0;

  let commission = 0;
  if (mode === 'flat' || mode === 'base') {
    const rate = (parseFloat($('#rate')?.value) || 0) / 100;
    commission = sales * rate;
  } else {
    // Tiered
    const sorted = [...tiers].sort((a, b) => a.upto - b.upto);
    let prevLimit = 0;
    let remaining = sales;
    for (const tr of sorted) {
      if (remaining <= 0) break;
      const bracketSize = Math.min(tr.upto - prevLimit, remaining);
      if (bracketSize > 0) {
        commission += bracketSize * (tr.rate / 100);
        remaining -= bracketSize;
      }
      prevLimit = tr.upto;
    }
  }

  const base = mode === 'base' ? (parseFloat($('#base')?.value) || 0) : 0;
  const total = base + commission;
  const effRate = sales > 0 ? (commission / sales * 100) : 0;

  $('#result').innerHTML = `
    <div class="cm-card"><div>${t('commissionEarned')}</div><div class="cm-big">${formatMoney(commission)}</div></div>
    ${mode === 'base' ? `<div class="cm-card"><div>${t('baseSalary')}</div><div class="cm-big">${formatMoney(base)}</div></div>` : ''}
    <div class="cm-card"><div>${t('totalEarnings')}</div><div class="cm-big">${formatMoney(total)}</div>
      <div class="cm-sub">${t('effectiveRate')}: ${effRate.toFixed(2)}%</div>
    </div>`;
}

function formatMoney(v) {
  const sign = v < 0 ? '-' : '';
  return sign + '$' + Math.abs(v).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function doClear() {
  ['#sales','#rate','#base'].forEach(s => { const el = $(s); if (el) el.value = ''; });
  $('#result').innerHTML = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

buildTabs();
buildInputs();
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💵', href:'/calc/salary-calculator.html', name:'Salary'},
    {icon:'📊', href:'/calc/profit-margin.html', name:'Profit Margin'},
    {icon:'🏷️', href:'/calc/markup-calculator.html', name:'Markup'},
    {icon:'💰', href:'/calc/tip-calculator.html', name:'Tip'},
  ]
});
</script>
