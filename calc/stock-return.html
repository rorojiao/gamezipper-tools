<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I calculate stock return percentage?","acceptedAnswer":{"@type":"Answer","text":"Stock return = ((Sell Price - Buy Price + Dividends) / Buy Price) × 100. For example, if you bought at $100, sold at $120, and received $5 in dividends, your total return is ((120 - 100 + 5) / 100) × 100 = 25%."}}, {"@type":"Question","name":"What is annualized return?","acceptedAnswer":{"@type":"Answer","text":"Annualized return (CAGR) = ((Final Value / Initial Value) ^ (1/Years)) - 1. This shows the average yearly growth rate, making it easy to compare investments of different durations."}}, {"@type":"Question","name":"Does this calculator account for commissions?","acceptedAnswer":{"@type":"Answer","text":"Yes. You can enter buy and sell commissions separately. These are subtracted from your total profit when calculating returns."}}, {"@type":"Question","name":"What is dividend yield?","acceptedAnswer":{"@type":"Answer","text":"Dividend yield = (Annual Dividends per Share / Current Share Price) × 100. It shows how much a company pays out in dividends relative to its stock price."}}]}</script>

<div class="gz-container">

  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="form-grid">
      <div class="form-group">
        <label id="lbl-buy"></label>

      <div class="form-group">
        <label id="lbl-sell"></label>
        <input type="number" id="sell-price" value="150" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label id="lbl-shares"></label>
        <input type="number" id="shares" value="10" min="1" step="1">
      </div>
      <div class="form-group">
        <label id="lbl-dividend"></label>
        <input type="number" id="dividend" value="0" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label id="lbl-buy-comm"></label>
        <input type="number" id="buy-comm" value="0" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label id="lbl-sell-comm"></label>
        <input type="number" id="sell-comm" value="0" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label id="lbl-buy-date"></label>
        <input type="date" id="buy-date" value="2024-01-01">
      </div>
      <div class="form-group">
        <label id="lbl-sell-date"></label>

        <div class="result-card"><div class="value" id="r-profit"></div><div class="label" id="r-profit-lbl"></div></div>
        <div class="result-card"><div class="value" id="r-return"></div><div class="label" id="r-return-lbl"></div></div>
        <div class="result-card"><div class="value" id="r-annualized"></div><div class="label" id="r-annualized-lbl"></div></div>
        <div class="result-card"><div class="value" id="r-divyield"></div><div class="label" id="r-divyield-lbl"></div></div>
      </div>

    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Stock Return Calculator',
    toolDesc: 'Calculate stock investment returns — total return, annualized return, dividend yield and profit/loss.',
    buyPrice: 'Buy Price per Share ($)',
    sellPrice: 'Sell Price per Share ($)',
    shares: 'Number of Shares',
    dividendPerShare: 'Dividends per Share ($)',
    buyCommission: 'Buy Commission ($)',
    sellCommission: 'Sell Commission ($)',
    buyDate: 'Buy Date',
    sellDate: 'Sell Date',
    calculate: 'Calculate',
    totalProfit: 'Total Profit/Loss',
    totalReturn: 'Total Return',
    annualizedReturn: 'Annualized Return',
    dividendYield: 'Dividend Yield',
    totalInvested: 'Total Invested',
    totalReceived: 'Total Received',
    priceChange: 'Price Change',
    dividendIncome: 'Dividend Income',
    totalCommissions: 'Total Commissions',
    holdingPeriod: 'Holding Period',
    days: 'days',
    step1: 'Enter the buy price and sell price per share',
    step2: 'Set the number of shares and any dividends received',
    step3: 'Optionally add commissions and holding dates',
    step4: 'Click Calculate to see your return breakdown',
  },
  zh: {
    toolTitle: '股票收益计算器',
    toolDesc: '计算股票投资收益 — 总回报、年化收益率、股息率和盈亏明细。',
    buyPrice: '买入单价（¥）',
    sellPrice: '卖出单价（¥）',
    shares: '持股数量',
    dividendPerShare: '每股股息（¥）',
    buyCommission: '买入佣金（¥）',
    sellCommission: '卖出佣金（¥）',
    buyDate: '买入日期',
    sellDate: '卖出日期',
    calculate: '计算',
    totalProfit: '总盈亏',
    totalReturn: '总回报率',
    annualizedReturn: '年化收益率',
    dividendYield: '股息率',
    totalInvested: '总投入',
    totalReceived: '总回收',
    priceChange: '价差收益',
    dividendIncome: '股息收入',
    totalCommissions: '总佣金',
    holdingPeriod: '持有时间',
    days: '天',
    step1: '输入每股买入价和卖出价',
    step2: '设置持股数量和收到的股息',
    step3: '可选：添加佣金和持有日期',
    step4: '点击「计算」查看收益明细',
  }
});

const { $, t } = GZ;

const lang = GZI18n.getLang();
const curr = lang === 'zh' ? 'CNY' : 'USD';
const locale = lang === 'zh' ? 'zh-CN' : 'en-US';
const fmt = (n) => new Intl.NumberFormat(locale, { style: 'currency', currency: curr, minimumFractionDigits: 2 }).format(n);
const fmtPct = (n) => (n >= 0 ? '+' : '') + n.toFixed(2) + '%';

// Set default sell date to today
$('#sell-date').value = new Date().toISOString().split('T')[0];

function calculate() {
  const buyPrice = parseFloat($('#buy-price').value) || 0;
  const sellPrice = parseFloat($('#sell-price').value) || 0;
  const shares = parseInt($('#shares').value) || 1;
  const dividend = parseFloat($('#dividend').value) || 0;
  const buyComm = parseFloat($('#buy-comm').value) || 0;
  const sellComm = parseFloat($('#sell-comm').value) || 0;
  const buyDate = new Date($('#buy-date').value);
  const sellDate = new Date($('#sell-date').value);
  
  const totalInvested = buyPrice * shares + buyComm;
  const totalReceived = sellPrice * shares + dividend * shares - sellComm;
  const priceChange = (sellPrice - buyPrice) * shares;
  const dividendIncome = dividend * shares;
  const totalCommissions = buyComm + sellComm;
  const profit = totalReceived - totalInvested;
  
  const totalReturnPct = totalInvested > 0 ? (profit / totalInvested) * 100 : 0;
  
  // Annualized
  const daysDiff = Math.max(1, Math.ceil((sellDate - buyDate) / 86400000));
  const years = daysDiff / 365.25;
  const annualizedReturn = years > 0 && totalInvested > 0 ? (Math.pow(totalReceived / totalInvested, 1 / years) - 1) * 100 : totalReturnPct;
  
  // Dividend yield
  const divYield = buyPrice > 0 ? (dividend / buyPrice) * 100 : 0;
  
  $('#results').style.display = 'block';
  
  const profitEl = $('#r-profit');
  profitEl.textContent = fmt(profit);
  profitEl.className = 'value ' + (profit >= 0 ? 'profit' : 'loss');
  $('#r-profit-lbl').textContent = t('totalProfit');
  
  const returnEl = $('#r-return');
  returnEl.textContent = fmtPct(totalReturnPct);
  returnEl.className = 'value ' + (totalReturnPct >= 0 ? 'profit' : 'loss');
  $('#r-return-lbl').textContent = t('totalReturn');
  
  const annEl = $('#r-annualized');
  annEl.textContent = fmtPct(annualizedReturn);
  annEl.className = 'value ' + (annualizedReturn >= 0 ? 'profit' : 'loss');
  $('#r-annualized-lbl').textContent = t('annualizedReturn');
  
  $('#r-divyield').textContent = divYield.toFixed(2) + '%';
  $('#r-divyield').style.color = '#61afef';
  $('#r-divyield-lbl').textContent = t('dividendYield');
  
  // Breakdown
  $('#breakdown').innerHTML = `
    <div><span>${t('totalInvested')}</span><span>${fmt(totalInvested)}</span></div>
    <div><span>${t('totalReceived')}</span><span>${fmt(totalReceived)}</span></div>
    <div><span>${t('priceChange')}</span><span style="color:${priceChange >= 0 ? '#00d672' : '#e94560'}">${fmt(priceChange)}</span></div>
    <div><span>${t('dividendIncome')}</span><span style="color:#61afef">${fmt(dividendIncome)}</span></div>
    <div><span>${t('totalCommissions')}</span><span style="color:#e94560">${fmt(totalCommissions)}</span></div>
    <div><span>${t('holdingPeriod')}</span><span>${daysDiff} ${t('days')}</span></div>
  `;
}

// Labels
$('#lbl-buy').textContent = t('buyPrice');
$('#lbl-sell').textContent = t('sellPrice');
$('#lbl-shares').textContent = t('shares');
$('#lbl-dividend').textContent = t('dividendPerShare');
$('#lbl-buy-comm').textContent = t('buyCommission');
$('#lbl-sell-comm').textContent = t('sellCommission');
$('#lbl-buy-date').textContent = t('buyDate');
$('#lbl-sell-date').textContent = t('sellDate');

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="calculate()">${t('calculate')}</button>`;

// Auto-calculate
['buy-price','sell-price','shares','dividend','buy-comm','sell-comm','buy-date','sell-date'].forEach(id => {
  $('#' + id).addEventListener('input', calculate);
});

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/roi.html', name:'ROI Calculator'},
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
    {icon:'🪙', href:'/calc/crypto-profit-calculator.html', name:'Crypto Profit'},
    {icon:'🏦', href:'/calc/investment-calculator.html', name:'Investment Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
