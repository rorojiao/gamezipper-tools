<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How does this background remover work?", "acceptedAnswer": {"@type": "Answer", "text": "It uses a chroma key (color key) algorithm in your browser. Pick the background color (or click the background in the preview) and the tool removes all pixels matching that color within a tolerance threshold, making them transparent. The result is a clean PNG with an alpha channel."}}, {"@type": "Question", "name": "Will it work on photos with complex backgrounds?", "acceptedAnswer": {"@type": "Answer", "text": "This tool works best on images with a solid, single-color background (white, green screen, blue, etc.) — like product photos or studio portraits. For complex or gradient backgrounds, the result may leave color fringes. For those cases, professional tools using AI are more accurate."}}, {"@type": "Question", "name": "What image formats are supported?", "acceptedAnswer": {"@type": "Answer", "text": "You can upload JPG, PNG, WebP, GIF or BMP. The output is always a transparent PNG that preserves the alpha channel and can be opened in any image editor or used on any background."}}, {"@type": "Question", "name": "Is my image uploaded to a server?", "acceptedAnswer": {"@type": "Answer", "text": "No. All processing happens locally in your browser using the HTML5 Canvas API. Your image never leaves your device, ensuring complete privacy for personal or client work."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="br-controls">
      <div>
        <label id="lbl-file"></label>
        <input type="file" id="file" accept="image/*">
      </div>
      <div>
        <label id="lbl-bgColor"></label>
        <input type="color" id="bgColor" value="#ffffff">
      </div>
      <div>
        <label id="lbl-tol"></label>
        <input type="range" id="tol" min="0" max="120" value="40">
      </div>
      <div>
        <label id="lbl-smooth"></label>
        <input type="range" id="smooth" min="0" max="100" value="20">
      </div>
    </div>
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="br-layout">
      <div class="br-pane">
        <h3 id="lbl-original"></h3>
        <canvas id="srcCanvas"></canvas>
        <div class="br-info" id="srcInfo"></div>
      </div>
      <div class="br-pane">
        <h3 id="lbl-result"></h3>
        <canvas id="dstCanvas"></canvas>
        <div class="br-info" id="dstInfo"></div>
      </div>
    </div>
    <div class="br-status" id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Image Background Remover',
    toolDesc: 'Remove solid-color backgrounds from any image and download a transparent PNG. 100% private, runs in your browser.',
    lblFile: 'Choose image', lblBgColor: 'Background color', lblTol: 'Color tolerance', lblSmooth: 'Edge smoothness',
    lblOriginal: '📥 Original', lblResult: '✨ Transparent Result',
    upload: '📤 Upload Image', sample: '🎨 Try Sample', download: '💾 Download PNG', reset: '🔄 Reset',
    loaded: 'Loaded', removed: 'pixels removed', size: 'Size', ready: 'Upload an image to start',
    toleranceHint: 'tolerance (higher = removes more shades)', smoothHint: 'edge smoothness (higher = softer edges)',
    step1: 'Click Upload Image or Try Sample to load a picture',
    step2: 'Pick the background color (or click a background pixel on the original)',
    step3: 'Adjust tolerance and edge smoothness to refine the cutout',
    step4: 'Download the result as a transparent PNG',
  },
  zh: {
    toolTitle: '图片背景移除工具',
    toolDesc: '从任意图片中移除纯色背景并下载透明 PNG。100% 隐私，浏览器本地处理。',
    lblFile: '选择图片', lblBgColor: '背景色', lblTol: '容差', lblSmooth: '边缘平滑',
    lblOriginal: '📥 原图', lblResult: '✨ 透明结果',
    upload: '📤 上传图片', sample: '🎨 示例图片', download: '💾 下载 PNG', reset: '🔄 重置',
    loaded: '已加载', removed: '像素被移除', size: '尺寸', ready: '请上传图片开始',
    toleranceHint: '容差（越高移除越多相近色）', smoothHint: '边缘平滑（越高边缘越柔和）',
    step1: '点击上传图片或示例图片加载一张图',
    step2: '选择背景色（或在原图上点击背景像素取色）',
    step3: '调整容差和边缘平滑以优化抠图效果',
    step4: '将结果下载为透明 PNG',
  }
});

const { $, copyText, t } = GZ;
let srcImg = null;
let processing = false;

function process() {
  if (!srcImg || processing) return;
  processing = true;
  const src = $('#srcCanvas'), dst = $('#dstCanvas');
  const w = srcImg.naturalWidth, h = srcImg.naturalHeight;
  src.width = w; src.height = h;
  dst.width = w; dst.height = h;
  const sCtx = src.getContext('2d', { willReadFrequently: true });
  sCtx.drawImage(srcImg, 0, 0);
  const data = sCtx.getImageData(0, 0, w, h);

  // Read target color
  const hex = $('#bgColor').value;
  const tr = parseInt(hex.slice(1,3),16);
  const tg = parseInt(hex.slice(3,5),16);
  const tb = parseInt(hex.slice(5,7),16);
  const tol = +$('#tol').value;
  const smooth = +$('#smooth').value;
  const d = data.data;
  let removed = 0;
  for (let i = 0; i < d.length; i += 4) {
    const dr = d[i] - tr, dg = d[i+1] - tg, db = d[i+2] - tb;
    const dist = Math.sqrt(dr*dr + dg*dg + db*db);
    if (dist < tol) {
      d[i+3] = 0;
      removed++;
    } else if (dist < tol + smooth) {
      // Smooth edge transition
      const a = 255 * (1 - (dist - tol) / smooth);
      d[i+3] = Math.min(d[i+3], Math.max(0, Math.floor(a)));
    }
  }
  // Output
  const dCtx = dst.getContext('2d');
  dCtx.putImageData(data, 0, 0);

  // Stats
  $('#srcInfo').textContent = `${t('size')}: ${w}×${h} px`;
  $('#dstInfo').textContent = `${removed.toLocaleString()} ${t('removed')}`;
  $('#status').textContent = `✓ ${t('ready')}`;
  processing = false;
}

function loadImage(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      srcImg = img;
      $('#status').textContent = `${t('loaded')}: ${file.name} (${img.naturalWidth}×${img.naturalHeight})`;
      process();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function loadSample() {
  // Build a synthetic sample: subject (blue circle) on green background
  const c = document.createElement('canvas');
  c.width = 400; c.height = 400;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#00b140'; // solid green
  ctx.fillRect(0, 0, 400, 400);
  // Subject: blue circle with text
  ctx.fillStyle = '#3b82f6';
  ctx.beginPath(); ctx.arc(200, 200, 100, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 32px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('GZ', 200, 200);
  const url = c.toDataURL('image/png');
  const img = new Image();
  img.onload = () => {
    srcImg = img;
    $('#bgColor').value = '#00b140';
    process();
  };
  img.src = url;
}

function downloadResult() {
  const c = $('#dstCanvas');
  if (!c.width) return;
  c.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'no-bg.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }, 'image/png');
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="$('#file').click()">${t('upload')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadSample()">${t('sample')}</button>
  <button class="gz-btn" onclick="downloadResult()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="srcImg=null;$('#srcCanvas').getContext('2d').clearRect(0,0,9999,9999);$('#dstCanvas').getContext('2d').clearRect(0,0,9999,9999);$('#srcInfo').textContent='';$('#dstInfo').textContent='';$('#status').textContent='${t('ready')}'">${t('reset')}</button>`;

$('#file').addEventListener('change', e => loadImage(e.target.files[0]));
$('#bgColor').addEventListener('input', process);
$('#tol').addEventListener('input', process);
$('#smooth').addEventListener('input', process);

// Click on original canvas = pick color
$('#srcCanvas').addEventListener('click', e => {
  if (!srcImg) return;
  const rect = e.target.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) * (e.target.width / rect.width));
  const y = Math.floor((e.clientY - rect.top) * (e.target.height / rect.height));
  const ctx = e.target.getContext('2d', { willReadFrequently: true });
  const p = ctx.getImageData(x, y, 1, 1).data;
  const hex = '#' + [p[0], p[1], p[2]].map(v => v.toString(16).padStart(2,'0')).join('');
  $('#bgColor').value = hex;
  process();
});

$('#status').textContent = t('ready');
$('#lbl-tol').textContent = t('lblTol') + ' (' + t('toleranceHint') + ')';
$('#lbl-smooth').textContent = t('lblSmooth') + ' (' + t('smoothHint') + ')';

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/image/image-to-svg.html', name:'Image to SVG'},
    {icon:'🛡️', href:'/image/exif-remover.html', name:'EXIF Remover'},
    {icon:'✂️', href:'/image/cropper.html', name:'Image Cropper'},
    {icon:'🖼️', href:'/image/image-to-base64.html', name:'Image to Base64'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
