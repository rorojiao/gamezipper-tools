    step3: '点击运算按钮：加、减、乘、行列式、转置或求逆',

const { $, t } = GZ;
let size = 2;
let lastOp = null;

function renderMatrices(){
  const grids = ['A','B'].map(name=>{
    let cells='';
    for(let i=0;i<size*size;i++) cells += `<input class="mcell" id="${name}${i}" type="text" inputmode="decimal" placeholder="0">`;
    return `<div class="matrix-wrap"><div class="mlabel">${name}</div><div class="matrix-grid" style="grid-template-columns:repeat(${size},1fr)">${cells}</div></div>`;
  }).join('');
  $('#matrices').innerHTML = grids;
}

function readMatrix(name){
  const M=[];
  for(let i=0;i<size;i++){
    const row=[];
    for(let j=0;j<size;j++){
      const v = $('#'+name+(i*size+j)).value.trim();
      row.push(v===''?0:parseFloat(v));
    }
    M.push(row);
  }
  return M;
}

function fmt(n){
  if(Math.abs(n)<1e-9) n=0;
  return Number.isInteger(n)?String(n):(+n.toFixed(6)).toString();
}

function matrixHTML(M, label){
  let cells='';
  const n=M.length;
  for(let i=0;i<n;i++) for(let j=0;j<n;j++) cells += `<span class="mcell" style="display:inline-block">${fmt(M[i][j])}</span>`;
  return `<div class="matrix-wrap"><div class="mlabel">${label}</div><div class="matrix-grid" style="grid-template-columns:repeat(${n},1fr)">${cells}</div></div>`;
}

function det2(M){ return M[0][0]*M[1][1] - M[0][1]*M[1][0]; }
function det(M){
  const n=M.length;
  if(n===1) return M[0][0];
  if(n===2) return det2(M);
  let d=0;
  for(let j=0;j<n;j++){
    const minor=M.slice(1).map(r=>r.filter((_,c)=>c!==j));
    d += ((j%2===0)?1:-1)*M[0][j]*det(minor);
  }
  return d;
}
function transpose(M){ return M[0].map((_,j)=>M.map(r=>r[j])); }
function inverse(M){
  const d=det(M);
  if(Math.abs(d)<1e-12) return null;
  const n=M.length;
  if(n===2){
    const inv=[[M[1][1],-M[0][1]],[-M[1][0],M[0][0]]];
    return inv.map(r=>r.map(v=>v/d));
  }
  // cofactor
  const cof=M.map((row,i)=>row.map((_,j)=>{
    const minor=M.filter((_,r)=>r!==i).map(r=>r.filter((_,c)=>c!==j));
    return ((i+j)%2===0?1:-1)*det(minor);
  }));
  const adj=transpose(cof);
  return adj.map(r=>r.map(v=>v/d));
}
function add(A,B,s){ return A.map((r,i)=>r.map((v,j)=>v+s*B[i][j])); }
function mul(A,B){
  const n=A.length;
  const R=Array.from({length:n},()=>Array(n).fill(0));
  for(let i=0;i<n;i++) for(let j=0;j<n;j++) for(let k=0;k<n;k++) R[i][j]+=A[i][k]*B[k][j];
  return R;
}

function showResult(html){
  $('#result').innerHTML = `<div class="result-box"><div class="result-title">${t('result')}</div>${html}</div>`;
}

function operate(op){
  lastOp=op;
  const A=readMatrix('A');
  if(op==='add'){ showResult(matrixHTML(add(A,readMatrix('B'),+1), 'A + B')); }
  else if(op==='sub'){ showResult(matrixHTML(add(A,readMatrix('B'),-1), 'A − B')); }
  else if(op==='mul'){ showResult(matrixHTML(mul(A,readMatrix('B')), 'A × B')); }
  else if(op==='detA'){ showResult(`<div style="font-size:1.3em;font-weight:700">det(A) = ${fmt(det(A))}</div>`); }
  else if(op==='detB'){ showResult(`<div style="font-size:1.3em;font-weight:700">det(B) = ${fmt(det(readMatrix('B')))}</div>`); }
  else if(op==='transA'){ showResult(matrixHTML(transpose(A), 'Aᵀ')); }
  else if(op==='transB'){ showResult(matrixHTML(transpose(readMatrix('B')), 'Bᵀ')); }
  else if(op==='invA'){ const I=inverse(A); showResult(I?matrixHTML(I,'A⁻¹'):`<span style="color:var(--gz-accent)">${t('notInvertible')}</span>`); }
  else if(op==='invB'){ const I=inverse(readMatrix('B')); showResult(I?matrixHTML(I,'B⁻¹'):`<span style="color:var(--gz-accent)">${t('notInvertible')}</span>`); }
}

function renderOps(){
  $('#op-area').innerHTML=`
    <button class="gz-btn" onclick="operate('add')">${t('add')}</button>
    <button class="gz-btn" onclick="operate('sub')">${t('sub')}</button>
    <button class="gz-btn" onclick="operate('mul')">${t('mul')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="operate('detA')">${t('detA')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="operate('detB')">${t('detB')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="operate('transA')">${t('transA')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="operate('transB')">${t('transB')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="operate('invA')">${t('invA')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="operate('invB')">${t('invB')}</button>`;
}

function doClear(){
  document.querySelectorAll('.mcell').forEach(c=>{ if(c.tagName==='INPUT') c.value=''; });
  $('#result').innerHTML='';
}
function loadExample(){
  const vals2={A:[1,2,3,4],B:[5,6,7,8]};
  const vals3={A:[2,0,1,3,0,0,5,1,1],B:[1,0,0,0,1,0,0,0,1]};
  const ex=size===2?vals2:vals3;
  for(const name of ['A','B']) for(let i=0;i<size*size;i++) $('#'+name+i).value=ex[name][i];
  operate('mul');
}

$('#size-sel').addEventListener('change',e=>{ size=+e.target.value; renderMatrices(); if(lastOp) operate(lastOp); });
$('#lbl-size').textContent = t('size');
renderOps();
renderMatrices();

$('#toolbar').innerHTML=`
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

</script>
