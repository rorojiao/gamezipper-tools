<script>
GZI18n.register({
  en: {
    toolTitle: 'Regex to JavaScript Converter',
    toolDesc: 'Convert any regex pattern into ready-to-use JavaScript code. Generate match, test, replace, split and named-group snippets with flags and live sample testing. Copy RegExp literals or new RegExp() calls.',
    ok: '✓ {n} match(es) found',
    noMatch: 'No matches',
    errRegex: '✗ Invalid regex',
    sampleLabel: 'Sample text (test live)',
    step1: 'Type a regex pattern (with or without slashes)',
    step2: 'Toggle flags (g, i, m, s, u, y) as needed',
    step3: 'Optionally paste sample text to test live',
    step4: 'Pick a snippet and copy the JavaScript',
  },
  zh: {
    toolTitle: '正则转 JavaScript 转换器',
    toolDesc: '将任意正则表达式转换为可直接使用的 JavaScript 代码。生成 match、test、replace、split 和命名分组代码，支持标志位和实时示例测试。复制 RegExp 字面量或 new RegExp()。',
    ok: '✓ 找到 {n} 个匹配',
    noMatch: '无匹配',
    errRegex: '✗ 正则表达式无效',
    sampleLabel: '示例文本（实时测试）',
    step1: '输入正则表达式（带或不带斜杠）',
    step2: '按需切换标志位（g、i、m、s、u、y）',
    step3: '可选粘贴示例文本进行实时测试',
    step4: '选择代码片段并复制 JavaScript',
  }
});

const { $, copyText, t } = GZ;

const FLAG_INFO = [
  { f: 'g', label: 'global' },
  { f: 'i', label: 'ignoreCase' },
  { f: 'm', label: 'multiline' },
  { f: 's', label: 'dotAll' },
  { f: 'u', label: 'unicode' },
  { f: 'y', label: 'sticky' },
];

const state = { flags: new Set(['g','i']), snippet: 'matchAll' };

function getPattern() {
  let p = $('#pattern').value;
  // Strip leading/trailing slashes and trailing flags if user typed /pattern/gi
  if (p.startsWith('/')) {
    const lastSlash = p.lastIndexOf('/');
    if (lastSlash > 0) {
      const trailingFlags = p.slice(lastSlash + 1);
      p = p.slice(1, lastSlash);
      // Apply trailing flags to state
      state.flags = new Set(trailingFlags.split(''));
      renderFlags();
    }
  }
  return p;
}

function flagsStr() { return [...state.flags].sort().join(''); }

function buildRegex() {
  const p = getPattern();
  if (!p) return null;
  try {
    return new RegExp(p, flagsStr());
  } catch(e) {
    return { error: e.message };
  }
}

function renderFlags() {
  $('#flags').innerHTML = FLAG_INFO.map(fi => `
    <label class="${state.flags.has(fi.f) ? 'on' : ''}" onclick="toggleFlag('${fi.f}')">
      <strong>${fi.f}</strong> ${fi.label}
    </label>`).join('');
  $('#flagDisplay').textContent = flagsStr();
}

function toggleFlag(f) {
  if (state.flags.has(f)) state.flags.delete(f);
  else state.flags.add(f);
  renderFlags();
  update();
}

function runMatch() {
  const re = buildRegex();
  const sample = $('#sample').value;
  const out = $('#matchResult');
  if (!re) { out.innerHTML = '<span style="opacity:.6">—</span>'; return null; }
  if (re.error) { out.innerHTML = `<span style="color:var(--gz-accent)">${t('errRegex')}: ${escapeHtml(re.error)}</span>`; return null; }
  if (!sample) { out.innerHTML = '<span style="opacity:.6">—</span>'; return re; }
  try {
    let matches = [];
    if (state.flags.has('g')) {
      let m;
      while ((m = re.exec(sample)) !== null) {
        matches.push({ match: m[0], index: m.index, groups: m.slice(1), named: m.groups || {} });
        if (m.index === re.lastIndex) re.lastIndex++;
      }
    } else {
      const m = re.exec(sample);
      if (m) matches.push({ match: m[0], index: m.index, groups: m.slice(1), named: m.groups || {} });
    }
    if (!matches.length) {
      out.innerHTML = `<span style="opacity:.6">${t('noMatch')}</span>`;
    } else {
      out.innerHTML = matches.map((m, i) => {
        const groupStr = Object.keys(m.named).length
          ? ' ' + Object.entries(m.named).map(([k,v]) => `<span class="group-label">${k}=</span>"${escapeHtml(v)}"`).join(' ')
          : (m.groups.length ? ' ' + m.groups.map((g,idx) => `<span class="group-label">[${idx+1}]</span>"${escapeHtml(g)}"`).join(' ') : '');
        return `<div class="match-item"><span class="idx">${i+1}.</span>"${escapeHtml(m.match)}"${groupStr} <span style="opacity:.5">@${m.index}</span></div>`;
      }).join('');
    }
    $('#status').innerHTML = matches.length
      ? `<span style="color:var(--gz-success)">${t('ok').replace('{n}', matches.length)}</span>`
      : `<span style="opacity:.6">${t('noMatch')}</span>`;
    return re;
  } catch(e) {
    out.innerHTML = `<span style="color:var(--gz-accent)">${t('errRegex')}: ${escapeHtml(e.message)}</span>`;
    return null;
  }
}

function escReForLiteral(s) {
  // Escape unescaped / for literal form
  return s.replace(/(?<!\\)\//g, '\\/');
}

function escReForString(s) {
  // Escape backslashes that aren't already doubled, and quotes
  return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

function generateCode() {
  const re = buildRegex();
  if (!re || re.error || !getPattern()) {
    $('#output').textContent = '';
    return;
  }
  const pattern = getPattern();
  const flags = flagsStr();
  const literalForm = `/${escReForLiteral(pattern)}/${flags}`;
  const newForm = `new RegExp('${escReForString(pattern)}', '${flags}')`;
  const hasGlobal = state.flags.has('g');
  const hasNamed = pattern.includes('(?<');
  const lines = [];

  lines.push(`// RegExp — choose one form`);
  lines.push(`const re = ${literalForm};`);
  lines.push(`// or built dynamically:`);
  lines.push(`// const re = ${newForm};`);
  lines.push('');

  switch (state.snippet) {
    case 'test':
      lines.push(`// .test() — boolean check`);
      lines.push(`const isMatch = re.test(sample);`);
      lines.push(`console.log(isMatch); // true or false`);
      break;
    case 'match':
      if (hasGlobal) {
        lines.push(`// .match() with g flag — array of full matches`);
        lines.push(`const matches = sample.match(re);`);
        lines.push(`// ["alice@example.com", "bob@test.org"]`);
      } else {
        lines.push(`// .match() without g — first match with groups`);
        lines.push(`const m = sample.match(re);`);
        lines.push(`if (m) {`);
        lines.push(`  console.log(m[0]);   // full match`);
        lines.push(`  console.log(m[1]);   // group 1`);
        lines.push(`  console.log(m.index);// start position`);
        lines.push(`}`);
      }
      break;
    case 'matchAll':
      lines.push(`// .matchAll() — iterate all matches with groups (requires g flag)`);
      lines.push(`for (const m of sample.matchAll(re)) {`);
      lines.push(`  console.log(m[0]);    // full match`);
      lines.push(`  console.log(m.index); // position`);
      if (hasNamed) {
        lines.push(`  console.log(m.groups); // named groups object`);
      } else {
        lines.push(`  console.log(m.slice(1)); // numbered groups`);
      }
      lines.push(`}`);
      break;
    case 'replace':
      if (hasNamed) {
        lines.push(`// .replace() with named groups`);
        lines.push(`const result = sample.replace(re, (match, p1, p2, offset, str, groups) => {`);
        lines.push(`  return \`\${groups.yourName} [\${p1}]\`;`);
        lines.push(`});`);
      } else {
        lines.push(`// .replace() with capture groups`);
        lines.push(`const result = sample.replace(re, (match, p1, p2, offset, str) => {`);
        lines.push(`  return \`[\${p1}] (\${p2})\`;`);
        lines.push(`});`);
      }
      break;
    case 'split':
      lines.push(`// .split() — split string on regex matches`);
      lines.push(`const parts = sample.split(re);`);
      lines.push(`console.log(parts); // array of substrings`);
      break;
    case 'exec':
      lines.push(`// Manual exec() loop — full control`);
      lines.push(`let m;`);
      lines.push(`while ((m = re.exec(sample)) !== null) {`);
      lines.push(`  console.log(\`Found "\${m[0]}" at \${m.index}\`);`);
      lines.push(`  if (m.index === re.lastIndex) re.lastIndex++; // avoid zero-width loop`);
      lines.push(`}`);
      break;
  }
  $('#output').innerHTML = highlight(lines.join('\n'));
}

function highlight(code) {
  return code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(\/\/.*$)/gm, '<span class="js-com">$1</span>')
    .replace(/('[^']*'|"[^"]*"|`[^`]*`)/g, '<span class="js-str">$1</span>')
    .replace(/\b(const|let|var|function|return|if|else|for|while|of|new|true|false|null|undefined)\b/g, '<span class="js-kw">$1</span>')
    .replace(/\b(re|sample|matches|m|result|parts|console|RegExp|isMatch)\b/g, '<span class="js-fn">$1</span>');
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const SNIPPETS = [
  { id: 'test', label: '.test()' },
  { id: 'match', label: '.match()' },
  { id: 'matchAll', label: '.matchAll()' },
  { id: 'replace', label: '.replace()' },
  { id: 'split', label: '.split()' },
  { id: 'exec', label: '.exec() loop' },
];

function renderSnippets() {
  $('#snippets').innerHTML = SNIPPETS.map(s =>
    `<button class="${state.snippet === s.id ? 'active' : ''}" onclick="state.snippet='${s.id}';renderSnippets();update()">${s.label}</button>`
  ).join('');
}

function update() {
  runMatch();
  generateCode();
}

$('#pattern').addEventListener('input', update);
$('#sample').addEventListener('input', update);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="update()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#pattern').value='';$('#sample').value='';update()">${t('clear')}</button>`;

$('#lbl-sample').textContent = t('sampleLabel');

function loadExample() {
  $('#pattern').value = '(?<word>\\w+)\\s+(?<num>\\d+)';
  state.flags = new Set(['g']);
  state.snippet = 'matchAll';
  $('#sample').value = 'apple 42 banana 7 cherry 100';
  renderFlags();
  renderSnippets();
  update();
}

renderFlags();
renderSnippets();
update();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔤', href:'/dev/regex-tester.html', name:'Regex Tester'},
    {icon:'📖', href:'/dev/regex-cheatsheet.html', name:'Regex Cheat Sheet'},
    {icon:'🔄', href:'/dev/curl-to-fetch.html', name:'cURL to Fetch'},
    {icon:'📦', href:'/dev/json-to-zod.html', name:'JSON to Zod'},
  ]
});
</script>
