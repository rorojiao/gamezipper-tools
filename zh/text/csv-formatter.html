<script>

    step3: 'Select a format mode: aligned text, HTML table, or minified',

  },
  zh: {
    toolTitle: 'CSV 格式化工具',
    toolDesc: '格式化、对齐和美化 CSV 数据。将杂乱的 CSV 转换为整齐的列对齐文本或 HTML 表格。',
    format: '格式化', delimiter: '分隔符', mode: '模式', aligned: '对齐文本',
    table: 'HTML 表格', minify: '压缩', headerRow: '标题行',
    custom: '自定义', rows: '行', cols: '列',
    validCsv: '✓ CSV 有效', invalidCsv: '✗ CSV 无效',
    step1: '在输入区粘贴 CSV 数据',
    step2: '选择分隔符（逗号、分号、制表符、管道符或自定义）',
    step3: '选择格式模式：对齐文本、HTML 表格或压缩',
    step4: '点击「格式化」并复制美化后的结果',
  }
});

const { $, copyText, t } = GZ;

function getDelimiter() {
  const v = $('#delimSel').value;
  if (v === '\\t') return '\t';
  if (v === 'custom') return $('#customDelim').value || ',';
  return v;
}

// RFC 4180 compliant CSV parser
function parseCSV(text, delim) {
  const rows = [];
  let row = [], field = '', inQuotes = false, i = 0;
  while (i < text.length) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"') {
        if (text[i + 1] === '"') { field += '"'; i += 2; continue; }
        inQuotes = false; i++; continue;
      }
      field += ch; i++; continue;
    }
    if (ch === '"') { inQuotes = true; i++; continue; }
    if (ch === delim) { row.push(field); field = ''; i++; continue; }
    if (ch === '\r') { i++; continue; }
    if (ch === '\n') { row.push(field); rows.push(row); row = []; field = ''; i++; continue; }
    field += ch; i++;
  }
  if (field !== '' || row.length > 0) { row.push(field); rows.push(row); }
  return rows.filter(r => r.length > 0 && !(r.length === 1 && r[0] === ''));
}

function formatAligned(rows) {
  const maxCols = Math.max(...rows.map(r => r.length));
  const widths = [];
  for (let c = 0; c < maxCols; c++) {
    widths[c] = Math.max(...rows.map(r => (r[c] || '').length), 0);
  }
  return rows.map(r => r.map((cell, c) => cell.padEnd(widths[c])).join('  ')).join('\n');
}

function formatTable(rows) {
  if (!rows.length) return '';
  const hasHeader = $('#headerChk').checked;
  let html = '<table class="csv-table">';
  if (hasHeader) {
    html += '<thead><tr>' + rows[0].map(c => `<th>${escHtml(c)}</th>`).join('') + '</tr></thead>';
    html += '<tbody>' + rows.slice(1).map(r => '<tr>' + r.map(c => `<td>${escHtml(c)}</td>`).join('') + '</tr>').join('') + '</tbody>';
  } else {
    html += '<tbody>' + rows.map(r => '<tr>' + r.map(c => `<td>${escHtml(c)}</td>`).join('') + '</tr>').join('') + '</tbody>';
  }
  html += '</table>';
  return html;
}

function formatMinify(rows, delim) {
  return rows.map(r => r.map(c => {
    if (c.includes(delim) || c.includes('"') || c.includes('\n')) return '"' + c.replace(/"/g, '""') + '"';
    return c;
  }).join(delim)).join('\n');
}

function escHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function doFormat() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  const delim = getDelimiter();
  try {
    const rows = parseCSV(inp, delim);
    if (!rows.length) throw new Error('No data found');
    const mode = $('#modeSel').value;
    const out = $('#output');
    if (mode === 'table') {
      out.innerHTML = formatTable(rows);
    } else if (mode === 'minify') {
      out.textContent = formatMinify(rows, delim);
    } else {
      out.textContent = formatAligned(rows);
    }
    const cols = Math.max(...rows.map(r => r.length));
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('validCsv')}: ${rows.length} ${t('rows')}, ${cols} ${t('cols')}</span>`;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidCsv')}: ${e.message}</span>`;
    $('#output').textContent = '';
  }
}

function loadExample() {
  $('#input').value = 'name,age,city,occupation\nAlice,30,"New York, NY",Engineer\nBob,25,"London",Designer\n"Charlie, Jr.",35,"Paris, France","Product Manager"';
  doFormat();
}

function doClear() { $('#input').value=''; $('#output').textContent=''; $('#status').innerHTML=''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doFormat()">✨ ${t('format')}</button>
  <label style="font-size:.85em">${t('delimiter')}:
    <select class="gz-select" id="delimSel" onchange="document.getElementById('customDelim').style.display=this.value==='custom'?'inline-block':'none';doFormat()">
      <option value=",">,</option>
      <option value=";">;</option>
      <option value="\\t">⇥ Tab</option>
      <option value="|">|</option>
      <option value="custom">${t('custom')}</option>
    </select>
    <input type="text" id="customDelim" value=":" style="display:none;width:40px;padding:4px;border:1px solid var(--border);border-radius:6px;background:var(--glass);color:var(--gz-text)">
  </label>
  <label style="font-size:.85em">${t('mode')}:
    <select class="gz-select" id="modeSel" onchange="doFormat()">
      <option value="aligned">${t('aligned')}</option>
      <option value="table">${t('table')}</option>
      <option value="minify">${t('minify')}</option>
    </select>
  </label>
  <label style="display:flex;align-items:center;gap:4px;font-size:.85em"><input type="checkbox" id="headerChk" onchange="doFormat()" checked> ${t('headerRow')}</label>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent||'')">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

</script>
