const { $, t } = GZ;
let results = [];

async function convertFile(file) {
  const url = URL.createObjectURL(file);
  try {
    const img = await new Promise((res, rej) => {
      const i = new Image();
      i.onload = () => res(i);
      i.onerror = () => rej(new Error('BMP decode failed'));
      i.src = url;
    });
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = $('#bg').value;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);
    const quality = parseFloat($('#quality').value);
    const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', quality));
    const outName = file.name.replace(/\.bmp$/i, '') + '.jpg';
    results.push({ name: outName, blob, url: URL.createObjectURL(blob), w: canvas.width, h: canvas.height });
  } catch (e) {
    results.push({ name: file.name, error: e.message });
  } finally {
    URL.revokeObjectURL(url);
  }
}

function renderGrid() {
  const grid = $('#grid');
  grid.innerHTML = '';
  results.forEach((r) => {
    const card = document.createElement('div');
    card.className = 'result-card';
    if (r.error) {
      card.innerHTML = `<div class="thumb" style="color:var(--gz-accent)">⚠️</div><div class="meta"><span>${r.name}</span><span style="color:var(--gz-accent)">${r.error}</span></div>`;
    } else {
      const thumb = document.createElement('div');
      thumb.className = 'thumb';
      const img = document.createElement('img');
      img.src = r.url; img.alt = r.name;
      thumb.appendChild(img);
      card.appendChild(thumb);
      const meta = document.createElement('div');
      meta.className = 'meta';
      const size = (r.blob.size / 1024).toFixed(1) + ' KB';
      meta.innerHTML = `<a href="${r.url}" download="${r.name}">⬇️ ${r.name}</a><span>${r.w}×${r.h} · ${size}</span>`;
      card.appendChild(meta);
    }
    grid.appendChild(card);
  });
  const ok = results.filter(r => !r.error).length;
  $('#status').textContent = results.length ? `${ok} / ${results.length} ${t('converted')}` : '';
  $('#toolbar').style.display = results.some(r => !r.error) ? 'flex' : 'none';
}

async function handleFiles(files) {
  const bmpFiles = Array.from(files).filter(f => /\.bmp$/i.test(f.name) || f.type.includes('bmp'));
  if (!bmpFiles.length) { $('#status').textContent = '⚠️ Please select BMP files.'; return; }
  $('#status').textContent = '⏳ Converting...';
  for (const f of bmpFiles) {
    await convertFile(f);
  }
  renderGrid();
}

function renderToolbar() {
  $('#toolbar').innerHTML = `
    <button class="gz-btn" id="dl-zip">${t('downloadAll')}</button>
    <button class="gz-btn gz-btn-secondary" id="clear-btn">${t('clear')}</button>`;
  $('#dl-zip').onclick = downloadZip;
  $('#clear-btn').onclick = () => {
    results.forEach(r => r.url && URL.revokeObjectURL(r.url));
    results = []; renderGrid(); $('#status').textContent=''; $('#file-input').value='';
  };
}

async function downloadZip() {
  const good = results.filter(r => !r.error);
  if (!good.length) return;
  const files = good.map(r => ({ name: r.name, data: new Uint8Array() }));
  for (let i = 0; i < good.length; i++) {
    files[i].data = new Uint8Array(await good[i].blob.arrayBuffer());
  }
  const zip = buildZip(files);
  const blob = new Blob([zip], { type: 'application/zip' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'bmp-to-jpg.zip';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}
function buildZip(files) {
  const crcTable = (() => { const t = new Uint32Array(256); for (let i=0;i<256;i++){let c=i;for(let k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[i]=c>>>0;} return t; })();
  function crc32(buf){let c=0xFFFFFFFF;for(let i=0;i<buf.length;i++)c=crcTable[(c^buf[i])&0xFF]^(c>>>8);return(c^0xFFFFFFFF)>>>0;}
  function str(s){return new TextEncoder().encode(s);}
  function u16(n){return[n&0xff,(n>>>8)&0xff];}
  function u32(n){return[n&0xff,(n>>>8)&0xff,(n>>>16)&0xff,(n>>>24)&0xff];}
  const chunks=[];const central=[];let offset=0;
  for(const f of files){
    const name=str(f.name);const crc=crc32(f.data);
    const local=[].concat(u32(0x04034b50),u16(20),u16(0x0800),u16(0),u16(0),u16(0),u32(crc),u32(f.data.length),u32(f.data.length),u16(name.length),u16(0),Array.from(name),Array.from(f.data));
    central.push([].concat(u32(0x02014b50),u16(20),u16(20),u16(0x0800),u16(0),u16(0),u16(0),u32(crc),u32(f.data.length),u32(f.data.length),u16(name.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset),Array.from(name)));
    chunks.push(new Uint8Array(local));offset+=local.length;
  }
  const eocd=[].concat(u32(0x06054b50),u16(0),u16(0),u16(files.length),u16(files.length),u32(0),u32(offset),u16(0));
  const total=chunks.reduce((s,c)=>s+c.length,0)+central.reduce((s,c)=>s+c.length,0)+eocd.length;
  const out=new Uint8Array(total);let p=0;
  for(const c of chunks){out.set(c,p);p+=c.length;}
  for(const c of central){out.set(new Uint8Array(c),p);p+=c.length;}
  out.set(new Uint8Array(eocd),p);
  return out;
}

const dropArea = $('#drop-area');
dropArea.addEventListener('click', () => $('#file-input').click());
dropArea.addEventListener('dragover', (e) => { e.preventDefault(); dropArea.classList.add('drag'); });
dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag'));
dropArea.addEventListener('drop', (e) => {
  e.preventDefault();
  dropArea.classList.remove('drag');
  if (e.dataTransfer.files.length) { renderToolbar(); handleFiles(e.dataTransfer.files); }
});
$('#file-input').addEventListener('change', (e) => {
  if (e.target.files.length) { renderToolbar(); handleFiles(e.target.files); }
});

</script>
