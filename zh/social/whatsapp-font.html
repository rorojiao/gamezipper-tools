function conv(map, s){ return [...s].map(c => map[c] || c).join(''); }

// WhatsApp-native markup helpers (symbol-based, parsed by WhatsApp)
function nativeBold(s){ return '*' + s + '*'; }
function nativeItalic(s){ return '_' + s + '_'; }
function nativeStrike(s){ return '~' + s + '~'; }
function nativeMono(s){ return '```' + s + '```'; }

  STYLES.forEach(st => {
    const out = st.fn(text);
    const row = document.createElement('div');
    row.className = 'style-row';
    row.innerHTML = `<span class="sample">${out.replace(/</g,'&lt;')}</span><span class="label">${st.name}</span><span class="cp">📋 copy</span>`;
    row.onclick = () => { copyText(out); };
    list.appendChild(row);
  });
}
