<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a changelog?", "acceptedAnswer": {"@type": "Answer", "text": "A changelog is a file that contains a curated, chronologically ordered list of notable changes for a project. It helps users and contributors understand what has changed between versions."}}, {"@type": "Question", "name": "What format should a changelog use?", "acceptedAnswer": {"@type": "Answer", "text": "The most popular format is 'Keep a Changelog' which organizes changes into categories: Added, Changed, Deprecated, Removed, Fixed, and Security. This tool supports that format and more."}}, {"@type": "Question", "name": "How is a changelog different from a git log?", "acceptedAnswer": {"@type": "Answer", "text": "A git log is a raw history of all commits. A changelog is a curated, human-readable summary of notable changes meant for end users. It focuses on what matters, not every commit message."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-form" id="form-top"></div>
    <div id="sections-container"></div>
    <div class="gz-tab-bar" id="format-tabs"></div>
    <div class="gz-output-markdown" id="output"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Changelog Generator',
    toolDesc: 'Generate professional changelogs and release notes. Supports Keep a Changelog format, Markdown, JSON and more.',
    generate: 'Generate Changelog',
    copy: 'Copy',
    clear: 'Clear',
    download: 'Download .md',
    projectName: 'Project Name',
    version: 'Version',
    releaseDate: 'Release Date',
    format: 'Output Format',
    fmtMarkdown: 'Markdown',
    fmtJson: 'JSON',
    fmtKeepAChangelog: 'Keep a Changelog',
    sectionAdded: '🆕 Added',
    sectionChanged: '🔄 Changed',
    sectionDeprecated: '⚠️ Deprecated',
    sectionRemoved: '🗑️ Removed',
    sectionFixed: '🐛 Fixed',
    sectionSecurity: '🔒 Security',
    addSection: '+ Add Custom Section',
    sectionName: 'Section Name',
    addItem: '+ Add Item',
    itemPlaceholder: 'Describe the change...',
    removeItem: '✕',
    step1: 'Enter your project name, version number, and release date',
    step2: 'Add changes to relevant sections (Added, Fixed, Changed, etc.)',
    step3: 'Choose your preferred output format (Markdown, JSON, Keep a Changelog)',
    step4: 'Click Generate and copy or download the changelog',
  },
  zh: {
    toolTitle: '更新日志生成器',
    toolDesc: '生成专业的更新日志和发布说明，支持 Keep a Changelog 格式、Markdown、JSON 等多种输出。',
    generate: '生成更新日志',
    copy: '复制',
    clear: '清除',
    download: '下载 .md',
    projectName: '项目名称',
    version: '版本号',
    releaseDate: '发布日期',
    format: '输出格式',
    fmtMarkdown: 'Markdown',
    fmtJson: 'JSON',
    fmtKeepAChangelog: 'Keep a Changelog',
    sectionAdded: '🆕 新增',
    sectionChanged: '🔄 变更',
    sectionDeprecated: '⚠️ 废弃',
    sectionRemoved: '🗑️ 移除',
    sectionFixed: '🐛 修复',
    sectionSecurity: '🔒 安全',
    addSection: '+ 添加自定义分类',
    sectionName: '分类名称',
    addItem: '+ 添加条目',
    itemPlaceholder: '描述变更内容...',
    removeItem: '✕',
    step1: '输入项目名称、版本号和发布日期',
    step2: '在相关分类中添加变更条目（新增、修复、变更等）',
    step3: '选择偏好的输出格式（Markdown、JSON、Keep a Changelog）',
    step4: '点击生成并复制或下载更新日志',
  }
});

const { $, copyText, t } = GZ;

const defaultSections = [
  { key: 'sectionAdded', icon: '🆕', nameEn: 'Added', nameZh: '新增' },
  { key: 'sectionChanged', icon: '🔄', nameEn: 'Changed', nameZh: '变更' },
  { key: 'sectionDeprecated', icon: '⚠️', nameEn: 'Deprecated', nameZh: '废弃' },
  { key: 'sectionRemoved', icon: '🗑️', nameEn: 'Removed', nameZh: '移除' },
  { key: 'sectionFixed', icon: '🐛', nameEn: 'Fixed', nameZh: '修复' },
  { key: 'sectionSecurity', icon: '🔒', nameEn: 'Security', nameZh: '安全' },
];

let sections = defaultSections.map(s => ({ ...s, items: [''] }));
let outputFormat = 'markdown';

$('#form-top').innerHTML = `
  <div class="gz-row">
    <div><label>${t('projectName')}</label><input type="text" id="inp-project" placeholder="My Project"></div>
    <div><label>${t('version')}</label><input type="text" id="inp-version" placeholder="1.0.0"></div>
  </div>
  <div class="gz-row">
    <div><label>${t('releaseDate')}</label><input type="date" id="inp-date"></div>
    <div><label>${t('format')}</label>
      <select id="inp-format">
        <option value="markdown">${t('fmtMarkdown')}</option>
        <option value="keepachangelog">${t('fmtKeepAChangelog')}</option>
        <option value="json">${t('fmtJson')}</option>
      </select>
    </div>
  </div>
`;

function renderSections() {
  const lang = GZI18n.getLang ? GZI18n.getLang() : 'en';
  $('#sections-container').innerHTML = sections.map((s, si) => {
    const sectionName = s.key ? t(s.key) : (lang === 'zh' ? s.nameZh : s.nameEn);
    return `<div class="gz-section-add">
      <div class="gz-section-header"><span>${sectionName}</span></div>
      ${s.items.map((item, ii) => `<div class="gz-item-row">
        <input type="text" value="${item.replace(/"/g,'&quot;')}" placeholder="${t('itemPlaceholder')}" oninput="sections[${si}].items[${ii}]=this.value">
        <button onclick="sections[${si}].items.splice(${ii},1);renderSections()">${t('removeItem')}</button>
      </div>`).join('')}
      <button class="gz-add-section-btn" onclick="sections[${si}].items.push('');renderSections()">${t('addItem')}</button>
    </div>`;
  }).join('') + `<button class="gz-add-section-btn" onclick="addCustomSection()">${t('addSection')}</button>`;
}

function addCustomSection() {
  const name = prompt(t('sectionName'));
  if (!name) return;
  sections.push({ key: '', nameEn: name, nameZh: name, items: [''] });
  renderSections();
}

function generateChangelog() {
  const project = $('#inp-project').value || 'Project';
  const version = $('#inp-version').value || '1.0.0';
  const date = $('#inp-date').value || new Date().toISOString().split('T')[0];
  const fmt = $('#inp-format').value;

  const filled = sections.filter(s => s.items.some(i => i.trim()));

  if (fmt === 'json') {
    const obj = {
      project,
      version,
      date,
      changes: {}
    };
    filled.forEach(s => {
      const key = s.nameEn || s.key;
      obj.changes[key] = s.items.filter(i => i.trim());
    });
    $('#output').textContent = JSON.stringify(obj, null, 2);
  } else if (fmt === 'keepachangelog') {
    let md = `# Changelog\n\nAll notable changes to ${project} will be documented in this file.\n\n`;
    md += `## [${version}] - ${date}\n\n`;
    filled.forEach(s => {
      const name = s.nameEn || s.key;
      md += `### ${name}\n\n`;
      s.items.filter(i => i.trim()).forEach(i => { md += `- ${i.trim()}\n`; });
      md += '\n';
    });
    $('#output').textContent = md;
  } else {
    let md = `# ${project} v${version} (${date})\n\n`;
    filled.forEach(s => {
      const name = s.nameEn || s.key;
      md += `## ${name}\n\n`;
      s.items.filter(i => i.trim()).forEach(i => { md += `- ${i.trim()}\n`; });
      md += '\n';
    });
    $('#output').textContent = md;
  }
}

function downloadMD() {
  const text = $('#output').textContent;
  if (!text) return;
  const blob = new Blob([text], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'CHANGELOG.md';
  a.click();
  URL.revokeObjectURL(a.href);
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generateChangelog()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadMD()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#output').textContent=''">${t('clear')}</button>
`;

renderSections();

// Set today's date
$('#inp-date').value = new Date().toISOString().split('T')[0];

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'📝', href:'/text/markdown.html', name:'Markdown Preview'},
    {icon:'📦', href:'/dev/gitignore-generator.html', name:'Gitignore Generator'},
    {icon:'🔀', href:'/dev/git-branch-generator.html', name:'Git Branch Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
