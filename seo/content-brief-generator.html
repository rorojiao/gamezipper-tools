<script>

    lblWordcount: 'Target Word Count',
    lblMeta: 'Suggested Meta Description',
    lblCompetitors: 'Top Competitor URLs (one per line)',
    lblInternal: 'Internal Links to Include (one per line)',
    lblCta: 'Call to Action',
    lblNotes: 'Additional Notes',
    lblPreview: 'Generated Brief',
    copyMd: 'Copy Markdown',
    copyHtml: 'Copy HTML',
    step1: 'Fill in the target keyword, title, and search intent',
    step2: 'Define secondary keywords, audience and tone of voice',
    step3: 'Add competitor URLs, internal links and special notes',

  },
  zh: {

    toolDesc: '为撰稿人创建结构化的 SEO 内容简报 — 定义关键词、大纲、语调、竞品并导出可用的简报。',
    lblTitle: '目标标题 / 主题',
    lblUrl: '目标 URL（可选）',
    lblPrimary: '主关键词',
    lblSecondary: '次要关键词（每行一个）',
    lblIntent: '搜索意图',
    lblAudience: '目标受众',
    lblTone: '语气风格',
    lblWordcount: '目标字数',
    lblMeta: '建议 Meta 描述',
    lblCompetitors: '竞品 URL（每行一个）',
    lblInternal: '内链列表（每行一个）',
    lblCta: '行动号召（CTA）',
    lblNotes: '附加说明',
    lblPreview: '生成的简报',
    copyMd: '复制 Markdown',
    copyHtml: '复制 HTML',
    step1: '填写目标关键词、标题和搜索意图',
    step2: '定义次要关键词、目标受众和语气风格',
    step3: '添加竞品 URL、内链和特别说明',
    step4: '将生成的内容简报复制为 Markdown 或 HTML',
  }
});

const { $, copyText, t } = GZ;

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function nl2br(s) { return esc(s).replace(/\n/g,'<br>'); }

function render() {
  const title = $('#f-title').value;
  const url = $('#f-url').value;
  const primary = $('#f-primary').value;
  const secondary = $('#f-secondary').value;
  const intent = $('#f-intent').value;
  const audience = $('#f-audience').value;
  const tone = $('#f-tone').value;
  const wordcount = $('#f-wordcount').value;
  const meta = $('#f-meta').value;
  const competitors = $('#f-competitors').value;
  const internal = $('#f-internal').value;
  const cta = $('#f-cta').value;
  const notes = $('#f-notes').value;

  const secKeywords = secondary.split('\n').filter(l=>l.trim()).map(k=>`<span class="keyword-tag">${esc(k.trim())}</span>`).join(' ');
  const compLinks = competitors.split('\n').filter(l=>l.trim()).map(l=>`<div style="margin:2px 0"><a href="${esc(l.trim())}" target="_blank" style="color:var(--gz-accent);font-size:.85em">${esc(l.trim())}</a></div>`).join('');
  const intLinks = internal.split('\n').filter(l=>l.trim()).map(l=>`<code style="font-size:.8em;display:block;margin:2px 0">${esc(l.trim())}</code>`).join('');

  const today = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

  const html = `
    <h2>📋 Content Brief</h2>
    <div class="meta-row"><span class="meta-label">Date:</span><span class="meta-value">${today}</span></div>
    <div class="meta-row"><span class="meta-label">Title:</span><span class="meta-value">${esc(title)}</span></div>
    ${url ? `<div class="meta-row"><span class="meta-label">URL:</span><span class="meta-value"><code>${esc(url)}</code></span></div>` : ''}
    <div class="meta-row"><span class="meta-label">Word Count:</span><span class="meta-value">${esc(wordcount)} words</span></div>
    <div class="meta-row"><span class="meta-label">Search Intent:</span><span class="meta-value">${esc(intent)}</span></div>
    <div class="meta-row"><span class="meta-label">Tone:</span><span class="meta-value">${esc(tone)}</span></div>
    <div class="meta-row"><span class="meta-label">Audience:</span><span class="meta-value">${esc(audience)}</span></div>

    <h3>🎯 Target Keywords</h3>
    <div style="margin:6px 0"><strong>Primary:</strong> <span class="keyword-tag" style="background:rgba(78,205,196,.25);font-weight:600">${esc(primary)}</span></div>
    ${secKeywords ? `<div style="margin:6px 0"><strong>Secondary:</strong><br>${secKeywords}</div>` : ''}

    <h3>📝 Meta Description</h3>
    <p style="font-size:.85em;color:var(--text2)">${esc(meta)} <span style="font-size:.75em">(${meta.length} chars)</span></p>

    ${compLinks ? `<h3>🔍 Competitor References</h3>${compLinks}` : ''}
    ${intLinks ? `<h3>🔗 Internal Links</h3>${intLinks}` : ''}

    <h3>📢 Call to Action</h3>
    <p>${esc(cta)}</p>

    ${notes ? `<h3>📌 Additional Notes</h3><p style="font-size:.85em">${nl2br(notes)}</p>` : ''}
  `;
  $('#preview').innerHTML = html;
}

function getMarkdown() {
  const title = $('#f-title').value;
  const url = $('#f-url').value;
  const primary = $('#f-primary').value;
  const secondary = $('#f-secondary').value;
  const intent = $('#f-intent').value;
  const audience = $('#f-audience').value;
  const tone = $('#f-tone').value;
  const wordcount = $('#f-wordcount').value;
  const meta = $('#f-meta').value;
  const competitors = $('#f-competitors').value;
  const internal = $('#f-internal').value;
  const cta = $('#f-cta').value;
  const notes = $('#f-notes').value;
  const today = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

  let md = `# Content Brief\n`;
  md += `**Date:** ${today}\n`;
  md += `**Title:** ${title}\n`;
  if (url) md += `**URL:** ${url}\n`;
  md += `**Word Count:** ${wordcount}\n`;
  md += `**Search Intent:** ${intent}\n`;
  md += `**Tone:** ${tone}\n`;
  md += `**Audience:** ${audience}\n\n`;
  md += `## Target Keywords\n\n`;
  md += `**Primary:** ${primary}\n\n`;
  if (secondary.trim()) {
    md += `**Secondary:**\n`;
    secondary.split('\n').filter(l=>l.trim()).forEach(k => md += `- ${k.trim()}\n`);
    md += '\n';
  }
  md += `## Meta Description\n${meta} (${meta.length} chars)\n\n`;
  if (competitors.trim()) {
    md += `## Competitor References\n`;
    competitors.split('\n').filter(l=>l.trim()).forEach(l => md += `- ${l.trim()}\n`);
    md += '\n';
  }
  if (internal.trim()) {
    md += `## Internal Links\n`;
    internal.split('\n').filter(l=>l.trim()).forEach(l => md += `- ${l.trim()}\n`);
    md += '\n';
  }
  md += `## Call to Action\n${cta}\n\n`;
  if (notes.trim()) md += `## Additional Notes\n${notes}\n`;
  return md;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText(getMarkdown())">${t('copyMd')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#preview').innerHTML)">${t('copyHtml')}</button>`;

// Labels
$('#lbl-title').textContent = t('lblTitle');
$('#lbl-url').textContent = t('lblUrl');
$('#lbl-primary').textContent = t('lblPrimary');
$('#lbl-secondary').textContent = t('lblSecondary');
$('#lbl-intent').textContent = t('lblIntent');
$('#lbl-audience').textContent = t('lblAudience');
$('#lbl-tone').textContent = t('lblTone');
$('#lbl-wordcount').textContent = t('lblWordcount');
$('#lbl-meta').textContent = t('lblMeta');
$('#lbl-competitors').textContent = t('lblCompetitors');
$('#lbl-internal').textContent = t('lblInternal');
$('#lbl-cta').textContent = t('lblCta');
$('#lbl-notes').textContent = t('lblNotes');
$('#lbl-preview').textContent = t('lblPreview');

render();

GZ.renderToolPage({
  category: 'seo',
  titleKey: 'toolTitle',

    {icon:'🔍', href:'/seo/schema-generator.html', name:'Schema Generator'},
  ]
});
</script>
