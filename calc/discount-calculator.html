.dc-card label{display:block;font-size:.8rem;margin-bottom:6px;color:var(--text2);font-weight:600}
.dc-card input,.dc-card select{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--glass2);color:var(--text);font-size:1rem;font-family:inherit;margin-bottom:12px}

.dc-preset{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--glass2);color:var(--text2);cursor:pointer;font-size:.9rem;font-weight:600;transition:all .15s}
.dc-preset:hover{border-color:var(--accent);color:var(--accent)}

.dc-result-row.total{background:rgba(78,205,196,.12);border:1px solid var(--accent);font-weight:700;font-size:1.1rem}
.dc-result-row .val{font-weight:700;color:var(--accent)}
.dc-savings{text-align:center;margin-top:14px;padding:16px;border-radius:12px;background:rgba(78,205,196,.08)}
.dc-savings .big{font-size:2rem;font-weight:900;color:var(--success)}

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate a discount?", "acceptedAnswer": {"@type": "Answer", "text": "To calculate a percentage discount: Discount Amount = Original Price × (Discount% / 100), and Final Price = Original Price - Discount Amount. For example, 30% off a $80 item: discount = $24, final price = $56."}}, {"@type": "Question", "name": "How do stacked discounts work?", "acceptedAnswer": {"@type": "Answer", "text": "Stacked discounts are applied sequentially, not additively. For example, 20% off then 10% off on a $100 item: first discount gives $80, second gives $72. The combined discount is 28%, not 30%, because the second discount applies to the already-reduced price."}}, {"@type": "Question", "name": "How do I calculate the original price from a discounted price?", "acceptedAnswer": {"@type": "Answer", "text": "Original Price = Discounted Price / (1 - Discount% / 100). For example, if you paid $56 after a 30% discount: Original = $56 / 0.70 = $80."}}, {"@type": "Question", "name": "What is the difference between discount and markup?", "acceptedAnswer": {"@type": "Answer", "text": "A discount reduces the price (you pay less), while a markup increases it (you pay more). Both are calculated as a percentage. Discount is usually expressed relative to the original price, while markup is expressed relative to the cost."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="dc-grid">
      <div class="dc-card">
        <label id="lbl-original"></label>
        <input type="number" id="original" value="80.00" min="0" step="0.01">
        <label id="lbl-discount"></label>
        <div class="dc-presets" id="presets"></div>
        <input type="number" id="discountPct" value="30" min="0" step="1" placeholder="%">
      </div>
      <div class="dc-card">
        <label id="lbl-type"></label>
        <select id="discountType">
          <option value="percent" id="opt-percent"></option>
          <option value="fixed" id="opt-fixed"></option>
        </select>
        <label id="lbl-currency"></label>
        <select id="currency">
          <option value="$">$ USD</option>
          <option value="€">€ EUR</option>
          <option value="£">£ GBP</option>
          <option value="¥">¥ CNY/JPY</option>
          <option value="₹">₹ INR</option>
          <option value="A$">A$ AUD</option>
        </select>
        <label id="lbl-stack"></label>
        <div id="stackArea" style="display:none"></div>
      </div>
    </div>
    <div id="output"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Discount Calculator',
    toolDesc: 'Calculate the final price after a percentage or fixed discount. Stack multiple discounts and see exactly how much you save — free and browser-only.',
    calculate: 'Calculate', reset: 'Reset', addLayer: '+ Add discount layer',
    lblOriginal: 'Original Price', lblDiscount: 'Discount', lblType: 'Discount Type',
    lblCurrency: 'Currency Symbol', lblStack: 'Stacked Discounts (optional)',
    optPercent: 'Percentage off (%)', optFixed: 'Fixed amount off',
    originalPrice: 'Original Price', discountAmount: 'You Save', finalPrice: 'Final Price',
    addStack: 'Stack another discount',
    step1: 'Enter the original price of the item',
    step2: 'Choose percentage or fixed discount type',
    step3: 'Enter the discount value or pick a preset',
    step4: 'See the final price and your total savings',
  },
  zh: {
    toolTitle: '折扣计算器',
    toolDesc: '计算百分比或固定折扣后的最终价格。叠加多个折扣，清楚查看节省金额 — 免费且浏览器本地运行。',
    calculate: '计算', reset: '重置', addLayer: '+ 添加折扣层',
    lblOriginal: '原价', lblDiscount: '折扣', lblType: '折扣类型',
    lblCurrency: '货币符号', lblStack: '叠加折扣（可选）',
    optPercent: '百分比折扣（%）', optFixed: '固定金额减免',
    originalPrice: '原价', discountAmount: '节省金额', finalPrice: '最终价格',
    addStack: '再叠加一个折扣',
    step1: '输入商品原价',
    step2: '选择百分比折扣或固定金额折扣',
    step3: '输入折扣值或选择预设',
    step4: '查看最终价格和总节省金额',
  }
});

const { $, t } = GZ;
const PRESETS = [10, 15, 20, 25, 30, 40, 50, 70];
let stackLayers = [];

function num(id){ return parseFloat($(id).value) || 0; }

function buildPresets(){
  $('#presets').innerHTML = PRESETS.map(p =>
    `<span class="dc-preset" data-pct="${p}" onclick="setPreset(${p})">${p}%</span>`
  ).join('');
}

function setPreset(pct){
  $('#discountType').value = 'percent';
  $('#discountPct').value = pct;
  document.querySelectorAll('.dc-preset').forEach(el => {
    el.classList.toggle('active', +el.dataset.pct === pct);
  });
  calculate();
}

function toggleStack(){
  const visible = $('#stackArea').style.display !== 'none';
  $('#stackArea').style.display = visible ? 'none' : 'block';
  if(!visible) addLayer();
}

function addLayer(){
  stackLayers.push(10);
  renderStack();
  calculate();
}

function removeLayer(i){
  stackLayers.splice(i, 1);
  renderStack();
  calculate();
}

function updateLayer(i, val){
  stackLayers[i] = parseFloat(val) || 0;
  calculate();
}

function renderStack(){
  $('#stackArea').innerHTML = stackLayers.map((v, i) =>
    `<div class="dc-stack-item"><input type="number" value="${v}" min="0" step="0.5" oninput="updateLayer(${i},this.value)" placeholder="%"><span>%</span><button onclick="removeLayer(${i})">✕</button></div>`
  ).join('') + `<button class="gz-btn gz-btn-secondary" style="margin-top:4px" onclick="addLayer()">${t('addLayer')}</button>`;
}

function calculate(){
  const original = num('original');
  const type = $('#discountType').value;
  const cur = $('#currency').value;
  const fmt = n => cur + (Math.round(n * 100) / 100).toFixed(2);

  let discount;
  if(type === 'percent'){
    discount = original * (num('discountPct') / 100);
  } else {
    discount = num('discountPct');
  }
  let price = Math.max(0, original - discount);

  let stackRows = '';
  stackLayers.forEach((pct, i) => {
    const d = price * (pct / 100);
    price = Math.max(0, price - d);
    stackRows += `<div class="dc-result-row"><span>${t('discountAmount')} #${i+2} (${pct}%)</span><span>-${fmt(d)}</span></div>`;
  });

  const totalSaved = original - price;

  $('#output').innerHTML = `
    <div class="dc-results">
      <h3>${t('finalPrice')}</h3>
      <div class="dc-result-row"><span>${t('originalPrice')}</span><span>${fmt(original)}</span></div>
      <div class="dc-result-row"><span>${t('discountAmount')}${type === 'percent' ? ' (' + num('discountPct') + '%)' : ''}</span><span>-${fmt(discount)}</span></div>
      ${stackRows}
      <div class="dc-result-row total"><span>${t('finalPrice')}</span><span class="val">${fmt(price)}</span></div>
      <div class="dc-savings">
        <div class="big">${fmt(totalSaved)}</div>
        <div class="lbl">${t('discountAmount')}</div>
      </div>
    </div>`;
}

function reset(){
  $('#original').value = '80.00';
  $('#discountType').value = 'percent';
  $('#discountPct').value = '30';
  $('#currency').value = '$';
  stackLayers = [];
  $('#stackArea').style.display = 'none';
  renderStack();
  setPreset(30);
}

$('#discountType').addEventListener('change', () => {
  $('#presets').style.display = $('#discountType').value === 'percent' ? 'flex' : 'none';
  calculate();
});
['original','discountPct','currency'].forEach(id => {
  $('#'+id).addEventListener('input', calculate);
  $('#'+id).addEventListener('change', calculate);
});

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="calculate()">${t('calculate')}</button><button class="gz-btn gz-btn-secondary" onclick="toggleStack()">${t('addStack')}</button><button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;

buildPresets();
setPreset(30);

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏷️', href:'/calc/markup-calculator.html', name:'Markup Calculator'},
    {icon:'💵', href:'/calc/profit-margin-calculator.html', name:'Profit Margin'},
    {icon:'💰', href:'/calc/sales-tax-calculator.html', name:'Sales Tax Calculator'},
    {icon:' diner', href:'/calc/tip-calculator.html', name:'Tip Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
