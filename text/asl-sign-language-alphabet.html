  'Z': '<path d="M25 25 L48 25 L25 50 L48 50" fill="none" stroke="#4ecdc4" stroke-width="3"/>',
};

const LETTER_NAMES_EN = {A:'A',B:'B',C:'C',D:'D',E:'E',F:'F',G:'G',H:'H',I:'I',J:'J',K:'K',L:'L',M:'M',N:'N',O:'O',P:'P',Q:'Q',R:'R',S:'S',T:'T',U:'U',V:'V',W:'W',X:'X',Y:'Y',Z:'Z'};

function makeCard(letter) {
  if (/[A-Za-z]/.test(letter)) {
    const up = letter.toUpperCase();
    const svg = HAND_SVGS[up] || '';
    return `<div class="asl-card"><div class="asl-letter">${up}</div><svg class="asl-svg" viewBox="0 0 70 70" xmlns="http://www.w3.org/2000/svg">${svg}</svg><div class="asl-name">${t('letterName')} ${up}</div></div>`;
  } else if (letter === ' ') {
    return `<div class="asl-card" style="min-width:30px;background:transparent;border:none"><div class="asl-letter" style="color:var(--text3)">␣</div></div>`;
  } else {
    return `<div class="asl-card" style="opacity:.5"><div class="asl-letter">${letter.replace(/</g,'&lt;')}</div><div class="asl-name">${t('nonAlpha')}</div></div>`;
  }
}

let showFull = false;

function translate() {
  const input = $('#input').value;
  const result = $('#result');
  if (!input) {
    if (!showFull) { result.innerHTML = ''; return; }
  }
  if (showFull) {
    result.innerHTML = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(makeCard).join('');
    return;
  }
  const chars = [...input].slice(0, 100);
  result.innerHTML = chars.map(makeCard).join('') || '';
}

function toggleFull() {
  showFull = !showFull;
  translate();
}

$('#input').placeholder = t('ph');
$('#input').addEventListener('input', () => { showFull = false; translate(); });

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';showFull=false;translate()">${t('clear')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='HELLO';showFull=false;translate()">${t('example')}</button>
  <button class="gz-btn" id="full-btn" onclick="toggleFull()">${t('fullAlphabet')}</button>`;

// Update toggle button label
const origToggle = toggleFull;
window.toggleFull = function() { origToggle(); $('#full-btn').textContent = showFull ? t('hideAlphabet') : t('fullAlphabet'); };

translate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
