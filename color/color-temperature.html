const { $, copyText, t } = GZ;

// Tanner Helland algorithm
function kelvinToRGB(kelvin) {
  const temp = kelvin / 100;
  let r, g, b;
  if (temp <= 66) {
    r = 255;
    g = 99.4708025861 * Math.log(temp) - 161.1195681661;
    if (temp <= 19) b = 0;
    else b = 138.5177312231 * Math.log(temp - 10) - 305.0447927307;
  } else {
    r = 329.698727446 * Math.pow(temp - 60, -0.1332047592);
    g = 288.1221695283 * Math.pow(temp - 60, -0.0755148492);
    b = 255;
  }
  r = Math.max(0, Math.min(255, Math.round(r)));
  g = Math.max(0, Math.min(255, Math.round(g)));
  b = Math.max(0, Math.min(255, Math.round(b)));
  return { r, g, b };
}

function rgbToHex(r, g, b) {
  return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
}

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      case b: h = ((r - g) / d + 4) / 6; break;
    }
  }
  return `hsl(${Math.round(h * 360)}, ${Math.round(s * 100)}%, ${Math.round(l * 100)}%)`;
}

const PRESETS = [
  {k:1000,name:{en:'Candle Flame',zh:'烛光'}},
  {k:1500,name:{en:'Match Flame',zh:'火柴火焰'}},
  {k:2000,name:{en:'Sunset/Sunrise',zh:'日出日落'}},
  {k:2700,name:{en:'Incandescent Lamp',zh:'白炽灯'}},
  {k:3000,name:{en:'Warm White LED',zh:'暖白 LED'}},
  {k:3200,name:{en:'Halogen Lamp',zh:'卤素灯'}},
  {k:3500,name:{en:'Morning/Evening Sun',zh:'晨光/暮光'}},
  {k:4000,name:{en:'Moonlight',zh:'月光'}},
  {k:4500,name:{en:'Cool White Fluorescent',zh:'冷白荧光灯'}},
  {k:5000,name:{en:'Horizon Daylight',zh:'地平线日光'}},
  {k:5500,name:{en:'Noon Daylight',zh:'正午日光'}},
  {k:6500,name:{en:'Daylight (Overcast)',zh:'阴天日光'}},
  {k:7500,name:{en:'Overcast Sky',zh:'阴天'}},
  {k:10000,name:{en:'Blue Sky',zh:'蓝天'}},
  {k:20000,name:{en:'Deep Blue Sky',zh:'深蓝天'}},
];

const lang = GZI18n.getLang();

$('#lbl-presets').textContent = t('lblPresets');

$('#presets').innerHTML = PRESETS.map(p => {
  const rgb = kelvinToRGB(p.k);
  const hex = rgbToHex(rgb.r, rgb.g, rgb.b);
  const name = lang === 'zh' ? p.name.zh : p.name.en;
  return `<button class="preset-chip" onclick="setKelvin(${p.k})"><span class="preset-swatch" style="background:${hex}"></span><span>${name} (${p.k}K)</span></button>`;
}).join('');

function update() {
  const k = parseInt($('#kelvinSlider').value);
  const rgb = kelvinToRGB(k);
  const hex = rgbToHex(rgb.r, rgb.g, rgb.b);
  const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);

  $('#kelvinVal').textContent = k + ' K';
  $('#colorPreview').style.background = hex;
  $('#hexVal').textContent = hex;
  $('#rgbVal').textContent = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
  $('#hslVal').textContent = hsl;
  $('#kVal').textContent = k + 'K';
}

$('#kelvinSlider').addEventListener('input', update);

window.setKelvin = function(k) {
  $('#kelvinSlider').value = k;
  update();
};

update();
