<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Security Headers Checker","description":"Analyze security headers for any URL. Check CSP, HSTS, X-Frame-Options, XSS Protection and more with a security score.","url": "https://tools.gamezipper.com/zh/dev/security-headers.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What are HTTP security headers?", "acceptedAnswer": {"@type": "Answer", "text": "Security headers are HTTP response headers that instruct the browser to enable built-in security mechanisms, such as preventing XSS attacks, clickjacking, and enforcing HTTPS."}}, {"@type": "Question", "name": "What is a good security header score?", "acceptedAnswer": {"@type": "Answer", "text": "A score of A or A+ means your site has comprehensive security headers. Most production sites should aim for at least a B grade."}}, {"@type": "Question", "name": "Which security headers are most important?", "acceptedAnswer": {"@type": "Answer", "text": "The most critical headers are Content-Security-Policy, Strict-Transport-Security, X-Content-Type-Options, and X-Frame-Options. These prevent XSS, MITM attacks, MIME sniffing and clickjacking."}}, {"@type": "Question", "name": "Can security headers be set via meta tags?", "acceptedAnswer": {"@type": "Answer", "text": "Only Content-Security-Policy can be set via a meta tag. All other security headers must be set by the server as HTTP response headers."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div style="display:flex;gap:8px;margin-bottom:1rem">
      <input type="text" id="url-input" placeholder="https://example.com" style="flex:1;padding:10px 14px;background:var(--input-bg);color:var(--text);border:1px solid var(--border);border-radius:10px;font-size:.9rem">
    </div>
    <div id="score-area"></div>
    <div id="results"></div>
    <div id="recommendations"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Security Headers Checker',
    toolDesc: 'Analyze security headers for any URL and get a security score with improvement tips.',
    check: 'Check Headers',
    checking: 'Checking...',
    copyReport: 'Copy Report',
    example: 'Example',
    step1: 'Enter a website URL to check',
    step2: 'Click "Check Headers" to analyze security headers',
    step3: 'Review the security score and individual header results',
    step4: 'Follow recommendations to improve your security posture',
    present: 'Present',
    missing: 'Missing',
    warning: 'Warning',
    recommendation: 'Recommendation',
    scoreLabel: 'Security Score',
    grade: 'Grade',
    error: 'Could not fetch headers. CORS may block this request — try our HTTP Headers Checker as an alternative.',
    securityHeaders: 'Security Headers Analysis',
  },
  zh: {
    toolTitle: '安全响应头检查器',
    toolDesc: '分析任意 URL 的安全响应头，获取安全评分和改进建议。',
    check: '检查响应头',
    checking: '检查中...',
    copyReport: '复制报告',
    example: '示例',
    step1: '输入要检查的网站 URL',
    step2: '点击「检查响应头」分析安全头',
    step3: '查看安全评分和各项响应头结果',
    step4: '根据建议改进网站安全配置',
    present: '已设置',
    missing: '缺失',
    warning: '警告',
    recommendation: '建议',
    scoreLabel: '安全评分',
    grade: '等级',
    error: '无法获取响应头，CORS 可能阻止了请求 — 可使用 HTTP 响应头检查器替代。',
    securityHeaders: '安全响应头分析',
  }
});
const { $, copyText, t } = GZ;

const securityHeaders = [
  { name: 'Content-Security-Policy', weight: 25, rec: 'Add Content-Security-Policy to prevent XSS attacks. Start with a report-only mode to test.' },
  { name: 'Strict-Transport-Security', weight: 25, rec: 'Add Strict-Transport-Security to enforce HTTPS. Recommended: max-age=31536000; includeSubDomains; preload' },
  { name: 'X-Content-Type-Options', weight: 15, rec: 'Add X-Content-Type-Options: nosniff to prevent MIME type sniffing.' },
  { name: 'X-Frame-Options', weight: 15, rec: 'Add X-Frame-Options: DENY or SAMEORIGIN to prevent clickjacking attacks.' },
  { name: 'Referrer-Policy', weight: 10, rec: 'Add Referrer-Policy to control referrer information. Recommended: strict-origin-when-cross-origin' },
  { name: 'Permissions-Policy', weight: 5, rec: 'Add Permissions-Policy to control which browser features the page can use.' },
  { name: 'X-XSS-Protection', weight: 5, rec: 'Add X-XSS-Protection: 0 (modern browsers use CSP instead, this header can introduce vulnerabilities).' },
];

async function checkHeaders() {
  const url = $('#url-input').value.trim();
  if (!url) return;
  $('#results').innerHTML = `<p style="text-align:center;padding:2rem">${t('checking')}</p>`;
  try {
    const resp = await fetch(url, { method: 'HEAD', mode: 'cors', cache: 'no-store' });
    const headers = {};
    resp.headers.forEach((v, k) => { headers[k.toLowerCase()] = v; });
    renderResults(headers);
  } catch(e) {
    try {
      const resp = await fetch(url, { method: 'GET', mode: 'cors', cache: 'no-store' });
      const headers = {};
      resp.headers.forEach((v, k) => { headers[k.toLowerCase()] = v; });
      renderResults(headers);
    } catch(e2) {
      $('#results').innerHTML = `<p style="color:var(--gz-accent)">${t('error')}</p>`;
      $('#score-area').innerHTML = '';
      $('#recommendations').innerHTML = '';
    }
  }
}

function renderResults(headers) {
  let score = 0;
  let html = '';
  let recs = '';
  securityHeaders.forEach(h => {
    const key = h.name.toLowerCase();
    const val = headers[key] || null;
    let badge, badgeClass;
    if (val) {
      score += h.weight;
      badge = t('present');
      badgeClass = 'badge-pass';
    } else {
      badge = t('missing');
      badgeClass = 'badge-fail';
      recs += `<div class="rec-box"><strong>${h.name}:</strong> ${h.rec}</div>`;
    }
    html += `<div class="header-card"><span class="name">${h.name}</span><span class="val">${val ? escHtml(val) : '—'}</span><span class="badge ${badgeClass}">${badge}</span></div>`;
  });
  let grade, gradeColor;
  if (score >= 90) { grade = 'A+'; gradeColor = '#00d672'; }
  else if (score >= 75) { grade = 'A'; gradeColor = '#00d672'; }
  else if (score >= 60) { grade = 'B'; gradeColor = '#61afef'; }
  else if (score >= 40) { grade = 'C'; gradeColor = '#f0ad4e'; }
  else if (score >= 20) { grade = 'D'; gradeColor = '#e94560'; }
  else { grade = 'F'; gradeColor = '#e94560'; }

  $('#score-area').innerHTML = `<div class="score-bar"><div class="score-circle" style="background:${gradeColor}22;color:${gradeColor};border:3px solid ${gradeColor}">${grade}</div><div><div style="font-weight:700;font-size:1.1rem">${t('scoreLabel')}: ${score}/100</div><div style="font-size:.82rem;color:var(--text3)">${t('grade')}: ${grade}</div></div></div>`;
  $('#results').innerHTML = html;
  if (recs) {
    $('#recommendations').innerHTML = `<h3 style="margin-top:1rem;font-size:1rem">${t('recommendation')}</h3>${recs}`;
  } else {
    $('#recommendations').innerHTML = '<p style="color:var(--gz-success);margin-top:1rem;font-weight:700">✓ All security headers are present!</p>';
  }
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function loadExample() { $('#url-input').value = 'https://tools.gamezipper.com'; checkHeaders(); }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="checkHeaders()">${t('check')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(document.getElementById('results').innerText)">${t('copyReport')}</button>`;

$('#url-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkHeaders(); });

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📡', href:'/dev/http-headers.html', name:'HTTP Headers'},
    {icon:'🔒', href:'/dev/ssl-checker.html', name:'SSL Checker'},
    {icon:'🛡️', href:'/dev/csp-generator.html', name:'CSP Generator'},
    {icon:'🔧', href:'/dev/htaccess.html', name:'.htaccess'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
