<style>
.audio-display{text-align:center;padding:30px 20px;background:var(--glass2);border-radius:12px;border:1px solid var(--border)}
.audio-disc{width:120px;height:120px;border-radius:50%;margin:0 auto 16px;background:conic-gradient(from 0deg,var(--gz-accent),#555,var(--gz-accent));display:flex;align-items:center;justify-content:center;font-size:3rem;animation:spin 4s linear infinite;animation-play-state:paused}
.audio-disc.playing{animation-play-state:running}
@keyframes spin{to{transform:rotate(360deg)}}
.audio-title{font-size:1.1em;font-weight:600;margin-bottom:4px}
.audio-info{font-size:.85em;color:var(--text2)}
.progress-wrap{margin-top:16px;display:flex;align-items:center;gap:8px}
.progress-bar{flex:1;height:6px;background:var(--glass);border-radius:3px;cursor:pointer;position:relative}
.progress-fill{height:100%;background:var(--gz-accent);border-radius:3px;width:0%;transition:width .1s}
.time-label{font-size:.8em;color:var(--text2);min-width:40px;text-align:center}
.audio-controls{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:16px}
.audio-controls button{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2em}
.audio-controls .play-btn{width:56px;height:56px;font-size:1.5em}
.audio-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:10px;justify-content:center}
.playlist{margin-top:12px;max-height:200px;overflow-y:auto}
.playlist-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .2s}
.playlist-item:hover{background:var(--glass2)}
.playlist-item.active{background:var(--glass);border-left:3px solid var(--gz-accent)}
.playlist-item .name{flex:1;font-size:.85em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drop-zone{text-align:center;padding:30px;border:2px dashed var(--border);border-radius:12px;cursor:pointer}
.drop-zone:hover{border-color:var(--gz-accent)}
.format-badges{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.format-badge{padding:2px 8px;border-radius:4px;font-size:.75em;background:var(--glass2);border:1px solid var(--border)}
</style>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div id="audio-main">
      <div id="drop-zone" class="drop-zone">
        <p style="font-size:2.5rem;margin:0 0 8px">🎵</p>
        <p id="drop-text" style="margin:0;font-size:1.1em"></p>
        <p style="margin:4px 0 0;font-size:.85em;color:var(--text2)" id="drop-hint"></p>
        <div class="format-badges">
          <span class="format-badge">MP3</span><span class="format-badge">WAV</span><span class="format-badge">OGG</span><span class="format-badge">FLAC</span><span class="format-badge">M4A</span>
        </div>
        <input type="file" id="file-input" accept="audio/*" multiple style="display:none">
      </div>
      <div id="player-area" style="display:none">
        <div class="audio-display">
          <div class="audio-disc" id="disc">🎶</div>
          <div class="audio-title" id="track-title">—</div>
          <div class="audio-info" id="track-info"></div>
          <div class="progress-wrap">
            <span class="time-label" id="current-time">0:00</span>
            <div class="progress-bar" id="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            <span class="time-label" id="duration">0:00</span>
          </div>
          <div class="audio-controls">
            <button class="gz-btn gz-btn-secondary" id="prev-btn">⏮</button>
            <button class="gz-btn gz-btn-secondary" id="shuffle-btn" title="Shuffle">🔀</button>
            <button class="gz-btn play-btn" id="play-btn">▶</button>
            <button class="gz-btn gz-btn-secondary" id="loop-btn" title="Loop">🔁</button>
            <button class="gz-btn gz-btn-secondary" id="next-btn">⏭</button>
          </div>
          <div class="audio-toolbar">
            <label style="font-size:.8em;color:var(--text2)">Speed</label>
            <select class="gz-select" id="speed-select" style="width:auto">
              <option value="0.5">0.5×</option>
              <option value="0.75">0.75×</option>
              <option value="1" selected>1×</option>
              <option value="1.25">1.25×</option>
              <option value="1.5">1.5×</option>
              <option value="2">2×</option>
            </select>
            <span style="opacity:.4">|</span>
            <label style="font-size:.8em;color:var(--text2)">Vol</label>
            <input type="range" id="volume" min="0" max="100" value="100" style="width:80px">
            <button class="gz-btn gz-btn-secondary" id="close-player" style="margin-left:auto">✕</button>
          </div>
        </div>
        <div class="playlist" id="playlist"></div>
      </div>
    </div>
    <audio id="audio" style="display:none"></audio>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Online Audio Player',
    toolDesc: 'Play any audio file directly in your browser — no upload, no signup. Playlist support, loop, shuffle, speed and volume control. MP3, WAV, OGG, FLAC, M4A. 100% private.',
    dropText: 'Click to choose audio files or drag & drop here',
    dropHint: 'Supports MP3, WAV, OGG, FLAC, M4A — your files stay in your browser',
    step1: 'Click the drop zone or drag audio file(s) onto it',
    step2: 'Press the play button ▶ to start playback',
    step3: 'Use shuffle 🔀, loop 🔁 and speed controls as needed',
    step4: 'Add multiple files to create a playlist and auto-play through them',
  },
  zh: {
    toolTitle: '在线音频播放器',
    toolDesc: '直接在浏览器中播放任何音频文件 — 无需上传、无需注册。支持播放列表、循环、随机播放、变速和音量控制。支持 MP3、WAV、OGG、FLAC、M4A。100% 隐私安全。',
    dropText: '点击选择音频文件或拖放到此处',
    dropHint: '支持 MP3、WAV、OGG、FLAC、M4A — 文件仅在你的浏览器中处理',
    step1: '点击拖放区域或将音频文件拖放到此处',
    step2: '按播放按钮 ▶ 开始播放',
    step3: '按需使用随机 🔀、循环 🔁 和变速控制',
    step4: '添加多个文件创建播放列表并自动连续播放',
  }
});

const { $, t } = GZ;
let playlist = [];
let currentIdx = 0;
let loopMode = false;
let shuffleMode = false;
const audio = $('#audio');

function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  return m + ':' + String(Math.floor(s % 60)).padStart(2, '0');
}

function loadFiles(files) {
  const audios = Array.from(files).filter(f => f.type.startsWith('audio/'));
  if (!audios.length) return;
  playlist = playlist.concat(audios);
  $('#drop-zone').style.display = 'none';
  $('#player-area').style.display = 'block';
  renderPlaylist();
  if (playlist.length === audios.length) playIdx(0);
}

function playIdx(idx) {
  currentIdx = idx;
  const file = playlist[idx];
  audio.src = URL.createObjectURL(file);
  audio.play();
  $('#track-title').textContent = file.name.replace(/\.[^.]+$/, '');
  $('#track-info').textContent = `${idx + 1}/${playlist.length} • ${(file.size/1048576).toFixed(1)} MB • ${file.type.split('/')[1].toUpperCase()}`;
  $('#play-btn').textContent = '⏸';
  $('#disc').classList.add('playing');
  renderPlaylist();
}

function renderPlaylist() {
  const container = $('#playlist');
  container.innerHTML = '';
  playlist.forEach((file, i) => {
    const item = document.createElement('div');
    item.className = 'playlist-item' + (i === currentIdx ? ' active' : '');
    item.innerHTML = `<span class="icon">${i === currentIdx ? '▶' : '🎵'}</span><span class="name">${file.name}</span><span style="font-size:.75em;color:var(--text2)">${(file.size/1048576).toFixed(1)}MB</span>`;
    item.onclick = () => playIdx(i);
    container.appendChild(item);
  });
}

$('#drop-text').textContent = t('dropText');
$('#drop-hint').textContent = t('dropHint');
$('#drop-zone').onclick = () => $('#file-input').click();
$('#file-input').onchange = (e) => loadFiles(e.target.files);
$('#drop-zone').ondragover = (e) => { e.preventDefault(); e.currentTarget.style.borderColor = 'var(--gz-accent)'; };
$('#drop-zone').ondragleave = (e) => { e.currentTarget.style.borderColor = ''; };
$('#drop-zone').ondrop = (e) => { e.preventDefault(); loadFiles(e.dataTransfer.files); };

$('#play-btn').onclick = () => { if (audio.paused) { audio.play(); $('#play-btn').textContent = '⏸'; $('#disc').classList.add('playing'); } else { audio.pause(); $('#play-btn').textContent = '▶'; $('#disc').classList.remove('playing'); } };
$('#prev-btn').onclick = () => currentIdx > 0 && playIdx(currentIdx - 1);
$('#next-btn').onclick = () => { if (shuffleMode) { playIdx(Math.floor(Math.random() * playlist.length)); } else if (currentIdx < playlist.length - 1) { playIdx(currentIdx + 1); } };
$('#loop-btn').onclick = (e) => { loopMode = !loopMode; audio.loop = loopMode; e.currentTarget.style.opacity = loopMode ? '1' : '0.5'; };
$('#shuffle-btn').onclick = (e) => { shuffleMode = !shuffleMode; e.currentTarget.style.opacity = shuffleMode ? '1' : '0.5'; };
$('#speed-select').onchange = (e) => audio.playbackRate = parseFloat(e.target.value);
$('#volume').oninput = (e) => audio.volume = e.target.value / 100;
$('#progress-bar').onclick = (e) => { if (audio.duration) { const rect = e.currentTarget.getBoundingClientRect(); audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration; } };
audio.ontimeupdate = () => { if (audio.duration) { $('#progress-fill').style.width = (audio.currentTime / audio.duration * 100) + '%'; $('#current-time').textContent = fmtTime(audio.currentTime); } };
audio.ondurationchange = () => $('#duration').textContent = fmtTime(audio.duration);
audio.onended = () => { if (!loopMode) { if (shuffleMode) playIdx(Math.floor(Math.random() * playlist.length)); else if (currentIdx < playlist.length - 1) playIdx(currentIdx + 1); else { $('#play-btn').textContent = '▶'; $('#disc').classList.remove('playing'); } } };
$('#close-player').onclick = () => { playlist = []; audio.pause(); audio.src = ''; $('#player-area').style.display = 'none'; $('#drop-zone').style.display = 'block'; $('#file-input').value = ''; };

$('#toolbar').innerHTML = '';

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎬', href:'/dev/video-player.html', name:'Video Player'},
    {icon:'✂️', href:'/convert/audio-trimmer.html', name:'Audio Trimmer'},
    {icon:'🔄', href:'/convert/audio-converter.html', name:'Audio Converter'},
    {icon:'🎚️', href:'/convert/audio-volume.html', name:'Audio Volume'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
