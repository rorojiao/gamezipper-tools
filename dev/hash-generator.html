function md5(str) {

// SHA via Web Crypto
async function sha(algo, data) {
  const buf = typeof data === 'string' ? enc.encode(data) : data;
  const hash = await crypto.subtle.digest(algo, buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function computeAll(data) {
  const isStr = typeof data === 'string';
  $('#md5').textContent = isStr ? md5(data) : '—';
  $('#sha1').textContent = await sha('SHA-1', data);
  $('#sha256').textContent = await sha('SHA-256', data);
  $('#sha384').textContent = await sha('SHA-384', data);
  $('#sha512').textContent = await sha('SHA-512', data);
}

function doHash() {
  const text = $('#input-text').value;
  if (!text) { ['md5','sha1','sha256','sha384','sha512'].forEach(id => $('#' + id).textContent = '—'); return; }
  computeAll(text);
  $('#compare-input').value = '';
  $('#compare-result').textContent = '';
}

function copyHash(id) { copyText($('#' + id).textContent); }

function checkCompare() {
  const input = $('#compare-input').value.trim().toLowerCase();
  if (!input) { $('#compare-result').textContent = ''; $('#compare-result').style.color = ''; return; }
  const all = ['md5','sha1','sha256','sha384','sha512'].map(id => $('#' + id).textContent.toLowerCase());
  if (all.includes(input)) {
    $('#compare-result').textContent = t('match');
    $('#compare-result').style.color = 'var(--gz-success)';
  } else {
    $('#compare-result').textContent = t('noMatch');
    $('#compare-result').style.color = 'var(--gz-accent)';
  }
}

async function handleFile(file) {
  currentFile = file;
  $('#file-info').textContent = `📄 ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
  $('#input-text').value = '';
  $('#md5').textContent = '(file MD5 skipped for large files)';
  const buf = await file.arrayBuffer();
  $('#sha1').textContent = await sha('SHA-1', buf);
  $('#sha256').textContent = await sha('SHA-256', buf);
  $('#sha384').textContent = await sha('SHA-384', buf);
  $('#sha512').textContent = await sha('SHA-512', buf);
  if (file.size < 500000) {
    const text = await file.text();
    $('#md5').textContent = md5(text);
  }
}
