<script>
GZI18n.register({
  en: {
    toolTitle: 'Placeholder Image Generator',
    toolDesc: 'Create custom placeholder images for web development. Set size, colors, and text — download as PNG instantly.',
    width: 'Width (px)',
    height: 'Height (px)',
    bgColor: 'Background Color',
    fgColor: 'Text Color',
    customText: 'Custom Text',
    fontSize: 'Font Size',
    download: 'Download PNG',
    generate: 'Generate',
    step1: 'Set the image width and height in pixels',
    step2: 'Choose background and text colors',
    step3: 'Optionally enter custom text (default shows dimensions)',
    step4: 'Click Generate, then Download PNG',
  },
  zh: {
    toolTitle: '占位图生成器',
    toolDesc: '为网页开发创建自定义占位图。设置尺寸、颜色和文字 — 即时下载 PNG。',
    width: '宽度 (px)',
    height: '高度 (px)',
    bgColor: '背景颜色',
    fgColor: '文字颜色',
    customText: '自定义文字',
    fontSize: '字体大小',
    download: '下载 PNG',
    generate: '生成',
    step1: '设置图片的宽度和高度（像素）',
    step2: '选择背景色和文字颜色',
    step3: '可选输入自定义文字（默认显示尺寸）',
    step4: '点击「生成」，然后「下载 PNG」',
  }
});

const { $, copyText, t } = GZ;

$('#lblWidth').textContent = t('width');
$('#lblHeight').textContent = t('height');
$('#lblBg').textContent = t('bgColor');
$('#lblFg').textContent = t('fgColor');
$('#lblText').textContent = t('customText');
$('#lblFontSize').textContent = t('fontSize');

function generate() {
  const w = Math.max(10, Math.min(4000, parseInt($('#imgWidth').value) || 800));
  const h = Math.max(10, Math.min(4000, parseInt($('#imgHeight').value) || 600));
  const bg = $('#bgColor').value;
  const fg = $('#fgColor').value;
  const txt = $('#customText').value || `${w} × ${h}`;
  let fs = parseInt($('#fontSize').value);
  if (fs === 0) fs = Math.max(12, Math.min(w, h) / 8);

  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  // Diagonal cross pattern
  ctx.strokeStyle = fg;
  ctx.globalAlpha = 0.1;
  ctx.lineWidth = 1;
  for (let i = -h; i < w; i += 20) {
    ctx.beginPath();
    ctx.moveTo(i, 0);
    ctx.lineTo(i + h, h);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Border
  ctx.strokeStyle = fg;
  ctx.lineWidth = 2;
  ctx.strokeRect(1, 1, w - 2, h - 2);

  // Text
  ctx.fillStyle = fg;
  ctx.font = `bold ${fs}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(txt, w / 2, h / 2);

  const dataUrl = canvas.toDataURL('image/png');
  $('#preview').innerHTML = `<img src="${dataUrl}" alt="Placeholder ${w}x${h}">`;
}

function downloadPng() {
  const img = $('#preview').querySelector('img');
  if (!img) return;
  const a = document.createElement('a');
  a.href = img.src;
  const w = $('#imgWidth').value;
  const h = $('#imgHeight').value;
  a.download = `placeholder-${w}x${h}.png`;
  a.click();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn" onclick="downloadPng()">${t('download')}</button>`;

// Auto-generate on any input change
['imgWidth','imgHeight','bgColor','fgColor','customText','fontSize'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('input', generate);
  el.addEventListener('change', generate);
});

// Initial generate
generate();

GZ.renderToolPage(
    {icon:'🎨', href:'/color/picker.html', name:'Color Picker'},
    
    {icon:'🔄', href:'/convert/webp-to-png.html', name:'WebP to PNG'},
  ]
});
</script>
