<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div id="preview"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Testimonial Generator',
    toolDesc: 'Generate beautiful testimonial and review components with live preview. Customize avatar, name, quote, rating and colors.',
    count: 'Count',
    name: 'Name',
    role: 'Role',
    quote: 'Quote',
    rating: 'Stars',
    accent: 'Accent',
    generate: 'Generate',
    copyHTML: 'Copy HTML',
    copyCSS: 'Copy CSS',
    step1: 'Set the number of testimonials (1-6)',
    step2: 'Customize name, role, quote and star rating',
    step3: 'Choose your accent color',
    step4: 'Click Generate to preview, then copy HTML or CSS',
  },
  zh: {
    toolTitle: 'CSS 用户评价组件生成器',
    toolDesc: '可视化生成精美的 CSS 用户评价和评论组件，支持自定义头像、姓名、引用文字和颜色。',
    count: '数量',
    name: '姓名',
    role: '职位',
    quote: '引言',
    rating: '星级',
    accent: '强调色',
    generate: '生成',
    copyHTML: '复制 HTML',
    copyCSS: '复制 CSS',
    step1: '设置评价数量（1-6）',
    step2: '自定义姓名、职位、引言和星级',
    step3: '选择强调色',
    step4: '点击生成预览，然后复制 HTML 或 CSS',
  }
});

const { $, copyText, t } = GZ;
let accent = '#4ecdc4', count = 3;
const samples = [
  { name: 'Sarah Johnson', role: 'CEO at TechCo', quote: 'This product transformed our workflow. The team productivity increased by 40% in the first month.', stars: 5 },
  { name: 'Mike Chen', role: 'Lead Developer', quote: 'Best developer tool I have used in years. Clean API, excellent docs and blazing fast performance.', stars: 5 },
  { name: 'Emily Davis', role: 'Design Director', quote: 'The UI components are gorgeous and incredibly well-thought-out. Saved our team weeks of work.', stars: 4 },
  { name: 'Alex Rivera', role: 'Product Manager', quote: 'Outstanding customer support and a product that just works. Highly recommend for any team.', stars: 5 },
  { name: 'Lisa Wang', role: 'CTO at StartupX', quote: 'We evaluated 10 solutions and this was the clear winner. Easy integration and great scalability.', stars: 5 },
  { name: 'Tom Brown', role: 'Freelance Dev', quote: 'Finally a tool that does exactly what it promises. Simple, fast, and reliable.', stars: 4 },
];

function buildToolbar() {
  $('#toolbar').innerHTML = `
    <label>${t('count')} <input type="number" id="inp-count" min="1" max="6" value="${count}" style="width:60px"></label>
    <label>${t('accent')} <input type="color" id="inp-accent" value="${accent}"></label>
    <button class="gz-btn" onclick="generate()">${t('generate')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="copyHTML()">${t('copyHTML')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="copyCSS()">${t('copyCSS')}</button>`;
  $('#inp-count').addEventListener('input', e => { count = Math.min(6, Math.max(1, +e.target.value)); generate(); });
  $('#inp-accent').addEventListener('input', e => { accent = e.target.value; generate(); });
}

function generate() {
  const preview = $('#preview');
  preview.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const s = samples[i % samples.length];
    const initials = s.name.split(' ').map(w => w[0]).join('');
    const stars = '★'.repeat(s.stars) + '☆'.repeat(5 - s.stars);
    const card = document.createElement('div');
    card.className = 'testimonial-card';
    card.innerHTML = `
      <div class="stars">${stars}</div>
      <blockquote>"${s.quote}"</blockquote>
      <div class="author">
        <div class="avatar" style="background:${accent}">${initials}</div>
        <div class="info"><strong>${s.name}</strong><span>${s.role}</span></div>
      </div>`;
    preview.appendChild(card);
  }
}

function copyHTML() {
  let html = '<div class="testimonials">\n';
  for (let i = 0; i < count; i++) {
    const s = samples[i % samples.length];
    const initials = s.name.split(' ').map(w => w[0]).join('');
    const stars = '★'.repeat(s.stars) + '☆'.repeat(5 - s.stars);
    html += `  <div class="testimonial-card">\n    <div class="stars">${stars}</div>\n    <blockquote>"${s.quote}"</blockquote>\n    <div class="author">\n      <div class="avatar">${initials}</div>\n      <div class="info"><strong>${s.name}</strong><span>${s.role}</span></div>\n    </div>\n  </div>\n`;
  }
  html += '</div>';
  copyText(html);
}

function copyCSS() {
  const css = `.testimonials { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
.testimonial-card { background: #1a1a2e; border: 1px solid #333; border-radius: 16px; padding: 24px; max-width: 340px; }
.testimonial-card .stars { color: #ffd93d; font-size: 1.2em; margin-bottom: 12px; }
.testimonial-card blockquote { margin: 0 0 16px; font-style: italic; line-height: 1.6; font-size: 0.92em; }
.testimonial-card .author { display: flex; align-items: center; gap: 12px; }
.testimonial-card .avatar { width: 44px; height: 44px; border-radius: 50%; background: ${accent}; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #000; }
.testimonial-card .info strong { font-size: 0.9em; display: block; }
.testimonial-card .info span { font-size: 0.78em; color: #aaa; }`;
  copyText(css);
}

buildToolbar();
generate();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🃏', href:'/css-tools/card.html', name:'Card Generator'},
    {icon:'🔘', href:'/css-tools/button.html', name:'Button Generator'},
    {icon:'📋', href:'/css-tools/accordion.html', name:'Accordion Generator'},
    {icon:'💬', href:'/css-tools/tooltip.html', name:'Tooltip Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
