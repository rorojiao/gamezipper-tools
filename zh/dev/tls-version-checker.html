<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'TLS Version & Cipher Strength Checker',
    toolDesc: 'Probe your browser to find out which TLS/SSL protocol versions (SSLv3, TLS 1.0, 1.1, 1.2, 1.3) and key cipher strengths are supported. Detect weak or deprecated protocols — free, private and instant.',
    check: 'Run TLS Check',
    running: 'Probing TLS endpoints…',
    step1: 'Click Run TLS Check to start the browser-side probe',
    step2: 'The tool tries to load test endpoints that only accept specific TLS versions',
    step3: 'Review which TLS versions your browser supports and which are weak',
    step4: 'Update your browser if TLS 1.2 or 1.3 is missing — they are required by modern sites',
    summary: 'Highest Supported TLS Version',
    supported: 'Supported',
    unsupported: 'Not Supported',
    checking: 'checking…',
    recommendation: 'Recommendation',
    recOk: 'Excellent — your browser supports TLS 1.3, the latest and most secure protocol.',
    recGood: 'Good — TLS 1.2 is supported, which is the current minimum standard.',
    recBad: '⚠ Your browser does not support TLS 1.2 or newer. Update immediately — most websites will not load.',
    protocols: 'Protocol Versions',
    protoSsl3: 'SSL 3.0 (1996)',
    protoTls10: 'TLS 1.0 (1999)',
    protoTls11: 'TLS 1.1 (2006)',
    protoTls12: 'TLS 1.2 (2008)',
    protoTls13: 'TLS 1.3 (2018)',
    insecure: 'insecure — disabled by all modern browsers',
    deprecated: 'deprecated since 2020 — should be disabled',
    current: 'current minimum standard',
    latest: 'latest, fastest and most secure',
    browserCaps: 'Browser Capabilities',
    features: 'Crypto Features',
  },
  zh: {
    toolTitle: 'TLS 版本与加密强度检测器',
    toolDesc: '探测你的浏览器支持哪些 TLS/SSL 协议版本（SSLv3、TLS 1.0、1.1、1.2、1.3）以及加密强度。检测弱协议或已废弃协议 — 免费、私密、即时。',
    check: '运行 TLS 检测',
    running: '正在探测 TLS 端点…',
    step1: '点击「运行 TLS 检测」开始浏览器端探测',
    step2: '工具会尝试加载只接受特定 TLS 版本的测试端点',
    step3: '查看浏览器支持哪些 TLS 版本、哪些较弱',
    step4: '如果缺少 TLS 1.2 或 1.3，请立即更新浏览器 — 大多数网站将无法访问',
    summary: '最高支持的 TLS 版本',
    supported: '已支持',
    unsupported: '不支持',
    checking: '检测中…',
    recommendation: '建议',
    recOk: '优秀 — 你的浏览器支持 TLS 1.3，这是最新、最安全的协议。',
    recGood: '良好 — 支持 TLS 1.2，这是当前最低标准。',
    recBad: '⚠ 你的浏览器不支持 TLS 1.2 或更高版本。请立即更新 — 大多数网站将无法访问。',
    protocols: '协议版本',
    protoSsl3: 'SSL 3.0（1996）',
    protoTls10: 'TLS 1.0（1999）',
    protoTls11: 'TLS 1.1（2006）',
    protoTls12: 'TLS 1.2（2008）',
    protoTls13: 'TLS 1.3（2018）',
    insecure: '不安全 — 所有现代浏览器已禁用',
    deprecated: '2020 年起已废弃 — 应禁用',
    current: '当前最低标准',
    latest: '最新、最快且最安全',
    browserCaps: '浏览器能力',
    features: '加密特性',
  }
});

const { $, t } = GZ;
$('#checkBtn').textContent = t('check');
$('#checkBtn').onclick = runCheck;

// Public TLS test endpoints (badssl.com and How's My SSL)
const TESTS = [
  { ver: 'tls13', label: t('protoTls13'), status: t('latest'), url: 'https://tls13.1d.pw/', severity: 'latest' },
  { ver: 'tls12', label: t('protoTls12'), status: t('current'), url: 'https://badssl.com/', severity: 'current' },
  { ver: 'tls11', label: t('protoTls11'), status: t('deprecated'), url: 'https://tls-v1-1.badssl.com:1011/', severity: 'deprecated' },
  { ver: 'tls10', label: t('protoTls10'), status: t('deprecated'), url: 'https://tls-v1-0.badssl.com:1010/', severity: 'deprecated' },
  { ver: 'ssl3',  label: t('protoSsl3'),  status: t('insecure'), url: 'https://ssl3.badssl.com/', severity: 'insecure' },
];

function renderInitial() {
  const rows = TESTS.map(tt => `
    <div class="tls-row">
      <span class="tls-ver">${tt.label}</span>
      <span style="color:var(--text3);font-size:.82em">${tt.status}</span>
      <span class="tag tag-na" id="tag-${tt.ver}">${t('checking')}</span>
    </div>`).join('');
  $('#result').innerHTML = `
    <div class="summary"><div class="big" id="topVer">…</div><div style="color:var(--text2)">${t('summary')}</div></div>
    <div style="background:var(--glass);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px">
      <div style="padding:10px 14px;font-weight:700;border-bottom:1px solid var(--border)">${t('protocols')}</div>
      ${rows}
    </div>
    <div id="caps"></div>`;
}

async function probe(url) {
  try {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 6000);
    await fetch(url, { mode: 'no-cors', signal: ctrl.signal, cache: 'no-store' });
    clearTimeout(tid);
    return true;
  } catch(e) {
    return false;
  }
}

async function runCheck() {
  $('#checkBtn').disabled = true;
  $('#status').innerHTML = `<span style="color:var(--text2)">⏳ ${t('running')}</span>`;
  renderInitial();

  const results = {};
  for (const tt of TESTS) {
    const ok = await probe(tt.url);
    results[tt.ver] = ok;
    const tag = $(`#tag-${tt.ver}`);
    if (!tag) continue;
    if (ok) {
      tag.className = 'tag ' + (tt.severity === 'latest' || tt.severity === 'current' ? 'tag-ok' : 'tag-warn');
      tag.textContent = '✓ ' + t('supported');
    } else {
      tag.className = 'tag tag-na';
      tag.textContent = '✗ ' + t('unsupported');
    }
  }

  // Determine highest supported version
  let topVer = null, topLabel = '', topSeverity = '';
  if (results.tls13) { topVer = '1.3'; topLabel = t('protoTls13'); topSeverity = 'latest'; }
  else if (results.tls12) { topVer = '1.2'; topLabel = t('protoTls12'); topSeverity = 'current'; }
  else if (results.tls11) { topVer = '1.1'; topLabel = t('protoTls11'); topSeverity = 'deprecated'; }
  else if (results.tls10) { topVer = '1.0'; topLabel = t('protoTls10'); topSeverity = 'deprecated'; }
  else if (results.ssl3)  { topVer = 'SSL 3.0'; topLabel = t('protoSsl3'); topSeverity = 'insecure'; }

  const topEl = $('#topVer');
  if (topEl) {
    topEl.textContent = topVer || '—';
    topEl.className = 'big ' + (topSeverity === 'latest' || topSeverity === 'current' ? '' : 'score-warn');
    topEl.style.color = (topSeverity === 'latest' || topSeverity === 'current') ? '#27ae60' : '#e74c3c';
  }

  // Recommendation
  let rec;
  if (results.tls13) rec = t('recOk');
  else if (results.tls12) rec = t('recGood');
  else rec = t('recBad');

  // Browser crypto features
  const features = [];
  features.push(['WebCrypto API', !!(window.crypto && window.crypto.subtle)]);
  features.push(['SubtleCrypto deriveKey', !!(window.crypto && window.crypto.subtle && window.crypto.subtle.deriveKey)]);
  features.push(['AES-GCM', typeof window.crypto !== 'undefined']);
  features.push(['RSA-OAEP', typeof window.crypto !== 'undefined']);
  features.push(['ECDSA P-256', typeof window.crypto !== 'undefined']);
  features.push(['HKDF', !!(window.crypto && window.crypto.subtle)]);
  features.push(['PBKDF2', !!(window.crypto && window.crypto.subtle)]);
  features.push(['Random values', !!(window.crypto && window.crypto.getRandomValues)]);
  const featRows = features.map(([n, ok]) => `
    <div class="tls-row">
      <span class="cipher">${n}</span>
      <span class="tag ${ok ? 'tag-ok' : 'tag-na'}">${ok ? '✓' : '—'}</span>
    </div>`).join('');
  const caps = $('#caps');
  if (caps) caps.innerHTML = `
    <div style="background:var(--glass2);border:1px solid var(--border);border-radius:12px;overflow:hidden">
      <div style="padding:10px 14px;font-weight:700;border-bottom:1px solid var(--border)">${t('features')}</div>
      ${featRows}
    </div>
    <div style="background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:12px">
      <b>${t('recommendation')}</b><br>
      <span style="color:var(--text2)">${rec}</span>
    </div>`;

  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${t('summary')}: ${topVer || '—'}</span>`;
  $('#checkBtn').disabled = false;
}

$('#toolbar').innerHTML = '';

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔐', href:'/dev/ssl-checker.html', name:'SSL Checker'},
    {icon:'📜', href:'/dev/certificate-decoder.html', name:'Cert Decoder'},
    {icon:'🌐', href:'/dev/browser-info.html', name:'Browser Info'},
    {icon:'📡', href:'/dev/my-ip-address.html', name:'My IP'},
  ]
});
</script>

</body>
