es typically run 0.8% to 2.5% of the home's value per year depending on your state and county. Homeowners insurance averages about $1,500 to $2,500 per year nationally. HO-6 condo insurance, flood insurance and earthquake insurance can add more. The calculator includes taxes and insurance in the monthly payment estimate so you see the true PITI."}},{"@type":"Question","name":"What is PMI and how does it affect first-time buyers?","acceptedAnswer":{"@type":"Answer","text":"Private mortgage insurance (PMI) is required on conventional loans when you put down less than 20%. It typically costs 0.3% to 1.5% of the original loan amount per year, and is automatically cancelled once you reach 22% equity. FHA loans charge a similar mortgage insurance premium (MIP) for the life of most loans. This calculator adds an estimated PMI/MIP cost so your monthly payment reflects what you will actually pay."}}]}</script>

  fha:          { minDown: 3.5, pmi: 0.0085, pmiLabel: 'MIP (FHA)' },
  va:           { minDown: 0,  pmi: 0,    pmiLabel: 'Funding Fee (VA)' },
  usda:         { minDown: 0,  pmi: 0.0035, pmiLabel: 'Guarantee Fee (USDA)' }
};

function calc(){
  const income  = +$('#income').value || 0;
  const debts   = +$('#debts').value || 0;
  const dtiMax  = (+$('#dti').value || 36) / 100;
  const rate    = +$('#credit').value;
  const loanType = $('#loanType').value;
  const cfg     = LOAN_CFG[loanType];
  const term    = (+$('#term').value) * 12;
  const downPct = Math.max(+$('#downPct').value || 0, loanType==='fha'?3.5:loanType==='conventional'?cfg.minDown:0);
  const closingPct = +$('#closingPct').value || 0;
  const taxRate = +$('#taxRate').value || 0;
  const insYr   = +$('#insurance').value || 0;

  const monthlyGross = income / 12;
  const maxHousing = monthlyGross * (28/100); // 28% front-end rule of thumb
  // Use DTI for stronger back-end constraint:
  const maxTotalPmt = Math.min(maxHousing, monthlyGross * dtiMax - debts);
  // Solve for home price given that total monthly = P&I + tax + ins + PMI ≈ monthlyCap
  // Iterate to handle tax/ins/PMI which scale with price
  let price = 0;
  for (let i = 0; i < 80; i++) {
    const loanAmt = price * (1 - downPct/100);
    const pi = pmt(rate, term, loanAmt);
    const taxM = price * (taxRate/100) / 12;
    const insM = insYr / 12;
    const pmiM = loanAmt * cfg.pmi / 12;
    const total = pi + taxM + insM + pmiM;
    if (total >= maxTotalPmt) { price = price > 0 ? price * 0.997 : 400000; }
    else break;
    if (price === 0) break;
  }
  // Binary search
  let lo = 50000, hi = 5000000, best = 0;
  for (let i = 0; i < 60; i++){
    const mid = (lo+hi)/2;
    const loanAmt = mid * (1 - downPct/100);
    const pi = pmt(rate, term, loanAmt);
    const taxM = mid * (taxRate/100) / 12;
    const insM = insYr / 12;
    const pmiM = loanAmt * cfg.pmi / 12;
    const total = pi + taxM + insM + pmiM;
    if (total <= maxTotalPmt){ best = mid; lo = mid; }
    else { hi = mid; }
  }
  price = Math.max(0, Math.round(best / 1000) * 1000);
  if (price < 50000) { price = 0; }

  const loanAmt = price * (1 - downPct/100);
  const pi     = pmt(rate, term, loanAmt);
  const taxM   = price * (taxRate/100) / 12;
  const insM   = insYr / 12;
  const pmiM   = loanAmt * cfg.pmi / 12;
  const totalMonthly = pi + taxM + insM + pmiM;
  const downAmt = price * (downPct/100);
  const closingAmt = price * (closingPct/100);
  const cashNeeded = downAmt + closingAmt;
  const totalPaid = totalMonthly * term;
  const totalInterest = (pi * term) - loanAmt;
  const dtiActual = (totalMonthly + debts) / monthlyGross;

  // Render
  $('#m-afford').textContent = price ? fmt(price) : '$0';
  $('#m-monthly').textContent = fmt2(totalMonthly);
  $('#m-down').textContent = fmt(downAmt);
  $('#m-cash').textContent = fmt(cashNeeded);
  $('#m-dti').textContent = (dtiActual*100).toFixed(1) + '%';
  $('#m-total').textContent = fmt(totalPaid);
  $('#dti-box').classList.remove('good','warn','bad');
  if (dtiActual <= dtiMax * 0.9) $('#dti-box').classList.add('good');
  else if (dtiActual <= dtiMax) $('#dti-box').classList.add('warn');
  else $('#dti-box').classList.add('bad');

  // Bar
  const segs = [
    {name: t('pi'),   val: pi,   color: '#4ecdc4'},
    {name: t('tax'),  val: taxM, color: '#f59e0b'},
    {name: t('ins'),  val: insM, color: '#3b82f6'},
    {name: t('pmi'),  val: pmiM, color: '#ef4444', hide: pmiM < 0.5},
  ];
  const sum = segs.reduce((s,x)=>s+x.val,0) || 1;
  const bar = $('#bar');
  bar.innerHTML = '';
  const leg = $('#legend'); leg.innerHTML = '';
  segs.forEach(s => {
    if (s.hide) return;
    const pct = (s.val/sum)*100;
    if (pct < 1) return;
    const seg = document.createElement('div');
    seg.className = 'fth-bar-seg';
    seg.style.width = pct + '%';
    seg.style.background = s.color;
    seg.textContent = pct > 9 ? (pct.toFixed(0)+'%') : '';
    bar.appendChild(seg);
    leg.innerHTML += '<span><i style="background:'+s.color+'"></i>'+s.name+': '+fmt2(s.val)+'</span>';
  });

  // Table
  const tbody = $('#tbody');
  tbody.innerHTML = '';
  const allSegs = [{name: t('pi'), val: pi, color: '#4ecdc4'}, {name: t('tax'), val: taxM, color: '#f59e0b'}, {name: t('ins'), val: insM, color: '#3b82f6'}];
  if (pmiM > 0) allSegs.push({name: cfg.pmiLabel, val: pmiM, color: '#ef4444'});
  allSegs.forEach(s=>{
    const tr = document.createElement('tr');
    tr.innerHTML = '<td>' + s.name + '</td><td>'+fmt2(s.val)+'</td><td>'+((s.val/sum)*100).toFixed(1)+'%</td>';
    tbody.appendChild(tr);
  });
  const tr = document.createElement('tr');
  tr.style.fontWeight = '700';
  tr.innerHTML = '<td>Total monthly</td><td>'+fmt2(totalMonthly)+'</td><td>100.0%</td>';
  tbody.appendChild(tr);

  // Checklist
  const cl = $('#checklist');
  cl.innerHTML = '';
  ['check1','check2','check3','check4','check5','check6'].forEach((k,i)=>{
    const d = document.createElement('div');
    d.innerHTML = '<b>'+t(k+'b')+'</b> '+t(k);
    cl.appendChild(d);
  });

  $('#results').style.display = 'block';
}

$('#btnCalc').addEventListener('click', calc);
$('#btnReset').addEventListener('click', ()=>{
  $('#income').value = 75000; $('#debts').value = 450; $('#dti').value = 36;
  $('#downPct').value = 10; $('#closingPct').value = 3;
  $('#taxRate').value = 1.2; $('#insurance').value = 1800;
  $('#loanType').value = 'conventional'; $('#term').value = 30; $('#credit').value = 0.0725;
  $('#results').style.display = 'none';
});
$('#btnFill').addEventListener('click', ()=>{
  $('#income').value = 82500; $('#debts').value = 380;
  $('#downPct').value = 5; $('#closingPct').value = 3.5;
  $('#loanType').value = 'conventional'; calc();
});
// Also recalc when user changes loanType (auto-adjust min down)
$('#loanType').addEventListener('change', ()=>{
  const cfg = LOAN_CFG[$('#loanType').value];
  const cur = +$('#downPct').value;
  if (cur < cfg.minDown && cfg.minDown > 0) $('#downPct').value = cfg.minDown;
});

</script>
