.cm-row.highlight{background:var(--accent);color:#fff;font-weight:700}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"CPM Calculator","description":"Free CPM calculator. Calculate cost per mille (CPM), total ad cost, total impressions and eCPM for advertising campaigns.","url":"https://tools.gamezipper.com/calc/cpm-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is CPM in advertising?","acceptedAnswer":{"@type":"Answer","text":"CPM stands for Cost Per Mille (cost per thousand impressions). It is the price an advertiser pays for every 1,000 times their ad is shown. CPM is the most common pricing model for display and video advertising."}},{"@type":"Question","name":"How do you calculate CPM?","acceptedAnswer":{"@type":"Answer","text":"CPM = (Total Cost ÷ Total Impressions) × 1000. For example, if you spend $500 on an ad that gets 250,000 impressions, your CPM = (500 ÷ 250000) × 1000 = $2.00."}},{"@type":"Question","name":"What is the difference between CPM and eCPM?","acceptedAnswer":{"@type":"Answer","text":"CPM is a pricing model set before a campaign (what you pay per 1,000 impressions). eCPM (effective CPM) is a performance metric calculated after the campaign = (Total Revenue ÷ Impressions) × 1000. Publishers use eCPM to compare revenue across different ad formats."}},{"@type":"Question","name":"What is a good CPM?","acceptedAnswer":{"@type":"Answer","text":"CPM varies widely by platform and targeting. Display ads: $1-$10. Social media: $5-$15. Video pre-roll: $10-$30. Premium / highly targeted: $20-$50+. Lower CPMs are better for advertisers; higher eCPMs are better for publishers."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  </div>
  <div class="gz-tool-area">

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CPM Calculator',
    toolDesc: 'Calculate CPM (cost per mille), total ad cost, total impressions and eCPM. Enter any two of the three values and the calculator solves the third. Free and private.',
    solveMode: 'What do you want to calculate?',
    modeCPM: 'Find CPM',
    modeCost: 'Find Total Cost',
    modeImpressions: 'Find Impressions',
    totalCost: 'Total ad cost',
    impressions: 'Total impressions',
    cpm: 'CPM (cost per 1,000)',
    resultCPM: 'Your CPM',
    resultCost: 'Total cost',
    resultImpressions: 'Total impressions',
    costPerClick: 'Estimated cost per click (at 2% CTR)',
    step1: 'Choose what you want to solve (CPM, cost, or impressions)',
    step2: 'Enter the two known values',
    step3: 'The third value is calculated instantly',
    step4: 'Use the results to plan or evaluate your ad campaign',
  },
  zh: {
    toolTitle: 'CPM 计算器',
    toolDesc: '计算 CPM（千次展示费用）、广告总费用、总展示次数和 eCPM。输入三个值中的任意两个，计算器自动求解第三个。免费且私密。',
    solveMode: '你想计算什么？',
    modeCPM: '求 CPM',
    modeCost: '求总费用',
    modeImpressions: '求展示次数',
    totalCost: '广告总费用',
    impressions: '总展示次数',
    cpm: 'CPM（每千次费用）',
    resultCPM: '你的 CPM',
    resultCost: '总费用',
    resultImpressions: '总展示次数',
    costPerClick: '预计每次点击成本（按 2% CTR）',
    step1: '选择要计算的值（CPM、费用或展示次数）',
    step2: '输入两个已知值',
    step3: '第三个值自动计算',
    step4: '用结果来规划或评估广告投放',
  }
});

const { $, t } = GZ;
let mode = 'cpm';

const cur = (n) => {
  const lang = GZI18n.getLang ? GZI18n.getLang() : 'en';
  try { return new Intl.NumberFormat(lang === 'zh' ? 'zh-CN' : 'en-US', {style:'currency', currency:'USD', maximumFractionDigits:2}).format(n); }
  catch(e) { return '$' + n.toFixed(2); }
};

function buildInputCard() {
  const fields = mode === 'cpm'
    ? `<div class="cm-field"><label>${t('totalCost')}</label><div class="input-wrap"><span class="prefix">$</span><input type="number" id="cost" class="has-prefix" value="500" min="0" step="0.01"></div></div>
       <div class="cm-field"><label>${t('impressions')}</label><input type="number" id="impressions" value="250000" min="0" step="1000"></div>`
    : mode === 'cost'
    ? `<div class="cm-field"><label>${t('cpm')}</label><div class="input-wrap"><span class="prefix">$</span><input type="number" id="cpm" class="has-prefix" value="2.00" min="0" step="0.01"></div></div>
       <div class="cm-field"><label>${t('impressions')}</label><input type="number" id="impressions" value="250000" min="0" step="1000"></div>`
    : `<div class="cm-field"><label>${t('totalCost')}</label><div class="input-wrap"><span class="prefix">$</span><input type="number" id="cost" class="has-prefix" value="500" min="0" step="0.01"></div></div>
       <div class="cm-field"><label>${t('cpm')}</label><div class="input-wrap"><span class="prefix">$</span><input type="number" id="cpm" class="has-prefix" value="2.00" min="0" step="0.01"></div></div>`;

  $('#input-card').innerHTML = `
    <div class="cm-mode-btns">
      <button class="cm-mode-btn ${mode==='cpm'?'active':''}" onclick="setMode('cpm')">${t('modeCPM')}</button>
      <button class="cm-mode-btn ${mode==='cost'?'active':''}" onclick="setMode('cost')">${t('modeCost')}</button>
      <button class="cm-mode-btn ${mode==='impressions'?'active':''}" onclick="setMode('impressions')">${t('modeImpressions')}</button>
    </div>
    ${fields}
  `;
  $('#input-card').querySelectorAll('input').forEach(inp => inp.addEventListener('input', calculate));
}

function setMode(m) { mode = m; buildInputCard(); calculate(); }

$('#info-card').innerHTML = `
  <h3 style="margin:0 0 14px;font-size:1.05em">ℹ️ CPM formulas</h3>
  <div style="font-size:.9em;line-height:1.8;opacity:.85">
    <strong>CPM</strong> = (Cost ÷ Impressions) × 1000<br>
    <strong>Cost</strong> = (CPM × Impressions) ÷ 1000<br>
    <strong>Impressions</strong> = (Cost ÷ CPM) × 1000
  </div>
  <div style="margin-top:14px;padding:12px 14px;background:var(--glass2);border-radius:10px;font-size:.85em;line-height:1.55;opacity:.85">
    <strong>📊 Typical CPMs:</strong><br>
    • Display banners: $1 - $10<br>
    • Social media ads: $5 - $15<br>
    • Video pre-roll: $10 - $30<br>
    • Premium / targeted: $20 - $50+
  </div>
`;

function calculate() {
  const cost = parseFloat($('#cost')?.value);
  const cpm = parseFloat($('#cpm')?.value);
  const imp = parseFloat($('#impressions')?.value);

  let rCPM, rCost, rImp;
  if (mode === 'cpm' && cost >= 0 && imp > 0) {
    rCPM = (cost / imp) * 1000;
    rCost = cost; rImp = imp;
  } else if (mode === 'cost' && cpm >= 0 && imp > 0) {
    rCost = (cpm * imp) / 1000;
    rCPM = cpm; rImp = imp;
  } else if (mode === 'impressions' && cost > 0 && cpm > 0) {
    rImp = (cost / cpm) * 1000;
    rCost = cost; rCPM = cpm;
  } else { $('#results').innerHTML = ''; return; }

  const cpc = rImp > 0 ? rCost / (rImp * 0.02) : 0;
  const bigVal = mode === 'cpm' ? cur(rCPM) : mode === 'cost' ? cur(rCost) : Math.round(rImp).toLocaleString();
  const bigLabel = mode === 'cpm' ? t('resultCPM') : mode === 'cost' ? t('resultCost') : t('resultImpressions');

  $('#results').innerHTML = `
    <div class="cm-section-title">${bigLabel}</div>
    <div class="cm-big">${bigVal}</div>
    <div class="cm-breakdown">
      <div class="cm-row ${mode==='cpm'?'highlight':''}"><span class="lbl">${t('resultCPM')}</span><span class="val">${cur(rCPM)}</span></div>
      <div class="cm-row ${mode==='cost'?'highlight':''}"><span class="lbl">${t('resultCost')}</span><span class="val">${cur(rCost)}</span></div>
      <div class="cm-row ${mode==='impressions'?'highlight':''}"><span class="lbl">${t('resultImpressions')}</span><span class="val">${Math.round(rImp).toLocaleString()}</span></div>
    </div>
    <div class="cm-section-title">${t('costPerClick')}</div>
    <div class="cm-breakdown">
      <div class="cm-row"><span class="lbl">${t('costPerClick')}</span><span class="val">${cur(cpc)}</span></div>
    </div>`;
}

buildInputCard();
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1', 'step2', 'step3', 'step4'],
  related: [
    {icon: '💰', href: '/calc/adsense-revenue-calculator.html', name: 'AdSense Revenue'},
    {icon: '📊', href: '/calc/ctr-calculator.html', name: 'CTR Calculator'},
    {icon: '📺', href: '/calc/youtube-revenue-calculator.html', name: 'YouTube Revenue'},
    {icon: '📈', href: '/calc/conversion-rate-calculator.html', name: 'Conversion Rate'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
