<style>
.dur-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px 0 18px}
.dur-row .opt{background:var(--glass2);border:1px solid var(--border);border-radius:999px;padding:6px 14px;cursor:pointer;font-size:.9em}
.dur-row .opt.active{background:var(--accent);color:#000;border-color:var(--accent)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:14px 0}
.stat{background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat .num{font-size:1.6em;font-weight:700;color:var(--gz-accent);font-family:monospace}
.stat .lbl{font-size:.78em;color:var(--text2);margin-top:4px}
.passage{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;line-height:1.85;font-size:1.05em;font-family:monospace;white-space:pre-wrap;user-select:none;cursor:text;min-height:120px}
.passage .ok{color:var(--text)}
.passage .bad{color:#fff;background:#e94560;border-radius:2px}
.passage .cur{background:rgba(233,69,96,.2);border-radius:2px}
.passage .pen{color:var(--text3)}
.typing-input{width:100%;min-height:80px;margin-top:14px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.9rem;color:var(--text);font-size:1rem;font-family:monospace;resize:vertical}
.typing-input:focus{outline:none;border-color:var(--accent)}
.start-cta{display:inline-block;background:var(--accent);color:#000;border:none;padding:10px 22px;border-radius:10px;font-weight:700;cursor:pointer;font-size:1em}
.start-cta:hover{filter:brightness(1.1)}
.result-card{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:18px;margin-top:18px;text-align:center}
.result-card .big{font-size:2.4em;font-weight:800;color:var(--gz-accent);font-family:monospace}
.tip{background:rgba(0,214,114,.08);border-left:3px solid var(--gz-success);padding:10px 14px;border-radius:6px;font-size:.88em;margin-top:14px}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Typing Speed Test (WPM)","description":"Test your typing speed online. Free WPM test with accuracy, CPM and timer.","url": "https://tools.gamezipper.com/zh/fun/typing-test.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a good typing speed?", "acceptedAnswer": {"@type": "Answer", "text": "Average typists type 40 WPM. 60 WPM is good for office work, 80+ WPM is fast, and professional typists reach 100-120 WPM. The world record is over 200 WPM."}}, {"@type": "Question", "name": "How is WPM calculated?", "acceptedAnswer": {"@type": "Answer", "text": "WPM = (correct characters / 5) / minutes elapsed. The standard 5-character word is used, so accuracy affects your score — typing fast with many errors may yield a lower WPM than a slower, accurate run."}}, {"@type": "Question", "name": "How can I improve my typing speed?", "acceptedAnswer": {"@type": "Answer", "text": "Practice daily for 10-15 minutes, focus on accuracy first (not speed), use all ten fingers with the home row position, and avoid looking at the keyboard. Consistency matters more than long sessions."}}, {"@type": "Question", "name": "Does the test use real words?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Each test uses a random English passage of real, common words. Punctuation and capitalization are included for a realistic typing experience."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="dur-row" id="dur"></div>
    <div class="passage" id="passage"></div>
    <textarea class="typing-input" id="typingInput" placeholder="Click 'Start' above, then start typing the passage above..." disabled></textarea>
    <div class="stats" id="stats" style="display:none">
      <div class="stat"><div class="num" id="s-wpm">0</div><div class="lbl" id="lbl-wpm">WPM</div></div>
      <div class="stat"><div class="num" id="s-acc">100</div><div class="lbl" id="lbl-acc">Accuracy %</div></div>
      <div class="stat"><div class="num" id="s-cpm">0</div><div class="lbl" id="lbl-cpm">CPM</div></div>
      <div class="stat"><div class="num" id="s-time">60</div><div class="lbl" id="lbl-time">Seconds</div></div>
    </div>
    <div class="result-card" id="result" style="display:none"></div>
    <div class="tip" id="tip"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
const TEXTS_EN=[
  "the quick brown fox jumps over the lazy dog while the sun sets behind the old oak tree in the meadow near the small village by the river",
  "a journey of a thousand miles begins with a single step so make sure you take that step today and not wait for tomorrow or any other day",
  "she sells seashells by the seashore where the waves crash gently against the smooth pebbles that have been polished by the sea for centuries",
  "to be or not to be that is the question whether tis nobler in the mind to suffer the slings and arrows of outrageous fortune or to take arms",
  "all that glitters is not gold and not all who wander are lost the old that is strong does not wither deep roots are not reached by the frost",
  "the best way to predict the future is to invent it and the people who are crazy enough to think they can change the world are the ones who do",
  "success is not final failure is not fatal it is the courage to continue that counts we must always move forward with hope and determination",
  "knowledge is power and information is liberating education is the premise of progress in every society in every family and for every person",
  "in a hole in the ground there lived a hobbit not a nasty dirty wet hole filled with the ends of worms and an oozy smell but a hobbit hole",
  "it was the best of times it was the worst of times it was the age of wisdom it was the age of foolishness it was the epoch of belief",
  "the only way to do great work is to love what you do if you have not found it yet keep looking and do not settle for anything less",
  "life is what happens when you are busy making other plans so pay attention to the small moments that make up the big picture of your life",
  "the difference between ordinary and extraordinary is that little extra so always give your best effort in everything that you set out to do",
  "do not go where the path may lead go instead where there is no path and leave a trail for others to follow and find their own way forward",
  "whether you think you can or you think you cannot you are right so choose to believe in yourself and watch as the world opens up to you"
];
const TEXTS_ZH=[
  "在浩瀚的宇宙中地球是一颗微不足道的蓝色星球但它承载着数十亿生命的希望与梦想",
  "成功不是偶然的它是日复一日坚持不懈努力的结果是汗水与泪水交织的果实",
  "人生就像一盒巧克力你永远不知道下一颗是什么味道所以请珍惜当下的每一刻",
  "无论你今天面对怎样的挑战请记住明天的太阳依然会升起希望永远都不会消失",
  "知识就是力量学习是一生的事业只有不断充实自己才能在这个快速变化的世界中立足",
  "勇气不是没有恐惧而是明知前路艰险却依然选择坚定地迈出那勇敢的一步",
  "时间是世界上最公平的东西每个人都拥有相同的二十四小时关键在于你如何利用它",
  "朋友是一生的财富真正的友谊不会因时间流逝而褪色反而会因岁月沉淀而愈发珍贵",
  "梦想是远方的灯塔指引着我们前进的方向无论路途多么遥远都不能放弃心中的理想",
  "微笑是世界上最美的语言它不需要翻译就能传递温暖与善意让世界变得更加美好"
];

GZI18n.register({
  en:{toolTitle:'Typing Speed Test',toolDesc:'Test your typing speed in WPM (words per minute). Random English passages with live WPM, accuracy and timer.',
    step1:'Pick a duration: 30s, 60s, 2min, or 5min',step2:'Click Start and begin typing the passage',step3:'Live WPM and accuracy update as you type',step4:'When the timer ends, see your final WPM, accuracy and CPM',
    dur30:'30 sec',dur60:'1 min',dur120:'2 min',dur300:'5 min',start:'Start',reset:'Reset',
    lblWpm:'WPM',lblAcc:'Accuracy',lblCpm:'CPM',lblTime:'Seconds left',
    finalWpm:'WPM',finalAcc:'Accuracy',finalCpm:'CPM',finalChars:'Characters',
    finishedAt:'Test complete!',shareLine:'Average typist: 40 WPM · Good: 60 WPM · Pro: 100+ WPM',
    tipText:'Tip: place your fingers on the home row (ASDF JKL;) and avoid looking at the keyboard.'},
  zh:{toolTitle:'打字速度测试',toolDesc:'测试你的打字速度（WPM 每分钟字数）。随机中文段落，实时显示速度、准确率和计时器。',
    step1:'选择时长：30 秒、1 分钟、2 分钟或 5 分钟',step2:'点击「开始」并开始输入文本',step3:'实时显示 WPM 和准确率',step4:'计时结束时查看最终速度、准确率和 CPM',
    dur30:'30 秒',dur60:'1 分钟',dur120:'2 分钟',dur300:'5 分钟',start:'开始',reset:'重置',
    lblWpm:'WPM',lblAcc:'准确率',lblCpm:'CPM',lblTime:'剩余秒数',
    finalWpm:'WPM',finalAcc:'准确率',finalCpm:'CPM',finalChars:'字符数',
    finishedAt:'测试完成！',shareLine:'平均：40 WPM · 良好：60 WPM · 专业：100+ WPM',
    tipText:'提示：将手指放在基准键位（ASDF JKL;）上，避免看着键盘打字。'}
});
const {$,t}=GZ;

let DURATION=60;
let PASSAGE='';
let START_TS=0;
let END_TS=0;
let TICK=null;
let ACTIVE=false;
let FINISHED=false;

function pickPassage(){
  const list=GZI18n.getLang()==='zh'?TEXTS_ZH:TEXTS_EN;
  return list[Math.floor(Math.random()*list.length)];
}

function renderPassage(){
  PASSAGE=pickPassage();
  const html=[];
  for(let i=0;i<PASSAGE.length;i++){
    const ch=PASSAGE[i];
    if(ch===' '){html.push(' ');}
    else{html.push(`<span class="pen" data-i="${i}">${ch}</span>`);}
  }
  $('#passage').innerHTML=html.join('');
}

function buildDur(){
  const items=[
    {s:30,key:'dur30'},{s:60,key:'dur60'},{s:120,key:'dur120'},{s:300,key:'dur300'}
  ];
  const html=items.map(it=>`<span class="opt${it.s===DURATION?' active':''}" data-s="${it.s}">${t(it.key)}</span>`).join('');
  $('#dur').innerHTML=html;
  $('#dur').querySelectorAll('.opt').forEach(el=>{
    el.addEventListener('click',()=>{
      if(ACTIVE)return;
      DURATION=+el.dataset.s;
      $('#dur').querySelectorAll('.opt').forEach(o=>o.classList.remove('active'));
      el.classList.add('active');
      $('#s-time').textContent=DURATION;
    });
  });
}

function startTest(){
  if(ACTIVE)return;
  ACTIVE=true;FINISHED=false;
  $('#result').style.display='none';
  $('#stats').style.display='grid';
  $('#typingInput').disabled=false;
  $('#typingInput').value='';
  $('#typingInput').focus();
  renderPassage();
  START_TS=Date.now();
  END_TS=START_TS+DURATION*1000;
  $('#s-wpm').textContent='0';$('#s-acc').textContent='100';$('#s-cpm').textContent='0';$('#s-time').textContent=DURATION;
  TICK=setInterval(()=>{
    const left=Math.max(0,Math.round((END_TS-Date.now())/1000));
    $('#s-time').textContent=left;
    if(left<=0)finishTest();
  },200);
}

function finishTest(){
  ACTIVE=false;FINISHED=true;
  clearInterval(TICK);
  $('#typingInput').disabled=true;
  const elapsed=(Date.now()-START_TS)/1000/60; // minutes
  const typed=$('#typingInput').value;
  let correct=0,total=typed.length;
  for(let i=0;i<typed.length;i++){
    if(i<PASSAGE.length&&typed[i]===PASSAGE[i])correct++;
  }
  const wpm=elapsed>0?Math.round((correct/5)/elapsed):0;
  const acc=total>0?Math.round((correct/total)*100):0;
  const cpm=elapsed>0?Math.round(total/elapsed):0;
  const html=`<div class="big">${wpm} WPM</div><p style="margin:6px 0">${t('finishedAt')}</p><p style="color:var(--text2);font-size:.9em">${t('finalAcc')}: <b>${acc}%</b> · ${t('finalCpm')}: <b>${cpm}</b> · ${t('finalChars')}: <b>${total}</b></p><p style="color:var(--text3);font-size:.8em;margin-top:8px">${t('shareLine')}</p>`;
  $('#result').innerHTML=html;
  $('#result').style.display='block';
  $('#s-wpm').textContent=wpm;$('#s-acc').textContent=acc;$('#s-cpm').textContent=cpm;
}

function reset(){
  ACTIVE=false;FINISHED=false;
  if(TICK)clearInterval(TICK);
  $('#typingInput').value='';
  $('#typingInput').disabled=true;
  $('#stats').style.display='none';
  $('#result').style.display='none';
  renderPassage();
  $('#s-wpm').textContent='0';$('#s-acc').textContent='100';$('#s-cpm').textContent='0';$('#s-time').textContent=DURATION;
}

$('#typingInput').addEventListener('input',()=>{
  if(!ACTIVE)return;
  const typed=$('#typingInput').value;
  let correct=0;
  const spans=$('#passage').querySelectorAll('span[data-i]');
  for(let i=0;i<PASSAGE.length;i++){
    const sp=spans[i];
    if(!sp)continue;
    if(i<typed.length){
      if(typed[i]===PASSAGE[i]){sp.className='ok';correct++;}
      else{sp.className='bad';}
    }else if(i===typed.length){sp.className='cur';}
    else{sp.className='pen';}
  }
  const elapsed=(Date.now()-START_TS)/1000/60;
  const wpm=elapsed>0?Math.round((correct/5)/elapsed):0;
  const acc=typed.length>0?Math.round((correct/typed.length)*100):100;
  const cpm=elapsed>0?Math.round(typed.length/elapsed):0;
  $('#s-wpm').textContent=wpm;$('#s-acc').textContent=acc;$('#s-cpm').textContent=cpm;
});

$('#toolbar').innerHTML=`<button class="gz-btn" onclick="startTest()">${t('start')}</button><button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;
buildDur();
$('#lbl-wpm').textContent=t('lblWpm');
$('#lbl-acc').textContent=t('lblAcc');
$('#lbl-cpm').textContent=t('lblCpm');
$('#lbl-time').textContent=t('lblTime');
$('#tip').textContent=t('tipText');
renderPassage();
$('#s-time').textContent=DURATION;

GZ.renderToolPage({category:'fun',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[
  {icon:'⚡',href:'/fun/reaction-time.html',name:'Reaction Time'},
  {icon:'📝',href:'/text/word-counter.html',name:'Word Counter'},
  {icon:'⌨️',href:'/dev/screen-resolution.html',name:'Screen Resolution'},
  {icon:'🎲',href:'/convert/randomizer.html',name:'Random Number'},
]});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
