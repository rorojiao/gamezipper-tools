<script>
GZI18n.register({
  en: {
    toolTitle: 'Drum Machine & Beat Maker',
    toolDesc: 'Free online drum machine with a 16-step sequencer, 8 synthesized drum sounds, BPM control and loop playback.',
    play: '▶ Play',
    stop: '⏹ Stop',
    clear: '🗑️ Clear',
    bpm: 'BPM',
    vol: 'Vol',
    step1: 'Click grid cells to place drum hits for each of the 16 steps',
    step2: 'Adjust BPM (tempo) with the slider',
    step3: 'Press Play to hear your beat loop',
    step4: 'Experiment with different patterns for kick, snare, hi-hat and more!',
  },
  zh: {
    toolTitle: '鼓机 & 节拍制作器',
    toolDesc: '免费在线鼓机，16 步序列器，8 种合成鼓声，BPM 控制和循环播放。',
    play: '▶ 播放',
    stop: '⏹ 停止',
    clear: '🗑️ 清空',
    bpm: 'BPM',
    vol: '音量',
    step1: '点击网格单元来放置每个步骤的鼓点',
    step2: '通过滑块调节 BPM（速度）',
    step3: '按播放键循环听取你的节拍',
    step4: '尝试不同的底鼓、军鼓、踩镲等组合！',
  }
});

const { $, t } = GZ;
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const drums = [
  { name: 'Kick', freq: 60, decay: 0.4, type: 'sine' },
  { name: 'Snare', freq: 200, decay: 0.15, type: 'triangle', noise: true },
  { name: 'Hi-Hat (C)', freq: 800, decay: 0.06, type: 'square', noise: true },
  { name: 'Hi-Hat (O)', freq: 800, decay: 0.25, type: 'square', noise: true },
  { name: 'Clap', freq: 400, decay: 0.12, type: 'sawtooth', noise: true },
  { name: 'Tom Hi', freq: 160, decay: 0.2, type: 'sine' },
  { name: 'Tom Lo', freq: 100, decay: 0.25, type: 'sine' },
  { name: 'Crash', freq: 600, decay: 0.6, type: 'square', noise: true },
];

const STEPS = 16;
let pattern = drums.map(() => new Array(STEPS).fill(false));
let playing = false, currentStep = -1, bpm = 120, vol = 0.7, intervalId = null;

function playDrum(d) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = d.type;
  osc.frequency.setValueAtTime(d.freq, now);
  osc.frequency.exponentialRampToValueAtTime(d.freq * 0.5, now + d.decay);
  gain.gain.setValueAtTime(vol, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + d.decay);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + d.decay + 0.01);

  if (d.noise) {
    const bufSize = audioCtx.sampleRate * d.decay;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
    const noise = audioCtx.createBufferSource();
    noise.buffer = buf;
    const ng = audioCtx.createGain();
    ng.gain.setValueAtTime(vol * 0.4, now);
    ng.gain.exponentialRampToValueAtTime(0.001, now + d.decay);
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'highpass'; filt.frequency.value = d.freq;
    noise.connect(filt); filt.connect(ng); ng.connect(audioCtx.destination);
    noise.start(now); noise.stop(now + d.decay + 0.01);
  }
}

function buildGrid() {
  let html = '';
  drums.forEach((d, row) => {
    html += `<div class="dm-label">${d.name}</div>`;
    for (let col = 0; col < STEPS; col++) {
      const marker = (col % 4 === 0) ? ' beat-marker' : '';
      html += `<div class="dm-cell${marker}${pattern[row][col] ? ' on' : ''}" data-r="${row}" data-c="${col}"></div>`;
    }
  });
  $('#grid').innerHTML = html;

  document.querySelectorAll('.dm-cell').forEach(cell => {
    cell.addEventListener('click', () => {
      const r = +cell.dataset.r, c = +cell.dataset.c;
      pattern[r][c] = !pattern[r][c];
      cell.classList.toggle('on');
      if (pattern[r][c]) playDrum(drums[r]);
    });
  });
}

function stepPlay() {
  document.querySelectorAll('.dm-cell.current').forEach(c => c.classList.remove('current'));
  currentStep = (currentStep + 1) % STEPS;
  document.querySelectorAll(`.dm-cell[data-c="${currentStep}"]`).forEach(c => c.classList.add('current'));
  drums.forEach((d, i) => { if (pattern[i][currentStep]) playDrum(d); });
}

function startPlay() {
  if (playing) return;
  playing = true;
  currentStep = -1;
  intervalId = setInterval(stepPlay, (60 / bpm / 4) * 1000);
  $('#btn-play').textContent = '⏹ Stop';
}

function stopPlay() {
  playing = false;
  clearInterval(intervalId);
  currentStep = -1;
  document.querySelectorAll('.dm-cell.current').forEach(c => c.classList.remove('current'));
  $('#btn-play').textContent = '▶ ' + (GZI18n.getLang() === 'zh' ? '播放' : 'Play');
}

$('#controls').innerHTML = `
  <button class="gz-btn" id="btn-play">${t('play')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-clear">${t('clear')}</button>
  <label>${t('bpm')} <input type="range" min="60" max="200" value="120" id="dm-bpm" style="width:80px"> <span id="bpm-val">120</span></label>
  <label>${t('vol')} <input type="range" min="0" max="100" value="70" id="dm-vol" style="width:60px"></label>
`;

$('#btn-play').onclick = () => { playing ? stopPlay() : startPlay(); };
$('#btn-clear').onclick = () => {
  pattern = drums.map(() => new Array(STEPS).fill(false));
  stopPlay(); buildGrid();
};
$('#dm-bpm').oninput = e => {
  bpm = +e.target.value; $('#bpm-val').textContent = bpm;
  if (playing) { clearInterval(intervalId); intervalId = setInterval(stepPlay, (60 / bpm / 4) * 1000); }
};
$('#dm-vol').oninput = e => { vol = e.target.value / 100; };

buildGrid();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎼', href:'/fun/metronome.html', name:'Metronome'},
    {icon:'🎹', href:'/fun/piano.html', name:'Piano'},
    {icon:'🎹', href:'/fun/chord-progression.html', name:'Chords'},
  ]
});
</script>
