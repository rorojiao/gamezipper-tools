<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is semantic versioning (semver)?", "acceptedAnswer": {"@type": "Answer", "text": "Semantic Versioning 2.0.0 (semver) is a version numbering scheme: MAJOR.MINOR.PATCH. Increment MAJOR for incompatible API changes, MINOR for new backward-compatible features, and PATCH for backward-compatible bug fixes. Optional pre-release (-alpha.1) and build metadata (+20260101) tags can be appended."}}, {"@type": "Question", "name": "How do I compare two semver versions?", "acceptedAnswer": {"@type": "Answer", "text": "Compare the MAJOR, then MINOR, then PATCH numerically. Pre-release versions have lower precedence than the normal version (1.0.0-alpha < 1.0.0). Build metadata (+sha) is ignored for precedence. This tool does the comparison instantly and explains the result."}}, {"@type": "Question", "name": "When should I bump the major version?", "acceptedAnswer": {"@type": "Answer", "text": "Bump MAJOR when you make incompatible API changes — anything that would break existing consumers. If you follow strict semver, every MAJOR bump is a signal to users that they must read a migration guide before upgrading."}}, {"@type": "Question", "name": "What is a pre-release tag?", "acceptedAnswer": {"@type": "Answer", "text": "A pre-release tag like -alpha.1, -beta.2 or -rc.1 marks a version as not yet stable. Pre-release versions sort before their corresponding release (1.0.0-beta < 1.0.0). Tools like npm will not install pre-releases by default, which protects users from unstable code."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Semantic Version Calculator 🔢',
    toolDesc: 'Validate, bump, build and compare semantic versions (semver 2.0.0). Test MAJOR.MINOR.PATCH with pre-release and build metadata — instant, free, browser-only.',
    valid: '✓ Valid semver',
    invalid: '✗ Invalid semver — must be MAJOR.MINOR.PATCH with optional -prerelease and +build',
    newer: 'NEWER',
    older: 'OLDER',
    equal: 'EQUAL',
    step1: 'Enter a version to validate and bump (major/minor/patch)',
    step2: 'Use Build mode to assemble a version with pre-release and build metadata',
    step3: 'Compare two versions to see which is newer',
    step4: 'Click Copy next to any result to use it in package.json, git tag, etc.',
  },
  zh: {
    toolTitle: '语义版本计算器 🔢',
    toolDesc: '验证、递增、构建和比较语义化版本号（semver 2.0.0）。测试 MAJOR.MINOR.PATCH 含预发布和构建元数据 — 即时、免费、浏览器本地运行。',
    valid: '✓ 有效的 semver',
    invalid: '✗ 无效的 semver — 必须为 MAJOR.MINOR.PATCH，可选 -prerelease 和 +build',
    newer: '更新',
    older: '更旧',
    equal: '相等',
    step1: '输入版本号以验证和递增（major/minor/patch）',
    step2: '使用构建模式组装带预发布和构建元数据的版本',
    step3: '比较两个版本查看哪个更新',
    step4: '点击任意结果旁的复制按钮，用于 package.json、git tag 等',
  }
});

const { $, $$, t } = GZ;

const SEMVER_RE = /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$/;

function parseSemver(v) {
  const m = SEMVER_RE.exec((v || '').trim());
  if (!m) return null;
  return { major: +m[1], minor: +m[2], patch: +m[3], prerelease: m[4] || '', build: m[5] || '' };
}

function formatSemver(p) {
  let s = `${p.major}.${p.minor}.${p.patch}`;
  if (p.prerelease) s += '-' + p.prerelease;
  if (p.build) s += '+' + p.build;
  return s;
}

// Pre-release precedence per semver spec
function cmpIdentifiers(a, b) {
  const ai = a.split('.');
  const bi = b.split('.');
  for (let i = 0; i < Math.max(ai.length, bi.length); i++) {
    if (i >= ai.length) return -1; // shorter prerelease is higher precedence (so this side has fewer = higher)
    if (i >= bi.length) return 1;
    const an = /^[0-9]+$/.test(ai[i]);
    const bn = /^[0-9]+$/.test(bi[i]);
    if (an && bn) {
      const na = +ai[i], nb = +bi[i];
      if (na < nb) return -1;
      if (na > nb) return 1;
    } else if (an) {
      return -1; // numeric < alphanumeric
    } else if (bn) {
      return 1;
    } else {
      if (ai[i] < bi[i]) return -1;
      if (ai[i] > bi[i]) return 1;
    }
  }
  return 0;
}

function compareSemver(a, b) {
  if (a.major !== b.major) return a.major < b.major ? -1 : 1;
  if (a.minor !== b.minor) return a.minor < b.minor ? -1 : 1;
  if (a.patch !== b.patch) return a.patch < b.patch ? -1 : 1;
  // No prerelease > has prerelease
  if (!a.prerelease && b.prerelease) return 1;
  if (a.prerelease && !b.prerelease) return -1;
  if (a.prerelease && b.prerelease) return cmpIdentifiers(a.prerelease, b.prerelease);
  return 0;
}

function validateInput() {
  const v = $('#ver-input').value.trim();
  const p = parseSemver(v);
  const el = $('#ver-valid');
  const inp = $('#ver-input');
  if (!v) { el.textContent = ''; el.className = 'sv-valid'; inp.classList.remove('invalid'); return null; }
  if (p) {
    el.textContent = t('valid');
    el.className = 'sv-valid ok';
    inp.classList.remove('invalid');
  } else {
    el.textContent = t('invalid');
    el.className = 'sv-valid bad';
    inp.classList.add('invalid');
  }
  return p;
}

function bump(type) {
  const p = validateInput();
  if (!p) { $('#bump-out').textContent = '—'; return; }
  const out = { ...p };
  if (type === 'major') {
    out.major++;
    out.minor = 0;
    out.patch = 0;
    out.prerelease = '';
  } else if (type === 'minor') {
    out.minor++;
    out.patch = 0;
    out.prerelease = '';
  } else if (type === 'patch') {
    out.patch++;
    out.prerelease = '';
  } else if (type === 'prerelease') {
    // bump prerelease or start a new one
    if (out.prerelease) {
      const m = out.prerelease.match(/^(.*?)(\d+)$/);
      if (m) out.prerelease = m[1] + (+m[2] + 1);
      else out.prerelease = out.prerelease + '.1';
    } else {
      out.patch++;
      out.prerelease = 'alpha.1';
    }
  }
  out.build = ''; // build metadata is dropped on bump
  $('#bump-out').textContent = formatSemver(out);
}

function build() {
  const major = parseInt($('#b-major').value) || 0;
  const minor = parseInt($('#b-minor').value) || 0;
  const patch = parseInt($('#b-patch').value) || 0;
  let pre = ($('#b-pre').value || '').trim();
  let build = ($('#b-build').value || '').trim();
  // strip leading - and +
  pre = pre.replace(/^[-+]/, '');
  build = build.replace(/^[-+]/, '');
  const out = { major, minor, patch, prerelease: pre, build };
  const formatted = formatSemver(out);
  $('#build-out').textContent = formatted;
  return formatted;
}

function compare() {
  const a = parseSemver($('#cmp-a').value.trim());
  const b = parseSemver($('#cmp-b').value.trim());
  const el = $('#cmp-result');
  const ex = $('#cmp-explain');
  if (!a || !b) {
    el.textContent = '—';
    el.className = 'sv-cmp-result eq';
    ex.textContent = a && b ? '' : (a ? 'B is invalid' : 'A is invalid');
    return;
  }
  const c = compareSemver(a, b);
  if (c > 0) {
    el.textContent = `${$('#cmp-a').value} > ${$('#cmp-b').value}`;
    el.className = 'sv-cmp-result gt';
    ex.textContent = `${t('newer')}`;
  } else if (c < 0) {
    el.textContent = `${$('#cmp-a').value} < ${$('#cmp-b').value}`;
    el.className = 'sv-cmp-result lt';
    ex.textContent = `${t('older')}`;
  } else {
    el.textContent = `${$('#cmp-a').value} = ${$('#cmp-b').value}`;
    el.className = 'sv-cmp-result eq';
    ex.textContent = `${t('equal')}`;
  }
}

$('#ver-input').addEventListener('input', validateInput);
$$('.sv-btn[data-bump]').forEach(b => b.addEventListener('click', () => bump(b.dataset.bump)));
$('#bump-copy').addEventListener('click', () => GZ.copyText($('#bump-out').textContent));
['b-major','b-minor','b-patch','b-pre','b-build'].forEach(id => $('#' + id).addEventListener('input', build));
$('#build-copy').addEventListener('click', () => GZ.copyText($('#build-out').textContent));
['cmp-a','cmp-b'].forEach(id => $('#' + id).addEventListener('input', compare));

validateInput();
bump('patch'); // initialize
build();
compare();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1', 'step2', 'step3', 'step4'],
  related: [
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'🌿', href:'/dev/git-branch-name-generator.html', name:'Git Branch Gen'},
    {icon:'⏲️', href:'/dev/cron.html', name:'Cron Tool'},
    {icon:'🔑', href:'/dev/password-generator.html', name:'Password Gen'},
  ]
});
</script>
