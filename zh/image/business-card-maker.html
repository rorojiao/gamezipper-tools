.bc-tpl:hover,.bc-tpl.active{border-color:var(--gz-accent);transform:scale(1.05)}

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="bc-templates" id="templates"></div>
    <div class="bc-layout">
      <div class="bc-editor">
        <div class="bc-form" id="cardForm"></div>
      </div>

        <div class="bc-card" id="cardPreview"></div>

      </div>

  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Business Card Maker',
    toolDesc: 'Design professional business cards online for free. Customize text, colors, layout and export as PNG — no watermark, no signup.',
    fullName: 'Full Name',
    jobTitle: 'Job Title',
    company: 'Company',
    phone: 'Phone',
    email: 'Email',
    website: 'Website',
    bgColor: 'Background',
    textColor: 'Text Color',
    accentColor: 'Accent',
    exportPNG: 'Export PNG',
    template: 'Template',
    step1: 'Choose a template style from the options above',
    step2: 'Fill in your name, title, company, and contact details',
    step3: 'Customize colors using the color pickers',
    step4: 'Click Export PNG to download your business card',
  },
  zh: {
    toolTitle: '名片制作工具',
    toolDesc: '在线设计专业名片，完全免费。自定义文字、颜色、布局并导出为 PNG — 无水印、无需注册。',
    fullName: '姓名',
    jobTitle: '职位',
    company: '公司',
    phone: '电话',
    email: '邮箱',
    website: '网站',
    bgColor: '背景色',
    textColor: '文字色',
    accentColor: '强调色',
    exportPNG: '导出 PNG',
    template: '模板',
    step1: '从上方选择一个模板风格',
    step2: '填写姓名、职位、公司和联系方式',
    step3: '使用颜色选择器自定义配色',
    step4: '点击「导出 PNG」下载名片',
  }
});

const { $, t } = GZ;

const templates = [
  { name: 'Modern Dark', bg: '#1a1a2e', text: '#ffffff', accent: '#4A90D9' },
  { name: 'Classic White', bg: '#ffffff', text: '#333333', accent: '#2c3e50' },
  { name: 'Gradient Blue', bg: 'linear-gradient(135deg,#667eea,#764ba2)', text: '#ffffff', accent: '#fff' },
  { name: 'Green Nature', bg: 'linear-gradient(135deg,#11998e,#38ef7d)', text: '#ffffff', accent: '#fff' },
  { name: 'Sunset', bg: 'linear-gradient(135deg,#f093fb,#f5576c)', text: '#ffffff', accent: '#fff' },
  { name: 'Elegant', bg: '#2c3e50', text: '#ecf0f1', accent: '#e74c3c' },
  { name: 'Minimal', bg: '#f5f5f5', text: '#222222', accent: '#333' },
  { name: 'Ocean', bg: 'linear-gradient(135deg,#0093E9,#80D0C7)', text: '#ffffff', accent: '#fff' },
];

let currentTpl = 0;
let cardData = {
  name: 'John Smith', title: 'Software Engineer', company: 'TechCorp Inc.',
  phone: '+1 (555) 123-4567', email: 'john@techcorp.com', website: 'www.techcorp.com'
};
let cardStyle = { ...templates[0] };

function renderTemplates() {
  let html = `<strong style="font-size:.85em;color:var(--gz-muted)">${t('template')}:</strong> `;
  templates.forEach((tpl, i) => {
    const bg = tpl.bg.includes('gradient') ? tpl.bg : tpl.bg;
    html += `<div class="bc-tpl ${i===currentTpl?'active':''}" style="background:${bg};color:${tpl.text}" onclick="selectTpl(${i})">${tpl.name}</div>`;
  });
  $('#templates').innerHTML = html;
}

function selectTpl(i) {
  currentTpl = i;
  cardStyle = { bg: templates[i].bg, text: templates[i].text, accent: templates[i].accent };
  document.getElementById('inp-bg').value = templates[i].bg.startsWith('#') ? templates[i].bg : '#1a1a2e';
  document.getElementById('inp-text').value = templates[i].text.startsWith('#') ? templates[i].text : '#ffffff';
  document.getElementById('inp-accent').value = templates[i].accent.startsWith('#') ? templates[i].accent : '#ffffff';
  renderTemplates();
  renderCard();
}

function renderForm() {
  $('#cardForm').innerHTML = `
    <div class="row"><div><label>${t('fullName')}</label><input id="inp-name" value="${cardData.name}" oninput="updateData()"></div><div><label>${t('jobTitle')}</label><input id="inp-title" value="${cardData.title}" oninput="updateData()"></div></div>
    <div><label>${t('company')}</label><input id="inp-company" value="${cardData.company}" oninput="updateData()"></div>
    <div class="row"><div><label>${t('phone')}</label><input id="inp-phone" value="${cardData.phone}" oninput="updateData()"></div><div><label>${t('email')}</label><input id="inp-email" value="${cardData.email}" oninput="updateData()"></div></div>
    <div><label>${t('website')}</label><input id="inp-website" value="${cardData.website}" oninput="updateData()"></div>
    <div class="bc-color-row">
      <div><label>${t('bgColor')}</label><input type="color" id="inp-bg" value="${cardStyle.bg.startsWith('#')?cardStyle.bg:'#1a1a2e'}" onchange="updateColors()"></div>
      <div><label>${t('textColor')}</label><input type="color" id="inp-text" value="${cardStyle.text.startsWith('#')?cardStyle.text:'#ffffff'}" onchange="updateColors()"></div>
      <div><label>${t('accentColor')}</label><input type="color" id="inp-accent" value="${cardStyle.accent.startsWith('#')?cardStyle.accent:'#4A90D9'}" onchange="updateColors()"></div>
    </div>`;

  $('#actions').innerHTML = `<button class="gz-btn" onclick="exportPNG()">${t('exportPNG')}</button>`;
}

function updateData() {
  cardData.name = $('#inp-name').value;
  cardData.title = $('#inp-title').value;
  cardData.company = $('#inp-company').value;
  cardData.phone = $('#inp-phone').value;
  cardData.email = $('#inp-email').value;
  cardData.website = $('#inp-website').value;
  renderCard();
}

function updateColors() {
  cardStyle.bg = $('#inp-bg').value;
  cardStyle.text = $('#inp-text').value;
  cardStyle.accent = $('#inp-accent').value;
  currentTpl = -1;
  renderTemplates();
  renderCard();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function renderCard() {
  const c = $('#cardPreview');
  const bg = cardStyle.bg.includes('gradient') ? cardStyle.bg : cardStyle.bg;
  c.style.background = bg;
  c.style.color = cardStyle.text;
  c.innerHTML = `
    <h2>${esc(cardData.name) || '&nbsp;'}</h2>
    <div class="title" style="color:${cardStyle.accent}">${esc(cardData.title) || '&nbsp;'}</div>
    <div style="margin-top:4px;font-size:.85em;opacity:.7">${esc(cardData.company) || '&nbsp;'}</div>
    <div class="details">
      ${cardData.phone ? `<span>📞 ${esc(cardData.phone)}</span>` : ''}
      ${cardData.email ? `<span>✉️ ${esc(cardData.email)}</span>` : ''}
      ${cardData.website ? `<span>🌐 ${esc(cardData.website)}</span>` : ''}
    </div>`;
}

function exportPNG() {
  const el = $('#cardPreview');
  const canvas = document.createElement('canvas');
  canvas.width = 840; canvas.height = 480;
  const ctx = canvas.getContext('2d');

  // Background
  if (cardStyle.bg.includes('gradient')) {
    const grd = ctx.createLinearGradient(0, 0, 840, 480);
    const colors = cardStyle.bg.match(/#[a-f0-9]{6}/gi);
    if (colors) { colors.forEach((c, i) => grd.addColorStop(i / Math.max(colors.length - 1, 1), c)); }
    ctx.fillStyle = grd;
  } else {
    ctx.fillStyle = cardStyle.bg;
  }
  ctx.fillRect(0, 0, 840, 480);

  // Round corners mask
  ctx.globalCompositeOperation = 'destination-in';
  ctx.beginPath();
  ctx.roundRect(0, 0, 840, 480, 24);
  ctx.fill();
  ctx.globalCompositeOperation = 'source-over';

  // Text
  ctx.fillStyle = cardStyle.text;
  ctx.font = 'bold 44px sans-serif';
  ctx.fillText(cardData.name, 56, 80);
  ctx.fillStyle = cardStyle.accent;
  ctx.font = '28px sans-serif';
  ctx.fillText(cardData.title, 56, 118);
  ctx.fillStyle = cardStyle.text;
  ctx.globalAlpha = 0.7;
  ctx.font = '26px sans-serif';
  ctx.fillText(cardData.company, 56, 154);
  ctx.globalAlpha = 1;

  // Details
  ctx.font = '24px sans-serif';
  let y = 360;
  if (cardData.phone) { ctx.fillText('📞 ' + cardData.phone, 56, y); y += 34; }
  if (cardData.email) { ctx.fillText('✉️ ' + cardData.email, 56, y); y += 34; }
  if (cardData.website) { ctx.fillText('🌐 ' + cardData.website, 56, y); }

  const a = document.createElement('a');
  a.download = 'business-card.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

renderTemplates();
renderForm();
renderCard();

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/image/watermark.html', name:'Watermark'},
    {icon:'🖼️', href:'/image/signature-generator.html', name:'Signature Generator'},
    {icon:'📐', href:'/image/social-media-resizer.html', name:'Social Media Resizer'},
    {icon:'🎭', href:'/image/avatar-generator.html', name:'Avatar Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
