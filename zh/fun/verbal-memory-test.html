<script>
GZI18n.register({
  en:{toolTitle:'Verbal Memory Test',toolDesc:'Words flash one at a time.',start:'Click to start',seen:'SEEN',isNew:'NEW',score:'Score',lives:'Lives',best:'Best',restart:'Restart',gameOver:'Game Over',tip:'Seen or New?',step1:'Click to start',step2:'Seen or new?',step3:'Click SEEN or NEW',step4:'3 wrong = game over'},
  zh:{toolTitle:'词汇记忆测试',toolDesc:'词汇逐一闪现。你之前见过这个词吗，还是新词？测试你的词汇工作记忆。你有 3 条命 — 平均水平为 20+ 个词。',start:'点击开始',seen:'见过',isNew:'新的',score:'得分',lives:'生命',best:'最佳',restart:'重新开始',gameOver:'游戏结束',tip:'见过还是新的？你有 3 条命。答错失去一条命。',step1:'点击区域开始。屏幕显示一个词',step2:'判断：这个词你在这轮中见过吗？',step3:'见过点"见过"，没见过点"新的"',step4:'答错 3 次游戏结束。得分 = 正确次数'}
});
const { $, t } = GZ;
const WORD_BANK=['apple','river','cloud','dragon','sunset','forest','whisper','castle','thunder','mirror','velvet','candle','ocean','pencil','garden','silent','crystal','shadow','summer','window','bridge','flower','planet','rocket','tiger','silver','golden','puzzle','secret','vintage','circle','nature','breeze','frost','ember','jungle','meadow','nectar','orchid','pebble','quartz','ribbon','spider','ticket','umber','violet','walnut','yacht','zebra','amber','bottle','canyon','desert','eagle','feather','gravel','horizon','island','jacket','kingdom','lantern','marble','needle','orange','palace','quiver','record','sculpt','temple','urgent','valley','winter','yellow','zigzag','autumn','copper','dancer','echo','falcon','glimpse','harbor','ignite','journey','kettle','ladder','magnet','novel','oxygen','painter','random','safari','tempest','unique','vortex','wander','zenith','blossom','cascade','dolphin','enigma','fragile','granite','hollow','jasmine','lagoon','nomad','obsidian','paradox','rhythm','serene','velocity','willow','zephyr','blaze','circuit','dawn','effort','fringe','glimmer','haven','ivory','jewel','kindle','lunar','mystery','nest','oasis','petal','quench','radiant','sapphire','tranquil','umbra','vivid'];
let seenWords=new Set(),currentWord='',score=0,lives=3,best=0,playing=false;
function pickWord(){if(seenWords.size>2&&Math.random()<0.4){const a=[...seenWords];return a[Math.floor(Math.random()*a.length)];}let w,tries=0;do{w=WORD_BANK[Math.floor(Math.random()*WORD_BANK.length)];tries++;}while(seenWords.has(w)&&tries<50);return w;}
function nextWord(){currentWord=pickWord();const st=$('#stage');st.className='stage';st.innerHTML=`<span class="lvl-badge">${t('score')}: ${score}</span><div class="word-display">${currentWord}</div><div class="btn-row"><button class="big-btn btn-seen" onclick="answer(true)">${t('seen')}</button><button class="big-btn btn-new" onclick="answer(false)">${t('isNew')}</button></div>`;}
function answer(userSaysSeen){const wasSeen=seenWords.has(currentWord);const correct=(userSaysSeen===wasSeen);const st=$('#stage');st.className='stage '+(correct?'flash-correct':'flash-wrong');if(correct){score++;if(!wasSeen)seenWords.add(currentWord);}else{lives--;if(!wasSeen)seenWords.add(currentWord);}if(score>best)best=score;renderStats();if(lives<=0){gameOver();return;}setTimeout(nextWord,250);}
function gameOver(){playing=false;const st=$('#stage');st.className='stage';st.innerHTML=`<div style="font-size:2em;font-weight:900;color:#e94560">${t('gameOver')}</div><div style="font-size:1.4em;margin:12px 0">${t('score')}: <b style="color:var(--gz-accent)">${score}</b></div><button class="gz-btn" onclick="restart()" style="font-size:1.2em;padding:12px 28px">🔄 ${t('restart')}</button>`;}
function restart(){seenWords=new Set();score=0;lives=3;playing=true;renderStats();nextWord();}
function renderStats(){$('#stats').innerHTML=`<div class="stat"><div class="num">${score}</div><div class="lbl">${t('score')}</div></div><div class="stat"><div class="num" style="color:#e94560">${'❤'.repeat(Math.max(0,lives))}${'🖤'.repeat(3-Math.max(0,lives))}</div><div class="lbl">${t('lives')}</div></div><div class="stat"><div class="num">${best}</div><div class="lbl">${t('best')}</div></div>`;}
function init(){playing=false;$('#stage').className='stage';$('#stage').innerHTML=`<div style="font-size:1.6em;font-weight:700;color:var(--text2)">${t('start')}</div>`;renderStats();}
$('#stage').addEventListener('click',(e)=>{if(!playing&&!e.target.closest('.big-btn')&&!e.target.closest('.gz-btn')){if(!playing)restart();}});
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="init()">🔄 ${t('restart')}</button>`;
GZ.renderToolPage({category:'fun',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{icon:'🔢',href:'/zh/fun/number-memory-test.html',name:'数字记忆测试'},{icon:'🧠',href:'/zh/fun/visual-memory-test.html',name:'视觉记忆测试'},{icon:'⚡',href:'/zh/fun/reaction-time.html',name:'反应速度测试'},{icon:'🐵',href:'/zh/fun/chimp-test.html',name:'黑猩猩记忆测试'}]});
init();
</script>
