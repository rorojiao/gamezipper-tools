// Convert HEX → RGB
function hexToRgb(hex) {
  let h = hex.replace('#', '').trim();
  if (h.length === 3) h = h.split('').map(c => c + c).join('');
  if (!/^[0-9A-Fa-f]{6}$/.test(h)) return null;
  return {
    r: parseInt(h.substring(0, 2), 16),
    g: parseInt(h.substring(2, 4), 16),
    b: parseInt(h.substring(4, 6), 16),
  };
}

// sRGB → linear
function srgbToLinear(c) {
  c = c / 255;
  return c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
}

// RGB → XYZ (D65)
function rgbToXyz({r, g, b}) {
  const R = srgbToLinear(r), G = srgbToLinear(g), B = srgbToLinear(b);
  return {
    x: (R * 0.4124564 + G * 0.3575761 + B * 0.1804375) * 100,
    y: (R * 0.2126729 + G * 0.7151522 + B * 0.0721750) * 100,
    z: (R * 0.0193339 + G * 0.1191920 + B * 0.9503041) * 100,
  };
}

// XYZ → Lab (D65)
function xyzToLab({x, y, z}) {
  const Xn = 95.047, Yn = 100.0, Zn = 108.883;
  const fx = x / Xn > 0.008856 ? Math.cbrt(x / Xn) : (x / Xn) * 7.787 + 16 / 116;
  const fy = y / Yn > 0.008856 ? Math.cbrt(y / Yn) : (y / Yn) * 7.787 + 16 / 116;
  const fz = z / Zn > 0.008856 ? Math.cbrt(z / Zn) : (z / Zn) * 7.787 + 16 / 116;
  return {
    L: 116 * fy - 16,
    a: 500 * (fx - fy),
    b: 200 * (fy - fz),
  };
}

function rgbToLab(rgb) {
  return xyzToLab(rgbToXyz(rgb));
}

// Delta-E (CIE76)
function deltaE(lab1, lab2) {
  return Math.sqrt(
    Math.pow(lab1.L - lab2.L, 2) +
    Math.pow(lab1.a - lab2.a, 2) +
    Math.pow(lab1.b - lab2.b, 2)
  );
}

// Pre-compute Lab for library
const PANTONE_LAB = PANTONE_LIBRARY.map(p => {
  const rgb = hexToRgb(p.hex);
  return { ...p, lab: rgbToLab(rgb) };
});

function findPantone(hex) {
  const rgb = hexToRgb(hex);
  if (!rgb) return null;
  const inputLab = rgbToLab(rgb);
  const scored = PANTONE_LAB.map(p => ({ ...p, dist: deltaE(inputLab, p.lab) }));
  scored.sort((a, b) => a.dist - b.dist);
  return { input: rgb, lab: inputLab, matches: scored.slice(0, 5) };
}

function renderResults(hex) {
  const result = findPantone(hex);
  if (!result) {
    $('#results').innerHTML = '';
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">Invalid HEX color</span>`;
    return;
  }
  const { input, matches } = result;
  const quality = matches[0].dist < 2 ? 'Excellent' : matches[0].dist < 5 ? 'Very good' : matches[0].dist < 10 ? 'Good' : 'Approximate';
  let html = '';
  matches.forEach((m, i) => {
    const badge = i === 0 ? `<span class="match-badge">${t('nearestMatch')}</span>` : '';
    const qualityLabel = i === 0 ? `<span class="dist-badge">${quality} · ${t('distance')}: ${m.dist.toFixed(2)}</span>` : `<span class="dist-badge">${t('distance')}: ${m.dist.toFixed(2)}</span>`;
    html += `<div class="result-row">
      <div class="swatch" style="background:${m.hex};border-color:${i===0?'var(--gz-success)':'var(--border)'}"></div>
      <div class="info">
        <b>${m.code}</b> ${badge}
        <div class="meta">${m.hex} · ${qualityLabel}</div>
      </div>
      <button class="gz-btn gz-btn-sm" onclick="copyText('${m.code}')">${t('copy')}</button>
    </div>`;
  });
  // Also show the input swatch
  const inputHex = '#' + [input.r, input.g, input.b].map(v => v.toString(16).padStart(2, '0')).join('').toUpperCase();
  html = `<div class="result-row" style="background:var(--glass)">
    <div class="swatch" style="background:${inputHex};border-color:var(--gz-accent)"></div>
    <div class="info"><b>${inputHex}</b> <span class="dist-badge">RGB(${input.r}, ${input.g}, ${input.b})</span></div>
  </div>` + html;
  $('#results').innerHTML = html;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ Found ${matches.length} closest matches</span>`;
}

const hexInput = $('#hexInput');
const colorPicker = $('#colorPicker');

hexInput.addEventListener('input', () => {
  const v = hexInput.value.trim();
  if (/^#?[0-9A-Fa-f]{6}$/.test(v)) {
    const hex = v.startsWith('#') ? v : '#' + v;
    colorPicker.value = hex;
    renderResults(hex);
  } else {
    $('#results').innerHTML = '';
    $('#status').innerHTML = '';
  }
});

colorPicker.addEventListener('input', () => {
  hexInput.value = colorPicker.value.toUpperCase();
  renderResults(colorPicker.value);
});

$('#findBtn').addEventListener('click', () => renderResults(hexInput.value));
$('#copyBtn').addEventListener('click', () => copyText(hexInput.value));
