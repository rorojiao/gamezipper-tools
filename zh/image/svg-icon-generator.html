let selectedIcon = 'home';

function renderIconGrid(filter = '') {
  const q = filter.toLowerCase();
  $('#icon-grid').innerHTML = Object.keys(ICONS).filter(k => !q || k.includes(q)).map(k => {
    return `<div class="icon-cell${k===selectedIcon?' selected':''}" onclick="selectIcon('${k}')" title="${k}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${ICONS[k]}"/></svg></div>`;
  }).join('');
}

function selectIcon(name) {
  selectedIcon = name;
  document.querySelectorAll('.icon-cell').forEach(c => c.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  updatePreview();
}

function updatePreview() {
  const size = +$('#ctl-size').value;
  const color = $('#ctl-color').value;
  const strokeW = +$('#ctl-stroke').value;
  const mode = $('#ctl-mode').value;
  const rotate = +$('#ctl-rotate').value;
  $('#size-val').textContent = size + 'px';
  $('#stroke-val').textContent = strokeW;
  $('#rotate-val').textContent = rotate + '°';

  const path = ICONS[selectedIcon] || ICONS.home;
  const fillAttr = mode === 'fill' ? `fill="${color}"` : 'fill="none"';
  const strokeAttr = mode === 'fill' ? 'stroke="none"' : `stroke="${color}"`;
  const transform = rotate ? ` transform="rotate(${rotate} ${size/2} ${size/2})"` : '';
  const vb = '0 0 24 24';
  const svgCode = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="${vb}" ${fillAttr} ${strokeAttr} stroke-width="${strokeW}" stroke-linecap="round" stroke-linejoin="round"${transform}><path d="${path}"/></svg>`;

  $('#preview').innerHTML = `<div style="transform:scale(1)">${svgCode}</div>`;
  $('#code-output').textContent = svgCode;
}

function updateBg() {
  const cls = $('#ctl-bg').value;
  const preview = $('#preview');
  preview.className = 'preview-box ' + cls;
}

function downloadSVG() {
  const code = $('#code-output').textContent;
  const blob = new Blob([code], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = selectedIcon + '.svg';
  a.click();
  URL.revokeObjectURL(url);
}

$('#icon-search').addEventListener('input', e => renderIconGrid(e.target.value));

// Labels
$('#lbl-size').textContent = t('lblSize');
$('#lbl-color').textContent = t('lblColor');
$('#lbl-stroke').textContent = t('lblStroke');
$('#lbl-mode').textContent = t('lblMode');
$('#lbl-rotate').textContent = t('lblRotate');
$('#lbl-bg').textContent = t('lblBg');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#code-output').textContent)">${t('copySvg')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(ICONS[selectedIcon]||'')">${t('copyPath')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadSVG()">${t('download')}</button>`;

renderIconGrid();
updatePreview();
