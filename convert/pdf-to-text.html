<script>
GZI18n.register({
  en: {
    toolTitle: 'PDF to Text Converter',
    toolDesc: 'Extract text from any PDF file instantly. Free, browser-based PDF text extraction — no upload to servers.',
    dzText: 'Drop your PDF here or click to upload',
    extracting: '⏳ Extracting text... page {n} / {total}',
    done: '✓ Extracted {n} characters from {p} page(s)',
    error: '✗ Error: {msg}',
    noText: 'No text found in this PDF. It may be a scanned image — try our OCR tool.',
    step1: 'Upload a PDF file by clicking or dragging it into the drop zone',
    step2: 'The tool extracts text from every page automatically',
    step3: 'Review the extracted text in the output area',
    step4: 'Copy the text or download it as a .txt file',
    page: 'Page',
  },
  zh: {
    toolTitle: 'PDF 转文本工具',
    toolDesc: '即时从 PDF 文件中提取文本。免费、浏览器本地运行，无需上传到服务器。',
    dzText: '将 PDF 拖到此处或点击上传',
    extracting: '⏳ 正在提取文本... 第 {n} / {total} 页',
    done: '✓ 从 {p} 页中提取了 {n} 个字符',
    error: '✗ 错误：{msg}',
    noText: '此 PDF 中未找到文本。可能是扫描件 — 请尝试我们的 OCR 工具。',
    step1: '点击或拖拽 PDF 文件到上传区域',
    step2: '工具会自动从每一页提取文本',
    step3: '在输出区查看提取的文本',
    step4: '复制文本或下载为 .txt 文件',
    page: '第',
  }
});

const { $, copyText, t } = GZ;
let pdfjsReady = false;

function loadPdfJs(cb) {
  if (pdfjsReady) { cb(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
  s.onload = function() {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    pdfjsReady = true;
    cb();
  };
  s.onerror = function() {
    $('#status').innerHTML = '<span style="color:var(--gz-accent)">' + t('error').replace('{msg}', 'Failed to load pdf.js') + '</span>';
  };
  document.head.appendChild(s);
}

function handleFile(file) {
  if (!file || file.type !== 'application/pdf') return;
  loadPdfJs(async function() {
    const out = $('#output');
    out.innerHTML = '';
    try {
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
      const total = pdf.numPages;
      let allText = '';
      for (let i = 1; i <= total; i++) {
        $('#status').innerHTML = t('extracting').replace('{n}', i).replace('{total}', total);
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        const pageText = content.items.map(function(item) { return item.str; }).join(' ');
        if (pageText.trim()) {
          allText += (i > 1 ? '\n\n--- ' + t('page') + ' ' + i + ' ---\n\n' : '') + pageText;
        }
        // Render progressively
        out.innerHTML = allText.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') || '<em style="opacity:.5">' + t('noText') + '</em>';
      }
      if (!allText.trim()) {
        out.innerHTML = '<em style="opacity:.5">' + t('noText') + '</em>';
        $('#status').innerHTML = t('noText');
      } else {
        $('#status').innerHTML = t('done').replace('{n}', allText.length).replace('{p}', total);
      }
      out.dataset.text = allText;
    } catch(e) {
      $('#status').innerHTML = '<span style="color:var(--gz-accent)">' + t('error').replace('{msg}', e.message) + '</span>';
    }
  });
}

function doDownload() {
  const text = $('#output').dataset.text || '';
  if (!text) return;
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.download = 'extracted-text.txt';
  a.href = URL.createObjectURL(blob);
  a.click();
  URL.revokeObjectURL(a.href);
}

function doCopy() {
  const text = $('#output').dataset.text || '';
  if (text) copyText(text);
}

const dz = $('#dropZone');
dz.addEventListener('click', function() { $('#fileInput').click(); });
dz.addEventListener('dragover', function(e) { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', function() { dz.classList.remove('dragover'); });
dz.addEventListener('drop', function(e) {
  e.preventDefault();
  dz.classList.remove('dragover');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
$('#fileInput').addEventListener('change', function() {
  if (this.files[0]) handleFile(this.files[0]);
});

$('#dzText').textContent = t('dzText');
$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doCopy()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDownload()">${t('download')} .txt</button>`;

GZ.renderToolPage({

});
