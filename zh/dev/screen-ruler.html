<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'On-Screen Pixel Ruler',
    toolDesc: 'Measure objects on your screen in pixels, millimeters, or inches. Adjustable DPI calibration with live crosshair guides — free, browser-based.',
    lblUnit: 'Unit',
    lblDpi: 'Screen DPI',
    fullscreen: '⛶ Fullscreen',
    step1: 'Set your screen DPI for accurate mm/inch measurements',
    step2: 'Choose the display unit (px, mm, or inches)',
    step3: 'Move your mouse over the ruler area to see live coordinates',
    step4: 'Click and drag to measure the distance between two points',
    hint: '💡 Move mouse to measure position. Click & drag to measure distance.',
  },
  zh: {
    toolTitle: '屏幕像素尺',
    toolDesc: '在屏幕上测量物体，支持像素、毫米和英寸。可调节 DPI 校准，实时十字线 — 免费、浏览器本地运行。',
    lblUnit: '单位',
    lblDpi: '屏幕 DPI',
    fullscreen: '⛶ 全屏',
    step1: '设置屏幕 DPI 以获得准确的 mm/英寸测量',
    step2: '选择显示单位（px、mm 或英寸）',
    step3: '在标尺区域移动鼠标查看实时坐标',
    step4: '点击并拖拽以测量两点间距离',
    hint: '💡 移动鼠标测量位置。点击拖拽测量距离。',
  }
});

const { $, t } = GZ;

$('#lbl-unit').textContent = t('lblUnit');
$('#lbl-dpi').textContent = t('lblDpi');
$('#btn-fullscreen').textContent = t('fullscreen');
$('#status').textContent = t('hint');

const container = $('#ruler-container');
const rulerH = $('#ruler-h');
const rulerV = $('#ruler-v');
const guideV = $('#guide-v');
const guideH = $('#guide-h');
const measureBox = $('#measurement-box');

const OFFSET_X = 30, OFFSET_Y = 24;

function buildRulers() {
  const w = container.clientWidth - OFFSET_X;
  const h = container.clientHeight - OFFSET_Y;
  const unit = $('#unit').value;
  const dpi = parseInt($('#dpi').value) || 96;
  const pxToUnit = unit === 'px' ? 1 : unit === 'mm' ? (25.4 / dpi) : (1 / dpi);
  const unitLabel = unit;

  let htmlH = '';
  for (let i = 0; i <= w; i += 10) {
    const isMajor = i % 100 === 0;
    const isMid = i % 50 === 0;
    const tickH = isMajor ? 14 : isMid ? 10 : 6;
    const color = isMajor ? 'var(--accent)' : isMid ? '#aaa' : '#666';
    htmlH += `<div style="display:inline-block;width:10px;vertical-align:bottom;text-align:center">
      <div style="height:${tickH}px;border-left:1px solid ${color};margin-left:5px"></div>
      ${isMajor ? `<div style="font-size:9px;color:#aaa;margin-top:1px">${(i*pxToUnit).toFixed(unit==='px'?0:1)}</div>` : ''}
    </div>`;
  }
  rulerH.innerHTML = htmlH;
  rulerH.style.width = w + 'px';

  let htmlV = '';
  for (let i = 0; i <= h; i += 10) {
    const isMajor = i % 100 === 0;
    const isMid = i % 50 === 0;
    const tickW = isMajor ? 18 : isMid ? 12 : 7;
    const color = isMajor ? 'var(--accent)' : isMid ? '#aaa' : '#666';
    htmlV += `<div style="height:10px;line-height:10px;text-align:right;padding-right:2px">
      <div style="display:inline-block;height:1px;width:${tickW}px;background:${color};vertical-align:middle"></div>
      ${isMajor ? `<span style="font-size:8px;color:#aaa;margin-right:4px">${(i*pxToUnit).toFixed(unit==='px'?0:1)}</span>` : ''}
    </div>`;
  }
  rulerV.innerHTML = htmlV;
  rulerV.style.height = h + 'px';
}

let dragStart = null;

container.onmousemove = e => {
  const rect = container.getBoundingClientRect();
  const x = Math.round(e.clientX - rect.left - OFFSET_X);
  const y = Math.round(e.clientY - rect.top - OFFSET_Y);

  guideV.style.left = (x + OFFSET_X) + 'px';
  guideV.style.height = (container.clientHeight - OFFSET_Y) + 'px';
  guideH.style.top = (y + OFFSET_Y) + 'px';
  guideH.style.width = (container.clientWidth - OFFSET_X) + 'px';

  const unit = $('#unit').value;
  const dpi = parseInt($('#dpi').value) || 96;
  const conv = val => unit === 'px' ? val + ' px' : unit === 'mm' ? (val * 25.4 / dpi).toFixed(1) + ' mm' : (val / dpi).toFixed(2) + ' in';

  $('#rd-x').textContent = conv(Math.max(0, x));
  $('#rd-y').textContent = conv(Math.max(0, y));

  if (dragStart) {
    const dx = x - dragStart.x;
    const dy = y - dragStart.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    $('#rd-delta-label').style.display = '';
    $('#rd-delta').style.display = '';
    $('#rd-delta').textContent = conv(Math.round(dist));

    measureBox.style.display = 'block';
    measureBox.style.left = (x + OFFSET_X + 10) + 'px';
    measureBox.style.top = (y + OFFSET_Y + 10) + 'px';
    measureBox.textContent = conv(Math.round(dist));
  }
};

container.onmousedown = e => {
  const rect = container.getBoundingClientRect();
  dragStart = { x: Math.round(e.clientX - rect.left - OFFSET_X), y: Math.round(e.clientY - rect.top - OFFSET_Y) };
};

container.onmouseup = () => { dragStart = null; };
container.onmouseleave = () => { dragStart = null; measureBox.style.display = 'none'; };

$('#btn-fullscreen').onclick = () => {
  if (!document.fullscreenElement) container.requestFullscreen?.();
  else document.exitFullscreen?.();
};

$('#unit').onchange = buildRulers;
$('#dpi').onchange = buildRulers;
window.addEventListener('resize', buildRulers);

setTimeout(buildRulers, 100);

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/dev/browser-info.html', name:'Browser Info'},
    {icon:'🖥️', href:'/dev/screen-resolution-tester.html', name:'Screen Resolution'},
    {icon:'📏', href:'/fun/online-ruler.html', name:'Online Ruler'},
    {icon:'🎨', href:'/color/eyedropper-color-picker.html', name:'Color Picker'},
  ]
});
</script>

</body>
