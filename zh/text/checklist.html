<style>
.gz-split{display:flex;gap:16px;flex-wrap:wrap}
.gz-split>div{flex:1;min-width:280px}
#checklist-area{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:12px}
.progress-bar-track{height:8px;background:var(--glass2);border-radius:4px;overflow:hidden;margin-bottom:12px}
.progress-bar-fill{height:100%;background:var(--gz-success);border-radius:4px;transition:width .3s ease}
.progress-text{font-size:.85em;margin-bottom:4px;opacity:.8}
.check-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}

.check-item.done span{text-decoration:line-through;opacity:.5}
.check-item span{flex:1;font-size:.95em}
.check-item .del-btn{opacity:0;background:none;border:none;color:var(--gz-accent);cursor:pointer;font-size:.9em;padding:2px 6px}

<link rel="alternate" hreflang="x-default" href="https://tools.gamezipper.com/text/checklist.html">

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-split">
      <div><label id="lbl-in"></label><textarea id="input" rows="10" spellcheck="false" placeholder="Shopping list&#10;Buy groceries&#10;Clean kitchen&#10;Walk the dog&#10;Read a book"></textarea></div>
      <div>
        <div id="checklist-area">
          <div class="progress-text" id="progress-text">0 / 0 completed</div>
          <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
          <div id="checklist-items"></div>
          <div class="add-row">
            <input id="new-item" placeholder="Add item...">
            <button class="gz-btn" onclick="addItem()" style="font-size:.85em">+</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Checklist & Todo Generator',
    toolDesc: 'Create interactive checklists online. Add items, check them off, track progress with a visual bar. Auto-saved, exportable, free.',
    generate: 'Generate',
    export: 'Export',
    clear: 'Clear',
    completed: 'completed',
    addPlaceholder: 'Add item...',
    step1: 'Type checklist items in the text area (one per line)',
    step2: 'Click "Generate" to create the interactive checklist',
    step3: 'Check off items as you complete them — progress updates live',
    step4: 'Export the list or let it auto-save to your browser',
  },
  zh: {
    toolTitle: '清单 & 待办生成器',
    toolDesc: '在线创建交互式清单。添加事项、逐项勾选、实时进度条。自动保存、支持导出，完全免费。',
    generate: '生成',
    export: '导出',
    clear: '清空',
    completed: '已完成',
    addPlaceholder: '添加事项...',
    step1: '在文本框中输入清单事项（每行一个）',
    step2: '点击「生成」创建交互式清单',
    step3: '完成事项后勾选 — 进度条实时更新',
    step4: '导出清单或自动保存到浏览器',
  }
});

const { $, copyText, t } = GZ;
let items = [];

function loadSaved() {
  try {
    const saved = localStorage.getItem('gz-checklist');
    if (saved) { items = JSON.parse(saved); renderChecklist(); }
  } catch(e) {}
}

function save() {
  try { localStorage.setItem('gz-checklist', JSON.stringify(items)); } catch(e) {}
}

function generate() {
  const text = $('#input').value.trim();
  if (!text) return;
  items = text.split('\n').filter(l => l.trim()).map(l => ({ text: l.trim(), done: false }));
  renderChecklist();
  save();
}

function renderChecklist() {
  const done = items.filter(i => i.done).length;
  const total = items.length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  $('#progress-text').textContent = `${done} / ${total} ${t('completed')} (${pct}%)`;
  $('#progress-fill').style.width = pct + '%';
  $('#checklist-items').innerHTML = items.map((item, i) => `
    <div class="check-item ${item.done ? 'done' : ''}">
      <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleItem(${i})">
      <span>${item.text}</span>
      <button class="del-btn" onclick="removeItem(${i})">✕</button>
    </div>`).join('');
}

function toggleItem(i) { items[i].done = !items[i].done; renderChecklist(); save(); }
function removeItem(i) { items.splice(i, 1); renderChecklist(); save(); }

function addItem() {
  const input = $('#new-item');
  const val = input.value.trim();
  if (!val) return;
  items.push({ text: val, done: false });
  input.value = '';
  renderChecklist();
  save();
}

function exportList() {
  const text = items.map(i => (i.done ? '☑' : '☐') + ' ' + i.text).join('\n');
  copyText(text);
}

function clearAll() { items = []; renderChecklist(); save(); }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="exportList()">${t('export')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;

$('#new-item').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

loadSaved();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✅', href:'/text/todo.html', name:'Todo List'},
    {icon:'📒', href:'/text/sticky-notes.html', name:'Sticky Notes'},
    {icon:'🌱', href:'/fun/habit-tracker.html', name:'Habit Tracker'},
    {icon:'📝', href:'/text/notepad.html', name:'Notepad'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
