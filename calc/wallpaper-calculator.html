<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How much wallpaper is in one roll?", "acceptedAnswer": {"@type": "Answer", "text": "A standard European wallpaper roll is about 10 meters (33 feet) long and 53 cm (20.5 inches) wide, covering roughly 5 square meters (54 sq ft) per roll. American double rolls typically cover 50-60 sq ft."}}, {"@type": "Question", "name": "What is pattern repeat and why does it matter?", "acceptedAnswer": {"@type": "Answer", "text": "Pattern repeat is the vertical distance before the wallpaper design repeats itself. A larger repeat means more waste when matching strips, so you need to order extra rolls — typically 10-20% more for big repeats."}}, {"@type": "Question", "name": "How much extra wallpaper should I buy?", "acceptedAnswer": {"@type": "Answer", "text": "Always buy 10-15% extra to cover mistakes, future repairs and pattern matching. Many pros round up to the next full roll. Keep unopened rolls for returns or future patches."}}, {"@type": "Question", "name": "Should I subtract doors and windows?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Subtract the area of doors and windows for a more accurate estimate. A standard interior door is about 21 sq ft and a typical window about 12 sq ft."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Wallpaper Calculator',
    toolDesc: 'Find out exactly how many rolls of wallpaper you need for any room. Enter wall dimensions, subtract openings and account for pattern repeat — free and instant.',
    units: 'Units',
    perimeter: 'Wall Perimeter (room outline length)',
    height: 'Wall Height',
    openings: 'Door + Window Area (subtract)',
    rollWidth: 'Wallpaper Roll Width',
    rollLength: 'Wallpaper Roll Length',
    repeat: 'Pattern Repeat (0 if none)',
    waste: 'Extra Waste Allowance (%)',
    wallArea: 'Total Wall Area',
    netArea: 'Net Wallpaper Area',
    usablePerRoll: 'Usable Area per Roll',
    rollsNeeded: 'Rolls Needed',
    note: 'Tip: Always buy 10-15% extra for pattern matching, mistakes and future repairs. Standard European rolls are 0.53m × 10m; American double rolls are usually ~27in × 27ft.',
    step1: 'Measure the room perimeter (sum of all wall widths) and wall height',
    step2: 'Enter the area of doors and windows to subtract',
    step3: 'Set the wallpaper roll size and pattern repeat from the packaging',
    step4: 'Get the exact number of rolls to buy — always round up',
  },
  zh: {
    toolTitle: '壁纸用量计算器',
    toolDesc: '精确计算任意房间需要多少卷壁纸。输入墙面尺寸、扣除门窗、考虑花纹重复 — 免费即时。',
    units: '单位',
    perimeter: '墙面周长（房间轮廓总长）',
    height: '墙高',
    openings: '门窗面积（扣除）',
    rollWidth: '壁纸卷宽',
    rollLength: '壁纸卷长',
    repeat: '花纹重复长度（无则为 0）',
    waste: '额外损耗（%）',
    wallArea: '墙面总面积',
    netArea: '实际壁纸面积',
    usablePerRoll: '每卷可用面积',
    rollsNeeded: '需要卷数',
    note: '提示：花纹对齐、施工损耗和未来修补请多备 10-15%。欧标卷常见为 0.53m × 10m；美标双卷约 27in × 27ft。',
    step1: '测量房间周长（所有墙面宽度之和）和墙高',
    step2: '输入门窗面积用于扣除',
    step3: '按包装说明设置壁纸卷尺寸和花纹重复',
    step4: '获取需要购买的精确卷数 — 总是向上取整',
  }
});

const { $, t } = GZ;

['units','perimeter','height','openings','rollWidth','rollLength','repeat','waste'].forEach(id => {
  const el = $('#' + id);
  el.addEventListener('input', calculate);
});

function calculate() {
  const units = $('#units').value;
  const perimeter = parseFloat($('#perimeter').value) || 0;
  const height = parseFloat($('#height').value) || 0;
  const openings = parseFloat($('#openings').value) || 0;
  let rollWidth = parseFloat($('#rollWidth').value) || 0;
  let rollLength = parseFloat($('#rollLength').value) || 0;
  const repeat = parseFloat($('#repeat').value) || 0;
  const waste = parseFloat($('#waste').value) || 0;

  const areaUnit = units === 'ft' ? 'ft²' : 'm²';
  const lenUnit = units === 'ft' ? 'ft' : 'm';

  // Convert roll dims to same units if needed (inputs are already in selected units)
  const grossArea = perimeter * height;
  const netArea = Math.max(0, grossArea - openings);

  // Effective usable length per roll after pattern repeat waste
  // Each strip must be (height + repeat) to allow pattern alignment
  const stripsPerRoll = rollWidth > 0 && (height + repeat) > 0
    ? Math.floor(rollLength / (height + repeat))
    : 0;
  // Usable area per roll = strips × rollWidth × height
  const usablePerRoll = stripsPerRoll > 0 ? stripsPerRoll * rollWidth * height : 0;

  // Apply extra waste allowance
  const adjustedArea = netArea * (1 + waste / 100);

  const rollsNeeded = usablePerRoll > 0 ? Math.ceil(adjustedArea / usablePerRoll) : 0;

  $('#resultBox').innerHTML = `
    <div class="result-item"><div class="label">${t('wallArea')}</div><div class="val">${grossArea.toFixed(1)} ${areaUnit}</div></div>
    <div class="result-item"><div class="label">${t('netArea')}</div><div class="val">${netArea.toFixed(1)} ${areaUnit}</div></div>
    <div class="result-item"><div class="label">${t('usablePerRoll')}</div><div class="val">${usablePerRoll.toFixed(1)} ${areaUnit}</div></div>
    <div class="result-item"><div class="label">${t('rollsNeeded')}</div><div class="val" style="font-size:2.2em">${rollsNeeded}</div></div>`;
  $('#note').textContent = t('note');
}

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/calc/paint-calculator.html', name:'Paint Calculator'},
    {icon:'🟫', href:'/calc/tile-calculator.html', name:'Tile Calculator'},
    {icon:'🧱', href:'/calc/paver-calculator.html', name:'Paver Calculator'},
    {icon:'📏', href:'/calc/square-footage.html', name:'Square Footage'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
