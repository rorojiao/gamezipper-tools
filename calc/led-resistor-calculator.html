<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate the resistor for an LED?", "acceptedAnswer": {"@type": "Answer", "text": "Use Ohm's Law: R = (Vsupply - Vled) / Iled. Enter your supply voltage, the LED's forward voltage drop and its forward current, and the calculator returns the resistance in ohms plus the recommended wattage."}}, {"@type": "Question", "name": "What wattage resistor do I need?", "acceptedAnswer": {"@type": "Answer", "text": "Power dissipated in the resistor equals (Vsupply - Vled) x Iled. Always pick a resistor rated at least 2x this value for safety and longer life — the tool shows the recommended wattage automatically."}}, {"@type": "Question", "name": "Can I wire multiple LEDs in series?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Set the number of LEDs in series — the calculator multiplies the forward voltage by N before subtracting from the supply. The supply must be larger than N x Vled or no valid resistor exists."}}, {"@type": "Question", "name": "Are my calculations stored anywhere?", "acceptedAnswer": {"@type": "Answer", "text": "No. All math runs entirely in your browser using JavaScript. No inputs are sent to any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">

  </div>
  <div class="gz-tool-area">
    <div class="gz-form" id="form">
      <div>
        <label id="lbl-vsup"></label>
        <input type="number" id="vsup" value="5" min="0" step="0.1">
      </div>
      <div>
        <label id="lbl-vled"></label>
        <select id="vled-sel" onchange="onPreset()">
          <option value="custom">— Custom —</option>
          <option value="1.6">Red — 1.6 V</option>
          <option value="1.85">Yellow — 1.85 V</option>
          <option value="2.0">Green — 2.0 V</option>
          <option value="2.1">Orange — 2.1 V</option>
          <option value="3.0">White — 3.0 V</option>
          <option value="3.2">Blue — 3.2 V</option>
          <option value="3.3">UV / Cool White — 3.3 V</option>
        </select>
        <input type="number" id="vled" value="2.0" min="0" step="0.05" style="margin-top:8px">
      </div>
      <div>
        <label id="lbl-iled"></label>

      </div>

        <div class="result-item"><div class="val" id="result-power"></div><div class="lbl" id="result-power-label"></div></div>
        <div class="result-item"><div class="val" id="result-recw"></div><div class="lbl" id="result-recw-label"></div></div>
        <div class="result-item"><div class="val" id="result-actual"></div><div class="lbl" id="result-actual-label"></div></div>
      </div>
      <div class="bands" id="bands"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'LED Resistor Calculator',
    toolDesc: 'Find the correct current-limiting resistor for any LED. Enter supply voltage, LED forward voltage and current — get resistance, wattage and nearest E12 standard value.',
    lblVsup: 'Supply Voltage (V)',
    lblVled: 'LED Forward Voltage (V)',
    lblIled: 'LED Forward Current (mA)',
    lblCount: 'Number of LEDs in Series',
    btnCalc: 'Calculate Resistor',
    resultLabel: 'Required Resistance',
    nearest: 'Nearest E12 Value',
    power: 'Resistor Power',
    recW: 'Recommended Wattage',
    actual: 'Actual LED Current',
    step1: 'Enter your supply voltage (e.g. 5V from USB)',
    step2: 'Pick an LED color preset or set a custom forward voltage',
    step3: 'Enter the LED forward current in milliamps (typically 10-20mA)',
    step4: 'Click Calculate to get the resistor, wattage and nearest standard value',
  },
  zh: {
    toolTitle: 'LED 限流电阻计算器',
    toolDesc: '为任意 LED 计算正确的限流电阻。输入电源电压、LED 正向电压和电流 — 即时获得电阻值、功率和最接近的 E12 标准值。',
    lblVsup: '电源电压（V）',
    lblVled: 'LED 正向电压（V）',
    lblIled: 'LED 正向电流（mA）',
    lblCount: '串联 LED 数量',
    btnCalc: '计算电阻',
    resultLabel: '所需电阻',
    nearest: '最接近的 E12 标准值',
    power: '电阻功率',
    recW: '推荐额定功率',
    actual: '实际 LED 电流',
    step1: '输入电源电压（如 USB 的 5V）',
    step2: '选择 LED 颜色预设或设置自定义正向电压',
    step3: '输入 LED 正向电流，单位毫安（通常 10-20mA）',
    step4: '点击「计算电阻」获取电阻值、功率和最近的标准值',
  }
});

const { $, t } = GZ;

const E12 = [1.0,1.2,1.5,1.8,2.2,2.7,3.3,3.9,4.7,5.6,6.8,8.2];
const COLOR_CODES = {0:'#000',1:'#8b4513',2:'#ff0000',3:'#ff8000',4:'#ffff00',5:'#00cc00',6:'#0000ff',7:'#9900ff',8:'#808080',9:'#ffffff'};

function onPreset(){ const s=$('#vled-sel').value; if(s!=='custom') $('#vled').value=s; }

function nearestE12(r){
  if(r<=0) return 0;
  const exp=Math.floor(Math.log10(r));
  const base=r/Math.pow(10,exp);
  let best=E12[0],bestDiff=Math.abs(base-E12[0]);
  for(const e of E12){ const d=Math.abs(base-e); if(d<bestDiff){bestDiff=d;best=e;} }
  return best*Math.pow(10,exp);
}

function fmtR(r){
  if(r>=1e6) return (r/1e6).toFixed(2)+' MΩ';
  if(r>=1e3) return (r/1e3).toFixed(2)+' kΩ';
  return r.toFixed(1)+' Ω';
}

function bandsForR(r){
  // 4-band: 2 digits + multiplier
  if(r<=0) return [];
  let scaled=r, mult=0;
  while(scaled<10&&mult>-2){ scaled*=10; mult--; }
  while(scaled>=100){ scaled/=10; mult++; }
  scaled=Math.round(scaled);
  let d1=Math.floor(scaled/10), d2=scaled%10;
  if(d1>=10){ d1=9; d2=9; }
  return [d1,d2,mult];
}

function calculate(){
  const vsup=parseFloat($('#vsup').value)||0;
  const vled=parseFloat($('#vled').value)||0;
  const iled=(parseFloat($('#iled').value)||0)/1000;
  const n=parseInt($('#count').value)||1;
  const vdrop=vsup-n*vled;
  if(vdrop<=0){
    $('#result').style.display='';
    $('#result-r').textContent='—';
    $('#result-label').textContent = 'Supply voltage too low for '+n+' LED'+(n>1?'s':'')+' in series';
    $('#result-nearest').textContent='—';$('#result-power').textContent='—';
    $('#result-recw').textContent='—';$('#result-actual').textContent='—';
    $('#bands').innerHTML='';return;
  }
  const r=vdrop/iled;
  const power=vdrop*iled;
  const near=nearestE12(r);
  const recW=power*2;
  const recWStandard=[0.125,0.25,0.5,1,2,3,5,10].find(w=>w>=recW)||10;
  const actualI=vdrop/near;
  const actualMA=actualI*1000;
  const actualPower=vdrop*actualI;

  $('#result').style.display='';
  $('#result-r').textContent=fmtR(r);
  $('#result-label').textContent=t('resultLabel');
  $('#result-nearest').textContent=fmtR(near);
  $('#result-near-label').textContent=t('nearest');
  $('#result-power').textContent=(power*1000).toFixed(1)+' mW';
  $('#result-power-label').textContent=t('power')+' ('+power.toFixed(3)+' W)';
  $('#result-recw').textContent=recWStandard+' W';
  $('#result-recw-label').textContent=t('recW');
  $('#result-actual').textContent=actualMA.toFixed(1)+' mA';
  $('#result-actual-label').textContent=t('actual')+' ('+(actualPower*1000).toFixed(1)+' mW)';

  const bands=bandsForR(near);
  $('#bands').innerHTML = bands.map((d,i)=>{
    const color=d<0?'silver':(COLOR_CODES[d]||'#fff');
    const lbl=i<2?('Digit '+d):('x'+(d>=0?'10^'+d:'0.1'));
    return `<div class="band"><div class="band-color" style="background:${color}"></div><div class="band-lbl">${lbl}</div></div>`;
  }).join('') + `<div class="band"><div class="band-color" style="background:gold"></div><div class="band-lbl">±5%</div></div>`;
}

document.getElementById('btn-calc').textContent=t('btnCalc');
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔌', href:'/calc/resistor.html', name:'Resistor Color Code'},
    {icon:'⚡', href:'/calc/wattage-calculator.html', name:'Wattage Calc'},
    {icon:'⚡', href:'/calc/voltage-divider-calculator.html', name:'Voltage Divider'},
    {icon:'🔋', href:'/calc/battery-status.html', name:'Battery Status'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
