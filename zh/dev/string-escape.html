const { $, copyText, t } = GZ;
let dir = 'escape';

// ---- HTML / XML entities ----
const ENT = { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' };
const ENT_XML = { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' };
const NAMED = { amp:'&', lt:'<', gt:'>', quot:'"', apos:"'", nbsp:'\u00a0', copy:'\u00a9', reg:'\u00ae', trade:'\u2122', hellip:'\u2026', mdash:'\u2014', ndash:'\u2013', lsquo:'\u2018', rsquo:'\u2019', ldquo:'\u201c', rdquo:'\u201d', deg:'\u00b0', euro:'\u20ac', pound:'\u00a3', cent:'\u00a2', micro:'\u00b5', para:'\u00b6', middot:'\u00b7', bull:'\u2022', times:'\u00d7', divide:'\u00f7',agrave:'\u00e0',eacute:'\u00e9' };

function htmlEscape(s, xml) {
  return s.replace(/[&<>"']/g, c => (xml && c === "'") ? "'" : (xml ? ENT_XML[c] || c : ENT[c] || c));
}
function htmlUnescape(s) {
  return s.replace(/&(#[0-9]+|#x[0-9a-fA-F]+|[a-zA-Z][a-zA-Z0-9]*);/g, (m, ent) => {
    if (ent[0] === '#') {
      const code = ent[1] === 'x' || ent[1] === 'X' ? parseInt(ent.slice(2), 16) : parseInt(ent.slice(1), 10);
      if (Number.isNaN(code)) return m;
      try { return String.fromCodePoint(code); } catch (e) { return m; }
    }
    return Object.prototype.hasOwnProperty.call(NAMED, ent) ? NAMED[ent] : m;
  });
}

// ---- JSON / JS ----
function jsonEscape(s) { return JSON.stringify(s).slice(1, -1); }
function jsonUnescape(s) {
  let str = s.trim();
  // allow user to paste with or without surrounding quotes
  if (str[0] !== '"' && str[str.length - 1] !== '"') str = '"' + str + '"';
  try { return JSON.parse(str); } catch (e) { throw new Error('invalid JSON string'); }
}

// ---- URL ----
function urlEscape(s, full) {
  if (full) return encodeURI(s);
  return encodeURIComponent(s);
}
function urlUnescape(s, full) {
  try { return full ? decodeURI(s) : decodeURIComponent(s); }
  catch (e) { throw new Error('malformed URL encoding'); }
}

// ---- Regex ----
function regexEscape(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function regexUnescape(s) { return s.replace(/\\(.)/g, '$1'); }

// ---- SQL ----
function sqlEscape(s) { return s.replace(/'/g, "''"); }
function sqlUnescape(s) { return s.replace(/''/g, "'"); }

// ---- CSV ----
function csvEscape(s) {
  if (/[",\r\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}
function csvUnescape(s) {
  s = s.trim();
  if (s[0] === '"' && s[s.length - 1] === '"') return s.slice(1, -1).replace(/""/g, '"');
  return s;
}

// ---- Shell / Bash ----
function shellEscape(s) {
  if (s === '') return "''";
  if (/^[A-Za-z0-9_\-:./@%=+,]+$/.test(s)) return s;
  return "'" + s.replace(/'/g, "'\\''") + "'";
}
function shellUnescape(s) {
  s = s.trim();
  if (s[0] === "'" && s[s.length - 1] === "'") {
    return s.slice(1, -1).replace(/'\\''/g, "'");
  }
  if (s[0] === '"' && s[s.length - 1] === '"') {
    return s.slice(1, -1).replace(/\\([$`"\\])/g, '$1');
  }
  return s.replace(/\\(.)/g, '$1');
}

// ---- C / Java backslash ----
const C_MAP = { n:'\n', t:'\t', r:'\r', '\\':'\\', '"':'"', "'":"'", '0':'\0', b:'\b', f:'\f', v:'\v', a:'\x07' };
function cEscape(s) {
  let out = '';
  for (const ch of s) {
    const code = ch.codePointAt(0);
    if (ch === '\\') out += '\\\\';
    else if (ch === '"') out += '\\"';
    else if (ch === '\n') out += '\\n';
    else if (ch === '\r') out += '\\r';
    else if (ch === '\t') out += '\\t';
    else if (code < 0x20) out += '\\x' + code.toString(16).padStart(2, '0');
    else out += ch;
  }
  return out;
}
function cUnescape(s) {
  let out = '', i = 0;
  while (i < s.length) {
    const c = s[i];
    if (c === '\\' && i + 1 < s.length) {
      const n = s[i + 1];
      if (C_MAP[n] !== undefined) { out += C_MAP[n]; i += 2; continue; }
      if (n === 'x' && i + 3 < s.length) { const h = s.slice(i + 2, i + 4); out += String.fromCharCode(parseInt(h, 16)); i += 4; continue; }
      if (n === 'u' && i + 5 < s.length) { const h = s.slice(i + 2, i + 6); out += String.fromCharCode(parseInt(h, 16)); i += 6; continue; }
      out += n; i += 2; continue;
    }
    out += c; i++;
  }
  return out;
}

function process() {
  const input = $('#input').value;
  const fmt = $('#format').value;
  const status = $('#status');
  if (input === '') { $('#output').value = ''; status.textContent = ''; status.className = 'se-status'; return; }
  try {
    let out;
    const esc = dir === 'escape';
    switch (fmt) {
      case 'json':   out = esc ? jsonEscape(input) : jsonUnescape(input); break;
      case 'html':   out = esc ? htmlEscape(input, false) : htmlUnescape(input); break;
      case 'xml':    out = esc ? htmlEscape(input, true) : htmlUnescape(input); break;
      case 'url':    out = esc ? urlEscape(input, false) : urlUnescape(input, false); break;
      case 'urlfull':out = esc ? urlEscape(input, true) : urlUnescape(input, true); break;
      case 'regex':  out = esc ? regexEscape(input) : regexUnescape(input); break;
      case 'sql':    out = esc ? sqlEscape(input) : sqlUnescape(input); break;
      case 'csv':    out = esc ? csvEscape(input) : csvUnescape(input); break;
      case 'shell':  out = esc ? shellEscape(input) : shellUnescape(input); break;
      case 'c':      out = esc ? cEscape(input) : cUnescape(input); break;
      default: out = input;
    }
    $('#output').value = out;
    status.textContent = esc ? t('okEsc') : t('okUnesc');
    status.className = 'se-status ok';
  } catch (e) {
    $('#output').value = '';
    status.textContent = t('err') + e.message;
    status.className = 'se-status err';
  }
}

function setDir(d) {
  dir = d;
  $('#btn-escape').classList.toggle('active', d === 'escape');
  $('#btn-unescape').classList.toggle('active', d === 'unescape');
  process();
}

function loadExample() {
  $('#format').value = 'json';

  process();
}

$('#input').addEventListener('input', () => { if ($('#live').checked) process(); });
$('#format').addEventListener('change', process);
