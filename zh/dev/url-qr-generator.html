<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="qr-tabs" id="tabs"></div>

    <div class="qr-options">
      <div class="qr-opt"><label id="lbl-size"></label><select id="size"><option value="128">128px</option><option value="256" selected>256px</option><option value="384">384px</option><option value="512">512px</option></select></div>
      <div class="qr-opt"><label id="lbl-ecc"></label><select id="ecc"><option value="L">L (7%)</option><option value="M" selected>M (15%)</option><option value="Q">Q (25%)</option><option value="H">H (30%)</option></select></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'QR Code Generator for URL & Text',
    toolDesc: 'Create custom QR codes for URLs, text, SMS, email, and phone numbers. Choose size, colors, and error correction — download as PNG or SVG.',
    tabURL: 'URL', tabText: 'Text', tabSMS: 'SMS', tabEmail: 'Email', tabPhone: 'Phone',
    urlLabel: 'Website URL', urlPh: 'https://example.com',
    textLabel: 'Text content', textPh: 'Any text to encode...',
    smsNumber: 'Phone number', smsMsg: 'Message',
    emailAddr: 'Email address', emailSubj: 'Subject', emailBody: 'Body',
    phoneNum: 'Phone number',
    size: 'Size', ecc: 'Error Correction', fgColor: 'Foreground', bgColor: 'Background',
    downloadPNG: 'Download PNG', downloadSVG: 'Download SVG',
    enterData: 'Enter data to generate QR code',
    step1: 'Select the QR code type (URL, Text, SMS, Email, or Phone)',
    step2: 'Enter your data in the input fields',
    step3: 'Customize size, colors, and error correction level',
    step4: 'Download as PNG for images or SVG for printing',
  },
  zh: {
    toolTitle: 'URL & 文本二维码生成器',
    toolDesc: '为 URL、文本、短信、邮箱和电话号码创建自定义二维码。选择尺寸、颜色和纠错级别 — 下载为 PNG 或 SVG。',
    tabURL: '网址', tabText: '文本', tabSMS: '短信', tabEmail: '邮箱', tabPhone: '电话',
    urlLabel: '网站 URL', urlPh: 'https://example.com',
    textLabel: '文本内容', textPh: '要编码的任意文本...',
    smsNumber: '电话号码', smsMsg: '短信内容',
    emailAddr: '邮箱地址', emailSubj: '主题', emailBody: '正文',
    phoneNum: '电话号码',
    size: '尺寸', ecc: '纠错级别', fgColor: '前景色', bgColor: '背景色',
    downloadPNG: '下载 PNG', downloadSVG: '下载 SVG',
    enterData: '输入数据以生成二维码',
    step1: '选择二维码类型（网址、文本、短信、邮箱或电话）',
    step2: '在输入框中输入数据',
    step3: '自定义尺寸、颜色和纠错级别',
    step4: '下载为 PNG 图片或 SVG 矢量图',
  }
});
const { $, t } = GZ;
let currentTab = 'url';
let qrCanvas = null;

const tabs = [
  {id:'url',label:'tabURL'},
  {id:'text',label:'tabText'},
  {id:'sms',label:'tabSMS'},
  {id:'email',label:'tabEmail'},
  {id:'phone',label:'tabPhone'},
];

function renderTabs() {
  $('#tabs').innerHTML = tabs.map(tb =>
    `<div class="qr-tab ${tb.id===currentTab?'active':''}" onclick="switchTab('${tb.id}')">${t(tb.label)}</div>`
  ).join('');
}

function switchTab(id) { currentTab = id; renderTabs(); renderFields(); generate(); }

function renderFields() {
  let html = '';
  if (currentTab === 'url') {
    html = `<div class="qr-field active"><label>${t('urlLabel')}</label><input type="text" id="f-url" placeholder="${t('urlPh')}" oninput="generate()"></div>`;
  } else if (currentTab === 'text') {
    html = `<div class="qr-field active"><label>${t('textLabel')}</label><textarea id="f-text" placeholder="${t('textPh')}" oninput="generate()"></textarea></div>`;
  } else if (currentTab === 'sms') {
    html = `<div class="qr-field active"><label>${t('smsNumber')}</label><input type="text" id="f-sms-num" placeholder="+1234567890" oninput="generate()"><label>${t('smsMsg')}</label><textarea id="f-sms-msg" oninput="generate()"></textarea></div>`;
  } else if (currentTab === 'email') {
    html = `<div class="qr-field active"><label>${t('emailAddr')}</label><input type="text" id="f-email" placeholder="user@example.com" oninput="generate()"><label>${t('emailSubj')}</label><input type="text" id="f-email-subj" oninput="generate()"><label>${t('emailBody')}</label><textarea id="f-email-body" oninput="generate()"></textarea></div>`;
  } else if (currentTab === 'phone') {
    html = `<div class="qr-field active"><label>${t('phoneNum')}</label><input type="text" id="f-phone" placeholder="+1234567890" oninput="generate()"></div>`;
  }
  $('#fields').innerHTML = html;
}

function getData() {
  if (currentTab === 'url') return ($('#f-url')||{}).value || '';
  if (currentTab === 'text') return ($('#f-text')||{}).value || '';
  if (currentTab === 'sms') { const n=($('#f-sms-num')||{}).value||''; const m=($('#f-sms-msg')||{}).value||''; return n||m?`SMSTO:${n}:${m}`:''; }
  if (currentTab === 'email') { const a=($('#f-email')||{}).value||''; const s=($('#f-email-subj')||{}).value||''; const b=($('#f-email-body')||{}).value||''; return a?`MAILTO:${a}?subject=${encodeURIComponent(s)}&body=${encodeURIComponent(b)}`:''; }
  if (currentTab === 'phone') { const p=($('#f-phone')||{}).value||''; return p?`TEL:${p}`:''; }
  return '';
}

function generate() {
  const data = getData();
  if (!data.trim()) {
    $('#preview').innerHTML = `<div class="empty">${t('enterData')}</div>`;
    $('#downloads').style.display = 'none';
    return;
  }
  try {
    const size = parseInt($('#size').value);
    const ecc = $('#ecc').value;
    const fg = $('#fg-color').value;
    const bg = $('#bg-color').value;
    const qr = qrcode(0, ecc);
    qr.addData(data);
    qr.make();
    const count = qr.getModuleCount();
    const cellSize = Math.floor(size / count);
    const actualSize = cellSize * count;
    const canvas = document.createElement('canvas');
    canvas.width = actualSize; canvas.height = actualSize;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, actualSize, actualSize);
    ctx.fillStyle = fg;
    for (let r = 0; r < count; r++) {
      for (let c = 0; c < count; c++) {
        if (qr.isDark(r, c)) ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
      }
    }
    qrCanvas = canvas;
    $('#preview').innerHTML = '';
    $('#preview').appendChild(canvas);
    $('#downloads').style.display = 'flex';
    $('#btn-png').textContent = t('downloadPNG');
    $('#btn-svg').textContent = t('downloadSVG');
  } catch(e) {
    $('#preview').innerHTML = `<div class="empty" style="color:var(--accent)">Error: ${e.message}. Try less data or lower error correction.</div>`;
    $('#downloads').style.display = 'none';
  }
}

function downloadPNG() {
  if (!qrCanvas) return;
  const link = document.createElement('a');
  link.download = `qr-${currentTab}-${Date.now()}.png`;
  link.href = qrCanvas.toDataURL('image/png');
  link.click();
}

function downloadSVG() {
  const data = getData();
  if (!data.trim()) return;
  const ecc = $('#ecc').value;
  const fg = $('#fg-color').value;
  const bg = $('#bg-color').value;
  const qr = qrcode(0, ecc);
  qr.addData(data); qr.make();
  const count = qr.getModuleCount();
  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${count*10}" height="${count*10}" viewBox="0 0 ${count} ${count}">`;
  svg += `<rect width="${count}" height="${count}" fill="${bg}"/>`;
  for (let r = 0; r < count; r++) {
    for (let c = 0; c < count; c++) {
      if (qr.isDark(r, c)) svg += `<rect x="${c}" y="${r}" width="1" height="1" fill="${fg}"/>`;
    }
  }
  svg += '</svg>';
  const blob = new Blob([svg], {type:'image/svg+xml'});
  const link = document.createElement('a');
  link.download = `qr-${currentTab}-${Date.now()}.svg`;
  link.href = URL.createObjectURL(blob);
  link.click();
}

['size','ecc','fg-color','bg-color'].forEach(id => { document.addEventListener('change', e => { if(e.target.id===id) generate(); }); });
document.addEventListener('input', e => { if(['size','ecc'].includes(e.target.id)) generate(); });

$('#toolbar').innerHTML = '';
$('#lbl-size').textContent = t('size');
$('#lbl-ecc').textContent = t('ecc');
$('#lbl-fg').textContent = t('fgColor');
$('#lbl-bg').textContent = t('bgColor');
$('#empty-msg').textContent = t('enterData');

renderTabs();
renderFields();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📷', href:'/dev/qr-code-reader.html', name:'QR Reader'},
    {icon:'🎨', href:'/text/qrcode-designer.html', name:'QR Designer'},
    {icon:'📶', href:'/convert/wifi-qrcode.html', name:'WiFi QR'},
    {icon:'💳', href:'/convert/vcard-qrcode.html', name:'vCard QR'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
