<body>
<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-grid gz-grid-2" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:14px">
      <input id="pageTitle" class="gz-input" placeholder="Page title">
      <input id="pageUrl" class="gz-input" placeholder="https://example.com/page">
      <input id="ogImage" class="gz-input" placeholder="https://example.com/og-image.png">
      <input id="robots" class="gz-input" placeholder="index,follow">
    </div>
    <textarea id="description" rows="4" style="width:100%;margin-bottom:12px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;color:var(--text);resize:vertical" placeholder="Meta description"></textarea>
    <textarea id="output" spellcheck="false" readonly rows="16" style="width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;color:var(--text);resize:vertical"></textarea>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({en:{toolTitle:'Meta Tag Generator',toolDesc:'Create page title, description, canonical, robots, Open Graph, and Twitter tags for any landing page.',step1:'Enter your page title, URL, description, and optional image URL.',step2:'The tool generates HTML tags you can paste into the head of your page.',step3:'Use the result as a starting point, then customize per page.'},zh:{toolTitle:'Meta 标签生成器',toolDesc:'为任意页面生成 title、description、canonical、robots、Open Graph 和 Twitter 标签。',step1:'输入页面标题、URL、描述和可选图片地址。',step2:'工具会生成可直接粘贴到 head 的 HTML 标签。',step3:'先批量生成，再按页面做细化调整。'}});
const {$,copyText,t}=GZ;
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function gen(){
  const title=$('#pageTitle').value.trim();
  const url=$('#pageUrl').value.trim();
  const desc=$('#description').value.trim();
  const image=$('#ogImage').value.trim();
  const robots=$('#robots').value.trim()||'index,follow';
  const out=[
    `<title>${esc(title)}</title>`,
    `<meta name="description" content="为任意页面生成 title、description、canonical、robots、Open Graph 和 Twitter 标签。">`,
    `<link rel="canonical" href="https://tools.gamezipper.com/zh/seo/meta-tag-generator.html">`,
    `<meta name="robots" content="${esc(robots)}">`,
    `<meta property="og:title" content="Meta 标签生成器">`,
    `<meta property="og:description" content="为任意页面生成 title、description、canonical、robots、Open Graph 和 Twitter 标签。">`,
    `<meta property="og:url" content="https://tools.gamezipper.com/zh/seo/meta-tag-generator.html">`,
    `<meta property="og:type" content="website">`,
    image ? `<meta property="og:image" content="${esc(image)}">` : '',
    `<meta name="twitter:card" content="summary_large_image">`,
    `<meta name="twitter:title" content="Meta 标签生成器">`,
    `<meta name="twitter:description" content="为任意页面生成 title、description、canonical、robots、Open Graph 和 Twitter 标签。">`,
    image ? `<meta name="twitter:image" content="${esc(image)}">` : ''
  ].filter(Boolean).join('\n');
  $('#output').value=out;
}
function example(){
  $('#pageTitle').value='Free Online Meta Tag Generator | GameZipper Tools';
  $('#pageUrl').value='https://tools.gamezipper.com/seo/meta-tag-generator.html';
  $('#description').value='Generate title, description, canonical, Open Graph, and Twitter meta tags in seconds.';
  $('#ogImage').value='https://tools.gamezipper.com/shared/og-image.png';
  $('#robots').value='index,follow';
  gen();
}
['pageTitle','pageUrl','description','ogImage','robots'].forEach(id=>$("#"+id).addEventListener('input',gen));
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="gen()">Generate</button><button class="gz-btn gz-btn-secondary" onclick="example()">${t('example')}</button><button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button><button class="gz-btn gz-btn-secondary" onclick="document.querySelectorAll('input,textarea').forEach(el=>el.value='');gen()">${t('clear')}</button>`;
GZ.renderToolPage({category:'seo',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3'],related:[{icon:'🤖',href:'/seo/robots-txt-generator.html',name:'Robots.txt Generator'},{icon:'🖼️',href:'/seo/open-graph-generator.html',name:'Open Graph Generator'},{icon:'❓',href:'/seo/faq-schema-generator.html',name:'FAQ Schema Generator'},{icon:'🔗',href:'/text/slug.html',name:'Slug Generator'}]});
gen();
</script>
<script>new Image().src="https://site-analytics.cap.1ktower.com/hit?s=tools.gamezipper.com&p="+encodeURIComponent(location.pathname);</script>
</body>
</html>
