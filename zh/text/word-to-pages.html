<script>
GZI18n.register({
  en: {
    toolTitle: 'Word to Pages Calculator',
    toolDesc: 'Find out exactly how many pages your essay, paper, report or novel will be. Enter a word count or paste your text, pick font size and spacing, and get an instant page estimate. Free, private, browser-only.',
    modeText: 'Paste text', modeWord: 'Enter word count',
    lblWords: 'Number of words', lblFont: 'Font size', lblSpacing: 'Line spacing', lblType: 'Font type',
    lblPaste: 'Paste your text (words counted automatically)',
    phPaste: 'Paste your essay, article or document here to count words and estimate pages...',
    pages: 'pages', page: 'page',
    words: 'words', characters: 'characters', sentences: 'sentences', paragraphs: 'paragraphs',
    readingTime: 'reading time', minutes: 'min',
    refTitle: 'Quick reference — words per page',
    colWords: 'Words', colSingle: 'Single spaced', colDouble: 'Double spaced',
    btnPaste: 'Paste text', btnWord: 'Enter word count', btnExample: 'Example', btnClear: 'Clear',
    step1: 'Toggle between "Paste text" and "Enter word count" at the top.',
    step2: 'Choose your font size, font type and line spacing to match your assignment.',
    step3: 'The estimated page count and reading time update instantly.',
    step4: 'Use the quick-reference table to convert common word counts at a glance.',
  },
  zh: {
    toolTitle: '字数转页数计算器',
    toolDesc: '精确估算你的论文、报告或小说会有多少页。输入字数或粘贴文本，选择字体大小和行距，即时获得页数估算。免费、私密、浏览器本地运行。',
    modeText: '粘贴文本', modeWord: '输入字数',
    lblWords: '单词数', lblFont: '字号', lblSpacing: '行距', lblType: '字体类型',
    lblPaste: '粘贴文本（自动统计字数）',
    phPaste: '在此粘贴你的论文、文章或文档，自动统计字数并估算页数…',
    pages: '页', page: '页',
    words: '词', characters: '字符', sentences: '句子', paragraphs: '段落',
    readingTime: '阅读时间', minutes: '分钟',
    refTitle: '快速参考 — 每页字数',
    colWords: '字数', colSingle: '单倍行距', colDouble: '双倍行距',
    btnPaste: '粘贴文本', btnWord: '输入字数', btnExample: '示例', btnClear: '清空',
    step1: '在顶部切换「粘贴文本」和「输入字数」两种模式。',
    step2: '选择与作业要求一致的字号、字体和行距。',
    step3: '估算页数和阅读时间会即时更新。',
    step4: '使用快速参考表一目了然地换算常见字数。',
  }
});

const { $, t } = GZ;
let mode = 'text';

function wordsPerPage() {
  const fs = +$('#fontsize').value;
  const sp = +$('#spacing').value;
  const isSerif = $('#fonttype').value === 'times';
  // Base 500 words/page single-spaced 12pt sans; adjust for font size, type, spacing
  let base = 500;
  if (isSerif) base *= 1.15; // serif packs more words
  const sizeFactor = 12 / fs; // bigger font = fewer words
  base *= sizeFactor * sizeFactor; // area scales with size squared
  base /= sp; // spacing divisor
  return Math.max(40, Math.round(base));
}

function countWords(text) {
  const trimmed = text.trim();
  if (!trimmed) return 0;
  // English word count + CJK char count (each CJK char ~ 1 word equivalent)
  const en = (trimmed.match(/[A-Za-z0-9'’-]+/g) || []).length;
  const cjk = (trimmed.match(/[\u4e00-\u9fff\u3040-\u30ff\uac00-\ud7af]/g) || []).length;
  return en + cjk;
}

function compute() {
  let words;
  if (mode === 'word') {
    words = Math.max(0, parseInt($('#wordcount').value) || 0);
  } else {
    const txt = $('#input').value;
    words = countWords(txt);
  }
  const wpp = wordsPerPage();
  const pages = words === 0 ? 0 : Math.max(1, Math.ceil(words / wpp));
  $('#out-pages').textContent = pages;
  $('#out-pages-lbl').textContent = (pages === 1 ? t('page') : t('pages')) + ' · ' + wpp + ' ' + t('words') + '/' + (pages === 1 ? t('page') : t('pages'));

  // stats
  let chars = 0, sentences = 0, paragraphs = 0, readMin = 0;
  if (mode === 'text') {
    const txt = $('#input').value.trim();
    chars = txt.length;
    sentences = (txt.match(/[.!?。！？]+/g) || []).length || (txt ? 1 : 0);
    paragraphs = txt ? txt.split(/\n\s*\n+/).filter(p => p.trim()).length : 0;
    readMin = words === 0 ? 0 : Math.max(1, Math.round(words / 200));
  } else {
    chars = words * 6; // approx
    readMin = words === 0 ? 0 : Math.max(1, Math.round(words / 200));
  }

  const stats = [
    { k: t('words'), v: words.toLocaleString() },
    { k: t('characters'), v: chars.toLocaleString() },
    { k: t('readingTime'), v: readMin + ' ' + t('minutes') },
  ];
  if (mode === 'text') {
    stats.splice(2, 0, { k: t('sentences'), v: sentences.toLocaleString() });
    stats.splice(3, 0, { k: t('paragraphs'), v: paragraphs.toLocaleString() });
  }
  $('#out-stats').innerHTML = stats.map(s => `<div class="w2p-stat"><div class="v">${s.v}</div><div class="k">${s.k}</div></div>`).join('');
}

function buildRefTable() {
  $('#ref-title').textContent = t('refTitle');
  const samples = [100, 250, 500, 750, 1000, 1500, 2000, 2500, 3000, 5000];
  // reference uses standard 12pt baseline: single ~500, double ~250
  const rows = samples.map(w => {
    const s = Math.max(1, Math.ceil(w / 500));
    const d = Math.max(1, Math.ceil(w / 250));
    return `<tr><td>${w.toLocaleString()}</td><td>${s}</td><td>${d}</td></tr>`;
  }).join('');
  $('#ref-table').innerHTML = `<tr><th>${t('colWords')}</th><th>${t('colSingle')}</th><th>${t('colDouble')}</th></tr>${rows}`;
}

function setMode(m) {
  mode = m;
  $('#word-mode').style.display = m === 'word' ? 'block' : 'none';
  $('#text-mode').style.display = m === 'text' ? 'block' : 'none';
  document.querySelectorAll('#mode-toggle button').forEach(b => {
    b.classList.toggle('gz-btn', b.dataset.m === m);
    b.classList.toggle('gz-btn-secondary', b.dataset.m !== m);
  });
  compute();
}

function loadExample() {
  $('#wordcount').value = 1500;
  $('#input').value = 'The quick brown fox jumps over the lazy dog. Writing an essay requires careful planning, a clear thesis statement, and well-structured paragraphs that each support a single main idea. Aim for roughly 250 words per double-spaced page, use transitions between paragraphs, and revise for clarity and concision. Good essays back every claim with evidence and end with a conclusion that ties everything together without introducing new information.';
  compute();
}

function doClear() {
  $('#input').value = ''; $('#wordcount').value = 0; compute();
}

// mode toggle buttons
$('#mode-toggle').innerHTML =
  `<button data-m="text" class="gz-btn" onclick="setMode('text')">${t('modeText')}</button>` +
  `<button data-m="word" class="gz-btn-secondary gz-btn" onclick="setMode('word')">${t('modeWord')}</button>`;

$('#lbl-words').textContent = t('lblWords');
$('#lbl-font').textContent = t('lblFont');
$('#lbl-spacing').textContent = t('lblSpacing');
$('#lbl-type').textContent = t('lblType');
$('#lbl-paste').textContent = t('lblPaste');
$('#input').placeholder = t('phPaste');

['input','wordcount','fontsize','spacing','fonttype'].forEach(id => {
  const el = $('#' + id);
  if (el) el.addEventListener('input', compute);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('btnExample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('btnClear')}</button>`;

buildRefTable();
compute();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📝', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'⏱️', href:'/text/reading-time.html', name:'Reading Time Calculator'},
    {icon:'📖', href:'/text/readability-checker.html', name:'Readability Checker'},
    {icon:'🔢', href:'/text/letter-counter.html', name:'Letter & Word Counter'},
  ]
});
</script>
