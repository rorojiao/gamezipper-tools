const { $, copyText, t } = GZ;
let mode = 'cidr';

// ---------- IPv4 helpers ----------
function ipv4ToInt(s){
  const m = s.trim().split('.');
  if(m.length !== 4) throw new Error('bad IPv4');
  let n = 0;
  for(const p of m){
    if(!/^\d+$/.test(p)) throw new Error('bad IPv4');
    const v = +p;
    if(v < 0 || v > 255) throw new Error('bad IPv4');
    n = n*256 + v;
  }
  return n >>> 0;
}
function intToIpv4(n){ n >>>= 0; return [(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.'); }

// ---------- IPv6 helpers ----------
function ipv6ToBigInt(s){
  s = s.trim();
  // strip zone id
  s = s.replace(/%.*$/,'');
  if(s === '::') s = '0::0';
  // handle :: compression
  let parts;
  if(s.includes('::')){
    const [head, tail] = s.split('::');
    const headGroups = head ? head.split(':').filter(Boolean) : [];
    const tailGroups = tail ? tail.split(':').filter(Boolean) : [];
    const missing = 8 - headGroups.length - tailGroups.length;
    if(missing < 0) throw new Error('bad IPv6');
    parts = [...headGroups, ...Array(missing).fill('0'), ...tailGroups];
  } else {
    parts = s.split(':');
  }
  if(parts.length !== 8) throw new Error('bad IPv6');
  let big = 0n;
  for(const g of parts){
    if(!/^[0-9a-fA-F]{1,4}$/.test(g)) throw new Error('bad IPv6');
    big = (big << 16n) + BigInt(parseInt(g,16));
  }
  return big;
}
function bigIntToIpv6Expanded(big){
  const groups = [];
  for(let i=7;i>=0;i--){
    groups.push(((big >> BigInt(i*16)) & 0xFFFFn).toString(16));
  }
  return groups.join(':');
}
function compressIpv6(big){
  const groups = [];
  for(let i=7;i>=0;i--){
    groups.push(((big >> BigInt(i*16)) & 0xFFFFn).toString(16));
  }
  // find longest run of zeros
  let bestStart=-1, bestLen=0, curStart=-1, curLen=0;
  for(let i=0;i<groups.length;i++){
    if(groups[i] === '0'){
      if(curStart < 0) curStart = i;
      curLen++;
      if(curLen > bestLen){ bestLen = curLen; bestStart = curStart; }
    } else {
      curStart = -1; curLen = 0;
    }
  }
  if(bestLen < 2) return groups.join(':');
  const before = groups.slice(0, bestStart).join(':');
  const after = groups.slice(bestStart + bestLen).join(':');
  return `${before}::${after}`;
}

function isIpv4(s){ return s.includes('.') && !s.includes(':'); }

// ---------- main: CIDR → range ----------
function cidrToRange(text){
  const idx = text.lastIndexOf('/');
  if(idx < 0) throw new Error('missing /');
  const ipPart = text.slice(0, idx).trim();
  const prefixStr = text.slice(idx+1).trim();
  if(!/^\d+$/.test(prefixStr)) throw new Error('bad prefix');
  const prefix = +prefixStr;

  if(isIpv4(ipPart)){
    if(prefix < 0 || prefix > 32) throw new Error('bad prefix');
    const base = ipv4ToInt(ipPart);
    // mask network portion
    const mask = prefix === 0 ? 0 : (0xFFFFFFFF << (32 - prefix)) >>> 0;
    const network = (base & mask) >>> 0;
    const hostBits = 32 - prefix;
    const total = Math.pow(2, hostBits);
    const broadcast = prefix === 0 ? 0xFFFFFFFF : (network | (0xFFFFFFFF >>> prefix)) >>> 0;
    // usable hosts: exclude network + broadcast for /0..30
    let usable, firstHost, lastHost;
    if(prefix >= 31){ usable = total; firstHost = network; lastHost = broadcast; }
    else { usable = Math.max(0, total - 2); firstHost = prefix===0 ? 1 : (network + 1) >>> 0; lastHost = prefix===0 ? 0xFFFFFFFE : (broadcast - 1) >>> 0; }
    const binary = network.toString(2).padStart(32,'0').match(/.{8}/g).join('.');
    return [
      {k:'ipVersion', v:'IPv4', full:false},
      {k:'prefix', v:'/'+prefix+' ('+prefix+' network bits, '+hostBits+' host bits)', full:false},
      {k:'firstIp', v:intToIpv4(network), full:false, big:true},
      {k:'lastIp', v:intToIpv4(broadcast), full:false, big:true},
      {k:'hostRange', v: prefix>=31 ? intToIpv4(firstHost)+' — '+intToIpv4(lastHost) : (usable? intToIpv4(firstHost)+' — '+intToIpv4(lastHost) : '—'), full:true},
      {k:'totalAddrs', v: total.toLocaleString(), full:false},
      {k:'usableHosts', v: usable.toLocaleString(), full:false},
      {k:'binaryNet', v: binary, full:true},
    ];
  } else {
    if(prefix < 0 || prefix > 128) throw new Error('bad prefix');
    const base = ipv6ToBigInt(ipPart);
    const mask = prefix === 0 ? 0n : ((1n << BigInt(prefix)) - 1n) << BigInt(128 - prefix);
    const network = base & mask;
    const hostBits = 128 - prefix;
    const total = 1n << BigInt(hostBits);
    const broadcast = prefix === 0 ? ((1n<<128n)-1n) : (network | ((1n << BigInt(hostBits)) - 1n));
    return [
      {k:'ipVersion', v:'IPv6', full:false},
      {k:'prefix', v:'/'+prefix+' ('+prefix+' network bits, '+hostBits+' host bits)', full:false},
      {k:'firstIp', v:compressIpv6(network), full:false, big:true},
      {k:'lastIp', v:compressIpv6(broadcast), full:false, big:true},
      {k:'compressed', v:compressIpv6(network)+' — '+compressIpv6(broadcast), full:true},
      {k:'expanded', v:bigIntToIpv6Expanded(network)+' — '+bigIntToIpv6Expanded(broadcast), full:true},
      {k:'totalAddrs', v: total.toString(), full:false},
      {k:'usableHosts', v: total.toString()+'  (all addresses are usable)', full:false},
    ];
  }
}

// ---------- reverse: range → CIDR ----------
// BigInt-based for both IPv4 (32-bit) and IPv6 (128-bit) — uniform algorithm.
function ipStrToBig(s){
  if(isIpv4(s)) return BigInt(ipv4ToInt(s));
  return ipv6ToBigInt(s);
}
function bigToIpStr(big, v4){
  if(v4){
    const n = Number(big & 0xFFFFFFFFn);
    return intToIpv4(n >>> 0);
  }
  return compressIpv6(big);
}
// count trailing zero bits of a BigInt (0 → maxBits)
function trailingZeros(big, maxBits){
  if(big === 0n) return maxBits;
  let c = 0;
  while(c < maxBits && (big & 1n) === 0n){ big >>= 1n; c++; }
  return c;
}
// bit length of a BigInt (0 → 0): smallest n with 2^n > big
function bitLen(big){
  if(big <= 0n) return 0;
  let c = 0, d = big;
  while(d > 0n){ d >>= 1n; c++; }
  return c;
}

function rangeToCidr(firstStr, lastStr){
  const v4 = isIpv4(firstStr);
  if(v4 !== isIpv4(lastStr)) throw new Error('mixed versions');
  let first = ipStrToBig(firstStr);
  let last = ipStrToBig(lastStr);
  if(first > last){ const t2=first; first=last; last=t2; }
  const maxPrefix = v4 ? 32 : 128;
  const blocks = [];
  let guard = 0;
  while(first <= last){
    if(++guard > 8192) break;
    const vary = trailingZeros(first, maxPrefix);
    const diff = last - first;
    // largest block size = 2^k where 2^k <= diff+1  =>  k = bitLen(diff+1) - 1
    const k = bitLen(diff + 1n) - 1;
    const hostBits = Math.min(vary, Number(k));
    const prefix = maxPrefix - hostBits;
    const blockSize = 1n << BigInt(hostBits);
    blocks.push(bigToIpStr(first, v4) + '/' + prefix);
    first += blockSize;
  }
  return blocks;
}

function renderResults(rows){
  const grid = rows.map(r => `
    <div class="result-card ${r.full?'full-row':''}">
      <div class="k">${t(r.k)}</div>
      <div class="v ${r.big?'big':''}">${r.v}</div>
    </div>`).join('');
  $('#results').innerHTML = `<div class="result-grid">${grid}</div>`;
  // attach copy handlers
  document.querySelectorAll('#results .v').forEach(v => {
    v.style.cursor = 'pointer';
    v.title = 'Click to copy';
    v.onclick = () => copyText(v.textContent);
  });
}

function doConvert(){
  const text = $('#input').value.trim();
  if(!text){ $('#status').textContent = t('needInput'); $('#results').innerHTML=''; return; }
  try{
    if(mode === 'cidr'){
      renderResults(cidrToRange(text));
      $('#status').textContent = '';
    } else {
      // range mode: split on " - " or "-"
      let parts = text.split(/\s*-\s*|\s+to\s+/i).map(s=>s.trim());
      if(parts.length !== 2) throw new Error('need first - last');
      const blocks = rangeToCidr(parts[0], parts[1]);
      if(!blocks.length){ $('#status').textContent = t('noCidr'); $('#results').innerHTML=''; return; }
      renderResults([
        {k:'blocks', v: blocks.join('\n'), full:true, big:true},
        {k:'usableHosts', v: blocks.length.toLocaleString()+' block(s)', full:false},
      ]);
      $('#status').textContent = '';
    }
  }catch(e){
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">✗ ${e.message}</span>`;
    $('#results').innerHTML='';
  }
}

function loadExample(){
  $('#input').value = mode === 'cidr' ? '192.168.10.0/22' : '10.0.0.0 - 10.0.3.255';

}

  $('#tab-cidr').onclick = ()=>{ mode='cidr'; syncMode(); };
  $('#tab-range').onclick = ()=>{ mode='range'; syncMode(); };
}

  buildModeTabs();
  $('#lbl-in').textContent = t(mode==='cidr'?'lblInCidr':'lblInRange');
  $('#input').value = '';
  $('#results').innerHTML = '';
  $('#status').textContent = '';
  $('#input').placeholder = mode==='cidr' ? '192.168.1.0/24' : '10.0.0.0 - 10.0.0.255';
}
