      <div class="field">

        <select id="position">
          <option value="center" selected>Center</option>
          <option value="tl">Top Left</option>
          <option value="tr">Top Right</option>

        </select>
      </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Image Watermark Tool',
    toolDesc: 'Add text or logo watermarks to your images. Adjust position, opacity, font size, rotation and tile mode — free, browser-based, no upload.',
    dropzoneText: 'Drop an image here',
    orText: 'or',
    selectBtn: 'Browse Image',
    tabText: 'Text Watermark',
    tabLogo: 'Logo Watermark',
    lblWmtext: 'Watermark Text',
    lblPosition: 'Position',
    lblOpacity: 'Opacity (%)',
    lblFontsize: 'Font Size (px)',
    lblRotation: 'Rotation (°)',
    lblColor: 'Text Color',
    apply: '✅ Apply Watermark',
    downloadPng: '⬇ Download PNG',
    downloadJpg: '⬇ Download JPG',
    clear: '🗑️ Clear',
    step1: 'Upload an image by drag-and-drop or browse',
    step2: 'Type watermark text or switch to logo mode',
    step3: 'Adjust position, opacity, font size and rotation',
    step4: 'Download as PNG or JPG',
    needImage: 'Please upload an image first',
  },
  zh: {
    toolTitle: '图片水印工具',
    toolDesc: '为图片添加文字或 Logo 水印。调整位置、透明度、字号、旋转角度和平铺模式 — 免费、浏览器本地运行、无需上传。',
    dropzoneText: '将图片拖放至此',
    orText: '或',
    selectBtn: '选择图片',
    tabText: '文字水印',
    tabLogo: 'Logo 水印',
    lblWmtext: '水印文字',
    lblPosition: '位置',
    lblOpacity: '透明度 (%)',
    lblFontsize: '字号 (px)',
    lblRotation: '旋转角度 (°)',
    lblColor: '文字颜色',
    apply: '✅ 应用水印',
    downloadPng: '⬇ 下载 PNG',
    downloadJpg: '⬇ 下载 JPG',
    clear: '🗑️ 清空',
    step1: '拖放或点击上传图片',
    step2: '输入水印文字或切换到 Logo 模式',
    step3: '调整位置、透明度、字号和旋转角度',
    step4: '下载为 PNG 或 JPG',
    needImage: '请先上传图片',
  }
});

const { $, copyText, t } = GZ;

['dropzoneText','orText','selectBtn','tabText','tabLogo','lblWmtext','lblPosition','lblOpacity','lblFontsize','lblRotation','lblColor'].forEach(k => {
  const el = $('#lbl-' + k.replace('lbl','').replace('wm','wm').toLowerCase().replace(/^wmtext$/,'wmtext'));
});

$('#dropzone-text').textContent = t('dropzoneText');
$('#or-text').textContent = t('orText');
$('#select-btn').textContent = t('selectBtn');
$('#tab-text').textContent = t('tabText');
$('#tab-logo').textContent = t('tabLogo');
$('#lbl-wmtext').textContent = t('lblWmtext');
$('#lbl-position').textContent = t('lblPosition');
$('#lbl-opacity').textContent = t('lblOpacity');
$('#lbl-fontsize').textContent = t('lblFontsize');
$('#lbl-rotation').textContent = t('lblRotation');
$('#lbl-color').textContent = t('lblColor');

let baseImg = null;
let mode = 'text';
let logoImg = null;

const dz = $('#dropzone');
dz.onclick = () => $('#file-input').click();
dz.ondragover = e => { e.preventDefault(); dz.classList.add('dragover'); };
dz.ondragleave = () => dz.classList.remove('dragover');
dz.ondrop = e => { e.preventDefault(); dz.classList.remove('dragover'); if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]); };
$('#file-input').onchange = e => { if (e.target.files[0]) loadImage(e.target.files[0]); };

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => { baseImg = img; render(); };
    img.src = e.target.result;
    $('#dropzone-text').textContent = '📄 ' + file.name;
  };
  reader.readAsDataURL(file);
}

$('#tab-text').onclick = () => { mode='text'; $('#tab-text').classList.add('active'); $('#tab-logo').classList.remove('active'); render(); };
$('#tab-logo').onclick = () => {
  mode='logo';
  $('#tab-logo').classList.add('active'); $('#tab-text').classList.remove('active');
  if (!logoImg) { const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.onchange=e=>{ const r=new FileReader(); r.onload=ev=>{ logoImg=new Image(); logoImg.onload=()=>render(); logoImg.src=ev.target.result; }; r.readAsDataURL(e.target.files[0]); }; inp.click(); }
  else render();
};

['opacity','fontsize','rotation','color','position','wm-text'].forEach(id => {
  $('#' + id).oninput = render;
  $('#' + id).onchange = render;
});

function render() {
  if (!baseImg) return;
  const canvas = document.createElement('canvas');
  canvas.width = baseImg.naturalWidth;
  canvas.height = baseImg.naturalHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(baseImg, 0, 0);

  const opacity = parseInt($('#opacity').value) / 100;
  const fontSize = parseInt($('#fontsize').value);
  const rotation = parseInt($('#rotation').value);
  const color = $('#color').value;
  const pos = $('#position').value;

  ctx.globalAlpha = opacity;

  if (mode === 'text') {
    const text = $('#wm-text').value || '© 2026';
    ctx.font = `bold ${fontSize}px Arial, sans-serif`;
    ctx.fillStyle = color;
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = Math.max(1, fontSize / 16);

    if (pos === 'tile') {
      ctx.save();
      ctx.translate(canvas.width / 2, canvas.height / 2);
      ctx.rotate(rotation * Math.PI / 180);
      const metrics = ctx.measureText(text);
      const stepX = metrics.width + 100;
      const stepY = fontSize * 3;
      const maxDim = Math.max(canvas.width, canvas.height) * 1.5;
      for (let y = -maxDim; y < maxDim; y += stepY) {
        for (let x = -maxDim; x < maxDim; x += stepX) {
          ctx.strokeText(text, x, y);
          ctx.fillText(text, x, y);
        }
      }
      ctx.restore();
    } else {
      const padding = fontSize * 0.8;
      let x, y;
      const metrics = ctx.measureText(text);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      switch (pos) {
        case 'tl': x = metrics.width/2 + padding; y = fontSize/2 + padding; break;
        case 'tr': x = canvas.width - metrics.width/2 - padding; y = fontSize/2 + padding; break;
        case 'bl': x = metrics.width/2 + padding; y = canvas.height - fontSize/2 - padding; break;
        case 'br': x = canvas.width - metrics.width/2 - padding; y = canvas.height - fontSize/2 - padding; break;
        default: x = canvas.width / 2; y = canvas.height / 2;
      }
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rotation * Math.PI / 180);
      ctx.strokeText(text, 0, 0);
      ctx.fillText(text, 0, 0);
      ctx.restore();
    }
  } else if (mode === 'logo' && logoImg) {
    const lw = canvas.width * 0.25;
    const lh = logoImg.naturalHeight * (lw / logoImg.naturalWidth);
    if (pos === 'tile') {
      const stepX = lw * 2.5;
      const stepY = lh * 2.5;
      for (let y = 0; y < canvas.height + lh; y += stepY) {
        for (let x = 0; x < canvas.width + lw; x += stepX) {
          ctx.save();
          ctx.translate(x + lw/2, y + lh/2);
          ctx.rotate(rotation * Math.PI / 180);
          ctx.drawImage(logoImg, -lw/2, -lh/2, lw, lh);
          ctx.restore();
        }
      }
    } else {
      const padding = 20;
      let x, y;
      switch (pos) {
        case 'tl': x = padding; y = padding; break;
        case 'tr': x = canvas.width - lw - padding; y = padding; break;
        case 'bl': x = padding; y = canvas.height - lh - padding; break;
        case 'br': x = canvas.width - lw - padding; y = canvas.height - lh - padding; break;
        default: x = (canvas.width - lw) / 2; y = (canvas.height - lh) / 2;
      }
      ctx.save();
      ctx.translate(x + lw/2, y + lh/2);
      ctx.rotate(rotation * Math.PI / 180);
      ctx.drawImage(logoImg, -lw/2, -lh/2, lw, lh);
      ctx.restore();
    }
  }

  ctx.globalAlpha = 1;
  $('#canvas-wrap').innerHTML = '';
  canvas.id = 'result-canvas';
  $('#canvas-wrap').appendChild(canvas);
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="btn-apply">${t('apply')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-png">${t('downloadPng')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-jpg">${t('downloadJpg')}</button>
  <button class="gz-btn gz-btn-secondary" id="btn-clear">${t('clear')}</button>`;

$('#btn-apply').onclick = render;
$('#btn-png').onclick = () => { const c=$('#result-canvas'); if(!c){$('#status').textContent=t('needImage');return;} const a=document.createElement('a'); a.href=c.toDataURL('image/png'); a.download='watermarked.png'; a.click(); };
$('#btn-jpg').onclick = () => { const c=$('#result-canvas'); if(!c){$('#status').textContent=t('needImage');return;} const a=document.createElement('a'); a.href=c.toDataURL('image/jpeg',0.92); a.download='watermarked.jpg'; a.click(); };
$('#btn-clear').onclick = () => { baseImg=null; logoImg=null; $('#file-input').value=''; $('#canvas-wrap').innerHTML=''; $('#dropzone-text').textContent=t('dropzoneText'); };

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/image/image-resizer.html', name:'Image Resizer'},
    {icon:'🔄', href:'/image/image-rotate-flip.html', name:'Image Rotate & Flip'},
    {icon:'🗜️', href:'/image/compressor.html', name:'Image Compressor'},
    {icon:'🎨', href:'/image/meme-generator.html', name:'Meme Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
