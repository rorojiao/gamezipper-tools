    step2:'选择算法和密钥/消息编码',

const {$,t,copyText}=GZ;

const B32='ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
function base32Decode(str){
  str=str.toUpperCase().replace(/=+$/,'').replace(/\s/g,'');
  if(!/^[A-Z2-7]*$/.test(str)) throw new Error(t('badB32'));
  let bits='',bytes=[];
  for(const ch of str){const idx=B32.indexOf(ch);if(idx<0)throw new Error(t('badB32'));bits+=idx.toString(2).padStart(5,'0');}
  for(let i=0;i+8<=bits.length;i+=8) bytes.push(parseInt(bits.slice(i,i+8),2));
  return new Uint8Array(bytes);
}
function hexDecode(str){
  str=str.replace(/\s/g,'');
  if(!/^[0-9a-fA-F]*$/.test(str)||str.length%2!==0) throw new Error(t('badHex'));
  const out=new Uint8Array(str.length/2);
  for(let i=0;i<out.length;i++) out[i]=parseInt(str.substr(i*2,2),16);
  return out;
}
function b64Decode(str){
  str=str.replace(/\s/g,'');
  // base64url tolerant
  str=str.replace(/-/g,'+').replace(/_/g,'/');
  if(!/^[A-Za-z0-9+/]*={0,2}$/.test(str)) throw new Error(t('badB64'));
  try{return new Uint8Array(atob(str).split('').map(c=>c.charCodeAt(0)));}
  catch(e){throw new Error(t('badB64'));}
}
function utf8Decode(str){return new TextEncoder().encode(str);}
function decode(str,enc){
  if(enc==='utf8') return utf8Decode(str);
  if(enc==='hex') return hexDecode(str);
  if(enc==='base64') return b64Decode(str);
  if(enc==='base32') return base32Decode(str);
  return utf8Decode(str);
}
function bytesToHex(b){
  const upper=$('#upperCase').checked;
  let s='';for(let i=0;i<b.length;i++){const h=b[i].toString(16).padStart(2,'0');s+=upper?h.toUpperCase():h;}
  return s;
}
function bytesToB64(b){
  let s='';for(let i=0;i<b.length;i++) s+=String.fromCharCode(b[i]);
  return btoa(s);
}
function bytesToB64Url(b){
  return bytesToB64(b).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

async function compute(){
  const keyStr=$('#hmacKey').value;
  const msgStr=$('#hmacMsg').value;
  if(!keyStr||!msgStr){
    $('#outHex').textContent='—';$('#outB64').textContent='—';$('#outB64Url').textContent='—';
    return;
  }
  let keyBytes, msgBytes;
  try{
    keyBytes=decode(keyStr,$('#keyEnc').value);
    msgBytes=decode(msgStr,$('#msgEnc').value);
  }catch(e){
    $('#outHex').innerHTML=`<span style="color:#ef4444">${e.message}</span>`;
    $('#outB64').textContent='—';$('#outB64Url').textContent='—';
    return;
  }
  try{
    const cryptoKey=await crypto.subtle.importKey('raw',keyBytes,{name:'HMAC',hash:{name:$('#algo').value}},false,['sign']);
    const sig=await crypto.subtle.sign('HMAC',cryptoKey,msgBytes);
    const bytes=new Uint8Array(sig);
    $('#outHex').textContent=bytesToHex(bytes);
    $('#outB64').textContent=bytesToB64(bytes);
    $('#outB64Url').textContent=bytesToB64Url(bytes);
  }catch(e){
    $('#outHex').innerHTML=`<span style="color:#ef4444">Error: ${e.message}</span>`;
  }
}
function copyOut(which){
  const el=which==='hex'?$('#outHex'):which==='b64'?$('#outB64'):$('#outB64Url');
  if(el.textContent==='—')return;
  copyText(el.textContent);
}

function loadSample(){
  $('#hmacKey').value='my-shared-secret';
  $('#hmacMsg').value='POST /api/orders\n{"id":12345,"total":99.95}';
  $('#keyEnc').value='utf8';$('#msgEnc').value='utf8';
  $('#algo').value='SHA-256';
  compute();
}

  $('#'+id).addEventListener('change',()=>{if($('#liveMode').checked) compute();});
