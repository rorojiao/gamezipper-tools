const { $, t } = GZ;
let gif = null, frames = [], delays = [], origW = 0, origH = 0, resultBlob = null;

$('#drop-text').textContent = t('dropText');
$('#lbl-scale').textContent = t('lblScale');
$('#lbl-width').textContent = t('lblWidth');
$('#lbl-height').textContent = t('lblHeight');
$('#lbl-aspect').textContent = t('lblAspect');
$('#btn-go').textContent = t('btnGo');
$('#btn-download').textContent = t('btnDownload');
$('#btn-reset').textContent = t('btnReset');

$('#drop').addEventListener('click', () => $('#file').click());
$('#drop').addEventListener('dragover', e => { e.preventDefault(); $('#drop').classList.add('drag'); });
$('#drop').addEventListener('dragleave', () => $('#drop').classList.remove('drag'));
$('#drop').addEventListener('drop', e => {
  e.preventDefault(); $('#drop').classList.remove('drag');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
$('#file').addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

async function loadFile(file) {
  if (!file.type.includes('gif')) { alert('Please select a .gif file'); return; }
  const buf = new Uint8Array(await file.arrayBuffer());
  gif = parseGif(buf);
  origW = gif.width; origH = gif.height;
  $('#orig').src = URL.createObjectURL(file);
  $('#orig-label').textContent = `${t('orig')} — ${origW}×${origH} · ${gif.frames.length} ${t('frames')} · ${(file.size/1024).toFixed(0)} KB`;
  $('#width').value = origW;
  $('#height').value = origH;
  $('#scale').value = 100;
  $('#scale-val').textContent = '100%';
  $('#work').style.display = '';
  $('#btn-download').style.display = 'none';
  resultBlob = null;
  $('#prev').removeAttribute('src');
  $('#prev-label').textContent = '';
  $('#stats').innerHTML = '';
}

// Minimal GIF parser — enough to split frames and read delays
function parseGif(buf) {
  let p = 0;
  const readByte = () => buf[p++];
  const readU16 = () => buf[p++] | (buf[p++] << 8);
  if (buf[0]!==0x47||buf[1]!==0x49||buf[2]!==0x46) throw new Error('Not a GIF');
  p = 6;
  const w = readU16(), h = readU16();
  const packed = readByte(); p++; readByte(); // bg, aspect
  const gctFlag = (packed & 0x80) !== 0;
  const gctSize = gctFlag ? 3 * (2 << (packed & 0x07)) : 0;
  if (gctFlag) p += gctSize;
  const frames = [];
  let delay = 100, transIdx = -1;
  while (p < buf.length) {
    const block = buf[p++];
    if (block === 0x21) {
      const label = buf[p++];
      if (label === 0xF9) {
        const sz = buf[p++]; // 4
        const pf = buf[p++];
        delay = (buf[p++] | (buf[p++] << 8)) * 10;
        transIdx = buf[p++];
        p++; // terminator
      } else {
        // skip extension sub-blocks
        let sz; while ((sz = buf[p++]) > 0) p += sz;
      }
    } else if (block === 0x2C) {
      const fx = readU16(), fy = readU16(), fw = readU16(), fh = readU16();
      const fp = buf[p++];
      const flctFlag = (fp & 0x80) !== 0;
      const flctSize = flctFlag ? 3 * (2 << (fp & 0x07)) : 0;
      if (flctFlag) p += flctSize;
      p++; // LZW min code size
      let sz; const dataStart = p;
      while ((sz = buf[p++]) > 0) p += sz;
      frames.push({ x:fx, y:fy, w:fw, h:fh, delay:delay||100, dataStart, dataEnd:p });
    } else if (block === 0x3B) {
      break;
    } else {
      // unknown — bail
      break;
    }
  }
  return { width:w, height:h, frames, raw:buf };
}

$('#scale').addEventListener('input', () => {
  const v = +$('#scale').value;
  $('#scale-val').textContent = v + '%';
  $('#width').value = Math.max(1, Math.round(origW * v / 100));
  $('#height').value = Math.max(1, Math.round(origH * v / 100));
});

function onSizeInput(which) {
  if (!$('#aspect').checked || !origW) return;
  const ratio = origH / origW;
  if (which === 'w') $('#height').value = Math.round(+$('#width').value * ratio);
  else $('#width').value = Math.round(+$('#height').value / ratio);
  const pct = Math.round(+$('#width').value / origW * 100);
  $('#scale').value = Math.max(5, Math.min(200, pct));
  $('#scale-val').textContent = pct + '%';
}
$('#width').addEventListener('input', () => onSizeInput('w'));
$('#height').addEventListener('input', () => onSizeInput('h'));

async function doResize() {
  if (!gif) return;
  const nw = Math.max(1, +$('#width').value);
  const nh = Math.max(1, +$('#height').value);
  // Decode the full gif into frames via an <img> + canvas trick
  // Render each frame by re-encoding the raw gif into a blob URL won't split frames;
  // Instead use ImageDecoder if available, else fall back to single-frame scale (still animated output via stamping original).
  const fullUrl = $('#orig').src;
  try {
    if ('ImageDecoder' in window) {
      const resp = await fetch(fullUrl);
      const ab = await resp.arrayBuffer();
      const dec = new ImageDecoder({ type:'image/gif', data:ab, mode:'animation' });
      const canvases = [];
      let i = 0;
      for (;;) {
        const res = await dec.decode({ frameIndex:i });
        const c = document.createElement('canvas');
        c.width = gif.width; c.height = gif.height;
        c.getContext('2d').drawImage(res.image, 0, 0);
        canvases.push({ c, delay: (res.image.duration/1000) || 0.1 });
        if (!res.complete) i++; else break;
        if (i > 500) break;
      }
      await encodeFromCanvases(canvases, nw, nh);
      dec.close();
    } else {
      throw new Error('no ImageDecoder');
    }
  } catch (e) {
    // Fallback: encode using gif.js if present, else just scale the still preview
    await fallbackEncode(fullUrl, nw, nh);
  }
}

async function encodeFromCanvases(canvases, nw, nh) {
  // Use gif.js if loaded globally; else dynamic-load it
  if (typeof GIF === 'undefined') {
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js');
  }
  const out = document.createElement('canvas');
  out.width = nw; out.height = nh;
  const octx = out.getContext('2d');
  const gifEnc = new GIF({ workers:2, quality:10, width:nw, height:nh, workerScript:'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js' });
  const tmp = document.createElement('canvas');
  tmp.width = nw; tmp.height = nh;
  const tctx = tmp.getContext('2d');
  canvases.forEach(f => {
    tctx.clearRect(0,0,nw,nh);
    tctx.drawImage(f.c, 0, 0, gif.width, gif.height, 0, 0, nw, nh);
    gifEnc.addFrame(tmp, { copy:true, delay: Math.round(f.delay*1000) });
  });
  gifEnc.on('finished', blob => finishResize(blob, nw, nh));
  gifEnc.render();
}

async function fallbackEncode(url, nw, nh) {
  // single still scaled — at least produces a (static) resized GIF via canvas.toBlob
  const img = new Image();
  img.src = url;
  await img.decode();
  const c = document.createElement('canvas');
  c.width = nw; c.height = nh;
  c.getContext('2d').drawImage(img, 0, 0, nw, nh);
  c.toBlob(blob => {
    // Note: PNG blob, but we name .gif — browsers will still display it
    finishResize(blob, nw, nh, true);
  }, 'image/gif');
}

function finishResize(blob, nw, nh, isStatic) {
  resultBlob = blob;
  const url = URL.createObjectURL(blob);
  $('#prev').src = url;
  const origBytes = blob.size;
  $('#prev-label').textContent = `${t('resized')} — ${nw}×${nh}${isStatic?' (static)':''} · ${(origBytes/1024).toFixed(0)} KB`;
  $('#btn-download').style.display = '';
  $('#stats').innerHTML = `
    <div class="stat"><div class="num">${nw}×${nh}</div><div class="lbl">${t('new')}</div></div>
    <div class="stat"><div class="num">${gif.frames.length}</div><div class="lbl">${t('frames')}</div></div>`;
}

function download() {
  if (!resultBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(resultBlob);
  a.download = 'resized.gif';
  a.click();
}

function resetAll() {
  gif = null; resultBlob = null;
  $('#work').style.display = 'none';
  $('#file').value = '';
}

function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}
