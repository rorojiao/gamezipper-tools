    step4: '将整洁的格式化结果复制到剪贴板',

const { $, copyText, t } = GZ;

function parseTOML(text) {
  const lines = text.split('\n');
  const result = []; // ordered list of entries
  const errors = [];

  lines.forEach((rawLine, idx) => {
    const line = rawLine.trim();
    if (!line) { result.push({type:'blank'}); return; }
    if (line.startsWith('#')) { result.push({type:'comment', text: line}); return; }

    // Table header [section] or [section.subsection]
    const tableMatch = line.match(/^\[([^\]]+)\]$/);
    if (tableMatch) {
      result.push({type:'table', name: tableMatch[1].trim()});
      return;
    }

    // Array of tables [[section]]
    const arrTableMatch = line.match(/^\[\[([^\]]+)\]\]$/);
    if (arrTableMatch) {
      result.push({type:'arraytable', name: arrTableMatch[1].trim()});
      return;
    }

    // Key = value
    const kvMatch = line.match(/^([^=\s]+)\s*=\s*(.*)$/);
    if (kvMatch) {
      result.push({type:'kv', key: kvMatch[1], rawValue: kvMatch[2], line: idx+1});
      return;
    }

    errors.push(`Line ${idx+1}: invalid TOML syntax`);
  });

  return { result, errors };
}

function formatTOMLValue(raw) {
  // Keep the value as-is but trim trailing comments nicely
  return raw.replace(/(#.*)$/, ' $1').trim();
}

function doFormat() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const { result, errors } = parseTOML(inp);
    if (errors.length) throw new Error(errors[0]);

    let entries = result;

    if ($('#sortTabChk')?.checked) {
      // Separate top-level key-values, comments before first table, then sorted tables
      const before = [];
      const tables = {};
      let order = [];
      let seenTable = false;
      entries.forEach(e => {
        if ((e.type === 'table' || e.type === 'arraytable') && !seenTable) seenTable = true;
        if (!seenTable) { before.push(e); return; }
        if (e.type === 'table' || e.type === 'arraytable') {
          if (!tables[e.name]) { tables[e.name] = []; order.push(e.name); }
          tables[e.name].push(e);
        } else if (order.length) {
          tables[order[order.length-1]].push(e);
        }
      });
      entries = [...before];
      Object.keys(tables).sort((a,b) => a.localeCompare(b)).forEach(name => {
        let items = tables[name];
        if ($('#sortKeyChk')?.checked) {
          const header = items.find(e => e.type === 'table' || e.type === 'arraytable');
          const kvs = items.filter(e => e.type === 'kv').sort((a,b) => a.key.localeCompare(b.key));
          items = [header, ...kvs];
        }
        entries.push(...items);
      });
    } else if ($('#sortKeyChk')?.checked) {
      // Sort keys within each table without moving tables
      const grouped = [];
      let cur = [];
      entries.forEach(e => {
        if (e.type === 'table' || e.type === 'arraytable') {
          if (cur.length) grouped.push(cur);
          cur = [e];
        } else {
          cur.push(e);
        }
      });
      if (cur.length) grouped.push(cur);
      grouped.forEach(g => {
        const headerIdx = g.findIndex(e => e.type === 'table' || e.type === 'arraytable');
        const header = headerIdx >= 0 ? g[headerIdx] : null;
        const kvs = g.filter(e => e.type === 'kv').sort((a,b) => a.key.localeCompare(b.key));
        const idx = grouped.indexOf(g);
        grouped[idx] = header ? [header, ...kvs] : kvs;
      });
      entries = grouped.flat();
    }

    // Alignment
    let maxKeyLen = 0;
    if ($('#alignChk')?.checked) {
      entries.forEach(e => { if (e.type === 'kv') maxKeyLen = Math.max(maxKeyLen, e.key.length); });
    }

    const output = entries.map(e => {
      if (e.type === 'blank') return '';
      if (e.type === 'comment') return e.text;
      if (e.type === 'table') return `[${e.name}]`;
      if (e.type === 'arraytable') return `[[${e.name}]]`;
      if (e.type === 'kv') {
        const key = $('#alignChk')?.checked ? e.key.padEnd(maxKeyLen) : e.key;
        return `${key} = ${formatTOMLValue(e.rawValue)}`;
      }
      return '';
    }).join('\n');

    $('#output').innerHTML = highlightTOML(output);
    const tableCount = entries.filter(e => e.type === 'table' || e.type === 'arraytable').length;
    const keyCount = entries.filter(e => e.type === 'kv').length;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('validToml')}: ${tableCount} ${t('tables')}, ${keyCount} ${t('keys')}</span>`;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidToml')}: ${e.message}</span>`;
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${escHtml(e.message)}</span>`;
  }
}

function highlightTOML(text) {
  return escHtml(text).split('\n').map(line => {
    if (/^\s*#/.test(line)) return `<span class="toml-comment">${line}</span>`;
    if (/^\s*\[\[.+\]\]/.test(line)) return `<span class="toml-table">${line}</span>`;
    if (/^\s*\[.+\]/.test(line)) return `<span class="toml-table">${line}</span>`;
    return line.replace(/^(\s*)([^=\s]+)(\s*=\s*)(.*)$/, (m, sp, key, eq, val) => {
      let vSpan = val;
      if (/^(true|false)/.test(val.trim())) vSpan = `<span class="toml-bool">${val}</span>`;
      else if (/^-?\d/.test(val.trim())) vSpan = `<span class="toml-number">${val}</span>`;
      else if (/^["']/.test(val.trim())) vSpan = `<span class="toml-string">${val}</span>`;
      else if (/^\d{4}-\d{2}-\d{2}/.test(val.trim())) vSpan = `<span class="toml-date">${val}</span>`;
      return `${sp}<span class="toml-key">${key}</span>${eq}${vSpan}`;
    });
  }).join('\n');
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function loadExample() {
  $('#input').value = '[package]\nname = "myapp"\nversion = "1.0.0"\nedition = "2021"\n\n[dependencies]\nserde = "1.0"\ntokio = { version = "1", features = ["full"] }\n\n[profile.release]\nopt-level = 3\nlto = true';
  doFormat();
}

function doClear() { $('#input').value=''; $('#output').textContent=''; $('#status').innerHTML=''; }

$('#toolbar').innerHTML = `

  <label style="display:flex;align-items:center;gap:4px;font-size:.85em"><input type="checkbox" id="sortTabChk"> ${t('sortTables')}</label>
  <label style="display:flex;align-items:center;gap:4px;font-size:.85em"><input type="checkbox" id="sortKeyChk"> ${t('sortKeys')}</label>
  <label style="display:flex;align-items:center;gap:4px;font-size:.85em"><input type="checkbox" id="alignChk" checked> ${t('alignValues')}</label>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
