<script>
GZI18n.register({
  en:{toolTitle:'HSV ↔ RGB Converter',toolDesc:'Convert colors between HSV (Hue, Saturation, Value) and RGB formats instantly.',
    s1:'Enter an HSV value (e.g. hsv(255, 60%, 91%))',s2:'Or enter an RGB value (e.g. rgb(108, 92, 231))',
    s3:'Use the H/S/V sliders to pick a color visually',s4:'Click Copy to copy either HSV or RGB value',
    rHex:'HEX ↔ HSL',rRgb:'HEX ↔ RGB',rRgbHsl:'RGB ↔ HSL',rPicker:'Color Picker'},
  zh:{toolTitle:'HSV ↔ RGB 转换器',toolDesc:'即时转换 HSV（色相、饱和度、明度）与 RGB 颜色格式。',
    s1:'输入 HSV 值（如 hsv(255, 60%, 91%)）',s2:'或输入 RGB 值（如 rgb(108, 92, 231)）',
    s3:'使用 H/S/V 滑块可视化选择颜色',s4:'点击复制按钮复制 HSV 或 RGB 值',
    rHex:'HEX ↔ HSL',rRgb:'HEX ↔ RGB',rRgbHsl:'RGB ↔ HSL',rPicker:'取色器'}
});

const { $, t } = GZ;
const hsvIn=$('#hsvInput'),rgbIn=$('#rgbInput');
const hS=$('#hSlider'),sS=$('#sSlider'),vS=$('#vSlider');

function rgb2hsv(r,g,b){
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  const d=max-min;
  let h,s=max;
  const v=max;
  if(d===0){h=0;}
  else{
    switch(max){
      case r:h=((g-b)/d)%6;break;
      case g:h=(b-r)/d+2;break;
      case b:h=(r-g)/d+4;break;
    }
    h*=60;
    if(h<0)h+=360;
  }
  s=max===0?0:d/max;
  return[Math.round(h),Math.round(s*100),Math.round(v*100)];
}
function hsv2rgb(h,s,v){
  h=(h%360)/360;s/=100;v/=100;
  const c=v*s;
  const hh=h*6;
  const x=c*(1-Math.abs(hh%2-1));
  const m=v-c;
  let r,g,b;
  if(hh<1){[r,g,b]=[c,x,0];}
  else if(hh<2){[r,g,b]=[x,c,0];}
  else if(hh<3){[r,g,b]=[0,c,x];}
  else if(hh<4){[r,g,b]=[0,x,c];}
  else if(hh<5){[r,g,b]=[x,0,c];}
  else{[r,g,b]=[c,0,x];}
  r=Math.max(0,Math.min(1,r+m));g=Math.max(0,Math.min(1,g+m));b=Math.max(0,Math.min(1,b+m));
  return[Math.round(r*255),Math.round(g*255),Math.round(b*255)];
}

function updatePreview(r,g,b){
  $('#preview').style.background=`rgb(${r},${g},${b})`;
  const[h,s,v]=rgb2hsv(r,g,b);
  hS.value=h;sS.value=s;vS.value=v;
  $('#hVal').textContent=h;$('#sVal').textContent=s;$('#vVal').textContent=v;
}

hsvIn.addEventListener('input',()=>{
  const m=hsvIn.value.match(/(\d{1,3})\s*,\s*(\d{1,3})%?\s*,\s*(\d{1,3})%?/);
  if(m){
    const[h,s,v]=[+m[1],+m[2],+m[3]];
    if(h<=360&&s<=100&&v<=100){
      const[r,g,b]=hsv2rgb(h,s,v);
      rgbIn.value=`rgb(${r}, ${g}, ${b})`;
      updatePreview(r,g,b);
    }
  }
});

rgbIn.addEventListener('input',()=>{
  const m=rgbIn.value.match(/(\d{1,3})\s*,\s*(\d{1,3})\s*,\s*(\d{1,3})/);
  if(m){
    const[r,g,b]=[+m[1],+m[2],+m[3]];
    if(r<=255&&g<=255&&b<=255){
      const[h,s,v]=rgb2hsv(r,g,b);
      hsvIn.value=`hsv(${h}, ${s}%, ${v}%)`;
      updatePreview(r,g,b);
    }
  }
});

function fromSliders(){
  const h=+hS.value,s=+sS.value,v=+vS.value;
  const[r,g,b]=hsv2rgb(h,s,v);
  hsvIn.value=`hsv(${h}, ${s}%, ${v}%)`;
  rgbIn.value=`rgb(${r}, ${g}, ${b})`;
  updatePreview(r,g,b);
}

// Init
hsvIn.dispatchEvent(new Event('input'));

  howToSteps:['s1','s2','s3','s4'],

    {href:'/color/rgb-to-hsl.html',icon:'🔄',nameKey:'rRgbHsl'},
    {href:'/color/picker.html',icon:'🎯',nameKey:'rPicker'}
  ]
});
</script>
