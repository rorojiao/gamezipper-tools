<script>

    lblSsid: '网络名称（SSID）',
    lblSecurity: '加密方式',
    lblPass: '密码',
    lblHidden: '隐藏网络',
    hiddenText: 'SSID 隐藏时也自动连接',
    lblSize: '图片尺寸',
    generate: '生成',
    downloadPng: '下载 PNG',
    downloadSvg: '下载 SVG',
    print: '打印',
    hint: '用手机相机扫码即可自动连接 WiFi',
    needSsid: '请输入网络名称以生成二维码',
    escHint: '密码中的特殊字符会自动转义',
    step1: '输入你的 WiFi 网络名称（SSID）',
    step2: '选择加密方式并输入密码',
    step3: '点击「生成」，然后下载 PNG 或 SVG',
    step4: '打印或分享二维码供访客扫描',
  }
});

const { $, t } = GZ;

function esc(s){ return s.replace(/([\\;,:"])/g,'\\$1'); }

function buildWifiString(){
  const ssid = $('#ssid').value.trim();
  const pass = $('#pass').value;
  const sec = $('#security').value;
  const hidden = $('#hidden').checked ? 'true' : 'false';
  if(!ssid) return '';
  if(sec==='nopass') return `WIFI:T:nopass;S:${esc(ssid)};H:${hidden};;`;
  return `WIFI:T:${sec};S:${esc(ssid)};P:${esc(pass)};H:${hidden};;`;
}

function drawQr(svg){
  const data = buildWifiString();
  const wrap = $('#qrWrap');
  let canvas = $('#canvas');
  if(!data){
    if(canvas){ canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height); canvas.style.display='none'; }
    $('#hint').textContent = t('needSsid');
    return;
  }
  const size = parseInt($('#size').value);
  const qr = qrcode(0,'M'); // type 0 = auto, error correction M
  qr.addData(data);
  qr.make();
  if(svg){
    wrap.querySelector('svg')?.remove();
    const svgStr = qr.createSvgTag({cellSize:Math.max(3,Math.floor(size/qr.getModuleCount())),margin:2,scalable:true});
    const tmp = document.createElement('div'); tmp.innerHTML = svgStr;
    wrap.insertBefore(tmp.firstChild, $('#hint'));
  } else {
    const cellSize = Math.floor(size/qr.getModuleCount());
    canvas.style.display='block';
    canvas.width = qr.getModuleCount()*cellSize;
    canvas.height = qr.getModuleCount()*cellSize;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#000';
    const count = qr.getModuleCount();
    for(let r=0;r<count;r++) for(let c=0;c<count;c++) if(qr.isDark(r,c)) ctx.fillRect(c*cellSize,r*cellSize,cellSize,cellSize);
  }
  $('#hint').textContent = t('hint');
}

let lastSvg = '';
function captureSvg(){
  const data = buildWifiString();
  if(!data) return '';
  const qr = qrcode(0,'M'); qr.addData(data); qr.make();
  return qr.createSvgTag({cellSize:5,margin:3,scalable:true});
}

function downloadPng(){
  const data = buildWifiString(); if(!data) return;
  const size = parseInt($('#size').value);
  const qr = qrcode(0,'M'); qr.addData(data); qr.make();
  const cellSize = Math.floor(size/qr.getModuleCount());
  const c = document.createElement('canvas');
  c.width = qr.getModuleCount()*cellSize; c.height = c.width;
  const ctx = c.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle='#000';
  const n = qr.getModuleCount();
  for(let r=0;r<n;r++) for(let cc=0;cc<n;cc++) if(qr.isDark(r,cc)) ctx.fillRect(cc*cellSize,r*cellSize,cellSize,cellSize);
  const link = document.createElement('a'); link.download='wifi-qr.png'; link.href=c.toDataURL('image/png'); link.click();
}

function downloadSvg(){
  const svg = captureSvg(); if(!svg) return;
  const blob = new Blob([svg],{type:'image/svg+xml'});
  const link = document.createElement('a'); link.download='wifi-qr.svg'; link.href=URL.createObjectURL(blob); link.click();
}

function doPrint(){
  const svg = captureSvg(); if(!svg) return;
  const w = window.open('','_blank');
  w.document.write(`<title>WiFi QR Code</title><body style="text-align:center;font-family:sans-serif"><h3>${$('#ssid').value.replace(/</g,'&lt;')}</h3>${svg}<p>Scan to join WiFi</p><script>window.print()<\/script></body>`);
  w.document.close();
}

function update(){
  $('#pass').disabled = $('#security').value === 'nopass';
  drawQr(false);
}

['input','change'].forEach(ev=>{
  $('#ssid').addEventListener(ev,update);
  $('#pass').addEventListener(ev,update);
  $('#security').addEventListener(ev,update);
  $('#hidden').addEventListener(ev,update);
  $('#size').addEventListener(ev,update);
});

$('#lbl-ssid').textContent = t('lblSsid');
$('#lbl-security').textContent = t('lblSecurity');
$('#lbl-pass').textContent = t('lblPass');
$('#lbl-hidden').textContent = t('lblHidden');
$('#hidden-text').textContent = t('hiddenText');
$('#lbl-size').textContent = t('lblSize');
$('#opt-nopass').textContent = 'No password';
$('#ssid').placeholder = t('lblSsid');
$('#pass').placeholder = t('lblPass');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="update()">${t('generate')}</button>
  <button class="gz-btn" onclick="downloadPng()">${t('downloadPng')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadSvg()">${t('downloadSvg')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doPrint()">${t('print')}</button>`;

update();

    {icon:'🔗', href:'/convert/url-shortener.html', name:'URL Shortener'},

});
</script>
