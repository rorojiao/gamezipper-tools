<script>
GZI18n.register({
  en: {
    toolTitle: 'Walking Pace Calculator',
    toolDesc: 'Calculate walking pace, time or distance from any two values. Supports miles or kilometers. Perfect for walking, hiking and charity walks. Free, no signup.',
    modePace: 'Find Pace',
    modeTime: 'Find Time',
    modeDist: 'Find Distance',
    distance: 'Distance',
    time: 'Time (minutes)',
    paceMin: 'Pace minutes',
    paceSec: 'Pace seconds',
    distUnit: 'Distance unit',
    miles: 'miles',
    km: 'km',
    perMile: 'min/mile',
    perKm: 'min/km',
    yourPace: 'Your pace is',
    yourTime: 'Estimated time',
    yourDist: 'Estimated distance',
    hours: 'h',
    min: 'min',
    sec: 'sec',
    step1: 'Choose what you want to find — pace, time or distance',
    step2: 'Select miles or kilometers',
    step3: 'Enter the two known values',
    step4: 'See your result instantly — great for planning walks and hikes',
  },
  zh: {
    toolTitle: '步行配速计算器',
    toolDesc: '通过任意两个已知值计算步行配速、时间或距离。支持英里或公里。适合步行、徒步和慈善健走。免费、无需注册。',
    modePace: '计算配速',
    modeTime: '计算时间',
    modeDist: '计算距离',
    distance: '距离',
    time: '时间（分钟）',
    paceMin: '配速 分钟',
    paceSec: '配速 秒',
    distUnit: '距离单位',
    miles: '英里',
    km: '公里',
    perMile: '分钟/英里',
    perKm: '分钟/公里',
    yourPace: '你的配速为',
    yourTime: '预计用时',
    yourDist: '预计距离',
    hours: '时',
    min: '分',
    sec: '秒',
    step1: '选择要计算的值 — 配速、时间或距离',
    step2: '选择英里或公里',
    step3: '输入两个已知值',
    step4: '即时查看结果 — 适合规划步行和徒步路线',
  }
});

const { $, t } = GZ;
let mode = 'pace'; // pace | time | dist
let unit = 'mi';

function setMode(m){ mode = m; renderInputs(); calc(); }
function setUnit(u){ unit = u; renderInputs(); calc(); }

function renderModes() {
  $('#modes').innerHTML = `
    <button class="${mode==='pace'?'active':''}" onclick="setMode('pace')">${t('modePace')}</button>
    <button class="${mode==='time'?'active':''}" onclick="setMode('time')">${t('modeTime')}</button>
    <button class="${mode==='dist'?'active':''}" onclick="setMode('dist')">${t('modeDist')}</button>`;
  $('#units').innerHTML = `
    <button class="${unit==='mi'?'active':''}" onclick="setUnit('mi')">${t('miles')}</button>
    <button class="${unit==='km'?'active':''}" onclick="setUnit('km')">${t('km')}</button>`;
}

function renderInputs() {
  const distLabel = t('distance') + ' (' + (unit==='mi'?t('miles'):t('km')) + ')';
  const fields = {
    dist: {label:distLabel, id:'in-dist', placeholder:'5'},
    time: {label:t('time'), id:'in-time', placeholder:'60'},
    paceMin: {label:t('paceMin'), id:'in-pace-min', placeholder:'19'},
    paceSec: {label:t('paceSec'), id:'in-pace-sec', placeholder:'0'},
  };
  const order = mode==='pace' ? ['dist','time'] : mode==='time' ? ['dist','paceMin','paceSec'] : ['time','paceMin','paceSec'];
  const html = order.map(key => {
    const f = fields[key];
    const disabled = (mode==='pace' && (key==='paceMin'||key==='paceSec')) ||
                     (mode==='time' && key==='time') ||
                     (mode==='dist' && key==='dist');
    return `<label class="${disabled?'disabled':''}">${f.label}<input type="number" id="${f.id}" placeholder="${f.placeholder}" oninput="calc()" ${disabled?'disabled':''}></label>`;
  }).join('');
  $('#inputs').innerHTML = html;
}

function fmtTime(totalMin) {
  const h = Math.floor(totalMin/60);
  const m = Math.floor(totalMin%60);
  const s = Math.round((totalMin - Math.floor(totalMin))*60);
  if (h > 0) return `${h} ${t('hours')} ${m} ${t('min')}`;
  return `${m} ${t('min')} ${s} ${t('sec')}`;
}

function fmtPace(totalMin) {
  const m = Math.floor(totalMin);
  const s = Math.round((totalMin - m)*60);
  const per = unit==='mi' ? t('perMile') : t('perKm');
  return `${m}:${String(s).padStart(2,'0')} ${per}`;
}

function val(id){ const v = parseFloat($('#'+id).value); return isNaN(v)?null:v; }

function calc() {
  const res = $('#result');
  try {
    if (mode === 'pace') {
      const d = val('in-dist'), tm = val('in-time');
      if (!d || !tm || d<=0) { res.innerHTML = '<span style="opacity:.5">—</span>'; return; }
      const pace = tm / d;
      res.innerHTML = `${t('yourPace')} <b>${fmtPace(pace)}</b>`;
    } else if (mode === 'time') {
      const d = val('in-dist'), pm = val('in-pace-min'), ps = val('in-pace-sec');
      if (!d || pm===null || ps===null) { res.innerHTML = '<span style="opacity:.5">—</span>'; return; }
      const paceTotal = (pm||0) + (ps||0)/60;
      if (paceTotal<=0) { res.innerHTML = '<span style="opacity:.5">—</span>'; return; }
      const time = d * paceTotal;
      res.innerHTML = `${t('yourTime')} <b>${fmtTime(time)}</b>`;
    } else {
      const tm = val('in-time'), pm = val('in-pace-min'), ps = val('in-pace-sec');
      if (!tm || pm===null || ps===null) { res.innerHTML = '<span style="opacity:.5">—</span>'; return; }
      const paceTotal = (pm||0) + (ps||0)/60;
      if (paceTotal<=0) { res.innerHTML = '<span style="opacity:.5">—</span>'; return; }
      const dist = tm / paceTotal;
      const u = unit==='mi' ? t('miles') : t('km');
      res.innerHTML = `${t('yourDist')} <b>${dist.toFixed(2)} ${u}</b>`;
    }
  } catch(e) {
    res.innerHTML = '<span style="opacity:.5">—</span>';
  }
}

renderModes();
renderInputs();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🦵', href:'/calc/vertical-jump-calculator.html', name:'Vertical Jump'},
    {icon:'🔥', href:'/calc/steps-to-calories.html', name:'Steps to Calories'},
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
    {icon:'💧', href:'/calc/water-intake.html', name:'Water Intake'},
  ]
});
</script>
