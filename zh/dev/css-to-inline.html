const { $, copyText, t } = GZ;

function parseCSS(css) {
  const rules = [];
  const cleaned = css.replace(/\/\*[\s\S]*?\*\//g, '');
  const re = /([^{]+)\{([^}]*)\}/g;
  let m;
  while ((m = re.exec(cleaned)) !== null) {
    const selector = m[1].trim();
    const props = m[2].trim();
    if (!selector || !props) continue;
    if (selector.startsWith('@')) continue;
    const declarations = {};
    props.split(';').forEach(p => {
      const idx = p.indexOf(':');
      if (idx === -1) return;
      const prop = p.substring(0, idx).trim();
      const val = p.substring(idx + 1).trim();
      if (prop && val) declarations[prop] = val;
    });
    if (Object.keys(declarations).length > 0) {
      rules.push({ selector, declarations });
    }
  }
  return rules;
}

function inlineStyles(html, css) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const rules = parseCSS(css);

  let inlined = 0;
  rules.forEach(({ selector, declarations }) => {
    try {
      const els = doc.querySelectorAll(selector);
      els.forEach(el => {
        const existing = el.getAttribute('style') || '';
        const existingDecls = {};
        if (existing) {
          existing.split(';').forEach(p => {
            const idx = p.indexOf(':');
            if (idx === -1) return;
            existingDecls[p.substring(0, idx).trim()] = p.substring(idx + 1).trim();
          });
        }
        const merged = { ...existingDecls, ...declarations };
        const styleStr = Object.entries(merged).map(([k, v]) => `${k}: ${v}`).join('; ');
        el.setAttribute('style', styleStr);
        inlined++;
      });
    } catch(e) {}
  });

  return { html: doc.body ? doc.body.innerHTML : html, inlined };
}

function doConvert() {
  const html = $('#html-input').value.trim();
  const css = $('#css-input').value.trim();
  if (!html) return;
  const result = inlineStyles(html, css);
  const escaped = result.html.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  $('#output').innerHTML = escaped;
  $('#stats').textContent = `${inlined} styles inlined`.replace('{n}', result.inlined);
}

  doConvert();
}
