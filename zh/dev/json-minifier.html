<script>
GZI18n.register({
  en: {
    toolTitle: 'JSON Minifier & Compressor',
    toolDesc: 'Compress JSON to its smallest size by removing all whitespace, line breaks and indentation. Get the size savings instantly.',
    lblIn: 'Input JSON',
    lblOut: 'Minified JSON',
    minify: 'Minify',
    valid: '✓ Valid JSON',
    invalid: '✗ Invalid JSON',
    saved: 'saved',
    bytes: 'bytes',
    step1: 'Paste your JSON in the input area',
    step2: 'Click Minify to compress it to one line',
    step3: 'See the size savings and copy the result',
  },
  zh: {
    toolTitle: 'JSON 压缩工具',
    toolDesc: '通过移除所有空白、换行和缩进将 JSON 压缩到最小体积，即时显示节省的空间大小。',
    lblIn: '输入 JSON',
    lblOut: '压缩后的 JSON',
    minify: '压缩',
    valid: '✓ JSON 有效',
    invalid: '✗ JSON 无效',
    saved: '节省',
    bytes: '字节',
    step1: '在输入区粘贴 JSON',
    step2: '点击「压缩」将其压缩为一行',
    step3: '查看节省的空间并复制结果',
  }
});

const { $, copyText, t } = GZ;

function formatBytes(n) {
  return n.toLocaleString() + ' ' + t('bytes');
}

function doMinify() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const obj = JSON.parse(inp);
    const minified = JSON.stringify(obj);
    const origSize = new Blob([inp]).size;
    const newSize = new Blob([minified]).size;
    const pct = origSize > 0 ? Math.round((1 - newSize / origSize) * 100) : 0;
    $('#output').value = minified;
    const color = pct > 0 ? 'var(--gz-success)' : 'var(--text2)';
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')}</span> &nbsp; <span class="gz-stat">${formatBytes(origSize)} → <b>${formatBytes(newSize)}</b></span> <span class="gz-stat" style="color:${color}">${pct >= 0 ? '↓' : '↑'} ${Math.abs(pct)}% ${t('saved')}</span>`;
  } catch(e) {
    const msg = e.message;
    const posMatch = msg.match(/position (\d+)/);
    let info = `<span style="color:var(--gz-accent)">${t('invalid')}: ${msg}</span>`;
    if (posMatch) {
      const pos = parseInt(posMatch[1]);
      const before = $('#input').value.substring(0, pos);
      const line = before.split('\n').length;
      const col = pos - before.lastIndexOf('\n');
      info += ` <span style="opacity:.7">(Line ${line}, Col ${col})</span>`;
    }
    $('#status').innerHTML = info;
    $('#output').value = '';
  }
}

function loadExample() {
  $('#input').value = JSON.stringify({
    "app": "GameZipper Tools",
    "version": "2.0.0",
    "features": ["json-minifier", "formatter", "validator"],
    "config": {
      "theme": "auto",
      "language": "en",
      "cache": true,
      "limits": { "maxSize": 1048576, "timeout": 30 }
    },
    "active": true,
    "count": 42
  }, null, 2);
  doMinify();
}

function doClear() { $('#input').value=''; $('#output').value=''; $('#status').innerHTML=''; }

$('#input').addEventListener('input', doMinify);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doMinify()">${t('minify')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3'],
  related: [
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'✨', href:'/dev/js-beautifier.html', name:'JS Beautifier'},
    {icon:'🗃️', href:'/dev/sql.html', name:'SQL Formatter'},
    {icon:'📄', href:'/dev/html-minifier.html', name:'HTML Minifier'},
  ]
});
</script>
