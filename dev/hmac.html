<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is HMAC?","acceptedAnswer":{"@type":"Answer","text":"HMAC (Hash-based Message Authentication Code) is a mechanism for verifying the integrity and authenticity of a message using a cryptographic hash function and a secret key. It is widely used in APIs (AWS, Stripe), JWT signing, and message verification."}},{"@type":"Question","name":"What is the difference between HMAC and hash?","acceptedAnswer":{"@type":"Answer","text":"A regular hash (like SHA-256) only takes a message as input. HMAC takes both a message and a secret key, producing a signature that proves the message was created by someone who knows the key. Without the key, you cannot reproduce the HMAC."}},{"@type":"Question","name":"Which algorithm should I use?","acceptedAnswer":{"@type":"Answer","text":"HMAC-SHA256 is the most common choice and recommended for most use cases. HMAC-SHA1 is still used in some legacy systems but is deprecated for new applications. HMAC-SHA512 provides the strongest security but produces longer output."}},{"@type":"Question","name":"Is my data sent to any server?","acceptedAnswer":{"@type":"Answer","text":"No. All HMAC computation runs entirely in your browser using the Web Crypto API. Your key and message never leave your device."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'HMAC Generator',
    toolDesc: 'Generate HMAC signatures with SHA-1, SHA-256, SHA-384, and SHA-512. Enter a key and message to compute the HMAC instantly.',
    lblKey: 'Secret Key',
    lblMsg: 'Message',
    lblAlgo: 'Algorithm',
    step1: 'Enter your secret key',
    step2: 'Type or paste the message to sign',
    step3: 'Select the hash algorithm (SHA-256 recommended)',
    step4: 'Copy the HMAC result to clipboard',
    generateAll: 'Generate All',
  },
  zh: {
    toolTitle: 'HMAC 生成器',
    toolDesc: '使用 SHA-1、SHA-256、SHA-384 和 SHA-512 生成 HMAC 签名。输入密钥和消息即可即时计算 HMAC。',
    lblKey: '密钥',
    lblMsg: '消息',
    lblAlgo: '算法',
    step1: '输入你的密钥',
    step2: '输入或粘贴要签名的消息',
    step3: '选择哈希算法（推荐 SHA-256）',
    step4: '复制 HMAC 结果到剪贴板',
    generateAll: '生成全部',
  }
});

const { $, copyText, t } = GZ;

async function hmac(key, msg, algo) {
  const enc = new TextEncoder();
  const cryptoKey = await crypto.subtle.importKey('raw', enc.encode(key), { name: 'HMAC', hash: algo }, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', cryptoKey, enc.encode(msg));
  return Array.from(new Uint8Array(sig)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function generate() {
  const key = $('#key').value;
  const msg = $('#message').value;
  const selectedAlgo = $('#algo').value;

  if (!key && !msg) { $('#results').innerHTML = ''; return; }

  const algorithms = ['SHA-1', 'SHA-256', 'SHA-384', 'SHA-512'];
  const results = await Promise.all(algorithms.map(async algo => {
    const hash = await hmac(key, msg, algo);
    return { algo, hash };
  }));

  $('#results').innerHTML = results.map(r => `
    <div class="hmac-result" style="${r.algo === selectedAlgo ? 'border-color:var(--gz-accent)' : ''}">
      <span class="algo">HMAC-${r.algo.replace('SHA-','SHA')}</span>
      <span class="hash">${r.hash}</span>
      <button class="gz-btn gz-btn-secondary" onclick="copyText('${r.hash}')" style="padding:6px 12px;font-size:.8em">${t('copy')}</button>
    </div>
  `).join('');
}

$('#key').addEventListener('input', generate);
$('#message').addEventListener('input', generate);
$('#algo').addEventListener('change', generate);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#key').value='secret';$('#message').value='Hello, World!';generate()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#key').value='';$('#message').value='';$('#results').innerHTML=''">${t('clear')}</button>`;

GZ.renderToolPage({

    {icon:'🔑', href:'/dev/password-generator.html', name:'Password Generator'},
  ]
});
</script>
