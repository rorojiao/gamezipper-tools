<script>
GZI18n.register({
  en: {
    toolTitle: 'Album Cover Maker',
    toolDesc: 'Create album, mixtape and Spotify playlist covers with a title, artist name and gradient or photo background. Download a 3000×3000 PNG — free, in your browser.',
    lblTitle: 'Album Title', lblArtist: 'Artist Name', lblLayout: 'Layout',
    lblFont: 'Font', lblFontSize: 'Font Size', lblTextColor: 'Text Color',
    lblPhoto: 'Background Photo', lblPhotoFit: 'Photo Fit',
    download: 'Download PNG', randomize: 'Surprise Me',
    step1: 'Type your album title and artist name',
    step2: 'Pick a gradient preset or upload a photo',
    step3: 'Choose layout, font and text color',
    step4: 'Click Download to save your 3000×3000 PNG cover',
  },
  zh: {
    toolTitle: '专辑封面制作工具',
    toolDesc: '为专辑、混音带或 Spotify 歌单制作封面 — 自定义标题、艺人名、渐变背景或照片。下载 3000×3000 PNG — 免费且完全浏览器本地运行。',
    lblTitle: '专辑标题', lblArtist: '艺人名称', lblLayout: '布局',
    lblFont: '字体', lblFontSize: '字体大小', lblTextColor: '文字颜色',
    lblPhoto: '背景照片', lblPhotoFit: '照片填充方式',
    download: '下载 PNG', randomize: '随机配色',
    step1: '输入专辑标题和艺人名',
    step2: '选择渐变预设或上传照片',
    step3: '选择布局、字体和文字颜色',
    step4: '点击「下载」保存 3000×3000 PNG 封面',
  }
});

const { $, copyText, t } = GZ;

// Curated gradient presets (also used as fallback background)
const PRESETS = [
  ['#ff6a00','#ee0979'], ['#8E2DE2','#4A00E0'], ['#00C9FF','#92FE9D'],
  ['#FCAF45','#F77737','#E1306C'], ['#0F2027','#203A43','#2C5364'],
  ['#FC466B','#3F5EFB'], ['#FDFCFB','#E2D1C3','#FFFFFF'], ['#000000','#434343'],
  ['#11998E','#38EF7D'], ['#fc5c7d','#6a82fb'], ['#e1eec3','#f05053'],
  ['#1a2980','#26d0ce'], ['#ff9a9e','#fecfef'], ['#43cea2','#185a9d'],
];
let activePreset = 0;
let photoImg = null;

function buildPresetBar() {
  $('#presets').innerHTML = PRESETS.map((g, i) =>
    `<div class="gz-preset ${i === activePreset ? 'active' : ''}" data-i="${i}" style="background:linear-gradient(135deg,${g.join(',')})"></div>`
  ).join('');
  $$('.gz-preset').forEach(el => el.onclick = () => {
    activePreset = +el.dataset.i; photoImg = null;
    $('#photoInput').value = '';
    $$('.gz-preset').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    render();
  });
}

function hexToRgba(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}

function render() {
  const canvas = $('#canvas');
  canvas.width = 3000; canvas.height = 3000;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 3000, 3000);

  // Background
  if (photoImg) {
    const fit = $('#photoFit').value;
    if (fit === 'blur') {
      ctx.filter = 'blur(60px) brightness(0.7)';
      ctx.drawImage(photoImg, -200, -200, 3400, 3400);
      ctx.filter = 'none';
      const grad = ctx.createLinearGradient(0, 0, 3000, 3000);
      grad.addColorStop(0, hexToRgba(PRESETS[activePreset][0], 0.55));
      grad.addColorStop(1, hexToRgba(PRESETS[activePreset][PRESETS[activePreset].length-1], 0.55));
      ctx.fillStyle = grad; ctx.fillRect(0, 0, 3000, 3000);
    } else {
      const ratio = photoImg.width / photoImg.height, cRatio = 1;
      let dw, dh, dx, dy;
      if ((fit === 'cover' ? ratio : cRatio) > (fit === 'cover' ? cRatio : ratio)) {
        dh = 3000; dw = 3000 * ratio; dx = (3000 - dw) / 2; dy = 0;
      } else {
        dw = 3000; dh = 3000 / ratio; dx = 0; dy = (3000 - dh) / 2;
      }
      if (fit === 'cover') { dw = Math.max(3000, dh * ratio); dh = Math.max(3000, dw / ratio); dx = (3000 - dw) / 2; dy = (3000 - dh) / 2; }
      ctx.drawImage(photoImg, dx, dy, dw, dh);
      // Subtle darken for text contrast
      ctx.fillStyle = 'rgba(0,0,0,0.18)'; ctx.fillRect(0, 0, 3000, 3000);
    }
  } else {
    const g = PRESETS[activePreset];
    const grad = ctx.createLinearGradient(0, 0, 3000, 3000);
    g.forEach((c, i) => grad.addColorStop(i / Math.max(1, g.length - 1), c));
    ctx.fillStyle = grad; ctx.fillRect(0, 0, 3000, 3000);
  }

  const layout = $('#layout').value;
  if (layout === 'clean') return;

  const title = $('#albumTitle').value.trim();
  const artist = $('#artistName').value.trim();
  const color = $('#textColor').value;
  const font = $('#fontFamily').value;
  const fontSize = +$('#fontSize').value;

  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,0.45)';
  ctx.shadowBlur = 30; ctx.shadowOffsetY = 6;

  // Positioning
  let titleY, artistY;
  if (layout === 'top')    { titleY = 480; artistY = 480 + fontSize * 1.2; }
  else if (layout === 'center') { titleY = 1500 - (artist ? fontSize * 0.3 : 0); artistY = titleY + fontSize * 1.15; }
  else { titleY = 3000 - 620; artistY = titleY + fontSize * 1.15; }

  ctx.font = `700 ${fontSize}px ${font}`;
  wrapText(ctx, title || '', 1500, titleY, 2700, fontSize * 1.1);

  if (artist) {
    ctx.font = `400 ${fontSize * 0.42}px ${font}`;
    ctx.shadowBlur = 14; ctx.shadowOffsetY = 3;
    ctx.fillStyle = hexToRgba(color === '#ffffff' ? '#ffffff' : color, 0.85);
    ctx.fillText(artist.toUpperCase(), 1500, artistY);
  }
}

function wrapText(ctx, text, x, y, maxW, lh) {
  const words = text.split(/\s+/);
  let line = '', lines = [];
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = w; }
    else line = test;
  }
  if (line) lines.push(line);
  lines = lines.slice(0, 4); // cap to 4 lines
  const startY = y - (lines.length - 1) * lh / 2;
  lines.forEach((l, i) => ctx.fillText(l, x, startY + i * lh));
}

$('#photoInput').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => { const img = new Image(); img.onload = () => { photoImg = img; render(); }; img.src = ev.target.result; };
  r.readAsDataURL(f);
});
['#albumTitle','#artistName','#layout','#fontFamily','#fontSize','#textColor','#photoFit'].forEach(s =>
  $(s).addEventListener('input', render));

function downloadPNG() {
  const a = document.createElement('a');
  a.href = $('#canvas').toDataURL('image/png');
  a.download = 'album-cover.png';
  a.click();
}
function surprise() {
  activePreset = Math.floor(Math.random() * PRESETS.length);
  const titles = ['Nocturne','Velvet Static','Lost Frequencies','Skyline','Hollow Bloom','Glass Hearts','After Hours','Solar Drift','Echo Chamber','Phantom Wave'];
  const artists = ['Vela','Sleepwalkers','Saint Ruby','Pale Cinema','Marigold','Iron Lungs','Oxide','Soft Machine','Karousel','Astra'];
  $('#albumTitle').value = titles[Math.floor(Math.random()*titles.length)];
  $('#artistName').value = artists[Math.floor(Math.random()*artists.length)];
  $('#textColor').value = Math.random() > 0.5 ? '#ffffff' : '#0a0a0a';
  photoImg = null; $('#photoInput').value = '';
  buildPresetBar(); render();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadPNG()">⬇️ ${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="surprise()">🎲 ${t('randomize')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎬', href:'/image/poster-maker.html', name:'Poster Maker'},
    {icon:'🪧', href:'/image/banner-maker.html', name:'Banner Maker'},
    {icon:'🎨', href:'/image/logo-maker.html', name:'Logo Maker'},
    {icon:'🖼️', href:'/image/placeholder-image.html', name:'Placeholder Image'},
  ]
});
buildPresetBar();
render();
</script>
