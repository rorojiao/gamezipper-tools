<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "Does the online pedometer work without an app?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. This pedometer uses your phone's built-in accelerometer through the browser's DeviceMotion API. Just open this page on a phone with motion sensors, tap Start, and put the phone in your pocket or armband."}}, {"@type": "Question", "name": "How does the step counter detect a step?", "acceptedAnswer": {"@type": "Answer", "text": "It looks at the combined acceleration magnitude and counts a step whenever it crosses a threshold and bounces back — the same up-down pattern your body makes while walking. Sensitivity can be tuned for different phones."}}, {"@type": "Question", "name": "Is my movement data sent to a server?", "acceptedAnswer": {"@type": "Answer", "text": "No. Every reading from your accelerometer is processed locally in your browser. Nothing is uploaded, stored or shared."}}, {"@type": "Question", "name": "Why does my step count seem off?", "acceptedAnswer": {"@type": "Answer", "text": "Sensor accuracy varies by phone. Try the High sensitivity setting if you miss steps, or Low if it over-counts. Carry the phone in a pocket or armband for the most consistent readings."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Pedometer & Step Counter',
    toolDesc: 'Turn your phone into a free step counter. Tap Start, slip the phone in your pocket, and the pedometer uses your accelerometer to count steps, distance, calories and active time. 100% in your browser, nothing uploaded. Great replacement for a fitness band.',
    lblStride: 'Stride length (m)',
    lblWeight: 'Body weight (kg)',
    lblGoal: 'Daily step goal',
    lblSens: 'Sensitivity',
    lblSteps: 'Steps',
    lblDist: 'Distance (km)',
    lblCal: 'Calories',
    lblTime: 'Active time',
    start: '▶ Start',
    stop: '⏸ Pause',
    reset: 'Reset',
    progGoal: 'Goal progress',
    statusIdle: '○ Idle — tap Start to begin counting steps.',
    statusOn: '● Counting — carry your phone in a pocket or hand.',
    statusOff: '⏸ Paused.',
    statusNoSensor: '⚠ No motion sensor detected. Open this page on a phone or tablet — desktops don\'t have accelerometers.',
    statusNeedPerm: '⚠ Motion permission denied. Tap Start again and allow access.',
    liveLabel: 'accel: ',
    step1: 'Set your stride length (default 0.76 m ≈ 2.5 ft) and body weight',
    step2: 'Pick a sensitivity that matches your phone — Medium works for most',
    step3: 'Tap Start, allow motion access, and walk with the phone in your pocket',
    step4: 'Pause anytime — your count stays until you hit Reset',
  },
  zh: {
    toolTitle: '在线计步器 / 步数统计',
    toolDesc: '把手机变成免费的计步器。点击开始，把手机放进口袋，计步器通过加速度传感器自动统计步数、距离、消耗热量和活动时间。完全在浏览器中运行，不上传任何数据。是运动手环的轻量替代方案。',
    lblStride: '步幅（米）',
    lblWeight: '体重（公斤）',
    lblGoal: '每日步数目标',
    lblSens: '灵敏度',
    lblSteps: '步数',
    lblDist: '距离（公里）',
    lblCal: '热量（卡）',
    lblTime: '活动时间',
    start: '▶ 开始',
    stop: '⏸ 暂停',
    reset: '重置',
    progGoal: '目标进度',
    statusIdle: '○ 待机 — 点击开始即可计数。',
    statusOn: '● 计数中 — 将手机放在口袋或手中。',
    statusOff: '⏸ 已暂停。',
    statusNoSensor: '⚠ 未检测到运动传感器。请在手机或平板上打开本页 — 桌面电脑通常没有加速度计。',
    statusNeedPerm: '⚠ 运动权限被拒绝。请再次点击开始并允许访问。',
    liveLabel: '加速度：',
    step1: '设置步幅（默认 0.76 米 ≈ 2.5 英尺）和体重',
    step2: '选择适合你手机的灵敏度 — 中等适合大多数设备',
    step3: '点击开始，允许运动权限，把手机放进口袋开始走动',
    step4: '随时暂停 — 数据会保留，直到你点击重置',
  }
});

const { $, t } = GZ;

$('#lbl-stride').textContent = t('lblStride');
$('#lbl-weight').textContent = t('lblWeight');
$('#lbl-goal').textContent = t('lblGoal');
$('#lbl-sens').textContent = t('lblSens');
$('#lbl-steps').textContent = t('lblSteps');
$('#lbl-dist').textContent = t('lblDist');
$('#lbl-cal').textContent = t('lblCal');
$('#lbl-time').textContent = t('lblTime');
$('#prog-goal-lbl').textContent = t('progGoal');

const SENS_THRESHOLD = { low: 1.18, med: 1.12, high: 1.06 };
const SENS_COOLDOWN  = { low: 500, med: 360, high: 280 }; // ms between steps

let steps = 0;
let running = false;
let startedAt = 0;
let elapsedMs = 0; // accumulated active time
let lastStepAt = 0;
let handler = null;
let tickInterval = null;

function setStatus(cls, msg) {
  const el = $('#status');
  el.className = 'gz-ped-status ' + cls;
  el.textContent = msg;
}

function fmtTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return String(m).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
}

function updateUI() {
  const stride = parseFloat($('#stride').value) || 0.762;
  const weight = parseFloat($('#weight').value) || 70;
  const goal = parseFloat($('#goal').value) || 10000;
  const distKm = steps * stride / 1000;
  // Calories: rough horizontal-walking formula ~0.5 * weight(kg) * distKm
  const cal = 0.5 * weight * distKm;
  const pct = goal > 0 ? Math.min(100, (steps / goal) * 100) : 0;

  $('#num-steps').textContent = steps.toLocaleString();
  $('#num-dist').textContent = distKm.toFixed(2);
  $('#num-cal').textContent = Math.round(cal).toLocaleString();
  $('#num-time').textContent = fmtTime(elapsedMs);
  $('#prog-pct').textContent = pct.toFixed(0) + '%';
  $('#bar-fill').style.width = pct + '%';
}

function tick() {
  if (running) {
    elapsedMs = Date.now() - startedAt + (elapsedMs - (Date.now() - startedAt - (Date.now() - startedAt)));
  }
  // simpler: compute on the fly from startedAt
  updateUI();
}

function onMotion(e) {
  const acc = e.accelerationIncludingGravity || e.acceleration;
  if (!acc) return;
  const mag = Math.sqrt((acc.x || 0) ** 2 + (acc.y || 0) ** 2 + (acc.z || 0) ** 2);
  $('#live').textContent = t('liveLabel') + mag.toFixed(2) + ' m/s²';
  const thr = SENS_THRESHOLD[$('#sens').value];
  const cd = SENS_COOLDOWN[$('#sens').value];
  const now = Date.now();
  if (mag > thr && (now - lastStepAt) > cd) {
    // confirm we crossed back below threshold before allowing next step
    lastStepAt = now;
    steps++;
    if (running) updateUI();
  }
}

async function start() {
  if (running) return;
  // iOS 13+ permission gate
  if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
    try {
      const perm = await DeviceMotionEvent.requestPermission();
      if (perm !== 'granted') {
        setStatus('err', t('statusNeedPerm'));
        return;
      }
    } catch (err) {
      setStatus('err', t('statusNeedPerm'));
      return;
    }
  }
  if (typeof DeviceMotionEvent === 'undefined') {
    setStatus('err', t('statusNoSensor'));
    return;
  }
  running = true;
  startedAt = Date.now();
  window.addEventListener('devicemotion', onMotion);
  // tick once per second for the timer display
  const sessionStartElapsed = elapsedMs;
  tickInterval = setInterval(() => {
    if (running) elapsedMs = sessionStartElapsed + (Date.now() - startedAt);
    updateUI();
  }, 250);
  setStatus('ok', t('statusOn'));
  updateButtons();
}

function pause() {
  if (!running) return;
  running = false;
  elapsedMs += Date.now() - startedAt;
  window.removeEventListener('devicemotion', onMotion);
  clearInterval(tickInterval);
  setStatus('idle', t('statusOff'));
  updateButtons();
}

function reset() {
  pause();
  steps = 0;
  elapsedMs = 0;
  updateUI();
  setStatus('idle', t('statusIdle'));
}

function updateButtons() {
  $('#toolbar').innerHTML = `
    <button class="gz-btn" onclick="start()">${t('start')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="pause()" ${running ? '' : 'disabled style="opacity:.5"'}>${t('stop')}</button>
    <button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;
}

['stride','weight','goal'].forEach(id => $('#' + id).addEventListener('input', updateUI));
$('#sens').addEventListener('change', () => { lastStepAt = 0; });

// Initial state
setStatus('idle', t('statusIdle'));
updateButtons();
updateUI();

// Expose for inline onclick
window.start = start;
window.pause = pause;
window.reset = reset;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏱️', href:'/calc/interval-timer.html', name:'Interval Timer'},
    {icon:'🏃', href:'/calc/race-time-predictor.html', name:'Race Predictor'},
    {icon:'⚖️', href:'/calc/weight-tracker.html', name:'Weight Tracker'},
    {icon:'😊', href:'/calc/mood-tracker.html', name:'Mood Tracker'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
