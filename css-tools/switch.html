<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Switch / Toggle Generator',
    toolDesc: 'Design custom CSS toggle switches with live preview — colors, size, labels, animations and ready-to-use code.',
    width: 'Width (px)',
    height: 'Height (px)',
    bgColor: 'Off Color',
    activeColor: 'On Color',
    knobColor: 'Knob Color',
    borderRadius: 'Radius',
    animation: 'Animation',
    smooth: 'Smooth',
    bounce: 'Bounce',
    snap: 'Snap',
    showLabels: 'Show Labels',
    onLabel: 'ON',
    offLabel: 'OFF',
    darkMode: 'Dark Mode',
    wifi: 'Wi-Fi',
    notifications: 'Notifications',
    copy: 'Copy Code',
    copied: 'Copied!',
    step1: 'Adjust size, colors, animation and label settings',
    step2: 'Preview the toggle switch in real time',
    step3: 'Click "Copy Code" to get the HTML and CSS',
    step4: 'Paste the code into your project',
  },
  zh: {
    toolTitle: 'CSS 开关 / 拨动器生成器',
    toolDesc: '可视化设计自定义 CSS 开关 — 颜色、大小、标签、动画，实时预览并复制代码。',
    width: '宽度 (px)',
    height: '高度 (px)',
    bgColor: '关闭颜色',
    activeColor: '开启颜色',
    knobColor: '旋钮颜色',
    borderRadius: '圆角',
    animation: '动画',
    smooth: '平滑',
    bounce: '弹跳',
    snap: '快速',
    showLabels: '显示标签',
    onLabel: '开',
    offLabel: '关',
    darkMode: '深色模式',
    wifi: 'Wi-Fi',
    notifications: '通知',
    copy: '复制代码',
    copied: '已复制！',
    step1: '调整大小、颜色、动画和标签设置',
    step2: '实时预览开关效果',
    step3: '点击「复制代码」获取 HTML 和 CSS',
    step4: '将代码粘贴到你的项目中',
  }
});

const { $, copyText, t } = GZ;

let cfg = { width:52, height:28, bgColor:'#ddd', activeColor:'#4ecdc4', knobColor:'#fff', borderRadius:14, animation:'smooth', showLabels:false, darkMode:false };

function buildControls() {
  const c = $('#controls');
  c.innerHTML = `
    <label>${t('width')}<input type="number" id="cW" value="${cfg.width}" min="30" max="120"></label>
    <label>${t('height')}<input type="number" id="cH" value="${cfg.height}" min="16" max="64"></label>
    <label>${t('borderRadius')}<input type="number" id="cR" value="${cfg.borderRadius}" min="0" max="32"></label>
    <label>${t('bgColor')}<input type="color" id="cBg" value="${cfg.bgColor}"></label>
    <label>${t('activeColor')}<input type="color" id="cAct" value="${cfg.activeColor}"></label>
    <label>${t('knobColor')}<input type="color" id="cKnob" value="${cfg.knobColor}"></label>
    <label>${t('animation')}<select id="cAnim">
      <option value="smooth"${cfg.animation==='smooth'?' selected':''}>${t('smooth')}</option>
      <option value="bounce"${cfg.animation==='bounce'?' selected':''}>${t('bounce')}</option>
      <option value="snap"${cfg.animation==='snap'?' selected':''}>${t('snap')}</option>
    </select></label>
    <label>${t('showLabels')}<input type="checkbox" id="cLabels" ${cfg.showLabels?'checked':''}></label>
  `;
  const map = {cW:'width',cH:'height',cR:'borderRadius'};
  Object.keys(map).forEach(id=>$('#'+id).onchange=e=>{cfg[map[id]]=+e.target.value;render()});
  ['cBg','cAct','cKnob'].forEach(id=>$('#'+id).oninput=e=>{cfg[{cBg:'bgColor',cAct:'activeColor',cKnob:'knobColor'}[id]]=e.target.value;render()});
  $('#cAnim').onchange=e=>{cfg.animation=e.target.value;render()};
  $('#cLabels').onchange=e=>{cfg.showLabels=e.target.checked;render()};
}

function getTransition() {
  switch(cfg.animation) {
    case 'smooth': return 'left 0.25s ease, width 0.25s ease, background 0.25s ease';
    case 'bounce': return 'left 0.35s cubic-bezier(0.68,-0.55,0.27,1.55), width 0.35s cubic-bezier(0.68,-0.55,0.27,1.55), background 0.2s ease';
    case 'snap': return 'none';
  }
}

function render() {
  const w = cfg.width, h = cfg.height, r = cfg.borderRadius;
  const knob = h - 6;
  const items = [{label:t('wifi'), on:true}, {label:t('notifications'), on:false}, {label:t('darkMode'), on:false}];
  const tr = getTransition();
  const p = $('#preview');
  p.style.background = cfg.darkMode ? '#1a1a2e' : 'var(--gz-bg,#111)';
  p.innerHTML = items.map(item => {
    const left = item.on ? (w - knob - 3) : 3;
    const bg = item.on ? cfg.activeColor : cfg.bgColor;
    return `<div class="sw-item">
      <span style="font-size:.9em">${item.label}</span>
      <label style="position:relative;display:inline-block;width:${w}px;height:${h}px;cursor:pointer">
        <input type="checkbox" ${item.on?'checked':''} style="opacity:0;width:0;height:0;position:absolute">
        <span class="sw-track" style="position:absolute;inset:0;background:${bg};border-radius:${r}px;transition:${tr}"></span>
        <span class="sw-knob" style="position:absolute;top:3px;left:${left}px;width:${knob}px;height:${knob}px;background:${cfg.knobColor};border-radius:50%;transition:${tr};box-shadow:0 1px 4px rgba(0,0,0,.3)"></span>
        ${cfg.showLabels ? `<span class="sw-label-on" style="position:absolute;top:50%;left:8px;transform:translateY(-50%);font-size:${h*0.35}px;font-weight:700;color:#fff;opacity:${item.on?1:0};transition:opacity .2s">${t('onLabel')}</span><span class="sw-label-off" style="position:absolute;top:50%;right:8px;transform:translateY(-50%);font-size:${h*0.35}px;font-weight:700;color:#666;opacity:${item.on?0:1};transition:opacity .2s">${t('offLabel')}</span>` : ''}
      </label>
    </div>`;
  }).join('');

  // Make interactive
  p.querySelectorAll('input[type=checkbox]').forEach((inp, i) => {
    const track = inp.parentElement.querySelector('.sw-track');
    const knobEl = inp.parentElement.querySelector('.sw-knob');
    const onLbl = inp.parentElement.querySelector('.sw-label-on');
    const offLbl = inp.parentElement.querySelector('.sw-label-off');
    inp.addEventListener('change', () => {
      if (inp.checked) {
        track.style.background = cfg.activeColor;
        knobEl.style.left = (w - knob - 3) + 'px';
        if (onLbl) onLbl.style.opacity = '1';
        if (offLbl) offLbl.style.opacity = '0';
      } else {
        track.style.background = cfg.bgColor;
        knobEl.style.left = '3px';
        if (onLbl) onLbl.style.opacity = '0';
        if (offLbl) offLbl.style.opacity = '1';
      }
    });
  });

  // Code output
  const trCSS = cfg.animation === 'smooth' ? 'left 0.25s ease, width 0.25s ease, background 0.25s ease' :
                cfg.animation === 'bounce' ? 'left 0.35s cubic-bezier(0.68,-0.55,0.27,1.55), width 0.35s cubic-bezier(0.68,-0.55,0.27,1.55), background 0.2s ease' :
                'none';
  const css = `.toggle-switch {
  position: relative;
  display: inline-block;
  width: ${w}px;
  height: ${h}px;
  cursor: pointer;
}

.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
  position: absolute;
}

.toggle-switch .track {
  position: absolute;
  inset: 0;
  background: ${cfg.bgColor};
  border-radius: ${r}px;
  transition: ${trCSS};
}

.toggle-switch input:checked + .track {
  background: ${cfg.activeColor};
}

.toggle-switch .knob {
  position: absolute;
  top: 3px;
  left: 3px;
  width: ${knob}px;
  height: ${knob}px;
  background: ${cfg.knobColor};
  border-radius: 50%;
  transition: ${trCSS};
  box-shadow: 0 1px 4px rgba(0,0,0,.3);
}

.toggle-switch input:checked ~ .knob {
  left: ${w - knob - 3}px;
}`;

  const html = `<label class="toggle-switch">
  <input type="checkbox">
  <span class="track"></span>
  <span class="knob"></span>
</label>`;

  $('#code').textContent = `<!-- HTML -->\n${html}\n\n/* CSS */\n${css}`;
}

function doCopy() {
  copyText($('#code').textContent);
  const btn = $('#copyBtn');
  btn.textContent = t('copied');
  setTimeout(() => btn.textContent = t('copy'), 1500);
}

$('#copyBtn').textContent = t('copy');
buildControls();
render();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'☑️', href:'/css-tools/checkbox.html', name:'CSS Checkbox'},
    {icon:'🔘', href:'/css-tools/button.html', name:'CSS Button'},
    {icon:'🎨', href:'/css-tools/border-radius.html', name:'Border Radius'},
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
  ]
});
</script>
