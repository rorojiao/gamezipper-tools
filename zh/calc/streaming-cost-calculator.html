<script>
GZI18n.register({
  en: {

    clearAll: '清除选择',
    monthly: '每月',
    yearly: '每年',
    fiveYear: '5 年累计',
    weekly: '每周',
    selected: '个已选服务',
    step1: '勾选你当前订阅的所有流媒体服务',
    step2: '按分类筛选 — 视频、音乐、直播电视或云游戏',
    step3: '实时查看每月、每年和 5 年总花费',
    step4: '取消勾选即可即时查看取消该服务能省多少',
    tipText: '💡 小贴士：每月轮换一个订阅服务可省下数百元。取消任何 30 天内没用过的服务。',
    all: '全部',
    video: '视频',
    music: '音乐',
    livetv: '直播电视',
    gaming: '云游戏',
  }
});

const { $, t } = GZ;

const SERVICES = [
  {n:'Netflix',e:'🎬',p:15.49,c:'video'},
  {n:'Netflix (with ads)',e:'🎬',p:6.99,c:'video'},
  {n:'Disney+',e:'🏰',p:10.99,c:'video'},
  {n:'HBO Max',e:'🦇',p:15.99,c:'video'},
  {n:'Hulu',e:'📺',p:7.99,c:'video'},
  {n:'Hulu (with ads)',e:'📺',p:17.99,c:'video'},
  {n:'Amazon Prime Video',e:'📦',p:8.99,c:'video'},
  {n:'Apple TV+',e:'🍎',p:9.99,c:'video'},
  {n:'Paramount+',e:'⭐',p:7.99,c:'video'},
  {n:'Peacock',e:'🦚',p:7.99,c:'video'},
  {n:'Peacock (Free)',e:'🦚',p:0,c:'video'},
  {n:'Crunchyroll',e:'🎌',p:7.99,c:'video'},
  {n:'YouTube Premium',e:'▶️',p:13.99,c:'video'},
  {n:'Tubi (Free)',e:'🆓',p:0,c:'video'},
  {n:'Spotify',e:'🎵',p:10.99,c:'music'},
  {n:'Spotify Duo',e:'🎵',p:14.99,c:'music'},
  {n:'Spotify Family',e:'👨‍👩‍👧',p:16.99,c:'music'},
  {n:'Apple Music',e:'🍎',p:10.99,c:'music'},
  {n:'Apple Music Family',e:'👨‍👩‍👧',p:16.99,c:'music'},
  {n:'YouTube Music',e:'🎼',p:10.99,c:'music'},
  {n:'Amazon Music Unlimited',e:'🎶',p:9.99,c:'music'},
  {n:'Tidal',e:'🌊',p:10.99,c:'music'},
  {n:'Pandora Plus',e:'📻',p:9.99,c:'music'},
  {n:'SoundCloud Go+',e:'☁️',p:9.99,c:'music'},
  {n:'YouTube TV',e:'📡',p:72.99,c:'livetv'},
  {n:'Hulu + Live TV',e:'📺',p:76.99,c:'livetv'},
  {n:'Sling TV',e:'🎮',p:40,c:'livetv'},
  {n:'FuboTV',e:'⚽',p:74.99,c:'livetv'},
  {n:'DirecTV Stream',e:'📺',p:69.99,c:'livetv'},
  {n:'Philo',e:'📡',p:25,c:'livetv'},
  {n:'Xbox Game Pass',e:'🎮',p:16.99,c:'gaming'},
  {n:'PlayStation Plus',e:'🕹️',p:9.99,c:'gaming'},
  {n:'Nintendo Switch Online',e:'🍄',p:3.99,c:'gaming'},
  {n:'GeForce NOW',e:'💚',p:9.99,c:'gaming'},
];

let selected = new Set();
let activeCat = 'all';

function renderCats(){
  const cats = ['all','video','music','livetv','gaming'];
  $('#cats').innerHTML = cats.map(c=>`<button data-cat="${c}" class="${activeCat===c?'active':''}">${t(c)}</button>`).join('');
  $('#cats').querySelectorAll('button').forEach(b=>{
    b.addEventListener('click',()=>{ activeCat=b.dataset.cat; renderCats(); renderGrid(); });
  });
}

function renderGrid(){
  const list = activeCat==='all' ? SERVICES : SERVICES.filter(s=>s.c===activeCat);
  $('#grid').innerHTML = list.map((s,i)=>{
    const idx = SERVICES.indexOf(s);
    const active = selected.has(idx);
    return `<div class="svc-card ${active?'active':''}" data-idx="${idx}">
      <div class="chk">✓</div>
      <div class="emoji">${s.e}</div>
      <div class="nm">${s.n}</div>
      <div class="pr">$${s.p.toFixed(2)}/mo</div>
    </div>`;
  }).join('');
  $('#grid').querySelectorAll('.svc-card').forEach(c=>{
    c.addEventListener('click',()=>{
      const idx=+c.dataset.idx;
      if(selected.has(idx)) selected.delete(idx); else selected.add(idx);
      renderGrid();
      renderSummary();
    });
  });
}

function renderSummary(){
  let m=0;
  selected.forEach(idx=>{ m += SERVICES[idx].p; });
  const y=m*12, w=m/4.333, five=m*60;
  const fmt = v => '$'+v.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
  $('#summary').innerHTML = selected.size ? `
    <div class="card"><div class="val">${fmt(m)}</div><div class="lbl">${t('monthly')}</div></div>
    <div class="card alt"><div class="val">${fmt(y)}</div><div class="lbl">${t('yearly')}</div></div>
    <div class="card alt2"><div class="val">${fmt(five)}</div><div class="lbl">${t('fiveYear')}</div></div>
    <div class="card alt"><div class="val">${selected.size}</div><div class="lbl">${t('selected')}</div></div>
  ` : `<div class="card"><div class="val">$0</div><div class="lbl">${t('monthly')}</div></div>`;
  $('#tip').innerHTML = selected.size ? `<div class="tip">${t('tipText')}</div>` : '';
}

function clearAll(){
  selected.clear();
  renderGrid();
  renderSummary();
}

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clearAll')}</button>`;

renderCats();
renderGrid();
renderSummary();

// Pre-select a common combo
[0, 14, 5].forEach(i=>selected.add(i));
renderGrid();
renderSummary();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🔄', href:'/calc/subscription-cost-calculator.html', name:'Subscription Cost'},
    {icon:'💸', href:'/calc/tax-calculator.html', name:'Tax Calculator'},
    {icon:'🏦', href:'/calc/mortgage.html', name:'Mortgage Calculator'},
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
  ]
});
</script>
