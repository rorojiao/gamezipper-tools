.bc-side input,.bc-side select,.bc-side textarea{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:7px 9px;color:var(--text);font-size:.85em;font-family:inherit}
.bc-side input[type=color]{height:36px;padding:2px;cursor:pointer}
.tpl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.tpl-btn{padding:8px 4px;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-size:.7rem;font-weight:600;text-align:center}
.tpl-btn.active{border-color:var(--accent);background:rgba(78,205,196,.15);color:var(--accent)}

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="bc-layout">
      <div class="bc-preview">
        <div class="bc-card t-modern" id="card">
          <div>
            <div class="bc-co" id="c-co">YOUR COMPANY</div>
          </div>
          <div>
            <div class="bc-name" id="c-name">Jane Doe</div>
            <div class="bc-title" id="c-title">Product Designer</div>
          </div>
          <div class="bc-contact" id="c-contact">
            <div>📧 jane@example.com</div>
            <div>📞 +1 (555) 123-4567</div>
            <div>🌐 janedoe.design</div>
          </div>
        </div>
      </div>
      <div class="bc-side">
        <h3 data-i18n="template">Template</h3>
        <div class="tpl-grid" id="tpl-grid">
          <button class="tpl-btn active" data-tpl="modern" onclick="setTpl('modern')">Modern</button>
          <button class="tpl-btn" data-tpl="classic" onclick="setTpl('classic')">Classic</button>
          <button class="tpl-btn" data-tpl="dark" onclick="setTpl('dark')">Dark</button>
          <button class="tpl-btn" data-tpl="minimal" onclick="setTpl('minimal')">Minimal</button>
          <button class="tpl-btn" data-tpl="bold" onclick="setTpl('bold')">Bold</button>
        </div>
        <div><label data-i18n="name">Name</label><input id="f-name" value="Jane Doe" oninput="render()"></div>
        <div><label data-i18n="title">Job Title</label><input id="f-title" value="Product Designer" oninput="render()"></div>
        <div><label data-i18n="company">Company</label><input id="f-company" value="YOUR COMPANY" oninput="render()"></div>
        <div><label data-i18n="email">Email</label><input id="f-email" value="jane@example.com" oninput="render()"></div>
        <div class="row2">
          <div><label data-i18n="phone">Phone</label><input id="f-phone" value="+1 (555) 123-4567" oninput="render()"></div>
          <div><label data-i18n="website">Website</label><input id="f-web" value="janedoe.design" oninput="render()"></div>
        </div>
        <div class="row2">
          <div><label data-i18n="accentColor">Accent Color</label><input type="color" id="f-color" value="#4ecdc4" oninput="render()"></div>
          <div><label data-i18n="accentColor2">Gradient 2</label><input type="color" id="f-color2" value="#0a6e7a" oninput="render()"></div>
        </div>
        <div><label data-i18n="font">Font</label>
          <select id="f-font" onchange="render()">
            <option value="sans">Sans-serif</option>
            <option value="serif">Serif</option>
            <option value="mono">Monospace</option>
          </select>
        </div>
        <div><label data-i18n="logo">Logo (optional)</label><input type="file" id="f-logo" accept="image/*" onchange="loadLogo(event)"></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Business Card Maker',
    toolDesc: 'Design and print free business cards online. Pick a template, fill in your details, choose colors and fonts, then download as a print-ready PNG. No signup — runs entirely in your browser.',
    template: 'Template', name: 'Name', title: 'Job Title', company: 'Company',
    email: 'Email', phone: 'Phone', website: 'Website',
    accentColor: 'Accent Color', accentColor2: 'Gradient 2', font: 'Font', logo: 'Logo (optional)',
    step1: 'Choose a template (Modern, Classic, Dark, Minimal or Bold)',
    step2: 'Fill in your name, title, company and contact details',
    step3: 'Pick accent colors and a font that matches your brand',
    step4: 'Click Download PNG to save a print-ready 300 DPI image',
  },
  zh: {
    toolTitle: '名片制作器',
    toolDesc: '在线设计和打印免费名片。选择模板、填写信息、调整颜色和字体，然后下载可打印的 PNG 图片。无需注册 — 完全在浏览器中运行。',
    template: '模板', name: '姓名', title: '职位', company: '公司',
    email: '邮箱', phone: '电话', website: '网站',
    accentColor: '主色调', accentColor2: '渐变色 2', font: '字体', logo: 'Logo（可选）',
    step1: '选择模板（现代、经典、深色、极简或醒目）',
    step2: '填写姓名、职位、公司和联系方式',
    step3: '选择与品牌匹配的主色调和字体',
    step4: '点击「下载 PNG」保存可打印的 300 DPI 图片',
  }
});

const { $, t } = GZ;
let currentTpl = 'modern';
let logoDataUrl = null;

function setTpl(tpl) {
  currentTpl = tpl;
  document.querySelectorAll('.tpl-btn').forEach(b => b.classList.toggle('active', b.dataset.tpl === tpl));
  render();
}

function render() {
  const card = $('#card');
  card.className = 'bc-card t-' + currentTpl + ' ' + $('#f-font').value;
  card.style.setProperty('--bc1', $('#f-color').value);
  card.style.setProperty('--bc2', $('#f-color2').value);
  $('#c-name').textContent = $('#f-name').value || 'Your Name';
  $('#c-title').textContent = $('#f-title').value;
  $('#c-co').textContent = $('#f-company').value;
  const email = $('#f-email').value, phone = $('#f-phone').value, web = $('#f-web').value;
  let html = '';
  if (email) html += `<div>📧 ${escapeHtml(email)}</div>`;
  if (phone) html += `<div>📞 ${escapeHtml(phone)}</div>`;
  if (web) html += `<div>🌐 ${escapeHtml(web)}</div>`;
  $('#c-contact').innerHTML = html;
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function loadLogo(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => { logoDataUrl = r.result; applyLogo(); };
  r.readAsDataURL(f);
}
function applyLogo() {
  let logoEl = $('#c-logo');
  if (!logoDataUrl) { if (logoEl) logoEl.remove(); return; }
  if (!logoEl) {
    logoEl = document.createElement('img');
    logoEl.id = 'c-logo';
    logoEl.style.cssText = 'position:absolute;top:18px;right:18px;width:50px;height:50px;object-fit:contain';
    $('#card').appendChild(logoEl);
  }
  logoEl.src = logoDataUrl;
}

function downloadPNG() {
  const card = $('#card');
  const rect = card.getBoundingClientRect();
  const scale = 1050 / rect.width; // target 1050px wide
  // Build an SVG foreignObject snapshot
  const cardClone = card.cloneNode(true);
  cardClone.style.setProperty('--bc1', $('#f-color').value);
  cardClone.style.setProperty('--bc2', $('#f-color2').value);
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:absolute;left:-99999px;top:0;width:380px';
  wrap.appendChild(cardClone);
  document.body.appendChild(wrap);
  const data = new XMLSerializer().serializeToString(cardClone);
  document.body.removeChild(wrap);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="600" viewBox="0 0 380 220">
    <foreignObject width="380" height="220">${data.replace(/xmlns="[^"]*"/,'')}</foreignObject>
  </svg>`;
  const blob = new Blob([svg], {type:'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = 1050; c.height = 600;
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0, 1050, 600);
    c.toBlob(b => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b); a.download = 'business-card.png'; a.click();
      URL.revokeObjectURL(a.href);
    });
    URL.revokeObjectURL(url);
  };
  img.onerror = () => { alert('Export failed in this browser — try a screenshot instead'); URL.revokeObjectURL(url); };
  img.src = url;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadPNG()">📥 ${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="render()">${t('example')}</button>`;

render();

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/image/favicon-generator.html', name:'Favicon Generator'},
    {icon:'💦', href:'/image/watermark.html', name:'Watermark Tool'},
    {icon:'🎨', href:'/image/image-filter.html', name:'Image Filter'},
    {icon:'📐', href:'/image/resizer.html', name:'Image Resizer'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
