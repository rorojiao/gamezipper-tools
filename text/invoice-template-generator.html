<script>
GZI18n.register({
  en: {
    toolTitle: 'Invoice Template Generator',
    toolDesc: 'Build clean, professional invoices from flexible templates. Add line items, tax, discounts and notes — preview live and download as PDF. Free, private, browser-only.',

    toSection: 'Bill To (Client)',

    clear: 'Clear',

  },
  zh: {
    toolTitle: '发票模板生成器',
    toolDesc: '使用灵活的模板创建简洁专业的发票。添加明细、税率、折扣和备注 — 实时预览并下载 PDF。免费、私密、浏览器本地运行。',
    fromSection: '你的公司（收款方）',
    toSection: '客户（付款方）',
    itemsSection: '明细项目',
    optionsSection: '选项',
    logoName: '你的公司名称',
    fromAddr: '地址 / 邮箱 / 电话',
    clientName: '客户名称',
    clientAddr: '客户地址',
    invoiceNo: '发票编号',
    invoiceDate: '发票日期',
    dueDate: '到期日期',
    desc: '描述',
    qty: '数量',
    price: '单价',
    addItem: '+ 添加明细项',
    currency: '货币符号',
    taxRate: '税率 (%)',
    discount: '折扣',
    notes: '备注 / 条款',
    download: '⬇ 下载 PDF',
    previewTitle: '实时预览',
    invoiceWord: '发票',
    billTo: '付款方',
    subtotal: '小计',
    tax: '税',
    total: '总计',
    sample: '加载示例',
    clear: '清空',
    step1: '输入你的公司名称和客户信息',
    step2: '添加明细项（描述、数量、单价）',
    step3: '设置货币、税率和折扣',
    step4: '实时预览发票并点击下载 PDF',
  }
});

const { $, t } = GZ;
let items = [{ desc: '', qty: 1, price: 0 }];

function renderForm(){
  $('#form-col').innerHTML = `
    <div class="gz-form-sec">
      <h3>${t('fromSection')}</h3>
      <div class="gz-form-row full"><div class="gz-field"><label>${t('logoName')}</label><input type="text" id="f-logo" oninput="renderPreview()"></div></div>
      <div class="gz-form-row full"><div class="gz-field"><label>${t('fromAddr')}</label><textarea id="f-from" rows="2" oninput="renderPreview()"></textarea></div></div>
    </div>
    <div class="gz-form-sec">
      <h3>${t('toSection')}</h3>
      <div class="gz-form-row full"><div class="gz-field"><label>${t('clientName')}</label><input type="text" id="f-client" oninput="renderPreview()"></div></div>
      <div class="gz-form-row full"><div class="gz-field"><label>${t('clientAddr')}</label><textarea id="f-client-addr" rows="2" oninput="renderPreview()"></textarea></div></div>
      <div class="gz-form-row">
        <div class="gz-field"><label>${t('invoiceNo')}</label><input type="text" id="f-no" oninput="renderPreview()"></div>
        <div class="gz-field"><label>${t('invoiceDate')}</label><input type="date" id="f-date" oninput="renderPreview()"></div>
      </div>
      <div class="gz-form-row"><div class="gz-field"><label>${t('dueDate')}</label><input type="date" id="f-due" oninput="renderPreview()"></div></div>
    </div>
    <div class="gz-form-sec">
      <h3>${t('itemsSection')}</h3>
      <table class="gz-items-table">
        <thead><tr><th>${t('desc')}</th><th style="width:50px">${t('qty')}</th><th style="width:80px">${t('price')}</th><th style="width:80px">Amount</th><th></th></tr></thead>
        <tbody id="items-body"></tbody>
      </table>
      <button class="gz-add-btn" onclick="addItem()">${t('addItem')}</button>
    </div>
    <div class="gz-form-sec">
      <h3>${t('optionsSection')}</h3>
      <div class="gz-form-row">
        <div class="gz-field"><label>${t('currency')}</label><input type="text" id="f-currency" value="$" maxlength="3" oninput="renderPreview()"></div>
        <div class="gz-field"><label>${t('taxRate')}</label><input type="number" id="f-tax" value="0" min="0" step="0.1" oninput="renderPreview()"></div>
      </div>
      <div class="gz-form-row">
        <div class="gz-field"><label>${t('discount')}</label><input type="number" id="f-discount" value="0" min="0" step="0.01" oninput="renderPreview()"></div>
      </div>
      <div class="gz-form-row full"><div class="gz-field"><label>${t('notes')}</label><textarea id="f-notes" rows="3" oninput="renderPreview()"></textarea></div></div>
    </div>`;
  renderItems();
}

function renderItems(){
  const tbody = $('#items-body');
  if(!tbody) return;
  tbody.innerHTML = items.map((it, i) => `
    <tr>
      <td><input type="text" value="${escAttr(it.desc)}" oninput="updateItem(${i},'desc',this.value)" placeholder="${t('desc')}"></td>
      <td><input type="number" value="${it.qty}" min="0" step="1" oninput="updateItem(${i},'qty',+this.value)" style="text-align:center"></td>
      <td><input type="number" value="${it.price}" min="0" step="0.01" oninput="updateItem(${i},'price',+this.value)"></td>
      <td class="col-amt">${fmtMoney((it.qty||0)*(it.price||0))}</td>
      <td><button class="gz-rm-btn" onclick="removeItem(${i})" title="Remove">✕</button></td>
    </tr>`).join('');
  renderPreview();
}

function updateItem(i, k, v){ items[i][k] = v; renderItems(); }
function addItem(){ items.push({ desc:'', qty:1, price:0 }); renderItems(); }
function removeItem(i){ if(items.length > 1){ items.splice(i,1); renderItems(); } }

function getCur(){ return ($('#f-currency') && $('#f-currency').value) || '$'; }
function fmtMoney(n){ return getCur() + (Math.round(n*100)/100).toFixed(2); }
function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function fmtDate(s){ if(!s) return ''; try{ const d=new Date(s); return d.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}); }catch(e){return s;} }

function renderPreview(){
  const logo = ($('#f-logo')||{}).value || '';
  const from = ($('#f-from')||{}).value || '';
  const client = ($('#f-client')||{}).value || '';
  const clientAddr = ($('#f-client-addr')||{}).value || '';
  const invNo = ($('#f-no')||{}).value || '';
  const invDate = ($('#f-date')||{}).value || '';
  const due = ($('#f-due')||{}).value || '';
  const taxRate = parseFloat(($('#f-tax')||{}).value) || 0;
  const discount = parseFloat(($('#f-discount')||{}).value) || 0;
  const notes = ($('#f-notes')||{}).value || '';

  const subtotal = items.reduce((s,it) => s + (it.qty||0)*(it.price||0), 0);
  const afterDisc = Math.max(0, subtotal - discount);
  const taxAmt = afterDisc * taxRate / 100;
  const total = afterDisc + taxAmt;

  const itemsRows = items.filter(it => it.desc || it.price).map(it => `
    <tr><td>${escHtml(it.desc)}</td><td style="text-align:center">${it.qty}</td><td style="text-align:right">${fmtMoney(it.price||0)}</td><td>${fmtMoney((it.qty||0)*(it.price||0))}</td></tr>`).join('');

  $('#preview-col').innerHTML = `
    <h3 style="font-size:.95em;margin:0 0 8px;opacity:.75">${t('previewTitle')}</h3>
    <div class="gz-inv-preview" id="inv-preview">
      <div class="inv-top">
        <div><div class="inv-logo">${escHtml(logo)||'Your Company'}</div><div style="font-size:10px;color:#666;margin-top:4px;white-space:pre-line">${escHtml(from)}</div></div>
        <div style="text-align:right"><div class="inv-title">${t('invoiceWord')}</div></div>
      </div>
      <div class="inv-meta">
        <div><strong>#</strong> ${escHtml(invNo)||'—'}</div>
        <div><strong>${t('invoiceDate')}:</strong> ${fmtDate(invDate)}</div>
        <div><strong>${t('dueDate')}:</strong> ${fmtDate(due)}</div>
      </div>
      <div class="inv-parties">
        <div><strong>${t('billTo')}</strong>${escHtml(client)}<br><span style="color:#666">${escHtml(clientAddr)}</span></div>
      </div>
      <table class="inv-table">
        <thead><tr><th>${t('desc')}</th><th style="text-align:center">${t('qty')}</th><th style="text-align:right">${t('price')}</th><th style="text-align:right">Amount</th></tr></thead>
        <tbody>${itemsRows || '<tr><td colspan="4" style="text-align:center;color:#999">—</td></tr>'}</tbody>
      </table>
      <div class="inv-totals">
        <div class="row"><span>${t('subtotal')}</span><span>${fmtMoney(subtotal)}</span></div>
        ${discount > 0 ? `<div class="row"><span>${t('discount')||'Discount'}</span><span>-${fmtMoney(discount)}</span></div>`:''}
        ${taxRate > 0 ? `<div class="row"><span>${t('tax')} (${taxRate}%)</span><span>${fmtMoney(taxAmt)}</span></div>`:''}
        <div class="row total"><span>${t('total')}</span><span>${fmtMoney(total)}</span></div>
      </div>
      ${notes ? `<div class="inv-notes">${escHtml(notes)}</div>`:''}
    </div>`;
}

function loadSample(){
  $('#f-logo').value = 'Acme Studio LLC';
  $('#f-from').value = '123 Market St, Suite 400\nSan Francisco, CA 94103\nbilling@acmestudio.com';
  $('#f-client').value = 'Globex Corporation';
  $('#f-client-addr').value = '742 Evergreen Terrace\nSpringfield, OR 97477';
  $('#f-no').value = 'INV-2026-0042';
  $('#f-date').value = new Date().toISOString().slice(0,10);
  $('#f-due').value = new Date(Date.now()+14*86400000).toISOString().slice(0,10);
  $('#f-currency').value = '$';
  $('#f-tax').value = '8.5';
  $('#f-discount').value = '0';
  $('#f-notes').value = 'Payment due within 14 days. Late payments subject to 1.5% monthly interest. Thank you for your business!';
  items = [
    { desc:'Logo Design (3 concepts)', qty:1, price:1200 },
    { desc:'Brand Guidelines PDF', qty:1, price:600 },
    { desc:'Web banner set (5 sizes)', qty:5, price:80 },
    { desc:'Hourly consultation', qty:4, price:125 },
  ];
  renderItems();
}

function doClear(){
  ['f-logo','f-from','f-client','f-client-addr','f-no','f-date','f-due','f-notes'].forEach(id => { const e=$('#'+id); if(e) e.value=''; });
  $('#f-currency').value = '$';
  $('#f-tax').value = '0';
  $('#f-discount').value = '0';
  items = [{ desc:'', qty:1, price:0 }];
  renderItems();
}

function downloadPDF(){
  const preview = $('#inv-preview');
  if(!preview) return;
  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head><title>Invoice</title><style>body{margin:0;font-family:'Helvetica Neue',Arial,sans-serif}.gz-inv-preview{padding:40px;max-width:700px;margin:0 auto;color:#222;font-size:13px}
  .inv-top{display:flex;justify-content:space-between;margin-bottom:20px}.inv-logo{font-size:22px;font-weight:800;color:#1a1a2e}.inv-title{font-size:28px;font-weight:900;color:#1a1a2e;letter-spacing:.05em;text-transform:uppercase}.inv-meta{text-align:right;font-size:11px;color:#555;margin-bottom:20px}.inv-parties{margin-bottom:20px;font-size:11px}.inv-parties strong{display:block;font-size:12px;margin-bottom:3px}.inv-table{width:100%;border-collapse:collapse;margin-bottom:16px}.inv-table th{background:#1a1a2e;color:#fff;padding:8px;font-size:10px;text-transform:uppercase}.inv-table td{padding:8px;border-bottom:1px solid #e5e5e5;font-size:11px}.inv-table td:last-child,.inv-table th:last-child{text-align:right}.inv-totals{margin-left:auto;width:240px;font-size:11px}.inv-totals .row{display:flex;justify-content:space-between;padding:4px 0}.inv-totals .row.total{border-top:2px solid #1a1a2e;margin-top:6px;padding-top:8px;font-weight:800;font-size:14px}.inv-notes{margin-top:20px;font-size:10px;color:#666;border-top:1px solid #e5e5e5;padding-top:10px}@media print{body{print-color-adjust:exact;-webkit-print-color-adjust:exact}}</style></head><body>${preview.outerHTML}</body></html>`);
  win.document.close();
  setTimeout(() => { win.focus(); win.print(); }, 400);
}

renderForm();
$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadPDF()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadSample()">${t('sample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
renderPreview();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧾', href:'/text/bill-of-sale-generator.html', name:'Bill of Sale'},
    {icon:'🛒', href:'/text/purchase-order-generator.html', name:'Purchase Order'},
    {icon:'💲', href:'/text/estimate-generator.html', name:'Estimate'},
    {icon:'💵', href:'/text/promissory-note-generator.html', name:'Promissory Note'},
  ]
});
</script>

</body>
