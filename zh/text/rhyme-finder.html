// Vowel groups for near rhyming
const VOWEL_GROUPS = {
  'ae': ['a','e'], 'ei': ['e','i'], 'ou': ['o','u'], 'ai': ['a','i'],

};

function getLastStressedVowelToEnd(word) {
  word = word.toLowerCase().replace(/[^a-z]/g, '');
  // Find last vowel cluster from end
  const vowels = 'aeiou';
  let i = word.length;
  // Go from end, find the last vowel
  let lastVowelPos = -1;
  for (let j = word.length - 1; j >= 0; j--) {
    if (vowels.includes(word[j])) { lastVowelPos = j; break; }
  }
  if (lastVowelPos < 0) return '';
  // Include preceding consonant cluster
  let start = lastVowelPos;
  while (start > 0 && !vowels.includes(word[start-1])) start--;
  return word.substring(start);
}

function getRhymeKey(word) {
  word = word.toLowerCase().replace(/[^a-z]/g, '');
  const vowels = 'aeiouy';
  let lastVowelIdx = -1;
  for (let i = word.length - 1; i >= 0; i--) {
    if (vowels.includes(word[i])) { lastVowelIdx = i; break; }
  }
  if (lastVowelIdx < 0) return word;
  // Include consonant before the vowel
  let start = lastVowelIdx;
  if (start > 0 && !vowels.includes(word[start-1])) start--;
  return word.substring(start);
}

function countSyllables(word) {
  word = word.toLowerCase().replace(/[^a-z]/g, '');
  if (!word) return 0;
  const m = word.match(/[aeiouy]+/g);
  let count = m ? m.length : 1;
  // Silent e
  if (word.endsWith('e') && count > 1) count--;
  if (word.endsWith('le') && word.length > 2 && !'aeiou'.includes(word[word.length-3])) count++;
  return Math.max(1, count);
}

function findRhymes(word) {
  word = word.toLowerCase().replace(/[^a-z]/g, '');
  if (!word) return [];
  const inputKey = getRhymeKey(word);
  const inputSyl = countSyllables(word);
  let perfect = [];
  let near = [];

  // Search built-in DB by rhyme key
  for (const [key, words] of Object.entries(RHYME_DB)) {
    if (key === inputKey || words.some(w => w === word) || getRhymeKey(key) === inputKey) {
      for (const w of words) {
        if (w !== word && !perfect.includes(w)) perfect.push(w);
      }
    }
  }

  // Also try direct key match
  if (RHYME_DB[inputKey]) {
    for (const w of RHYME_DB[inputKey]) {
      if (w !== word && !perfect.includes(w)) perfect.push(w);
    }
  }

  // Generate near rhymes by vowel substitution
  const lastVowel = word.match(/[aeiouy](?=[^aeiouy]*$)/);
  if (lastVowel) {
    const lv = lastVowel[0];
    const subs = { 'a':['e','i'], 'e':['a','i'], 'i':['e','a'], 'o':['u'], 'u':['o'], 'y':['i'] };
    for (const v of (subs[lv] || [])) {
      const nearWord = word.replace(/([aeiouy])(?=[^aeiouy]*$)/, v);
      if (nearWord !== word) near.push(nearWord);
    }
  }

  // Sort by syllable closeness
  perfect.sort((a, b) => Math.abs(countSyllables(a) - inputSyl) - Math.abs(countSyllables(b) - inputSyl));

  return { perfect: perfect.slice(0, 50), near: near.slice(0, 20) };
}

function search() {
  const word = $('#wordInput').value.trim();
  const results = $('#results');
  if (!word) {
    results.innerHTML = `<div class="empty">${t('startTyping')}</div>`;
    return;
  }
  const { perfect, near } = findRhymes(word);
  const inputSyl = countSyllables(word);

  const filterFn = (w) => {
    if (sylFilter === 0) return true;
    const s = countSyllables(w);
    if (sylFilter === 4) return s >= 4;
    return s === sylFilter;
  };

  let html = `<div class="word-info"><span class="word">${word}</span> <span style="color:var(--text2);font-size:.9rem">(${inputSyl} syllable${inputSyl>1?'s':''})</span></div>`;

  const showPerfect = filterType === 'perfect' || filterType === 'all';
  const showNear = filterType === 'near' || filterType === 'all';

  const filteredPerfect = perfect.filter(filterFn);
  const filteredNear = near.filter(filterFn);

  if (showPerfect && filteredPerfect.length) {
    html += `<div class="results-section"><h3>${t('perfectRhymes')} (${filteredPerfect.length})</h3><div class="rhyme-list">${filteredPerfect.map(w => `<span class="rhyme-chip" onclick="$('#wordInput').value='${w}';search()">${w}<span class="syl">${countSyllables(w)}</span></span>`).join('')}</div></div>`;
  }
  if (showNear && filteredNear.length) {
    html += `<div class="results-section"><h3>${t('nearRhymes')} (${filteredNear.length})</h3><div class="rhyme-list">${filteredNear.map(w => `<span class="rhyme-chip" onclick="$('#wordInput').value='${w}';search()">${w}<span class="syl">${countSyllables(w)}</span></span>`).join('')}</div></div>`;
  }

  if (!filteredPerfect.length && !filteredNear.length) {
    html += `<div class="empty">${t('noResults')}</div>`;
  }

  results.innerHTML = html;
}
