      <div><label><input id="has-header" type="checkbox" checked> Header Row</label></div>
      <div><label><input id="has-border" type="checkbox" checked> Borders</label></div>
      <div><label><input id="is-striped" type="checkbox" checked> Striped Rows</label></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'HTML Table Generator',
    toolDesc: 'Generate clean HTML tables with custom rows, columns, headers, and styles. Edit cells directly and copy the code.',
    generate: 'Generate',
    copy: 'Copy',
    download: 'Download',
    clear: 'Clear',
    step1: 'Set the number of rows and columns',
    step2: 'Toggle header row, borders, and stripe options',
    step3: 'Edit cell content directly in the preview table',
    step4: 'Click Generate to create HTML code, then Copy or Download',
  },
  zh: {
    toolTitle: 'HTML 表格生成器',
    toolDesc: '快速生成自定义行数、列数、表头和样式的 HTML 表格。可直接编辑单元格内容并复制代码。',
    generate: '生成',
    copy: '复制',
    download: '下载',
    clear: '清除',
    step1: '设置行数和列数',
    step2: '选择表头、边框和斑马纹样式',
    step3: '在预览表格中直接编辑单元格内容',
    step4: '点击生成 HTML 代码，然后复制或下载',
  }
});

const { $, copyText, t } = GZ;
let tableData = [];

function initData() {
  const rows = Math.max(1, parseInt($('#num-rows').value) || 4);
  const cols = Math.max(1, parseInt($('#num-cols').value) || 3);
  tableData = [];
  for (let r = 0; r < rows; r++) {
    const row = [];
    for (let c = 0; c < cols; c++) {
      row.push(r === 0 ? `Header ${c+1}` : `Row ${r}, Col ${c+1}`);
    }
    tableData.push(row);
  }
}

function renderPreview() {
  const rows = Math.max(1, parseInt($('#num-rows').value) || 4);
  const cols = Math.max(1, parseInt($('#num-cols').value) || 3);
  while (tableData.length < rows) {
    const row = [];
    for (let c = 0; c < cols; c++) row.push(`Row ${tableData.length+1}, Col ${c+1}`);
    tableData.push(row);
  }
  while (tableData.length > rows) tableData.pop();
  tableData.forEach((row, i) => {
    while (row.length < cols) row.push(`Row ${i+1}, Col ${row.length+1}`);
    if (row.length > cols) row.length = cols;
  });

  const hasHeader = $('#has-header').checked;
  const hasBorder = $('#has-border').checked;
  const isStriped = $('#is-striped').checked;

  let html = '<table style="';
  if (hasBorder) html += 'border:1px solid #ddd;';
  if ($('#is-collapsed').checked) html += 'border-collapse:collapse;';
  html += 'width:100%;font-size:14px;">';

  tableData.forEach((row, r) => {
    const isHeaderRow = r === 0 && hasHeader;
    const bg = isHeaderRow ? 'background:#4ecdc4;color:#000;' : (isStriped && r % 2 === 0 ? 'background:#f8f8f8;' : '');
    html += '<tr>';
    row.forEach((cell, c) => {
      const tag = isHeaderRow ? 'th' : 'td';
      html += `<${tag} style="padding:8px 12px;${hasBorder ? 'border:1px solid #ddd;' : ''}${bg}">${cell}</${tag}>`;
    });
    html += '</tr>';
  });
  html += '</table>';
  $('#preview').innerHTML = html;

  // Make cells editable
  const cells = $('#preview').querySelectorAll('td, th');
  cells.forEach((cell, i) => {
    const r = Math.floor(i / cols);
    const c = i % cols;
    cell.contentEditable = true;
    cell.style.outline = 'none';
    cell.addEventListener('blur', () => {
      tableData[r][c] = cell.textContent;
    });
  });
}

function generateCode() {
  const rows = tableData.length;
  const cols = tableData[0]?.length || 0;
  const hasHeader = $('#has-header').checked;
  const hasBorder = $('#has-border').checked;
  const isStriped = $('#is-striped').checked;
  const collapsed = $('#is-collapsed').checked;

  let lines = ['<table style="'];
  let styles = [];
  if (hasBorder) styles.push('border:1px solid #ddd');
  if (collapsed) styles.push('border-collapse:collapse');
  styles.push('width:100%');
  lines[0] = `<table style="${styles.join(';')}">`;

  tableData.forEach((row, r) => {
    const isHeaderRow = r === 0 && hasHeader;
    lines.push('  <tr>');
    row.forEach((cell) => {
      const tag = isHeaderRow ? 'th' : 'td';
      let s = 'padding:8px 12px';
      if (hasBorder) s += ';border:1px solid #ddd';
      if (isHeaderRow) s += ';background:#4ecdc4;color:#000;font-weight:bold';
      else if (isStriped && r % 2 === 0) s += ';background:#f8f8f8';
      lines.push(`    <${tag} style="${s}">${cell}</${tag}>`);
    });
    lines.push('  </tr>');
  });
  lines.push('</table>');

  const code = lines.join('\n');
  $('#output').textContent = code;
  $('#status').innerHTML = '<span style="color:var(--gz-success)">✓ HTML table generated</span>';
}

function doClear() {
  $('#num-rows').value = 4;
  $('#num-cols').value = 3;
  initData();
  renderPreview();
  $('#output').textContent = '';
  $('#status').innerHTML = '';
}

function downloadCode() {
  const code = $('#output').textContent;
  if (!code) { generateCode(); }
  const final = $('#output').textContent;
  const blob = new Blob([final], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'table.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

// Events
['num-rows','num-cols'].forEach(id => {
  $('#'+id).addEventListener('change', () => { renderPreview(); });
});
['has-header','has-border','is-striped','is-collapsed'].forEach(id => {
  $('#'+id).addEventListener('change', () => { renderPreview(); });
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generateCode()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadCode()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

initData();
renderPreview();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/dev/csv-to-html.html', name:'CSV to HTML'},
    {icon:'🎨', href:'/css-tools/css-table.html', name:'CSS Table'},
    {icon:'📝', href:'/text/text-to-html.html', name:'Text to HTML'},
    {icon:'🔧', href:'/dev/html-formatter.html', name:'HTML Formatter'},
  ]
});
</script>
