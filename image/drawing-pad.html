<script>
GZI18n.register({
  en: {
    toolTitle: 'Drawing Pad',
    toolDesc: 'Free online drawing tool. Sketch, doodle, and create art right in your browser with pen, eraser, shapes, and more.',
    pen: 'Pen',
    eraser: 'Eraser',
    line: 'Line',
    rect: 'Rectangle',
    circle: 'Circle',
    fill: 'Fill',
    color: 'Color',
    size: 'Size',
    bg: 'Background',
    download: 'Download PNG',
    clear: 'Clear Canvas',
    undo: 'Undo',
    step1: 'Select a drawing tool from the toolbar (Pen, Eraser, Shapes)',
    step2: 'Choose your color and brush size',
    step3: 'Draw on the canvas using your mouse or touch',
    step4: 'Click Download to save your artwork as PNG',
  },
  zh: {
    toolTitle: '在线画板',
    toolDesc: '免费在线绘图工具。在浏览器中直接素描、涂鸦和创作，支持画笔、橡皮擦、形状等功能。',
    pen: '画笔',
    eraser: '橡皮擦',
    line: '直线',
    rect: '矩形',
    circle: '圆形',
    fill: '填充',
    color: '颜色',
    size: '大小',
    bg: '背景',
    download: '下载 PNG',
    clear: '清空画布',
    undo: '撤销',
    step1: '从工具栏选择绘图工具（画笔、橡皮擦、形状）',
    step2: '选择颜色和画笔大小',
    step3: '用鼠标或触控在画布上绘画',
    step4: '点击下载将作品保存为 PNG',
  }
});

const { $, t } = GZ;
const canvas = $('#drawCanvas');
const ctx = canvas.getContext('2d');
let drawing = false;
let currentTool = 'pen';
let brushSize = 4;
let brushColor = '#e94560';
let bgColor = '#ffffff';
let startX, startY;
let history = [];
let lastX, lastY;

function saveState() {
  if (history.length > 50) history.shift();
  history.push(canvas.toDataURL());
}

function restoreState() {
  if (history.length === 0) return;
  const img = new Image();
  img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); };
  img.src = history.pop();
}

function initCanvas() {
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  saveState();
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

let snapshot;

function onStart(e) {
  e.preventDefault();
  drawing = true;
  const pos = getPos(e);
  startX = lastX = pos.x;
  startY = lastY = pos.y;

  if (currentTool === 'fill') {
    saveState();
    ctx.fillStyle = brushColor;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawing = false;
    return;
  }

  if (['line','rect','circle'].includes(currentTool)) {
    snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
  }

  if (currentTool === 'pen' || currentTool === 'eraser') {
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
  }
}

function onMove(e) {
  if (!drawing) return;
  e.preventDefault();
  const pos = getPos(e);

  if (currentTool === 'pen') {
    ctx.strokeStyle = brushColor;
    ctx.lineWidth = brushSize;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  } else if (currentTool === 'eraser') {
    ctx.strokeStyle = bgColor;
    ctx.lineWidth = brushSize * 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  } else if (currentTool === 'line') {
    ctx.putImageData(snapshot, 0, 0);
    ctx.beginPath();
    ctx.strokeStyle = brushColor;
    ctx.lineWidth = brushSize;
    ctx.lineCap = 'round';
    ctx.moveTo(startX, startY);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  } else if (currentTool === 'rect') {
    ctx.putImageData(snapshot, 0, 0);
    ctx.beginPath();
    ctx.strokeStyle = brushColor;
    ctx.lineWidth = brushSize;
    ctx.strokeRect(startX, startY, pos.x - startX, pos.y - startY);
  } else if (currentTool === 'circle') {
    ctx.putImageData(snapshot, 0, 0);
    const rx = Math.abs(pos.x - startX) / 2;
    const ry = Math.abs(pos.y - startY) / 2;
    const cx = startX + (pos.x - startX) / 2;
    const cy = startY + (pos.y - startY) / 2;
    ctx.beginPath();
    ctx.strokeStyle = brushColor;
    ctx.lineWidth = brushSize;
    ctx.ellipse(cx, cy, Math.max(1,rx), Math.max(1,ry), 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  lastX = pos.x;
  lastY = pos.y;
}

function onEnd() {
  if (drawing) {
    drawing = false;
    ctx.closePath();
    saveState();
  }
}

canvas.addEventListener('mousedown', onStart);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onEnd);
canvas.addEventListener('mouseleave', onEnd);
canvas.addEventListener('touchstart', onStart, { passive: false });
canvas.addEventListener('touchmove', onMove, { passive: false });
canvas.addEventListener('touchend', onEnd);

const tools = ['pen','eraser','line','rect','circle','fill'];
$('#toolbar1').innerHTML = `
  <div class="tool-group" id="toolGroup">${tools.map(tool =>
    `<button class="tool-btn ${tool==='pen'?'active':''}" data-tool="${tool}">${t(tool)}</button>`
  ).join('')}</div>
  <label>${t('color')} <input type="color" id="colorPicker" value="#e94560"></label>
  <label>${t('bg')} <input type="color" id="bgPicker" value="#ffffff"></label>
  <label>${t('size')} <input type="range" id="sizeSlider" min="1" max="50" value="4"> <span id="sizeVal">4</span>px</label>`;

$('#toolbar2').innerHTML = `
  <button class="gz-btn" onclick="doDownload()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doUndo()">${t('undo')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClearCanvas()">${t('clear')}</button>`;

$('#toolGroup').addEventListener('click', e => {
  const btn = e.target.closest('.tool-btn');
  if (!btn) return;
  currentTool = btn.dataset.tool;
  document.querySelectorAll('#toolGroup .tool-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
});

$('#colorPicker').addEventListener('input', e => { brushColor = e.target.value; });
$('#bgPicker').addEventListener('input', e => {
  bgColor = e.target.value;
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  saveState();
});
$('#sizeSlider').addEventListener('input', e => {
  brushSize = parseInt(e.target.value);
  $('#sizeVal').textContent = brushSize;
});

function doDownload() {
  const a = document.createElement('a');
  a.download = 'drawing.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

function doUndo() { restoreState(); }

function doClearCanvas() {
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  saveState();
}

initCanvas();

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/image/pixel-art-editor.html', name:'Pixel Art Editor'},
    {icon:'🖼️', href:'/image/watermark.html', name:'Watermark'},
    {icon:'✏️', href:'/fun/whiteboard.html', name:'Whiteboard'},
    {icon:'🎭', href:'/image/meme-generator.html', name:'Meme Generator'},
  ]
});
</script>
