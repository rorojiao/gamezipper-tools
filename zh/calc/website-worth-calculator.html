<script>
GZI18n.register({
  en: {
    toolTitle: 'Website Worth Calculator',
    toolDesc: 'Estimate the value of any website or domain. Enter monthly revenue, traffic, and domain age to get a ballpark valuation range. Uses standard industry multiples for content sites. Free and private.',
    monthlyRevenue: 'Monthly revenue (USD)',
    monthlyVisitors: 'Monthly visitors',
    profitMargin: 'Profit margin',
    domainAge: 'Domain age (years)',
    nicheQuality: 'Traffic & niche quality',
    lowQuality: 'Low (new / unstable)',
    midQuality: 'Average',
    highQuality: 'High (stable / evergreen)',
    estimatedValue: 'Estimated website value',
    lowRange: 'Low estimate',
    highRange: 'High estimate',
    monthlyProfit: 'Monthly net profit',
    valuationMultiple: 'Valuation multiple',
    annualRevenue: 'Annual revenue',
    step1: 'Enter your monthly revenue',
    step2: 'Add monthly visitors and profit margin',
    step3: 'Set domain age and traffic quality',
    step4: 'See the estimated value range of your website',
  },
  zh: {
    toolTitle: '网站价值估算器',
    toolDesc: '估算任意网站或域名的价值。输入月收入、流量和域名年限，获取估值区间。使用内容网站的标准行业倍数。免费且私密。',
    monthlyRevenue: '月收入（美元）',
    monthlyVisitors: '月访问量',
    profitMargin: '利润率',
    domainAge: '域名年限（年）',
    nicheQuality: '流量和行业质量',
    lowQuality: '低（新站 / 不稳定）',
    midQuality: '一般',
    highQuality: '高（稳定 / 常青内容）',
    estimatedValue: '预计网站价值',
    lowRange: '低端估值',
    highRange: '高端估值',
    monthlyProfit: '月净利润',
    valuationMultiple: '估值倍数',
    annualRevenue: '年收入',
    step1: '输入月收入',
    step2: '添加月访问量和利润率',
    step3: '设置域名年限和流量质量',
    step4: '查看网站的估值区间',
  }
});

const { $, t } = GZ;

const cur = (n) => {
  const lang = GZI18n.getLang ? GZI18n.getLang() : 'en';
  try { return new Intl.NumberFormat(lang === 'zh' ? 'zh-CN' : 'en-US', {style:'currency', currency:'USD', maximumFractionDigits:0}).format(n); }
  catch(e) { return '$' + Math.round(n).toLocaleString(); }
};

$('#input-card').innerHTML = `
  <div class="ww-field">
    <label>${t('monthlyRevenue')}</label>
    <div class="input-wrap">
      <span class="prefix">$</span>
      <input type="number" id="rev" class="has-prefix" value="2000" min="0" step="100">
    </div>
  </div>
  <div class="ww-field">
    <label>${t('monthlyVisitors')}</label>
    <input type="number" id="visitors" value="100000" min="0" step="1000">
  </div>
  <div class="ww-field">
    <label>${t('profitMargin')}</label>
    <div class="input-wrap">
      <input type="number" id="margin" value="70" min="0" max="100" step="5">
      <span class="suffix">%</span>
    </div>
  </div>
  <div class="ww-field">
    <label>${t('domainAge')}</label>
    <div class="input-wrap">
      <input type="number" id="age" value="3" min="0" max="30" step="1">
      <span class="suffix">yrs</span>
    </div>
  </div>
  <div class="ww-field">
    <label>${t('nicheQuality')}</label>
    <select id="quality">
      <option value="0.8">${t('lowQuality')}</option>
      <option value="1.0" selected>${t('midQuality')}</option>
      <option value="1.3">${t('highQuality')}</option>
    </select>
  </div>
`;

$('#info-card').innerHTML = `
  <h3 style="margin:0 0 14px;font-size:1.05em">ℹ️ How valuation works</h3>
  <p style="font-size:.9em;line-height:1.6;opacity:.85">
    Content sites typically sell for <strong>30-40× monthly net profit</strong>.
    This calculator applies a base multiple of 30-40, then adjusts for domain age, traffic volume, and niche stability.
  </p>
  <div style="margin-top:14px;padding:12px 14px;background:var(--glass2);border-radius:10px;font-size:.85em;line-height:1.55;opacity:.85">
    <strong>📐 Formula:</strong><br>
    • Monthly Profit = Revenue × Margin%<br>
    • Base multiple = 30 - 40<br>
    • Age bonus: +0.5×/year (max +5)<br>
    • Traffic bonus: +0-5× (50k+ visitors)<br>
    • Quality factor: 0.8× / 1.0× / 1.3×<br>
    • Value = Profit × Multiple × Quality
  </div>
  <div style="margin-top:12px;font-size:.8em;line-height:1.5;opacity:.7">
    <strong>⚠️ Estimate only.</strong> Real valuations depend on growth, traffic stability, backlink quality, Google penalty history, and market conditions. Consult a professional broker (Flippa, Empire Flippers) for accurate appraisals.
  </div>
`;

function calculate() {
  const rev = parseFloat($('#rev').value) || 0;
  const visitors = parseFloat($('#visitors').value) || 0;
  const margin = (parseFloat($('#margin').value) || 0) / 100;
  const age = parseFloat($('#age').value) || 0;
  const quality = parseFloat($('#quality').value) || 1;

  const monthlyProfit = rev * margin;
  const annualRevenue = rev * 12;

  const ageBonus = Math.min(age * 0.5, 5);
  const trafficBonus = visitors >= 100000 ? 5 : visitors >= 50000 ? 3 : visitors >= 10000 ? 1 : 0;
  const lowMult = (30 + ageBonus + trafficBonus) * quality;
  const highMult = (40 + ageBonus + trafficBonus) * quality;

  const lowVal = monthlyProfit * lowMult;
  const highVal = monthlyProfit * highMult;
  const midVal = (lowVal + highVal) / 2;

  $('#results').innerHTML = `
    <div class="ww-section-title">${t('estimatedValue')}</div>
    <div class="ww-big">${cur(midVal)}</div>
    <div class="ww-range">
      <div><div style="opacity:.6;font-size:.75em">${t('lowRange')}</div><div class="v">${cur(lowVal)}</div></div>
      <div><div style="opacity:.6;font-size:.75em">${t('highRange')}</div><div class="v">${cur(highVal)}</div></div>
    </div>
    <div class="ww-section-title">Breakdown</div>
    <div class="ww-breakdown">
      <div class="ww-row"><span class="lbl">${t('monthlyProfit')}</span><span class="val">${cur(monthlyProfit)}</span></div>
      <div class="ww-row"><span class="lbl">${t('annualRevenue')}</span><span class="val">${cur(annualRevenue)}</span></div>
      <div class="ww-row"><span class="lbl">${t('valuationMultiple')}</span><span class="val">${lowMult.toFixed(1)}× - ${highMult.toFixed(1)}× monthly</span></div>
    </div>`;
}

calculate();
$('#rev').addEventListener('input', calculate);
$('#visitors').addEventListener('input', calculate);
$('#margin').addEventListener('input', calculate);
$('#age').addEventListener('input', calculate);
$('#quality').addEventListener('change', calculate);

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1', 'step2', 'step3', 'step4'],
  related: [
    {icon: '💰', href: '/calc/adsense-revenue-calculator.html', name: 'AdSense Revenue'},
    {icon: '📺', href: '/calc/youtube-revenue-calculator.html', name: 'YouTube Revenue'},
    {icon: '📈', href: '/calc/investment-calculator.html', name: 'Investment'},
    {icon: '🌐', href: '/dev/domain-availability.html', name: 'Domain Check'},
  ]
});
</script>
