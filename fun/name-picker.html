<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="np-stage">
      <div class="content">
        <div class="label">🎉 Winner</div>
        <div class="winner" id="winner">—</div>
      </div>
    </div>
    <div class="np-grid" style="margin-top:14px">
      <div class="np-pane">
        <h3>📋 Names (one per line, optional <code>name:weight</code>)</h3>
        <textarea id="names" rows="10" placeholder="Alice&#10;Bob&#10;Charlie:2&#10;Diana"></textarea>
        <div class="np-options">
          <label>Winners: <input type="number" id="winners" min="1" max="50" value="1"></label>
          <label><input type="checkbox" id="weighted"> Weighted mode (use <code>name:weight</code>)</label>
          <label><input type="checkbox" id="removeWinners" checked> Remove winners after pick</label>
        </div>
      </div>
      <div class="np-pane">
        <h3>📜 Pick History</h3>
        <div class="np-history" id="history"></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Random Name Picker',
    toolDesc: 'Pick a random winner from a list of names — perfect for giveaways, classroom picks, contests and raffles. Supports weighted entries and multi-winner draws.',
    step1: 'Paste a list of names, one per line (use Name:Weight for weighted mode)',
    step2: 'Choose how many winners to draw and whether to remove them from the pool',
    step3: 'Click Pick to spin and reveal the winner(s)',
    step4: 'Winners are logged in the history for record-keeping',
    pick: 'Pick Winner',
    copy: 'Copy Winner',
    clear: 'Clear All',
    example: 'Load Example',
    winnersN: (n) => `${n} winner${n > 1 ? 's' : ''}`,
  },
  zh: {
    toolTitle: '随机姓名抽取器',
    toolDesc: '从名单中随机抽取获奖者 — 非常适合抽奖、课堂点名、比赛和抽签。支持加权条目和多人中奖。',
    step1: '粘贴名单，每行一个名字（加权模式使用「姓名:权重」格式）',
    step2: '选择中奖人数及是否在抽取后移除获奖者',
    step3: '点击「抽取」按钮旋转并显示获奖者',
    step4: '获奖者会记录在历史中便于查看',
    pick: '开始抽取',
    copy: '复制获奖者',
    clear: '全部清空',
    example: '加载示例',
    winnersN: (n) => `${n} 名获奖者`,
  }
});

const { $, t } = GZ;
let allNames = [];
let history = [];

function parseNames() {
  const raw = $('#names').value;
  const weighted = $('#weighted').checked;
  return raw.split('\n').map(s => s.trim()).filter(Boolean).map(s => {
    if (weighted && s.includes(':')) {
      const [name, w] = s.split(':').map(x => x.trim());
      return { name, weight: Math.max(1, parseFloat(w) || 1) };
    }
    return { name: s, weight: 1 };
  });
}

function pickWeighted(items) {
  const total = items.reduce((a, b) => a + b.weight, 0);
  let r = Math.random() * total;
  for (const it of items) {
    r -= it.weight;
    if (r <= 0) return it;
  }
  return items[items.length - 1];
}

function pick() {
  const items = parseNames();
  if (items.length === 0) return;
  const n = Math.max(1, Math.min(50, parseInt($('#winners').value) || 1));
  const winners = [];
  const pool = items.slice();
  for (let i = 0; i < n && pool.length > 0; i++) {
    const chosen = pickWeighted(pool);
    winners.push(chosen.name);
    pool.splice(pool.indexOf(chosen), 1);
  }

  const wEl = $('#winner');
  wEl.classList.add('rolling');
  const all = parseNames().map(x => x.name);
  let ticks = 0;
  const ticker = setInterval(() => {
    wEl.textContent = all[Math.floor(Math.random() * all.length)];
    ticks++;
    if (ticks > 12) {
      clearInterval(ticker);
      wEl.classList.remove('rolling');
      if (winners.length === 1) {
        wEl.textContent = winners[0];
      } else {
        wEl.innerHTML = '';
        const stage = wEl.parentElement;
        const multi = document.createElement('div');
        multi.className = 'multi';
        winners.forEach(w => {
          const span = document.createElement('span');
          span.textContent = w;
          multi.appendChild(span);
        });
        wEl.style.display = 'none';
        stage.appendChild(multi);
        setTimeout(() => {
          wEl.style.display = '';
          wEl.textContent = '—';
          const m = stage.querySelector('.multi'); if (m) m.remove();
        }, 4000);
      }
    }
  }, 60);

  history.unshift({ winners, ts: new Date().toLocaleString(), totalPool: items.length });
  if (history.length > 50) history.pop();
  renderHistory();

  if ($('#removeWinners').checked && winners.length > 0) {
    const winnerSet = new Set(winners);
    const remaining = parseNames().filter(x => !winnerSet.has(x.name));
    $('#names').value = remaining.map(x => $('#weighted').checked && x.weight !== 1 ? `${x.name}:${x.weight}` : x.name).join('\n');
  }
}

function copyWinner() {
  const items = history[0];
  if (!items) return;
  GZ.copyText(items.winners.join(', '));
}

function renderHistory() {
  $('#history').innerHTML = history.map(h => `
    <div class="row">
      <span class="n">${h.winners.join(', ')}</span>
      <span class="t">${h.ts} (from ${h.totalPool})</span>
    </div>`).join('');
}

function loadExample() {
  $('#names').value = ['Alice','Bob','Charlie','Diana','Ethan','Fiona','George','Hannah','Ian','Julia','Kevin','Luna'].join('\n');
}

function clearAll() {
  $('#names').value = '';
  $('#winner').textContent = '—';
  history = [];
  renderHistory();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="pick()">${t('pick')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyWinner()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎡', href:'/fun/decision-wheel.html', name:'Decision Wheel'},
    {icon:'🎲', href:'/fun/dice-roller.html', name:'Dice Roller'},
    {icon:'🪙', href:'/fun/coin-flipper.html', name:'Coin Flipper'},
    {icon:'👥', href:'/fun/team-generator.html', name:'Team Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
