const { $, copyText, t } = GZ;
let flavor = 'standard';

function getFlavor() { return flavor; }

function htmlToBBCode(html) {
  if (!html) return '';
  let out = html;

  // Remove script/style and their contents
  out = out.replace(/<script[\s\S]*?<\/script>/gi, '');
  out = out.replace(/<style[\s\S]*?<\/style>/gi, '');
  out = out.replace(/<!--[\s\S]*?-->/g, '');

  // Pre/code blocks
  if (flavor === 'discourse' || flavor === 'reddit') {
    out = out.replace(/<pre[^>]*>([\s\S]*?)<\/pre>/gi, (m, c) => {
      const text = stripTags(c).replace(/^```(\w*)\n/, '```\n');
      return '\n```\n' + text + '\n```\n';
    });
    out = out.replace(/<code[^>]*>([\s\S]*?)<\/code>/gi, (m, c) => '`' + stripTags(c) + '`');
  } else {
    out = out.replace(/<pre[^>]*>([\s\S]*?)<\/pre>/gi, (m, c) => '[code]' + stripTags(c) + '[/code]');
    out = out.replace(/<code[^>]*>([\s\S]*?)<\/code>/gi, (m, c) => '[code]' + stripTags(c) + '[/code]');
  }

  // Blockquote
  if (flavor === 'discourse' || flavor === 'reddit') {
    out = out.replace(/<blockquote[^>]*>([\s\S]*?)<\/blockquote>/gi, '\n> ' + stripTagsInline('') + '\n');
    out = out.replace(/<blockquote[^>]*>([\s\S]*?)<\/blockquote>/gi, (m, c) => {
      const text = stripTags(c).trim();
      return text.split('\n').map(line => '> ' + line).join('\n') + '\n';
    });
  } else if (flavor === 'xen') {
    out = out.replace(/<blockquote[^>]*>([\s\S]*?)<\/blockquote>/gi, '[QUOTE]\n$1\n[/QUOTE]');
    out = out.replace(/<blockquote[^>]*cite="([^"]+)"[^>]*>([\s\S]*?)<\/blockquote>/gi, '[QUOTE="$1"]\n$2\n[/QUOTE]');
  } else {
    out = out.replace(/<blockquote[^>]*>([\s\S]*?)<\/blockquote>/gi, '[quote]$1[/quote]');
  }

  // Headings
  out = out.replace(/<h([1-6])[^>]*>([\s\S]*?)<\/h\1>/gi, (m, n, c) => {
    const text = stripTags(c).trim();
    if (flavor === 'discourse' || flavor === 'reddit') {
      return '\n' + '#'.repeat(+n) + ' ' + text + '\n';
    }
    const size = 7 - +n; // 1->size=7, 6->size=2
    return `[size=${size}][b]${text}[/b][/size]\n`;
  });

  // Lists
  if (flavor === 'discourse' || flavor === 'reddit') {
    out = out.replace(/<ol[^>]*>([\s\S]*?)<\/ol>/gi, (m, c) => {
      let n = 0;
      return c.replace(/<li[^>]*>([\s\S]*?)<\/li>/gi, (_, x) => { n++; return `${n}. ${stripTags(x).trim()}\n`; });
    });
    out = out.replace(/<ul[^>]*>([\s\S]*?)<\/ul>/gi, (m, c) => {
      return c.replace(/<li[^>]*>([\s\S]*?)<\/li>/gi, (_, x) => `- ${stripTags(x).trim()}\n`);
    });
  } else {
    out = out.replace(/<ol[^>]*>([\s\S]*?)<\/ol>/gi, '[list=1]$1[/list]');
    out = out.replace(/<ul[^>]*>([\s\S]*?)<\/ul>/gi, '[list]$1[/list]');
    out = out.replace(/<li[^>]*>([\s\S]*?)<\/li>/gi, '[*]$1\n');
  }

  // Table (basic)
  if (flavor === 'discourse' || flavor === 'reddit') {
    out = out.replace(/<table[^>]*>([\s\S]*?)<\/table>/gi, (m, c) => {
      const rows = [];
      c.replace(/<tr[^>]*>([\s\S]*?)<\/tr>/gi, (_, row) => {
        const cells = [];
        row.replace(/<t[hd][^>]*>([\s\S]*?)<\/t[hd]>/gi, (_, cell) => {
          cells.push(stripTags(cell).trim().replace(/\|/g, '\\|').replace(/\n/g, ' '));
        });
        rows.push('| ' + cells.join(' | ') + ' |');
      });
      if (rows.length >= 1) {
        rows.splice(1, 0, '| ' + rows[0].split('|').slice(1, -1).map(() => '---').join(' | ') + ' |');
      }
      return '\n' + rows.join('\n') + '\n';
    });
  } else {
    out = out.replace(/<table[^>]*>([\s\S]*?)<\/table>/gi, '[table]$1[/table]');
    out = out.replace(/<tr[^>]*>([\s\S]*?)<\/tr>/gi, '[tr]$1[/tr]');
    out = out.replace(/<th[^>]*>([\s\S]*?)<\/th>/gi, '[th]$1[/th]');
    out = out.replace(/<td[^>]*>([\s\S]*?)<\/td>/gi, '[td]$1[/td]');
  }

  // Links
  out = out.replace(/<a[^>]+href=["']([^"']+)["'][^>]*>([\s\S]*?)<\/a>/gi, (m, href, text) => {
    const label = stripTags(text).trim();
    if (flavor === 'reddit') return `[${label}](${href})`;
    if (flavor === 'discourse') return `[${label}|${href}](${href})`; // simplified
    return `[url=${href}]${label}[/url]`;
  });

  // Images
  out = out.replace(/<img[^>]+src=["']([^"']+)["'][^>]*>/gi, (m, src, _, full) => {
    const altMatch = full.match(/alt=["']([^"']*)["']/i);
    const alt = altMatch ? altMatch[1] : '';
    if (flavor === 'reddit') return `![${alt}](${src})`;
    if (flavor === 'discourse') return `![${alt}|${src}](${src})`;
    return alt ? `[img=${alt}]${src}[/img]` : `[img]${src}[/img]`;
  });

  // Inline formatting
  out = out.replace(/<(strong|b)[^>]*>([\s\S]*?)<\/\1>/gi, '[b]$2[/b]');
  out = out.replace(/<(em|i)[^>]*>([\s\S]*?)<\/\1>/gi, '[i]$2[/i]');
  out = out.replace(/<(u)[^>]*>([\s\S]*?)<\/\1>/gi, '[u]$2[/u]');
  out = out.replace(/<(s|strike|del)[^>]*>([\s\S]*?)<\/\1>/gi, '[s]$2[/s]');

  // Line breaks & paragraphs
  out = out.replace(/<br\s*\/?>/gi, '\n');
  out = out.replace(/<p[^>]*>([\s\S]*?)<\/p>/gi, '$1\n\n');
  out = out.replace(/<hr\s*\/?>/gi, '\n---\n');

  // Strip remaining tags
  out = stripTags(out);

  // Decode common entities
  out = out.replace(/&nbsp;/g, ' ').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/&#39;/g, "'");
  out = out.replace(/&hellip;/g, '...').replace(/&mdash;/g, '—').replace(/&ndash;/g, '–').replace(/&copy;/g, '©').replace(/&reg;/g, '®');

  // Collapse multiple blank lines
  out = out.replace(/\n{3,}/g, '\n\n').trim();
  return out;
}

function stripTags(s) { return s.replace(/<[^>]+>/g, ''); }
function stripTagsInline(s) { return s.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' '); }

function doConvert() {
  const html = $('#input').value;
  if (!html.trim()) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  const bb = htmlToBBCode(html);
  $('#output').textContent = bb;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${bb.length} chars</span>`;
}

function loadExample() {
  $('#input').value = `<h1>Forum Post Example</h1>
<p>Welcome to the <b>community</b>! Here's a quick <i>guide</i>:</p>
<ul>
  <li>Read the <a href="https://example.com/rules">rules</a> first</li>
  <li>Introduce yourself</li>
  <li>Have fun!</li>
</ul>
<blockquote>Knowledge is power.</blockquote>
<p>Code looks like:</p>
<pre><code>const hello = "world";</code></pre>
<p>Happy posting! 🎉</p>`;
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', doConvert);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <label>${t('flavorLabel')} <select class="gz-select" onchange="flavor=this.value;doConvert()">
    <option value="standard">${t('flavorStandard')}</option>
    <option value="xen">${t('flavorXen')}</option>
    <option value="discourse">${t('flavorDiscourse')}</option>
    <option value="reddit">${t('flavorReddit')}</option>
  </select></label>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-in').textContent = t('inputLabel');
$('#lbl-out').textContent = t('outputLabel');

</script>
