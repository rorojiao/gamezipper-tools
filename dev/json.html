    76|function syntaxHighlight(json) {
    77|  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    78|    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {

    80|      if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-string';
    81|      else if (/true|false/.test(m)) c = 'json-bool';
    82|      else if (/null/.test(m)) c = 'json-null';
    83|      return `<span class="${c}">${m}</span>`;
    84|    });
