}

// Tailwind color palette (subset of common values)
const colors = {
'#000000':'black','#ffffff':'white',
'#f3f4f6':'gray-100','#e5e7eb':'gray-200','#d1d5db':'gray-300','#9ca3af':'gray-400',
'#6b7280':'gray-500','#4b5563':'gray-600','#374151':'gray-700','#1f2937':'gray-800','#111827':'gray-900',
'#fee2e2':'red-100','#fecaca':'red-200','#fca5a5':'red-300','#f87171':'red-400','#ef4444':'red-500','#dc2626':'red-600','#b91c1c':'red-700','#991b1b':'red-800','#7f1d1d':'red-900',
'#fef3c7':'yellow-100','#fde68a':'yellow-200','#fcd34d':'yellow-300','#fbbf24':'yellow-400','#f59e0b':'yellow-500','#d97706':'yellow-600','#b45309':'yellow-700',
'#d1fae5':'green-100','#a7f3d0':'green-200','#6ee7b7':'green-300','#34d399':'green-400','#10b981':'green-500','#059669':'green-600','#047857':'green-700',
'#dbeafe':'blue-100','#bfdbfe':'blue-200','#93c5fd':'blue-300','#60a5fa':'blue-400','#3b82f6':'blue-500','#2563eb':'blue-600','#1d4ed8':'blue-700','#1e40af':'blue-800',
'#ede9fe':'violet-100','#ddd6fe':'violet-200','#c4b5fd':'violet-300','#a78bfa':'violet-400','#8b5cf6':'violet-500','#7c3aed':'violet-600',
'#fce7f3':'pink-100','#fbcfe8':'pink-200','#f9a8d4':'pink-300','#f472b6':'pink-400','#ec4899':'pink-500','#db2777':'pink-600',
};

function hexToRgb(hex) {
hex = hex.replace('#','');
if (hex.length === 3) hex = hex.split('').map(c => c+c).join('');
return [parseInt(hex.slice(0,2),16), parseInt(hex.slice(2,4),16), parseInt(hex.slice(4,6),16)];
}

function rgbToHex(r,g,b) {
return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
}

function colorDistance(c1, c2) {
const r1 = c1[0], g1 = c1[1], b1 = c1[2];
const r2 = c2[0], g2 = c2[1], b2 = c2[2];
return Math.sqrt((r1-r2)**2 + (g1-g2)**2 + (b1-b2)**2);
}

function findClosestColor(hex) {
if (colors[hex.toLowerCase()]) return colors[hex.toLowerCase()];
const target = hexToRgb(hex);
let best = null, bestDist = Infinity;
for (const [c, name] of Object.entries(colors)) {
const d = colorDistance(target, hexToRgb(c));
if (d < bestDist) { bestDist = d; best = name; }
}
return best;
}

function parseColor(val) {
val = val.trim();
if (val.startsWith('#')) return val.toLowerCase();
const m = val.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
if (m) return rgbToHex(+m[1], +m[2], +m[3]);
const named = {red:'#ef4444', blue:'#3b82f6', green:'#10b981', white:'#ffffff', black:'#000000', yellow:'#f59e0b', gray:'#6b7280', grey:'#6b7280'};
return named[val.toLowerCase()] || val;
}

const spacingMap = {0:'0',1:'0.25rem',2:'0.5rem',3:'0.75rem',4:'1rem',5:'1.25rem',6:'1.5rem',8:'2rem',10:'2.5rem',12:'3rem',16:'4rem',20:'5rem'};
function pxToSpacing(px) {
const num = parseFloat(px);
if (px === '0' || num === 0) return '0';
const closest = Object.entries(spacingMap).reduce((best, [k, v]) => {
const vPx = parseFloat(v);
return Math.abs(vPx - num) < Math.abs(parseFloat(best[1]) - num) ? [k, v] : best;
});
return closest[0];
}

function pxToText(px) {
const num = parseFloat(px);
if (px === '0' || num === 0) return 'xs';
if (num <= 12) return 'xs';
if (num <= 14) return 'sm';
if (num <= 16) return 'base';
if (num <= 18) return 'lg';
if (num <= 20) return 'xl';
if (num <= 24) return '2xl';
if (num <= 30) return '3xl';
if (num <= 36) return '4xl';
if (num <= 48) return '5xl';
return '6xl';
}

function pxToWeight(px) {
if (px <= 300) return 'font-light';
if (px <= 400) return 'font-normal';
if (px <= 500) return 'font-medium';
if (px <= 600) return 'font-semibold';
if (px <= 700) return 'font-bold';
return 'font-extrabold';
}

function convertCSS() {
const css = $('#cssInput').value;
const rules = [];
const re = /([a-z-]+)\s*:\s*([^;{}]+)[;}]/g;
let m;
while ((m = re.exec(css)) !== null) {
rules.push({prop: m[1].trim(), val: m[2].trim()});
}

const twClasses = [];
const breakdown = [];
let previewStyle = '';

rules.forEach(r => {
const p = r.prop.toLowerCase();
const v = r.val;
let cls = null, status = 'matched';
let cssNote = `${p}: ${v}`;

if (p === 'background-color' || p === 'background' || p === 'background-image') {
if (p === 'background-image' && v.includes('gradient')) {
cls = 'bg-gradient-to-r';
status = 'partial';
} else {
const hex = parseColor(v);
const tw = findClosestColor(hex);
if (tw) { cls = `bg-${tw}`; }
}
} else if (p === 'color') {
const hex = parseColor(v);
const tw = findClosestColor(hex);
if (tw) cls = `text-${tw}`;
} else if (p === 'font-size') {
cls = `text-${pxToText(v)}`;
} else if (p === 'font-weight') {
const num = parseInt(v);
if (num <= 300) cls = 'font-light';
else if (num <= 400) cls = 'font-normal';
else if (num <= 500) cls = 'font-medium';
else if (num <= 600) cls = 'font-semibold';
else if (num <= 700) cls = 'font-bold';
else cls = 'font-extrabold';
} else if (p === 'padding') {
const vals = v.split(/\s+/);
if (vals.length === 1) cls = `p-${pxToSpacing(vals[0])}`;
else if (vals.length === 2) cls = `py-${pxToSpacing(vals[0])} px-${pxToSpacing(vals[1])}`;
else if (vals.length === 4) cls = `pt-${pxToSpacing(vals[0])} pr-${pxToSpacing(vals[1])} pb-${pxToSpacing(vals[2])} pl-${pxToSpacing(vals[3])}`;
} else if (p === 'padding-top' || p === 'padding-bottom' || p === 'padding-left' || p === 'padding-right' || p === 'padding-block' || p === 'padding-inline') {
const dir = p.replace('padding-','').replace('-top','t').replace('-bottom','b').replace('-left','l').replace('-right','r');
cls = `p${dir}-${pxToSpacing(v)}`;
} else if (p === 'margin') {
const vals = v.split(/\s+/);
if (vals.length === 1) cls = `m-${pxToSpacing(vals[0])}`;
else if (vals.length === 2) cls = `my-${pxToSpacing(vals[0])} mx-${pxToSpacing(vals[1])}`;
else if (vals.length === 4) cls = `mt-${pxToSpacing(vals[0])} mr-${pxToSpacing(vals[1])} mb-${pxToSpacing(vals[2])} ml-${pxToSpacing(vals[3])}`;
} else if (p === 'margin-top' || p === 'margin-bottom' || p === 'margin-left' || p === 'margin-right') {
const dir = p.replace('margin-','').replace('-top','t').replace('-bottom','b').replace('-left','l').replace('-right','r');
cls = `m${dir}-${pxToSpacing(v)}`;
} else if (p === 'width' || p === 'height') {
const w = p === 'width' ? 'w' : 'h';
if (v === '100%') cls = `${w}-full`;
else if (v === '50%') cls = `${w}-1/2`;
else if (v === 'auto') cls = `${w}-auto`;
else if (v.endsWith('px')) cls = `${w}-${parseInt(v)}`;
} else if (p === 'border-radius') {
const num = parseInt(v);
if (v === '50%') cls = 'rounded-full';
else if (num <= 2) cls = 'rounded-sm';
else if (num <= 4) cls = 'rounded';
else if (num <= 6) cls = 'rounded-md';
else if (num <= 8) cls = 'rounded-lg';
else if (num <= 12) cls = 'rounded-xl';
else if (num <= 16) cls = 'rounded-2xl';
else cls = 'rounded-3xl';
} else if (p === 'border') {
cls = 'border';
} else if (p === 'text-align') {
if (v === 'center') cls = 'text-center';
else if (v === 'right') cls = 'text-right';
else if (v === 'left') cls = 'text-left';
else if (v === 'justify') cls = 'text-justify';
} else if (p === 'display') {
if (v === 'flex') cls = 'flex';
else if (v === 'block') cls = 'block';
else if (v === 'inline-block') cls = 'inline-block';
else if (v === 'inline') cls = 'inline';
else if (v === 'grid') cls = 'grid';
else if (v === 'none') cls = 'hidden';
} else if (p === 'justify-content') {
const map = {'center':'justify-center','space-between':'justify-between','space-around':'justify-around','flex-start':'justify-start','flex-end':'justify-end'};
cls = map[v];
} else if (p === 'align-items') {
const map = {'center':'items-center','flex-start':'items-start','flex-end':'items-end','stretch':'items-stretch'};
cls = map[v];
} else if (p === 'box-shadow' || p === 'shadow') {
cls = 'shadow-lg';
} else if (p === 'opacity') {
const num = parseFloat(v);
if (num === 0.5) cls = 'opacity-50';
else if (num === 0.75) cls = 'opacity-75';
else cls = `opacity-${Math.round(num * 100)}`;
} else {
status = 'unmatched';
}

if (cls) {
twClasses.push(cls);
previewStyle += `${p}:${v};`;
} else if (status === 'unmatched') {
breakdown.push({status, prop: p, val: v, cls: '(no Tailwind equivalent found)'});
return;
}

breakdown.push({status, prop: p, val: v, cls});
});

// Output
$('#output').value = [...new Set(twClasses)].join(' ');
const matched = breakdown.filter(b => b.status === 'matched').length;
const total = breakdown.length;
$('#summary').textContent = `${matched}/${total} properties converted`;

const list = $('#breakdown-list');
list.innerHTML = breakdown.map(b => {
return `<div class="${b.status}"><span class="css-prop">${b.prop}: ${b.val};</span><span class="tw-class">→ ${b.cls}</span></div>`;
}).join('');

// Live preview
const preview = $('#preview');
preview.style.cssText = previewStyle;
}

  background-color: #3b82f6;
  color: white;

  text-align: center;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}`;
convertCSS();
}

<button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').value)">${t('btnCopy')}</button>`;
