<style>
.al-layout{display:grid;grid-template-columns:340px 1fr;gap:18px;margin-top:12px}
@media(max-width:900px){.al-layout{grid-template-columns:1fr}}
.al-panel{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:16px}
.al-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.al-row label{font-size:.85em;font-weight:600;color:var(--text2);flex:1}
.al-row select,.al-row input[type=text]{flex:1.6;padding:6px 8px;border:1px solid var(--border);border-radius:8px;background:var(--glass2);color:var(--text);font-size:.85em;min-width:0}
.al-row input[type=color]{width:36px;height:32px;flex:0 0 36px;cursor:pointer}
.al-preview{padding:30px;background:linear-gradient(135deg,#2c3e50,#4ca1af);border-radius:14px;min-height:380px;display:flex;flex-direction:column;gap:14px;justify-content:center;align-items:stretch;overflow:auto}
.al-alert{display:flex;align-items:flex-start;gap:12px;padding:14px 18px;border-radius:10px;border-left:5px solid;font-size:.92em;line-height:1.5;animation:slideIn .4s ease-out;position:relative}
.al-alert .icon{font-size:1.3em;flex-shrink:0;line-height:1.2;margin-top:1px}
.al-alert .body{flex:1;min-width:0}
.al-alert .title{font-weight:700;margin-bottom:2px;font-size:1em}
.al-alert .msg{opacity:.85;font-size:.92em}
.al-alert .close{background:transparent;border:none;font-size:1.2em;cursor:pointer;opacity:.5;padding:0 4px;line-height:1}
.al-alert .close:hover{opacity:1}
.al-alert.dismissible{padding-right:8px}
.al-toast{position:fixed;bottom:24px;right:24px;background:#1a1a2e;color:#fff;padding:12px 18px;border-radius:10px;font-size:.9em;box-shadow:0 8px 24px rgba(0,0,0,.3);display:flex;align-items:center;gap:8px;z-index:999;animation:slideUp .4s ease-out}
.al-show-btn{margin-top:14px;background:var(--accent,#5566ff);color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:600;align-self:center}
.al-variants{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.al-var{padding:8px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:.8em;background:var(--glass2);text-align:center;color:var(--text)}
.al-var.active{background:var(--accent,#5566ff);color:#fff;border-color:var(--accent,#5566ff)}
.al-out{background:#0d1117;color:#c9d1d9;padding:16px;border-radius:10px;font-family:monospace;font-size:.78em;line-height:1.55;overflow-x:auto;max-height:280px;overflow-y:auto;white-space:pre;margin-top:14px}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"CSS Alert & Toast Generator","description":"Generate beautiful CSS alert, toast and notification components with live preview. Customize success, error, warning, info variants with icons and animations.","url":"https://tools.gamezipper.com/css-tools/alert.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the difference between an alert and a toast?", "acceptedAnswer": {"@type": "Answer", "text": "Alerts are persistent messages that stay on the page until the user dismisses them. Toasts are temporary, non-blocking popups that appear in a corner and auto-dismiss after a few seconds. The generator supports both styles."}}, {"@type": "Question", "name": "Can I customize the icon for each variant?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. You can use any emoji, SVG or character for the icon. The generator includes sensible defaults (✓ for success, ✕ for error, ⚠ for warning, ℹ for info) that you can replace with your own."}}, {"@type": "Question", "name": "Are the alerts accessible?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The generated HTML uses semantic ARIA role='alert' for screen readers, and colors meet WCAG AA contrast guidelines. The close button has proper aria-label."}}, {"@type": "Question", "name": "Can I make the alert dismissible?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Toggle the 'Dismissible' option to add a close button. The CSS includes a hover effect and a smooth fade animation when the user closes the alert."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="al-layout">
      <div class="al-panel">
        <h3 style="margin:0 0 12px;font-size:1rem">⚙️ Settings</h3>
        <div class="al-row"><label id="lbl-variant"></label>
          <select id="variant">
            <option value="success">Success</option>
            <option value="error">Error</option>
            <option value="warning">Warning</option>
            <option value="info">Info</option>
            <option value="custom">Custom</option>
          </select>
        </div>
        <div class="al-row"><label id="lbl-color"></label><input type="color" id="color" value="#10b981"></div>
        <div class="al-row"><label id="lbl-icon"></label><input type="text" id="icon" value="✓"></div>
        <div class="al-row"><label id="lbl-title"></label><input type="text" id="title" value="Saved successfully"></div>
        <div class="al-row"><label id="lbl-msg"></label><input type="text" id="msg" value="Your changes have been saved."></div>
        <div class="al-row"><label id="lbl-dismiss"></label>
          <select id="dismiss"><option value="yes">Yes</option><option value="no">No</option></select>
        </div>
        <div class="al-row"><label id="lbl-style"></label>
          <select id="style">
            <option value="alert">Alert (inline)</option>
            <option value="toast">Toast (popup)</option>
          </select>
        </div>
      </div>
      <div>
        <div class="al-preview" id="preview"></div>
        <h3 style="margin:18px 0 8px;font-size:1rem" id="lbl-code"></h3>
        <pre class="al-out" id="output"></pre>
        <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
          <button class="gz-btn" id="btn-copy"></button>
        </div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Alert & Toast Generator',
    toolDesc: 'Design beautiful alert, toast and notification components with live preview. Pick from success, error, warning, info or custom colors — with optional dismiss button.',
    lblVariant: 'Variant', lblColor: 'Color', lblIcon: 'Icon', lblTitle: 'Title',
    lblMsg: 'Message', lblDismiss: 'Dismissible', lblStyle: 'Display style',
    lblCode: 'Generated HTML + CSS',
    btnCopy: 'Copy Code', btnShow: 'Show Toast Demo',
    step1: 'Pick a variant or choose custom for your own color',
    step2: 'Edit the icon, title and message text',
    step3: 'Choose alert or toast style and whether it can be dismissed',
    step4: 'Copy the HTML and CSS into your project',
  },
  zh: {
    toolTitle: 'CSS 提示框 & Toast 生成器',
    toolDesc: '设计精美的提示框、Toast 和通知组件，实时预览。选择成功、错误、警告、信息或自定义颜色 — 可选关闭按钮。',
    lblVariant: '类型', lblColor: '颜色', lblIcon: '图标', lblTitle: '标题',
    lblMsg: '消息', lblDismiss: '可关闭', lblStyle: '显示样式',
    lblCode: '生成的 HTML + CSS',
    btnCopy: '复制代码', btnShow: '显示 Toast 演示',
    step1: '选择类型或自定义颜色',
    step2: '编辑图标、标题和消息文本',
    step3: '选择 alert 或 toast 样式以及是否可关闭',
    step4: '复制 HTML 和 CSS 到你的项目中',
  }
});

const { $, copyText, t } = GZ;
const VARIANTS = {
  success: {color:'#10b981',icon:'✓',bg:'#f0fdf4',titleColor:'#065f46',msgColor:'#047857'},
  error: {color:'#ef4444',icon:'✕',bg:'#fef2f2',titleColor:'#991b1b',msgColor:'#b91c1c'},
  warning: {color:'#f59e0b',icon:'⚠',bg:'#fffbeb',titleColor:'#92400e',msgColor:'#b45309'},
  info: {color:'#3b82f6',icon:'ℹ',bg:'#eff6ff',titleColor:'#1e40af',msgColor:'#1d4ed8'},
};

let toastTimer = null;
function render() {
  const variant = $('#variant').value;
  const color = $('#color').value;
  const icon = $('#icon').value;
  const titleText = $('#title').value;
  const msg = $('#msg').value;
  const dismiss = $('#dismiss').value === 'yes';
  const style = $('#style').value;
  document.documentElement.style.setProperty('--accent', color);
  const v = variant === 'custom' ? {color, icon, bg:'#f3f4f6', titleColor:'#1f2937', msgColor:'#4b5563'} : VARIANTS[variant];
  const alertEl = document.createElement('div');
  alertEl.className = 'al-alert' + (dismiss ? ' dismissible' : '');
  alertEl.setAttribute('role','alert');
  alertEl.style.background = v.bg;
  alertEl.style.borderLeftColor = v.color;
  alertEl.style.color = v.msgColor;
  let inner = `<span class="icon" style="color:${v.color}">${icon}</span><div class="body"><div class="title" style="color:${v.titleColor}">${titleText}</div><div class="msg">${msg}</div></div>`;
  if (dismiss) inner += `<button class="close" onclick="this.parentElement.remove()" aria-label="Close">×</button>`;
  alertEl.innerHTML = inner;
  const preview = $('#preview');
  if (style === 'alert') {
    // Remove any toasts
    document.querySelectorAll('.al-toast').forEach(t=>t.remove());
    preview.innerHTML = '';
    preview.appendChild(alertEl);
  } else {
    // Toast mode: show one demo
    preview.innerHTML = `<p style="color:#fff;opacity:.7;text-align:center;margin:0;font-size:.85em">${t('btnShow')}</p>`;
    const btn = document.createElement('button');
    btn.className = 'al-show-btn';
    btn.textContent = t('btnShow');
    btn.onclick = () => {
      document.querySelectorAll('.al-toast').forEach(t=>t.remove());
      const t1 = document.createElement('div');
      t1.className = 'al-toast';
      t1.style.borderLeft = `4px solid ${v.color}`;
      t1.innerHTML = `<span style="color:${v.color}">${icon}</span><div><strong style="display:block">${titleText}</strong><span style="opacity:.8">${msg}</span></div>`;
      document.body.appendChild(t1);
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t1.remove(), 3500);
    };
    preview.appendChild(btn);
  }
  generateCode();
}

function generateCode() {
  const variant = $('#variant').value;
  const color = $('#color').value;
  const icon = $('#icon').value;
  const titleText = $('#title').value;
  const msg = $('#msg').value;
  const dismiss = $('#dismiss').value === 'yes';
  const style = $('#style').value;
  const v = variant === 'custom' ? {color, icon, bg:'#f3f4f6', titleColor:'#1f2937', msgColor:'#4b5563'} : VARIANTS[variant];
  const cls = style === 'toast' ? 'toast' : 'alert';
  const css = `/* === ${cls} CSS === */
:root { --accent: ${v.color}; }
.alert {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 18px; border-radius: 10px;
  border-left: 5px solid ${v.color};
  background: ${v.bg};
  font-size: 0.92em; line-height: 1.5;
  animation: alertSlideIn 0.4s ease-out;
}
.alert-icon { font-size: 1.3em; color: ${v.color}; flex-shrink: 0; line-height: 1.2; }
.alert-body { flex: 1; min-width: 0; }
.alert-title { font-weight: 700; margin-bottom: 2px; color: ${v.titleColor}; }
.alert-msg { color: ${v.msgColor}; }
.alert-close {
  background: transparent; border: none; font-size: 1.2em;
  cursor: pointer; opacity: 0.5; padding: 0 4px;
}
.alert-close:hover { opacity: 1; }
@keyframes alertSlideIn {
  from { opacity: 0; transform: translateX(-12px); }
  to { opacity: 1; transform: translateX(0); }
}`;
  const html = `<div class="alert" role="alert">
  <span class="alert-icon">${icon}</span>
  <div class="alert-body">
    <div class="alert-title">${titleText}</div>
    <div class="alert-msg">${msg}</div>
  </div>${dismiss ? '\n  <button class="alert-close" onclick="this.parentElement.remove()" aria-label="Close">×</button>' : ''}
</div>`;
  $('#output').textContent = css + '\n\n/* === HTML === */\n' + html;
}

$('#variant').addEventListener('change', e => {
  if (e.target.value !== 'custom' && VARIANTS[e.target.value]) {
    $('#color').value = VARIANTS[e.target.value].color;
    $('#icon').value = VARIANTS[e.target.value].icon;
  }
  render();
});
['color','icon','title','msg','dismiss','style'].forEach(id => $('#'+id).addEventListener('input', render));

$('#btn-copy').textContent = t('btnCopy');
$('#btn-copy').addEventListener('click', () => copyText($('#output').textContent));

render();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔘', href:'/css-tools/button.html', name:'CSS Button'},
    {icon:'☑️', href:'/css-tools/checkbox.html', name:'CSS Checkbox'},
    {icon:'🔘', href:'/css-tools/switch.html', name:'CSS Switch'},
    {icon:'⏳', href:'/css-tools/loader.html', name:'CSS Loader'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
