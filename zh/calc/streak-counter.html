<script>
GZI18n.register({
  en: {
    toolTitle: 'Habit Streak Counter',
    toolDesc: 'Track daily habits, build unstoppable streaks and stay motivated. Check in each day and watch your progress grow. 100% private — runs in your browser.',
    phNewHabit: 'e.g. Drink water, Exercise, Read 10 pages…',
    addBtn: 'Add Habit',
    currentStreak: 'Current streak',
    longestStreak: 'Longest',
    totalCheckins: 'Total',
    checkinBtn: 'Check in today',
    doneToday: '✓ Done today',

    delete: 'Delete',
    days: 'days',
    day: 'day',
    motivation: ['Small steps every day lead to big results.','Don\'t break the chain! 🔗','Consistency beats intensity.','You are what you repeatedly do.','Progress, not perfection.','A year from now you\'ll wish you started today.','Discipline is choosing what you want most over what you want now.','The secret of getting ahead is getting started.'],
    step1: 'Type a habit name and click Add Habit',
    step2: 'Click "Check in today" each day you complete the habit',
    step3: 'Watch your current streak grow day by day',
    step4: 'Your longest streak and total are saved automatically',
  },
  zh: {
    toolTitle: '习惯打卡连续天数计数器',
    toolDesc: '追踪每日习惯，打造不间断的连续打卡，保持动力。每天签到，看着进度不断增长。100% 私密 — 浏览器本地运行。',
    phNewHabit: '例如：喝水、运动、阅读 10 页…',
    addBtn: '添加习惯',
    currentStreak: '当前连续',
    longestStreak: '最长记录',
    totalCheckins: '累计打卡',
    checkinBtn: '今日打卡',
    doneToday: '✓ 今日已打卡',
    emptyMsg: '还没有习惯。在上方添加你的第一个习惯，开始连续打卡！🔥',
    delete: '删除',
    days: '天',
    day: '天',
    motivation: ['每天一小步，成就大不同。','不要打断链条！🔗','坚持胜过强度。','你重复做什么，就会成为什么。','追求进步，而非完美。','一年后你会后悔今天没开始。','自律，是选择你最想要的，而非眼前想要的。','领先的秘密就是开始行动。'],
    step1: '输入习惯名称，点击「添加习惯」',
    step2: '每天完成习惯后点击「今日打卡」',
    step3: '看着当前连续天数一天天增长',
    step4: '最长记录和累计打卡会自动保存',
  }
});

const { $, t } = GZ;
const STORAGE_KEY = 'gz_habits_v1';

function todayKey(d) {
  d = d || new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function load() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; } }
function save(h) { localStorage.setItem(STORAGE_KEY, JSON.stringify(h)); }

function calcStreak(dates) {
  const set = new Set(dates);
  let streak = 0;
  const d = new Date();
  // Allow today OR yesterday to still count current streak (grace if not checked in yet today)
  if (!set.has(todayKey(d))) {
    d.setDate(d.getDate() - 1);
    if (!set.has(todayKey(d))) return 0;
  }
  while (set.has(todayKey(d))) { streak++; d.setDate(d.getDate()-1); }
  return streak;
}

function addHabit() {
  const name = $('#new-habit').value.trim();
  if (!name) return;
  const habits = load();
  habits.push({ id: Date.now(), name: name, dates: [], longest: 0 });
  save(habits);
  $('#new-habit').value = '';
  render();
}

function deleteHabit(id) {
  const habits = load().filter(h => h.id !== id);
  save(habits);
  render();
}

function toggleCheckin(id) {
  const habits = load();
  const h = habits.find(x => x.id === id);
  if (!h) return;
  const tk = todayKey();
  const idx = h.dates.indexOf(tk);
  if (idx >= 0) { h.dates.splice(idx, 1); }
  else { h.dates.push(tk); }
  h.longest = Math.max(h.longest || 0, calcStreak(h.dates));
  save(habits);
  render();
}

function render() {
  const habits = load();
  const container = $('#habits');
  const empty = $('#empty-msg');
  container.innerHTML = '';
  if (!habits.length) {
    empty.textContent = t('emptyMsg');
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    const today = todayKey();
    habits.forEach(h => {
      const streak = calcStreak(h.dates);
      const doneToday = h.dates.includes(today);
      // Build 14-day grid
      let grid = '';
      for (let i = 13; i >= 0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i);
        const k = todayKey(d);
        const cls = 'day-cell' + (h.dates.includes(k) ? ' done' : '') + (k === today ? ' today' : '');
        grid += '<div class="' + cls + '" title="' + k + '"></div>';
      }
      const badgeCls = streak > 0 ? 'streak-fire' : 'streak-zero';
      const icon = streak > 0 ? '🔥' : '⭕';
      const card = document.createElement('div');
      card.className = 'habit-card';
      card.innerHTML = `
        <div class="habit-row">
          <span class="habit-name">${escapeHtml(h.name)}</span>
          <span class="streak-badge ${badgeCls}">${icon} ${streak} ${streak===1?t('day'):t('days')}</span>
          <button class="btn-checkin ${doneToday?'done-today':''}" onclick="toggleCheckin(${h.id})">${doneToday?t('doneToday'):t('checkinBtn')}</button>
          <button class="btn-del" onclick="deleteHabit(${h.id})" title="${t('delete')}">✕</button>
        </div>
        <div class="habit-stats">
          <div><b>${h.longest||0}</b>${t('longestStreak')}</div>
          <div><b>${h.dates.length}</b>${t('totalCheckins')}</div>
        </div>
        <div class="checkin-grid">${grid}</div>
      `;
      container.appendChild(card);
    });
  }
  // motivation
  const m = t('motivation');
  $('#motivation-box').textContent = '💭 ' + (Array.isArray(m) ? m[Math.floor(Math.random()*m.length)] : m);
}

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

$('#add-btn').textContent = t('addBtn');
$('#new-habit').placeholder = t('phNewHabit');
$('#new-habit').addEventListener('keydown', e => { if (e.key === 'Enter') addHabit(); });

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro Timer'},
    {icon:'😊', href:'/calc/mood-tracker.html', name:'Mood Tracker'},
    {icon:'⚖️', href:'/calc/weight-tracker.html', name:'Weight Tracker'},
    {icon:'📋', href:'/text/todo.html', name:'To-Do List'},
  ]
});

render();
// Refresh streaks when tab regains focus
window.addEventListener('focus', render);
</script>
