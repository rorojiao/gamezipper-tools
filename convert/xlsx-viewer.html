.data-table th{background:var(--gz-bg-alt);position:sticky;top:0;z-index:2;cursor:pointer;font-weight:700}
.data-table th:hover{color:var(--gz-accent)}
.data-table td:focus{outline:2px solid var(--gz-accent);background:rgba(78,205,196,.1)}
.data-table .rowno{background:var(--gz-bg-alt);position:sticky;left:0;color:var(--gz-text);opacity:.6;font-variant-numeric:tabular-nums;text-align:right}
.info-row{display:flex;flex-wrap:wrap;gap:14px;font-size:.82em;opacity:.75;padding:6px 4px}

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="xls-wrap">
      <div class="drop-zone" id="drop">
        <div class="ic">📊</div>
        <div class="ttl" id="dzTitle"></div>
        <div class="sub" id="dzSub"></div>
        <input type="file" id="fileInput" accept=".xlsx,.xls,.xlsm,.csv,.ods" style="display:none">
      </div>
      <div id="viewerBlock" style="display:none">
        <div class="info-row" id="infoRow"></div>
        <div class="toolbar">
          <input type="text" id="searchBox" placeholder="">
          <button class="btn" id="sortBtn" onclick="toggleSort()"></button>
          <button class="btn" id="clearFilterBtn" onclick="clearFilter()"></button>
          <span style="flex:1"></span>
          <button class="btn primary" id="csvBtn" onclick="exportCSV()"></button>
          <button class="btn" id="jsonBtn" onclick="exportJSON()"></button>
          <button class="btn" id="newBtn" onclick="resetAll()"></button>
        </div>
        <div class="sheet-tabs" id="sheetTabs"></div>
        <div class="table-scroll">
          <table class="data-table" id="dataTable"></table>
        </div>

      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
GZI18n.register({
  en: {
    toolTitle: 'XLSX / Excel Viewer',
    toolDesc: 'Open Excel (.xlsx, .xls) and CSV spreadsheets directly in your browser. View, search, sort, filter and edit cells, then export to CSV or JSON. Fully private.',
    dzTitle: 'Drop a spreadsheet here or click to browse',
    dzSub: 'Supported: .xlsx · .xls · .xlsm · .csv · .ods — processed locally',
    searchPh: 'Search / filter rows...',
    sortBtn: 'Sort by first column',
    sortBtnDesc: 'Sort desc',
    clearFilterBtn: 'Clear filter',
    csvBtn: 'Export CSV',
    jsonBtn: 'Export JSON',
    newBtn: 'Open another file',
    note: 'Your file is parsed locally with SheetJS — nothing is uploaded. Cell edits live only in your browser session. Click a column header to sort by that column.',
    infoFile: 'File',
    infoSheets: 'Sheets',
    infoRows: 'Rows',
    infoCols: 'Cols',
    errParse: 'Could not read this file. Make sure it is a valid Excel or CSV file.',
    errLib: 'Spreadsheet library failed to load. Please check your internet connection and retry.',
    empty: 'No data in this sheet',
    step1: 'Drop or browse an .xlsx / .xls / .csv / .ods file',
    step2: 'Switch between sheets using the tabs at the top',
    step3: 'Use the search box to filter rows; click a column header to sort',
    step4: 'Edit any cell by clicking it, then export the sheet to CSV or JSON',
  },
  zh: {
    toolTitle: 'XLSX / Excel 查看器',
    toolDesc: '在浏览器中直接打开 Excel（.xlsx、.xls）和 CSV 表格。支持查看、搜索、排序、筛选和编辑单元格，并导出为 CSV 或 JSON。完全本地处理。',
    dzTitle: '拖入表格文件或点击浏览',
    dzSub: '支持：.xlsx · .xls · .xlsm · .csv · .ods — 本地处理',
    searchPh: '搜索 / 筛选行...',
    sortBtn: '按首列排序',
    sortBtnDesc: '降序排列',
    clearFilterBtn: '清除筛选',
    csvBtn: '导出 CSV',
    jsonBtn: '导出 JSON',
    newBtn: '打开另一个文件',
    note: '文件由 SheetJS 在本地解析 — 不上传任何数据。单元格编辑仅存在于本次浏览器会话。点击列标题可按该列排序。',
    infoFile: '文件',
    infoSheets: '工作表',
    infoRows: '行数',
    infoCols: '列数',
    errParse: '无法读取此文件，请确认是有效的 Excel 或 CSV 文件。',
    errLib: '表格库加载失败，请检查网络后重试。',
    empty: '此工作表无数据',
    step1: '拖入或浏览选择 .xlsx / .xls / .csv / .ods 文件',
    step2: '使用顶部标签切换不同工作表',
    step3: '用搜索框筛选行，点击列标题可排序',
    step4: '点击单元格即可编辑，然后导出为 CSV 或 JSON',
  }
});

const { $, t } = GZ;
let workbook = null;
let currentSheet = null;
let currentData = []; // array of arrays
let fileName = '';
let sortDir = 0; // 0 none, 1 asc, 2 desc
let sortCol = -1;

// labels
$('#dzTitle').textContent = t('dzTitle');
$('#dzSub').textContent = t('dzSub');
$('#searchBox').placeholder = t('searchPh');
$('#sortBtn').textContent = t('sortBtn');
$('#clearFilterBtn').textContent = t('clearFilterBtn');
$('#csvBtn').textContent = t('csvBtn');
$('#jsonBtn').textContent = t('jsonBtn');
$('#newBtn').textContent = t('newBtn');
$('#note').textContent = t('note');

function err(msg){
  alert(msg);
}

function renderSheet(name){
  if(!workbook) return;
  if(typeof XLSX === 'undefined'){ err(t('errLib')); return; }
  currentSheet = name;
  const ws = workbook.Sheets[name];
  currentData = XLSX.utils.sheet_to_json(ws, {header:1, raw:false, defval:''});
  sortDir = 0; sortCol = -1;
  $('#searchBox').value = '';
  renderTable();
  renderTabs();
  updateInfo();
}

function renderTabs(){
  const tabs = $('#sheetTabs');
  tabs.innerHTML = '';
  workbook.SheetNames.forEach(n=>{
    const b = document.createElement('button');
    b.textContent = n;
    if(n === currentSheet) b.classList.add('active');
    b.onclick = ()=>renderSheet(n);
    tabs.appendChild(b);
  });
}

function renderTable(){
  const table = $('#dataTable');
  table.innerHTML = '';
  let data = currentData;
  // filter
  const q = $('#searchBox').value.trim().toLowerCase();
  if(q){
    data = data.filter(row => row.some(c => String(c).toLowerCase().includes(q)));
  }
  // sort
  if(sortCol >= 0 && data.length > 1){
    const header = data[0];
    const body = data.slice(1);
    body.sort((a,b)=>{
      const av = a[sortCol] ?? '';
      const bv = b[sortCol] ?? '';
      const an = parseFloat(av), bn = parseFloat(bv);
      let cmp;
      if(!isNaN(an) && !isNaN(bn) && av !== '' && bv !== '') cmp = an-bn;
      else cmp = String(av).localeCompare(String(bv));
      return sortDir === 1 ? cmp : -cmp;
    });
    data = [header, ...body];
  }
  if(data.length === 0 || (data.length === 1 && data[0].length === 0)){
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = 50;
    td.style.textAlign = 'center';
    td.textContent = t('empty');
    tr.appendChild(td);
    table.appendChild(tr);
    return;
  }
  const maxCols = data.reduce((m,r)=>Math.max(m,r.length),0);
  // header
  const thead = document.createElement('thead');
  const hr = document.createElement('tr');
  const hc = document.createElement('th'); hc.textContent = '#'; hr.appendChild(hc);
  for(let c=0;c<maxCols;c++){
    const th = document.createElement('th');
    const val = data[0] ? (data[0][c] ?? '') : String.fromCharCode(65+c);
    th.textContent = val === '' ? String.fromCharCode(65+c) : val;
    th.title = 'Sort by this column';
    th.onclick = ()=>{ sortCol = c; sortDir = sortDir === 1 ? 2 : 1; renderTable(); };
    if(sortCol === c) th.textContent += sortDir === 1 ? ' ▲' : ' ▼';
    hr.appendChild(th);
  }
  thead.appendChild(hr);
  table.appendChild(thead);
  // body
  const tbody = document.createElement('tbody');
  const startRow = data[0] && data[0].length ? 1 : 0;
  for(let r=startRow;r<data.length;r++){
    const tr = document.createElement('tr');
    const rn = document.createElement('td'); rn.className = 'rowno'; rn.textContent = String(r); tr.appendChild(rn);
    for(let c=0;c<maxCols;c++){
      const td = document.createElement('td');
      td.textContent = data[r][c] ?? '';
      td.contentEditable = 'true';
      td.onblur = (e)=>{ if(currentData[r]) currentData[r][c] = e.target.textContent; };
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
}

function updateInfo(){
  const rows = currentData.length;
  const cols = currentData.reduce((m,r)=>Math.max(m,r.length),0);
  $('#infoRow').innerHTML =
    '<span><b>'+t('infoFile')+':</b> '+fileName+'</span>'+
    '<span><b>'+t('infoSheets')+':</b> '+workbook.SheetNames.length+'</span>'+
    '<span><b>'+t('infoRows')+':</b> '+(rows>0?rows-1:0)+'</span>'+
    '<span><b>'+t('infoCols')+':</b> '+cols+'</span>';
}

function toggleSort(){
  sortCol = 0;
  sortDir = sortDir === 1 ? 2 : 1;
  renderTable();
}
function clearFilter(){
  $('#searchBox').value = '';
  sortDir = 0; sortCol = -1;
  renderTable();
}
function exportCSV(){
  if(!currentSheet) return;
  const ws = XLSX.utils.aoa_to_sheet(currentData);
  const csv = XLSX.utils.sheet_to_csv(ws);
  download(fileName.replace(/\.(xlsx|xls|xlsm|csv|ods)$/i,'')+'_'+currentSheet+'.csv', csv, 'text/csv');
}
function exportJSON(){
  if(!currentSheet || !currentData.length) return;
  const header = currentData[0] || [];
  const objs = currentData.slice(1).filter(r=>r.some(c=>String(c).trim()!=='')).map(r=>{
    const o = {};
    header.forEach((h,i)=>{ o[h || ('col'+i)] = r[i] ?? ''; });
    return o;
  });
  download(fileName.replace(/\.(xlsx|xls|xlsm|csv|ods)$/i,'')+'_'+currentSheet+'.json', JSON.stringify(objs,null,2), 'application/json');
}
function download(name, content, type){
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 100);
}

function loadFile(file){
  if(typeof XLSX === 'undefined'){ err(t('errLib')); return; }
  fileName = file.name;
  const reader = new FileReader();
  reader.onload = e=>{
    try {
      const data = new Uint8Array(e.target.result);
      workbook = XLSX.read(data, {type:'array'});
      if(!workbook.SheetNames.length){ err(t('errParse')); return; }
      $('#viewerBlock').style.display = '';
      renderSheet(workbook.SheetNames[0]);
    } catch(ex){ console.error(ex); err(t('errParse')); }
  };
  reader.onerror = ()=>err(t('errParse'));
  reader.readAsArrayBuffer(file);
}

function resetAll(){
  workbook = null;
  currentData = [];
  $('#viewerBlock').style.display = 'none';
  $('#fileInput').value = '';
}

// search live filter
$('#searchBox').addEventListener('input', ()=>{ sortDir = sortDir === 0 ? 0 : sortDir; renderTable(); });

// file input + drag/drop
const drop = $('#drop');
const fileInput = $('#fileInput');
drop.addEventListener('click', ()=>fileInput.click());
fileInput.addEventListener('change', e=>{ if(e.target.files[0]) loadFile(e.target.files[0]); });
['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev, e=>{ e.preventDefault(); drop.classList.add('drag'); }));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev, e=>{ e.preventDefault(); drop.classList.remove('drag'); }));
drop.addEventListener('drop', e=>{ const f=e.dataTransfer.files[0]; if(f) loadFile(f); });

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📄', href:'/convert/csv-editor.html', name:'CSV Editor'},
    {icon:'🔀', href:'/convert/csv-to-json.html', name:'CSV to JSON'},
    {icon:'📊', href:'/convert/json-to-excel.html', name:'JSON to Excel'},
    {icon:'📑', href:'/convert/csv-to-html.html', name:'CSV to HTML'},
    {icon:'🗃️', href:'/convert/csv-viewer.html', name:'CSV Viewer'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
