<script>
GZI18n.register({
  en: {
    toolTitle: 'JavaScript Console & REPL',
    toolDesc: 'Write and run JavaScript directly in your browser. Captures console.log, errors and return values — no setup, no upload, works offline.',
    codeEditor: 'JavaScript code (Ctrl/Cmd+Enter to run)',
    output: 'Output',
    run: 'Run ▶',
    clear: 'Clear',
    loadExample: 'Load Example',
    clearOutput: 'Clear Output',
    hint: '💡 Tip: Use Ctrl/Cmd+Enter to run. console.log, console.error, console.warn and console.info are all captured. async/await works.',
    ready: '✓ Console ready',
    step1: 'Type or paste JavaScript in the editor on the left',
    step2: 'Click Run (or press Ctrl/Cmd+Enter) to execute',
    step3: 'Output, console.log messages and errors appear on the right',
    step4: 'Use the example buttons to try common snippets',
  },
  zh: {
    toolTitle: 'JavaScript 控制台 / REPL',
    toolDesc: '直接在浏览器中编写并运行 JavaScript。捕获 console.log、错误和返回值 — 无需安装、不上传、可离线使用。',
    codeEditor: 'JavaScript 代码（Ctrl/Cmd+Enter 运行）',
    output: '输出',
    run: '运行 ▶',
    clear: '清空',
    loadExample: '加载示例',
    clearOutput: '清空输出',
    hint: '💡 提示：按 Ctrl/Cmd+Enter 运行。console.log、console.error、console.warn 和 console.info 都会被捕获，支持 async/await。',
    ready: '✓ 控制台就绪',
    step1: '在左侧编辑器中输入或粘贴 JavaScript',
    step2: '点击「运行」（或按 Ctrl/Cmd+Enter）执行',
    step3: '输出、日志和错误将显示在右侧',
    step4: '点击示例按钮试用常见代码片段',
  }
});

document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = GZ.t(el.dataset.i18n));
const { $, t } = GZ;
$('#hint').textContent = t('hint');

const examples = [
  { name: 'Hello', code: `console.log('Hello, World!');\nconst sum = (a, b) => a + b;\nconsole.log('2 + 3 =', sum(2, 3));` },
  { name: 'Array map', code: `const nums = [1, 2, 3, 4, 5];\nconst doubled = nums.map(n => n * 2);\nconsole.log('Original:', nums);\nconsole.log('Doubled:', doubled);\nconsole.log('Sum:', nums.reduce((a, b) => a + b, 0));` },
  { name: 'Promise/async', code: `async function demo() {\n  console.log('start');\n  await new Promise(r => setTimeout(r, 500));\n  console.log('after 500ms');\n  return Math.random();\n}\ndemo().then(n => console.log('random:', n));` },
  { name: 'JSON', code: `const data = { name: 'GameZipper', tools: 2700, free: true };\nconst json = JSON.stringify(data, null, 2);\nconsole.log(json);\nconsole.log('Parsed back:', JSON.parse(json));` },
  { name: 'Date', code: `const now = new Date();\nconsole.log('Now:', now.toISOString());\nconsole.log('Day:', now.toLocaleDateString('en-US', { weekday: 'long' }));\nconsole.log('Unix:', Math.floor(now.getTime() / 1000));` },
  { name: 'Math', code: `console.log('π =', Math.PI);\nconsole.log('e =', Math.E);\nconsole.log('random():', Math.random());\nconsole.log('sqrt(2):', Math.sqrt(2));\nconsole.log('2^10:', 2 ** 10);` },
  { name: 'Regex', code: `const text = 'Contact: support@example.com or sales@test.org';\nconst emails = text.match(/\\b[\\w.-]+@[\\w.-]+\\.\\w+\\b/g);\nconsole.log('Found emails:', emails);` },
  { name: 'Crypto', code: `(async () => {\n  const data = new TextEncoder().encode('hello');\n  const hash = await crypto.subtle.digest('SHA-256', data);\n  const hex = [...new Uint8Array(hash)].map(b => b.toString(16).padStart(2,'0')).join('');\n  console.log('SHA-256(hello) =', hex);\n})();` },
];

$('#examples').innerHTML = examples.map((e, i) =>
  `<button class="ex-btn" onclick="loadExample(${i})">📦 ${e.name}</button>`
).join('');

function loadExample(i) {
  $('#code').value = examples[i].code;
}

let history = [];

function fmtValue(v, depth) {
  if (depth > 4) return '…';
  if (v === null) return 'null';
  if (v === undefined) return 'undefined';
  const t = typeof v;
  if (t === 'string') return depth === 0 ? v : JSON.stringify(v);
  if (t === 'number' || t === 'boolean' || t === 'bigint') return String(v);
  if (t === 'symbol') return v.toString();
  if (t === 'function') return `ƒ ${v.name || 'anonymous'}()`;
  if (v instanceof Error) return `${v.name}: ${v.message}`;
  if (v instanceof Date) return v.toISOString();
  if (v instanceof RegExp) return v.toString();
  if (v instanceof Promise) return 'Promise { <pending> }';
  if (Array.isArray(v)) {
    const items = v.slice(0, 50).map(x => fmtValue(x, depth + 1));
    return `[${items.join(', ')}${v.length > 50 ? ', …' : ''}]`;
  }
  if (t === 'object') {
    try {
      const entries = Object.entries(v).slice(0, 50).map(([k, x]) => `${k}: ${fmtValue(x, depth + 1)}`);
      return `{ ${entries.join(', ')}${Object.keys(v).length > 50 ? ', …' : ''} }`;
    } catch { return String(v); }
  }
  return String(v);
}

function now() {
  const d = new Date();
  return d.toTimeString().substr(0, 8);
}

function appendLine(text, cls) {
  const out = $('#output');
  const div = document.createElement('div');
  div.className = 'log-line ' + (cls || '');
  div.innerHTML = `<span class="log-meta">${now()}</span>${text.replace(/</g,'&lt;')}`;
  out.appendChild(div);
  out.scrollTop = out.scrollHeight;
}

// Capture console
const origLog = console.log, origErr = console.error, origWarn = console.warn, origInfo = console.info;
function patchedConsole(type, cls) {
  return function(...args) {
    const text = args.map(a => fmtValue(a, 0)).join(' ');
    appendLine(text, cls);
    origLog.apply(console, [`${type.toUpperCase()}:`, ...args]);
  };
}
console.log = patchedConsole('log', '');
console.error = patchedConsole('error', 'error');
console.warn = patchedConsole('warn', 'warn');
console.info = patchedConsole('info', 'info');

appendLine(t('ready'), 'sys');

function runCode() {
  const code = $('#code').value;
  if (!code.trim()) return;
  history.push(code);
  appendLine(`▶ ${code.split('\n').length} line(s)`, 'sys');
  try {
    // Wrap in async function so await works at top level
    const wrapped = `return (async () => {\n${code}\n})();`;
    const fn = new Function(wrapped);
    const result = fn();
    if (result instanceof Promise) {
      result.then(v => {
        if (v !== undefined) appendLine(`⟶ ${fmtValue(v, 0)}`, 'result');
      }).catch(e => appendLine(`✗ Uncaught (promise): ${e && e.message || e}`, 'error'));
    } else if (result !== undefined) {
      appendLine(`⟶ ${fmtValue(result, 0)}`, 'result');
    }
    if (performance.memory) {
      $('#memUsage').textContent = `mem: ${(performance.memory.usedJSHeapSize / 1024 / 1024).toFixed(1)} MB`;
    }
  } catch(e) {
    appendLine(`✗ ${e.name}: ${e.message}`, 'error');
  }
}

function clearAll() {
  $('#code').value = '';
  $('#code').focus();
}

function clearOutput() {
  $('#output').innerHTML = '';
  appendLine(t('ready'), 'sys');
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="runCode()">▶ ${t('run')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearOutput()">🧹 ${t('clearOutput')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">🗑 ${t('clear')}</button>`;

// Keyboard: Ctrl/Cmd+Enter to run
$('#code').addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    runCode();
  }
  // Tab inserts 2 spaces instead of focus change
  if (e.key === 'Tab') {
    e.preventDefault();
    const ta = e.target;
    const s = ta.selectionStart, en = ta.selectionEnd;
    ta.value = ta.value.substring(0, s) + '  ' + ta.value.substring(en);
    ta.selectionStart = ta.selectionEnd = s + 2;
  }
});

// Load default example
$('#code').value = examples[0].code;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💻', href:'/dev/code-editor.html', name:'Code Editor'},
    {icon:'🔍', href:'/dev/regex.html', name:'Regex Tester'},
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'🔐', href:'/dev/aes.html', name:'AES Encrypt'},
  ]
});
</script>
