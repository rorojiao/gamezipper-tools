    notInSet: '部分字符不在 Code 39 字符集中，已被忽略。',
    step1: '输入大写字母、数字或符号 - . $ / + % 和空格',
    step2: '可选启用 mod-43 校验以生成完整 Code 39 mod 43',
    step3: '根据需要调整缩放和高度',
    step4: '下载为 SVG（矢量）或 PNG（位图）',
  }
});

const { $, copyText, t } = GZ;

// Code 39: character -> pattern (narrow=1, wide=3), bars and spaces alternate.
// Each pattern is 9 chars of 'n'/'w' for 5 bars + 4 spaces; the inter-character gap is narrow.
// Compact encoding: each entry is "BWbwbwbwbw" -> we store as string of 9 chars: b,s,b,s,b,s,b,s,b
const CHARS = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ-. $/+%';
// patterns: 5 bars + 4 spaces; n=narrow(1 unit) w=wide(3 units)
const PATTERNS = [
  'nnnwwnwnn','wnnwnnnnw','nnwwnnnnw','wnwwnnnnn','nnnwwnnnw', // 0-4
  'wnnwnnnnn','nnwwnnnnn','nnnwnnwnw','wnnwnwnnn','nnwwnwnnn', // 5-9
  'wnnnnwnnw','nnwnnwnnw','wnwnnnnnn','nnnnwwnnw','wnnnwwnnn', // A-E (10-14)  -- note: standard table
  'nnwnwwnnn','nnnnnwnww','wnnnnwnnn','nnwnnwnnn','nnnnwwnwn', // F-J
  'wnnnnwwnn','nnwnnwwnn','wnnnnnnwn','nnnnnnwwn','wnnnnnwwn', // K-O
  'nnwnnnnwn','nnwnnnwwn','nnnwwnnwn','wnnnwwnnn','nnnnwnwwn', // P-T (approx; canonical below)
  'wnnnwnnnn','nnwnwnnnn','nnnnnwwnn','nnnnnnnnw','wnnnnnnnn', // U-Y, space (approx)
  'nnnwwwwnn','wnwwnnnnn','nnwwnnnwn','nnnwnwwwn','wnwnnnnnn','nnwnnnnnn' // +, /, %, $, -, .
];
// Use the canonical ISO/IEC 16388 Code 39 table for full correctness:
const CODE39 = {
  '0':'nnnwwnwnn','1':'wnnwnnnnw','2':'nnwwnnnnw','3':'wnwwnnnnn','4':'nnnwwnnnw',
  '5':'wnnwnnnnn','6':'nnwwnnnnn','7':'nnnwnnwnw','8':'wnnwnwnnn','9':'nnwwnwnnn',
  'A':'wnnnnwnnw','B':'nnwnnwnnw','C':'wnwnnnnnn','D':'nnnnwwnnw','E':'wnnnwwnnn',
  'F':'nnwnwwnnn','G':'nnnnnwnww','H':'wnnnnwnnn','I':'nnwnnwnnn','J':'nnnnwwnwn',
  'K':'wnnnnnnww','L':'nnwnnnnww','M':'wnwnnnnnn','N':'nnnnnwwnw','O':'wnnnnwwnn',
  'P':'nnwnnwwnn','Q':'nnnnnnwww','R':'wnnnnnwnn','S':'nnwnnnwnn','T':'nnnnwwwnn',
  'U':'wwnnnnnnw','V':'nwwnnnnnw','W':'wwwnnnnnn','X':'nwnnwnnnw','Y':'wwnnwnnnn',
  'Z':'nwwnwnnnn','-':'nwnnnnwnw','.':'wwnnnnwnn',' ':'nwnnnnwnn','$':'nwnwnwnnn',
  '/':'nwnwnnnwn','+':'nwnnnwnwn','%':'nnnwnwnwn','*':'nwnnwnwnn'
};

function mod43Checksum(data) {
  const lookup = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ-. $/+%';
  let sum = 0;
  for (const ch of data) {
    const idx = lookup.indexOf(ch);
    if (idx >= 0) sum += idx;
  }
  return lookup[sum % 43];
}

function patternToBits(pat) {
  // 5 bars + 4 spaces, narrow=1, wide=3
  let bits = '';
  for (let k = 0; k < 9; k++) {
    const isBar = (k % 2 === 0);
    const w = pat[k] === 'w' ? 3 : 1;
    bits += (isBar ? '1' : '0').repeat(w);
  }
  return bits;
}

function generate() {
  const raw = ($('#data').value || '').toUpperCase();
  const svg = $('#barcode-svg');
  const info = $('#info');

  if (!raw) {
    svg.innerHTML = '';
    info.innerHTML = `<span style="color:var(--text2)">${t('empty')}</span>`;
    return;
  }

  // filter to valid chars
  let clean = '';
  let hadInvalid = false;
  for (const ch of raw) {
    if (ch in CODE39) clean += ch;
    else hadInvalid = true;
  }

  // optional checksum
  let chkChar = '';
  if ($('#checksum').checked) {
    chkChar = mod43Checksum(clean);
    clean += chkChar;
  }

  // build bits: * + data + *
  const seq = '*' + clean + '*';
  let bits = '';
  for (let i = 0; i < seq.length; i++) {
    bits += patternToBits(CODE39[seq[i]]);
    if (i < seq.length - 1) bits += '0'; // inter-character gap (narrow space)
  }

  const scale = parseInt($('#scale').value);
  const barH = parseInt($('#height').value);
  const unitW = scale;
  const quietZone = 10 * scale;
  const totalW = bits.length * unitW + quietZone * 2;
  const textH = $('#showtext').checked ? 20 : 0;
  const totalH = barH + textH;
  const textY = barH + 16;

  let rects = '';
  for (let i = 0; i < bits.length; i++) {
    if (bits[i] === '1') {
      rects += `<rect x="${quietZone + i * unitW}" y="0" width="${unitW}" height="${barH}" fill="#000"/>`;
    }
  }
  let textEl = '';
  if ($('#showtext').checked) {
    const display = '*' + clean + '*';
    textEl = `<text x="${totalW/2}" y="${textY}" font-family="monospace" font-size="14" fill="#000" text-anchor="middle" letter-spacing="2">${display.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</text>`;
  }

  svg.setAttribute('width', totalW);
  svg.setAttribute('height', totalH);
  svg.setAttribute('viewBox', `0 0 ${totalW} ${totalH}`);
  svg.innerHTML = `<rect x="0" y="0" width="${totalW}" height="${totalH}" fill="#fff"/>${rects}${textEl}`;

  let infoHtml = '<span style="color:var(--gz-success)">✓ ';
  if (chkChar) infoHtml += t('chkAdded')(chkChar);
  else infoHtml += `Encoded ${clean.length} characters`;
  infoHtml += '</span>';
  if (hadInvalid) infoHtml += ` <span style="color:var(--gz-accent)">⚠ ${t('notInSet')}</span>`;
  info.innerHTML = infoHtml;
}

$('#data').addEventListener('input', generate);
$('#checksum').addEventListener('change', generate);
$('#scale').addEventListener('input', e => { $('#scale-val').textContent = e.target.value + 'x'; generate(); });
$('#height').addEventListener('input', e => { $('#height-val').textContent = e.target.value + 'px'; generate(); });
$('#showtext').addEventListener('change', generate);

$('#toolbar').innerHTML = `

  <button class="gz-btn gz-btn-secondary" onclick="downloadPng()">${t('downloadPng')}</button>`;

function downloadSvg() {
  const svg = $('#barcode-svg');
  const clone = svg.cloneNode(true);
  const data = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([data], {type: 'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `code39-${Date.now()}.svg`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function downloadPng() {
  const svg = $('#barcode-svg');
  const data = new XMLSerializer().serializeToString(svg);
  const img = new Image();
  const blob = new Blob([data], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = img.width * 2;
    canvas.height = img.height * 2;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    canvas.toBlob(function(b) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = `code39-${Date.now()}.png`;
      a.click();
      URL.revokeObjectURL(a.href);
    });
  };
  img.src = url;
}

$('#lbl-data').textContent = t('lblData');
$('#lbl-checksum').textContent = t('lblChecksum');
$('#lbl-scale').textContent = t('lblScale');
$('#lbl-height').textContent = t('lblHeight');
$('#lbl-showtext').textContent = t('lblShowText');
$('#scale-val').textContent = '2x';
$('#height-val').textContent = '100px';

generate();

  ]
});
</script>
