<script>
GZI18n.register({
  en: {
    toolTitle: 'Property Tax Calculator',
    toolDesc: 'Estimate your annual and monthly property tax based on home value and local tax rate. Compare rates by state.',

    assessRatio: 'Assessment Ratio (%)',

  zh: {
    toolTitle: '房产税计算器',
    toolDesc: '根据房屋价值和当地税率估算年度和月度房产税。可按州比较税率。',
    homeValue: '🏠 房屋市场价值（$）',
    assessRatio: '评估比率（%）',
    taxRate: '税率（%）',
    state: '选择州（自动填充税率）',
    calculate: '计算房产税',
    annualTax: '年度房产税',
    monthlyTax: '月度房产税',
    dailyTax: '每日房产税',
    assessedValue: '评估价值',
    fiveYear: '5 年总计',
    tenYear: '10 年总计',
    step1: '输入房屋市场价值',
    step2: '设置评估比率（通常为100%）',
    step3: '输入税率或选择所在州',
    step4: '点击计算查看明细',
  }
});

const { $, t } = GZ;

$('#lbl-home-value').textContent = t('homeValue');
$('#lbl-assess-ratio').textContent = t('assessRatio');
$('#lbl-tax-rate').textContent = t('taxRate');
$('#lbl-state').textContent = t('state');
$('#btnCalc').textContent = t('calculate');
$('#lbl-annual').textContent = t('annualTax');

function fmt(n) { return '$' + n.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}); }

$('#stateSelect').addEventListener('change', function() {
  if (this.value) {
    $('#taxRate').value = this.value;
  }
});

$('#btnCalc').addEventListener('click', () => {
  const homeVal = parseFloat($('#homeValue').value) || 0;
  const ratio = parseFloat($('#assessRatio').value) || 100;
  const rate = parseFloat($('#taxRate').value) || 0;
  const assessed = homeVal * ratio / 100;
  const annual = assessed * rate / 100;
  const monthly = annual / 12;
  const daily = annual / 365;

  $('#results').style.display = '';
  $('#annualTax').textContent = fmt(annual);
  $('#monthlyTax').textContent = fmt(monthly);
  $('#dailyTax').textContent = fmt(daily);
  $('#assessedVal').textContent = fmt(assessed);
  $('#fiveYear').textContent = fmt(annual * 5);
  $('#tenYear').textContent = fmt(annual * 10);

  // Set labels
  $('#r-monthly').textContent = t('monthlyTax');
  $('#r-daily').textContent = t('dailyTax');
  $('#r-assessed').textContent = t('assessedValue');
  $('#r-5yr').textContent = t('fiveYear');
  $('#r-10yr').textContent = t('tenYear');
});

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

});
