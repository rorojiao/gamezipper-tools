<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I add text to a photo for free?", "acceptedAnswer": {"@type": "Answer", "text": "Upload your image, type your text in the box, then pick a font, size and color. Click one of the nine position buttons or drag the text directly on the image to place it exactly where you want. Download the result as PNG or JPG."}}, {"@type": "Question", "name": "Can I move the text by dragging?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. After uploading, click and drag the text anywhere on the canvas. The nine position buttons give quick presets (top-left, center, bottom-right, etc.) and dragging lets you fine-tune the exact placement."}}, {"@type": "Question", "name": "What fonts and styling can I use?", "acceptedAnswer": {"@type": "Answer", "text": "Choose from common web fonts (Arial, Georgia, Courier, Impact, Times, Verdana, Comic Sans), set any size, color, make it bold or italic, rotate it, and add a drop shadow for readability over busy backgrounds."}}, {"@type": "Question", "name": "Is my photo uploaded to a server?", "acceptedAnswer": {"@type": "Answer", "text": "No. All text rendering happens locally in your browser using the HTML canvas. Your photo never leaves your device."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div id="dropzone">
      <div class="drop-icon">🔠</div>
      <p id="dropzone-text"></p>
      <button class="gz-btn" id="select-btn"></button>
      <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp,image/gif,image/bmp">
    </div>
    <div id="controls">
      <div class="field-row">
        <label id="lbl-text"></label>
        <input type="text" id="text-val" value="Hello!" maxlength="200">
      </div>
      <div class="grid2">
        <div class="field-row"><label id="lbl-font"></label><select id="font"><option>Arial</option><option>Georgia</option><option>Courier New</option><option>Impact</option><option>Times New Roman</option><option>Verdana</option><option>Comic Sans MS</option><option>Trebuchet MS</option></select></div>
        <div class="field-row"><label id="lbl-size"></label><input type="number" id="size" value="48" min="8" max="400"></div>
        <div class="field-row"><label id="lbl-color"></label><input type="color" id="color" value="#ffffff"></div>
        <div class="field-row"><label id="lbl-angle"></label><input type="number" id="angle" value="0" step="5" min="-360" max="360"><span>°</span></div>
      </div>
      <div class="field-row">
        <div class="chk"><input type="checkbox" id="bold"><label for="bold" id="lbl-bold"></label></div>
        <div class="chk"><input type="checkbox" id="italic"><label for="italic" id="lbl-italic"></label></div>
        <div class="chk"><input type="checkbox" id="shadow" checked><label for="shadow" id="lbl-shadow"></label></div>
        <div class="chk"><input type="range" id="opacity" min="20" max="100" value="100" style="width:90px"><label for="opacity" id="lbl-opacity"></label></div>
      </div>
      <div class="field-row">
        <label id="lbl-pos"></label>
        <div class="pos-grid" id="pos-grid"></div>
      </div>
      <div id="canvas-wrap"><canvas id="canvas"></canvas></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Add Text to Image',
    toolDesc: 'Write text on photos online — captions, quotes, titles or watermarks. Custom font, size, color, rotation, shadow and opacity. Drag to place. Free and browser-based.',
    selectBtn: 'Select Image',
    dropzone: 'Drop an image here or click to upload',
    text: 'Text',
    font: 'Font',
    size: 'Size',
    color: 'Color',
    angle: 'Rotate',
    bold: 'Bold',
    italic: 'Italic',
    shadow: 'Shadow',
    opacity: 'Opacity',
    pos: 'Position',
    downloadPng: 'Download PNG',
    downloadJpg: 'Download JPG',
    reset: 'Reset',
    newImage: 'New Image',
    step1: 'Upload or drag and drop an image',
    step2: 'Type your text and pick font, size and color',
    step3: 'Click a position button or drag the text on the canvas',
    step4: 'Download the result as PNG or JPG',
  },
  zh: {
    toolTitle: '图片添加文字工具',
    toolDesc: '在线为图片添加文字 — 标题、引言、说明或水印。可自定义字体、字号、颜色、旋转、阴影和透明度，拖拽放置。免费，浏览器本地处理。',
    selectBtn: '选择图片',
    dropzone: '拖拽图片到此处或点击上传',
    text: '文字',
    font: '字体',
    size: '字号',
    color: '颜色',
    angle: '旋转',
    bold: '粗体',
    italic: '斜体',
    shadow: '阴影',
    opacity: '透明度',
    pos: '位置',
    downloadPng: '下载 PNG',
    downloadJpg: '下载 JPG',
    reset: '重置',
    newImage: '换张图片',
    step1: '上传或拖拽图片到页面',
    step2: '输入文字并选择字体、字号和颜色',
    step3: '点击位置按钮或直接在画布上拖拽文字',
    step4: '下载结果为 PNG 或 JPG',
  }
});

const { $, t } = GZ;
let origImg = null;
let pos = { x: 0.5, y: 0.5 }; // normalized 0..1
let dragging = false;
const canvas = $('#canvas');
const ctx = canvas.getContext('2d');

const POSITIONS = [
  {x:0,y:0},{x:0.5,y:0},{x:1,y:0},
  {x:0,y:0.5},{x:0.5,y:0.5},{x:1,y:0.5},
  {x:0,y:1},{x:0.5,y:1},{x:1,y:1}
];

// build position buttons
const posGrid = $('#pos-grid');
POSITIONS.forEach((p,i)=>{
  const b=document.createElement('button');
  b.className='pos-btn'+(i===4?' active':'');
  b.type='button';
  b.dataset.i=i;
  b.textContent='┼';
  b.onclick=()=>{pos={...POSITIONS[i]};document.querySelectorAll('.pos-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');render();};
  posGrid.appendChild(b);
});

function loadImage(file){
  const r=new FileReader();
  r.onload=e=>{origImg=new Image();origImg.onload=()=>{$('#controls').style.display='block';$('#dropzone').style.display='none';pos={x:0.5,y:0.5};render();};origImg.src=e.target.result;};
  r.readAsDataURL(file);
}

function render(){
  if(!origImg)return;
  const maxSide=1600;let s=1;
  if(Math.max(origImg.width,origImg.height)>maxSide)s=maxSide/Math.max(origImg.width,origImg.height);
  const w=Math.round(origImg.width*s),h=Math.round(origImg.height*s);
  canvas.width=w;canvas.height=h;
  ctx.drawImage(origImg,0,0,w,h);

  const txt=$('#text-val').value;
  if(!txt)return;
  const size=+$('#size').value||48;
  const weight=$('#bold').checked?'bold ':'';
  const style=$('#italic').checked?'italic ':'';
  ctx.font=`${style}${weight}${size}px ${$('#font').value}, sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.globalAlpha=(+$('#opacity').value)/100;
  const angle=(+$('#angle').value||0)*Math.PI/180;
  const lines=txt.split('\n');
  const lh=size*1.2;
  const totalH=lh*lines.length;
  const px=pos.x*w, py=pos.y*h;

  ctx.save();
  ctx.translate(px,py);ctx.rotate(angle);
  if($('#shadow').checked){ctx.shadowColor='rgba(0,0,0,0.6)';ctx.shadowBlur=Math.max(2,size/12);ctx.shadowOffsetX=size/40;ctx.shadowOffsetY=size/40;}
  lines.forEach((ln,i)=>{
    const yy=(i-(lines.length-1)/2)*lh;
    ctx.fillStyle=$('#color').value;
    ctx.fillText(ln,0,yy);
  });
  ctx.restore();
  ctx.globalAlpha=1;
}

function download(type){
  if(!origImg)return;
  const a=document.createElement('a');
  a.href=canvas.toDataURL(type==='jpg'?'image/jpeg':'image/png',0.92);
  a.download='image-with-text.'+(type==='jpg'?'jpg':'png');
  a.click();
}

// drag handling
function getPos(ev){
  const r=canvas.getBoundingClientRect();
  const sx=canvas.width/r.width, sy=canvas.height/r.height;
  const cx=(ev.touches?ev.touches[0].clientX:ev.clientX)-r.left;
  const cy=(ev.touches?ev.touches[0].clientY:ev.clientY)-r.top;
  pos={x:Math.min(1,Math.max(0,cx*sx)), y:Math.min(1,Math.max(0,cy*sy))};
  render();
}
canvas.addEventListener('mousedown',e=>{dragging=true;getPos(e);});
window.addEventListener('mousemove',e=>{if(dragging)getPos(e);});
window.addEventListener('mouseup',()=>dragging=false);
canvas.addEventListener('touchstart',e=>{dragging=true;getPos(e);e.preventDefault();},{passive:false});
canvas.addEventListener('touchmove',e=>{if(dragging)getPos(e);e.preventDefault();},{passive:false});
window.addEventListener('touchend',()=>dragging=false);

// labels
$('#select-btn').textContent=t('selectBtn');
$('#dropzone-text').textContent=t('dropzone');
$('#lbl-text').textContent=t('text');
$('#lbl-font').textContent=t('font');
$('#lbl-size').textContent=t('size');
$('#lbl-color').textContent=t('color');
$('#lbl-angle').textContent=t('angle');
$('#lbl-bold').textContent=t('bold');
$('#lbl-italic').textContent=t('italic');
$('#lbl-shadow').textContent=t('shadow');
$('#lbl-opacity').textContent=t('opacity');
$('#lbl-pos').textContent=t('pos');

$('#dropzone').onclick=()=>$('#file-input').click();
$('#file-input').onchange=e=>{if(e.target.files[0])loadImage(e.target.files[0]);};
['dragover'].forEach(ev=>$('#dropzone').addEventListener(ev,e=>{e.preventDefault();$('#dropzone').classList.add('dragover');}));
['dragleave','drop'].forEach(ev=>$('#dropzone').addEventListener(ev,e=>{e.preventDefault();$('#dropzone').classList.remove('dragover');}));
$('#dropzone').addEventListener('drop',e=>{if(e.dataTransfer.files[0])loadImage(e.dataTransfer.files[0]);});

['text-val','size','color','angle','opacity'].forEach(id=>$('#'+id).addEventListener('input',render));
['bold','italic','shadow'].forEach(id=>$('#'+id).addEventListener('change',render));
$('#font').addEventListener('change',render);
$('#text-val').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){/* keep single line */}});

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="download('png')">${t('downloadPng')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="download('jpg')">${t('downloadJpg')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="pos={x:0.5,y:0.5};document.querySelectorAll('.pos-btn').forEach((b,i)=>b.classList.toggle('active',i===4));render();">${t('reset')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('dropzone').style.display='block';document.getElementById('controls').style.display='none';">${t('newImage')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💦', href:'/image/watermark.html', name:'Watermark'},
    {icon:'🔄', href:'/image/image-rotator.html', name:'Image Rotator'},
    {icon:'🖤', href:'/image/grayscale.html', name:'Grayscale'},
    {icon:'🔘', href:'/image/round-corners.html', name:'Round Corners'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
