<script>
GZI18n.register({
  en: {
    toolTitle: 'Random Question Generator',
    toolDesc: 'Generate random questions for icebreakers, deep conversations, trivia, would-you-rather and journal prompts. 140+ curated questions, free and private.',

    lblCat: 'Category',
    optAll: 'All Categories',

    generate: 'Generate',
    copy: 'Copy All',
    copied: 'Copied!',
    statsQuestions: 'questions generated',
    step1: 'Pick how many questions you want (1–50)',
    step2: 'Choose a category — icebreakers, deep thoughts, trivia and more',
    step3: 'Click Generate to create a fresh batch',
    step4: 'Click any question to copy it, or use Copy All',
  },
  zh: {
    toolTitle: '随机问题生成器',
    toolDesc: '为破冰、深度对话、问答游戏、二选一和日记提示生成随机问题。140+ 精选问题，免费私密。',
    lblCount: '问题数量',
    lblCat: '分类',
    optAll: '全部分类',
    optIce: '🧊 破冰',
    optDeep: '🧠 深度',
    optWyr: '🤔 你愿意吗',
    optTrivia: '🎓 知识问答',
    optJournal: '📓 日记提示',
    optTot: '⚖️ 二选一',
    generate: '生成',
    copy: '复制全部',
    copied: '已复制！',
    statsQuestions: '个问题',
    step1: '选择要生成的问题数量（1–50）',
    step2: '选择分类 — 破冰、深度思考、问答等',
    step3: '点击生成创建新一批问题',
    step4: '点击任意问题复制它，或使用复制全部',
  }
});

const { $, t, copyText } = GZ;

$('#lbl-count').textContent = t('lblCount');
$('#lbl-cat').textContent = t('lblCat');
$('#opt-all').textContent = t('optAll');
$('#opt-ice').textContent = t('optIce');
$('#opt-deep').textContent = t('optDeep');
$('#opt-wyr').textContent = t('optWyr');
$('#opt-trivia').textContent = t('optTrivia');
$('#opt-journal').textContent = t('optJournal');
$('#opt-tot').textContent = t('optTot');
$('#genBtn').textContent = t('generate');
$('#copyBtn').textContent = t('copy');

const ICE = ["What's the best advice you've ever received?","If you could have dinner with anyone, who would it be?","What's your favorite way to spend a weekend?","What's the most spontaneous thing you've ever done?","What skill would you most like to learn?","What's your go-to comfort food?","What's the best gift you've ever received?","If you could live anywhere, where would it be?","What's your hidden talent?","What's the last movie that made you cry?","What's your earliest memory?","What's the strangest food you've ever tried?","If you could master one instrument, which would it be?","What's the best concert you've been to?","What's the most beautiful place you've visited?","What three items would you bring to a desert island?","What's your favorite season and why?","Who has had the biggest influence on your life?","What's something you've always wanted to try but haven't?","What's the best book you've read this year?","What's your dream vacation destination?","If you could time travel, when would you visit?","What's the most adventurous thing on your bucket list?","What's a hobby you wish you had time for?","What's your favorite way to relax after a long day?"];
const DEEP = ["What does success mean to you?","If you could change one thing about the world, what would it be?","What's a belief you used to hold that you've changed your mind about?","What do you want to be remembered for?","What's the most important lesson life has taught you?","What does happiness look like to you?","If you could relive one day of your life, which would it be?","What are you most grateful for right now?","What fear would you most like to overcome?","What's a risk you're glad you took?","What does a meaningful life look like to you?","What's something you're still trying to forgive yourself for?","What's the hardest truth you've had to accept?","What legacy do you want to leave behind?","When do you feel most alive?","What would you do if you knew you couldn't fail?","What's a value you'd never compromise on?","What does freedom mean to you?","What's something you've never told anyone?","What part of your past would you rewrite if you could?","Who do you love most in this world?","What does your ideal future look like?","What makes you feel truly understood?","What have you given up that you miss?","What's something you need to let go of?"];
const WYR = ["Would you rather have the ability to fly or be invisible?","Would you rather travel the past or the future?","Would you rather never use social media again or never watch TV again?","Would you rather always be 10 minutes late or 20 minutes early?","Would you rather have unlimited money or unlimited time?","Would you rather live without music or without movies?","Would you rather be able to talk to animals or speak every language?","Would you rather lose all your photos or all your music?","Would you rather always have to say what you think or never speak again?","Would you rather have a rewind button or a pause button for life?","Would you rather live in a big city or a quiet countryside?","Would you rather give up coffee or give up sugar?","Would you rather know how you die or when you die?","Would you rather have free WiFi wherever you go or free coffee wherever you go?","Would you rather be the funniest person in the room or the smartest?","Would you rather travel by plane or by train for the rest of your life?","Would you rather never feel cold or never feel hot?","Would you rather be able to read minds or see the future?","Would you rather give up your phone for a year or your favorite food for life?","Would you rather have one wish granted today or three wishes in 10 years?"];
const TRIVIA = ["What is the capital of Australia?","Which planet is known as the Red Planet?","Who painted the Mona Lisa?","What is the largest ocean on Earth?","What gas do plants absorb from the atmosphere?","In what year did World War II end?","What is the chemical symbol for gold?","Who wrote Romeo and Juliet?","What is the longest river in the world?","How many continents are there?","What is the smallest country in the world?","Who invented the telephone?","What is the currency of Japan?","What is the largest mammal on Earth?","Which element has the chemical symbol O?","What is the speed of light approximately?","Who was the first person to walk on the Moon?","What is the tallest mountain in the world?","What language has the most native speakers?","How many sides does a hexagon have?","What is the largest desert in the world?","Who composed the Four Seasons?","What is the rarest blood type?","In which country would you find the Great Pyramid of Giza?","What is the most spoken language in the world?"];
const JOURNAL = ["What were the three best moments of today?","What's something you're looking forward to?","What's a small win from this week?","What's draining your energy lately?","What's something you're proud of?","Write a letter to your past self.","What does your ideal day look like?","What are three things you're grateful for?","What's a habit you'd like to build?","What's a goal you're working toward?","What does self-care look like for you?","What's been on your mind lately?","What's a lesson you learned recently?","What would you tell your future self?","What brings you peace?","What's something you've been avoiding?","Describe a moment that made you smile today.","What's your favorite way to start the morning?","What boundaries do you need to set?","What do you need more of in your life?","What does your dream life look like in 5 years?","What's something you've forgiven yourself for?","What are you ready to let go of?","What does success look like to you right now?","What's the best advice you'd give a friend?"];
const TOT = ["Coffee or tea?","Beach vacation or mountain retreat?","Morning person or night owl?","Books or movies?","Sweet or savory?","Cats or dogs?","Summer or winter?","City or countryside?","Texting or calling?","Plane or road trip?","Android or iPhone?","Cook at home or eat out?","Sneakers or sandals?","Sunrise or sunset?","Comedy or drama?","Bike or skateboard?","Soda or juice?","Library or bookstore?","Solitude or social gatherings?","Streaming or cinema?","Rain or snow?","Tattoos or piercings?","Vintage or modern?","Mountains or ocean?","Pizza or burgers?"];

const ALL = [].concat(ICE, DEEP, WYR, TRIVIA, JOURNAL, TOT);
const CAT_MAP = { all: ALL, icebreaker: ICE, deep: DEEP, wyr: WYR, trivia: TRIVIA, journal: JOURNAL, thisorthat: TOT };

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generate() {
  const count = Math.max(1, Math.min(50, parseInt($('#count').value) || 1));
  const cat = $('#cat').value;
  const pool = CAT_MAP[cat] || ALL;
  const picks = shuffle(pool).slice(0, Math.min(count, pool.length));

  $('#questionList').innerHTML = picks.map((q, i) =>
    `<div class="gz-question" data-q="${q.replace(/"/g, '&quot;')}" title="Click to copy">
      <span class="num">${i + 1}.</span>
      <span class="text">${q}</span>
      <span class="copy-icon">📋</span>
    </div>`).join('');

  $('#stats').textContent = `${picks.length} ${t('statsQuestions')}`;

  document.querySelectorAll('.gz-question').forEach(el => {
    el.addEventListener('click', () => copyText(el.dataset.q));
  });
}

$('#genBtn').addEventListener('click', generate);
$('#copyBtn').addEventListener('click', () => {
  const txt = Array.from(document.querySelectorAll('.gz-question')).map(el => el.dataset.q).join('\n');
  if (txt) { copyText(txt); $('#copyBtn').textContent = t('copied'); setTimeout(() => $('#copyBtn').textContent = t('copy'), 1500); }
});
['count','cat'].forEach(id => $('#' + id).addEventListener('change', generate));

generate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💬', href:'/fun/quote-generator.html', name:'Quote Generator'},
    {icon:'🤔', href:'/fun/would-you-rather.html', name:'Would You Rather'},
    {icon:'🧠', href:'/fun/trivia-quiz.html', name:'Trivia Quiz'},
    {icon:'📖', href:'/text/random-sentence-generator.html', name:'Random Sentence'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
