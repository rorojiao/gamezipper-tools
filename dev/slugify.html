<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What does slugify mean?", "acceptedAnswer": {"@type": "Answer", "text": "To slugify means to convert a human-readable title or phrase into a URL-safe slug: lowercase letters, digits and a separator (usually a hyphen), with spaces, accents, punctuation and special characters removed or replaced."}}, {"@type": "Question", "name": "Why are URL slugs important for SEO?", "acceptedAnswer": {"@type": "Answer", "text": "Clean, descriptive slugs help search engines understand what a page is about and improve click-through rates in search results. A slug like /how-to-bake-bread is friendlier to both users and crawlers than /post?id=48291."}}, {"@type": "Question", "name": "How are accented characters handled?", "acceptedAnswer": {"@type": "Answer", "text": "This tool normalizes accented letters to their ASCII base — café becomes cafe, München becomes muenchen, über becomes uber. Toggle the strip-accents option off if you want to keep the original Unicode characters."}}, {"@type": "Question", "name": "Can I use a separator other than a hyphen?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Choose hyphen, underscore, dot or a custom string. Hyphens are recommended because Google treats them as word separators, while underscores are seen as part of a single word."}}]}</script>

  zh: {

    toolDesc: '将任意标题或短语转换为干净、SEO 友好的 URL slug。小写、连字符分隔、去除重音和特殊字符 — 完全可自定义。免费且私密。',
    lblIn: '输入要 slugify 的文本',
    lblOut: 'Slug 结果',
    copy: '复制',
    clear: '清空',
    example: '示例',
    optLower: '转小写',
    optAccent: '去除重音',
    optPunct: '去除标点',
    optTrimNum: '去除开头数字',
    optStop: '移除常见停用词',
    sep: '分隔符',
    sepHyphen: '连字符 (-)',
    sepUnderscore: '下划线 (_)',
    sepDot: '点 (.)',
    sepCustom: '自定义',
    empty: '—',
    step1: '输入或粘贴要 slugify 的标题、短语或句子',
    step2: '选择分隔符并切换小写、重音、停用词等选项',
    step3: 'Slug 会在你输入时实时更新',
    step4: '点击「复制」获取完成的 slug 用于你的 URL',
  }
});

const { $, copyText, t } = GZ;
const STOP_WORDS = new Set(['a','an','the','and','or','but','of','to','in','on','for','with','at','by','from','is','are','was','were','be','been','being','this','that','these','those']);
const opts = { lower: true, accent: true, punct: true, trimNum: false, stop: false, sep: '-' };

function stripAccents(s) {
  return s.normalize('NFKD').replace(/[\u0300-\u036f]/g, '');
}

function slugify() {
  let s = $('#input').value;
  if (!s.trim()) { $('#output').textContent = t('empty'); return; }
  if (opts.accent) s = stripAccents(s);
  if (opts.lower) s = s.toLowerCase();
  if (opts.stop) {
    s = s.split(/\s+/).filter(w => !STOP_WORDS.has(w.toLowerCase().replace(/[^a-z0-9]/g,''))).join(' ');
  }
  if (opts.punct) {
    // replace any run of non-alphanumeric with separator
    s = s.replace(/[^a-zA-Z0-9]+/g, opts.sep);
  } else {
    s = s.replace(/\s+/g, opts.sep);
  }
  if (opts.trimNum) s = s.replace(/^[\d]+(?:\\.|sep)?/, '').replace(new RegExp('^\\d+(?:' + escapeRe(opts.sep) + ')?'), '');
  // collapse repeated seps and trim
  const esc = escapeRe(opts.sep);
  s = s.replace(new RegExp(esc + '+', 'g'), opts.sep).replace(new RegExp('^' + esc + '+|' + esc + '+$', 'g'), '');
  $('#output').textContent = s || t('empty');
}

function escapeRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

$('#opts').innerHTML = `
  <label><input type="checkbox" id="o-lower" checked> ${t('optLower')}</label>
  <label><input type="checkbox" id="o-accent" checked> ${t('optAccent')}</label>
  <label><input type="checkbox" id="o-punct" checked> ${t('optPunct')}</label>
  <label><input type="checkbox" id="o-num"> ${t('optTrimNum')}</label>
  <label><input type="checkbox" id="o-stop"> ${t('optStop')}</label>
  <label>${t('sep')}
    <select class="sep-select" id="o-sep">
      <option value="-">${t('sepHyphen')}</option>
      <option value="_">${t('sepUnderscore')}</option>
      <option value=".">${t('sepDot')}</option>
    </select>
  </label>`;
['lower','accent','punct','num','stop'].forEach(k => {
  $('#o-' + k).addEventListener('change', e => { opts[k === 'lower'?'lower':k==='accent'?'accent':k==='punct'?'punct':k==='num'?'trimNum':'stop'] = e.target.checked; slugify(); });
});
$('#o-sep').addEventListener('change', e => { opts.sep = e.target.value; slugify(); });

$('#input').addEventListener('input', slugify);

function loadExample() {
  $('#input').value = "10 Reasons Why Café Coffee Is Awesome!!!";
  slugify();
}
function doClear() { $('#input').value=''; slugify(); }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

  ]
});
slugify();
</script>
