// Build lookup: sorted letters -> words
const lookup = {};
WORDS.forEach(w => {
  if (w.length < 2) return;
  const key = w.split('').sort().join('');
  if (!lookup[key]) lookup[key] = new Set();
  lookup[key].add(w);
});

function scramble(text) {
  return text.split(' ').map(word => {
    const chars = word.split('');
    for (let i = chars.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [chars[i], chars[j]] = [chars[j], chars[i]];
    }
    return chars.join('');
  }).join(' ');
}

function unscramble(letters) {
  const results = new Set();
  const chars = letters.toLowerCase().replace(/[^a-z]/g, '').split('').sort();
  // Try all subset lengths from 2 to full length
  for (let len = Math.min(chars.length, 7); len >= 2; len--) {
    // Generate combinations
    const combos = getCombinations(chars, len);
    combos.forEach(combo => {
      const key = combo.sort().join('');
      if (lookup[key]) lookup[key].forEach(w => results.add(w));
    });
  }
  // Sort by length desc, then alpha
  return [...results].sort((a, b) => b.length - a.length || a.localeCompare(b));
}

function getCombinations(arr, k) {
  const results = [];
  function combine(start, combo) {
    if (combo.length === k) { results.push([...combo]); return; }
    for (let i = start; i < arr.length; i++) {
      combo.push(arr[i]);
      combine(i + 1, combo);
      combo.pop();
    }
  }
  combine(0, []);
  return results;
}

function doScramble() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  let scrambled = scramble(inp);
  // Make sure it's actually different
  if (scrambled === inp) scrambled = scramble(inp);
  $('#output').innerHTML = `<div class="scramble-result">${scrambled}</div>`;
}

function doUnscramble() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  const results = unscramble(inp);
  if (results.length === 0) {
    $('#output').innerHTML = '<em>No words found</em>';
  } else {
    const grouped = {};
    results.forEach(w => { const l = w.length; if (!grouped[l]) grouped[l] = []; grouped[l].push(w); });
    let html = `<p><strong>${results.length} ${t('wordsFound')}</strong></p>`;
    Object.keys(grouped).sort((a,b) => b-a).forEach(len => {
      html += `<p style="margin:6px 0 2px;font-weight:600">${len}-letter:</p><div class="unscramble-list">`;
      grouped[len].forEach(w => { html += `<span>${w}</span>`; });
      html += '</div>';
    });
    $('#output').innerHTML = html;
  }
}
