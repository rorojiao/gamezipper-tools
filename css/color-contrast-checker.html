<style>
.cc-preview{border-radius:14px;padding:32px 20px;text-align:center;font-size:1.4em;font-weight:700;margin:14px 0;border:1px solid var(--border);transition:background .25s,color .25s}
.cc-preview small{display:block;font-size:.6em;font-weight:400;opacity:.85;margin-top:6px}
.cc-controls{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}
.cc-field{display:flex;flex-direction:column;gap:6px}
.cc-field label{font-size:.8em;color:var(--text2);display:flex;align-items:center;gap:8px}
.cc-field .swatch{width:18px;height:18px;border-radius:4px;border:1px solid var(--border);display:inline-block}
.cc-field input[type=color]{width:54px;height:38px;padding:0;border:1px solid var(--border);border-radius:8px;background:transparent;cursor:pointer}
.cc-field input[type=text]{flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--glass2);color:var(--text);font-family:monospace;font-size:.95em}
.cc-field-row{display:flex;gap:8px;align-items:center}
.cc-ratio{font-size:2.4em;font-weight:800;color:var(--accent);text-align:center;margin:6px 0;font-variant-numeric:tabular-nums}
.cc-grade{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:12px 0}
.cc-grade-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 8px;background:var(--glass);border:1px solid var(--border);border-radius:10px;text-align:center}
.cc-grade-item .lvl{font-size:.8em;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.cc-grade-item .verdict{font-weight:800;font-size:1.1em}
.cc-grade-item .verdict.pass{color:var(--gz-success,#00d672)}
.cc-grade-item .verdict.fail{color:var(--gz-accent,#e94560)}
.cc-grade-item .need{font-size:.7em;color:var(--text2)}
.cc-pairs{display:grid;gap:8px;margin-top:14px}
.cc-pair{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--glass);border:1px solid var(--border);border-radius:10px;cursor:pointer}
.cc-pair .lab{font-family:monospace;font-size:.85em}
.cc-pair .pill{padding:2px 8px;border-radius:10px;font-size:.72em;font-weight:700}
.cc-pair .pill.pass{background:rgba(0,214,114,.18);color:#00d672}
.cc-pair .pill.fail{background:rgba(233,69,96,.18);color:#e94560}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Color Contrast Checker","description":"Free WCAG 2.1 color contrast checker. Test foreground/background pairs and see contrast ratios with AA/AAA pass/fail for normal and large text.","url":"https://tools.gamezipper.com/css/color-contrast-checker.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What WCAG contrast ratios do I need to pass?","acceptedAnswer":{"@type":"Answer","text":"WCAG 2.1 Level AA requires a contrast ratio of at least 4.5:1 for normal text and 3:1 for large text (18pt or 14pt bold). Level AAA requires 7:1 for normal text and 4.5:1 for large text. Non-text UI components and graphical objects need at least 3:1."}},{"@type":"Question","name":"How is the contrast ratio calculated?","acceptedAnswer":{"@type":"Answer","text":"The relative luminance of each color is computed using the sRGB formula (linearizing each RGB channel then combining 0.2126 R + 0.7152 G + 0.0722 B). The ratio is (L1 + 0.05) / (L2 + 0.05), where L1 is the lighter and L2 the darker luminance. The result ranges from 1:1 (same color) to 21:1 (black on white)."}},{"@type":"Question","name":"Does this tool work with hex, RGB and named colors?","acceptedAnswer":{"@type":"Answer","text":"Yes. You can paste hex codes (e.g. #1a73e8), rgb()/rgba() values, or CSS named colors. The color picker also lets you sample colors directly. Results update instantly as you type."}},{"@type":"Question","name":"Are my colors stored or sent anywhere?","acceptedAnswer":{"@type":"Answer","text":"No. All calculations happen locally in your browser. Nothing is uploaded to any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="cc-preview" id="preview"><span id="prevBig"></span><small id="prevSmall"></small></div>

    <div class="cc-controls">
      <div class="cc-field">
        <label><span class="swatch" id="swFg"></span><span id="lblFg"></span></label>
        <div class="cc-field-row">
          <input type="color" id="fgColor" value="#1a73e8">
          <input type="text" id="fgText" value="#1a73e8" spellcheck="false">
        </div>
      </div>
      <div class="cc-field">
        <label><span class="swatch" id="swBg"></span><span id="lblBg"></span></label>
        <div class="cc-field-row">
          <input type="color" id="bgColor" value="#ffffff">
          <input type="text" id="bgText" value="#ffffff" spellcheck="false">
        </div>
      </div>
    </div>

    <div class="cc-ratio" id="ratio">4.5:1</div>

    <div class="cc-grade">
      <div class="cc-grade-item"><div class="lvl" id="lvl1"></div><div class="verdict" id="v1"></div><div class="need" id="n1"></div></div>
      <div class="cc-grade-item"><div class="lvl" id="lvl2"></div><div class="verdict" id="v2"></div><div class="need" id="n2"></div></div>
      <div class="cc-grade-item"><div class="lvl" id="lvl3"></div><div class="verdict" id="v3"></div><div class="need" id="n3"></div></div>
      <div class="cc-grade-item"><div class="lvl" id="lvl4"></div><div class="verdict" id="v4"></div><div class="need" id="n4"></div></div>
    </div>

    <h3 style="margin:18px 0 6px;font-size:.95em" id="suggTitle"></h3>
    <div class="cc-pairs" id="pairs"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Color Contrast Checker (WCAG 2.1)',
    toolDesc: 'Test foreground/background color pairs and see WCAG contrast ratios with AA/AAA pass/fail for normal and large text.',
    lblFg: 'Foreground (text)',
    lblBg: 'Background',
    prevBig: 'The quick brown fox jumps',
    prevSmall: 'Small text body sample at 14pt — readability preview',
    pass: 'PASS', fail: 'FAIL',
    lvl1: 'AA Normal', lvl2: 'AA Large',
    lvl3: 'AAA Normal', lvl4: 'AAA Large',
    suggTitle: 'Suggested accessible tweaks',
    needsRatio: 'need {x}',
    step1: 'Pick or paste a foreground (text) color',
    step2: 'Pick or paste a background color',
    step3: 'Read the contrast ratio and the four AA/AAA verdicts',
    step4: 'Click a suggested tweak below to copy an accessible pair',
  },
  zh: {
    toolTitle: '颜色对比度检查器 (WCAG 2.1)',
    toolDesc: '测试前景/背景色对，查看 WCAG 对比度及 AA/AAA 在普通文本和大字号下的通过情况。',
    lblFg: '前景色（文字）',
    lblBg: '背景色',
    prevBig: '敏捷的棕色狐狸跳过去了',
    prevSmall: '14pt 小号正文样本 — 可读性预览',
    pass: '通过', fail: '不通过',
    lvl1: 'AA 普通文本', lvl2: 'AA 大字号',
    lvl3: 'AAA 普通文本', lvl4: 'AAA 大字号',
    suggTitle: '可访问性建议调整',
    needsRatio: '需 {x}',
    step1: '选择或粘贴前景（文字）颜色',
    step2: '选择或粘贴背景颜色',
    step3: '查看对比度及四项 AA/AAA 评级',
    step4: '点击下方建议可应用一对符合可访问性的颜色',
  }
});

const { $, t } = GZ;
let fg='#1a73e8', bg='#ffffff';

function parseColor(s){
  s=(s||'').trim().toLowerCase();
  if(/^#?([0-9a-f]{3}|[0-9a-f]{6})$/.test(s)){
    let h=s.replace('#','');
    if(h.length===3) h=h.split('').map(c=>c+c).join('');
    return {r:parseInt(h.slice(0,2),16),g:parseInt(h.slice(2,4),16),b:parseInt(h.slice(4,6),16)};
  }
  const m=s.match(/rgba?\(([^)]+)\)/);
  if(m){const p=m[1].split(',').map(x=>parseFloat(x)); return {r:p[0],g:p[1],b:p[2]};}
  const d=document.createElement('div'); d.style.color=s; document.body.appendChild(d);
  const cs=getComputedStyle(d).color; document.body.removeChild(d);
  const mm=cs.match(/\d+/g); if(mm&&mm.length>=3) return {r:+mm[0],g:+mm[1],b:+mm[2]};
  return null;
}
function toHex(c){ return '#'+[c.r,c.g,c.b].map(x=>Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,'0')).join(''); }
function lum(c){
  const a=[c.r,c.g,c.b].map(v=>{v/=255; return v<=0.03928? v/12.92 : Math.pow((v+0.055)/1.055,2.4);});
  return 0.2126*a[0]+0.7152*a[1]+0.0722*a[2];
}
function contrast(a,b){const l1=lum(a),l2=lum(b);const hi=Math.max(l1,l2),lo=Math.min(l1,l2);return (hi+0.05)/(lo+0.05);}

function grade(ratio, threshold){
  const ok = ratio>=threshold;
  return {ok, txt: ok?t('pass'):t('fail'), cls: ok?'pass':'fail'};
}
function needsTxt(threshold, ratio){ if(ratio>=threshold) return ''; return ' · '+t('needsRatio').replace('{x}', threshold.toFixed(1)+':1'); }

function render(){
  const cFg=parseColor(fg), cBg=parseColor(bg);
  if(!cFg||!cBg){ $('#ratio').textContent='—'; return; }
  // Sync swatches
  const fgHex=toHex(cFg), bgHex=toHex(cBg);
  $('#swFg').style.background=fgHex; $('#swBg').style.background=bgHex;
  if($('--sync')===undefined){}
  $('#fgColor').value=fgHex.slice(0,7); $('#bgColor').value=bgHex.slice(0,7);
  $('#fgText').value=fg; $('#bgText').value=bg;
  // Preview
  $('#preview').style.background=bgHex; $('#preview').style.color=fgHex;
  const ratio=contrast(cFg,cBg);
  $('#ratio').textContent=ratio.toFixed(2)+':1';
  const aaN=grade(ratio,4.5), aaL=grade(ratio,3), aaaN=grade(ratio,7), aaaL=grade(ratio,4.5);
  $('#lvl1').textContent=t('lvl1'); $('#lvl2').textContent=t('lvl2'); $('#lvl3').textContent=t('lvl3'); $('#lvl4').textContent=t('lvl4');
  [['v1',aaN],['v2',aaL],['v3',aaaN],['v4',aaaL]].forEach(([id,g])=>{const el=$('#'+id);el.textContent=g.txt;el.className='verdict '+g.cls;});
  $('#n1').textContent=aaN.ok?'':t('needsRatio').replace('{x}','4.5:1');
  $('#n2').textContent=aaL.ok?'':t('needsRatio').replace('{x}','3:1');
  $('#n3').textContent=aaaN.ok?'':t('needsRatio').replace('{x}','7:1');
  $('#n4').textContent=aaaL.ok?'':t('needsRatio').replace('{x}','4.5:1');
  // Suggestions: darken/lighten to reach AA
  const sugg=[];
  function tweak(base, dir){
    let c={...base}, step=0.04, guard=0;
    while(contrast(cFg&&dir==='fg'?c:cFg, cBg&&dir==='bg'?c:cBg)<4.5 && guard<200){
      c.r=Math.max(0,Math.min(255,c.r+(dir==='bg'?1:-1)*step*255));
      c.g=Math.max(0,Math.min(255,c.g+(dir==='bg'?1:-1)*step*255));
      c.b=Math.max(0,Math.min(255,c.b+(dir==='bg'?1:-1)*step*255));
      guard++;
    }
    return guard<200? c : null;
  }
  const darkerBg=tweak(cBg,'bg'), lighterFg=tweak(cFg,'fg');
  if(darkerBg){const h=toHex(darkerBg); const r=contrast(cFg,darkerBg); sugg.push({fg:fgHex,bg:h,r});}
  if(lighterFg){const h=toHex(lighterFg); const r=contrast(lighterFg,cBg); sugg.push({fg:h,bg:bgHex,r});}
  $('#pairs').innerHTML = sugg.map(s=>`
    <div class="cc-pair" data-fg="${s.fg}" data-bg="${s.bg}">
      <span class="lab" style="display:flex;align-items:center;gap:8px">
        <span style="display:inline-block;width:18px;height:18px;border-radius:4px;border:1px solid var(--border);background:${s.fg}"></span>${s.fg}
        <span style="display:inline-block;width:18px;height:18px;border-radius:4px;border:1px solid var(--border);background:${s.bg}"></span>${s.bg}
      </span>
      <span class="pill ${s.r>=4.5?'pass':'fail'}">${s.r.toFixed(2)}:1</span>
    </div>`).join('');
  document.querySelectorAll('.cc-pair').forEach(p=>p.addEventListener('click',()=>{
    fg=p.dataset.fg; bg=p.dataset.bg; render();
  }));
}

function bind(){
  $('#fgColor').addEventListener('input',e=>{fg=e.target.value; render();});
  $('#bgColor').addEventListener('input',e=>{bg=e.target.value; render();});
  $('#fgText').addEventListener('input',e=>{fg=e.target.value; render();});
  $('#bgText').addEventListener('input',e=>{bg=e.target.value; render();});
}

$('#lblFg').textContent=t('lblFg'); $('#lblBg').textContent=t('lblBg');
$('#prevBig').textContent=t('prevBig'); $('#prevSmall').textContent=t('prevSmall');
$('#suggTitle').textContent=t('suggTitle');
bind();
render();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/css/color-picker.html', name:'Color Picker'},
    {icon:'🌈', href:'/css/gradient-generator.html', name:'Gradient Generator'},
    {icon:'📐', href:'/css/palette.html', name:'Color Palette'},
    {icon:' HEX', href:'/color/hex-to-rgb.html', name:'Hex to RGB'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
