<script>
GZI18n.register({
  en: {
    toolTitle: 'Fishbone Diagram Generator (Ishikawa)',
    toolDesc: 'Build a free Fishbone (cause-and-effect) diagram. Define the problem, brainstorm causes across the 6 Ms, and download a clean PNG.',
    effectPh: 'What is the problem / effect? (the fish head)',
    legend: 'List one cause per line under each category. Leave a category blank to skip it.',
    downloadPNG: 'Download PNG', print: 'Print / PDF', clear: 'Clear', example: 'Example',
    manpower: 'Manpower (People)', method: 'Method (Process)', machine: 'Machine (Equipment)',
    material: 'Material', measurement: 'Measurement', environment: 'Environment (Milieu)',
    manHint: 'Skills, training, fatigue, staffing', methHint: 'Procedures, workflow, policies', macHint: 'Tools, maintenance, software',
    matHint: 'Suppliers, specs, quality of inputs', measHint: 'Sensors, metrics, inspection', envHint: 'Temperature, lighting, workspace',
    step1: 'Type the problem or effect you want to solve in the top box',
    step2: 'Brainstorm possible causes and list them under each of the 6 M categories',
    step3: 'Leave a category blank to hide that branch from the diagram',
    step4: 'Click Download PNG to save your fishbone diagram',
  },
  zh: {
    toolTitle: '鱼骨图生成器（石川图 / 因果图）',
    toolDesc: '免费制作鱼骨图（因果分析图）。定义问题，按 6M 分类头脑风暴原因，并下载干净的 PNG 图片。',
    effectPh: '问题 / 结果是什么？（鱼头）',
    legend: '每个类别下列出原因，每行一条。留空的类别会自动隐藏。',
    downloadPNG: '下载 PNG', print: '打印 / PDF', clear: '清空', example: '示例',
    manpower: '人（人员）', method: '法（流程）', machine: '机（设备）',
    material: '料（物料）', measurement: '测（测量）', environment: '环（环境）',
    manHint: '技能、培训、疲劳、人手', methHint: '流程、规章、标准', macHint: '工具、维护、软件',
    matHint: '供应商、规格、来料质量', measHint: '传感器、指标、检验', envHint: '温湿度、照明、场地',
    step1: '在顶部输入框填写你要解决的问题或结果',
    step2: '头脑风暴可能的原因，按 6M 分类分别列出',
    step3: '留空的类别将在图中自动隐藏',
    step4: '点击「下载 PNG」保存你的鱼骨图',
  }
});

const { $, t } = GZ;
const CATS = [
  {id:'manpower', icon:'👥', nameKey:'manpower', hintKey:'manHint', color:'#1565c0'},
  {id:'method',   icon:'📐', nameKey:'method',   hintKey:'methHint', color:'#2e7d32'},
  {id:'machine',  icon:'⚙️', nameKey:'machine',  hintKey:'macHint',  color:'#6a1b9a'},
  {id:'material', icon:'📦', nameKey:'material', hintKey:'matHint',  color:'#ef6c00'},
  {id:'measurement', icon:'📏', nameKey:'measurement', hintKey:'measHint', color:'#00838f'},
  {id:'environment', icon:'🌡️', nameKey:'environment', hintKey:'envHint', color:'#c62828'},
];

function buildCats() {
  $('#cats').innerHTML = CATS.map(c => `
    <div class="fb-cat" style="border-color:${c.color}55">
      <h4 style="color:${c.color}"><span>${c.icon}</span>${t(c.nameKey)}</h4>
      <textarea id="fb-${c.id}" placeholder="${t(c.hintKey)}"></textarea>
    </div>`).join('');
}
function lines(id){return $('#'+id).value.split('\n').map(s=>s.trim()).filter(Boolean);}
function clearAll(){CATS.forEach(c=>$('#fb-'+c.id).value='');$('#effect-input').value='';}
function loadExample(){
  $('#effect-input').value='High customer complaint rate';
  const ex={
    manpower:['Undertrained support staff','High agent turnover','Low morale'],
    method:['No standard reply templates','Slow escalation process','No QA review'],
    machine:['Outdated ticketing system','Frequent CRM outages'],
    material:['Incomplete knowledge base','Poor product documentation'],
    measurement:['No CSAT tracking','Wrong KPIs rewarded'],
    environment:['Noisy open office','High call volume spikes'],
  };
  CATS.forEach(c=>{if(ex[c.id])$('#fb-'+c.id).value=ex[c.id].join('\n');});
}

function downloadPNG(){
  const effect=$('#effect-input').value.trim()||t('effectPh');
  const W=1800,H=1100;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#1a1a2e'; ctx.font='bold 38px Arial'; ctx.textAlign='center';
  ctx.fillText('Fishbone Diagram', W/2, 56);
  ctx.font='16px Arial'; ctx.fillStyle='#888';
  ctx.fillText('Cause & Effect (Ishikawa) · tools.gamezipper.com', W/2, 82);
  // active branches
  const active=CATS.filter(c=>lines('fb-'+c.id).length);
  const branches=active.length?active:CATS;
  const spineY=H/2+30;
  const headX=W-260, tailX=80;
  // spine
  ctx.strokeStyle='#1a1a2e'; ctx.lineWidth=6; ctx.beginPath();
  ctx.moveTo(tailX,spineY); ctx.lineTo(headX,spineY); ctx.stroke();
  // arrow head
  ctx.fillStyle='#1a1a2e';
  ctx.beginPath(); ctx.moveTo(headX+18,spineY); ctx.lineTo(headX-10,spineY-16); ctx.lineTo(headX-10,spineY+16); ctx.closePath(); ctx.fill();
  // effect box
  ctx.fillStyle='#1a1a2e'; roundRect(ctx,headX+24,spineY-70,210,140,14,true);
  ctx.fillStyle='#fff'; ctx.font='bold 18px Arial'; ctx.textAlign='center';
  wrap(ctx,effect,180).forEach((ln,i)=>ctx.fillText(ln,headX+24+105,spineY+i*24-12+ (wrap(ctx,effect,180).length?0:0)));
  // branches — top half slants up-right, bottom half slants down-right
  const top=branches.slice(0,Math.ceil(branches.length/2));
  const bot=branches.slice(Math.ceil(branches.length/2));
  const span=headX-40-tailX-60;
  const drawBranches=(list,up)=>{
    const n=list.length; if(!n) return;
    const step=span/n;
    list.forEach((c,i)=>{
      const sx=tailX+60+step*i+step/2;   // spine attach point
      const len=260, ang=up?2.4:0.74;     // radians (~137° up / ~42° down)
      const ex=sx+Math.cos(ang)*len, ey=spineY+Math.sin(ang)*len;
      ctx.strokeStyle=c.color; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(sx,spineY); ctx.lineTo(ex,ey); ctx.stroke();
      // category label at branch tip
      ctx.fillStyle=c.color; ctx.font='bold 20px Arial'; ctx.textAlign='center';
      ctx.fillText(c.icon+' '+t(c.nameKey), ex+(up?-24:24), ey+(up?-10:22));
      // causes as small twigs along the branch
      const causes=lines('fb-'+c.id);
      causes.forEach((cause,ci)=>{
        const frac=(ci+1)/(causes.length+1);
        const tx=sx+(ex-sx)*frac, ty=spineY+(ey-spineY)*frac;
        const ty2=ty+(up?-56:56);
        ctx.strokeStyle=c.color+'aa'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(tx,ty2); ctx.stroke();
        ctx.fillStyle='#333'; ctx.font='15px Arial'; ctx.textAlign=up?'right':'left';
        ctx.fillText(cause, tx+(up?-8:8), ty2+(up?-4:14));
      });
    });
  };
  drawBranches(top,true);
  drawBranches(bot,false);
  const link=document.createElement('a'); link.download='fishbone-diagram.png'; link.href=cv.toDataURL('image/png'); link.click();
}
function roundRect(ctx,x,y,w,h,r,fill){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();if(fill)ctx.fill();}
function wrap(ctx,text,maxW){text=String(text);const words=text.split(' ');const lines=[];let cur='';words.forEach(w=>{const test=cur?cur+' '+w:w;if(ctx.measureText(test).width>maxW&&cur){lines.push(cur);cur=w;}else cur=test;});if(cur)lines.push(cur);return lines.length?lines:[text];}

$('#effect-input').placeholder=t('effectPh');
$('#legend').textContent='ℹ️ '+t('legend');
buildCats();
$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="downloadPNG()">🖼️ ${t('downloadPNG')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="window.print()">🖨️ ${t('print')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎯', href:'/fun/swot-analysis.html', name:'SWOT Analysis'},
    {icon:'⏰', href:'/fun/eisenhower-matrix.html', name:'Eisenhower Matrix'},
    {icon:'⚖️', href:'/fun/decision-matrix.html', name:'Decision Matrix'},
    {icon:'🗂️', href:'/fun/kanban-board.html', name:'Kanban Board'},
  ]
});
</script>
