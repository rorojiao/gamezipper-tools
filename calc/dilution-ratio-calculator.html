<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a dilution ratio?", "acceptedAnswer": {"@type": "Answer", "text": "A dilution ratio like 1:10 means 1 part concentrate mixed with 10 parts of water (or other diluent). The total volume is 11 parts. This tool converts any ratio plus a target final volume into the exact amounts of concentrate and water you need to measure."}}, {"@type": "Question", "name": "How is dilution percentage different from a ratio?", "acceptedAnswer": {"@type": "Answer", "text": "A 1:10 ratio equals about 9.09% concentrate by volume. A 1+1 (50%) dilution equals a 1:1 ratio. The tool shows the resulting percentage so you can switch between ratio, percentage and parts per million."}}, {"@type": "Question", "name": "Which units are supported?", "acceptedAnswer": {"@type": "Answer", "text": "Milliliters, liters, fluid ounces, cups, pints, quarts, gallons and drops. The calculator converts everything to your chosen target unit."}}, {"@type": "Question", "name": "Is my recipe data sent anywhere?", "acceptedAnswer": {"@type": "Answer", "text": "No. All math runs in your browser using JavaScript. Nothing is uploaded to any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-form" id="form">
      <div class="row2">
        <div>
          <label id="lbl-ratio"></label>
          <input type="text" id="ratio" value="1:10" placeholder="1:10">
        </div>
        <div>
          <label id="lbl-target"></label>
          <input type="number" id="target" value="500" min="0" step="1">
        </div>
      </div>
      <div>
        <label id="lbl-unit"></label>
        <select id="unit">
          <option value="ml">Milliliters (mL)</option>
          <option value="L">Liters (L)</option>
          <option value="drop">Drops</option>
          <option value="tsp">Teaspoons</option>
          <option value="tbsp">Tablespoons</option>
          <option value="floz">Fluid ounces (fl oz)</option>
          <option value="cup">Cups</option>
          <option value="pint">Pints</option>
          <option value="quart">Quarts</option>
          <option value="gallon">Gallons</option>
        </select>
      </div>
      <div>
        <label id="lbl-presets"></label>
        <div class="presets" id="presets"></div>
      </div>
      <button class="gz-btn" onclick="calculate()" id="btn-calc"></button>
    </div>
    <div class="result-card" id="result" style="display:none">
      <div class="big" id="result-summary"></div>
      <div class="label" id="result-label"></div>
      <div class="result-grid">
        <div class="result-item"><div class="val" id="result-conc"></div><div class="lbl" id="result-conc-label"></div></div>
        <div class="result-item"><div class="val" id="result-water"></div><div class="lbl" id="result-water-label"></div></div>
        <div class="result-item"><div class="val" id="result-pct"></div><div class="lbl" id="result-pct-label"></div></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Dilution Ratio Calculator',
    toolDesc: 'Calculate dilution ratios for cleaning chemicals, essential oils, e-juice, fertilizer, lab solutions and more. Enter a ratio and target volume — get exact concentrate and water amounts.',
    lblRatio: 'Dilution Ratio (concentrate:water)',
    lblTarget: 'Target Total Volume',
    lblUnit: 'Volume Unit',
    lblPresets: 'Common Presets',
    btnCalc: 'Calculate Mix',
    resultLabel: 'Mix Recipe',
    concentrate: 'Concentrate',
    water: 'Water / Diluent',
    percentage: 'Concentrate %',
    step1: 'Enter the dilution ratio, e.g. 1:10 (1 part concentrate to 10 parts water)',
    step2: 'Set the target final volume you want to prepare',
    step3: 'Pick the unit — mL, L, drops, oz, cups or gallons',
    step4: 'Click Calculate to get exact concentrate and water amounts',
  },
  zh: {
    toolTitle: '稀释比例计算器',
    toolDesc: '为清洁剂、精油、烟油、肥料、实验室溶液等计算稀释比例。输入比例和目标体积 — 即时获得浓缩液和水的精确用量。',
    lblRatio: '稀释比例（浓缩液:水）',
    lblTarget: '目标总体积',
    lblUnit: '体积单位',
    lblPresets: '常用预设',
    btnCalc: '计算配比',
    resultLabel: '调配方案',
    concentrate: '浓缩液',
    water: '水 / 稀释剂',
    percentage: '浓缩液占比',
    step1: '输入稀释比例，例如 1:10（1 份浓缩液加 10 份水）',
    step2: '设置你要调配的目标总体积',
    step3: '选择单位 — 毫升、升、滴、盎司、杯或加仑',
    step4: '点击「计算配比」获取精确的浓缩液和水的用量',
  }
});

const { $, t } = GZ;

const PRESETS = ['1:1','1:3','1:4','1:5','1:10','1:16','1:20','1:32','1:50','1:64','1:100','1:128','1:256','1:500','1:1000'];
const UNIT_TO_ML = { ml:1, L:1000, drop:0.05, tsp:4.9289, tbsp:14.787, floz:29.5735, cup:236.588, pint:473.176, quart:946.353, gallon:3785.41 };

function buildPresets(){
  $('#presets').innerHTML = PRESETS.map(p=>`<button class="preset" onclick="document.getElementById('ratio').value='${p}';calculate()">${p}</button>`).join('');
}

function parseRatio(str){
  const m = String(str).trim().match(/^(\d+(?:\.\d+)?)\s*[:/+]\s*(\d+(?:\.\d+)?)$/);
  if(!m) return null;
  return [parseFloat(m[1]), parseFloat(m[2])];
}

function fmt(volMl, unit){
  const v = volMl / UNIT_TO_ML[unit];
  if(v>=100) return v.toFixed(0);
  if(v>=10) return v.toFixed(1);
  if(v>=1) return v.toFixed(2);
  return v.toFixed(3);
}

function calculate(){
  const ratio = parseRatio($('#ratio').value);
  const target = parseFloat($('#target').value)||0;
  const unit = $('#unit').value;
  if(!ratio){
    $('#result').style.display='';
    $('#result-summary').textContent='—';
    $('#result-label').textContent = 'Invalid ratio format. Use 1:10 or 1/10';
    return;
  }
  const [c,w] = ratio;
  const total = c+w;
  const targetMl = target * UNIT_TO_ML[unit];
  const concMl = targetMl * c / total;
  const waterMl = targetMl * w / total;
  const pct = c/total*100;

  $('#result').style.display='';
  $('#result-summary').textContent = `${fmt(concMl,unit)} + ${fmt(waterMl,unit)} ${unit}`;
  $('#result-label').textContent = t('resultLabel')+' · '+$('#ratio').value;
  $('#result-conc').textContent = fmt(concMl,unit)+' '+unit;
  $('#result-conc-label').textContent = t('concentrate');
  $('#result-water').textContent = fmt(waterMl,unit)+' '+unit;
  $('#result-water-label').textContent = t('water');
  $('#result-pct').textContent = pct>=1?pct.toFixed(1)+'%':pct.toFixed(2)+'%';
  $('#result-pct-label').textContent = t('percentage');
}

document.getElementById('btn-calc').textContent=t('btnCalc');
buildPresets();
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/calc/percentage-calculator.html', name:'Percentage Calc'},
    {icon:'📏', href:'/convert/unit.html', name:'Unit Converter'},
    {icon:'🍽️', href:'/calc/recipe-scaler.html', name:'Recipe Scaler'},
    {icon:'☕', href:'/calc/coffee-to-water.html', name:'Coffee Ratio'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
