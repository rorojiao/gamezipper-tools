const { $, copyText, t } = GZ;

function doGenerate() {
  const title = $('#page-title').value.trim();
  const keywords = $('#keywords').value.trim().split(',').map(k => k.trim()).filter(Boolean);
  const desc = $('#desc-input').value.trim();
  const tone = $('#tone').value;
  const lang = GZI18n.getLang && GZI18n.getLang() || 'en';

  if (!title && !desc && !keywords.length) {
    $('#output').value = '';
    updatePreview();
    return;
  }

  const keyword1 = keywords[0] || '';
  const keyword2 = keywords[1] || '';
  const kwStr = keywords.join(', ') || '';
  const shortDesc = desc.length > 60 ? desc.substring(0, 57) + '...' : (desc || title || '');

  const templateKey = tone + 'Templates';
  const templates = t(templateKey);
  if (!templates || !templates.length) { updatePreview(); return; }

  // Pick a template that produces the best length
  let best = '';
  let bestScore = -1;
  for (const tmpl of templates) {
    let result = tmpl
      .replace('{title}', title || 'Page')
      .replace('{desc}', shortDesc)
      .replace('{keywords}', kwStr)
      .replace('{keyword1}', keyword1)
      .replace('{keyword2}', keyword2);

    // Trim to ~158 chars at sentence boundary
    if (result.length > 160) {
      const cut = result.lastIndexOf('.', 158);
      if (cut > 80) result = result.substring(0, cut + 1);
      else result = result.substring(0, 157) + '...';
    }

    // Score: prefer 150-160 chars
    let score = 0;
    if (result.length >= 150 && result.length <= 160) score = 10;
    else if (result.length >= 120 && result.length <= 170) score = 5;
    else score = Math.max(0, 3 - Math.abs(result.length - 155) / 20);
    // Bonus for including keywords
    if (keyword1 && result.toLowerCase().includes(keyword1.toLowerCase())) score += 2;

    if (score > bestScore) { bestScore = score; best = result; }
  }

  $('#output').value = best;
  updatePreview();
}

function updatePreview() {
  const desc = $('#output').value;
  const title = $('#page-title').value.trim() || 'Page Title';
  const url = $('#page-url').value.trim() || 'https://example.com/page';

  // Char count
  const len = desc.length;
  let cls = 'bad', msg = t('tooShort');
  if (len >= 150 && len <= 160) { cls = 'good'; msg = t('good'); }
  else if (len > 160) { cls = 'warn'; msg = t('tooLong'); }
  else if (len >= 120) { cls = 'good'; msg = t('good'); }
  $('#char-count').className = 'char-count ' + cls;
  $('#char-count').textContent = `${len} ${t('chars')} — ${msg}`;

  // HTML output
  const escaped = desc.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  $('#output-html').textContent = `<meta name="description" content="${desc}">`;

  // SERP preview
  $('#serp-page-title').textContent = title;
  $('#serp-url').textContent = url;
  $('#serp-desc').textContent = desc;
}
