const { $, t } = GZ;
let lang = GZI18n.getLang();
const STATE_KEY = 'gz-emp-data-v1';
let state = {
  effDate: new Date().toISOString().slice(0,10),
  empName: '', empAddr: '',
  eeName: '', eeAddr: '',
  jobTitle: '', dept: '', reportsTo: '', workLoc: '',
  empType: 'ft', startDate: new Date().toISOString().slice(0,10), probation: 3, hoursWeek: 40,
  salary: '', payFreq: 'annual', benefits: '', duties: '',
  jurisdiction: '', noticeWeeks: 4,
};

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function nl2br(s){return esc(s).replace(/\n/g,'<br>');}
function loadState(){ try{const r=localStorage.getItem(STATE_KEY); if(r) state=Object.assign(state, JSON.parse(r));}catch(e){} }
function saveState(){ try{localStorage.setItem(STATE_KEY, JSON.stringify(state));}catch(e){} }
function bind(name){ return e => { state[name]=e.target.value; saveState(); renderPreview(); }; }

        <div><label>${t('startDate')}</label><input type="date" data-bind="startDate" value="${esc(state.startDate)}"></div>
      </div>
    </div>
    <div class="leg-section">
      <h3>${t('paySec')}</h3>
      <div class="leg-grid">
        <div><label>${t('salary')}</label><input data-bind="salary" value="${esc(state.salary)}" placeholder="$120,000"></div>
        <div><label>${t('payFreq')}</label>
          <select data-bind="payFreq">
            <option value="annual" ${state.payFreq==='annual'?'selected':''}>${t('annual')}</option>
            <option value="monthly" ${state.payFreq==='monthly'?'selected':''}>${t('monthly')}</option>
            <option value="biweekly" ${state.payFreq==='biweekly'?'selected':''}>${t('biweekly')}</option>
          </select>
        </div>
        <div><label>${t('hoursWeek')}</label><input type="number" min="1" data-bind="hoursWeek" value="${state.hoursWeek}"></div>

    </div>`;

    <p><b>${esc(state.eeName)||'________________'}</b>${state.eeAddr?`<br>${nl2br(state.eeAddr)}`:''} <span style="color:#666">${t('employeeLab')}</span></p>
    <h2>${t('roleHead')}</h2>
    <p>${t('roleTxt')} <b>${esc(state.jobTitle)||(lang==='zh'?'[职位]':'[job title]')}</b> ${t('roleTxt2')} <b>${esc(state.dept)||(lang==='zh'?'[部门]':'[department]')}</b>。${state.reportsTo?`${t('roleTxt3')} <b>${esc(state.reportsTo)}</b>。`:''} ${t('roleTxt4')} <b>${esc(state.workLoc)||(lang==='zh'?'[工作地点]':'[work location]')}</b>。</p>
    <h2>${t('termHead')}</h2>
    <p>${t('termTxt')} ${state.empType==='contract'?t('termFixed'):t('termOngoing')}，${t('termTxt2')} <b>${esc(state.startDate)||'__________'}</b> ${lang==='zh'?'起。':'.'}</p>
    ${state.probation>0?`<p>${t('probationTxt')} <b>${esc(state.probation)}</b> ${t('probationTxt2')}</p>`:''}
    <h2>${t('payHead')}</h2>
    <p>${t('payTxt')} <b>${esc(state.salary)||'$________'}</b>，${t('payFreq')} <b>${freqMap[state.payFreq]}</b> ${t('payTxt2')}</p>

    <h2>${t('sigHead')}</h2>
    <div class="leg-sig">
      <div><div style="font-weight:700">${t('employerH')}: ${esc(state.empName)||''}</div><div class="line">${t('signature')}<br>${t('date')}: ____________</div></div>
      <div><div style="font-weight:700">${t('employeeH')}: ${esc(state.eeName)||''}</div><div class="line">${t('signature')}<br>${t('date')}: ____________</div></div>
    </div>`;
}

function downloadPDF(){
  const css='body{font-family:Georgia,"Times New Roman",serif;color:#222;padding:40px 48px;font-size:12.5px;line-height:1.7}h1{text-align:center;font-size:22px;margin:0 0 4px;text-transform:uppercase;letter-spacing:1px}h2{font-size:14px;margin:16px 0 6px}.leg-sub{text-align:center;color:#555;font-size:11px;margin-bottom:18px}p{margin:0 0 9px;text-align:justify}.leg-sig{margin-top:30px;display:grid;grid-template-columns:1fr 1fr;gap:24px}.leg-sig .line{border-top:1px solid #333;margin-top:36px;padding-top:4px;font-size:11px;color:#555}';
  const w=window.open('','_blank','width=860,height=1100');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Employment Agreement</title><style>${css}</style></head><body>${$('#preview').innerHTML}</body></html>\n`);
  w.document.close();
  setTimeout(()=>{try{w.focus();w.print();}catch(e){}},300);
}
