<script>
GZI18n.register({
  en: {
    toolTitle: 'Excel to JSON Converter',
    toolDesc: 'Convert Excel spreadsheets (.xlsx, .xls) to clean JSON — headers as keys or row arrays. Multiple sheets supported. 100% browser-based, no upload, no signup.',
    chooseFile: 'Choose .xlsx / .xls file or drag it here',
    info: 'Supports .xlsx, .xls, .csv • Parsed locally with SheetJS',
    copy: 'Copy JSON',
    download: '⬇ Download .json',
    clear: 'Clear',
    output: 'JSON Output',
    sheet: 'Sheet:',
    format: 'Format:',
    noFile: 'Please choose a spreadsheet file.',
    error: 'Error: ',
    success: '✓ Converted!',
    rows: 'rows',
    step1: 'Click the drop zone or drag your Excel file onto it',
    step2: 'Choose the sheet and output format (header keys or row array)',
    step3: 'The JSON output updates instantly in the panel',
    step4: 'Click Copy to copy JSON or Download to save as .json',
  },
  zh: {
    toolTitle: 'Excel 转 JSON 转换器',
    toolDesc: '将 Excel 电子表格 (.xlsx, .xls) 转换为干净的 JSON — 表头作为键或行数组。支持多工作表。100% 浏览器本地处理，无需上传、无需注册。',
    chooseFile: '选择 .xlsx / .xls 文件或拖拽到此处',
    info: '支持 .xlsx、.xls、.csv • 使用 SheetJS 本地解析',
    copy: '复制 JSON',
    download: '⬇ 下载 .json',
    clear: '清空',
    output: 'JSON 输出',
    sheet: '工作表：',
    format: '格式：',
    noFile: '请选择一个电子表格文件。',
    error: '错误：',
    success: '✓ 转换成功！',
    rows: '行',
    step1: '点击上传区域或将 Excel 文件拖拽到此处',
    step2: '选择工作表和输出格式（表头键或行数组）',
    step3: 'JSON 输出会即时显示在面板中',
    step4: '点击「复制」复制 JSON 或「下载」保存为 .json 文件',
  }
});

const { $, copyText, t } = GZ;
let workbook = null;

$('#dropLabel').textContent = t('chooseFile');
$('#dropInfo').textContent = t('info');
$('#sheetLabel').textContent = t('sheet');
$('#formatLabel').textContent = t('format');
$('#lbl-out').textContent = t('output');

const drop = $('#drop');
drop.addEventListener('click', () => $('#file').click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('dragover'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
$('#file').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

async function handleFile(f) {
  if (!f) return;
  try {
    const buf = await f.arrayBuffer();
    workbook = XLSX.read(buf, { type: 'array' });
    const sel = $('#sheetSel');
    sel.innerHTML = '';
    workbook.SheetNames.forEach(n => { const o = document.createElement('option'); o.value = o.textContent = n; sel.appendChild(o); });
    $('#sheetWrap').style.display = workbook.SheetNames.length > 0 ? 'flex' : 'none';
    drop.querySelector('.icon').textContent = '📊';
    $('#dropLabel').textContent = f.name;
    $('#dropInfo').textContent = (f.size / 1024).toFixed(1) + ' KB';
    doConvert();
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('success')}</span>`;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--accent)">${t('error')}${e.message}</span>`;
  }
}

function doConvert() {
  if (!workbook) return;
  const sheetName = $('#sheetSel').value;
  const sheet = workbook.Sheets[sheetName];
  const format = $('#formatSel').value;
  let json;
  if (format === 'header') {
    json = XLSX.utils.sheet_to_json(sheet, { defval: null });
  } else {
    json = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null });
  }
  const str = JSON.stringify(json, null, 2);
  $('#output').textContent = str;
  const rows = Array.isArray(json) ? json.length : 0;
  $('#stats').textContent = `${rows} ${t('rows')} • ${format === 'header' ? 'Header Keys' : 'Row Array'}`;
}

$('#sheetSel').addEventListener('change', doConvert);
$('#formatSel').addEventListener('change', doConvert);

function doDownload() {
  const str = $('#output').textContent;
  if (!str) return;
  const blob = new Blob([str], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'converted.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function doClear() { workbook = null; $('#output').textContent = ''; $('#sheetWrap').style.display = 'none'; $('#stats').textContent = ''; $('#status').innerHTML = ''; $('#dropLabel').textContent = t('chooseFile'); $('#dropInfo').textContent = t('info'); }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDownload()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/convert/csv-to-excel.html', name:'CSV to Excel'},
    {icon:'🔧', href:'/convert/csv-to-json.html', name:'CSV to JSON'},
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'📈', href:'/convert/xlsx-viewer.html', name:'XLSX Viewer'},
  ]
});
</script>
