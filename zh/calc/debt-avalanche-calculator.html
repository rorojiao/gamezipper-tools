<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the debt avalanche method?", "acceptedAnswer": {"@type": "Answer", "text": "The debt avalanche method is a debt payoff strategy where you make minimum payments on all debts and put any extra money toward the debt with the highest interest rate. This mathematically saves you the most money on interest compared to other strategies."}}, {"@type": "Question", "name": "How does the debt avalanche compare to the debt snowball method?", "acceptedAnswer": {"@type": "Answer", "text": "The avalanche targets highest-interest debts first (saves the most money), while the snowball targets smallest-balance debts first (provides psychological motivation from quick wins). The avalanche is mathematically optimal; the snowball is behaviorally easier for some people."}}, {"@type": "Question", "name": "How is monthly interest calculated?", "acceptedAnswer": {"@type": "Answer", "text": "Monthly interest = current balance × (annual interest rate / 12). For example, a $5,000 balance at 18% APR accrues $75 in interest for that month ($5,000 × 0.18 / 12)."}}, {"@type": "Question", "name": "Is my financial data safe?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. All calculations run entirely in your browser. No data is sent to any server — you can even use this tool offline once the page is loaded."}}]}</script>

<body>
<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Debt Avalanche Calculator',
    toolDesc: 'Pay off debt faster and save on interest by targeting your highest-rate balances first. Enter your debts and extra payment to see your payoff timeline.',
    name: 'Debt Name', bal: 'Balance ($)', rate: 'APR (%)', min: 'Min Payment ($)',
    extraPay: 'Extra monthly payment ($):',
    calculate: 'Calculate',
    monthsToFree: 'Months to debt-free', totalInterest: 'Total interest paid', totalPaid: 'Total amount paid',
    schedule: 'Payoff Schedule',
    month: 'Month', debtsLeft: 'Debts Left', interestThisMonth: 'Interest', payment: 'Payment', payoffDebt: 'Paid Off',
    addExample: 'Load Example', clearAll: 'Clear All',
    step1: 'Add each debt with its balance, APR, and minimum payment',
    step2: 'Set how much extra you can pay each month beyond minimums',
    step3: 'Click Calculate to see your avalanche payoff plan',
    step4: 'Review the month-by-month schedule showing when each debt is eliminated',
    noData: 'Add at least one debt to calculate.',
  },
  zh: {
    toolTitle: '债务雪崩还款计算器',
    toolDesc: '通过优先偿还利率最高的债务来更快还清欠款并节省利息。输入你的债务和额外还款额，查看还清时间表。',
    name: '债务名称', bal: '余额 ($)', rate: '年利率 (%)', min: '最低还款 ($)',
    extraPay: '每月额外还款 ($):',
    calculate: '计算',
    monthsToFree: '还清所需月数', totalInterest: '总利息支出', totalPaid: '总还款金额',
    schedule: '还款计划',
    month: '月份', debtsLeft: '剩余债务', interestThisMonth: '利息', payment: '还款', payoffDebt: '已还清',
    addExample: '加载示例', clearAll: '清空',
    step1: '添加每笔债务的余额、年利率和最低还款额',
    step2: '设置每月可额外还款的金额（超过最低还款的部分）',
    step3: '点击「计算」查看雪崩还款计划',
    step4: '查看逐月还款计划，了解每笔债务何时还清',
    noData: '请至少添加一笔债务再计算。',
  }
});
const { $, t } = GZ;
let debts = [];

function addDebt(name, bal, rate, min) {
  name = name || $('#d-name').value.trim() || ('Debt ' + (debts.length + 1));
  bal = bal !== undefined ? bal : parseFloat($('#d-bal').value);
  rate = rate !== undefined ? rate : parseFloat($('#d-rate').value);
  min = min !== undefined ? min : parseFloat($('#d-min').value);
  if (!bal || bal <= 0) return;
  rate = rate || 0; min = min || 0;
  debts.push({ name, balance: bal, rate, minPay: min });
  $('#d-name').value = ''; $('#d-bal').value = ''; $('#d-rate').value = ''; $('#d-min').value = '';
  renderDebts();
}

function removeDebt(i) { debts.splice(i, 1); renderDebts(); }

function renderDebts() {
  const list = $('#debt-list');
  if (debts.length === 0) { list.innerHTML = ''; return; }
  list.innerHTML = debts.map((d, i) =>
    `<div class="debt-row"><span>${d.name}</span><span>$${d.balance.toFixed(2)}</span><span>${d.rate}%</span><span>$${d.minPay.toFixed(2)}</span><button class="del" onclick="removeDebt(${i})">✕</button></div>`
  ).join('');
}

function calculate() {
  if (debts.length === 0) { $('#results').innerHTML = `<p style="color:var(--accent)">${t('noData')}</p>`; return; }
  let extra = parseFloat($('#extra').value) || 0;
  // Clone debts, sorted by rate descending (avalanche)
  let active = debts.map(d => ({ ...d })).sort((a, b) => b.rate - a.rate);
  let month = 0;
  let totalInterest = 0;
  let totalPaid = 0;
  let schedule = [];
  const maxMonths = 600;

  while (active.length > 0 && month < maxMonths) {
    month++;
    let monthlyInterest = 0;
    let monthlyPayment = 0;
    // Accrue interest
    active.forEach(d => {
      const interest = d.balance * (d.rate / 100 / 12);
      d.balance += interest;
      monthlyInterest += interest;
      totalInterest += interest;
    });
    // Pay minimums first
    active.forEach(d => {
      const pay = Math.min(d.minPay, d.balance);
      d.balance -= pay;
      monthlyPayment += pay;
      totalPaid += pay;
    });
    // Apply extra to highest-rate debt
    let remaining = extra;
    while (remaining > 0 && active.length > 0) {
      const target = active[0];
      const pay = Math.min(remaining, target.balance);
      target.balance -= pay;
      monthlyPayment += pay;
      totalPaid += pay;
      remaining -= pay;
      if (target.balance <= 0.005) {
        target.balance = 0;
        break;
      }
    }
    // Remove paid-off debts
    const paidOff = [];
    active = active.filter(d => {
      if (d.balance <= 0.005) { paidOff.push(d.name); return false; }
      return true;
    });
    schedule.push({ month, debtsLeft: active.length, interest: monthlyInterest, payment: monthlyPayment, payoff: paidOff.join(', ') });
    totalPaid = Math.round(totalPaid * 100) / 100;
  }

  // Round
  totalInterest = Math.round(totalInterest * 100) / 100;
  totalPaid = Math.round(totalPaid * 100) / 100;

  let html = '<div class="da-results">';
  html += `<div class="da-stat"><div class="num">${month}</div><div class="lbl">${t('monthsToFree')}</div></div>`;
  html += `<div class="da-stat"><div class="num">$${totalInterest.toLocaleString()}</div><div class="lbl">${t('totalInterest')}</div></div>`;
  html += `<div class="da-stat"><div class="num">$${totalPaid.toLocaleString()}</div><div class="lbl">${t('totalPaid')}</div></div>`;
  html += `</div>`;
  // Schedule table
  html += `<h3 style="margin-top:16px">${t('schedule')}</h3>`;
  html += '<table class="da-table"><thead><tr>';
  html += `<th>${t('month')}</th><th>${t('debtsLeft')}</th><th>${t('interestThisMonth')}</th><th>${t('payment')}</th><th>${t('payoffDebt')}</th>`;
  html += '</tr></thead><tbody>';
  schedule.forEach(s => {
    const cls = s.payoff ? 'payoff' : '';
    html += `<tr class="${cls}"><td>${s.month}</td><td>${s.debtsLeft}</td><td>$${s.interest.toFixed(2)}</td><td>$${s.payment.toFixed(2)}</td><td>${s.payoff}</td></tr>`;
  });
  html += '</tbody></table>';
  $('#results').innerHTML = html;
}

function loadExample() {
  debts = [
    { name: 'Visa', balance: 5000, rate: 22.9, minPay: 120 },
    { name: 'Mastercard', balance: 3000, rate: 18.9, minPay: 75 },
    { name: 'Store Card', balance: 1500, rate: 27.9, minPay: 45 },
    { name: 'Personal Loan', balance: 8000, rate: 9.5, minPay: 180 },
  ];
  $('#extra').value = 300;
  renderDebts();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('addExample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="debts=[];renderDebts();$('#results').innerHTML=''">${t('clearAll')}</button>`;

// Labels
$('#lbl-name').textContent = t('name');
$('#lbl-bal').textContent = t('bal');
$('#lbl-rate').textContent = t('rate');
$('#lbl-min').textContent = t('min');
$('#lbl-extra').textContent = t('extraPay');
$('#calc-btn').textContent = t('calculate');
$('#add-btn').textContent = '+';

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'❄️', href:'/calc/debt-snowball-calculator.html', name:'Debt Snowball'},
    {icon:'🏠', href:'/calc/mortgage-calculator.html', name:'Mortgage Calc'},
    {icon:'💵', href:'/calc/loan-calculator.html', name:'Loan Calc'},
    {icon:'💳', href:'/calc/credit-card-payoff-calculator.html', name:'CC Payoff'},
  ]
});
</script>

</body>
