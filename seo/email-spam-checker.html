// pre-compile regexes (case-insensitive, word boundary on left for letters)
const RULES = TRIGGERS.map(r=>{
  const word = r[0];
  // Use a smart boundary: \b for letters, plain text for symbols ($, %, etc.)
  const startBoundary = /^[a-z0-9]/i.test(word) ? '\\b' : '';
  const endBoundary   = /[a-z0-9]$/i.test(word) ? '\\b' : '';
  const re = new RegExp(startBoundary + word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + endBoundary, 'gi');
  return {word, weight:r[1], cat:r[2], suggest:r[3], re};
});

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function check(){
  const subj = $('#f-subject').value;
  const body = $('#f-body').value;
  const text = (subj + '\n' + body);
  if(!text.trim()){
    $('#score').textContent = '--';
    $('#grade').textContent = '—';
    $('#grade').style.background = 'var(--glass2)';
    $('#grade').style.color = 'var(--text2)';
    $('#summary').textContent = '';
    $('#hits-block').style.display = 'none';
    $('#highlight-block').style.display = 'none';
    return;
  }
  const hits = [];
  const textLower = text.toLowerCase();
  RULES.forEach(r=>{
    const m = text.match(r.re);
    if(m){
      // count distinct occurrences
      const count = m.length;
      hits.push({word:r.word, weight:r.weight, cat:r.cat, suggest:r.suggest, count});
    }
  });

  // score: start at 100, subtract weighted penalty (capped)
  let penalty = 0;
  hits.forEach(h => penalty += h.weight * Math.min(h.count, 3));
  // scale: 0 penalty = 100, heavy penalty floors around 25
  let score = Math.max(0, Math.min(100, 100 - penalty * 4));

  $('#score').textContent = score;
  $('#score-out-of').textContent = t('scoreOutOf');
  const gradeEl = $('#grade');
  let gradeText, gradeColor, summaryText;
  if(score >= 80){
    gradeText = t('gradeGood');
    gradeColor = '#00d672';
  } else if(score >= 55){
    gradeText = t('gradeOk');
    gradeColor = '#ffd93d';
  } else {
    gradeText = t('gradeBad');
    gradeColor = '#ff6b6b';
  }
  gradeEl.textContent = gradeText;
  gradeEl.style.background = gradeColor;
  gradeEl.style.color = score >= 80 ? '#000' : '#1a1a1a';

  // hits list
  const hitsBlock = $('#hits-block');
  const hitsList = $('#hits');
  if(hits.length === 0){
    hitsBlock.style.display = 'block';
    $('#hits-title').textContent = t('foundWords') + ' (0)';
    hitsList.innerHTML = '<div style="color:var(--text2);font-size:.9em;padding:10px">'+t('noWords')+'</div>';
  } else {
    hitsBlock.style.display = 'block';
    $('#hits-title').textContent = t('foundWords') + ' ('+hits.length+')';
    hitsList.innerHTML = hits.sort((a,b)=>b.weight-a.weight).map(h=>
      '<div class="hit-row"><span class="hit-cat">'+h.cat+'</span><div style="flex:1"><span class="hit-word">'+esc(h.word)+'</span> '+(h.count>1?'<span style="color:var(--text3);font-size:.78em">×'+h.count+'</span>':'')+'<div class="hit-suggest">→ '+esc(h.suggest)+'</div></div></div>'
    ).join('');
  }
  const cats = new Set(hits.map(h=>h.cat));
  $('#summary').textContent = hits.length + ' trigger ' + (hits.length===1?'word':'words') + ' · ' + cats.size + ' categor' + (cats.size===1?'y':'ies');

  // highlight preview
  $('#highlight-block').style.display = 'block';
  $('#hl-title').textContent = t('hlTitle');
  $('#hl-subject').innerHTML = highlightText(subj);
  $('#hl-body').innerHTML    = highlightText(body);
}

function highlightText(s){
  if(!s) return '<span style="color:var(--text3)">—</span>';
  let out = esc(s);
  // sort by length desc so longer phrases win
  const sorted = [...RULES].sort((a,b)=>b.word.length - a.word.length);
  sorted.forEach(r=>{
    const re = new RegExp(r.word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
    out = out.replace(re, m => '<mark>'+m+'</mark>');
  });
  return out;
}

  $('#f-subject').value = 'URGENT: Click here for your FREE $1000 gift — limited time!';

}
