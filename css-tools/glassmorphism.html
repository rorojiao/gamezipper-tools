<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is CSS glassmorphism?", "acceptedAnswer": {"@type": "Answer", "text": "Glassmorphism is a modern UI design trend that uses background blur, transparency and subtle borders to create frosted-glass effects reminiscent of iOS and Windows 11 interfaces."}}, {"@type": "Question", "name": "Does glassmorphism work in all browsers?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The backdrop-filter property is supported in all modern browsers. For older browsers, we automatically add the -webkit-backdrop-filter fallback. The effect gracefully degrades to a semi-transparent background."}}, {"@type": "Question", "name": "Can I use the generated CSS in production?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The generated CSS is clean, vendor-prefixed and ready to use in any web project. Just copy and paste it into your stylesheet."}}, {"@type": "Question", "name": "How do I make glassmorphism more visible?", "acceptedAnswer": {"@type": "Answer", "text": "Use a colorful, busy background image. The blur and transparency only become visible when there is content behind the element to show through. Try the gradient and pattern presets to see the effect."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gs-layout">
      <div class="gs-panel">
        <h3 style="margin:0 0 12px;font-size:1rem">⚙️ Settings</h3>
        <div class="gs-row"><label id="lbl-blur"></label><input type="range" id="blur" min="0" max="40" value="20"><span class="val" id="vblur">20px</span></div>
        <div class="gs-row"><label id="lbl-trans"></label><input type="range" id="trans" min="0" max="100" value="15"><span class="val" id="vtrans">15%</span></div>
        <div class="gs-row"><label id="lbl-border"></label><input type="range" id="bopa" min="0" max="100" value="30"><span class="val" id="vbopa">30%</span></div>
        <div class="gs-row"><label id="lbl-radius"></label><input type="range" id="radius" min="0" max="48" value="20"><span class="val" id="vradius">20px</span></div>
        <div class="gs-row"><label id="lbl-shadow"></label><input type="range" id="shadow" min="0" max="60" value="32"><span class="val" id="vshadow">32</span></div>
        <div class="gs-row"><label id="lbl-saturate"></label><input type="range" id="saturate" min="100" max="300" value="180"><span class="val" id="vsaturate">180%</span></div>
        <div class="gs-cs">
          <label><span id="lbl-tint"></span><input type="color" id="tint" value="#ffffff"></label>
        </div>
        <h3 style="margin:14px 0 8px;font-size:.95rem" id="lbl-bg"></h3>
        <div class="gs-bg-presets" id="bgPresets"></div>
      </div>
      <div>
        <div class="gs-preview" id="preview">
          <div class="gs-card" id="card">
            <div class="avatar">🪟</div>
            <h3>Glassmorphism</h3>
            <p>Frosted glass UI card with backdrop blur and transparency effects.</p>
          </div>
        </div>
        <h3 style="margin:18px 0 8px;font-size:1rem" id="lbl-css"></h3>
        <pre class="gs-out" id="output"></pre>
        <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
          <button class="gz-btn" id="btn-copy"></button>
          <button class="gz-btn gz-btn-secondary" id="btn-reset"></button>
        </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Glassmorphism Generator',
    toolDesc: 'Create beautiful frosted-glass UI effects with live preview. Adjust blur, transparency, borders and shadow to design modern glassmorphism cards.',
    lblBlur: 'Blur', lblTrans: 'Transparency', lblBorder: 'Border Opacity',
    lblRadius: 'Border Radius', lblShadow: 'Shadow Size', lblSaturate: 'Saturation',
    lblTint: 'Tint color', lblBg: 'Background Preset', lblCss: 'Generated CSS',
    btnCopy: 'Copy CSS', btnReset: 'Reset',
    step1: 'Choose a colorful background preset to see the glass effect',
    step2: 'Adjust blur, transparency, border and shadow sliders',
    step3: 'Tweak the tint color and border radius to match your style',
    step4: 'Copy the generated CSS and paste it into your project',
  },
  zh: {
    toolTitle: 'CSS 玻璃拟态生成器',
    toolDesc: '实时创建精美的毛玻璃 UI 效果。调整模糊度、透明度、边框和阴影，设计现代风格的玻璃拟态卡片。',
    lblBlur: '模糊度', lblTrans: '透明度', lblBorder: '边框不透明度',
    lblRadius: '圆角', lblShadow: '阴影大小', lblSaturate: '饱和度',
    lblTint: '色调', lblBg: '背景预设', lblCss: '生成的 CSS',
    btnCopy: '复制 CSS', btnReset: '重置',
    step1: '选择彩色背景预设以查看玻璃效果',
    step2: '调整模糊度、透明度、边框和阴影滑块',
    step3: '微调色调和圆角以匹配你的风格',
    step4: '复制生成的 CSS 并粘贴到你的项目中',
  }
});

const { $, copyText, t } = GZ;
const BG_PRESETS = [
  {name: 'Tropical', css: 'linear-gradient(135deg,#ff6b6b 0%,#4ecdc4 35%,#5566ff 75%,#ff9ff3 100%)'},
  {name: 'Sunset', css: 'linear-gradient(135deg,#f093fb 0%,#f5576c 50%,#4facfe 100%)'},
  {name: 'Aurora', css: 'linear-gradient(135deg,#43e97b 0%,#38f9d7 50%,#667eea 100%)'},
  {name: 'Candy', css: 'linear-gradient(135deg,#fa709a 0%,#fee140 100%)'},
  {name: 'Ocean', css: 'linear-gradient(135deg,#2af598 0%,#009efd 100%)'},
  {name: 'Cosmic', css: 'radial-gradient(at 20% 30%,#ff1493 0%,transparent 50%),radial-gradient(at 80% 70%,#00bfff 0%,transparent 50%),#1a0033'},
  {name: 'Mesh', css: 'radial-gradient(at 10% 10%,#ff9966 0%,transparent 50%),radial-gradient(at 90% 30%,#ff5e62 0%,transparent 50%),radial-gradient(at 50% 80%,#6a11cb 0%,transparent 50%),#2575fc'},
  {name: 'Dots', css: 'radial-gradient(circle,#fff 2px,transparent 3px),linear-gradient(135deg,#ee0979,#ff6a00)', bgSize: '24px 24px, 100% 100%'},
];
let currentBg = BG_PRESETS[0].css;

function hexToRgb(hex) {
  const m = hex.replace('#','').match(/.{2}/g);
  return m ? m.map(x=>parseInt(x,16)).join(',') : '255,255,255';
}

function applyStyles() {
  const blur = +$('#blur').value;
  const trans = +$('#trans').value;
  const bopa = +$('#bopa').value;
  const radius = +$('#radius').value;
  const shadow = +$('#shadow').value;
  const sat = +$('#saturate').value;
  const tint = $('#tint').value;
  const rgb = hexToRgb(tint);
  const card = $('#card');
  card.style.backdropFilter = `blur(${blur}px) saturate(${sat}%)`;
  card.style.webkitBackdropFilter = `blur(${blur}px) saturate(${sat}%)`;
  card.style.background = `rgba(${rgb},${trans/100})`;
  card.style.border = `1px solid rgba(${rgb},${bopa/100})`;
  card.style.borderRadius = radius + 'px';
  card.style.boxShadow = `0 8px ${shadow}px rgba(0,0,0,${Math.min(0.4, shadow/150).toFixed(2)})`;
  $('#vblur').textContent = blur + 'px';
  $('#vtrans').textContent = trans + '%';
  $('#vbopa').textContent = bopa + '%';
  $('#vradius').textContent = radius + 'px';
  $('#vshadow').textContent = shadow;
  $('#vsaturate').textContent = sat + '%';
  generateCSS();
}

function generateCSS() {
  const blur = +$('#blur').value;
  const trans = +$('#trans').value;
  const bopa = +$('#bopa').value;
  const radius = +$('#radius').value;
  const shadow = +$('#shadow').value;
  const sat = +$('#saturate').value;
  const tint = $('#tint').value;
  const rgb = hexToRgb(tint);
  const css = `.glass {
  background: rgba(${rgb}, ${(trans/100).toFixed(2)});
  backdrop-filter: blur(${blur}px) saturate(${sat}%);
  -webkit-backdrop-filter: blur(${blur}px) saturate(${sat}%);
  border: 1px solid rgba(${rgb}, ${(bopa/100).toFixed(2)});
  border-radius: ${radius}px;
  box-shadow: 0 8px ${shadow}px rgba(0, 0, 0, ${(Math.min(0.4, shadow/150)).toFixed(2)});
}`;
  $('#output').textContent = css;
}

$('#blur').addEventListener('input', applyStyles);
$('#trans').addEventListener('input', applyStyles);
$('#bopa').addEventListener('input', applyStyles);
$('#radius').addEventListener('input', applyStyles);
$('#shadow').addEventListener('input', applyStyles);
$('#saturate').addEventListener('input', applyStyles);
$('#tint').addEventListener('input', applyStyles);

$('#bgPresets').innerHTML = BG_PRESETS.map((p,i) => `<div class="gs-bg-btn${i===0?' active':''}" data-i="${i}" style="background:${p.css};${p.bgSize?'background-size:'+p.bgSize:''}" title="${p.name}"></div>`).join('');
$('#bgPresets').addEventListener('click', e => {
  const btn = e.target.closest('.gs-bg-btn');
  if (!btn) return;
  $('#bgPresets').querySelectorAll('.gs-bg-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const p = BG_PRESETS[+btn.dataset.i];
  currentBg = p.css;
  const prev = $('#preview');
  prev.style.background = p.css;
  if (p.bgSize) prev.style.backgroundSize = p.bgSize;
});

$('#btn-copy').textContent = t('btnCopy');
$('#btn-reset').textContent = t('btnReset');
$('#btn-copy').addEventListener('click', () => copyText($('#output').textContent));
$('#btn-reset').addEventListener('click', () => {
  $('#blur').value = 20; $('#trans').value = 15; $('#bopa').value = 30;
  $('#radius').value = 20; $('#shadow').value = 32; $('#saturate').value = 180;
  $('#tint').value = '#ffffff';
  applyStyles();
});

applyStyles();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌫️', href:'/css-tools/neumorphism.html', name:'CSS Neumorphism'},
    {icon:'🌈', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'🔲', href:'/css-tools/box-shadow.html', name:'Box Shadow'},
    {icon:'🪟', href:'/css-tools/backdrop-filter.html', name:'Backdrop Filter'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
