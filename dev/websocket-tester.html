<style>
.ws-log{font-family:monospace;font-size:.85em;line-height:1.6;max-height:500px;overflow-y:auto;background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:12px}
.ws-log .msg{padding:4px 8px;border-radius:4px;margin:2px 0;word-break:break-all}
.ws-log .msg.sent{background:rgba(78,205,196,.1);border-left:3px solid var(--accent)}
.ws-log .msg.received{background:rgba(100,150,255,.1);border-left:3px solid #6496ff}
.ws-log .msg.error{background:rgba(255,80,80,.1);border-left:3px solid #ff5050}
.ws-log .msg.info{background:rgba(255,200,50,.1);border-left:3px solid #ffc832}
.ws-log .time{color:var(--text3);margin-right:8px;font-size:.85em}
.ws-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.ws-controls input{flex:1;min-width:200px}
#msg-area{width:100%;min-height:80px;font-family:monospace}
.status-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px}
.status-dot.connected{background:#00d672}
.status-dot.disconnected{background:#ff5050}
.status-dot.connecting{background:#ffc832;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a WebSocket tester?", "acceptedAnswer": {"@type": "Answer", "text": "A WebSocket tester lets you connect to WebSocket servers, send messages and view real-time responses. It's essential for debugging real-time apps, chat systems and streaming APIs."}}, {"@type": "Question", "name": "Is my WebSocket traffic routed through a server?", "acceptedAnswer": {"@type": "Answer", "text": "No. The WebSocket connection is made directly from your browser to the target server. No intermediary is involved."}}, {"@type": "Question", "name": "Can I send JSON messages?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. You can type any text including JSON, XML or plain text. The tool sends your message exactly as-is to the WebSocket server."}}, {"@type": "Question", "name": "Does this support secure WebSockets (wss://)?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The tool supports both ws:// and wss:// (secure) WebSocket protocols."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="ws-controls">
      <span class="status-dot disconnected" id="status-dot"></span>
      <input type="text" id="url-input" class="gz-input" placeholder="wss://echo.websocket.org" value="wss://echo.websocket.org">
      <button class="gz-btn" id="connect-btn">Connect</button>
      <button class="gz-btn gz-btn-secondary" id="disconnect-btn" disabled>Disconnect</button>
      <button class="gz-btn gz-btn-secondary" id="clear-log-btn">Clear Log</button>
    </div>
    <div class="ws-controls" style="margin-bottom:8px">
      <label style="font-size:.9em;color:var(--text3)">Protocols (optional):</label>
      <input type="text" id="protocols-input" class="gz-input" placeholder="e.g. chat, superchat" style="flex:1;min-width:150px">
    </div>
    <div class="gz-split">
      <div style="flex:1">
        <label id="lbl-msg" style="font-weight:600;display:block;margin-bottom:4px"></label>
        <textarea id="msg-area" class="gz-textarea" placeholder='{"type":"hello","message":"world"}'></textarea>
        <div style="margin-top:8px;display:flex;gap:8px">
          <button class="gz-btn" id="send-btn" disabled>Send</button>
          <button class="gz-btn gz-btn-secondary" id="send-json-btn" disabled>Send as JSON</button>
          <button class="gz-btn gz-btn-secondary" id="ping-btn" disabled>Ping</button>
        </div>
      </div>
      <div style="flex:1">
        <label id="lbl-log" style="font-weight:600;display:block;margin-bottom:4px"></label>
        <div class="ws-log" id="log-area"></div>
        <div style="margin-top:4px;font-size:.8em;color:var(--text3)">
          <span id="msg-count"></span>
        </div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'WebSocket Tester & Client',
    toolDesc: 'Test WebSocket connections online. Connect, send and receive messages, view logs — all in your browser.',
    lblMsg: 'Message',
    lblLog: 'Connection Log',
    msgCount: 'Messages: {n}',
    step1: 'Enter your WebSocket URL (ws:// or wss://) and click Connect',
    step2: 'Type a message in the text area and click Send',
    step3: 'View real-time responses in the connection log',
    step4: 'Use Ping to test connectivity or Send as JSON for formatted data',
  },
  zh: {
    toolTitle: 'WebSocket 测试工具',
    toolDesc: '在线测试 WebSocket 连接。连接、发送和接收消息，查看日志 — 完全浏览器本地运行。',
    lblMsg: '消息',
    lblLog: '连接日志',
    msgCount: '消息数：{n}',
    step1: '输入 WebSocket 地址（ws:// 或 wss://）并点击连接',
    step2: '在文本框中输入消息并点击发送',
    step3: '在连接日志中查看实时响应',
    step4: '使用 Ping 测试连通性，或使用 JSON 发送格式化数据',
  }
});

const { $, t } = GZ;
let ws = null;
let msgCount = 0;

$('#lbl-msg').textContent = t('lblMsg');
$('#lbl-log').textContent = t('lblLog');

function updateMsgCount() {
  $('#msg-count').textContent = t('msgCount').replace('{n}', msgCount);
}
updateMsgCount();

function log(type, text) {
  const now = new Date().toLocaleTimeString();
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.innerHTML = `<span class="time">${now}</span>${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}`;
  $('#log-area').appendChild(div);
  $('#log-area').scrollTop = $('#log-area').scrollHeight;
  msgCount++;
  updateMsgCount();
}

function setStatus(status) {
  const dot = $('#status-dot');
  dot.className = 'status-dot ' + status;
  $('#connect-btn').disabled = status !== 'disconnected';
  $('#disconnect-btn').disabled = status === 'disconnected';
  $('#send-btn').disabled = status !== 'connected';
  $('#send-json-btn').disabled = status !== 'connected';
  $('#ping-btn').disabled = status !== 'connected';
}

$('#connect-btn').onclick = () => {
  const url = $('#url-input').value.trim();
  if (!url) return;
  const protocols = $('#protocols-input').value.trim();
  try {
    const opts = protocols ? protocols.split(',').map(p => p.trim()) : undefined;
    ws = new WebSocket(url, opts);
    setStatus('connecting');
    log('info', `Connecting to ${url}...`);

    ws.onopen = () => {
      setStatus('connected');
      log('info', '✓ Connected');
    };

    ws.onmessage = (e) => {
      const data = typeof e.data === 'string' ? e.data : '[Binary data]';
      log('received', data);
    };

    ws.onerror = (e) => {
      log('error', 'Connection error');
    };

    ws.onclose = (e) => {
      setStatus('disconnected');
      log('info', `Disconnected (code: ${e.code}, reason: ${e.reason || 'none'})`);
      ws = null;
    };
  } catch (e) {
    log('error', 'Failed to create WebSocket: ' + e.message);
  }
};

$('#disconnect-btn').onclick = () => {
  if (ws) ws.close();
};

$('#send-btn').onclick = () => {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const msg = $('#msg-area').value;
  if (!msg) return;
  ws.send(msg);
  log('sent', msg);
};

$('#send-json-btn').onclick = () => {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const msg = $('#msg-area').value.trim();
  if (!msg) return;
  try {
    const json = JSON.parse(msg);
    const str = JSON.stringify(json);
    ws.send(str);
    log('sent', str);
  } catch (e) {
    log('error', 'Invalid JSON: ' + e.message);
  }
};

$('#ping-btn').onclick = () => {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const start = Date.now();
  ws.send('__ping__');
  log('sent', `[Ping] ${start}`);
};

$('#clear-log-btn').onclick = () => {
  $('#log-area').innerHTML = '';
  msgCount = 0;
  updateMsgCount();
};

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔌', href:'/dev/api-tester.html', name:'API Tester'},
    {icon:'💬', href:'/dev/discord-webhook.html', name:'Discord Webhook'},
    {icon:'📋', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'🎫', href:'/dev/jwt-debugger.html', name:'JWT Debugger'},
  ]
});
</script>

</body>
</html>
