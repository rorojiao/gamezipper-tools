<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How does speech to text work in the browser?","acceptedAnswer":{"@type":"Answer","text":"This tool uses the Web Speech API built into modern browsers (Chrome, Edge, Safari). It sends your audio to the browser vendor's speech recognition service, which returns text. The tool itself does not store or upload your audio."}},{"@type":"Question","name":"Which browsers support speech recognition?","acceptedAnswer":{"@type":"Answer","text":"Chrome (desktop and Android), Microsoft Edge, and Safari (iOS 14.5+) fully support the Web Speech API. Firefox does not support it natively. For best accuracy, use Chrome."}},{"@type":"Question","name":"Do I need to install anything?","acceptedAnswer":{"@type":"Answer","text":"No installation required. Just click Start, allow microphone access when prompted, and start speaking. Everything runs in the browser tab."}},{"@type":"Question","name":"Can I use speech to text in multiple languages?","acceptedAnswer":{"@type":"Answer","text":"Yes. This tool supports 50+ languages including English, Chinese, Spanish, French, German, Japanese, Korean, Arabic, Hindi, Portuguese and more. Pick your language from the dropdown before you start."}}]}</script>

        <option value="zh-TW">中文（繁體）</option>

        <option value="ar-SA">العربية</option>
        <option value="hi-IN">हिन्दी</option>
        <option value="th-TH">ภาษาไทย</option>
        <option value="vi-VN">Tiếng Việt</option>
        <option value="tr-TR">Türkçe</option>

    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Speech to Text Converter',
    toolDesc: 'Convert your voice to text instantly. Dictate with your microphone and watch words appear. Supports 50+ languages via the Web Speech API — free, browser-only.',
    language: 'Recognition Language',
    output: 'Transcribed Text',
    start: 'Start Listening',
    stop: 'Stop Listening',
    listening: 'Listening… speak now',
    notSupported: 'Speech recognition is not supported in this browser. Please use Chrome, Edge or Safari.',
    micDenied: 'Microphone access denied. Please allow microphone access and try again.',
    step1: 'Select the language you will speak in',
    step2: 'Click Start and allow microphone access when prompted',
    step3: 'Speak naturally — your words appear as you talk',
    step4: 'Click Stop, then copy or download the text',
  },
  zh: {
    toolTitle: '语音转文字',
    toolDesc: '即时将语音转换为文字。对着麦克风说话，文字实时出现。基于 Web Speech API 支持 50+ 种语言 — 免费、浏览器本地运行。',
    language: '识别语言',
    output: '转录文字',
    start: '开始收音',
    stop: '停止收音',
    listening: '正在收音… 请说话',
    notSupported: '此浏览器不支持语音识别。请使用 Chrome、Edge 或 Safari。',
    micDenied: '麦克风权限被拒绝。请允许麦克风访问后重试。',
    step1: '选择你要说的语言',
    step2: '点击开始，并在弹出框中允许麦克风访问',
    step3: '自然地说话 — 文字会实时显示',
    step4: '点击停止，然后复制或下载文字',
  }
});

const { $, copyText, t } = GZ;

$('#lbl-lang').textContent = t('language');
$('#lbl-out').textContent = t('output');
$('#mic-text').textContent = t('start');

let recognition = null;
let isRecording = false;
let finalText = '';

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

function toggleMic() {
  if (!SR) { $('#status').textContent = t('notSupported'); return; }
  if (isRecording) {
    recognition.stop();
    return;
  }
  recognition = new SR();
  recognition.lang = $('#lang').value;
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.onstart = () => {
    isRecording = true;
    $('#micBtn').classList.add('recording');
    $('#mic-icon').textContent = '⏹️';
    $('#mic-text').textContent = t('stop');
    $('#status').textContent = t('listening');
  };
  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const r = e.results[i];
      if (r.isFinal) finalText += r[0].transcript;
      else interim += r[0].transcript;
    }
    $('#output').innerHTML = finalText + '<span class="interim">' + interim + '</span>';
  };
  recognition.onerror = (e) => {
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      $('#status').textContent = t('micDenied');
    }
  };
  recognition.onend = () => {
    isRecording = false;
    $('#micBtn').classList.remove('recording');
    $('#mic-icon').textContent = '🎤';
    $('#mic-text').textContent = t('start');
    $('#status').textContent = '';
    $('#output').textContent = finalText;
  };
  recognition.start();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadTxt()">${t('download')||'Download'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="finalText='';$('#output').textContent=''">${t('clear')}</button>`;

function downloadTxt() {
  const text = finalText || $('#output').textContent;
  if (!text) return;
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'transcript.txt';
  a.click();
}

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔊', href:'/dev/text-to-speech.html', name:'Text to Speech'},
    {icon:'📝', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'✍️', href:'/text/markdown-editor.html', name:'Markdown Editor'},
    {icon:'🎚️', href:'/dev/audio-tuner.html', name:'Audio Tuner'},
  ]
});
</script>
