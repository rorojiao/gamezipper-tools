function punycodeEncode(input) {
  try {
    const labels = input.split('.');
    const isEmail = input.includes('@');
    let domainPart = input;
    let localPart = '';
    if (isEmail) {
      const idx = input.indexOf('@');
      localPart = input.substring(0, idx + 1);
      domainPart = input.substring(idx + 1);
    }
    const labels = domainPart.split('.');
    const encoded = labels.map(l => {
      if (/^[\x00-\x7F]*$/.test(l)) return l;
      try { return 'xn--' + punycode_encode_label(l); } catch(e) { return l; }
    }).join('.');
    return localPart + encoded;
  } catch(e) { return null; }
}

function punycode_decode(input) {
  try {
    const isEmail = input.includes('@');
    let domainPart = input;
    let localPart = '';
    if (isEmail) {
      const idx = input.indexOf('@');
      localPart = input.substring(0, idx + 1);
      domainPart = input.substring(idx + 1);
    }
    const labels = domainPart.split('.');
    const decoded = labels.map(l => {
      if (l.startsWith('xn--')) {
        try { return punycode_decode_label(l.substring(4)); } catch(e) { return l; }
      }
      return l;
    }).join('.');
    return localPart + decoded;
  } catch(e) { return null; }
}

function punycode_encode_label(s) {
  const base = 36;
  const tmin = 1, tmax = 26, skew = 38, damp = 700;
  const initialBias = 72, initialN = 128;
  let n = initialN, delta = 0, bias = initialBias;
  let basic = '';
  const codePoints = [];
  for (let i = 0; i < s.length; i++) {
    const cp = s.codePointAt(i);
    if (cp < 128) basic += s[i];
    else codePoints.push(cp);
    if (cp > 0xFFFF) i++;
  }
  if (!codePoints.length) return basic;
  let h = basic.length, b = basic.length;
  let output = basic ? basic + '-' : '';
  codePoints.sort((a, b) => a - b);
  let m, q, k;
  while (codePoints.length) {
    m = codePoints[0];
    delta += (m - n) * (h + 1);
    n = m;
    const remaining = [...codePoints];
    for (const c of remaining) {
      if (c < n) delta++;
      else if (c === n) {
        q = delta;
        for (k = base; ; k += base) {
          const t = k <= bias ? tmin : (k >= bias + tmax ? tmax : k - bias);
          if (q < t) break;
          output += String.fromCharCode(((t + (q - t) % (base - t)) + 0x30));
          q = Math.floor((q - t) / (base - t));
        }
        output += String.fromCharCode(q + 0x30);
        bias = adapt(delta, h + 1, h === b);
        delta = 0;
        h++;
        const idx = codePoints.indexOf(c);
        if (idx > -1) codePoints.splice(idx, 1);
      }
    }
    delta++;
    n++;
  }
  return output;
}

function punycode_decode_label(s) {
  const base = 36;
  const tmin = 1, tmax = 26, skew = 38, damp = 700;
  const initialBias = 72, initialN = 128;
  let n = initialN, i = 0, bias = initialBias, pos = 0;
  const lastDash = s.lastIndexOf('-');
  let output = [];
  if (lastDash >= 0) {
    for (let c = 0; c < lastDash; c++) output.push(s.charCodeAt(c));
    pos = lastDash + 1;
  }
  while (pos < s.length) {
    const oldi = i;
    let w = 1;
    for (let k = base; ; k += base) {
      if (pos >= s.length) break;
      const digit = s.charCodeAt(pos++) - 0x30;
      if (digit < 0 || digit > 35) break;
      i += digit * w;
      const t = k <= bias ? tmin : (k >= bias + tmax ? tmax : k - bias);
      if (digit < t) break;
      w *= (base - t);
    }
    const out = output.length + 1;
    bias = adapt(i - oldi, out, oldi === 0);
    n += Math.floor(i / out);
    i %= out;
    output.splice(i, 0, n);
    i++;
  }
  return String.fromCodePoint(...output);
}

function adapt(delta, numpoints, firsttime) {
  const base = 36, tmin = 1, tmax = 26, skew = 38, damp = 700;
  delta = firsttime ? Math.floor(delta / damp) : Math.floor(delta / 2);
  delta += Math.floor(delta / numpoints);
  let k = 0;
  while (delta > Math.floor(((base - tmin) * tmax) / 2)) {
    delta = Math.floor(delta / (base - tmin));
    k += base;
  }
  return k + Math.floor(((base - tmin + 1) * delta) / (delta + skew));
}

function doToPunycode() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  const result = punycode_encode(inp);
  if (result === null) {
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${t('errorInvalid')}</span>`;
  } else {
    $('#output').innerHTML = `<div class="result-box"><div class="result-label">Punycode (ASCII)</div><div class="result-value">${escHtml(result)}</div></div>`;
  }
}

function doToUnicode() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  const result = punycode_decode(inp);
  if (result === null) {

  } else {

  }
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
