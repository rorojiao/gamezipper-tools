<script>
GZI18n.register({
  en: {
    toolTitle: 'Decision Matrix Maker (Weighted Scoring)',
    toolDesc: 'Compare options against weighted criteria, auto-calculate scores and reveal the best choice. Free weighted decision matrix (Pugh matrix) — export PNG or CSV.',
    option: 'Option', criteria: 'Criteria', weight: 'Weight', total: 'Total', winner: '🏆 Recommended: ', tie: '🤝 It\'s a tie!',
    addOption: '+ Option', addCriteria: '+ Criteria', del: 'Remove row',
    downloadPNG: 'Download PNG', downloadCSV: 'Download CSV', print: 'Print / PDF', example: 'Example', clear: 'Clear',
    optPh: 'Option name', critPh: 'Criterion',
    step1: 'List your options as rows and decision criteria as columns',
    step2: 'Set each criterion\'s weight (importance) and score every option 1–5',
    step3: 'Weighted totals update live — the best option is highlighted green',
    step4: 'Export the matrix as PNG or CSV to share your decision',
  },
  zh: {
    toolTitle: '决策矩阵生成器（加权评分）',
    toolDesc: '把多个选项与加权标准对比，自动计算得分并找出最佳选择。免费加权决策矩阵（Pugh 矩阵）— 可导出 PNG 或 CSV。',
    option: '选项', criteria: '标准', weight: '权重', total: '总分', winner: '🏆 推荐选择：', tie: '🤝 并列第一！',
    addOption: '+ 选项', addCriteria: '+ 标准', del: '删除行',
    downloadPNG: '下载 PNG', downloadCSV: '下载 CSV', print: '打印 / PDF', example: '示例', clear: '清空',
    optPh: '选项名称', critPh: '标准',
    step1: '把选项列为行，决策标准列为列',
    step2: '为每个标准设置权重（重要性），并给每个选项打分 1–5',
    step3: '加权总分实时更新 — 最佳选项会以绿色高亮',
    step4: '导出矩阵为 PNG 或 CSV，分享你的决策结果',
  }
});

const { $, t, showToast } = GZ;
let criteria = [{name:'Cost', w:5}, {name:'Quality', w:4}, {name:'Speed', w:3}];
let options = [{name:'Option A', scores:[3,5,4]}, {name:'Option B', scores:[5,3,2]}, {name:'Option C', scores:[2,4,5]}];

function totals() {
  return options.map(o => o.scores.reduce((s, sc, i) => s + (Number(sc)||0) * (Number(criteria[i].w)||0), 0));
}
function bestIdx() {
  const tot = totals();
  const max = Math.max(...tot);
  const winners = tot.map((v,i)=>v===max?i:-1).filter(i=>i>=0);
  return winners.length===1 ? winners[0] : -1;
}

function render() {
  const w = bestIdx();
  let html = '<thead><tr><th>'+t('option')+'</th>';
  criteria.forEach((c,ci)=>{
    html += `<th>${esc(c.name)}<br><span style="font-weight:400;opacity:.7;font-size:.82em">${t('weight')}: <input type="number" class="w-input" min="0" max="10" step="1" value="${c.w}" oninput="setWeight(${ci},this.value)"></span></th>`;
  });
  html += `<th>${t('total')}</th></tr></thead><tbody>`;
  options.forEach((o,oi)=>{
    const tot = totals()[oi];
    const isW = oi===w;
    html += `<tr class="${isW?'dm-winner':''}"><td class="opt-cell"><input class="opt-input" value="${esc(o.name)}" placeholder="${t('optPh')}" oninput="setOptName(${oi},this.value)"></td>`;
    criteria.forEach((c,ci)=>{
      const v = o.scores[ci] ?? '';
      html += `<td><input type="number" min="1" max="5" step="1" value="${v}" oninput="setScore(${oi},${ci},this.value)"></td>`;
    });
    html += `<td class="dm-total">${tot.toFixed(0)}${isW?' 🏆':''}</td></tr>`;
  });
  html += '</tbody>';
  $('#table').innerHTML = html;
  // winner box
  if (options.length) {
    if (w >= 0) $('#winner-box').innerHTML = `<strong>${t('winner')}</strong>${esc(options[w].name)} <span style="opacity:.7">(${totals()[w]})</span>`;
    else $('#winner-box').innerHTML = `<strong>${t('tie')}</strong>`;
  } else { $('#winner-box').innerHTML = ''; }
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function setWeight(i,v){criteria[i].w=Number(v)||0;render();}
function setOptName(i,v){options[i].name=v;}
function setScore(oi,ci,v){options[oi].scores[ci]=Math.max(0,Math.min(5,Number(v)||0));render();}
function addOption(){options.push({name:t('option')+' '+(options.length+1),scores:criteria.map(()=>3)});render();}
function addCriteria(){criteria.push({name:t('criteria')+' '+(criteria.length+1),w:3});options.forEach(o=>o.scores.push(3));render();}
function clearAll(){criteria=[{name:'',w:3}];options=[{name:'',scores:[3]}];render();}
function loadExample(){criteria=[{name:'Cost',w:5},{name:'Quality',w:4},{name:'Speed',w:3}];options=[{name:'Option A',scores:[3,5,4]},{name:'Option B',scores:[5,3,2]},{name:'Option C',scores:[2,4,5]}];render();}

function downloadCSV(){
  let csv=t('option');
  criteria.forEach(c=>csv+=','+JSON.stringify(c.name));
  csv+=','+t('total')+'\n';
  const tot=totals();
  options.forEach((o,i)=>{
    csv+=JSON.stringify(o.name);
    criteria.forEach((c,ci)=>csv+=','+(o.scores[ci]??''));
    csv+=','+tot[i].toFixed(0)+'\n';
  });
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='decision-matrix.csv'; a.click();
}
function downloadPNG(){
  const cols=criteria.length+2;
  const W=240+criteria.length*150+140, H=120+options.length*54;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#1a1a2e'; ctx.font='bold 28px Arial'; ctx.textAlign='left';
  ctx.fillText('Decision Matrix', 20, 38);
  ctx.font='14px Arial'; ctx.fillStyle='#888';
  ctx.fillText('Weighted scoring · tools.gamezipper.com', 20, 60);
  const w=bestIdx(); const tot=totals();
  const x0=20,y0=84; const cwid=[220].concat(criteria.map(()=>150)).concat([140]);
  // header
  let xx=x0;
  ['Option'].concat(criteria.map(c=>c.name+' (w'+c.w+')')).concat(['Total']).forEach((h,i)=>{
    ctx.fillStyle='#f0f0f5'; ctx.fillRect(xx,y0,cwid[i],44);
    ctx.fillStyle='#1a1a2e'; ctx.font='bold 14px Arial'; ctx.textAlign='center';
    ctx.fillText(String(h), xx+cwid[i]/2, y0+27); xx+=cwid[i];
  });
  // rows
  options.forEach((o,ri)=>{
    let yy=y0+44+ri*54; xx=x0; const isW=ri===w;
    [''].concat(criteria.map(()=>o.scores)).concat(['']).forEach((val,i)=>{
      if(isW){ctx.fillStyle='rgba(46,125,50,.18)';ctx.fillRect(xx,yy,cwid[i],54);}
      ctx.strokeStyle='#e0e0e8'; ctx.strokeRect(xx,yy,cwid[i],54);
      ctx.fillStyle=isW?'#2e7d32':'#333'; ctx.font=(i===0||i===cols-1?'bold ':'')+'15px Arial'; ctx.textAlign='center';
      const txt=i===0?o.name:(i===cols-1?tot[ri].toFixed(0)+(isW?' 🏆':''):(o.scores[i-1]??''));
      ctx.fillText(String(txt), xx+cwid[i]/2, yy+32); xx+=cwid[i];
    });
  });
  const link=document.createElement('a'); link.download='decision-matrix.png'; link.href=cv.toDataURL('image/png'); link.click();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="addOption()">${t('addOption')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="addCriteria()">${t('addCriteria')}</button>
  <button class="gz-btn" onclick="downloadPNG()">🖼️ ${t('downloadPNG')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadCSV()">📄 ${t('downloadCSV')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="window.print()">🖨️ ${t('print')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;
render();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎯', href:'/fun/swot-analysis.html', name:'SWOT Analysis'},
    {icon:'⏰', href:'/fun/eisenhower-matrix.html', name:'Eisenhower Matrix'},
    {icon:'🐟', href:'/fun/fishbone-diagram.html', name:'Fishbone Diagram'},
    {icon:'🗂️', href:'/fun/kanban-board.html', name:'Kanban Board'},
  ]
});
</script>
