    unescapedChars: '个字符已解码',

    step2: '选择命名、十进制或十六进制实体格式（及选项）',

const { $, copyText, t } = GZ;

let entityMode = 'named';

const NAMED = {
  '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;',
  // extended common named entities
  '\u00a0':'&nbsp;', '\u00a9':'&copy;', '\u00ae':'&reg;', '\u00ad':'&shy;',
  '\u00ab':'&laquo;', '\u00bb':'&raquo;', '\u2013':'&ndash;', '\u2014':'&mdash;',
  '\u2018':'&lsquo;', '\u2019':'&rsquo;', '\u201c':'&ldquo;', '\u201d':'&rdquo;',
  '\u2026':'&hellip;', '\u2122':'&trade;', '\u20ac':'&euro;', '\u00a3':'&pound;',
  '\u00a5':'&yen;', '\u00a2':'&cent;', '\u00a7':'&sect;', '\u00b6':'&para;',
  '\u00b0':'&deg;', '\u00b1':'&plusmn;', '\u00d7':'&times;', '\u00f7':'&divide;',
  '\u00b5':'&micro;', '\u00b2':'&sup2;', '\u00b3':'&sup3;', '\u00bc':'&frac14;',
  '\u00bd':'&frac12;', '\u00be':'&frac34;', '\u2192':'&rarr;', '\u2190':'&larr;',
  '\u2191':'&uarr;', '\u2193':'&darr;', '\u21d2':'&rArr;', '\u221e':'&infin;',
  '\u2260':'&ne;', '\u2264':'&le;', '\u2265':'&ge;', '\u00b1':'&plusmn;',
};

function escapeHtml(str, opts){
  let out = '';
  for (const ch of str){
    const code = ch.codePointAt(0);
    // ampersand first
    if (ch === '&'){ out += '&amp;'; continue; }
    if (ch === '<'){ out += '&lt;'; continue; }
    if (ch === '>'){ out += '&gt;'; continue; }
    if (opts.quotes && ch === '"'){ out += entityMode==='named' ? '&quot;' : numEntity('"', opts); continue; }
    if (opts.quotes && ch === "'"){ out += entityMode==='named' ? '&#39;' : numEntity("'", opts); continue; }
    if (opts.allNonAscii && code > 127){
      if (entityMode === 'named' && NAMED[ch]){ out += NAMED[ch]; }
      else { out += numEntity(ch, opts); }
      continue;
    }
    if (entityMode !== 'named' && NAMED[ch] && '<>"&'.indexOf(ch) === -1){
      // for decimal/hex mode still output named for the common 5? no — output numeric
      out += numEntity(ch, opts);
      continue;
    }
    if (entityMode === 'named' && NAMED[ch] && code > 127){ out += NAMED[ch]; continue; }
    out += ch;
  }
  return out;
}

function numEntity(ch, opts){
  const code = ch.codePointAt(0);
  if (entityMode === 'decimal') return '&#' + code + ';';
  if (entityMode === 'hex') return '&#x' + code.toString(16).toUpperCase() + ';';
  return ch;
}

const ENTITY_RE = /&(?:#[xX][0-9a-fA-F]+;?|#[0-9]+;?|[a-zA-Z][a-zA-Z0-9]*;)/g;

function unescapeHtml(str){
  // Use a textarea trick for named + numeric, then it's reliable
  const tx = document.createElement('textarea');
  return str.replace(ENTITY_RE, ent => {
    tx.innerHTML = ent;
    const dec = tx.value;
    // textarea decodes &lt; &gt; &amp; &quot; &#..; &#x..; reliably
    return dec;
  });
}

function getOpts(){
  return {
    quotes: $('#oq').checked,
    allNonAscii: $('#oa').checked,
  };
}

function doEscape(){
  const inp = $('#input').value;
  if (!inp){ $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('empty')}</span>`; $('#output').textContent=''; return; }
  const out = escapeHtml(inp, getOpts());
  window._escOut = out;
  $('#output').textContent = out;
  const cnt = out.length - inp.length;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${out.length} ${t('escapedChars')} (${cnt>=0?'+':''}${cnt})</span>`;
}

function doUnescape(){
  const inp = $('#input').value;
  if (!inp){ $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('empty')}</span>`; $('#output').textContent=''; return; }
  const out = unescapeHtml(inp);
  window._escOut = out;
  $('#output').textContent = out;
  const cnt = inp.length - out.length;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${out.length} ${t('unescapedChars')} (-${Math.max(0,cnt)})</span>`;
}

function doSwap(){
  if (window._escOut != null){ $('#input').value = window._escOut; $('#input').dispatchEvent(new Event('input')); }
}

function doCopy(){ if (window._escOut != null) copyText(window._escOut); }

function setMode(m){
  entityMode = m;
  document.querySelectorAll('#opts .seg button').forEach(b => b.classList.toggle('active', b.dataset.m === m));
}

function loadExample(){
  $('#input').value = `<p>Tom & Jerry said: "5 < 10 && 'a' > 'b'" © 2026</p>`;
  setMode('named');
  document.querySelectorAll('#opts .seg button').forEach(b => b.classList.toggle('active', b.dataset.m === 'named'));
  $('#oq').checked = true;
  doEscape();
}

function doClear(){ $('#input').value=''; $('#output').textContent=''; $('#status').innerHTML=''; window._escOut=null; }

$('#opts').innerHTML = `
  <span>${t('mode')}:</span>
  <span class="seg">
    <button data-m="named" class="active" onclick="setMode('named')">${t('modeNamed')}</button>
    <button data-m="decimal" onclick="setMode('decimal')">${t('modeDecimal')}</button>
    <button data-m="hex" onclick="setMode('hex')">${t('modeHex')}</button>
  </span>
  <label><input type="checkbox" id="oq" checked> ${t('optQuotes')}</label>
  <label><input type="checkbox" id="oa"> ${t('optAllNonAscii')}</label>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doEscape()">${t('escape')}</button>
  <button class="gz-btn" onclick="doUnescape()">${t('unescape')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doSwap()">${t('swap')}</button>
  <button class="gz-btn" onclick="doCopy()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
