<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I calculate VAT?","acceptedAnswer":{"@type":"Answer","text":"To add VAT, multiply the net amount by (1 + VAT rate / 100). To remove VAT from a gross amount, divide by (1 + VAT rate / 100). For example, with 20% VAT: £100 net × 1.20 = £120 gross; £120 gross / 1.20 = £100 net, with £20 VAT."}},{"@type":"Question","name":"What is the difference between VAT and GST?","acceptedAnswer":{"@type":"Answer","text":"VAT (Value Added Tax) and GST (Goods and Services Tax) are both consumption taxes on goods and services. VAT is used in the UK, EU and many countries; GST is used in India, Australia, Canada, Singapore and others. The calculation method is identical — only the name and rate differ."}},{"@type":"Question","name":"Is this VAT calculator free and private?","acceptedAnswer":{"@type":"Answer","text":"Yes. This VAT/GST calculator is 100% free, runs entirely in your browser, and never sends your numbers to any server. No signup is required."}},{"@type":"Question","name":"How do I remove VAT from a price?","acceptedAnswer":{"@type":"Answer","text":"Switch the calculator to 'Remove VAT' mode, enter the tax-inclusive (gross) price and the rate. The tool shows the net amount, the VAT portion and confirms the gross total."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="vat-mode" id="mode"></div>
    <div class="vat-grid">
      <div><label id="lbl-amount"></label><input type="number" id="amount" value="100" min="0" step="0.01"></div>
      <div><label id="lbl-rate"></label><select id="country"></select></div>
      <div style="grid-column:1/-1"><label id="lbl-custom"></label><input type="number" id="customRate" value="" placeholder="" min="0" max="100" step="0.1"></div>
    </div>
    <div class="vat-results" id="results"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'VAT & GST Calculator',
    toolDesc: 'Add or remove VAT / GST from any amount. Pick a country rate or enter your own — net, tax and gross shown instantly.',
    modeAdd: 'Add VAT/GST',
    modeRemove: 'Remove VAT/GST',
    amount: 'Amount',
    country: 'Country / Region Rate',
    custom: 'Custom rate (%) — overrides the dropdown',
    addTitle: '➕ Add VAT / GST to a Net Amount',
    remTitle: '➖ Remove VAT / GST from a Gross Amount',
    netLabel: 'Net amount (tax-free)',
    grossLabel: 'Gross amount (tax-inclusive)',
    taxLabel: 'VAT / GST amount',
    totalLabel: 'Gross total (incl. tax)',
    step1: 'Pick Add or Remove VAT/GST mode at the top',
    step2: 'Enter your amount and choose a country rate or a custom %',
    step3: 'Read the net, tax and gross results instantly',
    step4: 'Use a custom rate for any rate not in the list',
    currency: '$',
  },
  zh: {
    toolTitle: '增值税 / GST 计算器',
    toolDesc: '从任意金额中添加或去除增值税（VAT）/ GST。选择国家税率或自定义税率，即时显示不含税价、税额和含税总价。',
    modeAdd: '添加增值税 / GST',
    modeRemove: '去除增值税 / GST',
    amount: '金额',
    country: '国家 / 地区税率',
    custom: '自定义税率 (%) — 将覆盖下拉选择',
    addTitle: '➕ 为不含税金额添加增值税 / GST',
    remTitle: '➖ 从含税总价中去除增值税 / GST',
    netLabel: '不含税金额',
    grossLabel: '含税总金额',
    taxLabel: '增值税 / GST 税额',
    totalLabel: '含税总价',
    step1: '在顶部选择「添加」或「去除」增值税 / GST',
    step2: '输入金额并选择国家税率或自定义百分比',
    step3: '即时查看不含税价、税额和含税总价',
    step4: '列表中没有的税率可使用自定义输入',
    currency: '¥',
  }
});
const { $, t } = GZ;

// Country / region VAT & GST rates (commonly searched)
const RATES = [
  { c: '🇬🇧 United Kingdom — VAT 20%', r: 20, sym: '£' },
  { c: '🇩🇪 Germany — VAT 19%', r: 19, sym: '€' },
  { c: '🇫🇷 France — VAT 20%', r: 20, sym: '€' },
  { c: '🇮🇹 Italy — VAT 22%', r: 22, sym: '€' },
  { c: '🇪🇸 Spain — VAT 21%', r: 21, sym: '€' },
  { c: '🇳🇱 Netherlands — VAT 21%', r: 21, sym: '€' },
  { c: '🇮🇪 Ireland — VAT 23%', r: 23, sym: '€' },
  { c: '🇸🇪 Sweden — VAT 25%', r: 25, sym: 'kr' },
  { c: '🇳🇴 Norway — VAT 25%', r: 25, sym: 'kr' },
  { c: '🇩🇰 Denmark — VAT 25%', r: 25, sym: 'kr' },
  { c: '🇵🇱 Poland — VAT 23%', r: 23, sym: 'zł' },
  { c: '🇵🇹 Portugal — VAT 23%', r: 23, sym: '€' },
  { c: '🇬🇷 Greece — VAT 24%', r: 24, sym: '€' },
  { c: '🇨🇭 Switzerland — VAT 8.1%', r: 8.1, sym: 'CHF' },
  { c: '🇦🇹 Austria — VAT 20%', r: 20, sym: '€' },
  { c: '🇧🇪 Belgium — VAT 21%', r: 21, sym: '€' },
  { c: '🇮🇳 India — GST 18%', r: 18, sym: '₹' },
  { c: '🇦🇺 Australia — GST 10%', r: 10, sym: 'A$' },
  { c: '🇳🇿 New Zealand — GST 15%', r: 15, sym: 'NZ$' },
  { c: '🇨🇦 Canada — GST 5%', r: 5, sym: 'C$' },
  { c: '🇸🇬 Singapore — GST 9%', r: 9, sym: 'S$' },
  { c: '🇲🇾 Malaysia — SST 8%', r: 8, sym: 'RM' },
  { c: '🇯🇵 Japan — CT 10%', r: 10, sym: '¥' },
  { c: '🇿🇦 South Africa — VAT 15%', r: 15, sym: 'R' },
  { c: '🇦🇪 UAE — VAT 5%', r: 5, sym: 'AED' },
  { c: '🇸🇦 Saudi Arabia — VAT 15%', r: 15, sym: 'SAR' },
  { c: '🇲🇽 Mexico — IVA 16%', r: 16, sym: '$' },
  { c: '🇧🇷 Brazil — ICMS 17%', r: 17, sym: 'R$' },
];

let mode = 'add';
const fmt = (n, sym) => {
  const v = (Math.round(n * 100) / 100).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return (sym ? sym + ' ' : '') + v;
};

function buildCountryList() {
  $('#country').innerHTML = RATES.map((r, i) => `<option value="${i}">${r.c}</option>`).join('');
}

function getRateSym() {
  const cr = parseFloat($('#customRate').value);
  if (!isNaN(cr) && cr >= 0) return { rate: cr, sym: RATES[$('#country').value | 0].sym };
  const sel = RATES[$('#country').value | 0];
  return { rate: sel.r, sym: sel.sym };
}

function calc() {
  const amt = parseFloat($('#amount').value);
  const { rate, sym } = getRateSym();
  const res = $('#results');
  if (isNaN(amt) || amt < 0) { res.innerHTML = `<p style="color:var(--gz-text-muted)">${t('amount')}…</p>`; return; }
  let net, tax, gross, primary;
  if (mode === 'add') {
    net = amt; tax = amt * rate / 100; gross = net + tax;
    primary = `<div class="vat-row"><span class="lbl">${t('netLabel')}</span><span class="val">${fmt(net, sym)}</span></div>`;
  } else {
    gross = amt; net = amt / (1 + rate / 100); tax = gross - net;
    primary = `<div class="vat-row"><span class="lbl">${t('grossLabel')}</span><span class="val">${fmt(gross, sym)}</span></div>`;
  }
  const title = mode === 'add' ? t('addTitle') : t('remTitle');
  res.innerHTML = `
    <h3 style="margin:.4rem 0 1rem;color:var(--gz-accent)">${title}</h3>
    ${primary}
    <div class="vat-row"><span class="lbl">${t('taxLabel')} (${rate}%)</span><span class="val">${fmt(tax, sym)}</span></div>
    <div class="vat-row total"><span class="lbl">${t('totalLabel')}</span><span class="val">${fmt(gross, sym)}</span></div>`;
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.vat-mode button').forEach(b => b.classList.toggle('active', b.dataset.m === m));
  calc();
}

$('#mode').innerHTML = `<button data-m="add" class="active" onclick="setMode('add')">${t('modeAdd')}</button><button data-m="remove" onclick="setMode('remove')">${t('modeRemove')}</button>`;
$('#lbl-amount').textContent = t('amount');
$('#lbl-rate').textContent = t('country');
$('#lbl-custom').textContent = t('custom');
$('#toolbar').innerHTML = '';
buildCountryList();
['amount', 'country', 'customRate'].forEach(id => $('#' + id).addEventListener('input', calc));
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1', 'step2', 'step3', 'step4'],
  related: [
    { icon: '💸', href: '/calc/tax-calculator.html', name: 'US Tax' },
    { icon: '🏷️', href: '/calc/discount-calculator.html', name: 'Discount' },
    { icon: '🏦', href: '/calc/loan-calculator.html', name: 'Loan' },
    { icon: '🧾', href: '/text/invoice-generator.html', name: 'Invoice' },
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
