<style>
.pw-input{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
@media(max-width:680px){.pw-input{grid-template-columns:1fr}}
.pw-card{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:18px}
.pw-card label{display:block;font-size:.8rem;margin-bottom:6px;color:var(--text2);font-weight:600}
.pw-card input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--glass2);color:var(--text);font-size:1rem;font-family:inherit}
.pw-card input[type=date]{color-scheme:dark light}
.pw-toggle{display:flex;gap:8px;margin-bottom:14px}
.pw-toggle button{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--glass2);color:var(--text);cursor:pointer;font-size:.9rem;font-family:inherit;transition:all .2s}
.pw-toggle button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.pw-results{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:18px}
.pw-result{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center}
.pw-result .val{font-size:1.6rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pw-result .lbl{font-size:.78rem;color:var(--text2);margin-top:6px}
.pw-result.highlight{border:2px solid var(--accent);background:rgba(78,205,196,.08)}
.pw-progress{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:18px}
.pw-progress h3{margin-bottom:14px;color:var(--accent);display:flex;justify-content:space-between;align-items:center}
.pw-bar{height:28px;background:var(--glass2);border-radius:14px;overflow:hidden;position:relative}
.pw-bar-fill{height:100%;background:linear-gradient(90deg,#e94560,#ff9f43,#00d672);border-radius:14px;transition:width .5s}
.pw-bar-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:.78rem;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.pw-trimesters{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}
@media(max-width:560px){.pw-trimesters{grid-template-columns:1fr}}
.pw-trim{background:var(--glass2);padding:14px;border-radius:10px;text-align:center;font-size:.82rem}
.pw-trim strong{display:block;font-size:1rem;margin-bottom:4px;color:var(--accent)}
.pw-trim.active{border:2px solid var(--accent);background:rgba(78,205,196,.1)}
.pw-baby{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:18px;text-align:center}
.pw-baby h3{margin-bottom:12px;color:var(--accent)}
.pw-baby-size{font-size:2rem;margin-bottom:8px}
.pw-baby-desc{font-size:.92rem;color:var(--text2);line-height:1.5}
.pw-milestone{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:18px}
.pw-milestone h3{margin-bottom:12px;color:var(--accent)}
.pw-milestone-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:.88rem}
.pw-milestone-row:last-child{border-bottom:none}
.pw-milestone-row .date{color:var(--accent);font-weight:600}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Pregnancy Week Calculator","description":"Find out exactly how many weeks pregnant you are. Enter your due date or last menstrual period to see your current pregnancy week, day, trimester and baby size comparison. Free, private, browser-only.","url":"https://tools.gamezipper.com/calc/pregnancy-week.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate how many weeks pregnant I am?", "acceptedAnswer": {"@type": "Answer", "text": "Pregnancy is counted from the first day of your last menstrual period (LMP), not from conception. Subtract your LMP date from today to get the number of days, then divide by 7 for the week. For example, 21 days = 3 weeks pregnant. This calculator does it instantly."}}, {"@type": "Question", "name": "Can I use my due date instead of LMP?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. If you know your estimated due date (EDD), the calculator works backwards. Your due date is 40 weeks from your LMP, so we subtract 40 weeks from the EDD to find your LMP and then calculate your current week."}}, {"@type": "Question", "name": "What are the three trimesters?", "acceptedAnswer": {"@type": "Answer", "text": "First trimester: weeks 1-13. Second trimester: weeks 14-27. Third trimester: weeks 28-40. Each trimester has different developmental milestones for the baby and different symptoms for the mother."}}, {"@type": "Question", "name": "Is a full pregnancy really 40 weeks?", "acceptedAnswer": {"@type": "Answer", "text": "A full-term pregnancy is 40 weeks from the LMP, but babies born between 37 and 42 weeks are considered full-term. Only about 5% of babies are born on their exact due date — most arrive within two weeks of it."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="pw-toggle">
      <button id="mode-lmp" class="active" onclick="setMode('lmp')"></button>
      <button id="mode-edd" onclick="setMode('edd')"></button>
    </div>
    <div class="pw-input">
      <div class="pw-card">
        <label id="lbl-date"></label>
        <input type="date" id="inputDate">
      </div>
      <div class="pw-card">
        <label id="lbl-today"></label>
        <input type="date" id="todayDate">
      </div>
    </div>
    <div class="gz-toolbar" style="margin-bottom:18px">
      <button class="gz-btn" id="btn-calc" onclick="calculate()"></button>
    </div>
    <div id="output"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Pregnancy Week Calculator',
    toolDesc: 'Find out exactly how many weeks pregnant you are. See your current week, day, trimester and baby size. Free, private, browser-only.',
    modeLmp: 'I know my LMP', modeEdd: 'I know my Due Date',
    lblDateLmp: 'Last Menstrual Period (LMP) Date', lblDateEdd: 'Estimated Due Date (EDD)', lblToday: 'Today\'s Date',
    calculate: 'Calculate',
    weeksPregnant: 'Weeks Pregnant', daysAlong: 'Days Along', currentTrimester: 'Current Trimester',
    daysLeft: 'Days Until Due Date', dueDate: 'Estimated Due Date',
    trimester1: 'First Trimester', trimester2: 'Second Trimester', trimester3: 'Third Trimester',
    trim1Range: 'Weeks 1–13', trim2Range: 'Weeks 14–27', trim3Range: 'Weeks 28–40',
    progress: 'Pregnancy Progress',
    babySize: 'Your Baby is About', babySizeDesc: 'The size of',
    milestones: 'Upcoming Milestones',
    enterDate: 'Please enter a date to calculate.',
    weeksWord: 'weeks', daysWord: 'days',
    step1: 'Choose whether you know your LMP or your due date',
    step2: 'Enter the date in the input field',
    step3: 'Click Calculate to see your current pregnancy week and trimester',
    step4: 'Check your baby size comparison and upcoming milestones',
  },
  zh: {
    toolTitle: '孕周计算器',
    toolDesc: '精确计算你怀孕几周了。查看当前孕周、天数、孕期阶段和宝宝大小对比。免费、私密、浏览器本地运行。',
    modeLmp: '我知道末次月经', modeEdd: '我知道预产期',
    lblDateLmp: '末次月经日期 (LMP)', lblDateEdd: '预产期 (EDD)', lblToday: '今天日期',
    calculate: '计算',
    weeksPregnant: '怀孕周数', daysAlong: '怀孕天数', currentTrimester: '当前孕期',
    daysLeft: '距离预产期天数', dueDate: '预产期',
    trimester1: '孕早期', trimester2: '孕中期', trimester3: '孕晚期',
    trim1Range: '第 1-13 周', trim2Range: '第 14-27 周', trim3Range: '第 28-40 周',
    progress: '孕期进度',
    babySize: '你的宝宝大约', babySizeDesc: '相当于',
    milestones: '即将到来的里程碑',
    enterDate: '请输入日期进行计算。',
    weeksWord: '周', daysWord: '天',
    step1: '选择你知道末次月经日期还是预产期',
    step2: '在输入框中输入日期',
    step3: '点击「计算」查看当前孕周和孕期阶段',
    step4: '查看宝宝大小对比和即将到来的里程碑',
  }
});

const { $, t } = GZ;
const DAY = 86400000;
let mode = 'lmp';

// Baby size comparisons by week (fruit/vegetable analogy)
const BABY_SIZES = [
  {max:4, emoji:'🌾', en:'a poppy seed', zh:'一粒罂粟籽'},
  {max:6, emoji:'🫘', en:'a lentil', zh:'一粒扁豆'},
  {max:8, emoji:'🫐', en:'a blueberry', zh:'一颗蓝莓'},
  {max:10, emoji:'🍇', en:'a grape', zh:'一颗葡萄'},
  {max:12, emoji:'🍓', en:'a strawberry', zh:'一颗草莓'},
  {max:14, emoji:'🍑', en:'a peach', zh:'一个桃子'},
  {max:17, emoji:'🥑', en:'an avocado', zh:'一个牛油果'},
  {max:20, emoji:'🫑', en:'a bell pepper', zh:'一个青椒'},
  {max:23, emoji:'🌽', en:'an ear of corn', zh:'一根玉米'},
  {max:27, emoji:'🥬', en:'a head of lettuce', zh:'一颗生菜'},
  {max:30, emoji:'🥥', en:'a coconut', zh:'一个椰子'},
  {max:33, emoji:'🍍', en:'a pineapple', zh:'一个菠萝'},
  {max:37, emoji:'🥒', en:'a bunch of leeks', zh:'一捆韭葱'},
  {max:40, emoji:'🎃', en:'a small pumpkin', zh:'一个小南瓜'},
  {max:99, emoji:'👶', en:'a newborn', zh:'新生儿'},
];

function getBabySize(week){
  const lang = GZI18n.getLang();
  for(const s of BABY_SIZES){
    if(week <= s.max) return {emoji: s.emoji, text: lang === 'zh' ? s.zh : s.en};
  }
  return {emoji:'👶', text:'a newborn'};
}

function fmt(date){ return date.toLocaleDateString('en-CA'); }
function fmtNice(date){ return date.toLocaleDateString(undefined, {weekday:'short', year:'numeric', month:'long', day:'numeric'}); }

function setMode(m){
  mode = m;
  $('#mode-lmp').classList.toggle('active', m === 'lmp');
  $('#mode-edd').classList.toggle('active', m === 'edd');
  $('#lbl-date').textContent = m === 'lmp' ? t('lblDateLmp') : t('lblDateEdd');
  calculate();
}

function calculate(){
  const dateStr = $('#inputDate').value;
  if(!dateStr){ $('#output').innerHTML = `<div style="text-align:center;padding:30px;color:var(--text2)">${t('enterDate')}</div>`; return; }

  const inputDate = new Date(dateStr);
  const today = new Date($('#todayDate').value || fmt(new Date()));

  let lmpDate, eddDate;
  if(mode === 'lmp'){
    lmpDate = inputDate;
    eddDate = new Date(lmpDate.getTime() + 280 * DAY); // 40 weeks
  } else {
    eddDate = inputDate;
    lmpDate = new Date(eddDate.getTime() - 280 * DAY);
  }

  const daysPregnant = Math.floor((today.getTime() - lmpDate.getTime()) / DAY);
  const weeksPregnant = Math.floor(daysPregnant / 7);
  const dayOfWeek = daysPregnant % 7;
  const daysLeft = Math.floor((eddDate.getTime() - today.getTime()) / DAY);
  const progress = Math.max(0, Math.min(100, (daysPregnant / 280) * 100));

  let trimester, trimNum;
  if(weeksPregnant <= 13){ trimester = t('trimester1'); trimNum = 1; }
  else if(weeksPregnant <= 27){ trimester = t('trimester2'); trimNum = 2; }
  else { trimester = t('trimester3'); trimNum = 3; }

  const baby = getBabySize(Math.max(1, weeksPregnant));
  const isBorn = daysPregnant >= 280;

  // Milestones
  const milestones = [
    {week: 13, en: 'End of first trimester', zh: '孕早期结束'},
    {week: 20, en: 'Anatomy scan ultrasound', zh: '大排畸 B 超'},
    {week: 24, en: 'Viability milestone (24w)', zh: '存活里程碑 (24 周)'},
    {week: 28, en: 'Start of third trimester', zh: '孕晚期开始'},
    {week: 36, en: 'Considered early-term', zh: '足月早期'},
    {week: 40, en: 'Due date!', zh: '预产期！'},
  ];
  const lang = GZI18n.getLang();

  let milestoneHtml = '';
  milestones.forEach(m => {
    if(m.week > weeksPregnant){
      const mDate = new Date(lmpDate.getTime() + m.week * 7 * DAY);
      milestoneHtml += `<div class="pw-milestone-row"><span>${lang === 'zh' ? m.zh : m.en} (Week ${m.week})</span><span class="date">${fmtNice(mDate)}</span></div>`;
    }
  });
  if(!milestoneHtml) milestoneHtml = `<div class="pw-milestone-row"><span>${lang === 'zh' ? '已过预产期' : 'Past due date'}</span><span class="date">${fmtNice(eddDate)}</span></div>`;

  $('#output').innerHTML = `
    <div class="pw-results">
      <div class="pw-result highlight">
        <div class="val">${Math.max(0, weeksPregnant)}<span style="font-size:1rem">w ${dayOfWeek}d</span></div>
        <div class="lbl">${t('weeksPregnant')}</div>
      </div>
      <div class="pw-result">
        <div class="val">${Math.max(0, daysPregnant)}</div>
        <div class="lbl">${t('daysAlong')}</div>
      </div>
      <div class="pw-result">
        <div class="val">${trimester}</div>
        <div class="lbl">${t('currentTrimester')}</div>
      </div>
      <div class="pw-result">
        <div class="val" style="color:${daysLeft < 0 ? 'var(--accent)' : 'inherit'}">${Math.abs(daysLeft)}</div>
        <div class="lbl">${daysLeft < 0 ? (lang === 'zh' ? '天已过预产期' : 'days past due') : t('daysLeft')}</div>
      </div>
    </div>

    <div class="pw-baby">
      <h3>${t('babySize')}</h3>
      <div class="pw-baby-size">${baby.emoji}</div>
      <div class="pw-baby-desc">${t('babySizeDesc')} <strong>${baby.text}</strong></div>
    </div>

    <div class="pw-progress">
      <h3><span>${t('progress')}</span><span style="font-size:.85rem">${progress.toFixed(0)}%</span></h3>
      <div class="pw-bar">
        <div class="pw-bar-fill" style="width:${progress}%"></div>
        <div class="pw-bar-text">${Math.max(0, weeksPregnant)} / 40 ${t('weeksWord')}</div>
      </div>
      <div class="pw-trimesters">
        <div class="pw-trim ${trimNum===1?'active':''}"><strong>${t('trimester1')}</strong>${t('trim1Range')}</div>
        <div class="pw-trim ${trimNum===2?'active':''}"><strong>${t('trimester2')}</strong>${t('trim2Range')}</div>
        <div class="pw-trim ${trimNum===3?'active':''}"><strong>${t('trimester3')}</strong>${t('trim3Range')}</div>
      </div>
    </div>

    <div class="pw-milestone">
      <h3>${t('milestones')}</h3>
      ${milestoneHtml}
    </div>

    <div style="text-align:center;padding:12px;font-size:.85rem;color:var(--text2)">
      ${t('dueDate')}: <strong style="color:var(--accent)">${fmtNice(eddDate)}</strong>
    </div>`;
}

// Init
$('#mode-lmp').textContent = t('modeLmp');
$('#mode-edd').textContent = t('modeEdd');
$('#lbl-date').textContent = t('lblDateLmp');
$('#lbl-today').textContent = t('lblToday');
$('#btn-calc').textContent = t('calculate');
$('#todayDate').value = fmt(new Date());
// Default LMP: 10 weeks ago
$('#inputDate').value = fmt(new Date(Date.now() - 70 * DAY));

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🤰', href:'/calc/pregnancy-due-date.html', name:'Pregnancy Due Date'},
    {icon:'🤰', href:'/calc/pregnancy-weight-gain.html', name:'Pregnancy Weight Gain'},
    {icon:'🌸', href:'/calc/ovulation-calculator.html', name:'Ovulation Calculator'},
    {icon:'🗓️', href:'/calc/date-calculator.html', name:'Date Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
