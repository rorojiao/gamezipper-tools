<script type="application/ld+json">{"@context":"https://***@type":"WebApplication","name":"Cylinder Volume Calculator","description":"Free online cylinder volume calculator. Compute the volume of a right circular, hollow, or oblique cylinder instantly. Enter radius and height to get V = πr²h in cubic units.","url":"https://tools.gamezipper.com/calc/cylinder-volume-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is the formula for the volume of a cylinder?","acceptedAnswer":{"@type":"Answer","text":"The volume of a right circular cylinder is V = π × r² × h, where r is the radius of the base and h is the height. For example, a cylinder with radius 3 and height 10 has volume π × 9 × 10 ≈ 282.74 cubic units."}},{"@type":"Question","name":"How do I calculate the volume of a hollow cylinder?","acceptedAnswer":{"@type":"Answer","text":"For a hollow cylinder (tube/pipe), the volume is V = π × (R² - r²) × h, where R is the outer radius, r is the inner radius, and h is the height. This gives the volume of the material between the inner and outer walls."}},{"@type":"Question","name":"What units should I use?","acceptedAnswer":{"@type":"Answer","text":"You can use any length unit (mm, cm, m, in, ft, etc.) for radius and height. The volume will be in the corresponding cubic unit (mm³, cm³, m³, in³, ft³). The calculator also converts to liters and gallons for convenience."}},{"@type":"Question","name":"What is the difference between surface area and volume of a cylinder?","acceptedAnswer":{"@type":"Answer","text":"Volume measures the 3D space inside the cylinder (V = πr²h), measured in cubic units. Surface area measures the total area of all faces including the curved side and two circular bases, measured in square units."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="mode-tabs" id="modeTabs"></div>
    <div class="formula" id="formulaBox"></div>
    <div class="cv-grid" id="inputGrid"></div>
    <div class="result-card">
      <h3 id="hResult">📊 Results</h3>
      <div id="resultOut"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{toolTitle:'Cylinder Volume Calculator',toolDesc:'Calculate the volume of a right circular, hollow, or oblique cylinder using V = πr²h. Supports multiple units and converts to liters and gallons.',
    step1:'Select cylinder type: Right (solid), Hollow (tube/pipe), or Oblique',step2:'Enter the radius (and inner radius for hollow) and height',step3:'Choose your preferred unit (cm, m, in, ft, etc.)',step4:'View volume in cubic units, liters, and gallons instantly',
    modeRight:'Solid Cylinder',modeHollow:'Hollow (Tube)',modeOblique:'Oblique',
    lblR:'Radius (r)',lblInnerR:'Inner radius (r)',lblHeight:'Height (h)',lblOuterR:'Outer radius (R)',
    hResult:'📊 Results',
    volume:'Volume',surfArea:'Surface area',latArea:'Lateral surface area',baseArea:'Base area',
    formulaRight:'V = π × r² × h',formulaHollow:'V = π × (R² − r²) × h',formulaOblique:'V = π × r² × h',
    fill:'Material volume',capLiters:'Capacity (liters)',capGalUS:'Capacity (US gallons)',capGalUK:'Capacity (UK gallons)'},
  zh:{toolTitle:'圆柱体体积计算器',toolDesc:'使用 V = πr²h 计算直圆柱、空心圆柱或斜圆柱的体积。支持多种单位，并可换算为升和加仑。',
    step1:'选择圆柱体类型：实心、空心（管/管道）或斜圆柱',step2:'输入半径（空心圆柱还需内半径）和高度',step3:'选择单位（厘米、米、英寸、英尺等）',step4:'即时查看立方单位、升和加仑的体积结果',
    modeRight:'实心圆柱',modeHollow:'空心（管）',modeOblique:'斜圆柱',
    lblR:'半径 (r)',lblInnerR:'内半径 (r)',lblHeight:'高度 (h)',lblOuterR:'外半径 (R)',
    hResult:'📊 计算结果',
    volume:'体积',surfArea:'表面积',latArea:'侧面积',baseArea:'底面积',
    formulaRight:'V = π × r² × h',formulaHollow:'V = π × (R² − r²) × h',formulaOblique:'V = π × r² × h',
    fill:'材料体积',capLiters:'容量（升）',capGalUS:'容量（美制加仑）',capGalUK:'容量（英制加仑）'}
});
const{$,t}=GZ;
const PI=Math.PI;
const round=(v,d=4)=>{if(!isFinite(v))return'—';const p=Math.pow(10,d);return(Math.round(v*p)/p).toString();};
const UNITS={mm:0.001,cm:0.01,m:1,in:0.0254,ft:0.3048,yd:0.9144,km:1000};
const UNIT_LABELS={mm:'mm',cm:'cm',m:'m',in:'in',ft:'ft',yd:'yd',km:'km'};
let mode='right';
function unitSel(id,def){return`<select id="${id}">${Object.keys(UNITS).map(u=>`<option value="${u}"${u===def?' selected':''}>${UNIT_LABELS[u]}</option>`).join('')}</select>`;}
function numField(id,label,val,unitDef){return`<div class="cv-field"><label>${label}</label><div class="row"><input type="number" id="${id}" value="${val}" step="any" min="0">${unitSel(id+'Unit',unitDef)}</div></div>`;}
function renderInputs(){
  const u=mode;
  if(u==='right'){
    $('#inputGrid').innerHTML=numField('radius',t('lblR'),'5','cm')+numField('height',t('lblHeight'),'10','cm');
  }else if(u==='hollow'){
    $('#inputGrid').innerHTML=numField('outerR',t('lblOuterR'),'6','cm')+numField('innerR',t('lblInnerR'),'4','cm')+numField('height',t('lblHeight'),'10','cm');
  }else{
    $('#inputGrid').innerHTML=numField('radius',t('lblR'),'5','cm')+numField('height',t('lblHeight'),'10','cm');
  }
  ['radius','outerR','innerR','height'].forEach(id=>{const el=$('#'+id);if(el)el.addEventListener('input',compute);});
  ['radiusUnit','outerRUnit','innerRUnit','heightUnit'].forEach(id=>{const el=$('#'+id);if(el)el.addEventListener('change',compute);});
  $('#formulaBox').textContent=u==='hollow'?t('formulaHollow'):(u==='oblique'?t('formulaOblique'):t('formulaRight'));
}
function compute(){
  const toM=(v,u)=>v*UNITS[u];
  let volM3=0,surfM2=0,latM2=0,baseM2=0,fillM3=0;
  if(mode==='right'){
    const r=toM(parseFloat($('#radius').value)||0,$('#radiusUnit').value);
    const h=toM(parseFloat($('#height').value)||0,$('#heightUnit').value);
    volM3=PI*r*r*h;baseM2=PI*r*r;latM2=2*PI*r*h;surfM2=2*baseM2+latM2;fillM3=volM3;
  }else if(mode==='hollow'){
    const R=toM(parseFloat($('#outerR').value)||0,$('#outerRUnit').value);
    const ri=toM(parseFloat($('#innerR').value)||0,$('#innerRUnit').value);
    const h=toM(parseFloat($('#height').value)||0,$('#heightUnit').value);
    volM3=PI*(R*R-ri*ri)*h;fillM3=volM3;
    baseM2=PI*(R*R-ri*ri);latM2=2*PI*(R+ri)*h;surfM2=2*baseM2+latM2;
  }else{
    const r=toM(parseFloat($('#radius').value)||0,$('#radiusUnit').value);
    const h=toM(parseFloat($('#height').value)||0,$('#heightUnit').value);
    volM3=PI*r*r*h;baseM2=PI*r*r;latM2=2*PI*r*h;surfM2=2*baseM2+latM2;fillM3=volM3;
  }
  const uL=$('#heightUnit')?$('#heightUnit').value:($('#radiusUnit')?$('#radiusUnit').value:'cm');
  const cu=uL+'³', sq=uL+'²';
  const fromM3=(v)=>v/Math.pow(UNITS[uL],3);
  const fromM2=(v)=>v/Math.pow(UNITS[uL],2);
  const liters=volM3*1000;
  const galUS=volM3/0.00378541;
  const galUK=volM3/0.00454609;
  $('#resultOut').innerHTML=`
    <div class="row"><span class="k">${t('volume')}</span><span class="v">${round(fromM3(volM3))} ${cu}</span></div>
    <div class="row"><span class="k">${t('capLiters')}</span><span class="v">${round(liters,2)} L</span></div>
    <div class="row"><span class="k">${t('capGalUS')}</span><span class="v">${round(galUS,2)} gal</span></div>
    <div class="row"><span class="k">${t('capGalUK')}</span><span class="v">${round(galUK,2)} gal</span></div>
    <div class="row"><span class="k">${t('surfArea')}</span><span class="v">${round(fromM2(surfM2))} ${sq}</span></div>
    <div class="row"><span class="k">${t('latArea')}</span><span class="v">${round(fromM2(latM2))} ${sq}</span></div>
    <div class="row"><span class="k">${t('baseArea')}</span><span class="v">${round(fromM2(baseM2))} ${sq}</span></div>
  `;
}
$('#modeTabs').innerHTML=['right','hollow','oblique'].map(m=>`<button data-mode="${m}" class="${m==='right'?'active':''}" id="tab_${m}">${t('mode'+m.charAt(0).toUpperCase()+m.slice(1))}</button>`).join('');
['right','hollow','oblique'].forEach(m=>{$('#tab_'+m).addEventListener('click',()=>{mode=m;['right','hollow','oblique'].forEach(x=>$('#tab_'+x).classList.toggle('active',x===m));renderInputs();compute();});});
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="compute()">${t('calculate')}</button><button class="gz-btn gz-btn-secondary" onclick="GZ.copyText($('#resultOut').innerText)">${t('copy')}</button>`;
renderInputs();
compute();
GZ.renderToolPage({
  category:'calc',titleKey:'toolTitle',descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'🔵',href:'/calc/sphere-volume-calculator.html',name:'Sphere Volume'},
    {icon:'📐',href:'/calc/circle-calculator.html',name:'Circle Calculator'},
    {icon:'🧊',href:'/calc/cone-volume-calculator.html',name:'Cone Volume'},
    {icon:'📦',href:'/calc/volume-calculator.html',name:'Volume Calculator'}
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
