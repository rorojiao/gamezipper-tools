  zh: {

    toolDesc: '将 JSON 数组转换为 CSV 格式，支持嵌套对象扁平化和正确的字符转义。',
    inputLabel: 'JSON 输入',
    outputLabel: 'CSV 输出',
    convert: '转换',

    columns: '列',
    errorInvalidJSON: 'JSON 格式无效',
    errorNotArray: '输入必须是 JSON 数组或对象',
    separator: '分隔符',
    flatten: '扁平化嵌套',
    step1: '在输入区粘贴 JSON 数据（对象数组）',
    step2: '选择分隔符（逗号、制表符、分号）和选项',
    step3: '点击「转换」生成 CSV 输出',
    step4: '复制或下载 CSV 结果',

const { $, copyText, t } = GZ;

let sep = ',';

function flatten(obj, prefix = '') {
  const result = {};
  for (const [key, value] of Object.entries(obj)) {
    const newKey = prefix ? `${prefix}.${key}` : key;
    if (value && typeof value === 'object' && !Array.isArray(value)) {
      Object.assign(result, flatten(value, newKey));
    } else {
      result[newKey] = Array.isArray(value) ? JSON.stringify(value) : value;
    }
  }
  return result;
}

function escapeCSV(val, separator) {
  const str = val === null || val === undefined ? '' : String(val);
  if (str.includes(separator) || str.includes('"') || str.includes('\n') || str.includes('\r')) {
    return '"' + str.replace(/"/g, '""') + '"';
  }
  return str;
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    let data = JSON.parse(inp);
    if (!Array.isArray(data)) {
      if (typeof data === 'object' && data !== null) {
        data = [data];
      } else {
        $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('errorNotArray')}</span>`;
        return;
      }
    }

    const shouldFlatten = $('#flatten-check').checked;
    const processed = data.map(item => {
      if (typeof item !== 'object' || item === null) return { value: item };
      return shouldFlatten ? flatten(item) : item;
    });

    // Collect all headers
    const headers = new Set();
    processed.forEach(item => Object.keys(item).forEach(k => headers.add(k)));
    const headerArr = [...headers];

    // Build CSV
    let csv = headerArr.map(h => escapeCSV(h, sep)).join(sep) + '\n';
    processed.forEach(item => {
      csv += headerArr.map(h => escapeCSV(item[h], sep)).join(sep) + '\n';
    });

    $('#output').textContent = csv.trim();
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${processed.length} ${t('rowsExported')}, ${headerArr.length} ${t('columns')}</span>`;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('errorInvalidJSON')}: ${e.message}</span>`;
    $('#output').textContent = '';
  }
}

function loadExample() {
  $('#input').value = JSON.stringify([
    {"name":"Alice","age":30,"city":"New York","department":{"team":"Engineering","role":"Senior Developer"}},
    {"name":"Bob","age":25,"city":"San Francisco","department":{"team":"Design","role":"UI Designer"}},
    {"name":"Charlie","age":35,"city":"London","department":{"team":"Engineering","role":"Tech Lead"}},
    {"name":"Diana","age":28,"city":"Tokyo","department":{"team":"Marketing","role":"Content Strategist"}},
    {"name":"Eve","age":32,"city":"Berlin","department":{"team":"Engineering","role":"Backend Developer"}}
  ], null, 2);
  $('#flatten-check').checked = true;
  doConvert();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

function downloadCSV() {
  const csv = $('#output').textContent;
  if (!csv) return;
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'data.csv';
  a.click();
  URL.revokeObjectURL(url);
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <select class="gz-select" onchange="sep=this.value;doConvert()">
    <option value=",">${t('separator')}: ,</option>
    <option value="\t">${t('separator')}: Tab</option>
    <option value=";">${t('separator')}: ;</option>
  </select>
  <label style="display:inline-flex;align-items:center;gap:4px;font-size:.85em;cursor:pointer"><input type="checkbox" id="flatten-check" checked onchange="doConvert()"> ${t('flatten')}</label>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadCSV()">CSV ↓</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
