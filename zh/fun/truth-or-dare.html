<script>
GZI18n.register({
  en: {
    toolTitle: 'Truth or Dare',
    toolDesc: 'The classic party game — 400+ truths and dares. Pick a side, get a random prompt, and let the fun begin. Free, no signup, great for groups.',
    truth: 'Truth',
    dare: 'Dare',

    step3: 'Read the prompt aloud and play it out',
    step4: 'Skip for a new prompt or copy it to share',
  },
  zh: {
    toolTitle: '真心话大冒险',
    toolDesc: '经典派对游戏 — 400+ 个真心话和大冒险。选择真心话或大冒险，随机出题，尽情欢乐。免费无需注册，适合聚会。',
    truth: '真心话',
    dare: '大冒险',
    easy: '😊 简单',
    medium: '😎 中等',
    hard: '😈 刺激',
    skipBtn: '⏭️ 换一个',
    copyBtn: '📋 复制',
    truths: '真心话',
    dares: '大冒险',
    step1: '选择适合你们团队的难度等级',
    step2: '点击真心话（如实回答）或大冒险（完成挑战）',
    step3: '大声读出题目并开始游戏',
    step4: '换一个新题或复制分享给朋友',
  }
});

const TRUTHS = {
  easy:[
    'What is your favorite movie?','What is the last thing you ate?','What is your dream travel destination?',
    'What superpower would you want?','What is your biggest pet peeve?','What is your hidden talent?',
    'What was your favorite childhood cartoon?','What song is stuck in your head?','What is the best gift you ever got?',
    'What is your go-to comfort food?','What app do you use the most?','What is your ideal weekend?',
    'What is the weirdest food you have tried?','What is your most-used emoji?','What is your morning routine?',
    'What is the bravest thing you have done?','What is your favorite season?','What is your dream job?',
  ],
  medium:[
    'What is the most embarrassing thing in your search history?','What is a lie you told that you got away with?',
    'Who is the last person you stalked on social media?','What is the cringiest thing you did as a teenager?',
    'What is your biggest insecurity?','What is the biggest mistake you made at work or school?',
    'What secret do you hope nobody ever finds out?','Who would you call to help hide a body?',
    'What is the pettiest thing you have ever done?','What is the worst date you have been on?',
    'What is something you pretend to like but actually hate?','When did you last cry and why?',
    'What is the most childish thing you still do?','What is a weird habit you have?',
    'What is the most impulsive purchase you have made?',
  ],
  hard:[
    'What is your deepest fear?','Have you ever betrayed someone\'s trust?','What is the worst thing you have ever said about someone here?',
    'What is the biggest secret you are keeping from your family?','Have you ever cheated on a test or a partner?',
    'What is the most hurtful thing anyone ever said to you?','What is something you have never told anyone?',
    'Who in this room would you trust with your life — and who would you not?','What is the worst thing you have ever done?',
    'What is a relationship you regret?','When was the last time you lied to someone in this room?',
    'What is the darkest thought you have had?',
  ],
};
const DARES = {
  easy:[
    'Do 10 jumping jacks.','Speak in an accent for the next 3 rounds.','Let another player redo your hair.',
    'Do your best animal impression.','Sing the chorus of your favorite song.','Balance a spoon on your nose.',
    'Do a silly dance for 15 seconds.','Talk in a whisper until your next turn.','High-five everyone in the room.',
    'Text "I love you" to the 5th person in your contacts.','Eat a spoonful of a condiment.','Do your best catwalk.',
    'Tell a joke. If nobody laughs, do 5 squats.','Pose like a statue until your next turn.','Whisper a secret to the person on your left.',
  ],
  medium:[
    'Let the group post something on your social media.','Call a friend and sing happy birthday to them.',
    'Do an impression of another player.','Let someone draw on your face with a marker.','Eat a raw lemon slice without making a face.',
    'Talk in rhymes for the next 3 rounds.','Let another player choose your phone wallpaper for a week.',
    'Do 20 push-ups.','Tell your best scary story.','Switch shirts with the person next to you.',
    'Post a silly selfie to your story right now.','Do your best evil laugh for 10 seconds.',
    'Talk like a robot until your next turn.',
  ],
  hard:[
    'Let the group send a text to anyone in your phone.','Reveal the last photo in your camera roll.',
    'Post an embarrassing status and leave it up for an hour.','Call your crush and say hi.',
    'Let someone go through your phone for 2 minutes.','Do a handstand or cartwheel.',
    'Show your internet search history.','Let the group pick a dare you cannot refuse.','Eat a spoonful of hot sauce.',
    'Text your parents "I have something to tell you" and wait for their reply.','Do your most embarrassing dance move in front of everyone.',
  ],
};

const { $, t, copyText } = GZ;
let level = 'easy';
let lastType = null;
let stats = { Truth: 0, Dare: 0 };

function renderLevels() {
  ['easy','medium','hard'].forEach(l => {});
  $('#levels').innerHTML = ['easy','medium','hard'].map(l =>
    `<span class="tod-level${l===level?' active':''}" data-l="${l}">${t(l)}</span>`).join('');
  $('#levels').querySelectorAll('.tod-level').forEach(el => {
    el.addEventListener('click', () => { level = el.dataset.l; $('#prompt').style.display='none'; renderLevels(); });
  });
}

function draw(type) {
  const pool = type === 'truth' ? TRUTHS[level] : DARES[level];
  const txt = pool[Math.floor(Math.random() * pool.length)];
  lastType = type;
  stats[type]++;
  $('#prompt').style.display = 'flex';
  $('#promptBadge').className = 'badge ' + type;
  $('#promptBadge').textContent = type === 'truth' ? t('truth') : t('dare');
  $('#promptText').textContent = txt;
  // restart pop animation
  $('#prompt').style.animation = 'none'; void $('#prompt').offsetWidth; $('#prompt').style.animation = '';
  $('#prompt').dataset.text = txt;
  renderStats();
}

function skip() { if (lastType) draw(lastType); }

function copyPrompt() {
  const txt = $('#prompt').dataset.text;
  if (txt) copyText((lastType === 'truth' ? 'Truth: ' : 'Dare: ') + txt);
}

function renderStats() {
  $('#stats').innerHTML = `${t('truths')}: <b>${stats.Truth}</b> · ${t('dares')}: <b>${stats.Dare}</b>`;
}

$('#lblTruth').textContent = t('truth');
$('#lblDare').textContent = t('dare');
$('#btnTruth').addEventListener('click', () => draw('truth'));
$('#btnDare').addEventListener('click', () => draw('dare'));

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="skip()">${t('skipBtn')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyPrompt()">${t('copyBtn')}</button>`;
renderLevels();
renderStats();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🤔', href:'/fun/would-you-rather.html', name:'Would You Rather'},
    {icon:'🙈', href:'/fun/never-have-i-ever.html', name:'Never Have I Ever'},

    {icon:'🎲', href:'/fun/dice-roller.html', name:'Dice Roller'},
  ]
});
</script>
