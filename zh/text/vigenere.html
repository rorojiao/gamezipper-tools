});

const { $, copyText, t } = GZ;

function normalizeKey(key, alpha) {
  let s = key.toUpperCase();
  if (alpha === 'full') {
    s = s.split('').filter(c => c.charCodeAt(0) >= 32 && c.charCodeAt(0) <= 126).join('');
  } else {
    s = s.replace(/[^A-Z]/g, '');
  }
  return s;
}

function buildKeyStream(plainLen, key, autokey, alpha) {
  if (!key) return '';
  if (!autokey) {
    return key.repeat(Math.ceil(plainLen / key.length));
  }
  // Autokey: key + plaintext (normalized)
  return key; // We will append plaintext dynamically during cipher
}

function shift(ch, k, encrypt, alpha) {
  if (alpha === 'letters') {
    const code = ch.charCodeAt(0);
    const base = code >= 97 ? 97 : 65; // a-z or A-Z
    const isLetter = (code >= 65 && code <= 90) || (code >= 97 && code <= 122);
    if (!isLetter) return { out: ch, advance: false };
    const shiftAmt = k.charCodeAt(0) - 65;
    const shifted = ((((code - base) + (encrypt ? shiftAmt : -shiftAmt)) % 26) + 26) % 26;
    return { out: String.fromCharCode(base + shifted), advance: true };
  } else if (alpha === 'lower') {
    const code = ch.charCodeAt(0);
    if (code < 97 || code > 122) return { out: ch, advance: false };
    const shiftAmt = k.charCodeAt(0) - 97;
    const shifted = ((((code - 97) + (encrypt ? shiftAmt : -shiftAmt)) % 26) + 26) % 26;
    return { out: String.fromCharCode(97 + shifted), advance: true };
  } else {
    // full printable ASCII
    const code = ch.charCodeAt(0);
    if (code < 32 || code > 126) return { out: ch, advance: false };
    const shiftAmt = k.charCodeAt(0) - 32;
    const span = 95;
    const shifted = ((((code - 32) + (encrypt ? shiftAmt : -shiftAmt)) % span) + span) % span;
    return { out: String.fromCharCode(32 + shifted), advance: true };
  }
}

function process() {
  const keyRaw = $('#keyInput').value;
  const mode = $('#mode').value;
  const alpha = $('#alpha').value;
  const autokey = $('#autokey').checked;
  const inp = $('#input').value;
  const status = $('#status');
  if (!inp) { $('#output').value = ''; status.textContent = ''; return; }
  const key = normalizeKey(keyRaw, alpha);
  if (!key) {
    status.innerHTML = `<span class="err">⚠ Key is empty or contains no letters</span>`;
    status.className = 'vg-status err';
    $('#output').value = '';
    return;
  }
  // Build key stream source: if autokey, we extend with plaintext
  let ki = 0;
  let out = '';
  for (let i = 0; i < inp.length; i++) {
    const ch = inp[i];
    const k = key[ki % key.length];
    const { out: cOut } = shift(ch, k, mode === 'encrypt', alpha);
    out += cOut;
    // Determine if we advance key
    const ch2 = ch;
    const code = ch2.charCodeAt(0);
    let advances = true;
    if (alpha === 'letters') advances = (code >= 65 && code <= 90) || (code >= 97 && code <= 122);
    else if (alpha === 'lower') advances = (code >= 97 && code <= 122);
    else advances = (code >= 32 && code <= 126);
    if (advances) {
      if (autokey && ki >= key.length - 1) {
        // append plaintext to key
        if (alpha === 'full') {
          // For full ASCII autokey, use the shifted output char
          key += normalizeKey(cOut, alpha);
        } else {
          key += cOut.toUpperCase();
        }
      }
      ki++;
    }
  }
  $('#output').value = out;
  status.innerHTML = `<span class="ok">✓ ${mode === 'encrypt' ? 'Encrypted' : 'Decrypted'} ${inp.length} char${inp.length===1?'':'s'} with key "${keyRaw}"</span>`;
  status.className = 'vg-status ok';
}

function doClear() { $('#input').value = ''; $('#output').value = ''; $('#status').textContent = ''; }

function loadExample() {
  $('#mode').value = 'encrypt';
  $('#autokey').checked = false;
  $('#alpha').value = 'letters';
  $('#keyInput').value = 'LEMON';
  $('#input').value = 'ATTACK AT DAWN';
  process();
}

$('#input').addEventListener('input', process);
$('#keyInput').addEventListener('input', process);
$('#mode').addEventListener('change', process);
$('#alpha').addEventListener('change', process);
$('#autokey').addEventListener('change', process);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
