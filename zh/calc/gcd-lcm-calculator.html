<script>

    errEmpty: 'Please enter at least two numbers.',

  zh: {

    toolDesc: '计算两个或多个数的最大公约数（GCD）和最小公倍数（LCM），附带逐步欧几里得算法解释。',
    lblNumbers: '数字（逗号分隔）',
    gcdLabel: 'GCD（最大公约数）',
    lcmLabel: 'LCM（最小公倍数）',
    calculate: '计算',
    stepsTitle: '逐步欧几里得算法',
    stepDivide: '除以',
    stepRemainder: '余数',
    stepResult: 'GCD 已找到',
    stepLCM: 'LCM 计算',
    stepLCMFormula: '公式: (a × b) ÷ GCD(a, b)',
    errEmpty: '请输入至少两个数字。',
    errInvalid: '请输入有效的正整数。',
    step1: '输入两个或多个正整数，用逗号分隔',
    step2: '点击"计算"按钮计算 GCD 和 LCM',
    step3: '查看逐步欧几里得算法的详细解释',
    step4: '使用"清空"按钮重置并尝试不同的数字',
  }
});

const { $, copyText, t } = GZ;

function gcd(a, b) {
  while (b !== 0) { [a, b] = [b, a % b]; }
  return a;
}

function lcm(a, b) {
  return (a / gcd(a, b)) * b;
}

function gcdSteps(a, b) {
  const steps = [];
  let origA = a, origB = b;
  while (b !== 0) {
    const q = Math.floor(a / b);
    const r = a % b;
    steps.push({ a, b, q, r });
    [a, b] = [b, r];
  }
  steps.push({ result: a });
  return steps;
}

function calculate() {
  const raw = $('#numbers').value.trim();
  if (!raw) { showError(t('errEmpty')); return; }
  const nums = raw.split(/[,\s]+/).map(s => parseInt(s.trim())).filter(n => !isNaN(n) && n > 0);
  if (nums.length < 2) { showError(t('errInvalid')); return; }
  hideError();

  // Calculate GCD
  let currentGcd = nums[0];
  const allSteps = [];
  for (let i = 1; i < nums.length; i++) {
    const steps = gcdSteps(Math.max(currentGcd, nums[i]), Math.min(currentGcd, nums[i]));
    allSteps.push({ pair: [currentGcd, nums[i]], steps });
    currentGcd = gcd(Math.max(currentGcd, nums[i]), Math.min(currentGcd, nums[i]));
  }

  // Calculate LCM
  let currentLcm = nums[0];
  for (let i = 1; i < nums.length; i++) {
    currentLcm = lcm(Math.max(currentLcm, nums[i]), Math.min(currentLcm, nums[i]));
  }

  $('#gcd-value').textContent = currentGcd.toLocaleString();
  $('#lcm-value').textContent = currentLcm.toLocaleString();
  $('#results').style.display = 'grid';

  // Render steps
  let html = `<div class="step-title">${t('stepsTitle')}</div>`;
  allSteps.forEach((group, gi) => {
    html += `<div style="margin-top:10px"><b>GCD(${group.pair[0]}, ${group.pair[1]}):</b></div>`;
    group.steps.forEach(s => {
      if (s.result !== undefined) {
        html += `<div class="step-line">→ <span class="step-highlight">${t('stepResult')}: ${s.result}</span></div>`;
      } else {
        html += `<div class="step-line">${s.a} = ${s.b} × ${s.q} + ${s.r} <span style="opacity:.5">(${t('stepRemainder')}: ${s.r})</span></div>`;
      }
    });
  });

  html += `<div class="step-title" style="margin-top:14px">${t('stepLCM')}</div>`;
  html += `<div class="step-line">${t('stepLCMFormula')}</div>`;
  if (nums.length === 2) {
    html += `<div class="step-line">LCM = (${nums[0]} × ${nums[1]}) ÷ ${currentGcd} = <span class="step-highlight">${currentLcm}</span></div>`;
  } else {
    html += `<div class="step-line">LCM(${nums.join(', ')}) = <span class="step-highlight">${currentLcm}</span></div>`;
  }

  $('#steps').innerHTML = html;
  $('#steps').style.display = 'block';
}

function showError(msg) {
  $('#error').textContent = msg;
  $('#error').style.display = 'block';
  $('#results').style.display = 'none';
  $('#steps').style.display = 'none';
}
function hideError() { $('#error').style.display = 'none'; }
function doClear() {
  $('#numbers').value = '';
  $('#results').style.display = 'none';
  $('#steps').style.display = 'none';
  hideError();
}

$('#numbers').addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculate()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-numbers').textContent = t('lblNumbers');
$('#gcd-label').textContent = t('gcdLabel');
$('#lcm-label').textContent = t('lcmLabel');

GZ.renderToolPage({

    {icon:'📐', href:'/calc/prime-number.html', name:'Prime Number'},
  ]
});
</script>
