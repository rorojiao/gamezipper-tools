    step2: '开启自动背景移除',

const { $, t } = GZ;

let photoImg = null;
let processedCanvas = null; // Holds the cut-out image data

function processCutout(img){
  // Render image to temp canvas
  const tmp=document.createElement('canvas');
  const N=512;
  tmp.width=N;tmp.height=N;
  const tctx=tmp.getContext('2d');
  const s=Math.max(N/img.width,N/img.height);
  const sw=img.width*s,sh=img.height*s;
  tctx.drawImage(img,(N-sw)/2,(N-sh)/2,sw,sh);
  const data=tctx.getImageData(0,0,N,N);
  const px=data.data;
  // Sample corners to determine BG color
  const samples=[];
  const off=N*4;
  [[0,0],[N-1,0],[0,N-1],[N-1,N-1],[Math.floor(N/2),0],[0,Math.floor(N/2)]].forEach(([x,y])=>{
    const i=(y*N+x)*4;
    samples.push([px[i],px[i+1],px[i+2]]);
  });
  // Average BG color
  let br=0,bg=0,bb=0;
  samples.forEach(c=>{br+=c[0];bg+=c[1];bb+=c[2];});
  br/=samples.length;bg/=samples.length;bb/=samples.length;
  // Remove pixels within tolerance
  const tol=70;
  for(let i=0;i<px.length;i+=4){
    const dr=px[i]-br, dg=px[i+1]-bg, db=px[i+2]-bb;
    const dist=Math.sqrt(dr*dr+dg*dg+db*db);
    if(dist<tol){
      // smooth edge
      const a=Math.max(0,(dist-tol*0.5)/(tol*0.5))*255;
      px[i+3]=Math.min(px[i+3],a);
    }
  }
  tctx.putImageData(data,0,0);
  processedCanvas=tmp;
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function render(){
  const c=$('#canvas'),ctx=c.getContext('2d');
  const N=+$('#size').value;
  c.width=N;c.height=N;
  ctx.clearRect(0,0,N,N);

  if(!photoImg){
    // Placeholder
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.font=`${N*0.06}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('Upload a photo to begin →', N/2, N/2);
    return;
  }

  // Reprocess if cutout enabled
  if($('#cutout').value==='auto' && !processedCanvas){
    processCutout(photoImg);
  }
  if($('#cutout').value!=='auto') processedCanvas=null;

  const src = processedCanvas || photoImg;
  const border=$('#border').value;
  const bw = border==='none'?0:N*0.035;

  if(bw>0){
    // Render image slightly smaller, then trace a white silhouette behind
    // Step 1: draw silhouette by stamping the alpha mask offset in many directions
    const tmp=document.createElement('canvas');
    tmp.width=N;tmp.height=N;
    const tctx=tmp.getContext('2d');
    const innerSize=N-bw*2;
    const s=Math.max(innerSize/src.width, innerSize/src.height);
    const sw=src.width*s, sh=src.height*s;
    const dx=(N-sw)/2, dy=(N-sh)/2;
    // Trace outline by drawing the source shifted around in the border color
    tctx.fillStyle = border==='white'?'#fff':'#000';
    const steps=24;
    for(let a=0;a<steps;a++){
      const ang=(a/steps)*Math.PI*2;
      const ox=Math.cos(ang)*bw, oy=Math.sin(ang)*bw;
      tctx.drawImage(src,dx+ox,dy+oy,sw,sh);
    }
    // Composite original on top
    tctx.globalCompositeOperation='source-over';
    tctx.drawImage(src,dx,dy,sw,sh);
    ctx.drawImage(tmp,0,0);
  } else {
    const innerSize=N;
    const s=Math.max(innerSize/src.width, innerSize/src.height);
    const sw=src.width*s, sh=src.height*s;
    ctx.drawImage(src,(N-sw)/2,(N-sh)/2,sw,sh);
  }

  // Text overlay
  const txt=$('#stickerText').value;
  if(txt){
    const fs=+$('#textSize').value;
    ctx.fillStyle=$('#textColor').value;
    ctx.strokeStyle='#000';ctx.lineWidth=fs*0.08;
    ctx.font=`900 ${fs}px Arial, sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.lineJoin='round';
    ctx.strokeText(txt,N/2,N-fs*0.9);
    ctx.fillText(txt,N/2,N-fs*0.9);
  }
}

function downloadPNG(){
  const c=$('#canvas');
  if(!photoImg){alert(t('dropHint'));return;}
  const link=document.createElement('a');
  link.download='sticker-'+Date.now()+'.png';
  link.href=c.toDataURL('image/png');
  link.click();
}

function loadFile(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{photoImg=img;processedCanvas=null;document.getElementById('drop-text').textContent=t('dropLoaded');render();};
    img.src=ev.target.result;
  };
  r.readAsDataURL(file);
}

$('#lbl-upload').textContent=t('lblUpload');
$('#lbl-cutout').textContent=t('lblCutout');
$('#lbl-size').textContent=t('lblSize');
$('#lbl-border').textContent=t('lblBorder');
$('#lbl-text').textContent=t('lblText');
$('#lbl-tsize').textContent=t('lblTsize');
$('#lbl-tcolor').textContent=t('lblTcolor');
document.getElementById('drop-text').textContent=t('dropHint');

const drop=$('#drop'),fileInput=$('#file');
drop.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>loadFile(e.target.files[0]));
['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('drag');}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('drag');}));
drop.addEventListener('drop',e=>loadFile(e.dataTransfer.files[0]));

['size','border','textColor'].forEach(id=>$('#'+id).addEventListener('input',render));
$('#cutout').addEventListener('change',()=>{processedCanvas=null;render();});
$('#stickerText').addEventListener('input',render);
$('#textSize').addEventListener('input',e=>{$('#tsval').textContent=e.target.value;render();});

render();

$('#toolbar').innerHTML=`

  <button class="gz-btn gz-btn-secondary" onclick="photoImg=null;processedCanvas=null;document.getElementById('drop-text').textContent=t('dropHint');render()">${t('clearPhoto')}</button>`;
