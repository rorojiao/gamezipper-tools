<script>
GZI18n.register({
  en: {
    toolTitle: 'Pencil Sketch Effect',
    toolDesc: 'Turn photos into pencil sketch drawings. Adjust detail and brightness — free online tool, no upload needed.',
    dropImage: 'Drop an image here or click to upload',
    detail: 'Detail',
    brightness: 'Brightness',
    invertColors: 'Invert colors',
    step1: 'Upload a photo by dragging or clicking',
    step2: 'Adjust the detail level with the slider',
    step3: 'Fine-tune brightness for the perfect sketch',
    step4: 'Download the pencil sketch as PNG',
  },
  zh: {
    toolTitle: '铅笔素描效果',
    toolDesc: '将照片转换为铅笔素描画。可调整细节和亮度 — 免费在线工具，无需上传。',
    dropImage: '拖拽图片到此处或点击上传',
    detail: '细节',
    brightness: '亮度',
    invertColors: '反转颜色',
    step1: '拖拽或点击上传照片',
    step2: '使用滑块调整细节程度',
    step3: '调整亮度获得理想的素描效果',
    step4: '下载素描 PNG 图片',
  }
});

const { $, t } = GZ;
let srcImg = null;
let detail = 50;
let brightness = 0;
let invertMode = false;

const drop = $('#drop');
const fileInput = $('#file-input');
$('#drop-label').textContent = t('dropImage');

drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.style.borderColor = 'var(--gz-accent)'; });
drop.addEventListener('dragleave', () => { drop.style.borderColor = ''; });
drop.addEventListener('drop', e => { e.preventDefault(); drop.style.borderColor = ''; loadFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => loadFile(e.target.files[0]));

function loadFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => { srcImg = img; applySketch(); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function applySketch() {
  if (!srcImg) return;
  const canvas = $('#output');
  const maxW = 800;
  const scale = Math.min(1, maxW / srcImg.width);
  const w = Math.round(srcImg.width * scale);
  const h = Math.round(srcImg.height * scale);
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');

  // Draw original
  ctx.drawImage(srcImg, 0, 0, w, h);

  // Get pixel data
  let imageData = ctx.getImageData(0, 0, w, h);
  let data = imageData.data;

  // Convert to grayscale
  for (let i = 0; i < data.length; i += 4) {
    const gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
    data[i] = data[i+1] = data[i+2] = gray;
  }

  // Invert a copy for dodge blend
  const inverted = new Uint8ClampedArray(data.length);
  for (let i = 0; i < data.length; i += 4) {
    inverted[i] = 255 - data[i];
    inverted[i+1] = 255 - data[i+1];
    inverted[i+2] = 255 - data[i+2];
    inverted[i+3] = 255;
  }

  // Apply Gaussian blur to inverted
  const radius = Math.max(1, Math.round((101 - detail) / 10));
  const blurredInv = gaussianBlur(inverted, w, h, radius);

  // Color Dodge blend: result = original / (255 - blurred) * 255
  for (let i = 0; i < data.length; i += 4) {
    const a = data[i];
    const b = blurredInv[i];
    let val;
    if (b === 255) {
      val = 255;
    } else {
      val = Math.min(255, (a * 255) / (255 - b));
    }
    val = Math.max(0, Math.min(255, val + brightness));
    data[i] = data[i+1] = data[i+2] = invertMode ? 255 - val : val;
    data[i+3] = 255;
  }

  ctx.putImageData(imageData, 0, 0);
}

function gaussianBlur(data, w, h, r) {
  const out = new Uint8ClampedArray(data.length);
  const size = r * 2 + 1;
  const kernel = [];
  const sigma = r / 3;
  let sum = 0;
  for (let i = -r; i <= r; i++) {
    const v = Math.exp(-(i * i) / (2 * sigma * sigma));
    kernel.push(v); sum += v;
  }
  for (let i = 0; i < kernel.length; i++) kernel[i] /= sum;

  // Horizontal pass
  const temp = new Uint8ClampedArray(data.length);
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let rr = 0, gg = 0, bb = 0;
      for (let k = -r; k <= r; k++) {
        const xx = Math.min(w - 1, Math.max(0, x + k));
        const idx = (y * w + xx) * 4;
        rr += data[idx] * kernel[k + r];
        gg += data[idx+1] * kernel[k + r];
        bb += data[idx+2] * kernel[k + r];
      }
      const idx = (y * w + x) * 4;
      temp[idx] = rr; temp[idx+1] = gg; temp[idx+2] = bb; temp[idx+3] = 255;
    }
  }
  // Vertical pass
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let rr = 0, gg = 0, bb = 0;
      for (let k = -r; k <= r; k++) {
        const yy = Math.min(h - 1, Math.max(0, y + k));
        const idx = (yy * w + x) * 4;
        rr += temp[idx] * kernel[k + r];
        gg += temp[idx+1] * kernel[k + r];
        bb += temp[idx+2] * kernel[k + r];
      }
      const idx = (y * w + x) * 4;
      out[idx] = rr; out[idx+1] = gg; out[idx+2] = bb; out[idx+3] = 255;
    }
  }
  return out;
}

function download() {
  const canvas = $('#output');
  if (!canvas.width) return;
  const a = document.createElement('a');
  a.download = 'pencil-sketch.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="download()">${t('download')} PNG</button>`;

$('#controls').innerHTML = `
  <label>${t('detail')}: <input type="range" min="1" max="100" value="${detail}" oninput="detail=+this.value;$('#detailVal').textContent=this.value;applySketch()"><span id="detailVal">${detail}</span></label>
  <label>${t('brightness')}: <input type="range" min="-80" max="80" value="${brightness}" oninput="brightness=+this.value;$('#brightVal').textContent=this.value;applySketch()"><span id="brightVal">${brightness}</span></label>
  <label><input type="checkbox" onchange="invertMode=this.checked;applySketch()"> ${t('invertColors')}</label>`;

    {icon:'✏️', href:'/image/code-to-image.html', name:'Code to Image'},
  ]
});
</script>
