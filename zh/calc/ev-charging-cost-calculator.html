<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

    <div class="ev-hero">

        <div class="ev-field"><label id="lblBattery"></label><input type="number" id="battery" value="60" min="1" step="1"></div>
        <div class="ev-field"><label id="lblEff"></label><input type="number" id="eff" value="3.5" min="0.5" step="0.1"></div>
        <div class="ev-field"><label id="lblRate"></label><input type="number" id="rate" value="0.15" min="0" step="0.01"></div>
        <div class="ev-field"><label id="lblRange"></label>
          <div style="display:flex;gap:8px">
            <input type="number" id="fromPct" value="10" min="0" max="100" step="5" style="flex:1">
            <span style="align-self:center;opacity:.5">→</span>
            <input type="number" id="toPct" value="80" min="0" max="100" step="5" style="flex:1">
          </div>
        </div>

          <div class="ev-stat"><div class="l" id="lFull"></div><div class="v" id="fullCost">$0</div></div>
          <div class="ev-stat"><div class="l" id="lKwh"></div><div class="v" id="kwhUsed">0</div></div>
          <div class="ev-stat"><div class="l" id="lPerMile"></div><div class="v" id="perMile">$0</div></div>
          <div class="ev-stat"><div class="l" id="lRange"></div><div class="v" id="rangeAdded">0</div></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'EV Charging Cost Calculator',
    toolDesc: 'Calculate how much it costs to charge your electric vehicle (EV). Enter battery size, electricity rate and charge level to see the cost per charge, cost per mile/km, range added and annual savings versus petrol. Free, browser-based.',
    ev: 'EV & Charging', result: 'Cost Breakdown',
    battery: 'Battery capacity (kWh)', eff: 'Efficiency (miles per kWh)', rate: 'Electricity rate ($/kWh)',
    range: 'Charge from → to (%)',
    heroLbl: 'Cost For This Charge', heroSub: 'For the selected charge range',
    fullLbl: 'Full Charge Cost (0-100%)', kwhLbl: 'Energy Used', perMileLbl: 'Cost per Mile', rangeLbl: 'Range Added (miles)',
    savingsTitle: 'Annual Savings vs Petrol',
    copy: '📋 Copy Results', reset: '🔄 Reset',
    step1: 'Enter your EV battery capacity in kWh',
    step2: 'Set the efficiency (miles/km per kWh) and electricity rate',
    step3: 'Choose the charge range (e.g. 10% to 80%)',
    step4: 'See the cost, range added and savings versus petrol',
  },
  zh: {
    toolTitle: '电动车充电费用计算器',
    toolDesc: '计算为你的电动汽车 (EV) 充电需要多少钱。输入电池容量、电价和充电区间，查看每次充电费用、每公里费用、新增续航里程以及相对燃油车的年度节省。免费、浏览器本地运行。',
    ev: '电动车与充电', result: '费用明细',
    battery: '电池容量 (kWh)', eff: '能效 (每 kWh 公里数)', rate: '电价 ($/kWh)',
    range: '充电区间 (%)',
    heroLbl: '本次充电费用', heroSub: '按所选充电区间计算',
    fullLbl: '充满费用 (0-100%)', kwhLbl: '使用电量', perMileLbl: '每公里费用', rangeLbl: '新增续航 (公里)',
    savingsTitle: '相对燃油车年度节省',
    copy: '📋 复制结果', reset: '🔄 重置',
    step1: '输入电动车的电池容量（kWh）',
    step2: '设置能效（每 kWh 公里数）和电价',
    step3: '选择充电区间（如 10% 到 80%）',
    step4: '查看充电费用、新增续航和相对燃油车的节省',
  }
});

const { $, copyText, t } = GZ;
const isZh = GZI18n.getLang() === 'zh';

$('#lblEv').textContent=t('ev');$('#lblResult').textContent=t('result');$('#lblBattery').textContent=t('battery');
$('#lblEff').textContent=t('eff');$('#lblRate').textContent=t('rate');$('#lblRange').textContent=t('range');
$('#heroLbl').textContent=t('heroLbl');$('#heroSub').textContent=t('heroSub');
$('#lFull').textContent=t('fullLbl');$('#lKwh').textContent=t('kwhLbl');$('#lPerMile').textContent=t('perMileLbl');$('#lRange').textContent=t('rangeLbl');
$('#savingsTitle').textContent=t('savingsTitle');
// Localize eff/range labels for zh (km)
if(isZh){$('#lPerMile').textContent='每公里费用';$('#lRange').textContent='新增续航 (公里)';}

const presets=[
  ['Nissan Leaf',40,4.5],['Tesla Model 3',75,4.0],['Tesla Model Y',78,3.8],
  ['Hyundai Ioniq 5',77,3.5],['BYD Atto 3',60,5.5],['VW ID.4',77,3.4],
];
$('#presets').innerHTML=presets.map(([n,b,e])=>`<button onclick="loadPreset('${n}',${b},${e})">${n}</button>`).join('');
function loadPreset(n,b,e){$('#battery').value=b;$('#eff').value=e;calc();}

const PETROL_PER_MILE=0.10; // approx $/mile for ICE comparison baseline (USD); per mile ~ equivalent
const PETROL_PER_KM=0.075;
const ANNUAL_MILES=12000, ANNUAL_KM=20000;

function calc(){
  const battery=+$('#battery').value||0,eff=+$('#eff').value||1,rate=+$('#rate').value||0;
  const fromP=+$('#fromPct').value||0,toP=+$('#toPct').value||0;
  if(battery<=0||eff<=0){return;}
  const from=Math.min(fromP,toP),to=Math.max(fromP,toP);
  const pct=(to-from)/100;
  const kwhUsed=battery*pct;
  const chargeCost=kwhUsed*rate;
  const fullCost=battery*rate;
  const unitDist=isZh?'km':'mi';
  const rangeAdded=kwhUsed*eff;
  const perDist=rangeAdded>0?chargeCost/rangeAdded:0;
  $('#chargeCost').textContent='$'+chargeCost.toFixed(2);
  $('#fullCost').textContent='$'+fullCost.toFixed(2);
  $('#kwhUsed').textContent=kwhUsed.toFixed(1)+' kWh';
  $('#perMile').textContent='$'+perDist.toFixed(3)+'/'+unitDist;
  $('#rangeAdded').textContent=rangeAdded.toFixed(0)+' '+unitDist;
  // Savings vs petrol
  const petrolRate=isZh?PETROL_PER_KM:PETROL_PER_MILE;
  const annualDist=isZh?ANNUAL_KM:ANNUAL_MILES;
  const annualEv=perDist*annualDist;
  const annualPetrol=petrolRate*annualDist;
  const savings=annualPetrol-annualEv;
  $('#savings').textContent='$'+Math.max(0,savings).toLocaleString(undefined,{maximumFractionDigits:0});
  $('#savingsSub').textContent=isZh
    ?`电动 ≈ $${annualEv.toLocaleString(undefined,{maximumFractionDigits:0})}/yr · 燃油 ≈ $${annualPetrol.toLocaleString(undefined,{maximumFractionDigits:0})}/yr · ${annualDist.toLocaleString()} km/yr`
    :`EV ≈ $${annualEv.toLocaleString(undefined,{maximumFractionDigits:0})}/yr · Petrol ≈ $${annualPetrol.toLocaleString(undefined,{maximumFractionDigits:0})}/yr · ${annualDist.toLocaleString()} mi/yr`;
  $('#note').innerHTML=isZh
    ?`<b>计算公式：</b>费用 = 电池容量 (kWh) × 电价 ($/kWh) × 充电区间比例。<br>⚠️ 年度节省按基准燃油车估算，实际取决于当地油价、电价和驾驶习惯。`
    :`<b>Formula:</b> Cost = battery (kWh) × rate ($/kWh) × charge range fraction.<br>⚠️ Annual savings use baseline petrol cost estimates; actual savings depend on local fuel and electricity prices and driving habits.`;
}
window.loadPreset=loadPreset;

['battery','eff','rate','fromPct','toPct'].forEach(id=>$('#'+id).addEventListener('input',calc));

$('#toolbar').innerHTML=`
  <button class="gz-btn gz-btn-secondary" id="btnCopy">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnReset">${t('reset')}</button>`;
$('#btnCopy').onclick=()=>copyText(`${t('toolTitle')}\nBattery: ${$('#battery').value} kWh\nCharge cost: ${$('#chargeCost').textContent}\nFull charge: ${$('#fullCost').textContent}\nCost/distance: ${$('#perMile').textContent}\nRange added: ${$('#rangeAdded').textContent}\nAnnual savings: ${$('#savings').textContent}`);
$('#btnReset').onclick=()=>{$('#battery').value=60;$('#eff').value=3.5;$('#rate').value=0.15;$('#fromPct').value=10;$('#toPct').value=80;calc();};

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⚡', href:'/calc/electricity-cost.html', name:'Electricity Cost'},
    {icon:'⛽', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost'},
    {icon:'🚗', href:'/calc/car-affordability-calculator.html', name:'Car Affordability'},
    {icon:'🌱', href:'/calc/carbon-footprint.html', name:'Carbon Footprint'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
