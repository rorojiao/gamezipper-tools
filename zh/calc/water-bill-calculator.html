<body>
<div class="gz-container">

  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="wb-input">
      <div class="wb-card">
        <label id="lbl-usage"></label>
        <div class="wb-input-row">
          <input type="number" id="usage" value="10000" min="0" step="100">
          <select id="usageUnit">
            <option value="gal">gallons</option>

            <option value="m3">m³ (cubic meters)</option>

        </div>

        <label id="lbl-fixed"></label>
        <input type="number" id="fixed" value="10" min="0" step="0.5">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Water Bill Calculator',
    toolDesc: 'Estimate your monthly and annual water cost. Enter usage and local rate, compare to average household consumption. Free, browser-only.',
    calculate: 'Calculate', reset: 'Reset',
    lblUsage: 'Water Usage', lblPeriod: 'Billing Period', lblRate: 'Rate', lblFixed: 'Fixed Monthly Fee ($)', lblPeople: 'People in Household',
    monthlyBill: 'Monthly Bill', annualBill: 'Annual Bill', perPerson: 'Per Person / Month', dailyUsage: 'Daily Usage',
    costBreakdown: 'Cost Breakdown', usageCost: 'Water Usage Cost', fixedFee: 'Fixed Fee', total: 'Total Monthly',
    comparison: 'Comparison to Average', yourUsage: 'Your Usage', avgUsage: 'US Average (family of 4)',
    efficient: 'efficient', aboveAvg: 'above average',
    tipGood: '💧 Great! Your usage is below the household average. Keep it up!',
    tipAvg: '💧 Your usage is close to the average. Consider low-flow fixtures to save more.',
    tipHigh: '⚠️ Your usage is above average. Check for leaks and consider water-saving fixtures.',
    perDay: 'per day', perMonth: 'per month', perYear: 'per year',
    step1: 'Enter your water usage (check your latest bill)',
    step2: 'Select the unit (gallons, CCF, or cubic meters)',
    step3: 'Enter your local water rate per unit',
    step4: 'See your estimated monthly and annual water cost',
  },
  zh: {
    toolTitle: '水费计算器',
    toolDesc: '估算每月和每年的水费。输入用水量和当地费率，对比家庭平均用水量。免费、浏览器本地运行。',
    calculate: '计算', reset: '重置',
    lblUsage: '用水量', lblPeriod: '计费周期', lblRate: '费率', lblFixed: '每月固定费（$）', lblPeople: '家庭人数',
    monthlyBill: '月度水费', annualBill: '年度水费', perPerson: '每人 / 每月', dailyUsage: '每日用水量',
    costBreakdown: '费用明细', usageCost: '用水费用', fixedFee: '固定费', total: '月度合计',
    comparison: '与平均值对比', yourUsage: '你的用水量', avgUsage: '美国平均（4 口之家）',
    efficient: '节水', aboveAvg: '高于平均',
    tipGood: '💧 太棒了！你的用水量低于家庭平均值。继续保持！',
    tipAvg: '💧 你的用水量接近平均值。可考虑安装节水龙头进一步节省。',
    tipHigh: '⚠️ 你的用水量高于平均值。建议检查漏水并使用节水器具。',
    perDay: '每天', perMonth: '每月', perYear: '每年',
    step1: '输入你的用水量（查看最新账单）',
    step2: '选择单位（加仑、CCF 或立方米）',
    step3: '输入当地的每单位水费',
    step4: '查看估算的月度和年度水费',
  }
});

const { $, t } = GZ;
const GAL_PER_CCF = 748;
const GAL_PER_M3 = 264.172;
const GAL_PER_LITER = 0.264172;

function num(id){ return parseFloat($(id).value) || 0; }

function toGallons(amount, unit){
  switch(unit){
    case 'gal': return amount;
    case 'ccf': return amount * GAL_PER_CCF;
    case 'm3': return amount * GAL_PER_M3;
    case 'liters': return amount * GAL_PER_LITER;
    default: return amount;
  }
}

function ratePerGallon(rate, unit){
  switch(unit){
    case 'gal': return rate;
    case 'ccf': return rate / GAL_PER_CCF;
    case 'm3': return rate / GAL_PER_M3;
    default: return rate;
  }
}

function calculate(){
  const usage = num('usage');
  const usageUnit = $('#usageUnit').value;
  const period = $('#period').value;
  const rate = num('rate');
  const rateUnit = $('#rateUnit').value;
  const fixed = num('fixed');
  const people = Math.max(1, num('people'));

  // Convert usage to gallons
  const gallons = toGallons(usage, usageUnit);
  const rpg = ratePerGallon(rate, rateUnit);

  // Convert to monthly
  let monthlyGallons;
  switch(period){
    case 'daily': monthlyGallons = gallons * 30.44; break;
    case 'weekly': monthlyGallons = gallons * 4.345; break;
    case 'yearly': monthlyGallons = gallons / 12; break;
    default: monthlyGallons = gallons;
  }

  const usageCost = monthlyGallons * rpg;
  const monthlyTotal = usageCost + fixed;
  const annualTotal = monthlyTotal * 12;
  const perPersonCost = monthlyTotal / people;
  const dailyGallons = monthlyGallons / 30.44;

  // US average: ~300 gal/day for family of 4 = ~9132 gal/month
  const avgMonthlyGallons = 9132;
  const ratio = monthlyGallons / avgMonthlyGallons;
  const pctVsAvg = ((ratio - 1) * 100);
  let status, tip, barColor;
  if(ratio < 0.85){ status = t('efficient'); tip = t('tipGood'); barColor = 'var(--success)'; }
  else if(ratio <= 1.15){ status = t('efficient'); tip = t('tipAvg'); barColor = 'var(--accent)'; }
  else { status = t('aboveAvg'); tip = t('tipHigh'); barColor = '#ff9f43'; }

  const fmt = n => '$' + n.toFixed(2);
  const fmtG = n => Math.round(n).toLocaleString() + ' gal';

  const maxBar = Math.max(monthlyGallons, avgMonthlyGallons);

  $('#output').innerHTML = `
    <div class="wb-results">
      <div class="wb-result highlight">
        <div class="val">${fmt(monthlyTotal)}</div>
        <div class="lbl">${t('monthlyBill')}</div>
      </div>
      <div class="wb-result">
        <div class="val">${fmt(annualTotal)}</div>
        <div class="lbl">${t('annualBill')}</div>
      </div>
      <div class="wb-result">
        <div class="val">${fmt(perPersonCost)}</div>
        <div class="lbl">${t('perPerson')}</div>
      </div>
      <div class="wb-result">
        <div class="val">${fmtG(dailyGallons)}</div>
        <div class="lbl">${t('dailyUsage')}</div>
      </div>
    </div>

    <div class="wb-breakdown">
      <h3>${t('costBreakdown')}</h3>
      <div class="wb-row"><span>${t('usageCost')} (${fmtG(monthlyGallons)})</span><span>${fmt(usageCost)}</span></div>
      <div class="wb-row"><span>${t('fixedFee')}</span><span>${fmt(fixed)}</span></div>
      <div class="wb-row"><span>${t('total')}</span><span style="color:var(--accent)">${fmt(monthlyTotal)}</span></div>
    </div>

    <div class="wb-comparison">
      <h3>${t('comparison')} <span style="font-size:.8rem;opacity:.7">(${pctVsAvg >= 0 ? '+' : ''}${pctVsAvg.toFixed(0)}% — ${status})</span></h3>
      <div class="wb-bar-wrap">
        <div class="wb-bar-label"><span>${t('yourUsage')}</span><span>${fmtG(monthlyGallons)}</span></div>
        <div class="wb-bar"><div class="wb-bar-fill" style="width:${(monthlyGallons/maxBar*100)}%;background:${barColor}"></div></div>
      </div>
      <div class="wb-bar-wrap">
        <div class="wb-bar-label"><span>${t('avgUsage')}</span><span>${fmtG(avgMonthlyGallons)}</span></div>
        <div class="wb-bar"><div class="wb-bar-fill" style="width:${(avgMonthlyGallons/maxBar*100)}%;background:var(--text2);opacity:.5"></div></div>
      </div>
      <div class="wb-tip">${tip}</div>
    </div>`;
}

function reset(){
  $('#usage').value = '10000';
  $('#usageUnit').value = 'gal';
  $('#period').value = 'monthly';
  $('#rate').value = '0.004';
  $('#rateUnit').value = 'gal';
  $('#fixed').value = '10';
  $('#people').value = '4';
  calculate();
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="calculate()">${t('calculate')}</button><button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💧', href:'/calc/water-intake.html', name:'Water Intake Calculator'},
    {icon:'⚡', href:'/calc/electricity-cost.html', name:'Electricity Cost'},
    {icon:'💸', href:'/calc/tax-calculator.html', name:'Tax Calculator'},
    {icon:'💰', href:'/calc/tip-calculator.html', name:'Tip Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
