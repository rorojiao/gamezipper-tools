<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Remove Non-Alphanumeric Characters',
    toolDesc: 'Strip symbols, punctuation and special characters from text — keep only letters, numbers and the characters you choose. Runs 100% in your browser.',
    keepSpaces: 'Keep spaces',
    keepUnderscore: 'Keep underscores _',
    keepHyphen: 'Keep hyphens -',
    keepNewlines: 'Keep line breaks',
    unicodeMode: 'Unicode (é, ü, 汉字)',
    asciiMode: 'ASCII only (A-Z, 0-9)',
    removed: 'characters removed',
    step1: 'Paste your text into the input area',
    step2: 'Choose what to keep — spaces, underscores, hyphens, newlines',
    step3: 'Toggle Unicode or ASCII-only mode',
    step4: 'Copy the cleaned result with one click',
  },
  zh: {
    toolTitle: '移除非字母数字字符',
    toolDesc: '从文本中删除符号、标点和特殊字符 — 只保留字母、数字和你选择的字符。100% 浏览器本地运行。',
    keepSpaces: '保留空格',
    keepUnderscore: '保留下划线 _',
    keepHyphen: '保留连字符 -',
    keepNewlines: '保留换行',
    unicodeMode: 'Unicode（é、ü、汉字）',
    asciiMode: '仅 ASCII（A-Z、0-9）',
    removed: '个字符被移除',
    step1: '在输入区粘贴文本',
    step2: '选择需要保留的内容 — 空格、下划线、连字符、换行',
    step3: '切换 Unicode 或仅 ASCII 模式',
    step4: '一键复制清理后的结果',
  }
});

const { $, copyText, t } = GZ;
let keepSpaces = true, keepUnderscore = false, keepHyphen = false, keepNewlines = true, unicodeMode = true;

function process() {
  const inp = $('#input').value;
  if (!inp) { $('#output').textContent = ''; $('#status').textContent = ''; return; }
  const before = inp.length;
  let result = '';
  for (const ch of inp) {
    const code = ch.codePointAt(0);
    const isLetter = unicodeMode ? /\p{L}/u.test(ch) : (code >= 65 && code <= 90) || (code >= 97 && code <= 122);
    const isDigit = code >= 48 && code <= 57;
    const isSpace = keepSpaces && (ch === ' ' || ch === '\t');
    const isUnder = keepUnderscore && ch === '_';
    const isHyphen = keepHyphen && ch === '-';
    const isNL = keepNewlines && (ch === '\n' || ch === '\r');
    if (isLetter || isDigit || isSpace || isUnder || isHyphen || isNL) result += ch;
  }
  $('#output').textContent = result;
  const removed = before - result.length;
  $('#status').innerHTML = `<span style="opacity:.7">${removed} ${t('removed')}</span>`;
}

$('#input').addEventListener('input', process);

function toggle(v) { return () => { /* no-op, checkbox handlers */ }; }

$('#toolbar').innerHTML = `
  <label class="gz-check"><input type="checkbox" id="cb-spaces" checked> ${t('keepSpaces')}</label>
  <label class="gz-check"><input type="checkbox" id="cb-under"> ${t('keepUnderscore')}</label>
  <label class="gz-check"><input type="checkbox" id="cb-hyphen"> ${t('keepHyphen')}</label>
  <label class="gz-check"><input type="checkbox" id="cb-nl" checked> ${t('keepNewlines')}</label>
  <select class="gz-select" id="mode-sel">
    <option value="1" selected>${t('unicodeMode')}</option>
    <option value="0">${t('asciiMode')}</option>
  </select>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';process()">${t('clear')}</button>`;

['cb-spaces','cb-under','cb-hyphen','cb-nl'].forEach(id => {
  $('#'+id).addEventListener('change', () => {
    keepSpaces = $('#cb-spaces').checked;
    keepUnderscore = $('#cb-under').checked;
    keepHyphen = $('#cb-hyphen').checked;
    keepNewlines = $('#cb-nl').checked;
    process();
  });
});
$('#mode-sel').addEventListener('change', () => {
  unicodeMode = $('#mode-sel').value === '1';
  process();
});

// Load example
$('#input').value = 'Hello, World! 123 @#$%\nFoo-Bar_Baz ✨ café';
process();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🧹', href:'/text/remove-spaces.html', name:'Remove Spaces'},
    {icon:'✂️', href:'/text/remove-punctuation.html', name:'Remove Punctuation'},
    {icon:'🌐', href:'/text/remove-accents.html', name:'Remove Accents'},
    {icon:'👁️', href:'/text/zero-width-remover.html', name:'Zero Width Remover'},
  ]
});
</script>
