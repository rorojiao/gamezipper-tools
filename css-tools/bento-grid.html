<style>
.bento-config{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px}
.bento-config label{font-size:.82rem;color:var(--text3)}
.bento-config input[type=number]{width:60px;padding:4px 8px;background:var(--glass);border:1px solid var(--border);border-radius:6px;color:var(--text)}
.bento-preview{background:var(--glass2);border:1px solid var(--border);border-radius:16px;padding:18px;min-height:320px}
#grid{display:grid;gap:14px;width:100%;transition:.3s}
.bento-item{border-radius:14px;padding:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:600;color:#fff;text-align:center;font-size:.85rem;cursor:pointer;transition:.2s;min-height:90px;position:relative}
.bento-item:hover{filter:brightness(1.1);transform:scale(1.01)}
.bento-item .del{position:absolute;top:6px;right:8px;background:rgba(0,0,0,.3);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:.7rem;cursor:pointer;opacity:0;transition:.15s}
.bento-item:hover .del{opacity:1}
.bento-sizes{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.bento-sizes button{padding:5px 10px;font-size:.75rem;background:var(--glass);border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;transition:.15s}
.bento-sizes button:hover{background:var(--gz-accent);color:#fff;border-color:var(--gz-accent)}

.preset-btn{padding:6px 12px;font-size:.78rem;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;transition:.15s}
.preset-btn:hover{background:var(--gz-accent);color:#fff}
#codeArea{font-size:.78rem;max-height:280px}
</style>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="bento-config">
      <label>📊 Columns</label>
      <input type="number" id="cols" value="4" min="1" max="12">
      <label>📐 Gap</label>
      <input type="range" class="gap-slider" id="gap" value="14" min="0" max="40">
      <span id="gapVal">14px</span>
      <label>📦 Rounded</label>
      <input type="number" id="radius" value="14" min="0" max="40">px
    </div>
    <div class="preset-row" id="presets"></div>
    <div class="bento-preview">
      <div id="grid"></div>
    </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Bento Grid Generator',
    toolDesc: 'Build modern bento grid layouts visually. Set columns, gap and rounded corners, add and resize cards, then copy production-ready CSS Grid code.',
    addBox: 'Add Box',
    clear: 'Clear',
    preset: 'Presets',
    copy: 'Copy Code',
    step1: 'Set the number of grid columns, gap and corner radius',
    step2: 'Click Add Box to insert cards — or pick a preset layout',
    step3: 'Click a card, then use the size buttons to span columns/rows',
    step4: 'Copy the generated CSS Grid code into your project',
  },
  zh: {
    toolTitle: 'Bento 网格布局生成器',
    toolDesc: '可视化构建现代 Bento 网格布局。设置列数、间距和圆角，添加并调整卡片尺寸，然后复制生产级 CSS Grid 代码。',
    addBox: '添加卡片',
    clear: '清空',
    preset: '预设',
    copy: '复制代码',
    step1: '设置网格列数、间距和圆角半径',
    step2: '点击「添加卡片」插入卡片 — 或选择预设布局',
    step3: '点击卡片，使用尺寸按钮设置跨列和跨行',
    step4: '将生成的 CSS Grid 代码复制到你的项目',
  }
});

const { $, copyText, t } = GZ;
const colors = ['#e94560','#00d672','#61afef','#d19a66','#c678dd','#56b6c2','#e5c07b','#6c5ce7','#a29bfe','#fd79a8','#fdcb6e','#6ab04c','#eb4d4b','#f0932b','#4ecdc4','#45b7d1'];
let items = [];
let selectedId = null;
let nextId = 1;

function cols() { return +$('#cols').value; }
function gap() { return +$('#gap').value; }
function radius() { return +$('#radius').value; }

function renderGrid() {
  const c = cols(), g = gap(), r = radius();
  const grid = $('#grid');
  grid.style.gridTemplateColumns = `repeat(${c}, 1fr)`;
  grid.style.gap = g + 'px';
  grid.innerHTML = items.map(item => {
    const isSel = item.id === selectedId;
    return `<div class="bento-item" style="grid-column: span ${item.cs}; grid-row: span ${item.rs}; background:${item.color}; border-radius:${r}px; ${isSel?'box-shadow:0 0 0 3px var(--gz-accent)':''}" onclick="selectItem(${item.id})">
      <span>${item.label}</span>
      <button class="del" onclick="event.stopPropagation();delItem(${item.id})">✕</button>
    </div>`;
  }).join('');
  if (selectedId) {
    const sel = items.find(i => i.id === selectedId);
    if (sel) {
      grid.innerHTML += `<div class="bento-sizes" style="grid-column: 1 / -1; margin-top:4px">
        <span style="color:var(--text3);font-size:.8rem;align-self:center">↔</span>
        ${[1,2,3,4].map(n => `<button onclick="setSize('cs',${n})" style="${sel.cs===n?'background:var(--gz-accent);color:#fff':''}">${n} col</button>`).join('')}
        <span style="color:var(--text3);font-size:.8rem;align-self:center">↕</span>
        ${[1,2,3].map(n => `<button onclick="setSize('rs',${n})" style="${sel.rs===n?'background:var(--gz-accent);color:#fff':''}">${n} row</button>`).join('')}
      </div>`;
    }
  }
  renderCode();
}

function renderCode() {
  const c = cols(), g = gap(), r = radius();
  const css = `.bento-grid {
  display: grid;
  grid-template-columns: repeat(${c}, 1fr);
  gap: ${g}px;
}

.bento-item {
  border-radius: ${r}px;
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}`;
  let html = `<div class="bento-grid">`;
  items.forEach((item, i) => {
    html += `\n  <div class="bento-item" style="grid-column: span ${item.cs}; grid-row: span ${item.rs}; background:${item.color};">${item.label}</div>`;
  });
  html += `\n</div>`;
  $('#codeArea').value = `<!-- HTML -->\n${html}\n\n/* CSS */\n${css}`;
}

function selectItem(id) { selectedId = selectedId === id ? null : id; renderGrid(); }
function delItem(id) { items = items.filter(i => i.id !== id); if (selectedId === id) selectedId = null; renderGrid(); }
function setSize(prop, n) { const s = items.find(i => i.id === selectedId); if (s) { s[prop] = n; renderGrid(); } }
function addBox() {
  const color = colors[items.length % colors.length];
  items.push({ id: nextId++, cs: 1, rs: 1, color, label: 'Box ' + items.length + 1 });
  renderGrid();
}
function clearAll() { items = []; selectedId = null; renderGrid(); }
function doCopy() { copyText($('#codeArea').value); }

const presets = {
  'Dashboard': [{cs:2,rs:2},{cs:1,rs:1},{cs:1,rs:1},{cs:2,rs:1},{cs:1,rs:2},{cs:1,rs:1}],
  'Pricing': [{cs:1,rs:3},{cs:1,rs:3},{cs:1,rs:3},{cs:3,rs:1}],
  'Gallery': [{cs:2,rs:2},{cs:1,rs:1},{cs:1,rs:1},{cs:1,rs:1},{cs:1,rs:1},{cs:2,rs:1}],
  'Profile': [{cs:1,rs:3},{cs:2,rs:1},{cs:1,rs:1},{cs:2,rs:1}],
};
function loadPreset(name) {
  items = presets[name].map((s, i) => ({ id: nextId++, cs: s.cs, rs: s.rs, color: colors[i % colors.length], label: name[0] + (i+1) }));
  selectedId = null;
  renderGrid();
}

$('#presets').innerHTML = Object.keys(presets).map(n => `<button class="preset-btn" onclick="loadPreset('${n}')">${n}</button>`).join('');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="addBox()">+ ${t('addBox')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>
  <button class="gz-btn" onclick="doCopy()">${t('copy')}</button>`;

$('#cols').oninput = renderGrid;
$('#radius').oninput = renderGrid;
$('#gap').oninput = () => { $('#gapVal').textContent = $('#gap').value + 'px'; renderGrid(); };

loadPreset('Dashboard');

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌈', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
    {icon:'📐', href:'/css-tools/flexbox.html', name:'Flexbox'},
    {icon:'🎨', href:'/css-tools/mesh-gradient.html', name:'Mesh Gradient'},
  ]
});
</script>

</body>
