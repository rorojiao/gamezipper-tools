function escapeV(s) { return (s || '').replace(/\\/g, '\\\\').replace(/\n/g, '\\n').replace(/,/g, '\\,').replace(/;/g, '\\;'); }

function buildVCard() {

    NOTE: $('#note').value.trim(),

  for (const [k, v] of Object.entries(fields)) {
    if (v) lines.push(`${k}:${v}`);
  }
  lines.push('END:VCARD');
  return lines.join('\n');
}

function renderQR(text) {
  const result = QRCode.generate(text);
  const cellSize = 6;
  const padding = 4;
  const totalSize = (result.size + padding * 2) * cellSize;
  const canvas = document.createElement('canvas');
  canvas.width = totalSize;
  canvas.height = totalSize;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, totalSize, totalSize);
  ctx.fillStyle = '#000';
  for (let r = 0; r < result.size; r++) {
    for (let c = 0; c < result.size; c++) {
      if (result.matrix[r][c]) {
        ctx.fillRect((c + padding) * cellSize, (r + padding) * cellSize, cellSize, cellSize);
      }
    }
  }
  const container = $('#canvas');
  container.innerHTML = '';
  container.appendChild(canvas);
  return canvas;
}

function generate() {
  const name = $('#name').value.trim();
  const vcard = buildVCard();
  $('#vcardData').textContent = vcard;
  if (!name) {
    $('#canvas').innerHTML = '<div style="color:#aaa;text-align:center;padding:60px 20px">Enter your name to generate QR</div>';
    $('#vq-info').textContent = 'Fill in your details to see your QR code';
    return;
  }
  try {
    renderQR(vcard);
    $('#vq-info').textContent = '✓ Ready — scan with your phone or download';
  } catch(e) {
    $('#canvas').innerHTML = '<div style="color:#c00;text-align:center;padding:60px 20px">Error: ' + e.message + '</div>';
  }
}

$$('input,textarea').forEach(el => el.addEventListener('input', generate));

$('#dlPng').addEventListener('click', () => {
  const name = $('#name').value.trim();
  if (!name) return;
  const vcard = buildVCard();
  const canvas = renderQR(vcard);
  const link = document.createElement('a');
  link.download = `vcard-${name.replace(/\s+/g, '-').toLowerCase()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
});

  const padding = 4;
  const size = (result.size + padding * 2) * cellSize;

  for (let r = 0; r < result.size; r++) {
    for (let c = 0; c < result.size; c++) {
      if (result.matrix[r][c]) {
        rects += `<rect x="${(c + padding) * cellSize}" y="${(r + padding) * cellSize}" width="${cellSize}" height="${cellSize}" fill="#000"/>`;
      }
    }
  }
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><rect width="${size}" height="${size}" fill="#fff"/>${rects}</svg>`;
  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const link = document.createElement('a');
  link.download = `vcard-${name.replace(/\s+/g, '-').toLowerCase()}.svg`;
  link.href = URL.createObjectURL(blob);
  link.click();
});

  GZ.copyText(buildVCard());
});
