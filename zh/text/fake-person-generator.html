<script>
GZI18n.register({
  en: {
    toolTitle: 'Fake Person & Identity Generator',
    toolDesc: 'Generate realistic fake identities for QA testing, dummy data, demos and form prototyping. Random name, email, phone, address, DOB, username, password and UUID — export as JSON or CSV. 100% browser-based. For testing only, not real people.',
    count: 'How many',

    fName: 'Name', fEmail: 'Email', fPhone: 'Phone', fAddress: 'Address', fDob: 'Date of birth',
    fUser: 'Username', fPass: 'Password', fUuid: 'UUID', fGender: 'Gender', fJob: 'Job title',

  },
  zh: {
    toolTitle: '虚假身份 / 测试数据生成器',
    toolDesc: '为 QA 测试、占位数据、演示和表单原型生成逼真的虚假身份。随机姓名、邮箱、电话、地址、生日、用户名、密码和 UUID — 可导出 JSON 或 CSV。100% 浏览器本地运行。仅供测试，非真实人物。',
    count: '生成数量',
    fields: '包含字段：',
    fName: '姓名', fEmail: '邮箱', fPhone: '电话', fAddress: '地址', fDob: '出生日期',
    fUser: '用户名', fPass: '密码', fUuid: 'UUID', fGender: '性别', fJob: '职位',
    generate: '🎲 生成',
    exportJson: '⬇ JSON',
    exportCsv: '⬇ CSV',
    empty: '点击「生成」创建虚假身份。',
    copied: '已复制',
    step1: '勾选你需要的字段（姓名、邮箱、电话、地址…）',
    step2: '设置要生成多少个身份',
    step3: '点击「生成」— 点击任意值即可复制',
    step4: '导出为 JSON（用于 API）或 CSV（用于表格）',
  }
});

const { $, copyText, t } = GZ;

const FIRST = ['James','Mary','Robert','Patricia','John','Jennifer','Michael','Linda','David','Barbara','William','Elizabeth','Richard','Susan','Joseph','Jessica','Thomas','Sarah','Charles','Karen','Christopher','Nancy','Daniel','Lisa','Matthew','Sandra','Anthony','Betty','Mark','Margaret','Donald','Sandra','Steven','Ashley','Paul','Kimberly','Andrew','Emily','Joshua','Donna','Kenneth','Michelle','Kevin','Carol','Brian','Amanda','George','Melissa','Edward','Deborah','Alex','Emma','Ryan','Olivia','Nathan','Sophia','Tyler','Isabella','Dylan','Mia','Logan','Charlotte','Mason','Amelia','Lucas','Harper','Henry','Evelyn','Jacob','Abigail','Leo','Zoe','Owen','Lily','Eli','Aria','Noah','Layla','Caleb','Chloe'];
const LAST = ['Smith','Johnson','Williams','Brown','Jones','Garcia','Miller','Davis','Rodriguez','Martinez','Hernandez','Lopez','Gonzalez','Wilson','Anderson','Thomas','Taylor','Moore','Jackson','Martin','Lee','Perez','Thompson','White','Harris','Sanchez','Clark','Ramirez','Lewis','Robinson','Walker','Young','Allen','King','Wright','Scott','Torres','Nguyen','Hill','Flores','Green','Adams','Nelson','Baker','Hall','Rivera','Campbell','Mitchell','Carter','Roberts','Reed','Cook','Bell','Murphy','Bailey','Cooper','Reed','Ward','Cox','Diaz','Hayes','Brooks'];
const JOBS = ['Software Engineer','Product Manager','Designer','Data Analyst','Marketing Specialist','Sales Representative','Accountant','Teacher','Nurse','DevOps Engineer','UX Researcher','Project Coordinator','Customer Success Manager','Financial Analyst','Graphic Designer','HR Specialist','Operations Lead','Content Writer','QA Engineer','Recruiter'];
const STREETS = ['Main St','Oak Ave','Maple Dr','Cedar Ln','Pine Rd','Elm St','Washington Ave','Park Blvd','Lake View Dr','Sunset Blvd','Highland Ave','River Rd','Church St','Mill St','Forest Dr','Spring St','Hill St','Madison Ave','Jefferson St','Adams St'];
const CITIES = ['Springfield','Franklin','Greenville','Bristol','Clinton','Fairview','Salem','Madison','Georgetown','Arlington','Ashland','Burlington','Clayton','Dover','Essex','Hudson','Lexington','Marion','Oxford','Riverside'];
const STATES = ['CA','TX','NY','FL','IL','PA','OH','GA','NC','MI','NJ','VA','WA','AZ','MA','TN','IN','MO','MD','WI','MN','CO','OR','NV','UT'];

function rnd(max) {
  if (window.crypto && crypto.getRandomValues) {
    const buf = new Uint32Array(1); crypto.getRandomValues(buf);
    return Math.floor((buf[0]/4294967296) * max);
  }
  return Math.floor(Math.random() * max);
}
function pick(a){return a[rnd(a.length)];}
function randInt(a,b){return a + rnd(b-a+1);}

function genUsername(first, last) {
  const styles = [`${first}.${last}`, `${first}${randInt(1,999)}`, `${first[0].toLowerCase()}${last}`, `${first.toLowerCase()}_${last.toLowerCase()}`, `${first.toLowerCase()}${randInt(80,9999)}`];
  return pick(styles).toLowerCase().replace(/[^a-z0-9._]/g,'');
}
function genPassword(len=14){
  const s='abcdefghijkmnopqrstuvwxyzABCDEFGHJKLMNPQRSTUVWXYZ23456789!@#$%^&*';
  let p=''; for(let i=0;i<len;i++) p+=s[rnd(s.length)]; return p;
}
function genEmail(first,last){
  const dom=['example.com','testmail.com','mailbox.io','demo.dev','sample.org','fakemail.net','QA.test','dev.local'];
  return `${first}.${last}${randInt(1,999)}`.toLowerCase()+'@'+pick(dom);
}
function genPhone(){
  return `(${randInt(201,989)}) ${randInt(200,989)}-${String(randInt(0,9999)).padStart(4,'0')}`;
}
function genUUID(){
  if(window.crypto&&crypto.randomUUID)return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=rnd(16);const v=c==='x'?r:(r&0x3|0x8);return v.toString(16);});
}
function genDob(){
  const y=randInt(1955,2006), m=randInt(1,12), d=randInt(1,28);
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

const FIELDS = [
  {id:'name',key:'fName',gen:p=>`${p.first} ${p.last}`},
  {id:'gender',key:'fGender',gen:()=>pick(['female','male','non-binary','prefer not to say'])},
  {id:'job',key:'fJob',gen:()=>pick(JOBS)},
  {id:'email',key:'fEmail',gen:p=>genEmail(p.first,p.last)},
  {id:'phone',key:'fPhone',gen:()=>genPhone()},
  {id:'username',key:'fUser',gen:p=>genUsername(p.first,p.last)},
  {id:'password',key:'fPass',gen:()=>genPassword(14)},
  {id:'address',key:'fAddress',gen:()=>`${randInt(100,9999)} ${pick(STREETS)}, ${pick(CITIES)}, ${pick(STATES)} ${String(randInt(10000,99999))}`},
  {id:'dob',key:'fDob',gen:()=>genDob()},
  {id:'uuid',key:'fUuid',gen:()=>genUUID()},
];
const DEFAULT_ON = ['name','gender','job','email','phone','username','password','address','dob','uuid'];

let current = [];

function activeFields(){
  return FIELDS.filter(f=>$('#chk-'+f.id).checked);
}

function generate(){
  const n=Math.max(1,Math.min(100,parseInt($('#count').value)||1));
  current=[];
  for(let i=0;i<n;i++){
    const first=pick(FIRST), last=pick(LAST);
    const person={first,last};
    const rec={};
    activeFields().forEach(f=>{rec[f.id]=f.gen(person);});
    current.push(rec);
  }
  render();
}

function render(){
  const box=$('#people');
  if(!current.length){box.innerHTML=`<div class="fp-empty">${t('empty')}</div>`;return;}
  box.innerHTML=current.map(p=>{
    const initials=(p.name||'?').split(' ').map(s=>s[0]).slice(0,2).join('').toUpperCase();
    const rows=activeFields().map(f=>{
      const v=p[f.id]||'';
      return `<div class="row"><span class="k">${t(f.key)}</span><span class="v" onclick="copyVal(this, ${JSON.stringify(JSON.stringify(v)).slice(1,-1).replace(/"/g,'&quot;')})">${escapeHtml(v)}</span></div>`;
    }).join('');
    return `<div class="fp-card">
      <div class="top"><div class="avatar">${initials}</div><span style="font-size:.7rem;color:var(--text2)">#${current.indexOf(p)+1}</span></div>
      ${rows}
      <div class="fp-actions">
        <button class="gz-btn gz-btn-secondary" onclick="copyPerson(${current.indexOf(p)})">${t('copy')}</button>
      </div>
    </div>`;
  }).join('');
}

function copyVal(el,val){
  GZ.copyText(val);
  document.querySelectorAll('.v.copied').forEach(x=>{x.classList.remove('copied');});
  el.classList.add('copied');
  const orig=el.textContent; el.textContent='✓ '+t('copied');
  setTimeout(()=>{el.classList.remove('copied');el.textContent=orig;},900);
}
function copyPerson(i){
  const lines=activeFields().map(f=>`${t(f.key)}: ${current[i][f.id]||''}`);
  GZ.copyText(lines.join('\n'));
}
function exportJSON(){
  if(!current.length)return;
  download('people.json',JSON.stringify(current,null,2));
}
function exportCSV(){
  if(!current.length)return;
  const fs=activeFields();
  const header=fs.map(f=>f.id).join(',');
  const rows=current.map(p=>fs.map(f=>`"${String(p[f.id]||'').replace(/"/g,'""')}"`).join(','));
  download('people.csv',[header,...rows].join('\n'));
}
function download(name,content){
  const blob=new Blob([content],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();
  URL.revokeObjectURL(a.href);
}
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Options UI
$('#opts').innerHTML=`
  <label>${t('count')} <input type="number" id="count" value="5" min="1" max="100"></label>
  <span style="font-size:.85rem;color:var(--text2);font-weight:600">${t('fields')}</span>
  ${FIELDS.map(f=>`<label><input type="checkbox" id="chk-${f.id}" ${DEFAULT_ON.includes(f.id)?'checked':''}> ${t(f.key)}</label>`).join('')}
`;

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="exportJSON()">${t('exportJson')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="exportCSV()">${t('exportCsv')}</button>`;

generate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✉️', href:'/text/random-email-generator.html', name:'Random Email'},
    {icon:'👤', href:'/text/random-name-generator.html', name:'Random Name'},
    {icon:'🆔', href:'/dev/uuid.html', name:'UUID Generator'},
    {icon:'💳', href:'/dev/credit-card-generator.html', name:'Test Credit Card'},
  ]
});
</script>
