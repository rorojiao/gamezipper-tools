<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="input-row">
      <input id="domain" type="text" placeholder="example.com">
      <select id="locale">
        <option value="google.com">Google.com (US)</option>
        <option value="google.co.uk">Google.co.uk (UK)</option>
        <option value="google.ca">Google.ca (CA)</option>
        <option value="google.com.au">Google.com.au (AU)</option>
        <option value="google.de">Google.de (DE)</option>
        <option value="google.fr">Google.fr (FR)</option>
        <option value="google.co.jp">Google.co.jp (JP)</option>
        <option value="google.co.in">Google.co.in (IN)</option>
        <option value="google.com.hk">Google.com.hk (HK)</option>
        <option value="google.com.br">Google.com.br (BR)</option>
      </select>
    </div>
    <label id="lbl-kw"></label>
    <textarea id="kw-list" class="kw-input" spellcheck="false" placeholder="best running shoes&#10;cheap web hosting&#10;how to brew coffee"></textarea>
    <div class="input-row" style="margin-bottom:0">
      <input id="pos-map" type="text" placeholder="1, 5, 12, 28, —">
      <button class="gz-btn" id="save-btn" onclick="saveSnapshot()"></button>
      <button class="gz-btn gz-btn-secondary" onclick="loadExample()"></button>
      <button class="gz-btn gz-btn-secondary" onclick="resetData()"></button>
    </div>
    <div id="status" style="margin-top:10px;font-size:.85rem"></div>
    <div class="summary-grid" id="summary" style="display:none"></div>
    <div id="output" style="margin-top:10px"></div>
    <div class="note" id="note"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Keyword Rank Checker',
    toolDesc: 'Track your SERP position for target keywords over time. Spot opportunities, monitor progress and export your ranking history — all in your browser.',
    lblKw: 'Keywords to track (one per line)',
    domainPh: 'your-domain.com',
    posMapPh: 'Positions (comma-separated, one per keyword, — for not ranked)',
    save: 'Save Snapshot',
    example: 'Example',
    reset: 'Reset All',
    noData: 'No snapshots yet. Enter keywords and positions, then click Save Snapshot.',
    savedOk: '✓ Snapshot saved — {n} keywords tracked.',
    rankTop3: 'Top 3',
    rankTop10: 'Top 10',
    rankTop30: 'Top 30',
    rankBeyond: 'Beyond 30',
    notRanked: 'Not Ranked',
    tracked: 'Tracked',
    snapshots: 'Snapshots',
    avgPosition: 'Avg Position',
    bestPosition: 'Best',
    lastChecked: 'Last checked',
    history: 'History',
    trendUp: '↑ improved',
    trendDown: '↓ declined',
    trendFlat: '= unchanged',
    confirmReset: 'Delete all saved ranking data? This cannot be undone.',
    step1: 'Enter your domain and choose your Google locale',
    step2: 'List keywords to track (one per line)',
    step3: 'Enter current positions (comma-separated) and click Save Snapshot',
    step4: 'Review trends over time — green = improving, red = declining',
    note: 'Positions must be observed from a real Google search (use incognito for accuracy). This tool stores your snapshots locally to track changes — it does not auto-fetch rankings.',
  },
  zh: {
    toolTitle: '关键词排名检查器',
    toolDesc: '长期跟踪目标关键词的 SERP 排名。发现机会、监控进展并导出排名历史 — 全部在浏览器本地完成。',
    lblKw: '要跟踪的关键词（每行一个）',
    domainPh: 'your-domain.com',
    posMapPh: '排名（逗号分隔，每个关键词一个，— 表示未上榜）',
    save: '保存快照',
    example: '示例',
    reset: '全部重置',
    noData: '尚无快照。输入关键词和排名，然后点击「保存快照」。',
    savedOk: '✓ 快照已保存 — 共跟踪 {n} 个关键词。',
    rankTop3: '前 3 名',
    rankTop10: '前 10 名',
    rankTop30: '前 30 名',
    rankBeyond: '30 名之后',
    notRanked: '未上榜',
    tracked: '已跟踪',
    snapshots: '快照数',
    avgPosition: '平均排名',
    bestPosition: '最佳',
    lastChecked: '最后检查',
    history: '历史',
    trendUp: '↑ 上升',
    trendDown: '↓ 下降',
    trendFlat: '= 持平',
    confirmReset: '确定删除所有已保存的排名数据？此操作不可撤销。',
    step1: '输入域名并选择 Google 地区',
    step2: '列出要跟踪的关键词（每行一个）',
    step3: '输入当前排名（逗号分隔）并点击「保存快照」',
    step4: '查看长期趋势 — 绿色=上升，红色=下降',
    note: '排名需来自真实 Google 搜索结果（建议用无痕模式以获得准确数据）。本工具将快照保存在本地以跟踪变化 — 不会自动抓取排名。',
  }
});

const { $, t } = GZ;
const STORE_KEY = 'gz-kw-rank-v1';

$('#lbl-kw').textContent = t('lblKw');
$('#domain').placeholder = t('domainPh');
$('#pos-map').placeholder = t('posMapPh');
$('#save-btn').textContent = t('save');

function loadData(){
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{"snapshots":[]}'); }
  catch(e){ return {snapshots: []}; }
}

function saveData(d){
  localStorage.setItem(STORE_KEY, JSON.stringify(d));
}

function saveSnapshot(){
  const keywords = $('#kw-list').value.split('\n').map(s=>s.trim()).filter(Boolean);
  if(!keywords.length){ $('#status').textContent = ''; return; }
  const posStr = $('#pos-map').value.split(',').map(s=>s.trim());
  const positions = keywords.map((_, i) => {
    const v = posStr[i];
    if(v === undefined || v === '' || v === '—' || v === '-') return null;
    const n = parseInt(v, 10);
    return isNaN(n) ? null : n;
  });

  const data = loadData();
  const snap = {
    date: new Date().toISOString().slice(0,10),
    domain: $('#domain').value.trim(),
    locale: $('#locale').value,
    keywords,
    positions,
  };
  data.snapshots.push(snap);
  saveData(data);

  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('savedOk').replace('{n}', keywords.length)}</span>`;
  renderHistory();
}

function loadExample(){
  $('#domain').value = 'example.com';
  $('#kw-list').value = 'best running shoes\ncheap web hosting\nhow to brew coffee\norganic skincare\ndog training tips';
  $('#pos-map').value = '3, 11, 7, —, 24';
  saveSnapshot();
}

function resetData(){
  if(!confirm(t('confirmReset'))) return;
  localStorage.removeItem(STORE_KEY);
  $('#status').textContent = '';
  $('#summary').style.display = 'none';
  $('#output').innerHTML = '';
}

function rankClass(pos){
  if(pos === null) return 'rank-notfound';
  if(pos <= 3) return 'rank-top3';
  if(pos <= 10) return 'rank-top10';
  if(pos <= 30) return 'rank-top30';
  return 'rank-beyond';
}

function rankLabel(pos){
  if(pos === null) return t('notRanked');
  if(pos <= 3) return t('rankTop3');
  if(pos <= 10) return t('rankTop10');
  if(pos <= 30) return t('rankTop30');
  return t('rankBeyond');
}

function renderHistory(){
  const data = loadData();
  if(!data.snapshots.length){
    $('#output').innerHTML = `<div class="note">${t('noData')}</div>`;
    $('#summary').style.display = 'none';
    return;
  }
  const latest = data.snapshots[data.snapshots.length - 1];
  const prev = data.snapshots.length > 1 ? data.snapshots[data.snapshots.length - 2] : null;

  const ranked = latest.positions.filter(p => p !== null);
  const avgPos = ranked.length ? (ranked.reduce((a,b)=>a+b,0) / ranked.length) : 0;
  const bestPos = ranked.length ? Math.min(...ranked) : 0;

  $('#summary').style.display = '';
  $('#summary').innerHTML = `
    <div class="summary-item"><div class="v">${latest.keywords.length}</div><div class="k">${t('tracked')}</div></div>
    <div class="summary-item"><div class="v">${data.snapshots.length}</div><div class="k">${t('snapshots')}</div></div>
    <div class="summary-item"><div class="v">${avgPos ? avgPos.toFixed(1) : '—'}</div><div class="k">${t('avgPosition')}</div></div>
    <div class="summary-item"><div class="v">${bestPos || '—'}</div><div class="k">${t('bestPosition')}</div></div>`;

  $('#output').innerHTML = latest.keywords.map((kw, i) => {
    const pos = latest.positions[i];
    const prevPos = prev ? (prev.positions[i] || null) : null;
    let trend = '';
    if(prevPos !== null && pos !== null){
      if(pos < prevPos) trend = `<span class="trend trend-up">${t('trendUp')} (${prevPos}→${pos})</span>`;
      else if(pos > prevPos) trend = `<span class="trend trend-down">${t('trendDown')} (${prevPos}→${pos})</span>`;
      else trend = `<span class="trend trend-flat">${t('trendFlat')}</span>`;
    }
    const hist = data.snapshots.map(s => {
      const p = s.positions[i];
      if(p === null || p === undefined) return `<div class="history-bar" style="height:2px"></div>`;
      const h = Math.max(4, 24 - (p-1)*0.7);
      const col = p <= 3 ? '#00d672' : p <= 10 ? '#61afef' : p <= 30 ? '#ffaa00' : '#e94560';
      return `<div class="history-bar" style="height:${h}px;background:${col}" title="${s.date}: #${p}"></div>`;
    }).join('');
    return `
      <div class="rank-card">
        <div class="rank-num ${rankClass(pos)}">${pos === null ? '—' : '#'+pos}</div>
        <div>
          <div class="kw-text">${kw}</div>
          <div class="kw-meta">${rankLabel(pos)} ${prev ? '· '+t('history')+':' : ''}</div>
          ${data.snapshots.length > 1 ? `<div class="history-row">${hist}</div>` : ''}
        </div>
        <div>${trend}</div>
      </div>`;
  }).join('');
}

$('#note').textContent = t('note');

GZ.renderToolPage({
  category: 'seo',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/seo/keyword-density.html', name:'Keyword Density'},
    {icon:'📊', href:'/seo/website-seo-checker.html', name:'Website SEO Checker'},
    {icon:'🔗', href:'/seo/backlink-checker.html', name:'Backlink Checker'},
    {icon:'⚡', href:'/seo/page-speed-checker.html', name:'Page Speed Checker'},
  ]
});

renderHistory();
</script>

</body>
