<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What does the robots meta tag do?","acceptedAnswer":{"@type":"Answer","text":"The robots meta tag controls how search engine crawlers index a page and use its content in search results. It works at the page level, complementing robots.txt which works at the URL path level."}},{"@type":"Question","name":"What is the difference between noindex and nofollow?","acceptedAnswer":{"@type":"Answer","text":"noindex tells search engines not to show the page in search results. nofollow tells them not to follow or pass link equity through links on the page. The two are independent — you can noindex a page but still allow its links to be followed."}},{"@type":"Question","name":"What does max-snippet do?","acceptedAnswer":{"@type":"Answer","text":"max-snippet limits the number of characters a search engine may use as a text snippet in search results. Setting max-snippet:0 disables snippets entirely for that page."}},{"@type":"Question","name":"Is this tool safe to use?","acceptedAnswer":{"@type":"Answer","text":"Yes. All tag generation runs in your browser. Nothing is uploaded to a server."}}]}</script>

<script>
GZI18n.register({en:{toolTitle:'Robots Meta Tag Generator',toolDesc:'Build advanced robots meta tags with index/follow, snippet, archive and image-preview directives for fine-grained SEO control.',step1:'Pick the directives you need (noindex, nofollow, nosnippet, etc.).',step2:'Optionally set max-snippet, max-image-preview, max-video-preview or unavailable_after.',step3:'Copy the generated <meta> tag into your page <head>.',lblMaxsnippet:'max-snippet (chars, -1 = no limit, 0 = none)',lblMaximage:'max-image-preview',lblMaxvideo:'max-video-preview (seconds, -1 = no limit)',lblUnavail:'unavailable_after (RFC 850 date)',lblBots:'Bot name',optIndex:'index',optIndexDesc:'Allow indexing in search results.',optNoindex:'noindex',optNoindexDesc:'Remove this page from search results.',optFollow:'follow',optFollowDesc:'Follow links on this page.',optNofollow:'nofollow',optNofollowDesc:'Do not follow links on this page.',optNosnippet:'nosnippet',optNosnippetDesc:'Prevent text snippets in search results.',optNoarchive:'noarchive',optNoarchiveDesc:'Prevent cached copy link in results.',optNoimageindex:'noimageindex',optNoimageindexDesc:'Do not index images on this page.',optNotranslate:'notranslate',optNotranslateDesc:'Do not offer translation of this page.',optNoodp:'noodp',optNoodpDesc:'Ignore Open Directory Project description.',optNositelinks:'nositelinkssearchbox',optNositelinksDesc:'Hide the sitelinks search box.',warnEmpty:'⚠ Select at least one directive, or set a snippet value, to generate a tag.'},zh:{toolTitle:'Robots Meta 标签生成器',toolDesc:'生成高级 robots meta 标签，包含 index/follow、摘要、归档、图片预览等指令，实现精细的 SEO 控制。',step1:'勾选所需指令（noindex、nofollow、nosnippet 等）。',step2:'可选：设置 max-snippet、max-image-preview、max-video-preview 或 unavailable_after。',step3:'将生成的 <meta> 标签复制到页面 head 中。',lblMaxsnippet:'max-snippet（字符数，-1 = 无限制，0 = 不显示）',lblMaximage:'max-image-preview',lblMaxvideo:'max-video-preview（秒，-1 = 无限制）',lblUnavail:'unavailable_after（RFC 850 日期）',lblBots:'爬虫名称',optIndex:'index',optIndexDesc:'允许在搜索结果中索引此页面。',optNoindex:'noindex',optNoindexDesc:'将此页面从搜索结果中移除。',optFollow:'follow',optFollowDesc:'跟踪此页面上的链接。',optNofollow:'nofollow',optNofollowDesc:'不跟踪此页面上的链接。',optNosnippet:'nosnippet',optNosnippetDesc:'禁止搜索结果显示文本摘要。',optNoarchive:'noarchive',optNoarchiveDesc:'禁止结果中显示缓存链接。',optNoimageindex:'noimageindex',optNoimageindexDesc:'不索引此页面的图片。',optNotranslate:'notranslate',optNotranslateDesc:'不提供此页面的翻译。',optNoodp:'noodp',optNoodpDesc:'忽略开放目录项目描述。',optNositelinks:'nositelinkssearchbox',optNositelinksDesc:'隐藏站点子链搜索框。',warnEmpty:'⚠ 请至少勾选一个指令或设置摘要值，才能生成标签。'}});
const {$,copyText,t}=GZ;
const opts=[
  {id:'optIndex',token:'index',def:true},
  {id:'optNoindex',token:'noindex',def:false},
  {id:'optFollow',token:'follow',def:true},
  {id:'optNofollow',token:'nofollow',def:false},
  {id:'optNosnippet',token:'nosnippet',def:false},
  {id:'optNoarchive',token:'noarchive',def:false},
  {id:'optNoimageindex',token:'noimageindex',def:false},
  {id:'optNotranslate',token:'notranslate',def:false},
  {id:'optNoodp',token:'noodp',def:false},
  {id:'optNositelinks',token:'nositelinkssearchbox',def:false}
];
$('#optGrid').innerHTML=opts.map(o=>`<label class="opt"><input type="checkbox" id="${o.id}" data-token="${o.token}" ${o.def?'checked':''}><span><strong>${t(o.id)}</strong><small>${t(o.id+'Desc')}</small></span></label>`).join('');
['maxSnippet','maxImagePreview','maxVideoPreview','unavailableAfter','botName'].forEach(id=>{
  $('#lbl-'+id.replace('maxSnippet','maxsnippet').replace('maxImagePreview','maximage').replace('maxVideoPreview','maxvideo').replace('unavailableAfter','unavail').replace('botName','bots')).textContent=t({maxSnippet:'lblMaxsnippet',maxImagePreview:'lblMaximage',maxVideoPreview:'lblMaxvideo',unavailableAfter:'lblUnavail',botName:'lblBots'}[id]);
});
function gen(){
  const tokens=[];
  document.querySelectorAll('#optGrid input[type=checkbox]').forEach(cb=>{
    if(cb.checked) tokens.push(cb.dataset.token);
  });
  const ms=$('#maxSnippet').value.trim();
  const mip=$('#maxImagePreview').value.trim();
  const mvp=$('#maxVideoPreview').value.trim();
  const ua=$('#unavailableAfter').value.trim();
  if(ms) tokens.push(`max-snippet:${ms}`);
  if(mip) tokens.push(`max-image-preview:${mip}`);
  if(mvp) tokens.push(`max-video-preview:${mvp}`);
  if(ua) tokens.push(`unavailable_after:${ua}`);
  // De-duplicate conflicting pairs: if noindex present, index is redundant; same for follow/nofollow
  const dedup=[];
  const seen={};
  tokens.forEach(tk=>{if(!seen[tk]){dedup.push(tk);seen[tk]=1;}});
  const bot=($('#botName').value.trim()||'robots');
  if(!dedup.length){$('#output').value='';$('#status').innerHTML=`<span style="color:var(--gz-accent)">${t('warnEmpty')}</span>`;return;}
  $('#output').value=`<meta name="${bot}" content="${dedup.join(', ')}">`;
  $('#status').innerHTML=`<span style="color:var(--gz-success)">✓ ${dedup.length} directive(s)</span>`;
}
function example(){
  document.querySelectorAll('#optGrid input[type=checkbox]').forEach(cb=>cb.checked=false);
  document.querySelector('#optNoindex').checked=true;
  document.querySelector('#optFollow').checked=true;
  document.querySelector('#optNoarchive').checked=true;
  $('#maxSnippet').value='160';
  $('#maxImagePreview').value='large';
  $('#maxVideoPreview').value='';
  $('#unavailableAfter').value='';
  $('#botName').value='';
  gen();
}
document.querySelectorAll('#optGrid input,#maxSnippet,#maxImagePreview,#maxVideoPreview,#unavailableAfter,#botName').forEach(el=>el.addEventListener('input',gen));
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="gen()">${t('generate')||'Generate'}</button><button class="gz-btn gz-btn-secondary" onclick="example()">${t('example')}</button><button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button><button class="gz-btn gz-btn-secondary" onclick="resetAll()">${t('clear')}</button>`;
function resetAll(){
  opts.forEach(o=>$('#'+o.id).checked=o.def);
  ['maxSnippet','maxImagePreview','maxVideoPreview','unavailableAfter','botName'].forEach(id=>$('#'+id).value='');
  gen();
}
window.example=example;
window.resetAll=resetAll;
GZ.renderToolPage({category:'seo',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3'],related:[{icon:'🤖',href:'/seo/robots-txt-generator.html',name:'Robots.txt Generator'},{icon:'✅',href:'/seo/robots-txt-validator.html',name:'Robots.txt Validator'},{icon:'🏷️',href:'/seo/meta-tag-generator.html',name:'Meta Tag Generator'},{icon:'🔗',href:'/seo/canonical-tag-generator.html',name:'Canonical Tag Generator'}]});
gen();
</script>
<script src="/tools-result-rec.js" defer></script>
