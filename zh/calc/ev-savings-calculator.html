<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How much money can I save driving an EV?", "acceptedAnswer": {"@type": "Answer", "text": "It depends on your mileage, local electricity and gas prices, and your car's efficiency. Typical US drivers save $800–$1,500 per year on fuel, but you should plug in your own numbers for an accurate estimate."}}, {"@type": "Question", "name": "How is the EV payback period calculated?", "acceptedAnswer": {"@type": "Answer", "text": "Payback period is the EV price premium divided by annual fuel savings. If an EV costs $6,000 more than a comparable gas car but saves $1,500/year on fuel, the payback period is 4 years."}}, {"@type": "Question", "name": "Does the calculator include maintenance or insurance?", "acceptedAnswer": {"@type": "Answer", "text": "This calculator focuses on fuel/energy cost and the up-front EV premium. EVs typically have lower maintenance costs, but insurance and other factors vary — include them in the EV premium if you want a fuller picture."}}, {"@type": "Question", "name": "How is CO2 reduction estimated?", "acceptedAnswer": {"@type": "Answer", "text": "We use average US grid emissions (~0.38 kg CO2 per kWh) and tailpipe gasoline emissions (~8.89 kg CO2 per gallon). Your local grid may be cleaner or dirtier, so this is an estimate."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'EV Savings Calculator',
    toolDesc: 'Compare electric vs gas car costs over time — annual fuel savings, CO2 reduction and EV payback period. Free, browser-based.',
    miles: 'Annual Miles Driven', gasPrice: 'Gas Price ($/gal)', elecPrice: 'Electricity Price ($/kWh)',
    mpg: 'Gas Car Efficiency (MPG)', mpkwh: 'EV Efficiency (mi/kWh)', evPremium: 'EV Price Premium ($)', years: 'Years of Ownership',
    calculate: 'Calculate Savings', clear: 'Clear',
    annualGasCost: 'Annual Gas Cost', annualElecCost: 'Annual Electricity Cost', annualFuelSave: 'Annual Fuel Savings',
    totalSave: 'Total Savings (over period)', payback: 'EV Payback Period', annualCo2: 'Annual CO2 Reduction',
    totalCo2: 'Total CO2 Reduction',
    year: 'Year', gasTotal: 'Gas Car Cumulative', evTotal: 'EV Cumulative (incl. premium)',
    disclaimer: 'Estimates only. Uses US-average grid emissions (~0.38 kg CO2/kWh) and gasoline tailpipe emissions (~8.89 kg CO2/gal). Local conditions vary.',
    step1: 'Enter annual miles and your local gas and electricity prices',
    step2: 'Set gas car MPG, EV mi/kWh and the EV price premium',
    step3: 'Choose years of ownership and click Calculate',
    step4: 'Review fuel savings, CO2 reduction and payback period',
  },
  zh: {
    toolTitle: '电动车省钱计算器',
    toolDesc: '对比电动车与燃油车的长期成本 — 年油费节省、CO2 减排和电动车回本周期。免费，浏览器本地运行。',
    miles: '年行驶里程', gasPrice: '油价 ($/加仑)', elecPrice: '电价 ($/度)',
    mpg: '燃油车效率 (MPG)', mpkwh: '电动车效率 (英里/度)', evPremium: '电动车溢价 ($)', years: '持有年限',
    calculate: '计算节省', clear: '清空',
    annualGasCost: '年度油费', annualElecCost: '年度电费', annualFuelSave: '年度燃料节省',
    totalSave: '期间总节省', payback: '电动车回本周期', annualCo2: '年度 CO2 减排',
    totalCo2: '总 CO2 减排',
    year: '年份', gasTotal: '燃油车累计', evTotal: '电动车累计（含溢价）',
    disclaimer: '仅为估算。采用美国电网平均排放（约 0.38 kg CO2/度）和汽油尾气排放（约 8.89 kg CO2/加仑）。实际情况以当地为准。',
    step1: '输入年行驶里程和当地油价、电价',
    step2: '设置燃油车 MPG、电动车每度里程和电动车溢价',
    step3: '选择持有年限并点击计算',
    step4: '查看油费节省、CO2 减排和回本周期',
  }
});

const { $, t } = GZ;
const fmt = n => '$' + Math.round(n).toLocaleString('en-US');
const fmtKg = n => (n / 1000).toLocaleString('en-US', {maximumFractionDigits:1}) + ' t';

const fields = [
  {id:'miles', placeholder:'13000', type:'number'},
  {id:'gasPrice', placeholder:'3.50', type:'number', step:'0.01'},
  {id:'elecPrice', placeholder:'0.16', type:'number', step:'0.01'},
  {id:'mpg', placeholder:'30', type:'number'},
  {id:'mpkwh', placeholder:'3.5', type:'number', step:'0.1'},
  {id:'evPremium', placeholder:'6000', type:'number'},
  {id:'years', placeholder:'8', type:'number'},
];
let html = '<div class="form-row">';
fields.forEach(f => {
  html += `<div class="field"><label for="f-${f.id}">${t(f.id)}</label><input type="${f.type}" id="f-${f.id}" placeholder="${f.placeholder}"${f.step?` step="${f.step}"`:''}></div>`;
});
html += '</div>';
$('#form-area').innerHTML = html;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculate()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.querySelectorAll('.form-row input').forEach(i=>i.value='');$('#results').classList.add('hidden');$('#chart').classList.add('hidden')">${t('clear')}</button>`;

$('#disclaimer').textContent = t('disclaimer');

function calculate() {
  const miles = parseFloat($('#f-miles').value) || 0;
  const gasPrice = parseFloat($('#f-gasPrice').value) || 0;
  const elecPrice = parseFloat($('#f-elecPrice').value) || 0;
  const mpg = parseFloat($('#f-mpg').value) || 0;
  const mpkwh = parseFloat($('#f-mpkwh').value) || 0;
  const evPremium = parseFloat($('#f-evPremium').value) || 0;
  const years = parseInt($('#f-years').value) || 0;
  if (miles <= 0 || mpg <= 0 || mpkwh <= 0 || years <= 0) return;

  const annualGas = (miles / mpg) * gasPrice;
  const annualElec = (miles / mpkwh) * elecPrice;
  const annualSave = annualGas - annualElec;
  const totalSave = annualSave * years;
  const payback = annualSave > 0 ? (evPremium / annualSave) : Infinity;

  // CO2 (kg): gas tailpipe 8.89 kg/gal; grid ~0.38 kg/kWh (US average)
  const gasCo2PerYear = (miles / mpg) * 8.89;
  const elecCo2PerYear = (miles / mpkwh) * 0.38;
  const annualCo2 = gasCo2PerYear - elecCo2PerYear;
  const totalCo2 = annualCo2 * years;

  const paybackText = isFinite(payback) ? (payback < 1 ? '< 1 yr' : payback.toFixed(1) + ' yrs') : '—';

  $('#results').classList.remove('hidden');
  $('#results').innerHTML = `
    <div class="result-cards">
      <div class="rcard"><div class="lbl">${t('annualGasCost')}</div><div class="val">${fmt(annualGas)}</div></div>
      <div class="rcard"><div class="lbl">${t('annualElecCost')}</div><div class="val">${fmt(annualElec)}</div></div>
      <div class="rcard save"><div class="lbl">${t('annualFuelSave')}</div><div class="val">${fmt(annualSave)}</div></div>
      <div class="rcard save"><div class="lbl">${t('totalSave')}</div><div class="val">${fmt(totalSave)}</div></div>
      <div class="rcard save"><div class="lbl">${t('payback')}</div><div class="val">${paybackText}</div></div>
      <div class="rcard co2"><div class="lbl">${t('annualCo2')}</div><div class="val">${fmtKg(annualCo2)}</div></div>
      <div class="rcard co2"><div class="lbl">${t('totalCo2')}</div><div class="val">${fmtKg(totalCo2)}</div></div>
    </div>`;

  drawChart(years, annualGas, annualElec, evPremium);
}

function drawChart(years, annualGas, annualElec, evPremium) {
  const canvas = $('#chart');
  canvas.classList.remove('hidden');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = 700 * dpr; canvas.height = 300 * dpr;
  canvas.style.width = '700px'; canvas.style.height = '300px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // cumulative
  const gasCum = [], evCum = [];
  for (let y = 1; y <= years; y++) {
    gasCum.push(annualGas * y);
    evCum.push(evPremium + annualElec * y);
  }
  const maxV = Math.max(gasCum[years-1], evCum[years-1], 1);

  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--gz-bg').trim() || '#0a0a0f';
  ctx.fillRect(0, 0, 700, 300);

  const pad = {l:70, r:20, t:20, b:40};
  const w = 700 - pad.l - pad.r, h = 300 - pad.t - pad.b;

  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + (h / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + w, y); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '11px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(fmt(maxV - (maxV / 4) * i), pad.l - 8, y + 4);
  }

  function x(i) { return pad.l + (i / (years - 1 || 1)) * w; }
  function yVal(v) { return pad.t + (1 - v / maxV) * h; }

  // Gas line
  ctx.beginPath(); ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2;
  gasCum.forEach((v, i) => { const px = x(i), py = yVal(v); if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py); });
  ctx.stroke();

  // EV line
  ctx.beginPath(); ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 2;
  evCum.forEach((v, i) => { const px = x(i), py = yVal(v); if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py); });
  ctx.stroke();

  // Legend
  ctx.font = '12px sans-serif';
  ctx.fillStyle = '#ef4444'; ctx.fillRect(pad.l, 280, 12, 12);
  ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.textAlign = 'left'; ctx.fillText('Gas Car', pad.l + 16, 291);
  ctx.fillStyle = '#22c55e'; ctx.fillRect(pad.l + 90, 280, 12, 12);
  ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.fillText('EV (incl. premium)', pad.l + 106, 291);
}

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⛽', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost Calculator'},
    {icon:'🔋', href:'/calc/ev-charging-cost-calculator.html', name:'EV Charging Cost'},
    {icon:'🌍', href:'/calc/carbon-footprint.html', name:'Carbon Footprint'},
    
  ]
});
</script>
