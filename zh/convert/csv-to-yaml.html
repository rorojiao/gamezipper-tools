<script>

  en: {

    toolDesc: 'Convert CSV data to clean YAML format instantly. Supports custom delimiters, headers, and quoted fields.',

    step3: 'Click Convert to generate YAML output',

  },
  zh: {
    toolTitle: 'CSV 转 YAML 转换器',
    toolDesc: '即时将 CSV 数据转换为干净的 YAML 格式。支持自定义分隔符、表头和引号字段。',
    step1: '在输入区粘贴 CSV 数据',
    step2: '选择分隔符（逗号、分号、制表符或竖线）',
    step3: '点击「转换」生成 YAML 输出',
    step4: '将 YAML 结果复制到剪贴板',
  }
});

const { $, copyText, t } = GZ;
let delimiter = ',';

function parseCSV(text, delim) {
  const lines = text.trim().split('\n');
  if (lines.length === 0) return [];
  const rows = [];
  for (const line of lines) {
    const row = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (inQuotes) {
        if (ch === '"' && line[i + 1] === '"') { current += '"'; i++; }
        else if (ch === '"') { inQuotes = false; }
        else { current += ch; }
      } else {
        if (ch === '"') { inQuotes = true; }
        else if (ch === delim) { row.push(current.trim()); current = ''; }
        else { current += ch; }
      }
    }
    row.push(current.trim());
    rows.push(row);
  }
  return rows;
}

function toYAML(obj, indent) {
  indent = indent || 0;
  const pad = '  '.repeat(indent);
  if (Array.isArray(obj)) {
    if (obj.length === 0) return '[]';
    let s = '';
    for (const item of obj) {
      if (typeof item === 'object' && item !== null) {
        const inner = toYAML(item, indent + 1);
        const lines = inner.split('\n');
        s += pad + '- ' + lines[0].trim() + '\n';
        for (let i = 1; i < lines.length; i++) {
          if (lines[i].trim()) s += pad + '  ' + lines[i].trim() + '\n';
        }
      } else {
        s += pad + '- ' + yamlVal(item) + '\n';
      }
    }
    return s.trimEnd();
  }
  if (typeof obj === 'object' && obj !== null) {
    let s = '';
    for (const [k, v] of Object.entries(obj)) {
      if (typeof v === 'object' && v !== null) {
        s += pad + k + ':\n' + toYAML(v, indent + 1) + '\n';
      } else {
        s += pad + k + ': ' + yamlVal(v) + '\n';
      }
    }
    return s.trimEnd();
  }
  return yamlVal(obj);
}

function yamlVal(v) {
  if (v === null || v === undefined) return 'null';
  if (v === 'true' || v === 'false') return v;
  if (v === '') return '""';
  if (!isNaN(v) && v !== '') return v;
  if (/[:{}\[\],&*?|>!%#`@\\]/.test(v) || v.includes('\n')) return JSON.stringify(v);
  return v;
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').value = ''; return; }
  try {
    const rows = parseCSV(inp, delimiter);
    if (rows.length < 2) { $('#output').value = ''; $('#status').textContent = 'Need at least a header row and one data row.'; return; }
    const headers = rows[0];
    const result = [];
    for (let i = 1; i < rows.length; i++) {
      const obj = {};
      headers.forEach((h, j) => { obj[h || ('col' + j)] = rows[i][j] || ''; });
      result.push(obj);
    }
    $('#output').value = toYAML(result);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${result.length} rows converted</span>`;
  } catch (e) {
    $('#output').value = '';
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">Error: ${e.message}</span>`;
  }
}

function loadExample() {
  $('#input').value = 'name,age,city,role\nAlice,30,New York,Engineer\nBob,25,London,Designer\nCarol,35,Tokyo,Manager';
  convert();
}

function doClear() { $('#input').value = ''; $('#output').value = ''; $('#status').innerHTML = ''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="convert()">${t('convert')}</button>
  <select class="gz-select" onchange="delimiter=this.value;convert()">
    <option value=",">Comma (,)</option>
    <option value=";">Semicolon (;)</option>
    <option value="\t">Tab</option>
    <option value="|">Pipe (|)</option>
  </select>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;
