<script>
GZI18n.register({
  en: {
    toolTitle: 'Barcode Generator',
    toolDesc: 'Generate CODE128, EAN-13, UPC-A, CODE39, ITF-14 and more barcodes online. Custom colors, height, download as PNG or SVG — 100% in your browser, no signup.',
    lblData: 'Barcode Data',
    lblType: 'Barcode Type',
    lblWidth: 'Bar Width',
    lblHeight: 'Bar Height (px)',
    lblFg: 'Bar Color',
    lblBg: 'Background',
    lblText: 'Show text',
    lblFlat: 'Flat (no margin)',
    emptyMsg: 'Enter data to generate barcode →',
    downloadPng: '⬇ Download PNG',
    downloadSvg: '⬇ Download SVG',
    copy: 'Copy SVG',
    step1: 'Type or paste the data to encode (numbers, text or product code)',
    step2: 'Choose the barcode format — CODE128 for general use, EAN-13 for retail',
    step3: 'Adjust bar width, height and colors if needed',
    step4: 'Download as PNG for print or SVG for vector use',
    faq1q: 'Which barcode type should I use?',
    faq1a: 'CODE128 is the most versatile — it encodes any text and is used for shipping and inventory. EAN-13 and UPC-A are for retail products sold in stores. CODE39 is common in industrial and automotive settings.',
    faq2q: 'Why is my EAN-13 barcode showing an error?',
    faq2a: 'EAN-13 requires exactly 12 numeric digits (the 13th checksum digit is added automatically). Make sure you entered only digits, no letters or spaces. The same applies to UPC-A (11 digits) and EAN-8 (7 digits).',
    faq3q: 'Can I generate barcodes in bulk?',
    faq3a: 'This tool generates one barcode at a time for precise control. For bulk generation you can use a spreadsheet to create data, then run each value through this tool.'
  },
  zh: {
    toolTitle: '条形码生成器',
    toolDesc: '在线生成 CODE128、EAN-13、UPC-A、CODE39、ITF-14 等条形码。自定义颜色、高度，下载 PNG 或 SVG — 100% 浏览器本地运行，无需注册。',
    lblData: '条形码数据',
    lblType: '条形码类型',
    lblWidth: '条宽',
    lblHeight: '条高 (px)',
    lblFg: '条色',
    lblBg: '背景色',
    lblText: '显示文字',
    lblFlat: '无边距',
    emptyMsg: '输入数据以生成条形码 →',
    downloadPng: '⬇ 下载 PNG',
    downloadSvg: '⬇ 下载 SVG',
    copy: '复制 SVG',
    step1: '输入或粘贴要编码的数据（数字、文本或产品代码）',
    step2: '选择条形码格式 — CODE128 通用，EAN-13 用于零售',
    step3: '按需调整条宽、高度和颜色',
    step4: '下载 PNG 用于打印或 SVG 用于矢量',
    faq1q: '我应该使用哪种条形码类型？',
    faq1a: 'CODE128 最通用 — 可编码任意文本，常用于物流和库存。EAN-13 和 UPC-A 用于零售商品。CODE39 常见于工业和汽车领域。',
    faq2q: '为什么我的 EAN-13 条形码报错？',
    faq2a: 'EAN-13 需要恰好 12 位数字（第 13 位校验码会自动计算）。确保只输入数字，无字母或空格。UPC-A（11 位）和 EAN-8（7 位）同理。',
    faq3q: '可以批量生成条形码吗？',
    faq3a: '此工具每次生成一个条形码以精确控制。如需批量生成，可先用表格准备数据，再依次输入此工具处理。'
  }
});

const { $, t, copyText } = GZ;

function generate() {
  const data = $('#data').value.trim();
  const type = $('#type').value;
  const errEl = $('#errorMsg');
  const wrap = $('#barcodeWrap');
  errEl.textContent = '';

  if (!data) {
    wrap.innerHTML = `<div class="empty">${t('emptyMsg')}</div>`;
    return;
  }

  try {
    // Create an SVG element for JsBarcode
    const svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    wrap.innerHTML = '';
    wrap.appendChild(svgEl);

    JsBarcode(svgEl, data, {
      format: type,
      width: parseFloat($('#width').value) || 2,
      height: parseInt($('#height').value) || 100,
      displayValue: $('#showText').checked,
      lineColor: $('#fg').value,
      background: $('#bg').value,
      margin: $('#flat').checked ? 0 : 10,
      font: 'monospace',
      fontSize: 16,
      textMargin: 2,
    });
  } catch (e) {
    wrap.innerHTML = `<div class="empty">${t('emptyMsg')}</div>`;
    errEl.textContent = '✗ ' + e.message;
  }
}

function downloadPng() {
  const svgEl = $('#barcodeWrap svg');
  if (!svgEl || !svgEl.tagName) return;
  const svgData = new XMLSerializer().serializeToString(svgEl);
  const img = new Image();
  const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  img.onload = () => {
    const canvas = document.createElement('canvas');
    const scale = 2;
    canvas.width = (img.width || svgEl.width.baseVal.value) * scale;
    canvas.height = (img.height || svgEl.height.baseVal.value) * scale;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = $('#bg').value;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    canvas.toBlob(b => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = 'barcode.png';
      a.click();
      URL.revokeObjectURL(a.href);
    });
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

function downloadSvg() {
  const svgEl = $('#barcodeWrap svg');
  if (!svgEl || !svgEl.tagName) return;
  const svgData = new XMLSerializer().serializeToString(svgEl);
  const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'barcode.svg';
  a.click();
  URL.revokeObjectURL(a.href);
}

function copySvg() {
  const svgEl = $('#barcodeWrap svg');
  if (!svgEl) return;
  const svgData = new XMLSerializer().serializeToString(svgEl);
  copyText(svgData);
}

// Live update on any input change
['data', 'type', 'width', 'height', 'fg', 'bg', 'showText', 'flat'].forEach(id => {
  const el = $('#' + id);
  el.addEventListener('input', generate);
  el.addEventListener('change', generate);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="downloadPng()">${t('downloadPng')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadSvg()">${t('downloadSvg')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copySvg()">${t('copy')}</button>`;

// Labels
$('#lbl-data').textContent = t('lblData');
$('#lbl-type').textContent = t('lblType');
$('#lbl-width').textContent = t('lblWidth');
$('#lbl-height').textContent = t('lblHeight');
$('#lbl-fg').textContent = t('lblFg');
$('#lbl-bg').textContent = t('lblBg');
$('#lbl-text').textContent = t('lblText');
$('#lbl-flat').textContent = t('lblFlat');
$('#empty-msg').textContent = t('emptyMsg');

  titleKey: 'toolTitle',
  descKey: 'toolDesc',

    { icon: '🏷️', href: '/image/barcode-label-maker.html', name: 'Barcode Label Maker' },
    { icon: '📱', href: '/convert/qrcode.html', name: 'QR Code Generator' },
    { icon: '📋', href: '/dev/json.html', name: 'JSON Formatter' },
    { icon: '🔢', href: '/convert/number-base.html', name: 'Number Base' },
  ]
});

generate();
</script>
