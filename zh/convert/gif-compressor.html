function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(2) + ' MB';
}

    // Simple GIF re-encoding approach: render frames to canvas, re-sample
    const gif = await parseGIF(arrayBuffer);

    // Create compressed output

// Simple GIF parser - extract frame data
async function parseGIF(buffer) {
  const bytes = new Uint8Array(buffer);
  let pos = 0;

  // Header
  const sig = String.fromCharCode(bytes[0], bytes[1], bytes[2]);
  const ver = String.fromCharCode(bytes[3], bytes[4], bytes[5]);
  if (sig !== 'GIF' || (ver !== '89a' && ver !== '87a')) throw new Error('Not a valid GIF');

  // Logical Screen Descriptor
  const width = bytes[6] | (bytes[7] << 8);
  const height = bytes[8] | (bytes[9] << 8);
  const packed = bytes[10];
  const hasGCT = (packed >> 7) & 1;
  const gctSize = 2 << (packed & 7);
  const bgColor = bytes[11];
  const aspect = bytes[12];
  pos = 13;

  let gct = null;
  if (hasGCT) {
    gct = bytes.slice(pos, pos + gctSize * 3);
    pos += gctSize * 3;
  }

  const frames = [];
  let currentFrame = null;
  let delay = 100;
  let dispose = 0;
  let transIdx = -1;
  let hasTrans = false;

  while (pos < bytes.length) {
    const block = bytes[pos];
    if (block === 0x21) { // Extension
      pos++;
      const label = bytes[pos++];
      if (label === 0xF9) { // Graphics Control Extension
        pos++; // block size
        const p = bytes[pos++];
        dispose = (p >> 2) & 7;
        hasTrans = (p & 1) === 1;
        delay = bytes[pos] | (bytes[pos + 1] << 8);
        pos += 2;
        transIdx = bytes[pos++];
        pos++; // terminator
      } else {
        // Skip other extensions
        while (bytes[pos] !== 0) {
          const sz = bytes[pos++];
          pos += sz;
        }
        pos++;
      }
    } else if (block === 0x2C) { // Image Descriptor
      pos++;
      const left = bytes[pos] | (bytes[pos + 1] << 8); pos += 2;
      const top = bytes[pos] | (bytes[pos + 1] << 8); pos += 2;
      const fw = bytes[pos] | (bytes[pos + 1] << 8); pos += 2;
      const fh = bytes[pos] | (bytes[pos + 1] << 8); pos += 2;
      const ip = bytes[pos++];
      const hasLCT = (ip >> 7) & 1;
      const interlaced = (ip >> 6) & 1;
      const lctSize = hasLCT ? (2 << (ip & 7)) : 0;

      let lct = null;
      if (hasLCT) {
        lct = bytes.slice(pos, pos + lctSize * 3);
        pos += lctSize * 3;
      }

      // LZW min code size
      const minCode = bytes[pos++];
      // Read sub-blocks
      const dataBlocks = [];
      while (bytes[pos] !== 0) {
        const sz = bytes[pos++];
        dataBlocks.push(bytes.slice(pos, pos + sz));
        pos += sz;
      }
      pos++; // terminator

      const imageData = new Uint8Array(dataBlocks.reduce((a, b) => a + b.length, 0));
      let off = 0;
      for (const d of dataBlocks) { imageData.set(d, off); off += d.length; }

      frames.push({
        left, top, width: fw, height: fh, delay: delay * 10,
        dispose, hasTrans, transIdx,
        lct, gct, minCode, imageData,
        interlaced
      });
    } else if (block === 0x3B) { // Trailer
      break;
    } else {
      pos++;
    }
  }

  return { width, height, frames, gct, bgColor };
}

async function reEncodeGif(gif, opts) {
  // Use canvas to render each frame, then re-encode with reduced colors
  const canvas = document.createElement('canvas');
  const nw = Math.round(gif.width * opts.scaleFactor);
  const nh = Math.round(gif.height * opts.scaleFactor);
  canvas.width = nw;
  canvas.height = nh;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;

  // Create full image from original GIF using Image element
  const img = new Image();
  const blob = new Blob([originalFile], { type: 'image/gif' });
  const url = URL.createObjectURL(blob);

  // For animated GIFs, we use a canvas-based approach to re-render with optimization
  // Simpler approach: just quantize and re-encode from original frames

  // Re-encode using GIF89a format with reduced color tables
  const out = [];
  const writeByte = b => out.push(b & 0xFF);
  const writeShort = s => { writeByte(s & 0xFF); writeByte((s >> 8) & 0xFF); };
  const writeString = s => { for (let i = 0; i < s.length; i++) writeByte(s.charCodeAt(i)); };
  const writeBytes = arr => { for (const b of arr) writeByte(b); };

  // Header
  writeString('GIF89a');

  // Calculate new palette size
  const paletteSize = Math.max(4, Math.min(256, opts.maxColors));
  const paletteBits = Math.ceil(Math.log2(paletteSize));
  const actualPaletteSize = 1 << paletteBits;

  // Logical Screen Descriptor
  writeShort(nw);
  writeShort(nh);
  writeByte(0x80 | (paletteBits - 1)); // has GCT
  writeByte(0);
  writeByte(0);

  // Generate optimized global color table from first frame
  // For simplicity, render original to canvas and sample colors
  await new Promise((resolve, reject) => {
    img.onload = resolve;
    img.onerror = reject;
    img.src = url;
  });

  ctx.drawImage(img, 0, 0, nw, nh);
  const imageData = ctx.getImageData(0, 0, nw, nh);
  const pixels = imageData.data;

  // Apply lossy - average nearby pixels
  if (opts.lossyLevel > 0) {
    const factor = Math.floor(opts.lossyLevel / 20);
    for (let y = 0; y < nh - factor; y += (factor + 1)) {
      for (let x = 0; x < nw - factor; x += (factor + 1)) {
        let r = 0, g = 0, b = 0, count = 0;
        for (let dy = 0; dy <= factor && y + dy < nh; dy++) {
          for (let dx = 0; dx <= factor && x + dx < nw; dx++) {
            const i = ((y + dy) * nw + (x + dx)) * 4;
            r += pixels[i]; g += pixels[i + 1]; b += pixels[i + 2]; count++;
          }
        }
        r = Math.round(r / count); g = Math.round(g / count); b = Math.round(b / count);
        for (let dy = 0; dy <= factor && y + dy < nh; dy++) {
          for (let dx = 0; dx <= factor && x + dx < nw; dx++) {
            const i = ((y + dy) * nw + (x + dx)) * 4;
            pixels[i] = r; pixels[i + 1] = g; pixels[i + 2] = b;
          }
        }
      }
    }
  }

  // Simple color quantization - sample unique colors
  const colorMap = new Map();
  const step = Math.max(1, Math.floor(Math.sqrt(pixels.length / 4 / paletteSize)));
  for (let i = 0; i < pixels.length; i += 4 * step) {
    const r = pixels[i] >> (opts.lossyLevel > 100 ? 2 : opts.lossyLevel > 50 ? 1 : 0);
    const g = pixels[i + 1] >> (opts.lossyLevel > 100 ? 2 : opts.lossyLevel > 50 ? 1 : 0);
    const b = pixels[i + 2] >> (opts.lossyLevel > 100 ? 2 : opts.lossyLevel > 50 ? 1 : 0);
    const key = (r << 16) | (g << 8) | b;
    if (!colorMap.has(key)) {
      colorMap.set(key, [pixels[i], pixels[i + 1], pixels[i + 2]]);
    }
    if (colorMap.size >= actualPaletteSize) break;
  }

  // Fill palette
  const palette = new Array(actualPaletteSize).fill([0, 0, 0]);
  let idx = 0;
  for (const c of colorMap.values()) {
    if (idx >= actualPaletteSize) break;
    palette[idx++] = c;
  }

  // Write GCT
  for (const c of palette) {
    writeByte(c[0]); writeByte(c[1]); writeByte(c[2]);
  }

  // Netscape extension for looping
  writeByte(0x21); writeByte(0xFF);
  writeByte(11); writeString('NETSCAPE2.0');
  writeByte(3); writeByte(1);
  writeShort(0); // loop forever
  writeByte(0);

  // Find closest color in palette
  function findClosest(r, g, b) {
    let best = 0, bestDist = Infinity;
    for (let i = 0; i < palette.length; i++) {
      const dr = r - palette[i][0], dg = g - palette[i][1], db = b - palette[i][2];
      const d = dr * dr + dg * dg + db * db;
      if (d < bestDist) { bestDist = d; best = i; }
    }
    return best;
  }

  // Build indexed image
  const indexed = new Uint8Array(nw * nh);
  for (let i = 0; i < nw * nh; i++) {
    const pi = i * 4;
    if (pixels[pi + 3] < 128) {
      indexed[i] = 0;
    } else {
      indexed[i] = findClosest(pixels[pi], pixels[pi + 1], pixels[pi + 2]);
    }
  }

  // LZW encode
  function lzwEncode(pixels, minCodeSize) {
    const clearCode = 1 << minCodeSize;
    const eoiCode = clearCode + 1;
    let codeSize = minCodeSize + 1;
    let nextCode = eoiCode + 1;
    const table = new Map();

    const output = [];
    let buffer = 0;
    let bitsInBuffer = 0;

    function writeBits(code, size) {
      buffer |= (code << bitsInBuffer);
      bitsInBuffer += size;
      while (bitsInBuffer >= 8) {
        output.push(buffer & 0xFF);
        buffer >>= 8;
        bitsInBuffer -= 8;
      }
    }

    // Initialize
    for (let i = 0; i < clearCode; i++) table.set(String(i), i);

    writeBits(clearCode, codeSize);

    let current = String(pixels[0]);
    for (let i = 1; i < pixels.length; i++) {
      const next = String(pixels[i]);
      const combined = current + ',' + next;
      if (table.has(combined)) {
        current = combined;
      } else {
        writeBits(table.get(current), codeSize);
        if (nextCode < 4096) {
          table.set(combined, nextCode++);
          if (nextCode > (1 << codeSize) && codeSize < 12) codeSize++;
        } else {
          writeBits(clearCode, codeSize);
          table.clear();
          for (let j = 0; j < clearCode; j++) table.set(String(j), j);
          nextCode = eoiCode + 1;
          codeSize = minCodeSize + 1;
        }
        current = next;
      }
    }
    if (current) writeBits(table.get(current), codeSize);
    writeBits(eoiCode, codeSize);
    if (bitsInBuffer > 0) output.push(buffer & 0xFF);

    return output;
  }

  // If animated, render each frame
  const numFrames = Math.max(1, gif.frames.length);
  const delays = numFrames > 1 ? gif.frames.map(f => f.delay) : [100];

  for (let f = 0; f < numFrames; f++) {
    // Render frame to canvas
    if (numFrames > 1) {
      // Re-draw original GIF at frame position
      // Simple approach: just re-draw full image (browser handles it)
      // For better quality, we'd need frame-by-frame rendering
      ctx.clearRect(0, 0, nw, nh);
      // Draw previous composite then current frame
    }

    // GCE
    writeByte(0x21); writeByte(0xF9);
    writeByte(4);
    writeByte(0x00); // disposal, no transparency for simplicity
    const delayCs = Math.max(2, Math.round(delays[f] / 10));
    writeShort(delayCs);
    writeByte(0);
    writeByte(0);

    // Image descriptor
    writeByte(0x2C);
    writeShort(0); writeShort(0);
    writeShort(nw); writeShort(nh);
    writeByte(0); // no LCT, not interlaced

    // LZW data
    const minCode = Math.max(2, paletteBits);
    writeByte(minCode);

    const lzw = lzwEncode(indexed, minCode);
    // Write in sub-blocks
    for (let i = 0; i < lzw.length; i += 255) {
      const chunk = lzw.slice(i, i + 255);
      writeByte(chunk.length);
      for (const b of chunk) writeByte(b);
    }
    writeByte(0); // terminator
  }

  // Trailer
  writeByte(0x3B);

  URL.revokeObjectURL(url);
  return new Uint8Array(out);
}

async function fallbackCompress(file, lossy, scale) {
  // Simple canvas-based re-encoding fallback
  const img = new Image();
  const url = URL.createObjectURL(file);
  await new Promise((r, j) => { img.onload = r; img.onerror = j; img.src = url; });

  const w = Math.round(img.width * scale / 100);
  const h = Math.round(img.height * scale / 100);
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, w, h);

  // Apply lossy by re-drawing at lower quality
  const quality = Math.max(0.1, 1 - lossy / 250);
  const blob = await new Promise(r => canvas.toBlob(r, 'image/gif', quality));
  URL.revokeObjectURL(url);
  return await blob.arrayBuffer();
}
