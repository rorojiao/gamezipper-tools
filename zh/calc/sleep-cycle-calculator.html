<script>
GZI18n.register({
  en: {
    toolTitle: 'Sleep Cycle Calculator',
    toolDesc: 'Find the best bedtime or wake-up time based on 90-minute sleep cycles so you wake up refreshed.',
    tabWake: 'I want to wake up at →',
    tabSleep: 'I will sleep now / at →',
    wakeLabel: 'Wake-up time',
    sleepLabel: 'Bedtime',
    rec: 'Recommended',
    cyclesLabel: 'cycles',
    hoursLabel: 'hours of sleep',
    shouldSleep: 'Go to bed at one of these times',
    shouldWake: 'Set your alarm for one of these times',
    tip: 'Tip: Try to sleep and wake at the same time every day — even on weekends. Consistency matters more than getting the cycles exactly right.',
    step1: 'Choose a mode — find bedtime from wake-up, or wake-up from bedtime',
    step2: 'Enter the target time',
    step3: 'Pick one of the 4-6 suggested times (cycles of 6 are ideal)',
    step4: 'Aim for the same schedule every day for best results',
  },
  zh: {
    toolTitle: '睡眠周期计算器',
    toolDesc: '根据 90 分钟睡眠周期找出最佳入睡或起床时间，让你在周期末自然醒来、神清气爽。',
    tabWake: '我想在此时起床 →',
    tabSleep: '我现在/此时入睡 →',
    wakeLabel: '起床时间',
    sleepLabel: '入睡时间',
    rec: '推荐',
    cyclesLabel: '个周期',
    hoursLabel: '小时睡眠',
    shouldSleep: '请在以下时间入睡',
    shouldWake: '请在以下时间设置闹钟',
    tip: '提示：尽量每天在同一时间入睡和起床 — 包括周末。规律比精确到分钟更重要。',
    step1: '选择模式 — 根据起床时间算入睡时间，或根据入睡时间算起床时间',
    step2: '输入目标时间',
    step3: '从 4-6 个建议时间中选择一个（6 个周期最理想）',
    step4: '每天保持同样的作息表效果最佳',
  }
});

const { $, t } = GZ;
let mode = 'wake';
const CYCLE_MIN = 90;
const FALL_ASLEEP_MIN = 15;

function pad(n) { return String(n).padStart(2,'0'); }

function parseTime(str) {
  const m = str.match(/^(\d{1,2}):(\d{2})/);
  if (!m) return null;
  return {h: +m[1], m: +m[2]};
}

function fmtTime(totalMin) {
  totalMin = ((totalMin % 1440) + 1440) % 1440;
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return `${pad(h)}:${pad(m)}`;
}

function renderTabs() {
  $('#tabs').innerHTML = `
    <div class="tab ${mode==='wake'?'active':''}" onclick="switchMode('wake')">${t('tabWake')}</div>
    <div class="tab ${mode==='sleep'?'active':''}" onclick="switchMode('sleep')">${t('tabSleep')}</div>`;
}

function switchMode(m) { mode = m; renderTabs(); renderInput(); recalc(); }

function renderInput() {
  const label = mode === 'wake' ? t('wakeLabel') : t('sleepLabel');
  const value = mode === 'wake' ? '07:00' : '23:00';
  $('#input-area').innerHTML = `
    <div class="time-input">
      <label>${label}</label>
      <input type="time" id="timeVal" value="${value}" oninput="recalc()">
    </div>`;
}

function recalc() {
  const tv = $('#timeVal') ? $('#timeVal').value : '';
  const parsed = parseTime(tv);
  const out = $('#result');
  if (!parsed) { out.innerHTML = ''; return; }
  const targetMin = parsed.h * 60 + parsed.m;

  // For wake-up mode: subtract (cycles×90 + 15 fall-asleep buffer) from wake time
  // For sleep mode: add (15 + cycles×90)
  const cycles = [6, 5, 4, 3];  // 9, 7.5, 6, 4.5 hours
  let cards = '';
  const header = mode === 'wake' ? t('shouldSleep') : t('shouldWake');
  cycles.forEach((c, i) => {
    const totalSleep = c * CYCLE_MIN;
    const offset = totalSleep + FALL_ASLEEP_MIN;
    let result;
    if (mode === 'wake') {
      result = targetMin - offset;
    } else {
      result = targetMin + offset;
    }
    const recommended = (c === 5 || c === 6) ? 'recommended' : '';
    cards += `
      <div class="cycle-card ${recommended}">
        <div class="big">${fmtTime(result)}</div>
        <div class="cycles">${c} ${t('cyclesLabel')}</div>
        <div class="hrs">${(totalSleep/60).toFixed(1)} ${t('hoursLabel')}</div>
        ${recommended ? `<div class="sub" style="color:var(--accent);font-weight:600">★ ${t('rec')}</div>` : ''}
      </div>`;
  });

  out.innerHTML = `
    <div style="color:var(--text2);font-size:.92em;margin-bottom:10px">${header}</div>
    <div class="results">${cards}</div>
    <div class="tip">💡 ${t('tip')}</div>`;
}

window.switchMode = switchMode;
window.recalc = recalc;

$('#toolbar').innerHTML = '';

renderTabs();
renderInput();
recalc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌙', href:'/calc/sleep-calculator.html', name:'Sleep Calculator'},
    {icon:'⏰', href:'/calc/alarm-clock.html', name:'Alarm Clock'},
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro Timer'},
    {icon:'❤️', href:'/calc/heart-rate-zones.html', name:'Heart Rate Zones'},
  ]
});
</script>
