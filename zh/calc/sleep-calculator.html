.sleep-card .badge{position:absolute;top:8px;right:8px;background:#00d672;color:#000;font-size:.65em;font-weight:700;padding:2px 6px;border-radius:6px;text-transform:uppercase;letter-spacing:.3px}
.sleep-info{background:var(--glass2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:18px;font-size:.88em;line-height:1.7;color:var(--text2)}
.sleep-info strong{color:var(--accent)}
.sleep-quality{display:flex;gap:6px;margin-top:6px}

.sleep-quality .dot.filled{background:linear-gradient(135deg,var(--accent),var(--accent2))}

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How does the sleep cycle calculator work?", "acceptedAnswer": {"@type": "Answer", "text": "Sleep cycles last about 90 minutes. The calculator works backward or forward from a target time in 90-minute cycles (plus 15 minutes to fall asleep), suggesting the best times to wake up or go to bed."}}, {"@type": "Question", "name": "How long does it take to fall asleep?", "acceptedAnswer": {"@type": "Answer", "text": "The calculator assumes 15 minutes to fall asleep. This is a healthy adult average. If you typically take longer to fall asleep, add that time to your bedtime result."}}, {"@type": "Question", "name": "What is the best sleep cycle length?", "acceptedAnswer": {"@type": "Answer", "text": "Most adults complete one full sleep cycle in about 90 minutes, going through light sleep, deep sleep and REM. Waking up at the end of a cycle (rather than in the middle of deep sleep) leaves you feeling more refreshed."}}, {"@type": "Question", "name": "How many hours of sleep do I need?", "acceptedAnswer": {"@type": "Answer", "text": "The National Sleep Foundation recommends 7-9 hours for adults, 8-10 for teenagers, 9-11 for school-age children, and 10-13 for preschoolers. The calculator shows 4-6 cycles (6-9 hours) to match these recommendations."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Sleep Cycle Calculator',
    toolDesc: 'Calculate the best times to wake up or go to bed based on 90-minute sleep cycles.',
    wakeMode: 'I want to wake up at...',
    bedMode: 'I want to go to bed at...',
    wakeTime: 'Wake up time',
    bedTime: 'Bedtime',
    fallAsleep: 'Time to fall asleep',
    optimal: 'Optimal',
    cycles1: '1 sleep cycle (1.5 hr)',
    cycles2: '2 sleep cycles (3 hr)',
    cycles3: '3 sleep cycles (4.5 hr)',
    cycles4: '4 sleep cycles (6 hr)',
    cycles5: '5 sleep cycles (7.5 hr)',
    cycles6: '6 sleep cycles (9 hr)',
    hours1: '1.5 hours of sleep',
    hours2: '3 hours of sleep',
    hours3: '4.5 hours of sleep',
    hours4: '6 hours of sleep',
    hours5: '7.5 hours of sleep',
    hours6: '9 hours of sleep',
    wakeAt: 'Wake up at',
    goToBed: 'Go to bed at',
    step1: 'Pick "wake up at" or "go to bed at" mode',
    step2: 'Enter your target time and how long you take to fall asleep',
    step3: 'View optimal times based on 90-minute sleep cycles',
    step4: 'The best result (5-6 cycles) is highlighted in green',
    info1: 'A complete <strong>sleep cycle</strong> lasts about <strong>90 minutes</strong>, going through light sleep, deep sleep and REM. Waking at the end of a cycle leaves you feeling refreshed, while waking mid-cycle causes grogginess (sleep inertia).',
    info2: '<strong>Recommended sleep duration:</strong> 7-9 hours for adults, 8-10 hours for teens, 9-11 hours for school-age children (National Sleep Foundation).',
  },
  zh: {
    toolTitle: '睡眠周期计算器',
    toolDesc: '基于 90 分钟睡眠周期，计算最佳入睡或起床时间。',
    wakeMode: '我想在...起床',
    bedMode: '我想在...睡觉',
    wakeTime: '起床时间',
    bedTime: '睡觉时间',
    fallAsleep: '入睡所需时间',
    optimal: '最佳',
    cycles1: '1 个睡眠周期 (1.5 小时)',
    cycles2: '2 个睡眠周期 (3 小时)',
    cycles3: '3 个睡眠周期 (4.5 小时)',
    cycles4: '4 个睡眠周期 (6 小时)',
    cycles5: '5 个睡眠周期 (7.5 小时)',
    cycles6: '6 个睡眠周期 (9 小时)',
    hours1: '1.5 小时睡眠',
    hours2: '3 小时睡眠',
    hours3: '4.5 小时睡眠',
    hours4: '6 小时睡眠',
    hours5: '7.5 小时睡眠',
    hours6: '9 小时睡眠',
    wakeAt: '起床时间',
    goToBed: '睡觉时间',
    step1: '选择「我要起床」或「我要睡觉」模式',
    step2: '输入目标时间和入睡所需时间',
    step3: '查看基于 90 分钟睡眠周期的最佳时间',
    step4: '最佳结果（5-6 个周期）以绿色高亮显示',
    info1: '一个完整的<strong>睡眠周期</strong>约 <strong>90 分钟</strong>，包含浅睡、深睡和快速眼动期。在周期末醒来会感觉神清气爽，而在周期中醒来会导致睡眠惯性（起床气）。',
    info2: '<strong>推荐睡眠时长：</strong>成人 7-9 小时，青少年 8-10 小时，学龄儿童 9-11 小时（美国国家睡眠基金会）。',
  }
});

const { $, t } = GZ;
let currentMode = 'wake';

$('#m-wake').textContent = t('wakeMode');
$('#m-bed').textContent = t('bedMode');

function setMode(m) {
  currentMode = m;
  document.querySelectorAll('.sleep-mode-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.sleep-mode-btn[data-mode="${m}"]`).classList.add('active');
  $('#lbl-time').textContent = m === 'wake' ? t('wakeTime') : t('bedTime');
  if (m === 'wake') $('#time').value = '07:00'; else $('#time').value = '23:00';
  calc();
}

document.querySelectorAll('.sleep-mode-btn').forEach(btn => {
  btn.addEventListener('click', () => setMode(btn.dataset.mode));
});

$('#lbl-time').textContent = t('wakeTime');

function formatTime(date) {
  const h = date.getHours().toString().padStart(2,'0');
  const m = date.getMinutes().toString().padStart(2,'0');
  return `${h}:${m}`;
}

function parseTime(str) {
  const [h, m] = str.split(':').map(Number);
  const d = new Date();
  d.setHours(h, m, 0, 0);
  return d;
}

function calc() {
  const timeStr = $('#time').value;
  if (!timeStr) return;
  const fallMin = parseInt($('#fall').value);
  const base = parseTime(timeStr);
  const cycles = [3, 4, 5, 6]; // 4.5h, 6h, 7.5h, 9h
  const results = [];
  for (const c of cycles) {
    const target = new Date(base);
    if (currentMode === 'wake') {
      // If wake time, work backward: bedtime = wake - (cycles * 90 + fall asleep)
      const offset = c * 90 + fallMin;
      target.setMinutes(target.getMinutes() - offset);
      results.push({ cycles: c, time: target, optimal: c === 5 || c === 6 });
    } else {
      // If bed time, work forward: wake = bed + (cycles * 90 + fall asleep)
      const offset = c * 90 + fallMin;
      target.setMinutes(target.getMinutes() + offset);
      results.push({ cycles: c, time: target, optimal: c === 5 || c === 6 });
    }
  }

  const timeLabel = currentMode === 'wake' ? t('goToBed') : t('wakeAt');
  const html = '<div class="sleep-results">' + results.map(r => {
    const cycleTxt = t('cycles' + r.cycles);
    const labelTxt = t('hours' + r.cycles);
    return `<div class="sleep-card${r.optimal ? ' optimal' : ''}">
      ${r.optimal ? `<div class="badge">${t('optimal')}</div>` : ''}
      <div class="time">${formatTime(r.time)}</div>
      <div class="label">${timeLabel}</div>
      <div class="cycles">${cycleTxt}</div>
      <div class="cycles">${labelTxt}</div>
    </div>`;
  }).join('') + '</div>';
  $('#results').innerHTML = html;
  $('#info').innerHTML = '<p>' + t('info1') + '</p><p>' + t('info2') + '</p>';
}

$('#time').addEventListener('change', calc);
$('#fall').addEventListener('change', calc);
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎂', href:'/calc/age-calculator.html', name:'Age Calculator'},
    {icon:'⏰', href:'/calc/hours-calculator.html', name:'Hours Calculator'},
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro'},
    {icon:'⏱️', href:'/calc/timer-stopwatch.html', name:'Timer'},
  ]
});
</script>

</body>
