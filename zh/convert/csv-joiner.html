    noMatch: '未找到匹配行',
    step1: '将第一个 CSV 粘贴到输入 A',
    step2: '将第二个 CSV 粘贴到输入 B',

    step4: '点击合并并下载结果',

const { $, copyText, t } = GZ;
let mode = 'stack';

function parseCSV(text, delim) {
  if (!text.trim()) return [];
  const lines = text.trim().split('\n');
  return lines.map(l => {
    const row = [];
    let cur = '', inQ = false;
    for (let i = 0; i < l.length; i++) {
      const c = l[i];
      if (c === '"') { if (inQ && l[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
      else if (c === delim && !inQ) { row.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    row.push(cur.trim());
    return row;
  });
}

function toCSVRow(arr, delim) {
  return arr.map(v => {
    const s = String(v == null ? '' : v);
    return (s.includes(delim) || s.includes('"') || s.includes('\n')) ? '"' + s.replace(/"/g, '""') + '"' : s;
  }).join(delim);
}

function getDelim(sel) {
  const v = sel.value;
  if (v === 'auto') { const t = $('#inputA').value || $('#inputB').value; if (t.includes('\t')) return '\t'; if (t.includes(';')) return ';'; if (t.includes('|')) return '|'; return ','; }
  if (v === 'tab') return '\t';
  if (v === 'semicolon') return ';';
  if (v === 'pipe') return '|';
  return v || ',';
}

function doMerge() {
  const inDelim = getDelim($('#inDelim'));
  const outDelimEl = $('#outDelim');
  const outDelim = outDelimEl.value === 'tab' ? '\t' : outDelimEl.value === 'semicolon' ? ';' : outDelimEl.value === 'pipe' ? '|' : ',';

  const a = parseCSV($('#inputA').value, inDelim);
  const b = parseCSV($('#inputB').value, inDelim);
  if (!a.length && !b.length) return;

  let result;
  if (mode === 'stack') {
    if (!a.length) result = b;
    else if (!b.length) result = a;
    else {
      const cols = Math.max(a[0].length, b[0].length);
      result = [...a, ...b.map(r => { while (r.length < cols) r.push(''); return r.slice(0, cols); })];
    }
  } else {
    // Join on key
    const keyIdx = parseInt($('#keyCol').value) || 0;
    if (!a.length || !b.length) { result = a.length ? a : b; }
    else {
      const headerA = a[0], headerB = b[0];
      const header = [...headerA, ...headerB.filter((_, i) => i !== keyIdx).map((h, i) => h || `B_col${i}`)];
      result = [header];
      const map = {};
      for (let i = 1; i < b.length; i++) { const k = b[i][keyIdx] || ''; if (!map[k]) map[k] = []; map[k].push(b[i]); }
      for (let i = 1; i < a.length; i++) {
        const k = a[i][keyIdx] || '';
        const match = map[k];
        if (match && match.length) {
          match.forEach(m => result.push([...a[i], ...m.filter((_, j) => j !== keyIdx)]));
        } else {
          result.push([...a[i], ...Array(headerB.length - 1).fill('')]);
        }
      }
    }
  }

  const out = result.map(r => toCSVRow(r, outDelim)).join('\n');
  $('#output').textContent = out;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${result.length - 1} ${t('mergedRows')}</span>`;
}

function loadExample() {
  $('#inputA').value = 'Name,Email,Dept\nAlice,alice@test.com,Engineering\nBob,bob@test.com,Marketing\nCarol,carol@test.com,Engineering';
  $('#inputB').value = 'Name,Salary,City\nAlice,95000,New York\nBob,72000,London\nDave,88000,Berlin';
  // Reset key column options
  updateKeyOptions();
  doMerge();
}

function updateKeyOptions() {
  const inDelim = getDelim($('#inDelim'));
  const a = parseCSV($('#inputA').value, inDelim);
  const sel = $('#keyCol');
  if (!sel) return;
  sel.innerHTML = '';
  if (a.length) {
    a[0].forEach((h, i) => {
      sel.innerHTML += `<option value="${i}">${h || 'Col ' + i}</option>`;
    });
  }
}

function doDownload() {
  const text = $('#output').textContent;
  if (!text) return;
  const blob = new Blob([text], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'merged.csv';
  a.click();
}

function doClear() { $('#inputA').value = ''; $('#inputB').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doMerge()">${t('merge')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('loadExample')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDownload()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>
  <select class="gz-select" id="inDelim" onchange="updateKeyOptions()">
    <option value="auto">Auto</option><option value=",">,</option><option value="tab">Tab</option><option value="semicolon">;</option><option value="pipe">|</option>
  </select>
  <select class="gz-select" id="outDelim">
    <option value=",">,</option><option value="tab">Tab</option><option value="semicolon">;</option><option value="pipe">|</option>
  </select>`;

const keyArea = document.getElementById('key-select-area');
keyArea.innerHTML = `<label>${t('keyCol')}:</label> <select class="gz-select" id="keyCol"></select>`;
updateKeyOptions();
