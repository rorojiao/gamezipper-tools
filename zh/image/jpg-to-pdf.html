const { $, copyText, t } = GZ;
let images = []; // {dataUrl, width, height, name, type}

const dropZone = $('#dropZone');
const fileInput = $('#fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(files) {
  const valid = [...files].filter(f => /^image\//.test(f.type));
  if (valid.length === 0) return;
  let loaded = 0;
  valid.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        images.push({
          dataUrl: e.target.result,
          width: img.width,
          height: img.height,
          name: file.name,
          type: file.type
        });
        loaded++;
        if (loaded === valid.length) renderThumbs();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function renderThumbs() {
  const grid = $('#thumbGrid');
  grid.innerHTML = images.map((img, i) => `
    <div class="thumb" draggable="true" data-idx="${i}">
      <span class="num">${i + 1}</span>
      <button class="del" onclick="removeImage(${i})">✕</button>
      <img src="${img.dataUrl}" alt="${escapeAttr(img.name)}">
    </div>`).join('');

  // Drag and drop reordering
  let dragIdx = null;
  grid.querySelectorAll('.thumb').forEach(thumb => {
    thumb.addEventListener('dragstart', e => { dragIdx = parseInt(thumb.dataset.idx); });
    thumb.addEventListener('dragover', e => e.preventDefault());
    thumb.addEventListener('drop', e => {
      e.preventDefault();
      const dropIdx = parseInt(thumb.dataset.idx);
      if (dragIdx !== null && dragIdx !== dropIdx) {
        const item = images.splice(dragIdx, 1)[0];
        images.splice(dropIdx, 0, item);
        renderThumbs();
      }
    });
  });
}

function escapeAttr(s) { return s.replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

window.removeImage = function(i) {
  images.splice(i, 1);
  renderThumbs();
};

// Minimal PDF generator — each image embedded as JPEG stream
function generatePDF() {
  if (images.length === 0) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('errEmpty')}</span>`;
    return;
  }

  try {
    const pageSize = $('#pageSize').value;
    const orientation = $('#orientation').value;
    const margin = parseInt($('#margin').value);

    const pageSizes = {
      a4: { w: 595, h: 842 },
      letter: { w: 612, h: 792 }
    };

    const objects = [];
    let objNum = 0;

    function addObj(content) {
      objNum++;
      objects.push(content);
      return objNum;
    }

    // Header
    let pdf = '%PDF-1.4\n';

    // We'll collect object positions for xref
    const offsets = [];

    // Helper to write object
    function writeObject(num, content) {
      offsets[num] = pdf.length;
      pdf += `${num} 0 obj\n${content}\nendobj\n`;
    }

    // Object 1: Catalog
    writeObject(1, '<< /Type /Catalog /Pages 2 0 R >>');

    // Object 2: Pages (placeholder, fill page count later)
    const pageCount = images.length;
    const pageObjNums = [];
    const contentObjNums = [];
    const imageObjNums = [];

    // First pass: process images to get JPEG data
    const imageData = images.map(img => {
      return jpegFromImage(img);
    });

    // Object 2: Pages
    let kidsStr = '';
    let nextObj = 3;
    for (let i = 0; i < pageCount; i++) {
      pageObjNums.push(nextObj);
      contentObjNums.push(nextObj + 1);
      imageObjNums.push(nextObj + 2);
      kidsStr += `${nextObj} 0 R `;
      nextObj += 3;
    }
    writeObject(2, `<< /Type /Pages /Kids [${kidsStr.trim()}] /Count ${pageCount} >>`);

    for (let i = 0; i < pageCount; i++) {
      const img = images[i];
      const jpegData = imageData[i];
      const isFit = pageSize === 'fit';

      let pw, ph;
      if (isFit) {
        pw = img.width + margin * 2;
        ph = img.height + margin * 2;
      } else {
        const ps = pageSizes[pageSize];
        if (orientation === 'landscape' || (orientation === 'auto' && img.width > img.height)) {
          pw = ps.h; ph = ps.w;
        } else {
          pw = ps.w; ph = ps.h;
        }
      }

      // Page object
      writeObject(pageObjNums[i], `<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pw} ${ph}] /Contents ${contentObjNums[i]} 0 R /Resources << /XObject << /Im0 ${imageObjNums[i]} 0 R >> >> >>`);

      // Content stream: fit image to page while preserving aspect ratio
      const availW = pw - margin * 2;
      const availH = ph - margin * 2;
      const scale = Math.min(availW / img.width, availH / img.height);
      const drawW = img.width * scale;
      const drawH = img.height * scale;
      const offsetX = (pw - drawW) / 2;
      const offsetY = (ph - drawH) / 2;

      const content = `q\n${drawW} 0 0 ${drawH} ${offsetX} ${offsetY} cm\n/Im0 Do\nQ`;
      writeObject(contentObjNums[i], `<< /Length ${content.length} >>\nstream\n${content}\nendstream`);

      // Image XObject
      writeObject(imageObjNums[i], `<< /Type /XObject /Subtype /Image /Width ${img.width} /Height ${img.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpegData.bytes.length} >>\nstream\n`);

      // Write binary image data
      // Convert current pdf string to bytes
      const beforeBytes = new TextEncoder().encode(pdf);
      const imgBytes = jpegData.bytes;
      const afterStr = '\nendstream';
      const afterBytes = new TextEncoder().encode(afterStr);

      const combined = new Uint8Array(beforeBytes.length + imgBytes.length + afterBytes.length);
      combined.set(beforeBytes);
      combined.set(imgBytes, beforeBytes.length);
      combined.set(afterBytes, beforeBytes.length + imgBytes.length);

      // Store as array for final assembly
      pdf = combined;
      offsets[nextObj > 3 ? imageObjNums[i] : 0] = beforeBytes.length;
    }

    // Convert pdf to Uint8Array if string
    if (typeof pdf === 'string') {
      pdf = new TextEncoder().encode(pdf);
    }

    // Xref table
    const xrefOffset = pdf.length;
    let xref = `xref\n0 ${objNum + 1}\n0000000000 65535 f \n`;
    for (let i = 1; i <= objNum; i++) {
      const off = offsets[i] !== undefined ? offsets[i].toString().padStart(10, '0') : '0000000000';
      xref += `${off} 00000 n \n`;
    }

    const trailer = `trailer\n<< /Size ${objNum + 1} /Root 1 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`;

    const xrefBytes = new TextEncoder().encode(xref + trailer);
    const finalPdf = new Uint8Array(pdf.length + xrefBytes.length);
    finalPdf.set(pdf);
    finalPdf.set(xrefBytes, pdf.length);

    const blob = new Blob([finalPdf], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'converted.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('converted')}</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('errConvert')} ${e.message}</span>`;
    console.error(e);
  }
}

// Convert any image to JPEG bytes via canvas
function jpegFromImage(imgObj) {
  const canvas = document.createElement('canvas');
  canvas.width = imgObj.width;
  canvas.height = imgObj.height;
  const ctx = canvas.getContext('2d');
  // White background for transparency
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const img = new Image();
  img.src = imgObj.dataUrl;
  ctx.drawImage(img, 0, 0);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
  const base64 = dataUrl.split(',')[1];
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return { bytes };
}

// Fix: image needs to be loaded synchronously for canvas
function jpegFromImageSync(imgObj) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = imgObj.width;
      canvas.height = imgObj.height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
      const base64 = dataUrl.split(',')[1];
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      resolve({ bytes });
    };
    img.src = imgObj.dataUrl;
  });
}

// Override generatePDF to use async
window.generatePDF = async function() {
  if (images.length === 0) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('errEmpty')}</span>`;
    return;
  }

  try {
    // Pre-convert all images to JPEG
    const jpegPromises = images.map(img => jpegFromImageSync(img));
    const jpegResults = await Promise.all(jpegPromises);

    const pageSize = $('#pageSize').value;
    const orientation = $('#orientation').value;
    const margin = parseInt($('#margin').value);
    const pageSizes = { a4: { w: 595, h: 842 }, letter: { w: 612, h: 792 } };

    const offsets = [];
    let objNum = 0;
    let parts = []; // array of {type:'str'|'bin', data}
    let currentPos = 0;

    function writeStr(s) { parts.push({type:'str', data:s}); currentPos += new TextEncoder().encode(s).length; }
    function writeBin(b) { parts.push({type:'bin', data:b}); currentPos += b.length; }
    function markOffset(n) { offsets[n] = currentPos; }

    writeStr('%PDF-1.4\n');

    const pageCount = images.length;
    const pageObjNums = [], contentObjNums = [], imageObjNums = [];
    let nextObj = 3;
    for (let i = 0; i < pageCount; i++) {
      pageObjNums.push(nextObj); contentObjNums.push(nextObj+1); imageObjNums.push(nextObj+2);
      nextObj += 3;
    }
    objNum = nextObj - 1;

    // Object 1: Catalog
    markOffset(1);
    writeStr('1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n');

    // Object 2: Pages
    markOffset(2);
    const kidsStr = pageObjNums.map(n => `${n} 0 R`).join(' ');
    writeStr(`2 0 obj\n<< /Type /Pages /Kids [${kidsStr}] /Count ${pageCount} >>\nendobj\n`);

    for (let i = 0; i < pageCount; i++) {
      const img = images[i];
      const jpegData = jpegResults[i];

      let pw, ph;
      if (pageSize === 'fit') {
        pw = img.width + margin * 2; ph = img.height + margin * 2;
      } else {
        const ps = pageSizes[pageSize];
        if (orientation === 'landscape' || (orientation === 'auto' && img.width > img.height)) { pw = ps.h; ph = ps.w; }
        else { pw = ps.w; ph = ps.h; }
      }

      markOffset(pageObjNums[i]);
      writeStr(`${pageObjNums[i]} 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pw} ${ph}] /Contents ${contentObjNums[i]} 0 R /Resources << /XObject << /Im0 ${imageObjNums[i]} 0 R >> >> >>\nendobj\n`);

      const availW = pw - margin * 2, availH = ph - margin * 2;
      const scale = Math.min(availW / img.width, availH / img.height);
      const drawW = Math.round(img.width * scale), drawH = Math.round(img.height * scale);
      const offsetX = ((pw - drawW) / 2).toFixed(1), offsetY = ((ph - drawH) / 2).toFixed(1);

      const content = `q\n${drawW} 0 0 ${drawH} ${offsetX} ${offsetY} cm\n/Im0 Do\nQ`;
      markOffset(contentObjNums[i]);
      writeStr(`${contentObjNums[i]} 0 obj\n<< /Length ${content.length} >>\nstream\n${content}\nendstream\nendobj\n`);

      markOffset(imageObjNums[i]);
      writeStr(`${imageObjNums[i]} 0 obj\n<< /Type /XObject /Subtype /Image /Width ${img.width} /Height ${img.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpegData.bytes.length} >>\nstream\n`);
      writeBin(jpegData.bytes);
      writeStr('\nendstream\nendobj\n');
    }

    // Xref
    const xrefOffset = currentPos;
    let xref = `xref\n0 ${objNum + 1}\n0000000000 65535 f \n`;
    for (let i = 1; i <= objNum; i++) {
      xref += `${String(offsets[i] || 0).padStart(10, '0')} 00000 n \n`;
    }
    const trailer = `trailer\n<< /Size ${objNum + 1} /Root 1 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`;
    writeStr(xref + trailer);

    // Assemble
    const totalLen = currentPos;
    const finalPdf = new Uint8Array(totalLen);
    let pos = 0;
    for (const part of parts) {
      if (part.type === 'str') {
        const bytes = new TextEncoder().encode(part.data);
        finalPdf.set(bytes, pos); pos += bytes.length;
      } else {
        finalPdf.set(part.data, pos); pos += part.data.length;
      }
    }

    const blob = new Blob([finalPdf], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'converted.pdf';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);

    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('converted')}</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('errConvert')} ${e.message}</span>`;
    console.error(e);
  }
};
