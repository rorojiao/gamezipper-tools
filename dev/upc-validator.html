const { $, copyText, t } = GZ;

// EAN/UPC country prefixes (first 3 digits of EAN-13)
// GS1 EAN-13 country prefix ranges: [start, end, country]
// Source: official GS1 prefix list (all 3-digit prefixes)
const COUNTRY_PREFIXES = [
  [0, 19, 'US/Canada'],
  [30, 37, 'France'],
  [38, 39, 'Slovenia'],
  [400, 440, 'Germany'],

function getCountry(prefix) {
  const p = parseInt(prefix);
  for (const [lo, hi, country] of COUNTRY_PREFIXES) {
    if (p >= lo && p <= hi) return country;
  }
  return null;
}

function gs1Checksum(digits) {
  // Standard GS1: from right to left, odd position (1,3,5...) ×3, even position ×1
  // digits excludes check digit; rightmost data digit is position 1 (odd → ×3)
  const len = digits.length;
  let sum = 0;
  for (let i = 0; i < len; i++) {
    const fromRight = len - i; // 1-based from the right
    sum += parseInt(digits[i]) * (fromRight % 2 === 1 ? 3 : 1);
  }
  return (10 - (sum % 10)) % 10;
}

function validate() {
  const raw = $('#barcode').value.replace(/\D/g, '');
  const out = $('#output');
  if (raw.length < 8 || raw.length > 13 || !/^\d+$/.test(raw)) {
    out.innerHTML = `<div class="v-result invalid"><div class="status-icon">⚠️</div>${t('invalidFormat')}</div>`;
    return;
  }

  let type, typeLabel, prefix3, country, companyPrefix, productCode;
  const lastDigit = parseInt(raw.slice(-1));
  const dataDigits = raw.slice(0, -1);

  if (raw.length === 13) {
    type = 'ean13';
    typeLabel = t('ean13');
    prefix3 = raw.substring(0, 3);
    country = getCountry(prefix3);
    companyPrefix = raw.substring(0, 7);
    productCode = raw.substring(7, 12);
  } else if (raw.length === 12) {
    type = 'upcA';
    typeLabel = t('upcA');
    prefix3 = '0' + raw.substring(0, 2);
    country = 'US/Canada';
    companyPrefix = raw.substring(0, 6);
    productCode = raw.substring(6, 11);
  } else if (raw.length === 8) {
    // Could be EAN-8 or UPC-E
    type = 'ean8';
    typeLabel = t('ean8');
    country = getCountry(raw.substring(0, 3));
    companyPrefix = raw.substring(0, 4);
    productCode = raw.substring(4, 7);
  } else {
    out.innerHTML = `<div class="v-result invalid"><div class="status-icon">⚠️</div>${t('unknown')}</div>`;
    return;
  }

  const expected = gs1Checksum(dataDigits);
  const isValid = expected === lastDigit;

  const statusIcon = isValid ? '✅' : '❌';
  const statusClass = isValid ? 'valid' : 'invalid';
  const statusMsg = isValid ? t('validMsg') : t('invalidMsg');

  let html = `
    <div class="v-result ${statusClass}">
      <div class="status-icon">${statusIcon}</div>
      <div class="label">${t('detectedType')}</div>
      <div class="value">${typeLabel}</div>
      <div style="margin-top:12px;font-size:.9rem">${statusMsg}</div>
    </div>
    <div class="v-info">
      <div class="v-info-item"><div class="lbl">${t('checkDigit')}</div><div class="val">${lastDigit}</div></div>
      <div class="v-info-item"><div class="lbl">${t('expectedCheck')}</div><div class="val" style="color:${isValid?'var(--gz-success,#22c55e)':'var(--gz-accent)'}">${expected}</div></div>
      <div class="v-info-item"><div class="lbl">${t('calculatedFrom')}</div><div class="val">${dataDigits}</div></div>`;

  if (country) {
    html += `<div class="v-info-item"><div class="lbl">${t('countryPrefix')}</div><div class="val">${prefix3} → ${country}</div></div>`;
  }
  html += `<div class="v-info-item"><div class="lbl">${t('companyPrefix')}</div><div class="val">${companyPrefix}</div></div>`;
  html += `<div class="v-info-item"><div class="lbl">${t('productCode')}</div><div class="val">${productCode}</div></div>`;
  html += '</div>';
  out.innerHTML = html;
}
