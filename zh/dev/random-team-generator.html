<script>
GZI18n.register({
  en: {
    toolTitle: 'Random Team Generator',
    toolDesc: 'Split names or items into balanced random teams. Paste a list, pick the number of teams, and get fair groups instantly. Free team maker for classrooms, sports and projects.',
    teamCount: 'Teams',
    generate: 'Generate',
    clear: 'Clear',
    example: 'Example',
    inputLabel: 'Names (one per line)',
    outputLabel: 'Teams',
    step1: 'Paste names — one per line, or separated by commas',
    step2: 'Set how many teams to split into (2-20)',
    step3: 'Click Generate for a fair random distribution',
    step4: 'Click again for a new shuffle',
  },
  zh: {
    toolTitle: '随机分组工具',
    toolDesc: '将名单或项目随机分成均衡的小组。粘贴名单、选择组数，即时获得公平的随机分组。免费适用于课堂、运动、游戏和项目分组。',
    teamCount: '组数',
    generate: '生成',
    clear: '清除',
    example: '示例',
    inputLabel: '名单（每行一个）',
    outputLabel: '分组结果',
    step1: '粘贴名单 — 每行一个，或用逗号分隔',
    step2: '设置要分成多少组（2-20）',
    step3: '点击「生成」获得公平的随机分组',
    step4: '再次点击可重新打乱',
  }
});

const { $, copyText, t } = GZ;

$('#lbl-in').textContent = t('inputLabel');
$('#lbl-out').textContent = t('outputLabel');

$('#opts').innerHTML = `
  <label>${t('teamCount')}: </label>
  <input id="team-count" type="number" value="2" min="2" max="20">
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generate() {
  const raw = $('#input').value.trim();
  if (!raw) return;
  const names = raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean).slice(0, 500);
  if (names.length < 2) return;
  const teamCount = Math.max(2, Math.min(20, +$('#team-count').value || 2));
  const shuffled = shuffle(names);
  const teams = Array.from({length: teamCount}, () => []);
  shuffled.forEach((n, i) => teams[i % teamCount].push(n));
  let html = '<div class="teams-grid">';
  teams.forEach((team, i) => {
    html += `<div class="team-card"><h3>Team ${i + 1} <span style="opacity:.5;font-size:.8em">(${team.length})</span></h3><div class="members">${team.map(m => `<span class="member">${m.replace(/</g,'&lt;')}</span>`).join('')}</div></div>`;
  });
  html += '</div>';
  $('#output').innerHTML = html;
}

function loadExample() {
  $('#input').value = 'Alice\nBob\nCharlie\nDiana\nEve\nFrank\nGrace\nHenry\nIvy\nJack\nKaren\nLeo';
  generate();
}

function doClear() {
  $('#input').value = '';
  $('#output').innerHTML = '<div style="opacity:.5;padding:20px;text-align:center">—</div>';
}

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🎡', href:'/fun/spinner-wheel.html', name:'Spinner Wheel'},
  ]
});
</script>
