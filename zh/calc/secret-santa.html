<script>
GZI18n.register({
  en: {
    toolTitle: 'Secret Santa Generator',
    toolDesc: 'Organize a fair Secret Santa gift exchange. Add participants, set exclusions for couples, and draw names — 100% private in your browser.',
    participants: 'Participants',
    exclusions: 'Exclusions (optional pairs who should not gift each other)',
    addParticipant: '+ Add participant',
    addExclusion: '+ Add exclusion',
    generate: '🎄 Generate Draw',
    revealAll: '👁️ Reveal all',
    reset: 'Reset',
    enterName: 'Enter name',
    result: 'Draw Result',
    giftsTo: 'gifts to',
    notePrivate: '🔒 100% private — results never leave your browser.',
    needMore: 'Add at least 2 participants to draw.',
    impossible: 'No valid draw found with these exclusions. Try removing some exclusions.',
    selectPerson: '— select —',
    step1: 'Enter the names of all participants in the left column.',
    step2: 'Optionally add exclusion pairs (couples, family members who should not gift each other).',
    step3: 'Click Generate Draw to create a random valid assignment.',
    step4: 'Each person gifts exactly one other person. Reveal all to see the full list.',
  },
  zh: {
    toolTitle: 'Secret Santa / 神秘圣诞老人交换礼物生成器',
    toolDesc: '组织公平的 Secret Santa 礼物交换。添加参与者、设置排除组合（如情侣），然后随机抽签 — 100% 浏览器本地运行，完全私密。',
    participants: '参与者',
    exclusions: '排除组合（可选，不应互送礼物的人）',
    addParticipant: '+ 添加参与者',
    addExclusion: '+ 添加排除组合',
    generate: '🎄 生成抽签',
    revealAll: '👁️ 显示全部',
    reset: '重置',
    enterName: '输入姓名',
    result: '抽签结果',
    giftsTo: '送礼物给',
    notePrivate: '🔒 100% 私密 — 结果绝不离开你的浏览器。',
    needMore: '至少需要 2 名参与者才能抽签。',
    impossible: '当前排除组合无法生成有效配对，请减少排除组合。',
    selectPerson: '— 选择 —',
    step1: '在左侧输入所有参与者的姓名。',
    step2: '可选添加排除组合（情侣、家人等不应互送礼物的人）。',
    step3: '点击「生成抽签」创建随机有效配对。',
    step4: '每人恰好送给另一个人一份礼物。点击「显示全部」查看完整名单。',
  }
});

const { $, t } = GZ;
let assignment = null;

function addParticipant(name) {
  const div = document.createElement('div');
  div.className = 'gz-ss-participant';
  div.innerHTML = `<input type="text" placeholder="${t('enterName')}" value="${name||''}"><button onclick="this.parentElement.remove()">✕</button>`;
  $('#participants').appendChild(div);
}

function getNames() {
  return [...$('#participants').querySelectorAll('input')].map(i => i.value.trim()).filter(n => n);
}

function addExclusion() {
  const names = getNames();
  const div = document.createElement('div');
  div.className = 'gz-ss-exclusion';
  const opts = names.length ? names.map(n => `<option>${n}</option>`).join('') : `<option>${t('selectPerson')}</option>`;
  div.innerHTML = `<select class="ex-a">${opts}</select> ✕ <select class="ex-b">${opts}</select> <button onclick="this.parentElement.remove()">✕</button>`;
  $('#exclusions').appendChild(div);
}

function getExclusions(names) {
  const idx = {}; names.forEach((n,i) => idx[n] = i);
  const excl = [];
  $('#exclusions').querySelectorAll('.gz-ss-exclusion').forEach(row => {
    const a = row.querySelector('.ex-a').value, b = row.querySelector('.ex-b').value;
    if (idx[a] !== undefined && idx[b] !== undefined) excl.push([idx[a], idx[b]]);
  });
  return excl;
}

// Generate a derangement (no one gifts themselves) respecting exclusions
function generate() {
  const names = getNames();
  if (names.length < 2) { alert(t('needMore')); return; }
  const excl = getExclusions(names);
  const exclSet = new Set(excl.flatMap(([a,b]) => [`${a},${b}`, `${b},${a}`]));

  for (let attempt = 0; attempt < 10000; attempt++) {
    const perm = [...names.keys()];
    // Fisher-Yates shuffle
    for (let i = perm.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [perm[i], perm[j]] = [perm[j], perm[i]];
    }
    // Check derangement + exclusions
    let ok = true;
    for (let i = 0; i < perm.length; i++) {
      const giver = i, recipient = perm[i];
      if (giver === recipient || exclSet.has(`${giver},${recipient}`)) { ok = false; break; }
    }
    if (ok) {
      assignment = names.map((name, i) => ({ giver: name, recipient: names[perm[i]] }));
      renderResult(false);
      return;
    }
  }
  alert(t('impossible'));
}

function renderResult(reveal) {
  if (!assignment) return;
  const html = assignment.map((m, i) =>
    `<div class="gz-ss-match"><span class="who">${m.giver}</span> ${t('giftsTo')} <span class="who" data-idx="${i}">${reveal ? m.recipient : '🤫 ???'}</span></div>`
  ).join('');
  $('#result').innerHTML = `<h3 style="text-align:center;margin-bottom:8px">${t('result')}</h3>${html}<p class="gz-ss-note">${t('notePrivate')}</p>`;
  $('#result').style.display = 'block';
}

function revealAll() { if (assignment) renderResult(true); }

function reset() {
  assignment = null;
  $('#result').style.display = 'none';
  $('#result').innerHTML = '';
}

$('#toolbar').innerHTML = '';
$('#btn-add').textContent = t('addParticipant');
$('#btn-add-excl').textContent = t('addExclusion');
$('#btn-generate').textContent = t('generate');
$('#btn-reveal').textContent = t('revealAll');
$('#btn-reset').textContent = t('reset');
$('#lbl-participants').textContent = t('participants');
$('#lbl-exclusions').textContent = t('exclusions');

// Seed with 4 example participants
['Alice','Bob','Carol','Dave'].forEach(addParticipant);

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎲', href:'/text/decision-maker.html', name:'Decision Maker'},
    {icon:'👪', href:'/calc/bill-splitter.html', name:'Bill Splitter'},
    {icon:'🎁', href:'/text/gift-certificate.html', name:'Gift Certificate'},
    {icon:'🏆', href:'/fun/tournament-bracket.html', name:'Tournament Bracket'},
  ]
});
</script>
