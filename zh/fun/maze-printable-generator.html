<script>

  },
  zh: {

    toolDesc: '免费在线生成可打印迷宫。从小到大四种尺寸，打印或下载为 PDF。适合儿童、课堂和益智书 — 无需注册。',
    size: '尺寸',
    small: '小 (10×10)',
    medium: '中 (15×15)',
    large: '大 (20×20)',
    giant: '超大 (30×30)',
    generate: '生成新迷宫',
    showSolution: '显示答案路径',
    print: '打印 / PDF',
    generated: (w) => `已生成 ${w}×${w} 迷宫`,
    step1: '选择迷宫尺寸（小到大）',
    step2: '点击「生成新迷宫」创建新迷宫',
    step3: '勾选「显示答案路径」查看正确路径',
    step4: '点击「打印 / PDF」打印或保存',
  }
});

const { $, t } = GZ;
let cols=15, rows=15, grid=[], showSol=false;
const canvas=$('#maze-canvas');
const ctx=canvas.getContext('2d');

// Each cell: walls {top,right,bottom,left}, visited
function initGrid(c,r){
  cols=c; rows=r;
  grid=[];
  for(let y=0;y<rows;y++){
    const row=[];
    for(let x=0;x<cols;x++){ row.push({x,y,walls:{top:true,right:true,bottom:true,left:true},visited:false}); }
    grid.push(row);
  }
}

function generateMaze(){
  // Recursive backtracker (iterative)
  const stack=[];
  const start=grid[0][0];
  start.visited=true;
  stack.push(start);
  while(stack.length){
    const cur=stack[stack.length-1];
    const neighbors=[];
    const {x,y}=cur;
    if(y>0&&!grid[y-1][x].visited) neighbors.push({cell:grid[y-1][x],dir:'top'});
    if(x<cols-1&&!grid[y][x+1].visited) neighbors.push({cell:grid[y][x+1],dir:'right'});
    if(y<rows-1&&!grid[y+1][x].visited) neighbors.push({cell:grid[y+1][x],dir:'bottom'});
    if(x>0&&!grid[y][x-1].visited) neighbors.push({cell:grid[y][x-1],dir:'left'});
    if(neighbors.length){
      const pick=neighbors[Math.floor(Math.random()*neighbors.length)];
      // knock down walls
      if(pick.dir==='top'){ cur.walls.top=false; pick.cell.walls.bottom=false; }
      else if(pick.dir==='right'){ cur.walls.right=false; pick.cell.walls.left=false; }
      else if(pick.dir==='bottom'){ cur.walls.bottom=false; pick.cell.walls.top=false; }
      else { cur.walls.left=false; pick.cell.walls.right=false; }
      pick.cell.visited=true;
      stack.push(pick.cell);
    } else { stack.pop(); }
  }
}

function solveMaze(){
  // BFS from (0,0) to (cols-1,rows-1)
  const start=grid[0][0], end=grid[rows-1][cols-1];
  const queue=[start]; const prev=new Map(); const visited=new Set([`0,0`]);
  while(queue.length){
    const cur=queue.shift();
    if(cur===end) break;
    const {x,y}=cur;
    const neighbors=[];
    if(!cur.walls.top&&y>0) neighbors.push(grid[y-1][x]);
    if(!cur.walls.right&&x<cols-1) neighbors.push(grid[y][x+1]);
    if(!cur.walls.bottom&&y<rows-1) neighbors.push(grid[y+1][x]);
    if(!cur.walls.left&&x>0) neighbors.push(grid[y][x-1]);
    for(const n of neighbors){
      const k=`${n.x},${n.y}`;
      if(!visited.has(k)){ visited.add(k); prev.set(k,cur); queue.push(n); }
    }
  }
  // reconstruct
  const path=[]; let cur=end;
  while(cur){ path.unshift(cur); cur=prev.get(`${cur.x},${cur.y}`); }
  return path;
}

function drawMaze(){
  const maxSize=540;
  const cellSize=Math.floor(maxSize/Math.max(cols,rows));
  canvas.width=cellSize*cols+2;
  canvas.height=cellSize*rows+2;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
  // start/end markers
  ctx.fillStyle='#4ecdc4'; ctx.fillRect(1,1,cellSize-1,cellSize-1); // start
  ctx.fillStyle='#ff6b6b'; ctx.fillRect((cols-1)*cellSize+1,(rows-1)*cellSize+1,cellSize-1,cellSize-1); // end
  // solution path
  if(showSol){
    const path=solveMaze();
    ctx.strokeStyle='rgba(255,107,107,.5)'; ctx.lineWidth=Math.max(2,cellSize*0.3); ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath();
    path.forEach((c,i)=>{
      const px=c.x*cellSize+cellSize/2+1, py=c.y*cellSize+cellSize/2+1;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    });
    ctx.stroke();
  }
  // walls
  ctx.strokeStyle='#222'; ctx.lineWidth=2;
  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      const c=grid[y][x]; const px=x*cellSize+1, py=y*cellSize+1;
      ctx.beginPath();
      if(c.walls.top){ ctx.moveTo(px,py); ctx.lineTo(px+cellSize,py); }
      if(c.walls.right){ ctx.moveTo(px+cellSize,py); ctx.lineTo(px+cellSize,py+cellSize); }
      if(c.walls.bottom){ ctx.moveTo(px,py+cellSize); ctx.lineTo(px+cellSize,py+cellSize); }
      if(c.walls.left){ ctx.moveTo(px,py); ctx.lineTo(px,py+cellSize); }
      ctx.stroke();
    }
  }
}

function doGenerate(){
  const sizes={'small':10,'medium':15,'large':20,'giant':30};
  const sz=+(document.getElementById('sel-size').value);
  initGrid(sz,sz);
  generateMaze();
  drawMaze();
  $('#status').textContent=t('generated')(sz);
}

function doPrint(){ window.print(); }

$('#toolbar').innerHTML = `
  <label style="display:inline-flex;align-items:center;gap:6px">${t('size')}
  <select class="gz-select" id="sel-size" onchange="doGenerate()">
    <option value="10">${t('small')}</option>
    <option value="15" selected>${t('medium')}</option>
    <option value="20">${t('large')}</option>
    <option value="30">${t('giant')}</option>
  </select></label>
  <button class="gz-btn" onclick="doGenerate()">${t('generate')}</button>
  <label style="display:inline-flex;align-items:center;gap:6px"><input type="checkbox" id="sol-toggle" onchange="showSol=this.checked;drawMaze()"> ${t('showSolution')}</label>
  <button class="gz-btn gz-btn-secondary" onclick="doPrint()">🖨️ ${t('print')}</button>`;

doGenerate();

</script>
