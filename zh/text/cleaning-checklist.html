<body>
<div class="gz-container">
  <div class="gz-tool-header">

  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Cleaning Checklist Maker',
    toolDesc: 'Build a custom cleaning checklist for your home. Pick rooms and frequency (daily, weekly, monthly or deep clean) — get categorized, printable tasks with live progress tracking.',
    frequency: 'Frequency',
    generate: 'Generate List',
    print: 'Print / PDF',
    copy: 'Copy',
    clear: 'Clear checks',
    daily:'Daily tidy', weekly:'Weekly clean', monthly:'Monthly clean', deep:'Deep / spring clean',
    step1: 'Choose a cleaning frequency (daily, weekly, monthly or deep)',
    step2: 'Toggle the rooms you want to clean',
    step3: 'Click Generate to build a categorized task list',
    step4: 'Check off tasks, print to PDF or copy the list',
  },
  zh: {
    toolTitle: '清洁清单生成器',
    toolDesc: '为家中定制清洁清单。选择房间和频率（每日、每周、每月或大扫除）— 获取分类清晰的可打印任务列表，带实时进度跟踪。',
    frequency: '清洁频率',
    generate: '生成清单',
    print: '打印 / PDF',
    copy: '复制',
    clear: '清除勾选',
    daily:'每日整理', weekly:'每周清洁', monthly:'每月清洁', deep:'深度 / 大扫除',
    step1: '选择清洁频率（每日、每周、每月或大扫除）',
    step2: '勾选要清洁的房间',
    step3: '点击「生成清单」生成分类任务列表',
    step4: '逐项勾选、打印为 PDF 或复制清单',
  }
});

const { $, copyText, t } = GZ;

fillSelect('#freq', [['daily',t('daily')],['weekly',t('weekly')],['monthly',t('monthly')],['deep',t('deep')]]);
function fillSelect(id, opts) { $(id).innerHTML = opts.map(([v,l])=>`<option value="${v}">${l}</option>`).join(''); }

const ROOMS = [
  {key:'kitchen', icon:'🍳', en:'Kitchen', zh:'厨房'},
  {key:'bathroom', icon:'🚿', en:'Bathroom', zh:'浴室'},
  {key:'bedroom', icon:'🛏️', en:'Bedroom', zh:'卧室'},
  {key:'living', icon:'🛋️', en:'Living room', zh:'客厅'},
  {key:'office', icon:'💻', en:'Home office', zh:'家庭办公室'},
  {key:'laundry', icon:'👕', en:'Laundry', zh:'洗衣房'},
  {key:'entry', icon:'🚪', en:'Entryway', zh:'玄关'},
  {key:'garage', icon:'🚗', en:'Garage', zh:'车库'},
];
const lang = (GZI18n.getLang && GZI18n.getLang()) || (document.documentElement.lang) || 'en';
let activeRooms = new Set(['kitchen','bathroom','bedroom','living']);
$('#rooms').innerHTML = ROOMS.map(r =>
  `<span class="room-chip ${activeRooms.has(r.key)?'on':''}" data-k="${r.key}" onclick="toggleRoom(this)">${r.icon} ${lang==='zh'?r.zh:r.en}</span>`
).join('');
function toggleRoom(el) {
  const k = el.dataset.k;
  if (activeRooms.has(k)) { activeRooms.delete(k); el.classList.remove('on'); }
  else { activeRooms.add(k); el.classList.add('on'); }
}

// Task database: room -> freq -> tasks
const TASKS = {
  kitchen: {
    daily: ['Wipe down countertops','Wash dishes / load dishwasher','Wipe stove and sink','Sweep floor','Put away food','Empty trash'],
    weekly: ['Mop floor','Clean microwave inside','Wipe cabinet fronts','Clean outside of appliances','Disinfect sink','Change dish towel'],
    monthly: ['Clean refrigerator inside','Descale faucet/sink','Wipe inside drawers','Clean range hood','Sharpen & oil cutting boards'],
    deep: ['Empty & clean all cabinets','Degrease stove burners','Clean behind appliances','Descale dishwasher','Organize pantry','Polish stainless steel','Clean grout'],
  },
  bathroom: {
    daily: ['Wipe sink & counter','Squeegee shower','Hang towels to dry','Rinse toothbrush holder'],
    weekly: ['Scrub toilet inside & out','Clean shower & tub','Wipe mirrors','Mop floor','Replace towels','Disinfect handles & switches'],
    monthly: ['Descale showerhead','Clean grout','Wash shower curtain/liner','Organize cabinets','Clean exhaust fan'],
    deep: ['Re-caulk seams','Polish chrome fixtures','Clean behind toilet','Wash bath mats','Replace shower liner','Descale faucets deeply'],
  },
  bedroom: {
    daily: ['Make bed','Put away clothes','Clear nightstand'],
    weekly: ['Change bed sheets','Dust furniture','Vacuum floor','Organize closet surface','Empty bedroom trash'],
    monthly: ['Rotate / flip mattress','Wash bedding (duvet, pillows)','Clean under bed','Wipe baseboards','Vacuum closet floor'],
    deep: ['Deep clean mattress','Wash windows & sills','Organize entire closet','Wipe walls & doors','Clean light fixtures','Shampoo carpet'],
  },
  living: {
    daily: ['Fluff cushions & fold blankets','Tidy clutter','Wipe remotes & devices'],
    weekly: ['Vacuum sofa & cushions','Dust shelves & TV','Vacuum/mop floor','Wipe coffee table','Water plants'],
    monthly: ['Wash cushion covers','Clean behind sofa','Wipe baseboards','Clean TV screen properly','Dust ceiling fan'],
    deep: ['Shampoo upholstery','Clean under all furniture','Wash curtains','Polish wood furniture','Clean air vents','Wipe walls'],
  },
  office: {
    daily: ['Clear desk surface','File loose papers'],
    weekly: ['Wipe desk & keyboard','Dust monitor','Vacuum floor','Empty trash'],
    monthly: ['Organize cables','Clean inside keyboard','Declutter drawers','Wipe chair'],
    deep: ['Deep cable management','Sort & shred old papers','Clean printer/scanner','Wipe baseboards & walls'],
  },
  laundry: {
    daily: ['Sort dirty clothes','Empty lint trap'],
    weekly: ['Wipe washer & dryer','Clean detergent dispenser','Sweep floor','Fold & put away clean clothes'],
    monthly: ['Run washer clean cycle','Deep clean dryer drum','Check & clean dryer vent','Wipe cabinets'],
    deep: ['Clean behind washer/dryer','Descale washer','Replace dryer vent hose','Organize entire laundry room'],
  },
  entry: {
    daily: ['Put away shoes','Hang coats'],
    weekly: ['Sweep entry','Wipe door handles','Shake out doormat'],
    monthly: ['Clean mirror','Organize shoe rack','Wipe console table','Polish door hardware'],
    deep: ['Wash walls & door','Deep clean doormat','Re-organize storage','Clean light fixture'],
  },
  garage: {
    daily: ['Put away tools'],
    weekly: ['Sweep floor','Organize daily-use items'],
    monthly: ['Wipe workbench','Check for spills/leaks','Declutter one zone'],
    deep: ['Full garage declutter','Pressure wash floor','Oil garage door','Organize all storage','Check safety equipment'],
  },
};

let checked = new Set();
function loadChecked() { try { const s = localStorage.getItem('gz-cleaning-checked'); if (s) checked = new Set(JSON.parse(s)); } catch(e){} }
function saveChecked() { try { localStorage.setItem('gz-cleaning-checked', JSON.stringify([...checked])); } catch(e){} }

function buildList() {
  const freq = $('#freq').value;
  const list = $('#list');
  list.innerHTML = '';
  if (!activeRooms.size) { list.innerHTML = '<div style="opacity:.6;padding:16px">Select at least one room.</div>'; return; }
  for (const room of ROOMS) {
    if (!activeRooms.has(room.key)) continue;
    const tasks = (TASKS[room.key] && TASKS[room.key][freq]) || [];
    if (!tasks.length) continue;
    const name = lang==='zh' ? room.zh : room.en;
    const block = document.createElement('div');
    block.className = 'cat-block';
    let html = `<h4>${room.icon} ${name}</h4>`;
    for (const task of tasks) {
      const id = room.key + '-' + freq + '-' + task;
      const isChecked = checked.has(id);
      html += `<div class="task ${isChecked?'done':''}"><input type="checkbox" id="${CSS.escape(id)}" ${isChecked?'checked':''} onchange="toggleCheck('${id.replace(/'/g,"\\'")}', this)"><label for="${CSS.escape(id)}">${task}</label></div>`;
    }
    block.innerHTML = html;
    list.appendChild(block);
  }
  updateProgress();
  saveChecked();
}

function toggleCheck(id, el) {
  if (el.checked) checked.add(id); else checked.delete(id);
  el.parentElement.classList.toggle('done', el.checked);
  updateProgress(); saveChecked();
}

function updateProgress() {
  const boxes = document.querySelectorAll('#list input[type=checkbox]');
  const total = boxes.length;
  const done = [...boxes].filter(b=>b.checked).length;
  const pct = total ? (done/total*100) : 0;
  $('#prog').style.width = pct + '%';
}

function clearChecks() {
  checked.clear();
  document.querySelectorAll('#list input[type=checkbox]').forEach(b => { b.checked=false; b.parentElement.classList.remove('done'); });
  updateProgress(); saveChecked();
}

function copyList() {
  const lines = [];
  document.querySelectorAll('#list .cat-block').forEach(b => {
    lines.push(b.querySelector('h4').textContent);
    b.querySelectorAll('.task').forEach(tk => {
      const cb = tk.querySelector('input'); const lbl = tk.querySelector('label').textContent;
      lines.push('  ' + (cb.checked?'[x] ':'[ ] ') + lbl);
    });
  });
  copyText(lines.join('\n'));
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="buildList()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="window.print()">${t('print')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyList()">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearChecks()">${t('clear')}</button>`;

$('#lbl-freq').textContent = t('frequency');

loadChecked();
buildList();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'✅', href:'/text/checklist.html', name:'Checklist Maker'},
    {icon:'🧾', href:'/text/packing-list-generator.html', name:'Packing List'},
    {icon:'🧺', href:'/calc/meal-planner.html', name:'Meal Planner'},
    {icon:'📝', href:'/text/todo.html', name:'Todo List'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
