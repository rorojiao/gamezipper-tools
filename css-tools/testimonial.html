<div class="gz-container">
  <div class="gz-tool-header">

  </div>
  <div class="gz-tool-area">
    <div class="tm-layout">
      <div class="tm-panel">
        <h3 style="margin:0 0 12px;font-size:1rem">⚙️ Settings</h3>
        <div class="tm-row"><label id="lbl-style"></label>
          <select id="style">
            <option value="light">Light</option>
            <option value="dark">Dark</option>

          </select>
        </div>
        <div class="tm-row"><label id="lbl-accent"></label><input type="color" id="accent" value="#5566ff"></div>
        <div class="tm-row"><label id="lbl-quote"></label><textarea id="quote">This product completely transformed how we work. The team saw a 3x productivity boost in the first month. Best investment we made this year.</textarea></div>
        <div class="tm-row"><label id="lbl-name"></label><input type="text" id="name" value="Sarah Chen"></div>
        <div class="tm-row"><label id="lbl-role"></label><input type="text" id="role" value="CTO at TechFlow"></div>
        <div class="tm-row"><label id="lbl-avatar"></label><input type="text" id="avatar" placeholder="Image URL (optional)"></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Testimonial Card Generator',
    toolDesc: 'Design beautiful customer testimonial cards with live preview. Customize quote, author, avatar, rating stars and choose from light, dark, colored or minimal styles.',
    lblStyle: 'Card style', lblAccent: 'Accent color',
    lblQuote: 'Quote', lblName: 'Author name', lblRole: 'Author role',
    lblAvatar: 'Avatar URL', lblRating: 'Rating',
    lblCode: 'Generated HTML + CSS',
    btnCopy: 'Copy Code',
    step1: 'Choose a card style — light, dark, colored or minimal',
    step2: 'Edit the quote, author, role and avatar URL',
    step3: 'Pick a star rating and accent color',
    step4: 'Copy the HTML + CSS into your landing page',
  },
  zh: {
    toolTitle: 'CSS 推荐语卡片生成器',
    toolDesc: '设计精美的客户推荐语卡片，实时预览。自定义引言、作者、头像、星级评分，选择浅色、深色、彩色或极简风格。',
    lblStyle: '卡片风格', lblAccent: '主题色',
    lblQuote: '引言', lblName: '作者姓名', lblRole: '作者职位',
    lblAvatar: '头像 URL', lblRating: '评分',
    lblCode: '生成的 HTML + CSS',
    btnCopy: '复制代码',
    step1: '选择卡片风格 — 浅色、深色、彩色或极简',
    step2: '编辑引言、作者、职位和头像 URL',
    step3: '选择星级评分和主题色',
    step4: '复制 HTML + CSS 到你的落地页',
  }
});

const { $, copyText, t } = GZ;
const STYLES = {
  light: {bg:'#fff',color:'#222',quoteColor:'#333',nameColor:'#222',subColor:'#777'},
  dark: {bg:'#1a1a2e',color:'#fff',quoteColor:'#e0e0e0',nameColor:'#fff',subColor:'#a0a0c0'},
  colored: {bg:'linear-gradient(135deg,#667eea,#764ba2)',color:'#fff',quoteColor:'#fff',nameColor:'#fff',subColor:'rgba(255,255,255,.8)'},
  minimal: {bg:'#fafafa',color:'#222',quoteColor:'#333',nameColor:'#222',subColor:'#888'},
};

function getInitials(name) {
  return name.split(/\s+/).filter(Boolean).slice(0,2).map(s=>s[0].toUpperCase()).join('');
}

function render() {
  const style = $('#style').value;
  const accent = $('#accent').value;
  const quote = $('#quote').value;
  const name = $('#name').value;
  const role = $('#role').value;
  const avatar = $('#avatar').value;
  const rating = +$('#rating').value;
  const s = STYLES[style];
  const card = $('#card');
  card.style.background = s.bg;
  card.style.color = s.color;
  document.documentElement.style.setProperty('--accent', accent);
  const stars = '★'.repeat(rating) + '☆'.repeat(5-rating);
  const avatarHtml = avatar ? `<div class="tm-avatar"><img src="${avatar.replace(/"/g,'&quot;')}" alt="${name}"></div>` : `<div class="tm-avatar">${getInitials(name)}</div>`;
  card.innerHTML = `
    <div class="tm-stars">${stars}</div>
    <p class="tm-quote">${quote}</p>
    <div class="tm-author">
      ${avatarHtml}
      <div class="tm-info">
        <h4>${name}</h4>
        <p>${role}</p>
      </div>
    </div>
  `;
  card.querySelector('.tm-quote').style.color = s.quoteColor;
  card.querySelector('.tm-info h4').style.color = s.nameColor;
  card.querySelector('.tm-info p').style.color = s.subColor;
  generateCode();
}

function generateCode() {
  const style = $('#style').value;
  const accent = $('#accent').value;
  const quote = $('#quote').value;
  const name = $('#name').value;
  const role = $('#role').value;
  const avatar = $('#avatar').value;
  const rating = +$('#rating').value;
  const stars = '★'.repeat(rating) + '☆'.repeat(5-rating);
  const initials = getInitials(name);
  const avatarHtml = avatar ? `<div class="tcard-avatar"><img src="${avatar.replace(/"/g,'&quot;')}" alt="${name}"></div>` : `<div class="tcard-avatar">${initials}</div>`;
  const s = STYLES[style];
  const css = `/* === Testimonial Card CSS === */
:root { --accent: ${accent}; }
.tcard {
  background: ${s.bg};
  color: ${s.color};
  border-radius: 18px; padding: 30px 32px;
  max-width: 480px; box-shadow: 0 20px 60px rgba(0,0,0,0.18);
  position: relative; font-family: system-ui, sans-serif;
}
.tcard::before {
  content: "\\201C"; position: absolute; top: -10px; left: 20px;
  font-size: 120px; color: var(--accent); opacity: 0.18;
  font-family: serif; line-height: 1;
}
.tcard-stars { color: #fbbf24; font-size: 1.2em; letter-spacing: 2px; margin-bottom: 10px; }
.tcard-quote { font-size: 1.05em; line-height: 1.6; color: ${s.quoteColor}; margin: 0 0 20px; font-style: italic; }
.tcard-author { display: flex; align-items: center; gap: 12px; }
.tcard-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #f093fb);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 1.3em; font-weight: 700; overflow: hidden;
  flex-shrink: 0;
}
.tcard-avatar img { width: 100%; height: 100%; object-fit: cover; }
.tcard-info h4 { margin: 0; font-size: 0.95em; font-weight: 700; color: ${s.nameColor}; }
.tcard-info p { margin: 0; font-size: 0.8em; color: ${s.subColor}; }`;
  const html = `<div class="tcard">
  <div class="tcard-stars">${stars}</div>
  <p class="tcard-quote">${quote}</p>
  <div class="tcard-author">
    ${avatarHtml}
    <div class="tcard-info">
      <h4>${name}</h4>
      <p>${role}</p>
    </div>
  </div>
</div>`;
  $('#output').textContent = css + '\n\n/* === HTML === */\n' + html;
}

['style','accent','quote','name','role','avatar','rating'].forEach(id => {
  $('#'+id).addEventListener('input', render);
});

$('#btn-copy').textContent = t('btnCopy');
$('#btn-copy').addEventListener('click', () => copyText($('#output').textContent));

render();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💲', href:'/css-tools/pricing-table.html', name:'Pricing Table'},
    {icon:'📅', href:'/css-tools/timeline.html', name:'Timeline'},
    {icon:'🌫️', href:'/css-tools/glassmorphism.html', name:'Glassmorphism'},
    {icon:'🔲', href:'/css-tools/box-shadow.html', name:'Box Shadow'},
  ]
});
</script>

</body>
