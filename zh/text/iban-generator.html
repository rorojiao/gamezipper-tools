// IBAN country formats: country code, length, BBAN structure pattern
const COUNTRIES = [

function randomDigits(n){let s='';for(let i=0;i<n;i++)s+=Math.floor(Math.random()*10);return s;}
function randomAlphaNum(n){const c='0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';let s='';for(let i=0;i<n;i++)s+=c[Math.floor(Math.random()*c.length)];return s;}
function randomUpper(n){let s='';for(let i=0;i<n;i++)s+=String.fromCharCode(65+Math.floor(Math.random()*26));return s;}

function generateBBAN(country, bankCode){
  const c=COUNTRIES.find(x=>x.code===country);
  const totalLen=c.len-4; // minus country(2) + check(2)
  if(bankCode&&bankCode.trim()){
    // Use provided bank code, pad rest with random
    const bc=bankCode.trim().toUpperCase().replace(/[^A-Z0-9]/g,'').substring(0,totalLen-4);
    return bc+randomDigits(totalLen-bc.length);
  }
  // Generate based on country structure
  switch(country){
    case 'DE': return randomDigits(8)+randomDigits(10);
    case 'FR': return randomDigits(5)+randomDigits(5)+randomDigits(11)+randomUpper(2);
    case 'GB': return randomUpper(4)+randomDigits(6)+randomDigits(8);
    case 'ES': return randomDigits(4)+randomDigits(4)+randomDigits(2)+randomDigits(10);
    case 'NL': return randomUpper(4)+randomDigits(10);
    case 'IT': return randomUpper(1)+randomDigits(5)+randomDigits(5)+randomAlphaNum(12);
    case 'BE': return randomDigits(3)+randomDigits(7)+randomDigits(2);
    case 'AT': return randomDigits(5)+randomDigits(11);
    case 'PT': return randomDigits(4)+randomDigits(4)+randomDigits(11)+randomDigits(2);
    case 'IE': return randomUpper(4)+randomDigits(6)+randomDigits(8);
    case 'CH': return randomDigits(5)+randomAlphaNum(12);
    case 'PL': return randomDigits(8)+randomDigits(16);
    case 'SE': return randomDigits(3)+randomDigits(17);
    case 'FI': return randomDigits(6)+randomDigits(7)+randomDigits(1);
    case 'DK': return randomDigits(4)+randomDigits(9)+randomDigits(1);
    case 'NO': return randomDigits(4)+randomDigits(6)+randomDigits(1);
    default: return randomDigits(totalLen);
  }
}

function computeCheckDigits(country,bban){
  // Rearrange: BBAN + CountryCode + 00
  let rearranged=bban+country+'00';
  // Convert letters to numbers: A=10, B=11...
  let numeric='';
  for(const ch of rearranged){
    if(/[0-9]/.test(ch))numeric+=ch;
    else numeric+=(ch.charCodeAt(0)-55).toString();
  }
  // mod 97 of the large number
  let remainder=0;
  for(let i=0;i<numeric.length;i++){
    remainder=(remainder*10+parseInt(numeric[i]))%97;
  }
  const check=98-remainder;
  return check.toString().padStart(2,'0');
}

function generateIBAN(country,bankCode){
  const bban=generateBBAN(country,bankCode);
  const check=computeCheckDigits(country,bban);
  const iban=country+check+bban;
  return iban;
}

function doGenerate(){
  const country=$('#country').value;
  const bankCode=$('#bankcode').value.trim();
  const qty=Math.min(100,Math.max(1,parseInt($('#qty').value)||1));
  const ibans=new Set();
  let attempts=0;
  while(ibans.size<qty&&attempts<qty*3){
    ibans.add(generateIBAN(country,bankCode));
    attempts++;
  }
  const arr=[...ibans];
  let html=`<div style="font-size:.75em;color:var(--gz-accent);margin-bottom:8px">${t('testWarning')}</div>`;
  for(const iban of arr){
    const formatted=iban.replace(/(.{4})/g,'$1 ').trim();
    html+=`<div class="result-row"><code>${formatted}</code><button class="gz-btn gz-btn-sm" onclick="copyOne('${iban}')">${t('generate').charAt(0)==='生'?'复制':'Copy'}</button></div>`;
  }
  $('#output').innerHTML=html;
  $('#status').innerHTML=`<span style="color:var(--gz-success)">✓ ${arr.length} IBAN(s) generated</span>`;
}

function copyOne(iban){copyText(iban);showToast(t('copied'));}
function copyAll(){const text=$('#output').querySelectorAll('code');if(!text.length)return;const all=[...text].map(c=>c.textContent.replace(/\s/g,'')).join('\n');copyText(all);showToast(t('copied'));}
function doClear(){$('#output').innerHTML=`<p style="opacity:.6">${t('empty')}</p>`;$('#status').innerHTML='';}
