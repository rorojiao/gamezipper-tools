<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I calculate an nth root?", "acceptedAnswer": {"@type": "Answer", "text": "The nth root of a number x is a value r such that r^n = x. You can calculate it as r = x^(1/n). For example, the cube root of 27 is 3 because 3³ = 27. Enter the number and the root degree in the calculator above."}}, {"@type": "Question", "name": "Can you take an even root of a negative number?", "acceptedAnswer": {"@type": "Answer", "text": "No, even roots (square root, 4th root, etc.) of negative numbers are not real numbers — they are imaginary/complex. Only odd roots (cube root, 5th root, etc.) of negative numbers produce real results."}}, {"@type": "Question", "name": "What is the difference between nth root and exponent?", "acceptedAnswer": {"@type": "Answer", "text": "Taking an nth root is the inverse operation of raising to the nth power. If y = x^n, then x is the nth root of y. Mathematically, the nth root of x equals x raised to the power of 1/n."}}, {"@type": "Question", "name": "Is this nth root calculator free?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, completely free with no signup. All calculations are performed in your browser — nothing is sent to any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>

  <div class="gz-tool-area">

    <div class="input-row">
      <div class="input-field">
        <label id="lbl-n"></label>
        <input type="number" id="rootN" value="3" min="1" step="1">
      </div>

      <div class="input-field">

        <input type="number" id="numberX" value="27" step="any">
      </div>
    </div>
    <div style="text-align:center;margin-top:16px">
      <button class="gz-btn" id="calcBtn" style="padding:12px 36px;font-size:1.1em"></button>

  </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Nth Root Calculator',
    toolDesc: 'Calculate any nth root of a number — square root, cube root, 4th root and beyond. Supports negative numbers for odd roots with step-by-step solutions.',
    nLabel: 'Root (n)',
    xLabel: 'Number (x)',
    calcBtn: 'Calculate Root',
    result: 'Result',
    stepsTitle: 'Step by Step',
    errorEven: 'Cannot take an even root of a negative number (result is imaginary)',
    errorZero: 'Root degree cannot be zero',
    step1: 'Enter the root degree n (e.g., 2 for square root, 3 for cube root)',
    step2: 'Enter the number x you want to find the root of',
    step3: 'Click Calculate Root',
    step4: 'See the result with verification and step-by-step explanation',
  },
  zh: {
    toolTitle: 'N 次方根计算器',
    toolDesc: '计算任意数字的 n 次方根 — 平方根、立方根、四次根等。支持奇数根的负数输入，附分步解答。',
    nLabel: '根次 (n)',
    xLabel: '数字 (x)',
    calcBtn: '计算方根',
    result: '结果',
    stepsTitle: '分步计算',
    errorEven: '无法对负数取偶次根（结果为虚数）',
    errorZero: '根次不能为零',
    step1: '输入根次 n（如 2 为平方根，3 为立方根）',
    step2: '输入要求根的数字 x',
    step3: '点击计算方根',
    step4: '查看结果、验证和分步解释',
  }
});

const { $, t } = GZ;

function calc() {
  const n = parseInt($('#rootN').value);
  const x = parseFloat($('#numberX').value);
  if (isNaN(n) || isNaN(x)) { $('#result').innerHTML = ''; return; }
  if (n === 0) {
    $('#result').innerHTML = `<div class="error-msg">${t('errorZero')}</div>`;
    return;
  }
  if (x < 0 && n % 2 === 0) {
    $('#result').innerHTML = `<div class="error-msg">${t('errorEven')}</div>`;
    return;
  }
  // Calculate nth root
  let result;
  if (x < 0 && n % 2 === 1) {
    result = -Math.pow(-x, 1 / n);
  } else {
    result = Math.pow(x, 1 / n);
  }
  const rootName = n === 2 ? 'Square' : n === 3 ? 'Cube' : n === 4 ? 'Fourth' : `${n}th`;
  const verification = Math.pow(result, n);
  const fmt = v => {
    if (!isFinite(v)) return '∞';
    if (Math.abs(v - Math.round(v)) < 1e-10) return Math.round(v).toString();
    return v.toPrecision(10).replace(/\.?0+$/, '');
  };
  const isInteger = Math.abs(result - Math.round(result)) < 1e-10;
  $('#result').innerHTML = `
    <div class="result-box">
      <div class="label">${n}<sup>√</sup>${fmt(x)} =</div>
      <div class="answer">${fmt(result)}</div>
      <div style="margin-top:8px;font-size:0.85em;opacity:0.7">
        ${rootName} root of ${fmt(x)}
      </div>
    </div>
    <div class="steps">
      <strong>${t('stepsTitle')}:</strong><br>
      <code>${n}<sup>√</sup>${fmt(x)} = ${fmt(x)}<sup>1/${n}</sup> = ${fmt(result)}</code><br>
      <code>${t('result').charAt(0).toUpperCase()}${t('result').slice(1)} check: (${fmt(result)})<sup>${n}</sup> = ${fmt(verification)}</code>
      ${isInteger && Math.abs(verification - x) < 1e-6 ? '<br><span style="color:var(--gz-success,#00d672)">✓ Perfect root — exact integer result</span>' : ''}
    </div>`;
}

$('#lbl-n').textContent = t('nLabel');
$('#lbl-x').textContent = t('xLabel');
$('#calcBtn').textContent = t('calcBtn');
$('#calcBtn').addEventListener('click', calc);
$('#rootN').addEventListener('input', calc);
$('#numberX').addEventListener('input', calc);

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'√', href:'/calc/square-footage.html', name:'Square Footage'},
    {icon:'🔢', href:'/calc/cube-root-calculator.html', name:'Cube Root'},
    {icon:'²', href:'/calc/exponent-calculator.html', name:'Exponent'},
    {icon:'➗', href:'/calc/fraction-calculator.html', name:'Fraction Calc'},
  ]
});
</script>
