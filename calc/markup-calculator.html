<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the difference between markup and margin?", "acceptedAnswer": {"@type": "Answer", "text": "Markup is profit as a percentage of cost (profit ÷ cost), while margin is profit as a percentage of selling price (profit ÷ price). For example, a $50 item sold for $100 has a 100% markup but only a 50% margin. Markup is always higher than margin for the same transaction."}}, {"@type": "Question", "name": "How do I calculate selling price with markup?", "acceptedAnswer": {"@type": "Answer", "text": "Selling Price = Cost × (1 + Markup% / 100). For example, if cost is $40 and you want a 75% markup: Selling Price = $40 × 1.75 = $70. The profit is $30."}}, {"@type": "Question", "name": "How do I reverse-calculate markup from cost and price?", "acceptedAnswer": {"@type": "Answer", "text": "Markup % = ((Selling Price - Cost) / Cost) × 100. For example, if you bought for $30 and sold for $75: Markup = (($75-$30)/$30) × 100 = 150%."}}, {"@type": "Question", "name": "What is a good markup percentage?", "acceptedAnswer": {"@type": "Answer", "text": "Typical markups vary by industry: grocery 15-25%, restaurants 60-300%, clothing 100-350%, electronics 30-50%, jewelry 200-500%. The right markup depends on your costs, competition, and perceived value."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="mc-grid">
      <div class="mc-card">
        <label id="lbl-cost"></label>
        <input type="number" id="cost" value="40.00" min="0" step="0.01">
        <label id="lbl-mode"></label>
        <select id="mode">
          <option value="markup" id="opt-markup"></option>
          <option value="price" id="opt-price"></option>
        </select>
        <input type="number" id="pct" value="75" min="0" step="0.1" placeholder="%">
      </div>
      <div class="mc-card">
        <label id="lbl-currency"></label>
        <select id="currency">
          <option value="$">$ USD</option>
          <option value="€">€ EUR</option>
          <option value="£">£ GBP</option>
          <option value="¥">¥ CNY/JPY</option>
          <option value="₹">₹ INR</option>
          <option value="A$">A$ AUD</option>
        </select>
        <label id="lbl-result-info"></label>
        <div style="padding:14px;background:var(--glass2);border-radius:10px;font-size:.85rem;color:var(--text2);line-height:1.6" id="formula"></div>
      </div>
    </div>
    <div id="output"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Markup Calculator',
    toolDesc: 'Calculate selling price from cost and markup %, or reverse-calculate markup from cost and price. Shows profit, margin and markup side by side — free and browser-only.',
    calculate: 'Calculate', reset: 'Reset',
    lblCost: 'Cost Price', lblMode: 'I want to calculate using', lblCurrency: 'Currency Symbol',
    optMarkup: 'Markup percentage', optPrice: 'Selling price (reverse-calc markup)',
    profit: 'Profit', margin: 'Profit Margin', markupPct: 'Markup', sellingPrice: 'Selling Price',
    lblResultInfo: 'Formula',
    note: '💡 Markup = profit ÷ cost. Margin = profit ÷ selling price. A 100% markup gives a 50% margin.',
    step1: 'Enter your cost price',
    step2: 'Choose markup % mode or selling price mode',
    step3: 'Enter the markup percentage or target selling price',
    step4: 'See selling price, profit, margin and markup instantly',
  },
  zh: {
    toolTitle: '加价计算器',
    toolDesc: '根据成本和加价比例计算售价，或从成本和售价反推加价率。同时显示利润、利润率和加价率 — 免费且浏览器本地运行。',
    calculate: '计算', reset: '重置',
    lblCost: '成本价', lblMode: '计算方式', lblCurrency: '货币符号',
    optMarkup: '加价百分比', optPrice: '售价（反推加价率）',
    profit: '利润', margin: '利润率', markupPct: '加价率', sellingPrice: '售价',
    lblResultInfo: '公式',
    note: '💡 加价率 = 利润 ÷ 成本。利润率 = 利润 ÷ 售价。100% 加价对应 50% 利润率。',
    step1: '输入成本价',
    step2: '选择「加价百分比」或「售价反推」模式',
    step3: '输入加价百分比或目标售价',
    step4: '即时查看售价、利润、利润率和加价率',
  }
});

const { $, t } = GZ;

function num(id){ return parseFloat($(id).value) || 0; }

function calculate(){
  const cost = num('cost');
  const cur = $('#currency').value;
  const mode = $('#mode').value;
  const fmt = n => cur + (Math.round(n * 100) / 100).toFixed(2);

  let sellingPrice, profit, markupPct, marginPct;

  if(mode === 'markup'){
    markupPct = num('pct');
    sellingPrice = cost * (1 + markupPct / 100);
    profit = sellingPrice - cost;
  } else {
    sellingPrice = num('pct');
    profit = sellingPrice - cost;
    markupPct = cost > 0 ? (profit / cost) * 100 : 0;
  }
  marginPct = sellingPrice > 0 ? (profit / sellingPrice) * 100 : 0;

  const formulaText = mode === 'markup'
    ? `Selling Price = ${fmt(cost)} × (1 + ${markupPct}% / 100) = ${fmt(sellingPrice)}`
    : `Markup = ((${fmt(sellingPrice)} - ${fmt(cost)}) / ${fmt(cost)}) × 100 = ${markupPct.toFixed(1)}%`;

  $('#formula').textContent = formulaText;

  $('#output').innerHTML = `
    <div class="mc-results">
      <h3>${t('sellingPrice')}</h3>
      <div class="mc-result-row"><span>${t('profit')}</span><span class="val">${fmt(profit)}</span></div>
      <div class="mc-result-row"><span>${t('markupPct')}</span><span>${markupPct.toFixed(1)}%</span></div>
      <div class="mc-result-row"><span>${t('margin')}</span><span>${marginPct.toFixed(1)}%</span></div>
      <div class="mc-result-row total"><span>${t('sellingPrice')}</span><span class="val">${fmt(sellingPrice)}</span></div>
      <div class="mc-note">${t('note')}</div>
    </div>`;
}

function reset(){
  $('#cost').value = '40.00';
  $('#mode').value = 'markup';
  $('#pct').value = '75';
  $('#currency').value = '$';
  calculate();
}

['cost','pct','mode','currency'].forEach(id => {
  $('#'+id).addEventListener('input', calculate);
  $('#'+id).addEventListener('change', calculate);
});

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="calculate()">${t('calculate')}</button><button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💵', href:'/calc/profit-margin-calculator.html', name:'Profit Margin'},
    {icon:'💰', href:'/calc/sales-tax-calculator.html', name:'Sales Tax Calculator'},
    {icon:'🏷️', href:'/calc/discount-calculator.html', name:'Discount Calculator'},
    {icon:'🧮', href:'/calc/vat-calculator.html', name:'VAT Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
