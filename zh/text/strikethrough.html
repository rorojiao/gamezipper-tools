<script>
GZI18n.register({
  en: {
    toolTitle: 'Strikethrough Text Generator',
    toolDesc: 'Add strikethrough, underline, overline and double-line effects to text using Unicode combining characters.',
    inputLabel: 'Input Text',
    outputLabel: 'Decorated Text',
    strikethrough: 'Strikethrough',
    doubleStrike: 'Double Strike',
    underline: 'Underline',
    doubleUnder: 'Double Under',
    overline: 'Overline',
    step1: 'Type or paste your text in the input area',
    step2: 'Choose a decoration style: strikethrough, underline, overline or double',
    step3: 'Copy the decorated text to use anywhere',
  },
  zh: {
    toolTitle: '删除线文字生成器',
    toolDesc: '使用 Unicode 组合字符为文字添加删除线、下划线、上划线等装饰效果。',
    inputLabel: '输入文本',
    outputLabel: '装饰后文字',
    strikethrough: '删除线',
    doubleStrike: '双删除线',
    underline: '下划线',
    doubleUnder: '双下划线',
    overline: '上划线',
    step1: '在输入区输入或粘贴文字',
    step2: '选择装饰样式：删除线、下划线、上划线或双线',
    step3: '复制装饰后的文字用于任何地方',
  }
});

const { $, copyText, t } = GZ;

// Unicode combining characters
const COMBINING = {
  strikethrough: '\u0336',  // COMBINING LONG STROKE OVERLAY
  doubleStrike: '\u0337',  // COMBINING SHORT SOLIDUS OVERLAY
  underline: '\u0332',     // COMBINING LOW LINE
  doubleUnder: '\u0333',   // COMBINING DOUBLE LOW LINE
  overline: '\u0305',      // COMBINING OVERLINE
};

let currentMode = 'strikethrough';

function decorate(text, mode) {
  const char = COMBINING[mode] || COMBINING.strikethrough;
  return text.split('').map(c => {
    if (c === '\n') return c;
    return c + char;
  }).join('');
}

function processText() {
  const text = $('#input').value;
  if (!text) { $('#output').textContent = ''; return; }
  $('#output').textContent = decorate(text, currentMode);
}

$('#input').addEventListener('input', processText);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="currentMode='strikethrough';processText();setActive(this)">${t('strikethrough')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="currentMode='doubleStrike';processText();setActive(this)">${t('doubleStrike')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="currentMode='underline';processText();setActive(this)">${t('underline')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="currentMode='doubleUnder';processText();setActive(this)">${t('doubleUnder')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="currentMode='overline';processText();setActive(this)">${t('overline')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').textContent=''">${t('clear')}</button>`;

function setActive(btn) {
  btn.parentElement.querySelectorAll('.gz-btn').forEach(b => {
    b.classList.remove('gz-btn-active');
    b.classList.add('gz-btn-secondary');
  });
  btn.classList.add('gz-btn-active');
  btn.classList.remove('gz-btn-secondary');
}

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',

});
