<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "Is it cheaper to lease or buy a car?", "acceptedAnswer": {"@type": "Answer", "text": "Over the short term (2-3 years) leasing usually has lower monthly payments and a lower total out-of-pocket cost. Over the long term (5+ years) buying is almost always cheaper because you keep the car after the loan ends and stop paying for it, while leasing means continuous payments forever."}}, {"@type": "Question", "name": "How is a car lease payment calculated?", "acceptedAnswer": {"@type": "Answer", "text": "A lease payment has three parts: depreciation (cap cost minus residual value divided by term), finance charge (cap cost plus residual times money factor), and sales tax. The formula is: monthly = depreciation + finance + tax. Money factor multiplied by 2400 approximates the APR."}}, {"@type": "Question", "name": "What is a good money factor on a lease?", "acceptedAnswer": {"@type": "Answer", "text": "A money factor below 0.00125 (about 3% APR) is considered good for buyers with excellent credit. Multiply the money factor by 2400 to convert it to an APR. Many manufacturers offer subsidized lease rates as low as 0.0005 to 0.001 on promotional deals."}}, {"@type": "Question", "name": "What happens if I exceed lease mileage?", "acceptedAnswer": {"@type": "Answer", "text": "Most leases charge 15 to 30 cents per mile over the annual limit, typically 10,000 to 15,000 miles per year. Excess mileage charges can add up fast — 5,000 miles over at 25 cents each is 1,250. Estimate your real mileage before signing, and buy extra miles up front if needed since they are cheaper than the penalty."}}]}</script>

          <label><span id="lblMiles"></span><span class="val"><span id="milesV">12000</span> <span id="lblMilesYr"></span></span></label>

        <div class="lb-field">

        <div class="lb-field">

        <div class="lb-field">
          <label><span id="lblMoneyFactor"></span><span class="val"><span id="mfV">0.0027</span></span></label>
          <input type="range" id="mf" min="5" max="80" step="1" value="27">
        </div>
        <div class="lb-field">
          <label><span id="lblTax"></span><span class="val"><span id="taxV">8.0</span>%</span></label>
          <input type="range" id="tax" min="0" max="15" step="0.1" value="8">

    <div class="lb-layout">
      <div class="lb-card">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Lease vs Buy Car Calculator',
    toolDesc: 'Compare leasing vs buying a car side by side. Enter price, down payment, loan APR, lease money factor and miles driven to see total cost, monthly payment, equity and the smarter choice.',
    lblInputs: 'Vehicle & financing inputs',
    lblPrice: 'Vehicle price (MSRP)',
    lblDown: 'Down payment / cap reduction',
    lblTerm: 'Loan / lease term',
    lblMonths: 'months',
    lblMiles: 'Miles driven',
    lblMilesYr: '/ yr',
    lblApr: 'Loan APR (buy)',
    lblResidual: 'Residual value (lease)',
    lblMoneyFactor: 'Money factor (lease)',
    lblTax: 'Sales tax rate',
    lblLease: 'Lease',
    lblBuy: 'Buy',
    monthlyPayment: 'Monthly payment',
    totalPaid: 'Total paid (term)',
    downPaid: 'Down payment',
    endEquity: 'Equity at end',
    netCost: 'Net cost (term)',
    perMile: 'Cost per mile',
    winnerLease: '🎉 Leasing saves you <b>%s</b> over %y years',
    winnerBuy: '🎉 Buying saves you <b>%s</b> over %y years',
    winnerTie: '🤝 Nearly identical — choose based on lifestyle',
    note: 'Estimates only. Lease cost assumes disposition fee waived, no excess mileage, and standard wear. Buy cost assumes the car is worth its depreciated value (price minus straight-line depreciation) at term end. Actual deals vary by region, incentives and credit.',
    step1: 'Enter the vehicle price and your down payment',
    step2: 'Set the loan APR for buying and money factor for leasing',
    step3: 'Adjust residual value, term length and annual miles',
    step4: 'Compare total cost, monthly payment and equity to decide',
  },
  zh: {
    toolTitle: '租车 vs 买车计算器',
    toolDesc: '并排对比租车与买车的成本。输入车价、首付、贷款年利率、租赁资金系数和年行驶里程，查看总花费、月供、残值权益和更划算的选择。',
    lblInputs: '车辆与融资输入',
    lblPrice: '车辆价格 (MSRP)',
    lblDown: '首付 / 资本缩减',
    lblTerm: '贷款 / 租赁期限',
    lblMonths: '个月',
    lblMiles: '年行驶里程',
    lblMilesYr: '/ 年',
    lblApr: '贷款年利率（买车）',
    lblResidual: '残值率（租赁）',
    lblMoneyFactor: '资金系数（租赁）',
    lblTax: '销售税率',
    lblLease: '租赁',
    lblBuy: '购买',
    monthlyPayment: '月供',
    totalPaid: '期内总支付',
    downPaid: '首付',
    endEquity: '期末权益',
    netCost: '净成本（期内）',
    perMile: '每英里成本',
    winnerLease: '🎉 租车在 %y 年内为你节省 <b>%s</b>',
    winnerBuy: '🎉 买车在 %y 年内为你节省 <b>%s</b>',
    winnerTie: '🤝 几乎持平 — 根据生活方式选择',
    note: '仅供参考。租赁成本假设无处置费、无超额里程和正常磨损。购买成本假设期末车辆价值等于直线折旧后的残值。实际报价因地区、优惠和信用而异。',
    step1: '输入车辆价格和你的首付',
    step2: '设置买车的贷款年利率和租赁的资金系数',
    step3: '调整残值率、期限和年行驶里程',
    step4: '对比总成本、月供和权益以做出决定',
  }
});

const { $, copyText, t } = GZ;
const numIds = ['price','down','term','miles','apr','residual','mf','tax'];
numIds.forEach(id => $('#'+id).addEventListener('input', update));

function fmt(n){ return '$'+Math.round(n).toLocaleString(); }

function loanPayment(P, r, n) {
  // P principal, r monthly rate, n months
  if (r === 0) return P / n;
  return P * r * Math.pow(1+r, n) / (Math.pow(1+r, n) - 1);
}

function update() {
  const price = +$('#price').value || 0;
  const down = Math.min(+$('#down').value || 0, price);
  const term = +$('#term').value;
  const miles = +$('#miles').value || 0;
  const apr = +$('#apr').value;
  const residualPct = +$('#residual').value;
  const mf = (+$('#mf').value) / 10000; // slider 5-80 -> 0.0005-0.0080
  const tax = +$('#tax').value;

  $('#priceV').textContent = price.toLocaleString();
  $('#downV').textContent = down.toLocaleString();
  $('#termV').textContent = term;
  $('#milesV').textContent = miles.toLocaleString();
  $('#aprV').textContent = apr.toFixed(1);
  $('#resV').textContent = residualPct;
  $('#mfV').textContent = mf.toFixed(4);
  $('#taxV').textContent = tax.toFixed(1);

  // ===== LEASE =====
  const capCost = price - down;
  const residualVal = price * residualPct / 100;
  const depreciation = capCost - residualVal;
  const leaseDepMo = depreciation / term;
  const financeChargeMo = (capCost + residualVal) * mf;
  const leaseBaseMo = leaseDepMo + financeChargeMo;
  const leaseMo = leaseBaseMo * (1 + tax/100);
  const leaseTotal = down + leaseMo * term;
  const leaseNetCost = leaseTotal; // no equity at end
  const leasePerMile = (miles * term/12) > 0 ? leaseNetCost / (miles * term/12) : 0;

  // ===== BUY =====
  const loanP = price - down;
  const r = apr/100/12;
  const buyMo = loanPayment(loanP, r, term) * (1 + tax/100); // simplistic: tax on payment
  const buyTotal = down + buyMo * term;
  // depreciated value at end (straight line over ~10 yr lifespan)
  const lifespanMiles = 150000;
  const totalMiles = miles * term/12;
  const depreciationPct = Math.min(0.85, totalMiles / lifespanMiles);
  const endValue = price * (1 - depreciationPct);
  const buyNetCost = buyTotal - endValue;
  const buyPerMile = (miles * term/12) > 0 ? buyNetCost / (miles * term/12) : 0;

  // Render lease stats
  $('#leaseStats').innerHTML = `
    <div class="lb-stat"><span class="k">${t('monthlyPayment')}</span><span class="v">${fmt(leaseMo)}/mo</span></div>
    <div class="lb-stat"><span class="k">${t('downPaid')}</span><span class="v">${fmt(down)}</span></div>
    <div class="lb-stat"><span class="k">${t('totalPaid')}</span><span class="v">${fmt(leaseTotal)}</span></div>
    <div class="lb-stat"><span class="k">${t('endEquity')}</span><span class="v">$0</span></div>
    <div class="lb-stat" style="border-bottom:none"><span class="k">${t('netCost')}</span><span class="v" style="color:#a29bfe">${fmt(leaseNetCost)}</span></div>`;

  // Render buy stats
  $('#buyStats').innerHTML = `
    <div class="lb-stat"><span class="k">${t('monthlyPayment')}</span><span class="v">${fmt(buyMo)}/mo</span></div>
    <div class="lb-stat"><span class="k">${t('downPaid')}</span><span class="v">${fmt(down)}</span></div>
    <div class="lb-stat"><span class="k">${t('totalPaid')}</span><span class="v">${fmt(buyTotal)}</span></div>
    <div class="lb-stat"><span class="k">${t('endEquity')}</span><span class="v" style="color:#4ecdc4">${fmt(endValue)}</span></div>
    <div class="lb-stat" style="border-bottom:none"><span class="k">${t('netCost')}</span><span class="v" style="color:#4ecdc4">${fmt(buyNetCost)}</span></div>`;

  // Winner
  const years = (term/12);
  const diff = Math.abs(leaseNetCost - buyNetCost);
  let msg;
  if (diff < 300) msg = t('winnerTie');
  else if (leaseNetCost < buyNetCost) msg = t('winnerLease').replace('%s', fmt(diff)).replace('%y', years.toFixed(1));
  else msg = t('winnerBuy').replace('%s', fmt(diff)).replace('%y', years.toFixed(1));
  $('#winnerBox').innerHTML = msg;

  $('#noteBox').textContent = t('note');
  drawChart(leaseNetCost, buyNetCost, leaseMo, buyMo);
}

function drawChart(leaseNet, buyNet, leaseMo, buyMo) {
  const W=600,H=220,P=50;
  const maxCost = Math.max(leaseNet, buyNet, 1);
  const maxMo = Math.max(leaseMo, buyMo, 1);
  const bw = 70, gap = 40;
  const totalW = bw*4 + gap*2;
  const x0 = (W - totalW)/2;
  const sc = (v)=> H-P - v/maxCost*(H-2*P);
  const sm = (v)=> H-P - v/maxMo*(H-2*P);
  // Two groups: net cost (left) and monthly (right)
  const svg = `<svg width="100%" height="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
    <text x="${W/2}" y="18" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="bold">Net cost (term) vs Monthly payment</text>
    <!-- Net cost group -->
    <rect x="${x0}" y="${sc(leaseNet)}" width="${bw}" height="${H-P-sc(leaseNet)}" fill="#6c5ce7" rx="4"/>
    <text x="${x0+bw/2}" y="${sc(leaseNet)-5}" text-anchor="middle" fill="#a29bfe" font-size="10">${fmt(leaseNet)}</text>
    <rect x="${x0+bw+gap}" y="${sc(buyNet)}" width="${bw}" height="${H-P-sc(buyNet)}" fill="#4ecdc4" rx="4"/>
    <text x="${x0+bw+gap+bw/2}" y="${sc(buyNet)-5}" text-anchor="middle" fill="#4ecdc4" font-size="10">${fmt(buyNet)}</text>
    <text x="${x0+bw+gap/2}" y="${H-P+14}" text-anchor="middle" fill="var(--text2)" font-size="9">Lease / Buy</text>
    <!-- Monthly group -->
    <rect x="${x0+bw*2+gap*1.5}" y="${sm(leaseMo)}" width="${bw}" height="${H-P-sm(leaseMo)}" fill="#6c5ce7" opacity=".7" rx="4"/>
    <text x="${x0+bw*2+gap*1.5+bw/2}" y="${sm(leaseMo)-5}" text-anchor="middle" fill="#a29bfe" font-size="10">${fmt(leaseMo)}</text>
    <rect x="${x0+bw*3+gap*2.5}" y="${sm(buyMo)}" width="${bw}" height="${H-P-sm(buyMo)}" fill="#4ecdc4" opacity=".7" rx="4"/>
    <text x="${x0+bw*3+gap*2.5+bw/2}" y="${sm(buyMo)-5}" text-anchor="middle" fill="#4ecdc4" font-size="10">${fmt(buyMo)}</text>
    <text x="${x0+bw*2.5+gap*2}" y="${H-P+14}" text-anchor="middle" fill="var(--text2)" font-size="9">Lease / Buy</text>
    <text x="${x0+bw+gap/2}" y="${H-P+28}" text-anchor="middle" fill="var(--text2)" font-size="9">Net cost</text>
    <text x="${x0+bw*2.5+gap*2}" y="${H-P+28}" text-anchor="middle" fill="var(--text2)" font-size="9">Monthly</text>
  </svg>`;
  $('#chart').innerHTML = svg;
}

['lblInputs','lblPrice','lblDown','lblTerm','lblMonths','lblMiles','lblMilesYr','lblApr','lblResidual','lblMoneyFactor','lblTax','lblLease','lblBuy'].forEach(k => { const el=$('#'+k); if(el) el.textContent=t(k); });

update();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔑', href:'/calc/lease-calculator.html', name:'Auto Lease Calculator'},
    {icon:'🚙', href:'/calc/car-loan-calculator.html', name:'Car Loan'},
    {icon:'🚗', href:'/calc/car-affordability-calculator.html', name:'Car Affordability'},
    {icon:'📉', href:'/calc/car-depreciation-calculator.html', name:'Car Depreciation'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
