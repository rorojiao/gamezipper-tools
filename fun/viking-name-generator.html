<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How does the Viking name generator work?", "acceptedAnswer": {"@type": "Answer", "text": "It builds names from authentic Norse name parts (Ragnar, Bjorn, Lagertha, Erik) and adds patronymics like Eriksson (son of Erik) or Eriksdottir (daughter of Erik), plus fearsome epithets like Ironside, Skullsplitter or Bloodaxe. Pick Warrior, Shieldmaiden, Jarl or Random and get 20 names per click."}}, {"@type": "Question", "name": "What does a Viking patronymic mean?", "acceptedAnswer": {"@type": "Answer", "text": "A patronymic is a surname formed from the father's first name. The suffix -son means 'son of' and -dottir means 'daughter of'. So Ragnarsson means 'son of Ragnar' and Freyjadottir means 'daughter of Freyja'."}}, {"@type": "Question", "name": "Can I use these Viking names for my character or story?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Names are randomly assembled from Norse-flavored banks, so they are free to use in RPGs, novels, games, cosplay and worldbuilding. Add an epithet like Bloodaxe or the Boneless for extra saga flavor."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Viking Name Generator',
    toolDesc: 'Create Norse warrior names like Ragnar, Bjorn and Lagertha — with patronymics (son/daughter) and epithets like Ironside and Skullsplitter. Pick a style and get 20 unique names every click. Free, private, no signup.',
    sWarrior: '⚔️ Warrior', sShieldmaiden: '🛡️ Shieldmaiden', sJarl: '👑 Jarl', sRandom: '🎲 Random',
    btnGen: 'Generate 20 names',
    btnCopy: 'Copy All',
    copied: 'Copied!',
    step1: 'Pick a style — Warrior, Shieldmaiden, Jarl or Random',
    step2: 'Click Generate to spin up 20 unique Norse names',
    step3: 'Tap the copy icon on any name to grab it',
    step4: 'Click Copy All to grab the full list at once',
  },
  zh: {
    toolTitle: '维京名字生成器',
    toolDesc: '生成北欧战士名字 — Ragnar、Bjorn、Lagertha 等，附带父名（son/daughter）和称号如 Ironside、Skullsplitter。选择风格，每次点击获得 20 个独特名字。免费、私密、无需注册。',
    sWarrior: '⚔️ 战士', sShieldmaiden: '🛡️ 盾女', sJarl: '👑 首领', sRandom: '🎲 随机',
    btnGen: '生成 20 个名字',
    btnCopy: '全部复制',
    copied: '已复制！',
    step1: '选择风格 — 战士、盾女、首领或随机',
    step2: '点击「生成」获得 20 个独特的北欧名字',
    step3: '点击任意名字旁的复制按钮即可获取',
    step4: '点击「全部复制」一次性获取整个列表',
  }
});

const { $, t, showToast } = GZ;
const pick = a => a[Math.floor(Math.random() * a.length)];

const MALE = ['Ragnar','Bjorn','Erik','Ivar','Leif','Harald','Halfdan','Rollo','Gunnar','Sigurd','Floki','Bjorn','Olaf','Thorstein','Egil','Knut','Ulf','Odd','Gorm','Sven','Asbjorn','Torsten','Viggo','Hakon','Magnus'];
const FEMALE = ['Lagertha','Freydis','Astrid','Helga','Sigrid','Gunnhild','Thora','Porunn','Aslaug','Ragnhild','Ingrid','Liv','Hlif','Runa','Solveig','Thyra','Yrsa','Bodil','Eira','Greta'];
const EPITHETS = ['Ironside','Skullsplitter','Bloodaxe','the Boneless','Fairhair','the Cruel','Snake-in-the-Eye','the Red','the White','the Stout','the Mighty','the Wise','Gold-Harald','Forkbeard','the Restless','the Cruel','the Fearless','Wolfsbane','the Stormborn','the Relentless','the Cruel-Striker','the Silent','the Patient','the Bloodhound'];
const TITLES = ['Jarl','Earl','King of the North','Sea-King','Shieldbreaker','the Lawspeaker','the Raidsmith'];
const PROFESSION = ['Skald','Berserker','Blacksmith','Raider','Explorer','Trader','Shipwright'];

function makeName(style) {
  const r = Math.random();
  if (style === 'shieldmaiden' || (style === 'random' && r < 0.35)) {
    const f = pick(FEMALE);
    const father = pick(MALE);
    if (Math.random() < 0.6) return f + ' ' + father + 'dottir';
    return f + ' ' + pick(EPITHETS);
  }
  if (style === 'jarl' || (style === 'random' && r < 0.55)) {
    return pick(MALE) + ' ' + pick(TITLES) + ', ' + pick(EPITHETS);
  }
  // warrior
  const m = pick(MALE);
  const father = pick(MALE);
  if (Math.random() < 0.5) return m + ' ' + father + 'son';
  return m + ' ' + pick(EPITHETS);
}

let style = 'warrior';
const STYLES = [
  {id:'warrior',key:'sWarrior'},{id:'shieldmaiden',key:'sShieldmaiden'},{id:'jarl',key:'sJarl'},{id:'random',key:'sRandom'},
];
$('#style-tabs').innerHTML = STYLES.map(s => `<button data-id="${s.id}" class="${s.id===style?'active':''}">${t(s.key)}</button>`).join('');
document.querySelectorAll('#style-tabs button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#style-tabs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    style = b.dataset.id;
    generate();
  });
});

function generate() {
  const seen = new Set();
  const names = [];
  let safety = 0;
  while (names.length < 20 && safety < 400) {
    const n = makeName(style).replace(/\s+/g,' ').trim();
    if (!seen.has(n)) { seen.add(n); names.push(n); }
    safety++;
  }
  $('#grid').innerHTML = names.map(n => `
    <div class="vn-card">
      <span class="name">${n.replace(/</g,'&lt;')}<span class="epithet">⚓ ${pick(PROFESSION)}</span></span>
      <button data-name="${n.replace(/"/g,'&quot;')}" title="copy">📋</button>
    </div>`).join('');
  document.querySelectorAll('#grid .vn-card button').forEach(b => {
    b.addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(b.dataset.name.replace(/&quot;/g,'"')); showToast(t('copied')); }
      catch (e) { showToast(t('copied')); }
    });
  });
}

function copyAll() {
  const names = [...document.querySelectorAll('#grid .vn-card .name')].map(e => e.firstChild.textContent.trim());
  if (!names.length) return;
  navigator.clipboard.writeText(names.join('\n')).then(() => showToast(t('copied'))).catch(() => showToast(t('copied')));
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">⚔️ ${t('btnGen')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyAll()">📋 ${t('btnCopy')}</button>`;

generate();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',

    {icon:'🦸', href:'/fun/superhero-name-generator.html', name:'Superhero Name Generator'},
  ]
});
</script>
