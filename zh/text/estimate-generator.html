.es-preview{background:#fff;color:#222;padding:30px 36px;border-radius:var(--radius);box-shadow:0 4px 20px rgba(0,0,0,.3);min-height:600px;font-size:.85rem;line-height:1.5;font-family:Helvetica,Arial,sans-serif}

<script>

  },
  zh: {

    toolDesc: '几秒内创建专业报价单。添加商家、客户、明细、税和有效期 — 然后下载 PDF。无需注册、完全本地。',
    bizSec: '商家信息', clientSec: '报价对象（客户）', esSec: '报价详情', itemsSec: '明细项目', notesSec: '备注 / 条款',
    bizName: '商家名称', bizAddr: '地址', bizEmail: '邮箱', bizPhone: '电话',
    cliName: '客户名称', cliAddr: '地址', cliEmail: '邮箱',
    esNumber: '报价单号', esDate: '开具日期', validity: '有效期（天）', currency: '货币', taxRate: '税率 (%)', discount: '折扣',
    desc: '描述', qty: '数量', price: '单价', amount: '金额',
    addItem: '+ 添加明细', notesPh: '本报价单有效期 30 天。最终价格可能因实际工作量调整。确认后将开具正式发票。',
    downloadPdf: '📥 下载 PDF', clear: '🗑️ 清空', example: '✨ 加载示例', subtotal: '小计', tax: '税', discountLbl: '折扣', total: '预估合计',
    step1: '填写商家信息和客户信息',
    step2: '设置报价单号、日期、有效期、货币和税率',
    step3: '添加明细项目 — 描述、数量、单价',
    step4: '点击「下载 PDF」保存或打印报价单',
  }
});

const { $, $$, t } = GZ;
let lang = GZI18n.getLang();
const STATE_KEY = 'gz-estimate-data-v1';
let state = {
  biz: { name:'', addr:'', email:'', phone:'' },
  client: { name:'', addr:'', email:'' },
  es: { number:'EST-001', date:new Date().toISOString().slice(0,10), validity:30, currency:'USD', tax:0, discount:0 },
  items: [{ desc:'', qty:1, price:0 }],
  notes: '',
};

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(n,cur){return (cur||'USD')+ ' '+(+n||0).toFixed(2);}
function loadState(){ try{const r=localStorage.getItem(STATE_KEY); if(r) state=Object.assign(state, JSON.parse(r));}catch(e){} }
function saveState(){ try{localStorage.setItem(STATE_KEY, JSON.stringify(state));}catch(e){} }

function addDays(dateStr, days){
  if(!dateStr) return '';
  const d=new Date(dateStr); if(isNaN(d)) return '';
  d.setDate(d.getDate()+(+days||0));
  return d.toISOString().slice(0,10);
}

function renderForm(){
  $('#form').innerHTML = `
    <div class="es-section"><h3>${t('bizSec')}</h3><div class="es-grid">
      <div class="es-full"><label>${t('bizName')}</label><input data-biz="name" value="${esc(state.biz.name)}" placeholder="Acme Inc."></div>
      <div class="es-full"><label>${t('bizAddr')}</label><textarea data-biz="addr" rows="2">${esc(state.biz.addr)}</textarea></div>
      <div><label>${t('bizEmail')}</label><input data-biz="email" value="${esc(state.biz.email)}"></div>
      <div><label>${t('bizPhone')}</label><input data-biz="phone" value="${esc(state.biz.phone)}"></div>
    </div></div>
    <div class="es-section"><h3>${t('clientSec')}</h3><div class="es-grid">
      <div class="es-full"><label>${t('cliName')}</label><input data-client="name" value="${esc(state.client.name)}"></div>
      <div class="es-full"><label>${t('cliAddr')}</label><textarea data-client="addr" rows="2">${esc(state.client.addr)}</textarea></div>
      <div class="es-full"><label>${t('cliEmail')}</label><input data-client="email" value="${esc(state.client.email)}"></div>
    </div></div>
    <div class="es-section"><h3>${t('esSec')}</h3><div class="es-grid">
      <div><label>${t('esNumber')}</label><input data-es="number" value="${esc(state.es.number)}"></div>
      <div><label>${t('currency')}</label><select data-es="currency">${['USD','EUR','CNY','GBP','JPY'].map(c=>`<option ${state.es.currency===c?'selected':''}>${c}</option>`).join('')}</select></div>
      <div><label>${t('esDate')}</label><input type="date" data-es="date" value="${esc(state.es.date)}"></div>
      <div><label>${t('validity')}</label><input type="number" min="1" data-es="validity" value="${state.es.validity}"></div>
      <div><label>${t('taxRate')}</label><input type="number" min="0" max="100" step="0.1" data-es="tax" value="${state.es.tax}"></div>
      <div><label>${t('discount')}</label><input type="number" min="0" step="0.01" data-es="discount" value="${state.es.discount}"></div>
    </div></div>
    <div class="es-section"><h3>${t('itemsSec')}</h3>
      <table class="es-items"><thead><tr><th>${t('desc')}</th><th style="width:60px">${t('qty')}</th><th style="width:100px">${t('price')}</th><th style="width:90px" class="num">${t('amount')}</th><th style="width:24px"></th></tr></thead>
      <tbody id="esItems">${state.items.map((it,i)=>itemRow(it,i)).join('')}</tbody></table>
      <button class="es-add-row" onclick="addItem()">${t('addItem')}</button>
    </div>
    <div class="es-section"><h3>${t('notesSec')}</h3>
      <textarea data-notes rows="3" style="width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.55rem .7rem;color:var(--text);font-size:.85rem;font-family:inherit" placeholder="${t('notesPh')}">${esc(state.notes)}</textarea>
    </div>`;
  bindForm();
}

function itemRow(it,i){
  return `<tr>
    <td><input data-row="${i}" data-f="desc" value="${esc(it.desc)}" placeholder="Service / product"></td>
    <td><input data-row="${i}" data-f="qty" type="number" min="0" step="any" value="${it.qty}"></td>
    <td><input data-row="${i}" data-f="price" type="number" min="0" step="any" value="${it.price}"></td>
    <td class="num" id="esAm${i}">${(it.qty*it.price).toFixed(2)}</td>
    <td><button class="es-del" onclick="delItem(${i})">✕</button></td>
  </tr>`;
}

function bindForm(){
  $$('#form input[data-biz],#form textarea[data-biz]').forEach(i=>i.oninput=e=>{state.biz[i.dataset.biz]=i.value;saveState();renderPreview();});
  $$('#form input[data-client],#form textarea[data-client]').forEach(i=>i.oninput=e=>{state.client[i.dataset.client]=i.value;saveState();renderPreview();});
  $$('#form input[data-es],#form select[data-es]').forEach(i=>i.oninput=e=>{state.es[i.dataset.es]=i.value;saveState();renderPreview();});
  $$('#form input[data-row]').forEach(i=>i.oninput=e=>{
    const idx=+i.dataset.row, f=i.dataset.f;
    state.items[idx][f]= f==='desc'?i.value:(+i.value||0);
    $('#esAm'+idx).textContent=(state.items[idx].qty*state.items[idx].price).toFixed(2);
    saveState(); renderPreview();
  });
  $$('#form textarea[data-notes]').forEach(i=>i.oninput=e=>{state.notes=i.value;saveState();renderPreview();});
}

function addItem(){ state.items.push({desc:'',qty:1,price:0}); saveState(); renderForm(); renderPreview(); }
function delItem(i){ state.items.splice(i,1); if(!state.items.length) state.items.push({desc:'',qty:1,price:0}); saveState(); renderForm(); renderPreview(); }

function renderPreview(){
  const b=state.biz, c=state.client, e=state.es;
  const sub=state.items.reduce((s,it)=>s+(it.qty*it.price),0);
  const taxAmt=sub*(+e.tax||0)/100;
  const disc=+e.discount||0;
  const tot=Math.max(0,sub+taxAmt-disc);
  const cur=e.currency||'USD';
  const expiry=addDays(e.date, e.validity);
  $('#preview').innerHTML = `
    <div class="es-head">
      <div>
        <h1>${lang==='zh'?'报价单':'ESTIMATE'}</h1>
        <div class="es-meta" style="margin-top:4px"><b>${esc(b.name)||'Your Business'}</b>${b.addr?'<br>'+esc(b.addr).replace(/\n/g,'<br>'):''}${b.email?'<br>'+esc(b.email):''}${b.phone?' · '+esc(b.phone):''}</div>
      </div>
      <div class="es-meta" style="text-align:right">
        <b>${esc(e.number)||''}</b>
        <div>${lang==='zh'?'日期':'Date'}: ${esc(e.date)||''}</div>
        ${expiry?`<div style="margin-top:4px"><span class="es-validity">${lang==='zh'?'有效期至':'Valid until'} ${esc(expiry)}</span></div>`:''}
      </div>
    </div>
    <div class="es-bill">
      <div><h4>${lang==='zh'?'报价对象':'Estimate For'}</h4><p><b>${esc(c.name)||''}</b>${c.addr?'<br>'+esc(c.addr).replace(/\n/g,'<br>'):''}${c.email?'<br>'+esc(c.email):''}</p></div>
      <div></div>
    </div>
    <table>
      <thead><tr><th>${t('desc')}</th><th class="num" style="width:60px">${t('qty')}</th><th class="num" style="width:100px">${t('price')}</th><th class="num" style="width:110px">${t('amount')}</th></tr></thead>
      <tbody>${state.items.map(it=>`<tr><td>${esc(it.desc||'—')}</td><td class="num">${it.qty}</td><td class="num">${fmt(it.price,cur)}</td><td class="num">${fmt(it.qty*it.price,cur)}</td></tr>`).join('')}</tbody>
    </table>
    <div class="es-totals">
      <div class="row"><span>${t('subtotal')}</span><span>${fmt(sub,cur)}</span></div>
      ${e.tax>0?`<div class="row"><span>${t('tax')} (${e.tax}%)</span><span>${fmt(taxAmt,cur)}</span></div>`:''}
      ${disc>0?`<div class="row"><span>${t('discountLbl')}</span><span>-${fmt(disc,cur)}</span></div>`:''}
      <div class="row total"><span>${t('total')}</span><span>${fmt(tot,cur)}</span></div>
    </div>
    ${state.notes?`<div class="es-notes"><b>${lang==='zh'?'备注':'Notes'}:</b><br>${esc(state.notes).replace(/\n/g,'<br>')}</div>`:''}`;
}

function downloadPDF(){
  const css='body{font-family:Helvetica,Arial,sans-serif;color:#222;padding:36px;font-size:13px;line-height:1.5}.es-head{display:flex;justify-content:space-between;border-bottom:2px solid #7c3aed;padding-bottom:14px;margin-bottom:14px;align-items:start}h1{color:#7c3aed;font-size:30px;margin:0;text-transform:uppercase;letter-spacing:2px}.es-meta{font-size:11px;color:#555}.es-meta b{display:block;color:#111}.es-validity{background:#f3e8ff;color:#6b21a8;padding:3px 10px;border-radius:5px;font-weight:600;font-size:11px}.es-bill{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}.es-bill h4{margin:0 0 4px;font-size:10px;text-transform:uppercase;color:#666;letter-spacing:1px}.es-bill p{margin:0;white-space:pre-wrap}table{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:12px}th{background:#f5f5f5;padding:8px;text-align:left;border-bottom:2px solid #ddd}td{padding:8px;border-bottom:1px solid #eee}.num{text-align:right}.es-totals{width:50%;margin-left:auto}.es-totals .row{display:flex;justify-content:space-between;padding:3px 0}.es-totals .row.total{font-size:15px;font-weight:700;color:#7c3aed;border-top:2px solid #7c3aed;padding-top:6px;margin-top:6px}.es-notes{margin-top:18px;padding-top:10px;border-top:1px solid #eee;font-size:11px;color:#555;white-space:pre-wrap}';
  const w=window.open('','_blank','width=900,height=1100');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Estimate ${esc(state.es.number||'')}</title><style>${css}</style><link rel="alternate" hreflang="en" href="https://tools.gamezipper.com/text/estimate-generator.html">\n<link rel="alternate" hreflang="zh" href="https://tools.gamezipper.com/zh/text/estimate-generator.html">\n<link rel="alternate" hreflang="x-default" href="https://tools.gamezipper.com/text/estimate-generator.html">\n<script>localStorage.setItem(\'gz-lang\',\'zh\');<\/script>\n</head><body>${$('#preview').innerHTML}</body></html>\n`);
  w.document.close();
}

function doClear(){ state={biz:{name:'',addr:'',email:'',phone:''},client:{name:'',addr:'',email:''},es:{number:'EST-001',date:new Date().toISOString().slice(0,10),validity:30,currency:'USD',tax:0,discount:0},items:[{desc:'',qty:1,price:0}],notes:''}; saveState(); renderForm(); renderPreview(); }
function loadExample(){ state={biz:{name:'Bright Home Renovations',addr:'220 Pine Street\nDenver, CO 80202',email:'info@brightreno.com',phone:'+1 (303) 555-0177'},client:{name:'David & Emily Carter',addr:'45 Maple Lane\nBoulder, CO 80301',email:'d.carter@example.com'},es:{number:'EST-2026-0089',date:new Date().toISOString().slice(0,10),validity:30,currency:'USD',tax:0,discount:250},items:[{desc:'Kitchen cabinet refacing (10 doors + 6 drawers)',qty:1,price:3200},{desc:'Quartz countertop installation (≈28 sq ft)',qty:28,price:75},{desc:'Under-cabinet LED lighting',qty:1,price:480},{desc:'Labor — demolition & installation (3 days)',qty:3,price:650}],notes:'This estimate is valid for 30 days. Final price may vary based on material selection and unforeseen structural issues. A formal invoice will be issued upon project approval.'}; saveState(); renderForm(); renderPreview(); }

loadState();
renderForm();
renderPreview();
$('#toolbar').innerHTML = `<button class="gz-btn" onclick="downloadPDF()">${t('downloadPdf')}</button><button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button><button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'text',
