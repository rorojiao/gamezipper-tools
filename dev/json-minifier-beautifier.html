<script>
GZI18n.register({
  en: {
    toolTitle: 'JSON Minifier & Beautifier',
    toolDesc: 'Compress JSON to one line or format it for readability. Shows byte savings and validates your JSON in real time.',
    indent: 'spaces',
    jsonValid: '✓ Valid JSON',
    jsonInvalid: '✗ Invalid JSON',
    bytesIn: 'Input size',
    bytesOut: 'Output size',
    saved: 'Saved',
    step1: 'Paste your JSON in the input area on the left',
    step2: 'Click Minify to compress to one line, or Beautify to format with indentation',
    step3: 'Watch the byte-savings counter update instantly',
    step4: 'Use Copy to put the result on your clipboard',
  },
  zh: {
    toolTitle: 'JSON 压缩与美化',
    toolDesc: '将 JSON 压缩为单行或格式化为可读形式。实时显示字节节省并验证 JSON。',
    indent: '空格',
    jsonValid: '✓ JSON 有效',
    jsonInvalid: '✗ JSON 无效',
    bytesIn: '输入大小',
    bytesOut: '输出大小',
    saved: '节省',
    step1: '在左侧输入框粘贴 JSON',
    step2: '点击「压缩」转为单行，或点击「美化」加上缩进格式化',
    step3: '查看字节节省计数器即时更新',
    step4: '点击「复制」将结果复制到剪贴板',
  }
});

let indent = 2;
const { $, copyText, t } = GZ;

function formatBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
  return (n/1024/1024).toFixed(2) + ' MB';
}

function syntaxHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c = 'json-number';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-string';
      else if (/true|false/.test(m)) c = 'json-bool';
      else if (/null/.test(m)) c = 'json-null';
      return `<span class="${c}">${m}</span>`;
    });
}

function updateStats(inSize, outSize, valid) {
  const saved = inSize - outSize;
  const pct = inSize ? Math.max(0, Math.round(saved / inSize * 100)) : 0;
  $('#stats').innerHTML = [
    { num: formatBytes(inSize), label: t('bytesIn') },
    { num: formatBytes(outSize), label: t('bytesOut') },
    { num: (saved >= 0 ? '−' : '+') + formatBytes(Math.abs(saved)) + ' (' + pct + '%)', label: t('saved') },
    { num: valid ? '✓' : '✗', label: valid ? t('jsonValid') : t('jsonInvalid') },
  ].map(s => `<div class="jmb-stat"><div class="num">${s.num}</div><div class="label">${s.label}</div></div>`).join('');
}

function doBeautify() {
  const inp = $('#input').value.trim(); if (!inp) { $('#output').textContent = ''; updateStats(0,0,false); $('#status').innerHTML=''; return; }
  try {
    const obj = JSON.parse(inp);
    const formatted = JSON.stringify(obj, null, indent);
    $('#output').innerHTML = syntaxHighlight(formatted);
    updateStats(new TextEncoder().encode(inp).length, new TextEncoder().encode(formatted).length, true);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('jsonValid')}</span>`;
  } catch(e) { showError(e, inp); }
}

function doMinify() {
  const inp = $('#input').value.trim(); if (!inp) { $('#output').textContent = ''; updateStats(0,0,false); $('#status').innerHTML=''; return; }
  try {
    const min = JSON.stringify(JSON.parse(inp));
    $('#output').textContent = min;
    updateStats(new TextEncoder().encode(inp).length, new TextEncoder().encode(min).length, true);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('jsonValid')}</span>`;
  } catch(e) { showError(e, inp); }
}

function showError(e, inp) {
  const msg = e.message;
  const posMatch = msg.match(/position (\d+)/);
  let info = `<span style="color:var(--gz-accent)">${t('jsonInvalid')}: ${msg}</span>`;
  if (posMatch) {
    const pos = parseInt(posMatch[1]);
    const before = inp.substring(0, pos);
    const line = before.split('\n').length;
    const col = pos - before.lastIndexOf('\n');
    info += ` <span style="opacity:.7">(Line ${line}, Col ${col})</span>`;
  }
  $('#status').innerHTML = info;
  $('#output').innerHTML = `<span style="color:var(--gz-accent)">${msg}</span>`;
  updateStats(new TextEncoder().encode(inp).length, 0, false);
}

function loadExample() {
  $('#input').value = `{"name":"GameZipper","description":"Free online toolbox","version":"2026","features":["JSON formatter","Base64","Color mixer","Calculators"],"active":true,"count":42,"nested":{"theme":"dark","lang":"en","tags":["tools","online","free"]}}`;
  doBeautify();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; updateStats(0,0,false); }

$('#input').addEventListener('input', () => doBeautify());

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doBeautify()">✨ ${t('beautify') || 'Beautify'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doMinify()">📦 ${t('minify')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">📝 ${t('example')}</button>
  <select class="gz-select" onchange="indent=+this.value;doBeautify()">
    <option value="2">2 ${t('indent')}</option>
    <option value="4">4 ${t('indent')}</option>
  </select>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

doBeautify();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/dev/json.html', name:'JSON Formatter'},
    {icon:'🔐', href:'/dev/base64.html', name:'Base64'},
    {icon:'🔍', href:'/dev/json-validator.html', name:'JSON Validator'},
    {icon:'🗂️', href:'/dev/json-to-csv.html', name:'JSON to CSV'},
  ]
});
</script>
