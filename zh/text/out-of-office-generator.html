<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-type-grid" id="type-grid"></div>
    <div class="gz-form" id="form"></div>
    <div class="gz-preview" id="output"></div>
  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Out of Office Message Generator',
    toolDesc: 'Generate professional out-of-office auto-reply messages for vacation, sick leave, conferences, and more.',
    generate: 'Generate',
    copy: 'Copy',
    clear: 'Clear',
    yourName: 'Your Name',
    fromDate: 'From Date',
    toDate: 'To Date',
    altContact: 'Alternate Contact Name',
    altEmail: 'Alternate Contact Email',
    extraNote: 'Additional Note (optional)',
    typeVacation: '🏖️ Vacation',
    typeSick: '🤒 Sick Leave',
    typeConference: '🎤 Conference',
    typeMaternity: '👶 Maternity',
    typeTraining: '📚 Training',
    typePersonal: '🏠 Personal',
    selectType: 'Select a reason',
    step1: 'Choose your out-of-office reason (vacation, sick leave, etc.)',
    step2: 'Fill in your name, dates, and alternate contact info',
    step3: 'Click Generate to create your professional OOO message',
    step4: 'Copy the message and paste it into your email auto-reply settings',
  },
  zh: {
    toolTitle: '外出自动回复生成器',
    toolDesc: '即时生成专业的外出自动回复邮件，支持休假、病假、出差、会议等多种模板。',
    generate: '生成',
    copy: '复制',
    clear: '清除',
    yourName: '您的姓名',
    fromDate: '开始日期',
    toDate: '结束日期',
    altContact: '备用联系人姓名',
    altEmail: '备用联系人邮箱',
    extraNote: '附加备注（可选）',
    typeVacation: '🏖️ 休假',
    typeSick: '🤒 病假',
    typeConference: '🎤 会议/出差',
    typeMaternity: '👶 产假',
    typeTraining: '📚 培训',
    typePersonal: '🏠 个人事务',
    selectType: '选择原因',
    step1: '选择您的外出原因（休假、病假等）',
    step2: '填写姓名、日期和备用联系人信息',
    step3: '点击生成按钮创建专业的外出回复',
    step4: '复制消息并粘贴到邮件自动回复设置中',
  }
});

const { $, copyText, t } = GZ;
let selectedType = '';

const types = ['typeVacation','typeSick','typeConference','typeMaternity','typeTraining','typePersonal'];

$('#type-grid').innerHTML = types.map(k =>
  `<div class="gz-type-btn" data-type="${k}" onclick="selectType('${k}',this)">${t(k)}</div>`
).join('');

function selectType(type, el) {
  selectedType = type;
  document.querySelectorAll('.gz-type-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

$('#form').innerHTML = `
  <div>
    <label>${t('yourName')}</label>
    <input type="text" id="inp-name" placeholder="John Smith">
  </div>
  <div class="gz-row">
    <div><label>${t('fromDate')}</label><input type="date" id="inp-from"></div>
    <div><label>${t('toDate')}</label><input type="date" id="inp-to"></div>
  </div>
  <div class="gz-row">
    <div><label>${t('altContact')}</label><input type="text" id="inp-contact" placeholder="Jane Doe"></div>
    <div><label>${t('altEmail')}</label><input type="email" id="inp-email" placeholder="jane@company.com"></div>
  </div>
  <div>
    <label>${t('extraNote')}</label>
    <input type="text" id="inp-note" placeholder="">
  </div>
`;

const enTemplates = {
  typeVacation: (n,f,t,c,e,note) => {
    let msg = `Hello,\n\nThank you for your email. I am currently out of the office on vacation${f?` from ${f}`:''}${t?` through ${t}`:''} and will not be checking email during this time.\n\n`;
    if(c) msg += `For any urgent matters, please contact ${c}${e?` at ${e}`:''}.\n\n`;
    msg += `I will review your message upon my return${t?` on ${t}`:''}. If your request is time-sensitive, please reach out to the appropriate team lead.\n\n`;
    if(note) msg += `${note}\n\n`;
    msg += `Best regards,\n${n||'[Your Name]'}`;
    return msg;
  },
  typeSick: (n,f,t,c,e,note) => {
    let msg = `Hello,\n\nThank you for your message. I am currently out of the office due to illness${f?` starting ${f}`:''} and may not be able to respond promptly.\n\n`;
    if(c) msg += `For urgent matters, please reach out to ${c}${e?` (${e})`:''}.\n\n`;
    msg += `I will respond to your email as soon as I am able.\n\n`;
    if(note) msg += `${note}\n\n`;
    msg += `Thank you for your understanding.\n\nBest regards,\n${n||'[Your Name]'}`;
    return msg;
  },
  typeConference: (n,f,t,c,e,note) => {
    let msg = `Hello,\n\nThank you for reaching out. I am currently attending a conference${f?` from ${f}`:''}${t?` to ${t}`:''} and may have limited access to email.\n\n`;
    if(c) msg += `For time-sensitive matters, please contact ${c}${e?` at ${e}`:''}.\n\n`;
    msg += `I will get back to you as soon as possible after the event.\n\n`;
    if(note) msg += `${note}\n\n`;
    msg += `Best regards,\n${n||'[Your Name]'}`;
    return msg;
  },
  typeMaternity: (n,f,t,c,e,note) => {
    let msg = `Hello,\n\nThank you for your email. I am currently on maternity leave${f?` starting ${f}`:''} and will be away from the office for an extended period.\n\n`;
    if(c) msg += `During my absence, ${c}${e?` (${e})`:''} will be handling my responsibilities and can assist you.\n\n`;
    msg += `I appreciate your patience and will address your message upon my return.\n\n`;
    if(note) msg += `${note}\n\n`;
    msg += `Warm regards,\n${n||'[Your Name]'}`;
    return msg;
  },
  typeTraining: (n,f,t,c,e,note) => {
    let msg = `Hello,\n\nThank you for your email. I am currently attending a training program${f?` from ${f}`:''}${t?` through ${t}`:''} and will have limited availability.\n\n`;
    if(c) msg += `For urgent requests, please contact ${c}${e?` at ${e}`:''}.\n\n`;
    msg += `I will respond to your email as soon as possible after the training.\n\n`;
    if(note) msg += `${note}\n\n`;
    msg += `Best regards,\n${n||'[Your Name]'}`;
    return msg;
  },
  typePersonal: (n,f,t,c,e,note) => {
    let msg = `Hello,\n\nThank you for your message. I am currently away from the office${f?` from ${f}`:''}${t?` through ${t}`:''} for personal reasons.\n\n`;
    if(c) msg += `If you need immediate assistance, please contact ${c}${e?` at ${e}`:''}.\n\n`;
    msg += `I will respond to your email upon my return.\n\n`;
    if(note) msg += `${note}\n\n`;
    msg += `Best regards,\n${n||'[Your Name]'}`;
    return msg;
  },
};

function generateMessage() {
  if (!selectedType) return;
  const name = $('#inp-name').value;
  const from = formatDate($('#inp-from').value);
  const to = formatDate($('#inp-to').value);
  const contact = $('#inp-contact').value;
  const email = $('#inp-email').value;
  const note = $('#inp-note').value;
  const msg = enTemplates[selectedType](name, from, to, contact, email, note);
  $('#output').textContent = msg;
}

function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generateMessage()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#output').textContent=''">${t('clear')}</button>
`;

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📧', href:'/text/email-signature.html', name:'Email Signature'},
    {icon:'📝', href:'/text/email-template.html', name:'Email Template'},
    {icon:'📋', href:'/text/lorem-ipsum.html', name:'Lorem Ipsum'},
    {icon:'✍️', href:'/text/cover-letter-generator.html', name:'Cover Letter'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
