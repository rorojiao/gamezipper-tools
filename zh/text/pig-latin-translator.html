<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is Pig Latin?", "acceptedAnswer": {"@type": "Answer", "text": "Pig Latin is a playful language game (a constructed language) where English words are altered according to simple rules. It is not a real language but a fun code used by kids, in puzzles and in pop culture (e.g. the song Igpay Atinlay)."}}, {"@type": "Question", "name": "What are the rules of Pig Latin?", "acceptedAnswer": {"@type": "Answer", "text": "If a word begins with a consonant or consonant cluster (like 'sh', 'tr'), move all consonants before the first vowel to the end and add 'ay' (e.g. 'hello' → 'ellohay', 'string' → 'ingstray'). If a word begins with a vowel, just add 'way' or 'yay' to the end (e.g. 'apple' → 'appleway')."}}, {"@type": "Question", "name": "How do I translate Pig Latin back to English?", "acceptedAnswer": {"@type": "Answer", "text": "This translator can reverse Pig Latin automatically. For words ending in 'ay', it removes the suffix and moves the trailing consonant cluster back to the front. Switch the direction toggle to 'Pig Latin → English' to decode."}}, {"@type": "Question", "name": "Is Pig Latin a real language?", "acceptedAnswer": {"@type": "Answer", "text": "No. Pig Latin is a language game (ludling) based on English. It uses the same vocabulary and grammar as English — only the word forms are changed. Similar games exist in many languages, such as Verlan in French or Jerig indirect in Dutch."}}]}</script>

    toPig: '英语 → Pig Latin',
    toEng: 'Pig Latin → 英语',
    step1: '使用切换按钮选择翻译方向',
    step2: '在输入框中输入或粘贴文本',
    step3: '右侧即时显示 Pig Latin 翻译结果',
    step4: '复制结果分享给朋友或用于游戏',
    words: '词',
    chars: '字符',

const { $, copyText, t } = GZ;
let direction = 'toPig';

function toPigLatinWord(word) {
  if (!word || !/[a-zA-Z]/.test(word)) return word;
  const m = word.match(/^([^a-zA-Z]*)([a-zA-Z]+)([^a-zA-Z]*)$/);
  if (!m) return word;
  const [, prefix, core, suffix] = m;
  const isCap = core[0] === core[0].toUpperCase() && core[0] !== core[0].toLowerCase();
  const lower = core.toLowerCase();
  const vowelMatch = lower.match(/[aeiou]/);
  if (!vowelMatch) {
    return prefix + core + 'ay' + suffix;
  }
  const firstVowelIdx = lower.indexOf(vowelMatch[0]);
  if (firstVowelIdx === 0) {
    return prefix + core + 'way' + suffix;
  }
  const leading = lower.substring(0, firstVowelIdx);
  const rest = lower.substring(firstVowelIdx);
  let result = rest + leading + 'ay';
  if (isCap) result = result.charAt(0).toUpperCase() + result.slice(1);
  return prefix + result + suffix;
}

function fromPigLatinWord(word) {
  if (!word || !/[a-zA-Z]/.test(word)) return word;
  const m = word.match(/^([^a-zA-Z]*)([a-zA-Z]+)([^a-zA-Z]*)$/);
  if (!m) return word;
  const [, prefix, core, suffix] = m;
  const isCap = core[0] === core[0].toUpperCase() && core[0] !== core[0].toLowerCase();
  const lower = core.toLowerCase();
  if (lower.endsWith('way') && lower.length > 3) {
    let r = lower.slice(0, -3);
    if (isCap) r = r.charAt(0).toUpperCase() + r.slice(1);
    return prefix + r + suffix;
  }
  if (lower.endsWith('ay') && lower.length > 2) {
    let stem = lower.slice(0, -2);
    const lastVowelIdx = Array.from(stem).reduce((acc, ch, i) => /[aeiou]/.test(ch) ? i : acc, -1);
    if (lastVowelIdx >= 0 && lastVowelIdx < stem.length - 1) {
      const moved = stem.substring(lastVowelIdx + 1);
      const rest = stem.substring(0, lastVowelIdx + 1);
      let r = moved + rest;
      if (isCap) r = r.charAt(0).toUpperCase() + r.slice(1);
      return prefix + r + suffix;
    }
    let r = stem;
    if (isCap) r = r.charAt(0).toUpperCase() + r.slice(1);
    return prefix + r + suffix;
  }
  return word;
}

function translate() {
  const text = $('#input').value;
  const fn = direction === 'toPig' ? toPigLatinWord : fromPigLatinWord;
  const result = text.split(/\s+/).map(fn).join(' ');
  $('#output').textContent = result;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  $('#stats').innerHTML = `<span>${words} ${t('words')}</span><span>${text.length} ${t('chars')}</span>`;
}

function setDir(d) {
  direction = d;
  renderDirToggle();
  translate();
}

function renderDirToggle() {
  $('#dir-toggle').innerHTML = `
    <button class="dir-btn ${direction==='toPig'?'active':''}" onclick="setDir('toPig')">${t('toPig')}</button>
    <button class="dir-btn ${direction==='toEng'?'active':''}" onclick="setDir('toEng')">${t('toEng')}</button>`;
}

function loadExample() {
  $('#input').value = "Hello world! Pig Latin is a fun secret language for kids and puzzles.";
  translate();
}

$('#input').value = "Hello world! Pig Latin is fun.";
$('#input').addEventListener('input', translate);
renderDirToggle();
$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>

});
