<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Compound Interest Calculator","description":"Free online compound interest calculator. See how investments grow over time with regular contributions. Adjust principal, rate, term, compounding frequency and contributions.","url": "https://tools.gamezipper.com/zh/calc/compound-interest-calculator.html","applicationCategory":"FinanceApplication","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is compound interest?", "acceptedAnswer": {"@type": "Answer", "text": "Compound interest is interest calculated on the initial principal plus all accumulated interest from previous periods. It lets your money grow faster than simple interest."}}, {"@type": "Question", "name": "What is the compound interest formula?", "acceptedAnswer": {"@type": "Answer", "text": "A = P * (1 + r/n)^(nt), where A is the final amount, P is principal, r is the annual rate (decimal), n is compounding periods per year, and t is years."}}, {"@type": "Question", "name": "How do regular contributions affect growth?", "acceptedAnswer": {"@type": "Answer", "text": "Regular contributions dramatically increase final value because each contribution also compounds. Even small monthly additions can add tens of thousands over decades."}}, {"@type": "Question", "name": "What compounding frequency should I use?", "acceptedAnswer": {"@type": "Answer", "text": "Most savings accounts compound daily or monthly. Investments like index funds typically use annual compounding for projections. Match the frequency to your actual product."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Compound Interest Calculator',
    toolDesc: 'Calculate compound interest growth with regular contributions. See final value, total interest, and a year-by-year growth chart.',
    principal: 'Initial Investment',
    rate: 'Annual Interest Rate (%)',
    years: 'Years',
    freq: 'Compounding Frequency',
    contrib: 'Regular Contribution',
    contribFreq: 'Contribution Frequency',
    annual: 'Annually',
    semi: 'Semi-annually',
    quarter: 'Quarterly',
    month: 'Monthly',
    daily: 'Daily',
    calculate: 'Calculate',
    finalValue: 'Final Value',
    totalInvested: 'Total Invested',
    totalInterest: 'Total Interest Earned',
    multiplier: 'Growth Multiple',
    annualizedYield: 'Annualized Yield',
    step1: 'Enter your initial investment amount',
    step2: 'Set the expected annual return rate',
    step3: 'Choose the time horizon and compounding frequency',
    step4: 'Add regular contributions and view growth chart',
  },
  zh: {
    toolTitle: '复利计算器',
    toolDesc: '计算复利增长及定期投入。查看最终金额、总利息和逐年增长曲线。',
    principal: '初始投资金额',
    rate: '年化利率 (%)',
    years: '投资年限',
    freq: '复利频率',
    contrib: '定期投入金额',
    contribFreq: '投入频率',
    annual: '每年',
    semi: '每半年',
    quarter: '每季度',
    month: '每月',
    daily: '每日',
    calculate: '计算',
    finalValue: '最终金额',
    totalInvested: '总投入',
    totalInterest: '总利息',
    multiplier: '增长倍数',
    annualizedYield: '年化收益率',
    step1: '输入初始投资金额',
    step2: '设置预期年化收益率',
    step3: '选择投资年限和复利频率',
    step4: '添加定期投入并查看增长曲线',
  }
});

const { $, t } = GZ;

$('#lbl-principal').textContent = t('principal');
$('#lbl-rate').textContent = t('rate');
$('#lbl-years').textContent = t('years');
$('#lbl-freq').textContent = t('freq');
$('#lbl-contrib').textContent = t('contrib');
$('#lbl-contrib-freq').textContent = t('contribFreq');
$('#btn-calc').textContent = t('calculate');
$('#opt-annual').textContent = t('annual');
$('#opt-semi').textContent = t('semi');
$('#opt-quarter').textContent = t('quarter');
$('#opt-month').textContent = t('month');
$('#opt-daily').textContent = t('daily');
$('#opt-c-month').textContent = t('month');
$('#opt-c-quarter').textContent = t('quarter');
$('#opt-c-year').textContent = t('annual');

function fmt(n) {
  return n.toLocaleString(GZ.lang === 'zh' ? 'zh-CN' : 'en-US', { maximumFractionDigits: 0 });
}

function calculate() {
  var P = parseFloat($('#principal').value) || 0;
  var r = (parseFloat($('#rate').value) || 0) / 100;
  var years = parseInt($('#years').value) || 1;
  var n = parseInt($('#freq').value) || 12;
  var c = parseFloat($('#contrib').value) || 0;
  var cFreq = parseInt($('#contribFreq').value) || 12;

  if (P < 0 || years < 1) { $('#status').innerHTML = '<span style="color:var(--accent)">' + (GZ.lang === 'zh' ? '请输入有效参数' : 'Please enter valid inputs') + '</span>'; return; }

  var balance = P;
  var totalInvested = P;
  var yearlyData = [{ year: 0, value: P, invested: P }];
  var monthlyRate = r / n;
  var contribPerPeriod = c;
  var periodsPerYear = n;
  var contribPeriodsPerYear = cFreq;
  // Normalize: simulate period by period using compounding frequency
  var totalPeriods = years * n;
  var contribEveryNPeriods = n / cFreq; // how many compounding periods between contributions

  for (var period = 1; period <= totalPeriods; period++) {
    balance *= (1 + monthlyRate);
    if (contribPerPeriod > 0 && period % Math.round(contribEveryNPeriods) === 0) {
      balance += contribPerPeriod;
      totalInvested += contribPerPeriod;
    }
    if (period % n === 0) {
      yearlyData.push({ year: period / n, value: balance, invested: totalInvested });
    }
  }

  var totalInterest = balance - totalInvested;
  var multiplier = P > 0 ? (balance / P) : 0;
  var annYield = years > 0 ? (Math.pow(balance / Math.max(P, 0.01), 1 / years) - 1) * 100 : 0;
  if (!isFinite(annYield)) annYield = 0;

  $('#result-final').textContent = fmt(balance);
  $('#result-final-label').textContent = t('finalValue');
  $('#result-invested').textContent = fmt(totalInvested);
  $('#result-invested-label').textContent = t('totalInvested');
  $('#result-interest').textContent = fmt(totalInterest);
  $('#result-interest-label').textContent = t('totalInterest');
  $('#result-mult').textContent = multiplier.toFixed(2) + 'x';
  $('#result-mult-label').textContent = t('multiplier');
  $('#result-yield').textContent = annYield.toFixed(2) + '%';
  $('#result-yield-label').textContent = t('annualizedYield');

  $('#result').style.display = 'block';
  $('#status').innerHTML = '';

  drawChart(yearlyData);
}

function drawChart(data) {
  var canvas = $('#chart');
  var dpr = window.devicePixelRatio || 1;
  var W = canvas.clientWidth, H = 240;
  canvas.width = W * dpr; canvas.height = H * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  var padL = 50, padR = 12, padT = 12, padB = 28;
  var cw = W - padL - padR, ch = H - padT - padB;

  var maxVal = Math.max.apply(null, data.map(function(d){return d.value;}));
  if (maxVal <= 0) maxVal = 1;
  var maxYrs = data[data.length-1].year;

  // Grid lines
  ctx.strokeStyle = 'rgba(128,128,128,0.15)';
  ctx.fillStyle = 'var(--text2)';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'right';
  for (var g = 0; g <= 4; g++) {
    var y = padT + (ch * g / 4);
    ctx.beginPath();
    ctx.moveTo(padL, y); ctx.lineTo(W - padR, y);
    ctx.stroke();
    var v = maxVal * (1 - g/4);
    ctx.fillText(fmtShort(v), padL - 6, y + 3);
  }

  // Invested area (background)
  ctx.fillStyle = 'rgba(0,198,251,0.18)';
  ctx.beginPath();
  ctx.moveTo(padL, padT + ch);
  data.forEach(function(d) {
    var x = padL + (d.year / maxYrs) * cw;
    var y = padT + ch - (d.invested / maxVal) * ch;
    ctx.lineTo(x, y);
  });
  ctx.lineTo(padL + cw, padT + ch);
  ctx.closePath();
  ctx.fill();

  // Value line + area
  ctx.strokeStyle = '#00c6fb';
  ctx.fillStyle = 'rgba(0,198,251,0.08)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  data.forEach(function(d, i) {
    var x = padL + (d.year / maxYrs) * cw;
    var y = padT + ch - (d.value / maxVal) * ch;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // X axis labels
  ctx.fillStyle = 'rgba(128,128,128,0.7)';
  ctx.textAlign = 'center';
  var xSteps = Math.min(5, maxYrs);
  for (var xi = 0; xi <= xSteps; xi++) {
    var yr = Math.round(maxYrs * xi / xSteps);
    var x = padL + (yr / maxYrs) * cw;
    ctx.fillText(yr + 'y', x, H - 8);
  }
}

function fmtShort(v) {
  if (v >= 1e6) return (v/1e6).toFixed(1) + 'M';
  if (v >= 1e3) return (v/1e3).toFixed(0) + 'K';
  return Math.round(v).toString();
}

['principal','rate','years','freq','contrib','contribFreq'].forEach(function(id) {
  $('#' + id).addEventListener('input', calculate);
  $('#' + id).addEventListener('change', calculate);
});

calculate();
window.addEventListener('resize', calculate);

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏠', href:'/calc/mortgage-calculator.html', name:'Mortgage Calculator'},
    {icon:'⛽', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost'},
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'🎂', href:'/calc/age-calculator.html', name:'Age Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
