  </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Letter Frequency Analyzer',
    toolDesc: 'Analyze the frequency of each letter in your text. See counts, percentages, and bar charts — compare against standard English letter frequencies for cipher analysis and linguistics.',
    totalLetters: 'Total Letters', uniqueLetters: 'Unique', mostCommon: 'Most Common', entropy: 'Entropy',
    sortByAlpha: 'Alphabetical', sortByFreq: 'By Frequency', caseSensitive: 'Case-sensitive', showEnglish: 'Show English avg',
    clear: 'Clear', example: 'Example',
    step1: 'Paste or type text into the input area',
    step2: 'View letter counts, percentages, and a visual bar chart',
    step3: 'Toggle sorting by frequency or alphabetical order',
    step4: 'Compare your text\'s distribution to standard English averages',
    noText: 'Enter some text to see letter frequency analysis.',
  },
  zh: {
    toolTitle: '字母频率分析器',
    toolDesc: '分析文本中每个字母的出现频率。查看计数、百分比和柱状图 — 与标准英语字母频率对比，适合密码分析和语言学研究。',
    totalLetters: '字母总数', uniqueLetters: '不重复', mostCommon: '最常见', entropy: '熵值',
    sortByAlpha: '按字母排序', sortByFreq: '按频率排序', caseSensitive: '区分大小写', showEnglish: '显示英语平均',
    clear: '清空', example: '示例',
    step1: '在输入区粘贴或输入文本',
    step2: '查看字母计数、百分比和可视化柱状图',
    step3: '切换按频率或字母顺序排序',
    step4: '将文本的分布与标准英语平均值对比',
    noText: '请输入一些文本以查看字母频率分析。',
  }
});
const { $, t } = GZ;

// Standard English letter frequencies (%)
const englishFreq = {A:8.2,B:1.5,C:2.8,D:4.3,E:12.7,F:2.2,G:2.0,H:6.1,I:7.0,J:0.15,K:0.77,L:4.0,M:2.4,N:6.7,O:7.5,P:1.9,Q:0.095,R:6.0,S:6.3,T:9.1,U:2.8,V:0.98,W:2.4,X:0.15,Y:2.0,Z:0.074};

function analyze() {
  const text = $('#input').value;
  const caseSensitive = $('#case-sensitive').checked;
  const showEnglish = $('#show-english').checked;
  if (!text.trim()) { $('#stats').innerHTML = `<p style="color:var(--text2)">${t('noText')}</p>`; $('#chart').innerHTML = ''; return; }

  const freq = {};
  let total = 0;
  const chars = caseSensitive ? text : text.toUpperCase();
  for (const ch of chars) {
    if (caseSensitive) {
      if (/[a-zA-Z]/.test(ch)) { freq[ch] = (freq[ch] || 0) + 1; total++; }
    } else {
      if (/[A-Z]/.test(ch)) { freq[ch] = (freq[ch] || 0) + 1; total++; }
    }
  }

  if (total === 0) { $('#stats').innerHTML = `<p style="color:var(--text2)">${t('noText')}</p>`; $('#chart').innerHTML = ''; return; }

  let entries = Object.entries(freq);
  const sortByFreq = document.querySelector('input[name="sort"][value="freq"]').checked;
  if (sortByFreq) entries.sort((a, b) => b[1] - a[1]);
  else entries.sort((a, b) => a[0].localeCompare(b[0]));

  const maxCount = entries[0][1];
  const maxBarPct = showEnglish && !sortByFreq ? 12.7 : (maxCount / total * 100);
  const unique = entries.length;
  const mostCommon = entries[0][0];
  // Shannon entropy
  let entropy = 0;
  entries.forEach(([, c]) => { const p = c / total; entropy -= p * Math.log2(p); });

  $('#stats').innerHTML = `
    <div class="lf-stats">
      <div class="lf-stat"><div class="num">${total.toLocaleString()}</div><div class="lbl">${t('totalLetters')}</div></div>
      <div class="lf-stat"><div class="num">${unique}</div><div class="lbl">${t('uniqueLetters')}</div></div>
      <div class="lf-stat"><div class="num">${mostCommon}</div><div class="lbl">${t('mostCommon')}</div></div>
      <div class="lf-stat"><div class="num">${entropy.toFixed(2)}</div><div class="lbl">${t('entropy')}</div></div>
    </div>`;

  let html = '';
  entries.forEach(([letter, count]) => {
    const pct = (count / total * 100);
    const engPct = englishFreq[letter] || 0;
    const barW = showEnglish && !sortByFreq ? Math.max(engPct, pct) / Math.max(maxBarPct, 1) * 100 : pct / Math.max(maxBarPct, 1) * 100;
    let engInfo = showEnglish ? `<span class="lf-pct">EN: ${engPct.toFixed(1)}%</span>` : `<span class="lf-pct">${pct.toFixed(1)}%</span>`;
    html += `<div class="lf-row">
      <span class="lf-letter">${letter}</span>
      <div class="lf-bar-bg"><div class="lf-bar" style="width:${Math.min(barW,100)}%"></div></div>
      <span class="lf-count">${count}</span>
      ${engInfo}
    </div>`;
  });
  $('#chart').innerHTML = html;
}

function loadExample() {
  $('#input').value = "The quick brown fox jumps over the lazy dog. Pack my box with five dozen liquor jugs. How vexingly quick daft zebras jump! Sphinx of black quartz, judge my vow.";
  analyze();
}

$('#input').addEventListener('input', analyze);
document.querySelectorAll('input[name="sort"]').forEach(r => r.addEventListener('change', analyze));
$('#case-sensitive').addEventListener('change', analyze);
$('#show-english').addEventListener('change', analyze);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value=\'\';analyze()">${t('clear')}</button>`;

$('#lbl-alpha').textContent = t('sortByAlpha');
$('#lbl-freq').textContent = t('sortByFreq');
$('#lbl-case').textContent = t('caseSensitive');
$('#lbl-eng').textContent = t('showEnglish');

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/text/character-frequency.html', name:'Char Frequency'},
    {icon:'🔢', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'🔐', href:'/dev/caesar-cipher.html', name:'Caesar Cipher'},
    {icon:'😀', href:'/text/emoji-counter.html', name:'Emoji Counter'},
  ]
});
</script>
