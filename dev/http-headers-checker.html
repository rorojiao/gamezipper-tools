<script>
GZI18n.register({
  en: {
    toolTitle: 'HTTP Headers Checker',
    toolDesc: 'Inspect HTTP response headers for any URL. Analyze security headers, caching, server config and SEO-related headers.',
    check: 'Check Headers',
    headerName: 'Header',
    headerValue: 'Value',
    present: 'Present',
    missing: 'Missing',
    securityScore: 'Security Score',
    step1: 'Enter a URL in the input field (e.g. https://example.com)',
    step2: 'Click the Check Headers button',
    step3: 'Review the response headers table with all key-value pairs',
    step4: 'Check the security analysis for recommendations',
  },
  zh: {
    toolTitle: 'HTTP 响应头检查器',
    toolDesc: '检查任意 URL 的 HTTP 响应头。分析安全头、缓存策略、服务器配置和 SEO 相关头部信息。',
    check: '检查响应头',
    headerName: '头部名称',
    headerValue: '头部值',
    present: '已设置',
    missing: '未设置',
    securityScore: '安全评分',
    step1: '在输入框中输入 URL（例如 https://example.com）',
    step2: '点击「检查响应头」按钮',
    step3: '查看响应头表格中的所有键值对',
    step4: '查看安全分析以获取建议',
  }
});

const { $, t } = GZ;

const SECURITY_HEADERS = [
  'content-security-policy','strict-transport-security','x-content-type-options',
  'x-frame-options','referrer-policy','permissions-policy','x-xss-protection'
];

async function doCheck() {
  let url = $('#url-input').value.trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  $('#url-input').value = url;
  $('#result').style.display = 'none';
  $('#error-msg').style.display = 'none';
  $('#score-bar').style.display = 'none';
  $('#check-btn').disabled = true;
  $('#check-btn').textContent = '...';

  try {
    // Use a CORS proxy approach - fetch via allorigins
    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
    const resp = await fetch(proxyUrl, { method: 'HEAD' });
    // Since CORS proxy may not return real headers, we use a different approach
    // We'll parse what we can and note limitations
    const body = $('#headers-body');
    body.innerHTML = '';

    // Try direct fetch for same-origin or CORS-enabled sites
    let headers = {};
    let directOk = false;
    try {
      const directResp = await fetch(url, { method: 'HEAD', mode: 'cors' });
      directResp.headers.forEach((v, k) => { headers[k] = v; });
      headers[':status'] = directResp.status + ' ' + directResp.statusText;
      directOk = true;
    } catch(e) {
      // Use allorigins get approach
      try {
        const getResp = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
        const data = await getResp.json();
        if (data && data.status) {
          headers = { 'content-type': data.status.content_type || 'unknown', 'content-length': data.status.content_length || 'unknown', 'http-code': data.status.http_code || 'unknown', 'url': data.status.url || url, 'response-time': data.status.response_time ? (data.status.response_time + ' ms') : 'unknown' };
        }
      } catch(e2) {}
    }

    if (Object.keys(headers).length === 0) {
      $('#error-msg').style.display = 'block';
      $('#error-msg').textContent = 'Could not fetch headers. The site may block CORS requests. Try a different URL.';
      $('#check-btn').disabled = false;
      $('#check-btn').textContent = t('check');
      return;
    }

    // Security analysis
    let secPresent = 0;
    const secTotal = SECURITY_HEADERS.length;
    SECURITY_HEADERS.forEach(h => { if (headers[h.toLowerCase()]) secPresent++; });
    const secPct = Math.round((secPresent / secTotal) * 100);

    $('#score-bar').style.display = 'flex';
    $('#score-bar').innerHTML = `
      <div class="gz-score-item ${secPct >= 70 ? 'gz-score-good' : secPct >= 40 ? 'gz-score-warn' : 'gz-score-bad'}">${t('securityScore')}: ${secPct}%</div>
      <div class="gz-score-item gz-score-good">${secPresent} ${t('present')}</div>
      <div class="gz-score-item gz-score-bad">${secTotal - secPresent} ${t('missing')}</div>`;

    // Render headers
    const sortedKeys = Object.keys(headers).sort((a, b) => {
      const aSec = SECURITY_HEADERS.includes(a.toLowerCase());
      const bSec = SECURITY_HEADERS.includes(b.toLowerCase());
      if (aSec && !bSec) return -1;
      if (!aSec && bSec) return 1;
      return a.localeCompare(b);
    });

    sortedKeys.forEach(k => {
      const isSec = SECURITY_HEADERS.includes(k.toLowerCase());
      const tr = document.createElement('tr');
      if (isSec) tr.className = 'security';
      tr.innerHTML = `<td>${k}</td><td style="word-break:break-all">${headers[k]}</td>`;
      body.appendChild(tr);
    });

    // Add missing security headers
    SECURITY_HEADERS.forEach(h => {
      if (!headers[h.toLowerCase()]) {
        const tr = document.createElement('tr');
        tr.className = 'warning';
        tr.innerHTML = `<td>${h}</td><td style="opacity:.6">⚠ ${t('missing')}</td>`;
        body.appendChild(tr);
      }
    });

    $('#result').style.display = 'block';
  } catch(e) {
    $('#error-msg').style.display = 'block';
    $('#error-msg').textContent = 'Error: ' + e.message;
  }
  $('#check-btn').disabled = false;
  $('#check-btn').textContent = t('check');
}

$('#url-input').addEventListener('keydown', e => { if (e.key === 'Enter') doCheck(); });
$('#check-btn').textContent = t('check');
$('#th-name').textContent = t('headerName');
$('#th-value').textContent = t('headerValue');

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔒', href:'/dev/ssl-checker.html', name:'SSL Checker'},
    {icon:'🔍', href:'/dev/dns-lookup.html', name:'DNS Lookup'},
    {icon:'📊', href:'/dev/http-status.html', name:'HTTP Status'},
    {icon:'🖥️', href:'/dev/browser-info.html', name:'Browser Info'},
  ]
});
</script>
