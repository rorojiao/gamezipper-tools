const { $, copyText, t } = GZ;
const DART_KEYWORDS = new Set(['abstract','as','assert','async','await','break','case','catch','class','const','continue','default','deferred','do','dynamic','else','enum','export','extends','extension','external','factory','false','final','finally','for','Function','get','hide','if','implements','import','in','interface','is','late','library','mixin','new','null','on','operator','part','rethrow','return','set','show','static','super','switch','sync','this','throw','true','try','typedef','var','void','while','with','yield','covariant','required','dynamic','num','int','double','String','bool','List','Map','Set']);

function escapeId(s) {
  if (DART_KEYWORDS.has(s)) return s + '_';
  if (!/^[a-zA-Z_$][a-zA-Z0-9_$]*$/.test(s)) return s.replace(/[^a-zA-Z0-9_$]/g,'_') + '_';
  return s;
}
function toCamelCase(s) {
  if (/^[a-z][a-zA-Z0-9]*$/.test(s)) return s;
  const parts = s.split(/[^a-zA-Z0-9]+/).filter(Boolean);
  if (!parts.length) return 'key';
  return parts[0].toLowerCase() + parts.slice(1).map(p => p.charAt(0).toUpperCase()+p.slice(1)).join('');
}
function upperFirst(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function inferType(value, allowNullable) {
  if (value === null || value === undefined) return allowNullable ? 'dynamic' : 'dynamic';
  switch (typeof value) {
    case 'string': return 'String';
    case 'boolean': return 'bool';
    case 'number':
      return Number.isInteger(value) ? 'int' : 'double';
  }
  if (Array.isArray(value)) {
    if (!value.length) return 'List<dynamic>';
    const types = new Set(value.filter(v => v !== null).map(v => {
      if (typeof v === 'object' && !Array.isArray(v)) return v.__className || 'dynamic';
      return inferType(v, false);
    }));
    if (types.size === 1) return 'List<' + [...types][0] + '>';
    const first = value.find(v => v !== null);
    if (first !== undefined && typeof first === 'object' && !Array.isArray(first)) {
      return 'List<' + (first.__className || 'dynamic') + '>';
    }
    return 'List<' + inferType(first || '', false) + '>';
  }
  if (typeof value === 'object') return value.__className || 'dynamic';
  return 'dynamic';
}

function generateClass(name, obj, classes, allowNullable, immutable) {
  const className = upperFirst(escapeId(name).replace(/_$/,''));
  obj.__className = className;
  const keys = Object.keys(obj).filter(k => k !== '__className');
  const fields = [];
  for (const key of keys) {
    const v = obj[key];
    let typeStr;
    if (v !== null && typeof v === 'object' && !Array.isArray(v)) {
      const nestedName = upperFirst(toCamelCase(key));
      generateClass(nestedName, v, classes, allowNullable, immutable);
      typeStr = nestedName;
    } else if (Array.isArray(v) && v.length > 0) {
      const nested = v.find(x => x !== null && typeof x === 'object' && !Array.isArray(x));
      if (nested) {
        const nestedName = upperFirst(toCamelCase(key));
        generateClass(nestedName, nested, classes, allowNullable, immutable);
        typeStr = 'List<' + nestedName + '>';
      } else {
        typeStr = inferType(v, allowNullable);
      }
    } else {
      typeStr = inferType(v, allowNullable);
    }
    const isNull = v === null || v === undefined;
    const finalKw = immutable ? 'final ' : '';
    if (allowNullable && isNull && !typeStr.endsWith('?')) typeStr += '?';
    fields.push({ name: escapeId(toCamelCase(key)), jsonKey: key, type: typeStr, finalKw });
  }

  let code = `class ${className} {\n`;
  for (const f of fields) code += `  ${f.finalKw}${f.type} ${f.name};\n`;
  // constructor
  const paramList = fields.map(f => `this.${f.name}`).join(', ');
  const hasRequired = fields.some(f => !f.type.endsWith('?'));
  code += `\n  ${className}({${fields.map(f => f.type.endsWith('?') ? 'this.' + f.name : 'required this.' + f.name).join(', ')}});\n`;
  // fromJson
  code += `\n  factory ${className}.fromJson(Map<String, dynamic> json) {\n    return ${className}(\n`;
  for (const f of fields) {
    const helper = fromJsonHelper(f.type, 'json["' + f.jsonKey + '"]');
    code += `      ${f.name}: ${helper},\n`;
  }
  code += `    );\n  }\n`;
  // toJson
  code += `\n  Map<String, dynamic> toJson() {\n    return {\n`;
  for (const f of fields) {
    code += `      "${f.jsonKey}": ${toJsonHelper(f.type, f.name)},\n`;
  }
  code += `    };\n  }\n`;
  code += `}\n`;
  classes.push(code);
}

function fromJsonHelper(type, expr) {
  if (type.startsWith('List<')) {
    const inner = type.slice(5, -1);
    if (['String','int','double','bool','num','dynamic'].includes(inner)) {
      if (inner === 'int') return `(json["x"] as List?)?.map((e) => (e as num).toInt()).toList()`.replace(/json\["x"\]/g, expr);
      if (inner === 'double') return `(json["x"] as List?)?.map((e) => (e as num).toDouble()).toList()`.replace(/json\["x"\]/g, expr);
      return `(json["x"] as List?)?.map((e) => e as ${inner}).toList()`.replace(/json\["x"\]/g, expr);
    }
    return `(json["x"] as List?)?.map((e) => ${inner}.fromJson(e as Map<String, dynamic>)).toList()`.replace(/json\["x"\]/g, expr);
  }
  if (type === 'int' || type === 'int?') return `(json["x"] as num?)?.toInt()`.replace(/json\["x"\]/g, expr);
  if (type === 'double' || type === 'double?') return `(json["x"] as num?)?.toDouble()`.replace(/json\["x"\]/g, expr);
  if (type === 'String' || type === 'String?') return `json["x"] as ${type}`.replace(/json\["x"\]/g, expr);
  if (type === 'bool' || type === 'bool?') return `json["x"] as ${type}`.replace(/json\["x"\]/g, expr);
  if (type === 'dynamic' || type === 'dynamic?' || type === 'num' || type === 'num?') return `json["x"]`.replace(/json\["x"\]/g, expr);
  // nested class
  const baseType = type.replace(/\?$/,'');
  if (type.endsWith('?')) return `json["x"] != null ? ${baseType}.fromJson(json["x"] as Map<String, dynamic>) : null`.replace(/json\["x"\]/g, expr);
  return `${type}.fromJson(json["x"] as Map<String, dynamic>)`.replace(/json\["x"\]/g, expr);
}

function toJsonHelper(type, name) {
  if (type.startsWith('List<')) {
    const inner = type.slice(5, -1);
    if (['String','int','double','bool','num','dynamic'].includes(inner)) return `${name}`;
    return `${name}?.map((e) => e.toJson()).toList()`;
  }
  if (['int','int?','double','double?','bool','bool?','num','num?','dynamic','dynamic?'].includes(type)) return name;
  if (type === 'String' || type === 'String?') return name;
  if (type.endsWith('?')) return `${name}?.toJson()`;
  return `${name}.toJson()`;
}

function convert() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent=''; $('#status').innerHTML=''; return; }
  let data;
  try { data = JSON.parse(inp); }
  catch(e) {
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidJson')}${escapeHtml(e.message)}</span>`;
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidJson')}${escapeHtml(e.message)}</span>`;
    return;
  }
  const allowNullable = $('#nullable').checked;
  const immutable = $('#immutable').checked;
  const rootName = $('#className').value.trim() || 'Root';
  const classes = [];
  if (Array.isArray(data)) {
    if (data.length > 0 && typeof data[0] === 'object' && data[0] !== null && !Array.isArray(data[0])) {
      generateClass(rootName, data[0], classes, allowNullable, immutable);
    } else {
      classes.push(`// Root type: List<${inferType(data[0] || '', allowNullable)}>`);
    }
  } else if (typeof data === 'object' && data !== null) {
    generateClass(rootName, data, classes, allowNullable, immutable);
  } else {
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">JSON root must be an object or array.</span>`;
    return;
  }
  const plainCode = `// Generated by tools.gamezipper.com\n` + classes.join('\n\n');
  highlightAndShow(plainCode);
  $('#output').dataset.plain = plainCode;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('validJson')}</span>`;
}

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function highlightAndShow(code) {
  let h = escapeHtml(code);
  h = h
    .replace(/\/\/[^\n]*/g, m => `<span class="cm">${m}</span>`)
    .replace(/\b(class|factory|extends|implements|with|return|this|super|new|const|final|var|void|if|else|for|in|while|switch|case|default|break|continue|throw|try|catch|finally|async|await|sync|yield|required|late|static|get|set|import|export|library|part|typedef|enum)\b/g, '<span class="kw">$1</span>')
    .replace(/\b(String|int|double|num|bool|dynamic|List|Map|Set|Future|Stream|Object|Null)\b/g, '<span class="tp">$1</span>')
    .replace(/(&quot;[^&]*?&quot;)/g, m => `<span class="st">${m}</span>`)
    .replace(/\b\d+(\.\d+)?\b/g, m => `<span class="nm">${m}</span>`);
  $('#output').innerHTML = h;
}

    ]

  $('#className').value = 'User';
  convert();
}
