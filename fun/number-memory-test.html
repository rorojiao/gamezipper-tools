<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Number Memory Test',
    toolDesc: 'How many digits can you remember? A number flashes on screen — memorize it, then type it back. Each correct round adds one more digit. Average is 7.',
    start: 'Click to start', memorize: 'Memorize!', inputPrompt: 'Type the number',
    submit: 'Submit', correct: '✓ Correct! Next round...', wrong: '✗ Wrong! The number was',
    level: 'Level', digits: 'Digits', best: 'Best', restart: 'Restart',
    tip: 'Memorize the number, then type it back. Each correct answer adds a digit.',
    step1: 'Click the stage to begin. A number appears for a few seconds',
    step2: 'Memorize the number while it is visible',
    step3: 'Type the number exactly when prompted and submit',
    step4: 'Each correct answer adds a digit. Game ends on first mistake',
  },
  zh: {
    toolTitle: '数字记忆测试',
    toolDesc: '你能记住多少位数字？屏幕上闪现一个数字 — 记住它，然后输入出来。每答对一轮增加一位数字。平均水平为 7 位。',
    start: '点击开始', memorize: '记住它！', inputPrompt: '输入数字',
    submit: '提交', correct: '✓ 正确！下一轮...', wrong: '✗ 错误！数字是',
    level: '关卡', digits: '位数', best: '最佳', restart: '重新开始',
    tip: '记住数字，然后输入出来。每答对一次增加一位数字。',
    step1: '点击区域开始。屏幕上会显示几秒一个数字',
    step2: '在数字可见时尽量记住',
    step3: '出现输入框时准确输入数字并提交',
    step4: '每答对一次增加一位。第一次错误即结束',
  }
});

const { $, t } = GZ;
let level = 1;
let best = 0;
let currentNumber = '';
let phase = 'idle'; // idle | showing | input | result

function genNumber(len) {
  let s = '';
  for (let i = 0; i < len; i++) s += Math.floor(Math.random() * 10);
  return s;
}

function showLevel() {
  phase = 'showing';
  currentNumber = genNumber(level);
  const stage = $('#stage');
  stage.className = 'stage show';
  const showTime = Math.max(1500, level * 1000);
  let remaining = Math.ceil(showTime / 1000);
  stage.innerHTML = `<span class="lvl-badge">${t('level')} ${level} — ${level} ${t('digits')}</span><div class="num-display" style="margin-top:16px">${currentNumber}</div><div class="countdown">${remaining}s</div>`;
  const cd = setInterval(() => {
    remaining--;
    const el = stage.querySelector('.countdown');
    if (el) el.textContent = remaining + 's';
    if (remaining <= 0) { clearInterval(cd); showInput(); }
  }, 1000);
}

function showInput() {
  phase = 'input';
  const stage = $('#stage');
  stage.className = 'stage';
  stage.innerHTML = `
    <span class="lvl-badge">${t('level')} ${level}</span>
    <div style="font-size:1.3em;margin:16px 0;color:var(--text)">${t('inputPrompt')}</div>
    <div class="input-row">
      <input type="text" class="num-input" id="numInput" inputmode="numeric" autocomplete="off" />
      <button class="gz-btn" onclick="submitAnswer()" style="font-size:1.1em;padding:10px 20px">${t('submit')}</button>
    </div>`;
  const inp = $('#numInput');
  inp.focus();
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') submitAnswer(); });
}

function submitAnswer() {
  if (phase !== 'input') return;
  const val = $('#numInput').value.trim();
  phase = 'result';
  const stage = $('#stage');
  if (val === currentNumber) {
    stage.className = 'stage correct';
    stage.innerHTML = `<div style="font-size:2em;color:var(--gz-success,#00d672)">${t('correct')}</div>`;
    level++;
    if (level - 1 > best) best = level - 1;
    renderStats();
    setTimeout(showLevel, 1200);
  } else {
    stage.className = 'stage wrong';
    stage.innerHTML = `<div style="font-size:1.8em;color:#e94560">${t('wrong')}</div><div class="num-display" style="margin-top:12px">${currentNumber}</div><button class="gz-btn" onclick="restart()" style="margin-top:18px;font-size:1.1em">🔄 ${t('restart')}</button>`;
    renderStats();
  }
}

function restart() {
  level = 1;
  showLevel();
}

function renderStats() {
  $('#stats').innerHTML = `
    <div class="stat"><div class="num">${level}</div><div class="lbl">${t('level')}</div></div>
    <div class="stat"><div class="num">${level}</div><div class="lbl">${t('digits')}</div></div>
    <div class="stat"><div class="num">${best}</div><div class="lbl">${t('best')}</div></div>
  `;
}

function init() {
  phase = 'idle';
  $('#stage').className = 'stage';
  $('#stage').innerHTML = `<div style="font-size:1.6em;font-weight:700;color:var(--text2)">${t('start')}</div>`;
  renderStats();
}

$('#stage').addEventListener('click', () => { if (phase === 'idle') restart(); });
$('#toolbar').innerHTML = `<button class="gz-btn" onclick="init()">🔄 ${t('restart')}</button>`;

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⚡', href:'/fun/reaction-time.html', name:'Reaction Time Test'},
    {icon:'🎯', href:'/fun/aim-trainer.html', name:'Aim Trainer'},
    
    {icon:'🎮', href:'/fun/memory-game.html', name:'Memory Game'},
  ]
});
init();
</script>
