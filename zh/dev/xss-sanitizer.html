const { $, copyText, t } = GZ;

let mode = 'escape';

function setMode(m) {
  mode = m;
  ['escape','sanitize','detect'].forEach(id => {
    $('#mode-'+id).classList.toggle('active', id === m);
  });
  process();
}

// Dangerous XSS patterns
const XSS_PATTERNS = [
  { regex: /<script[\s>]/gi, name: '<script> tag', severity: 'high' },
  { regex: /javascript\s*:/gi, name: 'javascript: protocol', severity: 'high' },
  { regex: /on\w+\s*=\s*["']/gi, name: 'Event handler attribute', severity: 'high' },
  { regex: /on\w+\s*=\s*[^\s"'>]+/gi, name: 'Event handler (unquoted)', severity: 'high' },
  { regex: /<iframe[\s>]/gi, name: '<iframe> tag', severity: 'high' },
  { regex: /<object[\s>]/gi, name: '<object> tag', severity: 'high' },
  { regex: /<embed[\s>]/gi, name: '<embed> tag', severity: 'high' },
  { regex: /<form[\s>]/gi, name: '<form> tag', severity: 'med' },
  { regex: /<input[\s>]/gi, name: '<input> tag', severity: 'med' },
  { regex: /<svg[\s>]/gi, name: '<svg> tag', severity: 'med' },
  { regex: /<math[\s>]/gi, name: '<math> tag', severity: 'med' },
  { regex: /data\s*:\s*text\/html/gi, name: 'data: HTML URL', severity: 'high' },
  { regex: /vbscript\s*:/gi, name: 'vbscript: protocol', severity: 'high' },
  { regex: /expression\s*\(/gi, name: 'CSS expression()', severity: 'med' },
  { regex: /url\s*\(/gi, name: 'CSS url()', severity: 'low' },
  { regex: /@import/gi, name: 'CSS @import', severity: 'med' },
  { regex: /document\.(cookie|domain|write)/gi, name: 'DOM access', severity: 'high' },
  { regex: /eval\s*\(/gi, name: 'eval()', severity: 'high' },
  { regex: /setTimeout\s*\(\s*["']/gi, name: 'setTimeout string', severity: 'high' },
  { regex: /setInterval\s*\(\s*["']/gi, name: 'setInterval string', severity: 'high' },
  { regex: /new\s+Function\s*\(/gi, name: 'new Function()', severity: 'high' },
  { regex: /<link[\s>]/gi, name: '<link> tag', severity: 'med' },
  { regex: /<base[\s>]/gi, name: '<base> tag', severity: 'med' },
  { regex: /<meta[\s>]/gi, name: '<meta> tag', severity: 'med' },
];

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Allowed tags and attributes for sanitization
const ALLOWED_TAGS = new Set(['p','br','b','strong','i','em','u','s','a','ul','ol','li','h1','h2','h3','h4','h5','h6','blockquote','code','pre','span','div','table','thead','tbody','tr','th','td','img','hr','dl','dt','dd','sup','sub','mark','del','ins','abbr']);
const ALLOWED_ATTRS = new Set(['href','src','alt','title','class','id','target','rel','width','height','colspan','rowspan','lang','dir']);

function sanitizeHtml(html) {
  // Create a temporary element
  const doc = new DOMParser().parseFromString(html, 'text/html');
  
  function cleanNode(node) {
    if (node.nodeType === 3) return; // Text node, keep
    if (node.nodeType === 1) { // Element
      const tag = node.tagName.toLowerCase();
      if (!ALLOWED_TAGS.has(tag)) {
        // Replace with text content
        const text = document.createTextNode(node.textContent);
        node.parentNode.replaceChild(text, node);
        return;
      }
      // Remove dangerous attributes
      const attrs = Array.from(node.attributes);
      attrs.forEach(attr => {
        const name = attr.name.toLowerCase();
        if (!ALLOWED_ATTRS.has(name) || /^on/i.test(name)) {
          node.removeAttribute(attr.name);
        }
        // Sanitize URLs
        if (name === 'href' || name === 'src') {
          const val = attr.value.trim().toLowerCase();
          if (val.startsWith('javascript:') || val.startsWith('data:text/html') || val.startsWith('vbscript:')) {
            node.setAttribute(attr.name, '#');
          }
        }
      });
      // Recurse children
      Array.from(node.childNodes).forEach(cleanNode);
    } else {
      node.remove();
    }
  }

  Array.from(doc.body.childNodes).forEach(cleanNode);
  return doc.body.innerHTML;
}

function detectXSS(html) {
  const threats = [];
  XSS_PATTERNS.forEach(p => {
    const matches = html.match(p.regex);
    if (matches) {
      threats.push({ name: p.name, severity: p.severity, count: matches.length, examples: matches.slice(0, 3) });
    }
  });
  return threats;
}

function process() {
  const input = $('#input').value;
  if (!input.trim()) {
    $('#output').textContent = '';
    $('#preview').innerHTML = '';
    $('#threats').innerHTML = '';
    $('#status').innerHTML = '';
    return;
  }

  let output = '';
  let threatsHtml = '';
  const threats = detectXSS(input);

  if (mode === 'escape') {
    output = escapeHtml(input);
    $('#lbl-out').textContent = t('output') + ' (HTML Escaped)';
  } else if (mode === 'sanitize') {
    output = sanitizeHtml(input);
    $('#lbl-out').textContent = t('output') + ' (Sanitized HTML)';
  } else {
    output = escapeHtml(input);
    $('#lbl-out').textContent = t('output') + ' (Escaped for review)';
  }

  $('#output').textContent = output;

  // Live preview (safe - using textContent for escaped, sanitized for sanitize mode)
  if (mode === 'sanitize') {
    $('#preview').innerHTML = sanitizeHtml(input);
  } else {
    $('#preview').textContent = input;
  }

  // Threats
  if (threats.length > 0) {
    $('#status').innerHTML = `<span class="danger-badge">⚠ ${threats.length} ${t('threats')}</span>`;
    threatsHtml = '<div class="threat-list">';
    threats.forEach(t => {
      const cls = t.severity === 'high' ? 'threat-high' : t.severity === 'med' ? 'threat-med' : 'threat-low';
      const icon = t.severity === 'high' ? '🔴' : t.severity === 'med' ? '🟡' : '🟢';
      threatsHtml += `<div class="threat-item ${cls}">${icon} <b>${t.name}</b> (${t.count}x) — <code style="font-size:.82em">${escapeHtml(t.examples[0])}</code></div>`;
    });
    threatsHtml += '</div>';
    $('#threats').innerHTML = threatsHtml;
  } else {
    $('#status').innerHTML = `<span class="safe-badge">✓ ${t('safe')}</span>`;
    $('#threats').innerHTML = '';
  }
}

$('#input').addEventListener('input', process);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='<script>alert(\\'XSS\\')<\\/script><p>Hello <b onmouseover=alert(1)>world</b></p>';process()">XSS Example</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>`;

    {icon:'📝', href:'/text/remove-html-tags.html', name:'Remove HTML Tags'},
    
  ]
});
</script>
