<body>
<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="ctrl-row">
      <label id="lColor"></label><input type="color" id="blobColor" value="#6c5ce7" oninput="generate()">
      <label id="lComplexity"></label><input type="range" id="complexity" min="3" max="12" value="6" oninput="generate()"><span class="val" id="vComplex">6</span>
    </div>
    <div class="ctrl-row">
      <label id="lSize"></label><input type="range" id="blobSize" min="100" max="600" value="300" oninput="generate()"><span class="val" id="vSize">300</span>
      <button class="gz-btn" onclick="generate()">🎲 <span id="randBtn"></span></button>
    </div>
    <div class="blob-preview" id="blobPreview"></div>
    <div class="code-box" id="svgCode"></div>
    <div class="btn-row">
      <button class="gz-btn" onclick="copySvg()">📋 <span id="copyLabel"></span></button>
      <button class="gz-btn" onclick="downloadSvg()">⬇️ <span id="dlLabel"></span></button>
    </div>
  </div>

  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{toolTitle:'SVG Blob Generator',toolDesc:'Generate random organic blob shapes. Export as SVG.',
    s1:'Adjust color, complexity and size',s2:'Click Randomize for new shapes',s3:'Copy SVG code or download the file',s4:'Use in your designs',
    color:'Color:',complexity:'Complexity:',size:'Size:',randomize:'Randomize',copySvg:'Copy SVG',dlSvg:'Download SVG',
    rFilters:'Image Filters',rCompressor:'Image Compressor',rConverter:'Format Converter',rCropper:'Image Cropper'},
  zh:{toolTitle:'SVG Blob 生成器',toolDesc:'随机生成有机Blob形状，导出SVG。',
    s1:'调整颜色、复杂度和大小',s2:'点击随机生成新形状',s3:'复制SVG代码或下载文件',s4:'在设计中使用',
    color:'颜色：',complexity:'复杂度：',size:'大小：',randomize:'随机生成',copySvg:'复制SVG',dlSvg:'下载SVG',
    rFilters:'图片滤镜',rCompressor:'图片压缩',rConverter:'格式转换',rCropper:'图片裁剪'}
});

const {t}=GZI18n;
document.getElementById('lColor').textContent=t('color');
document.getElementById('lComplexity').textContent=t('complexity');
document.getElementById('lSize').textContent=t('size');
document.getElementById('randBtn').textContent=t('randomize');
document.getElementById('copyLabel').textContent=t('copySvg');
document.getElementById('dlLabel').textContent=t('dlSvg');

let svgStr='';

function generateBlob(pts,size){
  const cx=size/2,cy=size/2,r=size*0.38;
  const angles=[];
  for(let i=0;i<pts;i++)angles.push((Math.PI*2/pts)*i);
  const points=angles.map(a=>{
    const rr=r*(0.7+Math.random()*0.6);
    return[cx+Math.cos(a)*rr,cy+Math.sin(a)*rr];
  });
  points.push(points[0]);
  let d=`M ${points[0][0].toFixed(1)} ${points[0][1].toFixed(1)}`;
  for(let i=0;i<points.length-1;i++){
    const curr=points[i],next=points[i+1];
    const mx=(curr[0]+next[0])/2,my=(curr[1]+next[1])/2;
    d+=` Q ${curr[0].toFixed(1)} ${curr[1].toFixed(1)} ${mx.toFixed(1)} ${my.toFixed(1)}`;
  }
  d+=' Z';
  return d;
}

function generate(){
  const pts=+document.getElementById('complexity').value;
  const size=+document.getElementById('blobSize').value;
  const color=document.getElementById('blobColor').value;
  document.getElementById('vComplex').textContent=pts;
  document.getElementById('vSize').textContent=size;
  const path=generateBlob(pts,size);
  svgStr=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size} ${size}" width="${size}" height="${size}"><path d="${path}" fill="${color}"/></svg>`;
  document.getElementById('blobPreview').innerHTML=svgStr;
  document.getElementById('svgCode').textContent=svgStr;
}

function copySvg(){GZ.copyText(svgStr)}
function downloadSvg(){
  const a=document.createElement('a');a.href='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svgStr);
  a.download='blob.svg';a.click();
}

generate();

GZ.renderToolPage({category:'image',titleKey:'toolTitle',descKey:'toolDesc',
  howToSteps:['s1','s2','s3','s4'],
  related:[
    {href:'/image/filters.html',icon:'🎨',nameKey:'rFilters'},
    {href:'/image/compressor.html',icon:'📦',nameKey:'rCompressor'},
    {href:'/image/converter.html',icon:'🔄',nameKey:'rConverter'},
    {href:'/image/cropper.html',icon:'✂️',nameKey:'rCropper'}
  ]
});
</script>
