<script>
GZI18n.register({
  en: {
    toolTitle: 'Compound Word Generator & Splitter',
    toolDesc: 'Combine two words into compound forms or split compound words into parts. Great for naming, branding and language learning. Free, browser-only.',
    modeCombine: 'Combine Words',
    modeSplit: 'Split a Compound Word',
    word1Placeholder: 'First word (e.g. sun)',
    word2Placeholder: 'Second word (e.g. flower)',
    splitPlaceholder: 'Enter a compound word (e.g. keyboard)',
    closedForm: 'Closed Compound',
    hyphenatedForm: 'Hyphenated',
    openForm: 'Open Compound',
    knownCompound: '✓ Known English compound word',
    possibleSplit: 'Possible split',
    noSplitFound: 'Could not find a known split. Try the manual forms:',
    commonCompounds: 'Common Compound Words',
    enterWords: 'Enter two words above to combine them',
    enterCompound: 'Enter a compound word above to split it',
    step1: 'Choose Combine or Split mode',
    step2: mode2 => mode2 === 'combine' ? 'Enter two words to combine' : 'Enter a compound word to split',
    step3: 'View the generated compound forms',
    step4: 'Use for naming, branding or language learning',
  },
  zh: {
    toolTitle: '复合词生成器 / 拆分器',
    toolDesc: '将两个词组合成复合词，或将复合词拆分为组成部分。适合命名、品牌和语言学习。免费，浏览器本地运行。',
    modeCombine: '组合单词',
    modeSplit: '拆分复合词',
    word1Placeholder: '第一个词（如 sun）',
    word2Placeholder: '第二个词（如 flower）',
    splitPlaceholder: '输入复合词（如 keyboard）',
    closedForm: '闭合复合词',
    hyphenatedForm: '连字符形式',
    openForm: '开放复合词',
    knownCompound: '✓ 已知英语复合词',
    possibleSplit: '可能的拆分',
    noSplitFound: '未找到已知拆分，试试手动形式：',
    commonCompounds: '常见复合词',
    enterWords: '在上方输入两个单词进行组合',
    enterCompound: '在上方输入复合词进行拆分',
    step1: '选择组合或拆分模式',
    step2: '...',
    step3: '查看生成的复合形式',
    step4: '用于命名、品牌或语言学习',
  }
});

const { $, t } = GZ;

// Known compound words database (for validation/splitting)
const COMPOUNDS = new Set([
  'sunflower','keyboard','smartphone','toothbrush','football','basketball','baseball',
  'moonlight','rainbow','waterfall','firefly','butterfly','honeycomb','jellyfish',
  'starfish','grasshopper','bullfrog','catfish','doghouse','birdhouse','treehouse',
  'fireplace','watermelon','pineapple','strawberry','blueberry','blackberry',
  'raspberry','sunroof','moonwalk','earthquake','worldwide','network','website',
  'firewall','bookmark','handbook','guidebook','cookbook','notebook','checkbook',
  'picture','structure','furniture','adventure','literature','manufacture',
  'agriculture','legislature','forearm','forehead','fingernail','toenail',
  'shoelace','necklace','earring','nosebleed','sunburn','sunscreen','sunrise',
  'sunset','moonrise','moonset','starlight','starlight','daylight','nightlight',
  'flashlight','searchlight','spotlight','headlight','taillight','stoplight',
  'traffic','airline','airplane','airport','seaport','spacecraft','aircraft',
  'hovercraft','paperwork','homework','housework','woodwork','metalwork',
  'brickwork','stonework','needlework','casework','framework','network',
  'masterpiece','workpiece','mouthpiece','peacetime','wartime','dinnertime',
  'lunchtime','breakfast','understand','underground','underline','underwater',
  'overcome','overflow','overload','overlook','oversee','overwrite','overhead',
  'overcoat','overcome','download','upload','unload','reload','offload',
  'output','input','dropout','fallout','layout','runway','hallway','subway',
  'highway','driveway','parkway','tollway','freeway','expressway','motorway',
  'stairway','doorway','gateway','pathway','crosswalk','sidewalk','boardwalk',
  'walkway','skywalk','cakewalk','sleepwalk','moonwalk','spacewalk',
  'password','keyword','buzzword','crossword','watchword','catchword','byword',
  'afterword','foreword','footprint','fingerprint','fingerprint','blueprint',
  'blueprint','footstep','outstep','misstep','quickstep','doorstep','flagstone',
  'cobblestone','grindstone','milestone','keystone','cornerstone','hearthstone',
  'brimstone','rhinestone','bloodstone','touchstone','gemstone','sandstone',
  'limestone','soapstone','fieldstone','redstone','whetstone','oilstone',
  'facebook','youtube','wordpress','snapchat','tiktok','pinterest','linkedin',
]);

const COMMON_COMPOUNDS = [
  {parts:'sun + flower', word:'sunflower'},
  {parts:'key + board', word:'keyboard'},
  {parts:'smart + phone', word:'smartphone'},
  {parts:'tooth + brush', word:'toothbrush'},
  {parts:'foot + ball', word:'football'},
  {parts:'basket + ball', word:'basketball'},
  {parts:'moon + light', word:'moonlight'},
  {parts:'rain + bow', word:'rainbow'},
  {parts:'water + fall', word:'waterfall'},
  {parts:'fire + fly', word:'firefly'},
  {parts:'butter + fly', word:'butterfly'},
  {parts:'honey + comb', word:'honeycomb'},
  {parts:'jelly + fish', word:'jellyfish'},
  {parts:'water + melon', word:'watermelon'},
  {parts:'pine + apple', word:'pineapple'},
  {parts:'straw + berry', word:'strawberry'},
  {parts:'blue + berry', word:'blueberry'},
  {parts:'fire + place', word:'fireplace'},
  {parts:'tree + house', word:'treehouse'},
  {parts:'dog + house', word:'doghouse'},
];

let mode = 'combine';

function setMode(m) {
  mode = m;
  $('#mode-combine').classList.toggle('active', m === 'combine');
  $('#mode-split').classList.toggle('active', m === 'split');
  $('#combine-section').style.display = m === 'combine' ? '' : 'none';
  $('#split-section').style.display = m === 'split' ? '' : 'none';
  generate();
}

function generate() {
  if (mode === 'combine') {
    const w1 = $('#word1').value.trim();
    const w2 = $('#word2').value.trim();
    if (!w1 || !w2) {
      $('#result').innerHTML = `<div style="text-align:center;padding:30px;color:var(--text2)">${t('enterWords')}</div>`;
      $('#examples').innerHTML = renderExamples();
      return;
    }
    const closed = w1.toLowerCase() + w2.toLowerCase();
    const hyphenated = w1.toLowerCase() + '-' + w2.toLowerCase();
    const open = w1.toLowerCase() + ' ' + w2.toLowerCase();
    const isKnown = COMPOUNDS.has(closed);

    $('#result').innerHTML = `
      <div class="result-word">
        <div class="big">${w1}${w2}</div>
        <div class="label">${t('closedForm')}${isKnown ? ' — ' + t('knownCompound') : ''}</div>
      </div>
      <div class="split-list">
        <div class="split-chip">${w1}-${w2}<div style="font-size:.7rem;color:var(--text2);font-weight:400">${t('hyphenatedForm')}</div></div>
        <div class="split-chip">${w1} ${w2}<div style="font-size:.7rem;color:var(--text2);font-weight:400">${t('openForm')}</div></div>
      </div>
    `;
  } else {
    const word = $('#splitWord').value.trim().toLowerCase();
    if (!word) {
      $('#result').innerHTML = `<div style="text-align:center;padding:30px;color:var(--text2)">${t('enterCompound')}</div>`;
      $('#examples').innerHTML = renderExamples();
      return;
    }
    // Try all possible splits
    const splits = [];
    for (let i = 2; i < word.length - 1; i++) {
      const part1 = word.substring(0, i);
      const part2 = word.substring(i);
      // Check if both parts look like words (basic heuristic: > 2 chars, has vowel)
      if (part1.length >= 2 && part2.length >= 2 &&
          /[aeiou]/.test(part1) && /[aeiou]/.test(part2)) {
        splits.push({ p1: part1, p2: part2 });
      }
    }
    const isKnown = COMPOUNDS.has(word);

    let html = `<div class="result-word"><div class="big">${word}</div><div class="label">${isKnown ? t('knownCompound') : ''}</div></div>`;
    if (splits.length) {
      html += `<div class="split-list">${splits.slice(0, 8).map(s =>
        `<div class="split-chip">${s.p1} + ${s.p2}</div>`
      ).join('')}</div>`;
    } else {
      html += `<div style="text-align:center;color:var(--text2);margin-top:12px">${t('noSplitFound')}</div>`;
    }
    $('#result').innerHTML = html;
  }
  $('#examples').innerHTML = renderExamples();
}

function renderExamples() {
  return `<div class="examples"><h3>${t('commonCompounds')}</h3><div class="examples-grid">${COMMON_COMPOUNDS.map(c =>
    `<div class="example-item"><strong>${c.word}</strong><div class="parts">${c.parts}</div></div>`
  ).join('')}</div></div>`;
}

$('#word1').addEventListener('input', generate);
$('#word2').addEventListener('input', generate);
$('#splitWord').addEventListener('input', generate);
$('#word1').value = 'sun';
$('#word2').value = 'flower';
generate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📖', href:'/text/thesaurus.html', name:'Thesaurus'},
    {icon:'🔗', href:'/text/slug-generator.html', name:'Slug Generator'},
    {icon:'🔤', href:'/text/word-frequency.html', name:'Word Frequency'},
    {icon:'📝', href:'/text/word-counter.html', name:'Word Counter'},
  ]
});
</script>

</body>
