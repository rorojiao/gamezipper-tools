<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I make an image black and white?", "acceptedAnswer": {"@type": "Answer", "text": "Upload your image, pick 'Grayscale' for a smooth gray photo or 'Black & White' for a pure two-tone effect, adjust the brightness/contrast (or threshold for B&W), then download the result."}}, {"@type": "Question", "name": "What is the difference between grayscale and black and white?", "acceptedAnswer": {"@type": "Answer", "text": "Grayscale keeps every shade of gray (256 levels), producing a realistic monochrome photo. Black and white (also called 1-bit) forces every pixel to pure black or pure white based on a threshold you set, creating a high-contrast stamp or stencil effect."}}, {"@type": "Question", "name": "Which grayscale formula is best?", "acceptedAnswer": {"@type": "Answer", "text": "The Luminosity method (0.299R + 0.587G + 0.114B) matches how human eyes perceive brightness and looks most natural. The Average method takes the simple mean of R, G and B. Lightness uses (max+min)/2."}}, {"@type": "Question", "name": "Is my image uploaded to a server?", "acceptedAnswer": {"@type": "Answer", "text": "No. Every pixel operation runs locally in your browser via the Canvas API. Your image never leaves your device."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-dropzone" id="dropzone" onclick="document.getElementById('fileIn').click()">
      <span class="icon">🖤</span>
      <p id="dropText"></p>
      <input type="file" id="fileIn" accept="image/png,image/jpeg,image/webp,image/bmp" hidden>
    </div>
    <div id="controls" style="display:none">
      <div class="gs-modes" id="modeRow">
        <div class="gs-mode active" data-mode="gray" id="m-gray">🖼️ Grayscale</div>
        <div class="gs-mode" data-mode="bw" id="m-bw">⚫⚪ Black & White</div>
        <div class="gs-mode" data-mode="sepia" id="m-sepia">🟤 Sepia</div>
      </div>
      <div class="gs-controls">
        <div class="gs-card">
          <label id="lbl-method">Grayscale method</label>
          <select id="method">
            <option value="luma" id="opt-luma">Luminosity (natural)</option>
            <option value="avg" id="opt-avg">Average</option>
            <option value="light" id="opt-light">Lightness</option>
          </select>
        </div>
        <div class="gs-card">
          <label id="lbl-bright">Brightness <span class="vnum" id="brightV">0</span></label>
          <input type="range" id="brightness" min="-100" max="100" value="0">
        </div>
        <div class="gs-card">
          <label id="lbl-contrast">Contrast <span class="vnum" id="contrastV">0</span></label>
          <input type="range" id="contrast" min="-100" max="100" value="0">
        </div>
        <div class="gs-card" id="thresholdCard" style="display:none">
          <label id="lbl-thresh">B&W threshold <span class="vnum" id="threshV">128</span></label>
          <input type="range" id="threshold" min="0" max="255" value="128">
        </div>
        <div class="gs-card">
          <label id="lbl-format">Output format</label>
          <select id="format">
            <option value="png">PNG</option>
            <option value="jpeg">JPEG</option>
            <option value="webp">WebP</option>
          </select>
        </div>
      </div>
      <div class="gs-status" id="status"></div>
    </div>
    <div class="gs-preview" id="preview"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Image to Grayscale / Black & White',
    toolDesc: 'Convert images to grayscale, pure black & white or sepia. Choose the grayscale method, adjust brightness and contrast, and set a B&W threshold. Runs entirely in your browser, no upload.',
    dropText: 'Drop an image here or click to choose a file',
    mGray: '🖼️ Grayscale',
    mBw: '⚫⚪ Black & White',
    mSepia: '🟤 Sepia',
    method: 'Grayscale method',
    optLuma: 'Luminosity (natural)',
    optAvg: 'Average',
    optLight: 'Lightness',
    bright: 'Brightness',
    contrast: 'Contrast',
    thresh: 'B&W threshold',
    format: 'Output format',
    original: 'Original',
    result: 'Result',
    statusWorking: 'Processing…',
    statusDone: '✓ Done',
    step1: 'Drop or upload a PNG, JPG, WebP or BMP image',
    step2: 'Pick Grayscale, Black & White or Sepia mode',
    step3: 'Adjust method, brightness, contrast or threshold',
    step4: 'Download the result in PNG, JPEG or WebP',
  },
  zh: {
    toolTitle: '图片转灰度 / 黑白',
    toolDesc: '将图片转换为灰度、纯黑白或棕褐色。可选择灰度算法，调整亮度和对比度，并设置黑白阈值。完全浏览器本地运行，无需上传。',
    dropText: '拖入图片或点击选择文件',
    mGray: '🖼️ 灰度',
    mBw: '⚫⚪ 黑白',
    mSepia: '🟤 棕褐',
    method: '灰度算法',
    optLuma: '亮度法（自然）',
    optAvg: '平均值',
    optLight: '明度法',
    bright: '亮度',
    contrast: '对比度',
    thresh: '黑白阈值',
    format: '输出格式',
    original: '原始',
    result: '结果',
    statusWorking: '正在处理…',
    statusDone: '✓ 完成',
    step1: '拖入或上传 PNG、JPG、WebP 或 BMP 图片',
    step2: '选择灰度、黑白或棕褐模式',
    step3: '调整算法、亮度、对比度或阈值',
    step4: '下载 PNG、JPEG 或 WebP 格式结果',
  }
});

const { $, t } = GZ;
let sourceFile = null, sourceImg = null, sourceUrl = null, outputBlob = null, outputUrl = null;
let mode = 'gray';

$('#dropText').textContent = t('dropText');

['dragenter','dragover'].forEach(ev => $('#dropzone').addEventListener(ev, e => { e.preventDefault(); $('#dropzone').classList.add('dragover'); }));
['dragleave','drop'].forEach(ev => $('#dropzone').addEventListener(ev, e => { e.preventDefault(); $('#dropzone').classList.remove('dragover'); }));
$('#dropzone').addEventListener('drop', e => { if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
$('#fileIn').addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

$('#modeRow').querySelectorAll('.gs-mode').forEach(el => el.addEventListener('click', () => {
  $('#modeRow').querySelectorAll('.gs-mode').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  mode = el.dataset.mode;
  $('#thresholdCard').style.display = mode === 'bw' ? 'block' : 'none';
  $('#method').parentElement.style.opacity = (mode === 'gray') ? '1' : '0.5';
  process();
}));
['brightness','contrast','threshold'].forEach(id => $('#' + id).addEventListener('input', e => {
  $('#' + id + 'V').textContent = e.target.value;
  process();
}));
$('#method').addEventListener('change', process);

function loadFile(file) {
  sourceFile = file;
  if (sourceUrl) URL.revokeObjectURL(sourceUrl);
  sourceUrl = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    sourceImg = img;
    $('#dropzone').style.display = 'none';
    $('#controls').style.display = 'block';
    process();
  };
  img.onerror = () => { $('#status').textContent = '✗ Failed to load image'; };
  img.src = sourceUrl;
}

function clamp(v) { return v < 0 ? 0 : (v > 255 ? 255 : v); }

function process() {
  if (!sourceImg) return;
  $('#status').textContent = t('statusWorking');
  const maxDim = 4096;
  let w = sourceImg.naturalWidth, h = sourceImg.naturalHeight;
  if (w > maxDim || h > maxDim) { const s = maxDim / Math.max(w, h); w = Math.round(w * s); h = Math.round(h * s); }
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(sourceImg, 0, 0, w, h);
  const imgData = ctx.getImageData(0, 0, w, h);
  const d = imgData.data;
  const method = $('#method').value;
  const bright = parseInt($('#brightness').value, 10);
  const contrast = parseInt($('#contrast').value, 10);
  const cf = (259 * (contrast + 255)) / (255 * (259 - contrast));
  const thresh = parseInt($('#threshold').value, 10);
  for (let i = 0; i < d.length; i += 4) {
    let r = d[i], g = d[i + 1], b = d[i + 2];
    let val;
    if (mode === 'sepia') {
      const nr = clamp(r * 0.393 + g * 0.769 + b * 0.189);
      const ng = clamp(r * 0.349 + g * 0.686 + b * 0.168);
      const nb = clamp(r * 0.272 + g * 0.534 + b * 0.131);
      r = nr; g = ng; b = nb; val = nr;
    } else {
      if (method === 'avg') val = (r + g + b) / 3;
      else if (method === 'light') val = (Math.max(r, g, b) + Math.min(r, g, b)) / 2;
      else val = r * 0.299 + g * 0.587 + b * 0.114;
      if (mode === 'bw') val = val >= thresh ? 255 : 0;
      r = g = b = val;
    }
    // brightness + contrast
    const apply = v => clamp(cf * (v + bright - 128) + 128);
    d[i] = apply(r); d[i + 1] = apply(g); d[i + 2] = apply(b);
  }
  ctx.putImageData(imgData, 0, 0);
  const fmt = $('#format').value;
  const mime = fmt === 'png' ? 'image/png' : (fmt === 'webp' ? 'image/webp' : 'image/jpeg');
  canvas.toBlob(blob => {
    if (outputBlob && outputUrl) URL.revokeObjectURL(outputUrl);
    outputBlob = blob;
    outputUrl = URL.createObjectURL(blob);
    $('#preview').innerHTML = `<div><div style="text-align:center;color:var(--text2);font-size:.8rem;margin-bottom:4px">${t('original')}</div><img src="${sourceUrl}" alt="original"></div><div><div style="text-align:center;color:var(--text2);font-size:.8rem;margin-bottom:4px">${t('result')}</div><img src="${outputUrl}" alt="result"></div>`;
    $('#status').textContent = `${t('statusDone')} · ${w}×${h} · ${(blob.size / 1024).toFixed(1)} KB`;
  }, mime, 0.92);
}

function download() {
  if (!outputUrl) return;
  const fmt = $('#format').value;
  const base = (sourceFile?.name || 'image').replace(/\.[^.]+$/, '');
  const a = document.createElement('a');
  a.href = outputUrl;
  a.download = base + '-' + mode + '.' + (fmt === 'jpeg' ? 'jpg' : fmt);
  document.body.appendChild(a); a.click(); a.remove();
}

function reset() {
  if (sourceUrl) URL.revokeObjectURL(sourceUrl);
  if (outputUrl) URL.revokeObjectURL(outputUrl);
  sourceFile = null; sourceImg = null; sourceUrl = null; outputBlob = null; outputUrl = null;
  $('#fileIn').value = '';
  $('#dropzone').style.display = 'block';
  $('#controls').style.display = 'none';
  $('#preview').innerHTML = '';
  $('#status').textContent = '';
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="download()">${t('download')}</button><button class="gz-btn gz-btn-secondary" onclick="reset()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎨', href:'/image/filters.html', name:'Image Filters'},
    {icon:'🖼️', href:'/image/pencil-sketch.html', name:'Pencil Sketch'},
    {icon:'🔫', href:'/image/pixelate.html', name:'Pixelate'},
    {icon:'🔄', href:'/image/converter.html', name:'Image Converter'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
