const { $, t } = GZ;

function parseSitemap(xml){
// Detect if it's pure URL list or XML sitemap
const urls = new Map(); // url -> {priority, lastmod}
const trimmed = xml.trim();
if (!trimmed) return urls;
// Try URL-list mode (one URL per line)
if (!trimmed.startsWith('<')) {
trimmed.split(/\r?\n/).forEach(line => {
  const u = line.trim();
  if (u && /^https?:\/\//.test(u)) urls.set(u, {priority:null, lastmod:null});
});
return urls;
}
// XML mode
try {
const parser = new DOMParser();
const doc = parser.parseFromString(xml, 'application/xml');
const parseErr = doc.querySelector('parsererror');
if (parseErr) return urls;
doc.querySelectorAll('url').forEach(u => {
  const loc = u.querySelector('loc')?.textContent?.trim();
  if (!loc) return;
  const pri = u.querySelector('priority')?.textContent?.trim();
  const lm = u.querySelector('lastmod')?.textContent?.trim();
  urls.set(loc, {priority:pri||null, lastmod:lm||null});
});
// Also handle sitemapindex
if (urls.size === 0) {
  doc.querySelectorAll('sitemap').forEach(s => {
    const loc = s.querySelector('loc')?.textContent?.trim();
    if (loc) urls.set(loc, {priority:null, lastmod:s.querySelector('lastmod')?.textContent?.trim()||null});
  });
}
} catch(e) { /* ignore */ }
return urls;
}

function diff(a, b){
const added = [], removed = [], common = [], changed = [];
a.forEach((meta, url) => {
  if (!b.has(url)) { removed.push({url, ...meta}); return; }
  const bMeta = b.get(url);
  if ((meta.priority||null) !== (bMeta.priority||null) || (meta.lastmod||null) !== (bMeta.lastmod||null)) {
    changed.push({url, before:meta, after:bMeta});
  } else {
    common.push({url, ...meta});
  }
});
b.forEach((meta, url) => {
  if (!a.has(url)) added.push({url, ...meta});
});
return {added, removed, common, changed};
}

let lastDiff = null;
let activeTab = 'added';

function renderTab(){
const list = $('#diff-list');
list.innerHTML = '';
const arr = lastDiff ? lastDiff[activeTab] : [];
if (!arr.length) { list.innerHTML = '<div style="text-align:center;color:var(--text3);padding:24px">No URLs in this category.</div>'; return; }
arr.forEach(item => {
  const row = document.createElement('div');
  row.className = 'diff-item ' + activeTab;
  if (activeTab === 'changed') {
    row.innerHTML = '<span class="url">' + item.url + '</span><span class="meta">pri: ' + (item.before.priority||'-') + ' → ' + (item.after.priority||'-') + ' | lastmod: ' + (item.before.lastmod||'-') + ' → ' + (item.after.lastmod||'-') + '</span>';
  } else {
    const metaTxt = [item.priority?'pri:'+item.priority:'', item.lastmod?'lm:'+item.lastmod:''].filter(Boolean).join(' · ');
    row.innerHTML = '<span class="url">' + item.url + '</span>' + (metaTxt?'<span class="meta">'+metaTxt+'</span>':'');
  }
  list.appendChild(row);
});
}

function showDiff(d){
lastDiff = d;
$('#stats').style.display = 'grid';
$('#results').style.display = 'block';
$('#stat-added').textContent = d.added.length;
$('#stat-removed').textContent = d.removed.length;
$('#stat-common').textContent = d.common.length;
$('#stat-changed').textContent = d.changed.length;
renderTab();
}

function doCompare(){
const a = parseSitemap($('#sitemap-a').value);
const b = parseSitemap($('#sitemap-b').value);
if (!a.size && !b.size) { $('#stats').style.display='none'; $('#results').style.display='none'; return; }
showDiff(diff(a, b));
}

<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">

  <url><loc>https://example.com/about</loc><priority>0.8</priority></url>
  <url><loc>https://example.com/legacy</loc><priority>0.5</priority></url>
</urlset>`;
$('#sitemap-b').value = `<?xml version="1.0" encoding="UTF-8"?>
<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
  <url><loc>https://example.com/</loc><priority>1.0</priority></url>
  <url><loc>https://example.com/about</loc><priority>0.9</priority></url>
  <url><loc>https://example.com/blog</loc><priority>0.7</priority></url>
</urlset>`;
doCompare();
}
