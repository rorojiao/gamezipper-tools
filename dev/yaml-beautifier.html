  zh: {
    toolTitle: 'YAML 美化 / 格式化工具',
    toolDesc: '美化、格式化和验证 YAML。修正缩进、YAML 与 JSON 互转 — 免费、即时、纯浏览器运行。',
    beautify: '美化',

    toYaml: '转 YAML',
    example: '示例',
    copy: '复制',
    clear: '清空',
    inputLabel: 'YAML / JSON 输入',
    outputLabel: '结果',
    empty: '粘贴 YAML 或 JSON，然后点击按钮',
    success: '✓ YAML 有效',
    error: '错误：',
    step1: '在输入区粘贴 YAML 或 JSON',
    step2: '点击「美化」格式化 YAML，或「转 JSON」转换格式',
    step3: '查看输出结果',
    step4: '点击「复制」复制到剪贴板',
  }

const { $, copyText, t } = GZ;

function parseInput(inp) {
  // Try YAML parse (js-yaml handles JSON too)
  return jsyaml.load(inp);
}

function doBeautify() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const obj = parseInput(inp);
    if (obj === undefined || obj === null) throw new Error('Empty or invalid input');
    const result = jsyaml.dump(obj, { indent: 2, lineWidth: 120, sortKeys: false });
    $('#output').textContent = result;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('success')}</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('error')}${e.message}</span>`;
    $('#output').textContent = '';
  }
}

function doToJson() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const obj = parseInput(inp);
    if (obj === undefined || obj === null) throw new Error('Empty or invalid input');
    $('#output').textContent = JSON.stringify(obj, null, 2);
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ Converted to JSON</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('error')}${e.message}</span>`;
    $('#output').textContent = '';
  }
}

function doToYaml() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const obj = JSON.parse(inp);
    const result = jsyaml.dump(obj, { indent: 2, lineWidth: 120 });
    $('#output').textContent = result;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ Converted to YAML</span>`;
  } catch(e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('error')}${e.message}</span>`;
    $('#output').textContent = '';
  }
}

function loadExample() {
  $('#input').value = 'name: GameZipper\nversion: 2.0\nservers:\n  - name: web-01\n    port: 8080\n    region: us-east\n  - name: web-02\n    port: 8080\n    region: eu-west\nfeatures:\n  auth: true\n  cache:\n    driver: redis\n    ttl: 3600\nmetadata:\n  created: 2026-01-15\n  tags:\n    - production\n    - high-traffic';
  doBeautify();
}

function doClear() { $('#input').value=''; $('#output').textContent=''; $('#status').innerHTML=''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doBeautify()">${t('beautify')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doToJson()">${t('toJson')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doToYaml()">${t('toYaml')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#lbl-in').textContent = t('inputLabel');
$('#lbl-out').textContent = t('outputLabel');
$('#output').innerHTML = `<span style="opacity:.5">${t('empty')}</span>`;
