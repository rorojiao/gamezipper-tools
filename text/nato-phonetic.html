<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the NATO phonetic alphabet?", "acceptedAnswer": {"@type": "Answer", "text": "The NATO phonetic alphabet (also called the ICAO phonetic alphabet or International Radiotelephony Spelling Alphabet) is the most widely used radiotelephone spelling alphabet. It assigns a code word to each letter (A=Alpha, B=Bravo, C=Charlie) so that letters are clearly understood over poor-quality radio or phone connections."}}, {"@type": "Question", "name": "Who uses the NATO phonetic alphabet?", "acceptedAnswer": {"@type": "Answer", "text": "It's used by NATO militaries, civilian aviation (ICAO), shipping, amateur radio, law enforcement and emergency services worldwide. Any time you need to spell out a name, callsign, or serial number over the phone or radio, the NATO alphabet makes it unambiguous."}}, {"@type": "Question", "name": "How do I pronounce the NATO words?", "acceptedAnswer": {"@type": "Answer", "text": "Each code word is chosen to sound distinct from all others — no two rhyme or start with the same consonant. Common examples: Alfa (al-fah), Bravo (brah-voh), Charlie (char-lee), Delta (dell-tah), Echo (eck-oh), Foxtrot (foks-trot), Golf (golf), Hotel (hoh-tell), India (in-dee-ah), Juliet (jew-lee-ett), Kilo (key-loh), Lima (lee-mah), Mike (mike), November (no-vem-ber), Oscar (oss-cah), Papa (pah-pah), Quebec (keh-beck), Romeo (row-me-oh), Sierra (see-air-rah), Tango (tang-go), Uniform (you-ni-form), Victor (vik-tah), Whiskey (wiss-key), X-ray (ecks-ray), Yankee (yang-key), Zulu (zoo-loo)."}}, {"@type": "Question", "name": "Can I translate back from phonetic to text?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Switch to Phonetic → Text mode and paste words like 'alpha bravo charlie' to get 'ABC'. The translator recognizes both full words and the first letter of each code word."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'NATO Phonetic Alphabet Translator',
    toolDesc: 'Convert any text to and from the international NATO / ICAO phonetic alphabet. Click any letter in the chart, or type to translate — perfect for radio communication and spelling.',
    lblIn: 'Text', lblOut: 'Phonetic',
    lblInLen: 'Input length', lblOutLen: 'Output words', lblMode: 'Mode',
    modeEncode: 'Text → Phonetic', modeDecode: 'Phonetic → Text',
    step1: 'Click any letter in the chart to copy its code word, or type text in the input area',
    step2: 'The translator instantly converts each character to its NATO phonetic equivalent',
    step3: 'Switch to Phonetic → Text mode to decode back, e.g. "alpha bravo charlie" → "ABC"',
    step4: 'Use Copy to grab the output for radio scripts, callsign spelling, or training material',
  },
  zh: {
    toolTitle: 'NATO 音标字母转换器',
    toolDesc: '在文本和国际 NATO / ICAO 音标字母之间互转。点击字母表中的任意字母，或输入文本即可翻译 — 适用于无线电通信和拼写。',
    lblIn: '文本', lblOut: '音标',
    lblInLen: '输入长度', lblOutLen: '输出词数', lblMode: '模式',
    modeEncode: '文本 → 音标', modeDecode: '音标 → 文本',
    step1: '点击字母表中任意字母复制其代码词，或在输入区输入文本',
    step2: '转换器即时将每个字符转换为对应的 NATO 音标',
    step3: '切换到「音标 → 文本」模式反向解码，如「alpha bravo charlie」→「ABC」',
    step4: '点击「复制」获取输出，用于无线电脚本、呼号拼写或培训材料',
  }
});

const NATO = {
  A: ['Alfa', 'AL-FAH'], B: ['Bravo', 'BRAH-VOH'], C: ['Charlie', 'CHAR-LEE'],
  D: ['Delta', 'DELL-TAH'], E: ['Echo', 'ECK-OH'], F: ['Foxtrot', 'FOKS-TROT'],
  G: ['Golf', 'GOLF'], H: ['Hotel', 'HOH-TEL'], I: ['India', 'IN-DEE-AH'],
  J: ['Juliett', 'JEW-LEE-ETT'], K: ['Kilo', 'KEY-LOH'], L: ['Lima', 'LEE-MAH'],
  M: ['Mike', 'MIKE'], N: ['November', 'NO-VEM-BER'], O: ['Oscar', 'OSS-CAH'],
  P: ['Papa', 'PAH-PAH'], Q: ['Quebec', 'KEH-BECK'], R: ['Romeo', 'ROW-ME-OH'],
  S: ['Sierra', 'SEE-AIR-RAH'], T: ['Tango', 'TANG-GO'], U: ['Uniform', 'YOU-NEE-FORM'],
  V: ['Victor', 'VIK-TAH'], W: ['Whiskey', 'WISS-KEY'], X: ['X-ray', 'ECKS-RAY'],
  Y: ['Yankee', 'YANG-KEY'], Z: ['Zulu', 'ZOO-LOO'],
  '0': ['Zero', 'ZE-RO'], '1': ['One', 'WUN'], '2': ['Two', 'TOO'],
  '3': ['Three', 'TREE'], '4': ['Four', 'FOW-ER'], '5': ['Five', 'FIFE'],
  '6': ['Six', 'SIX'], '7': ['Seven', 'SEV-EN'], '8': ['Eight', 'AIT'],
  '9': ['Nine', 'NIN-ER']
};
const NATO_WORD_TO_LETTER = {};
Object.entries(NATO).forEach(([k, v]) => { NATO_WORD_TO_LETTER[v[0].toLowerCase()] = k; });

const { $, copyText, t } = GZ;
let mode = 'encode';

function renderGrid() {
  const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const g = $('#grid');
  g.innerHTML = '';
  for (const l of letters) {
    const cell = document.createElement('div');
    cell.className = 'np-cell';
    cell.innerHTML = `<div class="l">${l}</div><div class="w">${NATO[l][0]}</div><div class="c">${NATO[l][1]}</div>`;
    cell.addEventListener('click', () => {
      const output = NATO[l][0];
      if (mode === 'encode') {
        $('#input').value += l;
        doConvert();
      } else {
        copyText(output);
      }
    });
    g.appendChild(cell);
  }
}

function doConvert() {
  const inp = $('#input').value;
  let out = '';
  if (mode === 'encode') {
    out = inp.toUpperCase().split('').map(c => {
      if (NATO[c]) return NATO[c][0].toUpperCase();
      if (c === ' ') return '/';
      if (c === '\n') return '\n';
      if (c.match(/[.,!?;:]/)) return c;
      return '';
    }).filter(x => x !== '').join(' ');
    out = out.replace(/ \/ /g, ' / ');
  } else {
    out = inp.toLowerCase().split(/\s+/).map(w => {
      w = w.replace(/[.,!?;:]/g, '').trim();
      if (!w) return '';
      if (NATO_WORD_TO_LETTER[w]) return NATO_WORD_TO_LETTER[w];
      // try first letter match
      for (const [k, v] of Object.entries(NATO)) {
        if (v[0].toLowerCase() === w) return k;
      }
      return w;
    }).join('');
  }
  $('#output').textContent = out;
  $('#inLen').textContent = inp.length;
  $('#outLen').textContent = out.split(/\s+/).filter(x => x).length;
  $('#modeLabel').textContent = mode === 'encode' ? t('modeEncode') : t('modeDecode');
}

function loadExample() {
  if (mode === 'encode') $('#input').value = 'GameZipper 2026';
  else $('#input').value = 'golf alpha mike echo zulu india papa papa echo romeo';
  doConvert();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doConvert()">${t('convert')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';doConvert()">${t('clear')}</button>`;

$('#input').addEventListener('input', doConvert);
$('#lblIn').textContent = t('lblIn');
$('#lblOut').textContent = t('lblOut');
$('#lblInLen').textContent = t('lblInLen');
$('#lblOutLen').textContent = t('lblOutLen');
$('#lblMode').textContent = t('lblMode');

document.querySelectorAll('.np-mode-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.np-mode-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    mode = b.dataset.mode;
    doConvert();
  });
});

renderGrid();
GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📡', href:'/convert/morse-code.html', name:'Morse Code'},
    {icon:'🔐', href:'/convert/cipher.html', name:'ROT13 Cipher'},
    {icon:'✍️', href:'/text/handwriting.html', name:'Handwriting'},
    {icon:'🔤', href:'/text/unicode-search.html', name:'Unicode Search'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
