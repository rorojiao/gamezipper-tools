<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is VAT?", "acceptedAnswer": {"@type": "Answer", "text": "VAT (Value Added Tax) is a consumption tax added to products and services at each stage of production and distribution. It's common in the EU, UK, and many other regions. Standard VAT rates range from 5% to 27% depending on the country."}}, {"@type": "Question", "name": "What's the difference between VAT, GST, and sales tax?", "acceptedAnswer": {"@type": "Answer", "text": "VAT and GST are equivalent in concept — both are value-added taxes applied at each stage of production. Sales tax (used in the US) is applied only at the final point of sale to the consumer. GST is the term used in countries like Canada, Australia, India, and New Zealand."}}, {"@type": "Question", "name": "How do I remove VAT from a price?", "acceptedAnswer": {"@type": "Answer", "text": "Switch to 'Remove VAT' mode, enter the gross (VAT-inclusive) price and the tax rate. The tool will compute the net price by dividing by (1 + rate/100). For example, to remove 20% VAT from $120: $120 / 1.20 = $100 net."}}, {"@type": "Question", "name": "What is the standard VAT rate in my country?", "acceptedAnswer": {"@type": "Answer", "text": "Standard rates vary: UK 20%, Germany 19%, France 20%, Italy 22%, Spain 21%, Netherlands 21%, Sweden 25%, Canada (GST) 5%, Australia (GST) 10%, India (GST) 18%. Click any country preset in the calculator to load its standard rate — you can then customize it for reduced or special rates."}}]}</script>

          </div>
        </div>

        <div class="vat-row"><span class="lbl" id="lblTax">Tax (20%)</span><span class="val" id="tax">$20.00</span></div>
        <div class="vat-row"><span class="lbl" id="lblGross">Gross amount</span><span class="val" id="gross">$120.00</span></div>

          <button class="gz-btn gz-btn-secondary" onclick="copyText('Net: '+$('#net').textContent+'\\nTax: '+$('#tax').textContent+'\\nGross: '+$('#gross').textContent)">📋 Copy Breakdown</button>
        </div>
      </div>
    </div>
  </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'VAT / Sales Tax Calculator',
    toolDesc: 'Add or remove VAT, GST and sales tax for 30+ countries. Instant net, gross and tax breakdown with copy-ready values.',
    lblAmount: 'Amount', lblMode: 'Calculation mode', lblRate: 'Tax rate (%)', lblCountry: 'Country preset',
    lblResult: 'Result', lblNet: 'Net amount', lblTax: 'Tax', lblGross: 'Gross amount',
    step1: 'Enter an amount and pick a mode (add or remove tax)',
    step2: 'Choose a country preset or enter a custom tax rate',
    step3: 'See the live breakdown of net, tax, and gross amounts',
    step4: 'Click Copy to copy the total or full breakdown',
  },
  zh: {
    toolTitle: '增值税 / 销售税计算器',
    toolDesc: '为 30+ 国家添加或扣除增值税（VAT）、销售税。一键显示净额、税额和总额，支持复制。',
    lblAmount: '金额', lblMode: '计算模式', lblRate: '税率 (%)', lblCountry: '国家预设',
    lblResult: '结果', lblNet: '净额', lblTax: '税额', lblGross: '总额',
    step1: '输入金额并选择计算模式（加税或去税）',
    step2: '选择国家预设或输入自定义税率',
    step3: '实时查看净额、税额和总额的拆分',
    step4: '点击「复制」复制总额或完整拆分',
  }
});

const { $, copyText, t } = GZ;
let mode = 'add';

const PRESETS = [
  {name:'🇬🇧 UK', rate:20, info:'Standard UK VAT is 20%. Reduced 5% and 0% for some goods.'},
  {name:'🇩🇪 Germany', rate:19, info:'Standard 19%, reduced 7%.'},
  {name:'🇫🇷 France', rate:20, info:'Standard 20%, reduced 5.5%, super-reduced 2.1%.'},
  {name:'🇮🇹 Italy', rate:22, info:'Standard 22%, reduced 10%/5%/4%.'},
  {name:'🇪🇸 Spain', rate:21, info:'Standard 21%, reduced 10%/4%.'},
  {name:'🇳🇱 Netherlands', rate:21, info:'Standard 21%, reduced 9%.'},
  {name:'🇸🇪 Sweden', rate:25, info:'Standard 25%, reduced 12%/6%.'},
  {name:'🇩🇰 Denmark', rate:25, info:'Standard 25%.'},
  {name:'🇳🇴 Norway', rate:25, info:'Standard 25%, reduced 15%/12%.'},
  {name:'🇨🇭 Switzerland', rate:8.1, info:'Standard 8.1%, reduced 3.8%/2.6%.'},
  {name:'🇮🇪 Ireland', rate:23, info:'Standard 23%, reduced 13.5%/9%/4.8%/0%.'},
  {name:'🇵🇹 Portugal', rate:23, info:'Standard 23%, reduced 13%/6%.'},
  {name:'🇵🇱 Poland', rate:23, info:'Standard 23%, reduced 8%/5%.'},
  {name:'🇦🇹 Austria', rate:20, info:'Standard 20%, reduced 10%/13%.'},
  {name:'🇧🇪 Belgium', rate:21, info:'Standard 21%, reduced 12%/6%.'},
  {name:'🇬🇷 Greece', rate:24, info:'Standard 24%, reduced 13%/6%.'},
  {name:'🇫🇮 Finland', rate:25.5, info:'Standard 25.5%, reduced 14%/10%.'},
  {name:'🇨🇿 Czechia', rate:21, info:'Standard 21%, reduced 12%.'},
  {name:'🇭🇺 Hungary', rate:27, info:'Standard 27%, highest in EU.'},
  {name:'🇷🇴 Romania', rate:21, info:'Standard 21%, reduced 11%/5%.'},
  {name:'🇺🇸 US (avg)', rate:8.5, info:'US has no federal VAT — sales tax varies by state (0-10%).'},
  {name:'🇨🇦 Canada GST', rate:5, info:'Federal GST 5%. Combined HST 13-15% in some provinces.'},
  {name:'🇨🇦 Ontario HST', rate:13, info:'Ontario HST 13%.'},
  {name:'🇦🇺 Australia GST', rate:10, info:'Standard 10%.'},
  {name:'🇳🇿 NZ GST', rate:15, info:'Standard 15%.'},
  {name:'🇮🇳 India GST', rate:18, info:'Standard 18%. Also 5%, 12%, 28% slabs.'},
  {name:'🇸🇬 Singapore GST', rate:9, info:'Standard 9% (raised from 8% in 2023, 11% by 2024).'},
  {name:'🇯🇵 Japan', rate:10, info:'Standard 10%, reduced 8% for food.'},
  {name:'🇿🇦 South Africa', rate:15, info:'Standard 15% VAT.'},
  {name:'🇲🇽 Mexico', rate:16, info:'Standard 16% IVA.'},
  {name:'🇧🇷 Brazil', rate:17, info:'ICMS varies by state, 17-20% average.'},
  {name:'🇨🇳 China', rate:13, info:'Standard 13%. Also 9% and 6% reduced rates.'},
  {name:'🇰🇷 S. Korea', rate:10, info:'Standard 10% VAT.'},
  {name:'🇹🇷 Turkey', rate:20, info:'Standard 20%, reduced 10%/1%.'},
  {name:'🇷🇺 Russia', rate:20, info:'Standard 20% VAT.'},
  {name:'🇸🇦 Saudi Arabia', rate:15, info:'Standard 15% VAT.'},
  {name:'🇦🇪 UAE', rate:5, info:'Standard 5% VAT.'},
];

function renderPresets() {
  $('#presets').innerHTML = PRESETS.map((p,i) => `<div class="vat-preset" data-idx="${i}">${p.name}<br>${p.rate}%</div>`).join('');
  document.querySelectorAll('.vat-preset').forEach(el => {
    el.addEventListener('click', () => {
      const p = PRESETS[+el.dataset.idx];
      $('#rate').value = p.rate;
      $('#info').textContent = p.info;
      document.querySelectorAll('.vat-preset').forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      compute();
    });
  });
}

function compute() {
  const amount = parseFloat($('#amount').value) || 0;
  const rate = parseFloat($('#rate').value) || 0;
  let net, tax, gross;
  if (mode === 'add') {
    net = amount;
    tax = amount * rate / 100;
    gross = net + tax;
  } else {
    gross = amount;
    net = amount / (1 + rate / 100);
    tax = gross - net;
  }
  $('#net').textContent = '$' + net.toFixed(2);
  $('#tax').textContent = '$' + tax.toFixed(2) + ' (' + rate.toString() + '%)';
  $('#gross').textContent = '$' + gross.toFixed(2);
  $('#big').textContent = (mode === 'add' ? 'Gross: ' : 'Net: ') + '$' + (mode === 'add' ? gross : net).toFixed(2);
  document.getElementById('lblResult').textContent = t('lblResult') + (mode === 'add' ? ' (after adding tax)' : ' (after removing tax)');
}

document.querySelectorAll('.vat-mode').forEach(m => {
  m.addEventListener('click', () => {
    document.querySelectorAll('.vat-mode').forEach(x => x.classList.remove('active'));
    m.classList.add('active');
    mode = m.dataset.mode;
    compute();
  });
});

['#amount','#rate'].forEach(s => $(s).addEventListener('input', compute));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="compute()">🔄 Recalculate</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#amount').value=100;$('#rate').value=20;mode='add';document.querySelectorAll('.vat-mode').forEach(m=>m.classList.toggle('active',m.dataset.mode==='add'));compute()">🔄 Reset</button>`;

renderPresets();
compute();
GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/discount-calculator.html', name:'Discount Calculator'},
    {icon:'💼', href:'/calc/salary-calculator.html', name:'Salary Calculator'},
    {icon:'🏷️', href:'/calc/sales-tax-calculator.html', name:'Sales Tax'},
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
  ]
});
</script>
</body></html>
