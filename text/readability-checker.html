    words: '字数', sentences: '句子数', syllables: '音节数', characters: '字符数',
    avgWordLen: '平均词长', avgSentLen: '平均句长',
    fleschRE: 'Flesch 阅读容易度', fleschREDesc: '0 (难) – 100 (易)',
    fleschKG: 'Flesch-Kincaid 年级', fleschKGDesc: '美国年级水平',
    gunningFog: 'Gunning Fog 指数', gunningFogDesc: '所需受教育年限',
    smog: 'SMOG 指数', smogDesc: '完全理解所需年限',
    coleman: 'Coleman-Liau 指数', colemanDesc: '美国年级水平(基于字符)',
    excellent: '极佳 — 非常易读。',

    fair: '一般 — 略显困难，建议缩短句子。',

const { $, copyText, t } = GZ;

function countSyllables(word) {
  word = word.toLowerCase().replace(/[^a-z]/g, '');
  if (!word) return 0;
  if (word.length <= 3) return 1;
  word = word.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, '');
  word = word.replace(/^y/, '');
  const m = word.match(/[aeiouy]{1,2}/g);
  return m ? m.length : 1;
}

function countComplexWords(text) {
  // Words with 3+ syllables (excluding common suffixes)
  const words = text.match(/\b[a-zA-Z]+\b/g) || [];
  let count = 0;
  words.forEach(w => {
    if (countSyllables(w) >= 3) count++;
  });
  return count;
}

function analyze() {
  const text = $('#input').value;
  const sentences = (text.match(/[^.!?]+[.!?]+/g) || []).length || (text.trim() ? 1 : 0);
  const words = (text.match(/\b[a-zA-Z]+\b/g) || []);
  const wordCount = words.length;
  const charCount = text.replace(/\s/g, '').length;
  let syllableCount = 0;
  words.forEach(w => syllableCount += countSyllables(w));
  const complexWords = countComplexWords(text);
  const avgWordLen = wordCount ? (charCount / wordCount).toFixed(2) : 0;
  const avgSentLen = sentences ? (wordCount / sentences).toFixed(1) : 0;

  $('#basics').innerHTML = `
    <div class="basic"><div class="num">${wordCount}</div><div class="lbl">${t('words')}</div></div>
    <div class="basic"><div class="num">${sentences}</div><div class="lbl">${t('sentences')}</div></div>
    <div class="basic"><div class="num">${syllableCount}</div><div class="lbl">${t('syllables')}</div></div>
    <div class="basic"><div class="num">${charCount}</div><div class="lbl">${t('characters')}</div></div>
    <div class="basic"><div class="num">${avgWordLen}</div><div class="lbl">${t('avgWordLen')}</div></div>
    <div class="basic"><div class="num">${avgSentLen}</div><div class="lbl">${t('avgSentLen')}</div></div>
  `;

  if (wordCount === 0 || sentences === 0) {
    $('#scores').innerHTML = '';
    $('#tip').style.display = 'none';
    return;
  }

  // Flesch Reading Ease
  const fre = 206.835 - 1.015 * (wordCount / sentences) - 84.6 * (syllableCount / wordCount);
  // Flesch-Kincaid Grade Level
  const fkg = 0.39 * (wordCount / sentences) + 11.8 * (syllableCount / wordCount) - 15.59;
  // Gunning Fog
  const fog = 0.4 * ((wordCount / sentences) + 100 * (complexWords / wordCount));
  // SMOG (use full formula)
  const smog = 1.0430 * Math.sqrt(complexWords * (30 / sentences)) + 3.1291;
  // Coleman-Liau
  const L = (wordCount / sentences) * 100; // not used; L is avg words per 100 words actually avg chars per 100
  const col = wordCount ? (0.0588 * (charCount / wordCount * 100) - 0.296 * (sentences / wordCount * 100) - 15.8) : 0;

  const tipText = fre >= 80 ? t('excellent')
    : fre >= 60 ? t('good')
    : fre >= 50 ? t('fair')
    : fre >= 30 ? t('difficult') : t('veryDifficult');

  $('#scores').innerHTML = `
    <div class="score-card">
      <div class="title">${t('fleschRE')}</div>
      <div class="value">${fre.toFixed(1)}</div>
      <div class="desc">${t('fleschREDesc')}</div>
      <div class="bar"><div style="width:${Math.max(0, Math.min(100, fre))}%"></div></div>
    </div>
    <div class="score-card">
      <div class="title">${t('fleschKG')}</div>
      <div class="value">${Math.max(0, fkg).toFixed(1)}</div>
      <div class="desc">${t('fleschKGDesc')}</div>
    </div>
    <div class="score-card">
      <div class="title">${t('gunningFog')}</div>
      <div class="value">${Math.max(0, fog).toFixed(1)}</div>
      <div class="desc">${t('gunningFogDesc')}</div>
    </div>
    <div class="score-card">
      <div class="title">${t('smog')}</div>
      <div class="value">${Math.max(0, smog).toFixed(1)}</div>
      <div class="desc">${t('smogDesc')}</div>
    </div>
    <div class="score-card">
      <div class="title">${t('coleman')}</div>
      <div class="value">${Math.max(0, col).toFixed(1)}</div>
      <div class="desc">${t('colemanDesc')}</div>
    </div>
  `;

  const tip = $('#tip');
  tip.innerHTML = `<strong>${t('tipTitle')}</strong> ${tipText}`;
  tip.style.display = '';
}

function loadExample() {
  $('#input').value = `The quick brown fox jumps over the lazy dog. Reading is fun and educational. It opens new worlds and broadens your mind. People who read regularly tend to be more empathetic and well-informed. Try to read at least one book per month for personal growth.`;
  analyze();
}

$('#input').addEventListener('input', analyze);
$('#input').placeholder = t('placeholder');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example') || 'Example'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';analyze()">${t('clear')}</button>
