let selectedZones = [];
let updateTimer = null;

function getTimeForZone(tz) {
  const now = new Date();
  const formatter = new Intl.DateTimeFormat('en-US', {
    timeZone: tz,
    year:'numeric', month:'short', day:'2-digit',
    hour:'2-digit', minute:'2-digit', second:'2-digit',
    hour12: false, timeZoneName: 'shortOffset'
  });
  const parts = formatter.formatToParts(now);
  const obj = {};
  for (const p of parts) obj[p.type] = p.value;
  // Build offset
  let offset = obj.timeZoneName || '';
  offset = offset.replace('GMT','UTC');
  // Detect DST
  const dateFormatter = new Intl.DateTimeFormat('en-US', { timeZone: tz, month: 'long' });
  const monthName = dateFormatter.format(now);
  // Simple DST heuristic for northern/southern hemisphere
  const isDST = checkDST(tz, now);
  return {
    time: `${obj.hour}:${obj.minute}:${obj.second}`,
    date: `${obj.month} ${obj.day}, ${obj.year}`,
    offset: offset,
    isDST: isDST,
  };
}

function checkDST(tz, date) {
  // Compare offset in January vs July to detect DST-observing zones
  try {
    const jan = new Date(date.getFullYear(), 0, 15);
    const jul = new Date(date.getFullYear(), 6, 15);
    const janOff = getOffsetMinutes(tz, jan);
    const julOff = getOffsetMinutes(tz, jul);
    const currentOff = getOffsetMinutes(tz, date);
    const stdOff = Math.max(janOff, julOff); // standard = larger (less negative in north)
    return currentOff < stdOff; // DST = smaller offset in north (clocks forward)
  } catch { return false; }
}

function getOffsetMinutes(tz, date) {
  const dtf = new Intl.DateTimeFormat('en-US', {timeZone:tz, timeZoneName:'shortOffset'});
  const parts = dtf.formatToParts(date);
  const offPart = parts.find(p => p.type === 'timeZoneName');
  if (!offPart) return 0;
  const m = offPart.value.match(/GMT([+-])(\d{1,2}):?(\d{2})?/i);
  if (!m) return 0;
  const sign = m[1] === '+' ? 1 : -1;
  const h = parseInt(m[2]) || 0;
  const min = parseInt(m[3]) || 0;
  return sign * (h * 60 + min);
}

function renderGrid() {
  const query = $('#search').value.toLowerCase().trim();
  const filtered = query
    ? CITIES.filter(c => c.city.toLowerCase().includes(query) || c.country.toLowerCase().includes(query) || c.tz.toLowerCase().includes(query) || c.code.toLowerCase().includes(query))
    : CITIES.slice(0, 24); // Show first 24 by default

  let html = '';
  for (const c of filtered) {
    const info = getTimeForZone(c.tz);
    html += `<div class="tz-card" onclick="toggleCompare('${c.tz}','${c.city.replace(/'/g,"\\'")}')">
      <div class="tz-city">${c.city}</div>
      <div class="tz-zone">${c.country} · ${c.code}</div>
      <div class="tz-time" data-tz="${c.tz}">${info.time}</div>
      <div class="tz-date">${info.date}</div>
      <span class="tz-offset">${info.offset}</span>
      ${info.isDST ? `<span class="tz-dst">DST</span>` : ''}
    </div>`;
  }
  $('#grid').innerHTML = html || '<div style="padding:20px;color:var(--text2)">No cities found.</div>';
}

function toggleCompare(tz, city) {
  const idx = selectedZones.findIndex(z => z.tz === tz);
  if (idx >= 0) selectedZones.splice(idx, 1);
  else selectedZones.push({tz, city});
  renderCompare();
}

function renderCompare() {
  if (selectedZones.length < 2) {
    $('#compare-panel').style.display = 'none';
    return;
  }
  $('#compare-panel').style.display = 'block';
  $('#compare-title').textContent = t('compareTitle');
  let html = '';
  for (let i = 0; i < selectedZones.length; i++) {
    for (let j = i + 1; j < selectedZones.length; j++) {
      const a = selectedZones[i];
      const b = selectedZones[j];
      const offA = getOffsetMinutes(a.tz, new Date());
      const offB = getOffsetMinutes(b.tz, new Date());
      const diff = (offB - offA) / 60;
      const sign = diff > 0 ? '+' : '';
      const label = diff === 0 ? t('sameTime') : `${Math.abs(diff)} ${diff > 0 ? t('hoursAhead') : t('hoursBehind')}`;
      html += `<div class="tz-compare-row">
        <span><strong>${a.city}</strong> → <strong>${b.city}</strong></span>
        <span class="diff-val">${label}</span>
      </div>`;
    }
  }
  $('#compare-rows').innerHTML = html;
}

function tick() {
  // Update all visible time displays
  document.querySelectorAll('.tz-time[data-tz]').forEach(el => {
    const tz = el.dataset.tz;
    const info = getTimeForZone(tz);
    el.textContent = info.time;
  });
}

function startClock() {
  if (updateTimer) clearInterval(updateTimer);
  updateTimer = setInterval(tick, 1000);
}

renderGrid();
startClock();
