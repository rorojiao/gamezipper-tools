<div class="gz-container">
  <div class="gz-tool-header">

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'YouTube Description Generator',
    toolDesc: 'Write SEO-optimized YouTube descriptions with hooks, timestamps, hashtags, links and CTAs. Pick a template, fill the blanks, copy — no signup.',
    titleField: 'Video Title',
    templateField: 'Template',
    channelField: 'Channel Name',
    summaryField: 'Video Summary (what happens)',
    hashtagsField: 'Hashtags (comma-separated)',
    ctaField: 'Call to Action (e.g. Subscribe for more!)',
    linksField: 'Links / Social (one per line)',
    outputLabel: 'Generated Description',
    chars: 'Characters',
    words: 'Words',
    lines: 'Lines',
    step1: 'Enter your video title and pick a template',
    step2: 'Add a short summary of what the video covers',
    step3: 'Fill in hashtags, call-to-action and links',
    step4: 'Copy the generated description into YouTube Studio',
    phTitle: 'How to Edit Videos Like a Pro in 2026',
    phChannel: 'CreatorName',
    phSummary: 'In this video I walk through my full editing workflow using free tools…',
    phHashtags: 'videoediting, tutorial, 2026',
    phCta: 'Subscribe for weekly editing tips!',
    phLinks: 'https://twitter.com/yourhandle\nhttps://patreon.com/yourpage',
  },
  zh: {
    toolTitle: 'YouTube 简介生成器',
    toolDesc: '生成 SEO 优化的 YouTube 视频简介，包含开头钩子、时间戳、话题标签、链接和行动号召。选择模板，填空，复制即可 — 无需注册。',
    titleField: '视频标题',
    templateField: '模板',
    channelField: '频道名称',
    summaryField: '视频摘要（讲了什么）',
    hashtagsField: '话题标签（逗号分隔）',
    ctaField: '行动号召（例如：订阅获取更多！）',
    linksField: '链接 / 社交（每行一个）',
    outputLabel: '生成的简介',
    chars: '字符数',
    words: '词数',
    lines: '行数',
    step1: '输入视频标题并选择模板',
    step2: '添加简短的视频内容摘要',
    step3: '填写话题标签、行动号召和链接',
    step4: '将生成的简介复制到 YouTube 创作者工作室',
    phTitle: '2026 年如何专业剪辑视频',
    phChannel: '创作者名',
    phSummary: '在这个视频中，我将演示使用免费工具的完整剪辑流程…',
    phHashtags: '视频剪辑, 教程, 2026',
    phCta: '订阅频道，每周获取剪辑技巧！',
    phLinks: 'https://twitter.com/你的账号\nhttps://patreon.com/你的页面',
  }
});

const { $, copyText, t } = GZ;

const HOOKS = {
  tutorial: ['In this step-by-step tutorial,', 'Learn exactly how to', "Here's the complete guide to"],
  review: ['In this honest review,', "I tested this so you don't have to.", 'Full hands-on review of'],
  vlog: ['Welcome back to the channel!', 'Today we', 'Come along as I'],
  gaming: ['In this gameplay,', 'Let\'s play', 'Watch me'],
  music: ['Official audio for', 'New single —', 'Listen to'],
  podcast: ['In this episode,', 'We sit down to discuss', 'Join us as we talk about'],
  generic: ['In this video,', 'Today I', 'Watch as I'],
};

function gen() {
  const title = ($('#f-title').value || '').trim();
  const channel = ($('#f-channel').value || '').trim();
  const summary = ($('#f-summary').value || '').trim();
  const hashtagsRaw = ($('#f-hashtags').value || '').trim();
  const cta = ($('#f-cta').value || '').trim();
  const links = ($('#f-links').value || '').trim();
  const template = $('#f-template').value;

  if (!title && !summary) { $('#output').textContent = ''; $('#stats').innerHTML=''; return; }

  const hook = HOOKS[template][0];
  const parts = [];

  // Hook + summary
  const lead = summary ? `${hook} ${summary.charAt(0).toLowerCase() + summary.slice(1)}` : `${hook} ${title}.`;
  parts.push(lead);
  parts.push('');

  // Chapters placeholder
  parts.push('⏱️ Chapters:');
  parts.push('0:00 Intro');
  if (template === 'tutorial' || template === 'review') parts.push('2:30 Main Content');
  parts.push('8:45 Tips & Tricks');
  parts.push('12:00 Final Thoughts');
  parts.push('');

  // CTA
  if (cta) { parts.push(cta); parts.push(''); }

  // Links
  if (links) {
    parts.push('🔗 Links:');
    links.split('\n').filter(l => l.trim()).forEach(l => parts.push(l.trim()));
    parts.push('');
  }

  // Hashtags
  if (hashtagsRaw) {
    const tags = hashtagsRaw.split(/[,，]/).map(s => s.trim()).filter(Boolean).map(s => s.startsWith('#') ? s : '#' + s.replace(/\s+/g, ''));
    parts.push(tags.join(' '));
  }

  const out = parts.join('\n').trim();
  $('#output').textContent = out;

  const chars = out.length;
  const words = out.trim() ? out.trim().split(/\s+/).length : 0;
  const lines = out.split('\n').length;
  $('#stats').innerHTML = `<span><b>${chars}</b> ${t('chars')}</span><span><b>${words}</b> ${t('words')}</span><span><b>${lines}</b> ${t('lines')}</span><span><b>${chars > 5000 ? '⚠ over 5000!' : '✓ under 5000'}</b></span>`;
}

['f-title','f-channel','f-summary','f-hashtags','f-cta','f-links'].forEach(id => {
  $('#'+id).addEventListener('input', gen);
});

// Set placeholders
$('#f-title').setAttribute('placeholder', t('phTitle'));
$('#f-channel').setAttribute('placeholder', t('phChannel'));
$('#f-summary').setAttribute('placeholder', t('phSummary'));
$('#f-hashtags').setAttribute('placeholder', t('phHashtags'));
$('#f-cta').setAttribute('placeholder', t('phCta'));
$('#f-links').setAttribute('placeholder', t('phLinks'));

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="['f-title','f-channel','f-summary','f-hashtags','f-cta','f-links'].forEach(id=>document.getElementById(id).value='');gen()">${t('clear')}</button>`;

gen();

GZ.renderToolPage({
  category: 'social',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏷️', href:'/seo/meta-tag-generator.html', name:'Meta Tag Generator'},
    {icon:'📱', href:'/text/instagram-caption-generator.html', name:'Instagram Caption'},
    {icon:'🐦', href:'/social/twitter-bio.html', name:'Twitter Bio'},
    {icon:'📝', href:'/text/word-counter.html', name:'Word Counter'},
  ]
});
</script>

</body>
