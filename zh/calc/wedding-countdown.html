<script>
GZI18n.register({
  en: {
    toolTitle: 'Wedding Countdown Calculator',
    toolDesc: 'Live countdown to your wedding day — days, weeks, hours, minutes and seconds. Includes a 12-item planning checklist with progress tracking. Free, private, browser-only.',
    names: 'Your names (optional)',
    date: 'Wedding date & time',
    checklist: 'Wedding planning checklist',
    days: 'days', hours: 'hours', minutes: 'minutes', seconds: 'seconds',
    remaining: 'days until the wedding',
    weeksLeft: 'weeks to go',
    arrived: '💍 It\u2019s your wedding day — congratulations!',
    reset: 'Reset',
    progress: 'progress',
    step1: 'Enter your wedding date (and optionally your names)',
    step2: 'Watch the live countdown update every second',
    step3: 'Tick off the 12-item planning checklist as you go',
    step4: 'Everything is saved locally in your browser — totally private',
  },
  zh: {
    toolTitle: '婚礼倒计时计算器',
    toolDesc: '婚礼当天的实时倒计时 — 天、周、时、分、秒。含 12 项筹备清单和进度跟踪。免费、私密、浏览器本地运行。',
    names: '你们的名字（可选）',
    date: '婚礼日期和时间',
    checklist: '婚礼筹备清单',
    days: '天', hours: '时', minutes: '分', seconds: '秒',
    remaining: '天后就是婚礼',
    weeksLeft: '周倒计时',
    arrived: '💍 婚礼当天 — 恭喜你们！',
    reset: '重置',
    progress: '进度',
    step1: '输入婚礼日期（可选填你们的名字）',
    step2: '查看每秒更新的实时倒计时',
    step3: '逐项勾选 12 项婚礼筹备清单',
    step4: '所有内容保存在浏览器本地 — 完全私密',
  }
});

const { $, t } = GZ;
const LS_KEY = 'gz-wedding-countdown-v1';

const DEFAULT_CHECKLIST_EN = [
  'Set the date','Book the venue','Buy the dress / outfit','Order rings',
  'Send invitations','Book catering','Choose flowers','Book photographer',
  'Arrange music / DJ','Plan honeymoon','Finalise seating','Marriage license'
];
const DEFAULT_CHECKLIST_ZH = [
  '确定婚期','预订场地','选购婚纱/礼服','订购戒指',
  '发送请柬','预订餐饮','选定花艺','预订摄影',
  '安排音乐/DJ','规划蜜月','敲定座位','结婚证'
];

let state = { names: '', date: '', done: {} };

function load(){ try{ const s = JSON.parse(localStorage.getItem(LS_KEY)); if(s){ state = Object.assign(state, s); } }catch(e){} }
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){} }

const checklist = GZI18n.getLang() === 'zh' ? DEFAULT_CHECKLIST_ZH : DEFAULT_CHECKLIST_EN;

function renderChecklist(){
  const done = Object.values(state.done).filter(Boolean).length;
  const pct = Math.round(done/checklist.length*100);
  $('#bar').style.width = pct+'%';
  $('#prog-txt').textContent = `${done}/${checklist.length} · ${pct}% ${t('progress')}`;
  $('#check').innerHTML = checklist.map((item,i)=>{
    const d = !!state.done[i];
    return `<label class="wc-item ${d?'done':''}">
      <input type="checkbox" ${d?'checked':''} onchange="toggle(${i}, this.checked)">
      <span>${item}</span>
    </label>`;
  }).join('');
}
window.toggle = function(i, v){ state.done[i] = v; save(); renderChecklist(); };

function update(){
  const val = $('#date').value;
  if(!val){ $('#big').textContent='—'; $('#sub').textContent=''; $('#tag').textContent=''; ['d','h','m','s'].forEach(k=> $('#n-'+k).textContent='0'); return; }
  const target = new Date(val);
  const now = new Date();
  const diff = target - now;
  const abs = Math.abs(diff);
  const totalSec = Math.floor(abs/1000);
  const days = Math.floor(totalSec/86400);
  const hours = Math.floor((totalSec%86400)/3600);
  const mins = Math.floor((totalSec%3600)/60);
  const secs = totalSec%60;
  $('#n-d').textContent=days; $('#n-h').textContent=hours; $('#n-m').textContent=mins; $('#n-s').textContent=secs;
  const names = $('#names').value.trim();
  if(abs < 1500){ $('#big').textContent='💍'; $('#sub').textContent = t('arrived'); }
  else if(diff > 0){ $('#big').textContent = days; $('#sub').textContent = t('remaining'); }
  else { $('#big').textContent = days; $('#sub').textContent = `${days} ${t('days')} ${t('arrived').split('—')[0]}`; }
  const weeks = Math.floor(days/7);
  $('#tag').textContent = (names ? names + ' · ' : '') + (weeks>0 ? `${weeks} ${t('weeksLeft')}` : '');
}

$('#lbl-names').textContent = t('names');
$('#lbl-date').textContent = t('date');
$('#lbl-check').textContent = t('checklist');
$('#l-d').textContent = t('days'); $('#l-h').textContent = t('hours');
$('#l-m').textContent = t('minutes'); $('#l-s').textContent = t('seconds');

load();
$('#names').value = state.names || '';
$('#date').value = state.date || '';
renderChecklist();

$('#names').addEventListener('input', e=>{ state.names = e.target.value; save(); update(); });
$('#date').addEventListener('input', e=>{ state.date = e.target.value; save(); update(); });

function reset(){ state = { names:'', date:'', done:{} }; save(); $('#names').value=''; $('#date').value=''; renderChecklist(); update(); }

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;

clearInterval(window._wcT);
window._wcT = setInterval(update, 1000);
update();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏳', href:'/calc/countdown-calculator.html', name:'Countdown Calculator'},
    {icon:'📅', href:'/calc/anniversary-calculator.html', name:'Anniversary'},
    {icon:'🎂', href:'/calc/age-calculator.html', name:'Age Calculator'},
    {icon:'🤰', href:'/calc/due-date.html', name:'Due Date'},
  ]
});
</script>
