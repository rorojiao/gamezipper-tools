<script>
GZI18n.register({
  en: {
    toolTitle: 'IP Geolocation Lookup',
    toolDesc: 'Look up any IP address to find its geolocation, ISP, ASN, timezone, and more — or auto-detect your own IP.',
    lookup: 'Lookup',
    myIp: 'My IP',
    clear: 'Clear',
    loading: 'Looking up...',
    noResults: 'Enter an IP address and click Lookup, or click My IP to auto-detect.',
    invalidIp: 'Please enter a valid IPv4 or IPv6 address.',
    error: 'Lookup failed. Please try again.',
    field_ip: 'IP Address',
    field_city: 'City',
    field_region: 'Region',
    field_country: 'Country',
    field_location: 'Location',
    field_timezone: 'Timezone',
    field_isp: 'ISP',
    field_org: 'Organization',
    field_as: 'AS Number',
    field_postal: 'Postal Code',
    field_asn: 'ASN',
    step1: 'Enter an IP address or click "My IP" to auto-detect',
    step2: 'Click "Lookup" to fetch geolocation data',
    step3: 'View detailed results including city, country, ISP, and timezone',
    step4: 'See the approximate location on the map',
  },
  zh: {
    toolTitle: 'IP 地理位置查询',
    toolDesc: '查询任意 IP 地址的地理位置、ISP、ASN、时区等信息，也可自动检测您的 IP。',
    lookup: '查询',
    myIp: '我的 IP',
    clear: '清除',
    loading: '正在查询...',
    noResults: '输入 IP 地址并点击查询，或点击"我的 IP"自动检测。',
    invalidIp: '请输入有效的 IPv4 或 IPv6 地址。',
    error: '查询失败，请重试。',
    field_ip: 'IP 地址',
    field_city: '城市',
    field_region: '地区',
    field_country: '国家',
    field_location: '坐标',
    field_timezone: '时区',
    field_isp: 'ISP',
    field_org: '组织',
    field_as: 'AS 编号',
    field_postal: '邮政编码',
    field_asn: 'ASN',
    step1: '输入 IP 地址或点击"我的 IP"自动检测',
    step2: '点击"查询"获取地理位置数据',
    step3: '查看详细结果，包括城市、国家、ISP 和时区',
    step4: '在地图上查看大致位置',
  }
});

const { $, copyText, t } = GZ;

function isValidIp(ip) {
  return /^(\d{1,3}\.){3}\d{1,3}$/.test(ip) || /^([0-9a-fA-F]{0,4}:){2,7}[0-9a-fA-F]{0,4}$/.test(ip);
}

function renderResult(data) {
  const fields = [
    { label: t('field_ip'), value: data.query },
    { label: t('field_city'), value: data.city },
    { label: t('field_region'), value: data.regionName },
    { label: t('field_country'), value: data.country },
    { label: t('field_location'), value: data.lat && data.lon ? `${data.lat}, ${data.lon}` : '' },
    { label: t('field_timezone'), value: data.timezone },
    { label: t('field_isp'), value: data.isp },
    { label: t('field_org'), value: data.org },
    { label: t('field_asn'), value: data.as },
    { label: t('field_postal'), value: data.zip },
  ];

  $('#results').innerHTML = fields.map(f =>
    `<div class="ip-card"><div class="label">${f.label}</div><div class="value ${f.value ? '' : 'empty'}">${f.value || '—'}</div></div>`
  ).join('');

  if (data.lat && data.lon) {
    $('#map-container').style.display = 'block';
    $('#map-frame').src = `https://www.openstreetmap.org/export/embed.html?bbox=${data.lon-0.5},${data.lat-0.5},${data.lon+0.5},${data.lat+0.5}&layer=mapnik&marker=${data.lat},${data.lon}`;
  } else {
    $('#map-container').style.display = 'none';
  }
}

async function doLookup(ip) {
  const target = ip || '';
  $('#status').innerHTML = `<span style="color:var(--text2)">${t('loading')}</span>`;
  $('#results').innerHTML = '';
  $('#map-container').style.display = 'none';

  try {
    const url = target ? `http://ip-api.com/json/${target}` : 'http://ip-api.com/json/';
    const res = await fetch(url);
    const data = await res.json();
    if (data.status === 'success') {
      renderResult(data);
      $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${data.query}</span>`;
    } else {
      $('#status').innerHTML = `<span style="color:var(--gz-accent)">${data.message || t('error')}</span>`;
    }
  } catch(e) {
    // Fallback to another API
    try {
      const url2 = target ? `https://ipapi.co/${target}/json/` : 'https://ipapi.co/json/';
      const res2 = await fetch(url2);
      const d = await res2.json();
      if (d.error) throw new Error(d.reason);
      renderResult({
        query: d.ip, city: d.city, regionName: d.region, country: d.country_name,
        lat: d.latitude, lon: d.longitude, timezone: d.timezone, isp: d.org,
        org: d.org, as: d.asn, zip: d.postal
      });
      $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${d.ip}</span>`;
    } catch(e2) {
      $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('error')}</span>`;
    }
  }
}

function onLookup() {
  const ip = $('#ip-input').value.trim();
  if (ip && !isValidIp(ip)) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidIp')}</span>`;
    return;
  }
  doLookup(ip);
}

function onMyIp() {
  $('#ip-input').value = '';
  doLookup('');
}

function doClear() {
  $('#ip-input').value = '';
  $('#results').innerHTML = '';
  $('#map-container').style.display = 'none';
  $('#status').innerHTML = `<span style="color:var(--text2)">${t('noResults')}</span>`;
}

$('#ip-input').addEventListener('keydown', e => { if (e.key === 'Enter') onLookup(); });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="onLookup()">${t('lookup')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="onMyIp()">${t('myIp')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#status').innerHTML = `<span style="color:var(--text2)">${t('noResults')}</span>`;

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌐', href:'/dev/what-is-my-ip.html', name:'What Is My IP'},
    {icon:'🔍', href:'/dev/dns-lookup.html', name:'DNS Lookup'},
    {icon:'📡', href:'/dev/http-headers-checker.html', name:'HTTP Headers'},
    {icon:'🔐', href:'/dev/ssl-checker.html', name:'SSL Checker'},
  ]
});
</script>
