<script>
GZI18n.register({
  en: {
    toolTitle: 'Length Converter',
    toolDesc: 'Convert between mm, cm, m, km, inches, feet, yards, miles, nautical miles and more — instantly and free.',
    from: 'From',
    to: 'To',
    swap: 'Swap',
    clear: 'Clear',
    copy: 'Copy',
    copied: 'Copied!',
    result: 'Result',
    step1: 'Enter a value in the input field',
    step2: 'Select the source unit (From)',
    step3: 'Select the target unit (To)',
    step4: 'The result updates instantly as you type',
  },
  zh: {
    toolTitle: '长度单位转换器',
    toolDesc: '在毫米、厘米、米、公里、英寸、英尺、码、英里、海里等单位之间即时免费转换。',
    from: '从',
    to: '到',
    swap: '交换',
    clear: '清除',
    copy: '复制',
    copied: '已复制！',
    result: '结果',
    step1: '在输入框中输入数值',
    step2: '选择源单位（从）',
    step3: '选择目标单位（到）',
    step4: '输入时结果即时更新',
  }
});

const { $, copyText, t } = GZ;

const UNITS = [
  { id: 'mm', label: 'Millimeter (mm)', zh: '毫米 (mm)', factor: 0.001 },
  { id: 'cm', label: 'Centimeter (cm)', zh: '厘米 (cm)', factor: 0.01 },
  { id: 'dm', label: 'Decimeter (dm)', zh: '分米 (dm)', factor: 0.1 },
  { id: 'm', label: 'Meter (m)', zh: '米 (m)', factor: 1 },
  { id: 'km', label: 'Kilometer (km)', zh: '公里 (km)', factor: 1000 },
  { id: 'in', label: 'Inch (in)', zh: '英寸 (in)', factor: 0.0254 },
  { id: 'ft', label: 'Foot (ft)', zh: '英尺 (ft)', factor: 0.3048 },
  { id: 'yd', label: 'Yard (yd)', zh: '码 (yd)', factor: 0.9144 },
  { id: 'mi', label: 'Mile (mi)', zh: '英里 (mi)', factor: 1609.344 },
  { id: 'nmi', label: 'Nautical Mile (nmi)', zh: '海里 (nmi)', factor: 1852 },
  { id: 'mil', label: 'Mil (mil)', zh: '密耳 (mil)', factor: 0.0000254 },
  { id: 'micron', label: 'Micrometer (μm)', zh: '微米 (μm)', factor: 0.000001 },
  { id: 'nm', label: 'Nanometer (nm)', zh: '纳米 (nm)', factor: 1e-9 },
];

const lang = GZI18n.getLang();
const opts = UNITS.map(u => `<option value="${u.id}">${lang === 'zh' ? u.zh : u.label}</option>`).join('');

$('#converter').innerHTML = `
  <div class="gz-converter-row">
    <input type="number" id="inputVal" placeholder="0" step="any" oninput="convert()">
    <select id="fromUnit" onchange="convert()">${opts}</select>
  </div>
  <div class="gz-converter-row" style="justify-content:center">
    <button class="gz-btn gz-btn-secondary" onclick="swapUnits()">⇅ ${t('swap')}</button>
  </div>
  <div class="gz-converter-row">
    <input type="text" id="outputVal" readonly>
    <select id="toUnit" onchange="convert()">${opts}</select>
  </div>
  <div id="formulaDisplay" style="margin-top:8px;font-size:.85em;opacity:.7"></div>
`;

$('#fromUnit').value = 'm';
$('#toUnit').value = 'ft';

function convert() {
  const val = parseFloat($('#inputVal').value);
  if (isNaN(val)) { $('#outputVal').value = ''; $('#formulaDisplay').textContent = ''; return; }
  const from = UNITS.find(u => u.id === $('#fromUnit').value);
  const to = UNITS.find(u => u.id === $('#toUnit').value);
  const meters = val * from.factor;
  const result = meters / to.factor;
  $('#outputVal').value = parseFloat(result.toPrecision(12));
  const ratio = from.factor / to.factor;
  const fromLabel = lang === 'zh' ? from.zh : from.label;
  const toLabel = lang === 'zh' ? to.zh : to.label;
  $('#formulaDisplay').textContent = `1 ${from.id} = ${parseFloat(ratio.toPrecision(10))} ${to.id}`;
}

function swapUnits() {
  const f = $('#fromUnit').value;
  const t = $('#toUnit').value;
  $('#fromUnit').value = t;
  $('#toUnit').value = f;
  convert();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#outputVal').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#inputVal').value='';$('#outputVal').value='';$('#formulaDisplay').textContent=''">${t('clear')}</button>
`;

convert();

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📏', href:'/convert/unit.html', name:'Unit Converter'},
    {icon:'📐', href:'/calc/area-calculator.html', name:'Area Calculator'},
    {icon:'📏', href:'/dev/css-units.html', name:'CSS Units'},
    {icon:'📐', href:'/calc/aspect-ratio.html', name:'Aspect Ratio'},
  ]
});
</script>
