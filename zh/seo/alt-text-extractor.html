<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"Why does image alt text matter for SEO?","acceptedAnswer":{"@type":"Answer","text":"Alt text helps search engines understand what an image shows, since crawlers cannot see pixels. Descriptive alt text can help images rank in Google Images and reinforces the page topic, while also being essential for screen readers."}},{"@type":"Question","name":"What is the difference between missing and empty alt text?","acceptedAnswer":{"@type":"Answer","text":"A missing alt attribute means the alt attribute is absent entirely. An empty alt (alt=\"\") is a deliberate signal that the image is decorative and should be skipped by assistive tech. Decorative images should use empty alt; meaningful images need descriptive text."}},{"@type":"Question","name":"Should every image have alt text?","acceptedAnswer":{"@type":"Answer","text":"Every image must have an alt attribute. Decorative images can use an empty alt, but informative images, logos, charts and buttons need concise descriptive text that conveys the same meaning as the image."}},{"@type":"Question","name":"Does this tool upload my HTML anywhere?","acceptedAnswer":{"@type":"Answer","text":"No. All parsing runs locally in your browser using DOMParser. Your HTML never leaves your device."}}]}</script>

<script>
GZI18n.register({en:{toolTitle:'Image Alt Text Extractor & Checker',toolDesc:'Paste HTML and instantly audit every image: list src, alt text, and flag missing or empty alt attributes for SEO and accessibility.',lblIn:'HTML source',lblOut:'Image audit',auditBtn:'Audit Images',step1:'Paste the HTML of a page or a fragment containing <img> tags.',step2:'Each image is shown with its source and alt text, color-coded by status.',step3:'Fix missing alt attributes — decorative images can use empty alt, informative ones need a description.',noImages:'No <img> tags found in the HTML.',emptyHint:'Paste HTML containing images to audit their alt text.',copyAll:'Copy All Alt Text',warn:'⚠ {n} image(s) are missing the alt attribute.',warnEmpty:'ℹ {n} image(s) use an empty alt (treated as decorative).',total:'Total',withAlt:'Has alt',missingAlt:'Missing alt',emptyAlt:'Empty alt'},zh:{toolTitle:'图片 Alt 文本提取与检查器',toolDesc:'粘贴 HTML，立即审计所有图片：列出 src、alt 文本，并标记缺失或为空的 alt 属性，助力 SEO 与无障碍优化。',lblIn:'HTML 源码',lblOut:'图片审计结果',auditBtn:'审计图片',step1:'粘贴页面 HTML 或包含 <img> 标签的片段。',step2:'每张图片会显示来源与 alt 文本，并按状态用颜色区分。',step3:'修复缺失的 alt 属性——装饰性图片可用空 alt，信息性图片需写描述。',noImages:'未在 HTML 中找到任何 <img> 标签。',emptyHint:'粘贴包含图片的 HTML 即可审计 alt 文本。',copyAll:'复制全部 Alt 文本',warn:'⚠ {n} 张图片缺少 alt 属性。',warnEmpty:'ℹ {n} 张图片使用了空 alt（视为装饰性）。',total:'总计',withAlt:'有 alt',missingAlt:'缺少 alt',emptyAlt:'空 alt'}});
const {$,copyText,t}=GZ;
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function audit(){
  const raw=$('#input').value.trim();
  if(!raw){$('#output').innerHTML=`<span style="opacity:.5">${t('emptyHint')}</span>`;$('#status').innerHTML='';return;}
  const doc=new DOMParser().parseFromString(raw,'text/html');
  const imgs=[...doc.querySelectorAll('img')];
  if(!imgs.length){$('#output').innerHTML=`<span style="color:var(--gz-accent)">${t('noImages')}</span>`;$('#status').innerHTML='';return;}
  let withAlt=0,missingAlt=0,emptyAlt=0;
  let html='';
  imgs.forEach((img,i)=>{
    const hasAttr=img.hasAttribute('alt');
    const alt=img.getAttribute('alt');
    const src=img.getAttribute('src')||'';
    let cls='alt-ok',label='';
    if(!hasAttr){cls='alt-missing';missingAlt++;label='alt missing';}
    else if(alt===''){cls='alt-empty';emptyAlt++;label='alt="" (decorative)';}
    else{withAlt++;}
    const display=hasAttr?(alt===''?'(empty)':esc(alt)):'—';
    html+=`<div class="img-row">
      <img class="img-thumb" src="${esc(src)}" alt="" onerror="this.style.opacity=.2">
      <div class="img-info">
        <div class="img-src">${src?esc(src):'<em>(no src)</em>'}</div>
        <div><span class="alt-text ${cls}"><strong>alt:</strong> ${display}${label?` <span style="opacity:.7">· ${esc(label)}</span>`:''}</span></div>
      </div>
    </div>`;
  });
  $('#output').innerHTML=html;
  let stat=`<div style="margin-bottom:6px">
    <span class="stat">${t('total')}: <strong>${imgs.length}</strong></span>
    <span class="stat" style="background:rgba(0,214,114,.12)">${t('withAlt')}: ${withAlt}</span>
    <span class="stat" style="background:rgba(233,69,96,.14)">${t('missingAlt')}: ${missingAlt}</span>
    <span class="stat" style="background:rgba(255,180,84,.14)">${t('emptyAlt')}: ${emptyAlt}</span>
  </div>`;
  const warns=[];
  if(missingAlt) warns.push(t('warn').replace('{n}',missingAlt));
  if(emptyAlt) warns.push(t('warnEmpty').replace('{n}',emptyAlt));
  if(warns.length) stat+='<div class="warn">'+warns.map(w=>`<div>${esc(w)}</div>`).join('')+'</div>';
  $('#status').innerHTML=stat;
}
function copyAll(){
  const doc=new DOMParser().parseFromString($('#input').value,'text/html');
  const lines=[...doc.querySelectorAll('img')].map(img=>{
    const alt=img.hasAttribute('alt')?img.getAttribute('alt'):'(MISSING)';
    return `${img.getAttribute('src')||''}\t${alt}`;
  });
  copyText(lines.join('\n'));
}
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="audit()">${t('auditBtn')}</button><button class="gz-btn gz-btn-secondary" onclick="copyAll()">${t('copyAll')}</button><button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button><button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';audit()">${t('clear')}</button>`;
function loadExample(){
  $('#input').value=`<article>
  <img src="hero-mountains.jpg" alt="Snow-capped mountain range at sunrise">
  <img src="logo.png" alt="GameZipper">
  <img src="divider-swoosh.svg" alt="">
  <img src="chart-2026.png">
  <img src="team-photo.jpg" alt="">
  <img src="icon-star.svg">
</article>`;
  audit();
}
window.copyAll=copyAll;
window.loadExample=loadExample;
$('#input').addEventListener('input',audit);
GZ.renderToolPage({category:'seo',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3'],related:[{icon:'📑',href:'/seo/heading-extractor.html',name:'Heading Extractor'},{icon:'🏷️',href:'/seo/meta-tag-extractor.html',name:'Meta Tag Extractor'},{icon:'🖼️',href:'/image/exif-viewer.html',name:'EXIF Viewer'},{icon:'🔍',href:'/seo/meta-tag-generator.html',name:'Meta Tag Generator'}]});
audit();
</script>
