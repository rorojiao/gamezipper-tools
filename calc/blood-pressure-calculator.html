.bp-chart th,.bp-chart td{padding:8px 10px;border:1px solid var(--border);font-size:.85em;text-align:left}

.bp-chart .cat-dot{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:6px;vertical-align:middle}
.warn{color:#e74c3c;font-size:.85em;margin-top:8px;padding:8px 12px;background:#fdf2f2;border-radius:8px}
</style>

<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is a normal blood pressure reading?","acceptedAnswer":{"@type":"Answer","text":"Normal blood pressure is systolic below 120 mmHg and diastolic below 80 mmHg. Readings of 120-129 systolic with diastolic below 80 are classified as elevated."}},{"@type":"Question","name":"What is considered high blood pressure?","acceptedAnswer":{"@type":"Answer","text":"Stage 1 hypertension is 130-139 systolic or 80-89 diastolic. Stage 2 is 140+ systolic or 90+ diastolic. A hypertensive crisis is 180+ systolic or 120+ diastolic and requires immediate medical attention."}},{"@type":"Question","name":"How should I measure my blood pressure?","acceptedAnswer":{"@type":"Answer","text":"Sit quietly for 5 minutes before measuring. Place the cuff on bare skin at heart level. Take 2-3 readings 1 minute apart and average them. Avoid caffeine, exercise, and smoking for 30 minutes prior."}},{"@type":"Question","name":"What do systolic and diastolic mean?","acceptedAnswer":{"@type":"Answer","text":"Systolic is the top number, measuring pressure when your heart beats. Diastolic is the bottom number, measuring pressure when your heart rests between beats. Both are measured in mmHg (millimeters of mercury)."}}]}</script>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Blood Pressure Calculator',
    toolDesc: 'Enter your systolic and diastolic blood pressure readings to instantly see your BP category and meaning per AHA/ACC 2017 guidelines.',
    systolic: 'Systolic (top number)',
    diastolic: 'Diastolic (bottom number)',
    sysPh: 'mmHg',
    diaPh: 'mmHg',
    evaluate: 'Evaluate BP',
    yourReading: 'Your Reading',
    category: 'Category',
    low: 'Low Blood Pressure (Hypotension)',
    normal: 'Normal',
    elevated: 'Elevated',
    stage1: 'High BP - Stage 1',
    stage2: 'High BP - Stage 2',
    crisis: 'HYPERTENSIVE CRISIS',
    enterValid: 'Please enter both systolic (80-250) and diastolic (40-150) values.',
    crisisWarn: '⚠ Seek emergency medical care immediately. Call your local emergency number.',
    meaning: 'What This Means',
    lowDesc: 'Blood pressure is lower than normal. If you experience dizziness, fainting, or blurred vision, consult a doctor.',
    normalDesc: 'Your blood pressure is in the healthy range. Maintain a balanced diet, regular exercise, and routine check-ups.',
    elevatedDesc: 'Blood pressure is higher than optimal. Lifestyle changes — reduced sodium, more exercise, weight management — can prevent hypertension.',
    stage1Desc: 'You have Stage 1 hypertension. Discuss lifestyle modifications and possible medication with your healthcare provider.',
    stage2Desc: 'You have Stage 2 hypertension. Medical evaluation and likely medication are recommended. Consult your doctor promptly.',
    crisisDesc: 'This is a medical emergency. Seek immediate care to prevent stroke, heart attack, or organ damage.',
    range: 'Range',
    sysRange: 'Systolic',
    diaRange: 'Diastolic',
    chartTitle: 'Blood Pressure Categories (AHA/ACC 2017)',
    step1: 'Take your blood pressure reading using a monitor',
    step2: 'Enter the systolic (top) and diastolic (bottom) numbers',
    step3: 'Click Evaluate to see your BP category',
    step4: 'Read the interpretation and recommended action',
  },
  zh: {
    toolTitle: '血压计算器',
    toolDesc: '输入收缩压和舒张压读数，立即查看您的血压类别和含义（依据 AHA/ACC 2017 指南）。',
    systolic: '收缩压（高压）',
    diastolic: '舒张压（低压）',
    sysPh: 'mmHg',
    diaPh: 'mmHg',
    evaluate: '评估血压',
    yourReading: '您的读数',
    category: '类别',
    low: '低血压',
    normal: '正常',
    elevated: '偏高',
    stage1: '高血压 1 期',
    stage2: '高血压 2 期',
    crisis: '高血压危象',
    enterValid: '请输入收缩压 (80-250) 和舒张压 (40-150) 的有效值。',
    crisisWarn: '⚠ 请立即寻求紧急医疗救助，拨打当地急救电话。',
    meaning: '这意味着什么',
    lowDesc: '血压低于正常水平。如出现头晕、晕厥或视力模糊，请咨询医生。',
    normalDesc: '您的血压在健康范围内。保持均衡饮食、规律运动和定期体检。',
    elevatedDesc: '血压高于理想值。通过减少钠盐摄入、增加运动和体重管理可预防高血压。',
    stage1Desc: '您患有 1 期高血压。请与医生讨论生活方式调整和可能的药物治疗。',
    stage2Desc: '您患有 2 期高血压。建议尽快就医评估，可能需要药物治疗。',
    crisisDesc: '这是医疗紧急情况。请立即就医，以防中风、心脏病发作或器官损伤。',
    range: '范围',
    sysRange: '收缩压',
    diaRange: '舒张压',
    chartTitle: '血压分类 (AHA/ACC 2017)',
    step1: '使用血压计测量血压',
    step2: '输入收缩压（高压）和舒张压（低压）数值',
    step3: '点击"评估血压"查看类别',
    step4: '阅读解读和建议措施',
  }
});

const { $, t } = GZ;

$('#app').innerHTML = `
  <div class="bp-input-row" style="margin-bottom:16px">
    <div class="bp-field">
      <label>${t('systolic')}</label>
      <input type="number" id="sys" placeholder="${t('sysPh')}" value="120">
    </div>
    <div class="bp-field">
      <label>${t('diastolic')}</label>
      <input type="number" id="dia" placeholder="${t('diaPh')}" value="80">
    </div>
    <div style="flex:0 0 auto">
      <button class="gz-btn" onclick="evaluateBP()" style="font-size:1.05em;padding:12px 24px">${t('evaluate')}</button>
    </div>
  </div>
  <div id="result"></div>
  <div style="margin-top:24px">
    <h3 style="margin-bottom:8px">${t('chartTitle')}</h3>
    <table class="bp-chart" id="chart"></table>
  </div>
`;

// Render chart
const CHART_ROWS = [
  {cat:'low', dot:'#3498db', sys:'< 90', dia:'< 60'},
  {cat:'normal', dot:'#27ae60', sys:'< 120', dia:'< 80'},
  {cat:'elevated', dot:'#f39c12', sys:'120-129', dia:'< 80'},
  {cat:'stage1', dot:'#e67e22', sys:'130-139', dia:'80-89'},
  {cat:'stage2', dot:'#e74c3c', sys:'≥ 140', dia:'≥ 90'},
  {cat:'crisis', dot:'#8b0000', sys:'≥ 180', dia:'≥ 120'},
];
$('#chart').innerHTML = `<tr><th>${t('category')}</th><th>${t('sysRange')}</th><th>${t('diaRange')}</th></tr>` +
  CHART_ROWS.map(r => `<tr><td><span class="cat-dot" style="background:${r.dot}"></span>${t(r.cat)}</td><td>${r.sys}</td><td>${r.dia}</td></tr>`).join('');

function classifyBP(sys, dia) {
  // Crisis first (either one)
  if (sys >= 180 || dia >= 120) return 'crisis';
  // Low
  if (sys < 90 || dia < 60) return 'low';
  // Stage 2
  if (sys >= 140 || dia >= 90) return 'stage2';
  // Stage 1
  if (sys >= 130 || dia >= 80) return 'stage1';
  // Elevated
  if (sys >= 120 && sys <= 129 && dia < 80) return 'elevated';
  // Normal
  if (sys < 120 && dia < 80) return 'normal';
  // Fallback: the more severe of systolic/diastolic
  if (sys >= 120) return 'elevated';
  return 'normal';
}

function evaluateBP() {
  const sys = +$('#sys').value;
  const dia = +$('#dia').value;

  if (!sys || !dia || sys < 80 || sys > 250 || dia < 40 || dia > 150) {
    $('#result').innerHTML = `<div class="warn">${t('enterValid')}</div>`;
    return;
  }

  const cat = classifyBP(sys, dia);
  const catClass = 'bp-' + cat;
  const descKey = cat + 'Desc';
  let crisisWarn = cat === 'crisis' ? `<div class="warn">${t('crisisWarn')}</div>` : '';

  // MAP (Mean Arterial Pressure)
  const map = Math.round((dia + (sys - dia) / 3) * 10) / 10;
  const pulse = sys - dia;

  $('#result').innerHTML = `
    <div class="result-card">
      <div class="bp-reading">${sys}<span style="color:var(--text2)">/</span>${dia} <span style="font-size:1rem;color:var(--text2)">mmHg</span></div>
      <div class="bp-category ${catClass}">${t(cat)}</div>
      ${crisisWarn}
      <div style="display:flex;justify-content:center;gap:24px;margin-top:12px;flex-wrap:wrap">
        <div><span style="color:var(--text2);font-size:.8em">MAP</span> <strong>${map} mmHg</strong></div>
        <div><span style="color:var(--text2);font-size:.8em">Pulse Pressure</span> <strong>${pulse} mmHg</strong></div>
      </div>
      <div style="margin-top:16px;padding:14px;background:var(--glass2);border-radius:12px;text-align:left">
        <strong style="display:block;margin-bottom:6px">${t('meaning')}</strong>
        <span style="font-size:.9em;color:var(--text2)">${t(descKey)}</span>
      </div>
    </div>
  `;
}

$('#toolbar').innerHTML = ``;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'❤️', href:'/calc/heart-rate.html', name:'Heart Rate Calculator'},
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
    {icon:'🔥', href:'/calc/tdee-calculator.html', name:'TDEE Calculator'},
    {icon:'🔢', href:'/calc/percentage-calculator.html', name:'Percentage Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
