<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area cb-main">
    <div class="gz-toolbar" id="toolbar"></div>
    <textarea id="pad" spellcheck="false"></textarea>
    <div class="cb-stats" id="stats"></div>
    <div class="cb-slots" id="slots"></div>
    <input class="cb-import" type="file" id="importFile" accept=".txt,.md,.csv,.json,.log">

  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en:{toolTitle:'Online Clipboard',toolDesc:'A private local clipboard pad for quick copy-paste work. Paste, edit, copy, save snippets to browser slots, export or import text — no account, no upload.',paste:'Paste from system clipboard',copy:'Copy pad',save:'Save current text',clear:'Clear pad',exportFile:'Export .txt',importFile:'Import file',slot:'Slot',load:'Load',saveSlot:'Save',deleteSlot:'Delete',empty:'Empty',chars:'characters',words:'words',saved:'Saved locally',loaded:'Loaded',deleted:'Deleted',copied:'Copied',pasted:'Pasted',pasteDenied:'Clipboard permission denied or unavailable',step1:'Paste text manually or use the Paste button if your browser allows clipboard access',step2:'Edit the text in the local pad',step3:'Save reusable snippets to one of the browser-only local slots',step4:'Copy, export or import text files whenever needed'},
  zh:{toolTitle:'在线剪贴板',toolDesc:'用于快速复制粘贴的私密本地剪贴板。粘贴、编辑、复制、保存到浏览器本地槽位、导出或导入文本 — 无账号、不上传。',paste:'从系统剪贴板粘贴',copy:'复制文本框',save:'保存当前文本',clear:'清空文本框',exportFile:'导出 .txt',importFile:'导入文件',slot:'槽位',load:'载入',saveSlot:'保存',deleteSlot:'删除',empty:'空',chars:'字符',words:'单词',saved:'已本地保存',loaded:'已载入',deleted:'已删除',copied:'已复制',pasted:'已粘贴',pasteDenied:'剪贴板权限被拒绝或不可用',step1:'手动粘贴文本，或在浏览器允许时使用“粘贴”按钮',step2:'在本地文本框中编辑内容',step3:'将常用片段保存到浏览器本地槽位',step4:'需要时复制、导出或导入文本文件'}
});
const {$,copyText,t}=GZ,KEY='gz_online_clipboard_slots_v1';let slots=[];
function loadSlots(){try{slots=JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){slots=[]}while(slots.length<3)slots.push('');}
function saveSlots(){localStorage.setItem(KEY,JSON.stringify(slots));}
function stat(){const v=$('#pad').value;$('#stats').innerHTML=`<span>${v.length} ${t('chars')}</span><span>${(v.match(/\S+/g)||[]).length} ${t('words')}</span>`;}
function say(k){$('#status').textContent=t(k)||k;setTimeout(()=>{$('#status').textContent=''},2200);}
function renderSlots(){loadSlots();$('#slots').innerHTML=slots.map((s,i)=>`<div class="cb-slot"><h3>${t('slot')} ${i+1}</h3><p>${s?escapeHtml(s.slice(0,120))+(s.length>120?'…':''):t('empty')}</p><div class="row"><button class="gz-btn gz-btn-secondary" onclick="loadSlot(${i})">${t('load')}</button><button class="gz-btn gz-btn-secondary" onclick="saveSlot(${i})">${t('saveSlot')}</button><button class="gz-btn gz-btn-secondary" onclick="deleteSlot(${i})">${t('deleteSlot')}</button></div></div>`).join('');stat();}
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
async function pasteClip(){try{$('#pad').value=await navigator.clipboard.readText();stat();say('pasted')}catch(e){say('pasteDenied')}}
function copyPad(){copyText($('#pad').value);say('copied')}function clearPad(){if(confirm(t('clear')+'?')){$('#pad').value='';stat();}}
function saveSlot(i){slots[i]=$('#pad').value;saveSlots();renderSlots();say('saved')}function loadSlot(i){$('#pad').value=slots[i]||'';stat();say('loaded')}function deleteSlot(i){slots[i]='';saveSlots();renderSlots();say('deleted')}
function exportTxt(){const blob=new Blob([$('#pad').value],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='online-clipboard.txt';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
$('#importFile').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{$('#pad').value=String(r.result||'');stat();};r.readAsText(f);});
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="pasteClip()">${t('paste')}</button><button class="gz-btn" onclick="copyPad()">${t('copy')}</button><button class="gz-btn gz-btn-secondary" onclick="saveSlot(0)">${t('save')}</button><button class="gz-btn gz-btn-secondary" onclick="exportTxt()">${t('exportFile')}</button><button class="gz-btn gz-btn-secondary" onclick="document.getElementById('importFile').click()">${t('importFile')}</button><button class="gz-btn gz-btn-secondary" onclick="clearPad()">${t('clear')}</button>`;
$('#pad').addEventListener('input',stat);
GZ.renderToolPage({category:'text',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[{icon:'📝',href:'/text/notepad.html',name:'Online Notepad'},{icon:'🔍',href:'/text/find-replace.html',name:'Find & Replace'},{icon:'📋',href:'/text/character-counter.html',name:'Character Counter'},{icon:'🧹',href:'/text/whitespace-remover.html',name:'Whitespace Remover'}]});
$('#pad').value='';renderSlots();
</script>
