<script>
GZI18n.register({
  en: {
    toolTitle: 'Wordle Helper & Word Pattern Solver',
    toolDesc: 'Narrow down every possible answer from your green, yellow and gray letters. Also works as a crossword and hangman pattern solver.',
    goBtn: 'Find Words',
    pattern: 'Pattern (green letters)',
    patternHint: 'Use . _ space or ? for unknown positions',
    include: 'Includes (yellow letters)',
    includeHint: 'Letters in the word, wrong spot',
    exclude: 'Excludes (gray letters)',
    excludeHint: 'Letters NOT in the word',
    length: 'Word length',
    step1: 'Type known letters in Pattern using dots for blanks',
    step2: 'Add yellow letters to Includes and gray letters to Excludes',
    step3: 'Set the word length (default 5 for Wordle)',
    step4: 'Click Find Words and tap any result to copy it',
    foundN: 'matching words',
    noMatch: 'No words match. Try loosening your pattern or includes.',
    copyToast: 'Copied',
  },
  zh: {
    toolTitle: 'Wordle 助手 / 单词模式求解',
    toolDesc: '根据绿色、黄色和灰色字母即时缩小所有可能的答案范围。也可用于填字游戏和猜单词。',
    goBtn: '查找单词',
    pattern: '已知位置（绿色字母）',
    patternHint: '用 . _ 空格或 ? 表示未知位置',
    include: '包含（黄色字母）',
    includeHint: '在单词中但位置不对的字母',
    exclude: '排除（灰色字母）',
    excludeHint: '一定不在单词中的字母',
    length: '单词长度',
    step1: '在「已知位置」中输入已知字母，用点号表示空位',
    step2: '将黄色字母填入「包含」，灰色字母填入「排除」',
    step3: '设置单词长度（Wordle 默认 5）',
    step4: '点击「查找单词」，点击任意结果即可复制',
    foundN: '个匹配单词',
    noMatch: '没有匹配的单词。请放宽已知位置或包含条件。',
    copyToast: '已复制',
  }
});

const { $, copyText, showToast, t } = GZ;
const WORDS = (window.GZ_WORDLIST || []);

function findWords() {
  const len = Math.max(2, Math.min(15, parseInt($('#length').value) || 5));
  let pat = ($('#pattern').value || '').toLowerCase().replace(/[^a-z.?_ ]/g, '');
  // normalize wildcards to '.'
  pat = pat.replace(/[?_ ]/g, '.');
  let regex;
  try {
    if (pat) {
      if (pat.length < len) pat = pat + '.'.repeat(len - pat.length);
      regex = new RegExp('^' + pat + '$');
    } else {
      regex = new RegExp('^.{' + len + '}$');
    }
  } catch (e) { $('#output').innerHTML = ''; return; }
  const include = ($('#include').value || '').toLowerCase().replace(/[^a-z]/g, '');
  const exclude = ($('#exclude').value || '').toLowerCase().replace(/[^a-z]/g, '');
  const incSet = [...new Set(include.split(''))];
  const excSet = new Set(exclude);
  const results = [];
  for (const w of WORDS) {
    if (w.length !== len) continue;
    if (!regex.test(w)) continue;
    let ok = true;
    for (const ch of incSet) { if (!w.includes(ch)) { ok = false; break; } }
    if (!ok) continue;
    for (const ch of excSet) { if (w.includes(ch)) { ok = false; break; } }
    if (ok) results.push(w);
  }
  results.sort();
  let html = `<div class="stats"><b>${results.length}</b> ${t('foundN')}</div>`;
  if (!results.length) {
    html += `<div style="color:var(--accent)">${t('noMatch')}</div>`;
  } else {
    html += results.map(w => `<span class="word-chip" data-w="${w}">${w}</span>`).join('');
  }
  $('#output').innerHTML = html;
}

$('#go-btn').addEventListener('click', findWords);
['#pattern', '#include', '#exclude'].forEach(sel => {
  $(sel).addEventListener('keydown', e => { if (e.key === 'Enter') findWords(); });
});
$('#output').addEventListener('click', e => {
  const chip = e.target.closest('.word-chip');
  if (chip) { copyText(chip.dataset.w); showToast(t('copyToast') + ': ' + chip.dataset.w); }
});

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example') || 'Example'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="resetForm()">${t('clear')}</button>`;
function loadExample() {
  $('#pattern').value = 'cr'; $('#include').value = 'n'; $('#exclude').value = 'bpx'; $('#length').value = 5;
  findWords();
}
function resetForm() {
  $('#pattern').value=''; $('#include').value=''; $('#exclude').value=''; $('#length').value=5; $('#output').innerHTML=''; $('#status').textContent=''; $('#pattern').focus();
}

$('#go-btn').textContent = t('goBtn');
$('#lbl-pattern').textContent = t('pattern');
$('#hint-pattern').textContent = t('patternHint');
$('#lbl-include').textContent = t('include');
$('#hint-include').textContent = t('includeHint');
$('#lbl-exclude').textContent = t('exclude');
$('#hint-exclude').textContent = t('excludeHint');
$('#lbl-length').textContent = t('length');

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔤', href:'/text/word-unscrambler.html', name:'Word Unscrambler'},
    {icon:'🎲', href:'/fun/wordle-solver.html', name:'Wordle Solver'},
    {icon:'🪞', href:'/text/anagram-checker.html', name:'Anagram Checker'},
    {icon:'🏁', href:'/fun/hangman-solver.html', name:'Hangman Solver'},
    {icon:'🧩', href:'/fun/crossword-maker.html', name:'Crossword Maker'},
  ]
});
</script>
