<script type="application/ld+json">{"@context":"https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do I animate a CSS gradient?", "acceptedAnswer": {"@type": "Answer", "text": "The most reliable way is to animate the background-position of an oversized gradient. Set background-size to 200% 200% (or larger), place the gradient, and animate background-position from 0% 0% to 100% 100%. This works in all modern browsers and renders smoothly with GPU acceleration."}}, {"@type": "Question", "name": "Can I animate the gradient colors themselves?", "acceptedAnswer": {"@type": "Answer", "text": "Directly animating between gradients is not supported in CSS (background-image is not interpolatable). However, you can stack multiple gradients with the same animation and use opacity/transform to cross-fade, or use CSS Houdini @property for color interpolation in supported browsers."}}, {"@type": "Question", "name": "What is the best easing for a smooth gradient animation?", "acceptedAnswer": {"@type": "Answer", "text": "For continuous looping gradient animations, 'linear' easing looks most natural because the loop is seamless. For one-shot animations (like a hover effect), 'ease-in-out' or a custom cubic-bezier like (0.4, 0, 0.2, 1) gives a polished feel."}}, {"@type": "Question", "name": "Are animated gradients GPU-accelerated?", "acceptedAnswer": {"@type": "Answer", "text": "Background-position animations are generally smooth but don't always trigger GPU acceleration. For best performance on lower-end devices, animate 'transform' on a pseudo-element with the gradient set as a static background — this is fully GPU-accelerated and very smooth at 60fps."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Gradient Animator',
    toolDesc: 'Create beautiful animated CSS gradient backgrounds with live preview. Customize colors, angle, size, duration, easing and direction — copy ready-to-use CSS in one click.',
    lblType: 'Type', lblStops: 'Color Stops', lblAngles: 'Angle & Size',
    lblAnim: 'Animation', lblPresets: 'Presets',
    lblAngle: 'Angle', lblSize: 'Background Size', lblDuration: 'Duration',
    lblEasing: 'Easing', lblDir: 'Direction',
    step1: 'Pick a preset or add custom color stops with the + button',
    step2: 'Adjust angle, background size and animation timing',
    step3: 'Watch the live preview loop with your exact CSS',
    step4: 'Copy the generated CSS and paste it into your project',
  },
  zh: {
    toolTitle: 'CSS 渐变动画生成器',
    toolDesc: '实时创建精美的 CSS 渐变动画背景。自定义颜色、角度、尺寸、时长、缓动和方向 — 一键复制可用的 CSS 代码。',
    lblType: '类型', lblStops: '颜色节点', lblAngles: '角度和尺寸',
    lblAnim: '动画', lblPresets: '预设',
    lblAngle: '角度', lblSize: '背景尺寸', lblDuration: '时长',
    lblEasing: '缓动', lblDir: '方向',
    step1: '选择预设或使用 + 按钮添加自定义颜色节点',
    step2: '调整角度、背景尺寸和动画时长',
    step3: '查看实时预览循环，使用你设置的 CSS',
    step4: '复制生成的 CSS 并粘贴到项目中',
  }
});

const { $, t } = GZ;

let stops = [
  { color: '#ff5e5e', pos: 0 },
  { color: '#5e9cff', pos: 50 },
  { color: '#a45eff', pos: 100 }
];

const PRESETS = [
  { name: 'Sunset', stops: [{color:'#ff5e5e',pos:0},{color:'#ffae5e',pos:50},{color:'#a45eff',pos:100}]},
  { name: 'Ocean', stops: [{color:'#00d2ff',pos:0},{color:'#3a7bd5',pos:100}]},
  { name: 'Aurora', stops: [{color:'#00ff87',pos:0},{color:'#60efff',pos:50},{color:'#a45eff',pos:100}]},
  { name: 'Fire', stops: [{color:'#f12711',pos:0},{color:'#f5af19',pos:100}]},
  { name: 'Mint', stops: [{color:'#c2e59c',pos:0},{color:'#64b3f4',pos:100}]},
  { name: 'Cosmic', stops: [{color:'#ff00cc',pos:0},{color:'#333399',pos:100}]},
  { name: 'Peach', stops: [{color:'#ffecd2',pos:0},{color:'#fcb69f',pos:100}]},
  { name: 'Lava', stops: [{color:'#ff512f',pos:0},{color:'#dd2476',pos:100}]},
];

function buildGradientCSS() {
  const type = $('#type').value;
  const angle = +$('#angle').value;
  const size = +$('#size').value;
  const stopStr = stops.map(s => `${s.color} ${s.pos}%`).join(', ');
  if (type === 'linear') {
    return `linear-gradient(${angle}deg, ${stopStr})`;
  } else {
    return `radial-gradient(circle at center, ${stopStr})`;
  }
}

function buildCSS() {
  const size = +$('#size').value;
  const duration = +$('#duration').value;
  const easing = $('#easing').value;
  const dir = $('#dir').value;
  const gradient = buildGradientCSS();
  return `/* Apply to your element */
.gradient {
  background: ${gradient};
  background-size: ${size}% ${size}%;
  animation: gradientShift ${duration}s ${easing} ${dir} infinite;
}

@keyframes gradientShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}`;
}

function render() {
  const gradient = buildGradientCSS();
  const size = +$('#size').value;
  const duration = +$('#duration').value;
  const easing = $('#easing').value;
  const dir = $('#dir').value;
  const demo = $('#demo');
  demo.style.background = gradient;
  demo.style.backgroundSize = size + '% ' + size + '%';
  demo.style.animation = `gaShift ${duration}s ${easing} ${dir} infinite`;

  $('#angleV').textContent = $('#angle').value + '°';
  $('#sizeV').textContent = size + '%';
  $('#durationV').textContent = duration + 's';

  $('#code').textContent = buildCSS();

  // Inject keyframes if not present
  let styleEl = document.getElementById('ga-keyframes');
  if (!styleEl) {
    styleEl = document.createElement('style');
    styleEl.id = 'ga-keyframes';
    styleEl.textContent = '@keyframes gaShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }';
    document.head.appendChild(styleEl);
  }
}

function renderStops() {
  const container = $('#stops');
  container.innerHTML = '';
  stops.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'ga-stop';
    div.innerHTML = `
      <input type="color" value="${s.color}" data-i="${i}" data-k="color">
      <input type="number" value="${s.pos}" min="0" max="100" data-i="${i}" data-k="pos">
      <span style="flex:1">%</span>
      <span class="x" data-i="${i}">✕</span>
    `;
    container.appendChild(div);
  });
  container.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', e => {
      const i = +e.target.dataset.i;
      const k = e.target.dataset.k;
      if (k === 'color') stops[i].color = e.target.value;
      else stops[i].pos = +e.target.value;
      render();
    });
  });
  container.querySelectorAll('.x').forEach(x => {
    x.addEventListener('click', e => {
      const i = +e.target.dataset.i;
      if (stops.length > 2) {
        stops.splice(i, 1);
        renderStops();
        render();
      }
    });
  });
}

$('#addStop').addEventListener('click', () => {
  const newPos = stops.length > 0 ? Math.min(100, Math.max(0, stops[stops.length-1].pos + 10)) : 50;
  stops.push({ color: '#ffffff', pos: newPos });
  renderStops();
  render();
});

['type', 'angle', 'size', 'duration', 'easing', 'dir'].forEach(id => {
  $('#' + id).addEventListener('input', render);
  $('#' + id).addEventListener('change', render);
});

// Render presets
const presetContainer = $('#presets');
PRESETS.forEach(p => {
  const div = document.createElement('div');
  div.className = 'ga-preset';
  div.title = p.name;
  div.style.background = `linear-gradient(135deg, ${p.stops.map(s => s.color + ' ' + s.pos + '%').join(', ')})`;
  div.addEventListener('click', () => {
    stops = p.stops.map(s => ({...s}));
    renderStops();
    render();
  });
  presetContainer.appendChild(div);
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="GZ.copyText($('#code').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="stops=[{color:'#ff5e5e',pos:0},{color:'#5e9cff',pos:50},{color:'#a45eff',pos:100}];$('#type').value='linear';$('#angle').value=45;$('#size').value=300;$('#duration').value=6;renderStops();render()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1', 'step2', 'step3', 'step4'],
  related: [
    {icon: '🌈', href: '/css-tools/gradient.html', name: 'CSS Gradient'},
    {icon: '🎬', href: '/css-tools/animation.html', name: 'CSS Animation'},
    {icon: '✨', href: '/css-tools/glassmorphism.html', name: 'Glassmorphism'},
    {icon: '🎨', href: '/css-tools/neumorphism.html', name: 'Neumorphism'},
  ]
});
renderStops();
render();
</script>
<script src="/tools-result-rec.js" defer></script>
