const { $, copyText, t } = GZ;

function extractUrls(text) {
  const urlRe = /https?:\/\/[^\s<>"'`\)\]]+/g;
  const found = text.match(urlRe) || [];
  return [...new Set(found.map(u => u.replace(/[.,;:!?)\]]+$/, '')))];
}

function classifyStatus(n) {
  if (n>=200 && n<300) return 's2';
  if (n>=300 && n<400) return 's3';
  if (n>=400 && n<500) return 's4';
  if (n>=500) return 's5';
  if (n===0) return 's0';
  return 's-other';
}

function escapeHtml(s) {
  return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function checkOne(url) {
  const controller = new AbortController();
  const timeoutMs = document.getElementById('chk-timeout')?.checked ? 10000 : 8000;
  const tOut = setTimeout(() => controller.abort(), timeoutMs);
  const follow = document.getElementById('chk-redirect')?.checked ? 'follow' : 'manual';
  const method = document.querySelector('input[name="method"]:checked')?.value || 'HEAD';
  const t0 = performance.now();
  try {
    const res = await fetch(url, {
      method,
      redirect: follow,
      signal: controller.signal,
      cache: 'no-store',
      mode: 'cors',
      headers: { 'User-Agent': navigator.userAgent }
    });
    const dt = Math.round(performance.now() - t0);
    clearTimeout(tOut);
    let finalUrl = res.url || url;
    let hops = 1;
    if (follow === 'manual' && res.status >= 300 && res.status < 400) {
      // follow manually
      let current = url;
      let last = res;
      for (let i=0; i<10; i++) {
        const loc = last.headers.get('location');
        if (!loc) break;
        try { current = new URL(loc, current).toString(); } catch(e) { break; }
        hops++;
        try {
          last = await fetch(current, { method, redirect:'manual', signal: controller.signal, cache:'no-store' });
        } catch(e) { break; }
        if (!(last.status >= 300 && last.status < 400)) break;
      }
      finalUrl = current;
    }
    return { url, status: res.status, ok: res.ok, time: dt, finalUrl, hops, type: res.type || 'basic' };
  } catch(e) {
    clearTimeout(tOut);
    return { url, status: 0, ok: false, time: Math.round(performance.now()-t0), error: e.message };
  }
}

async function runWithPool(items, fn, concurrency, onProgress) {
  const results = new Array(items.length);
  let idx = 0, done = 0;
  async function worker() {
    while (true) {
      const i = idx++;
      if (i >= items.length) return;
      results[i] = await fn(items[i]);
      done++;
      if (onProgress) onProgress(done, items.length);
    }
  }
  const workers = Array.from({length: concurrency}, () => worker());
  await Promise.all(workers);
  return results;
}

let lastResults = [];

async function doCheck() {
  const text = $('#input').value.trim();
  if (!text) { $('#output').innerHTML = `<p style="opacity:.7">${t('noLinks')}</p>`; return; }
  let urls = extractUrls(text);
  if (urls.length === 0) { $('#output').innerHTML = `<p style="opacity:.7">${t('noLinks')}</p>`; return; }
  if (urls.length > 100) {
    urls = urls.slice(0, 100);
    $('#output').innerHTML = `<p style="opacity:.7;font-size:.85em;margin-bottom:8px">⚠️ ${t('limitNote')}</p>`;
  } else {
    $('#output').innerHTML = '';
  }
  $('#progress-wrap').style.display = 'block';
  $('#progress-bar').style.width = '0%';
  const results = await runWithPool(urls, checkOne, 6, (done, total) => {
    $('#progress-bar').style.width = ((done/total)*100) + '%';
  });
  $('#progress-wrap').style.display = 'none';
  lastResults = results;
  renderResults(results);
}

function renderResults(results) {
  const ok = results.filter(r => r.status >= 200 && r.status < 300).length;
  const broken = results.filter(r => r.status === 0 || r.status >= 400).length;
  const redirects = results.filter(r => r.status >= 300 && r.status < 400).length;
  const avgTime = results.length ? Math.round(results.reduce((s,r)=>s+r.time,0)/results.length) : 0;
  const summary = `
    <div class="summary">
      <div class="summary-card"><div class="num">${results.length}</div><div class="lbl">${t('total')}</div></div>
      <div class="summary-card"><div class="num green">${ok}</div><div class="lbl">${t('ok')}</div></div>
      <div class="summary-card"><div class="num red">${broken}</div><div class="lbl">${t('broken')}</div></div>
      <div class="summary-card"><div class="num">${redirects}</div><div class="lbl">${t('redirects')}</div></div>
      <div class="summary-card"><div class="num">${avgTime}</div><div class="lbl">ms · ${t('avgTime')}</div></div>
    </div>`;
  const rows = results.map(r => {
    const cls = classifyStatus(r.status);
    const code = r.status === 0 ? 'ERR' : r.status;
    return `<tr>
      <td><span class="status ${cls}">${code}</span></td>
      <td><a href="${escapeHtml(r.url)}" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline dotted">${escapeHtml(r.url)}</a></td>
      <td style="opacity:.75;font-family:monospace;font-size:.85em">${escapeHtml(r.finalUrl && r.finalUrl!==r.url ? r.finalUrl : '—')}</td>
      <td style="text-align:right;font-family:monospace">${r.time} ms</td>
    </tr>`;
  }).join('');
  $('#output').innerHTML = summary + `
    <h3 style="margin:14px 0 4px;font-size:1em">📋 ${t('results')}</h3>
    <div style="overflow-x:auto">
    <table class="results-table">
      <thead><tr><th>Status</th><th>URL</th><th>Final</th><th>Time</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>
    <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
      <button class="gz-btn gz-btn-secondary" onclick="copyCsv()">⬇️ ${t('download')}</button>
      <button class="gz-btn gz-btn-secondary" onclick="copyText(JSON.stringify(lastResults,null,2))">📋 ${t('copy')}</button>
    </div>`;
}

function copyCsv() {
  const header = 'Status,URL,FinalURL,TimeMs\n';
  const rows = lastResults.map(r => `${r.status},"${r.url}","${r.finalUrl||''}",${r.time}`).join('\n');
  const blob = new Blob([header+rows], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'link-check-results.csv';
  a.click();
}

}

$('#toolbar').innerHTML = `
