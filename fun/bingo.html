.bg-ball .num{font-size:5rem;line-height:1;font-family:'Segoe UI',Helvetica,sans-serif}
.bg-ball.b{background:radial-gradient(circle at 30% 30%,#5fa8ff,#2b6fc7);color:#fff}
.bg-ball.i{background:radial-gradient(circle at 30% 30%,#ff7676,#c0392b);color:#fff}
.bg-ball.n{background:radial-gradient(circle at 30% 30%,#f0c040,#cc8e1c);color:#fff}

.bg-draw:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
.bg-auto{background:var(--accent);color:#fff}
.bg-stop{background:#95a5a6;color:#fff}
.bg-grid{display:grid;grid-template-columns:repeat(15,1fr);gap:4px;max-width:560px;margin:18px auto}
.bg-cell{aspect-ratio:1;background:var(--glass2);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.85rem;color:var(--text2);transition:all .2s}
.bg-cell.called{background:var(--accent);color:#fff;border-color:var(--accent);transform:scale(1.05)}
.bg-cell.latest{box-shadow:0 0 0 3px #ffd93d;animation:pulse 1s}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,217,61,.7)}100%{box-shadow:0 0 0 12px rgba(255,217,61,0)}}
.bg-status{text-align:center;font-size:1rem;color:var(--text2);margin-top:10px}
.bg-status b{color:var(--accent)}
.bg-history{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:14px;max-width:560px;margin-left:auto;margin-right:auto}
.bg-history span{background:var(--glass2);padding:4px 10px;border-radius:12px;font-size:.85rem;font-weight:600;border:1px solid var(--border)}
.bg-card{background:#fff;color:#111;padding:14px;border-radius:8px;margin:14px auto;max-width:380px}
.bg-card h4{margin:0 0 8px;text-align:center;color:#2563eb}
.bg-card-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:2px}
.bg-card-grid div{aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:#f0f0f0;font-weight:600;border-radius:3px;font-size:.95rem}
.bg-card-grid div.free{background:#2563eb;color:#fff}

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How does the bingo caller work?", "acceptedAnswer": {"@type": "Answer", "text": "Click Draw to randomly pick a number from the available pool. Each number can only be drawn once. Switch to Auto to draw a new number every few seconds, perfect for live bingo games."}}, {"@type": "Question", "name": "Can I use voice announcement?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Toggle the Voice switch to have each number called out using your browser's text-to-speech engine. The letter and number are spoken in classic bingo style (e.g., 'B-12')."}}, {"@type": "Question", "name": "What is the difference between 75-ball and 90-ball?", "acceptedAnswer": {"@type": "Answer", "text": "75-ball bingo (US) uses letters B, I, N, G, O for columns with numbers 1-15, 16-30, 31-45, 46-60, 61-75. 90-ball bingo (UK) uses numbers 1-90 with no column letters and is commonly played on tickets with 15 numbers."}}, {"@type": "Question", "name": "Can I generate printable bingo cards?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Click Generate Card to create a randomized 5x5 bingo card with a free center. The card follows the standard B-I-N-G-O column ranges for 75-ball games."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="bg-modes">
      <select id="mode">
        <option value="75">75-ball (US)</option>
        <option value="90">90-ball (UK)</option>
      </select>
      <label style="display:flex;align-items:center;gap:6px;font-size:.85rem;color:var(--text2)">
        <input type="checkbox" id="voice" checked> 🔊 Voice
      </label>
      <label style="display:flex;align-items:center;gap:6px;font-size:.85rem;color:var(--text2)">

        <button class="bg-draw" id="drawBtn" onclick="draw()">🎯 Draw</button>
        <button class="bg-auto" id="autoBtn" onclick="toggleAuto()">▶️ Auto</button>
        <button class="bg-stop" onclick="resetGame()">🔄 Reset</button>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Bingo Number Caller',
    toolDesc: 'Run a live bingo game in your browser. Draw random numbers 1-75 or 1-90 with voice callouts, animated balls, and printable cards. Free and ad-free.',
    draw: '🎯 Draw', auto: '▶️ Auto', stop: '⏸ Stop', reset: '🔄 Reset', card: '🎟️ Card',
    called: 'called', remaining: 'remaining',
    newCard: 'Your Bingo Card',
    step1: 'Select 75-ball (US) or 90-ball (UK) mode',
    step2: 'Click Draw for the next number — or Auto to draw automatically every few seconds',
    step3: 'Watch the called numbers grid and history update in real time',
    step4: 'Click Card to generate a printable bingo card with a free center',
  },
  zh: {
    toolTitle: '宾果数字呼叫器',
    toolDesc: '在浏览器中运行实时宾果游戏。抽取 1-75 或 1-90 的随机数字，含语音播报、动画球和可打印卡片。',
    draw: '🎯 抽取', auto: '▶️ 自动', stop: '⏸ 停止', reset: '🔄 重置', card: '🎟️ 卡片',
    called: '已叫', remaining: '剩余',
    newCard: '您的宾果卡',
    step1: '选择 75 球（美式）或 90 球（英式）模式',
    step2: '点击「抽取」获得下一个数字，或点击「自动」每隔几秒自动抽取',
    step3: '实时查看已叫数字网格和历史记录',
    step4: '点击「卡片」生成可打印的宾果卡，含免费中心格',
  }
});

const { $, t } = GZ;
let mode = 75;
let available = [];
let called = [];
let last = null;
let autoTimer = null;

function speak(text) {
  if (!$('#voice').checked) return;
  if (!('speechSynthesis' in window)) return;
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.9; u.pitch = 1.1; u.volume = 0.9;
    window.speechSynthesis.speak(u);
  } catch(e) {}
}

function letterFor(n) {
  if (mode === 90) return '';
  if (n <= 15) return 'B';
  if (n <= 30) return 'I';
  if (n <= 45) return 'N';
  if (n <= 60) return 'G';
  return 'O';
}

function letterClass(letter) {
  return {B:'b',I:'i',N:'n',G:'g',O:'o'}[letter] || 'b';
}

function updateBall(n) {
  const letter = letterFor(n);
  const ball = $('#ball');
  ball.classList.remove('empty','b','i','n','g','o');
  if (n === null) { ball.classList.add('empty'); $('#ballLabel').textContent='READY'; $('#ballNum').textContent='—'; return; }
  ball.classList.add(letterClass(letter));
  $('#ballLabel').textContent = letter || 'N';
  $('#ballNum').textContent = n;
}

function renderGrid() {
  const max = mode;
  const cols = mode === 75 ? 15 : 18;
  const rows = Math.ceil(max / cols);
  let html = '';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const n = r * cols + c + 1;
      if (n > max) break;
      const isCalled = called.includes(n);
      const isLatest = n === last;
      html += `<div class="bg-cell ${isCalled?'called':''} ${isLatest?'latest':''}">${n}</div>`;
    }
  }
  $('#grid').innerHTML = html;
  $('#grid').style.gridTemplateColumns = `repeat(${cols},1fr)`;
}

function renderHistory() {
  $('#history').innerHTML = called.slice().reverse().map(n => {
    const l = letterFor(n);
    return `<span>${l?l+'-':''}${n}</span>`;
  }).join('');
}

function updateStatus() {
  $('#status').innerHTML = `<b>${called.length}</b> ${t('called')} · <b>${available.length}</b> ${t('remaining')}`;
}

function draw() {
  if (available.length === 0) { showEnd(); return; }
  const i = Math.floor(Math.random() * available.length);
  const n = available.splice(i,1)[0];
  called.push(n); last = n;
  const letter = letterFor(n);
  updateBall(n);
  renderGrid();
  renderHistory();
  updateStatus();
  speak(letter ? `${letter}, ${n}` : `${n}`);
}

function showEnd() {
  alert(lang==='zh'?'所有数字已抽完！':'All numbers have been drawn!');
  toggleAuto();
}

function toggleAuto() {
  if (autoTimer) {
    clearInterval(autoTimer); autoTimer = null;
    $('#autoBtn').textContent = t('auto');
    $('#drawBtn').disabled = false;
  } else {
    if (available.length === 0) return;
    const sec = Math.max(2, +$('#autoSec').value || 5);
    autoTimer = setInterval(draw, sec * 1000);
    $('#autoBtn').textContent = t('stop');
    $('#drawBtn').disabled = true;
  }
}

function resetGame() {
  if (autoTimer) toggleAuto();
  available = []; for (let i=1;i<=mode;i++) available.push(i);
  called = []; last = null;
  updateBall(null);
  renderGrid(); renderHistory(); updateStatus();
  $('#cardArea').innerHTML = '';
}

function generateCard() {
  // Standard 5x5 US bingo card
  const cols = {B:[],I:[],N:[],G:[],O:[]};
  const ranges = {B:[1,15],I:[16,30],N:[31,45],G:[46,60],O:[61,75]};
  Object.keys(cols).forEach(L => {
    const [a,b] = ranges[L];
    const pool = []; for (let i=a;i<=b;i++) pool.push(i);
    pool.sort(() => Math.random()-.5);
    cols[L] = pool.slice(0,5);
  });
  // Free center
  cols.N[2] = '★';
  let html = `<div class="bg-card"><h4>${t('newCard')}</h4><div class="bg-card-grid">`;
  for (let r=0;r<5;r++) {
    ['B','I','N','G','O'].forEach(L => {
      const v = cols[L][r];
      html += `<div class="${v==='★'?'free':''}">${v}</div>`;
    });
  }
  html += `</div></div>`;
  $('#cardArea').innerHTML = html;
}

let lang = GZI18n.getLang();
$('#mode').addEventListener('change', e => { mode = +e.target.value; resetGame(); });
$('#autoSec').addEventListener('change', e => { if (autoTimer) { toggleAuto(); toggleAuto(); } });
$('#drawBtn').textContent = t('draw');
$('#autoBtn').textContent = t('auto');
$('#voice').parentElement.childNodes[0].textContent = '';
resetGame();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎲', href:'/fun/dice-roller.html', name:'Dice Roller'},
    {icon:'🪙', href:'/fun/coin-flipper.html', name:'Coin Flipper'},
    {icon:'🎯', href:'/fun/name-picker.html', name:'Name Picker'},
    {icon:'🎡', href:'/fun/decision-wheel.html', name:'Decision Wheel'},
  ]
});
</script>

</body>
