<script>
GZI18n.register({
  en: {
    toolTitle: 'Year Progress Bar',
    toolDesc: 'See how much of the year is behind you. Live day-of-year, percentage complete, weeks passed, and a beautiful animated progress bar. Perfect for goal tracking.',
    ofYear: 'of the year complete',
    daysLeftIn: 'days left in',
    shareTwitter: 'Share on X',
    shareCopy: 'Copy text',
    shareImg: 'Download as image',
    step1: 'Watch the live progress bar update every second',
    step2: 'See day-of-year, week-of-year and days remaining stats',
    step3: 'Jump to any date with the date picker',
    step4: 'Share your year progress on X or download as image',
  },
  zh: {
    toolTitle: '年度进度条',
    toolDesc: '看看今年已经过去了多少。实时显示年度第几天、完成百分比、已过周数，配合精美动画进度条。适合目标追踪。',
    ofYear: '的年度已完成',
    daysLeftIn: '天还剩于',
    shareTwitter: '分享到 X',
    shareCopy: '复制文本',
    shareImg: '下载为图片',
    step1: '观察实时进度条每秒更新',
    step2: '查看年度第几天、第几周和剩余天数',
    step3: '使用日期选择器跳转到任意日期',
    step4: '分享到 X 或下载为图片',
  }
});

const MILESTONES = [
  { name: 'New Year',  m: 1, d: 1 },
  { name: 'Valentine\'s Day',  m: 2, d: 14 },
  { name: 'Spring Equinox',  m: 3, d: 20 },
  { name: 'Easter',  m: 4, d: 9 },
  { name: 'Mid-Year',  m: 7, d: 1 },
  { name: 'Summer Solstice',  m: 6, d: 21 },
  { name: 'Independence Day (US)',  m: 7, d: 4 },
  { name: 'Halloween',  m: 10, d: 31 },
  { name: 'Thanksgiving (US)',  m: 11, d: 23 },
  { name: 'Winter Solstice',  m: 12, d: 21 },
  { name: 'Christmas',  m: 12, d: 25 },
  { name: 'New Year\'s Eve',  m: 12, d: 31 },
];

const WD = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const WD_ZH = ['周日','周一','周二','周三','周四','周五','周六'];

const { $, t } = GZ;
let displayDate = new Date();

function isLeap(y) { return (y % 4 === 0 && y % 100 !== 0) || y % 400 === 0; }

function getDayOfYear(d) {
  const start = new Date(d.getFullYear(), 0, 0);
  const diff = d - start;
  return Math.floor(diff / 86400000);
}

function getISOWeek(d) {
  const target = new Date(d.valueOf());
  const dayNr = (d.getDay() + 6) % 7;
  target.setDate(target.getDate() - dayNr + 3);
  const firstThursday = target.valueOf();
  target.setMonth(0, 1);
  if (target.getDay() !== 4) {
    target.setMonth(0, 1 + ((4 - target.getDay()) + 7) % 7);
  }
  return 1 + Math.ceil((firstThursday - target) / 604800000);
}

function update(date) {
  displayDate = date || new Date();
  const yr = displayDate.getFullYear();
  const totalDays = isLeap(yr) ? 366 : 365;
  const doy = getDayOfYear(displayDate);
  const startOfYear = new Date(yr, 0, 1).getTime();
  const endOfYear = new Date(yr + 1, 0, 1).getTime();
  const now = displayDate.getTime();
  const pct = ((now - startOfYear) / (endOfYear - startOfYear)) * 100;
  const daysLeft = totalDays - doy;
  const week = getISOWeek(displayDate);
  const lang = GZI18n.getLang();

  $('#pct').textContent = pct.toFixed(6) + '%';
  $('#pctLabel').textContent = t('ofYear') + ' ' + yr;
  $('#fill').style.width = pct.toFixed(2) + '%';
  $('#dayOfYear').textContent = doy + ' / ' + totalDays;
  $('#weekOfYear').textContent = week;
  $('#daysLeft').textContent = daysLeft;
  $('#weekday').textContent = (lang === 'zh' ? WD_ZH : WD)[displayDate.getDay()];

  // Countdown to new year
  const msLeft = endOfYear - now;
  const dLeft = Math.floor(msLeft / 86400000);
  const hLeft = Math.floor((msLeft % 86400000) / 3600000);
  const mLeft = Math.floor((msLeft % 3600000) / 60000);
  const sLeft = Math.floor((msLeft % 60000) / 1000);
  $('#countdown').textContent = `${dLeft}d ${hLeft}h ${mLeft}m ${sLeft}s ${t('daysLeftIn')} ${yr}`;

  // Milestones
  const ms = MILESTONES.map(m => {
    const dt = new Date(yr, m.m - 1, m.d);
    return { ...m, dt, passed: dt <= displayDate, days: Math.round((dt - displayDate) / 86400000) };
  }).sort((a, b) => a.dt - b.dt);
  
  // Find current (last passed and next upcoming)
  const idx = ms.findIndex(m => !m.passed);
  const display = idx > 0 ? [ms[idx-1], ms[idx]] : [ms[ms.length-1], ms[0]];
  const nextIdx = ms.findIndex(m => !m.passed);
  
  $('#miles').innerHTML = ms.map(m => {
    let cls = 'yp-mile';
    if (m.days === 0) cls += ' now';
    else if (m.passed) cls += ' past';
    return `<div class="${cls}">
      <div>
        <div class="name">${m.name}</div>
        <div class="date">${m.m}/${m.d} ${yr}</div>
      </div>
      <div class="date">${m.days === 0 ? '🎉 Today' : m.days > 0 ? `in ${m.days} days` : `${-m.days} days ago`}</div>
    </div>`;
  }).join('');
}

$('#jumpDate').addEventListener('change', e => {
  if (e.target.value) {
    const d = new Date(e.target.value + 'T12:00:00');
    if (!isNaN(d)) update(d);
  }
});

$('#toolbar').innerHTML = `
  <button onclick="update(new Date())">Today</button>
  <button onclick="GZ.copyText($('#pct').textContent + ' ' + $('#pctLabel').textContent)">${t('shareCopy')}</button>
  <button onclick="let t=encodeURIComponent($('#pct').textContent+' '+t('ofYear')+' '+new Date().getFullYear()+' 🎯 #yearprogress');window.open('https://twitter.com/intent/tweet?text='+t)">${t('shareTwitter')}</button>`;

update();
setInterval(() => update(), 1000);

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏱️', href:'/calc/timer-stopwatch.html', name:'Timer / Stopwatch'},
    {icon:'⏰', href:'/calc/time-calculator.html', name:'Time Calculator'},
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calculator'},
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro Timer'},
  ]
});
</script>
