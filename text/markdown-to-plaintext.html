let collapseBlanks = true;
let stripLists = true;
const { $, copyText, t } = GZ;

function stripMd(md) {
  let text = md;

  // Remove HTML tags
  text = text.replace(/<[^>]+>/g, '');

  // Remove fenced code blocks
  text = text.replace(/```[\s\S]*?```/g, m => m.replace(/```\w*\n?/g, '').replace(/```/g, ''));

  // Remove images: ![alt](url)
  text = text.replace(/!\[([^\]]*)\]\([^)]*\)/g, '$1');

  // Convert links: [text](url) -> text
  text = text.replace(/\[([^\]]*)\]\([^)]*\)/g, '$1');

  // Remove reference links: [text][ref] and [ref]: url
  text = text.replace(/\[([^\]]*)\]\[[^\]]*\]/g, '$1');
  text = text.replace(/^\[[^\]]*\]:\s*.*$/gm, '');

  // Remove headings: # ## ### etc
  text = text.replace(/^#{1,6}\s+/gm, '');

  // Remove bold/italic markers
  text = text.replace(/\*\*\*([^*]+)\*\*\*/g, '$1');
  text = text.replace(/\*\*([^*]+)\*\*/g, '$1');
  text = text.replace(/__([^_]+)__/g, '$1');
  text = text.replace(/(?<!\w)\*([^*\n]+)\*(?!\w)/g, '$1');
  text = text.replace(/(?<!\w)_([^_\n]+)_(?!\w)/g, '$1');

  // Remove inline code
  text = text.replace(/`([^`]+)`/g, '$1');

  // Remove blockquote markers
  text = text.replace(/^>\s?/gm, '');

  // Remove horizontal rules
  text = text.replace(/^[-*_]{3,}\s*$/gm, '');

  if (stripLists) {
    // Remove unordered list markers
    text = text.replace(/^[\s]*[-*+]\s+/gm, '');
    // Remove ordered list markers
    text = text.replace(/^[\s]*\d+\.\s+/gm, '');
  }

  // Remove strikethrough
  text = text.replace(/~~([^~]+)~~/g, '$1');

  if (collapseBlanks) {
    text = text.replace(/\n{3,}/g, '\n\n');
  }

  return text.trim() + '\n';
}

function doConvert() {
  const inp = $('#input').value;
  if (!inp.trim()) { $('#output').value = ''; $('#status').innerHTML = ''; return; }
  $('#output').value = stripMd(inp);
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done')}</span>`;
}
