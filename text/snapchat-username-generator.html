<script>
GZI18n.register({

    lblName: "你的名字或基础词", lblKeywords: "风格 / 领域（可选）", lblStyle: "风格", lblCount: "生成数量",
    step1: "输入你的名字或基础词（如 Alex）",
    step2: "添加可选领域关键词（游戏、科技、烹饪）",
    step3: "点击「生成」获取独特的 Snapchat 用户名创意",
    step4: "点击任一用户名即可复制，然后在 Snapchat 上验证",
  }
});

const { $, copyText, t } = GZ;
let currentStyle = "fun";

document.querySelectorAll(".tu-pill").forEach(p => {
  p.addEventListener("click", () => {
    document.querySelectorAll(".tu-pill").forEach(x => x.classList.remove("active"));
    p.classList.add("active");
    currentStyle = p.dataset.style;
  });
});

// Snapchat rules: 3-15 chars, [a-zA-Z0-9._-], start with alnum
function clean(s){ return (s||"").replace(/[<>:\"/\\|?*\u0000-\u001f]/g,"").trim(); }
function valid(u){
  if (u.length < 3 || u.length > 100) return false;
  return u.length > 0;
}

const PREFIXES = ["The","My","Official","Real","Its","All About","Daily","Live with","Welcome to","Hey","Mr","Ms","Lil","Big"];
const SUFFIXES = ["TV","HQ","World","Official","Daily","Vlogs","Live","Studio","Channel","Network","Hub","Show","TV Show","Central"];
const GAMER = ["Plays","Gaming","Games","Plays","GG","Gameplay","Pro","Plays","Quest","Craft"];
const VLOG = ["Vlogs","Daily Life","Adventures","Vlogs","Stories","Adventures","Diary","Life","Moments","Vlogs"];
const EDU = ["Academy","School","Lab","Class","University","Institute","Lessons","Tutorials","Studies","101"];
const AESTHETIC = ["Diaries","Vibes","Aura","Soul","Whispers","Magic","Aesthetic","Dreams","Cloud","Bloom"];
const NUMS = ["","","","01","02","TV","HD","4K","24","365","Plus","X"];

function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function randInt(n){ return Math.floor(Math.random()*n); }
function titleCase(s){ return s.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()); }

function buildOne(base, kw, style){
  base = clean(base) || "Creator";
  kw = clean(kw.split(",")[0]||"");
  const r = Math.random();
  let u = "";
  if (style === "gaming"){
    const w = kw || "Game";
    if (r < 0.4) u = base + " " + pick(GAMER);
    else if (r < 0.7) u = base + " " + pick(PREFIXES) + " " + w;
    else u = base + pick(NUMS);
  } else if (style === "vlog"){
    const w = kw || "Vlog";
    if (r < 0.4) u = pick(PREFIXES) + " " + base;
    else if (r < 0.7) u = base + " " + pick(VLOG);
    else u = base + " " + w;
  } else if (style === "edu"){
    const w = kw || "Tutorials";
    if (r < 0.4) u = base + " " + pick(EDU);
    else if (r < 0.7) u = pick(PREFIXES) + " " + base + " " + w;
    else u = base + " " + w;
  } else if (style === "aesthetic"){
    const w = kw || pick(AESTHETIC);
    if (r < 0.4) u = base + " " + w;
    else if (r < 0.7) u = w + " " + base;
    else u = base + " " + pick(AESTHETIC);
  } else { // brand
    if (r < 0.33) u = pick(PREFIXES) + " " + base;
    else if (r < 0.66) u = base + " " + pick(SUFFIXES);
    else u = base + pick(NUMS);
  }
  u = clean(u);
  if (u.length < 3) u = u + " " + pick(SUFFIXES);
  if (u.length > 100) u = u.substring(0,100).trim();
  return u;
}

function generate(){
  const base = $("#base").value.trim();
  const kw = $("#kw").value.trim();
  const count = parseInt($("#count").value);
  const results = $("#results");
  results.innerHTML = "";
  const used = new Set();
  let attempts = 0;
  while (results.children.length < count && attempts < count*8){
    attempts++;
    const u = buildOne(base, kw, currentStyle);
    if (!valid(u) || used.has(u.toLowerCase())) continue;
    used.add(u.toLowerCase());
    const card = document.createElement("div");
    card.className = "tu-card";
    card.innerHTML = `<span class="tu-name">${u}</span><div style="display:flex;align-items:center;gap:8px"><span class="tu-meta">${u.length} chars</span><button class="gz-btn gz-btn-secondary">📋</button></div>`;
    card.querySelector("button").onclick = (e)=>{e.stopPropagation();copyText(u);};
    card.addEventListener("click", ()=>copyText(u));
    results.appendChild(card);
  }
  if (results.children.length === 0){
    results.innerHTML = `<div style="opacity:.6;padding:20px;text-align:center">${base? "Try a different base word":"Enter a name to start"}</div>`;
  }
}

$("#toolbar").innerHTML = `
  <button class="gz-btn" onclick="generate()">✨ Generate</button>
  <button class="gz-btn gz-btn-secondary" onclick="generate()">🔄 Regenerate</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('results').innerHTML=''">🗑️ Clear</button>`;

});
generate();
</script>
