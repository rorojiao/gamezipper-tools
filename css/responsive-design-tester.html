<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-input-row">
      <label id="lbl-url"></label>
      <input type="text" id="url-input" placeholder="example.com" value="example.com">
    </div>
    <div class="device-bar" id="devices"></div>
    <div class="info-bar" id="info"></div>
    <div id="preview-wrap">
      <iframe id="preview-frame" width="375" height="667" style="border:none"></iframe>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Responsive Design Tester',
    toolDesc: 'Preview any website across iPhone, Android, tablet and desktop screen sizes. Test responsive layouts instantly.',
    urlLabel: 'Website URL',
    load: 'Load',
    device: 'Device',
    resolution: 'Resolution',
    noteBlocked: 'Note: Some sites block iframe embedding for security.',
    step1: 'Enter a website URL (e.g., example.com)',
    step2: 'Pick a device preset from the buttons above',
    step3: 'The site loads at that screen resolution',
    step4: 'Switch between devices to test responsiveness',
  },
  zh: {
    toolTitle: '响应式设计测试器',
    toolDesc: '在 iPhone、Android、平板和桌面屏幕尺寸下预览任意网站。即时测试响应式布局。',
    urlLabel: '网站网址',
    load: '加载',
    device: '设备',
    resolution: '分辨率',
    noteBlocked: '注意：部分网站出于安全原因会阻止 iframe 嵌入。',
    step1: '输入网站网址（如 example.com）',
    step2: '从上方按钮中选择设备预设',
    step3: '网站将以该屏幕分辨率加载',
    step4: '在不同设备之间切换以测试响应式效果',
  }
});

const { $, t } = GZ;

const devices = [
  {name:'iPhone SE', w:375, h:667, icon:'📱'},
  {name:'iPhone 14', w:390, h:844, icon:'📱'},
  {name:'iPhone 14 Pro Max', w:430, h:932, icon:'📱'},
  {name:'Pixel 7', w:412, h:915, icon:'📱'},
  {name:'iPad Mini', w:768, h:1024, icon:'📲'},
  {name:'iPad Pro', w:1024, h:1366, icon:'📲'},
  {name:'Laptop', w:1366, h:768, icon:'💻'},
  {name:'Desktop', w:1920, h:1080, icon:'🖥️'},
];

let currentDevice = devices[0];

function normalizeUrl(url) {
  url = url.trim();
  if (!url) return '';
  if (!/^https?:\/\//.test(url)) url = 'https://' + url;
  return url;
}

function loadSite() {
  const url = normalizeUrl($('#url-input').value);
  if (!url) return;
  $('#preview-frame').src = url;
}

function setDevice(idx) {
  currentDevice = devices[idx];
  const frame = $('#preview-frame');
  const wrap = $('#preview-wrap');
  frame.width = currentDevice.w;
  frame.height = currentDevice.h;
  // Scale if too wide
  const wrapWidth = wrap.clientWidth - 40;
  if (currentDevice.w > wrapWidth) {
    const scale = wrapWidth / currentDevice.w;
    frame.style.transform = `scale(${scale})`;
    frame.style.marginBottom = `-${currentDevice.h * (1 - scale)}px`;
  } else {
    frame.style.transform = 'none';
    frame.style.marginBottom = '0';
  }
  $('#info').innerHTML = `<span>${t('device')}: ${currentDevice.icon} ${currentDevice.name}</span><span>${t('resolution')}: ${currentDevice.w} × ${currentDevice.h}</span>`;
  // Update active button
  document.querySelectorAll('.device-btn').forEach((b,i) => b.classList.toggle('active', i === idx));
}

$('#devices').innerHTML = devices.map((d,i) =>
  `<button class="device-btn${i===0?' active':''}" onclick="setDevice(${i})" title="${d.w}×${d.h}">${d.icon} ${d.name}</button>`
).join('');

$('#url-input').addEventListener('keydown', e => { if (e.key === 'Enter') loadSite(); });

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="loadSite()">${t('load')}</button>`;

window.setDevice = setDevice;
setDevice(0);

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📱', href:'/seo/mobile-friendly-test.html', name:'Mobile Friendly Test'},
    {icon:'📐', href:'/css-tools/flexbox.html', name:'Flexbox Generator'},
    {icon:'🎨', href:'/css/aurora-gradient.html', name:'Aurora Gradient'},
    {icon:'⚡', href:'/dev/web-vitals.html', name:'Web Vitals'},
  ]
});
</script>
