    descEveryMin: '每分钟运行',
    descEveryHour: '每小时的第 {m} 分钟运行',
    descDaily: '每天 {h}:{m} 运行',
    descWeekly: '每周{dow} {h}:{m} 运行',
    descMonthly: '每月 {d} 日 {h}:{m} 运行',
    descYearly: '每年 {mon} {d} 日 {h}:{m} 运行',
    descCustom: '自定义计划',
    step1: '选择预设或单独设置每个字段',
    step2: 'Cron 表达式会随选择自动生成',

const { $, copyText, t } = GZ;

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOWS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const state = { minute:'0', hour:'*', day:'*', month:'*', dow:'*' };

function buildExpression() {
  return [state.minute, state.hour, state.day, state.month, state.dow].join(' ');
}

function describe() {
  const m = state.minute, h = state.hour, d = state.day, mo = state.month, dow = state.dow;
  if (m === '*' && h === '*' && d === '*' && mo === '*' && dow === '*') return t('descEveryMin');
  if (m !== '*' && h === '*' && d === '*' && mo === '*' && dow === '*') return t('descEveryHour').replace('{m}', m);
  const hh = h === '*' ? '0' : h;
  const mm = m === '*' ? '0' : m;
  const time = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
  if (m !== '*' && h !== '*' && d === '*' && mo === '*' && dow === '*') return t('descDaily').replace('{h}',hh).replace('{m}',mm);
  if (m !== '*' && h !== '*' && d === '*' && mo === '*' && dow !== '*') {
    const dn = DOWS[(+dow) % 7] || dow;
    return t('descWeekly').replace('{dow}',dn).replace('{h}',hh).replace('{m}',mm);
  }
  if (m !== '*' && h !== '*' && d !== '*' && mo === '*' && dow === '*') return t('descMonthly').replace('{d}',d).replace('{h}',hh).replace('{m}',mm);
  if (m !== '*' && h !== '*' && d !== '*' && mo !== '*' && dow === '*') return t('descYearly').replace('{mon}',MONTHS[(+mo-1)%12]||mo).replace('{d}',d).replace('{h}',hh).replace('{m}',mm);
  return t('descCustom') + ': ' + buildExpression();
}

// Compute next run times via brute-force search
function nextRuns(expr, count = 5) {
  const parts = expr.trim().split(/\s+/);
  if (parts.length < 5) return [];
  const [mF, hF, dF, moF, wF] = parts;
  const matchField = (field, value, min, max) => {
    if (field === '*') return true;
    return field.split(',').some(part => {
      let step = 1, range = part;
      const si = part.indexOf('/');
      if (si >= 0) { step = +part.slice(si+1); range = part.slice(0,si); }
      if (range === '*') range = `${min}-${max}`;
      const [lo, hi = lo] = range.split('-').map(Number);
      if (value < lo || value > hi) return false;
      return ((value - lo) % step) === 0;
    });
  };
  const out = [];
  let dt = new Date();
  dt.setUTCSeconds(0, 0);
  dt.setUTCMinutes(dt.getUTCMinutes() + 1);
  const limit = new Date(dt.getTime() + 365 * 24 * 3600 * 1000);
  let guard = 0;
  while (out.length < count && dt < limit && guard < 200000) {
    guard++;
    const mo = dt.getUTCMonth() + 1;
    const d = dt.getUTCDate();
    const h = dt.getUTCHours();
    const mi = dt.getUTCMinutes();
    const wd = dt.getUTCDay();
    if (matchField(moF, mo, 1, 12) &&
        matchField(dF, d, 1, 31) &&
        (wF === '*' || matchField(wF, wd, 0, 6) || matchField(dF, d, 1, 31) && false) &&
        matchField(wF === '*' ? '*' : wF, wd, 0, 6) &&
        matchField(hF, h, 0, 23) &&
        matchField(mF, mi, 0, 59)) {
      // For day-of-month and day-of-week: standard cron ORs them when both restricted
      const dmOk = matchField(dF, d, 1, 31);
      const dwOk = matchField(wF, wd, 0, 6);
      const bothRestricted = dF !== '*' && wF !== '*';
      if ((bothRestricted && (dmOk || dwOk)) || (!bothRestricted && dmOk && dwOk)) {
        out.push(dt.toISOString().replace('T',' ').slice(0,16) + ' UTC');
      }
    }
    dt.setUTCMinutes(dt.getUTCMinutes() + 1);
  }
  return out;
}

function update() {
  const expr = buildExpression();
  $('#expr').textContent = expr + ' ' + ($('#command').value || '<command>');
  $('#descOut').textContent = describe();
  const runs = nextRuns(expr, 5);
  $('#nextRuns').innerHTML = runs.length ? runs.map(r => `<li>${r}</li>`).join('') : `<li style="opacity:.6">—</li>`;
}

function renderFields() {
  const fields = [
    {key:'minute', label:t('minute'), max:59, opts:['*','0','15','30','45','*/5','*/10','*/15','*/30']},
    {key:'hour', label:t('hour'), max:23, opts:['*','0','6','9','12','18','23','*/2','*/6']},
    {key:'day', label:t('day'), max:31, opts:['*','1','15','*/2','*/7','L']},
    {key:'month', label:t('month'), max:12, opts:['*','1','*/3','*/6','1,4,7,10']},
    {key:'dow', label:t('dow'), max:6, opts:['*','0','1','1-5','6','0,6','1,3,5']},
  ];
  $('#fields').innerHTML = fields.map(f => `
    <div class="cron-field">
      <label>${f.label}</label>
      <select id="sel-${f.key}" onchange="state['${f.key}']=this.value;update()">
        ${f.opts.map(o => `<option value="${o}" ${state[f.key]===o?'selected':''}>${o}</option>`).join('')}
      </select>
      <input type="text" value="${state[f.key]}" oninput="state['${f.key}']=this.value;update()" style="margin-top:6px;font-family:monospace">
    </div>`).join('');
}

const PRESETS = [
  {label:'Every minute', vals:['*','*','*','*','*']},
  {label:'Every 5 min', vals:['*/5','*','*','*','*']},
  {label:'Every 15 min', vals:['*/15','*','*','*','*']},
  {label:'Hourly', vals:['0','*','*','*','*']},
  {label:'Daily 9am', vals:['0','9','*','*','*']},
  {label:'Daily midnight', vals:['0','0','*','*','*']},
  {label:'Weekdays 9am', vals:['0','9','*','*','1-5']},
  {label:'Weekly Sun', vals:['0','0','*','*','0']},
  {label:'Monthly 1st', vals:['0','0','1','*','*']},
  {label:'Quarterly', vals:['0','0','1','*/3','*']},
];

function renderPresets() {
  $('#presets').innerHTML = PRESETS.map((p,i) =>
    `<button onclick="applyPreset(${i})">${p.label}</button>`).join('');
}

function applyPreset(i) {
  const p = PRESETS[i];
  ['minute','hour','day','month','dow'].forEach((k,j) => state[k] = p.vals[j]);
  renderFields();
  update();
}

$('#command').addEventListener('input', update);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#expr').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="applyPreset(0)">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#command').value='';update()">${t('clear')}</button>`;

$('#lbl-next').textContent = t('nextRuns');

renderPresets();
renderFields();
applyPreset(6); // Weekdays 9am — useful default

</script>
