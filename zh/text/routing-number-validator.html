<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is a routing number?", "acceptedAnswer": {"@type": "Answer", "text": "A routing number (also called ABA number, RTN, or ACH routing number) is a 9-digit code used in the United States to identify the financial institution that holds a bank account. It appears at the bottom-left of a check."}}, {"@type": "Question", "name": "How is a routing number validated?", "acceptedAnswer": {"@type": "Answer", "text": "The validator multiplies each of the 9 digits by weights 3,7,1,3,7,1,3,7,1 respectively, sums the products, and checks whether the total is evenly divisible by 10. If the remainder is 0, the checksum passes."}}, {"@type": "Question", "name": "What does the first digit mean?", "acceptedAnswer": {"@type": "Answer", "text": "The first four digits identify the Federal Reserve Bank district and processing center that originally assigned the routing number. The first digit indicates the region: 0 or 1 covers the Federal Reserve Banks."}}, {"@type": "Question", "name": "Is my routing number uploaded anywhere?", "acceptedAnswer": {"@type": "Answer", "text": "No. Routing numbers are public identifiers (printed on every check), but even so all validation here runs entirely in your browser. Nothing is sent to any server."}}]}</script>

<script>
GZI18n.register({

    step4: 'Routing numbers are public — safe to check, but never share your account number publicly',
  },
  zh: {
    toolTitle: '美国银行路由号验证器',
    toolDesc: '验证美国银行路由号（ABA / RTN）— 检查 9 位数字格式、校验和和美联储分区。完全在浏览器中运行。',
    validate: '验证',
    clear: '清空',
    example: '示例',
    valid: '✓ 路由号有效',
    invalid: '✗ 路由号无效',
    enterNum: '请输入 9 位路由号',
    onlyDigits: '路由号只能包含数字',
    wrongLength: '必须正好 9 位数字',
    checksumOk: '校验和通过',
    checksumFail: '校验和失败',
    frDistrict: '美联储分区',
    step1: '输入或粘贴 9 位美国银行路由号',
    step2: '点击「验证」运行格式和校验和检查',
    step3: '查看验证结果和美联储分区信息',
    step4: '路由号是公开信息 — 可放心检查，但请勿公开你的账号',
  }
});

const { $, t } = GZ;

// Federal Reserve districts based on first two digits
const FR_DISTRICTS = {
  '01':'Boston, MA','02':'New York, NY','03':'Philadelphia, PA','04':'Cleveland, OH',
  '05':'Richmond, VA','06':'Atlanta, GA','07':'Chicago, IL','08':'St. Louis, MO',
  '09':'Minneapolis, MN','10':'Kansas City, MO','11':'Dallas, TX','12':'San Francisco, CA',
  '21':'Charlotte, NC','22':'Baltimore, MD','23':'Birmingham, AL','24':'Nashville, TN',
  '25':'Cincinnati, OH','26':'Pittsburgh, PA','27':'Detroit, MI','28':'Little Rock, AR',
  '29':'Louisville, KY','30':'Memphis, TN','31':'Milwaukee, WI','32':'New Orleans, LA',
  '33':'Buffalo, NY','34':'Des Moines, IA','35':'Indianapolis, IN','36':'Omaha, NE',
  '37':'Columbus, OH','38':'Oklahoma City, OK','39':'Portland, OR','40':'Salt Lake City, UT',
  '41':'Seattle, WA','42':'Houston, TX','43':'Jacksonville, FL','44':'Denver, CO',
  '45':'Wichita, KS','46':'Sioux Falls, SD','47':'Spokane, WA','48':'El Paso, TX',
  '49':'Cheyenne, WY','50':'Hartford, CT','51':'Newark, NJ','52':'Philadelphia, PA',
  '53':'Cleveland, OH','54':'Baltimore, MD','55':'Atlanta, GA','56':'Chicago, IL',
  '57':'St. Louis, MO','58':'Minneapolis, MN','59':'Kansas City, MO','60':'Dallas, TX',
  '61':'San Francisco, CA','80':'Special (Thrift)','84':'Non-Participant',
};

function validateRtn(raw){
  const num = raw.replace(/[\s\-]/g,'');
  if(!num) return {ok:false,reason:'enterNum'};
  if(!/^\d+$/.test(num)) return {ok:false,reason:'onlyDigits'};
  if(num.length!==9) return {ok:false,reason:'wrongLength'};
  const weights=[3,7,1,3,7,1,3,7,1];
  let sum=0;
  for(let i=0;i<9;i++) sum += (+num[i])*weights[i];
  const ok = sum%10===0;
  if(!ok) return {ok:false,reason:'checksumFail'};
  const district = FR_DISTRICTS[num.substring(0,2)] || 'US';
  return {ok:true, district};
}

function doValidate(){
  const raw=$('#rtn-input').value.trim();
  const r=validateRtn(raw);
  if(r.ok){
    $('#result').innerHTML=`<div class="rtn-result rtn-ok">
      <div style="font-size:1.1em;font-weight:700;margin-bottom:8px">${t('valid')}</div>
      <div class="rtn-row"><span>${t('frDistrict')}</span><span>${r.district}</span></div>
      <div class="rtn-row" style="border:none"><span>${t('checksumOk')}</span><span>✓</span></div>
    </div>`;
  } else if(r.reason==='enterNum'){
    $('#result').innerHTML='';
  } else {
    $('#result').innerHTML=`<div class="rtn-result rtn-bad"><div style="font-weight:700">${t('invalid')}</div><div style="opacity:.8;margin-top:4px">${t(r.reason)}</div></div>`;
  }
}
function doClear(){ $('#rtn-input').value=''; $('#result').innerHTML=''; }
function loadExample(){ $('#rtn-input').value='021000021'; doValidate(); }

$('#rtn-input').addEventListener('input', e=>{
  e.target.value = e.target.value.replace(/\D/g,'').substring(0,9);
  doValidate();
});

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="doValidate()">${t('validate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

    {icon:'🔢', href:'/calc/prime-factorization-calculator.html', name:'Prime Factorization'},
  ]
});
</script>
