const { $, copyText, t } = GZ;
const COLORS = ['5865f2','57f287','fee75c','ed4245','eb459e','f47fff','5865f2','2f3136','ffffff','000000'];

function escapeHtml(s) {
  return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildPayload() {
  const payload = {};
  if ($('#username').value.trim()) payload.username = $('#username').value.trim();
  if ($('#avatar').value.trim()) payload.avatar_url = $('#avatar').value.trim();
  if ($('#content').value.trim()) payload.content = $('#content').value.trim();
  if ($('#tts').value === 'true') payload.tts = true;

  const emb = {};
  if ($('#embTitle').value.trim()) emb.title = $('#embTitle').value.trim();
  if ($('#embUrl').value.trim()) emb.url = $('#embUrl').value.trim();
  if ($('#embDesc').value.trim()) emb.description = $('#embDesc').value.trim();
  if ($('#embColor').value.trim()) {
    const c = $('#embColor').value.trim().replace('#','');
    if (/^[0-9a-f]{6}$/i.test(c)) emb.color = parseInt(c, 16);
  }
  if ($('#embAuthor').value.trim()) emb.author = {name: $('#embAuthor').value.trim()};
  if ($('#embFooter').value.trim()) emb.footer = {text: $('#embFooter').value.trim()};
  if ($('#embImage').value.trim()) emb.image = {url: $('#embImage').value.trim()};
  if ($('#embThumb').value.trim()) emb.thumbnail = {url: $('#embThumb').value.trim()};
  const fieldsTxt = $('#embFields').value.trim();
  if (fieldsTxt) {
    emb.fields = fieldsTxt.split('\n').map(l => {
      const [n, v, i] = l.split('|').map(s => s.trim());
      return {name: n||'', value: v||'', inline: i === 'true' || i === '1'};
    }).filter(f => f.name && f.value);
  }
  if (Object.keys(emb).length) payload.embeds = [emb];
  return payload;
}

function syntaxHighlight(obj) {
  let s = JSON.stringify(obj, null, 2);
  return s
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/("(?:\\.|[^"\\])*")(\s*:)/g, '<span class="key">$1</span>$2')
    .replace(/:\s*("(?:\\.|[^"\\])*")/g, ': <span class="str">$1</span>')
    .replace(/:\s*(true|false)/g, ': <span class="bool">$1</span>')
    .replace(/:\s*(\d+)/g, ': <span class="num">$1</span>');
}

function renderPreview(p) {
  const username = p.username || 'Webhook Bot';
  const avatar = p.avatar_url || 'https://cdn.discordapp.com/embed/avatars/0.png';
  const content = p.content || '';
  const emb = (p.embeds && p.embeds[0]) || null;
  let color = '#5865f2';
  if (emb && emb.color !== undefined) color = '#' + emb.color.toString(16).padStart(6, '0');
  let html = `<div class="dw-msg-author"><img src="${escapeHtml(avatar)}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'"><div><span class="name">${escapeHtml(username)}</span><span class="bot">BOT</span></div></div>`;
  if (content) html += `<div class="dw-content">${escapeHtml(content).replace(/\n/g,'<br>')}</div>`;
  if (emb) {
    html += `<div class="dw-embed-wrap"><div class="dw-embed" style="border-left-color:${color}">`;
    if (emb.author) html += `<div class="author">${emb.author.icon_url?`<img src="${escapeHtml(emb.author.icon_url)}">`:''}${escapeHtml(emb.author.name||'')}</div>`;
    if (emb.title) {
      const tHref = emb.url || '#';
      html += `<div class="title"><a href="${escapeHtml(tHref)}" style="color:#00b0f4;text-decoration:none">${escapeHtml(emb.title)}</a></div>`;
    }
    if (emb.description) html += `<div class="desc">${escapeHtml(emb.description).replace(/\n/g,'<br>')}</div>`;
    if (emb.fields && emb.fields.length) {
      html += '<div class="fields">';
      emb.fields.forEach(f => {
        html += `<div class="field" style="grid-column:span ${f.inline?1:2}"><div class="n">${escapeHtml(f.name)}</div><div class="v">${escapeHtml(f.value)}</div></div>`;
      });

      html += '</div>';
    }
    if (emb.image) html += `<img class="image" src="${escapeHtml(emb.image.url)}" onerror="this.style.display='none'">`;
    if (emb.footer) html += `<div class="footer">${emb.footer.icon_url?`<img src="${escapeHtml(emb.footer.icon_url)}">`:''}${escapeHtml(emb.footer.text||'')}</div>`;
    html += `</div>`;
    if (emb.thumbnail) html += `<img class="thumb" src="${escapeHtml(emb.thumbnail.url)}" onerror="this.style.display='none'">`;
    html += `</div>`;
  }
  $('#preview').innerHTML = html;
}

function update() {
  const p = buildPayload();
  renderPreview(p);
  $('#json').innerHTML = syntaxHighlight(p);
}

async function send() {
  const url = $('#whUrl').value.trim();
  if (!url) { showStatus(t('errNoUrl'), 'error'); return; }
  if (!/^https:\/\/(canary\.|ptb\.)?discord(?:app)?\.com\/api\/webhooks\/\d+\/[\w-]+$/.test(url)) {
    showStatus(t('errInvalidUrl'), 'error'); return;
  }
  const p = buildPayload();
  try {
    const r = await fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(p)
    });
    if (r.ok || r.status === 204) {
      showStatus(t('sent'), 'success');
    } else {
      const txt = await r.text();
      showStatus(`Error ${r.status}: ${txt.substring(0, 200)}`, 'error');
    }
  } catch (e) {
    showStatus('Network error: ' + e.message, 'error');
  }
}

function showStatus(msg, type) {
  const el = $('#status');
  el.className = 'dw-status show ' + type;
  el.textContent = msg;
  setTimeout(() => el.classList.remove('show'), 6000);
}

['whUrl','username','avatar','content','tts','embTitle','embUrl','embDesc','embColor','embAuthor','embFooter','embImage','embThumb','embFields'].forEach(id => {
  $('#'+id).addEventListener('input', update);
  $('#'+id).addEventListener('change', update);
});

$('#colorPresets').innerHTML = COLORS.map(c => `<div class="dw-color" style="background:#${c}" data-c="${c}" onclick="$('#embColor').value='${c}';update();document.querySelectorAll('.dw-color').forEach(x=>x.classList.remove('active'));this.classList.add('active')"></div>`).join('');

function loadExample() {
  $('#username').value = 'GameZipper Bot';
  $('#avatar').value = '';
  $('#content').value = 'Hello from **GameZipper Tools**! 👋';
  $('#tts').value = 'false';
  $('#embTitle').value = '🚀 New Tool Launched';
