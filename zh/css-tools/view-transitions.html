<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What are CSS View Transitions?", "acceptedAnswer": {"@type": "Answer", "text": "The View Transitions API allows you to create smooth animated transitions between different DOM states or page navigations. It captures snapshots of the old and new states and animates between them."}}, {"@type": "Question", "name": "Which browsers support View Transitions?", "acceptedAnswer": {"@type": "Answer", "text": "View Transitions are supported in Chrome 111+, Edge 111+, and Safari 18+. Firefox support is in development. The API includes a feature detection check via document.startViewTransition."}}, {"@type": "Question", "name": "Can I use view-transition-name for shared elements?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Assign view-transition-name to elements that should animate between states. Elements with the same name will morph from old to new positions, creating a shared element transition effect."}}, {"@type": "Question", "name": "Is this tool free?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, completely free. All code generation happens in your browser. No data is sent to any server."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS View Transitions Generator',
    toolDesc: 'Generate CSS View Transitions API code with live preview. Create smooth page transitions, morphing effects and shared element animations.',
    preview: 'Live Preview',
    duration: 'Duration',
    easing: 'Easing',
    type: 'Transition Type',
    blendMode: 'Blend Mode',
    direction: 'Direction',
    elementType: 'Element Style',
    morphSlide: 'Morph/Slide',
    fade: 'Fade',
    fadeInOut: 'Fade In/Out',
    slide: 'Slide',
    scale: 'Scale',
    rotate: 'Rotate',
    circleReveal: 'Circle Reveal',
    normal: 'Normal',
    reverse: 'Reverse',
    alternate: 'Alternate',
    rectangle: 'Rectangle',
    rounded: 'Rounded',
    circle: 'Circle',
    step1: 'Configure transition type, duration, easing and direction',
    step2: 'Click Play Transition to see the live preview',
    step3: 'Copy the generated CSS and JavaScript code',
    step4: 'Paste into your project and customize view-transition-name values',
  },
  zh: {
    toolTitle: 'CSS View Transitions 生成器',
    toolDesc: '生成 CSS View Transitions API 代码，支持实时预览。创建平滑的页面过渡、变形效果和共享元素动画。',
    preview: '实时预览',
    duration: '时长',
    easing: '缓动函数',
    type: '过渡类型',
    blendMode: '混合模式',
    direction: '方向',
    elementType: '元素样式',
    morphSlide: '变形/滑动',
    fade: '淡入淡出',
    fadeInOut: '淡入/淡出',
    slide: '滑动',
    scale: '缩放',
    rotate: '旋转',
    circleReveal: '圆形揭示',
    normal: '正常',
    reverse: '反向',
    alternate: '交替',
    rectangle: '矩形',
    rounded: '圆角',
    circle: '圆形',
    step1: '配置过渡类型、时长、缓动函数和方向',
    step2: '点击播放预览过渡效果',
    step3: '复制生成的 CSS 和 JavaScript 代码',
    step4: '粘贴到项目中并自定义 view-transition-name 值',
  }
});

const { $, copyText, t } = GZ;

const config = {
  type: 'fade',
  duration: 500,
  easing: 'ease-in-out',
  direction: 'normal',
  blendMode: 'normal',
  elementType: 'rounded',
};

function buildControls() {
  const controls = $('#controls');
  controls.innerHTML = `
    <div class="vt-control">
      <label>${t('type')}</label>
      <select onchange="config.type=this.value;generateCode()">
        <option value="fade">${t('fade')}</option>
        <option value="fadeInOut">${t('fadeInOut')}</option>
        <option value="slide">${t('slide')}</option>
        <option value="morphSlide">${t('morphSlide')}</option>
        <option value="scale">${t('scale')}</option>
        <option value="rotate">${t('rotate')}</option>
        <option value="circleReveal">${t('circleReveal')}</option>
      </select>
    </div>
    <div class="vt-control">
      <label>${t('duration')}: <span id="dur-val">${config.duration}ms</span></label>
      <input type="range" min="100" max="2000" step="50" value="${config.duration}" oninput="config.duration=+this.value;document.getElementById('dur-val').textContent=this.value+'ms';generateCode()">
    </div>
    <div class="vt-control">
      <label>${t('easing')}</label>
      <select onchange="config.easing=this.value;generateCode()">
        <option value="ease">ease</option>
        <option value="ease-in-out" selected>ease-in-out</option>
        <option value="ease-in">ease-in</option>
        <option value="ease-out">ease-out</option>
        <option value="linear">linear</option>
        <option value="cubic-bezier(0.4, 0, 0.2, 1)">cubic-bezier(0.4, 0, 0.2, 1)</option>
      </select>
    </div>
    <div class="vt-control">
      <label>${t('direction')}</label>
      <select onchange="config.direction=this.value;generateCode()">
        <option value="normal">${t('normal')}</option>
        <option value="reverse">${t('reverse')}</option>
        <option value="alternate">${t('alternate')}</option>
      </select>
    </div>
    <div class="vt-control">
      <label>${t('elementType')}</label>
      <select onchange="config.elementType=this.value;updatePreview();generateCode()">
        <option value="rectangle">${t('rectangle')}</option>
        <option value="rounded" selected>${t('rounded')}</option>
        <option value="circle">${t('circle')}</option>
      </select>
    </div>`;
}

function updatePreview() {
  const a = $('#boxA'), b = $('#boxB');
  const radius = config.elementType === 'circle' ? '50%' : config.elementType === 'rounded' ? '12px' : '0';
  a.style.borderRadius = radius;
  b.style.borderRadius = radius;
  if (config.elementType === 'circle') {
    a.style.width = a.style.height = '90px';
    b.style.width = b.style.height = '90px';
  } else {
    a.style.width = '120px'; a.style.height = '80px';
    b.style.width = '120px'; b.style.height = '80px';
  }
}

function generateCode() {
  const d = config.duration;
  const e = config.easing;
  const dir = config.direction;
  let css = '', js = '';

  // Common CSS
  css += `/* View Transition Styles */\n`;
  css += `::view-transition-old(root),\n::view-transition-new(root) {\n`;
  css += `  animation-duration: ${d}ms;\n`;
  css += `  animation-timing-function: ${e};\n`;
  if (dir !== 'normal') css += `  animation-direction: ${dir};\n`;
  css += `}\n\n`;

  switch(config.type) {
    case 'fade':
      css += `/* Fade transition */\n`;
      css += `::view-transition-old(root) {\n  animation-name: vt-fade-out;\n}\n`;
      css += `::view-transition-new(root) {\n  animation-name: vt-fade-in;\n}\n\n`;
      css += `@keyframes vt-fade-out {\n  from { opacity: 1; }\n  to { opacity: 0; }\n}\n`;
      css += `@keyframes vt-fade-in {\n  from { opacity: 0; }\n  to { opacity: 1; }\n`;
      break;

    case 'fadeInOut':
      css += `/* Fade In/Out - cross-fade with hold */\n`;
      css += `::view-transition-old(root) {\n  animation: vt-fade-out ${d}ms ${e};\n}\n`;
      css += `::view-transition-new(root) {\n  animation: vt-fade-in ${d}ms ${e} ${d/2}ms both;\n}\n\n`;
      css += `@keyframes vt-fade-out {\n  to { opacity: 0; }\n}\n`;
      css += `@keyframes vt-fade-in {\n  from { opacity: 0; }\n  to { opacity: 1; }\n`;
      break;

    case 'slide':
      css += `/* Slide transition */\n`;
      css += `::view-transition-old(root) {\n  animation: vt-slide-out ${d}ms ${e};\n}\n`;
      css += `::view-transition-new(root) {\n  animation: vt-slide-in ${d}ms ${e};\n}\n\n`;
      css += `@keyframes vt-slide-out {\n  to { transform: translateX(-100%); opacity: 0; }\n}\n`;
      css += `@keyframes vt-slide-in {\n  from { transform: translateX(100%); }\n  to { transform: translateX(0); }\n}`;
      break;

    case 'morphSlide':
      css += `/* Morph/Slide - shared element transition */\n`;
      css += `.card { view-transition-name: card; }\n\n`;
      css += `::view-transition-old(card),\n::view-transition-new(card) {\n`;
      css += `  animation-duration: ${d}ms;\n  animation-timing-function: ${e};\n}\n\n`;
      css += `::view-transition-old(root),\n::view-transition-new(root) {\n`;
      css += `  animation-duration: ${d * 0.7}ms;\n}\n`;
      break;

    case 'scale':
      css += `/* Scale transition */\n`;
      css += `::view-transition-old(root) {\n  animation: vt-scale-out ${d}ms ${e};\n}\n`;
      css += `::view-transition-new(root) {\n  animation: vt-scale-in ${d}ms ${e};\n}\n\n`;
      css += `@keyframes vt-scale-out {\n  to { transform: scale(0.8); opacity: 0; }\n}\n`;
      css += `@keyframes vt-scale-in {\n  from { transform: scale(1.2); opacity: 0; }\n  to { transform: scale(1); opacity: 1; }\n}`;
      break;

    case 'rotate':
      css += `/* Rotate transition */\n`;
      css += `::view-transition-old(root) {\n  animation: vt-rotate-out ${d}ms ${e};\n}\n`;
      css += `::view-transition-new(root) {\n  animation: vt-rotate-in ${d}ms ${e};\n}\n\n`;
      css += `@keyframes vt-rotate-out {\n  to { transform: rotate(90deg) scale(0.8); opacity: 0; }\n}\n`;
      css += `@keyframes vt-rotate-in {\n  from { transform: rotate(-90deg) scale(0.8); opacity: 0; }\n  to { transform: rotate(0deg) scale(1); opacity: 1; }\n}`;
      break;

    case 'circleReveal':
      css += `/* Circle Reveal */\n`;
      css += `::view-transition-new(root) {\n  animation: vt-circle-reveal ${d}ms ${e};\n  clip-path: circle(0%);\n}\n\n`;
      css += `::view-transition-old(root) {\n  animation: none;\n  opacity: 0;\n}\n\n`;
      css += `@keyframes vt-circle-reveal {\n  from { clip-path: circle(0%); }\n  to { clip-path: circle(150%); }\n}`;
      break;
  }

  // JavaScript
  js = `// JavaScript to trigger view transition\n`;
  js += `function navigateWithTransition() {\n`;
  js += `  if (!document.startViewTransition) {\n`;
  js += `    // Fallback for unsupported browsers\n`;
  js += `    updateDOM();\n    return;\n  }\n\n`;
  js += `  const transition = document.startViewTransition(() => {\n`;
  js += `    updateDOM(); // Your DOM update function\n`;
  js += `  });\n}\n`;

  $('#code-output').textContent = css + '\n\n' + js;
}

let isSwapped = false;
function runTransition() {
  const a = $('#boxA'), b = $('#boxB');
  const d = config.duration;

  if (document.startViewTransition) {
    const transition = document.startViewTransition(() => {
      swapElements();
    });
  } else {
    // Fallback animation
    const container = $('#preview');
    container.style.perspective = '800px';
    if (!isSwapped) {
      a.style.transition = `all ${d}ms ${config.easing}`;
      b.style.transition = `all ${d}ms ${config.easing}`;
      a.style.transform = 'translateX(180px) scale(0.5)';
      a.style.opacity = '0';
      b.style.transform = 'translateX(-180px) scale(0.5)';
      b.style.opacity = '0';
      setTimeout(() => {
        a.style.transform = ''; a.style.opacity = '1';
        b.style.transform = ''; b.style.opacity = '1';
        swapElements();
      }, d);
    } else {
      resetPreview();
    }
  }
}

function swapElements() {
  const a = $('#boxA'), b = $('#boxB');
  isSwapped = !isSwapped;
  if (isSwapped) {
    a.textContent = 'Element B';
    a.style.background = 'linear-gradient(135deg,#61afef,#4ecdc4)';
    b.textContent = 'Element A';
    b.style.background = 'linear-gradient(135deg,#e94560,#ff6b6b)';
  } else {
    a.textContent = 'Element A';
    a.style.background = 'linear-gradient(135deg,#e94560,#ff6b6b)';
    b.textContent = 'Element B';
    b.style.background = 'linear-gradient(135deg,#61afef,#4ecdc4)';
  }
}

function resetPreview() {
  isSwapped = false;
  const a = $('#boxA'), b = $('#boxB');
  a.textContent = 'Element A';
  a.style.background = 'linear-gradient(135deg,#e94560,#ff6b6b)';
  a.style.transform = ''; a.style.opacity = '1';
  b.textContent = 'Element B';
  b.style.background = 'linear-gradient(135deg,#61afef,#4ecdc4)';
  b.style.transform = ''; b.style.opacity = '1';
}

$('#preview-label').textContent = t('preview');
buildControls();
generateCode();

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generateCode()">${t('convert') || 'Generate'}</button>
  <button class="gz-btn" onclick="copyText($('#code-output').textContent)">${t('copy')}</button>`;

GZ.renderToolPage({
  related: [
    {icon:'🎨', href:'/css-tools/scroll-animation.html', name:'Scroll Animation'},
    {icon:'✂️', href:'/css-tools/clip-path.html', name:'Clip-Path'},
    {icon:'🔄', href:'/css-tools/transform.html', name:'CSS Transform'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
