<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What JavaScript version should I learn?", "acceptedAnswer": {"@type": "Answer", "text": "Modern JavaScript (ES2020+) is the standard. Learn let/const, arrow functions, template literals, destructuring, spread operator, async/await, optional chaining (?.), nullish coalescing (??) and modules. These features are supported in all current browsers."}}, {"@type": "Question", "name": "What is the difference between let, const and var?", "acceptedAnswer": {"@type": "Answer", "text": "var is function-scoped and hoisted (avoid in modern code). let is block-scoped and reassignable. const is block-scoped and cannot be reassigned (though object/array contents can still mutate). Default to const, use let only when you need to reassign."}}, {"@type": "Question", "name": "How do async/await work?", "acceptedAnswer": {"@type": "Answer", "text": "async marks a function as returning a Promise. await pauses execution inside an async function until a Promise resolves, letting you write asynchronous code that reads like synchronous code. Wrap await calls in try/catch to handle errors."}}, {"@type": "Question", "name": "Is this JavaScript cheat sheet free?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, completely free. Search any method or feature, view the description and copy working example code. Covers arrays, strings, objects, promises, DOM manipulation and modern ES2020+ syntax. No signup required."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'JavaScript Cheat Sheet',
    toolDesc: 'Complete interactive JS reference covering arrays, strings, objects, async/await, DOM and modern ES2020+ features. Searchable with copy-paste examples.',
    search: 'Search snippets...',
    step1: 'Search for any method, keyword or feature',
    step2: 'Filter by category using the tabs',
    step3: 'Read the description to understand usage',
    step4: 'Click Copy on any example to use it',
  },
  zh: {
    toolTitle: 'JavaScript 速查表',
    toolDesc: '完整的交互式 JS 参考手册，涵盖数组、字符串、对象、async/await、DOM 和现代 ES2020+ 特性。支持搜索和复制示例代码。',
    search: '搜索代码片段...',
    step1: '搜索任意方法、关键字或特性',
    step2: '使用标签按类别筛选',
    step3: '阅读描述了解用法',
    step4: '点击示例上的复制按钮直接使用',
  }
});

const { t } = GZ;

const SECTIONS = [
  {id:'all', label:'All'},
  {id:'variables', label:'Variables'},
  {id:'array', label:'Arrays'},
  {id:'string', label:'Strings'},
  {id:'object', label:'Objects'},
  {id:'async', label:'Async'},
  {id:'dom', label:'DOM'},
  {id:'modern', label:'Modern ES'},
];

const SNIPPETS = [
  // Variables
  {name:'const / let', sec:'variables', badge:'es6', desc:'Block-scoped variable declarations.', ex:"const PI = 3.14;\nlet count = 0;\ncount += 1;"},
  {name:'Destructuring', sec:'variables', badge:'es6', desc:'Unpack values from arrays/objects.', ex:"const { name, age } = user;\nconst [first, ...rest] = arr;"},
  {name:'Template literals', sec:'variables', badge:'es6', desc:'String interpolation with backticks.', ex:"const greeting = `Hello, ${name}!`;\nconst html = `<div>${content}</div>`;"},
  {name:'Spread operator', sec:'variables', badge:'es6', desc:'Expand iterables / merge objects.', ex:"const merged = [...arr1, ...arr2];\nconst obj = { ...defaults, ...overrides };"},
  {name:'Default parameters', sec:'variables', badge:'es6', desc:'Function param defaults.', ex:"function greet(name = 'Guest') {\n  return `Hi, ${name}`;\n}"},
  // Arrays
  {name:'Array.map()', sec:'array', desc:'Transform each element, returns new array.', ex:"const doubled = [1,2,3].map(n => n * 2);\n// [2, 4, 6]"},
  {name:'Array.filter()', sec:'array', desc:'Keep elements passing a test.', ex:"const evens = [1,2,3,4].filter(n => n % 2 === 0);\n// [2, 4]"},
  {name:'Array.reduce()', sec:'array', desc:'Accumulate to single value.', ex:"const sum = [1,2,3].reduce((a, b) => a + b, 0);\n// 6"},
  {name:'Array.find()', sec:'array', desc:'First matching element.', ex:"const user = users.find(u => u.active);\n// first active user"},
  {name:'Array.some() / every()', sec:'array', desc:'Test if any/all match.', ex:"const hasActive = users.some(u => u.active);\nconst allValid = users.every(u => u.id);"},
  {name:'Array.includes()', sec:'array', badge:'es6', desc:'Check membership.', ex:"const colors = ['red','blue'];\ncolors.includes('red'); // true"},
  {name:'Array.flat() / flatMap()', sec:'array', badge:'es2020', desc:'Flatten nested arrays.', ex:"const flat = [1,[2,[3]]].flat(Infinity);\n// [1, 2, 3]"},
  {name:'Array.sort()', sec:'array', desc:'Sort (mutates). Pass comparator for numbers.', ex:"[3,1,2].sort((a,b) => a - b);\n// [1, 2, 3]"},
  // Strings
  {name:'String methods', sec:'string', desc:'Common string operations.', ex:"'Hello'.toLowerCase();      // 'hello'\n'hello'.toUpperCase();      // 'HELLO'\n'  hi  '.trim();             // 'hi'\n'hello'.split('').reverse().join(''); // 'olleh'"},
  {name:'String.includes()', sec:'string', badge:'es6', desc:'Substring check.', ex:"'hello world'.includes('world'); // true"},
  {name:'String.padStart() / padEnd()', sec:'string', badge:'es2017', desc:'Pad to fixed length.', ex:"'5'.padStart(3, '0'); // '005'"},
  {name:'String.replaceAll()', sec:'string', badge:'es2021', desc:'Replace all occurrences.', ex:"'a-b-c'.replaceAll('-', '_'); // 'a_b_c'"},
  {name:'RegExp test', sec:'string', desc:'Test pattern match.', ex:"const re = /^\\w+@[\\w.]+$/;\nre.test('a@b.com'); // true"},
  // Objects
  {name:'Object.keys/values/entries', sec:'object', desc:'Iterate object properties.', ex:"Object.keys(obj);     // ['a', 'b']\nObject.values(obj);   // [1, 2]\nObject.entries(obj);  // [['a',1], ['b',2]]"},
  {name:'Object.assign()', sec:'object', desc:'Merge objects (shallow).', ex:"const merged = Object.assign({}, a, b);\n// or spread: { ...a, ...b }"},
  {name:'Optional chaining', sec:'object', badge:'es2020', desc:'Safe nested access.', ex:"const city = user?.address?.city;\n// undefined if any step is null/undefined"},
  {name:'Nullish coalescing', sec:'object', badge:'es2020', desc:'Default for null/undefined only.', ex:"const name = input ?? 'anonymous';\n// unlike ||, keeps 0, '', false"},
  {name:'JSON parse/stringify', sec:'object', desc:'Convert to/from JSON.', ex:"const str = JSON.stringify(obj);\nconst obj = JSON.parse(str);"},
  {name:'Object shorthand', sec:'object', badge:'es6', desc:'Shorthand property names.', ex:"const name = 'Bob';\nconst user = { name, age: 30 };\n// { name: 'Bob', age: 30 }"},
  // Async
  {name:'Promise', sec:'async', desc:'Represents async result.', ex:"const p = new Promise((resolve, reject) => {\n  setTimeout(() => resolve('done'), 1000);\n});"},
  {name:'async / await', sec:'async', badge:'es2017', desc:'Cleaner Promise syntax.', ex:"async function getData() {\n  const res = await fetch('/api');\n  return res.json();\n}"},
  {name:'Promise.all()', sec:'async', desc:'Run promises in parallel.', ex:"const [a, b] = await Promise.all([\n  fetch('/a').then(r => r.json()),\n  fetch('/b').then(r => r.json()),\n]);"},
  {name:'try/catch', sec:'async', desc:'Handle async errors.', ex:"try {\n  const data = await getData();\n} catch (err) {\n  console.error(err);\n}"},
  {name:'fetch()', sec:'async', desc:'HTTP requests.', ex:"const res = await fetch('/api', {\n  method: 'POST',\n  headers: { 'Content-Type': 'application/json' },\n  body: JSON.stringify(data),\n});\nconst json = await res.json();"},
  // DOM
  {name:'querySelector', sec:'dom', badge:'dom', desc:'Select element(s).', ex:"const btn = document.querySelector('.btn');\nconst items = document.querySelectorAll('.item');"},
  {name:'addEventListener', sec:'dom', badge:'dom', desc:'Bind event handler.', ex:"btn.addEventListener('click', e => {\n  console.log('clicked', e.target);\n});"},
  {name:'classList', sec:'dom', badge:'dom', desc:'Toggle CSS classes.', ex:"el.classList.add('active');\nel.classList.remove('hidden');\nel.classList.toggle('open');"},
  {name:'createElement', sec:'dom', badge:'dom', desc:'Build DOM nodes.', ex:"const div = document.createElement('div');\ndiv.textContent = 'Hello';\ndocument.body.appendChild(div);"},
  {name:'innerHTML / textContent', sec:'dom', badge:'dom', desc:'Set element content.', ex:"el.textContent = 'safe text';\nel.innerHTML = '<b>bold</b>';"},
  // Modern ES
  {name:'Arrow functions', sec:'modern', badge:'es6', desc:'Concise function syntax.', ex:"const add = (a, b) => a + b;\nconst log = msg => console.log(msg);"},
  {name:'Modules import/export', sec:'modern', badge:'es6', desc:'ES module syntax.', ex:"// math.js\nexport const add = (a, b) => a + b;\nexport default function() {}\n\n// main.js\nimport add, { multiply } from './math.js';"},
  {name:'Map / Set', sec:'modern', badge:'es6', desc:'Keyed / unique collections.', ex:"const map = new Map();\nmap.set('key', 'value');\n\nconst set = new Set([1, 1, 2, 3]);\n// Set { 1, 2, 3 }"},
  {name:'Ternary operator', sec:'modern', desc:'Conditional expression.', ex:"const msg = age >= 18 ? 'adult' : 'minor';"},
  {name:'Numeric separators', sec:'modern', badge:'es2021', desc:'Readable large numbers.', ex:"const billion = 1_000_000_000;"},
  {name:'Top-level await', sec:'modern', badge:'es2022', desc:'Await in module scope.', ex:"// at top of module\nconst config = await fetch('/config.json').then(r => r.json());"},
];

let currentSection = 'all';
let searchQuery = '';

function renderTabs() {
  document.getElementById('tabs').innerHTML = SECTIONS.map(s =>
    `<button class="${s.id === currentSection ? 'active' : ''}" onclick="setSection('${s.id}')">${s.label}</button>`
  ).join('');
}

function setSection(id) {
  currentSection = id;
  renderTabs();
  renderCards();
}

function renderCards() {
  const filtered = SNIPPETS.filter(s => {
    const secOk = currentSection === 'all' || s.sec === currentSection;
    const q = searchQuery.toLowerCase();
    const qOk = !q || s.name.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q);
    return secOk && qOk;
  });
  if (filtered.length === 0) {
    document.getElementById('card-list').innerHTML = '<p style="text-align:center;color:var(--text2);padding:40px">No snippets found</p>';
    return;
  }
  document.getElementById('card-list').innerHTML = filtered.map((s, i) => {
    let badge = '';
    if (s.badge === 'es6') badge = ' <span class="badge badge-es6">ES6</span>';
    else if (s.badge === 'es2020') badge = ' <span class="badge badge-es2020">ES2020+</span>';
    else if (s.badge === 'es2017') badge = ' <span class="badge badge-es2020">ES2017</span>';
    else if (s.badge === 'es2021') badge = ' <span class="badge badge-es2020">ES2021</span>';
    else if (s.badge === 'es2022') badge = ' <span class="badge badge-es2020">ES2022</span>';
    else if (s.badge === 'dom') badge = ' <span class="badge badge-dom">DOM</span>';
    const escaped = s.ex.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<div class="snippet-card">
      <div class="snippet-name">${s.name}${badge}</div>
      <div class="snippet-desc">${s.desc}</div>
      <div class="snippet-code"><button class="copy-btn" onclick="copySnippet(this, ${i})">Copy</button><code>${escaped}</code></div>
    </div>`;
  }).join('');
  window._snippetData = filtered;
}

function copySnippet(btn, i) {
  const code = window._snippetData[i].ex;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderCards();
});
document.getElementById('search').placeholder = t('search');

renderTabs();
renderCards();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📄', href:'/html-cheat-sheet.html', name:'HTML Cheat Sheet'},
    {icon:'🎨', href:'/css-cheat-sheet.html', name:'CSS Cheat Sheet'},
    {icon:'🔮', href:'/dev/regex-tester.html', name:'Regex Tester'},
    {icon:'🔮', href:'/dev/regex-cheatsheet.html', name:'Regex Cheat Sheet'},
  ]
});
</script>
