<script>
GZI18n.register({
  en: {
    toolTitle: 'Underline Text Generator U̲',
    toolDesc: 'Add underlines U̲n̲d̲e̲r̲l̲i̲n̲e̲, double underlines, overlines, strikethrough and combined line effects to any text using Unicode combining characters. Copy & paste anywhere.',
    step1: 'Type or paste your text in the input box',
    step2: 'Browse the underline styles generated automatically',
    step3: 'Click Copy next to the style you like',
    step4: 'Paste into Instagram, Discord, Twitter, TikTok and more',
  },
  zh: {
    toolTitle: '下划线文字生成器 U̲',
    toolDesc: '为文字添加下划线 U̲n̲d̲e̲r̲l̲i̲n̲e̲、双下划线、上划线、删除线和组合线条效果（基于 Unicode 组合字符）。复制粘贴到任何平台。',
    step1: '在输入框中输入或粘贴文字',
    step2: '浏览自动生成的下划线风格',
    step3: '点击复制按钮复制喜欢的风格',
    step4: '粘贴到 Instagram、Discord、Twitter、TikTok 等平台',
  }
});

const { $, $$, t } = GZ;

// Unicode combining marks
const UNDERLINE = '\u0332';      // combining low line
const DOUBLE_LOW = '\u0333';     // combining double low line
const OVERLINE = '\u0305';       // combining overline
const DOUBLE_OVER = '\u033F';    // combining double overline
const STRIKE = '\u0336';         // combining long stroke overlay
const SHORT_STRIKE = '\u0335';   // combining short stroke overlay
const SLASH = '\u0337';          // combining long slash overlay
const DOT_ABOVE = '\u0307';      // combining dot above
const DOT_BELOW = '\u0323';      // combining dot below
const BOX = '\u20E3';            // combining enclosing keycap

// Apply a single combining mark after each character (preserves spaces, newlines)
function addMark(s, mark) {
  return [...s].map(c => {
    if (c === ' ' || c === '\n' || c === '\t') return c;
    return c + mark;
  }).join('');
}

// Apply multiple marks
function addMarks(s, marks) {
  return [...s].map(c => {
    if (c === ' ' || c === '\n' || c === '\t') return c;
    return c + marks;
  }).join('');
}

const STYLES = [
  { name: 'Underline U̲n̲d̲e̲r̲', fn: s => addMark(s, UNDERLINE) },
  { name: 'Double Underline U̳n̳d̳e̳r̳', fn: s => addMarks(s, UNDERLINE + DOUBLE_LOW) },
  { name: 'Overline O̅n̅e̅l̅i̅n̅e̅', fn: s => addMark(s, OVERLINE) },
  { name: 'Double Overline O̿n̿e̿l̿i̿n̿e̿', fn: s => addMarks(s, OVERLINE + DOUBLE_OVER) },
  { name: 'Strikethrough S̶t̶r̶i̶k̶e̶', fn: s => addMark(s, STRIKE) },
  { name: 'Slash Through S̸l̸a̸s̸h̸', fn: s => addMark(s, SLASH) },
  { name: 'Under + Over B̻o̻x̻e̻d̻', fn: s => addMarks(s, UNDERLINE + OVERLINE) },
  { name: 'Under + Strike T̶h̶r̶o̶u̶g̶h̶', fn: s => addMarks(s, UNDERLINE + STRIKE) },
  { name: 'Under + Over + Strike X̶̲', fn: s => addMarks(s, UNDERLINE + OVERLINE + STRIKE) },
  { name: 'Dotted Below Ḍọṭṭẹḍ', fn: s => addMark(s, DOT_BELOW) },
  { name: 'Dotted Above Ḋȯṫṫėḋ', fn: s => addMark(s, DOT_ABOVE) },
  { name: 'Boxed B⃠o⃠x⃠e⃠d⃠', fn: s => addMark(s, BOX) },
];

function render() {
  const text = $('#input').value;
  $('#grid').innerHTML = STYLES.map((s, i) =>
    `<div class="ul-row"><div class="name">${s.name}</div><div class="out" data-i="${i}"></div><button class="cp" data-i="${i}">${t('copy')}</button></div>`
  ).join('');
  STYLES.forEach((s, i) => {
    try { const el = $$('.ul-row .out[data-i="' + i + '"]')[0]; el.textContent = s.fn(text); } catch (e) {}
  });
  $$('.ul-row .cp').forEach(btn => btn.addEventListener('click', () => {
    const out = $$('.ul-row .out[data-i="' + btn.dataset.i + '"]')[0].textContent;
    GZ.copyText(out);
  }));
}

$('#input').addEventListener('input', render);

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='Underlined Text';render()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';render()">${t('clear')}</button>`;

$('#input').value = 'Underlined Text';
render();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',

    {icon:'ⓞ', href:'/text/bubble-text.html', name:'Bubble Text'},
  ]
});
</script>
