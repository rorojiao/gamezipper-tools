<script>
GZI18n.register({
  en:{
    toolTitle:'Memory Card Game',
    toolDesc:'Classic Memory matching card game. Flip cards to find matching pairs. Choose Easy, Medium, or Hard difficulty. Train your brain!',
    easy:'Easy', medium:'Medium', hard:'Hard', newGame:'New Game',
    movesTxt:'Moves:', pairsTxt:'Pairs:',
    youWin:'🎉 You Win! All pairs matched!',
    step1:'Choose a difficulty level (Easy, Medium, or Hard)',
    step2:'Click on a card to flip it and reveal the icon',
    step3:'Find two cards with the same icon to make a match',
    step4:'Match all pairs in the fewest moves to get the best score',
  },
  zh:{
    toolTitle:'记忆翻牌游戏',
    toolDesc:'经典记忆配对翻牌游戏。翻开卡片找到匹配的图案。支持入门、中等和专家三种难度。锻炼记忆力！',
    easy:'简单', medium:'中等', hard:'困难', newGame:'新游戏',
    movesTxt:'步数：', pairsTxt:'配对：',
    youWin:'🎉 恭喜！所有配对已完成！',
    step1:'选择难度等级（简单、中等或困难）',
    step2:'点击卡片翻开，查看图案',
    step3:'找到两张相同图案的卡片即可配对',
    step4:'用最少步数完成所有配对以获得最佳成绩',
  }
});
const{$,t}=GZ;
const icons=['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔','🐧','🐦','🐤','🦄','🐝','🐛','🦋','🐌'];
let cards, flippedCards, matched, moves, totalPairs, locked, timerInt, seconds;

const difficulties={easy:{c:4,r:3},medium:{c:4,r:4},hard:{c:6,r:4}};

function initGame(diff){
  clearInterval(timerInt);
  const{c,r}=difficulties[diff];
  totalPairs=(c*r)/2; matched=0; moves=0; seconds=0; flippedCards=[]; locked=false;
  $('#moves').textContent='0';$('#timer').textContent='0';$('#pairs').textContent=`0/${totalPairs}`;
  $('#status').textContent='';
  const selected=[...icons].sort(()=>Math.random()-0.5).slice(0,totalPairs);
  cards=[...selected,...selected].sort(()=>Math.random()-0.5);
  const board=$('#board');
  board.style.gridTemplateColumns=`repeat(${c},64px)`;
  board.innerHTML='';
  cards.forEach((icon,i)=>{
    const card=document.createElement('div');card.className='card';card.dataset.i=i;
    card.innerHTML=`<div class="card-inner"><div class="card-front">?</div><div class="card-back">${icon}</div></div>`;
    card.addEventListener('click',()=>flipCard(i));
    board.appendChild(card);
  });
  $('#movesLbl').textContent=t('movesTxt');
  $('#pairsLbl').textContent=t('pairsTxt');
}

function flipCard(i){
  if(locked)return;
  const card=document.querySelectorAll('.card')[i];
  if(card.classList.contains('flipped')||card.classList.contains('matched'))return;
  if(moves===0)timerInt=setInterval(()=>{seconds++;$('#timer').textContent=seconds},1000);
  card.classList.add('flipped');
  flippedCards.push(i);
  if(flippedCards.length===2){
    moves++;$('#moves').textContent=moves;locked=true;
    const[a,b]=flippedCards;
    if(cards[a]===cards[b]){
      setTimeout(()=>{
        document.querySelectorAll('.card')[a].classList.add('matched');
        document.querySelectorAll('.card')[b].classList.add('matched');
        matched++;$('#pairs').textContent=`${matched}/${totalPairs}`;
        flippedCards=[];locked=false;
        if(matched===totalPairs){clearInterval(timerInt);$('#status').textContent=t('youWin')}
      },400);
    }else{
      setTimeout(()=>{
        document.querySelectorAll('.card')[a].classList.remove('flipped');
        document.querySelectorAll('.card')[b].classList.remove('flipped');
        flippedCards=[];locked=false;
      },800);
    }
  }
}

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="initGame('easy')">${t('easy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="initGame('medium')">${t('medium')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="initGame('hard')">${t('hard')}</button>
  <button class="gz-btn" onclick="initGame('medium')">${t('newGame')}</button>`;

GZ.renderToolPage({
  category:'fun',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'💣',href:'/fun/minesweeper.html',name:'Minesweeper'},
    {icon:'🟩',href:'/fun/wordle.html',name:'Wordle'},
    {icon:'🎯',href:'/fun/sudoku.html',name:'Sudoku'},
    {icon:'🐍',href:'/fun/snake.html',name:'Snake'},
  ]
});
initGame('easy');
</script>
