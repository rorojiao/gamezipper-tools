const { $, t } = GZ;

function evalExpr(expr, vars) {
  // Tokenize: recognize variables (A-H), word operators, symbol operators, parens
  // First normalize symbols to word operators
  let e = expr.replace(/<->/g, ' bic ');
  e = e.replace(/->/g, ' imp ');
  // Now tokenize with a regex that captures words, single letters, parens
  const rawTokens = e.match(/[A-Za-z]+|[()]/g);
  if (!rawTokens) throw new Error('tokenize');

  const tokens = [];
  for (const tk of rawTokens) {
    const up = tk.toUpperCase();
    if (['AND','OR','NOT','XOR','NAND','NOR','IMP','BIC'].includes(up)) {
      tokens.push(up);
    } else if (tk === '(' || tk === ')') {
      tokens.push(tk);
    } else if (/^[A-H]$/.test(up)) {
      tokens.push(up);
    } else {
      throw new Error('tokenize');
    }
  }

  // Convert to postfix using precedence
  const prec = { 'NOT': 4, 'NAND': 3, 'NOR': 3, 'AND': 3, 'XOR': 2, 'IMP': 1, 'BIC': 1, 'OR': 2 };
  const rightAssoc = { 'IMP': true, 'BIC': true };
  const output = [], ops = [];
  for (const tk of tokens) {
    const up = tk.toUpperCase();
    if (/^[A-H]$/.test(up)) { output.push(up); }
    else if (up === '(') { ops.push(up); }
    else if (up === ')') {
      while (ops.length && ops[ops.length-1] !== '(') output.push(ops.pop());
      if (!ops.length) throw new Error('paren');
      ops.pop();
    } else {
      while (ops.length && ops[ops.length-1] !== '(') {
        const top = ops[ops.length-1];
        if (prec[up] < prec[top] || (prec[up] === prec[top] && !rightAssoc[up])) output.push(ops.pop());
        else break;
      }
      ops.push(up);
    }
  }
  while (ops.length) { const o = ops.pop(); if (o === '(' || o === ')') throw new Error('paren'); output.push(o); }

  // Evaluate postfix for given variable assignment
  const vals = {};
  vars.forEach((v, i) => vals[v] = null);

  return function(assign) {
    const st = [];
    for (const tk of output) {
      if (/^[A-H]$/.test(tk)) { st.push(assign[tk] ? 1 : 0); continue; }
      if (tk === 'NOT') { if (!st.length) throw new Error('eval'); st.push(st.pop() ? 0 : 1); continue; }
      const b = st.pop(), a = st.pop();
      if (a === undefined || b === undefined) throw new Error('eval');
      switch (tk) {
        case 'AND': st.push(a & b); break;
        case 'NAND': st.push((a & b) ? 0 : 1); break;
        case 'OR': st.push(a | b); break;
        case 'NOR': st.push((a | b) ? 0 : 1); break;
        case 'XOR': st.push(a ^ b); break;
        case 'IMP': st.push((a === 1 && b === 0) ? 0 : 1); break;
        case 'BIC': st.push(a === b ? 1 : 0); break;
        default: throw new Error('eval');
      }
    }
    if (st.length !== 1) throw new Error('eval');
    return st[0];
  };
}

function generate() {
  const expr = $('#exprInput').value.trim();
  $('#status').innerHTML = '';
  if (!expr) { $('#ttOutput').innerHTML = ''; return; }

  try {
    const varSet = new Set();
    // Remove operator words before extracting variables to avoid false matches
    const cleanExpr = expr.replace(/\b(and|or|not|xor|nand|nor|imp|bic)\b/gi, ' ').replace(/->|<->/g, ' ');
    const matches = cleanExpr.match(/[A-H]/gi) || [];
    matches.forEach(m => varSet.add(m.toUpperCase()));
    const vars = [...varSet].sort();
    if (vars.length === 0) throw new Error('novar');
    if (vars.length > 8) throw new Error('toomany');

    const fn = evalExpr(expr, vars);

    const n = vars.length;
    const rows = 1 << n;
    let html = `<table><thead><tr>`;
    vars.forEach(v => html += `<th>${v}</th>`);
    html += `<th class="final-col">${exprHTML(expr)}</th></tr></thead><tbody>`;

    for (let i = 0; i < rows; i++) {
      const assign = {};
      for (let j = 0; j < n; j++) assign[vars[n - 1 - j]] = (i >> j) & 1;
      let row = '<tr>';
      vars.forEach(v => row += `<td class="${assign[v] ? 't' : ''}">${assign[v]}</td>`);
      const result = fn(assign);
      row += `<td class="${result ? 't final-col' : 'final-col'}">${result}</td></tr>`;
      html += row;
    }
    html += `</tbody></table>`;
    html += `<div style="margin-top:8px;font-size:.85em;color:var(--text2)">${vars.length} ${t('vars')} · ${rows} ${t('rows')}</div>`;
    $('#ttOutput').innerHTML = html;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('syntaxError')}</span>`;
    $('#ttOutput').innerHTML = '';
  }
}

function exprHTML(expr) {
  return expr.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const presets = [

];
