<script>
GZI18n.register({

    legA:'直角边 a', legB:'直角边 b', hyp:'斜边 c',
    solve:'求解', clear:'清除', example:'示例',
    results:'结果', area:'面积', perimeter:'周长', angleA:'a 所对的角', angleB:'b 所对的角',
    missing:'输入直角三角形的任意两条边（留空一条）。',
    needTwo:'请输入恰好两条边的长度。',
    invalid:'无效直角三角形：斜边必须是最大边。',
    noHypLeg:'请输入斜边 c 和一条直角边，或两条直角边 a 和 b。',
    ruleTitle:'使用的定理',
    step1:'输入三条边中的任意两条 (a、b、c)',
    step2:'留空恰好一条边 — 即你想求的那条',
    step3:'点击「求解」计算缺失边，附分步过程',
    step4:'查看角度、面积和直角三角形示意图',
  }
});

const { $, t } = GZ;
const R2D = 180/Math.PI;
const rnd = v => Math.round(v*10000)/10000;
function row(label,val){ return `<div class="row"><span>${label}</span><span>${val}</span></div>`; }
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function val(id){ const v=document.getElementById(id).value.trim(); return v===''?NaN:parseFloat(v); }

function solve(){
  $('#status').innerHTML=''; $('#result').innerHTML=''; $('#steps').innerHTML=''; $('#triSvg').style.display='none';
  const a=val('ina'), b=val('inb'), c=val('inc');
  const given=[a,b,c].filter(x=>!isNaN(x)).length;
  if(given!==2){
    $('#status').innerHTML=`<span style="color:var(--gz-accent)">${t('needTwo')} ${t('missing')}</span>`; return;
  }
  let sa=a, sb=b, sc=c, mode='';
  try {
    if(!isNaN(sa)&&!isNaN(sb)&&isNaN(sc)){
      // find hypotenuse
      if(sa<=0||sb<=0) throw new Error('invalid');
      sc=Math.sqrt(sa*sa+sb*sb); mode='hyp';
    } else if(!isNaN(sa)&&!isNaN(sc)&&isNaN(sb)){
      if(sc<=sa||sa<=0||sc<=0) throw new Error('invalid');
      sb=Math.sqrt(sc*sc-sa*sa); mode='leg';
    } else if(!isNaN(sb)&&!isNaN(sc)&&isNaN(sa)){
      if(sc<=sb||sb<=0||sc<=0) throw new Error('invalid');
      sa=Math.sqrt(sc*sc-sb*sb); mode='leg';
    } else {
      throw new Error('noHypLeg');
    }
    if(!isFinite(sa)||!isFinite(sb)||!isFinite(sc)) throw new Error('invalid');
    if(sc<=sa||sc<=sb) throw new Error('invalid');

    const A=Math.atan(sa/sb)*R2D, B=90-A, area=sa*sb/2, perim=sa+sb+sc;

    $('#result').innerHTML=`<h3>${t('results')}</h3>` +
      row(t('legA'), rnd(sa)) + row(t('legB'), rnd(sb)) + row(t('hyp'), rnd(sc)) +
      row(t('angleA'), rnd(A)+'°') + row(t('angleB'), rnd(B)+'°') +
      row(t('area'), rnd(area)) + row(t('perimeter'), rnd(perim));

    // steps
    let st = '';
    if(mode==='hyp'){
      st = `<ol>
        <li>Theorem: &nbsp; c² = a² + b²</li>
        <li>Plug in: &nbsp; c² = ${rnd(sa)}² + ${rnd(sb)}² = ${rnd(sa*sa)} + ${rnd(sb*sb)} = ${rnd(sa*sa+sb*sb)}</li>
        <li>Solve: &nbsp; c = √${rnd(sa*sa+sb*sb)} = ${rnd(sc)}</li></ol>`;
    } else {
      const known=isNaN(a)?b:a, knownLab=isNaN(a)?'b':'a', missingLab=isNaN(a)?'a':'b';
      st = `<ol>
        <li>Theorem: &nbsp; a² + b² = c²</li>
        <li>Rearrange: &nbsp; ${missingLab}² = c² − ${knownLab}²</li>
        <li>Plug in: &nbsp; ${missingLab}² = ${rnd(sc)}² − ${rnd(known)}² = ${rnd(sc*sc)} − ${rnd(known*known)} = ${rnd(sc*sc-known*known)}</li>
        <li>Solve: &nbsp; ${missingLab} = √${rnd(sc*sc-known*known)} = ${rnd(isNaN(a)?sa:sb)}</li></ol>`;
    }
    $('#steps').innerHTML=`<div class="steps"><div class="stitle">${t('ruleTitle')} — ${mode==='hyp'?'c = √(a² + b²)':'a = √(c² − b²)'}</div>${st}</div>`;

    drawTriangle(sa,sb,sc);
  } catch(e){
    const msg = e.message==='noHypLeg' ? t('noHypLeg') : (e.message==='invalid' ? t('invalid') : escapeHtml(e.message));
    $('#status').innerHTML=`<div class="err-msg">⚠️ ${msg}</div>`;
  }
}

function drawTriangle(a,b,c){
  const px=40, py=190, scale=170/Math.max(a,c);
  // right angle at bottom-left corner B=(px,py); leg b along base to C=(px+b*scale,py); leg a vertical to A=(px,py-a*scale)
  const Bx=px, By=py;
  const Cx=px + b*scale, Cy=py;
  const Ax=px, Ay=py - a*scale;
  const svg=$('#triSvg'); svg.style.display='block';
  svg.innerHTML=`
    <polygon points="${Bx},${By} ${Cx},${Cy} ${Ax},${Ay}" fill="rgba(78,205,196,0.15)" stroke="#4ecdc4" stroke-width="2"/>
    <path d="M ${Bx+14} ${By} L ${Bx+14} ${By-14} L ${Bx} ${By-14}" fill="none" stroke="#4ecdc4" stroke-width="1.5"/>
    <text x="${Cx-2}" y="${Cy+18}" fill="#aaa" font-size="13" text-anchor="middle">a=${rnd(a)}</text>
    <text x="${Bx-8}" y="${(Ay+By)/2}" fill="#aaa" font-size="13" text-anchor="end">b=${rnd(b)}</text>
    <text x="${(Ax+Cx)/2+6}" y="${(Ay+Cy)/2-4}" fill="#aaa" font-size="13">c=${rnd(c)}</text>
    <text x="${Ax-6}" y="${Ay-2}" fill="#4ecdc4" font-size="12" text-anchor="end">A</text>
    <text x="${Bx-10}" y="${By+6}" fill="#4ecdc4" font-size="12" text-anchor="end">B</text>
    <text x="${Cx+6}" y="${Cy+4}" fill="#4ecdc4" font-size="12">C</text>
    <text x="${Bx+26}" y="${By-8}" fill="rgba(255,255,255,0.5)" font-size="11">90°</text>`;
}

function loadExample(){
  document.getElementById('ina').value='3';
  document.getElementById('inb').value='4';
  document.getElementById('inc').value='';
  solve();
}
function doClear(){
  ['ina','inb','inc'].forEach(id=>document.getElementById(id).value='');
  $('#result').innerHTML=''; $('#status').innerHTML=''; $('#steps').innerHTML=''; $('#triSvg').style.display='none';
}

$('#inputs').innerHTML=`
  <label>${t('legA')}<input type="number" id="ina" step="any" min="0" placeholder="—"></label>
  <label>${t('legB')}<input type="number" id="inb" step="any" min="0" placeholder="—"></label>
  <label>${t('hyp')}<input type="number" id="inc" step="any" min="0" placeholder="—"></label>`;

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="solve()">${t('solve')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

['ina','inb','inc'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')solve();}));

  category: 'calc',

    {icon:'🧮', href:'/calc/scientific-calculator.html', name:'Scientific'},
    {icon:'½', href:'/calc/fraction-calculator.html', name:'Fraction'},
  ]
});
</script>
