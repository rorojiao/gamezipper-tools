  zh: {

    toolDesc: '发现完美的 Google Fonts 字体搭配，用于标题和正文，实时预览效果。',
    lblCode: '生成的 HTML/CSS 代码',
    shuffle: '换一批配对',
    step1: '浏览下方精选的字体配对方案',
    step2: '点击任意配对查看完整预览和代码',
    step3: '自定义示例文本和正文字号',
    step4: '复制生成的 HTML link 标签和 CSS 到你的项目',
  }
});

const { $, copyText, t } = GZ;

const fontPairs = [
  {heading:'Playfair Display', body:'Source Sans 3'},
  {heading:'Merriweather', body:'Open Sans'},
  {heading:'Montserrat', body:'Lora'},
  {heading:'Roboto Slab', body:'Roboto'},
  {heading:'Poppins', body:'Nunito'},
  {heading:'Oswald', body:'Quattrocento'},
  {heading:'Raleway', body:'Crimson Text'},
  {heading:'DM Serif Display', body:'DM Sans'},
  {heading:'Bebas Neue', body:'Libre Baskerville'},
  {heading:'Abril Fatface', body:'Lato'},
  {heading:'Space Grotesk', body:'Source Serif 4'},
  {heading:'Fjalla One', body:'Noto Sans'},
  {heading:'Lobster', body:'Raleway'},
  {heading:'PT Serif', body:'PT Sans'},
  {heading:'Archivo Black', body:'Archivo'},
  {heading:'Spectral', body:'Karla'},
  {heading:'Inconsolata', body:'Nunito Sans'},
  {heading:'Zilla Slab', body:'Inter'},
];

let loadedFonts = new Set();
let selectedPair = null;

function loadFont(name) {
  if (loadedFonts.has(name)) return;
  loadedFonts.add(name);
  const link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = `https://fonts.googleapis.com/css2?family=${name.replace(/ /g,'+')}:wght@400;700&display=swap`;
  document.head.appendChild(link);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderPairs(pairs) {
  const container = $('#pairs');
  container.innerHTML = '';
  const sample = $('#sample-text').value || 'The quick brown fox jumps over the lazy dog';
  pairs.forEach(p => {
    loadFont(p.heading);
    loadFont(p.body);
    const card = document.createElement('div');
    card.className = 'pair-card';
    card.innerHTML = `
      <div class="pair-heading" style="font-family:'${p.heading}',serif">${esc(sample.substring(0, 40))}</div>
      <div class="pair-label">Heading: ${p.heading}</div>
      <div class="pair-body" style="font-family:'${p.body}',sans-serif">${esc(sample)}</div>
      <div class="pair-label">Body: ${p.body}</div>`;
    card.onclick = () => selectPair(p);
    container.appendChild(card);
  });
}

function selectPair(p) {
  selectedPair = p;
  document.querySelectorAll('.pair-card').forEach(c => c.style.borderColor = '');
  event.currentTarget.style.borderColor = 'var(--accent)';
  updateCode(p);
}

function updateCode(p) {
  if (!p) return;
  const sz = $('#body-size').value;
  const code = `<!-- Add to <head> -->
<link href="https://fonts.googleapis.com/css2?family=${p.heading.replace(/ /g,'+')}:wght@700&family=${p.body.replace(/ /g,'+')}:wght@400;700&display=swap" rel="stylesheet">

/* CSS */
h1, h2, h3 {
  font-family: '${p.heading}', serif;
}
body, p {
  font-family: '${p.body}', sans-serif;
  font-size: ${sz}px;
}`;
  $('#code-output').textContent = code;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

$('#body-size').addEventListener('input', e => {
  $('#body-size-val').textContent = e.target.value + 'px';
});
$('#sample-text').addEventListener('input', () => renderPairs(currentPairs));

let currentPairs = shuffle(fontPairs).slice(0, 6);
renderPairs(currentPairs);

  <button class="gz-btn" onclick="copyText($('#code-output').textContent)">${t('copy')} Code</button>`;
