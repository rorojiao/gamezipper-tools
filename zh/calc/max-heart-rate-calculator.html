<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the most accurate max heart rate formula?", "acceptedAnswer": {"@type": "Answer", "text": "The Tanaka formula (208 − 0.7 × age) is widely considered the most accurate estimate for healthy adults across a wide age range, based on a large meta-analysis. The classic Fox formula (220 − age) is simpler but tends to overestimate for younger people and underestimate for older adults."}}, {"@type": "Question", "name": "How do I find my real maximum heart rate?", "acceptedAnswer": {"@type": "Answer", "text": "Formulas only give an estimate. To measure your true max, do a maximal effort test (such as a hard 4–5 minute hill repeat or treadmill ramp) while wearing a chest-strap heart-rate monitor. Always get medical clearance before max-effort testing, especially if you are older or new to exercise."}}, {"@type": "Question", "name": "What are the five heart-rate training zones?", "acceptedAnswer": {"@type": "Answer", "text": "Zone 1 (50–60% of max) is warm-up/recovery. Zone 2 (60–70%) is the fat-burning, aerobic base zone. Zone 3 (70–80%) builds aerobic endurance. Zone 4 (80–90%) is the anaerobic threshold zone. Zone 5 (90–100%) is maximum effort for short intervals."}}, {"@type": "Question", "name": "Is my health data stored?", "acceptedAnswer": {"@type": "Answer", "text": "No. All calculations run entirely in your browser. Your age and resting heart rate are never sent to any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-form" id="form">
      <div>
        <label id="lbl-age"></label>
        <input type="number" id="age" value="30" min="1" max="120" step="1">
      </div>
      <div>
        <label id="lbl-resting"></label>
        <input type="number" id="resting" value="60" min="30" max="120" step="1">
      </div>
      <div>
        <label id="lbl-formula"></label>
        <select id="formula">
          <option value="tanaka" selected>Tanaka (208 − 0.7 × age)</option>
          <option value="fox">Fox (220 − age)</option>
          <option value="gellish">Gellish (207 − 0.7 × age)</option>
          <option value="hunt">Hunt (211 − 0.64 × age)</option>
          <option value="inbar">Inbar / Tanaka alt (205.8 − 0.685 × age)</option>
        </select>
      </div>
      <button class="gz-btn" onclick="calculate()" id="btn-calc"></button>
    </div>
    <div class="result-card" id="result" style="display:none">
      <div class="big" id="result-mhr"></div>
      <div class="label" id="result-label"></div>
      <div class="zones" id="zones"></div>
      <div class="formula-note" id="karv-note"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Max Heart Rate Calculator',
    toolDesc: 'Estimate your maximum heart rate (MHR) and personalized heart-rate training zones for cardio workouts.',
    lblAge: 'Your Age',
    lblResting: 'Resting Heart Rate (bpm)',
    lblFormula: 'MHR Formula',
    btnCalc: 'Calculate Heart Rate Zones',
    resultLabel: 'Estimated Max Heart Rate (bpm)',
    z1: {name:'Zone 1 — Warm-up / Recovery', pct:'50–60% of max · very light'},
    z2: {name:'Zone 2 — Fat Burn / Base', pct:'60–70% of max · light'},
    z3: {name:'Zone 3 — Aerobic Endurance', pct:'70–80% of max · moderate'},
    z4: {name:'Zone 4 — Anaerobic Threshold', pct:'80–90% of max · hard'},
    z5: {name:'Zone 5 — Max Effort', pct:'90–100% of max · very hard'},
    karvNote: '💡 Zones above use the <b>percentage-of-MHR</b> method. Using the <b>Karvonen formula</b> with your resting heart rate (RHR) gives the target ranges: <b>57–64%, 64–76%, 76–93%, 93–100%</b> of heart-rate reserve (HRR = MHR − RHR). Karvonen is more individualized and accounts for your fitness level.',
    step1: 'Enter your age and resting heart rate (measure when you first wake up)',
    step2: 'Choose an MHR formula — Tanaka is recommended for most adults',
    step3: 'Click Calculate to see your max heart rate',
    step4: 'Use the five training zones to guide your cardio intensity',
  },
  zh: {
    toolTitle: '最大心率计算器',
    toolDesc: '估算你的最大心率（MHR）并生成个性化的心率训练区间，用于有氧运动指导。',
    lblAge: '你的年龄',
    lblResting: '静息心率（次/分）',
    lblFormula: '最大心率公式',
    btnCalc: '计算心率区间',
    resultLabel: '预估最大心率（次/分）',
    z1: {name:'区间 1 — 热身 / 恢复', pct:'最大心率的 50–60% · 非常轻松'},
    z2: {name:'区间 2 — 燃脂 / 基础', pct:'最大心率的 60–70% · 轻松'},
    z3: {name:'区间 3 — 有氧耐力', pct:'最大心率的 70–80% · 中等'},
    z4: {name:'区间 4 — 无氧阈值', pct:'最大心率的 80–90% · 吃力'},
    z5: {name:'区间 5 — 极限', pct:'最大心率的 90–100% · 非常吃力'},
    karvNote: '💡 上方区间采用<b>最大心率百分比</b>法。若使用结合静息心率（RHR）的 <b>Karvonen 公式</b>，则储备心率（HRR = MHR − RHR）的目标区间为：<b>57–64%、64–76%、76–93%、93–100%</b>。Karvonen 法更个性化，能反映你的体能水平。',
    step1: '输入年龄和静息心率（建议清晨刚醒来时测量）',
    step2: '选择最大心率公式 — 推荐大多数成年人使用 Tanaka',
    step3: '点击「计算心率区间」查看最大心率',
    step4: '参考五个训练区间控制有氧运动强度',
  }
});

const { $, t } = GZ;

const FORMULAS = {
  tanaka: a => Math.round(208 - 0.7 * a),
  fox:    a => Math.round(220 - a),
  gellish:a => Math.round(207 - 0.7 * a),
  hunt:   a => Math.round(211 - 0.64 * a),
  inbar:  a => Math.round(205.8 - 0.685 * a),
};

const ZONE_DEFS = [
  {key:'z1', lo:0.50, hi:0.60, color:'#4fc3f7'},
  {key:'z2', lo:0.60, hi:0.70, color:'#66bb6a'},
  {key:'z3', lo:0.70, hi:0.80, color:'#ffa726'},
  {key:'z4', lo:0.80, hi:0.90, color:'#ef5350'},
  {key:'z5', lo:0.90, hi:1.00, color:'#ab47bc'},
];

function calculate(){
  const age = Math.min(120, Math.max(1, parseInt($('#age').value) || 30));
  const resting = Math.min(150, Math.max(30, parseInt($('#resting').value) || 60));
  const fn = FORMULAS[$('#formula').value] || FORMULAS.tanaka;
  const mhr = fn(age);

  $('#result').style.display = '';
  $('#result-mhr').textContent = mhr;
  $('#result-label').textContent = t('resultLabel');

  const lang = GZ.t;
  $('#zones').innerHTML = ZONE_DEFS.map(z => {
    const lo = Math.round(mhr * z.lo);
    const hi = Math.round(mhr * z.hi);
    const tr = t(z.key);
    return `<div class="zone"><span class="swatch" style="background:${z.color}"></span><span class="info"><span class="name">${tr.name}</span><span class="pct">${tr.pct}</span></span><span class="bpm">${lo}–${hi} bpm</span></div>`;
  }).join('');

  $('#karv-note').innerHTML = t('karvNote');
}

$('#btn-calc').textContent = t('btnCalc');
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⚖️', href:'/calc/bmi-calculator.html', name:'BMI Calc'},
    {icon:'🏃', href:'/calc/race-time-predictor.html', name:'Race Predictor'},
    {icon:'🔥', href:'/calc/tabata-timer.html', name:'Tabata Timer'},
    {icon:'⏱️', href:'/calc/interval-timer.html', name:'Interval Timer'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
