<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is LTV (Loan-to-Value) ratio?","acceptedAnswer":{"@type":"Answer","text":"LTV ratio is a financial metric that compares the amount of your loan to the appraised value of the asset. It's calculated by dividing the loan amount by the property value and multiplying by 100. Lower LTV ratios generally mean better loan terms."}},{"@type":"Question","name":"What is a good LTV ratio?","acceptedAnswer":{"@type":"Answer","text":"An LTV below 80% is generally considered excellent. 80-90% is good, 90-95% is moderate, and above 95% is high. LTV above 100% means you owe more than the asset is worth (negative equity)."}},{"@type":"Question","name":"How does LTV affect mortgage rates?","acceptedAnswer":{"@type":"Answer","text":"Lower LTV ratios typically result in better mortgage rates and terms because they represent lower risk for lenders. LTV below 80% may help you avoid Private Mortgage Insurance (PMI)."}},{"@type":"Question","name":"Can I get a loan with high LTV?","acceptedAnswer":{"@type":"Answer","text":"Yes, but it may be more expensive. FHA loans allow up to 96.5% LTV, VA loans up to 100%. However, higher LTV usually means higher interest rates and additional insurance requirements."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Loan-to-Value (LTV) Calculator',
    toolDesc: 'Calculate your LTV ratio for mortgages and loans. Lower LTV means better loan terms and lower risk.',
    calculate: 'Calculate LTV',
    clear: 'Clear',
    propertyValue: 'Property Value ($)',
    loanAmount: 'Loan Amount ($)',
    ltvRatio: 'LTV Ratio',
    equity: 'Equity',
    downPayment: 'Down Payment',
    pmiRequired: 'PMI Required',
    riskLevel: 'Risk Level',
    excellent: 'Excellent (Low Risk)',
    good: 'Good (Low-Medium Risk)',
    moderate: 'Moderate (Medium Risk)',
    high: 'High (High Risk)',
    veryhigh: 'Very High (Very High Risk)',
    yes: 'Yes',
    no: 'No',
    recommended: 'Recommended',
    caution: 'Proceed with Caution',
    notRecommended: 'Not Recommended',
    step1: 'Enter the property or asset value',
    step2: 'Enter your loan or mortgage amount',
    step3: 'Click Calculate to see your LTV ratio',
    step4: 'Review risk level and recommendations below',
  },
  zh: {
    toolTitle: '贷款价值比(LTV)计算器',
    toolDesc: '计算房贷和贷款的LTV比率。较低的LTV意味着更好的贷款条款和较低的风险。',
    calculate: '计算LTV',
    clear: '清除',
    propertyValue: '房产价值 ($)',
    loanAmount: '贷款金额 ($)',
    ltvRatio: 'LTV比率',
    equity: '权益',
    downPayment: '首付',
    pmiRequired: '需要PMI',
    riskLevel: '风险等级',
    excellent: '优秀(低风险)',
    good: '良好(低中风险)',
    moderate: '中等(中等风险)',
    high: '高(高风险)',
    veryhigh: '很高(极高风险)',
    yes: '是',
    no: '否',
    recommended: '推荐',
    caution: '谨慎进行',
    notRecommended: '不推荐',
    step1: '输入房产或资产价值',
    step2: '输入贷款或房贷金额',
    step3: '点击「计算」查看LTV比率',
    step4: '查看风险等级和下方建议',
  }
});

const { $, t } = GZ;

function calculateLTV() {
  const propertyValue = parseFloat($('#propertyValue').value);
  const loanAmount = parseFloat($('#loanAmount').value);
  
  if (!propertyValue || propertyValue <= 0) {
    $('#result').style.display = 'none';
    $('#ltvInfo').innerHTML = '';
    return;
  }
  
  const actualLoanAmount = loanAmount || 0;
  const ltv = (actualLoanAmount / propertyValue) * 100;
  const equity = propertyValue - actualLoanAmount;
  const downPayment = propertyValue - actualLoanAmount;
  
  $('#ltvValue').textContent = ltv.toFixed(2) + '%';
  
  let categoryClass, categoryText, riskText;
  if (ltv <= 80) {
    categoryClass = 'gz-ltv-excellent';
    categoryText = t('excellent');
    riskText = t('recommended');
  } else if (ltv <= 90) {
    categoryClass = 'gz-ltv-good';
    categoryText = t('good');
    riskText = t('recommended');
  } else if (ltv <= 95) {
    categoryClass = 'gz-ltv-moderate';
    categoryText = t('moderate');
    riskText = t('caution');
  } else if (ltv <= 100) {
    categoryClass = 'gz-ltv-high';
    categoryText = t('high');
    riskText = t('caution');
  } else {
    categoryClass = 'gz-ltv-veryhigh';
    categoryText = t('veryhigh');
    riskText = t('notRecommended');
  }
  
  const categoryEl = $('#ltvCategory');
  categoryEl.textContent = `${categoryText} — ${riskText}`;
  categoryEl.className = 'gz-ltv-category ' + categoryClass;
  
  const markerPos = Math.min(ltv, 100);
  $('#ltvMarker').style.left = markerPos + '%';
  
  const pmiRequired = ltv > 80 ? t('yes') : t('no');
  
  $('#ltvBreakdown').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;text-align:left">
      <div><small style="color:var(--gz-text2,#aaa)">${t('equity')}:</small><br><strong>$${equity.toLocaleString()}</strong></div>
      <div><small style="color:var(--gz-text2,#aaa)">${t('downPayment')}:</small><br><strong>$${downPayment.toLocaleString()}</strong></div>
      <div><small style="color:var(--gz-text2,#aaa)">${t('pmiRequired')}:</small><br><strong>${pmiRequired}</strong></div>
    </div>
  `;
  
  $('#ltvInfo').innerHTML = `
    <div class="gz-ltv-info-item">
      <strong>${ltv.toFixed(1)}%</strong>
      <span>${t('ltvRatio')}</span>
    </div>
    <div class="gz-ltv-info-item">
      <strong>$${equity.toLocaleString()}</strong>
      <span>${t('equity')}</span>
    </div>
    <div class="gz-ltv-info-item">
      <strong>${pmiRequired}</strong>
      <span>${t('pmiRequired')}</span>
    </div>
    <div class="gz-ltv-info-item">
      <strong>${riskText}</strong>
      <span>${t('riskLevel')}</span>
    </div>
  `;
  
  $('#result').style.display = 'block';
}

function doClear() {
  $('#propertyValue').value = '';
  $('#loanAmount').value = '';
  $('#result').style.display = 'none';
  $('#ltvInfo').innerHTML = '';
}

$('#propertyValue').addEventListener('input', calculateLTV);
$('#loanAmount').addEventListener('input', calculateLTV);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculateLTV()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏠', href:'/calc/mortgage-calculator.html', name:'Mortgage Calculator'},
    {icon:'💰', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'📊', href:'/calc/amortization-calculator.html', name:'Amortization Calculator'},
    {icon:'🎯', href:'/calc/loan-eligibility-calculator.html', name:'Loan Eligibility'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
