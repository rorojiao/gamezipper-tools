<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "Can I add my logo to a QR code?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Upload a logo image in the designer and it will be placed in the center of the QR code. The tool adds error correction to ensure the QR code remains scannable."}}, {"@type": "Question", "name": "What colors work best for QR codes?", "acceptedAnswer": {"@type": "Answer", "text": "High contrast between foreground and background works best. Dark colors on white/light backgrounds are most reliable. Avoid similar colors (like blue on blue) as scanners may not read them."}}, {"@type": "Question", "name": "Can I download the QR code as SVG?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. You can download the QR code as PNG for web use or SVG for print and scaling. SVG format maintains perfect quality at any size."}}, {"@type": "Question", "name": "Will my styled QR code still scan correctly?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, as long as you maintain sufficient contrast and don't over-decorate. The tool uses high error correction (Level H) to allow up to 30% damage including center logos."}}]}</script>

<div class="gz-container">

          <button class="gz-btn gz-btn-secondary" id="dl-svg"></button>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'QR Code Designer',
    toolDesc: 'Create custom styled QR codes with colors, dot styles, and logos — download as PNG or SVG.',
    content: 'Content',
    contentPh: 'Enter URL or text',
    fgColor: 'Foreground Color',
    bgColor: 'Background Color',
    dotStyle: 'Dot Style',
    size: 'Size',
    ecLevel: 'Error Correction',
    ecL: 'Low (7%)',
    ecM: 'Medium (15%)',
    ecQ: 'Quartile (25%)',
    ecH: 'High (30%)',
    logo: 'Logo (optional)',
    uploadLogo: 'Upload Logo',
    removeLogo: 'Remove',
    downloadPNG: 'Download PNG',
    downloadSVG: 'Download SVG',
    step1: 'Enter the URL or text for your QR code',
    step2: 'Customize colors, dot style, and size',
    step3: 'Optionally upload a logo to place in the center',
    step4: 'Download as PNG for web or SVG for print',
    square: 'Square',
    rounded: 'Rounded',
    dots: 'Dots',
    diamond: 'Diamond',
  },
  zh: {
    toolTitle: 'QR 码设计器',
    toolDesc: '创建自定义样式的 QR 码，支持颜色、圆点样式和 Logo — 下载为 PNG 或 SVG。',
    content: '内容',
    contentPh: '输入 URL 或文本',
    fgColor: '前景色',
    bgColor: '背景色',
    dotStyle: '点样式',
    size: '大小',
    ecLevel: '纠错等级',
    ecL: '低 (7%)',
    ecM: '中 (15%)',
    ecQ: '较高 (25%)',
    ecH: '高 (30%)',
    logo: 'Logo（可选）',
    uploadLogo: '上传 Logo',
    removeLogo: '移除',
    downloadPNG: '下载 PNG',
    downloadSVG: '下载 SVG',
    step1: '输入 QR 码的 URL 或文本内容',
    step2: '自定义颜色、点样式和大小',
    step3: '可选上传 Logo 放置在中心',
    step4: '下载为 PNG（网页）或 SVG（印刷）',
    square: '方形',
    rounded: '圆角',
    dots: '圆点',
    diamond: '菱形',
  }
});
const { $, t } = GZ;
let logoImg = null;
let dotStyle = 'square';
$('#dl-png').textContent = t('downloadPNG');
$('#dl-svg').textContent = t('downloadSVG');
$('#dl-png').onclick = downloadPNG;
$('#dl-svg').onclick = downloadSVG;
$('#opts').innerHTML = `
  <div class="opt-group"><label>${t('content')}</label><textarea id="qr-text" rows="2" placeholder="${t('contentPh')}">https://tools.gamezipper.com</textarea></div>
  <div class="opt-group"><label>${t('fgColor')}</label><div class="color-row"><input type="color" id="fg-color" value="#000000"><input type="text" id="fg-hex" value="#000000"></div></div>
  <div class="opt-group"><label>${t('bgColor')}</label><div class="color-row"><input type="color" id="bg-color" value="#ffffff"><input type="text" id="bg-hex" value="#ffffff"></div></div>
  <div class="opt-group"><label>${t('dotStyle')}</label>
    <div class="dot-styles">
      <button class="dot-style-btn active" data-style="square" title="${t('square')}">■</button>
      <button class="dot-style-btn" data-style="rounded" title="${t('rounded')}">▢</button>
      <button class="dot-style-btn" data-style="dots" title="${t('dots')}">●</button>
      <button class="dot-style-btn" data-style="diamond" title="${t('diamond')}">◆</button>
    </div>
  </div>
  <div class="opt-group"><label>${t('size')}</label><input type="range" id="qr-size" min="200" max="800" value="300" step="50"><span id="size-val">300px</span></div>
  <div class="opt-group"><label>${t('ecLevel')}</label><select id="ec-level">
    <option value="L">${t('ecL')}</option>
    <option value="M" selected>${t('ecM')}</option>
    <option value="Q">${t('ecQ')}</option>
    <option value="H">${t('ecH')}</option>
  </select></div>
  <div class="opt-group"><label>${t('logo')}</label><button class="gz-btn gz-btn-secondary" onclick="uploadLogo()" style="width:100%;margin-bottom:4px">${t('uploadLogo')}</button><button class="gz-btn gz-btn-secondary" id="rm-logo-btn" onclick="removeLogo()" style="width:100%;display:none">${t('removeLogo')}</button></div>`;
document.querySelectorAll('.dot-style-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.dot-style-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    dotStyle = btn.dataset.style;
    generateQR();
  });
});
['fg-color','bg-color'].forEach(id => {
  const colorIn = $(`#${id}`);
  const hexIn = $(`#${id.replace('-color','-hex')}`);
  colorIn.addEventListener('input', () => { hexIn.value = colorIn.value; generateQR(); });
  hexIn.addEventListener('input', () => { if (/^#[0-9a-f]{6}$/i.test(hexIn.value)) { colorIn.value = hexIn.value; generateQR(); } });
});
$('#qr-text').addEventListener('input', generateQR);
$('#qr-size').addEventListener('input', function() { $('#size-val').textContent = this.value + 'px'; generateQR(); });
$('#ec-level').addEventListener('change', generateQR);
function generateQR() {
  const text = $('#qr-text').value || 'https://tools.gamezipper.com';
  const size = parseInt($('#qr-size').value);
  const ecMap = { L: 1, M: 0, Q: 3, H: 2 };
  const ecVal = ecMap[$('#ec-level').value] || 0;
  const fgColor = $('#fg-color').value;
  const bgColor = $('#bg-color').value;
  const canvas = $('#qr-canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  try {
    const qr = qrcode(0, $('#ec-level').value);
    qr.addData(text);
    qr.make();
    const moduleCount = qr.getModuleCount();
    const margin = 4;
    const totalModules = moduleCount + margin * 2;
    const cellSize = size / totalModules;
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = fgColor;
    for (let row = 0; row < moduleCount; row++) {
      for (let col = 0; col < moduleCount; col++) {
        if (qr.isDark(row, col)) {
          const x = (col + margin) * cellSize;
          const y = (row + margin) * cellSize;
          const s = cellSize;
          if (dotStyle === 'square') {
            ctx.fillRect(x, y, s, s);
          } else if (dotStyle === 'rounded') {
            const r = s * 0.3;
            ctx.beginPath();
            ctx.roundRect(x, y, s, s, r);
            ctx.fill();
          } else if (dotStyle === 'dots') {
            ctx.beginPath();
            ctx.arc(x + s / 2, y + s / 2, s * 0.42, 0, Math.PI * 2);
            ctx.fill();
          } else if (dotStyle === 'diamond') {
            ctx.beginPath();
            ctx.moveTo(x + s / 2, y + s * 0.1);
            ctx.lineTo(x + s * 0.9, y + s / 2);
            ctx.lineTo(x + s / 2, y + s * 0.9);
            ctx.lineTo(x + s * 0.1, y + s / 2);
            ctx.closePath();
            ctx.fill();
          }
        }
      }
    }
    if (logoImg) {
      const logoSize = size * 0.2;
      const lx = (size - logoSize) / 2;
      const ly = (size - logoSize) / 2;
      ctx.fillStyle = bgColor;
      ctx.beginPath();
      ctx.roundRect(lx - 6, ly - 6, logoSize + 12, logoSize + 12, 8);
      ctx.fill();
      ctx.drawImage(logoImg, lx, ly, logoSize, logoSize);
    }
  } catch (e) {
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = '#dc2626';
    ctx.font = '14px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('Error: ' + e.message, size / 2, size / 2);
  }
}
function uploadLogo() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => { logoImg = img; $('#rm-logo-btn').style.display = 'block'; generateQR(); };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}
function removeLogo() {
  logoImg = null;
  $('#rm-logo-btn').style.display = 'none';
  generateQR();
}
function downloadPNG() {
  const canvas = $('#qr-canvas');
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = 'qrcode.png';
  a.click();
}
function downloadSVG() {
  const text = $('#qr-text').value || 'https://tools.gamezipper.com';
  const fgColor = $('#fg-color').value;
  const bgColor = $('#bg-color').value;
  const size = parseInt($('#qr-size').value);
  try {
    const qr = qrcode(0, $('#ec-level').value);
    qr.addData(text);
    qr.make();
    const moduleCount = qr.getModuleCount();
    const margin = 4;
    const totalModules = moduleCount + margin * 2;
    const cellSize = size / totalModules;
    let rects = '';
    for (let row = 0; row < moduleCount; row++) {
      for (let col = 0; col < moduleCount; col++) {
        if (qr.isDark(row, col)) {
          const x = ((col + margin) * cellSize).toFixed(2);
          const y = ((row + margin) * cellSize).toFixed(2);
          const s = cellSize.toFixed(2);
          if (dotStyle === 'square') {
            rects += `<rect x="${x}" y="${y}" width="${s}" height="${s}"/>`;
          } else if (dotStyle === 'rounded') {
            rects += `<rect x="${x}" y="${y}" width="${s}" height="${s}" rx="${(cellSize*0.3).toFixed(2)}"/>`;
          } else if (dotStyle === 'dots') {
            rects += `<circle cx="${(parseFloat(x)+cellSize/2).toFixed(2)}" cy="${(parseFloat(y)+cellSize/2).toFixed(2)}" r="${(cellSize*0.42).toFixed(2)}"/>`;
          } else if (dotStyle === 'diamond') {
            const cx = parseFloat(x) + cellSize/2;
            const cy = parseFloat(y) + cellSize/2;
            const d = cellSize*0.42;
            rects += `<polygon points="${cx},${cy-d} ${cx+d},${cy} ${cx},${cy+d} ${cx-d},${cy}"/>`;
          }
        }
      }
    }
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size} ${size}" width="${size}" height="${size}"><rect width="${size}" height="${size}" fill="${bgColor}"/><g fill="${fgColor}">${rects}</g></svg>`;
    const blob = new Blob([svg], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'qrcode.svg'; a.click();
    URL.revokeObjectURL(url);
  } catch(e) {}
}
generateQR();
GZ.renderToolPage({
  related: [
  ]
});
</script>

</body>
