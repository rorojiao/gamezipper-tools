// --- BigInt IP helpers ---
function ipToBigInt(ip) {
  ip = ip.trim();
  if (ip.includes(':')) {
    // IPv6
    let parts = ip.split(':');
    // expand ::
    const dbl = parts.indexOf('');
    if (dbl !== -1) {
      const missing = 8 - (parts.length - 1); // one extra empty due to ::
      if (parts[parts.length-1] === '') parts.pop();
      if (parts[0] === '') parts.shift();
      const left = parts.slice(0, dbl);
      const right = parts.slice(dbl);
      parts = [...left, ...Array(missing > 0 ? missing : 0).fill('0'), ...right];
    }
    if (parts.length !== 8) return null;
    let n = 0n;
    for (const p of parts) {
      if (p === '') return null;
      const v = parseInt(p, 16);
      if (isNaN(v) || v < 0 || v > 0xffff) return null;
      n = (n << 16n) | BigInt(v);
    }
    return { n, bits: 128 };
  } else if (ip.includes('.')) {
    // IPv4
    const parts = ip.split('.');
    if (parts.length !== 4) return null;
    let n = 0n;
    for (const p of parts) {
      const v = parseInt(p, 10);
      if (isNaN(v) || v < 0 || v > 255 || String(v) !== p) return null;
      n = (n << 8n) | BigInt(v);
    }
    return { n, bits: 32 };
  }
  return null;
}

function bigIntToIp(n, bits) {
  if (bits === 32) {
    const m = 0xffn;
    return [(n >> 24n) & m, (n >> 16n) & m, (n >> 8n) & m, n & m].join('.');
  } else {
    const parts = [];
    const mask = 0xffffn;
    for (let i = 7; i >= 0; i--) {
      parts.push(((n >> BigInt(i*16)) & mask).toString(16));
    }
    return parts.join(':').replace(/\b0\b/g,'0');
  }
}

function rangeToCidr(startObj, endObj) {
  const bits = startObj.bits;
  const mask = (1n << BigInt(bits)) - 1n;
  let start = startObj.n & mask;
  let end = endObj.n & mask;
  const result = [];
  while (start <= end) {
    // max prefix length (smallest block) that doesn't go below start and past end
    let maxBits = bits;
    for (let b = 1; b <= bits; b++) {
      const blockMask = (1n << BigInt(b)) - 1n;
      if ((start & blockMask) !== 0n) { maxBits = b - 1; break; }
      maxBits = b;
      if (b === bits) break;
    }
    // largest block that fits in remaining range
    let diff = end - start + 1n;
    let maxFromEnd = 0n;
    let tmp = diff;
    while ((tmp & 1n) === 0n) { maxFromEnd++; tmp >>= 1n; }
    const allowedFromEnd = maxFromEnd;
    const allowedFromStart = BigInt(maxBits);
    const blockSize = allowedFromStart < allowedFromEnd ? allowedFromStart : allowedFromEnd;
    const prefixLen = BigInt(bits) - blockSize;
    result.push({ ip: bigIntToIp(start, bits), prefix: Number(prefixLen) });
    start = start + (1n << blockSize);
    if (result.length > 5000) break; // safety
  }
  return result;
}

function cidrToRange(ipObj, prefix) {
  const bits = ipObj.bits;
  if (prefix < 0 || prefix > bits) return null;
  const hostBits = BigInt(bits - prefix);
  const netMask = ((1n << BigInt(prefix)) - 1n) << hostBits;
  const network = ipObj.n & netMask;
  const broadcast = network | ((1n << hostBits) - 1n);
  const totalHosts = 1n << hostBits;
  let usableHosts = totalHosts;
  if (prefix < bits - 1 && bits === 32) {
    usableHosts = totalHosts - 2n; // network + broadcast reserved
  }
  return {
    start: bigIntToIp(network, bits),
    end: bigIntToIp(broadcast, bits),
    network: bigIntToIp(network, bits),
    totalHosts,
    usableHosts,
    prefix,
    bits
  };
}

function convertRangeToCidr() {
  const sObj = ipToBigInt($('#startIP').value);
  const eObj = ipToBigInt($('#endIP').value);
  if (!sObj || !eObj) {
    $('#status').innerHTML = `<div class="err">⚠ ${t('invalidIP')}</div>`;
    $('#result').innerHTML = '';
    return;
  }
  if (sObj.bits !== eObj.bits) {
    $('#status').innerHTML = `<div class="err">⚠ ${t('invalidIP')} (mixing IPv4 and IPv6)</div>`;
    return;
  }
  if (sObj.n > eObj.n) {
    $('#status').innerHTML = `<div class="err">⚠ ${t('invalidRange')}</div>`;
    return;
  }
  const blocks = rangeToCidr(sObj, eObj);
  const proto = sObj.bits === 32 ? t('ipv4Detected') : t('ipv6Detected');
  const rows = blocks.map(b => `<div class="cidr-row"><span>${b.ip}/${b.prefix}</span><span style="color:var(--text3)">/${b.prefix}</span></div>`).join('');
  $('#result').innerHTML = `
    <div style="background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px">
      <div class="kv"><span>${t('resultCidrs')}</span><span><b>${blocks.length}</b> ${t('blockCount')}</span></div>
      <div class="kv"><span>${t('networkClass')}</span><span>${proto}</span></div>
      <div class="kv"><span>${t('rangeStart')}</span><span style="font-family:monospace">${bigIntToIp(sObj.n, sObj.bits)}</span></div>
      <div class="kv"><span>${t('rangeEnd')}</span><span style="font-family:monospace">${bigIntToIp(eObj.n, eObj.bits)}</span></div>
    </div>
    <div style="background:var(--glass2);border:1px solid var(--border);border-radius:12px;max-height:320px;overflow:auto">${rows}</div>`;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${blocks.length} CIDR ${t('blockCount')}</span>`;
  const all = blocks.map(b => `${b.ip}/${b.prefix}`).join('\n');
  $('#copyBtns').innerHTML = `<button class="gz-btn" onclick="GZ.copyText('${all.replace(/'/g,"\\'").replace(/\n/g,'\\n')}')">${t('copyAll')}</button>`;
  // copyText uses backticks — easier path:
  $('#copyBtns').innerHTML = `<button class="gz-btn" id="copyAllBtn">${t('copyAll')}</button>`;
  $('#copyAllBtn').onclick = () => copyText(all);
}

function convertCidrToRange() {
  const raw = $('#cidrInput').value.trim();
  const m = raw.split('/');
  if (m.length !== 2) {
    $('#status').innerHTML = `<div class="err">⚠ ${t('invalidCidr')}</div>`;
    $('#result').innerHTML = '';
    return;
  }
  const ipObj = ipToBigInt(m[0]);
  const prefix = parseInt(m[1], 10);
  if (!ipObj || isNaN(prefix)) {
    $('#status').innerHTML = `<div class="err">⚠ ${t('invalidCidr')}</div>`;
    $('#result').innerHTML = '';
    return;
  }
  const r = cidrToRange(ipObj, prefix);
  if (!r) {
    $('#status').innerHTML = `<div class="err">⚠ ${t('invalidCidr')}</div>`;
    $('#result').innerHTML = '';
    return;
  }
  const proto = r.bits === 32 ? t('ipv4Detected') : t('ipv6Detected');
  $('#result').innerHTML = `
    <div style="background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:14px">
      <div class="kv"><span>${t('rangeStart')}</span><span style="font-family:monospace;color:var(--accent);font-weight:700">${r.start}</span></div>
      <div class="kv"><span>${t('rangeEnd')}</span><span style="font-family:monospace;color:var(--accent);font-weight:700">${r.end}</span></div>
      <div class="kv"><span>${t('networkClass')}</span><span>${proto}</span></div>
      <div class="kv"><span>${t('prefixLen')}</span><span>/${r.prefix}</span></div>
      <div class="kv"><span>${t('totalHosts')}</span><span>${r.totalHosts.toString()}</span></div>
      <div class="kv"><span>${t('usableHosts')}</span><span>${r.usableHosts.toString()}</span></div>
    </div>`;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">✓ ${r.start} — ${r.end}</span>`;
  $('#copyBtns').innerHTML = `<button class="gz-btn" onclick="GZ.copyText('${r.start} - ${r.end}')">${t('rangeStart')} → ${t('rangeEnd')}</button>`;
}
