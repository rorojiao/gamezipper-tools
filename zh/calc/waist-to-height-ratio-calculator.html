<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is Waist-to-Height Ratio (WHtR)?", "acceptedAnswer": {"@type": "Answer", "text": "Waist-to-Height Ratio (WHtR) is your waist circumference divided by your height. The simple rule of thumb is: keep your waist less than half your height (WHtR under 0.5). It's a quick screening tool for cardiometabolic risk and is considered more accurate than BMI for many adults."}}, {"@type": "Question", "name": "How do I measure my waist correctly?", "acceptedAnswer": {"@type": "Answer", "text": "Stand relaxed and measure halfway between the bottom of your last palpable rib and the top of the iliac crest (hip bone). Don't suck in your stomach. Use a soft tape measure and measure at the end of a normal exhale. Measure against skin or light clothing, not over thick fabric."}}, {"@type": "Question", "name": "Why is WHtR better than BMI?", "acceptedAnswer": {"@type": "Answer", "text": "WHtR accounts for where fat is stored (around the waist), which matters more for heart disease and diabetes risk than total body weight. BMI doesn't distinguish muscle from fat, and it's less accurate for short, tall, athletic or elderly people. Multiple large studies have found WHtR is a stronger predictor of cardiometabolic risk than BMI."}}, {"@type": "Question", "name": "What's a healthy WHtR for children?", "acceptedAnswer": {"@type": "Answer", "text": "For children aged 6 to 18, a WHtR cutoff of 0.46 is recommended instead of 0.5. The 0.5 rule was derived from adult populations. This calculator uses the adult threshold by default; for pediatric use, consult your pediatrician."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Waist-to-Height Ratio (WHtR) Calculator',
    toolDesc: 'Calculate your Waist-to-Height Ratio (WHtR) — a simple cardiometabolic risk screening tool. The rule: keep your waist less than half your height.',
    waistMetric: 'Waist (cm)',
    waistImp: 'Waist (in)',
    heightMetric: 'Height (cm)',
    heightImp: 'Height (in)',
    wtr: 'WHtR',
    healthyMax: 'Healthy maximum waist',
    deficit: 'Above healthy limit',
    margin: 'Below healthy maximum',
    catHealthy: 'Healthy',
    catIncreased: 'Increased risk',
    catHigh: 'High risk',
    catVeryHigh: 'Very high risk',
    rule: '\u201cKeep your waist to less than half your height.\u201d',
    step1: 'Measure your waist at navel level (not hip)',
    step2: 'Enter waist and height in your preferred units',
    step3: 'See your WHtR, risk category and healthy waist range',
    step4: 'Use it to track progress alongside diet and exercise',
    note: 'WHtR is a screening tool, not a diagnosis. It works well for most adults but doesn\'t account for body composition (muscle vs fat) or specific fat distribution. Children, athletes, and pregnant people should consult a clinician for individualised advice.'
  },
  zh: {
    toolTitle: '腰高比 (WHtR) 计算器',
    toolDesc: '计算你的腰高比 (WHtR) — 一个简单的心血管代谢风险筛查工具。规则：腰围应小于身高的一半。',
    waistMetric: '腰围（厘米）',
    waistImp: '腰围（英寸）',
    heightMetric: '身高（厘米）',
    heightImp: '身高（英寸）',
    wtr: '腰高比',
    healthyMax: '健康腰围上限',
    deficit: '超过健康上限',
    margin: '低于健康上限',
    catHealthy: '健康',
    catIncreased: '风险升高',
    catHigh: '高风险',
    catVeryHigh: '极高风险',
    rule: '「腰围应小于身高的一半。」',
    step1: '在肚脐水平测量腰围（不是臀部）',
    step2: '输入腰围和身高（自选单位）',
    step3: '查看你的腰高比、风险分类和健康腰围范围',
    step4: '与饮食和运动一起跟踪进度',
    note: '腰高比是筛查工具，不是诊断。它对大多数成年人有效，但不区分身体成分（肌肉与脂肪）或特定的脂肪分布。儿童、运动员和孕妇应咨询医生以获得个性化建议。'
  }
});

const { $, t } = GZ;
let units = 'metric';

function setUnits(u) {
  units = u;
  $('#units').querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.u === u));
  $('#lbl-waist').textContent = t(u === 'metric' ? 'waistMetric' : 'waistImp');
  $('#lbl-height').textContent = t(u === 'metric' ? 'heightMetric' : 'heightImp');
  calc();
}

function toMetric(waist, height) {
  if (units === 'metric') return { w: waist, h: height };
  return { w: waist * 2.54, h: height * 2.54 };
}

function categoryFor(whtr) {
  if (whtr < 0.4) return { key: 'catHealthy', color: '#00d672', pos: (whtr / 0.6) * 30 };
  if (whtr < 0.5) return { key: 'catHealthy', color: '#00d672', pos: (whtr / 0.6) * 30 };
  if (whtr < 0.6) return { key: 'catIncreased', color: '#f0c419', pos: 30 + ((whtr - 0.5) / 0.1) * 25 };
  if (whtr < 0.7) return { key: 'catHigh', color: '#ff6b6b', pos: 55 + ((whtr - 0.6) / 0.1) * 30 };
  return { key: 'catVeryHigh', color: '#e94560', pos: Math.min(100, 85 + (whtr - 0.7) * 30) };
}

function calc() {
  const wIn = parseFloat($('#waist').value);
  const hIn = parseFloat($('#height').value);
  if (!wIn || !hIn || wIn <= 0 || hIn <= 0) { $('#result').innerHTML = ''; return; }
  const { w, h } = toMetric(wIn, hIn);
  if (h <= 0) return;
  const whtr = w / h;
  const cat = categoryFor(whtr);
  const maxHealthyCm = h * 0.5;
  const maxHealthy = units === 'metric' ? maxHealthyCm : (maxHealthyCm / 2.54);
  const overCm = Math.max(0, w - maxHealthyCm);
  const over = units === 'metric' ? overCm : (overCm / 2.54);
  const underCm = Math.max(0, maxHealthyCm - w);
  const under = units === 'metric' ? underCm : (underCm / 2.54);

  $('#result').innerHTML = `
    <div class="wtr-result">
      <div style="text-align:center">
        <div class="wtr-big" style="color:${cat.color}">${whtr.toFixed(2)}</div>
        <div class="wtr-cat" style="background:${cat.color};color:#fff">${t(cat.key)}</div>
      </div>
      <div class="wtr-bar">
        <div class="wtr-marker" style="left:${Math.min(100, Math.max(0, cat.pos))}%"></div>
      </div>
      <div class="wtr-scale"><span>0.30</span><span>0.40</span><span>0.50</span><span>0.60</span><span>0.70+</span></div>
      <div class="wtr-rule">${t('rule')}</div>
      <div class="wtr-grid2">
        <div class="wtr-stat"><div class="v">${maxHealthy.toFixed(1)}${units === 'metric' ? ' cm' : ' in'}</div><div class="l">${t('healthyMax')}</div></div>
        <div class="wtr-stat"><div class="v" style="color:${over > 0 ? '#e94560' : '#00d672'}">${over > 0 ? '+' + over.toFixed(1) : under.toFixed(1)}${units === 'metric' ? ' cm' : ' in'}</div><div class="l">${over > 0 ? t('deficit') : t('margin')}</div></div>
      </div>
      <div class="wtr-note">${t('note')}</div>
    </div>`;
}

$('#units').querySelectorAll('button').forEach(b => b.addEventListener('click', () => setUnits(b.dataset.u)));
['#waist','#height'].forEach(s => $(s).addEventListener('input', calc));

setUnits('metric');

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'\u2696\ufe0f', href:'/calc/bmi-calculator.html', name:'BMI Calculator'},
    {icon:'\ud83d\udcca', href:'/calc/bmi-prime-calculator.html', name:'BMI Prime'},
    {icon:'\ud83d\udca7', href:'/calc/water-intake.html', name:'Water Intake'},
    {icon:'\ud83d\udcaa', href:'/calc/bmr-calculator.html', name:'BMR Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
