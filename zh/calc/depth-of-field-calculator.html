<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is depth of field in photography?", "acceptedAnswer": {"@type": "Answer", "text": "Depth of field (DoF) is the distance between the nearest and farthest objects in a photo that appear acceptably sharp. A shallow DoF (blurry background) is achieved with wide apertures and long focal lengths, while a deep DoF (everything sharp) uses narrow apertures and wide lenses."}}, {"@type": "Question", "name": "What is hyperfocal distance?", "acceptedAnswer": {"@type": "Answer", "text": "Hyperfocal distance is the closest focus distance at which everything from half that distance to infinity appears acceptably sharp. Focusing at the hyperfocal distance maximizes depth of field for landscape photography."}}, {"@type": "Question", "name": "How is depth of field calculated?", "acceptedAnswer": {"@type": "Answer", "text": "Depth of field is calculated using focal length, f-number (aperture), subject distance, and the circle of confusion (determined by sensor size). The near and far limits of acceptable focus are derived from the lens equation."}}, {"@type": "Question", "name": "Does this calculator work offline?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. All calculations happen entirely in your browser. No data is sent to any server, and the page works even after it has loaded."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Depth of Field Calculator',
    toolDesc: 'Calculate depth of field, hyperfocal distance and near/far focus limits for any lens and sensor combination. Perfect for landscape, portrait and macro photography.',
    sensor: 'Sensor / Film Format',
    focal: 'Focal Length (mm)',
    hintFocal: 'e.g. 24 wide-angle, 50 normal, 85 portrait, 200 telephoto',
    aperture: 'Aperture (f-number)',
    hintAperture: 'e.g. f/1.4, f/2.8, f/5.6, f/8, f/16',
    distance: 'Subject Distance',
    unit: 'Distance Unit',
    calc: 'Calculate',
    result: 'Results',
    hyperfocal: 'Hyperfocal Distance',
    nearLimit: 'Near Focus Limit',
    farLimit: 'Far Focus Limit',
    totalDoF: 'Total Depth of Field',
    inFront: 'DoF in Front',
    behind: 'DoF Behind',
    step1: 'Select your camera sensor format (or circle of confusion)',
    step2: 'Enter your lens focal length in millimeters',
    step3: 'Set the aperture (f-number) you are shooting at',
    step4: 'Enter the distance to your subject and read the results',
  },
  zh: {
    toolTitle: '景深计算器',
    toolDesc: '计算任意镜头和传感器的景深、超焦距和前后对焦极限。适合风光、人像和微距摄影。',
    sensor: '传感器 / 胶片格式',
    focal: '焦距 (mm)',
    hintFocal: '如 24 广角、50 标准、85 人像、200 长焦',
    aperture: '光圈 (f 数值)',
    hintAperture: '如 f/1.4、f/2.8、f/5.6、f/8、f/16',
    distance: '主体距离',
    unit: '距离单位',
    calc: '计算',
    result: '计算结果',
    hyperfocal: '超焦距',
    nearLimit: '近端对焦极限',
    farLimit: '远端对焦极限',
    totalDoF: '总景深',
    inFront: '前方景深',
    behind: '后方景深',
    step1: '选择相机传感器格式（或弥散圆直径）',
    step2: '输入镜头焦距（毫米）',
    step3: '设置拍摄使用的光圈（f 数值）',
    step4: '输入主体距离，查看计算结果',
  }
});

const { $, t } = GZ;

function calc() {
  const coc = parseFloat($('#sensor').value);
  const f = parseFloat($('#focal').value);
  const N = parseFloat($('#aperture').value);
  let s = parseFloat($('#distance').value);
  const unit = $('#unit').value;
  if (!f || !N || !s || s <= 0) { $('#result').innerHTML = ''; return; }
  // convert distance to meters
  const s_m = unit === 'ft' ? s * 0.3048 : s;
  const H = (f * f) / (N * coc) / 1000; // hyperfocal in meters
  const hf = H; // hyperfocal in meters
  if (s_m >= hf) {
    // far limit is infinity
    const near = (hf * s_m) / (hf + (s_m - hf));
    $('#result').innerHTML = `
      <div class="dof-grid">
        <div class="dof-card"><span class="lbl">${t('hyperfocal')}</span><span class="val">${fmt(hf)}</span></div>
        <div class="dof-card"><span class="lbl">${t('nearLimit')}</span><span class="val">${fmt(near)}</span></div>
        <div class="dof-card"><span class="lbl">${t('farLimit')}</span><span class="val">∞</span></div>
      </div>`;
  } else {
    const near = (hf * s_m) / (hf + (s_m - hf));
    const far = (hf * s_m) / (hf - (s_m - hf));
    const total = far - near;
    const front = s_m - near;
    const behind = far - s_m;
    $('#result').innerHTML = `
      <div class="dof-grid">
        <div class="dof-card"><span class="lbl">${t('hyperfocal')}</span><span class="val">${fmt(hf)}</span></div>
        <div class="dof-card"><span class="lbl">${t('nearLimit')}</span><span class="val">${fmt(near)}</span></div>
        <div class="dof-card"><span class="lbl">${t('farLimit')}</span><span class="val">${fmt(far)}</span></div>
        <div class="dof-card"><span class="lbl">${t('totalDoF')}</span><span class="val">${fmt(total)}</span></div>
        <div class="dof-card"><span class="lbl">${t('inFront')}</span><span class="val">${fmt(front)}</span></div>
        <div class="dof-card"><span class="lbl">${t('behind')}</span><span class="val">${fmt(behind)}</span></div>
      </div>`;
  }
}

function fmt(m) {
  const unit = $('#unit').value;
  if (unit === 'ft') {
    const ft = m / 0.3048;
    if (ft >= 1000) return ft.toFixed(0) + ' ft';
    if (ft >= 100) return ft.toFixed(1) + ' ft';
    return ft.toFixed(2) + ' ft';
  }
  if (m >= 100) return m.toFixed(0) + ' m';
  if (m >= 10) return m.toFixed(1) + ' m';
  return m.toFixed(2) + ' m';
}

['sensor','focal','aperture','distance','unit'].forEach(id => $('#' + id).addEventListener('input', calc));

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/calc/aspect-ratio-calculator.html', name:'Aspect Ratio'},
    {icon:'📏', href:'/calc/screen-size-calculator.html', name:'Screen Size'},
    {icon:'🔆', href:'/calc/dpi-calculator.html', name:'DPI Calculator'},
    {icon:'📐', href:'/calc/print-size-calculator.html', name:'Print Size'},
  ]
});
calc();
</script>
