<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How fast do cars depreciate?", "acceptedAnswer": {"@type": "Answer", "text": "A new car typically loses about 20% of its value in the first year and roughly 15% per year after that. By 5 years most cars have lost around 60% of their original value, though luxury and economy cars depreciate at different rates."}}, {"@type": "Question", "name": "What is the reducing-balance depreciation method?", "acceptedAnswer": {"@type": "Answer", "text": "Reducing-balance (declining-balance) depreciation applies a fixed percentage to the remaining value each year. This mirrors real-world car depreciation, which is steepest early on and flattens out. The straight-line method instead deducts the same fixed amount each year."}}, {"@type": "Question", "name": "Which cars hold their value best?", "acceptedAnswer": {"@type": "Answer", "text": "Generally, pickup trucks, some SUVs, and reliable Japanese brands (Toyota, Honda) hold value well. Luxury sedans and electric vehicles can depreciate faster. Condition, mileage, maintenance history, and market demand also strongly affect resale value."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="cd-hero">
      <div class="lbl" id="heroLbl"></div>
      <div class="big" id="valueNow">$0</div>
      <div class="sub" id="heroSub"></div>
    </div>
    <div class="cd-grid">
      <div class="cd-card">
        <h3>🚗 <span id="lblDetails"></span></h3>
        <div class="cd-field"><label id="lblPrice"></label><input type="number" id="price" value="35000" min="0" step="500"></div>
        <div class="cd-field"><label id="lblYears"></label><input type="number" id="years" value="5" min="1" max="20" step="1"></div>
        <div class="cd-field"><label id="lblRate"></label>
          <select id="rateType">
            <option value="auto" id="optAuto"></option>
            <option value="custom">Custom %</option>
          </select>
        </div>
        <div class="cd-field" id="customBox" style="display:none"><label id="lblCustom"></label><input type="number" id="customRate" value="18" min="1" max="80" step="0.5"></div>
        <div class="cd-field" id="brandBox"><label id="lblBrand"></label><select id="brand">
          <option value="0.18">Average (≈18%/yr)</option>
          <option value="0.12">Truck / SUV (holds value, ≈12%)</option>
          <option value="0.15">Toyota / Honda (reliable, ≈15%)</option>
          <option value="0.20">Average sedan (≈20%)</option>
          <option value="0.25">Luxury sedan (≈25%)</option>
          <option value="0.28">Luxury / Electric (≈28%)</option>
        </select></div>
        <div class="cd-field"><label id="lblCur"></label><input type="text" id="cur" value="$" maxlength="3"></div>
      </div>
      <div class="cd-card">
        <h3>📉 <span id="lblResult"></span></h3>
        <div class="cd-stats">
          <div class="cd-stat"><div class="l" id="lLost"></div><div class="v loss" id="totalLost">$0</div></div>
          <div class="cd-stat"><div class="l" id="lPct"></div><div class="v loss" id="pctLost">0%</div></div>
          <div class="cd-stat"><div class="l" id="lPerYr"></div><div class="v" id="perYear">$0</div></div>
        </div>

      </div>
    </div>

  </div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Car Depreciation Calculator',
    toolDesc: 'Estimate how much your car or vehicle loses in value each year. Uses a reducing-balance (declining-balance) model with preset rates for trucks, sedans, luxury and EVs. See the projected resale value after 1 to 10+ years.',
    details: 'Vehicle Details', result: 'Depreciation Result',
    price: 'Purchase price (new)', years: 'Years of ownership', rateType: 'Depreciation rate',
    auto: 'By vehicle type', custom: 'Custom annual %', customLbl: 'Annual depreciation rate (%)', brandType: 'Vehicle type',
    currency: 'Currency symbol',
    heroLbl: 'Estimated Value After', heroSub: 'Reducing-balance depreciation',
    totalLostLbl: 'Total Value Lost', pctLbl: 'Lost (%)', perYrLbl: 'Avg Loss / Year',
    chartTitle: 'Projected value by year',
    copy: '📋 Copy Results', reset: '🔄 Reset',
    step1: 'Enter the original purchase price of the car',
    step2: 'Set how many years you will own it',
    step3: 'Pick a vehicle type or enter a custom annual rate',
    step4: 'See the estimated resale value and yearly loss chart',
  },
  zh: {
    toolTitle: '汽车折旧计算器',
    toolDesc: '估算你的汽车或车辆每年贬值多少。采用余额递减（加速折旧）模型，预设皮卡、轿车、豪华车和电动车的折旧率。查看 1 到 10+ 年后的预计残值。',
    details: '车辆信息', result: '折旧结果',
    price: '购买价格（新车）', years: '持有年数', rateType: '折旧率',
    auto: '按车型', custom: '自定义百分比', customLbl: '年折旧率 (%)', brandType: '车型',
    currency: '货币符号',
    heroLbl: '估算价值（持有后）', heroSub: '余额递减折旧',
    totalLostLbl: '累计贬值', pctLbl: '贬值比例', perYrLbl: '年均贬值',
    chartTitle: '逐年预计价值',
    copy: '📋 复制结果', reset: '🔄 重置',
    step1: '输入汽车的原始购买价格',
    step2: '设置你将持有的年数',
    step3: '选择车型或输入自定义年折旧率',
    step4: '查看预计残值和逐年贬值图表',
  }
});

const { $, copyText, t } = GZ;
const isZh = GZI18n.getLang() === 'zh';

$('#lblDetails').textContent=t('details');$('#lblResult').textContent=t('result');$('#lblPrice').textContent=t('price');
$('#lblYears').textContent=t('years');$('#lblRate').textContent=t('rateType');$('#optAuto').textContent=t('auto');
$('#lblCustom').textContent=t('customLbl');$('#lblBrand').textContent=t('brandType');$('#lblCur').textContent=t('currency');
$('#heroLbl').textContent=t('heroLbl');$('#heroSub').textContent=t('heroSub');
$('#lLost').textContent=t('totalLostLbl');$('#lPct').textContent=t('pctLbl');$('#lPerYr').textContent=t('perYrLbl');
$('#chartTitle').textContent=t('chartTitle');

function getRate(){
  if($('#rateType').value==='custom')return(+$('#customRate').value||18)/100;
  return+$('#brand').value||0.18;
}

function fmt(n,sym){return sym+(Math.round(n)||0).toLocaleString();}

function calc(){
  const price=+$('#price').value||0,years=Math.max(1,Math.min(20,Math.round(+$('#years').value||1)));
  const rate=getRate(),cur=$('#cur').value||'$';
  $('#customBox').style.display=$('#rateType').value==='custom'?'block':'none';
  $('#brandBox').style.display=$('#rateType').value==='custom'?'none':'block';
  if(price<=0){$('#valueNow').textContent=cur+'0';['totalLost','pctLost','perYear'].forEach(id=>$('#'+id).textContent='—');$('#chart').innerHTML='';return;}
  // Reducing balance
  const yearVals=[];let v=price;
  for(let y=0;y<=years;y++){yearVals.push(v);v=v*(1-rate);}
  const valueNow=yearVals[years];
  const totalLost=price-valueNow,pct=totalLost/price*100,perYear=totalLost/years;
  $('#valueNow').textContent=fmt(valueNow,cur);
  $('#heroLbl').textContent=isZh?`持有 ${years} 年后的估算价值`:`Estimated Value After ${years} Year${years>1?'s':''}`;
  $('#totalLost').textContent=fmt(totalLost,cur);
  $('#pctLost').textContent=pct.toFixed(0)+'%';
  $('#perYear').textContent=fmt(perYear,cur);
  // Chart: show up to years (max 10 for display)
  const showY=Math.min(years,10);const maxV=price;
  let html='';
  for(let y=0;y<=showY;y++){
    const val=yearVals[y];const pctW=Math.max(2,val/maxV*100);
    html+=`<div class="cd-barrow"><span class="yr">${isZh?'第':'Yr'}${y}</span><div class="barwrap"><div class="bar" style="width:${pctW}%"></div></div><span class="val">${fmt(val,cur)}</span></div>`;
  }
  $('#chart').innerHTML=html;
  $('#note').innerHTML=isZh
    ?`采用<b>余额递减法</b>：每年剩余价值乘以 (1 − 折旧率)。新车首年贬值通常最大。<br>⚠️ 仅供参考，实际残值受里程、车况、品牌、市场需求等影响。`
    :`Using the <b>reducing-balance</b> method: each year's value = previous × (1 − rate). New cars lose the most in year one.<br>⚠️ Estimate only — actual resale depends on mileage, condition, brand and market demand.`;
}

['price','years','customRate','cur'].forEach(id=>$('#'+id).addEventListener('input',calc));
$('#rateType').addEventListener('change',calc);
$('#brand').addEventListener('change',calc);

$('#toolbar').innerHTML=`
  <button class="gz-btn gz-btn-secondary" id="btnCopy">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnReset">${t('reset')}</button>`;
$('#btnCopy').onclick=()=>copyText(`${t('toolTitle')}\nPrice: ${$('#price').value}\nYears: ${$('#years').value}\nValue now: ${$('#valueNow').textContent}\nTotal lost: ${$('#totalLost').textContent} (${$('#pctLost').textContent})\nAvg/year: ${$('#perYear').textContent}`);
$('#btnReset').onclick=()=>{$('#price').value=30000;$('#years').value=5;calc();};

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'🚗', href:'/calc/car-affordability-calculator.html', name:'Car Affordability'},
    {icon:'⛽', href:'/calc/fuel-cost-calculator.html', name:'Fuel Cost'},
    {icon:'📉', href:'/calc/roi.html', name:'ROI Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
