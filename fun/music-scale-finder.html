const { $, t } = GZ;
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTE_FREQ_BASE = 261.63; // C4
function noteFreq(midiOffset) { return NOTE_FREQ_BASE * Math.pow(2, midiOffset/12); }
function noteAt(idx) { return NOTES[((idx % 12) + 12) % 12]; }

const SCALES = {
  'major':           { name:'Major (Ionian)',          intervals:[0,2,4,5,7,9,11] },
  'natural-minor':   { name:'Natural Minor (Aeolian)', intervals:[0,2,3,5,7,8,10] },
  'harmonic-minor':  { name:'Harmonic Minor',          intervals:[0,2,3,5,7,8,11] },
  'melodic-minor':   { name:'Melodic Minor (ascending)',intervals:[0,2,3,5,7,9,11] },
  'major-pent':      { name:'Major Pentatonic',        intervals:[0,2,4,7,9] },
  'minor-pent':      { name:'Minor Pentatonic',        intervals:[0,3,5,7,10] },
  'blues':           { name:'Blues',                   intervals:[0,3,5,6,7,10] },
  'dorian':          { name:'Dorian',                  intervals:[0,2,3,5,7,9,10] },
  'phrygian':        { name:'Phrygian',                intervals:[0,1,3,5,7,8,10] },
  'lydian':          { name:'Lydian',                  intervals:[0,2,4,6,7,9,11] },
  'mixolydian':      { name:'Mixolydian',              intervals:[0,2,4,5,7,9,10] },
  'locrian':         { name:'Locrian',                 intervals:[0,1,3,5,6,8,10] },
  'whole-tone':      { name:'Whole Tone',              intervals:[0,2,4,6,8,10] },
  'diminished':      { name:'Diminished (Octatonic)',  intervals:[0,2,3,5,6,8,9,11] },
  'augmented':       { name:'Augmented (Hexatonic)',   intervals:[0,3,4,7,8,11] },
  'hungarian-minor': { name:'Hungarian Minor',         intervals:[0,2,3,6,7,8,11] },
  'japanese':        { name:'Japanese (Hirajoshi)',    intervals:[0,2,3,7,8] },
  'arabic':          { name:'Arabic (Double Harmonic)',intervals:[0,1,4,5,7,8,11] },
};
const ROMAN = ['I','ii','iii','IV','V','vi','vii°'];
const CHORD_QUALITY = ['maj','min','min','maj','maj','dim'];
function qualityForScaleInterval(rootSemitones) {
  // build triad: root, +M3 or m3, +5 (dim/aug)
  // figure out from the scale itself — use intervals present
  return null;
}

function initSelects() {
  const rs = $('#root'), ss = $('#scale');
  NOTES.forEach((n,i) => {
    const o = document.createElement('option'); o.value = i; o.textContent = n; rs.appendChild(o);
  });
  rs.value = 0;
  Object.keys(SCALES).forEach(k => {
    const o = document.createElement('option'); o.value = k; o.textContent = SCALES[k].name; ss.appendChild(o);
  });
}

let actx = null;
function ensureCtx(){ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); }
function playNote(freq, dur=0.4, when=0) {
  ensureCtx();
  const t0 = actx.currentTime + when;
  const osc = actx.createOscillator(); osc.type='triangle'; osc.frequency.value=freq;
  const g = actx.createGain();
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(0.25, t0+0.02);
  g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  osc.connect(g); g.connect(actx.destination);
  osc.start(t0); osc.stop(t0+dur+0.05);
}

function currentScaleNotes() {
  const root = +$('#root').value;
  const intervals = SCALES[$('#scale').value].intervals;
  return intervals.map(iv => ({ semis: root+iv, name: noteAt(root+iv), interval: iv }));
}

function renderPiano() {
  const piano = $('#piano');
  piano.innerHTML = '';
  const scaleNotes = currentScaleNotes();
  const root = +$('#root').value;
  const inScaleSet = new Set(scaleNotes.map(n => n.semis % 12));
  // 2 octaves of white keys
  const WHITE_OFFSETS = [0,2,4,5,7,9,11];
  const BLACK_MAP = {0:1,1:3,3:6,4:8,5:10};
  let whiteCount = 0;
  for (let oct=0; oct<2; oct++) {
    WHITE_OFFSETS.forEach((w,idx) => {
      const semis = (oct*12) + w;
      const pc = semis % 12;
      const isIn = inScaleSet.has(pc);
      const isRoot = pc === (root % 12);
      const div = document.createElement('div');
      div.className = 'ms-white' + (isIn?' in-scale':'') + (isRoot?' root':'');
      const noteName = noteAt(semis) + (4+oct);
      div.innerHTML = `<div class="nm">${noteName}</div>`;
      div.onclick = () => playNote(noteFreq(semis));
      piano.appendChild(div);
      whiteCount++;
      // black key after this white?
      if (BLACK_MAP[idx] !== undefined) {
        const bsemis = (oct*12) + BLACK_MAP[idx];
        const bpc = bsemis % 12;
        const bIn = inScaleSet.has(bpc);
        const bRoot = bpc === (root % 12);
        const bk = document.createElement('div');
        bk.className = 'ms-black' + (bIn?' in-scale':'') + (bRoot?' root':'');
        const leftPct = (whiteCount / 14) * 100 - 2.7;
        bk.style.left = leftPct + '%';
        bk.title = noteAt(bsemis);
        bk.onclick = () => playNote(noteFreq(bsemis));
        piano.appendChild(bk);
      }
    });
  }
  // Set white-key flex-basis to ensure total 14
  // (flex:1 handles it)
}

function renderInfo() {
  const scaleNotes = currentScaleNotes();
  const root = +$('#root').value;
  // Notes chips
  $('#notes').innerHTML = scaleNotes.map((n,i) =>
    `<div class="ms-note-chip ${i===0?'root':''}">${n.name}</div>`).join('');
  // Intervals
  const intervals = SCALES[$('#scale').value].intervals;
  const intervalNames = ['1','b2','2','b3','3','4','b5','5','#5','6','b7','7','8'];
  const intvStr = scaleNotes.map((n,i) => {
    const iv = n.interval;
    let label = intervalNames[iv] || iv;
    return `<code>${label}</code>`;
  }).join(' – ') + (scaleNotes.length ? ` → <code>8</code>` : '');
  $('#intervals').innerHTML = `${t('intervals')}: ${intvStr}<br>Formula: W=whole step, H=half step — see chord chips below for triads`;
  // Diatonic chords (triads from each scale degree) — only for 7-note scales
  if (scaleNotes.length === 7) {
    const chords = scaleNotes.map((n, i) => {
      // third = note at i+2 in scale, fifth = note at i+4
      const third = scaleNotes[(i+2) % 7];
      const fifth = scaleNotes[(i+4) % 7];
      // figure quality by semitone spans
      const thirdIntv = (third.semis - n.semis + 12) % 12;
      const fifthIntv = (fifth.semis - n.semis + 12) % 12;
      let quality, suffix;
      if (thirdIntv === 4 && fifthIntv === 7) { quality='maj'; suffix=''; }
      else if (thirdIntv === 3 && fifthIntv === 7) { quality='min'; suffix='m'; }
      else if (thirdIntv === 3 && fifthIntv === 6) { quality='dim'; suffix='°'; }
      else if (thirdIntv === 4 && fifthIntv === 8) { quality='aug'; suffix='+'; }
      else { quality='?'; suffix='?'; }
      const roman = ROMAN[i] || (i+1);
      const display = roman.replace(/^[iv]+/i, m => quality==='min'? m.toLowerCase() : quality==='maj'? m.toUpperCase() : m);
      return { name: n.name + suffix, quality, display: display + suffix, notes: `${n.name}–${third.name}–${fifth.name}`, freqs:[noteFreq(n.interval+root),noteFreq(third.interval+root),noteFreq(fifth.interval+root)] };
    });
    $('#chords').innerHTML = chords.map((c,i) =>
      `<div class="ms-chord" onclick="playChord([${c.freqs.join(',')}])" title="${c.notes}"><strong>${c.display}</strong> ${c.name}<br><span style="opacity:.7;font-size:.7rem">${c.notes}</span></div>`).join('');
  } else {
    $('#chords').innerHTML = '<em style="color:var(--text2);font-size:.85rem">Diatonic triads are shown for 7-note scales. Try Major, Minor or a mode.</em>';
  }
  // Relative key info
  const rel = $('#related');
  const scaleKey = $('#scale').value;
  if (scaleKey === 'major') {
    const relMin = noteAt(root+9);
    rel.innerHTML = `Relative minor: <code>${relMin} natural minor</code> (same notes, starts on the 6th degree)`;
  } else if (scaleKey === 'natural-minor') {
    const relMaj = noteAt(root+3);
    rel.innerHTML = `Relative major: <code>${relMaj} major</code> (same notes, starts on the 3rd degree)`;
  } else if (scaleKey === 'major-pent') {
    rel.innerHTML = `Same notes as <code>${noteAt(root+9)} minor pentatonic</code>`;
  } else if (scaleKey === 'minor-pent') {
    rel.innerHTML = `Same notes as <code>${noteAt(root+3)} major pentatonic</code>`;
  } else {
    rel.innerHTML = `Parent scale: try the major or minor scale starting on <code>${noteAt(root)}</code> for related keys.`;
  }
}

function playChord(freqs) {
  freqs.forEach(f => playNote(f, 0.8, 0));
}

function playScale() {
  const scaleNotes = currentScaleNotes();
  scaleNotes.forEach((n,i) => {
    playNote(noteFreq(n.interval + (+$('#root').value)), 0.35, i*0.22);
  });
  // descend
  const total = scaleNotes.length * 0.22;
  [...scaleNotes].reverse().forEach((n,i) => {
    playNote(noteFreq(n.interval + (+$('#root').value) + 12), 0.4, total + i*0.22);
  });
}

function render() { renderPiano(); renderInfo(); }

initSelects();
render();
