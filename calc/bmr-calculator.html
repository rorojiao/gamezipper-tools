<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is BMR?","acceptedAnswer":{"@type":"Answer","text":"BMR (Basal Metabolic Rate) is the number of calories your body burns at rest to maintain basic life-sustaining functions like breathing, circulation, and cell production."}},{"@type":"Question","name":"Which BMR formula is most accurate?","acceptedAnswer":{"@type":"Answer","text":"The Mifflin-St Jeor equation is considered the most accurate for most people. If you know your body fat percentage, the Katch-McArdle formula is even more precise as it accounts for lean body mass."}},{"@type":"Question","name":"How do I use my BMR to lose weight?","acceptedAnswer":{"@type":"Answer","text":"Multiply your BMR by an activity factor to get your TDEE (Total Daily Energy Expenditure). Eat 300-500 calories below your TDEE for sustainable weight loss of about 0.5 kg per week."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">

  </div>
  <div class="gz-tool-area">

      <label id="lbl-unit"></label>
      <div class="radio-group">
        <label><input type="radio" name="unit" value="metric" checked> <span id="lbl-metric"></span></label>
        <label><input type="radio" name="unit" value="imperial"> <span id="lbl-imperial"></span></label>
      </div>
    </div>
    <div class="form-group">
      <label id="lbl-gender"></label>
      <div class="radio-group">
        <label><input type="radio" name="gender" value="male" checked> <span id="lbl-male"></span></label>
        <label><input type="radio" name="gender" value="female"> <span id="lbl-female"></span></label>
      </div>
    </div>
    <div class="form-group">
      <label id="lbl-age"></label>
      <input type="number" id="age" min="1" max="120" value="30">
    </div>
    <div class="form-group">
      <label id="lbl-weight"></label>
      <input type="number" id="weight" min="1" value="70" step="0.1">
    </div>
    <div class="form-group">
      <label id="lbl-height"></label>
      <input type="number" id="height" min="1" value="175" step="0.1">
    </div>
    <div class="form-group">
      <label id="lbl-bf"></label>
      <input type="number" id="bodyfat" min="1" max="70" step="0.1" placeholder="e.g. 20">
    </div>
    <button class="gz-btn" id="calcBtn" style="width:100%;margin-top:.5rem"></button>
    <div id="results" style="display:none">
      <div class="result-card">
        <h3 id="res-title"></h3>
        <div class="result-item"><span>Mifflin-St Jeor</span><span class="result-value" id="r-mifflin"></span></div>
        <div class="result-item"><span>Harris-Benedict</span><span class="result-value" id="r-harris"></span></div>
        <div class="result-item"><span id="r-katch-label">Katch-McArdle</span><span class="result-value" id="r-katch"></span></div>
      </div>
      <div class="result-card activity-levels">
        <h3 id="tdee-title"></h3>
        <div class="activity-item"><span id="al-sedentary"></span><span class="activity-cal" id="c-sedentary"></span></div>
        <div class="activity-item"><span id="al-light"></span><span class="activity-cal" id="c-light"></span></div>
        <div class="activity-item"><span id="al-moderate"></span><span class="activity-cal" id="c-moderate"></span></div>
        <div class="activity-item"><span id="al-active"></span><span class="activity-cal" id="c-active"></span></div>

  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'BMR Calculator',
    toolDesc: 'Calculate your Basal Metabolic Rate using 3 scientific formulas — find out how many calories you burn at rest.',
    unitSystem: 'Unit System',
    metric: 'Metric (kg, cm)',
    imperial: 'Imperial (lb, in)',
    gender: 'Gender',
    male: 'Male',
    female: 'Female',
    age: 'Age (years)',
    weightMetric: 'Weight (kg)',
    weightImperial: 'Weight (lbs)',
    heightMetric: 'Height (cm)',
    heightImperial: 'Height (inches)',
    bodyfat: 'Body Fat % (optional, for Katch-McArdle)',
    calculate: 'Calculate BMR',
    bmrResults: 'Your BMR (calories/day)',
    tdeeTitle: 'Daily Calorie Needs (TDEE)',
    sedentary: 'Sedentary (little or no exercise)',
    light: 'Lightly active (1-3 days/week)',
    moderate: 'Moderately active (3-5 days/week)',
    active: 'Very active (6-7 days/week)',
    veryActive: 'Extra active (very hard exercise)',
    calDay: 'cal/day',
    notAvailable: 'Enter body fat %',
    step1: 'Select unit system (metric or imperial)',
    step2: 'Enter your age, weight, and height',
    step3: 'Optionally enter body fat % for Katch-McArdle formula',
    step4: 'Click Calculate to see your BMR and TDEE',
  },
  zh: {
    toolTitle: '基础代谢率计算器',
    toolDesc: '使用3种科学公式计算你的基础代谢率（BMR）——了解你在静息状态下燃烧多少卡路里。',
    unitSystem: '单位系统',
    metric: '公制（千克、厘米）',
    imperial: '英制（磅、英寸）',
    gender: '性别',
    male: '男',
    female: '女',
    age: '年龄（岁）',
    weightMetric: '体重（千克）',
    weightImperial: '体重（磅）',
    heightMetric: '身高（厘米）',
    heightImperial: '身高（英寸）',
    bodyfat: '体脂率 %（可选，用于 Katch-McArdle 公式）',
    calculate: '计算 BMR',
    bmrResults: '你的基础代谢率（卡路里/天）',
    tdeeTitle: '每日卡路里需求（TDEE）',
    sedentary: '久坐（几乎不运动）',
    light: '轻度活动（每周 1-3 天）',
    moderate: '中度活动（每周 3-5 天）',
    active: '高度活动（每周 6-7 天）',
    veryActive: '超高强度（高强度运动/体力工作）',
    calDay: '卡/天',
    notAvailable: '请输入体脂率',
    step1: '选择单位系统（公制或英制）',
    step2: '输入年龄、体重和身高',
    step3: '可选输入体脂率以使用 Katch-McArdle 公式',
    step4: '点击计算查看 BMR 和 TDEE',
  }
});

const { $, t } = GZ;

$('#lbl-unit').textContent = t('unitSystem');
$('#lbl-metric').textContent = t('metric');
$('#lbl-imperial').textContent = t('imperial');
$('#lbl-gender').textContent = t('gender');
$('#lbl-male').textContent = t('male');
$('#lbl-female').textContent = t('female');
$('#lbl-age').textContent = t('age');
$('#lbl-weight').textContent = t('weightMetric');
$('#lbl-height').textContent = t('heightMetric');
$('#lbl-bf').textContent = t('bodyfat');
$('#calcBtn').textContent = t('calculate');
$('#res-title').textContent = t('bmrResults');
$('#tdee-title').textContent = t('tdeeTitle');
$('#al-sedentary').textContent = t('sedentary');
$('#al-light').textContent = t('light');
$('#al-moderate').textContent = t('moderate');
$('#al-active').textContent = t('active');
$('#al-very').textContent = t('veryActive');

document.querySelectorAll('input[name="unit"]').forEach(r => {
  r.addEventListener('change', () => {
    const isMetric = document.querySelector('input[name="unit"]:checked').value === 'metric';
    $('#lbl-weight').textContent = isMetric ? t('weightMetric') : t('weightImperial');
    $('#lbl-height').textContent = isMetric ? t('heightMetric') : t('heightImperial');
    if (isMetric) { $('#weight').value = 70; $('#height').value = 175; }
    else { $('#weight').value = 154; $('#height').value = 69; }
  });
});

$('#calcBtn').addEventListener('click', calculate);

function calculate() {
  const isMetric = document.querySelector('input[name="unit"]:checked').value === 'metric';
  const gender = document.querySelector('input[name="gender"]:checked').value;
  const age = parseFloat($('#age').value);
  const weightInput = parseFloat($('#weight').value);
  const heightInput = parseFloat($('#height').value);
  const bf = parseFloat($('#bodyfat').value);

  if (!age || !weightInput || !heightInput) return;

  let w, h;
  if (isMetric) { w = weightInput; h = heightInput; }
  else { w = weightInput * 0.453592; h = heightInput * 2.54; }

  // Mifflin-St Jeor
  let mifflin;
  if (gender === 'male') mifflin = 10 * w + 6.25 * h - 5 * age + 5;
  else mifflin = 10 * w + 6.25 * h - 5 * age - 161;

  // Harris-Benedict (revised)
  let harris;
  if (gender === 'male') harris = 88.362 + 13.397 * w + 4.799 * h - 5.677 * age;
  else harris = 447.593 + 9.247 * w + 3.098 * h - 4.330 * age;

  // Katch-McArdle
  let katch = null;
  if (bf && bf > 0 && bf < 100) {
    const lbm = w * (1 - bf / 100);
    katch = 370 + 21.6 * lbm;
  }

  $('#r-mifflin').textContent = Math.round(mifflin) + ' ' + t('calDay');
  $('#r-harris').textContent = Math.round(harris) + ' ' + t('calDay');
  if (katch !== null) {
    $('#r-katch').textContent = Math.round(katch) + ' ' + t('calDay');
  } else {
    $('#r-katch').textContent = t('notAvailable');
  }

  const avgBMR = katch ? (mifflin + harris + katch) / 3 : (mifflin + harris) / 2;
  const activities = [1.2, 1.375, 1.55, 1.725, 1.9];
  const ids = ['sedentary','light','moderate','active','very'];
  activities.forEach((mult, i) => {
    $('#c-' + ids[i]).textContent = Math.round(avgBMR * mult) + ' ' + t('calDay');
  });

  $('#results').style.display = 'block';
}

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔥', href:'/calc/tdee-calculator.html', name:'TDEE Calculator'},
    {icon:'🍎', href:'/calc/calorie-calculator.html', name:'Calorie Calculator'},
    {icon:'💪', href:'/calc/body-fat.html', name:'Body Fat Calculator'},
    {icon:'🥗', href:'/calc/macro-calculator.html', name:'Macro Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
