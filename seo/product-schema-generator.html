<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is Product schema markup?","acceptedAnswer":{"@type":"Answer","text":"Product schema is structured data (JSON-LD) that describes a product's name, brand, price, availability and ratings so Google can show rich snippets, price drops and shopping results."}},{"@type":"Question","name":"Does Product schema improve SEO rankings?","acceptedAnswer":{"@type":"Answer","text":"While structured data itself is not a direct ranking factor, it helps Google understand your products and enables rich results (prices, ratings, availability) that can improve click-through rate from search."}},{"@type":"Question","name":"What is an ItemAvailability value?","acceptedAnswer":{"@type":"Answer","text":"ItemAvailability tells search engines whether a product is in stock. Use https://schema.org/InStock, OutOfStock, PreOrder, SoldOut or LimitedAvailability."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-split">
      <div><div class="form-grid" id="form"></div></div>
      <div>
        <label id="lbl-out" style="display:block;font-size:.78em;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">JSON-LD</label>
        <div class="gz-output" id="output"></div>
      </div>
    </div>
    <div id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Product Schema Generator',
    toolDesc: 'Build valid Product JSON-LD with brand, price, availability, offers, images, SKU, ratings and reviews for Google shopping rich results.',
    generate: 'Generate', example: 'Example', copy: 'Copy', clear: 'Clear',
    lblName: 'Product name', lblBrand: 'Brand', lblDesc: 'Description', lblImg: 'Image URL',
    lblSku: 'SKU / MPN', lblCat: 'Category', lblColor: 'Color',
    lblPrice: 'Price', lblCurrency: 'Currency (ISO)', lblAvail: 'Availability', lblCond: 'Condition',
    lblUrl: 'Product URL', lblSeller: 'Seller name', lblValid: 'Price valid until (date)',
    lblRating: 'Aggregate rating (0-5)', lblReviews: 'Review count',
    step1: 'Enter the product name, brand and a short description.',
    step2: 'Add the price, currency and stock availability.',
    step3: 'Optionally add an image, SKU, seller and aggregate rating.',
    step4: 'Copy the JSON-LD into your product page <head>.',
  },
  zh: {
    toolTitle: '商品 Schema 生成器',
    toolDesc: '生成符合规范的 Product JSON-LD，包含品牌、价格、库存、报价、图片、SKU、评分和评价，助力 Google 购物富结果。',
    generate: '生成', example: '示例', copy: '复制', clear: '清空',
    lblName: '商品名称', lblBrand: '品牌', lblDesc: '描述', lblImg: '图片 URL',
    lblSku: 'SKU / MPN', lblCat: '分类', lblColor: '颜色',
    lblPrice: '价格', lblCurrency: '货币代码 (ISO)', lblAvail: '库存状态', lblCond: '成色',
    lblUrl: '商品页面 URL', lblSeller: '卖家名称', lblValid: '价格有效期 (日期)',
    lblRating: '综合评分 (0-5)', lblReviews: '评价数量',
    step1: '填写商品名称、品牌和简短描述。',
    step2: '添加价格、货币代码和库存状态。',
    step3: '可选：添加图片、SKU、卖家和综合评分。',
    step4: '将 JSON-LD 复制到商品页面的 <head> 中。',
  }
});
const { $, copyText, t } = GZ;
const AVAIL = {'InStock':'In Stock','OutOfStock':'Out of Stock','PreOrder':'Pre-Order','BackOrder':'Back Order','SoldOut':'Sold Out','Discontinued':'Discontinued','LimitedAvailability':'Limited Availability'};
const COND = {'NewCondition':'New','UsedCondition':'Used','RefurbishedCondition':'Refurbished','DamagedCondition':'Damaged'};

function field(id, labelKey, type='text', ph='', full=false, extra='') {
  return `<div class="fg ${full?'full':''}"><label>${t(labelKey)}</label><input id="f-${id}" type="${type}" placeholder="${ph}" ${extra}></div>`;
}
function selField(id, labelKey, opts) {
  return `<div class="fg"><label>${t(labelKey)}</label><select id="f-${id}">${Object.entries(opts).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select></div>`;
}

function buildForm() {
  $('#form').innerHTML =
    field('name','lblName','text','Acme Wireless Headphones', true) +
    field('brand','lblBrand','text','Acme') +
    selField('cond','lblCond', COND) +
    field('desc','lblDesc','text','Over-ear noise cancelling Bluetooth headphones.', true) +
    field('img','lblImg','text','https://example.com/headphones.jpg') +
    field('sku','lblSku','text','ACM-WH-001') +
    field('price','lblPrice','number','129.99', false,'step="0.01"') +
    field('currency','lblCurrency','text','USD') +
    selField('avail','lblAvail', AVAIL) +
    field('url','lblUrl','text','https://example.com/headphones') +
    field('seller','lblSeller','text','Acme Store') +
    field('cat','lblCat','text','Electronics > Audio') +
    field('color','lblColor','text','Black') +
    field('valid','lblValid','date') +
    field('rating','lblRating','number','4.5', false,'step="0.1" min="0" max="5"') +
    field('reviews','lblReviews','number','217');
}

function hl(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      let c='gz-num'; if(/^"/.test(m)) c=/:$/.test(m)?'gz-key':'gz-str'; else if(/true|false/.test(m)) c='gz-bool';
      return `<span class="${c}">${m}</span>`;
    });
}

function gen() {
  const v = id => (document.getElementById('f-'+id)||{}).value || '';
  const data = { "@context":"https://schema.org", "@type":"Product", "name": v('name') };
  if (v('brand')) data.brand = { "@type":"Brand", name: v('brand') };
  if (v('desc')) data.description = v('desc');
  if (v('sku')) data.sku = v('sku');
  if (v('mpn')) data.mpn = v('mpn');
  if (v('cat')) data.category = v('cat');
  if (v('color')) data.color = v('color');
  if (v('img')) data.image = v('img');
  if (v('price')) {
    const offer = { "@type":"Offer", price: parseFloat(v('price')) };
    if (v('currency')) offer.priceCurrency = v('currency');
    offer.availability = `https://schema.org/${v('avail') || 'InStock'}`;
    offer.itemCondition = `https://schema.org/${v('cond') || 'NewCondition'}`;
    if (v('url')) offer.url = v('url');
    if (v('seller')) offer.seller = { "@type":"Organization", name: v('seller') };
    if (v('valid')) offer.priceValidUntil = v('valid');
    data.offers = offer;
  }
  if (v('rating') && v('reviews')) data.aggregateRating = { "@type":"AggregateRating", ratingValue: parseFloat(v('rating')), reviewCount: parseInt(v('reviews')) };
  $('#output').innerHTML = hl(JSON.stringify(data, null, 2));
  $('#status').innerHTML = `<span style="color:var(--gz-success);font-size:.85em">✓ ${Object.keys(data).length} fields</span>`;
}

function example() {
  const set = (id,val) => { const e=document.getElementById('f-'+id); if(e) e.value=val; };
  set('name','Aurora Smart LED Bulb (4-Pack)');
  set('brand','Aurora');
  set('desc','Wi-Fi tunable white smart bulbs, no hub required, works with voice assistants.');
  set('img','https://example.com/aurora-bulb.jpg');
  set('sku','AUR-LED-4PK');
  set('price','34.99');
  set('currency','USD');
  set('url','https://example.com/aurora-bulb');
  set('seller','Aurora Home');
  set('cat','Home Improvement > Lighting > Light Bulbs');
  set('color','White');
  set('rating','4.7');
  set('reviews','1543');
  document.getElementById('f-avail').value = 'InStock';
  document.getElementById('f-cond').value = 'NewCondition';
  gen();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="gen()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="example()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.querySelectorAll('#form input').forEach(i=>i.value='');gen()">${t('clear')}</button>`;
$('#form').addEventListener('input', gen);

buildForm();
GZ.renderToolPage({
  category: 'seo',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'❓', href:'/seo/faq-schema-generator.html', name:'FAQ Schema Generator'},
    {icon:'⭐', href:'/seo/review-schema-generator.html', name:'Review Schema Generator'},
    {icon:'🏪', href:'/seo/local-business-schema-generator.html', name:'Local Business Schema'},
    {icon:'📋', href:'/seo/howto-schema-generator.html', name:'HowTo Schema Generator'},
  ]
});
example();
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
