<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-grid-controls" id="controls"></div>
    <div class="gz-grid-preview">
      <div class="gz-grid-container" id="gridPreview"></div>
    </div>
    <div class="gz-code-output" id="codeOutput"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Grid Generator',
    toolDesc: 'Design CSS Grid layouts visually. Set columns, rows, gaps and item sizes with live preview and instant code output.',
    columns: 'Columns',
    rows: 'Rows',
    gap: 'Gap',
    colTemplate: 'Column Sizes',
    rowTemplate: 'Row Sizes',
    copyCode: 'Copy CSS',
    reset: 'Reset',
    copied: 'Copied!',
    step1: 'Set the number of columns and rows for your grid',
    step2: 'Adjust the gap between grid items',
    step3: 'Customize column and row sizes (fr, px, %, auto)',
    step4: 'Copy the generated CSS code into your project',
  },
  zh: {
    toolTitle: 'CSS Grid 生成器',
    toolDesc: '可视化设计 CSS Grid 布局。设置列、行、间距和尺寸，实时预览并即时输出代码。',
    columns: '列数',
    rows: '行数',
    gap: '间距',
    colTemplate: '列宽设置',
    rowTemplate: '行高设置',
    copyCode: '复制 CSS',
    reset: '重置',
    copied: '已复制！',
    step1: '设置网格的列数和行数',
    step2: '调整网格项之间的间距',
    step3: '自定义列宽和行高（fr、px、%、auto）',
    step4: '将生成的 CSS 代码复制到你的项目中',
  }
});

const { $, copyText, t } = GZ;
let cols = 3, rows = 2, gap = 16;
let colSizes = ['1fr','1fr','1fr'];
let rowSizes = ['auto','auto'];

function renderControls() {
  $('#controls').innerHTML = `
    <label>${t('columns')}<input type="range" min="1" max="12" value="${cols}" oninput="cols=+this.value;syncSizes();update()"><span>${cols}</span></label>
    <label>${t('rows')}<input type="range" min="1" max="12" value="${rows}" oninput="rows=+this.value;syncSizes();update()"><span>${rows}</span></label>
    <label>${t('gap')}<input type="range" min="0" max="60" value="${gap}" oninput="gap=+this.value;update()"><span>${gap}px</span></label>
    <label>${t('colTemplate')}<div class="gz-col-inputs" id="colInputs">${colSizes.map((s,i)=>`<input type="text" value="${s}" data-idx="${i}" onchange="colSizes[${i}]=this.value;update()">`).join('')}</div></label>
    <label>${t('rowTemplate')}<div class="gz-col-inputs" id="rowInputs">${rowSizes.map((s,i)=>`<input type="text" value="${s}" data-idx="${i}" onchange="rowSizes[${i}]=this.value;update()">`).join('')}</div></label>
  `;
}

function syncSizes() {
  while (colSizes.length < cols) colSizes.push('1fr');
  colSizes.length = cols;
  while (rowSizes.length < rows) rowSizes.push('auto');
  rowSizes.length = rows;
  renderControls();
}

function update() {
  const grid = $('#gridPreview');
  const colT = colSizes.slice(0,cols).join(' ');
  const rowT = rowSizes.slice(0,rows).join(' ');
  grid.style.gridTemplateColumns = colT;
  grid.style.gridTemplateRows = rowT;
  grid.style.gap = gap + 'px';
  const total = cols * rows;
  grid.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const item = document.createElement('div');
    item.className = 'gz-grid-item';
    item.innerHTML = `<span>${i+1}</span>`;
    grid.appendChild(item);
  }
  const css = `.grid-container {\n  display: grid;\n  grid-template-columns: ${colT};\n  grid-template-rows: ${rowT};\n  gap: ${gap}px;\n}`;
  $('#codeOutput').textContent = css;
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#codeOutput').textContent)">${t('copyCode')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="cols=3;rows=2;gap=16;colSizes=['1fr','1fr','1fr'];rowSizes=['auto','auto'];renderControls();update()">${t('reset')}</button>`;

renderControls();
update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/css-tools/flexbox.html', name:'Flexbox'},
    {icon:'🌈', href:'/css-tools/gradient.html', name:'Gradient'},
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
    {icon:'🔲', href:'/css-tools/text-shadow.html', name:'Text Shadow'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
