<script>
GZI18n.register({
  en:{
    toolTitle:'Average Calculator',
    toolDesc:'Calculate the average (mean) of any list of numbers instantly — plus median, mode, sum, range, min and max. Supports weighted average. Free, accurate and 100% in your browser.',
    modeSimple:'Simple Average',
    modeWeighted:'Weighted Average',
    calc:'Calculate',
    copy:'Copy Result',
    clear:'Clear',
    example:'Example',
    hintSimple:'Enter numbers separated by commas, spaces or new lines. e.g. 12, 18, 25, 30, 15',
    hintWeighted:'Enter value,weight per line. e.g. 85,2 then 90,3 then 78,1',
    mean:'Average (Mean)',
    weightedAvg:'Weighted Average',
    median:'Median',
    mode:'Mode',
    sum:'Sum',
    count:'Count',
    min:'Minimum',
    max:'Maximum',
    range:'Range',
    noMode:'No mode',
    errEmpty:'Please enter at least one number',
    errNum:'Please enter valid numbers',
    errWeight:'Use value,weight per line (weight must be a number)',
    copied:'Result copied!',
    step1:'Type or paste your numbers, separated by commas, spaces or new lines',
    step2:'Pick Simple Average for a plain mean, or Weighted Average for value,weight pairs',
    step3:'Click Calculate to see the mean, median, mode, sum and range',
    step4:'Use Copy Result to save the answer to your clipboard',
  },
  zh:{
    toolTitle:'平均值计算器',
    toolDesc:'即时计算任意一组数字的平均值（均值），并显示中位数、众数、总和、极差、最小值和最大值。支持加权平均。免费、准确、100% 浏览器本地运行。',
    modeSimple:'普通平均',
    modeWeighted:'加权平均',
    calc:'计算',
    copy:'复制结果',
    clear:'清除',
    example:'示例',
    hintSimple:'输入数字，用逗号、空格或换行分隔，例如 12, 18, 25, 30, 15',
    hintWeighted:'每行输入 数值,权重，例如 85,2 然后 90,3 然后 78,1',
    mean:'平均值（均值）',
    weightedAvg:'加权平均值',
    median:'中位数',
    mode:'众数',
    sum:'总和',
    count:'个数',
    min:'最小值',
    max:'最大值',
    range:'极差',
    noMode:'无众数',
    errEmpty:'请至少输入一个数字',
    errNum:'请输入有效的数字',
    errWeight:'每行使用 数值,权重 格式（权重必须是数字）',
    copied:'结果已复制！',
    step1:'输入或粘贴数字，用逗号、空格或换行分隔',
    step2:'选择「普通平均」求均值，或「加权平均」处理 数值,权重',
    step3:'点击「计算」查看均值、中位数、众数、总和与极差',
    step4:'点击「复制结果」将答案保存到剪贴板',
  }
});
const {$,t,copyText}=GZ;
let mode='simple';
const fmt=n=>{if(!isFinite(n))return '—';const r=Math.round(n*1e6)/1e6;if(Math.abs(r)>=1e15)return n.toExponential(4);return r;};

function setMode(m){mode=m;$('#modeBtns').querySelectorAll('button').forEach((b,i)=>{b.classList.toggle('gz-btn',i===(m==='simple'?0:1));b.classList.toggle('gz-btn-secondary',i!==(m==='simple'?0:1));});$('#hint').textContent=t(m==='simple'?'hintSimple':'hintWeighted');calc();}
$('#modeBtns').innerHTML=`<button class="gz-btn" onclick="setMode('simple')">${t('modeSimple')}</button><button class="gz-btn gz-btn-secondary" onclick="setMode('weighted')">${t('modeWeighted')}</button>`;

function parseLine(s){return s.split(/[,\s]+/).map(x=>x.trim()).filter(x=>x.length);}
function getMedian(a){const s=[...a].sort((x,y)=>x-y);const n=s.length;return n%2?s[(n-1)/2]:(s[n/2-1]+s[n/2])/2;}
function getMode(a){
  const c={};let best=[],bestN=0;
  a.forEach(v=>{c[v]=(c[v]||0)+1;if(c[v]>bestN){bestN=c[v];best=[v];}else if(c[v]===bestN){best.push(v);}});
  if(bestN<2)return null;
  const uniq=[...new Set(best)];
  return uniq.length>10?'multiple':uniq.join(', ');
}

function calc(){
  const raw=$('#nums').value.trim();
  $('#err').textContent='';
  if(!raw){$('#result').style.display='none';$('#grid').innerHTML='';return;}
  let cells={};
  try{
    if(mode==='simple'){
      const nums=parseLine(raw).map(Number);
      if(!nums.length||nums.some(n=>!isFinite(n)))throw new Error(t('errNum'));
      const sum=nums.reduce((a,b)=>a+b,0);
      const avg=sum/nums.length;
      cells={[t('mean')]:fmt(avg),[t('median')]:fmt(getMedian(nums)),[t('mode')]:(getMode(nums)||t('noMode')),[t('sum')]:fmt(sum),[t('count')]:nums.length,[t('min')]:fmt(Math.min(...nums)),[t('max')]:fmt(Math.max(...nums)),[t('range')]:fmt(Math.max(...nums)-Math.min(...nums))};
      $('#reslbl').textContent=t('mean');
      $('#big').textContent=fmt(avg);
    } else {
      const lines=raw.split(/\n+/).map(l=>l.trim()).filter(Boolean);
      let wsum=0,wtot=0,count=0,vals=[];
      lines.forEach(l=>{
        const parts=parseLine(l);
        if(parts.length<2)throw new Error(t('errWeight'));
        const v=Number(parts[0]),w=Number(parts[1]);
        if(!isFinite(v)||!isFinite(w))throw new Error(t('errWeight'));
        wsum+=v*w;wtot+=w;count++;vals.push(v);
      });
      if(!wtot)throw new Error(t('errWeight'));
      const avg=wsum/wtot;
      cells={[t('weightedAvg')]:fmt(avg),[t('sum')]:fmt(vals.reduce((a,b)=>a+b,0)),[t('count')]:count,[t('median')]:fmt(getMedian(vals)),[t('min')]:fmt(Math.min(...vals)),[t('max')]:fmt(Math.max(...vals))};
      $('#reslbl').textContent=t('weightedAvg');
      $('#big').textContent=fmt(avg);
    }
  }catch(e){$('#err').textContent=e.message;$('#result').style.display='none';$('#grid').innerHTML='';return;}
  $('#result').style.display='block';
  $('#grid').innerHTML=Object.entries(cells).map(([k,v])=>`<div class="av-cell"><div class="v">${v}</div><div class="k">${k}</div></div>`).join('');
}

function copyResult(){const v=$('#big').textContent;if(v){copyText(v);GZ.showToast(t('copied'));}}
function loadExample(){$('#nums').value=mode==='weighted'?'85,2\n90,3\n78,1\n92,4':'12, 18, 25, 30, 15, 22, 18';calc();}

$('#toolbar').innerHTML=`<button class="gz-btn" onclick="calc()">🧮 ${t('calc')}</button><button class="gz-btn gz-btn-secondary" onclick="copyResult()">${t('copy')}</button><button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button><button class="gz-btn gz-btn-secondary" onclick="$('#nums').value=\'\';calc()">${t('clear')}</button>`;
$('#nums').addEventListener('input',calc);

GZ.renderToolPage({category:'calc',titleKey:'toolTitle',descKey:'toolDesc',howToSteps:['step1','step2','step3','step4'],related:[
  {icon:'%',href:'/calc/percentage-calculator.html',name:'Percentage Calculator'},
  {icon:'⚖️',href:'/calc/proportion-calculator.html',name:'Proportion Calculator'},
  {icon:'📊',href:'/calc/statistics-calculator.html',name:'Statistics Calculator'},
  {icon:'🔢',href:'/calc/factorial-calculator.html',name:'Factorial Calculator'},
]});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
