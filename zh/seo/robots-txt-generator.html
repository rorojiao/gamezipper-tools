<script>
GZI18n.register({
  en: {
    toolTitle: 'Robots.txt Generator',
    toolDesc: 'Create a robots.txt file for your website — allow or block search engines and AI crawlers like GPTBot, ClaudeBot and Google-Extended. Set crawl-delay, add your sitemap URL, then copy or download. Free, browser-only.',
    cardGeneral: 'General Settings',
    cardBots: 'Crawler Rules',
    lbSitemap: 'Sitemap URL',
    lbDelay: 'Crawl-delay (seconds, 0 = none)',
    lbDefault: 'Default rule for all bots',
    lbDisall: 'Path to disallow for everyone',
    optAllow: 'Allow all (Disallow: empty)',
    optDisallow: 'Disallow all (Disallow: /)',
    allow: 'Allow', disallow: 'Disallow', inherit: 'Inherit',
    pathHint: 'path',
    btnCopy: 'Copy', btnDownload: 'Download .txt', btnReset: 'Reset',
    step1: 'Set your sitemap URL and a default rule for all crawlers',
    step2: 'For each bot choose Allow, Disallow, or Inherit (use the default)',
    step3: 'Optionally add a path to disallow for every bot',
    step4: 'Copy or download the generated robots.txt and upload it to your site root',
  },
  zh: {
    toolTitle: 'robots.txt 生成器',
    toolDesc: '为你的网站生成 robots.txt — 允许或屏蔽搜索引擎和 AI 爬虫（GPTBot、ClaudeBot、Google-Extended 等）。可设置抓取延迟、添加 sitemap，并复制或下载。免费、浏览器本地运行。',
    cardGeneral: '通用设置',
    cardBots: '爬虫规则',
    lbSitemap: 'Sitemap URL',
    lbDelay: '抓取延迟（秒，0 = 不设置）',
    lbDefault: '所有爬虫的默认规则',
    lbDisall: '所有爬虫禁止访问的路径',
    optAllow: '全部允许（Disallow: 为空）',
    optDisallow: '全部禁止（Disallow: /）',
    allow: '允许', disallow: '禁止', inherit: '继承默认',
    pathHint: '路径',
    btnCopy: '复制', btnDownload: '下载 .txt', btnReset: '重置',
    step1: '设置 Sitemap URL 和所有爬虫的默认规则',
    step2: '为每个爬虫选择允许、禁止或继承默认',
    step3: '可选：为所有爬虫设置禁止访问的路径',
    step4: '复制或下载生成的 robots.txt，上传到网站根目录',
  }
});

const { $, t, copyText } = GZ;

const BOTS = [
  { ua: '*', label: 'All crawlers (default)', sub: 'Applies to every bot without a specific rule' },
  { ua: 'Googlebot', label: 'Googlebot', sub: 'Google web search' },
  { ua: 'Bingbot', label: 'Bingbot', sub: 'Microsoft Bing' },
  { ua: 'DuckDuckBot', label: 'DuckDuckBot', sub: 'DuckDuckGo' },
  { ua: 'Baiduspider', label: 'Baiduspider', sub: 'Baidu (百度)' },
  { ua: 'YandexBot', label: 'YandexBot', sub: 'Yandex (俄罗斯)' },
  { ua: 'Slurp', label: 'Slurp', sub: 'Yahoo' },
  { ua: 'Applebot', label: 'Applebot', sub: 'Apple / Siri' },
  { ua: 'GPTBot', label: 'GPTBot', sub: 'OpenAI ChatGPT crawler' },
  { ua: 'Google-Extended', label: 'Google-Extended', sub: 'Google Gemini training data' },
  { ua: 'ClaudeBot', label: 'ClaudeBot', sub: 'Anthropic Claude' },
  { ua: 'CCBot', label: 'CCBot', sub: 'Common Crawl' },
  { ua: 'PerplexityBot', label: 'PerplexityBot', sub: 'Perplexity AI' },
  { ua: 'Bytespider', label: 'Bytespider', sub: 'ByteDance / TikTok' },
  { ua: 'Sogou', label: 'Sogou', sub: 'Sogou (搜狗)' },
  { ua: 'facebookexternalhit', label: 'facebookexternalhit', sub: 'Facebook / Meta' },
];

let rules = {}; // ua -> 'allow' | 'disallow' | 'inherit'
BOTS.forEach(b => { rules[b.ua] = b.ua === '*' ? 'allow' : 'inherit'; });

function renderBotList() {
  const list = $('#bot-list');
  list.innerHTML = '';
  BOTS.forEach(b => {
    const div = document.createElement('div');
    div.className = 'rb-rule';
    div.innerHTML = `
      <div class="name">${b.label}<small>${b.sub}</small></div>
      <select data-ua="${b.ua}">
        <option value="inherit" ${rules[b.ua]==='inherit'?'selected':''}>${t('inherit')}</option>
        <option value="allow" ${rules[b.ua]==='allow'?'selected':''}>${t('allow')}</option>
        <option value="disallow" ${rules[b.ua]==='disallow'?'selected':''}>${t('disallow')}</option>
      </select>`;
    list.appendChild(div);
  });
  list.querySelectorAll('select').forEach(sel => {
    sel.addEventListener('change', e => {
      rules[e.target.dataset.ua] = e.target.value;
      generate();
    });
  });
}

function effectiveAction(ua) {
  const r = rules[ua] || 'inherit';
  if (r !== 'inherit') return r;
  return rules['*'] || 'allow';
}

function generate() {
  const sitemap = $('#sitemap').value.trim();
  const delay = Math.max(0, Math.min(60, parseInt($('#delay').value) || 0));
  const def = $('#defaultAction').value;
  const disallPath = $('#disallPath').value.trim();
  rules['*'] = def;

  const lines = ['# robots.txt — generated by tools.gamezipper.com', ''];

  // Group by effective action to keep things clean, but always emit User-agent blocks
  // for crawlers with explicit rule overrides first, then the wildcard block last.
  const explicit = BOTS.filter(b => b.ua !== '*' && rules[b.ua] !== 'inherit');
  const star = BOTS.find(b => b.ua === '*');

  [...explicit, star].forEach((b, idx) => {
    const action = effectiveAction(b.ua);
    lines.push('User-agent: ' + b.ua);
    if (action === 'disallow') {
      lines.push('Disallow: /');
    } else {
      lines.push('Disallow:');
    }
    if (delay > 0) lines.push('Crawl-delay: ' + delay);
    if (b.ua === '*' && disallPath) {
      // Replace Disallow: empty with the path for everyone
      const i = lines.lastIndexOf('Disallow:', lines.length);
      lines[i] = 'Disallow: ' + disallPath;
    }
    lines.push('');
  });

  if (sitemap) {
    lines.push('Sitemap: ' + sitemap);
    lines.push('');
  }

  $('#output').textContent = lines.join('\n').trim() + '\n';
}

function resetAll() {
  BOTS.forEach(b => { rules[b.ua] = b.ua === '*' ? 'allow' : 'inherit'; });
  $('#sitemap').value = '';
  $('#delay').value = '0';
  $('#defaultAction').value = 'allow';
  $('#disallPath').value = '';
  renderBotList();
  generate();
}

// Labels
['card-general','card-general'].forEach(() => {});
$('#card-general').textContent = t('cardGeneral');
$('#card-bots').textContent = t('cardBots');
$('#lb-sitemap').textContent = t('lbSitemap');
$('#lb-delay').textContent = t('lbDelay');
$('#lb-default').textContent = t('lbDefault');
$('#lb-disall').textContent = t('lbDisall');
$('#opt-allow').textContent = t('optAllow');
$('#opt-disallow').textContent = t('optDisallow');
$('#btn-copy').textContent = t('btnCopy');
$('#btn-download').textContent = t('btnDownload');
$('#btn-reset').textContent = t('btnReset');

['sitemap','delay','defaultAction','disallPath'].forEach(id => {
  $('#' + id).addEventListener('input', generate);
});

$('#btn-copy').addEventListener('click', () => copyText($('#output').textContent));
$('#btn-reset').addEventListener('click', resetAll);
$('#btn-download').addEventListener('click', () => {
  const blob = new Blob([$('#output').textContent], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'robots.txt';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

renderBotList();
generate();

GZ.renderToolPage({
  category: 'seo',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🤖', href:'/seo/robots-txt-validator.html', name:'Robots.txt Validator'},
    {icon:'🗺️', href:'/dev/sitemap-generator.html', name:'Sitemap Generator'},
    {icon:'📄', href:'/seo/meta-tag-generator.html', name:'Meta Tag Generator'},
    {icon:'🏷️', href:'/seo/canonical-tag-generator.html', name:'Canonical Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
