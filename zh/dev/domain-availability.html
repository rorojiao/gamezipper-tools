<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="search-row">
      <input type="text" id="domainInput" placeholder="example.com" spellcheck="false">
      <button class="gz-btn" id="checkBtn" onclick="checkDomain()"></button>
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap">

        <option value="popular">Popular TLDs</option>
        <option value="all">All TLDs</option>
        <option value="custom">Custom</option>
      </select>
      <input type="text" id="customTlds" placeholder=".com, .net, .org" style="display:none;background:var(--glass2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px;font-size:.85rem;width:200px">
    </div>

      <label id="bulkLabel" style="font-size:.9rem;font-weight:600;display:block;margin-bottom:8px"></label>
      <textarea id="bulkInput" class="bulk-input" placeholder="example.com&#10;myproject.io&#10;coolname.dev"></textarea>
      <button class="gz-btn gz-btn-secondary" id="bulkBtn" onclick="checkBulk()" style="margin-top:8px"></button>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Domain Availability Checker',
    toolDesc: 'Check if a domain name is available for registration. Look up .com, .net, .org, .io and other TLDs via RDAP — free and instant.',
    checkBtn: '🔍 Check',
    tldLabel: 'TLDs:',
    available: 'Likely Available',
    taken: 'Taken',
    checking: 'Checking…',
    error: 'Error',
    registrar: 'Registrar',
    expires: 'Expires',
    registered: 'Registered',
    daysAgo: 'days ago',
    popularTlds: 'Popular TLDs',
    bulkLabel: 'Bulk Check (one domain per line)',
    bulkBtn: 'Check All',
    results: 'results',
    step1: 'Enter a domain name (e.g. myproject.com)',
    step2: 'Select which TLDs to check',
    step3: 'Click "Check" to query RDAP for each TLD',
    step4: 'Review availability status and registration details',
  },
  zh: {
    toolTitle: '域名可用性查询',
    toolDesc: '查询域名是否可以注册。支持 .com、.net、.org、.io 等多种后缀，通过 RDAP 即时查询 — 免费在线工具。',
    checkBtn: '🔍 查询',
    tldLabel: '域名后缀：',
    available: '可能可用',
    taken: '已注册',
    checking: '查询中…',
    error: '查询失败',
    registrar: '注册商',
    expires: '到期时间',
    registered: '注册时间',
    daysAgo: '天前',
    popularTlds: '热门后缀',
    bulkLabel: '批量查询（每行一个域名）',
    bulkBtn: '查询全部',
    results: '条结果',
    step1: '输入域名（如 myproject.com）',
    step2: '选择要查询的域名后缀',
    step3: '点击「查询」通过 RDAP 查询每个后缀',
    step4: '查看可用性状态和注册详情',
  }
});

const { $, t } = GZ;

const POPULAR_TLDS = ['com','net','org','io','dev','app','co','info','me','xyz','tech','ai','cc','tv','us'];
const ALL_TLDS = [...POPULAR_TLDS,'uk','de','fr','eu','cn','jp','in','ca','au','ru','br','es','it','nl','se','no','ch','be','at','dk','pl','cz','fi','ie','pt','nz','sg','hk','tw','kr','za','mx','ar','cl','pe','co.uk','com.au','co.jp','co.in','com.br','com.mx','studio','design','shop','store','online','site','live','world','space','link','click','top','fun','app','dev'];

$('#checkBtn').textContent = t('checkBtn');
$('#tldLabel').textContent = t('tldLabel');
$('#bulkLabel').textContent = t('bulkLabel');
$('#bulkBtn').textContent = t('bulkBtn');

$('#domainInput').addEventListener('keydown', e => { if(e.key === 'Enter') checkDomain(); });
$('#tldSelect').addEventListener('change', () => {
  $('#customTlds').style.display = $('#tldSelect').value === 'custom' ? 'inline-block' : 'none';
});

function updatePlaceholder() {
  const ph = $('#tldSelect').value === 'custom' ? 'example' : 'example.com';
  $('#domainInput').placeholder = ph;
}

function getTlds() {
  const sel = $('#tldSelect').value;
  if(sel === 'popular') return POPULAR_TLDS;
  if(sel === 'all') return ALL_TLDS;
  const custom = $('#customTlds').value.trim();
  if(!custom) return POPULAR_TLDS;
  return custom.split(',').map(s => s.trim().replace(/^\./, '')).filter(Boolean);
}

function extractDomain(input) {
  let d = input.trim().toLowerCase();
  // Remove protocol
  d = d.replace(/^https?:\/\//, '');
  // Remove path
  d = d.split('/')[0];
  return d;
}

async function checkSingleDomain(domain) {
  const rdapUrl = `https://rdap.org/domain/${encodeURIComponent(domain)}`;
  try {
    const res = await fetch(rdapUrl, { signal: AbortSignal.timeout(8000) });
    if(res.status === 404) {
      return { status: 'available' };
    }
    const data = await res.json();
    const events = data.events || [];
    const regDate = events.find(e => e.eventAction === 'registration')?.eventDate;
    const expDate = events.find(e => e.eventAction === 'expiration')?.eventDate;
    const registrar = (data.entities || []).find(e => e.roles?.includes('registrar'))?.vcardArray?.[1]?.find(v => v[0] === 'fn')?.[3] || '';
    return {
      status: 'taken',
      registrar,
      registered: regDate ? new Date(regDate).toLocaleDateString() : '',
      expires: expDate ? new Date(expDate).toLocaleDateString() : '',
      ldhName: data.ldhName || domain,
    };
  } catch(e) {
    // If DNS lookup fails or CORS, try a secondary approach - just report error
    return { status: 'error', error: e.message };
  }
}

function createCard(domain, result) {
  const card = document.createElement('div');
  card.className = `tld-card ${result.status}`;
  let statusText = '';
  let dotClass = result.status;
  let details = '';

  if(result.status === 'available') {
    statusText = `✅ ${t('available')}`;
  } else if(result.status === 'taken') {
    statusText = `🔴 ${t('taken')}`;
    if(result.registrar) details += `${t('registrar')}: ${result.registrar} · `;
    if(result.registered) details += `${t('registered')}: ${result.registered} · `;
    if(result.expires) details += `${t('expires')}: ${result.expires}`;
  } else {
    statusText = `⚠️ ${t('error')}`;
    dotClass = 'checking';
  }

  card.innerHTML = `
    <div class="dot ${dotClass}"></div>
    <div class="info">
      <div class="domain">${domain}</div>
      <div class="status">${statusText}</div>
      ${details ? `<div class="details">${details}</div>` : ''}
    </div>
  `;
  return card;
}

async function checkDomain() {
  const raw = $('#domainInput').value.trim();
  if(!raw) return;

  const resultsEl = $('#results');
  const summaryEl = $('#summary');
  resultsEl.innerHTML = '';
  summaryEl.innerHTML = '';

  const tlds = getTlds();
  let baseName = extractDomain(raw);
  // If user typed full domain with TLD, extract just the name
  const parts = baseName.split('.');
  if(parts.length >= 2) {
    baseName = parts.slice(0, -1).join('.');
    // If using custom, just check the full domain
    if($('#tldSelect').value === 'custom') {
      tlds.length = 0;
      tlds.push(parts.slice(-1)[0]);
    }
  }

  const domains = tlds.map(tld => `${baseName}.${tld}`);

  // Create placeholder cards
  domains.forEach(d => {
    const card = document.createElement('div');
    card.className = 'tld-card';
    card.id = 'card-' + d.replace(/\./g, '-');
    card.innerHTML = `<div class="dot checking"></div><div class="info"><div class="domain">${d}</div><div class="status">${t('checking')}</div></div>`;
    resultsEl.appendChild(card);
  });

  // Check all domains
  let available = 0, taken = 0, errors = 0;
  const promises = domains.map(async (d, i) => {
    // Stagger requests
    await new Promise(r => setTimeout(r, i * 100));
    const result = await checkSingleDomain(d);
    const oldCard = document.getElementById('card-' + d.replace(/\./g, '-'));
    if(oldCard) {
      const newCard = createCard(d, result);
      oldCard.replaceWith(newCard);
    }
    if(result.status === 'available') available++;
    else if(result.status === 'taken') taken++;
    else errors++;
  });

  await Promise.all(promises);
  summaryEl.innerHTML = `
    <span class="summary-card">✅ ${available} ${t('available')}</span>
    <span class="summary-card">🔴 ${taken} ${t('taken')}</span>
    ${errors ? `<span class="summary-card">⚠️ ${errors} ${t('error')}</span>` : ''}
    <span class="summary-card">${domains.length} ${t('results')}</span>
  `;
}

async function checkBulk() {
  const text = $('#bulkInput').value.trim();
  if(!text) return;
  const domains = text.split('\n').map(d => extractDomain(d)).filter(Boolean);
  if(!domains.length) return;

  const resultsEl = $('#results');
  const summaryEl = $('#summary');
  resultsEl.innerHTML = '';
  summaryEl.innerHTML = '';

  domains.forEach(d => {
    const card = document.createElement('div');
    card.className = 'tld-card';
    card.id = 'card-' + d.replace(/\./g, '-');
    card.innerHTML = `<div class="dot checking"></div><div class="info"><div class="domain">${d}</div><div class="status">${t('checking')}</div></div>`;
    resultsEl.appendChild(card);
  });

  let available = 0, taken = 0, errors = 0;
  for(let i = 0; i < domains.length; i++) {
    const d = domains[i];
    if(i > 0) await new Promise(r => setTimeout(r, 150));
    const result = await checkSingleDomain(d);
    const oldCard = document.getElementById('card-' + d.replace(/\./g, '-'));
    if(oldCard) {
      const newCard = createCard(d, result);
      oldCard.replaceWith(newCard);
    }
    if(result.status === 'available') available++;
    else if(result.status === 'taken') taken++;
    else errors++;
  }

  summaryEl.innerHTML = `
    <span class="summary-card">✅ ${available} ${t('available')}</span>
    <span class="summary-card">🔴 ${taken} ${t('taken')}</span>
    ${errors ? `<span class="summary-card">⚠️ ${errors} ${t('error')}</span>` : ''}
    <span class="summary-card">${domains.length} ${t('results')}</span>
  `;
}

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔍', href:'/dev/whois-lookup.html', name:'WHOIS Lookup'},
    {icon:'📅', href:'/dev/domain-age.html', name:'Domain Age'},
    {icon:'🌐', href:'/dev/ssl-checker.html', name:'SSL Checker'},
    {icon:'🌐', href:'/dev/dns-lookup.html', name:'DNS Lookup'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
