<style>
.rc-grid{display:grid;grid-template-columns:1fr;gap:18px;margin-top:8px}
.rc-card{background:var(--glass,rgba(255,255,255,.04));border:1px solid var(--border,rgba(255,255,255,.1));border-radius:14px;padding:16px}
.rc-row{display:grid;grid-template-columns:1.4fr .9fr .8fr .9fr .8fr 32px;gap:6px;align-items:center;margin-bottom:6px}
.rc-row input,.rc-row select{padding:8px 10px;border-radius:8px;border:1px solid var(--border,#333);background:var(--surface,#1e1e2e);color:var(--text,#eee);font-size:.85rem;width:100%}
.rc-row .rc-del{background:transparent;border:1px solid var(--border,#333);color:var(--text2,#aaa);border-radius:8px;cursor:pointer;height:34px}
.rc-row .rc-cost{font-weight:700;text-align:right;font-variant-numeric:tabular-nums;color:var(--accent,#4ecdc4)}
.rc-head{font-size:.75rem;color:var(--text2,#aaa);text-transform:uppercase;letter-spacing:.5px;display:grid;grid-template-columns:1.4fr .9fr .8fr .9fr .8fr 32px;gap:6px;margin-bottom:6px}
.rc-head span{text-align:center}
.rc-head span:first-child,.rc-head span:nth-child(5){text-align:left}
.rc-add{padding:9px 18px;border-radius:9px;border:1px dashed var(--border,#444);background:transparent;color:var(--accent,#4ecdc4);cursor:pointer;font-size:.85rem;margin-top:4px}
.rc-add:hover{background:rgba(78,205,196,.08)}
.rc-options{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border,rgba(255,255,255,.08))}
.rc-options label{display:flex;flex-direction:column;gap:4px;font-size:.8rem;color:var(--text2,#aaa)}
.rc-options input,.rc-options select{padding:9px;border-radius:8px;border:1px solid var(--border,#333);background:var(--surface,#1e1e2e);color:var(--text,#eee);font-size:.9rem}
.rc-results{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.rc-stat{background:var(--glass2,rgba(255,255,255,.02));border:1px solid var(--border,rgba(255,255,255,.1));border-radius:12px;padding:16px;text-align:center}
.rc-stat .v{font-size:1.8rem;font-weight:800;color:var(--accent,#4ecdc4);font-variant-numeric:tabular-nums}
.rc-stat .l{font-size:.8rem;color:var(--text2,#aaa);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.rc-stat.profit .v{color:#66bb6a}
.rc-stat.target .v{color:#ffb74d}
.rc-currency-row{display:flex;gap:10px;align-items:center;justify-content:flex-end;margin-bottom:8px;font-size:.85rem;color:var(--text2,#aaa)}
.rc-toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
@media(max-width:600px){
  .rc-row,.rc-head{grid-template-columns:1.4fr .8fr .8fr 32px;gap:5px}
  .rc-row .rc-ppu,.rc-row .rc-qtypkg,.rc-head .h-ppu,.rc-head .h-qtypkg{display:none}
  .rc-options{grid-template-columns:1fr}
}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Recipe Cost Calculator","description":"Free recipe cost calculator — add ingredients with package size, price and quantity used to find the exact cost per dish and per serving. Runs in your browser, no signup.","url":"https://tools.gamezipper.com/calc/recipe-cost-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I calculate the cost of a recipe?","acceptedAnswer":{"@type":"Answer","text":"For each ingredient, divide the package price by the package size to get the price per unit, then multiply by the quantity you use in the recipe. Add up all ingredient costs for the total recipe cost, then divide by the number of servings for the per-serving cost."}},{"@type":"Question","name":"What units does the recipe cost calculator support?","acceptedAnswer":{"@type":"Answer","text":"You can use any consistent unit — grams, kilograms, ounces, pounds, milliliters, liters, cups, pieces or units. Just make sure the package size and quantity use the same unit so the math cancels out correctly."}},{"@type":"Question","name":"Can I factor in overhead, labor and profit margin?","acceptedAnswer":{"@type":"Answer","text":"Yes. After totaling ingredient costs you can add a fixed overhead per batch, a labor cost, and a target profit margin. The calculator shows your suggested selling price per serving and the profit per dish."}},{"@type":"Question","name":"Is my recipe data saved or uploaded?","acceptedAnswer":{"@type":"Answer","text":"No. Everything runs in your browser. Your ingredients and settings are stored locally so you can come back later, but nothing is uploaded to any server."}},{"@type":"Question","name":"How do I price baked goods for a bakery?","acceptedAnswer":{"@type":"Answer","text":"A common rule is food cost of 25-35% of selling price. Enter all ingredients, then set a target margin of 65-75%. The calculator shows the suggested retail price per serving based on that target."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="rc-toolbar">
      <button class="gz-btn" id="btnPrint"></button>
      <button class="gz-btn gz-btn-secondary" id="btnSample"></button>
      <button class="gz-btn gz-btn-secondary" id="btnClear"></button>
    </div>
    <div class="rc-grid">
      <div class="rc-card">
        <div class="rc-currency-row">
          <span id="curLbl"></span>
          <select id="currency" style="padding:6px 10px;border-radius:7px;border:1px solid var(--border,#333);background:var(--surface,#1e1e2e);color:var(--text,#eee);font-size:.85rem"></select>
        </div>
        <div class="rc-head">
          <span id="hName"></span>
          <span id="hPkg"></span>
          <span class="h-ppu" id="hPpu"></span>
          <span id="hUsed"></span>
          <span class="h-qtypkg" id="hQty"></span>
          <span></span>
        </div>
        <div id="rows"></div>
        <button class="rc-add" id="btnAdd">+ <span id="addLbl"></span></button>
        <div class="rc-options">
          <label><span id="lblServings"></span><input type="number" id="optServings" min="1" max="999" value="4"></label>
          <label><span id="lblOverhead"></span><input type="number" id="optOverhead" min="0" step="0.01" value="0"></label>
          <label><span id="lblMargin"></span><input type="number" id="optMargin" min="0" max="500" step="1" value="0"></label>
        </div>
      </div>
      <div class="rc-results" id="results"></div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Recipe Cost Calculator',
    toolDesc: 'Find the exact cost of any recipe — enter ingredients with package size and price, set servings, overhead and profit margin. Free, browser-based, no signup.',
    hName: 'Ingredient',
    hPkg: 'Package size',
    hPpu: 'Price / unit',
    hUsed: 'Qty used',
    hQty: 'Cost',
    add: 'Add ingredient',
    curLbl: 'Currency',
    servings: 'Servings per batch',
    overhead: 'Overhead / batch',
    margin: 'Target profit margin (%)',
    namePh: 'e.g. Flour',
    total: 'Total recipe cost',
    perServing: 'Cost per serving',
    sellPrice: 'Suggested price / serving',
    profit: 'Profit per batch',
    foodCostPct: 'Food cost %',
    print: 'Print',
    sample: 'Load sample',
    clear: 'Clear all',
    step1: 'List each ingredient with the package size and how much you paid for it',
    step2: 'Enter how much of it you actually use in the recipe',
    step3: 'Set servings per batch, optional overhead and a target profit margin',
    step4: 'Read total cost, cost per serving and suggested selling price',
  },
  zh: {
    toolTitle: '食谱成本计算器',
    toolDesc: '精确计算任意食谱的成本 — 输入食材的包装规格和价格，设置份数、固定成本和目标利润率。免费、浏览器本地运行、无需注册。',
    hName: '食材',
    hPkg: '包装规格',
    hPpu: '单价',
    hUsed: '用量',
    hQty: '成本',
    add: '添加食材',
    curLbl: '货币',
    servings: '每批份数',
    overhead: '每批固定成本',
    margin: '目标利润率（%）',
    namePh: '如：面粉',
    total: '食谱总成本',
    perServing: '每份成本',
    sellPrice: '建议售价/份',
    profit: '每批利润',
    foodCostPct: '食材占比',
    print: '打印',
    sample: '加载示例',
    clear: '全部清空',
    step1: '列出每种食材的包装规格和购买价格',
    step2: '输入食谱中实际使用的用量',
    step3: '设置每批份数、可选固定成本和目标利润率',
    step4: '查看总成本、每份成本和建议售价',
  }
});

const { $, t } = GZ;

const CURRENCIES = [
  ['USD','$'],['EUR','€'],['GBP','£'],['JPY','¥'],['CNY','¥'],['KRW','₩'],
  ['INR','₹'],['CAD','C$'],['AUD','A$'],['BRL','R$'],['MXN','MX$'],['RUB','₽'],
  ['SGD','S$'],['HKD','HK$'],['NZD','NZ$'],['SEK','kr'],['CHF','Fr'],['ZAR','R'],
];

let CFG = {
  currency: 'USD',
  servings: 4,
  overhead: 0,
  margin: 0,
  ingredients: [
    { name: '', pkg: '', pkgPrice: '', used: '' },
  ],
};
try { const s = localStorage.getItem('gz-recipe'); if (s) { const p = JSON.parse(s); if (Array.isArray(p.ingredients)) Object.assign(CFG, p); } } catch(e) {}

const sym = () => (CURRENCIES.find(c => c[0] === CFG.currency) || ['USD','$'])[1];

function money(n) {
  if (!isFinite(n)) n = 0;
  return sym() + n.toFixed(2);
}

function ingCost(ing) {
  const pkg = parseFloat(ing.pkg);
  const price = parseFloat(ing.pkgPrice);
  const used = parseFloat(ing.used);
  if (!pkg || !price || !used || pkg <= 0) return 0;
  return (price / pkg) * used;
}

function recalc() {
  // Save values from rows back to CFG
  const rows = document.querySelectorAll('#rows .rc-row');
  CFG.ingredients = Array.from(rows).map(r => ({
    name: r.querySelector('.rc-name').value,
    pkg: r.querySelector('.rc-pkg').value,
    pkgPrice: r.querySelector('.rc-ppu').value,
    used: r.querySelector('.rc-used').value,
  }));
  // Update per-row cost display
  rows.forEach((r, i) => {
    r.querySelector('.rc-cost').textContent = money(ingCost(CFG.ingredients[i]));
  });
  // Totals
  const food = CFG.ingredients.reduce((a, ing) => a + ingCost(ing), 0);
  const overhead = parseFloat(CFG.overhead) || 0;
  const total = food + overhead;
  const servings = Math.max(1, parseInt(CFG.servings) || 1);
  const perServ = total / servings;
  const margin = Math.max(0, parseFloat(CFG.margin) || 0);
  const sellPrice = margin > 0 ? perServ / (1 - margin/100) : perServ;
  const profit = (sellPrice * servings) - total;
  const foodPct = sellPrice > 0 ? (perServ / sellPrice * 100) : 0;
  $('#results').innerHTML = `
    <div class="rc-stat"><div class="v">${money(total)}</div><div class="l">${t('total')}</div></div>
    <div class="rc-stat"><div class="v">${money(perServ)}</div><div class="l">${t('perServing')}</div></div>
    <div class="rc-stat target"><div class="v">${money(sellPrice)}</div><div class="l">${t('sellPrice')}</div></div>
    <div class="rc-stat profit"><div class="v">${money(profit)}</div><div class="l">${t('profit')}</div></div>
    <div class="rc-stat"><div class="v">${margin > 0 ? foodPct.toFixed(1) + '%' : '—'}</div><div class="l">${t('foodCostPct')}</div></div>`;
  saveCfg();
}

function saveCfg() { try { localStorage.setItem('gz-recipe', JSON.stringify(CFG)); } catch(e) {} }

function escapeAttr(s){ return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function renderRows() {
  $('#rows').innerHTML = CFG.ingredients.map((ing, i) => `
    <div class="rc-row" data-i="${i}">
      <input class="rc-name" type="text" placeholder="${t('namePh')}" value="${escapeAttr(ing.name)}">
      <input class="rc-pkg" type="number" step="any" min="0" placeholder="500" value="${escapeAttr(ing.pkg)}">
      <input class="rc-ppu" type="number" step="any" min="0" placeholder="2.50" value="${escapeAttr(ing.pkgPrice)}">
      <input class="rc-used" type="number" step="any" min="0" placeholder="250" value="${escapeAttr(ing.used)}">
      <div class="rc-cost">${money(ingCost(ing))}</div>
      <button class="rc-del" title="×">×</button>
    </div>`).join('');
  document.querySelectorAll('#rows .rc-row').forEach(row => {
    row.querySelectorAll('input').forEach(inp => inp.addEventListener('input', recalc));
    row.querySelector('.rc-del').addEventListener('click', () => {
      if (CFG.ingredients.length <= 1) { CFG.ingredients = [{ name:'', pkg:'', pkgPrice:'', used:'' }]; }
      else { CFG.ingredients.splice(+row.dataset.i, 1); }
      renderRows(); recalc();
    });
  });
}

function addRow() {
  CFG.ingredients.push({ name:'', pkg:'', pkgPrice:'', used:'' });
  renderRows(); recalc();
}

function loadSample() {
  CFG = {
    currency: CFG.currency,
    servings: 12,
    overhead: 0.50,
    margin: 65,
    ingredients: [
      { name:'All-purpose flour', pkg:'2500', pkgPrice:'3.20', used:'360' },
      { name:'Butter',            pkg:'454',  pkgPrice:'4.50', used:'227' },
      { name:'Granulated sugar',  pkg:'2000', pkgPrice:'2.40', used:'200' },
      { name:'Eggs',              pkg:'12',   pkgPrice:'4.20', used:'2' },
      { name:'Vanilla extract',   pkg:'60',   pkgPrice:'5.80', used:'5' },
      { name:'Baking powder',     pkg:'170',  pkgPrice:'2.10', used:'5' },
    ],
  };
  syncOpts();
  renderRows(); recalc();
}

function clearAll() {
  CFG.ingredients = [{ name:'', pkg:'', pkgPrice:'', used:'' }];
  CFG.servings = 4; CFG.overhead = 0; CFG.margin = 0;
  syncOpts();
  renderRows(); recalc();
}

function syncOpts() {
  $('#optServings').value = CFG.servings;
  $('#optOverhead').value = CFG.overhead;
  $('#optMargin').value = CFG.margin;
  $('#currency').value = CFG.currency;
}

// Labels
$('#hName').textContent = t('hName');
$('#hPkg').textContent = t('hPkg');
$('#hPpu').textContent = t('hPpu');
$('#hUsed').textContent = t('hUsed');
$('#hQty').textContent = t('hQty');
$('#addLbl').textContent = t('add');
$('#curLbl').textContent = t('curLbl');
$('#lblServings').textContent = t('servings');
$('#lblOverhead').textContent = t('overhead');
$('#lblMargin').textContent = t('margin');
$('#btnPrint').textContent = t('print');
$('#btnSample').textContent = t('sample');
$('#btnClear').textContent = t('clear');

$('#currency').innerHTML = CURRENCIES.map(c => `<option value="${c[0]}">${c[0]} — ${c[1]}</option>`).join('');
$('#currency').value = CFG.currency;

$('#btnAdd').addEventListener('click', addRow);
$('#btnSample').addEventListener('click', loadSample);
$('#btnClear').addEventListener('click', clearAll);
$('#btnPrint').addEventListener('click', () => window.print());
$('#optServings').addEventListener('input', e => { CFG.servings = e.target.value; recalc(); });
$('#optOverhead').addEventListener('input', e => { CFG.overhead = e.target.value; recalc(); });
$('#optMargin').addEventListener('input', e => { CFG.margin = e.target.value; recalc(); });
$('#currency').addEventListener('change', e => { CFG.currency = e.target.value; recalc(); });

syncOpts();
renderRows();
recalc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🍕', href:'/calc/coffee-to-water.html', name:'Coffee to Water Ratio'},
    {icon:'🌮', href:'/convert/cooking-converter.html', name:'Cooking Converter'},
    {icon:'🥗', href:'/calc/calorie-calculator.html', name:'Calorie Calculator'},
    {icon:'🍳', href:'/calc/recipe-scaler.html', name:'Recipe Scaler'},
    {icon:'💵', href:'/calc/tip-calculator.html', name:'Tip Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
