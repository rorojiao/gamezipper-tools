<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How does the accelerometer tester work?","acceptedAnswer":{"@type":"Answer","text":"It uses the browser DeviceMotionEvent API to read your device's built-in accelerometer sensor and display the X, Y, Z acceleration values in real time."}},{"@type":"Question","name":"Does it work on desktop computers?","acceptedAnswer":{"@type":"Answer","text":"Most desktop computers don't have accelerometers, so the tool works best on phones and tablets. On desktop, the sensor will show no data."}},{"@type":"Question","name":"Is my data sent anywhere?","acceptedAnswer":{"@type":"Answer","text":"No. All sensor readings stay in your browser. Nothing is uploaded to any server — 100% private."}},{"@type":"Question","name":"Why do I need to grant permission on iOS?","acceptedAnswer":{"@type":"Answer","text":"iOS 13+ requires explicit user permission before a web page can access motion sensors. Tap the button and allow access to start reading data."}}]}</script>

<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Accelerometer Tester',
    toolDesc: 'Test your phone accelerometer in real time — X/Y/Z acceleration, total G-force, tilt angle and shake detection. 100% in your browser.',
    gforce: 'Total G-Force',
    start: '▶ Start',
    stop: '⏹ Stop',
    permission: '🔑 Grant Permission',
    permMsg: 'iOS Safari requires permission to access motion sensors. Tap the button above to allow access.',
    running: 'Sensor running… move your device!',
    stopped: 'Sensor stopped.',
    notSupported: '⚠ Your device/browser does not support the DeviceMotion API. Try a phone or tablet.',
    shake: '📳 SHAKE DETECTED!',
    step1: 'Open this page on a phone or tablet with a built-in accelerometer',
    step2: 'Tap "Grant Permission" on iOS, or "Start" on Android',
    step3: 'Tilt, rotate and shake your device to see live X/Y/Z values',
    step4: 'Watch the total G-force and shake detection indicator',
  },
  zh: {
    toolTitle: '加速度计测试器',
    toolDesc: '实时测试手机加速度计 — X/Y/Z 轴加速度、总 G 力、倾斜角度和摇晃检测。完全在浏览器中运行。',
    gforce: '总 G 力',
    start: '▶ 开始',
    stop: '⏹ 停止',
    permission: '🔑 授权',
    permMsg: 'iOS Safari 需要授权才能访问运动传感器。请点击上方按钮允许访问。',
    running: '传感器运行中… 移动你的设备！',
    stopped: '传感器已停止。',
    notSupported: '⚠ 你的设备/浏览器不支持 DeviceMotion API。请使用手机或平板。',
    shake: '📳 检测到摇晃！',
    step1: '在带有内置加速度计的手机或平板上打开本页',
    step2: 'iOS 点击「授权」，Android 点击「开始」',
    step3: '倾斜、旋转和摇晃设备，查看实时 X/Y/Z 数值',
    step4: '观察总 G 力和摇晃检测指示器',
  }
});

const { $, t } = GZ;
let running = false;
let history = [];
const MAX_HIST = 200;

const canvas = $('#vis');
const ctx = canvas.getContext('2d');

function resizeCanvas(){ canvas.width = canvas.offsetWidth; canvas.height = 240; }
window.addEventListener('resize', resizeCanvas); resizeCanvas();

function handleMotion(e){
  const acc = e.accelerationIncludingGravity || e.acceleration;
  if(!acc) return;
  const x = acc.x || 0, y = acc.y || 0, z = acc.z || 0;
  $('#x').textContent = x.toFixed(2);
  $('#y').textContent = y.toFixed(2);
  $('#z').textContent = z.toFixed(2);
  const total = Math.sqrt(x*x + y*y + z*z) / 9.81;
  $('#gforce').textContent = total.toFixed(2);
  if(total > 2.5){ $('#shakeAlert').style.display='block'; setTimeout(()=>$('#shakeAlert').style.display='none',800); }
  history.push(total);
  if(history.length > MAX_HIST) history.shift();
  draw();
}

function draw(){
  ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--bg') || '#0a0a1a';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  // grid
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  for(let i=0;i<5;i++){
    const yy = (canvas.height/5)*i;
    ctx.beginPath(); ctx.moveTo(0,yy); ctx.lineTo(canvas.width,yy); ctx.stroke();
  }
  // line
  if(history.length < 2) return;
  const maxV = Math.max(3, ...history);
  ctx.strokeStyle = '#4ecdc4';
  ctx.lineWidth = 2;
  ctx.beginPath();
  history.forEach((v,i)=>{
    const px = (i/(MAX_HIST-1))*canvas.width;
    const py = canvas.height - (v/maxV)*canvas.height*0.9;
    if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  });
  ctx.stroke();
  // fill
  ctx.lineTo(canvas.width,canvas.height); ctx.lineTo(0,canvas.height); ctx.closePath();
  ctx.fillStyle = 'rgba(78,205,196,0.1)'; ctx.fill();
}

async function requestPermission(){
  if(typeof DeviceMotionEvent.requestPermission === 'function'){
    try{
      const r = await DeviceMotionEvent.requestPermission();
      if(r === 'granted'){ start(); } else { $('#status').textContent = 'Permission denied.'; }
    }catch(err){ $('#status').textContent = 'Error: '+err.message; }
  } else { start(); }
}

function start(){
  if(running) return;
  running = true;
  window.addEventListener('devicemotion', handleMotion);
  $('#status').textContent = t('running');
}

function stop(){
  running = false;
  window.removeEventListener('devicemotion', handleMotion);
  $('#status').textContent = t('stopped');
}

const needsPerm = typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function';
if(typeof DeviceMotionEvent === 'undefined'){ $('#status').textContent = t('notSupported'); }

$('#toolbar').innerHTML = needsPerm
  ? `<button class="gz-btn" onclick="requestPermission()">${t('permission')}</button><button class="gz-btn gz-btn-secondary" onclick="stop()">${t('stop')}</button>`
  : `<button class="gz-btn" onclick="start()">${t('start')}</button><button class="gz-btn gz-btn-secondary" onclick="stop()">${t('stop')}</button>`;

if(needsPerm) $('#permWarn').style.display='block';
$('#permWarn').textContent = t('permMsg');
$('#lbl-gforce').textContent = t('gforce');

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📐', href:'/dev/gyroscope.html', name:'Gyroscope'},
    {icon:'🧲', href:'/dev/magnetometer.html', name:'Magnetometer'},
    {icon:'🔊', href:'/dev/decibel-meter.html', name:'Decibel Meter'},
    {icon:'🌐', href:'/dev/bubble-level.html', name:'Bubble Level'},
  ]
});
</script>
