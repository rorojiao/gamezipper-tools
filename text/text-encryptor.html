const { $, copyText, t } = GZ;
let method = 'aes';

const methods = ['aes','base64','rot13','caesar','reverse','vigenere'];

function renderMethods() {
  $('#methods').innerHTML = methods.map(m =>
    `<button class="method-btn${m===method?' active':''}" data-m="${m}">${t(m)}</button>`
  ).join('');
  $('#methods').onclick = e => {
    const btn = e.target.closest('[data-m]');
    if (!btn) return;
    method = btn.dataset.m;
    renderMethods();
    updateKeyRow();
  };
}

function updateKeyRow() {
  const row = $('#key-row');
  const inp = $('#key-input');
  if (method === 'aes') {
    row.style.display = 'flex';
    $('#lbl-key').textContent = t('password');
    inp.type = 'text';
    inp.placeholder = 'Enter password...';
  } else if (method === 'caesar') {
    row.style.display = 'flex';
    $('#lbl-key').textContent = t('shift');
    inp.type = 'number';
    inp.value = inp.value || '3';
    inp.placeholder = '1-25';
  } else if (method === 'vigenere') {
    row.style.display = 'flex';
    $('#lbl-key').textContent = t('password');
    inp.type = 'text';
    inp.placeholder = 'Enter keyword...';
  } else {
    row.style.display = 'none';

}

// --- Crypto Functions ---
async function aesEncrypt(text, password) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'}, keyMaterial, {name:'AES-GCM',length:256}, false, ['encrypt']);
  const encrypted = await crypto.subtle.encrypt({name:'AES-GCM',iv}, key, enc.encode(text));
  const buf = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
  buf.set(salt, 0);
  buf.set(iv, salt.length);
  buf.set(new Uint8Array(encrypted), salt.length + iv.length);
  return btoa(String.fromCharCode(...buf));
}

async function aesDecrypt(b64, password) {
  const enc = new TextEncoder(), dec = new TextDecoder();
  const buf = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const salt = buf.slice(0, 16), iv = buf.slice(16, 28), data = buf.slice(28);
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'}, keyMaterial, {name:'AES-GCM',length:256}, false, ['decrypt']);
  const decrypted = await crypto.subtle.decrypt({name:'AES-GCM',iv}, key, data);
  return dec.decode(decrypted);
}

function rot13(text) {
  return text.replace(/[a-zA-Z]/g, c => {
    const b = c <= 'Z' ? 65 : 97;
    return String.fromCharCode((c.charCodeAt(0) - b + 13) % 26 + b);
  });
}

function caesarEncrypt(text, shift) {
  shift = ((shift % 26) + 26) % 26;
  return text.replace(/[a-zA-Z]/g, c => {
    const b = c <= 'Z' ? 65 : 97;
    return String.fromCharCode((c.charCodeAt(0) - b + shift) % 26 + b);
  });
}

function caesarDecrypt(text, shift) {
  return caesarEncrypt(text, -shift);
}

function vigenereEncrypt(text, key) {
  key = key.toLowerCase().replace(/[^a-z]/g, '');
  if (!key) return text;
  let ki = 0;
  return text.replace(/[a-zA-Z]/g, c => {
    const b = c <= 'Z' ? 65 : 97;
    const shift = key.charCodeAt(ki % key.length) - 97;
    ki++;
    return String.fromCharCode((c.charCodeAt(0) - b + shift) % 26 + b);
  });
}

function vigenereDecrypt(text, key) {
  key = key.toLowerCase().replace(/[^a-z]/g, '');
  if (!key) return text;
  let ki = 0;
  return text.replace(/[a-zA-Z]/g, c => {
    const b = c <= 'Z' ? 65 : 97;
    const shift = key.charCodeAt(ki % key.length) - 97;
    ki++;
    return String.fromCharCode((c.charCodeAt(0) - b - shift + 26) % 26 + b);
  });
}

async function doEncrypt() {
  const text = $('#input').value;
  if (!text) { GZ.showToast(t('noInput')); return; }
  let result = '';
  try {
    const key = $('#key-input').value;
    switch(method) {
      case 'aes':
        if (!key) { GZ.showToast(t('noKey')); return; }
        result = await aesEncrypt(text, key); break;
      case 'base64':
        result = btoa(unescape(encodeURIComponent(text))); break;
      case 'rot13':
        result = rot13(text); break;
      case 'caesar':
        result = caesarEncrypt(text, parseInt(key) || 3); break;
      case 'reverse':
        result = [...text].reverse().join(''); break;
      case 'vigenere':
        if (!key) { GZ.showToast(t('noKey')); return; }
        result = vigenereEncrypt(text, key); break;
    }
    $('#output').textContent = result;
  } catch(e) { $('#output').textContent = 'Error: ' + e.message; }
}

async function doDecrypt() {
  const text = $('#input').value;
  if (!text) { GZ.showToast(t('noInput')); return; }
  let result = '';
  try {
    const key = $('#key-input').value;
    switch(method) {
      case 'aes':
        if (!key) { GZ.showToast(t('noKey')); return; }
        result = await aesDecrypt(text, key); break;
      case 'base64':
        result = decodeURIComponent(escape(atob(text.trim()))); break;
      case 'rot13':
        result = rot13(text); break;
      case 'caesar':
        result = caesarDecrypt(text, parseInt(key) || 3); break;
      case 'reverse':
        result = [...text].reverse().join(''); break;
      case 'vigenere':
        if (!key) { GZ.showToast(t('noKey')); return; }
        result = vigenereDecrypt(text, key); break;
    }
    $('#output').textContent = result;
  } catch(e) { $('#output').textContent = 'Error: ' + e.message; }
}
