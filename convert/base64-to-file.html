<script>
GZI18n.register({
  en: {
    toolTitle: 'Base64 to File Decoder',
    toolDesc: 'Decode Base64 strings into downloadable files — auto-detect MIME type for PDF, ZIP, images, audio and more.',
    decode: 'Decode',
    clear: 'Clear',
    download: 'Download File',
    autoDetect: 'Auto-detect',
    mimeType: 'MIME Type',
    fileName: 'File Name',
    fileSize: 'File Size',
    invalidBase64: 'Invalid Base64 string',
    detected: 'Auto-detected',
    step1: 'Paste your Base64 string into the input area',
    step2: 'Select MIME type or use auto-detect',
    step3: 'Click Decode to process the Base64 data',
    step4: 'Preview and download the decoded file',
  },
  zh: {
    toolTitle: 'Base64 转文件解码器',
    toolDesc: '将 Base64 字符串解码为可下载文件 — 自动检测 MIME 类型，支持 PDF、ZIP、图片、音频等。',
    decode: '解码',
    clear: '清空',
    download: '下载文件',
    autoDetect: '自动检测',
    mimeType: 'MIME 类型',
    fileName: '文件名',
    fileSize: '文件大小',
    detected: '已自动检测',
    invalidBase64: '无效的 Base64 字符串',
    step1: '在输入区粘贴 Base64 字符串',
    step2: '选择 MIME 类型或使用自动检测',
    step3: '点击解码按钮处理 Base64 数据',
    step4: '预览并下载解码后的文件',
  }
});

const { $, copyText, t } = GZ;

const MIME_MAP = {
  'image/png': 'png', 'image/jpeg': 'jpg', 'image/gif': 'gif', 'image/svg+xml': 'svg',
  'image/webp': 'webp', 'image/bmp': 'bmp', 'image/x-icon': 'ico',
  'application/pdf': 'pdf', 'application/zip': 'zip', 'application/x-gzip': 'gz',
  'application/json': 'json', 'text/plain': 'txt', 'text/csv': 'csv', 'text/html': 'html',
  'text/xml': 'xml', 'audio/mpeg': 'mp3', 'audio/wav': 'wav', 'audio/ogg': 'ogg',
  'video/mp4': 'mp4', 'video/webm': 'webm', 'application/octet-stream': 'bin',
};

const MIME_OPTIONS = `<option value="">${t('autoDetect')}</option>` +
  Object.entries(MIME_MAP).map(([m,e]) => `<option value="${m}">${m} (.${e})</option>`).join('');

let decodedBlob = null;
let decodedName = 'file';

function detectMime(base64) {
  const prefix = base64.substring(0, 50);
  if (prefix.includes('data:')) {
    const m = base64.match(/data:([^;]+);base64,/);
    if (m) return m[1];
  }
  if (prefix.startsWith('JVBERi0')) return 'application/pdf';
  if (prefix.startsWith('UEsDBBQ')) return 'application/zip';
  if (prefix.startsWith('R0lGOD')) return 'image/gif';
  if (prefix.startsWith('iVBOR')) return 'image/png';
  if (prefix.startsWith('/9j/4')) return 'image/jpeg';
  if (prefix.startsWith('PHN2Zy')) return 'image/svg+xml';
  if (prefix.startsWith('UklGR')) return 'audio/wav';
  if (prefix.startsWith('AAAA')) return 'audio/mpeg';
  if (prefix.startsWith('ey') || prefix.startsWith('W3')) return 'application/json';
  if (prefix.startsWith('PD94bW')) return 'text/xml';
  return 'application/octet-stream';
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(2) + ' MB';
}

function decode() {
  const raw = $('#input').value.trim();
  if (!raw) return;
  const result = $('#result');
  try {
    let base64 = raw;
    let detectedMime = null;
    // Extract from data URI
    const dataMatch = raw.match(/^data:([^;]+);base64,(.+)$/s);
    if (dataMatch) {
      detectedMime = dataMatch[1];
      base64 = dataMatch[2];
    }
    const selectedMime = $('#mimeSelect').value;
    const mime = selectedMime || detectedMime || detectMime(base64);
    const ext = MIME_MAP[mime] || 'bin';
    decodedName = `decoded-file.${ext}`;

    const binaryStr = atob(base64.replace(/\s/g, ''));
    const bytes = new Uint8Array(binaryStr.length);
    for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

    decodedBlob = new Blob([bytes], { type: mime });

    let previewHtml = '';
    if (mime.startsWith('image/')) {
      previewHtml = `<img class="preview" src="${URL.createObjectURL(decodedBlob)}" alt="Preview">`;
    } else if (mime.startsWith('audio/')) {
      previewHtml = `<audio controls src="${URL.createObjectURL(decodedBlob)}" style="width:100%"></audio>`;
    } else if (mime.startsWith('video/')) {
      previewHtml = `<video controls src="${URL.createObjectURL(decodedBlob)}" style="max-width:100%;max-height:300px;border-radius:8px"></video>`;
    } else if (mime === 'application/pdf') {
      previewHtml = `<span class="icon">📄</span>`;
    } else if (mime === 'application/zip') {
      previewHtml = `<span class="icon">📦</span>`;
    } else {
      previewHtml = `<span class="icon">📁</span>`;
    }

    const autoLabel = !selectedMime ? ` (${t('detected')})` : '';
    result.innerHTML = `
      ${previewHtml}
      <div style="text-align:center">
        <div><strong>${t('mimeType')}:</strong> ${mime}${autoLabel}</div>
        <div><strong>${t('fileName')}:</strong> ${decodedName}</div>
        <div><strong>${t('fileSize')}:</strong> ${formatSize(bytes.length)}</div>
        <a id="downloadLink" class="gz-btn" style="margin-top:8px;display:inline-block;text-decoration:none" download="${decodedName}">📥 ${t('download')}</a>
      </div>`;

    $('#downloadLink').href = URL.createObjectURL(decodedBlob);
  } catch(e) {
    result.innerHTML = `<span class="icon">⚠️</span><span class="err">${t('invalidBase64')}: ${e.message}</span>`;
    decodedBlob = null;
  }
}

function doClear() {
  $('#input').value = '';
  $('#result').innerHTML = '<span class="icon">📁</span><span style="color:var(--text2)">Output will appear here</span>';
  decodedBlob = null;
}

$('#toolbar').innerHTML = `
  <select id="mimeSelect">${MIME_OPTIONS}</select>
  <button class="gz-btn" onclick="decode()">🔓 ${t('decode')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">🗑️ ${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🖼️', href:'/image/image-to-base64.html', name:'Image to Base64'},
    {icon:'📄', href:'/convert/image-to-pdf.html', name:'Image to PDF'},
  ]
});
</script>
