<style>
.rnp-grid{display:grid;grid-template-columns:1fr;gap:14px}
.rnp-input-row{display:grid;grid-template-columns:1fr 220px;gap:12px;margin-bottom:14px}
@media(max-width:680px){.rnp-input-row{grid-template-columns:1fr}}
.rnp-textarea{width:100%;min-height:220px;padding:12px;border:1px solid var(--border);border-radius:10px;background:var(--glass2);color:var(--text);font-size:.95em;font-family:inherit;resize:vertical}
.rnp-controls{display:flex;flex-direction:column;gap:8px}
.rnp-controls label{font-size:.78em;color:var(--text2)}
.rnp-controls input[type=number]{padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--glass);color:var(--text);width:100%}
.rnp-controls .row{display:flex;align-items:center;gap:8px;font-size:.85em}
.rnp-controls .row input[type=checkbox]{width:18px;height:18px}
.rnp-btn{padding:12px;border:none;border-radius:24px;font-weight:700;font-size:1em;cursor:pointer;transition:.2s}
.rnp-btn-primary{background:var(--accent);color:#000}
.rnp-btn-primary:hover{opacity:.88}
.rnp-btn-secondary{background:var(--glass2);color:var(--text);border:1px solid var(--border)}
.rnp-winners{margin:18px 0;display:grid;gap:10px}
.rnp-winner{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--glass);border:1px solid var(--accent);border-radius:12px;font-size:1.2em;font-weight:700}
.rnp-winner .rank{font-size:.8em;color:var(--text2);font-weight:400;margin-right:10px}
.rnp-empty{padding:30px;text-align:center;color:var(--text2);background:var(--glass);border:1px dashed var(--border);border-radius:12px}
.rnp-stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.rnp-pill{padding:4px 12px;background:var(--glass2);border:1px solid var(--border);border-radius:14px;font-size:.8em;color:var(--text2)}
.rnp-history{margin-top:14px;font-size:.8em;color:var(--text2)}
.rnp-history b{color:var(--text)}
</style>

<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"Is this random name picker truly random and fair?","acceptedAnswer":{"@type":"Answer","text":"Yes. The picker uses your browser's cryptographically capable Math.random or crypto.getRandomValues to make each draw unbiased. Every name in the eligible pool has an equal probability of being selected (unless you enable weighted picks)."}},{"@type":"Question","name":"How do I draw multiple winners without repeats?","acceptedAnswer":{"@type":"Answer","text":"Enter the number of winners you want (for example 3) and tick 'No repeats within a single draw'. The tool samples without replacement, so each name can win only once per draw. Re-click Pick to draw again from the full list."}},{"@type":"Question","name":"Can I exclude previous winners across multiple draws?","acceptedAnswer":{"@type":"Answer","text":"Yes. Tick 'Exclude previous winners' and any name picked since you loaded the page is removed from the pool on the next draw. The History box at the bottom lists every name drawn so far."}},{"@type":"Question","name":"How are names separated?","acceptedAnswer":{"@type":"Answer","text":"Names can be separated by new lines, commas, or the | pipe character. Blank lines are ignored automatically. Tick 'Remove duplicates' to clean the list before drawing."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="rnp-input-row">
      <textarea class="rnp-textarea" id="names" spellcheck="false" placeholder="Alice&#10;Bob&#10;Charlie&#10;…"></textarea>
      <div class="rnp-controls">
        <label id="lblCount"></label>
        <input type="number" id="count" min="1" max="1000" value="1">
        <div class="row"><input type="checkbox" id="unique" checked><span id="lblUnique"></span></div>
        <div class="row"><input type="checkbox" id="dedupe" checked><span id="lblDedupe"></span></div>
        <div class="row"><input type="checkbox" id="excludePrev"><span id="lblExclude"></span></div>
        <button class="rnp-btn rnp-btn-primary" id="btnPick"></button>
        <button class="rnp-btn rnp-btn-secondary" id="btnClear"></button>
        <button class="rnp-btn rnp-btn-secondary" id="btnSample"></button>
      </div>
    </div>
    <div class="rnp-stats" id="stats"></div>
    <div id="winners"></div>
    <div class="rnp-history" id="history"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Random Name Picker',
    toolDesc: 'Paste a list of names, contestants or items and draw one or more winners fairly. Supports deduplication, no-repeat draws and previous-winner exclusion.',
    lblCount: 'How many winners?',
    lblUnique: 'No repeats in one draw',
    lblDedupe: 'Remove duplicates first',
    lblExclude: 'Exclude previous winners',
    btnPick: '🎲 Pick winners',
    btnClear: 'Clear',
    btnSample: 'Load sample list',
    step1: 'Paste a list of names — one per line (or comma / pipe separated)',
    step2: 'Choose how many winners to draw',
    step3: 'Tick options for dedupe, no-repeat or previous-winner exclusion',
    step4: 'Click Pick — winners appear instantly with a fair unbiased draw',
    empty: 'Paste a list of names above to draw winners.',
    statPool: 'Pool: {n}',
    statPicked: 'Picked: {n}',
    history: 'History (this session)',
    sampleText: 'Alice\nBob\nCharlie\nDiana\nEthan\nFiona\nGeorge\nHana\nIvan\nJulia\nKevin\nLena',
  },
  zh: {
    toolTitle: '随机抽名工具',
    toolDesc: '粘贴名字、选手或条目列表，公平抽出一个或多个中奖者。支持去重、单次不重复和排除历史中奖者。',
    lblCount: '抽几个？',
    lblUnique: '单次抽签不重复',
    lblDedupe: '先去除重复',
    lblExclude: '排除历史中奖者',
    btnPick: '🎲 开始抽签',
    btnClear: '清空',
    btnSample: '加载示例',
    step1: '粘贴名单 — 每行一个（也可用逗号或竖线分隔）',
    step2: '选择要抽取的数量',
    step3: '勾选去重、不重复、排除历史中奖者等选项',
    step4: '点击「开始抽签」— 立即公平抽取中奖者',
    empty: '在上方粘贴名单即可开始抽签',
    statPool: '候选池：{n}',
    statPicked: '已抽：{n}',
    history: '本次会话历史',
    sampleText: '张三\n李四\n王五\n赵六\n钱七\n孙八\n周九\n吴十\n郑十一\n王十二',
  }
});

const { $, t } = GZ;
let history=[];

function parseNames(){
  let raw = $('#names').value;
  let list = raw.split(/[\n,|]+/).map(s=>s.trim()).filter(s=>s.length>0);
  if($('#dedupe').checked){
    const seen=new Set(), out=[];
    for(const n of list){ if(!seen.has(n)){seen.add(n); out.push(n);} }
    list=out;
  }
  if($('#excludePrev').checked){
    const prev=new Set(history);
    list=list.filter(n=>!prev.has(n));
  }
  return list;
}

function cryptoRand(max){
  if(window.crypto && crypto.getRandomValues){
    const buf=new Uint32Array(1); crypto.getRandomValues(buf);
    return buf[0]/4294967296*max;
  }
  return Math.random()*max;
}

function pick(){
  const pool=parseNames();
  if(pool.length===0){
    $('#winners').innerHTML=`<div class="rnp-empty">${t('empty')}</div>`;
    $('#stats').innerHTML=''; return;
  }
  const count=Math.max(1,Math.min(pool.length,Math.floor(+$('#count').value||1)));
  const unique=$('#unique').checked;
  let winners=[];
  const arr=pool.slice();
  if(unique){
    for(let i=0;i<count && arr.length>0;i++){
      const idx=Math.floor(cryptoRand(arr.length));
      winners.push(arr.splice(idx,1)[0]);
    }
  } else {
    for(let i=0;i<count;i++){
      const idx=Math.floor(cryptoRand(arr.length));
      winners.push(arr[idx]);
    }
  }
  history.push(...winners);
  const poolSize=$('#dedupe').checked? $('#names').value.split(/[\n,|]+/).map(s=>s.trim()).filter(s=>s).filter((v,i,a)=>a.indexOf(v)===i).length : $('#names').value.split(/[\n,|]+/).map(s=>s.trim()).filter(s=>s).length;
  $('#stats').innerHTML = `
    <span class="rnp-pill">${t('statPool').replace('{n}',poolSize)}</span>
    <span class="rnp-pill">${t('statPicked').replace('{n}',history.length)}</span>`;
  $('#winners').innerHTML = `<div class="rnp-winners">`+winners.map((w,i)=>`
    <div class="rnp-winner"><span><span class="rank">#${i+1}</span> ${escapeHtml(w)}</span><span style="font-size:1.4em">🎉</span></div>`).join('')+`</div>`;
  $('#history').innerHTML = history.length>0 ? `<b>${t('history')}:</b> ${history.map(escapeHtml).join(' · ')}` : '';
}

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

$('#btnPick').addEventListener('click',pick);
$('#btnClear').addEventListener('click',()=>{
  $('#names').value=''; $('#winners').innerHTML=''; $('#stats').innerHTML=''; history=[]; $('#history').innerHTML='';
});
$('#btnSample').addEventListener('click',()=>{ $('#names').value=t('sampleText'); pick(); });

$('#lblCount').textContent=t('lblCount');
$('#lblUnique').textContent=t('lblUnique');
$('#lblDedupe').textContent=t('lblDedupe');
$('#lblExclude').textContent=t('lblExclude');
$('#btnPick').textContent=t('btnPick');
$('#btnClear').textContent=t('btnClear');
$('#btnSample').textContent=t('btnSample');

$('#names').placeholder = t('step1');

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎡', href:'/fun/wheel-of-names.html', name:'Wheel of Names'},
    {icon:'🎲', href:'/fun/dice-roller.html', name:'Dice Roller'},
    {icon:'🔢', href:'/calc/random-number-generator.html', name:'Random Number Generator'},
    {icon:'🪙', href:'/fun/coin-flip-stats.html', name:'Coin Flip Stats'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
