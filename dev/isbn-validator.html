<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the difference between ISBN-10 and ISBN-13?", "acceptedAnswer": {"@type": "Answer", "text": "ISBN-10 is the older 10-digit standard used before 2007. ISBN-13 is the current 13-digit standard that begins with 978 or 979 and is compatible with EAN barcodes. You can convert a valid ISBN-10 to ISBN-13 by adding the 978 prefix and recalculating the check digit."}}, {"@type": "Question", "name": "How is the ISBN check digit calculated?", "acceptedAnswer": {"@type": "Answer", "text": "For ISBN-10 the check digit uses a modulus 11 weighted sum where weights are 10 down to 1, and the digit may be 0–9 or X (representing 10). For ISBN-13 the check digit uses a modulus 10 alternating weight of 1 and 3 on the first 12 digits."}}, {"@type": "Question", "name": "Why does my ISBN show as invalid?", "acceptedAnswer": {"@type": "Answer", "text": "An ISBN is invalid when the check digit does not match the calculated value, when it contains illegal characters, or when the length is not 10 or 13 digits. Double-check for typos, missing digits or extra hyphens and spaces (these are stripped automatically)."}}, {"@type": "Question", "name": "Can I convert ISBN-13 back to ISBN-10?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, but only for ISBN-13 numbers that start with 978. Remove the 978 prefix and the check digit, then recalculate the ISBN-10 check digit. ISBN-13 numbers starting with 979 cannot be converted back because they have no ISBN-10 equivalent."}}]}</script>

const { $, copyText, t } = GZ;

function strip(s){ return s.replace(/[^0-9Xx]/g,'').toUpperCase(); }

function check10(digits){
  // digits length 10, last may be X
  if(!/^\d{9}[\dX]$/.test(digits)) return null;
  let sum = 0;
  for(let i=0;i<10;i++){ const d = digits[i]==='X'?10:+digits[i]; sum += d*(10-i); }
  return sum % 11 === 0;
}
function expectedCheck10(first9){
  let sum = 0;
  for(let i=0;i<9;i++){ sum += (+first9[i])*(10-i); }
  const m = (11 - (sum % 11)) % 11;
  return m===10?'X':String(m);
}
function check13(digits){
  if(!/^\d{13}$/.test(digits)) return null;
  let sum = 0;
  for(let i=0;i<13;i++){ const d=+digits[i]; sum += d*(i%2===0?1:3); }
  return sum % 10 === 0;
}
function expectedCheck13(first12){
  let sum = 0;
  for(let i=0;i<12;i++){ sum += (+first12[i])*(i%2===0?1:3); }
  return String((10 - (sum%10))%10);
}
function to13(isbn10){
  const core = '978' + isbn10.slice(0,9);
  return core + expectedCheck13(core);
}
function to10(isbn13){
  if(!isbn13.startsWith('978')) return null;
  const core = isbn13.slice(3,12);
  return core + expectedCheck10(core);
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function analyze(raw){
  const digits = strip(raw);
  if(!digits){ return {raw, valid:false, msg:t('badLen')}; }
  if(digits.length!==10 && digits.length!==13){
    // maybe illegal char stripped
    if(/[^0-9Xx]/.test(raw.replace(/[\s-]/g,''))) return {raw, valid:false, msg:t('badChar')};
    return {raw, valid:false, msg:t('badLen')};
  }
  if(digits.length===10){
    const ok = check10(digits);
    const exp = expectedCheck10(digits.slice(0,9));
    return {raw, digits, type:t('type10'), valid: ok===true, msg: ok===true?t('checkOk'):t('checkBad').replace('%1',exp), isbn10:digits, isbn13: ok===true?to13(digits):null};
  } else {
    const ok = check13(digits);
    const exp = expectedCheck13(digits.slice(0,12));
    const c10 = ok===true && digits.startsWith('978') ? to10(digits) : null;
    return {raw, digits, type:t('type13'), valid: ok===true, msg: ok===true?t('checkOk'):t('checkBad').replace('%1',exp), isbn13:digits, isbn10:c10};
  }
}

function formatISBN(digits){
  if(digits.length===10){
    // 0-306-40615-2 style guess by registration group
    return digits.replace(/^(\d{1,5})(\d{1,7})(\d{1,6})([\dX])$/, (m,a,b,c,d)=>`${a}-${b}-${c}-${d}`);
  }
  return digits.replace(/^(\d{3})(\d{1,5})(\d{1,7})(\d{1,6})(\d)$/, (m,a,b,c,d,e)=>`${a}-${b}-${c}-${d}-${e}`);
}

function doValidate(mode){
  const lines = $('#input').value.split('\n').map(s=>s.trim()).filter(Boolean);
  if(!lines.length){ $('#output').innerHTML=''; $('#status').textContent=''; return; }
  const cards = lines.map(line=>{
    const r = analyze(line);
    const cls = r.valid ? 'ok' : 'bad';
    const icon = r.valid ? '✅' : '❌';
    let rows = `<div class="res-row"><span>${t('raw')}:</span><code>${esc(r.digits||r.raw)}</code></div>`;
    if(r.valid){
      rows += `<div class="res-row"><span>${t('hyphen')}:</span><code>${esc(formatISBN(r.digits))}</code></div>`;
      if(r.isbn13){ rows += `<div class="res-row"><span>${t('type13')}:</span><code>${esc(r.isbn13)}</code><button onclick="copyText('${r.isbn13}')">⧉</button></div>`; }
      if(r.isbn10){ rows += `<div class="res-row"><span>${t('type10')}:</span><code>${esc(r.isbn10)}</code><button onclick="copyText('${r.isbn10}')">⧉</button></div>`; }
    }
    const typeLabel = r.type ? ` · ${r.type}` : '';
    return `<div class="res-card ${cls}"><div class="res-head">${icon} ${r.valid?t('valid'):t('invalid')}${typeLabel}</div><div class="res-row" style="color:var(--text2)">${esc(r.msg)}</div>${rows}</div>`;
  });
  $('#output').innerHTML = cards.join('');
  const valid = lines.map(analyze).filter(r=>r.valid).length;
  $('#status').innerHTML = `<span style="color:var(--text2)">✓ ${valid}/${lines.length} ${t('valid')}</span>`;
}

function doConvert(toFmt){
  const lines = $('#input').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const out = [];
  lines.forEach(line=>{
    const r = analyze(line);
    if(!r.valid){ out.push(line); return; }
    if(toFmt==='13'){
      out.push(r.isbn13 || line);
    } else {
      if(r.isbn10){ out.push(r.isbn10); }
      else { out.push('# '+t('convNote')+': '+line); }
    }
  });
  $('#input').value = out.join('\n');
  doValidate();
}

function loadExample(){
  $('#input').value = '978-3-16-148410-0\n0-306-40615-2\n9780306406157\n123456789X\n9780132350884\n0000000000';
  doValidate();
}
function doClear(){ $('#input').value=''; $('#output').innerHTML=''; $('#status').textContent=''; }

$('#lbl-in').textContent = t('lblIn');
$('#input').addEventListener('input', ()=>doValidate());
