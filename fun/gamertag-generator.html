<script>
GZI18n.register({
  en: {
    toolTitle: 'Gamertag Generator',
    toolDesc: 'Create unique gaming usernames for Xbox, PlayStation, Steam, Roblox, Discord and more. Pick a style — sweaty, tryhard, cool, cute, OG — add your word, and get 20 fresh gamertags every click. Free, private, no signup.',
    sSweaty: '🔥 Sweaty', sTryhard: '😤 Tryhard', sCool: '😎 Cool', sCute: '🥰 Cute', sOG: '👑 OG', sCyber: '🤖 Cyber',

    phKeyword: 'e.g. sniper',

    step1: 'Pick a style — Sweaty, Tryhard, Cool, Cute, OG or Cyber',
    step2: 'Optionally add a keyword to personalize your tag',

    step4: 'Click Generate, then tap the copy icon on any tag',
  },
  zh: {
    toolTitle: '游戏 ID 生成器',
    toolDesc: '为 Xbox、PlayStation、Steam、Roblox、Discord 等平台创建独特的游戏 ID。选择风格 — 激进、硬核、酷炫、可爱、元老、赛博 — 可添加关键词，每次点击获得 20 个全新 ID。免费、私密、无需注册。',
    sSweaty: '🔥 激进', sTryhard: '😤 硬核', sCool: '😎 酷炫', sCute: '🥰 可爱', sOG: '👑 元老', sCyber: '🤖 赛博',
    lblKeyword: '可选关键词（你的名字、武器、动物…）',
    phKeyword: '例如：sniper',
    lblFormat: '格式',
    fPlain: '纯文字', fNum: '带数字', fXX: 'xX...Xx', fUnderscore: '下划线',
    btnGen: '生成 20 个游戏 ID',
    btnClear: '清空',
    copied: '已复制！',
    step1: '选择风格 — 激进、硬核、酷炫、可爱、元老或赛博',
    step2: '可选添加关键词个性化你的 ID',
    step3: '选择格式 — 纯文字、数字、xX 标签或下划线',
    step4: '点击「生成」，然后点击任意 ID 旁的复制按钮',
  }
});

const { $, t, showToast } = GZ;
const pick = a => a[Math.floor(Math.random() * a.length)];
const cap = s => s ? s.charAt(0).toUpperCase() + s.slice(1).toLowerCase() : s;

const STYLES = {
  sweaty: { pre:['Toxic','Venom','Reaper','Savage','Ruthless','Blood','Phantom','Vortex','Rampage','Menace','Demon','Chaos','Rage','Sniper','Slayer'], suf:['YT','TTV','God','X','z','99','007','_YT','Clan','TTV'] },
  tryhard: { pre:['NoScope','QuickScope','WallBang','Frag','Wiped','Clutch','Sweat','Carried','Bot','Cracked','Smurf','Aimbot','Headshot','Loot','Gank'], suf:['TTV','YT','_YT','xX','Xx','69','420','007','99','z'] },
  cool: { pre:['Shadow','Neon','Crimson','Frost','Steel','Onyx','Vortex','Eclipse','Rogue','Specter','Phoenix','Raven','Titan','Blaze','Volt'], suf:['X','Z','Prime','99','HD','Pro','GG','GGs','','',''] },
  cute: { pre:['Pickle','Panda','Bunny','Mochi','Cupcake','Berry','Honey','Peachy','Fluffy','Sparkle','Daisy','Bubble','Cookie','Marshmallow','Sprinkle'], suf:['kins','boo','pie','-chan','xoxo','QT','_','zz','','',''] },
  og: { pre:['King','Queen','Legend','Boss','Lord','Guru','Master','Chief','Captain','Baron','Sage','Knight','Oracle','Titan','Wolf'], suf:['OG','_OG','77','99','','','','','','',''] },
  cyber: { pre:['Cyber','Pixel','Glitch','Neon','Holo','Data','Byte','Quantum','Synth','Vector','Matrix','Binary','Proto','Nano','Chrome'], suf:['404','X','_AI','v2','2099','EXE','0xFF','99','x','','',''] },
};

let style = 'sweaty';
const STYLE_LIST = [{id:'sweaty',key:'sSweaty'},{id:'tryhard',key:'sTryhard'},{id:'cool',key:'sCool'},{id:'cute',key:'sCute'},{id:'og',key:'sOG'},{id:'cyber',key:'sCyber'}];
$('#style-tabs').innerHTML = STYLE_LIST.map(s => `<button data-id="${s.id}" class="${s.id===style?'active':''}">${t(s.key)}</button>`).join('');
document.querySelectorAll('#style-tabs button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#style-tabs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    style = b.dataset.id;
    generate();
  });
});

function makeTag() {
  const s = STYLES[style];
  const kw = ($('#keyword').value || '').trim();
  const fmt = $('#format').value;
  const r = Math.random();
  let base;
  if (kw && r < 0.4) base = cap(kw) + pick(s.suf);
  else if (kw && r < 0.6) base = pick(s.pre) + cap(kw);
  else if (kw && r < 0.75) base = pick(s.pre) + cap(kw) + pick(s.suf);
  else base = pick(s.pre) + pick(s.suf);

  // Avoid empty suffix producing bare prefix sometimes; ensure length
  if (base.length < 4) base = pick(s.pre) + pick(s.pre);

  if (fmt === 'num') base += Math.floor(Math.random() * 99) + 1;
  else if (fmt === 'xx') base = 'xX' + base + 'Xx';
  else if (fmt === 'underscore') base = base.replace(/([a-z])([A-Z])/g, '$1_$2');
  return base;
}

function generate() {
  const seen = new Set();
  const tags = [];
  let safety = 0;
  while (tags.length < 20 && safety < 300) {
    const n = makeTag();
    if (!seen.has(n.toLowerCase())) { seen.add(n.toLowerCase()); tags.push(n); }
    safety++;
  }
  $('#grid').innerHTML = tags.map(n => `
    <div class="gt-card">
      <span class="name">${n.replace(/</g,'&lt;')}</span>
      <button data-name="${n.replace(/"/g,'&quot;')}" title="copy">📋</button>
    </div>`).join('');
  document.querySelectorAll('#grid .gt-card button').forEach(b => {
    b.addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(b.dataset.name.replace(/&quot;/g,'"')); showToast(t('copied')); }
      catch (e) { showToast(t('copied')); }
    });
  });
}

$('#lbl-keyword').textContent = t('lblKeyword');
$('#keyword').placeholder = t('phKeyword');
$('#lbl-format').textContent = t('lblFormat');
$('#format option[value="plain"]').textContent = t('fPlain');
$('#format option[value="num"]').textContent = t('fNum');
$('#format option[value="xx"]').textContent = t('fXX');
$('#format option[value="underscore"]').textContent = t('fUnderscore');
$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('btnGen')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#keyword').value='';$('#format').value='plain';generate()">🧹 ${t('btnClear')}</button>`;
$('#keyword').addEventListener('input', generate);
$('#format').addEventListener('change', generate);

generate();

    {icon:'🎸', href:'/fun/band-name-generator.html', name:'Band Name Generator'},
    
  ]
});
</script>
