// Lightweight CSS beautifier — token-walks braces, colons and semicolons
function beautifyCSS(src, opts){
  const indent = opts.indent;
  const out = [];
  let depth = 0;
  let buf = '';
  let i = 0, n = src.length;
  const pad = d => ' '.repeat(d * indent);

  function newline(){
    if (buf.length){
      out.push(pad(depth) + buf.trim());
      buf = '';
    }
  }

  while (i < n){
    const c = src[i], c2 = src[i+1];
    // Comments
    if (c === '/' && c2 === '*'){
      let end = src.indexOf('*/', i+2);
      if (end === -1) end = n; else end += 2;
      if (buf) buf += ' ';
      buf += src.slice(i, end);
      i = end;
      continue;
    }
    // Strings
    if (c === '"' || c === "'"){
      const q = c; let j = i+1;
      while (j < n){
        if (src[j] === '\\'){ j += 2; continue; }
        if (src[j] === q){ j++; break; }
        j++;
      }
      buf += src.slice(i, j);
      i = j;
      continue;
    }
    // At-rules and selectors end at {
    if (c === '{'){
      buf += ' {';
      newline();
      depth++;
      i++;
      continue;
    }
    if (c === '}'){
      newline();
      if (depth > 0) depth--;
      out.push(pad(depth) + '}');
      i++;
      continue;
    }
    if (c === ':'){
      // Could be pseudo-class selector or property:value
      // Heuristic: if depth > 0 (inside a rule block) → property separator
      if (depth > 0 && !buf.startsWith('@')){
        buf += ': ';
      } else {
        buf += ':';
      }
      i++;
      continue;
    }
    if (c === ';'){
      buf += ';';
      newline();
      i++;
      continue;
    }
    if (c === '\n' || c === '\r'){
      // collapse
      i++;
      continue;
    }
    if (/\s/.test(c)){
      if (buf && !/\s$/.test(buf)) buf += ' ';
      i++;
      continue;
    }
    buf += c;
    i++;
  }
  newline();
  return out.join('\n').replace(/\n{3,}/g, '\n\n').trim() + '\n';
}

function minifyCSS(src, keepComments){
  let out = '', i = 0, n = src.length;
  while (i < n){
    const c = src[i], c2 = src[i+1];
    if (c === '/' && c2 === '*'){
      let end = src.indexOf('*/', i+2);
      if (end === -1) end = n; else end += 2;
      if (keepComments) out += src.slice(i, end);
      i = end;
      continue;
    }
    if (c === '"' || c === "'"){
      const q = c; let j = i+1;
      while (j < n){
        if (src[j] === '\\'){ j += 2; continue; }
        if (src[j] === q){ j++; break; }
        j++;
      }
      out += src.slice(i, j);
      i = j;
      continue;
    }
    if (/\s/.test(c)){
      // keep one space only if needed between tokens
      if (out && !/[\s{}:;,>~+]/.test(out.slice(-1)) && i+1 < n && !/[\s{}:;,>~+]/.test(src[i+1])){
        out += ' ';
      }
      i++;
      continue;
    }
    // remove last semicolon before }
    out += c;
    i++;
  }
  return out.replace(/;}/g, '}').trim();
}

const HIGHLIGHT_KW = new Set(['color','background','margin','padding','border','width','height','display','position','font','flex','grid','text','align','justify','gap','top','left','right','bottom','z-index','opacity','transform','transition','animation','box-shadow','border-radius']);

function highlight(css){
  let out = '';
  const n = css.length;
  let i = 0;
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  while (i < n){
    const c = css[i], c2 = css[i+1];
    if (c === '/' && c2 === '*'){
      let e = css.indexOf('*/', i+2); if (e === -1) e = n; else e += 2;
      out += '<span class="css-com">'+esc(css.slice(i, e))+'</span>'; i = e; continue;
    }
    if (c === '"' || c === "'"){
      const q = c; let j = i+1;
      while (j < n){ if (css[j] === '\\'){ j += 2; continue; } if (css[j] === q){ j++; break; } j++; }
      out += '<span class="css-val">'+esc(css.slice(i, j))+'</span>'; i = j; continue;
    }
    if (c === '@'){
      let j = i+1;
      while (j < n && /[a-zA-Z-]/.test(css[j])) j++;
      out += '<span class="css-at">'+esc(css.slice(i, j))+'</span>'; i = j; continue;
    }
    out += esc(c); i++;
  }
  return out;
}

function getOpts(){
  return {

    keepComments: $('#kc').checked,

function doBeautify(){
  const inp = $('#input').value;
  if (!inp.trim()){ $('#status').innerHTML = '<span style="color:var(--gz-accent)">'+t('empty')+'</span>'; $('#output').innerHTML=''; return; }
  const out = beautifyCSS(inp, getOpts());
  $('#output').innerHTML = highlight(out);
  window._cssOut = out;
  $('#status').innerHTML = '<span style="color:var(--gz-success)">'+t('done')+' · '+out.split('\n').length+' lines</span>';
}

function doMinify(){

  const out = minifyCSS(inp, getOpts().keepComments);
  window._cssOut = out;
  $('#output').innerHTML = highlight(out);
  $('#status').innerHTML = '<span style="color:var(--gz-success)">'+t('minified')+' · '+out.length+' chars</span>';
}

function doCopy(){ if (window._cssOut != null) copyText(window._cssOut); }

function doDownload(){
  if (window._cssOut == null) return;
  const blob = new Blob([window._cssOut], {type:'text/css'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'style.css';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}
