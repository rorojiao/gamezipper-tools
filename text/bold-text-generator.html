    toolDesc: '将普通文字转换为 𝐛𝐨𝐥𝐝 粗体、𝒃𝒐𝒍𝒅 𝒊𝒕𝒂𝒍𝒊𝒄 粗斜体、无衬线粗体等 Unicode 样式。复制粘贴到 Instagram、Facebook、Twitter、Discord 和抖音 — 无需格式代码，纯文字。',

    boldItalic: '粗斜体',
    sansBold: '无衬线粗体',
    sansBoldItalic: '无衬线粗斜体',
    step1: '输入或粘贴需要变粗体的文字',
    step2: '选择粗体样式：粗体、粗斜体、无衬线粗体或无衬线粗斜体',
    step3: '点击复制，粘贴到帖子、文案或简介中',
  }
});

const { $, copyText, t } = GZ;

// Unicode Mathematical Alphanumeric Symbols — offset tables with exception letters.
// See https://www.unicode.org/charts/PDF/U1D400.pdf
const STYLES = {
  bold:           { upper: 0x1D400, lower: 0x1D41A, digit: 0x1D7CE },
  boldItalic:     { upper: 0x1D468, lower: 0x1D482, digit: null },
  sansBold:       { upper: 0x1D5D4, lower: 0x1D5EE, digit: 0x1D7EC },
  sansBoldItalic: { upper: 0x1D63C, lower: 0x1D656, digit: null },
};

function stylize(text, key) {
  const s = STYLES[key];
  if (!s) return text;
  let out = '';
  for (const ch of text) {
    const code = ch.codePointAt(0);
    if (code >= 0x41 && code <= 0x5A) {            // A-Z
      out += String.fromCodePoint(code - 0x41 + s.upper);
    } else if (code >= 0x61 && code <= 0x7A) {      // a-z
      out += String.fromCodePoint(code - 0x61 + s.lower);
    } else if (code >= 0x30 && code <= 0x39 && s.digit) { // 0-9
      out += String.fromCodePoint(code - 0x30 + s.digit);
    } else {
      out += ch;
    }
  }
  return out;
}

let currentStyle = 'bold';

function processText() {
  const text = $('#input').value;
  if (!text) { $('#output').textContent = ''; return; }
  $('#output').textContent = stylize(text, currentStyle);
}

$('#input').addEventListener('input', processText);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="setStyle('bold',this)">${t('bold')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setStyle('boldItalic',this)">${t('boldItalic')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setStyle('sansBold',this)">${t('sansBold')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setStyle('sansBoldItalic',this)">${t('sansBoldItalic')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';$('#output').textContent=''">${t('clear')}</button>`;

function setStyle(key, btn) {
  currentStyle = key;
  processText();
  btn.parentElement.querySelectorAll('.gz-btn').forEach(b => {
    b.classList.remove('gz-btn-active');
    b.classList.add('gz-btn-secondary');
  });
  btn.classList.add('gz-btn-active');
  btn.classList.remove('gz-btn-secondary');
}

// Pre-fill example so the page is never empty
$('#input').value = 'Bold Text Generator';
processText();

});
