<script>
GZI18n.register({
  en: {
    toolTitle: 'Text Padding Tool',
    toolDesc: 'Pad text, strings and numbers with leading zeros, spaces, or custom characters. Left-pad or right-pad to a fixed width — perfect for IDs, codes and file names.',
    pad: 'Pad',
    width: 'Target Width',
    direction: 'Direction',
    left: 'Left Pad',
    right: 'Right Pad',
    center: 'Center Pad',
    char: 'Pad Char',
    cZero: 'Zero (0)',
    cSpace: 'Space',
    cHyphen: 'Hyphen (-)',
    cUnderscore: 'Underscore (_)',
    cCustom: 'Custom',
    optEachLine: 'Pad each line',
    optTruncate: 'Truncate if longer',
    step1: 'Enter your text or numbers in the input area',
    step2: 'Set the target width and pad character',
    step3: 'Choose left, right, or center padding',
    step4: 'Copy the padded result',
    done: '✓ Padded {n} line(s)',
  },
  zh: {
    toolTitle: '文本填充工具',
    toolDesc: '用前导零、空格或自定义字符填充文本、字符串和数字。左填充或右填充到固定宽度 — 适合 ID、代码和文件名。',
    pad: '填充',
    width: '目标宽度',
    direction: '方向',
    left: '左填充',
    right: '右填充',
    center: '居中填充',
    char: '填充字符',
    cZero: '零 (0)',
    cSpace: '空格',
    cHyphen: '连字符 (-)',
    cUnderscore: '下划线 (_)',
    cCustom: '自定义',
    optEachLine: '逐行填充',
    optTruncate: '超出则截断',
    step1: '在输入区输入文本或数字',
    step2: '设置目标宽度和填充字符',
    step3: '选择左填充、右填充或居中填充',
    step4: '复制填充后的结果',
    done: '✓ 填充了 {n} 行',
  }
});

const { $, copyText, t } = GZ;
let padDir = 'left';
let padCharMode = '0';

function getPadChar() {
  if (padCharMode === 'custom') return $('#custom-char').value || ' ';
  const map = { '0': '0', 'space': ' ', 'hyphen': '-', 'underscore': '_' };
  return map[padCharMode] || '0';
}

function padStr(str, width, char, dir, truncate) {
  if (str.length >= width) {
    return truncate ? str.substring(0, width) : str;
  }
  const padLen = width - str.length;
  const padding = char.repeat(padLen);
  if (dir === 'left') return padding + str;
  if (dir === 'right') return str + padding;
  // center
  const leftLen = Math.floor(padLen / 2);
  const rightLen = padLen - leftLen;
  return char.repeat(leftLen) + str + char.repeat(rightLen);
}

function process() {
  const input = $('#input').value;
  if (!input) return;
  const width = parseInt($('#pad-width').value) || 5;
  const char = getPadChar();
  const truncate = $('#opt-truncate').checked;
  const eachLine = $('#opt-eachline').checked;

  let result;
  let lineCount;
  if (eachLine) {
    const lines = input.split('\n');
    result = lines.map(l => padStr(l, width, char, padDir, truncate)).join('\n');
    lineCount = lines.length;
  } else {
    result = padStr(input.replace(/\n/g, ' '), width, char, padDir, truncate);
    lineCount = 1;
  }

  $('#output').textContent = result;
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('done').replace('{n}', lineCount)}</span>`;
}

function loadExample() {
  $('#input').value = '42\n100\n7\n3';
  $('#pad-width').value = '5';
  process();
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', process);

const optHtml = `
  <div class="opt-grid">
    <label>${t('width'}: <input type="number" id="pad-width" class="gz-input" value="5" min="1" max="999" oninput="process()"></label>
    <label>${t('direction')}:
      <select class="gz-select" onchange="padDir=this.value;process()">
        <option value="left">${t('left')}</option>
        <option value="right">${t('right')}</option>
        <option value="center">${t('center')}</option>
      </select>
    </label>
    <label>${t('char')}:
      <select class="gz-select" onchange="padCharMode=this.value;process()">
        <option value="0">${t('cZero')}</option>
        <option value="space">${t('cSpace')}</option>
        <option value="hyphen">${t('cHyphen')}</option>
        <option value="underscore">${t('cUnderscore')}</option>
        <option value="custom">${t('cCustom')}</option>
      </select>
    </label>
    <input type="text" id="custom-char" class="gz-input" style="width:40px" maxlength="1" placeholder="X" oninput="if(padCharMode==='custom')process()">
    <label style="cursor:pointer"><input type="checkbox" id="opt-eachline" checked onchange="process()"> ${t('optEachLine')}</label>
    <label style="cursor:pointer"><input type="checkbox" id="opt-truncate" onchange="process()"> ${t('optTruncate')}</label>
  </div>`;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="process()">${t('pad')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

const optDiv = document.createElement('div');
optDiv.innerHTML = optHtml;
$('#toolbar').after(optDiv);

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'🔢', href:'/text/number-to-words.html', name:'Number to Words'},
    {icon:'➕', href:'/text/add-prefix-suffix.html', name:'Add Prefix/Suffix'},
    {icon:'🔂', href:'/text/text-repeater.html', name:'Text Repeater'},
    {icon:'📝', href:'/text/line-numbers.html', name:'Add Line Numbers'},
  ]
});
</script>
