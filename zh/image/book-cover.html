<div class="gz-container">
  <div class="gz-tool-header">

      <div class="canvas-wrap"><canvas id="canvas" width="1800" height="2700"></canvas></div>

    <div class="form-grid" id="form">
      <label class="full"><span id="lbl-title"></span>
        <input type="text" id="bookTitle" value="THE MIDNIGHT LIBRARY" placeholder="Book title">

      <label class="full"><span id="lbl-subtitle"></span>
        <input type="text" id="bookSubtitle" value="A Novel" placeholder="Subtitle (optional)">
      </label>
      <label class="full"><span id="lbl-author"></span>

      </label>
      <label><span id="lbl-theme"></span>

          <option value="0">Mystery Noir</option>

        </select>
      </label>

          <option value="top">Title at top</option>

        <input type="file" id="photo" accept="image/*">

      </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Free Book Cover Maker',
    toolDesc: 'Design a professional book cover online for free. Add your title, subtitle and author name, pick from six elegant genre themes (mystery, romance, sci-fi, classic, modern, children) or upload your own artwork. Export a print-ready KDP-friendly 6×9 PNG in one click — perfect for self-publishing, KDP, IngramSpark, Apple Books and eBooks. No signup, no watermark, runs entirely in your browser.',
    download: 'Download PNG',
    lblTitle: 'Book Title', lblSubtitle: 'Subtitle (optional)',
    lblAuthor: 'Author Name', lblTheme: 'Genre Theme',
    lblLayout: 'Title Position', lblOverlay: 'Photo Overlay',
    lblPhoto: 'Cover Artwork (optional)', lblPalette: 'Quick Color Palettes',
    step1: 'Type your book title, optional subtitle and author name',
    step2: 'Pick a genre theme — mystery, romance, sci-fi and more',
    step3: 'Choose a title position and optionally upload cover artwork',
    step4: 'Click Download PNG to publish on KDP or share online',
  },
  zh: {
    toolTitle: '书籍封面制作工具',
    toolDesc: '免费在线设计专业的书籍封面。添加书名、副标题和作者名，从 6 种优雅的体裁主题（悬疑、言情、科幻、经典、现代、儿童）中选择，或上传你自己的插画。一键导出可打印的 KDP 6×9 PNG — 适用于自助出版、KDP、IngramSpark、Apple Books 和电子书。无注册、无水印，完全浏览器本地运行。',
    download: '下载 PNG',
    lblTitle: '书名', lblSubtitle: '副标题（可选）',
    lblAuthor: '作者名', lblTheme: '体裁主题',
    lblLayout: '标题位置', lblOverlay: '图片遮罩',
    lblPhoto: '封面插画（可选）', lblPalette: '快速配色',
    step1: '输入书名、可选副标题和作者名',
    step2: '选择体裁主题 — 悬疑、言情、科幻等',
    step3: '选择标题位置，可选上传封面插画',
    step4: '点击「下载 PNG」发布到 KDP 或在线分享',
  }
});

const { $, t } = GZ;

const THEMES = [
  // Mystery Noir
  { accent:'#d4af37', title:'#ffffff', sub:'#d4af37', author:'#d4af37', bg1:'#0d0d0d', bg2:'#2c1810', font:'Georgia, serif', weight:'900' },
  // Romance Blush
  { accent:'#c2185b', title:'#ffffff', sub:'#fff0f5', author:'#5a1d3a', bg1:'#ff8a9a', bg2:'#c2185b', font:'Georgia, serif', weight:'700' },
  // Sci-Fi Neon
  { accent:'#00ffe5', title:'#ffffff', sub:'#00ffe5', author:'#00ffe5', bg1:'#0a0a3a', bg2:'#5b00b0', font:'Verdana, sans-serif', weight:'900' },
  // Classic Serif
  { accent:'#8b0000', title:'#fdf6e3', sub:'#8b0000', author:'#2a2a2a', bg1:'#fdf6e3', bg2:'#e8dcc4', font:'Georgia, serif', weight:'700' },
  // Bold Modern
  { accent:'#ff6b35', title:'#ffffff', sub:'#ff6b35', author:'#ffffff', bg1:'#1a1a1a', bg2:'#444444', font:'Verdana, sans-serif', weight:'900' },
  // Children Pop
  { accent:'#ffe600', title:'#ffffff', sub:'#ffe600', author:'#1a1a1a', bg1:'#ff4081', bg2:'#3f51b5', font:'Verdana, sans-serif', weight:'900' },
];

let photoImg = null;

function wrap(ctx,text,maxW,font,fs,weight){
  ctx.font=`${weight} ${fs}px ${font}`;
  const words=text.split(' ');let line='';const lines=[];
  for(const w of words){const test=line?line+' '+w:w;if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=w}else line=test}
  if(line)lines.push(line);
  return lines;
}

function render(){
  const c=$('#canvas'),ctx=c.getContext('2d');
  c.width=1800;c.height=2700;
  const W=c.width,H=c.height;
  const th=THEMES[+$('#bookTheme').value];
  const overlay=parseFloat($('#overlay').value);
  const title=$('#bookTitle').value||'BOOK TITLE';
  const sub=$('#bookSubtitle').value;
  const author=$('#author').value||'AUTHOR';
  const layout=$('#titleLayout').value;

  // background
  if(photoImg){
    const ir=photoImg.width/photoImg.height, cr=W/H;
    let dw,dh,dx,dy;
    if(ir>cr){ dh=H; dw=H*ir; dx=(W-dw)/2; dy=0; }
    else { dw=W; dh=W/ir; dx=0; dy=(H-dh)/2; }
    ctx.drawImage(photoImg,dx,dy,dw,dh);
    if(overlay>0){ ctx.fillStyle=`rgba(0,0,0,${overlay})`; ctx.fillRect(0,0,W,H); }
  } else {
    const g=ctx.createLinearGradient(0,0,W,H);
    g.addColorStop(0,th.bg1); g.addColorStop(1,th.bg2);
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  }

  // top accent rule
  ctx.fillStyle=th.accent;
  ctx.fillRect(0,0,W,16);

  // TITLE block
  const titleSize=240;
  const titleLines=wrap(ctx,title,W-200,th.font,titleSize,th.weight);
  const subSize=72;
  const subLines=sub?wrap(ctx,sub,W-300,th.font,subSize,'400'):[];
  const authorSize=64;
  const blockH = titleLines.length*titleSize*1.05 + (subLines.length?(subLines.length*subSize*1.3+40):0);

  let titleY;
  if(layout==='top') titleY=300;
  else if(layout==='bottom') titleY=H-400-blockH-authorSize*2;
  else titleY=(H-blockH)/2 - authorSize;

  // optional scrim behind text for legibility
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.fillRect(0, titleY-60, W, blockH+authorSize*2+200);

  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillStyle=th.title;
  titleLines.forEach((ln,i)=>{
    ctx.font=`${th.weight} ${titleSize}px ${th.font}`;
    ctx.fillText(ln,W/2,titleY+i*titleSize*1.05);
  });
  let afterTitle=titleY+titleLines.length*titleSize*1.05;

  // subtitle
  if(subLines.length){
    afterTitle+=30;
    ctx.fillStyle=th.sub;
    subLines.forEach((ln,i)=>{
      ctx.font=`italic 400 ${subSize}px ${th.font}`;
      ctx.fillText(ln,W/2,afterTitle+i*subSize*1.3);
    });
    afterTitle+=subLines.length*subSize*1.3;
  }

  // accent line
  const lineY = afterTitle+50;
  ctx.fillStyle=th.accent;
  ctx.fillRect(W/2-100,lineY,200,6);

  // author at bottom
  ctx.fillStyle=th.author;
  ctx.font=`700 ${authorSize}px ${th.font}`;
  ctx.fillText(author, W/2, H-180);

  // small publisher mark
  ctx.fillStyle=th.accent;
  ctx.font='600 30px Verdana, sans-serif';
  ctx.fillText('★  GAMEZIPPER PRESS  ★', W/2, H-90);
}

function downloadPNG(){
  const link=document.createElement('a');
  const name=($('#bookTitle').value||'book').replace(/[^a-zA-Z0-9]/g,'_').toLowerCase()||'book';
  link.download=name+'-cover.png';
  link.href=$('#canvas').toDataURL('image/png');
  link.click();
}

function handlePhoto(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{ photoImg=img; render(); };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

// color palette buttons (override theme bg)
const PALETTES=[
  ['#0d0d0d','#2c1810'],['#ff8a9a','#c2185b'],['#0a0a3a','#5b00b0'],
  ['#fdf6e3','#e8dcc4'],['#1a1a1a','#444444'],['#ff4081','#3f51b5'],
  ['#1a3a5c','#4ecdc4'],['#5a1d3a','#ff6b6b'],['#2c5364','#0f2027'],
  ['#ff6a00','#ee0979'],['#06beb0','#48b1bf'],['#232526','#414345'],
];
$('#themes').innerHTML=PALETTES.map((p,i)=>`<button data-i="${i}" style="background:linear-gradient(135deg,${p[0]},${p[1]})" title="${p[0]} → ${p[1]}"></button>`).join('');
$('#themes').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  const p=PALETTES[+b.dataset.i];
  const cur=THEMES[+$('#bookTheme').value];
  cur.bg1=p[0]; cur.bg2=p[1];
  photoImg=null; $('#photo').value='';
  $('#themes').querySelectorAll('button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  render();
});

$('#lbl-title').textContent=t('lblTitle');
$('#lbl-subtitle').textContent=t('lblSubtitle');
$('#lbl-author').textContent=t('lblAuthor');
$('#lbl-theme').textContent=t('lblTheme');
$('#lbl-layout').textContent=t('lblLayout');
$('#lbl-overlay').textContent=t('lblOverlay');
$('#lbl-photo').textContent=t('lblPhoto');
$('#lbl-palette').textContent=t('lblPalette');

['bookTitle','bookSubtitle','author'].forEach(id=>$('#'+id).addEventListener('input',render));
['bookTheme','titleLayout','overlay'].forEach(id=>$('#'+id).addEventListener('change',render));
$('#photo').addEventListener('change',handlePhoto);

render();

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="downloadPNG()">⬇️ ${t('download')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/image/magazine-cover.html', name:'Magazine Cover Maker'},
    {icon:'🎨', href:'/image/logo-maker.html', name:'Logo Maker'},
    {icon:'🖼️', href:'/image/poster-maker.html', name:'Poster Maker'},
    {icon:'📢', href:'/image/banner-maker.html', name:'Banner Maker'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
