const { $, copyText, t } = GZ;

// Vowel sets (lowercased, plus accented Latin)
const VOWEL_BASE='aeiouร -รขรคร รกรฃรครฅรฆรจรฉรชรซรฌรญรฎรฏรฒรณรดรตรถรธรนรบรปรผรฟลรฆaeiou';
function isVowelChar(ch, yAsVowel){
  if(!ch) return false;
  const c=ch.toLowerCase();
  if('aeiou'.includes(c)) return true;
  if(yAsVowel && c==='y') return true;
  // accented vowels (decomposed check)
  if(/[ร -รขรคะฐรกรฃรฅรฆรจรฉรชรซรฌรญรฎรฏรฒรณรดรตรถรธรนรบรปรผรฟล]/.test(c)) return true;
  return false;
}
function isLetter(ch){
  return /[a-zร -รฟ]/i.test(ch);
}
function isConsonantChar(ch, yAsVowel){
  if(!isLetter(ch)) return false;
  return !isVowelChar(ch, yAsVowel);
}

function analyze(){
  const txt=$('#input').value;
  const yVowel=$('#optY').checked;
  const ignoreDigits=$('#optDigits').checked;

  let vowels=0, consonants=0, letters=0, digits=0, spaces=0, other=0;
  const vowelMap={};
  const letterMap={};
  const uniqueLetters=new Set();

  for(const ch of txt){
    if(ch===' '||ch==='\t'||ch==='\n'||ch==='\r'){ spaces++; continue; }
    if(/[0-9]/.test(ch)){
      if(!ignoreDigits) digits++;
      continue;
    }
    if(isLetter(ch)){
      letters++;
      const lc=ch.toLowerCase();
      uniqueLetters.add(lc);
      letterMap[lc]=(letterMap[lc]||0)+1;
      if(isVowelChar(ch, yVowel)){
        vowels++;
        vowelMap[lc]=(vowelMap[lc]||0)+1;
      } else if(isConsonantChar(ch, yVowel)){
        consonants++;
      } else {
        other++;
      }
    } else {
      other++;
    }
  }

  const words=(txt.match(/\S+/g)||[]).length;
  const chars=txt.length;
  const totalLetters=vowels+consonants;

  renderStats({vowels, consonants, letters, digits, spaces, other, words, chars, unique:uniqueLetters.size, totalLetters});
  renderVowelChips(vowelMap, yVowel);
  renderBars(letterMap);
}

function pct(n, total){
  if(!total) return '0%';
  return ((n/total)*100).toFixed(1)+'%';
}

function renderStats(s){
  const items=[
    {num:s.vowels, lbl:t('vowels'), sub: pct(s.vowels, s.totalLetters)},
    {num:s.consonants, lbl:t('consonants'), sub: pct(s.consonants, s.totalLetters)},
    {num:s.unique, lbl:t('unique'), sub:''},
    {num:s.letters, lbl:t('letters'), sub:''},
    {num:s.digits, lbl:t('digits'), sub:''},
    {num:s.spaces, lbl:t('spaces'), sub:''},
    {num:s.words, lbl:t('words'), sub:''},
    {num:s.chars, lbl:t('chars'), sub:''},
  ];
  $('#stats').innerHTML=items.map(it=>`
    <div class="vc-card">
      <div class="num">${it.num}</div>
      <div class="lbl">${it.lbl}</div>
      ${it.sub?`<div class="pct">${it.sub}</div>`:''}
    </div>`).join('');
}

function renderVowelChips(map, yVowel){
  const keys=Object.keys(map).sort();
  if(!keys.length){ $('#vowel-chips').innerHTML=''; return; }
  const total=keys.reduce((a,k)=>a+map[k],0);
  const chips=keys.map(k=>`
    <div class="vc-vchip">
      <span class="letter">${k.toUpperCase()}</span>
      <span class="count">${map[k]} (${pct(map[k],total)})</span>
    </div>`).join('');
  $('#vowel-chips').innerHTML=`
    <div style="text-align:center;font-size:.9em;opacity:.8;margin-bottom:6px">${t('vowelBreakdown')}${yVowel?' (Y included)':''}</div>
    <div class="vc-vowels">${chips}</div>
  `;
}

function renderBars(map){
  const entries=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,10);
  if(!entries.length){ $('#bars').innerHTML=''; return; }
  const max=entries[0][1];
  const total=entries.reduce((a,[,v])=>a+v,0);
  const bars=entries.map(([k,v])=>`
    <div class="vc-barwrap">
      <div class="vc-barlabel">
        <span><b style="color:var(--gz-accent)">${k.toUpperCase()}</b> โ ${v} (${pct(v,total)})</span>
        <span style="opacity:.6">${pct(v,max)}</span>
      </div>
      <div class="vc-bar"><div class="vc-barfill" style="width:${(v/max)*100}%"></div></div>
    </div>`).join('');
  $('#bars').innerHTML=`
    <h3 style="font-size:1em;margin:14px 0 6px">${t('letterFreq')}</h3>
    ${bars}
  `;
}

function loadExample(){
  $('#input').value='The quick brown fox jumps over the lazy dog. Pack my box with five dozen liquor jugs! 12345';
  analyze();
}
function doClear(){ $('#input').value=''; analyze(); }
function copyStats(){
  const txt=$('#stats').innerText.replace(/\n{2,}/g,'\n').trim();

`;
$('#optY').onchange=analyze;

analyze();
