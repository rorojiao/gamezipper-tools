<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Prorated Rent Calculator","description":"Prorated Rent Calculator — calculate how much rent to pay when moving in or out mid-month using days-in-month, 30-day banker's month, or days-in-year methods.","url":"https://tools.gamezipper.com/calc/prorated-rent-calculator.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is prorated rent calculated?", "acceptedAnswer": {"@type": "Answer", "text": "The most common method is: (Monthly Rent / Days in Month) x Days Occupied. For example, $1,200 rent in a 30-day month, moving in on the 21st (10 days) = (1200/30) x 10 = $400."}}, {"@type": "Question", "name": "Which proration method do landlords use?", "acceptedAnswer": {"@type": "Answer", "text": "It varies. Many use actual days in the billing month. Some use a flat 30-day banker's month for consistency, and commercial leases often use days-in-year (annual rent / 365 x days). Always confirm the method in your lease."}}, {"@type": "Question", "name": "Is prorated rent required by law?", "acceptedAnswer": {"@type": "Answer", "text": "Not everywhere. Some states and cities require prorated rent by statute, while others leave it to the lease agreement. If your lease is silent, proration is typically negotiated between tenant and landlord."}}, {"@type": "Question", "name": "Is my rent information private?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Every calculation runs entirely in your browser. No rent amount, dates or addresses are ever sent to any server."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-form" id="form">
      <div>
        <label id="lbl-rent"></label>
        <input type="number" id="rent" value="1200" min="0" step="50">
      </div>
      <div class="row2">
        <div>
          <label id="lbl-movein"></label>
          <input type="date" id="moveIn">
        </div>
        <div>
          <label id="lbl-moveout"></label>
          <input type="date" id="moveOut">
        </div>
      </div>
      <div>
        <label id="lbl-method"></label>
        <select id="method">
          <option value="month">Days in the billing month (most common)</option>
          <option value="banker">30-day banker's month (flat)</option>
          <option value="year">Days in year (annual / 365)</option>
        </select>
      </div>
      <div>
        <label id="lbl-billing"></label>
        <select id="billingMonth">
          <option value="">—</option>
        </select>
      </div>
      <div>
        <label id="lbl-currency"></label>
        <select id="currency">
          <option value="$">USD ($)</option>
          <option value="€">EUR (€)</option>
          <option value="£">GBP (£)</option>
          <option value="¥">CNY (¥)</option>
          <option value="₹">INR (₹)</option>
          <option value="A$">AUD (A$)</option>
          <option value="C$">CAD (C$)</option>
        </select>
      </div>
      <button class="gz-btn" id="calc-btn" onclick="calculate()"></button>
    </div>
    <div id="result"></div>
    <p class="note" id="note"></p>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Prorated Rent Calculator',
    toolDesc: 'Calculate how much rent to pay when you move in or out mid-month. Compare three common proration methods and see the daily rate instantly.',
    lblRent: 'Monthly rent',
    lblMovein: 'Move-in date (first day)',
    lblMoveout: 'Move-out date (last day)',
    lblMethod: 'Proration method',
    lblBilling: 'Billing month (move-in month)',
    lblCurrency: 'Currency',
    calc: 'Calculate',
    dailyRate: 'Daily rate',
    daysBilled: 'Days billed',
    totalLine: 'Prorated rent due',
    monthUsed: 'Basis used',
    note: 'Estimates only — not legal advice. "Days billed" counts the move-in day as day 1 and includes the move-out day. Always confirm the method and dates with your lease or landlord.',
    step1: 'Enter your full monthly rent amount.',
    step2: 'Pick the move-in (or move-out) date and the billing month.',
    step3: 'Choose a proration method: days-in-month, 30-day flat, or days-in-year.',
    step4: 'Click Calculate to see the daily rate and the prorated rent due.',
  },
  zh: {
    toolTitle: '按比例租金计算器',
    toolDesc: '计算月中搬入或搬出时应付多少租金。支持三种常见按比例计算方法，并即时显示日租金。',
    lblRent: '月租金',
    lblMovein: '搬入日期（第一天）',
    lblMoveout: '搬出日期（最后一天）',
    lblMethod: '计算方法',
    lblBilling: '计费月份（搬入月）',
    lblCurrency: '货币',
    calc: '计算',
    dailyRate: '日租金',
    daysBilled: '计费天数',
    totalLine: '应付按比例租金',
    monthUsed: '计算基准',
    note: '仅为估算，不构成法律建议。「计费天数」将搬入日计为第 1 天，并包含搬出日。计算方法和日期请以租约或房东确认为准。',
    step1: '输入完整月租金。',
    step2: '选择搬入（或搬出）日期和计费月份。',
    step3: '选择计算方法：按当月天数、固定 30 天或按全年天数。',
    step4: '点击「计算」查看日租金和应付租金。',
  }
});

const { $, t } = GZ;
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const now = new Date();
const bm = $('#billingMonth');
for (let y = now.getFullYear() - 1; y <= now.getFullYear() + 1; y++) {
  for (let m = 0; m < 12; m++) {
    const v = `${y}-${String(m+1).padStart(2,'0')}`;
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = `${MONTHS[m]} ${y}`;
    bm.appendChild(opt);
  }
}
bm.value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
$('#moveIn').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-15`;

function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }

function money(v, cur) {
  return cur + (Math.round(v * 100) / 100).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function calculate() {
  const rent = parseFloat($('#rent').value);
  const bmVal = $('#billingMonth').value;
  const moveIn = $('#moveIn').value;
  const method = $('#method').value;
  const cur = $('#currency').value;
  if (isNaN(rent) || !bmVal) { $('#result').innerHTML = ''; return; }

  const [by, bm0] = bmVal.split('-').map(Number);
  const dim = daysInMonth(by, bm0 - 1);
  let basis, denom;
  if (method === 'banker') { basis = '30'; denom = 30; }
  else if (method === 'year') { const diy = ((by % 4 === 0 && by % 100 !== 0) || by % 400 === 0) ? 366 : 365; basis = String(diy); denom = diy; rent ? null : null; const annual = rent * 12; }
  else { basis = String(dim); denom = dim; }

  // days billed within the billing month
  let days = 0;
  if (moveIn) {
    const [yy, ym, yd] = moveIn.split('-').map(Number);
    if (yy === by && ym === bm0) {
      days = dim - yd + 1; // includes move-in day
    } else if (!isNaN(rent)) {
      days = dim;
    }
  } else {
    days = dim;
  }
  days = Math.min(days, dim);
  if (days < 1) days = dim;

  let total;
  if (method === 'year') {
    const diy = ((by % 4 === 0 && by % 100 !== 0) || by % 400 === 0) ? 366 : 365;
    const annual = rent * 12;
    const daily = annual / diy;
    total = daily * days;
    basis = String(diy);
  } else {
    const daily = rent / denom;
    total = daily * days;
  }
  const daily = (method === 'year') ? (rent * 12) / (((by % 4 === 0 && by % 100 !== 0) || by % 400 === 0) ? 366 : 365) : rent / denom;

  $('#result').innerHTML = `<div class="result-card"><div class="big">${money(total,cur)}</div><div class="label">${t('totalLine')}</div>
    <div class="result-grid">
      <div class="result-item"><div class="val">${money(daily,cur)}</div><div class="lbl">${t('dailyRate')}</div></div>
      <div class="result-item"><div class="val">${days}</div><div class="lbl">${t('daysBilled')}</div></div>
      <div class="result-item"><div class="val">${basis}</div><div class="lbl">${t('monthUsed')}</div></div>
      <div class="result-item"><div class="val">${money(rent,cur)}</div><div class="lbl">${t('lblRent')}</div></div>
    </div></div>`;
}

['rent','moveIn','method','billingMonth','currency'].forEach(id => {
  const el = $('#' + id);
  el.addEventListener('input', calculate);
  el.addEventListener('change', calculate);
});
$('#lbl-rent').textContent = t('lblRent');
$('#lbl-movein').textContent = t('lblMovein');
$('#lbl-moveout').textContent = t('lblMoveout');
$('#lbl-method').textContent = t('lblMethod');
$('#lbl-billing').textContent = t('lblBilling');
$('#lbl-currency').textContent = t('lblCurrency');
$('#calc-btn').textContent = t('calc');
$('#note').textContent = t('note');
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏠', href:'/calc/rent-vs-buy.html', name:'Rent vs Buy'},
    {icon:'🏦', href:'/calc/mortgage-calculator.html', name:'Mortgage'},
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calc'},
    {icon:'💲', href:'/calc/tip-calculator.html', name:'Tip'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
