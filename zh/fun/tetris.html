<script>
GZI18n.register({
  en: {
    tetrisTitle: 'Tetris Online — Classic Block Puzzle',
    tetrisDesc: 'Play the legendary Tetris game in your browser. Stack falling tetrominoes, clear lines, level up and chase a high score. Free, no signup — keyboard and touch supported.',
    score: 'Score', lines: 'Lines', level: 'Level', next: 'Next',
    gameOver: 'Game Over', paused: 'Paused', playAgain: 'Play again', newGame: 'New Game',
    pause: '⏸ Pause', resume: '▶ Resume',
    tip: '← → move · ↑ rotate · ↓ soft-drop · Space hard-drop · P pause',
    step1: 'Move falling pieces left/right and rotate them to fit gaps',
    step2: 'Fill a complete horizontal row to clear it and earn points',
    step3: 'Every 10 cleared lines increases your level and drop speed',
    step4: 'Keep the stack below the top — game ends when blocks reach the ceiling',
  },
  zh: {
    tetrisTitle: '俄罗斯方块 — 经典方块消除游戏',
    tetrisDesc: '在浏览器中玩传奇俄罗斯方块。堆叠下落的方块、消除整行、提升等级并挑战高分。免费、无需注册，支持键盘和触屏。',
    score: '分数', lines: '消行', level: '等级', next: '下一个',
    gameOver: '游戏结束', paused: '已暂停', playAgain: '再玩一次', newGame: '新游戏',
    pause: '⏸ 暂停', resume: '▶ 继续',
    tip: '← → 移动 · ↑ 旋转 · ↓ 软降 · 空格 硬降 · P 暂停',
    step1: '左右移动下落的方块并旋转以填满空隙',
    step2: '填满一整行即可消除并得分',
    step3: '每消除 10 行等级提升一级，下落速度加快',
    step4: '保持堆叠不触顶 — 方块堆到顶端即游戏结束',
  }
});

const {t,$} = GZ;
const COLS = 10, ROWS = 20;
const COLORS = {I:'#00f0f0',O:'#f0f000',T:'#a000f0',S:'#00f000',Z:'#f00000',J:'#0000f0',L:'#f0a000'};
const SHAPES = {
  I:[[1,1,1,1]],
  O:[[1,1],[1,1]],
  T:[[0,1,0],[1,1,1]],
  S:[[0,1,1],[1,1,0]],
  Z:[[1,1,0],[0,1,1]],
  J:[[1,0,0],[1,1,1]],
  L:[[0,0,1],[1,1,1]]
};
const TYPES = Object.keys(SHAPES);

let board, cur, nextType, score, lines, level, gameOver, paused, dropTimer, dropInterval, lastTime;

function emptyBoard(){return Array.from({length:ROWS},()=>Array(COLS).fill(null));}
function randomType(){return TYPES[Math.floor(Math.random()*TYPES.length)];}
function makePiece(type){
  const shape = SHAPES[type].map(r=>r.slice());
  return {type, shape, x:Math.floor((COLS-shape[0].length)/2), y:0};
}
function rotateShape(shape){
  const rows = shape.length, cols = shape[0].length;
  const out = Array.from({length:cols},()=>Array(rows).fill(0));
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)out[c][rows-1-r]=shape[r][c];
  return out;
}
function collides(piece, nx, ny, shape){
  shape = shape || piece.shape;
  for(let r=0;r<shape.length;r++)for(let c=0;c<shape[r].length;c++){
    if(!shape[r][c])continue;
    const x=nx+c, y=ny+r;
    if(x<0||x>=COLS||y>=ROWS)return true;
    if(y>=0 && board[y][x])return true;
  }
  return false;
}
function merge(piece){
  for(let r=0;r<piece.shape.length;r++)for(let c=0;c<piece.shape[r].length;c++){
    if(piece.shape[r][c]){
      const y=piece.y+r, x=piece.x+c;
      if(y>=0)board[y][x]=piece.type;
    }
  }
}
function clearLines(){
  let cleared=0;
  for(let r=ROWS-1;r>=0;r--){
    if(board[r].every(v=>v)){
      board.splice(r,1); board.unshift(Array(COLS).fill(null));
      cleared++; r++;
    }
  }
  if(cleared){
    lines+=cleared;
    const pts=[0,100,300,500,800][cleared]*level;
    score+=pts;
    const newLevel=Math.floor(lines/10)+1;
    if(newLevel>level){level=newLevel;dropInterval=Math.max(80,800-(level-1)*70);}
  }
}
function spawn(){
  cur = makePiece(nextType);
  nextType = randomType();
  if(collides(cur,cur.x,cur.y)){gameOver=true;showOverlay('gameOver');}
}
function drop(){
  if(!collides(cur,cur.x,cur.y+1)){cur.y++;return;}
  merge(cur);clearLines();spawn();render();renderNext();
}
function moveLeft(){if(!gameOver&&!paused&&!collides(cur,cur.x-1,cur.y)){cur.x--;render();}}
function moveRight(){if(!gameOver&&!paused&&!collides(cur,cur.x+1,cur.y)){cur.x++;render();}}
function softDrop(){if(!gameOver&&!paused){drop();}}
function rotate(){
  if(gameOver||paused)return;
  const ns = rotateShape(cur.shape);
  for(const off of [0,-1,1,-2,2]){
    if(!collides(cur,cur.x+off,cur.y,ns)){cur.shape=ns;cur.x+=off;render();return;}
  }
}
function hardDrop(){
  if(gameOver||paused)return;
  while(!collides(cur,cur.x,cur.y+1)){cur.y++;score+=2;}
  drop();
}
function togglePause(){
  if(gameOver)return;
  paused=!paused;
  $('#pauseBtn').textContent=t(paused?'resume':'pause');
  if(paused)showOverlay('paused');else $('#overlay').classList.add('hidden');
}
function render(){
  const boardEl=$('#board');
  // Build cells once for overlay layering
  if(!boardEl._cells){
    boardEl._cells=[];
    for(let i=0;i<ROWS*COLS;i++){
      const c=document.createElement('div');
      c.className='tetris-cell';
      boardEl.appendChild(c);
      boardEl._cells.push(c);
    }
  }
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const cell=boardEl._cells[r*COLS+c];
    const v=board[r][c];
    cell.className='tetris-cell'+(v?' filled':'');
    cell.style.background = v ? COLORS[v] : 'transparent';
  }
  // Draw current piece on top
  if(cur){
    for(let r=0;r<cur.shape.length;r++)for(let c=0;c<cur.shape[r].length;c++){
      if(cur.shape[r][c]){
        const y=cur.y+r, x=cur.x+c;
        if(y>=0&&y<ROWS&&x>=0&&x<COLS){
          const cell=boardEl._cells[y*COLS+x];
          cell.className='tetris-cell filled';
          cell.style.background=COLORS[cur.type];
        }
      }
    }
  }
  $('#score').textContent=score;
  $('#lines').textContent=lines;
  $('#level').textContent=level;
}
function renderNext(){
  const el=$('#next');
  el.innerHTML='';
  const shape=SHAPES[nextType];
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    const cell=document.createElement('div');
    cell.className='tetris-pcell';
    if(r<shape.length&&c<shape[0].length&&shape[r][c]){
      cell.className='tetris-pcell filled';
      cell.style.background=COLORS[nextType];
    }
    el.appendChild(cell);
  }
}
function showOverlay(key){
  $('#overlayText').textContent=t(key);
  $('#overlayBtn').textContent=t('playAgain');
  $('#overlay').classList.remove('hidden');
}
function start(){
  board=emptyBoard();score=0;lines=0;level=1;gameOver=false;paused=false;
  dropInterval=800;lastTime=0;nextType=randomType();
  spawn();render();renderNext();
  $('#overlay').classList.add('hidden');
  $('#pauseBtn').textContent=t('pause');
}
function loop(time){
  if(!lastTime)lastTime=time;
  const dt=time-lastTime;
  lastTime=time;
  if(!gameOver&&!paused){
    dropTimer=(dropTimer||0)+dt;
    if(dropTimer>=dropInterval){dropTimer=0;drop();}
    render();renderNext();
  }
  requestAnimationFrame(loop);
}

$('#lblScore').textContent=t('score');
$('#lblLines').textContent=t('lines');
$('#lblLevel').textContent=t('level');
$('#lblNext').textContent=t('next');
$('#startBtn').textContent=t('newGame');
$('#tip').textContent=t('tip');

window.start=start;window.togglePause=togglePause;
window.moveLeft=moveLeft;window.moveRight=moveRight;
window.rotate=rotate;window.hardDrop=hardDrop;window.softDrop=softDrop;

document.addEventListener('keydown',e=>{
  const k=e.key;
  if(k==='ArrowLeft'||k==='a'){e.preventDefault();moveLeft();}
  else if(k==='ArrowRight'||k==='d'){e.preventDefault();moveRight();}
  else if(k==='ArrowUp'||k==='w'){e.preventDefault();rotate();}
  else if(k==='ArrowDown'||k==='s'){e.preventDefault();softDrop();}
  else if(k===' '){e.preventDefault();hardDrop();}
  else if(k==='p'||k==='P'){e.preventDefault();togglePause();}
});

// Touch: tap halves to move, swipe up rotate, swipe down soft-drop, tap center hard-drop
let tsx,tsy,tst;
const boardEl=$('#board');
boardEl.addEventListener('touchstart',e=>{tsx=e.touches[0].clientX;tsy=e.touches[0].clientY;tst=Date.now();},{passive:true});
boardEl.addEventListener('touchend',e=>{
  if(tsx==null)return;
  const dx=e.changedTouches[0].clientX-tsx, dy=e.changedTouches[0].clientY-tsy;
  const adx=Math.abs(dx),ady=Math.abs(dy);
  if(adx<12&&ady<12){
    // tap
    const rect=boardEl.getBoundingClientRect();
    const relX=(tsx-rect.left)/rect.width;
    if(relX<0.4)moveLeft();else if(relX>0.6)moveRight();else hardDrop();
  } else if(adx>ady){
    if(dx>20)moveRight();else if(dx<-20)moveLeft();
  } else {
    if(dy<-20)rotate();else if(dy>20)softDrop();
  }
  tsx=tsy=null;
},{passive:true});

start();
requestAnimationFrame(loop);

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'tetrisTitle',
  descKey: 'tetrisDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔢', href:'/fun/2048.html', name:'2048'},
    {icon:'🧩', href:'/fun/sudoku.html', name:'Sudoku'},
    {icon:'🐍', href:'/fun/snake.html', name:'Snake'},
    {icon:'🟩', href:'/fun/wordle.html', name:'Wordle'},
  ]
});
</script>
