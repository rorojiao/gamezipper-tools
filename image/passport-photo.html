<script>
GZI18n.register({

    dimInfo: '拖动绿色框将头部放在安全区域内。',
    downloadSingle: '下载照片',
    downloadSheet: '下载 4×6 排版',
    reset: '重置',
    changeImage: '更换图片',
    lblW: '宽度 (px)',
    lblH: '高度 (px)',
    lblBg: '背景',
    step1: '上传清晰、光线充足的正面照片（无眼镜、中性表情）',
    step2: '为证件选择预设尺寸（护照、签证、身份证等）',
    step3: '拖动绿色框将头部放在安全区域内',
    step4: '选择背景色，下载单张照片或打印排版图',
  }
});

const { $, t } = GZ;

const PRESETS = [
  {n:'US Passport (2×2″)',w:600,h:600},
  {n:'US Visa (2×2″)',w:600,h:600},
  {n:'Schengen Visa (35×45mm)',w:413,h:531},
  {n:'UK Passport (35×45mm)',w:413,h:531},
  {n:'China Passport (33×48mm)',w:390,h:566},
  {n:'China Visa (33×48mm)',w:390,h:566},
  {n:'India Passport (35×45mm)',w:413,h:531},
  {n:'Canada Passport (5×7cm)',w:590,h:826},
  {n:'Australia Passport (35×45mm)',w:413,h:531},
  {n:'Japan Visa (35×45mm)',w:413,h:531},
  {n:'Korea Visa (35×45mm)',w:413,h:531},
  {n:'Brazil Passport (5×7cm)',w:590,h:826},
  {n:'Germany ID (35×45mm)',w:413,h:531},
  {n:'France ID (35×45mm)',w:413,h:531},
  {n:'Italy ID (35×45mm)',w:413,h:531},
  {n:'Spain ID (32×26mm)',w:378,h:307},
  {n:'Russia Visa (35×45mm)',w:413,h:531},
  {n:'LinkedIn Profile (400×400)',w:400,h:400},
  {n:'Resume Photo (1×1.25″)',w:300,h:375},
  {n:'Resume Photo 2×2.5″',w:240,h:300},
  {n:'Resume Photo 2×2″',w:200,h:200},
  {n:'CV Photo 35×45mm',w:413,h:531},
];

let imgEl = null, originalImg = null;
let cropState = { x: 0, y: 0, w: 200, h: 200 };
let currentPreset = 0;

function renderPresets() {
  $('#dim-grid').innerHTML = PRESETS.map((p, i) => `<div class="dim-btn${i===currentPreset?' active':''}" data-i="${i}">${p.n}</div>`).join('');
  document.querySelectorAll('.dim-btn').forEach(el => {
    el.addEventListener('click', () => {
      currentPreset = +el.dataset.i;
      $('#custom-w').value = PRESETS[currentPreset].w;
      $('#custom-h').value = PRESETS[currentPreset].h;
      document.querySelectorAll('.dim-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      updateCropAspect();
      renderAll();
    });
  });
  $('#custom-w').value = PRESETS[0].w;
  $('#custom-h').value = PRESETS[0].h;
}

function updateCropAspect() {
  const aspect = (+$('#custom-w').value) / (+$('#custom-h').value);
  if (!imgEl) return;
  const stageRect = imgEl.getBoundingClientRect();
  const targetW = Math.min(stageRect.width * 0.7, stageRect.width);
  const targetH = targetW / aspect;
  cropState.w = targetW;
  cropState.h = Math.min(targetH, stageRect.height * 0.85);
  cropState.x = (stageRect.width - cropState.w) / 2;
  cropState.y = (stageRect.height - cropState.h) / 2;
  updateFrame();
}

function updateFrame() {
  const f = $('#crop-frame');
  f.style.left = cropState.x + 'px';
  f.style.top = cropState.y + 'px';
  f.style.width = cropState.w + 'px';
  f.style.height = cropState.h + 'px';
  renderAll();
}

function renderAll() {
  if (!originalImg) return;
  renderSingle();
  renderSheet();
}

function renderSingle() {
  const c = $('#canvas-single');
  const w = +$('#custom-w').value;
  const h = +$('#custom-h').value;
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.fillStyle = $('#bg-color').value;
  ctx.fillRect(0, 0, w, h);
  const stageRect = imgEl.getBoundingClientRect();
  if (stageRect.width === 0) return;
  const scaleX = originalImg.naturalWidth / stageRect.width;
  const scaleY = originalImg.naturalHeight / stageRect.height;
  const sx = cropState.x * scaleX;
  const sy = cropState.y * scaleY;
  const sw = cropState.w * scaleX;
  const sh = cropState.h * scaleY;
  ctx.drawImage(originalImg, sx, sy, sw, sh, 0, 0, w, h);
}

function renderSheet() {
  const c = $('#canvas-sheet');
  const w = +$('#custom-w').value;
  const h = +$('#custom-h').value;
  const sheetW = 1200; // 4 inch @ 300 dpi
  const sheetH = 1800; // 6 inch @ 300 dpi
  c.width = sheetW; c.height = sheetH;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, sheetW, sheetH);
  // grid
  const gap = 9; // ~3mm
  let x = gap, y = gap;
  const photoAspect = w / h;
  const maxRowH = 350;
  let ph = maxRowH;
  let pw = ph * photoAspect;
  if (pw > sheetW - 2*gap) {
    pw = sheetW - 2*gap;
    ph = pw / photoAspect;
  }
  let count = 0;
  while (y + ph <= sheetH - gap && x + pw <= sheetW - gap) {
    drawPhotoTo(ctx, x, y, pw, ph);
    x += pw + gap;
    if (x + pw > sheetW - gap) { x = gap; y += ph + gap; }
    count++;
    if (count > 30) break;
  }
}

function drawPhotoTo(ctx, x, y, w, h) {
  if (!originalImg) return;
  const stageRect = imgEl.getBoundingClientRect();
  if (stageRect.width === 0) return;
  const scaleX = originalImg.naturalWidth / stageRect.width;
  const scaleY = originalImg.naturalHeight / stageRect.height;
  const sx = cropState.x * scaleX;
  const sy = cropState.y * scaleY;
  const sw = cropState.w * scaleX;
  const sh = cropState.h * scaleY;
  ctx.drawImage(originalImg, sx, sy, sw, sh, x, y, w, h);
}

function downloadCanvas(id, filename) {
  const c = $('#'+id);
  const a = document.createElement('a');
  a.download = filename;
  a.href = c.toDataURL('image/png');
  a.click();
}

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      originalImg = img;
      imgEl = $('#img');
      imgEl.src = e.target.result;
      $('#work-area').style.display = 'block';
      $('#upload-zone').style.display = 'none';
      setTimeout(() => { updateCropAspect(); renderAll(); }, 100);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function makeDragHandlers() {
  let dragging = null, startX, startY, startCrop;
  $('#crop-frame').addEventListener('mousedown', e => {
    const target = e.target.dataset?.handle;
    dragging = target || 'move';
    startX = e.clientX; startY = e.clientY;
    startCrop = {...cropState};
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    if (dragging === 'move') {
      cropState.x = Math.max(0, Math.min(imgEl.clientWidth - cropState.w, startCrop.x + dx));
      cropState.y = Math.max(0, Math.min(imgEl.clientHeight - cropState.h, startCrop.y + dy));
    } else if (dragging === 'br') {
      cropState.w = Math.max(50, startCrop.w + dx);
      cropState.h = Math.max(50, startCrop.h + dy);
    } else if (dragging === 'tr') {
      cropState.w = Math.max(50, startCrop.w + dx);
      cropState.h = Math.max(50, startCrop.h - dy);
      cropState.y = startCrop.y + (startCrop.h - cropState.h);
    } else if (dragging === 'bl') {
      cropState.w = Math.max(50, startCrop.w - dx);
      cropState.h = Math.max(50, startCrop.h + dy);
      cropState.x = startCrop.x + (startCrop.w - cropState.w);
    } else if (dragging === 'tl') {
      cropState.w = Math.max(50, startCrop.w - dx);
      cropState.h = Math.max(50, startCrop.h - dy);
      cropState.x = startCrop.x + (startCrop.w - cropState.w);
      cropState.y = startCrop.y + (startCrop.h - cropState.h);
    }
    updateFrame();
  });
  document.addEventListener('mouseup', () => dragging = null);
}

function resetAll() {
  $('#work-area').style.display = 'none';
  $('#upload-zone').style.display = 'block';
  $('#file').value = '';
  originalImg = null;
  $('#img').src = '';
}

$('#upload-zone').addEventListener('click', () => $('#file').click());
$('#file').addEventListener('change', e => handleFile(e.target.files[0]));
$('#upload-zone').addEventListener('dragover', e => { e.preventDefault(); $('#upload-zone').classList.add('drag'); });
$('#upload-zone').addEventListener('dragleave', () => $('#upload-zone').classList.remove('drag'));
$('#upload-zone').addEventListener('drop', e => {
  e.preventDefault();
  $('#upload-zone').classList.remove('drag');
  handleFile(e.dataTransfer.files[0]);
});
$('#custom-w').addEventListener('change', updateCropAspect);
$('#custom-h').addEventListener('change', updateCropAspect);
$('#bg-color').addEventListener('change', renderAll);

renderPresets();
makeDragHandlers();

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="resetAll()">🔄 ${t('reset')}</button>
  <button class="gz-btn" onclick="downloadCanvas('canvas-single','passport-photo.png')">💾 ${t('downloadSingle')}</button>
  <button class="gz-btn" onclick="downloadCanvas('canvas-sheet','passport-sheet-4x6.png')">🖨️ ${t('downloadSheet')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',

    {icon:'⭕', href:'/image/circle-cropper.html', name:'Circle Cropper'},
    {icon:'📐', href:'/image/resizer.html', name:'Image Resizer'},
    {icon:'📱', href:'/image/social-media-resizer.html', name:'Social Resizer'},
  ]
});
</script>
