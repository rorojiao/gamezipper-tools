<script>
GZI18n.register({
  en: {
    toolTitle: 'Wallpaper Generator',
    toolDesc: 'Generate beautiful abstract wallpapers for desktop and mobile. Customize colors, style and resolution. Free download as PNG.',
    style: 'Style',
    gradient: 'Gradient',
    mesh: 'Mesh Gradient',
    circles: 'Circles',
    waves: 'Waves',
    triangles: 'Triangles',
    bokeh: 'Bokeh',
    resolution: 'Resolution',
    desktop: 'Desktop (1920×1080)',
    mobile: 'Mobile (1080×1920)',
    tablet: 'Tablet (2048×1536)',
    fourK: '4K (3840×2160)',
    custom: 'Custom',
    colors: 'Colors',
    step1: 'Choose a style: Gradient, Mesh, Circles, Waves, Triangles or Bokeh',
    step2: 'Pick your colors (up to 4)',
    step3: 'Select a resolution preset or enter custom dimensions',
    step4: 'Click Generate to create, then Download to save as PNG',
  },
  zh: {
    toolTitle: '壁纸生成器',
    toolDesc: '生成精美的抽象壁纸，适用于桌面和手机。自定义颜色、风格和分辨率。免费下载 PNG。',
    style: '风格',
    gradient: '渐变',
    mesh: '网格渐变',
    circles: '圆形',
    waves: '波浪',
    triangles: '三角形',
    bokeh: '光斑',
    resolution: '分辨率',
    desktop: '桌面 (1920×1080)',
    mobile: '手机 (1080×1920)',
    tablet: '平板 (2048×1536)',
    fourK: '4K (3840×2160)',
    custom: '自定义',
    colors: '颜色',
    step1: '选择风格：渐变、网格渐变、圆形、波浪、三角形或光斑',
    step2: '选择颜色（最多4种）',
    step3: '选择分辨率预设或输入自定义尺寸',
    step4: '点击生成，然后下载为 PNG',
  }
});

const { $, t } = GZ;
const canvas = $('#wall-canvas');
const ctx = canvas.getContext('2d');
let W = 1920, H = 1080;

const defaultColors = ['#667eea','#764ba2','#f093fb','#f5576c'];

$('#controls').innerHTML = `
  <label>${t('style')} <select id="wp-style">
    <option value="gradient">${t('gradient')}</option>
    <option value="mesh">${t('mesh')}</option>
    <option value="circles">${t('circles')}</option>
    <option value="waves">${t('waves')}</option>
    <option value="triangles">${t('triangles')}</option>
    <option value="bokeh">${t('bokeh')}</option>
  </select></label>
  <label>${t('resolution')} <select id="wp-res">
    <option value="1920x1080">${t('desktop')}</option>
    <option value="1080x1920">${t('mobile')}</option>
    <option value="2048x1536">${t('tablet')}</option>
    <option value="3840x2160">${t('fourK')}</option>
    <option value="custom">${t('custom')}</option>
  </select></label>
  <span id="custom-res" style="display:none">
    <input type="number" id="wp-cw" value="1920" min="100" max="7680" style="width:70px"> ×
    <input type="number" id="wp-ch" value="1080" min="100" max="4320" style="width:70px">
  </span>
  <span class="color-inputs" id="color-pickers"></span>
`;

let pickers = '';
for (let i = 0; i < 4; i++) pickers += `<input type="color" value="${defaultColors[i]}" id="wp-c${i}">`;
$('#color-pickers').innerHTML = pickers;

$('#wp-res').onchange = e => {
  const v = e.target.value;
  $('#custom-res').style.display = v === 'custom' ? 'inline' : 'none';
  if (v !== 'custom') { const [w,h] = v.split('x'); W = +w; H = +h; }
};

function getColors() {
  return [$('#wp-c0').value, $('#wp-c1').value, $('#wp-c2').value, $('#wp-c3').value];
}

function rand(a,b) { return Math.random()*(b-a)+a; }

function generate() {
  if ($('#wp-res').value === 'custom') {
    W = Math.max(100, +$('#wp-cw').value || 1920);
    H = Math.max(100, +$('#wp-ch').value || 1080);
  }
  canvas.width = W; canvas.height = H;
  const colors = getColors();
  const style = $('#wp-style').value;

  ctx.fillStyle = colors[0];
  ctx.fillRect(0, 0, W, H);

  if (style === 'gradient') {
    const angle = rand(0, Math.PI * 2);
    const len = Math.sqrt(W*W+H*H) / 2;
    const cx = W/2, cy = H/2;
    const grad = ctx.createLinearGradient(cx - Math.cos(angle)*len, cy - Math.sin(angle)*len, cx + Math.cos(angle)*len, cy + Math.sin(angle)*len);
    grad.addColorStop(0, colors[0]); grad.addColorStop(0.33, colors[1]); grad.addColorStop(0.66, colors[2]); grad.addColorStop(1, colors[3]);
    ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
  }
  else if (style === 'mesh') {
    ctx.fillStyle = colors[0]; ctx.fillRect(0, 0, W, H);
    for (let i = 0; i < 8; i++) {
      const x = rand(0, W), y = rand(0, H), r = rand(W*0.2, W*0.5);
      const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
      grad.addColorStop(0, colors[i % 4] + 'cc');
      grad.addColorStop(1, colors[i % 4] + '00');
      ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
    }
  }
  else if (style === 'circles') {
    for (let i = 0; i < 30; i++) {
      ctx.beginPath();
      ctx.arc(rand(0,W), rand(0,H), rand(W*0.02, W*0.15), 0, Math.PI*2);
      ctx.fillStyle = colors[Math.floor(rand(0,4))] + Math.floor(rand(40,180)).toString(16).padStart(2,'0');
      ctx.fill();
    }
  }
  else if (style === 'waves') {
    for (let layer = 0; layer < 6; layer++) {
      ctx.beginPath();
      ctx.moveTo(0, H);
      for (let x = 0; x <= W; x += 4) {
        const y = H * 0.3 + Math.sin(x * 0.003 + layer * 1.2) * H * 0.15 + layer * H * 0.1;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(W, H); ctx.closePath();
      ctx.fillStyle = colors[layer % 4] + Math.floor(rand(80,200)).toString(16).padStart(2,'0');
      ctx.fill();
    }
  }
  else if (style === 'triangles') {
    for (let i = 0; i < 40; i++) {
      ctx.beginPath();
      const cx = rand(0,W), cy = rand(0,H), s = rand(W*0.03, W*0.12);
      for (let j = 0; j < 3; j++) {
        const a = (j / 3) * Math.PI * 2 + rand(-0.3, 0.3);
        const px = cx + Math.cos(a) * s, py = cy + Math.sin(a) * s;
        j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fillStyle = colors[Math.floor(rand(0,4))] + Math.floor(rand(60,200)).toString(16).padStart(2,'0');
      ctx.fill();
    }
  }
  else if (style === 'bokeh') {
    for (let i = 0; i < 50; i++) {
      const x = rand(0,W), y = rand(0,H), r = rand(W*0.01, W*0.08);
      const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
      const c = colors[Math.floor(rand(0,4))];
      grad.addColorStop(0, c + '88');
      grad.addColorStop(0.7, c + '33');
      grad.addColorStop(1, c + '00');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
    }
  }
}

$('#btn-generate').onclick = generate;
$('#btn-download').onclick = () => {
  const a = document.createElement('a'); a.href = canvas.toDataURL('image/png'); a.download = `wallpaper-${W}x${H}.png`; a.click();
};

generate();

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎲', href:'/image/noise-generator.html', name:'Noise Generator'},
    {icon:'🎨', href:'/css-tools/gradient.html', name:'Gradient'},
    {icon:'🖼️', href:'/image/placeholder.html', name:'Placeholder Image'},
  ]
});
</script>
