<script>
GZI18n.register({
  en: {

    toolDesc: '为社交媒体、游戏和在线账户生成独特、有创意的用户名 — 6 种风格、支持自定义词语、即时生成且完全私密。',
    lblStyle: '风格', lblCount: '生成数量', lblMin: '最短长度', lblMax: '最长长度', lblWords: '自定义词语（可选，逗号分隔）',
    lblGenerated: '已生成', lblUnique: '唯一数', lblAvg: '平均长度',
    btnGen: '🎲 生成用户名', btnCopyAll: '📋 全部复制', btnExport: '💾 导出 TXT',
    tip: '提示：简短、独特的用户名更容易记忆。试试把你喜欢的词和数字后缀混合。',
    step1: '选择风格 — 经典、奇幻、酷/科技、带数字或全部',
    step2: '可选添加要包含在用户名中的自定义词语',
    step3: '点击「生成」创建 20+ 个独特的用户名建议',
    step4: '点击任意名称复制，或将整个列表导出为 TXT',
  }
});

const { $, t, copyText } = GZ;

const ADJ = ['silent','cosmic','frosty','crimson','shadow','lunar','neon','ancient','wild','swift','brave','stormy','lucky','hidden','golden','icy','mystic','epic','savage','royal','flying','crisp','dusky','fierce','noble','shiny','turbo','cosmic','vivid','zesty','electric','dusty','sunny','witty','sleepy','lonely','jolly','sneaky','crystal','iron','misty','foggy','glassy','velvet','azure','emerald','obsidian','ivory','scarlet','plasma','raging','cracked','pulsing','echo','vortex','binary','pixel','cyber','digital','quantum','atomic','cosmic','stellar','lunar','solar','astral','glitched','hacked','wired','folded','broken','jaded','wandering','restless','drifting','floating','bouncing','soaring'];
const NOUN = ['phoenix','tiger','wolf','dragon','hawk','raven','fox','panda','whale','otter','cobra','panther','falcon','lynx','jaguar','badger','beetle','mantis','kraken','hydra','sphinx','griffin','unicorn','goblin','pirate','ninja','samurai','viking','wizard','knight','samurai','hunter','ranger','scout','rider','walker','runner','jumper','diver','reader','writer','coder','hacker','builder','maker','creator','dreamer','singer','dancer','player','master','guru','ninja','sensei','master','squire','smith','fisher','monk','bishop','duke','lord','queen','prince','witch','scribe','mage','sorcerer','rogue','bard','archer','spear','shield','blade','spark','bolt','storm','flame','shadow','ghost','phantom','wraith','spirit','soul','heart','mind','eye','crown','wing','horn','tail','fang','claw','scale','feather','stone','river','ocean','mountain','forest','desert','meadow','valley','canyon','island','harbor','beacon','tower','castle','temple','bridge','door','gate','key','lock','coin','crystal','gem','pearl','shell','star','comet','planet','galaxy','nebula','void','echo','pulse','wave','current','stream','breeze','gust','tide'];
const FANTASY_ADJ = ['mythic','arcane','eldritch','sacred','profane','immortal','ethereal','celestial','infernal','abyssal','divine','dreaded','fabled','legendary','spectral','twilight','enchanted','cursed','blessed','forbidden','hidden','lost','forgotten','ancient','primal','frozen','burning','crystal','silver','golden','crimson','emerald','sapphire','ruby','ivory','obsidian','onyx','jade','amber','coral'];
const TECH = ['binary','hex','node','cache','thread','stack','loop','byte','kernel','shell','socket','daemon','socket','cluster','pixel','sprite','render','shader','buffer','packet','router','switch','gateway','firewall','cipher','tunnel','proxy','server','client','agent','script','lambda','module','class','object','array','vector','matrix','tensor','graph','tree','node','edge'];
const SUFFIX = ['x','ify','hub','ly','io','dev','lab','craft','works','forge','byte','bit','wave','flux','lab','hub','co','ai','lab','hq','zone','craft','core','nest','base'];
const PREFIX = ['the','iAm','mr','ms','dr','its','real','just','not','one','just','its','x','oh','hey','yo','my'];

function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function maybe(p){return Math.random()<p;}
function rand(n){return Math.floor(Math.random()*n);}

function genOne(style, customWords){
  const cw = (customWords||[]).filter(Boolean);
  let parts = [];
  if (style==='classic' || style==='all') {
    if (cw.length) parts.push(cw[rand(cw.length)]);
    else parts.push(pick(NOUN));
    parts.push(pick(SUFFIX));
  } else if (style==='reversed') {
    parts.push(pick(ADJ));
    if (cw.length && maybe(0.4)) parts.push(cw[rand(cw.length)]);
    else parts.push(pick(NOUN));
  } else if (style==='number') {
    parts.push(pick(ADJ));
    parts.push(pick(NOUN));
    parts.push(String(rand(999)));
  } else if (style==='underscore') {
    parts.push(pick(ADJ));
    parts.push('_');
    parts.push(pick(NOUN));
    if (maybe(0.4)) parts.push('_' + rand(99));
  } else if (style==='fantasy') {
    parts.push(pick(FANTASY_ADJ));
    parts.push(pick(NOUN));
    if (maybe(0.5)) parts.push(pick(['Of','of']) + pick(['The','the']));
  } else if (style==='cool') {
    parts.push(pick(TECH));
    parts.push(pick(['_','-','']));
    parts.push(pick(ADJ));
  }
  if (style==='all' && maybe(0.3)) {
    if (maybe(0.5)) parts.unshift(pick(PREFIX));
    if (maybe(0.4)) parts.push(rand(99));
  }
  let name = parts.join('').replace(/\s+/g,'');
  // Add leet / cool suffixes
  if (style==='all' || style==='cool') {
    if (maybe(0.3)) name = name.replace(/a/g,'4').replace(/e/g,'3').replace(/i/g,'1').replace(/o/g,'0').replace(/s/g,'5');
  }
  return name;
}

function generate(){
  const style = $('#style').value;
  const count = Math.max(1, Math.min(200, +$('#count').value || 20));
  const minLen = +$('#minLen').value || 3;
  const maxLen = +$('#maxLen').value || 30;
  const customWords = $('#customWords').value.split(',').map(s=>s.trim()).filter(Boolean);
  const set = new Set();
  let attempts = 0;
  while (set.size < count && attempts < count*30) {
    const s = style==='all' ? ['classic','reversed','number','underscore','fantasy','cool'][rand(6)] : style;
    const n = genOne(s, customWords);
    if (n.length>=minLen && n.length<=maxLen) set.add(n);
    attempts++;
  }
  const list = Array.from(set);
  renderResults(list);
}

function renderResults(list){
  const html = list.map(n => `<div class="ug-item"><span class="ug-name">${n}</span><button class="ug-copy" onclick="GZ.copyText('${n}')">Copy</button></div>`).join('');
  $('#results').innerHTML = html || `<div style="color:var(--text2)">No results — try adjusting filters.</div>`;
  const avg = list.length ? (list.reduce((a,b)=>a+b.length,0)/list.length).toFixed(1) : 0;
  $('#cnt').textContent = list.length;
  $('#uniq').textContent = list.length;
  $('#avg').textContent = avg;
  window._lastUsernames = list;
}

$('#btn-gen').onclick = generate;
$('#btn-copy-all').onclick = () => {
  if (window._lastUsernames && window._lastUsernames.length) {
    copyText(window._lastUsernames.join('\n'));
  }
};
$('#btn-export').onclick = () => {
  if (!window._lastUsernames || !window._lastUsernames.length) return;
  const blob = new Blob([window._lastUsernames.join('\n')], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'usernames.txt';
  a.click();
  URL.revokeObjectURL(a.href);
};

function init(){
  $('#lbl-style').textContent = t('lblStyle');
  $('#lbl-count').textContent = t('lblCount');
  $('#lbl-min').textContent = t('lblMin');
  $('#lbl-max').textContent = t('lblMax');
  $('#lbl-words').textContent = t('lblWords');
  $('#lbl-generated').textContent = t('lblGenerated');
  $('#lbl-unique').textContent = t('lblUnique');
  $('#lbl-avg').textContent = t('lblAvg');
  $('#btn-gen').textContent = t('btnGen');
  $('#btn-copy-all').textContent = t('btnCopyAll');
  $('#btn-export').textContent = t('btnExport');
  $('#tip-text').textContent = t('tip');
  generate();
}

GZ.renderToolPage({
  category: 'text',

    {icon:'🔐', href:'/dev/password-generator.html', name:'Password Generator'},
  ]
});
init();
</script>
