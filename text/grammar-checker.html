const { $, copyText, t } = GZ;

const commonMisspellings = {
  'teh':'the','recieve':'receive','occured':'occurred','seperate':'separate','definately':'definitely',
  'accomodate':'accommodate','occassion':'occasion','neccessary':'necessary','wierd':'weird',
  'thier':'their','alot':'a lot','untill':'until','begining':'beginning','occurence':'occurrence',
  'acheive':'achieve','arguement':'argument','beleive':'believe','calender':'calendar',
  'collegue':'colleague','commited':'committed','concious':'conscious','enviroment':'environment',
  'existance':'existence','foriegn':'foreign','goverment':'government','harrass':'harass',
  'immediatly':'immediately','independant':'independent','knowlege':'knowledge','libary':'library',
  'maintenence':'maintenance','millenium':'millennium','noticable':'noticeable','paralel':'parallel',
  'persistant':'persistent','posession':'possession','prefered':'preferred','privledge':'privilege',
  'profesional':'professional','recomend':'recommend','refered':'referred','succesful':'successful',
  'suprise':'surprise','tommorrow':'tomorrow','writting':'writing'
};

function checkGrammar(text) {
  let issues = [];
  let words = text.split(/\s+/).filter(w => w.length > 0);
  let sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);

  // Double words
  for (let i = 1; i < words.length; i++) {
    const a = words[i-1].toLowerCase().replace(/[^a-z']/g,'');
    const b = words[i].toLowerCase().replace(/[^a-z']/g,'');
    if (a && b && a === b) {
      const idx = text.toLowerCase().indexOf(words[i].toLowerCase(), text.indexOf(words[i-1]) + words[i-1].length);
      if (idx >= 0) issues.push({start: idx, end: idx + words[i].length, type: 'double', msg: t('errorDouble') + ': "' + words[i] + '"'});
    }
  }

  // Sentence capitalization
  const sentenceRegex = /(^|[.!?]\s+)([a-z])/gm;
  let m;
  while ((m = sentenceRegex.exec(text)) !== null) {
    if (m[2] >= 'a' && m[2] <= 'z') {
      issues.push({start: m.index + m[1].length, end: m.index + m[1].length + 1, type: 'capital', msg: t('errorCapital')});
    }
  }

  // Extra spaces
  const spaceRegex = /  +/g;
  while ((m = spaceRegex.exec(text)) !== null) {
    issues.push({start: m.index, end: m.index + m[0].length, type: 'spacing', msg: t('errorSpacing')});
  }

  // Missing ending punctuation
  const trimmed = text.trim();
  if (trimmed.length > 10 && !/[.!?]$/.test(trimmed)) {
    issues.push({start: trimmed.length - 1, end: trimmed.length, type: 'punctuation', msg: t('errorPunctuation')});
  }

  // Common misspellings
  const wordRegex = /[a-zA-Z]+/g;
  while ((m = wordRegex.exec(text)) !== null) {
    const w = m[0].toLowerCase();
    if (commonMisspellings[w]) {
      issues.push({start: m.index, end: m.index + m[0].length, type: 'spelling', msg: t('errorSpelling') + ': "' + m[0] + '" → "' + commonMisspellings[w] + '"'});
    }
  }

  // a/an
  const articleRegex = /\b(a)\s+([aeiou]\w*)/gi;
  while ((m = articleRegex.exec(text)) !== null) {
    issues.push({start: m.index, end: m.index + 1, type: 'article', msg: t('errorArticleA') + ': "a ' + m[2] + '" → "an ' + m[2] + '"'});
  }
  const articleRegex2 = /\b(an)\s+([bcdfghjklmnpqrstvwxyz]\w*)/gi;
  while ((m = articleRegex2.exec(text)) !== null) {
    issues.push({start: m.index, end: m.index + 2, type: 'article', msg: t('errorArticleAn') + ': "an ' + m[2] + '" → "a ' + m[2] + '"'});
  }

  // Sort by position and deduplicate
  issues.sort((a, b) => a.start - b.start);
  return {issues, wordCount: words.length, sentenceCount: sentences.length};
}

function doCheck() {
  const text = $('#input').value;
  if (!text.trim()) return;
  const {issues, wordCount, sentenceCount} = checkGrammar(text);

  let html = '';
  let last = 0;
  issues.forEach(issue => {
    if (issue.start > last) {
      html += escapeHtml(text.slice(last, issue.start));
    }
    html += `<span class="error" title="${escapeHtml(issue.msg)}">${escapeHtml(text.slice(issue.start, issue.end))}</span>`;
    last = issue.end;
  });
  if (last < text.length) html += escapeHtml(text.slice(last));

  $('#output').innerHTML = html || escapeHtml(text);

  const statsDiv = $('#stats');
  statsDiv.innerHTML = `
    <span>${t('errorsFound').replace('{n}', issues.length)}</span>
    <span>${t('words').replace('{n}', wordCount)}</span>
    <span>${t('sentences').replace('{n}', sentenceCount)}</span>
  `;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function loadExample() {
  $('#input').value = 'The the quick brown fox jumps over the lazy dog.  he went to teh store to buy some things. she recieve a package yesteday. an big dog was running in the park. i think that this is a very wierd situation that occured last nite';
  doCheck();
}

function doClear() { $('#input').value = ''; $('#output').innerHTML = ''; $('#stats').innerHTML = ''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doCheck()">${t('check')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

$('#input').addEventListener('input', () => {
  // Auto-check with debounce
  clearTimeout($('#input')._timer);
  $('#input')._timer = setTimeout(doCheck, 800);
});
