<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Button Generator',
    toolDesc: 'Create beautiful CSS buttons with live preview — customize colors, borders, shadows, gradients and hover effects.',
    buttonText: 'Button Text',
    bgColor: 'Background Color',
    textColor: 'Text Color',
    padding: 'Padding',
    borderRadius: 'Border Radius',
    borderWidth: 'Border Width',
    borderColor: 'Border Color',
    fontSize: 'Font Size',
    fontWeight: 'Font Weight',
    shadowBlur: 'Shadow Blur',
    shadowColor: 'Shadow Color',
    gradient: 'Gradient',
    gradColor2: 'Gradient Color 2',
    hoverScale: 'Hover Scale',
    step1: 'Customize colors, size, border, shadow and gradient options',
    step2: 'See the live preview update in real-time',
    step3: 'Click Copy CSS to get the complete button code',
    step4: 'Paste the CSS into your project',
  },
  zh: {
    toolTitle: 'CSS 按钮生成器',
    toolDesc: '可视化创建精美 CSS 按钮 — 自定义颜色、边框、阴影、渐变和悬停效果。',
    buttonText: '按钮文字',
    bgColor: '背景色',
    textColor: '文字颜色',
    padding: '内边距',
    borderRadius: '圆角',
    borderWidth: '边框宽度',
    borderColor: '边框颜色',
    fontSize: '字号',
    fontWeight: '字重',
    shadowBlur: '阴影模糊',
    shadowColor: '阴影颜色',
    gradient: '渐变',
    gradColor2: '渐变色 2',
    hoverScale: '悬停缩放',
    step1: '自定义颜色、尺寸、边框、阴影和渐变选项',
    step2: '实时预览按钮效果',
    step3: '点击「复制 CSS」获取完整按钮代码',
    step4: '将 CSS 粘贴到你的项目中',
  }
});

const { $, copyText, t } = GZ;

function generateCSS() {
  const bg = $('#btn-bg').value;
  const tc = $('#btn-text-color').value;
  const pad = $('#btn-padding').value;
  const rad = $('#btn-radius').value;
  const bw = $('#btn-border-width').value;
  const bc = $('#btn-border-color').value;
  const fs = $('#btn-font-size').value;
  const fw = $('#btn-font-weight').value;
  const sb = $('#btn-shadow-blur').value;
  const sc = $('#btn-shadow-color').value;
  const grad = $('#btn-gradient').value;
  const gc2 = $('#btn-grad-color2').value;
  const hs = $('#btn-hover-scale').value;
  const txt = $('#btn-text').value;

  const isGrad = grad === 'on';
  const bgCSS = isGrad ? `linear-gradient(135deg, ${bg}, ${gc2})` : bg;
  const shadowCSS = sb > 0 ? `0 4px ${sb}px ${sc}66` : 'none';
  const hoverScale = (hs / 100).toFixed(2);

  const btn = $('#preview-btn');
  btn.textContent = txt;
  btn.style.cssText = `background:${bgCSS};color:${tc};padding:${pad};border-radius:${rad}px;border:${bw}px solid ${bc};font-size:${fs}px;font-weight:${fw};box-shadow:${shadowCSS};cursor:pointer;transition:all .2s ease;font-family:inherit;outline:none`;

  btn.onmouseenter = () => { btn.style.transform = `scale(${hoverScale})`; };
  btn.onmouseleave = () => { btn.style.transform = 'scale(1)'; };

  let css = `.my-button {\n  background: ${bgCSS};\n  color: ${tc};\n  padding: ${pad};\n  border-radius: ${rad}px;\n  border: ${bw}px solid ${bc};\n  font-size: ${fs}px;\n  font-weight: ${fw};\n  box-shadow: ${shadowCSS};\n  cursor: pointer;\n  transition: all 0.2s ease;\n}\n\n.my-button:hover {\n  transform: scale(${hoverScale});\n}`;
  $('#code-output').textContent = css;
}

// Bind all inputs
['btn-text','btn-bg','btn-text-color','btn-padding','btn-radius','btn-border-width','btn-border-color','btn-font-size','btn-font-weight','btn-shadow-blur','btn-shadow-color','btn-grad-color2','btn-hover-scale'].forEach(id => {
  $(('#'+id)).addEventListener('input', () => {
    if(id === 'btn-radius') $('#radius-val').textContent = $('#'+id).value + 'px';
    if(id === 'btn-border-width') $('#border-width-val').textContent = $('#'+id).value + 'px';
    if(id === 'btn-font-size') $('#font-size-val').textContent = $('#'+id).value + 'px';
    if(id === 'btn-shadow-blur') $('#shadow-val').textContent = 'blur ' + $('#'+id).value + 'px';
    if(id === 'btn-hover-scale') $('#hover-scale-val').textContent = ($('#'+id).value / 100).toFixed(2);
    generateCSS();
  });
});

$('#btn-gradient').addEventListener('change', function() {
  $('#grad-color2-group').style.display = this.value === 'on' ? '' : 'none';
  generateCSS();
});

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#code-output').textContent)">${t('copy')} CSS</button>
  <button class="gz-btn gz-btn-secondary" onclick="generateCSS()">${t('format')}</button>`;

// Bind labels
['lbl-text','lbl-bg','lbl-textcolor','lbl-padding','lbl-borderradius','lbl-borderwidth','lbl-bordercolor','lbl-fontsize','lbl-fontweight','lbl-shadow','lbl-shadowcolor','lbl-gradient','lbl-gradcolor2','lbl-hoverscale'].forEach(id => {
  const el = $('#'+id);
  if(el) el.textContent = t(id.replace('lbl-',''));
});

generateCSS();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
    {icon:'🔘', href:'/css-tools/border-radius.html', name:'Border Radius'},
    {icon:'🌈', href:'/css-tools/gradient.html', name:'CSS Gradient'},
    {icon:'📐', href:'/css-tools/flexbox.html', name:'Flexbox'},
  ]
});
</script>

</body>
