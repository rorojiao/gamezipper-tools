const { $, copyText, t } = GZ;

$('#input').placeholder = t('placeholder');

function extractTags() {
  const html = $('#input').value.trim();
  if (!html) return;

  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  // Extract title
  const titleEl = doc.querySelector('title');
  const titleText = titleEl ? titleEl.textContent.trim() : '';

  // Extract all meta tags
  const metas = [];
  doc.querySelectorAll('meta').forEach(m => {
    const name = m.getAttribute('name') || m.getAttribute('property') || m.getAttribute('http-equiv') || '';
    const content = m.getAttribute('content') || '';
    const charset = m.getAttribute('charset') || '';
    if (charset) {
      metas.push({ name: 'charset', value: charset });
    } else if (name) {
      metas.push({ name, value: content });
    }
  });

  // Extract link tags
  const links = [];
  doc.querySelectorAll('link[href]').forEach(l => {
    const rel = l.getAttribute('rel') || '';
    const href = l.getAttribute('href') || '';
    if (rel && href) links.push({ name: `link[rel="${rel}"]`, value: href });
  });

  // Categorize
  const groups = {
    basic: [],
    og: [],
    twitter: [],
    seo: [],
    other: [],
    links: []
  };

  metas.forEach(m => {
    const n = m.name.toLowerCase();
    if (n.startsWith('og:') || n.startsWith('og ')) groups.og.push(m);
    else if (n.startsWith('twitter:')) groups.twitter.push(m);
    else if (['robots','googlebot','bingbot','description','keywords','author','canonical','generator','viewport','theme-color'].includes(n)) groups.seo.push(m);
    else if (['charset','content-type','x-ua-compatible','referrer','format-detection'].includes(n)) groups.basic.push(m);
    else groups.other.push(m);
  });

  links.forEach(l => groups.links.push(l));

  // SEO issues
  const issues = [];
  if (!titleText) issues.push({ text: 'title', badge: 'missing' });
  else if (titleText.length < 30) issues.push({ text: t('title') + ': ' + titleText.length + ' — ' + t('tooShort'), badge: 'warn' });
  else if (titleText.length > 60) issues.push({ text: t('title') + ': ' + titleText.length + ' — ' + t('tooLong'), badge: 'warn' });
  else issues.push({ text: t('title') + ': ' + titleText.length + ' — ' + t('goodLength'), badge: 'ok' });

  const desc = metas.find(m => m.name === 'description');
  if (!desc) issues.push({ text: 'meta description', badge: 'missing' });
  else if (desc.value.length < 120) issues.push({ text: 'description: ' + desc.value.length + ' — ' + t('tooShort'), badge: 'warn' });
  else if (desc.value.length > 160) issues.push({ text: 'description: ' + desc.value.length + ' — ' + t('tooLong'), badge: 'warn' });
  else issues.push({ text: 'description: ' + desc.value.length + ' — ' + t('goodLength'), badge: 'ok' });

  const hasOgTitle = metas.some(m => m.name === 'og:title');
  if (!hasOgTitle) issues.push({ text: 'og:title', badge: 'missing' });

  const hasCanonical = links.some(l => l.name.includes('canonical'));
  if (!hasCanonical) issues.push({ text: 'canonical', badge: 'missing' });

  // Render
  const totalCount = metas.length + links.length;
  let out = '';

  // Summary
  out += `<div class="summary-grid">`;
  out += `<div class="summary-card"><div class="num">${totalCount}</div><div class="label">${t('totalTags')}</div></div>`;
  out += `<div class="summary-card"><div class="num">${titleText ? '✓' : '✗'}</div><div class="label">${t('title')}</div></div>`;
  out += `<div class="summary-card"><div class="num">${issues.filter(i => i.badge === 'missing').length}</div><div class="label">${t('missing')}</div></div>`;
  out += `</div>`;

  // Issues
  if (issues.length) {
    out += `<div class="meta-group"><div class="meta-group-title">🔍 ${t('issues')}</div>`;
    issues.forEach(issue => {
      const cls = issue.badge === 'ok' ? 'badge-ok' : issue.badge === 'warn' ? 'badge-warn' : 'badge-missing';
      const icon = issue.badge === 'ok' ? '✅' : issue.badge === 'warn' ? '⚠️' : '❌';
      out += `<div class="meta-row"><span class="meta-name">${icon} ${issue.text}</span><span></span><span class="meta-badge ${cls}">${issue.badge.toUpperCase()}</span></div>`;
    });
    out += `</div>`;
  }

  // Title
  if (titleText) {
    out += `<div class="meta-group"><div class="meta-group-title">📄 ${t('title')}</div>`;
    out += `<div class="meta-row"><span class="meta-name">&lt;title&gt;</span><span class="meta-value">${escHtml(titleText)}</span><span></span></div>`;
    out += `</div>`;
  }

  // Render groups
  const groupLabels = {
    basic: '📌 ' + t('basic'),
    og: '🖼️ ' + t('og'),
    twitter: '🐦 ' + t('twitter'),
    seo: '🔍 ' + t('seo'),
    other: '📦 ' + t('other'),
    links: '🔗 ' + t('linkTags')
  };

  for (const [key, items] of Object.entries(groups)) {
    if (items.length === 0) continue;
    out += `<div class="meta-group"><div class="meta-group-title">${groupLabels[key]}</div>`;
    items.forEach(item => {
      out += `<div class="meta-row"><span class="meta-name">${escHtml(item.name)}</span><span class="meta-value">${escHtml(item.value)}</span><span></span></div>`;
    });
    out += `</div>`;
  }

  $('#output').innerHTML = out || `<p style="color:var(--text2)">${t('noTags')}</p>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
