// Simple YAML parser (supports basic YAML: objects, arrays, strings, numbers, booleans, null)
function parseYaml(text) {
  const lines = text.split('\n');
  let root = {};
  let stack = [{obj: root, indent: -1}];
  let currentArray = null;
  let currentKey = null;

  function getIndent(line) {
    const match = line.match(/^(\s*)/);
    return match ? match[1].length : 0;
  }

  function parseValue(val) {
    val = val.trim();
    if (val === 'true') return true;
    if (val === 'false') return false;
    if (val === 'null' || val === '~' || val === '') return null;
    if (/^["'].*["']$/.test(val)) return val.slice(1, -1);
    if (/^-?\d+(\.\d+)?$/.test(val)) return parseFloat(val);
    if (/^0x[0-9a-fA-F]+$/.test(val)) return parseInt(val, 16);
    return val;
  }

  function getParent(indent) {
    while (stack.length > 1 && stack[stack.length - 1].indent >= indent) {
      stack.pop();
    }
    return stack[stack.length - 1].obj;
  }

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];
    const trimmed = line.trim();
    if (!trimmed || trimmed.startsWith('#')) continue;

    const indent = getIndent(line);

    // Array item
    if (trimmed.startsWith('- ')) {
      const parent = getParent(indent);
      const val = trimmed.substring(2).trim();
      if (typeof parent === 'object' && !Array.isArray(parent) && currentKey) {
        if (!Array.isArray(parent[currentKey])) parent[currentKey] = [];
        parent[currentKey].push(parseValue(val));
        currentArray = parent[currentKey];
      }
      continue;
    }

    // Key-value
    const colonIdx = trimmed.indexOf(':');
    if (colonIdx > 0) {
      const key = trimmed.substring(0, colonIdx).trim();
      const val = trimmed.substring(colonIdx + 1).trim();
      const parent = getParent(indent);

      if (val === '' || val === '|' || val === '>') {
        // Object or multi-line
        parent[key] = {};
        stack.push({obj: parent[key], indent: indent});
        currentKey = key;
        currentArray = null;
      } else {
        parent[key] = parseValue(val);
        currentKey = key;
        currentArray = null;
      }
    }
  }
  return root;
}

function tomlEscape(s) {
  return (s || '').replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\t/g, '\\t');
}

function toTomlValue(val) {
  if (val === null) return 'null';
  if (typeof val === 'boolean') return val ? 'true' : 'false';
  if (typeof val === 'number') return String(val);
  if (typeof val === 'string') return `"${tomlEscape(val)}"`;
  return `"${tomlEscape(String(val))}"`;
}

function toToml(obj, prefix) {
  prefix = prefix || [];
  let lines = [];
  let tables = [];

  for (const key of Object.keys(obj)) {
    const val = obj[key];
    const fullKey = [...prefix, key].map(k => /^[a-zA-Z0-9_-]+$/.test(k) ? k : `"${tomlEscape(k)}"`).join('.');

    if (val === null || typeof val !== 'object') {
      lines.push(`${fullKey} = ${toTomlValue(val)}`);
    } else if (Array.isArray(val)) {
      // Inline array for simple arrays
      const isSimple = val.every(v => v === null || typeof v !== 'object');
      if (isSimple) {
        lines.push(`${fullKey} = [${val.map(v => toTomlValue(v)).join(', ')}]`);
      } else {
        // Array of tables
        val.forEach((item, idx) => {
          if (typeof item === 'object' && item !== null && !Array.isArray(item)) {
            lines.push(`[[${fullKey}]]`);
            const sub = toToml(item, []);
            lines.push(sub);
          } else {
            lines.push(`[[${fullKey}]]`);
            lines.push(`value = ${toTomlValue(item)}`);
          }
        });
      }
    } else {
      // Nested object → table
      tables.push({key: fullKey, obj: val});
    }
  }

  let result = lines.join('\n');
  for (const tbl of tables) {
    if (result) result += '\n\n';
    result += `[${tbl.key}]\n`;
    const sub = toToml(tbl.obj, [...prefix, tbl.key.replace(/"/g, '')]);
    // Remove the prefix from sub result since we already have the table header
    const cleanSub = sub.split('\n').map(line => {
      // Keep relative keys
      return line;
    }).join('\n');
    result += cleanSub;
  }

  return result;
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  try {
    const obj = parseYaml(inp);
    const toml = toToml(obj);
    $('#output').textContent = toml;
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('validYaml')}</span>`;
  } catch(e) {
    $('#output').innerHTML = `<span style="color:var(--gz-accent)">${e.message}</span>`;
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalidYaml')}: ${e.message}</span>`;
  }
}
