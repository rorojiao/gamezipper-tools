<div class="gz-container">

        <input type="text" id="wordInput" class="gz-input" placeholder="" spellcheck="false" onkeypress="if(event.key==='Enter')addWord()">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Word Combiner',
    toolDesc: 'Combine multiple words into unique blends, portmanteaus, and name ideas. Perfect for branding, domains, and creative writing.',
    placeholder: 'Type a word and press Enter…',
    addBtn: 'Add Word',
    generate: 'Generate Combinations',
    clear: 'Clear All',
    copy: 'Copy',
    results: 'Results',
    noResults: 'Add at least 2 words to generate combinations',
    optOverlap: 'Overlap shared letters',
    optConcat: 'Simple concatenation',
    optPrefix: 'Prefix + suffix blend',
    optRandom: 'Random splits',
    step1: 'Type words and press Enter or click Add Word',
    step2: 'Toggle combination strategies in options',
    step3: 'Click Generate Combinations to see blends',
    step4: 'Click Copy on any result to copy it',
  },
  zh: {
    toolTitle: '单词组合器',
    toolDesc: '将多个单词组合成独特的混合词、混成词和命名创意。适合品牌、域名和创意写作。',
    placeholder: '输入单词并按回车…',
    addBtn: '添加单词',
    generate: '生成组合',
    clear: '全部清除',
    copy: '复制',
    results: '结果',
    noResults: '至少添加 2 个单词才能生成组合',
    optOverlap: '重叠相同字母',
    optConcat: '简单拼接',
    optPrefix: '前缀 + 后缀混合',
    optRandom: '随机分割',
    step1: '输入单词并按回车或点击「添加单词」',
    step2: '在选项中切换组合策略',
    step3: '点击「生成组合」查看混合词',
    step4: '点击任意结果的「复制」按钮复制',
  }
});

const { $, copyText, t } = GZ;
let words = [];

function addWord() {
  const val = $('#wordInput').value.trim().toLowerCase().replace(/[^a-z0-9-]/g, '');
  if (val && !words.includes(val)) {
    words.push(val);
    $('#wordInput').value = '';
    renderChips();
    generate();
  }
}

function removeWord(idx) {
  words.splice(idx, 1);
  renderChips();
  generate();
}

function renderChips() {
  $('#chips').innerHTML = words.map((w, i) =>
    `<div class="wc-chip">${w}<span onclick="removeWord(${i})">✕</span></div>`
  ).join('');
}

function overlapBlend(a, b) {
  for (let len = Math.min(a.length, b.length); len >= 1; len--) {
    if (a.slice(-len) === b.slice(0, len)) {
      return a + b.slice(len);
    }
  }
  return null;
}

function prefixSuffix(a, b) {
  const results = [];
  results.push(a.slice(0, Math.ceil(a.length/2)) + b.slice(Math.floor(b.length/2)));
  results.push(a.slice(0, 2) + b);
  results.push(a + b.slice(-2));
  return results;
}

function generate() {
  const opts = {
    overlap: $('#optOverlap').checked,
    concat: $('#optConcat').checked,
    prefix: $('#optPrefix').checked,
    random: $('#optRandom').checked,
  };

  const combos = new Set();
  for (let i = 0; i < words.length; i++) {
    for (let j = 0; j < words.length; j++) {
      if (i === j) continue;
      const a = words[i], b = words[j];
      if (opts.overlap) {
        const blend = overlapBlend(a, b);
        if (blend) combos.add(blend);
      }
      if (opts.concat) {
        combos.add(a + b);
      }
      if (opts.prefix) {
        prefixSuffix(a, b).forEach(c => combos.add(c));
      }
      if (opts.random) {
        const splitA = Math.floor(Math.random() * (a.length - 1)) + 1;
        const splitB = Math.floor(Math.random() * (b.length - 1)) + 1;
        combos.add(a.slice(0, splitA) + b.slice(splitB));
      }
    }
  }

  const sorted = [...combos].sort();
  if (sorted.length === 0) {
    $('#result').innerHTML = `<p style="opacity:.6">${t('noResults')}</p>`;
    return;
  }

  $('#result').innerHTML = `<h3 style="margin:0 0 8px">${t('results')} (${sorted.length})</h3>` +
    sorted.map(w => `<div class="wc-item"><span class="w">${w}</span><button onclick="copyText('${w}')">${t('copy')}</button></div>`).join('');
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" id="genBtn">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="words=[];renderChips();generate()">${t('clear')}</button>`;
$('#genBtn').onclick = generate;
$('#addBtn').textContent = t('addBtn');
$('#wordInput').placeholder = t('placeholder');
$('#options').innerHTML = `
  <label><input type="checkbox" id="optOverlap" checked> ${t('optOverlap')}</label>
  <label><input type="checkbox" id="optConcat" checked> ${t('optConcat')}</label>
  <label><input type="checkbox" id="optPrefix" checked> ${t('optPrefix')}</label>
  <label><input type="checkbox" id="optRandom"> ${t('optRandom')}</label>`;
['optOverlap','optConcat','optPrefix','optRandom'].forEach(id => $('#' + id).onchange = generate);

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📝', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'🔗', href:'/text/slug.html', name:'Slug Generator'},
    {icon:'🏷️', href:'/text/username-generator.html', name:'Username Generator'},
    {icon:'🔤', href:'/text/case-converter.html', name:'Case Converter'},
  ]
});
</script>
