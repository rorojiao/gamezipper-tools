    powerball: 'Powerball',

    euroMillions: 'EuroMillions',
    ukLotto: 'UK Lotto',
    custom: '自定义',
    generate: '生成',
    clear: '清除',

    mainNums: '主号码数',
    mainRange: '主号码范围（最小–最大）',
    bonusNums: '特别号码数',
    bonusRange: '特别号码范围',
    setLabel: '第',
    step1: '选择彩票游戏预设或自定义模式',
    step2: '自定义模式下设置主号码/特别号码的数量和范围',
    step3: '选择生成的组数（1–10）',
    step4: '点击「生成」获取随机幸运号码',

});

const { $, t } = GZ;

const presets = {
  powerball: { mainCount: 5, mainMin: 1, mainMax: 69, bonusCount: 1, bonusMin: 1, bonusMax: 26 },
  megaMillions: { mainCount: 5, mainMin: 1, mainMax: 70, bonusCount: 1, bonusMin: 1, bonusMax: 25 },
  euroMillions: { mainCount: 5, mainMin: 1, mainMax: 50, bonusCount: 2, bonusMin: 1, bonusMax: 12 },
  ukLotto: { mainCount: 6, mainMin: 1, mainMax: 59, bonusCount: 0, bonusMin: 1, bonusMax: 59 },
  custom: { mainCount: 6, mainMin: 1, mainMax: 49, bonusCount: 0, bonusMin: 1, bonusMax: 10 },
};

let mode = 'powerball';

function buildTabs() {
  const tabs = [
    ['powerball','powerball'],['megaMillions','megaMillions'],
    ['euroMillions','euroMillions'],['ukLotto','ukLotto'],['custom','custom']
  ];
  $('#mode-tabs').innerHTML = tabs.map(([k,label]) =>
    `<div class="lot-tab ${mode===k?'active':''}" onclick="setMode('${k}')">${t(label)}</div>`
  ).join('');
}

function setMode(m) {
  mode = m;
  buildTabs();
  buildConfig();
  generate();
}

function buildConfig() {
  const cfg = presets[mode];
  if (mode === 'custom') {
    $('#custom-config').innerHTML = `
      <div class="lot-row"><span class="lot-label">${t('mainNums')}</span>
        <input type="number" id="m-count" class="gz-input" value="${cfg.mainCount}" min="1" max="20" oninput="updateCustom()"></div>
      <div class="lot-row"><span class="lot-label">${t('mainRange')}</span>
        <input type="number" id="m-min" class="gz-input" value="${cfg.mainMin}" min="0" style="max-width:70px" oninput="updateCustom()">
        <span>–</span>
        <input type="number" id="m-max" class="gz-input" value="${cfg.mainMax}" min="1" style="max-width:70px" oninput="updateCustom()"></div>
      <div class="lot-row"><span class="lot-label">${t('bonusNums')}</span>
        <input type="number" id="b-count" class="gz-input" value="${cfg.bonusCount}" min="0" max="10" oninput="updateCustom()"></div>
      <div class="lot-row"><span class="lot-label">${t('bonusRange')}</span>
        <input type="number" id="b-min" class="gz-input" value="${cfg.bonusMin}" min="0" style="max-width:70px" oninput="updateCustom()">
        <span>–</span>
        <input type="number" id="b-max" class="gz-input" value="${cfg.bonusMax}" min="1" style="max-width:70px" oninput="updateCustom()"></div>`;
  } else {
    $('#custom-config').innerHTML = '';
  }
  // Sets selector always
  const setsHtml = `<div class="lot-row"><span class="lot-label">${t('sets')}</span>
    <select id="sets" class="gz-select" onchange="generate()">
    ${[1,2,3,5,10].map(n => `<option value="${n}" ${n===5?'selected':''}>${n}</option>`).join('')}
    </select></div>`;
  $('#custom-config').innerHTML += setsHtml;
}

function updateCustom() {
  presets.custom = {
    mainCount: clampInt($('#m-count').value, 1, 20),
    mainMin: parseInt($('#m-min').value) || 0,
    mainMax: parseInt($('#m-max').value) || 49,
    bonusCount: clampInt($('#b-count').value, 0, 10),
    bonusMin: parseInt($('#b-min').value) || 0,
    bonusMax: parseInt($('#b-max').value) || 10,
  };
  generate();
}

function clampInt(v, lo, hi) { v = parseInt(v) || lo; return Math.max(lo, Math.min(hi, v)); }

// Cryptographic random integer in [min, max]
function secureRandomInt(min, max) {
  if (min > max) [min, max] = [max, min];
  const range = max - min + 1;
  if (range <= 0) return min;
  const maxUint32 = 0xFFFFFFFF;
  const limit = maxUint32 - (maxUint32 % range);
  const arr = new Uint32Array(1);
  let val;
  do {
    crypto.getRandomValues(arr);
    val = arr[0];
  } while (val >= limit);
  return min + (val % range);
}

function pickUnique(count, min, max) {
  const pool = max - min + 1;
  const result = [];
  if (count >= pool) {
    // return all shuffled
    for (let i = min; i <= max; i++) result.push(i);
    for (let i = result.length - 1; i > 0; i--) {
      const j = secureRandomInt(0, i);
      [result[i], result[j]] = [result[j], result[i]];
    }
    return result.slice(0, count);
  }
  while (result.length < count) {
    const n = secureRandomInt(min, max);
    if (!result.includes(n)) result.push(n);
  }
  return result.sort((a, b) => a - b);
}

function generate() {
  const cfg = presets[mode];
  const setCount = clampInt($('#sets')?.value, 1, 10);

  let html = '';
  for (let s = 0; s < setCount; s++) {
    const main = pickUnique(cfg.mainCount, cfg.mainMin, cfg.mainMax);
    const bonus = cfg.bonusCount > 0 ? pickUnique(cfg.bonusCount, cfg.bonusMin, cfg.bonusMax) : [];

    let ballsHtml = main.map(n => `<div class="lot-ball">${n}</div>`).join('');
    if (bonus.length > 0) {
      ballsHtml += bonus.map(n => `<div class="lot-ball bonus">${n}</div>`).join('');
    }
    html += `<div class="lot-set">
      <div class="lot-set-label">${t('setLabel')} ${s + 1}</div>
      <div class="lot-balls">${ballsHtml}</div>
    </div>`;
  }
  $('#output').innerHTML = html;
}

function doClear() {
  $('#output').innerHTML = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">🎲 ${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

buildTabs();
buildConfig();
generate();

});
