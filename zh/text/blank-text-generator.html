<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="grid" id="charGrid"></div>
    <div class="gen-section">
      <h3 id="genTitle"></h3>
      <div class="gen-row">
        <label id="lblLength"></label>
        <input type="range" id="lengthSlider" min="1" max="1000" value="10">
        <span class="val" id="lengthVal">10</span>
      </div>
      <div class="gen-row">
        <label id="lblType"></label>
        <select class="gz-select" id="typeSelect"></select>
      </div>
      <div class="output-box" id="outputBox"><span class="placeholder" id="outputPlaceholder"></span></div>
      <div class="gen-row">
        <button class="gz-btn" id="generateBtn"></button>
        <button class="gz-btn gz-btn-secondary" id="copyBtn"></button>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Blank Text Generator',
    toolDesc: 'Generate invisible blank text characters. Copy zero-width spaces, blank Unicode, and empty characters for usernames, bios, and messages.',
    genTitle: 'Generate Blank Text',
    length: 'Length:',
    type: 'Type:',
    generate: 'Generate',
    copy: 'Copy',
    clickToCopy: 'Click to copy',
    step1: 'Browse the invisible character cards below or use the generator',
    step2: 'Select the type of blank character you need',
    step3: 'Set the desired length with the slider',
    step4: 'Click Generate, then Copy the invisible text',
    chars: [
      {name:'Zero-Width Space',code:'U+200B',char:'\u200B'},
      {name:'Zero-Width Non-Joiner',code:'U+200C',char:'\u200C'},
      {name:'Zero-Width Joiner',code:'U+200D',char:'\u200D'},
      {name:'Word Joiner',code:'U+2060',char:'\u2060'},
      {name:'Braille Blank',code:'U+2800',char:'\u2800'},
      {name:'En Space',code:'U+2000',char:'\u2000'},
      {name:'Em Space',code:'U+2003',char:'\u2003'},
      {name:'Hair Space',code:'U+200A',char:'\u200A'},
      {name:'Narrow No-Break',code:'U+202F',char:'\u202F'},
      {name:'Invisible Separator',code:'U+2063',char:'\u2063'},
      {name:'No-Break Space',code:'U+00A0',char:'\u00A0'},
      {name:'Ideographic Space',code:'U+3000',char:'\u3000'},
    ],
    types: ['Zero-Width Space','Braille Blank','En Space','Em Space','No-Break Space','Hair Space'],
    placeholder: 'Click "Generate" to create blank text',
  },
  zh: {
    toolTitle: '空白文字生成器',
    toolDesc: '生成不可见的空白文字字符。复制零宽空格、空白 Unicode 和空字符，用于用户名、个人简介和消息。',
    genTitle: '生成空白文字',
    length: '长度：',
    type: '类型：',
    generate: '生成',
    copy: '复制',
    clickToCopy: '点击复制',
    step1: '浏览下方的不可见字符卡片或使用生成器',
    step2: '选择所需的空白字符类型',
    step3: '用滑块设置所需长度',
    step4: '点击「生成」，然后复制不可见文字',
    chars: [
      {name:'零宽空格',code:'U+200B',char:'\u200B'},
      {name:'零宽非连接符',code:'U+200C',char:'\u200C'},
      {name:'零宽连接符',code:'U+200D',char:'\u200D'},
      {name:'字连接符',code:'U+2060',char:'\u2060'},
      {name:'盲文空白',code:'U+2800',char:'\u2800'},
      {name:'En 空格',code:'U+2000',char:'\u2000'},
      {name:'Em 空格',code:'U+2003',char:'\u2003'},
      {name:'细空格',code:'U+200A',char:'\u200A'},
      {name:'窄不换行空格',code:'U+202F',char:'\u202F'},
      {name:'不可见分隔符',code:'U+2063',char:'\u2063'},
      {name:'不换行空格',code:'U+00A0',char:'\u00A0'},
      {name:'表意文字空格',code:'U+3000',char:'\u3000'},
    ],
    types: ['零宽空格','盲文空白','En 空格','Em 空格','不换行空格','细空格'],
    placeholder: '点击「生成」创建空白文字',
  }
});

const { $, copyText, t } = GZ;

const charMap = {
  'Zero-Width Space': '\u200B', '零宽空格': '\u200B',
  'Braille Blank': '\u2800', '盲文空白': '\u2800',
  'En Space': '\u2000', 'En 空格': '\u2000',
  'Em Space': '\u2003', 'Em 空格': '\u2003',
  'No-Break Space': '\u00A0', '不换行空格': '\u00A0',
  'Hair Space': '\u200A', '细空格': '\u200A',
};

const chars = t('chars');
const grid = $('#charGrid');
chars.forEach(c => {
  const card = document.createElement('div');
  card.className = 'char-card';
  card.innerHTML = `<div class="preview">${c.char}</div><div class="name">${c.name}</div><div class="code">${c.code}</div><div class="copy-hint">${t('clickToCopy')}</div>`;
  card.onclick = () => { copyText(c.char); };
  grid.appendChild(card);
});

$('#genTitle').textContent = t('genTitle');
$('#lblLength').textContent = t('length');
$('#lblType').textContent = t('type');
$('#generateBtn').textContent = t('generate');
$('#copyBtn').textContent = t('copy');
$('#outputPlaceholder').textContent = t('placeholder');

const types = t('types');
const sel = $('#typeSelect');
types.forEach(tp => {
  const opt = document.createElement('option');
  opt.value = tp;
  opt.textContent = tp;
  sel.appendChild(opt);
});

$('#lengthSlider').addEventListener('input', function() {
  $('#lengthVal').textContent = this.value;
});

$('#generateBtn').addEventListener('click', () => {
  const len = parseInt($('#lengthSlider').value);
  const tp = sel.value;
  const ch = charMap[tp] || '\u200B';
  const result = ch.repeat(len);
  const box = $('#outputBox');
  box.textContent = result;
  if (!result.trim()) {
    // Show a hint that content is there
    const hint = document.createElement('span');
    hint.style.cssText = 'opacity:.4;font-size:.7em;font-family:sans-serif';
    hint.textContent = `(${len} chars)`;
    box.appendChild(document.createElement('br'));
    box.appendChild(hint);
  }
});

$('#copyBtn').addEventListener('click', () => {
  const box = $('#outputBox');
  // Get only the generated text (first text node)
  const text = box.childNodes[0]?.textContent || box.textContent;
  if (text) copyText(text);
});

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'👁️', href:'/text/zero-width-remover.html', name:'Zero Width Remover'},
    {icon:'🔤', href:'/text/case-converter.html', name:'Case Converter'},
    {icon:'🧹', href:'/text/emoji-remover.html', name:'Emoji Remover'},
    {icon:'✍️', href:'/text/fancy-text.html', name:'Fancy Text'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
