<script>
GZI18n.register({
  en: {
    toolTitle: 'Excel to CSV Converter',
    toolDesc: 'Convert Excel spreadsheets (.xlsx, .xls) to CSV — choose sheet, delimiter (comma, semicolon, tab). Multiple sheets supported. 100% browser-based, no upload, no signup.',
    chooseFile: 'Choose .xlsx / .xls file or drag it here',
    info: 'Supports .xlsx, .xls • Parsed locally with SheetJS',
    copy: 'Copy CSV',
    download: '⬇ Download .csv',
    clear: 'Clear',
    output: 'CSV Output',
    sheet: 'Sheet:',
    delim: 'Delimiter:',
    error: 'Error: ',
    success: '✓ Converted!',
    rows: 'rows',
    step1: 'Click the drop zone or drag your Excel file onto it',
    step2: 'Choose the worksheet and the delimiter (comma, semicolon or tab)',
    step3: 'The CSV output appears instantly in the panel below',
    step4: 'Click Copy to copy CSV or Download to save as .csv',
  },
  zh: {
    toolTitle: 'Excel 转 CSV 转换器',
    toolDesc: '将 Excel 电子表格 (.xlsx, .xls) 转换为 CSV — 可选工作表和分隔符（逗号、分号、Tab）。支持多工作表。100% 浏览器本地处理，无需上传、无需注册。',
    chooseFile: '选择 .xlsx / .xls 文件或拖拽到此处',
    info: '支持 .xlsx、.xls • 使用 SheetJS 本地解析',
    copy: '复制 CSV',
    download: '⬇ 下载 .csv',
    clear: '清空',
    output: 'CSV 输出',
    sheet: '工作表：',
    delim: '分隔符：',
    error: '错误：',
    success: '✓ 转换成功！',
    rows: '行',
    step1: '点击上传区域或将 Excel 文件拖拽到此处',
    step2: '选择工作表和分隔符（逗号、分号或 Tab）',
    step3: 'CSV 输出会即时显示在下方面板中',
    step4: '点击「复制」复制 CSV 或「下载」保存为 .csv 文件',
  }
});

const { $, copyText, t } = GZ;
let workbook = null;

$('#dropLabel').textContent = t('chooseFile');
$('#dropInfo').textContent = t('info');
$('#sheetLabel').textContent = t('sheet');
$('#delimLabel').textContent = t('delim');
$('#lbl-out').textContent = t('output');

const drop = $('#drop');
drop.addEventListener('click', () => $('#file').click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('dragover'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
$('#file').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

async function handleFile(f) {
  if (!f) return;
  try {
    const buf = await f.arrayBuffer();
    workbook = XLSX.read(buf, { type: 'array' });
    const sel = $('#sheetSel');
    sel.innerHTML = '';
    workbook.SheetNames.forEach(n => { const o = document.createElement('option'); o.value = o.textContent = n; sel.appendChild(o); });
    $('#optsWrap').style.display = 'flex';
    drop.querySelector('.icon').textContent = '📊';
    $('#dropLabel').textContent = f.name;
    $('#dropInfo').textContent = (f.size / 1024).toFixed(1) + ' KB';
    doConvert();
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('success')}</span>`;
  } catch (e) {
    $('#status').innerHTML = `<span style="color:var(--accent)">${t('error')}${e.message}</span>`;
  }
}

function doConvert() {
  if (!workbook) return;
  const sheetName = $('#sheetSel').value;
  const sheet = workbook.Sheets[sheetName];
  const delimRaw = $('#delimSel').value;
  const delim = delimRaw === '\\t' ? '\t' : delimRaw;
  const csv = XLSX.utils.sheet_to_csv(sheet, { FS: delim, RS: '\n' });
  $('#output').textContent = csv;
  const rows = csv.split('\n').filter(l => l.length > 0).length;
  $('#stats').textContent = `${rows} ${t('rows')}`;
}

$('#sheetSel').addEventListener('change', doConvert);
$('#delimSel').addEventListener('change', doConvert);

function doDownload() {
  const csv = $('#output').textContent;
  if (!csv) return;
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'converted.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

function doClear() { workbook = null; $('#output').textContent = ''; $('#optsWrap').style.display = 'none'; $('#stats').textContent = ''; $('#status').innerHTML = ''; $('#dropLabel').textContent = t('chooseFile'); $('#dropInfo').textContent = t('info'); }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doDownload()">${t('download')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/convert/csv-to-excel.html', name:'CSV to Excel'},
    {icon:'🔧', href:'/convert/csv-to-json.html', name:'CSV to JSON'},
    {icon:'📈', href:'/convert/xlsx-viewer.html', name:'XLSX Viewer'},
    {icon:'📋', href:'/convert/csv-editor.html', name:'CSV Editor'},
  ]
});
</script>
