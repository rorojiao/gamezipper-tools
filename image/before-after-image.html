</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Before / After Image Slider',
    toolDesc: 'Upload two images and drag the slider to compare them side by side. Great for photo retouching, weight-loss transformations and design reveals — 100% browser-based, no upload.',
    hintBefore: '⬆ Click or drop your BEFORE image',
    hintAfter: '⬆ Click or drop your AFTER image',
    labBefore: 'Before',
    labAfter: 'After',
    reset: 'Reset',
    bothImages: 'Upload both images to enable the slider.',
    step1: 'Click each drop box (or drag-and-drop) to upload your before and after images',
    step2: 'Drag the white slider left and right to reveal either image',
    step3: 'Use Reset to put the slider back in the middle',
    step4: 'Both images stay in your browser — nothing is uploaded',
  },
  zh: {
    toolTitle: '对比滑块工具 / 前后图片对比',
    toolDesc: '上传两张图片，拖动滑块即可左右对比。非常适合修图对比、减肥前后、装修效果图展示 — 100% 浏览器本地运行，不上传。',
    hintBefore: '⬆ 点击或拖入「修改前」图片',
    hintAfter: '⬆ 点击或拖入「修改后」图片',
    labBefore: '修改前',
    labAfter: '修改后',
    reset: '重置',
    bothImages: '请上传两张图片以启用对比滑块。',
    step1: '点击或拖拽上传「修改前」和「修改后」两张图片',
    step2: '左右拖动白色滑块即可查看两种效果',
    step3: '点击「重置」将滑块还原到中间',
    step4: '所有图片仅在浏览器本地处理，不会上传到服务器',
  }
});
const { $, t } = GZ;
$('#hint-before').textContent = t('hintBefore');
$('#hint-after').textContent = t('hintAfter');
$('#lab-before').textContent = t('labBefore');
$('#lab-after').textContent = t('labAfter');
const wrap = $('#ba-wrap'), handle = $('#ba-handle'), after = $('#ba-after');
let imgB = new Image(), imgA = new Image();
let loadedB = false, loadedA = false;
function tryRender() {
  if (loadedB && loadedA) {
    wrap.style.display = 'block';
    setPos(50);
    $('#status').innerHTML = '';
  }
}
function setPos(pct) {
  pct = Math.max(0, Math.min(100, pct));
  handle.style.left = pct + '%';
  after.style.width = pct + '%';
}
function loadFile(file, which) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const src = e.target.result;
    if (which === 'before') { $('#img-before').src = src; imgB.src = src; loadedB = true; $('#hint-before').textContent = '✓ ' + file.name; }
    else { $('#img-after').src = src; imgA.src = src; loadedA = true; $('#hint-after').textContent = '✓ ' + file.name; }
    tryRender();
  };
  reader.readAsDataURL(file);
}
['before','after'].forEach(which => {
  const drop = $('#drop-' + which);
  const input = $('#file-' + which);
  drop.addEventListener('click', () => input.click());
  input.addEventListener('change', e => loadFile(e.target.files[0], which));
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('over'));
  drop.addEventListener('drop', e => {
    e.preventDefault(); drop.classList.remove('over');
    if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0], which);
  });
});
let dragging = false;
function moveFromX(clientX) {
  const r = wrap.getBoundingClientRect();
  setPos(((clientX - r.left) / r.width) * 100);
}
wrap.addEventListener('mousedown', e => { dragging = true; moveFromX(e.clientX); });
window.addEventListener('mousemove', e => { if (dragging) moveFromX(e.clientX); });
window.addEventListener('mouseup', () => dragging = false);
wrap.addEventListener('touchstart', e => { moveFromX(e.touches[0].clientX); }, {passive:true});
wrap.addEventListener('touchmove', e => { moveFromX(e.touches[0].clientX); }, {passive:true});
$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="setPos(50)">${t('reset')}</button>`;
$('#status').innerHTML = `<span style="color:var(--text2);font-size:.85em">${t('bothImages')}</span>`;
GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/image/image-compare.html', name:'Image Compare'},
    {icon:'🔀', href:'/image/image-flipper.html', name:'Image Flipper'},
    {icon:'🎨', href:'/image/duotone-generator.html', name:'Duotone'},
    {icon:'🔄', href:'/image/image-rotate-flip.html', name:'Rotate Image'},
  ]
});
</script>
