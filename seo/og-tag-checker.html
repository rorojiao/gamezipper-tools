.og-tag.present{border-left:4px solid #00d672}
.og-tag.missing{border-left:4px solid #e94560}

.og-name{font-family:monospace;font-weight:bold}
.og-val{font-family:monospace;opacity:.7;word-break:break-all;flex:1}
.og-badge{font-size:.75em;padding:2px 8px;border-radius:4px;white-space:nowrap}
.og-badge.ok{background:rgba(0,214,114,.15);color:#00d672}

.url-input{display:flex;gap:8px;margin-bottom:12px}
.url-input input{flex:1}
</style>

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What are Open Graph tags?", "acceptedAnswer": {"@type": "Answer", "text": "Open Graph (OG) tags are meta tags (og:title, og:description, og:image, og:url) that control how your webpage appears when shared on Facebook, LinkedIn, WhatsApp, Slack and other platforms. They use the Open Graph protocol originally created by Facebook."}}, {"@type": "Question", "name": "What OG tags are required?", "acceptedAnswer": {"@type": "Answer", "text": "The four required OG tags are og:title, og:description, og:image, and og:url. Recommended additions are og:type, og:site_name, og:image:width, og:image:height, and og:locale for best rendering."}}, {"@type": "Question", "name": "What is the recommended og:image size?", "acceptedAnswer": {"@type": "Answer", "text": "Use 1200×630 pixels for og:image. Facebook recommends 1.91:1 aspect ratio. Keep file size under 8MB. Always set og:image:width and og:image:height to prevent layout shift during loading."}}, {"@type": "Question", "name": "What is the difference between Open Graph and Twitter Card tags?", "acceptedAnswer": {"@type": "Answer", "text": "Open Graph tags are used by Facebook, LinkedIn and most platforms. Twitter Cards (twitter:card, twitter:title, etc.) are Twitter-specific. Twitter falls back to OG tags if Twitter Card tags are missing, so OG tags alone work everywhere."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="note-box" id="noteBox"></div>
    <div class="url-input">
      <input type="text" id="urlInput" placeholder="https://example.com" class="gz-input">
      <button class="gz-btn" id="checkBtn"></button>
    </div>
    <div class="platform-tabs">
      <div class="platform-tab active" id="tabFb"></div>
      <div class="platform-tab" id="tabTw"></div>
    </div>
    <div id="results"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Open Graph Tag Checker',
    toolDesc: 'Validate OG and Twitter Card tags on any webpage. Preview how your link looks on Facebook, X and LinkedIn. Find missing tags. Free OG validator, browser-only.',
    check: 'Check OG Tags',
    noteCors: '⚠ Some sites block browser fetching (CORS). Switch to the OG Generator to create tags manually.',
    facebook: 'Facebook / LinkedIn',
    twitter: 'X (Twitter)',
    present: 'Present',
    missing: 'Missing',
    incomplete: 'Incomplete',
    fetching: 'Fetching...',
    noTags: 'No OG tags found.',
    step1: 'Enter the URL of the page you want to check',
    step2: 'Click Check to extract all OG tags',
    step3: 'Review the social preview and tag status',
    step4: 'Fix any missing or incomplete OG tags',
  },
  zh: {
    toolTitle: 'Open Graph 标签检查器',
    toolDesc: '验证任意网页的 OG 和 Twitter Card 标签。预览链接在 Facebook、X 和 LinkedIn 上的显示效果。查找缺失标签。免费 OG 验证器，浏览器本地运行。',
    check: '检查 OG 标签',
    noteCors: '⚠ 部分网站禁止浏览器抓取（CORS）。可切换到 OG 生成器手动创建标签。',
    facebook: 'Facebook / LinkedIn',
    twitter: 'X (Twitter)',
    present: '已设置',
    missing: '缺失',
    incomplete: '不完整',
    fetching: '获取中...',
    noTags: '未找到 OG 标签。',
    step1: '输入要检查的页面 URL',
    step2: '点击检查以提取所有 OG 标签',
    step3: '查看社交预览和标签状态',
    step4: '修复缺失或不完整的 OG 标签',
  }
});

const { $, t } = GZ;
let previewPlatform = 'fb';
let ogData = {};

$('#tabFb').textContent = t('facebook');
$('#tabTw').textContent = t('twitter');
$('#checkBtn').textContent = t('check');
$('#noteBox').textContent = t('noteCors');

$('#tabFb').onclick = () => { previewPlatform='fb'; $('#tabFb').classList.add('active'); $('#tabTw').classList.remove('active'); renderPreview(); };
$('#tabTw').onclick = () => { previewPlatform='tw'; $('#tabTw').classList.add('active'); $('#tabFb').classList.remove('active'); renderPreview(); };
$('#checkBtn').onclick = checkUrl;

async function checkUrl() {
  let url = $('#urlInput').value.trim();
  if (!url) return;
  if (!/^https?:\/\//.test(url)) url = 'https://' + url;
  $('#results').innerHTML = `<p style="opacity:.6">${t('fetching')}</p>`;
  try {
    const proxyUrl = 'https://corsproxy.io/?url=' + encodeURIComponent(url);
    const resp = await fetch(proxyUrl);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const html = await resp.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const head = doc.head;

    function get(attr, val) {
      const el = head.querySelector(`meta[${attr}="${val}"]`);
      return el ? el.getAttribute('content') : '';
    }

    ogData = {
      url,
      domain: new URL(url).hostname,
      ogTitle: get('property','og:title'),
      ogDesc: get('property','og:description'),
      ogImage: get('property','og:image'),
      ogUrl: get('property','og:url'),
      ogType: get('property','og:type'),
      ogSiteName: get('property','og:site_name'),
      ogLocale: get('property','og:locale'),
      ogImgWidth: get('property','og:image:width'),
      ogImgHeight: get('property','og:image:height'),
      twCard: get('name','twitter:card'),
      twTitle: get('name','twitter:title'),
      twDesc: get('name','twitter:description'),
      twImage: get('name','twitter:image'),
      fallbackTitle: doc.querySelector('title')?.textContent || '',
      fallbackDesc: get('name','description'),
    };

    const hasAnyOG = ogData.ogTitle || ogData.ogDesc || ogData.ogImage;
    if (!hasAnyOG) {
      $('#results').innerHTML = `<p>${t('noTags')}</p>`;
      return;
    }
    renderTags();
    renderPreview();
  } catch(e) {
    $('#results').innerHTML = `<div class="og-tag missing"><span class="og-name">Error</span><span class="og-val">${e.message}</span><span class="og-badge bad">ERR</span></div><p style="font-size:.8em;opacity:.7;margin-top:8px">${t('noteCors')}</p>`;
  }
}

function checkTag(name, val, required, minLen) {
  required = required !== false;
  minLen = minLen || 0;
  let badge, badgeClass;
  if (!val) {
    if (required) { badge=t('missing'); badgeClass='bad'; }
    else { badge=t('missing'); badgeClass='warn'; }
  } else if (minLen>0 && val.length < minLen) {
    badge=t('incomplete'); badgeClass='warn';
  } else {
    badge=t('present'); badgeClass='ok';
  }
  return { name, val, badge, badgeClass };
}

function renderTags() {
  const tags = [
    checkTag('og:title', ogData.ogTitle, true, 10),
    checkTag('og:description', ogData.ogDesc, true, 30),
    checkTag('og:image', ogData.ogImage, true),
    checkTag('og:url', ogData.ogUrl, true),
    checkTag('og:type', ogData.ogType, false),
    checkTag('og:site_name', ogData.ogSiteName, false),
    checkTag('og:locale', ogData.ogLocale, false),
    checkTag('og:image:width', ogData.ogImgWidth, false),
    checkTag('og:image:height', ogData.ogImgHeight, false),
    checkTag('twitter:card', ogData.twCard, false),
    checkTag('twitter:title', ogData.twTitle, false),
    checkTag('twitter:description', ogData.twDesc, false),
    checkTag('twitter:image', ogData.twImage, false),
  ];
  const tagHtml = tags.map(tg =>
    `<div class="og-tag ${tg.badgeClass==='ok'?'present':tg.badgeClass==='bad'?'missing':'warn'}">
      <span class="og-name">${tg.name}</span>
      <span class="og-val">${escapeHtml(tg.val||'—')}</span>
      <span class="og-badge ${tg.badgeClass}">${tg.badge}</span>
    </div>`
  ).join('');
  const previewHtml = previewPlatform === 'fb' ? '' : ''; // handled by renderPreview
  if (previewPlatform) { /* keep preview as-is */ }
  // Only render tags if preview hasn't rendered yet, else just update tags section
  const existingPreview = $('#ogPreview');
  if (existingPreview) {
    $('#ogTagsSection').innerHTML = tagHtml;
  } else {
    $('#results').innerHTML = `<div id="ogPreview"></div><h3 style="margin-top:20px">Open Graph Tags</h3><div id="ogTagsSection">${tagHtml}</div>`;
  }
}

function renderPreview() {
  let preview;
  const title = previewPlatform==='tw' ? (ogData.twTitle || ogData.ogTitle || ogData.fallbackTitle) : (ogData.ogTitle || ogData.fallbackTitle);
  const desc = previewPlatform==='tw' ? (ogData.twDesc || ogData.ogDesc || ogData.fallbackDesc) : (ogData.ogDesc || ogData.fallbackDesc);
  const img = previewPlatform==='tw' ? (ogData.twImage || ogData.ogImage) : ogData.ogImage;
  const card = previewPlatform==='tw' ? (ogData.twCard || 'summary_large_image') : '';

  const imgHtml = img ? `<img src="${escapeHtml(img)}" class="preview-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt=""><div class="preview-img" style="display:none">🖼️ No image</div>` : `<div class="preview-img">🖼️ ${GZ.t('missing')}</div>`;

  if (previewPlatform === 'tw' && card === 'summary') {
    // Compact Twitter card - horizontal layout
    preview = `<div class="preview-card"><div style="display:flex"><div style="width:120px;flex-shrink:0;overflow:hidden;border-right:1px solid var(--gz-border,#333)">${img ? `<img src="${escapeHtml(img)}" style="width:100%;height:120px;object-fit:cover" onerror="this.style.display='none'" alt="">` : '<div style="width:120px;height:120px;display:flex;align-items:center;justify-content:center;background:var(--gz-bg-alt)">🖼️</div>'}</div><div class="preview-body" style="flex:1"><div class="preview-domain">${escapeHtml(ogData.domain)}</div><div class="preview-title">${escapeHtml(title||'')}</div><div class="preview-desc">${escapeHtml(desc||'')}</div></div></div></div>`;
  } else {
    preview = `<div class="preview-card">${imgHtml}<div class="preview-body"><div class="preview-domain">${escapeHtml(ogData.domain)}</div><div class="preview-title">${escapeHtml(title||'')}</div><div class="preview-desc">${escapeHtml(desc||'')}</div></div></div>`;
  }

  const existing = $('#ogPreview');
  if (existing) {
    existing.innerHTML = preview;
  }
}

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

GZ.renderToolPage({
  category: 'seo',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/seo/open-graph-generator.html', name:'OG Generator'},
    {icon:'🔍', href:'/seo/meta-tag-checker.html', name:'Meta Tag Checker'},
    {icon:'🐦', href:'/seo/twitter-card-preview.html', name:'Twitter Preview'},
    {icon:'📊', href:'/seo/link-preview.html', name:'Link Preview'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
