<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Coin Flip Simulator',
    toolDesc: 'Flip a virtual coin to get heads or tails. Track flip history, flip multiple coins at once, and check heads vs tails probability stats.',
    btnFlip: '🪙 Flip Coin',
    btnReset: '↺ Reset',
    lblCount: 'Coins per flip',
    lblHeads: 'Heads',
    lblTails: 'Tails',
    lblTotal: 'Total flips',
    resultHeads: '🦅 Heads!',
    resultTails: '🐦 Tails!',
    multiResult: (h, t) => `${h} heads · ${t} tails`,
    tipText: 'Tap the coin, the Flip button, or press Space to toss. Each flip is a fair 50/50 random outcome — great for quick decisions, yes/no calls and probability demos.',
    step1: 'Choose how many coins to flip at once (1, 3, 5, 10, 25 or 50)',
    step2: 'Tap the coin or press the Flip button (or hit the Spacebar)',
    step3: 'Read the result — heads or tails — and watch the live stats update',
    step4: 'Use Reset to clear the history and start a fresh series',
  },
  zh: {
    toolTitle: '抛硬币模拟器',
    toolDesc: '抛掷虚拟硬币，立即得到正面或反面。可记录历史、一次抛多枚硬币，并查看正反面概率统计。',
    btnFlip: '🪙 抛硬币',
    btnReset: '↺ 重置',
    lblCount: '每次抛硬币数',
    lblHeads: '正面',
    lblTails: '反面',
    lblTotal: '总次数',
    resultHeads: '🦅 正面！',
    resultTails: '🐦 反面！',
    multiResult: (h, t) => `${h} 正面 · ${t} 反面`,
    tipText: '点击硬币、抛掷按钮或按空格键即可抛掷。每次抛掷都是公平的 50/50 随机结果 — 非常适合快速决策、是非选择和概率演示。',
    step1: '选择一次抛多少枚硬币（1、3、5、10、25 或 50）',
    step2: '点击硬币或抛掷按钮（也可按空格键）',
    step3: '查看结果（正面或反面），实时统计会自动更新',
    step4: '点击重置清空历史，开始新一轮',
  }
});

const { $, t } = GZ;
let heads = 0, tails = 0;
let history = [];
let flipping = false;

function secureRand() {
  if (window.crypto && crypto.getRandomValues) {
    const a = new Uint8Array(1); crypto.getRandomValues(a); return a[0] / 256;
  }
  return Math.random();
}

function flip() {
  if (flipping) return;
  const n = parseInt($('#count').value, 10);
  flipping = true;
  $('#coin').classList.remove('tails');
  $('#coin').classList.add('flipping');
  $('#result').textContent = '…';
  setTimeout(() => {
    let h = 0, tt = 0;
    const batch = [];
    for (let i = 0; i < n; i++) {
      const r = secureRand() < 0.5 ? 'H' : 'T';
      if (r === 'H') h++; else tt++;
      batch.push(r);
      history.unshift(r);
    }
    if (history.length > 60) history = history.slice(0, 60);
    heads += h; tails += tt;
    const last = batch[batch.length - 1];
    if (n === 1) {
      if (last === 'H') { $('#coin').classList.remove('tails'); $('#face').textContent = '🦅'; $('#result').textContent = t('resultHeads'); }
      else { $('#coin').classList.add('tails'); $('#face').textContent = '🐦'; $('#result').textContent = t('resultTails'); }
    } else {
      $('#result').textContent = t('multiResult')(h, tt);
      if (h >= tt) { $('#coin').classList.remove('tails'); $('#face').textContent = '🦅'; }
      else { $('#coin').classList.add('tails'); $('#face').textContent = '🐦'; }
    }
    $('#coin').classList.remove('flipping');
    updateStats();
    flipping = false;
  }, 1100);
}

function updateStats() {
  const total = heads + tails;
  $('#headsCount').textContent = heads;
  $('#tailsCount').textContent = tails;
  $('#totalFlips').textContent = total;
  const hp = total ? (heads / total * 100) : 50;
  $('#barH').style.width = hp + '%';
  $('#barT').style.width = (100 - hp) + '%';
  $('#history').innerHTML = history.map(r =>
    `<div class="cf-pip ${r === 'H' ? 'h' : 't'}">${r === 'H' ? '🦅' : '🐦'}</div>`
  ).join('');
}

function reset() {
  heads = 0; tails = 0; history = [];
  $('#coin').classList.remove('tails', 'flipping');
  $('#face').textContent = '🦅';
  $('#result').textContent = '—';
  updateStats();
}

document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); flip(); } });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="flip()">${t('btnFlip')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="reset()">${t('btnReset')}</button>`;
$('#btnFlip').textContent = t('btnFlip');
$('#btnReset').textContent = t('btnReset');
$('#tipText').textContent = t('tipText');

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎲',href:'/fun/dice-roller.html',name:'Dice Roller'},
    {icon:'🎡',href:'/fun/decision-wheel.html',name:'Decision Wheel'},
    {icon:'🎯',href:'/fun/raffle-winner-picker.html',name:'Raffle Picker'},
    {icon:'🎉',href:'/fun/raffle-winner-picker.html',name:'Random Picker'},
  ]
});
</script>
