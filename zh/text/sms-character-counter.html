<script>
GZI18n.register({
  en: {
    toolTitle: 'SMS Character Counter',
    toolDesc: 'Count SMS characters and calculate message segments in real-time. Detects GSM-7 vs UCS-2 (Unicode) encoding, shows multipart limits and estimates cost. Free, private, browser-only.',
    placeholder: 'Type your text message here...',
    example: 'Load Example',
    clear: 'Clear',
    characters: 'Characters',
    segments: 'Segments',
    encoding: 'Encoding',
    perSegment: 'chars / segment',
    remaining: 'Remaining',
    lblCostPer: 'Cost per segment: $',
    lblTotalCost: 'Total cost:',
    empty: 'Your message preview...',
  },
  zh: {
    toolTitle: '短信字符计数器',
    toolDesc: '实时统计短信字符数并计算消息分段。自动检测 GSM-7 与 UCS-2（Unicode）编码，显示分段上限并估算费用。免费、私密、浏览器本地运行。',
    placeholder: '在此输入你的短信内容...',
    example: '加载示例',
    clear: '清空',
    characters: '字符数',
    segments: '分段数',
    encoding: '编码',
    perSegment: '字符 / 分段',
    remaining: '剩余',
    lblCostPer: '每段费用：$',
    lblTotalCost: '总费用：',
    empty: '消息预览...',
  }
});

const { $, t } = GZ;

// GSM 7-bit default alphabet
const GSM7 = new Set('@£$¥èéùìòÇ\nØø\rÅåΔ_ΦΓΛΩΠΨΣΘΞ ÆæßÉ !"#¤%&\'()*+,-./0123456789:;<=>?¡ABCDEFGHIJKLMNOPQRSTUVWXYZÄÖÑÜ§¿abcdefghijklmnopqrstuvwxyzäöñüà');
// Extended GSM chars count as 2
const GSM7_EXT = new Set('^{}\\\\~[]|€');

function isGsm7(text){
  for (const ch of text){
    if (!GSM7.has(ch) && !GSM7_EXT.has(ch)) return false;
  }
  return true;
}

function gsmLength(text){
  let len = 0;
  for (const ch of text){
    len += GSM7_EXT.has(ch) ? 2 : 1;
  }
  return len;
}

function calculate(){
  const text = $('#input').value;
  const preview = $('#preview');
  const badge = $('#encodingBadge');
  if (!text){
    preview.textContent = t('empty');
    preview.classList.add('empty');
    $('#stats').innerHTML = '';
    $('#barFill').style.width = '0%';
    badge.textContent = 'GSM-7';
    badge.className = 'sms-encoding gsm';
    $('#totalCost').textContent = '$0.00';
    return;
  }
  preview.textContent = text;
  preview.classList.remove('empty');
  const gsm = isGsm7(text);
  const encoding = gsm ? 'GSM-7' : 'UCS-2';
  const charCount = gsm ? gsmLength(text) : [...text].length;
  const perSegment = gsm ? (charCount <= 160 ? 160 : 153) : (charCount <= 70 ? 70 : 67);
  const segments = Math.max(1, Math.ceil(charCount / perSegment));
  const remaining = (segments === 1 ? perSegment : segments * perSegment) - charCount;
  badge.textContent = encoding;
  badge.className = 'sms-encoding ' + (gsm ? 'gsm' : 'ucs2');
  const pct = Math.min(100, (charCount / perSegment) * 100);
  $('#barFill').style.width = pct + '%';
  $('#stats').innerHTML = `
    <div class="sms-stat"><div class="num">${charCount}</div><div class="label">${t('characters')}</div></div>
    <div class="sms-stat ${segments>1?'warn':''}"><div class="num">${segments}</div><div class="label">${t('segments')}</div></div>
    <div class="sms-stat"><div class="num">${perSegment}</div><div class="label">${t('perSegment')}</div></div>
    <div class="sms-stat"><div class="num">${remaining}</div><div class="label">${t('remaining')}</div></div>`;
  const cost = parseFloat($('#costPerSegment').value) || 0;
  $('#totalCost').textContent = '$' + (segments * cost).toFixed(2);
}

function loadExample(){
  $('#input').value = "Hey! Just wanted to confirm our meeting tomorrow at 3pm. Can you bring the quarterly report? Also don't forget the presentation slides. Thanks! 😊";
  calculate();
}

function clearAll(){
  $('#input').value=''; calculate();
}

$('#input').addEventListener('input',calculate);
$('#costPerSegment').addEventListener('input',calculate);
$('#input').placeholder = t('placeholder');
$('#lblCostPer').textContent = t('lblCostPer');
$('#lblTotalCost').textContent = t('lblTotalCost');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="clearAll()">${t('clear')}</button>`;

calculate();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💬', href:'/social/twitter-character-counter.html', name:'Twitter Counter'},
    {icon:'📝', href:'/text/word-counter.html', name:'Word Counter'},
    {icon:'🔢', href:'/text/letter-counter.html', name:'Letter Counter'},
    {icon:'📱', href:'/social/instagram-hashtag-generator.html', name:'Hashtag Generator'},
  ]
});
</script>
