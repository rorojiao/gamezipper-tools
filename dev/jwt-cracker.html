let running = false;

function strToBytes(s){ return new TextEncoder().encode(s); }
function bytesToHex(buf){ return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join(''); }
function b64urlToBytes(s){
  s = s.replace(/-/g,'+').replace(/_/g,'/');
  while(s.length % 4) s += '=';
  const bin = atob(s);
  const out = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) out[i] = bin.charCodeAt(i);
  return out;
}

function getAlg(token){
  const parts = token.trim().split('.');
  if(parts.length < 2) return null;
  try{
    const header = JSON.parse(new TextDecoder().decode(b64urlToBytes(parts[0])));
    return { alg: header.alg, signedInput: parts[0] + '.' + parts[1], sig: b64urlToBytes(parts[2]) };
  }catch(_){ return null; }
}

function algToWebCrypto(alg){
  if(alg === 'HS256') return 'SHA-256';
  if(alg === 'HS384') return 'SHA-384';
  if(alg === 'HS512') return 'SHA-512';
  return null;
}

function expandWordlist(words, mode){
  const out = [];
  const seen = new Set();
  const add = (s) => { if(!seen.has(s)){ seen.add(s); out.push(s); } };
  for(const w of words){
    if(!w) continue;
    if(mode === 'wordlist'){
      add(w);
    } else if(mode === 'wordlist-case'){
      add(w); add(w.toLowerCase()); add(w.toUpperCase());
      add(w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
    } else if(mode === 'wordlist-suffix'){
      add(w);
      for(const sfx of ['','1','12','123','1234','12345','!','@','#','2024','2025','2026','007','0','99','00']){
        add(w + sfx);
      }
    }
  }
  return out;
}

async function trySecret(input, secret, hashAlg){
  const key = await crypto.subtle.importKey('raw', strToBytes(secret), { name:'HMAC', hash:{ name: hashAlg } }, false, ['sign']);
  const sig = new Uint8Array(await crypto.subtle.sign('HMAC', key, strToBytes(input)));
  return sig;
}

function ctEqual(a, b){
  if(a.length !== b.length) return false;
  let d = 0;
  for(let i=0;i<a.length;i++) d |= a[i] ^ b[i];
  return d === 0;
}

async function doCrack(){
  if(running) return;
  const token = $('#token').value.trim();
  if(!token){ $('#status').innerHTML = '<span style="color:var(--text3)">' + t('empty') + '</span>'; return; }
  const info = getAlg(token);
  if(!info){ $('#status').innerHTML = '<span style="color:var(--gz-accent)">' + t('badJwt') + '</span>'; return; }
  const hashAlg = algToWebCrypto(info.alg);
  if(!hashAlg){ $('#status').innerHTML = '<span style="color:var(--gz-accent)">' + t('notHmac') + ' (' + info.alg + ')</span>'; return; }

  // Build wordlist
  let words = [];
  if($('#useBuiltin').checked) words = words.concat(BUILTIN.split('\n'));
  const custom = $('#wordlist').value.split('\n').map(s => s.trim()).filter(Boolean);
  words = words.concat(custom);
  const candidates = expandWordlist(words, $('#mode').value);

  running = true;
  $('#output').innerHTML = '<span style="color:var(--text3)">Cracking ' + info.alg + ' with ' + candidates.length + ' candidate(s)…</span>';
  $('#bar').style.width = '0%';

  const input = info.signedInput;
  const target = info.sig;
  const startTime = performance.now();
  let i = 0;
  const BATCH = 250;

  while(running && i < candidates.length){
    const end = Math.min(i + BATCH, candidates.length);
    for(let j = i; j < end; j++){
      try{
        const sig = await trySecret(input, candidates[j], hashAlg);
        if(ctEqual(sig, target)){
          const elapsed = ((performance.now() - startTime)/1000).toFixed(1);
          $('#bar').style.width = '100%';
          $('#output').innerHTML =
            '<div class="found">' + t('found') + '</div>' +
            '<div style="margin-top:8px;color:var(--text2)">secret = <b style="color:var(--accent);font-size:1.05em">' + escapeHtml(candidates[j]) + '</b></div>' +
            '<div style="margin-top:4px;color:var(--text3);font-size:.78rem">' + (j+1) + ' attempts in ' + elapsed + 's · ' + info.alg + '</div>';
          $('#status').innerHTML = '<button class="gz-btn" onclick="copyText(\'' + candidates[j].replace(/'/g,"\\'") + '\')">' + t('copy') + '</button>';
          running = false;
          return;
        }
      }catch(_){}
    }
    i = end;
    const pct = Math.round(i / candidates.length * 100);
    $('#bar').style.width = pct + '%';
    $('#stat-tried').innerHTML = t('tried') + ': <b>' + i + '</b>';
    $('#stat-total').innerHTML = t('total') + ': <b>' + candidates.length + '</b>';
    const elapsed = (performance.now() - startTime)/1000;
    $('#stat-rate').innerHTML = t('rate') + ': <b>' + Math.round(i/elapsed) + '/s</b>';
    // yield to UI
    await new Promise(r => setTimeout(r, 0));
  }
  running = false;
  if(i >= candidates.length){
    $('#bar').style.width = '100%';
    $('#output').innerHTML = '<div class="notfound">' + t('notFound') + '</div>';
    $('#status').innerHTML = '';
  } else {
    $('#output').innerHTML = '<div class="notfound">' + t('stopped') + ' ' + i + ' candidate(s).</div>';
    $('#status').innerHTML = '';
  }
}

function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function doStop(){ running = false; }

function loadExample(){
  // Build a real HS256 token signed with "supersecret" so users see a FOUND result
  (async()=>{
    const header = b64url(JSON.stringify({alg:'HS256',typ:'JWT'}));
    const payload = b64url(JSON.stringify({sub:'demo',iat:1730000000,exp:9999999999}));
    const key = await crypto.subtle.importKey('raw', strToBytes('supersecret'), {name:'HMAC',hash:{name:'SHA-256'}}, false, ['sign']);
    const sig = new Uint8Array(await crypto.subtle.sign('HMAC', key, strToBytes(header + '.' + payload)));
    $('#token').value = header + '.' + payload + '.' + b64urlBytes(sig);
  })();
}

function b64url(s){ return btoa(s).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_'); }
function b64urlBytes(bytes){
  let bin = '';
  for(let i=0;i<bytes.length;i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
}
