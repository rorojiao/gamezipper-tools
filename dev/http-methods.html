.gz-search input{width:100%;padding:10px 14px;background:var(--glass);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:1em}

<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the difference between PUT and PATCH?", "acceptedAnswer": {"@type": "Answer", "text": "PUT replaces an entire resource with a new representation, while PATCH applies a partial modification. PUT is idempotent — sending the same PUT twice leaves the resource in the same state. PATCH is not strictly idempotent, although in practice many PATCH operations are."}}, {"@type": "Question", "name": "Which HTTP methods are safe?", "acceptedAnswer": {"@type": "Answer", "text": "A method is safe if it does not alter server state. GET, HEAD, OPTIONS and TRACE are safe. POST, PUT, PATCH and DELETE are unsafe because they create or modify resources. Safe methods can be cached and prefetched without risk."}}, {"@type": "Question", "name": "Is POST idempotent?", "acceptedAnswer": {"@type": "Answer", "text": "No. POST is not idempotent — submitting the same POST twice typically creates two resources. This is why browsers warn when you refresh a POST result. To make retries safe, use an idempotency key header."}}, {"@type": "Question", "name": "Can GET have a request body?", "acceptedAnswer": {"@type": "Answer", "text": "Technically the HTTP spec does not forbid it, but most servers and proxies ignore or reject a GET body. Use query parameters instead. POST, PUT, PATCH and DELETE all support request bodies."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'HTTP Methods Reference',
    toolDesc: 'Complete reference of HTTP request methods — GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS, CONNECT and TRACE. Properties, idempotency, cacheability, body support and copy-ready examples.',
    searchPlaceholder: 'Search methods, properties or descriptions...',
    propSafe: 'Safe', propIdempotent: 'Idempotent', propCacheable: 'Cacheable', propBody: 'Body allowed',
    yes: 'Yes', no: 'No',
    btnCopy: 'Copy all examples', btnClear: 'Clear search',
    step1: 'Type in the search box to filter methods by name, property or description.',
    step2: 'Each card shows the method name, properties (safe, idempotent, cacheable, body) and a short explanation.',
    step3: 'Copy the curl example at the bottom of any card with one click.',
    step4: 'Pair this reference with the HTTP Status Codes tool to design robust REST APIs.',
  },
  zh: {
    toolTitle: 'HTTP 请求方法参考',
    toolDesc: '完整的 HTTP 请求方法参考 — GET、POST、PUT、PATCH、DELETE、HEAD、OPTIONS、CONNECT 和 TRACE。包含属性、幂等性、可缓存性、请求体支持和可复制的示例。',
    searchPlaceholder: '按方法名、属性或描述搜索...',
    propSafe: '安全', propIdempotent: '幂等', propCacheable: '可缓存', propBody: '允许请求体',
    yes: '是', no: '否',
    btnCopy: '复制全部示例', btnClear: '清空搜索',
    step1: '在搜索框输入可按方法名、属性或描述过滤。',
    step2: '每张卡片显示方法名、属性（安全、幂等、可缓存、请求体）和简要说明。',
    step3: '点击卡片底部的 curl 示例即可一键复制。',
    step4: '配合 HTTP 状态码参考工具一起使用，设计更健壮的 REST API。',
  }
});

const { $, copyText, t } = GZ;

const METHODS = [
  {
    verb: 'GET', cls: 'verb-get',
    titleEn: 'Read a resource', titleZh: '读取资源',
    descEn: 'Requests a representation of the specified resource. Should only retrieve data and have no other effect. This is the most common HTTP method and the one used every time you load a web page.',
    descZh: '请求指定资源的表示形式。只用于获取数据，不应有其他副作用。是最常见的 HTTP 方法，每次加载网页都会用到。',
    safe: true, idempotent: true, cacheable: true, body: false,
    example: 'curl -X GET https://api.example.com/users/42 \\\n  -H "Accept: application/json"'
  },
  {
    verb: 'POST', cls: 'verb-post',
    titleEn: 'Create a resource', titleZh: '创建资源',
    descEn: 'Submits an entity to the specified resource, often causing a state change or side effects on the server. Used to create new resources, submit forms, upload files or trigger actions.',
    descZh: '向指定资源提交实体，通常会引起服务器的状态变化或副作用。用于创建新资源、提交表单、上传文件或触发操作。',
    safe: false, idempotent: false, cacheable: false, body: true,
    example: 'curl -X POST https://api.example.com/users \\\n  -H "Content-Type: application/json" \\\n  -d \'{"name":"Alice","email":"a@x.com"}\''
  },
  {
    verb: 'PUT', cls: 'verb-put',
    titleEn: 'Replace a resource', titleZh: '替换资源',
    descEn: 'Replaces all current representations of the target resource with the request payload. The client supplies the complete new representation. Calling PUT twice with the same payload leaves the resource in the same state.',
    descZh: '用请求载荷替换目标资源的全部当前表示。客户端必须提供完整的新资源表示。同样的 PUT 调用两次，资源状态相同。',
    safe: false, idempotent: true, cacheable: false, body: true,
    example: 'curl -X PUT https://api.example.com/users/42 \\\n  -H "Content-Type: application/json" \\\n  -d \'{"name":"Alice","email":"new@x.com"}\''
  },
  {
    verb: 'PATCH', cls: 'verb-patch',
    titleEn: 'Partially modify a resource', titleZh: '部分修改资源',
    descEn: 'Applies partial modifications to a resource. Unlike PUT, PATCH only sends the fields that should change. Useful for updating a single property without resending the whole object.',
    descZh: '对资源进行部分修改。与 PUT 不同，PATCH 只发送需要更改的字段。适用于只更新单个属性而不重发整个对象。',
    safe: false, idempotent: false, cacheable: false, body: true,
    example: 'curl -X PATCH https://api.example.com/users/42 \\\n  -H "Content-Type: application/merge-patch+json" \\\n  -d \'{"email":"new@x.com"}\''
  },
  {
    verb: 'DELETE', cls: 'verb-delete',
    titleEn: 'Remove a resource', titleZh: '删除资源',
    descEn: 'Deletes the specified resource. The server may immediately remove it, schedule deletion or soft-delete. Idempotent — deleting the same resource twice yields the same end state (resource is gone).',
    descZh: '删除指定资源。服务器可以立即删除、计划删除或软删除。幂等 — 两次删除同一资源，最终状态相同（资源不存在）。',
    safe: false, idempotent: true, cacheable: false, body: 'optional',
    example: 'curl -X DELETE https://api.example.com/users/42 \\\n  -H "Authorization: Bearer <token>"'
  },
  {
    verb: 'HEAD', cls: 'verb-head',
    titleEn: 'Get headers only', titleZh: '只获取头信息',
    descEn: 'Asks for a response identical to GET but without the response body. Useful for checking existence, size (Content-Length) or type (Content-Type) before downloading.',
    descZh: '请求与 GET 相同的响应，但不返回响应体。用于在下载前检查资源是否存在、大小（Content-Length）或类型（Content-Type）。',
    safe: true, idempotent: true, cacheable: true, body: false,
    example: 'curl -I https://api.example.com/users/42 \\\n  -H "Accept: application/json"'
  },
  {
    verb: 'OPTIONS', cls: 'verb-options',
    titleEn: 'Describe communication options', titleZh: '描述通信选项',
    descEn: 'Describes the communication options for the target resource. Servers return allowed methods, CORS headers and supported features. Browsers send a preflight OPTIONS request before cross-origin POST/PUT.',
    descZh: '描述目标资源的通信选项。服务器返回允许的方法、CORS 头和支持的功能。浏览器在跨域 POST/PUT 之前会发送预检 OPTIONS 请求。',
    safe: true, idempotent: true, cacheable: false, body: false,
    example: 'curl -X OPTIONS https://api.example.com/users \\\n  -H "Origin: https://app.example.com" -i'
  },
  {
    verb: 'CONNECT', cls: 'verb-connect',
    titleEn: 'Establish a tunnel', titleZh: '建立隧道',
    descEn: 'Establishes a tunnel to the server identified by the target resource. Used almost exclusively with HTTPS proxies to set up TLS-encrypted connections. Cannot be issued directly by JavaScript in a browser.',
    descZh: '与目标资源标识的服务器建立隧道。几乎仅用于 HTTPS 代理以建立 TLS 加密连接。浏览器中的 JavaScript 不能直接发起。',
    safe: false, idempotent: false, cacheable: false, body: false,
    example: '# Used by proxies to set up TLS:\ncurl -p --proxy http://proxy:8080 \\\n  https://api.example.com/users/42'
  },
  {
    verb: 'TRACE', cls: 'verb-trace',
    titleEn: 'Loop-back a test', titleZh: '回环测试',
    descEn: 'Performs a message loop-back test along the path to the target resource. Mostly disabled on public servers because it can be abused in cross-site tracing (XST) attacks. Useful for debugging proxies.',
    descZh: '沿目标资源路径执行消息回环测试。大多数公共服务器已禁用，因为可能被用于跨站追踪 (XST) 攻击。可用于调试代理。',
    safe: true, idempotent: true, cacheable: false, body: false,
    example: '# Most servers disable TRACE for security\ncurl -X TRACE https://api.example.com/ -v'
  },
];

function renderGrid() {
  const lang = GZI18n.getLang();
  const q = $('#searchBox').value.toLowerCase().trim();
  const grid = $('#grid');
  const filtered = METHODS.filter(function(m){
    if (!q) return true;
    const title = lang === 'zh' ? m.titleZh : m.titleEn;
    const desc = lang === 'zh' ? m.descZh : m.descEn;
    return m.verb.toLowerCase().indexOf(q) >= 0 ||
      title.toLowerCase().indexOf(q) >= 0 ||
      desc.toLowerCase().indexOf(q) >= 0 ||
      (m.safe && 'safe'.indexOf(q) >= 0) ||
      (m.idempotent && 'idempotent'.indexOf(q) >= 0) ||
      (m.cacheable && 'cacheable'.indexOf(q) >= 0) ||
      (m.body && 'body'.indexOf(q) >= 0);
  });
  grid.innerHTML = filtered.map(function(m){
    const title = lang === 'zh' ? m.titleZh : m.titleEn;
    const desc = lang === 'zh' ? m.descZh : m.descEn;
    const yn = function(v){ return v ? '<span class="yes">' + t('yes') + '</span>' : '<span class="no">' + t('no') + '</span>'; };
    const bodyStr = m.body === 'optional' ? '<span class="yes">' + t('yes') + '*</span>' : yn(m.body);
    return '<div class="method-card">' +
      '<span class="verb ' + m.cls + '">' + m.verb + '</span>' +
      '<h3>' + title + '</h3>' +
      '<p>' + desc + '</p>' +
      '<div class="props">' +
        '<span>' + t('propSafe') + ': ' + yn(m.safe) + '</span>' +
        '<span>' + t('propIdempotent') + ': ' + yn(m.idempotent) + '</span>' +
        '<span>' + t('propCacheable') + ': ' + yn(m.cacheable) + '</span>' +
        '<span>' + t('propBody') + ': ' + bodyStr + '</span>' +
      '</div>' +
      '<code>' + m.example.replace(/</g, '&lt;') + '</code>' +
    '</div>';
  }).join('');
  if (filtered.length === 0) grid.innerHTML = '<p style="text-align:center;color:var(--text2);padding:30px">—</p>';
}

$('#searchBox').addEventListener('input', renderGrid);
$('#searchBox').placeholder = t('searchPlaceholder');

function copyAll() {
  const txt = METHODS.map(function(m){ return '# ' + m.verb + '\n' + m.example; }).join('\n\n');
  copyText(txt);
}

$('#toolbar').innerHTML =
  '<button class="gz-btn" onclick="copyAll()">' + t('btnCopy') + '</button>' +
  '<button class="gz-btn gz-btn-secondary" onclick="$(\'#searchBox\').value=\'\';renderGrid()">' + t('btnClear') + '</button>';

renderGrid();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/dev/http-status-codes.html', name:'HTTP Status Codes'},
    {icon:'🔗', href:'/dev/url-parser.html', name:'URL Parser'},
    {icon:'🔄', href:'/dev/curl-to-code.html', name:'cURL to Code'},
    {icon:'📡', href:'/dev/http-headers.html', name:'HTTP Headers Checker'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
