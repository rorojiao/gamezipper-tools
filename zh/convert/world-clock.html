<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">

      <select id="citySel">
        <option value="">+ Add a city</option>

      <button class="gz-btn" id="addLocal">📍 Add My Location</button>

    <div class="wc-grid" id="grid"></div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'World Clock',
    toolDesc: 'Track live time in cities around the world. Compare timezones, plan meetings across continents and visualize day/night — all in your browser.',
    remove: '✕',
    addLocal: '📍 Add My Location',
    step1: 'Click "Add My Location" to start with your timezone',
    step2: 'Use the dropdown to add any city from the list',
    step3: 'Click the ✕ on a card to remove that city',
    step4: 'Scroll down to see the meeting planner grid',
  },
  zh: {
    toolTitle: '世界时钟',
    toolDesc: '追踪全球城市的实时时间。比较时区、跨大陆安排会议，可视化昼夜 — 完全在浏览器中运行。',
    remove: '✕',
    addLocal: '📍 添加我的位置',
    step1: '点击「添加我的位置」以你的时区开始',
    step2: '使用下拉菜单添加任意城市',
    step3: '点击卡片上的 ✕ 移除该城市',
    step4: '向下滚动查看会议规划网格',
  }
});

const {$, t} = GZ;

const cities = {
  'UTC': 'UTC',
  'New York': 'America/New_York',
  'Los Angeles': 'America/Los_Angeles',
  'Chicago': 'America/Chicago',
  'Denver': 'America/Denver',
  'Toronto': 'America/Toronto',
  'Vancouver': 'America/Vancouver',
  'Mexico City': 'America/Mexico_City',
  'São Paulo': 'America/Sao_Paulo',
  'Buenos Aires': 'America/Argentina/Buenos_Aires',
  'London': 'Europe/London',
  'Dublin': 'Europe/Dublin',
  'Paris': 'Europe/Paris',
  'Berlin': 'Europe/Berlin',
  'Madrid': 'Europe/Madrid',
  'Rome': 'Europe/Rome',
  'Amsterdam': 'Europe/Amsterdam',
  'Stockholm': 'Europe/Stockholm',
  'Zurich': 'Europe/Zurich',
  'Athens': 'Europe/Athens',
  'Istanbul': 'Europe/Istanbul',
  'Moscow': 'Europe/Moscow',
  'Cairo': 'Africa/Cairo',
  'Johannesburg': 'Africa/Johannesburg',
  'Lagos': 'Africa/Lagos',
  'Dubai': 'Asia/Dubai',
  'Tehran': 'Asia/Tehran',
  'Karachi': 'Asia/Karachi',
  'Mumbai': 'Asia/Kolkata',
  'Delhi': 'Asia/Kolkata',
  'Bangkok': 'Asia/Bangkok',
  'Singapore': 'Asia/Singapore',
  'Jakarta': 'Asia/Jakarta',
  'Hong Kong': 'Asia/Hong_Kong',
  'Shanghai': 'Asia/Shanghai',
  'Beijing': 'Asia/Shanghai',
  'Taipei': 'Asia/Taipei',
  'Manila': 'Asia/Manila',
  'Seoul': 'Asia/Seoul',
  'Tokyo': 'Asia/Tokyo',
  'Sydney': 'Australia/Sydney',
  'Melbourne': 'Australia/Melbourne',
  'Brisbane': 'Australia/Brisbane',
  'Perth': 'Australia/Perth',
  'Auckland': 'Pacific/Auckland',
  'Honolulu': 'Pacific/Honolulu',
};

// Cities in the world clock
let clocks = [];

function detectLocal() {
  try { return Intl.DateTimeFormat().resolvedOptions().timeZone; } catch(e) { return 'UTC'; }
}

function populateSel() {
  const sel = $('#citySel');
  Object.keys(cities).forEach(c => {
    sel.innerHTML += `<option value="${c}">${c} (${cities[c]})</option>`;
  });
}

function render() {
  const grid = $('#grid');
  if (!clocks.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--text2)">Add a city or your location to start</div>';
    renderMeeting();
    return;
  }
  grid.innerHTML = clocks.map(c => cardHtml(c)).join('');
  grid.querySelectorAll('.remove').forEach((b, i) => {
    b.addEventListener('click', () => { clocks.splice(i, 1); render(); });
  });
  renderMeeting();
}

function cardHtml(entry) {
  const now = new Date();
  const fmtTime = new Intl.DateTimeFormat('en-GB', { timeZone: entry.tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
  const fmtDate = new Intl.DateTimeFormat('en-US', { timeZone: entry.tz, weekday:'short', month:'short', day:'numeric' });
  const fmtHour = new Intl.DateTimeFormat('en-GB', { timeZone: entry.tz, hour:'2-digit', hour12:false });
  const hour = parseInt(fmtHour.format(now));
  const time = fmtTime.format(now);
  const date = fmtDate.format(now);
  const isDay = hour >= 6 && hour < 20;
  const dayPct = ((hour * 3600) / 86400) * 100;
  const off = getOffsetStr(now, entry.tz);
  return `
    <div class="wc-card">
      <button class="remove" title="Remove">${t('remove')}</button>
      <div class="city">${entry.name}</div>
      <div class="tz">${entry.tz}</div>
      <div class="time ${isDay ? 'is-day' : 'is-night'}">${time}</div>
      <div class="date">${date}</div>
      <div class="day-bar"><div class="fill" style="width:${dayPct}%;background:${isDay?'var(--accent)':'#8aa'}"></div></div>
      <div class="meta">
        <span>UTC ${off}</span>
        <span>${isDay ? '☀️ Day' : '🌙 Night'}</span>
      </div>
    </div>`;
}

function getOffsetStr(date, tz) {
  try {
    const fmt = new Intl.DateTimeFormat('en-US', { timeZone: tz, timeZoneName: 'shortOffset' });
    const parts = fmt.formatToParts(date);
    const off = parts.find(p => p.type === 'timeZoneName');
    return off ? off.value.replace('GMT','') : '';
  } catch(e) { return ''; }
}

function renderMeeting() {
  if (clocks.length === 0) {
    $('#meetingTable').innerHTML = '<div style="opacity:.6;padding:10px">Add cities to see the meeting planner</div>';
    return;
  }
  const now = new Date();
  const local = detectLocal();
  // Get current hour in local timezone
  const myHour = parseInt(new Intl.DateTimeFormat('en-GB', { timeZone: local, hour:'2-digit', hour12:false }).format(now));
  const hours = Array.from({length:24}, (_, i) => (myHour + i) % 24);
  let html = '<table><thead><tr><th>Time (Your TZ)</th>';
  clocks.forEach(c => { html += `<th>${c.name}</th>`; });
  html += '</tr></thead><tbody>';
  hours.forEach((h, idx) => {
    html += `<tr><td><b>${String(h).padStart(2,'0')}:00</b></td>`;
    clocks.forEach(c => {
      const sampleDate = new Date(now.getTime() + idx * 3600000);
      const localH = parseInt(new Intl.DateTimeFormat('en-GB', { timeZone: c.tz, hour:'2-digit', hour12:false }).format(sampleDate));
      let cls = '';
      if (localH >= 9 && localH < 17) cls = 'inwork';
      else if (localH >= 7 && localH < 22) cls = 'work';
      else if (localH >= 22 || localH < 6) cls = 'sleep';
      else cls = 'early';
      html += `<td class="${cls}">${String(localH).padStart(2,'0')}:00</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  html += '<div style="font-size:.75em;margin-top:8px;opacity:.7">🟩 work hours  🟨 edge  ⬜ sleep  🟦 early/late</div>';
  $('#meetingTable').innerHTML = html;
}

$('#citySel').addEventListener('change', e => {
  const c = e.target.value;
  if (!c) return;
  if (!clocks.find(x => x.name === c)) {
    clocks.push({name: c, tz: cities[c]});
    render();
  }
  e.target.value = '';
});

$('#addLocal').addEventListener('click', () => {
  const tz = detectLocal();
  const name = tz.split('/').pop().replace(/_/g, ' ');
  if (!clocks.find(x => x.tz === tz)) {
    clocks.push({name: name, tz: tz});
    render();
  }
});

$('#toolbar').innerHTML = `
  <span style="font-size:.85em;opacity:.7">${t('step1')}</span>
`;

populateSel();
// Start with local + a few defaults
const def = detectLocal();
clocks = [{name: 'Local', tz: def}];
if (def !== 'UTC') clocks.push({name: 'UTC', tz: 'UTC'});
clocks.push({name: 'New York', tz: 'America/New_York'});
clocks.push({name: 'London', tz: 'Europe/London'});
clocks.push({name: 'Tokyo', tz: 'Asia/Tokyo'});

setInterval(render, 1000);
render();

GZ.renderToolPage({
  category: 'convert',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌐', href:'/convert/timezone.html', name:'Timezone Converter'},
    {icon:'⏰', href:'/dev/timestamp.html', name:'Timestamp Converter'},
    {icon:'📅', href:'/convert/epoch-converter.html', name:'Epoch Converter'},
    {icon:'⏱️', href:'/fun/stopwatch.html', name:'Stopwatch'},
  ]
});
</script>
