<script>
GZI18n.register({
  en: {
    toolTitle: 'Drywall Calculator',
    toolDesc: 'Estimate how many drywall sheets you need for any room or wall. Get panel count, joint compound, tape, screws and total cost — free, browser-based.',
    lblLength: 'Room Length (ft)',
    lblWidth: 'Room Width (ft)',
    lblHeight: 'Wall Height (ft)',
    lblSheet: 'Sheet Size',
    lblDoors: 'Number of Doors',
    lblWindows: 'Number of Windows',
    lblCeiling: 'Drywall the Ceiling?',
    lblPrice: 'Price per Sheet ($)',
    optYes: 'Yes — include ceiling',
    optNo: 'No — walls only',
    btnCalc: 'Calculate Drywall',
    resultLabel: 'Drywall Sheets Needed',
    area: 'Net Wall Area',
    cost: 'Total Sheet Cost',
    screws: 'Screws (~1/sq ft)',
    tape: 'Joint Tape (ft)',
    mud: 'Joint Compound (gal)',
    waste: 'With 10% Waste',
    step1: 'Enter room length, width and wall height in feet',
    step2: 'Pick a sheet size — 4×8 is most common',
    step3: 'Count doors and windows to subtract their area',
    step4: 'Click Calculate to get sheet count, consumables and cost',
  },
  zh: {
    toolTitle: '石膏板计算器',
    toolDesc: '估算任意房间或墙面所需的石膏板数量。获取板材数、嵌缝膏、胶带、螺钉和总成本 — 免费浏览器本地运行。',
    lblLength: '房间长度（英尺）',
    lblWidth: '房间宽度（英尺）',
    lblHeight: '墙面高度（英尺）',
    lblSheet: '板材尺寸',
    lblDoors: '门数量',
    lblWindows: '窗户数量',
    lblCeiling: '是否包括天花板？',
    lblPrice: '每张板材价格（美元）',
    optYes: '是 — 包括天花板',
    optNo: '否 — 仅墙面',
    btnCalc: '计算石膏板',
    resultLabel: '所需石膏板数量',
    area: '净墙面面积',
    cost: '板材总成本',
    screws: '螺钉（约 1/平方英尺）',
    tape: '嵌缝胶带（英尺）',
    mud: '嵌缝膏（加仑）',
    waste: '含 10% 损耗',
    step1: '输入房间长度、宽度和墙面高度（英尺）',
    step2: '选择板材尺寸 — 4×8 最常用',
    step3: '统计门窗数量以扣除其面积',
    step4: '点击「计算」获取板材数、辅料和成本',
  }
});

const { $, t } = GZ;

function calculate(){
  const L=parseFloat($('#length').value)||0;
  const W=parseFloat($('#width').value)||0;
  const H=parseFloat($('#height').value)||0;
  const sheetArea=parseFloat($('#sheet').value)||32;
  const doors=parseInt($('#doors').value)||0;
  const windows=parseInt($('#windows').value)||0;
  const ceiling=$('#ceiling').value==='yes';
  const price=parseFloat($('#price').value)||0;

  // wall area: perimeter * height
  const wallArea = 2*(L+W)*H;
  // openings
  const openings = doors*21 + windows*15; // avg door 3x7=21, window 3x5=15
  let netArea = Math.max(0, wallArea - openings);
  if(ceiling) netArea += L*W;
  const areaWaste = netArea*1.10;
  const sheets = Math.ceil(areaWaste/sheetArea);
  const screws = Math.ceil(netArea); // 1 per sq ft
  const tape = Math.ceil(netArea*0.75); // ~75 ft per 100 sq ft
  const mud = (netArea/100).toFixed(1); // 1 gal per 100 sq ft
  const cost = sheets*price;

  $('#result').style.display='';
  $('#result-sheets').textContent = sheets + (sheets===1?' sheet':' sheets');
  $('#result-label').textContent = t('resultLabel');
  $('#r-area').textContent = Math.round(netArea)+' sq ft';
  $('#r-area-label').textContent = t('area');
  $('#r-cost').textContent = '$'+cost.toLocaleString();
  $('#r-cost-label').textContent = t('cost');
  $('#r-screws').textContent = screws.toLocaleString();
  $('#r-screws-label').textContent = t('screws');
  $('#r-tape').textContent = tape.toLocaleString()+' ft';
  $('#r-tape-label').textContent = t('tape');
  $('#r-mud').textContent = mud+' gal';
  $('#r-mud-label').textContent = t('mud');
  $('#r-waste').textContent = Math.round(areaWaste)+' sq ft';
  $('#r-waste-label').textContent = t('waste');
}

document.getElementById('opt-yes').textContent=t('optYes');
document.getElementById('opt-no').textContent=t('optNo');
document.getElementById('btn-calc').textContent=t('btnCalc');
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [

    {icon:'🌿', href:'/calc/mulch-calculator.html', name:'Mulch Calc'},
  ]
});
</script>
