const { $, copyText, t } = GZ;

// Default attribute values that can be stripped
const SVG_DEFAULTS = {
  'fill': 'black',
  'stroke': 'none',
  'stroke-width': '1',
  'stroke-linecap': 'butt',
  'stroke-linejoin': 'miter',
  'stroke-miterlimit': '4',
  'stroke-dasharray': 'none',
  'stroke-dashoffset': '0',
  'stroke-opacity': '1',
  'fill-opacity': '1',
  'opacity': '1',
  'fill-rule': 'nonzero',
  'clip-rule': 'nonzero',
};

function minifySvg(svg, opts) {
  let out = svg;

  if (opts.meta) {
    out = out.replace(/<\?xml[^?]*\?>/g, '');
    out = out.replace(/<!DOCTYPE[^>]*>/gi, '');
    // metadata, title, desc
    out = out.replace(/<metadata[\s\S]*?<\/metadata>/gi, '');
    out = out.replace(/<title[\s\S]*?<\/title>/gi, '');
    out = out.replace(/<desc[\s\S]*?<\/desc>/gi, '');
    // editor namespaces
    out = out.replace(/\s+xmlns:(?:sodipodi|inkscape|sketch|ai|serif|mathml)\s*=\s*"[^"]*"/g, '');
    out = out.replace(/\s+(?:sodipodi|inkscape|sketch|ai):[a-zA-Z-]+\s*=\s*"[^"]*"/g, '');
    // enable-background and other Adobe / Sketch attrs
    out = out.replace(/\s+(?:enable-background|data-name|id)\s*=\s*"[^"]*"/g, '');
  }

  if (opts.comment) {
    out = out.replace(/<!--[\s\S]*?-->/g, '');
  }

  // remove empty groups
  out = out.replace(/<g(\s[^>]*)?>\s*<\/g>/g, '');

  if (opts.dec) {
    // reduce numeric precision to 2 decimals in path data and other attributes
    out = out.replace(/(\d+\.\d{3,})/g, (m) => parseFloat(m).toFixed(2));
    // shorten zero prefix: 0.5 -> .5
    out = out.replace(/(\s|[:\(,])(0\.)(\d)/g, '$1.$3');
    // remove trailing zeros: 1.50 -> 1.5
    out = out.replace(/(\d+)\.([0-9]+[1-9])0+/g, '$1.$2');
    // remove decimal if all zeros: 1.0 -> 1 (only for attributes that allow it)
    out = out.replace(/(\d)\.0+(?=[,\s\)\"])/g, '$1');
  }

  if (opts.attr) {
    // remove default attribute values
    for (const [attr, def] of Object.entries(SVG_DEFAULTS)) {
      const re = new RegExp(`\\s${attr}\\s*=\\s*["']${def}["']`, 'g');
      out = out.replace(re, '');
    }
  }

  // collapse whitespace between tags
  out = out.replace(/>\s+</g, '><');
  // collapse multiple whitespace
  out = out.replace(/\s{2,}/g, ' ');
  // trim
  out = out.trim();
  return out;
}

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  return (b / 1024).toFixed(2) + ' KB';
}

function doMinify() {
  const svg = $('#svg-in').value;
  const out = $('#svg-out');
  const stats = $('#stats');
  if (!svg.trim()) {
    out.value = '';
    stats.innerHTML = '';
    $('#prev-orig').innerHTML = '';
    $('#prev-mini').innerHTML = '';
    return;
  }
  const opts = {
    meta: $('#opt-meta').checked,
    comment: $('#opt-comment').checked,
    dec: $('#opt-dec').checked,
    attr: $('#opt-attr').checked,
  };
  try {
    const min = minifySvg(svg, opts);
    out.value = min;
    const origBytes = new Blob([svg]).size;
    const minBytes = new Blob([min]).size;
    const pct = origBytes > 0 ? Math.round((1 - minBytes / origBytes) * 100) : 0;
    stats.innerHTML = `
      <span><strong>${t('origSize')}:</strong> <span class="orig">${formatBytes(origBytes)}</span></span>
      <span><strong>${t('minSize')}:</strong> ${formatBytes(minBytes)}</span>
      <span class="saved">${pct > 0 ? '↓' : '↑'} ${Math.abs(pct)}% (${pct > 0 ? '-' : '+'}${formatBytes(Math.abs(origBytes - minBytes))})</span>`;
    // render previews
    if (svg.includes('<svg')) $('#prev-orig').innerHTML = svg.match(/<svg[\s\S]*?<\/svg>/i)[0];
    if (min.includes('<svg')) $('#prev-mini').innerHTML = min;
  } catch (e) {
    out.value = t('parseError') + e.message;
  }
}

$('#svg-in').addEventListener('input', () => { clearTimeout(window._vd); window._vd = setTimeout(doMinify, 250); });
['opt-meta','opt-comment','opt-dec','opt-attr'].forEach(id => $('#' + id).addEventListener('change', doMinify));

$('#btn-dl').textContent = t('btnDl');

$('#lbl-out').textContent = t('lblOut');

$('#lbl-mini').textContent = t('lblMini');
$('#lbl-meta').textContent = t('lblMeta');
$('#lbl-comment').textContent = t('lblComment');
$('#lbl-dec').textContent = t('lblDec');
$('#lbl-attr').textContent = t('lblAttr');

$('#btn-min').onclick = doMinify;
$('#btn-cpy').onclick = () => { if ($('#svg-out').value) copyText($('#svg-out').value); };
$('#btn-dl').onclick = () => {
  const v = $('#svg-out').value;
  if (!v) return;
  const blob = new Blob([v], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'minified.svg';
  a.click();
  URL.revokeObjectURL(url);
};
$('#btn-ex').onclick = () => {

<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" id="Layer_1" x="0px" y="0px" width="100px" height="100px" viewBox="0 0 100 100" enable-background="new 0 0 100 100" xml:space="preserve">
<title>Sample SVG</title>
<desc>Created with Sketch.</desc>

  <circle cx="500" cy="500" r="200.000" fill="red" stroke="none" opacity="1.000"/>
  <g>
  </g>
  <rect x="100" y="100" width="100.000" height="100.000" fill="blue" stroke="none"/>
</g>
</svg>`;
  doMinify();
};
$('#btn-clr').onclick = () => { $('#svg-in').value = ''; $('#svg-out').value = ''; $('#stats').innerHTML = ''; $('#prev-orig').innerHTML = ''; $('#prev-mini').innerHTML = ''; };
