<script>
GZI18n.register({
  en: {
    toolTitle: 'Text to Columns',
    toolDesc: 'Split text into columns by any delimiter — comma, tab, pipe, semicolon, space or custom. View as a table, reformat and export as CSV, TSV or pipe-separated text.',
    delim: 'Input delimiter',
    custom: 'Custom delimiter',
    out: 'Output format',
    header: 'Header row',
    rows: 'rows',

    cells: 'cells',
    emptyMsg: 'Paste delimited text above and your table will appear here.',
    step1: 'Paste your delimited text (CSV, TSV, log lines, etc.)',
    step2: 'Choose the input delimiter — comma, tab, pipe, space or custom',
    step3: 'Toggle whether the first row is a header',
    step4: 'Use Copy buttons to export as CSV, TSV or pipe format',
  },
  zh: {
    toolTitle: '文本分列',
    toolDesc: '按任意分隔符将文本拆分为列 — 逗号、制表符、竖线、分号、空格或自定义。以表格查看、重新格式化并导出为 CSV、TSV 或竖线分隔文本。',
    delim: '输入分隔符',
    custom: '自定义分隔符',
    out: '输出格式',
    header: '表头行',
    rows: '行',
    cols: '列',
    cells: '单元格',
    emptyMsg: '在上方粘贴带分隔符的文本，表格将显示在此处。',
    step1: '粘贴带分隔符的文本（CSV、TSV、日志行等）',
    step2: '选择输入分隔符 — 逗号、制表符、竖线、空格或自定义',
    step3: '切换首行是否为表头',
    step4: '使用复制按钮导出为 CSV、TSV 或竖线格式',
  }
});

const {$, copyText, t} = GZ;
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function realDelim(v) { return v.replace(/\\t/g, '\t'); }

function splitLine(line, delim) {
  if (delim === '__csv__') {
    // proper CSV parse handling quotes
    const out = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) { out.push(cur); cur = ''; }
      else cur += c;
    }
    out.push(cur);
    return out;
  }
  if (delim === '') return [line];
  return line.split(delim);
}

let sortCol = -1, sortDir = 1;

function process() {
  const text = $('#input').value;
  const dv = $('#delim').value;
  $('#customWrap').style.display = dv === '__custom__' ? '' : 'none';
  const delim = dv === '__custom__' ? $('#custom').value : dv;
  const header = $('#header').value === '1';

  if (!text.trim()) {
    $('#table').innerHTML = `<tbody><tr><td class="tc-empty">${t('emptyMsg')}</td></tr></tbody>`;
    $('#stats').innerHTML = '';
    return;
  }

  const lines = text.replace(/\r\n/g,'\n').split('\n').filter(l => l.length > 0);
  const rows = lines.map(l => splitLine(l, delim));
  const maxCols = Math.max(...rows.map(r => r.length), 0);

  let html = '<thead><tr>';
  if (header) {
    for (let c = 0; c < maxCols; c++) html += `<th data-col="${c}">${esc(rows[0][c] !== undefined ? rows[0][c] : '')} ${c===sortCol?(sortDir>0?'▲':'▼'):''}</th>`;
    html += '</tr></thead><tbody>';
    for (let r = 1; r < rows.length; r++) {
      html += '<tr>';
      for (let c = 0; c < maxCols; c++) html += `<td>${esc(rows[r][c] !== undefined ? rows[r][c] : '')}</td>`;
      html += '</tr>';
    }
  } else {
    for (let c = 0; c < maxCols; c++) html += `<th data-col="${c}">Col ${c+1} ${c===sortCol?(sortDir>0?'▲':'▼'):''}</th>`;
    html += '</tr></thead><tbody>';
    rows.forEach(r => {
      html += '<tr>';
      for (let c = 0; c < maxCols; c++) html += `<td>${esc(r[c] !== undefined ? r[c] : '')}</td>`;
      html += '</tr>';
    });
  }
  html += '</tbody>';
  $('#table').innerHTML = html;

  $('#stats').innerHTML = `<span><b>${rows.length}</b> ${t('rows')}</span><span><b>${maxCols}</b> ${t('cols')}</span><span><b>${rows.length * maxCols}</b> ${t('cells')}</span>`;

  // Sort handlers
  $('#table').querySelectorAll('th').forEach(th => {
    th.addEventListener('click', () => {
      const c = parseInt(th.dataset.col);
      if (sortCol === c) sortDir = -sortDir; else { sortCol = c; sortDir = 1; }
      process();
    });
  });
}

function exportData() {
  const text = $('#input').value;
  const dv = $('#delim').value;
  const delim = dv === '__custom__' ? $('#custom').value : dv;
  if (!text.trim()) return '';
  const odv = $('#outDelim').value;
  const outDelim = realDelim(odv);
  const lines = text.replace(/\r\n/g,'\n').split('\n').filter(l => l.length > 0);
  return lines.map(l => {
    const cells = splitLine(l, delim);
    // quote if output is CSV and value contains delim/quote/newline
    if (odv === ',') {
      return cells.map(c => /[",\n]/.test(c) ? '"'+c.replace(/"/g,'""')+'"' : c).join(outDelim);
    }
    return cells.join(outDelim);
  }).join('\n');
}

['#delim','#custom','#outDelim','#header','#input'].forEach(s => $(s).addEventListener('input', () => { sortCol = -1; process(); }));

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';process()">${t('clear')}</button>
  <button class="gz-btn" id="copyCsv">Copy CSV</button>
  <button class="gz-btn gz-btn-secondary" id="copyOut">Copy Output</button>
  <button class="gz-btn gz-btn-secondary" id="exBtn">${t('example')}</button>`;
$('#copyCsv').addEventListener('click', () => copyText(exportData().replace(/\t/g, ',')));
$('#copyOut').addEventListener('click', () => copyText(exportData()));
$('#exBtn').addEventListener('click', () => {
  $('#input').value = "name,role,city,score\nAlice,Engineer,Tokyo,92\nBob,Designer,Berlin,88\nCarol,Manager,London,95\nDave,Intern,Paris,76";
  $('#delim').value = '__csv__';
  $('#header').value = '1';
  process();
});

$('#lblDelim').textContent = t('delim');
$('#lblCustom').textContent = t('custom');
$('#lblOut').textContent = t('out');
$('#lblHeader').textContent = t('header');
$('#emptyMsg').textContent = t('emptyMsg');

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📊', href:'/convert/csv-to-json.html', name:'CSV to JSON'},
    {icon:'📋', href:'/convert/csv-viewer.html', name:'CSV Viewer'},
    {icon:'🔢', href:'/text/sort-lines.html', name:'Sort Lines'},
    {icon:'🧹', href:'/text/remove-duplicates.html', name:'Remove Duplicates'},
  ]
});
</script>
