const { $, copyText, t } = GZ;

const THESAURUS = {

  sad:['unhappy','sorrowful','dejected','depressed','downcast','gloomy','dismal','melancholy','mournful','woeful','heartbroken','despondent','forlorn','grief-stricken','miserable','blue','down','low','somber','wistful','desolate'],
  big:['large','huge','enormous','gigantic','massive','colossal','immense','vast','grand','great','sizable','substantial','ample','spacious','expansive','broad','wide','extensive','towering','monumental'],
  small:['tiny','little','miniature','petite','compact','minuscule','microscopic','wee','diminutive','undersized','modest','slight','minor','negligible','scant','meager','trifling','puny'],

  slow:['sluggish','unhurried','leisurely','gradual','plodding','lagging','dawdling','dilatory','tardy','languid','lackadaisical','torpid','laggard','creeping','crawling'],
  beautiful:['gorgeous','stunning','lovely','attractive','pretty','handsome','elegant','exquisite','magnificent','splendid','striking','captivating','alluring','charming','radiant','bewitching','picturesque','breathtaking','dazzling','mesmerizing'],

  bad:['poor','inferior','defective','faulty','substandard','inadequate','unacceptable','dreadful','awful','terrible','horrible','lousy','mediocre','second-rate','shoddy','deficient','un satisfactory','subpar','wanting','wretched'],
  important:['crucial','vital','essential','significant','critical','key','major','paramount','indispensable','necessary','requisite','momentous','consequential','weighty','pivotal','meaningful','notable','prominent','primary','foremost'],
  easy:['simple','effortless','straightforward','uncomplicated','manageable','facile','undemanding','painless','light','cushy','smooth','clear','accessible','elementary','basic','intuitive','natural','familiar','breezy','picnic'],

  smart:['intelligent','clever','bright','brilliant','sharp','wise','astute','sharp-witted','perceptive','discerning','knowledgeable','erudite','scholarly','sagacious','shrewd','ingenious','quick-witted','brainy','gifted','savvy'],
  angry:['furious','irate','enraged','incensed','outraged','indignant','livid','wrathful','infuriated','incensed','maddened','exasperated','irritated','annoyed','vexed','incensed','hot-headed','tempestuous','fiery','heated'],
  calm:['peaceful','serene','tranquil','placid','composed','collected','unruffled','relaxed','soothed','quiet','still','restful','undisturbed','unperturbed','cool','collected','poised','self-possessed','centered','grounded'],
  strong:['powerful','mighty','robust','sturdy','vigorous','potent','formidable','stalwart','hardy','resilient','tough','solid','brawny','sinewy','muscular','burly','strapping','well-built','husky','athletic'],
  weak:['feeble','frail','fragile','delicate','faint','puny','flimsy','insubstantial','infirm','debilitated','enervated','languid','flabby','wavering','vacillating','ineffective','inadequate','deficient','wanting','powerless'],
  new:['fresh','novel','recent','current','modern','latest','contemporary','innovative','original','unprecedented','cutting-edge','state-of-the-art','unfamiliar','unused','mint','pristine','immaculate','recent','up-to-date','brand-new'],
  old:['ancient','aged','elderly','venerable','antique','archaic','obsolete','outdated','antiquated','vintage','retro','bygone','former','past','previous','prior','erstwhile','one-time','long-standing','time-worn'],
  rich:['wealthy','affluent','prosperous','opulent','well-off','well-to-do','moneyed','loaded','flush','comfortable','thriving','flourishing','successful','fruitful','bountiful','abundant','lavish','luxurious','sumptuous','plush'],
  poor:['destitute','impoverished','needy','deprived','underprivileged','disadvantaged','penniless','destitute','indigent','penurious','necessitous','barren','bare','meager','scanty','scant','deficient','lacking','wanting','inadequate'],

const ANTONYMS = {
  happy:['sad','unhappy','depressed','sorrowful','miserable'],
  sad:['happy','joyful','cheerful','delighted','elated'],
  big:['small','tiny','little','miniature','petite'],
  small:['big','large','huge','enormous','gigantic'],
  fast:['slow','sluggish','gradual','unhurried','leisurely'],
  slow:['fast','quick','rapid','swift','speedy'],
  beautiful:['ugly','hideous','unattractive','unsightly','plain'],
  ugly:['beautiful','gorgeous','lovely','attractive','pretty'],
  good:['bad','poor','inferior','terrible','awful'],
  bad:['good','excellent','great','superb','wonderful'],
  important:['trivial','insignificant','minor','unimportant','negligible'],
  easy:['hard','difficult','challenging','complex','complicated'],
  hard:['easy','simple','effortless','straightforward','uncomplicated'],
  smart:['stupid','dumb','foolish','ignorant','dense'],
  angry:['calm','peaceful','serene','composed','tranquil'],
  calm:['angry','agitated','excited','disturbed','restless'],
  strong:['weak','feeble','frail','fragile','delicate'],
  weak:['strong','powerful','mighty','robust','vigorous'],
  new:['old','ancient','aged','outdated','obsolete'],
  old:['new','fresh','modern','recent','current'],
  rich:['poor','destitute','impoverished','needy','penniless'],
  poor:['rich','wealthy','affluent','prosperous','opulent'],
};

function findSynonyms(word) {
  word = word.toLowerCase().trim().replace(/[^a-z]/g,'');
  if (!word) return {synonyms:[], antonyms:[]};
  let syns = THESAURUS[word] || [];
  let ants = ANTONYMS[word] || [];
  Object.entries(THESAURUS).forEach(([key, vals]) => {
    if (vals.includes(word) && !syns.includes(key)) syns.push(key);
    vals.forEach(v => { if (v.includes(word) && !syns.includes(v)) syns.push(v); });
  });
  return { synonyms:[...new Set(syns)], antonyms:[...new Set(ants)] };
}

function renderWords(arr) {
  return arr.map(w =>
    `<div class="sg-word" onclick="copyText('${w}');this.style.background='var(--gz-success)';setTimeout(()=>this.style.background='',500)">${w}</div>`
  ).join('');
}

function render() {
  const word = $('#wordInput').value.trim();
  if (!word) {
    $('#results').innerHTML = `<p class="sg-empty">${t('enterWord')}</p>`;
    return;
  }
  const { synonyms, antonyms } = findSynonyms(word);
  if (synonyms.length === 0 && antonyms.length === 0) {
    $('#results').innerHTML = `<p class="sg-empty">${t('notFound')}</p>`;
    return;
  }
  let html = '';
  if (synonyms.length > 0) {
    html += `<div class="sg-section"><h3>✅ ${t('synonyms')} (${synonyms.length})</h3><div class="sg-grid">${renderWords(synonyms)}</div></div>`;
  }
  if (antonyms.length > 0) {
    html += `<div class="sg-section"><h3>❌ ${t('antonyms')} (${antonyms.length})</h3><div class="sg-grid">${renderWords(antonyms)}</div></div>`;
  }
  $('#results').innerHTML = html;
}

$('#toolbar').innerHTML = '';
$('#findBtn').textContent = t('findBtn');
$('#findBtn').onclick = render;
$('#wordInput').placeholder = t('placeholder');
$('#wordInput').onkeypress = (e) => { if(e.key==='Enter') render(); };

});
</script>
