name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # CRITICAL: gamezipper.com and gamezipper-tools share the same GitHub account.
      # When both deploy simultaneously, GitHub Pages CDN rejects one with
      # "Deployment failed, try again later". Stagger deploys by 60s.
      - name: Stagger deploy (avoid CDN conflict with gamezipper.com)
        run: sleep 60
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          error_count: 30
          reporting_interval: 5000
          timeout: 600000
      - name: Retry on failure
        if: failure()
        run: |
          echo "First deploy failed, waiting 30s and retrying..."
          sleep 30
      - name: Retry deploy
        id: retry_deployment
        if: failure()
        uses: actions/deploy-pages@v4
        with:
          error_count: 30
          reporting_interval: 5000
          timeout: 600000
