  zh: {

    toolDesc: '在线反转任意音频文件。上传 MP3、WAV、OGG、M4A 或 FLAC，预览反转后的音频并下载为高质量 WAV — 完全浏览器本地运行，无需上传。',

    reverse: '反转音频',
    download: '下载 WAV',
    result: '反转后的音频',
    step1: '拖拽或上传一个音频文件（MP3、WAV、OGG、M4A、FLAC）',
    step2: '点击「反转音频」',
    step3: '在内置播放器中预览反转后的片段',
    step4: '将反转后的音频下载为 WAV 文件',

});

const { $, t } = GZ;
let audioBuffer = null;
let baseName = 'reversed';

const dropZone = $('#dropZone');
const fileInput = $('#fileInput');
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

async function loadFile(file) {
  if (!file.type.startsWith('audio/') && !/\.(mp3|wav|ogg|m4a|aac|flac|opus|webm)$/i.test(file.name)) {
    $('#status').textContent = 'Please upload an audio file';
    return;
  }
  baseName = file.name.replace(/\.[^.]+$/, '') || 'reversed';
  $('#status').textContent = 'Decoding…';
  try {
    const arr = await file.arrayBuffer();
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    audioBuffer = await ctx.decodeAudioData(arr);
    ctx.close();
    $('#status').textContent = `Loaded: ${file.name} — ${audioBuffer.numberOfChannels} ch, ${audioBuffer.sampleRate} Hz, ${audioBuffer.duration.toFixed(2)}s (${(file.size/1024).toFixed(1)} KB)`;
    drawWaveform(audioBuffer, false);
  } catch (e) {
    $('#status').textContent = 'Could not decode this audio file: ' + e.message;
    audioBuffer = null;
  }
}

function drawWaveform(buf, reversed) {
  const cv = $('#waveform');
  const w = cv.width = cv.clientWidth || 600;
  const h = cv.height = 90;
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, w, h);
  const data = buf.getChannelData(0);
  const step = Math.max(1, Math.floor(data.length / w));
  const mid = h / 2;
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  ctx.fillRect(0, 0, w, h);
  ctx.fillStyle = reversed ? '#e94560' : '#4ecdc4';
  for (let x = 0; x < w; x++) {
    let min = 1, max = -1;
    for (let j = 0; j < step; j++) {
      const v = data[x * step + j] || 0;
      if (v < min) min = v;
      if (v > max) max = v;
    }
    const y1 = mid - max * mid;
    const y2 = mid - min * mid;
    ctx.fillRect(x, y1, 1, Math.max(1, y2 - y1));
  }
}

function reverseBuffer(src) {
  const len = src.length;
  const out = new Float32Array(len);
  for (let i = 0; i < len; i++) out[i] = src[len - 1 - i];
  return out;
}

// Encode AudioBuffer (reversed per channel) to 16-bit PCM WAV
function encodeWav(buf) {
  const numCh = buf.numberOfChannels;
  const sr = buf.sampleRate;
  const frames = buf.length;
  const bytesPerSample = 2;
  const blockAlign = numCh * bytesPerSample;
  const dataSize = frames * blockAlign;
  const out = new ArrayBuffer(44 + dataSize);
  const view = new DataView(out);
  const writeStr = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
  writeStr(0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);            // PCM
  view.setUint16(22, numCh, true);
  view.setUint32(24, sr, true);
  view.setUint32(28, sr * blockAlign, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, 16, true);
  writeStr(36, 'data');
  view.setUint32(40, dataSize, true);
  // Interleave reversed channels
  const chans = [];
  for (let c = 0; c < numCh; c++) chans.push(reverseBuffer(buf.getChannelData(c)));
  let off = 44;
  for (let i = 0; i < frames; i++) {
    for (let c = 0; c < numCh; c++) {
      let s = Math.max(-1, Math.min(1, chans[c][i]));
      view.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      off += 2;
    }
  }
  return new Blob([out], { type: 'audio/wav' });
}

async function doReverse() {
  if (!audioBuffer) { $('#status').textContent = 'Please upload an audio file first'; return; }
  $('#status').textContent = 'Reversing…';
  try {
    drawWaveform(audioBuffer, true);
    const blob = encodeWav(audioBuffer);
    const url = URL.createObjectURL(blob);
    const player = $('#player');
    player.src = url;
    $('#resultBlock').style.display = 'block';
    // download link
    const dl = document.createElement('a');
    dl.href = url; dl.download = baseName + '-reversed.wav';
    dl.className = 'gz-btn';
    dl.style.display = 'inline-block';
    dl.style.marginTop = '10px';
    dl.textContent = '⬇ ' + t('download');
    dl.style.textDecoration = 'none';
    const block = $('#resultBlock');
    const old = block.querySelector('a.gz-btn');
    if (old) old.remove();
    block.appendChild(dl);
    $('#status').innerHTML = `✓ Reversed — ${audioBuffer.duration.toFixed(2)}s, ${audioBuffer.numberOfChannels} ch, WAV ${(blob.size/1024).toFixed(1)} KB`;
  } catch (e) {
    $('#status').textContent = 'Error: ' + e.message;
  }
}

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="doReverse()">${t('reverse')}</button>`;

</script>
