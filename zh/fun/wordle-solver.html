const states=[0,1,2]; // gray, yellow, green
let cells=[], colors=[];

function buildGrid(){
  const g=$('#grid'); g.innerHTML='';
  cells=[]; colors=Array(5).fill(0);
  for(let r=0;r<5;r++){
    const row=document.createElement('div');row.className='wg';
    const inp=document.createElement('input');inp.type='text';inp.maxLength=1;inp.dataset.i=r;
    inp.addEventListener('input',e=>{e.target.value=e.target.value.replace(/[^a-zA-Z]/g,'').toUpperCase();solve()});
    const cd=document.createElement('div');cd.className='wc';cd.dataset.i=r;
    cd.addEventListener('click',()=>{colors[r]=(colors[r]+1)%3;updateCell(r);solve()});
    cells.push({inp,cd});row.appendChild(inp);row.appendChild(cd);g.appendChild(row);
  }
}

function updateCell(i){
  const cd=cells[i].cd;
  cd.className='wc';
  if(colors[i]===1)cd.classList.add('yellow');
  else if(colors[i]===2)cd.classList.add('green');
  else cd.classList.add('gray');
  cd.textContent=cells[i].inp.value||'?';
}

function solve(){
  const greens={}, yellows={}, grays=new Set();
  const absent=new Set();
  for(let i=0;i<5;i++){
    const ch=cells[i].inp.value.toLowerCase();
    if(!ch)continue;
    if(colors[i]===2){greens[i]=ch}
    else if(colors[i]===1){if(!yellows[ch])yellows[ch]=[];yellows[ch].push(i)}
    else{grays.add(ch);absent.add(ch)}
  }
  const results=WORDS.filter(w=>{
    for(let i=0;i<5;i++){if(greens[i]&&w[i]!==greens[i])return false}
    for(const[ch,positions]of Object.entries(yellows)){if(!w.includes(ch))return false;for(const p of positions)if(w[p]===ch)return false}
    for(const ch of absent){if(!greens[i]&&w.includes(ch)){let allGray=true;for(let j=0;j<5;j++)if(greens[j]===ch||((yellows[ch]||[]).length>0))allGray=false;if(allGray&&w.includes(ch))return false}}
    return true;
  }).sort();
  const res=$('#results');res.innerHTML='';
  results.forEach(w=>{const s=document.createElement('span');s.className='wtag';s.textContent=w.toUpperCase();res.appendChild(s)});
  $('#count').textContent=`${results.length} ${t('matches')}`;
}

function resetAll(){cells.forEach((_,i)=>{cells[i].inp.value='';colors[i]=0;updateCell(i)});$('#results'].innerHTML='';$('#count').textContent=''}

$('#toolbar').innerHTML=`<button class="gz-btn" onclick="solve()">${t('solve')}</button><button class="gz-btn gz-btn-secondary" onclick="resetAll()">${t('clear')}</button>`;
$('#instr').textContent=t('instr');
