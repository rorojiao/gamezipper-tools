<script>
GZI18n.register({
  en: {

    toolDesc: "Generate catchy, aesthetic and unique TikTok username ideas from your name or keywords. Every suggestion fits TikTok's 4-24 character rules — copy in one click.",

  },
  zh: {
    toolTitle: "TikTok 用户名生成器",
    toolDesc: "根据你的名字或关键词生成创意、唯美、独特的 TikTok 用户名。每个建议都符合 TikTok 4-24 字符规则 — 一键复制。",
    lblName: "你的名字或基础词", lblKeywords: "关键词 / 领域（可选）", lblStyle: "风格", lblCount: "生成数量",
    step1: "输入你的名字或基础词（如 Alex）",
    step2: "添加可选关键词（游戏、艺术）并选择风格",
    step3: "点击「生成」获取独特的用户名创意",
    step4: "点击任一用户名即可复制，然后在 TikTok 上验证",
  }
});

const { $, copyText, t } = GZ;
let currentStyle = "aesthetic";

document.querySelectorAll(".tu-pill").forEach(p => {
  p.addEventListener("click", () => {
    document.querySelectorAll(".tu-pill").forEach(x => x.classList.remove("active"));
    p.classList.add("active");
    currentStyle = p.dataset.style;
  });
});

// TikTok rules: 4-24 chars, [a-z0-9_.], start with alnum, no trailing/consecutive periods
function clean(s){ return (s||"").toLowerCase().replace(/[^a-z0-9._]/g,""); }
function valid(u){
  if (u.length < 4 || u.length > 24) return false;
  if (!/^[a-z0-9]/.test(u)) return false;
  if (u.endsWith(".")) return false;
  if (u.includes("..")) return false;
  return /^[a-z0-9._]+$/.test(u);
}

const PREFIXES = ["the","its","real","im","official","xo","lil","big","ms","mr"];
const SUFFIXES = ["xo","tv","world","daily","vibes","hq","official","real","dot","studio"];
const AESTHETIC = ["moon","star","cloud","honey","velvet","lunar","daisy","peach","ivory","pixel"];
const GAMER = ["gg","op","pro","clutch","frag","nexus","void","byte","pixel","pixelated"];
const NUMS = ["07","99","01","xoxo","21","11","_","23","00","3"];

function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function randInt(n){ return Math.floor(Math.random()*n); }

function buildOne(base, kw, style){
  base = clean(base) || "user";
  kw = clean(kw.split(",")[0]||"");
  const r = Math.random();
  let u = "";
  if (style === "short"){
    // trim and add minimal
    u = base.substring(0, randInt(3)+4);
    if (r > 0.5) u = u + pick(NUMS).replace("_","");
  } else if (style === "brand"){
    const w = kw || base;
    u = (w + pick(SUFFIXES)).substring(0,24);
    if (r > 0.5) u = base + "." + pick(SUFFIXES);
  } else if (style === "gamer"){
    const w = kw || base;
    u = w + pick(GAMER);
    if (r > 0.5) u = pick(GAMER) + w;
    if (r > 0.8) u = w + pick(NUMS);
  } else if (style === "cool"){
    if (r < 0.33) u = pick(PREFIXES) + base;
    else if (r < 0.66) u = base + pick(SUFFIXES);
    else u = base + "." + pick(SUFFIXES);
  } else { // aesthetic
    const w = kw || pick(AESTHETIC);
    if (r < 0.25) u = base + "." + w;
    else if (r < 0.5) u = w + "." + base;
    else if (r < 0.75) u = base + pick(AESTHETIC);
    else u = pick(AESTHETIC) + base;
  }
  u = clean(u);
  // ensure starts with alnum
  u = u.replace(/^[._]+/, "");
  if (u.length < 4) u = (u + pick(SUFFIXES)).substring(0,24);
  if (u.endsWith(".")) u = u.slice(0,-1);
  return u;
}

function generate(){
  const base = $("#base").value.trim();
  const kw = $("#kw").value.trim();
  const count = parseInt($("#count").value);
  const results = $("#results");
  results.innerHTML = "";
  const used = new Set();
  let attempts = 0;
  while (results.children.length < count && attempts < count*8){
    attempts++;
    const u = buildOne(base, kw, currentStyle);
    if (!valid(u) || used.has(u)) continue;
    used.add(u);
    const card = document.createElement("div");
    card.className = "tu-card";
    card.innerHTML = `<span class="tu-name">@${u}</span><div style="display:flex;align-items:center;gap:8px"><span class="tu-meta">${u.length} chars</span><button class="gz-btn gz-btn-secondary">📋</button></div>`;
    card.querySelector("button").onclick = (e)=>{e.stopPropagation();copyText(u);};
    card.addEventListener("click", ()=>copyText(u));
    results.appendChild(card);
  }
  if (results.children.length === 0){
    results.innerHTML = `<div style="opacity:.6;padding:20px;text-align:center">${base? "Try a different base word":"Enter a name to start"}</div>`;
  }
}

$("#toolbar").innerHTML = `
  <button class="gz-btn" onclick="generate()">✨ Generate</button>
  <button class="gz-btn gz-btn-secondary" onclick="generate()">🔄 Regenerate</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('results').innerHTML=''">🗑️ Clear</button>`;

  ]
});
generate();
</script>
