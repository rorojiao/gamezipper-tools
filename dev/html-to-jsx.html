const { $, copyText, t } = GZ;

const ATTR_MAP = {
  'class':'className','for':'htmlFor','tabindex':'tabIndex','readonly':'readOnly',
  'maxlength':'maxLength','colspan':'colSpan','rowspan':'rowSpan','cellpadding':'cellPadding',
  'cellspacing':'cellSpacing','crossorigin':'crossOrigin','accesskey':'accessKey',
  'contenteditable':'contentEditable','autocomplete':'autoComplete','autofocus':'autoFocus',
  'autoplay':'autoPlay','novalidate':'noValidate','formnovalidate':'formNoValidate',
  'ismap':'isMap','usemap':'useMap','framespacing':'frameSpacing','nowrap':'noWrap',
  'bgcolor':'bgColor','charset':'charSet','classid':'classID',
};

function styleStringToObject(s) {
  if (!s) return null;
  const obj = {};
  s.split(';').forEach(part => {
    const [k,...v] = part.split(':');
    if (k && v.length) {
      const key = k.trim().replace(/-([a-z])/g, (_,c) => c.toUpperCase());
      obj[key] = v.join(':').trim();
    }
  });
  if (!Object.keys(obj).length) return null;
  let pairs = Object.entries(obj).map(([k,v]) => {
    const val = /^[\d.]+$/.test(v) ? v : `'${v.replace(/'/g,"\\'")}'`;
    return `${k}: ${val}`;
  });
  return `{{${pairs.join(', ')}}}`;
}

function convertHtmlToJsx(html) {
  let result = html;
  // Handle self-closing tags
  result = result.replace(/<(\w+)((?:\s+[^>]*?)?)(\s*\/)>/gi, (match, tag, attrs) => {
    return `<${tag}${convertAttrs(attrs)} />`;
  });
  // Handle opening tags
  result = result.replace(/<(\w+)((?:\s+[^>]*?)?)(\/?>)/gi, (match, tag, attrs, close) => {
    return `<${tag}${convertAttrs(attrs)}${close}`;
  });
  // Handle HTML comments
  result = result.replace(/<!--([\s\S]*?)-->/g, '{/*$1*/}');
  return result;
}

function convertAttrs(attrStr) {
  if (!attrStr) return '';
  // Process each attribute
  return attrStr.replace(/\s([a-zA-Z][\w-]*)\s*=\s*"([^"]*)"/g, (match, name, value) => {
    const lower = name.toLowerCase();
    if (lower === 'style') {
      const obj = styleStringToObject(value);
      return obj ? ` style={${obj}}` : ` style="${value}"`;
    }
    if (lower === 'class') {
      return ` className="${value}"`;
    }
    if (lower === 'for') {
      return ` htmlFor="${value}"`;
    }
    if (ATTR_MAP[lower]) {
      return ` ${ATTR_MAP[lower]}="${value}"`;
    }
    // Boolean attributes
    if (['disabled','checked','selected','multiple','hidden','required','autofocus','autoplay','controls','loop','muted','default','open','reversed'].includes(lower)) {
      return ` ${lower}`;
    }
    return ` ${name}="${value}"`;
  });
  // Handle single-quoted attributes too
  // Note: simplified for core conversion
}

function doConvert() {
  const inp = $('#input').value.trim();
  if (!inp) return;
  const jsx = convertHtmlToJsx(inp);
  $('#output').textContent = jsx;
}

}
