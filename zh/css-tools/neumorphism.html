<style>
.ctrl{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.ctrl label{font-size:.82em;color:var(--text2);display:flex;flex-direction:column;gap:4px}
.ctrl input[type=range],.ctrl input[type=color]{width:100%}
.ctrl input[type=range]{accent-color:var(--accent)}
.preview-box{border-radius:var(--radius);display:flex;align-items:center;justify-content:center;min-height:260px;margin:16px 0;transition:all .3s}
.preview-inner{padding:40px 60px;border-radius:var(--radius);font-size:1.1rem;font-weight:600;transition:all .3s}
.preview-btn{padding:12px 32px;border:none;border-radius:var(--radius);font-size:1rem;font-weight:600;cursor:pointer;transition:all .3s}
.preview-circle{width:100px;height:100px;border-radius:50%;transition:all .3s}
.code-output{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;font-family:monospace;font-size:.82em;white-space:pre-wrap;word-break:break-all;margin:8px 0;position:relative}
.shapes{display:flex;gap:24px;justify-content:center;margin:12px 0;flex-wrap:wrap}
</style>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"CSS Neumorphism Generator","description":"Generate beautiful CSS neumorphism / soft UI designs with live preview. Customize blur, distance, light and shadow colors.","url": "https://tools.gamezipper.com/zh/css-tools/neumorphism.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is neumorphism?","acceptedAnswer":{"@type":"Answer","text":"Neumorphism (soft UI) is a design trend that combines flat design and skeuomorphism. It uses soft shadows on a matching background to create a raised or pressed plastic-like appearance."}},{"@type":"Question","name":"How do I create a neumorphic effect?","acceptedAnswer":{"@type":"Answer","text":"Use two box-shadows — one light (top-left) and one dark (bottom-right) — on an element whose background matches its parent. Adjust blur and offset distance to control the depth."}},{"@type":"Question","name":"Can I use neumorphism in production?","acceptedAnswer":{"@type":"Answer","text":"Yes, but be mindful of accessibility. Neumorphic designs can have low contrast, so ensure text and interactive elements remain clearly visible and meet WCAG guidelines."}},{"@type":"Question","name":"What shapes does this generator support?","acceptedAnswer":{"@type":"Answer","text":"This generator supports rectangles (cards), circles, and buttons with convex (raised) or concave (pressed) shadow styles."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="ctrl">
      <label><span id="lbl-bg"></span><input type="color" id="bgColor" value="#e0e5ec"></label>
      <label><span id="lbl-shape"></span>
        <select class="gz-select" id="shape" style="width:100%">
          <option value="card">Card / Box</option>
          <option value="circle">Circle</option>
          <option value="button">Button</option>
        </select>
      </label>
      <label><span id="lbl-dist"></span><input type="range" id="distance" min="2" max="30" value="10"></label>
      <label><span id="lbl-blur"></span><input type="range" id="blur" min="5" max="60" value="20"></label>
      <label><span id="lbl-light"></span><input type="color" id="lightColor" value="#ffffff"></label>
      <label><span id="lbl-dark"></span><input type="color" id="darkColor" value="#a3b1c6"></label>
      <label><span id="lbl-radius"></span><input type="range" id="radius" min="0" max="60" value="20"></label>
      <label><span id="lbl-inset"></span>
        <select class="gz-select" id="insetMode" style="width:100%">
          <option value="out">Convex (Raised)</option>
          <option value="in">Concave (Pressed)</option>
        </select>
      </label>
    </div>
    <div class="preview-box" id="previewBox">
      <div class="shapes" id="shapesArea"></div>
    </div>
    <div class="code-output" id="codeOutput"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Neumorphism Generator',
    toolDesc: 'Create beautiful soft UI neumorphic designs with live preview and one-click code copy.',
    bgColor: 'Background Color',
    shape: 'Shape',
    distance: 'Distance',
    blur: 'Blur',
    lightColor: 'Light Shadow',
    darkColor: 'Dark Shadow',
    radius: 'Border Radius',
    insetMode: 'Style',
    copy: 'Copy CSS',
    copied: 'Copied!',
    previewText: 'Neumorphic Card',
    btnText: 'Click Me',
    step1: 'Choose a background color that matches your project',
    step2: 'Adjust distance, blur and shadow colors to create the desired depth',
    step3: 'Pick a shape: card, circle or button',
    step4: 'Copy the generated CSS code into your project',
  },
  zh: {
    toolTitle: 'CSS 新拟态生成器',
    toolDesc: '创建精美的软 UI 新拟态设计，实时预览并一键复制代码。',
    bgColor: '背景颜色',
    shape: '形状',
    distance: '距离',
    blur: '模糊',
    lightColor: '亮阴影',
    darkColor: '暗阴影',
    radius: '圆角',
    insetMode: '风格',
    copy: '复制 CSS',
    copied: '已复制！',
    previewText: '新拟态卡片',
    btnText: '点击按钮',
    step1: '选择与项目匹配的背景颜色',
    step2: '调整距离、模糊和阴影颜色来创建所需的深度效果',
    step3: '选择形状：卡片、圆形或按钮',
    step4: '将生成的 CSS 代码复制到你的项目中',
  }
});

const { $, copyText, t } = GZ;

function update() {
  const bg = $('#bgColor').value;
  const dist = $('#distance').value;
  const blur = $('#blur').value;
  const light = $('#lightColor').value;
  const dark = $('#darkColor').value;
  const rad = $('#radius').value;
  const shape = $('#shape').value;
  const inset = $('#insetMode').value === 'in';
  const insetStr = inset ? 'inset ' : '';

  const shadow = `${insetStr}${dist}px ${dist}px ${blur}px ${dark}, ${insetStr}-${dist}px -${dist}px ${blur}px ${light}`;
  const css = `background: ${bg};\nborder-radius: ${rad}px;\nbox-shadow: ${shadow};`;

  const box = $('#previewBox');
  box.style.background = bg;

  const area = $('#shapesArea');
  if (shape === 'card') {
    area.innerHTML = `<div class="preview-inner" style="background:${bg};border-radius:${rad}px;box-shadow:${shadow}">${t('previewText')}</div>`;
  } else if (shape === 'circle') {
    area.innerHTML = `<div class="preview-circle" style="background:${bg};box-shadow:${shadow}"></div>`;
  } else {
    area.innerHTML = `<button class="preview-btn" style="background:${bg};border-radius:${rad}px;box-shadow:${shadow};color:inherit">${t('btnText')}</button>`;
  }

  $('#codeOutput').textContent = css;
}

['bgColor','lightColor','darkColor','distance','blur','radius','shape','insetMode'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('input', update);
  el.addEventListener('change', update);
});

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="copyText($('#codeOutput').textContent)">${t('copy')}</button>`;

document.querySelectorAll('.ctrl label span').forEach(sp => {
  const key = sp.id.replace('lbl-','');
  const map = {bg:'bgColor',shape:'shape',dist:'distance',blur:'blur',light:'lightColor',dark:'darkColor',radius:'radius',inset:'insetMode'};
  if (map[key]) sp.textContent = t(map[key]);
});

update();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🪟', href:'/css-tools/glassmorphism.html', name:'Glassmorphism'},
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
    {icon:'🔘', href:'/css-tools/border-radius.html', name:'Border Radius'},
    {icon:'🎨', href:'/css-tools/gradient.html', name:'Gradient'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
