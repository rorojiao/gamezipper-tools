<script>
GZI18n.register({
  en: {
    toolTitle: 'Multiplication Table Generator',
    toolDesc: 'Generate printable times tables from 1x1 up to 100x100 — perfect for math practice and classrooms.',
    size: 'Size (rows × cols)',
    from: 'Start at',
    generate: 'Generate',
    print: 'Print / PDF',
    step1: 'Set the table size (e.g., 12 for a 12×12 table)',
    step2: 'Choose the starting number (default 1)',
    step3: 'Click Generate to build the table',
    step4: 'Click Print to print or save as PDF',
  },
  zh: {
    toolTitle: '乘法口诀表生成器',
    toolDesc: '生成可打印的乘法表（1x1 至 100x100），适合数学练习和课堂教学。',
    size: '大小（行 × 列）',
    from: '起始数',
    generate: '生成',
    print: '打印 / PDF',
    step1: '设置表格大小（例如 12 即 12×12 表）',
    step2: '选择起始数字（默认 1）',
    step3: '点击「生成」构建表格',
    step4: '点击「打印」打印或保存为 PDF',
  }
});

const { $, t } = GZ;

$('#lbl-size').textContent = t('size');
$('#lbl-from').textContent = t('from');
$('#btn-gen').textContent = t('generate');
document.querySelectorAll('button')[document.querySelectorAll('button').length-1].textContent = t('print');

function generate() {
  let n = parseInt($('#size').value) || 12;
  let start = parseInt($('#from').value) || 1;
  n = Math.max(1, Math.min(100, n));
  start = Math.max(1, Math.min(100, start));
  const end = start + n - 1;
  let html = '<thead><tr><th>×</th>';
  for (let c = start; c <= end; c++) html += `<th>${c}</th>`;
  html += '</tr></thead><tbody>';
  for (let r = start; r <= end; r++) {
    html += `<tr><th>${r}</th>`;
    for (let c = start; c <= end; c++) {
      const prod = r * c;
      const cls = (r === c) ? 'highlight' : '';
      html += `<td class="${cls}">${prod}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody>';
  $('#mtable').innerHTML = html;
}

$('#toolbar').innerHTML = '';
generate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [

    {icon:'📊', href:'/calc/statistics-calculator.html', name:'Statistics'},

});
</script>
