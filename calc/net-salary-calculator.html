<body>
<div class="gz-container">
  <div class="gz-tool-header">

  </div>
  <div class="gz-tool-area">
    <div class="gz-form">
      <div>
        <label id="lbl-gross"></label>
        <input type="number" id="gross" value="75000" min="0" step="1000">
      </div>
      <div>
        <label id="lbl-period"></label>
        <select id="period">
          <option value="annual" selected>Annual</option>
          <option value="monthly">Monthly</option>
          <option value="hourly">Hourly</option>
        </select>
      </div>
      <div>
        <label id="lbl-hours"></label>
        <input type="number" id="hours" value="2080" min="1" step="40">
      </div>
      <div>
        <label id="lbl-tax"></label>
        <input type="number" id="taxRate" value="22" min="0" max="80" step="0.5">
      </div>
      <div>
        <label id="lbl-ss"></label>
        <input type="number" id="ssRate" value="7.65" min="0" max="30" step="0.1">
      </div>
      <div>
        <label id="lbl-other"></label>
        <input type="number" id="other" value="200" min="0" step="50">
      </div>
      <button class="gz-btn" onclick="calculate()" id="btn-calc"></button>
    </div>
    <div class="result-card" id="result" style="display:none">
      <div class="big" id="result-monthly"></div>
      <div class="label" id="result-monthly-label"></div>
      <div class="result-grid">
        <div class="result-item"><div class="val" id="result-annual"></div><div class="lbl" id="result-annual-label"></div></div>
        <div class="result-item"><div class="val" id="result-hourly"></div><div class="lbl" id="result-hourly-label"></div></div>
        <div class="result-item"><div class="val" id="result-effective"></div><div class="lbl" id="result-effective-label"></div></div>
      </div>

    </div>
    <div id="status"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Net Salary Calculator',
    toolDesc: 'Estimate your take-home pay after taxes and deductions. See annual, monthly and hourly net pay. Free, private, browser-only.',
    grossSalary: 'Gross Salary',
    payPeriod: 'Pay Period',
    annualPeriod: 'Annual',
    monthlyPeriod: 'Monthly',
    hourlyPeriod: 'Hourly',
    hoursPerYear: 'Work Hours per Year',
    incomeTaxRate: 'Income Tax Rate (%)',
    socialSecurityRate: 'Social Security / Medicare (%)',
    otherDeductions: 'Other Deductions ($/month)',
    calculate: 'Calculate',
    monthlyNet: 'Monthly Take-Home',
    annualNet: 'Annual Net',
    hourlyNet: 'Hourly Net',
    effectiveRate: 'Effective Tax Rate',
    grossPay: 'Gross Salary',
    incomeTax: 'Income Tax',
    socialSecurity: 'Social Security',
    otherDeduct: 'Other Deductions',
    totalDeduct: 'Total Deductions',
    netPay: 'Net Pay',
    step1: 'Enter your gross salary and select the pay period',
    step2: 'Set your income tax bracket percentage',
    step3: 'Adjust social security and other deductions',
    step4: 'Click Calculate to see your take-home pay breakdown',
  },
  zh: {
    toolTitle: '税后工资计算器',
    toolDesc: '估算扣除税费和各项扣款后的到手工资。查看年、月、时薪净收入。免费、私密、浏览器本地运行。',
    grossSalary: '税前工资',
    payPeriod: '薪资周期',
    annualPeriod: '年薪',
    monthlyPeriod: '月薪',
    hourlyPeriod: '时薪',
    hoursPerYear: '年工作小时数',
    incomeTaxRate: '所得税率 (%)',
    socialSecurityRate: '社保 / 医保 (%)',
    otherDeductions: '其他扣款（$/月）',
    calculate: '计算',
    monthlyNet: '月到手工资',
    annualNet: '年净收入',
    hourlyNet: '时净薪',
    effectiveRate: '实际税率',
    grossPay: '税前工资',
    incomeTax: '所得税',
    socialSecurity: '社保',
    otherDeduct: '其他扣款',
    totalDeduct: '总扣款',
    netPay: '到手工资',
    step1: '输入税前工资并选择薪资周期',
    step2: '设置所得税税率',
    step3: '调整社保和其他扣款',
    step4: '点击「计算」查看到手工资明细',
  }
});

const { $, t } = GZ;

function calculate() {
  let gross = parseFloat($('#gross').value) || 0;
  const period = $('#period').value;
  const hoursPerYear = parseFloat($('#hours').value) || 2080;
  const taxRate = parseFloat($('#taxRate').value) || 0;
  const ssRate = parseFloat($('#ssRate').value) || 0;
  const otherMonthly = parseFloat($('#other').value) || 0;

  let annualGross;
  if (period === 'annual') annualGross = gross;
  else if (period === 'monthly') annualGross = gross * 12;
  else annualGross = gross * hoursPerYear;

  const incomeTax = annualGross * (taxRate / 100);
  const ss = annualGross * (ssRate / 100);
  const otherAnnual = otherMonthly * 12;
  const totalDeduct = incomeTax + ss + otherAnnual;
  const netAnnual = annualGross - totalDeduct;
  const netMonthly = netAnnual / 12;
  const netHourly = netAnnual / hoursPerYear;
  const effectiveRate = annualGross > 0 ? (totalDeduct / annualGross * 100) : 0;

  $('#result').style.display = 'block';
  const fmt = n => '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
  $('#result-monthly').textContent = fmt(netMonthly);
  $('#result-annual').textContent = fmt(netAnnual);
  $('#result-hourly').textContent = '$' + netHourly.toFixed(2);
  $('#result-effective').textContent = effectiveRate.toFixed(1) + '%';

  $('#breakdown').innerHTML = `
    <div class="breakdown-row"><span>${t('grossPay')}</span><span class="val">${fmt(annualGross)}</span></div>
    <div class="breakdown-row deduct"><span>− ${t('incomeTax')} (${taxRate}%)</span><span class="val">-${fmt(incomeTax)}</span></div>
    <div class="breakdown-row deduct"><span>− ${t('socialSecurity')} (${ssRate}%)</span><span class="val">-${fmt(ss)}</span></div>
    <div class="breakdown-row deduct"><span>− ${t('otherDeduct')}</span><span class="val">-${fmt(otherAnnual)}</span></div>
    <div class="breakdown-row deduct"><span>${t('totalDeduct')}</span><span class="val">-${fmt(totalDeduct)}</span></div>
    <div class="breakdown-row total"><span>${t('netPay')}</span><span class="val" style="color:var(--accent)">${fmt(netAnnual)}/yr</span></div>
  `;
}

['gross','hours','taxRate','ssRate','other'].forEach(id => $('#' + id).addEventListener('input', calculate));
$('#period').addEventListener('change', calculate);
calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏠', href:'/calc/mortgage-calculator.html', name:'Mortgage'},
    {icon:'💵', href:'/calc/income-tax-calculator.html', name:'Income Tax'},
    {icon:'💰', href:'/calc/401k-calculator.html', name:'401k'},
    {icon:' retirement', href:'/calc/retirement-calculator.html', name:'Retirement'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
