<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How many solar panels do I need for my house?", "acceptedAnswer": {"@type": "Answer", "text": "A typical 4-bedroom US home uses ~10,000 kWh per year, which requires an 8-10 kW solar system, or about 16-22 panels at 400W each. The exact number depends on your electricity bill, location, roof orientation, shading, and panel efficiency. The tool above estimates this for you."}}, {"@type": "Question", "name": "How long do solar panels take to pay for themselves?", "acceptedAnswer": {"@type": "Answer", "text": "Most US homes pay back their solar investment in 6-12 years. After payback, electricity is essentially free for the remaining 15-20+ years of panel life. Areas with high electricity rates (CA, NY, HI) and good sun (AZ, NV, FL, TX) see the fastest payback. Federal tax credit (30% ITC) significantly shortens the payback period."}}, {"@type": "Question", "name": "How much do solar panels cost in 2026?", "acceptedAnswer": {"@type": "Answer", "text": "As of 2026, the average installed cost of residential solar in the US is $2.50-$3.50 per watt before incentives, or roughly $20,000-$30,000 for a typical 8 kW system. After the 30% federal Investment Tax Credit, net cost drops to $14,000-$21,000. Pricing continues to decline year over year."}}, {"@type": "Question", "name": "Is solar worth it for my house?", "acceptedAnswer": {"@type": "Answer", "text": "Solar is generally worth it if you have a suitable roof (south-facing, minimal shade, in good condition), own your home, live in a high-electricity-rate state, and plan to stay 5+ years. Use this calculator to see your 25-year ROI. If payback is under 10 years and lifetime savings exceed $20,000, it's typically a good investment."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Solar Panel Savings Calculator',
    toolDesc: 'Estimate solar system size, costs, monthly savings, payback period, and 25-year ROI. Includes the 30% federal Investment Tax Credit and rising electricity rates.',
    bill: 'Monthly electricity bill',
    rate: 'Electricity rate ($/kWh)',
    sun: 'Peak sun hours per day',
    panel: 'Panel wattage',
    cost: 'Installed cost ($/W)',
    itc: 'Tax credit / incentive',
    systemSize: 'System size',
    panels: 'Panels needed',
    annualProd: 'Annual production',
    systemCost: 'System cost',
    afterItc: 'After tax credit',
    annualSave: 'Annual savings',
    payback: 'Payback period',
    net25: '25-year net savings',
    monthly: 'per month',
    step1: 'Enter your monthly electricity bill and current kWh rate',
    step2: 'Choose your peak sun hours (5 is typical US average)',
    step3: 'Pick panel wattage and installed cost per watt',
    step4: 'See system size, payback, and 25-year lifetime savings',
  },
  zh: {
    toolTitle: '太阳能发电节省计算器',
    toolDesc: '估算太阳能系统规模、成本、月度节省、回本周期和 25 年投资回报。含 30% 美国联邦税收抵免和电价上涨因素。',
    bill: '每月电费账单',
    rate: '电价 ($/kWh)',
    sun: '每日峰值日照时数',
    panel: '单块组件功率',
    cost: '安装成本 ($/W)',
    itc: '税收抵免 / 补贴',
    systemSize: '系统规模',
    panels: '所需组件数',
    annualProd: '年发电量',
    systemCost: '系统总成本',
    afterItc: '税收抵免后',
    annualSave: '年节省',
    payback: '回本周期',
    net25: '25 年净收益',
    monthly: '/月',
    step1: '输入每月电费账单和当前电价 (kWh 单价)',
    step2: '选择峰值日照时数（美国平均约为 5）',
    step3: '选择单块组件功率和安装成本',
    step4: '查看系统规模、回本周期和 25 年累计净收益',
  }
});

const { t } = GZ;

function calc() {
  const bill = +document.getElementById('bill').value;
  const rate = +document.getElementById('rate').value;
  const sun = +document.getElementById('sun').value;
  const panel = +document.getElementById('panel').value;
  const cost = +document.getElementById('cost').value;
  const itc = +document.getElementById('itc').value;
  const lang = GZI18n.getLang();
  
  // Annual kWh
  const kwhYr = (bill / rate) * 12;
  // System size: offset ~90% of usage (typical sizing)
  const sizeKw = (kwhYr * 0.9) / (sun * 365);
  const panels = Math.ceil((sizeKw * 1000) / panel);
  const systemCost = sizeKw * 1000 * cost;
  const afterItc = systemCost * (1 - itc);
  const annualSave = kwhYr * 0.9 * rate;
  const payback = afterItc / annualSave;
  // 25-year cumulative (3% annual electricity rate increase)
  const rateInc = 0.03;
  let cumulative = -afterItc;
  for (let y = 1; y <= 25; y++) {
    cumulative += annualSave * Math.pow(1 + rateInc, y - 1);
  }
  // Maintenance: 0.5% of system cost per year
  const maint = systemCost * 0.005;
  cumulative -= maint * 25;
  
  document.getElementById('hero').textContent = `$${cumulative.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',')}`;
  document.getElementById('heroSub').textContent = `${lang==='zh'?'25 年净收益':'25-year net savings'} • ${(payback).toFixed(1)} ${lang==='zh'?'年回本':'year payback'}`;
  
  document.getElementById('summary').innerHTML = `
    <div class="sl-card"><div class="lbl">${t('systemSize')}</div><div class="val">${sizeKw.toFixed(2)} kW</div><div class="sub">${t('panels')}: ${panels}</div></div>
    <div class="sl-card"><div class="lbl">${t('annualProd')}</div><div class="val">${(kwhYr*0.9).toFixed(0)} kWh</div><div class="sub">${(sizeKw*sun*365).toFixed(0)} kWh max</div></div>
    <div class="sl-card"><div class="lbl">${t('systemCost')}</div><div class="val">$${systemCost.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',')}</div><div class="sub">$${cost.toFixed(2)}/W</div></div>
    <div class="sl-card"><div class="lbl">${t('afterItc')}</div><div class="val">$${afterItc.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',')}</div><div class="sub">-${(itc*100).toFixed(0)}% ITC</div></div>
    <div class="sl-card"><div class="lbl">${t('annualSave')}</div><div class="val" style="color:#10b981">$${annualSave.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',')}</div><div class="sub">$${(annualSave/12).toFixed(0)} ${t('monthly')}</div></div>
    <div class="sl-card"><div class="lbl">${t('payback')}</div><div class="val">${payback.toFixed(1)} yr</div><div class="sub">${lang==='zh'?'回本后':'After payback: free power'}</div></div>
  `;
  
  // 25-year chart
  const bars = [];
  let cum = -afterItc;
  for (let y = 0; y < 25; y++) {
    if (y > 0) cum += annualSave * Math.pow(1 + rateInc, y - 1) - maint;
    const maxH = 100;
    const val = Math.max(0, cum);
    const height = Math.min(maxH, (val / cumulative) * maxH);
    bars.push({ h: Math.max(2, height), y: y + 1, val });
  }
  document.getElementById('bars').innerHTML = bars.map(b => `<div class="sl-bar" style="height:${b.h}%" title="Year ${b.y}: $${b.val.toFixed(0)}"></div>`).join('');
  
  document.getElementById('detail').innerHTML = `
    <div class="row"><span class="k">${lang==='zh'?'当前年用电':'Current annual usage'}</span><span class="v">${kwhYr.toFixed(0)} kWh</span></div>
    <div class="row"><span class="k">${lang==='zh'?'系统将抵消':'System offsets'}</span><span class="v">90%</span></div>
    <div class="row"><span class="k">${lang==='zh'?'安装组件':'Panels to install'}</span><span class="v">${panels} × ${panel}W</span></div>
    <div class="row"><span class="k">${lang==='zh'?'年维护费':'Annual maintenance'}</span><span class="v">$${maint.toFixed(0)}</span></div>
    <div class="row"><span class="k">${lang==='zh'?'电费年涨幅':'Annual rate increase'}</span><span class="v">3%</span></div>
    <div class="row"><span class="k">${lang==='zh'?'系统寿命':'System life'}</span><span class="v">25 yr</span></div>
  `;
  
  const tip = document.getElementById('tip');
  if (cumulative > 30000) {
    tip.innerHTML = `☀️ <strong>${lang==='zh'?'非常好的投资！':'Excellent investment!'}</strong> ${lang==='zh'?`25 年净收益 $${cumulative.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',')}, 投资回报丰厚。`:`25-year net savings of $${cumulative.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',')} make this a strong investment.`}`;
  } else if (cumulative > 10000) {
    tip.innerHTML = `🌤 <strong>${lang==='zh'?'不错的投资':'Good investment'}</strong> ${lang==='zh'?`回本后将免费用太阳能电力 15+ 年。`:`Free solar power for 15+ years after payback. Consider this a hedge against rising electricity rates.`}`;
  } else {
    tip.innerHTML = `💡 ${lang==='zh'?'考虑因素：屋顶方向、阴影、州级补贴、本地电价走势。':'Consider: roof orientation, shading, state incentives, local rate trends. Try the numbers with different scenarios to see what works for your home.'}`;
  }
}

['bill','rate','sun','panel','cost','itc'].forEach(id => {
  document.getElementById(id).addEventListener('change', calc);
  document.getElementById(id).addEventListener('input', calc);
});

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⚡', href:'/calc/electricity-cost.html', name:'Electricity Cost'},
    {icon:'☀️', href:'/calc/solar-calculator.html', name:'Solar Calculator'},
    {icon:'🏠', href:'/calc/rent-vs-buy.html', name:'Rent vs Buy'},
    {icon:'💰', href:'/calc/roi.html', name:'ROI Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
