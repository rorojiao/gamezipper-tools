<script>
GZI18n.register({
  en: {
    toolTitle: 'Favicon Generator',
    toolDesc: 'Generate favicons from text, emojis, or images. Create ICO, PNG, and SVG favicons in all required sizes.',
    inputText: 'Text / Emoji',
    bgColor: 'Background Color',
    fgColor: 'Text Color',
    shape: 'Shape',
    rounded: 'Rounded Square',
    circle: 'Circle',
    square: 'Square',
    generate: 'Generate',
    download: 'Download',
    downloadAll: 'Download All PNGs',
    copySvg: 'Copy SVG Code',
    step1: 'Enter text or an emoji for your favicon',
    step2: 'Choose background color, text color, and shape',
    step3: 'Click Generate to preview all sizes',
    step4: 'Download individual sizes or all at once',
    faq1q: 'What sizes does this generator produce?',
    faq1a: 'It generates 16x16, 32x32, 48x48, 64x64, 180x180, 192x192, and 512x512 pixel PNG favicons plus an SVG version.',
    faq2q: 'Can I upload my own image?',
    faq2a: 'Currently the generator supports text and emoji input. You can create any design using text characters and colors.',
    faq3q: 'How do I implement the favicon on my site?',
    faq3a: 'Place the downloaded favicon files in your site root and add the appropriate <link> tags in your HTML <head> section.',
  },
  zh: {
    toolTitle: 'Favicon 生成器',
    toolDesc: '从文本、表情符号或图片生成网站图标。一键生成 ICO、PNG 和 SVG 格式的各种尺寸 favicon。',
    inputText: '文本 / 表情',
    bgColor: '背景色',
    fgColor: '文字颜色',
    shape: '形状',
    rounded: '圆角方形',
    circle: '圆形',
    square: '方形',
    generate: '生成',
    download: '下载',
    downloadAll: '下载全部 PNG',
    copySvg: '复制 SVG 代码',
    step1: '输入文字或表情符号作为 favicon',
    step2: '选择背景色、文字颜色和形状',
    step3: '点击「生成」预览所有尺寸',
    step4: '下载单个尺寸或一次性全部下载',
    faq1q: '生成器会生成哪些尺寸？',
    faq1a: '生成 16x16、32x32、48x48、64x64、180x180、192x192 和 512x512 像素的 PNG favicon，以及 SVG 版本。',
    faq2q: '可以上传自己的图片吗？',
    faq2a: '目前生成器支持文字和表情输入。您可以使用文字字符和颜色创建各种设计。',
    faq3q: '如何在网站上使用生成的 favicon？',
    faq3a: '将下载的 favicon 文件放在网站根目录，并在 HTML <head> 中添加相应的 <link> 标签。',
  }
});

const { $, copyText, t } = GZ;

const SIZES = [16, 32, 48, 64, 180, 192, 512];

// Labels
$('#lbl-text').textContent = t('inputText');
$('#lbl-bg').textContent = t('bgColor');
$('#lbl-fg').textContent = t('fgColor');
$('#lbl-shape').textContent = t('shape');
$('#shape option[value=rounded]').textContent = t('rounded');
$('#shape option[value=circle]').textContent = t('circle');
$('#shape option[value=square]').textContent = t('square');

function generate() {
  const text = $('#favText').value || 'GZ';
  const bg = $('#bgColor').value;
  const fg = $('#fgColor').value;
  const shape = $('#shape').value;

  const canvases = {};

  SIZES.forEach(size => {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');

    // Background
    ctx.fillStyle = bg;
    if (shape === 'circle') {
      ctx.beginPath();
      ctx.arc(size/2, size/2, size/2, 0, Math.PI*2);
      ctx.fill();
    } else if (shape === 'rounded') {
      const r = size * 0.2;
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.fill();
    } else {
      ctx.fillRect(0, 0, size, size);
    }

    // Text
    ctx.fillStyle = fg;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const fontSize = size * (text.length <= 1 ? 0.6 : text.length <= 2 ? 0.5 : text.length <= 3 ? 0.38 : 0.3);
    ctx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif`;
    ctx.fillText(text, size/2, size/2 + size*0.02);

    canvases[size] = canvas;
  });

  // Preview
  $('#previewGrid').innerHTML = SIZES.map(size => {
    return `<div class="preview-card">
      <canvas id="c${size}" width="${size}" height="${size}" style="width:${Math.min(size,64)}px;height:${Math.min(size,64)}px"></canvas>
      <div class="size">${size}x${size}</div>
    </div>`;
  }).join('');

  SIZES.forEach(size => {
    const c = $(`#c${size}`);
    c.getContext('2d').drawImage(canvases[size], 0, 0);
  });

  // Download buttons
  $('#downloadGrid').innerHTML = SIZES.map(size => {
    return `<button class="gz-btn gz-btn-secondary" onclick="dlSize(${size})">${size}x${size} PNG ↓</button>`;
  }).join('');

  // Store canvases for download
  window._favCanvases = canvases;
  window._favText = text;
  window._favBg = bg;
  window._favFg = fg;
  window._favShape = shape;
}

function dlSize(size) {
  const canvas = window._favCanvases[size];
  if (!canvas) return;
  const link = document.createElement('a');
  link.download = `favicon-${size}x${size}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

window.dlSize = dlSize;

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="generate()">${t('generate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="downloadAllPngs()">${t('downloadAll')}</button>`;

function downloadAllPngs() {
  SIZES.forEach((size, i) => {
    setTimeout(() => dlSize(size), i * 200);
  });
}
window.downloadAllPngs = downloadAllPngs;

// Auto-generate on input change
['favText','bgColor','fgColor','shape'].forEach(id => {
  $(`#${id}`).addEventListener('input', generate);
});

generate();

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/image/image-to-base64.html', name:'Image to Base64'},
    {icon:'🎨', href:'/image/color-extractor.html', name:'Color Extractor'},
    {icon:'✂️', href:'/image/cropper.html', name:'Image Cropper'},
    {icon:'📐', href:'/image/resizer.html', name:'Image Resizer'},
  ]
});
</script>
