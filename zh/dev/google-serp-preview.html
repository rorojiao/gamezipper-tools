<script>
GZI18n.register({
  en: {
    toolTitle: 'Google SERP Preview',
    toolDesc: 'Preview how your page appears in Google search results. Optimize your title, description and URL for better click-through rates.',
    pageTitle: 'Page Title',
    pageUrl: 'Page URL',
    metaDesc: 'Meta Description',
    pubDate: 'Published Date (optional)',
    preview: 'Google Preview',
    step1: 'Enter your page title, URL and meta description',
    step2: 'See a real-time preview of how it looks in Google',
    step3: 'Check character counts and color-coded warnings',
    step4: 'Optimize your title and description for better CTR',
    tipTitle: '50-60 chars',
    tipDesc: '120-160 chars',
  },
  zh: {
    toolTitle: 'Google SERP 预览',
    toolDesc: '预览你的页面在 Google 搜索结果中的显示效果。优化标题、描述和 URL 以提高点击率。',
    pageTitle: '页面标题',
    pageUrl: '页面 URL',
    metaDesc: 'Meta 描述',
    pubDate: '发布日期（可选）',
    preview: 'Google 预览',
    step1: '输入页面标题、URL 和 meta 描述',
    step2: '实时预览在 Google 搜索中的显示效果',
    step3: '检查字符数和颜色编码的警告',
    step4: '优化标题和描述以提高点击率',
    tipTitle: '50-60 个字符',
    tipDesc: '120-160 个字符',
  }
});

const { $, t } = GZ;

function truncate(str, max) {
  if (str.length <= max) return str;
  return str.substring(0, max - 1) + '…';
}

function charStatus(len, ideal, max) {
  if (len === 0) return '';
  if (len <= ideal) return 'char-ok';
  if (len <= max) return 'char-warn';
  return 'char-over';
}

function updatePreview() {
  const title = $('#pageTitle').value || 'Page Title';
  const url = $('#pageUrl').value || 'https://example.com';
  const desc = $('#pageDesc').value || 'Meta description will appear here...';
  const date = $('#pageDate').value;

  // Parse URL
  try {
    const u = new URL(url);
    $('#serpUrl').textContent = u.hostname;
    const pathParts = u.pathname.split('/').filter(Boolean);
    if (pathParts.length) {
      $('#serpBreadcrumb').textContent = '› ' + pathParts.join(' › ');
    } else {
      $('#serpBreadcrumb').textContent = '';
    }
  } catch(e) {
    $('#serpUrl').textContent = url.replace(/^https?:\/\//, '').split('/')[0] || url;
    const parts = url.replace(/^https?:\/\//, '').split('/').filter(Boolean);
    if (parts.length > 1) {
      $('#serpBreadcrumb').textContent = '› ' + parts.slice(1).join(' › ');
    }
  }

  $('#serpTitle').textContent = truncate(title, 60);
  $('#serpDesc').innerHTML = (date ? `<span class="serp-date">${new Date(date).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'})} — </span>` : '') + truncate(desc, 160);

  // Character counts
  const tLen = title.length;
  const dLen = desc.length;
  const tStatus = charStatus(tLen, 60, 70);
  const dStatus = charStatus(dLen, 160, 170);

  $('#titleCount').textContent = `${tLen} / 60 characters`;
  $('#titleCount').className = 'char-count ' + tStatus;
  $('#descCount').textContent = `${dLen} / 160 characters`;
  $('#descCount').className = 'char-count ' + dStatus;
}

$('#pageTitle').addEventListener('input', updatePreview);
$('#pageUrl').addEventListener('input', updatePreview);
$('#pageDesc').addEventListener('input', updatePreview);
$('#pageDate').addEventListener('change', updatePreview);

function loadExample() {
  $('#pageTitle').value = 'Free Online Tools - JSON Formatter, Base64 Encoder & More | GameZipper';
  $('#pageUrl').value = 'https://tools.gamezipper.com/dev/json.html';
  $('#pageDesc').value = 'Free online developer tools including JSON formatter, Base64 encoder/decoder, URL encoder, JWT decoder and more. No signup required — all tools run in your browser.';
  $('#pageDate').value = '2026-01-15';
  updatePreview();
}

function doClear() {
  $('#pageTitle').value = '';
  $('#pageUrl').value = '';
  $('#pageDesc').value = '';
  $('#pageDate').value = '';
  updatePreview();
}

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

// Set labels
$('#lblTitle').textContent = t('pageTitle');
$('#lblUrl').textContent = t('pageUrl');
$('#lblDesc').textContent = t('metaDesc');
$('#lblDate').textContent = t('pubDate');
$('#lblPreview').textContent = t('preview');

updatePreview();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏷️', href:'/dev/open-graph-preview.html', name:'Open Graph Preview'},
    
    {icon:'🔍', href:'/dev/html-minifier.html', name:'HTML Minifier'},
    {icon:'🔗', href:'/dev/url-encode.html', name:'URL Encode'},
  ]
});
</script>
