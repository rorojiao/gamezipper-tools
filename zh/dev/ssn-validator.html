    toolDesc: '验证美国社会安全号码格式，生成用于测试的有效 SSN。检查区域号、组号和序列号规则。',
    valid: '✓ SSN 格式有效',
    invalid: '✗ 无效的 SSN',

    group: '组号',
    serial: '序列号',
    generated: '已生成有效测试 SSN',
    step1: '输入 XXX-XX-XXXX 格式的 SSN（或点击生成）',
    step2: '验证器检查区域号、组号和序列号规则',
    step3: '查看各组成部分的详细分析',
    step4: '点击「生成」创建随机有效格式的测试 SSN',
  }
});

const { $, copyText, t } = GZ;

// SSN validation rules (SSA):
// Area (first 3 digits): cannot be 000, 666, or 900-999
// Group (middle 2 digits): cannot be 00
// Serial (last 4 digits): cannot be 0000
// Famous invalid: 078-05-1122 (wallet sample), 219-09-9999 (ad sample)
function validateSSN(input) {
  const clean = input.replace(/[^\d]/g, '');
  if (clean.length !== 9) return { valid: false, reason: 'SSN must be 9 digits', clean };
  const area = parseInt(clean.substring(0, 3));
  const group = parseInt(clean.substring(3, 5));
  const serial = parseInt(clean.substring(5, 9));

  if (area === 0) return { valid: false, reason: 'Area number cannot be 000', clean, area, group, serial };
  if (area === 666) return { valid: false, reason: 'Area number 666 is excluded', clean, area, group, serial };
  if (area >= 900) return { valid: false, reason: 'Area numbers 900-999 are invalid', clean, area, group, serial };
  if (group === 0) return { valid: false, reason: 'Group number cannot be 00', clean, area, group, serial };
  if (serial === 0) return { valid: false, reason: 'Serial number cannot be 0000', clean, area, group, serial };
  // Known promotional/sample SSNs
  if (clean === '078051122') return { valid: false, reason: '078-05-1122 is a known sample SSN (wallet promo)', clean, area, group, serial };
  if (clean === '219099999') return { valid: false, reason: '219-09-9999 is a known sample SSN (ad promo)', clean, area, group, serial };

  const issued = area < 900 && area !== 666 && area !== 0;
  return { valid: true, clean, area, group, serial, issued };
}

function formatSSN(d) {
  return `${String(d.area).padStart(3,'0')}-${String(d.group).padStart(2,'0')}-${String(d.serial).padStart(4,'0')}`;
}

function generateSSN() {
  let area, group, serial;
  do {
    area = Math.floor(Math.random() * 899) + 1; // 1-899, skip 000 and 900+
    if (area === 666) area = 100;
  } while (area === 0 || area === 666 || area >= 900);
  do { group = Math.floor(Math.random() * 99) + 1; } while (group === 0);
  do { serial = Math.floor(Math.random() * 9999) + 1; } while (serial === 0);
  return { area, group, serial };
}

function doValidate() {
  const inp = $('#input').value.trim();
  if (!inp) { $('#output').textContent = ''; $('#status').innerHTML = ''; return; }
  const result = validateSSN(inp);
  const formatted = formatSSN(result);
  let html = `<div style="font-size:1.4em;font-weight:700;margin-bottom:12px">${formatted}</div>`;

  if (result.valid) {
    $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('valid')}</span>`;
    html += `<div style="display:grid;gap:8px;font-size:.9em">`;
    html += `<div><strong>${t('area')}:</strong> ${String(result.area).padStart(3,'0')} — valid range (001-899, not 666)</div>`;
    html += `<div><strong>${t('group')}:</strong> ${String(result.group).padStart(2,'0')} — valid (01-99)</div>`;
    html += `<div><strong>${t('serial')}:</strong> ${String(result.serial).padStart(4,'0')} — valid (0001-9999)</div>`;
    html += `</div>`;
    html += `<div style="margin-top:12px;padding:8px;background:var(--glass);border-radius:8px;font-size:.8em;color:var(--text2)">⚠ ${t('privateNote')||'Format-valid only. Cannot verify against any database.'}</div>`;
  } else {
    $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('invalid')}: ${result.reason}</span>`;
    html += `<div style="color:var(--gz-accent);padding:8px">${result.reason}</div>`;
  }
  $('#output').innerHTML = html;
}

function doGenerate() {
  const ssn = generateSSN();
  const formatted = formatSSN(ssn);
  $('#input').value = formatted;
  doValidate();
  $('#status').innerHTML = `<span style="color:var(--gz-success)">${t('generated')}: ${formatted}</span>`;
}

function doClear() { $('#input').value = ''; $('#output').textContent = ''; $('#status').innerHTML = ''; }

$('#input').addEventListener('input', doValidate);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="doValidate()">${t('validate')||'Validate'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doGenerate()">${t('generate')||'Generate'}</button>
  <button class="gz-btn" onclick="copyText($('#input').value)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

});
