<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">

      <div class="item"><div class="value" id="res-allocated"></div><div class="label" id="lbl-res-allocated"></div></div>

</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Wedding Budget Calculator',
    toolDesc: 'Plan your wedding budget with smart percentage recommendations. Pick a style, set your total, adjust each category and see real-time per-guest and remaining totals.',
    total: 'Total Budget ($)',
    guests: 'Guests',
    style: 'Wedding Style',
    optBudget: 'Budget (DIY)',
    optAverage: 'Average',
    optLuxury: 'Luxury',
    autoFill: 'Reset to Recommended',
    resTotal: 'Total Budget',
    resPerGuest: 'Per Guest',
    resAllocated: 'Allocated',
    resRemaining: 'Remaining',
    overBudget: '⚠️ Over budget by',
    underBudget: '✓ Under budget — extra',
    perfectly: '✓ Perfectly balanced',
    cVenue: 'Venue & Catering',
    cPhoto: 'Photography & Video',
    cAttire: 'Attire & Beauty',
    cFlowers: 'Flowers & Decor',
    cMusic: 'Music & Entertainment',
    cRings: 'Rings',
    cFavors: 'Favors & Gifts',
    cTransport: 'Transportation',
    cPlanner: 'Planner & Misc',
    step1: 'Enter your total wedding budget and guest count',
    step2: 'Pick a wedding style to load recommended percentages',
    step3: 'Adjust any category percentage to match your priorities',
    step4: 'Watch the allocated and remaining totals update live',
  },
  zh: {
    toolTitle: '婚礼预算计算器',
    toolDesc: '用智能百分比建议规划婚礼预算。选择风格、设置总额、调整各分类，实时查看人均和剩余预算。',
    total: '总预算（$）',
    guests: '宾客人数',
    style: '婚礼风格',
    optBudget: '经济（DIY）',
    optAverage: '标准',
    optLuxury: '奢华',
    autoFill: '重置为推荐值',
    resTotal: '总预算',
    resPerGuest: '人均',
    resAllocated: '已分配',
    resRemaining: '剩余',
    overBudget: '⚠️ 超预算',
    underBudget: '✓ 预算有结余',
    perfectly: '✓ 完美平衡',
    cVenue: '场地与餐饮',
    cPhoto: '摄影与录像',
    cAttire: '服装与造型',
    cFlowers: '花艺与布置',
    cMusic: '音乐与娱乐',
    cRings: '婚戒',
    cFavors: '回礼与礼物',
    cTransport: '交通',
    cPlanner: '策划与其他',
    step1: '输入婚礼总预算和宾客人数',
    step2: '选择婚礼风格加载推荐百分比',
    step3: '调整任意分类的百分比以匹配你的优先级',
    step4: '实时查看已分配和剩余预算',
  }
});

const { $, t } = GZ;

$('#lbl-total').textContent = t('total');
$('#lbl-guests').textContent = t('guests');
$('#lbl-style').textContent = t('style');
$('#opt-budget').textContent = t('optBudget');
$('#opt-average').textContent = t('optAverage');
$('#opt-luxury').textContent = t('optLuxury');
$('#lbl-res-total').textContent = t('resTotal');
$('#lbl-res-perguest').textContent = t('resPerGuest');
$('#lbl-res-allocated').textContent = t('resAllocated');
$('#lbl-res-remaining').textContent = t('resRemaining');

// Categories with default recommended percentages (sums to 100)
const CATS = [
  { key: 'cVenue', icon: '🏛️', budget: 45, average: 45, luxury: 42 },
  { key: 'cPhoto', icon: '📸', budget: 8, average: 12, luxury: 13 },
  { key: 'cAttire', icon: '👗', budget: 8, average: 10, luxury: 10 },
  { key: 'cFlowers', icon: '💐', budget: 6, average: 10, luxury: 12 },
  { key: 'cMusic', icon: '🎵', budget: 6, average: 8, luxury: 9 },
  { key: 'cRings', icon: '💍', budget: 3, average: 3, luxury: 4 },
  { key: 'cFavors', icon: '🎁', budget: 2, average: 3, luxury: 4 },
  { key: 'cTransport', icon: '🚗', budget: 3, average: 3, luxury: 3 },
  { key: 'cPlanner', icon: '📋', budget: 19, average: 6, luxury: 3 },
];

let cats = CATS.map(c => ({ ...c, pct: c.average }));

function money(n) { return '$' + n.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0}); }

function renderCats() {
  $('#categories').innerHTML = cats.map((c, i) =>
    `<div class="gz-cat-row">
      <span class="icon">${c.icon}</span>
      <span class="name">${t(c.key)}</span>
      <input type="number" class="pct-input" data-i="${i}" value="${c.pct}" min="0" max="100" step="0.5">
      <input type="number" class="amt-input" data-i="${i}" value="${Math.round((c.pct/100) * (parseFloat($('#total').value)||0))}" min="0" step="50">
      <span class="amt" id="amt-${i}">${money((c.pct/100) * (parseFloat($('#total').value)||0))}</span>
    </div>`
  ).join('');
  document.querySelectorAll('.pct-input').forEach(el => el.addEventListener('input', e => {
    const i = +e.target.dataset.i;
    cats[i].pct = Math.max(0, parseFloat(e.target.value) || 0);
    updateTotals();
  }));
  document.querySelectorAll('.amt-input').forEach(el => el.addEventListener('input', e => {
    const i = +e.target.dataset.i;
    const total = parseFloat($('#total').value) || 0;
    cats[i].pct = total > 0 ? Math.max(0, (parseFloat(e.target.value) || 0) / total * 100) : 0;
    updateTotals();
  }));
}

function autoFill() {
  const style = $('#style').value;
  cats = CATS.map(c => ({ ...c, pct: c[style] }));
  renderCats();
  updateTotals();
}

function updateTotals() {
  const total = Math.max(0, parseFloat($('#total').value) || 0);
  const guests = Math.max(1, parseInt($('#guests').value) || 1);
  const allocated = cats.reduce((s, c) => s + (c.pct/100) * total, 0);
  const remaining = total - allocated;
  const sumPct = cats.reduce((s, c) => s + c.pct, 0);

  $('#res-total').textContent = money(total);
  $('#res-perguest').textContent = money(total / guests);
  $('#res-allocated').textContent = money(allocated);
  $('#res-remaining').textContent = money(remaining);
  $('#res-remaining').style.color = remaining < 0 ? 'var(--gz-accent)' : 'var(--gz-success,#27ae60)';
  $('#totals').style.display = 'grid';

  // Update per-row amount display + pct display
  cats.forEach((c, i) => {
    const amtEl = $('#amt-' + i);
    if (amtEl) amtEl.textContent = money((c.pct/100) * total);
  });

  $('#diff').style.display = 'block';
  if (Math.abs(remaining) < 1) {
    $('#diff').textContent = t('perfectly');
    $('#diff').style.color = 'var(--gz-success,#27ae60)';
  } else if (remaining < 0) {
    $('#diff').textContent = t('overBudget') + ' ' + money(-remaining) + ' (' + (sumPct).toFixed(1) + '% allocated)';
    $('#diff').style.color = 'var(--gz-accent)';
  } else {
    $('#diff').textContent = t('underBudget') + ' ' + money(remaining) + ' (' + sumPct.toFixed(1) + '% allocated)';
    $('#diff').style.color = 'var(--gz-success,#27ae60)';
  }
}

$('#style').addEventListener('change', autoFill);
$('#total').addEventListener('input', updateTotals);
$('#guests').addEventListener('input', updateTotals);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="updateTotals()">${t('autoFill').includes('Reset') ? 'Recalculate' : '重新计算'}</button>
  <button class="gz-btn gz-btn-secondary" onclick="autoFill()">${t('autoFill')}</button>`;

autoFill();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/budget-planner.html', name:'Budget Planner'},
    {icon:'📊', href:'/calc/expense-tracker.html', name:'Expense Tracker'},
    {icon:'🏦', href:'/calc/savings-goal-calculator.html', name:'Savings Goal'},
    {icon:'💸', href:'/calc/roi-calculator.html', name:'ROI Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
