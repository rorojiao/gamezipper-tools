<style>
.tab-row{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab-row button{padding:8px 16px;border-radius:8px;background:var(--glass2);border:1px solid var(--border);color:var(--text);cursor:pointer}
.tab-row button.active{background:var(--gz-accent);color:#fff;border-color:var(--gz-accent)}
.result-box{text-align:center;padding:40px 20px}
.result-big{font-size:4rem;font-weight:700;min-height:80px;display:flex;align-items:center;justify-content:center}
.result-coin{font-size:6rem;transition:transform .4s}
.result-coin.flip{animation:flip 0.5s ease}
@keyframes flip{0%{transform:scale(1) rotateY(0)}50%{transform:scale(1.3) rotateY(180deg)}100%{transform:scale(1) rotateY(360deg)}}

.list-input{width:100%;min-height:120px;padding:12px;border-radius:8px;background:var(--glass2);border:1px solid var(--border);color:var(--text);resize:vertical;margin-bottom:12px;font-family:inherit}

<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"Is the decision maker truly random?","acceptedAnswer":{"@type":"Answer","text":"Yes. The tool uses JavaScript's Math.random() function with the Fisher-Yates shuffle for list picking, giving an equal probability to every option. It is perfect for casual decisions and games."}},{"@type":"Question","name":"Can I pick from a custom list?","acceptedAnswer":{"@type":"Answer","text":"Yes. Switch to the Pick from List tab, enter your options (one per line), and click Decide to randomly pick one. Great for choosing what to eat, who goes first, or raffles."}},{"@type":"Question","name":"What is the coin flip feature?","acceptedAnswer":{"@type":"Answer","text":"The coin flip simulates a heads or tails coin toss with a realistic flip animation. Use it for binary decisions, sports starts, or bets — just like a real coin."}},{"@type":"Question","name":"Can I roll multiple dice?","acceptedAnswer":{"@type":"Answer","text":"Yes. In the Roll Dice tab you can choose 1 to 6 dice and roll them simultaneously. The tool shows individual results and the total — great for board games and RPGs."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="tab-row" id="tabs"></div>
    <div id="content"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Decision Maker',
    toolDesc: "Cannot decide? Let this random picker choose for you — yes or no, pick from a list, flip a coin or roll dice. Fun, fast and free.",
    tabYesNo: 'Yes / No',
    tabList: 'Pick from List',
    tabCoin: 'Coin Flip',
    tabDice: 'Roll Dice',
    decide: 'Decide!',
    roll: 'Roll!',
    flip: 'Flip!',
    heads: 'Heads',
    tails: 'Tails',
    enterOptions: 'Enter your options (one per line)...',
    result: 'Result:',
    step1: 'Choose a mode: Yes/No, List, Coin or Dice',
    step2: 'For List mode, enter one option per line',
    step3: 'Click the button to get your random answer',
    step4: 'Repeat as many times as you need'
  },
  zh: {
    toolTitle: '决策器',
    toolDesc: '纠结选什么？让随机选择器帮你决定 — 是或否、从列表中抽、抛硬币或掷骰子。有趣、快速、免费。',
    tabYesNo: '是 / 否',
    tabList: '列表抽取',
    tabCoin: '抛硬币',
    tabDice: '掷骰子',
    decide: '决定！',
    roll: '掷！',
    flip: '抛！',
    heads: '正面',
    tails: '反面',
    enterOptions: '输入你的选项（每行一个）...',
    result: '结果：',
    step1: '选择模式：是/否、列表、硬币或骰子',
    step2: '列表模式下，每行输入一个选项',
    step3: '点击按钮获取随机结果',
    step4: '可以反复使用，需要多少次都行'
  }
});
const { $, t } = GZ;
let currentTab = 'yesno';
let diceCount = 2;

function renderTabs(){
  $('#tabs').innerHTML = ['yesno','list','coin','dice'].map(tab => {
    const labels = {yesno:'tabYesNo',list:'tabList',coin:'tabCoin',dice:'tabDice'};
    return `<button class="${currentTab===tab?'active':''}" onclick="switchTab('${tab}')">${t(labels[tab])}</button>`;
  }).join('');
}

function switchTab(tab){
  currentTab = tab;
  renderTabs();
  renderContent();
}

function renderContent(){
  const c = $('#content');
  if(currentTab === 'yesno'){
    c.innerHTML = `
      <div class="result-box">
        <div class="result-big" id="r">?</div>
        <button class="gz-btn big-btn" onclick="doYesNo()">${t('decide')}</button>
      </div>`;
  } else if(currentTab === 'list'){
    c.innerHTML = `
      <textarea class="list-input" id="list-items" placeholder="${t('enterOptions')}"></textarea>
      <div class="result-box">
        <div class="result-big" id="r">?</div>
        <button class="gz-btn big-btn" onclick="doList()">${t('decide')}</button>
      </div>`;
  } else if(currentTab === 'coin'){
    c.innerHTML = `
      <div class="result-box">
        <div class="result-coin" id="r">🪙</div>
        <button class="gz-btn big-btn" onclick="doCoin()">${t('flip')}</button>
      </div>`;
  } else if(currentTab === 'dice'){
    c.innerHTML = `
      <div style="text-align:center;margin-bottom:12px">
        <label style="font-size:.85rem;color:var(--text2)">${t('tabDice')}: </label>
        <input type="number" id="dice-n" value="${diceCount}" min="1" max="6" style="width:60px;padding:4px;border-radius:6px;background:var(--glass2);border:1px solid var(--border);color:var(--text);text-align:center" onchange="diceCount=Math.max(1,Math.min(6,+this.value||1))">
      </div>
      <div class="result-box">
        <div class="dice" id="r">🎲</div>
        <button class="gz-btn big-btn" onclick="doDice()">${t('roll')}</button>
      </div>`;
  }
}

function doYesNo(){
  const r = $('#r');
  r.style.opacity = '0';
  setTimeout(() => {
    r.textContent = Math.random() < 0.5 ? '✅ YES' : '❌ NO';
    r.style.color = r.textContent.includes('YES') ? '#00d672' : '#e94560';
    r.style.opacity = '1';
  }, 200);
}

function doList(){
  const items = $('#list-items').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const r = $('#r');
  if(!items.length){ r.textContent = '—'; return; }
  r.style.opacity = '0';
  setTimeout(() => {
    r.textContent = items[Math.floor(Math.random() * items.length)];
    r.style.color = 'var(--gz-accent)';
    r.style.opacity = '1';
  }, 200);
}

function doCoin(){
  const r = $('#r');
  r.classList.add('flip');
  setTimeout(() => {
    const isHead = Math.random() < 0.5;
    r.textContent = isHead ? '👑 ' + t('heads') : '🦅 ' + t('tails');
    r.classList.remove('flip');
  }, 500);
}

function doDice(){
  const r = $('#r');
  const n = diceCount;
  const faces = ['⚀','⚁','⚂','⚃','⚄','⚅'];
  const results = [];
  for(let i=0;i<n;i++) results.push(Math.floor(Math.random()*6));
  const emojis = results.map(v => faces[v]).join(' ');
  const total = results.reduce((a,b)=>a+b+1,0);
  r.innerHTML = `${emojis}<div style="font-size:1rem;margin-top:8px;color:var(--text2)">Total: ${total}</div>`;
}

renderTabs();
renderContent();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔀', href:'/text/text-shuffler.html', name:'Text Shuffler'},
    {icon:'😊', href:'/text/emoji-picker.html', name:'Emoji Picker'},
    {icon:'🧹', href:'/text/random-user-generator.html', name:'Random User Gen'},
    {icon:'🎲', href:'/fun/', name:'Fun Tools'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
