<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How much grass seed do I need per square foot?","acceptedAnswer":{"@type":"Answer","text":"For a new lawn, you typically need 4-5 lb of seed per 1000 sq ft for Kentucky bluegrass, 8-10 lb for perennial ryegrass, 5-6 lb for tall fescue, and 1-2 lb for Bermuda. For overseeding, use about half the new-lawn rate. This tool does the math for your exact area."}},{"@type":"Question","name":"Should I overseed or seed a new lawn?","acceptedAnswer":{"@type":"Answer","text":"Overseed an existing thin lawn to thicken it — use 50% of the new-lawn seeding rate. Start a new lawn from scratch if the soil is bare or the existing grass is mostly dead — use the full seeding rate and prepare the soil first."}},{"@type":"Question","name":"When is the best time to plant grass seed?","acceptedAnswer":{"@type":"Answer","text":"Cool-season grasses (Kentucky bluegrass, fescue, ryegrass) are best seeded in early fall (6-8 weeks before first frost) or early spring. Warm-season grasses (Bermuda, Zoysia) are best seeded in late spring to early summer when soil is warm."}},{"@type":"Question","name":"How long does grass seed take to germinate?","acceptedAnswer":{"@type":"Answer","text":"Perennial ryegrass germinates in 5-10 days, tall fescue in 7-12 days, Kentucky bluegrass in 14-30 days, and Bermuda grass in 7-21 days. Keep the soil consistently moist during germination — drying out even once can kill the seeds."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-gs-form">
      <label id="lbl-mode">Mode
        <select id="mode" onchange="autoCalc()">
          <option value="new" id="opt-new">New Lawn</option>
          <option value="over" id="opt-over">Overseeding</option>
        </select>
      </label>
      <label id="lbl-grass">Grass Type
        <select id="grass" onchange="autoCalc()">
          <option value="kb" id="opt-kb">Kentucky Bluegrass</option>
          <option value="pr" id="opt-pr">Perennial Ryegrass</option>
          <option value="tf" id="opt-tf" selected>Tall Fescue</option>
          <option value="ff" id="opt-ff">Fine Fescue</option>
          <option value="bermuda" id="opt-bermuda">Bermuda Grass</option>
          <option value="zoysia" id="opt-zoysia">Zoysia Grass</option>
          <option value="mix" id="opt-mix">Sun/Shade Mix</option>
        </select>
      </label>
      <label id="lbl-area">Area
        <input type="number" id="area" min="1" step="1" placeholder="5000" oninput="autoCalc()">
      </label>
      <label id="lbl-unit">Area Unit
        <select id="unit" onchange="autoCalc()">
          <option value="sqft" id="opt-sqft">sq ft</option>
          <option value="sqm" id="opt-sqm">sq m</option>
          <option value="acre" id="opt-acre">acres</option>
          <option value="ha" id="opt-ha">hectares</option>
        </select>
      </label>
      <label id="lbl-outunit">Output Unit
        <select id="outunit" onchange="autoCalc()">
          <option value="lb" id="opt-lb">Pounds (lb)</option>
          <option value="kg" id="opt-kg">Kilograms (kg)</option>
        </select>
      </label>
    </div>
    <div class="gz-gs-result" id="result" style="display:none">
      <div style="font-size:2em">🌱</div>
      <div class="gz-gs-amount" id="amount">—</div>
      <div class="gz-gs-sub" id="amountSub"></div>
    </div>
    <div class="gz-gs-grid" id="gsInfo"></div>
    <div class="gz-gs-note" id="gsNote"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Grass Seed Calculator',
    toolDesc: 'Find out exactly how much grass seed you need for your lawn. Pick grass type, area size and new-lawn vs overseeding — get pounds or kg of seed instantly. Free, browser-based.',
    calculate: 'Calculate',
    clear: 'Clear',
    modeLabel: 'Mode',
    newLawn: 'New Lawn',
    overseed: 'Overseeding',
    grassType: 'Grass Type',
    areaLabel: 'Area',
    areaUnit: 'Area Unit',
    outUnit: 'Output Unit',
    sqft: 'sq ft', sqm: 'sq m', acre: 'acres', ha: 'hectares',
    lbU: 'Pounds (lb)', kgU: 'Kilograms (kg)',
    seedNeeded: 'Seed Needed',
    rate: 'Seeding Rate',
    bags: 'Bags (5 lb)',
    coverage: 'Coverage',
    noteText: 'Tip: buy 10% extra seed to account for uneven spreading and patchy germination. Keep newly seeded soil consistently moist for 2-3 weeks.',
    step1: 'Choose New Lawn (full rate) or Overseeding (half rate)',
    step2: 'Pick your grass type — each has a different seeding rate',
    step3: 'Enter your lawn area in sq ft, sq m, acres or hectares',
    step4: 'See exact pounds or kg of seed, plus bag count',
  },
  zh: {
    toolTitle: '草籽用量计算器',
    toolDesc: '精确计算你的草坪需要多少草籽。选择草种、面积和新种/补播 — 即时获得所需草籽的磅或公斤数。免费，浏览器本地运行。',
    calculate: '计算',
    clear: '清除',
    modeLabel: '模式',
    newLawn: '新种草坪',
    overseed: '补播加密',
    grassType: '草种',
    areaLabel: '面积',
    areaUnit: '面积单位',
    outUnit: '输出单位',
    sqft: '平方英尺', sqm: '平方米', acre: '英亩', ha: '公顷',
    lbU: '磅 (lb)', kgU: '公斤 (kg)',
    seedNeeded: '所需草籽',
    rate: '播种量',
    bags: '包装袋数（5 磅）',
    coverage: '覆盖面积',
    noteText: '提示：多买 10% 的草籽，以备播种不均和出苗不齐。新播后的土壤需保持湿润 2-3 周。',
    step1: '选择新种草坪（全量）或补播加密（半量）',
    step2: '选择草种 — 每种草的播种量不同',
    step3: '输入草坪面积（平方英尺、平方米、英亩或公顷）',
    step4: '查看精确的草籽磅数或公斤数，以及所需袋数',
  }
});

const { $, copyText, t } = GZ;

// Seeding rates: lb per 1000 sq ft for NEW lawns
const RATES = {
  kb:      { rate: 3,   name: 'Kentucky Bluegrass' },
  pr:      { rate: 8,   name: 'Perennial Ryegrass' },
  tf:      { rate: 8,   name: 'Tall Fescue' },
  ff:      { rate: 5,   name: 'Fine Fescue' },
  bermuda: { rate: 2,   name: 'Bermuda Grass' },
  zoysia:  { rate: 2,   name: 'Zoysia Grass' },
  mix:     { rate: 6,   name: 'Sun/Shade Mix' },
};

function autoCalc() {
  $('#opt-new').textContent = t('newLawn');
  $('#opt-over').textContent = t('overseed');
  $('#opt-sqft').textContent = t('sqft');
  $('#opt-sqm').textContent = t('sqm');
  $('#opt-acre').textContent = t('acre');
  $('#opt-ha').textContent = t('ha');
  $('#opt-lb').textContent = t('lbU');
  $('#opt-kg').textContent = t('kgU');
  const mode = $('#mode').value;
  const grassKey = $('#grass').value;
  const area = parseFloat($('#area').value) || 0;
  const unit = $('#unit').value;
  const outUnit = $('#outunit').value;
  if (area <= 0) { $('#result').style.display = 'none'; $('#gsInfo').innerHTML = ''; $('#gsNote').textContent=''; return; }
  // Convert area to sq ft
  const areaSqft = unit === 'sqft' ? area : unit === 'sqm' ? area * 10.7639 : unit === 'acre' ? area * 43560 : area * 107639;
  const g = RATES[grassKey];
  let ratePer1000 = g.rate;
  if (mode === 'over') ratePer1000 = ratePer1000 * 0.5; // overseed = half
  const lbNeeded = (areaSqft / 1000) * ratePer1000;
  const kgNeeded = lbNeeded * 0.453592;
  const display = outUnit === 'lb' ? lbNeeded.toFixed(2) + ' lb' : kgNeeded.toFixed(2) + ' kg';
  const bags = Math.ceil(lbNeeded / 5);
  $('#amount').textContent = display;
  $('#amountSub').innerHTML = `${t('seedNeeded')} · ${g.name} · ${mode === 'over' ? t('overseed') : t('newLawn')}`;
  $('#result').style.display = 'block';
  $('#gsInfo').innerHTML = `
    <div class="gz-gs-card"><strong>${t('rate')}</strong>${ratePer1000.toFixed(1)} lb / 1000 sq ft</div>
    <div class="gz-gs-card"><strong>${t('coverage')}</strong>${areaSqft.toLocaleString()} sq ft</div>
    <div class="gz-gs-card"><strong>${t('bags')}</strong>${bags} bags</div>
    <div class="gz-gs-card"><strong>+10% buffer</strong>${(outUnit==='lb'?(lbNeeded*1.1).toFixed(2):(kgNeeded*1.1).toFixed(2))} ${outUnit}</div>
  `;
  $('#gsNote').textContent = t('noteText');
}

function doClear() {
  $('#area').value = '';
  $('#result').style.display = 'none';
  $('#gsInfo').innerHTML = '';
  $('#gsNote').textContent = '';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="autoCalc()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

autoCalc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌱', href:'/calc/fertilizer-calculator.html', name:'Fertilizer'},
    {icon:'🌿', href:'/calc/plant-spacing.html', name:'Plant Spacing'},
    {icon:'🌱', href:'/calc/mulch-calculator.html', name:'Mulch'},
    {icon:'📏', href:'/convert/unit.html', name:'Unit Converter'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
