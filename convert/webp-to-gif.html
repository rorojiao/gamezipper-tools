const { $, t, copyText } = GZ;
let webpImg = null;
let isAnimated = false;

const dropZone = $('#dropZone');
const fileInput = $('#fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {

  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

function loadFile(file) {
  if (!file.type.includes('webp')) {
    $('#status').textContent = 'Please upload a WebP file';
    return;
  }
  const url = URL.createObjectURL(file);
  webpImg = new Image();
  webpImg.onload = () => {
    $('#preview').innerHTML = `<img src="${url}" alt="WebP preview">`;
    $('#status').textContent = `Loaded: ${webpImg.naturalWidth}x${webpImg.naturalHeight} (${(file.size/1024).toFixed(1)} KB)`;
  };
  webpImg.src = url;
}

async function convertToGIF() {
  if (!webpImg) return;
  const scale = +$('#scale').value;
  const delay = +$('#delay').value;
  const quality = +$('#quality').value;
  const w = Math.round(webpImg.naturalWidth * scale);
  const h = Math.round(webpImg.naturalHeight * scale);

  // Draw to canvas
  const canvas = $('#resultCanvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(webpImg, 0, 0, w, h);

  // Get pixel data
  const imageData = ctx.getImageData(0, 0, w, h);
  const pixels = imageData.data;

  // Quantize colors (median cut simplified - use uniform quantization)
  const rMask = Math.max(1, 8 - quality);
  const gMask = Math.max(1, 8 - quality);
  const bMask = Math.max(1, 8 - quality);
  const palette = new Map();
  let idx = 0;

  for (let i = 0; i < pixels.length; i += 4) {
    const r = pixels[i] >> rMask << rMask;
    const g = pixels[i+1] >> gMask << gMask;
    const b = pixels[i+2] >> bMask << bMask;
    const a = pixels[i+3];
    const key = (r << 16) | (g << 8) | b;
    if (!palette.has(key)) {
      palette.set(key, { r, g, b, idx: idx++ });
      if (idx >= 256) break;
    }
  }

  // Convert to palette indices
  const indices = new Uint8Array(w * h);
  for (let i = 0; i < pixels.length; i += 4) {
    const pi = i / 4;
    if (pixels[i+3] < 128) {
      indices[pi] = 0; // transparent -> first color
    } else {
      const r = pixels[i] >> rMask << rMask;
      const g = pixels[i+1] >> gMask << gMask;
      const b = pixels[i+2] >> bMask << bMask;
      const key = (r << 16) | (g << 8) | b;
      indices[pi] = palette.has(key) ? palette.get(key).idx : 0;
    }
  }

  // Build GIF binary
  const palArr = Array.from(palette.values());
  const colorTable = new Uint8Array(768); // 256 * 3
  palArr.forEach((c, i) => { colorTable[i*3] = c.r; colorTable[i*3+1] = c.g; colorTable[i*3+2] = c.b; });

  // GIF89a header
  const header = new Uint8Array([0x47,0x49,0x46,0x38,0x39,0x61]); // GIF89a

  // Logical screen descriptor
  const lsd = new Uint8Array(7);
  lsd[0] = w & 0xFF; lsd[1] = (w >> 8) & 0xFF;
  lsd[2] = h & 0xFF; lsd[3] = (h >> 8) & 0xFF;
  lsd[4] = 0xF7; // global color table, 8 bits
  lsd[5] = 0; // bg color
  lsd[6] = 0; // aspect

  // Trailer
  const trailer = new Uint8Array([0x3B]);

  // Build image descriptor
  const imgDesc = new Uint8Array(10);
  imgDesc[0] = 0x2C; // image separator
  // left, top = 0
  imgDesc[5] = w & 0xFF; imgDesc[6] = (w >> 8) & 0xFF;
  imgDesc[7] = h & 0xFF; imgDesc[8] = (h >> 8) & 0xFF;

  // LZW minimum code size
  const minCodeSize = 8;

  // Simple LZW encoding
  const lzwData = lzwEncode(indices, minCodeSize);

  // GIF control extension for delay
  const gce = new Uint8Array([0x21, 0xF9, 0x04, 0x00, delay & 0xFF, (delay >> 8) & 0xFF, 0x00, 0x00]);

  // Combine all parts
  const parts = [header, lsd, colorTable, gce, imgDesc, new Uint8Array([minCodeSize]), lzwData, trailer];
  const blob = new Blob(parts, { type: 'image/gif' });

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'converted.gif';
  a.click();

  $('#status').textContent = `GIF saved: ${w}x${h}, ${(blob.size/1024).toFixed(1)} KB`;
  $('#resultArea').style.display = '';
}

function lzwEncode(indices, minCodeSize) {
  const clearCode = 1 << minCodeSize;
  const eoiCode = clearCode + 1;
  let codeSize = minCodeSize + 1;
  let nextCode = eoiCode + 1;
  const maxCode = 4096;

  // Initialize code table
  let table = new Map();
  for (let i = 0; i < clearCode; i++) table.set(String(i), i);

  const output = [];
  let buffer = 0;
  let bufferBits = 0;

  function writeCode(code) {
    buffer |= (code << bufferBits);
    bufferBits += codeSize;
    while (bufferBits >= 8) {
      output.push(buffer & 0xFF);
      buffer >>= 8;
      bufferBits -= 8;
    }
  }

  writeCode(clearCode);

  let current = String(indices[0]);
  for (let i = 1; i < indices.length; i++) {
    const next = String(indices[i]);
    const combined = current + ',' + next;
    if (table.has(combined)) {
      current = combined;
    } else {
      writeCode(table.get(current));
      if (nextCode < maxCode) {
        table.set(combined, nextCode++);
        if (nextCode > (1 << codeSize) && codeSize < 12) codeSize++;
      } else {
        writeCode(clearCode);
        table = new Map();
        for (let j = 0; j < clearCode; j++) table.set(String(j), j);
        nextCode = eoiCode + 1;
        codeSize = minCodeSize + 1;
      }
      current = next;
    }
  }

  writeCode(table.get(current));
  writeCode(eoiCode);

  if (bufferBits > 0) output.push(buffer & 0xFF);

  // Build sub-blocks (max 255 bytes each)
  const blocks = [];
  for (let i = 0; i < output.length; i += 255) {
    const chunk = output.slice(i, i + 255);
    blocks.push(chunk.length, ...chunk);
  }
  blocks.push(0); // block terminator

  return new Uint8Array(blocks);
}
