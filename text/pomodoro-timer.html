<script>
GZI18n.register({
  en: {
    toolTitle: 'Pomodoro Timer',
    toolDesc: 'Boost your focus with the Pomodoro Technique. 25-minute work sessions with smart breaks — customizable, free, and runs entirely in your browser.',
    work: 'Focus',
    shortBreak: 'Short Break',
    longBreak: 'Long Break',
    start: 'Start',
    pause: 'Pause',
    reset: 'Reset',
    skip: 'Skip',
    completed: 'Sessions Done',
    focusMins: 'Focus Minutes',
    workMin: 'Work (min)',
    shortBreakLabel: 'Short Break (min)',
    longBreakLabel: 'Long Break (min)',
    rounds: 'Rounds',
    step1: 'Adjust work and break durations to your liking',
    step2: 'Click Start to begin a focus session',
    step3: 'When the timer ends, take your break',
    step4: 'Track your completed sessions and total focus time'
  },
  zh: {
    toolTitle: '番茄工作法计时器',
    toolDesc: '用番茄工作法提升专注力。25 分钟工作 + 智能休息循环 — 可自定义、免费，完全在浏览器中运行。',
    work: '专注',
    shortBreak: '短休息',
    longBreak: '长休息',
    start: '开始',
    pause: '暂停',
    reset: '重置',
    skip: '跳过',
    completed: '已完成',
    focusMins: '专注分钟',
    workMin: '工作（分钟）',
    shortBreakLabel: '短休息（分钟）',
    longBreakLabel: '长休息（分钟）',
    rounds: '轮数',
    step1: '根据需要调整工作和休息时长',
    step2: '点击开始进入专注时段',
    step3: '计时结束时，进入休息',
    step4: '跟踪已完成的轮次和总专注时间'
  }
});
const { $, t } = GZ;
let phase = 'work'; // work, short, long
let running = false;
let remaining = 25 * 60;
let interval = null;
let pomsCompleted = 0;
let totalMins = 0;
let workCount = 0;

function getDurations(){
  return {
    work: Math.max(1, parseInt($('#work-min').value) || 25),
    short: Math.max(1, parseInt($('#short-min').value) || 5),
    long: Math.max(2, parseInt($('#long-min').value) || 15),
    rounds: Math.max(2, parseInt($('#rounds').value) || 4)
  };
}

function fmtTime(s){
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function updateDisplay(){
  $('#time').textContent = fmtTime(remaining);
  $('#mode').textContent = t(phase === 'work' ? 'work' : phase === 'short' ? 'shortBreak' : 'longBreak');
  const circle = $('#circle');
  circle.className = 'timer-circle ' + (phase === 'work' ? 'work' : phase === 'short' ? 'break' : 'long-break');
  document.title = `${fmtTime(remaining)} - ${$('#mode').textContent} | GameZipper`;
}

function setPhase(p){
  phase = p;
  const d = getDurations();
  if(p === 'work') remaining = d.work * 60;
  else if(p === 'short') remaining = d.short * 60;
  else remaining = d.long * 60;
  updateDisplay();
}

function tick(){
  remaining--;
  if(remaining <= 0){
    beep();
    if(phase === 'work'){
      pomsCompleted++;
      totalMins += getDurations().work;
      workCount++;
      $('#pom-count').textContent = pomsCompleted;
      $('#total-mins').textContent = totalMins;
      const d = getDurations();
      setPhase(workCount % d.rounds === 0 ? 'long' : 'short');
    } else {
      setPhase('work');
    }
  }
  updateDisplay();
}

function start(){
  if(running) return;
  running = true;
  interval = setInterval(tick, 1000);
  renderBtns();
}
function pause(){
  running = false;
  clearInterval(interval);
  renderBtns();
}
function reset(){
  pause();
  setPhase('work');
  pomsCompleted = 0;
  totalMins = 0;
  workCount = 0;
  $('#pom-count').textContent = '0';
  $('#total-mins').textContent = '0';
}
function skip(){
  if(phase === 'work'){
    pomsCompleted++;
    totalMins += getDurations().work;
    workCount++;
    $('#pom-count').textContent = pomsCompleted;
    $('#total-mins').textContent = totalMins;
    const d = getDurations();
    setPhase(workCount % d.rounds === 0 ? 'long' : 'short');
  } else {
    setPhase('work');
  }
  updateDisplay();
}

function beep(){
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.frequency.value = 800; gain.gain.value = 0.3;
    osc.start(); osc.stop(ac.currentTime + 0.3);
  } catch(e){}
}

function renderBtns(){
  $('#btns').innerHTML = running
    ? `<button class="gz-btn" onclick="pause()">${t('pause')}</button><button class="gz-btn gz-btn-secondary" onclick="skip()">${t('skip')}</button><button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`
    : `<button class="gz-btn" onclick="start()">${t('start')}</button><button class="gz-btn gz-btn-secondary" onclick="skip()">${t('skip')}</button><button class="gz-btn gz-btn-secondary" onclick="reset()">${t('reset')}</button>`;
}

['work-min','short-min','long-min','rounds'].forEach(id => {
  $('#'+id).addEventListener('change', () => { if(!running) setPhase(phase); });
});

setPhase('work');
renderBtns();

GZ.renderToolPage({
  category: 'text',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],

    {icon:'📝', href:'/text/markdown-editor.html', name:'Markdown Editor'},
    {icon:'📖', href:'/text/bionic.html', name:'Bionic Reading'},
    {icon:'⚡', href:'/text/speed-reader.html', name:'Speed Reader'},
    {icon:'🧹', href:'/text/cleaning-checklist.html', name:'Checklist Maker'},
  ]
});
</script>
