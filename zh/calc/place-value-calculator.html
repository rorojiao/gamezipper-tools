<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is place value?", "acceptedAnswer": {"@type": "Answer", "text": "Place value is the value of a digit based on its position in a number. In 4567, the 4 is in the thousands place (worth 4000), the 5 is in the hundreds place (500), the 6 is in the tens place (60), and the 7 is in the ones place (7). Each position to the left is 10× larger."}}, {"@type": "Question", "name": "What are the place values after the decimal point?", "acceptedAnswer": {"@type": "Answer", "text": "After the decimal point, places get 10× smaller: tenths (1/10 or 0.1), hundredths (1/100 or 0.01), thousandths (1/1000 or 0.001), ten-thousandths (1/10000 or 0.0001), and so on. For example, in 0.452 the 4 is worth 0.4, the 5 is worth 0.05, the 2 is worth 0.002."}}, {"@type": "Question", "name": "What is the difference between face value and place value?", "acceptedAnswer": {"@type": "Answer", "text": "Face value is the digit itself (the face value of the 4 in 4567 is just 4). Place value is what that digit is worth based on position (the place value of that 4 is 4000). Place value = face value × power of 10 for that position."}}, {"@type": "Question", "name": "How large a number can I analyze?", "acceptedAnswer": {"@type": "Answer", "text": "The tool handles numbers up to JavaScript's safe integer limit (about 9 quadrillion, or 9 × 10^15) and supports any number of decimal places. For very large numbers, you'll see place names like hundred-quadrillions. Each digit is broken down individually."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Place Value Calculator',
    toolDesc: 'Find the place value of every digit in any number. Enter 4567 to see thousands, hundreds, tens, ones — plus decimal places. Free, instant, private.',
    step1: 'Type or paste any number in the input field above',
    step2: 'Each digit appears as a card showing its place name and value',
    step3: 'The summary shows the total value and number of digits',
    step4: 'Great for teaching and learning place value fundamentals',
  },
  zh: {
    toolTitle: '数位计算器',
    toolDesc: '查找任何数字中每个数字的数位。输入 4567 可查看千位、百位、十位、个位 — 以及小数位。免费、即时、隐私安全。',
    step1: '在上方输入框中输入或粘贴任意数字',
    step2: '每个数字显示为一张卡片，展示其位名和值',
    step3: '摘要显示总值和数字位数',
    step4: '非常适合教授和学习数位基础知识',
  }
});

const { $, t } = GZ;

const INT_PLACES = ['ones','tens','hundreds','thousands','ten-thousands','hundred-thousands','millions','ten-millions','hundred-millions','billions','ten-billions','hundred-billions','trillions','ten-trillions','hundred-trillions','quadrillions'];
const DEC_PLACES = ['tenths','hundredths','thousandths','ten-thousandths','hundred-thousandths','millionths','ten-millionths','hundred-millionths','billionths'];

function build(numStr) {
  const neg = numStr.startsWith('-');
  const body = neg ? numStr.slice(1) : numStr;
  const [intPart, decPart] = body.split('.');
  const cards = [];
  // integer digits, left to right
  for (let i = 0; i < intPart.length; i++) {
    const digit = intPart[i];
    const placeFromRight = intPart.length - 1 - i;
    const placeName = INT_PLACES[placeFromRight] || `10${placeFromRight}`;
    const value = parseInt(digit) * Math.pow(10, placeFromRight);
    cards.push({digit, placeName, value, isZero: digit === '0', isDec: false});
  }
  if (decPart) {
    for (let i = 0; i < decPart.length; i++) {
      const digit = decPart[i];
      const place = i + 1;
      const placeName = DEC_PLACES[place - 1] || `1/${Math.pow(10, place)}`;
      const value = digit === '0' ? 0 : digit / Math.pow(10, place);
      cards.push({digit, placeName, value, isZero: digit === '0', isDec: true});
    }
  }
  return {neg, cards, intPart, decPart};
}

function render() {
  const raw = $('#input').value.trim();
  if (!raw || !/^-?\d+(\.\d+)?$/.test(raw.replace(/,/g,''))) {
    $('#grid').innerHTML = '';
    $('#summary').style.display = 'none';
    return;
  }
  const r = build(raw.replace(/,/g,''));
  $('#grid').innerHTML = r.cards.map(c =>
    `<div class="pv-card${c.isZero ? ' zero' : ''}${c.isDec ? ' dec' : ''}">
      <div class="pv-digit">${c.digit}</div>
      <div class="pv-place">${c.placeName}</div>
      <div class="pv-value">${c.value}</div>
    </div>`
  ).join('');
  const intDigits = r.intPart.length;
  const decDigits = r.decPart ? r.decPart.length : 0;
  const total = (r.neg ? '−' : '') + raw.replace(/,/g,'').replace('-','');
  $('#summary').style.display = 'block';
  $('#summary').innerHTML = `📊 <b>${intDigits}</b> integer digit${intDigits!==1?'s':''}${decDigits?` + <b>${decDigits}</b> decimal digit${decDigits!==1?'s':''}`:''} — <b>${intDigits+decDigits}</b> significant positions. Full value: <b>${total}</b>`;
}

$('#input').addEventListener('input', render);

});
