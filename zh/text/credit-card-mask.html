<script>
GZI18n.register({
en:{
toolTitle:'Credit Card Masker / Redactor',
toolDesc:'Detect and mask credit card numbers, SSNs, CVVs, phone numbers and emails in text. Useful for screenshots, demos, logs and customer support QA. 100% browser-local.',
lblCards:'Credit cards',
lblSSN:'US SSN',
lblPhone:'Phone numbers',
lblCVV:'CVV codes',
lblEmail:'Email addresses',
step1:'Paste logs, screenshots OCR text, email excerpts or chat transcripts into the input',
step2:'Toggle detectors on/off — credit cards, SSN, phone, CVV, email',
step3:'Pick redaction style: keep-last-4, first-6, or full blackout',
step4:'Copy the masked output or download it as .txt'
},
zh:{
toolTitle:'信用卡号遮罩工具',
toolDesc:'在文本中检测并遮罩信用卡号、SSN、CVV、电话号码和邮箱。适用于截图、演示、日志和客服 QA。100% 浏览器本地运行。',
lblCards:'信用卡',
lblSSN:'美国 SSN',
lblPhone:'电话号码',
lblCVV:'CVV 安全码',
lblEmail:'邮箱地址',
step1:'将日志、截图 OCR 文本、邮件摘录或聊天记录粘贴到输入框',
step2:'按需勾选/取消检测器 — 信用卡、SSN、电话、CVV、邮箱',
step3:'选择脱敏方式：保留后 4 位、保留前 6 位或完全遮罩',
step4:'复制或下载脱敏后的结果'
}
});

const { $, copyText, t } = GZ;

// Card IIN ranges (compact). Major brands.
const CARDS = [
{brand:'Visa',       re:/\b4\d{3}[\s-]?\d{4}[\s-]?\d{4}[\s-]?\d{4}\b/g},
{brand:'MasterCard', re:/\b5[1-5]\d{2}[\s-]?\d{4}[\s-]?\d{4}[\s-]?\d{4}\b|2[2-7]\d{2}[\s-]?\d{4}[\s-]?\d{4}[\s-]?\d{4}\b/g},
{brand:'Amex',       re:/\b3[47]\d{2}[\s-]?\d{6}[\s-]?\d{5}\b/g},
{brand:'Discover',   re:/\b6(?:011|5\d{2})[\s-]?\d{4}[\s-]?\d{4}[\s-]?\d{4}\b/g},
{brand:'JCB',        re:/\b35\d{3}[\s-]?\d{4}[\s-]?\d{4}[\s-]?\d{4}\b/g},
{brand:'Diners',     re:/\b3(?:0[0-5]|[68]\d)\d[\s-]?\d{6}[\s-]?\d{4}\b/g}
];
const SSN_RE  = /\b\d{3}-\d{2}-\d{4}\b/g;
const PHONE_RE = /\b\+?1?[\s.-]?\(?\d{3}\)?[\s.-]?\d{3}[\s.-]?\d{4}\b/g;
const CVV_RE  = /\b(?:cvv|cvc|cvv2)[:\s]*\d{3,4}\b/gi;
const EMAIL_RE = /\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}\b/g;

function digitsOf(s){ return (s.match(/\d/g)||[]).join(''); }

function maskCard(m, style){
const d = digitsOf(m[0]);
if (style === 'all')    return '•••• •••• •••• ••••';
if (style === 'first6') return d.slice(0,6).replace(/(.{4})(.{2})/, '$1 $2') + ' ••••••';
// keep last 4
const padded = d.padEnd(16, '0').slice(0,16);
return '•••• •••• •••• ' + padded.slice(-4);
}

function maskEmail(m){ const [u, dom] = m[0].split('@'); return (u[0]||'*') + '•••@' + dom; }
function maskSsn(m){ return '•••-••-' + m[0].slice(-4); }
function maskPhone(m){ return '••• ••• ' + m[0].replace(/\\D/g,'').slice(-4); }
function maskCvv(m){ return m[0].replace(/\d/g, '•'); }

function mask(){
const inp = $('#input').value;
const style = $('#style').value;
const useCards = $('#opt-card').checked;
const useSsn = $('#opt-ssn').checked;
const usePhone = $('#opt-phone').checked;
const useCvv = $('#opt-cvv').checked;
const useEmail = $('#opt-email').checked;
let out = inp;
const hits = [];

if (useCards) {
for (const c of CARDS) {
out = out.replace(c.re, x => { hits.push({label:c.brand+' card', before:x, after:maskCard([x],style)}); return maskCard([x],style); });
}
}
if (useSsn)   out = out.replace(SSN_RE,   x => { hits.push({label:'SSN',    before:x, after:maskSsn([x])});  return maskSsn([x]); });
if (usePhone) out = out.replace(PHONE_RE, x => { hits.push({label:'Phone',  before:x, after:maskPhone([x])}); return maskPhone([x]); });
if (useCvv)   out = out.replace(CVV_RE,   x => { hits.push({label:'CVV',    before:x, after:maskCvv(x)});     return maskCvv(x); });
if (useEmail) out = out.replace(EMAIL_RE,  x => { hits.push({label:'Email',  before:x, after:maskEmail([x])}); return maskEmail([x]); });

$('#output').textContent = out;
$('#summary').innerHTML = hits.length === 0
? '<span style="color:var(--text3)">No sensitive patterns detected.</span>'
: `<span style="color:var(--gz-success)">✓ Masked ${hits.length} pattern${hits.length===1?'':'s'}</span>`;

const list = hits.length ? hits.map(h => `
<div class="match-row">
  <span class="label">${h.label}</span>
  <span class="val"><s style="opacity:.4">${h.before}</s> → <strong style="color:var(--accent)">${h.after}</strong></span>
</div>`).join('') : '';
$('#matches').innerHTML = `<div class="match-list">${list}</div>`;
}

$('#input').addEventListener('input', mask);
$('#toolbar').innerHTML = `
<button class="gz-btn" onclick="copyText($('#output').textContent)">${t('copy')}</button>
<button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';mask()">${t('clear')}</button>
<button class="gz-btn gz-btn-secondary" onclick="$('#input').value='Customer called from 415-555-0132 about her Visa 4111 1111 1111 1234 exp 12/26 cvv: 123. Email me at jane.doe@example.com or ssn 123-45-6789';mask()">${t('example')}</button>`;

document.querySelectorAll('.controls label span').forEach(s => {
const map = {'Credit cards':'lblCards','US SSN':'lblSSN','Phone numbers':'lblPhone','CVV codes':'lblCVV','Email addresses':'lblEmail'};
const k = s.textContent; const key = map[k]; if (key) s.id = key;
});
document.querySelectorAll('.gz-split label').forEach((l,i)=>{ l.id = i===0?'lbl-in':'lbl-out'; });
$('#lbl-in').textContent = t('input') || 'Input';
$('#lbl-out').textContent = t('output') || 'Masked output';

mask();

GZ.renderToolPage({
category:'text',
titleKey:'toolTitle',
descKey:'toolDesc',
howToSteps:['step1','step2','step3','step4'],
related:[
{icon:'📧', href:'/text/email-extractor.html', name:'Email Extractor'},
{icon:'🔍', href:'/text/find-replace.html', name:'Find & Replace'},
{icon:'🆔', href:'/text/credit-card-extractor.html', name:'Card Extractor'},
{icon:'🧹', href:'/text/remove-duplicates.html', name:'Remove Duplicates'}
]
});
</script>
