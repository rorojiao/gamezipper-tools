<script>
GZI18n.register({
  en: {
    toolTitle: 'Free Magazine Cover Maker',
    toolDesc: 'Design a professional-looking magazine cover online for free. Add a masthead, issue line, main cover headline, side cover lines and your own photo. Pick from five editorial themes and download a print-ready 8.5×11 PNG — perfect for gag gifts, party invites, school projects and mockups. No signup, no watermark, runs entirely in your browser.',
    download: 'Download PNG',
    lblMasthead: 'Magazine Name (Masthead)', lblIssue: 'Issue Line',
    lblPrice: 'Price Line', lblHeadline: 'Main Cover Headline',
    lblLines: 'Cover Lines (one per line)', lblTheme: 'Cover Theme',
    lblAlign: 'Cover-Line Placement', lblPhoto: 'Cover Photo',
    step1: 'Type your magazine name (masthead) and issue line',
    step2: 'Add a big main headline and a few teaser cover lines',
    step3: 'Upload your cover photo and pick a theme color',
    step4: 'Click Download PNG to save your magazine cover',
  },
  zh: {
    toolTitle: '杂志封面制作工具',
    toolDesc: '免费在线设计专业感十足的杂志封面。添加刊名（masthead）、期号、主标题、侧边小标题和你自己的照片。5 种编辑风格主题可选，下载可打印的 8.5×11 PNG — 适用于恶搞礼物、派对邀请、学校作业和样片。无注册、无水印，完全浏览器本地运行。',
    download: '下载 PNG',
    lblMasthead: '杂志名（刊头）', lblIssue: '期号',
    lblPrice: '价格', lblHeadline: '主封面标题',
    lblLines: '侧边标题（每行一条）', lblTheme: '封面主题',
    lblAlign: '侧边标题位置', lblPhoto: '封面照片',
    step1: '输入杂志名（刊头）和期号',
    step2: '添加大号主标题和几条侧边小标题',
    step3: '上传封面照片，选择主题颜色',
    step4: '点击「下载 PNG」保存你的杂志封面',
  }
});

const { $, t } = GZ;

const THEMES = [
  { accent:'#e10600', headline:'#ffffff', line:'#ffffff', overlay:'rgba(0,0,0,0.25)', priceBg:'#e10600' },
  { accent:'#ffffff', headline:'#ffffff', line:'#ffffff', overlay:'rgba(0,0,0,0.45)', priceBg:'#ffffff', priceText:'#000' },
  { accent:'#ff6fa5', headline:'#ffffff', line:'#ffffff', overlay:'rgba(0,0,0,0.15)', priceBg:'#ff6fa5' },
  { accent:'#ffd400', headline:'#ffffff', line:'#ffffff', overlay:'rgba(0,0,0,0.3)', priceBg:'#ffd400', priceText:'#000' },
  { accent:'#2a9d8f', headline:'#ffffff', line:'#ffffff', overlay:'rgba(0,0,0,0.25)', priceBg:'#2a9d8f' },
];

let photoImg = null;

function render(){
  const c=$('#canvas'),ctx=c.getContext('2d');
  c.width=1050;c.height=1350;
  const W=c.width,H=c.height;
  const th=THEMES[+$('#coverTheme').value];

  // background photo or gradient
  if(photoImg){
    const ir=photoImg.width/photoImg.height, cr=W/H;
    let dw,dh,dx,dy;
    if(ir>cr){ dh=H; dw=H*ir; dx=(W-dw)/2; dy=0; }
    else { dw=W; dh=W/ir; dx=0; dy=(H-dh)/2; }
    ctx.drawImage(photoImg,dx,dy,dw,dh);
    ctx.fillStyle=th.overlay; ctx.fillRect(0,0,W,H);
  } else {
    const g=ctx.createLinearGradient(0,0,W,H);
    g.addColorStop(0,'#1a1a2e'); g.addColorStop(1,'#16213e');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  }

  // price tag (top-left)
  const price=$('#price').value;
  ctx.font='700 24px Verdana, sans-serif';
  const pw=ctx.measureText(price).width+30;
  ctx.fillStyle=th.priceBg;
  ctx.fillRect(30,30,pw,40);
  ctx.fillStyle=th.priceText||'#fff';
  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(price,45,51);
  // issue line top-right
  ctx.fillStyle='#fff'; ctx.font='700 22px Verdana, sans-serif';
  ctx.textAlign='right';
  ctx.fillText($('#issue').value, W-30, 51);

  // masthead
  const masthead=$('#masthead').value||'MAGAZINE';
  ctx.textAlign='center'; ctx.textBaseline='top';
  let mfs=180;
  ctx.font=`900 ${mfs}px Georgia, serif`;
  while(ctx.measureText(masthead).width>W-80 && mfs>40){mfs-=4;ctx.font=`900 ${mfs}px Georgia, serif`}
  // dark band behind masthead for legibility
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.fillRect(0,90,W,mfs+50);
  ctx.fillStyle=th.accent;
  ctx.fillText(masthead, W/2, 100);

  // main headline lower-center
  const headline=$('#headline').value;
  ctx.fillStyle=th.headline;
  ctx.font='900 92px Arial Black, sans-serif';
  const hl=wrap(ctx,headline,W-120,92);
  let hy=H-380 - (hl.length-1)*92;
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=18; ctx.shadowOffsetY=6;
  hl.forEach((ln,i)=>ctx.fillText(ln,W/2,hy+i*100));
  ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetY=0;

  // cover lines on sides
  const lines=$('#coverLines').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const placement=$('#lineAlign').value;
  ctx.font='700 30px Georgia, serif';
  ctx.textBaseline='top';
  ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=8; ctx.shadowOffsetY=2;
  let leftY=380, rightY=380;
  const padX=40;
  lines.forEach((ln,i)=>{
    const onRight = placement==='right' ? true : placement==='left' ? false : (i%2===1);
    if(onRight){
      ctx.textAlign='right'; ctx.fillStyle=th.line;
      const w=wrap(ctx,ln,(W-100)/2-30,30);
      w.forEach((s,j)=>{ ctx.fillText(s,W-padX,rightY+j*36); });
      rightY+=w.length*36+18;
    } else {
      ctx.textAlign='left'; ctx.fillStyle=th.line;
      const w=wrap(ctx,ln,(W-100)/2-30,30);
      w.forEach((s,j)=>{ ctx.fillText(s,padX,leftY+j*36); });
      leftY+=w.length*36+18;
    }
  });
  ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetY=0;

  // bottom bar
  ctx.fillStyle='rgba(0,0,0,0.55)';
  ctx.fillRect(0,H-70,W,70);
  ctx.fillStyle='#fff'; ctx.font='600 22px Verdana, sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('tools.gamezipper.com  ·  Made with the free Magazine Cover Maker', W/2, H-35);
}

function wrap(ctx,text,maxW,fs){
  ctx.font='900 '+fs+'px Arial Black, sans-serif';
  const words=text.split(' ');let line='';const lines=[];
  for(const w of words){const test=line?line+' '+w:w;if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=w}else line=test}
  if(line)lines.push(line);
  return lines;
}

function downloadPNG(){
  const link=document.createElement('a');
  const name=($('#masthead').value||'magazine').replace(/[^a-zA-Z0-9]/g,'_').toLowerCase()||'magazine';
  link.download=name+'-cover.png';
  link.href=$('#canvas').toDataURL('image/png');
  link.click();
}

function handlePhoto(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{ photoImg=img; render(); };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

$('#lbl-masthead').textContent=t('lblMasthead');
$('#lbl-issue').textContent=t('lblIssue');
$('#lbl-price').textContent=t('lblPrice');
$('#lbl-headline').textContent=t('lblHeadline');
$('#lbl-lines').textContent=t('lblLines');
$('#lbl-theme').textContent=t('lblTheme');
$('#lbl-align').textContent=t('lblAlign');
$('#lbl-photo').textContent=t('lblPhoto');

['masthead','issue','price','headline','coverLines'].forEach(id=>$('#'+id).addEventListener('input',render));
['coverTheme','lineAlign'].forEach(id=>$('#'+id).addEventListener('change',render));
$('#photo').addEventListener('change',handlePhoto);

render();

$('#toolbar').innerHTML=`
  <button class="gz-btn" onclick="downloadPNG()">⬇️ ${t('download')}</button>`;

GZ.renderToolPage({
  category: 'image',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🖼️', href:'/image/poster-maker.html', name:'Poster Maker'},
    {icon:'📢', href:'/image/banner-maker.html', name:'Banner Maker'},
    {icon:'🎫', href:'/image/flyer-maker.html', name:'Flyer Maker'},
    {icon:'💌', href:'/image/invitation-maker.html', name:'Invitation Maker'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
