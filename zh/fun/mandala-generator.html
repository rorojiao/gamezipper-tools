<script>
GZI18n.register({
  en: {
    toolTitle: 'Mandala Generator',
    toolDesc: 'Create intricate symmetric mandala art with adjustable petals, layers and colors — download as PNG.',
    sym: 'Symmetry',
    layers: 'Layers',
    shape: 'Shape',
    c1: 'Color 1',
    c2: 'Color 2',
    bg: 'Background',
    outline: 'Outline only (coloring page)',
    redraw: 'Redraw',
    randomize: 'Random',
    download: 'Download PNG',
    step1: 'Set the symmetry (number of repeated petals around the center)',
    step2: 'Add layers and choose a shape style',
    step3: 'Pick two colors and a background, or enable outline-only',
    step4: 'Click Download PNG to save your mandala',
  },
  zh: {
    toolTitle: '曼陀罗生成器',
    toolDesc: '生成对称繁复的曼陀罗艺术 — 自定义花瓣数、层数和配色，可下载为 PNG。',
    sym: '对称数',
    layers: '层数',
    shape: '形状',
    c1: '颜色 1',
    c2: '颜色 2',
    bg: '背景色',
    outline: '仅描边（涂色页）',
    redraw: '重绘',
    randomize: '随机',
    download: '下载 PNG',
    step1: '设置对称数（围绕中心重复的花瓣数）',
    step2: '添加层数并选择形状样式',
    step3: '选择两个颜色和背景，或启用「仅描边」',
    step4: '点击「下载 PNG」保存曼陀罗',
  }
});

const { $, t } = GZ;
['sym','layers','shape','c1','c2','bg','outline'].forEach(k => $('#lbl-'+k).textContent = t(k));

const cv = $('#mandala'), ctx = cv.getContext('2d');
function hexToRgb(h){ const n=parseInt(h.slice(1),16); return [n>>16&255,n>>8&255,n&255]; }
function lerp(a,b,t){ return a+(b-a)*t; }
function mixHex(a,b,t){ const A=hexToRgb(a),B=hexToRgb(b); return `rgb(${Math.round(lerp(A[0],B[0],t))},${Math.round(lerp(A[1],B[1],t))},${Math.round(lerp(A[2],B[2],t))})`; }

function drawShape(shape, size, fill, stroke, lineW){
  ctx.fillStyle = fill;
  ctx.strokeStyle = stroke;
  ctx.lineWidth = lineW;
  ctx.beginPath();
  switch(shape){
    case 'petal':
      ctx.moveTo(0,0);
      ctx.quadraticCurveTo(size*0.55, -size*0.5, 0, -size);
      ctx.quadraticCurveTo(-size*0.55, -size*0.5, 0, 0);
      break;
    case 'circle':
      ctx.arc(0, -size*0.6, size*0.4, 0, Math.PI*2);
      break;
    case 'diamond':
      ctx.moveTo(0,0); ctx.lineTo(size*0.4,-size*0.5); ctx.lineTo(0,-size); ctx.lineTo(-size*0.4,-size*0.5); ctx.closePath();
      break;
    case 'star':
      for(let i=0;i<10;i++){
        const r = i%2===0 ? size : size*0.45;
        const a = -Math.PI/2 + i*Math.PI/5;
        const X=Math.cos(a)*r, Y=Math.sin(a)*r;
        if(i===0) ctx.moveTo(X,Y); else ctx.lineTo(X,Y);
      }
      ctx.closePath();
      break;
    case 'leaf':
      ctx.moveTo(0,0);
      ctx.bezierCurveTo(size*0.6,-size*0.3, size*0.4,-size*0.9, 0,-size);
      ctx.bezierCurveTo(-size*0.4,-size*0.9, -size*0.6,-size*0.3, 0,0);
      break;
  }
  ctx.fill();
  ctx.stroke();
}

function draw() {
  const sym=+$('#sym').value, layers=+$('#layers').value, shape=$('#shape').value;
  const c1=$('#c1').value, c2=$('#c2').value, bg=$('#bg').value, outline=$('#outline').checked;
  $('#vsym').textContent=sym; $('#vlayers').textContent=layers;
  ctx.fillStyle=bg; ctx.fillRect(0,0,cv.width,cv.height);
  const cx=cv.width/2, cy=cv.height/2;
  const maxR = Math.min(cv.width,cv.height)/2 - 10;
  // center dot
  if(!outline){ ctx.fillStyle=mixHex(c1,c2,0.5); ctx.beginPath(); ctx.arc(cx,cy,maxR*0.06,0,Math.PI*2); ctx.fill(); }
  for(let L=1; L<=layers; L++){
    const r = maxR * (L/(layers+0.4));
    const size = maxR * 0.32 * (1 - L*0.05);
    const colorT = L/(layers+1);
    const fill = outline ? 'transparent' : mixHex(c1,c2,colorT);
    const stroke = outline ? '#222' : mixHex(c2,c1,colorT);
    const lw = outline ? 1.5 : 1.2;
    for(let s=0; s<sym; s++){
      ctx.save();
      ctx.translate(cx,cy);
      ctx.rotate(s*2*Math.PI/sym);
      ctx.translate(0, -r + size*0.5);
      drawShape(shape, size, fill, stroke, lw);
      ctx.restore();
    }
  }
  // outer ring
  ctx.strokeStyle = outline ? '#222' : mixHex(c1,c2,0.5);
  ctx.lineWidth = outline ? 2 : 1.5;
  ctx.beginPath(); ctx.arc(cx,cy,maxR,0,Math.PI*2); ctx.stroke();
}

function doDownload(){
  const a=document.createElement('a'); a.download='mandala.png'; a.href=cv.toDataURL('image/png'); a.click();
}
function hslToHex(h,s,l){
  s/=100; l/=100;
  const k=n=>(n+h/30)%12;
  const a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,9-k(n),1));
  const toHex=v=>Math.round(v*255).toString(16).padStart(2,'0');
  return '#'+toHex(f(0))+toHex(f(8))+toHex(f(4));
}
function doRandom(){
  $('#sym').value = 4 + Math.floor(Math.random()*16);
  $('#layers').value = 2 + Math.floor(Math.random()*5);
  const shapes=['petal','circle','diamond','star','leaf'];
  $('#shape').value = shapes[Math.floor(Math.random()*shapes.length)];
  const h1=Math.floor(Math.random()*360), h2=(h1+40+Math.floor(Math.random()*120))%360;
  $('#c1').value=hslToHex(h1,75,55); $('#c2').value=hslToHex(h2,75,60);
  draw();
}

['sym','layers','shape','c1','c2','bg','outline'].forEach(id => $('#'+id).addEventListener('input', draw));

$('#toolbar').innerHTML = `<button class="gz-btn" onclick="draw()">${t('redraw')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doRandom()">${t('randomize')}</button>
  <button class="gz-btn" onclick="doDownload()">${t('download')}</button>`;
draw();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🌀', href:'/fun/spirograph.html', name:'Spirograph'},
    {icon:'🎨', href:'/image/drawing-pad.html', name:'Drawing Pad'},
    {icon:'🌈', href:'/css-tools/svg-pattern.html', name:'SVG Pattern'},
    {icon:'🫧', href:'/css-tools/svg-blob.html', name:'SVG Blob'},
  ]
});
</script>
