<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is email preheader text?","acceptedAnswer":{"@type":"Answer","text":"Preheader text (also called preview text or snippet) is the short line of copy that inbox providers display next to or below your subject line. Gmail, Outlook, Apple Mail and Yahoo pull it from the first text in your email body. A strong preheader lifts open rates significantly."}},{"@type":"Question","name":"How long should an email preheader be?","acceptedAnswer":{"@type":"Answer","text":"Aim for 40-85 characters. Gmail shows roughly 100-140 characters of combined subject + preheader, Outlook about 100, and Apple Mail around 350 on mobile. Always test the cutoff and pad with zero-width spaces so your body copy doesn't leak into the preview."}},{"@type":"Question","name":"How do I hide preheader text in the email body?","acceptedAnswer":{"@type":"Answer","text":"Wrap your preheader in a hidden div at the very top of the email HTML using display:none, max-height:0 or font-size:0, then pad with zero-width spaces so any following body text doesn't appear in the inbox preview. This tool generates the exact HTML snippet to paste into your template."}}]}</script>

<script>
GZI18n.register({

toolTitle:'Email Preheader Text Generator',
toolDesc:'Write the perfect email preheader — the preview snippet shown next to your subject line in Gmail, Outlook, Apple Mail and Yahoo. Live multi-client preview, character counters and ready-to-paste HTML. Free and private.',

},
zh:{

toolDesc:'撰写完美的邮件预览文字 — Gmail、Outlook、Apple Mail 和 Yahoo 中显示在主题旁边的预览片段。多客户端实时预览、字符计数和可直接粘贴的 HTML。免费且私密。',
lblSubject:'邮件主题',
lblPre:'预览文字（预览片段）',
lblPad:'正文隐藏填充',
padHint:'填充把真实正文挤出收件箱预览。100-400 个零宽空格对大多数模板足够。',
lblPrev:'收件箱预览',
lblCode:'要粘贴到邮件中的 HTML 片段',
tipsTitle:'💡 小贴士',
tips:'<b>长度：</b>40-85 字符最佳。<b>位置：</b>将预览文字放在邮件正文最顶部的隐藏 div 中。<b>填充：</b>若预览文字较短，添加零宽空格以避免正文首行泄漏到预览。<b>Emoji：</b>预览中加入一个 emoji 可提升打开率，但请跨客户端测试。<b>避免：</b>不要与主题逐字重复 — 用预览文字增加第二个钩子。',
step1:'撰写邮件主题。',
step2:'撰写一段与主题互补的 40-85 字符预览文字。',
step3:'实时查看 Gmail、Outlook 和 Apple Mail 的预览效果。',
step4:'复制 HTML 片段，粘贴到邮件模板正文的最顶部。',
}
});

const { $, copyText, t } = GZ;

const ZWSP = '\u200B'; // zero-width space

function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escAttr(s){return esc(s).replace(/"/g,'&quot;');}

function updateCount(id, val, ideal, hard){
  const n = (val||'').length;
  const el = $(id);
  el.textContent = n;
  el.parentElement.classList.remove('warn','bad');
  if(n > hard) el.parentElement.classList.add('bad');
  else if(n > ideal) el.parentElement.classList.add('warn');
}

function update(){
  const subj = $('#f-subject').value;
  const pre  = $('#f-pre').value;
  const pad  = parseInt($('#f-pad').value) || 0;

  updateCount('cnt-subj', subj, 60, 85);
  updateCount('cnt-pre',  pre, 85, 140);

  // ---- Previews ----
  // Gmail shows ~140 chars of "subject + preheader" combined
  const gmailBudget = 140 - subj.length;
  const gmailPre = gmailBudget > 0 ? pre.substr(0, Math.max(0, gmailBudget)) : '';
  $('#p-subj').textContent = subj;
  $('#p-pre').textContent  = gmailPre ? '  —  ' + gmailPre : '';

  // Outlook: 2-line preview, ~100 chars of body
  $('#p-subj2').textContent = subj;
  $('#p-pre2').textContent  = pre ? pre.substr(0, 100) : '';

  // Apple Mail: up to ~350 chars
  $('#p-subj3').textContent = subj;
  $('#p-pre3').textContent  = pre ? pre.substr(0, 350) : '';

  // ---- HTML snippet ----
  const padding = ZWSP.repeat(pad);
  const snippet =
'<!-- Preheader: hide visually but keep for inbox preview -->\n'+
'<div style="display:none;max-height:0;overflow:hidden;opacity:0;mso-hide:all;font-size:1px;line-height:1px;color:#ffffff">\n'+
'  '+esc(pre)+(padding ? ' '+padding : '')+'\n'+
'</div>\n'+
'<!-- Set this div back to visible on the next line -->\n'+
'<div style="display:none;max-height:0;overflow:hidden">\n'+
'  '+padding+'\n'+
'</div>';
  $('#code').textContent = snippet;

  // tips
  $('#tips').innerHTML = '<b>'+t('tipsTitle')+'</b> &nbsp;'+t('tips');
}

function doCopy(){ copyText($('#code').textContent); }

function loadExample(){
  $('#f-subject').value = 'Your May invoice is ready 💸';
  $('#f-pre').value = 'Pay in one click, schedule auto-pay, or download a PDF — all from your dashboard.';
  $('#f-pad').value = '100';
  update();
}

$('#lbl-subject').textContent = t('lblSubject');
$('#lbl-pre').textContent = t('lblPre');
$('#lbl-pad').textContent = t('lblPad');
$('#pad-hint').textContent = t('padHint');
$('#lbl-prev').textContent = t('lblPrev');
$('#lbl-code').textContent = t('lblCode');
$('#p-tag-gmail').textContent = 'Gmail · ~140 chars combined';
$('#p-tag-outlook').textContent = 'Outlook · 2-line preview';
$('#p-tag-apple').textContent = 'Apple Mail · up to ~350 chars';

$('#toolbar').innerHTML =
  '<button class="gz-btn gz-btn-secondary" onclick="loadExample()">✨ '+t('example')+'</button>'+
  '<button class="gz-btn" onclick="doCopy()">📋 '+t('copy')+'</button>';

update();

  ]
});
