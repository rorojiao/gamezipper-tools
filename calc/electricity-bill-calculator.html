<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="ec-input-group">
      <div><label id="lbl-rate"></label><input type="number" id="rate" value="0.16" step="0.01" min="0"></div>
      <div><label id="lbl-days"></label><input type="number" id="days" value="30" min="1" max="31"></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span class="ec-row-label" id="lbl-appliances"></span>
      <button class="gz-btn gz-btn-secondary" style="font-size:.78rem;padding:4px 12px" onclick="addAppliance()">+ Add</button>
    </div>
    <div class="ec-appliance-row" style="margin-bottom:4px">
      <span class="ec-row-label" id="hdr-name"></span>
      <span class="ec-row-label" id="hdr-watt"></span>
      <span class="ec-row-label" id="hdr-hours"></span>
      <span class="ec-row-label" id="hdr-qty"></span>
      <span></span>
    </div>
    <div id="applianceList"></div>
    <div class="ec-summary" id="summary"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Electricity Bill Calculator',
    toolDesc: 'Estimate your electricity bill from appliance wattage and daily usage. Find energy hogs, compare kWh rates and project monthly and yearly costs.',
    rate: 'Rate per kWh ($)',
    days: 'Days per month',
    appliances: 'Appliances',
    hdrName: 'Appliance',
    hdrWatt: 'Watts',
    hdrHours: 'Hours/day',
    hdrQty: 'Qty',
    monthly: 'Monthly Cost',
    yearly: 'Yearly Cost',
    totalKwh: 'Total kWh/mo',
    dailyKwh: 'Daily kWh',
    clear: 'Clear',
    step1: 'Enter your electricity rate per kWh from your bill',
    step2: 'Add each appliance with its wattage and daily hours',
    step3: 'Set quantity if you have multiple identical units',
    step4: 'See monthly and yearly cost instantly — find your energy hogs',
  },
  zh: {
    toolTitle: '电费计算器',
    toolDesc: '根据电器功率和每日使用时长估算电费。找出耗电大户，对比电价，预测每月和每年的电费支出。',
    rate: '每度电费（元）',
    days: '每月天数',
    appliances: '电器列表',
    hdrName: '电器',
    hdrWatt: '功率(W)',
    hdrHours: '小时/天',
    hdrQty: '数量',
    monthly: '月度电费',
    yearly: '年度电费',
    totalKwh: '每月度数',
    dailyKwh: '每日度数',
    clear: '清空',
    step1: '输入你电费账单上的每度电价',
    step2: '添加每个电器的功率和每日使用时长',
    step3: '如有多个相同电器，设置数量',
    step4: '即时查看每月和每年电费 — 找出耗电大户',
  }
});

const { $, t } = GZ;
const appliancePresets = [
  { name: 'LED Light', watt: 10, hours: 5, qty: 1 },
  { name: 'Refrigerator', watt: 150, hours: 24, qty: 1 },
  { name: 'Air Conditioner', watt: 1200, hours: 6, qty: 1 },
  { name: 'TV (LED)', watt: 100, hours: 4, qty: 1 },
  { name: 'Washing Machine', watt: 500, hours: 1, qty: 1 },
  { name: 'Water Heater', watt: 4000, hours: 2, qty: 1 },
  { name: 'Microwave', watt: 1000, hours: 0.5, qty: 1 },
  { name: 'Computer', watt: 200, hours: 8, qty: 1 },
];

let appliances = [
  { name: 'Air Conditioner', watt: 1200, hours: 6, qty: 1 },
  { name: 'Refrigerator', watt: 150, hours: 24, qty: 1 },
  { name: 'LED Light', watt: 10, hours: 5, qty: 5 },
];

function renderAppliances() {
  $('#applianceList').innerHTML = appliances.map((a, i) =>
    `<div class="ec-appliance-row">
      <input type="text" list="appliance-presets" value="${a.name}" oninput="appliances[${i}].name=this.value;calc()" placeholder="Appliance">
      <input type="number" value="${a.watt}" oninput="appliances[${i}].watt=+this.value||0;calc()" min="0">
      <input type="number" value="${a.hours}" oninput="appliances[${i}].hours=+this.value||0;calc()" min="0" max="24" step="0.5">
      <input type="number" value="${a.qty}" oninput="appliances[${i}].qty=+this.value||1;calc()" min="1" max="50">
      <button onclick="appliances.splice(${i},1);renderAppliances();calc()">✕</button>
    </div>`
  ).join('');
}

function calc() {
  const rate = +$('#rate').value || 0;
  const days = +$('#days').value || 30;
  let dailyKwh = 0;
  appliances.forEach(a => {
    dailyKwh += (a.watt * a.hours * a.qty) / 1000;
  });
  const monthlyKwh = dailyKwh * days;
  const monthlyCost = monthlyKwh * rate;
  const yearlyCost = monthlyCost * 12;

  const fmt = n => '$' + n.toFixed(2);
  $('#summary').innerHTML = `
    <div class="ec-card"><div class="val">${fmt(monthlyCost)}</div><div class="lbl">${t('monthly')}</div></div>
    <div class="ec-card"><div class="val">${fmt(yearlyCost)}</div><div class="lbl">${t('yearly')}</div></div>
    <div class="ec-card"><div class="val">${monthlyKwh.toFixed(0)}</div><div class="lbl">${t('totalKwh')}</div></div>
    <div class="ec-card"><div class="val">${dailyKwh.toFixed(2)}</div><div class="lbl">${t('dailyKwh')}</div></div>
  `;
}

function addAppliance() {
  appliances.push({ name: '', watt: 0, hours: 0, qty: 1 });
  renderAppliances();
  calc();
}

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="appliances=[{name:'',watt:0,hours:0,qty:1}];renderAppliances();calc()">${t('clear')}</button>`;

$('#rate').oninput = calc;
$('#days').oninput = calc;

$('#lbl-rate').textContent = t('rate');
$('#lbl-days').textContent = t('days');
$('#lbl-appliances').textContent = t('appliances');
$('#hdr-name').textContent = t('hdrName');
$('#hdr-watt').textContent = t('hdrWatt');
$('#hdr-hours').textContent = t('hdrHours');
$('#hdr-qty').textContent = t('hdrQty');

// Build datalist for appliance suggestions
const dl = document.createElement('datalist');
dl.id = 'appliance-presets';
dl.innerHTML = appliancePresets.map(a => `<option value="${a.name}">`).join('');
document.body.appendChild(dl);

renderAppliances();
calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💧', href:'/calc/water-bill-calculator.html', name:'Water Bill'},
    {icon:'📺', href:'/calc/streaming-cost-calculator.html', name:'Streaming Cost'},
    {icon:'⚡', href:'/calc/ev-charging-cost-calculator.html', name:'EV Charging'},
    {icon:'🔋', href:'/calc/battery-life-calculator.html', name:'Battery Life'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
</html>
