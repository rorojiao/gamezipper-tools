<div class="gz-container">
  <div class="gz-tool-header">

    <p class="desc" id="desc"></p>
  </div>

<script>
GZI18n.register({
  en: {
    toolTitle:'Protein Intake Calculator',
    toolDesc:'Calculate your ideal daily protein intake based on weight, activity level and fitness goal — with food source suggestions.',
    weight:'Body Weight',
    weightUnit:'Unit',
    kg:'kg',
    lb:'lb',
    activity:'Activity Level',
    sedentary:'Sedentary (little or no exercise)',
    light:'Light (1-3 days/week)',
    moderate:'Moderate (3-5 days/week)',
    active:'Active (6-7 days/week)',
    veryActive:'Very Active (2x/day or intense)',
    goal:'Fitness Goal',
    maintain:'Maintain Weight',
    loseFat:'Lose Fat',
    buildMuscle:'Build Muscle',
    endurance:'Endurance Athlete',
    calculate:'Calculate',
    dailyProtein:'Your Daily Protein Target',
    perKg:'grams per kg body weight',
    range:'Recommended range',
    perMeal:'per meal (4 meals)',
    foodSources:'High-Protein Food Sources',
    food:'Food (100g)',
    protein:'Protein (g)',
    servings:'Servings needed',
    chicken:'Chicken breast',
    eggs:'Eggs (whole)',
    greekYogurt:'Greek yogurt',
    salmon:'Salmon',
    tofu:'Tofu (firm)',
    lentils:'Lentils (cooked)',
    almonds:'Almonds',
    cottage:'Cottage cheese',
    step1:'Enter your body weight and select metric or imperial',
    step2:'Choose your activity level and fitness goal',
    step3:'Click Calculate to see your daily protein target',
    step4:'Use the food table to plan your protein sources',
  },
  zh: {
    toolTitle:'蛋白质摄入量计算器',
    toolDesc:'根据体重、活动水平和健身目标计算每日理想蛋白质摄入量，附带高蛋白食物来源建议。',
    weight:'体重',
    weightUnit:'单位',
    kg:'公斤',
    lb:'磅',
    activity:'活动水平',
    sedentary:'久坐（很少或无运动）',
    light:'轻度（每周 1-3 天）',
    moderate:'中度（每周 3-5 天）',
    active:'活跃（每周 6-7 天）',
    veryActive:'非常活跃（每天 2 次或高强度）',
    goal:'健身目标',
    maintain:'维持体重',
    loseFat:'减脂',
    buildMuscle:'增肌',
    endurance:'耐力运动员',
    calculate:'计算',
    dailyProtein:'每日蛋白质目标',
    perKg:'克每公斤体重',
    range:'推荐范围',
    perMeal:'每餐（4 餐）',
    foodSources:'高蛋白食物来源',
    food:'食物（100克）',
    protein:'蛋白质（克）',
    servings:'所需份数',
    chicken:'鸡胸肉',
    eggs:'鸡蛋（全蛋）',
    greekYogurt:'希腊酸奶',
    salmon:'三文鱼',
    tofu:'豆腐（硬）',
    lentils:'扁豆（煮熟）',
    almonds:'杏仁',
    cottage:'农家干酪',
    step1:'输入体重并选择公制或英制',
    step2:'选择活动水平和健身目标',
    step3:'点击计算查看每日蛋白质目标',
    step4:'参考食物表规划蛋白质来源',
  }
});

const { $, t } = GZ;

const foods = [
  { name: 'chicken', protein: 31 },
  { name: 'eggs', protein: 13 },
  { name: 'greekYogurt', protein: 10 },
  { name: 'salmon', protein: 25 },
  { name: 'tofu', protein: 17 },
  { name: 'lentils', protein: 9 },
  { name: 'almonds', protein: 21 },
  { name: 'cottage', protein: 11 },
];

function getProteinPerKg(activity, goal) {
  const base = { sedentary: 0.8, light: 1.0, moderate: 1.2, active: 1.5, veryActive: 1.8 };
  const mult = { maintain: 1.0, loseFat: 1.2, buildMuscle: 1.6, endurance: 1.4 };
  const b = base[activity] || 1.0;
  const m = mult[goal] || 1.0;
  const center = b * m;
  return { min: Math.round((center - 0.2) * 10) / 10, center: Math.round(center * 10) / 10, max: Math.round((center + 0.3) * 10) / 10 };
}

$('#form').innerHTML = `
  <div class="row">
    <div><label>${t('weight')}</label><input type="number" id="weight" value="70" min="20" max="300" step="0.1"></div>
    <div><label>${t('weightUnit')}</label><select id="unit"><option value="kg">${t('kg')}</option><option value="lb">${t('lb')}</option></select></div>
  </div>
  <div><label>${t('activity')}</label><select id="activity">
    <option value="sedentary">${t('sedentary')}</option>
    <option value="light">${t('light')}</option>
    <option value="moderate" selected>${t('moderate')}</option>
    <option value="active">${t('active')}</option>
    <option value="veryActive">${t('veryActive')}</option>
  </select></div>
  <div><label>${t('goal')}</label><select id="goal">
    <option value="maintain">${t('maintain')}</option>
    <option value="loseFat">${t('loseFat')}</option>
    <option value="buildMuscle" selected>${t('buildMuscle')}</option>
    <option value="endurance">${t('endurance')}</option>
  </select></div>
  <button class="gz-btn" onclick="calculate()">${t('calculate')}</button>
`;

function calculate() {
  let weight = parseFloat($('#weight').value);
  const unit = $('#unit').value;
  const activity = $('#activity').value;
  const goal = $('#goal').value;
  if (!weight || weight <= 0) return;
  if (unit === 'lb') weight = weight / 2.205;
  const ppkg = getProteinPerKg(activity, goal);
  const proteinMin = Math.round(weight * ppkg.min);
  const proteinCenter = Math.round(weight * ppkg.center);
  const proteinMax = Math.round(weight * ppkg.max);

  $('#results').innerHTML = `
    <div class="result-card">
      <div class="big">${proteinCenter}g</div>
      <div class="unit">${t('dailyProtein')}</div>
      <div style="margin-top:8px;font-size:.9em;color:var(--text2)">${t('range')}: ${proteinMin}g – ${proteinMax}g (${ppkg.min}–${ppkg.max} ${t('perKg')})</div>
      <div class="bar-group">
        <span class="bar">${t('perMeal')}: ~${Math.round(proteinCenter/4)}g</span>
      </div>
    </div>
    <h3 style="margin-top:20px">${t('foodSources')}</h3>
    <table class="food-table">
      <tr><th>${t('food')}</th><th>${t('protein')}</th><th>${t('servings')}</th></tr>
      ${foods.map(f => `<tr><td>${t(f.name)}</td><td>${f.protein}g</td><td>~${Math.round(proteinCenter/f.protein*10)/10} × 100g</td></tr>`).join('')}
    </table>
  `;
}

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🔥', href:'/calc/calorie-calculator.html', name:'Calorie Calculator'},
    {icon:'💪', href:'/calc/macro-calculator.html', name:'Macro Calculator'},
    {icon:'💪', href:'/calc/tdee-calculator.html', name:'TDEE Calculator'},
    {icon:'💧', href:'/calc/water-intake.html', name:'Water Intake'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
