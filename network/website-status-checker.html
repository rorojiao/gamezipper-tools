<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="ws-input-row">
      <input type="text" id="url" placeholder="https://example.com" spellcheck="false">
      <button class="gz-btn" onclick="doCheck()" id="btn-check"></button>
    </div>
    <div id="output"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Website Status Checker',
    toolDesc: 'Check if any website is up or down. Test reachability, response time, and connection status — free, instant, runs in your browser.',
    btnCheck: 'Check Status',
    statusUp: 'Website is Up',
    statusDown: 'Website is Down',
    checking: 'Checking...',
    enterUrl: 'Please enter a website URL.',
    responseTime: 'Response Time',
    reachable: 'Reachable',
    protocol: 'Protocol',
    checked: 'Checked',
    ms: 'ms',
    yes: 'Yes',
    no: 'No',
    unknown: 'Unknown',
    fast: 'Fast',
    medium: 'Medium',
    slow: 'Slow',
    step1: 'Enter a website URL (e.g. https://example.com)',
    step2: 'Click Check Status to test the website',
    step3: 'View the up/down status and response time',
    step4: 'Use response time to gauge site performance',
  },
  zh: {
    toolTitle: '网站状态检测',
    toolDesc: '检测任意网站是否在线。测试可达性、响应时间和连接状态 — 免费、即时、浏览器本地运行。',
    btnCheck: '检测状态',
    statusUp: '网站在线',
    statusDown: '网站无法访问',
    checking: '检测中...',
    enterUrl: '请输入网站网址。',
    responseTime: '响应时间',
    reachable: '可达',
    protocol: '协议',
    checked: '检测时间',
    ms: '毫秒',
    yes: '是',
    no: '否',
    unknown: '未知',
    fast: '快',
    medium: '一般',
    slow: '慢',
    step1: '输入网站网址（如 https://example.com）',
    step2: '点击「检测状态」测试网站',
    step3: '查看在线/离线状态和响应时间',
    step4: '根据响应时间评估网站性能',
  }
});

const { $, t } = GZ;

function speedLabel(ms) {
  if (ms < 200) return t('fast');
  if (ms < 800) return t('medium');
  return t('slow');
}

async function doCheck() {
  let url = $('#url').value.trim();
  if (!url) { $('#output').innerHTML = `<div class="ws-loading">${t('enterUrl')}</div>`; return; }
  if (!/^https?:\/\//.test(url)) url = 'https://' + url;

  const output = $('#output');
  output.innerHTML = `<div class="ws-card"><div class="ws-status-big"><div class="ws-dot ws-checking"></div><div class="ws-status-text">${t('checking')}</div></div></div>`;

  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 10000);
  const cacheBust = url + (url.includes('?') ? '&' : '?') + '_ws=' + Date.now();
  const start = performance.now();
  let isUp = false;
  let latency = 0;
  let errorMsg = '';

  try {
    await fetch(cacheBust, { mode: 'no-cors', signal: ctrl.signal, cache: 'no-store' });
    clearTimeout(timer);
    latency = performance.now() - start;
    isUp = true;
  } catch (e) {
    clearTimeout(timer);
    latency = performance.now() - start;
    if (e.name === 'AbortError') {
      errorMsg = 'Timeout';
    }
    // In no-cors mode, even CORS-blocked requests resolve; error usually means unreachable
    isUp = false;
  }

  const proto = url.startsWith('https') ? 'HTTPS' : 'HTTP';
  const now = new Date().toLocaleTimeString();

  let html = `<div class="ws-card">
    <div class="ws-status-big">
      <div class="ws-dot ${isUp ? 'ws-up' : 'ws-down'}"></div>
      <div class="ws-status-text ${isUp ? 'up' : 'down'}">${isUp ? '✓ ' + t('statusUp') : '✗ ' + t('statusDown')}</div>
    </div>
    <div class="ws-grid">
      <div class="ws-metric"><div class="val">${isUp ? latency.toFixed(0) + ' ' + t('ms') : '—'}</div><div class="lbl">${t('responseTime')}</div></div>
      <div class="ws-metric"><div class="val">${isUp ? speedLabel(latency) : '—'}</div><div class="lbl">Speed</div></div>
      <div class="ws-metric"><div class="val">${isUp ? t('yes') : t('no')}</div><div class="lbl">${t('reachable')}</div></div>
      <div class="ws-metric"><div class="val">${proto}</div><div class="lbl">${t('protocol')}</div></div>
      <div class="ws-metric"><div class="val">${now}</div><div class="lbl">${t('checked')}</div></div>
    </div>
  </div>`;
  output.innerHTML = html;
}

$('#url').addEventListener('keydown', e => { if (e.key === 'Enter') doCheck(); });

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⚡', href:'/network/ping-test.html', name:'Ping Test'},
    {icon:'📡', href:'/network/http-headers-checker.html', name:'HTTP Headers'},
    {icon:'🌐', href:'/network/dns-lookup.html', name:'DNS Lookup'},
    {icon:'🔌', href:'/network/port-checker.html', name:'Port Checker'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
