<script>
GZI18n.register({
  en: {
    toolTitle: 'Coming Soon Page Generator',
    toolDesc: 'Generate beautiful coming soon landing pages with countdown, email signup, social links and branding. Download as HTML.',
    step1: 'Fill in your brand name, tagline and launch date',
    step2: 'Customize colors, font and features',
    step3: 'Preview the page in real-time',
    step4: 'Download the self-contained HTML file',
  },
  zh: {
    toolTitle: '即将上线页面生成器',
    toolDesc: '生成精美的即将上线着陆页 — 倒计时、邮箱注册、社交链接和品牌定制。下载为 HTML。',
    step1: '填写品牌名称、标语和上线日期',
    step2: '自定义颜色、字体和功能',
    step3: '实时预览页面效果',
    step4: '下载自包含的 HTML 文件',
  }
});

const { $, copyText, t } = GZ;

// Set default launch date to 30 days from now
const d = new Date(); d.setDate(d.getDate() + 30);
$('#launchDate').value = d.toISOString().split('T')[0];

function genPage() {
  const brand = $('#brand').value || 'Coming Soon';
  const tag = $('#tagline').value || '';
  const desc = $('#desc2').value || '';
  const date = $('#launchDate').value || '';
  const bg = $('#bgCol').value;
  const txt = $('#txtCol').value;
  const acc = $('#accCol').value;
  const font = $('#font').value;
  const showEmail = $('#showEmail').value === 'yes';
  const socials = $('#socials').value.split(',').map(s=>s.trim()).filter(Boolean);

  const socialIcons = {
    twitter: '𝕏', github: '⌨', linkedin: 'in', facebook: 'f', instagram: '📷', youtube: '▶', tiktok: '♪'
  };
  function iconFor(url) {
    for (const [k,v] of Object.entries(socialIcons)) if (url.includes(k)) return v;
    return '→';
  }

  return `<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>${brand} — Coming Soon</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:${font};background:${bg};color:${txt};display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem}
.container{max-width:600px}.brand{font-size:2.5rem;font-weight:800;margin-bottom:.5rem;color:${acc}}.tagline{font-size:1.2rem;opacity:.85;margin-bottom:1rem}
.desc{font-size:.95rem;opacity:.7;line-height:1.6;margin-bottom:2rem}
.countdown{display:flex;gap:1rem;justify-content:center;margin-bottom:2rem}
.countdown div{background:${acc}22;border:1px solid ${acc}44;border-radius:12px;padding:1rem;min-width:70px}
.countdown .num{font-size:2rem;font-weight:700;color:${acc}}.countdown .lbl{font-size:.7rem;opacity:.6;margin-top:4px}
.form{margin-bottom:1.5rem}.form input{padding:12px 16px;border:2px solid ${acc}44;border-radius:8px;background:${acc}11;color:${txt};width:260px;font-size:.9rem}
.form button{padding:12px 24px;border:none;border-radius:8px;background:${acc};color:${bg};font-weight:700;cursor:pointer;font-size:.9rem;margin-left:8px}
.socials{display:flex;gap:12px;justify-content:center;margin-top:1rem}
.socials a{width:36px;height:36px;border-radius:50%;border:1px solid ${acc}44;display:flex;align-items:center;justify-content:center;color:${acc};text-decoration:none;font-size:.85rem;transition:background .2s}
.socials a:hover{background:${acc}22}</style><link rel="alternate" hreflang="en" href="https://tools.gamezipper.com/dev/coming-soon.html">
<link rel="alternate" hreflang="zh" href="https://tools.gamezipper.com/zh/dev/coming-soon.html">
<link rel="alternate" hreflang="x-default" href="https://tools.gamezipper.com/dev/coming-soon.html">
<script>localStorage.setItem('gz-lang','zh');</script>
</head>
<body><div class="container">
<div class="brand">${brand}</div>
<div class="tagline">${tag}</div>
<div class="desc">${desc}</div>${date?`
<div class="countdown" id="cd"><div><div class="num" id="cd-d">--</div><div class="lbl">Days</div></div><div><div class="num" id="cd-h">--</div><div class="lbl">Hours</div></div><div><div class="num" id="cd-m">--</div><div class="lbl">Min</div></div><div><div class="num" id="cd-s">--</div><div class="lbl">Sec</div></div></div>`:''}${showEmail?`
<div class="form"><input type="email" placeholder="Enter your email"><button>Notify Me</button></div>`:''}${socials.length?`
<div class="socials">${socials.map(s=>`<a href="${s}" target="_blank" rel="noopener">${iconFor(s)}</a>`).join('')}</div>`:''}
</div>${date?`
<script>!function(){const t=new Date("${date}T00:00:00").getTime();!function e(){const n=Date.now(),s=t-n;if(s<0)return document.getElementById("cd").innerHTML="<div style=\\"grid-column:1/-1;font-size:1.2rem\\">🎉 We're Live!</div>",void 0;const d=Math.floor(s/864e5),h=Math.floor(s%864e5/36e5),m=Math.floor(s%36e5/6e4),sc=Math.floor(s%6e4/1e3);document.getElementById("cd-d").textContent=d,document.getElementById("cd-h").textContent=String(h).padStart(2,"0"),document.getElementById("cd-m").textContent=String(m).padStart(2,"0"),document.getElementById("cd-s").textContent=String(sc).padStart(2,"0"),setTimeout(e,1e3)}()}()<\/script>`:''}
</body></html>`;
}

function gen() {
  const html = genPage();
  const frame = $('#preview');
  frame.srcdoc = html;
}

function downloadHTML() {
  const html = genPage();
  const blob = new Blob([html], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'coming-soon.html'; a.click();
  URL.revokeObjectURL(a.href);
}

gen();

GZ.renderToolPage({
  category: 'dev',
  titleKey: 'toolTitle',

  ]
});
</script>
