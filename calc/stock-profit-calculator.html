<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is stock profit calculated?", "acceptedAnswer": {"@type": "Answer", "text": "Profit = (Sell Price − Buy Price) × Shares − Commissions + Dividends. The return percentage is Profit ÷ Total Cost × 100."}}, {"@type": "Question", "name": "What is break-even price?", "acceptedAnswer": {"@type": "Answer", "text": "Break-even is the sell price at which you recover your full cost, including commissions. Below it you lose money; above it you profit."}}, {"@type": "Question", "name": "Does this account for capital gains tax?", "acceptedAnswer": {"@type": "Answer", "text": "No. This calculator shows pre-tax profit. Your actual net return depends on your local capital gains tax rate and holding period."}}, {"@type": "Question", "name": "Can I use this for crypto or options?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. The math is identical for any buy-and-sell asset — crypto, ETFs, options or mutual funds. Just enter buy price, sell price and quantity."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-input-group">
      <div><label id="lbl-buy"></label><input type="number" id="buy" value="50" min="0" step="0.01"></div>
      <div><label id="lbl-sell"></label><input type="number" id="sell" value="65" min="0" step="0.01"></div>
      <div><label id="lbl-shares"></label><input type="number" id="shares" value="100" min="0" step="1"></div>
      <div><label id="lbl-commission"></label><input type="number" id="commission" value="5" min="0" step="0.01"></div>
      <div><label id="lbl-dividend"></label><input type="number" id="dividend" value="0" min="0" step="0.01"></div>
      <div><label id="lbl-currency"></label><select id="currency">
        <option value="$">$ USD</option>
        <option value="₹">₹ INR</option>
        <option value="€">€ EUR</option>
        <option value="£">£ GBP</option>
        <option value="¥">¥ CNY/JPY</option>
      </select></div>
    </div>
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="gz-result-box" id="results" style="display:none">
      <div class="gz-result-grid">
        <div class="gz-result-item"><div class="value" id="res-profit"></div><div class="label" id="res-profit-label"></div></div>
        <div class="gz-result-item"><div class="value" id="res-roi"></div><div class="label" id="res-roi-label"></div></div>
        <div class="gz-result-item"><div class="value" id="res-breakeven"></div><div class="label" id="res-breakeven-label"></div></div>
        <div class="gz-result-item"><div class="value" id="res-net"></div><div class="label" id="res-net-label"></div></div>
      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Stock Profit Calculator',
    toolDesc: 'Calculate your stock trade profit, loss, ROI percentage and break-even price. Enter buy price, sell price, number of shares, commission and optional dividend — instantly see your net return.',
    buy: 'Buy Price (per share)',
    sell: 'Sell Price (per share)',
    shares: 'Number of Shares',
    commission: 'Commission / Fees (total)',
    dividend: 'Dividends Received (total)',
    currency: 'Currency',
    calculate: 'Calculate',
    clear: 'Clear',
    profit: 'Net Profit / Loss',
    roi: 'Return on Investment',
    breakeven: 'Break-even Sell Price',
    net: 'Net Sale Proceeds',
    step1: 'Enter the price you bought and sold at',
    step2: 'Set the number of shares and any commission fees',
    step3: 'Optionally add dividends received',
    step4: 'Click Calculate to see profit, ROI and break-even',
  },
  zh: {
    toolTitle: '股票盈亏计算器',
    toolDesc: '计算股票交易的盈利、亏损、ROI 收益率和保本价。输入买入价、卖出价、股数、手续费和可选股息 — 即时查看净收益。',
    buy: '买入价（每股）',
    sell: '卖出价（每股）',
    shares: '股票数量',
    commission: '手续费（总额）',
    dividend: '已收股息（总额）',
    currency: '货币',
    calculate: '计算',
    clear: '清空',
    profit: '净盈亏',
    roi: '投资回报率',
    breakeven: '保本卖出价',
    net: '净卖出所得',
    step1: '输入买入和卖出价格',
    step2: '设置股数和手续费',
    step3: '可选添加已收股息',
    step4: '点击计算查看盈亏、ROI 和保本价',
  }
});

const { $, t } = GZ;

$('#lbl-buy').textContent = t('buy');
$('#lbl-sell').textContent = t('sell');
$('#lbl-shares').textContent = t('shares');
$('#lbl-commission').textContent = t('commission');
$('#lbl-dividend').textContent = t('dividend');
$('#lbl-currency').textContent = t('currency');
$('#res-profit-label').textContent = t('profit');
$('#res-roi-label').textContent = t('roi');
$('#res-breakeven-label').textContent = t('breakeven');
$('#res-net-label').textContent = t('net');

function fmt(n) { return n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}); }

function calculate() {
  const cur = $('#currency').value;
  const buy = Math.max(0, parseFloat($('#buy').value) || 0);
  const sell = Math.max(0, parseFloat($('#sell').value) || 0);
  const shares = Math.max(0, parseFloat($('#shares').value) || 0);
  const commission = Math.max(0, parseFloat($('#commission').value) || 0);
  const dividend = Math.max(0, parseFloat($('#dividend').value) || 0);

  const totalCost = buy * shares + commission;
  const totalProceeds = sell * shares - commission + dividend;
  const profit = totalProceeds - totalCost;
  const roi = totalCost > 0 ? (profit / totalCost) * 100 : 0;
  const breakeven = shares > 0 ? (totalCost + commission) / shares : 0;

  const posClass = profit >= 0 ? 'pos' : 'neg';
  const sign = profit >= 0 ? '+' : '';
  $('#res-profit').textContent = sign + cur + fmt(profit);
  $('#res-profit').className = 'value ' + posClass;
  $('#res-roi').textContent = sign + fmt(roi) + '%';
  $('#res-roi').className = 'value ' + posClass;
  $('#res-breakeven').textContent = cur + fmt(breakeven);
  $('#res-net').textContent = cur + fmt(totalProceeds);
  $('#results').style.display = 'block';
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calculate()">${t('calculate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="document.getElementById('results').style.display='none'">${t('clear')}</button>`;

calculate();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'📈', href:'/calc/stock-return.html', name:'Stock Return'},
    {icon:'💸', href:'/calc/roi-calculator.html', name:'ROI Calculator'},
    {icon:'💵', href:'/calc/dividend-calculator.html', name:'Dividend Calc'},
    {icon:'📈', href:'/calc/sip-calculator.html', name:'SIP Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
