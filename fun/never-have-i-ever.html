<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How do you play Never Have I Ever?", "acceptedAnswer": {"@type": "Answer", "text": "Hold up five (or ten) fingers. Someone reads a prompt starting with 'Never have I ever...'. Anyone who HAS done it puts one finger down. The first person with all fingers down loses — or wins, depending on your group!"}}, {"@type": "Question", "name": "What are the difficulty levels?", "acceptedAnswer": {"@type": "Answer", "text": "Easy prompts are family-friendly icebreakers. Medium prompts are fun for friends and gatherings. Spicy prompts are more personal and bold — best for adults who are comfortable with each other."}}, {"@type": "Question", "name": "How do the finger counters work?", "acceptedAnswer": {"@type": "Answer", "text": "Below each prompt are five emoji fingers. Tap each one as you put a finger down to track your score live. Reset them with the button anytime a new round starts."}}, {"@type": "Question", "name": "Is Never Have I Ever free?", "acceptedAnswer": {"@type": "Answer", "text": "Completely free, no signup, no download. The tool runs entirely in your browser and no data is ever sent to a server."}}]}</script>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Never Have I Ever',
    toolDesc: '300+ fun and revealing prompts for the classic party game. Tap to reveal a new one, track your fingers, and find out who has done what. Free, no signup.',
    easy: '😊 Easy',
    medium: '😎 Medium',
    spicy: '🌶️ Spicy',
    nextBtn: '➡️ Next Prompt',
    resetBtn: '✋ Reset Fingers',
    copyBtn: '📋 Copy',
    fingersLeft: 'fingers left',
    tapHint: '👆 Tap the card for a new prompt · Tap fingers to count down',
    step1: 'Hold up five fingers to start',
    step2: 'Read the prompt aloud — everyone who HAS done it puts a finger down',
    step3: 'Tap a finger emoji below to track your own count',
    step4: 'Click Next for another prompt — first with no fingers left is out',
  },
  zh: {
    toolTitle: '我从没做过',
    toolDesc: '300+ 个经典派对游戏的有趣题目。点击出新题，追踪你的手指，看看大家做过什么。免费无需注册。',
    easy: '😊 简单',
    medium: '😎 中等',
    spicy: '🌶️ 刺激',
    nextBtn: '➡️ 下一题',
    resetBtn: '✋ 重置手指',
    copyBtn: '📋 复制',
    fingersLeft: '根手指剩余',
    tapHint: '👆 点击卡片换题 · 点击手指倒计时',
    step1: '举起五根手指开始',
    step2: '大声读出题目 — 做过的人放下一根手指',
    step3: '点击下方手指表情来计数',
    step4: '点击下一题 — 第一个没有手指的人出局',
  }
});

const PROMPTS = {
  easy:[
    '...gone camping.','...owned a pet.','...ridden a horse.','...baked a cake from scratch.',
    '...sang karaoke in public.','...ridden a motorcycle.','...climbed a tree as an adult.',
    '...gone fishing.','...broken a bone.','...ridden a roller coaster.',
    '...eaten sushi.','...traveled by train.','...stayed up for 24 hours straight.',
    '...built a sandcastle.','...caught a fish.','...ridden a bicycle downhill fast.',
    '...won a contest.','...planted a tree.','...swum in the ocean.',
    '...collected something as a hobby.','...been to a live concert.','...flown in a helicopter.',
  ],
  medium:[
    '...sent a text to the wrong person.','...pretended to be sick to skip work or school.',
    '...eaten food off the floor.','...gotten a tattoo (or wanted one).','...sung loudly in the shower.',
    '...fallen asleep in class or a meeting.','...lied about my age.','...drunk-texted someone.',
    '...pretended to like a gift.','...gotten lost in my own neighborhood.',
    '...regifted a present.','...stayed in pajamas all day.','...forgotten someone\'s name mid-conversation.',
    '...snuck into a movie or event.','...fell in public.','...given a fake phone number.',
    '...stalked someone on social media.','...forgotten an anniversary or birthday.',
    '...made up an excuse to leave a party.','...overslept and missed something important.',
  ],
  spicy:[
    '...been dumped by text.','...lied on a resume.','...kissed someone on the first date.',
    '...ghosted someone.','...flirted to get out of trouble.','...kissed a coworker.',
    '...pretended to be someone else online.','...been caught in a big lie.',
    '...stayed friends with an ex.','...had a crush on a friend\'s partner.',
    '...read someone else\'s messages.','...used someone else\'s Netflix or account.',
    '...regretted a haircut immediately.','...said "I love you" and not meant it.',
    '...broken something and blamed someone else.','...gone on a blind date.',
    '...kept a secret from my best friend.','...dined and dashed.',
  ],
};

const { $, t, copyText } = GZ;
let level = 'easy';
let currentText = '';
let round = 0;
let fingers = [false,false,false,false,false]; // false = up

function renderLevels() {
  $('#levels').innerHTML = ['easy','medium','spicy'].map(l =>
    `<span class="nhie-level${l===level?' active':''}" data-l="${l}">${t(l)}</span>`).join('');
  $('#levels').querySelectorAll('.nhie-level').forEach(el => {
    el.addEventListener('click', () => { level = el.dataset.l; renderLevels(); });
  });
}

function renderFingers() {
  $('#fingers').innerHTML = fingers.map((down,i) =>
    `<span class="f${down?' down':''}" data-i="${i}">✋</span>`).join('');
  $('#fingers').querySelectorAll('.f').forEach(el => {
    el.addEventListener('click', () => { fingers[+el.dataset.i] = !fingers[+el.dataset.i]; renderFingers(); updateCount(); });
  });
  updateCount();
}

function updateCount() {
  const left = fingers.filter(f => !f).length;
  $('#count').innerHTML = `<b>${left}</b> ${t('fingersLeft')}`;
}

function nextPrompt() {
  const pool = PROMPTS[level];
  currentText = pool[Math.floor(Math.random() * pool.length)];
  round++;
  $('#text').textContent = currentText;
  // restart animation
  $('#card').style.animation = 'none'; void $('#card').offsetWidth; $('#card').style.animation = '';
}

function resetFingers() { fingers = [false,false,false,false,false]; renderFingers(); }

function copyPrompt() { if (currentText) copyText('Never have I ever ' + currentText); }

$('#prefix').textContent = 'Never have I ever';
$('#hint').textContent = t('tapHint');
$('#card').addEventListener('click', e => { if (!e.target.classList.contains('f')) nextPrompt(); });

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="nextPrompt()">${t('nextBtn')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="resetFingers()">${t('resetBtn')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyPrompt()">${t('copyBtn')}</button>`;
renderLevels();
renderFingers();
nextPrompt();

GZ.renderToolPage({
  category: 'fun',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🎭', href:'/fun/truth-or-dare.html', name:'Truth or Dare'},
    {icon:'🤔', href:'/fun/would-you-rather.html', name:'Would You Rather'},
    {icon:'🎱', href:'/fun/magic-8-ball.html', name:'Magic 8-Ball'},
    {icon:'💬', href:'/fun/quote-generator.html', name:'Quote Generator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
