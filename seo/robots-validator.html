const { $, t } = GZ;

const VALID = new Set(['user-agent','allow','disallow','sitemap','crawl-delay','host','clean-param','comments','comment']);
// Common typo corrections
const TYPO_FIX = {
  'useragent':'user-agent','user_agent':'user-agent','user agent':'user-agent','agent':'user-agent',
  'disalow':'disallow','dissalow':'disallow','dissallow':'disallow','dis-all':'disallow',
  'alow':'allow','crawl_delay':'crawl-delay','crawldelay':'crawl-delay','crawl delay':'crawl-delay',
  'site-map':'sitemap','site map':'sitemap','crawl-delay':'crawl-delay'
};

function validate(){
  const inp = $('#input').value;
  $('#output').innerHTML = '';
  if (!inp.trim()){ $('#status').innerHTML = `<span style="color:var(--gz-accent)">${t('errEmpty')}</span>`; return; }

  const lines = inp.split(/\r?\n/);
  const findings = []; // {sev:'err'|'warn'|'info'|'ok', line, msg}
  const groups = [];   // {ua:[], rules:[{d, v}]}
  const sitemaps = [];
  let cur = null; // current group (the last one whose most recent UA started a group)
  let seenUAInGroup = false; // whether we just saw UA lines (still collecting UAs)
  let ruleBeforeUA = false;
  let hostCount = 0;
  let directiveCount = 0;
  let curGroupUAs = [];

  function add(sev, lineNo, msg){ findings.push({sev, lineNo, msg}); }

  lines.forEach((raw, i) => {
    const lineNo = i + 1;
    // strip comment but keep for reference
    let code = raw.replace(/#.*$/, '').trim();
    if (!code) return; // blank or comment-only

    const colon = code.indexOf(':');
    if (colon === -1){
      add('err', lineNo, t('e_missingColon').replace('{d}', code));
      return;
    }
    const d = code.slice(0, colon).trim().toLowerCase();
    const v = code.slice(colon + 1).trim();
    directiveCount++;

    if (!VALID.has(d)){
      // typo?
      const fixed = TYPO_FIX[d];
      if (fixed){
        add('err', lineNo, t('e_typo').replace('{d}', fixed) + ' (' + raw.trim() + ')');
      } else {
        add('err', lineNo, t('e_unknownDirective').replace('{d}', d) + ' (' + raw.trim() + ')');
      }
      return;
    }

    switch(d){
      case 'user-agent': {
        if (!v){ add('err', lineNo, t('e_missingValue').replace('{d}', 'User-agent')); return; }
        // If the previous line was NOT a user-agent, start a new group
        if (!seenUAInGroup){
          cur = { uas: [], rules: [] };
          groups.push(cur);
          curGroupUAs = [];
          seenUAInGroup = true;
        }
        if (curGroupUAs.includes(v.toLowerCase())){
          add('warn', lineNo, t('e_dupUA').replace('{u}', v));
        } else {
          curGroupUAs.push(v.toLowerCase());
        }
        cur.uas.push(v);
        break;
      }
      case 'allow':
      case 'disallow': {
        if (cur === null){
          add('err', lineNo, t('e_ruleBeforeUA').replace('{d}', d));
          ruleBeforeUA = true;
          return;
        }
        seenUAInGroup = false; // end UA collection
        // value may be empty for "Disallow:" (allow all)
        if (v !== '' && !v.startsWith('/')){
          add('err', lineNo, t('e_badPath').replace('{p}', v) + ' (' + raw.trim() + ')');
        }
        if (d === 'disallow' && v === '/'){
          add('warn', lineNo, t('w_disallowAll') + ' (' + raw.trim() + ')');
        }
        cur.rules.push({d, v, lineNo});
        break;
      }
      case 'crawl-delay': {
        if (cur === null){
          add('err', lineNo, t('e_ruleBeforeUA').replace('{d}', 'Crawl-delay'));
          return;
        }
        seenUAInGroup = false;
        const n = Number(v);
        if (v === '' || isNaN(n) || n < 0){
          add('err', lineNo, t('e_missingValue').replace('{d}', 'Crawl-delay') + ' (' + raw.trim() + ')');
        } else if (n > 30){
          add('warn', lineNo, t('e_crawlDelayLarge').replace('{n}', v));
        }
        cur.rules.push({d, v, lineNo});
        break;
      }
      case 'sitemap': {
        seenUAInGroup = false;
        if (!v){ add('err', lineNo, t('e_missingValue').replace('{d}', 'Sitemap')); return; }
        if (!/^https?:\/\//i.test(v)){
          add('err', lineNo, t('e_badSitemap').replace('{u}', v));
        } else {
          sitemaps.push(v);
        }
        break;
      }
      case 'host': {
        seenUAInGroup = false;
        hostCount++;
        if (hostCount > 1) add('warn', lineNo, t('e_hostDup'));
        break;
      }
      case 'clean-param':
      case 'comments':
      case 'comment': {
        seenUAInGroup = false;
        if (!v) add('warn', lineNo, t('e_missingValue').replace('{d}', d));
        break;
      }
    }
  });

  // Global checks
  if (groups.length === 0 && directiveCount > 0){
    add('err', 0, t('e_noUA'));
  }
  const allUAs = groups.flatMap(g => g.uas.map(u => u.toLowerCase()));
  if (groups.length > 0 && !allUAs.includes('*')){
    add('warn', 0, t('w_noStar'));
  }
  if (sitemaps.length === 0){
    add('info', 0, t('w_noSitemap'));
  }

  // Counts
  const errs = findings.filter(f => f.sev === 'err').length;
  const warns = findings.filter(f => f.sev === 'warn').length;
  const infos = findings.filter(f => f.sev === 'info').length;

  // Render
  const sevClass = {err:'err', warn:'warn', info:'info', ok:'ok'};
  const sevTag = {err:'err', warn:'warn', info:'info', ok:'ok'};
  const sevIco = {err:'✗', warn:'⚠', info:'ℹ', ok:'✓'};
  const sevLbl = {err:t('msgError'), warn:t('msgWarning'), info:t('msgInfo'), ok:t('msgOk')};

  let html = `<div class="rb-summary">
    <div>${t('summary')}: <b style="color:var(--gz-accent)">${errs}</b> ${t('msgError')} · <b style="color:#f0a020">${warns}</b> ${t('msgWarning')} · <b style="color:#61afef">${infos}</b> ${t('msgInfo')}</div>
  </div>`;
  html += `<div class="rb-summary"><div>${t('lines')}: <b>${lines.length}</b></div><div>${t('directives')}: <b>${directiveCount}</b></div><div>${t('groups')}: <b>${groups.length}</b></div><div>${t('sitemaps')}: <b>${sitemaps.length}</b></div></div>`;

  html += '<div style="margin-top:14px">';
  findings.forEach(f => {
    const ln = f.lineNo ? ` <span style="color:var(--text3)">L${f.lineNo}</span>` : '';
    html += `<div class="rb-row ${sevClass[f.sev]}"><div class="ico">${sevIco[f.sev]}</div><div class="body"><span class="rb-tag ${sevTag[f.sev]}">${sevLbl[f.sev]}</span>${f.msg}${ln}</div></div>`;
  });
  html += '</div>';

  // Parsed groups
  if (groups.length){
    html += '<div style="margin-top:18px">';
    groups.forEach((g, idx) => {
      const rules = g.rules.length
        ? g.rules.map(r => `  ${r.d}: ${r.v||''}`).join('\n')
        : t('noRules');
      html += `<div class="rb-group"><h3>${t('groupTitle')} ${idx+1}: ${g.uas.join(', ')}</h3><div class="rules">${escapeHtml(rules)}</div></div>`;
    });
    html += '</div>';
  }

  $('#output').innerHTML = html;
  $('#status').innerHTML = errs > 0
    ? `<span style="color:var(--gz-accent)">${t('fileHasIssues')}</span>`
    : `<span style="color:var(--gz-success)">${t('fileValid')}</span>`;
}

function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function loadExample(){
  $('#input').value =
`# robots.txt for example.com
Sitemap: https://example.com/sitemap.xml
Sitemap: example.com/news-sitemap.xml

User-agent: *
Disallow: /admin/
Disallow: /private
Disallow: /search?
Allow: /admin/public/
Crawl-delay: 1

User-agent: Googlebot
disalow: /tmp/

User-agent: BadBot
Disallow: /`;
  validate();
}

function doClear(){ $('#input').value=''; $('#output').innerHTML=''; $('#status').innerHTML=''; }

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="validate()">${t('validate')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="loadExample()">${t('example')}</button>
  <button class="gz-btn" onclick="copyText($('#output').innerText)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="doClear()">${t('clear')}</button>`;

});
