<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="items-edit" id="itemsEdit"></div>
    <button class="gz-btn gz-btn-secondary" onclick="addItem()" style="margin-bottom:16px">+ Add Tab</button>
    <div class="ctrl">
      <div><label>Active Color</label><input type="color" id="actColor" value="#4ecdc4" onchange="render()"></div>
      <div><label>Active Bg</label><input type="color" id="actBg" value="#1e1e3f" onchange="render()"></div>
      <div><label>Inactive Color</label><input type="color" id="inColor" value="#888899" onchange="render()"></div>
      <div><label>Panel Bg</label><input type="color" id="pnlBg" value="#2a2a4a" onchange="render()"></div>
      <div><label>Panel Text</label><input type="color" id="pnlTxt" value="#e0e0e0" onchange="render()"></div>
      <div><label>Radius</label><input type="range" min="0" max="20" value="8" id="radius" onchange="render()"></div>
      <div><label>Layout</label>
        <select id="layout" onchange="render()">
          <option value="top">Top Tabs</option>
          <option value="side">Side Tabs</option>
        </select></div>
    </div>
    <div class="preview-box" id="preview"></div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="gz-btn" onclick="GZ.copyText(genCode())">📋 Copy Code</button>
      <button class="gz-btn gz-btn-secondary" onclick="resetItems()">🔄 Reset</button>
    </div>
    <div class="code-box"><pre id="codeOut"></pre></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'CSS Tabs Generator',
    toolDesc: 'Design CSS tab navigation components with live preview. Customize colors, layout and radius — copy production-ready code.',
    step1: 'Add tabs with a label and content panel',
    step2: 'Customize active/inactive colors, panel background and radius',
    step3: 'Preview the tabs in real-time',
    step4: 'Copy the generated HTML and CSS code',
  },
  zh: {
    toolTitle: 'CSS 标签页生成器',
    toolDesc: '可视化设计 CSS 标签页导航组件 — 自定义颜色、布局和圆角，复制生产可用代码。',
    step1: '添加标签页，填写标签和内容',
    step2: '自定义激活/非激活颜色、面板背景和圆角',
    step3: '实时预览标签页效果',
    step4: '复制生成的 HTML 和 CSS 代码',
  }
});

const { $, copyText, t } = GZ;

let items = [
  {title: 'Overview', content: 'Welcome to the overview tab. This is where your main content goes.'},
  {title: 'Features', content: 'List your key features here. Each tab switches panels instantly.'},
  {title: 'Pricing', content: 'Show pricing tiers or plans in this tab panel.'},
];

let activeTab = 0;

function buildItems() {
  const el = $('#itemsEdit');
  el.innerHTML = items.map((it, i) => `
    <div class="item-row">
      <input type="text" value="${it.title.replace(/"/g,'&quot;')}" oninput="items[${i}].title=this.value;render()" placeholder="Tab Label">
      <input type="text" value="${it.content.replace(/"/g,'&quot;')}" oninput="items[${i}].content=this.value;render()" placeholder="Panel Content">
      <button onclick="items.splice(${i},1);if(activeTab>=items.length)activeTab=0;buildItems();render()">✕</button>
    </div>`).join('');
}

function addItem() {
  items.push({title: 'New Tab', content: 'Tab content goes here.'});
  buildItems(); render();
}

function resetItems() {
  items = [{title:'Tab 1',content:'Content 1'},{title:'Tab 2',content:'Content 2'}];
  activeTab = 0;
  buildItems(); render();
}

function render() {
  const actColor = $('#actColor').value;
  const actBg = $('#actBg').value;
  const inColor = $('#inColor').value;
  const pnlBg = $('#pnlBg').value;
  const pnlTxt = $('#pnlTxt').value;
  const rad = $('#radius').value + 'px';
  const layout = $('#layout').value;
  const dir = layout === 'side' ? 'flex-direction:row' : 'flex-direction:column';

  const labels = items.map((it, i) => `
    <label class="tab-label" data-i="${i}" style="padding:12px 20px;cursor:pointer;font-weight:600;border-radius:${rad} ${rad} 0 0;color:${i===activeTab?actColor:inColor};background:${i===activeTab?actBg:'transparent'};transition:all .25s">${it.title}</label>`).join('');

  const panels = items.map((it, i) => `
    <div class="tab-panel" style="padding:20px;background:${pnlBg};color:${pnlTxt};border-radius:0 0 ${rad} ${rad};display:${i===activeTab?'block':'none'};line-height:1.6">${it.content}</div>`).join('');

  $('#preview').innerHTML = `
    <div class="tab-nav" style="display:flex;${dir === 'flex-direction:row' ? 'flex-direction:column' : 'flex-direction:column'}">
      <div style="display:flex;gap:4px;${layout==='side'?'flex-direction:column;border-right:1px solid #444':''}">${labels}</div>
      <div style="flex:1">${panels}</div>
    </div>`;

  $('#preview').querySelectorAll('.tab-label').forEach(l => {
    l.addEventListener('click', () => { activeTab = +l.dataset.i; render(); });
  });

  $('#codeOut').textContent = genCode();
}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function genCode() {
  const actColor = $('#actColor').value;
  const actBg = $('#actBg').value;
  const inColor = $('#inColor').value;
  const pnlBg = $('#pnlBg').value;
  const pnlTxt = $('#pnlTxt').value;
  const rad = $('#radius').value + 'px';

  return `<!-- HTML -->
<div class="tab-container">
  <div class="tab-nav">
${items.map((it,i)=>`    <input type="radio" name="tabs" id="tab-${i}"${i===0?' checked':''}>
    <label for="tab-${i}">${esc(it.title)}</label>`).join('\n')}
  </div>
${items.map((it,i)=>`  <div class="tab-panel" id="panel-${i}">
    ${esc(it.content)}
  </div>`).join('\n')}
</div>

/* CSS */
.tab-container { max-width: 600px; }
.tab-nav { display: flex; gap: 4px; }
.tab-nav input[type="radio"] { display: none; }
.tab-nav label {
  padding: 12px 20px;
  cursor: pointer;
  font-weight: 600;
  color: ${inColor};
  border-radius: ${rad} ${rad} 0 0;
  transition: all 0.25s ease;
}
.tab-nav input[type="radio"]:checked + label {
  color: ${actColor};
  background: ${actBg};
}
.tab-panel {
  display: none;
  padding: 20px;
  background: ${pnlBg};
  color: ${pnlTxt};
  border-radius: 0 0 ${rad} ${rad};
  line-height: 1.6;
}
${items.map((_,i)=>`#tab-${i}:checked ~ #panel-${i}`).join(',\n')} {
  display: block;
}`;
}

buildItems();
render();

GZ.renderToolPage({
  category: 'css',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🗂️', href:'/css-tools/accordion.html', name:'Accordion'},
    {icon:'🔘', href:'/css-tools/border-radius.html', name:'Border Radius'},
    {icon:'🔲', href:'/css-tools/shadow.html', name:'Box Shadow'},
    {icon:'🖱️', href:'/css-tools/hover.html', name:'Hover Effects'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body>
