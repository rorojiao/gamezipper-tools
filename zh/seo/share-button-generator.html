let active = ['facebook','x','linkedin','whatsapp','telegram'];

function buildPlatforms(){
  $('#platforms').innerHTML = '<span style="font-size:.78em;font-weight:600;color:var(--text2);align-self:center">'+t('pickPlatforms')+'</span>' +
    Object.keys(PLATFORMS).map(k=>{
      const on = active.includes(k);
      return '<span class="platform-chip'+(on?' active':'')+'" data-k="'+k+'" onclick="togglePlatform(\''+k+'\')">'+PLATFORMS[k].svg+' '+PLATFORMS[k].label+'</span>';
    }).join('');
}
function togglePlatform(k){
  if(active.includes(k)) active = active.filter(x=>x!==k);
  else active.push(k);
  buildPlatforms();
  render();
}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(){
  const url = ($('#f-url').value||'').trim() || 'https://example.com';
  const ti  = ($('#f-title').value||'').trim();
  const style = $('#f-style').value;
  const size  = $('#f-size').value;
  const align = $('#f-align').value;
  const showLabels = $('#f-labels').value === '1';

  const sizePx = {sm:14, md:18, lg:24}[size];
  const padMap = {sm:'6px 12px', md:'10px 18px', lg:'14px 24px'};
  const radiusMap = {solid:'6px', outline:'6px', rounded:'999px', circle:'50%', text:'0'};

  // ---- live preview ----
  const wrap = $('#preview');
  wrap.style.justifyContent = align==='left'?'flex-start':align==='right'?'flex-end':'center';
  wrap.style.gap = size==='lg'?'14px':'10px';
  wrap.innerHTML = active.map(k=>{
    const p = PLATFORMS[k];
    const shareUrl = p.share(url, ti);
    const isOutline = style==='outline';
    const isText = style==='text';
    const isCircle = style==='circle';
    const labelHtml = showLabels && !isCircle && !isText ? '<span style="margin-left:8px;font-weight:600;font-size:'+(size==='lg'?'1em':'.9em')+'">'+p.label+'</span>' : '';
    const bg   = isOutline||isText ? 'transparent' : p.color;
    const col  = isOutline||isText ? p.color : '#fff';
    const bord = isOutline ? '2px solid '+p.color : (isText?'none':'none');
    const pad  = isCircle||isText ? '50%' : padMap[size];
    const w    = isCircle ? (sizePx+18)+'px' : 'auto';
    const h    = isCircle ? (sizePx+18)+'px' : 'auto';
    const radius = isText?'0':radiusMap[style];
    return '<a href="'+shareUrl+'" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;justify-content:center;width:'+w+';height:'+h+';padding:'+pad+';background:'+bg+';color:'+col+';border:'+bord+';border-radius:'+radius+';text-decoration:none;font-family:system-ui,sans-serif;line-height:1;transition:opacity .2s;cursor:pointer" onmouseover="this.style.opacity=.85" onmouseout="this.style.opacity=1">'+p.svg.replace(/width="\d+" height="\d+"/,'width="'+sizePx+'" height="'+sizePx+'"')+labelHtml+'</a>';
  }).join('') || '<span style="color:var(--text3);font-size:.85em">Pick at least one platform ↑</span>';

  // ---- code output ----
  const codeLines = active.map(k=>{
    const p = PLATFORMS[k];
    const shareUrl = p.share(url, ti);
    const isOutline = style==='outline';
    const isText = style==='text';
    const isCircle = style==='circle';
    const labelHtml = showLabels && !isCircle && !isText ? '<span style="margin-left:8px;font-weight:600;font-size:'+(size==='lg'?'1em':'.9em')+'">'+p.label+'</span>' : '';
    const bg   = isOutline||isText ? 'transparent' : p.color;
    const col  = isOutline||isText ? p.color : '#fff';
    const bord = isOutline ? '2px solid '+p.color : (isText?'none':'none');
    const pad  = isCircle||isText ? '50%' : padMap[size];
    const w    = isCircle ? (sizePx+18)+'px' : 'auto';
    const h    = isCircle ? (sizePx+18)+'px' : 'auto';
    const radius = isText?'0':radiusMap[style];
    return '  <a href="'+shareUrl+'" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;justify-content:center;width:'+w+';height:'+h+';padding:'+pad+';background:'+bg+';color:'+col+';border:'+bord+';border-radius:'+radius+';text-decoration:none;font-family:system-ui,sans-serif;line-height:1;transition:opacity .2s"'+(showLabels&&isCircle?' aria-label="'+p.label+'"':'')+'>'+p.svg.replace(/width="\d+" height="\d+"/,'width="'+sizePx+'" height="'+sizePx+'"')+labelHtml+'</a>';
  });
  const containerAlign = align==='left'?'flex-start':align==='right'?'flex-end':'center';
  const html = '<!-- Social share buttons — generated by tools.gamezipper.com -->\n'+
    '<div style="display:flex;gap:'+(size==='lg'?'14px':'10px')+';justify-content:'+containerAlign+';flex-wrap:wrap">\n'+
    codeLines.join('\n')+'\n'+
    '</div>';
  $('#code').textContent = html;
}

function doCopy(){ copyText($('#code').textContent); }

$('#toolbar').innerHTML =

buildPlatforms();
render();
