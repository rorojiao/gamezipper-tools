<script>
GZI18n.register({

const { $, copyText, t } = GZ;
$('#input').placeholder = t('inputPlaceholder');

const STYLES = [
  { name: 'Bold', map: (c) => { const m={'A':'𝗔','B':'𝗕','C':'𝗖','D':'𝗗','E':'𝗘','F':'𝗙','G':'𝗚','H':'𝗛','I':'𝗜','J':'𝗝','K':'𝗞','L':'𝗟','M':'𝗠','N':'𝗡','O':'𝗢','P':'𝗣','Q':'𝗤','R':'𝗥','S':'𝗦','T':'𝗧','U':'𝗨','V':'𝗩','W':'𝗪','X':'𝗫','Y':'𝗬','Z':'𝗭','a':'𝗮','b':'𝗯','c':'𝗰','d':'𝗱','e':'𝗲','f':'𝗳','g':'𝗴','h':'𝗵','i':'𝗶','j':'𝗷','k':'𝗸','l':'𝗹','m':'𝗺','n':'𝗻','o':'𝗼','p':'𝗽','q':'𝗾','r':'𝗿','s':'𝘀','t':'𝘁','u':'𝘂','v':'𝘃','w':'𝘄','x':'𝘅','y':'𝘆','z':'𝘇','0':'𝟬','1':'𝟭','2':'𝟮','3':'𝟯','4':'𝟰','5':'𝟱','6':'𝟲','7':'𝟳','8':'𝟴','9':'𝟵'}; return m[c]||c; }},
];

// Unicode mathematical letter ranges for cleaner implementation
function toMathBold(s) { return [...s].map(c => { const code = c.charCodeAt(0); if(code>=65&&code<=90) return String.fromCharCode(0x1D5D4+code-65); if(code>=97&&code<=122) return String.fromCharCode(0x1D5EE+code-97); if(code>=48&&code<=57) return String.fromCharCode(0x1D7EC+code-48); return c; }).join(''); }
function toMathItalic(s) { return [...s].map(c => { const code = c.charCodeAt(0); if(code>=65&&code<=72) return String.fromCharCode(0x1D434+code-65); if(code>=74&&code<=78) return String.fromCharCode(0x1D434+code-65-1); if(code>=80&&code<=90) return String.fromCharCode(0x1D434+code-65-2); if(code>=97&&code<=104) return String.fromCharCode(0x1D44E+code-97); if(code>=106&&code<=110) return String.fromCharCode(0x1D44E+code-97-1); if(code>=112&&code<=122) return String.fromCharCode(0x1D44E+code-97-2); if(code===73) return '𝐼'; if(code===79) return '𝑂'; if(code===105) return '𝑖'; if(code===111) return '𝑜'; return c; }).join(''); }
function toMathBoldItalic(s) { return [...s].map(c => { const code = c.charCodeAt(0); if(code>=65&&code<=90) return String.fromCharCode(0x1D468+code-65); if(code>=97&&code<=122) return String.fromCharCode(0x1D482+code-97); return c; }).join(''); }
function toScript(s) { return [...s].map(c => { const code = c.charCodeAt(0); if(code>=65&&code<=90) return String.fromCharCode(0x1D49C+code-65); if(code>=97&&code<=122) return String.fromCharCode(0x1D4B6+code-97); return c; }).join(''); }
function toBoldScript(s) { return [...s].map(c => { const code = c.charCodeAt(0); if(code>=65&&code<=90) return String.fromCharCode(0x1D4D0+code-65); if(code>=97&&code<=122) return String.fromCharCode(0x1D4EA+code-97); return c; }).join(''); }
function toFraktur(s) { return [...s].map(c => { const code = c.charCodeAt(0); if(code>=65&&code<=90) return String.fromCharCode(0x1D504+code-65); if(code>=97&&code<=122) return String.fromCharCode(0x1D51E+code-97); return c; }).join(''); }
function toBoldFraktur(s) { return [...s].map(c => { const code = c.charCodeAt(0); if(code>=65&&code<=90) return String.fromCharCode(0x1D56C+code-65); if(code>=97&&code<=122) return String.fromCharCode(0x1D586+code-97); return c; }).join(''); }
function toMonospace(s) { return [...s].map(c => { const code = c.charCodeAt(0); if(code>=65&&code<=90) return String.fromCharCode(0x1D670+code-65); if(code>=97&&code<=122) return String.fromCharCode(0x1D68A+code-97); if(code>=48&&code<=57) return String.fromCharCode(0x1D7F6+code-48); return c; }).join(''); }
function toDoubleStruck(s) { return [...s].map(c => { const code = c.charCodeAt(0); if(code>=65&&code<=90) return String.fromCharCode(0x1D538+code-65); if(code>=97&&code<=122) return String.fromCharCode(0x1D552+code-97); if(code>=48&&code<=57) return String.fromCharCode(0x1D7D8+code-48); return c; }).join(''); }
function toSmallCaps(s) { const sm={'a':'ᴀ','b':'ʙ','c':'ᴄ','d':'ᴅ','e':'ᴇ','f':'ꜰ','g':'ɢ','h':'ʜ','i':'ɪ','j':'ᴊ','k':'ᴋ','l':'ʟ','m':'ᴍ','n':'ɴ','o':'ᴏ','p':'ᴘ','q':'ǫ','r':'ʀ','s':'ꜱ','t':'ᴛ','u':'ᴜ','v':'ᴠ','w':'ᴡ','x':'x','y':'ʏ','z':'ᴢ'}; return [...s].map(c=>sm[c]||c).join(''); }
function toCircled(s) { return [...s].map(c => { const code = c.charCodeAt(0); if(code>=65&&code<=90) return String.fromCharCode(0x24B6+code-65); if(code>=97&&code<=122) return String.fromCharCode(0x24D0+code-97); if(code>=48&&code<=57) return code===48?'⓪':String.fromCharCode(0x2460+code-49); return c; }).join(''); }
function toNegativeCircled(s) { return [...s].map(c => { const code = c.charCodeAt(0); if(code>=65&&code<=90) return String.fromCharCode(0x1F150+code-65); return c; }).join(''); }
function toSquared(s) { return [...s].map(c => { const code = c.charCodeAt(0); if(code>=65&&code<=90) return String.fromCharCode(0x1F130+code-65); return c; }).join(''); }
function toParenthesized(s) { return [...s].map(c => { const code = c.charCodeAt(0); if(code>=97&&code<=122) return String.fromCharCode(0x249C+code-97); if(code>=65&&code<=90) return String.fromCharCode(0x249C+code-65); return c; }).join(''); }
function toUnderline(s) { return [...s].map(c => c+'\u0332').join(''); }
function toStrikethrough(s) { return [...s].map(c => c+'\u0336').join(''); }
function toOverline(s) { return [...s].map(c => c+'\u0305').join(''); }
function toCrosshatch(s) { return [...s].map(c => c+'\u0337').join(''); }
function toZalgo(s) { return [...s].map(c => { let r = c; const marks = ['\u0300','\u0301','\u0302','\u0303','\u0304','\u0305','\u0306','\u0307','\u0308','\u030A','\u030B','\u030C','\u030D','\u030E','\u030F','\u0310','\u0311','\u0312','\u0313','\u0314','\u0315']; for(let i=0;i<3;i++) r += marks[Math.floor(Math.random()*marks.length)]; return r; }).join(''); }
function toUpsideDown(s) { const m={'a':'ɐ','b':'q','c':'ɔ','d':'p','e':'ǝ','f':'ɟ','g':'ƃ','h':'ɥ','i':'ᴉ','j':'ɾ','k':'ʞ','l':'l','m':'ɯ','n':'u','o':'o','p':'d','q':'b','r':'ɹ','s':'s','t':'ʇ','u':'n','v':'ʌ','w':'ʍ','x':'x','y':'ʎ','z':'z','A':'∀','B':'ꓭ','C':'Ɔ','D':'ᗡ','E':'Ǝ','F':'Ⅎ','G':'⅁','H':'H','I':'I','J':'ſ','K':'ꓘ','L':'˥','M':'W','N':'N','O':'O','P':'Ԁ','Q':'Ꝺ','R':'ꓤ','S':'S','T':'⊥','U':'∩','V':'Λ','W':'M','X':'X','Y':'⅄','Z':'Z','?':'¿','!':'¡','.':'˙',',':'\'','(':')',')':'(','[':']',']':'[','{':'}','}':'{','<':'>','>':'<','&':'⅋','_':'‾'}; return [...s].map(c=>m[c]||c).reverse().join(''); }
function toRegional(s) { return [...s].map(c => { const code = c.charCodeAt(0); if(code>=65&&code<=90) return String.fromCodePoint(0x1F1E6+code-65)+' '; if(code>=97&&code<=122) return String.fromCodePoint(0x1F1E6+code-97)+' '; return c; }).join(''); }

const allStyles = [
  { name: '𝗕𝗼𝗹𝗱', fn: toMathBold },
  { name: '𝑰𝒕𝒂𝒍𝒊𝒄', fn: toMathItalic },
  { name: '𝙗𝙤𝙡𝙙 𝒊𝒕𝒂𝒍𝒊𝒄', fn: toMathBoldItalic },
  { name: '𝒮𝒸𝓇𝒾𝓅𝓉', fn: toScript },
  { name: '𝓑𝓸𝓵𝓭 𝓢𝓬𝓻𝓲𝓹𝓽', fn: toBoldScript },
  { name: '𝔉𝔯𝔞𝔨𝔱𝔲𝔯', fn: toFraktur },
  { name: '𝕭𝖔𝖑𝖉 𝕱𝖗𝖆𝖐𝖙𝖚𝖗', fn: toBoldFraktur },
  { name: '𝙼𝚘𝚗𝚘𝚜𝚙𝚊𝚌𝚎', fn: toMonospace },
  { name: '𝔻𝕠𝕦𝕓𝕝𝕖 𝕊𝚝𝚛𝚞𝚌𝚔', fn: toDoubleStruck },
  { name: 'Sᴍᴀʟʟ Cᴀᴘꜱ', fn: toSmallCaps },
  { name: 'Ⓒⓘⓡⓒⓛⓔⓓ', fn: toCircled },
  { name: '🄽🄴🄶🄰🅃🄸🅅🄴', fn: toNegativeCircled },
  { name: '🅂🅀🅄🄰🅁🄴🄳', fn: toSquared },
  { name: '⒫⒜⒭⒠⒩⒮', fn: toParenthesized },
  { name: 'U̲n̲d̲e̲r̲l̲i̲n̲e̲', fn: toUnderline },
  { name: 'S̶t̶r̶i̶k̶e̶', fn: toStrikethrough },
  { name: 'O̅v̅e̅r̅l̅i̅n̅e̅', fn: toOverline },
  { name: 'C̸r̸o̸s̸s̸', fn: toCrosshatch },
  { name: 'Z̢̯͍a̗̭l͠ģó', fn: toZalgo },
  { name: 'Upside Down', fn: toUpsideDown },
  { name: '🇷 🇪 🇬 🇮 🇴 🇳 🇦 🇱', fn: toRegional },
];

function renderStyles() {
  const text = $('#input').value || t('inputPlaceholder');
  let html = '';
  for (const style of allStyles) {
    let converted;
    try { converted = style.fn(text); } catch(e) { converted = text; }
    html += `<div class="fancy-item" onclick="copyText(this.querySelector('.style-text').textContent)"><div><div class="style-name">${style.name}</div><div class="style-text">${converted.replace(/</g,'&lt;')}</div></div><div class="copy-hint">${t('clickToCopy')}</div></div>`;
  }
  $('#result').innerHTML = html;
}

$('#toolbar').innerHTML = `<button class="gz-btn gz-btn-secondary" onclick="$('#input').value='';renderStyles()">${t('clear')}</button>`;

$('#input').addEventListener('input', renderStyles);

// Default text
$('#input').value = 'Hello World';
renderStyles();

    {icon:'😊', href:'/text/emoji-picker.html', name:'Emoji Picker'},
  ]

</script>
