.ef-breakdown{margin-top:14px;display:grid;gap:8px}

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="ef-grid">
      <div class="ef-card" id="input-card"></div>
      <div class="ef-card" id="info-card"></div>

  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Emergency Fund Calculator',
    toolDesc: 'Calculate your ideal emergency fund size. Enter monthly expenses to find your 3-6 month target, see how long current savings will last, and build a monthly savings plan — free and private.',
    monthlyExpenses: 'Monthly essential expenses',
    currentSavings: 'Current emergency savings',
    monthlySavings: 'How much can you save monthly?',
    targetMonths: 'Target fund size',
    calculate: 'Calculate',
    threeMonths: '3 months',
    sixMonths: '6 months (recommended)',
    twelveMonths: '12 months (conservative)',
    monthsCovered: 'Months covered by current savings',
    progressToGoal: 'Progress to 6-month goal',
    monthlyPlan: 'Months to reach 6-month goal',
    totalNeeded: 'Total still needed',
    statusGood: '✓ Fully funded — you have 6+ months covered!',
    statusOk: '◐ On track — keep building your fund',
    statusWarning: '⚠ Keep going — you need more cushion',
    statusDanger: '⚠ Priority — build your fund ASAP',
    step1: 'Enter your essential monthly expenses (rent, food, bills)',
    step2: 'Enter how much you currently have saved',
    step3: 'Enter how much you can save per month',
    step4: 'See your target, current coverage and savings plan',
  },
  zh: {
    toolTitle: '应急基金计算器',
    toolDesc: '计算你的理想应急基金规模。输入每月支出来确定 3-6 个月的目标，查看当前储蓄能维持多久，并制定每月储蓄计划 — 免费且私密。',
    monthlyExpenses: '每月必要支出',
    currentSavings: '当前应急储蓄',
    monthlySavings: '每月可存多少？',
    targetMonths: '目标基金规模',
    calculate: '计算',
    threeMonths: '3 个月',
    sixMonths: '6 个月（推荐）',
    twelveMonths: '12 个月（保守）',
    monthsCovered: '当前储蓄可维持月数',
    progressToGoal: '6 个月目标进度',
    monthlyPlan: '达到 6 个月目标所需月数',
    totalNeeded: '还需储蓄总额',
    statusGood: '✓ 资金充足 — 你已有 6 个月以上的储备！',
    statusOk: '◐ 进展顺利 — 继续积累',
    statusWarning: '⚠ 继续努力 — 你需要更多缓冲',
    statusDanger: '⚠ 优先事项 — 尽快建立应急基金',
    step1: '输入每月必要支出（房租、伙食、账单）',
    step2: '输入当前已储蓄金额',
    step3: '输入每月可储蓄金额',
    step4: '查看目标、当前覆盖和储蓄计划',
  }
});

const { $, t } = GZ;

const cur = (n) => {
  const lang = GZI18n.getLang ? GZI18n.getLang() : 'en';
  try { return new Intl.NumberFormat(lang === 'zh' ? 'zh-CN' : 'en-US', {style:'currency', currency:'USD', maximumFractionDigits:0}).format(n); }
  catch(e) { return '$' + n.toFixed(0); }
};

$('#input-card').innerHTML = `
  <div class="ef-field">
    <label>${t('monthlyExpenses')}</label>
    <div class="input-wrap">
      <span class="prefix">$</span>
      <input type="number" id="expenses" class="has-prefix" value="3000" min="0" step="50">
    </div>
  </div>
  <div class="ef-field">
    <label>${t('currentSavings')}</label>
    <div class="input-wrap">
      <span class="prefix">$</span>
      <input type="number" id="current" class="has-prefix" value="5000" min="0" step="100">
    </div>
  </div>
  <div class="ef-field">
    <label>${t('monthlySavings')}</label>
    <div class="input-wrap">
      <span class="prefix">$</span>
      <input type="number" id="monthly" class="has-prefix" value="500" min="0" step="50">
    </div>
  </div>
  <button class="gz-btn" style="width:100%;padding:12px" onclick="calculate()">${t('calculate')}</button>
`;

$('#info-card').innerHTML = `
  <h3 style="margin:0 0 14px;font-size:1.05em">🛡️ Why an Emergency Fund?</h3>
  <p style="font-size:.9em;line-height:1.6;opacity:.85">
    An emergency fund is your financial safety net for unexpected expenses —
    job loss, medical bills, car repairs, or home emergencies. Without one,
    you may be forced into high-interest debt.
  </p>
  <div style="margin-top:14px;padding:12px 14px;background:var(--glass2);border-radius:10px;font-size:.85em;line-height:1.6">
    <strong>📊 General guidelines:</strong><br>
    • <strong>3 months</strong>: Single, stable job, no dependents<br>
    • <strong>6 months</strong>: Family, or variable income (recommended)<br>
    • <strong>9-12 months</strong>: Self-employed, single income, health issues
  </div>
  <p style="font-size:.85em;line-height:1.6;opacity:.75;margin-top:12px">
    Keep it in a <strong>high-yield savings account</strong> (FDIC-insured, 4-5% APY).
    Don't invest it — the goal is safety and quick access, not growth.
  </p>
`;

function calculate() {
  const expenses = parseFloat($('#expenses').value) || 0;
  const current = parseFloat($('#current').value) || 0;
  const monthlySave = parseFloat($('#monthly').value) || 0;

  if (expenses <= 0) {
    $('#results').innerHTML = '<div style="text-align:center;opacity:.5;padding:20px">Enter your monthly expenses to begin</div>';
    return;
  }

  const target3 = expenses * 3;
  const target6 = expenses * 6;
  const target12 = expenses * 12;
  const monthsCovered = current / expenses;
  const stillNeeded6 = Math.max(0, target6 - current);
  const monthsToGoal = monthlySave > 0 ? Math.ceil(stillNeeded6 / monthlySave) : Infinity;
  const progressPct = Math.min(100, (current / target6) * 100);

  let status, statusClass;
  if (monthsCovered >= 6) { status = t('statusGood'); statusClass = 'good'; }
  else if (monthsCovered >= 3) { status = t('statusOk'); statusClass = 'good'; }
  else if (monthsCovered >= 1) { status = t('statusWarning'); statusClass = 'warning'; }
  else { status = t('statusDanger'); statusClass = 'danger'; }

  $('#results').innerHTML = `
    <div style="text-align:center">
      <div style="font-size:.85em;opacity:.7;text-transform:uppercase;letter-spacing:.05em">${t('sixMonths')}</div>
      <div class="ef-big"><span class="currency">$</span>${target6.toLocaleString('en-US',{maximumFractionDigits:0})}</div>
    </div>
    <div class="ef-status ${statusClass}">${status}</div>
    <div class="ef-target-row">
      <div class="ef-target"><div class="lbl">${t('threeMonths')}</div><div class="val">${cur(target3)}</div></div>
      <div class="ef-target recommended"><div class="lbl">${t('sixMonths')}</div><div class="val">${cur(target6)}</div></div>
      <div class="ef-target"><div class="lbl">${t('twelveMonths')}</div><div class="val">${cur(target12)}</div></div>
    </div>
    <div class="ef-progress">
      <div class="ef-progress-bar"><div class="ef-progress-fill" style="width:${progressPct}%"></div></div>
      <div class="ef-progress-label"><span>${t('progressToGoal')}</span><span>${progressPct.toFixed(0)}%</span></div>
    </div>
    <div class="ef-breakdown">
      <div class="ef-row"><span class="lbl">${t('monthsCovered')}</span><span class="val">${monthsCovered.toFixed(1)} months</span></div>
      <div class="ef-row"><span class="lbl">${t('totalNeeded')}</span><span class="val">${cur(stillNeeded6)}</span></div>
      ${monthlySave > 0 ? `<div class="ef-row"><span class="lbl">${t('monthlyPlan')}</span><span class="val">${monthsToGoal === Infinity ? '—' : monthsToGoal + ' months (' + (monthsToGoal/12).toFixed(1) + ' yrs)'}</span></div>` : ''}
    </div>`;
}

calculate();
$('#expenses').addEventListener('input', calculate);
$('#current').addEventListener('input', calculate);
$('#monthly').addEventListener('input', calculate);

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1', 'step2', 'step3', 'step4'],
  related: [
    {icon: '💰', href: '/calc/savings-goal-calculator.html', name: 'Savings Goal Calculator'},
    {icon: '🏦', href: '/calc/retirement-calculator.html', name: 'Retirement Calculator'},
    {icon: '💎', href: '/calc/net-worth-calculator.html', name: 'Net Worth Calculator'},
    {icon: '🔥', href: '/calc/fire-calculator.html', name: 'FIRE Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js?v=20260707v520" defer></script>
</body></html>
