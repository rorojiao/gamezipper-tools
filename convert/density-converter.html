<script>
GZI18n.register({
  en: {
    toolTitle: 'Density Converter',
    toolDesc: 'Convert density units instantly — kg/m³, g/cm³, g/mL, kg/L, lb/ft³, lb/in³, ton/m³ and slug/ft³.',
    step1: 'Enter the density value you want to convert',
    step2: 'Select the source unit from the dropdown',
    step3: 'All other units update live in the grid below',
    step4: 'Click any value card to copy it to clipboard',
  },
  zh: {
    toolTitle: '密度单位换算器',
    toolDesc: '即时换算密度单位 — kg/m³、g/cm³、g/mL、kg/L、lb/ft³、lb/in³、吨/m³ 和 slug/ft³。',
    step1: '输入要换算的密度值',
    step2: '从下拉菜单选择原始单位',
    step3: '下方网格实时显示所有其他单位的结果',
    step4: '点击任意数值卡片即可复制到剪贴板',
  }
});
const { $, copyText, t } = GZ;
// All factors relative to 1 kg/m³
const UNITS = [
  {id:'kgm3', name:'kg/m³',              zh:'千克/立方米 (kg/m³)',  f:1},
  {id:'gcm3', name:'g/cm³',              zh:'克/立方厘米 (g/cm³)',  f:1000},
  {id:'gmL',  name:'g/mL',               zh:'克/毫升 (g/mL)',       f:1000},
  {id:'kgL',  name:'kg/L',               zh:'千克/升 (kg/L)',       f:1000},
  {id:'mgmL', name:'mg/mL',              zh:'毫克/毫升 (mg/mL)',    f:1},
  {id:'lbft3',name:'lb/ft³',             zh:'磅/立方英尺 (lb/ft³)', f:16.01846337396},
  {id:'lbin3',name:'lb/in³',             zh:'磅/立方英寸 (lb/in³)', f:27679.904710203},
  {id:'tonm3',name:'ton (metric)/m³',    zh:'吨/立方米',            f:1000},
  {id:'slugft3',name:'slug/ft³',         zh:'斯勒格/立方英尺',       f:515.3788184},
  {id:'ppgal',name:'lb/US gallon',       zh:'磅/美加仑',            f:119.82642731689664},
];
function fmt(v){
  if(v===0) return '0';
  const a=Math.abs(v);
  if(a!==0&&(a<1e-6||a>=1e9)) return v.toExponential(6);
  if(a>=1) return +(v.toPrecision(8)).toLocaleString('en-US',{maximumFractionDigits:6});
  return v.toPrecision(6);
}
function convert(){
  const val=parseFloat($('#inp-val').value)||0;
  const unit=$('#inp-unit').value;
  const factor=UNITS.find(u=>u.id===unit).f;
  const kgm3=val*factor;
  const lang=GZI18n.getLang();
  $('#grid').innerHTML=UNITS.map(u=>{
    const result=kgm3/u.f;
    const label=lang==='zh'?u.zh:u.name;
    return `<div class="conv-card" onclick="copyText('${fmt(result)}')"><label>${label}</label><div class="val">${fmt(result)}</div></div>`;
  }).join('');
}
$('#inp-val').addEventListener('input',convert);
$('#inp-unit').addEventListener('change',convert);
$('#inp-unit').innerHTML=UNITS.map(u=>`<option value="${u.id}">${u.name}</option>`).join('');
$('#inp-unit').value='kgm3';
$('#toolbar').innerHTML=`<button class="gz-btn" onclick="copyText($('#grid .conv-card:first-child .val').textContent)">${t('copy')}</button>`;
convert();
GZ.renderToolPage({
  category:'convert',
  titleKey:'toolTitle',
  descKey:'toolDesc',
  howToSteps:['step1','step2','step3','step4'],
  related:[
    {icon:'💪',href:'/convert/force-converter.html',name:'Force Converter'},
    {icon:'⚡',href:'/convert/energy-converter.html',name:'Energy Converter'},
    {icon:'📐',href:'/convert/area-converter.html',name:'Area Converter'},
    {icon:'🧊',href:'/convert/volume-converter.html',name:'Volume Converter'},
  ]
});
</script>
