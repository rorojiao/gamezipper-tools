<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "How is debt payoff time calculated?", "acceptedAnswer": {"@type": "Answer", "text": "Each month, interest is added to your balance (balance x APR / 12), then your payment is subtracted. This repeats until the balance reaches zero. The number of months it takes is your payoff time, and the sum of all interest charges is your total interest paid."}}, {"@type": "Question", "name": "What is the debt avalanche method?", "acceptedAnswer": {"@type": "Answer", "text": "The debt avalanche method pays off debts with the highest interest rate first while making minimum payments on everything else. Mathematically it saves the most interest. The debt snowball method pays off the smallest balances first for psychological motivation."}}, {"@type": "Question", "name": "How much can extra payments save?", "acceptedAnswer": {"@type": "Answer", "text": "Even small extra payments can save thousands. For example, an extra $100 per month on a $10,000 credit card at 22% APR can cut years off your payoff and save thousands in interest. This calculator shows the exact savings side by side."}}, {"@type": "Question", "name": "What is a good minimum payment strategy?", "acceptedAnswer": {"@type": "Answer", "text": "Always pay at least the minimum to avoid penalties and credit score damage. But paying only the minimum on high-interest debt means most of your payment goes to interest, not principal. Use this calculator to find an affordable payment that eliminates debt faster."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="dp-grid">
      <div class="dp-card">
        <h3>💳 <span id="lblInputs"></span></h3>
        <div class="dp-field"><label id="lblBalance"></label><input type="number" id="balance" value="10000" min="0" step="100"></div>
        <div class="dp-field"><label id="lblAPR"></label><input type="number" id="apr" value="22" min="0" max="100" step="0.1"></div>
        <div class="dp-field"><label id="lblMinPay"></label><input type="number" id="minPay" value="250" min="0" step="10"></div>
        <div class="dp-field"><label id="lblExtra"></label><input type="number" id="extra" value="100" min="0" step="10"></div>
        <div class="dp-field"><label id="lblCurrency"></label><input type="text" id="currency" value="$" maxlength="3"></div>
      </div>
      <div class="dp-card">
        <h3>📊 <span id="lblResults"></span></h3>
        <div class="result-grid">
          <div class="result-cell highlight"><div class="l" id="rPayoffTime"></div><div class="v" id="payoffTime">—</div></div>
          <div class="result-cell highlight"><div class="l" id="rTotalInterest"></div><div class="v" id="totalInterest">$0</div></div>
          <div class="result-cell"><div class="l" id="rTotalPaid"></div><div class="v" id="totalPaid">$0</div></div>
          <div class="result-cell savings"><div class="l" id="rSavings"></div><div class="v" id="savings">$0</div></div>
        </div>

      </div>
    </div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Debt Payoff Calculator',
    toolDesc: 'Calculate how long it takes to pay off credit cards, personal loans, and other debt. Compare minimum vs extra payments and see exactly how much interest you can save.',
    inputs: 'Debt Details', results: 'Payoff Results',
    balance: 'Current balance', apr: 'Annual interest rate (APR %)', minPay: 'Monthly payment', extra: 'Extra monthly payment', currency: 'Currency symbol',
    payoffTime: 'Time to Pay Off', totalInterest: 'Total Interest', totalPaid: 'Total Paid', savings: 'Interest Saved',
    copy: '📋 Copy Summary', reset: '🔄 Reset', example: '🧪 Load Example',
    step1: 'Enter your current debt balance and annual interest rate (APR)',
    step2: 'Set your planned monthly payment',
    step3: 'Add any extra monthly payment to see how much faster you pay off and how much interest you save',
    step4: 'Compare the minimum-payment scenario vs your accelerated plan',
  },
  zh: {
    toolTitle: '债务偿还计算器',
    toolDesc: '计算还清信用卡、个人贷款和其他债务所需时间。对比最低还款与额外还款，查看能节省多少利息。',
    inputs: '债务详情', results: '偿还结果',
    balance: '当前余额', apr: '年利率 (APR %)', minPay: '每月还款', extra: '额外月还款', currency: '货币符号',
    payoffTime: '还清时间', totalInterest: '总利息', totalPaid: '总还款额', savings: '节省利息',
    copy: '📋 复制摘要', reset: '🔄 重置', example: '🧪 加载示例',
    step1: '输入当前债务余额和年利率 (APR)',
    step2: '设置计划每月还款金额',
    step3: '添加额外月还款，查看加速还清节省的时间和利息',
    step4: '对比最低还款方案与加速还款方案',
  }
});

const { $, copyText, t } = GZ;
const isZh = GZI18n.getLang() === 'zh';

['inputs','results','balance','apr','minPay','extra','currency','payoffTime','totalInterest','totalPaid','savings'].forEach(k => {
  const el = $('#lbl' + k.charAt(0).toUpperCase() + k.slice(1)); if (el) el.textContent = t(k);
  const el2 = $('#r' + k.charAt(0).toUpperCase() + k.slice(1)); if (el2) el2.textContent = t(k);
});

function fmt(n) { return '$' + (n||0).toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }

function simulate(balance, apr, payment) {
  const monthlyRate = apr / 100 / 12;
  let bal = balance;
  let totalInterest = 0;
  let months = 0;
  const MAX = 1200; // 100 years cap
  if (payment <= bal * monthlyRate && monthlyRate > 0) return { months: Infinity, totalInterest: Infinity, neverPaysOff: true };
  while (bal > 0.005 && months < MAX) {
    const interest = bal * monthlyRate;
    let pay = Math.min(payment, bal + interest);
    totalInterest += interest;
    bal = bal + interest - pay;
    months++;
    if (bal < 0) bal = 0;
  }
  return { months, totalInterest, totalPaid: balance + totalInterest };
}

function fmtTime(months) {
  if (months === Infinity) return isZh ? '无法还清' : 'Never';
  if (months <= 0) return isZh ? '已还清' : 'Paid off';
  const y = Math.floor(months / 12), m = months % 12;
  const parts = [];
  if (y > 0) parts.push(isZh ? `${y} 年` : `${y} yr${y>1?'s':''}`);
  if (m > 0) parts.push(isZh ? `${m} 月` : `${m} mo`);
  return parts.join(' ');
}

function calc() {
  const balance = +$('#balance').value || 0;
  const apr = +$('#apr').value || 0;
  const minPay = +$('#minPay').value || 0;
  const extra = +$('#extra').value || 0;

  if (balance <= 0 || minPay <= 0) {
    ['payoffTime','totalInterest','totalPaid','savings'].forEach(id => $('#' + id).textContent = '—');
    $('#compareTable').innerHTML = '';
    $('#note').textContent = '';
    return;
  }

  const fullPayment = minPay + extra;
  const minResult = simulate(balance, apr, minPay);
  const accelResult = simulate(balance, apr, fullPayment);

  $('#payoffTime').textContent = fmtTime(accelResult.months);
  $('#totalInterest').textContent = fmt(accelResult.totalInterest);
  $('#totalPaid').textContent = fmt(accelResult.totalPaid);

  const interestSaved = minResult.totalInterest - accelResult.totalInterest;
  const timeSaved = minResult.months - accelResult.months;
  $('#savings').textContent = fmt(Math.max(0, interestSaved));

  const minPayLabel = isZh ? '仅最低还款' : 'Minimum payment only';
  const accelLabel = isZh ? '含额外还款' : 'With extra payment';
  $('#compareTable').innerHTML = `
    <thead><tr><th></th><th class="num">${isZh?'时间':'Time'}</th><th class="num">${isZh?'总利息':'Interest'}</th><th class="num">${isZh?'总额':'Total'}</th></tr></thead>
    <tbody>
      <tr><td>${minPayLabel}</td><td class="num">${fmtTime(minResult.months)}</td><td class="num">${fmt(minResult.totalInterest)}</td><td class="num">${fmt(minResult.totalPaid)}</td></tr>
      <tr><td><b>${accelLabel}</b></td><td class="num" style="color:#00d672">${fmtTime(accelResult.months)}</td><td class="num" style="color:#00d672">${fmt(accelResult.totalInterest)}</td><td class="num">${fmt(accelResult.totalPaid)}</td></tr>
    </tbody>`;

  $('#note').textContent = extra > 0 && timeSaved > 0
    ? (isZh ? `每月多还 $${extra} 可节省 ${fmtTime(timeSaved)} 和 ${fmt(interestSaved)} 利息。` : `Paying $${extra} extra per month saves ${fmtTime(timeSaved)} and ${fmt(interestSaved)} in interest.`)
    : '';
}

['balance','apr','minPay','extra','currency'].forEach(id => $('#' + id).addEventListener('input', calc));

$('#toolbar').innerHTML = `
  <button class="gz-btn gz-btn-secondary" id="btnCopy">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnExample">${t('example')}</button>
  <button class="gz-btn gz-btn-secondary" id="btnReset">${t('reset')}</button>`;

$('#btnCopy').onclick = () => copyText(`${t('toolTitle')}\n${t('payoffTime')}: ${$('#payoffTime').textContent}\n${t('totalInterest')}: ${$('#totalInterest').textContent}\n${t('savings')}: ${$('#savings').textContent}`);
$('#btnExample').onclick = () => { $('#balance').value = 10000; $('#apr').value = 22; $('#minPay').value = 250; $('#extra').value = 150; calc(); };
$('#btnReset').onclick = () => { $('#balance').value = 0; $('#apr').value = 0; $('#minPay').value = 0; $('#extra').value = 0; calc(); };

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'🏦', href:'/calc/loan-calculator.html', name:'Loan Calculator'},
    {icon:'💳', href:'/calc/credit-card-payoff-calculator.html', name:'Credit Card Payoff'},
    {icon:'📈', href:'/calc/compound-interest.html', name:'Compound Interest'},
    {icon:'🏠', href:'/calc/mortgage-calculator.html', name:'Mortgage Calculator'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
