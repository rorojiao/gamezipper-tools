<script>

    toolDesc: '将视频旋转 90°、180° 或 270°，或水平/垂直翻转。保存前实时预览 — 100% 浏览器本地运行，无需上传。',
    dzText: '点击或拖拽视频文件 (MP4, WebM, MOV)',
    quality: '输出质量',
    keepAudio: '保留音频',
    optHigh: '高 (8 Mbps)',

    optLow: '低 (1.5 Mbps，更小)',
    optYes: '是',
    optNo: '否 (静音)',
    rotate: '旋转并保存',
    download: '下载视频',
    processing: '处理中…',
    optRotateLeft: '↺ 逆时针 90°',
    optRotateRight: '↻ 顺时针 90°',
    optRotate180: '⇅ 旋转 180°',
    optFlipH: '⇋ 水平翻转',
    optFlipV: '⤥ 垂直翻转',
    optFlipBoth: '⤡ 双向翻转',
    step1: '上传视频文件 (MP4, WebM, MOV)',
    step2: '点击旋转或翻转选项 — 即时预览',
    step3: '选择输出质量和是否保留音频',
    step4: '点击「旋转并保存」，然后下载结果',
    noFile: '请先选择视频文件',
    noStream: '您的浏览器不支持本地视频编码',
  }
});

const { $, t } = GZ;

let originalFile = null;
let videoURL = null;
let processedBlob = null;
let mode = 'rotate-cw';

const fileInput = $('#fileInput');
const dropzone = $('#drop');
const editor = $('#editor');
const rotateBtn = $('#rotateBtn');
const downloadBtn = $('#downloadBtn');
const video = $('#video');
const dzText = $('#dz-text');
dzText.textContent = t('dzText');

const OPTIONS = [
  { id: 'rotate-ccw', ico: '↺', labelKey: 'optRotateLeft' },
  { id: 'rotate-cw',  ico: '↻', labelKey: 'optRotateRight' },
  { id: 'rotate-180', ico: '⇅', labelKey: 'optRotate180' },
  { id: 'flip-h',     ico: '⇋', labelKey: 'optFlipH' },
  { id: 'flip-v',     ico: '⤥', labelKey: 'optFlipV' },
  { id: 'flip-both',  ico: '⤡', labelKey: 'optFlipBoth' },
];
$('#opts').innerHTML = OPTIONS.map((o, i) =>
  `<div class="vr-opt ${i===1?'active':''}" data-id="${o.id}"><span class="ico">${o.ico}</span>${t(o.labelKey)}</div>`
).join('');
document.querySelectorAll('.vr-opt').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.vr-opt').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
    mode = el.dataset.id;
  });
});

['dragover','dragenter'].forEach(ev => dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.add('drag'); }));
['dragleave','drop'].forEach(ev => dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.remove('drag'); }));
dropzone.addEventListener('drop', e => { if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]); });
dropzone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files.length) loadFile(e.target.files[0]); });

function loadFile(file) {
  if (!file.type.startsWith('video/') && !/\.(mp4|webm|mov|m4v|ogv|mkv)$/i.test(file.name)) { alert('Please select a video file'); return; }
  originalFile = file;
  if (videoURL) URL.revokeObjectURL(videoURL);
  videoURL = URL.createObjectURL(file);
  video.src = videoURL;
  dzText.textContent = file.name;
  editor.style.display = 'block';
  downloadBtn.style.display = 'none';
  processedBlob = null;
}

function getTransform(m, w, h, swap) {
  switch (m) {
    case 'rotate-ccw': return swap ? { transform: 'rotate(-90deg)', origin: [w/2, h/2], swap: true } : { transform: 'rotate(-90deg)', swap: true };
    case 'rotate-cw':  return { transform: 'rotate(90deg)', swap: true };
    case 'rotate-180': return { transform: 'rotate(180deg)', swap: false };
    case 'flip-h':     return { transform: 'scaleX(-1)', swap: false };
    case 'flip-v':     return { transform: 'scaleY(-1)', swap: false };
    case 'flip-both':  return { transform: 'scale(-1,-1)', swap: false };
  }
}

function drawFrame(ctx, v, m, w, h) {
  ctx.save();
  ctx.clearRect(0, 0, w, h);
  if (m === 'rotate-cw') {
    ctx.translate(w, 0); ctx.rotate(Math.PI/2);
    ctx.drawImage(v, 0, 0, h, w);
  } else if (m === 'rotate-ccw') {
    ctx.translate(0, h); ctx.rotate(-Math.PI/2);
    ctx.drawImage(v, 0, 0, h, w);
  } else if (m === 'rotate-180') {
    ctx.translate(w, h); ctx.rotate(Math.PI);
    ctx.drawImage(v, 0, 0, w, h);
  } else if (m === 'flip-h') {
    ctx.translate(w, 0); ctx.scale(-1, 1);
    ctx.drawImage(v, 0, 0, w, h);
  } else if (m === 'flip-v') {
    ctx.translate(0, h); ctx.scale(1, -1);
    ctx.drawImage(v, 0, 0, w, h);
  } else if (m === 'flip-both') {
    ctx.translate(w, h); ctx.scale(-1, -1);
    ctx.drawImage(v, 0, 0, w, h);
  }
  ctx.restore();
}

function pickMime() {
  const cands = ['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
  for (const c of cands) if (window.MediaRecorder && MediaRecorder.isTypeSupported(c)) return c;
  return '';
}

rotateBtn.addEventListener('click', async () => {
  if (!originalFile) { alert(t('noFile')); return; }
  const mime = pickMime();
  if (!mime) { alert(t('noStream')); return; }
  rotateBtn.disabled = true;
  $('#progWrap').style.display = 'block';
  $('#progFill').style.width = '0%';
  rotateBtn.textContent = t('processing');
  const v = video;
  const srcW = v.videoWidth, srcH = v.videoHeight;
  const swap = mode === 'rotate-cw' || mode === 'rotate-ccw';
  const outW = swap ? srcH : srcW;
  const outH = swap ? srcW : srcH;
  const canvas = document.createElement('canvas');
  canvas.width = outW; canvas.height = outH;
  const ctx = canvas.getContext('2d');

  // Build combined stream: canvas video + (optional) original audio
  const fps = 30;
  const vstream = canvas.captureStream(fps);
  let stream = vstream;
  const keepAudio = $('#keepAudio').value === '1';
  let audioCtx = null;
  if (keepAudio) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const srcNode = audioCtx.createMediaElementSource(v);
      const dest = audioCtx.createMediaStreamDestination();
      srcNode.connect(dest);
      srcNode.connect(audioCtx.destination);
      stream = new MediaStream([...vstream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
    } catch (e) { stream = vstream; }
  }

  const bitrate = parseInt($('#quality').value, 10);
  const rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: bitrate });
  const chunks = [];
  rec.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
  rec.onstop = () => {
    if (audioCtx) audioCtx.close();
    processedBlob = new Blob(chunks, { type: 'video/webm' });
    const url = URL.createObjectURL(processedBlob);
    downloadBtn.href = url;
    downloadBtn.download = originalFile.name.replace(/\.[^.]+$/, '') + '-rotated.webm';
    downloadBtn.textContent = t('download');
    downloadBtn.style.display = 'inline-flex';
    $('#progWrap').style.display = 'none';
    rotateBtn.disabled = false;
    rotateBtn.textContent = t('rotate');
  };

  v.currentTime = 0;
  v.muted = !keepAudio;
  await v.play();
  rec.start(200);
  const duration = v.duration;
  const startT = performance.now();
  function tick() {
    if (v.ended || v.currentTime >= duration - 0.05) {
      drawFrame(ctx, v, mode, outW, outH);
      setTimeout(() => { if (rec.state !== 'inactive') rec.stop(); v.pause(); }, 150);
      return;
    }
    drawFrame(ctx, v, mode, outW, outH);
    $('#progFill').style.width = Math.min(100, (v.currentTime / duration) * 100) + '%';
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
});

</script>
