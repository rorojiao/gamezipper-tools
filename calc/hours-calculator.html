<body>
<div class="gz-container">
  <div class="gz-tool-header">
    <h1 id="title"></h1>
    <p class="desc" id="desc"></p>
  </div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div class="hc-cfg">
      <label><span data-key="rate">Hourly Rate</span><input type="number" id="cfg-rate" value="20" min="0" step="0.5"></label>
      <label><span data-key="ot-rate">Overtime Rate</span><input type="number" id="cfg-ot-rate" value="30" min="0" step="0.5"></label>
      <label><span data-key="ot-threshold">OT after (h/day)</span><input type="number" id="cfg-ot-threshold" value="8" min="1" step="0.5"></label>
      <label><span data-key="default-break">Default break (min)</span><input type="number" id="cfg-break" value="30" min="0" step="5"></label>
    </div>
    <table class="hc-table" id="table">
      <thead>
        <tr>
          <th data-key="date" style="width:140px">Date</th>
          <th data-key="in">In</th>
          <th data-key="out">Out</th>
          <th data-key="break" style="width:80px">Break (min)</th>
          <th data-key="project" style="width:120px">Project / Note</th>
          <th data-key="hours" class="num" style="width:80px">Hours</th>
          <th data-key="ot" class="num" style="width:60px">OT</th>
          <th data-key="pay" class="num" style="width:80px">Pay</th>
          <th style="width:30px"></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <button class="hc-add" id="add-row">+ Add Day</button>
    <div class="hc-totals" id="totals"></div>
  </div>
  <div class="gz-howto"><h2></h2><ol></ol></div>
  <div class="gz-related"><h2></h2><div class="gz-related-grid"></div></div>
</div>
<script>
GZI18n.register({
  en: {
    toolTitle: 'Hours Calculator & Timesheet',
    toolDesc: 'Calculate work hours from clock in/out times with break deduction, weekly totals and overtime tracking. Free online timesheet calculator.',
    addDay: 'Add Day',
    copyCsv: 'Copy CSV',
    copyTsv: 'Copy TSV',
    clear: 'Clear',
    fillNow: 'Fill Today',
    rate: 'Hourly Rate',
    otRate: 'Overtime Rate',
    otThreshold: 'OT after (h/day)',
    defaultBreak: 'Default break (min)',
    date: 'Date',
    inTime: 'In',
    outTime: 'Out',
    breakMin: 'Break (min)',
    project: 'Project / Note',
    hours: 'Hours',
    ot: 'OT',
    pay: 'Pay',
    totalHours: 'Total Hours',
    totalOt: 'OT Hours',
    totalPay: 'Gross Pay',
    avgPerDay: 'Avg / Day',
    days: 'Days',
    step1: 'Set your hourly rate, overtime rate and break minutes',
    step2: 'Add rows for each workday with clock in/out times',
    step3: 'Watch totals update automatically with overtime calculation',
    step4: 'Copy CSV or TSV to paste into Excel, Sheets or a payroll system',
  },
  zh: {
    toolTitle: '工时计算器与考勤表',
    toolDesc: '通过上下班时间计算工作时长，含休息扣除、周累计和加班追踪。免费在线考勤表计算器。',
    addDay: '添加一天',
    copyCsv: '复制 CSV',
    copyTsv: '复制 TSV',
    clear: '清空',
    fillNow: '填入今日',
    rate: '时薪',
    otRate: '加班时薪',
    otThreshold: '加班阈值 (h/天)',
    defaultBreak: '默认休息 (分钟)',
    date: '日期',
    inTime: '上班',
    outTime: '下班',
    breakMin: '休息 (分)',
    project: '项目/备注',
    hours: '工时',
    ot: '加班',
    pay: '工资',
    totalHours: '总工时',
    totalOt: '加班时数',
    totalPay: '总工资',
    avgPerDay: '日均',
    days: '天数',
    step1: '设置时薪、加班费率和休息分钟数',
    step2: '为每个工作日添加一行，记录上下班时间',
    step3: '总数自动更新，含加班费计算',
    step4: '复制 CSV 或 TSV 粘贴到 Excel、Sheets 或工资系统',
  }
});

const { $, copyText, t } = GZ;

let rows = [];
function emptyRow(date) {
  return { date: date || new Date().toISOString().slice(0,10), in: '09:00', out: '17:00', brk: 30, project: '' };
}
function formatDate(d) { return d.toISOString().slice(0,10); }

function today() { return formatDate(new Date()); }
function prevWorkday(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return formatDate(d);
}

rows = [emptyRow(prevWorkday(4)), emptyRow(prevWorkday(3)), emptyRow(prevWorkday(2)), emptyRow(prevWorkday(1)), emptyRow()];

function parseTime(s) {
  if (!s) return null;
  const m = s.match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return null;
  return +m[1]*60 + +m[2];
}

function computeRow(r) {
  const start = parseTime(r.in);
  let end = parseTime(r.out);
  if (start == null || end == null) return { hours: 0, ot: 0, pay: 0 };
  let total = end - start;
  if (total < 0) total += 24 * 60; // overnight
  total -= (parseInt(r.brk) || 0);
  if (total < 0) total = 0;
  const hours = total / 60;
  const otTh = parseFloat($('#cfg-ot-threshold').value) || 8;
  const ot = Math.max(0, hours - otTh);
  const rate = parseFloat($('#cfg-rate').value) || 0;
  const otRate = parseFloat($('#cfg-ot-rate').value) || 0;
  const pay = (hours - ot) * rate + ot * otRate;
  return { hours, ot, pay };
}

function $$(s, p) { return [...((p||document).querySelectorAll(s))]; }

function render() {
  $('#rows').innerHTML = rows.map((r, i) => `
    <tr>
      <td><input type="date" data-i="${i}" data-f="date" value="${r.date}"></td>
      <td><input type="time" data-i="${i}" data-f="in" value="${r.in}"></td>
      <td><input type="time" data-i="${i}" data-f="out" value="${r.out}"></td>
      <td><input type="number" data-i="${i}" data-f="brk" value="${r.brk}" min="0"></td>
      <td><input type="text" data-i="${i}" data-f="project" value="${r.project}" placeholder="Optional"></td>
      <td class="num"></td>
      <td class="num"></td>
      <td class="num"></td>
      <td><button class="del" data-i="${i}" data-act="del">✕</button></td>
    </tr>
  `).join('');
  $$('#rows input').forEach(inp => inp.addEventListener('input', e => {
    const i = +e.target.getAttribute('data-i');
    const f = e.target.getAttribute('data-f');
    rows[i][f] = e.target.value;
    if (f === 'in' || f === 'out' || f === 'brk') updateCells();
  }));
  $$('#rows .del').forEach(b => b.addEventListener('click', e => {
    const i = +e.currentTarget.getAttribute('data-i');
    rows.splice(i, 1);
    if (rows.length === 0) rows.push(emptyRow());
    render();
  }));
  updateCells();
}

function updateCells() {
  const tbody = $('#rows');
  let totalH = 0, totalOT = 0, totalPay = 0;
  Array.from(tbody.children).forEach((tr, i) => {
    const r = computeRow(rows[i]);
    tr.children[5].textContent = r.hours.toFixed(2);
    tr.children[6].textContent = r.ot.toFixed(2);
    tr.children[7].textContent = '$' + r.pay.toFixed(2);
    totalH += r.hours;
    totalOT += r.ot;
    totalPay += r.pay;
  });
  const days = rows.filter(r => computeRow(r).hours > 0).length;
  const avg = days > 0 ? totalH / days : 0;
  $('#totals').innerHTML = `
    <div class="hc-tot"><div class="v">${totalH.toFixed(2)}</div><div class="l">${t('totalHours')}</div></div>
    <div class="hc-tot"><div class="v">${totalOT.toFixed(2)}</div><div class="l">${t('totalOt')}</div></div>
    <div class="hc-tot"><div class="v">$${totalPay.toFixed(2)}</div><div class="l">${t('totalPay')}</div></div>
    <div class="hc-tot"><div class="v">${avg.toFixed(2)}</div><div class="l">${t('avgPerDay')}</div></div>
    <div class="hc-tot"><div class="v">${days}</div><div class="l">${t('days')}</div></div>
  `;
}

['cfg-rate','cfg-ot-rate','cfg-ot-threshold','cfg-break'].forEach(id => {
  $('#'+id).addEventListener('input', updateCells);
});

$('#add-row').addEventListener('click', () => {
  rows.push(emptyRow());
  render();
});

function exportRows(sep) {
  const headers = ['Date','In','Out','Break (min)','Project','Hours','OT','Pay'];
  const lines = [headers.join(sep)];
  rows.forEach((r, i) => {
    const c = computeRow(r);
    lines.push([r.date, r.in, r.out, r.brk, '"'+r.project.replace(/"/g,'""')+'"', c.hours.toFixed(2), c.ot.toFixed(2), c.pay.toFixed(2)].join(sep));
  });
  return lines.join('\n');
}

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="$('#add-row').click()">${t('addDay')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(exportRows(','))">${t('copyCsv')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="copyText(exportRows('\\t'))">${t('copyTsv')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="rows=[emptyRow()];render()">${t('clear')}</button>`;

render();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⏰', href:'/calc/timer-stopwatch.html', name:'Stopwatch'},
    {icon:'🍅', href:'/calc/pomodoro.html', name:'Pomodoro'},
    {icon:'📅', href:'/calc/date-calculator.html', name:'Date Calc'},
    
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
