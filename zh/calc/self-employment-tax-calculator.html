<div class="gz-container">

<script>
GZI18n.register({
  en: {
    toolTitle: 'Self-Employment Tax Calculator',
    toolDesc: 'Estimate your US self-employment tax (SECA) for 2024-2026. Calculates net earnings from self-employment, Social Security (12.4%) and Medicare (2.9%) portions, the additional Medicare tax, total SE tax, the 50% deductible portion, and effective rate. Updated for the 2025 wage base of $176,100.',
    lblIncome: 'Schedule C net profit (USD)',
    lblYear: 'Tax year',
    lblStatus: 'Filing status (for add\'l Medicare)',
    lblExtra: 'Other wages already earned (USD)',
    calc: 'Calculate',
    clear: 'Clear',
    nNetearn: 'Net earnings from SE (× 92.35%)',
    nSs: 'Social Security portion (12.4%)',
    nMedi: 'Medicare portion (2.9%)',
    nAddmed: 'Additional Medicare tax (0.9%)',
    nTotal: 'Total self-employment tax',
    nDeduct: 'Deductible portion (50%)',
    nRate: 'Effective SE tax rate',
    note: 'SE tax = 15.3% on net earnings up to the Social Security wage base ($176,100 in 2025), then 2.9% above it. Net earnings = Schedule C profit × 0.9235. The additional 0.9% Medicare tax applies when combined earned income exceeds $200,000 (single) or $250,000 (MFJ). 50% of SE tax is deductible above-the-line. This estimate covers SECA tax only — it does not include federal/state income tax.',
    step1: 'Enter your net business profit from Schedule C',
    step2: 'Choose the tax year and your filing status',
    step3: 'Optionally add other wages for the additional Medicare threshold',
    step4: 'Read the total SE tax, deductible portion, and effective rate',
  },
  zh: {
    toolTitle: '自雇税计算器',
    toolDesc: '估算 2024-2026 年美国自雇税（SECA）。计算自雇净收入、社保部分（12.4%）和医保部分（2.9%）、额外医保税、自雇税总额、50% 可抵扣部分及实际税率。已更新 2025 年社保工资基数 $176,100。',
    lblIncome: 'Schedule C 净利润（美元）',
    lblYear: '纳税年度',
    lblStatus: '申报状态（用于额外医保税）',
    lblExtra: '其他已获工资（美元）',
    calc: '计算',
    clear: '清空',
    nNetearn: '自雇净收入（× 92.35%）',
    nSs: '社保部分（12.4%）',
    nMedi: '医保部分（2.9%）',
    nAddmed: '额外医保税（0.9%）',
    nTotal: '自雇税总额',
    nDeduct: '可抵扣部分（50%）',
    nRate: '自雇税实际税率',
    note: '自雇税 = 净收入 15.3%（不超过社保工资基数，2025 年为 $176,100），超出部分为 2.9%。净收入 = Schedule C 利润 × 0.9235。合并收入超过 $200,000（单身）或 $250,000（夫妻合报）时，另加 0.9% 额外医保税。50% 自雇税可在税前抵扣。本估算仅涵盖 SECA 税，不含联邦/州所得税。',
    step1: '输入 Schedule C 净利润',
    step2: '选择纳税年度和申报状态',
    step3: '可选：填写其他工资以判断额外医保税门槛',
    step4: '查看自雇税总额、可抵扣部分及实际税率',
  }
});

const { $, t } = GZ;

// Social Security wage base by year
const SS_WAGE_BASE = { 2024: 168600, 2025: 176100, 2026: 177000 };
// Additional Medicare thresholds
const ADD_MED_THRESH = { single: 200000, joint: 250000 };

function fmt(n, prefix) {
  if (!isFinite(n)) return '—';
  const s = n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return (prefix || '') + s;
}

function calc() {
  const profit = parseFloat($('#income').value);
  const year = $('#year').value;
  const status = $('#status').value;
  const extraWages = parseFloat($('#extra').value) || 0;

  if (!isFinite(profit) || profit < 0) {
    $('#results').style.display = 'none';
    return;
  }

  // Net earnings from self-employment (only positive counts)
  const netEarnings = Math.max(0, profit * 0.9235);
  const ssBase = SS_WAGE_BASE[year];

  // Social Security portion (12.4%) on net earnings up to wage base
  let ssTaxable = netEarnings;
  if (netEarnings > ssBase) ssTaxable = ssBase;
  const ssPortion = ssTaxable * 0.124;

  // Medicare portion (2.9%) on all net earnings
  const mediPortion = netEarnings * 0.029;

  // Additional Medicare tax (0.9%) on earned income over threshold
  const threshold = ADD_MED_THRESH[status];
  const combinedEarned = netEarnings + extraWages;
  const addMediBase = Math.max(0, combinedEarned - threshold);
  // Additional Medicare is computed on SE earnings portion only here
  const seShareAbove = Math.min(netEarnings, addMediBase);
  const addMedi = seShareAbove * 0.009;

  const total = ssPortion + mediPortion + addMedi;
  const deduction = total * 0.50;
  const effectiveRate = profit > 0 ? (total / profit) * 100 : 0;

  $('#out-netearn').textContent = fmt(netEarnings, '$');
  $('#out-ss').textContent = fmt(ssPortion, '$');
  $('#out-medi').textContent = fmt(mediPortion, '$');
  $('#out-addmed').textContent = fmt(addMedi, '$');
  $('#out-total').textContent = fmt(total, '$');
  $('#out-deduct').textContent = fmt(deduction, '$');
  $('#out-rate').textContent = fmt(effectiveRate) + '%';
  $('#n-netearn').textContent = t('nNetearn');
  $('#n-ss').textContent = t('nSs');
  $('#n-medi').textContent = t('nMedi');
  $('#n-addmed').textContent = t('nAddmed');
  $('#n-total').textContent = t('nTotal');
  $('#n-deduct').textContent = t('nDeduct');
  $('#n-rate').textContent = t('nRate');

  $('#results').style.display = 'block';
}

['income','year','status','extra'].forEach(id => $('#' + id).addEventListener('input', calc));
$('#year').addEventListener('change', calc);
$('#status').addEventListener('change', calc);

$('#lbl-income').textContent = t('lblIncome');
$('#lbl-year').textContent = t('lblYear');
$('#lbl-status').textContent = t('lblStatus');
$('#lbl-extra').textContent = t('lblExtra');
$('#note').textContent = t('note');

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calc')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="['income','extra'].forEach(id=>document.getElementById(id).value='0');calc()">${t('clear')}</button>`;

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'💰', href:'/calc/income-tax-calculator.html', name:'Income Tax'},
    {icon:'📈', href:'/calc/take-home-pay-calculator.html', name:'Take-Home Pay'},
    {icon:'💵', href:'/calc/paycheck-calculator.html', name:'Paycheck'},
    {icon:'🧾', href:'/calc/freelancer-rate.html', name:'Freelancer Rate'},
  ]
});
</script>
