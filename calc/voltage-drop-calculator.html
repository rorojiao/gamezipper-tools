<script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is the formula for voltage drop?", "acceptedAnswer": {"@type": "Answer", "text": "For single-phase: VD = 2 × K × I × L ÷ CM (US) or VD = 2 × ρ × I × L ÷ A (metric), where K is resistivity (12.9 for copper, 21.2 for aluminum in CM·Ω/ft), I is current, L is one-way length, and CM is the wire area in circular mils."}}, {"@type": "Question", "name": "What is the maximum allowed voltage drop?", "acceptedAnswer": {"@type": "Answer", "text": "The NEC recommends a maximum voltage drop of 3% for branch circuits and 5% for the total of feeder plus branch circuit. Many electricians use 3% as the practical limit for optimal performance."}}, {"@type": "Question", "name": "How do I calculate wire size from voltage drop?", "acceptedAnswer": {"@type": "Answer", "text": "Rearrange the voltage drop formula: CM = 2 × K × I × L ÷ VD. Solve for the minimum circular mils and pick the next-larger standard AWG. This tool does the lookup automatically for AWG 0000 through AWG 40."}}, {"@type": "Question", "name": "Why does aluminum have more voltage drop than copper?", "acceptedAnswer": {"@type": "Answer", "text": "Aluminum has about 61% of copper's conductivity, so a K value of 21.2 vs copper's 12.9. To carry the same current with the same voltage drop, an aluminum conductor must be roughly one AWG size larger."}}]}</script>

<body>
<div class="gz-container">
  <div class="gz-tool-header">

  </div>
  <div class="gz-tool-area">

      <div class="gz-vd-field"><label id="lbl-material"></label><select id="material"><option value="cu">Copper</option><option value="al">Aluminum</option></select></div>
      <div class="gz-vd-field"><label id="lbl-phase"></label><select id="phase"><option value="1">Single-phase (1φ)</option><option value="3">Three-phase (3φ)</option></select></div>
      <div class="gz-vd-field"><label id="lbl-voltage"></label><input type="number" id="voltage" min="0" step="any" value="120"></div>
      <div class="gz-vd-field"><label id="lbl-current"></label><input type="number" id="current" min="0" step="any" value="15"></div>
      <div class="gz-vd-field"><label id="lbl-length"></label><input type="number" id="length" min="0" step="any" value="100"></div>
      <div class="gz-vd-field"><label id="lbl-awg"></label><select id="awg"></select></div>
    </div>

    <div class="gz-vd-result" id="results" style="display:none">
      <div class="row"><span class="name" id="n-vd"></span><span class="val" id="out-vd"></span></div>
      <div class="row"><span class="name" id="n-pct"></span><span class="val" id="out-pct"></span></div>
      <div class="row"><span class="name" id="n-atload"></span><span class="val" id="out-atload"></span></div>
      <div class="row"><span class="name" id="n-powerloss"></span><span class="val" id="out-powerloss"></span></div>
      <div class="row"><span class="name" id="n-rec"></span><span class="val" id="out-rec"></span></div>
    </div>
    <div class="gz-vd-warn" id="warn" style="display:none"></div>
    <div class="gz-vd-formulas" id="formulas"></div>
  </div>

<script>
GZI18n.register({
  en: {
    toolTitle: 'Voltage Drop Calculator',
    toolDesc: 'Calculate voltage drop, percentage drop, voltage at the load, and recommended minimum wire size for copper or aluminum conductors. Supports single-phase and three-phase circuits from 12V DC to 480V AC. Free, browser-based, NEC-aligned.',
    lblMaterial: 'Conductor material',
    lblPhase: 'Phase',
    lblVoltage: 'Source voltage (V)',
    lblCurrent: 'Load current (A)',
    lblLength: 'One-way wire length (ft)',
    lblAwg: 'Wire size (AWG)',
    calc: 'Calculate',
    clear: 'Clear',
    nVd: 'Voltage drop',
    nPct: 'Voltage drop %',
    nAtload: 'Voltage at load',
    nPowerloss: 'Power lost in wire',
    nRec: 'Recommended min wire',
    okMsg: '✓ Within 3% — acceptable for branch circuits.',
    warnMsg: '⚠ Over 3% — consider upsizing the wire or shortening the run.',
    formulas: 'Single-phase: VD = 2 × K × I × L ÷ CM · Three-phase: VD = √3 × K × I × L ÷ CM · K(copper)=12.9, K(aluminum)=21.2 (Ω·CM/ft)',
    step1: 'Pick conductor material (copper or aluminum)',
    step2: 'Choose single-phase or three-phase, then enter voltage and current',
    step3: 'Enter the one-way wire length in feet',
    step4: 'Select your wire size (AWG) to see the voltage drop and a recommendation',
  },
  zh: {
    toolTitle: '电压降计算器',
    toolDesc: '计算铜或铝导线的电压降、电压降百分比、负载端电压，并推荐最小线径。支持单相和三相电路，覆盖 12V 直流到 480V 交流。免费、浏览器本地运行，符合 NEC 规范。',
    lblMaterial: '导体材质',
    lblPhase: '相位',
    lblVoltage: '电源电压 (V)',
    lblCurrent: '负载电流 (A)',
    lblLength: '单向导线长度（英尺）',
    lblAwg: '线径 (AWG)',
    calc: '计算',
    clear: '清空',
    nVd: '电压降',
    nPct: '电压降百分比',
    nAtload: '负载端电压',
    nPowerloss: '导线损耗功率',
    nRec: '推荐最小线径',
    okMsg: '✓ 在 3% 以内 — 适合支路使用。',
    warnMsg: '⚠ 超过 3% — 建议加大线径或缩短走线。',
    formulas: '单相：VD = 2 × K × I × L ÷ CM · 三相：VD = √3 × K × I × L ÷ CM · K(铜)=12.9, K(铝)=21.2 (Ω·CM/ft)',
    step1: '选择导体材质（铜或铝）',
    step2: '选择单相或三相，输入电压和电流',
    step3: '输入单向导线长度（英尺）',
    step4: '选择线径 (AWG)，即可看到电压降及推荐',
  }
});

const { $, t } = GZ;

// AWG table: AWG -> circular mils (CM)
const AWG_TABLE = [
  ['0000', 211600], ['000', 167800], ['00', 133100], ['0', 105600],
  ['1', 83690], ['2', 66370], ['3', 52620], ['4', 41740],
  ['5', 33100], ['6', 26240], ['7', 20820], ['8', 16510],
  ['10', 10380], ['12', 6530], ['14', 4107], ['16', 2583],
  ['18', 1620], ['20', 1022], ['22', 642], ['24', 404],
  ['26', 254], ['28', 160], ['30', 100]
];

// Populate AWG dropdown
$('#awg').innerHTML = AWG_TABLE.map(([awg, cm]) => `<option value="${cm}">AWG ${awg}</option>`).join('');
$('#awg').value = '4107'; // default AWG 14

$('#lbl-material').textContent = t('lblMaterial');
$('#lbl-phase').textContent = t('lblPhase');
$('#lbl-voltage').textContent = t('lblVoltage');
$('#lbl-current').textContent = t('lblCurrent');
$('#lbl-length').textContent = t('lblLength');
$('#lbl-awg').textContent = t('lblAwg');
$('#formulas').textContent = t('formulas');

function fmt(n, u) {
  if (!isFinite(n)) return '—';
  const abs = Math.abs(n);
  if (abs !== 0 && (abs < 0.001 || abs >= 1e6)) return n.toExponential(3) + (u ? ' ' + u : '');
  return n.toLocaleString(undefined, { maximumFractionDigits: 4 }) + (u ? ' ' + u : '');
}

function findAwgByCm(minCm) {
  // Smallest AWG (largest number) with CM >= minCm
  for (let i = AWG_TABLE.length - 1; i >= 0; i--) {
    if (AWG_TABLE[i][1] >= minCm) return AWG_TABLE[i][0];
  }
  return AWG_TABLE[0][0]; // upsized to 0000
}

function calc() {
  const V = parseFloat($('#voltage').value);
  const I = parseFloat($('#current').value);
  const L = parseFloat($('#length').value);
  const cm = parseFloat($('#awg').value);
  const k = $('#material').value === 'cu' ? 12.9 : 21.2;
  const phases = $('#phase').value === '3' ? Math.sqrt(3) : 2;

  if (!isFinite(V) || !isFinite(I) || !isFinite(L) || !isFinite(cm) || cm <= 0 || V <= 0) {
    $('#results').style.display = 'none';
    $('#warn').style.display = 'none';
    return;
  }

  const vd = (phases * k * I * L) / cm;
  const pct = (vd / V) * 100;
  const atLoad = V - vd;
  const powerLoss = vd * I;
  // Recommended min CM for 3% drop, then map to AWG
  const minCm = (phases * k * I * L) / (V * 0.03);
  const recAwg = findAwgByCm(minCm);

  $('#out-vd').textContent = fmt(vd, 'V');
  $('#out-pct').textContent = fmt(pct, '%');
  $('#out-atload').textContent = fmt(atLoad, 'V');
  $('#out-powerloss').textContent = fmt(powerLoss, 'W');
  $('#out-rec').textContent = 'AWG ' + recAwg;
  $('#n-vd').textContent = t('nVd');
  $('#n-pct').textContent = t('nPct');
  $('#n-atload').textContent = t('nAtload');
  $('#n-powerloss').textContent = t('nPowerloss');
  $('#n-rec').textContent = t('nRec');

  const warn = $('#warn');
  if (pct <= 3) {
    warn.className = 'gz-vd-warn ok';
    warn.textContent = t('okMsg');
  } else {
    warn.className = 'gz-vd-warn bad';
    warn.textContent = t('warnMsg');
  }
  warn.style.display = 'block';
  $('#results').style.display = 'block';
}

['voltage','current','length','awg','material','phase'].forEach(id => $('#' + id).addEventListener('input', calc));
$('#material').addEventListener('change', calc);
$('#phase').addEventListener('change', calc);
$('#awg').addEventListener('change', calc);

$('#toolbar').innerHTML = `
  <button class="gz-btn" onclick="calc()">${t('calc')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="['voltage','current','length'].forEach(id=>document.getElementById(id).value='');calc()">${t('clear')}</button>`;

calc();

GZ.renderToolPage({
  category: 'calc',
  titleKey: 'toolTitle',
  descKey: 'toolDesc',
  howToSteps: ['step1','step2','step3','step4'],
  related: [
    {icon:'⚡', href:'/calc/ohms-law-calculator.html', name:"Ohm's Law"},
    {icon:'🔋', href:'/calc/voltage-divider-calculator.html', name:'Voltage Divider'},
    {icon:'💡', href:'/calc/led-resistor-calculator.html', name:'LED Resistor'},
    {icon:'⚡', href:'/calc/wattage-calculator.html', name:'Wattage'},
  ]
});
</script>
<script src="/tools-result-rec.js" defer></script>
</body>
</html>
