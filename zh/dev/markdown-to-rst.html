const { $, copyText, t } = GZ;
const UNDERLINE = ['=','-','~','^','"','#'];

function escapeInline(s){
  // inline code first
  s = s.replace(/`([^`]+)`/g, '``$1``');
  // bold
  s = s.replace(/\*\*([^*]+)\*\*/g, '**$1**');
  s = s.replace(/__([^_]+)__/g, '**$1**');
  // italic
  s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1*$2*');
  s = s.replace(/(^|[^_])_([^_\n]+)_/g, '$1*$2*');
  // strikethrough
  s = s.replace(/~~([^~]+)~~/g, '[$1]');
  // links [text](url)
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '`$1 <$2>`_');
  // images ![alt](url) -> .. image:: url
  // handled in block pass
  return s;
}

function convert(md){
  const lines = md.replace(/\r\n/g,'\n').split('\n');
  const out = [];
  let i = 0;
  let inCode = false, codeLang = '';
  while(i < lines.length){
    let line = lines[i];
    // fenced code block
    const fence = line.match(/^```(\w*)/);
    if(fence){
      if(!inCode){ inCode = true; codeLang = fence[1] || ''; out.push(`.. code-block:: ${codeLang||'text'}`); out.push(''); }
      else { inCode = false; out.push(''); }
      i++; continue;
    }
    if(inCode){ out.push('    ' + line); i++; continue; }
    // image line
    const img = line.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
    if(img){ out.push(`.. image:: ${img[2]}`); if(img[1]) out.push(`   :alt: ${img[1]}`); out.push(''); i++; continue; }
    // heading with #
    const h = line.match(/^(#{1,6})\s+(.*)$/);
    if(h){
      const level = h[1].length;
      const text = escapeInline(h[2].trim());
      const ch = UNDERLINE[Math.min(level-1, UNDERLINE.length-1)];
      const bar = ch.repeat(Math.max(text.length, 3));
      if(level <= 4){ out.push(bar); out.push(text); out.push(bar); }
      else { out.push(text); out.push(bar); }
      out.push('');
      i++; continue;
    }
    // setext heading (=== or --- under text)
    if(i+1 < lines.length && /^(=+|-+)\s*$/.test(lines[i+1]) && line.trim()){
      const text = escapeInline(line.trim());
      const ch = /^=/.test(lines[i+1].trim())?'=':'-';
      const bar = ch.repeat(Math.max(text.length,3));
      out.push(bar); out.push(text); out.push(bar); out.push('');
      i += 2; continue;
    }
    // horizontal rule
    if(/^(-{3,}|\*{3,}|_{3,})\s*$/.test(line)){ out.push('..'); out.push(''); i++; continue; }
    // blockquote
    if(/^>\s?/.test(line)){
      const txt = escapeInline(line.replace(/^>\s?/,''));
      out.push('   ' + txt);
      i++; continue;
    }
    // GFM table
    if(line.includes('|') && i+1 < lines.length && /^\s*\|?[\s:|-]+\|?\s*$/.test(lines[i+1]) && lines[i+1].includes('-')){
      const header = line.split('|').map(s=>s.trim()).filter((s,idx,arr)=>!(idx===0&&s==='')&&!(idx===arr.length-1&&s===''));
      const sep = lines[i+1].split('|').map(s=>s.trim()).filter(Boolean);
      const rows = [];
      let j = i+2;
      while(j < lines.length && lines[j].includes('|')){
        rows.push(lines[j].split('|').map(s=>s.trim()).filter((s,idx,arr)=>!(idx===0&&s==='')&&!(idx===arr.length-1&&s==='')));
        j++;
      }
      // RST list-table
      out.push('.. list-table::');
      out.push('   :header-rows: 1');
      out.push('');
      out.push('   * - ' + header.map(escapeInline).join('\n     - '));
      for(const r of rows){ out.push('   * - ' + r.map(escapeInline).join('\n     - ')); }
      out.push('');
      i = j; continue;
    }
    // unordered list
    if(/^\s*[-*+]\s+/.test(line)){
      const depth = line.match(/^\s*/)[0].length;
      const text = escapeInline(line.replace(/^\s*[-*+]\s+/,''));
      out.push(' '.repeat(depth) + '* ' + text);
      i++; continue;
    }
    // ordered list
    if(/^\s*\d+\.\s+/.test(line)){
      const depth = line.match(/^\s*/)[0].length;
      const text = escapeInline(line.replace(/^\s*\d+\.\s+/,''));
      out.push(' '.repeat(depth) + '#. ' + text);
      i++; continue;
    }
    // blank
    if(line.trim()===''){ out.push(''); i++; continue; }
    // normal paragraph
    out.push(escapeInline(line));
    i++;
  }
  return out.join('\n').replace(/\n{3,}/g,'\n\n').trim() + '\n';
}

}
