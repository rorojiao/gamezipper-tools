<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Chmod Calculator","description":"Calculate Unix file permissions with chmod calculator online. Convert between numeric and symbolic permission modes. Free chmod tool.","url":"https://tools.gamezipper.com/dev/chmod.html","applicationCategory":"Utility","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0"}}</script>

<div class="gz-container">
  <div class="gz-tool-header"><h1 id="title"></h1><p class="desc" id="desc"></p></div>
  <div class="gz-tool-area">
    <div class="gz-toolbar" id="toolbar"></div>
    <div style="max-width:500px;margin:0 auto">
      <div class="perm-display">
        <div><input id="num-input" maxlength="4" value="755" style="font-size:2em;font-family:monospace;font-weight:700;width:5ch;text-align:center;border:2px solid var(--primary);border-radius:8px;padding:4px"></div>
        <div class="sym" id="sym-display">rwxr-xr-x</div>
      </div>

</div>
<script>
GZI18n.register({
  en:{
    chmodTitle:'Unix Chmod Calculator',chmodDesc:'Calculate Unix file permissions. Convert between numeric (755) and symbolic (rwxr-xr-x) formats.',
    owner:'Owner',group:'Group',others:'Others',
    read:'Read',write:'Write',execute:'Execute',
    chmodCmd:'Command',
    chmodStep1:'Set permissions using checkboxes or enter a number',
    chmodStep2:'See the symbolic and numeric representations',
    chmodStep3:'Copy the chmod command',
    commonPerms:'Common Permissions',
  },
  zh:{
    chmodTitle:'Unix 权限计算器',chmodDesc:'计算Unix文件权限。在数字(755)和符号(rwxr-xr-x)格式之间转换。',
    owner:'所有者',group:'用户组',others:'其他人',
    read:'读取',write:'写入',execute:'执行',
    chmodCmd:'命令',
    chmodStep1:'使用复选框设置权限或输入数字',
    chmodStep2:'查看符号和数字表示',
    chmodStep3:'复制chmod命令',
    commonPerms:'常用权限',
  }
});
const {t,$,$$}=GZ;
const roles=['owner','group','others'];
const perms=['read','write','execute'];
const bits=[4,2,1];

function buildGrid(){
  const grid=$('#perm-grid');
  grid.innerHTML='<div></div>'+perms.map(p=>`<div style="text-align:center;font-weight:600">${t(p)}</div>`).join('');
  roles.forEach((r,ri)=>{
    grid.innerHTML+=`<div class="role">${t(r)}</div>`+bits.map((b,bi)=>`<label style="justify-content:center"><input type="checkbox" data-role="${ri}" data-bit="${b}" onchange="fromCheckboxes()"></label>`).join('');
  });
}

function fromCheckboxes(){
  let val='';
  roles.forEach((_,ri)=>{
    let n=0;
    $$(`input[data-role="${ri}"]`).forEach(cb=>{if(cb.checked)n+=+cb.dataset.bit});
    val+=n;
  });
  $('#num-input').value=val;
  updateDisplay(val);
}

function fromNumber(){
  const v=$('#num-input').value.replace(/[^0-7]/g,'').slice(0,3);
  if(v.length===3){
    v.split('').forEach((d,ri)=>{
      const n=+d;
      bits.forEach(b=>{
        const cb=document.querySelector(`input[data-role="${ri}"][data-bit="${b}"]`);
        if(cb)cb.checked=!!(n&b);
      });
    });
    updateDisplay(v);
  }
}

function updateDisplay(num){
  const sym=num.split('').map(d=>{
    const n=+d;
    return(n&4?'r':'-')+(n&2?'w':'-')+(n&1?'x':'-');
  }).join('');
  $('#sym-display').textContent=sym;
  $('#cmd-display').innerHTML=`<strong>${t('chmodCmd')}:</strong> chmod ${num} filename`;
}

function setPreset(v){$('#num-input').value=v;fromNumber()}

buildGrid();
$('#num-input').addEventListener('input',fromNumber);

$('#toolbar').innerHTML=`
  <button class="gz-btn gz-btn-secondary" onclick="setPreset('755')">755</button>
  <button class="gz-btn gz-btn-secondary" onclick="setPreset('644')">644</button>
  <button class="gz-btn gz-btn-secondary" onclick="setPreset('777')">777</button>
  <button class="gz-btn gz-btn-secondary" onclick="setPreset('600')">600</button>
  <button class="gz-btn gz-btn-secondary" onclick="setPreset('444')">444</button>
  <button class="gz-btn gz-btn-secondary" onclick="GZ.copyText($('#cmd-display').textContent)">${t('copy')}</button>
  <button class="gz-btn gz-btn-secondary" onclick="setPreset('750')">${t('example')}</button>`;

GZ.renderToolPage({category:'dev',titleKey:'chmodTitle',descKey:'chmodDesc',
  howToSteps:['chmodStep1','chmodStep2','chmodStep3'],
  related:[
    {icon:'#️⃣',href:'/dev/hash.html',name:'Hash Generator'},
    {icon:'🔑',href:'/dev/uuid.html',name:'UUID Generator'},
    {icon:'⏱️',href:'/dev/timestamp.html',name:'Timestamp'},
  ]
});
fromNumber();
</script><script>new Image().src="https://site-analytics.cap.1ktower.com/hit?s=tools.gamezipper.com&p="+encodeURIComponent(location.pathname);</script>
